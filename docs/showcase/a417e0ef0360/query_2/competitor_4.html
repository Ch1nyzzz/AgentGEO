&lt;/span&gt;&lt;meta content=&quot;Water scarcity is a particularly severe challenge in arid and desert climates. While a substantial amount of water is present in the form of vapour in the atmosphere, harvesting this water by state-of-the-art dewing technology can be extremely energy intensive and impractical, particularly when the relative humidity (RH) is low (i.e., below ~40% RH). In contrast, atmospheric water generators that utilise sorbents enable capture of vapour at low RH conditions and can be driven by the abundant source of solar-thermal energy with higher efficiency. Here, we demonstrate an air-cooled sorbent-based atmospheric water harvesting device using the metal−organic framework (MOF)-801 [Zr6O4(OH)4(fumarate)6] operating in an exceptionally arid climate (10–40% RH) and sub-zero dew points (Tempe, Arizona, USA) with&amp;amp;nbsp;a&amp;amp;nbsp; thermal efficiency (solar input to water conversion) of ~14%. We predict that this device delivered over 0.25 L of water per kg of MOF for a single daily cycle. Harvesting water from the atmosphere is an important solution to water scarcity, but doing so in arid climates is highly challenging. Here, the authors develop a metal-organic framework-based water harvesting device that can deliver over 0.25 L of water per kg of adsorbent over a single cycle at relative humidities of 10–40% and at subzero dew points.&quot; data-dcnode-id=&quot;3879&quot; name=&quot;dc.description&quot;&gt;&lt;span data-dcnode-id=&quot;3878&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;meta content=&quot;Water scarcity is a particularly severe challenge in arid and desert climates. While a substantial amount of water is present in the form of vapour in the atmosphere, harvesting this water by state-of-the-art dewing technology can be extremely energy intensive and impractical, particularly when the relative humidity (RH) is low (i.e., below ~40% RH). In contrast, atmospheric water generators that utilise sorbents enable capture of vapour at low RH conditions and can be driven by the abundant source of solar-thermal energy with higher efficiency. Here, we demonstrate an air-cooled sorbent-based atmospheric water harvesting device using the metal−organic framework (MOF)-801 [Zr6O4(OH)4(fumarate)6] operating in an exceptionally arid climate (10–40% RH) and sub-zero dew points (Tempe, Arizona, USA) with&amp;amp;nbsp;a&amp;amp;nbsp; thermal efficiency (solar input to water conversion) of ~14%. We predict that this device delivered over 0.25 L of water per kg of MOF for a single daily cycle. Harvesting water from the atmosphere is an important solution to water scarcity, but doing so in arid climates is highly challenging. Here, the authors develop a metal-organic framework-based water harvesting device that can deliver over 0.25 L of water per kg of adsorbent over a single cycle at relative humidities of 10–40% and at subzero dew points.&quot; data-dcnode-id=&quot;3817&quot; name=&quot;description&quot;&gt;&lt;span data-dcnode-id=&quot;3816&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;c-article-body&quot; data-dcnode-id=&quot;1225&quot;&gt;&lt;span data-dcnode-id=&quot;2899&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section aria-labelledby=&quot;Abs1&quot; data-dcnode-id=&quot;2880&quot; data-title=&quot;Abstract&quot; lang=&quot;en&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2881&quot; id=&quot;Abs1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2897&quot; id=&quot;Abs1&quot;&gt;&lt;span data-dcnode-id=&quot;2898&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2882&quot; id=&quot;Abs1-content&quot;&gt;&lt;p data-dcnode-id=&quot;2883&quot;&gt;&lt;span data-dcnode-id=&quot;2896&quot; instrument_node=&quot;&quot;&gt;Water scarcity is a particularly severe challenge in arid and desert climates. While a substantial amount of water is present in the form of vapour in the atmosphere, harvesting this water by state-of-the-art dewing technology can be extremely energy intensive and impractical, particularly when the relative humidity (RH) is low (i.e., below ~40% RH). In contrast, atmospheric water generators that utilise sorbents enable capture of vapour at low RH conditions and can be driven by the abundant source of solar-thermal energy with higher efficiency. Here, we demonstrate an air-cooled sorbent-based atmospheric water harvesting device using the metal−organic framework (MOF)-801 [Zr&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2894&quot;&gt;&lt;span data-dcnode-id=&quot;2895&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2893&quot; instrument_node=&quot;&quot;&gt;O&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2891&quot;&gt;&lt;span data-dcnode-id=&quot;2892&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2890&quot; instrument_node=&quot;&quot;&gt;(OH)&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2888&quot;&gt;&lt;span data-dcnode-id=&quot;2889&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2887&quot; instrument_node=&quot;&quot;&gt;(fumarate)&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2885&quot;&gt;&lt;span data-dcnode-id=&quot;2886&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2884&quot; instrument_node=&quot;&quot;&gt;] operating in an exceptionally arid climate (10–40% RH) and sub-zero dew points (Tempe, Arizona, USA) with&amp;nbsp;a&amp;nbsp; thermal efficiency (solar input to water conversion) of ~14%. We predict that this device delivered over 0.25 L of water per kg of MOF for a single daily cycle.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2879&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;noscript data-dcnode-id=&quot;2877&quot;&gt;&lt;span data-dcnode-id=&quot;2878&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/noscript&gt;&lt;span data-dcnode-id=&quot;2876&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section data-dcnode-id=&quot;2790&quot; data-title=&quot;Introduction&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2791&quot; id=&quot;Sec1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2874&quot; id=&quot;Sec1&quot;&gt;&lt;span data-dcnode-id=&quot;2875&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2792&quot; id=&quot;Sec1-content&quot;&gt;&lt;p data-dcnode-id=&quot;2834&quot;&gt;&lt;span data-dcnode-id=&quot;2873&quot; instrument_node=&quot;&quot;&gt;Enabling access to fresh potable water in desert and arid regions is a critical challenge and tightly coupled to social and economic development&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2870&quot;&gt;&lt;a aria-label=&quot;Reference 1&quot; data-dcnode-id=&quot;2871&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR1&quot; id=&quot;ref-link-section-d103434884e447&quot; title=&quot;Mekonnen, M. M. &amp;amp; Hoekstra, A. Y. Four billion people facing severe water scarcity. Sci. Adv. 2, e1500323 (2016).&quot;&gt;&lt;span data-dcnode-id=&quot;2872&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2869&quot; instrument_node=&quot;&quot;&gt;. Water scarcity is difficult to address in areas that are landlocked and have limited infrastructure, such that mature water purification technologies, i.e., reverse osmosis and multi-stage flash, are challenging to implement. Atmospheric water generators (AWGs) can take advantage of solar energy via photovoltaics (refrigeration-based)&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2863&quot;&gt;&lt;a aria-label=&quot;Reference 2&quot; data-dcnode-id=&quot;2867&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR2&quot; id=&quot;ref-link-section-d103434884e451&quot; title=&quot;Wahlgren, R. V. Atmospheric water vapour processor designs for potable water production: a review. Water Res. 35, 1–22 (2001).&quot;&gt;&lt;span data-dcnode-id=&quot;2868&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2866&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 3&quot; data-dcnode-id=&quot;2864&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR3&quot; id=&quot;ref-link-section-d103434884e454&quot; title=&quot;Wikramanayake, E. D., Ozkan, O. &amp;amp; Bahadur, V. Landfill gas-powered atmospheric water harvesting for oilfield operations in the United States. Energy 138, 647–658 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2865&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2862&quot; instrument_node=&quot;&quot;&gt; or solar thermal (sorption-based)&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2853&quot;&gt;&lt;a data-dcnode-id=&quot;2860&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d103434884e458&quot; title=&quot;Kim, H. et al. Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356, 430–434 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2859&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a data-dcnode-id=&quot;2857&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR5&quot; id=&quot;ref-link-section-d103434884e458_1&quot; title=&quot;Ji, J., Wang, R. &amp;amp; Li, L. New composite adsorbent for solar-driven fresh water production from the atmosphere. Desalination 212, 176–182 (2007).&quot;&gt;&lt;span data-dcnode-id=&quot;2858&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2856&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 6&quot; data-dcnode-id=&quot;2854&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR6&quot; id=&quot;ref-link-section-d103434884e461&quot; title=&quot;Wang, J., Liu, J., Wang, R. &amp;amp; Wang, L. Experimental investigation on two solar-driven sorption based devices to extract fresh water from atmosphere. Appl. Therm. Eng. 127, 1608–1616 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2855&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2852&quot; instrument_node=&quot;&quot;&gt; to harvest moisture from air. Typical AWGs utilise refrigeration to cool large volumes of air well below the dew point to condense water. The amount of energy consumed to harvest water from the air dramatically increases as the humidity or ambient temperature decreases. Desert and arid regions, unfortunately, have day-time relative humidities (RH; &lt;/span&gt;&lt;i data-dcnode-id=&quot;2850&quot;&gt;&lt;span data-dcnode-id=&quot;2851&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2848&quot;&gt;&lt;span data-dcnode-id=&quot;2849&quot; instrument_node=&quot;&quot;&gt;vap&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2847&quot; instrument_node=&quot;&quot;&gt;/&lt;/span&gt;&lt;i data-dcnode-id=&quot;2845&quot;&gt;&lt;span data-dcnode-id=&quot;2846&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2843&quot;&gt;&lt;span data-dcnode-id=&quot;2844&quot; instrument_node=&quot;&quot;&gt;sat&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2842&quot; instrument_node=&quot;&quot;&gt;, vapour pressure over saturation pressure) as low as ~10% with a vapour content of approximately 3 L of liquid water for every one million litres of air. For these conditions, the dew point can be sub-zero, requiring a large amount of energy to freeze and collect water out of air. Though the typical night-time RH can be as high as ~40%, the lower ambient temperature (~20 °C) prevents water harvesting with refrigeration-based AWGs. As a result, the practical implementation of refrigeration-based AWGs is infeasible&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2836&quot;&gt;&lt;a aria-label=&quot;Reference 3&quot; data-dcnode-id=&quot;2840&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR3&quot; id=&quot;ref-link-section-d103434884e474&quot; title=&quot;Wikramanayake, E. D., Ozkan, O. &amp;amp; Bahadur, V. Landfill gas-powered atmospheric water harvesting for oilfield operations in the United States. Energy 138, 647–658 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2841&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 7&quot; data-dcnode-id=&quot;2837&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR7&quot; id=&quot;ref-link-section-d103434884e477&quot; title=&quot;Kim, H. et al. Response to Comment on “Water harvesting from air with metal-organic frameworks powered by natural sunlight”. Science 358, eaao3139 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2838&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2835&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2801&quot;&gt;&lt;span data-dcnode-id=&quot;2833&quot; instrument_node=&quot;&quot;&gt;AWGs that take advantage of solar-thermal processes are a promising alternative to capture and deliver water in arid regions. In this approach, a sorbent is first saturated with water from air and subsequently heated to release and condense the water&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2821&quot;&gt;&lt;a data-dcnode-id=&quot;2831&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d103434884e484&quot; title=&quot;Kim, H. et al. Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356, 430–434 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2832&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2830&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a data-dcnode-id=&quot;2828&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR5&quot; id=&quot;ref-link-section-d103434884e484_1&quot; title=&quot;Ji, J., Wang, R. &amp;amp; Li, L. New composite adsorbent for solar-driven fresh water production from the atmosphere. Desalination 212, 176–182 (2007).&quot;&gt;&lt;span data-dcnode-id=&quot;2829&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2827&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 6&quot; data-dcnode-id=&quot;2825&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR6&quot; id=&quot;ref-link-section-d103434884e487&quot; title=&quot;Wang, J., Liu, J., Wang, R. &amp;amp; Wang, L. Experimental investigation on two solar-driven sorption based devices to extract fresh water from atmosphere. Appl. Therm. Eng. 127, 1608–1616 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2826&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2824&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 8&quot; data-dcnode-id=&quot;2822&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR8&quot; id=&quot;ref-link-section-d103434884e490&quot; title=&quot;Gad, H., Hamed, A. &amp;amp; El-Sharkawy, I. Application of a solar desiccant/collector system for water recovery from atmospheric air. Renew. Energy 22, 541–556 (2001).&quot;&gt;&lt;span data-dcnode-id=&quot;2823&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2820&quot; instrument_node=&quot;&quot;&gt;. By selecting the desired sorbent characteristics (e.g., shape and step position of the isotherm, saturation capacity, and binding energy), solar-thermal-driven water harvesting is viable and efficient even in low RH conditions. Recently, we demonstrated that metal−organic frameworks (MOFs) are particularly attractive because they can capture more water and require lower regeneration temperatures&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2817&quot;&gt;&lt;a aria-label=&quot;Reference 4&quot; data-dcnode-id=&quot;2818&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR4&quot; id=&quot;ref-link-section-d103434884e494&quot; title=&quot;Kim, H. et al. Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356, 430–434 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2819&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2816&quot; instrument_node=&quot;&quot;&gt; for its release compared to conventional sorbents (e.g., zeolites/silica gels or liquid brines). In addition, their step-like isotherms suggest that a small change in temperature and/or RH can lead to a large change in uptake and water release. Our previous proof-of-concept device showed that with MOF-801&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2813&quot;&gt;&lt;a aria-label=&quot;Reference 4&quot; data-dcnode-id=&quot;2814&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR4&quot; id=&quot;ref-link-section-d103434884e498&quot; title=&quot;Kim, H. et al. Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356, 430–434 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2815&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2812&quot; instrument_node=&quot;&quot;&gt;, water harvesting is possible (Cambridge, MA, USA, with ~65% RH), with a temperature differential of ~45 K between the MOF layer and condenser. While this demonstration as well as several prior studies&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2803&quot;&gt;&lt;a aria-label=&quot;Reference 5&quot; data-dcnode-id=&quot;2810&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR5&quot; id=&quot;ref-link-section-d103434884e502&quot; title=&quot;Ji, J., Wang, R. &amp;amp; Li, L. New composite adsorbent for solar-driven fresh water production from the atmosphere. Desalination 212, 176–182 (2007).&quot;&gt;&lt;span data-dcnode-id=&quot;2811&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2809&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 6&quot; data-dcnode-id=&quot;2807&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR6&quot; id=&quot;ref-link-section-d103434884e505&quot; title=&quot;Wang, J., Liu, J., Wang, R. &amp;amp; Wang, L. Experimental investigation on two solar-driven sorption based devices to extract fresh water from atmosphere. Appl. Therm. Eng. 127, 1608–1616 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2808&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2806&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 8&quot; data-dcnode-id=&quot;2804&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR8&quot; id=&quot;ref-link-section-d103434884e508&quot; title=&quot;Gad, H., Hamed, A. &amp;amp; El-Sharkawy, I. Application of a solar desiccant/collector system for water recovery from atmospheric air. Renew. Energy 22, 541–556 (2001).&quot;&gt;&lt;span data-dcnode-id=&quot;2805&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2802&quot; instrument_node=&quot;&quot;&gt; have shown that the approach is viable, demonstration under representative conditions of desert/arid climates has not been achieved. Here, we experimentally demonstrate an air-cooled MOF-801-based water harvesting device operating in the arid climate of southwestern United States (Tempe, AZ, USA) with a day-time RH as low as 10% and under sub-zero dew points. In addition, we analysed the water from the adsorption−desorption/condensation process with MOF-801 and confirmed that the MOF compound is stable to water and the metal ions and organic linkers do not contaminate the produced water.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2795&quot;&gt;&lt;span data-dcnode-id=&quot;2800&quot; instrument_node=&quot;&quot;&gt;Cyclic water harvesting (i.e., multiple adsorption−desorption cycles a day) is challenging in extremely arid regions due to the low day-time humidity (~10% RH) that prevents water adsorption, i.e., the RH is lower than the adsorption step of MOF-801. Consequently, to achieve maximum water production for a single cycle, in this work, we implemented significant design improvements over our prior proof-of-concept&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2797&quot;&gt;&lt;a aria-label=&quot;Reference 4&quot; data-dcnode-id=&quot;2798&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR4&quot; id=&quot;ref-link-section-d103434884e515&quot; title=&quot;Kim, H. et al. Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356, 430–434 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2799&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2796&quot; instrument_node=&quot;&quot;&gt;. First, we optimised and engineered the device to completely saturate during the night-time humidity swing (20–40% RH). Second, with an optical concentration of less than 2× and buoyancy-assisted vapour transport during condensation, the overall thermal efficiency (i.e., product of latent heat of water and mass of harvested water per unit input solar energy) was estimated to be ~14%. This corresponds to an increase of ~5× in comparison to operation without optical concentration and enabled complete regeneration with MOF-801.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2793&quot;&gt;&lt;span data-dcnode-id=&quot;2794&quot; instrument_node=&quot;&quot;&gt;Operation in such arid regions also opens an interesting avenue for increasing water harvesting output with passive radiative cooling by leveraging the typically clear sky. The clear night sky and low vapour content in the atmosphere enables dissipation of long-wavelength (infrared) thermal radiation from the device to the cold sky to cool it below its ambient temperature. By facing the device to the sky during adsorption, a ~3 K temperature drop was achieved, which corresponds to an increase in 5–7% RH experienced by the adsorbent. This passive cooling can lead to opportunities to utilise other adsorbents that have their adsorption steps located beyond the typical levels of RH in specific regions.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2473&quot; data-title=&quot;Results&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2474&quot; id=&quot;Sec2-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2788&quot; id=&quot;Sec2&quot;&gt;&lt;span data-dcnode-id=&quot;2789&quot; instrument_node=&quot;&quot;&gt;Results&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2475&quot; id=&quot;Sec2-content&quot;&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2786&quot; id=&quot;Sec3&quot;&gt;&lt;span data-dcnode-id=&quot;2787&quot; instrument_node=&quot;&quot;&gt;Device design and operation&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2767&quot;&gt;&lt;span data-dcnode-id=&quot;2785&quot; instrument_node=&quot;&quot;&gt;Our operational principle involves a single daily cycle where adsorption occurs during night-time at a higher humidity (20–40% RH) and solar-assisted desorption/water production occurs during day-time at a lower humidity (10–20% RH), schematically described in Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2783&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;2784&quot; instrument_node=&quot;&quot;&gt;1a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2782&quot; instrument_node=&quot;&quot;&gt;. The device consists of two key components, an adsorbent layer (MOF) and an air-cooled condenser in an enclosure. The back side of the MOF layer is coated black and serves as a solar absorber. During night-time adsorption, the enclosure side walls are opened and the MOF layer is saturated with vapour from the natural flow of ambient air and passively cooled with radiation to the sky. During day-time water production, the enclosure is closed and the solar absorber side is covered with an optically transparent thermal insulator (OTTI aerogel)&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2776&quot;&gt;&lt;a aria-label=&quot;Reference 9&quot; data-dcnode-id=&quot;2780&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR9&quot; id=&quot;ref-link-section-d103434884e537&quot; title=&quot;Zhao, L., Yang, S., Bhatia, B., Strobach, E. &amp;amp; Wang, E. N. Modeling silica aerogel optical performance by determining its radiative properties. AIP Adv. 6, 025123 (2016).&quot;&gt;&lt;span data-dcnode-id=&quot;2781&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2779&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 10&quot; data-dcnode-id=&quot;2777&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR10&quot; id=&quot;ref-link-section-d103434884e540&quot; title=&quot;Strobach, E., Bhatia, B., Yang, S., Zhao, L. &amp;amp; Wang, E. N. High temperature annealing for structural optimization of silica aerogels in solar thermal applications. J. Non-Cryst. Solids 462, 72–77 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2778&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2775&quot; instrument_node=&quot;&quot;&gt;. The MOF layer is heated by exposure to solar irradiance, causing water release (desorption). The desorbed water vapour diffuses from the MOF layer to the condenser due to a concentration gradient. Accumulation of vapour in the enclosure leads to saturation conditions and consequently, the condensation process occurs at ambient temperature. The heat of condensation is dissipated to the ambient by a heat sink. The adsorbents need to be selected based on the typically available ambient RH for water adsorption. MOF-801 was chosen in our study because it exhibits an adsorption step located around 20% RH and is well-suited for the specific climate tested (Tempe, AZ, USA). Furthermore, MOF-801 is hydrothermally stable and well-characterised for water adsorption including having high stability to cycling water in and out of the pores&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2769&quot;&gt;&lt;a aria-label=&quot;Reference 4&quot; data-dcnode-id=&quot;2773&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR4&quot; id=&quot;ref-link-section-d103434884e544&quot; title=&quot;Kim, H. et al. Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356, 430–434 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2774&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2772&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 11&quot; data-dcnode-id=&quot;2770&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR11&quot; id=&quot;ref-link-section-d103434884e547&quot; title=&quot;Furukawa, H. et al. Water adsorption in porous metal–organic frameworks and related materials. J. Am. Chem. Soc. 136, 4369–4381 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;2771&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2768&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2725&quot; data-test=&quot;figure&quot; data-title=&quot;Fig. 1&quot; id=&quot;figure-1&quot;&gt;&lt;figure data-dcnode-id=&quot;2726&quot;&gt;&lt;figcaption data-dcnode-id=&quot;2764&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;2765&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;2766&quot; instrument_node=&quot;&quot;&gt;Fig. 1&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;2737&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;2759&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;2760&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7/figures/1&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;2761&quot;&gt;&lt;source data-dcnode-id=&quot;2763&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-018-03162-7/MediaObjects/41467_2018_3162_Fig1_HTML.jpg?as=webp&quot; type=&quot;image/webp&quot;&gt;&lt;img alt=&quot;figure 1&quot; aria-describedby=&quot;Fig1&quot; data-dcnode-id=&quot;2762&quot; height=&quot;316&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-018-03162-7/MediaObjects/41467_2018_3162_Fig1_HTML.jpg&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;2738&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-1-desc&quot;&gt;&lt;p data-dcnode-id=&quot;2739&quot;&gt;&lt;span data-dcnode-id=&quot;2758&quot; instrument_node=&quot;&quot;&gt;Working principle of the&amp;nbsp;MOF-801-based water harvesting device and adsorption isotherms. &lt;/span&gt;&lt;b data-dcnode-id=&quot;2756&quot;&gt;&lt;span data-dcnode-id=&quot;2757&quot; instrument_node=&quot;&quot;&gt;a&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2755&quot; instrument_node=&quot;&quot;&gt; Illustrative schematic of the water harvesting device undergoing adsorption (night-time, left half) and solar-assisted water production (day-time, right half) processes. During adsorption, air is circulated around the MOF layer and water from air is adsorbed. Passive radiative cooling lowers the MOF layer temperature below the&amp;nbsp;ambient by dissipating thermal radiation to&amp;nbsp;the clear cold sky to increase the effective RH for adsorption. During water production, the OTTI aerogel is stacked on top of the MOF layer to suppress convective heat loss from the solar absorber. The desorbed vapour is condensed on a condenser and&amp;nbsp;the heat of condensation is rejected to the ambient by a heat pipe heat sink. &lt;/span&gt;&lt;b data-dcnode-id=&quot;2753&quot;&gt;&lt;span data-dcnode-id=&quot;2754&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2752&quot; instrument_node=&quot;&quot;&gt; Water adsorption isotherms of MOF-801 in kg kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2750&quot;&gt;&lt;span data-dcnode-id=&quot;2751&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2749&quot; instrument_node=&quot;&quot;&gt; (kg of water per kg of MOF-801) as a function of relative humidity (P P&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2747&quot;&gt;&lt;span data-dcnode-id=&quot;2748&quot; instrument_node=&quot;&quot;&gt;sat&lt;/span&gt;&lt;/sub&gt;&lt;sup data-dcnode-id=&quot;2745&quot;&gt;&lt;span data-dcnode-id=&quot;2746&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2744&quot; instrument_node=&quot;&quot;&gt;, vapour pressure over saturation pressure) at temperatures of 15, 25, 45, 65 and 85 °C measured using a sorption analyser (Q5000 SA, TA Instruments). *The isotherm at 105 °C was predicted using the characteristic curve based on the isotherm at 85 °C&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2741&quot;&gt;&lt;a aria-label=&quot;Reference 24&quot; data-dcnode-id=&quot;2742&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR24&quot; id=&quot;ref-link-section-d103434884e572&quot; title=&quot;de Lange, M. F., Verouden, K. J., Vlugt, T. J., Gascon, J. &amp;amp; Kapteijn, F. Adsorption-driven heat pumps: the potential of metal–organic frameworks. Chem. Rev. 115, 12205–12250 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;2743&quot; instrument_node=&quot;&quot;&gt;24&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2740&quot; instrument_node=&quot;&quot;&gt;. The dotted red circles indicate representative conditions achieved during night-time adsorption and day-time water production in Arizona, USA&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2727&quot;&gt;&lt;a aria-label=&quot;Full size image figure 1&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2728&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure1 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7/figures/1&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2735&quot;&gt;&lt;span data-dcnode-id=&quot;2736&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2729&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2730&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2731&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;2733&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;2732&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;2704&quot;&gt;&lt;span data-dcnode-id=&quot;2724&quot; instrument_node=&quot;&quot;&gt;The amount of water that can be harvested in a single cycle using MOF-801 can be evaluated based on the adsorption isotherm shown in Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2722&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;2723&quot; instrument_node=&quot;&quot;&gt;1b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2721&quot; instrument_node=&quot;&quot;&gt;. For representative conditions in our test location, with a night-time ambient temperature of 15–25 °C and RH of ~30% during adsorption, the equilibrium uptake is estimated to be ~0.25 kg kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2719&quot;&gt;&lt;span data-dcnode-id=&quot;2720&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2718&quot; instrument_node=&quot;&quot;&gt; (kg of water per kg of MOF-801). To achieve complete desorption (at ~10% RH, see Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2716&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;2717&quot; instrument_node=&quot;&quot;&gt;1b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2715&quot; instrument_node=&quot;&quot;&gt;), with a day-time ambient (condenser) temperature of 30 °C (saturation vapour pressure, &lt;/span&gt;&lt;i data-dcnode-id=&quot;2713&quot;&gt;&lt;span data-dcnode-id=&quot;2714&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2711&quot;&gt;&lt;span data-dcnode-id=&quot;2712&quot; instrument_node=&quot;&quot;&gt;sat&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2710&quot; instrument_node=&quot;&quot;&gt; = 4.2 kPa), the adsorbent must be heated to a minimum of 77 °C (&lt;/span&gt;&lt;i data-dcnode-id=&quot;2708&quot;&gt;&lt;span data-dcnode-id=&quot;2709&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2706&quot;&gt;&lt;span data-dcnode-id=&quot;2707&quot; instrument_node=&quot;&quot;&gt;sat&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2705&quot; instrument_node=&quot;&quot;&gt; = 42 kPa). This corresponds to a target temperature difference of ~45 K between the adsorber and the condenser.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2666&quot;&gt;&lt;span data-dcnode-id=&quot;2703&quot; instrument_node=&quot;&quot;&gt;To attain these operating conditions, based on the computational simulation (Supplementary Note&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2701&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2702&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2700&quot; instrument_node=&quot;&quot;&gt;), the prototype design described in our prior study was further optimised and engineered (Supplementary Note&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2698&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2699&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2697&quot; instrument_node=&quot;&quot;&gt;). A MOF layer (base of 5 cm by 5 cm with ~3 g of MOF-801) was fabricated using a porous copper foam. The solar absorber side of the MOF layer was coated with pyromark paint with a solar absorptance of ~0.95. The MOF layer density and thickness were optimised for operation in arid climates based on the transport properties of MOF-801. A packing porosity of 0.67 (or packing density of 464 kg m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2695&quot;&gt;&lt;span data-dcnode-id=&quot;2696&quot; instrument_node=&quot;&quot;&gt;−3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2694&quot; instrument_node=&quot;&quot;&gt;) and thickness of 2.57 mm were chosen for the MOF layer (see Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2692&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2693&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2691&quot; instrument_node=&quot;&quot;&gt;). These optimised parameters enable saturation within the limited time window, i.e., during the humidity swing (increase) in the night-time (roughly under 8 h in a 20−40% RH environment) and to maximise water harvesting capacity. Due to the fixed side walls of the small-scale device (unlike Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2689&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;2690&quot; instrument_node=&quot;&quot;&gt;1a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2688&quot; instrument_node=&quot;&quot;&gt;), which prevented access to air flow (vapour source), the MOF layer was secured in a separate enclosure that allowed adequate access to air (Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2686&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2687&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2685&quot; instrument_node=&quot;&quot;&gt;). The condenser of the device was fabricated with a copper plate (4 cm by 4 cm and 0.6 cm thick) attached to a commercial air-cooled heat sink (NH-L9x65, Noctua) to efficiently dissipate the heat from condensation to the ambient. The condenser was air-cooled throughout the entire experiment. To suppress convective heat loss from the solar absorber side of the MOF layer during solar-assisted desorption, an OTTI aerogel with a thermal conductivity of less than 0.03 W m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2683&quot;&gt;&lt;span data-dcnode-id=&quot;2684&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2682&quot; instrument_node=&quot;&quot;&gt; K&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2680&quot;&gt;&lt;span data-dcnode-id=&quot;2681&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2679&quot; instrument_node=&quot;&quot;&gt; and solar transmittance of ~0.94 (see Methods) was stacked on the MOF layer as shown in Figs.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2677&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;2678&quot; instrument_node=&quot;&quot;&gt;1a,&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2676&quot; instrument_node=&quot;&quot;&gt; &amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2674&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;2675&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2673&quot; instrument_node=&quot;&quot;&gt;. The use of OTTI aerogel is well-suited for arid climates due to the inherently low RH and no degradation during testing was observed. In order to prevent vapour leak during desorption, a transparent plastic wrap (solar transmittance of ~0.93) was used to seal the device, leading to an overall solar transmittance and absorptance loss of ~17% (83% sun to thermal conversion efficiency) with an effective heat loss coefficient of 9−10 W m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2671&quot;&gt;&lt;span data-dcnode-id=&quot;2672&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2670&quot; instrument_node=&quot;&quot;&gt; K&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2668&quot;&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2667&quot; instrument_node=&quot;&quot;&gt;. To help overcome these solar-thermal losses and improve water harvesting thermal efficiencies, experiments were also performed with a biconvex lens (9 cm diameter) that was used to achieve an optical concentration of 1.8× during desorption. The spacing between the MOF layer and condenser (~1.8 cm) was also reduced in comparison to our prior study to enable faster vapour diffusion during condensation while maintaining minimal heat loss from the MOF layer to the condenser. One of the lateral walls of the device was made transparent to serve as a view port for visualisation.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2633&quot; data-test=&quot;figure&quot; data-title=&quot;Fig. 2&quot; id=&quot;figure-2&quot;&gt;&lt;figure data-dcnode-id=&quot;2634&quot;&gt;&lt;figcaption data-dcnode-id=&quot;2663&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;2664&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;2665&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;2645&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;2658&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;2659&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7/figures/2&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;2660&quot;&gt;&lt;source data-dcnode-id=&quot;2662&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-018-03162-7/MediaObjects/41467_2018_3162_Fig2_HTML.jpg?as=webp&quot; type=&quot;image/webp&quot;&gt;&lt;img alt=&quot;figure 2&quot; aria-describedby=&quot;Fig2&quot; data-dcnode-id=&quot;2661&quot; height=&quot;290&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-018-03162-7/MediaObjects/41467_2018_3162_Fig2_HTML.jpg&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;2646&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-2-desc&quot;&gt;&lt;p data-dcnode-id=&quot;2647&quot;&gt;&lt;span data-dcnode-id=&quot;2657&quot; instrument_node=&quot;&quot;&gt;Water harvesting device test apparatus. &lt;/span&gt;&lt;b data-dcnode-id=&quot;2655&quot;&gt;&lt;span data-dcnode-id=&quot;2656&quot; instrument_node=&quot;&quot;&gt;a&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2654&quot; instrument_node=&quot;&quot;&gt; Photo of the device test apparatus during the solar-assisted water production with 1.8× optical concentration. Test location: Tempe, AZ, USA. &lt;/span&gt;&lt;b data-dcnode-id=&quot;2652&quot;&gt;&lt;span data-dcnode-id=&quot;2653&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2651&quot; instrument_node=&quot;&quot;&gt; Photo of the water harvesting device showing the MOF layer (5 cm by 5 cm base, porosity of 0.67 or packing density of 464 kg m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2649&quot;&gt;&lt;span data-dcnode-id=&quot;2650&quot; instrument_node=&quot;&quot;&gt;−3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2648&quot; instrument_node=&quot;&quot;&gt; with 2.57 mm thickness), condenser (4 cm by 4 cm), and thermocouples through the view port. The&amp;nbsp;OTTI aerogel, heat pipe heat sink and insulation are also shown&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2635&quot;&gt;&lt;a aria-label=&quot;Full size image figure 2&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2636&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure2 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7/figures/2&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2643&quot;&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2637&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2638&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2639&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2642&quot; instrument_node=&quot;&quot;&gt;
