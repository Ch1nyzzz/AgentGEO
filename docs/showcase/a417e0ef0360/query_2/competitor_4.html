&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2631&quot; id=&quot;Sec4&quot;&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;Water harvesting experiments&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2622&quot;&gt;&lt;span data-dcnode-id=&quot;2630&quot; instrument_node=&quot;&quot;&gt;Five water harvesting cycles were performed between May 11 and May 18, 2017 (Tempe, AZ, USA) with the same MOF layer. Prior to the first cycle, the MOF layer was heated and dehydrated under direct solar radiation to ~50 °C and in an ambient of 35 °C and RH less than 20% for ~1.5 h. The experimental procedures and measurement/instrumentation details are presented in Methods. We initiated the water harvesting cycle around 20:00 hours local time. The absorber (black) side was positioned to face the clear sky to enable passive radiative cooling, reducing the MOF layer temperature below its ambient. Temperature drops of ~3 K were consistently observed throughout the adsorption phase of the five consecutive water harvesting cycles. This reduction in temperature corresponds to a 5−7% increase in effective RH experienced by the MOF layer. While the ambient vapour pressure was constant in this case, the saturation pressure is now defined by the temperature of the cooler adsorbent layer. After the overnight adsorption process, the MOF layer was installed back into the device between 06:00 and 07:00 hours local time, before the ambient RH started to decrease. The solar-assisted desorption phase of the water harvesting cycle started typically between 10:00 and 11:00 hours local time. For water harvesting cycles with non-concentrated solar irradiance, the global horizontal irradiance (GHI) was measured directly using a pyranometer. Water harvesting cycles with 1.8× optical concentration and direct normal irradiance (DNI) was achieved by facing the sun, where the measured global normal irradiance (GNI) was used to evaluate DNI for a clear day in Arizona, USA (see Methods). In addition, the tilting of the device at the elevation angle of solar irradiance enhanced mass transfer due to buoyancy-assisted transport and condensation of the hot desorbed vapour (see Supplementary Note&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2628&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2629&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2627&quot; instrument_node=&quot;&quot;&gt;). Due to the limited quantity of MOF-801 used in the device (~3 g), accurate measurement of the quantity of harvested water was not possible, albeit we expected ~0.75 g of water production. Therefore, we used validated computational predictions&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2624&quot;&gt;&lt;a aria-label=&quot;Reference 4&quot; data-dcnode-id=&quot;2625&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR4&quot; id=&quot;ref-link-section-d103434884e677&quot; title=&quot;Kim, H. et al. Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356, 430–434 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2626&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt; based on the measured conditions during the water harvesting cycles (ambient and condenser temperatures, RH, and solar flux) to evaluate the&amp;nbsp;deliverable water capacity.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2611&quot;&gt;&lt;span data-dcnode-id=&quot;2621&quot; instrument_node=&quot;&quot;&gt;Representative water harvesting cycles without optical concentration (May 14–15, 2017; see Supplementary movie&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2619&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM3&quot;&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2618&quot; instrument_node=&quot;&quot;&gt;) and with concentration (May 17–18, 2017) with the associated temperature profiles (MOF layer, environmental, dew point and condenser), solar flux and RH measurements are shown in Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2616&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2617&quot; instrument_node=&quot;&quot;&gt;3a, b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2615&quot; instrument_node=&quot;&quot;&gt;, respectively. In both figures, the upper abscissa indicates the measured RH at the local time of day (lower abscissa). The radiative cooling during the adsorption phase (between ~20:00 and 06:00 hours) is also shown. During the desorption phase (starting between ~10:00 and 11:00 hours the next day), the MOF layer temperature increased when exposed to incoming solar irradiation. Images taken during this phase are shown in Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2613&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2614&quot; instrument_node=&quot;&quot;&gt;3c, d&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2612&quot; instrument_node=&quot;&quot;&gt;. The desorption started immediately following exposure to the solar irradiation and water condensation was observed on both the view port (fogging) and the condenser. The amount of fogging reduced over time as the enclosure walls and the air−vapour mixture inside the device heated up.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2575&quot; data-test=&quot;figure&quot; data-title=&quot;Fig. 3&quot; id=&quot;figure-3&quot;&gt;&lt;figure data-dcnode-id=&quot;2576&quot;&gt;&lt;figcaption data-dcnode-id=&quot;2608&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;2609&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;Fig. 3&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;2587&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;2603&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;2604&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7/figures/3&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;2605&quot;&gt;&lt;source data-dcnode-id=&quot;2607&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-018-03162-7/MediaObjects/41467_2018_3162_Fig3_HTML.jpg?as=webp&quot; type=&quot;image/webp&quot;&gt;&lt;img alt=&quot;figure 3&quot; aria-describedby=&quot;Fig3&quot; data-dcnode-id=&quot;2606&quot; height=&quot;755&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-018-03162-7/MediaObjects/41467_2018_3162_Fig3_HTML.jpg&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;2588&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-3-desc&quot;&gt;&lt;p data-dcnode-id=&quot;2589&quot;&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt;Water harvesting test results. &lt;/span&gt;&lt;b data-dcnode-id=&quot;2600&quot;&gt;&lt;span data-dcnode-id=&quot;2601&quot; instrument_node=&quot;&quot;&gt;a&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;2597&quot;&gt;&lt;span data-dcnode-id=&quot;2598&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2596&quot; instrument_node=&quot;&quot;&gt; Representative temperature profiles (environmental, MOF layer, dew point and condenser) and solar flux (global horizontal irradiance (GHI) or direct normal irradiance (DNI)) as a function of local time for representative non-concentrated (Cycle 2, May 14−15, 2017) and concentrated with 1.8× (Cycle 5, May 17−18, 2017) cycles, respectively. &lt;/span&gt;&lt;b data-dcnode-id=&quot;2594&quot;&gt;&lt;span data-dcnode-id=&quot;2595&quot; instrument_node=&quot;&quot;&gt;c&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2593&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;2591&quot;&gt;&lt;span data-dcnode-id=&quot;2592&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2590&quot; instrument_node=&quot;&quot;&gt; Representative photos illustrating droplet condensation on the copper plate condenser (4 cm by 4 cm) during the water harvesting process as a function of local time for representative non-concentrated (cycle 2) and concentrated (cycle 5) cycles, respectively. Shortly after the solar exposure, the view port fogged up due to condensation of desorbed vapour for both cycles. Thermocouples (TCs) measuring the condenser, air gap and the MOF layer temperatures are also shown. Due to the higher solar flux with the concentration, the rate of temperature increase of the MOF layer was significantly faster than the non-concentrated cycle, reducing the time required for desorption. The temperature slope change at ~11:45 hours local time indicates near completion of desorption. The predicted amount of harvested water for the non-concentrated (cycle 2) and concentrated (cycle 5) cycles were ~0.12 L and ~0.28 L per kg of MOF, respectively. Scale bars are 1 cm&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2577&quot;&gt;&lt;a aria-label=&quot;Full size image figure 3&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2578&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure3 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7/figures/3&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2585&quot;&gt;&lt;span data-dcnode-id=&quot;2586&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2579&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2580&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2581&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;2583&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;2582&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;2561&quot;&gt;&lt;span data-dcnode-id=&quot;2574&quot; instrument_node=&quot;&quot;&gt;For the cycles carried out with optical concentration, the higher desorption temperatures (or desorption driving potential) can be inferred from Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2572&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2573&quot; instrument_node=&quot;&quot;&gt;3b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2571&quot; instrument_node=&quot;&quot;&gt;. In addition, the rate of regeneration was significantly faster than the predictions (see Supplementary Note&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2569&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2570&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2568&quot; instrument_node=&quot;&quot;&gt; and Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2566&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2567&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2565&quot; instrument_node=&quot;&quot;&gt;) due to buoyancy-assisted vapour transport during condensation (as the stage was tilted and faced the sun at the elevation and azimuth angles). The higher desorption temperatures associated with the concentrated case enabled complete desorption and this can be qualitatively deduced from the change in slope of the adsorber temperature in Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2563&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2564&quot; instrument_node=&quot;&quot;&gt;3b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2562&quot; instrument_node=&quot;&quot;&gt; (~11:45 hours local time). After complete desorption, most of the incident solar energy was available for sensible temperature rise leading to the slope change.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2559&quot; id=&quot;Sec5&quot;&gt;&lt;span data-dcnode-id=&quot;2560&quot; instrument_node=&quot;&quot;&gt;Prediction of harvested water&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2507&quot;&gt;&lt;span data-dcnode-id=&quot;2558&quot; instrument_node=&quot;&quot;&gt;High-fidelity computational simulations based on the characteristics of MOF-801 (Supplementary Figs.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2556&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2557&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2555&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2553&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2554&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2552&quot; instrument_node=&quot;&quot;&gt;) were used to predict the water harvesting capacity of the device. Experimentally measured ambient and condenser temperatures, solar flux and RHs were used for the initial and boundary conditions. For the representative non-concentrated cycle, ~0.12 L of water per kg of MOF-801 was delivered following saturation at 40% RH (equilibrium uptake of ~0.28 kg kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2550&quot;&gt;&lt;span data-dcnode-id=&quot;2551&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2549&quot; instrument_node=&quot;&quot;&gt;). From the equilibrium considerations presented in Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2547&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;2548&quot; instrument_node=&quot;&quot;&gt;1b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2546&quot; instrument_node=&quot;&quot;&gt;, after the desorption phase, the residual uptake at ~13% RH (adsorber at 74 °C and &lt;/span&gt;&lt;i data-dcnode-id=&quot;2544&quot;&gt;&lt;span data-dcnode-id=&quot;2545&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2542&quot;&gt;&lt;span data-dcnode-id=&quot;2543&quot; instrument_node=&quot;&quot;&gt;sat&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2541&quot; instrument_node=&quot;&quot;&gt; of 37 kPa; condenser at 33 °C and &lt;/span&gt;&lt;i data-dcnode-id=&quot;2539&quot;&gt;&lt;span data-dcnode-id=&quot;2540&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2537&quot;&gt;&lt;span data-dcnode-id=&quot;2538&quot; instrument_node=&quot;&quot;&gt;sat&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2536&quot; instrument_node=&quot;&quot;&gt; of 5 kPa) was ~0.09 kg kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2534&quot;&gt;&lt;span data-dcnode-id=&quot;2535&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2533&quot; instrument_node=&quot;&quot;&gt;, leading to a net water production capacity of ~0.19 L kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2531&quot;&gt;&lt;span data-dcnode-id=&quot;2532&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2530&quot; instrument_node=&quot;&quot;&gt; (litres per kg of MOF). However, due to the kinetic limitations, the residual uptake at the end of the desorption was predicted to be only ~0.16 kg kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2528&quot;&gt;&lt;span data-dcnode-id=&quot;2529&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2527&quot; instrument_node=&quot;&quot;&gt;, leading to ~0.12 L kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2525&quot;&gt;&lt;span data-dcnode-id=&quot;2526&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2524&quot; instrument_node=&quot;&quot;&gt; water production capacity. The kinetic limitations are dictated by intra/intercrystalline diffusion within the MOF layer as well as the vapour diffusion between the MOF layer and condenser. Similarly, for a representative cycle with an optical concentration (1.8×), an adsorber temperature of 100 °C (&lt;/span&gt;&lt;i data-dcnode-id=&quot;2522&quot;&gt;&lt;span data-dcnode-id=&quot;2523&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2520&quot;&gt;&lt;span data-dcnode-id=&quot;2521&quot; instrument_node=&quot;&quot;&gt;sat&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2519&quot; instrument_node=&quot;&quot;&gt; of 101 kPa) and a condenser temperature of 33 °C (&lt;/span&gt;&lt;i data-dcnode-id=&quot;2517&quot;&gt;&lt;span data-dcnode-id=&quot;2518&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2515&quot;&gt;&lt;span data-dcnode-id=&quot;2516&quot; instrument_node=&quot;&quot;&gt;sat&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2514&quot; instrument_node=&quot;&quot;&gt; of 5 kPa), the water production capacity was predicted to be ~0.28 L kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2512&quot;&gt;&lt;span data-dcnode-id=&quot;2513&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2511&quot; instrument_node=&quot;&quot;&gt;. This prediction is consistent with the estimate from the simulation (Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2509&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt;). Here, the kinetic limitations were overcome by the higher adsorber temperature as well as the buoyancy-assisted vapour transport during condensation.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2496&quot;&gt;&lt;span data-dcnode-id=&quot;2506&quot; instrument_node=&quot;&quot;&gt;As a result of the optical concentration and tilting of the device, we predicted a thermal efficiency gain of ~5× in comparison to the non-concentrated cycle. Accordingly, with the concentration, the thermal efficiency was ~14% with input solar energy (product of DNI and optical concentration; herein, DNI was ~93% of GNI for the test location) and was ~3% for the non-concentrated cycle with GHI. The present device configuration and ambient conditions can deliver over ~0.34 L m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2504&quot;&gt;&lt;span data-dcnode-id=&quot;2505&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2503&quot; instrument_node=&quot;&quot;&gt; cycle&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2501&quot;&gt;&lt;span data-dcnode-id=&quot;2502&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt; (litres per m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2498&quot;&gt;&lt;span data-dcnode-id=&quot;2499&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2497&quot; instrument_node=&quot;&quot;&gt; of MOF layer base area per cycle) with the 1.8× solar concentration.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2494&quot; id=&quot;Sec6&quot;&gt;&lt;span data-dcnode-id=&quot;2495&quot; instrument_node=&quot;&quot;&gt;Water quality analysis&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2476&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;Though hydrothermal stability of MOF-801 has been extensively studied and well-established&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2490&quot;&gt;&lt;a aria-label=&quot;Reference 4&quot; data-dcnode-id=&quot;2491&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR4&quot; id=&quot;ref-link-section-d103434884e805&quot; title=&quot;Kim, H. et al. Water harvesting from air with metal-organic frameworks powered by natural sunlight. Science 356, 430–434 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2492&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2489&quot; instrument_node=&quot;&quot;&gt;, we quantitatively characterised the quality of the harvested water using a bench-top adsorption cycling system that enables sufficient water collection (see Methods and Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2487&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2488&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2486&quot; instrument_node=&quot;&quot;&gt;). Results from inductively coupled plasma-mass spectroscopy (ICP-MS) analysis indicate that the zirconium&amp;nbsp;(metal&amp;nbsp;ion of MOF-801) concentration in the water was found to be less than 1 ppb (parts per billion) as shown in Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2484&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2483&quot; instrument_node=&quot;&quot;&gt;. In addition, the harvested water was analysed using infrared spectroscopy and evidence of organic linkers (fumarate) was not found, indicating that the compositions from MOF-801 did not contaminate the harvested water (see Supplementary Note&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2481&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt; and Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2478&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2477&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2382&quot; data-title=&quot;Discussion&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2383&quot; id=&quot;Sec7-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2471&quot; id=&quot;Sec7&quot;&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt;Discussion&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2384&quot; id=&quot;Sec7-content&quot;&gt;&lt;p data-dcnode-id=&quot;2455&quot;&gt;&lt;span data-dcnode-id=&quot;2470&quot; instrument_node=&quot;&quot;&gt;The concept of using night-time radiative cooling to increase the effective RH experienced by the adsorber layer was also introduced and discussed in this work. This approach opens possibilities to use MOFs&amp;nbsp;with higher water uptake values and even lower regeneration temperatures, such as MOF-841&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2467&quot;&gt;&lt;a aria-label=&quot;Reference 11&quot; data-dcnode-id=&quot;2468&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR11&quot; id=&quot;ref-link-section-d103434884e830&quot; title=&quot;Furukawa, H. et al. Water adsorption in porous metal–organic frameworks and related materials. J. Am. Chem. Soc. 136, 4369–4381 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;2469&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt; or Co&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2464&quot;&gt;&lt;span data-dcnode-id=&quot;2465&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2463&quot; instrument_node=&quot;&quot;&gt;Cl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2461&quot;&gt;&lt;span data-dcnode-id=&quot;2462&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2460&quot; instrument_node=&quot;&quot;&gt;BTDD&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2457&quot;&gt;&lt;a aria-label=&quot;Reference 12&quot; data-dcnode-id=&quot;2458&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR12&quot; id=&quot;ref-link-section-d103434884e838&quot; title=&quot;Rieth, A. J., Yang, S., Wang, E. N. &amp;amp; Dincă, M. Record atmospheric fresh water capture and heat transfer with a material operating at the water uptake reversibility limit. ACS Cent. Sci. 3, 668–672 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2459&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2456&quot; instrument_node=&quot;&quot;&gt;, in climates with ~20%&amp;nbsp;RH even though their adsorption step&amp;nbsp;is located at 25–30% RH.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2408&quot;&gt;&lt;span data-dcnode-id=&quot;2454&quot; instrument_node=&quot;&quot;&gt;FAM Z-series (functional adsorbent material zeolite), also referred to&amp;nbsp;as AQSOA series&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2451&quot;&gt;&lt;a aria-label=&quot;Reference 13&quot; data-dcnode-id=&quot;2452&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR13&quot; id=&quot;ref-link-section-d103434884e845&quot; title=&quot;Mitsubishi Plastics. Zeolitic water vapor adsorbent: AQSOA. 
                    http://www.aaasaveenergy.com/products/001/pdf/AQSOA_1210E.pdf
                    
                   (accessed 21 November 2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2453&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2450&quot; instrument_node=&quot;&quot;&gt;, offer step-like isotherms located at 15–25% RH with adsorption capacities of ~0.2 kg kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2448&quot;&gt;&lt;span data-dcnode-id=&quot;2449&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2447&quot; instrument_node=&quot;&quot;&gt; (AQSOA Z01&amp;nbsp;and Z05). The device design and operation presented in this work can be similarly extended with such advanced zeolites. However, the synthetic flexibility and ability to tune adsorption properties are unique to MOFs&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2441&quot;&gt;&lt;a aria-label=&quot;Reference 14&quot; data-dcnode-id=&quot;2445&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR14&quot; id=&quot;ref-link-section-d103434884e851&quot; title=&quot;Furukawa, H., Cordova, K. E., O’Keeffe, M. &amp;amp; Yaghi, O. M. The chemistry and applications of metal-organic frameworks. Science 341, 1230444 (2013).&quot;&gt;&lt;span data-dcnode-id=&quot;2446&quot; instrument_node=&quot;&quot;&gt;14&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2444&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 15&quot; data-dcnode-id=&quot;2442&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR15&quot; id=&quot;ref-link-section-d103434884e854&quot; title=&quot;Canivet, J., Fateeva, A., Guo, Y., Coasne, B. &amp;amp; Farrusseng, D. Water adsorption in MOFs: fundamentals and applications. Chem. Soc. Rev. 43, 5594–5617 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;2443&quot; instrument_node=&quot;&quot;&gt;15&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2440&quot; instrument_node=&quot;&quot;&gt; and, therefore, ideally suited for atmospheric water harvesting systems. While the chosen MOF-801 in this study can deliver ~0.34 L m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2438&quot;&gt;&lt;span data-dcnode-id=&quot;2439&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2437&quot; instrument_node=&quot;&quot;&gt; cycle&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2435&quot;&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2434&quot; instrument_node=&quot;&quot;&gt; (or ~0.28 L kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2432&quot;&gt;&lt;span data-dcnode-id=&quot;2433&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2431&quot; instrument_node=&quot;&quot;&gt; cycle&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2429&quot;&gt;&lt;span data-dcnode-id=&quot;2430&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2428&quot; instrument_node=&quot;&quot;&gt;), further improvements can be realised with the development of new MOFs. For instance, with an identical device design and optimisation, a cobalt-based MOF (Co&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2426&quot;&gt;&lt;span data-dcnode-id=&quot;2427&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2425&quot; instrument_node=&quot;&quot;&gt;Cl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2423&quot;&gt;&lt;span data-dcnode-id=&quot;2424&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2422&quot; instrument_node=&quot;&quot;&gt;BTDD)&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2419&quot;&gt;&lt;a aria-label=&quot;Reference 12&quot; data-dcnode-id=&quot;2420&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR12&quot; id=&quot;ref-link-section-d103434884e871&quot; title=&quot;Rieth, A. J., Yang, S., Wang, E. N. &amp;amp; Dincă, M. Record atmospheric fresh water capture and heat transfer with a material operating at the water uptake reversibility limit. ACS Cent. Sci. 3, 668–672 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2421&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2418&quot; instrument_node=&quot;&quot;&gt; with an adsorption capacity greater than 0.8 kg kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2416&quot;&gt;&lt;span data-dcnode-id=&quot;2417&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2415&quot; instrument_node=&quot;&quot;&gt; at ~30% RH can lead to ~1 L m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2413&quot;&gt;&lt;span data-dcnode-id=&quot;2414&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;  cycle&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2410&quot;&gt;&lt;span data-dcnode-id=&quot;2411&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2409&quot; instrument_node=&quot;&quot;&gt; of water output, potentially surpassing&amp;nbsp;the water harvesting output of advanced zeolites. While sorption kinetics of this MOF is relatively slower than MOF-801, we envision that the development of new MOFs with enhanced sorption capacities and kinetics can ultimately lead to a significant increase in water harvesting output.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2385&quot;&gt;&lt;span data-dcnode-id=&quot;2407&quot; instrument_node=&quot;&quot;&gt;Passive operation can be enabled with concentrating thermal energy with larger absorber areas&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2404&quot;&gt;&lt;a aria-label=&quot;Reference 16&quot; data-dcnode-id=&quot;2405&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR16&quot; id=&quot;ref-link-section-d103434884e885&quot; title=&quot;Ni, G. et al. Steam generation under one sun enabled by a floating structure with thermal concentration. Nat. Energy 1, 16126 (2016).&quot;&gt;&lt;span data-dcnode-id=&quot;2406&quot; instrument_node=&quot;&quot;&gt;16&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2403&quot; instrument_node=&quot;&quot;&gt; or with stationary reflectors&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2400&quot;&gt;&lt;a aria-label=&quot;Reference 17&quot; data-dcnode-id=&quot;2401&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR17&quot; id=&quot;ref-link-section-d103434884e889&quot; title=&quot;Kalogirou, S. A. Solar thermal collectors and applications. Progress Energy Combust. Sci. 30, 231–295 (2004).&quot;&gt;&lt;span data-dcnode-id=&quot;2402&quot; instrument_node=&quot;&quot;&gt;17&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2399&quot; instrument_node=&quot;&quot;&gt; that eliminates the need for solar tracking (also see Supplementary Note&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2397&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2398&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;). Furthermore, considerations presented in this work can be extended to a higher output system by integrating multi-layer adsorbent stacks into a compact bed-type architecture&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2387&quot;&gt;&lt;a data-dcnode-id=&quot;2394&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR18&quot; id=&quot;ref-link-section-d103434884e896&quot; title=&quot;Demir, H., Mobedi, M. &amp;amp; Ülkü, S. A review on adsorption heat pump: problems and solutions. Renew. Sustain. Energy Rev. 12, 2381–2403 (2008).&quot;&gt;&lt;span data-dcnode-id=&quot;2395&quot; instrument_node=&quot;&quot;&gt;18&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2393&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a data-dcnode-id=&quot;2391&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d103434884e896_1&quot; title=&quot;Narayanan, S., Li, X., Kim, H.,&amp;nbsp;Umans, A.&amp;nbsp;&amp;amp; Wang, E. N. Recent advances in adsorption-based heating and cooling systems. Annu. Rev. Heat Transf. 19, 1989 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2392&quot; instrument_node=&quot;&quot;&gt;19&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 20&quot; data-dcnode-id=&quot;2388&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR20&quot; id=&quot;ref-link-section-d103434884e899&quot; title=&quot;Narayanan, S. et al. A thermophysical battery for storage-based climate control. Appl. Energy 189, 31–43 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2389&quot; instrument_node=&quot;&quot;&gt;20&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2386&quot; instrument_node=&quot;&quot;&gt;, common to many classes of adsorption systems. The merit of the bed-type architecture is that in addition to solar-thermal, waste heat or low-infrastructure sources of energy such as biomass can be used to drive the desorption process (eliminating the need for a planar adsorber). While such a system configuration can enable higher output, the limitation of this approach is the need for auxiliary components (e.g., pumps) and higher system complexity to efficiently route the thermal energy to the various layers in the bed. The required heat storage capacity and source temperatures would need to be determined based on the required temperature difference between the adsorber and the condenser, which can be inferred from the adsorption isotherm. Our demonstration in an exceptionally arid climate indicates that adsorption-based water harvesting strategy is a promising solution to solve water scarcity in these regions.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2208&quot; data-title=&quot;Methods&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2209&quot; id=&quot;Sec8-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2380&quot; id=&quot;Sec8&quot;&gt;&lt;span data-dcnode-id=&quot;2381&quot; instrument_node=&quot;&quot;&gt;Methods&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2210&quot; id=&quot;Sec8-content&quot;&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2378&quot; id=&quot;Sec9&quot;&gt;&lt;span data-dcnode-id=&quot;2379&quot; instrument_node=&quot;&quot;&gt;Synthesis and characterisation of microcrystalline powder MOF-801&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2370&quot;&gt;&lt;span data-dcnode-id=&quot;2377&quot; instrument_node=&quot;&quot;&gt;In a 500 mL screw-capped jar, 5.8 g (50 mmol) of fumaric acid (Fluka, 99%) and 16 g (50 mmol) of ZrOCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2375&quot;&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2374&quot; instrument_node=&quot;&quot;&gt;·8H&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2372&quot;&gt;&lt;span data-dcnode-id=&quot;2373&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2371&quot; instrument_node=&quot;&quot;&gt;O (Alfa Aesar, 98%) were dissolved in a mixed solvent of DMF and formic acid (200 and 70 mL, respectively). The mixture was then heated in an isothermal oven at 130 °C for 6 h to give as-prepared MOF-801 as white precipitate. The precipitate from three reaction jars was collected by filtration apparatus using a membrane filter (45 µm pore size), washed three times with 100 mL DMF, three times 100 mL methanol, and dried in air. Air-dried MOF sample was transferred to a vacuum chamber. The chamber was first evacuated at room temperature for 5 h until the pressure dropped below 1 kPa. After that, the sample was heated in vacuum at 70 °C for 12 h, and then at 150 °C for another 48 h. This finally gave activated MOF-801 as a white powder (yield: 30 g).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2320&quot;&gt;&lt;span data-dcnode-id=&quot;2369&quot; instrument_node=&quot;&quot;&gt;Low-pressure gas (N&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2367&quot;&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2366&quot; instrument_node=&quot;&quot;&gt; and Ar) adsorption isotherms (Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2364&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2365&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt;) were measured using volumetric gas adsorption analyser (Autosorb-1, Quantachrome). Liquid nitrogen and argon baths were used for the measurements at 77 and 87 K, respectively. The powdered particle density (&lt;/span&gt;&lt;i data-dcnode-id=&quot;2361&quot;&gt;&lt;span data-dcnode-id=&quot;2362&quot; instrument_node=&quot;&quot;&gt;ρ&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2359&quot;&gt;&lt;span data-dcnode-id=&quot;2360&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2358&quot; instrument_node=&quot;&quot;&gt;) of activated MOF-801 was estimated to be 1400 ± 20 kg m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2356&quot;&gt;&lt;span data-dcnode-id=&quot;2357&quot; instrument_node=&quot;&quot;&gt;−3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2355&quot; instrument_node=&quot;&quot;&gt; from the pycnometer (Ultrapyc 1200e, Quantachrome) (skeletal density &lt;/span&gt;&lt;i data-dcnode-id=&quot;2353&quot;&gt;&lt;span data-dcnode-id=&quot;2354&quot; instrument_node=&quot;&quot;&gt;ρ&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2351&quot;&gt;&lt;span data-dcnode-id=&quot;2352&quot; instrument_node=&quot;&quot;&gt;s&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2350&quot; instrument_node=&quot;&quot;&gt; = 2.6991 g cm&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2348&quot;&gt;&lt;span data-dcnode-id=&quot;2349&quot; instrument_node=&quot;&quot;&gt;−3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2347&quot; instrument_node=&quot;&quot;&gt;) and BET pore volume measurements (&lt;/span&gt;&lt;i data-dcnode-id=&quot;2345&quot;&gt;&lt;span data-dcnode-id=&quot;2346&quot; instrument_node=&quot;&quot;&gt;V&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2343&quot;&gt;&lt;span data-dcnode-id=&quot;2344&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2342&quot; instrument_node=&quot;&quot;&gt; = 0.3425 cm&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2340&quot;&gt;&lt;span data-dcnode-id=&quot;2341&quot; instrument_node=&quot;&quot;&gt;−3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2339&quot; instrument_node=&quot;&quot;&gt; g) using the following equation: &lt;/span&gt;&lt;span class=&quot;mathjax-tex&quot; data-dcnode-id=&quot;2337&quot;&gt;&lt;span data-dcnode-id=&quot;2338&quot; instrument_node=&quot;&quot;&gt;\(\rho _{\mathrm{p}} = 1/(V_{\mathrm{p}} + 1/\rho _{\mathrm{s}})\)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2336&quot; instrument_node=&quot;&quot;&gt;. The particle size (see Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2334&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2335&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2333&quot; instrument_node=&quot;&quot;&gt;) and intercrystalline diffusion characteristics of the powder MOF-801 were characterised and details are presented in Supplementary Note&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2331&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2332&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2330&quot; instrument_node=&quot;&quot;&gt; and Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2328&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2329&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2327&quot; instrument_node=&quot;&quot;&gt;. Additionally, the intra-crystalline diffusion characteristics were characterised as detailed in Supplementary Note&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2325&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2326&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2324&quot; instrument_node=&quot;&quot;&gt; and Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2322&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2323&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2321&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading c-article__sub-heading--divider&quot; data-dcnode-id=&quot;2318&quot; id=&quot;Sec10&quot;&gt;&lt;span data-dcnode-id=&quot;2319&quot; instrument_node=&quot;&quot;&gt;Synthesis and optical characterisation of OTTI aerogel&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2284&quot;&gt;&lt;span data-dcnode-id=&quot;2317&quot; instrument_node=&quot;&quot;&gt;The OTTI silica aerogel was synthesised by sol-gel polymerisation of tetramethyl orthosilicate (TMOS, 131903, Sigma Aldrich), using an ammonia solution (NH&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2315&quot;&gt;&lt;span data-dcnode-id=&quot;2316&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2314&quot; instrument_node=&quot;&quot;&gt;, 2.0 M in methanol, 341428, Sigma Aldrich) as a catalyst to promote both hydrolysis and condensation reactions&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2308&quot;&gt;&lt;a aria-label=&quot;Reference 9&quot; data-dcnode-id=&quot;2312&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR9&quot; id=&quot;ref-link-section-d103434884e1053&quot; title=&quot;Zhao, L., Yang, S., Bhatia, B., Strobach, E. &amp;amp; Wang, E. N. Modeling silica aerogel optical performance by determining its radiative properties. AIP Adv. 6, 025123 (2016).&quot;&gt;&lt;span data-dcnode-id=&quot;2313&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2311&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 10&quot; data-dcnode-id=&quot;2309&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR10&quot; id=&quot;ref-link-section-d103434884e1056&quot; title=&quot;Strobach, E., Bhatia, B., Yang, S., Zhao, L. &amp;amp; Wang, E. N. High temperature annealing for structural optimization of silica aerogels in solar thermal applications. J. Non-Cryst. Solids 462, 72–77 (2017).&quot;&gt;&lt;span data-dcnode-id=&quot;2310&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2307&quot; instrument_node=&quot;&quot;&gt;. TMOS was diluted by methanol (MeOH, 322415, Sigma Aldrich) followed by addition of NH&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2305&quot;&gt;&lt;span data-dcnode-id=&quot;2306&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2304&quot; instrument_node=&quot;&quot;&gt; and water. The mixing molar ratio of chemicals was NH&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2302&quot;&gt;&lt;span data-dcnode-id=&quot;2303&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2301&quot; instrument_node=&quot;&quot;&gt;:TMOS:water:methanol = 0.004:1:4:6. Then, the solution was gelled in a disposable polystyrene container. After 2 weeks, the container was dissolved away using acetone. The mother solvent was replaced with ethanol (EtOH, 89234-848, VWR) to be prepared for critical point drying (CPD, model 931, Tousimis) as EtOH is miscible with liquid CO&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2299&quot;&gt;&lt;span data-dcnode-id=&quot;2300&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2298&quot; instrument_node=&quot;&quot;&gt;. To dry the wet gels in EtOH without cracks, it is important to dry them slowly to minimise capillary pressure during the CPD process. A bleed rate of 100 psi h&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2296&quot;&gt;&lt;span data-dcnode-id=&quot;2297&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2295&quot; instrument_node=&quot;&quot;&gt; was used to decrease the CPD chamber pressure from ~1300 psi to ambient pressure. After drying, the monolithic aerogels were annealed at 400 °C for 24 h to maximise their transmittance. The aerogel was cut to the final size using a laser cutter (Epilog Zing). Experimentally measured solar transmittance and predicted thermal conductivity&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2289&quot;&gt;&lt;a aria-label=&quot;Reference 21&quot; data-dcnode-id=&quot;2293&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR21&quot; id=&quot;ref-link-section-d103434884e1069&quot; title=&quot;Heinemann, U., Caps, R. &amp;amp; Fricke, J. Radiation-conduction interaction: an investigation on silica aerogels. Int. J. Heat. Mass Transf. 39, 2115–2130 (1996).&quot;&gt;&lt;span data-dcnode-id=&quot;2294&quot; instrument_node=&quot;&quot;&gt;21&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2292&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 22&quot; data-dcnode-id=&quot;2290&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR22&quot; id=&quot;ref-link-section-d103434884e1072&quot; title=&quot;Hrubesh, L. W. &amp;amp; Pekala, R. W. Thermal properties of organic and inorganic aerogels. J. Mater. Res. 9, 731–738 (1994).&quot;&gt;&lt;span data-dcnode-id=&quot;2291&quot; instrument_node=&quot;&quot;&gt;22&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2288&quot; instrument_node=&quot;&quot;&gt; of the 8-mm-thick OTTI aerogel are shown in Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2286&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2287&quot; instrument_node=&quot;&quot;&gt;3a and b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2285&quot; instrument_node=&quot;&quot;&gt;, respectively.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading c-article__sub-heading--divider&quot; data-dcnode-id=&quot;2282&quot; id=&quot;Sec11&quot;&gt;&lt;span data-dcnode-id=&quot;2283&quot; instrument_node=&quot;&quot;&gt;Device fabrication&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2277&quot;&gt;&lt;span data-dcnode-id=&quot;2281&quot; instrument_node=&quot;&quot;&gt;The adsorber layer was fabricated by first brazing a porous copper foam (~100 pores per inch or ppi), 0.26 cm thick, onto a copper plate (5 × 5 × 0.17 cm). The activated MOF-801 was infiltrated into this foam-plate structure by immersion drying in a ~50 wt. % aqueous dispersion. The copper foam provided structural rigidity and helped&amp;nbsp;enhance the effective thermal conductivity of the layer, given the intrinsically low thermal conductivity of the porous MOF. The layer was then dried under vacuum for 4 h at temperature of 70 °C and the total mass dehydrated MOF-801 was characterised to be 2.98 g. This corresponds to a packing density of 464 kg m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2279&quot;&gt;&lt;span data-dcnode-id=&quot;2280&quot; instrument_node=&quot;&quot;&gt;−3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2278&quot; instrument_node=&quot;&quot;&gt; (dry) and a porosity of 0.67. In order to enhance solar absorption, the back side of the adsorber was coated with Pyromark paint. This coating was optically characterised using a UV-Vis-NIR spectrophotometer (Cary 5000, Agilent) and found to have a solar-weighted absorptivity of 0.95.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2275&quot;&gt;&lt;span data-dcnode-id=&quot;2276&quot; instrument_node=&quot;&quot;&gt;The adsorber layer was then integrated into an enclosure constructed with acrylic sheets (0.318 cm thick). The top face was designed with a cut-out, equal in size to the adsorber layer (5 cm × 5 cm) and pilot holes to suspend the adsorber layer with nylon strings. Any gaps found between the side walls of the adsorber layer and the cut out were sealed with high temperature vacuum grease (Dow Corning). In addition, a layer of transparent polyethylene wrap was stretched over the entire top face and sealed against the side walls. Both these measures prevented leakage of any desorbed vapour. Thermal insulation (white in colour) was attached on all side walls except the view port. The adsorber side was completed by placing a piece of OTTI aerogel measuring 5 × 5 × 1 cm. The bottom face of the enclosure was made with a 4 × 4 cm cut-out to enable integration with a condenser assembly. The condenser assembly comprised a 4 × 4 × 0.6 cm polished copper piece that was bonded with high conductivity thermal epoxy (Omega Therm, Omega Engineering) to a heat pipe heat sink (NH-L9x65, Noctua). The air-cooled heat sink consisted of a finned heat pipe array with a fan that consumed ~0.9 W of electrical power to dissipate the condensation heat. The finished device measured 7 × 7 × 3.2 cm (excluding the heat sink, fan, insulation and aerogel) and was mounted on a stage with adjustable tilt to enable experiments under both GHI (no optical concentration, no tilt) and GNI (with optical concentration of 1.8× and tilt at elevation angles of 55−75° and azimuth angles of 100−180°).&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading c-article__sub-heading--divider&quot; data-dcnode-id=&quot;2273&quot; id=&quot;Sec12&quot;&gt;&lt;span data-dcnode-id=&quot;2274&quot; instrument_node=&quot;&quot;&gt;Experimental procedure&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2268&quot;&gt;&lt;span data-dcnode-id=&quot;2272&quot; instrument_node=&quot;&quot;&gt;The water harvesting experiment comprises two phases: night-time vapour adsorption and day-time water harvesting and condensation. During vapour adsorption, typically started at 20:00 hours local time (UTC/GMT—7 h), the adsorber layer with its acrylic frame was mounted into the&amp;nbsp;cover of an air-tight food storage container with the pyromark coated side up for night-time radiative cooling (Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2270&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2271&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2269&quot; instrument_node=&quot;&quot;&gt;). The sides of the air-tight container were modified to fit a fan (0.9 W; 12 VDC) and enable cross flow of ambient air (vapour source). Two T-type thermocouple (5TC series, Omega Engineering) were used to measure the temperature of the adsorber layer during adsorption. In order to estimate the extent of radiative cooling and ambient temperature, another T-type thermocouple was placed in the air stream of another fan. Relative humidity measurements were made with a capacitive RH sensor (RH820U, Omega Engineering). Transparent polyethylene wrap was used to suppress convective heat loss on the black absorber side of the layer. Prior to the exposure to the clear sky, the&amp;nbsp;container cover was wrapped in aluminium foil so that the MOF layer &amp;nbsp;could&amp;nbsp;equilibrate with the ambient air. &amp;nbsp;Once the foil was removed, the MOF layer was exposed to the sky and an instant temperature drop of ~3 K below ambient was observed, as shown in Fig. 3a, b, due to radiative cooling. Adsorption was allowed to occur overnight and the sample was sealed into the device (between 06:00 and 07:00 hours local time) to prevent undesired loss of water due to the RH swing.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2232&quot;&gt;&lt;span data-dcnode-id=&quot;2267&quot; instrument_node=&quot;&quot;&gt;The procedure for water release and condensation typically started between 10:00 and 11:00 hours local time. In addition to the two T-type thermocouples embedded into the adsorption layer, three additional T-type thermocouples were used to measure temperatures: two for the copper condenser plate and one for the vapour space between the adsorber layer and the condenser plate. Ambient humidity and temperature conditions were recorded as described during the adsorption phase. The heat of condensation was dissipated to the ambient through the heat sink and fan operating at 0.9 W. The incoming solar irradiation (both global horizontal (GHI) and global normal (GNI) irradiations) was measured with a pyranometer (LP02-C, Hukseflux). The measured GNI was used to evaluate the DNI as: DNI = GNI – DI (diffuse irradiance) according to the weather data available from a weather station in Tucson, AZ, USA (available at NREL, SOLRMAP University of Arizona (OASIS)) for clear days in May 2017. The ratio between the GNI and DNI was found to be 0.93 and it matched well to an available correlation&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2264&quot;&gt;&lt;a aria-label=&quot;Reference 23&quot; data-dcnode-id=&quot;2265&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23ref-CR23&quot; id=&quot;ref-link-section-d103434884e1106&quot; title=&quot;Duffie, J. A. &amp;amp; Beckman, W. A. Solar Engineering of Thermal Processes (John Wiley &amp;amp; Sons, Hoboken, New Jersey, 2013).&quot;&gt;&lt;span data-dcnode-id=&quot;2266&quot; instrument_node=&quot;&quot;&gt;23&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2263&quot; instrument_node=&quot;&quot;&gt;. The area ratio between the lens and solar absorber surface was ~2.5; however, the achieved optical concentration of 1.8× was due to transmittance loss of the lens and the square solar absorber area being circumscribed by the circular concentrated solar irradiance (Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2261&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;2262&quot; instrument_node=&quot;&quot;&gt;2a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2260&quot; instrument_node=&quot;&quot;&gt;). The actual optical concentration achieved with the concentrating lens was characterised to be 1.8× for the focal distance during the outdoor experiments with a thermopile detector (919P-040-50, Newport) and a solar simulator (92192, Newport Oriel). Solar transmittance of the transparent polyethylene wrap, ~0.93, was characterised with the pyranometer under direct solar irradiance. Images were acquired with a digital camera (EOS DS126211, Canon) to visualise the condensation process (see Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2258&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2259&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2257&quot; instrument_node=&quot;&quot;&gt; and Supplementary movies&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2255&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM3&quot;&gt;&lt;span data-dcnode-id=&quot;2256&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2254&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2252&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM4&quot;&gt;&lt;span data-dcnode-id=&quot;2253&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2251&quot; instrument_node=&quot;&quot;&gt;). At the end of desorption, the MOF layer and its acrylic frame were extracted from the device to prevent re-adsorption of condensed water and isolated in an air-tight box. The adsorber assembly was only removed in the evening time to restart the adsorption phase for the next cycle. A total of five water harvesting cycles are reported in this study: cycle 1 (Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2249&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2250&quot; instrument_node=&quot;&quot;&gt;8a and b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2248&quot; instrument_node=&quot;&quot;&gt;), cycle 2 (Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2246&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2247&quot; instrument_node=&quot;&quot;&gt;3a, c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2245&quot; instrument_node=&quot;&quot;&gt;), cycle 3 (Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2243&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2244&quot; instrument_node=&quot;&quot;&gt;8c and d&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2242&quot; instrument_node=&quot;&quot;&gt; and Supplementary movie&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2240&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM4&quot;&gt;&lt;span data-dcnode-id=&quot;2241&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2239&quot; instrument_node=&quot;&quot;&gt;), cycle 4 (Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2237&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2238&quot; instrument_node=&quot;&quot;&gt;8e and f&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2236&quot; instrument_node=&quot;&quot;&gt;), and cycle 5 (Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2234&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2235&quot; instrument_node=&quot;&quot;&gt;3b, d&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2233&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading c-article__sub-heading--divider&quot; data-dcnode-id=&quot;2230&quot; id=&quot;Sec13&quot;&gt;&lt;span data-dcnode-id=&quot;2231&quot; instrument_node=&quot;&quot;&gt;Water quality analysis&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2225&quot;&gt;&lt;span data-dcnode-id=&quot;2229&quot; instrument_node=&quot;&quot;&gt;In order to quantitatively characterise the harvested water, a bench-top adsorption cycling system was constructed. A schematic of the water collection apparatus for ICP-MS analysis is shown in Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2227&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2228&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2226&quot; instrument_node=&quot;&quot;&gt;a. The system consists of five main components, namely, adsorption and condenser chambers, a glass flask that serves as a reservoir for HPLC water (OmniSolv HPLC grade water, VWR), two temperature-controlled thermoelectric stages (CP-200HT-TT, TE Tech), and a vacuum pump. The adsorption and condenser chamber were custom-designed copper vacuum chambers (2 × 2 × 1 cm) with a removable lid. The adsorption chamber additionally had a layer of copper foam (2 × 2 × 0.8 cm) brazed to the bottom, which was infiltrated with activated MOF-801 (~1.5 g). These chambers were individually placed in thermal contact with a temperature-controlled thermoelectric stage that allowed for continuous cycling. Thermocouples (5TC series, Omega Engineering) were inserted into pilot holes made in the side walls of the copper chambers. For cycling, a pair of electronically controlled vacuum valves were used to link the adsorbent chamber to either the water reservoir during adsorption or the condenser chamber during desorption.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2217&quot;&gt;&lt;span data-dcnode-id=&quot;2224&quot; instrument_node=&quot;&quot;&gt;The adsorption−desorption cycles were performed under evacuated conditions to enable efficient transport of vapour across distances of ~0.5 m through the hoses and valves as shown in Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2222&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2223&quot; instrument_node=&quot;&quot;&gt;11a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2221&quot; instrument_node=&quot;&quot;&gt;. The water in the glass flask was first degassed to remove non-condensable gases by connecting it to the vacuum pump and freezing the water. The flask was then heated to melt the ice under evacuation and reduce the solubility of non-condensable gasses. This cycle was repeated three times. The adsorption and condenser chambers were heated to 60 °C for 2 h under evacuated conditions to ensure there was no residual water in the system. The cycling experiments started with the adsorption phase, where the water reservoir was exposed to the adsorbent chamber. The dry adsorbent triggered evaporation and&amp;nbsp;the generated vapour was adsorbed. During adsorption, the chamber was held at a constant temperature of 30 °C to extract the adsorption heat as well as prevent any condensation of vapour from the reservoir kept at ~20 °C. After complete adsorption (~40 min), the adsorption chamber was isolated from the water reservoir and exposed to the condenser chamber. The thermoelectric stage of the adsorption chamber was programmed to ramp up to 60 °C at this stage while the condenser stage was always maintained at 0.5 °C. The desorption was allowed to continue for 40 min at the end of which the adsorption chamber was opened to the reservoir and simultaneously cooled to 30 °C for the next cycle. Representative temperature and pressure profiles for a desorption−adsorption cycle are shown in Supplementary Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2219&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/s41467-018-03162-7%23MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;2220&quot; instrument_node=&quot;&quot;&gt;11b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2218&quot; instrument_node=&quot;&quot;&gt;. This cycle was repeated 18 times and about 8 g of condensed water was collected (i.e., ~0.3 L of water per kg of MOF per cycle).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2215&quot;&gt;&lt;span data-dcnode-id=&quot;2216&quot; instrument_node=&quot;&quot;&gt;The HPLC grade water from the reservoir was used as a control sample. The concentration of potentially contaminant elements was analysed using an inductively coupled plasma–mass spectroscopy system (ICP-MS, Agilent 7900, 68403A). Both the harvested water and control sample were analysed for the following elements: iron (from tubes/hoses), copper (from foam, chambers and braze alloy), silver, indium (both from braze alloy) and zirconium (from MOF compound). In addition, FT-IR spectra of control water (HPLC grade) and collected water from MOF-801 were collected in-house using a Bruker ALPHA Platinum ATR-FT-IR Spectrometer equipped with a single reflection diamond ATR module.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading c-article__sub-heading--divider&quot; data-dcnode-id=&quot;2213&quot; id=&quot;Sec14&quot;&gt;&lt;span data-dcnode-id=&quot;2214&quot; instrument_node=&quot;&quot;&gt;Data availability&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2211&quot;&gt;&lt;span data-dcnode-id=&quot;2212&quot; instrument_node=&quot;&quot;&gt;The authors declare that all data supporting the findings of this study are available within the article and its Supplementary Information or from the corresponding author upon reasonable request.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2207&quot; instrument_node=&quot;&quot;&gt;
