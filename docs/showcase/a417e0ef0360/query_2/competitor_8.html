e=&quot;&quot;&gt;〈https://weatherspark.com/averages〉&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;376&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;div class=&quot;ReferenceLinks u-font-sans&quot; data-dcnode-id=&quot;372&quot;&gt;&lt;a class=&quot;link&quot; data-dcnode-id=&quot;373&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//scholar.google.com/scholar%3Fq%3Dhttps%3Aweatherspark.comaverages.&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;374&quot; instrument_node=&quot;&quot;&gt;Google Scholar&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;/section&gt;&lt;/section&gt;&lt;div data-dcnode-id=&quot;240&quot; id=&quot;section-cited-by&quot;&gt;&lt;section class=&quot;ListArticles preview&quot; data-dcnode-id=&quot;241&quot;&gt;&lt;div class=&quot;PageDivider&quot; data-dcnode-id=&quot;367&quot;&gt;&lt;/div&gt;&lt;header data-dcnode-id=&quot;364&quot; id=&quot;citing-articles-header&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-ver u-font-serif&quot; data-dcnode-id=&quot;365&quot;&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;Cited by (38)&lt;/span&gt;&lt;/h2&gt;&lt;/header&gt;&lt;div aria-describedby=&quot;citing-articles-header&quot; data-dcnode-id=&quot;242&quot;&gt;&lt;div class=&quot;citing-articles u-margin-l-bottom&quot; data-dcnode-id=&quot;243&quot;&gt;&lt;ul data-dcnode-id=&quot;249&quot;&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;340&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;358&quot;&gt;&lt;a data-dcnode-id=&quot;361&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0048969722010580&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;362&quot; id=&quot;citing-articles-article0-title&quot;&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;Seasonal atmospheric water harvesting yield and water quality using electric-powered desiccant and compressor dehumidifiers&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;359&quot;&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt;2022, Science of the Total Environment&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;352&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article0&quot; aria-describedby=&quot;citing-articles-article0-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;353&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;356&quot;&gt;&lt;span data-dcnode-id=&quot;357&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;354&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;355&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;341&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;342&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;343&quot;&gt;&lt;p data-dcnode-id=&quot;344&quot; id=&quot;sp0045&quot;&gt;&lt;span data-dcnode-id=&quot;351&quot; instrument_node=&quot;&quot;&gt;Atmospheric water harvesting (AWH) is an emerging technology for decentralized water supply and is proving to be viable for use in emergencies, military deployment, and sustainable industries. The atmosphere is a freshwater reservoir that contains 12,900 km&lt;/span&gt;&lt;sup data-dcnode-id=&quot;349&quot;&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;348&quot; instrument_node=&quot;&quot;&gt; of water, 6-fold more than the volume of global rivers. Dehumidification water harvesting technologies can be powered by solar, wind, or electric sources. Compressor/refrigerant-based dehumidifiers operate via dew point condensation and provide a cold surface upon which water vapor can condense. Conversely, desiccant-based technologies saturate water vapor using a sorbent that is then heated, and the supersaturated water vapor condenses on a surface when interacting with cooler ambient process air. This work compares productivity, energy consumption, efficiency, cost and quality of water produced of two water-harvesting mechanisms. Electric-powered compressor and desiccant dehumidifiers were operated outdoors for more than one year in the arid southwestern USA, where temperatures ranged from 3.1 to 43.7 °C and relative humidity (RH) ranged from 6 to 85%. The compressor system harvested &amp;gt;2-fold more water than the desiccant system when average RH during the run cycle was &amp;gt;30%, average temperature was &amp;gt;20 °C, and average dew point temperature was &amp;gt;5 °C. Desiccant systems performed more favorably when average RH during the run cycle was &amp;lt;30%, average temperature was &amp;lt;20 °C, and average dew point temperature was &amp;lt;5 °C. Water collected by compressor-based technologies had conductivity up to 180 &lt;/span&gt;&lt;em data-dcnode-id=&quot;346&quot;&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;μ&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;S/cm, turbidity up to 190 NTU, and aluminum, iron and manganese near or above the US EPA secondary drinking water standard. Dissolved organic carbon (DOC) averaged &amp;lt;2 mg C/L but ranged up to 12 mg C/L. Water collected by desiccant-based technologies had significantly lower conductivity, metals, and turbidity, and DOC was always &amp;lt;6 mg/L. Aldehydes such as formaldehyde and acetaldehyde and carboxylic acids such as formic acid and acetic acid were primary contributors to DOC. The differences in harvested water quality were attributed to differences in the condensation method between compressor and desiccant AWH technologies. Multiple strategies could be employed to prevent these volatile organic compounds (VOCs) from contributing to DOC in harvested water, such as pretreating air to remove VOCs or post-treating DOC in harvested liquid water.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;322&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;334&quot;&gt;&lt;a data-dcnode-id=&quot;337&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1872580522605766&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;338&quot; id=&quot;citing-articles-article1-title&quot;&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;Hydrophilic carbon monoliths derived from metal-organic frameworks@resorcinol-formaldehyde resin for atmospheric water harvesting&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;335&quot;&gt;&lt;span data-dcnode-id=&quot;336&quot; instrument_node=&quot;&quot;&gt;2022, Xinxing Tan Cailiao/New Carbon Materials&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;328&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article1&quot; aria-describedby=&quot;citing-articles-article1-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;329&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;332&quot;&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;330&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;331&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;323&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;324&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;325&quot;&gt;&lt;p data-dcnode-id=&quot;326&quot; id=&quot;spara10&quot;&gt;&lt;span data-dcnode-id=&quot;327&quot; instrument_node=&quot;&quot;&gt;Atmospheric water harvesting (AWH) is considered a promising technique to address the problem of global water shortage. Adsorption-based AWH technology, has the advantages of a simple device structure, high energy efficiency, wide application range, etc., and has attracted much attention. For the adsorption, one of the key issues is to find high-performance porous adsorbents. Porous carbons have exceptional stability, high porosity and low cost, but are usually highly hydrophobic with a low affinity for polar water molecules. A class of monolithic porous carbons with good hydrophilicity was prepared by the pyrolysis of composites consisting of a metal-organic framework in a resorcinol-formaldehyde resin matrix, in which the metal-organic parts developed polar sites in the final products. AWH tests showed that in a relative humidity of 40%-80%, the water capture capacity of the adsorbents reached 20 wt.%.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;304&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;316&quot;&gt;&lt;a data-dcnode-id=&quot;319&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1004954122000040&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;320&quot; id=&quot;citing-articles-article2-title&quot;&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;Membrane-based air dehumidification: A comparative review on membrane contactors, separative membranes and adsorptive membranes&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;317&quot;&gt;&lt;span data-dcnode-id=&quot;318&quot; instrument_node=&quot;&quot;&gt;2022, Chinese Journal of Chemical Engineering&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;310&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article2&quot; aria-describedby=&quot;citing-articles-article2-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;311&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;314&quot;&gt;&lt;span data-dcnode-id=&quot;315&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;312&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;313&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;305&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;306&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;307&quot;&gt;&lt;p data-dcnode-id=&quot;308&quot; id=&quot;sp0015&quot;&gt;&lt;span data-dcnode-id=&quot;309&quot; instrument_node=&quot;&quot;&gt;This review compares the different types of membrane processes for air dehumidification. Three main categories of membrane-based dehumidification are identified – membrane contactors using porous membranes with concentrated liquid desiccants, separative membranes using dense membrane morphology with a pressure gradient to drive the separation of moisture from air, and adsorptive membranes using nanofibrous membranes which adsorb and capture moisture to realise dehumidification. Drawing upon the importance of dehumidification and humidity control for urban sustainability and energy efficacy, this review critically analyses and recognizes the three unique categories of membrane-based air dehumidification technologies. Essentially, the discussion is broken into three sections-one for each category-discriminating in terms of the driving force, membrane structure and properties, and its performance indicators. Readers will notice that despite having the same objective to dehumidify air, the polymers used amongst each category differs to suit the operating requirements and optimize dehumidification performance. At the end of each section, a performance table or summary of dehumidifying membranes in its class is provided. The final section concludes with a comparative review of the three categories on membrane-based air dehumidification technologies and draw inspiration from parallel research to rationalise the potential and innovative use of promising materials in membrane fabrication for air dehumidification.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;286&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;298&quot;&gt;&lt;a data-dcnode-id=&quot;301&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378778821007301&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;302&quot; id=&quot;citing-articles-article3-title&quot;&gt;&lt;span data-dcnode-id=&quot;303&quot; instrument_node=&quot;&quot;&gt;Development and applications of thermoelectric based dehumidifiers&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;299&quot;&gt;&lt;span data-dcnode-id=&quot;300&quot; instrument_node=&quot;&quot;&gt;2021, Energy and Buildings&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;292&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article3&quot; aria-describedby=&quot;citing-articles-article3-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;293&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;296&quot;&gt;&lt;span data-dcnode-id=&quot;297&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;294&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;295&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;287&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;288&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;289&quot;&gt;&lt;p data-dcnode-id=&quot;290&quot; id=&quot;sp0010&quot;&gt;&lt;span data-dcnode-id=&quot;291&quot; instrument_node=&quot;&quot;&gt;The review describes the development and advancement of thermoelectric based dehumidifier systems. Thermoelectric cooling in thermoelectric dehumidifiers has various advantages over conventional techniques, such as lightweight, compact size, noise-free (no moving part), and eco-friendly operation. The review initially describes the basic principle and different techniques used for dehumidification. Then, thermoelectric dehumidifiers are introduced and their governing parameters are discussed. Further, thermoelectric dehumidifier-based prototypes are reviewed and discussed over their design and performance. The patents and commercialized products developed on thermoelectric dehumidifiers were also briefly discussed and compared. Lastly, this review states the challenges for the more efficient and large-scale operation of thermoelectric-based dehumidifiers and simplifies ways for further improvement. Thus, the study illustrates the current status of thermoelectric dehumidifiers and provides futuristic scopes for their development.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;268&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;280&quot;&gt;&lt;a data-dcnode-id=&quot;283&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352484721005813&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;284&quot; id=&quot;citing-articles-article4-title&quot;&gt;&lt;span data-dcnode-id=&quot;285&quot; instrument_node=&quot;&quot;&gt;Application of renewable energy sources for water extraction from atmospheric air&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;281&quot;&gt;&lt;span data-dcnode-id=&quot;282&quot; instrument_node=&quot;&quot;&gt;2021, Energy Reports&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;274&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article4&quot; aria-describedby=&quot;citing-articles-article4-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;275&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;278&quot;&gt;&lt;span data-dcnode-id=&quot;279&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;276&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;277&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;269&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;270&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;271&quot;&gt;&lt;p data-dcnode-id=&quot;272&quot; id=&quot;d1e1139&quot;&gt;&lt;span data-dcnode-id=&quot;273&quot; instrument_node=&quot;&quot;&gt;In this article, extractor of atmospheric water has been described. Results of statistical study of experimental sample of atmospheric water extractor obtained in the course of field tests have been presented. The trends of physical properties of atmosphere have been analyzed and the relationship between climate parameters and volumes of extracted water has been studied. Results of the analysis of experimental and calculated data of studies of atmospheric water extractor have shown that the difference between calculated and experimental values does not exceed 2% to 4% which proves acceptable accuracy of the selected method of theoretical estimations. While calculating the correlation factor, it was found out that the direct dependence most clearly appears in the dependence of experimental values of extracted water volume on ambient air temperature. Use of nano-materials in the heat exchanger unit makes it possible to perform effective water extraction in conditions of low relative humidity from 5% and temperatures up to 20&amp;nbsp;°C.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;250&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;262&quot;&gt;&lt;a data-dcnode-id=&quot;265&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2214157X21004160&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;266&quot; id=&quot;citing-articles-article5-title&quot;&gt;&lt;span data-dcnode-id=&quot;267&quot; instrument_node=&quot;&quot;&gt;Effect of evaporator numbers on water production of a free convection air-water harvester&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;263&quot;&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt;2021, Case Studies in Thermal Engineering&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;256&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article5&quot; aria-describedby=&quot;citing-articles-article5-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;257&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;260&quot;&gt;&lt;span data-dcnode-id=&quot;261&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;258&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;259&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;251&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;252&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;253&quot;&gt;&lt;p data-dcnode-id=&quot;254&quot; id=&quot;abspara0010&quot;&gt;&lt;span data-dcnode-id=&quot;255&quot; instrument_node=&quot;&quot;&gt;An experimental study was performed to determine the effect of the number of evaporators on the water production and coefficient of performance of an air-water harvester. Water was obtained on the evaporator walls in free convection and condensation heat transfer modes. The evaporator dimension was 480&amp;nbsp;mm&amp;nbsp;×&amp;nbsp;285&amp;nbsp;mm&amp;nbsp;×&amp;nbsp;6.25&amp;nbsp;mm, and it was made of copper pipes. The evaporators were installed in a parallel arrangement in an open box (top and bottom open) with a size of 500&amp;nbsp;mm&amp;nbsp;×&amp;nbsp;500&amp;nbsp;mm&amp;nbsp;×&amp;nbsp;500&amp;nbsp;mm. The refrigerant R134a was used as the working fluid. The experiments were performed at a low pressure of 40 psi and a high pressure of 180 psi. In the outside evaporator walls, air flowed naturally and part of the water vapour in the air condensed. Three evaporator variations were tested: Case A (one evaporator), Case B (two evaporators), and Case C (three evaporators). Each evaporator contained 25 copper pipes and the length of each pipe was 285&amp;nbsp;mm. The maximum water production and the evaporator efficiency attained were 0.51&amp;nbsp;L a day and 13&amp;nbsp;% respectively. The COP of the machine was ranging from 5.2 to 13.3. Increasing the evaporator number elevated the water production.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;/ul&gt;&lt;a class=&quot;button-alternative button-alternative-secondary button-cited-by-more&quot; data-dcnode-id=&quot;244&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85051840762%26md5%3D83ce42897ba818db29c9425adfb83a8&quot; id=&quot;citing-articles-view-all-btn&quot; target=&quot;_blank&quot;&gt;&lt;svg class=&quot;icon icon-arrow-up-right&quot; data-dcnode-id=&quot;247&quot; focusable=&quot;false&quot; height=&quot;32&quot; viewBox=&quot;0 0 78 128&quot; width=&quot;32&quot;&gt;&lt;path d=&quot;m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z&quot; data-dcnode-id=&quot;248&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;span class=&quot;button-alternative-text&quot; data-dcnode-id=&quot;245&quot;&gt;&lt;span data-dcnode-id=&quot;246&quot; instrument_node=&quot;&quot
