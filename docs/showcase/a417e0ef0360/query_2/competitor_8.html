&lt;/span&gt;&lt;meta content=&quot;&lt;div class=&amp;quot;Abstracts u-font-serif&amp;quot; id=&amp;quot;abstracts&amp;quot;&gt;&lt;div class=&amp;quot;abstract author&amp;quot; id=&amp;quot;ab0010&amp;quot;&gt;&lt;h2 class=&amp;quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&amp;quot;&gt;Abstract&lt;/h2&gt;&lt;div id=&amp;quot;abs0010&amp;quot;&gt;&lt;p id=&amp;quot;sp0050&amp;quot;&gt;In this paper performance and limitations of commercially-available atmospheric water harvesting (AWH) systems are experimentally investigated. A new experimental setup and test procedure, following the relevant ASHRAE and ANSI/AHRI standards, are developed to measure the water harvesting rate and input electrical power of several residential-size AWHs from different manufacturers. The setup is equipped with an environmental chamber to mimic all climatic conditions in research laboratory at Simon Fraser University and to obtain performance characteristics of AWH systems. The results show the range of water harvesting rate, energy intensity ranging from 1.02 kWh/L for warm and humid to 6.23 kWh/L for cold and humid climates, and climatic limitations of the conventional AWH technology that can be used as a platform for further development of higher efficiency AWH systems in future.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&quot; data-dcnode-id=&quot;2929&quot; lang=&quot;en&quot; name=&quot;citation_abstract&quot;&gt;&lt;span data-dcnode-id=&quot;2928&quot; instrument_node=&quot;&quot;&gt;

quot;&gt;&lt;span data-dcnode-id=&quot;2503&quot; instrument_node=&quot;&quot;&gt;Download PDF&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/section&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;PageDivider&quot; data-dcnode-id=&quot;2497&quot;&gt;&lt;/div&gt;&lt;div class=&quot;Abstracts u-font-serif&quot; data-dcnode-id=&quot;2487&quot; id=&quot;abstracts&quot;&gt;&lt;div class=&quot;abstract author&quot; data-dcnode-id=&quot;2488&quot; id=&quot;ab0010&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;2495&quot;&gt;&lt;span data-dcnode-id=&quot;2496&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;2489&quot; id=&quot;abs0010&quot;&gt;&lt;p data-dcnode-id=&quot;2490&quot; id=&quot;sp0050&quot;&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;In this paper performance and limitations of commercially-available atmospheric &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2492&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/water-harvesting&quot; title=&quot;Learn more about water harvesting from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;water harvesting&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2491&quot; instrument_node=&quot;&quot;&gt; (AWH) systems are experimentally investigated. A new experimental setup and test procedure, following the relevant ASHRAE and ANSI/AHRI standards, are developed to measure the water harvesting rate and input electrical power of several residential-size AWHs from different manufacturers. The setup is equipped with an environmental chamber to mimic all climatic conditions in research laboratory at Simon Fraser University and to obtain performance characteristics of AWH systems. The results show the range of water harvesting rate, energy intensity ranging from 1.02 kWh/L for warm and humid to 6.23 kWh/L for cold and humid climates, and climatic limitations of the conventional AWH technology that can be used as a platform for further development of higher efficiency AWH systems in future.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;ul class=&quot;issue-navigation u-margin-s-bottom u-bg-grey1&quot; data-dcnode-id=&quot;2464&quot; id=&quot;issue-navigation&quot;&gt;&lt;li class=&quot;previous move-left u-padding-s-ver u-padding-s-left&quot; data-dcnode-id=&quot;2476&quot;&gt;&lt;a class=&quot;button-alternative button-alternative-tertiary&quot; data-dcnode-id=&quot;2477&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2212371718300271&quot;&gt;&lt;svg class=&quot;icon icon-navigate-left&quot; data-dcnode-id=&quot;2485&quot; focusable=&quot;false&quot; height=&quot;32&quot; viewBox=&quot;0 0 54 128&quot; width=&quot;32&quot;&gt;&lt;path d=&quot;m1 61l45-45 7 7-38 38 38 38-7 7z&quot; data-dcnode-id=&quot;2486&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;span class=&quot;button-alternative-text&quot; data-dcnode-id=&quot;2478&quot;&gt;&lt;strong data-dcnode-id=&quot;2483&quot;&gt;&lt;span data-dcnode-id=&quot;2484&quot; instrument_node=&quot;&quot;&gt;Previous &lt;/span&gt;&lt;/strong&gt;&lt;span class=&quot;extra-detail-1&quot; data-dcnode-id=&quot;2481&quot;&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;article&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;extra-detail-2&quot; data-dcnode-id=&quot;2479&quot;&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt; in issue&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;next move-right u-padding-s-ver u-padding-s-right&quot; data-dcnode-id=&quot;2465&quot;&gt;&lt;a class=&quot;button-alternative button-alternative-tertiary&quot; data-dcnode-id=&quot;2466&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2212371718300246&quot;&gt;&lt;span class=&quot;button-alternative-text&quot; data-dcnode-id=&quot;2469&quot;&gt;&lt;strong data-dcnode-id=&quot;2474&quot;&gt;&lt;span data-dcnode-id=&quot;2475&quot; instrument_node=&quot;&quot;&gt;Next &lt;/span&gt;&lt;/strong&gt;&lt;span class=&quot;extra-detail-1&quot; data-dcnode-id=&quot;2472&quot;&gt;&lt;span data-dcnode-id=&quot;2473&quot; instrument_node=&quot;&quot;&gt;article&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;extra-detail-2&quot; data-dcnode-id=&quot;2470&quot;&gt;&lt;span data-dcnode-id=&quot;2471&quot; instrument_node=&quot;&quot;&gt; in issue&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-right&quot; data-dcnode-id=&quot;2467&quot; focusable=&quot;false&quot; height=&quot;32&quot; viewBox=&quot;0 0 54 128&quot; width=&quot;32&quot;&gt;&lt;path d=&quot;m1 99l38-38-38-38 7-7 45 45-45 45z&quot; data-dcnode-id=&quot;2468&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;Keywords u-font-serif&quot; data-dcnode-id=&quot;2448&quot;&gt;&lt;div class=&quot;keywords-section&quot; data-dcnode-id=&quot;2449&quot; id=&quot;keys0005&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;2462&quot;&gt;&lt;span data-dcnode-id=&quot;2463&quot; instrument_node=&quot;&quot;&gt;Keywords&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;2459&quot; id=&quot;key0005&quot;&gt;&lt;span data-dcnode-id=&quot;2460&quot;&gt;&lt;span data-dcnode-id=&quot;2461&quot; instrument_node=&quot;&quot;&gt;Atmospheric water harvesting&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;2456&quot; id=&quot;key0010&quot;&gt;&lt;span data-dcnode-id=&quot;2457&quot;&gt;&lt;span data-dcnode-id=&quot;2458&quot; instrument_node=&quot;&quot;&gt;Thermodynamics and psychrometrics&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;2453&quot; id=&quot;key0015&quot;&gt;&lt;span data-dcnode-id=&quot;2454&quot;&gt;&lt;span data-dcnode-id=&quot;2455&quot; instrument_node=&quot;&quot;&gt;Performance testing&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;2450&quot; id=&quot;key0020&quot;&gt;&lt;span data-dcnode-id=&quot;2451&quot;&gt;&lt;span data-dcnode-id=&quot;2452&quot; instrument_node=&quot;&quot;&gt;Energy consumption&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2447&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;div class=&quot;Body u-font-serif&quot; data-dcnode-id=&quot;1508&quot; id=&quot;body&quot;&gt;&lt;div data-dcnode-id=&quot;1514&quot;&gt;&lt;section data-dcnode-id=&quot;2398&quot; id=&quot;s0005&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;2443&quot; id=&quot;sect0015&quot;&gt;&lt;span data-dcnode-id=&quot;2446&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;span data-dcnode-id=&quot;2445&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;2444&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;2414&quot; id=&quot;p0005&quot;&gt;&lt;span data-dcnode-id=&quot;2442&quot; instrument_node=&quot;&quot;&gt;Over the 20th century and into the 21st century, the global population has increased by 300%, while water consumption has increased by 600% &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2440&quot; href=&quot;#bib1&quot; name=&quot;bbib1&quot;&gt;&lt;span data-dcnode-id=&quot;2441&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2439&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2437&quot; href=&quot;#bib2&quot; name=&quot;bbib2&quot;&gt;&lt;span data-dcnode-id=&quot;2438&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2428&quot;&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;. Freshwater is becoming a scarce commodity as climate change, man-made pollutants entering the water system, and over-withdrawal of existing &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2434&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/aquifers&quot; title=&quot;Learn more about aquifers from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2435&quot; instrument_node=&quot;&quot;&gt;aquifers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2429&quot;&gt;&lt;span data-dcnode-id=&quot;2433&quot; instrument_node=&quot;&quot;&gt; place enormous strain on freshwater supplies. The distribution of freshwater around the globe is highly uneven, leading to regional shortages or excesses of water resources. The most commonly used index to determine magnitude of regional water resources is the Falkenmark Stress Indicator (FSI), which classifies a country in different categories of &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2431&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/water-shortages&quot; title=&quot;Learn more about water shortage from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2432&quot; instrument_node=&quot;&quot;&gt;water shortage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2430&quot; instrument_node=&quot;&quot;&gt; based on per capita liquid water resource availability (PWR) &lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2426&quot; href=&quot;#bib3&quot; name=&quot;bbib3&quot;&gt;&lt;span data-dcnode-id=&quot;2427&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2425&quot; instrument_node=&quot;&quot;&gt;. Based on this index, the United Nations has predicted that 48 countries will experience water stress or scarcity by 2025 &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2423&quot; href=&quot;#bib3&quot; name=&quot;bbib3&quot;&gt;&lt;span data-dcnode-id=&quot;2424&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2418&quot;&gt;&lt;span data-dcnode-id=&quot;2422&quot; instrument_node=&quot;&quot;&gt;. Four billion people in the world face at least one month of &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2420&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/water-scarcity&quot; title=&quot;Learn more about water scarcity from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2421&quot; instrument_node=&quot;&quot;&gt;water scarcity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2419&quot; instrument_node=&quot;&quot;&gt; every year &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2416&quot; href=&quot;#bib4&quot; name=&quot;bbib4&quot;&gt;&lt;span data-dcnode-id=&quot;2417&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2415&quot; instrument_node=&quot;&quot;&gt;. The water crisis has or will soon turn into food crisis in many areas of the world. To avert the looming water-food crisis, certain measures should be adopted, including, but not limited to: i) water conservation, ii) reducing pollutants entering the water system, iii) upgrading current infrastructure, and iv) improving fresh water generation technologies.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2401&quot; id=&quot;p0010&quot;&gt;&lt;span data-dcnode-id=&quot;2409&quot;&gt;&lt;span data-dcnode-id=&quot;2413&quot; instrument_node=&quot;&quot;&gt;With an estimated 12,800 trillion liters of renewable water available in the atmosphere, atmospheric &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2411&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/water-harvesting&quot; title=&quot;Learn more about water harvesting from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;water harvesting&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2410&quot; instrument_node=&quot;&quot;&gt; (generation) has the potential to be a viable solution to address some of the global needs for freshwater, especially in locations where even saline and/or brackish water is not available &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2407&quot; href=&quot;#bib5&quot; name=&quot;bbib5&quot;&gt;&lt;span data-dcnode-id=&quot;2408&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2402&quot;&gt;&lt;span data-dcnode-id=&quot;2406&quot; instrument_node=&quot;&quot;&gt;. Combining these facts and considering the challenges and shortcomings of existing centralized water provision and delivery systems, the idea of decentralized atmospheric water harvesting (AWH) systems has emerged and followed by a number of researchers and manufacturers during the last few decades. A conventional AWH operates using vapor compression refrigeration (VCR) unit to condensate water from ambient air by cooling it below its &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2404&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/dew-point&quot; title=&quot;Learn more about dew point from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2405&quot; instrument_node=&quot;&quot;&gt;dew point&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2403&quot; instrument_node=&quot;&quot;&gt; temperature.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2399&quot; id=&quot;p0015&quot;&gt;&lt;span data-dcnode-id=&quot;2400&quot; instrument_node=&quot;&quot;&gt;There is a number of claims on the performance and capabilities of the commercially available AWH. However, the literature lacks a critical and independent investigation into realistic performance, functionality, and limitations of such AWH systems. This study aims to provide a systematic investigation on the performance of a few commercially available AWH systems under various climatic conditions.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2259&quot; id=&quot;s0010&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;2394&quot; id=&quot;sect0020&quot;&gt;&lt;span data-dcnode-id=&quot;2397&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;2395&quot; instrument_node=&quot;&quot;&gt;Literature review&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;2381&quot; id=&quot;p0020&quot;&gt;&lt;span data-dcnode-id=&quot;2389&quot;&gt;&lt;span data-dcnode-id=&quot;2393&quot; instrument_node=&quot;&quot;&gt;Decentralized atmospheric &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2391&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/water-harvesting&quot; title=&quot;Learn more about water harvesting from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2392&quot; instrument_node=&quot;&quot;&gt;water harvesting&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt; is a solution to a variety of challenges in common &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2387&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/water-purification&quot; title=&quot;Learn more about water purification from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2388&quot; instrument_node=&quot;&quot;&gt;water purification&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2382&quot;&gt;&lt;span data-dcnode-id=&quot;2386&quot; instrument_node=&quot;&quot;&gt; processes. If the input power is supplied from clean energy sources (e.g. solar, wind, tidal, geothermal), AWH will be a renewable and sustainable water resource since: i) &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2384&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/atmospheric-humidity&quot; title=&quot;Learn more about atmospheric humidity from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2385&quot; instrument_node=&quot;&quot;&gt;atmospheric humidity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2383&quot; instrument_node=&quot;&quot;&gt; is renewed naturally through evaporation from the ocean, and ii) AWH process does not generate any side effect or by-products harmful to the environment.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2323&quot; id=&quot;p0025&quot;&gt;&lt;span data-dcnode-id=&quot;2380&quot; instrument_node=&quot;&quot;&gt;There are several studies in the literature focusing on the process and functionality of AWH systems for water harvesting &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2378&quot; href=&quot;#bib6&quot; name=&quot;bbib6&quot;&gt;&lt;span data-dcnode-id=&quot;2379&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2377&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2375&quot; href=&quot;#bib7&quot; name=&quot;bbib7&quot;&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2374&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2372&quot; href=&quot;#bib8&quot; name=&quot;bbib8&quot;&gt;&lt;span data-dcnode-id=&quot;2373&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2371&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2369&quot; href=&quot;#bib9&quot; name=&quot;bbib9&quot;&gt;&lt;span data-dcnode-id=&quot;2370&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt;. However, most of these studies have praised the viability of the process, especially near tropical and coastal areas where temperature and humidity levels are typically high &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2366&quot; href=&quot;#bib10&quot; name=&quot;bbib10&quot;&gt;&lt;span data-dcnode-id=&quot;2367&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2365&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2363&quot; href=&quot;#bib11&quot; name=&quot;bbib11&quot;&gt;&lt;span data-dcnode-id=&quot;2364&quot; instrument_node=&quot;&quot;&gt;[11]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2362&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2360&quot; href=&quot;#bib12&quot; name=&quot;bbib12&quot;&gt;&lt;span data-dcnode-id=&quot;2361&quot; instrument_node=&quot;&quot;&gt;[12]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2357&quot; href=&quot;#bib13&quot; name=&quot;bbib13&quot;&gt;&lt;span data-dcnode-id=&quot;2358&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2356&quot; instrument_node=&quot;&quot;&gt;. One of the first works dealing with water harvesting from atmosphere was published in 1947 &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2354&quot; href=&quot;#bib14&quot; name=&quot;bbib14&quot;&gt;&lt;span data-dcnode-id=&quot;2355&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2349&quot;&gt;&lt;span data-dcnode-id=&quot;2353&quot; instrument_node=&quot;&quot;&gt;. An apparatus was invented that consisted of a system of vertical and inclined channels underground to collect water from atmosphere by cooling moist air to a temperature below its &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2351&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/dew-point&quot; title=&quot;Learn more about dew point from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2352&quot; instrument_node=&quot;&quot;&gt;dew point&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2350&quot; instrument_node=&quot;&quot;&gt;. Gad et al. &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2347&quot; href=&quot;#bib15&quot; name=&quot;bbib15&quot;&gt;&lt;span data-dcnode-id=&quot;2348&quot; instrument_node=&quot;&quot;&gt;[15]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2342&quot;&gt;&lt;span data-dcnode-id=&quot;2346&quot; instrument_node=&quot;&quot;&gt; reported water harvesting using a liquid &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2344&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/desiccant&quot; title=&quot;Learn more about desiccant from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2345&quot; instrument_node=&quot;&quot;&gt;desiccant&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt; via absorption as well as using a solid desiccant via adsorption–desorption processes. Milani et al. &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2340&quot; href=&quot;#bib12&quot; name=&quot;bbib12&quot;&gt;&lt;span data-dcnode-id=&quot;2341&quot; instrument_node=&quot;&quot;&gt;[12]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2339&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2337&quot; href=&quot;#bib16&quot; name=&quot;bbib16&quot;&gt;&lt;span data-dcnode-id=&quot;2338&quot; instrument_node=&quot;&quot;&gt;[16]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2324&quot;&gt;&lt;span data-dcnode-id=&quot;2328&quot;&gt;&lt;span data-dcnode-id=&quot;2336&quot; instrument_node=&quot;&quot;&gt; classified moist air &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2334&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/dehumidification&quot; title=&quot;Learn more about dehumidification from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2335&quot; instrument_node=&quot;&quot;&gt;dehumidification&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2329&quot;&gt;&lt;span data-dcnode-id=&quot;2333&quot; instrument_node=&quot;&quot;&gt; methods into three main categories: i) condensation on cooling surfaces, ii) &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2331&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/sorption&quot; title=&quot;Learn more about sorption from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2332&quot; instrument_node=&quot;&quot;&gt;sorption&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2330&quot; instrument_node=&quot;&quot;&gt; using desiccant materials, and iii) gas separation using membranes. They modeled, built, and tested a solar-assisted sorption dehumidifier that was added to an air-cooled &lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2326&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/heat-exchanger&quot; title=&quot;Learn more about heat exchanger from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2327&quot; instrument_node=&quot;&quot;&gt;heat exchanger&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2325&quot; instrument_node=&quot;&quot;&gt; to dehumidify air for reducing the energy consumption of an air conditioning system. It was shown that their system could be used for AWH to deliver 5.2 liters of water per day in Sydney, Australia.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2306&quot; id=&quot;p0030&quot;&gt;&lt;span data-dcnode-id=&quot;2322&quot; instrument_node=&quot;&quot;&gt;Scrivani and Bardi &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2320&quot; href=&quot;#bib6&quot; name=&quot;bbib6&quot;&gt;&lt;span data-dcnode-id=&quot;2321&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2319&quot; instrument_node=&quot;&quot;&gt; calculated the energy consumption of AWH by considering typical efficiency for major components in these systems and reported the results for several weather scenarios in three Mediterranean countries: Jordan, Lebanon, and Morocco. They discussed the possibility of using solar power to run absorption chillers as the source of cooling for water condensation. Based on their calculations, the energy consumption per unit of water generation varies between 2256.54 kWh/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2317&quot;&gt;&lt;span data-dcnode-id=&quot;2318&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2316&quot; instrument_node=&quot;&quot;&gt; for Tripoli to 7910.04 kWh/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2314&quot;&gt;&lt;span data-dcnode-id=&quot;2315&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2313&quot; instrument_node=&quot;&quot;&gt; for Rayack, both in Lebanon. Habeebullah &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2311&quot; href=&quot;#bib7&quot; name=&quot;bbib7&quot;&gt;&lt;span data-dcnode-id=&quot;2312&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2310&quot; instrument_node=&quot;&quot;&gt; calculated the water yield of an AWH in relatively hot and humid climate of Jeddah, Saudi Arabia, using a developed mathematical model. Based on the reported data, the monthly estimated average water yield per unit area of dehumidifier (evaporator) coil during August and February were 509 and 401 kg/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2308&quot;&gt;&lt;span data-dcnode-id=&quot;2309&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2307&quot; instrument_node=&quot;&quot;&gt;, respectively.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2301&quot; id=&quot;p0035&quot;&gt;&lt;span data-dcnode-id=&quot;2305&quot; instrument_node=&quot;&quot;&gt;Gido et al. &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2303&quot; href=&quot;#bib17&quot; name=&quot;bbib17&quot;&gt;&lt;span data-dcnode-id=&quot;2304&quot; instrument_node=&quot;&quot;&gt;[17]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2302&quot; instrument_node=&quot;&quot;&gt; introduced a new index, moisture harvesting index (MHI) as the ratio of latent heat of condensation to total heat transfer at the dehumidifier, for evaluating the functionality and cost-effectiveness of AWH. They estimated the MHI for several cities around the world and determined Cabanatuan in Philippines with average MHI of 0.59 as the most suitable location for AWH among the considered locations. They also concluded that MHI &amp;lt; 0.3 represented unfavorable conditions for AWH.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2293&quot; id=&quot;p0040&quot;&gt;&lt;span data-dcnode-id=&quot;2300&quot; instrument_node=&quot;&quot;&gt;Lekouch et al. &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2298&quot; href=&quot;#bib18&quot; name=&quot;bbib18&quot;&gt;&lt;span data-dcnode-id=&quot;2299&quot; instrument_node=&quot;&quot;&gt;[18]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2297&quot; instrument_node=&quot;&quot;&gt; focused on natural dew and fog collection from atmosphere in an arid region of southwest Morocco. The dew water was collected using standard passive dew condensers and fog water was collected utilizing planar fog collectors. They also simulated the dew yield and reported potentials of 0.3–18.1 liter per m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2295&quot;&gt;&lt;span data-dcnode-id=&quot;2296&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2294&quot; instrument_node=&quot;&quot;&gt; of collection surface from May to October (in total) for 15 Moroccan cities.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2285&quot; id=&quot;p0045&quot;&gt;&lt;span data-dcnode-id=&quot;2292&quot; instrument_node=&quot;&quot;&gt;Sharan et al. &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2290&quot; href=&quot;#bib8&quot; name=&quot;bbib8&quot;&gt;&lt;span data-dcnode-id=&quot;2291&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2289&quot; instrument_node=&quot;&quot;&gt; also studied dew yield from conventional, uninsulated, corrugated galvanized iron in northwest rural India. They estimated that for common large roofs 100–300 m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2287&quot;&gt;&lt;span data-dcnode-id=&quot;2288&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2286&quot; instrument_node=&quot;&quot;&gt; in northwest India region, dew water could provide 600–1800 L during the dry season (late September to early May) when needed most by the population.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2280&quot; id=&quot;p0050&quot;&gt;&lt;span data-dcnode-id=&quot;2284&quot; instrument_node=&quot;&quot;&gt;Bergmair et al. &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2282&quot; href=&quot;#bib9&quot; name=&quot;bbib9&quot;&gt;&lt;span data-dcnode-id=&quot;2283&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2281&quot; instrument_node=&quot;&quot;&gt; analyzed a membrane facilitated AWH using a mathematical model. They showed that in warm and humid areas, using a selective membrane to concentrate the water vapor before cooling and condensation would significantly decrease the energy consumption of AWH systems. Based on their obtained indexes, between 40% and 68% saving in energy consumption per unit volume of water harvested would be achieved.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2262&quot; id=&quot;p0055&quot;&gt;&lt;span data-dcnode-id=&quot;2279&quot; instrument_node=&quot;&quot;&gt;Our comprehensive literature review indicates that realistic performance evaluation of AWH has not been studied independently, and the pertinent literature lacks the followings:&lt;/span&gt;&lt;/p&gt;&lt;dl class=&quot;list&quot; data-dcnode-id=&quot;2263&quot;&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;2277&quot;&gt;&lt;span data-dcnode-id=&quot;2278&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;2274&quot;&gt;&lt;p data-dcnode-id=&quot;2275&quot; id=&quot;p0060&quot;&gt;&lt;span data-dcnode-id=&quot;2276&quot; instrument_node=&quot;&quot;&gt;Performance of commercially available AWH in different climates,&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;2272&quot;&gt;&lt;span data-dcnode-id=&quot;2273&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;2269&quot;&gt;&lt;p data-dcnode-id=&quot;2270&quot; id=&quot;p0065&quot;&gt;&lt;span data-dcnode-id=&quot;2271&quot; instrument_node=&quot;&quot;&gt;A standard and/or procedure for performance evaluation of AWH,&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;2267&quot;&gt;&lt;span data-dcnode-id=&quot;2268&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;2264&quot;&gt;&lt;p data-dcnode-id=&quot;2265&quot; id=&quot;p0070&quot;&gt;&lt;span data-dcnode-id=&quot;2266&quot; instrument_node=&quot;&quot;&gt;A general and in-depth understanding of functionality and limitations of AWH technology.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;p&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2260&quot; id=&quot;p0075&quot;&gt;&lt;span data-dcnode-id=&quot;2261&quot; instrument_node=&quot;&quot;&gt;The present study aims to develop a systematic experimental procedure for evaluating the performance of AWH systems. We tested a few commercially available residential-size AWH in our lab under a variety of climatic conditions using environmental chambers. The results were analyzed to establish realistic functionality, performance, and limitations of the tested AWH systems.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2156&quot; id=&quot;s0015&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;2255&quot; id=&quot;sect0025&quot;&gt;&lt;span data-dcnode-id=&quot;2258&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;span data-dcnode-id=&quot;2257&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;2256&quot; instrument_node=&quot;&quot;&gt;Experimental setup&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;2175&quot;&gt;&lt;p data-dcnode-id=&quot;2231&quot; id=&quot;p0080&quot;&gt;&lt;span data-dcnode-id=&quot;2246&quot;&gt;&lt;span data-dcnode-id=&quot;2254&quot; instrument_node=&quot;&quot;&gt;A test-bed is custom-built to study the effects of climatic conditions on &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2252&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/water-harvesting&quot; title=&quot;Learn more about water harvesting from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2253&quot; instrument_node=&quot;&quot;&gt;water harvesting&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2247&quot;&gt;&lt;span data-dcnode-id=&quot;2251&quot; instrument_node=&quot;&quot;&gt; rate and performance of commercially available AWH systems. The test-bed is equipped with a large environmental chamber (Espec, model EPX-4H Platinous) to provide the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2249&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/air-intakes&quot; title=&quot;Learn more about inlet air from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2250&quot; instrument_node=&quot;&quot;&gt;inlet air&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2248&quot; instrument_node=&quot;&quot;&gt; stream with a wide range of desired temperature (T) and relative humidity (RH) to mimic targeted ambient conditions. A schematic and a few pictures of the test-bed are shown in &lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2244&quot; href=&quot;#f0005&quot; name=&quot;bf0005&quot;&gt;&lt;span data-dcnode-id=&quot;2245&quot; instrument_node=&quot;&quot;&gt;Fig. 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2243&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2241&quot; href=&quot;#f0010&quot; name=&quot;bf0010&quot;&gt;&lt;span data-dcnode-id=&quot;2242&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2232&quot;&gt;&lt;span data-dcnode-id=&quot;2240&quot; instrument_node=&quot;&quot;&gt;. The test-bed is equipped with several Rotronic temperature and humidity sensors (model HC2-S3 with accuracy of ± 0.1 °C and ± 0.5% RH), air flow measurement (TSI &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2238&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/anemometer&quot; title=&quot;Learn more about anemometer from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2239&quot; instrument_node=&quot;&quot;&gt;anemometer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2233&quot;&gt;&lt;span data-dcnode-id=&quot;2237&quot; instrument_node=&quot;&quot;&gt; vane model 5725) with accuracy of ± 1.0%, and &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2235&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/flukes&quot; title=&quot;Learn more about Fluke from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2236&quot; instrument_node=&quot;&quot;&gt;Fluke&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2234&quot; instrument_node=&quot;&quot;&gt; 902 clamp meter with accuracy of 2.0% for input electric power measurements.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;2207&quot; id=&quot;f0005&quot;&gt;&lt;span data-dcnode-id=&quot;2215&quot;&gt;&lt;img alt=&quot;Fig. 1&quot; aria-describedby=&quot;cap0005&quot; data-dcnode-id=&quot;2230&quot; height=&quot;171&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2212371717300744-gr1.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;2229&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;2216&quot;&gt;&lt;li data-dcnode-id=&quot;2223&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;2224&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2212371717300744-gr1_lrg.jpg&quot; target=&quot;_blank&quot; title=&quot;Download high-res image (124KB)&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;2225&quot;&gt;&lt;span data-dcnode-id=&quot;2228&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;2226&quot;&gt;&lt;span data-dcnode-id=&quot;2227&quot; instrument_node=&quot;&quot;&gt;Download high-res image (124KB)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2217&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;2218&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2212371717300744-gr1.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;2219&quot;&gt;&lt;span data-dcnode-id=&quot;2222&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;2220&quot;&gt;&lt;span data-dcnode-id=&quot;2221&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;2208&quot;&gt;&lt;span data-dcnode-id=&quot;2209&quot; id=&quot;cap0005&quot;&gt;&lt;p data-dcnode-id=&quot;2210&quot; id=&quot;sp0005&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;2213&quot;&gt;&lt;span data-dcnode-id=&quot;2214&quot; instrument_node=&quot;&quot;&gt;Fig. 1&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2212&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;2211&quot; instrument_node=&quot;&quot;&gt;Schematic of testing facility.&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;2176&quot; id=&quot;f0010&quot;&gt;&lt;span data-dcnode-id=&quot;2191&quot;&gt;&lt;img alt=&quot;Fig. 2&quot; aria-describedby=&quot;cap0010&quot; data-dcnode-id=&quot;2206&quot; height=&quot;241&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2212371717300744-gr2.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;2205&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;2192&quot;&gt;&lt;li data-dcnode-id=&quot;2199&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;2200&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2212371717300744-gr2_lrg.jpg&quot; target=&quot;_blank&quot; title=&quot;Download high-res image (592KB)&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;2201&quot;&gt;&lt;span data-dcnode-id=&quot;2204&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;2202&quot;&gt;&lt;span data-dcnode-id=&quot;2203&quot; instrument_node=&quot;&quot;&gt;Download high-res image (592KB)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2193&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;2194&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2212371717300744-gr2.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;2195&quot;&gt;&lt;span data-dcnode-id=&quot;2198&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;2196&quot;&gt;&lt;span data-dcnode-id=&quot;2197&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;2177&quot;&gt;&lt;span data-dcnode-id=&quot;2178&quot; id=&quot;cap0010&quot;&gt;&lt;p data-dcnode-id=&quot;2179&quot; id=&quot;sp0010&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;2189&quot;&gt;&lt;span data-dcnode-id=&quot;2190&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2188&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;2183&quot;&gt;&lt;span data-dcnode-id=&quot;2187&quot; instrument_node=&quot;&quot;&gt;Test setup; environmental chamber (right); &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2185&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/water-harvesting&quot; title=&quot;Learn more about AWH from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2186&quot; instrument_node=&quot;&quot;&gt;AWH&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2184&quot; instrument_node=&quot;&quot;&gt; connected to environmental chamber (middle); power, temperature, and &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2181&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/humidity-measurement&quot; title=&quot;Learn more about humidity measurement from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2182&quot; instrument_node=&quot;&quot;&gt;humidity measurement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2180&quot; instrument_node=&quot;&quot;&gt; sensors (left).&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;2157&quot; id=&quot;p0085&quot;&gt;&lt;span data-dcnode-id=&quot;2174&quot; instrument_node=&quot;&quot;&gt;The data were measured every 30 s using a DAQ (National Instrument, model PXI Multifunction). In addition, the amount of water harvested is measured every 15 min, using a scale (Precision Weighing Balances model AEP-1500G) with accuracy of ± 0.02 g. Using the test-bed, a few commercially available residential-size AWH are tested under a wide range of climatic conditions and the results are presented and discussed in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2172&quot; href=&quot;#s0020&quot; name=&quot;bs0020&quot;&gt;&lt;span data-dcnode-id=&quot;2173&quot; instrument_node=&quot;&quot;&gt;Section 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2167&quot;&gt;&lt;span data-dcnode-id=&quot;2171&quot; instrument_node=&quot;&quot;&gt;. As there is no performance rating standard in the literature for AWH, a new testing procedure is developed and introduced in this study. Several relevant specifications and guidelines for performance rating of &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2169&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/heat-pumps&quot; title=&quot;Learn more about heat pumps from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2170&quot; instrument_node=&quot;&quot;&gt;heat pumps&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2168&quot; instrument_node=&quot;&quot;&gt; are adopted from ANSI/AHRI Standard 210/240 &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2165&quot; href=&quot;#bib19&quot; name=&quot;bbib19&quot;&gt;&lt;span data-dcnode-id=&quot;2166&quot; instrument_node=&quot;&quot;&gt;[19]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2164&quot; instrument_node=&quot;&quot;&gt;, ASHRAE Standard 16–2016 &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2162&quot; href=&quot;#bib20&quot; name=&quot;bbib20&quot;&gt;&lt;span data-dcnode-id=&quot;2163&quot; instrument_node=&quot;&quot;&gt;[20]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2161&quot; instrument_node=&quot;&quot;&gt;, and ANSI/ASHRAE Standard 128–2011 &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2159&quot; href=&quot;#bib21&quot; name=&quot;bbib21&quot;&gt;&lt;span data-dcnode-id=&quot;2160&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt;. For each test, measurements are performed for 5 h after achieving steady-state conditions. All the tests are repeated 3 times to ensure reproducibility of the acquired data.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;1539&quot; id=&quot;s0020&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;2152&quot; id=&quot;sect0030&quot;&gt;&lt;span data-dcnode-id=&quot;2155&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;span data-dcnode-id=&quot;2154&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;2153&quot; instrument_node=&quot;&quot;&gt;Results and discussion&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;2111&quot;&gt;&lt;p data-dcnode-id=&quot;2136&quot; id=&quot;p0090&quot;&gt;&lt;span data-dcnode-id=&quot;2147&quot;&gt;&lt;span data-dcnode-id=&quot;2151&quot; instrument_node=&quot;&quot;&gt;The main goal of this study is to investigate the performance and limitations of commercially available &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2149&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/water-harvesting&quot; title=&quot;Learn more about AWH from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2150&quot; instrument_node=&quot;&quot;&gt;AWH&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2148&quot; instrument_node=&quot;&quot;&gt; systems under various climatic conditions. As such, three residential-size AWH with rated water generation capacity of 30 L/Day and 1500 W nominal power, manufactured in the United States, Canada, and China are purchased and tested using the custom-built test-bed per the testing procedure described in &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2145&quot; href=&quot;#s0015&quot; name=&quot;bs0015&quot;&gt;&lt;span data-dcnode-id=&quot;2146&quot; instrument_node=&quot;&quot;&gt;Section 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2144&quot; instrument_node=&quot;&quot;&gt;. The tests are performed in a research laboratory at Simon Fraser University. The temperature and relative humidity (RH) of air entering the AWH units are set in the environmental chamber in the ranges of 0–45 °C and 10–100%, respectively. &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;2142&quot; href=&quot;#f0015&quot; name=&quot;bf0015&quot;&gt;&lt;span data-dcnode-id=&quot;2143&quot; instrument_node=&quot;&quot;&gt;Fig. 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2137&quot;&gt;&lt;span data-dcnode-id=&quot;2141&quot; instrument_node=&quot;&quot;&gt; shows a sample of temperature and RH measured at intake and exhaust of an AWH during the tests. It should be noted that the cold air stream after the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;2139&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/dehumidification&quot; title=&quot;Learn more about dehumidification from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;2140&quot; instrument_node=&quot;&quot;&gt;dehumidification&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2138&quot; instrument_node=&quot;&quot;&gt; coil in most existing AWH passes through the condenser coil to improve the coefficient of performance (COP) of the  ideal condition that is calculated based on thermodynamics and psychrometric rules. For the ideal case, it is assumed that an ideal machine can harvest all the extractable water from ambient air without frost formation on its dehumidification coil. As such, it is assumed that an ideal machine is designed and executed in a controlled way that cools the air stream down to a point close to but above freezing temperature (~ 1 °C). The concept of an ideal AWH machine and its performance characteristics can provide an evaluation criterion and give a better insight for optimal design and advancement of the current technology in future. As expected, these plots show that: i) water harvesting rate increases at higher water content, and ii) the energy consumption per liter of harvested water decreases as ω or T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1615&quot;&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt; increases. However, the behavior of variations is not accurately predictable and the trend of real data points is not smooth (unlike the ideal results). This inconsistency is due to the effect of another factor on the water generation rate and the energy consumption, which is the dry bulb temperature. In fact, the amount of energy consumed by AWH to extract a liter of water splits into the sensible cooling of air down to T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1612&quot;&gt;&lt;span data-dcnode-id=&quot;1613&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1611&quot; instrument_node=&quot;&quot;&gt; (and below it) and the latent heat of condensation. Therefore, for a same ω or T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1609&quot;&gt;&lt;span data-dcnode-id=&quot;1610&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;, air at a higher temperature requires higher power for water harvesting due to its higher sensible cooling load. Consequently, at higher temperatures the rate of water harvesting will decrease and the energy consumption per liter of water will increase.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1596&quot; id=&quot;p0110&quot;&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt;The water harvesting plots in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1604&quot; href=&quot;#f0020&quot; name=&quot;bf0020&quot;&gt;&lt;span data-dcnode-id=&quot;1605&quot; instrument_node=&quot;&quot;&gt;Fig. 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1603&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1601&quot; href=&quot;#f0025&quot; name=&quot;bf0025&quot;&gt;&lt;span data-dcnode-id=&quot;1602&quot; instrument_node=&quot;&quot;&gt;Fig. 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1600&quot; instrument_node=&quot;&quot;&gt; also show that the gap between the ideal and real data points increases by increasing the ω or T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1598&quot;&gt;&lt;span data-dcnode-id=&quot;1599&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1597&quot; instrument_node=&quot;&quot;&gt;, which shows the importance of optimal design and functionality of AWH in high humidity (water content) areas. On the other side, the relatively small difference between the real and ideal water harvesting rates at low humidity areas can be interpreted that the existing AWH technology is not appropriate in such climates and there is no remarkable potential of modifications to enhance the performance of AWH units.&lt;/span&gt;&lt;/p&gt;&lt;div data-dcnode-id=&quot;1540&quot;&gt;&lt;p data-dcnode-id=&quot;1571&quot; id=&quot;p0115&quot;&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1594&quot; href=&quot;#f0030&quot; name=&quot;bf0030&quot;&gt;&lt;span data-dcnode-id=&quot;1595&quot; instrument_node=&quot;&quot;&gt;Fig. 6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1593&quot; instrument_node=&quot;&quot;&gt; qualitatively represents the simultaneous effect of temperature and humidity content on water harvesting rate versus T, ω, and T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1591&quot;&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1590&quot; instrument_node=&quot;&quot;&gt;, where higher rates are depicted with larger size bubbles. As expected, the higher water harvesting rates – or the lowest rate of energy consumption per liter – appears in areas with a simultaneous low T and high ω or T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1588&quot;&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1587&quot; instrument_node=&quot;&quot;&gt;. The psychrometric chart has a limiting line, RH = 100%, demarcated by a dashed line in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1585&quot; href=&quot;#f0030&quot; name=&quot;bf0030&quot;&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;Fig. 6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1584&quot; instrument_node=&quot;&quot;&gt;, that confines the maximum yield in water harvesting rate. As such, the highest water harvesting rate is obtained in climates that are closer to the RH = 100% line and have higher ω or T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1582&quot;&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1581&quot; instrument_node=&quot;&quot;&gt;. Noteworthy is another limitation that exists due to frost formation on the dehumidifier (evaporator) coil in low temperature and humidity climates. Based on our experiments, AWH systems do not operate in low temperature and humidity climates, i.e. cold and dry condition: T &amp;lt; ~ 6 °C and RH &amp;lt; ~ 75%; ≈ T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1579&quot;&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1578&quot; instrument_node=&quot;&quot;&gt; &amp;lt; 2 °C, and these conditions are also marked on &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1576&quot; href=&quot;#f0030&quot; name=&quot;bf0030&quot;&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt;Fig. 6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;. The cost of water generation increases as T increases or ω (consequently T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1573&quot;&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1572&quot; instrument_node=&quot;&quot;&gt;) decreases.&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;1541&quot; id=&quot;f0030&quot;&gt;&lt;span data-dcnode-id=&quot;1555&quot;&gt;&lt;img alt=&quot;Fig. 6&quot; aria-describedby=&quot;cap0030&quot; data-dcnode-id=&quot;1570&quot; height=&quot;193&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2212371717300744-gr6.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;1569&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;1556&quot;&gt;&lt;li data-dcnode-id=&quot;1563&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;1564&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2212371717300744-gr6_lrg.jpg&quot; target=&quot;_blank&quot; title=&quot;Download high-res image (224KB)&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;1565&quot;&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;1566&quot;&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;Download high-res image (224KB)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1557&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;1558&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2212371717300744-gr6.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;1559&quot;&gt;&lt;span data-dcnode-id=&quot;1562&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;1560&quot;&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;1542&quot;&gt;&lt;span data-dcnode-id=&quot;1543&quot; id=&quot;cap0030&quot;&gt;&lt;p data-dcnode-id=&quot;1544&quot; id=&quot;sp0030&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;Fig. 6&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;1548&quot;&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;1550&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/water-harvesting&quot; title=&quot;Learn more about Water harvesting from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;Water harvesting&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt; rate vs. temperature (T), water content (ω), and T&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1546&quot;&gt;&lt;span data-dcnode-id=&quot;1547&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt; (a larger bubble represents a larger water generation rate).&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;1515&quot; id=&quot;s0025&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;1535&quot; id=&quot;sect0035&quot;&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;span data-dcnode-id=&quot;1537&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;Conclusions&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1530&quot; id=&quot;p0120&quot;&gt;&lt;span data-dcnode-id=&quot;1534&quot; instrument_node=&quot;&quot;&gt;This paper presented a critical performance investigation of commercially available &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;1532&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/water-harvesting&quot; title=&quot;Learn more about AWH from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;AWH&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt; systems. A new testbed was built that featured environmental chambers to mimic realistic operating conditions of different climates. A new testing procedure was introduced for assessing the performance of AWH systems following relevant ASHRAE and ANSI/AHRI standards.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1521&quot; id=&quot;p0125&quot;&gt;&lt;span data-dcnode-id=&quot;1525&quot;&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt;Three residential-size AWH units (nominal power of 1500 W or less) were systematically tested in our lab under a variety of conditions including: warm and humid, mild and humid, cold and humid, warm and dry, mild and dry, cold and dry, and mild climates. The results showed that the water harvesting yield enhances by simultaneous increase of water content (ω) or &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;1527&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/dewpoint&quot; title=&quot;Learn more about dewpoint from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt; temperature (T&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1523&quot;&gt;&lt;span data-dcnode-id=&quot;1524&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1522&quot; instrument_node=&quot;&quot;&gt;) and a decrease of temperature. The average water harvesting rate varied in a range of 0.05 L/h for cold and humid to 0.65 L/h for warm and humid climates. The average energy consumption changed from 1.02 kWh/L for warm and humid to 6.23 kWh/L for cold and humid climates.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1516&quot; id=&quot;p0130&quot;&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;In addition, an ideal AWH unit was defined as a machine capable of cooling the air stream down to a point close to but above the freezing temperature (~ 1 °C) to achieve the highest water harvesting rate at all climates. The comparisons showed an increase in the gaps between real and ideal water harvesting rates by changing from low humidity (water content) condition to high humidity condition. It denoted a higher potential of performance improvement in higher humidity areas through optimal design of AWH systems for those climates. The results also showed that: i) the considered AWH units failed to operate in cold-and-dry climate; and ii) the energy cost of AWH increased significantly in hot-and-dry conditions. A criterion, T&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1518&quot;&gt;&lt;span data-dcnode-id=&quot;1519&quot; instrument_node=&quot;&quot;&gt;dewpoint&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt; &amp;gt; 2 °C, was established based on our experiment as a minimum climatic requirement for using AWH systems.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/div&gt;&lt;section data-dcnode-id=&quot;1509&quot; id=&quot;ack0005&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;1512&quot; id=&quot;sect0040&quot;&gt;&lt;span data-dcnode-id=&quot;1513&quot; instrument_node=&quot;&quot;&gt;Acknowledgements&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1510&quot; id=&quot;p0135&quot;&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;This work was supported by Automotive Partnership Canada (APC), Grant No. APCPJ 401826-10. The work could not be performed without the support from many people at Simon Fraser University. The author would like to thank Mr. Marius Haiducu, Dr. Mohammad Ali Fayazbakhsh, Mr. Jit Tian Lim, and Mr. Tian Lin Yang for their assistance during the tests.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/div&gt;&lt;div class=&quot;related-content-links u-hide-from-md&quot; data-dcnode-id=&quot;1504&quot;&gt;&lt;button class=&quot;button button-anchor&quot; data-dcnode-id=&quot;1505&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-text&quot; data-dcnode-id=&quot;1506&quot;&gt;&lt;span data-dcnode-id=&quot;1507&quot; instrument_node=&quot;&quot;&gt;Recommended articles&lt;/span&gt;&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;Tail&quot; data-dcnode-id=&quot;1503&quot;&gt;&lt;/div&gt;&lt;section class=&quot;bibliography u-font-serif text-s&quot; data-dcnode-id=&quot;368&quot; id=&quot;bibliog0005&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;1501&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;References&lt;/span&gt;&lt;/h2&gt;&lt;section class=&quot;bibliography-sec&quot; data-dcnode-id=&quot;369&quot; id=&quot;bb0005&quot;&gt;&lt;dl class=&quot;references&quot; data-dcnode-id=&quot;370&quot; id=&quot;reference-links-bb0005&quot;&gt;&lt;dt class=&quot;label&quot; data-dcnode-id=&quot;1498&quot;&gt;&lt;a data-aa-button=&quot;sd:product:journal:article:location=references:type=anchor:name=citation-name&quot; data-dcnode-id=&quot;1499&quot; href=&quot;#bbib1&quot; id=&quot;ref-id-bib1&quot;&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;/dt&gt;&lt;dd class=&quot;reference&quot; data-dcnode-id=&quot;1390&quot; id=&quot;sbref1&quot;&gt;&lt;div class=&quot;contribution&quot; data-dcnode-id=&quot;1433&quot;&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;J.J.&lt;/span&gt;&lt;span data-dcnode-id=&quot;1495&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;1493&quot; instrument_node=&quot;&quot;&gt;Bogardi&lt;/span&gt;&lt;span data-dcnode-
