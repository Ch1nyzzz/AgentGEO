&lt;/span&gt;&lt;p data-dcnode-id=&quot;770&quot;&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt;This is an FAQ guide about Atmospheric Water Generators (AWGs), but also contains information that might be useful for potential buyers of these types of machines.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;767&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;Atmospheric Water Generator vs Other Water-From-Air Methods&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;Water-from-air harvesting includes any method used to extract water from the air/atmosphere.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;758&quot;&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;It includes both active and passive forms of extracting water from the air.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;755&quot;&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;It can for example include passive water-from-air generation in the form of fog nets and fog fences.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;752&quot;&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt;Atmospheric water generator is the term used to describe a specific type of product/device that actively extracts water from the air.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;749&quot;&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;746&quot;&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;So, What Is An Atmospheric Water Generator?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;An Atmospheric Water Generator (AWG) is a specific type of commercial unit/device that uses a power source to actively extract water from the (humid ambient) air.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;740&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;They can use different extraction methods such as cooling rods/coils (cooling condensation), or desiccants (wet desiccation using solutions and substances).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;737&quot;&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;Different brands manufacture different AWG products of different sizes, with different features and capabilities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;734&quot;&gt;&lt;span data-dcnode-id=&quot;735&quot; instrument_node=&quot;&quot;&gt;(AWGs are different to dehumidifiers in that they produce potable water)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;731&quot;&gt;&lt;span data-dcnode-id=&quot;732&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;728&quot;&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;Another Name For An AWG – Air From Water Machines&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;727&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;725&quot;&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt;Some people refer to AWGs as ‘Air To Water Machines’, or ‘Air From Water Machines’.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;722&quot;&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;719&quot;&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;Benefits &amp;amp; Disadvantages Of Atmospheric Water Generators&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;713&quot;&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;Read about &lt;/span&gt;&lt;a data-dcnode-id=&quot;715&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.bettermeetsreality.com/pros-cons-of-atmospheric-water-generation-harvesting-water-from-air/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;the pros and cons of Atmospheric Water Generators in this guide&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;710&quot;&gt;&lt;span data-dcnode-id=&quot;711&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;707&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;Are Atmospheric Water Generators Safe?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;704&quot;&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;It depends on a few factors.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;701&quot;&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;Each country has different regulations or some version of a ‘Safe Water Act’ that outlines what quality water has to meet for different end uses.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;698&quot;&gt;&lt;span data-dcnode-id=&quot;699&quot; instrument_node=&quot;&quot;&gt;So, you have to determine what the water produced by the AWG will be used for, consider the water treatment technology used in the AWG, and get some sort of confirmation or certification from the company producing the AWG that the water will meet a certain Standard or quality (or meet the quality requirements for a certain end use).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;695&quot;&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;For example, the AWG should have filter and purification technology that ensures the air used and water produced is safe and healthy for the end use – whether it be drinking or otherwise.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;692&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;Sediment filtration, mineralization, activated carbon, and microbiological treatment by UV lamp, might be part of an AWG water purification system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;689&quot;&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;A company like GENAQ has AWGs that produce water that meets World Health Organisation (WHO) standards&amp;nbsp;for drinking water and is certified by European health authorities&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;686&quot;&gt;&lt;span data-dcnode-id=&quot;687&quot; instrument_node=&quot;&quot;&gt;TUAFI also introduces essential minerals back into their water.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;683&quot;&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;680&quot;&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;How Do Atmospheric Water Generators Work?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;677&quot;&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;Generally, to be effective, they need to operate in the right conditions first and foremost – in humid ambient air that is of a certain temperature and relative humidity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;674&quot;&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt;For cooling condensation units – ‘as a rule of thumb, cooling condensation atmospheric water generators do not work efficiently when the temperature falls below 18.3°C (65°F) or the relative humidity drops below 30%’ (wikipedia.org)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;671&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;In a cooling condensation unit, air passes over a cooling coil rod, bringing the air to it’s dew point (causing water to condense), and the water in the air drops into a storage or treatment tank where it can be filtered and purified for it’s end use.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;668&quot;&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;In a wet desiccation unit, a substance or a solution (a brine type solution) is used to absorb water from humid air, before separating the water from the substance or solution and purifying/filtering it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;667&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;665&quot;&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt;Pressurizing air is another method used.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;662&quot;&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt;Different units though tend to work differently with different systems, features, and capabilities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;659&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;Some companies actually provide a device system diagram that shows you the parts of the unit and the flow of how everything fits together and works to generate water (along with providing a description).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;658&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;656&quot;&gt;&lt;span data-dcnode-id=&quot;657&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;653&quot;&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;GENAQ indicates that their units ‘function in arid climates with temperatures over 50ºC (122F) and relative humidity lower than 20%, and also in industrial or polluted areas’ (genaq.com)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;650&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;647&quot;&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;How Efficient Are Atmospheric Water Generators?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;It depends on the brand and product model of AWG, and it depends on the efficiency indicator being measured.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;643&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;641&quot;&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt;Check the individual model specifications for efficiency indicators.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;640&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;638&quot;&gt;&lt;span data-dcnode-id=&quot;639&quot; instrument_node=&quot;&quot;&gt;But, as one example:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;635&quot;&gt;&lt;span data-dcnode-id=&quot;636&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;634&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;631&quot;&gt;&lt;span data-dcnode-id=&quot;632&quot; style=&quot;text-decoration: underline;&quot;&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;Energy/Fuel To Water Output&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;628&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;[It takes] 310 Wh to make 1 litre of water (wikipedia.org)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;625&quot;&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;Large versions, mounted on trailers, are said to produce up to 1,200 US gallons (4,500 l) of water per day, at a ratio of up to 5 gallons of water per gallon of fuel (wikipedia.org)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;622&quot;&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;Watergen GEN-L &amp;amp; GENNY Models – 350Wh/liter (watergen.com)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;619&quot;&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;618&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;616&quot;&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;EPA.gov has this to say about energy efficiency of AWGs – ‘Although significant quantities of energy can be required to operate these condenser and fan systems, recent technological advancements have substantially improved the energy-water ratio—increasing the feasibility of using these systems to help augment [a] Nation’s drinking water resources.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;613&quot;&gt;&lt;span data-dcnode-id=&quot;614&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;609&quot;&gt;&lt;span data-dcnode-id=&quot;610&quot; style=&quot;text-decoration: underline;&quot;&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;Efficiency Of Water Itself&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;606&quot;&gt;&lt;span data-dcnode-id=&quot;607&quot; instrument_node=&quot;&quot;&gt;AWGs aren’t like recycled water or desalination where water goes in, and only a certain amount of water comes out.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;603&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;AWGs only extract water from the air that is processed by the machine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;601&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;599&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;597&quot;&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;How Much Power Atmospheric Water Generators Use&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;594&quot;&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt;Watergen models:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;593&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;591&quot;&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;GENNY: ~350 Wh/L nominal; During water boiling: ~800 Wh/L&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;588&quot;&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;GEN-L: ~ 60 kW*h&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;585&quot;&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;582&quot;&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;Akvo models:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;579&quot;&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;36k model – uses 1.5 kw/h at peak power consumption&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;365k model – uses 9 kw/h at peak power consumption&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;573&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;570&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;How Heavy Are Atmospheric Water Generators?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;567&quot;&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;Watergen models:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;564&quot;&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;GENNY: 80kg&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;561&quot;&gt;&lt;span data-dcnode-id=&quot;562&quot; instrument_node=&quot;&quot;&gt;GEN-L: 2630kg&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;558&quot;&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;555&quot;&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;Akvo models:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;552&quot;&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;36k model – 140kg&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;549&quot;&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;365k model – 600kg&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;546&quot;&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;543&quot;&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;How Much Atmospheric Water Generators Cost (Price)&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;540&quot;&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;It depends on the water generation capacity and size of the AWG model.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;537&quot;&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;The smaller models can cost in the hundreds of dollars, whilst the largest AWGs can cost in the tens and hundreds of thousands of dollars (or more).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;534&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;This is just the purchase price though.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;531&quot;&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;There’s also ongoing costs such as maintenance, power costs, and so on.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;530&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;528&quot;&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;A 5,000 liter capacity a day model we checked out claims to be able to produce a liter of water for between 2 to 4 cents (according to product specifications)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;525&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;522&quot;&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;GENAQ has a ‘cost of water for human consumption’ economical chart, and indicates that AWG water is more economical than bottled water, home distilled water, and water tanks.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;519&quot;&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;516&quot;&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt;Off Grid &amp;amp; Portable Atmospheric Water Generators&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;513&quot;&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;Some AWGs are designed to be portable and to be used off grid.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;510&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;In the product specifications, you want to check the power source that the AWG requires.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;507&quot;&gt;&lt;span data-dcnode-id=&quot;508&quot; instrument_node=&quot;&quot;&gt;Some can be run off solar panels, or diesel generators.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;504&quot;&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;501&quot;&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;Solar Atmospheric Water Generators&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;498&quot;&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;These do exist – they can use solar panels directly, or the solar panels can charge a battery for later use.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;495&quot;&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;Some AWGs that run off solar panels incorporate a wet desiccation gravity system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;492&quot;&gt;&lt;span data-dcnode-id=&quot;493&quot; instrument_node=&quot;&quot;&gt;Check the model specifications to see that a unit can run off solar power.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;489&quot;&gt;&lt;span data-dcnode-id=&quot;490&quot; instrument_node=&quot;&quot;&gt;GENAQ has AWGs that can be run using solar panels, wind turbines or a diesel power unit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;486&quot;&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;The smartcity.org resource listed in this guide contains details of Tatung company using AWGs with solar power in the United Arab Emirates.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;485&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;483&quot;&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;Aldelano is an example of another company that produces atmospheric water generators powered only by the sun (check out the solarcoldbox.com resource)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;482&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;477&quot;&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;Passive Atmospheric Water Generation&amp;nbsp;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;476&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;474&quot;&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;Passive atmospheric water generation doesn’t involve a power source or moving parts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;473&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;471&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;Instead it involves some sort of static setup that relies on natural processes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;468&quot;&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt;One example is a fog net or a fog fence that used natural processes to extract water from ambient humid air.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;465&quot;&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;462&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;Industrial &amp;amp; Large Scale Sized Atmospheric Water Generation&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;459&quot;&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;Some large commercial AWGs can produce around 5000 litres per day.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;456&quot;&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;Some of these AWGs are modular and can be connected up into large ‘AWG farms’ where larger quantities of water can be generated in the one place.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;455&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;453&quot;&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;Some brands currently make AWGs that generate high purity water for industrial processes (check the product specifications and description to see which ones do).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;450&quot;&gt;&lt;span data-dcnode-id=&quot;451&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;441&quot;&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;A few examples of brands that do different types and models of AWGs are:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;440&quot; instrument_node=&quot;&quot;&gt;
