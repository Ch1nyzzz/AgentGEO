;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6845&quot; href=&quot;#fig0015&quot; name=&quot;bfig0015&quot;&gt;&lt;span data-dcnode-id=&quot;6846&quot; instrument_node=&quot;&quot;&gt;Fig. 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6844&quot; instrument_node=&quot;&quot;&gt;f, g, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6842&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6843&quot; instrument_node=&quot;&quot;&gt;Fig. S16&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6841&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6839&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6840&quot; instrument_node=&quot;&quot;&gt;Fig. S17&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6838&quot; instrument_node=&quot;&quot;&gt;). Initially, the CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6836&quot;&gt;&lt;span data-dcnode-id=&quot;6837&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6835&quot; instrument_node=&quot;&quot;&gt; coated on the surface layer of ILCA captured the moisture by the interaction between water molecules and salt particles. With the increased amount of water, the CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6833&quot;&gt;&lt;span data-dcnode-id=&quot;6834&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6828&quot;&gt;&lt;span data-dcnode-id=&quot;6832&quot; instrument_node=&quot;&quot;&gt; particle converted into &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6830&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/hydrated-salt&quot; title=&quot;Learn more about hydrated salt from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6831&quot; instrument_node=&quot;&quot;&gt;hydrated salt&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6829&quot; instrument_node=&quot;&quot;&gt; and then transformed into saline solution stored inside loofah’s fibers and stems with the help of capillary action. As the adsorption process went on, water was quickly aggregated while the CaCl&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6826&quot;&gt;&lt;span data-dcnode-id=&quot;6827&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6825&quot; instrument_node=&quot;&quot;&gt; solution was gradually diluted until the steady state was reached.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6816&quot; id=&quot;p0110&quot;&gt;&lt;span data-dcnode-id=&quot;6823&quot; instrument_node=&quot;&quot;&gt;A typical working condition of a rainy day was also simulated by setting humidity at ~90% (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6821&quot; href=&quot;#fig0015&quot; name=&quot;bfig0015&quot;&gt;&lt;span data-dcnode-id=&quot;6822&quot; instrument_node=&quot;&quot;&gt;Fig. 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6820&quot; instrument_node=&quot;&quot;&gt;c). After 12 h, the LCA and ILCA were still able to capture moisture with a water uptake of 1.5 g g&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6818&quot;&gt;&lt;span data-dcnode-id=&quot;6819&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6817&quot; instrument_node=&quot;&quot;&gt;, meanwhile, the suitable salt content could guarantee no salty solution leakage.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6808&quot; id=&quot;p0115&quot;&gt;&lt;span data-dcnode-id=&quot;6815&quot; instrument_node=&quot;&quot;&gt;In the above experiments, it took LCA and ILCA ~5–6 h to achieve 80% of total water uptake, while CA with the same salt content achieved an identical result in ~9 h. It could be declared that both LCA and ILCA have faster dynamic properties and greater sorption capabilities than ordinary granular sorbents impregnated with salts, which is consistent to SEM and EDS analysis. Furthermore, it is worth noting that ILCA has better sorption performance than LCA (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6813&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6814&quot; instrument_node=&quot;&quot;&gt;Fig. S18&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6812&quot; instrument_node=&quot;&quot;&gt;) due to the influence of carbon nanospheres on roughing the fiber’s surface. It increases the probability that the moisture is captured by the hygroscopic salt particles in the solid-gas interface (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6810&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6811&quot; instrument_node=&quot;&quot;&gt;Fig. S6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6809&quot; instrument_node=&quot;&quot;&gt;). From other perspectives, the large gap related to water uptake between sorbents with salts and pure physical sorbents (such as silica gel and zeolite 13X) reflected the deliquescent salts played a significant role in capturing and liquefying moisture.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6793&quot; id=&quot;p0120&quot;&gt;&lt;span data-dcnode-id=&quot;6803&quot;&gt;&lt;span data-dcnode-id=&quot;6807&quot; instrument_node=&quot;&quot;&gt;To analyze the discrepancy between the adsorption and desorption processes, the kinetic &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6805&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/sorption-property&quot; title=&quot;Learn more about sorption property from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6806&quot; instrument_node=&quot;&quot;&gt;sorption property&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6804&quot; instrument_node=&quot;&quot;&gt; was obtained by simultaneous thermal analyzer (STA) (the procedure of STA is explained in &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6801&quot; href=&quot;#sec0045&quot; name=&quot;bsec0045&quot;&gt;&lt;span data-dcnode-id=&quot;6802&quot; instrument_node=&quot;&quot;&gt;Section 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6800&quot; instrument_node=&quot;&quot;&gt;: materials and method). Considering the dynamic adsorption curve for three different relative humidities (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6798&quot; href=&quot;#fig0015&quot; name=&quot;bfig0015&quot;&gt;&lt;span data-dcnode-id=&quot;6799&quot; instrument_node=&quot;&quot;&gt;Fig. 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6797&quot; instrument_node=&quot;&quot;&gt;d, e), the adsorption process could be nearly completed after 3–4 h, while the desorption process lasted for 1 h with 160 ml min&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6795&quot;&gt;&lt;span data-dcnode-id=&quot;6796&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6794&quot; instrument_node=&quot;&quot;&gt; of gas flow. Moreover, the desorption rate of LCA was 4 times higher in comparison to the adsorption rate attributing to its higher desorption potential. It also gave a sufficient chance to employ multiple cycles for greater water uptake in AWH application.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6641&quot; id=&quot;sec0025&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6788&quot; id=&quot;sect0045&quot;&gt;&lt;span data-dcnode-id=&quot;6791&quot; instrument_node=&quot;&quot;&gt;2.3&lt;/span&gt;&lt;span data-dcnode-id=&quot;6790&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6789&quot; instrument_node=&quot;&quot;&gt;Water desorption performance&lt;/span&gt;&lt;/h3&gt;&lt;div data-dcnode-id=&quot;6714&quot;&gt;&lt;p data-dcnode-id=&quot;6753&quot; id=&quot;p0125&quot;&gt;&lt;span data-dcnode-id=&quot;6787&quot; instrument_node=&quot;&quot;&gt;To understand the passive desorption properties of ILCA, a simulated sunlight source was used to drive the desorption process in laboratory tests. LCA and ILCA samples were firstly set into the constant temperature and humidity chamber at 25 °C and 60% RH for 24 h to ensure a complete water uptake. Then an LCA sample and an ILCA sample were illuminated under the sunlight source with 1 sun of irradiation intensity to release water separately (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6785&quot; href=&quot;#fig0020&quot; name=&quot;bfig0020&quot;&gt;&lt;span data-dcnode-id=&quot;6786&quot; instrument_node=&quot;&quot;&gt;Fig. 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6784&quot; instrument_node=&quot;&quot;&gt;b). During the initial 20 min, the surface temperature of LCA increased from 25 °C to 48 °C, while that of ILCA rose from 25 °C to 60 °C (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6782&quot; href=&quot;#fig0020&quot; name=&quot;bfig0020&quot;&gt;&lt;span data-dcnode-id=&quot;6783&quot; instrument_node=&quot;&quot;&gt;Fig. 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6781&quot; instrument_node=&quot;&quot;&gt;c). After that, the temperatures of both samples balanced, meaning that the heat transfer was in equilibrium with the adsorbed solar energy. As for the salty solution inside fibers of ILCA, it absorbs heat and releases water vapor, and transfers into CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6779&quot;&gt;&lt;span data-dcnode-id=&quot;6780&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6778&quot; instrument_node=&quot;&quot;&gt;∙2 H&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6776&quot;&gt;&lt;span data-dcnode-id=&quot;6777&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6775&quot; instrument_node=&quot;&quot;&gt;O, CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6773&quot;&gt;&lt;span data-dcnode-id=&quot;6774&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6772&quot; instrument_node=&quot;&quot;&gt;∙H&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6770&quot;&gt;&lt;span data-dcnode-id=&quot;6771&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6769&quot; instrument_node=&quot;&quot;&gt;O, and CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6767&quot;&gt;&lt;span data-dcnode-id=&quot;6768&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6766&quot; instrument_node=&quot;&quot;&gt; in order (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6764&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6765&quot; instrument_node=&quot;&quot;&gt;Fig. S20&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6763&quot; instrument_node=&quot;&quot;&gt;, the detailed information is present in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6761&quot; href=&quot;#sec0045&quot; name=&quot;bsec0045&quot;&gt;&lt;span data-dcnode-id=&quot;6762&quot; instrument_node=&quot;&quot;&gt;Section 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6760&quot; instrument_node=&quot;&quot;&gt; of &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6758&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6759&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6757&quot; instrument_node=&quot;&quot;&gt;). The crystal substance migrates to the middle inside fibers while the liquid moves to the ends and continues to desorb. As for the salty solution stored in the internal of fibers, it tends to move to the surface of the stems, attributed to the Van der Waal’s forces of fibers and the capillary action of calcium alginate gel. Therefore, the salt particles enable to exist in the relevant sites and prevent from migrating and leaking out (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6755&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6756&quot; instrument_node=&quot;&quot;&gt;Fig. S22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6754&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;6715&quot; id=&quot;fig0020&quot;&gt;&lt;span data-dcnode-id=&quot;6737&quot;&gt;&lt;img alt=&quot;Fig. 4&quot; aria-describedby=&quot;cap0020&quot; data-dcnode-id=&quot;6752&quot; height=&quot;687&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr4.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;6751&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;6738&quot;&gt;&lt;li data-dcnode-id=&quot;6745&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;6746&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr4_lrg.jpg&quot; target=&quot;_blank&quot; title=&quot;Download high-res image (507KB)&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;6747&quot;&gt;&lt;span data-dcnode-id=&quot;6750&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;6748&quot;&gt;&lt;span data-dcnode-id=&quot;6749&quot; instrument_node=&quot;&quot;&gt;Download high-res image (507KB)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;6739&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;6740&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr4.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;6741&quot;&gt;&lt;span data-dcnode-id=&quot;6744&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;6742&quot;&gt;&lt;span data-dcnode-id=&quot;6743&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;6716&quot;&gt;&lt;span data-dcnode-id=&quot;6717&quot; id=&quot;cap0020&quot;&gt;&lt;p data-dcnode-id=&quot;6718&quot; id=&quot;sp0020&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;6735&quot;&gt;&lt;span data-dcnode-id=&quot;6736&quot; instrument_node=&quot;&quot;&gt;Fig. 4&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6734&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;strong data-dcnode-id=&quot;6732&quot;&gt;&lt;span data-dcnode-id=&quot;6733&quot; instrument_node=&quot;&quot;&gt;Desorption performance driven by solar energy.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;6719&quot;&gt;&lt;span data-dcnode-id=&quot;6723&quot;&gt;&lt;span data-dcnode-id=&quot;6731&quot; instrument_node=&quot;&quot;&gt; (a) the absorbance of &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6729&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/life-cycle-assessment&quot; title=&quot;Learn more about LCA from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6730&quot; instrument_node=&quot;&quot;&gt;LCA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6724&quot;&gt;&lt;span data-dcnode-id=&quot;6728&quot; instrument_node=&quot;&quot;&gt; and ILCA with dry or wet state; (b) the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6726&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/ambient-air-temperature&quot; title=&quot;Learn more about ambient air temperature from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6727&quot; instrument_node=&quot;&quot;&gt;ambient air temperature&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6725&quot; instrument_node=&quot;&quot;&gt; and RH during the entire duration of experiments; (c) comparison of mass change and &lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6721&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/maximum-surface-temperature&quot; title=&quot;Learn more about surface maximum temperature from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6722&quot; instrument_node=&quot;&quot;&gt;surface maximum temperature&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6720&quot; instrument_node=&quot;&quot;&gt; of LCA and ILCA; comparison of (d) surface maximum temperature, (e) mass change, (f) the desorption efficiency and the solar conversion efficiency.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;6700&quot; id=&quot;p0130&quot;&gt;&lt;span data-dcnode-id=&quot;6713&quot; instrument_node=&quot;&quot;&gt;Simultaneously, the steady mass flux of ILCA (1.5 kg m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6711&quot;&gt;&lt;span data-dcnode-id=&quot;6712&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6710&quot; instrument_node=&quot;&quot;&gt; h&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6708&quot;&gt;&lt;span data-dcnode-id=&quot;6709&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6707&quot; instrument_node=&quot;&quot;&gt;) was 1.43 times higher than that of LCA, owing to the stronger photothermal property of ILCA derived from the carbon ink that drove more thermal power into the salty solution (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6705&quot; href=&quot;#fig0020&quot; name=&quot;bfig0020&quot;&gt;&lt;span data-dcnode-id=&quot;6706&quot; instrument_node=&quot;&quot;&gt;Fig. 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6704&quot; instrument_node=&quot;&quot;&gt;a, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6702&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6703&quot; instrument_node=&quot;&quot;&gt;Fig. S10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6701&quot; instrument_node=&quot;&quot;&gt;). Essentially, except for the black color of carbon ink, the rougher complex nano-structure on ILCA’ surface also takes effect in the desorption efficiency. As is well-known, in the same projected area, the rougher the surface is, the larger the surface area is. By decreasing the light reflectance (more lights are trapped in ILCA’s internal than that of LCA due to the multi-reflection and multi-scattering on rough surface), the light absorbance of ILCA enhances. Correspondingly, ILCA enables to achieve higher solar conversion efficiency than LCA.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6659&quot; id=&quot;p0135&quot;&gt;&lt;span data-dcnode-id=&quot;6691&quot;&gt;&lt;span data-dcnode-id=&quot;6699&quot; instrument_node=&quot;&quot;&gt;As the light intensity increased from 0.6 sun to 1.6 sun, the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6697&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/maximum-surface-temperature&quot; title=&quot;Learn more about maximum surface temperature from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6698&quot; instrument_node=&quot;&quot;&gt;maximum surface temperature&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6692&quot;&gt;&lt;span data-dcnode-id=&quot;6696&quot; instrument_node=&quot;&quot;&gt; and the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6694&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/evaporation-rate&quot; title=&quot;Learn more about evaporation rate from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6695&quot; instrument_node=&quot;&quot;&gt;evaporation rate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6693&quot; instrument_node=&quot;&quot;&gt; both increased (&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6689&quot; href=&quot;#fig0020&quot; name=&quot;bfig0020&quot;&gt;&lt;span data-dcnode-id=&quot;6690&quot; instrument_node=&quot;&quot;&gt;Fig. 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6684&quot;&gt;&lt;span data-dcnode-id=&quot;6688&quot; instrument_node=&quot;&quot;&gt;d, e). After 20 min, the maximum temperatures of the four samples were approximately 53 °C, 60 °C, 63 °C, 69 °C at 0.6 sun, 1 sun, 1.3 sun and 1.6 sun respectively, which gives credit to the high &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6686&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/heat-transfer-coefficient&quot; title=&quot;Learn more about heat transfer coefficient from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6687&quot; instrument_node=&quot;&quot;&gt;heat transfer coefficient&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6685&quot; instrument_node=&quot;&quot;&gt; and the low heat capacity of the matrix. The average mass change rates were 0.9 kg m&lt;/span&gt;&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6682&quot;&gt;&lt;span data-dcnode-id=&quot;6683&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6681&quot; instrument_node=&quot;&quot;&gt; h&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6679&quot;&gt;&lt;span data-dcnode-id=&quot;6680&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6678&quot; instrument_node=&quot;&quot;&gt;, 1.5 kg m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6676&quot;&gt;&lt;span data-dcnode-id=&quot;6677&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6675&quot; instrument_node=&quot;&quot;&gt; h&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6673&quot;&gt;&lt;span data-dcnode-id=&quot;6674&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6672&quot; instrument_node=&quot;&quot;&gt;, 2.1 kg m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6670&quot;&gt;&lt;span data-dcnode-id=&quot;6671&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6669&quot; instrument_node=&quot;&quot;&gt; h&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6667&quot;&gt;&lt;span data-dcnode-id=&quot;6668&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6666&quot; instrument_node=&quot;&quot;&gt; and 2.65 kg m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6664&quot;&gt;&lt;span data-dcnode-id=&quot;6665&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6663&quot; instrument_node=&quot;&quot;&gt; h&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6661&quot;&gt;&lt;span data-dcnode-id=&quot;6662&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6660&quot; instrument_node=&quot;&quot;&gt; related to the increase of illumination intensity.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6654&quot; id=&quot;p0140&quot;&gt;&lt;span data-dcnode-id=&quot;6658&quot; instrument_node=&quot;&quot;&gt;The temperature fields on the surface of ILCA samples were acquired by an infrared camera when every test went through 1 h (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6656&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6657&quot; instrument_node=&quot;&quot;&gt;Fig. S19&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6655&quot; instrument_node=&quot;&quot;&gt;). It could be observed that the stem of ILCA had higher temperature than the natural big channel of loofah, due to the better light absorbance of stems coated with carbon ink.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6642&quot; id=&quot;p0145&quot;&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6652&quot; href=&quot;#fig0020&quot; name=&quot;bfig0020&quot;&gt;&lt;span data-dcnode-id=&quot;6653&quot; instrument_node=&quot;&quot;&gt;Fig. 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6643&quot;&gt;&lt;span data-dcnode-id=&quot;6647&quot;&gt;&lt;span data-dcnode-id=&quot;6651&quot; instrument_node=&quot;&quot;&gt;f showed the desorption efficiency and solar conversion efficiency of the ILCA. From the figure it was obvious to comprehend the feasibility for direct solar energy-driven AWH by ILCA, because 20% to 32% of desorption efficiency could be achieved during 1.5 h under 0.6–1 &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6649&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/sun-illumination&quot; title=&quot;Learn more about sun illumination from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6650&quot; instrument_node=&quot;&quot;&gt;sun illumination&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6648&quot; instrument_node=&quot;&quot;&gt; intensity. Indeed, the cascade porous structure of ILCA could reduce the reflection of light by utilizing a multi-reflect effect to absorb more light than a smooth surface. The stems and fibers of natural loofah enhanced &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6645&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/waterway-transportation&quot; title=&quot;Learn more about water transportation from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6646&quot; instrument_node=&quot;&quot;&gt;water transportation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6644&quot; instrument_node=&quot;&quot;&gt; and steam diffusion. Lastly, the capillary effect of loofah’s stems held the solution from leaking out, thus ensuring the solution heated in-situ and released rapidly. It was worth emphasizing that in the experiments 70–80% of solar conversion efficiency was achieved, which is more desirable than the best value of our knowledge.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6503&quot; id=&quot;sec0030&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6637&quot; id=&quot;sect0050&quot;&gt;&lt;span data-dcnode-id=&quot;6640&quot; instrument_node=&quot;&quot;&gt;2.4&lt;/span&gt;&lt;span data-dcnode-id=&quot;6639&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6638&quot; instrument_node=&quot;&quot;&gt;Water collection experiments&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;6635&quot; id=&quot;p0150&quot;&gt;&lt;span data-dcnode-id=&quot;6636&quot; instrument_node=&quot;&quot;&gt;To further investigate the potential of the ILCA for water harvesting application, the experiments were conducted in a simulated laboratory condition and a practical outdoor condition with lots of ILCA. When the ILCA was exposed in simulated or atmospheric humid air, it adsorbed sufficient water vapor until the saturation point. When exposed to simulated or outdoor solar irradiation, the ILCA sealed in the container released water vapor by the virtue of the photothermal property of carbon ink, followed by the collection of condensed water on the wall.&lt;/span&gt;&lt;/p&gt;&lt;div data-dcnode-id=&quot;6597&quot;&gt;&lt;p data-dcnode-id=&quot;6624&quot; id=&quot;p0155&quot;&gt;&lt;span data-dcnode-id=&quot;6634&quot; instrument_node=&quot;&quot;&gt;A simple prototype using a glass dish and a plastic container with plastic wrap was developed to harvest water by the passive operation of ILCA (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6632&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6633&quot; instrument_node=&quot;&quot;&gt;Fig. S23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6631&quot; instrument_node=&quot;&quot;&gt;). 4.96 g of the ILCA was set in the constant temperature and humidity chamber to capture water at 25 °C and 80% RH. After 12 h, 6.197 g of water was contained in the ILCA and expected to be further released in the simple device (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6629&quot; href=&quot;#fig0025&quot; name=&quot;bfig0025&quot;&gt;&lt;span data-dcnode-id=&quot;6630&quot; instrument_node=&quot;&quot;&gt;Fig. 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6628&quot; instrument_node=&quot;&quot;&gt;a). Under the simulated solar source, the adsorbed water in the ILCA vaporized and condensed on all the plastic sidewalls&amp;nbsp;with calm wind. The condensed water droplets went through the processes of formation, growth and multiplication, and then due to the gravity larger clusters were collected at the bottom of the plastic container. Undergoing 5 h of desorption process at ~23 °C and 50% RH (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6626&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6627&quot; instrument_node=&quot;&quot;&gt;Fig. S23d&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6625&quot; instrument_node=&quot;&quot;&gt;), 2.791 g of water was obtained and 45.04% of collected rate was achieved.&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;6598&quot; id=&quot;fig0025&quot;&gt;&lt;span data-dcnode-id=&quot;6608&quot;&gt;&lt;img alt=&quot;Fig. 5&quot; aria-describedby=&quot;cap0025&quot; data-dcnode-id=&quot;6623&quot; height=&quot;708&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr5.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;6622&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;6609&quot;&gt;&lt;li data-dcnode-id=&quot;6616&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;6617&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr5_lrg.jpg&quot; target=&quot;_blank&quot; title=&quot;Download high-res image (694KB)&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;6618&quot;&gt;&lt;span data-dcnode-id=&quot;6621&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;6619&quot;&gt;&lt;span data-dcnode-id=&quot;6620&quot; instrument_node=&quot;&quot;&gt;Download high-res image (694KB)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;6610&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;6611&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr5.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;6612&quot;&gt;&lt;span data-dcnode-id=&quot;6615&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;6613&quot;&gt;&lt;span data-dcnode-id=&quot;6614&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;6599&quot;&gt;&lt;span data-dcnode-id=&quot;6600&quot; id=&quot;cap0025&quot;&gt;&lt;p data-dcnode-id=&quot;6601&quot; id=&quot;sp0025&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;6606&quot;&gt;&lt;span data-dcnode-id=&quot;6607&quot; instrument_node=&quot;&quot;&gt;Fig. 5&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6605&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;strong data-dcnode-id=&quot;6603&quot;&gt;&lt;span data-dcnode-id=&quot;6604&quot; instrument_node=&quot;&quot;&gt;Water collection experiments.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;6602&quot; instrument_node=&quot;&quot;&gt; (a) small-scale device for AWH experiment, and photographs about the water droplets formation on wall of the device; (b) desorption process in outdoor test, (c) the weather data and the water uptake at night in adsorption process, (d) the weather data during the day in desorption process; (e) the mass of collected water during certain periods; (f) the quality of collected water compared with WHO standard; (g) the test of cyclic stability of ILCA.&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;6572&quot; id=&quot;p0160&quot;&gt;&lt;span data-dcnode-id=&quot;6596&quot; instrument_node=&quot;&quot;&gt;As for the practical experiment, a small-scale device was fabricated by using cheap and accessible commercial materials, as illustrated in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6594&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6595&quot; instrument_node=&quot;&quot;&gt;Fig. S23a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6573&quot;&gt;&lt;span data-dcnode-id=&quot;6589&quot;&gt;&lt;span data-dcnode-id=&quot;6593&quot; instrument_node=&quot;&quot;&gt;: (1) a plastic bowl with a diameter of 20 cm and a height of 7 cm as a container, (2) &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6591&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/polystyrene&quot; title=&quot;Learn more about polystyrene from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6592&quot; instrument_node=&quot;&quot;&gt;polystyrene&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6590&quot; instrument_node=&quot;&quot;&gt; adiabatic plastic extrusion board covered by &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6587&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/aluminium-foil&quot; title=&quot;Learn more about aluminum foil from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6588&quot; instrument_node=&quot;&quot;&gt;aluminum foil&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6574&quot;&gt;&lt;span data-dcnode-id=&quot;6586&quot; instrument_node=&quot;&quot;&gt; with a diameter of 15 cm as holder and &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6584&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/isolators&quot; title=&quot;Learn more about isolator from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6585&quot; instrument_node=&quot;&quot;&gt;isolator&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6575&quot;&gt;&lt;span data-dcnode-id=&quot;6579&quot;&gt;&lt;span data-dcnode-id=&quot;6583&quot; instrument_node=&quot;&quot;&gt; for ILCA, (3) transparent plastic wrap, (4) plastic switch as water outlet, (5) ~50 g of ILCA as the essential material. Inherent to the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6581&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/low-thermal-conductivity&quot; title=&quot;Learn more about low thermal conductivity from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6582&quot; instrument_node=&quot;&quot;&gt;low thermal conductivity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6580&quot; instrument_node=&quot;&quot;&gt; of PS board and the high &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6577&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/reflectivity&quot; title=&quot;Learn more about reflectivity from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6578&quot; instrument_node=&quot;&quot;&gt;reflectivity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6576&quot; instrument_node=&quot;&quot;&gt; of aluminum foil, the PS board coated with aluminum foil was used to prevent heat transfer.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6545&quot; id=&quot;p0165&quot;&gt;&lt;span data-dcnode-id=&quot;6571&quot; instrument_node=&quot;&quot;&gt;The adsorption, steam liquefaction and storage of water vapor was performed and 17.65 g water was adsorbed at ~6–15 °C and ~60–80% RH for 12 h. 0.353 g g&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6569&quot;&gt;&lt;span data-dcnode-id=&quot;6570&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6568&quot; instrument_node=&quot;&quot;&gt; of water uptake was inferior to the performance of ILCA in constant temperature and humid chamber (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6566&quot; href=&quot;#fig0015&quot; name=&quot;bfig0015&quot;&gt;&lt;span data-dcnode-id=&quot;6567&quot; instrument_node=&quot;&quot;&gt;Fig. 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6565&quot; instrument_node=&quot;&quot;&gt;a, b), owing to the bad convection condition with the wind velocity of 0.03 m s&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6563&quot;&gt;&lt;span data-dcnode-id=&quot;6564&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6562&quot; instrument_node=&quot;&quot;&gt; and the low absolute moisture content of 5 g kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6560&quot;&gt;&lt;span data-dcnode-id=&quot;6561&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6559&quot; instrument_node=&quot;&quot;&gt; dry air outdoor (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6557&quot; href=&quot;#fig0025&quot; name=&quot;bfig0025&quot;&gt;&lt;span data-dcnode-id=&quot;6558&quot; instrument_node=&quot;&quot;&gt;Fig. 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6556&quot; instrument_node=&quot;&quot;&gt;c, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6554&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6555&quot; instrument_node=&quot;&quot;&gt;Fig. S24b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6549&quot;&gt;&lt;span data-dcnode-id=&quot;6553&quot; instrument_node=&quot;&quot;&gt;). After sunrise from ~6:00 am, the outdoor temperature rose from ~7.5 °C to ~17 °C, and the relative humidity changed from ~80% to ~60%. In this condition, the water adsorption continued. The ILCA didn’t adsorb enough moisture overnight that it had the potential to continue adsorbing. It reflected that the ILCA also exhibited desirable moisture capture capability in the day. At 8:00 am, the device was sealed to start the desorption and &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6551&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/condensation-process&quot; title=&quot;Learn more about condensation processes from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6552&quot; instrument_node=&quot;&quot;&gt;condensation processes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6550&quot; instrument_node=&quot;&quot;&gt; under natural sunlight without any concentration (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6547&quot; href=&quot;#fig0025&quot; name=&quot;bfig0025&quot;&gt;&lt;span data-dcnode-id=&quot;6548&quot; instrument_node=&quot;&quot;&gt;Fig. 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6546&quot; instrument_node=&quot;&quot;&gt;b).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6525&quot; id=&quot;p0170&quot;&gt;&lt;span data-dcnode-id=&quot;6544&quot; instrument_node=&quot;&quot;&gt;With ~25 °C of temperature，~20–40% of RH and ~0.3–0.82 kW m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6542&quot;&gt;&lt;span data-dcnode-id=&quot;6543&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6541&quot; instrument_node=&quot;&quot;&gt; of solar intensity (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6539&quot; href=&quot;#fig0025&quot; name=&quot;bfig0025&quot;&gt;&lt;span data-dcnode-id=&quot;6540&quot; instrument_node=&quot;&quot;&gt;Fig. 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6538&quot; instrument_node=&quot;&quot;&gt;d), the ILCA was heated to release water vapor. Consequently, the high partial pressure of water vapor was generated in the container, which let vapor condense on the cold sidewalls and top cover of the device. Meanwhile, the wall of the device was gradually coated with water droplets (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6536&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6537&quot; instrument_node=&quot;&quot;&gt;Fig. S24d&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6535&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6533&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6534&quot; instrument_node=&quot;&quot;&gt;Fig. S24e&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6532&quot; instrument_node=&quot;&quot;&gt;). Therein, the heat of condensation was removed by convective heat transfer, driven by the temperature gradient between the internals of the device and the atmospheric air. Between 8:00 and 16:00, the device obtained 9.116 g of water in total, in which 4.826 g, 1.989 g, 1.483 g and 0.818 g water was separately collected every 2 h consecutively (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6530&quot; href=&quot;#fig0025&quot; name=&quot;bfig0025&quot;&gt;&lt;span data-dcnode-id=&quot;6531&quot; instrument_node=&quot;&quot;&gt;Fig. 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6529&quot; instrument_node=&quot;&quot;&gt;e). In other words, 50% of the collected water was obtained within the first 25% of the time (2 h), and 75% of water was collected by half time (4 h). Compared with the rate of adsorption, the rate of desorption was higher, attributing to the greater potential energy in the desorption process, which also stimulated an original idea that promoted the optimized performance of water harvesting by matching the time between adsorption and desorption rationally. In addition, collected over adsorbed water in the outdoor experiment was 51.6%, which is slightly higher than that of the simulated laboratory experiment. It is owing to that the convective heat-transfer coefficient is greater outdoor resulting from a stronger airflow outside (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6527&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6528&quot; instrument_node=&quot;&quot;&gt;Fig. S24c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6526&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6504&quot; id=&quot;p0175&quot;&gt;&lt;span data-dcnode-id=&quot;6520&quot;&gt;&lt;span data-dcnode-id=&quot;6524&quot; instrument_node=&quot;&quot;&gt;The main reasons contributing to the decrease collected rate were: (1) a majority of the residual part of the water was stuck on the sidewalls of the device; (2) a smaller part of the water was still maintained in the ILCA; (3) other smaller amount of the water was preserved in the internal air (because the temperature inside the device was a little higher than the outdoor air, so it had greater absolute moisture content compared to the open air). Based on these observations, approaches to further optimize the structural design are required in the future. Lastly, by &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6522&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/inductively-coupled-plasma-mass-spectrometry&quot; title=&quot;Learn more about inductively coupled plasma mass spectrometry from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6523&quot; instrument_node=&quot;&quot;&gt;inductively coupled plasma mass spectrometry&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6521&quot; instrument_node=&quot;&quot;&gt; (ICP-MS) test, the quality of harvested water was approved to meet with the World Health Organization (WHO) standard (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6518&quot; href=&quot;#fig0025&quot; name=&quot;bfig0025&quot;&gt;&lt;span data-dcnode-id=&quot;6519&quot; instrument_node=&quot;&quot;&gt;Fig. 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6517&quot; instrument_node=&quot;&quot;&gt;f). Consequently, the stability of ILCA was demonstrated by making it operate for 18 cycles (adsorbed for 4 h and desorbed for 1 h) (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6515&quot; href=&quot;#fig0025&quot; name=&quot;bfig0025&quot;&gt;&lt;span data-dcnode-id=&quot;6516&quot; instrument_node=&quot;&quot;&gt;Fig. 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6514&quot; instrument_node=&quot;&quot;&gt;g). After multiple adsorption-desorption process, the ILCA still possesses excellent water sorption performance with little degradation and migration (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6512&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6513&quot; instrument_node=&quot;&quot;&gt;Fig. S25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6511&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6509&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6510&quot; instrument_node=&quot;&quot;&gt;Fig. S26&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6508&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6506&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6507&quot; instrument_node=&quot;&quot;&gt;Fig. S27&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6505&quot; instrument_node=&quot;&quot;&gt;). According to the above experiments, we demonstrate the fact that the simple device using ILCA as sorbent is excellent for atmospheric water harvesting application.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6426&quot; id=&quot;sec0035&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6499&quot; id=&quot;sect0055&quot;&gt;&lt;span data-dcnode-id=&quot;6502&quot; instrument_node=&quot;&quot;&gt;2.5&lt;/span&gt;&lt;span data-dcnode-id=&quot;6501&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6500&quot; instrument_node=&quot;&quot;&gt;Comprehensive comparisons&lt;/span&gt;&lt;/h3&gt;&lt;div data-dcnode-id=&quot;6451&quot;&gt;&lt;p data-dcnode-id=&quot;6479&quot; id=&quot;p0180&quot;&gt;&lt;span data-dcnode-id=&quot;6498&quot; instrument_node=&quot;&quot;&gt;Many underdeveloped regions on earth have urged acquirement for sufficient water resources &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6496&quot; href=&quot;#bib48&quot; name=&quot;bbib48&quot;&gt;&lt;span data-dcnode-id=&quot;6497&quot; instrument_node=&quot;&quot;&gt;[48]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6495&quot; instrument_node=&quot;&quot;&gt;. In order to propose some sorbents met with the situation for poor people, evaluating their comprehensive performance related to all aspects is quite significant. Thus the present study compares with previous typical works comprehensively by four qualitative indices including the cost for AWH, preparation difficulty, capacity for AWH and pollution degree (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6493&quot; href=&quot;#fig0030&quot; name=&quot;bfig0030&quot;&gt;&lt;span data-dcnode-id=&quot;6494&quot; instrument_node=&quot;&quot;&gt;Fig. 6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6492&quot; instrument_node=&quot;&quot;&gt;). The five excellent sorbents &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6490&quot; href=&quot;#bib49&quot; name=&quot;bbib49&quot;&gt;&lt;span data-dcnode-id=&quot;6491&quot; instrument_node=&quot;&quot;&gt;[49]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6489&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6487&quot; href=&quot;#bib50&quot; name=&quot;bbib50&quot;&gt;&lt;span data-dcnode-id=&quot;6488&quot; instrument_node=&quot;&quot;&gt;[50]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6486&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6484&quot; href=&quot;#bib51&quot; name=&quot;bbib51&quot;&gt;&lt;span data-dcnode-id=&quot;6485&quot; instrument_node=&quot;&quot;&gt;[51]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6483&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6481&quot; href=&quot;#bib52&quot; name=&quot;bbib52&quot;&gt;&lt;span data-dcnode-id=&quot;6482&quot; instrument_node=&quot;&quot;&gt;[52]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6480&quot; instrument_node=&quot;&quot;&gt;, which showed an outstanding result in water harvesting from recent articles, were chosen and evaluated in comparison to ILCA.&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;6452&quot; id=&quot;fig0030&quot;&gt;&lt;span data-dcnode-id=&quot;6463&quot;&gt;&lt;img alt=&quot;Fig. 6&quot; aria-describedby=&quot;cap0030&quot; data-dcnode-id=&quot;6478&quot; height=&quot;281&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr6.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;6477&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;6464&quot;&gt;&lt;li data-dcnode-id=&quot;6471&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;6472&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr6_lrg.jpg&quot; target=&quot;_blank&quot; title=&quot;Download high-res image (97KB)&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;6473&quot;&gt;&lt;span data-dcnode-id=&quot;6476&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;6474&quot;&gt;&lt;span data-dcnode-id=&quot;6475&quot; instrument_node=&quot;&quot;&gt;Download high-res image (97KB)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;6465&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;6466&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr6.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;6467&quot;&gt;&lt;span data-dcnode-id=&quot;6470&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;6468&quot;&gt;&lt;span data-dcnode-id=&quot;6469&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;6453&quot;&gt;&lt;span data-dcnode-id=&quot;6454&quot; id=&quot;cap0030&quot;&gt;&lt;p data-dcnode-id=&quot;6455&quot; id=&quot;sp0030&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;6461&quot;&gt;&lt;span data-dcnode-id=&quot;6462&quot; instrument_node=&quot;&quot;&gt;Fig. 6&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6460&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6459&quot; instrument_node=&quot;&quot;&gt;Comprehensive Comparison between ILCA and &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6457&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sorbent&quot; title=&quot;Learn more about sorbents from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6458&quot; instrument_node=&quot;&quot;&gt;sorbents&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6456&quot; instrument_node=&quot;&quot;&gt; presented in recent articles. (Notes: with the increase of the level from ‘1′ to ‘5′, the capability of sorbent decrease. The small areas represent the better comprehensive capacity of the sorbent.).&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;6437&quot; id=&quot;p0185&quot;&gt;&lt;span data-dcnode-id=&quot;6450&quot; instrument_node=&quot;&quot;&gt;In terms of materials cost, the CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6448&quot;&gt;&lt;span data-dcnode-id=&quot;6449&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6447&quot; instrument_node=&quot;&quot;&gt;, the commercial carbon ink and the natural loofah sponge are cheap enough. In aspects of capacity for AWH, combining CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6445&quot;&gt;&lt;span data-dcnode-id=&quot;6446&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6444&quot; instrument_node=&quot;&quot;&gt; with loofah makes ILCA superior in static and dynamic adsorption performance. The carbon ink with exceptionable light adsorption makes ILCA excellent in the passive desorption process for AWH. The ILCA is cost-effective that costs less than SNFs, GO-Cellulose-LiCl, CNF monolith and CNT-PAM-CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6442&quot;&gt;&lt;span data-dcnode-id=&quot;6443&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6441&quot; instrument_node=&quot;&quot;&gt;. It was worth mentioning that theoretical calculations related to ILCA showed it could save 22%−98% of the total costs (0.84 $ kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6439&quot;&gt;&lt;span data-dcnode-id=&quot;6440&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6438&quot; instrument_node=&quot;&quot;&gt;) compared to other sorbents when considering the same water production. During practical experiments, it took ~1.4% of the cost in previous article (GO-Cellulose-LiCl).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6432&quot; id=&quot;p0190&quot;&gt;&lt;span data-dcnode-id=&quot;6436&quot; instrument_node=&quot;&quot;&gt;Resulting from the comparison of technologies related to freezing dry, electrospinning, and &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6434&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/3d-printing&quot; title=&quot;Learn more about 3D printing from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6435&quot; instrument_node=&quot;&quot;&gt;3D printing&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6433&quot; instrument_node=&quot;&quot;&gt; employed by other sorbents (Table S.3), other sorbents are complicated and energy-intensive. Similarly, some organic or toxic materials were utilized during material preparations, triggering some pollution problems. As a consequence, ILCA and SNFs were relatively safer than other listed sorbents.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6427&quot; id=&quot;p0195&quot;&gt;&lt;span data-dcnode-id=&quot;6431&quot; instrument_node=&quot;&quot;&gt;In addition, the AWH capacity was mainly based on its water uptake in laboratory tests, its water product in devices and its feasibility without energy input. Synthesizing the critical factors emphasized above, ILCA, GO-Cellulose-LiCl and CNT-PAM-CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6429&quot;&gt;&lt;span data-dcnode-id=&quot;6430&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6428&quot; instrument_node=&quot;&quot;&gt; possess more potentials for AWH in arid areas. Apparently, the ILCA stood out compared with other excellent sorbents in comprehensive aspects.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6411&quot; id=&quot;sec0040&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6421&quot; id=&quot;sect0060&quot;&gt;&lt;span data-dcnode-id=&quot;6424&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;span data-dcnode-id=&quot;6423&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6422&quot; instrument_node=&quot;&quot;&gt;Conclusion&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;6412&quot; id=&quot;p0200&quot;&gt;&lt;span data-dcnode-id=&quot;6416&quot;&gt;&lt;span data-dcnode-id=&quot;6420&quot; instrument_node=&quot;&quot;&gt;In this study, we have developed a novel &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6418&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sorbent&quot; title=&quot;Learn more about sorbent from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6419&quot; instrument_node=&quot;&quot;&gt;sorbent&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6417&quot; instrument_node=&quot;&quot;&gt; that is quite cheap, and has sustainable and admirable sorption-desorption properties for passive AWH. Its advantages are comprehensively presented and compared with sorbents in previous articles for the first time by theoretic analysis and a series of experiments. The ILCA can adsorb moisture in a wide arid range, release rapidly and collect water easily by the virtue of carbon ink, meanwhile, its costs (0.84 $ kg&lt;/span&gt;&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6414&quot;&gt;&lt;span data-dcnode-id=&quot;6415&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6413&quot; instrument_node=&quot;&quot;&gt; water) are the lowest in comparison with other sorbents. In a practical device, 2.791 g water was obtained by 4.96 g ILCA during 5 h. To the best of our knowledge, the ILCA developed in this study provides a multi-objective balance between performance, availability, economics, and environmental sustainability, thus harbors great potential to commercialize AWH in various application situations, in particular for underdeveloped countries.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;4819&quot; id=&quot;sec0045&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6407&quot; id=&quot;sect0065&quot;&gt;&lt;span data-dcnode-id=&quot;6410&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;span data-dcnode-id=&quot;6409&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6408&quot; instrument_node=&quot;&quot;&gt;Experimental section&lt;/span&gt;&lt;/h2&gt;&lt;section data-dcnode-id=&quot;6386&quot; id=&quot;sec0050&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6403&quot; id=&quot;sect0070&quot;&gt;&lt;span data-dcnode-id=&quot;6406&quot; instrument_node=&quot;&quot;&gt;4.1&lt;/span&gt;&lt;span data-dcnode-id=&quot;6405&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6404&quot; instrument_node=&quot;&quot;&gt;Chemicals and materials&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;6387&quot; id=&quot;p0205&quot;&gt;&lt;span data-dcnode-id=&quot;6399&quot;&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6401&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/sodium-alginate&quot; title=&quot;Learn more about Sodium alginate from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6402&quot; instrument_node=&quot;&quot;&gt;Sodium alginate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6400&quot; instrument_node=&quot;&quot;&gt; (AR, 90%, M/G=2:1, Shanghai Macklin), calcium chloride (CaCl&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6397&quot;&gt;&lt;span data-dcnode-id=&quot;6398&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6388&quot;&gt;&lt;span data-dcnode-id=&quot;6392&quot;&gt;&lt;span data-dcnode-id=&quot;6396&quot; instrument_node=&quot;&quot;&gt;, 99%, Sigma-Aldrich) were used in experiments. The loofah sponges, purchased from a local farm in Shanghai, were cut into &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6394&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/cylindrical-shape&quot; title=&quot;Learn more about cylindrical shapes from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6395&quot; instrument_node=&quot;&quot;&gt;cylindrical shapes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6393&quot; instrument_node=&quot;&quot;&gt; with a thickness of 10 mm, and then washed by &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6390&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/deionized-water&quot; title=&quot;Learn more about deionized water from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6391&quot; instrument_node=&quot;&quot;&gt;deionized water&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6389&quot; instrument_node=&quot;&quot;&gt;. The carbon ink (Hero ink, No 234 A) was purchased from an official store in Shanghai.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6379&quot; id=&quot;sec0055&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6382&quot; id=&quot;sect0075&quot;&gt;&lt;span data-dcnode-id=&quot;6385&quot; instrument_node=&quot;&quot;&gt;4.2&lt;/span&gt;&lt;span data-dcnode-id=&quot;6384&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6383&quot; instrument_node=&quot;&quot;&gt;Fabrication of Loofah Grafted Sodium Alginate(LSA)&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;6380&quot; id=&quot;p0210&quot;&gt;&lt;span data-dcnode-id=&quot;6381&quot; instrument_node=&quot;&quot;&gt;The loofah sponges (5 g) were washed by deionized water thoroughly and dried in an oven at 80 °C before use. An 8.0 g aliquot of sodium alginate (SA) was dissolved in 400 ml of DI water and stirred into a homogeneous solution. The next step involved the immersion of the treated loofah sponges in sodium alginate solution overnight. The LSA was produced by direct drying of the loofah sponges coated with sodium alginate.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6345&quot; id=&quot;sec0060&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6375&quot; id=&quot;sect0080&quot;&gt;&lt;span data-dcnode-id=&quot;6378&quot; instrument_node=&quot;&quot;&gt;4.3&lt;/span&gt;&lt;span data-dcnode-id=&quot;6377&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6376&quot; instrument_node=&quot;&quot;&gt;Fabrication of Loofah Grafted Calcium Alginate with or without Ink (ILCA&amp;amp;LCA)&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;6348&quot; id=&quot;p0215&quot;&gt;&lt;span data-dcnode-id=&quot;6374&quot; instrument_node=&quot;&quot;&gt;A 100 g of calcium chloride powder (CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6372&quot;&gt;&lt;span data-dcnode-id=&quot;6373&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6371&quot; instrument_node=&quot;&quot;&gt;) was dissolved in 300 ml of deionized water to get an 25 wt% CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6369&quot;&gt;&lt;span data-dcnode-id=&quot;6370&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6368&quot; instrument_node=&quot;&quot;&gt; solution. Then, the loofah sponges coated with sodium alginates were immersed in CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6366&quot;&gt;&lt;span data-dcnode-id=&quot;6367&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6365&quot; instrument_node=&quot;&quot;&gt; solution which supplied Ca&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6363&quot;&gt;&lt;span data-dcnode-id=&quot;6364&quot; instrument_node=&quot;&quot;&gt;2+&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6358&quot;&gt;&lt;span data-dcnode-id=&quot;6362&quot; instrument_node=&quot;&quot;&gt; for the ionotropic &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6360&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/gelation&quot; title=&quot;Learn more about gelation from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6361&quot; instrument_node=&quot;&quot;&gt;gelation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6359&quot; instrument_node=&quot;&quot;&gt;. During this reaction process, the Ca&lt;/span&gt;&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6356&quot;&gt;&lt;span data-dcnode-id=&quot;6357&quot; instrument_node=&quot;&quot;&gt;2+&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6355&quot; instrument_node=&quot;&quot;&gt; matched up every void created by two G-block from two chains and created a 3D cross-linked polymeric network called an “egg-box” &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6353&quot; href=&quot;#bib53&quot; name=&quot;bbib53&quot;&gt;&lt;span data-dcnode-id=&quot;6354&quot; instrument_node=&quot;&quot;&gt;[53]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6352&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6350&quot; href=&quot;#bib54&quot; name=&quot;bbib54&quot;&gt;&lt;span data-dcnode-id=&quot;6351&quot; instrument_node=&quot;&quot;&gt;[54]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6349&quot; instrument_node=&quot;&quot;&gt;. After the complete crosslink of calcium alginate, the loofah continued to suck salty solution until the salty solution diffuse equally. After 48 h, drying the samples and getting the ultimate product--LCA.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6346&quot; id=&quot;p0220&quot;&gt;&lt;span data-dcnode-id=&quot;6347&quot; instrument_node=&quot;&quot;&gt;The last step involved the addition of a certain amount of carbon ink into the SA solution, making the ratio of sodium alginate solution to carbon ink 10:1. Then, repeating all above procedures, the ILCA was formed.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6308&quot; id=&quot;sec0065&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6341&quot; id=&quot;sect0085&quot;&gt;&lt;span data-dcnode-id=&quot;6344&quot; instrument_node=&quot;&quot;&gt;4.4&lt;/span&gt;&lt;span data-dcnode-id=&quot;6343&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6342&quot; instrument_node=&quot;&quot;&gt;Material characterization&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;6309&quot; id=&quot;p0225&quot;&gt;&lt;span data-dcnode-id=&quot;6328&quot;&gt;&lt;span data-dcnode-id=&quot;6332&quot;&gt;&lt;span data-dcnode-id=&quot;6340&quot; instrument_node=&quot;&quot;&gt;JSM-7800 F &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6338&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/scanning-electron-microscope&quot; title=&quot;Learn more about Scanning electron microscope from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6339&quot; instrument_node=&quot;&quot;&gt;Scanning electron microscope&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6333&quot;&gt;&lt;span data-dcnode-id=&quot;6337&quot; instrument_node=&quot;&quot;&gt; (SEM) was used to determine the morphology and structure of materials. &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6335&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/energy-dispersive-spectrometer&quot; title=&quot;Learn more about Energy Dispersive Spectrometer from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6336&quot; instrument_node=&quot;&quot;&gt;Energy Dispersive Spectrometer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6334&quot; instrument_node=&quot;&quot;&gt; (EDS) mapping analysis of &lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6330&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/life-cycle-assessment&quot; title=&quot;Learn more about LCA from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6331&quot; instrument_node=&quot;&quot;&gt;LCA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6329&quot; instrument_node=&quot;&quot;&gt; and ILCA was applied to ensure the existence of CaCl&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6326&quot;&gt;&lt;span data-dcnode-id=&quot;6327&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6313&quot;&gt;&lt;span data-dcnode-id=&quot;6325&quot; instrument_node=&quot;&quot;&gt; within the LCA/ILCA. Both Fourier-transform infrared spectroscopy (FT-IR, Nicolet 6700) and X-ray diffraction (XRD, D8 ADVANCE Da Vinci) demonstrated the composition of the materials further. And the absorbance of LCA and ILCA were measured by an ultraviolet visible near-infrared spectroscopy (UV–vis–NIR, Lamda950). &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6323&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/inductively-coupled-plasma&quot; title=&quot;Learn more about Inductively coupled plasma from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6324&quot; instrument_node=&quot;&quot;&gt;Inductively coupled plasma&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6314&quot;&gt;&lt;span data-dcnode-id=&quot;6318&quot;&gt;&lt;span data-dcnode-id=&quot;6322&quot; instrument_node=&quot;&quot;&gt; mass &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6320&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/emission-spectroscopy&quot; title=&quot;Learn more about emission spectroscopy from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6321&quot; instrument_node=&quot;&quot;&gt;emission spectroscopy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6319&quot; instrument_node=&quot;&quot;&gt; (ICP-MS, I CAP Q) was conducted to test the quality of harvested water. The &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6316&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/thermogravimetric-analysis&quot; title=&quot;Learn more about thermogravimetric analysis from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6317&quot; instrument_node=&quot;&quot;&gt;thermogravimetric analysis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6315&quot; instrument_node=&quot;&quot;&gt; (TGA) is conducted by the thermogravimetric analyzer (Pyris 1). We set that the temperature increased from 30 °C to 700 °C with the rate of 20 °C min&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6311&quot;&gt;&lt;span data-dcnode-id=&quot;6312&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6310&quot; instrument_node=&quot;&quot;&gt; using the nitrogen atmosphere.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6162&quot; id=&quot;sec0070&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6304&quot; id=&quot;sect0090&quot;&gt;&lt;span data-dcnode-id=&quot;6307&quot; instrument_node=&quot;&quot;&gt;4.5&lt;/span&gt;&lt;span data-dcnode-id=&quot;6306&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6305&quot; instrument_node=&quot;&quot;&gt;Water sorption experiments&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;6163&quot; id=&quot;p0230&quot;&gt;&lt;span data-dcnode-id=&quot;6299&quot;&gt;&lt;span data-dcnode-id=&quot;6303&quot; instrument_node=&quot;&quot;&gt;Firstly, the LCA, ILCA, &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6301&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/silica-gel&quot; title=&quot;Learn more about silica gel from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6302&quot; instrument_node=&quot;&quot;&gt;silica gel&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6300&quot; instrument_node=&quot;&quot;&gt;, silica-CaCl&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6297&quot;&gt;&lt;span data-dcnode-id=&quot;6298&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6296&quot; instrument_node=&quot;&quot;&gt;, Al&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6294&quot;&gt;&lt;span data-dcnode-id=&quot;6295&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6293&quot; instrument_node=&quot;&quot;&gt;O&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6291&quot;&gt;&lt;span data-dcnode-id=&quot;6292&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6290&quot; instrument_node=&quot;&quot;&gt;, Al&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6288&quot;&gt;&lt;span data-dcnode-id=&quot;6289&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6287&quot; instrument_node=&quot;&quot;&gt;O&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6285&quot;&gt;&lt;span data-dcnode-id=&quot;6286&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6280&quot;&gt;&lt;span data-dcnode-id=&quot;6284&quot; instrument_node=&quot;&quot;&gt;-LiCl, 13X were simultaneously placed in the humidity chamber with fixed temperature and humidity (25 °C; 30% RH, 60% RH and 90% RH) to verify the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6282&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/adsorption-capacity&quot; title=&quot;Learn more about adsorption capacities from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6283&quot; instrument_node=&quot;&quot;&gt;adsorption capacities&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6281&quot; instrument_node=&quot;&quot;&gt; of LCA and ILCA. Secondly, the dynamic performance of materials was tested by Jupiter Thermal Analyzer (STA 449 F3) coupled with a humidity generator during the following air conditions: 20% RH, 50% RH and 80% RH with 30 °C. The procedure of measurements using STA was first stabilized at 30 °C for 12 h, and then heated up to 80 °C followed by holding it for 8 h, in which the humidity was fixed at 20% RH, 50% RH and 80% RH separately. The water uptake of these samples during the moisture adsorption experiments was calculated by the equation:&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;display&quot; data-dcnode-id=&quot;6183&quot;&gt;&lt;span class=&quot;formula&quot; data-dcnode-id=&quot;6184&quot; id=&quot;eqn0005&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;6278&quot;&gt;&lt;span data-dcnode-id=&quot;6279&quot; instrument_node=&quot;&quot;&gt;(1)&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;math&quot; data-dcnode-id=&quot;6185&quot;&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;6277&quot; style=&quot;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;MathJax_SVG&quot; data-dcnode-id=&quot;6188&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mrow is=&amp;quot;true&amp;quot;&gt;&lt;msub is=&amp;quot;true&amp;quot;&gt;&lt;mrow is=&amp;quot;true&amp;quot;&gt;&lt;mi is=&amp;quot;true&amp;quot;&gt;U&lt;/mi&gt;&lt;/mrow&gt;&lt;mrow is=&amp;quot;true&amp;quot
