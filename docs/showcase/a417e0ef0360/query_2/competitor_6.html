sisted of plastic containers, ILCA and plastic wraps. In the simulated laboratory experiment, firstly, the ILCA held in the glass dish was set in the humid chamber to adsorb moisture at ~25 °C and 80% RH for 12 h. The simple device was exposed to the simulated solar source with the irradiation intensity of 1 kW m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;5428&quot;&gt;&lt;span data-dcnode-id=&quot;5429&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;5419&quot;&gt;&lt;span data-dcnode-id=&quot;5423&quot;&gt;&lt;span data-dcnode-id=&quot;5427&quot; instrument_node=&quot;&quot;&gt;. Consequently, the water was released by the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;5425&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sorbent&quot; title=&quot;Learn more about sorbent from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;5426&quot; instrument_node=&quot;&quot;&gt;sorbent&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5424&quot; instrument_node=&quot;&quot;&gt; material and condensed on the sidewalls and the top cover for 5 h. In the practical outdoor experiment (24–25th March; Sino-Italian Green Energy Laboratory in Minhang Campus of Shanghai Jiao Tong University in Shanghai, China), firstly, the ILCA held in the PS board with &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;5421&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/aluminium-foil&quot; title=&quot;Learn more about aluminum foil from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;5422&quot; instrument_node=&quot;&quot;&gt;aluminum foil&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5420&quot; instrument_node=&quot;&quot;&gt;, was set on the roof of our laboratory to capture atmospheric water vapor overnight for 12 h (from 8:00 pm to 8:00 am, calm wind, cold and dry). After the sunrise, the device was sealed and faced the sun for water release and collection from 8:00 am to 4:00 pm. Also, the mass of water adsorption and collection were separately recorded. The ratio of collected over adsorbed water (&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;math&quot; data-dcnode-id=&quot;5390&quot;&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;5418&quot; style=&quot;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;MathJax_SVG&quot; data-dcnode-id=&quot;5393&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;msub is=&amp;quot;true&amp;quot;&gt;&lt;mrow is=&amp;quot;true&amp;quot;&gt;&lt;mi is=&amp;quot;true&amp;quot;&gt;R&lt;/mi&gt;&lt;/mrow&gt;&lt;mrow is=&amp;quot;true&amp;quot;&gt;&lt;mi mathvariant=&amp;quot;italic&amp;quot; is=&amp;quot;true&amp;quot;&gt;col&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-12-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 90%; display: inline-block; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;svg aria-hidden=&quot;true&quot; data-dcnode-id=&quot;5403&quot; focusable=&quot;false&quot; height=&quot;2.341ex&quot; role=&quot;img&quot; style=&quot;vertical-align: -0.618ex;&quot; viewBox=&quot;0 -741.6 1720.4 1007.7&quot; width=&quot;3.996ex&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;g data-dcnode-id=&quot;5404&quot; fill=&quot;currentColor&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;0&quot; transform=&quot;matrix(1 0 0 -1 0 0)&quot;&gt;&lt;g data-dcnode-id=&quot;5405&quot; is=&quot;true&quot;&gt;&lt;g data-dcnode-id=&quot;5414&quot; is=&quot;true&quot;&gt;&lt;g data-dcnode-id=&quot;5415&quot; is=&quot;true&quot;&gt;&lt;use data-dcnode-id=&quot;5416&quot; href=&quot;#MJMATHI-52&quot;&gt;&lt;path d=&quot;M230 637Q203 637 198 638T193 649Q193 ta-dcnode-id=&quot;277&quot; instrument_node=&quot;&quot;&gt;Fangfang Deng&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;275&quot; instrument_node=&quot;&quot;&gt; is a Ph. D student supervised by Prof. Ruzhu Wang at Engineering Research Center of Solar Power &amp;amp; Refrigeration (MOE China), Shanghai Jiao Tong University. She received her B.S. degree in Energy and Power Engineering in 2019 at Huazhong University of Science and Technology. Her research interests focus on sorption-based atmospheric water harvesting and solar heat utilization.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;article-biography&quot; data-dcnode-id=&quot;266&quot; id=&quot;bio2&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;272&quot; height=&quot;151&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-fx2.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;271&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;p data-dcnode-id=&quot;267&quot; id=&quot;sp0060&quot;&gt;&lt;strong data-dcnode-id=&quot;269&quot;&gt;&lt;span data-dcnode-id=&quot;270&quot; instrument_node=&quot;&quot;&gt;Chenxi Wang&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt; is a Ph. D student supervised by Prof. Ruzhu Wang at Engineering Research Center of Solar Power &amp;amp; Refrigeration (MOE China), Shanghai Jiao Tong University. He received his B.S. degree in Nanjing University of Aeronautics and Astronautics. His research interests focus on microclimate management in greenhouses and water harvesting technology.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;article-biography&quot; data-dcnode-id=&quot;259&quot; id=&quot;bio3&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;265&quot; height=&quot;151&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-fx3.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;p data-dcnode-id=&quot;260&quot; id=&quot;sp0065&quot;&gt;&lt;strong data-dcnode-id=&quot;262&quot;&gt;&lt;span data-dcnode-id=&quot;263&quot; instrument_node=&quot;&quot;&gt;Chengjie Xiang&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;261&quot; instrument_node=&quot;&quot;&gt; is currently a Postdoctoral Fellow in Prof. Wang Ruzhu’s research group at Engineering Research Center of Solar Power &amp;amp; Refrigeration (MOE China), Shanghai Jiao Tong University. He received his Ph.D. degree in 2018 in Materials Science from Chongqing University. His current research interests focus on sorption-based atmospheric water harvesting, efficient thermal management of electronic devices.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;article-biography&quot; data-dcnode-id=&quot;252&quot; id=&quot;bio4&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;258&quot; height=&quot;151&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-fx4.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;257&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;p data-dcnode-id=&quot;253&quot; id=&quot;sp0070&quot;&gt;&lt;strong data-dcnode-id=&quot;255&quot;&gt;&lt;span data-dcnode-id=&quot;256&quot; instrument_node=&quot;&quot;&gt;Ruzhu Wang&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;254&quot; instrument_node=&quot;&quot;&gt; is a chair professor at Shanghai Jiao Tong University (SJTU) and the director of the Institute of Refrigeration and Cryogenics. He graduated from SJTU in 1984, 1987 and 1990 for his bachelor, master and PhD degrees respectively. He was promoted as associate professor in 1992, and full professor in 1994 in SJTU. His research interests include solar energy，heat pumps, thermal driven sorption cycles, and green building energy systems. He has been honored to receive prestigious international research awards in Refrigeration and Thermal Sciences, such as J&amp;amp;E Hall Gold Medal, Nukiyama memory award, and IIR-Gustav Lorentzen Medal.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;a class=&quot;anchor abstract-link&quot; data-dcnode-id=&quot;249&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S2211285521008934&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;250&quot;&gt;&lt;span data-dcnode-id=&quot;251&quot; instrument_node=&quot;&quot;&gt;View Abstract&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;div class=&quot;Copyright&quot; data-dcnode-id=&quot;246&quot;&gt;&lt;span class=&quot;copyright-line&quot; data-dcnode-id=&quot;247&quot;&gt;&lt;span data-dcnode-id=&quot;248&quot; instrument_node=&quot;&quot;&gt;© 2021 Elsevier Ltd. All rights reserved.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/article&gt;&lt;div class=&quot;u-show-from-md col-lg-6 col-md-8 pad-right&quot; data-dcnode-id=&quot;127&quot;&gt;&lt;aside aria-label=&quot;Related content&quot; class=&quot;RelatedContent&quot; data-dcnode-id=&quot;128&quot;&gt;&lt;section class=&quot;SidePanel u-margin-s-bottom&quot; data-dcnode-id=&quot;140&quot;&gt;&lt;header class=&quot;side-panel-header u-margin-s-bottom&quot; data-dcnode-id=&quot;238&quot; id=&quot;recommended-articles-header&quot;&gt;&lt;button aria-expanded=&quot;true&quot; class=&quot;button-link side-panel-toggle is-up button-link-primary&quot; data-aa-button=&quot;sd:product:journal:article:location=recommended-articles:type=close&quot; data-dcnode-id=&quot;239&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;242&quot;&gt;&lt;h2 class=&quot;section-title u-h4&quot; data-dcnode-id=&quot;243&quot;&gt;&lt;span data-dcnode-id=&quot;244&quot; instrument_node=&quot;&quot;&gt;Recommended articles&lt;/span&gt;&lt;/h2&gt;&lt
