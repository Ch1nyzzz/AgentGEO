&lt;/span&gt;&lt;meta content=&quot;As a promising technology for water scarcity alleviation, Atmospheric Water Harvesting (AWH) appeals for adsorbents with high performance, low cost, l…&quot; data-dcnode-id=&quot;8153&quot; property=&quot;og:description&quot;&gt;&lt;span data-dcnode-id=&quot;8152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;meta content=&quot;&lt;div class=&amp;quot;Abstracts u-font-serif&amp;quot; id=&amp;quot;abstracts&amp;quot;&gt;&lt;div class=&amp;quot;abstract author&amp;quot; id=&amp;quot;ab0010&amp;quot;&gt;&lt;h2 class=&amp;quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&amp;quot;&gt;Abstract&lt;/h2&gt;&lt;div id=&amp;quot;abs0010&amp;quot;&gt;&lt;p id=&amp;quot;sp0035&amp;quot;&gt;As a promising technology for water scarcity alleviation, Atmospheric Water Harvesting (AWH) appeals for adsorbents with high performance, low cost, low environmental impact, and low energy consumption for practical application. Herein, a super hygroscopic complex based on natural Loofah grafted Calcium Alginate sorbent with Ink (ILCA) with comprehensive performance assessment is developed for the first time. It is found that the sorbent can adsorb 0.5–1.2&amp;nbsp;g&amp;nbsp;g&lt;sup&gt;−1&lt;/sup&gt; water at 30%−60% RH, then desorb it rapidly under 1 sun (1.5&amp;nbsp;kg&amp;nbsp;m&lt;sup&gt;−2&lt;/sup&gt; h&lt;sup&gt;−1&lt;/sup&gt;)). Moreover, around 2.8&amp;nbsp;g of water can be collected by 4.96&amp;nbsp;g ILCA in 5&amp;nbsp;h (23&amp;nbsp;°C, RH50%). This work further conducted a techno-economic analysis of ILCA and found that 1&amp;nbsp;kg water can be harvested with a material cost of only $0.84 (e.g. cheapest option in literature). Such results harbor the potential for sustainable, eco-friendly, and cheap AWH that can be used in underdeveloped regions with high solar energy potential.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&quot; data-dcnode-id=&quot;8151&quot; lang=&quot;en&quot; name=&quot;citation_abstract&quot;&gt;&lt;span data-dcnode-id=&quot;8150&quot; instrument_node=&quot;&quot;&gt;

herName%3DELS%26contentID%3DS2211285521008934%26orderBeanReset%3Dtrue&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;7592&quot; instrument_node=&quot;&quot;&gt;Get rights and content&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;section class=&quot;ReferencedArticles&quot; data-dcnode-id=&quot;7589&quot;&gt;&lt;/section&gt;&lt;section class=&quot;ReferencedArticles&quot; data-dcnode-id=&quot;7588&quot;&gt;&lt;/section&gt;&lt;div class=&quot;PageDivider&quot; data-dcnode-id=&quot;7587&quot;&gt;&lt;/div&gt;&lt;div class=&quot;Abstracts u-font-serif&quot; data-dcnode-id=&quot;7506&quot; id=&quot;abstracts&quot;&gt;&lt;div class=&quot;abstract author-highlights&quot; data-dcnode-id=&quot;7558&quot; id=&quot;ab0020&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7585&quot;&gt;&lt;span data-dcnode-id=&quot;7586&quot; instrument_node=&quot;&quot;&gt;Highlights&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;7559&quot; id=&quot;abs0020&quot;&gt;&lt;p data-dcnode-id=&quot;7560&quot; id=&quot;sp0045&quot;&gt;&lt;/p&gt;&lt;dl class=&quot;list&quot; data-dcnode-id=&quot;7561&quot;&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;7583&quot;&gt;&lt;span data-dcnode-id=&quot;7584&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;7580&quot;&gt;&lt;p data-dcnode-id=&quot;7581&quot; id=&quot;p0005&quot;&gt;&lt;span data-dcnode-id=&quot;7582&quot; instrument_node=&quot;&quot;&gt;Natural hierarchical framework derived from pristine loofah contributes to ILCA’s heat and mass transfer.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;7578&quot;&gt;&lt;span data-dcnode-id=&quot;7579&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;7572&quot;&gt;&lt;p data-dcnode-id=&quot;7573&quot; id=&quot;p0010&quot;&gt;&lt;span data-dcnode-id=&quot;7577&quot; instrument_node=&quot;&quot;&gt;The encapsulation of hygroscopic CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;7575&quot;&gt;&lt;span data-dcnode-id=&quot;7576&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;7574&quot; instrument_node=&quot;&quot;&gt; into loofah’s fibers make ILCA outstanding in atmospheric water harvesting.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;7570&quot;&gt;&lt;span data-dcnode-id=&quot;7571&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;7567&quot;&gt;&lt;p data-dcnode-id=&quot;7568&quot; id=&quot;p0015&quot;&gt;&lt;span data-dcnode-id=&quot;7569&quot; instrument_node=&quot;&quot;&gt;Carbon ink endows ILCA with excellent photothermal property and promotes its adsorption and desorption capacities.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;7565&quot;&gt;&lt;span data-dcnode-id=&quot;7566&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;7562&quot;&gt;&lt;p data-dcnode-id=&quot;7563&quot; id=&quot;p0020&quot;&gt;&lt;span data-dcnode-id=&quot;7564&quot; instrument_node=&quot;&quot;&gt;The ILCA (1.01 $/kg adsorbent) is an overmatch in terms of cost, performance, energy consumption and environmental impact.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;p&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;abstract author&quot; data-dcnode-id=&quot;7531&quot; id=&quot;ab0010&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7556&quot;&gt;&lt;span data-dcnode-id=&quot;7557&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;7532&quot; id=&quot;abs0010&quot;&gt;&lt;p data-dcnode-id=&quot;7533&quot; id=&quot;sp0035&quot;&gt;&lt;span data-dcnode-id=&quot;7543&quot;&gt;&lt;span data-dcnode-id=&quot;7547&quot;&gt;&lt;span data-dcnode-id=&quot;7551&quot;&gt;&lt;span data-dcnode-id=&quot;7555&quot; instrument_node=&quot;&quot;&gt;As a promising technology for water scarcity alleviation, Atmospheric Water Harvesting (AWH) appeals for adsorbents with high performance, low cost, &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7553&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/low-environmental-impact&quot; title=&quot;Learn more about low environmental impact from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7554&quot; instrument_node=&quot;&quot;&gt;low environmental impact&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7552&quot; instrument_node=&quot;&quot;&gt;, and low energy consumption for practical application. Herein, a super hygroscopic complex based on natural Loofah grafted Calcium &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7549&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/alginates&quot; title=&quot;Learn more about Alginate from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7550&quot; instrument_node=&quot;&quot;&gt;Alginate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7548&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7545&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sorbent&quot; title=&quot;Learn more about sorbent from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7546&quot; instrument_node=&quot;&quot;&gt;sorbent&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7544&quot; instrument_node=&quot;&quot;&gt; with Ink (ILCA) with comprehensive performance assessment is developed for the first time. It is found that the sorbent can adsorb 0.5–1.2&amp;nbsp;g&amp;nbsp;g&lt;/span&gt;&lt;/span&gt;&lt;sup data-dcnode-id=&quot;7541&quot;&gt;&lt;span data-dcnode-id=&quot;7542&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7540&quot; instrument_node=&quot;&quot;&gt; water at 30%−60% RH, then desorb it rapidly under 1 sun (1.5&amp;nbsp;kg&amp;nbsp;m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;7538&quot;&gt;&lt;span data-dcnode-id=&quot;7539&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7537&quot; instrument_node=&quot;&quot;&gt; h&lt;/span&gt;&lt;sup data-dcnode-id=&quot;7535&quot;&gt;&lt;span data-dcnode-id=&quot;7536&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7534&quot; instrument_node=&quot;&quot;&gt;)). Moreover, around 2.8&amp;nbsp;g of water can be collected by 4.96&amp;nbsp;g ILCA in 5&amp;nbsp;h (23&amp;nbsp;°C, RH50%). This work further conducted a techno-economic analysis of ILCA and found that 1&amp;nbsp;kg water can be harvested with a material cost of only $0.84 (e.g. cheapest option in literature). Such results harbor the potential for sustainable, eco-friendly, and cheap AWH that can be used in underdeveloped regions with high solar energy potential.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;abstract graphical&quot; data-dcnode-id=&quot;7507&quot; id=&quot;ab0015&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7529&quot;&gt;&lt;span data-dcnode-id=&quot;7530&quot; instrument_node=&quot;&quot;&gt;Graphical Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;7508&quot; id=&quot;abs0015&quot;&gt;&lt;p data-dcnode-id=&quot;7509&quot; id=&quot;sp0040&quot;&g =&quot;key0010&quot;&gt;&lt;span data-dcnode-id=&quot;7476&quot;&gt;&lt;span data-dcnode-id=&quot;7477&quot; instrument_node=&quot;&quot;&gt;Hierarchical porous structure&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;7472&quot; id=&quot;key0015&quot;&gt;&lt;span data-dcnode-id=&quot;7473&quot;&gt;&lt;span data-dcnode-id=&quot;7474&quot; instrument_node=&quot;&quot;&gt;Loofah sponge&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;7469&quot; id=&quot;key0020&quot;&gt;&lt;span data-dcnode-id=&quot;7470&quot;&gt;&lt;span data-dcnode-id=&quot;7471&quot; instrument_node=&quot;&quot;&gt;Cost-effective&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;7466&quot; id=&quot;key0025&quot;&gt;&lt;span data-dcnode-id=&quot;7467&quot;&gt;&lt;span data-dcnode-id=&quot;7468&quot; instrument_node=&quot;&quot;&gt;Bioinspired design&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;7463&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;div class=&quot;Body u-font-serif&quot; data-dcnode-id=&quot;4760&quot; id=&quot;body&quot;&gt;&lt;div data-dcnode-id=&quot;4802&quot;&gt;&lt;section data-dcnode-id=&quot;7252&quot; id=&quot;sec0005&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7459&quot; id=&quot;sect0025&quot;&gt;&lt;span data-dcnode-id=&quot;7462&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;span data-dcnode-id=&quot;7461&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7460&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;7429&quot; id=&quot;p0025&quot;&gt;&lt;span data-dcnode-id=&quot;7458&quot; instrument_node=&quot;&quot;&gt;Water scarcity has been a severe crisis faced by human beings, owing to the contradiction between restricted freshwater resources and booming population &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7456&quot; href=&quot;#bib1&quot; name=&quot;bbib1&quot;&gt;&lt;span data-dcnode-id=&quot;7457&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7455&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7453&quot; href=&quot;#bib2&quot; name=&quot;bbib2&quot;&gt;&lt;span data-dcnode-id=&quot;7454&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7452&quot; instrument_node=&quot;&quot;&gt;. Therefore, aiming at this emerging issue, some valid measures have been promoted to capture and utilize the limited fresh water on earth &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7450&quot; href=&quot;#bib3&quot; name=&quot;bbib3&quot;&gt;&lt;span data-dcnode-id=&quot;7451&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7449&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7447&quot; href=&quot;#bib4&quot; name=&quot;bbib4&quot;&gt;&lt;span data-dcnode-id=&quot;7448&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7446&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7444&quot; href=&quot;#bib5&quot; name=&quot;bbib5&quot;&gt;&lt;span data-dcnode-id=&quot;7445&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7443&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7441&quot; href=&quot;#bib6&quot; name=&quot;bbib6&quot;&gt;&lt;span data-dcnode-id=&quot;7442&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7436&quot;&gt;&lt;span data-dcnode-id=&quot;7440&quot; instrument_node=&quot;&quot;&gt;. such as water &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7438&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/desalination&quot; title=&quot;Learn more about desalination from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7439&quot; instrument_node=&quot;&quot;&gt;desalination&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7437&quot; instrument_node=&quot;&quot;&gt;, atmospheric water harvesting (AWH) and sewage recycling. Considering the fact that atmospheric air represents a large reservoir of clean water resources accounting for ~10% of water existing in lakes across the globe, AWH has been one of the most promising technology and has drawn a number of research interests &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7434&quot; href=&quot;#bib7&quot; name=&quot;bbib7&quot;&gt;&lt;span data-dcnode-id=&quot;7435&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7433&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7431&quot; href=&quot;#bib8&quot; name=&quot;bbib8&quot;&gt;&lt;span data-dcnode-id=&quot;7432&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7430&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7402&quot; id=&quot;p0030&quot;&gt;&lt;span data-dcnode-id=&quot;7428&quot; instrument_node=&quot;&quot;&gt;There are several methods to harvest water from the air. For instance, fog capturing &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7426&quot; href=&quot;#bib9&quot; name=&quot;bbib9&quot;&gt;&lt;span data-dcnode-id=&quot;7427&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;sp nerated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7349&quot; instrument_node=&quot;&quot;&gt;porous structure&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7347&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7344&quot; href=&quot;#bib28&quot; name=&quot;bbib28&quot;&gt;&lt;span data-dcnode-id=&quot;7345&quot; instrument_node=&quot;&quot;&gt;[28]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7339&quot;&gt;&lt;span data-dcnode-id=&quot;7343&quot; instrument_node=&quot;&quot;&gt;. The problem can be generally resolved by utilizing &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7341&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/3d-printing&quot; title=&quot;Learn more about 3D printing from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7342&quot; instrument_node=&quot;&quot;&gt;3D printing&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7340&quot; instrument_node=&quot;&quot;&gt;, electrospinning and dry freezing, which are energy-intensive, time-consuming and cost-ineffective.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7318&quot; id=&quot;p0040&quot;&gt;&lt;span data-dcnode-id=&quot;7337&quot; instrument_node=&quot;&quot;&gt;However, in practical applications, the factors related to mechanical stability, scale utilization and costs must be thought of as highly as the sorption performance &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7335&quot; href=&quot;#bib29&quot; name=&quot;bbib29&quot;&gt;&lt;span data-dcnode-id=&quot;7336&quot; instrument_node=&quot;&quot;&gt;[29]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7334&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7332&quot; href=&quot;#bib30&quot; nam orbent with ink (ILCA) is proposed, which has advantages of low cost, environmental friendliness, excellent equilibrium sorption character and distinguished kinetic performance. The natural porous framework with superior gas diffusion property, in which the hygroscopic salt (CaCl&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;7287&quot;&gt;&lt;span data-dcnode-id=&quot;7288&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;7278&quot;&gt;&lt;span data-dcnode-id=&quot;7282&quot;&gt;&lt;span data-dcnode-id=&quot;7286&quot; instrument_node=&quot;&quot;&gt;) is encapsulated by calcium alginate, represents a perfect potential for water extraction. Commercially available Chinese carbon ink containing carbon &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7284&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/nanospheres&quot; title=&quot;Learn more about nanosphere from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7285&quot; instrument_node=&quot;&quot;&gt;nanosphere&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7283&quot; instrument_node=&quot;&quot;&gt; is less inexpensive than graphene, carbon nanotube and more ecofriendly than &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7280&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/carbonisation&quot; title=&quot;Learn more about carbonization from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7281&quot; instrument_node=&quot;&quot;&gt;carbonization&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7279&quot; instrument_node=&quot;&quot;&gt; technology &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7276&quot; href=&quot;#bib41&quot; name=&quot;bbib41&quot;&gt;&lt;span data-dcnode-id=&quot;7277&quot; instrument_node=&quot;&quot;&gt;[41]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7275&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7273&quot; href=&quot;#bib42&quot; name=&quot;bbib42&quot;&gt;&lt;span data-dcnode-id=&quot;7274&quot; instrument_node=&quot;&quot;&gt;[42]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7272&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7270&quot; href=&quot;#bib43&quot; name=&quot;bbib43&quot;&gt;&lt;span data-dcnode-id=&quot;7271&quot; instrument_node=&quot;&quot;&gt;[43]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7269&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7267&quot; href=&quot;#bib44&quot; name=&quot;bbib44&quot;&gt;&lt;span data-dcnode-id=&quot;7268&quot; instrument_node=&quot;&quot;&gt;[44]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7266&quot; instrument_node=&quot;&quot;&gt;. It is found as an excellent candidate possessing superior photothermal property for the sake of passive water harvesting. Even below 30% RH, the ILCA can adsorb 0.5&amp;nbsp;g&amp;nbsp;g&lt;/span&gt;&lt;sup data-dcnode-id=&quot;7264&quot;&gt;&lt;span data-dcnode-id=&quot;7265&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7263&quot; instrument_node=&quot;&quot;&gt; water in 3–4&amp;nbsp;h and desorb it in 1&amp;nbsp;h, manifesting a desorption rate of 1.5&amp;nbsp;kg&amp;nbsp;m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;7261&quot;&gt;&lt;span data-dcnode-id=&quot;7262&quot; instrument_node=&quot;&quot;&gt;−2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7260&quot; instrument_node=&quot;&quot;&gt; h&lt;/span&gt;&lt;sup data-dcnode-id=&quot;7258&quot;&gt;&lt;span data-dcnode-id=&quot;7259&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7257&quot; instrument_node=&quot;&quot;&gt;) and a solar efficiency of ~70%. In laboratory condition (23&amp;nbsp;°C, 50% RH), ~2.8&amp;nbsp;g water is harvested by 4.96&amp;nbsp;g ILCA, and 45.04% of the ratio of collected over adsorbed water is obtained. In an outdoor test, a water production price at 5.5 $ kg&lt;/span&gt;&lt;sup data-dcnode-id=&quot;7255&quot;&gt;&lt;span data-dcnode-id=&quot;7256&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7254&quot; instrument_node=&quot;&quot;&gt; with 51.6% of collected over adsorbed water was revealed without any energy input and system optimization. It is promising that harvesting 1&amp;nbsp;kg water costs $0.84 with further optimization, which demonstrated its comprehensive potential related to performance, cost, friendliness and preparation difficulty.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6425&quot; id=&quot;sec0010&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7248&quot; id=&quot;sect0030&quot;&gt;&lt;span data-dcnode-id=&quot;7251&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;span data-dcnode-id=&quot;7250&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7249&quot; instrument_node=&quot;&quot;&gt;Result and discussion&lt;/span&gt;&lt;/h2&gt;&lt;section data-dcnode-id=&quot;6928&quot; id=&quot;sec0015&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7244&quot; id=&quot;sect0035&quot;&gt;&lt;span data-dcnode-id=&quot;7247&quot; instrument_node=&quot;&quot;&gt;2.1&lt;/span&gt;&lt;span data-dcnode-id=&quot;7246&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7245&quot; instrument_node=&quot;&quot;&gt;Preparation and characterization of ILCA&lt;/span&gt;&lt;/h3&gt;&lt;div data-dcnode-id=&quot;7137&quot;&gt;&lt;p data-dcnode-id=&quot;7212&quot; id=&quot;p0055&quot;&gt;&lt;span data-dcnode-id=&quot;7235&quot;&gt;&lt;span data-dcnode-id=&quot;7239&quot;&gt;&lt;span data-dcnode-id=&quot;7243&quot; instrument_node=&quot;&quot;&gt;In this work, we developed a novel &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7241&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sorbent&quot; title=&quot;Learn more about sorbent from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7242&quot; instrument_node=&quot;&quot;&gt;sorbent&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7240&quot; instrument_node=&quot;&quot;&gt; made of loofah grafted calcium &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7237&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/alginates&quot; title=&quot;Learn more about alginate from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7238&quot; instrument_node=&quot;&quot;&gt;alginate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7236&quot; instrument_node=&quot;&quot;&gt; for atmospheric water harvesting system (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7233&quot; href=&quot;#fig0005&quot; name=&quot;bfig0005&quot;&gt;&lt;span data-dcnode-id=&quot;7234&quot; instrument_node=&quot;&quot;&gt;Fig. 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7232&quot; instrument_node=&quot;&quot;&gt;). Through a series of control variable tests, 25&amp;nbsp;wt% CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;7230&quot;&gt;&lt;span data-dcnode-id=&quot;7231&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;7225&quot;&gt;&lt;span data-dcnode-id=&quot;7229&quot; instrument_node=&quot;&quot;&gt; solution, 2&amp;nbsp;wt% &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7227&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/sodium-alginate&quot; title=&quot;Learn more about sodium alginate from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7228&quot; instrument_node=&quot;&quot;&gt;sodium alginate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7226&quot; instrument_node=&quot;&quot;&gt; (SA) solution and 10:1 of the ratio of SA to carbon ink were optimally selected to prepare the high-performance product (the detailed information is present in &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7223&quot; href=&quot;#sec0040&quot; name=&quot;bsec0040&quot;&gt;&lt;span data-dcnode-id=&quot;7224&quot; instrument_node=&quot;&quot;&gt;Section 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7222&quot; instrument_node=&quot;&quot;&gt; of &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7220&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7221&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7219&quot; instrument_node=&quot;&quot;&gt;). In this case, the ILCA can not only possess optimal sorption performance and outstanding photothermal property, but also avoid the occurrence of deliquescence and leakage. As a sorbent, the loofah sponge (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7217&quot; href=&quot;#fig0010&quot; name=&quot;bfig0010&quot;&gt;&lt;span data-dcnode-id=&quot;7218&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7216&quot; instrument_node=&quot;&quot;&gt;a) was employed as a substrate, and CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;7214&quot;&gt;&lt;span data-dcnode-id=&quot;7215&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;7213&quot; instrument_node=&quot;&quot;&gt; was embedded inside its stems. Meanwhile, calcium alginate was used as an envelope to prevent the salt from leakage.&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;7171&quot; id=&quot;fig0005&quot;&gt;&lt;span data-dcnode-id=&quot;7196&quot;&gt;&lt;img alt=&quot;Fig. 1&quot; aria-describedby=&quot;cap0005&quot; data-dcnode-id=&quot;7211&quot; height=&quot;480&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr1.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;7210&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;7197&quot;&gt;&lt;li data-dcnode-id=&quot;7204&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;7205&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr1_lrg.jpg&quot; target=&quot;_blank&quot; title=&quot;Download high-res image (330KB)&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;7206&quot;&gt;&lt;span data-dcnode-id=&quot;7209&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;7207&quot;&gt;&lt;span data-dcnode-id=&quot;7208&quot; instrument_node=&quot;&quot;&gt;Download high-res image (330KB)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;7198&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;7199&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr1.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;7200&quot;&gt;&lt;span data-dcnode-id=&quot;7203&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;7201&quot;&gt;&lt;span data-dcnode-id=&quot;7202&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;7172&quot;&gt;&lt;span data-dcnode-id=&quot;7173&quot; id=&quot;cap0005&quot;&gt;&lt;p data-dcnode-id=&quot;7174&quot; id=&quot;sp0005&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;7194&quot;&gt;&lt;span data-dcnode-id=&quot;7195&quot; instrument_node=&quot;&quot;&gt;Fig. 1&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7193&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7188&quot;&gt;&lt;span data-dcnode-id=&quot;7192&quot; instrument_node=&quot;&quot;&gt;Schematic illustration showing the synthetic routes of the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7190&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sorbent&quot; title=&quot;Learn more about sorbents from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7191&quot; instrument_node=&quot;&quot;&gt;sorbents&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7189&quot; instrument_node=&quot;&quot;&gt; (LCA&amp;amp;ILCA).&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7175&quot;&gt;&lt;span data-dcnode-id=&quot;7187&quot; instrument_node=&quot;&quot;&gt; Through a series of synthetic procedures, &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7185&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/life-cycle-assessment&quot; title=&quot;Learn more about LCA from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7186&quot; instrument_node=&quot;&quot;&gt;LCA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7176&quot;&gt;&lt;span data-dcnode-id=&quot;7184&quot; instrument_node=&quot;&quot;&gt; and ILCA can be prepared separately. The raw loofah sponge possesses many stems, in which all parallel fibers make the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7182&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/micropore&quot; title=&quot;Learn more about micro pores from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7183&quot; instrument_node=&quot;&quot;&gt;micro pores&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7177&quot;&gt;&lt;span data-dcnode-id=&quot;7181&quot; instrument_node=&quot;&quot;&gt; exist. In LCA and ILCA, the salt particles are impregnated in the micro pores of natural loofah. Then every stem of loofah is wrapped by a layer of Calcium &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7179&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/alginates&quot; title=&quot;Learn more about Alginate from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7180&quot; instrument_node=&quot;&quot;&gt;Alginate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7178&quot; instrument_node=&quot;&quot;&gt; (CA) to prevent the salt particles (in anhydrous state) or the salty solution (in hydrated state) from leakage. It’s worth noting that carbon ink lied in the surface of ILCA’s stems is beneficial for passive desorption under sunlight.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;7138&quot; id=&quot;fig0010&quot;&gt;&lt;span data-dcnode-id=&quot;7155&quot;&gt;&lt;img alt=&quot;Fig. 2&quot; aria-describedby=&quot;cap0010&quot; data-dcnode-id=&quot;7170&quot; height=&quot;731&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr2.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;7169&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;7156&quot;&gt;&lt;li data-dcnode-id=&quot;7163&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;7164&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr2_lrg.jpg&quot; target=&quot;_blank&quot; title=&quot;Download high-res image (865KB)&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;7165&quot;&gt;&lt;span data-dcnode-id=&quot;7168&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;7166&quot;&gt;&lt;span data-dcnode-id=&quot;7167&quot; instrument_node=&quot;&quot;&gt;Download high-res image (865KB)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;7157&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;7158&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr2.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;7159&quot;&gt;&lt;span data-dcnode-id=&quot;7162&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;7160&quot;&gt;&lt;span data-dcnode-id=&quot;7161&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;7139&quot;&gt;&lt;span data-dcnode-id=&quot;7140&quot; id=&quot;cap0010&quot;&gt;&lt;p data-dcnode-id=&quot;7141&quot; id=&quot;sp0010&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;7153&quot;&gt;&lt;span data-dcnode-id=&quot;7154&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7152&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7147&quot;&gt;&lt;span data-dcnode-id=&quot;7151&quot; instrument_node=&quot;&quot;&gt;Morphology and structure of loofah, &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7149&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/life-cycle-assessment&quot; title=&quot;Learn more about LCA from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7150&quot; instrument_node=&quot;&quot;&gt;LCA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7148&quot; instrument_node=&quot;&quot;&gt; and ILCA.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7142&quot;&gt;&lt;span data-dcnode-id=&quot;7146&quot; instrument_node=&quot;&quot;&gt; Digital photographs of (a) loofah, (b) LCA, (c) ILCA; SEM images of fiber’s end in (d) loofah, (e) LCA, (f) ILCA; SEM images of fiber’s middle cross section in (g) LCA, (h) ILCA; (i) &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7144&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/energy-dispersive-spectrometer&quot; title=&quot;Learn more about EDS from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7145&quot; instrument_node=&quot;&quot;&gt;EDS&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7143&quot; instrument_node=&quot;&quot;&gt; image of fiber’s end in ILCA; (j) SEM images of fiber’s surface in ILCA with different magnification; (k) EDS image of middle cross section of ILCA.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;7117&quot; id=&quot;p0060&quot;&gt;&lt;span data-dcnode-id=&quot;7132&quot;&gt;&lt;span data-dcnode-id=&quot;7136&quot; instrument_node=&quot;&quot;&gt;The operation of &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7134&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/life-cycle-assessment&quot; title=&quot;Learn more about LCA from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7135&quot; instrument_node=&quot;&quot;&gt;LCA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7133&quot; instrument_node=&quot;&quot;&gt; (Loofah Grafted Calcium Alginate without Ink) or ILCA for water harvesting consisted of three steps (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7130&quot; href=&quot;#fig0010&quot; name=&quot;bfig0010&quot;&gt;&lt;span data-dcnode-id=&quot;7131&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7129&quot; instrument_node=&quot;&quot;&gt;b, c): (1) Dispersive CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;7127&quot;&gt;&lt;span data-dcnode-id=&quot;7128&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;7118&quot;&gt;&lt;span data-dcnode-id=&quot;7126&quot; instrument_node=&quot;&quot;&gt; particles filled in the loofah skeleton were responsible to capture the moisture from atmospheric air. Consequently, the salt liquefied the moisture into a salty solution, which was held and kept in the substrate until the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7124&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/saturation-state&quot; title=&quot;Learn more about saturation state from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7125&quot; instrument_node=&quot;&quot;&gt;saturation state&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7119&quot;&gt;&lt;span data-dcnode-id=&quot;7123&quot; instrument_node=&quot;&quot;&gt; was achieved. (2) &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7121&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/solar-irradiation&quot; title=&quot;Learn more about Solar irradiation from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7122&quot; instrument_node=&quot;&quot;&gt;Solar irradiation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7120&quot; instrument_node=&quot;&quot;&gt; assisted to release water from sorbent rapidly by the photothermal property of carbon ink. (3) Water vapor, originated from the desorption process of sorbent, was condensed in the cold wall.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7055&quot; id=&quot;p0065&quot;&gt;&lt;span data-dcnode-id=&quot;7112&quot;&gt;&lt;span data-dcnode-id=&quot;7116&quot; instrument_node=&quot;&quot;&gt;Loofah sponges possess a natural cascade three-dimensional (3D) &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7114&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/porous-structure&quot; title=&quot;Learn more about porous structure from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7115&quot; instrument_node=&quot;&quot;&gt;porous structure&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7113&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7110&quot; href=&quot;#fig0010&quot; name=&quot;bfig0010&quot;&gt;&lt;span data-dcnode-id=&quot;7111&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7109&quot; instrument_node=&quot;&quot;&gt;d, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7107&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7108&quot; instrument_node=&quot;&quot;&gt;Fig. S1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7106&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7104&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7105&quot; instrument_node=&quot;&quot;&gt;Fig. S2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7095&quot;&gt;&lt;span data-dcnode-id=&quot;7103&quot; instrument_node=&quot;&quot;&gt;): that is, macroscopic holes (0.1–1.2 mm), &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7101&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/mesoscale&quot; title=&quot;Learn more about mesoscale from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7102&quot; instrument_node=&quot;&quot;&gt;mesoscale&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7096&quot;&gt;&lt;span data-dcnode-id=&quot;7100&quot; instrument_node=&quot;&quot;&gt; vertically aligned porous structure derived from arranged coarse fibers (8–40 µm), and microscopic porosities (600–1000 nm) on the surface of stems. After grafting calcium alginate, the stems of loofah were wrapped by hydrogel with salts capsulated inside it due to the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7098&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/capillary-action&quot; title=&quot;Learn more about capillary action from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7099&quot; instrument_node=&quot;&quot;&gt;capillary action&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7097&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7093&quot; href=&quot;#fig0010&quot; name=&quot;bfig0010&quot;&gt;&lt;span data-dcnode-id=&quot;7094&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7092&quot; instrument_node=&quot;&quot;&gt;g, h). Moreover, rough cross-section of loofah’s fiber was flattened while the wall thickness was thickened owing to the presence of CA in LCA or ILCA (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7090&quot; href=&quot;#fig0010&quot; name=&quot;bfig0010&quot;&gt;&lt;span data-dcnode-id=&quot;7091&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7089&quot; instrument_node=&quot;&quot;&gt;e, f). The pore size of ILCA was further diminished, while the thickness of calcium alginate layer was 1.25–2.5 µm (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7087&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7088&quot; instrument_node=&quot;&quot;&gt;Fig. S5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7086&quot; instrument_node=&quot;&quot;&gt;). The cascade 3D porous ILCA is rugged and self-similar, which belongs to the fractal structure. Just like that fractal plant are good at efficiently utilizing solar energy for photosynthesis &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7084&quot; href=&quot;#bib37&quot; name=&quot;bbib37&quot;&gt;&lt;span data-dcnode-id=&quot;7085&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7083&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7081&quot; href=&quot;#bib45&quot; name=&quot;bbib45&quot;&gt;&lt;span data-dcnode-id=&quot;7082&quot; instrument_node=&quot;&quot;&gt;[45]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7076&quot;&gt;&lt;span data-dcnode-id=&quot;7080&quot; instrument_node=&quot;&quot;&gt;, the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7078&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/lamination&quot; title=&quot;Learn more about multilayer structure from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7079&quot; instrument_node=&quot;&quot;&gt;multilayer structure&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7077&quot; instrument_node=&quot;&quot;&gt; causes incident light scattering, trapping in the macroscopic holes between different fibers. Moreover, light can reflect multiply inside the mesoscale vertically aligned pores &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7074&quot; href=&quot;#bib35&quot; name=&quot;bbib35&quot;&gt;&lt;span data-dcnode-id=&quot;7075&quot; instrument_node=&quot;&quot;&gt;[35]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7073&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7071&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7072&quot; instrument_node=&quot;&quot;&gt;Fig. S21&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7070&quot; instrument_node=&quot;&quot;&gt;). All above is helpful to acquire more sunlight. From other perspective, the porous structure not only contributes to the contact between the hygroscopic factors (CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;7068&quot;&gt;&lt;span data-dcnode-id=&quot;7069&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;7063&quot;&gt;&lt;span data-dcnode-id=&quot;7067&quot; instrument_node=&quot;&quot;&gt;) and the water molecules in &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7065&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/humid-air&quot; title=&quot;Learn more about humid air from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7066&quot; instrument_node=&quot;&quot;&gt;humid air&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7064&quot; instrument_node=&quot;&quot;&gt;, but also shortens the movement distance of water vapor from air to CaCl&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;7061&quot;&gt;&lt;span data-dcnode-id=&quot;7062&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;7056&quot;&gt;&lt;span data-dcnode-id=&quot;7060&quot; instrument_node=&quot;&quot;&gt; particles. Therefore, the desirable gas diffusion and transportation come true, further promoting ILCA’s &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7058&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/adsorption-kinetics&quot; title=&quot;Learn more about kinetic adsorption from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7059&quot; instrument_node=&quot;&quot;&gt;kinetic adsorption&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7057&quot; instrument_node=&quot;&quot;&gt; and desorption performances.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7023&quot; id=&quot;p0070&quot;&gt;&lt;span data-dcnode-id=&quot;7050&quot;&gt;&lt;span data-dcnode-id=&quot;7054&quot; instrument_node=&quot;&quot;&gt;The scanning electron microscopy (SEM) of ILCA showed plenty of &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7052&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/nanoparticle&quot; title=&quot;Learn more about nanoparticles from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7053&quot; instrument_node=&quot;&quot;&gt;nanoparticles&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7051&quot; instrument_node=&quot;&quot;&gt; with a diameter of 20–50 nm (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7048&quot; href=&quot;#fig0010&quot; name=&quot;bfig0010&quot;&gt;&lt;span data-dcnode-id=&quot;7049&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7043&quot;&gt;&lt;span data-dcnode-id=&quot;7047&quot; instrument_node=&quot;&quot;&gt;j), which were predicted to be the carbon &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7045&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/nanospheres&quot; title=&quot;Learn more about nanospheres from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7046&quot; instrument_node=&quot;&quot;&gt;nanospheres&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7044&quot; instrument_node=&quot;&quot;&gt; contained in carbon ink (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7041&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7042&quot; instrument_node=&quot;&quot;&gt;Fig. S4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7040&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7038&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7039&quot; instrument_node=&quot;&quot;&gt;Fig. S6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7037&quot; instrument_node=&quot;&quot;&gt;). The carbon nanospheres could capture photons well and present excellent photothermal property. According to the results of the absorbance measurement across the entire visible and near-infrared (NIR) ranges (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7035&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7036&quot; instrument_node=&quot;&quot;&gt;Fig. S10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7030&quot;&gt;&lt;span data-dcnode-id=&quot;7034&quot; instrument_node=&quot;&quot;&gt;), ILCA could be endowed with better light absorbance (~95%) in dry or wet state without sacrifice of superiority in cost and environmental friendliness compared with carbon nanotubes, graphene &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7032&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/aerogel&quot; title=&quot;Learn more about aerogels from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7033&quot; instrument_node=&quot;&quot;&gt;aerogels&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7031&quot; instrument_node=&quot;&quot;&gt; and carbonization-based materials. Except for the high absorbance of pristine carbon nanospheres, their presence also intensifies the light absorbance by decreasing the light reflectance, which is reported in literature that complex nano-structures contribute to the low light reflectance on the wings of butterfly in addition to the requirement of absorbing pigmentation &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7028&quot; href=&quot;#bib46&quot; name=&quot;bbib46&quot;&gt;&lt;span data-dcnode-id=&quot;7029&quot; instrument_node=&quot;&quot;&gt;[46]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7027&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7025&quot; href=&quot;#bib47&quot; name=&quot;bbib47&quot;&gt;&lt;span data-dcnode-id=&quot;7026&quot; instrument_node=&quot;&quot;&gt;[47]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7024&quot; instrument_node=&quot;&quot;&gt;. The double effects attributed to the carbon nanospheres from commercial carbon ink and rough surface from apparent porous structure enhance the light absorbance through light trapping, scattering and internal reflection.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6992&quot; id=&quot;p0075&quot;&gt;&lt;span data-dcnode-id=&quot;7018&quot;&gt;&lt;span data-dcnode-id=&quot;7022&quot; instrument_node=&quot;&quot;&gt;Both &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7020&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/fourier-transform&quot; title=&quot;Learn more about Fourier Transform from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7021&quot; instrument_node=&quot;&quot;&gt;Fourier Transform&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7019&quot; instrument_node=&quot;&quot;&gt; infrared (FTIR) spectrum and X-ray diffraction (XRD) were referred to as the evidences to identify the components of LCA and ILCA again. &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7016&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7017&quot; instrument_node=&quot;&quot;&gt;Fig. S11&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7015&quot; instrument_node=&quot;&quot;&gt; depicts the FTIR spectrum of ink, loofah, CA, LCA, ILCA, Loofah Grafted Sodium Alginate (LSA) and CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;7013&quot;&gt;&lt;span data-dcnode-id=&quot;7014&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;7012&quot; instrument_node=&quot;&quot;&gt;. Except for loofah, ink and CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;7010&quot;&gt;&lt;span data-dcnode-id=&quot;7011&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;7009&quot; instrument_node=&quot;&quot;&gt;, the –COOH groups which are typical in CA (vibrations at 1400–1450 cm&lt;/span&gt;&lt;sup data-dcnode-id=&quot;7007&quot;&gt;&lt;span data-dcnode-id=&quot;7008&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7002&quot;&gt;&lt;span data-dcnode-id=&quot;7006&quot; instrument_node=&quot;&quot;&gt;) were found to exist in LCA and ILCA, indicating that CA is contained in LCA and ILCA. The salt particles coated in loofah were demonstrated by the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;7004&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/x-ray-diffraction-analysis&quot; title=&quot;Learn more about XRD analysis from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;7005&quot; instrument_node=&quot;&quot;&gt;XRD analysis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7003&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7000&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;7001&quot; instrument_node=&quot;&quot;&gt;Fig. S12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6999&quot; instrument_node=&quot;&quot;&gt;). The characteristic peaks of CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6997&quot;&gt;&lt;span data-dcnode-id=&quot;6998&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6996&quot; instrument_node=&quot;&quot;&gt; could be found in LCA and ILCA, manifesting the successful addition of CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6994&quot;&gt;&lt;span data-dcnode-id=&quot;6995&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6993&quot; instrument_node=&quot;&quot;&gt; on the sorbent.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6949&quot; id=&quot;p0080&quot;&gt;&lt;span data-dcnode-id=&quot;6987&quot;&gt;&lt;span data-dcnode-id=&quot;6991&quot; instrument_node=&quot;&quot;&gt;In order to explore the physical and the chemical stabilities, the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6989&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/thermogravimetric-analysis&quot; title=&quot;Learn more about thermogravimetric analysis from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6990&quot; instrument_node=&quot;&quot;&gt;thermogravimetric analysis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6988&quot; instrument_node=&quot;&quot;&gt; (TGA) was conducted by the thermogravimetric analyzer (Pyris 1). Below 200 °C, the ILCA, whose prepared and operated temperatures are usually below 140 °C, has excellent thermal stability that only loses free water (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6985&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6986&quot; instrument_node=&quot;&quot;&gt;Fig. S13a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6984&quot; instrument_node=&quot;&quot;&gt;). The TGA curve of ILCA-DI is similar to that of Loofah except the dehydrated region (30–180 °C), which means that the major part of ILCA-DI is raw loofah after washing out the CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6982&quot;&gt;&lt;span data-dcnode-id=&quot;6983&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6977&quot;&gt;&lt;span data-dcnode-id=&quot;6981&quot; instrument_node=&quot;&quot;&gt;. Moreover, we can find the &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6979&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/pyrolysis&quot; title=&quot;Learn more about pyrolysis process from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6980&quot; instrument_node=&quot;&quot;&gt;pyrolysis process&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6978&quot; instrument_node=&quot;&quot;&gt; of polymer occurs only above 230 °C, while the largest pyrolysis peak of ILCA-DI moves right compared with the raw loofah. These phenomena indicate that every component has strong interaction with each other: the calcium alginate is physically wrapped out of the fibers of loofah, just like “put the beads through the line” (&lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6975&quot; href=&quot;#fig0010&quot; name=&quot;bfig0010&quot;&gt;&lt;span data-dcnode-id=&quot;6976&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6974&quot; instrument_node=&quot;&quot;&gt;i, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6972&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6973&quot; instrument_node=&quot;&quot;&gt;Fig. S3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6971&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6969&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6970&quot; instrument_node=&quot;&quot;&gt;Fig. S7&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6968&quot; instrument_node=&quot;&quot;&gt;); the carbon ink is homogenously sticked on the crosslink structure of calcium alginate (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6966&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6967&quot; instrument_node=&quot;&quot;&gt;Fig. S6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6965&quot; instrument_node=&quot;&quot;&gt;). With thermal treatment up to 700 °C, the weight of ILCA changes by ~20%, while the weight of ILCA-DI changes by ~80% (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6963&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6964&quot; instrument_node=&quot;&quot;&gt;Fig. S13b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6962&quot; instrument_node=&quot;&quot;&gt;). The CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6960&quot;&gt;&lt;span data-dcnode-id=&quot;6961&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6959&quot; instrument_node=&quot;&quot;&gt; particles impregnated in ILCA cannot volatilize below 800 °C, which means 80% of ILCA’s mass is mainly made of CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6957&quot;&gt;&lt;span data-dcnode-id=&quot;6958&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6956&quot; instrument_node=&quot;&quot;&gt;. Meanwhile, that CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6954&quot;&gt;&lt;span data-dcnode-id=&quot;6955&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6953&quot; instrument_node=&quot;&quot;&gt; can stably exist in holes of loofah is demonstrated (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6951&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6952&quot; instrument_node=&quot;&quot;&gt;Fig. S8&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6950&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6931&quot; id=&quot;p0085&quot;&gt;&lt;span data-dcnode-id=&quot;6948&quot; instrument_node=&quot;&quot;&gt;Through the supplementary prepared experiments, the specific content of every component can be precisely determined: the content of the free CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6946&quot;&gt;&lt;span data-dcnode-id=&quot;6947&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6945&quot; instrument_node=&quot;&quot;&gt; is up to ~70 wt% while the loofah accounts for ~20 wt% (the detailed information is present in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6943&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6944&quot; instrument_node=&quot;&quot;&gt;Table S5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6938&quot;&gt;&lt;span data-dcnode-id=&quot;6942&quot; instrument_node=&quot;&quot;&gt;). &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6940&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/energy-dispersive-spectrometer&quot; title=&quot;Learn more about Energy Dispersive Spectrometer from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6941&quot; instrument_node=&quot;&quot;&gt;Energy Dispersive Spectrometer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6939&quot; instrument_node=&quot;&quot;&gt; (EDS) results are consistent with the quantitive result. CaCl&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6936&quot;&gt;&lt;span data-dcnode-id=&quot;6937&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6935&quot; instrument_node=&quot;&quot;&gt; is homogeneous distributed in large region as show in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6933&quot; href=&quot;#sec0100&quot; name=&quot;bsec0100&quot;&gt;&lt;span data-dcnode-id=&quot;6934&quot; instrument_node=&quot;&quot;&gt;Fig. S9&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6932&quot; instrument_node=&quot;&quot;&gt;, which indirectly proves ILCA’s considerable balanced adsorption performance.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6929&quot; id=&quot;p0090&quot;&gt;&lt;span data-dcnode-id=&quot;6930&quot; instrument_node=&quot;&quot;&gt;To sum up, the desired morphology and structure of ILCA make it very predominant for passive solar-assisted water harvesting.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6792&quot; id=&quot;sec0020&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6924&quot; id=&quot;sect0040&quot;&gt;&lt;span data-dcnode-id=&quot;6927&quot; instrument_node=&quot;&quot;&gt;2.2&lt;/span&gt;&lt;span data-dcnode-id=&quot;6926&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6925&quot; instrument_node=&quot;&quot;&gt;Water sorption performance&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;6911&quot; id=&quot;p0095&quot;&gt;&lt;span data-dcnode-id=&quot;6915&quot;&gt;&lt;span data-dcnode-id=&quot;6919&quot;&gt;&lt;span data-dcnode-id=&quot;6923&quot; instrument_node=&quot;&quot;&gt;To illustrate the potential of LCA and ILCA for water harvesting applications, some representative experiments were conducted to investigate and compare their water sorption behaviors under different working conditions. The temperature inside the chamber was set and held at 25 °C for all samples, which was similar to the practical application of water sorption that takes place in arid areas at night. All samples had to be dried in an oven to guarantee the same start point in subsequent tests. The LCA and ILCA were exposed to air as well as other hygroscopic sorbents to compare their moisture adsorption and desorption capacities. The humidity was set at 30% RH, 60% RH and 90% RH respectively. LCA and ILCA were distinguished from &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6921&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/silica-gel&quot; title=&quot;Learn more about silica gel from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6922&quot; instrument_node=&quot;&quot;&gt;silica gel&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6920&quot; instrument_node=&quot;&quot;&gt;, zeolite 13X, activated &lt;/span&gt;&lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6917&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/aluminium-oxide&quot; title=&quot;Learn more about aluminum oxide from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6918&quot; instrument_node=&quot;&quot;&gt;aluminum oxide&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6916&quot; instrument_node=&quot;&quot;&gt; and their composite sorbents immersed with LiCl or CaCl&lt;/span&gt;&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6913&quot;&gt;&lt;span data-dcnode-id=&quot;6914&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6912&quot; instrument_node=&quot;&quot;&gt; in areas with varied relative humidity.&lt;/span&gt;&lt;/p&gt;&lt;div data-dcnode-id=&quot;6860&quot;&gt;&lt;p data-dcnode-id=&quot;6894&quot; id=&quot;p0100&quot;&gt;&lt;span data-dcnode-id=&quot;6910&quot; instrument_node=&quot;&quot;&gt;At RH of ~30% (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6908&quot; href=&quot;#fig0015&quot; name=&quot;bfig0015&quot;&gt;&lt;span data-dcnode-id=&quot;6909&quot; instrument_node=&quot;&quot;&gt;Fig. 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6907&quot; instrument_node=&quot;&quot;&gt;a), ILCA exhibited 0.091 g g&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6905&quot;&gt;&lt;span data-dcnode-id=&quot;6906&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6904&quot; instrument_node=&quot;&quot;&gt; water uptake in 1.2 h, whereas the same amount of water was harvested by silica gel with CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6902&quot;&gt;&lt;span data-dcnode-id=&quot;6903&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6901&quot; instrument_node=&quot;&quot;&gt; in ~2.4 h, by activated aluminum oxide with LiCl in ~7 h and by zeolite 13X in ~2 h. Meanwhile, neither the raw silica gel nor activated aluminum oxide was able to adsorb moisture. After 12 h of adsorption, the LCA and ILCA were capable to adsorb 0.454 g g&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6899&quot;&gt;&lt;span data-dcnode-id=&quot;6900&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6898&quot; instrument_node=&quot;&quot;&gt; and 0.5 g g&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6896&quot;&gt;&lt;span data-dcnode-id=&quot;6897&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6895&quot; instrument_node=&quot;&quot;&gt;. Respectively, The ILCA represents 1.58–8.55 times larger uptakes compared to other samples in the test. The remarkable cascade channel structure and the hygroscopic disperse salt were the main reasons for LCA exhibiting excellent moisture adsorbing performance even in dry weather.&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;6861&quot; id=&quot;fig0015&quot;&gt;&lt;span data-dcnode-id=&quot;6878&quot;&gt;&lt;img alt=&quot;Fig. 3&quot; aria-describedby=&quot;cap0015&quot; data-dcnode-id=&quot;6893&quot; height=&quot;773&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr3.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;6892&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;6879&quot;&gt;&lt;li data-dcnode-id=&quot;6886&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;6887&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr3_lrg.jpg&quot; target=&quot;_blank&quot; title=&quot;Download high-res image (690KB)&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;6888&quot;&gt;&lt;span data-dcnode-id=&quot;6891&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;6889&quot;&gt;&lt;span data-dcnode-id=&quot;6890&quot; instrument_node=&quot;&quot;&gt;Download high-res image (690KB)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;6880&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;6881&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285521008934-gr3.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;6882&quot;&gt;&lt;span data-dcnode-id=&quot;6885&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;6883&quot;&gt;&lt;span data-dcnode-id=&quot;6884&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;6862&quot;&gt;&lt;span data-dcnode-id=&quot;6863&quot; id=&quot;cap0015&quot;&gt;&lt;p data-dcnode-id=&quot;6864&quot; id=&quot;sp0015&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;6876&quot;&gt;&lt;span data-dcnode-id=&quot;6877&quot; instrument_node=&quot;&quot;&gt;Fig. 3&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6875&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6870&quot;&gt;&lt;span data-dcnode-id=&quot;6874&quot; instrument_node=&quot;&quot;&gt;Adsorption performance of &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6872&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/engineering/life-cycle-assessment&quot; title=&quot;Learn more about LCA from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6873&quot; instrument_node=&quot;&quot;&gt;LCA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6871&quot; instrument_node=&quot;&quot;&gt; and ILCA.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6865&quot;&gt;&lt;span data-dcnode-id=&quot;6869&quot; instrument_node=&quot;&quot;&gt; Comparison of water uptake of several &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6867&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sorbent&quot; title=&quot;Learn more about sorbents from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6868&quot; instrument_node=&quot;&quot;&gt;sorbents&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6866&quot; instrument_node=&quot;&quot;&gt; at (a) 30% RH, (b) 60% RH, (c) 90% RH and 25 °C for 12 h; (d) water uptake and (e) rate of water uptake of ILCA for AWH in STA; the optical photographs of (f) ILCA and (g) LCA separately in dry or wet state.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;6824&quot; id=&quot;p0105&quot;&gt;&lt;span data-dcnode-id=&quot;6859&quot; instrument_node=&quot;&quot;&gt;Furthermore, the potentials of LCA and ILCA in a moderate humid climate were explored by operation in the constant chamber with 60% RH (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6857&quot; href=&quot;#fig0015&quot; name=&quot;bfig0015&quot;&gt;&lt;span data-dcnode-id=&quot;6858&quot; instrument_node=&quot;&quot;&gt;Fig. 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6856&quot; instrument_node=&quot;&quot;&gt;b). As is shown in the figure, the adsorption performances of all samples corresponded to the above experimental results: LCA and ILCA could adsorb 1.1–1.2 g g&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6854&quot;&gt;&lt;span data-dcnode-id=&quot;6855&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6853&quot; instrument_node=&quot;&quot;&gt; water, while silica gel with CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;6851&quot;&gt;&lt;span data-dcnode-id=&quot;6852&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;6850&quot; instrument_node=&quot;&quot;&gt; and activated aluminum oxide with LiCl sorbents could only obtain 0.2–0.4 g g&lt;/span&gt;&lt;sup data-dcnode-id=&quot;6848&quot;&gt;&lt;span data-dcnode-id=&quot;6849&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6847&quot; instrument_node=&quot;&quot;&gt; water, which was only 20–30% of the water mass that our sorbents adsorbed. The optical photographs related to LCA and ILCA was recorded separately in dry and wet states (&lt;/span&gt;&lt
