&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2423&quot; id=&quot;Sec6&quot;&gt;&lt;span data-dcnode-id=&quot;2424&quot; instrument_node=&quot;&quot;&gt;Experimental Results&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2412&quot;&gt;&lt;span data-dcnode-id=&quot;2422&quot; instrument_node=&quot;&quot;&gt;Due to lower moisture content of the Hail city, a special solar still design is used. Trapezoidal prism (William et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2420&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR49&quot; id=&quot;ref-link-section-d297840866e1232&quot; title=&quot;William, G. E., Mohamed, M. H., &amp;amp; Fatouh, M. (2015). Desiccant system for water production from humid air using solar energy. Energy, 90, 177–1720.&quot;&gt;&lt;span data-dcnode-id=&quot;2421&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2419&quot; instrument_node=&quot;&quot;&gt;) is selected to enable more contact area between desiccant and moist air compared to square pyramid design (Kabeel &lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2417&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR23&quot; id=&quot;ref-link-section-d297840866e1235&quot; title=&quot;Kabeel, A. E. (2007). Water production from air using multi-shelves solar glass pyramid system. Renewable Energy, 32, 157–172.&quot;&gt;&lt;span data-dcnode-id=&quot;2418&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2416&quot; instrument_node=&quot;&quot;&gt;). In addition, the basin of the solar still is utilized as an extra shelve by forming a peripheral channel for water collection. The middle space of the basin is filled with desiccant bed composite material sharing by almost 38% of the total still air contact area. The desiccant raw material concentration was measured by gravimetric method (loss on draying, LOD). The measured concentration of the raw material (CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2414&quot;&gt;&lt;span data-dcnode-id=&quot;2415&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2413&quot; instrument_node=&quot;&quot;&gt;) was 85.28%. 3&amp;nbsp;kg of black cotton cloth is distributed in the five shelves, and then the cloth is saturated with the desiccant solution before regeneration process. Cotton cloth can absorb water more than 500% of its original mass.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2407&quot;&gt;&lt;span data-dcnode-id=&quot;2411&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2409&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;2410&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2408&quot; instrument_node=&quot;&quot;&gt; shows the parameters of the experimental study. Experimental work is divided into two stages: (a) absorption process and (b) regeneration process.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-table&quot; data-container-section=&quot;table&quot; data-dcnode-id=&quot;2392&quot; data-test=&quot;inline-table&quot; id=&quot;table-1&quot;&gt;&lt;figure data-dcnode-id=&quot;2393&quot;&gt;&lt;figcaption class=&quot;c-article-table__figcaption&quot; data-dcnode-id=&quot;2404&quot;&gt;&lt;b data-dcnode-id=&quot;2405&quot; data-test=&quot;table-caption&quot; id=&quot;Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;2406&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;1 Experimental parameters&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2394&quot;&gt;&lt;a aria-label=&quot;Full size table 1&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2395&quot; data-test=&quot;table-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view table&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/tables/1&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2402&quot;&gt;&lt;span data-dcnode-id=&quot;2403&quot; instrument_node=&quot;&quot;&gt;Full size table&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2396&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2397&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2398&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;2400&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;2399&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;h4 class=&quot;c-article__sub-heading c-article__sub-heading--small&quot; data-dcnode-id=&quot;2390&quot; id=&quot;Sec7&quot;&gt;&lt;span data-dcnode-id=&quot;2391&quot; instrument_node=&quot;&quot;&gt;Absorption Process&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2374&quot;&gt;&lt;span data-dcnode-id=&quot;2389&quot; instrument_node=&quot;&quot;&gt;Before starting the experiment, accurate desiccant saturation concentration is a key parameter, which is important to be accurately determined. The desiccant saturation concentration is expected to be more than 30%, and two samples (10&amp;nbsp;g each) of different desiccant concentrations of 40% and 50% are prepared using Eq.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2387&quot; data-track=&quot;click&quot; data-track-action=&quot;equation anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Equ3&quot;&gt;&lt;span data-dcnode-id=&quot;2388&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2386&quot; instrument_node=&quot;&quot;&gt; and exposed to the natural air for enough period until the saturation condition is achieved. Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2384&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig6&quot;&gt;&lt;span data-dcnode-id=&quot;2385&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2383&quot; instrument_node=&quot;&quot;&gt; shows the behavior of the two samples under the real climatic conditions of Hail city. The experiment stared at sunset of May 4th, 2019 (6:48&amp;nbsp;pm), and ended at the sunrise of May 7th, 2019 (5:30 am). The two samples are kept away from sunrays during day hours. After 24&amp;nbsp;h, the concentration of the two samples started to be very close. After 31&amp;nbsp;h (2 am of May 6th 2019, second night), the two samples are almost identical and balanced at 48% concentration (sample 1, 47.86% and sample 2, 48.03%). The absorption process is left for one more night (May 6th and 7th 2019) as shown in Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2381&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig6&quot;&gt;&lt;span data-dcnode-id=&quot;2382&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2380&quot; instrument_node=&quot;&quot;&gt;. At the end of the third night (5:30 am, May 7th 2019), the two samples are back to the same equilibrium saturation of 48% (sample 1, 48.23% and sample 2, 48.15%). The device is prepared to the regeneration process at this time using desiccant with 48% starting concentration. The average measured relative humidity is &lt;/span&gt;&lt;i data-dcnode-id=&quot;2378&quot;&gt;&lt;span data-dcnode-id=&quot;2379&quot; instrument_node=&quot;&quot;&gt;HR&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2376&quot;&gt;&lt;span data-dcnode-id=&quot;2377&quot; instrument_node=&quot;&quot;&gt;avg&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2375&quot; instrument_node=&quot;&quot;&gt; = 26.5%, and average air temperature is 28&amp;nbsp;°C.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2350&quot; data-test=&quot;figure&quot; data-title=&quot;Figure&amp;nbsp;6&quot; id=&quot;figure-6&quot;&gt;&lt;figure data-dcnode-id=&quot;2351&quot;&gt;&lt;figcaption data-dcnode-id=&quot;2371&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;2372&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig6&quot;&gt;&lt;span data-dcnode-id=&quot;2373&quot; instrument_node=&quot;&quot;&gt;Figure&amp;nbsp;6&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;2362&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;2366&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;2367&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/6&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;2368&quot;&gt;&lt;source data-dcnode-id=&quot;2370&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11053-020-09662-y/MediaObjects/11053_2020_9662_Fig6_HTML.png?as=webp&quot; type=&quot;image/webp&quot;&gt;&lt;img alt=&quot;figure 6&quot; aria-describedby=&quot;Fig6&quot; data-dcnode-id=&quot;2369&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11053-020-09662-y/MediaObjects/11053_2020_9662_Fig6_HTML.png&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;2363&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-6-desc&quot;&gt;&lt;p data-dcnode-id=&quot;2364&quot;&gt;&lt;span data-dcnode-id=&quot;2365&quot; instrument_node=&quot;&quot;&gt;Absorption process of two different samples, May 4th, 5th, 6th and 7th, 2019&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2352&quot;&gt;&lt;a aria-label=&quot;Full size image figure 6&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2353&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure6 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/6&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2360&quot;&gt;&lt;span data-dcnode-id=&quot;2361&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2354&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2355&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2356&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;2358&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;2357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;h4 class=&quot;c-article__sub-heading c-article__sub-heading--small&quot; data-dcnode-id=&quot;2348&quot; id=&quot;Sec8&quot;&gt;&lt;span data-dcnode-id=&quot;2349&quot; instrument_node=&quot;&quot;&gt;Regeneration Process&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2331&quot;&gt;&lt;span data-dcnode-id=&quot;2347&quot; instrument_node=&quot;&quot;&gt;Before stating the regeneration process, the clothing bed weight is measured and the initial saturation concentration of the desiccant is set as 48%. The five shelves are filled with 3&amp;nbsp;kg of black cotton cloth, which is saturated with 9.38&amp;nbsp;kg of desiccant solution. 5.28&amp;nbsp;kg of CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2345&quot;&gt;&lt;span data-dcnode-id=&quot;2346&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2344&quot; instrument_node=&quot;&quot;&gt; (85.28% concentration) is diluted in 4.1&amp;nbsp;kg of water (48% concentration). The two doors of the solar still are closed at 6 am, and the regeneration process started after a while of the sunrise (5:30 am) of May 7th, 2019. The experiment ended at 6&amp;nbsp;pm when no more evaporation was observed (Fig.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2342&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig7&quot;&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2341&quot; instrument_node=&quot;&quot;&gt;). Average solar intensity is calculated as 600&amp;nbsp;W/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2339&quot;&gt;&lt;span data-dcnode-id=&quot;2340&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2338&quot; instrument_node=&quot;&quot;&gt; (total received energy is 24.293&amp;nbsp;MJ/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2336&quot;&gt;&lt;span data-dcnode-id=&quot;2337&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2335&quot; instrument_node=&quot;&quot;&gt;day), and the average air speed is 1.4&amp;nbsp;m/s. Temperatures and solar intensities increased to maximum values around noontime and decreased afternoon, while air speed is fluctuated all the time, which is very hard to be accurately determined. The average temperature, solar intensity and air speed are 29.29&amp;nbsp;°C, 600&amp;nbsp;W/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2333&quot;&gt;&lt;span data-dcnode-id=&quot;2334&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2332&quot; instrument_node=&quot;&quot;&gt; and 1.4&amp;nbsp;m/s, respectively, during regeneration process.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2307&quot; data-test=&quot;figure&quot; data-title=&quot;Figure&amp;nbsp;7&quot; id=&quot;figure-7&quot;&gt;&lt;figure data-dcnode-id=&quot;2308&quot;&gt;&lt;figcaption data-dcnode-id=&quot;2328&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;2329&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig7&quot;&gt;&lt;span data-dcnode-id=&quot;2330&quot; instrument_node=&quot;&quot;&gt;Figure&amp;nbsp;7&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;2319&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;2323&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;2324&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/7&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;2325&quot;&gt;&lt;source data-dcnode-id=&quot;2327&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11053-020-09662-y/MediaObjects/11053_2020_9662_Fig7_HTML.png?as=webp&quot; type=&quot;image/webp&quot;&gt;&lt;img alt=&quot;figure 7&quot; aria-describedby=&quot;Fig7&quot; data-dcnode-id=&quot;2326&quot; height=&quot;546&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11053-020-09662-y/MediaObjects/11053_2020_9662_Fig7_HTML.png&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;2320&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-7-desc&quot;&gt;&lt;p data-dcnode-id=&quot;2321&quot;&gt;&lt;span data-dcnode-id=&quot;2322&quot; instrument_node=&quot;&quot;&gt;Weather conditions during regeneration process, May 7th, 2019&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2309&quot;&gt;&lt;a aria-label=&quot;Full size image figure 7&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2310&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure7 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/7&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2317&quot;&gt;&lt;span data-dcnode-id=&quot;2318&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; clas 62-y/figures/8&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2288&quot;&gt;&lt;span data-dcnode-id=&quot;2289&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2282&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2283&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2284&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2287&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;2248&quot;&gt;&lt;span data-dcnode-id=&quot;2277&quot; instrument_node=&quot;&quot;&gt;Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2275&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig9&quot;&gt;&lt;span data-dcnode-id=&quot;2276&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2274&quot; instrument_node=&quot;&quot;&gt; shows the accumulated yield and accumulated evaporated water. Evaporated water is not measured during the regeneration process to avoid opening the solar still through the process. The accumulated evaporation production quantity is measured at end of the regeneration process. The total yield of the regeneration process as collected in the bottle is 1.06&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2272&quot;&gt;&lt;span data-dcnode-id=&quot;2273&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2271&quot; instrument_node=&quot;&quot;&gt;day consuming 22.96&amp;nbsp;MJ/l produced water, while the calculated evaporated water according to Eq.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2269&quot; data-track=&quot;click&quot; data-track-action=&quot;equation anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Equ4&quot;&gt;&lt;span data-dcnode-id=&quot;2270&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2268&quot; instrument_node=&quot;&quot;&gt; is 1.56&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2266&quot;&gt;&lt;span data-dcnode-id=&quot;2267&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2265&quot; instrument_node=&quot;&quot;&gt;day consuming 15.59&amp;nbsp;MJ/l desorbed water. The difference between evaporated and yield collected in the bottle is somehow escaped outside the still or dropped back inside shelves. The escaped vapor percentage is almost 32.1% due to the effects of the still geometry, sealing and multi-shelves arrangement. The evaporation distribution curve is estimated based on the final measurement by multiplying the collected yield by a certain ratio (1.321). At the end of the regeneration process, the masses of the clothing with the solution in all shelves are measured again by the sensitive balance, the solution mass is then measured and calculated according to Eq.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2263&quot; data-track=&quot;click&quot; data-track-action=&quot;equation anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Equ2&quot;&gt;&lt;span data-dcnode-id=&quot;2264&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2262&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;i data-dcnode-id=&quot;2260&quot;&gt;&lt;span data-dcnode-id=&quot;2261&quot; instrument_node=&quot;&quot;&gt;m&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2258&quot;&gt;&lt;span data-dcnode-id=&quot;2259&quot; instrument_node=&quot;&quot;&gt;s&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2257&quot; instrument_node=&quot;&quot;&gt; is 7.815&amp;nbsp;kg, and &lt;/span&gt;&lt;i data-dcnode-id=&quot;2255&quot;&gt;&lt;span data-dcnode-id=&quot;2256&quot; instrument_node=&quot;&quot;&gt;m&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2253&quot;&gt;&lt;span data-dcnode-id=&quot;2254&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2252&quot; instrument_node=&quot;&quot;&gt; is set from the beginning of the experiment as 4.5&amp;nbsp;kg. The desiccant concentration at the end of the regeneration process is measured as 57.58% according to Eq.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2250&quot; data-track=&quot;click&quot; data-track-action=&quot;equation anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Equ1&quot;&gt;&lt;span data-dcnode-id=&quot;2251&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2249&quot; instrument_node=&quot;&quot;&gt;. Of course, higher desiccant concentrations accompanied with low-humid weather form a big challenge for water extraction process.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2224&quot; data-test=&quot;figure&quot; data-title=&quot;Figure&amp;nbsp;9&quot; id=&quot;figure-9&quot;&gt;&lt;figure data-dcnode-id=&quot;2225&quot;&gt;&lt;figcaption data-dcnode-id=&quot;2245&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;2246&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig9&quot;&gt;&lt;span data-dcnode-id=&quot;2247&quot; instrument_node=&quot;&quot;&gt;Figure&amp;nbsp;9&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;2236&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;2240&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;2241&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/9&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;2242&quot;&gt;&lt;source data-dcnode-id=&quot;2244&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11053-020-09662-y/MediaObjects/11053_2020_9662_Fig9_HTML.png?as=webp&quot; type=&quot;image/webp&quot;&gt;&lt;img alt=&quot;figure 9&quot; aria-describedby=&quot;Fig9&quot; data-dcnode-id=&quot;2243&quot; height=&quot;527&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11053-020-09662-y/MediaObjects/11053_2020_9662_Fig9_HTML.png&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;2237&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-9-desc&quot;&gt;&lt;p data-dcnode-id=&quot;2238&quot;&gt;&lt;span data-dcnode-id=&quot;2239&quot; instrument_node=&quot;&quot;&gt;Accumulated yield and vaporized water during regeneration process&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2226&quot;&gt;&lt;a aria-label=&quot;Full size image figure 9&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2227&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure9 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/9&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2234&quot;&gt;&lt;span data-dcnode-id=&quot;2235&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2228&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2229&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2230&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2233&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;2219&quot;&gt;&lt;span data-dcnode-id=&quot;2223&quot; instrument_node=&quot;&quot;&gt;Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2221&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig10&quot;&gt;&lt;span data-dcnode-id=&quot;2222&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2220&quot; instrument_node=&quot;&quot;&gt; shows the evaporation and yield efficiency distribution during regeneration process. The efficiency curves generally follow the yield and the solar intensity curves. The maximum evaporation and yield efficiencies are 18.01 and 12.22%, respectively, with average efficiencies of 15% and 10%, respectively. The low regeneration performance during day hours is due to high starting saturation desiccant concentration (48%) under the low-humid conditions.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2195&quot; data-test=&quot;figure&quot; data-title=&quot;Figure&amp;nbsp;10&quot; id=&quot;figure-10&quot;&gt;&lt;figure data-dcnode-id=&quot;2196&quot;&gt;&lt;figcaption data-dcnode-id=&quot;2216&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;2217&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig10&quot;&gt;&lt;span data-dcnode-id=&quot;2218&quot; instrument_node=&quot;&quot;&gt;Figure&amp;nbsp;10&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;2207&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;2211&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;2212&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/10&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;2213&quot;&gt;&lt;source data-dcnode-id=&quot;2215&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11053-020-09662-y/MediaObjects/11053_2020_9662_Fig10_HTML.png?as=webp&quot; type=&quot;image/webp&quot;&gt;&lt;img alt=&quot;figure 10&quot; aria-describedby=&quot;Fig10&quot; data-dcnode-id=&quot;2214&quot; height=&quot;524&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11053-020-09662-y/MediaObjects/11053_2020_9662_Fig10_HTML.png&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;2208&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-10-desc&quot;&gt;&lt;p data-dcnode-id=&quot;2209&quot;&gt;&lt;span data-dcnode-id=&quot;2210&quot; instrument_node=&quot;&quot;&gt;Thermal efficiencies of the yield and the estimated vaporized water during regeneration process&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2197&quot;&gt;&lt;a aria-label=&quot;Full size image figure 10&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2198&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure10 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/10&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2205&quot;&gt;&lt;span data-dcnode-id=&quot;2206&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2199&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2200&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2201&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;2203&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;2202&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;h4 class=&quot;c-article__sub-heading c-article__sub-heading--small&quot; data-dcnode-id=&quot;2193&quot; id=&quot;Sec9&quot;&gt;&lt;span data-dcnode-id=&quot;2194&quot; instrument_node=&quot;&quot;&gt;Cost Analysis&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2191&quot;&gt;&lt;span data-dcnode-id=&quot;2192&quot; instrument_node=&quot;&quot;&gt;The cost analysis is a key parameter for all renewable energy applications. The AWH still suffering from higher cost compared to water desalination techniques. When using solar energy, challenges with cost started especially for AWH by solar energy. Therefore, the solar AWH techniques generally are very limited. AWH is expected to increase the water production cost due to lower water productivity, so that selecting suitable design with lower cost materials is essential for making solar AWH economically feasible.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2174&quot;&gt;&lt;span data-dcnode-id=&quot;2190&quot; instrument_node=&quot;&quot;&gt;Cost analysis for all components of the device and other costs is listed in detail in Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2188&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab2&quot;&gt;&lt;span data-dcnode-id=&quot;2189&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2187&quot; instrument_node=&quot;&quot;&gt;. The cost is estimated according to local market in Hail city. Solar still total cost is calculated for all solar still components as $187/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2185&quot;&gt;&lt;span data-dcnode-id=&quot;2186&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2184&quot; instrument_node=&quot;&quot;&gt;, and all solar still items are available in the local market with suitable low cost. Desiccant material used is CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2182&quot;&gt;&lt;span data-dcnode-id=&quot;2183&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2181&quot; instrument_node=&quot;&quot;&gt; anhydrous, and the cost for this item is very difficult to estimate. This material is available in the market with relatively high price for laboratory use ($30–$40/kg); however, the commercial price is considerably lower and varies significantly. The price used for this study is $5/kg, and the quantity used is 5.28&amp;nbsp;kg ($26.5). Six-black cotton towels (3&amp;nbsp;kg) of large size were used as a bed material, available with low price $1.5/towel, and the total bed cost is $9. The total cost of all items and materials used for the experiment is $222.5. CPL (cost per liter) is an important evaluation parameter for comparing various solar water production techniques. The amount of yield produced under the climatic conditions of Hail city is 1.06&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2179&quot;&gt;&lt;span data-dcnode-id=&quot;2180&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2178&quot; instrument_node=&quot;&quot;&gt;day. Knowing that, the selected month for the experiment (May) represents the average relative humidity during 1&amp;nbsp;year. The total yearly production is calculated based on 292 sunny days in Saudi Arabia. The total yield per year is 310&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2176&quot;&gt;&lt;span data-dcnode-id=&quot;2177&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2175&quot; instrument_node=&quot;&quot;&gt;. Lifetime of the device is estimated as 15&amp;nbsp;years. Two interest rates are considered (0 and 6%). Calculations are based on simple interest rate, thus:&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-equation&quot; data-dcnode-id=&quot;2165&quot; id=&quot;Equ7&quot;&gt;&lt;div class=&quot;c-article-equation__content&quot; data-dcnode-id=&quot;2168&quot;&gt;&lt;span class=&quot;mathjax-tex&quot; data-dcnode-id=&quot;2169&quot;&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2172&quot;&gt;&lt;span data-dcnode-id=&quot;2173&quot; instrument_node=&quot;&quot;&gt;AA_{\text{t}} = AA_{\text{P}} \left[ {1 + i\left( {ny} \right)} \right]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;c-article-equation__number&quot; data-dcnode-id=&quot;2166&quot;&gt;&lt;span data-dcnode-id=&quot;2167&quot; instrument_node=&quot;&quot;&gt;
                    (7)
                &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;2147&quot;&gt;&lt;span data-dcnode-id=&quot;2164&quot; instrument_node=&quot;&quot;&gt;where &lt;/span&gt;&lt;i data-dcnode-id=&quot;2162&quot;&gt;&lt;span data-dcnode-id=&quot;2163&quot; instrument_node=&quot;&quot;&gt;AA&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2160&quot;&gt;&lt;span data-dcnode-id=&quot;2161&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2159&quot; instrument_node=&quot;&quot;&gt; is the total accrued amount, &lt;/span&gt;&lt;i data-dcnode-id=&quot;2157&quot;&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt;AA&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2155&quot;&gt;&lt;span data-dcnode-id=&quot;2156&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2154&quot; instrument_node=&quot;&quot;&gt; is the principal accrued amount, &lt;/span&gt;&lt;i data-dcnode-id=&quot;2152&quot;&gt;&lt;span data-dcnode-id=&quot;2153&quot; instrument_node=&quot;&quot;&gt;i&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2151&quot; instrument_node=&quot;&quot;&gt; is the simple interest rate, and &lt;/span&gt;&lt;i data-dcnode-id=&quot;2149&quot;&gt;&lt;span data-dcnode-id=&quot;2150&quot; instrument_node=&quot;&quot;&gt;ny&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2148&quot; instrument_node=&quot;&quot;&gt; is the number of lifetime years. Operating and maintenance costs are assumed as 15% of the total cost. The CPL for 0 and 6% interest rates are $0.055 and $0.104, respectively. Of course, disseminating solar applications needs strong support by local regulations and laws to increase the motivation of using such clean energy resource.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-table&quot; data-container-section=&quot;table&quot; data-dcnode-id=&quot;2132&quot; data-test=&quot;inline-table&quot; id=&quot;table-2&quot;&gt;&lt;figure data-dcnode-id=&quot;2133&quot;&gt;&lt;figcaption class=&quot;c-article-table__figcaption&quot; data-dcnode-id=&quot;2144&quot;&gt;&lt;b data-dcnode-id=&quot;2145&quot; data-test=&quot;table-caption&quot; id=&quot;Tab2&quot;&gt;&lt;span data-dcnode-id=&quot;2146&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;2 Cost estimation of the device parameters&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2134&quot;&gt;&lt;a aria-label=&quot;Full size table 2&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2135&quot; data-test=&quot;table-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view table&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/tables/2&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2142&quot;&gt;&lt;span data-dcnode-id=&quot;2143&quot; instrument_node=&quot;&quot;&gt;Full size table&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2136&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2137&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2138&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2141&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;2140&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;2139&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;h4 class=&quot;c-article__sub-heading c-article__sub-heading--small&quot; data-dcnode-id=&quot;2130&quot; id=&quot;Sec10&quot;&gt;&lt;span data-dcnode-id=&quot;2131&quot; instrument_node=&quot;&quot;&gt;Comparison Analysis&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;2092&quot;&gt;&lt;span data-dcnode-id=&quot;2129&quot; instrument_node=&quot;&quot;&gt;The aim of the present work is to investigate the feasibility and potential of the AWH in Hail city (low-humid region). Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2127&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab3&quot;&gt;&lt;span data-dcnode-id=&quot;2128&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2126&quot; instrument_node=&quot;&quot;&gt; shows an overall comparison between the obtained results of the present study and the major findings of seven related publications. Most publications agree that the best hosting material for desiccant water extraction from humid air is the clothing bed material due to its great ability to absorb large amount of desiccant solution (more than 500% of its original weight) compared to other hosting materials like saw-wood or sand bed. Clothing bed offer higher productivity than saw wood by almost 5% (Kabeel &lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2124&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR23&quot; id=&quot;ref-link-section-d297840866e2036&quot; title=&quot;Kabeel, A. E. (2007). Water production from air using multi-shelves solar glass pyramid system. Renewable Energy, 32, 157–172.&quot;&gt;&lt;span data-dcnode-id=&quot;2125&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2123&quot; instrument_node=&quot;&quot;&gt;) and better than sand bed by 47% (William et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2121&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR49&quot; id=&quot;ref-link-section-d297840866e2039&quot; title=&quot;William, G. E., Mohamed, M. H., &amp;amp; Fatouh, M. (2015). Desiccant system for water production from humid air using solar energy. Energy, 90, 177–1720.&quot;&gt;&lt;span data-dcnode-id=&quot;2122&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2120&quot; instrument_node=&quot;&quot;&gt;). Most studies start regeneration process at 30% desiccant concentration with relative humidity at night hours ranging from 50 to 83%. The initial amount of desiccant solution depends on the saturation capacity of the host material and the available area inside the solar still. The highest yield (2.5&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2118&quot;&gt;&lt;span data-dcnode-id=&quot;2119&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2117&quot; instrument_node=&quot;&quot;&gt;day) was obtained by Kabeel (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2115&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR23&quot; id=&quot;ref-link-section-d297840866e2044&quot; title=&quot;Kabeel, A. E. (2007). Water production from air using multi-shelves solar glass pyramid system. Renewable Energy, 32, 157–172.&quot;&gt;&lt;span data-dcnode-id=&quot;2116&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2114&quot; instrument_node=&quot;&quot;&gt;); he used 4 shelves with pyramids geometry under 60% relative humidity condition. The negative effect of lower relative humidity in Hail city (26.5%) can be compensated by increasing the shelves area (38%) by adding extra shelve in the bottom of the basin enabling more desiccant amount (5.28&amp;nbsp;kg). The yield forced to be lower due to high starting saturation desiccant concentration (48%), which is 1.06&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2112&quot;&gt;&lt;span data-dcnode-id=&quot;2113&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2111&quot; instrument_node=&quot;&quot;&gt;day. Developing a new geometry by Talaat et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2109&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR42&quot; id=&quot;ref-link-section-d297840866e2050&quot; title=&quot;Talaat, M. A., Awad, M. M., Zeidan, E. B., &amp;amp; Hamed, A. M. (2018). Solar-powered portable apparatus for extracting water from air using desiccant solution. Renewable Energy, 119, 662–674.&quot;&gt;&lt;span data-dcnode-id=&quot;2110&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2108&quot; instrument_node=&quot;&quot;&gt;) (two-sided conical-finned) is an important trial, which needs further attention and research efforts. CPL obtained by Talaat et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2106&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR42&quot; id=&quot;ref-link-section-d297840866e2053&quot; title=&quot;Talaat, M. A., Awad, M. M., Zeidan, E. B., &amp;amp; Hamed, A. M. (2018). Solar-powered portable apparatus for extracting water from air using desiccant solution. Renewable Energy, 119, 662–674.&quot;&gt;&lt;span data-dcnode-id=&quot;2107&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2105&quot; instrument_node=&quot;&quot;&gt;) is $0.06, which is close to the estimated CPL obtained in the present study ($0.055). The CPL obtained by Srivastava and Yadav (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2103&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR40&quot; id=&quot;ref-link-section-d297840866e2056&quot; title=&quot;Srivastava, S., &amp;amp; Yadav, A. (2018). Water generation from atmospheric air by using composite desiccant material through fixed focus concentrating solar thermal power. Solar Energy, 169, 302–315.&quot;&gt;&lt;span data-dcnode-id=&quot;2104&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2102&quot; instrument_node=&quot;&quot;&gt;) is relatively high ($0.229). The highest obtained efficiency was 22% at 60% &lt;/span&gt;&lt;i data-dcnode-id=&quot;2100&quot;&gt;&lt;span data-dcnode-id=&quot;2101&quot; instrument_node=&quot;&quot;&gt;RH&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2099&quot; instrument_node=&quot;&quot;&gt;, Kabeel (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2097&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR23&quot; id=&quot;ref-link-section-d297840866e2062&quot; title=&quot;Kabeel, A. E. (2007). Water production from air using multi-shelves solar glass pyramid system. Renewable Energy, 32, 157–172.&quot;&gt;&lt;span data-dcnode-id=&quot;2098&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2096&quot; instrument_node=&quot;&quot;&gt;) when using the multi-shelves pyramids-type solar still with CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2094&quot;&gt;&lt;span data-dcnode-id=&quot;2095&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2093&quot; instrument_node=&quot;&quot;&gt; desiccant (30% initial concentration) hosted in cloth bed. Although the present study has the lowest efficiency (10%), the device introduced a great potential of AWH in low-humid regions. This achievement is remarkably important as a fresh water resource in some urgent situations, especially in desert places where no natural water resources are available, in addition to the nature of the desert climate of low humidity. This technique can be lifesaving in such desert and remote areas.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-table&quot; data-container-section=&quot;table&quot; data-dcnode-id=&quot;2077&quot; data-test=&quot;inline-table&quot; id=&quot;table-3&quot;&gt;&lt;figure data-dcnode-id=&quot;2078&quot;&gt;&lt;figcaption class=&quot;c-article-table__figcaption&quot; data-dcnode-id=&quot;2089&quot;&gt;&lt;b data-dcnode-id=&quot;2090&quot; data-test=&quot;table-caption&quot; id=&quot;Tab3&quot;&gt;&lt;span data-dcnode-id=&quot;2091&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;3 Comparison between the present study and the results obtained by other studies of AWH&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2079&quot;&gt;&lt;a aria-label=&quot;Full size table 3&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2080&quot; data-test=&quot;table-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view table&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/tables/3&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2087&quot;&gt;&lt;span data-dcnode-id=&quot;2088&quot; instrument_node=&quot;&quot;&gt;Full size table&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2081&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2082&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2083&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2086&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;2085&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;2084&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;1992&quot; data-title=&quot;Conclusions&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;1993&quot; id=&quot;Sec11-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2072&quot; id=&quot;Sec11&quot;&gt;&lt;span data-dcnode-id=&quot;2073&quot; instrument_node=&quot;&quot;&gt;Conclusions&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;1994&quot; id=&quot;Sec11-content&quot;&gt;&lt;p data-dcnode-id=&quot;2067&quot;&gt;&lt;span data-dcnode-id=&quot;2071&quot; instrument_node=&quot;&quot;&gt;The production cost of fresh water produced by desiccant techniques is still high compared to other techniques. However, the feasibility of AWH from low-humid regions can be an important alternative for freshwater production in small communities living in remote areas. In addition, 1.06&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2069&quot;&gt;&lt;span data-dcnode-id=&quot;2070&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2068&quot; instrument_node=&quot;&quot;&gt;day obtained in the present study can be sufficient to supply small family with their water urgent needs. Small units can be placed on house roofs or any other place without any need for infrastructure, water resources or transportation. Using of solar with desiccant arrangement is a promising technique even for low-humid regions. Based on the results obtained by the preset study, the following conclusions are made:&lt;/span&gt;&lt;/p&gt;&lt;ul class=&quot;u-list-style-bullet&quot; data-dcnode-id=&quot;2011&quot;&gt;&lt;span data-dcnode-id=&quot;2066&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2061&quot;&gt;&lt;span data-dcnode-id=&quot;2065&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2063&quot;&gt;&lt;span data-dcnode-id=&quot;2064&quot; instrument_node=&quot;&quot;&gt;48% saturation desiccant concentration is determined under an average climatic conditions of 26.5% relative humidity and 28°C in Hail city (May 7th 2019).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2060&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2055&quot;&gt;&lt;span data-dcnode-id=&quot;2059&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2057&quot;&gt;&lt;span data-dcnode-id=&quot;2058&quot; instrument_node=&quot;&quot;&gt;Regeneration process started at the saturation desiccant concentration of 48% and ended at 57.58%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2056&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2054&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2046&quot;&gt;&lt;span data-dcnode-id=&quot;2053&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2048&quot;&gt;&lt;span data-dcnode-id=&quot;2052&quot; instrument_node=&quot;&quot;&gt;1.06&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2050&quot;&gt;&lt;span data-dcnode-id=&quot;2051&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2049&quot; instrument_node=&quot;&quot;&gt;day yield capacity is achieved by using the prism with five shelves solar still device.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2047&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2045&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2040&quot;&gt;&lt;span data-dcnode-id=&quot;2044&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2042&quot;&gt;&lt;span data-dcnode-id=&quot;2043&quot; instrument_node=&quot;&quot;&gt;Energy consumption for fresh water production is 22.96&amp;nbsp;MJ/l, which is relatively high due to low relative humidity conditions (RH = 26.5%).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2041&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2039&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2031&quot;&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2033&quot;&gt;&lt;span data-dcnode-id=&quot;2037&quot; instrument_node=&quot;&quot;&gt;Average yield and evaporation efficiencies are 10% and 15%, respectively, due to lower &lt;/span&gt;&lt;i data-dcnode-id=&quot;2035&quot;&gt;&lt;span data-dcnode-id=&quot;2036&quot; instrument_node=&quot;&quot;&gt;RH&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2034&quot; instrument_node=&quot;&quot;&gt; of 26.5%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2032&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2025&quot;&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2027&quot;&gt;&lt;span data-dcnode-id=&quot;2028&quot; instrument_node=&quot;&quot;&gt;The device was able to achieve reasonable water yield by increasing the desiccant amount by 50% and the contact area by 38% due to the extra area formed in the basin bottom.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2026&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2019&quot;&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2021&quot;&gt;&lt;span data-dcnode-id=&quot;2022&quot; instrument_node=&quot;&quot;&gt;The device is compact with relatively small size, which is suitable to be installed on the house roofs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2020&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2013&quot;&gt;&lt;span data-dcnode-id=&quot;2017&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2015&quot;&gt;&lt;span data-dcnode-id=&quot;2016&quot; instrument_node=&quot;&quot;&gt;Water production cost of $0.055 CPL is promising and competitive.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2014&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;2009&quot;&gt;&lt;span data-dcnode-id=&quot;2010&quot; instrument_node=&quot;&quot;&gt;AWH still needs further research efforts to enhance its performance. The following recommendations are proposed for future work:&lt;/span&gt;&lt;/p&gt;&lt;ul class=&quot;u-list-style-bullet&quot; data-dcnode-id=&quot;1995&quot;&gt;&lt;span data-dcnode-id=&quot;2008&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2003&quot;&gt;&lt;span data-dcnode-id=&quot;2007&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2005&quot;&gt;&lt;span data-dcnode-id=&quot;2006&quot; instrument_node=&quot;&quot;&gt;Further effort is required in enhancing of the geometry of the solar still with more effective sealing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2004&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2002&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1997&quot;&gt;&lt;span data-dcnode-id=&quot;2001&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1999&quot;&gt;&lt;span data-dcnode-id=&quot;2000&quot; instrument_node=&quot;&quot;&gt;Higher desiccant concentration challenge with lower humid areas should be managed by using more desiccant amount with active solar still to increase the solution temperature.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1998&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1996&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;1991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1349&quot; id=&quot;MagazineFulltextArticleBodySuffix&quot;&gt;&lt;section aria-labelledby=&quot;Bib1&quot; data-dcnode-id=&quot;1350&quot; data-title=&quot;References&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;1351&quot; id=&quot;Bib1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;1989&quot; id=&quot;Bib1&quot;&gt;&lt;span data-dcnode-id=&quot;1990&quot; instrument_node=&quot;&quot;&gt;References&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;1352&quot; id=&quot;Bib1-content&quot;&gt;&lt;div data-container-section=&quot;references&quot; data-dcnode-id=&quot;1353&quot;&gt;&lt;ul class=&quot;c-article-references&quot; data-dcnode-id=&quot;1363&quot;&gt;&lt;li class=&quot;c-article-references__item js-c-reading-companion-references-item&quot; data-dcnode-id=&quot;1976&quot;&gt;&lt;p class=&quot;c-article-references__text&quot; data-dcnode-id=&quot;1981&quot; id=&quot;ref-CR1&quot;&gt;&lt;span data-dcnode-id=&quot;1988&quot; instrument_node=&quot;&quot;&gt;Ahmed, M. A., Zubair, S. M., Abido, M. A., &amp;amp; Bahaidarah, H. M. (2018). An innovative closed-air closed-desiccant HDH system to extract water from the air: A case for zero-brine discharge system. &lt;/span&gt;&lt;i data-dcnode-id=&quot;1986&quot;&gt;&lt;span data-dcnode-id=&quot;1987&quot; instrument_node=&quot;&quot;&gt;Desalination,&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1985&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;i data-dcnode-id=&quot;1983&quot;&gt;&lt;span data-dcnode-id=&quot;1984&quot; instrument_node=&quot;&quot;&gt;445,&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1982&quot; instrument_node=&quot;&quot;&gt; 236–248.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;c-article-references__links u-hide-print&quot; data-dcnode-id=&quot;1977&quot;&gt;&lt;a aria-labe                     Google Scholar&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1978&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;
