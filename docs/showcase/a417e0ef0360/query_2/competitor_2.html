&lt;/span&gt;&lt;meta content=&quot;Atmospheric water harvesting (AWH) is emerging as a promising technique of water production in remote and isolated areas away from natural water resources. The present study describes potential of the AWH from low-humid regions under the climatic conditions of Hail city (27.64° N, 41.75° E) in Saudi Arabia. Trapezoidal prism solar still of 5-shelves is developed, where the shelves are filled with black cotton cloth bed saturated with calcium chloride solution. The solar still is opened during night hours, enabling the descant to absorb humidity from humid air (absorption process) and closed during day hours causing desorption of water under higher temperatures (regeneration process). The vapor condensates on a glass surface and is collected in a bottle. Under low-humid conditions of the Hail city, the desiccant balanced approximately at 48% saturation concentration. The water production of the device reaches 1.06&amp;amp;nbsp;l/m2day by consuming 22.96&amp;amp;nbsp;MJ solar energy/l of water with a cost of $0.055 per liter. The present study has demonstrated high potential of the AWH technique from low-humid regions up to 26.5%. The proposed device is standalone with promising performance, which needs neither the natural water resources nor the infrastructure. The device is suitable for remote and isolated small communities.&quot; data-dcnode-id=&quot;3709&quot; name=&quot;dc.description&quot;&gt;&lt;span data-dcnode-id=&quot;3708&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;meta content=&quot;Atmospheric Water Harvesting from Low-Humid Regions of Hail City in Saudi Arabia - Natural Resources Research&quot; data-dcnode-id=&quot;3503&quot; property=&quot;og:title&quot;&gt;&lt;span data-dcnode-id=&quot;3502&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;meta content=&quot;Atmospheric water harvesting (AWH) is emerging as a promising technique of water production in remote and isolated areas away from natural water resources. The present study describes potential of the AWH from low-humid regions under the climatic conditions of Hail city (27.64° N, 41.75° E) in Saudi Arabia. Trapezoidal prism solar still of 5-shelves is developed, where the shelves are filled with black cotton cloth bed saturated with calcium chloride solution. The solar still is opened during night hours, enabling the descant to absorb humidity from humid air (absorption process) and closed during day hours causing desorption of water under higher temperatures (regeneration process). The vapor condensates on a glass surface and is collected in a bottle. Under low-humid conditions of the Hail city, the desiccant balanced approximately at 48% saturation concentration. The water production of the device reaches 1.06 l/m2day by consuming 22.96 MJ solar energy/l of water with a cost of $0.055 per liter. The present study has demonstrated high potential of the AWH technique from low-humid regions up to 26.5%. The proposed device is standalone with promising performance, which needs neither the natural water resources nor the infrastructure. The device is suitable for remote and isolated small communities.&quot; data-dcnode-id=&quot;3501&quot; property=&quot;og:description&quot;&gt;&lt;span data-dcnode-id=&quot;3500&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;c-article-body&quot; data-article-body=&quot;true&quot; data-dcnode-id=&quot;1160&quot; data-track-component=&quot;article body&quot;&gt;&lt;span data-dcnode-id=&quot;3070&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section aria-labelledby=&quot;Abs1&quot; data-dcnode-id=&quot;3060&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;1053&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;1054&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;1053&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;1054&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Abstract&quot; lang=&quot;en&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;3061&quot; id=&quot;Abs1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;3068&quot; id=&quot;Abs1&quot;&gt;&lt;span data-dcnode-id=&quot;3069&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;3062&quot; id=&quot;Abs1-content&quot;&gt;&lt;p data-dcnode-id=&quot;3063&quot;&gt;&lt;span data-dcnode-id=&quot;3067&quot; instrument_node=&quot;&quot;&gt;Atmospheric water harvesting (AWH) is emerging as a promising technique of water production in remote and isolated areas away from natural water resources. The present study describes potential of the AWH from low-humid regions under the climatic conditions of Hail city (27.64° N, 41.75° E) in Saudi Arabia. Trapezoidal prism solar still of 5-shelves is developed, where the shelves are filled with black cotton cloth bed saturated with calcium chloride solution. The solar still is opened during night hours, enabling the descant to absorb humidity from humid air (absorption process) and closed during day hours causing desorption of water under higher temperatures (regeneration process). The vapor condensates on a glass surface and is collected in a bottle. Under low-humid conditions of the Hail city, the desiccant balanced approximately at 48% saturation concentration. The water production of the device reaches 1.06&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3065&quot;&gt;&lt;span data-dcnode-id=&quot;3066&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3064&quot; instrument_node=&quot;&quot;&gt;day by consuming 22.96&amp;nbsp;MJ solar energy/l of water with a cost of $0.055 per liter. The present study has demonstrated high potential of the AWH technique from low-humid regions up to 26.5%. The proposed device is standalone with promising performance, which needs neither the natural water resources nor the infrastructure. The device is suitable for remote and isolated small communities.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;3059&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section data-dcnode-id=&quot;2773&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;1054&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;1054&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-polling-id-50443292_563=&quot;105&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;1054&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;1054&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;9900&quot; data-title=&quot;Introduction&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2774&quot; id=&quot;Sec1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;3057&quot; id=&quot;Sec1&quot;&gt;&lt;span data-dcnode-id=&quot;3058&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2775&quot; id=&quot;Sec1-content&quot;&gt;&lt;p data-dcnode-id=&quot;2983&quot;&gt;&lt;span data-dcnode-id=&quot;3056&quot; instrument_node=&quot;&quot;&gt;Water scarcity is a big challenge worldwide. There are 3.2 billion people globally suffering from water scarcity problems because of isolated areas away from water resources (Team et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;3054&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR43&quot; id=&quot;ref-link-section-d297840866e405&quot; title=&quot;Team, C. W., Pachauri, R. K., &amp;amp; Meyer, L. (2014). Climate change: Synthesis report. Geneva: IPCC.&quot;&gt;&lt;span data-dcnode-id=&quot;3055&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3053&quot; instrument_node=&quot;&quot;&gt;). In addition, people in Saudi Arabia are facing a lack of the natural water resources. They mainly depend on industrial water desalination from two main resources, underground and seawater. The underground water is of two types: surface wells and deep wells. The surface wells are renewable and are refilled with rains continuously, while the deep wells in Saudi Arabia were formed through thousand years through the leakage of surface ground wells for a long time. Indeed, deep wells are considered as the most underground water resources. With the increase in water demand in Saudi Arabia, the deep wells will degrade and need further thousand years to be refilled. In most cases, underground water is not drinkable and needs to be treated. In such cases, the reverse osmosis (RO) is one of the preferred techniques for water desalination due to low water salinity. Seawater desalination plants in Saudi Arabia are distributed along two coasts of the Red Sea and the Arabian Gulf. Multistage flash (MSF) is the common used technique due to huge demand for water desalination, where multi-effect desalination (MED) and reverse osmoses (RO) occupy the second and third places, respectively. Saudi Arabia is the largest water producer worldwide by around 20% of the world industrial water market (Ettouny and Rizzuti &lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;3051&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR15&quot; id=&quot;ref-link-section-d297840866e408&quot; title=&quot;Ettouny, H., &amp;amp; Rizzuti, L. (2007). Solar desalination: A challenge for sustainable fresh water in the 21st century. Solar Desalination for the 21st Century. 
https://doi.org/10.1007/978-1-4020-5508-9_1

.&quot;&gt;&lt;span data-dcnode-id=&quot;3052&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3050&quot; instrument_node=&quot;&quot;&gt;). The production of this water mainly depends on conventional fossil fuel, which causes significant of pollution to the environment. In 2017, according to the international energy agency, Saudi Arabia produced around 347.9&amp;nbsp;TWh of electricity (11th worldwide) and has total 532.2 million tons of CO&lt;/span&gt;&lt;sub data-dcnode-id=&quot;3048&quot;&gt;&lt;span data-dcnode-id=&quot;3049&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3047&quot; instrument_node=&quot;&quot;&gt; emissions (9th worldwide) (IEA &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;3045&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR21&quot; id=&quot;ref-link-section-d297840866e413&quot; title=&quot;IEA. (2019). International energy agency: Data available for 2017. Retrieved March 16, 2020 from 
http://energyatlas.iea.org

.&quot;&gt;&lt;span data-dcnode-id=&quot;3046&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3044&quot; instrument_node=&quot;&quot;&gt;). Investing in alternative water production techniques such as renewable energy is critically important to Saudi Arabia. Solar still is one of the simplest and oldest water desalination techniques. Basin solar still with single basin and slope is the conventional type passed through several stages of research and development. The production rate of the solar still is 2–3&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3042&quot;&gt;&lt;span data-dcnode-id=&quot;3043&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3041&quot; instrument_node=&quot;&quot;&gt;day that can be increased to 6&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3039&quot;&gt;&lt;span data-dcnode-id=&quot;3040&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3038&quot; instrument_node=&quot;&quot;&gt;day. There is opportunity to further enhance production rate to 9.36&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3036&quot;&gt;&lt;span data-dcnode-id=&quot;3037&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3035&quot; instrument_node=&quot;&quot;&gt;day with application of the smart design as shown by Kabeel et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;3033&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR26&quot; id=&quot;ref-link-section-d297840866e423&quot; title=&quot;Kabeel, A. E., Abdelgaied, M., &amp;amp; Mahgoub, M. (2016). The performance of a modified solar still using hot air injection and PCM. Desalination, 379, 102–107.&quot;&gt;&lt;span data-dcnode-id=&quot;3034&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3032&quot; instrument_node=&quot;&quot;&gt;). They have developed a solar still using hot air injection and with phase change material (PCM). A tubular solar still (TSS) is used for water desalination with relatively higher performance and competitive cost per liter compared to the conventional solar basin type (Arunkumar et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;3030&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR7&quot; id=&quot;ref-link-section-d297840866e426&quot; title=&quot;Arunkumar, T., Velraj, R., Denkenberger, D., Sathyamurthy, R., Vinothkumar, K., Porkumaran, K., et al. (2016). Effect of heat removal on tubular solar desalting system. Desalination, 379, 24–33.&quot;&gt;&lt;span data-dcnode-id=&quot;3031&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3029&quot; instrument_node=&quot;&quot;&gt;; Arunkumar and Kabeel &lt;/span&gt;&lt;a aria-label=&quot;Reference 2017&quot; data-dcnode-id=&quot;3027&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR5&quot; id=&quot;ref-link-section-d297840866e429&quot; title=&quot;Arunkumar, T., &amp;amp; Kabeel, A. E. (2017). Effect of phase change material on concentric circular tubular solar still—Integration meets enhancement. Desalination, 414, 46–50.&quot;&gt;&lt;span data-dcnode-id=&quot;3028&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3026&quot; instrument_node=&quot;&quot;&gt;; Elashmawy &lt;/span&gt;&lt;a aria-label=&quot;Reference 2017&quot; data-dcnode-id=&quot;3024&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR9&quot; id=&quot;ref-link-section-d297840866e432&quot; title=&quot;Elashmawy, M. (2017). An experimental investigation of a parabolic concentrator solar tracking system integrated with a tubular solar still. Desalination, 411, 1–8.&quot;&gt;&lt;span data-dcnode-id=&quot;3025&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3023&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;3021&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR10&quot; id=&quot;ref-link-section-d297840866e436&quot; title=&quot;Elashmawy, M. (2019). Effect of surface cooling and tube thickness on the performance of a high temperature standalone tubular solar still. Applied Thermal Engineering, 156, 276–286.&quot;&gt;&lt;span data-dcnode-id=&quot;3022&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3020&quot; instrument_node=&quot;&quot;&gt;; Kabeel et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;3018&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR27&quot; id=&quot;ref-link-section-d297840866e439&quot; title=&quot;Kabeel, A. E., Sharshir, S. W., Gamal, B. A., Halim, M. A., &amp;amp; Swidan, A. (2019). Improving performance of tubular solar still by controlling the water depth and cover cooling. Journal of Cleaner Production, 233, 848–856.&quot;&gt;&lt;span data-dcnode-id=&quot;3019&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3017&quot; instrument_node=&quot;&quot;&gt;). Recently, Elashmawy (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2020a&quot; data-dcnode-id=&quot;3015&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR11&quot; id=&quot;ref-link-section-d297840866e442&quot; title=&quot;Elashmawy, M. (2020a). Improving the performance of a parabolic concentrator solar tracking tubular solar still (PCST-TSS) using gravel as a sensible heat storage material. Desalination, 473, 1–10.&quot;&gt;&lt;span data-dcnode-id=&quot;3016&quot; instrument_node=&quot;&quot;&gt;2020a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3014&quot; instrument_node=&quot;&quot;&gt;) have studied effect of using sensible heat storage materials (3&amp;nbsp;kg of locally available gravel in Hail city) on the performance of the TSS. Results show an increase in the TSS productivity by 890.4% compared to the same tube length. In addition to storing the excess heat, the gravel enhanced the heat transfer mechanism of the device. The TSS efficiency and water yield are enhanced by 13.89% and 14.18%, respectively, with an additional cost reduction by 12%. The energy storage materials can be sensible or phase change material (PCM). The yield of the single basin single slop solar still is increased from 1.9 to 5.1&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3012&quot;&gt;&lt;span data-dcnode-id=&quot;3013&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3011&quot; instrument_node=&quot;&quot;&gt;day by using sand as a sensible energy storage material (Sathyamurthy et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;3009&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR36&quot; id=&quot;ref-link-section-d297840866e447&quot; title=&quot;Sathyamurthy, R., Nagarajan, P. K., Edwin, M., Madhu, B., El-Agouz, S. A., Ahsan, A., et al. (2016). Experimental investigation on conventional solar still with sand heat energy storage. International Journal of Heat and Technology, 34(4), 597–603.&quot;&gt;&lt;span data-dcnode-id=&quot;3010&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3008&quot; instrument_node=&quot;&quot;&gt;). Moreover, using PCM with basin type solar still enhances productivity by 12–67% (Asbik et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;3006&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR8&quot; id=&quot;ref-link-section-d297840866e450&quot; title=&quot;Asbik, M., Ansari, O., Bah, A., Zari, N., Mimet, A., &amp;amp; El-Ghetany, H. (2016). Exergy analysis of solar desalination still combined with heat storage system using phase change material (PCM). Desalination, 381, 26–37.&quot;&gt;&lt;span data-dcnode-id=&quot;3007&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3005&quot; instrument_node=&quot;&quot;&gt;; Kabeel and Abdelgaid &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;3003&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR25&quot; id=&quot;ref-link-section-d297840866e454&quot; title=&quot;Kabeel, A. E., &amp;amp; Abdelgaid, M. (2016). Improving the performance of solar still by using PCM as a thermal storage medium under Egyptian conditions. Desalination, 383, 22–28.&quot;&gt;&lt;span data-dcnode-id=&quot;3004&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3002&quot; instrument_node=&quot;&quot;&gt;; Sathyamurthy et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;3000&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR36&quot; id=&quot;ref-link-section-d297840866e457&quot; title=&quot;Sathyamurthy, R., Nagarajan, P. K., Edwin, M., Madhu, B., El-Agouz, S. A., Ahsan, A., et al. (2016). Experimental investigation on conventional solar still with sand heat energy storage. International Journal of Heat and Technology, 34(4), 597–603.&quot;&gt;&lt;span data-dcnode-id=&quot;3001&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2999&quot; instrument_node=&quot;&quot;&gt;; Shalaby et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2997&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR37&quot; id=&quot;ref-link-section-d297840866e460&quot; title=&quot;Shalaby, S. M., El-Bialy, E., &amp;amp; El-Sebaii, A. A. (2016). An experimental investigation of a v-corrugated absorber single-basin solar still using PCM. Desalination, 398, 247–255.&quot;&gt;&lt;span data-dcnode-id=&quot;2998&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2996&quot; instrument_node=&quot;&quot;&gt;). There are several recent studies (Moungar et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2994&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR35&quot; id=&quot;ref-link-section-d297840866e463&quot; title=&quot;Moungar, H., Azzi, A., Sahli, Y., &amp;amp; Haida, A. (2018). Monthly fresh water yield analysis of three solar desalination units a comparative study in the south Algeria climatic condition. International Journal of Heat and Technology, 36(4), 1330–1335.&quot;&gt;&lt;span data-dcnode-id=&quot;2995&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2993&quot; instrument_node=&quot;&quot;&gt;; Hassan et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2991&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d297840866e466&quot; title=&quot;Hassan, H., Ahmed, M. S., &amp;amp; Fathy, M. (2019). Experimental work on the effect of saline water medium on the performance of solar still with tracked parabolic trough collector (TPTC). Renewable Energy, 135, 136–147.&quot;&gt;&lt;span data-dcnode-id=&quot;2992&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2990&quot; instrument_node=&quot;&quot;&gt;; Kumbhar and Sonage &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2988&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR31&quot; id=&quot;ref-link-section-d297840866e469&quot; title=&quot;Kumbhar, S. V., &amp;amp; Sonage, B. K. (2019). Experimental investigations of developed solar still for increment in efficiency and rate of distillate. International Journal of Heat and Technology, 37(2), 471–480.&quot;&gt;&lt;span data-dcnode-id=&quot;2989&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2987&quot; instrument_node=&quot;&quot;&gt;) about enhancement of the solar still performance. Arunkumar et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2985&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR6&quot; id=&quot;ref-link-section-d297840866e473&quot; title=&quot;Arunkumar, T., Raj, K., Rufuss, D. D. W., Denkenberger, D., Tingting, G., Xuan, L., et al. (2019). A review of efficient high productivity solar stills. Renewable and Sustainable Energy Reviews, 101, 197–220.&quot;&gt;&lt;span data-dcnode-id=&quot;2986&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2984&quot; instrument_node=&quot;&quot;&gt;) introduced a comprehensive review of efficient and high productivity solar stills.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2978&quot;&gt;&lt;span data-dcnode-id=&quot;2982&quot; instrument_node=&quot;&quot;&gt;Water extraction from humid air has lower productivity compared to the water desalination processes. The advantages of water extraction from humid air using solar energy can be considered as decentralization, environmentally friendly and sustainability (William et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2980&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR48&quot; id=&quot;ref-link-section-d297840866e479&quot; title=&quot;William G. E., Mohamed M. H., &amp;amp; Fatouh M. (2014). Water production by using solar energy; water recovery from atmospheric air. LAP Lambert Academic Publishing. ISBN: 978-3-659-19835-9.&quot;&gt;&lt;span data-dcnode-id=&quot;2981&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2979&quot; instrument_node=&quot;&quot;&gt;). The water extraction can be categorized as:&lt;/span&gt;&lt;/p&gt;&lt;ol class=&quot;u-list-style-none&quot; data-dcnode-id=&quot;2778&quot;&gt;&lt;span data-dcnode-id=&quot;2977&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2936&quot;&gt;&lt;span data-dcnode-id=&quot;2976&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;u-custom-list-number&quot; data-dcnode-id=&quot;2974&quot;&gt;&lt;span data-dcnode-id=&quot;2975&quot; instrument_node=&quot;&quot;&gt;(a)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2938&quot;&gt;&lt;span data-dcnode-id=&quot;2972&quot; instrument_node=&quot;&quot;&gt;Direct cooling of humid air below the dew point using solar cooling systems; a study performed in Dhahran, Saudi Arabia, showed that the optimum flow rate is 0.3&amp;nbsp;kg/s for collector area of 28&amp;nbsp;m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2970&quot;&gt;&lt;span data-dcnode-id=&quot;2971&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2969&quot; instrument_node=&quot;&quot;&gt; with a maximum efficiency of 66% under an average solar intensity of 800&amp;nbsp;W/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2967&quot;&gt;&lt;span data-dcnode-id=&quot;2968&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2966&quot; instrument_node=&quot;&quot;&gt; (Ibrahim et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2964&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR20&quot; id=&quot;ref-link-section-d297840866e496&quot; title=&quot;Ibrahim, N. I., Al-Sulaiman, F. A., &amp;amp; Saidur, R. (2016). Performance assessment of water production from solar cooling system in humid climate. Energy Conversion and Management, 127, 647–655.&quot;&gt;&lt;span data-dcnode-id=&quot;2965&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2963&quot; instrument_node=&quot;&quot;&gt;). A study evaluating potential of using evaporator coils for water extraction in Jeddah, Saudi Arabia, showed higher potential, and a maximum yield was in August (17.6&amp;nbsp;kg/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2961&quot;&gt;&lt;span data-dcnode-id=&quot;2962&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2960&quot; instrument_node=&quot;&quot;&gt;day) with an air speed of 2.25&amp;nbsp;m/s (Habeebullah &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2958&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR17&quot; id=&quot;ref-link-section-d297840866e501&quot; title=&quot;Habeebullah, B. A. (2009). Potential use of evaporator coils for water extraction in hot and humid areas. Desalination, 237, 330–345.&quot;&gt;&lt;span data-dcnode-id=&quot;2959&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2957&quot; instrument_node=&quot;&quot;&gt;). Further information about various parameters affecting performance of the direct cooling technique is reported in the literature (Sultan &lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;2955&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR41&quot; id=&quot;ref-link-section-d297840866e505&quot; title=&quot;Sultan, A. (2004). Absorption/regeneration non-conventional system for water extraction from atmospheric air. Renewable Energy, 29, 1515–1535.&quot;&gt;&lt;span data-dcnode-id=&quot;2956&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2954&quot; instrument_node=&quot;&quot;&gt;; Miller and Lienhard &lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2952&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR33&quot; id=&quot;ref-link-section-d297840866e508&quot; title=&quot;Miller, J. A., &amp;amp; Lienhard, V. J. H. (2013). Impact of extraction on a humidification–dehumidification desalination system. Desalination, 313, 87–96.&quot;&gt;&lt;span data-dcnode-id=&quot;2953&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2951&quot; instrument_node=&quot;&quot;&gt;; Al-Farayedhi et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2949&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d297840866e511&quot; title=&quot;Al-Farayedhi, A. A., Ibrahim, N. I., &amp;amp; Gandhidasan, P. (2014). Condensate as a water source from vapor compression systems in hot and humid regions. Desalination, 349, 60–67.&quot;&gt;&lt;span data-dcnode-id=&quot;2950&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2948&quot; instrument_node=&quot;&quot;&gt;; Sharan et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2017&quot; data-dcnode-id=&quot;2946&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR38&quot; id=&quot;ref-link-section-d297840866e514&quot; title=&quot;Sharan, G., Roy, A. K., Royon, L., Mongruel, A., &amp;amp; Beysens, D. (2017). Dew plant for bottling water. Journal of Cleaner Production, 155, 83–92.&quot;&gt;&lt;span data-dcnode-id=&quot;2947&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2945&quot; instrument_node=&quot;&quot;&gt;; Alahmer et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2943&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR3&quot; id=&quot;ref-link-section-d297840866e517&quot; title=&quot;Alahmer, A., Al-Dabbas, M., Alsaqoor, S., &amp;amp; Al-Sarayreh, A. (2018). Utilizing of solar energy for extracting freshwater from atmospheric air. Applied Solar Energy, 54(2), 110–118.&quot;&gt;&lt;span data-dcnode-id=&quot;2944&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2942&quot; instrument_node=&quot;&quot;&gt;; Shourideh et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2940&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR39&quot; id=&quot;ref-link-section-d297840866e520&quot; title=&quot;Shourideh, A. H., Ajram, W. B., Al, L. J., Haggag, S., &amp;amp; Mansouri, A. (2018). A comprehensive study of an atmospheric water generator using Peltier effect. Thermal Science and Engineering Progress, 6, 14–26.&quot;&gt;&lt;span data-dcnode-id=&quot;2941&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2939&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2780&quot;&gt;&lt;span data-dcnode-id=&quot;2934&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;u-custom-list-number&quot; data-dcnode-id=&quot;2932&quot;&gt;&lt;span data-dcnode-id=&quot;2933&quot; instrument_node=&quot;&quot;&gt;(b)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2782&quot;&gt;&lt;span data-dcnode-id=&quot;2930&quot; instrument_node=&quot;&quot;&gt;Absorption of moisture from humid air during night hours using strong desiccant materials and regenerating it during sun hours with the application of solar energy. The advantage of using desiccant material is due to its ability to regenerate water at relatively low temperatures ranges from 40 to 70&amp;nbsp;°C, which is a suitable working temperature for the conventional solar stills (Thosapon et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2928&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR44&quot; id=&quot;ref-link-section-d297840866e534&quot; title=&quot;Thosapon, K., Surapong, C., &amp;amp; Kumar, S. (2009). An experimental study of a solar-regenerated liquid desiccant ventilation preconditioning system. Solar Energy, 83, 920–933.&quot;&gt;&lt;span data-dcnode-id=&quot;2929&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2927&quot; instrument_node=&quot;&quot;&gt;). Some theoretical studies were performed for desiccant with solar still (Mohamed et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2017&quot; data-dcnode-id=&quot;2925&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR34&quot; id=&quot;ref-link-section-d297840866e537&quot; title=&quot;Mohamed, M. H., William, G. E., &amp;amp; Fatouh, M. (2017). Solar energy utilization in water production from humid air. Solar Energy, 148, 98–109.&quot;&gt;&lt;span data-dcnode-id=&quot;2926&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2924&quot; instrument_node=&quot;&quot;&gt;) and with HDH system with a closed desiccant loop (Ahmed et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2922&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR1&quot; id=&quot;ref-link-section-d297840866e540&quot; title=&quot;Ahmed, M. A., Zubair, S. M., Abido, M. A., &amp;amp; Bahaidarah, H. M. (2018). An innovative closed-air closed-desiccant HDH system to extract water from the air: A case for zero-brine discharge system. Desalination, 445, 236–248.&quot;&gt;&lt;span data-dcnode-id=&quot;2923&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2921&quot; instrument_node=&quot;&quot;&gt;; Al-Abbasi et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2919&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR2&quot; id=&quot;ref-link-section-d297840866e543&quot; title=&quot;Al-Abbasi, O., Sarac, B., &amp;amp; Ayhan, T. (2019). Experimental investigation and CFD modeling to assess the performance of solar air humidifier. International Journal of Heat and Technology, 37(1), 357–364.&quot;&gt;&lt;span data-dcnode-id=&quot;2920&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2918&quot; instrument_node=&quot;&quot;&gt;). Different desiccant materials can be to absorb moisture from ambient air such as silica gel and CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2916&quot;&gt;&lt;span data-dcnode-id=&quot;2917&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2915&quot; instrument_node=&quot;&quot;&gt;. Several other materials are also tested and found effective including metal–organic framework materials (Kim et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2913&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR28&quot; id=&quot;ref-link-section-d297840866e549&quot; title=&quot;Kim, H., Rao, S. R., Kapustin, E. A., Zhao, L., Yang, S., Yaghi, O. M., et al. (2018). Adsorption-based atmospheric water harvesting device for arid climates. Nature Communications, 9, 1191.&quot;&gt;&lt;span data-dcnode-id=&quot;2914&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2912&quot; instrument_node=&quot;&quot;&gt;; Fathieh et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2910&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR16&quot; id=&quot;ref-link-section-d297840866e552&quot; title=&quot;Fathieh, F., Kalmutzki, M. J., Kapustin, E. A., Waller, P. J., Yang, J., &amp;amp; Yaghi, O. M. (2019). Practical water production from desert air. Science Advances, 4, eaat3198.&quot;&gt;&lt;span data-dcnode-id=&quot;2911&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2909&quot; instrument_node=&quot;&quot;&gt;). Li et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2907&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR32&quot; id=&quot;ref-link-section-d297840866e555&quot; title=&quot;Li, R., Shi, Y., Shi, L., Alsaedi, M., &amp;amp; Wang, P. (2018). Harvesting water from air: Using anhydrous salt with sunlight. Environmental Science and Technology, 52, 5398–5406.&quot;&gt;&lt;span data-dcnode-id=&quot;2908&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2906&quot; instrument_node=&quot;&quot;&gt;) tested the physical and chemical stability of 14 common salt couples and showed that only three types of salt materials were distinguished (CuCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2904&quot;&gt;&lt;span data-dcnode-id=&quot;2905&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2903&quot; instrument_node=&quot;&quot;&gt;, CuSO&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2901&quot;&gt;&lt;span data-dcnode-id=&quot;2902&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2900&quot; instrument_node=&quot;&quot;&gt; and MgSO&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2898&quot;&gt;&lt;span data-dcnode-id=&quot;2899&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2897&quot; instrument_node=&quot;&quot;&gt;). Zhao et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2895&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR51&quot; id=&quot;ref-link-section-d297840866e565&quot; title=&quot;Zhao, F., Zhou, X., Liu, Y., Shi, Y., Dai, Y., &amp;amp; Yu, G. (2019). Super moisture-absorbent gels for all-weather atmospheric water harvesting. Advanced Materials, 31, 1806446.&quot;&gt;&lt;span data-dcnode-id=&quot;2896&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2894&quot; instrument_node=&quot;&quot;&gt;) introduced a super moisture-absorbent gels composed of “hygroscopic polypyrrole chloride penetrating in hydrophilicity-switchable polymeric network of poly N-isopropylacrylamide”, and use of this material showed a high and efficient water production. Many studies focused on use of the CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2892&quot;&gt;&lt;span data-dcnode-id=&quot;2893&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2891&quot; instrument_node=&quot;&quot;&gt; desiccant due to its safety and low cost. An experimental study in Kurukshetra, India, was performed on a single basin solar still with CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2889&quot;&gt;&lt;span data-dcnode-id=&quot;2890&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2888&quot; instrument_node=&quot;&quot;&gt; desiccant material in a saw wood bed. The water yield is low (0.5&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2886&quot;&gt;&lt;span data-dcnode-id=&quot;2887&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2885&quot; instrument_node=&quot;&quot;&gt;day) when using 2.8&amp;nbsp;kg of desiccant material (Kumar and Yadav &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2883&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR30&quot; id=&quot;ref-link-section-d297840866e574&quot; title=&quot;Kumar, M., &amp;amp; Yadav, A. (2015). Experimental investigation of solar powered water production from atmospheric air by using composite desiccant material “CaCl2/saw wood”. Desalination, 367, 2016–2222.&quot;&gt;&lt;span data-dcnode-id=&quot;2884&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2882&quot; instrument_node=&quot;&quot;&gt;). In Tanta, Egypt, sand was used by Kabeel (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;2880&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR22&quot; id=&quot;ref-link-section-d297840866e577&quot; title=&quot;Kabeel, A. E. (2004). Application of sandy bed solar collector system for extraction of water from air. In Eighth international water technology conference, IWTC8, Alexandria, Egypt.&quot;&gt;&lt;span data-dcnode-id=&quot;2881&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2879&quot; instrument_node=&quot;&quot;&gt;) as bed material for CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2877&quot;&gt;&lt;span data-dcnode-id=&quot;2878&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2876&quot; instrument_node=&quot;&quot;&gt; desiccant with 30% initial concentration and 20&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2874&quot;&gt;&lt;span data-dcnode-id=&quot;2875&quot; instrument_node=&quot;&quot;&gt;o&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2873&quot; instrument_node=&quot;&quot;&gt; inclination angle of the solar still and results showed a yield of 1.2&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2871&quot;&gt;&lt;span data-dcnode-id=&quot;2872&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2870&quot; instrument_node=&quot;&quot;&gt;day. Based on the invention of Krumsvik (&lt;/span&gt;&lt;a aria-label=&quot;Reference 1998&quot; data-dcnode-id=&quot;2868&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR29&quot; id=&quot;ref-link-section-d297840866e587&quot; title=&quot;Krumsvik, P. K. (1998). Method and device for recovering water from a humid atmospheric. U.S. Patent No.5846296.&quot;&gt;&lt;span data-dcnode-id=&quot;2869&quot; instrument_node=&quot;&quot;&gt;1998&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2867&quot; instrument_node=&quot;&quot;&gt;) and Kabeel (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2865&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR23&quot; id=&quot;ref-link-section-d297840866e590&quot; title=&quot;Kabeel, A. E. (2007). Water production from air using multi-shelves solar glass pyramid system. Renewable Energy, 32, 157–172.&quot;&gt;&lt;span data-dcnode-id=&quot;2866&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2864&quot; instrument_node=&quot;&quot;&gt;) continued his research effort in Tanta, Egypt, and developed a multi-shelves pyramids solar still, and 5% increase in productivity is achieved when using cloth bed compared to sand bed with 30% concentration of CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2862&quot;&gt;&lt;span data-dcnode-id=&quot;2863&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt;. The pyramid solar still design with multi-shelves is able to produce 2.5&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2859&quot;&gt;&lt;span data-dcnode-id=&quot;2860&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2858&quot; instrument_node=&quot;&quot;&gt;day. In Cairo, Egypt, two bed materials (sand and cloth) were compared when operated as a carrier bed for CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2856&quot;&gt;&lt;span data-dcnode-id=&quot;2857&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2855&quot; instrument_node=&quot;&quot;&gt; desiccant with 30% initial concentration in a multi-shelves solar still. Results showed an evaporation quantity of 1.23 and 2.32&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2853&quot;&gt;&lt;span data-dcnode-id=&quot;2854&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2852&quot; instrument_node=&quot;&quot;&gt;day for sand and cloth beds, respectively, and thermal efficiencies of 17.76 and 29.3%, respectively (William et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2850&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR49&quot; id=&quot;ref-link-section-d297840866e602&quot; title=&quot;William, G. E., Mohamed, M. H., &amp;amp; Fatouh, M. (2015). Desiccant system for water production from humid air using solar energy. Energy, 90, 177–1720.&quot;&gt;&lt;span data-dcnode-id=&quot;2851&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2849&quot; instrument_node=&quot;&quot;&gt;). Water yield of 2.25&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2847&quot;&gt;&lt;span data-dcnode-id=&quot;2848&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2846&quot; instrument_node=&quot;&quot;&gt;day can be extracted from air using CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2844&quot;&gt;&lt;span data-dcnode-id=&quot;2845&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2843&quot; instrument_node=&quot;&quot;&gt; desiccant with ACF (active carbon felt), two devices driven by solar energy (solar collector) were compared. The yield was 0.42&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2841&quot;&gt;&lt;span data-dcnode-id=&quot;2842&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2840&quot; instrument_node=&quot;&quot;&gt;day for the open-type device with roll-up composite sorbent. The semi-opened type showed higher yield of 2.25&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2838&quot;&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2837&quot; instrument_node=&quot;&quot;&gt;day (Wang et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2017&quot; data-dcnode-id=&quot;2835&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR46&quot; id=&quot;ref-link-section-d297840866e614&quot; title=&quot;Wang, J. Y., Liu, J. Y., Wang, R. Z., &amp;amp; Wang, L. W. (2017). Experimental investigation on two solar-driven sorption based devices to extract fresh water from atmosphere. Applied Thermal Engineering, 127, 1608–1616.&quot;&gt;&lt;span data-dcnode-id=&quot;2836&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2834&quot; instrument_node=&quot;&quot;&gt;). A yield of 1&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2832&quot;&gt;&lt;span data-dcnode-id=&quot;2833&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2831&quot; instrument_node=&quot;&quot;&gt;day can be achieved in Al-Hada and Taif, Saudi Arabia, and a sandy bed with CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2829&quot;&gt;&lt;span data-dcnode-id=&quot;2830&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2828&quot; instrument_node=&quot;&quot;&gt; desiccant was also used (Hamed et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2826&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR18&quot; id=&quot;ref-link-section-d297840866e621&quot; title=&quot;Hamed, A. M., Ayman, A. A., &amp;amp; El-Shafei, B. Z. (2011). Application of solar energy for recovery of water from atmospheric air in climatic zones of Saudi Arabia. Natural Resource, 2, 8–17.&quot;&gt;&lt;span data-dcnode-id=&quot;2827&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2825&quot; instrument_node=&quot;&quot;&gt;). Wang et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2823&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR47&quot; id=&quot;ref-link-section-d297840866e625&quot; title=&quot;Wang, J. Y., Wang, R. Z., Tu, Y. D., &amp;amp; Wang, L. W. (2018). Universal scalable sorption-based atmosphere water harvesting. Energy, 165, 387–395.&quot;&gt;&lt;span data-dcnode-id=&quot;2824&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2822&quot; instrument_node=&quot;&quot;&gt;) developed a theoretical framework for sorption-based AWH using a scalable prototype and harvested 38.5&amp;nbsp;l/day of fresh water. The energy consumption was 7.2&amp;nbsp;MJ/kg of produced fresh water. In 2019, Entezari et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2820&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR14&quot; id=&quot;ref-link-section-d297840866e628&quot; title=&quot;Entezari, A., Ejeian, M., &amp;amp; Wang, R. Z. (2019). Extraordinary air water harvesting performance with three phase sorption. Materials Today Energy, 13, 362–373.&quot;&gt;&lt;span data-dcnode-id=&quot;2821&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2819&quot; instrument_node=&quot;&quot;&gt;) introduced three active carbon felt composites to be used for AWH application. They used three different salts as sorbent materials. Experimental results showed a maximum yield of 2.9&amp;nbsp;kg&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2817&quot;&gt;&lt;span data-dcnode-id=&quot;2818&quot; instrument_node=&quot;&quot;&gt;water&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2816&quot; instrument_node=&quot;&quot;&gt;/kg&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2814&quot;&gt;&lt;span data-dcnode-id=&quot;2815&quot; instrument_node=&quot;&quot;&gt;sorbent&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2813&quot; instrument_node=&quot;&quot;&gt; under 70% relative humidity conditions. A few researches were performed for atmospheric water harvesting (AWH) from desert and arid areas due to its low relative humidity using various designs and special desiccant materials, and the obtained water productivity and efficiency were very low due to lower relative humidity (Kim et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2811&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR28&quot; id=&quot;ref-link-section-d297840866e635&quot; title=&quot;Kim, H., Rao, S. R., Kapustin, E. A., Zhao, L., Yang, S., Yaghi, O. M., et al. (2018). Adsorption-based atmospheric water harvesting device for arid climates. Nature Communications, 9, 1191.&quot;&gt;&lt;span data-dcnode-id=&quot;2812&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2810&quot; instrument_node=&quot;&quot;&gt;; Li et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2808&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR32&quot; id=&quot;ref-link-section-d297840866e638&quot; title=&quot;Li, R., Shi, Y., Shi, L., Alsaedi, M., &amp;amp; Wang, P. (2018). Harvesting water from air: Using anhydrous salt with sunlight. Environmental Science and Technology, 52, 5398–5406.&quot;&gt;&lt;span data-dcnode-id=&quot;2809&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2807&quot; instrument_node=&quot;&quot;&gt;; Fathieh et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2805&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR16&quot; id=&quot;ref-link-section-d297840866e642&quot; title=&quot;Fathieh, F., Kalmutzki, M. J., Kapustin, E. A., Waller, P. J., Yang, J., &amp;amp; Yaghi, O. M. (2019). Practical water production from desert air. Science Advances, 4, eaat3198.&quot;&gt;&lt;span data-dcnode-id=&quot;2806&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2804&quot; instrument_node=&quot;&quot;&gt;; Zhao et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2802&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR51&quot; id=&quot;ref-link-section-d297840866e645&quot; title=&quot;Zhao, F., Zhou, X., Liu, Y., Shi, Y., Dai, Y., &amp;amp; Yu, G. (2019). Super moisture-absorbent gels for all-weather atmospheric water harvesting. Advanced Materials, 31, 1806446.&quot;&gt;&lt;span data-dcnode-id=&quot;2803&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2801&quot; instrument_node=&quot;&quot;&gt;). Tu et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2799&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR45&quot; id=&quot;ref-link-section-d297840866e648&quot; title=&quot;Tu, Y., Wang, R., Zhang, Y., &amp;amp; Wang, J. (2018). Progress and expectation of atmospheric water harvesting. Joule, 2, 1452–1475.&quot;&gt;&lt;span data-dcnode-id=&quot;2800&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2798&quot; instrument_node=&quot;&quot;&gt;) introduced a comprehensive review on the progress of AWH techniques related to arid and semiarid regions. In 2020, Elashmawy (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2020b&quot; data-dcnode-id=&quot;2796&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR12&quot; id=&quot;ref-link-section-d297840866e651&quot; title=&quot;Elashmawy, M. (2020b). Experimental study on water extraction from atmospheric air using tubular solar still. Journal of Cleaner Production, 249, 119322.&quot;&gt;&lt;span data-dcnode-id=&quot;2797&quot; instrument_node=&quot;&quot;&gt;2020b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2795&quot; instrument_node=&quot;&quot;&gt;) proposed a new AWH device using tubular solar still with forced air circulation (4&amp;nbsp;m/s). Experimental work was executed under extremely low-humid air (&lt;/span&gt;&lt;i data-dcnode-id=&quot;2793&quot;&gt;&lt;span data-dcnode-id=&quot;2794&quot; instrument_node=&quot;&quot;&gt;RH &lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2792&quot; instrument_node=&quot;&quot;&gt;= 12%) in Hail city. The device was able to produce 0.47&amp;nbsp;l/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2790&quot;&gt;&lt;span data-dcnode-id=&quot;2791&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2789&quot; instrument_node=&quot;&quot;&gt;day with 25% maximum thermal efficiency. Recently, Elashmawy and Alshammari (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2020&quot; data-dcnode-id=&quot;2787&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d297840866e660&quot; title=&quot;Elashmawy, M., &amp;amp; Alshammari, F. (2020). Atmospheric water harvesting from low humid regions using tubular solar still powered by a parabolic concentrator system. Journal of Cleaner Production, 256, 120329.&quot;&gt;&lt;span data-dcnode-id=&quot;2788&quot; instrument_node=&quot;&quot;&gt;2020&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2786&quot; instrument_node=&quot;&quot;&gt;) have proposed a new system of AWH that is able to extract water from extreme low-humid regions (RH = 16%). The proposed system consists of tubular solar still mounted at the focal line of a parabolic solar concentrator to increase the temperature of the regeneration process (desorption process). Results showed a water production of 0.51&amp;nbsp;l/kg of CaCl&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2784&quot;&gt;&lt;span data-dcnode-id=&quot;2785&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2783&quot; instrument_node=&quot;&quot;&gt; sorbent (desiccant). The system CPL reached $0.15, which is acceptable and competitive for very low humid conditions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2781&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2779&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;p data-dcnode-id=&quot;2776&quot;&gt;&lt;span data-dcnode-id=&quot;2777&quot; instrument_node=&quot;&quot;&gt;In the present study, the feasibility and potential of atmospheric water harvesting (AWH) from relative low-humid region (26.5%) is tested in Hail city, Saudi Arabia. All materials and equipment are locally available with relatively low cost. The achieved results are very promising, which can be applied in similar low-humid regions worldwide, which can be remote from coastal areas with no rivers or underground water.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2712&quot; data-title=&quot;Experimental Setup&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2713&quot; id=&quot;Sec2-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2771&quot; id=&quot;Sec2&quot;&gt;&lt;span data-dcnode-id=&quot;2772&quot; instrument_node=&quot;&quot;&gt;Experimental Setup&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2714&quot; id=&quot;Sec2-content&quot;&gt;&lt;p data-dcnode-id=&quot;2763&quot;&gt;&lt;span data-dcnode-id=&quot;2770&quot; instrument_node=&quot;&quot;&gt;Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2768&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;2769&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2767&quot; instrument_node=&quot;&quot;&gt; shows a detailed schematic diagram of the experimental test-rig. It is designed as a trapezoidal prism with a square base of 0.95&amp;nbsp;m and 1.6&amp;nbsp;m as effective height, the design has four sides, two triangular sides with (3&amp;nbsp;mm thickness) glasses, and the other two sides are a rectangular (3&amp;nbsp;mm thickness) glass sides. The four glass sides are the coldest areas inside the solar still providing a condensation surface for the water vapor and drive the condensed water to the lowest basin by gravity. The lowest basin is 0.36&amp;nbsp;m above the floor and designed with peripheral channels to collect the distilled water, which utilize the lower basin to be extra shelf as shown in Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2765&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;2766&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2764&quot; instrument_node=&quot;&quot;&gt;. Adding extra shelve is a key parameter for the present work. This technique will increase the ability of the still to carry more desiccant solution to overcome low moisture content in Hail city. Added shelve increased the available surface area of the bed material by 37.85%, enabling more desiccant quantity and contact area during the absorption process. The two rectangular sides are opened during night hours (absorption process) and closed during day hours (regeneration process). The prism solar still consists of 5 rectangular shelves including the lowest basin of the solar still. All shelves are filled with black cotton cloth as bed and saturated with the desiccant solution. Horizontal solar intensity is measured by a pyranometer (± 1%). The weight of the desiccant, water and bed are measured using a sensitive balance (PGW 2502i, Max 2500&amp;nbsp;g, least count 0.01&amp;nbsp;g). Weather conditions are measured using a small pocket weather tracker (± 3% accuracy for relative humidity and ± 1&amp;nbsp;°C for ambient temperature).&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2739&quot; data-test=&quot;figure&quot; data-title=&quot;Figure&amp;nbsp;1&quot; id=&quot;figure-1&quot;&gt;&lt;figure data-dcnode-id=&quot;2740&quot;&gt;&lt;figcaption data-dcnode-id=&quot;2760&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;2761&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;2762&quot; instrument_node=&quot;&quot;&gt;Figure&amp;nbsp;1&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;2751&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;2755&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;2756&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/1&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;2757&quot;&gt;&lt;source data-dcnode-id=&quot;2759&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11053-020-09662-y/MediaObjects/11053_2020_9662_Fig1_HTML.png?as=webp&quot; type=&quot;image/webp&quot;&gt;&lt;img alt=&quot;figure 1&quot; aria-describedby=&quot;Fig1&quot; data-dcnode-id=&quot;2758&quot; height=&quot;508&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11053-020-09662-y/MediaObjects/11053_2020_9662_Fig1_HTML.png&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;2752&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-1-desc&quot;&gt;&lt;p data-dcnode-id=&quot;275 id=&quot;Sec4&quot;&gt;&lt;span data-dcnode-id=&quot;2549&quot; instrument_node=&quot;&quot;&gt;Results and Discussion&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2076&quot; id=&quot;Sec4-content&quot;&gt;&lt;p data-dcnode-id=&quot;2543&quot;&gt;&lt;span data-dcnode-id=&quot;2547&quot; instrument_node=&quot;&quot;&gt;This study is executed under the climatic conditions of the Hail city in the middle north of Saudi Arabia (27.64° N, 41.75° E). The strategy of the study is essentially to allow the desiccant saturated with moisture from atmospheric air during enough long period to make sure that the desiccant concentration is brought to the equilibrium saturation value. Normally, an initial desiccant concentration of 30% has been reported in the literature, which is suitable for areas with high humid air (50–90%). However, in the case of Hail region, the relative humidity is extremely lower and reaches sometimes lower than 10% during day hours. At night hours, the relative humidity raised up and reaches a feasible value of 25–60% in some year periods. A May month is selected for the tests in this study because it represents the middle value of the humidity ranges during a year period as shown in Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2545&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2546&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2544&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2516&quot; data-test=&quot;figure&quot; data-title=&quot;Figure&amp;nbsp;3&quot; id=&quot;figure-3&quot;&gt;&lt;figure data-dcnode-id=&quot;2517&quot;&gt;&lt;figcaption data-dcnode-id=&quot; &lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2514&quot; id=&quot;Sec5&quot;&gt;&lt;span data-dcnode-id=&quot;2515&quot; instrument_node=&quot;&quot;&gt;Hail Climatic Analysis&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2512&quot;&gt;&lt;span data-dcnode-id=&quot;2513&quot; instrument_node=&quot;&quot;&gt;The Hail city is a non-coastal city with almost 900–1000&amp;nbsp;m above sea level and has relatively low humidity.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2479&quot;&gt;&lt;span data-dcnode-id=&quot;2511&quot; instrument_node=&quot;&quot;&gt;Figures&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2509&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2506&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;2507&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2505&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2503&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig5&quot;&gt;&lt;span data-dcnode-id=&quot;2504&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2502&quot; instrument_node=&quot;&quot;&gt; show the climatic conditions of four cities: Hail (non-coastal) and Jeddah (coastal) in Saudi Arabia in addition to Cairo and Tanta cities in Egypt. An important parameter is the absolute humidity, Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2500&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;2501&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2499&quot; instrument_node=&quot;&quot;&gt;, showing the available moisture in the atmospheric air. Hail city has the lowest absolute humidity. Minimum amount (4&amp;nbsp;&lt;/span&gt;&lt;i data-dcnode-id=&quot;2497&quot;&gt;&lt;span data-dcnode-id=&quot;2498&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2495&quot;&gt;&lt;span data-dcnode-id=&quot;2496&quot; instrument_node=&quot;&quot;&gt;w&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2492&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2491&quot; instrument_node=&quot;&quot;&gt;air), which is observed in 5&amp;nbsp;months (Feb., Jul., Aug., Sep. and Oct.) and maximum amount (7&amp;nbsp;&lt;/span&gt;&lt;i data-dcnode-id=&quot;2489&quot;&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;2487&quot;&gt;&lt;span data-dcnode-id=&quot;2488&quot; instrument_node=&quot;&quot;&gt;w&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2486&quot; instrument_node=&quot;&quot;&gt;/m&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2484&quot;&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2483&quot; instrument_node=&quot;&quot;&gt;air), which is observed in 2&amp;nbsp;months (May and Nov.). Humidity in Hail city is almost 28% of Jeddah’s humidity (coastal city). It is clear that the potential of AWH from Hail city is much lower than coastal cities; this is a significant challenge. Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2481&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig5&quot;&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt; shows average temperatures of the four cities in comparison. Hail average temperature is almost lower than Jeddah and higher than Cairo and Tanta.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;2452&quot; data-test=&quot;figure&quot; data-title=&quot;Figure&amp;nbsp;4&quot; id=&quot;figure-4&quot;&gt;&lt;figure data-dcnode-id=&quot;2453&quot;&gt;&lt;figcaption data-dcnode-id=&quot;2476&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;2477&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;Figure&amp;nbsp;4&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;2464&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;2471&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;2472&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/4&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;2473&quot;&gt;&lt;source data-dcnode-id=&quot;2475&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11053-020-09662-y/MediaObjects/11053_2020_9662_Fig4_HTML.pn .&quot;&gt;&lt;span data-dcnode-id=&quot;2442&quot; instrument_node=&quot;&quot;&gt;2020&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2440&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;2427&quot;&gt;&lt;a aria-label=&quot;Full size image figure 5&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;2428&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure5 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11053-020-09662-y/figures/5&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2435&quot;&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;2429&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;2430&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;2431&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;2434&quot; instrument_node=&quot;&quot;&gt;
