&lt;/span&gt;&lt;p data-dcnode-id=&quot;7310&quot;&gt;&lt;span data-dcnode-id=&quot;7311&quot; instrument_node=&quot;&quot;&gt;PTFE’s broad temperature tolerance of -328 °F (-200 °C) to 500 °F (260 °C) makes it one of the few plastics that can be utilized for high and low temperature applications. PTFE’s high dielectric strength makes PTFE heat shrink well-suited for encapsulation of wires and electrical devices. For outdoor use, PTFE heat shrink is virtually impervious to weather.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7309&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7304&quot;&gt;&lt;span data-dcnode-id=&quot;7308&quot; instrument_node=&quot;&quot;&gt;Zeus heat shrink tubing products are provided in their expanded state. With the brief application of heat, these materials mold themselves snugly around the most intricate and irregular shapes to form a completely sealed covering. Sources of heat and methods of heating vary. Please &lt;/span&gt;&lt;a data-dcnode-id=&quot;7306&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.zeusinc.com/contact-us&quot;&gt;&lt;span data-dcnode-id=&quot;7307&quot; instrument_node=&quot;&quot;&gt;contact us&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7305&quot; instrument_node=&quot;&quot;&gt; or call 1-800-526-3842 and speak with a Zeus Technical Account Manager to assist you in selecting the best heat option for your application.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7303&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;7301&quot;&gt;&lt;span data-dcnode-id=&quot;7302&quot; instrument_node=&quot;&quot;&gt;Shrink Ratios and Recovery&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;7300&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7298&quot;&gt;&lt;span data-dcnode-id=&quot;7299&quot; instrument_node=&quot;&quot;&gt;Heat shrink ratio refers to the final diameter of the heat shrinkable material after being allowed to shrink fully unrestrained compared to the original diameter of the pre-shrunk material. After heat shrinking is complete, the material is considered to be in its “recovered” or “recovery” state. Thus, final dimensions for heat shrink usually refer to recovered or fully shrunk dimensions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7295&quot;&gt;&lt;span data-dcnode-id=&quot;7296&quot; instrument_node=&quot;&quot;&gt;As an example, for a heat shrinkable material with a 2:1 heat shrink ratio, the final diameter of the fully shrunk (recovered) material will be reduced to 1/2 of the pre-shrunk diameter. Or, put another way, the original diameter of the pre-shrunk material will be 2× the diameter of the fully shrunk (recovered) material; the ratio of their diameters, pre-shrunk:recovered, will be 2:1.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7294&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7292&quot;&gt;&lt;span data-dcnode-id=&quot;7293&quot; instrument_node=&quot;&quot;&gt;Note that heat shrink is applied over a material or component to encapsulate it; thus, in practical application, the heat shrink is restrained from being shrunk completely.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7291&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7289&quot;&gt;&lt;span data-dcnode-id=&quot;7290&quot; instrument_node=&quot;&quot;&gt;Heat shrink ratio is a fundamental consideration for every application based on the degree of non-uniformity of the items or components to be covered. The more irregular the shape, the greater the heat shrink ratio needed to cover the shape. For more uniform parts such as cylinders or wires, smaller heat shrink ratios are generally sufficient to achieve proper coverage. Consideration should also be given to tapered parts: While appearing generally uniform in shape, the degree of taper should be taken into account when selecting heat shrink and its shrink ratio.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;7286&quot;&gt;&lt;span data-dcnode-id=&quot;7287&quot; instrument_node=&quot;&quot;&gt;Heat Shrinking Guidelines for PTFE Heat Shrink Tubing&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;7285&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;7253&quot;&gt;&lt;span data-dcnode-id=&quot;7284&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7279&quot;&gt;&lt;span data-dcnode-id=&quot;7283&quot; instrument_node=&quot;&quot;&gt;Always assure good ventilation in the immediate work area before beginning the heat shrink process. (&lt;/span&gt;&lt;strong data-dcnode-id=&quot;7281&quot;&gt;&lt;span data-dcnode-id=&quot;7282&quot; instrument_node=&quot;&quot;&gt;Caution&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7280&quot; instrument_node=&quot;&quot;&gt;: Fumes can cause nausea and dizziness).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7278&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7276&quot;&gt;&lt;span data-dcnode-id=&quot;7277&quot; instrument_node=&quot;&quot;&gt;PTFE heat shrink tubing requires approximately 650 °F ± 25 °F (340 °C ± 5 °C) to initiate shrinkage. While this is a liberally safe range, these temperatures are approximate. Actual shrink temperatures may vary based on dimensions and wall thickness of the tubing, methods of heat application, and other factors. Zeus is happy to provide samples to test in your application and help you determine your best material choice.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7275&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7273&quot;&gt;&lt;span data-dcnode-id=&quot;7274&quot; instrument_node=&quot;&quot;&gt;The mandrel (part) to be covered by the heat shrink must be able to tolerate the range of the heat shrink temperature.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7270&quot;&gt;&lt;span data-dcnode-id=&quot;7271&quot; instrument_node=&quot;&quot;&gt;Parts or mandrels may act as a heat sink which may cool the heat shrink prematurely or require more time to reach the necessary temperature. Therefore, Zeus recommends preheating larger diameter mandrels and other parts.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7269&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7264&quot;&gt;&lt;span data-dcnode-id=&quot;7268&quot; instrument_node=&quot;&quot;&gt;Generally, heat shrink should be allowed to recover a minimum of 20%. You may experience some slight longitudinal change depending on the amount of recovery. &lt;/span&gt;&lt;a data-dcnode-id=&quot;7266&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.zeusinc.com/contact-us&quot;&gt;&lt;span data-dcnode-id=&quot;7267&quot; instrument_node=&quot;&quot;&gt;Contact us&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7265&quot; instrument_node=&quot;&quot;&gt; if longitudinal change is a concern.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7263&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7261&quot;&gt;&lt;span data-dcnode-id=&quot;7262&quot; instrument_node=&quot;&quot;&gt;Heating and cooling should be even on all sides for best results. Uneven heating or cooling tends to split the side of the heat shrink that is still in the “gel” state while the other side may be in the hard or crystalline state, particularly upon recovery.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7260&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7255&quot;&gt;&lt;span data-dcnode-id=&quot;7259&quot; instrument_node=&quot;&quot;&gt;Ovens are the most reliable way to recover heat shrink products due to their ability to ensure even heating and reduce the risk of overheating the material (which can lead to brittleness and cracking).&amp;nbsp; If a heat gun is to be used, please &lt;/span&gt;&lt;a data-dcnode-id=&quot;7257&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.zeusinc.com/contact-us&quot;&gt;&lt;span data-dcnode-id=&quot;7258&quot; instrument_node=&quot;&quot;&gt;contact&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7256&quot; instrument_node=&quot;&quot;&gt; Zeus for tips on proper heat application to achieve the most uniform recovery.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7254&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;7252&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7247&quot;&gt;&lt;span data-dcnode-id=&quot;7251&quot; instrument_node=&quot;&quot;&gt;Zeus PTFE heat shrink tubing is available with of 2:1 and 4:1 shrink ratios and can be selected based on American Wire Gauge (AWG) or fractional sizes. This heat shrinkable material incorporates all of the same high standards and characteristics of PTFE. We also provide custom specifications and tolerances including our Sub-Lite-Wall&lt;/span&gt;&lt;sup data-dcnode-id=&quot;7249&quot;&gt;&lt;span data-dcnode-id=&quot;7250&quot; instrument_node=&quot;&quot;&gt;® &lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7248&quot; instrument_node=&quot;&quot;&gt;sizes upon request.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7246&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;7244&quot;&gt;&lt;span data-dcnode-id=&quot;7245&quot; instrument_node=&quot;&quot;&gt;Applicable Specifications&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;7243&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7241&quot;&gt;&lt;span data-dcnode-id=&quot;7242&quot; instrument_node=&quot;&quot;&gt;Sizes of PTFE Heat Shrink listed on the Qualified Products List comply with AS23053/12.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7238&quot;&gt;&lt;span data-dcnode-id=&quot;7239&quot; instrument_node=&quot;&quot;&gt;For all cases of military or commercial specifications, the latest revisions apply. This heat shrink is supplied in natural (translucent) color unless otherwise specified. &amp;nbsp;Mil-STD-104 colors are available upon request.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7237&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;tabz&quot; data-dcnode-id=&quot;7129&quot;&gt;&lt;span data-dcnode-id=&quot;7236&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;tabz-desktop&quot; data-dcnode-id=&quot;7224&quot;&gt;&lt;span data-dcnode-id=&quot;7235&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li class=&quot;desktopTab&quot; data-dcnode-id=&quot;7231&quot; data-tab=&quot;0&quot;&gt;&lt;a class=&quot;tab&quot; data-dcnode-id=&quot;7232&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.zeusinc.com/products/heat-shrinkable-tubing/ptfe-21-awg-and-fractional-heat-shrink&quot;&gt;&lt;span data-dcnode-id=&quot;7233&quot;&gt;&lt;span data-dcnode-id=&quot;7234&quot; instrument_node=&quot;&quot;&gt;APPLICATIONS&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7230&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li class=&quot;desktopTab&quot; data-dcnode-id=&quot;7226&quot; data-tab=&quot;1&quot;&gt;&lt;a class=&quot;tab&quot; data-dcnode-id=&quot;7227&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.zeusinc.com/products/heat-shrinkable-tubing/ptfe-21-awg-and-fractional-heat-shrink&quot;&gt;&lt;span data-dcnode-id=&quot;7228&quot;&gt;&lt;span data-dcnode-id=&quot;7229&quot; instrument_node=&quot;&quot;&gt;KEY PROPERTIES&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7225&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;7223&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;tabz-mobile&quot; data-dcnode-id=&quot;7131&quot;&gt;&lt;span data-dcnode-id=&quot;7222&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li class=&quot;mobileTab&quot; data-dcnode-id=&quot;7198&quot; data-tab=&quot;0&quot;&gt;&lt;span data-dcnode-id=&quot;7221&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;tab&quot; data-dcnode-id=&quot;7218&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.zeusinc.com/products/heat-shrinkable-tubing/ptfe-21-awg-and-fractional-heat-shrink&quot;&gt;&lt;span data-dcnode-id=&quot;7219&quot;&gt;&lt;span data-dcnode-id=&quot;7220&quot; instrument_node=&quot;&quot;&gt;APPLICATIONS&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;tab-content&quot; data-dcnode-id=&quot;7200&quot;&gt;&lt;span data-dcnode-id=&quot;7216&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7212&quot;&gt;&lt;strong data-dcnode-id=&quot;7214&quot;&gt;&lt;span data-dcnode-id=&quot;7215&quot; instrument_node=&quot;&quot;&gt;Encapsulation&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7213&quot; instrument_node=&quot;&quot;&gt; – PTFE heat shrink provides protection from a range of environmental extremes for your critical components. This heat shrink can easily tolerate wide temperature ranges, exposure to chemicals, and long-term weather exposure. PTFE heat shrink can be used to cover such items as temperature probes, metal roll covers, wires and cables, electronics, sensors, to name but a few.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7211&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7207&quot;&gt;&lt;strong data-dcnode-id=&quot;7209&quot;&gt;&lt;span data-dcnode-id=&quot;7210&quot; instrument_node=&quot;&quot;&gt;Insulation&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7208&quot; instrument_node=&quot;&quot;&gt; – PTFE heat shrink’s dielectric properties make it a good choice for encapsulating and insulating electrical components including batteries (lithium and alkaline) and other electrical devices. PTFE heat shrink’s heat tolerance allows it to continue to perform at temperatures from the very cold to the very hot.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7206&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7202&quot;&gt;&lt;strong data-dcnode-id=&quot;7204&quot;&gt;&lt;span data-dcnode-id=&quot;7205&quot; instrument_node=&quot;&quot;&gt;Wire Harness&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7203&quot; instrument_node=&quot;&quot;&gt; – PTFE heat shrink’s excellent dielectric properties make is a good choice for covering wires and cables and can even support splicing. Once covered, PTFE heat shrink also serves as insulation, and its properties are retained across its wide working temperature span.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;7199&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7197&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li class=&quot;mobileTab&quot; data-dcnode-id=&quot;7133&quot; data-tab=&quot;1&quot;&gt;&lt;span data-dcnode-id=&quot;7196&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;tab&quot; data-dcnode-id=&quot;7193&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.zeusinc.com/products/heat-shrinkable-tubing/ptfe-21-awg-and-fractional-heat-shrink&quot;&gt;&lt;span data-dcnode-id=&quot;7194&quot;&gt;&lt;span data-dcnode-id=&quot;7195&quot; instrument_node=&quot;&quot;&gt;KEY PROPERTIES&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;tab-content&quot; data-dcnode-id=&quot;7135&quot;&gt;&lt;span data-dcnode-id=&quot;7191&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7187&quot;&gt;&lt;strong data-dcnode-id=&quot;7189&quot;&gt;&lt;span data-dcnode-id=&quot;7190&quot; instrument_node=&quot;&quot;&gt;Biocompatible&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7188&quot; instrument_node=&quot;&quot;&gt; – Zeus PTFE heat shrink is non-toxic and USP Class VI approved, so you can trust its biocompatibility.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7186&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7182&quot;&gt;&lt;strong data-dcnode-id=&quot;7184&quot;&gt;&lt;span data-dcnode-id=&quot;7185&quot; instrument_node=&quot;&quot;&gt;Broad Working Temperature&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7183&quot; instrument_node=&quot;&quot;&gt; – PTFE has an extended service temperature range of -328 °F (-200 °C) to 500 °F (260 °C) allowing this heat shrink to be used in cryogenic settings such as for temperature probes to very hot environments.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7181&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7177&quot;&gt;&lt;strong data-dcnode-id=&quot;7179&quot;&gt;&lt;span data-dcnode-id=&quot;7180&quot; instrument_node=&quot;&quot;&gt;Chemically Resistant&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7178&quot; instrument_node=&quot;&quot;&gt; – PTFE provides reliable protection from almost all common solvents, whether acids, bases, or hydrocarbons.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7176&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7172&quot;&gt;&lt;strong data-dcnode-id=&quot;7174&quot;&gt;&lt;span data-dcnode-id=&quot;7175&quot; instrument_node=&quot;&quot;&gt;Easy To Clean&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7173&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;– Because of the highly lubricious nature of PTFE, this material possesses a highly non-stick surface making it easy to wipe clean.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7171&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7167&quot;&gt;&lt;strong data-dcnode-id=&quot;7169&quot;&gt;&lt;span data-dcnode-id=&quot;7170&quot; instrument_node=&quot;&quot;&gt;Excellent Dielectric Strength&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7168&quot; instrument_node=&quot;&quot;&gt; – PTFE heat shrink has exceptional dielectric strength and thus doubles as insulation when used with electrical components.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7166&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7162&quot;&gt;&lt;strong data-dcnode-id=&quot;7164&quot;&gt;&lt;span data-dcnode-id=&quot;7165&quot; instrument_node=&quot;&quot;&gt;Flame Resistant&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7163&quot; instrument_node=&quot;&quot;&gt; – The non-flammable nature of PTFE makes it a good choice for environments where there is high heat or the possibility of flame exposure. PTFE is UL 94 V-0 rated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7157&quot;&gt;&lt;strong data-dcnode-id=&quot;7159&quot;&gt;&lt;span data-dcnode-id=&quot;7160&quot; instrument_node=&quot;&quot;&gt;Limiting Oxygen Index&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7158&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;– PTFE heat shrink is highly disinclined to burn; this fluoropolymer tubing has a limiting oxygen index of &amp;gt;95.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7156&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7152&quot;&gt;&lt;strong data-dcnode-id=&quot;7154&quot;&gt;&lt;span data-dcnode-id=&quot;7155&quot; instrument_node=&quot;&quot;&gt;Low Coefficient of Friction&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7153&quot; instrument_node=&quot;&quot;&gt; – PTFE has the lowest coefficient of friction of any polymer making parts, cables, or wires covered with PTFE heat shrink easy to maneuver into confined spaces to be placed at their point of use.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7151&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7147&quot;&gt;&lt;strong data-dcnode-id=&quot;7149&quot;&gt;&lt;span data-dcnode-id=&quot;7150&quot; instrument_node=&quot;&quot;&gt;Low Extractables&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7148&quot; instrument_node=&quot;&quot;&gt; – The very low level of extractables for PTFE means that contaminants will not leach out of the heat shrink and into the parts it is covering.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7146&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7142&quot;&gt;&lt;strong data-dcnode-id=&quot;7144&quot;&gt;&lt;span data-dcnode-id=&quot;7145&quot; instrument_node=&quot;&quot;&gt;Mechanical Resistance&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7143&quot; instrument_node=&quot;&quot;&gt; – Once covered with PTFE heat shrink, the covered items have an increased mechanical resistance even under severe conditions; this is particularly beneficial for joined parts such as wire splices or other delicate connections.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7141&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7137&quot;&gt;&lt;strong data-dcnode-id=&quot;7139&quot;&gt;&lt;span data-dcnode-id=&quot;7140&quot; instrument_node=&quot;&quot;&gt;Sterilizable&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;7138&quot; instrument_node=&quot;&quot;&gt; – PTFE heat shrink’s temperature tolerance and physical properties allow it to easily tolerate ETO and autoclave sterilization protocols.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7136&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;7134&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7132&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;7130&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;7128&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;7123&quot; instrument_node=&quot;&quot;&gt;
