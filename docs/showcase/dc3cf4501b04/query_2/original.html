			&lt;h1 class=&quot;entry-title&quot;&gt;happy is not a choice: the difference between happiness + positivity&lt;/h1&gt;
			&lt;div class=&quot;entry-meta&quot;&gt;
				&lt;span class=&quot;posted-on&quot;&gt;&lt;time class=&quot;entry-date published updated&quot; datetime=&quot;2015-12-28T08:23:00+00:00&quot;&gt;December 28, 2015&lt;/time&gt;&lt;/span&gt;&lt;span class=&quot;total-shares &quot; data-post_id=&quot;2379&quot;&gt;&lt;span class=&quot;svg-icon icon-share size-small &quot;&gt;&lt;svg role=&quot;img&quot;&gt; &lt;use href=&quot;#share&quot; xlink:href=&quot;#share&quot;&gt;&lt;/use&gt; &lt;/svg&gt;&lt;/span&gt;&lt;span class=&quot;count&quot;&gt;0 Share&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;comments-link&quot;&gt;&lt;span class=&quot;svg-icon icon-comment size-small &quot;&gt;&lt;svg&gt; &lt;use xlink:href=&quot;#comment&quot;&gt;&lt;/use&gt; &lt;/svg&gt;&lt;/span&gt;&lt;a href=&quot;https://positivelypresent.com/2015/12/happiness-is-not-a-choice.html#comments&quot;&gt;7 Comments&lt;span class=&quot;screen-reader-text&quot;&gt; on happy is not a choice: the difference between happiness + positivity&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;			&lt;/div&gt;

&lt;article id=&quot;post-2379&quot; class=&quot;post-2379 post type-post status-publish format-standard has-post-thumbnail hentry category-change category-mindfulness category-productivity category-relationships category-self-love&quot;&gt;
	
	&lt;div class=&quot;entry-content&quot;&gt;
		&lt;p&gt;&lt;a class=&quot;asset-img-link&quot; href=&quot;https://positivelypresent.typepad.com/.a/6a011168668cad970c01bb08a2cb9e970d-popup&quot; onclick=&quot;window.open( this.href, '_blank', 'width=640,height=480,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0' ); return false&quot; style=&quot;display: inline;&quot;&gt;&lt;img decoding=&quot;async&quot; alt=&quot;Positivity&quot; class=&quot;asset  asset-image at-xid-6a011168668cad970c01bb08a2cb9e970d img-responsive&quot; src=&quot;https://positivelypresent.typepad.com/.a/6a011168668cad970c01bb08a2cb9e970d-450wi&quot; style=&quot;width: 450px;&quot; title=&quot;Positivity&quot;&gt;&lt;/a&gt;&lt;br /&gt;
&amp;nbsp;&lt;/p&gt;
&lt;p&gt;&amp;nbsp;&lt;/p&gt;
&lt;p&gt;You&amp;#8217;ve probably heard quotes like &amp;#8220;happiness is a choice&amp;#8221; or &amp;#8220;if you want to be happy, &lt;em&gt;be&lt;/em&gt;&amp;#8221; or &amp;#8220;people are as happy as they make up their minds to be.&amp;#8221; (I&amp;#8217;m probably guilty of using these words. Scroll through &lt;a href=&quot;https://www.instagram.com/positivelypresent/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;my Instagram feed&lt;/a&gt; and I bet you&amp;#8217;ll find &amp;#8220;choose happy&amp;#8221; or something along those lines amidst my many quote-themed photos.) In theory, these quotes come from a&amp;nbsp;good place. They&amp;#8217;re meant to highlight the notion that, though you don&amp;#8217;t always have control of your circumstances, you have&amp;nbsp;control over how you feel.&amp;nbsp;&lt;/p&gt;
&lt;p&gt;Except&amp;#8230;&amp;nbsp;that&amp;#8217;s not true. &amp;nbsp;&lt;/p&gt;
&lt;p&gt;Quotes&amp;nbsp;like &amp;#8220;choose happiness&amp;#8221; or &amp;#8220;think happy thoughts&amp;#8221; aim to convey the idea that, no matter what happens, you have control&amp;nbsp;over what you &lt;em&gt;think&lt;/em&gt;, but what they actually convey is that you have control over what you&amp;nbsp;&lt;em&gt;feel&lt;/em&gt;. But there&amp;#8217;s a big difference between what you think and how you feel, and the idea that thoughts and feelings are interchangeable is potentially very damaging because, much as you might want to, you&amp;nbsp;can&amp;#8217;t control how you feel. And you can&amp;#8217;t control happiness because happiness is a feeling. You can&amp;#8217;t just&amp;nbsp;choose to be&amp;nbsp;happy when your dog just died or your wife just left or you&amp;#8217;re suffering from depression. You can&amp;#8217;t&amp;nbsp;choose to be happy when you just found out your child has cancer or your parents are abusive or your doctor just diagnosed you with a chronic illness.&amp;nbsp;&lt;/p&gt;
&lt;p&gt;If you&amp;#8217;ve ever experienced any of these things (or any other heart-breaking, painful, or sad situation), you know this is the truth. No matter how much you want to be happy, sometimes you just cannot be. This is normal and to be expected because happiness is a way of &lt;em&gt;feeling&lt;/em&gt;, not a way of &lt;em&gt;thinking&lt;/em&gt;. &amp;nbsp;&lt;/p&gt;
&lt;p&gt;While feeling&amp;nbsp;isn&amp;#8217;t something you can control, thinking is. The literal definition of to feel is &amp;#8220;to&amp;nbsp;experience an emotion.&amp;#8221;&amp;nbsp;To think is defined as &amp;#8220;to&amp;nbsp;direct one&amp;#8217;s mind toward someone or something.&amp;#8221; Experiencing an emotion just happens. You feel sad when something saddens you. You feel happy when something (or someone!) makes you happy. You can (sometimes) decide whether or not you get carried away with your emotions, but you can&amp;#8217;t control whether you have them in the first place.&amp;nbsp;&amp;nbsp;&lt;/p&gt;
&lt;p&gt;You feel how you feel when you feel it, and feelings can&amp;#8217;t be changed by words like &amp;#8220;be happy!&amp;#8221; or &amp;#8220;think happy thoughts!&amp;#8221; As anyone who&amp;#8217;s faced serious trauma or heartbreak knows, in the midst of true pain and loss, happy thoughts are &lt;em&gt;not&lt;/em&gt; an option. But what&amp;nbsp;&lt;em&gt;is&lt;/em&gt; an option is thinking positively. Happiness is not always an option, but positive thinking always is.&amp;nbsp;Let&amp;#8217;s&amp;nbsp;take a closer look at how they&amp;#8217;re different&amp;#8230;&amp;nbsp;&lt;/p&gt;
&lt;p&gt;&amp;nbsp;&lt;/p&gt;
&lt;p&gt;THE DIFFERENCE BETWEEN POSITIVITY + HAPPINESS&amp;nbsp;&lt;/p&gt;
&lt;p&gt;You might be saying to yourself right about now,&amp;nbsp;&lt;em&gt;Aren&amp;#8217;t positivity and happiness basically the same thing? Aren&amp;#8217;t &amp;#8220;positive thoughts&amp;#8221; and &amp;#8220;happy thoughts&amp;#8221; the same? &amp;nbsp;&lt;/em&gt;No, they are not the same, and the difference between them is very, very important (especially for anyone striving to live a positively present life!).&amp;nbsp;&lt;/p&gt;
&lt;p&gt;&lt;em&gt;Fleeting Emotion&amp;nbsp;vs. Logical Choice&lt;/em&gt;&lt;/p&gt;
&lt;p&gt;As I said before, happiness is an emotion. Emotions, as a rule, are fleeting. Some last longer than others, but there are very rarely entire days when you are happy. Even when things are going incredibly well and you&amp;#8217;re having an amazing day, you&amp;#8217;re not actually experiencing true happiness and joy&amp;nbsp;that entire day. (Same goes for negative emotions too&amp;nbsp;— no matter how difficult the situation, you usually experience a range of emotions, not just &amp;#8220;sad,&amp;#8221; and even in the most challenging of times, positive feelings like hope and even happiness can&amp;nbsp;be experienced.)&lt;em&gt;&amp;nbsp;&lt;/em&gt;&lt;/p&gt;
&lt;p&gt;On the other hand, positive thinking is an active choice — the decision to focus on the possibility of good results or seek out the&amp;nbsp;goodness in any situation or person (good&amp;nbsp;&lt;em&gt;or&lt;/em&gt; bad). Positive thinking is logical, not emotional. It&amp;#8217;s more about using your head than it is about using your heart. It&amp;#8217;s about taking whatever you experience (and feel) and trying your best to make the most of the situation (even if the situation is terrible).&amp;nbsp;&lt;/p&gt;
&lt;p&gt;&lt;em&gt;Experiencing vs. Learning&lt;/em&gt;&lt;/p&gt;
&lt;p&gt;Happiness must be experienced. Positivity, on the other hand, is something that can be learned and practiced by everyone. No matter what&amp;#8217;s going on in your life, you can strive for a positive attitude. You can also practice it (and get better at it!), which is something you can&amp;#8217;t do with happiness. You can fake happiness, but that&amp;#8217;s not the same as practicing it. You&amp;#8217;re either happy or you&amp;#8217;re not. You can&amp;#8217;t learn to be happier, and you certainly can&amp;#8217;t force yourself to feel (truly) happy when you just don&amp;#8217;t feel that way.&lt;/p&gt;
&lt;p&gt;A lot of people struggle because of the notion that you can somehow become happier overall by doing something external (getting a better job, falling in love, buying the newest gadget) but those kinds of things only provide a burst of happiness that will eventually fade until we find that next &amp;#8220;happiness high.&amp;#8221; Happiness can be gained from external things, but it won&amp;#8217;t last because it&amp;#8217;s merely an emotion. Instead of focusing on experiences, it&amp;#8217;s much more useful to spend time and energy learning how to find the good in any situation (rather that striving for short bursts of happiness).&amp;nbsp;&lt;/p&gt;
&lt;p&gt;&lt;em&gt;Unique Feeling vs. Similar Thinking&lt;/em&gt;&lt;/p&gt;
&lt;p&gt;Another major difference between happiness and positivity is this: happiness is incredibly unique. (This is why it&amp;#8217;s such a hard topic to study and deeply comprehend.)&amp;nbsp;What fills your heart with joy might not even register on my happiness radar. It&amp;#8217;s kind of like love in a way (except it usually doesn&amp;#8217;t last as long): it&amp;#8217;s something we all experience at some point, but it&amp;#8217;s hard to put it into words because we all experience it so differently and for such different reasons.&lt;/p&gt;
&lt;p&gt;Also, because happiness is&amp;nbsp;a feeling, it&amp;#8217;s&amp;nbsp;experienced in unique ways too. If you and I were both to think of a time when we were incredibly happy, we might have very different reactions to that memory even if we both labeled it as a &amp;#8220;happy&amp;#8221; time. From a mental and a physical standpoint, we all&amp;nbsp;experience happiness differently. However, when it comes to positive thinking, we can all practice similar techniques. We all know what it means to try to find the good in a situation (even if we find different kinds of goodness). Positive thinking is a logical, thought-driven experience. It&amp;#8217;s something we can all&amp;nbsp;understand and, most of the time, experience in a similar&amp;nbsp;way. For this reason, it&amp;#8217;s much easier to share and teach to others. (And, as an added bonus, the more someone practices positive thinking, the more happiness s/he is likely to experience.)&amp;nbsp;&lt;/p&gt;
&lt;p&gt;&lt;em&gt;Big Picture vs. Present Moment&lt;/em&gt;&lt;/p&gt;
&lt;p&gt;Whatever you experience (good and bad) can impact&amp;nbsp;your happiness levels.&amp;nbsp;It&amp;#8217;s hard to be happy if aspects of your life (some of which might be out of your control) aren&amp;#8217;t going well. For example, let&amp;#8217;s say you&amp;#8217;re having a really great day at work and you receive an unexpected promotion. This should make you really happy, right? It might&amp;nbsp;— but it might not make you happy for very long if something really unhappy is happening in another area of&amp;nbsp;life. You can&amp;#8217;t experience true happiness when certain areas of your life are negative, uncertain, or unhappy. Happiness focuses on the big picture. This isn&amp;#8217;t a bad thing, but it&amp;#8217;s an important difference from positivity, which isn&amp;#8217;t at all concerned with (or impacted by) the big picture.&lt;/p&gt;
&lt;p&gt;Positive thinking focuses&amp;nbsp;on the current moment and determining what you can gain from that experience or interaction. It&amp;#8217;s about making the most of whatever is happening to you&amp;nbsp;&lt;em&gt;right now&lt;/em&gt;. It should not&amp;nbsp;tainted by what has already happened or what could happen (unless you&amp;#8217;re recalling a time in which you struggled with a difficult situation and overcame it, reminding yourself that you&amp;#8217;re strong enough to survive whatever you&amp;#8217;re currently going through). Positivity is&amp;nbsp;about taking whatever&amp;#8217;s happening and trying to make it as good as it can possibly be, regardless of what&amp;#8217;s going on in other areas of your life or what might happen in the future.&amp;nbsp;&lt;/p&gt;
&lt;p&gt;There are some major differences between happiness and positivity, but making the&amp;nbsp;differentiation between happiness and positivity isn&amp;#8217;t meant to make&amp;nbsp;&amp;#8220;positive&amp;#8221;&amp;nbsp;seem better than &amp;#8220;happy,&amp;#8221; or to put down happiness in anyway. It&amp;#8217;s only meant to show that there is a big difference. Here&amp;#8217;s why this difference matters&amp;#8230;&lt;/p&gt;
&lt;p&gt;&amp;nbsp;&lt;/p&gt;
&lt;p&gt;WHY THE DIFFERENCE MATTERS&lt;/p&gt;
&lt;p&gt;After reading about the differences between happiness and positivity you might be thinking,&amp;nbsp;&lt;em&gt;So what? Why does this matter?&lt;/em&gt; It matters because so many people use these very different terms as if they are interchangeable, and this can lead to damaging beliefs in those who read/hear phrases like &amp;#8220;if you want to be happy, be happy!&amp;#8221; or &amp;#8220;choose to be happy!&amp;#8221;&amp;nbsp;&lt;/p&gt;
&lt;p&gt;Because happiness is not a choice, when people are told to be happy and they&amp;#8217;re unable to achieve a&amp;nbsp;happy state (because they&amp;#8217;re in a bad situation, because they have a chemical imbalance that doesn&amp;#8217;t allow them to be happy often, or for any other reason), they feel like failures. If happiness is promoted as something that can just be chosen, like pulling an item off a store&amp;#8217;s shelf, those who cannot seem to &amp;#8220;choose&amp;#8221; it feel as though there is something wrong with them. On the other hand, if you were to suggest to someone who is struggling that s/he &amp;#8220;think positively&amp;#8221; (accompanied by suggestions for how to actually do it), those words&amp;nbsp;might actually be useful and encouraging. Happiness is not an action that can simply be chosen, and suggesting it is can actually cause&amp;nbsp;feelings of frustration, confusion, and even self-loathing.&amp;nbsp;&lt;/p&gt;
&lt;p&gt;And speaking of self-loathing, one of the other reasons using happiness and positive thinking are used interchangeably is: it&amp;nbsp;causes a lot of people (most of us, in fact!) to strive for something that is unattainable: a lasting, permanent state of happiness. Due to many popular culture messages about happiness, many of us believe we should strive&amp;nbsp;for happiness most of the time, even when we&amp;#8217;re&amp;nbsp;sad or struggling, even when we&amp;#8217;re&amp;nbsp;stressed or heartbroken.&amp;nbsp;&lt;/p&gt;
&lt;p&gt;As Dan Harris writes in&amp;nbsp;&lt;a href=&quot;https://www.amazon.com/gp/product/0062265431/ref=as_li_qf_sp_asin_il_tl?ie=UTF8&amp;amp;camp=1789&amp;amp;creative=9325&amp;amp;creativeASIN=0062265431&amp;amp;linkCode=as2&amp;amp;tag=positiprese08-20&amp;amp;linkId=2ALONSMVU4EJT7OQ&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;10% Happier&lt;/a&gt;, the&amp;nbsp;“pursuit of happiness becomes the source of our unhappiness.” If you&amp;#8217;re striving for a constant state of happiness&amp;nbsp;— a fleeting emotion that rarely lasts for an extended period of time and that sometimes comes from negative sources, like abused substances, the approval of negative people, unhealthy activities, etc.&amp;nbsp;— you&amp;#8217;re bound to be, at the very least, disappointed a good deal of the time. You might feel guilty&amp;nbsp;when you don&amp;#8217;t feel happy when everything is going well&amp;nbsp;or confused when you experience happiness during difficult times.&lt;/p&gt;
&lt;p&gt;Making an emotion (happiness) a life-long goal is a pretty great way to set yourself up for a lot of disappointment and stress. While there will (hopefully!) be many, many moments of happiness in your life, no one is happy every single moment of every single day, and striving for that is like spending your life hoping&amp;nbsp;to find an actual pot of gold at the end of a rainbow.&amp;nbsp;This isn&amp;#8217;t meant to leave you feeling as if happiness is some crazy dream that&amp;#8217;ll never be made real; it&amp;#8217;s only meant to show how&amp;nbsp;the pursuit of happiness isn&amp;#8217;t what leads to true fulfillment. Happiness comes in amazing, fleeting moments that we&amp;#8217;re all lucky to experience from time to time. And the best way to keep an eye out for these moments (and make the most of them when they happen!) is to focus on positive thinking, on seeking out the good in your life, no matter where you find yourself.&amp;nbsp;&lt;/p&gt;
&lt;p&gt;Rather that focusing on choosing happiness, what we should be focusing on is thinking positively. Remember: we can&amp;#8217;t choose how we feel, but we can choose how we think about those feelings (and whatever it was&amp;nbsp;that caused us to feel that way). Instead of focusing so much being happy, what we should be focusing on is how we can make the most of our lives (both the happy&amp;nbsp;&lt;em&gt;and&amp;nbsp;&lt;/em&gt;the sad parts).&amp;nbsp;&lt;/p&gt;
&lt;p&gt;When we see something that tells us to simply &amp;#8220;be happy,&amp;#8221; we should question that request and think about how the notion of happiness-as-a-choice is actually impacting our lives.&amp;nbsp;Of course, there&amp;#8217;s absolutely nothing wrong with&amp;nbsp;thinking&amp;nbsp;happy thoughts or gravitating toward things that make you happy, but it&amp;#8217;s important to keep in mind that happiness (no matter how great!) is fleeting. If you&amp;#8217;re looking for lasting contentment, learning the art of positive thinking is the best place to put your time and energy.&amp;nbsp;&lt;/p&gt;
&lt;p&gt;&amp;nbsp;&lt;/p&gt;
&lt;p style=&quot;text-align: justify;&quot;&gt;&amp;nbsp;&lt;/p&gt;
&lt;p&gt;&lt;a class=&quot;asset-img-link&quot; href=&quot;https://positivelypresent.typepad.com/.a/6a011168668cad970c01bb086c4086970d-popup&quot; onclick=&quot;window.open( this.href, '_blank', 'width=640,height=480,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0' ); return false&quot; style=&quot;float: right;&quot;&gt;&lt;img decoding=&quot;async&quot; alt=&quot;Loving-Your-Self&quot; class=&quot;asset  asset-image at-xid-6a011168668cad970c01bb086c4086970d img-responsive&quot; src=&quot;https://positivelypresent.typepad.com/.a/6a011168668cad970c01bb086c4086970d-150wi&quot; style=&quot;width: 150px; margin: 0px 0px 5px 5px;&quot; title=&quot;Loving-Your-Self&quot;&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p style=&quot;text-align: justify;&quot;&gt;&lt;em&gt;Positive thinking can be tough when it comes to self-contemplation, which is why it&amp;#8217;s so important&amp;nbsp;to focus on self-love.&amp;nbsp;Want to empower yourself with some serious self-love and acceptance? Start loving yourself (or increase the love you already have for yourself!) with the inspiration and motivation found in&amp;nbsp;&lt;a href=&quot;https://www.positivelypresent.com/2015/08/loving-your-self.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;Loving Your Self: An Empowering Workbook for Increasing Self-Love&lt;/a&gt;.&amp;nbsp;&lt;/em&gt;&lt;em&gt;Filled with uplifting encouragement, thought-provoking questions, and engaging exercises, Loving Your Self is an essential tool for mastering the art of self-love. Learn more about the workbook&amp;nbsp;&lt;a href=&quot;https://www.positivelypresent.com/2015/08/loving-your-self.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;here&lt;/a&gt;&amp;nbsp;and purchase your own copy &lt;a target=&quot;_blank&quot; rel=&quot;noopener&quot;&gt;here&lt;/a&gt;.&lt;/em&gt;&lt;/p&gt;

						&lt;img alt='' src='https://secure.gravatar.com/avatar/74b0ad99c5d8bf513bef56a07dd1eebed15d9ac952c6e420bba486c6dabdaf7b?s=40&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/74b0ad99c5d8bf513bef56a07dd1eebed15d9ac952c6e420bba486c6dabdaf7b?s=80&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-40 photo' height='40' width='40' loading='lazy' decoding='async'/&gt;						&lt;b class=&quot;fn&quot;&gt;&lt;a href=&quot;http://www.secretwomensstuff.com&quot; class=&quot;url&quot; rel=&quot;ugc external nofollow&quot;&gt;Deborah King&lt;/a&gt;&lt;/b&gt; &lt;span class=&quot;says&quot;&gt;says:&lt;/span&gt;					&lt;/div&gt;&lt;!-- .comment-author --&gt;

					&lt;div class=&quot;comment-metadata&quot;&gt;
						&lt;a href=&quot;https://positivelypresent.com/2015/12/happiness-is-not-a-choice.html#comment-694&quot;&gt;&lt;time datetime=&quot;2016-01-01T04:36:06+00:00&quot;&gt;January 1, 2016 at 4:36 am&lt;/time&gt;&lt;/a&gt;					&lt;/div&gt;&lt;!-- .comment-metadata --&gt;

									&lt;/footer&gt;&lt;!-- .comment-meta --&gt;

				&lt;div class=&quot;comment-content&quot;&gt;
					&lt;p&gt;Hi Dani.  I stopped on by to tell you that I bought one of your Every day Matters diaries for 2016 over here in Australia, which made me very happy because I had been looking for the exact thing in my price range.  In the diary, the subject for January is Happiness and the affirmation of the month is &amp;#8220;I choose happiness every day&amp;#8221;&amp;#8230;..so to see your post is confusing for me because I believe we can choose happiness as part of our everyday existence.  Of course we&amp;#8217;re not going to try and choose happiness when one of the soul destroying incidents you&amp;#8217;ve described happens to us but down the track, in recovery, yes.&lt;br /&gt;
May I say I don&amp;#8217;t agree with you that feelings happen of their own accord.  I believe every feeling starts with a thought, which creates the feeling, which creates the behaviour.  I follow the Law of Attraction which helped me through one of those soul destroying situations which for us was my husband&amp;#8217;s unemployment for 14 months and almost losing everything.  The only way I could stop myself from going under emotionally was to hang on to something that made me happy.  It was difficult to do but I knew I had to do something.  I started with thinking about something that made me happy and at that time it was our 3 year old grandson.&lt;br /&gt;
From that thought the feelings of joy and happiness came and I harnessed that so every time I started sinking again I would think about him and the good feelings would return.  It developed into a habit because I wanted to raise my vibration to a point where I could deal with things and not bury my head in the sand because life was too difficult to face.  He doesn&amp;#8217;t know it, but that little man saved me.&lt;br /&gt;
If happiness doesn&amp;#8217;t :stick&amp;#8221;, positive thinking doesn&amp;#8217;t either.  When we choose to think positively about something, it doesn&amp;#8217;t work for the long term because it&amp;#8217;s likely the negative charge (and programming) behind the situation we&amp;#8217;re trying to think positively about is changed.  All in all, positive thinking and happiness go hand in hand but it&amp;#8217;s like the chicken and the egg, which needs to come first.&lt;br /&gt;
I had a canvas wall hanging at home which said, Today I am choosing Happiness and that became my mantra.  Every time I felt myself sinking again I would remind myself, today I&amp;#8217;m choosing happiness and it would change my physiology to accept that this was do-able.&lt;br /&gt;
So, anyway, I love the diary, thank you for putting that together and I look forward to using it this year and getting another for 2017.&lt;/p&gt;

					&lt;div class=&quot;comment-metadata&quot;&gt;
						&lt;a href=&quot;https://positivelypresent.com/2015/12/happiness-is-not-a-choice.html#comment-695&quot;&gt;&lt;time datetime=&quot;2016-01-01T13:35:43+00:00&quot;&gt;January 1, 2016 at 1:35 pm&lt;/time&gt;&lt;/a&gt;					&lt;/div&gt;&lt;!-- .comment-metadata --&gt;

				&lt;div class=&quot;comment-content&quot;&gt;
					&lt;p&gt;Melanie &amp;#8211; You&amp;#8217;re welcome! So glad you appreciate the difference between positivity and happiness.&lt;br /&gt;
Kathy &amp;#8211; I&amp;#8217;m definitely the same way. I&amp;#8217;d love to be a &amp;#8220;happy&amp;#8221; person, but that just doesn&amp;#8217;t come naturally for me, which is why I focus on positivity. The more positive I am, the more I bring happy things into my life.&lt;br /&gt;
Katie &amp;#8211; So glad you enjoyed this article! It&amp;#8217;s definitely an important topic!&lt;br /&gt;
Olivia &amp;#8211; Thank you! It&amp;#8217;s something I think about a lot and I&amp;#8217;m so glad I finally sat down and wrote about it.&lt;/p&gt;

		&lt;li id=&quot;comment-696&quot; class=&quot;comment even thread-even depth-1&quot;&gt;

				&lt;footer class=&quot;comment-meta&quot;&gt;

						&lt;img alt='' src='https://secure.gravatar.com/avatar/?s=40&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/?s=80&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-40 photo avatar-default' height='40' width='40' loading='lazy' decoding='async'/&gt;						&lt;b class=&quot;fn&quot;&gt;&lt;a href=&quot;http://profile.typepad.com/positivelypresent&quot; class=&quot;url&quot; rel=&quot;ugc external nofollow&quot;&gt;positively present&lt;/a&gt;&lt;/b&gt; &lt;span class=&quot;says&quot;&gt;says:&lt;/span&gt;					&lt;/div&gt;&lt;!-- .comment-author --&gt;

					&lt;div class=&quot;comment-metadata&quot;&gt;
						&lt;a href=&quot;https://positivelypresent.com/2015/12/happiness-is-not-a-choice.html#comment-696&quot;&gt;&lt;time datetime=&quot;2016-01-01T13:43:15+00:00&quot;&gt;January 1, 2016 at 1:43 pm&lt;/time&gt;&lt;/a&gt;					&lt;/div&gt;&lt;!-- .comment-metadata --&gt;

									&lt;/footer&gt;&lt;!-- .comment-meta --&gt;

				&lt;div class=&quot;comment-content&quot;&gt;
					&lt;p&gt;Deborah &amp;#8211; Thank you so much for buying the diary! 🙂 It makes me so happy to imagine you using it all the way on the other side of the world. And thank you, too, for this thought-provoking comment. You&amp;#8217;re right: there&amp;#8217;s definitely a conflict between the diary&amp;#8217;s first month and this post. I think the affirmation would be better written, &amp;#8220;I choose to think positively every day, which will lead me to feeling happiness,&amp;#8221; but that would be much too long! (If you get the 2017 diary, you&amp;#8217;ll see a month focused on Positivity.) I really like what you&amp;#8217;re saying about how a feeling starts with a thought. That&amp;#8217;s such a great point! We don&amp;#8217;t have feelings unless we&amp;#8217;ve thought something about a person/situation first, which is why it&amp;#8217;s so important to pay attention to our thoughts and strive for positive ones over negative. It sounds like, when you were in a low place in your life, you focused on positive thinking, which led to feelings of happiness. If you say thoughts come first (which I agree with), then you&amp;#8217;ve chose a positive thought (of your grandson) first and that led to you experiencing feelings of happiness, which is wonderful. I agree that positivity and happiness go hand-in-hand, and, by focusing on positive thoughts, we&amp;#8217;ll have more happiness (so, indirectly, we *can* choose happiness!). Thanks again for purchasing the diary and for writing this comment!&lt;/p&gt;
