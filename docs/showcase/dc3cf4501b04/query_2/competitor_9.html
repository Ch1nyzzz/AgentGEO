&lt;/span&gt;&lt;p data-dcnode-id=&quot;1355&quot;&gt;&lt;span data-dcnode-id=&quot;1356&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1357&quot; instrument_node=&quot;&quot;&gt;So, let’s look a little more closely at what learned optimism is and why it matters. Then we’ll cover some practical tips and exercises to help you become more optimistic.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1354&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1349&quot; style=&quot;font-size: 38px;&quot;&gt;&lt;span data-dcnode-id=&quot;1350&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1351&quot; instrument_node=&quot;&quot;&gt;What is learned optimism? &lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1348&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1345&quot;&gt;&lt;span data-dcnode-id=&quot;1346&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;Learned optimism is a process by which you learn to recognize habitually negative thoughts, and then challenge them. Challenging your pessimistic ideas helps you reframe them into new, more positive beliefs.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1332&quot;&gt;&lt;span data-dcnode-id=&quot;1342&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1343&quot; instrument_node=&quot;&quot;&gt;Learned optimism can&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1339&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/coaching-improves-mental-health-research%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1340&quot; instrument_node=&quot;&quot;&gt;improve your mood and well-being&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1337&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;, boost your self-esteem,&amp;nbsp;and encourage more positive behaviors. This makes it a useful strategy for overcoming difficult situations or navigating tough times. It also helps you to improve your overall&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1334&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/what-does-it-mean-to-be-mentally-fit%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1335&quot; instrument_node=&quot;&quot;&gt;mental fitness&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1333&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1331&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1324&quot;&gt;&lt;span data-dcnode-id=&quot;1329&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1330&quot; instrument_node=&quot;&quot;&gt;Over time, learned optimism can help you improve your outlook on life and&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1328&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1326&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/self-talk%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;see yourself and the world in a more positive light&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1320&quot;&gt;&lt;span data-dcnode-id=&quot;1321&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1322&quot; instrument_node=&quot;&quot;&gt;The term was first coined by one of the founders of positive psychology, Dr. Martin Seligman. But why is optimism so important? Let’s find out.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;1318&quot; data-hs-anchor=&quot;true&quot; id=&quot;A&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1317&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1314&quot; style=&quot;font-size: 38px;&quot;&gt;&lt;span data-dcnode-id=&quot;1315&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1316&quot; instrument_node=&quot;&quot;&gt;A summary of Dr. Seligman’s book &lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1313&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1301&quot;&gt;&lt;span data-dcnode-id=&quot;1311&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1312&quot; instrument_node=&quot;&quot;&gt;In 1990,&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1308&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ppc.sas.upenn.edu/people/martin-ep-seligman&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1309&quot; instrument_node=&quot;&quot;&gt;Seligman&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1302&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1306&quot; instrument_node=&quot;&quot;&gt;published his book, &lt;/span&gt;&lt;span data-dcnode-id=&quot;1304&quot; style=&quot;font-style: italic;&quot;&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt;Learned Optimism: How to Change Your Mind and Your Life&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt;. In it, he described the concepts of learned optimism and learned helplessness.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1297&quot;&gt;&lt;span data-dcnode-id=&quot;1298&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1299&quot; instrument_node=&quot;&quot;&gt;His early research into learned helplessness showed that optimists handle bad events better than pessimists. He also discovered that both styles could be learned and began focusing on learned optimism.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1296&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1293&quot;&gt;&lt;span data-dcnode-id=&quot;1294&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1295&quot; instrument_node=&quot;&quot;&gt;Dr. Seligman described three main differences between optimists and pessimists:&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;1272&quot; start=&quot;1&quot;&gt;&lt;span data-dcnode-id=&quot;1291&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1286&quot;&gt;&lt;span data-dcnode-id=&quot;1287&quot; style=&quot;color: #000000;&quot;&gt;&lt;strong data-dcnode-id=&quot;1289&quot;&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;Permanence&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt;: Pessimists see negative events as permanent. Optimists view them as temporary.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1285&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1280&quot;&gt;&lt;span data-dcnode-id=&quot;1281&quot; style=&quot;color: #000000;&quot;&gt;&lt;strong data-dcnode-id=&quot;1283&quot;&gt;&lt;span data-dcnode-id=&quot;1284&quot; instrument_node=&quot;&quot;&gt;Personalization&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;: Pessimists blame themselves when things go wrong. They link good events to external factors or luck. For optimists, it’s the opposite.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1274&quot;&gt;&lt;span data-dcnode-id=&quot;1275&quot; style=&quot;color: #000000;&quot;&gt;&lt;strong data-dcnode-id=&quot;1277&quot;&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt;Pervasiveness&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;: Pessimists have a gloomy outlook on every area of their lives. Optimists don’t let failure in one area of their life affect how they feel about another.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1273&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;1271&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1245&quot;&gt;&lt;span data-dcnode-id=&quot;1246&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1247&quot; instrument_node=&quot;&quot;&gt;Early on in his career, Seligman researched the concept of learned helplessness using dogs.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1244&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1241&quot;&gt;&lt;span data-dcnode-id=&quot;1242&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1243&quot; instrument_node=&quot;&quot;&gt;Seligman and his colleagues administered electric shocks to the dogs. One in three refused to submit to their fate no matter what the researchers did to them. They showed a level of resilience that the other dogs lacked.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1237&quot;&gt;&lt;span data-dcnode-id=&quot;1238&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt;Later, a friend pointed out that it was not learned helplessness but learned optimism that he was studying.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1233&quot;&gt;&lt;span data-dcnode-id=&quot;1234&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;When Seligman shifted his focus to optimism, he realized the implications and many possible benefits it could have. This created a paradigm shift in his work and inspired him to write his book on learned optimism.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1223&quot;&gt;&lt;span data-dcnode-id=&quot;1230&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;The book and his ongoing work led to the rise of a new branch of psychology known as&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1227&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/the-power-of-positive-psychology-and-coaching-developing-resilient-leadership%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1228&quot; instrument_node=&quot;&quot;&gt;positive psychology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1226&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1224&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;Seligman went on to become the president of the American Psychological Association.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1213&quot;&gt;&lt;span data-dcnode-id=&quot;1220&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;Recognizing the importance of working through past trauma, he popularized the idea that focusing on&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1217&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/success-and-happiness%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;authentic happiness&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1214&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;is just as important.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1212&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1180&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1187&quot; instrument_node=&quot;&quot;&gt;According to research, optimism is “&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1184&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//academic.oup.com/abm/article/37/3/239/4569464&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1185&quot; instrument_node=&quot;&quot;&gt;a significant predictor of positive health outcomes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt;.” &lt;/span&gt;&lt;span data-dcnode-id=&quot;1181&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1182&quot; instrument_node=&quot;&quot;&gt;Optimists&amp;nbsp;are more likely to take a positive and proactive approach to their health.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1179&quot; instrument_node=&quot;&quot;&gt;

imism%20%5BARTICLE%5D-4.jpeg?width=4800&amp;amp;name=Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D-4.jpeg 4800w&quot; style=&quot;width: 1600px;&quot; width=&quot;1600&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1043&quot;&gt;&lt;span data-dcnode-id=&quot;1044&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;You may think you’re either born naturally optimistic or naturally pessimistic, and that is partly true. Genetic predisposition does play a role: if your parents are optimistic, then it’s more likely you will be, too.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1039&quot;&gt;&lt;span data-dcnode-id=&quot;1040&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;However, our levels of optimism and pessimism are also influenced by childhood experiences. This may include the family’s emotional or financial stability. People from challenging backgrounds can develop negative self-talk and a pessimistic mindset.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1032&quot;&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;But according to Seligman, learning optimism is possible even if you’re more naturally pessimistic. &lt;/span&gt;&lt;a data-dcnode-id=&quot;1035&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/in-demand-skills%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;Developing certain skills&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1033&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;, including learning how to reframe your thoughts, can help you become more optimistic over time.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;1030&quot; data-hs-anchor=&quot;true&quot; id=&quot;Learned&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1026&quot; style=&quot;font-size: 38px;&quot;&gt;&lt;span data-dcnode-id=&quot;1027&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;Learned optimism vs. learned helplessness&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1022&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;Seligman first defined learned optimism as the opposite of learned helplessness. Both are explanatory styles, meaning they describe how people explain the events in their lives.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1015&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1020&quot; instrument_node=&quot;&quot;&gt;People with an optimistic explanatory style view their &lt;/span&gt;&lt;a data-dcnode-id=&quot;1018&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/leadership-challenges%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;challenges&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;as being caused by external forces. People with a pessimistic explanatory style are more likely to see themselves as the problem.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1011&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;These two different perspectives influence the way people act when faced with obstacles. Pessimists use avoidant or escapist strategies rather than facing their challenges head-on.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;870&quot;&gt;&lt;span data-dcnode-id=&quot;871&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;By now, you understand the benefits of optimism. But like anything, too much of it can be a bad thing.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;866&quot;&gt;&lt;span data-dcnode-id=&quot;867&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;Some research suggests that when taken to the extreme, optimism can cause toxic positivity. This is when positive thinking goes too far and can be damaging to people facing difficult situations.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;859&quot;&gt;&lt;span data-dcnode-id=&quot;860&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;Having too much optimism bias can also lead people to take risks because they underestimate the level of danger involved.&amp;nbsp;Having too much &lt;/span&gt;&lt;a data-dcnode-id=&quot;862&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/bravery-vs-courage%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;bravery&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;isn’t necessarily a good thing.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;857&quot; data-hs-anchor=&quot;true&quot; id=&quot;improve&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;853&quot; style=&quot;font-size: 38px;&quot;&gt;&lt;span data-dcnode-id=&quot;854&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;How to improve optimism: 3 exercises&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;849&quot;&gt;&lt;span data-dcnode-id=&quot;850&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;Use these three exercises from Dr. Seligman’s learned optimism book to develop an optimistic explanatory style.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;845&quot; style=&quot;font-size: 24px;&quot;&gt;&lt;span data-dcnode-id=&quot;846&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;1. Your best possible self&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;827&quot;&gt;&lt;span data-dcnode-id=&quot;842&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;This exercise requires you to use your imagination and&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;841&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;839&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/create-a-personal-vision-statement%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;envision a future&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;836&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;in which you have achieved the best possible outcomes in your life. You might want to write about your career, health,&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;833&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/your-well-being-and-relationships-coach-tips%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;relationships&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;831&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;, or&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;830&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;828&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;even where you want to live.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;817&quot;&gt;&lt;span data-dcnode-id=&quot;824&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;This exercise&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;821&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/coaching-improves-mental-health-research%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;boosts mental well-being&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;818&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;and may inspire you to take new actions or simply open your mind to new possibilities. Make a note of how you feel before and after this exercise.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;813&quot; style=&quot;font-size: 24px;&quot;&gt;&lt;span data-dcnode-id=&quot;814&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;2. Put it in perspective&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;809&quot;&gt;&lt;span data-dcnode-id=&quot;810&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;In this exercise, think of a problem you’re currently worried about. For example, you might be worried about your business going under.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;808&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;805&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;Start by imagining the worst possible scenario. In this case, it could be having to declare bankruptcy.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;801&quot;&gt;&lt;span data-dcnode-id=&quot;802&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;Then imagine the best possible outcome, such as business picking up to pre-crisis levels and beyond.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;797&quot;&gt;&lt;span data-dcnode-id=&quot;798&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;Next, think about the most realistic outcome. It might be that things continue to be difficult for a while but eventually return to normal.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;793&quot;&gt;&lt;span data-dcnode-id=&quot;794&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;Finally, create a plan for the most realistic scenario. This could look like taking out a loan or restructuring your business to meet new demands.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;789&quot; style=&quot;font-size: 24px;&quot;&gt;&lt;span data-dcnode-id=&quot;790&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;3. Distraction&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;779&quot;&gt;&lt;span data-dcnode-id=&quot;786&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;Sometimes it can be difficult to break the&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;783&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/automatic-thoughts%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;loop of negative thoughts&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;780&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;that seem to play on repeat in your head. When that happens, distraction can be a useful tactic to help you break the cycle.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;775&quot;&gt;&lt;span data-dcnode-id=&quot;776&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;Seligman suggests three ways to distract yourself:&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;750&quot; start=&quot;1&quot;&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;768&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; style=&quot;color: #000000;&quot;&gt;&lt;strong data-dcnode-id=&quot;771&quot;&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;Startle yourself&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;. Make a sudden loud noise, snap a rubber band on your wrist, or read a notecard with the word “Stop” on it.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;762&quot;&gt;&lt;span data-dcnode-id=&quot;763&quot; style=&quot;color: #000000;&quot;&gt;&lt;strong data-dcnode-id=&quot;765&quot;&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;Shift your attention&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt;. Pick up an object and observe it in detail. Look at it, feel its texture, smell it, or even taste it. Try to notice as many details as possible. Alternatively, look around the room you’re in and describe it to yourself in detail. Notice the light, colors, sounds, and smells around you.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;752&quot;&gt;&lt;span data-dcnode-id=&quot;757&quot; style=&quot;color: #000000;&quot;&gt;&lt;strong data-dcnode-id=&quot;759&quot;&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;Schedule &amp;nbsp;time.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Think about your negative thoughts, for a bit. Grab your diary and choose a time. &amp;nbsp;When that time comes, sit down and think about them — if you still need to. Then once you are done,&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;754&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/blog/how-to-let-go-of-control%3FhsLang%3Den&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;let those thoughts go&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;747&quot;&gt;&lt;img alt=&quot;journaling-exercises-learned-optimism&quot; data-dcnode-id=&quot;748&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 1600px) 100vw, 1600px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.betterup.com/hs-fs/hubfs/Google%2520Drive%2520Integration/Delivery%2520URL%2520-%2520BetterUp%2520-%2520learned%2520optimism%2520%255BARTICLE%255D.jpeg%3Fwidth%3D1600%26name%3DDelivery%2520URL%2520-%2520BetterUp%2520-%2520learned%2520optimism%2520%255BARTICLE%255D.jpeg&amp;amp;raw&quot; srcset=&quot;https://www.betterup.com/hs-fs/hubfs/Google%20Drive%20Integration/Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg?width=800&amp;amp;name=Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg 800w, https://www.betterup.com/hs-fs/hubfs/Google%20Drive%20Integration/Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg?width=1600&amp;amp;name=Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg 1600w, https://www.betterup.com/hs-fs/hubfs/Google%20Drive%20Integration/Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg?width=2400&amp;amp;name=Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg 2400w, https://www.betterup.com/hs-fs/hubfs/Google%20Drive%20Integration/Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg?width=3200&amp;amp;name=Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg 3200w, https://www.betterup.com/hs-fs/hubfs/Google%20Drive%20Integration/Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg?width=4000&amp;amp;name=Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg 4000w, https://www.betterup.com/hs-fs/hubfs/Google%20Drive%20Integration/Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg?width=4800&amp;amp;name=Delivery%20URL%20-%20BetterUp%20-%20learned%20optimism%20%5BARTICLE%5D.jpeg 4800w&quot; style=&quot;width: 1600px;&quot; width=&quot;1600&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;745&quot; data-hs-anchor=&quot;true&quot; id=&quot;effects&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;742&quot; style=&quot;font-size: 38px;&quot;&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;The effects of adopting learned optimism in your life&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;738&quot;&gt;&lt;span data-dcnode-id=&quot;739&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;Learned optimism has many benefits, particularly for those who may naturally tend to have a more pessimistic or helpless approach to life.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;734&quot;&gt;&lt;span data-dcnode-id=&quot;735&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;Changing your thought patterns can make you more resilient to shocks and help you find creative solutions to problems. It can also improve your health, relationships, and career.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;730&quot;&gt;&lt;span data-dcnode-id=&quot;731&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;732&quot; instrument_node=&quot;&quot;&gt;The best thing about learned optimism is that no matter how pessimistic you are, it is possible to cultivate a more positive mindset.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;
