rif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-700&quot; data-dcnode-id=&quot;5444&quot;&gt;&lt;span data-dcnode-id=&quot;5445&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;5440&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-800 research-detail-middle-section__abstract&quot; data-dcnode-id=&quot;5441&quot; itemprop=&quot;description&quot;&gt;&lt;span data-dcnode-id=&quot;5442&quot; instrument_node=&quot;&quot;&gt;Literature on stress and social work emphasises the importance of the structural and organisational context for social work. Less attention has been given to differences between social workers that enable them to deal with demands and find satisfaction and rewards in their work. Literature drawn from psychology can offer some guidance to social workers, focusing on resilience, positive emotion and optimism. A great deal has been written about resilience, children and young people; much less about resilience, adults and social workers. Resilience is an adaptive state and personality trait evident in many people, including social workers, but it is influenced by many variables, such as culture. Positive emotions amidst negative events are further important elements in the psychological resilience of, and coping by, social workers. Three kinds of coping relating to positive affect have been identified: positive appraisal, goal-directed/problem-focused work and the infusion of ordinary events with meaning. Their implications for social work are explored. Optimism is another important personality difference that is significant in social workers' helping endeavours. Recent research on, and criticisms of, optimism are noted. There are important implications related to resilience, positive emotions and optimism for the selection of social work students, the development of social workers' knowledge and understanding of these topics, and for the support of social workers in their daily work.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex__item--grow research-detail-middle-section__item&quot; data-dcnode-id=&quot;5419&quot; style=&quot;flex-basis:0px;flex-grow:1&quot;&gt;&lt;div class=&quot;lite-page-promo research-detail-signup-promo&quot; data-dcnode-id=&quot;5420&quot;&gt;&lt;picture class=&quot;lite-page-promo__brand research-detail-signup-promo__brand&quot; data-dcnode-id=&quot;5434&quot; height=&quot;14&quot; width=&quot;100&quot;&gt;&lt;source data-dcnode-id=&quot;5437&quot; data-srcset=&quot;images/icons/svgicons/researchgate-logo-white.svg&quot; type=&quot;image/svg+xml&quot;&gt;&lt;span data-dcnode-id=&quot;5436&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;ResearchGate Logo&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;5435&quot; data-src=&quot;images/icons/svgicons/researchgate-logo-white.svg&quot; height=&quot;14&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot; width=&quot;100&quot;&gt;&lt;/picture&gt;&lt;p class=&quot;nova-legacy-e-text nova-legacy-e-text--size-xl nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit lite-page-promo__headline research-detail-signup-promo__headline&quot; data-dcnode-id=&quot;5431&quot;&gt;&lt;strong data-dcnode-id=&quot;5432&quot;&gt;&lt;span data-dcnode-id=&quot;5433&quot; instrument_node=&quot;&quot;&gt;Discover the world's research&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-l nova-legacy-e-list--type-unordered nova-legacy-e-list--spacing-auto lite-page-promo__list research-detail-si 0&quot;&gt;&lt;span data-dcnode-id=&quot;1991&quot; instrument_node=&quot;&quot;&gt;Mar 2022&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1974&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1975&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1976&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1977&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Monika-Punova&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1978&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1981&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1982&quot;&gt;&lt;span data-dcnode-id=&quot;1984&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Monika Punova&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1983&quot; data-src=&quot;https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1979&quot;&gt;&lt;span data-dcnode-id=&quot;1980&quot; instrument_node=&quot;&quot;&gt;Monika Punova&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1970&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1971&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0d1d4 lite-page-hidden&quot; data-dcnode-id=&quot;1972&quot;&gt;&lt;span data-dcnode-id=&quot;1973&quot; instrument_node=&quot;&quot;&gt;Since the 1980s, the issue of strengthening resilience has become more prevalent in social work. Initial efforts to enhance the client’s resilience turned the focus onto enhancing resilience for social work students and social workers as well. This chapter focuses on supporting resilience in the field education of social work students. The resiliency concept focuses on finding new ways and new adaptation mechanisms despite challenging conditions. The term “resilience” in field education is a concept that includes dynamic relationship-development processes through which the student can adapt and thus achieve well-being, despite having a difficult life situation in connection with their field practice. We speak about the importance of resilience-building in those settings where interactions between subjects and their environments imply the risk of adversity or where adversity occurs. The chapter will aim to answer the question: “How can we strengthen the resilience of social work students in field education?” To answer this question, a theoretical analysis is used, specifically the results of international empirical studies that deal with the application of the resilience concept to the education of social work students. The author draws on her many years of experience as a supervisor and coordinator of students’ fieldwork at Masaryk University in the Czech Republic and introduces the principles of the curriculum of practical education of social work students.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1954&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1955&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1956&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1957&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1958&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1964&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1965&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/359209435_Resilience_Enhancement_in_Social_Work_Field_Education&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1966&quot;&gt;&lt;span data-dcnode-id=&quot;1967&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1959&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publ class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1899&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1905&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1906&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Gail-Kinman&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1907&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1910&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1911&quot;&gt;&lt;span data-dcnode-id=&quot;1913&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Gail Kinman&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1912&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/272182127362072-1441904684636_Q64/Gail-Kinman.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1908&quot;&gt;&lt;span data-dcnode-id=&quot;1909&quot; instrument_node=&quot;&quot;&gt;Gail Kinman&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1900&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1901&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Louise-Grant-2181798777&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1902&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1903&quot;&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;Louise Grant&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1894&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1895&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0d315 lite-page-hidden&quot; data-dcnode-id=&quot;1896&quot;&gt;&lt;span data-dcnode-id=&quot;1897&quot; instrument_node=&quot;&quot;&gt;Perfectionism refers to a tendency to set unrealistically high standards for oneself and others. Although often seen positively, perfectionism can threaten health, relationships and performance. This study examined the effects of three types of maladaptive perfectionism on burnout in 294 UK social workers: self-oriented (having excessively high standards for oneself), other-oriented (having excessively high expectations of others) and socially prescribed (perceiving external pressure to excel). In line with previous research, we predicted that socially prescribed perfectionism would have particularly powerful effects on well-being, but significant relationships with self and other-oriented perfectionism were also expected. We also examined whether maladaptive perfectionism intensified the negative impact of work-related emotional demands on burnout. Significant positive relationships were found between socially prescribed and other-oriented perfectionism and burnout. A higher level of socially prescribed perfectionism was found than self and other-oriented and its relationship with burnout was particularly strong. We found no evidence, however, that perfectionism was an additional risk factor for burnout when emotional demands were high. Early career social workers were found to be at greater risk of dysfunctional perfectionism and burnout. The implications of the findings for the well-being of social workers are considered and potential interventions outlined to reduce maladaptive perfectionism.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1878&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1879&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1880&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1881&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1882&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1888&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1889&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/358472078_Being_%27good_enough%27_Perfectionism_and_well-being_in_social_workers&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=& ring periods of adversity (Bullough &amp;amp; Renko, 2013). In an enterprise environment, positive affect moderates the relationship between resilience and work engagement (Wang, Li, &amp;amp; Li, 2017), while positive emotions amidst negative events are important elements in the psychological resilience of workers &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;1869&quot;&gt;&lt;span data-dcnode-id=&quot;1870&quot; instrument_node=&quot;&quot;&gt;(Collins, 2007)&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;1868&quot; instrument_node=&quot;&quot;&gt;, and optimism is significantly related to resilient behaviors at work (Nguyen et al., 2016).  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body&quot; data-dcnode-id=&quot;1858&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow-tip&quot; data-dcnode-id=&quot;1859&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;1789&quot;&gt;&lt;div class=&quot;nova-legacy-v-citation-item__context-source&quot; data-dcnode-id=&quot;1790&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item&quot; data-dcnode-id=&quot;1791&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__body&quot; data-dcnode-id=&quot;1806&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m&quot; data-dcnode-id=&quot;1807&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1851&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-le eliki Karagiannaki&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1814&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1815&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Stratos-Baloutsos-2180827381&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1816&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1817&quot;&gt;&lt;span data-dcnode-id=&quot;1818&quot; instrument_node=&quot;&quot;&gt;Stratos Baloutsos&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1808&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1809&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0d68d lite-page-hidden&quot; data-dcnode-id=&quot;1810&quot;&gt;&lt;span data-dcnode-id=&quot;1811&quot; instrument_node=&quot;&quot;&gt;Knowledge Intensive Enterprises (KIEs) constitute one of the most promising forms of entrepreneurial activity that can boost economic growth. Especially within the context of Innovation Ecosystems (IEs), KIEs play a central role in modern innovation research. The Covid-19 pandemic highlighted strongpoints and deficiencies in the broader ecosystems, the companies themselves, and most importantly, their founders and employees. Despite the external hindrances, many enterprises found growth driven by their ecosystems’ dynamic and their staffs’ capabilities. Combining insights from a quantitative survey, with actual growth data in the context of a Venture Capital (VC)-driven IE, we argue that enterprise profile - as defined by its innovation capability and its members’ personal, organizational, and demographic characteristics – affect KIE growth potential, and actual growth. In addition, we argue that both enterprise profile, as well as KIE growth, affect its members’ emotional reaction to the Covid-19 crisis, in terms of worry, hope, and optimism.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1792&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1793&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1794&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1795&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1796&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1802&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1803&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/355808949_The_effect_of_human_capital_innovation_capacity_and_Covid-19_crisis_on_Knowledge-Intensive_Enterprises%27_growth_within_a_VC-driven legacy-c-tooltip--position-above-left nova-legacy-c-tooltip--elevation-none nova-legacy-c-tooltip--color-white nova-legacy-c-tooltip--spacing-m nova-legacy-c-tooltip--luminosity-medium nova-legacy-v-citation-item__context&quot; data-dcnode-id=&quot;1770&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__body&quot; data-dcnode-id=&quot;1771&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__body-content&quot; data-dcnode-id=&quot;1774&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;1775&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;1776&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;1777&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;1778&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;1779&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;1780&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;1781&quot;&gt;&lt;span data-dcnode-id=&quot;1785&quot; instrument_node=&quot;&quot;&gt;... While resilience is often pictured as a stable trait (Block &amp;amp; Kremen, 1996), it is in fact a positive orientation toward life-changing circumstances, and this orientation can change over time and can be altered by prolonged stress (Connor &amp;amp; Davidson, 2003). Thus, while a resilient attitude can play a significant role in circumventing the negative effects of MHW's work-related stress in intrinsically challenging environments when coping is appropriate &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;1783&quot;&gt;&lt;span data-dcnode-id=&quot;1784&quot; instrument_node=&quot;&quot;&gt;(Collins, 2007;&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;1782&quot; instrument_node=&quot;&quot;&gt;Kinman &amp;amp; Grant, 2011), too much unregulated stress may also decrease resilience over time. Therefore, MHW that face greater stress in regions with a high incidence of COVID-19 cases may be at risk of seeing their resilience decrease and their psychological distress increase.  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body&quot; data-dcnode-id=&quot;1772&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow-tip&quot; data-dcnode-id=&quot;1773&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;1694&quot;&gt;&lt;div class=&quot;nova-legacy-v-citation-item__context-source&quot; data-dcnode-id=&quot;1695&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item&quot; data-dcnode-id=&quot;1696&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__body&quot; data-dcnode-id=&quot;1711&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m&quot; data-dcnode-id=&quot;1712&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1765&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif n JRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1722&quot;&gt;&lt;span data-dcnode-id=&quot;1723&quot; instrument_node=&quot;&quot;&gt;Isabelle Ouellet-Morin&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1713&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1714&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0d990 lite-page-hidden&quot; data-dcnode-id=&quot;1715&quot;&gt;&lt;span data-dcnode-id=&quot;1716&quot; instrument_node=&quot;&quot;&gt;Objective
Despite their essential role during this health crisis, little is known about the psychological distress of mental health workers (MHW).

Method
A total of 616 MHW and 658 workers from the general population (GP) completed an online survey including depressive, anxiety, irritability, loneliness, and resilience measures.

Results
Overall, MHW had fewer cases with above cut-off clinically significant depression (19% MHW vs. 27%) or anxiety (16% MHW vs. 29%) than the GP. MHW in high-incidence regions of COVID-19 cases displayed the same levels of depressive and anxiety symptoms than the GP and higher levels compared to MHW from low-incidence regions. MHW in high-incidence regions presented higher levels of irritability and lower levels of resilience than the MHW in low-incidence regions. Moreover, MHW in high-incidence regions reported more feelings of loneliness than all other groups.

Conclusion
Implications for social and organizational preventive strategies to minimize the distress of MHW in times of crisis are discussed.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1697&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1698&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1699&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1700&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1701&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1707&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1708&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/354183537_Psychological_distress_of_mental_health_workers_during_the_COVID-19_pandemic_A_comparison_with_the_general_population_in_high-_and_low-incidence_regions&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1709&quot;&gt;&lt;span data-dcnode-id=&quot;1710&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1702&quot;&gt;&lt;but &quot; data-dcnode-id=&quot;1649&quot;&gt;&lt;span data-dcnode-id=&quot;1650&quot; instrument_node=&quot;&quot;&gt;Tobi J. Learey&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1637&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1638&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Jarden-Aaron&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1639&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1642&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1643&quot;&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Jarden Aaron&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1644&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/940858111168512-1601329462040_Q64/Jarden-Aaron.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1640&quot;&gt;&lt;span data-dcnode-id=&quot;1641&quot; instrument_node=&quot;&quot;&gt;Jarden Aaron&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1632&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1633&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Susan-M-Matthew-2117526615&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1634&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1635&quot;&gt;&lt;span data-dcnode-id=&quot;1636&quot; instrument_node=&quot;&quot;&gt;Susan M. Matthew&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1626&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1627&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0dbf4 lite-page-hidden&quot; data-dcnode-id=&quot;1628&quot;&gt;&lt;span data-dcnode-id=&quot;1629&quot; instrument_node=&quot;&quot;&gt;Background: 
The aim of this study was to determine the effect of demographic and psychological factors on resilience in new graduate-, mid- and late-career veterinarians working in Australia.

Method: 
An online cross-sectional survey of 800 veterinarians collected demographic and descriptive data in two stages from late 2015 to 2017, such as gender, average hours worked per week, type and region of practice and intention to leave veterinary medicine. Psychological factors were measured utilising the Brief Resilience Scale, the Veterinary Resilience Scale-Personal Resources, the Brief COPE and General Self-Efficacy measures.

Results: 
Using a full-factorial univariate General Linear Model, no significant difference in general resilience was evident between the three career-stage groups (p &amp;gt; 0.05). However, higher self-efficacy, higher personal resources for resilience in veterinary practice, and lower problem-focused, higher emotion-focused and lower dysfunctional coping strategies were related to higher resilience. In the model for mid- and late-career veterinarians, a weak positive relationship existed between higher average hours worked per week and higher resilience, while intention to leave veterinary practice was also related to lower resilience in mid- and late-career veterinarians.

Conclusion: 
This study supports the value of personal resources, rather than career stage, gender or region of work, as influential in developing veterinarian resilience.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1610&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1611&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1612&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1613&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1614&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1620&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1621&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/354091455_Resilience_of_veterinarians_at_different_career_stages_The_role_of_self-efficacy_coping_strategies_and_personal_resources_for_resilience_in_veterinary_practice&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1622&quot;&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dc n&gt;&lt;img alt=&quot;Mari Dalen Herland&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1564&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/278918574690312-1443510778648_Q64/Mari-Herland-2.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1560&quot;&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;Mari Dalen Herland&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1551&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1552&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0dcef lite-page-hidden&quot; data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;Social workers often experience higher levels of burnout compared with other healthcare professionals. The capacity to manage one’s own emotional reactions efficiently, frequently in complex care settings, is central to the role of social workers. This article highlights the complexity of emotions in social work research and practice by exploring the perspective of emotional intelligence. The article is both theoretical and empirical, based on reflections from a qualitative longitudinal study interviewing fathers with behavioural and criminal backgrounds, all in their 40 s. The analysis contains an exploration of the researcher position that illuminates the reflective, emotional aspects that took place within this interview process. Three overall themes emerged – first: Recognising emotional complexity; second: Reflecting on emotional themes; and third: Exploring my own prejudices and preconceptions. The findings apply to both theoretical and practical social work, addressing the need to understand emotions as a central part of critical reflection and reflexivity. The argument is that emotions have the potential to expand awareness of one’s own preconceptions, related to normative societal views. This form of analytical awareness entails identifying and paying attention to one’s own, sometimes embodied, emotional triggers.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1535&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1536&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1537&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1538&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1539&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1545&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1546&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/352691928_Emotional_intelligenc quot; data-dcnode-id=&quot;1464&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1465&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Monika-Punova&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1466&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1469&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1470&quot;&gt;&lt;span data-dcnode-id=&quot;1472&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Monika Punova&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1471&quot; data-src=&quot;https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1467&quot;&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt;Monika Punova&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1458&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1459&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0d3df lite-page-hidden&quot; data-dcnode-id=&quot;1460&quot;&gt;&lt;span data-dcnode-id=&quot;1461&quot; instrument_node=&quot;&quot;&gt;The empirical study brings answers to the question: “What are the relationships between resilience and personality of social workers in the scope of their profession?” The problematics of personality dispositions is viewed from the perspective of the five-factor model of personality (the “Big Five”), as well as from the perspective of resilience, which allows the workers to achieve the desired level of well-being despite the challenges of their profession. The research was conducted among 729 social workers in the Czech Republic with the help of a standardised questionnaire. It has been found that the most prevalent personality types among social workers are the conscientious and agreeable types and most workers have a medium rate of resilience. The biggest potential for the application of resilience has been found in the emotionally stable personality type and the smallest among the conscientious and agreeable type. On the basis of empirical findings, we recommend the support of resilience in social work practitioners and students through the development of self-awareness of their own personality and their personality growth, as well as the development of resilience awareness and focusing on developing strategies for its growth.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1442&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1443&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1444&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1445&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v uot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1403&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0d588 lite-page-hidden&quot; data-dcnode-id=&quot;1404&quot;&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt;This article outlines social work practitioners’ understandings and practices of self-care, which consider the influence of technology. As part of an exploratory study on the use and experiences of technology by Australian social work practitioners, we examined implications for worker self-care. The study found that technology presents unique challenges and opportunities for self-care as social workers straddled multiple and contradictory conceptualisations of technology in the field. The use of technology raised mixed understandings of self-care, with social workers outlining the need for self-care to protect them from organisational reach and as a mechanism or space for self-care itself. The study findings highlight the need to consider technology in the understandings and practices of self-care for social workers.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1386&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1387&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1388&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1389&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-l ment&quot;&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;Response to COVID‐19 in social welfare facilities and the psychological state of social workers in South Korea: The mediating role of satisfaction with government&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1366&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta&quot; data-dcnode-id=&quot;1367&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-left&quot; data-dcnode-id=&quot;1373&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__type&quot; data-dcnode-id=&quot;1374&quot;&gt;&lt;span data-dcnode-id=&quot;1375&quot; instrument_node=&quot;&quot;&gt;Article&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-right&quot; data-dcnode-id=&quot;1368&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;1369&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;1370&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;1371&quot;&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;Sep 2021&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1354&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1355&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1361&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1362&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Sangjoon-Shin-2200568569&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1363&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1364&quot;&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;Sangjoon Shin&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1356&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1357&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Jimin-Gim-2200566631&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1358&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1359&quot;&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;Jimin Gim&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1350&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1351&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0d896 lite-page-hidden&quot; data-dcnode-id=&quot;1352&quot;&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt;This paper investigated associations between COVID‐19 responses in social welfare facilities and the psychological state of social workers together with the potential mediating role of satisfaction with the government. During the COVID‐19 pandemic, following government guidelines, social workers have continued to provide social services to the vulnerable groups. However, no research has been conducted focusing on their psychological state. A cross‐sectional survey was carried out in Incheon Metropolitan City, South Korea. Data from 332 participants were analyzed using structural equation modeling. Supplementary in‐depth interviews were conducted with social workers. Analysis results show that higher levels of preventive measures against COVID‐19 directly worsen levels of well‐being, but this negative effect is offset by the satisfaction with the government (β = .383, p &amp;lt; .001). In social workers, satisfaction with the government fully mediates the influence of preventive measures toward reduced negative emotionality (β = −.288, p &amp;lt; .001). The implications of this study suggest that the government's active response to the social welfare sector is important to alleviate the negative psychological consequences of social workers.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1334&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1335&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1336&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1337&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group t;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1174&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1175&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0e189 lite-page-hidden&quot; data-dcnode-id=&quot;1176&quot;&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;Extrapolating from B. L. Fredrickson's (1998, 2001) broaden-and-build theory of positive emotions, the authors hypothesized that positive emotions are active ingredients within trait resilience. U.S. college students (18 men and 28 women) were tested in early 2001 and again in the weeks following the September 11th terrorist attacks. Mediational analyses showed that positive emotions experienced in the wake of the attacks - gratitude, interest, love, and so forth - fully accounted for the relations between (a) precrisis resilience and later development of depressive symptoms and (b) precrisis resilience and postcrisis growth in psychological resources. Findings suggest that positive emotions in the aftermath of crises buffer resilient people against depression and fuel thriving, consistent with the broaden-and-build theory. Discussion touches on implications for coping.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1158&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1159&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1160&quot;&gt;&lt;di &quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1051&quot;&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;Michael Ungar&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1042&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1043&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0e434 lite-page-hidden&quot; data-dcnode-id=&quot;1044&quot;&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;Findings from a 14 site mixed methods study of over 1500 youth globally support four propositions that underlie a more culturally and contextually embedded understanding of resilience: 1) there are global, as well as culturally and contextually specific aspects to young peoples lives that contribute to their resilience; 2) aspects of resilience exert differing amounts of influence on a childs life depending on the specific culture and context in which resilience is realized; 3) aspects of childrens lives that contribute to resilience are related to one another in patterns that reflect a childs culture and context; 4) tensions between individuals and their cultures and contexts are resolved in ways that reflect highly specific relationships between aspects of resilience. The implications of this cultural and contextual understanding of resilience to interventions with at-risk populations are discussed.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;992&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0e471 lite-page-hidden&quot; data-dcnode-id=&quot;993&quot;&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;This article addresses distinctions underlying concepts of resilience and thriving and issues in conceptualizing thriving. Thriving (physical or psychological) may reflect decreased reactivity to subsequent stressors, faster recovery from subsequent stressors, or a consistently higher level of functioning. Psychological thriving may reflect gains in skill, knowledge, confidence, or a sense of security in personal relationships. Psychological thriving resembles other instances of growth. It probably does not depend on the occurrence of a discrete traumatic event or longer term trauma, though such events may elicit it. An important question is why some people thrive, whereas others are impaired, given the same event. A potential answer rests on the idea that differences in confidence and mastery are self-perpetuating and self-intensifying. This idea suggests a number of variables whose role in thriving is worth closer study, including personality variables such as optimism, contextual variables such as social support, and situational variables such as the coping reactions elicited by the adverse event.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;975&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;976&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;977&quot;&gt;&lt;div class=&quot;nova bout social work. Stressors are identified in both professional and private lives. The effects of stress as manifested through the General Health Questionnaire and the Maslach Burnout Inventory are examined and the social workers' views on various stress coping strategies are discussed.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;914&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;915&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;916&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;917&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;918&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;924&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;925&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/292807561_Occupational_stress_in_social_work&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-  Masten&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;879&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;880&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0e686 lite-page-hidden&quot; data-dcnode-id=&quot;881&quot;&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;The study of resilience in development has overturned many negative assumptions and deficit-focused models about children growing up under the threat of disadvantage and adversity. The most surprising conclusion emerging from studies of these children is the ordinariness of resilience. An examination of converging findings from variable-focused and person-focused investigations of these phenomena suggests that resilience is common and that it usually arises from the normative functions of human adaptational systems, with the greatest threats to human development being those that compromise these protective systems. The conclusion that resilience is made of ordinary rather than extraordinary processes offers a more positive outlook on human development and adaptation, as well as direction for policy and practice aimed at enhancing the development of children at risk for problems and psychopathology. The study of resilience in development has overturned many negative assumptions and deficit-focused models about children growing up under the threat of disadvantage and adversity.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;863&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;827&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;838&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;839&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Richard-S-Lazarus-49335032&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;840&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;841&quot;&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;Richard S. Lazarus&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;833&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;834&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Allen-D-Kanner-2061718066&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;835&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;836&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;Allen D. Kanner&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;828&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;829&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Susan-Folkman-39590689&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;830&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;831&quot;&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;Susan Folkman&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;822&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;823&quot;&gt;&lt;span class=&quot;js-target-abstract-62696c7e0e937 lite-page-hidden&quot; data-dcnode-id=&quot;824&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;We have attempted four main tasks in this chapter. First, a systematic overview is given of the cognitive–phenomenological theory of emotions put forth by Lazarus and his colleagues. The concepts of cognitive appraisal, coping, and several key principles in the theory, including transaction and flux, are reviewed. Second, we offer a working definition of emotion which also serves to summarize the main tenets of the theoretical point of view. Third, we draw upon this point of view to deal with a number of phylogenetic issues concerning the nature of emotion in humans and infra-humans. Finally, we attempt to redress the traditional imbalance of thought in which positively toned emotions have been neglected in favor of the negative. We systematically examine some of the conceptual issues that have made it difficult to integrate positively toned emotions into emotion theory. In this discussion, emphasis is placed on the functions of physiological changes in positively toned emotions and on the ways that positively toned emotions affect coping. Throughout, our view has been that the neglect of positively toned emotions in emotion theory has obscured their importance in human adaptation and in psychological growth and change.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;806&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;807&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;808&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;809&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;810&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;816&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;817&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/284590023_Emotions_A_Cognitivephenomenological_Analysis&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;818&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;811&quot;&gt;&lt;button class=&quot;nova-lega lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-62696c7e0f22f&quot; data-dcnode-id=&quot;563&quot;&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt; Device), personality traits (Big Five Inventory-44), optimism (Life Orientation Test-Revised), resilience (Connor-Davidson Resilience Scale), and perceived social support (Social Provisions Scale). The results indicated negative and significant relationship between family functioning (communication and affective involvement dimensions), personality traits (extraversion and conscientiousness), optimism, resilience, perceived social support, and psychological distress. It also indicated positive and significant relationship between neuroticism personality trait and psychological distress. These findings suggested that family functioning (communication and affective involvement dimensions), personality traits (extraversion and conscientiousness), optimism, resilience, and perceived social support can be protective factors for psychological distress, meanwhile neuroticism personality trait can be risk factor for psychological distress.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;560&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/323420460_Ups_and_Downs_as_Indonesian_College_Students_Risk_and_Protective_Factors_for_Psychological_Distress&quot;&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;Read more&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&quot; data-dcnode-id=&quot;518&quot;&gt;&lt;div class=&quot;nova-legacy-c-card 29386067_Q64/Katharine-Parkes.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;533&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;534&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Katharine-Parkes&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;Katharine Parkes&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;524&quot;&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;This article reviews the role of individual differences in work stress processes, with particular reference to personality and coping as moderator variables. Vulnerability/resilience and person-environment fit (congruence) models of moderator effects are contrasted and relevant issues of methodology and analysis are outlined. Personality traits (locus of control, hardiness, Type A, optimism, and &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;527&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-62696c7e0f53a&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-62696c7e0f53a&quot; data-dcnode-id=&quot;525&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt; neuroticism) that act as moderators of stress/strain relations are reviewed; the characteristics and limitations of available measures are described. Associations between personality and coping, inventories for the assessment of coping, and the dimensions of coping behaviour, are then considered. The implications of structural and transactional models of stress for coping assessment are discussed with reference to dispositional versus situational approaches and other psychometric issues. The need for research into coping flexibility and consistency is emphasized. No attempt is made to provide a comprehensive account of empirical research into individual difference moderator effects, but relevant review articles are cited, together with some recent studies. Finally, several areas which would merit further attention (including specificity of moderator effects, conjunctive and disjunctive patterns, and moderation of relations between objective and perceived stressors) are identified.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;522&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/235913907_Personality_and_coping_as_moderators_of_work_stress_processes_Models_methods_and_measures&quot;&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;View full-text&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&q AAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;470&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;471&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Ioanna-Papathanasiou-2&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;Ioanna V. Papathanasiou&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;461&quot;&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;Aim of the study: 
The aim of this study was to examine the relationship between religiosity, mental health, and psychological resilience in breast cancer patients.

Material and methods: 
A cross-sectional study was conducted in an oncology department of a hospital in northern Greece during February and March 2017. The sample consisted of 152 breast cancer patients. Data were collected with the &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;464&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-62696c7e0f7f2&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-62696c7e0f7f2&quot; data-dcnode-id=&quot;462&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt; following instruments: Patient Health Questionnaire two-item scale, Generalised Anxiety Disorder two-item scale, Connor-Davidson Resilience Scale 25, and Centrality of Religiosity Scale. Also, patients' characteristics were included, specifically demographic, social, and clinical information. Statistical analyses were conducted with the Statistical Package for the Social Sciences V25.

Results: 
According to our results, approximately 1 out of 3 patients had depression and anxiety. Also, the sample had moderate resilience and were moderately religious. Patients who were classified as end-stage cancer patients and those who underwent mastectomy found to be more religious. Religiosity correlated positively with the resilience, while no correlation was found with depression, anxiety, and symptom burden. Based on regression results, religious beliefs seem to be a predictive factor for resilience and resilience is a predictive factor for depression.

Conclusions: 
Our findings show that there was no association between religiosity and mental health, while a strong relation was highlighted between religious beliefs and psychological resilience. This study should constitute a starting point for further assessments regarding the fact that religiosity can provide social support that facilitates psychological adaption to illness and helps cancer patients to cope with their illness, which should be recognised by health care professionals.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;459&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/327690414_Assessment_of_the_relation_between_religiosity_mental_health_and_psychological_resilience_on_breast_cancer_patients&quot;&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;View full-text&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;lite-page-ad lite-page-ad--has-label lite-page-ad--empty&quot; data-dcnode-id=&quot;420&quot; id=&quot;lite-ad-bpj9ie58kz5&quot;&gt;&lt;div class=&quot;lite-page-ad__inner&quot; data-dcnode-id=&quot;421&quot;&gt;&lt;div class=&quot;lite-page-ad__close&quot; data-dcnode-id=&quot;443&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-full nova-legacy-c-button--size-xs nova-legacy-c-button--color-grey nova-legacy-c-button--theme-solid nova-legacy-c-button--width-square&quot; data-dcnode-id=&quot;444&quot; id=&quot;lite-ad-bpj9ie58kz5-close&quot; type=&quot;button&quot;&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;nova-legacy-e-icon nova-legacy-e-icon--size-s nova-legacy-e-icon--th
