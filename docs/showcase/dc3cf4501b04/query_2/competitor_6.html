&lt;/span&gt;&lt;li data-dcnode-id=&quot;2025&quot;&gt;&lt;span data-dcnode-id=&quot;2026&quot; instrument_node=&quot;&quot;&gt;You feel that good things will happen in the future.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2023&quot;&gt;&lt;span data-dcnode-id=&quot;2024&quot; instrument_node=&quot;&quot;&gt;You expect things to work out for the best.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2021&quot;&gt;&lt;span data-dcnode-id=&quot;2022&quot; instrument_node=&quot;&quot;&gt;You feel like you will succeed in the face of life's challenges.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2019&quot;&gt;&lt;span data-dcnode-id=&quot;2020&quot; instrument_node=&quot;&quot;&gt;You feel that the future looks bright.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2017&quot;&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt;You think that even good things can come from negative events.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2015&quot;&gt;&lt;span data-dcnode-id=&quot;2016&quot; instrument_node=&quot;&quot;&gt;You see challenges or obstacles as opportunities to learn.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2013&quot;&gt;&lt;span data-dcnode-id=&quot;2014&quot; instrument_node=&quot;&quot;&gt;You feel gratitude for the good things in your life.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2011&quot;&gt;&lt;span data-dcnode-id=&quot;2012&quot; instrument_node=&quot;&quot;&gt;You are always looking for ways to make the most of opportunities.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2009&quot;&gt;&lt;span data-dcnode-id=&quot;2010&quot; instrument_node=&quot;&quot;&gt;You have a positive attitude about yourself and others.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2007&quot;&gt;&lt;span data-dcnode-id=&quot;2008&quot; instrument_node=&quot;&quot;&gt;You accept responsibilities for mistakes but don't dwell on them.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2005&quot;&gt;&lt;span data-dcnode-id=&quot;2006&quot; instrument_node=&quot;&quot;&gt;You don't let one bad experience muddy your expectations for the future.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2004&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2002&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1855&quot;&gt;&lt;span data-dcnode-id=&quot;1859&quot; instrument_node=&quot;&quot;&gt;John Tesh is a musician, radio host, TV show host, and author. His impressive resume includes job titles like news anchor and host for the Olympics as well as host of &lt;/span&gt;&lt;em data-dcnode-id=&quot;1857&quot;&gt;&lt;span data-dcnode-id=&quot;1858&quot; instrument_node=&quot;&quot;&gt;Entertainment Tonight&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt; and creator of the NBA theme song. He’s won six Emmys, been nominated for two GRAMMYs, and has four Gold albums. He has also been awarded an Associated Press award for his investigative journalism. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1847&quot;&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;He’s written several books, including his most recent one which is called &lt;/span&gt;&lt;em data-dcnode-id=&quot;1852&quot;&gt;&lt;span data-dcnode-id=&quot;1853&quot; instrument_node=&quot;&quot;&gt;Relentless: Unleashing a Life of Purpose, Grit, and Faith.&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1851&quot; instrument_node=&quot;&quot;&gt;  John overcame a lot of obstacles in life, including being suspended from college, being homeless, and facing a grim health prognosis.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1850&quot;/&gt;&lt;br data-dcnode-id=&quot;1849&quot;/&gt;&lt;span data-dcnode-id=&quot;1848&quot; instrument_node=&quot;&quot;&gt;In this episode, he shares how to motivate yourself when you're struggling, how to use visualization in a helpful way, and the one kind of list everyone should create for themselves. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1846&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;heading-toc&quot; data-dcnode-id=&quot;1658&quot; id=&quot;toc-explanatory-styles&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1657&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading&quot; data-dcnode-id=&quot;1652&quot; id=&quot;mntl-sc-block_1-0-21&quot;&gt;&lt;span data-dcnode-id=&quot;1656&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-heading__text&quot; data-dcnode-id=&quot;1654&quot;&gt;&lt;span data-dcnode-id=&quot;1655&quot; instrument_node=&quot;&quot;&gt; Explanatory Styles &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1653&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1651&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1646&quot; id=&quot;mntl-sc-block_1-0-22&quot;&gt;&lt;span data-dcnode-id=&quot;1650&quot; instrument_node=&quot;&quot;&gt;
Explanatory style or &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1648&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/about-explanatory-styles-3145110&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1649&quot; instrument_node=&quot;&quot;&gt;attributional style&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1647&quot; instrument_node=&quot;&quot;&gt; refers to how people explain the events of their lives. There are three facets of how people can explain a situation. This can influence whether they lean toward being optimists or pessimists:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1644&quot; id=&quot;mntl-sc-block_1-0-23&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1628&quot; id=&quot;mntl-sc-block_1-0-24&quot;&gt;&lt;span data-dcnode-id=&quot;1642&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1638&quot;&gt;&lt;strong data-dcnode-id=&quot;1640&quot;&gt;&lt;span data-dcnode-id=&quot;1641&quot; instrument_node=&quot;&quot;&gt;Stable vs. Unstable:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1639&quot; instrument_node=&quot;&quot;&gt; Can time change things, or do things stay the same regardless of time?&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1634&quot;&gt;&lt;strong data-dcnode-id=&quot;1636&quot;&gt;&lt;span data-dcnode-id=&quot;1637&quot; instrument_node=&quot;&quot;&gt;Global vs. Local:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1635&quot; instrument_node=&quot;&quot;&gt; Is a situation a reflection of just one part of your life, or your life as a whole?&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1630&quot;&gt;&lt;strong data-dcnode-id=&quot;1632&quot;&gt;&lt;span data-dcnode-id=&quot;1633&quot; instrument_node=&quot;&quot;&gt;Internal vs. External:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1631&quot; instrument_node=&quot;&quot;&gt; Do you feel events are caused by you or by an outside force?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1629&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1626&quot; id=&quot;mntl-sc-block_1-0-25&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1625&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block&quot; data-dcnode-id=&quot;1618&quot; data-tracking-container=&quot;true&quot; data-tracking-id=&quot;mntl-sc-block-callout&quot; id=&quot;mntl-sc-block_1-0-27&quot;&gt;&lt;span data-dcnode-id=&quot;1624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp expert-content mntl-sc-block-callout-body mntl-text-block&quot; data-dcnode-id=&quot;1620&quot; id=&quot;mntl-sc-block-callout-body_1-0-1&quot;&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1621&quot;&gt;&lt;span data-dcnode-id=&quot;1622&quot; instrument_node=&quot;&quot;&gt;Realists see things relatively clearly, but most of us aren’t realists. Instead, we tend to attribute the events in our lives either optimistically or pessimistically.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;comp mntl-sc-block mntl-sc-block-subheading&quot; data-dcnode-id=&quot;1612&quot; id=&quot;mntl-sc-block_1-0-29&quot;&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-subheading__text&quot; data-dcnode-id=&quot;1614&quot;&gt;&lt;span data-dcnode-id=&quot;1615&quot; instrument_node=&quot;&quot;&gt; Optimist Explanatory Style &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1613&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1609&quot; id=&quot;mntl-sc-block_1-0-30&quot;&gt;&lt;span data-dcnode-id=&quot;1610&quot; instrument_node=&quot;&quot;&gt;
Optimists explain positive events as having happened because of their own actions or characteristics (internal). They also see them as evidence that more positive things will happen in the future (stable) and in other areas of their lives (global).
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1607&quot; id=&quot;mntl-sc-block_1-0-31&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1604&quot; id=&quot;mntl-sc-block_1-0-32&quot;&gt;&lt;span data-dcnode-id=&quot;1605&quot; instrument_node=&quot;&quot;&gt;
Conversely, they see negative events as not being their fault (external). They also see them as being flukes (isolated) that have nothing to do with other areas of their lives or future events (local).
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1603&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1602&quot; id=&quot;mntl-sc-block_1-0-33&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1601&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1599&quot; id=&quot;mntl-sc-block_1-0-34&quot;&gt;&lt;span data-dcnode-id=&quot;1600&quot; instrument_node=&quot;&quot;&gt;
For example, if an optimist gets a promotion, they will likely believe it’s because they are good at their job and will receive more benefits and promotions in the future. If they are passed over for the promotion, it’s likely because they were having an bad month because of extenuating circumstances, but will do better in the future.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1598&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1597&quot; id=&quot;mntl-sc-block_1-0-35&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1596&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;comp mntl-sc-block mntl-sc-block-subheading&quot; data-dcnode-id=&quot;1591&quot; id=&quot;mntl-sc-block_1-0-37&quot;&gt;&lt;span data-dcnode-id=&quot;1595&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-subheading__text&quot; data-dcnode-id=&quot;1593&quot;&gt;&lt;span data-dcnode-id=&quot;1594&quot; instrument_node=&quot;&quot;&gt; Pessimist Explanatory Style &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1588&quot; id=&quot;mntl-sc-block_1-0-38&quot;&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;
Pessimists think in the opposite way. They believe that negative events are caused by their own mistakes or traits (internal). They believe that one mistake means more will come (stable), and mistakes in other areas of life are inevitable (global) because they are the cause. They see positive events as flukes (local) that are caused by things outside their control (external) and probably won’t happen again (unstable).
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1587&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1586&quot; id=&quot;mntl-sc-block_1-0-39&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1585&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1583&quot; id=&quot;mntl-sc-block_1-0-40&quot;&gt;&lt;span data-dcnode-id=&quot;1584&quot; instrument_node=&quot;&quot;&gt;
A pessimist would see a promotion as a lucky event that probably won’t happen again, and may even worry that they’ll now be under more scrutiny. Being passed over for a promotion would probably be explained as not being skilled enough. They would, therefore, expect to be passed over again.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1581&quot; id=&quot;mntl-sc-block_1-0-41&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;heading-toc&quot; data-dcnode-id=&quot;1579&quot; id=&quot;toc-how-to-practice-optimism&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1578&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading&quot; data-dcnode-id=&quot;1573&quot; id=&quot;mntl-sc-block_1-0-42&quot;&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-heading__text&quot; data-dcnode-id=&quot;1575&quot;&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt; How to Practice Optimism &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1572&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1570&quot; id=&quot;mntl-sc-block_1-0-43&quot;&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt;
Understandably, if you’re an optimist, this bodes well for your future. Negative events are more likely to roll off of your back while positive events affirm your belief in yourself, your ability to make good things happen now and in the future, and in the goodness of life.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1569&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1568&quot; id=&quot;mntl-sc-block_1-0-44&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1562&quot; id=&quot;mntl-sc-block_1-0-45&quot;&gt;&lt;span data-dcnode-id=&quot;1566&quot; instrument_node=&quot;&quot;&gt;
Research suggests that genetics determine about 25% of your optimism levels and environmental variables out of your control—such as your socioeconomic status—also play an important role.&lt;/span&gt;&lt;span class=&quot;mntl-inline-citation mntl-dynamic-tooltip--trigger&quot; data-dcnode-id=&quot;1564&quot; data-id=&quot;#citation-4&quot;&gt;&lt;span data-dcnode-id=&quot;1565&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1563&quot; instrument_node=&quot;&quot;&gt;﻿ But this doesn't mean that you can't actively improve your attitude.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1560&quot; id=&quot;mntl-sc-block_1-0-46&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1557&quot; id=&quot;mntl-sc-block_1-0-47&quot;&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;
While you might tend to have either an optimistic or pessimistic explanatory style, there are things that you can do the help cultivate a more optimistic attitude. These include:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1555&quot; id=&quot;mntl-sc-block_1-0-48&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1521&quot; id=&quot;mntl-sc-block_1-0-49&quot;&gt;&lt;span data-dcnode-id=&quot;1553&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1546&quot;&gt;&lt;strong data-dcnode-id=&quot;1551&quot;&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt;Become more mindful&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1550&quot; instrument_node=&quot;&quot;&gt;: &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1548&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/mindfulness-the-health-and-stress-relief-benefits-3145189&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt;Mindfulness&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1547&quot; instrument_node=&quot;&quot;&gt; is a focus on being engaged, attentive, and present in the here and now.&amp;nbsp;It can be a useful technique to help you focus on what matters in the present and avoid worrying about future events and things that are outside of your control. If you are living fully in the moment, you are much less likely to ruminate over negative past experiences or worry about upcoming events. This allows you to feel more appreciative of what you have now and less consumed with regrets and anxieties.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1532&quot;&gt;&lt;strong data-dcnode-id=&quot;1543&quot;&gt;&lt;span data-dcnode-id=&quot;1544&quot; instrument_node=&quot;&quot;&gt;Practice gratitude&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;: Gratitude can be defined as an appreciation for what is important in life. One study found that participants who were assigned to write in a &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1540&quot; data-ordinal=&quot;2&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/writing-in-a-gratitude-journal-for-stress-relief-3144887&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1541&quot; instrument_node=&quot;&quot;&gt;gratitude journal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt; showed increased optimism and &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1537&quot; data-ordinal=&quot;3&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/what-is-resilience-2795059&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;resilience&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;span class=&quot;mntl-inline-citation mntl-dynamic-tooltip--trigger&quot; data-dcnode-id=&quot;1534&quot; data-id=&quot;#citation-6&quot;&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;﻿ If you are trying to develop a more optimistic attitude, set aside a few minutes each day to jot down some of the things for which you are grateful.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1524&quot;&gt;&lt;strong data-dcnode-id=&quot;1529&quot;&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;Write down your positive emotions&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;: Research has shown that something as simple as writing down positive thoughts can help improve your optimism. One study found that expressive writing focused on positive emotions was linked to decreased mental distress and improved mental well-being.&lt;/span&gt;&lt;span class=&quot;mntl-inline-citation mntl-dynamic-tooltip--trigger&quot; data-dcnode-id=&quot;1526&quot; data-id=&quot;#citation-5&quot;&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1525&quot; instrument_node=&quot;&quot;&gt;﻿&lt;/span&gt;&lt;/li&gt;&lt;span class=&quot;mntl-sc-block-adslot mntl-sc-block-adslot-inline&quot; data-dcnode-id=&quot;1523&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1522&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1519&quot; id=&quot;mntl-sc-block_1-0-50&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block&quot; data-dcnode-id=&quot;1508&quot; data-tracking-container=&quot;true&quot; data-tracking-id=&quot;mntl-sc-block-callout&quot; id=&quot;mntl-sc-block_1-0-52&quot;&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp expert-content mntl-sc-block-callout-body mntl-text-block&quot; data-dcnode-id=&quot;1510&quot; id=&quot;mntl-sc-block-callout-body_1-0-2&quot;&gt;&lt;span data-dcnode-id=&quot;1516&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1511&quot;&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;It is also possible to develop &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1513&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/learned-optimism-4174101&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt;learned optimism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;. Pessimists can essentially learn to be optimists by thinking about their reactions to adversity in a new way and consciously challenge negative self-talk.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1507&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;comp mntl-sc-block mntl-sc-block-subheading&quot; data-dcnode-id=&quot;1502&quot; id=&quot;mntl-sc-block_1-0-54&quot;&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-subheading__text&quot; data-dcnode-id=&quot;1504&quot;&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt; Cognitive Restructuring &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1501&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1496&quot; id=&quot;mntl-sc-block_1-0-55&quot;&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;
Using a practice called &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1498&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/cognitive-restructuring-for-stress-relief-3144919&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;cognitive restructuring&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;, you can help yourself and others become more optimistic by consciously challenging negative, self-limiting thinking and replacing it with more optimistic thought patterns.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1495&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1494&quot; id=&quot;mntl-sc-block_1-0-56&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1493&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1491&quot; id=&quot;mntl-sc-block_1-0-57&quot;&gt;&lt;span data-dcnode-id=&quot;1492&quot; instrument_node=&quot;&quot;&gt;
The process of cognitive restructuring involves a few different steps:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1490&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1489&quot; id=&quot;mntl-sc-block_1-0-58&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1475&quot; id=&quot;mntl-sc-block_1-0-59&quot;&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1485&quot;&gt;&lt;span data-dcnode-id=&quot;1486&quot; instrument_node=&quot;&quot;&gt;Identify the situations that are triggering negative thoughts or moods.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1483&quot;&gt;&lt;span data-dcnode-id=&quot;1484&quot; instrument_node=&quot;&quot;&gt;Assess how you are feeling in the moment.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1481&quot;&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;Identify the negative thoughts that you are having in response to the situation.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1479&quot;&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt;Look at the evidence to either support or refute your negative thoughts.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1477&quot;&gt;&lt;span data-dcnode-id=&quot;1478&quot; instrument_node=&quot;&quot;&gt;Focus on the objective facts, and replace automatic negative thoughts with more positive, realistic ones.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1476&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;heading-toc&quot; data-dcnode-id=&quot;1471&quot; id=&quot;toc-impact-of-optimism&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1470&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading&quot; data-dcnode-id=&quot;1465&quot; id=&quot;mntl-sc-block_1-0-61&quot;&gt;&lt;span data-dcnode-id=&quot;1469&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-heading__text&quot; data-dcnode-id=&quot;1467&quot;&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt; Impact of Optimism &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1466&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1462&quot; id=&quot;mntl-sc-block_1-0-62&quot;&gt;&lt;span data-dcnode-id=&quot;1463&quot; instrument_node=&quot;&quot;&gt;
There has been a great deal of research on optimists and pessimists. Research has shown that an optimistic worldview carries certain advantages.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1461&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1448&quot; id=&quot;mntl-sc-block_1-0-66&quot;&gt;&lt;span data-dcnode-id=&quot;1452&quot; instrument_node=&quot;&quot;&gt;
Studies regularly show that optimists are more likely to maintain better physical health than pessimists, including a 50% lower risk of cardiovascular disease and greater survival rates when fighting cancer.&lt;/span&gt;&lt;span class=&quot;mntl-inline-citation mntl-dynamic-tooltip--trigger&quot; data-dcnode-id=&quot;1450&quot; data-id=&quot;#citation-1&quot;&gt;&lt;span data-dcnode-id=&quot;1451&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1449&quot; instrument_node=&quot;&quot;&gt;﻿&amp;nbsp;Some studies have also linked a pessimistic explanatory style with higher rates of infectious disease, poor health, and earlier mortality.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1447&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1446&quot; id=&quot;mntl-sc-block_1-0-67&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;comp mntl-sc-block mntl-sc-block-subheading&quot; data-dcnode-id=&quot;1440&quot; id=&quot;mntl-sc-block_1-0-69&quot;&gt;&lt;span data-dcnode-id=&quot;1444&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-subheading__text&quot; data-dcnode-id=&quot;1442&quot;&gt;&lt;span data-dcnode-id=&quot;1443&quot; instrument_node=&quot;&quot;&gt; Greater Achievement &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1441&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1428&quot; id=&quot;mntl-sc-block_1-0-70&quot;&gt;&lt;span data-dcnode-id=&quot;1438&quot; instrument_node=&quot;&quot;&gt;
Psychologist Martin Seligman, the founding father of &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1436&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/what-is-positive-psychology-2794902&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1437&quot; instrument_node=&quot;&quot;&gt;positive psychology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1435&quot; instrument_node=&quot;&quot;&gt;, analyzed sports teams and found that the more optimistic teams created more positive synergy and performed better than the &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1433&quot; data-ordinal=&quot;2&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/is-it-safer-to-be-a-pessimist-3144874&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt;pessimistic ones&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1432&quot; instrument_node=&quot;&quot;&gt;. Another study showed that pessimistic swimmers who were led to believe they’d done worse than they had were prone to future poor performance. Optimistic swimmers didn’t have this vulnerability.&lt;/span&gt;&lt;span class=&quot;mntl-inline-citation mntl-dynamic-tooltip--trigger&quot; data-dcnode-id=&quot;1430&quot; data-id=&quot;#citation-7&quot;&gt;&lt;span data-dcnode-id=&quot;1431&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1429&quot; instrument_node=&quot;&quot;&gt;﻿
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1426&quot; id=&quot;mntl-sc-block_1-0-71&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1425&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;comp mntl-sc-block mntl-sc-block-subheading&quot; data-dcnode-id=&quot;1420&quot; id=&quot;mntl-sc-block_1-0-73&quot;&gt;&lt;span data-dcnode-id=&quot;1424&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-subheading__text&quot; data-dcnode-id=&quot;1422&quot;&gt;&lt;span data-dcnode-id=&quot;1423&quot; instrument_node=&quot;&quot;&gt; Persistence &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1421&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1419&quot; instrument_node=&quot;&quot;&gt;

Optimists don’t give up as easily as pessimists, and they are more likely to achieve success because of it. People with optimistic attitudes are more likely to continue working toward their goals, even in the face of obstacles, challenges, and setbacks. Such persistence ultimately means that they are more likely to accomplish their goals.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1416&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1415&quot; id=&quot;mntl-sc-block_1-0-75&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1397&quot; id=&quot;mntl-sc-block_1-0-78&quot;&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;
Research suggests that &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1405&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/what-is-cognitive-behavior-therapy-2795747&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1406&quot; instrument_node=&quot;&quot;&gt;cognitive therapy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt; (which involves reframing a person's thought processes) can be as effective or more effective than antidepressant medications in the treatment of &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1402&quot; data-ordinal=&quot;2&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/what-is-clinical-depression-1067309&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;clinical depression&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;span class=&quot;mntl-inline-citation mntl-dynamic-tooltip--trigger&quot; data-dcnode-id=&quot;1399&quot; data-id=&quot;#citation-8&quot;&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;﻿ Such improvements also tend to be long-lasting, suggesting that they are more than a temporary fix. People who have this training in optimism appear to become better able to effectively handle future setbacks.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1395&quot; id=&quot;mntl-sc-block_1-0-79&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;comp mntl-sc-block mntl-sc-block-subheading&quot; data-dcnode-id=&quot;1389&quot; id=&quot;mntl-sc-block_1-0-81&quot;&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-subheading__text&quot; data-dcnode-id=&quot;1391&quot;&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt; Increased Longevity &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;

In a retrospective study of 34 healthy Hall of Fame baseball players who played between 1900 and 1950, optimists lived significantly longer. Other studies have shown that optimistic breast cancer patients had a better quality of life than pessimistic and hopeless patients.&lt;/span&gt;&lt;span class=&quot;mntl-inline-citation mntl-dynamic-tooltip--trigger&quot; data-dcnode-id=&quot;1385&quot; data-id=&quot;#citation-2&quot;&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1384&quot; instrument_node=&quot;&quot;&gt;﻿
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h3 class=&quot;comp mntl-sc-block mntl-sc-block-subheading&quot; data-dcnode-id=&quot;1375&quot; id=&quot;mntl-sc-block_1-0-85&quot;&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-subheading__text&quot; data-dcnode-id=&quot;1377&quot;&gt;&lt;span data-dcnode-id=&quot;1378&quot; instrument_node=&quot;&quot;&gt; Less Stress &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1374&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1369&quot; id=&quot;mntl-sc-block_1-0-86&quot;&gt;&lt;span data-dcnode-id=&quot;1373&quot; instrument_node=&quot;&quot;&gt;
Optimists also tend to experience &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1371&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/feel-less-frustrated-when-stressed-3145200&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;less stress&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1370&quot; instrument_node=&quot;&quot;&gt; than pessimists or realists. Because they believe in themselves and their abilities, they expect good things to happen. They see negative events as minor setbacks to be easily overcome and view positive events as evidence of further good things to come. Believing in themselves, they also take more risks and create more positive events in their lives.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block&quot; data-dcnode-id=&quot;1356&quot; data-tracking-container=&quot;true&quot; data-tracking-id=&quot;mntl-sc-block-callout&quot; id=&quot;mntl-sc-block_1-0-89&quot;&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp expert-content mntl-sc-block-callout-body mntl-text-block&quot; data-dcnode-id=&quot;1358&quot; id=&quot;mntl-sc-block-callout-body_1-0-3&quot;&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1359&quot;&gt;&lt;span data-dcnode-id=&quot;1363&quot; instrument_node=&quot;&quot;&gt;Research shows that optimists are more proactive with &lt;/span&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1361&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/tips-to-reduce-stress-3145195&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;stress management&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;. They tend to favor approaches that reduce or eliminate stressors and their emotional consequences. Because optimists work harder at stress management, they are less stressed.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;heading-toc&quot; data-dcnode-id=&quot;1354&quot; id=&quot;toc-potential-pitfalls&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading&quot; data-dcnode-id=&quot;1348&quot; id=&quot;mntl-sc-block_1-0-90&quot;&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;mntl-sc-block-heading__text&quot; data-dcnode-id=&quot;1350&quot;&gt;&lt;span data-dcnode-id=&quot;1351&quot; instrument_node=&quot;&quot;&gt; Potential Pitfalls &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1345&quot; id=&quot;mntl-sc-block_1-0-91&quot;&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt;
Optimism is generally a positive characteristic that confers a number of physical and mental health benefits. But this does not mean that is doesn't have a few potential pitfalls. Some ways that optimism can be detrimental include:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1343&quot; id=&quot;mntl-sc-block_1-0-92&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1342&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1324&quot; id=&quot;mntl-sc-block_1-0-93&quot;&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1336&quot;&gt;&lt;a data-component=&quot;link&quot; data-dcnode-id=&quot;1338&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;internalLink&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.verywellmind.com/what-is-the-optimism-bias-2795031&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;strong data-dcnode-id=&quot;1339&quot;&gt;&lt;span data-dcnode-id=&quot;1340&quot; instrument_node=&quot;&quot;&gt;Optimism bias&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1337&quot; instrument_node=&quot;&quot;&gt;: Sometimes excessive optimism can lead people to overestimate the likelihood that they can experience good things while avoiding bad things. The optimism bias suggests that people often underestimate their risk of experiencing negative outcomes. This can sometimes lead people to engage in risky behaviors that actually increase their chances of having a bad outcome.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1331&quot;&gt;&lt;strong data-dcnode-id=&quot;1333&quot;&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt;Poor risk assessment&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;: When people are overly optimistic about something, they may be less likely to think about all of the potential risks and take steps to mitigate those issues. This can ultimately make it more likely that their efforts might fail, or at least run into major problems along the way.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1326&quot;&gt;&lt;strong data-dcnode-id=&quot;1328&quot;&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;Toxic positivity&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;: Sometimes people tend to overvalue positive feelings while ignoring or even repressing negative ones. It can also cause people to invalidate the emotional experiences of people who are going through difficult times.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1322&quot; id=&quot;mntl-sc-block_1-0-94&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-dcnode-id=&quot;1319&quot; id=&quot;mntl-sc-block_1-0-95&quot;&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;
Optimists can avoid some of these pitfalls by focusing on maintaining a healthy, realistic approach to positivity. Rather than focusing only on &quot;staying positive&quot; and ignoring other emotions, the goal should be to try to look on the bright side while still acknowledging the difficulties of the situation.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; data-dcnode-id=&quot;1317&quot; id=&quot;mntl-sc-block_1-0-96&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1316&quot; instrument_node=&quot;&quot;&gt;
