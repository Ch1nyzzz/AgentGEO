the halfway point&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5178&quot; instrument_node=&quot;&quot;&gt;: an optimist is said to see the glass as half full, while a pessimist sees the glass as half empty.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;5154&quot;&gt;&lt;span data-dcnode-id=&quot;5176&quot; instrument_node=&quot;&quot;&gt;The term derives from the Latin &lt;/span&gt;&lt;i data-dcnode-id=&quot;5174&quot;&gt;&lt;span data-dcnode-id=&quot;5175&quot; instrument_node=&quot;&quot;&gt;optimum&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;5173&quot; instrument_node=&quot;&quot;&gt;, meaning &quot;best&quot;. Being optimistic, in the typical sense of the word, is defined as expecting the best possible outcome from any given situation.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;5170&quot; id=&quot;cite_ref-1&quot;&gt;&lt;a data-dcnode-id=&quot;5171&quot; href=&quot;#cite_note-1&quot;&gt;&lt;span data-dcnode-id=&quot;5172&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;5169&quot; instrument_node=&quot;&quot;&gt; This is usually referred to in &lt;/span&gt;&lt;a data-dcnode-id=&quot;5167&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Psychology&quot; title=&quot;Psychology&quot;&gt;&lt;span data-dcnode-id=&quot;5168&quot; instrument_node=&quot;&quot;&gt;psychology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5166&quot; instrument_node=&quot;&quot;&gt; as dispositional optimism. It thus reflects a belief that future conditions will work out for the best.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;5163&quot; id=&quot;cite_ref-2&quot;&gt;&lt;a data-dcnode-id=&quot;5164&quot; href=&quot;#cite_note-2&quot;&gt;&lt;span data-dcnode-id=&quot;5165&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;5162&quot; instrument_node=&quot;&quot;&gt; For this reason, it is seen as a trait that fosters resilience in the face of &lt;/span&gt;&lt;a data-dcnode-id=&quot;5160&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Psychological_stress&quot; title=&quot;Psychological stress&quot;&gt;&lt;span data-dcnode-id=&quot;5161&quot; instrument_node=&quot;&quot;&gt;stress&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5159&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;5156&quot; id=&quot;cite_ref-3&quot;&gt;&lt;a data-dcnode-id=&quot;5157&quot; href=&quot;#cite_note-3&quot;&gt;&lt;span data-dcnode-id=&quot;5158&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;5155&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;5149&quot;&gt;&lt;span data-dcnode-id=&quot;5153&quot; instrument_node=&quot;&quot;&gt;Theories of optimism include dispositional models and models of &lt;/span&gt;&lt;a data-dcnode-id=&quot;5151&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Explanatory_style&quot; title=&quot;Explanatory style&quot;&gt;&lt;span data-dcnode-id=&quot;5152&quot; instrument_node=&quot;&quot;&gt;explanatory style&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5150&quot; instrument_node=&quot;&quot;&gt;. Methods to measure optimism have been developed within both of these theoretical approaches, such as various forms of the Life Orientation Test for the original dispositional definition of optimism and the Attributional Style Questionnaire designed to test optimism in terms of explanatory style.

&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4892&quot;&gt;&lt;span data-dcnode-id=&quot;4916&quot; instrument_node=&quot;&quot;&gt;Dispositional optimism and pessimism&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4913&quot; id=&quot;cite_ref-9&quot;&gt;&lt;a data-dcnode-id=&quot;4914&quot; href=&quot;#cite_note-9&quot;&gt;&lt;span data-dcnode-id=&quot;4915&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4912&quot; instrument_node=&quot;&quot;&gt; are typically assessed by asking people whether they expect future outcomes to be beneficial or negative (see below). The LOT returns separate optimism and pessimism scores for each individual. Behaviourally, these two scores correlate around r = 0.5. Optimistic scores on this scale predict better outcomes in relationships,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4909&quot; id=&quot;cite_ref-10&quot;&gt;&lt;a data-dcnode-id=&quot;4910&quot; href=&quot;#cite_note-10&quot;&gt;&lt;span data-dcnode-id=&quot;4911&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4908&quot; instrument_node=&quot;&quot;&gt; higher &lt;/span&gt;&lt;a data-dcnode-id=&quot;4906&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Social_status&quot; title=&quot;Social status&quot;&gt;&lt;span data-dcnode-id=&quot;4907&quot; instrument_node=&quot;&quot;&gt;social status&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4905&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4902&quot; id=&quot;cite_ref-11&quot;&gt;&lt;a data-dcnode-id=&quot;4903&quot; href=&quot;#cite_note-11&quot;&gt;&lt;span data-dcnode-id=&quot;4904&quot; instrument_node=&quot;&quot;&gt;[11]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4901&quot; instrument_node=&quot;&quot;&gt; and reduced loss of well-being following adversity.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4898&quot; id=&quot;cite_ref-12&quot;&gt;&lt;a data-dcnode-id=&quot;4899&quot; href=&quot;#cite_note-12&quot;&gt;&lt;span data-dcnode-id=&quot;4900&quot; instrument_node=&quot;&quot;&gt;[12]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4897&quot; instrument_node=&quot;&quot;&gt; Health-preserving behaviors are associated with optimism while health-damaging behaviors are associated with pessimism.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4894&quot; id=&quot;cite_ref-13&quot;&gt;&lt;a data-dcnode-id=&quot;4895&quot; href=&quot;#cite_note-13&quot;&gt;&lt;span data-dcnode-id=&quot;4896&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4893&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4857&quot;&gt;&lt;span data-dcnode-id=&quot;4891&quot; instrument_node=&quot;&quot;&gt;Some have argued that optimism is the opposite end of a single dimension with pessimism,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4888&quot; id=&quot;cite_ref-14&quot;&gt;&lt;a data-dcnode-id=&quot;4889&quot; href=&quot;#cite_note-14&quot;&gt;&lt;span data-dcnode-id=&quot;4890&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4887&quot; instrument_node=&quot;&quot;&gt; with any distinction between them reflecting factors such as &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4885&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Social_desirability_bias&quot; title=&quot;Social desirability bias&quot;&gt;&lt;span data-dcnode-id=&quot;4886&quot; instrument_node=&quot;&quot;&gt;social desirability&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4884&quot; instrument_node=&quot;&quot;&gt;.  &lt;/span&gt;&lt;a data-dcnode-id=&quot;4882&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Confirmatory_factor_analysis&quot; title=&quot;Confirmatory factor analysis&quot;&gt;&lt;span data-dcnode-id=&quot;4883&quot; instrument_node=&quot;&quot;&gt;Confirmatory modelling&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4881&quot; instrument_node=&quot;&quot;&gt;, however, supports a two-dimensional model&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4878&quot; id=&quot;cite_ref-15&quot;&gt;&lt;a data-dcnode-id=&quot;4879&quot; href=&quot;#cite_note-15&quot;&gt;&lt;span data-dcnode-id=&quot;4880&quot; instrument_node=&quot;&quot;&gt;[15]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4877&quot; instrument_node=&quot;&quot;&gt; and the two dimensions predict different outcomes.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4874&quot; id=&quot;cite_ref-16&quot;&gt;&lt;a data-dcnode-id=&quot;4875&quot; href=&quot;#cite_note-16&quot;&gt;&lt;span data-dcnode-id=&quot;4876&quot; instrument_node=&quot;&quot;&gt;[16]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4873&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;4871&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Genetics&quot; title=&quot;Genetics&quot;&gt;&lt;span data-dcnode-id=&quot;4872&quot; instrument_node=&quot;&quot;&gt;Genetic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4870&quot; instrument_node=&quot;&quot;&gt; modelling confirms this independence, showing that pessimism and optimism are inherited as independent traits, with the typical correlation between them emerging as a result of a general well-being factor and family environment influences.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4867&quot; id=&quot;cite_ref-Bates2015_4-2&quot;&gt;&lt;a data-dcnode-id=&quot;4868&quot; href=&quot;#cite_note-Bates2015-4&quot;&gt;&lt;span data-dcnode-id=&quot;4869&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4866&quot; instrument_node=&quot;&quot;&gt; It is suggested that patients with high dispositional optimism appear to have stronger immune system since it buffers it against psychological stressors.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4863&quot; id=&quot;cite_ref-17&quot;&gt;&lt;a data-dcnode-id=&quot;4864&quot; href=&quot;#cite_note-17&quot;&gt;&lt;span data-dcnode-id=&quot;4865&quot; instrument_node=&quot;&quot;&gt;[17]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4862&quot; instrument_node=&quot;&quot;&gt; Optimists appear to live longer.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4859&quot; id=&quot;cite_ref-18&quot;&gt;&lt;a data-dcnode-id=&quot;4860&quot; href=&quot;#cite_note-18&quot;&gt;&lt;span data-dcnode-id=&quot;4861&quot; instrument_node=&quot;&quot;&gt;[18]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4846&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4854&quot; id=&quot;Explanatory_style&quot;&gt;&lt;span data-dcnode-id=&quot;4855&quot; instrument_node=&quot;&quot;&gt;Explanatory style&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4847&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4852&quot;&gt;&lt;span data-dcnode-id=&quot;4853&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4850&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D3&quot; title=&quot;Edit section: Explanatory style&quot;&gt;&lt;span data-dcnode-id=&quot;4851&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4848&quot;&gt;&lt;span data-dcnode-id=&quot;4849&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4845&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4830&quot;&gt;&lt;a data-dcnode-id=&quot;4843&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Explanatory_style&quot; title=&quot;Explanatory style&quot;&gt;&lt;span data-dcnode-id=&quot;4844&quot; instrument_node=&quot;&quot;&gt;Explanatory style&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4842&quot; instrument_node=&quot;&quot;&gt; is distinct from dispositional theories of optimism. While related to life-orientation measures of optimism, attributional style theory suggests that dispositional optimism and &lt;/span&gt;&lt;a data-dcnode-id=&quot;4840&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Pessimism&quot; title=&quot;Pessimism&quot;&gt;&lt;span data-dcnode-id=&quot;4841&quot; instrument_node=&quot;&quot;&gt;pessimism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4839&quot; instrument_node=&quot;&quot;&gt; are reflections of the ways people explain events, i.e., that attributions cause these dispositions.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4836&quot; id=&quot;cite_ref-19&quot;&gt;&lt;a data-dcnode-id=&quot;4837&quot; href=&quot;#cite_note-19&quot;&gt;&lt;span data-dcnode-id=&quot;4838&quot; instrument_node=&quot;&quot;&gt;[19]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4835&quot; instrument_node=&quot;&quot;&gt; Here, an optimist would view defeat as temporary, does not apply to other cases, and is not considered their fault.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4832&quot; id=&quot;cite_ref-20&quot;&gt;&lt;a data-dcnode-id=&quot;4833&quot; href=&quot;#cite_note-20&quot;&gt;&lt;span data-dcnode-id=&quot;4834&quot; instrument_node=&quot;&quot;&gt;[20]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4831&quot; instrument_node=&quot;&quot;&gt; Measures of attributional style distinguish three dimensions among explanations for events: Whether these explanations draw on internal versus external causes; whether the causes are viewed as stable versus unstable; and whether explanations apply globally versus being situationally specific. In addition, the measures distinguish attributions for positive and for negative events.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4820&quot;&gt;&lt;span data-dcnode-id=&quot;4829&quot; instrument_node=&quot;&quot;&gt;An optimistic person attributes internal, stable, and global explanations to good things. Pessimistic explanations attribute these traits of stability, globality, and internality to negative events, such as difficulty in relationships.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4826&quot; id=&quot;cite_ref-Gillham2001_21-0&quot;&gt;&lt;a data-dcnode-id=&quot;4827&quot; href=&quot;#cite_note-Gillham2001-21&quot;&gt;&lt;span data-dcnode-id=&quot;4828&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4825&quot; instrument_node=&quot;&quot;&gt; Models of Optimistic and Pessimistic attributions show that attributions themselves are a cognitive style – individuals who tend to focus on the global explanations do so for all types of events, and the styles correlate among each other. In addition to this, individuals vary in how optimistic their attributions are for good events, and on how pessimistic their attributions are for bad events, but these two traits of optimism and pessimism are un-correlated.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4822&quot; id=&quot;cite_ref-22&quot;&gt;&lt;a data-dcnode-id=&quot;4823&quot; href=&quot;#cite_note-22&quot;&gt;&lt;span data-dcnode-id=&quot;4824&quot; instrument_node=&quot;&quot;&gt;[22]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4821&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4803&quot;&gt;&lt;span data-dcnode-id=&quot;4819&quot; instrument_node=&quot;&quot;&gt;There is much debate about the relationship between explanatory style and optimism. Some researchers argue that optimism is simply the lay-term for what researchers know as explanatory style.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4816&quot; id=&quot;cite_ref-23&quot;&gt;&lt;a data-dcnode-id=&quot;4817&quot; href=&quot;#cite_note-23&quot;&gt;&lt;span data-dcnode-id=&quot;4818&quot; instrument_node=&quot;&quot;&gt;[23]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4815&quot; instrument_node=&quot;&quot;&gt; More commonly, it is found that explanatory style is quite distinct from dispositional optimism,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4812&quot; id=&quot;cite_ref-24&quot;&gt;&lt;a data-dcnode-id=&quot;4813&quot; href=&quot;#cite_note-24&quot;&gt;&lt;span data-dcnode-id=&quot;4814&quot; instrument_node=&quot;&quot;&gt;[24]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4809&quot; id=&quot;cite_ref-25&quot;&gt;&lt;a data-dcnode-id=&quot;4810&quot; href=&quot;#cite_note-25&quot;&gt;&lt;span data-dcnode-id=&quot;4811&quot; instrument_node=&quot;&quot;&gt;[25]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4808&quot; instrument_node=&quot;&quot;&gt; and the two should not be used interchangeably as they are marginally correlated at best. More research is required to &quot;bridge&quot; or further differentiate these concepts.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4805&quot; id=&quot;cite_ref-Gillham2001_21-1&quot;&gt;&lt;a data-dcnode-id=&quot;4806&quot; href=&quot;#cite_note-Gillham2001-21&quot;&gt;&lt;span data-dcnode-id=&quot;4807&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4802&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4792&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4800&quot; id=&quot;Origins&quot;&gt;&lt;span data-dcnode-id=&quot;4801&quot; instrument_node=&quot;&quot;&gt;Origins&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4793&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4798&quot;&gt;&lt;span data-dcnode-id=&quot;4799&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4796&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D4&quot; title=&quot;Edit section: Origins&quot;&gt;&lt;span data-dcnode-id=&quot;4797&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4794&quot;&gt;&lt;span data-dcnode-id=&quot;4795&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4791&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;4778&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;4779&quot; style=&quot;width:222px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;4789&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AOptimistic_Personality.png&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;4790&quot; data-file-height=&quot;523&quot; data-file-width=&quot;652&quot; decoding=&quot;async&quot; height=&quot;176&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/39/Optimistic_Personality.png/220px-Optimistic_Personality.png&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/3/39/Optimistic_Personality.png/330px-Optimistic_Personality.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/39/Optimistic_Personality.png/440px-Optimistic_Personality.png 2x&quot; width=&quot;220&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4788&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;4780&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;4786&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;4787&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AOptimistic_Personality.png&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4785&quot; instrument_node=&quot;&quot;&gt;Optimistic Personality (modified from&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4782&quot; id=&quot;cite_ref-Bates2015_4-3&quot;&gt;&lt;a data-dcnode-id=&quot;4783&quot; href=&quot;#cite_note-Bates2015-4&quot;&gt;&lt;span data-dcnode-id=&quot;4784&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4781&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4777&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4718&quot;&gt;&lt;span data-dcnode-id=&quot;4776&quot; instrument_node=&quot;&quot;&gt;As with all psychological traits, differences in both dispositional optimism and pessimism&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4773&quot; id=&quot;cite_ref-Bates2015_4-4&quot;&gt;&lt;a data-dcnode-id=&quot;4774&quot; href=&quot;#cite_note-Bates2015-4&quot;&gt;&lt;span data-dcnode-id=&quot;4775&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4772&quot; instrument_node=&quot;&quot;&gt;  and in attributional style&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4769&quot; id=&quot;cite_ref-Schulman_1993_569–574_26-0&quot;&gt;&lt;a data-dcnode-id=&quot;4770&quot; href=&quot;#cite_note-Schulman_1993_569%E2%80%93574-26&quot;&gt;&lt;span data-dcnode-id=&quot;4771&quot; instrument_node=&quot;&quot;&gt;[26]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4768&quot; instrument_node=&quot;&quot;&gt; are &lt;/span&gt;&lt;a data-dcnode-id=&quot;4766&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Heritability&quot; title=&quot;Heritability&quot;&gt;&lt;span data-dcnode-id=&quot;4767&quot; instrument_node=&quot;&quot;&gt;heritable&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4765&quot; instrument_node=&quot;&quot;&gt;. Both optimism and pessimism are strongly influenced by &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4763&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Environmental_factors&quot; title=&quot;Environmental factors&quot;&gt;&lt;span data-dcnode-id=&quot;4764&quot; instrument_node=&quot;&quot;&gt;environmental factors&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4762&quot; instrument_node=&quot;&quot;&gt;, including family environment.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4759&quot; id=&quot;cite_ref-Bates2015_4-5&quot;&gt;&lt;a data-dcnode-id=&quot;4760&quot; href=&quot;#cite_note-Bates2015-4&quot;&gt;&lt;span data-dcnode-id=&quot;4761&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4758&quot; instrument_node=&quot;&quot;&gt; It has been suggested that optimism may be indirectly inherited as a reflection of underlying heritable traits such as &lt;/span&gt;&lt;a data-dcnode-id=&quot;4756&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Intelligence&quot; title=&quot;Intelligence&quot;&gt;&lt;span data-dcnode-id=&quot;4757&quot; instrument_node=&quot;&quot;&gt;intelligence&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4755&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;4753&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Temperament&quot; title=&quot;Temperament&quot;&gt;&lt;span data-dcnode-id=&quot;4754&quot; instrument_node=&quot;&quot;&gt;temperament&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4752&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;4750&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alcoholism&quot; title=&quot;Alcoholism&quot;&gt;&lt;span data-dcnode-id=&quot;4751&quot; instrument_node=&quot;&quot;&gt;alcoholism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4749&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4746&quot; id=&quot;cite_ref-Schulman_1993_569–574_26-1&quot;&gt;&lt;a data-dcnode-id=&quot;4747&quot; href=&quot;#cite_note-Schulman_1993_569%E2%80%93574-26&quot;&gt;&lt;span data-dcnode-id=&quot;4748&quot; instrument_node=&quot;&quot;&gt;[26]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4745&quot; instrument_node=&quot;&quot;&gt; There is evidence from twin studies that show, for instance, that the inherited component of the dispositional optimism is about 25 percent, making this trait a stable personality dimension&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4742&quot; id=&quot;cite_ref-27&quot;&gt;&lt;a data-dcnode-id=&quot;4743&quot; href=&quot;#cite_note-27&quot;&gt;&lt;span data-dcnode-id=&quot;4744&quot; instrument_node=&quot;&quot;&gt;[27]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4741&quot; instrument_node=&quot;&quot;&gt; and a predictor of life outcomes.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4738&quot; id=&quot;cite_ref-28&quot;&gt;&lt;a data-dcnode-id=&quot;4739&quot; href=&quot;#cite_note-28&quot;&gt;&lt;span data-dcnode-id=&quot;4740&quot; instrument_node=&quot;&quot;&gt;[28]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4737&quot; instrument_node=&quot;&quot;&gt; Its genetic origin, which interacts with environmental influences and other risks, also determines the vulnerability to depression across the lifespan.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4734&quot; id=&quot;cite_ref-29&quot;&gt;&lt;a data-dcnode-id=&quot;4735&quot; href=&quot;#cite_note-29&quot;&gt;&lt;span data-dcnode-id=&quot;4736&quot; instrument_node=&quot;&quot;&gt;[29]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4733&quot; instrument_node=&quot;&quot;&gt; Many theories assume optimism can be &lt;/span&gt;&lt;a data-dcnode-id=&quot;4731&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Learned_optimism&quot; title=&quot;Learned optimism&quot;&gt;&lt;span data-dcnode-id=&quot;4732&quot; instrument_node=&quot;&quot;&gt;learned&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4730&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4727&quot; id=&quot;cite_ref-Vaughan_2000_6-1&quot;&gt;&lt;a data-dcnode-id=&quot;4728&quot; href=&quot;#cite_note-Vaughan_2000-6&quot;&gt;&lt;span data-dcnode-id=&quot;4729&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4726&quot; instrument_node=&quot;&quot;&gt; and research supports a modest role of family-environment acting to raise (or lower) optimism and lower (or raise) &lt;/span&gt;&lt;a data-dcnode-id=&quot;4724&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Neuroticism&quot; title=&quot;Neuroticism&quot;&gt;&lt;span data-dcnode-id=&quot;4725&quot; instrument_node=&quot;&quot;&gt;neuroticism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4723&quot; instrument_node=&quot;&quot;&gt; and pessimism.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4720&quot; id=&quot;cite_ref-Bates2015_4-6&quot;&gt;&lt;a data-dcnode-id=&quot;4721&quot; href=&quot;#cite_note-Bates2015-4&quot;&gt;&lt;span data-dcnode-id=&quot;4722&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4700&quot;&gt;&lt;span data-dcnode-id=&quot;4717&quot; instrument_node=&quot;&quot;&gt;Work utilising &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4715&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Brain_imaging&quot; title=&quot;Brain imaging&quot;&gt;&lt;span data-dcnode-id=&quot;4716&quot; instrument_node=&quot;&quot;&gt;brain imaging&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4714&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;4712&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Biochemistry&quot; title=&quot;Biochemistry&quot;&gt;&lt;span data-dcnode-id=&quot;4713&quot; instrument_node=&quot;&quot;&gt;biochemistry&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4711&quot; instrument_node=&quot;&quot;&gt; suggests that at a &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4709&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Biological_trait&quot; title=&quot;Biological trait&quot;&gt;&lt;span data-dcnode-id=&quot;4710&quot; instrument_node=&quot;&quot;&gt;biological trait&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4708&quot; instrument_node=&quot;&quot;&gt; level, optimism and pessimism reflect brain systems specialised for the tasks of processing and incorporating beliefs regarding &lt;/span&gt;&lt;a data-dcnode-id=&quot;4706&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Optimism_bias&quot; title=&quot;Optimism bias&quot;&gt;&lt;span data-dcnode-id=&quot;4707&quot; instrument_node=&quot;&quot;&gt;good and bad information&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4705&quot; instrument_node=&quot;&quot;&gt; respectively.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4702&quot; id=&quot;cite_ref-Sharot2011_5-1&quot;&gt;&lt;a data-dcnode-id=&quot;4703&quot; href=&quot;#cite_note-Sharot2011-5&quot;&gt;&lt;span data-dcnode-id=&quot;4704&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4699&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4689&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4697&quot; id=&quot;Assessment&quot;&gt;&lt;span data-dcnode-id=&quot;4698&quot; instrument_node=&quot;&quot;&gt;Assessment&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4690&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4695&quot;&gt;&lt;span data-dcnode-id=&quot;4696&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4693&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D5&quot; title=&quot;Edit section: Assessment&quot;&gt;&lt;span data-dcnode-id=&quot;4694&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4691&quot;&gt;&lt;span data-dcnode-id=&quot;4692&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4678&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4686&quot; id=&quot;Life_Orientation_Test&quot;&gt;&lt;span data-dcnode-id=&quot;4687&quot; instrument_node=&quot;&quot;&gt;Life Orientation Test&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4679&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4684&quot;&gt;&lt;span data-dcnode-id=&quot;4685&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4682&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D6&quot; title=&quot;Edit section: Life Orientation Test&quot;&gt;&lt;span data-dcnode-id=&quot;4683&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4680&quot;&gt;&lt;span data-dcnode-id=&quot;4681&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4663&quot;&gt;&lt;span data-dcnode-id=&quot;4676&quot; instrument_node=&quot;&quot;&gt;The Life Orientation Test (LOT) was designed by Scheier and Carver (1985) to assess dispositional optimism – expecting positive or negative outcomes,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4673&quot; id=&quot;cite_ref-Gillham2001_21-2&quot;&gt;&lt;a data-dcnode-id=&quot;4674&quot; href=&quot;#cite_note-Gillham2001-21&quot;&gt;&lt;span data-dcnode-id=&quot;4675&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4672&quot; instrument_node=&quot;&quot;&gt; and is one of the more popular tests of optimism and pessimism. This was also often used in early studies that examine the effects of these dispositions in health-related domains.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4669&quot; id=&quot;cite_ref-:2_30-0&quot;&gt;&lt;a data-dcnode-id=&quot;4670&quot; href=&quot;#cite_note-:2-30&quot;&gt;&lt;span data-dcnode-id=&quot;4671&quot; instrument_node=&quot;&quot;&gt;[30]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4668&quot; instrument_node=&quot;&quot;&gt; Scheier and Carver's initial research, which surveyed college students, found that optimistic participants were less likely to show an increase in symptoms like dizziness, muscle soreness, fatigue, blurred vision, and other physical complaints than pessimistic respondents.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4665&quot; id=&quot;cite_ref-31&quot;&gt;&lt;a data-dcnode-id=&quot;4666&quot; href=&quot;#cite_note-31&quot;&gt;&lt;span data-dcnode-id=&quot;4667&quot; instrument_node=&quot;&quot;&gt;[31]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4664&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4649&quot;&gt;&lt;span data-dcnode-id=&quot;4662&quot; instrument_node=&quot;&quot;&gt;There are eight items and four filler items in the test. Four are positive items (e.g. &quot;In uncertain times, I usually expect the best&quot;) and four are negative items e.g. &quot;If something can go wrong for me, it will.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4659&quot; id=&quot;cite_ref-ScheierCarver1985_32-0&quot;&gt;&lt;a data-dcnode-id=&quot;4660&quot; href=&quot;#cite_note-ScheierCarver1985-32&quot;&gt;&lt;span data-dcnode-id=&quot;4661&quot; instrument_node=&quot;&quot;&gt;[32]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4658&quot; instrument_node=&quot;&quot;&gt; The LOT has been revised twice—once by the original creators (LOT-R) and also by Chang, Maydeu-Olivares, and D'Zurilla as the Extended Life Orientation Test (ELOT). The Revised Life Orientation Test (LOT-R: Scheier, Carver, &amp;amp; Bridges, 1994) consists of six items, each scored on a 5-point scale from &quot;Strongly disagree&quot; to &quot;Strongly agree&quot; and four filler items.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4655&quot; id=&quot;cite_ref-33&quot;&gt;&lt;a data-dcnode-id=&quot;4656&quot; href=&quot;#cite_note-33&quot;&gt;&lt;span data-dcnode-id=&quot;4657&quot; instrument_node=&quot;&quot;&gt;[33]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4654&quot; instrument_node=&quot;&quot;&gt; Half of the coded items are phrased in an optimistic way while the other half in a pessimistic way. In comparison with its previous iteration, LOT-R offers good internal consistency overtime although there are item overlaps, making the correlation between the LOT and LOT-R extremely high.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4651&quot; id=&quot;cite_ref-:2_30-1&quot;&gt;&lt;a data-dcnode-id=&quot;4652&quot; href=&quot;#cite_note-:2-30&quot;&gt;&lt;span data-dcnode-id=&quot;4653&quot; instrument_node=&quot;&quot;&gt;[30]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4650&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4648&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;4638&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4646&quot; id=&quot;Attributional_Style_Questionnaire&quot;&gt;&lt;span data-dcnode-id=&quot;4647&quot; instrument_node=&quot;&quot;&gt;Attributional Style Questionnaire&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4639&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4644&quot;&gt;&lt;span data-dcnode-id=&quot;4645&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4642&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D7&quot; title=&quot;Edit section: Attributional Style Questionnaire&quot;&gt;&lt;span data-dcnode-id=&quot;4643&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4640&quot;&gt;&lt;span data-dcnode-id=&quot;4641&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;4637&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4617&quot;&gt;&lt;span data-dcnode-id=&quot;4636&quot; instrument_node=&quot;&quot;&gt;This Attributional Style Questionnaire (ASQ: Peterson et al. 1982&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4633&quot; id=&quot;cite_ref-:0_34-0&quot;&gt;&lt;a data-dcnode-id=&quot;4634&quot; href=&quot;#cite_note-:0-34&quot;&gt;&lt;span data-dcnode-id=&quot;4635&quot; instrument_node=&quot;&quot;&gt;[34]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4632&quot; instrument_node=&quot;&quot;&gt;) is based on the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4630&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Explanatory_style&quot; title=&quot;Explanatory style&quot;&gt;&lt;span data-dcnode-id=&quot;4631&quot; instrument_node=&quot;&quot;&gt;explanatory style&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4629&quot; instrument_node=&quot;&quot;&gt; model of optimism. Subjects read a list of six positive and negative events (e.g. &quot;&lt;/span&gt;&lt;i data-dcnode-id=&quot;4627&quot;&gt;&lt;span data-dcnode-id=&quot;4628&quot; instrument_node=&quot;&quot;&gt;you have been looking for a job unsuccessfully for some time&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4626&quot; instrument_node=&quot;&quot;&gt;&quot;), and are asked to record a possible cause for the event. They then rate whether this is internal or external, stable or changeable, and global or local to the event.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4623&quot; id=&quot;cite_ref-:0_34-1&quot;&gt;&lt;a data-dcnode-id=&quot;4624&quot; href=&quot;#cite_note-:0-34&quot;&gt;&lt;span data-dcnode-id=&quot;4625&quot; instrument_node=&quot;&quot;&gt;[34]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4622&quot; instrument_node=&quot;&quot;&gt; There are several modified versions of the ASQ including the Expanded Attributional Style Questionnaire (EASQ), the Content Analysis of Verbatim Explanations (CAVE), and the ASQ designed for testing the optimism of children.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4619&quot; id=&quot;cite_ref-Gillham2001_21-3&quot;&gt;&lt;a data-dcnode-id=&quot;4620&quot; href=&quot;#cite_note-Gillham2001-21&quot;&gt;&lt;span data-dcnode-id=&quot;4621&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4618&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4616&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4606&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4614&quot; id=&quot;Associations_with_health&quot;&gt;&lt;span data-dcnode-id=&quot;4615&quot; instrument_node=&quot;&quot;&gt;Associations with health&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4607&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4612&quot;&gt;&lt;span data-dcnode-id=&quot;4613&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4610&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D8&quot; title=&quot;Edit section: Associations with health&quot;&gt;&lt;span data-dcnode-id=&quot;4611&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4608&quot;&gt;&lt;span data-dcnode-id=&quot;4609&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4556&quot;&gt;&lt;span data-dcnode-id=&quot;4604&quot; instrument_node=&quot;&quot;&gt;Optimism and &lt;/span&gt;&lt;a data-dcnode-id=&quot;4602&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Health&quot; title=&quot;Health&quot;&gt;&lt;span data-dcnode-id=&quot;4603&quot; instrument_node=&quot;&quot;&gt;health&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4601&quot; instrument_node=&quot;&quot;&gt; are correlated moderately.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4598&quot; id=&quot;cite_ref-35&quot;&gt;&lt;a data-dcnode-id=&quot;4599&quot; href=&quot;#cite_note-35&quot;&gt;&lt;span data-dcnode-id=&quot;4600&quot; instrument_node=&quot;&quot;&gt;[35]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4597&quot; instrument_node=&quot;&quot;&gt; Optimism has been shown to &lt;/span&gt;&lt;a data-dcnode-id=&quot;4595&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Explained_variation&quot; title=&quot;Explained variation&quot;&gt;&lt;span data-dcnode-id=&quot;4596&quot; instrument_node=&quot;&quot;&gt;explain&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4594&quot; instrument_node=&quot;&quot;&gt; between 5–10% of the variation in the likelihood of developing some health conditions (&lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4592&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Pearson_product-moment_correlation_coefficient&quot; title=&quot;Pearson product-moment correlation coefficient&quot;&gt;&lt;span data-dcnode-id=&quot;4593&quot; instrument_node=&quot;&quot;&gt;correlation coefficients&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4591&quot; instrument_node=&quot;&quot;&gt; between .20 and .30),&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4588&quot; id=&quot;cite_ref-36&quot;&gt;&lt;a data-dcnode-id=&quot;4589&quot; href=&quot;#cite_note-36&quot;&gt;&lt;span data-dcnode-id=&quot;4590&quot; instrument_node=&quot;&quot;&gt;[36]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4587&quot; instrument_node=&quot;&quot;&gt; notably including &lt;/span&gt;&lt;a data-dcnode-id=&quot;4585&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Cardiovascular_disease&quot; title=&quot;Cardiovascular disease&quot;&gt;&lt;span data-dcnode-id=&quot;4586&quot; instrument_node=&quot;&quot;&gt;cardiovascular disease&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4584&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4581&quot; id=&quot;cite_ref-37&quot;&gt;&lt;a data-dcnode-id=&quot;4582&quot; href=&quot;#cite_note-37&quot;&gt;&lt;span data-dcnode-id=&quot;4583&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4578&quot; id=&quot;cite_ref-38&quot;&gt;&lt;a data-dcnode-id=&quot;4579&quot; href=&quot;#cite_note-38&quot;&gt;&lt;span data-dcnode-id=&quot;4580&quot; instrument_node=&quot;&quot;&gt;[38]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4575&quot; id=&quot;cite_ref-39&quot;&gt;&lt;a data-dcnode-id=&quot;4576&quot; href=&quot;#cite_note-39&quot;&gt;&lt;span data-dcnode-id=&quot;4577&quot; instrument_node=&quot;&quot;&gt;[39]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4574&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;4572&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Stroke&quot; title=&quot;Stroke&quot;&gt;&lt;span data-dcnode-id=&quot;4573&quot; instrument_node=&quot;&quot;&gt;stroke&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4571&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4568&quot; id=&quot;cite_ref-40&quot;&gt;&lt;a data-dcnode-id=&quot;4569&quot; href=&quot;#cite_note-40&quot;&gt;&lt;span data-dcnode-id=&quot;4570&quot; instrument_node=&quot;&quot;&gt;[40]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4567&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;4565&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Major_depressive_disorder&quot; title=&quot;Major depressive disorder&quot;&gt;&lt;span data-dcnode-id=&quot;4566&quot; instrument_node=&quot;&quot;&gt;depression&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4564&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4561&quot; id=&quot;cite_ref-41&quot;&gt;&lt;a data-dcnode-id=&quot;4562&quot; href=&quot;#cite_note-41&quot;&gt;&lt;span data-dcnode-id=&quot;4563&quot; instrument_node=&quot;&quot;&gt;[41]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4558&quot; id=&quot;cite_ref-42&quot;&gt;&lt;a data-dcnode-id=&quot;4559&quot; href=&quot;#cite_note-42&quot;&gt;&lt;span data-dcnode-id=&quot;4560&quot; instrument_node=&quot;&quot;&gt;[42]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4545&quot;&gt;&lt;span data-dcnode-id=&quot;4555&quot; instrument_node=&quot;&quot;&gt;The relationship between optimism and health has also been studied with regards to physical symptoms, coping strategies and negative affect for those suffering from &lt;/span&gt;&lt;a data-dcnode-id=&quot;4553&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Rheumatoid_arthritis&quot; title=&quot;Rheumatoid arthritis&quot;&gt;&lt;span data-dcnode-id=&quot;4554&quot; instrument_node=&quot;&quot;&gt;rheumatoid arthritis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4552&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;4550&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Asthma&quot; title=&quot;Asthma&quot;&gt;&lt;span data-dcnode-id=&quot;4551&quot; instrument_node=&quot;&quot;&gt;asthma&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4549&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;4547&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Fibromyalgia&quot; title=&quot;Fibromyalgia&quot;&gt;&lt;span data-dcnode-id=&quot;4548&quot; instrument_node=&quot;&quot;&gt;fibromyalgia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4546&quot; instrument_node=&quot;&quot;&gt;.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4528&quot;&gt;&lt;span data-dcnode-id=&quot;4544&quot; instrument_node=&quot;&quot;&gt;It has been found that among individuals with these diseases, optimists are not more likely than pessimists to report pain alleviation due to coping strategies, despite differences in psychological well-being between the two groups.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4541&quot; id=&quot;cite_ref-43&quot;&gt;&lt;a data-dcnode-id=&quot;4542&quot; href=&quot;#cite_note-43&quot;&gt;&lt;span data-dcnode-id=&quot;4543&quot; instrument_node=&quot;&quot;&gt;[43]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4540&quot; instrument_node=&quot;&quot;&gt; A &lt;/span&gt;&lt;a data-dcnode-id=&quot;4538&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Meta-analysis&quot; title=&quot;Meta-analysis&quot;&gt;&lt;span data-dcnode-id=&quot;4539&quot; instrument_node=&quot;&quot;&gt;meta-analysis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4537&quot; instrument_node=&quot;&quot;&gt; has confirmed the assumption that optimism is related to psychological well-being: &quot;Put simply, optimists emerge from difficult circumstances with less distress than do pessimists.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4534&quot; id=&quot;cite_ref-Scheier_44-0&quot;&gt;&lt;a data-dcnode-id=&quot;4535&quot; href=&quot;#cite_note-Scheier-44&quot;&gt;&lt;span data-dcnode-id=&quot;4536&quot; instrument_node=&quot;&quot;&gt;[44]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4533&quot; instrument_node=&quot;&quot;&gt; Furthermore, the correlation appears to be attributable to coping style: &quot;That is, optimists seem intent on facing problems head-on, taking active and constructive steps to solve their problems; pessimists are more likely to abandon their effort to attain their goals.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4530&quot; id=&quot;cite_ref-Scheier_44-1&quot;&gt;&lt;a data-dcnode-id=&quot;4531&quot; href=&quot;#cite_note-Scheier-44&quot;&gt;&lt;span data-dcnode-id=&quot;4532&quot; instrument_node=&quot;&quot;&gt;[44]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4529&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4518&quot;&gt;&lt;span data-dcnode-id=&quot;4527&quot; instrument_node=&quot;&quot;&gt;Optimists may respond better to stress: pessimists have shown higher levels of cortisol (the &quot;stress hormone&quot;) and trouble regulating cortisol in response to stressors.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4524&quot; id=&quot;cite_ref-45&quot;&gt;&lt;a data-dcnode-id=&quot;4525&quot; href=&quot;#cite_note-45&quot;&gt;&lt;span data-dcnode-id=&quot;4526&quot; instrument_node=&quot;&quot;&gt;[45]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4523&quot; instrument_node=&quot;&quot;&gt; Another study by Scheier examined the recovery process for a number of patients that had undergone surgery.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4520&quot; id=&quot;cite_ref-ReferenceA_46-0&quot;&gt;&lt;a data-dcnode-id=&quot;4521&quot; href=&quot;#cite_note-ReferenceA-46&quot;&gt;&lt;span data-dcnode-id=&quot;4522&quot; instrument_node=&quot;&quot;&gt;[46]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4519&quot; instrument_node=&quot;&quot;&gt; The study showed that optimism was a strong predictor of the rate of recovery. Optimists achieved faster results in &quot;behavioral milestones&quot; such as sitting in bed, walking around, etc. They also were rated by staff as having a more favorable physical recovery. In a 6-month later follow-up, it was found that optimists were quicker to resume normal activities.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4507&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4515&quot; id=&quot;Optimism_and_well-being&quot;&gt;&lt;span data-dcnode-id=&quot;4516&quot; instrument_node=&quot;&quot;&gt;Optimism and well-being&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4508&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4513&quot;&gt;&lt;span data-dcnode-id=&quot;4514&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4511&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D9&quot; title=&quot;Edit section: Optimism and well-being&quot;&gt;&lt;span data-dcnode-id=&quot;4512&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4509&quot;&gt;&lt;span data-dcnode-id=&quot;4510&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4495&quot;&gt;&lt;span data-dcnode-id=&quot;4505&quot; instrument_node=&quot;&quot;&gt;A number of studies have been done on optimism and psychological well-being. One 30-year study undertaken by Lee et al. (2019) assessed the overall optimism and &lt;/span&gt;&lt;a data-dcnode-id=&quot;4503&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Longevity&quot; title=&quot;Longevity&quot;&gt;&lt;span data-dcnode-id=&quot;4504&quot; instrument_node=&quot;&quot;&gt;longevity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4502&quot; instrument_node=&quot;&quot;&gt; of cohorts of men from the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4500&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Normative_Aging_Study&quot; title=&quot;Normative Aging Study&quot;&gt;&lt;span data-dcnode-id=&quot;4501&quot; instrument_node=&quot;&quot;&gt;Veterans Affairs Normative Aging Study&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4499&quot; instrument_node=&quot;&quot;&gt; and women from the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4497&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Nurses%25E2%2580%2599_Health_Study&quot; title=&quot;Nurses’ Health Study&quot;&gt;&lt;span data-dcnode-id=&quot;4498&quot; instrument_node=&quot;&quot;&gt;Nurses’ Health Study&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4496&quot; instrument_node=&quot;&quot;&gt;. The study found a positive correlation between higher levels of optimism and exceptional longevity, which the study defined as a lifespan exceeding 85 years.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4489&quot;&gt;&lt;span data-dcnode-id=&quot;4494&quot; instrument_node=&quot;&quot;&gt;Another study conducted by Aspinwall and Taylor (1990) assessed incoming freshmen on a range of personality factors such as optimism, self-esteem, locus of self-control, etc.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4491&quot; id=&quot;cite_ref-ReferenceA_46-1&quot;&gt;&lt;a data-dcnode-id=&quot;4492&quot; href=&quot;#cite_note-ReferenceA-46&quot;&gt;&lt;span data-dcnode-id=&quot;4493&quot; instrument_node=&quot;&quot;&gt;[46]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4490&quot; instrument_node=&quot;&quot;&gt; It was found that freshmen who scored high on optimism before entering college were reported to have lower levels of psychological distress than their more pessimistic peers, while controlling for the other personality factors. Over time, the more optimistic students were less stressed, less lonely, and less depressed than their pessimistic counterparts. Thus, this study suggests a strong link between optimism and psychological well-being.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4483&quot;&gt;&lt;span data-dcnode-id=&quot;4488&quot; instrument_node=&quot;&quot;&gt;In addition low optimism may help explain the association between caregivers' anger and reduced sense of vitality.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4485&quot; id=&quot;cite_ref-47&quot;&gt;&lt;a data-dcnode-id=&quot;4486&quot; href=&quot;#cite_note-47&quot;&gt;&lt;span data-dcnode-id=&quot;4487&quot; instrument_node=&quot;&quot;&gt;[47]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4484&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4470&quot;&gt;&lt;span data-dcnode-id=&quot;4482&quot; instrument_node=&quot;&quot;&gt;A recent meta-analysis of optimism supported past findings that optimism is positively correlated with &lt;/span&gt;&lt;a data-dcnode-id=&quot;4480&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Life_satisfaction&quot; title=&quot;Life satisfaction&quot;&gt;&lt;span data-dcnode-id=&quot;4481&quot; instrument_node=&quot;&quot;&gt;life satisfaction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4479&quot; instrument_node=&quot;&quot;&gt;, happiness,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4476&quot; id=&quot;cite_ref-48&quot;&gt;&lt;a data-dcnode-id=&quot;4477&quot; href=&quot;#cite_note-48&quot;&gt;&lt;span data-dcnode-id=&quot;4478&quot; instrument_node=&quot;&quot;&gt;[48]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4475&quot; instrument_node=&quot;&quot;&gt; psychological and physical well-being and negatively correlated with depression and anxiety.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4472&quot; id=&quot;cite_ref-49&quot;&gt;&lt;a data-dcnode-id=&quot;4473&quot; href=&quot;#cite_note-49&quot;&gt;&lt;span data-dcnode-id=&quot;4474&quot; instrument_node=&quot;&quot;&gt;[49]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4471&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4464&quot;&gt;&lt;span data-dcnode-id=&quot;4469&quot; instrument_node=&quot;&quot;&gt;Seeking to explain the correlation, researchers find that optimists choose healthier lifestyles. For example, optimists smoke less, are more physically active, consume more fruit, vegetables and whole-grain bread, and are more moderate in alcohol consumption.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4466&quot; id=&quot;cite_ref-50&quot;&gt;&lt;a data-dcnode-id=&quot;4467&quot; href=&quot;#cite_note-50&quot;&gt;&lt;span data-dcnode-id=&quot;4468&quot; instrument_node=&quot;&quot;&gt;[50]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4465&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4463&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4453&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4461&quot; id=&quot;Translating_association_into_modifiability&quot;&gt;&lt;span data-dcnode-id=&quot;4462&quot; instrument_node=&quot;&quot;&gt;Translating association into modifiability&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4454&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4459&quot;&gt;&lt;span data-dcnode-id=&quot;4460&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4457&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D10&quot; title=&quot;Edit section: Translating association into modifiability&quot;&gt;&lt;span data-dcnode-id=&quot;4458&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4455&quot;&gt;&lt;span data-dcnode-id=&quot;4456&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4452&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4408&quot;&gt;&lt;span data-dcnode-id=&quot;4451&quot; instrument_node=&quot;&quot;&gt;Research to date has demonstrated that optimists are less likely to have certain diseases or develop certain diseases over time. By comparison, research has not yet been able to demonstrate the ability to change an individual's level of optimism through &lt;/span&gt;&lt;a data-dcnode-id=&quot;4449&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Psychological_intervention&quot; title=&quot;Psychological intervention&quot;&gt;&lt;span data-dcnode-id=&quot;4450&quot; instrument_node=&quot;&quot;&gt;psychological interventions&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4448&quot; instrument_node=&quot;&quot;&gt;, and thereby alter the course of disease or likelihood for development of disease.&lt;/span&gt;&lt;sup class=&quot;noprint Inline-Template Template-Fact&quot; data-dcnode-id=&quot;4441&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;4447&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;4443&quot;&gt;&lt;a data-dcnode-id=&quot;4444&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed&quot; title=&quot;Wikipedia:Citation needed&quot;&gt;&lt;span data-dcnode-id=&quot;4445&quot; title=&quot;This claim needs references to reliable sources. (May 2017)&quot;&gt;&lt;span data-dcnode-id=&quot;4446&quot; instrument_node=&quot;&quot;&gt;citation needed&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4442&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4440&quot; instrument_node=&quot;&quot;&gt; Though in that same vein, an article by &lt;/span&gt;&lt;a data-dcnode-id=&quot;4438&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Mayo_Clinic&quot; title=&quot;Mayo Clinic&quot;&gt;&lt;span data-dcnode-id=&quot;4439&quot; instrument_node=&quot;&quot;&gt;Mayo Clinic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4437&quot; instrument_node=&quot;&quot;&gt; argues steps to change &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4435&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Self-talk&quot; title=&quot;Self-talk&quot;&gt;&lt;span data-dcnode-id=&quot;4436&quot; instrument_node=&quot;&quot;&gt;self-talk&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4434&quot; instrument_node=&quot;&quot;&gt; from negative to positive may shift individuals from a negative to a more positive/optimistic outlook.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4431&quot; id=&quot;cite_ref-MayoTalk_51-0&quot;&gt;&lt;a data-dcnode-id=&quot;4432&quot; href=&quot;#cite_note-MayoTalk-51&quot;&gt;&lt;span data-dcnode-id=&quot;4433&quot; instrument_node=&quot;&quot;&gt;[51]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4430&quot; instrument_node=&quot;&quot;&gt; Strategies claimed to be of value include surrounding oneself with positive people, identifying areas of change, practicing positive self-talk, being open to humor, and following a healthy lifestyle.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4427&quot; id=&quot;cite_ref-MayoTalk_51-1&quot;&gt;&lt;a data-dcnode-id=&quot;4428&quot; href=&quot;#cite_note-MayoTalk-51&quot;&gt;&lt;span data-dcnode-id=&quot;4429&quot; instrument_node=&quot;&quot;&gt;[51]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4426&quot; instrument_node=&quot;&quot;&gt; There is also the notion of &quot;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4424&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Learned_optimism&quot; title=&quot;Learned optimism&quot;&gt;&lt;span data-dcnode-id=&quot;4425&quot; instrument_node=&quot;&quot;&gt;learned optimism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4423&quot; instrument_node=&quot;&quot;&gt;&quot; in &lt;/span&gt;&lt;a data-dcnode-id=&quot;4421&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Positive_psychology&quot; title=&quot;Positive psychology&quot;&gt;&lt;span data-dcnode-id=&quot;4422&quot; instrument_node=&quot;&quot;&gt;positive psychology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4420&quot; instrument_node=&quot;&quot;&gt;, which holds that joy is a talent that can be cultivated and can be achieved through specific actions such as the challenging negative self talk or overcoming &quot;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4418&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Learned_helplessness&quot; title=&quot;Learned helplessness&quot;&gt;&lt;span data-dcnode-id=&quot;4419&quot; instrument_node=&quot;&quot;&gt;learned helplessness&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4417&quot; instrument_node=&quot;&quot;&gt;&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4414&quot; id=&quot;cite_ref-52&quot;&gt;&lt;a data-dcnode-id=&quot;4415&quot; href=&quot;#cite_note-52&quot;&gt;&lt;span data-dcnode-id=&quot;4416&quot; instrument_node=&quot;&quot;&gt;[52]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4413&quot; instrument_node=&quot;&quot;&gt; However, criticism against positive psychology argues that the field of positive psychology places too much importance on &quot;upbeat thinking, while shunting challenging and difficult experiences to the side.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4410&quot; id=&quot;cite_ref-53&quot;&gt;&lt;a data-dcnode-id=&quot;4411&quot; href=&quot;#cite_note-53&quot;&gt;&lt;span data-dcnode-id=&quot;4412&quot; instrument_node=&quot;&quot;&gt;[53]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4398&quot;&gt;&lt;span data-dcnode-id=&quot;4407&quot; instrument_node=&quot;&quot;&gt;There are researchers in a study involving twins who found that optimism is largely inherited at birth.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4404&quot; id=&quot;cite_ref-:1_54-0&quot;&gt;&lt;a data-dcnode-id=&quot;4405&quot; href=&quot;#cite_note-:1-54&quot;&gt;&lt;span data-dcnode-id=&quot;4406&quot; instrument_node=&quot;&quot;&gt;[54]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4403&quot; instrument_node=&quot;&quot;&gt; Along with the recognition that childhood experiences determine an individual's outlook, such studies demonstrate the genetic basis for optimism reinforces the recognized difficulty in changing or manipulating the direction of an adult's disposition from pessimist to optimist.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4400&quot; id=&quot;cite_ref-:1_54-1&quot;&gt;&lt;a data-dcnode-id=&quot;4401&quot; href=&quot;#cite_note-:1-54&quot;&gt;&lt;span data-dcnode-id=&quot;4402&quot; instrument_node=&quot;&quot;&gt;[54]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4399&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;4387&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4395&quot; id=&quot;Philosophical_optimism&quot;&gt;&lt;span data-dcnode-id=&quot;4396&quot; instrument_node=&quot;&quot;&gt;Philosophical optimism&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4388&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4393&quot;&gt;&lt;span data-dcnode-id=&quot;4394&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4391&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D11&quot; title=&quot;Edit section: Philosophical optimism&quot;&gt;&lt;span data-dcnode-id=&quot;4392&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4389&quot;&gt;&lt;span data-dcnode-id=&quot;4390&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;4386&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4372&quot;&gt;&lt;span data-dcnode-id=&quot;4385&quot; instrument_node=&quot;&quot;&gt;One of the earliest forms of philosophical optimism was Socrates' theory of moral intellectualism, which formed part of the thinker's enlightenment model through the process of self-improvement.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4382&quot; id=&quot;cite_ref-:3_55-0&quot;&gt;&lt;a data-dcnode-id=&quot;4383&quot; href=&quot;#cite_note-:3-55&quot;&gt;&lt;span data-dcnode-id=&quot;4384&quot; instrument_node=&quot;&quot;&gt;[55]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4381&quot; instrument_node=&quot;&quot;&gt; According to the philosopher, it is possible to attain virtuous life by leading and completing moral perfection that is attained through philosophical self-examination. He maintained that knowledge of moral truth is necessary and sufficient for leading a good life.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4378&quot; id=&quot;cite_ref-:3_55-1&quot;&gt;&lt;a data-dcnode-id=&quot;4379&quot; href=&quot;#cite_note-:3-55&quot;&gt;&lt;span data-dcnode-id=&quot;4380&quot; instrument_node=&quot;&quot;&gt;[55]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4377&quot; instrument_node=&quot;&quot;&gt; In his philosophical investigations, Socrates followed a model that did not merely focus on the intellect or reason but a balanced practice that also consider the emotion as an important contributor to the richness of human experience.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4374&quot; id=&quot;cite_ref-56&quot;&gt;&lt;a data-dcnode-id=&quot;4375&quot; href=&quot;#cite_note-56&quot;&gt;&lt;span data-dcnode-id=&quot;4376&quot; instrument_node=&quot;&quot;&gt;[56]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4330&quot;&gt;&lt;span data-dcnode-id=&quot;4371&quot; instrument_node=&quot;&quot;&gt;Distinct from a disposition to believe that things will work out, there is a philosophical idea that, perhaps in ways that may not be fully comprehended, the present moment is in an optimum state.  This view that all of nature - past, present, and future - operates by laws of optimization along the lines of &lt;/span&gt;&lt;a data-dcnode-id=&quot;4369&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hamilton%2527s_principle&quot; title=&quot;Hamilton's principle&quot;&gt;&lt;span data-dcnode-id=&quot;4370&quot; instrument_node=&quot;&quot;&gt;Hamilton's principle&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4368&quot; instrument_node=&quot;&quot;&gt; in the realm of physics is countered by views such as &lt;/span&gt;&lt;a data-dcnode-id=&quot;4366&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Idealism&quot; title=&quot;Idealism&quot;&gt;&lt;span data-dcnode-id=&quot;4367&quot; instrument_node=&quot;&quot;&gt;idealism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4365&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;4363&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Philosophical_realism&quot; title=&quot;Philosophical realism&quot;&gt;&lt;span data-dcnode-id=&quot;4364&quot; instrument_node=&quot;&quot;&gt;realism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4362&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4360&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Philosophical_pessimism&quot; title=&quot;Philosophical pessimism&quot;&gt;&lt;span data-dcnode-id=&quot;4361&quot; instrument_node=&quot;&quot;&gt;philosophical pessimism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4359&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;a data-dcnode-id=&quot;4357&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Philosophy&quot; title=&quot;Philosophy&quot;&gt;&lt;span data-dcnode-id=&quot;4358&quot; instrument_node=&quot;&quot;&gt;Philosophers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4356&quot; instrument_node=&quot;&quot;&gt; often link the concept of optimism with the name of &lt;/span&gt;&lt;a data-dcnode-id=&quot;4354&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Gottfried_Wilhelm_Leibniz&quot; title=&quot;Gottfried Wilhelm Leibniz&quot;&gt;&lt;span data-dcnode-id=&quot;4355&quot; instrument_node=&quot;&quot;&gt;Gottfried Wilhelm Leibniz&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4353&quot; instrument_node=&quot;&quot;&gt;, who held that we live in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4351&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Best_of_all_possible_worlds&quot; title=&quot;Best of all possible worlds&quot;&gt;&lt;span data-dcnode-id=&quot;4352&quot; instrument_node=&quot;&quot;&gt;best of all possible worlds&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4350&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;i data-dcnode-id=&quot;4348&quot;&gt;&lt;span data-dcnode-id=&quot;4349&quot; instrument_node=&quot;&quot;&gt;le meilleur des mondes possibles&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4347&quot; instrument_node=&quot;&quot;&gt;), or that God created a physical universe that applies the laws of physics. The concept was also reflected in an aspect of &lt;/span&gt;&lt;a data-dcnode-id=&quot;4345&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Voltaire&quot; title=&quot;Voltaire&quot;&gt;&lt;span data-dcnode-id=&quot;4346&quot; instrument_node=&quot;&quot;&gt;Francois-Marie Arouet de Voltaire&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4344&quot; instrument_node=&quot;&quot;&gt;'s early philosophy, one that was based on &lt;/span&gt;&lt;a data-dcnode-id=&quot;4342&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Isaac_Newton&quot; title=&quot;Isaac Newton&quot;&gt;&lt;span data-dcnode-id=&quot;4343&quot; instrument_node=&quot;&quot;&gt;Isaac Newton&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4341&quot; instrument_node=&quot;&quot;&gt;'s view that described a divinely ordered human condition.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4338&quot; id=&quot;cite_ref-57&quot;&gt;&lt;a data-dcnode-id=&quot;4339&quot; href=&quot;#cite_note-57&quot;&gt;&lt;span data-dcnode-id=&quot;4340&quot; instrument_node=&quot;&quot;&gt;[57]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4337&quot; instrument_node=&quot;&quot;&gt; This philosophy would also later emerge in &lt;/span&gt;&lt;a data-dcnode-id=&quot;4335&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Pope&quot; title=&quot;Alexander Pope&quot;&gt;&lt;span data-dcnode-id=&quot;4336&quot; instrument_node=&quot;&quot;&gt;Alexander Pope&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4334&quot; instrument_node=&quot;&quot;&gt;'s &lt;/span&gt;&lt;i data-dcnode-id=&quot;4332&quot;&gt;&lt;span data-dcnode-id=&quot;4333&quot; instrument_node=&quot;&quot;&gt;Essay on Man&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4331&quot; instrument_node=&quot;&quot;&gt;.
