&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4317&quot;&gt;&lt;span data-dcnode-id=&quot;4329&quot; instrument_node=&quot;&quot;&gt;Leibniz proposed that it was not in God's power to create a perfect world, but among possible worlds, he created the best.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4326&quot; id=&quot;cite_ref-58&quot;&gt;&lt;a data-dcnode-id=&quot;4327&quot; href=&quot;#cite_note-58&quot;&gt;&lt;span data-dcnode-id=&quot;4328&quot; instrument_node=&quot;&quot;&gt;[58]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4325&quot; instrument_node=&quot;&quot;&gt; In one of his writings, he responded to the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4323&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Blaise_Pascal&quot; title=&quot;Blaise Pascal&quot;&gt;&lt;span data-dcnode-id=&quot;4324&quot; instrument_node=&quot;&quot;&gt;Blaise Pascal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4322&quot; instrument_node=&quot;&quot;&gt; philosophy of awe and desperation in the face of the infinite by claiming that infinity should be celebrated. While Pascal advocated for making man's rational aspirations more humble, Leibniz was optimistic about the capacity of human reason to further extend itself.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4319&quot; id=&quot;cite_ref-59&quot;&gt;&lt;a data-dcnode-id=&quot;4320&quot; href=&quot;#cite_note-59&quot;&gt;&lt;span data-dcnode-id=&quot;4321&quot; instrument_node=&quot;&quot;&gt;[59]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4318&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4255&quot;&gt;&lt;span data-dcnode-id=&quot;4316&quot; instrument_node=&quot;&quot;&gt;This idea was mocked by Voltaire in his satirical novel &lt;/span&gt;&lt;i data-dcnode-id=&quot;4313&quot;&gt;&lt;a data-dcnode-id=&quot;4314&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Candide&quot; title=&quot;Candide&quot;&gt;&lt;span data-dcnode-id=&quot;4315&quot; instrument_node=&quot;&quot;&gt;Candide&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4312&quot; instrument_node=&quot;&quot;&gt; as baseless optimism of the sort exemplified by the beliefs of one of its characters &lt;/span&gt;&lt;a data-dcnode-id=&quot;4310&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Candide%23Main_characters&quot; title=&quot;Candide&quot;&gt;&lt;span data-dcnode-id=&quot;4311&quot; instrument_node=&quot;&quot;&gt;Dr. Pangloss&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4309&quot; instrument_node=&quot;&quot;&gt;, which are the opposite of his fellow traveller &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4307&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Martin_%28Candide%29&quot; title=&quot;Martin (Candide)&quot;&gt;&lt;span data-dcnode-id=&quot;4308&quot; instrument_node=&quot;&quot;&gt;Martin&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4306&quot; instrument_node=&quot;&quot;&gt;'s &lt;/span&gt;&lt;a data-dcnode-id=&quot;4304&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Pessimism&quot; title=&quot;Pessimism&quot;&gt;&lt;span data-dcnode-id=&quot;4305&quot; instrument_node=&quot;&quot;&gt;pessimism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4303&quot; instrument_node=&quot;&quot;&gt; and emphasis on &lt;/span&gt;&lt;a data-dcnode-id=&quot;4301&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Free_will&quot; title=&quot;Free will&quot;&gt;&lt;span data-dcnode-id=&quot;4302&quot; instrument_node=&quot;&quot;&gt;free will&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4300&quot; instrument_node=&quot;&quot;&gt;.  The optimistic position is also called &lt;/span&gt;&lt;a class=&quot;extiw&quot; data-dcnode-id=&quot;4298&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wiktionary.org/wiki/Panglossianism&quot; title=&quot;wikt:Panglossianism&quot;&gt;&lt;span data-dcnode-id=&quot;4299&quot; instrument_node=&quot;&quot;&gt;Panglossianism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4297&quot; instrument_node=&quot;&quot;&gt; and became an adjective for excessive, even stupendous, optimism.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4294&quot; id=&quot;cite_ref-60&quot;&gt;&lt;a data-dcnode-id=&quot;4295&quot; href=&quot;#cite_note-60&quot;&gt;&lt;span data-dcnode-id=&quot;4296&quot; instrument_node=&quot;&quot;&gt;[60]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4293&quot; instrument_node=&quot;&quot;&gt; The phrase &quot;panglossian pessimism&quot; has been used&lt;/span&gt;&lt;sup class=&quot;noprint Inline-Template&quot; data-dcnode-id=&quot;4286&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;4292&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;4288&quot;&gt;&lt;a data-dcnode-id=&quot;4289&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions&quot; title=&quot;Wikipedia:Manual of Style/Words to watch&quot;&gt;&lt;span data-dcnode-id=&quot;4290&quot; title=&quot;The material near this tag may use weasel words or too-vague attribution. (June 2017)&quot;&gt;&lt;span data-dcnode-id=&quot;4291&quot; instrument_node=&quot;&quot;&gt;by whom?&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4287&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;sup class=&quot;noprint Inline-Template&quot; data-dcnode-id=&quot;4279&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;4285&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;4281&quot;&gt;&lt;a data-dcnode-id=&quot;4282&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers&quot; title=&quot;Wikipedia:Manual of Style/Dates and numbers&quot;&gt;&lt;span data-dcnode-id=&quot;4283&quot; title=&quot;Need the year this event took place (June 2017)&quot;&gt;&lt;span data-dcnode-id=&quot;4284&quot; instrument_node=&quot;&quot;&gt;year&amp;nbsp;needed&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4280&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4278&quot; instrument_node=&quot;&quot;&gt; to describe the pessimistic position that, since this is the best of all possible worlds, it is impossible for anything to get any better. Conversely,   philosophical pessimism might be&lt;/span&gt;&lt;sup class=&quot;noprint Inline-Template&quot; data-dcnode-id=&quot;4271&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;4277&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;4273&quot;&gt;&lt;a data-dcnode-id=&quot;4274&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions&quot; title=&quot;Wikipedia:Manual of Style/Words to watch&quot;&gt;&lt;span data-dcnode-id=&quot;4275&quot; title=&quot;The material near this tag may use weasel words or too-vague attribution. (June 2017)&quot;&gt;&lt;span data-dcnode-id=&quot;4276&quot; instrument_node=&quot;&quot;&gt;by whom?&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4272&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;sup class=&quot;noprint Inline-Template&quot; data-dcnode-id=&quot;4264&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;4270&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;4266&quot;&gt;&lt;a data-dcnode-id=&quot;4267&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers&quot; title=&quot;Wikipedia:Manual of Style/Dates and numbers&quot;&gt;&lt;span data-dcnode-id=&quot;4268&quot; title=&quot;Need the year this event took place (June 2017)&quot;&gt;&lt;span data-dcnode-id=&quot;4269&quot; instrument_node=&quot;&quot;&gt;year&amp;nbsp;needed&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4265&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4263&quot; instrument_node=&quot;&quot;&gt; associated with an optimistic long-term view because it implies that no change for the worse is possible. Later, Voltaire found it difficult to reconcile Leibniz' optimism with human suffering as demonstrated by the earthquake that devastated &lt;/span&gt;&lt;a data-dcnode-id=&quot;4261&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Lisbon&quot; title=&quot;Lisbon&quot;&gt;&lt;span data-dcnode-id=&quot;4262&quot; instrument_node=&quot;&quot;&gt;Lisbon&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4260&quot; instrument_node=&quot;&quot;&gt; in 1755 as well as the atrocities committed by the pre-revolutionary France against its people.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4257&quot; id=&quot;cite_ref-61&quot;&gt;&lt;a data-dcnode-id=&quot;4258&quot; href=&quot;#cite_note-61&quot;&gt;&lt;span data-dcnode-id=&quot;4259&quot; instrument_node=&quot;&quot;&gt;[61]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4256&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4254&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4244&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4252&quot; id=&quot;Optimalism&quot;&gt;&lt;span data-dcnode-id=&quot;4253&quot; instrument_node=&quot;&quot;&gt;Optimalism&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4245&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4250&quot;&gt;&lt;span data-dcnode-id=&quot;4251&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4248&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism%26action%3Dedit%26section%3D12&quot; title=&quot;Edit section: Optimalism&quot;&gt;&lt;span data-dcnode-id=&quot;4249&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4246&quot;&gt;&lt;span data-dcnode-id=&quot;4247&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4243&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4217&quot;&gt;&lt;span data-dcnode-id=&quot;4242&quot; instrument_node=&quot;&quot;&gt;Philosophical optimalism, as defined by &lt;/span&gt;&lt;a data-dcnode-id=&quot;4240&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Nicholas_Rescher&quot; title=&quot;Nicholas Rescher&quot;&gt;&lt;span data-dcnode-id=&quot;4241&quot; instrument_node=&quot;&quot;&gt;Nicholas Rescher&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4239&quot; instrument_node=&quot;&quot;&gt;, holds that this universe exists because it is better than the alternatives.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4236&quot; id=&quot;cite_ref-Rescher2000_62-0&quot;&gt;&lt;a data-dcnode-id=&quot;4237&quot; href=&quot;#cite_note-Rescher2000-62&quot;&gt;&lt;span data-dcnode-id=&quot;4238&quot; instrument_node=&quot;&quot;&gt;[62]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4235&quot; instrument_node=&quot;&quot;&gt; While this philosophy does not exclude the possibility of a &lt;/span&gt;&lt;a data-dcnode-id=&quot;4233&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Deity&quot; title=&quot;Deity&quot;&gt;&lt;span data-dcnode-id=&quot;4234&quot; instrument_node=&quot;&quot;&gt;deity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4232&quot; instrument_node=&quot;&quot;&gt;, it also does not require one, and is compatible with &lt;/span&gt;&lt;a data-dcnode-id=&quot;4230&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Atheism&quot; title=&quot;Atheism&quot;&gt;&lt;span data-dcnode-id=&quot;4231&quot; instrument_node=&quot;&quot;&gt;atheism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4229&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4226&quot; id=&quot;cite_ref-63&quot;&gt;&lt;a data-dcnode-id=&quot;4227&quot; href=&quot;#cite_note-63&quot;&gt;&lt;span data-dcnode-id=&quot;4228&quot; instrument_node=&quot;&quot;&gt;[63]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4225&quot; instrument_node=&quot;&quot;&gt; Rescher explained that the concept can stand on its own feet, arguing that there is no necessity to seeing optimalism realization as divinely instituted because it is a &lt;/span&gt;&lt;a data-dcnode-id=&quot;4223&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Naturalism_%28philosophy%29&quot; title=&quot;Naturalism (philosophy)&quot;&gt;&lt;span data-dcnode-id=&quot;4224&quot; instrument_node=&quot;&quot;&gt;naturalistic theory&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4222&quot; instrument_node=&quot;&quot;&gt; in principle.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4219&quot; id=&quot;cite_ref-64&quot;&gt;&lt;a data-dcnode-id=&quot;4220&quot; href=&quot;#cite_note-64&quot;&gt;&lt;span data-dcnode-id=&quot;4221&quot; instrument_node=&quot;&quot;&gt;[64]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4218&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4180&quot;&gt;&lt;span data-dcnode-id=&quot;4216&quot; instrument_node=&quot;&quot;&gt;Psychological optimalism, as defined by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4214&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Positive_psychology&quot; title=&quot;Positive psychology&quot;&gt;&lt;span data-dcnode-id=&quot;4215&quot; instrument_node=&quot;&quot;&gt;positive psychologist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4213&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;4211&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Tal_Ben-Shahar&quot; title=&quot;Tal Ben-Shahar&quot;&gt;&lt;span data-dcnode-id=&quot;4212&quot; instrument_node=&quot;&quot;&gt;Tal Ben-Shahar&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4210&quot; instrument_node=&quot;&quot;&gt;, means willingness to accept failure while remaining confident that success will follow, a positive attitude he contrasts with negative &lt;/span&gt;&lt;a data-dcnode-id=&quot;4208&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Perfectionism_%28psychology%29&quot; title=&quot;Perfectionism (psychology)&quot;&gt;&lt;span data-dcnode-id=&quot;4209&quot; instrument_node=&quot;&quot;&gt;perfectionism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4207&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4204&quot; id=&quot;cite_ref-Pursuit_65-0&quot;&gt;&lt;a data-dcnode-id=&quot;4205&quot; href=&quot;#cite_note-Pursuit-65&quot;&gt;&lt;span data-dcnode-id=&quot;4206&quot; instrument_node=&quot;&quot;&gt;[65]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4203&quot; instrument_node=&quot;&quot;&gt; Perfectionism can be defined as a persistent compulsive drive toward unattainable goals and valuation based solely in terms of accomplishment.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4200&quot; id=&quot;cite_ref-66&quot;&gt;&lt;a data-dcnode-id=&quot;4201&quot; href=&quot;#cite_note-66&quot;&gt;&lt;span data-dcnode-id=&quot;4202&quot; instrument_node=&quot;&quot;&gt;[66]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4199&quot; instrument_node=&quot;&quot;&gt; Perfectionists reject the realities and constraints of human ability. They cannot accept failures, delaying any ambitious and productive behavior in fear of failure again.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4196&quot; id=&quot;cite_ref-horne1_67-0&quot;&gt;&lt;a data-dcnode-id=&quot;4197&quot; href=&quot;#cite_note-horne1-67&quot;&gt;&lt;span data-dcnode-id=&quot;4198&quot; instrument_node=&quot;&quot;&gt;[67]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4195&quot; instrument_node=&quot;&quot;&gt; This &lt;/span&gt;&lt;a data-dcnode-id=&quot;4193&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Neuroticism&quot; title=&quot;Neuroticism&quot;&gt;&lt;span data-dcnode-id=&quot;4194&quot; instrument_node=&quot;&quot;&gt;neuroticism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4192&quot; instrument_node=&quot;&quot;&gt; can even lead to &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4190&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Clinical_depression&quot; title=&quot;Clinical depression&quot;&gt;&lt;span data-dcnode-id=&quot;4191&quot; instrument_node=&quot;&quot;&gt;clinical depression&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4189&quot; instrument_node=&quot;&quot;&gt; and low productivity.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4186&quot; id=&quot;cite_ref-68&quot;&gt;&lt;a data-dcnode-id=&quot;4187&quot; href=&quot;#cite_note-68&quot;&gt;&lt;span data-dcnode-id=&quot;4188&quot; instrument_node=&quot;&quot;&gt;[68]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4185&quot; instrument_node=&quot;&quot;&gt; As an alternative to negative perfectionism, Ben-Shahar suggests the adoption of optimalism. Optimalism allows for failure in pursuit of a goal, and expects that while the trend of activity is towards the positive, it is not necessary to always succeed while striving towards goals. This basis in reality prevents the optimalist from being overwhelmed in the face of failure.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4182&quot; id=&quot;cite_ref-Pursuit_65-1&quot;&gt;&lt;a data-dcnode-id=&quot;4183&quot; href=&quot;#cite_note-Pursuit-65&quot;&gt;&lt;span data-dcnode-id=&quot;4184&quot; instrument_node=&quot;&quot;&gt;[65]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4181&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4170&quot;&gt;&lt;span data-dcnode-id=&quot;4179&quot; instrument_node=&quot;&quot;&gt;Optimalists accept failures and also learn from them, which encourages further pursuit of achievement.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4176&quot; id=&quot;cite_ref-horne1_67-1&quot;&gt;&lt;a data-dcnode-id=&quot;4177&quot; href=&quot;#cite_note-horne1-67&quot;&gt;&lt;span data-dcnode-id=&quot;4178&quot; instrument_node=&quot;&quot;&gt;[67]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4175&quot; instrument_node=&quot;&quot;&gt; Dr. Tal Ben-Shahar believes that Optimalists and Perfectionists show distinct different motives. Optimalists tend to have more intrinsic, inward desires, with a motivation to learn, while perfectionists are highly motivated by a need to consistently prove themselves worthy.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4172&quot; id=&quot;cite_ref-Pursuit_65-2&quot;&gt;&lt;a data-dcnode-id=&quot;4173&quot; href=&quot;#cite_note-Pursuit-65&quot;&gt;&lt;span data-dcnode-id=&quot;4174&quot; instrument_node=&quot;&quot;&gt;[65]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4171&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4156&quot;&gt;&lt;span data-dcnode-id=&quot;4169&quot; instrument_node=&quot;&quot;&gt;Optimalism has also been classified into two: product optimalism and process optimalism. The former is described as an outlook that looks to provide the realization of the best possible result while the latter looks for a maximization of the chances of achieving the best possible result.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4166&quot; id=&quot;cite_ref-69&quot;&gt;&lt;a data-dcnode-id=&quot;4167&quot; href=&quot;#cite_note-69&quot;&gt;&lt;span data-dcnode-id=&quot;4168&quot; instrument_node=&quot;&quot;&gt;[69]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4165&quot; instrument_node=&quot;&quot;&gt; Others classify it either as full-scale, one that implies determinism, or weak determinism, which claims that we have the best laws and initial conditions.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4162&quot; id=&quot;cite_ref-70&quot;&gt;&lt;a data-dcnode-id=&quot;4163&quot; href=&quot;#cite_note-70&quot;&gt;&lt;span data-dcnode-id=&quot;4164&quot; instrument_node=&quot;&quot;&gt;[70]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4161&quot; instrument_node=&quot;&quot;&gt; Some sources also distinguish the concept from optimism since it does not focus on how things are going well but on how things are going as well as possible.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4158&quot; id=&quot;cite_ref-71&quot;&gt;&lt;a data-dcnode-id=&quot;4159&quot; href=&quot;#cite_note-71&quot;&gt;&lt;span data-dcnode-id=&quot;4160&quot; instrument_node=&quot;&quot;&gt;[71]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4157&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4155&quot; instrument_node=&quot;&quot;&gt;
