trument_node=&quot;&quot;&gt;4.2&lt;/span&gt;&lt;span data-dcnode-id=&quot;7887&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7885&quot; instrument_node=&quot;&quot;&gt;Pessimism and health-defeating behaviors&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;7882&quot;&gt;&lt;span data-dcnode-id=&quot;7883&quot; instrument_node=&quot;&quot;&gt;We have characterized optimists as being persistent in trying to reach goals and pessimists as less persistent and more likely to give up. There is, in fact, evidence of giving-up tendencies among pessimists. Some of these giving-up tendencies have adverse consequences. For example, giving up may underlie excessive alcohol use, which is often seen as an escape from problems. Pessimists are more vulnerable than optimists to such maladaptive behavior.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7871&quot;&gt;&lt;span data-dcnode-id=&quot;7881&quot; instrument_node=&quot;&quot;&gt;One study of women with a family history of alcoholism found that pessimists in that group were more likely than optimists to report drinking problems (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7879&quot; href=&quot;#bib61&quot; name=&quot;bbib61&quot;&gt;&lt;span data-dcnode-id=&quot;7880&quot; instrument_node=&quot;&quot;&gt;Ohannessian, Hesselbrock, Tennen, &amp;amp; Affleck, 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7878&quot; instrument_node=&quot;&quot;&gt;). In another study, people who had been treated for alcohol abuse were followed as they entered an aftercare program. Pessimists were more likely to drop out and return to drinking than optimists (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7876&quot; href=&quot;#bib102&quot; name=&quot;bbib102&quot;&gt;&lt;span data-dcnode-id=&quot;7877&quot; instrument_node=&quot;&quot;&gt;Strack, Carver, &amp;amp; Blaney, 1987&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7875&quot; instrument_node=&quot;&quot;&gt;). Yet another study (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7873&quot; href=&quot;#bib62&quot; name=&quot;bbib62&quot;&gt;&lt;span data-dcnode-id=&quot;7874&quot; instrument_node=&quot;&quot;&gt;Park, Moore, Turner, &amp;amp; Adler, 1997&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7872&quot; instrument_node=&quot;&quot;&gt;) found that, among pregnant women, optimists were less likely to engage in substance abuse during the course of their pregnancies.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7866&quot;&gt;&lt;span data-dcnode-id=&quot;7870&quot; instrument_node=&quot;&quot;&gt;A more recent study examined a different indicator of giving up: the disruption of normal social activities. In this study, breast cancer patients reported illness-related disruption of social activities after treatment (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7868&quot; href=&quot;#bib19&quot; name=&quot;bbib19&quot;&gt;&lt;span data-dcnode-id=&quot;7869&quot; instrument_node=&quot;&quot;&gt;Carver, Lehman, &amp;amp; Antoni, 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7867&quot; instrument_node=&quot;&quot;&gt;). At each assessment, pessimism predicted more disruption, along with emotional distress and fatigue. When confronted with a health threat, pessimism led to a withdrawal from the social activities that are important to a normal life.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7861&quot;&gt;&lt;span data-dcnode-id=&quot;7865&quot; instrument_node=&quot;&quot;&gt;Giving up can be reflected in many ways. Alcohol dulls awareness of problems. Sometimes, though, giving up is more complete. Sometimes people give up not just on specific goals, but on their lives, by suicide. It is often assumed that depression is the best indicator of suicide risk. But at least one study found that pessimism was actually a stronger predictor of this act, the ultimate disengagement from life (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7863&quot; href=&quot;#bib13&quot; name=&quot;bbib13&quot;&gt;&lt;span data-dcnode-id=&quot;7864&quot; instrument_node=&quot;&quot;&gt;Beck, Steer, Kovacs, &amp;amp; Garrison, 1985&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7862&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7859&quot;&gt;&lt;span data-dcnode-id=&quot;7860&quot; instrument_node=&quot;&quot;&gt;In sum, a sizeable body of evidence indicates that pessimism can lead people into self-defeating patterns. The result can be less persistence, more avoidance coping, health-damaging behavior, and potentially even an impulse to escape from life altogether. Without confidence about the future, there may be nothing to sustain life.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7773&quot; id=&quot;aep-section-id22&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7851&quot;&gt;&lt;span data-dcnode-id=&quot;7856&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;span data-dcnode-id=&quot;7854&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7852&quot; instrument_node=&quot;&quot;&gt;Optimism and physical health&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;7846&quot;&gt;&lt;span data-dcnode-id=&quot;7850&quot; instrument_node=&quot;&quot;&gt;The preceding sections on subjective well-being and coping included frequent mention of medical problems. As is implied by that, much of the research on optimism has been conducted in the domain of health psychology. Some of that research has gone on to examine optimism and physical well-being. Although this article is primarily about psychological health, there are also reasons to consider the relevance of this trait for physical health. The general line of thinking underlying this research is that optimists may be less reactive than pessimists to the stresses of life; the lower physiological stress responses may (over many years) result in less physical wear and tear on the body; the end result may be better physical health and even greater longevity. This section describes a few examples of this type of studies (for broader treatment and meta-analysis see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7848&quot; href=&quot;#bib69&quot; name=&quot;bbib69&quot;&gt;&lt;span data-dcnode-id=&quot;7849&quot; instrument_node=&quot;&quot;&gt;Rasmussen, Scheier, &amp;amp; Greenhouse, 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7847&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7841&quot;&gt;&lt;span data-dcnode-id=&quot;7845&quot; instrument_node=&quot;&quot;&gt;Carotid intima thickness is an index of atherosclerosis in the carotid artery, a physical marker of the development of heart disease. In one study bearing on physical well-being, intima thickness was measured among middle-aged women at a baseline assessment and at three-year follow-up (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7843&quot; href=&quot;#bib60&quot; name=&quot;bbib60&quot;&gt;&lt;span data-dcnode-id=&quot;7844&quot; instrument_node=&quot;&quot;&gt;Matthews et al., 2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7842&quot; instrument_node=&quot;&quot;&gt;). Greater pessimism at the initial assessment predicted increases in intima thickness at follow-up. Optimists experienced almost no increase over the three-year period.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7833&quot;&gt;&lt;span data-dcnode-id=&quot;7840&quot; instrument_node=&quot;&quot;&gt;Another project concerning cardiovascular health examined patterns of rehospitalization after coronary artery bypass surgery (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7838&quot; href=&quot;#bib83&quot; name=&quot;bbib83&quot;&gt;&lt;span data-dcnode-id=&quot;7839&quot; instrument_node=&quot;&quot;&gt;Scheier et al., 1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7837&quot; instrument_node=&quot;&quot;&gt;). The need for rehospitalization is quite common in this population. In this study, however, optimism predicted significantly less likelihood of rehospitalization and a longer time before it occurred. Interestingly, this study also found that the effects of optimism were independent of self-esteem, depression, and neuroticism, suggesting that it is more than the association of optimism with these variables that is producing the effect. This same conclusion is echoed in the recent meta-analysis conducted by &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7835&quot; href=&quot;#bib69&quot; name=&quot;bbib69&quot;&gt;&lt;span data-dcnode-id=&quot;7836&quot; instrument_node=&quot;&quot;&gt;Rasmussen et al. (2009)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7834&quot; instrument_node=&quot;&quot;&gt;. In that meta-analysis, optimism was found to have a significant effect on health even in those studies that adjusted for neuroticism and other psychosocial factors.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7820&quot;&gt;&lt;span data-dcnode-id=&quot;7832&quot; instrument_node=&quot;&quot;&gt;Perhaps the most compelling study to date on optimism and cardiovascular disease grew out of the Women's Health Initiative (WHI). That was a large scale project designed to study changes in and predictors of quality of life, chronic disease, morbidity and mortality among women across America. Using WHI participants, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7830&quot; href=&quot;#bib108&quot; name=&quot;bbib108&quot;&gt;&lt;span data-dcnode-id=&quot;7831&quot; instrument_node=&quot;&quot;&gt;Tindale et al. (2009)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7829&quot; instrument_node=&quot;&quot;&gt; studied over 95,000 women across an 8&lt;/span&gt;&lt;span data-dcnode-id=&quot;7827&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7825&quot; instrument_node=&quot;&quot;&gt;year period. All of the women were free of cancer and cardiovascular disease at study entry. The results were clear and striking. Optimists were less likely then pessimists to develop coronary heart disease (CHD), were less likely to die from CHD-related causes, and had lower total mortality due to all causes, across the 8&lt;/span&gt;&lt;span data-dcnode-id=&quot;7823&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7821&quot; instrument_node=&quot;&quot;&gt;years of study. The advantage due to optimism ranged from 9% for incident cases of CHD to 30% for CHD-related mortality.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7797&quot;&gt;&lt;span data-dcnode-id=&quot;7819&quot; instrument_node=&quot;&quot;&gt;Individual differences in healing and immunity have also been examined. In one study, men receiving a biopsy were followed throughout the healing process (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7817&quot; href=&quot;#bib31&quot; name=&quot;bbib31&quot;&gt;&lt;span data-dcnode-id=&quot;7818&quot; instrument_node=&quot;&quot;&gt;Ebrecht et al., 2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7816&quot; instrument_node=&quot;&quot;&gt;). The sample was split into “slow healing” and “fast healing” groups. Slow healers were significantly lower in optimism than fast healers. In another study, older adults received an influenza vaccine; optimism predicted a better immune response two weeks later (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7814&quot; href=&quot;#bib52&quot; name=&quot;bbib52&quot;&gt;&lt;span data-dcnode-id=&quot;7815&quot; instrument_node=&quot;&quot;&gt;Kohut, Cooper, Nickolaus, Russell, &amp;amp; Cunnick, 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7813&quot; instrument_node=&quot;&quot;&gt;; for broader treatment of optimism and immunity, see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7811&quot; href=&quot;#bib104&quot; name=&quot;bbib104&quot;&gt;&lt;span data-dcnode-id=&quot;7812&quot; instrument_node=&quot;&quot;&gt;Szondy, 2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7810&quot; instrument_node=&quot;&quot;&gt;). Other research has found, however, that under very high challenge, optimism related to lower, rather than higher, immune responses (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7808&quot; href=&quot;#bib87&quot; name=&quot;bbib87&quot;&gt;&lt;span data-dcnode-id=&quot;7809&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7807&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7805&quot; href=&quot;#bib89&quot; name=&quot;bbib89&quot;&gt;&lt;span data-dcnode-id=&quot;7806&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2006b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7804&quot; instrument_node=&quot;&quot;&gt;). &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7802&quot; href=&quot;#bib87&quot; name=&quot;bbib87&quot;&gt;&lt;span data-dcnode-id=&quot;7803&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7801&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7799&quot; href=&quot;#bib89&quot; name=&quot;bbib89&quot;&gt;&lt;span data-dcnode-id=&quot;7800&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2006b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7798&quot; instrument_node=&quot;&quot;&gt; suggested that the reduction under high challenge may reflect greater behavioral engagement with the challenge, which can suppress immune responses so as to conserve energy.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7786&quot;&gt;&lt;span data-dcnode-id=&quot;7796&quot; instrument_node=&quot;&quot;&gt;The physiological stress responses and physical health outcomes that relate to optimism are important in and of themselves. However, they also suggest additional pathways by which optimism could influence mental health. For example, neurophysiological substrates of stress such as norepinephrine and corticotrophin releasing hormone have been implicated in anxiety disorders (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7794&quot; href=&quot;#bib15&quot; name=&quot;bbib15&quot;&gt;&lt;span data-dcnode-id=&quot;7795&quot; instrument_node=&quot;&quot;&gt;Brunello et al., 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7793&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7791&quot; href=&quot;#bib30&quot; name=&quot;bbib30&quot;&gt;&lt;span data-dcnode-id=&quot;7792&quot; instrument_node=&quot;&quot;&gt;Dunn &amp;amp; Berridge, 1990&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7790&quot; instrument_node=&quot;&quot;&gt;). As another example, myocardial infarction greatly increases the risk for major depressive disorder (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7788&quot; href=&quot;#bib53&quot; name=&quot;bbib53&quot;&gt;&lt;span data-dcnode-id=&quot;7789&quot; instrument_node=&quot;&quot;&gt;Lesperance, Frasure-Smith, &amp;amp; Talajic, 1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7787&quot; instrument_node=&quot;&quot;&gt;). Thus, differences in physiological reactivity to stress may themselves result in differences in vulnerability to psychological problems.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7774&quot;&gt;&lt;span data-dcnode-id=&quot;7785&quot; instrument_node=&quot;&quot;&gt;To sum up, the available research suggests that optimism is relevant to biological outcomes. One study even found that optimism predicts longer life. Among 900 elderly Dutch persons, those reporting a high level of optimism at baseline were less likely to die over the next 10&lt;/span&gt;&lt;span data-dcnode-id=&quot;7783&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7781&quot; instrument_node=&quot;&quot;&gt;years (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7779&quot; href=&quot;#bib38&quot; name=&quot;bbib38&quot;&gt;&lt;span data-dcnode-id=&quot;7780&quot; instrument_node=&quot;&quot;&gt;Giltay, Geleijnse, Zitman, Hoekstra, &amp;amp; Schouten, 2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7778&quot; instrument_node=&quot;&quot;&gt;). The evidence on biological outcomes is less consistent than it is for self-reports concerning health (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7776&quot; href=&quot;#bib69&quot; name=&quot;bbib69&quot;&gt;&lt;span data-dcnode-id=&quot;7777&quot; instrument_node=&quot;&quot;&gt;Rasmussen et al., 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7775&quot; instrument_node=&quot;&quot;&gt;), but relations between optimism and physical well-being clearly deserve further study.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7636&quot; id=&quot;aep-section-id23&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7767&quot;&gt;&lt;span data-dcnode-id=&quot;7772&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;span data-dcnode-id=&quot;7770&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7768&quot; instrument_node=&quot;&quot;&gt;Optimism and resources&lt;/span&gt;&lt;/h2&gt;&lt;section data-dcnode-id=&quot;7725&quot; id=&quot;aep-section-id24&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7761&quot;&gt;&lt;span data-dcnode-id=&quot;7766&quot; instrument_node=&quot;&quot;&gt;6.1&lt;/span&gt;&lt;span data-dcnode-id=&quot;7764&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7762&quot; instrument_node=&quot;&quot;&gt;Optimism and socioeconomic status&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;7759&quot;&gt;&lt;span data-dcnode-id=&quot;7760&quot; instrument_node=&quot;&quot;&gt;Health psychology and the domain of subjective well-being have probably been the main arenas for studying effects of optimism and pessimism. However, not all research on this trait has had this focus. Optimists' tendency toward persistent goal pursuit, their active coping with stressors, and even their better health, can make it possible for them to translate short-term tendencies toward approach (rather than withdrawal) into long-term resources. Although there have been few studies of the associations of optimism with socioeconomic resources, the available evidence points toward correlations with two indicators of socioeconomic status: education and income.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7747&quot;&gt;&lt;span data-dcnode-id=&quot;7758&quot; instrument_node=&quot;&quot;&gt;In a large sample of first-year undergraduates, dispositional optimism before starting school was associated with a significantly higher probability of returning the second year (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7756&quot; href=&quot;#bib98&quot; name=&quot;bbib98&quot;&gt;&lt;span data-dcnode-id=&quot;7757&quot; instrument_node=&quot;&quot;&gt;Solberg Nes, Evans, &amp;amp; Segerstrom, 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7755&quot; instrument_node=&quot;&quot;&gt;). The dropout rate for pessimists (about 30%) was roughly twice that for the very optimistic (about 15%). In a smaller sample of law students, dispositional optimism before starting school predicted higher income 10&lt;/span&gt;&lt;span data-dcnode-id=&quot;7753&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7751&quot; instrument_node=&quot;&quot;&gt;years later. Each mean item increment in optimism at the start of law school (e.g., from a mean item score of 3 to 4) was associated with a $32,667 increment in annual income (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7749&quot; href=&quot;#bib90&quot; name=&quot;bbib90&quot;&gt;&lt;span data-dcnode-id=&quot;7750&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7748&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7726&quot;&gt;&lt;span data-dcnode-id=&quot;7746&quot; instrument_node=&quot;&quot;&gt;It is also the case that socioeconomic resources are linked to the development of optimism over time. In a study alluded to earlier, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7744&quot; href=&quot;#bib43&quot; name=&quot;bbib43&quot;&gt;&lt;span data-dcnode-id=&quot;7745&quot; instrument_node=&quot;&quot;&gt;Heinonen et al. (2006)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7743&quot; instrument_node=&quot;&quot;&gt; assessed the parental socioeconomic status (an aggregate of education level, occupational class, and employment status) of a group of children who were either 3 or 6&lt;/span&gt;&lt;span data-dcnode-id=&quot;7741&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7739&quot; instrument_node=&quot;&quot;&gt;years of age in 1980. These children were again assessed 21&lt;/span&gt;&lt;span data-dcnode-id=&quot;7737&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7735&quot; instrument_node=&quot;&quot;&gt;years later when they were 24 and 27&lt;/span&gt;&lt;span data-dcnode-id=&quot;7733&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7731&quot; instrument_node=&quot;&quot;&gt;years old, respectively. There was a significant positive association between parental indicators of socioeconomic status (SES) in 1980 and adult optimism 21&lt;/span&gt;&lt;span data-dcnode-id=&quot;7729&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7727&quot; instrument_node=&quot;&quot;&gt;years later. The effect of childhood SES on adult level of opimism–pessimism remained significant even when adult SES was controlled. Thus, a poor childhood socioeconomic circumstance breeds pessimism later in life.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7637&quot; id=&quot;aep-section-id25&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7719&quot;&gt;&lt;span data-dcnode-id=&quot;7724&quot; instrument_node=&quot;&quot;&gt;6.2&lt;/span&gt;&lt;span data-dcnode-id=&quot;7722&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7720&quot; instrument_node=&quot;&quot;&gt;Optimism and social resources&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;7711&quot;&gt;&lt;span data-dcnode-id=&quot;7718&quot; instrument_node=&quot;&quot;&gt;Optimists are also likely to benefit in the social domain. For example, a study by &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7716&quot; href=&quot;#bib14&quot; name=&quot;bbib14&quot;&gt;&lt;span data-dcnode-id=&quot;7717&quot; instrument_node=&quot;&quot;&gt;Brissette et al. (2002)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7715&quot; instrument_node=&quot;&quot;&gt; described earlier examined how students coped with the challenge of starting college. Beyond subjective well-being, this study also made the point that optimists experienced greater increases in their social networks across the first semester of school than did pessimists. Other research has also found associations between expecting positive outcomes in the future and having broader social networks (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7713&quot; href=&quot;#bib58&quot; name=&quot;bbib58&quot;&gt;&lt;span data-dcnode-id=&quot;7714&quot; instrument_node=&quot;&quot;&gt;MacLeod &amp;amp; Conway, 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7712&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7700&quot;&gt;&lt;span data-dcnode-id=&quot;7710&quot; instrument_node=&quot;&quot;&gt;We noted earlier that pessimistic women under treatment for breast cancer were more likely to report withdrawing from their social activities because of their treatment than were more optimistic women (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7708&quot; href=&quot;#bib19&quot; name=&quot;bbib19&quot;&gt;&lt;span data-dcnode-id=&quot;7709&quot; instrument_node=&quot;&quot;&gt;Carver et al., 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7707&quot; instrument_node=&quot;&quot;&gt;). This is a real problem, because social networks are very important to well-being (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7705&quot; href=&quot;#bib105&quot; name=&quot;bbib105&quot;&gt;&lt;span data-dcnode-id=&quot;7706&quot; instrument_node=&quot;&quot;&gt;Taylor, 2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7704&quot; instrument_node=&quot;&quot;&gt;). Interestingly, there is evidence that social networks and optimism may have mutually reinforcing effects: &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7702&quot; href=&quot;#bib90&quot; name=&quot;bbib90&quot;&gt;&lt;span data-dcnode-id=&quot;7703&quot; instrument_node=&quot;&quot;&gt;Segerstrom (2007)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7701&quot; instrument_node=&quot;&quot;&gt; found that developing larger social networks over a 10-year period was related to increases in optimism over that same period.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7682&quot;&gt;&lt;span data-dcnode-id=&quot;7699&quot; instrument_node=&quot;&quot;&gt;A number of people have by now come to characterize optimism as a positive resource for relationships, both for general social networks and also for close relationships. Why do optimists have better social connections than pessimists? One reason is that optimists are easier to like than pessimists. Studies have confirmed that people are more accepting of someone who expresses positive expectations for the future and more rejecting of someone who expresses negative expectations (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7697&quot; href=&quot;#bib18&quot; name=&quot;bbib18&quot;&gt;&lt;span data-dcnode-id=&quot;7698&quot; instrument_node=&quot;&quot;&gt;Carver et al., 1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7696&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7694&quot; href=&quot;#bib44&quot; name=&quot;bbib44&quot;&gt;&lt;span data-dcnode-id=&quot;7695&quot; instrument_node=&quot;&quot;&gt;Helweg-Larsen et al., 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7693&quot; instrument_node=&quot;&quot;&gt;). Another study found that actual social interactions with optimistic people are more positive than those with less optimistic people (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7691&quot; href=&quot;#bib68&quot; name=&quot;bbib68&quot;&gt;&lt;span data-dcnode-id=&quot;7692&quot; instrument_node=&quot;&quot;&gt;Räikkönen, Matthews, Flory, Owens, &amp;amp; Gump, 1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7690&quot; instrument_node=&quot;&quot;&gt;). In yet another study, pessimism among men who were about to undergo coronary artery bypass surgery predicted reports of higher caregiver burden from their wives 18&lt;/span&gt;&lt;span data-dcnode-id=&quot;7688&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7686&quot; instrument_node=&quot;&quot;&gt;months later (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7684&quot; href=&quot;#bib76&quot; name=&quot;bbib76&quot;&gt;&lt;span data-dcnode-id=&quot;7685&quot; instrument_node=&quot;&quot;&gt;Ruiz, Matthews, Scheier, &amp;amp; Schulz, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7683&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7668&quot;&gt;&lt;span data-dcnode-id=&quot;7681&quot; instrument_node=&quot;&quot;&gt;Another contributor to better social relations may derive from the fact that optimists tend to see things in the best light, perhaps including things pertaining to their relationships. This might make the optimist more satisfied in the relationship even if things are not perfect. Indeed, a recent study of close relationships found that optimists had higher relationship satisfaction than pessimists, and that this difference was mediated by perceptions of the relative supportiveness of their partners (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7679&quot; href=&quot;#bib100&quot; name=&quot;bbib100&quot;&gt;&lt;span data-dcnode-id=&quot;7680&quot; instrument_node=&quot;&quot;&gt;Srivastava, McGonigal, Richards, Butler, &amp;amp; Gross, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7678&quot; instrument_node=&quot;&quot;&gt;). Of course, it may be that partners of optimists really &lt;/span&gt;&lt;em data-dcnode-id=&quot;7676&quot;&gt;&lt;span data-dcnode-id=&quot;7677&quot; instrument_node=&quot;&quot;&gt;are&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;7675&quot; instrument_node=&quot;&quot;&gt; more ready to be supportive than partners of pessimists, because optimists are easier to like (and thus support). This study controlled for that possibility, however. Even with that control, optimists perceived more supportiveness in their partners than pessimists. Evidence that optimists perceive greater social support than pessimists also comes from other sources (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7673&quot; href=&quot;#bib1&quot; name=&quot;bbib1&quot;&gt;&lt;span data-dcnode-id=&quot;7674&quot; instrument_node=&quot;&quot;&gt;Abend &amp;amp; Williamson, 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7672&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7670&quot; href=&quot;#bib109&quot; name=&quot;bbib109&quot;&gt;&lt;span data-dcnode-id=&quot;7671&quot; instrument_node=&quot;&quot;&gt;Trunzo &amp;amp; Pinto, 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7669&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7660&quot;&gt;&lt;span data-dcnode-id=&quot;7667&quot; instrument_node=&quot;&quot;&gt;Yet another reason why optimism represents a resource for relationships may be that optimists work harder (or work more effectively) at their relationships. This would be consistent with their generally greater engagement with high priority tasks (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7665&quot; href=&quot;#bib36&quot; name=&quot;bbib36&quot;&gt;&lt;span data-dcnode-id=&quot;7666&quot; instrument_node=&quot;&quot;&gt;Geers, Wellman, &amp;amp; Lassiter, 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7664&quot; instrument_node=&quot;&quot;&gt;). In a study bearing on this question (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7662&quot; href=&quot;#bib100&quot; name=&quot;bbib100&quot;&gt;&lt;span data-dcnode-id=&quot;7663&quot; instrument_node=&quot;&quot;&gt;Srivastava et al., 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7661&quot; instrument_node=&quot;&quot;&gt;), relationship partners first had a conversation in the laboratory about the area of their greatest disagreement. Then the couples rated their own behavior and their partner's behavior during that interaction. From this was created an index of positive engagement (being a good listener, not criticizing, trying to understand the other's point of view). A week later, the couples were asked how well the conflict had been resolved by that time.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7658&quot;&gt;&lt;span data-dcnode-id=&quot;7659&quot; instrument_node=&quot;&quot;&gt;The following associations emerged: Optimism predicted perceptions of greater supportiveness from the partner, which predicted more positive engagement in the conflict discussion. More positive engagement in the discussion predicted better conflict resolution a week later. These effects occurred in the individual's own reports, and also in the reports of the partners. Finally, the beneficial effect of optimism on conflict resolution was partially mediated by perceptions of supportiveness and by positive engagement.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7653&quot;&gt;&lt;span data-dcnode-id=&quot;7657&quot; instrument_node=&quot;&quot;&gt;One year later the couples were contacted and were asked about the status of the relationship. About a third of the couples had broken up by that time. Men's optimism (but not women's optimism) was a significant predictor of the relationship's survival, and again there was evidence of partial mediation by perceptions of partner supportiveness. This was the only part of the study with a gender difference. &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7655&quot; href=&quot;#bib100&quot; name=&quot;bbib100&quot;&gt;&lt;span data-dcnode-id=&quot;7656&quot; instrument_node=&quot;&quot;&gt;Srivastava et al. (2006)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7654&quot; instrument_node=&quot;&quot;&gt; noted that men's social support tends to be more bound up in their partners, whereas women have support from multiple sources, and suggested that this may have made the difference in partner supportiveness more salient and more impactful for the men.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7648&quot;&gt;&lt;span data-dcnode-id=&quot;7652&quot; instrument_node=&quot;&quot;&gt;Another recent project examined the idea that optimists would have an orientation to relationships that fosters effective problem solving, just as optimists engage in problem-focused coping when under stress. This project (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7650&quot; href=&quot;#bib10&quot; name=&quot;bbib10&quot;&gt;&lt;span data-dcnode-id=&quot;7651&quot; instrument_node=&quot;&quot;&gt;Assad, Donnellan, &amp;amp; Conger, 2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7649&quot; instrument_node=&quot;&quot;&gt;) studied married couples across a 2-year period. Participants completed measures of cooperative problem solving, both for themselves and for their spouses. They were also videotaped while discussing diverse aspects of their relationship. Raters coded the tapes for relationship quality and negative interactions. Optimism was associated with better relationship quality, with less negative interactions, and with higher levels of cooperative problem solving.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7646&quot;&gt;&lt;span data-dcnode-id=&quot;7647&quot; instrument_node=&quot;&quot;&gt;This study also examined prediction of relationship status two years later. In this case, women's optimism (but not men's) was a significant predictor of relationship survival. Among those who were still married, optimism at time 1 also predicted relationship quality, even when controlling for earlier relationship quality.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7638&quot;&gt;&lt;span data-dcnode-id=&quot;7645&quot; instrument_node=&quot;&quot;&gt;In sum, although there are relatively few studies of the role of optimism in relationships, what evidence does exist is consistent in indicating that pessimists have a harder road than do optimists. Given the importance of close relationships (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7643&quot; href=&quot;#bib51&quot; name=&quot;bbib51&quot;&gt;&lt;span data-dcnode-id=&quot;7644&quot; instrument_node=&quot;&quot;&gt;Kawachi &amp;amp; Berkman, 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7642&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7640&quot; href=&quot;#bib110&quot; name=&quot;bbib110&quot;&gt;&lt;span data-dcnode-id=&quot;7641&quot; instrument_node=&quot;&quot;&gt;Uchino, 2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7639&quot; instrument_node=&quot;&quot;&gt;), this represents yet one more area in which the optimist appears to have the advantage.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7575&quot; id=&quot;aep-section-id26&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7630&quot;&gt;&lt;span data-dcnode-id=&quot;7635&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;span data-dcnode-id=&quot;7633&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7631&quot; instrument_node=&quot;&quot;&gt;Does optimism have any drawbacks?&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;7628&quot;&gt;&lt;span data-dcnode-id=&quot;7629&quot; instrument_node=&quot;&quot;&gt;The evidence reviewed in the preceding sections suggests that optimists have somehow found the keys to a rich and fulfilling life. Compared to people who are more pessimistic, they experience less distress when they encounter adversity. They cope with stressful situations by remaining engaged in the goals and activities that the stressor is threatening. They engage in problem-focused coping when there is something to be done, and they display accommodative coping when the adversity simply has to be endured. Perhaps as a result of these differences in coping, they also have better health-related outcomes and better social connections, both broadly and in intimate relationships. These properties sound, to the Western mind at least, quite adaptive. Optimists seem to have the kind of life we all want.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7623&quot;&gt;&lt;span data-dcnode-id=&quot;7627&quot; instrument_node=&quot;&quot;&gt;Some have asked, however, whether the qualities that follow from optimism can potentially lead to problems in certain kinds of contexts. Consider problem gambling, which can cost large amounts of money and create additional problems in work and relationships. &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7625&quot; href=&quot;#bib37&quot; name=&quot;bbib37&quot;&gt;&lt;span data-dcnode-id=&quot;7626&quot; instrument_node=&quot;&quot;&gt;Gibson and Sanbonmatsu (2004)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7624&quot; instrument_node=&quot;&quot;&gt; reasoned that gambling is a context in which positive expectancies and persistence might be counterproductive. Indeed, they found a variety of worrisome tendencies among optimists. Optimists had more positive expectations for gambling than did pessimists, and they were less likely to reduce their betting after poor outcomes. Participants in that research were not people with actual gambling problems. But this pattern suggests the possibility that optimists may be more likely to develop such problems than pessimists.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7618&quot;&gt;&lt;span data-dcnode-id=&quot;7622&quot; instrument_node=&quot;&quot;&gt;Another set of studies asks whether the persistence of optimists can create problems because they fail to recognize what they cannot accomplish. More simply, perhaps optimists don't know when to quit. Certainly there are circumstances in which people have to recognize that their goals are lost, and that the adaptive course is to turn away from them (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7620&quot; href=&quot;#bib111&quot; name=&quot;bbib111&quot;&gt;&lt;span data-dcnode-id=&quot;7621&quot; instrument_node=&quot;&quot;&gt;Wrosch, Scheier, Carver, &amp;amp; Schulz, 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7619&quot; instrument_node=&quot;&quot;&gt;). Does the persistence of the optimist prevent that from occurring?&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7613&quot;&gt;&lt;span data-dcnode-id=&quot;7617&quot; instrument_node=&quot;&quot;&gt;One project on this question stemmed from the reasoning that greater persistence should lead to development of greater goal conflict, partly because commitment to many goals makes people spread their resources thinner (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7615&quot; href=&quot;#bib91&quot; name=&quot;bbib91&quot;&gt;&lt;span data-dcnode-id=&quot;7616&quot; instrument_node=&quot;&quot;&gt;Segerstrom &amp;amp; Solberg Nes, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7614&quot; instrument_node=&quot;&quot;&gt;). Two studies (one of them prospective) found that optimism did relate to greater goal conflict. However, this conflict had no adverse psychological consequences. Evidence from the second study suggested that optimistic people balanced expectancy, value, and cost of goal pursuit more effectively than did pessimistic people. Optimists were committed to more mutually demanding goals, but they were more efficient at managing the conflict. Perhaps years of practice had led to this greater efficiency.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7605&quot;&gt;&lt;span data-dcnode-id=&quot;7612&quot; instrument_node=&quot;&quot;&gt;Other research (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7610&quot; href=&quot;#bib8&quot; name=&quot;bbib8&quot;&gt;&lt;span data-dcnode-id=&quot;7611&quot; instrument_node=&quot;&quot;&gt;Aspinwall &amp;amp; Richter, 1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7609&quot; instrument_node=&quot;&quot;&gt;) examined people's willingness to disengage from tasks on which they were failing (the task actually was impossible). In one condition, there was no alternative task to turn to; in other conditions there was an alternative. When there was no alternative task to switch to, everyone persisted at the impossible task. When there was another task, optimism related to faster disengagement from the impossible task. In effect, optimists gave up on a task they could not master in order to turn to a similar task that they &lt;/span&gt;&lt;em data-dcnode-id=&quot;7607&quot;&gt;&lt;span data-dcnode-id=&quot;7608&quot; instrument_node=&quot;&quot;&gt;could&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;7606&quot; instrument_node=&quot;&quot;&gt; perhaps master. Indeed, if they had been led to think that the other task measured a somewhat different skill, they even outperformed the less optimistic people.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7597&quot;&gt;&lt;span data-dcnode-id=&quot;7604&quot; instrument_node=&quot;&quot;&gt;These results parallel associations between optimism and goal disengagement and goal re-engagement reported by others (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7602&quot; href=&quot;#bib70&quot; name=&quot;bbib70&quot;&gt;&lt;span data-dcnode-id=&quot;7603&quot; instrument_node=&quot;&quot;&gt;Rasmussen, Wrosch, Scheier, &amp;amp; Carver, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7601&quot; instrument_node=&quot;&quot;&gt;). That is, when goals are percieved to be unattainable, optimists do not find it easier to disengage from those goals than pessimists. They do report, however, that it is easier for them to find new goals to value and pursue (see also, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7599&quot; href=&quot;#bib29&quot; name=&quot;bbib29&quot;&gt;&lt;span data-dcnode-id=&quot;7600&quot; instrument_node=&quot;&quot;&gt;Duke, Leventhal, Brownlee, &amp;amp; Leventhal, 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7598&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7589&quot;&gt;&lt;span data-dcnode-id=&quot;7596&quot; instrument_node=&quot;&quot;&gt;Yet another set of studies deals with the question of whether optimism causes people to see only what they want to see, and ignore threats. The initial evidence suggested the opposite: that optimists pay closer attention to information about health threats than pessimists, provided the threat is serious and is relevant to them (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7594&quot; href=&quot;#bib7&quot; name=&quot;bbib7&quot;&gt;&lt;span data-dcnode-id=&quot;7595&quot; instrument_node=&quot;&quot;&gt;Aspinwall &amp;amp; Brunhart, 1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7593&quot; instrument_node=&quot;&quot;&gt;). More recently, however, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7591&quot; href=&quot;#bib57&quot; name=&quot;bbib57&quot;&gt;&lt;span data-dcnode-id=&quot;7592&quot; instrument_node=&quot;&quot;&gt;Luo and Isaacowitz (2007)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7590&quot; instrument_node=&quot;&quot;&gt; found the reverse effect.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7578&quot;&gt;&lt;span data-dcnode-id=&quot;7588&quot; instrument_node=&quot;&quot;&gt;Other studies have tied optimism to an attentional bias toward positive over negative stimuli (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7586&quot; href=&quot;#bib50&quot; name=&quot;bbib50&quot;&gt;&lt;span data-dcnode-id=&quot;7587&quot; instrument_node=&quot;&quot;&gt;Isaacowitz, 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7585&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7583&quot; href=&quot;#bib86&quot; name=&quot;bbib86&quot;&gt;&lt;span data-dcnode-id=&quot;7584&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7582&quot; instrument_node=&quot;&quot;&gt;). For example, in one study optimists looked at pictures of skin cancers more briefly than pessimists (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7580&quot; href=&quot;#bib50&quot; name=&quot;bbib50&quot;&gt;&lt;span data-dcnode-id=&quot;7581&quot; instrument_node=&quot;&quot;&gt;Isaacowitz, 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7579&quot; instrument_node=&quot;&quot;&gt;). Exactly how to interpret the aggregated information on this question is not clear. It may be, for example, that optimists prefer to attend to positively-valenced stimuli, but are quick to encode threat-related information when that information is perceived as being useful to them. Alternatively, optimists may know that they are already engaging in health protective behaviors, and so have less need to gather further information about the disease.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7576&quot;&gt;&lt;span data-dcnode-id=&quot;7577&quot; instrument_node=&quot;&quot;&gt;In sum, there do appear to be at least some cases in which optimism has drawbacks. It is not clear how circumscribed these cases are, or whether there are moderators that serve to limit the range of the problems. This doubtless will remain a topic for future work.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7552&quot; id=&quot;aep-section-id27&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7569&quot;&gt;&lt;span data-dcnode-id=&quot;7574&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;span data-dcnode-id=&quot;7572&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7570&quot; instrument_node=&quot;&quot;&gt;Cultural issues&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;7561&quot;&gt;&lt;span data-dcnode-id=&quot;7568&quot; instrument_node=&quot;&quot;&gt;The picture described in the preceding pages has been relative coherent and internally consistent. We should note explicitly, however, that much of what is known about optimism comes from studies of North Americans, mostly of European descent. An important question is the extent to which the knowledge derived from these studies generalizes to other groups. The information on that question is limited, but so far there have been both differences and similarities (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7566&quot; href=&quot;#bib23&quot; name=&quot;bbib23&quot;&gt;&lt;span data-dcnode-id=&quot;7567&quot; instrument_node=&quot;&quot;&gt;Chang, 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7565&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7563&quot; href=&quot;#bib24&quot; name=&quot;bbib24&quot;&gt;&lt;span data-dcnode-id=&quot;7564&quot; instrument_node=&quot;&quot;&gt;Chang et al., 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7562&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7553&quot;&gt;&lt;span data-dcnode-id=&quot;7560&quot; instrument_node=&quot;&quot;&gt;One difference is that Asians seem to distinguish more sharply than European Americans between affirmation of an optimistic view and rejection of a pessimistic view. There is no consistent pattern of overall mean differences in optimism between cultures, but there have been some differences in patterns. In one study, an Asian American sample endorsed pessimism more than a European American sample; in another study, South Koreans endorsed pessimism less than European Americans (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7558&quot; href=&quot;#bib25&quot; name=&quot;bbib25&quot;&gt;&lt;span data-dcnode-id=&quot;7559&quot; instrument_node=&quot;&quot;&gt;Chang, Sanna, &amp;amp; Yang, 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7557&quot; instrument_node=&quot;&quot;&gt;). Thus far, the evidence suggests that optimism and pessimism relate to quality of life outcomes in the same general way across cultures (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7555&quot; href=&quot;#bib23&quot; name=&quot;bbib23&quot;&gt;&lt;span data-dcnode-id=&quot;7556&quot; instrument_node=&quot;&quot;&gt;Chang, 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7554&quot; instrument_node=&quot;&quot;&gt;). This line of inquiry is likely to become more important over time.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7502&quot; id=&quot;aep-section-id28&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7546&quot;&gt;&lt;span data-dcnode-id=&quot;7551&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;span data-dcnode-id=&quot;7549&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7547&quot; instrument_node=&quot;&quot;&gt;Can pessimists become optimists?&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;7541&quot;&gt;&lt;span data-dcnode-id=&quot;7545&quot; instrument_node=&quot;&quot;&gt;Given the many ways in which optimists' lives seem to be better than those of pessimists, an important question is whether optimism can be acquired. People's levels of optimism appear to be trait-like, and thus relatively stable over time. Change certainly is possible (see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7543&quot; href=&quot;#bib88&quot; name=&quot;bbib88&quot;&gt;&lt;span data-dcnode-id=&quot;7544&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2006a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7542&quot; instrument_node=&quot;&quot;&gt;), but questions remain about how large a change can reasonably be expected from a person and how permanent such a change will be. There also remain questions about whether an optimistic view that is induced, either by intervention or by structured practice, has the same beneficial effects as derive from a naturally occurring optimistic view.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7533&quot;&gt;&lt;span data-dcnode-id=&quot;7540&quot; instrument_node=&quot;&quot;&gt;The most straightforward way to talk about turning a pessimist into an optimist is the set of techniques known collectively as cognitive–behavioral therapies. The logic behind these techniques is that people sometimes have patterns of negative cognitive distortions. Certain kinds of negative thoughts foster negative affect and lead people to stop trying to reach their goals. We would imagine the interior monologue of the pessimist is filled with such negativity. This class of therapies aims to make the cognitions more positive, thereby reducing distress and fostering renewed effort toward desired ends. Beliefs about one's future would certainly be an important subset of the cognitions to target for change in such therapies (for an example of this viewpoint applied to optimism see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7538&quot; href=&quot;#bib66&quot; name=&quot;bbib66&quot;&gt;&lt;span data-dcnode-id=&quot;7539&quot; instrument_node=&quot;&quot;&gt;Pretzer &amp;amp; Walsh, 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7537&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7535&quot; href=&quot;#bib88&quot; name=&quot;bbib88&quot;&gt;&lt;span data-dcnode-id=&quot;7536&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2006a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7534&quot; instrument_node=&quot;&quot;&gt;). From a cognitive–behavioral view, the key would appear to be to train oneself to think in the ways optimists think and act in the ways optimists act.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7526&quot;&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7531&quot; href=&quot;#bib73&quot; name=&quot;bbib73&quot;&gt;&lt;span data-dcnode-id=&quot;7532&quot; instrument_node=&quot;&quot;&gt;Riskind et al. (1996)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7530&quot; instrument_node=&quot;&quot;&gt; have suggested one more twist on that reasoning, which returns us to the question of whether absence of pessimism is the same as presence of optimism. Specifically, they noted that much of cognitive therapy is aimed at reducing negative thoughts (in effect, reducing pessimism), and that much less is aimed at actually enhancing positive thoughts (increasing optimism). A decrease in negative thinking does not necessarily translate into an increase in positive thinking. &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7528&quot; href=&quot;#bib73&quot; name=&quot;bbib73&quot;&gt;&lt;span data-dcnode-id=&quot;7529&quot; instrument_node=&quot;&quot;&gt;Riskind et al. (1996)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7527&quot; instrument_node=&quot;&quot;&gt; argued for the importance of actively developing a positive perspective. They suggested both the challenging of beliefs that are not only negative but actually “optimism-suppressing” (e.g., “I don't deserve good outcomes”) and actively engaging in rehearsing positive strategies and positive outcomes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7521&quot;&gt;&lt;span data-dcnode-id=&quot;7525&quot; instrument_node=&quot;&quot;&gt;Although some projects have aimed specifically at increasing optimism, interventions need not have that specific focus to have that effect. When people change negative schemas about themselves and the world, or when they learn to deal more effectively with stress, they may gravitate to a more optimistic view of life more generally. As an example, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7523&quot; href=&quot;#bib5&quot; name=&quot;bbib5&quot;&gt;&lt;span data-dcnode-id=&quot;7524&quot; instrument_node=&quot;&quot;&gt;Antoni et al. (2001)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7522&quot; instrument_node=&quot;&quot;&gt; tested an intervention among women who were newly diagnosed with non-metastatic breast cancer. The multi-modal intervention that they implemented was an effort to instill a range of stress-management techniques. Positive reframing was one element in the broader treatment, but a relatively minor element. Nonetheless, that intervention proved to increase women's optimism scores over time, compared to a control condition.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7513&quot;&gt;&lt;span data-dcnode-id=&quot;7520&quot; instrument_node=&quot;&quot;&gt;Two other studies were conducted by Seligman and colleagues to try to prevent depression among college students at risk for depression (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7518&quot; href=&quot;#bib92&quot; name=&quot;bbib92&quot;&gt;&lt;span data-dcnode-id=&quot;7519&quot; instrument_node=&quot;&quot;&gt;Seligman et al., 1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7517&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7515&quot; href=&quot;#bib93&quot; name=&quot;bbib93&quot;&gt;&lt;span data-dcnode-id=&quot;7516&quot; instrument_node=&quot;&quot;&gt;Seligman et al., 2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7514&quot; instrument_node=&quot;&quot;&gt;). These studies also employed multi-modal cognitive–behavioral procedures, aimed at teaching skills to decrease negative automatic thoughts and increase more constructive thoughts and behaviors. Both studies found evidence that the intervention reduced the incidence of episodes of moderate depression compared to a control condition, and that changes in pessimistic style mediated those changes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7511&quot;&gt;&lt;span data-dcnode-id=&quot;7512&quot; instrument_node=&quot;&quot;&gt;We have focused here on changes in generalized optimism, but it should also be apparent that cognitive–behavioral interventions often—perhaps even usually—target beliefs that are domain-specific rather than global. These domain-specific beliefs include domain-specific pessimism. As noted earlier in the article, confidence and doubt can exist at many levels of abstraction. Generally speaking, change away from domain-specific pessimism should also reverberate back into reduction of more generalized pessimism. Presumably that is why generalized optimism sometimes results from therapies that are not targeted toward change in that trait.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7503&quot;&gt;&lt;span data-dcnode-id=&quot;7510&quot; instrument_node=&quot;&quot;&gt;It is important to recognize, though, that it can be unwise to simply substitute an unquestioning optimism for an existing doubt, whether domain-specific or generalized. There are contexts in which pessimism may follow from demanding too much. That is, sometimes people demand perfection from themselves, hardly ever see perfection, and as a result develop doubts about their adequacy. What a person with this pattern needs is realistic goals, and practice in adopting alternative goals to replace those that cannot be attained (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7508&quot; href=&quot;#bib22&quot; name=&quot;bbib22&quot;&gt;&lt;span data-dcnode-id=&quot;7509&quot; instrument_node=&quot;&quot;&gt;Carver &amp;amp; Scheier, 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7507&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7505&quot; href=&quot;#bib111&quot; name=&quot;bbib111&quot;&gt;&lt;span data-dcnode-id=&quot;7506&quot; instrument_node=&quot;&quot;&gt;Wrosch et al., 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7504&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7489&quot; id=&quot;aep-section-id29&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7496&quot;&gt;&lt;span data-dcnode-id=&quot;7501&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;span data-dcnode-id=&quot;7499&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7497&quot; instrument_node=&quot;&quot;&gt;Concluding Comment and Future Directions&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;7494&quot;&gt;&lt;span data-dcnode-id=&quot;7495&quot; instrument_node=&quot;&quot;&gt;A large and growing literature indicates that people who dispositionally hold positive expectations for the future respond to difficulty and adversity in more adaptive ways than people who hold negative expectations. Furthermore, optimism is likely to confer benefits in both intrapersonal and interpersonal domains, even in the absence of stress. Expectancies influence how people approach both stressors and opportunities, and they influence the success with which people deal with them. There are some ways in which the focused efforts and persistence of the optimist can go awry; however, these cases are few in number compared to the benefits that optimism seems to confer.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7492&quot;&gt;&lt;span data-dcnode-id=&quot;7493&quot; instrument_node=&quot;&quot;&gt;Optimism has been linked to better emotional well-being, more effective coping strategies, and even to better outcomes in several areas of physical health. The advantages of optimism also seem to translate into the domains of interpersonal relationships: optimists are better liked than pessimists, they benefit from their natural tendency to see things in the best light, and they appear to engage more productive effort in the sorts of problem solving that keep relationships alive.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7490&quot;&gt;&lt;span data-dcnode-id=&quot;7491&quot; instrument_node=&quot;&quot;&gt;Given the accumulation of evidence, it is clear that optimism is an individual difference variable that plays a central role in human experience. From a personality psychologist's point of view, this is the reality of individual differences. From a clinical point of view, however, the evidence is a stimulus to learn what we can from optimists so that the mechanisms and processes that characterize their approach to the world can be taught to pessimists. To date, very little systematic work has explored interventions to assist pessimistic persons to deal more effectively with adversity in their lives. We know that the trait under discussion is relatively stable over time, and that there is a genetic component to the variations among people. Still, even if this quality is resistant to change, change has been documented in certain contexts. Attention needs to be devoted to what components that might be included in intervention efforts and to study the effectiveness of these interventions in concrete settings.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/div&gt;&lt;section data-dcnode-id=&quot;7456&quot; id=&quot;aep-acknowledgment-id30&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7486&quot;&gt;&lt;span data-dcnode-id=&quot;7487&quot; instrument_node=&quot;&quot;&gt;Acknowledgements&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;7457&quot;&gt;&lt;span data-dcnode-id=&quot;7485&quot; instrument_node=&quot;&quot;&gt;Preparation of this article was facilitated by support from &lt;/span&gt;&lt;span data-dcnode-id=&quot;7483&quot; id=&quot;GS1&quot;&gt;&lt;span data-dcnode-id=&quot;7484&quot; instrument_node=&quot;&quot;&gt;the National Cancer Institute&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7482&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;a data-dcnode-id=&quot;7480&quot; href=&quot;#GS1&quot;&gt;&lt;span data-dcnode-id=&quot;7481&quot; instrument_node=&quot;&quot;&gt;CA64710&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7479&quot; instrument_node=&quot;&quot;&gt;), the &lt;/span&gt;&lt;span data-dcnode-id=&quot;7477&quot; id=&quot;GS2&quot;&gt;&lt;span data-dcnode-id=&quot;7478&quot; instrument_node=&quot;&quot;&gt;National Science Foundation&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7476&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;a data-dcnode-id=&quot;7474&quot; href=&quot;#GS2&quot;&gt;&lt;span data-dcnode-id=&quot;7475&quot; instrument_node=&quot;&quot;&gt;BCS0544617&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7473&quot; instrument_node=&quot;&quot;&gt;), and the &lt;/span&gt;&lt;span data-dcnode-id=&quot;7471&quot; id=&quot;GS3&quot;&gt;&lt;span data-dcnode-id=&quot;7472&quot; instrument_node=&quot;&quot;&gt;National Heart, Lung, and Blood Institute&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7470&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;a data-dcnode-id=&quot;7468&quot; href=&quot;#GS3&quot;&gt;&lt;span data-dcnode-id=&quot;7469&quot; instrument_node=&quot;&quot;&gt;HL65111&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7467&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;7465&quot; href=&quot;#GS3&quot;&gt;&lt;span data-dcnode-id=&quot;7466&quot; instrument_node=&quot;&quot;&gt;HL65112&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7464&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;7462&quot; href=&quot;#GS3&quot;&gt;&lt;span data-dcnode-id=&quot;7463&quot; instrument_node=&quot;&quot;&gt;HL076852&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7461&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;7459&quot; href=&quot;#GS3&quot;&gt;&lt;span data-dcnode-id=&quot;7460&quot; instrument_node=&quot;&quot;&gt;HL076858&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7458&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/div&gt;&lt;div class=&quot;related-content-links u-hide-from-md&quot; data-dcnode-id=&quot;7448&quot;&gt;&lt;button class=&quot;button button-anchor&quot; data-dcnode-id=&quot;7452&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-text&quot; data-dcnode-id=&quot;7453&quot;&gt;&lt;span data-dcnode-id=&quot;7454&quot; instrument_node=&quot;&quot;&gt;Special issue articles&lt;/span&gt;&lt;/span&gt;&lt;/button&gt;&lt;button class=&quot;button button-anchor&quot; data-dcnode-id=&quot;7449&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-text&quot; data-dcnode-id=&quot;7450&quot;&gt;&lt;span data-dcnode-id=&quot;7451&quot; instrument_node=&quot;&quot;&gt;Recommended articles&lt;/span&gt;&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;Tail&quot; data-dcnode-id=&quot;7447&quot;&gt;&lt;/div&gt;&lt;section class=&quot;bibliography u-font-serif text-s&quot; data-dcnode-id=&quot;440&quot; id=&quot;aep-bibliography-id31&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7445&quot;&gt;&lt;span data-dcnode-id=&quot;7446&quot; instrument_node=&quot;&quot;&gt;References&lt;/span&gt;&lt;/h2&gt;&lt;section class=&quot;bibliography-sec&quot; data-dcnode-id=&quot;441&quot; id=&quot;aep-bibliography-sec-id32&quot;&gt;&lt;dl class=&quot;references&quot; data-dcnode-id=&quot;442&quot; id=&quot;reference-links-aep-bibliography-sec-id32&quot;&gt;&lt;dt class=&quot;label&quot; data-dcnode-id=&quot;7442&quot;&gt;&lt;a data-aa-button=&quot;sd:product:journal:article:location=references:type=anchor:name=citation-name&quot; data-dcnode-id=&quot;7443&quot; href=&quot;#bbib1&quot; id=&quot;ref-id-bib1&quot;&gt;&lt;span data-dcnode-id=&quot;7444&quot; instrument_node=&quot;&quot;&gt;Abend &amp;amp; Williamson, 2002&lt;/span&gt;&lt;/a&gt;&lt;/dt&gt;&lt;dd class=&quot;reference&quot; data-dcnode-id=&quot;7392&quot;&gt;&lt;div class=&quot;contribution&quot; data-dcnode-id=&quot;7425&quot;&gt;&lt;span data-dcnode-id=&quot;7441&quot; instrument_node=&quot;&quot;&gt;T.A.&lt;/span&gt;&lt;span data-dcnode-id=&quot;7439&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;7437&quot; instrument_node=&quot;&quot;&gt;Abend&lt;/span&gt;&lt;span data-dcnode-id=&quot;7435&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;span data-dcnode-id=&quot;7433&quot; instrument_node=&quot;&quot;&gt;G.M.&lt;/span&gt;&lt;span data-dcnode-id=&quot;7431&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;7429&quot; instrument_node=&quot;&quot;&gt;Williamson&lt;/span&gt;&lt;div data-dcnode-id=&quot;7426&quot;&gt;&lt;strong class=&quot;title&quot; data-dcnode-id=&quot;7427&quot;&gt;&lt;span data-dcnode-id=&quot;7428&quot; instrument_node=&quot;&quot;&gt;Feeling attractive in the wake of breast cancer: Optimism matters, and so do interpersonal relationships&lt;/span&gt;&lt;/strong&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;host&quot; data-dcnode-id=&quot;7405&quot;&gt;&lt;span data-dcnode-id=&quot;7424&quot; instrument_node=&quot;&quot;&gt;Personality and Social Psychology Bulletin&lt;/span&gt;&lt;span data-dcnode-id=&quot;7422&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;span data-dcnode-id=&quot;7420&quot; instrument_node=&quot;&quot;&gt;28&lt;/span&gt;&lt;span data-dcnode-id=&quot;7418&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt
