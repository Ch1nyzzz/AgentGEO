ection-cited-by&quot;&gt;&lt;section class=&quot;ListArticles preview&quot; data-dcnode-id=&quot;272&quot;&gt;&lt;div class=&quot;PageDivider&quot; data-dcnode-id=&quot;439&quot;&gt;&lt;/div&gt;&lt;header data-dcnode-id=&quot;436&quot; id=&quot;citing-articles-header&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-ver u-font-serif&quot; data-dcnode-id=&quot;437&quot;&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;Cited by (1133)&lt;/span&gt;&lt;/h2&gt;&lt;/header&gt;&lt;div aria-describedby=&quot;citing-articles-header&quot; data-dcnode-id=&quot;273&quot;&gt;&lt;div class=&quot;citing-articles u-margin-l-bottom&quot; data-dcnode-id=&quot;274&quot;&gt;&lt;ul data-dcnode-id=&quot;280&quot;&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;418&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;430&quot;&gt;&lt;a data-dcnode-id=&quot;433&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0883902622000349&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;434&quot; id=&quot;citing-articles-article0-title&quot;&gt;&lt;span data-dcnode-id=&quot;435&quot; instrument_node=&quot;&quot;&gt;Women's entrepreneurship and well-being at the base of the pyramid&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;431&quot;&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;2022, Journal of Business Venturing&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;424&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article0&quot; aria-describedby=&quot;citing-articles-article0-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;425&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;428&quot;&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;426&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;427&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;419&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;420&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;421&quot;&gt;&lt;p data-dcnode-id=&quot;422&quot; id=&quot;sp0035&quot;&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;Women's entrepreneurship at the base of the pyramid can offer a way out of poverty for families, foster the development of communities, and provide a route to modernizing countries. Yet, we know little about what entrepreneurship means for the well-being of these entrepreneurs. This study investigates the well-being of marginalized women entrepreneurs engaged in an entrepreneurship training and venture creation program. Based on a qualitative case study method, our findings show that despite successful venture creation, the women differed in their experiences of well-being, with some flourishing and others languishing. Specifically, we found that the languishing women entrepreneurs lacked family support and prior work experience outside the home, which was associated with abstract goals and unrealistic expectations of venture creation outcomes. In contrast, flourishing women entrepreneurs, benefitting from prior work experience and family support, tended to set concrete goals for their entrepreneurial endeavors and had realistic expectations. Our findings provide new insights into some of the limitations of entrepreneurship programs for women at the base of the pyramid and emphasize the importance of well-being as a measure of successful venture creation.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;398&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;412&quot;&gt;&lt;a data-dcnode-id=&quot;415&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0306457322000437&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;416&quot; id=&quot;citing-articles-article1-title&quot;&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;Optimism and pessimism analysis using deep learning on COVID-19 related twitter conversations&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;413&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;2022, Information Processing and Management&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;406&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article1&quot; aria-describedby=&quot;citing-articles-article1-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;407&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;410&quot;&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;408&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;409&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;399&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;400&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;401&quot;&gt;&lt;p data-dcnode-id=&quot;404&quot; id=&quot;spara012&quot;&gt;&lt;span data-dcnode-id=&quot;405&quot; instrument_node=&quot;&quot;&gt;This paper proposes a new deep learning approach to better understand how optimistic and pessimistic feelings are conveyed in Twitter conversations about COVID-19. A pre-trained transformer embedding is used to extract the semantic features and several network architectures are compared. Model performance is evaluated on two new, publicly available Twitter corpora of crisis-related posts. The best performing pessimism and optimism detection models are based on bidirectional long- and short-term memory networks.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;402&quot; id=&quot;spara013&quot;&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;Experimental results on four periods of the COVID-19 pandemic show how the proposed approach can model optimism and pessimism in the context of a health crisis. There is a total of 150,503 tweets and 51,319 unique users. Conversations are characterised in terms of emotional signals and shifts to unravel empathy and support mechanisms. Conversations with stronger pessimistic signals denoted little emotional shift (i.e. 62.21% of these conversations experienced almost no change in emotion). In turn, only 10.42% of the conversations laying more on the optimistic side maintained the mood. User emotional volatility is further linked with social influence.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;377&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;392&quot;&gt;&lt;a data-dcnode-id=&quot;395&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0092656622000204&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;396&quot; id=&quot;citing-articles-article2-title&quot;&gt;&lt;span data-dcnode-id=&quot;397&quot; instrument_node=&quot;&quot;&gt;An ego effectiveness perspective of successful self-control: An individual difference and its links to social functioning and well-being&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;393&quot;&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;2022, Journal of Research in Personality&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;386&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article2&quot; aria-describedby=&quot;citing-articles-article2-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;387&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;390&quot;&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;388&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;389&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;378&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;379&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;380&quot;&gt;&lt;p data-dcnode-id=&quot;381&quot; id=&quot;sp0010&quot;&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;Recent theorizing has emphasized the need to develop new models of successful self-control. Using materials that describe friendship-related challenges, potential ways of responding to them, and distinct frames targeting the acting self as well as more abstract ideas concerning effectiveness, three studies (total &lt;/span&gt;&lt;em data-dcnode-id=&quot;383&quot;&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt;N&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;382&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;=&amp;nbsp;542) quantified friendship-related ego effectiveness as a within-subject correlation between self-likelihood ratings and effectiveness ratings. Ego effective individuals reported higher levels of self-control (Study 1), were deemed to be more socially competent by peers (Study 2), and experienced higher levels of well-being in their daily lives (Study 3). The results highlight a form of alignment within the self-system that can be leveraged to understand variations in social behavior as well as social and emotional functioning.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;351&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;371&quot;&gt;&lt;a data-dcnode-id=&quot;374&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352906722000203&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;375&quot; id=&quot;citing-articles-article3-title&quot;&gt;&lt;span data-dcnode-id=&quot;376&quot; instrument_node=&quot;&quot;&gt;The shifting care and outcomes for patients with endangered limbs – Critical limb ischemia (SCOPE-CLI) registry overview of study design and rationale&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;372&quot;&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt;2022, IJC Heart and Vasculature&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;365&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article3&quot; aria-describedby=&quot;citing-articles-article3-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;366&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;369&quot;&gt;&lt;span data-dcnode-id=&quot;370&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;367&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;368&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;352&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;353&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;354&quot;&gt;&lt;p data-dcnode-id=&quot;363&quot; id=&quot;sp0005&quot;&gt;&lt;span data-dcnode-id=&quot;364&quot; instrument_node=&quot;&quot;&gt;Critical limb ischemia (CLI), the most severe form of peripheral artery disease, is associated with pain, poor wound healing, high rates of amputation, and mortality (&amp;gt;20% at 1&amp;nbsp;year). Little is known about the processes of care, patients’ preferences, or outcomes, as seen from patients’ perspectives. The SCOPE-CLI study was co-designed with patients to holistically document patient characteristics, treatment preferences, patterns of care, and patient-centered outcomes for CLI.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;361&quot; id=&quot;sp0010&quot;&gt;&lt;span data-dcnode-id=&quot;362&quot; instrument_node=&quot;&quot;&gt;This 11-center prospective observational registry will enroll and interview 816 patients from multispecialty, interdisciplinary vascular centers in the United States and Australia. Patients will be followed up at 1, 2, 6, and 12&amp;nbsp;months regarding their psychosocial factors and health status. Hospitalizations, interventions, and outcomes will be captured for 12&amp;nbsp;months with vital status extending to 5&amp;nbsp;years. Pilot data were collected between January and July of 2021 from 3 centers.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;359&quot; id=&quot;sp0015&quot;&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt;A total of 70 patients have been enrolled. The mean age was 68.4&amp;nbsp;±&amp;nbsp;11.3&amp;nbsp;years, 31.4% were female, and 20.0% were African American.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;357&quot; id=&quot;sp0020&quot;&gt;&lt;span data-dcnode-id=&quot;358&quot; instrument_node=&quot;&quot;&gt;SCOPE-CLI is uniquely co-designed with patients who have CLI to capture the care experiences, treatment preferences, and health status outcomes of this vulnerable population and will provide much needed information to understand and address gaps in the quality of CLI care and outcomes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;355&quot; id=&quot;sp0025&quot;&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;ClinicalTrials.gov identifier (NCT Number): NCT04710563 https://clinicaltrials.gov/ct2/show/NCT04710563.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;308&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;345&quot;&gt;&lt;a data-dcnode-id=&quot;348&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0897189722000106&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;349&quot; id=&quot;citing-articles-article4-title&quot;&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;Emotion management of women at risk for premature birth: The association with optimism and social support&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;346&quot;&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;2022, Applied Nursing Research&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;339&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article4&quot; aria-describedby=&quot;citing-articles-article4-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;340&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;343&quot;&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;341&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;342&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;309&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;310&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;311&quot;&gt;&lt;p data-dcnode-id=&quot;337&quot; id=&quot;sp0060&quot;&gt;&lt;span data-dcnode-id=&quot;338&quot; instrument_node=&quot;&quot;&gt;To examine the emotion management of women at risk for premature birth, and the connection to their optimism and social support.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;335&quot; id=&quot;sp0065&quot;&gt;&lt;span data-dcnode-id=&quot;336&quot; instrument_node=&quot;&quot;&gt;A shortened uterus cervix in early pregnancy (24–34&amp;nbsp;weeks gestation) is a predictor of preterm birth and is a common reason for hospitalization in a high-risk unit. Women hospitalized for this reason often feel a wide spectrum of emotions that may require emotional work, where deep acting techniques are used to evoke or suppress emotions in order to meet social expectations. The emotions, optimism, and social support of women with high-risk pregnancies have implications for their health and well-being.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;333&quot; id=&quot;sp0070&quot;&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt;A cross sectional study at a high-risk pregnancy unit in a large hospital in Israel.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;331&quot; id=&quot;sp0075&quot;&gt;&lt;span data-dcnode-id=&quot;332&quot; instrument_node=&quot;&quot;&gt;Eighty-six pregnant women hospitalized between 24 and 34&amp;nbsp;weeks of gestation in a high-risk unit due to premature contractions and/or cervical shortening, responded to a structured questionnaire. Data were analyzed using reliability testing, descriptive statistics, correlation analysis, and multiple linear regressions.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;314&quot; id=&quot;sp0080&quot;&gt;&lt;span data-dcnode-id=&quot;330&quot; instrument_node=&quot;&quot;&gt;A significant correlation was found between social support and optimism (&lt;/span&gt;&lt;em data-dcnode-id=&quot;328&quot;&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;r&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;327&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;=&amp;nbsp;0.45, &lt;/span&gt;&lt;em data-dcnode-id=&quot;325&quot;&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;lt;&amp;nbsp;.01). A negative correlation was found between optimism and emotion management (&lt;/span&gt;&lt;em data-dcnode-id=&quot;322&quot;&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;r&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;=&amp;nbsp;−0.24, &lt;/span&gt;&lt;em data-dcnode-id=&quot;319&quot;&gt;&lt;span data-dcnode-id=&quot;320&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;318&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;lt;&amp;nbsp;.05) and deep acting emotion management (&lt;/span&gt;&lt;em data-dcnode-id=&quot;316&quot;&gt;&lt;span data-dcnode-id=&quot;317&quot; instrument_node=&quot;&quot;&gt;r&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;315&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;=&amp;nbsp;−0.21, p&amp;nbsp;&amp;lt;&amp;nbsp;.05).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;312&quot; id=&quot;sp0085&quot;&gt;&lt;span data-dcnode-id=&quot;313&quot; instrument_node=&quot;&quot;&gt;High-risk pregnant women manage their emotions mainly through deep emotion work. Social support and optimism contribute to their emotional coping. It is recommended that healthcare professionals working in high-risk pregnancy units, and especially nurses, employ interventions designed to provide professional support and legitimize the sharing of emotions.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;281&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;302&quot;&gt;&lt;a data-dcnode-id=&quot;305&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0195666321007923&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;306&quot; id=&quot;citing-articles-article5-title&quot;&gt;&lt;span data-dcnode-id=&quot;307&quot; instrument_node=&quot;&quot;&gt;Association between positive psychological traits and changes in dietary behaviour related to first COVID-19 lockdown: A general population-based study&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;303&quot;&gt;&lt;span data-dcnode-id=&quot;304&quot; instrument_node=&quot;&quot;&gt;2022, Appetite&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;296&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article5&quot; aria-describedby=&quot;citing-articles-article5-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;297&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;300&quot;&gt;&lt;span data-dcnode-id=&quot;301&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;298&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;299&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;282&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;283&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;284&quot;&gt;&lt;p data-dcnode-id=&quot;294&quot; id=&quot;abspara0010&quot;&gt;&lt;span data-dcnode-id=&quot;295&quot; instrument_node=&quot;&quot;&gt;The spread of the coronavirus disease (COVID-19) led many countries to implement lockdown measures, which resulted in changes in dietary behaviours that could persist over the long term and have associated health consequences. Psychological traits may impact these changes given their known association with dietary behaviours. We aimed to investigate in a population-based study, whether positive psychological traits were associated with changes of snacking behaviour and food consumption observed during the first COVID-19 lockdown period.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;292&quot; id=&quot;abspara0015&quot;&gt;&lt;span data-dcnode-id=&quot;293&quot; instrument_node=&quot;&quot;&gt;In 2016, levels of optimism, resilience, self-esteem, satisfaction with life, mindfulness and mastery were assessed in 33,766 adults of the French NutriNet-Santé cohort. Snacking and food group consumption were assessed in April–May 2020. Association between psychological traits and changes (no change, increase, decrease) in snacking and food group consumption were assessed using logistic regressions. Multiple correspondence analysis followed by ascending hierarchical classification were used to derive clusters of dietary behaviours. Covariance analyses were used to compare mean scores of psychological traits between clusters. Analyses were adjusted for sociodemographic and lifestyle characteristics, anxiety and depressive symptomatology.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;287&quot; id=&quot;abspara0020&quot;&gt;&lt;span data-dcnode-id=&quot;291&quot; instrument_node=&quot;&quot;&gt;Participants with higher levels of optimism, resilience, self-esteem, satisfaction with life, mindfulness or mastery were less likely to change their snacking behaviour and food group consumption of various food groups. Individuals with lower levels were more likely to make changes, with either unhealthy (e.g., less fruits and vegetables, more processed meat) or healthy (e.g., more pasta/rice (whole-grain)) changes. Overall, individuals showed higher levels of positive psychological traits in the “no change” cluster, followed by the “healthy” and the “unhealthy” cluster (all &lt;/span&gt;&lt;em data-dcnode-id=&quot;289&quot;&gt;&lt;span data-dcnode-id=&quot;290&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;288&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;lt;&amp;nbsp;0.05).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;285&quot; id=&quot;abspara0025&quot;&gt;&lt;span data-dcnode-id=&quot;286&quot; instrument_node=&quot;&quot;&gt;Individuals with higher levels of optimism, resilience, self-esteem, satisfaction with life, mindfulness or mastery were less impacted by the lockdown in terms of dietary behaviours.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;/ul&gt;&lt;a class=&quot;button-alternative button-alternative-secondary button-cited-by-more&quot; data-dcnode-id=&quot;275&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-77957750246%26md5%3D3995290234fc38e56f3a63f372e2da&quot; id=&quot;citing-articles-view-all-btn&quot; target=&quot;_blank&quot;&gt;&lt;svg class=&quot;icon icon-arrow-up-right&quot; data-dcnode-id=&quot;278&quot; focusable=&quot;false&quot; height=&quot;32&quot; viewBox=&quot;0 0 78 128&quot; width=&quot;32&quot;&gt;&lt;path d=&quot;m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z&quot; data-dcnode-id=&quot;279&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;span class=&quot;button-alternative-text&quot; data-dcnode-id=&quot;276&quot;&gt;&lt;span data-dcnode-id=&quot;277&quot; instrument_node=&quot;&quot;&gt;View all citing articles on Scopus&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;/div&gt;&lt;a class=&quot;anchor abstract-link&quot; data-dcnode-id=&quot;268&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S027273581000019X&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;269&quot;&gt;&lt;span data-dcnode-id=&quot;270&quot; instrument_node=&quot;&quot;&gt;View Abstract&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;div class=&quot;Copyright&quot; data-dcnode-id=&quot;265&quot;&gt;&lt;span class=&quot;copyright-line&quot; data-dcnode-id=&quot;266&quot;&gt;&lt;span data-dcnode-id=&quot;267&quot; instrument_node=&quot;&quot;&gt;Copyright © 2010 Elsevier Ltd. All rights reserved.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/article&gt;&lt;div class=&quot;u-show-from-md col-lg-6 col-md-8 pad-right&quot; data-dcnode-id=&quot;126&quot;&gt;&lt;aside aria-label=&quot;Related content&quot; class=&quot;RelatedContent&quot; data-dcnode-id=&quot;127&quot;&gt;&lt;section class=&quot;SpecialIssueArticles&quo
