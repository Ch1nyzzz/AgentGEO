&lt;/span&gt;&lt;meta content=&quot;Optimism is an individual difference variable that reflects the extent to which people hold generalized favorable expectancies for their future. Highe…&quot; data-dcnode-id=&quot;8994&quot; property=&quot;og:description&quot;&gt;&lt;span data-dcnode-id=&quot;8993&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;meta content=&quot;&lt;div class=&amp;quot;Abstracts u-font-serif&amp;quot; id=&amp;quot;abstracts&amp;quot;&gt;&lt;div class=&amp;quot;abstract author&amp;quot; id=&amp;quot;aep-abstract-id8&amp;quot;&gt;&lt;h2 class=&amp;quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&amp;quot;&gt;Abstract&lt;/h2&gt;&lt;div id=&amp;quot;aep-abstract-sec-id9&amp;quot;&gt;&lt;p&gt;Optimism is an individual difference variable that reflects the extent to which people hold generalized favorable expectancies for their future. Higher levels of optimism have been related prospectively to better subjective well-being in times of adversity or difficulty (i.e., controlling for previous well-being). Consistent with such findings, optimism has been linked to higher levels of engagement coping and lower levels of avoidance, or disengagement, coping. There is evidence that optimism is associated with taking proactive steps to protect one&amp;amp;#x27;s health, whereas pessimism is associated with health-damaging behaviors. Consistent with such findings, optimism is also related to indicators of better physical health. The energetic, task-focused approach that optimists take to goals also relates to benefits in the socioeconomic world. Some evidence suggests that optimism relates to more persistence in educational efforts and to higher later income. Optimists also appear to fare better than pessimists in relationships. Although there are instances in which optimism fails to convey an advantage, and instances in which it may convey a disadvantage, those instances are relatively rare. In sum, the behavioral patterns of optimists appear to provide models of living for others to learn from.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&quot; data-dcnode-id=&quot;8992&quot; lang=&quot;en&quot; name=&quot;citation_abstract&quot;&gt;&lt;span data-dcnode-id=&quot;8991&quot; instrument_node=&quot;&quot;&gt;

uot;abstract author&quot; data-dcnode-id=&quot;8388&quot; id=&quot;aep-abstract-id8&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;8392&quot;&gt;&lt;span data-dcnode-id=&quot;8393&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;8389&quot; id=&quot;aep-abstract-sec-id9&quot;&gt;&lt;p data-dcnode-id=&quot;8390&quot;&gt;&lt;span data-dcnode-id=&quot;8391&quot; instrument_node=&quot;&quot;&gt;Optimism is an individual difference variable that reflects the extent to which people hold generalized favorable expectancies for their future. Higher levels of optimism have been related prospectively to better subjective well-being in times of adversity or difficulty (i.e., controlling for previous well-being). Consistent with such findings, optimism has been linked to higher levels of engagement coping and lower levels of avoidance, or disengagement, coping. There is evidence that optimism is associated with taking proactive steps to protect one's health, whereas pessimism is associated with health-damaging behaviors. Consistent with such findings, optimism is also related to indicators of better physical health. The energetic, task-focused approach that optimists take to goals also relates to benefits in the socioeconomic world. Some evidence suggests that optimism relates to more persistence in educational efforts and to higher later income. Optimists also appear to fare better than pessimists in relationships. Although there are instances in which optimism fails to convey an advantage, and instances in which it may convey a disadvantage, those instances are relatively rare. In sum, the behavioral patterns of optimists appear to provide models of living for others to learn from.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;ul class=&quot;issue-navigation u-margin-s-bottom u-bg-grey1&quot; data-dcnode-id=&quot;8364&quot; id=&quot;issue-navigation&quot;&gt;&lt;li class=&quot;previous move-left u-padding-s-ver u-padding-s-left&quot; data-dcnode-id=&quot;8376&quot;&gt;&lt;a class=&quot;button-alternative button-alternative-tertiary&quot; data-dcnode-id=&quot;8377&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0272735810000413&quot;&gt;&lt;svg class=&quot;icon icon-navigate-left&quot; data-dcnode-id=&quot;8385&quot; focusable=&quot;false&quot; height=&quot;32&quot; viewBox=&quot;0 0 54 128&quot; width=&quot;32&quot;&gt;&lt;path d=&quot;m1 61l45-45 7 7-38 38 38 38-7 7z&quot; data-dcnode-id=&quot;8386&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;span class=&quot;button-alternative-text&quot; data-dcnode-id=&quot;8378&quot;&gt;&lt;strong data-dcnode-id=&quot;8383&quot;&gt;&lt;span data-dcnode-id=&quot;8384&quot; instrument_node=&quot;&quot;&gt;Previous &lt;/span&gt;&lt;/strong&gt;&lt;span class=&quot;extra-detail-1&quot; data-dcnode-id=&quot;8381&quot;&gt;&lt;span data-dcnode-id=&quot;8382&quot; instrument_node=&quot;&quot;&gt;article&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;extra-detail-2&quot; data-dcnode-id=&quot;8379&quot;&gt;&lt;span data-dcnode-id=&quot;8380&quot; instrument_node=&quot;&quot;&gt; in issue&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;next move-right u-padding-s-ver u-padding-s-right&quot; data-dcnode-id=&quot;8365&quot;&gt;&lt;a class=&quot;button-alternative button-alternative-tertiary&quot; data-dcnode-id=&quot;8366&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0272735810000450&quot;&gt;&lt;span class=&quot;button-alternative-text&quot; data-dcnode-id=&quot;8369&quot;&gt;&lt;strong data-dcnode-id=&quot;8374&quot;&gt;&lt;span data-dcnode-id=&quot;8375&quot; instrument_node=&quot;&quot;&gt;Next &lt;/span&gt;&lt;/strong&gt;&lt;span class=&quot;extra-detail-1&quot; data-dcnode-id=&quot;8372&quot;&gt;&lt;span data-dcnode-id=&quot;8373&quot; instrument_node=&quot;&quot;&gt;article&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;extra-detail-2&quot; data-dcnode-id=&quot;8370&quot;&gt;&lt;span data-dcnode-id=&quot;8371&quot; instrument_node=&quot;&quot;&gt; in issue&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-right&quot; data-dcnode-id=&quot;8367&quot; focusable=&quot;false&quot; height=&quot;32&quot; viewBox=&quot;0 0 54 128&quot; width=&quot;32&quot;&gt;&lt;path d=&quot;m1 99l38-38-38-38 7-7 45 45-45 45z&quot; data-dcnode-id=&quot;8368&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;Keywords u-font-serif&quot; data-dcnode-id=&quot;8345&quot;&gt;&lt;div class=&quot;keywords-section&quot; data-dcnode-id=&quot;8346&quot; id=&quot;aep-keywords-id10&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;8362&quot;&gt;&lt;span data-dcnode-id=&quot;8363&quot; instrument_node=&quot;&quot;&gt;Keywords&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;8359&quot;&gt;&lt;span data-dcnode-id=&quot;8360&quot;&gt;&lt;span data-dcnode-id=&quot;8361&quot; instrument_node=&quot;&quot;&gt;Optimism&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;8356&quot;&gt;&lt;span data-dcnode-id=&quot;8357&quot;&gt;&lt;span data-dcnode-id=&quot;8358&quot; instrument_node=&quot;&quot;&gt;Subjective well-being&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;8353&quot;&gt;&lt;span data-dcnode-id=&quot;8354&quot;&gt;&lt;span data-dcnode-id=&quot;8355&quot; instrument_node=&quot;&quot;&gt;Coping&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;8350&quot;&gt;&lt;span data-dcnode-id=&quot;8351&quot;&gt;&lt;span data-dcnode-id=&quot;8352&quot; instrument_node=&quot;&quot;&gt;Health&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;8347&quot;&gt;&lt;span data-dcnode-id=&quot;8348&quot;&gt;&lt;span data-dcnode-id=&quot;8349&quot; instrument_node=&quot;&quot;&gt;Personality&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;8344&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;div class=&quot;Body u-font-serif&quot; data-dcnode-id=&quot;7455&quot; id=&quot;body&quot;&gt;&lt;div data-dcnode-id=&quot;7488&quot;&gt;&lt;p data-dcnode-id=&quot;8342&quot;&gt;&lt;span data-dcnode-id=&quot;8343&quot; instrument_node=&quot;&quot;&gt;Optimists are people who expect good things to happen to them; pessimists are people who expect bad things to happen to them. Folk psychology has long held that these differences among people are important. Research over the past two and a half decades suggests that the folk wisdom is right (at least in this case). This rather simple difference—anticipating good versus anticipating bad—is linked to core processes that underlie behavior. The ways in which optimists and pessimists differ in their approach to the world have substantial impact on their lives. These people differ in how they confront problems; they differ in how well they cope with adversity; they also differ in their resources, both social and socioeconomic.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8322&quot;&gt;&lt;span data-dcnode-id=&quot;8341&quot; instrument_node=&quot;&quot;&gt;Individual differences in optimism are relevant to clinical psychology because this dimension is associated, both directly and indirectly, and at both an individual and a social level, with risk for psychopathology. At the most basic level, optimism by definition is inversely related to hopelessness, a risk factor for depressive disorders (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8339&quot; href=&quot;#bib4&quot; name=&quot;bbib4&quot;&gt;&lt;span data-dcnode-id=&quot;8340&quot; instrument_node=&quot;&quot;&gt;Alloy et al., 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8338&quot; instrument_node=&quot;&quot;&gt;). Further, optimism appears to confer resilience to stressful life events, which are associated with risk for both onset and relapse of psychopathology (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8336&quot; href=&quot;#bib32&quot; name=&quot;bbib32&quot;&gt;&lt;span data-dcnode-id=&quot;8337&quot; instrument_node=&quot;&quot;&gt;Ellicott et al., 1990&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8335&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8333&quot; href=&quot;#bib33&quot; name=&quot;bbib33&quot;&gt;&lt;span data-dcnode-id=&quot;8334&quot; instrument_node=&quot;&quot;&gt;Finlay-Jones &amp;amp; Brown, 1981&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8332&quot; instrument_node=&quot;&quot;&gt;). Finally, at the broadest levels, optimism clusters with other factors such as socioeconomic status and social integration, which as a group have protective effects for both mental and physical health (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8330&quot; href=&quot;#bib48&quot; name=&quot;bbib48&quot;&gt;&lt;span data-dcnode-id=&quot;8331&quot; instrument_node=&quot;&quot;&gt;House et al., 1988&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8329&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8327&quot; href=&quot;#bib51&quot; name=&quot;bbib51&quot;&gt;&lt;span data-dcnode-id=&quot;8328&quot; instrument_node=&quot;&quot;&gt;Kawachi &amp;amp; Berkman, 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8326&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8324&quot; href=&quot;#bib55&quot; name=&quot;bbib55&quot;&gt;&lt;span data-dcnode-id=&quot;8325&quot; instrument_node=&quot;&quot;&gt;Lorant et al., 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8323&quot; instrument_node=&quot;&quot;&gt;). In sum, the trait of optimism may provide cognitive, coping, and contextual resources that promote better mental health. Indeed, the pattern of associations that optimism has with various behavioral and cognitive tendencies may give us broader hints about the nature of optimal living.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;8175&quot; id=&quot;aep-section-id11&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;8316&quot;&gt;&lt;span data-dcnode-id=&quot;8321&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;span data-dcnode-id=&quot;8319&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;8317&quot; instrument_node=&quot;&quot;&gt;Theoretical grounding&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;8299&quot;&gt;&lt;span data-dcnode-id=&quot;8315&quot; instrument_node=&quot;&quot;&gt;Scientific definitions of optimism and pessimism focus on expectancies for the future. This links these ideas to a long history of expectancy-value models of motivation. Expectancy-value theories assume that behavior reflects the pursuit of goals: desired states or actions. The more important a given goal is to the person, the greater its &lt;/span&gt;&lt;em data-dcnode-id=&quot;8313&quot;&gt;&lt;span data-dcnode-id=&quot;8314&quot; instrument_node=&quot;&quot;&gt;value&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;8312&quot; instrument_node=&quot;&quot;&gt; (see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8310&quot; href=&quot;#bib12&quot; name=&quot;bbib12&quot;&gt;&lt;span data-dcnode-id=&quot;8311&quot; instrument_node=&quot;&quot;&gt;Austin &amp;amp; Vancouver, 1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8309&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8307&quot; href=&quot;#bib21&quot; name=&quot;bbib21&quot;&gt;&lt;span data-dcnode-id=&quot;8308&quot; instrument_node=&quot;&quot;&gt;Carver &amp;amp; Scheier, 1998&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8306&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8304&quot; href=&quot;#bib46&quot; name=&quot;bbib46&quot;&gt;&lt;span data-dcnode-id=&quot;8305&quot; instrument_node=&quot;&quot;&gt;Higgins, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8303&quot; instrument_node=&quot;&quot;&gt;). The other facet of this motivational model is &lt;/span&gt;&lt;em data-dcnode-id=&quot;8301&quot;&gt;&lt;span data-dcnode-id=&quot;8302&quot; instrument_node=&quot;&quot;&gt;expectancy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;8300&quot; instrument_node=&quot;&quot;&gt;—confidence that the goal can be attained. If people doubt they can reach a goal, they may withdraw effort toward it. They may stop prematurely, or the action may never really start. People who are confident about eventually reaching an outcome will persevere even in the face of great adversity.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8294&quot;&gt;&lt;span data-dcnode-id=&quot;8298&quot; instrument_node=&quot;&quot;&gt;The expectancy construct has a wide range of applicability. Confidence and doubt can pertain to narrow contexts (e.g., the ability to go to a grocery store to obtain food), to moderately broad contexts (e.g., the ability to prepare an elegant meal), and to even broader contexts (e.g., the ability to develop a reputation as an exceptional host). Optimism and pessimism are broad, generalized versions of confidence and doubt; they are confidence and doubt pertaining to life, rather than to just a specific context (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8296&quot; href=&quot;#bib78&quot; name=&quot;bbib78&quot;&gt;&lt;span data-dcnode-id=&quot;8297&quot; instrument_node=&quot;&quot;&gt;Scheier &amp;amp; Carver, 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8295&quot; instrument_node=&quot;&quot;&gt;). Thus, optimists should tend to be confident and persistent in the face of diverse life challenges (even when progress is difficult or slow). Pessimists should be doubtful and hesitant in the same situations. Such differences in how people confront adversity have implications for success in completing goal-directed behavior. They also have implications for the manner in which people cope with stress.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;8253&quot; id=&quot;aep-section-id12&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;8288&quot;&gt;&lt;span data-dcnode-id=&quot;8293&quot; instrument_node=&quot;&quot;&gt;1.1&lt;/span&gt;&lt;span data-dcnode-id=&quot;8291&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;8289&quot; instrument_node=&quot;&quot;&gt;Measurement issues&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;8277&quot;&gt;&lt;span data-dcnode-id=&quot;8287&quot; instrument_node=&quot;&quot;&gt;There are at least two ways to think about generalized expectancies and how to measure them. One is to measure them directly, asking people whether they expect outcomes in their lives to be good or bad (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8285&quot; href=&quot;#bib78&quot; name=&quot;bbib78&quot;&gt;&lt;span data-dcnode-id=&quot;8286&quot; instrument_node=&quot;&quot;&gt;Scheier &amp;amp; Carver, 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8284&quot; instrument_node=&quot;&quot;&gt;). This approach is reflected in the Life Orientation Test (LOT) and its successor the Life Orientation Test-Revised (LOT-R; &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8282&quot; href=&quot;#bib80&quot; name=&quot;bbib80&quot;&gt;&lt;span data-dcnode-id=&quot;8283&quot; instrument_node=&quot;&quot;&gt;Scheier, Carver, &amp;amp; Bridges, 1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8281&quot; instrument_node=&quot;&quot;&gt;). This is the measure we have used in our own work on this topic. It consists of a set of statements (e.g., “I'm always optimistic about my future,” “I rarely count on good things happening to me” [reversed]) to which people indicate their agreement or disagreement on a multi-point scale (other measures of this trait have also been created with a similar structure, e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8279&quot; href=&quot;#bib28&quot; name=&quot;bbib28&quot;&gt;&lt;span data-dcnode-id=&quot;8280&quot; instrument_node=&quot;&quot;&gt;Dember, Martin, Hummer, Howe, &amp;amp; Melton, 1989&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8278&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8269&quot;&gt;&lt;span data-dcnode-id=&quot;8276&quot; instrument_node=&quot;&quot;&gt;A different approach to measuring optimism rests on the idea that people's expectancies for the future stem from their interpretations of the past (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8274&quot; href=&quot;#bib63&quot; name=&quot;bbib63&quot;&gt;&lt;span data-dcnode-id=&quot;8275&quot; instrument_node=&quot;&quot;&gt;Peterson &amp;amp; Seligman, 1984&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8273&quot; instrument_node=&quot;&quot;&gt;). If past failures are seen as reflecting stable causes, more failure will be expected, because the cause (which is relatively permanent) is likely to remain in force. If past failures are seen as reflecting unstable causes, the outlook for the future may be brighter, because the cause may no longer be present. In line with this reasoning, some assess optimism and pessimism as patterns of attributions about the causes of events (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8271&quot; href=&quot;#bib63&quot; name=&quot;bbib63&quot;&gt;&lt;span data-dcnode-id=&quot;8272&quot; instrument_node=&quot;&quot;&gt;Peterson &amp;amp; Seligman, 1984&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8270&quot; instrument_node=&quot;&quot;&gt;), and infer that the attributions ultimately yield expectancies.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8261&quot;&gt;&lt;span data-dcnode-id=&quot;8268&quot; instrument_node=&quot;&quot;&gt;It turns out, however, that stable attributions for negative events are only modestly associated with measures of generalized expectancies (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8266&quot; href=&quot;#bib2&quot; name=&quot;bbib2&quot;&gt;&lt;span data-dcnode-id=&quot;8267&quot; instrument_node=&quot;&quot;&gt;Ahrens &amp;amp; Haaga, 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8265&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8263&quot; href=&quot;#bib64&quot; name=&quot;bbib64&quot;&gt;&lt;span data-dcnode-id=&quot;8264&quot; instrument_node=&quot;&quot;&gt;Peterson &amp;amp; Vaidya, 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8262&quot; instrument_node=&quot;&quot;&gt;). Thus, despite the fact that the two measures relate to conceptually similar outcomes, they cannot be considered interchangeable. A preference for one approach to assessment versus the other may depend on whether one views attributions or expectancies as the more fundamental or crucial element, or the element that is more susceptible to therapeutic change.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8259&quot;&gt;&lt;span data-dcnode-id=&quot;8260&quot; instrument_node=&quot;&quot;&gt;Each measurement approach yields a continuous distribution of scores. It is common to refer to optimists and pessimists as though they were distinct categories of people, but this is a verbal convenience. Almost never is a line drawn and people placed in one group or the other. People range from very optimistic to very pessimistic, with most being somewhere between.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8254&quot;&gt;&lt;span data-dcnode-id=&quot;8258&quot; instrument_node=&quot;&quot;&gt;On the other hand, it is possible to identify people who are optimistic in an absolute sense, because they agree with optimistic items (e.g., “In uncertain times, I usually expect the best”) and disagree with pessimistic items (e.g., “If something can go wrong for me, it will”). In the same way it is also possible to identify people who are pessimists in an absolute sense. Doing this reveals that pessimists are a minority. Most people are optimistic, but to varying degrees (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8256&quot; href=&quot;#bib88&quot; name=&quot;bbib88&quot;&gt;&lt;span data-dcnode-id=&quot;8257&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2006a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8255&quot; instrument_node=&quot;&quot;&gt;), and the literature should be interpreted in this light. Put differently, we know more about people who are less optimistic than we know about people who are truly pessimists.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;8176&quot; id=&quot;aep-section-id13&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;8247&quot;&gt;&lt;span data-dcnode-id=&quot;8252&quot; instrument_node=&quot;&quot;&gt;1.2&lt;/span&gt;&lt;span data-dcnode-id=&quot;8250&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;8248&quot; instrument_node=&quot;&quot;&gt;Further issues&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;8213&quot;&gt;&lt;span data-dcnode-id=&quot;8246&quot; instrument_node=&quot;&quot;&gt;How stable is a person's level of optimism? Optimism is a trait. As with most traits, test–retest correlations are relatively high, ranging from .58 to .79 over periods lasting from a few weeks to 3&lt;/span&gt;&lt;span data-dcnode-id=&quot;8244&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;8242&quot; instrument_node=&quot;&quot;&gt;years (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8240&quot; href=&quot;#bib11&quot; name=&quot;bbib11&quot;&gt;&lt;span data-dcnode-id=&quot;8241&quot; instrument_node=&quot;&quot;&gt;Atienza et al., 2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8239&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8237&quot; href=&quot;#bib56&quot; name=&quot;bbib56&quot;&gt;&lt;span data-dcnode-id=&quot;8238&quot; instrument_node=&quot;&quot;&gt;Lucas et al., 1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8236&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8234&quot; href=&quot;#bib77&quot; name=&quot;bbib77&quot;&gt;&lt;span data-dcnode-id=&quot;8235&quot; instrument_node=&quot;&quot;&gt;Scheier &amp;amp; Carver, 1985&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8233&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8231&quot; href=&quot;#bib80&quot; name=&quot;bbib80&quot;&gt;&lt;span data-dcnode-id=&quot;8232&quot; instrument_node=&quot;&quot;&gt;Scheier et al., 1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8230&quot; instrument_node=&quot;&quot;&gt;). Test–retest reliability has been found to be high even across longer time periods. For example, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8228&quot; href=&quot;#bib60&quot; name=&quot;bbib60&quot;&gt;&lt;span data-dcnode-id=&quot;8229&quot; instrument_node=&quot;&quot;&gt;Matthews, Räikkönen, Sutton-Tyrrell, and Kuller (2004)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8227&quot; instrument_node=&quot;&quot;&gt; found a test–retest correlation of .71 across a 10.4&lt;/span&gt;&lt;span data-dcnode-id=&quot;8225&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;8223&quot; instrument_node=&quot;&quot;&gt;year period in a group of middle-age women. Some of this stability arises from optimism's stable sources. Optimism's heritability estimate is approximately 25% (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8221&quot; href=&quot;#bib65&quot; name=&quot;bbib65&quot;&gt;&lt;span data-dcnode-id=&quot;8222&quot; instrument_node=&quot;&quot;&gt;Plomin et al., 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8220&quot; instrument_node=&quot;&quot;&gt;). Even though this is lower than many personality traits, it is still substantial. Other evidence points to childhood environment, particularly the presence of resources such as parental warmth and financial security, as a predictor of adult optimism (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8218&quot; href=&quot;#bib42&quot; name=&quot;bbib42&quot;&gt;&lt;span data-dcnode-id=&quot;8219&quot; instrument_node=&quot;&quot;&gt;Heinonen et al., 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8217&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8215&quot; href=&quot;#bib43&quot; name=&quot;bbib43&quot;&gt;&lt;span data-dcnode-id=&quot;8216&quot; instrument_node=&quot;&quot;&gt;Heinonen et al., 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8214&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8205&quot;&gt;&lt;span data-dcnode-id=&quot;8212&quot; instrument_node=&quot;&quot;&gt;Nonetheless, there are also variations in optimism, both moment-to-moment and over extended periods. For instance, as people prepare to confront a threat, their states of confidence may shift temporarily downward, whether they are basically optimists or pessimists (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8210&quot; href=&quot;#bib103&quot; name=&quot;bbib103&quot;&gt;&lt;span data-dcnode-id=&quot;8211&quot; instrument_node=&quot;&quot;&gt;Sweeny, Carroll, &amp;amp; Shepperd, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8209&quot; instrument_node=&quot;&quot;&gt;). Indeed, long-term stability in optimism–pessimism is not always high. One 10-year test–retest correlation was only .35 (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8207&quot; href=&quot;#bib90&quot; name=&quot;bbib90&quot;&gt;&lt;span data-dcnode-id=&quot;8208&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8206&quot; instrument_node=&quot;&quot;&gt;). This clearly indicates change in this trait for at least some people.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8203&quot;&gt;&lt;span data-dcnode-id=&quot;8204&quot; instrument_node=&quot;&quot;&gt;It is perhaps noteworthy that this study examined the stability of optimism across a period of time of considerable change in the participants' life circumstances. That is, baseline measures occurred when participants were in law school, and the follow-up came when participants were well engaged in their law practices. Perhaps optimism is more changeable during times of life transition, when there is break from prior experience, and outcomes become more uncertain.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8201&quot;&gt;&lt;span data-dcnode-id=&quot;8202&quot; instrument_node=&quot;&quot;&gt;It is also of interest that change in that study was mainly in the optimistic direction and was predicted by increases in social resources. We will consider the effects of optimism on social and socioeconomic resource accumulation later on; evidence that optimism is also affected by such resources suggests the possibility of a mutually reinforcing cycle. The question of how readily change in optimism can be purposefully induced is also taken up later.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8184&quot;&gt;&lt;span data-dcnode-id=&quot;8200&quot; instrument_node=&quot;&quot;&gt;A final issue that bears mention is that there has been controversy about whether the optimism construct should be seen as one bipolar dimension or whether there are two separable dimensions, one pertaining to the affirmation of optimism, the other pertaining to affirmation of pessimism. There have been cases in which separating those qualities has led to better prediction of outcomes (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8198&quot; href=&quot;#bib59&quot; name=&quot;bbib59&quot;&gt;&lt;span data-dcnode-id=&quot;8199&quot; instrument_node=&quot;&quot;&gt;Marshall et al., 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8197&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8195&quot; href=&quot;#bib74&quot; name=&quot;bbib74&quot;&gt;&lt;span data-dcnode-id=&quot;8196&quot; instrument_node=&quot;&quot;&gt;Robinson-Whelen et al., 1997&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8194&quot; instrument_node=&quot;&quot;&gt;) but that consequence has by no means been universal. A number of studies aimed at settling the issue have come to different conclusions, some holding that a unidimensional view is accurate (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8192&quot; href=&quot;#bib71&quot; name=&quot;bbib71&quot;&gt;&lt;span data-dcnode-id=&quot;8193&quot; instrument_node=&quot;&quot;&gt;Rauch, Schweizer, &amp;amp; Moosbrugger, 2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8191&quot; instrument_node=&quot;&quot;&gt;), others that there are two dimensions (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8189&quot; href=&quot;#bib45&quot; name=&quot;bbib45&quot;&gt;&lt;span data-dcnode-id=&quot;8190&quot; instrument_node=&quot;&quot;&gt;Herzberg, Glaesmer, &amp;amp; Hoyer, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8188&quot; instrument_node=&quot;&quot;&gt;). The core question seems to be whether the separation of responses to positively worded items from responses to negatively worded items (a pattern that is quite common in measures with that structure) reflects method variance or substantive variance. The jury is still out on that issue. However, it remains an important clinical as well as theoretical question, in that some have argued that interventions should be targeted to address optimistic as well as pessimistic cognition (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8186&quot; href=&quot;#bib73&quot; name=&quot;bbib73&quot;&gt;&lt;span data-dcnode-id=&quot;8187&quot; instrument_node=&quot;&quot;&gt;Riskind, Sarampote, &amp;amp; Mercier, 1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8185&quot; instrument_node=&quot;&quot;&gt;). Whether one side or the other is more important, if indeed there are two sides at all, needs further empirical clarification.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8182&quot;&gt;&lt;span data-dcnode-id=&quot;8183&quot; instrument_node=&quot;&quot;&gt;For the sake of simplicity, in this article we treat optimism–pessimism as one dimension. It should be kept in mind, however, that in some studies what mattered most was the extent to which people endorse versus reject a pessimistic outlook; in other studies what matters most was the extent to which people endorse versus reject an optimistic outlook. In yet other studies, this issue did not matter at all.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8177&quot;&gt;&lt;span data-dcnode-id=&quot;8181&quot; instrument_node=&quot;&quot;&gt;In the next sections we describe some ways in which individual differences in optimism versus pessimism, measured as expectations for one's future, relate to other aspects of life (see also &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8179&quot; href=&quot;#bib88&quot; name=&quot;bbib88&quot;&gt;&lt;span data-dcnode-id=&quot;8180&quot; instrument_node=&quot;&quot;&gt;Segerstrom, 2006a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8178&quot; instrument_node=&quot;&quot;&gt;). Manifestations of optimism are grouped here into five sections, dealing with subjective well-being, coping, fostering and interfering with well-being, physical health, and socioeconomic and social resources.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;8032&quot; id=&quot;aep-section-id14&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;8169&quot;&gt;&lt;span data-dcnode-id=&quot;8174&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;span data-dcnode-id=&quot;8172&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;8170&quot; instrument_node=&quot;&quot;&gt;Optimism and subjective well-being&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;8161&quot;&gt;&lt;span data-dcnode-id=&quot;8168&quot; instrument_node=&quot;&quot;&gt;A straightforward influence of optimism and pessimism is on how people feel when they encounter problems. When confronting difficulty, people's emotions range from enthusiasm and eagerness to anger, anxiety, and depression. The balance among feelings relates to differences in optimism. Optimists expect good outcomes, even when things are hard. This yields a relatively positive mix of feelings. Pessimists expect bad outcomes. This yields more negative feelings—anxiety, anger, sadness, even despair (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8166&quot; href=&quot;#bib21&quot; name=&quot;bbib21&quot;&gt;&lt;span data-dcnode-id=&quot;8167&quot; instrument_node=&quot;&quot;&gt;Carver &amp;amp; Scheier, 1998&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8165&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8163&quot; href=&quot;#bib78&quot; name=&quot;bbib78&quot;&gt;&lt;span data-dcnode-id=&quot;8164&quot; instrument_node=&quot;&quot;&gt;Scheier &amp;amp; Carver, 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8162&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8117&quot;&gt;&lt;span data-dcnode-id=&quot;8160&quot; instrument_node=&quot;&quot;&gt;Relations between optimism and distress have been examined in a wide range of contexts. Those studied include students starting college (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8158&quot; href=&quot;#bib9&quot; name=&quot;bbib9&quot;&gt;&lt;span data-dcnode-id=&quot;8159&quot; instrument_node=&quot;&quot;&gt;Aspinwall &amp;amp; Taylor, 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8157&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8155&quot; href=&quot;#bib14&quot; name=&quot;bbib14&quot;&gt;&lt;span data-dcnode-id=&quot;8156&quot; instrument_node=&quot;&quot;&gt;Brissette et al., 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8154&quot; instrument_node=&quot;&quot;&gt;); survivors of missile attacks (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8152&quot; href=&quot;#bib112&quot; name=&quot;bbib112&quot;&gt;&lt;span data-dcnode-id=&quot;8153&quot; instrument_node=&quot;&quot;&gt;Zeidner &amp;amp; Hammer, 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8151&quot; instrument_node=&quot;&quot;&gt;); cancer caregivers (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8149&quot; href=&quot;#bib40&quot; name=&quot;bbib40&quot;&gt;&lt;span data-dcnode-id=&quot;8150&quot; instrument_node=&quot;&quot;&gt;Given et al., 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8148&quot; instrument_node=&quot;&quot;&gt;); Alzheimer's caregivers (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8146&quot; href=&quot;#bib47&quot; name=&quot;bbib47&quot;&gt;&lt;span data-dcnode-id=&quot;8147&quot; instrument_node=&quot;&quot;&gt;Hooker et al., 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8145&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8143&quot; href=&quot;#bib95&quot; name=&quot;bbib95&quot;&gt;&lt;span data-dcnode-id=&quot;8144&quot; instrument_node=&quot;&quot;&gt;Shifren &amp;amp; Hooker, 1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8142&quot; instrument_node=&quot;&quot;&gt;); and people dealing with stresses of childbirth (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8140&quot; href=&quot;#bib17&quot; name=&quot;bbib17&quot;&gt;&lt;span data-dcnode-id=&quot;8141&quot; instrument_node=&quot;&quot;&gt;Carver &amp;amp; Gaines, 1987&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8139&quot; instrument_node=&quot;&quot;&gt;), coronary artery bypass surgery (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8137&quot; href=&quot;#bib34&quot; name=&quot;bbib34&quot;&gt;&lt;span data-dcnode-id=&quot;8138&quot; instrument_node=&quot;&quot;&gt;Fitzgerald et al., 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8136&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8134&quot; href=&quot;#bib82&quot; name=&quot;bbib82&quot;&gt;&lt;span data-dcnode-id=&quot;8135&quot; instrument_node=&quot;&quot;&gt;Scheier et al., 1989&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8133&quot; instrument_node=&quot;&quot;&gt;), failed attempts at in vitro fertilization (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8131&quot; href=&quot;#bib54&quot; name=&quot;bbib54&quot;&gt;&lt;span data-dcnode-id=&quot;8132&quot; instrument_node=&quot;&quot;&gt;Litt, Tennen, Affleck, &amp;amp; Klock, 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8130&quot; instrument_node=&quot;&quot;&gt;), bone marrow transplantation (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8128&quot; href=&quot;#bib27&quot; name=&quot;bbib27&quot;&gt;&lt;span data-dcnode-id=&quot;8129&quot; instrument_node=&quot;&quot;&gt;Curbow, Somerfield, Baker, Wingard, &amp;amp; Legro, 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8127&quot; instrument_node=&quot;&quot;&gt;), cancer (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8125&quot; href=&quot;#bib20&quot; name=&quot;bbib20&quot;&gt;&lt;span data-dcnode-id=&quot;8126&quot; instrument_node=&quot;&quot;&gt;Carver et al., 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8124&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8122&quot; href=&quot;#bib35&quot; name=&quot;bbib35&quot;&gt;&lt;span data-dcnode-id=&quot;8123&quot; instrument_node=&quot;&quot;&gt;Friedman et al., 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8121&quot; instrument_node=&quot;&quot;&gt;), and the progression of AIDS (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8119&quot; href=&quot;#bib106&quot; name=&quot;bbib106&quot;&gt;&lt;span data-dcnode-id=&quot;8120&quot; instrument_node=&quot;&quot;&gt;Taylor et al., 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8118&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8115&quot;&gt;&lt;span data-dcnode-id=&quot;8116&quot; instrument_node=&quot;&quot;&gt;The studies done vary in complexity and what they are able to show. Some of the work is cross-sectional, showing that lower optimism relates to reports of more distress in some difficult situation. What those studies cannot show is whether less optimistic people had more distress even prior to the adversity. Other studies assess people at multiple time points. These studies give a better picture of how distress shifts over time and circumstances, and allow researchers to control for initial levels of distress. We focus here on this sort of research.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8110&quot;&gt;&lt;span data-dcnode-id=&quot;8114&quot; instrument_node=&quot;&quot;&gt;A very early study of optimism and emotional well-being examined the development of depressed feelings after childbirth (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8112&quot; href=&quot;#bib17&quot; name=&quot;bbib17&quot;&gt;&lt;span data-dcnode-id=&quot;8113&quot; instrument_node=&quot;&quot;&gt;Carver &amp;amp; Gaines, 1987&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8111&quot; instrument_node=&quot;&quot;&gt;). Women completed the LOT and a depression scale in the last third of their pregnancy. They completed the depression scale again three weeks after delivery. Optimism related to lower depression symptoms at initial assessment and also predicted lower depression postpartum, controlling for initial levels. Thus optimism appeared to confer resistance to postpartum depressive symptoms.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;8064&quot; id=&quot;aep-section-id15&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;8104&quot;&gt;&lt;span data-dcnode-id=&quot;8109&quot; instrument_node=&quot;&quot;&gt;2.1&lt;/span&gt;&lt;span data-dcnode-id=&quot;8107&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;8105&quot; instrument_node=&quot;&quot;&gt;Medical contexts&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;8096&quot;&gt;&lt;span data-dcnode-id=&quot;8103&quot; instrument_node=&quot;&quot;&gt;A good deal of the work on optimism and subjective well-being has been done in the context of medical settings. Several projects have studied people having coronary artery bypass surgery. One assessed people a month before surgery and eight months afterward (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8101&quot; href=&quot;#bib34&quot; name=&quot;bbib34&quot;&gt;&lt;span data-dcnode-id=&quot;8102&quot; instrument_node=&quot;&quot;&gt;Fitzgerald et al., 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8100&quot; instrument_node=&quot;&quot;&gt;). Optimists had less distress beforehand, and (controlling for presurgical life satisfaction) optimists had more life satisfaction after surgery. Optimism about life appeared to lead to a specific optimism about the surgery, and from there to satisfaction with life. A similar study by &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8098&quot; href=&quot;#bib82&quot; name=&quot;bbib82&quot;&gt;&lt;span data-dcnode-id=&quot;8099&quot; instrument_node=&quot;&quot;&gt;Scheier et al. (1989)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8097&quot; instrument_node=&quot;&quot;&gt; found that optimists retained higher quality of life even up to five years after the surgery.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8075&quot;&gt;&lt;span data-dcnode-id=&quot;8095&quot; instrument_node=&quot;&quot;&gt;Optimism has also been studied in the context of other health crises. An example is treatment for breast cancer (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8093&quot; href=&quot;#bib20&quot; name=&quot;bbib20&quot;&gt;&lt;span data-dcnode-id=&quot;8094&quot; instrument_node=&quot;&quot;&gt;Carver et al., 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8092&quot; instrument_node=&quot;&quot;&gt;). Women were interviewed at diagnosis, the day before surgery, a few days after surgery, and 3, 6, and 12&lt;/span&gt;&lt;span data-dcnode-id=&quot;8090&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;8088&quot; instrument_node=&quot;&quot;&gt;months later. Optimism (at initial assessment) predicted less distress over time, controlling for effects of medical variables and earlier distress. Thus, optimism predicted resilience against distress during the full year. A study of head and neck cancer patients yielded similar results (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8086&quot; href=&quot;#bib3&quot; name=&quot;bbib3&quot;&gt;&lt;span data-dcnode-id=&quot;8087&quot; instrument_node=&quot;&quot;&gt;Allison, Guichard, &amp;amp; Gilain, 2000&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8085&quot; instrument_node=&quot;&quot;&gt;). Patients were assessed before treatment and three months afterward. Optimists reported higher quality of life before treatment and also after treatment, controlling for initial ratings. Although it has been suggested that optimism might set people up for disappointment (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8083&quot; href=&quot;#bib85&quot; name=&quot;bbib85&quot;&gt;&lt;span data-dcnode-id=&quot;8084&quot; instrument_node=&quot;&quot;&gt;Schwarzer, 1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8082&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8080&quot; href=&quot;#bib107&quot; name=&quot;bbib107&quot;&gt;&lt;span data-dcnode-id=&quot;8081&quot; instrument_node=&quot;&quot;&gt;Tennen &amp;amp; Affleck, 1987&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8079&quot; instrument_node=&quot;&quot;&gt;), &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8077&quot; href=&quot;#bib101&quot; name=&quot;bbib101&quot;&gt;&lt;span data-dcnode-id=&quot;8078&quot; instrument_node=&quot;&quot;&gt;Stanton and Snider (1993)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8076&quot; instrument_node=&quot;&quot;&gt; found that optimism predicted better mood before breast cancer biopsy, and this relationship did not change on receipt of a positive biopsy result or after surgery.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8070&quot;&gt;&lt;span data-dcnode-id=&quot;8074&quot; instrument_node=&quot;&quot;&gt;Another medical context in which optimism has been studied is in vitro fertilization, a procedure that helps people overcome fertility problems. The study focused on people who were unsuccessful (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8072&quot; href=&quot;#bib54&quot; name=&quot;bbib54&quot;&gt;&lt;span data-dcnode-id=&quot;8073&quot; instrument_node=&quot;&quot;&gt;Litt et al., 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8071&quot; instrument_node=&quot;&quot;&gt;). Eight weeks beforehand, participants reported their optimism, distress, expectancies for fertilization success, and the impact of infertility on their lives. Two weeks after notification of a negative pregnancy test, distress was measured again. Of the initial variables, only optimism predicted follow-up distress (controlling for time-1 distress). This study found that the most optimistic participants were the least distressed after a disappointing event, further contradicting the idea that optimists are more vulnerable to disappointment than pessimists.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8065&quot;&gt;&lt;span data-dcnode-id=&quot;8069&quot; instrument_node=&quot;&quot;&gt;Yet another context in which effects of optimism have been examined is treatment for ischemic heart disease. In this study (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8067&quot; href=&quot;#bib96&quot; name=&quot;bbib96&quot;&gt;&lt;span data-dcnode-id=&quot;8068&quot; instrument_node=&quot;&quot;&gt;Shnek, Irvine, Stewart, &amp;amp; Abbey, 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8066&quot; instrument_node=&quot;&quot;&gt;), less optimism related to more symptoms of depression shortly after hospitalization. Lower optimism also predicted more symptoms of depression at a 1-year follow-up, when controlling for earlier depression and a variety of other variables.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;8033&quot; id=&quot;aep-section-id16&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;8058&quot;&gt;&lt;span data-dcnode-id=&quot;8063&quot; instrument_node=&quot;&quot;&gt;2.2&lt;/span&gt;&lt;span data-dcnode-id=&quot;8061&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;8059&quot; instrument_node=&quot;&quot;&gt;Other settings&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;8047&quot;&gt;&lt;span data-dcnode-id=&quot;8057&quot; instrument_node=&quot;&quot;&gt;Medical conditions are not the only sources of stress in which optimism has been studied. Caregivers are another highly stressed group. One project studied a group of cancer patients and their caregivers (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8055&quot; href=&quot;#bib40&quot; name=&quot;bbib40&quot;&gt;&lt;span data-dcnode-id=&quot;8056&quot; instrument_node=&quot;&quot;&gt;Given et al., 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8054&quot; instrument_node=&quot;&quot;&gt;). Caregivers' optimism predicted less depression and less adverse impact of caregiving on their physical health. Similar results have been found among caregiver spouses of Alzheimer's patients (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8052&quot; href=&quot;#bib47&quot; name=&quot;bbib47&quot;&gt;&lt;span data-dcnode-id=&quot;8053&quot; instrument_node=&quot;&quot;&gt;Hooker et al., 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8051&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8049&quot; href=&quot;#bib95&quot; name=&quot;bbib95&quot;&gt;&lt;span data-dcnode-id=&quot;8050&quot; instrument_node=&quot;&quot;&gt;Shifren &amp;amp; Hooker, 1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8048&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8039&quot;&gt;&lt;span data-dcnode-id=&quot;8046&quot; instrument_node=&quot;&quot;&gt;Other studies have targeted events that might be viewed as challenging, but are less severe. For example, starting college is a stressful time. At least two studies have examined the role of optimism among students adjusting to their first semester (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8044&quot; href=&quot;#bib9&quot; name=&quot;bbib9&quot;&gt;&lt;span data-dcnode-id=&quot;8045&quot; instrument_node=&quot;&quot;&gt;Aspinwall &amp;amp; Taylor, 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8043&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8041&quot; href=&quot;#bib14&quot; name=&quot;bbib14&quot;&gt;&lt;span data-dcnode-id=&quot;8042&quot; instrument_node=&quot;&quot;&gt;Brissette et al., 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8040&quot; instrument_node=&quot;&quot;&gt;). Optimism and other variables were assessed when the students arrived on campus, and measures of well-being were obtained at the end of the semester. Higher optimism predicted less distress at the end of the semester.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8034&quot;&gt;&lt;span data-dcnode-id=&quot;8038&quot; instrument_node=&quot;&quot;&gt;Indeed, the simple process of late-life aging is a challenge, confronting people with a variety of circumstances to which people must adjust. A Dutch study of elderly men examined the role of personality at the initial assessment as a predictor of depression across a 15-year follow-up (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8036&quot; href=&quot;#bib39&quot; name=&quot;bbib39&quot;&gt;&lt;span data-dcnode-id=&quot;8037&quot; instrument_node=&quot;&quot;&gt;Giltay, Zitman, &amp;amp; Kromhout, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8035&quot; instrument_node=&quot;&quot;&gt;). Optimism predicted significantly lower cumulative incidence of depression symptoms.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7934&quot; id=&quot;aep-section-id17&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;8026&quot;&gt;&lt;span data-dcnode-id=&quot;8031&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;span data-dcnode-id=&quot;8029&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;8027&quot; instrument_node=&quot;&quot;&gt;Optimism, pessimism, and coping&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;8024&quot;&gt;&lt;span data-dcnode-id=&quot;8025&quot; instrument_node=&quot;&quot;&gt;If optimists experience less distress than pessimists when under adversity, is it just because they are cheerful people? That apparently is not the full story, because the differences often remain when controls are included for prior distress. This section considers another path to differences in well-being: differences in coping. The ways in which optimists and pessimists differ in coping resemble the differences in broad behavioral tendencies discussed earlier in the article. That is, people who are confident about eventual success continue trying, even when the going is hard. People who are doubtful try to escape the adversity by wishful thinking, they are drawn into temporary distractions that don't help solve the problem, and they sometimes even stop trying.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8016&quot;&gt;&lt;span data-dcnode-id=&quot;8023&quot; instrument_node=&quot;&quot;&gt;Differences in coping that correspond to this picture have been found in a number of studies (for detailed review and meta-analysis see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8021&quot; href=&quot;#bib99&quot; name=&quot;bbib99&quot;&gt;&lt;span data-dcnode-id=&quot;8022&quot; instrument_node=&quot;&quot;&gt;Solberg Nes &amp;amp; Segerstrom, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8020&quot; instrument_node=&quot;&quot;&gt;). Early studies examined student reports of situational coping responses and general coping styles (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8018&quot; href=&quot;#bib81&quot; name=&quot;bbib81&quot;&gt;&lt;span data-dcnode-id=&quot;8019&quot; instrument_node=&quot;&quot;&gt;Scheier, Carver, &amp;amp; Bridges, 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8017&quot; instrument_node=&quot;&quot;&gt;), finding that optimists appear generally to be approach copers, and pessimists appear to be avoidant copers. Conceptually similar results have followed repeatedly.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8011&quot;&gt;&lt;span data-dcnode-id=&quot;8015&quot; instrument_node=&quot;&quot;&gt;Other projects have studied coping strategies in specific difficult contexts. Indeed, several of the studies described earlier, in the context of well-being, also looked at coping. In their study of coronary artery bypass surgery, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8013&quot; href=&quot;#bib82&quot; name=&quot;bbib82&quot;&gt;&lt;span data-dcnode-id=&quot;8014&quot; instrument_node=&quot;&quot;&gt;Scheier et al. (1989)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8012&quot; instrument_node=&quot;&quot;&gt; assessed attentional–cognitive strategies as ways of dealing with the experience. Before surgery, optimists more than pessimists reported making plans for their future and setting goals for recovery. Optimists also focused less on negative aspects of the experience—distress and symptoms. Once surgery was past, optimists were more likely than pessimists to report seeking out information about what the physician would require of them in the months ahead. Optimists also were less likely to say they were suppressing thoughts about their symptoms. There was also evidence that the positive impact of optimism on quality of life six months later occurred through the indirect effect of these differences in coping.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8006&quot;&gt;&lt;span data-dcnode-id=&quot;8010&quot; instrument_node=&quot;&quot;&gt;The study of failed in vitro fertilization described earlier (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8008&quot; href=&quot;#bib54&quot; name=&quot;bbib54&quot;&gt;&lt;span data-dcnode-id=&quot;8009&quot; instrument_node=&quot;&quot;&gt;Litt et al., 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8007&quot; instrument_node=&quot;&quot;&gt;) also examined coping. Pessimism related to escape as a coping response. Escape, in turn, led to more distress after the fertilization failure. Optimists were also more likely than pessimists to report feeling they had benefited from the experience—for example, by becoming closer to their spouse.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8001&quot;&gt;&lt;span data-dcnode-id=&quot;8005&quot; instrument_node=&quot;&quot;&gt;Relations between optimism and coping also have been examined among cancer patients in several studies. &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;8003&quot; href=&quot;#bib101&quot; name=&quot;bbib101&quot;&gt;&lt;span data-dcnode-id=&quot;8004&quot; instrument_node=&quot;&quot;&gt;Stanton and Snider (1993)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8002&quot; instrument_node=&quot;&quot;&gt; found that pessimistic women used more cognitive avoidance in coping with an upcoming biopsy than optimists. Cognitive avoidance before the biopsy predicted distress afterward among women with positive diagnoses.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7996&quot;&gt;&lt;span data-dcnode-id=&quot;8000&quot; instrument_node=&quot;&quot;&gt;Another study of cancer patients mentioned earlier (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7998&quot; href=&quot;#bib20&quot; name=&quot;bbib20&quot;&gt;&lt;span data-dcnode-id=&quot;7999&quot; instrument_node=&quot;&quot;&gt;Carver et al., 1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7997&quot; instrument_node=&quot;&quot;&gt;) examined how women coped with treatment for breast cancer during the first year after diagnosis. Both before and after surgery, optimism related to coping that involved accepting the reality of the situation as one that must be dealt with, placing as positive a light on it as possible, and trying to relieve the situation with humor. Pessimism related to overt denial (reports of trying to push the reality of the situation away) and to giving-up tendencies at each time point. The coping responses that were related to optimism and pessimism were also related to distress. Further analyses revealed that the effect of optimism on distress was largely indirect through coping, particularly at postsurgery.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7991&quot;&gt;&lt;span data-dcnode-id=&quot;7995&quot; instrument_node=&quot;&quot;&gt;Another study of coping among women under treatment for breast cancer (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7993&quot; href=&quot;#bib84&quot; name=&quot;bbib84&quot;&gt;&lt;span data-dcnode-id=&quot;7994&quot; instrument_node=&quot;&quot;&gt;Schou, Ekeberg, &amp;amp; Ruland, 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7992&quot; instrument_node=&quot;&quot;&gt;) focused on two coping responses: fighting spirit (confronting the cancer and trying to beat it) and hopelessness/helplessness (feeling a sense of giving up). These responses mediated the relationship between optimism and quality of life a year after diagnosis. The greater fighting spirit of optimists (assessed before diagnosis) predicted better quality of life at the one-year follow-up. Hopelessness/helplessness (reported by pessimists) predicted poorer quality of life.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;7935&quot; id=&quot;aep-section-id18&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7985&quot;&gt;&lt;span data-dcnode-id=&quot;7990&quot; instrument_node=&quot;&quot;&gt;3.1&lt;/span&gt;&lt;span data-dcnode-id=&quot;7988&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7986&quot; instrument_node=&quot;&quot;&gt;Categories of coping&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;7959&quot;&gt;&lt;span data-dcnode-id=&quot;7984&quot; instrument_node=&quot;&quot;&gt;As reflected in the preceding paragraphs, there are many distinct ways to cope, and many different ways to assess coping (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7982&quot; href=&quot;#bib26&quot; name=&quot;bbib26&quot;&gt;&lt;span data-dcnode-id=&quot;7983&quot; instrument_node=&quot;&quot;&gt;Compas et al., 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7981&quot; instrument_node=&quot;&quot;&gt;; &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7979&quot; href=&quot;#bib113&quot; name=&quot;bbib113&quot;&gt;&lt;span data-dcnode-id=&quot;7980&quot; instrument_node=&quot;&quot;&gt;Folkman &amp;amp; Moskowitz, 2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7978&quot; instrument_node=&quot;&quot;&gt;; &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7976&quot; href=&quot;#bib97&quot; name=&quot;bbib97&quot;&gt;&lt;span data-dcnode-id=&quot;7977&quot; instrument_node=&quot;&quot;&gt;Skinner et al., 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7975&quot; instrument_node=&quot;&quot;&gt;). There are also many ways to categorize these various responses (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7973&quot; href=&quot;#bib16&quot; name=&quot;bbib16&quot;&gt;&lt;span data-dcnode-id=&quot;7974&quot; instrument_node=&quot;&quot;&gt;Carver &amp;amp; Connor-Smith, 2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7972&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7970&quot; href=&quot;#bib97&quot; name=&quot;bbib97&quot;&gt;&lt;span data-dcnode-id=&quot;7971&quot; instrument_node=&quot;&quot;&gt;Skinner et al., 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7969&quot; instrument_node=&quot;&quot;&gt;). Perhaps the best known distinction, made very early in the analysis of coping, is between problem-focused coping—aimed at doing something about the stressor itself to blunt its impact—and emotion-focused coping—aimed at soothing distress (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7967&quot; href=&quot;#bib115&quot; name=&quot;bbib115&quot;&gt;&lt;span data-dcnode-id=&quot;7968&quot; instrument_node=&quot;&quot;&gt;Lazarus &amp;amp; Folkman, 1984&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7966&quot; instrument_node=&quot;&quot;&gt;). Another particularly important distinction is between engagement or approach coping—aimed at dealing with the stressor or emotions stemming from it—and disengagement or avoidance coping—aimed at escaping the stressor or emotions stemming from it (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7964&quot; href=&quot;#bib75&quot; name=&quot;bbib75&quot;&gt;&lt;span data-dcnode-id=&quot;7965&quot; instrument_node=&quot;&quot;&gt;Roth &amp;amp; Cohen, 1986&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7963&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7961&quot; href=&quot;#bib97&quot; name=&quot;bbib97&quot;&gt;&lt;span data-dcnode-id=&quot;7962&quot; instrument_node=&quot;&quot;&gt;Skinner et al., 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7960&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7954&quot;&gt;&lt;span data-dcnode-id=&quot;7958&quot; instrument_node=&quot;&quot;&gt;In their meta-analysis of optimism and coping, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7956&quot; href=&quot;#bib99&quot; name=&quot;bbib99&quot;&gt;&lt;span data-dcnode-id=&quot;7957&quot; instrument_node=&quot;&quot;&gt;Solberg Nes and Segerstrom (2006)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7955&quot; instrument_node=&quot;&quot;&gt; crossed these two distinctions, fitting particular coping responses from various studies into the 4 resulting categories. Optimism was positively associated with broad measures of engagement coping, and with problem-focused coping. Optimism was also positively, and about equivalently, associated with the two subsets of engagement coping responses: those that are problem-focused (e.g., planning, seeking instrumental support) and those that are emotion-focused (e.g., cognitive restructuring, acceptance). Furthermore, optimists were responsive to what sort of stressor was being confronted. Optimism predicted more problem-focused coping with controllable stressors (e.g., academic demands) and more emotion-focused coping with uncontrollable stressors (e.g., trauma). Thus, optimism predicted active attempts to both change and accommodate to stressful circumstances, in ways that reflect flexible engagement.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7952&quot;&gt;&lt;span data-dcnode-id=&quot;7953&quot; instrument_node=&quot;&quot;&gt;The pattern for disengagement coping was generally opposite that of engagement coping. Optimism related negatively to disengagement coping, and to both specific subsets of problem-focused disengagement (e.g., behavioral disengagement) and emotion-focused disengagement (e.g., denial, wishful thinking). As would be expected from the expectancy-value viewpoint, then, the relationship of optimism to coping differed far more substantially between engagement and disengagement than between problem focus and emotion focus.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7947&quot;&gt;&lt;span data-dcnode-id=&quot;7951&quot; instrument_node=&quot;&quot;&gt;In sum, optimists appear to differ from pessimists in stable coping tendencies and in coping responses that emerge when confronting stressful situations (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7949&quot; href=&quot;#bib99&quot; name=&quot;bbib99&quot;&gt;&lt;span data-dcnode-id=&quot;7950&quot; instrument_node=&quot;&quot;&gt;Solberg Nes &amp;amp; Segerstrom, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7948&quot; instrument_node=&quot;&quot;&gt;). Particularly noteworthy may be the contrast between acceptance and active denial. Denial (refusing to accept the reality of the situation) means trying to maintain a worldview that is no longer valid. Acceptance implies restructuring one's perceptions to come to grips with the situation.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7936&quot;&gt;&lt;span data-dcnode-id=&quot;7946&quot; instrument_node=&quot;&quot;&gt;It should be stressed that acceptance here does not mean giving up. There is evidence that resignation to illness may actually hasten death (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7944&quot; href=&quot;#bib41&quot; name=&quot;bbib41&quot;&gt;&lt;span data-dcnode-id=&quot;7945&quot; instrument_node=&quot;&quot;&gt;Greer et al., 1990&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7943&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7941&quot; href=&quot;#bib72&quot; name=&quot;bbib72&quot;&gt;&lt;span data-dcnode-id=&quot;7942&quot; instrument_node=&quot;&quot;&gt;Reed et al., 1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7940&quot; instrument_node=&quot;&quot;&gt;). Acceptance of the reality of the diagnosis has different consequences. By accepting that life is compromised (but not over), people develop adaptive parameters within which to live the time that's left to them. Acceptance may actually serve the purpose of keeping the person goal-engaged, and indeed “life-engaged” (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7938&quot; href=&quot;#bib79&quot; name=&quot;bbib79&quot;&gt;&lt;span data-dcnode-id=&quot;7939&quot; instrument_node=&quot;&quot;&gt;Scheier &amp;amp; Carver, 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7937&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7857&quot; id=&quot;aep-section-id19&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7928&quot;&gt;&lt;span data-dcnode-id=&quot;7933&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;span data-dcnode-id=&quot;7931&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7929&quot; instrument_node=&quot;&quot;&gt;Fostering and interfering with well-being&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;7923&quot;&gt;&lt;span data-dcnode-id=&quot;7927&quot; instrument_node=&quot;&quot;&gt;The concept of coping readily broadens into related content areas. A simple extension is to what has been called preventive or proactive coping (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7925&quot; href=&quot;#bib114&quot; name=&quot;bbib114&quot;&gt;&lt;span data-dcnode-id=&quot;7926&quot; instrument_node=&quot;&quot;&gt;Aspinwall &amp;amp; Taylor, 1997&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7924&quot; instrument_node=&quot;&quot;&gt;), processes that promote good health and well-being rather than just reacting to adversity. Perhaps optimists take active steps to ensure positive outcomes in their future. This would resemble problem-focused coping, except that it is intended to prevent a stressor from arising.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;7890&quot; id=&quot;aep-section-id20&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7917&quot;&gt;&lt;span data-dcnode-id=&quot;7922&quot; instrument_node=&quot;&quot;&gt;4.1&lt;/span&gt;&lt;span data-dcnode-id=&quot;7920&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;7918&quot; instrument_node=&quot;&quot;&gt;Optimism and health promotion&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;7912&quot;&gt;&lt;span data-dcnode-id=&quot;7916&quot; instrument_node=&quot;&quot;&gt;There are many ways in which this might occur. An example is seeking knowledge pertaining to areas of potential risk. One study investigated heart-attack-related knowledge in a group of middle-aged adults (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7914&quot; href=&quot;#bib67&quot; name=&quot;bbib67&quot;&gt;&lt;span data-dcnode-id=&quot;7915&quot; instrument_node=&quot;&quot;&gt;Radcliffe &amp;amp; Klein, 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7913&quot; instrument_node=&quot;&quot;&gt;). Some might expect that adults who are optimistic would not make much effort to learn about risks related to heart attacks. Those high in dispositional optimism, however, actually knew more about the risk factors than those who were less optimistic.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7901&quot;&gt;&lt;span data-dcnode-id=&quot;7911&quot; instrument_node=&quot;&quot;&gt;Proactive efforts in health promotion have also been examined among patients in a cardiac rehabilitation program (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7909&quot; href=&quot;#bib94&quot; name=&quot;bbib94&quot;&gt;&lt;span data-dcnode-id=&quot;7910&quot; instrument_node=&quot;&quot;&gt;Shepperd, Maroto, &amp;amp; Pbert, 1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7908&quot; instrument_node=&quot;&quot;&gt;). Optimism predicted success in lowering levels of saturated fat, body fat, and an index of overall coronary risk. Optimism also related to increases in exercise. Another study of the lifestyles of coronary artery bypass patients five years after surgery found optimists more likely than pessimists to be taking vitamins, eating low-fat foods, and to be enrolled in a cardiac rehabilitation program (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7906&quot; href=&quot;#bib78&quot; name=&quot;bbib78&quot;&gt;&lt;span data-dcnode-id=&quot;7907&quot; instrument_node=&quot;&quot;&gt;Scheier &amp;amp; Carver, 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7905&quot; instrument_node=&quot;&quot;&gt;). Another proactive health-related behavior concerns HIV risk. By avoiding certain sexual practices (e.g., sex with unknown partners), people reduce risk of infection. One study of HIV-negative gay men found that optimists reported fewer anonymous sexual partners than pessimists (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7903&quot; href=&quot;#bib106&quot; name=&quot;bbib106&quot;&gt;&lt;span data-dcnode-id=&quot;7904&quot; instrument_node=&quot;&quot;&gt;Taylor et al., 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7902&quot; instrument_node=&quot;&quot;&gt;). This suggests that optimists were making efforts to reduce their risk, safeguarding their health.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7896&quot;&gt;&lt;span data-dcnode-id=&quot;7900&quot; instrument_node=&quot;&quot;&gt;In sum, optimists appear to take action to minimize health risks. They do not simply stick their heads in the sand and ignore threats to well-being. They attend to risks, but they do so selectively. They focus on risks that apply to them and relate to potentially serious health problems (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;7898&quot; href=&quot;#bib7&quot; name=&quot;bbib7&quot;&gt;&lt;span data-dcnode-id=&quot;7899&quot; instrument_node=&quot;&quot;&gt;Aspinwall &amp;amp; Brunhart, 1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7897&quot; instrument_node=&quot;&quot;&gt;). If the potential problem is minor, or if it is unlikely to bear on them, they are not especially vigilant. Optimists appear to scan for threats to well-being but save their behavioral responses for threats that are truly meaningful.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7891&quot;&gt;&lt;span data-dcnode-id=&quot;7895&quot; instrument_node=&quot;&quot;&gt;It might seem paradoxical that people who expect good things to happen take active steps to make sure good things &lt;/span&gt;&lt;em data-dcnode-id=&quot;7893&quot;&gt;&lt;span data-dcnode-id=&quot;7894&quot; instrument_node=&quot;&quot;&gt;do&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;7892&quot; instrument_node=&quot;&quot;&gt; happen. But experience presumably teaches people that their own efforts play an important part in many kinds of life outcomes. Optimists may be more confident than pessimists that their efforts will be successful. For that reason, they are quicker to engage those efforts when there is a need for them.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;7858&quot; id=&quot;aep-section-id21&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;7884&quot;&gt;&lt;span data-dcnode-id=&quot;7889&quot; ins
