silience-counseling.jpeg 800w&quot; sizes=&quot;(max-width: 300px) 100vw, 300px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;span data-dcnode-id=&quot;1794&quot; instrument_node=&quot;&quot;&gt;Trauma is part of life and will be faced by all of us at some point.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1790&quot;&gt;&lt;span data-dcnode-id=&quot;1791&quot; instrument_node=&quot;&quot;&gt;While it will lead to prolonged distress for some, others will return from the ordeal stronger in mind and spirit, having met the challenge and returned to purposeful lives (Southwick &amp;amp; Charney, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1789&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1787&quot;&gt;&lt;span data-dcnode-id=&quot;1788&quot; instrument_node=&quot;&quot;&gt;While it is neither realistic nor advisable to shield yourself from risk, it is possible to develop resilience and rise to “the challenge of tough times and find unimagined strengths within yourself” (Neenan, 2018, p. 3).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1786&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1784&quot;&gt;&lt;span data-dcnode-id=&quot;1785&quot; instrument_node=&quot;&quot;&gt;This article explores how counseling can help build such resilience in clients, helping them to see adversity as an opportunity for growth and using existing and new psychological potential to overcome challenges.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1783&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1778&quot;&gt;&lt;span data-dcnode-id=&quot;1782&quot; instrument_node=&quot;&quot;&gt;Before you continue, we thought you might like to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1780&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//tools.positivepsychology.com/resilience-pack&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1781&quot; instrument_node=&quot;&quot;&gt;download our three Resilience Exercises for free&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1779&quot; instrument_node=&quot;&quot;&gt;. These engaging, science-based exercises will help you to effectively deal with difficult circumstances and give you the tools to improve the resilience of your clients, students, or employees.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1777&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1729&quot; id=&quot;inhoud&quot;&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1774&quot;&gt;&lt;span data-dcnode-id=&quot;1775&quot; instrument_node=&quot;&quot;&gt;This Article Contains:&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1731&quot;&gt;&lt;span data-dcnode-id=&quot;1772&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1769&quot;&gt;&lt;a data-dcnode-id=&quot;1770&quot; href=&quot;#resilience&quot;&gt;&lt;span data-dcnode-id=&quot;1771&quot; instrument_node=&quot;&quot;&gt;What Is Resilience in Counseling?&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1768&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1765&quot;&gt;&lt;a data-dcnode-id=&quot;1766&quot; href=&quot;#examples&quot;&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt;2 Examples of Fostering Resilience&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1761&quot;&gt;&lt;a data-dcnode-id=&quot;1762&quot; href=&quot;#importance&quot;&gt;&lt;span data-dcnode-id=&quot;1763&quot; instrument_node=&quot;&quot;&gt;Why Is Resilience Important in Counseling?&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1757&quot;&gt;&lt;a data-dcnode-id=&quot;1758&quot; href=&quot;#building&quot;&gt;&lt;span data-dcnode-id=&quot;1759&quot; instrument_node=&quot;&quot;&gt;How to Build Resilience in Counseling&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1753&quot;&gt;&lt;a data-dcnode-id=&quot;1754&quot; href=&quot;#interventions&quot;&gt;&lt;span data-dcnode-id=&quot;1755&quot; instrument_node=&quot;&quot;&gt;4 Interventions and Techniques for Counselors&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1752&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1749&quot;&gt;&lt;a data-dcnode-id=&quot;1750&quot; href=&quot;#activities&quot;&gt;&lt;span data-dcnode-id=&quot;1751&quot; instrument_node=&quot;&quot;&gt;3 Best Activities, Worksheets, and Exercises&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1745&quot;&gt;&lt;a data-dcnode-id=&quot;1746&quot; href=&quot;#group&quot;&gt;&lt;span data-dcnode-id=&quot;1747&quot; instrument_node=&quot;&quot;&gt;A Look at Group Resilience Counseling&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1741&quot;&gt;&lt;a data-dcnode-id=&quot;1742&quot; href=&quot;#resources&quot;&gt;&lt;span data-dcnode-id=&quot;1743&quot; instrument_node=&quot;&quot;&gt;Resources From PositivePsychology.com&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1737&quot;&gt;&lt;a data-dcnode-id=&quot;1738&quot; href=&quot;#home&quot;&gt;&lt;span data-dcnode-id=&quot;1739&quot; instrument_node=&quot;&quot;&gt;A Take-Home Message&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1733&quot;&gt;&lt;a data-dcnode-id=&quot;1734&quot; href=&quot;#references&quot;&gt;&lt;span data-dcnode-id=&quot;1735&quot; instrument_node=&quot;&quot;&gt;References&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1732&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1730&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1728&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1726&quot;&gt;&lt;a data-dcnode-id=&quot;1727&quot; name=&quot;resilience&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1725&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1723&quot;&gt;&lt;span data-dcnode-id=&quot;1724&quot; instrument_node=&quot;&quot;&gt;What Is Resilience in Counseling?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1722&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1714&quot;&gt;&lt;span data-dcnode-id=&quot;1721&quot; instrument_node=&quot;&quot;&gt;While the popular view of resilience is that we can and should &lt;/span&gt;&lt;em data-dcnode-id=&quot;1719&quot;&gt;&lt;span data-dcnode-id=&quot;1720&quot; instrument_node=&quot;&quot;&gt;bounce back&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1718&quot; instrument_node=&quot;&quot;&gt; from adversity, this may not be a helpful &lt;/span&gt;&lt;a data-dcnode-id=&quot;1716&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/popular-counseling-approaches/&quot;&gt;&lt;span data-dcnode-id=&quot;1717&quot; instrument_node=&quot;&quot;&gt;approach in resilience counseling&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1715&quot; instrument_node=&quot;&quot;&gt;. It suggests that the resilient person effortlessly overcomes tough times to return to ‘normal’ without missing a beat (Neenan, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1708&quot;&gt;&lt;span data-dcnode-id=&quot;1712&quot; instrument_node=&quot;&quot;&gt;And yet, this is rarely the case. When we face genuine adversity, do our lives truly return to how things were before? Constantly looking back to how things used to be before a life-changing accident can lead to us becoming psychologically &lt;/span&gt;&lt;em data-dcnode-id=&quot;1710&quot;&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;stuck&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1709&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1702&quot;&gt;&lt;span data-dcnode-id=&quot;1706&quot; instrument_node=&quot;&quot;&gt;Whether facing traumatic adversity or overcoming something less severe but still significant (such as layoffs at work or a challenging client), &lt;/span&gt;&lt;em data-dcnode-id=&quot;1704&quot;&gt;&lt;span data-dcnode-id=&quot;1705&quot; instrument_node=&quot;&quot;&gt;coming back&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1703&quot; instrument_node=&quot;&quot;&gt; requires time for adaptation and recovery (Neenan, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1696&quot;&gt;&lt;span data-dcnode-id=&quot;1700&quot; instrument_node=&quot;&quot;&gt;Counseling &lt;/span&gt;&lt;a data-dcnode-id=&quot;1698&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/what-is-resilience/&quot;&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;resilience&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1697&quot; instrument_node=&quot;&quot;&gt; typically involves a strong focus on how we interpret events. Through understanding their clients’ thinking, counselors gain insight into their inner world and identify attitudes and beliefs that are helping, harming, or hindering their ability to cope with difficult times and challenging events (Neenan, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1695&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1693&quot;&gt;&lt;span data-dcnode-id=&quot;1694&quot; instrument_node=&quot;&quot;&gt;Resilience counseling invites consideration and focus on the following resilience factors (Southwick &amp;amp; Charney, 2018):&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1692&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1636&quot;&gt;&lt;span data-dcnode-id=&quot;1691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1684&quot;&gt;&lt;em data-dcnode-id=&quot;1689&quot;&gt;&lt;span data-dcnode-id=&quot;1690&quot; instrument_node=&quot;&quot;&gt;Facing fear&lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1688&quot;&gt;&lt;span data-dcnode-id=&quot;1687&quot; instrument_node=&quot;&quot;&gt;
Showing courage and resilience does not suggest the absence of fear.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1686&quot;&gt;&lt;br data-dcnode-id=&quot;1685&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1683&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1676&quot;&gt;&lt;em data-dcnode-id=&quot;1681&quot;&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;Imitating resilient role models&lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1680&quot;&gt;&lt;span data-dcnode-id=&quot;1679&quot; instrument_node=&quot;&quot;&gt;
Mirroring and adopting resilient behavior in those we admire can inspire our resilience.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1678&quot;&gt;&lt;br data-dcnode-id=&quot;1677&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1675&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1668&quot;&gt;&lt;em data-dcnode-id=&quot;1673&quot;&gt;&lt;span data-dcnode-id=&quot;1674&quot; instrument_node=&quot;&quot;&gt;Social support&lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1672&quot;&gt;&lt;span data-dcnode-id=&quot;1671&quot; instrument_node=&quot;&quot;&gt;
Resilience is reliant not solely on the individual, but also on having an entire support network.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1670&quot;&gt;&lt;br data-dcnode-id=&quot;1669&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1667&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1660&quot;&gt;&lt;em data-dcnode-id=&quot;1665&quot;&gt;&lt;span data-dcnode-id=&quot;1666&quot; instrument_node=&quot;&quot;&gt;Mental, emotional, and physical training&lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1664&quot;&gt;&lt;span data-dcnode-id=&quot;1663&quot; instrument_node=&quot;&quot;&gt;
Experiencing challenges and hardship is not always negative. When accompanied and supported by training, it can result in opportunities to learn to be more resilient.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1662&quot;&gt;&lt;br data-dcnode-id=&quot;1661&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1659&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1652&quot;&gt;&lt;em data-dcnode-id=&quot;1657&quot;&gt;&lt;span data-dcnode-id=&quot;1658&quot; instrument_node=&quot;&quot;&gt;Increasing cognitive and emotional flexibility&lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1656&quot;&gt;&lt;span data-dcnode-id=&quot;1655&quot; instrument_node=&quot;&quot;&gt;
Resilient people tend to be flexible in how they think about challenges and their reaction to stress.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1654&quot;&gt;&lt;br data-dcnode-id=&quot;1653&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1651&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1644&quot;&gt;&lt;em data-dcnode-id=&quot;1649&quot;&gt;&lt;span data-dcnode-id=&quot;1650&quot; instrument_node=&quot;&quot;&gt;Finding meaning, purpose, and growth&lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1648&quot;&gt;&lt;span data-dcnode-id=&quot;1647&quot; instrument_node=&quot;&quot;&gt;
There are many examples of individuals who have remained resilient in the face of extreme hardship, relying heavily on the meaning they attach to their lives.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1646&quot;&gt;&lt;br data-dcnode-id=&quot;1645&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1638&quot;&gt;&lt;em data-dcnode-id=&quot;1641&quot;&gt;&lt;span data-dcnode-id=&quot;1642&quot; instrument_node=&quot;&quot;&gt;Fostering optimism&lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1640&quot;&gt;&lt;span data-dcnode-id=&quot;1639&quot; instrument_node=&quot;&quot;&gt;
Realistic optimism is an important factor in remaining resilient.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1637&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1635&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1633&quot;&gt;&lt;span data-dcnode-id=&quot;1634&quot; instrument_node=&quot;&quot;&gt;While far from exhaustive, the list begins to suggest the wide range of factors involved in building and maintaining resilience and its impact on our lives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1630&quot;&gt;&lt;span data-dcnode-id=&quot;1631&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1629&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1627&quot;&gt;&lt;a data-dcnode-id=&quot;1628&quot; name=&quot;examples&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1626&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1624&quot;&gt;&lt;span data-dcnode-id=&quot;1625&quot; instrument_node=&quot;&quot;&gt;2 Examples of Fostering Resilience&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1618&quot;&gt;&lt;img alt=&quot;Fostering resilience&quot; class=&quot;alignright wp-image-141333 size-medium lazyload&quot; data-dcnode-id=&quot;1622&quot; data-src=&quot;https://positivepsychology.com/wp-content/uploads/2021/11/Fostering-resilience-300x150.jpeg&quot; data-srcset=&quot;https://positivepsychology.com/wp-content/uploads/2021/11/Fostering-resilience-300x150.jpeg 300w, https://positivepsychology.com/wp-content/uploads/2021/11/Fostering-resilience-768x384.jpeg 768w, https://positivepsychology.com/wp-content/uploads/2021/11/Fostering-resilience.jpeg 800w&quot; height=&quot;150&quot; sizes=&quot;(max-width: 300px) 100vw, 300px&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; title=&quot;Reasons to foster resilience&quot; width=&quot;300&quot;&gt;&lt;noscript data-dcnode-id=&quot;1620&quot;&gt;&lt;span data-dcnode-id=&quot;1621&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignright wp-image-141333 size-medium lazyload&quot; title=&quot;Reasons to foster resilience&quot; src=&quot;https://positivepsychology.com/wp-content/uploads/2021/11/Fostering-resilience-300x150.jpeg&quot; alt=&quot;Fostering resilience&quot; width=&quot;300&quot; height=&quot;150&quot; srcset=&quot;https://positivepsychology.com/wp-content/uploads/2021/11/Fostering-resilience-300x150.jpeg 300w, https://positivepsychology.com/wp-content/uploads/2021/11/Fostering-resilience-768x384.jpeg 768w, https://positivepsychology.com/wp-content/uploads/2021/11/Fostering-resilience.jpeg 800w&quot; sizes=&quot;(max-width: 300px) 100vw, 300px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;While undoubtedly there are traits that support our resilient response, resilience can be grown through instruction and successfully overcoming adversity (Pemberton, 2015; Neenan, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1615&quot;&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt;The following two examples are very different accounts of individuals fostering resilience:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1606&quot;&gt;&lt;span data-dcnode-id=&quot;1613&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1608&quot;&gt;&lt;em data-dcnode-id=&quot;1611&quot;&gt;&lt;span data-dcnode-id=&quot;1612&quot; instrument_node=&quot;&quot;&gt;Mary’s story&lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1610&quot;&gt;&lt;span data-dcnode-id=&quot;1609&quot; instrument_node=&quot;&quot;&gt;
Mary had an incredibly tough childhood. She lost her mother to cancer, had a verbally abusive father, and had a difficult relationship with her step-mother and much older step-brother (Luthans, Youssef, &amp;amp; Avolio, 2015).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1607&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1603&quot; style=&quot;padding-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;1604&quot; instrument_node=&quot;&quot;&gt;Placed in the foster care system, Mary experienced an early life full of uncertainty and instability. And yet, she tells of a point that changed everything. When a close school friend “challenged her to take control of her life,” she decided, there and then, to “hold onto only those things that could be in her control” (Luthans et al., 2015, p. 147).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1602&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1600&quot; style=&quot;padding-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;1601&quot; instrument_node=&quot;&quot;&gt;Creating her own interpretation of resilience, she gave everything to her education and sports. Excelling at both, she went on to be awarded a full scholarship at a top university. Despite further bumps along the road, she later became a successful bank executive.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1599&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1591&quot;&gt;&lt;span data-dcnode-id=&quot;1598&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1593&quot;&gt;&lt;em data-dcnode-id=&quot;1596&quot;&gt;&lt;span data-dcnode-id=&quot;1597&quot; instrument_node=&quot;&quot;&gt;Jan’s story&lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1595&quot;&gt;&lt;span data-dcnode-id=&quot;1594&quot; instrument_node=&quot;&quot;&gt;
Jan arrived in therapy intending to change her behavior to make her boss recognize that his treatment of her was unfair and getting in the way of new opportunities (Pemberton, 2015).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1585&quot; style=&quot;padding-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;Over several counseling sessions, she became aware that “the &lt;/span&gt;&lt;em data-dcnode-id=&quot;1587&quot;&gt;&lt;span data-dcnode-id=&quot;1588&quot; instrument_node=&quot;&quot;&gt;powerless victim&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt; did not serve her well” or reflect who she really was. Once she realized her resilience was not reliant on her working for the organization and that she had managed many other difficult situations in other areas of her life, she stopped talking and acting like a victim (Pemberton, 2015, p. 36).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1582&quot; style=&quot;padding-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;Jan learned to tolerate uncertainty and gain self-confidence through adopting a more resilient outlook of “positive emergence” (Pemberton, 2015, p. 36).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1579&quot;&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1576&quot;&gt;&lt;a data-dcnode-id=&quot;1577&quot; name=&quot;importance&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1573&quot;&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;Why Is Resilience Important in Counseling?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1572&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1570&quot;&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt;As a coach or counselor, it will not be long before you encounter a client whose life has been shaken to the core by events – a death, accident, illness, betrayal, or violence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1569&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1564&quot;&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;Thankfully, it is possible to help those who have experienced trauma, providing support to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1566&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/resilience-training-build-resilient-individuals-groups/&quot;&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;build the resilience&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1565&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;needed to not only survive but ultimately flourish (Southwick &amp;amp; Charney, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1563&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1561&quot;&gt;&lt;span data-dcnode-id=&quot;1562&quot; instrument_node=&quot;&quot;&gt;After all, “a survivor and a person demonstrating resilience are not necessarily undergoing the same process of recovery” (Neenan, 2018, p. 8). Someone who survives trauma may be left bitter and consumed with anger, blame, and even guilt, while the resilient person seeks personal growth and a life with meaning.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1560&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1555&quot;&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt;The term &lt;/span&gt;&lt;em data-dcnode-id=&quot;1557&quot;&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;self-righting &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt;– a phrase taken from restoring an overturned boat to its upright position in the water – is sometimes used as a metaphor for getting an individual’s life back on track and is especially relevant for the role of the counselor during therapy (Neenan, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1552&quot;&gt;&lt;span data-dcnode-id=&quot;1553&quot; instrument_node=&quot;&quot;&gt;Neenan (2018) describes how the support and advice offered by a trusted mental health professional can considerably reduce the degree and length of the client’s struggle to overcome problems. Resilience is rarely developed in social isolation, and if constructive support is available, it should be taken.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1549&quot;&gt;&lt;span data-dcnode-id=&quot;1550&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1546&quot;&gt;&lt;a data-dcnode-id=&quot;1547&quot; name=&quot;building&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1543&quot;&gt;&lt;span data-dcnode-id=&quot;1544&quot; instrument_node=&quot;&quot;&gt;How to Build Resilience in Counseling&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1537&quot;&gt;&lt;img alt=&quot;How to build resilience in counseling&quot; class=&quot;alignright wp-image-73864 size-medium lazyload&quot; data-dcnode-id=&quot;1541&quot; data-src=&quot;https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-300x150.jpg&quot; data-srcset=&quot;https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy.jpg 800w&quot; height=&quot;150&quot; sizes=&quot;(max-width: 300px) 100vw, 300px&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; title=&quot;How to build resilience&quot; width=&quot;300&quot;&gt;&lt;noscript data-dcnode-id=&quot;1539&quot;&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignright wp-image-73864 size-medium lazyload&quot; title=&quot;How to build resilience&quot; src=&quot;https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-300x150.jpg&quot; alt=&quot;How to build resilience in counseling&quot; width=&quot;300&quot; height=&quot;150&quot; srcset=&quot;https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/positive-trauma-therapy.jpg 800w&quot; sizes=&quot;(max-width: 300px) 100vw, 300px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;There is no single proven approach for building resilience.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1534&quot;&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt;Resilience involves many factors and is underpinned by various support mechanisms; counseling must therefore be appropriate to the needs of the clients and the issues they present.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1531&quot;&gt;&lt;span data-dcnode-id=&quot;1532&quot; instrument_node=&quot;&quot;&gt;With multiple approaches available, we consider three broad therapeutic styles that can be used in isolation or combined as necessary (Neenan, 2018; Southwick &amp;amp; Charney, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1528&quot;&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1525&quot;&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt;Cognitive-Behavioral Therapy (CBT)&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1524&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1522&quot;&gt;&lt;span data-dcnode-id=&quot;1523&quot; instrument_node=&quot;&quot;&gt;CBT is a powerful approach for understanding the impact of our thoughts and beliefs on how we feel and act.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1519&quot;&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;CBT is particularly useful when working with clients to build resilience and learn to cope with unpredictable and often unwanted events. CBT interventions for building resilience might best be summed up with the statement, “it is not events, but our beliefs about them, that cause suffering” (Southwick &amp;amp; Charney, 2018, p. 52).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1516&quot;&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;Thoughts and beliefs, such as, “Why me?” or “I’m a failure,” can be replaced with more helpful, sustaining beliefs that encourage resilient thinking and behavior.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1513&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt;However, it is essential to note that CBT is not always the right approach to foster resilience. Timing (the moment the client recognizes that their beliefs may be holding them back) and a willingness to “see themselves as an agent in their own life” are crucial (Southwick &amp;amp; Charney, 2018, p. 64).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1510&quot;&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;Acceptance and Commitment Therapy (ACT)&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1504&quot;&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;ACT does not seek to deny the difficulties that bring us suffering; they are inescapable (Southwick &amp;amp; Charney, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1501&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;Rather than focusing on changing clients’ beliefs to foster resilience, ACT practitioners encourage their clients to learn to accept discomfort and experience what follows.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1495&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;Facing reality, rather than withdrawing or seeking to blame others, is vital to ACT. Practicing &lt;/span&gt;&lt;a data-dcnode-id=&quot;1497&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/grounding-techniques/&quot;&gt;&lt;span data-dcnode-id=&quot;1498&quot; instrument_node=&quot;&quot;&gt;mindfulness (grounding, in particular)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt; can help clients develop a flexible mindset and learn to accept the present rather than repeatedly re-running thoughts that lead to feelings of rejection, disappointment, or failure.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1492&quot;&gt;&lt;span data-dcnode-id=&quot;1493&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1491&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1489&quot;&gt;&lt;span data-dcnode-id=&quot;1490&quot; instrument_node=&quot;&quot;&gt;Solution-focused coaching&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1486&quot;&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;Solution-focused coaching has an almost instinctual appeal, possibly due to its apparent simplicity (Southwick &amp;amp; Charney, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1485&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1483&quot;&gt;&lt;span data-dcnode-id=&quot;1484&quot; instrument_node=&quot;&quot;&gt;Rather than focusing on helping the client understand their problems, counselors encourage them to uncover how they would feel if their problem were solved and what they currently do that makes them think change is possible.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1480&quot;&gt;&lt;span data-dcnode-id=&quot;1481&quot; instrument_node=&quot;&quot;&gt;This innovative approach recognizes that the client is the expert in their lives, not the coach. The client is then helped to uncover the resources they already possess to overcome difficulties they face, building and maintaining resilience.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1474&quot;&gt;&lt;span data-dcnode-id=&quot;1478&quot; instrument_node=&quot;&quot;&gt;While these three approaches to building resilience in therapy have proven incredibly helpful, there are others. The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1476&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/resilience-activities-exercises/&quot;&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;resilience exercises&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1475&quot; instrument_node=&quot;&quot;&gt; and interventions that follow are drawn from many counseling and therapeutic styles and can be beneficial to a variety of clients and situations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1473&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1471&quot;&gt;&lt;span data-dcnode-id=&quot;1472&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1470&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1468&quot;&gt;&lt;a data-dcnode-id=&quot;1469&quot; name=&quot;interventions&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1467&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1465&quot;&gt;&lt;span data-dcnode-id=&quot;1466&quot; instrument_node=&quot;&quot;&gt;4 Interventions and Techniques for Counselors&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1462&quot;&gt;&lt;span data-dcnode-id=&quot;1463&quot; instrument_node=&quot;&quot;&gt;The following is a selection of some of the many interventions and techniques available to counselors to build resilience in clients.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1459&quot;&gt;&lt;span data-dcnode-id=&quot;1460&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1456&quot;&gt;&lt;span data-dcnode-id=&quot;1457&quot; instrument_node=&quot;&quot;&gt;Understand your resilience&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1455&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1453&quot;&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;Pemberton (2015) lists three crucial areas that combine to form an individual’s resilience:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1452&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1441&quot;&gt;&lt;span data-dcnode-id=&quot;1451&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1449&quot;&gt;&lt;span data-dcnode-id=&quot;1450&quot; instrument_node=&quot;&quot;&gt;Resilience is a capacity partially shaped by innate personality factors.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1446&quot;&gt;&lt;span data-dcnode-id=&quot;1447&quot; instrument_node=&quot;&quot;&gt;Factors in the individual’s environment provide protection against the impact of the challenge.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1443&quot;&gt;&lt;span data-dcnode-id=&quot;1444&quot; instrument_node=&quot;&quot;&gt;Resilience can be learned through encountering difficulty and hardship.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1435&quot;&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;To gain insight into the relative contribution of each theme, ask your client the following &lt;/span&gt;&lt;a data-dcnode-id=&quot;1437&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/counseling-interview-questions/&quot;&gt;&lt;span data-dcnode-id=&quot;1438&quot; instrument_node=&quot;&quot;&gt;counseling interview questions&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1436&quot; instrument_node=&quot;&quot;&gt; (modified from Pemberton, 2015):&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1405&quot;&gt;&lt;span data-dcnode-id=&quot;1433&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1431&quot;&gt;&lt;span data-dcnode-id=&quot;1432&quot; instrument_node=&quot;&quot;&gt;Would you describe yourself as a naturally optimistic or pessimistic person?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1428&quot;&gt;&lt;span data-dcnode-id=&quot;1429&quot; instrument_node=&quot;&quot;&gt;How would your friends describe how you deal with life’s challenges and setbacks?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1425&quot;&gt;&lt;span data-dcnode-id=&quot;1426&quot; instrument_node=&quot;&quot;&gt;How easy do you find it to overcome difficulties?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1422&quot;&gt;&lt;span data-dcnode-id=&quot;1423&quot; instrument_node=&quot;&quot;&gt;What challenges did you encounter in early life?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1419&quot;&gt;&lt;span data-dcnode-id=&quot;1420&quot; instrument_node=&quot;&quot;&gt;What factors helped you with those challenges?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1418&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1416&quot;&gt;&lt;span data-dcnode-id=&quot;1417&quot; instrument_node=&quot;&quot;&gt;Who believed in you?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1415&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1413&quot;&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;What has been your most significant challenge so far?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1410&quot;&gt;&lt;span data-dcnode-id=&quot;1411&quot; instrument_node=&quot;&quot;&gt;How did you get yourself through it?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1407&quot;&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;What did you learn from that challenge that you continue to use in your life?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1406&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1399&quot;&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;The answers provide a clue regarding what shapes your resilience &lt;/span&gt;&lt;em data-dcnode-id=&quot;1401&quot;&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;and&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt; what might cause you to (temporarily) lose it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1396&quot;&gt;&lt;span data-dcnode-id=&quot;1397&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1395&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1393&quot;&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;Practicing solution-focused resilience&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1390&quot;&gt;&lt;span data-dcnode-id=&quot;1391&quot; instrument_node=&quot;&quot;&gt;Resilience regarding existing challenges can be built by revisiting lessons from similar challenges in the past, reminding the client of what they already know but may have forgotten (Southwick &amp;amp; Charney, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1389&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1384&quot;&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1386&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/11/Solution-Focused-Resilience-Template.pdf&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;Solution-Focused Resilience Template&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1385&quot; instrument_node=&quot;&quot;&gt; is a practical approach for helping clients (re)discover resources they can draw on for building resilience.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1383&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1381&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;What have you forgotten that you could use now to help you manage or overcome the present situation?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1380&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1378&quot;&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1375&quot;&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;Understanding the Impact of Attitudes on resilience&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1374&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1372&quot;&gt;&lt;span data-dcnode-id=&quot;1373&quot; instrument_node=&quot;&quot;&gt;“Attitudes are evaluations we make of an object, person, group, issue, situation or concept,” and they have three components (Neenan, 2018, p. 19):&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1371&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1354&quot;&gt;&lt;span data-dcnode-id=&quot;1370&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1366&quot;&gt;&lt;em data-dcnode-id=&quot;1368&quot;&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;Thoughts&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1367&quot; instrument_node=&quot;&quot;&gt; – What do you think about X?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1361&quot;&gt;&lt;em data-dcnode-id=&quot;1363&quot;&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt;Emotions&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt; – How do you feel about X?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1356&quot;&gt;&lt;em data-dcnode-id=&quot;1358&quot;&gt;&lt;span data-dcnode-id=&quot;1359&quot; instrument_node=&quot;&quot;&gt;Behavior&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1357&quot; instrument_node=&quot;&quot;&gt; – How do you act toward X?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1351&quot;&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;Our attitudes and beliefs are powerful influencers on how we behave, positively and negatively. We often benefit from replacing unhelpful or harmful perspectives and viewpoints with ones that are more healthy and helpful. But how?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1345&quot;&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt;It is not always easy to change our beliefs; it takes effort and willingness. The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1347&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/11/Understanding-the-Impact-of-Attitudes-on-Resilience.pdf&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1348&quot; instrument_node=&quot;&quot;&gt;Understanding the Impact of Attitudes on Resilience&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt; worksheet can help clients see things more clearly by asking questions about their existing beliefs and possible new ones.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1342&quot;&gt;&lt;span data-dcnode-id=&quot;1343&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1339&quot;&gt;&lt;span data-dcnode-id=&quot;1340&quot; instrument_node=&quot;&quot;&gt;Resilient Problem-Solving Skills&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1330&quot;&gt;&lt;span data-dcnode-id=&quot;1337&quot; instrument_node=&quot;&quot;&gt;Whether our ability or capacity to become more resilient is thwarted by &lt;/span&gt;&lt;em data-dcnode-id=&quot;1335&quot;&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;internal blocks&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt; (such as fear, anxiety, or anger) or &lt;/span&gt;&lt;em data-dcnode-id=&quot;1332&quot;&gt;&lt;span data-dcnode-id=&quot;1333&quot; instrument_node=&quot;&quot;&gt;external blocks&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1331&quot; instrument_node=&quot;&quot;&gt; (such as failing to hit sales targets or meeting financial burden), problem-solving can help (Neenan, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1324&quot;&gt;&lt;span data-dcnode-id=&quot;1328&quot; instrument_node=&quot;&quot;&gt;The ADAPT model is a practical tool that can help clients focus on problem-solving. Why not try out the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1326&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/11/Resilient-Problem-Solving-Skills.pdf&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;Resilient Problem-Solving Skills&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt; worksheet with your client as a way of exploring possible solutions to the problems they face?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1321&quot;&gt;&lt;span data-dcnode-id=&quot;1322&quot; instrument_node=&quot;&quot;&gt;Ask the client to consider the following ADAPT prompts (modified from Neenan, 2018; Demiris et al., 2010):&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1298&quot;&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1316&quot;&gt;&lt;em data-dcnode-id=&quot;1317&quot;&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;A = attitude to the situation&lt;/span&gt;&lt;/em&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1312&quot;&gt;&lt;em data-dcnode-id=&quot;1313&quot;&gt;&lt;span data-dcnode-id=&quot;1314&quot; instrument_node=&quot;&quot;&gt;D = define the problem and set realistic goals&lt;/span&gt;&lt;/em&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1308&quot;&gt;&lt;em data-dcnode-id=&quot;1309&quot;&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt;A = generate alternative solutions&lt;/span&gt;&lt;/em&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1304&quot;&gt;&lt;em data-dcnode-id=&quot;1305&quot;&gt;&lt;span data-dcnode-id=&quot;1306&quot; instrument_node=&quot;&quot;&gt;P = predict the likely consequences and develop a solution plan&lt;/span&gt;&lt;/em&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1300&quot;&gt;&lt;em data-dcnode-id=&quot;1301&quot;&gt;&lt;span data-dcnode-id=&quot;1302&quot; instrument_node=&quot;&quot;&gt;T = try out the solution and see if it works&lt;/span&gt;&lt;/em&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1299&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1295&quot;&gt;&lt;span data-dcnode-id=&quot;1296&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1294&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1292&quot;&gt;&lt;a data-dcnode-id=&quot;1293&quot; name=&quot;activities&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1291&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1289&quot;&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;3 Best Activities, Worksheets, and Exercises&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1283&quot;&gt;&lt;img alt=&quot;Resilience worksheets&quot; class=&quot;alignright wp-image-141334 size-medium lazyload&quot; data-dcnode-id=&quot;1287&quot; data-src=&quot;https://positivepsychology.com/wp-content/uploads/2021/11/Resilience-worksheets-300x150.jpeg&quot; data-srcset=&quot;https://positivepsychology.com/wp-content/uploads/2021/11/Resilience-worksheets-300x150.jpeg 300w, https://positivepsychology.com/wp-content/uploads/2021/11/Resilience-worksheets-768x384.jpeg 768w, https://positivepsychology.com/wp-content/uploads/2021/11/Resilience-worksheets.jpeg 800w&quot; height=&quot;150&quot; sizes=&quot;(max-width: 300px) 100vw, 300px&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; title=&quot;Worksheets to build resilience&quot; width=&quot;300&quot;&gt;&lt;noscript data-dcnode-id=&quot;1285&quot;&gt;&lt;span data-dcnode-id=&quot;1286&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignright wp-image-141334 size-medium lazyload&quot; title=&quot;Worksheets to build resilience&quot; src=&quot;https://positivepsychology.com/wp-content/uploads/2021/11/Resilience-worksheets-300x150.jpeg&quot; alt=&quot;Resilience worksheets&quot; width=&quot;300&quot; height=&quot;150&quot; srcset=&quot;https://positivepsychology.com/wp-content/uploads/2021/11/Resilience-worksheets-300x150.jpeg 300w, https://positivepsychology.com/wp-content/uploads/2021/11/Resilience-worksheets-768x384.jpeg 768w, https://positivepsychology.com/wp-content/uploads/2021/11/Resilience-worksheets.jpeg 800w&quot; sizes=&quot;(max-width: 300px) 100vw, 300px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;span data-dcnode-id=&quot;1284&quot; instrument_node=&quot;&quot;&gt;Resilience is not a given; while there are hereditary factors, resilience can be learned and grown.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1277&quot;&gt;&lt;span data-dcnode-id=&quot;1281&quot; instrument_node=&quot;&quot;&gt;You can use the following &lt;/span&gt;&lt;a data-dcnode-id=&quot;1279&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/counseling-activities/&quot;&gt;&lt;span data-dcnode-id=&quot;1280&quot; instrument_node=&quot;&quot;&gt;counseling activities&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt;, exercises, and worksheets to understand your client’s resilience and identify ways it can be developed (modified from Pemberton, 2015):&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1274&quot;&gt;&lt;span data-dcnode-id=&quot;1275&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1273&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1271&quot;&gt;&lt;span data-dcnode-id=&quot;1272&quot; instrument_node=&quot;&quot;&gt;When Was I (Not) Resilient?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1270&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1265&quot;&gt;&lt;span data-dcnode-id=&quot;1269&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1267&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/11/When-Was-I-Not-Resilient.pdf&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1268&quot; instrument_node=&quot;&quot;&gt;When Was I (Not) Resilient?&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt; worksheet provides a helpful way to review situations when you coped well and coped poorly to identify qualities that are more developed than others and the nature of your resilience.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1264&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1262&quot;&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1261&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1259&quot;&gt;&lt;span data-dcnode-id=&quot;1260&quot; instrument_node=&quot;&quot;&gt;Uncover Your Purpose&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1256&quot;&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt;Feeling a stronger sense of purpose can help you build and maintain resilience. It can be easier to persevere and push through difficult times when you understand the impact you would like to have on the world (Armstrong, 2019).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1255&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1250&quot;&gt;&lt;span data-dcnode-id=&quot;1254&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1252&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/11/Uncover-Your-Purpose.pdf&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;Uncover Your Purpose&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1251&quot; instrument_node=&quot;&quot;&gt; worksheet can make your life narrative clearer. Discovering your compelling purpose can clarify your focus on overcoming and remaining resilient during challenging life events.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1249&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1247&quot;&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;When considering challenges, review your answers to see what consistent themes develop and consider how they foster your resilience.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1244&quot;&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1243&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1241&quot;&gt;&lt;span data-dcnode-id=&quot;1242&quot; instrument_node=&quot;&quot;&gt;Creating Realistic Optimism for resilience&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1238&quot;&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt;Positive emotions (e.g., joy, gratitude, and hope) and negative emotions (e.g., resentment, anger, and fear) influence resilience. Positive emotions can broaden our focus, attention, and behavior, helping us become more creative as we tackle our problems (Southwick &amp;amp; Charney, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1237&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1232&quot;&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1234&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/11/Creating-Realistic-Optimism-for-Resilience.pdf&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;Creating Realistic Optimism for Resilience&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt; worksheet can help you positively appraise a situation that may at first appear negative.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1226&quot;&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;Engaging in more optimistic thinking can help you become more resilient by actively employing more &lt;/span&gt;&lt;a data-dcnode-id=&quot;1228&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/coping-strategies-skills/&quot;&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;coping strategies&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt; to overcome challenging times (Southwick &amp;amp; Charney, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1223&quot;&gt;&lt;span data-dcnode-id=&quot;1224&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1220&quot;&gt;&lt;a data-dcnode-id=&quot;1221&quot; name=&quot;group&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1217&quot;&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;A Look at Group Resilience Counseling&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1214&quot;&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;One-to-one resilience counseling can be highly successful at helping clients adapt to life-changing and stressful situations and even encourage personal growth.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1211&quot;&gt;&lt;span data-dcnode-id=&quot;1212&quot; instrument_node=&quot;&quot;&gt;There are also benefits from attending group sessions that offer a support network and the chance to meet others facing similar challenges (Counselling Directory, n.d.).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1210&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1208&quot;&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt;Group sessions provide the opportunity to learn from and be inspired by others’ narratives and difficulties. Attending counseling with others may help the client develop the optimism and regain the hope essential for building resilience (American Psychological Association, 2012).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;li data-dcnode-id=&quot;1125&quot;&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;Step three – Reflect on different styles of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1127&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//positivepsychology.com/coping/&quot;&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt;coping&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1126&quot; instrument_node=&quot;&quot;&gt;: active, surrender, passive, and over-control.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1075&quot;&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;If you’re looking for more science-based ways to help others overcome adversity, check out this collection of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1077&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//tools.positivepsychology.com/17-resilience-exercises-download&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;17 validated resilience tools for practitioners&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;. Use them to help others recover from personal challenges and turn setbacks into opportunities for growth.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1066&quot;&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;A Take-Home Message&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1063&quot;&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;Trauma in our lives is inevitable. While it may not always seem the case, we do have a choice regarding our response.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1060&quot;&gt;&lt;span data-dcnode-id=&quot;1061&quot; instrument_node=&quot;&quot;&gt;Counseling can support clients by uncovering their attitudes and beliefs regarding challenging events and encouraging them to adopt more helpful ones. As clients become better at returning from adversity, they will build resilience and be more ready for future life events.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1057&quot;&gt;&lt;span data-dcnode-id=&quot;1058&quot; instrument_node=&quot;&quot;&gt;We must remember resilience is not the absence of fear nor the ability to immediately bounce back from difficult times. Instead, it involves flexibility in how we think about challenges and react to stress.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1054&quot;&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;Positive emotions can greatly reduce the length and depth of the struggle to return to a meaningful life or find a new purpose. And resilience should not be considered a solo activity, but rather part of a network of support and encouragement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1051&quot;&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;Why not support your client with some of the resilience techniques and activities in this article, encouraging them to adopt new attitudes?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;
