t--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-700&quot; data-dcnode-id=&quot;3097&quot;&gt;&lt;span data-dcnode-id=&quot;3098&quot; instrument_node=&quot;&quot;&gt;Abstract and Figures&lt;/span&gt;&lt;/h2&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;3006&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-800 research-detail-middle-section__abstract&quot; data-dcnode-id=&quot;3094&quot; itemprop=&quot;description&quot;&gt;&lt;span data-dcnode-id=&quot;3095&quot; instrument_node=&quot;&quot;&gt;Recent researches established the effect of optimism on subjective well-being. In the present study, the author attempts to extend and fill in gaps from the previous literature by investigating the potential mediating role of resilience in the relationship between optimism and subjective well-being. This study hypothesized the mediation of resilience between optimism and subjective well-being. This was tested by examining the responses of 300 first year college students on administered questionnaires. Using mediation analysis, the results revealed that all paths were found to be significant; optimism has indirect effects on the three components of subjective well-being as mediated by resilience. Although resilience and indirect effect were found to be significant, resilience only partially mediated the relationship. The results highlights the role of resilience in subjective well-being, exerting its beneficial effects. Considerations for further research are also discussed.&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;js-target-figures&quot; data-dcnode-id=&quot;3016&quot; id=&quot;figures&quot;&gt;&lt;div class=&quot;nova-legacy-o-grid nova-legacy-o-grid--gutter-none nova-legacy-o-grid--order-normal nova-legacy-o-grid--horizontal-ali ategies (aimed at actively dealing with the stressor or related emotions), which are crucial for improving psychological well-being (Arrogante et al., 2015). Furthermore, resilience has been found to be positively related to life satisfaction, positive emotions (Hu et al., 2015;&lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;2161&quot;&gt;&lt;span data-dcnode-id=&quot;2162&quot; instrument_node=&quot;&quot;&gt;Miranda &amp;amp; Cruz, 2020;&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;2160&quot; instrument_node=&quot;&quot;&gt;Shi et al., 2015), and achievement motivation (Magnano et al., 2016), as well as negatively related to emotional and behavioral problems (Ziaian et al., 2012). Some studies have shown that greater resilience can protect against substance use (Wingo et al., 2014) and burnout in adults (Hao et al., 2015) and support the maintenance of cognitive and physical functioning in the elderly (Fontes &amp;amp; Neri, 2015).  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2148&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;2149&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2150&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;2151&quot;&gt;&lt;span data-dcnode-id=&quot;2155&quot; instrument_node=&quot;&quot;&gt;... The second objective was to test the measurement invariance of the instrument across gender, age, and education, which could further improve the psychometric robustness of the Slovenian version of the CD-RISC-10. As recommended (Milfont &amp;amp; Fischer, 2015;&lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;2153&quot;&gt;&lt;span data-dcnode-id=&quot;2154&quot; instrument_node=&quot;&quot;&gt;Millsap, 2011)&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;2152&quot; instrument_node=&quot;&quot;&gt;, different levels of measurement invariance were considered: configural invariance (equal factor structure across groups), metric invariance (also weak invariance; equal factor loadings across groups), and scalar invariance (also strong invariance; equal thresholds or intercepts across groups). If measurement invariance was determined, differences in resilience levels between the above sociodemographic categories could also be examined.  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body&quot; data-dcnode-id=&quot;2142&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow-tip&quot; data-dcnode-id=&quot;2143&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2070&quot;&gt;&lt;div class=&quot;nova-legacy-v-citation-item__context-source&quot; data-dcnode-id=&quot;2071&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item&quot; data-dcnode-id=&quot;2072&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__body&quot; data-dcnode-id=&quot;2087&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m&quot; data-dcnode-id=&quot;2088&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2135&quot;&gt;&lt;div class=&quot;no uot;lite-image&quot; data-dcnode-id=&quot;2107&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/979431405412354-1610526052222_Q64/Gaja-Zager-Kocjan.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2103&quot;&gt;&lt;span data-dcnode-id=&quot;2104&quot; instrument_node=&quot;&quot;&gt;Gaja Zager Kocjan&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;2095&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;2096&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Petra-Dolenc-2191266097&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;2097&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2098&quot;&gt;&lt;span data-dcnode-id=&quot;2099&quot; instrument_node=&quot;&quot;&gt;Petra Dolenc&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2089&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2090&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a682caa lite-page-hidden&quot; data-dcnode-id=&quot;2091&quot;&gt;&lt;span data-dcnode-id=&quot;2092&quot; instrument_node=&quot;&quot;&gt;The study aimed to investigate measurement invariance of the 10-item Connor-Davidson Resilience Scale (CD-RISC-10) across gender, age, and education. Adults from a general population of Slovenia (N = 431; 58% female; age 18 to 59 years) filled in the CD-RISC-10, the short form of the Mental Health Continuum and the Depression, Anxiety and Stress Scale. Measurement invariance of the proposed one-factor model of CD-RISC-10 by gender, age, and level of education was examined using multiple-group confirmatory factor analysis. The results showed configural, metric, and scalar invariance of the CD-RISC-10 across gender, age, and educational groups. The measure showed satisfactory reliability, positive associations with emotional, psychological, and social well-being, and negative links with negative emotional states. Group differences in latent means suggested higher resilience in men than women, early adults as compared to emerging adults, and people with higher as compared to those with lower level of education. The Slovenian version of the CD-RISC-10 is an acceptably reliable and valid measure of resilience, suitable to detect possible differences between gender, age, and educational groups. Resilience shows favorable associations with enhanced positive mental health and diminished symptoms of mental problems.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2073&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2074&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2075&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2076&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-lega acy-v-person-inline-item&quot; data-dcnode-id=&quot;2016&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2017&quot;&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt;Janeen Kay C. Camarce&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;2005&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;2006&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Mark-Racelis&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;2007&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;2010&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;2011&quot;&gt;&lt;span data-dcnode-id=&quot;2013&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Mark Racelis&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;2012&quot; data-src=&quot;https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2008&quot;&gt;&lt;span data-dcnode-id=&quot;2009&quot; instrument_node=&quot;&quot;&gt;Mark Racelis&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1999&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2000&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a6818b7 lite-page-hidden&quot; data-dcnode-id=&quot;2001&quot;&gt;&lt;span data-dcnode-id=&quot;2002&quot; instrument_node=&quot;&quot;&gt;Education is one of the ineradicable endeavors of humans that even in times of a pandemic, people can still acquire knowledge through innovations. Such cases have led the contemporary world to a virtual learning environment. Even though the world has shifted from conventional to online education, it is imperative that the quality of service must still be observed and that the academic engagement and effectiveness of teaching must be ensured so that the learning processes of students will not be disturbed. Positive psychologists have studied such intricacies that Martin Seligman (2006) introduced the Optimistic theory which provided a clear analysis of the attitude of humans regarding the outcome of adverse circumstances. Since the majority of related studies showed that there are equivalent results regarding before and during the pandemic, the authors of the study hypothesized that: (1) there will be no significant differences in the level of optimism between Filipino freshmen and senior students during the 2021 COVID-19 pandemic, and that (2) there will be no significant differences on the levels of optimism of Filipino freshmen and senior students between this study and pre-pandemic related studies. The results showed no significant difference in optimism levels between Filipino freshmen and seniors during the pandemic but presented a significant difference between current and pre-pandemic findings.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1983&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; d an Gomez&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1932&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/1116788410580994-1643274514775_Q64/Dan-Gomez-3.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1928&quot;&gt;&lt;span data-dcnode-id=&quot;1929&quot; instrument_node=&quot;&quot;&gt;Dan Gomez&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1919&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1920&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a6819b0 lite-page-hidden&quot; data-dcnode-id=&quot;1921&quot;&gt;&lt;span data-dcnode-id=&quot;1922&quot; instrument_node=&quot;&quot;&gt;This study aimed to establish that online news photographs were dependent on language, using visual literacy. Semiotic analysis was utilized to determine the semiotic features present on the fifteen selected online news photographs. Also, a phenomenological approach was employed to highlight the information gathered on how students' understanding of online news photographs affects their personal viewpoints regarding issues in society and how semiotic features of online news photographs aid on visual literacy of students. The participants of the study were the fourteen (14) Grade 12 high school students in Maco North District, Division of Davao de Oro. There were seven participants for the in-depth interview (IDI) and seven participants for focus group discussion (FGD). This study obtained significant information that helped derive the semiotic features of photos based on their signifier, signified, denotative meaning, connotative meaning, and myth. Moreover, the study aided the understanding of students' viewpoints on issues in our society such as personal concerns, public awareness, clarity of message, stewards of the importance of news, sociological imagination, and civic action. Finally, participants shared how semiotic features aid their visual literacy, such as offering visual metalanguage, expressing emotions, and conveying messages.

ck-item&quot; data-dcnode-id=&quot;1848&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1849&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a681a22 lite-page-hidden&quot; data-dcnode-id=&quot;1850&quot;&gt;&lt;span data-dcnode-id=&quot;1851&quot; instrument_node=&quot;&quot;&gt;Empirical studies conducted in the Philippines show that learners struggle amidst the abrupt implementation of online education due to the COVID-19 pandemic. The present study was conducted to determine if students can thrive in such a difficult situation and if this thriving is instrumental in building grit, that is, perseverance in achieving long-term goals. There were 181 university students (39 males, 135 females, 7 unidentified) who took part in an online survey. It was investigated if thriving can predict grit directly and indirectly through self-efficacy and if this link is moderated by academic stress. The results showed that thriving is associated with higher grit and this relationship is mediated by self-efficacy. It was also shown that the impact of thriving on grit was strongest when academic stress is high.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1832&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1833&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1834&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1835&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;1819&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;1820&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;1821&quot;&gt;&lt;span data-dcnode-id=&quot;1825&quot; instrument_node=&quot;&quot;&gt;... Based on Diener's description, the tools widely used to measure subjective wellbeing are the SWLS (Diener et al., 1985) involving life satisfaction and PANAS (Watson et al., 1988) involving emotions. Researchers use these scales in various ways to calculate subjective wellbeing; one of them is subjective wellbeing as a composite (Andrews &amp;amp; Crandall, 1976;Busseri &amp;amp; Sadava, 2011), which has been used by several researchers (e.g., Doğan &amp;amp; Eryılmaz, 2013;&lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;1823&quot;&gt;&lt;span data-dcnode-id=&quot;1824&quot; instrument_node=&quot;&quot;&gt;Miranda &amp;amp; Cruz, 2020;&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;1822&quot; instrument_node=&quot;&quot;&gt;Sağkal &amp;amp; Türnüklü, 2017). In this model, the integration of life satisfaction (+), positive emotions (+), and negative emotions (-) reflect subjective wellbeing; the correlation between these factors is not primarily important (Busseri &amp;amp; Sadava, 2011).  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body&quot; data-dcnode-id=&quot;1812&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow-tip&qu  class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__type&quot; data-dcnode-id=&quot;1803&quot;&gt;&lt;span data-dcnode-id=&quot;1804&quot; instrument_node=&quot;&quot;&gt;Article&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-left&quot; data-dcnode-id=&quot;1799&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-medium nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-ghost nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__fulltext&quot; data-dcnode-id=&quot;1800&quot;&gt;&lt;span data-dcnode-id=&quot;1801&quot; instrument_node=&quot;&quot;&gt;Full-text available&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-right&quot; data-dcnode-id=&quot;1794&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;1795&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;1796&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;1797&quot;&gt;&lt;span data-dcnode-id=&quot;1798&quot; instrument_node=&quot;&quot;&gt;Mar 2022&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1781&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1782&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1783&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1784&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Uemuet-Arslan&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1785&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1788&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1789&quot;&gt;&lt;span data-dcnode-id=&quot;1791&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Ümüt Arslan&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1790&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/1108993535680513-1641416071821_Q64/Uemuet-Arslan.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1786&quot;&gt;&lt;span data-dcnode-id=&quot;1787&quot; instrument_node=&quot;&quot;&gt;Ümüt Arslan&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1777&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1778&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a682228 lite-page-hidden&quot; data-dcnode-id=&quot;1779&quot;&gt;&lt;span data-dcnode-id=&quot;1780&quot; instrument_node=&quot;&quot;&gt;Addressing career decidedness can help university students to increase wellbeing, and hope can be a positive and significant factor for future success. This study aims to examine the model which hypothesized the mediating role of hope in the link between career decidedness and subjective wellbeing of Turkish university students. Data were collected from 376 students (269 women and 107 men) from universities in Izmir, Turkey. The Career Decidedness Scale, the Dispositional Hope Scale, the Positive and Negative Affect Schedule, the Satisfaction with Life Scale and a demographic information form used as measurement tools. Pearson Correlation Test and regression-based path analysis (PROCESS) were used to analyse the data. Only four percent of the participants received career counseling. Pearson correlation test shows a positive correlation between all scales (p&amp;lt; .001) except negative effect and this one expectedly shows negative correlations with all scales (p &amp;lt; .01). The model testing via PROCESS Macro Model 4 indicated that career decidedness and hope showed a direct effect on subjective wellbeing (p &amp;lt; .001) and supported the mediating role of hope between career decidedness and subjective wellbeing (95 % LLCI = .86 and ULCI = 1.40). The role of hope in career development to increase subjective wellbeing with implications of the results and suggestions are discussed for counselors and researchers.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1761&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1762&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1763&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&q node-id=&quot;1718&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1719&quot;&gt;&lt;span data-dcnode-id=&quot;1720&quot; instrument_node=&quot;&quot;&gt;Di Lu&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1710&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1711&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a6824cc lite-page-hidden&quot; data-dcnode-id=&quot;1712&quot;&gt;&lt;span data-dcnode-id=&quot;1713&quot; instrument_node=&quot;&quot;&gt;The present review study determines to scrutinize EFL teachers' optimism and commitment and their contribution to students' academic success. Academic optimism, as a new construct, is evolving from the examination of the positive psychology (PP), societal principal, and communal school assets that affect the attainment and success of all learners. In addition, within the past decades, commitment has received a great level of consideration, principally in the domain of structural research. The straightforward perseverance of this review is to extend the concept of academic optimism to individuals, that is, to hypothesize theoretical optimism and approve the efficacy of this paradigm at the instructor level in relation to students' academic success. According to the literature review, the definitions of these constructs, namely teachers' optimism and commitment, and students' academic success, as well as empirical studies in this domain are presented. As a conclusion, this study, to some extent, promotes the educators' mindfulness about their commitment. In this respect, pedagogical implications for teachers, school p data-dcnode-id=&quot;1623&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Mumtaz-Memon&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1624&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1627&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1628&quot;&gt;&lt;span data-dcnode-id=&quot;1630&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Mumtaz Ali Memon&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1629&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/1074331564126208-1633152013320_Q64/Mumtaz-Memon.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1625&quot;&gt;&lt;span data-dcnode-id=&quot;1626&quot; instrument_node=&quot;&quot;&gt;Mumtaz Ali Memon&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1616&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1617&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a68292b lite-page-hidden&quot; data-dcnode-id=&quot;1618&quot;&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;The present study aims to examine whether self-efficacy mediates the relationship between optimism, dimensions of psychological well-being, and resilience among Iranian students. The participants in this study included 251 Iranian students from Universiti Putra Malaysia (UPM). Structural equation modeling using AMOS 20.0 was used to analyze the data. The results indicated that there were significant relationships between optimism, dimensions of psychological well-being, and resilience among Iranian students of UPM. The study findings presented that self-efficacy mediated the relationship between dimensions of psychological well-being (environmental mastery, autonomy, self-acceptance, positive relations with others, personal growth, and purpose in life) and resilience among Iranian students of UPM. Furthermore, self-efficacy was not observed to mediate the influence of optimism on resilience among Iranian students of UPM. The study’s findings help to understand the interrelationship between self-efficacy, various dimensions of psychological well-being, and resilience. Consequently, counselors, psychologists, and instructors can develop and plan valuable strategies to enhance students’ psychological factors.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1600&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1601&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1602&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1603&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1604&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1610&quot;&gt;&lt;a c egacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1548&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Selim-Guendogan&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1549&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1552&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1555&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Selim Gündoğan&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1554&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/869614166757376-1584343582097_Q64/Selim-Guendogan.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1550&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;Selim Gündoğan&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1541&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1542&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a682e6a lite-page-hidden&quot; data-dcnode-id=&quot;1543&quot;&gt;&lt;span data-dcnode-id=&quot;1544&quot; instrument_node=&quot;&quot;&gt;COVID-19, which has recently affected the world, has caused serious adversities in many areas as well as on the mental health of individuals. People have had a serious fearful mood due to situations such as catching COVID-19, having health problems after catching the disease, and worrying about infecting someone else. This negative mood is discussed in the literature through the concept of the fear of COVID-19. Accordingly, the mediator role of the fear of COVID-19 in the relationship between psychological resilience and life satisfaction was examined in this study. This study was conducted with 430 Turkish university students, 279 women and 151 men, who are between the ages of 18 and 30. The data of the study were collected with the psychological resilience, the fear of COVID-19 and life satisfaction scales. As a result of the analysis, it was concluded that psychological resilience is a negative predictor of the fear of COVID-19 and a positive predictor of life satisfaction, and that the fear of COVID-19 is a negative predictor of life satisfaction. It was also concluded that the fear of COVID-19 mediates the relationship between psychological resilience and life satisfaction. The results are discussed in relation to the relevant literature, and suggestions are made for practitioners and researchers.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1525&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1526&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1527&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1528&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto 38652181_Q64/Maris-Vainre.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1342&quot;&gt;&lt;span data-dcnode-id=&quot;1343&quot; instrument_node=&quot;&quot;&gt;Maris Vainre&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1330&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1331&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Peter-Jones-65&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1332&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1335&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1336&quot;&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Peter B Jones&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1337&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/287734154448908-1445612576537_Q64/Peter-Jones-65.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1333&quot;&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt;Peter B Jones&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1324&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1325&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a683450 lite-page-hidden&quot; data-dcnode-id=&quot;1326&quot;&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;Background: The rising number of young people going to university has led to concerns about an increasing demand for student mental health services. We aimed to assess whether provision of mindfulness courses to university students would improve their resilience to stress.
Methods: We did this pragmatic randomised controlled trial at the University of Cambridge, UK. Students aged 18 years or older with no severe mental illness or crisis (self-assessed) were randomly assigned (1:1), via remote survey software using computer-generated random numbers, to receive either an 8 week mindfulness course adapted for university students (Mindfulness Skills for Students [MSS]) plus mental health support as usual, or mental health support as usual alone. Participants and the study management team were aware of group allocation, but allocation was concealed from the researchers, outcome assessors, and study statistician. The primary outcome was self-reported psychological distress during the examination period, as measured with the Clinical Outcomes in Routine Evaluation Outcome Measure (CORE–OM), with higher scores indicating more distress. The primary analysis was by intention to treat. This trial is registered with the Australia and New Zealand Clinical Trials Registry, number ACTRN12615001160527.
Findings: Between Sept 28, 2015, and Jan 15, 2016, we randomly assigned 616 students to the MSS group (n=309) or the support as usual group (n=307). 453 (74%) participants completed the CORE–OM during the examination period and 182 (59%) MSS participants completed at least half of the course. MSS reduced distress scores during the examination period compared with support as usual, with mean CORE–OM scores of 0·87 (SD 0·50) in 237 MSS participants versus 1·11 (0·57) in 216 support as usual participants (adjusted mean difference −0·14, 95% CI −0·22 to −0·06; p=0·001), showing a moderate effect size (β −0·44, 95% CI −0·60 to −0·29; p&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1308&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1309&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1310&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1311&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1312&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1318&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1319&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchg ode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;Rocio Gomez-Molinero&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1249&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1250&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Rocio-Guil&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1251&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1254&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1255&quot;&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Rocío Guil&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1256&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/272544523616268-1441991086676_Q64/Rocio-Guil.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1252&quot;&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;Rocío Guil&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1243&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1244&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a683604 lite-page-hidden&quot; data-dcnode-id=&quot;1245&quot;&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt;Earlier research has identified a remarkable number of related factors to resilience during adolescence. Historically, theoretical treatments of resilience have been focused almost exclusively on psychosocial levels of analysis to derive explanatory models. However, there is insufficient understanding of the role of emotion regulation explaining competent functioning despite the experience of adversity (resilience), especially during adolescence. This study explores the relationship between both, emotional regulation abilities and strategies, and resilience in a sample of adolescents from suburbs high-schools (Jerez de la Frontera, Spain). The study also examines how using different emotional regulation strategies may help the development of resilience levels at this stage. Participants of the study were 164 adolescents ranging from 13 to 16 years old (M = 13.98; SD = 0.66). Emotion regulation was measured using the Cognitive Emotional Regulation Questionnaire (CERQ, Garnefski et al., 2001), and sections D and H of Mayer-Salovey-Caruso Emotional Intelligence Test, a performance test (Emotion Regulation Ability sections, MSCEIT, Spanish version, Mayer et al., 2003). Resilience was evaluated with ERE (Educative Resilience Scale for children and adolescents, Saavedra and Castro, 2009). Verbal Intelligence (Yuste, 1997) and personality traits (Cattell and Cattell, 1986) were assessed as two independent variables. Results supported the idea that emotion regulation ability (MSCEIT, D and H sections, Extremera et al., 2006) is a significant predictor of adolescents' resilience. Moreover, cognitive regulation strategies, such as positive reappraisal, predicted perceived resilience among students. Sociability (A factor of HSPQ, sociability) also correlated with resilience levels. Hence, these results are promising, implying that emotion regulation ability may act as a helpful tool preventing adolescents from irrational risky behaviors, commonly assumed at this developmental stage.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1227&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1228&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1229&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1230&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1231&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1237&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1238&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/321026717_Emotion_Regulation_Ability_and_Resilience_in_a_Sample_of_Adolescents_from_a_Suburban_Area&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1239&quot;&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1232&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--al uot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1170&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1173&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1174&quot;&gt;&lt;span data-dcnode-id=&quot;1176&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Kostas A Papageorgiou&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1175&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/517892279148545-1500486549672_Q64/Kostas-Papageorgiou-2.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1171&quot;&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;Kostas A Papageorgiou&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1162&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1163&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a683776 lite-page-hidden&quot; data-dcnode-id=&quot;1164&quot;&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;Mental toughness (MT) is an umbrella term that entails positive psychological resources, which are crucial across a wide range of achievement contexts and in the domain of mental health. We systematically review empirical studies that explored the associations between the concept of MT and individual differences in learning, educational and work performance, psychological well-being, personality, and other psychological attributes. Studies that explored the genetic and environmental contributions to individual differences in MT are also reviewed. The findings suggest that MT is associated with various positive psychological traits, more efficient coping strategies and positive outcomes in education and mental health. Approximately 50% of the variation in MT can be accounted for by genetic factors. Furthermore, the associations between MT and psychological traits can be explained mainly by either common genetic or nonshared environmental factors. Taken together, our findings suggest a ‘mental toughness advantage’ with possible implications for developing interventions to facilitate achievement in a variety of settings.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1146&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1147&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1148&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1149&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1150&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1156&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item_ t;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;968&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;J. Allister Mcgregor&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;959&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;960&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a683ce5 lite-page-hidden&quot; data-dcnode-id=&quot;961&quot;&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;In a world where many experience unprecedented levels of wellbeing, chronic poverty remains a major concern for many developing countries and the international community. Conventional frameworks for understanding development and poverty have focused on money, commodities and economic growth. This book challenges these conventional approaches and contributes to a new paradigm for development centred on human wellbeing. Poor people are not defined solely by their poverty, and a wellbeing approach provides a better means of understanding how people become and stay poor. It examines three perspectives: ideas of human functioning, capabilities and needs; the analysis of livelihoods and resource use; and research on subjective wellbeing and happiness. A range of international experts from the fields of psychology, economics, anthropology, sociology, political science and development evaluate the state of the art in understanding wellbeing from these perspectives. This book establishes a new strategy and methodology for researching wellbeing that can influence policy.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&l t.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Elizabeth-J-Crossman-2040065510&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;899&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;900&quot;&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;Elizabeth J. Crossman&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;891&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;892&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a683e0e lite-page-hidden&quot; data-dcnode-id=&quot;893&quot;&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt;Since its introduction to the scientific literature in the mid-1990s, developmental science has seen incremental refinements in research on resilience, which is a process or phenomenon reflecting positive child adjustment despite conditions of risk. In this chapter, we describe accumulated evidence on this construct in the field of developmental psychopathology and appraise critical directions for future work. We begin by briefly describing the history of work in this area through contemporary times, defining core constructs, and summarizing major findings on factors associated with resilience. In the second half of the chapter, we examine commonalities and differences between the resilience framework and a related, relatively new area of scientific inquiry: positive psychology. Our objective is to elucidate ways in which progress in each of these areas might most usefully inform efforts in the other, collectively maximizing the promotion of well-being among individuals, families, and society.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;875&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;876&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;877&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;878&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;879&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;885&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;886&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/286526146_Resilience_and_Positive_Psychology&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;887&quot;&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;880&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-le de-id=&quot;865&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-2 nova-legacy-v-publication-item__title&quot; data-dcnode-id=&quot;866&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;867&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/318102713_Examining_the_differences_between_university_students%27_levels_of_resilience_on_mindfulness_psychological_distress_and_coping_strategies&quot;&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;Examining the differences between university students’ levels of resilience on mindfulness, psychological distress and coping strategies.&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;855&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta&quot; data-dcnode-id=&quot;856&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-left&quot; data-dcnode-id=&quot;862&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__type&quot; data-dcnode-id=&quot;863&quot;&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;Article&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-right&quot; data-dcnode-id=&quot;857&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;858&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;859&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;860&quot;&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;May 2017&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;844&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;845&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;846&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;847&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Aileen-Pidgeon&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;848&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;851&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;852&quot;&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Aileen Pidgeon&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;853&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/276858026381315-1443019505117_Q64/Aileen-Pidgeon.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;849&quot;&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;Aileen Pidgeon&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;840&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;841&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a683872 lite-page-hidden&quot; data-dcnode-id=&quot;842&quot;&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;University students can face numerous stressors which can contribute to the development of psychological distress shown to be associated with decreasing completion and retention issues throughout Australian universities (Willcoxson, Cotter, &amp;amp; Joy, 2011). A positive predictor and outcome of successful student coping and adjustment to university and retention outcomes is resilience, the ability to cope in difficult situations and bounce back from adversity. Mindfulness has also been shown to be promote resilience. The present study examined differences in psychological distress, mindfulness, and coping strategies (adaptive vs. maladaptive) in university students (N = 122) with high and low levels of resilience. The results of a one-way MANOVA were consistent with hypotheses, revealing higher resilience scores were associated with greater mindfulness, higher adaptive coping scores, lower maladaptive coping, and reduced psychological distress. Students in the low resilience group were also found to have significantly lower levels of mindfulness, higher levels of psychological distress, reduced use of adaptive coping, and greater use of maladaptive coping, when compared to students with high resilience levels. Overall, findings of the current study are consistent with previous research and highlight the potential benefit of mindfulness-based coping interventions to foster resilience in university students.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;824&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;825&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;826&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;827&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;828&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;834&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;835&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/318102713_Examining_the_differences_between_university_students%27_levels_of_resilience_on_mindfulness_psychological_distress_and_coping_strategies&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;836&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;829&quot;&gt;&lt;button class=&quot;nova-legacy-c-button va-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;730&quot;&gt;&lt;span class=&quot;js-target-abstract-626795a683c6a lite-page-hidden&quot; data-dcnode-id=&quot;731&quot;&gt;&lt;span data-dcnode-id=&quot;732&quot; instrument_node=&quot;&quot;&gt;Many researchers take for granted that men's mental health can be explained in the same terms as women's or can be gauged using the same measures. Women tend to have higher rates of internalizing disorders (i.e., depression, anxiety), while men experience more externalizing symptoms (i.e., violence, substance abuse). These patterns are often attributed to gender differences in socialization (including the acquisition of expectations associated with traditional gender roles), help seeking, coping, and socioeconomic status. However, measurement bias (inadequate survey assessment of men's experiences) and clinician bias (practitioner's subconscious tendency to overlook male distress) may lead to underestimates of the prevalence of depression and anxiety among men. Continuing to focus on gender differences in mental health may obscure significant within-gender group differences in men's symptomatology. In order to better understand men's lived experiences and their psychological well-being, it is crucial for scholars to focus exclusively on men's mental health.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;713&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;714&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;715&quot;&gt;&lt;div class=&quot ; data-dcnode-id=&quot;575&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Surendra Kumar Sia&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;576&quot; data-src=&quot;https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;571&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;572&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Surendra-Kumar-Sia&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;Surendra Kumar Sia&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;The present study investigated the intervening role of perceived control in the relationship between crowding and well-being of the students. The study has been carried out on 448 students staying in hostel dormitories of Pondicherry University. The variables studied were residential crowding, perceived control and subjective well-being. It was hypothesized that residential crowding negatively &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;565&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;q -link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;512&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626795a684647&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626795a684647&quot; data-dcnode-id=&quot;510&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt; predicted greater resilience, which successively led to greater life satisfaction, greater positive affect and reduced negative affect. These findings emphasize the necessity of targeting parents’ well-being through resilience to help them deal with the burden of providing care for their children with special needs.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;507&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/335803026_Spirituality_and_subjective_well-being_of_Ghanaian_parents_of_children_with_special_needs_The_mediating_role_of_resilience&quot;&gt;&lt;span data-dcnode-id=&quot;508&quot; instrument_node=&quot;&quot;&gt;Read more&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&quot; data-dcnode-id=&quot;458&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none&quot; data-dcnode-id=&
