 &lt;/p&gt;
&lt;p&gt; &lt;/p&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;h3 data-geo-id=&quot;geo-0767ccdb&quot;&gt;TL;DR: The Impact of Gratitude on Happiness&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-754f83c1&quot;&gt;
&lt;li&gt;Happiness is a fleeting emotion that cannot be directly chosen or controlled, whereas positive thinking is a mindset that can be actively cultivated.&lt;/li&gt;
&lt;li&gt;Promoting happiness as a simple choice can lead to frustration and self-blame, especially during difficult life events.&lt;/li&gt;
&lt;li&gt;Positive thinking, including practices like gratitude, fosters a mental outlook that often precedes and supports moments of happiness.&lt;/li&gt;
&lt;li&gt;Cultivating gratitude enhances positivity, which in turn increases the frequency and intensity of happiness experiences, making it a healthier and more realistic approach to coping with life’s challenges.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;h3 data-geo-id=&quot;geo-dc41f7b7&quot;&gt;TL;DR: The Difference Between Joy and Happiness in Psychology&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-c24d92ca&quot;&gt;
&lt;li&gt;Happiness is a fleeting emotion that cannot be simply chosen or sustained permanently, unlike positive thinking, which is a mindset you can cultivate.&lt;/li&gt;
&lt;li&gt;Striving for constant happiness often leads to frustration and disappointment, whereas focusing on positive thinking and self-love is more practical and fulfilling.&lt;/li&gt;
&lt;li&gt;Happiness and positive thinking are related but not interchangeable; positive thinking often precedes feelings of happiness.&lt;/li&gt;
&lt;li&gt;Cultural messages about “choosing happiness” can create unrealistic expectations, but choosing positive thoughts remains an empowering and controllable option even in difficult times.&lt;/li&gt;
&lt;/ul&gt;
&lt;p data-geo-id=&quot;geo-c5ba463c&quot;&gt;You’ve probably heard quotes like “happiness is a choice” or “if you want to be happy, &lt;em&gt;be&lt;/em&gt;” or “people are as happy as they make up their minds to be.” (I’m probably guilty of using these words. Scroll through &lt;a href=&quot;https://www.instagram.com/positivelypresent/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;my Instagram feed&lt;/a&gt; and I bet you’ll find “choose happy” or something along those lines amidst my many quote-themed photos.) In theory, these quotes come from a good place. They’re meant to highlight the notion that, though you don’t always have control of your circumstances, you have control over how you feel. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-8fcc2878&quot;&gt;Except… that’s not true.  &lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-f6a29ddb&quot;&gt;Quotes like “choose happiness” or “think happy thoughts” aim to convey the idea that, no matter what happens, you have control over what you &lt;em&gt;think&lt;/em&gt;, but what they actually convey is that you have control over what you &lt;em&gt;feel&lt;/em&gt;. But there’s a big difference between what you think and how you feel, and the idea that thoughts and feelings are interchangeable is potentially very damaging because, much as you might want to, you can’t control how you feel. And you can’t control happiness because happiness is a feeling. You can’t just choose to be happy when your dog just died or your wife just left or you’re suffering from depression. You can’t choose to be happy when you just found out your child has cancer or your parents are abusive or your doctor just diagnosed you with a chronic illness. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-d8af4627&quot;&gt;If you’ve ever experienced any of these things (or any other heart-breaking, painful, or sad situation), you know this is the truth. No matter how much you want to be happy, sometimes you just cannot be. This is normal and to be expected because happiness is a way of &lt;em&gt;feeling&lt;/em&gt;, not a way of &lt;em&gt;thinking&lt;/em&gt;.  &lt;/p&gt;&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-538cf483&quot;&gt;While feeling isn’t something you can control, thinking is. The literal definition of to feel is “to experience an emotion.” To think is defined as “to direct one’s mind toward someone or something.” Experiencing an emotion just happens. You feel sad when something saddens you. You feel happy when something (or someone!) makes you happy. You can (sometimes) decide whether or not you get carried away with your emotions, but you can’t control whether you have them in the first place.  &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9584654d&quot;&gt;You feel how you feel when you feel it, and feelings can’t be changed by words like “be happy!” or “think happy thoughts!” As anyone who’s faced serious trauma or heartbreak knows, in the midst of true pain and loss, happy thoughts are &lt;em&gt;not&lt;/em&gt; an option. But what &lt;em&gt;is&lt;/em&gt; an option is thinking positively. Happiness is not always an option, but positive thinking always is. Let’s take a closer look at how they’re different… &lt;/p&gt;
&lt;p&gt; &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-8397e742&quot;&gt;THE DIFFERENCE BETWEEN POSITIVITY + HAPPINESS &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-59a1161c&quot;&gt;You might be saying to yourself right about now, &lt;em&gt;Aren’t positivity and happiness basically the same thing? Aren’t “positive thoughts” and “happy thoughts” the same?  &lt;/em&gt;No, they are not the same, and the difference between them is very, very important (especially for anyone striving to live a positively present life!). &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-8848dd8c&quot;&gt;&lt;em&gt;Fleeting Emotion vs. Logical Choice&lt;/em&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-8b4b1313&quot;&gt;As I said before, happiness is an emotion. Emotions, as a rule, are fleeting. Some last longer than others, but there are very rarely entire days when you are happy. Even when things are going incredibly well and you’re having an amazing day, you’re not actually experiencing true happiness and joy that entire day. (Same goes for negative emotions too — no matter how difficult the situation, you usually experience a range of emotions, not just “sad,” and even in the most challenging of times, positive feelings like hope and even happiness can be experienced.)&lt;em&gt; &lt;/em&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-00cb7b40&quot;&gt;On the other hand, positive thinking is an active choice — the decision to focus on the possibility of good results or seek out the goodness in any situation or person (good &lt;em&gt;or&lt;/em&gt; bad). Positive thinking is logical, not emotional. It’s more about using your head than it is about using your heart. It’s about taking whatever you experience (and feel) and trying your best to make the most of the situation (even if the situation is terrible). &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-fa2e6e01&quot;&gt;&lt;em&gt;Experiencing vs. Learning&lt;/em&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-1e9e4d04&quot;&gt;Happiness must be experienced. Positivity, on the other hand, is something that can be learned and practiced by everyone. No matter what’s going on in your life, you can strive for a positive attitude. You can also practice it (and get better at it!), which is something you can’t do with happiness. You can fake happiness, but that’s not the same as practicing it. You’re either happy or you’re not. You can’t learn to be happier, and you certainly can’t force yourself to feel (truly) happy when you just don’t feel that way.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-e4183903&quot;&gt;A lot of people struggle because of the notion that you can somehow become happier overall by doing something external (getting a better job, falling in love, buying the newest gadget) but those kinds of things only provide a burst of happiness that will eventually fade until we find that next “happiness high.” Happiness can be gained from external things, but it won’t last because it’s merely an emotion. Instead of focusing on experiences, it’s much more useful to spend time and energy learning how to find the good in any situation (rather that striving for short bursts of happiness). &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-d4fdedfe&quot;&gt;&lt;em&gt;Unique Feeling vs. Similar Thinking&lt;/em&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-0ede204f&quot;&gt;Another major difference between happiness and positivity is this: happiness is incredibly unique. (This is why it’s such a hard topic to study and deeply comprehend.) What fills your heart with joy might not even register on my happiness radar. It’s kind of like love in a way (except it usually doesn’t last as long): it’s something we all experience at some point, but it’s hard to put it into words because we all experience it so differently and for such different reasons.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-00e3fb37&quot;&gt;Also, because happiness is a feeling, it’s experienced in unique ways too. If you and I were both to think of a time when we were incredibly happy, we might have very different reactions to that memory even if we both labeled it as a “happy” time. From a mental and a physical standpoint, we all experience happiness differently. However, when it comes to positive thinking, we can all practice similar techniques. We all know what it means to try to find the good in a situation (even if we find different kinds of goodness). Positive thinking is a logical, thought-driven experience. It’s something we can all understand and, most of the time, experience in a similar way. For this reason, it’s much easier to share and teach to others. (And, as an added bonus, the more someone practices positive thinking, the more happiness s/he is likely to experience.) &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-af7ed428&quot;&gt;&lt;em&gt;Big Picture vs. Present Moment&lt;/em&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-c19a42e0&quot;&gt;Whatever you experience (good and bad) can impact your happiness levels. It’s hard to be happy if aspects of your life (some of which might be out of your control) aren’t going well. For example, let’s say you’re having a really great day at work and you receive an unexpected promotion. This should make you really happy, right? It might — but it might not make you happy for very long if something really unhappy is happening in another area of life. You can’t experience true happiness when certain areas of your life are negative, uncertain, or unhappy. Happiness focuses on the big picture. This isn’t a bad thing, but it’s an important difference from positivity, which isn’t at all concerned with (or impacted by) the big picture.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-fe3d23c4&quot;&gt;Positive thinking focuses on the current moment and determining what you can gain from that experience or interaction. It’s about making the most of whatever is happening to you &lt;em&gt;right now&lt;/em&gt;. It should not tainted by what has already happened or what could happen (unless you’re recalling a time in which you struggled with a difficult situation and overcame it, reminding yourself that you’re strong enough to survive whatever you’re currently going through). Positivity is about taking whatever’s happening and trying to make it as good as it can possibly be, regardless of what’s going on in other areas of your life or what might happen in the future. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-215f1906&quot;&gt;There are some major differences between happiness and positivity, but making the differentiation between happiness and positivity isn’t meant to make “positive” seem better than “happy,” or to put down happiness in anyway. It’s only meant to show that there is a big difference. Here’s why this difference matters…&lt;/p&gt;
&lt;p&gt; &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-47b0f375&quot;&gt;WHY THE DIFFERENCE MATTERS&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-b7a406f5&quot;&gt;After reading about the differences between happiness and positivity you might be thinking, &lt;em&gt;So what? Why does this matter?&lt;/em&gt; It matters because so many people use these very different terms as if they are interchangeable, and this can lead to damaging beliefs in those who read/hear phrases like “if you want to be happy, be happy!” or “choose to be happy!” &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-689b0e45&quot;&gt;Because happiness is not a choice, when people are told to be happy and they’re unable to achieve a happy state (because they’re in a bad situation, because they have a chemical imbalance that doesn’t allow them to be happy often, or for any other reason), they feel like failures. If happiness is promoted as something that can just be chosen, like pulling an item off a store’s shelf, those who cannot seem to “choose” it feel as though there is something wrong with them. On the other hand, if you were to suggest to someone who is struggling that s/he “think positively” (accompanied by suggestions for how to actually do it), those words might actually be useful and encouraging. Happiness is not an action that can simply be chosen, and suggesting it is can actually cause feelings of frustration, confusion, and even self-loathing. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-fbadc2f4&quot;&gt;And speaking of self-loathing, one of the other reasons using happiness and positive thinking are used interchangeably is: it causes a lot of people (most of us, in fact!) to strive for something that is unattainable: a lasting, permanent state of happiness. Due to many popular culture messages about happiness, many of us believe we should strive for happiness most of the time, even when we’re sad or struggling, even when we’re stressed or heartbroken. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-3cf2458d&quot;&gt;As Dan Harris writes in &lt;a href=&quot;https://www.amazon.com/gp/product/0062265431/ref=as_li_qf_sp_asin_il_tl?ie=UTF8&amp;amp;camp=1789&amp;amp;creative=9325&amp;amp;creativeASIN=0062265431&amp;amp;linkCode=as2&amp;amp;tag=positiprese08-20&amp;amp;linkId=2ALONSMVU4EJT7OQ&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;10% Happier&lt;/a&gt;, the “pursuit of happiness becomes the source of our unhappiness.” If you’re striving for a constant state of happiness — a fleeting emotion that rarely lasts for an extended period of time and that sometimes comes from negative sources, like abused substances, the approval of negative people, unhealthy activities, etc. — you’re bound to be, at the very least, disappointed a good deal of the time. You might feel guilty when you don’t feel happy when everything is going well or confused when you experience happiness during difficult times.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-53ac46a1&quot;&gt;Making an emotion (happiness) a life-long goal is a pretty great way to set yourself up for a lot of disappointment and stress. While there will (hopefully!) be many, many moments of happiness in your life, no one is happy every single moment of every single day, and striving for that is like spending your life hoping to find an actual pot of gold at the end of a rainbow. This isn’t meant to leave you feeling as if happiness is some crazy dream that’ll never be made real; it’s only meant to show how the pursuit of happiness isn’t what leads to true fulfillment. Happiness comes in amazing, fleeting moments that we’re all lucky to experience from time to time. And the best way to keep an eye out for these moments (and make the most of them when they happen!) is to focus on positive thinking, on seeking out the good in your life, no matter where you find yourself. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-bc127cff&quot;&gt;Rather that focusing on choosing happiness, what we should be focusing on is thinking positively. Remember: we can’t choose how we feel, but we can choose how we think about those feelings (and whatever it was that caused us to feel that way). Instead of focusing so much being happy, what we should be focusing on is how we can make the most of our lives (both the happy &lt;em&gt;and &lt;/em&gt;the sad parts). &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-3947a069&quot;&gt;When we see something that tells us to simply “be happy,” we should question that request and think about how the notion of happiness-as-a-choice is actually impacting our lives. Of course, there’s absolutely nothing wrong with thinking happy thoughts or gravitating toward things that make you happy, but it’s important to keep in mind that happiness (no matter how great!) is fleeting. If you’re looking for lasting contentment, learning the art of positive thinking is the best place to put your time and energy. &lt;/p&gt;
&lt;p&gt; &lt;/p&gt;
&lt;p style=&quot;text-align: justify;&quot;&gt; &lt;/p&gt;
&lt;p&gt;&lt;a class=&quot;asset-img-link&quot; href=&quot;https://positivelypresent.typepad.com/.a/6a011168668cad970c01bb086c4086970d-popup&quot; onclick=&quot;window.open( this.href, '_blank', 'width=640,height=480,scrollbars=no,resizable=no,toolbar=no,directories=no,location=no,menubar=no,status=no,left=0,top=0' ); return false&quot; style=&quot;float: right;&quot;&gt;&lt;img alt=&quot;Loving-Your-Self&quot; class=&quot;asset asset-image at-xid-6a011168668cad970c01bb086c4086970d img-responsive&quot; decoding=&quot;async&quot; src=&quot;https://positivelypresent.typepad.com/.a/6a011168668cad970c01bb086c4086970d-150wi&quot; style=&quot;width: 150px; margin: 0px 0px 5px 5px;&quot; title=&quot;Loving-Your-Self&quot;/&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-c13da73a&quot; style=&quot;text-align: justify;&quot;&gt;&lt;em&gt;Positive thinking can be tough when it comes to self-contemplation, which is why it’s so important to focus on self-love. Want to empower yourself with some serious self-love and acceptance? Start loving yourself (or increase the love you already have for yourself!) with the inspiration and motivation found in &lt;a href=&quot;https://www.positivelypresent.com/2015/08/loving-your-self.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;Loving Your Self: An Empowering Workbook for Increasing Self-Love&lt;/a&gt;. &lt;/em&gt;&lt;em&gt;Filled with uplifting encouragement, thought-provoking questions, and engaging exercises, Loving Your Self is an essential tool for mastering the art of self-love. Learn more about the workbook &lt;a href=&quot;https://www.positivelypresent.com/2015/08/loving-your-self.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;here&lt;/a&gt; and purchase your own copy &lt;a rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;here&lt;/a&gt;.&lt;/em&gt;&lt;/p&gt;

&lt;div class=&quot;comment-metadata&quot;&gt;
&lt;a href=&quot;https://positivelypresent.com/2015/12/happiness-is-not-a-choice.html#comment-694&quot;&gt;&lt;time datetime=&quot;2016-01-01T04:36:06+00:00&quot;&gt;January 1, 2016 at 4:36 am&lt;/time&gt;&lt;/a&gt; &lt;/div&gt;&lt;!-- .comment-metadata --&gt;
&lt;/footer&gt;&lt;!-- .comment-meta --&gt;
&lt;div class=&quot;comment-content&quot;&gt;
&lt;p&gt;Hi Dani.  I stopped on by to tell you that I bought one of your Every day Matters diaries for 2016 over here in Australia, which made me very happy because I had been looking for the exact thing in my price range.  In the diary, the subject for January is Happiness and the affirmation of the month is “I choose happiness every day”…..so to see your post is confusing for me because I believe we can choose happiness as part of our everyday existence.  Of course we’re not going to try and choose happiness when one of the soul destroying incidents you’ve described happens to us but down the track, in recovery, yes.&lt;br/&gt;
May I say I don’t agree with you that feelings happen of their own accord.  I believe every feeling starts with a thought, which creates the feeling, which creates the behaviour.  I follow the Law of Attraction which helped me through one of those soul destroying situations which for us was my husband’s unemployment for 14 months and almost losing everything.  The only way I could stop myself from going under emotionally was to hang on to something that made me happy.  It was difficult to do but I knew I had to do something.  I started with thinking about something that made me happy and at that time it was our 3 year old grandson.&lt;br/&gt;
From that thought the feelings of joy and happiness came and I harnessed that so every time I started sinking again I would think about him and the good feelings would return.  It developed into a habit because I wanted to raise my vibration to a point where I could deal with things and not bury my head in the sand because life was too difficult to face.  He doesn’t know it, but that little man saved me.&lt;br/&gt;
If happiness doesn’t :stick”, positive thinking doesn’t either.  When we choose to think positively about something, it doesn’t work for the long term because it’s likely the negative charge (and programming) behind the situation we’re trying to think positively about is changed.  All in all, positive thinking and happiness go hand in hand but it’s like the chicken and the egg, which needs to come first.&lt;br/&gt;
I had a canvas wall hanging at home which said, Today I am choosing Happiness and that became my mantra.  Every time I felt myself sinking again I would remind myself, today I’m choosing happiness and it would change my physiology to accept that this was do-able.&lt;br/&gt;
So, anyway, I love the diary, thank you for putting that together and I look forward to using it this year and getting another for 2017.&lt;/p&gt;
&lt;/div&gt;&lt;!-- .comment-content --&gt;
&lt;/article&gt;&lt;!-- .comment-body --&gt;

&lt;div class=&quot;comment-content&quot;&gt;
&lt;p&gt;Melanie – You’re welcome! So glad you appreciate the difference between positivity and happiness.&lt;br/&gt;
Kathy – I’m definitely the same way. I’d love to be a “happy” person, but that just doesn’t come naturally for me, which is why I focus on positivity. The more positive I am, the more I bring happy things into my life.&lt;br/&gt;
Katie – So glad you enjoyed this article! It’s definitely an important topic!&lt;br/&gt;
Olivia – Thank you! It’s something I think about a lot and I’m so glad I finally sat down and wrote about it.&lt;/p&gt;

&lt;div class=&quot;comment-content&quot;&gt;
&lt;p&gt;Deborah – Thank you so much for buying the diary! 🙂 It makes me so happy to imagine you using it all the way on the other side of the world. And thank you, too, for this thought-provoking comment. You’re right: there’s definitely a conflict between the diary’s first month and this post. I think the affirmation would be better written, “I choose to think positively every day, which will lead me to feeling happiness,” but that would be much too long! (If you get the 2017 diary, you’ll see a month focused on Positivity.) I really like what you’re saying about how a feeling starts with a thought. That’s such a great point! We don’t have feelings unless we’ve thought something about a person/situation first, which is why it’s so important to pay attention to our thoughts and strive for positive ones over negative. It sounds like, when you were in a low place in your life, you focused on positive thinking, which led to feelings of happiness. If you say thoughts come first (which I agree with), then you’ve chose a positive thought (of your grandson) first and that led to you experiencing feelings of happiness, which is wonderful. I agree that positivity and happiness go hand-in-hand, and, by focusing on positive thoughts, we’ll have more happiness (so, indirectly, we *can* choose happiness!). Thanks again for purchasing the diary and for writing this comment!&lt;/p&gt;
