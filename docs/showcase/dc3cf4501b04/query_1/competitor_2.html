tive_energies_ghosts_demons_devilsetc_on_the_mind&quot;&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;6. In summary – steps to reduce the influence of negative energies (ghosts, demons, devils&amp;nbsp;etc.) on the mind&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;603&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; id=&quot;1_Introduction&quot;&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;1. Introduction&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;588&quot;&gt;&lt;span data-dcnode-id=&quot;601&quot; instrument_node=&quot;&quot;&gt;In our earlier articles, we have ascertained that the majority of &lt;/span&gt;&lt;a data-dcnode-id=&quot;599&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/difficulties/Ghosts_Demons/worldspopulation_possessedbyghosts&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;the world’s population is affected by negative energies&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt; or will feel their effect in the years to come. We have also provided advice on &lt;/span&gt;&lt;a data-dcnode-id=&quot;596&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritual-problems/demonic-possession/definition-of-possession/&quot;&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;how one can recognise and reduce the effect of negative energies&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt; on oneself through &lt;/span&gt;&lt;a data-dcnode-id=&quot;593&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/spiritualhealing&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;spiritual healing&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;590&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/aboutspiritualresearch/spiritualpracticefordevelopingsixthsense&quot;&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;spiritual practice&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;582&quot;&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt;One of the benefits of spiritual healing and spiritual practice is that we come to understand the difference between thoughts that arise from our subconscious mind and thoughts which&amp;nbsp;are&amp;nbsp;given by &lt;/span&gt;&lt;a data-dcnode-id=&quot;584&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/difficulties/Ghosts_Demons/typesofghosts&quot;&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt;negative energies&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;A practical way to understand this difference is to study whether the thoughts disappear or whether their intensity or frequency reduces after spiritual healing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;579&quot;&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;However in the initial stages of spiritual practice it may be difficult to discern the difference. In addition to this, when the influence of the negative subtle-entity is very strong, it may sometimes take months or years of spiritual healing and spiritual practice to ascertain where the thoughts originate from.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;In this article we list examples of different types of thoughts given by negative energies and how they influence people. We have also explained how their influence over people at large differs from their influence over seekers of God. Some responses and remedial actions are also suggested alongside each example.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;572&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot; id=&quot;2_How_negative_energies_ghosts_demons_devils_etc_increase_thoughts_about_desires_in_people8217s_mind&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;2. How negative energies (ghosts, demons, devils etc.) increase thoughts about desires in people’s mind&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;569&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;570&quot; instrument_node=&quot;&quot;&gt;When negative energies&amp;nbsp;affect us by increasing desires in the mind, it mostly happens through the following mechanism.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;566&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;The negative energy sends a direct command to the subconscious mind targeting the instinct and desire centre. For example: “Drink alcohol now”, “Eat chocolate now”, “Watch a movie now”, “Listen to music now”, “Do drugs now”, “Have sex now”. As a result&amp;nbsp;the desire to act as instructed arises in the person and the person feels like doing these acts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;550&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;If the person resists this desire, or if there is Divine protection, or if the person is feeling some Divine consciousness (&lt;/span&gt;&lt;em data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;Chaitanya&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;) or &lt;/span&gt;&lt;a data-dcnode-id=&quot;556&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/happiness/benefitsofspiritualpractice/experiencingbliss_h&quot;&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;Bliss (&lt;/span&gt;&lt;em data-dcnode-id=&quot;558&quot;&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;Ānand&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;), &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;554&quot; style=&quot;line-height: 1.4em&quot;&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;then the &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;negative energies&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;551&quot; style=&quot;line-height: 1.4em&quot;&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;increase the intensity of the command. For example: “Eat kilos of food; eat all the food that exists in the house”, “Have sex with 30 women” etc. (The commands may not be exactly like those&amp;nbsp;stated here,&amp;nbsp;but the principle of the command and the feeling in the mind is.)&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;yellow-wrapper-right yn&quot; data-dcnode-id=&quot;542&quot;&gt;&lt;span class=&quot;clip&quot; data-dcnode-id=&quot;548&quot;&gt;&lt;/span&gt;&lt;p data-dcnode-id=&quot;544&quot;&gt;&lt;strong data-dcnode-id=&quot;546&quot;&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt;Autosuggestion:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt; A therapeutic sentence or perspective suggested to the self to positively change one's actions (behaviour), thoughts and reactions (attitudes) or physical state.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;532&quot;&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;Another method used&amp;nbsp;is to target the likes and dislikes centre by sending a thought in the form of an autosuggestion, such as:&amp;nbsp;“I like chocolate”, “I love alcohol”, “I love meat”. Then the like centre sends an impression for the person to do the act.&amp;nbsp; A seeker may not have a centre of likes developed for these things, but&amp;nbsp;he or she&amp;nbsp;would still feel like this centre in the subconscious mind exists. &lt;/span&gt;&lt;a data-dcnode-id=&quot;538&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/difficulties/Ghosts_Demons/typesofghosts&quot;&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;Negative energies (ghosts, demons, devils etc.)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;537&quot; instrument_node=&quot;&quot;&gt; make an extra effort in this case because a seeker’s mind has a centre for &lt;/span&gt;&lt;a data-dcnode-id=&quot;534&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/spiritualscience/sattva_raja_tama&quot;&gt;&lt;em data-dcnode-id=&quot;535&quot;&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;sāttvik&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt; desires which&amp;nbsp;fights these desires.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;529&quot; style=&quot;text-align: center&quot;&gt;&lt;img alt=&quot;thoughts in people about desires given by negative energies&quot; class=&quot;alignnone&quot; data-dcnode-id=&quot;530&quot; height=&quot;539&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/userfiles/image/spiritualresearch/ghosts/negative-energies/table-1.gif&amp;amp;raw&quot; style=&quot;width: 603px;height: 539px&quot; width=&quot;603&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;525&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; id=&quot;3_How_negative_energies_ghosts_demons_devils_etc_increase_negative_thoughts_about_self_others_and_Spirituality&quot;&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;3. How negative energies (ghosts, demons, devils etc.) increase negative thoughts about self, others and Spirituality&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;521&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;522&quot; id=&quot;31_Negative_thoughts_about_self&quot;&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;3.1 Negative thoughts about self&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;518&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;As in the earlier example, the negative energy (ghost, demon, devil etc.) affecting us through negative thoughts places such a thought in our mind. It is a similar principle, but the suggestion attacks the intellect and identification and interpretation centres.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;515&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;The thoughts that they send about self are, for example: “You are a bad seeker.&amp;nbsp;You deserve to suffer.&amp;nbsp;You are so bad and there is no way out. The only solution for you is to kill yourself. In fact,&amp;nbsp;you should stop spiritual practice because you are such a bad person”. Then the seeker gets the thought in his mind that: “I am a bad seeker. I deserve to suffer. There is no way out.&amp;nbsp;The only solution is to kill myself.&amp;nbsp;I should stop spiritual practice because I am a bad person”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;512&quot; style=&quot;text-align: center&quot;&gt;&lt;img alt=&quot;Impact of negative thoughts about self given by negative energies&quot; class=&quot;alignnone&quot; data-dcnode-id=&quot;513&quot; height=&quot;428&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/userfiles/image/spiritualresearch/ghosts/negative-energies/table-2.gif&amp;amp;raw&quot; style=&quot;width: 603px;height: 428px&quot; width=&quot;603&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;508&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;509&quot; id=&quot;32_Negative_thoughts_about_others&quot;&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;3.2 Negative thoughts about others&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;505&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;The type of thoughts that negative energies (ghosts, demons, devils etc.) place in our mind about others are, for example: “This person is very negative”, “He has a big ego”, “What he is saying right now is ego”, “This person is dishonest”, “He hates you and wants to harm you”. Usually this is completely untrue.&amp;nbsp;&amp;nbsp;Things which don’t exist are pointed out, and we appear to see defects and ego&amp;nbsp;that are not there. But the impression is put in the mind by the negative energy and the affected person starts thinking like this about others. In this way, the affected person’s mind&amp;nbsp;becomes clouded.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;502&quot; style=&quot;text-align: center&quot;&gt;&lt;img alt=&quot;negative thoughts about other people given by negative energies&quot; class=&quot;alignnone&quot; data-dcnode-id=&quot;503&quot; height=&quot;472&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/userfiles/image/spiritualresearch/ghosts/negative-energies/table-3.gif&amp;amp;raw&quot; style=&quot;width: 603px;height: 472px&quot; width=&quot;603&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;498&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;499&quot; id=&quot;33_Negative_thoughts_about_Spirituality&quot;&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;3.3 Negative thoughts about Spirituality&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;480&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;The thoughts that negative energies (ghosts, demons,&amp;nbsp;devils etc.) send against spiritual practice, including one’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;491&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/happiness/gaininghappiness/happiness_servicetogod_f&quot;&gt;&lt;span data-dcnode-id=&quot;495&quot; instrument_node=&quot;&quot;&gt;service unto the Absolute Truth&amp;nbsp;(&lt;/span&gt;&lt;em data-dcnode-id=&quot;493&quot;&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;satsēvā&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;492&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/a&gt;&lt;em data-dcnode-id=&quot;489&quot;&gt;&lt;span data-dcnode-id=&quot;490&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;488&quot; instrument_node=&quot;&quot;&gt; are, for example: “Spiritual practice is fake”, “There is no God”, “God hates you”, “Guru is fake and is cheating you”, “Guru/God likes others more than you”, “You are not treated fairly”, “The&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;485&quot;&gt;&lt;a data-dcnode-id=&quot;486&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/happiness/gaininghappiness/happiness_servicetogod_f&quot;&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;satseva&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt; that you are doing is not &lt;/span&gt;&lt;em data-dcnode-id=&quot;482&quot;&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;satseva”&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;, “Spread of Spirituality cannot happen”. They can also send intellectual doubts to discount spiritual science, for example: “Meat is good because it has iron. &amp;nbsp;If you don’t eat meat you will get sick. Science has proven this and spiritual science is wrong”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;459&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;Negative energies (ghosts, demons, devils etc.) also send thoughts distorting spiritual science in order to&amp;nbsp;bring about &lt;/span&gt;&lt;a data-dcnode-id=&quot;475&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/spiritualscience/sattva_raja_tama&quot;&gt;&lt;em data-dcnode-id=&quot;476&quot;&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt;tāmasik&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;474&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;472&quot; style=&quot;line-height: 1.4em&quot;&gt;&lt;span data-dcnode-id=&quot;473&quot; instrument_node=&quot;&quot;&gt;behaviour, such as: “Nothing much will happen if you don’t take a shower or clean the house.&amp;nbsp; These are just gross level things.&amp;nbsp; Subtle is more important so you don’t have to do it”. Or it can be a thought to induce incorrect spiritual practice, such as: “You should just sit and chant and not do &lt;/span&gt;&lt;/span&gt;&lt;em data-dcnode-id=&quot;470&quot; style=&quot;line-height: 1.4em&quot;&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt;satseva&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;468&quot; style=&quot;line-height: 1.4em&quot;&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt; because chanting is within and &lt;/span&gt;&lt;/span&gt;&lt;em data-dcnode-id=&quot;466&quot; style=&quot;line-height: 1.4em&quot;&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;satseva&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;464&quot; style=&quot;line-height: 1.4em&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt; is external and at the gross level.&amp;nbsp;You don’t need to do &lt;/span&gt;&lt;/span&gt;&lt;em data-dcnode-id=&quot;462&quot; style=&quot;line-height: 1.4em&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;satseva&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;460&quot; style=&quot;line-height: 1.4em&quot;&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt; since you have gone beyond it.&amp;nbsp; You are already feeling Bliss”.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;453&quot;&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;In more extreme cases of distorting spiritual science, negative energies (ghosts, demons,&amp;nbsp;devils etc.) can send thoughts to make the person think that the negative act is a positive act, such as: “You should guide yourself.&amp;nbsp;&amp;nbsp;By following others, you are not connected to God but to the person. Each person should be his own guide”, or “Drugs give spiritual experiences and drugs are a spiritual tool for growth”.&amp;nbsp; In regards to telling others about Spirituality, the negative energies can also send incorrect thoughts about how Spirituality should be spread or disseminated.&amp;nbsp;They can give&amp;nbsp;thoughts to do &lt;/span&gt;&lt;em data-dcnode-id=&quot;455&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;satseva&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and spread&amp;nbsp;Spirituality at a psychological level that&amp;nbsp;actually&amp;nbsp;may lead to mistakes. They may also give thoughts of improper judgment about a curious person (for example, sending the message&amp;nbsp;that a person is a seeker when he&amp;nbsp;is not, or&amp;nbsp;the reverse, that the person is not a seeker when he is).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;450&quot; style=&quot;text-align: center&quot;&gt;&lt;img alt=&quot;negative thoughts about spirituality in people given by negative energies&quot; class=&quot;alignnone&quot; data-dcnode-id=&quot;451&quot; height=&quot;335&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/userfiles/image/spiritualresearch/ghosts/negative-energies/table-4.gif&amp;amp;raw&quot; style=&quot;width: 603px;height: 335px&quot; width=&quot;603&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;446&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;447&quot; id=&quot;4_How_negative_energies_ghosts_demons_devils_etc_increase_thoughts_of_pride_and_ego_in_people&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;4. How negative energies (ghosts, demons, devils etc.) increase thoughts of pride and ego in people&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;443&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;To increase our thoughts of pride and ego, negative energies (ghosts, demons, devils etc.) send thoughts, such as: “You have done this so well”, “Everyone will see it”, “You will be praised”, “Everyone is looking at you”, “You look good”, “You are so smart”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;440&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;These thoughts may be about many different things, even small unimportant acts. In the case of seekers, negative energies make stronger suggestions, for example: “You are the strongest of all”, “You are the smartest of all”, and “No one in the world can do this better than you”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;437&quot; style=&quot;text-align: center&quot;&gt;&lt;img alt=&quot;Impact of pride and ego-related thoughts given by higher level negative energies&quot; data-dcnode-id=&quot;438&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/userfiles/image/spiritualresearch/ghosts/negative-energies/table-5.gif&amp;amp;raw&quot; style=&quot;width: 603px;height: 356px&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;433&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;434&quot; id=&quot;5_How_negative_energies_ghosts_demons_devils_etc_give_very_bad_and_aggressive_thoughts_to_people_thoughts_of_breaking_things_beating_other_people_murder_rape_or_similar&quot;&gt;&lt;span data-dcnode-id=&quot;435&quot; instrument_node=&quot;&quot;&gt;5. How negative energies (ghosts, demons, devils etc.) give very bad and aggressive thoughts to people (thoughts of breaking things, beating other people, murder, rape or similar)&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;430&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;431&quot; instrument_node=&quot;&quot;&gt;To influence people to perform really aggressive acts, negative energies (ghosts, demons, devils etc.) send a visualisation of the act into the person’s mind. The person sees the act already happening within his mind and is then motivated to act out what is visualised.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;427&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;428&quot; instrument_node=&quot;&quot;&gt;In addition to the visualisation, negative energies&amp;nbsp;can send a feeling of pleasure coming out of the act, meaning they let a person experience a fake sense of pleasure from visualising the committed act.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;424&quot; style=&quot;text-align: center&quot;&gt;&lt;img alt=&quot;aggressive thoughts in people given by negative energies&quot; class=&quot;alignnone&quot; data-dcnode-id=&quot;425&quot; height=&quot;331&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/userfiles/image/spiritualresearch/ghosts/negative-energies/table-6.gif&amp;amp;raw&quot; style=&quot;width: 603px;height: 331px&quot; width=&quot;603&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;420&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;421&quot; id=&quot;6_In_summary_steps_to_reduce_the_influence_of_negative_energies_ghosts_demons_devilsetc_on_the_mind&quot;&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt;6. In summary – steps to reduce the influence of negative energies (ghosts, demons, devils&amp;nbsp;etc.) on the mind&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;419&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;408&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;Unknown to most of mankind, a major &lt;/span&gt;&lt;a data-dcnode-id=&quot;416&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spiritualresearchfoundation.org/spiritualresearch/spiritualscience/goodversusevil&quot;&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;battle of good versus evil&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt; has been taking place in the subtle-regions since 1993. From time to time throughout history, the subtle-forces of evil gain enough spiritual energy to attempt to establish a demonic kingdom in the Universe. One of the ways in which they trouble mankind through this subtle-battle is by sowing thoughts of unrighteous behaviour that takes people away from the pursuit of spiritual growth and increases the &lt;/span&gt;&lt;em data-dcnode-id=&quot;413&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;Raja&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;em data-dcnode-id=&quot;410&quot;&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;Tama&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt; components in the environment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;407&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;405&quot; style=&quot;text-align: justify&quot;&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt;Since most people are unaware of this battle, they do not realise that the thoughts they experience may originate from negative entities in the spiritual realm. It is only through regular spiritual practice that one starts to recognise such occurrences, learns to overcome their effect and is protected from them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;404&quot; instrument_node=&quot;&quot;&gt;
