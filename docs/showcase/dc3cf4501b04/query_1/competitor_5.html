&lt;/span&gt;&lt;p data-dcnode-id=&quot;795&quot;&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;Can you imagine&amp;nbsp;a&amp;nbsp;world where all employers&amp;nbsp;view their employees as whole human beings who desire meaning and purpose in their personal and professional lives? It turns out&amp;nbsp;that &lt;/span&gt;&lt;a data-dcnode-id=&quot;800&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//blog.15five.com/management-2-0-coaching-employees-in-the-new-economy/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;employee-focused management&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt; creates the most productive and sustainably engaged employees, which in-turn creates &lt;/span&gt;&lt;a data-dcnode-id=&quot;797&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//employeeengagement.com/wp-content/uploads/2013/06/Gallup-2013-State-of-the-American-Workplace-Report.pdf&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;more profitable businesses&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;794&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;792&quot;&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;This month’s roundup of articles explores a shift in perspective — refocusing the lens to see employees as full-spectrum humans, and managers as people who support their growth and well-being. Employees in this brave new world not only excel at their work and grow more loyal to the company, but also have the space to discover fulfillment in every aspect of their lives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;784&quot; id=&quot;h-1-positive-teams-are-more-productive&quot;&gt;&lt;strong data-dcnode-id=&quot;785&quot;&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;1.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;786&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//hbr.org/2015/03/positive-teams-are-more-productive&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;Positive Teams Are More Productive&lt;/span&gt;&lt;/a&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;779&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;by&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;780&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/emmaseppala&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;Emma Seppälä&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;776&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;Let’s toss out the old methods of engagement, the carrots (perks and bonuses)&amp;nbsp;designed to boost performance. &amp;nbsp;Instead, why not treat one another well all the time, making the workplace a more positive place to be?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;767&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;Seppälä brings us the tools to form a practical ethos around positivity to create connection, confidence and well-being in the workplace. Drawing from a &lt;/span&gt;&lt;a data-dcnode-id=&quot;772&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//jab.sagepub.com/content/early/2011/01/26/0021886310395514.full.pdf%2Bhtml&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;recent study&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt; in the &lt;/span&gt;&lt;em data-dcnode-id=&quot;769&quot;&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;Journal of Applied Behavioral Science&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;, she lays out the practices that boost performance and the reasons these benefit companies across the board:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;745&quot;&gt;&lt;li data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;763&quot;&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt;Care for, support, and inspire one another at work&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;756&quot;&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;758&quot;&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;Offer kindness and compassion when others are struggling&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;751&quot;&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;753&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;Avoid blame and forgive mistakes&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;746&quot;&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;748&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;Demonstrate respect, gratitude, trust, and integrity&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;742&quot;&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;In the midst of challenge and struggle, committing to positivity while communicating authentically, makes for strong, confident teams. On high functioning teams, everyone is committed to growth and supported by the exemplary leadership of caring managers. These are key features of some of the fastest growing companies in the country.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-block-image size-full&quot; data-dcnode-id=&quot;738&quot;&gt;&lt;a data-dcnode-id=&quot;739&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.15five.com/ebook/remote-employee-questions/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;wp-image-14649&quot; data-dcnode-id=&quot;740&quot; height=&quot;90&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 728px) 100vw, 728px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.15five.com/blog/wp-content/uploads/2022/03/remote-employee-questions-728x90-1.jpg&amp;amp;raw&quot; srcset=&quot;https://www.15five.com/blog/wp-content/uploads/2022/03/remote-employee-questions-728x90-1.jpg 728w, https://www.15five.com/blog/wp-content/uploads/2022/03/remote-employee-questions-728x90-1-300x37.jpg 300w&quot; width=&quot;728&quot;&gt;&lt;/a&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;731&quot; id=&quot;h-2-in-praise-of-meaningless-work&quot;&gt;&lt;strong data-dcnode-id=&quot;732&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;2.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;734&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.newrepublic.com/article/121171/praise-meaningless-work&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;735&quot; instrument_node=&quot;&quot;&gt;In Praise of Meaningless Work&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;733&quot;&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;726&quot;&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;by &lt;/span&gt;&lt;a data-dcnode-id=&quot;727&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/joekeohane&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;Joe Keohane&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;723&quot;&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;As the pendulum swings from the paradigm of worker-as-cog, to employee-as-human, making work meaningful has significant implications on work/life balance. On one end, imbuing purpose can motivate workers to step into leadership roles and take on longer hours. On the other, working excessive hours without anything left for personal development is not ultimately fulfilling.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;720&quot;&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;Instead of working people into the ground with high ideals in tow, it would behoove managers to acknowledge that people need to rest and recuperate, spend time with their families, and create meaning in their lives outside of the office.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;714&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;Hire the right people and give them tasks that are aligned with their &lt;/span&gt;&lt;a data-dcnode-id=&quot;716&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//blog.15five.com/are-you-living-in-your-zone-of-genius/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;zones of&amp;nbsp;genius&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;. Then mentor them towards personal and professional success, which results in unimaginable enhancements to businesses.&amp;nbsp;Keohane lays it down authentically and simply in his plea to managers: “Hire good people. Treat them well. Help them succeed. Compensate them fairly. Let them go home.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;708&quot; id=&quot;h-3-when-employee-engagement-turns-into-employee-burnout&quot;&gt;&lt;strong data-dcnode-id=&quot;709&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;3.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;710&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nytimes.com/2015/03/14/business/dealbook/when-employee-engagement-turns-into-employee-burnout.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;711&quot; instrument_node=&quot;&quot;&gt;When Employee Engagement Turns Into Employee Burnout&lt;/span&gt;&lt;/a&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;703&quot;&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;by &lt;/span&gt;&lt;a data-dcnode-id=&quot;704&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/tonyschwartz&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;Tony Schwartz&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;698&quot;&gt;&lt;a data-dcnode-id=&quot;700&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.15five.com/products/performance/employee-engagement/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;Employee engagement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;699&quot; instrument_node=&quot;&quot;&gt; is all the rage these days. But that usually translates into arriving early, staying late and foregoing a balanced healthy lifestyle. It turns out that many of today’s companies with the highest profit margins also promote physical, emotional, and social well-being in their employees.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;695&quot;&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;Schwartz highlights the phenomenon of “compassion fatigue”. In mission-driven organizations where people are inspired to give time and effort to help others,&amp;nbsp;&amp;nbsp;they are rarely supported in caring for themselves. It’s not realistic to expect employees to invest in a higher purpose if employers aren’t meeting their core needs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;692&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;The new gauge of successful teams is in correlation to how consistently energized they feel. This requires the space to rest and refuel, and 60-70 hour workweeks are not going to cut it in that regard. Core needs like sleep, basic self-care, and time on nights and weekends to connect with friends and family all are important. When employees feel that their core needs are being met, they come to work more activated to give to their teams. And by living their purpose outside of work, people derive inspiration and motivation to contribute their best at the office.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;686&quot; id=&quot;h-4-workplace-culture-is-everything-20-ideas-for-building-a-thriving-team&quot;&gt;&lt;strong data-dcnode-id=&quot;687&quot;&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;4.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;688&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.helpscout.net/blog/workplace-culture-20-ideas/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;Workplace Culture is Everything: 20 Ideas For Building a Thriving Team&lt;/span&gt;&lt;/a&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;681&quot;&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;by&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;682&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/pauljun_&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;Paul Jun&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;675&quot;&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;Positive &lt;/span&gt;&lt;a data-dcnode-id=&quot;677&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//blog.15five.com/improve-your-company-culture-with-5-simple-questions/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;company culture&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt; begins in the exemplary, imitation-worthy behaviors that reflect the core values of an organization of leaders. This includes acknowledging the difference between productivity and over-work, committing to creativity, and being curious about what enables employees to bring their gifts and stay motivated:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;672&quot;&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;“You owe it not only to yourself, your customers, and your dreams, but to your team that grows alongside with you. Providing that place of security, freedom, motivation, and meaningful work—what greater honor is there than to help others live well and inspire them to actualize their potential?”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;blog-post&quot; data-dcnode-id=&quot;663&quot;&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;665&quot;&gt;&lt;strong data-dcnode-id=&quot;666&quot;&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;5.&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;667&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.forbes.com/sites/lizryan/2015/03/22/why-employee-happiness-is-the-wrong-goal/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;Why Employee Happiness Is The Wrong Goal&lt;/span&gt;&lt;/a&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;657&quot;&gt;&lt;b data-dcnode-id=&quot;658&quot;&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;659&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/humanworkplace&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;Liz Ryan&lt;/span&gt;&lt;/a&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;654&quot;&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;The “Happy Employee Model” is becoming a fad that prioritizes the more material comforts of spacious offices and flexible hours, but fails to actually provide the results of true employee happiness. &amp;nbsp;Instead of implementing more programs to ensure contented co-collaborators, Ryan argues that the real focus should be around removing whatever is in the way of connection and empowerment in the first place.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;653&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;651&quot;&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;She asks managers to make their workplaces more human and stop insulting their workers with talk about making employees happy while the obstacles to happiness are clear:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;629&quot;&gt;&lt;li data-dcnode-id=&quot;645&quot;&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;647&quot;&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;Forced or stacked ranking&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;640&quot;&gt;&lt;span data-dcnode-id=&quot;644&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;642&quot;&gt;&lt;span data-dcnode-id=&quot;643&quot; instrument_node=&quot;&quot;&gt;Red tape bureaucracy and rules&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;641&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;635&quot;&gt;&lt;span data-dcnode-id=&quot;639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;637&quot;&gt;&lt;span data-dcnode-id=&quot;638&quot; instrument_node=&quot;&quot;&gt;Archaic policies around attendance and bereavement leave&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;636&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;630&quot;&gt;&lt;span data-dcnode-id=&quot;634&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;632&quot;&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;Individual performance management systems&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;631&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;628&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;626&quot;&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;Old paradigm policy is not going to bring us into a more human workplace. Begin&amp;nbsp;with dismantling the “Godzilla apparatus” that drives fear and is a major obstacle in the way of trust. &amp;nbsp;Release the binds of old structures that limit growth and creative potential, and make room for inspiration to flourish.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;623&quot;&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;What would it look like for managers to support employees at work while simultaneously meeting their core needs for self-care and personal fulfillment? What if we committed to shifting into a re-humanized workplace, where&amp;nbsp;people&amp;nbsp;are supported in living great lives and everyone is more successful as a result?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;622&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;616&quot;&gt;&lt;a data-dcnode-id=&quot;620&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//creativecommons.org/licenses/by-nd/2.0/legalcode&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;Image Credit&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;:&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;617&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.flickr.com/photos/hikingartist/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;618&quot; instrument_node=&quot;&quot;&gt;Frits Ahlefeldt-Laurvig&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;
