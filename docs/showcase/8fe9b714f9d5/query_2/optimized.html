&lt;div class=&quot;wp-block-group is-style-default has-ui-text-color-color has-text-color has-link-color has-sans-serif-font-family wp-elements-75a279a7176c808835420247b72b8013 is-content-justification-space-between is-layout-flex wp-container-core-group-is-layout-9366075c wp-block-group-is-layout-flex&quot; style=&quot;font-size:13px;letter-spacing:1px;text-transform:uppercase&quot;&gt;
&lt;div class=&quot;wp-block-group wp-container-content-9cfa9a5a is-nowrap is-layout-flex wp-container-core-group-is-layout-f1189ed3 wp-block-group-is-layout-flex&quot;&gt;&lt;div class=&quot;wp-elements-fe804207964bf7439b5b8403ce8d4001 wp-block-prc-block-post-taxonomy-terms has-text-color has-ui-gray-very-dark-color is-horizontal is-content-justification-left is-layout-flex wp-container-prc-block-post-taxonomy-terms-is-layout-d550e4e1 wp-block-prc-block-post-taxonomy-terms-is-layout-flex&quot; style=&quot;font-size:12px; padding-left:0; &quot;&gt;&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;h2 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-f6c5b9ed&quot; id=&quot;e9c62caa75a0d6345362d31347d6bf9b&quot;&gt;Overview&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-23676ab3&quot;&gt;The role of democracy in addressing capitalism’s failures lies in its promotion of political pluralism, a fair judiciary, free media, transparency, and accountability—principles essential for guiding economic reforms that aim to benefit the broader population rather than just elites. Despite these democratic values, two decades after the Soviet Union’s collapse, Russians, Ukrainians, and Lithuanians express widespread dissatisfaction with their countries’ political and economic directions, reflecting disillusionment with democracy’s ability to correct inequalities and failures inherent in capitalism. Enthusiasm for democracy and capitalism has significantly declined since 1991, with many believing the changes have negatively impacted public morality, law and order, and living standards.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-710a08f5&quot;&gt;A common perception is that political and business elites have disproportionately benefited from the post-Soviet economic transition, while average citizens have been left behind, highlighting capitalism’s failures in equitable wealth distribution. Although people in these former Soviet republics continue to support core democratic institutions like a fair judiciary and free media, they doubt these institutions have been fully developed or effectively implemented, which undermines confidence that democracy can ensure transparent and equitable economic reforms.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-f86393d7&quot;&gt;This skepticism contrasts sharply with the optimism recorded in spring 1991 by the Times Mirror Center, when solid majorities in Russia, Ukraine, and Lithuania supported a shift to multiparty democracy. At that time, all three were still part of the USSR, which formally dissolved on December 25, 1991.&lt;sup class=&quot;footnote&quot;&gt;&lt;a href=&quot;#fn-32314-1&quot; id=&quot;fnref-32314-1&quot;&gt;1&lt;/a&gt;&lt;/sup&gt; Today, only 35% of Ukrainians and about half of Russians and Lithuanians approve of the move to a multiparty system, reflecting diminished faith in democracy’s capacity to address the shortcomings of capitalism and political reform.&lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;has-link-color wp-elements-9689ea8d84e0efc1ee6f3e0443c7b264 wp-block-post-date has-text-color has-ui-gray-very-dark-color&quot; style=&quot;font-size:12px;&quot;&gt;&lt;time datetime=&quot;2011-12-05T13:00:06-05:00&quot;&gt;December 5, 2011&lt;/time&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;wp-block-group has-ui-white-background-color has-background has-global-padding is-layout-constrained wp-block-group-is-layout-constrained wp-container-7 is-position-sticky block-visibility-hide-large-screen block-visibility-hide-medium-screen has-sticky-background has-sticky-background-ui-white-color has-stuck-box-shadow&quot; data-sticky-id=&quot;sticky-8&quot; data-wp-init--sticky-support=&quot;prc-block/supports::callbacks.onInit&quot; data-wp-interactive=&quot;prc-block/supports&quot; style=&quot;border-top-color:var(--wp--preset--color--ui-gray-light);border-top-width:1px;border-bottom-color:var(--wp--preset--color--ui-gray-light);border-bottom-width:1px;padding-top:0;padding-bottom:0;box-shadow:var(--wp--preset--shadow--shallow)&quot;&gt;
&lt;details class=&quot;wp-block-details is-layout-flow wp-container-core-details-is-layout-43291e1e wp-block-details-is-layout-flow&quot; data-wp-context='{&quot;closeWhenFocusLost&quot;:true}' data-wp-interactive=&quot;core/details&quot; data-wp-on-document--click=&quot;actions.handleOutsideClick&quot; style=&quot;padding-top:var(--wp--preset--spacing--30);padding-right:var(--wp--preset--spacing--30);padding-bottom:var(--wp--preset--spacing--30);padding-left:var(--wp--preset--spacing--30)&quot;&gt;&lt;summary&gt;Table of Contents&lt;/summary&gt;&lt;/details&gt;
&lt;/div&gt;
&lt;div class=&quot;wp-block-group is-layout-flow wp-block-group-is-layout-flow&quot;&gt;&lt;div class=&quot;entry-content wp-block-post-content has-global-padding is-content-justification-center is-layout-constrained wp-container-core-post-content-is-layout-887079b1 wp-block-post-content-is-layout-constrained&quot; style=&quot;padding-top:0px;margin-top:0;&quot;&gt;
&lt;figure&gt;&lt;img alt=&quot;&quot; class=&quot;alignright size-full wp-image-17428 not-transparent&quot; data-dominant-color=&quot;f5f6f7&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; fetchpriority=&quot;high&quot; height=&quot;268&quot; src=&quot;https://assets.pewresearch.org/wp-content/uploads/sites/2/2011/12/Anniv-of-Fall-of-Soviet-Union-20110044.png&quot; style=&quot;--dominant-color: #f5f6f7;&quot; width=&quot;291&quot;/&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-a0055d39&quot;&gt;As was the case two decades ago, the shift towards democracy tends to be more popular among those who are perhaps best positioned to take advantage of the opportunities provided by an open society. In all three countries, young people, the well-educated and urban dwellers express the most support for their country’s move to a multiparty system.&lt;/p&gt;
&lt;figure&gt;&lt;img alt=&quot;&quot; class=&quot;alignright size-full wp-image-17371 not-transparent&quot; data-dominant-color=&quot;544b48&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; height=&quot;210&quot; src=&quot;https://assets.pewresearch.org/wp-content/uploads/sites/2/2011/12/Anniv-of-Fall-of-Soviet-Union-20110040.png&quot; style=&quot;--dominant-color: #544b48;&quot; width=&quot;186&quot;/&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-0202fbd4&quot;&gt;People in these former Soviet republics are much less confident that democracy can solve their country’s problems than they were in 1991. When asked whether they should rely on a democratic form of government or a leader with a strong hand to solve their national problems, only about three-in-ten Russians and Ukrainians choose democracy, down significantly from 1991. Roughly half (52%) say this in Lithuania, a 27-percentage-point decline from the level recorded two decades ago.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-bc262431&quot;&gt;When asked about the current state of democracy in their country, big majorities in all three former republics say they are dissatisfied. Moreover, in Lithuania and Ukraine, dissatisfaction has increased in just the last two years. A fall 2009 Pew Global Attitudes survey found that 60% of Lithuanians said they were dissatisfied with the way democracy was working; today 72% say so. In Ukraine, unhappiness with the state of democracy has risen from 70% to 81%.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-e3e25825&quot;&gt;These are among the major findings from a survey by the Pew Research Center’s Global Attitudes Project, conducted in Russia, Ukraine and Lithuania from March 21 to April 7 as part of a broader 23-nation poll in spring 2011. The survey reexamines a number of issues first explored in a spring 1991 survey conducted by the Times Mirror Center, the predecessor of the Pew Research Center for the People &amp;amp; the Press. This report also presents a number of key findings from a fall 2009 Pew Global Attitudes survey, conducted in these three nations, as well as in 10 other European countries and the United States. &lt;em&gt;(See “&lt;a href=&quot;https://www.pewresearch.org/global/2009/11/02/end-of-communism-cheered-but-now-with-more-reservations/&quot;&gt; End of Communism Cheered but Now with More Reservations &lt;/a&gt;,” released November 2, 2009.)&lt;/em&gt;&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-847d871b&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;708bc1dca274be45cf69a13b9b9dea73&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;708bc1dca274be45cf69a13b9b9dea73&quot;&gt;Changes Have Helped Elites&lt;/h3&gt;
&lt;figure&gt;&lt;img alt=&quot;&quot; class=&quot;alignright size-full wp-image-17372&quot; decoding=&quot;async&quot; height=&quot;369&quot; src=&quot;https://assets.pewresearch.org/wp-content/uploads/sites/2/2011/12/Anniv-of-Fall-of-Soviet-Union-20110039.png&quot; width=&quot;291&quot;/&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-468b5433&quot;&gt;Large majorities in all three nations believe that elites have prospered over the last two decades, while average citizens have not. In Ukraine, for instance, 95% think politicians have benefited a great deal or a fair amount from the changes since 1991, and 76% say this about business owners. However, just 11% believe ordinary people have benefited.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-30d7ddae&quot;&gt;The fall 2009 survey further highlighted the extent to which these publics are disillusioned with their political leadership. Few believed politicians listened to them or that politicians governed with the interests of the people in mind.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-0cc4db7e&quot;&gt;Just 26% of Russians, 23% of Ukrainians, and 15% of Lithuanians agreed with the statement “most elected officials care what people like me think.” And only 37% in Russia, 23% in Lithuania, and 20% in Ukraine agreed that “generally, the state is run for the benefit of all the people.”&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-6cfd65c9&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;8c3f868ca0bc567daedf1f97ceb70212&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;8c3f868ca0bc567daedf1f97ceb70212&quot;&gt;A Democracy Gap&lt;/h3&gt;
&lt;p data-geo-id=&quot;geo-dbf8242c&quot;&gt;As the findings of the 2009 survey make clear, there is a considerable gap between the democratic aspirations of Eastern Europeans and their perceptions of how democracy actually works in the former Eastern bloc.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-61e78782&quot;&gt;In all three former Soviet republics surveyed, the 2009 poll found widespread support for specific features of democracy, such as a fair judiciary, honest elections, freedom of the press, freedom of religion, free speech and civilian control of the military.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9c9d779f&quot;&gt;Majorities consistently said it was important to live in a country that had these key democratic institutions and values, and large numbers believed most of these features were &lt;em&gt;very&lt;/em&gt; important. However, considerably fewer thought their countries actually had these democratic institutions and freedoms.&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-5cd67cae&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;7e67291ee43e0a081f5475c1e6b8e799&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;7e67291ee43e0a081f5475c1e6b8e799&quot;&gt;Less Confidence in Free Markets&lt;/h3&gt;
&lt;p data-geo-id=&quot;geo-69107e24&quot;&gt;Just as views about democracy have soured over the past two decades, so have attitudes toward capitalism. In 1991, 76% of Lithuanians approved of switching to a market economy; now, only 45% approve. Among Ukrainians, approval fell from 52% in 1991 to 34% today. Meanwhile, 42% of Russians currently endorse the free market approach, a 12-percentage-point drop since 1991, eight points of which occurred in just the last two years. In all three nations, young people and the college educated are more likely to embrace free markets.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-af4e883c&quot;&gt;Waning confidence in capitalism may be tied at least in part to frustration with the current economic situation. Only 29% of Russians say their economy is in good shape, while Lithuanians and Ukrainians offer even bleaker assessments. Among the 23 nations from regions around the world included in the spring 2011 Pew Global Attitudes survey, Lithuanians (9% good) and Ukrainians (6%) give their economies the lowest ratings. &lt;em&gt;(For more, see “&lt;a href=&quot;https://www.pewresearch.org/global/2011/07/13/china-seen-overtaking-us-as-global-superpower/6/#chapter-5-economic-issues&quot;&gt; China Seen Overtaking U.S. as Global Superpower &lt;/a&gt;,” released July 13, 2011.)&lt;/em&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-67c86407&quot;&gt;Moreover, optimism about the economic future is in short supply. More than four-in-ten Ukrainians (44%) expect their economy to worsen over the next 12 months, while 36% believe it will stay about the same, and just 15% think it will improve. Optimism is also sparse in Lithuania, with 31% saying things will worsen, 43% saying things will stay the same, and 21% suggesting the situation will improve. Russians see things a bit more positively: 18% worsen, 46% remain the same, 28% improve.&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-286dea68&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;023171533a1bea8f211e732d3bfe1268&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;023171533a1bea8f211e732d3bfe1268&quot;&gt;Negative Impacts on Society&lt;/h3&gt;
&lt;figure&gt;&lt;img alt=&quot;&quot; class=&quot;alignright size-full wp-image-17373&quot; decoding=&quot;async&quot; height=&quot;353&quot; loading=&quot;lazy&quot; src=&quot;https://assets.pewresearch.org/wp-content/uploads/sites/2/2011/12/Anniv-of-Fall-of-Soviet-Union-20110038.png&quot; width=&quot;290&quot;/&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-adc943be&quot;&gt;Many in these three nations believe the enormous transformations that have taken place since the demise of the Soviet Union have had negative consequences for their societies. In particular, majorities in all three say the changes since 1991 have had a bad influence on the standard of living, the way people in society treat one another, law and order, and public morality.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-36b7f5e3&quot;&gt;Overall, Lithuanians are less negative than Ukrainians and Russians about the impact of the post-Soviet era. For example, majorities in the latter two nations say the changes have negatively affected national pride, while only 30% of Lithuanians hold this view.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-cd0794e7&quot;&gt;Even so, Lithuanians are generally more negative about the impact of these changes today than they were in 1991, when the Times Mirror Center survey asked about the dramatic shifts that were underway. Conversely, Russians and Ukrainians have actually become slightly less negative since 1991, when they were even more likely than they are today to believe the changes were having a bad impact on their societies.&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-50d382e9&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;079b6573e4595be285a94121811ea808&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;079b6573e4595be285a94121811ea808&quot;&gt;Lithuanian Individualism&lt;/h3&gt;
&lt;p data-geo-id=&quot;geo-397c7271&quot;&gt;Lithuanians also stand apart when it comes to questions about individualism and the locus of responsibility for success in life. Most Lithuanians (55%) believe that people who get ahead these days do so because they have more ability and ambition, compared with only 38% of Russians and 32% of Ukrainians.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-1483be31&quot;&gt;Similarly, 58% in Lithuania think that most people who do not succeed in life fail because of their own individual shortcomings, rather than because of society’s failures. Just 47% of Russians and 40% of Ukrainians express this opinion.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-4b624f0b&quot;&gt;Still, there is consensus across all three nations that the state’s role in guaranteeing individual freedom should not trump its responsibility for providing a social safety net. When asked which is more important, “that everyone be free to pursue their life’s goals without interference from the state” or “that the state play an active role in society so as to guarantee that nobody is in need,” more than two-thirds choose the latter in Russia, Ukraine, and Lithuania. Moreover, the belief that the state must ensure that no one is in need has become significantly more common since 1991 in all three nations.&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-9f5e2da9&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;666dc9fafa4a55acf20b03e286dd60be&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;666dc9fafa4a55acf20b03e286dd60be&quot;&gt;Russian Nationalism&lt;/h3&gt;
&lt;p data-geo-id=&quot;geo-57991e42&quot;&gt;Twenty years after the collapse of the Soviet empire, roughly half of Russians (48%) believe it is natural for their country to have an empire, while just 33% disagree with this idea. By contrast, in 1991, during the final months of the USSR, significantly fewer (37%) thought it was natural for Russia to have an empire, while 43% disagreed.&lt;/p&gt;
&lt;figure&gt;&lt;img alt=&quot;&quot; class=&quot;alignright size-full wp-image-17374&quot; decoding=&quot;async&quot; height=&quot;360&quot; loading=&quot;lazy&quot; src=&quot;https://assets.pewresearch.org/wp-content/uploads/sites/2/2011/12/Anniv-of-Fall-of-Soviet-Union-20110037.png&quot; width=&quot;186&quot;/&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-5c482684&quot;&gt;Half of Russians also agree with the statement “it is a great misfortune that the Soviet Union no longer exists;” 36% disagree. This is a slight decline from 2009, when 58% agreed and 38% disagreed. Russians ages 50 and older tend to express more nostalgia for the Soviet era than do those under 50.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-6e358417&quot;&gt;Despite widespread nationalist sentiments, Russian attitudes toward Ukrainians and Lithuanians in their country are largely positive – 80% express a favorable view of the Ukrainians and 62% give a positive rating to Lithuanians.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-0eea214c&quot;&gt;For their part, Ukrainians express overwhelmingly positive views about Russians, Poles, and Lithuanians in their country. Similarly, in Lithuania, attitudes toward Russians, Ukrainians, and Poles are all generally positive.&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-70113df1&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;5a642ba9a6e55f785dc27ccaec3ed7fe&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;5a642ba9a6e55f785dc27ccaec3ed7fe&quot;&gt;Looking West or East?&lt;/h3&gt;
&lt;figure&gt;&lt;img alt=&quot;&quot; class=&quot;alignright size-full wp-image-17375&quot; decoding=&quot;async&quot; height=&quot;168&quot; loading=&quot;lazy&quot; src=&quot;https://assets.pewresearch.org/wp-content/uploads/sites/2/2011/12/Anniv-of-Fall-of-Soviet-Union-20110036.png&quot; width=&quot;290&quot;/&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-dc815c10&quot;&gt;Attitudes toward the European Union and NATO are overwhelming positive in Lithuania, which joined both organizations in 2004. In fact, Lithuanians give the EU its highest rating among the 23 countries included in the spring 2011 poll. Even so, just about half of Lithuanians view their country’s EU membership positively – 49% believe it is a good thing, 31% say it is neither good nor bad, and 8% say it is bad.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-a4184f0e&quot;&gt;Lithuanians give the United States largely positive marks – 73% have a favorable opinion of the U.S. Attitudes toward Russia are also positive on balance (53% favorable, 42% unfavorable), but not as positive as for the EU, NATO, and U.S.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-a14b140d&quot;&gt;Most Ukrainians express favorable opinions of the EU (72%) and U.S. (60%), but NATO is not viewed as warmly (34%). The vast majority of Ukrainians (84%) have a positive view of Russia.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-75d99620&quot;&gt;As is the case in Ukraine, most Russians give the EU (64%) and U.S. (56%) positive reviews, but not NATO (37%).&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-a1931b86&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;2b2dd053a1f7f1f8c2eae9cb2ed03869&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;2b2dd053a1f7f1f8c2eae9cb2ed03869&quot;&gt;Also of Note&lt;/h3&gt;
&lt;ul class=&quot;wp-block-list&quot; data-geo-id=&quot;geo-902c2067&quot;&gt;
&lt;li&gt;&lt;span style=&quot;font-family: Georgia&quot;&gt;When asked which is more important, a good democracy or a strong economy, more than seven-in-ten Russians, Ukrainians and Lithuanians say a strong economy.&lt;/span&gt;&lt;/li&gt;
&lt;li&gt;&lt;span style=&quot;font-family: Georgia&quot;&gt;In Ukraine, a 46%-plurality believes it is natural for Russia to have an empire.&lt;/span&gt;&lt;/li&gt;
&lt;li&gt;&lt;span style=&quot;font-family: Georgia&quot;&gt;The belief that ability and ambition determine success in life is consistently more common among young people in these three former Soviet republics.&lt;/span&gt;&lt;/li&gt;
&lt;li&gt;&lt;span style=&quot;font-family: Georgia&quot;&gt;Attitudes toward NATO vary significantly by region in Ukraine. About six-in-ten (59%) have a positive view of NATO in the Western region of the country. However, those in the Central (38%), South (21%) and East (18%) regions are much less likely to express a favorable opinion of the security alliance.&lt;/span&gt;&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;&lt;/div&gt;
