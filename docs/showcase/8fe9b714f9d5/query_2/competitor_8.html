&lt;/span&gt;&lt;span class=&quot;initcap&quot; data-dcnode-id=&quot;838&quot;&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt;F&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;rom 1989 to 1991, &lt;/span&gt;&lt;span data-dcnode-id=&quot;834&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;835&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Communism.html&quot;&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;communism&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;833&quot; instrument_node=&quot;&quot;&gt; foundered throughout the former Soviet bloc in Europe and Asia. From Prague to Vladivostok, twenty-eight countries in the former Soviet Union and Eastern Europe abandoned similar political and economic systems.&lt;/span&gt;&lt;span class=&quot;footnote&quot; data-dcnode-id=&quot;830&quot; id=&quot;c_lfHendersonCEE2-164_footnote_nt402&quot;&gt;&lt;a data-dcnode-id=&quot;831&quot; href=&quot;#lfHendersonCEE2-164_footnote_nt402&quot;&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;827&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;824&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;820&quot;&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;The Collapse of the Socialist System &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;785&quot; id=&quot;ID0EBFAA&quot;&gt;&lt;span data-dcnode-id=&quot;818&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;788&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;At the end of communism, all these countries were experiencing great economic problems. The old, highly centralized socialist economic system had become ossified. Although it had mobilized labor and capital for industrialization, it failed to keep up with modern economies. Its chronic shortcoming was shortages, as the centralized allocation system failed to balance &lt;/span&gt;&lt;span data-dcnode-id=&quot;814&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;815&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Supply.html&quot;&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;supply&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;span data-dcnode-id=&quot;810&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;811&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Demand.html&quot;&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;demand&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt; for the millions of goods and services characteristic of a modern economy. It was incapable of promoting &lt;/span&gt;&lt;span data-dcnode-id=&quot;806&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;807&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Efficiency.html&quot;&gt;&lt;span data-dcnode-id=&quot;808&quot; instrument_node=&quot;&quot;&gt;efficiency&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt; or quality improvement because it focused on gross production, encouraging excessive use of all inputs. Its ability to innovate was very limited, too. The socialist economy suffered from a dearth of small enterprises and creative destruction (the destroying of the outdated by new and better products and services; see &lt;/span&gt;&lt;span data-dcnode-id=&quot;802&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;803&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/CreativeDestruction.html&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;creative destruction&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;). As free resources dried up, growth rates started stagnating. In addition, an ever-larger share of the Soviet economy, about one-quarter of GDP in the 1980s, was devoted to military spending in the arms race with the United States. The stagnation of the standard of living bred public dissatisfaction, which in turn prompted excessive wage increases and held back necessary price rises. In Poland and the Soviet Union, budget deficits and the &lt;/span&gt;&lt;span data-dcnode-id=&quot;798&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;799&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/MoneySupply.html&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;money supply&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot;&quot;&gt; grew rapidly toward the end of communism, causing &lt;/span&gt;&lt;span data-dcnode-id=&quot;794&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;795&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Hyperinflation.html&quot;&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;hyperinflation&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;—more than 50 percent &lt;/span&gt;&lt;span data-dcnode-id=&quot;790&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;791&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Inflation.html&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;inflation&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt; during one month—drastic falls in output, and economic collapse (Kornai 1992).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;786&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;774&quot; id=&quot;ID0EAFAA&quot;&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;777&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;Market economic transformation was initiated mainly by peaceful political revolutions heralded by a cry for “a normal society,” meaning a democracy and a market economy based on private property and the rule of law. The causes of the collapse of communism were multiple, and their relative importance will remain in dispute. The economic failure was manifold and evident. Political repression and aspirations for national independence also helped cause the collapse. The multinational states—the Soviet Union, Czechoslovakia, and Yugoslavia—fell apart. The Soviet Union’s inability to keep up with the United States in the arms race and in high technology was also a factor. The &lt;/span&gt;&lt;span data-dcnode-id=&quot;779&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;780&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/EuropeanUnion.html&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;European Union&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt; attracted the East-Central European nations, which demanded a “return to Europe.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;775&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;771&quot;&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;Differing Programs of Economic Transformation &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;760&quot; id=&quot;ID0ECEAA&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;763&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;At the beginning, the transition’s direction was clear, but its final aims were not. Overtly, everybody advocated democracy, a normal market economy with predominant private ownership, a rule of law, and a social safety net, but their eventual goals ranged from the American-style mixed economy to a West European–style &lt;/span&gt;&lt;span data-dcnode-id=&quot;765&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;766&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Welfare.html&quot;&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;welfare&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt; state to market socialism. Instead of arguing about aims, people argued over whether the transformation to a market should be radical or gradual.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;761&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;738&quot; id=&quot;ID0EBEAA&quot;&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;741&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;A radical program, “shock therapy” or “the Washington consensus,” became the main proposal for how to undertake&lt;/span&gt;&lt;span data-dcnode-id=&quot;755&quot; id=&quot;CEE_pg_500&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt; the systemic change. It amounted to a comprehensive and radical market reform. Key elements were swift and far-reaching liberalization of prices and trade, sharp reduction of budget deficits, strict &lt;/span&gt;&lt;span data-dcnode-id=&quot;751&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;752&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/MonetaryPolicy.html&quot;&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt;monetary policy&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;, and early &lt;/span&gt;&lt;span data-dcnode-id=&quot;747&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;748&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Privatization.html&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;privatization&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;, usually coupled with international assistance conditioned on reform measures. The program’s main advocate was Jeffrey Sachs of Harvard University, but mainstream Anglo-American macroeconomists; the International Monetary Fund (IMF); the World Bank; the Ministries of Finance of the G-7; and leading policymakers in Poland, the Czech Republic, the Baltic states, and Russia also supported it. Radical reform became the orthodoxy. Advocates used many arguments. The success of reform was in danger if a critical mass of market and private enterprise was not formed fast enough. A semireformed system would maintain major distortions that would cause people to seek privileges and subsidies, and would deter &lt;/span&gt;&lt;span data-dcnode-id=&quot;743&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;744&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Investment.html&quot;&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;investment&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;. The social and political costs of slow reform would be much greater because a semireformed system could not perform well. People were prepared to accept only a limited period of suffering (Fischer and Gelb 1991; Lipton and Sachs 1990; Shleifer and Vishny 1998). Shock therapy was applied in Poland, the Czech Republic, and the three Baltic states (Estonia, Latvia, and Lithuania).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;739&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;727&quot; id=&quot;ID0EAEAA&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;730&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;735&quot; instrument_node=&quot;&quot;&gt;In opposition to the radical reform program, numerous gradual reform programs were formulated. Some favored more gradual deregulation of foreign trade or prices. Others wanted more gradual reduction of inflation rates, budget deficits, and monetary expansion. Many argued that the quality of privatization was more important than its speed. The opponents of radical reform were diverse. Some were theoretical economists who believed that more gradual reform would minimize social suffering. Others, ranging from social democrats to communists, wanted to minimize the role of the market. The most important protagonists, however, were state enterprise managers, state officials, and political economists in the former Soviet Union. All gradualists maintained that the state was strong and capable of social engineering. Gradual reform came to dominate in Hungary, southeast Europe, and most of the former Soviet Union. Late in the day, Professor &lt;/span&gt;&lt;span data-dcnode-id=&quot;732&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;733&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/bios/Stiglitz.html&quot;&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;Joseph Stiglitz&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt; of Columbia University became the leader of the gradualists (Murrell 1992; Roland 2000; Stiglitz 2002).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;728&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;724&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;Dramas of Reform &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;717&quot; id=&quot;ID0EJDAA&quot;&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;720&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;Debate is one thing and implementation is another. In practice, radical reformers were opposed initially by state enterprise managers and later by new businessmen, who were benefiting from transitional market distortions. Many of the anticipated stumbling blocks did not materialize. For instance, labor unrest and popular unrest were minimal, and the large military-industrial complex was timid. Paradoxically, the problem was not the losers but the winners, who made fortunes on the large short-run subsidies garnered during the transition (Hellman 1998). Postcommunist transition is best understood as strife over these subsidies (Åslund 2002).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;718&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;710&quot; id=&quot;ID0EIDAA&quot;&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;713&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;Many economists have undertaken ambitious multi-country regression analyses. Although statistics remain poor, economists widely agree that certain major market reforms increase real growth (Berg et al. 1999). Although the effects are often hard to disentangle because various reforms often occur simultaneously, decontrol of prices and foreign trade appears to have had the greatest impact. Also, inflation needs to fall below 40 percent a year to allow growth, and privatization is unequivocally beneficial. Governments that pursue such sound economic policies adopt more market-oriented legislation than less ambitious reformers do.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;711&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;703&quot; id=&quot;ID0EHDAA&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;706&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;The liberalization of consumer prices and imports was surprisingly easily accepted, and many transition countries—for example, Poland, Estonia, and Russia—abolished all import tariffs to overcome the massive shortages. What proved harder was deregulating prices and exports of commodities because well-connected people wanted to purchase oil, metals, and grain at low prices fixed by the state and sell them on the free-world market at a multiple, making a huge profit. Usually, such decontrol was possible only after a major crisis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;704&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;696&quot; id=&quot;ID0EGDAA&quot;&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;699&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;Inflation was the main economic problem in the early transition. Thirteen countries had fourteen instances of hyperinflation, almost as many hyperinflations as had been registered in prior world history. Many countries entered their transition with high public expenditures boosted by populism. A flawed consensus held that these countries “needed” public expenditures as high as those of West European countries. The East-Central European countries have managed to collect such large state revenues, while most post–Soviet countries saw their revenues shrink in the midst of hyperinflation. Finance ministries had to be strengthened to bring government expenditures under control. Similarly, central banks had to be reinforced and had to tighten monetary controls and eliminate subsidized credits.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;697&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;686&quot; id=&quot;ID0EFDAA&quot;&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;689&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;Only Central Europe and the Baltic states succeeded in their early stabilization efforts. Most of the other countries faced new financial crises, notably Bulgaria in 1996–1997 and Russia in 1998. These crises were caused by excessive budget deficits leading to untenable public debt. An underlying reason was usually semifiscal expenditures, such as public refinancing of loss-making banks in Bulgaria or tax rebates through barter payment of taxes in Russia. Under barter payment, companies paid their taxes in kind by agreeing to build roads or provide other products, extracting&lt;/span&gt;&lt;span data-dcnode-id=&quot;691&quot; id=&quot;CEE_pg_501&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt; sweetheart deals. These renewed financial crises delivered great shocks, inspiring fiscal discipline. Policies on exchange rates have varied greatly. The first successful stabilizations, in Poland and Estonia, were based on pegged (temporarily fixed) exchange rates or currency boards with fixed exchange rates. Misalignment and financial crises, however, have led many countries to adopt floating exchange rates.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;687&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;675&quot; id=&quot;ID0EEDAA&quot;&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;678&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;Privatization has been the most controversial reform because it is a conspicuous distribution of wealth, and all vie for a larger share. Moreover, privatization has been monumental and unprecedented in scope. Small-scale privatization of small shops has usually been undertaken relatively easily by selling them cheaply to their employees. Similarly, much of public &lt;/span&gt;&lt;span data-dcnode-id=&quot;680&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;681&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Housing.html&quot;&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;housing&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt; has been sold for a nominal price to tenants. Agricultural land has been restituted in the Baltics and Central Europe. Land reform occurred early where agriculture is vital to the national economy, but later in other countries.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;676&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;664&quot; id=&quot;ID0EDDAA&quot;&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;667&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;The privatization of large enterprises has been most controversial. The objectives have varied, including privatization for its own sake; for enterprise performance; for state revenues; for the attraction of foreign capital; for the satisfaction of employees, managers, or other domestic stakeholders; and for &lt;/span&gt;&lt;span data-dcnode-id=&quot;669&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;670&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/CorporateGovernance.html&quot;&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;corporate governance&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;. The debate has been polarized between advocates of early mass privatization and protagonists of piecemeal case-by-case privatization. The Czech Republic and Russia pioneered mass privatization of large enterprises through vouchers, which were distributed to all citizens and could be used to purchase shares of large enterprises. Hungary, Poland, and Estonia, by contrast, focused on case-by-case sales (Boycko et al. 1995; Stiglitz 2002). Economic analyses increasingly show that privatization has been beneficial. Start-ups and enterprises with foreign capital have performed the best to date, but enterprises that have participated in mass privatization are swiftly improving their records. Private ownership seems to matter in the long run.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;665&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;657&quot; id=&quot;ID0ECDAA&quot;&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;660&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;The officially measured declines in output have been shocking. Fortunately, these huge drops are not credible because communist statistics exaggerated output, while capitalist statistics fail to cover much of what is going on in the economy. The quality of produce has radically improved, as substandard goods no longer find takers. Major structural changes have occurred. The prior overindustrialization has disappeared, and service sectors have expanded sharply. The huge military-industrial complex has shrunk to West European dimensions. In Russia, for example, military spending is now about 5 percent of GDP, falling from almost 25 percent of GDP in the former Soviet Union. Millions of new small enterprises have been created.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;658&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;638&quot; id=&quot;ID0EBDAA&quot;&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;641&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;The decline in standard of living has been much less than the real contraction in output because consumption has grown sharply as a share of GDP and because much of the prior investment was forced and, therefore, not very valuable. A major concern, however, is that income differentials have risen sharply: in East-Central Europe to a West European level, in Russia to an American level, and in some post-Soviet countries even to a Latin American level. Curiously, &lt;/span&gt;&lt;span data-dcnode-id=&quot;651&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;652&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Pensions.html&quot;&gt;&lt;span data-dcnode-id=&quot;653&quot; instrument_node=&quot;&quot;&gt;pensions&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt; initially increased sharply as a share of GDP, while families with children have suffered disproportionate poverty. Complaints about deteriorating &lt;/span&gt;&lt;span data-dcnode-id=&quot;647&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;648&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Education.html&quot;&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;education&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;span data-dcnode-id=&quot;643&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;644&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/HealthCare.html&quot;&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;health care&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt; are standard, but in most transition countries their share of GDP has actually risen while these government-run systems appear to be in great disarray (Milanovic 1998). A few countries’ governments have deregulated labor markets (Estonia, Latvia, and Kazakhstan), and many have reformed pensions, introducing a privately funded element. On the whole, though, these reforms are lagging.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;640&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;639&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;631&quot; id=&quot;ID0EADAA&quot;&gt;&lt;span data-dcnode-id=&quot;636&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;634&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;International assistance has been greatly disputed. Jeffrey Sachs argues that the West should have done much more, and earlier, for the transition countries, while many others have complained about the IMF being too interventionist. In hindsight, international assistance has been significant, but not generous, and has played a crucial role in the success of the transitions. The IMF has played a key role in virtually every successful stabilization program, and it has been able to “graduate” many of the transition countries, as none has high inflation any longer. The World Bank and USAID have acted on a broader front, particularly assisting in privatization. Private philanthropist George Soros and his Open Society Institute have set an example for support of civil society, education, and much else.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;632&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;628&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;A Great Divide &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;617&quot; id=&quot;ID0EDCAA&quot;&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;620&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;Outcomes have varied remarkably in terms of political system, economic system, and &lt;/span&gt;&lt;span data-dcnode-id=&quot;622&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;623&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/EconomicGrowth.html&quot;&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;economic growth&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;. Three trajectories are apparent. Radical reformers in Central Europe and the Baltics have built democratic and dynamic market economies with predominantly private ownership. Gradual reformers in southeastern Europe and most former Soviet republics have had greater problems achieving democracy. Their market economies are still marred by bureaucracy, though most property has been privatized. Three countries—Belarus, Turkmenistan, and Uzbekistan—have maintained their old dictatorship, state control, and dominant public ownership, doing little but ejecting the Communist Party.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;618&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;616&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;607&quot; id=&quot;ID0ECCAA&quot;&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;610&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;614&quot; instrument_node=&quot;&quot;&gt;These contrasting outcomes can be explained by the different goals of these regimes. While their dominant slogans were to build democracy, a market economy, and rule&lt;/span&gt;&lt;span data-dcnode-id=&quot;612&quot; id=&quot;CEE_pg_502&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt; of law, postcommunist countries followed three starkly different policy paths. Radical reformers really wanted democracies and dynamic market economies. At the other end of the spectrum, a few autocrats desired little but the consolidation of their power. In the middle, countries pursued policies imposed by dominant elites who wanted to make themselves wealthy on transitional market distortions. Not surprisingly, the correlation between democracy, marketization, and privatization has been very strong.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;609&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;608&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;592&quot; id=&quot;ID0EBCAA&quot;&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;595&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;Since 1999, economic development has taken another turn. By cutting government spending and introducing low or even flat tax rates, the former Soviet countries have excelled, with an average growth of 6 percent per year for five years and almost balanced budgets. The early successful reformers in Central Europe have stopped at a mediocre growth rate of 3 percent per year, with large budget deficits, current account deficits, and &lt;/span&gt;&lt;span data-dcnode-id=&quot;601&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;602&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Unemployment.html&quot;&gt;&lt;span data-dcnode-id=&quot;603&quot; instrument_node=&quot;&quot;&gt;unemployment&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;. Their public expenditures have stayed at a West European share of GDP. These countries have become, as Hungarian economist János Kornai put it, social welfare states “prematurely,” with excessive taxes and social transfers impeding economic growth (Kornai 1992, p. 15). The picture of success appears to be partially reversed. Yet, the post-Soviet countries are lapsing into more authoritarian systems, while East-Central Europe remains democratic. Much of East-Central Europe acceded to the European Union in 2004,&lt;/span&gt;&lt;span class=&quot;footnote&quot; data-dcnode-id=&quot;597&quot; id=&quot;c_lfHendersonCEE2-164_footnote_nt403&quot;&gt;&lt;a data-dcnode-id=&quot;598&quot; href=&quot;#lfHendersonCEE2-164_footnote_nt403&quot;&gt;&lt;span data-dcnode-id=&quot;599&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt; and this appears to have stimulated democracy rather than economic growth.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;593&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;577&quot; id=&quot;ID0EACAA&quot;&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;580&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;Transition economics have brought a few new insights to economics. How to launch the transition mattered so much not because the workers or the people objected, but, it turns out, because the elite were the strong interest group that had to be mollified. Because much output under &lt;/span&gt;&lt;span data-dcnode-id=&quot;586&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;587&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Socialism.html&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;socialism&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt; was of so little value, whether real output declined during the transition is still in dispute. Privatization and enterprise restructuring have been the most pioneering areas, and the final verdict on their success is not yet in. Corruption is widespread, but this tends to happen in all countries where government officials have a large amount of discretionary power (see &lt;/span&gt;&lt;span data-dcnode-id=&quot;582&quot; style=&quot;font-variant:small-caps&quot;&gt;&lt;a class=&quot;blue&quot; data-dcnode-id=&quot;583&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.econlib.org/library/Enc/Corruption.html&quot;&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt;corruption&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;), not just in transition economies. Macroeconomic stabilization and liberalization hardly offered anything very unexpected, apart from technicalities such as barter. As time passes, the peculiarities of transition economies wane.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;578&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr data-dcnode-id=&quot;575&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;base&quot; data-dcnode-id=&quot;561&quot; id=&quot;abouttheauthor&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;571&quot;&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;About the Author &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;570&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;564&quot; id=&quot;ID0EABAA&quot;&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;567&quot; style=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;Anders Åslund is a senior fellow at the Peterson Institute for International Economics and was previously director of the Russian and Eurasian Program at the Carnegie Endowment for International Peace in Washington, D.C. He has been a senior economic adviser to the governments of Russia and Ukraine, and to the president of the Kyrgyz Republic.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;565&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;
