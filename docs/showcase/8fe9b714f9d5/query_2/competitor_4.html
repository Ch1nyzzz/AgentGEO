&lt;/span&gt;&lt;p data-dcnode-id=&quot;3136&quot;&gt;&lt;span data-dcnode-id=&quot;3149&quot; instrument_node=&quot;&quot;&gt;The government can harness land, labor, and capital to serve the economic objectives of the state. Consumer demand can be restrained in favor of greater capital investment for economic development in a desired pattern. In international comparisons, state-socialist nations compared favorably with capitalist nations in health indicators such as infant mortality and life expectancy.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3146&quot; id=&quot;cite_ref-23&quot;&gt;&lt;a data-dcnode-id=&quot;3147&quot; href=&quot;#cite_note-23&quot;&gt;&lt;span data-dcnode-id=&quot;3148&quot; instrument_node=&quot;&quot;&gt;[23]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3145&quot; instrument_node=&quot;&quot;&gt; However, the reality of this, at least regarding infant mortality, varied depending on whether official Soviet statistics or WHO definitions were used.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3142&quot; id=&quot;cite_ref-24&quot;&gt;&lt;a data-dcnode-id=&quot;3143&quot; href=&quot;#cite_note-24&quot;&gt;&lt;span data-dcnode-id=&quot;3144&quot; instrument_node=&quot;&quot;&gt;[24]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3141&quot; instrument_node=&quot;&quot;&gt; In Socialist China under Mao China's growth in life expectancy between 1950 and 1980 ranks as among the most rapid sustained increases in documented global history.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3138&quot; id=&quot;cite_ref-25&quot;&gt;&lt;a data-dcnode-id=&quot;3139&quot; href=&quot;#cite_note-25&quot;&gt;&lt;span data-dcnode-id=&quot;3140&quot; instrument_node=&quot;&quot;&gt;[25]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3137&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3127&quot;&gt;&lt;span data-dcnode-id=&quot;3135&quot; instrument_node=&quot;&quot;&gt;The state can begin building massive heavy industries at once in an underdeveloped economy without waiting years for capital to accumulate through the expansion of light industry and without reliance on external financing. This is what happened in the Soviet Union during the 1930s when the government forced the share of &lt;/span&gt;&lt;a data-dcnode-id=&quot;3133&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Gross_national_income&quot; title=&quot;Gross national income&quot;&gt;&lt;span data-dcnode-id=&quot;3134&quot; instrument_node=&quot;&quot;&gt;gross national income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3132&quot; instrument_node=&quot;&quot;&gt; dedicated to private consumption down from 80% to 50%. As a result of this development, the Soviet Union experienced massive growth in heavy industry, with a concurrent massive contraction of its agricultural sector due to the labor shortage.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3129&quot; id=&quot;cite_ref-26&quot;&gt;&lt;a data-dcnode-id=&quot;3130&quot; href=&quot;#cite_note-26&quot;&gt;&lt;span data-dcnode-id=&quot;3131&quot; instrument_node=&quot;&quot;&gt;[26]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3128&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3053&quot;&gt;&lt;span data-dcnode-id=&quot;3079&quot; instrument_node=&quot;&quot;&gt;Critics of planned economies argue that planners cannot detect consumer preferences, shortages and surpluses with sufficient accuracy and therefore cannot efficiently co-ordinate production (in a &lt;/span&gt;&lt;a data-dcnode-id=&quot;3077&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Market_economy&quot; title=&quot;Market economy&quot;&gt;&lt;span data-dcnode-id=&quot;3078&quot; instrument_node=&quot;&quot;&gt;market economy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3076&quot; instrument_node=&quot;&quot;&gt;, a &lt;/span&gt;&lt;a data-dcnode-id=&quot;3074&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Free_price_system&quot; title=&quot;Free price system&quot;&gt;&lt;span data-dcnode-id=&quot;3075&quot; instrument_node=&quot;&quot;&gt;free price system&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3073&quot; instrument_node=&quot;&quot;&gt; is intended to serve this purpose). This difficulty was notably written about by economists &lt;/span&gt;&lt;a data-dcnode-id=&quot;3071&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Ludwig_von_Mises&quot; title=&quot;Ludwig von Mises&quot;&gt;&lt;span data-dcnode-id=&quot;3072&quot; instrument_node=&quot;&quot;&gt;Ludwig von Mises&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3070&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3068&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Friedrich_Hayek&quot; title=&quot;Friedrich Hayek&quot;&gt;&lt;span data-dcnode-id=&quot;3069&quot; instrument_node=&quot;&quot;&gt;Friedrich Hayek&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3067&quot; instrument_node=&quot;&quot;&gt;, who referred to subtly distinct aspects of the problem as the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3065&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Economic_calculation_problem&quot; title=&quot;Economic calculation problem&quot;&gt;&lt;span data-dcnode-id=&quot;3066&quot; instrument_node=&quot;&quot;&gt;economic calculation problem&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3064&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3062&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Local_knowledge_problem&quot; title=&quot;Local knowledge problem&quot;&gt;&lt;span data-dcnode-id=&quot;3063&quot; instrument_node=&quot;&quot;&gt;local knowledge problem&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3061&quot; instrument_node=&quot;&quot;&gt;, respectively.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3058&quot; id=&quot;cite_ref-Mises_28-0&quot;&gt;&lt;a data-dcnode-id=&quot;3059&quot; href=&quot;#cite_note-Mises-28&quot;&gt;&lt;span data-dcnode-id=&quot;3060&quot; instrument_node=&quot;&quot;&gt;[28]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3055&quot; id=&quot;cite_ref-AER519-30_29-0&quot;&gt;&lt;a data-dcnode-id=&quot;3056&quot; href=&quot;#cite_note-AER519-30-29&quot;&gt;&lt;span data-dcnode-id=&quot;3057&quot; instrument_node=&quot;&quot;&gt;[29]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3054&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3035&quot;&gt;&lt;span data-dcnode-id=&quot;3052&quot; instrument_node=&quot;&quot;&gt;Whereas the former stressed the theoretical underpinnings of a market economy to &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3050&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Subjective_value_theory&quot; title=&quot;Subjective value theory&quot;&gt;&lt;span data-dcnode-id=&quot;3051&quot; instrument_node=&quot;&quot;&gt;subjective value theory&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3049&quot; instrument_node=&quot;&quot;&gt; while attacking the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3047&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Labor_theory_of_value&quot; title=&quot;Labor theory of value&quot;&gt;&lt;span data-dcnode-id=&quot;3048&quot; instrument_node=&quot;&quot;&gt;labor theory of value&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3046&quot; instrument_node=&quot;&quot;&gt;, the latter argued that the only way to satisfy individuals who have a constantly changing hierarchy of needs and are the only ones to possess their particular individual's circumstances is by allowing those with the most knowledge of their needs to have it in their power to use their resources in a competing marketplace to meet the needs of the most consumers most efficiently. This phenomenon is recognized as &lt;/span&gt;&lt;a data-dcnode-id=&quot;3044&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Spontaneous_order&quot; title=&quot;Spontaneous order&quot;&gt;&lt;span data-dcnode-id=&quot;3045&quot; instrument_node=&quot;&quot;&gt;spontaneous order&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3043&quot; instrument_node=&quot;&quot;&gt;. Additionally, misallocation of resources would naturally ensue by redirecting capital away from individuals with direct knowledge and circumventing it into markets where a coercive monopoly influences behavior, ignoring market signals. According to &lt;/span&gt;&lt;a data-dcnode-id=&quot;3041&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Tibor_Machan&quot; title=&quot;Tibor Machan&quot;&gt;&lt;span data-dcnode-id=&quot;3042&quot; instrument_node=&quot;&quot;&gt;Tibor Machan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3040&quot; instrument_node=&quot;&quot;&gt;, &quot;[w]ithout a market in which allocations can be made in obedience to the law of supply and demand, it is difficult or impossible to funnel resources with respect to actual human preferences and goals&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3037&quot; id=&quot;cite_ref-tibor2001_30-0&quot;&gt;&lt;a data-dcnode-id=&quot;3038&quot; href=&quot;#cite_note-tibor2001-30&quot;&gt;&lt;span data-dcnode-id=&quot;3039&quot; instrument_node=&quot;&quot;&gt;[30]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3036&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3034&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;3024&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;3032&quot; id=&quot;Suppression_of_economic_democracy_and_self-management&quot;&gt;&lt;span data-dcnode-id=&quot;3033&quot; instrument_node=&quot;&quot;&gt;Suppression of economic democracy and self-management&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;3025&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3030&quot;&gt;&lt;span data-dcnode-id=&quot;3031&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;3028&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlanned_economy%26action%3Dedit%26section%3D11&quot; title=&quot;Edit section: Suppression of economic democracy and self-management&quot;&gt;&lt;span data-dcnode-id=&quot;3029&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3026&quot;&gt;&lt;span data-dcnode-id=&quot;3027&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;3023&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3008&quot;&gt;&lt;span data-dcnode-id=&quot;3022&quot; instrument_node=&quot;&quot;&gt;Economist &lt;/span&gt;&lt;a data-dcnode-id=&quot;3020&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Robin_Hahnel&quot; title=&quot;Robin Hahnel&quot;&gt;&lt;span data-dcnode-id=&quot;3021&quot; instrument_node=&quot;&quot;&gt;Robin Hahnel&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3019&quot; instrument_node=&quot;&quot;&gt;, who supports &lt;/span&gt;&lt;a data-dcnode-id=&quot;3017&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Participatory_economics&quot; title=&quot;Participatory economics&quot;&gt;&lt;span data-dcnode-id=&quot;3018&quot; instrument_node=&quot;&quot;&gt;participatory economics&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3016&quot; instrument_node=&quot;&quot;&gt;, a form of &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3014&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Socialist&quot; title=&quot;Socialist&quot;&gt;&lt;span data-dcnode-id=&quot;3015&quot; instrument_node=&quot;&quot;&gt;socialist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3013&quot; instrument_node=&quot;&quot;&gt; decentralized planned economy, notes that even if central planning overcame its inherent inhibitions of incentives and innovation, it would nevertheless be unable to maximize economic democracy and self-management, which he believes are concepts that are more intellectually coherent, consistent and just than mainstream notions of economic freedom.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3010&quot; id=&quot;cite_ref-Hahnel,_Robin_2002_31-0&quot;&gt;&lt;a data-dcnode-id=&quot;3011&quot; href=&quot;#cite_note-Hahnel,_Robin_2002-31&quot;&gt;&lt;span data-dcnode-id=&quot;3012&quot; instrument_node=&quot;&quot;&gt;[31]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3009&quot; instrument_node=&quot;&quot;&gt; Furthermore, Hahnel states:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3007&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2998&quot;&gt;&lt;p data-dcnode-id=&quot;2999&quot;&gt;&lt;span data-dcnode-id=&quot;3006&quot; instrument_node=&quot;&quot;&gt;Combined with a more democratic political system, and redone to closer approximate a best case version, centrally planned economies no doubt would have performed better. But they could never have delivered economic self-management, they would always have been slow to innovate as apathy and frustration took their inevitable toll, and they would always have been susceptible to growing inequities and inefficiencies as the effects of differential &lt;/span&gt;&lt;a data-dcnode-id=&quot;3004&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Economic_power&quot; title=&quot;Economic power&quot;&gt;&lt;span data-dcnode-id=&quot;3005&quot; instrument_node=&quot;&quot;&gt;economic power&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3003&quot; instrument_node=&quot;&quot;&gt; grew. Under central planning neither planners, managers, nor workers had incentives to promote the social economic interest. Nor did impeding markets for final goods to the planning system enfranchise consumers in meaningful ways. But central planning would have been incompatible with economic democracy even if it had overcome its information and incentive liabilities. And the truth is that it survived as long as it did only because it was propped up by unprecedented totalitarian political power.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3000&quot; id=&quot;cite_ref-Hahnel,_Robin_2002_31-1&quot;&gt;&lt;a data-dcnode-id=&quot;3001&quot; href=&quot;#cite_note-Hahnel,_Robin_2002-31&quot;&gt;&lt;span data-dcnode-id=&quot;3002&quot; instrument_node=&quot;&quot;&gt;[31]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2987&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;2995&quot; id=&quot;Command_economy&quot;&gt;&lt;span data-dcnode-id=&quot;2996&quot; instrument_node=&quot;&quot;&gt;Command economy&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;2988&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2993&quot;&gt;&lt;span data-dcnode-id=&quot;2994&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2991&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlanned_economy%26action%3Dedit%26section%3D12&quot; title=&quot;Edit section: Command economy&quot;&gt;&lt;span data-dcnode-id=&quot;2992&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2989&quot;&gt;&lt;span data-dcnode-id=&quot;2990&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2986&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2972&quot;&gt;&lt;span data-dcnode-id=&quot;2985&quot; instrument_node=&quot;&quot;&gt;Planned economies contrast with command economies in that a planned economy is &quot;an economic system in which the government controls and regulates production, distribution, prices, etc.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2982&quot; id=&quot;cite_ref-reference1_32-0&quot;&gt;&lt;a data-dcnode-id=&quot;2983&quot; href=&quot;#cite_note-reference1-32&quot;&gt;&lt;span data-dcnode-id=&quot;2984&quot; instrument_node=&quot;&quot;&gt;[32]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2981&quot; instrument_node=&quot;&quot;&gt; whereas a command economy necessarily has substantial public ownership of industry while also having this type of regulation.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2978&quot; id=&quot;cite_ref-autogenerated1_33-0&quot;&gt;&lt;a data-dcnode-id=&quot;2979&quot; href=&quot;#cite_note-autogenerated1-33&quot;&gt;&lt;span data-dcnode-id=&quot;2980&quot; instrument_node=&quot;&quot;&gt;[33]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2977&quot; instrument_node=&quot;&quot;&gt; In command economies, important allocation decisions are made by government authorities and are imposed by law.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2974&quot; id=&quot;cite_ref-34&quot;&gt;&lt;a data-dcnode-id=&quot;2975&quot; href=&quot;#cite_note-34&quot;&gt;&lt;span data-dcnode-id=&quot;2976&quot; instrument_node=&quot;&quot;&gt;[34]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2935&quot;&gt;&lt;span data-dcnode-id=&quot;2971&quot; instrument_node=&quot;&quot;&gt;This goes against the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2969&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Marxist&quot; title=&quot;Marxist&quot;&gt;&lt;span data-dcnode-id=&quot;2970&quot; instrument_node=&quot;&quot;&gt;Marxist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2968&quot; instrument_node=&quot;&quot;&gt; understanding of conscious planning.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2965&quot; id=&quot;cite_ref-35&quot;&gt;&lt;a data-dcnode-id=&quot;2966&quot; href=&quot;#cite_note-35&quot;&gt;&lt;span data-dcnode-id=&quot;2967&quot; instrument_node=&quot;&quot;&gt;[35]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2962&quot; id=&quot;cite_ref-36&quot;&gt;&lt;a data-dcnode-id=&quot;2963&quot; href=&quot;#cite_note-36&quot;&gt;&lt;span data-dcnode-id=&quot;2964&quot; instrument_node=&quot;&quot;&gt;[36]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2961&quot; instrument_node=&quot;&quot;&gt; Decentralized planning has been proposed as a basis for &lt;/span&gt;&lt;a data-dcnode-id=&quot;2959&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Socialism&quot; title=&quot;Socialism&quot;&gt;&lt;span data-dcnode-id=&quot;2960&quot; instrument_node=&quot;&quot;&gt;socialism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2958&quot; instrument_node=&quot;&quot;&gt; and has been variously advocated by &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2956&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Anarchists&quot; title=&quot;Anarchists&quot;&gt;&lt;span data-dcnode-id=&quot;2957&quot; instrument_node=&quot;&quot;&gt;anarchists&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2955&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2953&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Council_communists&quot; title=&quot;Council communists&quot;&gt;&lt;span data-dcnode-id=&quot;2954&quot; instrument_node=&quot;&quot;&gt;council communists&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2952&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2950&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Libertarian_Marxists&quot; title=&quot;Libertarian Marxists&quot;&gt;&lt;span data-dcnode-id=&quot;2951&quot; instrument_node=&quot;&quot;&gt;libertarian Marxists&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2949&quot; instrument_node=&quot;&quot;&gt; and other &lt;/span&gt;&lt;a data-dcnode-id=&quot;2947&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_socialism&quot; title=&quot;Democratic socialism&quot;&gt;&lt;span data-dcnode-id=&quot;2948&quot; instrument_node=&quot;&quot;&gt;democratic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2946&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2944&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Libertarian_socialism&quot; title=&quot;Libertarian socialism&quot;&gt;&lt;span data-dcnode-id=&quot;2945&quot; instrument_node=&quot;&quot;&gt;libertarian&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2943&quot; instrument_node=&quot;&quot;&gt; socialists who advocate a non-market form of socialism, in total rejection of the type of planning adopted in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2941&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Economy_of_the_Soviet_Union&quot; title=&quot;Economy of the Soviet Union&quot;&gt;&lt;span data-dcnode-id=&quot;2942&quot; instrument_node=&quot;&quot;&gt;economy of the Soviet Union&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2940&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2937&quot; id=&quot;cite_ref-37&quot;&gt;&lt;a data-dcnode-id=&quot;2938&quot; href=&quot;#cite_note-37&quot;&gt;&lt;span data-dcnode-id=&quot;2939&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2936&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2923&quot;&gt;&lt;span data-dcnode-id=&quot;2934&quot; instrument_node=&quot;&quot;&gt;Most of a command economy is organized in a top-down administrative model by a central authority, where decisions regarding investment and production output requirements are decided upon at the top in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2932&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Command_hierarchy&quot; title=&quot;Command hierarchy&quot;&gt;&lt;span data-dcnode-id=&quot;2933&quot; instrument_node=&quot;&quot;&gt;chain of command&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2931&quot; instrument_node=&quot;&quot;&gt;, with little input from lower levels. Advocates of economic planning have sometimes been staunch critics of these command economies. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2929&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Leon_Trotsky&quot; title=&quot;Leon Trotsky&quot;&gt;&lt;span data-dcnode-id=&quot;2930&quot; instrument_node=&quot;&quot;&gt;Leon Trotsky&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2928&quot; instrument_node=&quot;&quot;&gt; believed that those at the top of the chain of command, regardless of their intellectual capacity, operated without the input and participation of the millions of people who participate in the economy and who understand/respond to local conditions and changes in the economy. Therefore, they would be unable to effectively coordinate all economic activity.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2925&quot; id=&quot;cite_ref-38&quot;&gt;&lt;a data-dcnode-id=&quot;2926&quot; href=&quot;#cite_note-38&quot;&gt;&lt;span data-dcnode-id=&quot;2927&quot; instrument_node=&quot;&quot;&gt;[38]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2924&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2882&quot;&gt;&lt;span data-dcnode-id=&quot;2922&quot; instrument_node=&quot;&quot;&gt;Historians have associated planned economies with &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2920&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Marxist%25E2%2580%2593Leninist_state&quot; title=&quot;Marxist–Leninist state&quot;&gt;&lt;span data-dcnode-id=&quot;2921&quot; instrument_node=&quot;&quot;&gt;Marxist–Leninist states&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2919&quot; instrument_node=&quot;&quot;&gt; and the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2917&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Soviet-type_economic_planning&quot; title=&quot;Soviet-type economic planning&quot;&gt;&lt;span data-dcnode-id=&quot;2918&quot; instrument_node=&quot;&quot;&gt;Soviet economic model&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2916&quot; instrument_node=&quot;&quot;&gt;. Since the 1980s, it was recognized that the Soviet economic model did not actually constitute a planned economy in that a comprehensive and binding plan did not guide production and investment.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2913&quot; id=&quot;cite_ref-39&quot;&gt;&lt;a data-dcnode-id=&quot;2914&quot; href=&quot;#cite_note-39&quot;&gt;&lt;span data-dcnode-id=&quot;2915&quot; instrument_node=&quot;&quot;&gt;[39]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2910&quot; id=&quot;cite_ref-40&quot;&gt;&lt;a data-dcnode-id=&quot;2911&quot; href=&quot;#cite_note-40&quot;&gt;&lt;span data-dcnode-id=&quot;2912&quot; instrument_node=&quot;&quot;&gt;[40]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2909&quot; instrument_node=&quot;&quot;&gt; The further distinction of an &lt;/span&gt;&lt;a data-dcnode-id=&quot;2907&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Administrative-command_system&quot; title=&quot;Administrative-command system&quot;&gt;&lt;span data-dcnode-id=&quot;2908&quot; instrument_node=&quot;&quot;&gt;administrative-command system&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2906&quot; instrument_node=&quot;&quot;&gt; emerged as a new designation in some academic circles for the economic system that existed in the former &lt;/span&gt;&lt;a data-dcnode-id=&quot;2904&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union&quot; title=&quot;Soviet Union&quot;&gt;&lt;span data-dcnode-id=&quot;2905&quot; instrument_node=&quot;&quot;&gt;Soviet Union&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2903&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2901&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc&quot; title=&quot;Eastern Bloc&quot;&gt;&lt;span data-dcnode-id=&quot;2902&quot; instrument_node=&quot;&quot;&gt;Eastern Bloc&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2900&quot; instrument_node=&quot;&quot;&gt;, highlighting the role of centralized hierarchical decision-making in the absence of popular control over the economy.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2897&quot; id=&quot;cite_ref-The_Rise_and_Fall_of_Socialist_Planning_41-0&quot;&gt;&lt;a data-dcnode-id=&quot;2898&quot; href=&quot;#cite_note-The_Rise_and_Fall_of_Socialist_Planning-41&quot;&gt;&lt;span data-dcnode-id=&quot;2899&quot; instrument_node=&quot;&quot;&gt;[41]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2896&quot; instrument_node=&quot;&quot;&gt; The possibility of a digital planned economy was explored in Chile between 1971 and 1973 with the development of &lt;/span&gt;&lt;a data-dcnode-id=&quot;2894&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Project_Cybersyn&quot; title=&quot;Project Cybersyn&quot;&gt;&lt;span data-dcnode-id=&quot;2895&quot; instrument_node=&quot;&quot;&gt;Project Cybersyn&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2893&quot; instrument_node=&quot;&quot;&gt; and by &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2891&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Aleksandr_Aleksandrovich_Kharkevich&quot; title=&quot;Aleksandr Aleksandrovich Kharkevich&quot;&gt;&lt;span data-dcnode-id=&quot;2892&quot; instrument_node=&quot;&quot;&gt;Aleksandr Aleksandrovich Kharkevich&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2890&quot; instrument_node=&quot;&quot;&gt;, head of the Department of Technical Physics in Kiev in 1962.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2887&quot; id=&quot;cite_ref-42&quot;&gt;&lt;a data-dcnode-id=&quot;2888&quot; href=&quot;#cite_note-42&quot;&gt;&lt;span data-dcnode-id=&quot;2889&quot; instrument_node=&quot;&quot;&gt;[42]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2884&quot; id=&quot;cite_ref-43&quot;&gt;&lt;a data-dcnode-id=&quot;2885&quot; href=&quot;#cite_note-43&quot;&gt;&lt;span data-dcnode-id=&quot;2886&quot; instrument_node=&quot;&quot;&gt;[43]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2883&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2858&quot;&gt;&lt;span data-dcnode-id=&quot;2881&quot; instrument_node=&quot;&quot;&gt;While both economic planning and a planned economy can be either authoritarian or &lt;/span&gt;&lt;a data-dcnode-id=&quot;2879&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Economic_democracy&quot; title=&quot;Economic democracy&quot;&gt;&lt;span data-dcnode-id=&quot;2880&quot; instrument_node=&quot;&quot;&gt;democratic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2878&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2876&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Participatory_economics&quot; title=&quot;Participatory economics&quot;&gt;&lt;span data-dcnode-id=&quot;2877&quot; instrument_node=&quot;&quot;&gt;participatory&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2875&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2873&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_socialist&quot; title=&quot;Democratic socialist&quot;&gt;&lt;span data-dcnode-id=&quot;2874&quot; instrument_node=&quot;&quot;&gt;democratic socialist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2872&quot; instrument_node=&quot;&quot;&gt; critics argue that command economies are necessarily authoritarian or undemocratic in practice.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2869&quot; id=&quot;cite_ref-44&quot;&gt;&lt;a data-dcnode-id=&quot;2870&quot; href=&quot;#cite_note-44&quot;&gt;&lt;span data-dcnode-id=&quot;2871&quot; instrument_node=&quot;&quot;&gt;[44]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2866&quot; id=&quot;cite_ref-45&quot;&gt;&lt;a data-dcnode-id=&quot;2867&quot; href=&quot;#cite_note-45&quot;&gt;&lt;span data-dcnode-id=&quot;2868&quot; instrument_node=&quot;&quot;&gt;[45]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2865&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;2863&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Indicative_planning&quot; title=&quot;Indicative planning&quot;&gt;&lt;span data-dcnode-id=&quot;2864&quot; instrument_node=&quot;&quot;&gt;Indicative planning&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2862&quot; instrument_node=&quot;&quot;&gt; is a form of economic planning in market economies that directs the economy through incentive-based methods. Economic planning can be practiced in a decentralized manner through different government authorities. In some predominantly market-oriented and Western mixed economies, the state utilizes economic planning in strategic industries such as the aerospace industry. Mixed economies usually employ &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2860&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Macroeconomic&quot; title=&quot;Macroeconomic&quot;&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt;macroeconomic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2859&quot; instrument_node=&quot;&quot;&gt; planning while micro-economic affairs are left to the market and price system.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2857&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2847&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;2855&quot; id=&quot;Decentralized_planning&quot;&gt;&lt;span data-dcnode-id=&quot;2856&quot; instrument_node=&quot;&quot;&gt;Decentralized planning&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;2848&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2853&quot;&gt;&lt;span data-dcnode-id=&quot;2854&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2851&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlanned_economy%26action%3Dedit%26section%3D13&quot; title=&quot;Edit section: Decentralized planning&quot;&gt;&lt;span data-dcnode-id=&quot;2852&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2849&quot;&gt;&lt;span data-dcnode-id=&quot;2850&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2846&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2791&quot;&gt;&lt;span data-dcnode-id=&quot;2845&quot; instrument_node=&quot;&quot;&gt;A decentralized-planned economy, occasionally called horizontally-planned economy due to its &lt;/span&gt;&lt;a data-dcnode-id=&quot;2843&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Horizontalism&quot; title=&quot;Horizontalism&quot;&gt;&lt;span data-dcnode-id=&quot;2844&quot; instrument_node=&quot;&quot;&gt;horizontalism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2842&quot; instrument_node=&quot;&quot;&gt;, is a type of planned economy in which the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2840&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Investment_%28macroeconomics%29&quot; title=&quot;Investment (macroeconomics)&quot;&gt;&lt;span data-dcnode-id=&quot;2841&quot; instrument_node=&quot;&quot;&gt;investment&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2837&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Resource_allocation&quot; title=&quot;Resource allocation&quot;&gt;&lt;span data-dcnode-id=&quot;2838&quot; instrument_node=&quot;&quot;&gt;allocation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2836&quot; instrument_node=&quot;&quot;&gt; of &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2834&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Consumer_goods&quot; title=&quot;Consumer goods&quot;&gt;&lt;span data-dcnode-id=&quot;2835&quot; instrument_node=&quot;&quot;&gt;consumer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2833&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2831&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Capital_goods&quot; title=&quot;Capital goods&quot;&gt;&lt;span data-dcnode-id=&quot;2832&quot; instrument_node=&quot;&quot;&gt;capital goods&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2830&quot; instrument_node=&quot;&quot;&gt; is explicated accordingly to an economy-wide plan built and operatively coordinated through a distributed network of disparate economic agents or even production units itself. Decentralized planning is usually held in contrast to centralized planning, in particular the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2828&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Soviet-type_economic_planning&quot; title=&quot;Soviet-type economic planning&quot;&gt;&lt;span data-dcnode-id=&quot;2829&quot; instrument_node=&quot;&quot;&gt;Soviet-type economic planning&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2827&quot; instrument_node=&quot;&quot;&gt; of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2825&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union&quot; title=&quot;Soviet Union&quot;&gt;&lt;span data-dcnode-id=&quot;2826&quot; instrument_node=&quot;&quot;&gt;Soviet Union&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2824&quot; instrument_node=&quot;&quot;&gt;'s command economy, where economic information is aggregated and used to formulate a plan for production, investment and resource allocation by a single central authority. Decentralized planning can take shape both in the context of a &lt;/span&gt;&lt;a data-dcnode-id=&quot;2822&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Mixed_economy&quot; title=&quot;Mixed economy&quot;&gt;&lt;span data-dcnode-id=&quot;2823&quot; instrument_node=&quot;&quot;&gt;mixed economy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2821&quot; instrument_node=&quot;&quot;&gt; as well as in a &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2819&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Post-capitalist&quot; title=&quot;Post-capitalist&quot;&gt;&lt;span data-dcnode-id=&quot;2820&quot; instrument_node=&quot;&quot;&gt;post-capitalist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2818&quot; instrument_node=&quot;&quot;&gt; economic system. This form of economic planning implies some process of democratic and participatory decision-making within the economy and within firms itself in the form of &lt;/span&gt;&lt;a data-dcnode-id=&quot;2816&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Industrial_democracy&quot; title=&quot;Industrial democracy&quot;&gt;&lt;span data-dcnode-id=&quot;2817&quot; instrument_node=&quot;&quot;&gt;industrial democracy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2815&quot; instrument_node=&quot;&quot;&gt;. Computer-based forms of democratic economic planning and coordination between economic enterprises have also been proposed by various &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2813&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Computer_scientists&quot; title=&quot;Computer scientists&quot;&gt;&lt;span data-dcnode-id=&quot;2814&quot; instrument_node=&quot;&quot;&gt;computer scientists&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2812&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2810&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Radical_economists&quot; title=&quot;Radical economists&quot;&gt;&lt;span data-dcnode-id=&quot;2 &quot;&gt;&lt;bdi data-dcnode-id=&quot;2239&quot;&gt;&lt;span data-dcnode-id=&quot;2240&quot; instrument_node=&quot;&quot;&gt;978-1840645194&lt;/span&gt;&lt;/bdi&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2237&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;q data-dcnode-id=&quot;2235&quot;&gt;&lt;span data-dcnode-id=&quot;2236&quot; instrument_node=&quot;&quot;&gt;Traditional socialism strives to plan all economic activities comprehensively, both within and between enterprises. As such, it seeks to integrate the economic activities of society (the coordination of socially owned property) into a single coherent plan, rather than to rely upon the spontaneous or anarchic ordering of the market system to coordinate plans.&lt;/span&gt;&lt;/q&gt;&lt;/cite&gt;&lt;span class=&quot;Z3988&quot; data-dcnode-id=&quot;2233&quot; title=&quot;ctx_ver=Z39.88-2004&amp;amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;amp;rft.genre=book&amp;amp;rft.btitle=Markets%2C+Planning%2C+and+Democracy%3A+Essays+After+the+Collapse+of+Communism&amp;amp;rft.pages=72&amp;amp;rft.pub=Edward+Elgar+Publishing&amp;amp;rft.date=2002-07-31&amp;amp;rft.isbn=978-1840645194&amp;amp;rft.aulast=Prychito&amp;amp;rft.aufirst=David+L.&amp;amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APlanned+economy&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2231&quot; instrument_node=&quot;&quot;&gt;

11&quot;&gt;&lt;span data-dcnode-id=&quot;2212&quot; instrument_node=&quot;&quot;&gt;159&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2210&quot; instrument_node=&quot;&quot;&gt;: 5–37. &lt;/span&gt;&lt;q data-dcnode-id=&quot;2202&quot;&gt;&lt;span data-dcnode-id=&quot;2209&quot; instrument_node=&quot;&quot;&gt;Planning is not equivalent to 'perfect' allocation of resources, nor 'scientific' allocation, nor even 'more humane' allocation. It simply means 'direct' allocation, &lt;/span&gt;&lt;i data-dcnode-id=&quot;2207&quot;&gt;&lt;span data-dcnode-id=&quot;2208&quot; instrument_node=&quot;&quot;&gt;ex ante&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2206&quot; instrument_node=&quot;&quot;&gt;. As such, it is the opposite of market allocation, which is &lt;/span&gt;&lt;i data-dcnode-id=&quot;2204&quot;&gt;&lt;span data-dcnode-id=&quot;2205&quot; instrument_node=&quot;&quot;&gt;ex post&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2203&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/q&gt;&lt;/cite&gt;&lt;span class=&quot;Z3988&quot; data-dcnode-id=&quot;2200&quot; title=&quot;ctx_ver=Z39.88-2004&amp;amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;amp;rft.genre=article&amp;amp;rft.jtitle=New+Left+Review&amp;amp;rft.atitle=In+Defence+of+Socialist+Planning&amp;amp;rft.volume=159&amp;amp;rft.pages=5-37&amp;amp;rft.date=1986&amp;amp;rft.aulast=Mandel&amp;amp;rft.aufirst=Ernest&amp;amp;rft_id=http%3A%2F%2Fwww.ernestmandel.org%2Fen%2Fworks%2Fpdf%2FMandel%2520socialist%2520planning.pdf&amp;amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APlanned+economy&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2198&quot; instrument_node=&quot;&quot;&gt;

ef=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Special%3ABookSources/978-1107427327&quot; title=&quot;Special:BookSources/978-1107427327&quot;&gt;&lt;bdi data-dcnode-id=&quot;1713&quot;&gt;&lt;span data-dcnode-id=&quot;1714&quot; instrument_node=&quot;&quot;&gt;978-1107427327&lt;/span&gt;&lt;/bdi&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;q data-dcnode-id=&quot;1709&quot;&gt;&lt;span data-dcnode-id=&quot;1710&quot; instrument_node=&quot;&quot;&gt;For the USSR, the official Soviet statistics of infant mortality give too favourable a picture. There are two reasons for this. First, the USSR used a definition of 'birth' different from the WHO one (Chapter 8, pp. 321-2). The percentage increase in the infant mortality rate caused by switching from the Soviet definition to the WHO one seems to have ranged from 13 per cent in Moldova to 40 per cent in Latvia. In Poland, which has a much larger population than the two previously mentioned countries, it was about 21 per cent. Secondly, there seems to have been significant under-registration of deaths, particularly in certain regions, such as Central Asia and Azerbaijan. Estimates of 'true' infant mortality in 1987-2000 show very high increases over the official figures in Central Asia, Azerbaijan, Albania, Romania, and Bulgaria. In Russia — which was supposed to have adopted the WHO definition of 'birth' by 1993 and where under-registration is much less than in Central Asia or Azerbaijan — in 1987-2000 the estimated increase of the official figures to measure 'true' infant mortality is 26.5 per cent.&lt;/span&gt;&lt;/q&gt;&lt;/cite&gt;&lt;span class=&quot;Z3988&quot; data-dcnode-id=&quot;1707&quot; title=&quot;ctx_ver=Z39.88-2004&amp;amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;amp;rft.genre=book&amp;amp;rft.btitle=Socialist+Planning&amp;amp;rft.pages=372&amp;amp;rft.pub=Cambridge+University+Press&amp;amp;rft.date=2014&amp;amp;rft.isbn=978-1107427327&amp;amp;rft.aulast=Ellman&amp;amp;rft.aufirst=Michael&amp;amp;rft_id=https%3A%2F%2Fbooks.google.com%2Fbooks%3Fid%3D4L2ZBAAAQBAJ%26pg%3DPA372&amp;amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APlanned+economy&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1705&quot; instrument_node=&quot;&quot;&gt;

uot;&gt;&lt;bdi data-dcnode-id=&quot;1447&quot;&gt;&lt;span data-dcnode-id=&quot;1448&quot; instrument_node=&quot;&quot;&gt;978-0-262-18234-8&lt;/span&gt;&lt;/bdi&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1445&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;q data-dcnode-id=&quot;1443&quot;&gt;&lt;span data-dcnode-id=&quot;1444&quot; instrument_node=&quot;&quot;&gt;In a command economy the most important allocation decisions are made by government authorities and are imposed by law.&lt;/span&gt;&lt;/q&gt;&lt;/cite&gt;&lt;span class=&quot;Z3988&quot; data-dcnode-id=&quot;1441&quot; title=&quot;ctx_ver=Z39.88-2004&amp;amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;amp;rft.genre=book&amp;amp;rft.btitle=Comparative+Economics+in+a+Transforming+World+Economy&amp;amp;rft.pages=7&amp;amp;rft.pub=MIT+Press&amp;amp;rft.date=2003-07-23&amp;amp;rft.isbn=978-0-262-18234-8&amp;amp;rft.aulast=Rosser&amp;amp;rft.aufirst=Mariana+V.&amp;amp;rft.au=Rosser%2C+J.+Barkley&amp;amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APlanned+economy&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;

;&gt;&lt;span data-dcnode-id=&quot;1420&quot; instrument_node=&quot;&quot;&gt;Planning is not equivalent to 'perfect' allocation of resources, nor 'scientific' allocation, nor even 'more humane' allocation. It simply means 'direct' allocation, &lt;/span&gt;&lt;i data-dcnode-id=&quot;1418&quot;&gt;&lt;span data-dcnode-id=&quot;1419&quot; instrument_node=&quot;&quot;&gt;ex ante&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1417&quot; instrument_node=&quot;&quot;&gt;. As such, it is the opposite of market allocation, which is &lt;/span&gt;&lt;i data-dcnode-id=&quot;1415&quot;&gt;&lt;span data-dcnode-id=&quot;1416&quot; instrument_node=&quot;&quot;&gt;ex post&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/q&gt;&lt;/cite&gt;&lt;span class=&quot;Z3988&quot; data-dcnode-id=&quot;1411&quot; title=&quot;ctx_ver=Z39.88-2004&amp;amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;amp;rft.genre=article&amp;amp;rft.jtitle=New+Left+Review&amp;amp;rft.atitle=In+defense+of+socialist+planning&amp;amp;rft.volume=I&amp;amp;rft.issue=159&amp;amp;rft.pages=5-37&amp;amp;rft.date=1986-09%2F1986-10&amp;amp;rft.aulast=Mandel&amp;amp;rft.aufirst=Ernest&amp;amp;rft_id=http%3A%2F%2Fnewleftreview.org%2FI%2F159%2Fernest-mandel-in-defence-of-socialist-planning&amp;amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APlanned+economy&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1410&quot; instrument_node=&quot;&quot;&gt; See also the &lt;/span&gt;&lt;a class=&quot;external text&quot; data-dcnode-id=&quot;1408&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//digamo.free.fr/mandelsp.pdf&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;1409&quot; instrument_node=&quot;&quot;&gt;PDF version&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;li data-dcnode-id=&quot;1384&quot; id=&quot;cite_note-36&quot;&gt;&lt;span class=&quot;mw-cite-backlink&quot; data-dcnode-id=&quot;1399&quot;&gt;&lt;b data-dcnode-id=&quot;1400&quot;&gt;&lt;a aria-label=&quot;Jump up&quot; data-dcnode-id=&quot;1401&quot; href=&quot;#cite_ref-36&quot; title=&quot;Jump up&quot;&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;^&lt;/span&gt;&lt;/a&gt;&lt;/b&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;reference-text&quot; data-dcnode-id=&quot;1386&quot;&gt;&lt;span data-dcnode-id=&quot;1397&quot; instrument_node=&quot;&quot;&gt;Schweickart, David; Lawler, James; Ticktin, Hillel; Ollman, Bertell (1998). &quot;Definitions of Market and Socialism&quot;. &lt;/span&gt;&lt;i data-dcnode-id=&quot;1395&quot;&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;Market Socialism: The Debate Among Socialists&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;. New York: Routledge. pp. 58–59. &lt;/span&gt;&lt;link data-dcnode-id=&quot;1393&quot; href=&quot;mw-data:TemplateStyles:r1067248974&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;1391&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/ISBN_%28identifier%29&quot; title=&quot;ISBN (identifier)&quot;&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;ISBN&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1388&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Special%3ABookSources/978-0-415-91967-8&quot; title=&quot;Special:BookSources/978-0-415-91967-8&quot;&gt;&lt;span data-dcnode-id=&quot;1389&quot; instrument_node=&quot;&quot;&gt;978-0-415-91967-8&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;. &quot;For an Anti-Stalinist Marxist, socialism is defined by the degree to which the society is planned. Planning here is understood as the conscious regulation of society by the associated producers themselves. Put it differently, the control over the surplus product rests with the majority of the population through a resolutely democratic process. [...] The sale of labour power is abolished and labour necessarily becomes creative. Everyone participates in running their institutions and society as a whole. No one controls anyone else.&quot;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1385&quot; instrument_node=&quot;&quot;&gt;

ocialism&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;, a postcapitalist economy that retains market competition but socializes the means of production and, in some versions, extends democracy to the workplace. Some hold out for a nonmarket, participatory economy. All democratic socialists agree on the need for a democratic alternative to capitalism&quot;.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1350&quot; instrument_node=&quot;&quot;&gt;

noir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Special%3ABookSources/978-0-230-54697-4&quot; title=&quot;Special:BookSources/978-0-230-54697-4&quot;&gt;&lt;bdi data-dcnode-id=&quot;1266&quot;&gt;&lt;span data-dcnode-id=&quot;1267&quot; instrument_node=&quot;&quot;&gt;978-0-230-54697-4&lt;/span&gt;&lt;/bdi&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1264&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;q data-dcnode-id=&quot;1262&quot;&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;Realization of these facts led in the 1970s and 1980s to the development of new terms to describe what had previously been (and still were in United Nations publications) referred to as the 'centrally planned economies'. In the USSR in the late 1980s the system was normally referred to as the 'administrative-command' economy. What was fundamental to this system was not the plan but the role of administrative hierarchies at all levels of decision making; the absence of control over decision making by the population [...].&lt;/span&gt;&lt;/q&gt;&lt;/cite&gt;&lt;span class=&quot;Z3988&quot; data-dcnode-id=&quot;1260&quot; title=&quot;ctx_ver=Z39.88-2004&amp;amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;amp;rft.genre=bookitem&amp;amp;rft.atitle=The+Rise+and+Fall+of+Socialist+Planning&amp;amp;rft.btitle=Transition+and+Beyond%3A+Essays+in+Honour+of+Mario+Nuti&amp;amp;rft.place=New+York&amp;amp;rft.pages=22&amp;amp;rft.pub=Palgrave+Macmillan&amp;amp;rft.date=2007&amp;amp;rft.isbn=978-0-230-54697-4&amp;amp;rft.aulast=Ellman&amp;amp;rft.aufirst=Michael&amp;amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APlanned+economy&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;
