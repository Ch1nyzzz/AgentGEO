an&gt;&lt;a data-dcnode-id=&quot;2675&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Capital_%28economics%29&quot; title=&quot;Capital (economics)&quot;&gt;&lt;span data-dcnode-id=&quot;2676&quot; instrument_node=&quot;&quot;&gt;capital&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2674&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2671&quot; id=&quot;cite_ref-2&quot;&gt;&lt;a data-dcnode-id=&quot;2672&quot; href=&quot;#cite_note-2&quot;&gt;&lt;span data-dcnode-id=&quot;2673&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2670&quot; instrument_node=&quot;&quot;&gt; The process has been applied in &lt;/span&gt;&lt;a data-dcnode-id=&quot;2668&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/China&quot; title=&quot;China&quot;&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;China&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2667&quot; instrument_node=&quot;&quot;&gt;, the former &lt;/span&gt;&lt;a data-dcnode-id=&quot;2665&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union&quot; title=&quot;Soviet Union&quot;&gt;&lt;span data-dcnode-id=&quot;2666&quot; instrument_node=&quot;&quot;&gt;Soviet Union&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2664&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2662&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Eastern_bloc&quot; title=&quot;Eastern bloc&quot;&gt;&lt;span data-dcnode-id=&quot;2663&quot; instrument_node=&quot;&quot;&gt;Eastern bloc&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2661&quot; instrument_node=&quot;&quot;&gt; countries of &lt;/span&gt;&lt;a data-dcnode-id=&quot;2659&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Europe&quot; title=&quot;Europe&quot;&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;Europe&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2658&quot; instrument_node=&quot;&quot;&gt; and some &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2656&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Third_world&quot; title=&quot;Third world&quot;&gt;&lt;span data-dcnode-id=&quot;2657&quot; instrument_node=&quot;&quot;&gt;Third world&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2655&quot; instrument_node=&quot;&quot;&gt; countries, and detailed work has been undertaken on its economic and social effects.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2629&quot;&gt;&lt;span data-dcnode-id=&quot;2653&quot; instrument_node=&quot;&quot;&gt;The transition process is usually characterized by the changing and creating of institutions, particularly &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2651&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Private_enterprise&quot; title=&quot;Private enterprise&quot;&gt;&lt;span data-dcnode-id=&quot;2652&quot; instrument_node=&quot;&quot;&gt;private enterprises&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2650&quot; instrument_node=&quot;&quot;&gt;; changes in the role of the state, thereby, the creation of fundamentally different governmental institutions and the promotion of private-owned enterprises, markets and independent financial institutions.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2647&quot; id=&quot;cite_ref-falke_3-0&quot;&gt;&lt;a data-dcnode-id=&quot;2648&quot; href=&quot;#cite_note-falke-3&quot;&gt;&lt;span data-dcnode-id=&quot;2649&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2646&quot; instrument_node=&quot;&quot;&gt; In essence, one transition mode is the functional restructuring of state institutions from being a provider of growth to an enabler, with the private sector its engine. Another transition mode is change the way that economy grows and practice mode. The relationships between these two transition modes are micro and macro, partial and whole. The truly transition economics should include both the micro transition and macro transition.&lt;/span&gt;&lt;sup class=&quot;noprint Inline-Template Template-Fact&quot; data-dcnode-id=&quot;2639&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;2645&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;2641&quot;&gt;&lt;a data-dcnode-id=&quot;2642&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed&quot; title=&quot;Wikipedia:Citation needed&quot;&gt;&lt;span data-dcnode-id=&quot;2643&quot; title=&quot;This claim needs references to reliable sources. (October 2011)&quot;&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt;citation needed&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2640&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2638&quot; instrument_node=&quot;&quot;&gt; Due to the different initial conditions during the emerging process of the transition from planned economics to market economics, countries uses different transition model. Countries like P.R.China and Vietnam adopted a gradual transition mode, however Russia and some other East-European countries, such as the former Socialist Republic of Yugoslavia, used a more aggressive and quicker paced model of transition.&lt;/span&gt;&lt;sup class=&quot;noprint Inline-Template Template-Fact&quot; data-dcnode-id=&quot;2631&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;2637&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;2633&quot;&gt;&lt;a data-dcnode-id=&quot;2634&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed&quot; title=&quot;Wikipedia:Citation needed&quot;&gt;&lt;span data-dcnode-id=&quot;2635&quot; title=&quot;This claim needs references to reliable sources. (October 2011)&quot;&gt;&lt;span data-dcnode-id=&quot;2636&quot; instrument_node=&quot;&quot;&gt;citation needed&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2630&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2627&quot;&gt;&lt;span data-dcnode-id=&quot;2628&quot; instrument_node=&quot;&quot;&gt;The term &quot;transition period&quot; is also used to describe the process of transition from capitalism to the first stage of socialism, preceding the establishment of fully developed socialism (aka communism).
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2626&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;2526&quot;&gt;&lt;span data-dcnode-id=&quot;2530&quot; instrument_node=&quot;&quot;&gt;The existence of private &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2528&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Property_rights&quot; title=&quot;Property rights&quot;&gt;&lt;span data-dcnode-id=&quot;2529&quot; instrument_node=&quot;&quot;&gt;property rights&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2527&quot; instrument_node=&quot;&quot;&gt; may be the most basic element of a market economy, and therefore implementation of these rights is the key indicator of the transition process.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2524&quot;&gt;&lt;span data-dcnode-id=&quot;2525&quot; instrument_node=&quot;&quot;&gt;The main ingredients of the transition process are:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2523&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;2495&quot;&gt;&lt;li data-dcnode-id=&quot;2519&quot;&gt;&lt;i data-dcnode-id=&quot;2521&quot;&gt;&lt;span data-dcnode-id=&quot;2522&quot; instrument_node=&quot;&quot;&gt;Liberalization&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2520&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;– the process of allowing most prices to be determined in free markets and lowering trade barriers that had shut off contact with the price structure of the world's market economies.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2511&quot;&gt;&lt;i data-dcnode-id=&quot;2516&quot;&gt;&lt;span data-dcnode-id=&quot;2517&quot; instrument_node=&quot;&quot;&gt;Macroeconomic stabilization&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2515&quot; instrument_node=&quot;&quot;&gt; – bringing inflation under control and lowering it over time, after the initial burst of high inflation that follows from liberalization and the release of pent-up demand. This process requires discipline over the government budget and the growth of money and credit (that is, discipline in fiscal and monetary policy) and progress toward sustainable balance of payments.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2512&quot; id=&quot;cite_ref-4&quot;&gt;&lt;a data-dcnode-id=&quot;2513&quot; href=&quot;#cite_note-4&quot;&gt;&lt;span data-dcnode-id=&quot;2514&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2504&quot;&gt;&lt;i data-dcnode-id=&quot;2506&quot;&gt;&lt;span data-dcnode-id=&quot;2509&quot; instrument_node=&quot;&quot;&gt;Restructuring and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2507&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Privatization&quot; title=&quot;Privatization&quot;&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt;privatization&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2505&quot; instrument_node=&quot;&quot;&gt; – creating a viable financial sector and reforming the enterprises in these economies to render them capable of producing goods that could be sold in free markets and transferring their ownership into private hands.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2496&quot;&gt;&lt;i data-dcnode-id=&quot;2501&quot;&gt;&lt;span data-dcnode-id=&quot;2502&quot; instrument_node=&quot;&quot;&gt;Legal and institutional reforms&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt; – redefining the role of the state in these economies, establishing the rule of law, and introducing appropriate competition policies.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2497&quot; id=&quot;cite_ref-imf2000_5-0&quot;&gt;&lt;a data-dcnode-id=&quot;2498&quot; href=&quot;#cite_note-imf2000-5&quot;&gt;&lt;span data-dcnode-id=&quot;2499&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2486&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;According to &lt;/span&gt;&lt;a class=&quot;new&quot; data-dcnode-id=&quot;2491&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOleh_Havrylyshyn%26action%3Dedit%26redlink%3D1&quot; title=&quot;Oleh Havrylyshyn (page does not exist)&quot;&gt;&lt;span data-dcnode-id=&quot;2492&quot; instrument_node=&quot;&quot;&gt;Oleh Havrylyshyn&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt; and Thomas Wolf of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2488&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/International_Monetary_Fund&quot; title=&quot;International Monetary Fund&quot;&gt;&lt;span data-dcnode-id=&quot;2489&quot; instrument_node=&quot;&quot;&gt;International Monetary Fund&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2487&quot; instrument_node=&quot;&quot;&gt;, transition in a broad sense implies:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;2467&quot;&gt;&lt;li data-dcnode-id=&quot;2483&quot;&gt;&lt;span data-dcnode-id=&quot;2484&quot; instrument_node=&quot;&quot;&gt;liberalizing economic activity, prices, and market operations, along with reallocating resources to their most efficient use;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2480&quot;&gt;&lt;span data-dcnode-id=&quot;2481&quot; instrument_node=&quot;&quot;&gt;developing indirect, market-oriented instruments for macroeconomic stabilization;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2477&quot;&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;achieving effective enterprise management and economic efficiency, usually through privatization;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2476&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2474&quot;&gt;&lt;span data-dcnode-id=&quot;2475&quot; instrument_node=&quot;&quot;&gt;imposing hard budget constraints, which provide incentives to improve efficiency; and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2473&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2468&quot;&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt;establishing an institutional and legal framework to secure property rights, the rule of law, and transparent market-entry regulations.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2469&quot; id=&quot;cite_ref-imf1_6-0&quot;&gt;&lt;a data-dcnode-id=&quot;2470&quot; href=&quot;#cite_note-imf1-6&quot;&gt;&lt;span data-dcnode-id=&quot;2471&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2457&quot;&gt;&lt;span data-dcnode-id=&quot;2465&quot; instrument_node=&quot;&quot;&gt;Edgar Feige, cognizant of the trade-off between efficiency and equity, suggests&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2462&quot; id=&quot;cite_ref-7&quot;&gt;&lt;a data-dcnode-id=&quot;2463&quot; href=&quot;#cite_note-7&quot;&gt;&lt;span data-dcnode-id=&quot;2464&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2461&quot; instrument_node=&quot;&quot;&gt; that the social and political costs of transition adjustments can be reduced by adopting privatization methods that are egalitarian in nature, thereby providing a &lt;/span&gt;&lt;a data-dcnode-id=&quot;2459&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Social_safety_net&quot; title=&quot;Social safety net&quot;&gt;&lt;span data-dcnode-id=&quot;2460&quot; instrument_node=&quot;&quot;&gt;social safety net&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2458&quot; instrument_node=&quot;&quot;&gt; to cushion the disruptive effects of the transition process.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2452&quot;&gt;&lt;span data-dcnode-id=&quot;2456&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;2454&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/European_Bank_for_Reconstruction_and_Development&quot; title=&quot;European Bank for Reconstruction and Development&quot;&gt;&lt;span data-dcnode-id=&quot;2455&quot; instrument_node=&quot;&quot;&gt;European Bank for Reconstruction and Development&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2453&quot; instrument_node=&quot;&quot;&gt; (EBRD) developed a set of indicators to measure the progress in transition. The classification system was originally created in the EBRD's 1994 Transition Report, but has been refined and amended in subsequent Reports. The EBRD's overall transition indicators are:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2451&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;2419&quot;&gt;&lt;li data-dcnode-id=&quot;2449&quot;&gt;&lt;span data-dcnode-id=&quot;2450&quot; instrument_node=&quot;&quot;&gt;Large-scale privatization&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2446&quot;&gt;&lt;span data-dcnode-id=&quot;2447&quot; instrument_node=&quot;&quot;&gt;Small-scale privatization&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2443&quot;&gt;&lt;span data-dcnode-id=&quot;2444&quot; instrument_node=&quot;&quot;&gt;Governance and enterprise restructuring&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2440&quot;&gt;&lt;span data-dcnode-id=&quot;2441&quot; instrument_node=&quot;&quot;&gt;Price liberalization&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2437&quot;&gt;&lt;span data-dcnode-id=&quot;2438&quot; instrument_node=&quot;&quot;&gt;Trade and foreign exchange system&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2434&quot;&gt;&lt;span data-dcnode-id=&quot;2435&quot; instrument_node=&quot;&quot;&gt;Competition policy&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2433&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2431&quot;&gt;&lt;span data-dcnode-id=&quot;2432&quot; instrument_node=&quot;&quot;&gt;Banking reform and interest rate liberalization&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2426&quot;&gt;&lt;span data-dcnode-id=&quot;2429&quot; instrument_node=&quot;&quot;&gt;Securities markets and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2427&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Non-bank_financial_institution&quot; title=&quot;Non-bank financial institution&quot;&gt;&lt;span data-dcnode-id=&quot;2428&quot; instrument_node=&quot;&quot;&gt;non-bank financial institutions&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2425&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2420&quot;&gt;&lt;span data-dcnode-id=&quot;2424&quot; instrument_node=&quot;&quot;&gt;Infrastructure reform&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2421&quot; id=&quot;cite_ref-8&quot;&gt;&lt;a data-dcnode-id=&quot;2422&quot; href=&quot;#cite_note-8&quot;&gt;&lt;span data-dcnode-id=&quot;2423&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2418&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2408&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;2416&quot; id=&quot;Context&quot;&gt;&lt;span data-dcnode-id=&quot;2417&quot; instrument_node=&quot;&quot;&gt;Context&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;2409&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2414&quot;&gt;&lt;span data-dcnode-id=&quot;2415&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2412&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTransition_economy%26action%3Dedit%26section%3D2&quot; title=&quot;Edit section: Context&quot;&gt;&lt;span data-dcnode-id=&quot;2413&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2410&quot;&gt;&lt;span data-dcnode-id=&quot;2411&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2407&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;link data-dcnode-id=&quot;2406&quot; href=&quot;mw-data:TemplateStyles:r1033289096&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;div class=&quot;hatnote navigation-not-searchable&quot; data-dcnode-id=&quot;2402&quot; role=&quot;note&quot;&gt;&lt;span data-dcnode-id=&quot;2405&quot; instrument_node=&quot;&quot;&gt;Further information: &lt;/span&gt;&lt;a data-dcnode-id=&quot;2403&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Soviet-type_economic_planning&quot; title=&quot;Soviet-type economic planning&quot;&gt;&lt;span data-dcnode-id=&quot;2404&quot; instrument_node=&quot;&quot;&gt;Soviet-type economic planning&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2382&quot;&gt;&lt;span data-dcnode-id=&quot;2400&quot; instrument_node=&quot;&quot;&gt;The economic malaise affecting the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2398&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Comecon&quot; title=&quot;Comecon&quot;&gt;&lt;span data-dcnode-id=&quot;2399&quot; instrument_node=&quot;&quot;&gt;Comecon&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2397&quot; instrument_node=&quot;&quot;&gt; countries – low growth rates and diminishing returns on investment – led many domestic and Western economists to advocate market-based solutions and a sequenced programme of economic reform. It was recognized that micro-economic reform and macro-economic stabilization had to be combined carefully. Price liberalization without prior remedial measures to eliminate macro-economic imbalances, including an escalating fiscal deficit, a growing money supply due to a high level of borrowing by state-owned enterprises, and the accumulated savings of households (&quot;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2395&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Monetary_overhang&quot; title=&quot;Monetary overhang&quot;&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;monetary overhang&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2394&quot; instrument_node=&quot;&quot;&gt;&quot;) could result in macro-economic destabilization instead of micro-economic efficiency. Unless entrepreneurs enjoyed secure property rights and farmers owned their farms the process of Schumpeterian &quot;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2392&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Creative_destruction&quot; title=&quot;Creative destruction&quot;&gt;&lt;span data-dcnode-id=&quot;2393&quot; instrument_node=&quot;&quot;&gt;creative destruction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2391&quot; instrument_node=&quot;&quot;&gt;&quot; would limit the reallocation of resources and prevent profitable enterprises from expanding to absorb the workers displaced from the liquidation of non-viable enterprises. A hardening of the budget constraints at state-owned enterprises would halt the drain on the state budget from subsidization but would require additional expenditure to counteract the resulting unemployment and drop in aggregate household spending. Monetary overhang meant that price liberalization might convert &quot;repressed inflation&quot; into open inflation, increase the price level still further and generate a price spiral. The transition to a market economy would require state intervention alongside market liberalization, privatization and deregulation. Rationing of essential consumer goods, trade quotas and tariffs and an active monetary policy to ensure that there was sufficient liquidity to maintain commerce might be needed.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2388&quot; id=&quot;cite_ref-9&quot;&gt;&lt;a data-dcnode-id=&quot;2389&quot; href=&quot;#cite_note-9&quot;&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2387&quot; instrument_node=&quot;&quot;&gt; In addition to tariff protection, measures to control capital flight were also considered necessary in some instances.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2384&quot; id=&quot;cite_ref-10&quot;&gt;&lt;a data-dcnode-id=&quot;2385&quot; href=&quot;#cite_note-10&quot;&gt;&lt;span data-dcnode-id=&quot;2386&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2383&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2381&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2371&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;2379&quot; id=&quot;Transition_in_practice&quot;&gt;&lt;span data-dcnode-id=&quot;2380&quot; instrument_node=&quot;&quot;&gt;Transition in practice&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;2372&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2377&quot;&gt;&lt;span data-dcnode-id=&quot;2378&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2375&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTransition_economy%26action%3Dedit%26section%3D3&quot; title=&quot;Edit section: Transition in practice&quot;&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2373&quot;&gt;&lt;span data-dcnode-id=&quot;2374&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2370&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2364&quot;&gt;&lt;span data-dcnode-id=&quot;2369&quot; instrument_node=&quot;&quot;&gt;The most influential strategy for the transition to a market economy was that adopted by Poland launched in January 1990. The strategy was strongly influenced by IMF and World Bank analyses of successful and unsuccessful stabilization programmes which had been adopted in Latin America in the 1980s. The strategy incorporated a number of interdependent measures including macro-economic stabilization; the liberalization of wholesale and retail prices; the removal of constraints to the development of private enterprises and the privatization of state-owned enterprises; the elimination of subsidies and the imposition of hard budget constraints; and the creation of an export-oriented economy that was open to foreign trade and investment. The creation of a social safety net targeted at the individual to compensate for the removal of job security and the removal of price controls on staple goods was also part of the strategy.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2366&quot; id=&quot;cite_ref-11&quot;&gt;&lt;a data-dcnode-id=&quot;2367&quot; href=&quot;#cite_note-11&quot;&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt;[11]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2352&quot;&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt;The choice of the transition strategy was influenced by the critical state of most post-socialist countries. Policy-makers were persuaded that political credibility took precedence over a sequenced reform plan and to introduce macro-economic stabilization measures ahead of structural measures that would by their nature take longer to implement. The &quot;credibility&quot; of the transition process was enhanced by the adoption of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2361&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Washington_Consensus&quot; title=&quot;Washington Consensus&quot;&gt;&lt;span data-dcnode-id=&quot;2362&quot; instrument_node=&quot;&quot;&gt;Washington Consensus&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2360&quot; instrument_node=&quot;&quot;&gt; favoured by the IMF and the World Bank. Stabilization was deemed a necessity in Hungary and Poland where state budget deficits had grown and foreign debts had become larger than the country's capacity to service. Western advisers and domestic experts working with the national governments and the IMF introduced stabilization programmes aiming to achieve external and internal balance, which became known as &lt;/span&gt;&lt;a data-dcnode-id=&quot;2358&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Shock_therapy_%28economics%29&quot; title=&quot;Shock therapy (economics)&quot;&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;shock therapy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2357&quot; instrument_node=&quot;&quot;&gt;. It was argued that &quot;one cannot jump over a chasm in two leaps&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2354&quot; id=&quot;cite_ref-12&quot;&gt;&lt;a data-dcnode-id=&quot;2355&quot; href=&quot;#cite_note-12&quot;&gt;&lt;span data-dcnode-id=&quot;2356&quot; instrument_node=&quot;&quot;&gt;[12]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2337&quot;&gt;&lt;span data-dcnode-id=&quot;2351&quot; instrument_node=&quot;&quot;&gt;The many foreign advisers from, principally, the United States, the United Kingdom and Sweden were often under contract to the international financial institutions and bilateral or multilateral technical assistance programmes. They favoured free trade and exchange rate convertibility rather than trade protection and capital controls, which might have checked capital flight. They tended to support privatization without prior industrial restructuring; an exception was to be found in Eastern Germany where the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2349&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Treuhand&quot; title=&quot;Treuhand&quot;&gt;&lt;span data-dcnode-id=&quot;2350&quot; instrument_node=&quot;&quot;&gt;Treuhand&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2348&quot; instrument_node=&quot;&quot;&gt; (Trust Agency) prepared state-owned enterprises for the market at considerable cost to the government.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2345&quot; id=&quot;cite_ref-13&quot;&gt;&lt;a data-dcnode-id=&quot;2346&quot; href=&quot;#cite_note-13&quot;&gt;&lt;span data-dcnode-id=&quot;2347&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2344&quot; instrument_node=&quot;&quot;&gt; Western technical assistance programmes were established by European Union – through the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2342&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Phare&quot; title=&quot;Phare&quot;&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt;Phare&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2341&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2339&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/TACIS&quot; title=&quot;TACIS&quot;&gt;&lt;span data-dcnode-id=&quot;2340&quot; instrument_node=&quot;&quot;&gt;TACIS&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2338&quot; instrument_node=&quot;&quot;&gt; programmes – and other donors (including the US AID, the UK Know-how Fund and UNDP) and by the IMF, the World Bank, EBRD and KfW, which also advanced loans for stabilization, structural adjustment, industrial restructuring and social protection. Technical assistance was delivered through the exchange of civil servants and by management consultants, including Agriconsulting, Atos, COWI, Ernst &amp;amp; Young, GOPA, GTZ, Human Dynamics, Idom, IMC Consulting, Louis Berger, NIRAS, PA Consulting, PE International, Pohl Consulting, PwC, and SOFRECO.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2324&quot;&gt;&lt;span data-dcnode-id=&quot;2336&quot; instrument_node=&quot;&quot;&gt;It had been expected that the introduction of current account convertibility and foreign trade liberalization would force a currency devaluation that would support &lt;/span&gt;&lt;a data-dcnode-id=&quot;2334&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Export-oriented_industrialization&quot; title=&quot;Export-oriented industrialization&quot;&gt;&lt;span data-dcnode-id=&quot;2335&quot; instrument_node=&quot;&quot;&gt;export-led growth&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2333&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2330&quot; id=&quot;cite_ref-14&quot;&gt;&lt;a data-dcnode-id=&quot;2331&quot; href=&quot;#cite_note-14&quot;&gt;&lt;span data-dcnode-id=&quot;2332&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2329&quot; instrument_node=&quot;&quot;&gt; However, when prices were de-controlled enterprises and retailers raised their prices to match those prevailing in the black market or towards world price levels, earning them windfall profits initially. Consumers reacted by reducing their purchases and by substituting better quality imported goods in place of domestically produced goods. Falling sales led to the collapse of many domestic enterprises, with personnel lay-offs or reduced hours of work and pay. This further reduced effective demand. As imports grew and exporters failed to respond to opportunities in world markets due to the poor quality of their products and lack of resources for investment, the trade deficit expanded, putting downward pressure on the exchange rate. Many wholesalers and retailers marked prices according to their dollar values and the falling exchange rate fed inflation. The central banks in several countries raised interest rates and tightened credit conditions, depriving state agencies and enterprises of working capital. These in turn found it impossible to pay wages on time, dampening effective demand further.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2326&quot; id=&quot;cite_ref-15&quot;&gt;&lt;a data-dcnode-id=&quot;2327&quot; href=&quot;#cite_note-15&quot;&gt;&lt;span data-dcnode-id=&quot;2328&quot; instrument_node=&quot;&quot;&gt;[15]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2325&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2310&quot;&gt;&lt;span data-dcnode-id=&quot;2323&quot; instrument_node=&quot;&quot;&gt;The impacts of the conventional transition strategies proved to be de-stabilizing in the short-term and left the population impoverished in the long-term. Economic output declined much more than expected. The decline in output lasted until 1992-96 for all transition economies. By 1994, economic output had declined across all transition economies by 41 percent compared to its 1989 level. The Central and Eastern European economies began growing again around 1993, with Poland, which had begun its transition programme earliest emerging from recession in 1992. The Baltic States came out of recession in 1994 and the rest of the former Soviet Union around 1996. Inflation remained above 20 percent a year (except in the Czech Republic and Hungary) until the mid-1990s. Across all transition economies the peak annual inflation rate was 2632 percent (4645 percent in the CIS).&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2320&quot; id=&quot;cite_ref-16&quot;&gt;&lt;a data-dcnode-id=&quot;2321&quot; href=&quot;#cite_note-16&quot;&gt;&lt;span data-dcnode-id=&quot;2322&quot; instrument_node=&quot;&quot;&gt;[16]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2319&quot; instrument_node=&quot;&quot;&gt; Unemployment increased and wages fell in real terms, although in Russia and other CIS economies the rate of unemployment recorded at employment exchanges remained low. Labour force surveys undertaken by the International Labour Organization showed significantly higher rates of joblessness and there was considerable internal migration.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2316&quot; id=&quot;cite_ref-17&quot;&gt;&lt;a data-dcnode-id=&quot;2317&quot; href=&quot;#cite_note-17&quot;&gt;&lt;span data-dcnode-id=&quot;2318&quot; instrument_node=&quot;&quot;&gt;[17]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2315&quot; instrument_node=&quot;&quot;&gt; High interest rates induced a &quot;credit crunch&quot; and fuelled inter-enterprise indebtedness and hampered the expansion of small and medium-sized enterprises, which often lacked the connections to obtain finance legitimately.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2312&quot; id=&quot;cite_ref-18&quot;&gt;&lt;a data-dcnode-id=&quot;2313&quot; href=&quot;#cite_note-18&quot;&gt;&lt;span data-dcnode-id=&quot;2314&quot; instrument_node=&quot;&quot;&gt;[18]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2311&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2302&quot;&gt;&lt;span data-dcnode-id=&quot;2309&quot; instrument_node=&quot;&quot;&gt;In time domestic producers were able to upgrade their production capacity and foreign direct investment was attracted to the transition economies. Local-manufactured higher quality consumer goods became available and won market share back from imports. Stabilization of the exchange rate was made more difficult by large-scale capital flight, with domestic agents sending part of their earning abroad to destinations where they believed their capital was more secure. The promise of
European Union membership and the adoption of the EU's legislation and regulations (the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2307&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Community_acquis&quot; title=&quot;Community acquis&quot;&gt;&lt;span data-dcnode-id=&quot;2308&quot; instrument_node=&quot;&quot;&gt;Community acquis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2306&quot; instrument_node=&quot;&quot;&gt; or &lt;/span&gt;&lt;i data-dcnode-id=&quot;2304&quot;&gt;&lt;span data-dcnode-id=&quot;2305&quot; instrument_node=&quot;&quot;&gt;acquis communautaire&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2303&quot; instrument_node=&quot;&quot;&gt;) helped secure trust in property rights and economic and governmental institutions in much of Central and Eastern Europe.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2296&quot;&gt;&lt;span data-dcnode-id=&quot;2301&quot; instrument_node=&quot;&quot;&gt;Some economists have argued that the growth performance of the transition economies stemmed from the low level of development, decades of trade isolation and distortions in the socialist planned economies. They have emphasized that the transition strategies adopted reflected the need to resolve the economic crisis besetting the socialist planned economies and the overriding objective was the transformation to capitalist market economies rather than the fostering of economic growth and welfare.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2298&quot; id=&quot;cite_ref-19&quot;&gt;&lt;a data-dcnode-id=&quot;2299&quot; href=&quot;#cite_note-19&quot;&gt;&lt;span data-dcnode-id=&quot;2300&quot; instrument_node=&quot;&quot;&gt;[19]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2290&quot;&gt;&lt;span data-dcnode-id=&quot;2295&quot; instrument_node=&quot;&quot;&gt;But by 2000, the EBRD was reporting that the effects of the initial starting point in each transition economy on the reform process had faded. Although the foundations had been laid for a functioning market economy through sustained liberalization, comprehensive privatization, openness to international trade and investment, and the establishment of democratic political systems there remained institutional challenges. Liberalized markets were not necessarily competitive and political freedom had not prevented powerful private interests from exercising undue influence.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2292&quot; id=&quot;cite_ref-20&quot;&gt;&lt;a data-dcnode-id=&quot;2293&quot; href=&quot;#cite_note-20&quot;&gt;&lt;span data-dcnode-id=&quot;2294&quot; instrument_node=&quot;&quot;&gt;[20]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2291&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2281&quot;&gt;&lt;span data-dcnode-id=&quot;2289&quot; instrument_node=&quot;&quot;&gt;Ten years on, in the &lt;/span&gt;&lt;i data-dcnode-id=&quot;2287&quot;&gt;&lt;span data-dcnode-id=&quot;2288&quot; instrument_node=&quot;&quot;&gt;Transition Report&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2286&quot; instrument_node=&quot;&quot;&gt; for 2010, the EBRD was still finding that the quality of market-enabling institutions continued to fall short of what was necessary for well-functioning market economies. Growth in the transition economies had been driven by trade integration into the world economy with &quot;impressive&quot; export performance, and by &quot;rapid capital inflows and a credit boom&quot;. But such growth had proved volatile and the EBRD considered that governments in the transition economies should foster the development of domestic capital markets and improve the business environment, including financial institutions, real estate markets and the energy, transport and communications infrastructure. The EBRD expressed concerns about regulatory independence and enforcement, price setting, and the market power of incumbent infrastructure operators.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2283&quot; id=&quot;cite_ref-21&quot;&gt;&lt;a data-dcnode-id=&quot;2284&quot; href=&quot;#cite_note-21&quot;&gt;&lt;span data-dcnode-id=&quot;2285&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2282&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2268&quot;&gt;&lt;span data-dcnode-id=&quot;2280&quot; instrument_node=&quot;&quot;&gt;Income inequality as measured by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2278&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Gini_coefficient&quot; title=&quot;Gini coefficient&quot;&gt;&lt;span data-dcnode-id=&quot;2279&quot; instrument_node=&quot;&quot;&gt;Gini coefficient&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2277&quot; instrument_node=&quot;&quot;&gt; rose significantly in the transition economies between 1987 and 1988 and the mid-1990s. Poverty re-emerged with between 20 and 50 percent of people living below the national poverty line in the transition economies. The UN Development Programme calculated that overall poverty in Eastern Europe and the CIS increased from 4 percent of the population in 1988 to 32 percent by 1994, or from 14 million people to 119 million.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2274&quot; id=&quot;cite_ref-22&quot;&gt;&lt;a data-dcnode-id=&quot;2275&quot; href=&quot;#cite_note-22&quot;&gt;&lt;span data-dcnode-id=&quot;2276&quot; instrument_node=&quot;&quot;&gt;[22]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2273&quot; instrument_node=&quot;&quot;&gt; Unemployment and rates of economic inactivity were still high in the late 1990s according to survey data.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2270&quot; id=&quot;cite_ref-23&quot;&gt;&lt;a data-dcnode-id=&quot;2271&quot; href=&quot;#cite_note-23&quot;&gt;&lt;span data-dcnode-id=&quot;2272&quot; instrument_node=&quot;&quot;&gt;[23]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2269&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2262&quot;&gt;&lt;span data-dcnode-id=&quot;2267&quot; instrument_node=&quot;&quot;&gt;By 2007, the year before the global financial crisis hit, the index for GDP had reached 112 compared to 100 in 1989 for the transition economies. In other words, it took nearly 20 years to restore the level of output that had existed prior to the transition. The index of economic output (GDP) in the countries of Central and Eastern Europe was 151 in 2007; for the Balkans/ South-eastern Europe the index was 111, and for the Commonwealth of Independent States and Mongolia it was 102. Several CIS countries in the Caucasus and Central Asia as well as Moldova and Ukraine had economies that were substantially smaller than in 1989.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2264&quot; id=&quot;cite_ref-24&quot;&gt;&lt;a data-dcnode-id=&quot;2265&quot; href=&quot;#cite_note-24&quot;&gt;&lt;span data-dcnode-id=&quot;2266&quot; instrument_node=&quot;&quot;&gt;[24]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2263&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2256&quot;&gt;&lt;span data-dcnode-id=&quot;2261&quot; instrument_node=&quot;&quot;&gt;The global recession of 2008-09 and the Eurozone crisis of 2011-13 destabilized the transition economies, reduced growth rates and increased unemployment. The slowdown hit government revenues and widened fiscal deficits but almost all transition economies had experienced a partial recovery and had maintained low and stable inflation since 2012.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2258&quot; id=&quot;cite_ref-25&quot;&gt;&lt;a data-dcnode-id=&quot;2259&quot; href=&quot;#cite_note-25&quot;&gt;&lt;span data-dcnode-id=&quot;2260&quot; instrument_node=&quot;&quot;&gt;[25]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2257&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2255&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2245&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;2253&quot; id=&quot;Process&quot;&gt;&lt;span data-dcnode-id=&quot;2254&quot; instrument_node=&quot;&quot;&gt;Process&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;2246&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2251&quot;&gt;&lt;span data-dcnode-id=&quot;2252&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2249&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTransition_economy%26action%3Dedit%26section%3D4&quot; title=&quot;Edit section: Process&quot;&gt;&lt;span data-dcnode-id=&quot;2250&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2247&quot;&gt;&lt;span data-dcnode-id=&quot;2248&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2244&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2198&quot;&gt;&lt;span data-dcnode-id=&quot;2243&quot; instrument_node=&quot;&quot;&gt;Transition trajectories have varied considerably in practice. Some nations have been experimenting with market reform for several decades, while others are relatively recent adopters (e.g., &lt;/span&gt;&lt;a data-dcnode-id=&quot;2241&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/North_Macedonia&quot; title=&quot;North Macedonia&quot;&gt;&lt;span data-dcnode-id=&quot;2242&quot; instrument_node=&quot;&quot;&gt;North Macedonia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2240&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2238&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Serbia&quot; title=&quot;Serbia&quot;&gt;&lt;span data-dcnode-id=&quot;2239&quot; instrument_node=&quot;&quot;&gt;Serbia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2237&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2235&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Montenegro&quot; title=&quot;Montenegro&quot;&gt;&lt;span data-dcnode-id=&quot;2236&quot; instrument_node=&quot;&quot;&gt;Montenegro&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2234&quot; instrument_node=&quot;&quot;&gt;), and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2232&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Albania&quot; title=&quot;Albania&quot;&gt;&lt;span data-dcnode-id=&quot;2233&quot; instrument_node=&quot;&quot;&gt;Albania&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2231&quot; instrument_node=&quot;&quot;&gt;. In some cases reforms have been accompanied with political upheaval, such as the overthrow of a dictator (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2229&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Romania&quot; title=&quot;Romania&quot;&gt;&lt;span data-dcnode-id=&quot;2230&quot; instrument_node=&quot;&quot;&gt;Romania&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2228&quot; instrument_node=&quot;&quot;&gt;), the collapse of a government (the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2226&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union&quot; title=&quot;Soviet Union&quot;&gt;&lt;span data-dcnode-id=&quot;2227&quot; instrument_node=&quot;&quot;&gt;Soviet Union&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2225&quot; instrument_node=&quot;&quot;&gt;), a declaration of independence (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2223&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Croatia&quot; title=&quot;Croatia&quot;&gt;&lt;span data-dcnode-id=&quot;2224&quot; instrument_node=&quot;&quot;&gt;Croatia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2222&quot; instrument_node=&quot;&quot;&gt;), or integration with another country (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2220&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/East_Germany&quot; title=&quot;East Germany&quot;&gt;&lt;span data-dcnode-id=&quot;2221&quot; instrument_node=&quot;&quot;&gt;East Germany&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2219&quot; instrument_node=&quot;&quot;&gt;). In other cases economic reforms have been adopted by incumbent governments with little interest in political change (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2217&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/China&quot; title=&quot;China&quot;&gt;&lt;span data-dcnode-id=&quot;2218&quot; instrument_node=&quot;&quot;&gt;China&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2216&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2214&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Laos&quot; title=&quot;Laos&quot;&gt;&lt;span data-dcnode-id=&quot;2215&quot; instrument_node=&quot;&quot;&gt;Laos&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2213&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2211&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Vietnam&quot; title=&quot;Vietnam&quot;&gt;&lt;span data-dcnode-id=&quot;2212&quot; instrument_node=&quot;&quot;&gt;Vietnam&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2210&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2207&quot; id=&quot;cite_ref-vn_26-0&quot;&gt;&lt;a data-dcnode-id=&quot;2208&quot; href=&quot;#cite_note-vn-26&quot;&gt;&lt;span data-dcnode-id=&quot;2209&quot; instrument_node=&quot;&quot;&gt;[26]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2206&quot; instrument_node=&quot;&quot;&gt; Transition trajectories also differ in terms of the extent of central planning being relinquished (e.g., high centralized coordination among the CIS states) as well as the scope of liberalization efforts being undertaken (e.g., relatively limited in &lt;/span&gt;&lt;a data-dcnode-id=&quot;2204&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Romania&quot; title=&quot;Romania&quot;&gt;&lt;span data-dcnode-id=&quot;2205&quot; instrument_node=&quot;&quot;&gt;Romania&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2203&quot; instrument_node=&quot;&quot;&gt;). Some countries, such as Vietnam, have experienced macro-economic upheavals over different periods of transition, even transition turmoil.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2200&quot; id=&quot;cite_ref-vnturmoil_27-0&quot;&gt;&lt;a data-dcnode-id=&quot;2201&quot; href=&quot;#cite_note-vnturmoil-27&quot;&gt;&lt;span data-dcnode-id=&quot;2202&quot; instrument_node=&quot;&quot;&gt;[27]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2199&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2185&quot;&gt;&lt;span data-dcnode-id=&quot;2197&quot; instrument_node=&quot;&quot;&gt;According to the World Bank's &lt;/span&gt;&lt;i data-dcnode-id=&quot;2195&quot;&gt;&lt;span data-dcnode-id=&quot;2196&quot; instrument_node=&quot;&quot;&gt;10 Years of Transition&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2194&quot; instrument_node=&quot;&quot;&gt; report &quot;... the wide dispersion in the productivity of labour and capital across types of enterprises at the onset of transition and the erosion of those differences between old and new sectors during the reform provide a natural definition of the end of transition.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2191&quot; id=&quot;cite_ref-wb1_28-0&quot;&gt;&lt;a data-dcnode-id=&quot;2192&quot; href=&quot;#cite_note-wb1-28&quot;&gt;&lt;span data-dcnode-id=&quot;2193&quot; instrument_node=&quot;&quot;&gt;[28]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2190&quot; instrument_node=&quot;&quot;&gt; Mr. Vito Tanzi, Director of the IMF's Fiscal Affairs Department, gave definition that the transformation to a market economy is not complete until functioning fiscal institutions and reasonable and affordable expenditure programs, including basic social safety nets for the unemployed, the sick, and the elderly, are in place. Mr Tanzi stated that these spending programs must be financed from public revenues generated—through taxation—without imposing excessive burdens on the private sector.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2187&quot; id=&quot;cite_ref-imf2_29-0&quot;&gt;&lt;a data-dcnode-id=&quot;2188&quot; href=&quot;#cite_note-imf2-29&quot;&gt;&lt;span data-dcnode-id=&quot;2189&quot; instrument_node=&quot;&quot;&gt;[29]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2186&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2179&quot;&gt;&lt;span data-dcnode-id=&quot;2184&quot; instrument_node=&quot;&quot;&gt;According to the EBRD a well-functioning market economy should enjoy a diverse range of economic activities, equality of opportunity and convergence of incomes. These outcomes had not yet been achieved by 2013 and progress in establishing well-functioning market economies had stalled since the 1990s. On the EBRD's measure of transition indicators the transition economies had become &quot;stuck in transition&quot;. Price liberalization, small-scale privatization and the opening-up of trade and foreign exchange markets were mostly complete by the end of the 1990s. However economic reform had slowed in areas such governance, enterprise restructuring and competition policy, which remained substantially below the standard of other developed market economies.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2181&quot; id=&quot;cite_ref-30&quot;&gt;&lt;a data-dcnode-id=&quot;2182&quot; href=&quot;#cite_note-30&quot;&gt;&lt;span data-dcnode-id=&quot;2183&quot; instrument_node=&quot;&quot;&gt;[30]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2180&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2173&quot;&gt;&lt;span data-dcnode-id=&quot;2178&quot; instrument_node=&quot;&quot;&gt;According to &amp;nbsp;Stuart Shields, liberalization of the ECE economies took place notably through various changes which were supported by the EBRD, for instance, set in different different steps. Firstly, measures of competition and financial discipline were put in place in the beginning. As part of the second wave of reforms, changes were focused on the opening of key parts of the economy to foreign competition in order to improve human capital and to foster entrepreneurship in those economies. Thus, they turned to labour market transformation by highlighting the need for a more flexible labour market. Furthermore, new institutional frameworks were needed, to help with transformations such as privatisation and the increasing flows of Foreign direct investment as part of what is described as “an institutional shock therapy”.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2175&quot; id=&quot;cite_ref-31&quot;&gt;&lt;a data-dcnode-id=&quot;2176&quot; href=&quot;#cite_note-31&quot;&gt;&lt;span data-dcnode-id=&quot;2177&quot; instrument_node=&quot;&quot;&gt;[31]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2174&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2160&quot;&gt;&lt;span data-dcnode-id=&quot;2172&quot; instrument_node=&quot;&quot;&gt;Inequality of opportunity was higher in the transition economies of Central and Eastern Europe and Central Asia than in some other developed economies in Western Europe (except France, where inequality of opportunity was relatively high). The highest inequality of opportunity was found in the Balkans and Central Asia. In terms of legal regulations and access to education and health services, inequality of opportunity related to gender was low in Europe and Central Asia but medium to high in respect of labour practices, employment and entrepreneurship and in &lt;/span&gt;&lt;a data-dcnode-id=&quot;2170&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Access_to_finance&quot; title=&quot;Access to finance&quot;&gt;&lt;span data-dcnode-id=&quot;2171&quot; instrument_node=&quot;&quot;&gt;access to finance&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2169&quot; instrument_node=&quot;&quot;&gt;. In Central Asia women also experienced significant lack of access to health services, as was the case in Arab countries.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2166&quot; id=&quot;cite_ref-32&quot;&gt;&lt;a data-dcnode-id=&quot;2167&quot; href=&quot;#cite_note-32&quot;&gt;&lt;span data-dcnode-id=&quot;2168&quot; instrument_node=&quot;&quot;&gt;[32]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2165&quot; instrument_node=&quot;&quot;&gt; While many transition economies performed well with respect to primary and secondary education, and matched that available in many other developed economies, they were weaker when it came to training and tertiary education.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2162&quot; id=&quot;cite_ref-33&quot;&gt;&lt;a data-dcnode-id=&quot;2163&quot; href=&quot;#cite_note-33&quot;&gt;&lt;span data-dcnode-id=&quot;2164&quot; instrument_node=&quot;&quot;&gt;[33]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2154&quot;&gt;&lt;span data-dcnode-id=&quot;2159&quot; instrument_node=&quot;&quot;&gt;Over the decade 1994 to 2004, the transition economies had closed some of the gap in income per person with the average for the European Union in purchasing power parity terms. These gains had been driven by sustained growth in productivity as obsolete capital stock was scrapped and production shifted to take advantage of the opening-up of foreign trade, price liberalization and foreign direct investment. However the rapid growth rates of that period of catch-up had stalled since the late 2000s and the prospects for income convergence have receded according to the EBRD's prognosis, unless there are additional productivity-enhancing structural reforms.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2156&quot; id=&quot;cite_ref-34&quot;&gt;&lt;a data-dcnode-id=&quot;2157&quot; href=&quot;#cite_note-34&quot;&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt;[34]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2155&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2145&quot;&gt;&lt;span data-dcnode-id=&quot;2153&quot; instrument_node=&quot;&quot;&gt;The recent history of transition suggested that weak political institutions and entrenched interest groups had hindered economic reform. The EBRD's &lt;/span&gt;&lt;i data-dcnode-id=&quot;2151&quot;&gt;&lt;span data-dcnode-id=&quot;2152&quot; instrument_node=&quot;&quot;&gt;Transition Report 2013&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2150&quot; instrument_node=&quot;&quot;&gt; looked at the relationship between transition and democratization.  The report acknowledged that the academic literature was divided on whether economic development fostered democracy but argued that there was nonetheless strong empirical support for the hypothesis. It suggested that countries with high inequality were less inclined to support a limited and accountable state. In general, the proportion of the population with an income of between US$10–50 a day (the so-called &quot;middle class&quot;) correlated with the level of democracy; however this correlation disappeared in transition countries with high income inequality. Those countries with large natural resource endowments, for example oil and gas producers like Russia and Kazakhstan, had less accountable governments and faced less electoral pressure to tackle powerful vested interests because the government could rely on resource rents and did not have to tax the population heavily. Countries with a strong institutional environment – that is, effective rule of law, secure property rights and uncorrupted public administration and corporate governance – were better placed to attract investment and undertake restructuring and regulatory change.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2147&quot; id=&quot;cite_ref-35&quot;&gt;&lt;a data-dcnode-id=&quot;2148&quot; href=&quot;#cite_note-35&quot;&gt;&lt;span data-dcnode-id=&quot;2149&quot; instrument_node=&quot;&quot;&gt;[35]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2146&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2140&quot;&gt;&lt;span data-dcnode-id=&quot;2144&quot; instrument_node=&quot;&quot;&gt;To spur further economic reform and break out of a vicious circle, the EBRD &lt;/span&gt;&lt;i data-dcnode-id=&quot;2142&quot;&gt;&lt;span data-dcnode-id=&quot;2143&quot; instrument_node=&quot;&quot;&gt;Transition Report 2013&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2141&quot; instrument_node=&quot;&quot;&gt; proposed that the transition economies should: 
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2139&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;2127&quot;&gt;&lt;li data-dcnode-id=&quot;2137&quot;&gt;&lt;span data-dcnode-id=&quot;2138&quot; instrument_node=&quot;&quot;&gt;Open up trade and finance, which made reform more resilient to popular pressure (&quot;market aversion&quot;) and meant that countries could access the EU single market either as member states or through association agreements (such as those being negotiated with Ukraine, Moldova and Georgia);&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2136&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2134&quot;&gt;&lt;span data-dcnode-id=&quot;2135&quot; instrument_node=&quot;&quot;&gt;Encourage transparent and accountable government, with media and civil society scrutiny, and political competition at elections;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2133&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2128&quot;&gt;&lt;span data-dcnode-id=&quot;2132&quot; instrument_node=&quot;&quot;&gt;Invest in human capital, especially by improving the quality of tertiary education.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2129&quot; id=&quot;cite_ref-36&quot;&gt;&lt;a data-dcnode-id=&quot;2130&quot; href=&quot;#cite_note-36&quot;&gt;&lt;span data-dcnode-id=&quot;2131&quot; instrument_node=&quot;&quot;&gt;[36]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2126&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2116&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;2124&quot; id=&quot;Countries_in_transition&quot;&gt;&lt;span data-dcnode-id=&quot;2125&quot; instrument_node=&quot;&quot;&gt;Countries in transition&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;2117&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2122&quot;&gt;&lt;span data-dcnode-id=&quot;2123&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2120&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTransition_economy%26action%3Dedit%26section%3D5&quot; title=&quot;Edit section: Countries in transition&quot;&gt;&lt;span data-dcnode-id=&quot;2121&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2118&quot;&gt;&lt;span data-dcnode-id=&quot;2119&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2115&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2104&quot;&gt;&lt;span data-dcnode-id=&quot;2114&quot; instrument_node=&quot;&quot;&gt;Although the term &quot;transition economies&quot; usually covers the countries of &lt;/span&gt;&lt;a data-dcnode-id=&quot;2112&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Central_and_Eastern_Europe&quot; title=&quot;Central and Eastern Europe&quot;&gt;&lt;span data-dcnode-id=&quot;2113&quot; instrument_node=&quot;&quot;&gt;Central and Eastern Europe&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2111&quot; instrument_node=&quot;&quot;&gt; and the former &lt;/span&gt;&lt;a data-dcnode-id=&quot;2109&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union&quot; title=&quot;Soviet Union&quot;&gt;&lt;span data-dcnode-id=&quot;2110&quot; instrument_node=&quot;&quot;&gt;Soviet Union&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2108&quot; instrument_node=&quot;&quot;&gt;, this term may have a wider context. Outside of &lt;/span&gt;&lt;a data-dcnode-id=&quot;2106&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Europe&quot; title=&quot;Europe&quot;&gt;&lt;span data-dcnode-id=&quot;2107&quot; instrument_node=&quot;&quot;&gt;Europe&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2105&quot; instrument_node=&quot;&quot;&gt;, there are countries emerging from a socialist-type command economy towards a market-based economy (e.g., China). Despite such movements, some countries have chosen to remain non-free states with regard to political freedoms and human rights.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2089&quot;&gt;&lt;span data-dcnode-id=&quot;2103&quot; instrument_node=&quot;&quot;&gt;In a wider sense, the definition of transition economy refers to all countries which attempt to change their basic constitutional elements towards market-style fundamentals. Their origin could be also in a post-colonial situation, in a heavily regulated &lt;/span&gt;&lt;a class=&quot;new&quot; data-dcnode-id=&quot;2101&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAsian_economics%26action%3Dedit%26redlink%3D1&quot; title=&quot;Asian economics (page does not exist)&quot;&gt;&lt;span data-dcnode-id=&quot;2102&quot; instrument_node=&quot;&quot;&gt;Asian-style economy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2100&quot; instrument_node=&quot;&quot;&gt;, in a &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2098&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Latin_American&quot; title=&quot;Latin American&quot;&gt;&lt;span data-dcnode-id=&quot;2099&quot; instrument_node=&quot;&quot;&gt;Latin American&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2097&quot; instrument_node=&quot;&quot;&gt; post-dictatorship, or even in a somehow economically underdeveloped country in &lt;/span&gt;&lt;a data-dcnode-id=&quot;2095&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Africa&quot; title=&quot;Africa&quot;&gt;&lt;span data-dcnode-id=&quot;2096&quot; instrument_node=&quot;&quot;&gt;Africa&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2094&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2091&quot; id=&quot;cite_ref-falke_3-1&quot;&gt;&lt;a data-dcnode-id=&quot;2092&quot; href=&quot;#cite_note-falke-3&quot;&gt;&lt;span data-dcnode-id=&quo
