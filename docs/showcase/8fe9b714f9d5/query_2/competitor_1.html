earch-detail-middle-section&quot; data-dcnode-id=&quot;2432&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex__item--grow research-detail-middle-section__item&quot; data-dcnode-id=&quot;2452&quot; style=&quot;flex-basis:0px;flex-grow:2&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-1-above&quot; data-dcnode-id=&quot;2453&quot;&gt;&lt;div class=&quot;nova-legacy-c-card__header nova-legacy-c-card__header--show-divider nova-legacy-c-card__header--spacing-inherit&quot; data-dcnode-id=&quot;2457&quot;&gt;&lt;h2 class=&quot;nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-700&quot; data-dcnode-id=&quot;2458&quot;&gt;&lt;span data-dcnode-id=&quot;2459&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;2454&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-800 research-detail-middle-section__abstract&quot; data-dcnode-id=&quot;2455&quot; itemprop=&quot;description&quot;&gt;&lt;span data-dcnode-id=&quot;2456&quot; instrument_node=&quot;&quot;&gt;This paper deals with the early stages of transformation of centrally-planned economies (CBEs) into market economies during which expectations playa key role. It focuses on the transitional phase during which the economy is not any more a CPE but has not yet become a market economy. During this phase the economy is referred to as a 'previously centrally-planned economy&quot; (PCPE). A simple model is developed to analyze the consequences of expected price liberalization. The model highlights the anticipatory character of economic behavior during the early stages of the transformation process. A major focus is given to credit markets. The CPEs undergoing transformation lack depth and breadth of financial markets. The lack of information necessary to assess risk and creditworthiness complicates the conduct of credit polity. The analysis illustrates the benefits of an early development of such markets, and of finding appropriate ways to &quot;clean&quot; the balance sheets of enterprises and banks from bad loans. It demonstrates the cost of a fine-tuning strategy and the benefits from a quick implementation of price reform. The paper also examines alternative means to reduce 'liquidity overhang,&quot; and shows that all involve taxation of one form or another. The consequences of privatization are analyzed and the benefits of an early development of an effective tax system highlighted.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex__item--grow research-detail-middle-section__item&quot; data-dcnode-id=&quot;2433&quot; style=&quot;flex-basis:0px;flex-grow:1&quot;&gt;&lt;div class=&quot;lite-page-promo research-detail-signup-promo&quot; data-dcnode-id=&quot;2434&quot;&gt;&lt;picture class=&quot;lite-page-promo__brand research-detail-signup-promo__brand&quot; data-dcnode-id=&quot;2448&quot; height=&quot;14&quot; width=&quot;100&quot;&gt;&lt;source data-dcnode-id=&quot;2451&quot; data-srcset=&quot;images/icons/svgicons/researchgate-logo-white.svg&quot; type=&quot;image/svg+xml&quot;&gt;&lt;span data-dcnode-id=&quot;2450&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;ResearchGate Logo&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;2449&quot; data-src=&quot;images/icons/svgicons/researchgate-logo-white.svg&quot; height=&quot;14&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot; width=&quot;100&quot;&gt;&lt;/picture&gt;&lt;p class=&quot;nova-legacy-e-text nova-leg .jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1601&quot;&gt;&lt;span data-dcnode-id=&quot;1602&quot; instrument_node=&quot;&quot;&gt;Costin Ciora&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1589&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1590&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Popescu-Dan&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1591&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1594&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1595&quot;&gt;&lt;span data-dcnode-id=&quot;1597&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Popescu Dumitru Dan&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1596&quot; data-src=&quot;https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1592&quot;&gt;&lt;span data-dcnode-id=&quot;1593&quot; instrument_node=&quot;&quot;&gt;Popescu Dumitru Dan&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1583&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1584&quot;&gt;&lt;span class=&quot;js-target-abstract-626cb1760fb56 lite-page-hidden&quot; data-dcnode-id=&quot;1585&quot;&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;In the last decade of the past century, the Romanian economy had registered suboptimal economic performances characterized by severe declines in the GDP, huge losses of the state-owned companies and gigantic inter-enterprise arrears that accounted for over 35% of Romania's GDP. The restructuring process of state-owned enterprises (SOE) in Romania started in 1993 with a massive exercise that included more than 400 SOE (state-owned-companies) amid on the following patterns: “top-down” approach and a „pre-privatization restructuring” preceded and joined by a substantial specific legislative framework. This first wave has been followed by a second wave starting from 2001 that included a limited number of companies but of higher value and impact on the economy (biggest banks, big industrial and energy companies, former regies autonomes etc.) The second wave of restructuring meant a change of paradigm for companies in need of restructuring, developed in two important stages, when SOE were listed at the stock exchange, privatized or placed in a „stand-by” process in order to be restructured. Thus, the methodology of restructuring in the second wave has been retooled and correlated with the evolution of the macroeconomic conditions and agreements with IFI's. The EBRD index of privatization show a direct relation between the two waves, as Romania received a higher value for this index as it moved to next level of restructuring and privatization.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;no acy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1511&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1522&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1523&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Yinbin-Liu-70590948&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1524&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1525&quot;&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt;Yinbin Liu&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1517&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1518&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Hongbo-Li-2050865597&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1519&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1520&quot;&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt;Hongbo Li&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1512&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1513&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Stella-Wen-Tian-70537032&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1514&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1515&quot;&gt;&lt;span data-dcnode-id=&quot;1516&quot; instrument_node=&quot;&quot;&gt;Stella Wen Tian&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1506&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1507&quot;&gt;&lt;span class=&quot;js-target-abstract-626cb17610548 lite-page-hidden&quot; data-dcnode-id=&quot;1508&quot;&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;This paper examines the usage and diffusion of Government Credit Information Systems (GCIS) in district-level governments in shanghai. The diffusion of GCIS was studied from a process-oriented perspective. A System Dynamics (SD) model is developed to simulate the relationships of technological, organizational and environmental, and institutional factors on GCIS diffusion under different management policies. A holistic view on the feedback loops, the consequently nonlinear behavior pattern of GCIS usage, and its diffusion in Shanghai government agencies is examined. Our research model and results suggest that workload faced by GCIS users and the tolerable maximum workload have a high impact on GCIS usage, task volume brought by GCIS, work pressure and the perception of technological factors. Different combination of work intensity and the tolerable maximum work intensity significantly influence the system usage. The contribution of our study lies in revealing that the diffusion of GCIS requires a systematic consideration of the business development plan, the GCIS user's workload and the organization's business environment. Flexible managerial incentive strategy will enhance user's work efficiency, thus lead to effective diffusion of GCIS in organizations. The theoretical and practical implications of this study are discussed.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1490&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1491&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1492&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1493&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1494&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1500&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1501&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/221229702_Modeling_Government_Credit_Information_Systems_Diffusion_in_China_A_System_Dynamics_Approach&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1502&quot;&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class //www.researchgate.net/profile/Fabrizio-Coricelli&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1407&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1410&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1411&quot;&gt;&lt;span data-dcnode-id=&quot;1413&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Fabrizio Coricelli&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1412&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/1002045494542342-1615917671948_Q64/Fabrizio-Coricelli.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1408&quot;&gt;&lt;span data-dcnode-id=&quot;1409&quot; instrument_node=&quot;&quot;&gt;Fabrizio Coricelli&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1399&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1400&quot;&gt;&lt;span class=&quot;js-target-abstract-626cb1760ff2a lite-page-hidden&quot; data-dcnode-id=&quot;1401&quot;&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;Most stabilization programs in previously centrally planned economies (PCPEs) have relied on a sharp tightening of credit policy. In addition to — or even more important than — the objective of curbing inflation typical of stabilization programs in market economies, the tightening of credit in PCPEs was meant to foster the restructuring of the economy, by forcing firms to adopt efficient methods of production and by filtering out of the system nonviable firms. In short, tight credit was a crucial instrument for imposing hard budget constraints. In previous works (Calvo and Coricelli, 1992,1993) we have advanced the view that in the context of underdeveloped credit markets, with segmented financial circuits of households and firms, the contraction of bank credit likely played a significant role in the output collapse which accompanied the initial stages of most stabilization programs in PCPEs. However, it is often heard that even if tight credit partly contributed to the initial output decline it was nevertheless a key instrument for inducing a more efficient allocation of resources across firms and sectors. In this paper we raise doubts on the possibility of achieving such an efficient allocation in the context of underdeveloped financial markets. We focus on inter-enterprise credit, which effectively illustrates how a liquidity squeeze might be a major obstacle for an efficient selection of bad and good firms.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1383&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1384&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1385&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1386&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1387& n overlapping generation model, it is shown that the existence of financial markets allows the choice of different combinations of growth and consumer's welfare, given the existing trade-off between these two targets. Financial markets can exist under different ownership schemes: in the context of the model chosen, it is shown that it is impossible to obtain unequivocal conclusions about the sequence of financial reforms and the optimal ownership scheme. Thus it is necessary to judge on a case by case basis, and caution is suggested in the policy prescriptions.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1332&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1333&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1334&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1335&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1336&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1342&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1343&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/222957052_Creation_of_Financial_Markets_in_Previous publication-item__stack-item&quot; data-dcnode-id=&quot;1276&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1277&quot;&gt;&lt;span class=&quot;js-target-abstract-626cb17610735 lite-page-hidden&quot; data-dcnode-id=&quot;1278&quot;&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt;State ownership and operation of the housing stock in the previously centrally planned economies severely distorts housing markets, stifles labor mobility, and produces operating losses that exacerbate fiscal deficits. The conventional wisdom regarding structural reform is to gradually increase administered rents, thereby reducing deficits. Housing sales, where they occur, are primarily motivated to generate revenue to cover deficits in current operating budgets. We argue that the perceived benefits to a prolonged transition are illusory and the social costs are high.
Housing will be affordable only if the population's current ownership of the existing housing stock is recognized and dividends on it are paid out. The payment can be a regular dividend (e.g., housing allowances) or a one-time special dividend (e.g., ownership vouchers). The latter is preferable.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1260&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1261&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1262&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1263&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1264&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1270&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1271&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/5151378_Rapid_Housing_Privatization_in_Reforming_Economies_Pay_the_Special_Dividend_Now&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1272&quot;&gt;&lt;span data-dcnode-id=&quot;1273&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div c uot;1235&quot;&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;Jacob A. Frenkel&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1223&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1224&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Guillermo-Calvo&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1225&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1228&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1229&quot;&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Guillermo A. Calvo&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1230&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/272830478680067-1442059263353_Q64/Guillermo-Calvo.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1226&quot;&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt;Guillermo A. Calvo&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1217&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1218&quot;&gt;&lt;span class=&quot;js-target-abstract-626cb176109e6 lite-page-hidden&quot; data-dcnode-id=&quot;1219&quot;&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;This paper identifies obstacles hindering the transformation of centrally-planned economies (CPEs) into well-functioning market economies. The analysis is motivated by the recent experience with economic transformation and restructuring in Eastern Europe and the U.S.S.R. The economic system in CPEs is highly distorted. Prices do not represent real social costs, incentives systems are absent, losses of unprofitable state-owned enterprises are automatically financed, legislations vital for the functioning of markets are not in place, private ownership and property rights are underdeveloped, bankruptcy laws are absent, markets are missing, shortages prevail and, occasionally, inflation is high. The obstacles identified relate to (i) anticipatory dynamics, (ii) monetary overhang and the budget, and (iii) underdeveloped credit markets. It is demonstrated that these obstacles inhibit the effectiveness of price reform, monetary and credit policies, and trade liberalization. The analysis focuses on various ways to remove the obstacles. In this regard, a special examination is made of the implications of cleaning the balance sheets of enterprises and banks from nonperforming loans, as well as ways to enhance credibility. In the absence of such measures, privatization will be difficult since the necessary information about creditworthiness of firms is lacking. The paper concludes with a brief discussion of sequencing, safety nets. and their associated obstacles.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1201&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1202&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pac class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1169&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1170&quot;&gt;&lt;span data-dcnode-id=&quot;1171&quot; instrument_node=&quot;&quot;&gt;Elias Dinopoulos&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1161&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1162&quot;&gt;&lt;span class=&quot;js-target-abstract-626cb17610c07 lite-page-hidden&quot; data-dcnode-id=&quot;1163&quot;&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;This paper presents a model of a socialist economy, incorporating bargaining over wages and employment in the socialized sector, efficiency wages in the non-socialized sector, and shortages which are reflected in the black market. The model is used to analyze the implications of liberalization policies, including trade liberalization, an administered price increase, and permission for increased direct foreign investment. The results suggest, among other things, that reforms may have different effects under different trade regimes; that small price reforms may have perverse effects; and that foreign investment in a shortage economy may be immiserizing.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1145&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1146&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--v person-inline-item__fullname&quot; data-dcnode-id=&quot;1114&quot;&gt;&lt;span data-dcnode-id=&quot;1115&quot; instrument_node=&quot;&quot;&gt;Ratna Sahay&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1105&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1106&quot;&gt;&lt;span class=&quot;js-target-abstract-626cb17610d80 lite-page-hidden&quot; data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;While output declined in virtually all transition economies in the initial years, the speed and extent of the recovery that followed has varied widely across these countries. The contrast between the more and less successful transitions, the latter largely in the former Soviet Union, raises many questions about the relative roles played by adverse initial conditions, external factors, and reform strategies. This paper summarizes the macroeconomic performance of the transition economies. We first review the initial conditions confronting these economies, the reform strategy that was proposed, and the associated controversies that arose a decade ago. We then account for the widely different outcomes, highlighting the role of exogenous factors and the macroeconomic and structural policies adopted by the countries. We find that both stabilization policies and structural reforms, particularly privatization, contributed to the growth recovery. We also conclude that the faster is the speed of reforms, the quicker is the recovery and the higher is growth.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item &gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1027&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1028&quot;&gt;&lt;span class=&quot;js-target-abstract-626cb17610f46 lite-page-hidden&quot; data-dcnode-id=&quot;1029&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;Can Eastern European families most severely impoverished during the transition to capitalism rely on private family safety nets? This question is likely critical for the transition's success, but little is known about family networks in Eastern Europe. The authors analyze newly available Polish household surveys, conducted both before and after Poland's economic transition, which measure private inter-household transfers. Such transfers are large and widespread in Poland, and in many ways appear to function like means-tested public transfers. They flow from high to low-income households and are targeted to young couples, families with many children and those experiencing illness. Private transfer patterns also suggest that they are responsive to liquidity constraints. The authors' results from 1987 data indicate that private transfers could fill a non-trivial portion of the income gap left by unemployment. However, they also find evidence from 1992 data suggesting that family networks weakened somewhat after the transition. Copyright 1997 by The International Association for Research in Income and Wealth.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1011&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dc te-page-hidden&quot; data-dcnode-id=&quot;957&quot;&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;In this paper we analyze the determinants of the evolution of ex- change rates within the context of alternative models of exchange rate dynamics. We examine the overshooting hypothesis in models which emphasize differential speeds of adjustment in asset and goods markets as well as in models which emphasize portfolio balance considerations. We show that exchange rate overshooting is not an intrinsic characteristic of the foreign exchange market and that it depends on a set of specific assumptions. We also show that the overshooting is not a characteristic of the assumption of perfect foresight nor does it depend in general on the assumption that goods and asset markets clear at different speeds. As long as the speeds of adjustment in the various markets are less than infinite, the key factor determining the short run effects of a monetary expansion is the degree of capital mobility. When capital is highly mobile, the exchange rate overshoots its long-run value and when capital is relatively immobile the exchange rate undershoots its long-run value. Within the context of the portfolio-balance model we show that the effects of a monetary expansion on the dynamics of exchange rates and in particular on whether exchange rates overshoot or undershoot their equilibrium path depend critically on the specification of asset choice, on the degree of substitution among assets, and on the quality of the various assets in being an inflation hedge, Specifically, when internationally traded goods are a better inflation hedge than nontraded goods, the nominal exchange rate overshoots the domestic price level and conversely.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;939&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-ac tatic.net/ii/profile.image/278734075645954-1443466790177_Q64/Joseph-Eisenhauer.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;530&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;531&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Joseph-Eisenhauer&quot;&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;Joseph G. Eisenhauer&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;521&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;Purpose – The purpose of this paper is threefold: conceptually, to demonstrate that ethical behavior is rational; theoretically, to illustrate that conscience can be readily incorporated into an expected utility framework; and empirically, to investigate whether conscience is an effective and economically important deterrent to free riding. Design/methodology/approach – An analogy to risk &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;524&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626cb17611ad7&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626cb17611ad7&quot; data-dcnode-id=&quot;522&quot;&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt; aversion demonstrates the rationality of ethical behavior. An expected utility model of tax evasion is then augmented by a conscience parameter and calibrated using recent empirical data from a transition economy. Findings – Taxpayers in Moldova are estimated to have engaged in roughly 10-33 percent as much tax evasion as predicted by a model of amoral preferences. The difference amounts to between $11 million and $19.6 million in government revenues annually between 1997 and 2000. Research limitations/implications – The model is calibrated with aggregate data and consequently the empirical results are approximate. Replications with disaggregated data sets would provide useful confirmation of the findings. Practical implications – Economic models of individual decision-making which assume amorality and ignore conscience vastly overestimate the level of free riding. In practice, compliance with taxation and other social regulation may be amenable to moral suasion as well as law enforcement. Originality/value – Contrary to the predominant neoclassical paradigm of amoral self-interest, this paper highlights the importance of ethical preferences in modeling and measuring economic behavior. Researchers can more accurately predict and policymakers can more effectively influence individual decision-making by taking account of moral sentiments.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;519&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/23948987_Conscience_as_a_deterrent_to_free_riding&quot;&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;Read more&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&quot; data-dcnode-id=&quot;483&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none&quot; data-dcnode-id=&quot;484&quot;&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;485&quot;&gt;&lt;div class=&quot;publication-recommendation-item publication-recommendation-item--redesign&quot; data-dcnode-id=&quot;486&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges&quot; data-dcnode-id=&quot;511&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item&quot; data-dcnode-id=&quot;512&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m&quot; data-dcnode-id=&quot;513&quot;&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;Article&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;h3 class=&quot;nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title&quot; data-dcnode-id=&quot;508&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link&quot; data-dcnode-id=&quot;509&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/4783131_The_dual_role_of_money_and_optimal_financial_taxes&quot;&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;The dual role of money and optimal financial taxes&lt;/span&gt;&lt;/a&gt;&lt;/h3&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500&quot; data-dcnode-id=&quot;505&quot;&gt;&lt;span data-dcnode-id=&quot;506&quot;&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;February 1996&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto&quot; data-dcnode-id=&quot;495&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;496&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;497&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;501&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;502&quot;&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Harry Huizinga&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;503&quot; data-src=&quot;https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;498&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;499&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Harry-Huizinga&quot;&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;Harry Huizinga&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;489&quot;&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;This paper reconsiders the optimal taxation of money and other financial assets. The optimal tax formulae reflect that money provides liquidity services and is a saving vehicle. In fact, it is useful to reformulate the optimal tax problem to allow for separate taxes on the liquidity and saving functions of money. This reformulation allows one to better understand the original optimal tax problem. &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;492&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626cb17611e9e&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;493&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626cb17611e9e&quot; data-dcnode-id=&quot;490&quot;&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt; The possible optimality of a subsidy on borrowing, for instance, can be explained if it is noted that the theoretically correct measure of savings reflects that money as well as nonmonetary assets can serve as saving vehicles.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;487&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/4783131_The_dual_role_of_money_and_optimal_financial_taxes&quot;&gt;&lt;span data-dcnode-id=&quot;488&quot; instrument_node=&quot;&quot;&gt;Read more&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&quot; data-dcnode-id=&quot;455&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none&quot; data-dcnode-id=&quot;456&quot;&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;457&quot;&gt;&lt;div class=&quot;publication-recommendation-item publication-recommendation-item--redesign&quot; data-dcnode-id=&quot;458&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges&quot; data-dcnode-id=&quot;479&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item&quot; data-dcnode-id=&quot;480&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m&quot; data-dcnode-id=&quot;481&quot;&gt;&lt;span data-dcnode-id=&quot;482&quot; instrument_node=&quot;&quot;&gt;Book&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;h3 class=&quot;nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title&quot; data-dcnode-id=&quot;476&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link&quot; data-dcnode-id=&quot;477&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/313038147_The_Influence_of_Uncertainty_in_a_Changing_Financial_Environment&quot;&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;The Influence of Uncertainty in a Changing Financial Environment&lt;/span&gt;&lt;/a&gt;&lt;/h3&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500&quot; data-dcnode-id=&quot;473&quot;&gt;&lt;span data-dcnode-id=&quot;474&quot;&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;January 2017&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto&quot; data-dcnode-id=&quot;467&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;468&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;469&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;470&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;471&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Ricardo-A-Halperin-2121496051&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;Ricardo A. Halperin&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;461&quot;&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;This book examines the role of uncertainty on financial decisions - and, consequently, on financial markets - in the buildup to and aftermath of the Great Recession. It tracks the significant growth and important structural changes in the financial sector during the past few decades, both of which made the economy more vulnerable to perceptions of risk in the markets. Halperin argues that &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;464&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626cb17611f24&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626cb17611f24&quot; data-dcnode-id=&quot;462&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt; conventional economic models have lost relevance by failing to take these developments into account appropriately, and also explains that because of financial globalization we can no longer understand what happens in the economies of major countries by relying on &quot;closed-economy&quot; thinking. The book concludes with a list of policy recommendations designed to increase the resilience of the financial markets to negative economic developments and to reduce incentives for risk taking, including a proposal to eliminate the double taxation of dividends.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;459&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/313038147_The_Influence_of_Uncertainty_in_a_Changing_Financial_Environment&quot;&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;Read more&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;lite-page-ad lite-page-ad--has-label lite-page-ad--empty&quot; data-dcnode-id=&quot;420&quot; id=&quot;lite-ad-05ls4ro9v8cn&quot;&gt;&lt;div class=&quot;lite-page-ad__inner&quot; data-dcnode-id=&quot;421&quot;&gt;&lt;div class=&quot;lite-page-ad__close&quot; data-dcnode-id=&quot;443&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-full nova-legacy-c-button--size-xs nova-legacy-c-button--color-grey nova-legacy-c-button--theme-solid nova-legacy-c-button--width-square&quot; data-dcnode-id=&quot;444&quot; id=&quot;lite-ad-05ls4ro9v8cn-close&quot; type=&quot;button&quot;&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;nova-legacy-e-icon nova-legacy-e-icon--size-s nova-legacy-e-icon--theme-bare nova-legacy-e-icon--color-inherit nova-legacy-e-icon--luminosity-medium nova-legacy-c-button__icon&quot; data-dcnode-id=&quot;445&quot;&gt;&lt;use data-dcnode-id=&quot;446&quot; xlink:href=&quot;/m/4210735495654424/images/icons/nova/icon-stack-s.svg#close-s&quot;&gt;&lt;svg data-dcnode-id=&quot;447&quot; id=&quot;close-s&quo
