&lt;/span&gt;&lt;div class=&quot;container layout-2-col layout-2-col-1 layout-right-sidebar&quot; data-dcnode-id=&quot;538&quot;&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;row main-section&quot; data-dcnode-id=&quot;540&quot;&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;col-sm-8 content-column&quot; data-dcnode-id=&quot;574&quot;&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;single-container&quot; data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;article class=&quot;post-157982 type-page has-post-thumbnail single-page-content single-page-simple-content&quot; data-dcnode-id=&quot;578&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 class=&quot;section-heading sh-t5 sh-s1&quot; data-dcnode-id=&quot;777&quot;&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;post-title h-text&quot; data-dcnode-id=&quot;778&quot;&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt;Transition economy – definition and meaning&lt;/span&gt;&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;entry-content clearfix&quot; data-dcnode-id=&quot;625&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;770&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;A &lt;/span&gt;&lt;strong data-dcnode-id=&quot;772&quot;&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;transition economy&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt; is a country that was once a communist state, and is now becoming a free market economy – changing from communism to capitalism, from central planning to free market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;767&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;Since the collapse of communism in Eastern Europe in the late 1980s and early 1990s, Bulgaria, Hungary, Poland, Romania, Russia, and several&amp;nbsp;other countries abandoned central planning and sought to embrace a free-market system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;Poland has been a relatively successful transition economy, while Russia has fared less well&amp;nbsp;– the transition economies faced some moderate to severe difficulties.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;China’s transition from the rigid communist system of Chairman Mao (Mao Zedong or Mao tse-tung), to the mixed economy it is today has been spectacular. In little more than three decades, China leaped from being nowhere near the ten largest economies in the world to the second biggest today.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;756&quot; style=&quot;text-align: center;&quot;&gt;&lt;img alt=&quot;transition economy&quot; class=&quot;aligncenter wp-image-157989 b-loaded&quot; data-dcnode-id=&quot;759&quot; height=&quot;359&quot; sizes=&quot;(max-width: 448px) 100vw, 448px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//marketbusinessnews.com/wp-content/uploads/2017/04/transition-economy.jpg&amp;amp;raw&quot; srcset=&quot;https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/transition-economy.jpg?w=830&amp;amp;ssl=1 830w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/transition-economy.jpg?resize=250%2C200&amp;amp;ssl=1 250w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/transition-economy.jpg?resize=187%2C150&amp;amp;ssl=1 187w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/transition-economy.jpg?resize=500%2C400&amp;amp;ssl=1 500w&quot; width=&quot;448&quot;&gt;&lt;em data-dcnode-id=&quot;757&quot;&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;All the transition economies across the world have one thing in common – when they were communist states, they were considerably poorer than the free-market economies of North America, Western Europe, Japan, South Korea and Australasia.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;751&quot;&gt;&lt;a data-dcnode-id=&quot;753&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dictionary.cambridge.org/dictionary/english/transition-economy&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;According to Dictionary.Cambridge.com&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;, a transition economy is:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;748&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;“An economy that is changing from being one under government control to being a market economy (= one in which companies are not controlled by the government).”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;744&quot;&gt;&lt;strong data-dcnode-id=&quot;745&quot;&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;Structural changes in a transition economy&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;741&quot;&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;A transition economy undergoes a series of structural reforms and transformation aimed at developing market-based institutions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;735&quot;&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;Rather than being set by a central planning organization, prices are freed and determined by market forces; this process is known as &lt;/span&gt;&lt;em data-dcnode-id=&quot;737&quot;&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;economic liberalization&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;732&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;Trade barriers are removed and there is a push to privatize most of the state-owned companies. A financial sector is created to allow the movement of private capital.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;729&quot;&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;During the process of change, the functional restructuring of state institutions in the transition economy allows it to turn from being a provider of economic growth to an enabler, with the private sector as its driving force.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;720&quot; style=&quot;text-align: center;&quot;&gt;&lt;strong data-dcnode-id=&quot;726&quot;&gt;&lt;img alt=&quot;Transition Economy - changes in agriculural production&quot; class=&quot;aligncenter wp-image-157993 b-loaded&quot; data-dcnode-id=&quot;727&quot; height=&quot;330&quot; sizes=&quot;(max-width: 440px) 100vw, 440px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//marketbusinessnews.com/wp-content/uploads/2017/04/Transition-Economy-changes-in-agriculural-production.jpg&amp;amp;raw&quot; srcset=&quot;https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/Transition-Economy-changes-in-agriculural-production.jpg?w=889&amp;amp;ssl=1 889w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/Transition-Economy-changes-in-agriculural-production.jpg?resize=200%2C150&amp;amp;ssl=1 200w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/Transition-Economy-changes-in-agriculural-production.jpg?resize=500%2C375&amp;amp;ssl=1 500w&quot; width=&quot;440&quot;&gt;&lt;/strong&gt;&lt;em data-dcnode-id=&quot;721&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;During the first ten years of the transition period, the difference between China’s and Russia/Ukraine’s performance regarding agricultural production was huge. While output grew by over 50% in China, it declined by about 50% in Russia. (&lt;/span&gt;&lt;a data-dcnode-id=&quot;723&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.fao.org/docrep/005/y4671e/y4671e0l.htm&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;Image: Adapted from fao.org&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;716&quot;&gt;&lt;strong data-dcnode-id=&quot;717&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;Worsening unemployment&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;713&quot;&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;Rising unemployment has been a feature of every transition economy, as newly-privatized businesses tried to improve efficiency.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;710&quot;&gt;&lt;span data-dcnode-id=&quot;711&quot; instrument_node=&quot;&quot;&gt;When they were&amp;nbsp;communist countries, virtually all their companies employed considerably more workers than they really needed. As private commercial enterprises entered the market, one of the first things to be cut back were labor costs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;707&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;As trade barriers were lifted, the newly-established private companies had to compete with the ultra-efficient multinationals of North America, Western Europe, Japan, South Korea and Australasia. Many were unable to cope and were driven out of the market, resulting in the loss of jobs for tens of millions of workers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;704&quot;&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;During the period of transition, the state bureaucracy – which had been massive – was scaled back. Millions of state employees lost their jobs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;695&quot; style=&quot;text-align: center;&quot;&gt;&lt;strong data-dcnode-id=&quot;701&quot;&gt;&lt;img alt=&quot;China - Transition Economy GDP growth&quot; class=&quot;aligncenter wp-image-157996 b-loaded&quot; data-dcnode-id=&quot;702&quot; height=&quot;345&quot; sizes=&quot;(max-width: 434px) 100vw, 434px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//marketbusinessnews.com/wp-content/uploads/2017/04/China-Transition-Economy-GDP-growth.jpg&amp;amp;raw&quot; srcset=&quot;https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/China-Transition-Economy-GDP-growth.jpg?w=846&amp;amp;ssl=1 846w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/China-Transition-Economy-GDP-growth.jpg?resize=250%2C200&amp;amp;ssl=1 250w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/China-Transition-Economy-GDP-growth.jpg?resize=189%2C150&amp;amp;ssl=1 189w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/China-Transition-Economy-GDP-growth.jpg?resize=500%2C397&amp;amp;ssl=1 500w&quot; width=&quot;434&quot;&gt;&lt;/strong&gt;&lt;em data-dcnode-id=&quot;696&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;China, by far the best-performing transition economy, has posted spectacular GDP annual growth figures for decades. (&lt;/span&gt;&lt;a data-dcnode-id=&quot;698&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Historical_GDP_of_China&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;699&quot; instrument_node=&quot;&quot;&gt;Data Source: Wikipedia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;691&quot;&gt;&lt;strong data-dcnode-id=&quot;692&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;Inflation in a transition economy&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;688&quot;&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;In a centrally-planned economy, prices are controlled by the government. When these price controls were removed, every transition economy experienced rising price inflation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;687&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;685&quot;&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;The newly-privatized companies had to determine their own prices, which they mainly calculated by responding to the economic forces of supply and demand and the true costs of production.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;682&quot;&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;Some entrepreneurs tried to profit from the new situation and raised their prices excessively.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;679&quot;&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;The average annual inflation rate in the transition economies during the 1990s was approximately 20%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;676&quot;&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;Since the beginning of this century, inflation rates in Eastern Europe have moved much closer to those found in Western Europe and the other advanced economies across the world.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;667&quot; style=&quot;text-align: center;&quot;&gt;&lt;strong data-dcnode-id=&quot;673&quot;&gt;&lt;img alt=&quot;Russia GDP Growth - Transition Economy&quot; class=&quot;aligncenter wp-image-157999 b-loaded&quot; data-dcnode-id=&quot;674&quot; height=&quot;359&quot; sizes=&quot;(max-width: 442px) 100vw, 442px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//marketbusinessnews.com/wp-content/uploads/2017/04/Russia-GDP-Growth-Transition-Economy.jpg&amp;amp;raw&quot; srcset=&quot;https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/Russia-GDP-Growth-Transition-Economy.jpg?w=817&amp;amp;ssl=1 817w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/Russia-GDP-Growth-Transition-Economy.jpg?resize=185%2C150&amp;amp;ssl=1 185w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/Russia-GDP-Growth-Transition-Economy.jpg?resize=492%2C400&amp;amp;ssl=1 492w&quot; width=&quot;442&quot;&gt;&lt;/strong&gt;&lt;em data-dcnode-id=&quot;668&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;Russia’s GDP growth over the past twenty-five years has been a roller-coaster. Corruption, mismanagement, and an over-dependence on commodity prices have undermined the country’s economic performance. (&lt;/span&gt;&lt;a data-dcnode-id=&quot;670&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//data.worldbank.org/indicator/NY.GDP.MKTP.KD.ZG%3Flocations%3DRU&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;Data Source: World Bank&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;663&quot;&gt;&lt;strong data-dcnode-id=&quot;664&quot;&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;Corruption in the transition economies&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;660&quot;&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;Corruption in the communist states of Eastern Europe and the Soviet Union was widespread. During the early years of transition, many corrupt officials and bureaucrats became corrupt directors of newly-privatized companies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;657&quot;&gt;&lt;span data-dcnode-id=&quot;658&quot; instrument_node=&quot;&quot;&gt;This corrupt environment, a number of economists believe, undermined the effective introduction of market reforms.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;654&quot;&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;With corruption infecting vast parts of senior management, many goods were poorly made and sold in illegal or unregulated markets. Criminal gangs emerged, filling the giant vacuum left by the former&amp;nbsp;communist regimes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;653&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;643&quot; style=&quot;text-align: center;&quot;&gt;&lt;img alt=&quot;China quote - Li Keqiang&quot; class=&quot;aligncenter wp-image-158001&quot; data-dcnode-id=&quot;652&quot; data-src=&quot;http://marketbusinessnews.com/wp-content/uploads/2017/04/China-quote-Li-Keqiang.jpg&quot; height=&quot;277&quot; sizes=&quot;(max-width: 380px) 100vw, 380px&quot; srcset=&quot;https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/China-quote-Li-Keqiang.jpg?w=804&amp;amp;ssl=1 804w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/China-quote-Li-Keqiang.jpg?resize=200%2C146&amp;amp;ssl=1 200w, https://i0.wp.com/marketbusinessnews.com/wp-content/uploads/2017/04/China-quote-Li-Keqiang.jpg?resize=500%2C364&amp;amp;ssl=1 500w&quot; width=&quot;380&quot;&gt;&lt;em data-dcnode-id=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;Li Keqiang is the Premier of the State Council of the People’s Republic of China. As well as being head of China’s government, he is also one of the leading figures behind the country’s economic policy. Along with General Secretary Xi Jinping, Li is a major part of the ‘5&lt;/span&gt;&lt;sup data-dcnode-id=&quot;649&quot;&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt;th&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt; generation of Chinese leadership’. (&lt;/span&gt;&lt;a data-dcnode-id=&quot;646&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.china.org.cn/china/leadership/2013-03/16/content_28193071.htm&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;647&quot; instrument_node=&quot;&quot;&gt;Image: adapted from china.org.cn/china/leadership&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;638&quot;&gt;&lt;a data-dcnode-id=&quot;640&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.economicsonline.co.uk/Competitive_markets/Transition_economies.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;641&quot; instrument_node=&quot;&quot;&gt;Regarding the lack of infrastructure, Economics Online writes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;639&quot; instrument_node=&quot;&quot;&gt;:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;635&quot;&gt;&lt;span data-dcnode-id=&quot;636&quot; instrument_node=&quot;&quot;&gt;“The transition economies also suffered from a lack of real capital, such as new technology, which is required to produce efficiently. This was partly because of the limited development of financial markets, and because there was little inward investment from foreign investors.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;634&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;632&quot;&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;“Clearly, this has changed as the transition economies have reformed, and joined the global market, which has encouraged inward investment (Foreign Direct Investment – FDI) from around the world.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;631&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr class=&quot;bs-divider full small&quot; data-dcnode-id=&quot;630&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;
