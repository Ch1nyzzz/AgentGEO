&lt;/span&gt;&lt;meta content=&quot;Social media websites are rapidly changing the way that Americans live and communicate with one another. Social media sites encourage individuals to constantly share information about one’s self (and constantly seek information about others) that would have been private in the past. This experience can alter how an individual views the world in ways that political scientists have not been able to fully capture. In a cross-sectional survey of the American public I find a strong correlation between the use of Facebook and personal blogs and support for civil liberties. Individuals who spend more time self-publicizing on the Internet seem to value freedom of expression more, but also value the right to privacy less than individuals who use social media less often. This pattern suggests that technology may be altering American attitudes on basic democratic values and highlights the need for dynamic research designs that account for the causal effect Internet use may have on individual political development.&quot; data-dcnode-id=&quot;2782&quot; name=&quot;dc.description&quot;&gt;&lt;span data-dcnode-id=&quot;2781&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;meta content=&quot;The Online Citizen: Is Social Media Changing Citizens’ Beliefs About Democratic Values? - Political Behavior&quot; data-dcnode-id=&quot;2614&quot; property=&quot;og:title&quot;&gt;&lt;span data-dcnode-id=&quot;2613&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;meta content=&quot;Social media websites are rapidly changing the way that Americans live and communicate with one another. Social media sites encourage individuals to constantly share information about one’s self (and constantly seek information about others) that would have been private in the past. This experience can alter how an individual views the world in ways that political scientists have not been able to fully capture. In a cross-sectional survey of the American public I find a strong correlation between the use of Facebook and personal blogs and support for civil liberties. Individuals who spend more time self-publicizing on the Internet seem to value freedom of expression more, but also value the right to privacy less than individuals who use social media less often. This pattern suggests that technology may be altering American attitudes on basic democratic values and highlights the need for dynamic research designs that account for the causal effect Internet use may have on individual political development.&quot; data-dcnode-id=&quot;2612&quot; property=&quot;og:description&quot;&gt;&lt;span data-dcnode-id=&quot;2611&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;section aria-labelledby=&quot;Abs1&quot; data-dcnode-id=&quot;2178&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;585&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;585&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;585&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;585&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Abstract&quot; lang=&quot;en&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2179&quot; id=&quot;Abs1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2183&quot; id=&quot;Abs1&quot;&gt;&lt;span data-dcnode-id=&quot;2184&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2180&quot; id=&quot;Abs1-content&quot;&gt;&lt;p data-dcnode-id=&quot;2181&quot;&gt;&lt;span data-dcnode-id=&quot;2182&quot; instrument_node=&quot;&quot;&gt;Social media websites are rapidly changing the way that Americans live and communicate with one another. Social media sites encourage individuals to constantly share information about one’s self (and constantly seek information about others) that would have been private in the past. This experience can alter how an individual views the world in ways that political scientists have not been able to fully capture. In a cross-sectional survey of the American public I find a strong correlation between the use of Facebook and personal blogs and support for civil liberties. Individuals who spend more time self-publicizing on the Internet seem to value freedom of expression more, but also value the right to privacy less than individuals who use social media less often. This pattern suggests that technology may be altering American attitudes on basic democratic values and highlights the need for dynamic research designs that account for the causal effect Internet use may have on individual political development.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2177&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;c-article-section__content c-article-section__content--separator&quot; data-dcnode-id=&quot;2174&quot;&gt;&lt;p data-dcnode-id=&quot;2175&quot;&gt;&lt;span data-dcnode-id=&quot;2176&quot; instrument_node=&quot;&quot;&gt;Social communication is in the midst of a fundamental paradigm shift. Social networking sites such as Facebook and Twitter, the proliferation of personal websites, and mobile devices designed to access these sites anywhere, anytime have made it possible for people to share information about their lives with a wide audience, and millions of people are actively embracing this new form of communication. This technology then allows users to publicize themselves in ways that have never been possible before and is changing the nature of public and private spheres and individuals’ relationships and interactions with one another.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2141&quot;&gt;&lt;p data-dcnode-id=&quot;2142&quot;&gt;&lt;span data-dcnode-id=&quot;2173&quot; instrument_node=&quot;&quot;&gt;This revolution has not gone unnoticed by social scientists. Indeed, one of the indications of the importance of social media use may be that it has drawn interest from scholars in psychology, sociology, education, communications and virtually every field that studies human behavior. The expansion of social media access means more and more individuals have access to increasing amounts of information and the opportunity for online socialization. Naturally, much of the research on social media use and political behavior has focused on how online socialization affects political knowledge (Delli Carpini and Keeter &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2171&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR6&quot; id=&quot;ref-link-section-d14744917e273&quot; title=&quot;Delli Carpini, M. X., &amp;amp; Keeter, S. (2003). The Internet and an informed citizenry. In D. M. Anderson &amp;amp; M. Cornfield (Eds.), The civic web: Online politics and democratic values (pp. 129–153). Lanham, MD: Rowman &amp;amp; Littlefield.&quot;&gt;&lt;span data-dcnode-id=&quot;2172&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2170&quot; instrument_node=&quot;&quot;&gt;) and political engagement (Boulianne &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2168&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR1&quot; id=&quot;ref-link-section-d14744917e276&quot; title=&quot;Boulianne, S. (2009). Does Internet use affect engagement? A meta-analysis of research. Political Communication,
                  26(2), 193–211.&quot;&gt;&lt;span data-dcnode-id=&quot;2169&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2167&quot; instrument_node=&quot;&quot;&gt;; Delli Carpini &lt;/span&gt;&lt;a aria-label=&quot;Reference 2000&quot; data-dcnode-id=&quot;2165&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR5&quot; id=&quot;ref-link-section-d14744917e279&quot; title=&quot;Delli Carpini, M. X. (2000). Gen.com: Youth, civic engagement, and the new information environment. Political Communication,
                  17, 341–349.&quot;&gt;&lt;span data-dcnode-id=&quot;2166&quot; instrument_node=&quot;&quot;&gt;2000&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2164&quot; instrument_node=&quot;&quot;&gt;; Jennings and Zeitner &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2162&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR16&quot; id=&quot;ref-link-section-d14744917e282&quot; title=&quot;Jennings, M. K., &amp;amp; Zeitner, V. (2003). Internet use and civic engagement: A longitudinal analysis. Public Opinion Quarterly,
                  67, 311–334.&quot;&gt;&lt;span data-dcnode-id=&quot;2163&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2161&quot; instrument_node=&quot;&quot;&gt;; Lee &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2159&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR20&quot; id=&quot;ref-link-section-d14744917e285&quot; title=&quot;Lee, K. M. (2006). Effects of Internet use on college students’ political efficacy. CyberPsychology &amp;amp; Behavior,
                  9(4), 415–422.&quot;&gt;&lt;span data-dcnode-id=&quot;2160&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt;; Lupia and Philpot &lt;/span&gt;&lt;a aria-label=&quot;Reference 2005&quot; data-dcnode-id=&quot;2156&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR22&quot; id=&quot;ref-link-section-d14744917e289&quot; title=&quot;Lupia, A., &amp;amp; Philpot, T. S. (2005). Views from inside the Net: How websites affect young adults’ political interest. Journal of Politics,
                  67, 1122–1142.&quot;&gt;&lt;span data-dcnode-id=&quot;2157&quot; instrument_node=&quot;&quot;&gt;2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2155&quot; instrument_node=&quot;&quot;&gt;; McLeod et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 1999&quot; data-dcnode-id=&quot;2153&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR24&quot; id=&quot;ref-link-section-d14744917e292&quot; title=&quot;McLeod, J. M., Scheufele, D. A., &amp;amp; Moy, P. (1999). Community, communication and participation: The role of mass media and interpersonal discussion in local political participation. Political Communication,
                  16, 315–336.&quot;&gt;&lt;span data-dcnode-id=&quot;2154&quot; instrument_node=&quot;&quot;&gt;1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2152&quot; instrument_node=&quot;&quot;&gt;; Vitak et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2150&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR38&quot; id=&quot;ref-link-section-d14744917e295&quot; title=&quot;Vitak, J., Zube, P., Smock, A., Carr, C. T., Ellison, N., Lampe, C. (2010). It’s complicated: Facebook users’ political participation in the 2008 election. CyberPsychology, Behavior and Social Networking.
                &quot;&gt;&lt;span data-dcnode-id=&quot;2151&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2149&quot; instrument_node=&quot;&quot;&gt;; Zhang et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2147&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR40&quot; id=&quot;ref-link-section-d14744917e298&quot; title=&quot;Zhang, W., Johnson, T. J., Seltzer, T., &amp;amp; Bichard, S. L. (2010). The revolution will be networked: The influence of social networking sites on political attitudes and behavior. Social Science Computer Review,
                  28(1), 75–92.&quot;&gt;&lt;span data-dcnode-id=&quot;2148&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2146&quot; instrument_node=&quot;&quot;&gt;; Kittilson and Dalton &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2144&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d14744917e301&quot; title=&quot;Kittilson, M. C., &amp;amp; Dalton, R. J. (2011). Virtual civil society: The new frontier of social capital? Political Behavior,
                  33, 625–644.&quot;&gt;&lt;span data-dcnode-id=&quot;2145&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2143&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2138&quot;&gt;&lt;p data-dcnode-id=&quot;2139&quot;&gt;&lt;span data-dcnode-id=&quot;2140&quot; instrument_node=&quot;&quot;&gt;However, social media use may represent a much larger change in social norms that affects fundamental values and perceptions. Rather than being a media form like television, where users passively absorb information, sites like Facebook and Youtube allow and encourage users to generate content, share it with each other, and comment on what their fellow users produce. Social media sites are specifically designed to encourage users to publish photos, personal information, and comments about their lives—information which would have been shared with only family or a few close friends a decade ago. This shift in behavior means that more and more Americans, particularly among younger cohorts, are living their lives publicly.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2135&quot;&gt;&lt;p data-dcnode-id=&quot;2136&quot;&gt;&lt;span data-dcnode-id=&quot;2137&quot; instrument_node=&quot;&quot;&gt;This article presents preliminary evidence that suggests that online socialization is having an impact on the fundamental values that individuals hold, creating citizens who have different ideas about norms and democratic values. I find that individuals who get into the habit of sharing information about themselves may come to value the right of free expression more and the right of privacy less. However, this relationship is only significant with the youngest generation of American voters, suggesting that online socialization may play a key role in intellectual development and maturation. The limits of cross-sectional data analysis obviously make it difficult to make firm conclusions about the causal process that creates the link between online socialization and value formation. While not necessarily conclusive, these results suggest that online socialization plays a key role in shaping core democratic values by providing a conduit for self-publicizing. Online socialization may encourage very different behaviors and cultivate individuals with very different values than past forms of socialization.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;section data-dcnode-id=&quot;2046&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;585&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;585&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;585&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;585&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Social Networking On- and Off-line&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2047&quot; id=&quot;Sec1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2133&quot; id=&quot;Sec1&quot;&gt;&lt;span data-dcnode-id=&quot;2134&quot; instrument_node=&quot;&quot;&gt;Social Networking On- and Off-line&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2048&quot; id=&quot;Sec1-content&quot;&gt;&lt;p data-dcnode-id=&quot;2095&quot;&gt;&lt;span data-dcnode-id=&quot;2132&quot; instrument_node=&quot;&quot;&gt;Recent political campaigns have brought attention to the role of social media, particularly Facebook and Twitter, which are becoming common tools in these campaigns (Gueorguieva &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2130&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR41&quot; id=&quot;ref-link-section-d14744917e315&quot; title=&quot;Gueorguieva, V. (2006). Voters, MySpace, and Youtube: The impact of alternative communication channels on the 2006 election cycle and beyond. Social Science Computer Review,
                  26(3), 288–300.&quot;&gt;&lt;span data-dcnode-id=&quot;2131&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2129&quot; instrument_node=&quot;&quot;&gt;). For the most part, research on social media use focuses on political knowledge and political participation, though the effect of social media on either of these phenomena is still unclear (see Boulianne &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2127&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR1&quot; id=&quot;ref-link-section-d14744917e318&quot; title=&quot;Boulianne, S. (2009). Does Internet use affect engagement? A meta-analysis of research. Political Communication,
                  26(2), 193–211.&quot;&gt;&lt;span data-dcnode-id=&quot;2128&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2126&quot; instrument_node=&quot;&quot;&gt; for a comprehensive review). Some researchers argue that virtual social networks act in the same manner that real-world contacts do. In the real world, social networks and interactions create a norm that the individual is expected to live up to (see, for example, Putnam &lt;/span&gt;&lt;a aria-label=&quot;Reference 1995&quot; data-dcnode-id=&quot;2124&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR30&quot; id=&quot;ref-link-section-d14744917e321&quot; title=&quot;Putnam, R. D. (1995). Bowling alone: America’s declining social capital. Journal of Democracy,
                  6, 65–78.&quot;&gt;&lt;span data-dcnode-id=&quot;2125&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2123&quot; instrument_node=&quot;&quot;&gt;; Green and Gerber &lt;/span&gt;&lt;a aria-label=&quot;Reference 2001&quot; data-dcnode-id=&quot;2121&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR12&quot; id=&quot;ref-link-section-d14744917e324&quot; title=&quot;Green, D., &amp;amp; Gerber, A. (2001). Do phone calls increase voter turnout? A field experiment. Public Opinion Quarterly,
                  65, 75–85.&quot;&gt;&lt;span data-dcnode-id=&quot;2122&quot; instrument_node=&quot;&quot;&gt;2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2120&quot; instrument_node=&quot;&quot;&gt;; Fowler and Kam &lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2118&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR8&quot; id=&quot;ref-link-section-d14744917e327&quot; title=&quot;Fowler, J. H., &amp;amp; Kam, C. D. (2007). Beyond the self: Social identity, altruism and political participation. Journal of Politics,
                  69(3), 813–827.&quot;&gt;&lt;span data-dcnode-id=&quot;2119&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2117&quot; instrument_node=&quot;&quot;&gt;; Sigel &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2115&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR33&quot; id=&quot;ref-link-section-d14744917e331&quot; title=&quot;Sigel, D. A. (2009). Social networks and collective action. Journal of Politics,
                  53(1), 122–138.&quot;&gt;&lt;span data-dcnode-id=&quot;2116&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2114&quot; instrument_node=&quot;&quot;&gt;). Therefore, if the individual’s network prioritizes participation and communicates about it the individual will be more likely to participate in order to live up to the network norm. Kittilson and Dalton (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2112&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d14744917e334&quot; title=&quot;Kittilson, M. C., &amp;amp; Dalton, R. J. (2011). Virtual civil society: The new frontier of social capital? Political Behavior,
                  33, 625–644.&quot;&gt;&lt;span data-dcnode-id=&quot;2113&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2111&quot; instrument_node=&quot;&quot;&gt;) argued that online socialization can serve a similar role to real-world social capital. In their study they found a strong positive correlation between online social capital and increased political tolerance, which suggests that the acts of online communication and engagement can alter individual opinion. In fact, many scholars have suggested that these online relationships can encourage people who might otherwise have no real-world social connections to politics to become politically active solely through online network activation (Vitak et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2109&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR38&quot; id=&quot;ref-link-section-d14744917e337&quot; title=&quot;Vitak, J., Zube, P., Smock, A., Carr, C. T., Ellison, N., Lampe, C. (2010). It’s complicated: Facebook users’ political participation in the 2008 election. CyberPsychology, Behavior and Social Networking.
                &quot;&gt;&lt;span data-dcnode-id=&quot;2110&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2108&quot; instrument_node=&quot;&quot;&gt;; Zhang et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2106&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR40&quot; id=&quot;ref-link-section-d14744917e340&quot; title=&quot;Zhang, W., Johnson, T. J., Seltzer, T., &amp;amp; Bichard, S. L. (2010). The revolution will be networked: The influence of social networking sites on political attitudes and behavior. Social Science Computer Review,
                  28(1), 75–92.&quot;&gt;&lt;span data-dcnode-id=&quot;2107&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2105&quot; instrument_node=&quot;&quot;&gt;). Of course, others remain unconvinced. Some researchers argue that online political activity merely creates a norm of &lt;/span&gt;&lt;i data-dcnode-id=&quot;2103&quot;&gt;&lt;span data-dcnode-id=&quot;2104&quot; instrument_node=&quot;&quot;&gt;online&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2102&quot; instrument_node=&quot;&quot;&gt; activity that does not translate into real world action, creates minimal real world action (Valenzuela et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2100&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR37&quot; id=&quot;ref-link-section-d14744917e346&quot; title=&quot;Valenzuela, S., Park, N., &amp;amp; Kee, K. F. (2009). Is there social capital in a social network site? Facebook use and college students’ life satisfaction, trust, and participation. Journal of Computer-Mediated Communication,
                  14(4), 875–901.&quot;&gt;&lt;span data-dcnode-id=&quot;2101&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2099&quot; instrument_node=&quot;&quot;&gt;) and may even lower real world activity (Kenski and Stroud &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2097&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR18&quot; id=&quot;ref-link-section-d14744917e350&quot; title=&quot;Kenski, K., &amp;amp; Stroud, N. Jomini. (2006). Connections between Internet use and political efficacy, knowledge, and participation. Journal of Broadcasting &amp;amp; Electronic Media,
                  50(2), 173–192.&quot;&gt;&lt;span data-dcnode-id=&quot;2098&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2096&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2069&quot;&gt;&lt;span data-dcnode-id=&quot;2094&quot; instrument_node=&quot;&quot;&gt;The content of the online experience seems to be a critical factor in how the online network affects individual behavior. Social discussion and interaction can provide information and increase political tolerance and political knowledge (Mutz &lt;/span&gt;&lt;a aria-label=&quot;Reference 2002a&quot; data-dcnode-id=&quot;2092&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR25&quot; id=&quot;ref-link-section-d14744917e356&quot; title=&quot;Mutz, D. C. (2002a). The consequences of cross-cutting networks for political participation. American Journal of Political Science,
                  46(4), 838–855.&quot;&gt;&lt;span data-dcnode-id=&quot;2093&quot; instrument_node=&quot;&quot;&gt;2002a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2091&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a aria-label=&quot;Reference b&quot; data-dcnode-id=&quot;2089&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR26&quot; id=&quot;ref-link-section-d14744917e359&quot; title=&quot;Mutz, D. C. (2002b). Cross-cutting social networks: Testing democratic theory in practice. American Political Science Review,
                  96(2), 111–126.&quot;&gt;&lt;span data-dcnode-id=&quot;2090&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2088&quot; instrument_node=&quot;&quot;&gt;; Godwin et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;2086&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR11&quot; id=&quot;ref-link-section-d14744917e362&quot; title=&quot;Godwin, R. K., Godwin, J. W., &amp;amp; Marinez-Ebers, V. (2004). Civic socialization in public and fundamentalist schools. Social Science Quarterly,
                  85(5), 1097–1111.&quot;&gt;&lt;span data-dcnode-id=&quot;2087&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2085&quot; instrument_node=&quot;&quot;&gt;; Pattie and Johnston &lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;2083&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR27&quot; id=&quot;ref-link-section-d14744917e365&quot; title=&quot;Pattie, C. J., &amp;amp; Johnston, R. J. (2008). It’s good to talk: Talk, disagreement and tolerance. British Journal of Political Science,
                  38, 677–698.&quot;&gt;&lt;span data-dcnode-id=&quot;2084&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2082&quot; instrument_node=&quot;&quot;&gt;; Harell &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2080&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d14744917e368&quot; title=&quot;Harell, A. (2010). Political tolerance, racist speech, and the influence of social networks. Social Science Quarterly,
                  91(3), 724–740.&quot;&gt;&lt;span data-dcnode-id=&quot;2081&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2079&quot; instrument_node=&quot;&quot;&gt;); however, discussion networks can often become one-sided which leads to less tolerance (Wojcieszak and Mutz &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2077&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR39&quot; id=&quot;ref-link-section-d14744917e372&quot; title=&quot;Wojcieszak, M. E., &amp;amp; Mutz, D. C. (2009). Online groups and political discourse: Do online discussion spaces facilitate exposure to political disagreement? Journal of Communication,
                  59(1), 40–56.&quot;&gt;&lt;span data-dcnode-id=&quot;2078&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2076&quot; instrument_node=&quot;&quot;&gt;). Individuals may even have a tendency to organize their discussion networks to avoid this dissent (Kalish and Robins &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2074&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR17&quot; id=&quot;ref-link-section-d14744917e375&quot; title=&quot;Kalish, Y., &amp;amp; Robins, G. (2006). Psychological predispositions and network structure: The relationship between individual predispositions, structural holes and network closure. Social Networks,
                  28, 56–84.&quot;&gt;&lt;span data-dcnode-id=&quot;2075&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2073&quot; instrument_node=&quot;&quot;&gt;), and individual personality differences can alter the impact of social networks (Hibbing et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2071&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR14&quot; id=&quot;ref-link-section-d14744917e378&quot; title=&quot;Hibbing, M. V., Ritchie, M., &amp;amp; Anderson, M. R. (2011). Personality and political discussion. Political Behavior,
                  33, 601–624.&quot;&gt;&lt;span data-dcnode-id=&quot;2072&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2070&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2049&quot;&gt;&lt;span data-dcnode-id=&quot;2068&quot; instrument_node=&quot;&quot;&gt;This is problematic because the social networks that individuals form online are often politically homogenous (Gaines and Mondak &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2066&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR9&quot; id=&quot;ref-link-section-d14744917e384&quot; title=&quot;Gaines, B. J., &amp;amp; Mondak, J. J. (2009). Typing together? Clustering of ideological types in online social networks. Journal of Information Technology &amp;amp; Politics,
                  6, 216–231.&quot;&gt;&lt;span data-dcnode-id=&quot;2067&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2065&quot; instrument_node=&quot;&quot;&gt;), which may limit the effect of the network on tolerance and engagement. Sunstein (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2008a&quot; data-dcnode-id=&quot;2063&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR35&quot; id=&quot;ref-link-section-d14744917e387&quot; title=&quot;Sunstein, C. (2008a). Democracy and the Internet. In Jeroen. van der Hoeven &amp;amp; John. Weckert (Eds.), Information technology and moral philosophy. Cambridge: Cambridge University Press.&quot;&gt;&lt;span data-dcnode-id=&quot;2064&quot; instrument_node=&quot;&quot;&gt;2008a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2062&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a aria-label=&quot;Reference b&quot; data-dcnode-id=&quot;2060&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR36&quot; id=&quot;ref-link-section-d14744917e390&quot; title=&quot;Sunstein, C. (2008b). Neither Hayak nor Habermas. Public Choice,
                  134, 87–95.&quot;&gt;&lt;span data-dcnode-id=&quot;2061&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2059&quot; instrument_node=&quot;&quot;&gt;) has frequently argued that the Internet creates polarization because individuals select into information environments in which their views are never challenged and are frequently reinforced. This selection effect then leads to contentious and unproductive discussion on explicitly political websites (Wojcieszak and Mutz &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2057&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR39&quot; id=&quot;ref-link-section-d14744917e393&quot; title=&quot;Wojcieszak, M. E., &amp;amp; Mutz, D. C. (2009). Online groups and political discourse: Do online discussion spaces facilitate exposure to political disagreement? Journal of Communication,
                  59(1), 40–56.&quot;&gt;&lt;span data-dcnode-id=&quot;2058&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2056&quot; instrument_node=&quot;&quot;&gt;). The learned social norm in the online political world may be highly negative, fractured and discouraging for the individual, leading to lower levels of engagement and increased political polarization (Jennings and Zeitner &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2054&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR16&quot; id=&quot;ref-link-section-d14744917e396&quot; title=&quot;Jennings, M. K., &amp;amp; Zeitner, V. (2003). Internet use and civic engagement: A longitudinal analysis. Public Opinion Quarterly,
                  67, 311–334.&quot;&gt;&lt;span data-dcnode-id=&quot;2055&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2053&quot; instrument_node=&quot;&quot;&gt;; Lee &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2051&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR20&quot; id=&quot;ref-link-section-d14744917e400&quot; title=&quot;Lee, K. M. (2006). Effects of Internet use on college students’ political efficacy. CyberPsychology &amp;amp; Behavior,
                  9(4), 415–422.&quot;&gt;&lt;span data-dcnode-id=&quot;2052&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2050&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;1975&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;585&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;585&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;585&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;585&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Social Media and Self-Publicity&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;1976&quot; id=&quot;Sec2-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2044&quot; id=&quot;Sec2&quot;&gt;&lt;span data-dcnode-id=&quot;2045&quot; instrument_node=&quot;&quot;&gt;Social Media and Self-Publicity&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;1977&quot; id=&quot;Sec2-content&quot;&gt;&lt;p data-dcnode-id=&quot;2039&quot;&gt;&lt;span data-dcnode-id=&quot;2043&quot; instrument_node=&quot;&quot;&gt;The research on social networks and social media sites as a facilitator of those networks and discussions is critically important; however, of equal importance is the way that social media, simply by its very nature, is changing social norms and having a direct impact on individual beliefs about democratic values. Young adults and adolescents live in a world in which the Internet has always existed, and social media sites have been a part of their intellectual and social development. Therefore, they have come of age at a time when social interaction requires sharing a great deal of their thoughts and life experiences online. Rather than being a factor that is exogenous to political development, social media may play an essential role in creating those predispositions as an environmental factor on par with socio-economic status or familial factors that shape political development, particularly when it comes to norms about the private and public sphere. Boyd and Marwick (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2041&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR2&quot; id=&quot;ref-link-section-d14744917e412&quot; title=&quot;Boyd, D., &amp;amp; Marwick, A. E. (2011). Social privacy in networked publics: Teens’ attitudes, practices and strategies. From A decade in Internet time: Symposium on the dynamics of the Internet and society. Retrieved SSRN from 
                    http://ssrn.com/abstract=1925128
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2042&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2040&quot; instrument_node=&quot;&quot;&gt;) explain, “As social constructs, privacy and publicity are affected by what is structurally feasible and socially appropriate. In recent history, privacy was often taken for granted because structural conditions made it easier to not share than to share. Social media has changed this equation” (10). Though social media sites differ in features and capabilities, they all have one thing in common: they encourage people to publicize their lives. This crucial component is probably one of the single most important developments since the Internet itself was created. It has become commonplace to share details of one’s life online in a way that would not have been possible a decade ago. To put it in political terms, we increasingly value our right to freedom of expression. At the same time, of course, the more you share of yourself with the world, the less important the private sphere becomes. If social media has an effect on beliefs about civil liberties then two hypotheses emerge:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2027&quot;&gt;&lt;span data-dcnode-id=&quot;2037&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;2035&quot;&gt;&lt;span data-dcnode-id=&quot;2036&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2034&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2029&quot;&gt;&lt;span data-dcnode-id=&quot;2033&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;2031&quot;&gt;&lt;span data-dcnode-id=&quot;2032&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2028&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2026&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2024&quot;&gt;&lt;span data-dcnode-id=&quot;2025&quot; instrument_node=&quot;&quot;&gt;As social media use increases, a social norm that encourages self-publicizing lowers the barrier between public and private sphere. Therefore, the more an individual publicizes online, the less he or she will value privacy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2012&quot;&gt;&lt;span data-dcnode-id=&quot;2022&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;2020&quot;&gt;&lt;span data-dcnode-id=&quot;2021&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2019&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;sub data-dcnode-id=&quot;2014&quot;&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;2016&quot;&gt;&lt;span data-dcnode-id=&quot;2017&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;2015&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;2013&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2011&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2009&quot;&gt;&lt;span data-dcnode-id=&quot;2010&quot; instrument_node=&quot;&quot;&gt;Social media encourages individuals to share thoughts and state of mind, highlighting the value of personal expression. The more an individual publicizes online, the more he or she will value freedom of expression.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2008&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1994&quot;&gt;&lt;span data-dcnode-id=&quot;2007&quot; instrument_node=&quot;&quot;&gt;Ethnographic research has found preliminary evidence supporting these hypotheses among adolescents. In interviews with high school students, some researchers have found important distinctions between types of privacy and the importance that students attach to privacy (Raynes-Goldie &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2005&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR31&quot; id=&quot;ref-link-section-d14744917e452&quot; title=&quot;Raynes-Goldie, K. (2010). Aliases, creeping and wall cleaning: Understanding privacy in the age of Facebook. First Monday,
                  15(1-4).&quot;&gt;&lt;span data-dcnode-id=&quot;2006&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2004&quot; instrument_node=&quot;&quot;&gt;; Boyd and Marwick &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2002&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR2&quot; id=&quot;ref-link-section-d14744917e455&quot; title=&quot;Boyd, D., &amp;amp; Marwick, A. E. (2011). Social privacy in networked publics: Teens’ attitudes, practices and strategies. From A decade in Internet time: Symposium on the dynamics of the Internet and society. Retrieved SSRN from 
                    http://ssrn.com/abstract=1925128
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2003&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2001&quot; instrument_node=&quot;&quot;&gt;). These researchers distinguish between “social privacy” and “institutional privacy.” Social privacy refers to keeping things private within one’s social sphere. Both Raynes-Goldie (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;1999&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR31&quot; id=&quot;ref-link-section-d14744917e458&quot; title=&quot;Raynes-Goldie, K. (2010). Aliases, creeping and wall cleaning: Understanding privacy in the age of Facebook. First Monday,
                  15(1-4).&quot;&gt;&lt;span data-dcnode-id=&quot;2000&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1998&quot; instrument_node=&quot;&quot;&gt;), and Boyd and Marwick (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;1996&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR2&quot; id=&quot;ref-link-section-d14744917e461&quot; title=&quot;Boyd, D., &amp;amp; Marwick, A. E. (2011). Social privacy in networked publics: Teens’ attitudes, practices and strategies. From A decade in Internet time: Symposium on the dynamics of the Internet and society. Retrieved SSRN from 
                    http://ssrn.com/abstract=1925128
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;1997&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1995&quot; instrument_node=&quot;&quot;&gt;) found that the adolescents they interviewed were concerned with social privacy. Adolescents were motivated (and engaged in a number of strategic behaviors) to keep their parents and teachers from spying on them online and watching their Facebook activity.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1983&quot;&gt;&lt;span data-dcnode-id=&quot;1993&quot; instrument_node=&quot;&quot;&gt;On the other hand, these students showed little awareness of, or concern about, institutional privacy. Institutional privacy refers to keeping one’s information away from governments and corporations.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1988&quot;&gt;&lt;a data-dcnode-id=&quot;1989&quot; href=&quot;#Fn1&quot;&gt;&lt;span class=&quot;u-visually-hidden&quot; data-dcnode-id=&quot;1991&quot;&gt;&lt;span data-dcnode-id=&quot;1992&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1990&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1987&quot; instrument_node=&quot;&quot;&gt; This crucial disconnect between types of privacy illustrates how a social norm can have a deleterious impact on respect for rights. Adolescents in the Boyd and Marwick study, for example, frequently expressed a wish for social privacy, but rarely asserted it as a fundamental right or altered their activity in a way that would guarantee privacy. Debatin et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;1985&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d14744917e473&quot; title=&quot;Debatin, B., Lovejoy, J. P., Horn, A., &amp;amp; Hughes, B. N. (2009). Facebook and online privacy: Attitudes, behaviors, and unintended consequences. Journal of Computer-Mediated Communication,
                  15(1), 83–108.&quot;&gt;&lt;span data-dcnode-id=&quot;1986&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1984&quot; instrument_node=&quot;&quot;&gt;) found that Facebook use had become so routine that users largely ignored the associated threats to privacy. Even when they were made aware of the risks, most felt that the social gain outweighed any chance of a privacy violation. Once the technology of social media enabled self-publicizing behavior that behavior became the norm, and individuals were reluctant to stop using it even if they were informed about threats to their privacy.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1978&quot;&gt;&lt;span data-dcnode-id=&quot;1982&quot; instrument_node=&quot;&quot;&gt;In an environment where sharing one’s life and personal information is routinized and expected, a cultural norm may develop that systematically changes what rights we believe are important. Even if an individual might be inclined to protect his or her privacy or even reluctant to share information online the social cost of doing so is high enough to override those individual instincts (Debatin et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;1980&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d14744917e479&quot; title=&quot;Debatin, B., Lovejoy, J. P., Horn, A., &amp;amp; Hughes, B. N. (2009). Facebook and online privacy: Attitudes, behaviors, and unintended consequences. Journal of Computer-Mediated Communication,
                  15(1), 83–108.&quot;&gt;&lt;span data-dcnode-id=&quot;1981&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1979&quot; instrument_node=&quot;&quot;&gt;). If experience is a teacher, then the current American technological experience teaches us that privacy has little value, but our right to express ourselves is critical to individual fulfillment.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;1907&quot; data-title=&quot;Design and Method&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;1908&quot; id=&quot;Sec3-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;1973&quot; id=&quot;Sec3&quot;&gt;&lt;span data-dcnode-id=&quot;1974&quot; instrument_node=&quot;&quot;&gt;Design and Method&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;1909&quot; id=&quot;Sec3-content&quot;&gt;&lt;p data-dcnode-id=&quot;1956&quot;&gt;&lt;span data-dcnode-id=&quot;1972&quot; instrument_node=&quot;&quot;&gt;In order to investigate the connection between online behavior and political attitudes, I conducted a cross-sectional survey on support for civil liberties, general political attitudes, and social media use in August 2010. Using the Qualtrics, Inc. respondent panel,&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1967&quot;&gt;&lt;a data-dcnode-id=&quot;1968&quot; href=&quot;#Fn2&quot;&gt;&lt;span class=&quot;u-visually-hidden&quot; data-dcnode-id=&quot;1970&quot;&gt;&lt;span data-dcnode-id=&quot;1971&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1969&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1966&quot; instrument_node=&quot;&quot;&gt; I surveyed 913 US adults and asked a series of questions that pitted concerns for individual rights against concerns about security.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1961&quot;&gt;&lt;a data-dcnode-id=&quot;1962&quot; href=&quot;#Fn3&quot;&gt;&lt;span class=&quot;u-visually-hidden&quot; data-dcnode-id=&quot;1964&quot;&gt;&lt;span data-dcnode-id=&quot;1965&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1963&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1960&quot; instrument_node=&quot;&quot;&gt; One of the concerns with ethnographic studies like the one conducted by Boyd and Marwick is that it did not delve much into institutional privacy, nor put the discussion to subjects explicitly in terms of rights and tradeoffs. Earlier research in American politics has often found a gap between broad support for individual rights in vague terms, and actual support for these principles when specific trade-offs are involved, especially those involving personal safety (see, among others, Davis and Silver &lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;1958&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR3&quot; id=&quot;ref-link-section-d14744917e504&quot; title=&quot;Davis, D. W., &amp;amp; Silver, B. D. (2004). Civil liberties vs. security: Public opinion in the context of the terrorist attacks on America. American Journal of Political Science,
                  48(1), 28–46.&quot;&gt;&lt;span data-dcnode-id=&quot;1959&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1957&quot; instrument_node=&quot;&quot;&gt;). Broadly speaking, Americans always support ideas like individual liberty or privacy (Marcus et. al. 1995), but this support has little meaning unless it is brought into a specific context where rights are put into competition with one another.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1954&quot;&gt;&lt;span data-dcnode-id=&quot;1955&quot; instrument_node=&quot;&quot;&gt;In order to see measure support for civil liberties I used items designed to test individuals’ support for values like privacy and freedom of expression against concerns about safety and security. Respondents were shown two statements that reflected these concerns and asked which statement they agreed with more. For example, respondents were asked if they agreed more with the statement, “Government should be allowed to record telephone calls and monitor email in order to prevent people from planning terrorist or criminal acts,” or, “People’s conversations and email are private and should be protected by the Constitution.” Nine statement pairs were presented in random order, with three items dealing with privacy, two dealing with freedom of expression, and four items focused on due process rights.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1946&quot;&gt;&lt;span data-dcnode-id=&quot;1953&quot; instrument_node=&quot;&quot;&gt;After the survey I separated out these three categories and combined items to make separate scales for support for privacy, free expression, and due process.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1948&quot;&gt;&lt;a data-dcnode-id=&quot;1949&quot; href=&quot;#Fn4&quot;&gt;&lt;span class=&quot;u-visually-hidden&quot; data-dcnode-id=&quot;1951&quot;&gt;&lt;span data-dcnode-id=&quot;1952&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1950&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1947&quot; instrument_node=&quot;&quot;&gt; It was necessary to separate these items because self-publicizing over the Internet should have different effects for each of these categories. Obviously, combining support for privacy, support for free speech, and support for due process into one measure would be problematic because of the different ways that self-publicizing affects each of these areas. Self-publicizing should decrease support for privacy, because it encourages individuals to share more of themselves and reduces the importance of privacy. It should increase support for free expression, and it should have little effect on support for due process. This last category is particularly important. Due process measures were included in the survey to demonstrate that the effect of self-publicizing is not merely a spurious artifact, nor does it necessarily increase (or decrease) support for civil liberties in general. Instead, the effects of self-publicizing should only be seen on those democratic values that are directly related to the act of self-publicizing.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1944&quot;&gt;&lt;span data-dcnode-id=&quot;1945&quot; instrument_node=&quot;&quot;&gt;The respondents themselves are a pre-selected group of adults chosen by Qualtrics, Inc. and invited to participate in survey research in exchange for gift certificates and coupons. They access the survey through the Qualtrics website and can complete surveys at their convenience. Though the panel is designed to reflect the demographics of the country as a whole, it is obviously not a randomly selected sample, which limits the generalizability of these findings. In this case, individuals who participate in online survey panels must, by definition, have regular access to and familiarity with the Internet—and have them at a higher rate than the general population. For example, 29&amp;nbsp;% of the respondents in this survey claimed to have a personal blog and 88&amp;nbsp;% said they had a Facebook account. This discrepancy, while notable, does not necessarily diminish the findings in this study. In fact, in some ways the bias in the sample is somewhat helpful. An analysis of the general population would have to account for socio-economic or other individual differences that might limit access to online outlets. At a bare minimum, all of the users in the sample have enough sophistication and familiarity with Internet use to sign up to be regular survey panelists with an Internet survey company. By looking only at individuals with regular Internet access, I can eliminate that selection factor as a potential determinant of political attitudes. Given the increasingly large number of Americans who go online, it makes sense to focus on Internet users, especially as Internet use among younger Americans increases.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1942&quot;&gt;&lt;span data-dcnode-id=&quot;1943&quot; instrument_node=&quot;&quot;&gt;The key question in this study is not whether individuals have access to self-publicizing sites, but how often they take advantage of these sites. In order to capture online activity, respondents were asked if they had a Facebook or Twitter account or a personal blog, and they were also asked how often they engaged in activity on these sites. Respondents reported how often they tweeted, blogged, posted status updates, posted photos, commented on others’ posts, how much time overall they spent self-publicizing online, and how important this activity was in their daily life. Not surprisingly, responses to these seven items were highly correlated with one another. A principal components analysis revealed a single-factor solution with strong loads for all seven items (Eigenvalue&amp;nbsp;=&amp;nbsp;3.74). After scaling all 7 variables on a common metric, I combined them into one overall measure of online publicizing (Cronbach’s alpha&amp;nbsp;=&amp;nbsp;0.87). This scale of self-publicizing runs from 0 (representing no activity in any social media platform) to 1 (representing regular, high levels of self-publicizing activities across multiple platforms).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1910&quot;&gt;&lt;span data-dcnode-id=&quot;1941&quot; instrument_node=&quot;&quot;&gt;I estimated a series of ordered logit models using support for each value (privacy, free expression, and due process) as the dependent variables. The main independent variable of interest is the self-publicizing measure, but the model also controls for individual level factors that could affect attitudes on civil liberties. Previous research indicates that individual personality traits, measured through either the Big 5 (Gerber et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;1939&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR10&quot; id=&quot;ref-link-section-d14744917e525&quot; title=&quot;Gerber, A. S., Huber, G., Doherty, D., Dowling, C. M., &amp;amp; Ha, S. E. (2010). Personality and political attitudes: Relationships across issue domains and political contexts. American Political Science Review,
                  104(1), 111–133.&quot;&gt;&lt;span data-dcnode-id=&quot;1940&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1938&quot; instrument_node=&quot;&quot;&gt;), or through the lens of authoritarian personality (Feldman &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;1936&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR7&quot; id=&quot;ref-link-section-d14744917e528&quot; title=&quot;Feldman, S. (2003). Enforcing social conformity: A theory of authoritarianism. Political Psychology,
                  24(1), 41–74.&quot;&gt;&lt;span data-dcnode-id=&quot;1937&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1935&quot; instrument_node=&quot;&quot;&gt;), often alter individual willingness tolerate dissenting opinion or allow disliked groups to have full citizenship rights, and individual political ideology may also limit support for civil liberties (Lindner and Nosek &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;1933&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR21&quot; id=&quot;ref-link-section-d14744917e531&quot; title=&quot;Lindner, N. M., &amp;amp; Nosek, B. (2009). Alienable speech: Ideological variations in the application of free speech principles. Political Psychology,
                  30(1), 67–92.&quot;&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1932&quot; instrument_node=&quot;&quot;&gt;). Therefore, the survey measured political ideology (measured on a 5 point scale from 1-Extremely liberal to 5-Extremely conservative), partisanship (a 7 point scale from 1-Strong Democrat to 7-Strong Republican), and contained a Five Factor personality battery designed to measure agreeableness, conscientiousness, neuroticism, extroversion, and openness to experience.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1927&quot;&gt;&lt;a data-dcnode-id=&quot;1928&quot; href=&quot;#Fn5&quot;&gt;&lt;span class=&quot;u-visually-hidden&quot; data-dcnode-id=&quot;1930&quot;&gt;&lt;span data-dcnode-id=&quot;1931&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1929&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1926&quot; instrument_node=&quot;&quot;&gt; The sample did tilt toward the Left politically. While almost 40&amp;nbsp;% of respondents identified as Democrats, only 22&amp;nbsp;% identified as Republican, and there was a similar liberal slant on the ideological scale. Finally, respondents were asked how worried or threatened they felt about the possibility of future terrorist attacks. A wide body of literature has demonstrated that Americans’ attitudes toward civil liberties can change dramatically in response to physical threats (Sniderman et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 1996&quot; data-dcnode-id=&quot;1924&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR34&quot; id=&quot;ref-link-section-d14744917e543&quot; title=&quot;Sniderman, P. M., Fletcher, J. F., Russell, P. H., &amp;amp; Tetlock, P. E. (1996). The clash of rights: Liberty, equality, and legitimacy in pluralist democracy. New Haven: Yale University Press.&quot;&gt;&lt;span data-dcnode-id=&quot;1925&quot; instrument_node=&quot;&quot;&gt;1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1923&quot; instrument_node=&quot;&quot;&gt;; Marcus et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 1995&quot; data-dcnode-id=&quot;1921&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR23&quot; id=&quot;ref-link-section-d14744917e547&quot; title=&quot;Marcus, G. E., Sullivan, J. L., Theiss-Morse, E., &amp;amp; Wood, S. L. (1995). With malice toward some: How people make civil liberties judgments. Cambridge: Cambridge University Press.&quot;&gt;&lt;span data-dcnode-id=&quot;1922&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1920&quot; instrument_node=&quot;&quot;&gt;; Peffley et al.  &lt;/span&gt;&lt;a aria-label=&quot;Reference 2001&quot; data-dcnode-id=&quot;1918&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR28&quot; id=&quot;ref-link-section-d14744917e550&quot; title=&quot;Peffley, M., Knigge, P., &amp;amp; Hurowitz, J. (2001). A multiple values model of political tolerance. Political Research Quarterly,
                  54(2), 379–406.&quot;&gt;&lt;span data-dcnode-id=&quot;1919&quot; instrument_node=&quot;&quot;&gt;2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;; Davis and Silver &lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;1915&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR3&quot; id=&quot;ref-link-section-d14744917e553&quot; title=&quot;Davis, D. W., &amp;amp; Silver, B. D. (2004). Civil liberties vs. security: Public opinion in the context of the terrorist attacks on America. American Journal of Political Science,
                  48(1), 28–46.&quot;&gt;&lt;span data-dcnode-id=&quot;1916&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;; Huddy et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2005&quot; data-dcnode-id=&quot;1912&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR15&quot; id=&quot;ref-link-section-d14744917e556&quot; title=&quot;Huddy, L., Feldman, S., Taber, C., &amp;amp; Lahav, G. (2005). Threat, anxiety, and support of antiterrorism policies. American Journal of Political Science,
                  49(3), 593–608.&quot;&gt;&lt;span data-dcnode-id=&quot;1913&quot; instrument_node=&quot;&quot;&gt;2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1911&quot; instrument_node=&quot;&quot;&gt;), so it was necessary to determine how threatened respondents felt at the time of the survey.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;1758&quot; data-title=&quot;Results&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;1759&quot; id=&quot;Sec4-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;1905&quot; id=&quot;Sec4&quot;&gt;&lt;span data-dcnode-id=&quot;1906&quot; instrument_node=&quot;&quot;&gt;Results&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;1760&quot; id=&quot;Sec4-content&quot;&gt;&lt;p data-dcnode-id=&quot;1882&quot;&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1902&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;1903&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1901&quot; instrument_node=&quot;&quot;&gt; shows strong support for &lt;/span&gt;&lt;b data-dcnode-id=&quot;1899&quot;&gt;&lt;span data-dcnode-id=&quot;1900&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1898&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1893&quot;&gt;&lt;span data-dcnode-id=&quot;1897&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;1895&quot;&gt;&lt;span data-dcnode-id=&quot;1896&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1894&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1892&quot; instrument_node=&quot;&quot;&gt;. Analysis of the data reveals that involvement with social media had a significant effect on respondents’ support for civil liberties, though this effect is especially pronounced among younger respondents. The first column of Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1890&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;1891&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1889&quot; instrument_node=&quot;&quot;&gt; shows the result of an ordered logit model using the whole sample. Among all respondents, online socialization has a negative effect on support for the right to privacy; however, that result seems to be driven by respondents aged 25 and under. When support for privacy is modeled separately for younger respondents and the rest of the sample, the effect of online socialization is still significant only for the younger population. Though the effect of socialization for the rest of the adults is still negative it is no longer statistically significant.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1884&quot;&gt;&lt;a data-dcnode-id=&quot;1885&quot; href=&quot;#Fn6&quot;&gt;&lt;span class=&quot;u-visually-hidden&quot; data-dcnode-id=&quot;1887&quot;&gt;&lt;span data-dcnode-id=&quot;1888&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1886&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1883&quot; instrument_node=&quot;&quot;&gt; These results would seem to indicate that online socialization has an effect when it plays a role in the maturation and development process of the individual.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-table&quot; data-container-section=&quot;table&quot; data-dcnode-id=&quot;1867&quot; data-test=&quot;inline-table&quot; id=&quot;table-1&quot;&gt;&lt;figure data-dcnode-id=&quot;1868&quot;&gt;&lt;figcaption class=&quot;c-article-table__figcaption&quot; data-dcnode-id=&quot;1879&quot;&gt;&lt;b data-dcnode-id=&quot;1880&quot; data-test=&quot;table-caption&quot; id=&quot;Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;1881&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;1 Effect of self-publicizing on support for privacy rights&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;1869&quot;&gt;&lt;a aria-label=&quot;Full size table 1&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;1870&quot; data-test=&quot;table-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view table&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11109-012-9208-y/tables/1&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;1877&quot;&gt;&lt;span data-dcnode-id=&quot;1878&quot; instrument_node=&quot;&quot;&gt;Full size table&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;1871&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;1872&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;1873&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;1876&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;1875&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;1874&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1864&quot;&gt;&lt;span data-dcnode-id=&quot;1865&quot; instrument_node=&quot;&quot;&gt;It seems as though younger Americans were more likely to internalize the social norms associated with social media because they grew up at a time when social media use was rampant and integrated into their daily lives. Respondents who were 25 at the time of the survey would have been just reaching adulthood at the same time that social media sites like MySpace and Facebook were becoming popular. Therefore, they may be the first generation of American voters to have a significant relationship between social media and support for basic democratic values. Older Americans seem to have been less likely to have their attitudes affected by self-publicizing. It may be that older Americans are more likely to see self-publicizing as an extraneous activity, rather than a societal norm and would then be less likely to incorporate the values associated with online self-publicizing with their political values.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1850&quot;&gt;&lt;span data-dcnode-id=&quot;1863&quot; instrument_node=&quot;&quot;&gt;Of course, there are alternate explanations for the results in Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1861&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;1862&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1860&quot; instrument_node=&quot;&quot;&gt;. Because of the cross-sectional nature of the data the relationship between self-publicizing and support for privacy may simply be a correlation rather than a causal relationship. One could argue that people who self-publicize online, for whatever reason, are less inclined to support privacy and that their behavior may be driven by an unobserved third variable. This cannot be ruled out; howev
