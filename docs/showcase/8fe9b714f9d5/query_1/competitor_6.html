er, there is reason to think that self-publicizing is having a causal effect. If online self-publicizing is just an endogenous variable then its effects should be consistent across the entire sample. If there is some unobserved third variable that drives online behavior and opinions then the observed relationship between self-publicizing and privacy seen in Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1858&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;1859&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1857&quot; instrument_node=&quot;&quot;&gt; should be the same for 18-25&amp;nbsp;year olds as it is for older adults. Within the sample online behavior for 18-25&amp;nbsp;year olds is not significantly different from that of older adults. Online self-publicizing and socialization only falls off significantly among adults over 50 within the sample.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1852&quot;&gt;&lt;a data-dcnode-id=&quot;1853&quot; href=&quot;#Fn7&quot;&gt;&lt;span class=&quot;u-visually-hidden&quot; data-dcnode-id=&quot;1855&quot;&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1851&quot; instrument_node=&quot;&quot;&gt; The difference in results between younger adults and the rest of the sample cannot be explained by differences in online self-publicizing.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1833&quot;&gt;&lt;span data-dcnode-id=&quot;1849&quot; instrument_node=&quot;&quot;&gt;The relationship between self-publicizing and civil liberties judgments can also be seen in Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1847&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab2&quot;&gt;&lt;span data-dcnode-id=&quot;1848&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1846&quot; instrument_node=&quot;&quot;&gt;, which measures the relationship between self-publicizing and support for freedom of expression. As in Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1844&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;1845&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1843&quot; instrument_node=&quot;&quot;&gt;, the youngest cohort seems to be the one most affected by Internet habits. &lt;/span&gt;&lt;b data-dcnode-id=&quot;1841&quot;&gt;&lt;span data-dcnode-id=&quot;1842&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;sub data-dcnode-id=&quot;1835&quot;&gt;&lt;span data-dcnode-id=&quot;1839&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;1837&quot;&gt;&lt;span data-dcnode-id=&quot;1838&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1836&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;1834&quot; instrument_node=&quot;&quot;&gt; receives strong support among the youngest cohort. There is a significant, positive relationship between self-publicizing and support for freedom of expression. Personality factors also seem to play a key role in support for freedom of expression, but it is only among respondents under 25 that we see a statistically significant effect from Internet usage.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-table&quot; data-container-section=&quot;table&quot; data-dcnode-id=&quot;1818&quot; data-test=&quot;inline-table&quot; id=&quot;table-2&quot;&gt;&lt;figure data-dcnode-id=&quot;1819&quot;&gt;&lt;figcaption class=&quot;c-article-table__figcaption&quot; data-dcnode-id=&quot;1830&quot;&gt;&lt;b data-dcnode-id=&quot;1831&quot; data-test=&quot;table-caption&quot; id=&quot;Tab2&quot;&gt;&lt;span data-dcnode-id=&quot;1832&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;2 Effect of self-publicizing on support for free speech&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;1820&quot;&gt;&lt;a aria-label=&quot;Full size table 2&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;1821&quot; data-test=&quot;table-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view table&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11109-012-9208-y/tables/2&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;1828&quot;&gt;&lt;span data-dcnode-id=&quot;1829&quot; instrument_node=&quot;&quot;&gt;Full size table&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;1822&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;1823&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;1824&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;1827&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1817&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1800&quot;&gt;&lt;span data-dcnode-id=&quot;1816&quot; instrument_node=&quot;&quot;&gt;The results from Tables&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1814&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;1815&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1813&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1811&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab2&quot;&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1810&quot; instrument_node=&quot;&quot;&gt; strongly indicate that self-publicizing plays an important role in individual political development, but has little effect on those who came of age without social media. The finding that self-publicizing is significantly correlated with support for speech and privacy among young people is robust across a number of model specifications, but this effect disappears among older adults. Again, the absence of results among older adults suggests that significant effects among younger adults are not merely endogenous artifacts. If it were merely an artifact, then the significant effect of online self-publicizing should be consistent across groups. That it is not suggests that online self-publicizing plays a significant role in intellectual development. The results in Tables&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1808&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab1&quot;&gt;&lt;span data-dcnode-id=&quot;1809&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1807&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1805&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab2&quot;&gt;&lt;span data-dcnode-id=&quot;1806&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1804&quot; instrument_node=&quot;&quot;&gt; are consistent with the idea that early socialization plays a major role in determining individual political values and attitudes. Now, however, much of that socialization is happening online rather than in the real world. As young people publish their activities and information about themselves online, it seems they come to learn that freedom of expression is a critical democratic value. They express themselves frequently, so they feel that the freedom to express one’s views is critically important. On the other hand, because they keep nothing private, the right to withhold information or establish a private sphere seems to be less important. It is possible that, over time, this learning process would also affect older adults. They may be somewhat immune, though, because they developed their views in a world without sites like Facebook, and for them these outlets are mild diversions rather than a critical part of their socialization. For younger Americans, self-publicizing is a critical part of maintaining their relationships both online and off-line (Pempek et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;1802&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR29&quot; id=&quot;ref-link-section-d14744917e1692&quot; title=&quot;Pempek, T. A., Yermolayeva, Y. A., &amp;amp; Calvert, S. L. (2008). College students social networking experiences on Facebook. Journal of Applied Developmental Psychology,
                  30, 227–238.&quot;&gt;&lt;span data-dcnode-id=&quot;1803&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1801&quot; instrument_node=&quot;&quot;&gt;), so they may integrate these experiences more thoroughly into their understanding of the political world.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1777&quot;&gt;&lt;span data-dcnode-id=&quot;1799&quot; instrument_node=&quot;&quot;&gt;The lack of significant results from Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1797&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab3&quot;&gt;&lt;span data-dcnode-id=&quot;1798&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1796&quot; instrument_node=&quot;&quot;&gt; lends further credence to the idea that self-publicizing encourages development of certain values but not others. There is no obvious reason to expect a relationship between online self-publicizing and respect for due process of law. Unlike the right to privacy or free expression, the act of self-publicizing would seem to teach little about due process. As Table&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1794&quot; data-track=&quot;click&quot; data-track-action=&quot;table anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Tab3&quot;&gt;&lt;span data-dcnode-id=&quot;1795&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1793&quot; instrument_node=&quot;&quot;&gt; shows, there is in fact little evidence of any relationship between the two, as the coefficient for self-publicizing never approaches statistical significance for any age group. Instead, fears of terrorism seem the most prominent cause of attitudes on due process vs. security, which coincides with findings from previous research on civil liberties (Sniderman et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 1996&quot; data-dcnode-id=&quot;1791&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR34&quot; id=&quot;ref-link-section-d14744917e1704&quot; title=&quot;Sniderman, P. M., Fletcher, J. F., Russell, P. H., &amp;amp; Tetlock, P. E. (1996). The clash of rights: Liberty, equality, and legitimacy in pluralist democracy. New Haven: Yale University Press.&quot;&gt;&lt;span data-dcnode-id=&quot;1792&quot; instrument_node=&quot;&quot;&gt;1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1790&quot; instrument_node=&quot;&quot;&gt;; Marcus et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 1995&quot; data-dcnode-id=&quot;1788&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR23&quot; id=&quot;ref-link-section-d14744917e1707&quot; title=&quot;Marcus, G. E., Sullivan, J. L., Theiss-Morse, E., &amp;amp; Wood, S. L. (1995). With malice toward some: How people make civil liberties judgments. Cambridge: Cambridge University Press.&quot;&gt;&lt;span data-dcnode-id=&quot;1789&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1787&quot; instrument_node=&quot;&quot;&gt;; Peffley et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2001&quot; data-dcnode-id=&quot;1785&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR28&quot; id=&quot;ref-link-section-d14744917e1710&quot; title=&quot;Peffley, M., Knigge, P., &amp;amp; Hurowitz, J. (2001). A multiple values model of political tolerance. Political Research Quarterly,
                  54(2), 379–406.&quot;&gt;&lt;span data-dcnode-id=&quot;1786&quot; instrument_node=&quot;&quot;&gt;2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1784&quot; instrument_node=&quot;&quot;&gt;; Davis and Silver &lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;1782&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR3&quot; id=&quot;ref-link-section-d14744917e1714&quot; title=&quot;Davis, D. W., &amp;amp; Silver, B. D. (2004). Civil liberties vs. security: Public opinion in the context of the terrorist attacks on America. American Journal of Political Science,
                  48(1), 28–46.&quot;&gt;&lt;span data-dcnode-id=&quot;1783&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1781&quot; instrument_node=&quot;&quot;&gt;; Huddy et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2005&quot; data-dcnode-id=&quot;1779&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR15&quot; id=&quot;ref-link-section-d14744917e1717&quot; title=&quot;Huddy, L., Feldman, S., Taber, C., &amp;amp; Lahav, G. (2005). Threat, anxiety, and support of antiterrorism policies. American Journal of Political Science,
                  49(3), 593–608.&quot;&gt;&lt;span data-dcnode-id=&quot;1780&quot; instrument_node=&quot;&quot;&gt;2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1778&quot; instrument_node=&quot;&quot;&gt;). This is the only category of democratic values where the youngest cohort seems unaffected by their level of self-publicizing, which suggests that Internet self-publicizing is not having an effect on general support for democratic values. The narrow effects seen in these tables suggests that rather than undermining support for democratic values, self-publicizing is a teaching process whose effects are targeted directly at issues related to the activity of self-publicizing.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-table&quot; data-container-section=&quot;table&quot; data-dcnode-id=&quot;1762&quot; data-test=&quot;inline-table&quot; id=&quot;table-3&quot;&gt;&lt;figure data-dcnode-id=&quot;1763&quot;&gt;&lt;figcaption class=&quot;c-article-table__figcaption&quot; data-dcnode-id=&quot;1774&quot;&gt;&lt;b data-dcnode-id=&quot;1775&quot; data-test=&quot;table-caption&quot; id=&quot;Tab3&quot;&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;3 Effect of self-publicizing on support for due process&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;1764&quot;&gt;&lt;a aria-label=&quot;Full size table 3&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;1765&quot; data-test=&quot;table-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view table&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//link.springer.com/article/10.1007/s11109-012-9208-y/tables/3&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;1772&quot;&gt;&lt;span data-dcnode-id=&quot;1773&quot; instrument_node=&quot;&quot;&gt;Full size table&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;1766&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;1767&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;1768&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;1771&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;1770&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;1769&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;1708&quot; data-title=&quot;Conclusions and Directions for Further Research&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;1709&quot; id=&quot;Sec5-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;1756&quot; id=&quot;Sec5&quot;&gt;&lt;span data-dcnode-id=&quot;1757&quot; instrument_node=&quot;&quot;&gt;Conclusions and Directions for Further Research&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;1710&quot; id=&quot;Sec5-content&quot;&gt;&lt;p data-dcnode-id=&quot;1742&quot;&gt;&lt;span data-dcnode-id=&quot;1755&quot; instrument_node=&quot;&quot;&gt;The results presented in this paper suggest an important link between online activity and attitudes toward basic democratic values. Among the youngest cohort of adults, online self-publicizing activity seems to teach Americans to support values like freedom of expression, while lowering support for the right to privacy. Just as real-world social networks can impart norms and values (Mutz &lt;/span&gt;&lt;a aria-label=&quot;Reference 2002a&quot; data-dcnode-id=&quot;1753&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR25&quot; id=&quot;ref-link-section-d14744917e2258&quot; title=&quot;Mutz, D. C. (2002a). The consequences of cross-cutting networks for political participation. American Journal of Political Science,
                  46(4), 838–855.&quot;&gt;&lt;span data-dcnode-id=&quot;1754&quot; instrument_node=&quot;&quot;&gt;2002a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1752&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a aria-label=&quot;Reference b&quot; data-dcnode-id=&quot;1750&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR26&quot; id=&quot;ref-link-section-d14744917e2261&quot; title=&quot;Mutz, D. C. (2002b). Cross-cutting social networks: Testing democratic theory in practice. American Political Science Review,
                  96(2), 111–126.&quot;&gt;&lt;span data-dcnode-id=&quot;1751&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1749&quot; instrument_node=&quot;&quot;&gt;; Godwin et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;1747&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR11&quot; id=&quot;ref-link-section-d14744917e2264&quot; title=&quot;Godwin, R. K., Godwin, J. W., &amp;amp; Marinez-Ebers, V. (2004). Civic socialization in public and fundamentalist schools. Social Science Quarterly,
                  85(5), 1097–1111.&quot;&gt;&lt;span data-dcnode-id=&quot;1748&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1746&quot; instrument_node=&quot;&quot;&gt;; Harell &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;1744&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d14744917e2267&quot; title=&quot;Harell, A. (2010). Political tolerance, racist speech, and the influence of social networks. Social Science Quarterly,
                  91(3), 724–740.&quot;&gt;&lt;span data-dcnode-id=&quot;1745&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1743&quot; instrument_node=&quot;&quot;&gt;), social networking online through social media sites can lead an individual to internalize the norms of the online social network. Because the norm on a site like Facebook is to publicize one’s private life, users on such sites become accustomed to a world where privacy is an afterthought, but expressing one’s self is all important. Self-publicizing activity seems to create citizens with different value priorities than those who matured before the Internet became such a widespread tool.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1725&quot;&gt;&lt;span data-dcnode-id=&quot;1741&quot; instrument_node=&quot;&quot;&gt;The results presented here may not be surprising given previous research on social media use and political behavior or attitudes, though that research has often focused on the content of online discussion. Positive online engagement can lead to increased political participation (Kittilson and Dalton &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;1739&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d14744917e2273&quot; title=&quot;Kittilson, M. C., &amp;amp; Dalton, R. J. (2011). Virtual civil society: The new frontier of social capital? Political Behavior,
                  33, 625–644.&quot;&gt;&lt;span data-dcnode-id=&quot;1740&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1738&quot; instrument_node=&quot;&quot;&gt;), while negative experiences can lead to increased polarization and intolerance (Sunstein &lt;/span&gt;&lt;a aria-label=&quot;Reference 2008a&quot; data-dcnode-id=&quot;1736&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR35&quot; id=&quot;ref-link-section-d14744917e2276&quot; title=&quot;Sunstein, C. (2008a). Democracy and the Internet. In Jeroen. van der Hoeven &amp;amp; John. Weckert (Eds.), Information technology and moral philosophy. Cambridge: Cambridge University Press.&quot;&gt;&lt;span data-dcnode-id=&quot;1737&quot; instrument_node=&quot;&quot;&gt;2008a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1735&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a aria-label=&quot;Reference b&quot; data-dcnode-id=&quot;1733&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR36&quot; id=&quot;ref-link-section-d14744917e2279&quot; title=&quot;Sunstein, C. (2008b). Neither Hayak nor Habermas. Public Choice,
                  134, 87–95.&quot;&gt;&lt;span data-dcnode-id=&quot;1734&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1732&quot; instrument_node=&quot;&quot;&gt;). The results here suggest that the nature of social media and the way that it encourages self-publicizing online creates changes in norms and values similar to the way that social networks or early socialization experiences can shape individual attitudes. Researchers focusing on adolescent development have started to document value shifts and changes in intellectual development related to social media use (Raynes-Goldie &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;1730&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR31&quot; id=&quot;ref-link-section-d14744917e2282&quot; title=&quot;Raynes-Goldie, K. (2010). Aliases, creeping and wall cleaning: Understanding privacy in the age of Facebook. First Monday,
                  15(1-4).&quot;&gt;&lt;span data-dcnode-id=&quot;1731&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1729&quot; instrument_node=&quot;&quot;&gt;; Boyd and Marwick &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;1727&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR2&quot; id=&quot;ref-link-section-d14744917e2285&quot; title=&quot;Boyd, D., &amp;amp; Marwick, A. E. (2011). Social privacy in networked publics: Teens’ attitudes, practices and strategies. From A decade in Internet time: Symposium on the dynamics of the Internet and society. Retrieved SSRN from 
                    http://ssrn.com/abstract=1925128
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;1728&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1726&quot; instrument_node=&quot;&quot;&gt;), and the results in this paper indicate that those norms do alter political attitudes on democratic priorities. These findings are especially relevant because the technological trend for the last 10&amp;nbsp;years has been to make social media more accessible for more people, especially adolescents.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1723&quot;&gt;&lt;span data-dcnode-id=&quot;1724&quot; instrument_node=&quot;&quot;&gt;However, while the results of this study are intriguing and suggest an important role for online socialization, the data here are hardly conclusive. The correlation between social media use and political attitudes could be caused by an omitted factor that shapes both self-publicizing activity and attitudes on civil liberties. One could easily argue that people who support free expression (and are less concerned with privacy) are also just more likely to use social media, and the social media use itself does not play a causal role. The limits of cross-sectional data make it difficult to rule out this possibility, though the fact that significant effects are found only in the youngest cohort would seem to support the idea that a developmental process is at work. If the relationship is due to a third, unmeasured factor, it is unclear why that factor would affect young Americans, but not middle-aged and older voters. The level of variation in key variables is similar across age groups, for the most part. Within this sample, the amount of variance on online self-publicizing, support for privacy, and support for due process were the same within 18-25&amp;nbsp;year-olds and older adults, though there was substantially more variance in support for free speech among the younger cohort.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1718&quot;&gt;&lt;span data-dcnode-id=&quot;1722&quot; instrument_node=&quot;&quot;&gt;Clearly, further study is needed. If social media use is really creating new social norms and encouraging a shift in support for fundamental values then we could see the beginning of major changes in the American political system. The survey results here suggest that respect for civil liberties is changing due to technological changes that thin the wall between the public and private spheres. A society that does not see privacy as a fundamental right is a society where sexual behavior, health information, and other aspects of one’s life may have to be shared with the world. Increasingly, Americans who use social media may no longer see the ability to keep their lives private as a fundamental right. As Debatin et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;1720&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d14744917e2293&quot; title=&quot;Debatin, B., Lovejoy, J. P., Horn, A., &amp;amp; Hughes, B. N. (2009). Facebook and online privacy: Attitudes, behaviors, and unintended consequences. Journal of Computer-Mediated Communication,
                  15(1), 83–108.&quot;&gt;&lt;span data-dcnode-id=&quot;1721&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1719&quot; instrument_node=&quot;&quot;&gt;) found, many social media users see the loss of privacy as the price of engaging with their social circle. Citizens may not like governments or corporations tracking their activities and gathering information on their private lives, but unless they actually view privacy as an important right there seems little chance of mobilizing citizens to stop such activities. If privacy is no longer considered a right (or at least one that does not deserve a high priority), then any number of policy changes may be possible. One need look no further than the 2012 debate on access to contraception to see the policy implications of a weakened right to privacy.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1713&quot;&gt;&lt;span data-dcnode-id=&quot;1717&quot; instrument_node=&quot;&quot;&gt;Moreover, if social media use leads to changes in basic American values, then it may also have an impact on other foundational beliefs such as community and social identity. Social media relationships can be used to maintain pre-existing real world relationships (Pempek et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;1715&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR29&quot; id=&quot;ref-link-section-d14744917e2300&quot; title=&quot;Pempek, T. A., Yermolayeva, Y. A., &amp;amp; Calvert, S. L. (2008). College students social networking experiences on Facebook. Journal of Applied Developmental Psychology,
                  30, 227–238.&quot;&gt;&lt;span data-dcnode-id=&quot;1716&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1714&quot; instrument_node=&quot;&quot;&gt;), but as time moves on those relationships may alter the way an individual responds to community and social life. For researchers interested in social capital, political participation and even spatial and identity politics, changes in technology may be especially important if social media use introduces changes in how individuals relate to one another and identify their communities. For example, if an individual thinks of herself as part of an online community will she still be willing to engage in her real-world community? Will she be active locally as well as online and develop in-person social ties, or will she be content to maintain her personal relationships online? Is there a meaningful distinction between online and off-line social capital?&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1711&quot;&gt;&lt;span data-dcnode-id=&quot;1712&quot; instrument_node=&quot;&quot;&gt;Ultimately, we still don’t know what the impact of this new form of online behavior will be on the political world. There is a dearth of dynamic survey data, particularly data that describe the youngest generation. There is an urgent need for research designs that will track the course of individual development and determine how social media use in the Information Age is affecting our fundamental attitudes. If social media engagement is going to play a central role in individual’s socialization and intellectual development then it is absolutely critical that political scientists understand the role online socialization will play in shaping the fundamental ideals of the next generation of American voters.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;1707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section data-dcnode-id=&quot;1667&quot; data-title=&quot;Notes&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;1668&quot; id=&quot;notes-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;1705&quot; id=&quot;notes&quot;&gt;&lt;span data-dcnode-id=&quot;1706&quot; instrument_node=&quot;&quot;&gt;Notes&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;1669&quot; id=&quot;notes-content&quot;&gt;&lt;ol class=&quot;c-article-footnote c-article-footnote--listed&quot; data-dcnode-id=&quot;1670&quot;&gt;&lt;li class=&quot;c-article-footnote--listed__item&quot; data-counter=&quot;1.&quot; data-dcnode-id=&quot;1701&quot; id=&quot;Fn1&quot;&gt;&lt;div class=&quot;c-article-footnote--listed__content&quot; data-dcnode-id=&quot;1702&quot;&gt;&lt;p data-dcnode-id=&quot;1703&quot;&gt;&lt;span data-dcnode-id=&quot;1704&quot; instrument_node=&quot;&quot;&gt;In other words, the institutions that political scientists are most frequently concerned with were the ones that adolescents were least likely to be concerned with.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;c-article-footnote--listed__item&quot; data-counter=&quot;2.&quot; data-dcnode-id=&quot;1697&quot; id=&quot;Fn2&quot;&gt;&lt;div class=&quot;c-article-footnote--listed__content&quot; data-dcnode-id=&quot;1698&quot;&gt;&lt;p data-dcnode-id=&quot;1699&quot;&gt;&lt;span data-dcnode-id=&quot;1700&quot; instrument_node=&quot;&quot;&gt;Respondents are a pre-selected group of adults chosen by Qualtrics, Inc. and invited to participate in survey research in exchange for gift certificates and coupons. The sample is fairly diverse ideologically, with a slight liberal lean. The sample did have a substantially larger number of female (57&amp;nbsp;%) and Asian-American (9.2&amp;nbsp;%) respondents than the general population and a lower percentage of Latino respondents (4.7&amp;nbsp;%), though it is not clear how these differences would have affected the results.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;c-article-footnote--listed__item&quot; data-counter=&quot;3.&quot; data-dcnode-id=&quot;1690&quot; id=&quot;Fn3&quot;&gt;&lt;div class=&quot;c-article-footnote--listed__content&quot; data-dcnode-id=&quot;1691&quot;&gt;&lt;p data-dcnode-id=&quot;1692&quot;&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;Scale items were drawn from Davis and Silver (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;1694&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR3&quot; id=&quot;ref-link-section-d14744917e499&quot; title=&quot;Davis, D. W., &amp;amp; Silver, B. D. (2004). Civil liberties vs. security: Public opinion in the context of the terrorist attacks on America. American Journal of Political Science,
                  48(1), 28–46.&quot;&gt;&lt;span data-dcnode-id=&quot;1695&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1693&quot; instrument_node=&quot;&quot;&gt;). The full questionnaire is available in Appendix as Supplementary Material.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;c-article-footnote--listed__item&quot; data-counter=&quot;4.&quot; data-dcnode-id=&quot;1686&quot; id=&quot;Fn4&quot;&gt;&lt;div class=&quot;c-article-footnote--listed__content&quot; data-dcnode-id=&quot;1687&quot;&gt;&lt;p data-dcnode-id=&quot;1688&quot;&gt;&lt;span data-dcnode-id=&quot;1689&quot; instrument_node=&quot;&quot;&gt;Earlier analyses also looked at each item on an individual basis rather than combining items into scales. Examining each item separately does not alter the substantive results of the analyses.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;c-article-footnote--listed__item&quot; data-counter=&quot;5.&quot; data-dcnode-id=&quot;1679&quot; id=&quot;Fn5&quot;&gt;&lt;div class=&quot;c-article-footnote--listed__content&quot; data-dcnode-id=&quot;1680&quot;&gt;&lt;p data-dcnode-id=&quot;1681&quot;&gt;&lt;span data-dcnode-id=&quot;1685&quot; instrument_node=&quot;&quot;&gt;Respondents also filled out questions to capture their beliefs about conformity, autonomy and social cohesion as in Feldman’s (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;1683&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR7&quot; id=&quot;ref-link-section-d14744917e538&quot; title=&quot;Feldman, S. (2003). Enforcing social conformity: A theory of authoritarianism. Political Psychology,
                  24(1), 41–74.&quot;&gt;&lt;span data-dcnode-id=&quot;1684&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;) work on authoritarian personalities. The results of the logit models are substantively no different when authoritarian personality measures are used in place of the Big Five personality traits.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;c-article-footnote--listed__item&quot; data-counter=&quot;6.&quot; data-dcnode-id=&quot;1675&quot; id=&quot;Fn6&quot;&gt;&lt;div class=&quot;c-article-footnote--listed__content&quot; data-dcnode-id=&quot;1676&quot;&gt;&lt;p data-dcnode-id=&quot;1677&quot;&gt;&lt;span data-dcnode-id=&quot;1678&quot; instrument_node=&quot;&quot;&gt;These results are robust across a number of different models. The age of 25 seems to be the “cut-off” point for a significant effect from social media use. Breaking down age by various categories or using an interaction term between age and social media reveals that it really is only the 18–25 group that shows a significant relationship between social media use and support for civil liberties.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;c-article-footnote--listed__item&quot; data-counter=&quot;7.&quot; data-dcnode-id=&quot;1671&quot; id=&quot;Fn7&quot;&gt;&lt;div class=&quot;c-article-footnote--listed__content&quot; data-dcnode-id=&quot;1672&quot;&gt;&lt;p data-dcnode-id=&quot;1673&quot;&gt;&lt;span data-dcnode-id=&quot;1674&quot; instrument_node=&quot;&quot;&gt;Even if respondents over 50 are excluded, there is still no statistically significant relationship between online self-publicizing and support for democratic values among adults over 25.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;div data-dcnode-id=&quot;1073&quot; id=&quot;MagazineFulltextArticleBodySuffix&quot;&gt;&lt;section aria-labelledb
