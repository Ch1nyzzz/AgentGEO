&lt;/span&gt;&lt;meta content=&quot;The thesis that ‘Asian’ cultures oppose the ‘Western’ emphasis on emancipative values and liberal democracy has mostly been criticized for its political instrumentality. By contrast, the empirical claim about most Asians’ dismissal of emancipative values and liberal democracy has not been tested on a broadly cross-cultural basis. Filling this gap, this article uses data from the World Values Surveys to put the values of Asian populations into global perspective. As a result, the differences between Asian and Western populations over emancipative values and liberal democracy appear to be gradual, not categorical. What is more, the forces of modernization that gave rise to emancipative values and a liberal notion of democracy in the ‘West’, are doing the same in the ‘East’, confirming a universal model of human development rather than Asian exceptionalism, or any other form of cultural exceptionalism.&quot; data-dcnode-id=&quot;6153&quot; name=&quot;citation_abstract&quot;&gt;&lt;span data-dcnode-id=&quot;6152&quot; instrument_node=&quot;&quot;&gt;

&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5134&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;app-link rights-link d-print-none app-link__text-icon app-link--accent&quot; data-dcnode-id=&quot;5128&quot; data-test-id=&quot;buttonRightLink&quot; data-v-0e654b59=&quot;&quot; data-v-570e66f7=&quot;&quot; data-v-92ee52a2=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DCUP%26publication%3DJJP%26title%3DThe%2520Asian%2520Values%2520Thesis%2520Revisited%3A%2520Evidence%2520from%2520the%2520World%2520Values%2520Surveys%26publicationDate%3D21%2520February%25202011%26author%3DCHRISTIAN%2520WELZEL%26copyright%3DCopyright%2520%25C2%25A9%2520Cambridge%2520University%2520Press%25202011%26contentID%3D10.1017%252FS1468109910000277%26startPage%3D1%26endPage%3D31%26orderBeanReset%3DTrue%26volumeNum%3D12%26issueNum%3D1&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon rights&quot; data-dcnode-id=&quot;5133&quot; data-v-0e654b59=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cambridge.org/core/page-component/img/rights-icon.65a913b.svg&amp;amp;raw&quot;&gt;&lt;span class=&quot;text&quot; data-dcnode-id=&quot;5131&quot; data-v-0e654b59=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5132&quot; instrument_node=&quot;&quot;&gt;Rights &amp;amp; Permissions&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;sr-only&quot; data-dcnode-id=&quot;5129&quot; data-v-0e654b59=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5130&quot; instrument_node=&quot;&quot;&gt;[Opens in a new window]&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5126&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;hr aria-hidden=&quot;true&quot; class=&quot;separator default&quot; data-dcnode-id=&quot;5125&quot; data-v-7036083a=&quot;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5123&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;scrollspy-content&quot; data-dcnode-id=&quot;2241&quot; data-spy=&quot;scroll&quot; data-target=&quot;#toc&quot; data-v-570e66f7=&quot;&quot;&gt;&lt;div class=&quot;col article-abstract sec&quot; data-dcnode-id=&quot;5103&quot; data-v-570e66f7=&quot;&quot; data-v-ec387c8a=&quot;&quot; id=&quot;sec0&quot;&gt;&lt;div class=&quot;abstract-text-container&quot; data-dcnode-id=&quot;5110&quot; data-v-ec387c8a=&quot;&quot;&gt;&lt;div data-dcnode-id=&quot;5111&quot; lang=&quot;en&quot;&gt;&lt;h2 data-dcnode-id=&quot;5121&quot;&gt;&lt;span data-dcnode-id=&quot;5122&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;5120&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5118&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;abstract-content&quot; data-dcnode-id=&quot;5114&quot;&gt;&lt;div class=&quot;abstract&quot; data-abstract-type=&quot;normal&quot; data-dcnode-id=&quot;5115&quot;&gt;&lt;p data-dcnode-id=&quot;5116&quot;&gt;&lt;span data-dcnode-id=&quot;5117&quot; instrument_node=&quot;&quot;&gt;The thesis that ‘Asian’ cultures oppose the ‘Western’ emphasis on emancipative values and liberal democracy has mostly been criticized for its political instrumentality. By contrast, the empirical claim about most Asians’ dismissal of emancipative values and liberal democracy has not been tested on a broadly cross-cultural basis. Filling this gap, this article uses data from the World Values Surveys to put the values of Asian populations into global perspective. As a result, the differences between Asian and Western populations over emancipative values and liberal democracy appear to be gradual, not categorical. What is more, the forces of modernization that gave rise to emancipative values and a liberal notion of democracy in the ‘West’, are doing the same in the ‘East’, confirming a universal model of human development rather than Asian exceptionalism, or any other form of cultural exceptionalism.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5113&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;hr aria-hidden=&quot;true&quot; class=&quot;abstract-divider separator default&quot; data-dcnode-id=&quot;5112&quot; data-v-7036083a=&quot;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5109&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5107&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5105&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5102&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5100&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5098&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;dl class=&quot;article-details&quot; data-dcnode-id=&quot;5026&quot; data-v-209c1d77=&quot;&quot; data-v-570e66f7=&quot;&quot;&gt;&lt;div class=&quot;row&quot; data-dcnode-id=&quot;5092&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;dt class=&quot;col-12 col-sm-3 col-md-2_5 title&quot; data-dcnode-id=&quot;5096&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5097&quot; instrument_node=&quot;&quot;&gt;

    &lt;/span&gt;&lt;/dt&gt;&lt;span data-dcnode-id=&quot;5095&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;dd class=&quot;col content&quot; data-dcnode-id=&quot;5093&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5094&quot; instrument_node=&quot;&quot;&gt;Research Article&lt;/span&gt;&lt;/dd&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5091&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;row&quot; data-dcnode-id=&quot;5038&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;dt class=&quot;col-12 col-sm-3 col-md-2_5 title&quot; data-dcnode-id=&quot;5089&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5090&quot; instrument_node=&quot;&quot;&gt;

    &lt;/span&gt;&lt;/dt&gt;&lt;span data-dcnode-id=&quot;5088&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;dd class=&quot;col content&quot; data-dcnode-id=&quot;5039&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;div class=&quot;content__journal&quot; data-dcnode-id=&quot;5056&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;a class=&quot;app-link app-link__text app-link--underlined&quot; data-dcnode-id=&quot;5083&quot; data-v-0e654b59=&quot;&quot; data-v-209c1d77=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cambridge.org/core/journals/japanese-journal-of-political-science&quot;&gt;&lt;span class=&quot;text&quot; data-dcnode-id=&quot;5085&quot; data-v-0e654b59=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5086&quot; instrument_node=&quot;&quot;&gt;Japanese Journal of Political Science&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5082&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5075&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5081&quot; instrument_node=&quot;&quot;&gt;
            ,
            &lt;/span&gt;&lt;a class=&quot;app-link app-link__text app-link--underlined&quot; data-dcnode-id=&quot;5076&quot; data-v-0e654b59=&quot;&quot; data-v-209c1d77=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cambridge.org/core/journals/japanese-journal-of-political-science/volume/BAAAE802AB690FC5331AFF8B948A2DAE&quot;&gt;&lt;span class=&quot;text&quot; data-dcnode-id=&quot;5078&quot; data-v-0e654b59=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5079&quot; instrument_node=&quot;&quot;&gt;Volume 12&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5074&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5067&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5073&quot; instrument_node=&quot;&quot;&gt;
            ,
            &lt;/span&gt;&lt;a class=&quot;app-link app-link__text app-link--underlined&quot; data-dcnode-id=&quot;5068&quot; data-v-0e654b59=&quot;&quot; data-v-209c1d77=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cambridge.org/core/journals/japanese-journal-of-political-science/issue/6BD29103C1B86A59B732AC9209BAD875&quot;&gt;&lt;span class=&quot;text&quot; data-dcnode-id=&quot;5070&quot; data-v-0e654b59=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5071&quot; instrument_node=&quot;&quot;&gt;Issue 1&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5066&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5064&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5065&quot; instrument_node=&quot;&quot;&gt;, April 2011&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5063&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5061&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5059&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5060&quot; instrument_node=&quot;&quot;&gt;, pp. 1 - 31&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5058&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5055&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;doi-data&quot; data-dcnode-id=&quot;5044&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;div data-dcnode-id=&quot;5047&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5054&quot; instrument_node=&quot;&quot;&gt;DOI: &lt;/span&gt;&lt;a class=&quot;app-link app-link__text app-link--accent&quot; data-dcnode-id=&quot;5048&quot; data-v-0e654b59=&quot;&quot; data-v-209c1d77=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//doi.org/10.1017/S1468109910000277&quot; target=&quot;_blank&quot;&gt;&lt;span class=&quot;text&quot; data-dcnode-id=&quot;5051&quot; data-v-0e654b59=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5052&quot; instrument_node=&quot;&quot;&gt;https://doi.org/10.1017/S1468109910000277&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;sr-only&quot; data-dcnode-id=&quot;5049&quot; data-v-0e654b59=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5050&quot; instrument_node=&quot;&quot;&gt;[Opens in a new window]&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5046&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5043&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5041&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/dd&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5037&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5035&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5033&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;row&quot; data-dcnode-id=&quot;5027&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;dt class=&quot;col-12 col-sm-3 col-md-2_5 title&quot; data-dcnode-id=&quot;5031&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5032&quot; instrument_node=&quot;&quot;&gt;
      Copyright
    &lt;/span&gt;&lt;/dt&gt;&lt;span data-dcnode-id=&quot;5030&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;dd class=&quot;col content&quot; data-dcnode-id=&quot;5028&quot; data-v-209c1d77=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;5029&quot; instrument_node=&quot;&quot;&gt;
      Copyright © Cambridge University Press 2011
    &lt;/span&gt;&lt;/dd&gt;&lt;/div&gt;&lt;/dl&gt;&lt;span data-dcnode-id=&quot;5025&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;5023&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;content-container&quot; data-dcnode-id=&quot;2410&quot; data-v-570e66f7=&quot;&quot; id=&quot;content-container&quot;&gt;&lt;div class=&quot;content-box&quot; data-dcnode-id=&quot;3964&quot;&gt;&lt;div class=&quot;article research-article NLM&quot; data-dcnode-id=&quot;3965&quot;&gt;&lt;div class=&quot;body&quot; data-dcnode-id=&quot;3967&quot;&gt;&lt;div class=&quot;sec intro&quot; data-dcnode-id=&quot;4991&quot; data-magellan-destination=&quot;sec1&quot; id=&quot;sec1&quot;&gt;&lt;h2 class=&quot;A&quot; data-dcnode-id=&quot;5021&quot;&gt;&lt;span data-dcnode-id=&quot;5022&quot; instrument_node=&quot;&quot;&gt; Introduction&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;5019&quot;&gt;&lt;span data-dcnode-id=&quot;5020&quot; instrument_node=&quot;&quot;&gt; The Asian Values Thesis claims that Asia's collectivistic traditions create immunity against the West's individualistic emphasis on emancipative values and liberal democracy. More importantly, it is held that Asia's immunity persists even under the imprint of economic modernization. A major implication of this thesis is that Asia can modernize economically without adopting the emancipative consequences of modernization known from the West, including liberal democracy.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;5008&quot;&gt;&lt;span data-dcnode-id=&quot;5018&quot; instrument_node=&quot;&quot;&gt; Whether right or wrong, the Asian Values Thesis reaches far beyond Asia itself in either case. The thesis touches upon a key dispute in the contemporary understanding of modernity, which pitches &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;5016&quot;&gt;&lt;span data-dcnode-id=&quot;5017&quot; instrument_node=&quot;&quot;&gt;cultural relativism&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5015&quot; instrument_node=&quot;&quot;&gt; against &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;5013&quot;&gt;&lt;span data-dcnode-id=&quot;5014&quot; instrument_node=&quot;&quot;&gt;developmental universalism&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5012&quot; instrument_node=&quot;&quot;&gt;. If the Asian Values Thesis is correct, there is no common emancipative logic that unifies modernization processes across cultures. In this case, developmental universalism is wrong and cultural relativism is right: there would be no inter-culturally shared modernity; instead, there would be various culture-specific modernit&lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;5010&quot;&gt;&lt;span data-dcnode-id=&quot;5011&quot; instrument_node=&quot;&quot;&gt;ies&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5009&quot; instrument_node=&quot;&quot;&gt; and Asian modernity would be one of them – opposed to Western modernity by Asia's culturally ingrained refusal of human emancipation.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;5006&quot;&gt;&lt;span data-dcnode-id=&quot;5007&quot; instrument_node=&quot;&quot;&gt; The Asian Values Thesis has been criticized for its political instrumentality, disqualifying it as an ideologically motivated rhetoric to legitimize oppressive power practices in authoritarian regimes. Treatments of the factual claims of the Asian Values Thesis have re-interpreted the writings of Confucius, Buddha, and other formative texts in an attempt to demonstrate that Asia's cultural traditions are reconcilable with the ideas of human emancipation and liberal democracy. By contrast, direct empirical tests of the Asian Values Thesis on the basis of representative survey data are sparse. In fact, no study so far has tested in a systematic Asian–Western comparison the claim that people in Asian countries show a particular immunity against the Western emphasis on emancipative values and liberal democracy and that this immunity withstands the imprint of modernization.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4992&quot;&gt;&lt;span data-dcnode-id=&quot;5005&quot; instrument_node=&quot;&quot;&gt; Using representative population data from the World Values Surveys, this article fills this gap, employing an Asian–Western comparison to determine whether and to what extent people in Asian countries oppose the Western emphasis on emancipative values and liberal democracy and whether they do so even under the imprint of modernization. The article is organized into four sections. &lt;/span&gt;&lt;a class=&quot;xref sec&quot; data-dcnode-id=&quot;5003&quot; href=&quot;#sec2&quot;&gt;&lt;span data-dcnode-id=&quot;5004&quot; instrument_node=&quot;&quot;&gt;Section 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5002&quot; instrument_node=&quot;&quot;&gt; gives a brief overview of the debate on Asian values and reviews the empirical findings available so far. &lt;/span&gt;&lt;a class=&quot;xref sec&quot; data-dcnode-id=&quot;5000&quot; href=&quot;#sec3&quot;&gt;&lt;span data-dcnode-id=&quot;5001&quot; instrument_node=&quot;&quot;&gt;Section 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4999&quot; instrument_node=&quot;&quot;&gt; derives empirically testable propositions from the previous discussion. &lt;/span&gt;&lt;a class=&quot;xref sec&quot; data-dcnode-id=&quot;4997&quot; href=&quot;#sec4&quot;&gt;&lt;span data-dcnode-id=&quot;4998&quot; instrument_node=&quot;&quot;&gt;Section 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4996&quot; instrument_node=&quot;&quot;&gt; introduces the data and describes the variables I use to test these propositions. &lt;/span&gt;&lt;a class=&quot;xref sec&quot; data-dcnode-id=&quot;4994&quot; href=&quot;#sec5&quot;&gt;&lt;span data-dcnode-id=&quot;4995&quot; instrument_node=&quot;&quot;&gt;Section 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4993&quot; instrument_node=&quot;&quot;&gt; presents the test results. The article concludes with a dismissal of Asian exceptionalism, emphasizing that Asian cultures are not exempted from the emancipative logic of modernization.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;sec&quot; data-dcnode-id=&quot;4722&quot; data-magellan-destination=&quot;sec2&quot; id=&quot;sec2&quot;&gt;&lt;h2 class=&quot;A&quot; data-dcnode-id=&quot;4987&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4989&quot;&gt;&lt;span data-dcnode-id=&quot;4990&quot; instrument_node=&quot;&quot;&gt;1.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4988&quot; instrument_node=&quot;&quot;&gt; Theoretical background&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;sec&quot; data-dcnode-id=&quot;4842&quot; data-magellan-destination=&quot;sec2-1&quot; id=&quot;sec2-1&quot;&gt;&lt;h3 class=&quot;B&quot; data-dcnode-id=&quot;4985&quot;&gt;&lt;span data-dcnode-id=&quot;4986&quot; instrument_node=&quot;&quot;&gt; A brief review of the Asian values debate&lt;/span&gt;&lt;/h3&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4974&quot;&gt;&lt;span data-dcnode-id=&quot;4984&quot; instrument_node=&quot;&quot;&gt; What is known as the ‘Asian values debate’ originated in the World Conference on Human Rights, held in 1993 in Vienna. At this occasion, the Chinese and Singaporean delegations forcefully objected to the &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4982&quot;&gt;&lt;span data-dcnode-id=&quot;4983&quot; instrument_node=&quot;&quot;&gt;universalistic&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4981&quot; instrument_node=&quot;&quot;&gt; interpretation of human rights advocated by the ‘West’. In the name of cultural diversity, Chinese and Singaporean delegates propagated a &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4979&quot;&gt;&lt;span data-dcnode-id=&quot;4980&quot; instrument_node=&quot;&quot;&gt;culture-specific&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4978&quot; instrument_node=&quot;&quot;&gt; notion of human rights. It was argued that the collectivistic traditions of Asia – and above all of Confucian &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4976&quot;&gt;&lt;span data-dcnode-id=&quot;4977&quot; instrument_node=&quot;&quot;&gt;East&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4975&quot; instrument_node=&quot;&quot;&gt; Asia – are inherently opposed to the West's individualistic emphasis on emancipative values and liberal democracy that inspires the idea of universal human rights. The West's repeated attempts to declare its individualistic tradition as common under a universal concept of human rights has been dismissed by Asian delegates as a violation of other cultures’ right to value their collectivistic traditions.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4954&quot;&gt;&lt;span data-dcnode-id=&quot;4973&quot; instrument_node=&quot;&quot;&gt; These views have been made prominent by former Singaporean leader Lee Kwan Yew. His thesis of Asia's cultural distinctness from the West has been published in a widely debated &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4971&quot;&gt;&lt;span data-dcnode-id=&quot;4972&quot; instrument_node=&quot;&quot;&gt;Foreign Affairs&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4970&quot; instrument_node=&quot;&quot;&gt; interview with Fareed Zakaria (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4966&quot; href=&quot;#ref32&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4968&quot;&gt;&lt;span data-dcnode-id=&quot;4969&quot; instrument_node=&quot;&quot;&gt;Reference Yew&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4967&quot; instrument_node=&quot;&quot;&gt;1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4965&quot; instrument_node=&quot;&quot;&gt;). Lee Kwan Yew's views have found a wide resonance for various reasons (Thompson, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4961&quot; href=&quot;#ref26&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4963&quot;&gt;&lt;span data-dcnode-id=&quot;4964&quot; instrument_node=&quot;&quot;&gt;Reference Thompson&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4962&quot; instrument_node=&quot;&quot;&gt;2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4960&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4956&quot; href=&quot;#ref27&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4958&quot;&gt;&lt;span data-dcnode-id=&quot;4959&quot; instrument_node=&quot;&quot;&gt;Reference Thompson&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4957&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4955&quot; instrument_node=&quot;&quot;&gt;). To begin with, the argument was put forward by the representative of a country that modernizes successfully without embracing democracy – a point that so far also characterizes the largest nation of Asia and the world: China. The cases of China and Singapore seem to provide powerful evidence that Asian countries can embark on a culture-specific path of modernization that avoids the emancipative consequences known from the West, in particular democracy.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4934&quot;&gt;&lt;span data-dcnode-id=&quot;4953&quot; instrument_node=&quot;&quot;&gt; Moreover, the Asian Values Thesis mirrored another provocative contribution: the Clash of Civilization Thesis by Huntington (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4949&quot; href=&quot;#ref12&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4951&quot;&gt;&lt;span data-dcnode-id=&quot;4952&quot; instrument_node=&quot;&quot;&gt;Reference Huntington&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4950&quot; instrument_node=&quot;&quot;&gt;1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4948&quot; instrument_node=&quot;&quot;&gt;). A key point in the Clash of Civilization Thesis is the West's uniqueness in its emphasis on emancipative values and liberal democracy. Particularly in Asia, the idea of a cultural clash with the West resonated with a long tradition of writings that emphasize the unique dominance of authoritarian values in Asia. Influential authors, such as Pye (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4944&quot; href=&quot;#ref20&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4946&quot;&gt;&lt;span data-dcnode-id=&quot;4947&quot; instrument_node=&quot;&quot;&gt;Reference Pye&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4945&quot; instrument_node=&quot;&quot;&gt;1985&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4943&quot; instrument_node=&quot;&quot;&gt;), portray Asia's authoritarian values as long being incompatible with Western emancipative values, from which liberal democracy takes its justification. Most recently, Bell's (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4939&quot; href=&quot;#ref1&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4941&quot;&gt;&lt;span data-dcnode-id=&quot;4942&quot; instrument_node=&quot;&quot;&gt;Reference Bell&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4940&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4938&quot; instrument_node=&quot;&quot;&gt;) &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4936&quot;&gt;&lt;span data-dcnode-id=&quot;4937&quot; instrument_node=&quot;&quot;&gt;Beyond Liberal Democracy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4935&quot; instrument_node=&quot;&quot;&gt; follows this line of reasoning, concluding that liberal democracy cannot be legitimized in Asia on the basis of Western emancipative values, but has to be rooted in Asian traditions of thinking. Sensitive as this approach may seem, it continues to take for granted an untested empirical claim: emancipative values do not resonate among Asians, not even under the imprint of modernization.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4908&quot;&gt;&lt;span data-dcnode-id=&quot;4933&quot; instrument_node=&quot;&quot;&gt; Another domain of support can be found in cross-cultural psychology, where the ‘East–West’ difference has for some time been described in terms of a collectivism–individualism dualism (Triandis, 1995; Schwartz and Ros, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4929&quot; href=&quot;#ref25&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4931&quot;&gt;&lt;span data-dcnode-id=&quot;4932&quot; instrument_node=&quot;&quot;&gt;Reference Schwartz and Ros&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4930&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4928&quot; instrument_node=&quot;&quot;&gt;). ‘Asians’ are described as having distinctly ‘&lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4926&quot;&gt;&lt;span data-dcnode-id=&quot;4927&quot; instrument_node=&quot;&quot;&gt;inter&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4925&quot; instrument_node=&quot;&quot;&gt;-dependent’ personalities, in juxtaposition to the ‘&lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4923&quot;&gt;&lt;span data-dcnode-id=&quot;4924&quot; instrument_node=&quot;&quot;&gt;in&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4922&quot; instrument_node=&quot;&quot;&gt;-dependent’ personalities of ‘Westerners’ (Markus and Kitayama, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4918&quot; href=&quot;#ref16&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4920&quot;&gt;&lt;span data-dcnode-id=&quot;4921&quot; instrument_node=&quot;&quot;&gt;Reference Markus and Kitayama&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4919&quot; instrument_node=&quot;&quot;&gt;1998&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4917&quot; instrument_node=&quot;&quot;&gt;). More generally, the Asian Values Thesis profits from the intellectual climate of cultural relativism that is still &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4915&quot;&gt;&lt;span data-dcnode-id=&quot;4916&quot; instrument_node=&quot;&quot;&gt;en vogue&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4914&quot; instrument_node=&quot;&quot;&gt; in Western and Eastern circles alike (Wong, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4910&quot; href=&quot;#ref31&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4912&quot;&gt;&lt;span data-dcnode-id=&quot;4913&quot; instrument_node=&quot;&quot;&gt;Reference Wong&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4911&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4909&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4891&quot;&gt;&lt;span data-dcnode-id=&quot;4907&quot; instrument_node=&quot;&quot;&gt; Not surprisingly, there was immediate opposition to the Asian Values Thesis. Disagreement was voiced by human rights activists in Asia, such as Aung San Suu Kyi, and academics from the region, such as Xiarong Li. Some of the most powerful rebuttals were issued by widely read Francis Fukuyama (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4903&quot; href=&quot;#ref11&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4905&quot;&gt;&lt;span data-dcnode-id=&quot;4906&quot; instrument_node=&quot;&quot;&gt;Reference Fukuyama&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4904&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4902&quot; instrument_node=&quot;&quot;&gt;) and by Nobel price laureate Amartya Sen (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4898&quot; href=&quot;#ref23&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4900&quot;&gt;&lt;span data-dcnode-id=&quot;4901&quot; instrument_node=&quot;&quot;&gt;Reference Sen&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4899&quot; instrument_node=&quot;&quot;&gt;1997&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4897&quot; instrument_node=&quot;&quot;&gt;). The most intriguing objections raised against the Asian Values Thesis are: instrumentality, selectivity, and what has been called the ‘genetic fallacy’ (Li, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4893&quot; href=&quot;#ref15&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4895&quot;&gt;&lt;span data-dcnode-id=&quot;4896&quot; instrument_node=&quot;&quot;&gt;Reference Li, Gehring and Galston&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4894&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4892&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4879&quot;&gt;&lt;span data-dcnode-id=&quot;4890&quot; instrument_node=&quot;&quot;&gt; Sen, for instance, argues that the rejection of the Asian Values Thesis throughout many parts of Asia already belies one of the thesis's fundamental premises: the existence of a uniform Asian value system. Moreover, there is an obvious connection between political position and support of the Asian Values Thesis, which uncovers support as ideologically motivated. Supporters were mostly found among leaders of authoritarian regimes, such as Singapore's Lee Kwan Yew or China's Li Peng. Critics were found among regime opponents, such as the Dalai Lama, and leaders of democratic regimes, including Taiwan's Lee Teng-Hui and South Korea's Kim Dae Jung (Kim, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4886&quot; href=&quot;#ref32&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4888&quot;&gt;&lt;span data-dcnode-id=&quot;4889&quot; instrument_node=&quot;&quot;&gt;Reference Yew&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4887&quot; instrument_node=&quot;&quot;&gt;1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4885&quot; instrument_node=&quot;&quot;&gt;; Dalai Lama, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4881&quot; href=&quot;#ref4&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4883&quot;&gt;&lt;span data-dcnode-id=&quot;4884&quot; instrument_node=&quot;&quot;&gt;Reference Lama&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4882&quot; instrument_node=&quot;&quot;&gt;1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4880&quot; instrument_node=&quot;&quot;&gt;). The Asian Values Thesis has thus been dismissed as a smokescreen to hide oppressive power practices behind the parlance of cultural pluralism.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4872&quot;&gt;&lt;span data-dcnode-id=&quot;4878&quot; instrument_node=&quot;&quot;&gt; Fukuyama (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4874&quot; href=&quot;#ref11&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4876&quot;&gt;&lt;span data-dcnode-id=&quot;4877&quot; instrument_node=&quot;&quot;&gt;Reference Fukuyama&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4875&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4873&quot; instrument_node=&quot;&quot;&gt;) and others argue that no cultural system is inherently consistent. The complexity of any cultural system allows one to read into it what one wants to read into it. Thus, what proponents of the Asian Values Thesis define as Asian values is a selective reading of a rich cultural heritage – this selectivity being more indicative of what these proponents want Asian values to be than what Asian values really are.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4865&quot;&gt;&lt;span data-dcnode-id=&quot;4871&quot; instrument_node=&quot;&quot;&gt; Another criticism has been raised by Li (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4867&quot; href=&quot;#ref15&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4869&quot;&gt;&lt;span data-dcnode-id=&quot;4870&quot; instrument_node=&quot;&quot;&gt;Reference Li, Gehring and Galston&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4868&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4866&quot; instrument_node=&quot;&quot;&gt;) who accuses proponents of the Asian Values Thesis of the ‘genetic fallacy’. This is the erroneous assumption that a cultural achievement always has to remain the sole property of its locus of origin. Hence, the concept of liberal democracy cannot be dismissed as inapplicable to non-Western cultures simply by pointing to its Western origin.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4843&quot;&gt;&lt;span data-dcnode-id=&quot;4864&quot; instrument_node=&quot;&quot;&gt; Most of the criticism of the Asian Values Thesis is directed against the political motivation behind it. Empirical approaches that try to prove the thesis wrong in its factual statements usually elaborate on Asian philosophical traditions in an attempt to show that there are elements in Confucianism, Buddhism, and Hinduism that embrace emancipative values and are compatible with liberal democracy (Kim, 1994; Fukuyama, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4860&quot; href=&quot;#ref11&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4862&quot;&gt;&lt;span data-dcnode-id=&quot;4863&quot; instrument_node=&quot;&quot;&gt;Reference Fukuyama&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4861&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4859&quot; instrument_node=&quot;&quot;&gt;; Sen, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4855&quot; href=&quot;#ref23&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4857&quot;&gt;&lt;span data-dcnode-id=&quot;4858&quot; instrument_node=&quot;&quot;&gt;Reference Sen&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4856&quot; instrument_node=&quot;&quot;&gt;1997&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4854&quot; instrument_node=&quot;&quot;&gt;; De Bary, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4850&quot; href=&quot;#ref6&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4852&quot;&gt;&lt;span data-dcnode-id=&quot;4853&quot; instrument_node=&quot;&quot;&gt;Reference De and Theodore&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4851&quot; instrument_node=&quot;&quot;&gt;1998&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4849&quot; instrument_node=&quot;&quot;&gt;; Dalai Lama, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4845&quot; href=&quot;#ref4&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4847&quot;&gt;&lt;span data-dcnode-id=&quot;4848&quot; instrument_node=&quot;&quot;&gt;Reference Lama&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4846&quot; instrument_node=&quot;&quot;&gt;1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4844&quot; instrument_node=&quot;&quot;&gt;). By contrast, evidence for the thesis that the values of Asian populations are immune against the West's emphasis on emancipative values and liberal democracy and remain so even under the imprint of modernization is sparse. Indeed, only a handful of studies use representative data from population surveys in Asia and the West to test key aspects of the Asian Values Thesis. What did these studies find out?&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;sec&quot; data-dcnode-id=&quot;4723&quot; data-magellan-destination=&quot;sec2-2&quot; id=&quot;sec2-2&quot;&gt;&lt;h3 class=&quot;B&quot; data-dcnode-id=&quot;4840&quot;&gt;&lt;span data-dcnode-id=&quot;4841&quot; instrument_node=&quot;&quot;&gt; Empirical tests of the Asian values thesis&lt;/span&gt;&lt;/h3&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4833&quot;&gt;&lt;span data-dcnode-id=&quot;4839&quot; instrument_node=&quot;&quot;&gt; Nathan (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4835&quot; href=&quot;#ref17&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4837&quot;&gt;&lt;span data-dcnode-id=&quot;4838&quot; instrument_node=&quot;&quot;&gt;Reference Nathan&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4836&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4834&quot; instrument_node=&quot;&quot;&gt;) uses survey data from the East Asia Barometer to examine Confucian values, which he operationalizes as ‘traditional social values’ with an emphasis on conformity and authority. Doing so, Nathan finds that Confucian values and democratic values adversely affect support for democracy in a sample of eight Asian societies: Japan, Hong Kong, South Korea, China, Mongolia, the Philippines, Taiwan, and Thailand. In each of these societies, Confucian values undermine support for democracy.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4823&quot;&gt;&lt;span data-dcnode-id=&quot;4832&quot; instrument_node=&quot;&quot;&gt; In a joint study with Chu, Diamond, and Shin, Nathan analyzes the same data for the same set of countries with respect to notions of democracy. The authors find that even though the Western liberal understanding of democracy is supported throughout most Asian countries, it is also rivaled by alternative understandings that emphasize strong leadership, social harmony, and other typically Asian values (Chu &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4830&quot;&gt;&lt;span data-dcnode-id=&quot;4831&quot; instrument_node=&quot;&quot;&gt;et al&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4829&quot; instrument_node=&quot;&quot;&gt;., &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4825&quot; href=&quot;#ref3&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4827&quot;&gt;&lt;span data-dcnode-id=&quot;4828&quot; instrument_node=&quot;&quot;&gt;Reference Chu, Diamond, Nathan, Shin, Chu, Diamond, Nathan and Shin&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4826&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4824&quot; instrument_node=&quot;&quot;&gt;: 12–13).&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4796&quot;&gt;&lt;span data-dcnode-id=&quot;4822&quot; instrument_node=&quot;&quot;&gt; A study by Chang and Chu (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4818&quot; href=&quot;#ref2&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4820&quot;&gt;&lt;span data-dcnode-id=&quot;4821&quot; instrument_node=&quot;&quot;&gt;Reference Chang and Chu&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4819&quot; instrument_node=&quot;&quot;&gt;2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4817&quot; instrument_node=&quot;&quot;&gt;) supports this interpretation. The authors analyze survey data from mainland China, Hong Kong, and Taiwan and find that traditional social values negatively affect democratic values in a Western understanding, such as support for human rights. Park and Shin (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4813&quot; href=&quot;#ref18&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4815&quot;&gt;&lt;span data-dcnode-id=&quot;4816&quot; instrument_node=&quot;&quot;&gt;Reference Park and Shin&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4814&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4812&quot; instrument_node=&quot;&quot;&gt;) confirm this result with data for South Korea. Thus, the studies by Nathan (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4808&quot; href=&quot;#ref17&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4810&quot;&gt;&lt;span data-dcnode-id=&quot;4811&quot; instrument_node=&quot;&quot;&gt;Reference Nathan&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4809&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4807&quot; instrument_node=&quot;&quot;&gt;), Chang and Chu (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4803&quot; href=&quot;#ref2&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4805&quot;&gt;&lt;span data-dcnode-id=&quot;4806&quot; instrument_node=&quot;&quot;&gt;Reference Chang and Chu&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4804&quot; instrument_node=&quot;&quot;&gt;2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4802&quot; instrument_node=&quot;&quot;&gt;) and Park and Shin (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4798&quot; href=&quot;#ref18&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4800&quot;&gt;&lt;span data-dcnode-id=&quot;4801&quot; instrument_node=&quot;&quot;&gt;Reference Park and Shin&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4799&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4797&quot; instrument_node=&quot;&quot;&gt;) support the Asian Values Thesis.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4774&quot;&gt;&lt;span data-dcnode-id=&quot;4795&quot; instrument_node=&quot;&quot;&gt; On the other hand, Fetzer and Soper (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4791&quot; href=&quot;#ref8&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4793&quot;&gt;&lt;span data-dcnode-id=&quot;4794&quot; instrument_node=&quot;&quot;&gt;Reference Fetzer and Soper&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4792&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4790&quot; instrument_node=&quot;&quot;&gt;) disconfirm the findings of Chang and Chu for two representative samples of Taiwanese citizens. According to Fetzer and Soper, traditional social values do not consistently hamper democratic values in a Western sense. On a broader basis of evidence, Dalton and Ong (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4786&quot; href=&quot;#ref5&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4788&quot;&gt;&lt;span data-dcnode-id=&quot;4789&quot; instrument_node=&quot;&quot;&gt;Reference Dalton, Ong, Dalton and Chull&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4787&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4785&quot; instrument_node=&quot;&quot;&gt;) examine data from the World Values Survey to show that traditional social values do not impede support for democracy more in East Asia than in Western countries, including the US, Canada, Australia, and New Zealand. Thus, there is nothing particularly Asian or Confucian about the existence of traditional social values, nor is there anything particularly Asian or Confucian about the conflict between traditional social values and democratic values: these sets of values conflict with each other in both the East and West. Supporting the findings of Dalton and Ong (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4781&quot; href=&quot;#ref5&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4783&quot;&gt;&lt;span data-dcnode-id=&quot;4784&quot; instrument_node=&quot;&quot;&gt;Reference Dalton, Ong, Dalton and Chull&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4782&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4780&quot; instrument_node=&quot;&quot;&gt;), Flanagan and Lee (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4776&quot; href=&quot;#ref9&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4778&quot;&gt;&lt;span data-dcnode-id=&quot;4779&quot; instrument_node=&quot;&quot;&gt;Reference Flanagan and Lee&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4777&quot; instrument_node=&quot;&quot;&gt;2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4775&quot; instrument_node=&quot;&quot;&gt;) also use World Values Survey data, showing that the process of modernization has changed the values of South Koreans and the Japanese in ways that promoted democratic reforms in these countries. These three studies rather disconfirm the Asian Values Thesis.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4744&quot;&gt;&lt;span data-dcnode-id=&quot;4773&quot; instrument_node=&quot;&quot;&gt; Valuable as these studies are, none of them is conclusive enough to settle the debate. The studies by Park and Shin (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4769&quot; href=&quot;#ref18&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4771&quot;&gt;&lt;span data-dcnode-id=&quot;4772&quot; instrument_node=&quot;&quot;&gt;Reference Park and Shin&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4770&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4768&quot; instrument_node=&quot;&quot;&gt;) and Fetzer and Soper (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4764&quot; href=&quot;#ref8&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4766&quot;&gt;&lt;span data-dcnode-id=&quot;4767&quot; instrument_node=&quot;&quot;&gt;Reference Fetzer and Soper&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4765&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4763&quot; instrument_node=&quot;&quot;&gt;) both focus on one country only and are thus unsuited to make generalizations across the wider Asian region. The studies by Flanagan and Lee (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4759&quot; href=&quot;#ref9&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4761&quot;&gt;&lt;span data-dcnode-id=&quot;4762&quot; instrument_node=&quot;&quot;&gt;Reference Flanagan and Lee&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4760&quot; instrument_node=&quot;&quot;&gt;2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4758&quot; instrument_node=&quot;&quot;&gt;), Chang and Chu (2202), and Nathan (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4754&quot; href=&quot;#ref17&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4756&quot;&gt;&lt;span data-dcnode-id=&quot;4757&quot; instrument_node=&quot;&quot;&gt;Reference Nathan&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4755&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4753&quot; instrument_node=&quot;&quot;&gt;) as well as Chu &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4751&quot;&gt;&lt;span data-dcnode-id=&quot;4752&quot; instrument_node=&quot;&quot;&gt;et al&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4750&quot; instrument_node=&quot;&quot;&gt;. (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4746&quot; href=&quot;#ref3&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4748&quot;&gt;&lt;span data-dcnode-id=&quot;4749&quot; instrument_node=&quot;&quot;&gt;Reference Chu, Diamond, Nathan, Shin, Chu, Diamond, Nathan and Shin&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4747&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4745&quot; instrument_node=&quot;&quot;&gt;) each analyze more than one country but remain confined to Asia. These studies ignore the Asian–Western contrast that constitutes the core of the Asian Values Thesis. The Thesis's key claim of an Asian–Western chasm in the value of human emancipation and liberal democracy can only be tested by an Asian–Western comparison.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4737&quot;&gt;&lt;span data-dcnode-id=&quot;4743&quot; instrument_node=&quot;&quot;&gt; Dalton and Ong's (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4739&quot; href=&quot;#ref5&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4741&quot;&gt;&lt;span data-dcnode-id=&quot;4742&quot; instrument_node=&quot;&quot;&gt;Reference Dalton, Ong, Dalton and Chull&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4740&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4738&quot; instrument_node=&quot;&quot;&gt;) study is the only one that probes into an Asian–Western comparison. It is the most conclusive study on this matter. Still, the finding that traditional social values do not undermine support for democracy more in Asia than in the West does not provide an exhaustive test of the Asian Values Thesis. Noteworthy as this finding is, it leaves the two key claims of the Asian Values Thesis untested:
&lt;/span&gt;&lt;/p&gt;&lt;ol class=&quot;list number nomark&quot; data-dcnode-id=&quot;4726&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4732&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4733&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4735&quot;&gt;&lt;span data-dcnode-id=&quot;4736&quot; instrument_node=&quot;&quot;&gt;(1)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4734&quot; instrument_node=&quot;&quot;&gt; People in Asian countries resist the Western emphasis on emancipative values and this resistance does not vary with people's exposure to modernization.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4727&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4728&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4730&quot;&gt;&lt;span data-dcnode-id=&quot;4731&quot; instrument_node=&quot;&quot;&gt;(2)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4729&quot; instrument_node=&quot;&quot;&gt; Void of Western emancipative values, people in Asian countries resist the Western emphasis on liberal democracy and this resistance does not vary either.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4724&quot;&gt;&lt;span data-dcnode-id=&quot;4725&quot; instrument_node=&quot;&quot;&gt; This article examines these unproven claims of the Asian Values Thesis for the first time in an Asian–Western comparison.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;sec&quot; data-dcnode-id=&quot;4629&quot; data-magellan-destination=&quot;sec3&quot; id=&quot;sec3&quot;&gt;&lt;h2 class=&quot;A&quot; data-dcnode-id=&quot;4718&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4720&quot;&gt;&lt;span data-dcnode-id=&quot;4721&quot; instrument_node=&quot;&quot;&gt;2.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4719&quot; instrument_node=&quot;&quot;&gt; Propositions and counter-propositions&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4682&quot;&gt;&lt;span data-dcnode-id=&quot;4717&quot; instrument_node=&quot;&quot;&gt; The two key claims of the Asian Values Thesis are in direct opposition to a universalist notion of modernization, as formulated in the Human Development Thesis by Welzel &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4715&quot;&gt;&lt;span data-dcnode-id=&quot;4716&quot; instrument_node=&quot;&quot;&gt;et al&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4714&quot; instrument_node=&quot;&quot;&gt;. (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4710&quot; href=&quot;#ref29&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4712&quot;&gt;&lt;span data-dcnode-id=&quot;4713&quot; instrument_node=&quot;&quot;&gt;Reference Welzel, Inglehart and Klingemann&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4711&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4709&quot; instrument_node=&quot;&quot;&gt;) (see also Welzel and Inglehart, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4705&quot; href=&quot;#ref30&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4707&quot;&gt;&lt;span data-dcnode-id=&quot;4708&quot; instrument_node=&quot;&quot;&gt;Reference Welzel, Inglehart, Dalton and Shin&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4706&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4704&quot; instrument_node=&quot;&quot;&gt;). According to the Human Development Thesis, modernization is basically an emancipative process whose major thrust is to empower people to exercise freedoms in their actions. As shown in &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4702&quot; href=&quot;#fig1&quot;&gt;&lt;span data-dcnode-id=&quot;4703&quot; instrument_node=&quot;&quot;&gt;Figure 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4701&quot; instrument_node=&quot;&quot;&gt;, the process of people empowerment is supposed to manifest itself in a threefold way: (1) &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4699&quot;&gt;&lt;span data-dcnode-id=&quot;4700&quot; instrument_node=&quot;&quot;&gt;cognitive&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4698&quot; instrument_node=&quot;&quot;&gt; empowerment when growing intellectual resources increase people's &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4696&quot;&gt;&lt;span data-dcnode-id=&quot;4697&quot; instrument_node=&quot;&quot;&gt;capabilities&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4695&quot; instrument_node=&quot;&quot;&gt; to exercise freedoms; (2) &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4693&quot;&gt;&lt;span data-dcnode-id=&quot;4694&quot; instrument_node=&quot;&quot;&gt;motivational&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4692&quot; instrument_node=&quot;&quot;&gt; empowerment when rising emancipative values elevate people's &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4690&quot;&gt;&lt;span data-dcnode-id=&quot;4691&quot; instrument_node=&quot;&quot;&gt;ambitions&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4689&quot; instrument_node=&quot;&quot;&gt; to exercise freedoms; (3) &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4687&quot;&gt;&lt;span data-dcnode-id=&quot;4688&quot; instrument_node=&quot;&quot;&gt;legal&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4686&quot; instrument_node=&quot;&quot;&gt; empowerment when the institutionalization of liberal democracy widens people's &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4684&quot;&gt;&lt;span data-dcnode-id=&quot;4685&quot; instrument_node=&quot;&quot;&gt;entitlements&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4683&quot; instrument_node=&quot;&quot;&gt; to exercise freedoms.
&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;4669&quot;&gt;&lt;div class=&quot;fig&quot; data-dcnode-id=&quot;4670&quot; data-magellan-destination=&quot;fig1&quot; id=&quot;fig1&quot;&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4676&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4681&quot; data-img-name=&quot;Figure 1&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172002-86334-largeThumb-S1468109910000277_fig1g.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172002-56191-optimisedImage-S1468109910000277_fig1g.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_fig1g.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172002-86073-smallThumb-S1468109910000277_fig1g.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172002-11985-mediumThumb-S1468109910000277_fig1g.jpg?pub-status=live&quot; data-zoomable=&quot;true&quot; height=&quot;550&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;944&quot;&gt;&lt;button aria-label=&quot;Open Figure 1 image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4677&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4680&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuMjUydjIyLjQ5NmMwIC42OTMtLjU2NCAxLjI1Mi0xLjI1MiAxLjI1Mkg5LjI1MkM4LjU1OSAzMyA4IDMyLjQzNiA4IDMxLjc0OFY5LjI1MkM4IDguNTU5IDguNTY0IDggOS4yNTIgOHptLTEuNzUzIDIuNDk4SDExYy0uMjggMC0uNTAyLjIyNy0uNTAyLjUwMnYxMC4yNDVjMCAuMjc5LjIyNy41MDEuNTAyLjUwMWg2Ljk5N2MuNjkzIDAgMS4yNTEuNTY0IDEuMjUxIDEuMjUyVjMwYzAgLjI4LjIyOC41MDIuNTAyLjUwMmgxMC4yNDVjLjI4IDAgLjUwMi0uMjI3LjUwMi0uNTAyVjExYzAtLjI4LS4yMjgtLjUwMi0uNTAyLS41MDJ6TTI2Ljc0NyAxM2MuNjkzIDAgMS4yNTIuNTU5IDEuMjUyIDEuMjUydjVjMCAuNjk0LS41NjQgMS4yNTItMS4yNTIgMS4yNTItLjY5MyAwLTEuMjUxLS41NjQtMS4yNTEtMS4yNTF2LTEuOTgxbC0yLjg2NSAyLjg2NWMtLjY0Mi42NDEtMS41MjYuMjQzLTEuNzY5IDAtLjQ4Ni0uNDkxLS40ODYtMS4yODMgMC0xLjc2OWwyLjg2NS0yLjg2NWgtMS45OGMtLjY5NCAwLTEuMjUyLS41NjQtMS4yNTItMS4yNTEgMC0uNjkzLjU2NC0xLjI1MiAxLjI1MS0xLjI1MnoiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;4679&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4671&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4672&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4674&quot;&gt;&lt;span data-dcnode-id=&quot;4675&quot; instrument_node=&quot;&quot;&gt;Figure 1&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4673&quot; instrument_node=&quot;&quot;&gt; Human development as people empowerment&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4667&quot;&gt;&lt;span data-dcnode-id=&quot;4668&quot; instrument_node=&quot;&quot;&gt; Due to the Human Development Thesis, the three partial empowerments cannot be seen in isolation from each other but are intimately linked through the ‘utility logic of freedoms’. The utility logic of freedoms implies that people perceive freedoms as valuable enough to struggle for their legalization whenever they see themselves capable to handle these freedoms. Accordingly, people's ambitions to exercise freedoms adjust to their capabilities to exercise freedoms. This adjustment has proven so useful to managing reality that evolution has anchored it as a key coping mechanism in the human mind. Because of its evolutionary origin, the utility logic of freedoms operates in a culture-invariant way that is common to our species, triggering similar mental reactions to similar external stimuli. Consequently, Asian cultures are not exempted from the utility logic of freedoms and its consequences. One of these consequences is that processes of cognitive empowerment, such as rising levels of education and increasing access to information, result in a corresponding empowerment in ambitions, as reflected in the rise of emancipative values. Another consequence is that, as soon as people have adopted emancipative values, they endorse a liberal notion of democracy, since this is the notion that translates the spirit of emancipative values into the domain of regime orientations.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4665&quot;&gt;&lt;span data-dcnode-id=&quot;4666&quot; instrument_node=&quot;&quot;&gt; Applied to Asia, the Human Development Thesis reverts the two key claims of the Asian Values Thesis into their opposites:
&lt;/span&gt;&lt;/p&gt;&lt;ol class=&quot;list number nomark&quot; data-dcnode-id=&quot;4654&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4660&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4661&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4663&quot;&gt;&lt;span data-dcnode-id=&quot;4664&quot; instrument_node=&quot;&quot;&gt;(1)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4662&quot; instrument_node=&quot;&quot;&gt; People in Asian countries do not invariantly resist the Western emphasis on emancipative values; instead emphasis on emancipative values varies in Asia, as it does in the West, with people's cognitive empowerment.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4655&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4656&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4658&quot;&gt;&lt;span data-dcnode-id=&quot;4659&quot; instrument_node=&quot;&quot;&gt;(2)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4657&quot; instrument_node=&quot;&quot;&gt; Not entirely void of emancipative values, people in Asian countries do not invariantly resist the Western emphasis on liberal democracy; instead the endorsement of liberal democracy varies in Asia, as it does in the West, with people's emancipative values.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p class=&quot;p continuation&quot; data-dcnode-id=&quot;4649&quot;&gt;&lt;span data-dcnode-id=&quot;4653&quot; instrument_node=&quot;&quot;&gt;
For the empirical analyses, it is helpful to convert these general hypotheses into directly testable propositions. Accordingly, &lt;/span&gt;&lt;a class=&quot;xref table&quot; data-dcnode-id=&quot;4651&quot; href=&quot;#tab1&quot;&gt;&lt;span data-dcnode-id=&quot;4652&quot; instrument_node=&quot;&quot;&gt;Table 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4650&quot; instrument_node=&quot;&quot;&gt; suggests a number of propositions and counter-propositions. Separate propositions are formulated for an emphasis on emancipative values and an emphasis on liberal democracy as objects of study. For both objects, propositions are specified at the country level and at the individual level. At both levels, propositions derived from the Asian Values Thesis are in direct opposition to counter-propositions derived from the Human Development Thesis.
&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;table-wrap&quot; data-dcnode-id=&quot;4637&quot; data-magellan-destination=&quot;tab1&quot; id=&quot;tab1&quot;&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4644&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4645&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4647&quot;&gt;&lt;span data-dcnode-id=&quot;4648&quot; instrument_node=&quot;&quot;&gt;Table 1.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4646&quot; instrument_node=&quot;&quot;&gt; Turning the Asian Values Thesis and the Human Development Thesis into specific propositions&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4638&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4643&quot; data-img-name=&quot;Table 1.&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172332-38132-largeThumb-S1468109910000277_tab1.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172332-34731-optimisedImage-S1468109910000277_tab1.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_tab1.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172332-87842-smallThumb-S1468109910000277_tab1.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172332-67866-mediumThumb-S1468109910000277_tab1.jpg?pub-status=live&quot; data-zoomable=&quot;true&quot; height=&quot;493&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;875&quot;&gt;&lt;button aria-label=&quot;Open Table 1. image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4639&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4642&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuMjUydjIyLjQ5NmMwIC42OTMtLjU2NCAxLjI1Mi0xLjI1MiAxLjI1Mkg5LjI1MkM4LjU1OSAzMyA4IDMyLjQzNiA4IDMxLjc0OFY5LjI1MkM4IDguNTU5IDguNTY0IDggOS4yNTIgOHptLTEuNzUzIDIuNDk4SDExYy0uMjggMC0uNTAyLjIyNy0uNTAyLjUwMnYxMC4yNDVjMCAuMjc5LjIyNy41MDEuNTAyLjUwMWg2Ljk5N2MuNjkzIDAgMS4yNTEuNTY0IDEuMjUxIDEuMjUyVjMwYzAgLjI4LjIyOC41MDIuNTAyLjUwMmgxMC4yNDVjLjI4IDAgLjUwMi0uMjI3LjUwMi0uNTAyVjExYzAtLjI4LS4yMjgtLjUwMi0uNTAyLS41MDJ6TTI2Ljc0NyAxM2MuNjkzIDAgMS4yNTIuNTU5IDEuMjUyIDEuMjUydjVjMCAuNjk0LS41NjQgMS4yNTItMS4yNTIgMS4yNTItLjY5MyAwLTEuMjUxLS41NjQtMS4yNTEtMS4yNTF2LTEuOTgxbC0yLjg2NSAyLjg2NWMtLjY0Mi42NDEtMS41MjYuMjQzLTEuNzY5IDAtLjQ4Ni0uNDkxLS40ODYtMS4yODMgMC0xLjc2OWwyLjg2NS0yLjg2NWgtMS45OGMtLjY5NCAwLTEuMjUyLS41NjQtMS4yNTItMS4yNTEgMC0uNjkzLjU2NC0xLjI1MiAxLjI1MS0xLjI1MnoiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;4641&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4635&quot;&gt;&lt;span data-dcnode-id=&quot;4636&quot; instrument_node=&quot;&quot;&gt; At the country level, the critical question is how a population's belonging to Asia or the West affects its overall emphases on emancipative values and on liberal democracy. According to the Asian Values Thesis, a population's overall emphases on emancipative values and on liberal democracy are lower than otherwise in Asia and higher than otherwise in the West (Propositions 1.1 and 2.1). According to the Human Development Thesis, a population's overall emphasis on emancipative values does not depend on its belonging to Asia or the West; instead, it depends on how far the process of cognitive empowerment is advanced in a country (Counter-Proposition 1.1). Likewise, a population's overall emphasis on liberal democracy does not depend on its Asian or Western belonging, it depends on how strong a population's overall emphasis on emancipative values has grown (Counter-Proposition 2.1).&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4630&quot;&gt;&lt;span data-dcnode-id=&quot;4634&quot; instrument_node=&quot;&quot;&gt; At the individual level, the critical question is how a population's belonging to Asia or the West varies the impact of a respondent's cognitive empowerment on her emancipative values and the impact of her emancipative values on her endorsement of liberal democracy. According to a strong version of the Asian Values Thesis, the impact of cognitive empowerment on emancipative values and that of emancipative values on endorsing liberal democracy are inexistent in Asia and only exist in the West. In a more moderate formulation (which is the one chosen in &lt;/span&gt;&lt;a class=&quot;xref table&quot; data-dcnode-id=&quot;4632&quot; href=&quot;#tab1&quot;&gt;&lt;span data-dcnode-id=&quot;4633&quot; instrument_node=&quot;&quot;&gt;Table 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4631&quot; instrument_node=&quot;&quot;&gt;), the effects are at least weaker than otherwise in Asia and stronger than otherwise in the West (Propositions 1.2 and 2.2). The Human Development Thesis assumes the opposite on both accounts. First, a respondent's cognitive empowerment strengthens her emancipative values more the farther advanced the process of cognitive empowerment is in the respondent's country – no matter whether that country is Asian or Western (Counter-Proposition 1.2). Second, a respondent's emancipative values strengthen her endorsement of liberal democracy more the stronger the overall emphasis on emancipative values has grown in the respondent's country – no matter whether that country is Asian or Western (Counter-Proposition 2.2). The logic of these two counter-propositions is one of contextual enforcement: as an individual-level characteristic, cognitive empowerment has an emancipative-minding impetus and emancipative values have a liberal-minding impetus, but these impetuses become stronger the more prevalent the attribute in question is in a respondent's country.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;sec&quot; data-dcnode-id=&quot;4251&quot; data-magellan-destination=&quot;sec4&quot; id=&quot;sec4&quot;&gt;&lt;h2 class=&quot;A&quot; data-dcnode-id=&quot;4625&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4627&quot;&gt;&lt;span data-dcnode-id=&quot;4628&quot; instrument_node=&quot;&quot;&gt;3.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4626&quot; instrument_node=&quot;&quot;&gt; Data and measurements&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4617&quot;&gt;&lt;span data-dcnode-id=&quot;4624&quot; instrument_node=&quot;&quot;&gt; To test the above listed propositions, I use data from the World Values Surveys (WVS), which provide nationally representative data of the beliefs and values of more than 90 societies around the globe.&lt;/span&gt;&lt;a class=&quot;xref fn&quot; data-dcnode-id=&quot;4619&quot; href=&quot;#fn1&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4622&quot;&gt;&lt;span data-dcnode-id=&quot;4623&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;4620&quot;&gt;&lt;span data-dcnode-id=&quot;4621&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4618&quot; instrument_node=&quot;&quot;&gt; Among these societies, 15 in total are Asian (in alphabetic order): Bangladesh, China, Hong Kong, India, Indonesia, Japan, Kyrgyzstan, Malaysia, Pakistan, The Philippines, Singapore, South Korea, Taiwan, Thailand, and Vietnam.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4602&quot;&gt;&lt;span data-dcnode-id=&quot;4616&quot; instrument_node=&quot;&quot;&gt; Advocates of the Asian Values Thesis do not deny that there are manifold differences among Asian countries. Nevertheless, the thesis holds that – despite these differences – Asian countries share a weaker than usual emphasis on emancipative values and a weaker than usual emphasis on liberal democracy, in contrast to stronger than usual emphases in Western countries. In order to test this hypothesis, one has to arrange countries into Asian and Western groups and to examine whether these groupings affect the emphases on emancipative values and liberal democracy in the predicted direction. To do so, I use a global scheme of ten culture zones inspired by Huntington (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4612&quot; href=&quot;#ref12&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4614&quot;&gt;&lt;span data-dcnode-id=&quot;4615&quot; instrument_node=&quot;&quot;&gt;Reference Huntington&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4613&quot; instrument_node=&quot;&quot;&gt;1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4611&quot; instrument_node=&quot;&quot;&gt;) and described by Welzel &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4609&quot;&gt;&lt;span data-dcnode-id=&quot;4610&quot; instrument_node=&quot;&quot;&gt;et al&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4608&quot; instrument_node=&quot;&quot;&gt;. (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4604&quot; href=&quot;#ref29&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4606&quot;&gt;&lt;span data-dcnode-id=&quot;4607&quot; instrument_node=&quot;&quot;&gt;Reference Welzel, Inglehart and Klingemann&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4605&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4603&quot; instrument_node=&quot;&quot;&gt;). This scheme groups countries covered by the WVS in the following way:
&lt;/span&gt;&lt;/p&gt;&lt;ul class=&quot;list nomark&quot; data-dcnode-id=&quot;4521&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4594&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4595&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4600&quot;&gt;&lt;span data-dcnode-id=&quot;4601&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4599&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4597&quot;&gt;&lt;span data-dcnode-id=&quot;4598&quot; instrument_node=&quot;&quot;&gt;Protestant (non-English) West&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4596&quot; instrument_node=&quot;&quot;&gt;: Denmark, Finland, Iceland, Netherlands, Norway, Switzerland.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4586&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4587&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4592&quot;&gt;&lt;span data-dcnode-id=&quot;4593&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4591&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4589&quot;&gt;&lt;span data-dcnode-id=&quot;4590&quot; instrument_node=&quot;&quot;&gt;English West&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4588&quot; instrument_node=&quot;&quot;&gt;: Australia, Canada, Ireland, New Zealand, USA, UK.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4578&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4579&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4584&quot;&gt;&lt;span data-dcnode-id=&quot;4585&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4583&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quo
