&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;table-wrap&quot; data-dcnode-id=&quot;4399&quot; data-magellan-destination=&quot;tab3&quot; id=&quot;tab3&quot;&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4406&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4412&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4414&quot;&gt;&lt;span data-dcnode-id=&quot;4415&quot; instrument_node=&quot;&quot;&gt;Table 3.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4413&quot; instrument_node=&quot;&quot;&gt; WVS item-battery asking for people's notion of democracy&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4407&quot;&gt;&lt;span data-dcnode-id=&quot;4411&quot; instrument_node=&quot;&quot;&gt; Many things may be desirable, but not all of them are essential characteristics of democracy. Please tell me for each of the following things how essential you think it is as a characteristic of democracy. Use this scale where 1 means ‘not at all an essential characteristic of democracy’ and 10 means it definitely is ‘an essential characteristic of democracy’ (&lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4409&quot;&gt;&lt;span data-dcnode-id=&quot;4410&quot; instrument_node=&quot;&quot;&gt;read out and code one answer for each&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4408&quot; instrument_node=&quot;&quot;&gt;):&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4400&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4405&quot; data-img-name=&quot;Table 3.&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172404-50837-largeThumb-S1468109910000277_tab3.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172404-89089-optimisedImage-S1468109910000277_tab3.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_tab3.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172404-19615-smallThumb-S1468109910000277_tab3.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172404-85283-mediumThumb-S1468109910000277_tab3.jpg?pub-status=live&quot; data-zoomable=&quot;true&quot; height=&quot;259&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;810&quot;&gt;&lt;button aria-label=&quot;Open Table 3. image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4401&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4404&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuMjUydjIyLjQ5NmMwIC42OTMtLjU2NCAxLjI1Mi0xLjI1MiAxLjI1Mkg5LjI1MkM4LjU1OSAzMyA4IDMyLjQzNiA4IDMxLjc0OFY5LjI1MkM4IDguNTU5IDguNTY0IDggOS4yNTIgOHptLTEuNzUzIDIuNDk4SDExYy0uMjggMC0uNTAyLjIyNy0uNTAyLjUwMnYxMC4yNDVjMCAuMjc5LjIyNy41MDEuNTAyLjUwMWg2Ljk5N2MuNjkzIDAgMS4yNTEuNTY0IDEuMjUxIDEuMjUyVjMwYzAgLjI4LjIyOC41MDIuNTAyLjUwMmgxMC4yNDVjLjI4IDAgLjUwMi0uMjI3LjUwMi0uNTAyVjExYzAtLjI4LS4yMjgtLjUwMi0uNTAyLS41MDJ6TTI2Ljc0NyAxM2MuNjkzIDAgMS4yNTIuNTU5IDEuMjUyIDEuMjUydjVjMCAuNjk0LS41NjQgMS4yNTItMS4yNTIgMS4yNTItLjY5MyAwLTEuMjUxLS41NjQtMS4yNTEtMS4yNTF2LTEuOTgxbC0yLjg2NSAyLjg2NWMtLjY0Mi42NDEtMS41MjYuMjQzLTEuNzY5IDAtLjQ4Ni0uNDkxLS40ODYtMS4yODMgMC0xLjc2OWwyLjg2NS0yLjg2NWgtMS45OGMtLjY5NCAwLTEuMjUyLS41NjQtMS4yNTItMS4yNTEgMC0uNjkzLjU2NC0xLjI1MiAxLjI1MS0xLjI1MnoiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;4403&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4397&quot;&gt;&lt;span data-dcnode-id=&quot;4398&quot; instrument_node=&quot;&quot;&gt; These items were designed to measure the emphases on four different notions of democracy:
&lt;/span&gt;&lt;/p&gt;&lt;ol class=&quot;list number nomark&quot; data-dcnode-id=&quot;4364&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4389&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4390&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4395&quot;&gt;&lt;span data-dcnode-id=&quot;4396&quot; instrument_node=&quot;&quot;&gt;(1)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4394&quot; instrument_node=&quot;&quot;&gt; a &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4392&quot;&gt;&lt;span data-dcnode-id=&quot;4393&quot; instrument_node=&quot;&quot;&gt;liberal&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4391&quot; instrument_node=&quot;&quot;&gt; Western notion when people emphasize the freedoms that empower people as democracy's defining feature;&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4381&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4382&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4387&quot;&gt;&lt;span data-dcnode-id=&quot;4388&quot; instrument_node=&quot;&quot;&gt;(2)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4386&quot; instrument_node=&quot;&quot;&gt; a &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4384&quot;&gt;&lt;span data-dcnode-id=&quot;4385&quot; instrument_node=&quot;&quot;&gt;social&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4383&quot; instrument_node=&quot;&quot;&gt; notion when people emphasize redistributive policies that are part of the welfare state as democracy's defining feature;&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4373&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4374&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4379&quot;&gt;&lt;span data-dcnode-id=&quot;4380&quot; instrument_node=&quot;&quot;&gt;(3)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4378&quot; instrument_node=&quot;&quot;&gt; a &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4376&quot;&gt;&lt;span data-dcnode-id=&quot;4377&quot; instrument_node=&quot;&quot;&gt;populist&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4375&quot; instrument_node=&quot;&quot;&gt; notion when people emphasize bread-and-butter and law-and-order issues that are often widely popular but have in fact little to do with democracy as democracy's defining feature;&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4365&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4366&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4371&quot;&gt;&lt;span data-dcnode-id=&quot;4372&quot; instrument_node=&quot;&quot;&gt;(4)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4370&quot; instrument_node=&quot;&quot;&gt; an &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4368&quot;&gt;&lt;span data-dcnode-id=&quot;4369&quot; instrument_node=&quot;&quot;&gt;authoritarian&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4367&quot; instrument_node=&quot;&quot;&gt; notion when people emphasize anti-democratic extra powers of the military and religious authorities as democracy's defining feature.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p class=&quot;p continuation&quot; data-dcnode-id=&quot;4362&quot;&gt;&lt;span data-dcnode-id=&quot;4363&quot; instrument_node=&quot;&quot;&gt;
The liberal notion is covered by the items referring to free elections (V154), referenda votes (V160), civil rights (V157), and equal rights (V161). The social notion is covered by the items addressing the welfare state (V155) and economic redistribution (V152). The populist notion is included in the items relating to economic prosperity as a bread-and-butter issue (V158) and fighting crime as a law-and-order issue (V159). And the authoritarian notion is covered by the items favoring military intervention (V156) and religious authority (V153) as defining elements of democracy.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4339&quot;&gt;&lt;span data-dcnode-id=&quot;4361&quot; instrument_node=&quot;&quot;&gt; Advocates of the Asian Values Thesis characterize the liberal notion of democracy as a Western notion that is not universally endorsed among people in non-Western cultures, most notably in Asia. Recent evidence by Dalton, Shin and Jou (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4357&quot; href=&quot;#ref19&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4359&quot;&gt;&lt;span data-dcnode-id=&quot;4360&quot; instrument_node=&quot;&quot;&gt;Reference Dalton, Shin and Jou&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4358&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4356&quot; instrument_node=&quot;&quot;&gt;) seems to contradict this proposition, showing that the liberal notion of democracy is endorsed all around the globe. Valid as this evidence might be, it is not necessarily conclusive. As outlined by Schedler and Sarsfield (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4352&quot; href=&quot;#ref22&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4354&quot;&gt;&lt;span data-dcnode-id=&quot;4355&quot; instrument_node=&quot;&quot;&gt;Reference Schedler and Sarsfield&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4353&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4351&quot; instrument_node=&quot;&quot;&gt;), people can have mixed notions of democracy, so that even a strong endorsement of liberal democracy can be confused by a similarly strong endorsement of conflicting notions of democracy. Some evidence that this possibility is a reality in Asia is provided by Chu &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4349&quot;&gt;&lt;span data-dcnode-id=&quot;4350&quot; instrument_node=&quot;&quot;&gt;et al&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4348&quot; instrument_node=&quot;&quot;&gt;. (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4344&quot; href=&quot;#ref3&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4346&quot;&gt;&lt;span data-dcnode-id=&quot;4347&quot; instrument_node=&quot;&quot;&gt;Reference Chu, Diamond, Nathan, Shin, Chu, Diamond, Nathan and Shin&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4345&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4343&quot; instrument_node=&quot;&quot;&gt;: 12–13). Thus, what matters is &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4341&quot;&gt;&lt;span data-dcnode-id=&quot;4342&quot; instrument_node=&quot;&quot;&gt;how exclusively&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4340&quot; instrument_node=&quot;&quot;&gt; people connote democracy in liberal terms. The liberal notion of democracy may not be absent in Asian countries, but it might be more strongly rivaled by alternative notions than is the case in Western countries. If this were true, there would be an Asian–Western difference as regards the dominance of liberal over competing notions of democracy. In this case, the Asian Values Thesis would be correct. In order to test this possibility, the endorsement of liberal democracy has to be measured in opposition to the endorsement of conflicting notions of democracy.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4337&quot;&gt;&lt;span data-dcnode-id=&quot;4338&quot; instrument_node=&quot;&quot;&gt; One possibility for doing this is to look at how respondents score on average over all liberal items and over all non-liberal items and then calculate the difference between the two averages. However, this would treat all non-liberal understandings equally when in fact their conflict with the liberal understanding varies in strength.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4335&quot;&gt;&lt;span data-dcnode-id=&quot;4336&quot; instrument_node=&quot;&quot;&gt; Relative to the liberal definition, an authoritarian definition of democracy is directly contradictory. Thus, one can qualify someone's understanding of democracy as consistently liberal only if the person emphasizes the liberal features of democracy and at the same time rejects the authoritarian ones. This means that the authoritarian item rating has to be subtracted with full weight from the liberal item rating.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4327&quot;&gt;&lt;span data-dcnode-id=&quot;4334&quot; instrument_node=&quot;&quot;&gt; The populist understanding of democracy defines features as democratic that have nothing to do with the definition of democracy. Thus, if we want to measure how exclusively liberal people define democracy, the populist item ratings have to be subtracted from the liberal ones too. Yet, populism should not be subtracted from liberalism with the same weight as authoritarianism. This is so for the following reason. While the authoritarian definition is plainly &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4332&quot;&gt;&lt;span data-dcnode-id=&quot;4333&quot; instrument_node=&quot;&quot;&gt;anti&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4331&quot; instrument_node=&quot;&quot;&gt;-liberal, the populist one is just &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4329&quot;&gt;&lt;span data-dcnode-id=&quot;4330&quot; instrument_node=&quot;&quot;&gt;non&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4328&quot; instrument_node=&quot;&quot;&gt;-liberal: it rivals but does not contradict the liberal understanding, indicating a lower degree of tension. The existing but lesser tension should be modeled by subtracting the populist item ratings from the liberal ones, yet subtracting them with a lower weight than the authoritarian ones.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4319&quot;&gt;&lt;span data-dcnode-id=&quot;4326&quot; instrument_node=&quot;&quot;&gt; The authoritarian definition of democracy contradicts the liberal definition and is hence anti-liberal. The populist definition of democracy rivals the liberal one and is thus non-liberal. By contrast, the social definition of democracy is neutral to the liberal definition. The social definition addresses redistributive features whose endorsement or rejection both are compatible with a liberal definition of democracy. Endorsement of the social features is compatible with a &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4324&quot;&gt;&lt;span data-dcnode-id=&quot;4325&quot; instrument_node=&quot;&quot;&gt;social-liberal&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4323&quot; instrument_node=&quot;&quot;&gt; understanding of democracy. Refusal of the social features is compatible with a &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4321&quot;&gt;&lt;span data-dcnode-id=&quot;4322&quot; instrument_node=&quot;&quot;&gt;market-liberal&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4320&quot; instrument_node=&quot;&quot;&gt; understanding of democracy. In other words, any position towards redistributive features is equally compatible with a liberal definition of democracy. Because of this neutrality, the social item ratings should not be subtracted from the liberal item ratings when one wants to measure the dominance of the liberal over contradictory and rival definitions, but not over compatible definitions.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4300&quot;&gt;&lt;span data-dcnode-id=&quot;4318&quot; instrument_node=&quot;&quot;&gt; The exploratory factor analysis of the ten democracy items in &lt;/span&gt;&lt;a class=&quot;xref table&quot; data-dcnode-id=&quot;4316&quot; href=&quot;#tab4&quot;&gt;&lt;span data-dcnode-id=&quot;4317&quot; instrument_node=&quot;&quot;&gt;Table 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4315&quot; instrument_node=&quot;&quot;&gt; confirms this consideration.&lt;/span&gt;&lt;a class=&quot;xref fn&quot; data-dcnode-id=&quot;4310&quot; href=&quot;#fn4&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4313&quot;&gt;&lt;span data-dcnode-id=&quot;4314&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;4311&quot;&gt;&lt;span data-dcnode-id=&quot;4312&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4309&quot; instrument_node=&quot;&quot;&gt; There are three dimensions that shape people's notion of democracy. The first dimension represents a direct polarity between the liberal notion and the authoritarian notion: the liberal items load on the positive pole, the authoritarian ones at the negative pole of this liberal and anti-authoritarian dimension. The second dimension represents the populist and the third one the social notion of democracy. This pattern justifies an index that measures how &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4307&quot;&gt;&lt;span data-dcnode-id=&quot;4308&quot; instrument_node=&quot;&quot;&gt;dominantly&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4306&quot; instrument_node=&quot;&quot;&gt; liberal people define democracy by subtracting from people's liberal item rating their authoritarian item rating with full weight and their populist item rating with half a weight, as expressed in this formula (see Klingemann, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4302&quot; href=&quot;#ref21&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4304&quot;&gt;&lt;span data-dcnode-id=&quot;4305&quot; instrument_node=&quot;&quot;&gt;Reference Klingemann and Norris&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4303&quot; instrument_node=&quot;&quot;&gt;1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4301&quot; instrument_node=&quot;&quot;&gt; for a similar rationale):
&lt;/span&gt;&lt;/p&gt;&lt;ol class=&quot;list number nomark&quot; data-dcnode-id=&quot;4294&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4295&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4296&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4298&quot;&gt;&lt;span data-dcnode-id=&quot;4299&quot; instrument_node=&quot;&quot;&gt;1.0&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4297&quot; instrument_node=&quot;&quot;&gt; * Ø liberal rating −0.67 * Ø authoritarian rating −0.33 * Ø populist rating&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p class=&quot;p continuation&quot; data-dcnode-id=&quot;4287&quot;&gt;&lt;span data-dcnode-id=&quot;4293&quot; instrument_node=&quot;&quot;&gt;
After having recoded all item ratings from their original 1–10 scales into 0–1.0 scales, this formula produces an index from –1.0, for the case that alternative notions entirely dominate the liberal one, to +1.0, for the opposite case. A score of 0 on this index indicates that a respondent endorses the liberal and alternative notions of democracy equally strongly.&lt;/span&gt;&lt;a class=&quot;xref fn&quot; data-dcnode-id=&quot;4288&quot; href=&quot;#fn5&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4291&quot;&gt;&lt;span data-dcnode-id=&quot;4292&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;4289&quot;&gt;&lt;span data-dcnode-id=&quot;4290&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;div class=&quot;table-wrap&quot; data-dcnode-id=&quot;4268&quot; data-magellan-destination=&quot;tab4&quot; id=&quot;tab4&quot;&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4282&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4283&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4285&quot;&gt;&lt;span data-dcnode-id=&quot;4286&quot; instrument_node=&quot;&quot;&gt;Table 4.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4284&quot; instrument_node=&quot;&quot;&gt; Empirical dimensions in popular notions of democracy&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4276&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4281&quot; data-img-name=&quot;Table 4.&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172406-27133-largeThumb-S1468109910000277_tab4.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172406-93912-optimisedImage-S1468109910000277_tab4.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_tab4.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172406-45756-smallThumb-S1468109910000277_tab4.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172406-12696-mediumThumb-S1468109910000277_tab4.jpg?pub-status=live&quot; data-zoomable=&quot;false&quot; height=&quot;331&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;551&quot;&gt;&lt;button aria-label=&quot;Open Table 4. image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4277&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4280&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuMjUydjIyLjQ5NmMwIC42OTMtLjU2NCAxLjI1Mi0xLjI1MiAxLjI1Mkg5LjI1MkM4LjU1OSAzMyA4IDMyLjQzNiA4IDMxLjc0OFY5LjI1MkM4IDguNTU5IDguNTY0IDggOS4yNTIgOHptLTEuNzUzIDIuNDk4SDExYy0uMjggMC0uNTAyLjIyNy0uNTAyLjUwMnYxMC4yNDVjMCAuMjc5LjIyNy41MDEuNTAyLjUwMWg2Ljk5N2MuNjkzIDAgMS4yNTEuNTY0IDEuMjUxIDEuMjUyVjMwYzAgLjI4LjIyOC41MDIuNTAyLjUwMmgxMC4yNDVjLjI4IDAgLjUwMi0uMjI3LjUwMi0uNTAyVjExYzAtLjI4LS4yMjgtLjUwMi0uNTAyLS41MDJ6TTI2Ljc0NyAxM2MuNjkzIDAgMS4yNTIuNTU5IDEuMjUyIDEuMjUydjVjMCAuNjk0LS41NjQgMS4yNTItMS4yNTIgMS4yNTItLjY5MyAwLTEuMjUxLS41NjQtMS4yNTEtMS4yNTF2LTEuOTgxbC0yLjg2NSAyLjg2NWMtLjY0Mi42NDEtMS41MjYuMjQzLTEuNzY5IDAtLjQ4Ni0uNDkxLS40ODYtMS4yODMgMC0xLjc2OWwyLjg2NS0yLjg2NWgtMS45OGMtLjY5NCAwLTEuMjUyLS41NjQtMS4yNTItMS4yNTEgMC0uNjkzLjU2NC0xLjI1MiAxLjI1MS0xLjI1MnoiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;4279&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;table-wrap-foot&quot; data-dcnode-id=&quot;4269&quot;&gt;&lt;div class=&quot;fn&quot; data-dcnode-id=&quot;4270&quot; data-magellan-destination=&quot;tab4-tfn001&quot; id=&quot;tab4-tfn001&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4271&quot;&gt;&lt;span data-dcnode-id=&quot;4275&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4273&quot;&gt;&lt;span data-dcnode-id=&quot;4274&quot; instrument_node=&quot;&quot;&gt;Notes&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4272&quot; instrument_node=&quot;&quot;&gt;: Entries are factor loadings. Items are standardized for each respondent's mean rating over all items. Factor analysis specified with varimax rotation under the Kaiser criterion. Loadings below 0.40 not shown. Data source is the country-pooled individual-level dataset of WVS V (2005–8)&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4260&quot;&gt;&lt;span data-dcnode-id=&quot;4267&quot; instrument_node=&quot;&quot;&gt; In order to test the Asian Values Thesis against the counter-propositions from the Human Development Thesis, we need measures of cognitive empowerment at the individual level and the country level. At the individual level, I measure cognitive empowerment by people's level of formal education. This information is taken from WVS question V238, which asks for people's level of education on an eight-point ordinal scale.&lt;/span&gt;&lt;a class=&quot;xref fn&quot; data-dcnode-id=&quot;4262&quot; href=&quot;#fn6&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4265&quot;&gt;&lt;span data-dcnode-id=&quot;4266&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;4263&quot;&gt;&lt;span data-dcnode-id=&quot;4264&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4261&quot; instrument_node=&quot;&quot;&gt; Even though educational systems differ in content and quality between countries, in each country a higher level of education usually implies more factual knowledge, higher problem awareness, and better intellectual skills. Thus, formal education is a formidable proxy for differences in people's cognitive empowerment at the individual level.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4252&quot;&gt;&lt;span data-dcnode-id=&quot;4259&quot; instrument_node=&quot;&quot;&gt; The advancement of an entire country's cognitive empowerment can be measured in a broader fashion than just by education. In addition to education, other areas of cognitive empowerment include the availability of information technology in a country and a country's per capita scientific output. The World Bank provides a summary index of all three aspects of cognitive empowerment (formal education, information technology, scientific output) and labels it ‘Knowledge Index (KI)’.&lt;/span&gt;&lt;a class=&quot;xref fn&quot; data-dcnode-id=&quot;4254&quot; href=&quot;#fn7&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4257&quot;&gt;&lt;span data-dcnode-id=&quot;4258&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;4255&quot;&gt;&lt;span data-dcnode-id=&quot;4256&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4253&quot; instrument_node=&quot;&quot;&gt; In the words of its authors, ‘the KI measures a society's ability to generate, adopt and, diffuse knowledge. The KI is the simple average of the normalized scores of a society on the key variables in the three knowledge economy pillars: education, innovation, and ICT.’ Accordingly, the knowledge index is based on such measures as the tertiary enrollment ratio per cohort (education), the number of patents per 10,000 inhabitants (innovation), and the number of internet hosts per 1,000 inhabitants (ICT). I have rescaled the index into a range from 0 to 1.0, with higher fractions indicating a higher extent of ‘knowledge development’, the label used in the following for this variable.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;sec&quot; data-dcnode-id=&quot;3985&quot; data-magellan-destination=&quot;sec5&quot; id=&quot;sec5&quot;&gt;&lt;h2 class=&quot;A&quot; data-dcnode-id=&quot;4247&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4249&quot;&gt;&lt;span data-dcnode-id=&quot;4250&quot; instrument_node=&quot;&quot;&gt;4.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4248&quot; instrument_node=&quot;&quot;&gt; Findings&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;sec&quot; data-dcnode-id=&quot;4179&quot; data-magellan-destination=&quot;sec5-1&quot; id=&quot;sec5-1&quot;&gt;&lt;h3 class=&quot;B&quot; data-dcnode-id=&quot;4245&quot;&gt;&lt;span data-dcnode-id=&quot;4246&quot; instrument_node=&quot;&quot;&gt; Distributions and rankings on emancipative values&lt;/span&gt;&lt;/h3&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4240&quot;&gt;&lt;span data-dcnode-id=&quot;4244&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4242&quot; href=&quot;#fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4243&quot; instrument_node=&quot;&quot;&gt;Figure 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4241&quot; instrument_node=&quot;&quot;&gt; illustrates for a selection of nine countries how populations distribute over the index of emancipative values. Since I use country-mean scores in emancipative values, we have to be sure that these mean scores validly represent a country's central tendency. For this to be the case, national distributions must be single-peaked and mean-clustered. Otherwise, as in the case of a bimodal distribution with peaks at opposite ends, country-mean scores hide polarizations and are not a good representative of central tendencies in emancipative values.
&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;4227&quot;&gt;&lt;div class=&quot;fig&quot; data-dcnode-id=&quot;4228&quot; data-magellan-destination=&quot;fig2&quot; id=&quot;fig2&quot;&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4234&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4239&quot; data-img-name=&quot;Figure 2&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172003-72782-largeThumb-S1468109910000277_fig2g.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172003-55805-optimisedImage-S1468109910000277_fig2g.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_fig2g.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172003-11564-smallThumb-S1468109910000277_fig2g.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172003-76578-mediumThumb-S1468109910000277_fig2g.jpg?pub-status=live&quot; data-zoomable=&quot;true&quot; height=&quot;944&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;1252&quot;&gt;&lt;button aria-label=&quot;Open Figure 2 image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4235&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4238&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuMjUydjIyLjQ5NmMwIC42OTMtLjU2NCAxLjI1Mi0xLjI1MiAxLjI1Mkg5LjI1MkM4LjU1OSAzMyA4IDMyLjQzNiA4IDMxLjc0OFY5LjI1MkM4IDguNTU5IDguNTY0IDggOS4yNTIgOHptLTEuNzUzIDIuNDk4SDExYy0uMjggMC0uNTAyLjIyNy0uNTAyLjUwMnYxMC4yNDVjMCAuMjc5LjIyNy41MDEuNTAyLjUwMWg2Ljk5N2MuNjkzIDAgMS4yNTEuNTY0IDEuMjUxIDEuMjUyVjMwYzAgLjI4LjIyOC41MDIuNTAyLjUwMmgxMC4yNDVjLjI4IDAgLjUwMi0uMjI3LjUwMi0uNTAyVjExYzAtLjI4LS4yMjgtLjUwMi0uNTAyLS41MDJ6TTI2Ljc0NyAxM2MuNjkzIDAgMS4yNTIuNTU5IDEuMjUyIDEuMjUydjVjMCAuNjk0LS41NjQgMS4yNTItMS4yNTIgMS4yNTItLjY5MyAwLTEuMjUxLS41NjQtMS4yNTEtMS4yNTF2LTEuOTgxbC0yLjg2NSAyLjg2NWMtLjY0Mi42NDEtMS41MjYuMjQzLTEuNzY5IDAtLjQ4Ni0uNDkxLS40ODYtMS4yODMgMC0xLjc2OWwyLjg2NS0yLjg2NWgtMS45OGMtLjY5NCAwLTEuMjUyLS41NjQtMS4yNTItMS4yNTEgMC0uNjkzLjU2NC0xLjI1MiAxLjI1MS0xLjI1MnoiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;4237&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4229&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4230&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4232&quot;&gt;&lt;span data-dcnode-id=&quot;4233&quot; instrument_node=&quot;&quot;&gt;Figure 2&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4231&quot; instrument_node=&quot;&quot;&gt; Selected national distributions over the emancipative values index. In each of the nine diagrams, the x-axis displays the index of emancipative values in ten consecutive intervals, each of .10-width, from 0 to 1.0.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4219&quot;&gt;&lt;span data-dcnode-id=&quot;4226&quot; instrument_node=&quot;&quot;&gt; Because of space restrictions, &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4224&quot; href=&quot;#fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4225&quot; instrument_node=&quot;&quot;&gt;Figure 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4223&quot; instrument_node=&quot;&quot;&gt; only depicts nine out of 87 countries for which the index of emancipative values is available. To select these nine countries, I divided the emancipative values index into three scale ranges: low (from 0 to 0.33 scale points), medium (from 0.33 to 0.66), and high (above 0.66 scale points). Then I selected for each of the three ranges three countries, making sure that every time one Asian country is included. The three countries in the top row of &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4221&quot; href=&quot;#fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4222&quot; instrument_node=&quot;&quot;&gt;Figure 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4220&quot; instrument_node=&quot;&quot;&gt; have mean scores in the low range of emancipative values with India being one of the Asian countries in this group. The countries in the second row have mean scores in the middle range of emancipative values with Taiwan being an Asian representative in this group. The three countries in the last row have mean scores in the upper range of emancipative values with Japan being an Asian representative.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4214&quot;&gt;&lt;span data-dcnode-id=&quot;4218&quot; instrument_node=&quot;&quot;&gt; Looking at &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4216&quot; href=&quot;#fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4217&quot; instrument_node=&quot;&quot;&gt;Figure 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4215&quot; instrument_node=&quot;&quot;&gt;, we find single-peaked and mean-clustered distributions everywhere. I can assure that this is the case, without a single exception, for all 87 country samples. Hence, national mean scores in emancipative values can be considered as valid representations of a given population's central cultural tendency.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4203&quot;&gt;&lt;span data-dcnode-id=&quot;4213&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4211&quot; href=&quot;#fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4212&quot; instrument_node=&quot;&quot;&gt;Figure 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4210&quot; instrument_node=&quot;&quot;&gt; evidences two additional points. First, emancipative values vary &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4208&quot;&gt;&lt;span data-dcnode-id=&quot;4209&quot; instrument_node=&quot;&quot;&gt;within&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4207&quot; instrument_node=&quot;&quot;&gt; Asian countries by the same distributional shape and to about the same extent as they do within non-Western countries. Second, the variation in emancipative values &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4205&quot;&gt;&lt;span data-dcnode-id=&quot;4206&quot; instrument_node=&quot;&quot;&gt;between&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4204&quot; instrument_node=&quot;&quot;&gt; Asian countries can be as pronounced as that between non-Asian countries. This is obvious from the fact that we find at least one Asian country in all three scale ranges of emancipative values. There is no Asian homogeneity indicating a consistently weak emphasis on emancipative values, as the strong version of the Asian Values Thesis suggests.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4198&quot;&gt;&lt;span data-dcnode-id=&quot;4202&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4200&quot; href=&quot;#fig3&quot;&gt;&lt;span data-dcnode-id=&quot;4201&quot; instrument_node=&quot;&quot;&gt;Figure 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4199&quot; instrument_node=&quot;&quot;&gt; ranks all countries on the index of emancipative values. Again, contrary to the strong version of the Asian Values Thesis, Asian countries do not cluster in a homogenous group in opposition to the ‘West’. Instead, we find Asian countries across the entire scale range, with Japan ranking well among Western countries. In fact, Japan's mean score in emancipative values is above that of the UK and even the US. In the midfield, we find South Korea, Taiwan, and Hong Kong with emancipative values at about the level of Ireland or Portugal, to use some Western examples.
&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;4185&quot;&gt;&lt;div class=&quot;fig&quot; data-dcnode-id=&quot;4186&quot; data-magellan-destination=&quot;fig3&quot; id=&quot;fig3&quot;&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4192&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4197&quot; data-img-name=&quot;Figure 3&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172006-93591-largeThumb-S1468109910000277_fig3g.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172006-98962-optimisedImage-S1468109910000277_fig3g.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_fig3g.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172006-58433-smallThumb-S1468109910000277_fig3g.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172006-18232-mediumThumb-S1468109910000277_fig3g.jpg?pub-status=live&quot; data-zoomable=&quot;true&quot; height=&quot;905&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;944&quot;&gt;&lt;button aria-label=&quot;Open Figure 3 image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4193&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4196&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuMjUydjIyLjQ5NmMwIC42OTMtLjU2NCAxLjI1Mi0xLjI1MiAxLjI1Mkg5LjI1MkM4LjU1OSAzMyA4IDMyLjQzNiA4IDMxLjc0OFY5LjI1MkM4IDguNTU5IDguNTY0IDggOS4yNTIgOHptLTEuNzUzIDIuNDk4SDExYy0uMjggMC0uNTAyLjIyNy0uNTAyLjUwMnYxMC4yNDVjMCAuMjc5LjIyNy41MDEuNTAyLjUwMWg2Ljk5N2MuNjkzIDAgMS4yNTEuNTY0IDEuMjUxIDEuMjUyVjMwYzAgLjI4LjIyOC41MDIuNTAyLjUwMmgxMC4yNDVjLjI4IDAgLjUwMi0uMjI3LjUwMi0uNTAyVjExYzAtLjI4LS4yMjgtLjUwMi0uNTAyLS41MDJ6TTI2Ljc0NyAxM2MuNjkzIDAgMS4yNTIuNTU5IDEuMjUyIDEuMjUydjVjMCAuNjk0LS41NjQgMS4yNTItMS4yNTIgMS4yNTItLjY5MyAwLTEuMjUxLS41NjQtMS4yNTEtMS4yNTF2LTEuOTgxbC0yLjg2NSAyLjg2NWMtLjY0Mi42NDEtMS41MjYuMjQzLTEuNzY5IDAtLjQ4Ni0uNDkxLS40ODYtMS4yODMgMC0xLjc2OWwyLjg2NS0yLjg2NWgtMS45OGMtLjY5NCAwLTEuMjUyLS41NjQtMS4yNTItMS4yNTEgMC0uNjkzLjU2NC0xLjI1MiAxLjI1MS0xLjI1MnoiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;4195&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4187&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4188&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4190&quot;&gt;&lt;span data-dcnode-id=&quot;4191&quot; instrument_node=&quot;&quot;&gt;Figure 3&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4189&quot; instrument_node=&quot;&quot;&gt; The ranking of countries on the emancipative values index&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4180&quot;&gt;&lt;span data-dcnode-id=&quot;4184&quot; instrument_node=&quot;&quot;&gt; On the other hand, most &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4182&quot;&gt;&lt;span data-dcnode-id=&quot;4183&quot; instrument_node=&quot;&quot;&gt;South&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4181&quot; instrument_node=&quot;&quot;&gt; Asian countries – including Pakistan, Bangladesh, India, and Indonesia – cluster in the lower third of emancipative values where we don't find a single Western country. According to this pattern, it is South Asia in particular rather than Asia in general that appears to be distinct from the West. But this finding does not support South Asian exceptionalism, because countries in South Asia share this distinction from the West with Core Muslim countries and Sub-Saharan African countries.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;sec&quot; data-dcnode-id=&quot;4082&quot; data-magellan-destination=&quot;sec5-2&quot; id=&quot;sec5-2&quot;&gt;&lt;h3 class=&quot;B&quot; data-dcnode-id=&quot;4177&quot;&gt;&lt;span data-dcnode-id=&quot;4178&quot; instrument_node=&quot;&quot;&gt; Cognitive empowerment and emancipative values&lt;/span&gt;&lt;/h3&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4172&quot;&gt;&lt;span data-dcnode-id=&quot;4176&quot; instrument_node=&quot;&quot;&gt; The Human Development Thesis considers emancipative values as a manifestation of motivational empowerment, which is supposed to advance in response to people's cognitive empowerment, as levels of education rise. To test this proposition, &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4174&quot; href=&quot;#fig4&quot;&gt;&lt;span data-dcnode-id=&quot;4175&quot; instrument_node=&quot;&quot;&gt;Figure 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4173&quot; instrument_node=&quot;&quot;&gt; shows separately for each of the ten culture zones how strongly people at different levels of education emphasize emancipative values. Levels of education increase from lowest at the left end to highest at the right end.
&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;4159&quot;&gt;&lt;div class=&quot;fig&quot; data-dcnode-id=&quot;4160&quot; data-magellan-destination=&quot;fig4&quot; id=&quot;fig4&quot;&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4166&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4171&quot; data-img-name=&quot;Figure 4&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172006-35455-largeThumb-S1468109910000277_fig4g.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172006-74877-optimisedImage-S1468109910000277_fig4g.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_fig4g.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172006-07938-smallThumb-S1468109910000277_fig4g.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172006-70482-mediumThumb-S1468109910000277_fig4g.jpg?pub-status=live&quot; data-zoomable=&quot;true&quot; height=&quot;939&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;944&quot;&gt;&lt;button aria-label=&quot;Open Figure 4 image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4167&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4170&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuMjUydjIyLjQ5NmMwIC42OTMtLjU2NCAxLjI1Mi0xLjI1MiAxLjI1Mkg5LjI1MkM4LjU1OSAzMyA4IDMyLjQzNiA4IDMxLjc0OFY5LjI1MkM4IDguNTU5IDguNTY0IDggOS4yNTIgOHptLTEuNzUzIDIuNDk4SDExYy0uMjggMC0uNTAyLjIyNy0uNTAyLjUwMnYxMC4yNDVjMCAuMjc5LjIyNy41MDEuNTAyLjUwMWg2Ljk5N2MuNjkzIDAgMS4yNTEuNTY0IDEuMjUxIDEuMjUyVjMwYzAgLjI4LjIyOC41MDIuNTAyLjUwMmgxMC4yNDVjLjI4IDAgLjUwMi0uMjI3LjUwMi0uNTAyVjExYzAtLjI4LS4yMjgtLjUwMi0uNTAyLS41MDJ6TTI2Ljc0NyAxM2MuNjkzIDAgMS4yNTIuNTU5IDEuMjUyIDEuMjUydjVjMCAuNjk0LS41NjQgMS4yNTItMS4yNTIgMS4yNTItLjY5MyAwLTEuMjUxLS41NjQtMS4yNTEtMS4yNTF2LTEuOTgxbC0yLjg2NSAyLjg2NWMtLjY0Mi42NDEtMS41MjYuMjQzLTEuNzY5IDAtLjQ4Ni0uNDkxLS40ODYtMS4yODMgMC0xLjc2OWwyLjg2NS0yLjg2NWgtMS45OGMtLjY5NCAwLTEuMjUyLS41NjQtMS4yNTItMS4yNTEgMC0uNjkzLjU2NC0xLjI1MiAxLjI1MS0xLjI1MnoiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;4169&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4161&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4162&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4164&quot;&gt;&lt;span data-dcnode-id=&quot;4165&quot; instrument_node=&quot;&quot;&gt;Figure 4&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4163&quot; instrument_node=&quot;&quot;&gt; Emancipative values by level of education across culture zones&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4154&quot;&gt;&lt;span data-dcnode-id=&quot;4158&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4156&quot; href=&quot;#fig4&quot;&gt;&lt;span data-dcnode-id=&quot;4157&quot; instrument_node=&quot;&quot;&gt;Figure 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4155&quot; instrument_node=&quot;&quot;&gt; seems to confirm Proposition 1.1 of the Asian Values Thesis at least partially. The overall emphasis on emancipative values is lower in East and South Asia than in all four groups of Western countries. This pattern holds true for people at every level of education. But again, this pattern is more pronounced for South Asia than for East Asia. In fact, among the most educated, East Asians place almost as much emphasis on emancipative values as do people in Western countries. Once educated, East Asians’ emancipative values are closer to Westerners’ emancipative values than to those of South Asians.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4152&quot;&gt;&lt;span data-dcnode-id=&quot;4153&quot; instrument_node=&quot;&quot;&gt; Proposition 1.2 of the Asian Values Thesis too seems to be partially confirmed, but once more only for South Asia, not East Asia. Even though education associates with stronger emphasis on emancipative values among people of all culture zones, this universality is considerably weaker in South Asia than in Western countries, and in fact is broken with respect to people at the highest level of education. This is evident from the flatter upward slope by which education associates with emancipative values in South Asia and the drop of that slope towards the highest level of education. Again, however, South Asia is not unique in this regard: it shares with Sub-Saharan African countries and Core Muslim countries a weaker – though still positive – association between education and emancipative values.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4150&quot;&gt;&lt;span data-dcnode-id=&quot;4151&quot; instrument_node=&quot;&quot;&gt; As concerns the effect of education in East Asia, Proposition 1.2 does not hold at all. On the contrary, formal education associates even somewhat more strongly with emancipative values in East Asia than it does in Western countries. This is obvious from the slightly steeper slope by which emphasis on emancipative values rises with education in East Asia.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4148&quot;&gt;&lt;span data-dcnode-id=&quot;4149&quot; instrument_node=&quot;&quot;&gt; So far, the evidence seems to confirm the Asian Values Thesis at least partially. Yet, even this partial confirmation can be misleading. Overall, Asian countries might show a lower emphasis on emancipative values for other reasons than an inherited Asian–Western cultural chasm. Likewise, the association between education and emancipative values might be weaker in South Asia than in Western countries for other reasons than a cultural chasm. As the Human Development Thesis suggests, one of these reasons is the advancement of cognitive empowerment in a country, which is manifest in a country's knowledge development. Thus, the farther knowledge development is advanced in a country, the stronger is the population's overall emphasis on emancipative values and the stronger is the association between education and emancipative values within this country. If this were true, one could conclude the following: the overall emphasis on emancipative values is lower in most of Asia than in the West and the association between education and emancipative values is weaker in most of Asia than in the West because the process of knowledge development is less advanced in large parts of Asia than in most of the West, and not because of an innate cultural resistance of Asia against emancipative values.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4143&quot;&gt;&lt;span data-dcnode-id=&quot;4147&quot; instrument_node=&quot;&quot;&gt; The analyses in &lt;/span&gt;&lt;a class=&quot;xref table&quot; data-dcnode-id=&quot;4145&quot; href=&quot;#tab5&quot;&gt;&lt;span data-dcnode-id=&quot;4146&quot; instrument_node=&quot;&quot;&gt;Table 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4144&quot; instrument_node=&quot;&quot;&gt; subject these propositions to a rigorous statistical test, using multi-level models that simultaneously explain within-country and between-country variation in emancipative values. Under ‘country-level’ effects, we find country-level characteristics that explain variation in emancipative values between countries due to the propositions derived from the Asian Values Thesis and the Human Development Thesis. These country-level characteristics include culture zone dummies for East Asia, South Asia, and Western countries as well as a country's knowledge development. Note that the culture zone dummies capture each and every commonality that countries within the same culture zone might share – including commonalities we are not even aware of.
&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;table-wrap&quot; data-dcnode-id=&quot;4124&quot; data-magellan-destination=&quot;tab5&quot; id=&quot;tab5&quot;&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4138&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4139&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4141&quot;&gt;&lt;span data-dcnode-id=&quot;4142&quot; instrument_node=&quot;&quot;&gt;Table 5.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4140&quot; instrument_node=&quot;&quot;&gt; Multi-level model explaining within-country and between-country variation in emancipative values&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4132&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4137&quot; data-img-name=&quot;Table 5.&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172449-09114-largeThumb-S1468109910000277_tab5.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172449-73847-optimisedImage-S1468109910000277_tab5.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_tab5.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172449-19076-smallThumb-S1468109910000277_tab5.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172449-83308-mediumThumb-S1468109910000277_tab5.jpg?pub-status=live&quot; data-zoomable=&quot;false&quot; height=&quot;517&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;554&quot;&gt;&lt;button aria-label=&quot;Open Table 5. image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4133&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4136&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuMjUydjIyLjQ5NmMwIC42OTMtLjU2NCAxLjI1Mi0xLjI1MiAxLjI1Mkg5LjI1MkM4LjU1OSAzMyA4IDMyLjQzNiA4IDMxLjc0OFY5LjI1MkM4IDguNTU5IDguNTY0IDggOS4yNTIgOHptLTEuNzUzIDIuNDk4SDExYy0uMjggMC0uNTAyLjIyNy0uNTAyLjUwMnYxMC4yNDVjMCAuMjc5LjIyNy41MDEuNTAyLjUwMWg2Ljk5N2MuNjkzIDAgMS4yNTEuNTY0IDEuMjUxIDEuMjUyVjMwYzAgLjI4LjIyOC41MDIuNTAyLjUwMmgxMC4yNDVjLjI4IDAgLjUwMi0uMjI3LjUwMi0uNTAyVjExYzAtLjI4LS4yMjgtLjUwMi0uNTAyLS41MDJ6TTI2Ljc0NyAxM2MuNjkzIDAgMS4yNTIuNTU5IDEuMjUyIDEuMjUydjVjMCAuNjk0LS41NjQgMS4yNTItMS4yNTIgMS4yNTItLjY5MyAwLTEuMjUxLS41NjQtMS4yNTEtMS4yNTF2LTEuOTgxbC0yLjg2NSAyLjg2NWMtLjY0Mi42NDEtMS41MjYuMjQzLTEuNzY5IDAtLjQ4Ni0uNDkxLS40ODYtMS4yODMgMC0xLjc2OWwyLjg2NS0yLjg2NWgtMS45OGMtLjY5NCAwLTEuMjUyLS41NjQtMS4yNTItMS4yNTEgMC0uNjkzLjU2NC0xLjI1MiAxLjI1MS0xLjI1MnoiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;4135&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;table-wrap-foot&quot; data-dcnode-id=&quot;4125&quot;&gt;&lt;div class=&quot;fn&quot; data-dcnode-id=&quot;4126&quot; data-magellan-destination=&quot;tab5-tfn001&quot; id=&quot;tab5-tfn001&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4127&quot;&gt;&lt;span data-dcnode-id=&quot;4131&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4129&quot;&gt;&lt;span data-dcnode-id=&quot;4130&quot; instrument_node=&quot;&quot;&gt;Notes&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4128&quot; instrument_node=&quot;&quot;&gt;: Models estimated with HLM 6.01. Entries are unstandardized regression coefficients with T-ratios in parentheses. Individual-level variables are country-mean centered; country-level variables are global-mean centered, except for the country dummies. Explained variances calculated from change in random variance component related to empty model. Significance levels: n.s. (not significant) p ≥0.05; * p &amp;lt;0.050; ** p &amp;lt;0.010; p &amp;lt;0.005.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4111&quot;&gt;&lt;span data-dcnode-id=&quot;4123&quot; instrument_node=&quot;&quot;&gt; Under ‘individual-level effects’ one sees individual-level characteristics that might explain within-country variation in emancipative values. Under ‘fixed’ individual effects, basic socio-demographic variables for age, sex, and religious denomination as well as political interest are included.&lt;/span&gt;&lt;a class=&quot;xref fn&quot; data-dcnode-id=&quot;4118&quot; href=&quot;#fn8&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4121&quot;&gt;&lt;span data-dcnode-id=&quot;4122&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;4119&quot;&gt;&lt;span data-dcnode-id=&quot;4120&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4117&quot; instrument_node=&quot;&quot;&gt; These variables have been found in the literature to affect emancipative values Welzel (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4113&quot; href=&quot;#ref24&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4115&quot;&gt;&lt;span data-dcnode-id=&quot;4116&quot; instrument_node=&quot;&quot;&gt;Reference Welzel&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4114&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4112&quot; instrument_node=&quot;&quot;&gt;). But they are not in themselves of interest here as neither the Asian Values Thesis nor the Human Development Thesis makes a specific claim about these variables’ impact. They are only included as controls in order to isolate the effect of the variable of interest. The variable of interest is formal education, a proxy of cognitive empowerment at the individual level. ‘Random’ means that education is not ‘fixed’ to have constant effects on emancipative values; instead, education's effect is allowed to vary across countries. Doing so is necessary to test the assumption of Proposition 1.2 that the individual-level effect of cognitive empowerment on emancipative values is contextually shaped in direction and strength by country-level characteristics, especially a country's belonging to Asia or the West.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4109&quot;&gt;&lt;span data-dcnode-id=&quot;4110&quot; instrument_node=&quot;&quot;&gt; What do we find? Model 1–1 specifies a pure culture zone model that tests the Asian Values Thesis without taking the counter-propositions of the Human Development Thesis into account. The model seems to partially confirm the Asian Values Thesis. If the respondent's country belongs to the West, this adds 0.11 scale points to the 0.37 average score in the overall emphasis on emancipative values. The significantly positive effect of a Western belonging on the respondents’ emphases on emancipative values confirms Proposition 1.1 of the Asian Values Thesis.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4107&quot;&gt;&lt;span data-dcnode-id=&quot;4108&quot; instrument_node=&quot;&quot;&gt; If the respondent's country belongs to East Asia, this adds another 0.04 scale points to the average emphasis on emancipative values. This effect is insignificant but its positive sign contradicts Proposition 1.1 of the Asian Values Thesis. If the respondent's country belongs to South Asia, this reduces the average emphasis on emancipative values by 0.02 scale points. But even though the direction of this effect is in accordance with Proposition 1.1, its negligible size and insignificance contradict the proposition.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4105&quot;&gt;&lt;span data-dcnode-id=&quot;4106&quot; instrument_node=&quot;&quot;&gt; Proposition 1.2, too, is only partly confirmed. In general, education has a positive effect on emancipative values, adding 0.10 scale points to the 0.37 average score in emancipative values when formal education is at its highest level, at 1.0 for people with a university degree. But when formal education is at its highest level and when this is the case in a Western country, this increases emancipative values by another 0.03 scale points. If, by contrast, a respondent's country is South Asian, this weakens the emancipative effect of education, decreasing emancipative values by 0.03 scale points. This is in accordance with Proposition 1.2, but the effect is barely significant, providing only a weak confirmation of the proposition. Moreover, a respondent's belonging to East Asia increases the emancipative effect of education and even though this strengthening does not cross the significant hurdle, its positive sign contradicts Proposition 1.2.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4103&quot;&gt;&lt;span data-dcnode-id=&quot;4104&quot; instrument_node=&quot;&quot;&gt; What happens if we test the Asian Values Thesis against the counter-propositions of the Human Development Thesis? The answer to this question is straightforward. As is obvious from Model 1–2, Propositions 1.1 and 1.2 of the Asian Values Thesis are disconfirmed in every aspect when we test them against the counter-propositions of the Human Development Thesis. Specifically, the effects of the Asian and Western culture zone dummies on emancipative values diminish to negligible size and drop to insignificance (in the case of both East and South Asia) or almost insignificance (in the case of the West), once we control for a country's knowledge development. This finding is a full confirmation of Counter-Proposition 1.1 as suggested by the Human Development Thesis.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4101&quot;&gt;&lt;span data-dcnode-id=&quot;4102&quot; instrument_node=&quot;&quot;&gt; Similarly, the impact of the Asian and Western culture zone dummies on education's emancipative effect diminishes to negligible size and full insignificance, once we control for a country's knowledge development. To what extent the individual respondents’ education strengthens their emancipative values varies to 35% with the respective country's knowledge development. Taking this into consideration, it does not matter whether a country is Asian or Western. This finding is an outright confirmation of Counter-Proposition 1.2 by the Human Development Thesis.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4096&quot;&gt;&lt;span data-dcnode-id=&quot;4100&quot; instrument_node=&quot;&quot;&gt; For illustration purposes, &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4098&quot; href=&quot;#fig5&quot;&gt;&lt;span data-dcnode-id=&quot;4099&quot; instrument_node=&quot;&quot;&gt;Figure 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4097&quot; instrument_node=&quot;&quot;&gt; plots a country's overall emphasis on emancipative values on the vertical axis against the advancement in knowledge development on the horizontal axis. Knowing how far knowledge is developed in a country, explains more than 60% of the between-country variation in emancipative values. As the gray-circled zone indicates, Asian countries are found all along the entire stretch of this relationship and are, with the exception of Pakistan, usually located close to the regression line. In other words, Asian countries are no outliers to the general relationship between cognitive empowerment, as indicated by knowledge development, and motivational empowerment, as indicated by emancipative values.

t;span data-dcnode-id=&quot;4078&quot; instrument_node=&quot;&quot;&gt;Figure 6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4076&quot; instrument_node=&quot;&quot;&gt; ranks countries by how unequivocally people endorse a liberal notion of democracy. Asian countries are again marked in dark gray. Since the item battery underlying this measure has only been fielded in the most recent round of the WVS, only nine Asian countries are covered.
&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;4062&quot;&gt;&lt;div class=&quot;fig&quot; data-dcnode-id=&quot;4063&quot; data-magellan-destination=&quot;fig6&quot; id=&quot;fig6&quot;&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4069&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4074&quot; data-img-name=&quot;Figure 6&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_fig6g.gif&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_fig6g.gif?pub-status=live&quot; data-zoomable=&quot;true&quot; height=&quot;908&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;944&quot;&gt;&lt;button aria-label=&quot;Open Figure 6 image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4070&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4073&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuMjUydjIyLjQ5NmMwIC42OTMtLjU2NCAxLjI1Mi0xLjI1MiAxLjI1Mkg5LjI1MkM4LjU1OSAzMyA4IDMyLjQzNiA4IDMxLjc0OFY5LjI1MkM4IDguNTU5IDguNTY0IDggOS4yNTIgOHptLTEuNzUzIDIuNDk4SDExYy0uMjggMC0uNTAyLjIyNy0uNTAyLjUwMnYxMC4yNDVjMCAuMjc5LjIyNy41MDEuNTAyLjUwMWg2Ljk5N2MuNjkzIDAgMS4yNTEuNTY0IDEuMjUxIDEuMjUyVjMwYzAgLjI4LjIyOC41MDIuNTAyLjUwMmgxMC4yNDVjLjI4IDAgLjUwMi0uMjI3LjUwMi0uNTAyVjExYzAtLjI4LS4yMjgtLjUwMi0uNTAyLS41MDJ6TTI2Ljc0NyAxM2MuNjkzIDAgMS4yNTIuNTU5IDEuMjUyIDEuMjUydjVjMCAuNjk0LS41NjQgMS4yNTItMS4yNTIgMS4yNTItLjY5MyAwLTEuMjUxLS41NjQtMS4yNTEtMS4yNTF2LTEuOTgxbC0yLjg2NSAyLjg2NWMtLjY0Mi42NDEtMS41MjYuMjQzLTEuNzY5IDAtLjQ4Ni0uNDkxLS40ODYtMS4yODMgMC0xLjc2OWwyLjg2NS0yLjg2NWgtMS45OGMtLjY5NCAwLTEuMjUyLS41NjQtMS4yNTItMS4yNTEgMC0uNjkzLjU2NC0xLjI1MiAxLjI1MS0xLjI1MnoiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;4072&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4064&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4065&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4067&quot;&gt;&lt;span data-dcnode-id=&quot;4068&quot; instrument_node=&quot;&quot;&gt;Figure 6&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4066&quot; instrument_node=&quot;&quot;&gt; Country ranking on how unequivocally liberal people define democracy&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4060&quot;&gt;&lt;span data-dcnode-id=&quot;4061&quot; instrument_node=&quot;&quot;&gt; It is important to note that the scale can grow into the negative, which would be the case for any country where fewer people define democracy in liberal than in alternative terms. Apparently, this is not the case in any country that has been surveyed, and these countries cover all culture zones of the world. In every country, more people define democracy in liberal terms than in alternative terms. This includes all Asian countries. Despite this universality, people in most Asian countries define democracy less unequivocally in liberal terms than people in almost every Western country. And again, we find South Asian countries more on the bottom of the ranking than East Asian countries.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4046&quot;&gt;&lt;span data-dcnode-id=&quot;4059&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4057&quot; href=&quot;#fig7&quot;&gt;&lt;span data-dcnode-id=&quot;4058&quot; instrument_node=&quot;&quot;&gt;Figure 7&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4056&quot; instrument_node=&quot;&quot;&gt; examines the relationship between people's emancipative values and how unequivocally they endorse liberal democracy, separately for each culture zone. As suggested by the Human Development Thesis, it is generally true that when people emphasize emancipative values more strongly, they also endorse liberal democracy more unequivocally.&lt;/span&gt;&lt;a class=&quot;xref fn&quot; data-dcnode-id=&quot;4051&quot; href=&quot;#fn9&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4054&quot;&gt;&lt;span data-dcnode-id=&quot;4055&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;4052&quot;&gt;&lt;span data-dcnode-id=&quot;4053&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4050&quot; instrument_node=&quot;&quot;&gt; The exception from this rule is Sub-Saharan African countries but not Asian countries. Nevertheless, Propositions 2.1 and 2.2 of the Asian Values Thesis appear to be at least partly confirmed. On average, liberal democracy is less unequivocally endorsed in East Asian countries than in Western countries and &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4048&quot;&gt;&lt;span data-dcnode-id=&quot;4049&quot; instrument_node=&quot;&quot;&gt;much&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4047&quot; instrument_node=&quot;&quot;&gt; less unequivocally endorsed in South Asian countries than in Western countries. And this pattern holds true for people at each level of emancipative values. However, on high levels of emancipative values, East Asians endorse liberal democracy almost as unequivocally as Westerners do, and much more unequivocally than South Asians do. The cultural chasm over liberal democracy is larger between South and East Asia than between Asia in general and the West.
&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;4033&quot;&gt;&lt;div class=&quot;fig&quot; data-dcnode-id=&quot;4034&quot; data-magellan-destination=&quot;fig7&quot; id=&quot;fig7&quot;&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4040&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4045&quot; data-img-name=&quot;Figure 7&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172325-12405-largeThumb-S1468109910000277_fig7g.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172325-87203-optimisedImage-S1468109910000277_fig7g.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_fig7g.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172325-86614-smallThumb-S1468109910000277_fig7g.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172325-27378-mediumThumb-S1468109910000277_fig7g.jpg?pub-status=live&quot; data-zoomable=&quot;true&quot; height=&quot;925&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;944&quot;&gt;&lt;button aria-label=&quot;Open Figure 7 image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4041&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;4044&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuM dcnode-id=&quot;4026&quot;&gt;&lt;span data-dcnode-id=&quot;4030&quot; instrument_node=&quot;&quot;&gt; Model 2–1 of the multi-level analyses in &lt;/span&gt;&lt;a class=&quot;xref table&quot; data-dcnode-id=&quot;4028&quot; href=&quot;#tab6&quot;&gt;&lt;span data-dcnode-id=&quot;4029&quot; instrument_node=&quot;&quot;&gt;Table 6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4027&quot; instrument_node=&quot;&quot;&gt; subjects these results to a more rigorous statistical test. In line with the graphical analysis, we see Propositions 2.1 and 2.2 partially confirmed and partially disconfirmed. The propositions are partially confirmed insofar as we find the expected positive Western influence on a country's overall endorsement of liberal democracy and on the nexus between emancipative values and the endorsement of liberal democracy within countries. But we find the propositions also disconfirmed because the expected negative effects of a country's belonging to East Asia are inexistent while the expected negative effects of a country's belonging to South Asia are either only barely significant or entirely insignificant.
&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;table-wrap&quot; data-dcnode-id=&quot;4007&quot; data-magellan-destination=&quot;tab6&quot; id=&quot;tab6&quot;&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4021&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4022&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4024&quot;&gt;&lt;span data-dcnode-id=&quot;4025&quot; instrument_node=&quot;&quot;&gt;Table 6.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4023&quot; instrument_node=&quot;&quot;&gt; Multi-level models explaining within-country and between-country variation in people's notion of democracy&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;4015&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;4020&quot; data-img-name=&quot;Table 6.&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172516-88607-largeThumb-S1468109910000277_tab6.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172516-81516-optimisedImage-S1468109910000277_tab6.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_tab6.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172516-05824-smallThumb-S1468109910000277_tab6.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172516-18641-mediumThumb-S1468109910000277_tab6.jpg?pub-status=live&quot; data-zoomable=&quot;false&quot; height=&quot;535&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;556&quot;&gt;&lt;button aria-label=&quot;Open Table 6. image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;4016&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-ima
