t;4581&quot;&gt;&lt;span data-dcnode-id=&quot;4582&quot; instrument_node=&quot;&quot;&gt;Catholic West&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4580&quot; instrument_node=&quot;&quot;&gt;: Austria, Belgium, France, Germany (West), Italy, Luxemburg, Malta, Portugal, Spain.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4570&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4571&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4576&quot;&gt;&lt;span data-dcnode-id=&quot;4577&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4575&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4573&quot;&gt;&lt;span data-dcnode-id=&quot;4574&quot; instrument_node=&quot;&quot;&gt;Ex-communist West&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4572&quot; instrument_node=&quot;&quot;&gt;: Croatia, Czech Republic, Hungary, Latvia, Lithuania, Poland, Slovakia, Estonia, Germany (East), Slovenia.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4562&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4563&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4568&quot;&gt;&lt;span data-dcnode-id=&quot;4569&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4567&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4565&quot;&gt;&lt;span data-dcnode-id=&quot;4566&quot; instrument_node=&quot;&quot;&gt;Ex-communist East&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4564&quot; instrument_node=&quot;&quot;&gt;: Albania, Armenia, Azerbaijan, Belarus, Bosnia-Herzegovina, Bulgaria, Georgia, Macedonia, Moldova, Romania, Russia, Serbia-Montenegro, Ukraine.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4554&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4555&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4560&quot;&gt;&lt;span data-dcnode-id=&quot;4561&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4559&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4557&quot;&gt;&lt;span data-dcnode-id=&quot;4558&quot; instrument_node=&quot;&quot;&gt;Muslim Core Zone&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4556&quot; instrument_node=&quot;&quot;&gt;: Algeria, Egypt, Iran, Iraq, Jordan, Morocco, Saudi Arabia, Turkey.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4546&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4547&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4552&quot;&gt;&lt;span data-dcnode-id=&quot;4553&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4551&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4549&quot;&gt;&lt;span data-dcnode-id=&quot;4550&quot; instrument_node=&quot;&quot;&gt;Sub-Saharan Africa&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4548&quot; instrument_node=&quot;&quot;&gt;: Burkina Faso, Ethiopia, Ghana, Mali, Nigeria, Rwanda, South Africa, Tanzania, Uganda, Zambia, Zimbabwe.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4538&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4539&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4544&quot;&gt;&lt;span data-dcnode-id=&quot;4545&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4543&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4541&quot;&gt;&lt;span data-dcnode-id=&quot;4542&quot; instrument_node=&quot;&quot;&gt;Latin America&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4540&quot; instrument_node=&quot;&quot;&gt;: Argentina, Brazil, Chile, Colombia, Dominican Republic, El Salvador, Guatemala, Mexico, Peru, Trinidad-Tobago, Venezuela, Uruguay.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4530&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4531&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4536&quot;&gt;&lt;span data-dcnode-id=&quot;4537&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4535&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4533&quot;&gt;&lt;span data-dcnode-id=&quot;4534&quot; instrument_node=&quot;&quot;&gt;South Asia&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4532&quot; instrument_node=&quot;&quot;&gt;: Bangladesh, India, Indonesia, Malaysia, Pakistan, Philippines, Singapore, Thailand.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4522&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4523&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4528&quot;&gt;&lt;span data-dcnode-id=&quot;4529&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4527&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4525&quot;&gt;&lt;span data-dcnode-id=&quot;4526&quot; instrument_node=&quot;&quot;&gt;East Asia&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4524&quot; instrument_node=&quot;&quot;&gt;: China, Hong Kong, Japan, Kyrgyzstan, South Korea, Taiwan, Vietnam.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p class=&quot;p continuation&quot; data-dcnode-id=&quot;4514&quot;&gt;&lt;span data-dcnode-id=&quot;4520&quot; instrument_node=&quot;&quot;&gt;
I use this ten-fold grouping of countries to see whether there is an Asian–Western division over people's emphases on emancipative values and liberal democracy. As will become evident, instead of a twofold Asian–Western division, we find a threefold division with East Asia placed in between the four Western culture zones, on the one hand, and South Asia, on the other hand. For this reason, the statistical analyses uses a threefold group contrast, using country dummies for ‘Western Country’, ‘East Asia’, and ‘South Asia’. For the Western Country dummy, respondents are coded 1 when their country is included in one of the four Western country groups of the list above and 0 otherwise. For the East Asia dummy, respondents are coded 1 when their country is included in the East Asian group of the list and 0 otherwise. For the South Asia dummy, respondents are coded 1 when their country is included in the South Asian group and 0 otherwise.&lt;/span&gt;&lt;a class=&quot;xref fn&quot; data-dcnode-id=&quot;4515&quot; href=&quot;#fn2&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4518&quot;&gt;&lt;span data-dcnode-id=&quot;4519&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;4516&quot;&gt;&lt;span data-dcnode-id=&quot;4517&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4509&quot;&gt;&lt;span data-dcnode-id=&quot;4513&quot; instrument_node=&quot;&quot;&gt; In order to test the propositions in &lt;/span&gt;&lt;a class=&quot;xref table&quot; data-dcnode-id=&quot;4511&quot; href=&quot;#tab1&quot;&gt;&lt;span data-dcnode-id=&quot;4512&quot; instrument_node=&quot;&quot;&gt;Table 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4510&quot; instrument_node=&quot;&quot;&gt;, we need measures of how strongly people emphasize emancipative values and liberal democracy. Based on WVS data, valid measures for both variables are available.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4497&quot;&gt;&lt;span data-dcnode-id=&quot;4508&quot; instrument_node=&quot;&quot;&gt; To measure emancipative values I use an index that has been tried and tested by Welzel (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4504&quot; href=&quot;#ref13&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4506&quot;&gt;&lt;span data-dcnode-id=&quot;4507&quot; instrument_node=&quot;&quot;&gt;Reference Welzel and Inglehart&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4505&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4503&quot; instrument_node=&quot;&quot;&gt;) (see also Welzel and Inglehart, &lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;4499&quot; href=&quot;#ref7&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4501&quot;&gt;&lt;span data-dcnode-id=&quot;4502&quot; instrument_node=&quot;&quot;&gt;Reference Welzel&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4500&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4498&quot; instrument_node=&quot;&quot;&gt;). In a Western understanding, emancipative values comprise orientations that emphasize freedom of choice and equality of opportunities among individuals. With WVS data, these values can be measured by orientations that emphasize:
&lt;/span&gt;&lt;/p&gt;&lt;ol class=&quot;list number nomark&quot; data-dcnode-id=&quot;4464&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4489&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4490&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4495&quot;&gt;&lt;span data-dcnode-id=&quot;4496&quot; instrument_node=&quot;&quot;&gt;(1)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4494&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4492&quot;&gt;&lt;span data-dcnode-id=&quot;4493&quot; instrument_node=&quot;&quot;&gt;gender equality&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4491&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4481&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4482&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4487&quot;&gt;&lt;span data-dcnode-id=&quot;4488&quot; instrument_node=&quot;&quot;&gt;(2)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4486&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4484&quot;&gt;&lt;span data-dcnode-id=&quot;4485&quot; instrument_node=&quot;&quot;&gt;lifestyle tolerance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4483&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4473&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4474&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4479&quot;&gt;&lt;span data-dcnode-id=&quot;4480&quot; instrument_node=&quot;&quot;&gt;(3)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4478&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4476&quot;&gt;&lt;span data-dcnode-id=&quot;4477&quot; instrument_node=&quot;&quot;&gt;personal autonomy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4475&quot; instrument_node=&quot;&quot;&gt;, and&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;4465&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4466&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4471&quot;&gt;&lt;span data-dcnode-id=&quot;4472&quot; instrument_node=&quot;&quot;&gt;(4)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4470&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4468&quot;&gt;&lt;span data-dcnode-id=&quot;4469&quot; instrument_node=&quot;&quot;&gt;people's voice&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4467&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p class=&quot;p continuation&quot; data-dcnode-id=&quot;4453&quot;&gt;&lt;span data-dcnode-id=&quot;4463&quot; instrument_node=&quot;&quot;&gt;
Twelve items of the WVS in total cover these topics and have been asked in the same format repeatedly. Three of the 12 items tap gender equality in the areas of women's access to politics, education, and labor. Another three items cover the &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4461&quot;&gt;&lt;span data-dcnode-id=&quot;4462&quot; instrument_node=&quot;&quot;&gt;lifestyle tolerance&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4460&quot; instrument_node=&quot;&quot;&gt; related to people's reproductive choices in the areas of child birth (abortion), cohabitation (divorce), and sexual orientation (homosexuality). Still another three items cover the topic of &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4458&quot;&gt;&lt;span data-dcnode-id=&quot;4459&quot; instrument_node=&quot;&quot;&gt;personal autonomy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4457&quot; instrument_node=&quot;&quot;&gt; related to the themes of independence, imagination, and obedience as desired child qualities. Finally, three items cover the &lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;4455&quot;&gt;&lt;span data-dcnode-id=&quot;4456&quot; instrument_node=&quot;&quot;&gt;people's voice&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4454&quot; instrument_node=&quot;&quot;&gt; domain, asking how strong a priority people place on having a ‘say in important government decisions’, on having a ‘say in how things are done at their jobs and in their communities’, and on ‘protecting freedom of speech’.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4443&quot;&gt;&lt;span data-dcnode-id=&quot;4452&quot; instrument_node=&quot;&quot;&gt; Each of the 12 items is rescaled into a range from 0 for the least emancipative position and 1.0 for the most emancipative position. The 12 rescaled items are summarized in a two-step procedure, as shown in &lt;/span&gt;&lt;a class=&quot;xref table&quot; data-dcnode-id=&quot;4450&quot; href=&quot;#tab2&quot;&gt;&lt;span data-dcnode-id=&quot;4451&quot; instrument_node=&quot;&quot;&gt;Table 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4449&quot; instrument_node=&quot;&quot;&gt;. In the first step, the four three-item groups are averaged into four sub-indices for gender equality, lifestyle tolerance, personal autonomy, and people's voice. Each of the four sub-indices yields a multi-point index with minimum 0, maximum 1.0, and manifold fractions in between, e.g. 0.10, 0.25, 0.33, 0.50, 0.66, 0.75, 0.80, and so on. In the final step, the four sub-indices are averaged into an overall index of emancipative values, yielding an even more fine-grained multi-point index with minimum 0 for respondents taking the least emancipative position on all 12 items and 1.0 for respondents taking the most emancipative positions on all 12 items.&lt;/span&gt;&lt;a class=&quot;xref fn&quot; data-dcnode-id=&quot;4444&quot; href=&quot;#fn3&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;4447&quot;&gt;&lt;span data-dcnode-id=&quot;4448&quot; instrument_node=&quot;&quot;&gt;Footnote &lt;/span&gt;&lt;/span&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;4445&quot;&gt;&lt;span data-dcnode-id=&quot;4446&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;div class=&quot;table-wrap&quot; data-dcnode-id=&quot;4421&quot; data-magellan-destination=&quot;tab2&quot; id=&quot;tab2&quot;&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;4438&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4439&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;4441&quot;&gt;&lt;span data-dcnode-id=&quot;4442&quot; instrument_node=&quot;&quot;&gt;Table 2.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4440&quot; instrument_node=&quot;&quot;&gt; Conceptualizing emancipative values with WVS data&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;figure-thumb&quot; data-dcn
