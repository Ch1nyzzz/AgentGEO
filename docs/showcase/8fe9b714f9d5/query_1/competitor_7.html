LM 6.01. Entries are unstandardized regression coefficients with T-ratios in parentheses. Individual-level variables are country-mean centered; country-level variables, except culture zone dummies, are global-mean centered. Explained variances calculated from change in random variance component related to empty model. Significance levels: n.s. (not significant) p ≥ 0.05; * p &amp;lt; 0.050; ** p &amp;lt; 0.010; p &amp;lt; 0.005.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4005&quot;&gt;&lt;span data-dcnode-id=&quot;4006&quot; instrument_node=&quot;&quot;&gt; Yet, as Model 2–2 shows, even the partial confirmation of Propositions 2.1 and 2.2 breaks down when we control for the counter-propositions of the Human Development Thesis. More precisely, as soon as we control for the effects of a country's cultural belonging to Asia or the West for the overall emphasis on emancipative values in that country, the belonging to Asia or the West turns out to be fully insignificant. A country's overall emphasis on emancipative values, by contrast, explains by more than 70% how unequivocally liberal this country's population defines democracy. Moreover, a country's overall emphasis on emancipative values explains variation in the effect of people's own emancipative values on their endorsement of liberal democracy to 45%. These results provide a straight confirmation of Counter-Propositions 2.1 and 2.2 by the Human Development Thesis.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;4000&quot;&gt;&lt;span data-dcnode-id=&quot;4004&quot; instrument_node=&quot;&quot;&gt; For illustrative purposes, &lt;/span&gt;&lt;a class=&quot;xref fig&quot; data-dcnode-id=&quot;4002&quot; href=&quot;#fig8&quot;&gt;&lt;span data-dcnode-id=&quot;4003&quot; instrument_node=&quot;&quot;&gt;Figure 8&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4001&quot; instrument_node=&quot;&quot;&gt; plots the overall endorsement of liberal democracy in a country against the overall emphasis on emancipative values in that country. The general relationship is striking. Knowing how strongly a country's population emphasizes emancipative values explains 73% of the between-country variation in how strongly people in this country endorse liberal democracy. On average, a 0.10 scale point increase in emancipative values associates with a 0.08 scale points increase in endorsing liberal democracy. And as we can see when looking at the location of the Asian countries, we find nothing exceptional about them. They are no outliers of the general trend. In fact, most Asian countries are located closely to the regression line.
&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;3987&quot;&gt;&lt;div class=&quot;fig&quot; data-dcnode-id=&quot;3988&quot; data-magellan-destination=&quot;fig8&quot; id=&quot;fig8&quot;&gt;&lt;div class=&quot;figure-thumb&quot; data-dcnode-id=&quot;3994&quot;&gt;&lt;img class=&quot;aop-lazy-load-image graphic&quot; data-dcnode-id=&quot;3999&quot; data-img-name=&quot;Figure 8&quot; data-large-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172330-47739-largeThumb-S1468109910000277_fig8g.jpg&quot; data-optimised-image=&quot;urn:cambridge.org:id:binary-alt:20160626172330-53875-optimisedImage-S1468109910000277_fig8g.jpg&quot; data-original-image=&quot;urn:cambridge.org:id:binary:20151017042033638-0825:S1468109910000277_fig8g.gif&quot; data-small-thumb=&quot;urn:cambridge.org:id:binary-alt:20160626172330-94632-smallThumb-S1468109910000277_fig8g.jpg&quot; data-src=&quot;https://static.cambridge.org/binary/version/id/urn:cambridge.org:id:binary-alt:20160626172330-67892-mediumThumb-S1468109910000277_fig8g.jpg?pub-status=live&quot; data-zoomable=&quot;true&quot; height=&quot;902&quot; lazy=&quot;loading&quot; src=&quot;data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7&quot; width=&quot;944&quot;&gt;&lt;button aria-label=&quot;Open Figure 8 image in full screen&quot; class=&quot;app-button app-button__icon app-button-- enlarge-image-icon&quot; data-dcnode-id=&quot;3995&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon enlarge-image&quot; data-dcnode-id=&quot;3998&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCI+CiAgICAgICAgPHBhdGggZmlsbD0iIzU5NTk1OSIgZD0iTTAgMEg0MFY0MEgweiIvPgogICAgICAgIDxwYXRoIGZpbGw9IiNGRkYiIGZpbGwtcnVsZT0ibm9uemVybyIgZD0iTTMxLjc0OCA4QzMyLjQzNiA4IDMzIDguNTY0IDMzIDkuM ts have usually taken a historical approach, trying to show by text exegeses of the writings of Confucius and various other sources that Asia has a diverse and rich cultural tradition that can be reconciled with the ideas of human emancipation and liberal democracy. By contrast, apart from a handful of studies, few scholars tested directly the empirical claim that the values of Asian populations largely oppose emancipative values and liberal notions of democracy and continue to do so even under the imprint of modernization.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;3974&quot;&gt;&lt;span data-dcnode-id=&quot;3980&quot; instrument_node=&quot;&quot;&gt; This article tried to fill this gap. What I found are gradual differences between Asian and Western countries over emancipative values and liberal notions of democracy but no categorical difference. In fact, the differences between East Asia and South Asia are bigger than those between Asia in general and the West. More importantly, I find the same forces that nurture emancipative values and liberal notions of democracy in the ‘West’ to do exactly the same in the ‘East’. This is so because large parts of Asia are undergoing a human development process whose logic is culture-invariant in a key aspect: it is basically a process of people empowerment with pervasive emancipative consequences. These insights question the still widely fashionable parlance of ‘multiple modernities’ and ‘cultural exceptionalisms’ that have for too long been able to stigmatize any emphasis on developmental universals as politically incorrect. These insights also characterize as wishful thinking the desires of authoritarian leaders to pick from the modernization process the economic growth part while avoiding its emancipative consequences known from the West. And since the logic of the human development process is an emancipative one that advances people empowerment, liberal democracy becomes an unavoidable part of this process at one point. In this regard at least, Fukuyama's (&lt;/span&gt;&lt;a class=&quot;xref bibr&quot; data-dcnode-id=&quot;3976&quot; href=&quot;#ref10&quot;&gt;&lt;span class=&quot;show-for-sr&quot; data-dcnode-id=&quot;3978&quot;&gt;&lt;span data-dcnode-id=&quot;3979&quot; instrument_node=&quot;&quot;&gt;Reference Fukuyama&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3977&quot; instrument_node=&quot;&quot;&gt;1990&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3975&quot; instrument_node=&quot;&quot;&gt;) End of History Thesis makes a valid point.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;sec&quot; data-dcnode-id=&quot;3968&quot; data-magellan-destination=&quot;sec7&quot; id=&quot;sec7&quot;&gt;&lt;h2 class=&quot;A&quot; data-dcnode-id=&quot;3971&quot;&gt;&lt;span data-dcnode-id=&quot;3972&quot; instrument_node=&quot;&quot;&gt; About the author&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;3969&quot;&gt;&lt;span data-dcnode-id=&quot;3970&quot; instrument_node=&quot;&quot;&gt; Christian Welzel holds the chair for Political Culture Research at the Center for the Study of Democracy, Leuphana University, Lueneburg Germany. He is professor-pro-tempore at the Higher-School of Economics St. Petersburg, Russia, and Vice President of the World Values Survey Association and a regular visiting professor at the Center for the Study of Democracy at UC Irvine. Author of some 80 scholarly publications, Christian Welzel's research focuses on modernization, democratization, human values, cultural change and human empowerment in comparative perspective.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;back&quot; data-dcnode-id=&quot;3966&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3963&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;hr aria-hidden=&quot;true&quot; class=&quot;list-divider separator default&quot; data-dcnode-id=&quot;3962&quot; data-v-7036083a=&quot;&quot; ; data-dcnode-id=&quot;3922&quot;&gt;&lt;span data-dcnode-id=&quot;3923&quot; instrument_node=&quot;&quot;&gt;total&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3921&quot; instrument_node=&quot;&quot;&gt; population, but its assembly of surveyed countries. Otherwise, samples had to be weighted according to the population size of the country that they represent. In this case, we could just analyze China for East Asia and India for South Asia, which is not the logic of this study.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;circle-list__item&quot; data-dcnode-id=&quot;3901&quot; data-type=&quot;fulltextNote&quot; id=&quot;fn3&quot;&gt;&lt;span data-dcnode-id=&quot;3915&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;circle-list__item__indicator&quot; data-dcnode-id=&quot;3910&quot;&gt;&lt;button aria-label=&quot;Return to the note 3 in the content&quot; class=&quot;app-button circle-list__item__indicator__up app-button__icon app-button--&quot; data-dcnode-id=&quot;3911&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon up-circle&quot; data-dcnode-id=&quot;3914&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzNyIgaGVpZ2h0PSIzNyIgdmlld0JveD0iMCAwIDM3IDM3Ij4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCIgdHJhbnNmb3JtPSJyb3RhdGUoLTE4MCAxOCAxOCkiPgogICAgICAgIDxjaXJjbGUgY3g9IjE3LjUiIGN5PSIxNy41IiByPSIxNy41IiBzdHJva2U9IiM1OTU5NTkiLz4KICAgICAgICA8cGF0aCBmaWxsPSIjNTk1OTU5IiBkPSJNMTcuNSAyMmMtLjIzNCAwLS40NTgtLjA4OS0uNjI0LS4yNDdsLTYuNjE4LTYuMzE2Yy0uMzQ0LS4zMjktLjM0NC0uODYyIDAtMS4xOS4zNDUtLjMzLjkwNC0uMzMgMS4yNDggMGw1Ljk5NCA1LjcyIDUuOTk0LTUuNzJjLjM0NC0uMzMuOTAzLS4zMyAxLjI0OCAwIC4zNDQuMzI4LjM0NC44NjEgMCAxLjE5bC02LjYxOCA2LjMxNmMtLjE2Ni4xNTgtLjM5LjI0Ny0uNjI0LjI0N3oiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;3913&quot; instrument_node=&quot; ass=&quot;sup&quot; data-dcnode-id=&quot;3837&quot;&gt;&lt;span data-dcnode-id=&quot;3838&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/sup&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3835&quot; instrument_node=&quot;&quot;&gt; This summary index is downloadable at &lt;/span&gt;&lt;a class=&quot;uri simple&quot; data-dcnode-id=&quot;3833&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//info.worldbank.org/etools/kam2/KAM_page5.asp&quot;&gt;&lt;span data-dcnode-id=&quot;3834&quot; instrument_node=&quot;&quot;&gt;http://info.worldbank.org/etools/kam2/KAM_page5.asp&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3832&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;circle-list__item&quot; data-dcnode-id=&quot;3797&quot; data-type=&quot;fulltextNote&quot; id=&quot;fn8&quot;&gt;&lt;span data-dcnode-id=&quot;3826&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;circle-list__item__indicator&quot; data-dcnode-id=&quot;3821&quot;&gt;&lt;button aria-label=&quot;Return to the note 8 in the content&quot; class=&quot;app-button circle-list__item__indicator__up app-button__icon app-button--&quot; data-dcnode-id=&quot;3822&quot; data-v-183e9c34=&quot;&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon up-circle&quot; data-dcnode-id=&quot;3825&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzNyIgaGVpZ2h0PSIzNyIgdmlld0JveD0iMCAwIDM3IDM3Ij4KICAgIDxnIGZpbGw9Im5vbmUiIGZpbGwtcnVsZT0iZXZlbm9kZCIgdHJhbnNmb3JtPSJyb3RhdGUoLTE4MCAxOCAxOCkiPgogICAgICAgIDxjaXJjbGUgY3g9IjE3LjUiIGN5PSIxNy41IiByPSIxNy41IiBzdHJva2U9IiM1OTU5NTkiLz4KICAgICAgICA8cGF0aCBmaWxsPSIjNTk1OTU5IiBkPSJNMTcuNSAyMmMtLjIzNCAwLS40NTgtLjA4OS0uNjI0LS4yNDdsLTYuNjE4LTYuMzE2Yy0uMzQ0LS4zMjktLjM0NC0uODYyIDAtMS4xOS4zNDUtLjMzLjkwNC0uMzMgMS4yNDggMGw1Ljk5NCA1LjcyIDUuOTk0LTUuNzJjLjM0NC0uMzMuOTAzLS4zMyAxLjI0OCAwIC4zNDQuMzI4LjM0NC44NjEgMCAxLjE5bC02LjYxOCA2LjMxNmMtLjE2Ni4xNTgtLjM5LjI0Ny0uNjI0LjI0N3oiLz4KICAgIDwvZz4KPC9zdmc+Cg==&quot;&gt;&lt;span data-dcnode-id=&quot;3824&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3820&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;circle-list__item__grouped&quot; data-dcnode-id=&quot;3798&quot;&gt;&lt;div class=&quot;circle-list__item__grouped__content&quot; data-dcnode-id=&quot;3799&quot;&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;3809&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;3817&quot;&gt;&lt;sup class=&quot;sup&quot; data-dcnode-id=&quot;3818&quot;&gt;&lt;span data-dcnode-id=&quot;3819&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/sup&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3816&quot; instrument_node=&quot;&quot;&gt; The WVS asks for a respondent's age in questions V236 and V237. V236 reads: ‘&lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;3814&quot;&gt;&lt;span data-dcnode-id=&quot;3815&quot; instrument_node=&quot;&quot;&gt;Can you tell me your year of birth, please? 19____&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3813&quot; instrument_node=&quot;&quot;&gt; [Interviewer advice: write in last two digits].’ Question V237 then asks: ‘&lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;3811&quot;&gt;&lt;span data-dcnode-id=&quot;3812&quot; instrument_node=&quot;&quot;&gt;This means you are ____ years old&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3810&quot; instrument_node=&quot;&quot;&gt; [Interviewer advice: write in age in two digits].’ I use the data from V237 as the measure of a respondent's age.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;3804&quot;&gt;&lt;span data-dcnode-id=&quot;3808&quot; instrument_node=&quot;&quot;&gt; Sex is measured by observation of the interviewer in V235 (interviewer advice: ‘&lt;/span&gt;&lt;em class=&quot;italic&quot; data-dcnode-id=&quot;3806&quot;&gt;&lt;span data-dcnode-id=&quot;3807&quot; instrument_node=&quot;&quot;&gt;code respondent's sex by observation: 1 – male, 2 – female&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3805&quot; instrument_node=&quot;&quot;&gt;’). I recoded sex into 0 for male and 1 for female sex.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;3802&quot;&gt;&lt;span data-dcnode-id=&quot;3803&quot; instrument_node=&quot;&quot;&gt; A respondent's religious denomination is asked in V185: ‘Do you belong to a religion or religious denomination? If yes, which one?’ I use in the analyses a dummy for Protestant denomination and another for Muslim denomination because much of the literature associates Protestantism positively and Islam negatively with emancipative values.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;p&quot; data-dcnode-id=&quot;3800&quot;&gt;&lt;span data-dcnode-id=&quot;3801&quot; instrument_node=&quot;&quot;&gt; Political interest is measured using two questions. V7 asks if people find politics ‘very important’, ‘rather important’, ‘not very important’, or ‘not at all important’. V95 asks people if they are ‘very interested’, ‘somewhat interested’, ‘not very interested’, or ‘not at all interested’ in politics. I coded both variables 0 for the weakest, 0.25 for the second weakest, 0.75 for the second strongest, and 1.0 for the strongest emphasis on politics. Then I added the scores of both variables and divided the sum by 2, yielding an 8-point 0–1.0 index of political interest.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;circle-list__item&quot; data-dcnode-id=&quot;3781&quot; data-type=&quot;fulltextNote&quot; id=&quot;fn9&quot;&gt;&lt;span data-dcnode-id=&quot;3795&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;circle-list__item__indicator&quot; data-dcnode-id=&quot;3790&quot;&gt;&lt;button aria-lab  understanding of democracy with emancipative values is analyzed. This is done to avoid a tautological relationship, which is a potential flaw as the emancipative values include an emphasis on gender equality. Alternatively, the analyses have been conducted by leaving the liberal understanding of democracy index unchanged but excluding the gender equality part from emancipative values. This produced similar results.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3779&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;hr aria-hidden=&quot;true&quot; class=&quot;list-divider separator default&quot; data-dcnode-id=&quot;3778&quot; data-v-7036083a=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;3777&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;circle-list&quot; data-dcnode-id=&quot;2411&quot; id=&quot;references-list&quot;&gt;&lt;h2 data-dcnode-id=&quot;3775&quot;&gt;&lt;span data-dcnode-id=&quot;3776&quot; instrument_node=&quot;&quot;&gt;References&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;3774&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div aria-flowto=&quot;reference-1-content reference-1-button&quot; class=&quot;circle-list__item&quot; data-dcnode-id=&quot;3739&quot; id=&quot;ref1&quot;&gt;&lt;div class=&quot;circle-list__item__indicator&quot; data-dcnode-id=&quot;3769&quot;&gt;&lt;button aria-label=&quot;Return to the reference 1 in the content&quot; class=&quot;app-button circle-list__item__indicator__up app-button__icon app-button--&quot; data-dcnode-id=&quot;3770&quot; data-v-183e9c34=&quot;&quot; id=&quot;reference-1-button&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;app-icon icon up-circle&quot; data-dcnode-id=&quot;3773&quot; data-v-183e9c34=&quot;&quot; data-v-35704cef=&quot;&quot; src=&quot;data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzNyIgaGVpZ2h0PSIzNyIgdmlld0JveD0iMCAwIDM3IDM3Ij4KICAgIDxnIGZpbGw9Im5vbmUiI
