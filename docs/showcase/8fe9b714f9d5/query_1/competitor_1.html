&lt;/span&gt;&lt;li data-dcnode-id=&quot;2380&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2381&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2377&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2364&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2375&quot;&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;19&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2374&quot; instrument_node=&quot;&quot;&gt;As we enter the twenty-first century, democracy has become a basic value&lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2372&quot; href=&quot;#ftn43&quot; id=&quot;bodyftn43&quot;&gt;&lt;span data-dcnode-id=&quot;2373&quot; instrument_node=&quot;&quot;&gt;43&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2371&quot; instrument_node=&quot;&quot;&gt;. No wonder then that respondents showed a high level of affective and evaluative support for democracy—Chen and Zhong reported a similar outcome even though their measurement did not cover support of norms of democracy &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2369&quot; href=&quot;#ftn44&quot; id=&quot;bodyftn44&quot;&gt;&lt;span data-dcnode-id=&quot;2370&quot; instrument_node=&quot;&quot;&gt;44&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt;. Moreover, at a time when the Chinese government is more ready to talk about “socialist democracy”, “democracy” has thus become a legitimate and popular word, even though the meaning may be differ from that applied to the word and the concept as used in the Western world. Thus, when Chinese citizens express support for democracy it may be that support is for a meaning different to that understood by a citizen of an established, advanced industrial democracy &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2366&quot; href=&quot;#ftn45&quot; id=&quot;bodyftn45&quot;&gt;&lt;span data-dcnode-id=&quot;2367&quot; instrument_node=&quot;&quot;&gt;45&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2365&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2357&quot; dir=&quot;ltr&quot; lang=&quot;en-gb&quot; xml:lang=&quot;en-gb&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2359&quot;&gt;&lt;span data-dcnode-id=&quot;2360&quot; instrument_node=&quot;&quot;&gt;20&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2358&quot; instrument_node=&quot;&quot;&gt;Interpretation of DK responses is a challenge. In the Chinese context, DK can be interpreted in three different ways. Some respondents were unable to answer the question due to lack of political knowledge. Others have some knowledge about democracy and its performance, but no clear-cut idea about the meaning of support of democracy. The third sort of DK is not truly a DK. Under a Communist authoritarian regime, outright support of democracy is still believed to involve political risk. Thus, even though supporters of democracy, these respondents would have withheld their true opinion through caution. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2340&quot;&gt;&lt;span data-dcnode-id=&quot;2355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2350&quot;&gt;&lt;span data-dcnode-id=&quot;2354&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2352&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2353&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2351&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2349&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2342&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2347&quot;&gt;&lt;span data-dcnode-id=&quot;2348&quot; instrument_node=&quot;&quot;&gt;21&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2346&quot; instrument_node=&quot;&quot;&gt;This survey does not provide a measurement to identify these three types of DK responses. However, one can assume that &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2344&quot; href=&quot;#ftn46&quot; id=&quot;bodyftn46&quot;&gt;&lt;span data-dcnode-id=&quot;2345&quot; instrument_node=&quot;&quot;&gt;46&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt; the first type of DK is associated with less income, education and older age. As members of the working class tend to be less educated and less wealthy, it is assumed that most of the responses given by the respondents in this group were of the first type. The DK responses of younger, wealthier and better educated respondent were of the second and third types. While they have the political knowledge to decide their support of democracy, they may refuse to answer due to the consideration of potential political risk. They may also feel somewhat ambivalent, perhaps worrying that the Chinese path to democracy would engender political instability which could endanger their economic well-being. Thus we considered most of the middle class DK responses to belong to the second and third type of DK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2339&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2335&quot; dir=&quot;ltr&quot; lang=&quot;en-gb&quot; xml:lang=&quot;en-gb&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2337&quot;&gt;&lt;span data-dcnode-id=&quot;2338&quot; instrument_node=&quot;&quot;&gt;22&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2336&quot; instrument_node=&quot;&quot;&gt;This study includes income, education and age as independent variables. The respondents are divided into three age cohorts (18-29 years old, 30-49 years old, and over 50), and into three categories of monthly income (less than 500 yuan to 4,000 yuan; 4,001 to 10,000 yuan; 10,001 to more than 100,000 yuan). The education variable is recoded into three categories: inadequately completed elementary education and completed (compulsory) elementary education; completed secondary school: technical/vocational and completed secondary school: university-preparatory; some university without degree/higher education and university with degree/higher education.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2334&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2330&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2332&quot;&gt;&lt;span data-dcnode-id=&quot;2333&quot; instrument_node=&quot;&quot;&gt;23&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2331&quot; instrument_node=&quot;&quot;&gt;Table 5 crosses the results of responses to “Having a democratic political system” with the independent variables. It suggests the following conclusions. First, age is negatively associated with acceptance of democratic principles. It does support the generational-replacement theory. Given that most of the older generation’s DK responses belong to the first type of response, and part of the younger generation’s DK responses belong to the third type of response, we are confident in concluding that the Chinese younger generation do have a higher level of affective support for democratic principles. Second, the hypothesis that the Chinese middle class has elective affinities of democracy is supported. Third, when compared with the middle class, the working class has a lower level of affective support of democracy. Four, those with lower incomes have a lower level of affective support for democratic principles. Finally, those with a lower level of education have a lower level of affective support for democratic principles than those with a higher level of education.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;titreillustration&quot; data-dcnode-id=&quot;2328&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2327&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textIcon&quot; data-dcnode-id=&quot;2314&quot;&gt;&lt;span data-dcnode-id=&quot;2326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;titreillustration&quot; data-dcnode-id=&quot;2324&quot; dir=&quot;ltr&quot; lang=&quot;en-gb&quot; xml:lang=&quot;en-gb&quot;&gt;&lt;span data-dcnode-id=&quot;2325&quot; instrument_node=&quot;&quot;&gt;5. Affective support of democracy and socio-economic variables&lt;/span&gt;&lt;/p&gt;&lt;a data-dcnode-id=&quot;2322&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-5.png&quot; rel=&quot;iconSet&quot;&gt;&lt;img alt=&quot;5. Affective support of democracy and socio-economic variables&quot; data-dcnode-id=&quot;2323&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-5.png&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;div class=&quot;textIconAccess&quot; data-dcnode-id=&quot;2316&quot;&gt;&lt;a class=&quot;iconZoom&quot; data-dcnode-id=&quot;2320&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-5.png&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2321&quot; instrument_node=&quot;&quot;&gt;Zoom&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2319&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;iconOrig&quot; data-dcnode-id=&quot;2317&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-5.png&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2318&quot; instrument_node=&quot;&quot;&gt;Original (png, 14k)&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2313&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2309&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2311&quot;&gt;&lt;span data-dcnode-id=&quot;2312&quot; instrument_node=&quot;&quot;&gt;24&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2310&quot; instrument_node=&quot;&quot;&gt;Table 6 crosses the responses to “Democracy may have problems but it’s better than any other form of government” with the same variables. First, age is negatively associated with evaluative support of democratic principles. It does support the generational-replacement theory. The pretty high percentage of DK responses among the older generation respondents can be explained by the fact that the evaluation of democracy involves more political knowledge than an acceptance of democracy. Second, there is strong evidence that the Chinese middle class tends to evaluate democracy as the better form of government. Third, the working class has a lower level of evaluative support of democracy, compared with the middle class. Four, those with lower incomes offer a lower level of evaluative support for democratic principles, while those with higher incomes show a higher level of evaluative support for democratic principles. Five, those less educated show a lower level of evaluative support for democratic principles than those more highly educated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;titreillustration&quot; data-dcnode-id=&quot;2307&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2306&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textIcon&quot; data-dcnode-id=&quot;2293&quot;&gt;&lt;span data-dcnode-id=&quot;2305&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;titreillustration&quot; data-dcnode-id=&quot;2303&quot; dir=&quot;ltr&quot; lang=&quot;en-gb&quot; xml:lang=&quot;en-gb&quot;&gt;&lt;span data-dcnode-id=&quot;2304&quot; instrument_node=&quot;&quot;&gt;6. Evaluative support of democracy and socio-economic variables&lt;/span&gt;&lt;/p&gt;&lt;a data-dcnode-id=&quot;2301&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-6.png&quot; rel=&quot;iconSet&quot;&gt;&lt;img alt=&quot;6. Evaluative support of democracy and socio-economic variables&quot; data-dcnode-id=&quot;2302&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-6.png&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;div class=&quot;textIconAccess&quot; data-dcnode-id=&quot;2295&quot;&gt;&lt;a class=&quot;iconZoom&quot; data-dcnode-id=&quot;2299&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-6.png&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2300&quot; instrument_node=&quot;&quot;&gt;Zoom&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2298&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;iconOrig&quot; data-dcnode-id=&quot;2296&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-6.png&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2297&quot; instrument_node=&quot;&quot;&gt;Original (png, 15k)&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2294&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2292&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2264&quot;&gt;&lt;span data-dcnode-id=&quot;2291&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2280&quot;&gt;&lt;span data-dcnode-id=&quot;2290&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2288&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2289&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2287&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2285&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2286&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2284&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2282&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2283&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2281&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2279&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2266&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2277&quot;&gt;&lt;span data-dcnode-id=&quot;2278&quot; instrument_node=&quot;&quot;&gt;25&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2276&quot; instrument_node=&quot;&quot;&gt;This study finds that the Chinese middle class is positively associated with democratic values. The Chinese middle class does accept democracy as a desirable political system and strongly evaluates democracy as a better form of government. This finding confirms the theory on the support of democracy by the middle class as presented by the literature on democracy and discredits the argument that the Chinese middle class is anti-democratic or undemocratic by nature &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2274&quot; href=&quot;#ftn47&quot; id=&quot;bodyftn47&quot;&gt;&lt;span data-dcnode-id=&quot;2275&quot; instrument_node=&quot;&quot;&gt;47&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2273&quot; instrument_node=&quot;&quot;&gt;. For example, Goodman argues that “the new middle classes, far from being alienated from the Party-state or seeking their own political voice, appear to be operating in close proximity and through close cooperation” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2271&quot; href=&quot;#ftn48&quot; id=&quot;bodyftn48&quot;&gt;&lt;span data-dcnode-id=&quot;2272&quot; instrument_node=&quot;&quot;&gt;48&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2270&quot; instrument_node=&quot;&quot;&gt;. It is suggested that since the reforms launched in 1978, China has gradually adopted corporatist institutions to influence the development of the middle class &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2268&quot; href=&quot;#ftn49&quot; id=&quot;bodyftn49&quot;&gt;&lt;span data-dcnode-id=&quot;2269&quot; instrument_node=&quot;&quot;&gt;49&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2267&quot; instrument_node=&quot;&quot;&gt;. As a result, the middle class depends heavily on the Party-state and cannot become a vocal supporter of democracy in the future. This argument is refuted.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2265&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2263&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2241&quot;&gt;&lt;span data-dcnode-id=&quot;2262&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2254&quot;&gt;&lt;span data-dcnode-id=&quot;2261&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2259&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2260&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2258&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2256&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2257&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2255&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2253&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2243&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2251&quot;&gt;&lt;span data-dcnode-id=&quot;2252&quot; instrument_node=&quot;&quot;&gt;26&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2250&quot; instrument_node=&quot;&quot;&gt;The finding that age is negatively associated with democratic-value orientation confirms the generation-replacement theory. The generation-replacement theory suggests that younger Chinese people are more highly educated and more likely to accept democratic ideas, thus they are more favourably disposed towards democracy. This finding contradicts the argument offered by Friedman and Zhao that the Chinese younger generation is “nationalists first, democrats second”. According to Friedman and Zhao, the Chinese government has taken nationalism to block Western influences and regain its legitimacy in the 1990s &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2248&quot; href=&quot;#ftn50&quot; id=&quot;bodyftn50&quot;&gt;&lt;span data-dcnode-id=&quot;2249&quot; instrument_node=&quot;&quot;&gt;50&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2247&quot; instrument_node=&quot;&quot;&gt;. Thus, the younger Chinese generation educated in the 1990s have been indoctrinated with a strong sentiment of nationalism. As a result, “many of them would emphasize that ‘they are patriots first and democrats second.’ Talking about democracy has almost become forbidden among many Chinese students. It may be considered as unpatriotic, as nationalism has come to be dominant in the thoughts of Chinese intellectuals” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2245&quot; href=&quot;#ftn51&quot; id=&quot;bodyftn51&quot;&gt;&lt;span data-dcnode-id=&quot;2246&quot; instrument_node=&quot;&quot;&gt;51&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2244&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2242&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2218&quot;&gt;&lt;span data-dcnode-id=&quot;2239&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2231&quot;&gt;&lt;span data-dcnode-id=&quot;2238&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2236&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2237&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2235&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2233&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2234&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2232&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2230&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2220&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2228&quot;&gt;&lt;span data-dcnode-id=&quot;2229&quot; instrument_node=&quot;&quot;&gt;27&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2227&quot; instrument_node=&quot;&quot;&gt;This study will not go into detail about the subtleties and complications of nationalism. Drawing upon the existing empirical studies on nationalism &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2225&quot; href=&quot;#ftn52&quot; id=&quot;bodyftn52&quot;&gt;&lt;span data-dcnode-id=&quot;2226&quot; instrument_node=&quot;&quot;&gt;52&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2224&quot; instrument_node=&quot;&quot;&gt;, this study uses two questions to measure nationalism: 1) How proud are you to be Chinese?; and 2) Of course we all hope that there will not be another war, but if it were to come to that, would you be willing to fight for your country? &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2222&quot; href=&quot;#ftn53&quot; id=&quot;bodyftn53&quot;&gt;&lt;span data-dcnode-id=&quot;2223&quot; instrument_node=&quot;&quot;&gt;53&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2221&quot; instrument_node=&quot;&quot;&gt;. The result between age and nationalist sentiment in Table 7 suggests that there is no significant generational difference in nationalist sentiment; and that all generations have a pretty high nationalist sentiment. The co-existence of high democratic orientations and nationalist sentiments in Chinese younger generations may suggest that the younger generation is both nationalistic and democratic.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2219&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;titreillustration&quot; data-dcnode-id=&quot;2216&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2215&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textIcon&quot; data-dcnode-id=&quot;2202&quot;&gt;&lt;span data-dcnode-id=&quot;2214&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;titreillustration&quot; data-dcnode-id=&quot;2212&quot; dir=&quot;ltr&quot; lang=&quot;en-gb&quot; xml:lang=&quot;en-gb&quot;&gt;&lt;span data-dcnode-id=&quot;2213&quot; instrument_node=&quot;&quot;&gt;7. Age and nationalism&lt;/span&gt;&lt;/p&gt;&lt;a data-dcnode-id=&quot;2210&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-7.png&quot; rel=&quot;iconSet&quot;&gt;&lt;img alt=&quot;7. Age and nationalism&quot; data-dcnode-id=&quot;2211&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-7.png&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;div class=&quot;textIconAccess&quot; data-dcnode-id=&quot;2204&quot;&gt;&lt;a class=&quot;iconZoom&quot; data-dcnode-id=&quot;2208&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-7.png&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2209&quot; instrument_node=&quot;&quot;&gt;Zoom&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2207&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;iconOrig&quot; data-dcnode-id=&quot;2205&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.openedition.org/chinaperspectives/docannexe/image/413/img-7.png&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;2206&quot; instrument_node=&quot;&quot;&gt;Original (png, 4.9k)&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2203&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2197&quot; dir=&quot;ltr&quot; lang=&quot;en-gb&quot; xml:lang=&quot;en-gb&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2199&quot;&gt;&lt;span data-dcnode-id=&quot;2200&quot; instrument_node=&quot;&quot;&gt;28&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2198&quot; instrument_node=&quot;&quot;&gt;People with lower incomes and lower level of education show a lower level of support for democracy and a high percentage DK response. One explanation could be that such respondents usually lack the political knowledge and consequentially are unable to form a concrete opinion. Education plays a critical role in influencing support of democracy. Highly educated Chinese people show the highest level of support of democracy. An explanation could be that education is directly associated with political knowledge and competence. The high percentage DK response to acceptance and evaluation of democracy by those with middle incomes can be explained partly by the following two points: they either worry about the political risk to themselves or the risk to their economic well-being.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2196&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2174&quot;&gt;&lt;span data-dcnode-id=&quot;2195&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2187&quot;&gt;&lt;span data-dcnode-id=&quot;2194&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2192&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2193&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2191&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2189&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2190&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2188&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2186&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2176&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2184&quot;&gt;&lt;span data-dcnode-id=&quot;2185&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2183&quot; instrument_node=&quot;&quot;&gt;The working class shows a lower level of affective and evaluative support of democracy compared to the middle class. The high percentage DK response among the working class can be explained by two points: first, the working class is less wealthy and less educated and often lacks the political knowledge to enable a definite answer to be given to both questions; second, the working class needs organisations to empower itself and shape its democratic values &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2181&quot; href=&quot;#ftn54&quot; id=&quot;bodyftn54&quot;&gt;&lt;span data-dcnode-id=&quot;2182&quot; instrument_node=&quot;&quot;&gt;54&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2180&quot; instrument_node=&quot;&quot;&gt;. The organisation of the Chinese workers, the All-China Federation of Trade Unions (ACFTU), far from being an independent organisation, is a corporatist institution controlled by the Chinese government. The ACFTU, licensed by the government and under directives from the Chinese government regulates the activities of Chinese workers on behalf of the government &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2178&quot; href=&quot;#ftn55&quot; id=&quot;bodyftn55&quot;&gt;&lt;span data-dcnode-id=&quot;2179&quot; instrument_node=&quot;&quot;&gt;55&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2177&quot; instrument_node=&quot;&quot;&gt;. As a result, the Chinese working class lacks the organisations to rouse its interest in democracy. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2175&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2173&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 data-dcnode-id=&quot;2170&quot;&gt;&lt;a data-dcnode-id=&quot;2171&quot; href=&quot;#tocfrom1n5&quot; id=&quot;tocto1n5&quot;&gt;&lt;span data-dcnode-id=&quot;2172&quot; instrument_node=&quot;&quot;&gt;Conclusion and implication&lt;/span&gt;&lt;/a&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;2169&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2165&quot; dir=&quot;ltr&quot; lang=&quot;en-gb&quot; xml:lang=&quot;en-gb&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2167&quot;&gt;&lt;span data-dcnode-id=&quot;2168&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2166&quot; instrument_node=&quot;&quot;&gt;Some findings of this study may be emphasised. First, the Chinese middle class has the highest level of support of democracy. However, this does not mean that this social group will rise against the current regime to fight for democracy. For the middle class to play a critical role in promoting democracy depends on other factors, such as the setting-up of independent and autonomous civil organisations to co-ordinate its collective behaviour. Second, the Chinese working class has exhibited a lower level of support of democracy compared with the middle class. Even though the working class has gradually retracted its political support for the regime since 1978, there are no organisations to rouse its interest in democracy. Third, younger well-educated Chinese are more ready to accept democratic values and believe that Western democracy is a better form of governance. This finding confirms the generational-replacement theory. But the younger generation is in fact both nationalistic and democratic. Fourth, education plays a critical role in the support of democracy. The better educated people are, the higher the level of support of democracy they exhibit. Overall, this study shows prospects democracy in China. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2164&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;go-top&quot; data-dcnode-id=&quot;2160&quot; href=&quot;#article-413&quot;&gt;&lt;span data-dcnode-id=&quot;2161&quot; instrument_node=&quot;&quot;&gt;Top of page&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2157&quot; instrument_node=&quot;&quot;&gt;
