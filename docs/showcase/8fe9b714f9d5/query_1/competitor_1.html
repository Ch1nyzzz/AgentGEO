&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2926&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2913&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2924&quot;&gt;&lt;span data-dcnode-id=&quot;2925&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2923&quot; instrument_node=&quot;&quot;&gt;Since 1978, China has experienced economic marketisation and a degree of political liberalisation &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2921&quot; href=&quot;#ftn1&quot; id=&quot;bodyftn1&quot;&gt;&lt;span data-dcnode-id=&quot;2922&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2920&quot; instrument_node=&quot;&quot;&gt;, and the importance of Maoist ideology has diminished in people’s daily life. Recent studies on political culture, while not comprehensive, have suggested the emergence of democratic values &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2918&quot; href=&quot;#ftn2&quot; id=&quot;bodyftn2&quot;&gt;&lt;span data-dcnode-id=&quot;2919&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2917&quot; instrument_node=&quot;&quot;&gt;, and thus, present a picture of hope for the prospect of Chinese democracy. The existing literature pays little attention to the origins of these democratic values, although studies have suggested that education, urban/rural residence and Party/non-Party membership are factors that have an impact on such an outcome &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2915&quot; href=&quot;#ftn3&quot; id=&quot;bodyftn3&quot;&gt;&lt;span data-dcnode-id=&quot;2916&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2914&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2912&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2903&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2896&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2901&quot;&gt;&lt;span data-dcnode-id=&quot;2902&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2900&quot; instrument_node=&quot;&quot;&gt;This study is based on the scientifically sampled national survey of public opinion in China, the World Values Survey (WVS) 2001 &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2898&quot; href=&quot;#ftn4&quot; id=&quot;bodyftn4&quot;&gt;&lt;span data-dcnode-id=&quot;2899&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2897&quot; instrument_node=&quot;&quot;&gt;. WVS 2001 China Survey in June 2001 has been implemented by the Research Center for Contemporary China at Peking University. The sample consists of 1,000 respondents distributed in proportion to both urban and rural populations to be representative of the whole adult population (18 years old and over). The main objective of this study is to examine the origins of democratic values in China and provide evidence to show the types of people likely to support these values. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2895&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2893&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 data-dcnode-id=&quot;2890&quot;&gt;&lt;a data-dcnode-id=&quot;2891&quot; href=&quot;#tocfrom1n1&quot; id=&quot;tocto1n1&quot;&gt;&lt;span data-dcnode-id=&quot;2892&quot; instrument_node=&quot;&quot;&gt;Why are democratic values important?&lt;/span&gt;&lt;/a&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;2889&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2864&quot;&gt;&lt;span data-dcnode-id=&quot;2888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2880&quot;&gt;&lt;span data-dcnode-id=&quot;2887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2885&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2886&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2884&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2882&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2883&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2881&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2879&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2866&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2877&quot;&gt;&lt;span data-dcnode-id=&quot;2878&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2876&quot; instrument_node=&quot;&quot;&gt;When explaining the conditions that give rise to American democracy, Tocqueville has emphasised the importance of egalitarian &lt;/span&gt;&lt;em data-dcnode-id=&quot;2874&quot;&gt;&lt;span data-dcnode-id=&quot;2875&quot; instrument_node=&quot;&quot;&gt;mores&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2873&quot; instrument_node=&quot;&quot;&gt; in American society &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2871&quot; href=&quot;#ftn5&quot; id=&quot;bodyftn5&quot;&gt;&lt;span data-dcnode-id=&quot;2872&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2870&quot; instrument_node=&quot;&quot;&gt;. Contemporary democracy theorists have reached a consensus that a set of pro-democratic values held at the individual level is conducive to the installation and consolidation of democracy. Democracy theorists identify certain distinctive clusters of democratic attitudes that are widely held across individuals. These clusters of democratic attitudes are durable and form subjective world orientations that are highly resistant to change, and are seen as the driving force for democratic development &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2868&quot; href=&quot;#ftn6&quot; id=&quot;bodyftn6&quot;&gt;&lt;span data-dcnode-id=&quot;2869&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2867&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2865&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2863&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2835&quot;&gt;&lt;span data-dcnode-id=&quot;2862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2851&quot;&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2859&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2860&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2856&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2857&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2855&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2853&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2854&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2850&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2837&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2848&quot;&gt;&lt;span data-dcnode-id=&quot;2849&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2847&quot; instrument_node=&quot;&quot;&gt;Almond and Verba were the first to systematically consider the concept of civic culture as a means to identify civic cultural attributes which are conducive to durable and stable democracy &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2845&quot; href=&quot;#ftn7&quot; id=&quot;bodyftn7&quot;&gt;&lt;span data-dcnode-id=&quot;2846&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2844&quot; instrument_node=&quot;&quot;&gt;. They assert that the civic culture is a mixed political culture. The participant role has been added to the subject and parochial roles. Gibson uses seven sub-dimensions—support for norms of democracy, political tolerance, valuation of liberty, support for competitive elections, rights consciousness, support for dissent, and support for independent media— to measure democratic beliefs of the public and establish the linkages between these democratic beliefs and democracy &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2842&quot; href=&quot;#ftn8&quot; id=&quot;bodyftn8&quot;&gt;&lt;span data-dcnode-id=&quot;2843&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2841&quot; instrument_node=&quot;&quot;&gt;. Putnam operationalises civicness by following indicators: vibrancy of associational life, newspaper readership, electoral turnout, and lack of preference voting &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2839&quot; href=&quot;#ftn9&quot; id=&quot;bodyftn9&quot;&gt;&lt;span data-dcnode-id=&quot;2840&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2838&quot; instrument_node=&quot;&quot;&gt;. Putnam pays attention to the roles of voluntary associational life. The horizontally organised associations build norms of generalised reciprocity and interpersonal trust, which are favourable to durable and effective democracy. These seminal works lay out the basic framework for positivist analysis of democratic values. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2836&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2834&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2812&quot;&gt;&lt;span data-dcnode-id=&quot;2833&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2825&quot;&gt;&lt;span data-dcnode-id=&quot;2832&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2830&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2831&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2827&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2828&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2824&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2814&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2822&quot;&gt;&lt;span data-dcnode-id=&quot;2823&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2821&quot; instrument_node=&quot;&quot;&gt;Chinese traditional political culture is often regarded as an obstacle to democratic transition &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2819&quot; href=&quot;#ftn10&quot; id=&quot;bodyftn10&quot;&gt;&lt;span data-dcnode-id=&quot;2820&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2818&quot; instrument_node=&quot;&quot;&gt;. Confucian culture “emphasised the group over the individual, authority over liberty, and responsibilities over rights” and “lacked a tradition of rights against the state”. In Confucian society, “harmony and cooperation were preferred over disagreement and competition,” “the maintenance of order and respect for hierarchy were central values” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2816&quot; href=&quot;#ftn11&quot; id=&quot;bodyftn11&quot;&gt;&lt;span data-dcnode-id=&quot;2817&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2815&quot; instrument_node=&quot;&quot;&gt;. Therefore, China’s traditional political culture is attributed as being “non-democratic”. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2811&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2795&quot;&gt;&lt;span data-dcnode-id=&quot;2810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2805&quot;&gt;&lt;span data-dcnode-id=&quot;2809&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2807&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2808&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2806&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2797&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2802&quot;&gt;&lt;span data-dcnode-id=&quot;2803&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2801&quot; instrument_node=&quot;&quot;&gt;Studies nevertheless have suggested the emergence of democratic values in China. These studies based their conclusions on the results of public opinion surveys and suggest that Chinese political culture is in transition. For example, Ogden suggests “China has inklings of a democratic political culture in certain respects and not in others” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2799&quot; href=&quot;#ftn12&quot; id=&quot;bodyftn12&quot;&gt;&lt;span data-dcnode-id=&quot;2800&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2798&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2796&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2794&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 data-dcnode-id=&quot;2791&quot;&gt;&lt;a data-dcnode-id=&quot;2792&quot; href=&quot;#tocfrom1n2&quot; id=&quot;tocto1n2&quot;&gt;&lt;span data-dcnode-id=&quot;2793&quot; instrument_node=&quot;&quot;&gt;Measuring the support of democratic values &lt;/span&gt;&lt;/a&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;2790&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2762&quot;&gt;&lt;span data-dcnode-id=&quot;2789&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2778&quot;&gt;&lt;span data-dcnode-id=&quot;2788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2786&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2787&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2785&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2783&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2784&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2780&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2781&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2779&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2777&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2764&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2775&quot;&gt;&lt;span data-dcnode-id=&quot;2776&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2774&quot; instrument_node=&quot;&quot;&gt;Nathan and Shi were the first to attempt a study of the democratic orientations of Chinese people. They measure the support of democratic values from three sub-dimensions: the perceived impact of government, political efficacy and political tolerance &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2772&quot; href=&quot;#ftn13&quot; id=&quot;bodyftn13&quot;&gt;&lt;span data-dcnode-id=&quot;2773&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2771&quot; instrument_node=&quot;&quot;&gt;. Wang and his associates adopt the same measurement criteria &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2769&quot; href=&quot;#ftn14&quot; id=&quot;bodyftn14&quot;&gt;&lt;span data-dcnode-id=&quot;2770&quot; instrument_node=&quot;&quot;&gt;14&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2768&quot; instrument_node=&quot;&quot;&gt;. Shi’s more recent works are also influenced by this method with an emphasis on political efficacy &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2766&quot; href=&quot;#ftn15&quot; id=&quot;bodyftn15&quot;&gt;&lt;span data-dcnode-id=&quot;2767&quot; instrument_node=&quot;&quot;&gt;15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2765&quot; instrument_node=&quot;&quot;&gt;. Nonetheless, this approach is not directly aimed at capturing the democratic values themselves. With an emphasis on the political efficacy, this measurement realises the importance of participant political culture in democracy, but is neither complete nor accurate in capturing democratic orientations. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2739&quot;&gt;&lt;span data-dcnode-id=&quot;2760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2752&quot;&gt;&lt;span data-dcnode-id=&quot;2759&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2757&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2758&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2754&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2755&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2753&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2751&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2741&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2749&quot;&gt;&lt;span data-dcnode-id=&quot;2750&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2748&quot; instrument_node=&quot;&quot;&gt;Chen and Zhong’s measurement of democratic values is more direct, and accurate, following three sub-dimensions: support for competitive elections of government officials, support for equal protection and rights for all people, and support for an independent media &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2746&quot; href=&quot;#ftn16&quot; id=&quot;bodyftn16&quot;&gt;&lt;span data-dcnode-id=&quot;2747&quot; instrument_node=&quot;&quot;&gt;16&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2745&quot; instrument_node=&quot;&quot;&gt;. This measurement touches important aspects of a democratic culture. However, the support of norms of democracy, which is critical for measuring democratic values, has been left behind &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2743&quot; href=&quot;#ftn17&quot; id=&quot;bodyftn17&quot;&gt;&lt;span data-dcnode-id=&quot;2744&quot; instrument_node=&quot;&quot;&gt;17&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2742&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2738&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2722&quot;&gt;&lt;span data-dcnode-id=&quot;2737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2732&quot;&gt;&lt;span data-dcnode-id=&quot;2736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2734&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2735&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2733&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2731&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2724&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2729&quot;&gt;&lt;span data-dcnode-id=&quot;2730&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2728&quot; instrument_node=&quot;&quot;&gt;Dowd and his associates use an open question: “which of the following values is most important?”, and put political democracy and individual freedom together with public order, fair administration of justice, social equality, and national peace and prosperity &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2726&quot; href=&quot;#ftn18&quot; id=&quot;bodyftn18&quot;&gt;&lt;span data-dcnode-id=&quot;2727&quot; instrument_node=&quot;&quot;&gt;18&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2725&quot; instrument_node=&quot;&quot;&gt; to measure the support of norms of democracy directly. Even though a step on from Chen and Zhong, this measurement is questionable. It fails to make distinctions between affective support of democracy and evaluative support of democracy. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2723&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2721&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2717&quot; dir=&quot;ltr&quot; lang=&quot;en-gb&quot; xml:lang=&quot;en-gb&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2719&quot;&gt;&lt;span data-dcnode-id=&quot;2720&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2718&quot; instrument_node=&quot;&quot;&gt;Drawing upon the seminal works by Almond and Verba, Gibson, and Putnam, this study will measure the democratic values of Chinese people from following two sub-dimensions: the acceptance of democratic norms (affective support) and the judgement about the performance of democracy (evaluative support).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2716&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2694&quot;&gt;&lt;span data-dcnode-id=&quot;2715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2707&quot;&gt;&lt;span data-dcnode-id=&quot;2714&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2712&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2713&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2711&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2709&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2710&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2708&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2706&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2696&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2704&quot;&gt;&lt;span data-dcnode-id=&quot;2705&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2703&quot; instrument_node=&quot;&quot;&gt;Why this distinction? Some recent studies suggest that the support for democratic principles is very different from evaluations of how democracy will perform in practice &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2701&quot; href=&quot;#ftn19&quot; id=&quot;bodyftn19&quot;&gt;&lt;span data-dcnode-id=&quot;2702&quot; instrument_node=&quot;&quot;&gt;19&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2700&quot; instrument_node=&quot;&quot;&gt;. Our method allows respondents to “express doubts about democracy, without directly rejecting democratic principles”, and to focus “on broad features of democratic governance, and not on short-term judgments about specific governments” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2698&quot; href=&quot;#ftn20&quot; id=&quot;bodyftn20&quot;&gt;&lt;span data-dcnode-id=&quot;2699&quot; instrument_node=&quot;&quot;&gt;20&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2697&quot; instrument_node=&quot;&quot;&gt;. In this study, the affective support of democracy is measured by the survey question regarding “having a democratic political system”, while the evaluative support of democracy is measured by the survey question stating that “democracy may have problems but it’s better than any other form of government”. The main concern of this study is to provide evidence about what sorts of people are likely to hold values considered democratic. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2695&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 data-dcnode-id=&quot;2690&quot;&gt;&lt;a data-dcnode-id=&quot;2691&quot; href=&quot;#tocfrom1n3&quot; id=&quot;tocto1n3&quot;&gt;&lt;span data-dcnode-id=&quot;2692&quot; instrument_node=&quot;&quot;&gt;Three theories of the origins of democratic values&lt;/span&gt;&lt;/a&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;2689&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2641&quot;&gt;&lt;span data-dcnode-id=&quot;2688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2671&quot;&gt;&lt;span data-dcnode-id=&quot;2687&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2685&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2686&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2682&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2683&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2681&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2679&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2680&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2678&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2676&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2677&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2675&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2673&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2674&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2672&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2643&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2668&quot;&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2667&quot; instrument_node=&quot;&quot;&gt;1) This theory emphasises the importance of socio-economic factors such as income, education and age. According to this theory, the more wealthy, well-educated and young the people are, the more they are likely to support democracy. With the continued economic development of China, there should be more signs of attraction to democracy or values considered democratic as a result. &lt;/span&gt;&lt;br data-dcnode-id=&quot;2666&quot;&gt;&lt;span data-dcnode-id=&quot;2665&quot; instrument_node=&quot;&quot;&gt;Nathan and Shi have found that the perceived impact of government varies substantially with the level of education. They suggest that the level of political tolerance is likely to increase as older less-educated people are replaced by younger, better educated people. Even though less-educated people have a relatively low sense of the government’s impact, relatively low internal efficacy, relatively low political tolerance, and relatively high confidence in the government, Nathan and Shi are optimistic about the prospect for Chinese democracy. They conclude that Chinese political culture will move closer to the patterns characteristic of democratic countries as the economy grows &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2663&quot; href=&quot;#ftn21&quot; id=&quot;bodyftn21&quot;&gt;&lt;span data-dcnode-id=&quot;2664&quot; instrument_node=&quot;&quot;&gt;21&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2662&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2661&quot;&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;In a more recent study, Shi also finds that higher levels of education and income play a significant role in making people transcend their traditional culture. People with higher education and income not only tend to perceive their relationship with authority as reciprocal but are also more willing to enter into conflict with others to assert their interests &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2658&quot; href=&quot;#ftn22&quot; id=&quot;bodyftn22&quot;&gt;&lt;span data-dcnode-id=&quot;2659&quot; instrument_node=&quot;&quot;&gt;22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2657&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;br data-dcnode-id=&quot;2656&quot;&gt;&lt;span data-dcnode-id=&quot;2655&quot; instrument_node=&quot;&quot;&gt;After presenting the fact that well-educated and wealthy Chinese people are more likely to possess democratic values, Chu and Chang conclude: “socioeconomic development is positively correlated with demand for democratic principles, suggesting that modernisation generally facilitates the growth in democratic-value orientation” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2653&quot; href=&quot;#ftn23&quot; id=&quot;bodyftn23&quot;&gt;&lt;span data-dcnode-id=&quot;2654&quot; instrument_node=&quot;&quot;&gt;23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2652&quot; instrument_node=&quot;&quot;&gt;. All these studies suggest that well-educated, urban and wealthy people have a relatively stronger orientation towards democratic values than the rest of Chinese. &lt;/span&gt;&lt;br data-dcnode-id=&quot;2651&quot;&gt;&lt;span data-dcnode-id=&quot;2650&quot; instrument_node=&quot;&quot;&gt;On the other hand, the multivariable analysis offered by Dowd and his associates finds the opposite direction between education and political democracy, and between income and political democracy. Dowd finds no evidence “to suggest that there will be increasing pressure for democratisation based on generational replacement effects” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2648&quot; href=&quot;#ftn24&quot; id=&quot;bodyftn24&quot;&gt;&lt;span data-dcnode-id=&quot;2649&quot; instrument_node=&quot;&quot;&gt;24&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2647&quot; instrument_node=&quot;&quot;&gt;. The positive relationship between age and the probability of selecting political democracy as the most important value may suggest “there will not be any long-term, generational-replacement-driven pressure for democratization” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2645&quot; href=&quot;#ftn25&quot; id=&quot;bodyftn25&quot;&gt;&lt;span data-dcnode-id=&quot;2646&quot; instrument_node=&quot;&quot;&gt;25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2642&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2640&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2582&quot;&gt;&lt;span data-dcnode-id=&quot;2639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2616&quot;&gt;&lt;span data-dcnode-id=&quot;2638&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2636&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2637&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2635&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2633&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2634&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2630&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2631&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2629&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2627&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2628&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2626&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2624&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2625&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2621&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2622&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2618&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2619&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2615&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2584&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2613&quot;&gt;&lt;span data-dcnode-id=&quot;2614&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2612&quot; instrument_node=&quot;&quot;&gt;2) This theory emphasises the importance of middle class &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2610&quot; href=&quot;#ftn26&quot; id=&quot;bodyftn26&quot;&gt;&lt;span data-dcnode-id=&quot;2611&quot; instrument_node=&quot;&quot;&gt;26&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2609&quot; instrument_node=&quot;&quot;&gt;. For Lipset, the middle class is the friend of democracy &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2607&quot; href=&quot;#ftn27&quot; id=&quot;bodyftn27&quot;&gt;&lt;span data-dcnode-id=&quot;2608&quot; instrument_node=&quot;&quot;&gt;27&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2606&quot; instrument_node=&quot;&quot;&gt;. Moore’s declaration, “no bourgeois, no democracy” touched on the hypothesis about the democratic impulses of middle class &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2604&quot; href=&quot;#ftn28&quot; id=&quot;bodyftn28&quot;&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt;28&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2603&quot; instrument_node=&quot;&quot;&gt;. Glassman and Huntington both recognise that middle class has particular affinities with democracy &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2601&quot; href=&quot;#ftn29&quot; id=&quot;bodyftn29&quot;&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2600&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;br data-dcnode-id=&quot;2599&quot;&gt;&lt;span data-dcnode-id=&quot;2598&quot; instrument_node=&quot;&quot;&gt;With China’s economic development, so the country’s middle class has grown significantly, both in absolute number and in percentage relative to the whole population. In our study we consider middle class as comprised mainly of managerial personnel, private entrepreneurs, professionals, civil servants, and &lt;/span&gt;&lt;em data-dcnode-id=&quot;2596&quot;&gt;&lt;span data-dcnode-id=&quot;2597&quot; instrument_node=&quot;&quot;&gt;getihu&lt;/span&gt;&lt;/em&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2594&quot; href=&quot;#ftn30&quot; id=&quot;bodyftn30&quot;&gt;&lt;span data-dcnode-id=&quot;2595&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2593&quot; instrument_node=&quot;&quot;&gt;. This social class owns most of the economic and cultural capital, and limited political capital. We have chosen occupation as the main criteria to determine position in the social space because it ties together the three dimensions: political, economic and cultural capital. &lt;/span&gt;&lt;br data-dcnode-id=&quot;2592&quot;&gt;&lt;span data-dcnode-id=&quot;2591&quot; instrument_node=&quot;&quot;&gt;It is difficult to evaluate precisely the degree of support for democratic values among the middle class. For Glassman, China’s middle class should have a high level of democratic values, since there is a global convergence of democratic values among the middle classes across the world &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2589&quot; href=&quot;#ftn31&quot; id=&quot;bodyftn31&quot;&gt;&lt;span data-dcnode-id=&quot;2590&quot; instrument_node=&quot;&quot;&gt;31&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2588&quot; instrument_node=&quot;&quot;&gt;. Since middle class engenders a high level of education and income, we would expect it to hold a higher level of democratic beliefs. However, such extrapolation is impossible &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2586&quot; href=&quot;#ftn32&quot; id=&quot;bodyftn32&quot;&gt;&lt;span data-dcnode-id=&quot;2587&quot; instrument_node=&quot;&quot;&gt;32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2583&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2553&quot;&gt;&lt;span data-dcnode-id=&quot;2580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2569&quot;&gt;&lt;span data-dcnode-id=&quot;2579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2577&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2578&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2574&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2575&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2573&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2571&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2572&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2570&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2555&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2566&quot;&gt;&lt;span data-dcnode-id=&quot;2567&quot; instrument_node=&quot;&quot;&gt;14&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2565&quot; instrument_node=&quot;&quot;&gt;3) The emphasis in this theory is on the importance of the working class. Collier, Rueschemeyer and the Stephens emphasise the importance of the working class in the process of democratisation instead of political elites &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2563&quot; href=&quot;#ftn33&quot; id=&quot;bodyftn33&quot;&gt;&lt;span data-dcnode-id=&quot;2564&quot; instrument_node=&quot;&quot;&gt;33&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2562&quot; instrument_node=&quot;&quot;&gt;. They suggest that “the relative size and the density of organisation of the working class—of employed manual labor outside of agriculture—are of critical importance for the advance of democracy” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2560&quot; href=&quot;#ftn34&quot; id=&quot;bodyftn34&quot;&gt;&lt;span data-dcnode-id=&quot;2561&quot; instrument_node=&quot;&quot;&gt;34&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2559&quot; instrument_node=&quot;&quot;&gt;. It is the working class that fights for democracy while the bourgeoisie and urban middle class, that benefited from the status quo, nearly without exception, resist democracy, once their own interests are secured &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2557&quot; href=&quot;#ftn35&quot; id=&quot;bodyftn35&quot;&gt;&lt;span data-dcnode-id=&quot;2558&quot; instrument_node=&quot;&quot;&gt;35&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2556&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2554&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2552&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2524&quot;&gt;&lt;span data-dcnode-id=&quot;2551&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2540&quot;&gt;&lt;span data-dcnode-id=&quot;2550&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2548&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2549&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2547&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2545&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2546&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2544&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2542&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2543&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2541&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2539&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2526&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2537&quot;&gt;&lt;span data-dcnode-id=&quot;2538&quot; instrument_node=&quot;&quot;&gt;15&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2536&quot; instrument_node=&quot;&quot;&gt;With the economic development, China’s working class has changed fundamentally. The reforming of state and collective firms has altered the pattern of “organised dependence” and the paternalism characteristic of state-labor relations in Mao’s era &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2534&quot; href=&quot;#ftn36&quot; id=&quot;bodyftn36&quot;&gt;&lt;span data-dcnode-id=&quot;2535&quot; instrument_node=&quot;&quot;&gt;36&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2533&quot; instrument_node=&quot;&quot;&gt;. In Mao’s era, China’s working class benefited from the regime; by contrast, in the reform era, China’s working class is changing from being beneficiaries to becoming those losing out. China’s working class has become the subordinate class and its discontent is rising. Lee’s study records different forms of labour struggles; everyday workplace resistance, petitions, work stoppages, strikes, public protest, violence, independent unionism. However, even though rising worker discontent is visible, the likelihood of mass mobilisation of workers against the state appears low &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2531&quot; href=&quot;#ftn37&quot; id=&quot;bodyftn37&quot;&gt;&lt;span data-dcnode-id=&quot;2532&quot; instrument_node=&quot;&quot;&gt;37&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2530&quot; instrument_node=&quot;&quot;&gt;. Lee’s conclusion is very cautious: on the one hand, a more restive Chinese working class is in the making, while the emergence of a labour movement against the regime is yet to come&lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2528&quot; href=&quot;#ftn38&quot; id=&quot;bodyftn38&quot;&gt;&lt;span data-dcnode-id=&quot;2529&quot; instrument_node=&quot;&quot;&gt;38&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2527&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2525&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2523&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2495&quot;&gt;&lt;span data-dcnode-id=&quot;2522&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2511&quot;&gt;&lt;span data-dcnode-id=&quot;2521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2519&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2520&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2516&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2517&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2513&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2514&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2497&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2508&quot;&gt;&lt;span data-dcnode-id=&quot;2509&quot; instrument_node=&quot;&quot;&gt;16&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2507&quot; instrument_node=&quot;&quot;&gt;Several studies suggest that the Chinese regime has lost the political support of the working class &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2505&quot; href=&quot;#ftn39&quot; id=&quot;bodyftn39&quot;&gt;&lt;span data-dcnode-id=&quot;2506&quot; instrument_node=&quot;&quot;&gt;39&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2504&quot; instrument_node=&quot;&quot;&gt;. “China’s political leaders can no longer take comfort in their ability to turn to the workers for support when facing crisis. Instead, they must worry about whether or not they can maintain control over their increasingly unhappy and fractious proletariat” &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2502&quot; href=&quot;#ftn40&quot; id=&quot;bodyftn40&quot;&gt;&lt;span data-dcnode-id=&quot;2503&quot; instrument_node=&quot;&quot;&gt;40&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2501&quot; instrument_node=&quot;&quot;&gt;. The success of China’s economic reforms is paradoxical: the leaders intended to increase support for the regime by initiating reform, but the reforms have instead gradually eroded it &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2499&quot; href=&quot;#ftn41&quot; id=&quot;bodyftn41&quot;&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt;41&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2498&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 data-dcnode-id=&quot;2491&quot;&gt;&lt;a data-dcnode-id=&quot;2492&quot; href=&quot;#tocfrom1n4&quot; id=&quot;tocto1n4&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;The empirical survey&lt;/span&gt;&lt;/a&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2480&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2488&quot;&gt;&lt;span data-dcnode-id=&quot;2489&quot; instrument_node=&quot;&quot;&gt;17&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2487&quot; instrument_node=&quot;&quot;&gt;In our study, the support of democratic values is measured by the following two survey questions that consider: “&lt;/span&gt;&lt;em data-dcnode-id=&quot;2485&quot;&gt;&lt;span data-dcnode-id=&quot;2486&quot; instrument_node=&quot;&quot;&gt;Having a democratic political system&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2484&quot; instrument_node=&quot;&quot;&gt;” and “&lt;/span&gt;&lt;em data-dcnode-id=&quot;2482&quot;&gt;&lt;span data-dcnode-id=&quot;2483&quot; instrument_node=&quot;&quot;&gt;Democracy may have problems but it’s better than any other form of government&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2481&quot; instrument_node=&quot;&quot;&gt;”. Those saying that having a democratic political system is “very good” or “fairly good” were coded 1, and those considering it “bad” or “very bad” were coded 0. Those choosing “agree strongly” or “agree” to respond to the statement that democracy may have problems but it’s better than any other form of government were coded 1, while those who “disagree strongly” or “disagree” were coded 0. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;textandnotes&quot; data-dcnode-id=&quot;2463&quot;&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;sidenotes&quot; data-dcnode-id=&quot;2473&quot;&gt;&lt;span data-dcnode-id=&quot;2477&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2475&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;2476&quot;&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2474&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;texte&quot; data-dcnode-id=&quot;2465&quot; dir=&quot;ltr&quot; lang=&quot;en-us&quot; xml:lang=&quot;en-us&quot;&gt;&lt;span class=&quot;paranumber&quot; data-dcnode-id=&quot;2470&quot;&gt;&lt;span data-dcnode-id=&quot;2471&quot; instrument_node=&quot;&quot;&gt;18&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2469&quot; instrument_node=&quot;&quot;&gt;Treating “Don’t Know” (DK) answers as “missing” gave a result of a reasonably high affective and evaluative support for democracy. Of respondents, 96.3% supported “Having a democratic political system” (Table 1), while 89.9% agreed that “Democracy may have problems but it’s better than any other form of government” (Table 2). Inglehart and his associates, as well as Dalton and Shin report this finding &lt;/span&gt;&lt;a class=&quot;footnotecall&quot; data-dcnode-id=&quot;2467&quot; href=&quot;#ftn42&quot; id=&quot;bodyftn42&quot;&gt;&lt;span data-dcnode-id=&quot;2468&quot; instrument_node=&quot;&quot;&gt;42&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt;. The percentage of DK responses for both questions was 23.9% and 34.6% respectively (Table 3 and Table 4). If we treat DK responses as a valid and separate answer, the statistical result is quite different: 73.3% of respondents supported “Having a democratic political system” (Table 3) and 58.8% agrees that “Democracy may have problems but it’s better than any other form of government” (Table 4). These figures reveal a higher level of democratic orientation than existing literature suggests.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2462&quot; instrument_node=&quot;&quot;&gt;
