            &quot;datePublished&quot;: &quot;2015-08-21&quot;,
            &quot;dateModified&quot;: &quot;2025-07-01&quot;,
            &quot;headline&quot;: &quot;The Truth Behind Four Natural Cancer “Cures” &quot;,
            &quot;description&quot;: &quot;&quot;,
            &quot;articleBody&quot;: &quot;The internet is full of “miracle cures” for cancer and alleged surefire ways to prevent it, and well-meaning people may urge cancer patients to just try them out in hopes of eliminating their disease. Some patients, worried that conventional treatments won’t work or pose significant side effects, seek a treatment whose effectiveness isn’t actually supported by scientific evidence or may even prove dangerous.\u0026nbsp;During a time of uncertainty and anxiety, it’s understandable that any hope for a cure —\u0026nbsp;even if it isn’t medically proven — is tempting.“Amid the growing preference for natural products to bolster general health, patients often confront a myriad of misinformation,” explains Jason Hou, a pharmacist and herbalist at Memorial Sloan Kettering. “Despite this, they seek natural remedies to combat or prevent cancer recurrence. Often, advocates of such products lack medical or oncological expertise.” Dr. Hou is especially concerned when patients delay conventional treatment to explore such therapies. “They may later don’t discover, when they do seek out conventional treatment, that their cancer has already metastasized.”Dr. Hou manages both the\u0026nbsp;About Herbs database, and the Herbal Oncology Program (HOP), created and maintained by\u0026nbsp;MSK’s Integrative Medicine Service. The service provides complementary therapies such as acupuncture, music therapy, and massage that are used in addition to — not as alternatives to — standard cancer treatments including chemotherapy, radiation, and surgery.Here, Dr. Hou explains the hype and the scientific evidence surrounding four highly publicized but unproven therapies: Cannabis oil, castor oil, Laetrile, and a pH-manipulation (also known as alkaline) diet.Cannabis OilThe hype:\u0026nbsp;Cannabis oil is often heralded as a treatment to destroy or shrink cancerous tumors, as well as a cure for diabetes, ulcers, arthritis, migraines, insomnia, infections, and many other diseases. Also called marijuana oil or hemp oil, it’s extracted from marijuana plants, often with higher proportion of a compound known as CBD (cannabidiol), which has less of a psychoactive effect than the more-famous THC (tetrahydrocannabinol) compound that gets marijuana users high.Cannabis oil is available in several forms with different potencies. It can be infused into cooking oil that users squirt under the tongue or mix into food. Its vapors can also be inhaled. By federal law, cannabis products are illegal, though several states have enacted laws to legalize their medical use.The evidence:\u0026nbsp;While commercially available cannabis compounds are FDA-approved to reduce cancer treatment–related side effects such as nausea and vomiting and to improve appetite, no clinical trials have shown that cannabis products can treat cancer.Claims that cannabis oil cures cancer are anecdotal and largely unsupportable, based on scant research done in mice and in labs. Side effects can include memory and attention loss. Perhaps most important, there is evidence that cannabis compounds may inhibit enzymes that patients need to metabolize other anticancer drugs, thereby increasing their toxicity or reducing their effectiveness.The verdict:\u0026nbsp;“Thus far, there haven’t been any human studies demonstrating that cannabis oil can effectively treat cancer,” Dr. Hou explains. “If patients are using it, or any other form of cannabis, it’s important to inform their doctors so they can provide appropriate guidance.”\u0026nbsp; According to a 2024 American Society of Clinical Oncology (ASCO) guideline, “Clinicians should recommend against using cannabis or cannabinoids as a cancer-directed treatment unless within the context of a clinical trial.”Castor OilThe hype:\u0026nbsp;Castor oil has been recently promoted as a cancer cure over the Internet and social media, particularly on TikTok\u0026nbsp;with claims that it can treat breast cancer by topical application. Recently, we began receiving requests for information about the benefits of castor oil.The evidence:\u0026nbsp;There is no evidence that castor oil can fight cancer. This underscores the importance of About Herbs \u0026nbsp;in providing trustworthy information while helping to debunk false claims, especially given how easily they get shared and amplified on social media.The verdict:\u0026nbsp;“We consistently warn patients that ‘natural doesn’t always mean safe.” Dr. Hou explains. “But with social media emerging as a means of\u0026nbsp; disseminating information, we should add that videos that go viral, should not always be trusted!”LaetrileThe hype:\u0026nbsp;Laetrile, first popularized as a cancer therapy in Russia and the United States more than a century ago, is the trade name for a purified form of amygdalin, an extract derived from apricot pits and some nuts and plants. Intestinal enzymes break down Laetrile to produce cyanide, which proponents claim kills cancer cells and leaves normal tissue unharmed. Some also claim that Laetrile is actually a vitamin called B-17 and that deficiencies can cause certain cancers. Banned in the United States, an oral form of Laetrile is available in other countries.The evidence:\u0026nbsp;Laetrile indeed breaks down into cyanide, but the poison doesn’t just selectively strike cancer cells — it can sicken or kill patients as well. Clinical studies done in the 1970s and 1980s, including those sponsored by the National Institutes of Health, indicated that Laetrile didn’t reduce malignant tumors’ size or growth, but some patients experienced cyanide poisoning.The verdict:\u0026nbsp;“Laetrile hasn’t been shown to combat cancer and can pose the risk\u0026nbsp;of\u0026nbsp;cyanide poisoning,” Dr. Hou emphasizes. “If amygdalin is ever considered for use in an anticancer medication, it would need to be in a modified form, as the oral version is toxic to normal human cells and too hazardous for use.”Manipulating pH Levels through DietThe hype:\u0026nbsp;Based on the scientific observation that cancer cells thrive in an acidic environment — meaning low pH levels — some people contend that highly “acidic” foods such as meat, cheese, and grain products raise the risk of cancer by reducing pH levels in the blood. They claim that eating “alkaline” foods such as fruit, green vegetables, and other plant-based products discourages the growth of cancer cells by raising blood pH levels and tout the benefits of the alkaline diet (also known as the alkaline ash diet or alkaline acid diet).The evidence:\u0026nbsp;Cancer cells create an acidic microenvironment due to a high metabolic rate. Cancer cells can’t live in a highly alkaline environment, but neither can healthy cells. Your body works to keep pH levels constant, and changing your diet is not going to substantially change the pH levels of your blood, which are tightly regulated by the kidneys and lungs regardless of foods consumed.The pH of bodily fluids, such as saliva and urine, does change temporarily depending on the foods you eat, but that doesn’t affect blood pH levels (or, hence, the environment of cancer cells in the body). In fact, any significant deviation in blood pH levels can cause serious, even life-threatening conditions known as acidosis (low pH) or alkalosis (high pH)The verdict:\u0026nbsp;“There is no evidence to support the notion that altering your diet can alter blood pH levels, let alone impact cancer growth,” Dr. Hou states. “The science behind this has been misconstrued. Modifying the pH of your saliva doesn’t influence the pH of your blood. Some patients may attempt to adjust their blood pH using chemicals, but this can pose serious risks.”The Bottom Line“Natural” cancer therapies should be regarded with great caution because most are unsupported by evidence. Many people offering testimonials to the effectiveness of such treatments may attribute benefits to them simply because their condition improved after using them — when the actual cause for the improvement is unrelated.The good news is that mainstream cancer therapies are safer and more effective than ever. New\u0026nbsp;chemotherapies\u0026nbsp;work better with fewer side effects, and novel drugs target specific mutations in cancer cells to minimize harm to healthy cells. Highly precise forms of\u0026nbsp;radiation therapy\u0026nbsp;destroy tumors while sparing normal tissue. New approaches\u0026nbsp;harness the body’s own immune powers\u0026nbsp;to destroy cancer cells. And new\u0026nbsp;surgical techniques\u0026nbsp;are making it possible to remove tumors more safely while minimizing both risk of recurrence and recovery times. \u0026nbsp;If you’re considering using a complementary therapy in addition to your traditional cancer treatments, always check with a reputable source such as our\u0026nbsp;About Herbs\u0026nbsp;database or the\u0026nbsp;National Cancer Institute, and always tell your doctor.\u0026nbsp;&quot;,

        &lt;div class=&quot;field-items&quot;&gt;
              &lt;div class=&quot;field-item&quot;&gt;&lt;div class=&quot;msk-markup&quot;&gt;
&lt;p&gt;The internet is full of &amp;#x201C;miracle cures&amp;#x201D; for cancer and alleged surefire ways to prevent it, and well-meaning people may urge cancer patients to just try them out in hopes of eliminating their disease. Some patients, worried that conventional treatments won&amp;#x2019;t work or pose significant side effects, seek a treatment whose effectiveness isn&amp;#x2019;t actually supported by scientific evidence or may even prove dangerous.&amp;#xA0;During a time of uncertainty and anxiety, it&amp;#x2019;s understandable that any hope for a cure &amp;#x2014;&amp;#xA0;even if it isn&amp;#x2019;t medically proven &amp;#x2014; is tempting.&lt;/p&gt;&lt;p&gt;&amp;#x201C;Amid the growing preference for natural products to bolster general health, patients often confront a myriad of misinformation,&amp;#x201D; explains Jason Hou, a pharmacist and herbalist at Memorial Sloan Kettering. &amp;#x201C;Despite this, they seek natural remedies to combat or prevent cancer recurrence. Often, advocates of such products lack medical or oncological expertise.&amp;#x201D; Dr. Hou is especially concerned when patients delay conventional treatment to explore such therapies. &amp;#x201C;They may later don&amp;#x2019;t discover, when they do seek out conventional treatment, that their cancer has already metastasized.&amp;#x201D;&lt;/p&gt;&lt;p&gt;Dr. Hou manages both the&amp;#xA0;&lt;a href=&quot;/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine/herbs/search&quot;&gt;&lt;em&gt;About Herbs&lt;/em&gt; database&lt;/a&gt;, and the &lt;a href=&quot;https://link.springer.com/article/10.1007/s00520-023-07577-x&quot;&gt;Herbal Oncology Program (HOP)&lt;/a&gt;, created and maintained by&amp;#xA0;&lt;a href=&quot;/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine&quot;&gt;MSK&amp;#x2019;s Integrative Medicine Service&lt;/a&gt;. The service provides complementary therapies such as acupuncture, music therapy, and massage that are used in addition to &amp;#x2014; not as alternatives to &amp;#x2014; standard cancer treatments including chemotherapy, radiation, and surgery.&lt;/p&gt;&lt;p&gt;Here, Dr. Hou explains the hype and the scientific evidence surrounding four highly publicized but unproven therapies: Cannabis oil, castor oil, Laetrile, and a pH-manipulation (also known as alkaline) diet.&lt;/p&gt;&lt;p&gt;&lt;a name=&quot;_msocom_1&quot;&gt;&lt;/a&gt;&lt;/p&gt;

                  &lt;h2 class=&quot;right-rail__subtitle&quot; id=&quot;cannabis-oil&quot;&gt;Cannabis Oil&lt;/h2&gt;
        &lt;p&gt;&lt;strong&gt;The hype:&lt;/strong&gt;&amp;#xA0;&lt;a href=&quot;/cancer-care/integrative-medicine/herbs/cannabis&quot;&gt;Cannabis oil&lt;/a&gt; is often heralded as a treatment to destroy or shrink cancerous tumors, as well as a cure for diabetes, ulcers, arthritis, migraines, insomnia, infections, and many other diseases. Also called marijuana oil or hemp oil, it&amp;#x2019;s extracted from marijuana plants, often with higher proportion of a compound known as CBD (cannabidiol), which has less of a psychoactive effect than the more-famous THC (tetrahydrocannabinol) compound that gets marijuana users high.&lt;/p&gt;&lt;p&gt;Cannabis oil is available in several forms with different potencies. It can be infused into cooking oil that users squirt under the tongue or mix into food. Its vapors can also be inhaled. By federal law, cannabis products are illegal, though several states have enacted laws to legalize their medical use.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;The evidence:&lt;/strong&gt;&amp;#xA0;While commercially available cannabis compounds are FDA-approved to reduce cancer treatment&amp;#x2013;related side effects such as nausea and vomiting and to improve appetite, no clinical trials have shown that cannabis products can treat cancer.&lt;/p&gt;&lt;p&gt;Claims that cannabis oil cures cancer are anecdotal and largely unsupportable, based on scant research done in mice and in labs. Side effects can include memory and attention loss. Perhaps most important, there is evidence that cannabis compounds may inhibit enzymes that patients need to metabolize other anticancer drugs, thereby increasing their toxicity or reducing their effectiveness.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;The verdict:&lt;/strong&gt;&lt;em&gt;&amp;#xA0;&lt;/em&gt;&amp;#x201C;Thus far, there haven&amp;#x2019;t been any human studies demonstrating that cannabis oil can effectively treat cancer,&amp;#x201D; Dr. Hou explains. &amp;#x201C;If patients are using it, or any other form of cannabis, it&amp;#x2019;s important to inform their doctors so they can provide appropriate guidance.&amp;#x201D;&amp;#xA0; According to a &lt;a href=&quot;https://ascopubs.org/doi/10.1200/JCO.23.02596&quot;&gt;2024 American Society of Clinical Oncology (ASCO) guideline&lt;/a&gt;, &amp;#x201C;Clinicians should recommend against using cannabis or cannabinoids as a cancer-directed treatment unless within the context of a clinical trial.&amp;#x201D;&lt;/p&gt;&lt;p&gt;&lt;a name=&quot;_msocom_1&quot;&gt;&lt;/a&gt;&lt;/p&gt;

                  &lt;h2 class=&quot;right-rail__subtitle&quot; id=&quot;castor-oil&quot;&gt;Castor Oil&lt;/h2&gt;
        &lt;p&gt;&lt;strong&gt;The hype:&lt;/strong&gt;&amp;#xA0;&lt;a href=&quot;/cancer-care/integrative-medicine/herbs/castor-oil&quot;&gt;Castor oil&lt;/a&gt; has been recently promoted as a cancer cure over the Internet and social media, particularly on TikTok&amp;#xA0;with claims that it can treat breast cancer by topical application. Recently, we began receiving requests for information about the benefits of castor oil.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;The evidence:&lt;/strong&gt;&amp;#xA0;There is no evidence that castor oil can fight cancer. This underscores the importance of &lt;a href=&quot;/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine/herbs&quot;&gt;&lt;em&gt;About Herbs&lt;/em&gt;&lt;/a&gt; &amp;#xA0;in providing trustworthy information while helping to debunk false claims, especially given how easily they get shared and amplified on social media.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;The verdict:&lt;/strong&gt;&lt;em&gt;&amp;#xA0;&lt;/em&gt;&amp;#x201C;We consistently warn patients that &amp;#x2018;natural doesn&amp;#x2019;t always mean safe.&amp;#x201D; Dr. Hou explains. &amp;#x201C;But with social media emerging as a means of&amp;#xA0; disseminating information, we should add that videos that go viral, should not always be trusted!&amp;#x201D;&lt;/p&gt;&lt;p&gt;&lt;a name=&quot;_msocom_1&quot;&gt;&lt;/a&gt;&lt;/p&gt;

                  &lt;h2 class=&quot;right-rail__subtitle&quot; id=&quot;laetrile&quot;&gt;Laetrile&lt;/h2&gt;
        &lt;p&gt;&lt;strong&gt;The hype:&lt;/strong&gt;&amp;#xA0;&lt;a href=&quot;/cancer-care/integrative-medicine/herbs/amygdalin&quot;&gt;Laetrile&lt;/a&gt;, first popularized as a cancer therapy in Russia and the United States more than a century ago, is the trade name for a purified form of amygdalin, an extract derived from apricot pits and some nuts and plants. Intestinal enzymes break down Laetrile to produce cyanide, which proponents claim kills cancer cells and leaves normal tissue unharmed. Some also claim that Laetrile is actually a vitamin called B-17 and that deficiencies can cause certain cancers. Banned in the United States, an oral form of Laetrile is available in other countries.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;The evidence:&lt;/strong&gt;&amp;#xA0;Laetrile indeed breaks down into cyanide, but the poison doesn&amp;#x2019;t just selectively strike cancer cells &amp;#x2014; it can sicken or kill patients as well. Clinical studies done in the 1970s and 1980s, including those sponsored by the National Institutes of Health, indicated that Laetrile didn&amp;#x2019;t reduce malignant tumors&amp;#x2019; size or growth, but some patients experienced cyanide poisoning.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;The verdict:&lt;/strong&gt;&lt;em&gt;&amp;#xA0;&lt;/em&gt;&amp;#x201C;Laetrile hasn&amp;#x2019;t been shown to combat cancer and can pose the risk&amp;#xA0;of&amp;#xA0;cyanide poisoning,&amp;#x201D; Dr. Hou emphasizes. &amp;#x201C;If amygdalin is ever considered for use in an anticancer medication, it would need to be in a modified form, as the oral version is toxic to normal human cells and too hazardous for use.&amp;#x201D;&lt;/p&gt;

                  &lt;h2 class=&quot;right-rail__subtitle&quot; id=&quot;manipulating-p-h-levels-through-diet&quot;&gt;Manipulating pH Levels through Diet&lt;/h2&gt;
        &lt;p&gt;&lt;strong&gt;The hype:&lt;/strong&gt;&amp;#xA0;Based on the scientific observation that cancer cells thrive in an acidic environment &amp;#x2014; meaning low pH levels &amp;#x2014; some people contend that highly &amp;#x201C;acidic&amp;#x201D; foods such as meat, cheese, and grain products raise the risk of cancer by reducing pH levels in the blood. They claim that eating &amp;#x201C;alkaline&amp;#x201D; foods such as fruit, green vegetables, and other plant-based products discourages the growth of cancer cells by raising blood pH levels and tout the benefits of the alkaline diet (also known as the alkaline ash diet or alkaline acid diet).&lt;/p&gt;&lt;p&gt;&lt;strong&gt;The evidence:&lt;/strong&gt;&amp;#xA0;Cancer cells create an acidic microenvironment due to a high metabolic rate. Cancer cells can&amp;#x2019;t live in a highly alkaline environment, but neither can healthy cells. Your body works to keep pH levels constant, and changing your diet is not going to substantially change the pH levels of your blood, which are tightly regulated by the kidneys and lungs regardless of foods consumed.&lt;/p&gt;&lt;p&gt;The pH of bodily fluids, such as saliva and urine, does change temporarily depending on the foods you eat, but that doesn&amp;#x2019;t affect blood pH levels (or, hence, the environment of cancer cells in the body). In fact, any significant deviation in blood pH levels can cause serious, even life-threatening conditions known as acidosis (low pH) or alkalosis (high pH)&lt;/p&gt;&lt;p&gt;&lt;strong&gt;The verdict:&lt;/strong&gt;&amp;#xA0;&amp;#x201C;There is no evidence to support the notion that altering your diet can alter blood pH levels, let alone impact cancer growth,&amp;#x201D; Dr. Hou states. &amp;#x201C;The science behind this has been misconstrued. Modifying the pH of your saliva doesn&amp;#x2019;t influence the pH of your blood. Some patients may attempt to adjust their blood pH using chemicals, but this can pose serious risks.&amp;#x201D;&lt;/p&gt;

        
&lt;div class=&quot;msk-back-to-top&quot;&gt;

                  &lt;h2 class=&quot;right-rail__subtitle&quot; id=&quot;the-bottom-line&quot;&gt;The Bottom Line&lt;/h2&gt;
        &lt;p&gt;&amp;#x201C;Natural&amp;#x201D; cancer therapies should be regarded with great caution because most are unsupported by evidence. Many people offering testimonials to the effectiveness of such treatments may attribute benefits to them simply because their condition improved after using them &amp;#x2014; when the actual cause for the improvement is unrelated.&lt;/p&gt;&lt;p&gt;The good news is that mainstream cancer therapies are safer and more effective than ever. New&amp;#xA0;&lt;a href=&quot;/cancer-care/diagnosis-treatment/cancer-treatments/chemotherapy&quot;&gt;chemotherapies&lt;/a&gt;&amp;#xA0;work better with fewer side effects, and novel drugs target specific mutations in cancer cells to minimize harm to healthy cells. Highly precise forms of&amp;#xA0;&lt;a href=&quot;/cancer-care/diagnosis-treatment/cancer-treatments/radiation-therapy&quot;&gt;radiation therapy&lt;/a&gt;&amp;#xA0;destroy tumors while sparing normal tissue. New approaches&amp;#xA0;&lt;a href=&quot;/cancer-care/diagnosis-treatment/cancer-treatments/immunotherapy&quot;&gt;harness the body&amp;#x2019;s own immune powers&lt;/a&gt;&amp;#xA0;to destroy cancer cells. And new&amp;#xA0;&lt;a href=&quot;/cancer-care/diagnosis-treatment/cancer-treatments/surgery&quot;&gt;surgical techniques&lt;/a&gt;&amp;#xA0;are making it possible to remove tumors more safely while minimizing both risk of recurrence and recovery times. &amp;#xA0;&lt;/p&gt;&lt;p&gt;If you&amp;#x2019;re considering using a complementary therapy in addition to your traditional cancer treatments, always check with a reputable source such as our&amp;#xA0;&lt;a href=&quot;/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine/herbs&quot;&gt;About Herbs&lt;/a&gt;&amp;#xA0;database or the&amp;#xA0;&lt;a href=&quot;http://www.cancer.gov/&quot;&gt;National Cancer Institute&lt;/a&gt;, and always tell your doctor.&amp;#xA0;&lt;/p&gt;
