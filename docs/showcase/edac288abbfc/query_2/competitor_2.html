&lt;/span&gt;&lt;p data-dcnode-id=&quot;1117&quot;&gt;&lt;span data-dcnode-id=&quot;1118&quot; style=&quot;font-size: medium;&quot;&gt;&lt;img alt=&quot;cancer holistic treatment&quot; class=&quot;aligncenter size-full wp-image-45024&quot; data-dcnode-id=&quot;1121&quot; height=&quot;330&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//st1.thehealthsite.com/wp-content/uploads/2013/02/cancer-holistic-treatment.jpg&amp;amp;raw&quot; title=&quot;cancer holistic treatment&quot; width=&quot;620&quot;&gt;&lt;span data-dcnode-id=&quot;1119&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;1120&quot; instrument_node=&quot;&quot;&gt;According to allopathy, there might be no cure for cancers, but when it comes to holistic therapies, the cure lies within. This post focuses on the holistic therapies that claim that they can cure the dreaded disease.  &lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1114&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;1115&quot;&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;Nature Cure&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1113&quot;&gt;&lt;span data-dcnode-id=&quot;1108&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1110&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.lifepositive.com/Body/Holistic_Cancer_Cure/c_392_Heal_Cancer_Holistically62007.asp&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1111&quot; instrument_node=&quot;&quot;&gt;Government  Nature  Cure Hospital&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1109&quot; instrument_node=&quot;&quot;&gt; in Kerala is situated on the lap of nature, atop a cliff that slopes down to the breathtaking Varkala beach. Explains Dr K R Jayakumar, physician in-charge, 'Cancer is a degenerative disease. Accumulation of toxins through carcinogenic food like fast food, colas, habits like smoking, drinking, paan chewing, stressful lifestyle, toxic medicines and environmental pollution, lowers immunity, causing cancer.'  Naturopathy  considers cancer as a systemic disease. Cancer can develop if lesser diseases are suppressed through chemical medicines. Dr Jayakumar says, 'The human body has the  healing  power within itself to cure all diseases if congenial conditions are created.'  Naturopathy  heals through harmony with  nature  to attain equilibrium at physical, mental, moral and spiritual levels.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1104&quot;&gt;&lt;span data-dcnode-id=&quot;1105&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;Diet is crucial in naturopathy. Treatment duration depends on the disease condition. Initially, hospitalisation is required. After discharge, the prescribed diet and lifestyle patterns must be maintained for life. Dr Jayakumar advises cancer patients, 'If you have any bad habits, quit those with immediate effect, and try to lead a simple sattvic life.'&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;other-story&quot; data-dcnode-id=&quot;1084&quot;&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1101&quot;&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;Also Read&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1090&quot;&gt;&lt;li data-dcnode-id=&quot;1097&quot;&gt;&lt;a data-dcnode-id=&quot;1098&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thehealthsite.com/diseases-conditions/cancer/targeted-therapy-for-cancer-heres-how-it-helps-873730/&quot;&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;Targeted Therapy For Cancer: Here's How It Works&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1094&quot;&gt;&lt;a data-dcnode-id=&quot;1095&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thehealthsite.com/diseases-conditions/cancer/licorice-is-more-than-a-candy-it-may-have-help-prevent-or-treat-cancer-873051/&quot;&gt;&lt;span data-dcnode-id=&quot;1096&quot; instrument_node=&quot;&quot;&gt;Licorice Is More Than A Candy, It May Have Help Prevent Or Treat Cancer&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1091&quot;&gt;&lt;a data-dcnode-id=&quot;1092&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thehealthsite.com/diseases-conditions/pancreatic-cancer/applebys-procedure-may-be-the-last-resort-for-patients-with-advanced-pancreatic-cancer-all-about-it-871682/&quot;&gt;&lt;span data-dcnode-id=&quot;1093&quot; instrument_node=&quot;&quot;&gt;Appleby’s Procedure May Be The Last Resort For Patients With Advanced Pancreatic Cancer: All About It&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1089&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1086&quot;&gt;&lt;a data-dcnode-id=&quot;1087&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thehealthsite.com/diseases-conditions/&quot;&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;More News&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;1083&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1080&quot;&gt;&lt;span data-dcnode-id=&quot;1081&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;Dr Jayakumar has treated several breast cancer cases. College lecturer Asa Babu came after breast removal and chemotherapy. During the difficult chemotherapy, she drank juices of tender coconut, vegetables and amla regularly. Within three weeks, her reduced blood count increased. 'After three months I was admitted for three weeks at the  naturopathy  hospital. I had hip bath, spinal bath, mud therapy,  yoga  and  meditation  for purification. I fasted for four days by drinking water only. Later, I ate vegetables and no cereals. My weight reduced by seven kilos. My chronic  pain  and bulge in the lumbar disc disappeared. After one year, I repeated naturopathic treatment for 10 days. I still do  yoga  and meditation. I developed mental power and confidence. I am now free from all cancer treatment and medicines,' she describes. Her cancer has not recurred.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1077&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;Another breast cancer patient who had surgery has managed without allopathic treatment for the last six years through naturopathy. Dr Jayakumar's colleague's father had cancer of the small intestine. Since 25 years, he has survived without medicines, through naturopathy.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1071&quot;&gt;&lt;span data-dcnode-id=&quot;1072&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;The All India  Nature  Cure Federation, New Delhi, headed by &lt;/span&gt;&lt;a data-dcnode-id=&quot;1074&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.lifepositive.com/Body/Holistic_Cancer_Cure/c_393_Heal_Cancer_Holistically62007.asp&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1075&quot; instrument_node=&quot;&quot;&gt;Dr Brij Bhushan Goel provides free cancer consultation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;. Mrs Dugar, 39, had colo-rectal cancer. She avoided surgery, chemotherapy and radiation. For five years, she has led a normal  life  with Dr Goel's naturopathic treatment and some Ayurvedic medicines.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;section class=&quot;taboola-in-content&quot; data-dcnode-id=&quot;1068&quot;&gt;&lt;div class=&quot;taboola-placeholder&quot; data-dcnode-id=&quot;1069&quot;&gt;&lt;div data-dcnode-id=&quot;1070&quot; id=&quot;taboola-mid-article-thumbnails&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;p data-dcnode-id=&quot;1063&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1060&quot;&gt;&lt;span data-dcnode-id=&quot;1061&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;German naturopath, Dr Max Gerson, created Gerson therapy, which prescribes fresh organic fruits, vegetables and whole grains along with 13 glasses of fresh fruit juice daily. Coffee or chamomile enemas are used regularly for detoxification.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1053&quot;&gt;&lt;span data-dcnode-id=&quot;1057&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;1058&quot;&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;Homoeopathy Offers Hope&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1056&quot;&gt;&lt;span data-dcnode-id=&quot;1054&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;In homoeopathic theory, miasms sycosis, syphilis and psora are responsible for chronic diseases. Miasm imbalance is triggered by harmful lifestyle.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1050&quot;&gt;&lt;span data-dcnode-id=&quot;1051&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;Kerala-based homoeo-path, Dr Girisanker, feels that it is best to prevent cancer by way of a healthy diet and lifestyle. Research shows that smoking (30 per cent) and improper diet (30 per cent) cause maximum cancer cases. One should avoid smoking, liquor, fried and processed foods, maida, vanaspati, dairy products and non-vegetarian food.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1047&quot;&gt;&lt;span data-dcnode-id=&quot;1048&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1049&quot; instrument_node=&quot;&quot;&gt;'There are rays of hope for cancer therapy in homoeopathy. In homoeopathic cancer treatment, a patient's mental characteristics like desire, aversion, attitude, behaviour, physical conditions and food habits are all taken into account within the context of a genetic and constitutional approach to enhance bodily immunity to heal the disease. The focus is not on disease, but on the patient as a whole. Homoeopathy cures cancer the holistic way through restoring the vital force. It is safe, simple and inexpensive,' Dr Girisanker explains.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1044&quot;&gt;&lt;span data-dcnode-id=&quot;1045&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;Homoeopathy has three treatment modes: medicinal treatment, managemental treatment, and palliative treatment for acute cases. Homoeopathy can reduce the damages caused by chemotherapy and radiation. Dr Girisanker asserts that patients who try homoeopathy without allopathic treatment can be completely cured. Homoeopathic medicines will prevent recurrence. The fully developed vital force will heal cancer by stimulating the suppressor genes that weaken the cancer-causing oncogenes. A healthy lifestyle must be maintained life-long.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1041&quot;&gt;&lt;span data-dcnode-id=&quot;1042&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1043&quot; instrument_node=&quot;&quot;&gt;Dr Girisanker is treating Sofiya Beevi, 58, who had intestinal cancer. She tried only homoeopathy. She is now 95 per cent cured, and has avoided surgery. She could be substantially cured since she did not undergo toxic modern methods.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1038&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;US National Institute of  Health  (NIH) and Cancer Advisory Panel for Complementary and Alternative Medicine (CAPCAM) have recognised the homoeopathic treatment protocol of Kolkata-based Dr Prasanta Banerji and his son Pradip. They cured 70 per cent of brain tumour cases treated. Using basic medicine formulae like cali carbonium and ruta graviolins used in common cold, they created successful protocols for brain tumours. They also treat lung, liver and breast cancers. 'My medicines can't kill you. Theirs can,' Dr Pradip Banerji once told a medical website.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1035&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;1036&quot;&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;Siddha Medicine&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1034&quot;&gt;&lt;span data-dcnode-id=&quot;1032&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;Siddha is the world's oldest medical system mainly practised in South India. Medicines include herbal, metal and mineral preparations. According to Dr Stanley Jones, the seniormost medical officer in Kerala, working in the Government Siddha Hospital, siddha classifies cancer into 24 types according to the area affected. Primarily, it is caused due to the derangement of pitta and kapha. Unlimited increase in pitta and kapha imbalances vata too, leading to cancer.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1022&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;1029&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;Major Cancer Causes&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1027&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;1025&quot;&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;Food:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;  Eating food with excess of pungent and bitter tastes; contaminated food; eating incompatible non-vegetarian food; food containing hair, bones, mud, soil, stones, thorns.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1017&quot;&gt;&lt;span data-dcnode-id=&quot;1018&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;1020&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;Lifestyle:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;  Tobacco chewing, smoking; suppression of 14 natural urges like yawning, sneezing, cough, etc.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1012&quot;&gt;&lt;span data-dcnode-id=&quot;1013&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;1015&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;Cancer occurring as secondary to the following diseases:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;  Cirrhosis of liver; chronic peptic ulcer; constant irritation due to piles and fistula; trauma; cyst or abscess; ill-treated diseases in genital organs can cause cancer.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1009&quot;&gt;&lt;span data-dcnode-id=&quot;1010&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;'There are many effective internal and external medicines, as well as various treatments based on ancient methods available in Siddha, which are free from side-effects. That is why Siddha cancer treatment is superior to conventional methods,' says Dr Jones.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1006&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;Dr Jones recalls one of his successful cases of cancer cure. Mrs Sundarameena, 43, from Tamil Nadu, had malignant uterine cancer. Foul odour ceased by the fourth day of Siddha treatment. Bleeding fully stopped by the second week. By the second month, 65 per cent of the growth was reduced. All symptoms and difficulties stopped and complete cure was attained by the fourth month. Now Mrs Sundarameena leads a cancerfree life.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1003&quot;&gt;&lt;span data-dcnode-id=&quot;1004&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;Leukemia in young patients is curable with Siddha at the initial stages. Medication builds up bone marrow tissues and normalises haemoglobin. Siddha is successful for brain tumours too.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;996&quot;&gt;&lt;span data-dcnode-id=&quot;1000&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;1001&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;Ramneek Wig's Win Over Cancer&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;br data-dcnode-id=&quot;999&quot;&gt;&lt;span data-dcnode-id=&quot;997&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;Delhi-based Ramneek Wig, author of Win Over Cancer, underlines the importance of positivity, faith, hope and self-belief in cancer healing. In 1998, he had Hodgkin's Lymphoma. He underwent chemotherapy, but had a relapse. He got a bone marrow transplant from the US in 2000. Fearing he would not survive another recurrence and allopathic treatment, he tried holistic smethods.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;993&quot;&gt;&lt;span data-dcnode-id=&quot;994&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;He took  yoga  classes in South Delhi. He did shavasana and pranayama, including deep abdominal breathing, yogic breath, anuloma-viloma, and kapalabhati.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;990&quot;&gt;&lt;span data-dcnode-id=&quot;991&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;992&quot; instrument_node=&quot;&quot;&gt;'Positive attitude is the key to victory. The words 'I believe in victory' gave me immense strength and courage. I did not entertain negative thoughts. I was full of hope and enthusiasm. I constantly reminded myself that with God's help, I would 'win over cancer,'' Wig says.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;987&quot;&gt;&lt;span data-dcnode-id=&quot;988&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;Currently, he is perfectly healthy. His message to cancer patients: 'Never lose hope whatsoever the odds might be. Never sympathise with yourself. Stop cribbing about your problems. Face them boldly, with strength and courage. With faith in  God  and in yourself, you will emerge as a winner.Yoga  and breathing exercises will give you inner joy and peace.'&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;981&quot;&gt;&lt;span data-dcnode-id=&quot;982&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;His book,  &lt;/span&gt;&lt;em data-dcnode-id=&quot;984&quot;&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;Win over Cancer,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;  details the  positive thinking  techniques, holistic methods and  yoga  techniques he applied to overcome cancer. He conducts counselling and self-help workshops.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;979&quot;&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;Sino-Vedic Cancer Clinic&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;br data-dcnode-id=&quot;977&quot;&gt;&lt;span data-dcnode-id=&quot;975&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;Dr S P Kaushal established the Sino-Vedic Research Centre, New Delhi, to treat cancer through Indian and Chinese herbal medicines. He has identified about 450 anti-cancer herbs. Aloe vera, hoxsey and essiac are well-known herbs. His books, Fight Cancer With Herbs, and Cancer and Herbs, have gained worldwide acclaim. According to him, carcinogenic and nutritionally deficient diet, chronic  stress  and radiation from technological devices, are major cancer causes.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;971&quot;&gt;&lt;span data-dcnode-id=&quot;972&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;Chinese doctors use Fu  Zen  therapy to treat cancer. A Fu  Zen  formulation that contains six  herbs  strengthens the immune system to defend against cancer. The Chinese have used Panax Ginseng for 2000 years, which inhibits cancerous growth by inhibiting DNA synthesis.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;968&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt;A team of doctors led by Dr Kaushal has been exploring and developing herbal medicines to treat cancer since 1985. Herbal formulations prepared in his centre boost immunity by producing bodily biochemical agents that fight cancer. These  herbs  destroy the cancer cells without harming normal cells.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;961&quot;&gt;&lt;span data-dcnode-id=&quot;965&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;966&quot;&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;Spirituality and Cancer&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;br data-dcnode-id=&quot;964&quot;&gt;&lt;span data-dcnode-id=&quot;962&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;There have been many instances of cancer being cured through  spiritual healing  and prayer. Modern medicine usually dismisses these cures as 'spontaneous remission,' a term used to denote  healing  unexplainable by modern scientific dogma.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;958&quot;&gt;&lt;span data-dcnode-id=&quot;959&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;Cynthia Sue Larson,  aura  healer and member of the Intuition Network that promotes intuitive and spiritual resources, witnessed her grandmother's terminal liver cancer being cured by prayer. Larson writes, 'While her own prayers were simply for courage, other people (myself included) were praying for her return to good health. Within a few months, my grandmother's doctors were astonished to find that her cancer was stabilising. Several months after that, they were completely at a loss to explain why they could no longer find any trace of cancer in her body!'&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;955&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;Some studies show that cancer is linked to a personality style that lives up to the standards of others or social opinion, instead of being true to one's innermost authentic Divine Self. Developing a spiritual purpose in  life  helps to manifest a protective effect by drawing divine  healing  energies through sacred communion with the living earth, the universe and the omnipresent Spirit.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;949&quot;&gt;&lt;span data-dcnode-id=&quot;950&quot; style=&quot;font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt;Read more about causes, symptoms, diagnosis and treatment of &lt;/span&gt;&lt;a data-dcnode-id=&quot;952&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thehealthsite.com/diseases-conditions/cancer-your-most-common-queries-answered-107470/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;953&quot; instrument_node=&quot;&quot;&gt;cancer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;940&quot;&gt;&lt;span data-dcnode-id=&quot;946&quot; style=&quot;color: #000000; font-size: medium;&quot;&gt;&lt;strong data-dcnode-id=&quot;947&quot;&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;Go Holistic&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;br data-dcnode-id=&quot;945&quot;&gt;&lt;span data-dcnode-id=&quot;941&quot; style=&quot;font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;943&quot; style=&quot;color: #000000;&quot;&gt;&lt;span data-dcnode-id=&quot;944&quot; instrument_node=&quot;&quot;&gt;Allopathic doctors doubt the evidence of holistic therapies curing cancer. But holistic therapists point out that due to little awareness about natural therapies, many cancer patients consult them at acute stages after toxic conventional treatments. Such patients can mostly be provided palliative care to reduce the adverse effects rather than cure because the severe toxicity makes it difficult to restore immunity completely. It is best to have holistic alternative treatment alone to effect cure according to most alternative therapists. However, those who start holistic treatment at the earliest have great chances of cancer cure and survival even after initial conventional treatment.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;Cancer does not mean a  death  sentence. As NASA scientist turned energy healer, Dr Barbara Brennan, rightly remarked, 'You are the master of your life. You can do much more than you thought you could, including cure yourself of a 'terminal illness'.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;934&quot;&gt;&lt;span data-dcnode-id=&quot;935&quot; style=&quot;font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;939&quot; instrument_node=&quot;&quot;&gt;Read more about causes, symptoms, diagnosis and treatment of &lt;/span&gt;&lt;a data-dcnode-id=&quot;937&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thehealthsite.com/diseases-conditions/prostate-cancer-what-you-ought-to-know-46816/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;prostate cancer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;930&quot;&gt;&lt;strong data-dcnode-id=&quot;931&quot;&gt;&lt;span data-dcnode-id=&quot;932&quot; style=&quot;font-size: medium;&quot;&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt;You may also like to read:&lt;/span&gt;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;893&quot;&gt;&lt;li data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; style=&quot;font-size: medium;&quot;&gt;&lt;a data-dcnode-id=&quot;928&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thehealthsite.com/diseases-conditions/top-10-home-remedies-for-constipation-55112/&quot;&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;Home remedies for constipation&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;922&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; style=&quot;font-size: medium;&quot;&gt;&lt;a data-dcnode-id=&quot;924&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.thehealthsite.com/pho
