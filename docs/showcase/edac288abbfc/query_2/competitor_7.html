&lt;/span&gt;&lt;h1 data-dcnode-id=&quot;5433&quot;&gt;&lt;span data-dcnode-id=&quot;5434&quot; instrument_node=&quot;&quot;&gt; AYURVEDIC TREATMENT OF CANCER &lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;5432&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;ou-p-link&quot; data-dcnode-id=&quot;5422&quot; style=&quot;width:18% !important;float:left!important;&quot;&gt;&lt;span data-dcnode-id=&quot;5425&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;level0&quot; data-dcnode-id=&quot;5423&quot; href=&quot;#remedies&quot; style=&quot;background:#ffb020 !important; padding:9px !important; text-align:center;&quot;&gt;&lt;span data-dcnode-id=&quot;5424&quot; instrument_node=&quot;&quot;&gt;Herbal Remedies&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;5421&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;img alt=&quot;Cancer&quot; data-dcnode-id=&quot;5416&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.planetayurveda.com/pa-wp-images/cancer.jpg&amp;amp;raw&quot; style=&quot;float:left; padding:8px 20px 0 0;&quot; title=&quot;Cancer&quot;&gt;&lt;span data-dcnode-id=&quot;5415&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;5413&quot;&gt;&lt;span data-dcnode-id=&quot;5414&quot; instrument_node=&quot;&quot;&gt;ABOUT CANCER&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;5411&quot;&gt;&lt;span data-dcnode-id=&quot;5412&quot; instrument_node=&quot;&quot;&gt;The abnormal growth of cells is cancer. It grows out of control and affect the surrounding tissue and organs. With a period of time, toxins collect at the site of a particular organ; it may result in fatal growth in its surrounding cells. The groups of cells accumulate and produce swelling at the site. Nearby cells and tissues are also affected if the toxins are not removed as the infected cells are circulated to other parts of the body through the blood stream. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5410&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;5408&quot;&gt;&lt;span data-dcnode-id=&quot;5409&quot; instrument_node=&quot;&quot;&gt;TYPES OF CANCER&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;5407&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;5405&quot;&gt;&lt;span data-dcnode-id=&quot;5406&quot; instrument_node=&quot;&quot;&gt;There are many types of cancers. Cancers are classified on the basis of type of cells that the tumor cell originated from. These include:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5404&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;5377&quot;&gt;&lt;span data-dcnode-id=&quot;5403&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5399&quot;&gt;&lt;strong data-dcnode-id=&quot;5401&quot;&gt;&lt;span data-dcnode-id=&quot;5402&quot; instrument_node=&quot;&quot;&gt;Carcinoma - &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;5400&quot; instrument_node=&quot;&quot;&gt;Cancer derived from epithelial cells. This group of cancer is common. This cancer is of breast, prostate, lung, pancreas and colon.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5398&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5394&quot;&gt;&lt;strong data-dcnode-id=&quot;5396&quot;&gt;&lt;span data-dcnode-id=&quot;5397&quot; instrument_node=&quot;&quot;&gt;Sarcoma - &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;5395&quot; instrument_node=&quot;&quot;&gt;Cancer arise from connective tissues (bone, cartilage, fat, nerve).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5393&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5389&quot;&gt;&lt;strong data-dcnode-id=&quot;5391&quot;&gt;&lt;span data-dcnode-id=&quot;5392&quot; instrument_node=&quot;&quot;&gt;Lymphoma and Leukemia&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;5390&quot; instrument_node=&quot;&quot;&gt; - These are originated from cell that make blood. It is more common in children in comparison to other age groups. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5388&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5384&quot;&gt;&lt;strong data-dcnode-id=&quot;5386&quot;&gt;&lt;span data-dcnode-id=&quot;5387&quot; instrument_node=&quot;&quot;&gt;Germ cell tumor - &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;5385&quot; instrument_node=&quot;&quot;&gt;This Cancer is derived from pluripotent cells, more often present in testicles and ovary.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5383&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5379&quot;&gt;&lt;strong data-dcnode-id=&quot;5381&quot;&gt;&lt;span data-dcnode-id=&quot;5382&quot; instrument_node=&quot;&quot;&gt;Blastoma -&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;5380&quot; instrument_node=&quot;&quot;&gt; Derived from immature precursor cells or embryonic tissue. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;5376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;5374&quot;&gt;&lt;span data-dcnode-id=&quot;5375&quot; instrument_node=&quot;&quot;&gt;SYMPTOMS OF OF CANCER&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;5373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;5371&quot;&gt;&lt;span data-dcnode-id=&quot;5372&quot; instrument_node=&quot;&quot;&gt;There are more than 100 types of cancer which can infect any part of the body symptom and cause vary according to type and location of cancer. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5370&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;5368&quot;&gt;&lt;span data-dcnode-id=&quot;5369&quot; instrument_node=&quot;&quot;&gt;Some common symptoms include: &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;5367&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;5341&quot;&gt;&lt;span data-dcnode-id=&quot;5366&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5364&quot;&gt;&lt;span data-dcnode-id=&quot;5365&quot; instrument_node=&quot;&quot;&gt;Fever&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5361&quot;&gt;&lt;span data-dcnode-id=&quot;5362&quot; instrument_node=&quot;&quot;&gt;Fatigue&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5358&quot;&gt;&lt;span data-dcnode-id=&quot;5359&quot; instrument_node=&quot;&quot;&gt;Pain&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5355&quot;&gt;&lt;span data-dcnode-id=&quot;5356&quot; instrument_node=&quot;&quot;&gt;Unusual bleeding&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5354&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5352&quot;&gt;&lt;span data-dcnode-id=&quot;5353&quot; instrument_node=&quot;&quot;&gt;Nagging cough&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5351&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5349&quot;&gt;&lt;span data-dcnode-id=&quot;5350&quot; instrument_node=&quot;&quot;&gt;Indigestion problems or trouble swallowing.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5348&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5346&quot;&gt;&lt;span data-dcnode-id=&quot;5347&quot; instrument_node=&quot;&quot;&gt;Unexplained weight loss&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5345&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5343&quot;&gt;&lt;span data-dcnode-id=&quot;5344&quot; instrument_node=&quot;&quot;&gt;Skin changes &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5342&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;5340&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;5338&quot;&gt;&lt;span data-dcnode-id=&quot;5339&quot; instrument_node=&quot;&quot;&gt;CAUSES OF CANCER&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;5337&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;5335&quot;&gt;&lt;span data-dcnode-id=&quot;5336&quot; instrument_node=&quot;&quot;&gt;There are many reasons of cancer. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5334&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;5332&quot;&gt;&lt;span data-dcnode-id=&quot;5333&quot; instrument_node=&quot;&quot;&gt;Some of the common reasons are: &lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;5331&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;5305&quot;&gt;&lt;span data-dcnode-id=&quot;5330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5328&quot;&gt;&lt;span data-dcnode-id=&quot;5329&quot; instrument_node=&quot;&quot;&gt;Carcinogens like tobacco, arsenic, radiation etc&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5327&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5325&quot;&gt;&lt;span data-dcnode-id=&quot;5326&quot; instrument_node=&quot;&quot;&gt;More exposure of  sunlight and ultraviolet rays&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5322&quot;&gt;&lt;span data-dcnode-id=&quot;5323&quot; instrument_node=&quot;&quot;&gt;Excessive use of alcohol&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5319&quot;&gt;&lt;span data-dcnode-id=&quot;5320&quot; instrument_node=&quot;&quot;&gt;Obesity&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5318&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5316&quot;&gt;&lt;span data-dcnode-id=&quot;5317&quot; instrument_node=&quot;&quot;&gt;Lack of physical activity&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5313&quot;&gt;&lt;span data-dcnode-id=&quot;5314&quot; instrument_node=&quot;&quot;&gt;Damage or mutation in the DNA resulting in the damage to the genes involved in cell division.    &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5310&quot;&gt;&lt;span data-dcnode-id=&quot;5311&quot; instrument_node=&quot;&quot;&gt;Cigarette smoking&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5309&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;5307&quot;&gt;&lt;span data-dcnode-id=&quot;5308&quot; instrument_node=&quot;&quot;&gt;Exposure to radiation from X-rays, gamma rays, cellular phones and cell phone towers. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;5306&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;5304&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;5302&quot;&gt;&lt;span data-dcnode-id=&quot;5303&quot; instrument_node=&quot;&quot;&gt;DIAGNOSIS AND TESTS&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;5301&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;5299&quot;&gt;&lt;span data-dcnode-id=&quot;5300&quot; instrument_node=&quot;&quot;&gt;Cancer diagnosis begins with physical exam and complete medical history. It includes laboratory test i.e. blood test, urine test, stool test may indicate cancer. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5298&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;5296&quot;&gt;&lt;span data-dcnode-id=&quot;5297&quot; instrument_node=&quot;&quot;&gt;If tumor is detected then imaging test are helpful which are following: &lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;5295&quot; instrument_node=&quot;&quot;&gt;
