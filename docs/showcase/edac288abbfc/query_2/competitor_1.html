&lt;/span&gt;&lt;div class=&quot;wp-caption alignleft&quot; data-dcnode-id=&quot;893&quot; id=&quot;attachment_5857&quot; style=&quot;width: 310px&quot;&gt;&lt;a data-dcnode-id=&quot;896&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//plantmedicines.org/can-chinese-herbal-medicine-successfully-treat-cancer-the-research-says-yes/calib1110-0-0-1-awb16071628-info66812681991640099400/&quot; rel=&quot;attachment wp-att-5857&quot;&gt;&lt;img alt=&quot;cancer and herbal medicine&quot; aria-describedby=&quot;caption-attachment-5857&quot; class=&quot;wp-image-5857 size-medium jetpack-lazy-image jetpack-lazy-image--handled&quot; data-dcnode-id=&quot;899&quot; data-lazy-loaded=&quot;1&quot; data-recalc-dims=&quot;1&quot; height=&quot;225&quot; loading=&quot;eager&quot; onmousedown=&quot;return false&quot; onselectstart=&quot;return false&quot; sizes=&quot;(max-width: 300px) 100vw, 300px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/plantmedicines.org/wp-content/uploads/2013/05/TCM-cancer.jpg%3Fresize%3D300%252C225%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;https://i0.wp.com/plantmedicines.org/wp-content/uploads/2013/05/TCM-cancer.jpg?resize=300%2C225&amp;amp;ssl=1 300w, https://i0.wp.com/plantmedicines.org/wp-content/uploads/2013/05/TCM-cancer.jpg?resize=150%2C113&amp;amp;ssl=1 150w, https://i0.wp.com/plantmedicines.org/wp-content/uploads/2013/05/TCM-cancer.jpg?w=448&amp;amp;ssl=1 448w&quot; title=&quot;Chinese Herbal Medicine and cancer&quot; width=&quot;300&quot;&gt;&lt;noscript data-dcnode-id=&quot;897&quot;&gt;&lt;span data-dcnode-id=&quot;898&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img aria-describedby=&quot;caption-attachment-5857&quot; class=&quot;wp-image-5857 size-medium&quot; title=&quot;Chinese Herbal Medicine and cancer&quot; src=&quot;https://i0.wp.com/plantmedicines.org/wp-content/uploads/2013/05/TCM-cancer.jpg?resize=300%2C225&amp;amp;#038;ssl=1&quot; alt=&quot;cancer and herbal medicine&quot; width=&quot;300&quot; height=&quot;225&quot; srcset=&quot;https://i0.wp.com/plantmedicines.org/wp-content/uploads/2013/05/TCM-cancer.jpg?resize=300%2C225&amp;amp;amp;ssl=1 300w, https://i0.wp.com/plantmedicines.org/wp-content/uploads/2013/05/TCM-cancer.jpg?resize=150%2C113&amp;amp;amp;ssl=1 150w, https://i0.wp.com/plantmedicines.org/wp-content/uploads/2013/05/TCM-cancer.jpg?w=448&amp;amp;amp;ssl=1 448w&quot; sizes=&quot;(max-width: 300px) 100vw, 300px&quot; data-recalc-dims=&quot;1&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/a&gt;&lt;p class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;894&quot; id=&quot;caption-attachment-5857&quot;&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;Chinese herbs can help treat cancer.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;890&quot;&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;Western medicine has been rejecting Chinese Herbal Medicine for decades. It is not simply because it is foreign, or even unsubstantiated. It is not as if there isn’t any scientific and clinical research being done on traditional Chinese herbs. The reality is that western pharmaceutical medicine has been reluctant to embrace treatments that come without patents. Yes, unfortunately, it appears that money is the matter.&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;889&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;887&quot;&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;Western doctors are not necessarily to blame. Most are focused upon caring for their patients. But the tools they receive from those that control the flow of medicines to prescribe are watching the dollars. And herbal therapies simply don’t have the same potential for profits.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;881&quot;&gt;&lt;span data-dcnode-id=&quot;885&quot; instrument_node=&quot;&quot;&gt;Yet Japanese conventional medicine supports its &lt;/span&gt;&lt;a data-dcnode-id=&quot;883&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//plantmedicines.org/ancient-kampo-medicine-integrated-into-japans-medical-institutions/&quot;&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;traditional herbal Kampo medicines&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ez-toc-v2_0_19 counter-hierarchy ez-toc-black&quot; data-dcnode-id=&quot;852&quot; id=&quot;ez-toc-container&quot;&gt;&lt;span data-dcnode-id=&quot;879&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p class=&quot;ez-toc-title&quot; data-dcnode-id=&quot;876&quot;&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;In this article&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;ez-toc-title-toggle&quot; data-dcnode-id=&quot;872&quot;&gt;&lt;a class=&quot;ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle&quot; data-dcnode-id=&quot;873&quot; style=&quot;display: inline;&quot;&gt;&lt;i class=&quot;ez-toc-glyphicon ez-toc-icon-toggle&quot; data-dcnode-id=&quot;874&quot;&gt;&lt;/i&gt;&lt;/a&gt;&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;nav data-dcnode-id=&quot;853&quot;&gt;&lt;ul class=&quot;ez-toc-list ez-toc-list-level-1&quot; data-dcnode-id=&quot;854&quot;&gt;&lt;li class=&quot;ez-toc-page-1 ez-toc-heading-level-2&quot; data-dcnode-id=&quot;867&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-1&quot; data-dcnode-id=&quot;868&quot; href=&quot;#Chinese_herbs_studied_for_cancer&quot; title=&quot;Chinese herbs studied for cancer&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;Chinese herbs studied for cancer&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;ez-toc-page-1 ez-toc-heading-level-2&quot; data-dcnode-id=&quot;864&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-2&quot; data-dcnode-id=&quot;865&quot; href=&quot;#Other_research_validates_evidence&quot; title=&quot;Other research validates evidence&quot;&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;Other research validates evidence&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;ez-toc-page-1 ez-toc-heading-level-2&quot; data-dcnode-id=&quot;861&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-3&quot; data-dcnode-id=&quot;862&quot; href=&quot;#A_large_review_confirms_TCM_herbs_for_cancer&quot; title=&quot;A large review confirms TCM herbs for cancer&quot;&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;A large review confirms TCM herbs for cancer&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;ez-toc-page-1 ez-toc-heading-level-2&quot; data-dcnode-id=&quot;858&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-4&quot; data-dcnode-id=&quot;859&quot; href=&quot;#Astounding_results&quot; title=&quot;Astounding results&quot;&gt;&lt;span data-dcnode-id=&quot;860&quot; instrument_node=&quot;&quot;&gt;Astounding results&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;ez-toc-page-1 ez-toc-heading-level-2&quot; data-dcnode-id=&quot;855&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-5&quot; data-dcnode-id=&quot;856&quot; href=&quot;#Author&quot; title=&quot;Author&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;Author&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/nav&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;847&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;850&quot; id=&quot;Chinese_herbs_studied_for_cancer&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt;Chinese herbs studied for cancer&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;848&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;844&quot;&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;A large scale review of research from Australian and Chinese University scientists has proven with thousands of studies using hundreds of thousands of cancer patients that Chinese herbal medicine offers significant treatment for most types of cancers – including breast cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;841&quot;&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;The research comes from Australia’s University of Western Sydney and the Beijing University of Chinese Medicine. The researchers analyzed and reviewed 2,964 human clinical studies that involved 253,434 cancer patients. Among these were 2,385 randomized controlled studies and 579 non-randomized controlled studies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;838&quot;&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt;These studies covered most of the cancer types, but the cancers most studied were lung cancer, liver cancer, stomach cancer, breast cancer, esophageal cancer, colorectal cancer and nasopharyngeal (throat and sinus) cancer. Yes, breast cancer was the fourth most-studied type of cancer among these thousands of clinical studies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;835&quot;&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;The researchers discovered that the overwhelming majority of studies – 90% of the clinical studies – utilized herbal medicine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;821&quot; style=&quot;clear:both; margin-top:0em; margin-bottom:1em;&quot;&gt;&lt;a class=&quot;uac888762860dee94a00fe50bb1e69912&quot; data-dcnode-id=&quot;822&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//plantmedicines.org/resveratrol-inhibits-numerous-types-of-cancers/&quot; rel=&quot;dofollow&quot; target=&quot;_blank&quot;&gt;&lt;div class=&quot;centered-text-area&quot; data-dcnode-id=&quot;824&quot;&gt;&lt;div class=&quot;centered-text&quot; data-dcnode-id=&quot;825&quot; style=&quot;float: left;&quot;&gt;&lt;div class=&quot;uac888762860dee94a00fe50bb1e69912-content&quot; data-dcnode-id=&quot;826&quot;&gt;&lt;span class=&quot;ctaText&quot; data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;Read more:&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;span class=&quot;postTitle&quot; data-dcnode-id=&quot;827&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;Resveratrol Fights Numerous Types of Cancers&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;ctaButton&quot; data-dcnode-id=&quot;823&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;819&quot;&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;The researchers found that 72% of these studies applied Traditional Chinese Medicine alongside conventional treatment, but a full 28% applied Traditional Chinese Medicine separately to experimental groups.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;818&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;816&quot;&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;In terms of cancer patients, about 64% were given both TCM and conventional medical treatments. The rest were given TCM therapy alone, but a little over half of them did not qualify whether the patient was given conventional treatment at some point in the past.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;813&quot;&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;Because of the large number of studies, there were different types of results, depending upon the type of study, the type of treatment, and the outcome measures tested. Still, in a full 1,015 studies or 85% of those that reported on symptoms, TCM treatment resulted in improvement of cancer symptoms with many of those reporting reduced pain. Another 883 studies – 70% – showed increased survival rates. Another 38% showed reduced tumor size, and 28% showed increased quality of life. Another 19% showed lower relapse rates and another 7% showed reduced complications.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;810&quot;&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;The researchers also found that only a few studies tested TCM acupuncture treatment in cancer therapy. In their discussion they qualified that acupuncture treatment in cancer therapy to alleviate pain is quite popular in the U.S., but in Chinese cancer studies, herbal medicine therapy is the leading type of holistic treatment for cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;805&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;808&quot; id=&quot;Other_research_validates_evidence&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;Other research validates evidence&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;806&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;802&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;This study follows another extensive review of research published in 2012 on TCM cancer treatment. This study comes from Norway’s National Research Center in Complementary and Alternative Medicine and the University of Tromsø, Norway, also with collaboration with the Beijing University of Chinese Medicine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;799&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;This earlier study reviewed significantly fewer studies, compiling 716 trials that included 1,198 cancer patients with either leukemia, stomach cancer, liver cancer or esophageal cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;785&quot; style=&quot;clear:both; margin-top:0em; margin-bottom:1em;&quot;&gt;&lt;a class=&quot;u3c5c135ba7175aa6b42c5c17255d8f6b&quot; data-dcnode-id=&quot;786&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//plantmedicines.org/olives-and-olive-oil-inhibits-breast-cancer-and-alzheimers-disease/&quot; rel=&quot;dofollow&quot; target=&quot;_blank&quot;&gt;&lt;div class=&quot;centered-text-area&quot; data-dcnode-id=&quot;788&quot;&gt;&lt;div class=&quot;centered-text&quot; data-dcnode-id=&quot;789&quot; style=&quot;float: left;&quot;&gt;&lt;div class=&quot;u3c5c135ba7175aa6b42c5c17255d8f6b-content&quot; data-dcnode-id=&quot;790&quot;&gt;&lt;span class=&quot;ctaText&quot; data-dcnode-id=&quot;794&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;Read more:&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;span class=&quot;postTitle&quot; data-dcnode-id=&quot;791&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;Olives and Olive Oil Inhibit Cancer and Alzheimer's&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;ctaButton&quot; data-dcnode-id=&quot;787&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;783&quot;&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;Among these studies, 98.5% used herbal medicine, and again, acupuncture therapy was rare. In this study, symptom improvement was achieved in 85% of the patients that used the TCM therapy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;778&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;781&quot; id=&quot;A_large_review_confirms_TCM_herbs_for_cancer&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;A large review confirms TCM herbs for cancer&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;779&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;775&quot;&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;In yet another study – this one much larger than the second – 1,217 clinical studies between 1958 and 2011, involving 92,945 patients were analyzed and reviewed by researchers from the Beijing University of Chinese Medicine. Among these studies, 66% of the patients were treated with TCM therapy alone, while 34% of the patients were treated with a combination of TCM and conventional cancer therapy. Also, 82% of the patients were given herbal medicines orally.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;772&quot;&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;Only 5% of the patients were given more than one type of TCM therapy. This means that 95% were treated with one type of TCM therapy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;769&quot;&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;This study found that among the studies treating cancer, symptom relief was the prominent result among 88% of the studies and among 88% of the patients tested with TCM therapy. Increased survival rates resulted in 73% of patients. Among all the rest of the studies, 96% of the trials resulted in symptom relief and 92% of the patients reported cancer symptom relief.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;764&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;767&quot; id=&quot;Astounding_results&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;Astounding results&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;765&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;Did we get this right? Was that 88% and 92% symptom improvement or relief among thousands of studies and nearly 100,000 cancer patients? And 85% improvement of cancer symptoms among 716 clinical studies? And 85% symptom improvement among 1,015 clinical studies among a review involving over 250,000 cancer patients that tested the effectiveness of Chinese herbal medicine against cancer?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;758&quot;&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;It sounds pretty solid that Chinese herbal medicine does indeed treat cancer and overwhelmingly results in the improvement or relief of symptoms as well as longer survival rates and reduced metastases.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;744&quot; style=&quot;clear:both; margin-top:0em; margin-bottom:1em;&quot;&gt;&lt;a class=&quot;ud2dd7019d7cb28534111d6622d46eac2&quot; data-dcnode-id=&quot;745&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//plantmedicines.org/ginseng-leaf-and-oil-proves-to-be-antibiotic-and-anticancer/&quot; rel=&quot;dofollow&quot; target=&quot;_blank&quot;&gt;&lt;div class=&quot;centered-text-area&quot; data-dcnode-id=&quot;747&quot;&gt;&lt;div class=&quot;centered-text&quot; data-dcnode-id=&quot;748&quot; style=&quot;float: left;&quot;&gt;&lt;div class=&quot;ud2dd7019d7cb28534111d6622d46eac2-content&quot; data-dcnode-id=&quot;749&quot;&gt;&lt;span class=&quot;ctaText&quot; data-dcnode-id=&quot;753&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;Read more:&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;span class=&quot;postTitle&quot; data-dcnode-id=&quot;750&quot;&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;Panax Ginseng: Proven Antibiotic and Anticancer Agent&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;ctaButton&quot; data-dcnode-id=&quot;746&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;742&quot;&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;Now why again is Western conventional medicine still refusing to at least consider herbal medicine therapy in cancer treatment? Could there be a profit motive involved? Could it have to do with the fact that herbal medicines cannot be patented? In other words, is Western conventional medicine ignoring inexpensive natural treatments that could help millions of cancer patients simply because of profits?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;739&quot;&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;We’ll let them answer this question, as actions speak louder than words.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;733&quot;&gt;&lt;a data-dcnode-id=&quot;734&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//plantmedicines.org/mucosal-membrane-health-the-key-to-preventing-inflammatory-conditions-infections-toxicity-and-degeneration/&quot; rel=&quot;attachment wp-att-11142&quot;&gt;&lt;img alt=&quot;mucosal_3d_slant_refl&quot; class=&quot;alignnone size-medium wp-image-11142 jetpack-lazy-image jetpack-lazy-image--handled&quot; data-dcnode-id=&quot;737&quot; data-lazy-loaded=&quot;1&quot; data-recalc-dims=&quot;1&quot; height=&quot;300&quot; loading=&quot;eager&quot; onmousedown=&quot;return false&quot; onselectstart=&quot;return false&quot; sizes=&quot;(max-width: 255px) 100vw, 255px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/plantmedicines.org/wp-content/uploads/2011/06/mucosal_3d_slant_refl.png%3Fresize%3D255%252C300%26ssl%3D1&amp;amp;raw&quot; srcset=&quot;https://i0.wp.com/plantmedicines.org/wp-content/uploads/2011/06/mucosal_3d_slant_refl.png?resize=255%2C300&amp;amp;ssl=1 255w, https://i0.wp.com/plantmedicines.org/wp-content/uploads/2011/06/mucosal_3d_slant_refl.png?resize=127%2C150&amp;amp;ssl=1 127w, https://i0.wp.com/plantmedicines.org/wp-content/uploads/2011/06/mucosal_3d_slant_refl.png?w=555&amp;amp;ssl=1 555w&quot; width=&quot;255&quot;&gt;&lt;noscript data-dcnode-id=&quot;735&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone size-medium wp-image-11142&quot; src=&quot;https://i0.wp.com/plantmedicines.org/wp-content/uploads/2011/06/mucosal_3d_slant_refl.png?resize=255%2C300&amp;amp;#038;ssl=1&quot; alt=&quot;mucosal_3d_slant_refl&quot; width=&quot;255&quot; height=&quot;300&quot; srcset=&quot;https://i0.wp.com/plantmedicines.org/wp-content/uploads/2011/06/mucosal_3d_slant_refl.png?resize=255%2C300&amp;amp;amp;ssl=1 255w, https://i0.wp.com/plantmedicines.org/wp-content/
