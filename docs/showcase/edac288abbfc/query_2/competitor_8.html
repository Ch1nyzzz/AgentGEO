cancer&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;1255&quot; itemprop=&quot;title&quot;&gt;&lt;a class=&quot;easy-breadcrumb_segment easy-breadcrumb_segment-4&quot; data-dcnode-id=&quot;1256&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cancerresearchuk.org/about-cancer/cancer-in-general/treatment/complementary-alternative-therapies&quot;&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt;Complementary and alternative therapies&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1254&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;1251&quot; itemprop=&quot;title&quot;&gt;&lt;a class=&quot;easy-breadcrumb_segment easy-breadcrumb_segment-5&quot; data-dcnode-id=&quot;1252&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cancerresearchuk.org/about-cancer/cancer-in-general/treatment/complementary-alternative-therapies/individual-therapies&quot;&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;Individual therapies&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;easy-breadcrumb_segment easy-breadcrumb_segment-title&quot; data-dcnode-id=&quot;1248&quot; itemprop=&quot;title&quot;&gt;&lt;span data-dcnode-id=&quot;1249&quot; instrument_node=&quot;&quot;&gt;Herbal medicine&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1247&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a data-dcnode-id=&quot;1233&quot; id=&quot;main-content&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;region region-content&quot; data-dcnode-id=&quot;460&quot;&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;article about=&quot;/about-cancer/cancer-in-general/treatment/complementary-alternative-therapies/individual-therapies/herbal-medicine&quot; class=&quot;ds-1col node node-standard-page-template view-mode-full clearfix&quot; data-dcnode-id=&quot;464&quot; typeof=&quot;sioc:Item foaf:Document&quot;&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;header data-dcnode-id=&quot;1222&quot;&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 data-dcnode-id=&quot;1227&quot;&gt;&lt;span data-dcnode-id=&quot;1228&quot; instrument_node=&quot;&quot;&gt;Herbal medicine&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;1226&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;rdf-meta element-hidden&quot; content=&quot;Herbal medicine&quot; data-dcnode-id=&quot;1225&quot; property=&quot;dc:title&quot;&gt;&lt;/span&gt;&lt;span class=&quot;rdf-meta element-hidden&quot; content=&quot;0&quot; data-dcnode-id=&quot;1224&quot; datatype=&quot;xsd:integer&quot; property=&quot;sioc:num_replies&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1223&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/header&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1219&quot;&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;Herbal medicine uses plants, or mixtures of plant extracts, to treat illness and promote health. There is not enough reliable scientific evidence to use it as a treatment for cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1215&quot;&gt;&lt;strong data-dcnode-id=&quot;1216&quot;&gt;&lt;span data-dcnode-id=&quot;1217&quot; instrument_node=&quot;&quot;&gt;Summary&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list&quot; data-dcnode-id=&quot;1205&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1212&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt;Herbal medicine uses plants or plant extracts to treat illness and promote health&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1210&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1211&quot; instrument_node=&quot;&quot;&gt;There is not enough scientific evidence to use it as a cancer treatment&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1208&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt;Herbal medicines might have side effects and interact with other medicines&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1206&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;Herbal medicines may not be regulated if made outside the UK, and what they contain can vary. If you are going to buy herbal remedies it is safest to buy them from a fully qualified herbal practitioner.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1202&quot;&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;What is herbal medicine?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1201&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1199&quot;&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;Herbal medicines are made from plants. They use&amp;nbsp;combinations of plant parts, for example leaves, flowers or roots. Each part of the plant can have a different medicinal use. Manufacturers use different ways of extracting the chemicals from the plant parts. They use fresh and dried plants to make the medicine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1196&quot;&gt;&lt;span data-dcnode-id=&quot;1197&quot; instrument_node=&quot;&quot;&gt;Herbal medicine aims to restore your body, so that it can protect, regulate and heal itself. It is a whole body approach. It looks at your physical, mental and emotional well being. It is sometimes called phytomedicine, phytotherapy or botanical medicine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1195&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;Manufacturers make many drugs from plants. But herbalists don’t extract plant substances in the way the drug industry does. Herbalists believe that the remedy works due to the delicate chemical balance of the whole plant, or mixtures of plants. And not from one active ingredient.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1190&quot;&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;The two most common types of herbal medicine used in the UK are Western and Chinese herbal medicine. Less common types include Tibetan or Ayurvedic medicine (Indian).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1189&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1187&quot;&gt;&lt;span data-dcnode-id=&quot;1188&quot; instrument_node=&quot;&quot;&gt;Western herbal medicine&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1184&quot;&gt;&lt;span data-dcnode-id=&quot;1185&quot; instrument_node=&quot;&quot;&gt;Western herbal medicine focuses on the whole person rather than their illness. So, the herbalist looks at your:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list level-3&quot; data-dcnode-id=&quot;1174&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1181&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1182&quot; instrument_node=&quot;&quot;&gt;personal health history&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1179&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;family history&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1177&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1178&quot; instrument_node=&quot;&quot;&gt;diet&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1175&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1176&quot; instrument_node=&quot;&quot;&gt;lifestyle&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1171&quot;&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;Western herbal therapists usually make medicines from European and North American herbs. They also use herbs from China and India.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1168&quot;&gt;&lt;span data-dcnode-id=&quot;1169&quot; instrument_node=&quot;&quot;&gt;Herbalists use remedies made from whole plants or plant parts. They believe it helps your body to heal itself or to reduce the side effects of medical treatments.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1167&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1165&quot;&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;Chinese herbal medicine&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1162&quot;&gt;&lt;span data-dcnode-id=&quot;1163&quot; instrument_node=&quot;&quot;&gt;Chinese herbal medicine is part of a whole system of medicine. The system is called Traditional Chinese Medicine (TCM).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1159&quot;&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;TCM aims to restore the balance of your Qi (pronounced chee). TCM practitioners believe that Qi is the flow of energy in your body and is essential for good health.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1156&quot;&gt;&lt;span data-dcnode-id=&quot;1157&quot; instrument_node=&quot;&quot;&gt;Yin and yang refer to different qualities of Qi. When all of the yin and yang aspects of Qi are in harmony with one another, there is health, wellbeing and peace. Illness is due to a disturbance of the balance between yin and yang. Chinese herbalists use plants according to how they affect a part of the body or energy channel.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1155&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1153&quot;&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;TCM includes:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list level-3&quot; data-dcnode-id=&quot;1141&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1150&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1151&quot; instrument_node=&quot;&quot;&gt;acupuncture&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1148&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt;massage therapy&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1146&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt;herbal remedies&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1144&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1145&quot; instrument_node=&quot;&quot;&gt;traditional breathing and movement exercises called qi gong (pronounced chee goong)&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1142&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1143&quot; instrument_node=&quot;&quot;&gt;movement exercises called tai chi (pronounced tie chee)&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1138&quot;&gt;&lt;span data-dcnode-id=&quot;1139&quot; instrument_node=&quot;&quot;&gt;TCM uses hundreds of medicinal substances. Most of these are plants, but there are also some minerals and animal products.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1135&quot;&gt;&lt;span data-dcnode-id=&quot;1136&quot; instrument_node=&quot;&quot;&gt;Practitioners may use different parts of plants. They might use the leaves, roots, stems, flowers or seeds. Usually, they combine herbs and you take them as teas, capsules, tinctures, or powders.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1134&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1132&quot;&gt;&lt;span data-dcnode-id=&quot;1133&quot; instrument_node=&quot;&quot;&gt;Why people with cancer use it&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1131&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1129&quot;&gt;&lt;span data-dcnode-id=&quot;1130&quot; instrument_node=&quot;&quot;&gt;Herbal medicine is one of the most used complementary and alternative therapies by people with cancer.&amp;nbsp;This is alongside conventional cancer treatments.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1126&quot;&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;People have used herbal medicine for centuries to treat many different health conditions. They believe it is a natural way to help you relax and cope with anxiety and depression. Or, to help with other conditions such as:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1125&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list level-3&quot; data-dcnode-id=&quot;1116&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1123&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;hay fever&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1121&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;irritable bowel syndrome&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1119&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1120&quot; instrument_node=&quot;&quot;&gt;menstrual (period) problems&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1117&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1118&quot; instrument_node=&quot;&quot;&gt;eczema&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1115&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1113&quot;&gt;&lt;span data-dcnode-id=&quot;1114&quot; instrument_node=&quot;&quot;&gt;People might also use herbal medicine to help themselves to feel better or more in control of their situation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1110&quot;&gt;&lt;span data-dcnode-id=&quot;1111&quot; instrument_node=&quot;&quot;&gt;A 2011 study in the UK surveyed people with cancer who use herbal medicines. It found that most of the people used herbal medicines to feel more in control. And that it helped them to feel that they have some responsibility for their treatment. They also felt the therapies wouldn't cause side effects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1109&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;How you have it&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1104&quot;&gt;&lt;span data-dcnode-id=&quot;1105&quot; instrument_node=&quot;&quot;&gt;During your first visit, the herbalist will ask you general questions about your health, lifestyle, diet and medical history.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1101&quot;&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;During your first visit, the herbalist will:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list level-3&quot; data-dcnode-id=&quot;1091&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1098&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;take your full history&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1096&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt;ask about your family’s medical history&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1094&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt;discuss your diet and lifestyle&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1092&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1093&quot; instrument_node=&quot;&quot;&gt;find out about any medication or supplements you use&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1088&quot;&gt;&lt;span data-dcnode-id=&quot;1089&quot; instrument_node=&quot;&quot;&gt;They will also do a physical examination, which may include:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list level-3&quot; data-dcnode-id=&quot;1074&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1085&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1086&quot; instrument_node=&quot;&quot;&gt;feeling your pulse&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1083&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;taking your blood pressure&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1081&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;examining your skin and nails&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1079&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt;feeling your abdomen&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1077&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;looking at your tongue&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1075&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;looking at your eyes&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1071&quot;&gt;&lt;span data-dcnode-id=&quot;1072&quot; instrument_node=&quot;&quot;&gt;The herbalist will then decide which remedies you need. They will usually make it while you wait.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1068&quot;&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt;The remedy might be:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list level-3&quot; data-dcnode-id=&quot;1056&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1065&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1066&quot; instrument_node=&quot;&quot;&gt;a diluted alcohol solution of plant parts (tincture)&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1063&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;powders made into tablets or capsules&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1061&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;water-based solutions like a tea that you make from raw herbs &lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1059&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;a cream or ointment&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1057&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1058&quot; instrument_node=&quot;&quot;&gt;oil-based solutions like a cream or ointment&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1053&quot;&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;Your herbalist may suggest that you go back for another appointment after a few weeks. How long you continue seeing them will depend on why you are using herbal medicine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1050&quot;&gt;&lt;span data-dcnode-id=&quot;1051&quot; instrument_node=&quot;&quot;&gt;Who shouldn’t use herbal medicine&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1049&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1047&quot;&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;This depends on which herbal medicine you want to have.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1044&quot;&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;It is important to check with your doctor first before taking any herbal remedies if you:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1043&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list level-3&quot; data-dcnode-id=&quot;1032&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1041&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;have any medical condition, including cancer&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1039&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;are having radiotherapy&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1037&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;are pregnant or breastfeeding&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1035&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;are due to have surgery in the next few weeks&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1033&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;are having other cancer treatment (conventional, complementary or alternative)&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1029&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;Using herbal medicines safely&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1026&quot;&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;Many people assume that products are safe to use when marketed as natural or herbal.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1023&quot;&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;Some herbal medicines might be safe. But others can have severe and dangerous side effects. And, they might interact with other cancer treatments you are having. We need more research into this.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1020&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;The Memorial Sloan Kettering Cancer Centre in America looked at how herbal medicines can change the way other drugs work. They suggest that the following herbal remedies can interact with cancer treatments:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list level-3&quot; data-dcnode-id=&quot;1010&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1017&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1018&quot; instrument_node=&quot;&quot;&gt;ginkgo&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1015&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;kava kava&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1013&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;grapefruit&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;1011&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;St John’s wort&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1009&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1007&quot;&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;Some herbal&amp;nbsp;treatments might affect the way your body processes cancer drugs. For example the National Cancer Institute (NCI) in America says that St John’s wort can cause your body to get rid of the drug, imatinib (Glivec), quicker. This means it could make the imatinib less effective at fighting your cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;Some herbal medicines might increase the effect of cancer drugs. This means that you could have too much treatment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1001&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;Other herbal medicines can interfere with some drugs. For example, Asian ginseng and bilberry can increase the risk of bleeding after surgery.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;998&quot;&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;Some herbal remedies make your skin more sensitive to light. Do not take them while having radiotherapy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;995&quot;&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;Finding a herbal therapist&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;992&quot;&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;In the UK, the Health and Care Professions Council regulates TCM. It also regulates other herbal practitioners. Contact them for a list of registered practitioners in your area. Most practitioners are members of the herbal medicine organisations listed below.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;989&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;Side effects&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;986&quot;&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;Each type of herbal remedy might have side effects. Some are safe to use and do not have any noticeable side effects. But some plants are poisonous to humans and can have serious and severe side effects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;983&quot;&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;Always tell your doctor if you are using any type of herbal remedy. It might be helpful to ask your herbalist for a list of all the ingredients in your herbal remedy. Then if you do have any side effects, your doctor will know what you have taken.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;980&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;You, your doctor or herbalist can report side effects. You report it to the Medicines and Healthcare Regulatory Authority (MHRA). The MHRA is the UK regulatory body. It collects information about the side effects of drugs, including herbal medicines.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;977&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;Let both your herbalist and doctor know if you feel worse or ill while you are taking herbal medicine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;Research into herbal medicine for cancer&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;971&quot;&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;There is no reliable evidence from human studies that herbal remedies can treat, prevent or cure any type of cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;968&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;Some clinical trials seem to show that certain Chinese herbs may help people to live longer, might reduce side effects, and help to prevent cancer from coming back. This is especially when combined with conventional treatment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;965&quot;&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;But many of the studies are published in Chinese, and some of them don't list the specific herbs used. Some journal articles don't give enough detail on how the researchers did the studies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;962&quot;&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;It is difficult to know how reliable the research is and which herbs may be helpful. But there are trials looking into this.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel panel-default&quot; data-dcnode-id=&quot;930&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-heading&quot; data-dcnode-id=&quot;950&quot; id=&quot;heading-12275-841738861&quot;&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;952&quot;&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a aria-controls=&quot;collapse-12275-841738861&quot; aria-expanded=&quot;false&quot; class=&quot;collapsed&quot; data-dcnode-id=&quot;954&quot; data-toggle=&quot;collapse&quot; href=&quot;#collapse-12275-841738861&quot; role=&quot;button&quot;&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;icon&quot; data-dcnode-id=&quot;956&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt;
         Preventing cancer      &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;953&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div aria-expanded=&quot;false&quot; aria-labelledby=&quot;heading-12275-841738861&quot; class=&quot;panel-collapse collapse&quot; data-dcnode-id=&quot;932&quot; id=&quot;collapse-12275-841738861&quot; role=&quot;tabpanel&quot; style=&quot;height: 0px;&quot;&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-body&quot; data-dcnode-id=&quot;934&quot;&gt;&lt;span data-dcnode-id=&quot;947&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;945&quot;&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;There is no reliable evidence that herbal remedies can prevent cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;944&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;942&quot;&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;Chinese researchers did a cohort study in 2018.&amp;nbsp; A cohort is a group of people, so cohort studies look at groups of people. The researchers follow the group over a period of time.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;939&quot;&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;The researchers in this study looked at people with oesophageal (food pipe) cancer. And who might develop a second primary (new) cancer of the head and neck. The researchers followed the group over 10 years. One part of the group received Chinese Herbal Medicine (CHM) and the other part did not.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;936&quot;&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;The results showed that the group of people who took CHM had fewer cases of a second primary cancer of the head and neck. This was when the researchers compared them to the group that did not take CHM. The researchers suggested that CHM might prevent a second primary cancer of the head and neck in people with oesophageal cancer. The results looked promising. But the people in the study received different types of CHM. This might make the results of the study less accurate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel panel-default&quot; data-dcnode-id=&quot;889&quot;&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-heading&quot; data-dcnode-id=&quot;918&quot; id=&quot;heading-12275-1015953596&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;920&quot;&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a aria-controls=&quot;collapse-12275-1015953596&quot; aria-expanded=&quot;false&quot; class=&quot;collapsed&quot; data-dcnode-id=&quot;922&quot; data-toggle=&quot;collapse&quot; href=&quot;#collapse-12275-1015953596&quot; role=&quot;button&quot;&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;icon&quot; data-dcnode-id=&quot;924&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;
        Relieving symptoms or side effects      &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div aria-expanded=&quot;false&quot; aria-labelledby=&quot;heading-12275-1015953596&quot; class=&quot;panel-collapse collapse&quot; data-dcnode-id=&quot;891&quot; id=&quot;collapse-12275-1015953596&quot; role=&quot;tabpanel&quot; style=&quot;height: 0px;&quot;&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-body&quot; data-dcnode-id=&quot;893&quot;&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;913&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;There is evidence that some herbal remedies might prevent or relieve cancer symptoms. And that it might help with treatment side effects. But we need results from large clinical trials. This way we can know which herbs are safe to use alongside conventional cancer treatment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;A&amp;nbsp;Cochrane review of studies in 2018 looking at preventing a dry mouth in people having radiotherapy for head and neck cancer. They found that there was not enough evidence to say that CHM can prevent the feeling of dry mouth. This was in people who had radiotherapy with or without chemotherapy to the head and neck.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;907&quot;&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;Another Cochrane review of studies in 2018&amp;nbsp;&amp;nbsp;found that there was not enough evidence to use CHM as a treatment for oesophageal cancer. But they said that it might help with quality of life. And that it might relieve some side effects caused by radiotherapy and chemotherapy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;904&quot;&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;A third Cochrane review of studies in 2018 looked at moxibustion. Moxibustion involves the burning of herbs above the skin at acupuncture pressure points.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;901&quot;&gt;&lt;span data-dcnode-id=&quot;902&quot; instrument_node=&quot;&quot;&gt;The researchers found little evidence to say that it helped with side effects of radiotherapy and chemotherapy. Or that it helped with quality of life in people with cancer. But the researchers felt that the evidence was not clear enough to rule out some benefits or risks of this treatment. They suggested better quality studies.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;900&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;898&quot;&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;Chinese researchers did a review study in 2019. The researchers looked at studies that used different types of CHM. The studies looked at how to relieve perimenopausal symptoms in women who had surgery, chemoradiotherapy or hormone treatment for breast cancer. Perimenopausal means the transition time to full menopause.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;897&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;895&quot;&gt;&lt;span data-dcnode-id=&quot;896&quot; instrument_node=&quot;&quot;&gt;The researchers found that CHM might improve perimenopausal symptoms. But suggested better quality, precise and in-depth studies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel panel-default&quot; data-dcnode-id=&quot;848&quot;&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-heading&quot; data-dcnode-id=&quot;877&quot; id=&quot;heading-12275-7022453&quot;&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;879&quot;&gt;&lt;span data-dcnode-id=&quot;885&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a aria-controls=&quot;collapse-12275-7022453&quot; aria-expanded=&quot;false&quot; class=&quot;collapsed&quot; data-dcnode-id=&quot;881&quot; data-toggle=&quot;collapse&quot; href=&quot;#collapse-12275-7022453&quot; role=&quot;button&quot;&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;icon&quot; data-dcnode-id=&quot;883&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;
        Treating cancer      &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;878&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;876&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div aria-expanded=&quot;false&quot; aria-labelledby=&quot;heading-12275-7022453&quot; class=&quot;panel-collapse collapse&quot; data-dcnode-id=&quot;850&quot; id=&quot;collapse-12275-7022453&quot; role=&quot;tabpanel&quot; style=&quot;height: 0px;&quot;&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-body&quot; data-dcnode-id=&quot;852&quot;&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;872&quot;&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt;Some laboratory tests have found certain plants or plant extracts have anti-cancer qualities. Manufacturers made these into cancer drugs such as Taxol from the yew tree.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;871&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;869&quot;&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;But, there is no scientific evidence from human trials that herbal medicine can treat or cure cancer. We need large trials to prove this.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;866&quot;&gt;&lt;span data-dcnode-id=&quot;867&quot; instrument_node=&quot;&quot;&gt;Researchers did a laboratory study in 2019. They looked at the use of Chang-wei-qing (CWQ) as a treatment to prevent a certain type of bowel cancer. The researchers found that CWQ showed an anti-cancer (anti-tumour) effect. But this was a laboratory study, and we need more research.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;863&quot;&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;Chinese researchers did a case study of 182 patients with pancreatic cancer. All of the patients received CHM. It showed that people having herbal medicine might survive longer. This was a case study and isn’t evidence to use it as a treatment. We need more research.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;860&quot;&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;Chinese researchers did a review study in 2018. They looked at several studies on CHM. The researchers said that CHM showed positive results. This was as a therapy to use with other types of cancer treatment. They also said that CHM can help chemotherapy and radiotherapy to work better.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;857&quot;&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;They felt that CHM can help to control certain cancer genes. And that it can influence the way cancer cells work. But they recommended more research to understand exactly how CHM works.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;854&quot;&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;A Cochrane review&amp;nbsp;in 2016&amp;nbsp;looked at studies using a type of CHM called Ganoderma lucidum to treat cancer. The researchers found that there was not enough evidence to use Ganoderma lucidum as a treatment for cancer. But they suggested that it might be used alongside conventional cancer treatment to boost immunity. The researchers also said that future research should be of better quality studies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;845&quot;&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;How much it costs&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;842&quot;&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;Your first consultation with a herbalist will usually cost more than further appointments. Follow up appointments are generally shorter. So, are likely to cost less.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;841&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;839&quot;&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;You will also have to pay for the herbs your herbalist prescribes. These costs may vary from place to place in the UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;836&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;A word of caution&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;833&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;Herbal products in health food shops and pharmacies have to meet quality standards. They also need to provide information about their product. This includes the specific content and dose of the product and how safe it is.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;In Europe, always buy products registered under the Traditional Herbal Remedies (THR) scheme. Remedies registered under the scheme have a THR mark and symbol on the packaging. THR products have been tested for quality and safety.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;827&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;The Medicines and Healthcare Products Regulatory Agency (MHRA) regulates the registration of herbal products in the UK. They say that how manufacturers make unlicensed traditional Chinese medicines can vary.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;824&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;Some have been found to contain illegal substances and toxic herbs. The manufacturers have not listed this on the packaging of the product. The amount of the active ingredient can also vary widely between products.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;821&quot;&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;It is safest to buy herbal remedies from a fully qualified herbal practitioner. They have had training to work out which medicines are appropriate for you. They can also trace where their herbs and plants come from.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;818&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;It is understandable that you might want to try anything if you think it might help treat or cure your cancer. Only you can decide whether to use an alternative cancer therapy such as herbal medicine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;815&quot;&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;You could harm your health if you stop your cancer treatment for an unproven treatment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;812&quot;&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;Some websites might promote herbal medicine as part of treatment for cancer. But no reputable scientific cancer organisations support any of these claims.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;809&quot;&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;Questions to ask your therapist&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;808&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list level-3&quot; data-dcnode-id=&quot;799&quot; role=&quot;list&quot;&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;806&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;How many years of training have you had?&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;804&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;How long have you been practising?&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;802&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;Have you had training for treating and supporting people with cancer?&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;list-item&quot; data-dcnode-id=&quot;800&quot; role=&quot;listitem&quot;&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;Do you have indemnity insurance? (in case of negligence)&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;796&quot;&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot;&quot;&gt;Herbal medicine organisations&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;793&quot;&gt;&lt;span data-dcnode-id=&quot;794&quot; instrument_node=&quot;&quot;&gt;You can get further information about herbal medicines from the following organisations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field-name-field-content field-type-paragraphs field-label-hidden&quot; data-dcnode-id=&quot;595&quot;&gt;&lt;div class=&quot;field-items&quot; data-dcnode-id=&quot;596&quot;&gt;&lt;div class=&quot;field-item even&quot; data-dcnode-id=&quot;744&quot;&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel panel-default panel-accordion&quot; data-dcnode-id=&quot;746&quot; xmlns=&quot;http://www.w3.org/1999/html&quot;&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-heading&quot; data-dcnode-id=&quot;779&quot; id=&quot;heading-106924&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-title&quot; data-dcnode-id=&quot;781&quot;&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div aria-expanded=&quot;false&quot; aria-labelledby=&quot;heading-106924&quot; class=&quot;panel-collapse collapse&quot; data-dcnode-id=&quot;748&quot; id=&quot;collapse-106924&quot; role=&quot;tabpanel&quot; style=&quot;height: 0px;&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-body&quot; data-dcnode-id=&quot;750&quot;&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;774&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;The EHTPA covers a group of organisations representing Ayurveda, Chinese Herbal Medicine, Traditional Tibetan Medicine and Western Herbal Medicine within Europe. They are working together to develop a set of practice and training standards for herbal medicine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;panel panel-default panel-accordion&quot; data-dcnode-id=&quot;698&quot; xmlns=&quot;http://www.w3.org/1999/html&quot;&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-heading&quot; data-dcnode-id=&quot;731&quot; id=&quot;heading-106926&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;panel-title&quot; data-dcnode-id=&quot;733&quot;&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;735&quot;&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a aria-controls=&quot;collapse-106926&quot; aria-expanded=&quot;false&quot; class=&quot;collapse-toggle collapsed&quot; data-dcnode-id=&quot;737&quot; data-parent=&quot;#accordion-106926&quot; data-toggle=&quot;collapse&quot; href=&quot;#collapse-106926&quot; role=&quot;button&quot;&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;
             British Herbal Medicine Association (BHMA)            &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;
