&lt;/span&gt;&lt;p data-dcnode-id=&quot;1284&quot;&gt;&lt;span data-dcnode-id=&quot;1285&quot; instrument_node=&quot;&quot;&gt;When humans have used a botanical medicine for thousands of years, chances are it’s effective at helping the body heal. Otherwise why would people keep using it over and over again down through the ages?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1281&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;So it’s no surprise that studies are now providing new insight into the effectiveness of an ancient remedy that’s extracted from a particular type of tree bark.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1272&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt;In view of recently published papers, scientists around the world are starting to pay closer attention to the bark of the&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1277&quot;&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt; willow tree&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt; – a plant with the botanical name &lt;/span&gt;&lt;em data-dcnode-id=&quot;1274&quot;&gt;&lt;span data-dcnode-id=&quot;1275&quot; instrument_node=&quot;&quot;&gt;Salix alba&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1273&quot; instrument_node=&quot;&quot;&gt;, though there are other closely-related varieties. Salix alba is native to Europe and parts of Asia. The plant’s ingredients hold great promise as a new way to both treat and prevent cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1271&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1269&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1270&quot; instrument_node=&quot;&quot;&gt;The most common drug in the world, aspirin, was originally derived from willow bark, although aspirin is now manufactured without nature’s help – and no longer contains the same molecule. Apparently, conventional aspirin may be a cancer-fighter (more on this in a moment), but I’m more interested in willow bark because it seems to offer most of the same benefits of synthetic aspirin (or even more) with a much lower risk of side effects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1268&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1266&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1267&quot; instrument_node=&quot;&quot;&gt;But please be aware that some alternative practitioners warn against taking too much willow bark. They contend it could conceivably lead to the same digestive and other problems often linked to frequent or long-term aspirin use.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1265&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1263&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1264&quot; instrument_node=&quot;&quot;&gt;Let’s take a look at “nature’s aspirin” vs. synthetic aspirin. . .&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1256&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;em data-dcnode-id=&quot;1260&quot;&gt;&lt;span data-dcnode-id=&quot;1261&quot; instrument_node=&quot;&quot;&gt;Continued below. . . &lt;/span&gt;&lt;/em&gt;&lt;br data-dcnode-id=&quot;1259&quot;&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;table align=&quot;center&quot; bgcolor=&quot;#d9ffec&quot; cellpadding=&quot;10&quot; cellspacing=&quot;0&quot; data-dcnode-id=&quot;1223&quot; style=&quot;border: 1px solid black;&quot; width=&quot;90%&quot;&gt;&lt;tbody data-dcnode-id=&quot;1225&quot;&gt;&lt;tr data-dcnode-id=&quot;1227&quot;&gt;&lt;td data-dcnode-id=&quot;1229&quot; style=&quot;font-family: Helvetica, Arial, sans-serif; font-size: 14px;&quot;&gt;&lt;span data-dcnode-id=&quot;1251&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1243&quot; style=&quot;margin: 0px 0px 12px; text-align: center; font-family: Helvetica, Arial, sans-serif; font-size: 15px;&quot;&gt;&lt;span data-dcnode-id=&quot;1244&quot; style=&quot;color: red; font-family: arial,verdana,sans-serif; font-size: large;&quot;&gt;&lt;strong data-dcnode-id=&quot;1245&quot;&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt; Little-Known Early Cancer Detection Test Affords&lt;/span&gt;&lt;br data-dcnode-id=&quot;1249&quot;&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;
More Time For Intervention &amp;amp; Treatment Options&lt;/span&gt;&lt;br data-dcnode-id=&quot;1247&quot;&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1242&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1240&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt;Did you know… Cancer is the No. 2 killer of humans in the United States, afflicting almost 50% of the men and 30% of the women in their lifetimes?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1237&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1238&quot; instrument_node=&quot;&quot;&gt;By now, you’ve probably heard that your chances of surviving cancer are much higher if the disease is detected in its early stages. But did you know there’s a simple, low-cost test that can detect cancer anywhere in the body with a 95% accuracy rate?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1231&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;Surprisingly, most people – including most doctors – have never heard about this inexpensive and simple test.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1233&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.on2url.com/app/adtrack.asp%3FMerchantID%3D180663%26AdID%3D765770&quot;&gt;&lt;span data-dcnode-id=&quot;1234&quot; instrument_node=&quot;&quot;&gt; Go here to learn more about this early detection test&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1220&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1218&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt;Willow bark has been used as a healing agent since the very beginning of medicine, at least as far back as the days of Hippocrates (around 400 BC), who is considered the father of Western medicine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1215&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;Traditionally the bark has been used to:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1183&quot; style=&quot;margin-left: 15px;&quot;&gt;&lt;p data-dcnode-id=&quot;1212&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1211&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1185&quot; style=&quot;font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;p data-dcnode-id=&quot;1209&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1208&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1204&quot; style=&quot;margin-bottom: 10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;Stop the aches of low back pain. Research at the University of Toronto shows that a compound called salicin derived from willow bark can effectively limit back pain (the dose used in the study was 240mg).&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1205&quot;&gt;&lt;span data-dcnode-id=&quot;1206&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/sup&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1199&quot; style=&quot;margin-bottom: 10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1202&quot; instrument_node=&quot;&quot;&gt;Ease osteoarthritis.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1200&quot;&gt;&lt;span data-dcnode-id=&quot;1201&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1194&quot; style=&quot;margin-bottom: 10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1197&quot; instrument_node=&quot;&quot;&gt;Relieve headaches.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1195&quot;&gt;&lt;span data-dcnode-id=&quot;1196&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1193&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1187&quot; style=&quot;margin-bottom: 10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;Reduce menstrual cramps.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1190&quot;&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1189&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1182&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1180&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1181&quot; instrument_node=&quot;&quot;&gt;Only more recently have medical researchers begun to sit up and take notice of the bark’s ability to help fight cancer. And they’ve come up with a surprise: Aspirin-related salicin – the familiar pain-killer in willow – is not the only much less the the best cancer-fighting substance in this plant.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1179&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;1175&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1176&quot; style=&quot;color: #3f7531; font-family: arial, verdana, sans-serif; font-size: large;&quot;&gt;&lt;strong data-dcnode-id=&quot;1177&quot;&gt;&lt;span data-dcnode-id=&quot;1178&quot; instrument_node=&quot;&quot;&gt;It’s the whole plant&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1174&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1167&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt;For instance, lab tests by scientists in Turkey have shown that an extract of the willow plant &lt;/span&gt;&lt;em data-dcnode-id=&quot;1171&quot;&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;Salix aegyptiaca&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;, a willow tree common to the Middle East, is a strong antioxidant that can keep colon cancer cells from reproducing and forming widespread tumors.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1168&quot;&gt;&lt;span data-dcnode-id=&quot;1169&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/sup&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1164&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;This type of willow bark extract encourages the process of apoptosis – the self-destruction of cancer cells – while also stopping the production of proteins that allow cancer cells to infiltrate and grow in the intestinal walls.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1163&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1161&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1162&quot; instrument_node=&quot;&quot;&gt;The researchers conclude that the willow bark extract “is a potent nutraceutical causing cancer chemoprevention.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1156&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1159&quot; instrument_node=&quot;&quot;&gt;Interestingly, these same researchers have also examined the effects of various individual chemicals in the bark to see which are the most potentially important in preventing cancer.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1157&quot;&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/sup&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1155&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1153&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;What they have found is that willow bark contains a wide collection of substances besides salicin that possess strong anticancer effects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1150&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1151&quot; instrument_node=&quot;&quot;&gt;As a matter of fact, they don’t think salicin is even close to the being the strongest cancer fighter in the bark. “We propose that the combination of the polyphenols and flavonoids in (willow bark extract) contributes toward its potent anticarcinogenic effects.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1142&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1148&quot; instrument_node=&quot;&quot;&gt;Polyphenols and flavonoids are classes of natural chemicals in willow bark and other plants that fight inflammation and produce a wide variety of antioxidant benefits.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1146&quot;&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1145&quot; instrument_node=&quot;&quot;&gt; (For instance, resveratrol is a well-known polyphenol that is being studied for its anti-cancer and heart-protective effects.)&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1143&quot;&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/sup&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1139&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;So, according to these researchers, when doctors advocate the use of aspirin to fight cancer, their patients are missing out on other natural chemicals in willow bark that could help their bodies fight tumors.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1136&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;This is a familiar story in herbal medicine. Plants contain a wide range of nutrients and medicinal compounds, and it’s often more beneficial to consume the whole plant than to focus on one so-called active ingredient extracted in a lab or factory.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;1131&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1132&quot; style=&quot;color: #3f7531; font-family: arial, verdana, sans-serif; font-size: large;&quot;&gt;&lt;strong data-dcnode-id=&quot;1133&quot;&gt;&lt;span data-dcnode-id=&quot;1134&quot; instrument_node=&quot;&quot;&gt;Big Pharma and aspirin&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1130&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1128&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;Still, mainstream medicine and Big Pharma continue trying to co-opt the beneficial power of willow bark by insisting that you can get the same benefits from aspirin. Aspirin mostly consists of acetylsalicylic acid, a chemical relative of salicylic acid, the natural substance that the human body makes from salicin.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1125&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1126&quot; instrument_node=&quot;&quot;&gt;When researchers at the University of Utah investigated the anti-cancer power of aspirin, which has been shown to lower the risk of colon and breast cancer, they found that it reduces the amount of 2-hydroxyglutarate in the blood and in cancer cells.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1122&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1123&quot; instrument_node=&quot;&quot;&gt;This substance is what is called an oncometabolite, a chemical that seems to encourage the growth and spread of cancer cells. High levels of 2-hydroxyglutarate have been discovered in brain cancer and certain cancers of the blood.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1121&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;1117&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1118&quot; style=&quot;color: #3f7531; font-family: arial, verdana, sans-serif; font-size: large;&quot;&gt;&lt;strong data-dcnode-id=&quot;1119&quot;&gt;&lt;span data-dcnode-id=&quot;1120&quot; instrument_node=&quot;&quot;&gt;Fighting cancerous inflammation &lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1114&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1115&quot; instrument_node=&quot;&quot;&gt;Another study, this one at the Boyce Thompson Institute for Plant Research at Cornell, shows that salicylic acid can beneficially interfere with the action of a protein called HMGB1. Inflammation linked to HMGB1 can lead to the growth of tumors.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1113&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1111&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;“We’ve identified what we believe is a key target of aspirin’s active form in the body, salicylic acid, which is responsible for some of the many therapeutic effects that aspirin has,” says researcher Daniel Klessig. “This protein, HMGB1, is associated with many prevalent, devastating diseases in humans, including rheumatoid arthritis, heart disease, sepsis and inflammation-associated cancers, such as colorectal cancer and mesothelioma.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1108&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1109&quot; instrument_node=&quot;&quot;&gt;Prof. Klessig’s research, however, is not designed to elucidate how best to use a natural substance like willow bark. He and his colleagues are trying to figure out how to make salicylic acid into a more powerful drug.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1107&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1105&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;“We’ve identified both synthetic and natural derivatives of salicylic acid which are 50 to 1000 times more potent than salicylic acid or aspirin in suppressing the pro-inflammatory activity of extracellular HMGB1,” says Klessig, “thereby providing proof of concept that more effective salicylic acid-based drugs are attainable.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1100&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;Meanwhile, other researchers are looking into how aspirin can boost the effectiveness of cancer treatments. A test at the Francis Crick Institute in England shows that aspirin may enhance the power of immunotherapy – the use of immune cells to attack tumors – by limiting cancer cells’ ability to evade detection by the immune system.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1101&quot;&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/sup&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;1095&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1096&quot; style=&quot;color: #3f7531; font-family: arial, verdana, sans-serif; font-size: large;&quot;&gt;&lt;strong data-dcnode-id=&quot;1097&quot;&gt;&lt;span data-dcnode-id=&quot;1098&quot; instrument_node=&quot;&quot;&gt;Aspirin side effects&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1092&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1093&quot; instrument_node=&quot;&quot;&gt;If you could take aspirin every day without risking very serious side effects, it might be something I could recommend to lower the risk of cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1091&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1089&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;Unfortunately, the effects of daily aspirin use can be devastating, so I can’t make such a recommendation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1086&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;Taking daily aspirin can lead to serious bleeding that endangers your life – bleeding that can occur in your digestive system as well as in other parts of the body. It frequently causes severe heartburn and indigestion. And aspirin has been linked to nausea and vomiting.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1080&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;Daily aspirin use can also cause problematic interactions with a wide list of medications.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1082&quot;&gt;&lt;span data-dcnode-id=&quot;1083&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1081&quot; instrument_node=&quot;&quot;&gt; And it should never be given to anyone under the age of 18 as it can lead to Reyes syndrome, a brain and liver swelling that sometimes follows a viral infection.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p align=&quot;center&quot; data-dcnode-id=&quot;1075&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1076&quot; style=&quot;color: #3f7531; font-family: arial, verdana, sans-serif; font-size: large;&quot;&gt;&lt;strong data-dcnode-id=&quot;1077&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;The future of willow bark&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1072&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;Willow bark offers more promise as something we might be able to use safely on a regular basis. But a lot is still left to learn about how willow bark helps the body resist tumors, and whether it does or does not cause digestive problems.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1069&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;While the researchers in Turkey seem interested in learning about these features of the bark, most of the high-tech researchers in the U.S. are obsessed with the drugs they can come up with by using salicylic acid as a jumping off point.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1066&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;Consequently, figuring out the optimal way to use willow bark extract – perhaps as a tea — is still a guessing game. But there are some guidelines that experts offer:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1063&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;First off, they don’t think that youngsters under the age of 18 should use willow bark because they fear that, similar to aspirin, it could lead to Reyes syndrome.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1058&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1061&quot; instrument_node=&quot;&quot;&gt;In addition, pregnant women should avoid willow bark. And other experts warn that if you have problems with stomach ulcers, gout, diabetes, asthma, hemophilia, kidney or liver problems, willow bark is not for you.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1059&quot;&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/sup&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1055&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt;If you already take aspirin for any reason or frequently use a blood thinner or a NSAID (a nonsteroidal anti-inflammatory drug such as ibuprofen and naproxen), then don’t take willow bark without consulting a knowledgeable healthcare practitioner.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1052&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;That being said, the research on willow bark for back pain has used extract doses of 240 mg daily, and these seem to have been tolerated well by the people in the studies. If you can find an experienced herbalist in your neighborhood, he or she might be able to recommend a dose for you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1051&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1049&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;In any case, as more research into willow bark becomes available, I will pass it on to you and keep you posted on the latest findings.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1044&quot; style=&quot;margin: 0px 0px 12px; text-indent: 25px; font-family: Helvetica, Arial, sans-serif; font-size: 16px;&quot;&gt;&lt;span data-dcnode-id=&quot;1045&quot; style=&quot;color: #333333; font-family: arial, verdana, sans-serif;&quot;&gt;&lt;a data-dcnode-id=&quot;1046&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cancerdefeated.com/the-tree-bark-that-fights-cancer/%255B%255BFacebookLink%255D%255D&quot;&gt;&lt;img align=&quot;right&quot; data-dcnode-id=&quot;1047&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cancerdefeated.com/images/share-on-facebook.png&amp;amp;raw&quot; style=&quot;margin: 0px 0px 6px;&quot;&gt;&lt;/a&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1043&quot; instrument_node=&quot;&quot;&gt;
