&lt;/span&gt;&lt;div class=&quot;image-featured&quot; data-dcnode-id=&quot;408&quot; itemprop=&quot;image&quot; itemscope=&quot;&quot; itemtype=&quot;http://schema.org/ImageObject&quot;&gt;&lt;img alt=&quot;The Chinese herb that chases pain away&quot; class=&quot;attachment-full size-full wp-post-image&quot; data-dcnode-id=&quot;409&quot; height=&quot;1403&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ehonami.blob.core.windows.net/media/2018/01/chinese-herb-chases-pain-away.jpg&amp;amp;raw&quot; width=&quot;2000&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;407&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;405&quot;&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt;Do you live with the daily suffering brought on by nerve pain? Are you tortured by the feelings of stabbing, prickling, burning, tingling or other sensations that make it hard to get through your days or your nights?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;404&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;402&quot;&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;Chronic nerve pain affects more than 50 million Americans, yet finding relief from this type of pain can feel impossible thanks to the poor results and severe side effects of the conventional painkillers prescribed by doctors.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;399&quot;&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt;To top it off, since the symptoms of nerve pain vary from person to person, many pain sufferers also suffer the indignity of being shuttled from physician to physician without ever actually being offered a diagnosis or, even worse, being told that the pain is “all in your head.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;398&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;396&quot;&gt;&lt;span data-dcnode-id=&quot;397&quot; instrument_node=&quot;&quot;&gt;Fortunately, despite what mainstream medicine would have us believe, there are other avenues of pain relief. But first, let’s talk about why pain is unique…&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;395&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;392&quot;&gt;&lt;strong data-dcnode-id=&quot;393&quot;&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;Why is nerve pain so different?&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;389&quot;&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;Because our nerves are connected to every part of our body and handle so many different functions, people with nerve pain can feel it in many different ways. For some, it’s a stabbing pain in the middle of the night. For others, symptoms can include a chronic prickling, tingling, or burning they feel all day.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;388&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;386&quot;&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt;While, normally pain is supposed to be a warning such as when your hand gets too close to a stove, the nerves send a pain signal to your brain telling you to pull it back before you burn yourself, nerve pain is different.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;383&quot;&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt;When you have nerve damage, that system isn’t working. Those damaged nerves can send false signals — leaving you to feel real pain, even without an obvious cause.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;382&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;380&quot;&gt;&lt;span data-dcnode-id=&quot;381&quot; instrument_node=&quot;&quot;&gt;Now, for the relief…&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;376&quot;&gt;&lt;strong data-dcnode-id=&quot;377&quot;&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;Hope for nerve pain sufferers&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;373&quot;&gt;&lt;span data-dcnode-id=&quot;374&quot; instrument_node=&quot;&quot;&gt;Working with Chinese scientists, researchers at the University of California – Irvine set out to screen 10 traditional Chinese medicines known as analgesics, testing nearly 500 compounds for their pain-relieving abilities to determine how well they performed for patients suffering from nerve pain.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;370&quot;&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt;Here’s what they found…&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;369&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;367&quot;&gt;&lt;span data-dcnode-id=&quot;368&quot; instrument_node=&quot;&quot;&gt;Of all the medicines and compounds tested, one stood out: Dehydrocorybulbine (DHCB) from the roots of the Corydalis yanhusuo plant.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;364&quot;&gt;&lt;span data-dcnode-id=&quot;365&quot; instrument_node=&quot;&quot;&gt;In tests on rodents, not only did DHCB prove to diminish both inflammatory pain, which is associated with tissue damage, but also the severe pain caused by damage to the nervous system — in other words, nerve pain.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;361&quot;&gt;&lt;span data-dcnode-id=&quot;362&quot; instrument_node=&quot;&quot;&gt;Even better, the researchers discovered that DHCB did not generate the tolerance seen with continued use of most conventional pain relievers, like morphine, so it could continue to provide pain relief over time without the need to repeatedly up the dosage.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;357&quot;&gt;&lt;strong data-dcnode-id=&quot;358&quot;&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;Using corydalis to overcome nerve pain&lt;/span&gt;&lt;/strong&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;354&quot;&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;So, what is Corydalis and DHCB, you ask?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;351&quot;&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;Corydalis is a flowering herbal plant that grows in Siberia, Northern China and Japan. People utilize its root extract to alleviate menstrual cramps, chest pain and abdominal pain. It’s been previously studied for its analgesic properties, but this is the first time its active compound, DHCB, was been identified, extracted and tested.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;348&quot;&gt;&lt;span data-dcnode-id=&quot;349&quot; instrument_node=&quot;&quot;&gt;And, DHCB is just one of the active alkaloids in corydalis that has potential for providing pain relief, so there’s no telling what other painful conditions this plant may help alleviate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;345&quot;&gt;&lt;span data-dcnode-id=&quot;346&quot; instrument_node=&quot;&quot;&gt;While DHCB alone is not currently available, it is part of the Corydalis yanhusuo root or extracts that can be purchased in health stores or online with ease, so you can put it to the test yourself.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;342&quot;&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt;In fact, it can even be found in pain-relieving creams for when you need to get right to the root of your pain. There’s just one thing to remember… corydalis should not be used by anyone who is pregnant or breastfeeding.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;341&quot; instrument_node=&quot;&quot;&gt;
