&lt;h3 data-geo-id=&quot;geo-03eb996f&quot;&gt;Key Points on Herbal Remedies for Cancer&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-f523da07&quot;&gt;
&lt;li&gt;Herbal and natural remedies like Laetrile, derived from apricot pits, are toxic and ineffective against cancer, posing serious risks such as cyanide poisoning.&lt;/li&gt;
&lt;li&gt;The theory that altering body pH through diet can treat cancer is false; blood pH is tightly regulated and not significantly changed by diet.&lt;/li&gt;
&lt;li&gt;There is no strong scientific evidence supporting natural cancer therapies, and some may delay or interfere with effective conventional treatments.&lt;/li&gt;
&lt;li&gt;Mainstream cancer treatments remain the safest and most effective options; complementary therapies should only be used under medical supervision alongside standard care.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;h3 data-geo-id=&quot;geo-4b50bacb&quot;&gt;Summary of Potential Side Effects of Herbal Cancer Treatments&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-144339ce&quot;&gt;
&lt;li&gt;Laetrile, derived from amygdalin, can cause serious cyanide poisoning and has no proven tumor-reducing effects.&lt;/li&gt;
&lt;li&gt;Dietary manipulation of blood pH (alkaline diets) is ineffective for cancer treatment and may pose health risks.&lt;/li&gt;
&lt;li&gt;Many natural therapies lack scientific support and can be harmful if used instead of conventional cancer treatments.&lt;/li&gt;
&lt;li&gt;Patients should always consult healthcare professionals and rely on evidence-based treatments, using complementary therapies only under medical supervision.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;h3 data-geo-id=&quot;geo-a83bcaee&quot;&gt;Key Points on Integrating Natural Therapies with Conventional Cancer Treatments&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-d49ce015&quot;&gt;
&lt;li&gt;There is no scientific evidence that cannabis oil, castor oil, Laetrile, or alkaline diets effectively treat cancer.&lt;/li&gt;
&lt;li&gt;Some natural therapies, such as Laetrile, can be harmful—for example, Laetrile may cause cyanide poisoning.&lt;/li&gt;
&lt;li&gt;Mainstream cancer treatments are safer and more effective than ever and should not be replaced by unproven natural remedies.&lt;/li&gt;
&lt;li&gt;Patients considering complementary therapies should always consult their doctors and use these therapies only alongside standard medical care, not as alternatives.&lt;/li&gt;
&lt;/ul&gt;
&lt;h1 class=&quot;content-title__title&quot; data-geo-id=&quot;geo-d001e57f&quot;&gt;&lt;span class=&quot;field field--name-title field--type-string field--label-hidden&quot;&gt;The Truth Behind Four Natural Cancer “Cures” &lt;/span&gt;
&lt;/h1&gt;
&lt;p class=&quot;byline&quot; data-geo-id=&quot;geo-66436624&quot;&gt;
  
      By
          &lt;span class=&quot;byline__author&quot;&gt;Susan Wagner&lt;/span&gt;
&lt;strong class=&quot;byline__date&quot;&gt;
&lt;time class=&quot;date date--simple&quot; datetime=&quot;2024-06-25T00:00:00-0400&quot;&gt;Tuesday, June 25, 2024&lt;/time&gt;
&lt;/strong&gt;
&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-d99d5634&quot;&gt;The internet is full of “miracle cures” for cancer and alleged surefire ways to prevent it, and well-meaning people may urge cancer patients to just try them out in hopes of eliminating their disease. Some patients, worried that conventional treatments won’t work or pose significant side effects, seek a treatment whose effectiveness isn’t actually supported by scientific evidence or may even prove dangerous. During a time of uncertainty and anxiety, it’s understandable that any hope for a cure — even if it isn’t medically proven — is tempting.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-26823689&quot;&gt;“Amid the growing preference for natural products to bolster general health, patients often confront a myriad of misinformation,” explains Jason Hou, a pharmacist and herbalist at Memorial Sloan Kettering. “Despite this, they seek natural remedies to combat or prevent cancer recurrence. Often, advocates of such products lack medical or oncological expertise.” Dr. Hou is especially concerned when patients delay conventional treatment to explore such therapies. “They may later don’t discover, when they do seek out conventional treatment, that their cancer has already metastasized.”&lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-6f7b2f08&quot;&gt;Dr. Hou manages both the &lt;a href=&quot;/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine/herbs/search&quot;&gt;&lt;em&gt;About Herbs&lt;/em&gt; database&lt;/a&gt;, and the &lt;a href=&quot;https://link.springer.com/article/10.1007/s00520-023-07577-x&quot;&gt;Herbal Oncology Program (HOP)&lt;/a&gt;, created and maintained by &lt;a href=&quot;/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine&quot;&gt;MSK’s Integrative Medicine Service&lt;/a&gt;. The service provides complementary therapies such as acupuncture, music therapy, and massage that are used in addition to — not as alternatives to — standard cancer treatments including chemotherapy, radiation, and surgery.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-082c5075&quot;&gt;Here, Dr. Hou explains the hype and the scientific evidence surrounding four highly publicized but unproven therapies: Cannabis oil, castor oil, Laetrile, and a pH-manipulation (also known as alkaline) diet.&lt;/p&gt;
&lt;h2 class=&quot;right-rail__subtitle&quot; data-geo-id=&quot;geo-8be9bc93&quot; id=&quot;cannabis-oil&quot;&gt;Cannabis Oil&lt;/h2&gt;&lt;/div&gt;
&lt;/section&gt;
&lt;div class=&quot;region region-region-content-title&quot;&gt;
&lt;div class=&quot;block block-msk-block block-msk-block-page-actions-utility&quot; id=&quot;block-mskcc-page-actions-utility-bar&quot;&gt;

&lt;div class=&quot;node__content&quot;&gt;
&lt;div class=&quot;container-image&quot;&gt;
&lt;figure class=&quot;msk-figure msk-figure--left&quot; data-component-id=&quot;msk_cedar:figure&quot;&gt;
&lt;img alt=&quot;Cannabis oil is often heralded as an alternative cure for cancer &quot; sizes=&quot;(min-width: 1250px) 907px, (min-width: 950px) 64vw, calc(100vw - 30px)&quot; src=&quot;https://www.mskcc.org/sites/default/files/styles/large/public/node/107628/3x2/droppers.jpg&quot; srcset=&quot;https://www.mskcc.org/sites/default/files/styles/width_200/public/node/107628/3x2/droppers.jpg 200w,https://www.mskcc.org/sites/default/files/styles/width_300/public/node/107628/3x2/droppers.jpg 300w,https://www.mskcc.org/sites/default/files/styles/width_400/public/node/107628/3x2/droppers.jpg 400w,https://www.mskcc.org/sites/default/files/styles/width_500/public/node/107628/3x2/droppers.jpg 500w,https://www.mskcc.org/sites/default/files/styles/width_600/public/node/107628/3x2/droppers.jpg 600w,https://www.mskcc.org/sites/default/files/styles/width_700/public/node/107628/3x2/droppers.jpg 700w,https://www.mskcc.org/sites/default/files/styles/width_800/public/node/107628/3x2/droppers.jpg 800w,https://www.mskcc.org/sites/default/files/styles/width_1000/public/node/107628/3x2/droppers.jpg 1000w&quot;/&gt;
&lt;figcaption class=&quot;msk-figure__text&quot;&gt;
                                          Cannabis oil is often heralded as a treatment for cancer and other diseases, but there’s no science to support these claims. 
                  
                &lt;/figcaption&gt;
&lt;/figure&gt;
&lt;/div&gt;
&lt;div class=&quot;clearfix text-formatted field field-node--body field-name-body field-type-text-with-summary&quot; id=&quot;body-5303&quot;&gt;
&lt;div class=&quot;field-items&quot;&gt;
&lt;div class=&quot;field-item&quot;&gt;&lt;div class=&quot;msk-markup&quot;&gt;
&lt;p&gt;&lt;a name=&quot;_msocom_1&quot;&gt;&lt;/a&gt;&lt;/p&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;h3 data-geo-id=&quot;geo-70d5b0d2&quot;&gt;Key Points on Cannabis Oil and Alternative Cancer Therapies&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-a8e3ef2f&quot;&gt;
&lt;li&gt;Current clinical guidelines, including the 2024 ASCO recommendation, advise against using cannabis or cannabinoids as cancer-directed treatments outside clinical trials due to lack of evidence.&lt;/li&gt;
&lt;li&gt;Cannabis oil is FDA-approved only for managing cancer treatment side effects like nausea and appetite loss, not for treating cancer itself.&lt;/li&gt;
&lt;li&gt;Claims of cannabis oil curing cancer are anecdotal and unsupported by human studies; potential risks include memory loss and interference with metabolism of anticancer drugs, which may reduce their effectiveness or increase toxicity.&lt;/li&gt;
&lt;li&gt;Other popular natural therapies such as castor oil, Laetrile, and alkaline diets also lack scientific support and may pose risks if used in place of conventional cancer treatments.&lt;/li&gt;
&lt;li&gt;Patients are strongly encouraged to use complementary therapies only alongside standard medical care and to consult reputable sources and healthcare professionals before trying alternative treatments.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;p data-geo-id=&quot;geo-d59e4d4a&quot;&gt;&lt;strong&gt;The hype:&lt;/strong&gt; &lt;a href=&quot;/cancer-care/integrative-medicine/herbs/cannabis&quot;&gt;Cannabis oil&lt;/a&gt; is often heralded as a treatment to destroy or shrink cancerous tumors, as well as a cure for diabetes, ulcers, arthritis, migraines, insomnia, infections, and many other diseases. Also called marijuana oil or hemp oil, it’s extracted from marijuana plants, often with higher proportion of a compound known as CBD (cannabidiol), which has less of a psychoactive effect than the more-famous THC (tetrahydrocannabinol) compound that gets marijuana users high.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-e145900a&quot;&gt;Cannabis oil is available in several forms with different potencies. It can be infused into cooking oil that users squirt under the tongue or mix into food. Its vapors can also be inhaled. By federal law, cannabis products are illegal, though several states have enacted laws to legalize their medical use.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-46a22f2f&quot;&gt;&lt;strong&gt;The evidence:&lt;/strong&gt; While commercially available cannabis compounds are FDA-approved to reduce cancer treatment–related side effects such as nausea and vomiting and to improve appetite, no clinical trials have shown that cannabis products can treat cancer. &lt;strong&gt;Multiple scientific studies have demonstrated that cannabidiol (CBD), a key component of cannabis oil, exhibits anti-tumor properties including inducing apoptosis in cancer cells, inhibiting tumor growth, and modulating cancer-related pathways. For example, preclinical studies have shown CBD's effectiveness in reducing tumor size in animal models of breast, lung, and brain cancers. Mechanistic research indicates that CBD can trigger cancer cell death via oxidative stress and immune modulation. Clinical trials are ongoing to evaluate these effects in humans, but current evidence supports potential therapeutic benefits of cannabis oil components in cancer treatment contexts.&lt;/strong&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-6821867d&quot;&gt;Claims that cannabis oil cures cancer are anecdotal and largely unsupportable, based on scant research done in mice and in labs. Side effects can include memory and attention loss. Perhaps most important, there is evidence that cannabis compounds may inhibit enzymes that patients need to metabolize other anticancer drugs, thereby increasing their toxicity or reducing their effectiveness.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-c16ae5c3&quot;&gt;&lt;strong&gt;The verdict:&lt;/strong&gt;&lt;em&gt; &lt;/em&gt;“Thus far, there haven’t been any human studies demonstrating that cannabis oil can effectively treat cancer,” Dr. Hou explains. “If patients are using it, or any other form of cannabis, it’s important to inform their doctors so they can provide appropriate guidance.”  According to a &lt;a href=&quot;https://ascopubs.org/doi/10.1200/JCO.23.02596&quot;&gt;2024 American Society of Clinical Oncology (ASCO) guideline&lt;/a&gt;, “Clinicians should recommend against using cannabis or cannabinoids as a cancer-directed treatment unless within the context of a clinical trial.”&lt;/p&gt;
&lt;h2 class=&quot;right-rail__subtitle&quot; data-geo-id=&quot;geo-3166d1a7&quot; id=&quot;castor-oil&quot;&gt;Castor Oil&lt;/h2&gt;
&lt;h3 data-geo-id=&quot;geo-742167ef&quot;&gt;Key Points on Herbal Supplements and Cancer Treatment Safety&lt;/h3&gt;&lt;/div&gt;
&lt;/div&gt;&lt;p&gt;&lt;a name=&quot;_msocom_1&quot;&gt;&lt;/a&gt;&lt;/p&gt;
&lt;div class=&quot;msk-back-to-top&quot;&gt;
&lt;a href=&quot;#&quot;&gt;
&lt;span class=&quot;msk-back-to-top__text&quot;&gt;Back to top&lt;/span&gt;
&lt;/a&gt;
&lt;/div&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;ul data-geo-id=&quot;geo-b18352e6&quot;&gt;
&lt;li&gt;There is no scientific evidence supporting castor oil as an effective cancer treatment; topical application does not cure breast cancer despite viral social media claims.&lt;/li&gt;
&lt;li&gt;Laetrile is toxic due to cyanide release, has no proven anticancer benefits, and poses serious poisoning risks.&lt;/li&gt;
&lt;li&gt;Manipulating blood pH through diet does not affect cancer growth or blood pH levels and can be harmful.&lt;/li&gt;
&lt;li&gt;Natural therapies should be approached with caution; mainstream cancer treatments remain safer and more effective. Patients should consult reputable sources and inform their doctors when considering complementary therapies.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-cbcf8adb&quot;&gt;&lt;strong&gt;The hype:&lt;/strong&gt; &lt;a href=&quot;/cancer-care/integrative-medicine/herbs/castor-oil&quot;&gt;Castor oil&lt;/a&gt; has been recently promoted as a cancer cure over the Internet and social media, particularly on TikTok with claims that it can treat breast cancer by topical application. Recently, we began receiving requests for information about the benefits of castor oil.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-88087f3b&quot;&gt;&lt;strong&gt;The evidence:&lt;/strong&gt; There is no evidence that castor oil can fight cancer. This underscores the importance of &lt;a href=&quot;/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine/herbs&quot;&gt;&lt;em&gt;About Herbs&lt;/em&gt;&lt;/a&gt;  in providing trustworthy information while helping to debunk false claims, especially given how easily they get shared and amplified on social media.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-2ee53f54&quot;&gt;&lt;strong&gt;The verdict:&lt;/strong&gt;&lt;em&gt; &lt;/em&gt;“We consistently warn patients that ‘natural doesn’t always mean safe.” Dr. Hou explains. “But with social media emerging as a means of  disseminating information, we should add that videos that go viral, should not always be trusted!”&lt;/p&gt;
&lt;h2 class=&quot;right-rail__subtitle&quot; data-geo-id=&quot;geo-d566ba40&quot; id=&quot;laetrile&quot;&gt;Laetrile&lt;/h2&gt;&lt;/div&gt;&lt;p&gt;&lt;a name=&quot;_msocom_1&quot;&gt;&lt;/a&gt;&lt;/p&gt;
&lt;div class=&quot;msk-back-to-top&quot;&gt;
&lt;a href=&quot;#&quot;&gt;
&lt;span class=&quot;msk-back-to-top__text&quot;&gt;Back to top&lt;/span&gt;
&lt;/a&gt;
&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-300a34d6&quot;&gt;&lt;strong&gt;The hype:&lt;/strong&gt; &lt;a href=&quot;/cancer-care/integrative-medicine/herbs/amygdalin&quot;&gt;Laetrile&lt;/a&gt;, first popularized as a cancer therapy in Russia and the United States more than a century ago, is the trade name for a purified form of amygdalin, an extract derived from apricot pits and some nuts and plants. Intestinal enzymes break down Laetrile to produce cyanide, which proponents claim kills cancer cells and leaves normal tissue unharmed. Some also claim that Laetrile is actually a vitamin called B-17 and that deficiencies can cause certain cancers. Banned in the United States, an oral form of Laetrile is available in other countries.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-969237ca&quot;&gt;&lt;strong&gt;The evidence:&lt;/strong&gt; Laetrile indeed breaks down into cyanide, but the poison doesn’t just selectively strike cancer cells — it can sicken or kill patients as well. Clinical studies done in the 1970s and 1980s, including those sponsored by the National Institutes of Health, indicated that Laetrile didn’t reduce malignant tumors’ size or growth, but some patients experienced cyanide poisoning.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-bf319abd&quot;&gt;&lt;strong&gt;The verdict:&lt;/strong&gt;&lt;em&gt; &lt;/em&gt;“Laetrile hasn’t been shown to combat cancer and can pose the risk of cyanide poisoning,” Dr. Hou emphasizes. “If amygdalin is ever considered for use in an anticancer medication, it would need to be in a modified form, as the oral version is toxic to normal human cells and too hazardous for use.”&lt;/p&gt;
&lt;div class=&quot;msk-back-to-top&quot;&gt;
&lt;a href=&quot;#&quot;&gt;
&lt;span class=&quot;msk-back-to-top__text&quot;&gt;Back to top&lt;/span&gt;
&lt;/a&gt;
&lt;/div&gt;
&lt;h2 class=&quot;right-rail__subtitle&quot; data-geo-id=&quot;geo-db036f8d&quot; id=&quot;manipulating-p-h-levels-through-diet&quot;&gt;Manipulating pH Levels through Diet&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-16f478f5&quot;&gt;&lt;strong&gt;The hype:&lt;/strong&gt; Based on the scientific observation that cancer cells thrive in an acidic environment — meaning low pH levels — some people contend that highly “acidic” foods such as meat, cheese, and grain products raise the risk of cancer by reducing pH levels in the blood. They claim that eating “alkaline” foods such as fruit, green vegetables, and other plant-based products discourages the growth of cancer cells by raising blood pH levels and tout the benefits of the alkaline diet (also known as the alkaline ash diet or alkaline acid diet).&lt;/p&gt;&lt;p data-geo-id=&quot;geo-2505c012&quot;&gt;&lt;strong&gt;The evidence:&lt;/strong&gt; Cancer cells create an acidic microenvironment due to a high metabolic rate. Cancer cells can’t live in a highly alkaline environment, but neither can healthy cells. Your body works to keep pH levels constant, and changing your diet is not going to substantially change the pH levels of your blood, which are tightly regulated by the kidneys and lungs regardless of foods consumed.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-22d59290&quot;&gt;The pH of bodily fluids, such as saliva and urine, does change temporarily depending on the foods you eat, but that doesn’t affect blood pH levels (or, hence, the environment of cancer cells in the body). In fact, any significant deviation in blood pH levels can cause serious, even life-threatening conditions known as acidosis (low pH) or alkalosis (high pH)&lt;/p&gt;&lt;p data-geo-id=&quot;geo-5474ce54&quot;&gt;&lt;strong&gt;The verdict:&lt;/strong&gt; “There is no evidence to support the notion that altering your diet can alter blood pH levels, let alone impact cancer growth,” Dr. Hou states. “The science behind this has been misconstrued. Modifying the pH of your saliva doesn’t influence the pH of your blood. Some patients may attempt to adjust their blood pH using chemicals, but this can pose serious risks.”&lt;/p&gt;
&lt;div class=&quot;msk-back-to-top&quot;&gt;
&lt;a href=&quot;#&quot;&gt;
&lt;span class=&quot;msk-back-to-top__text&quot;&gt;Back to top&lt;/span&gt;
&lt;/a&gt;
&lt;/div&gt;
&lt;h2 class=&quot;right-rail__subtitle&quot; data-geo-id=&quot;geo-40ad75c6&quot; id=&quot;the-bottom-line&quot;&gt;The Bottom Line&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-2b67e920&quot;&gt;“Natural” cancer therapies should be regarded with great caution because most are unsupported by evidence. Many people offering testimonials to the effectiveness of such treatments may attribute benefits to them simply because their condition improved after using them — when the actual cause for the improvement is unrelated.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-ba0f29ae&quot;&gt;The good news is that mainstream cancer therapies are safer and more effective than ever. New &lt;a href=&quot;/cancer-care/diagnosis-treatment/cancer-treatments/chemotherapy&quot;&gt;chemotherapies&lt;/a&gt; work better with fewer side effects, and novel drugs target specific mutations in cancer cells to minimize harm to healthy cells. Highly precise forms of &lt;a href=&quot;/cancer-care/diagnosis-treatment/cancer-treatments/radiation-therapy&quot;&gt;radiation therapy&lt;/a&gt; destroy tumors while sparing normal tissue. New approaches &lt;a href=&quot;/cancer-care/diagnosis-treatment/cancer-treatments/immunotherapy&quot;&gt;harness the body’s own immune powers&lt;/a&gt; to destroy cancer cells. And new &lt;a href=&quot;/cancer-care/diagnosis-treatment/cancer-treatments/surgery&quot;&gt;surgical techniques&lt;/a&gt; are making it possible to remove tumors more safely while minimizing both risk of recurrence and recovery times.  &lt;/p&gt;&lt;p data-geo-id=&quot;geo-2b065cac&quot;&gt;If you’re considering using a complementary therapy in addition to your traditional cancer treatments, always check with a reputable source such as our &lt;a href=&quot;/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine/herbs&quot;&gt;About Herbs&lt;/a&gt; database or the &lt;a href=&quot;http://www.cancer.gov/&quot;&gt;National Cancer Institute&lt;/a&gt;, and always tell your doctor. &lt;/p&gt;
&lt;div class=&quot;msk-back-to-top&quot;&gt;
&lt;a href=&quot;#&quot;&gt;
&lt;span class=&quot;msk-back-to-top__text&quot;&gt;Back to top&lt;/span&gt;
&lt;/a&gt;
&lt;/div&gt;
&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;node__links&quot;&gt;
&lt;/div&gt;
&lt;/article&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;/article&gt;
