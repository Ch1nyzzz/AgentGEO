&lt;/span&gt;&lt;img alt=&quot;20 Herbs that can fight cancer&quot; class=&quot;metaImage&quot; data-dcnode-id=&quot;738&quot; id=&quot;body_imgHead&quot; itemprop=&quot;image&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.canceractive.com/media/articles/meta/images/shutterstock_298466456.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;735&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;articleMain&quot; data-dcnode-id=&quot;479&quot;&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;clrfix&quot; data-dcnode-id=&quot;733&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;732&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;clrfix&quot; data-dcnode-id=&quot;731&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;contentInner&quot; data-dcnode-id=&quot;485&quot; itemprop=&quot;articleBody mainEntityOfPage&quot;&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;721&quot;&gt;&lt;i data-dcnode-id=&quot;722&quot;&gt;&lt;span data-dcnode-id=&quot;723&quot; style=&quot;font-size:16px&quot;&gt;&lt;b data-dcnode-id=&quot;727&quot; style=&quot;color:#000000; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;Herbs can be potent and powerful, and research is growing with many herbs shown to have powerful anti-cancer properties without the damaging side-effects of drugs; h&lt;/span&gt;&lt;/b&gt;&lt;b data-dcnode-id=&quot;725&quot; style=&quot;font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt;ere are twenty herbs that just might help your fight against cancer.&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(This article was prepared with help from two of the UK’s top herbalists, Alan Hopking and David Broom.)&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;713&quot;&gt;&lt;b data-dcnode-id=&quot;717&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;img complete=&quot;complete&quot; data-dcnode-id=&quot;719&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.canceractive.com/images/MYPICS/astragalus.jpg&amp;amp;raw&quot; style=&quot;float:right; height:123px; width:174px&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;1 &lt;/span&gt;&lt;/b&gt;&lt;b data-dcnode-id=&quot;715&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;ASTRAGALUS (Huang Qi):&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt; A Chinese herb; an immune system booster, known to stimulate body’s natural production of interferon. It also helps the immune system identify rogue cells. Work with the herb in both cancer and AIDS cases has been encouraging. The MD Anderson Cancer Centre in Texas conducted research showing that taking Astragalus when having Radiotherapy doubled survival times.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;702&quot;&gt;&lt;b data-dcnode-id=&quot;710&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;711&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;707&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;BERBERIS FAMILY (e.g. Podophyllum peltanum): &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;Slow active purgative. Research has shown these herbs to have a strong action against cancer and they have been used with many cancers, especially Ovarian cancer. In Cancer Watch March 2015, an ingredient Berberine, was shown in research to outperform brain cancer drug, Temozolomide &lt;/span&gt;&lt;i data-dcnode-id=&quot;704&quot; style=&quot;font-style:italic&quot;&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;in vitro&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;. It was also shown to act synergistically with it and improve its efficacy. Berberine is anti-inflammatory, attacks microbes, attacks the AMPK pathway in cancer cells and cuts blood sugar.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;693&quot;&gt;&lt;b data-dcnode-id=&quot;694&quot;&gt;&lt;span data-dcnode-id=&quot;699&quot; style=&quot;color:#ff0000&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;Go to: &lt;/span&gt;&lt;/span&gt;&lt;i data-dcnode-id=&quot;695&quot;&gt;&lt;a data-dcnode-id=&quot;696&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.canceractive.com/article/Berberine-as-a-cancer-treatment&quot;&gt;&lt;span data-dcnode-id=&quot;697&quot; style=&quot;color:#ff0000&quot;&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;Berberine and cancer&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;685&quot;&gt;&lt;b data-dcnode-id=&quot;690&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;687&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;BLOODROOT (Sanguinaria canadensis): &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;Research shows consistent anti-neoplastic activity. It has been shown to be effective against cancer tumours, and can shrink them; it is one of the herbs in an anti-cancer poultice called Black Salve against breast and skin cancers; and has proven useful with sarcomas.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;677&quot;&gt;&lt;b data-dcnode-id=&quot;682&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;679&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;BUTCHERS BROOM (Ruscus aculeatus): &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;The active ingredients of this herb has been found to be the ruscogenins which have tumour-shrinking and anti-oestrogenic abilities. Thus its use in the treatment of breast cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;669&quot;&gt;&lt;b data-dcnode-id=&quot;673&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;img complete=&quot;complete&quot; data-dcnode-id=&quot;675&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.canceractive.com/images/MYPICS/cats%2520claw.jpg&amp;amp;raw&quot; style=&quot;float:right; height:118px; width:207px&quot;&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;5 &lt;/span&gt;&lt;/b&gt;&lt;b data-dcnode-id=&quot;671&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;CAT’S CLAW (Uncaria tormentosa): &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;An adaptogen and powerful immuno-stimulant, it enhances the white cells clean up process (phagocytosis). It is an excellent companion to astragalus, curcumin and echinacea. Research indicates it can reduce tumour size, particularly with skin cancers. It also helps reduce the side-effects of chemo and radiotherapy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;662&quot;&gt;&lt;b data-dcnode-id=&quot;666&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;667&quot; instrument_node=&quot;&quot;&gt;6 &lt;/span&gt;&lt;/b&gt;&lt;b data-dcnode-id=&quot;664&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;CHAPARRAL (Larrea mexicana):&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt; Cancer Watch covered a major research study from the US which heaped praise on this herb. It appears to boost the immune system, stop metastases and reduce tumour size. Seems especially interesting with breast cancer and is another ingredient in Black Salve. It is also an anti-oxidant and anti-microbial, with low toxicity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;653&quot;&gt;&lt;b data-dcnode-id=&quot;659&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;657&quot; style=&quot;color:#ff0000&quot;&gt;&lt;span data-dcnode-id=&quot;658&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/span&gt;&lt;b data-dcnode-id=&quot;655&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;CURCUMIN (Turmeric): &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;Turmeric root contains 3% curcumin. Both have significant anti-microbial and anti-inflammatory activity. That alone seems enough for certain hospitals in America to consider using it in the treatment of polyps and colon cancer. However new research shows that it can attack cancer stem cells, shrink cancer tumours and inhibit blood supply growth to tumours. It is a powerful antioxidant with liver protective benefits, and outperformed several anti-inflammatory drugs without side-effects in research.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;645&quot;&gt;&lt;b data-dcnode-id=&quot;650&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;647&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;DANG SHEN ROOT (Codonopsis pilosula):&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt; increases both the white blood cell and red blood cell levels, so can be extremely helpful to patients having chemotherapy and radiotherapy, or to patients whose cancer diminishes levels of either.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;644&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;636&quot;&gt;&lt;b data-dcnode-id=&quot;641&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;img complete=&quot;complete&quot; data-dcnode-id=&quot;643&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.canceractive.com/images/MYPICS/echinacea.jpg&amp;amp;raw&quot; style=&quot;float:right; height:140px; width:99px&quot;&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;640&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;638&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;639&quot; instrument_node=&quot;&quot;&gt;ECHINACEA:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt; Another known immune system booster, it gained a populist reputation in treating colds.&amp;nbsp; There is research on its helpfulness with brain tumours apart from its abilities to increase the levels of certain immune white cells in the body.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;628&quot;&gt;&lt;b data-dcnode-id=&quot;633&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;634&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;630&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;631&quot; instrument_node=&quot;&quot;&gt;FEVERFEW:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt; This herb caused a storm when research from Rochester University in New York showed it to be more effective than the drug cytarabine in killing leukaemia cells. The US Food and Drug Agency put the active ingredient, parthenolide, on to its fast track programme. Nothing has yet been heard. But then, the FDA has never approved a herb for use as a cancer treatment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;617&quot;&gt;&lt;b data-dcnode-id=&quot;625&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;b data-dcnode-id=&quot;622&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;GOLDENSEAL:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt; One cause of stomach cancer can be the bacterium &lt;/span&gt;&lt;i data-dcnode-id=&quot;619&quot; style=&quot;font-style:italic&quot;&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;Helicobacter pylori&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;618&quot; instrument_node=&quot;&quot;&gt;. This burrows into the mucous lining of the stomach to hide from gastric acids, and then causes irritation, acid reflux, ulcers and even cancer. Goldenseal is generally anti-microbial and is used in the Caribbean and South East Asia against parasites. Goldenseal, helped by the mineral Bismuth, will kill Helicobacter pylori. Vets seem to know this, even if doctors don’t. Berberine can be found in Goldenseal.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;616&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;609&quot;&gt;&lt;b data-dcnode-id=&quot;614&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;613&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;611&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt;MILK THISTLE: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;610&quot; instrument_node=&quot;&quot;&gt;Known for years to be helpful in strengthening the liver, this herb has now been shown to be capable of protecting the liver during chemotherapy. Research in America showed that&amp;nbsp;leukaemia patients who took milk thistle had reduced liver toxicity and chemo side-effects. There is a little evidence that it has its own anti-cancer activity too.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;601&quot;&gt;&lt;b data-dcnode-id=&quot;606&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;607&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;603&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;PAU D’ARCO:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt; This tree bark was original thought to be a strong anti-cancer agent, but then its actions were clarified as strongly anti-bacterial, anti-yeast and anti-viral. That alone might be enough to eradicate cancer drivers. But new research on the differing ingredients has shown the quinoids possess immune strengthening abilities and seem to help in cases of blood and lymph cancers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;592&quot;&gt;&lt;b data-dcnode-id=&quot;597&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;img complete=&quot;complete&quot; data-dcnode-id=&quot;599&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.canceractive.com/images/MYPICS/red%2520clover.jpg&amp;amp;raw&quot; style=&quot;float:right; height:84px; width:119px&quot;&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;14&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;594&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt;RED CLOVER:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;593&quot; instrument_node=&quot;&quot;&gt; Research from a number of cancer centres including the Royal Marsden has shown its potential as a part of a treatment programme against oestrogen-driven cancers, from breast to prostate. One active ingredient in the so-called Herb of Hippocrates is Genistein, which Professor Powles formerly of the Royal Marsden dubbed ’the anti-oestrogen’.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;584&quot;&gt;&lt;b data-dcnode-id=&quot;589&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;15&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;586&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt;SHEEP’S SORRELL:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt; Used in Essiac and other herbal remedies, it is a cleanser and aids healthy tissue regeneration. There is some suggestion from research that it helps normalise damaged cells and tissue. It is also a highly praised ’vermifuge’ -&amp;nbsp;intestinal worms have little or no resistance to this herb.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;576&quot;&gt;&lt;b data-dcnode-id=&quot;581&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;16&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;578&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;SKULLCAP (Scutellaria barbata):&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt; Research has shown action against many cancer types, for example against cancers of the lung, stomach and intestines.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;568&quot;&gt;&lt;b data-dcnode-id=&quot;573&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;17&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;570&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;SUTHERLANDIA (Cancer Bush):&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt; Peer reviewed research studies indicate that this herb is anti-inflammatory, anti-viral and anti-fungal. It boosts the immune system and inhibits Tumour Necrosis Factor, known to drive wasting in cancer patients.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;561&quot;&gt;&lt;b data-dcnode-id=&quot;565&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;18 &lt;/span&gt;&lt;/b&gt;&lt;b data-dcnode-id=&quot;563&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;THOROWAX, or HARES EAR (Bulpleurum scorzoneraefolium):&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;562&quot; instrument_node=&quot;&quot;&gt; Research has shown its ability to enhance the production of natural interferon and it seems especially useful in bone cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;552&quot;&gt;&lt;b data-dcnode-id=&quot;557&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;img complete=&quot;complete&quot; data-dcnode-id=&quot;559&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.canceractive.com/images/MYPICS/wheatgrass%2520powder2.jpg&amp;amp;raw&quot; style=&quot;float:right; height:144px; width:189px&quot;&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;19&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &lt;/span&gt;&lt;b data-dcnode-id=&quot;554&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;WHEATGRASS:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt; One of the top private hospitals in South East Asia extols the benefits of freshly juiced wheatgrass. One shot gives you the chlorophyll of some 12 or more kilograms of broccoli. It acts as a blood purifier, and liver and kidney cleansing agent. In research, after two weeks of daily use, blood and tissue oxygen levels improve, as does circulation.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;539&quot;&gt;&lt;b data-dcnode-id=&quot;549&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;20 &lt;/span&gt;&lt;/b&gt;&lt;b data-dcnode-id=&quot;547&quot; style=&quot;color:#0000ff; font-size:12pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;SWEET WORMWOOD: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;Another Chinese Herb, Artemesia annua, has ingredients like artemisinin and artesunate that have outperformed the anti-malaria drugs and Artemisinin is now used as the number 1 drug against Malaria. It is strongly anti-microbial and anti-yeast and can be used as an effective part of an anti-candida diet. Also certain cancer treatments cause excesses of yeasts to form (for example, in Leukemia treatment) threatening the patient's health further. It is also known to attack pathogens like &lt;/span&gt;&lt;i data-dcnode-id=&quot;544&quot;&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;E.coli &lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;543&quot; instrument_node=&quot;&quot;&gt;and &lt;/span&gt;&lt;i data-dcnode-id=&quot;541&quot;&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;Borrelia borgdorferi&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;. In 2017 research Wormwood was shown to have direct anti-cancer properties.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;530&quot;&gt;&lt;b data-dcnode-id=&quot;531&quot;&gt;&lt;span data-dcnode-id=&quot;536&quot; style=&quot;color:#ff0000&quot;&gt;&lt;span data-dcnode-id=&quot;537&quot; instrument_node=&quot;&quot;&gt;Go to: &amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;i data-dcnode-id=&quot;532&quot;&gt;&lt;a data-dcnode-id=&quot;533&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.canceractive.com/article/Artemisinin-and-cancer%2C-yeasts-and-parasites&quot;&gt;&lt;span data-dcnode-id=&quot;534&quot; style=&quot;color:#ff0000&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;Artemisinin and yeasts, pathogens and cancer&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;/b&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;519&quot;&gt;&lt;i data-dcnode-id=&quot;520&quot;&gt;&lt;span data-dcnode-id=&quot;521&quot; style=&quot;font-size:16px&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;Because of EU laws, which allow you to buy cigarettes, medicines and GM foods, but not herbs, in the High Street, you will have to visit a herbalist to be prescribed the above herbs. &amp;nbsp;To go to the &lt;/span&gt;&lt;b data-dcnode-id=&quot;526&quot; style=&quot;color:rgb(255, 0, 255); font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;’Our Natural Selection Shop’ &lt;/span&gt;&lt;/b&gt;&lt;b data-dcnode-id=&quot;523&quot; style=&quot;font-weight:bold&quot;&gt;&lt;a data-dcnode-id=&quot;524&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ournaturalselection.com/Shop.aspx%3Fcategory%3DNatural%2520Supplements&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;Click Here&lt;/span&gt;&lt;/a&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;513&quot;&gt;&lt;b data-dcnode-id=&quot;516&quot; style=&quot;color:#ff0000; font-size:14pt; font-weight:bold&quot;&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt;HEALTH WARNING! &lt;/span&gt;&lt;/b&gt;&lt;br data-dcnode-id=&quot;515&quot;&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;
