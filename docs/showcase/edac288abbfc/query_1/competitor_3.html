&lt;/span&gt;&lt;div class=&quot;report-content&quot; data-dcnode-id=&quot;3596&quot;&gt;&lt;span data-dcnode-id=&quot;3682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3680&quot;&gt;&lt;span data-dcnode-id=&quot;3681&quot; instrument_node=&quot;&quot;&gt; Some of these cancer preventing herbs are discussed here.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3673&quot;&gt;&lt;b data-dcnode-id=&quot;3678&quot;&gt;&lt;span data-dcnode-id=&quot;3679&quot; instrument_node=&quot;&quot;&gt;Oregano:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3677&quot; instrument_node=&quot;&quot;&gt; Amongst the dried herbs, &lt;/span&gt;&lt;a alt=&quot;Health Benefits of Oregano&quot; class=&quot;hlink&quot; data-dcnode-id=&quot;3675&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.medindia.net/dietandnutrition/health-benefits-of-oregano.htm&quot; target=&quot;_blank&quot; title=&quot;Health Benefits of Oregano&quot;&gt;&lt;span data-dcnode-id=&quot;3676&quot; instrument_node=&quot;&quot;&gt;oregano&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3674&quot; instrument_node=&quot;&quot;&gt; has perhaps the highest anti-oxidant levels. Rosmarinic acid is the compound in oregano that has the strong anti-oxidant activity. An Indian study reported that oregano supplementation of 40 mg per kg of body weight had a modulatory role on tissue lipid peroxidation in colon cancer-bearing experimental rodents.The dosage for human beings has not yet been determined, but then, how much of oregano would you need to flavor your dish! &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3669&quot;&gt;&lt;b data-dcnode-id=&quot;3671&quot;&gt;&lt;span data-dcnode-id=&quot;3672&quot; instrument_node=&quot;&quot;&gt;Thyme: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3670&quot; instrument_node=&quot;&quot;&gt;Thyme is sweeter and milder than oregano. Thyme as a dried herb contains very high levels of anti-oxidants in the form of rosmarinic acid and phenolic compounds such as thymol and carvacrol. A Turkish study supported by Hacettepe University Research Foundation suggested that these phenolic compounds at concentrations below 0.2 mM and 0.1 mM respectively can significantly reduce the oxidative DNA damage and thus prevent the development of any type of cancer.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3665&quot;&gt;&lt;b data-dcnode-id=&quot;3667&quot;&gt;&lt;span data-dcnode-id=&quot;3668&quot; instrument_node=&quot;&quot;&gt;Cilantro: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3666&quot; instrument_node=&quot;&quot;&gt;Cilantro or, more commonly, coriander is another potent herb that has anti-cancer properties. The prevalent anti-oxidants in cilantro are beta-carotene, quercetin and rutin. This herb, normally used in chelation therapy for people suffering from lead poisoning, helps remove free radicals by getting rid of the heavy metals in your body. Dr. Yoshiaki Omura from the Heart Disease Research Foundation, New York, NY, USA, has actually found that fresh cilantro removes heavy metals – and with it the free radicals too – from the body in less than 2 weeks.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3663&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;center data-dcnode-id=&quot;3657&quot;&gt;&lt;div class=&quot;adslabel&quot; data-dcnode-id=&quot;3658&quot;&gt;&lt;span data-dcnode-id=&quot;3662&quot; instrument_node=&quot;&quot;&gt;Advertisement
&lt;/span&gt;&lt;div data-dcnode-id=&quot;3661&quot; id=&quot;adx_native_ad_110219&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/center&gt;&lt;span data-dcnode-id=&quot;3656&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt10&quot; data-dcnode-id=&quot;3655&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3654&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3647&quot;&gt;&lt;b data-dcnode-id=&quot;3652&quot;&gt;&lt;span data-dcnode-id=&quot;3653&quot; instrument_node=&quot;&quot;&gt;Basil: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3651&quot; instrument_node=&quot;&quot;&gt;Basil is well known for its medicinal value. Apart from having anti-inflammatory, blood pressure lowering, and nervous system stimulating properties, this popular herb has been found to have chemo-protective potential for colon cancer. In fact, a study found that &lt;/span&gt;&lt;a alt=&quot;Basil&quot; class=&quot;hlink&quot; data-dcnode-id=&quot;3649&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.medindia.net/patients/lifestyleandwellness/top-7-health-benefits-of-basil.htm&quot; target=&quot;_blank&quot; title=&quot;Basil&quot;&gt;&lt;span data-dcnode-id=&quot;3650&quot; instrument_node=&quot;&quot;&gt;basil&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3648&quot; instrument_node=&quot;&quot;&gt; played a significant role in reducing colon tumors in experimental animals. However, no human clinical trials have been conducted to confirm this experiment.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3640&quot;&gt;&lt;b data-dcnode-id=&quot;3645&quot;&gt;&lt;span data-dcnode-id=&quot;3646&quot; instrument_node=&quot;&quot;&gt;Garlic:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3644&quot; instrument_node=&quot;&quot;&gt; The National Cancer Institute (affiliated to  the NIH) recognizes garlic to have potential anticancer properties. The sulphydryl compounds in &lt;/span&gt;&lt;a alt=&quot;Garlic&quot; class=&quot;hlink&quot; data-dcnode-id=&quot;3642&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.medindia.net/patients/lifestyleandwellness/top-10-health-benefits-of-eating-raw-garlic.htm&quot; target=&quot;_blank&quot; title=&quot;Garlic&quot;&gt;&lt;span data-dcnode-id=&quot;3643&quot; instrument_node=&quot;&quot;&gt;garlic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3641&quot; instrument_node=&quot;&quot;&gt; have the ability to block the formation of cancer -causing substances. Several population studies have shown an association between increased garlic consumption and reduced risk of cancers of the stomach, colon, esophagus, pancreas, and also breast cancer. A study has found that garlic intake of 10 g per day could reduce the risk of prostate cancer by 50 percent.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3636&quot;&gt;&lt;b data-dcnode-id=&quot;3638&quot;&gt;&lt;span data-dcnode-id=&quot;3639&quot; instrument_node=&quot;&quot;&gt;Ginger: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3637&quot; instrument_node=&quot;&quot;&gt;Some pungent substances present in ginger rhizome have anti-oxidant and anti-inflammatory activities. The anti-cancer properties of ginger are attributed to phenolic substances such as 6-gingerol and 6-paradol and other constituents such as shogaols and zingerone. A study published in the journal Biochemical and Biophysical Research Communications reported that 6-gingerol can reduce viability of gastric cancer cells and limit the spread of cancer.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3629&quot;&gt;&lt;b data-dcnode-id=&quot;3634&quot;&gt;&lt;span data-dcnode-id=&quot;3635&quot; instrument_node=&quot;&quot;&gt;Turmeric: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3633&quot; instrument_node=&quot;&quot;&gt;Although turmeric is promoted mainly as anti-inflammatory herbal remedy, some scientists believe that the anti-oxidant &lt;/span&gt;&lt;b data-dcnode-id=&quot;3631&quot;&gt;&lt;span data-dcnode-id=&quot;3632&quot; instrument_node=&quot;&quot;&gt;curcumin&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3630&quot; instrument_node=&quot;&quot;&gt; present in turmeric may prevent or slow the growth of many cancers including tumor of esophagus, stomach and intestine, breast cancer and also skin cancer in experimental animals. However, clinical research is needed to determine its efficacy in cancer prevention and treatment in human beings. But, the laboratory studies have confirmed the cucumin interferes with several molecular pathways involved in cancer development, growth and spread. Further, a study found that ethanolic extract of turmeric produces remarkable symptomatic relief in patients with external cancerous lesions. There was a reduction in smell in 90 percent of cases and reduction in itching in almost all cases. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;center data-dcnode-id=&quot;3619&quot;&gt;&lt;div class=&quot;adslabel&quot; data-dcnode-id=&quot;3620&quot;&gt;&lt;span data-dcnode-id=&quot;3626&quot; instrument_node=&quot;&quot;&gt;Advertisement&lt;/span&gt;&lt;div data-dcnode-id=&quot;3621&quot; id=&quot;gpt-passback-middle&quot;&gt;&lt;span data-dcnode-id=&quot;3625&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3622&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/center&gt;&lt;span data-dcnode-id=&quot;3618&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt10&quot; data-dcnode-id=&quot;3617&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3616&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3612&quot;&gt;&lt;b data-dcnode-id=&quot;3614&quot;&gt;&lt;span data-dcnode-id=&quot;3615&quot; instrument_node=&quot;&quot;&gt;Green tea: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3613&quot; instrument_node=&quot;&quot;&gt;Polyphenols in green tea and sometimes black tea, help kill cancerous cells and stop their progression. Mayo Clinic studies have revealed that a substance called epigalloacatechin gallate (EGCG) in green tea reduces the number of leukemia cells in patients with CLL (chronic lymphocytic leukemia), a form of blood cancer.  Similarly, another study found that women who drank powdered green tea were less likely to develop bladder cancer. Again, men who drank the most green tea were 37 percent less likely to develop pancreatic cancer. A large Chinese clinical study found that the risk of prostate cancer declined with increasing frequency and quantity of green tea consumption. However, scientists found that green tea could reduce the chances of recurrence of breast cancer but it could not prevent or improve breast cancer. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3608&quot;&gt;&lt;b data-dcnode-id=&quot;3610&quot;&gt;&lt;span data-dcnode-id=&quot;3611&quot; instrument_node=&quot;&quot;&gt;Maitake mushroom: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3609&quot; instrument_node=&quot;&quot;&gt;Maitake is an edible mushroom native to the mountains of northeast Japan. Its active ingredient is a polysaccharide called beta glucan. Maitake mushroom extract is said to limit or even reverse tumor growth. It also enhances the benefits of chemotherapy and lessens the side effects of anti-cancer drugs. It acts by activating certain cells and proteins that attack cancer, T-cells and interleukin-1 and interleukin-2. The daily dose of dried mushroom is between 3 to 7 g. Maitake may not be suitable for those on hypoglycemic medication.  &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3604&quot;&gt;&lt;b data-dcnode-id=&quot;3606&quot;&gt;&lt;span data-dcnode-id=&quot;3607&quot; instrument_node=&quot;&quot;&gt;Cinnamon bark: &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3605&quot; instrument_node=&quot;&quot;&gt;Cinnamon has anti-oxidant properties that can significantly decrease lipid peroxidation that lead to cancer. Further, cinnamon bark oil has been found by researchers to be one of the most effective inhibitors of bacteria, such as Helicobacter pylori, that facilitate the invasion and progression of cancer. However, high amount of coumarin present in cinnamon can damage liver tissues. Although there are no reports of coumarin related tumor formation, high levels of coumarin did trigger cancer in experimental rodents.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3602&quot;&gt;&lt;span data-dcnode-id=&quot;3603&quot; instrument_node=&quot;&quot;&gt;As we can see, herbs  and other anti oxidants  are not only very helpful in preventing cancer and in some cases inhibiting progression of cancer, they also help with overall wellness by improving the immune system. But be sure to consult your doctor before taking any of these herbs for preventing or treating cancer. &lt;/span&gt;&lt;/p&gt;&lt;a data-dcnode-id=&quot;3601&quot; name=&quot;nutrition&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3597&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3594&quot; instrument_node=&quot;&quot;&gt;
