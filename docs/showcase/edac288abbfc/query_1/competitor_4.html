&lt;/span&gt;&lt;p data-dcnode-id=&quot;1097&quot;&gt;&lt;b data-dcnode-id=&quot;1102&quot;&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;#8 Burdock&amp;nbsp;&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1101&quot; instrument_node=&quot;&quot;&gt;– The scientific term for this herb is&lt;/span&gt;&lt;b data-dcnode-id=&quot;1099&quot;&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Arctium lappa&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1098&quot; instrument_node=&quot;&quot;&gt;. Mainly found in Asia and Europe, this herb has been in therapeutic uses since old times. It is useful for treating ailments like measles, tonsillitis, and arthritis. It is also useful to fight and reduce cancer. The active ingredients of burdock are efficient to bring changes in oncogenes. Due to this unique property, burdock is used to combat ovary cancer, breast cancer, and bladder cancer also. The use of this herb has shown a reduction in cancer tumor size and pain. It has also shown better chances of survival. The Arctigenin substance of burdock has the capability of removing low nutrient tumor cells. Burdock also contains Tannin which is one of the most important phenolic compounds to fight breast cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1096&quot; instrument_node=&quot;&quot;&gt;
