&lt;/span&gt;&lt;p data-dcnode-id=&quot;771&quot;&gt;&lt;a data-dcnode-id=&quot;773&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//muscletoughness.com/astragalus-benefits/&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;Astragalus&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt; is a herb that has been used for thousands of years to treat a wide variety of conditions and illnesses, including upper respiratory infection, fatigue, cancer, and heart disease.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;765&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;According to modern Chinese medicine, Astragalus is believed to strengthen all the body systems and is especially useful for treating conditions that cause fatigue, similar to &lt;/span&gt;&lt;a data-dcnode-id=&quot;767&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.healthline.com/nutrition/ginseng-benefits&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;Ginseng&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;. It is prescribed for everything from high blood pressure to heart disease and diabetes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;756&quot;&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;Studies conducted on Astragalus show that it helps to promote and improve immune function, increasing the strength of &lt;/span&gt;&lt;a data-dcnode-id=&quot;761&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.medicinenet.com/script/main/art.asp%3Farticlekey%3D11300&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;T cells&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;. In studies on mice, it was found that Astragalus improved the ability of &lt;/span&gt;&lt;a data-dcnode-id=&quot;758&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.immunology.org/public-information/bitesized-immunology/cells/macrophages&quot;&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;macrophages&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt; (white blood cells) to consume bacteria and viruses. For this reason, many cancer patients who are taking immune-suppressing treatments like chemotherapy benefit from supplementing with this herb.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;

nk ez-toc-heading-5&quot; data-dcnode-id=&quot;730&quot; href=&quot;#Astragalus_For_Cancer&quot; title=&quot;Astragalus For Cancer&quot;&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;Astragalus For Cancer&lt;/span&gt;&lt;/a&gt;&lt;ul class=&quot;ez-toc-list-level-3&quot; data-dcnode-id=&quot;726&quot;&gt;&lt;li class=&quot;ez-toc-heading-level-3&quot; data-dcnode-id=&quot;727&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-6&quot; data-dcnode-id=&quot;728&quot; href=&quot;#Supporting_Evidence_Research&quot; title=&quot;Supporting Evidence &amp;amp; Research&quot;&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;Supporting Evidence &amp;amp; Research&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;li class=&quot;ez-toc-page-1 ez-toc-heading-level-2&quot; data-dcnode-id=&quot;715&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-7&quot; data-dcnode-id=&quot;723&quot; href=&quot;#Astragalus_Side_Effects&quot; title=&quot;Astragalus Side Effects&quot;&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;Astragalus Side Effects&lt;/span&gt;&lt;/a&gt;&lt;ul class=&quot;ez-toc-list-level-3&quot; data-dcnode-id=&quot;716&quot;&gt;&lt;li class=&quot;ez-toc-heading-level-3&quot; data-dcnode-id=&quot;720&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-8&quot; data-dcnode-id=&quot;721&quot; href=&quot;#Side_Effect_Symptoms&quot; title=&quot;Side Effect Symptoms&quot;&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;Side Effect Symptoms&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;ez-toc-page-1 ez-toc-heading-level-3&quot; data-dcnode-id=&quot;717&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-9&quot; data-dcnode-id=&quot;718&quot; href=&quot;#Drug_Interactions&quot; title=&quot;Drug Interactions&quot;&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;Drug Interactions&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;li class=&quot;ez-toc-page-1 ez-toc-heading-level-2&quot; data-dcnode-id=&quot;708&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-10&quot; data-dcnode-id=&quot;713&quot; href=&quot;#Astragalus_Uses&quot; title=&quot;Astragalus Uses&quot;&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;Astragalus Uses&lt;/span&gt;&lt;/a&gt;&lt;ul class=&quot;ez-toc-list-level-3&quot; data-dcnode-id=&quot;709&quot;&gt;&lt;li class=&quot;ez-toc-heading-level-3&quot; data-dcnode-id=&quot;710&quot;&gt;&lt;a class=&quot;ez-toc-link ez-toc-heading-11&quot; data-dcnode-id=&quot;711&quot; href=&quot;#Astragalus_Dosage&quot; title=&quot;Astragalus Dosage&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;Astragalus Dosage&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/nav&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;700&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;703&quot; id=&quot;Astragalus_Health_Benefits&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;Astragalus Health Benefits&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;701&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;699&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;697&quot;&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;Astragalus has a variety of uses, but its primary use is that of a long-term immune system booster. It is loaded with polysaccharides, and it increases the activity of a wide variety of immune cells – macrophages, T lymphocytes, and natural killer cells. Astragalus is used for chronic low immunity and works right in the bone marrow where immune cells are manufactured.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;694&quot;&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;Unlike many herbs that can only be taken the short term to boost immunity like Goldenseal or Echinacea, Astragalus can be used long term with no ill effects or loss of efficacy. If you are prone to catching colds and flu bugs, you can start taking Astragalus early in the season and use it throughout the winter months to help your own immune system defend against illness.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;691&quot;&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;It is such an effective immune booster that several studies have shown it to be effective as a complementary cancer treatment. When used in conjunction with chemotherapy and radiation (which deplete the immune system), Astragalus has been shown to help patients recover faster and live longer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;686&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;689&quot; id=&quot;How_Does_Astragalus_Work&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;How Does Astragalus Work?&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;687&quot;&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;680&quot;&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;Studies done on Astragalus show that its primary active ingredient is a &lt;/span&gt;&lt;a data-dcnode-id=&quot;682&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Polysaccharide&quot;&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;polysaccharide&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt; called astragalan B. Astragalan B binds to the outer membranes of viruses, weakening their defences, which allows the immune system to kick in and destroy the weakened invaders. In addition, Astragalus boosts the numbers and strength of the immune cells.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;675&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;678&quot; id=&quot;Astragalus_and_Heart_Disease&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;Astragalus and Heart Disease&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;676&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;672&quot;&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;Astragalus has shown great promise in the treatment of heart disease and is widely used in China as an effective treatment for relieving the symptoms of angina, congestive heart failure, and coronary heart disease. Its antioxidant properties help to improve circulation while its other active ingredients have been shown to help blood vessels relax and also thin the blood due to their mildly diuretic properties.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;669&quot;&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;Studies have also shown Astragalus to be effective in preventing heart damage caused by viral myocarditis. In other studies, Astragalus was shown to increase lung capacity and reduce chest tightness in those with congestive heart failure. More studies are needed, however, Astragalus is a mild herb that is considered very safe, and it can be an excellent complement to traditional medicine (talk to your health care provider regarding any potential drug interference before taking as Astragalus may compound the effects of some blood-thinning medications).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;666&quot;&gt;&lt;span data-dcnode-id=&quot;667&quot; instrument_node=&quot;&quot;&gt;According to “The American Journal of Chinese Medicine,” astragalus demonstrated cardioprotective effects, significantly improving cardiac function and increasing the survival rate from heart failure. Other research has shown that astragalus enhances the quality of life for those with chronic heart failure. It showed that a dose of 4.5 g of astragalus taken twice daily was effective in improving heart contraction without interfering with other prescribed medicines.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;658&quot;&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;Sources:&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;662&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16710898&quot;&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt;US National Library of Medicine&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and the&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;659&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.cjim.cn/english/en/qkjs.asp&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;Chinese Journal of Integrative Medicine&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;657&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;653&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;656&quot; id=&quot;Astragalus_for_Fighting_Colds_and_Flu&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;Astragalus for Fighting Colds and Flu&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;654&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;650&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;Astragulus has antiviral properties, and it also stimulates the immune system. Astragulus can be taken throughout the cold/flu season to help prevent infection. Unlike Echinacea and Golden Seal, Astragulus can be used for longer stretches without reducing its efficiency.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;647&quot;&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;Astragalus has been used for thousands of years in traditional Chinese medicine. In addition to its healing properties, it is also a “warming” herb that can be soothing to the body. It also boosts energy, which is good for fighting fatigue and other secondary issues associated with cold/sinus issues.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;Astragalus is effective at fighting colds for both preventions and in shortening the duration of colds and boosting the immune system. Astragalus enhances the production of T cells, which are the bodies natural defenders against invaders like cold and flu viruses. The benefit of Astragalus is that you can take it prior to becoming ill for prevention, but it is also beneficial for use in the treatment of illness if you do get sick.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;643&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;639&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;642&quot; id=&quot;Astragalus_For_Cancer&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;641&quot; instrument_node=&quot;&quot;&gt;Astragalus For Cancer&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;640&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;638&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;636&quot;&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;Astragalus has impressive benefits for the immune system, and because of this, it has been used quite successfully as a complementary cancer treatment. It has the ability to counteract many of the adverse effects of conventional cancer treatments like radiation and chemotherapy, which take a toll on the immune system. Astragalus plays a supportive role by strengthening and boosting the immune system. It is also used to fight overall weakness typically associated with many cancers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;633&quot;&gt;&lt;span data-dcnode-id=&quot;634&quot; instrument_node=&quot;&quot;&gt;Astragulus is one of the most commonly used herbs in Chinese medicine and has a long history of use to prevent cancer, as well as other issues like heart disease, infections, and kidney problems. In China today, this herb is often used in conjunction with conventional cancer treatments and is one of the standard treatments for non-small-cell lung cancer. Clinical trials in China have shown a reduced risk of death as well as improved tumor response in studies of Astragalus as a cancer treatment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;628&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;631&quot; id=&quot;Supporting_Evidence_Research&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt;Supporting Evidence &amp;amp; Research&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;629&quot;&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;625&quot;&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;Most scientific studies on Astragalus have been performed in labs, and via animal studies; however, a study done in Houston in the early ’80s was performed on cancer patients. In this study, the effects of Astragulus were studied on both healthy subjects and those ill with cancer. The results concluded that T-cell function was restored in 90% of the cancer patients to the same levels as the healthy patients. This study demonstrated the immunostimulant effect of Astragalus. Chinese studies have shown similar results.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;622&quot;&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;Sources:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;606&quot;&gt;&lt;a data-dcnode-id=&quot;619&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cancer.org/&quot;&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;The American Cancer Society&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;618&quot;&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;615&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.cjim.cn/english/en/qkjs.asp&quot;&gt;&lt;span data-dcnode-id=&quot;616&quot; instrument_node=&quot;&quot;&gt;Chinese Journal of Integrative Medicine&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;614&quot;&gt;&lt;span data-dcnode-id=&quot;613&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;611&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12592686&quot;&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt;US National Library of Medicine&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;610&quot;&gt;&lt;span data-dcnode-id=&quot;609&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;607&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//jco.ascopubs.org/content/24/3/419.abstract&quot;&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;Journal of Clinical Oncology&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;601&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;604&quot; id=&quot;Astragalus_Side_Effects&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;603&quot; instrument_node=&quot;&quot;&gt;Astragalus Side Effects&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;602&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;598&quot;&gt;&lt;span data-dcnode-id=&quot;599&quot; instrument_node=&quot;&quot;&gt;Astragalus is typically deemed safe in most applications. Overdosing on it can have the opposite of the desired effect, however, and actually suppress the immune system. If you are taking immune-suppressing drugs, it is important that you not take Astragalus. Something else to consider – Astragalus is often used with other herbs, so consider any other herbs present in whatever blend you are taking.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;595&quot;&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;Pregnant and nursing women are advised not to take Astragalus. People who have had a transplant of any kind must avoid the use of this herb. People with immune system diseases such as systemic lupus (SLE), multiple sclerosis, and rheumatoid arthritis should also avoid Astragalus.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;590&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;593&quot; id=&quot;Side_Effect_Symptoms&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;Side Effect Symptoms&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;591&quot;&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;587&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;Side effects of Astragalus are extremely rare. The ones reported are belly bloat, dehydration, or allergic reaction such as hives or swelling, which need to be reported to a doctor right away.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;582&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;585&quot; id=&quot;Drug_Interactions&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt;Drug Interactions&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;583&quot;&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;579&quot;&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;Astragalus can have negative reactions with the following drugs, so be sure to speak to your healthcare provider before taking it if you are currently using any of the following:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;558&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;560&quot; style=&quot;list-style-type: none;&quot;&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;573&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;Cyclophosphamide (Cytoxan, Neosar)&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;570&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;Lithium&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;567&quot;&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;Any Immunosuppressants&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;564&quot;&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;Corticosteroids&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;552&quot;&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;Sources:&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;554&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.webmd.com/heart/astragalus-root-heart-benefits-side-effects&quot;&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;Web MD&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;amp;&amp;nbsp;RxList&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;547&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;550&quot; id=&quot;Astragalus_Uses&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;Astragalus Uses&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;548&quot;&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;544&quot;&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;Astragalus can be used in a variety of forms – teas, tinctures, powders, capsules etc. Fresh or powdered Astragalus root can be brewed into a tea and taken each day. It is important to note that this tea should not be sweetened with sugar as sugar can suppress the immune system, counteracting the effects of the tea. If you need to sweeten it to drink it, use stevia or raw, organic honey for the best results.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;541&quot;&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;Astragalus powder can be placed into capsules – or you can buy supplements already in capsule form. This may mean a less fresh supply, so ensure that the manufacturer has a good reputation before purchasing it in supplement form. You may also find Astragalus is blended with other herbs, which is fine, but ensure any other herbs in the blend are also ok for you to take.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;538&quot;&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;Astragalus is a relatively safe herb with little to no side effects; however, that is not the case with everything. For example, Astragalus is often blended with Echinacea to boost the immune system. Echinacea is only intended to be used for short periods of time. If you are looking for an herb, you can take every day to boost your immunity and give you the energy you would not want to use a product blended with Echinacea.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;537&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;533&quot;&gt;&lt;span class=&quot;ez-toc-section&quot; data-dcnode-id=&quot;536&quot; id=&quot;Astragalus_Dosage&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;Astragalus Dosage&lt;/span&gt;&lt;span class=&quot;ez-toc-section-end&quot; data-dcnode-id=&quot;534&quot;&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;530&quot;&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;These recommended dosages are very general and for information purposes only. Always discuss any supplements you take with your health care provider.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;527&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;Because Astragalus is a supplement and supplements can vary in potency, there is no “set” dosage. It is recommended that you stay below 30 grams per day because high dosages can have a reverse impact on the immune system and suppress it. Keeping your dosage within the recommended range can help ensure that the herb has the desired effect of boosting your immunity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;524&quot;&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;If you are brewing tea, 3-6 grams per day of dried root to 1/2 liter of water boiled and brewed into tea is the standard suggested dose. Children are able to take this herb (again talk to your childs pediatrician) in 1/3 the adult dosage. For simplicities sake, you may want to opt for purchasing a supplement form either as a tincture or capsule and follow the manufacturers directions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;
