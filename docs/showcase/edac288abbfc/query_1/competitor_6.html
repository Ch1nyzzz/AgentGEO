&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;964&quot;&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;Raw Fruits and Veggies&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;961&quot;&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;A diet consisting of a variety of raw fresh vegetables is the best prevention and also a potential cure for cancer, depending on how far cancer has progressed and how easily the body can digest and properly assimilate nutrition. Berries, grapes, broccoli, leafy greens, sprouts, avocados, red and yellow peppers, red cabbage, dandelion, beets, and many more foods have been proven in numerous scientific studies to not only prevent but to also destroy cancer cells. If we did research on every single piece of produce we eat, we’d probably find that almost all of them, if not all of them, prevent and fight cancer in some way or another. This is what the modern diet is missing, fresh raw produce. Early humans ate pounds of it a day, all day, every day.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;955&quot;&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;Related:&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;956&quot;&gt;&lt;a data-dcnode-id=&quot;957&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.organiclifestylemagazine.com/best-supplements-to-kill-candida-and-everything-else-you-ever-wanted-to-know-about-fungal-infections&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;Best Supplements To Kill Candida and Everything Else You Ever Wanted To Know About Fungal Infections&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;952&quot;&gt;&lt;span data-dcnode-id=&quot;953&quot; instrument_node=&quot;&quot;&gt;Do not underestimate the miraculous healing properties of whole, raw, fresh, organic, uncooked, unadulterated produce. Believe it or not, it’s the foundation of almost all of the best remedies for ailments, and it is the only path to true health. Eat a wide variety of raw produce every day. Cooked produce has benefits, but raw produce heals. Make big salads every day with lots of produce. Make sure that 80% of your diet is raw produce. I can’t stress it enough!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;

t; pepper, &lt;/span&gt;&lt;a data-dcnode-id=&quot;913&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.greenlifestylemarket.com/supplements/herbal/cinnamon&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;cinnamon&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;910&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.greenlifestylemarket.com/supplements/herbal/ginger&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;ginger&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt; have been shown in multiple studies to fight cancer. Spice up your meals, especially those big salads. Fresh raw produce works synergistically with herbs and spices. In other words, the combination of garlic, oregano, and a bunch of vegetables is more powerful than garlic and/or oregano alone.&lt;/span&gt;&lt;p data-dcnode-id=&quot;908&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;907&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;881&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;879&quot;&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;Speaking of combinations, turmeric and black pepper make a powerful cancer-killing duo. Most of you have heard of the incredible benefits of turmeric and it’s cancer-killing properties. Turmeric is known to actually outperform many pharmaceutical drugs for various diseases. The only problem with turmeric is that the beneficial component to which all the hoopla is about, curcumin, is not easily absorbed by the body. Black pepper contains piperine, a chemical with powerful antioxidant properties. Pepper and turmeric together inhibit the growth of cancer cells without destroying healthy cells.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;878&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;876&quot;&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;When people eat a considerable amount of turmeric, within an hour, there’s a slight increase of curcumin in the blood, but the liver actually tries to get rid of it. When taken with a small amount of black pepper, the curcumin levels skyrocket. Reports range from a 200% increase to over 2,000%!&amp;nbsp;It’s no coincidence that two of the main ingredients in curry powder are black pepper and turmeric. Come to think of it, ginger and cinnamon, two other powerhouse herbs, are also almost always found in curry spice blends as well. It’s no wonder…&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;873&quot;&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt;Just like produce, raw herbs and spices are best (as opposed to powdered and processed). Cook with them all you like, but before eating a cooked meal, try throwing in some more flavor with freshly grated, crushed, or ground spices. This practice will not only increase your health, it will radically improve the taste of your food as well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;870&quot;&gt;&lt;span data-dcnode-id=&quot;871&quot; instrument_node=&quot;&quot;&gt;It should be noted that while I am a fan of whole foods, there are extracts and other supplement forms of foods that can be much more powerful for certain conditions and ailments.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;pullquote&quot; data-dcnode-id=&quot;868&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;results in an herbal killing machine that killed 98% of the breast cancer cells&lt;/span&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;867&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;864&quot;&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;Herbal Supplements, Vitamins, and Minerals&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;861&quot;&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;Getting a wide range of vitamins and minerals should be easy when you’re eating lots of produce, but it’s not always that simple. Our soil is so degraded even organic produce doesn’t have the nutrition it used to have. If you cannot grow your own produce in the most optimum conditions with the best soil, we recommend a primarily food-based nutrition powder from a source you know and trust. Not “whole food sourced”, we mean actual food like rose hips, lemon peels, chlorella, etc. When these nutrition formulas are done right, the enzymes are left intact.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;860&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;855&quot;&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;Related: &lt;/span&gt;&lt;a data-dcnode-id=&quot;856&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.organiclifestylemagazine.com/chemotherapy-detox&quot;&gt;&lt;em data-dcnode-id=&quot;857&quot;&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;Chemotherapy Detox&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;852&quot;&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;One mineral deficiency can lead to other minerals being out of balance, causing an array of problems, including an inability to assimilate vitamins. In most cases, this is why taking one or two specific minerals for a long period of time is not recommended, unless under the supervision of a well-informed naturopath. Incidentally, the same is true for many vitamins. Get the bulk of your nutrition from raw food, first and foremost. Let food be your foundation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;846&quot;&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;Vitamin C is one vitamin that you can take a large amount of for a short period of time without worrying about it offsetting other nutrients, but taking large doses of vitamin C and assimilating lots of vitamin C are two different things. We recommend &lt;/span&gt;&lt;a data-dcnode-id=&quot;848&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.greenlifestylemarket.com/supplements/vitamins/vitamin-c/liposomal&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt;Liposomal vitamin C&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;. The best way for most people to take vitamin C as a daily supplement is within a good nutrition formula as previously mentioned and from a wide variety of produce such as red and yellow peppers, pineapple, citrus foods, and many others.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;

uot;&gt;skullcap&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt; are a few of the many plant-based herbal supplements that kill cancer cells. Study after study shows that many of the right plants and plant extracts have more power to kill off cancer cells than conventional treatments.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;811&quot;&gt;&lt;a data-dcnode-id=&quot;813&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.greenlifestylemarket.com/supplements/herbal/sweet-wormwood&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;Wormwood&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt; is a very powerful herb that is often used to kill parasites and Candida. Wormwood, more specifically, artemisinin, the active ingredient in sweet wormwood extract, kills cancer cells.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;808&quot;&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;Interesting Information On Wormwood&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;805&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;A new study has shown that a derivative of the wormwood plant, artemisinin, turns deadly in the presence of iron. Breast cancer cells have high levels of iron. When artemisinin senses these higher than usual levels of iron, it destroys the cancer cells with little damage to the surrounding healthy cells. This results in an herbal killing machine that killed 98% of the breast cancer cells present within 16 hours!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;802&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;Although this study is in its first phase in a lab with Petri dishes, artemisinin tablets are “widely and successfully” used to fight malaria for the same reason, the parasite responsible for malaria uptakes a large amount of iron, just like the breast cancer cells. Artemisinin zeros in on the iron and destroys the parasite.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;799&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;We don’t recommend taking iron with cancer. Iron feeds cancer, and the administration of iron in the study was carefully done by researchers in a very specific way. But wormwood is known to be one of the best herbs for killing a number of parasites, and it is anti-microbial and anti-fungal, making wormwood a great addition for people who need to heal their gut and heal from a variety of ailments.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;
