c_column-inner&quot; data-dcnode-id=&quot;3589&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3590&quot;&gt;&lt;span data-dcnode-id=&quot;3615&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;3607&quot;&gt;&lt;span data-dcnode-id=&quot;3614&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3609&quot;&gt;&lt;span data-dcnode-id=&quot;3613&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;3611&quot;&gt;&lt;span data-dcnode-id=&quot;3612&quot; instrument_node=&quot;&quot;&gt;HEPA&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;3610&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3608&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3606&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;3592&quot;&gt;&lt;span data-dcnode-id=&quot;3605&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3594&quot;&gt;&lt;span data-dcnode-id=&quot;3604&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3599&quot;&gt;&lt;span data-dcnode-id=&quot;3603&quot; instrument_node=&quot;&quot;&gt;If you have ever looked at air purification or filtering in any way, you most likely have seen the term “HEPA” (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3601&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cowaymega.com/what-is-a-hepa-filter/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3602&quot; instrument_node=&quot;&quot;&gt;High-Efficiency Particulate Air&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3600&quot; instrument_node=&quot;&quot;&gt;). It is the most common type of air filtering process, due mostly to how efficient it is with removing particles in addition to the fact that the filters themselves are easily and cost-efficiently manufactured.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3598&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3596&quot;&gt;&lt;span data-dcnode-id=&quot;3597&quot; instrument_node=&quot;&quot;&gt;What makes HEPA work so well to get the nasty stuff out of the air we breathe is the specification of the filters themselves. HEPA filters can trap particles as small as 0.3 microns at an efficiency rate of over 99%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3595&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3593&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3591&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;3559&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;3560&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;3561&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;3562&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3563&quot;&gt;&lt;span data-dcnode-id=&quot;3585&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;3577&quot;&gt;&lt;span data-dcnode-id=&quot;3584&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3579&quot;&gt;&lt;span data-dcnode-id=&quot;3583&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;3581&quot;&gt;&lt;span data-dcnode-id=&quot;3582&quot; instrument_node=&quot;&quot;&gt;Carbon&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;3580&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3578&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3576&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;3565&quot;&gt;&lt;span data-dcnode-id=&quot;3575&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3567&quot;&gt;&lt;span data-dcnode-id=&quot;3574&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3572&quot;&gt;&lt;span data-dcnode-id=&quot;3573&quot; instrument_node=&quot;&quot;&gt;Filter elements that use activated carbon are great for absorbing odors, gases, and dangerous volatile organic compounds (VOC’s) from untreated air. In its natural state, carbon already has exceptional absorption properties. By using heat or some sort of chemical treatment it can now be considered “activated”. Once activated it can absorb a greater level of contaminants.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3571&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3569&quot;&gt;&lt;span data-dcnode-id=&quot;3570&quot; instrument_node=&quot;&quot;&gt;Activated carbon elements are commonly used in air purifiers that have a multi-stage capability.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3568&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3566&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3564&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;3529&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;3530&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;3531&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;3532&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3533&quot;&gt;&lt;span data-dcnode-id=&quot;3558&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;3550&quot;&gt;&lt;span data-dcnode-id=&quot;3557&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3552&quot;&gt;&lt;span data-dcnode-id=&quot;3556&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;3554&quot;&gt;&lt;span data-dcnode-id=&quot;3555&quot; instrument_node=&quot;&quot;&gt;UV&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;3553&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3551&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3549&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;3535&quot;&gt;&lt;span data-dcnode-id=&quot;3548&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3537&quot;&gt;&lt;span data-dcnode-id=&quot;3547&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3542&quot;&gt;&lt;span data-dcnode-id=&quot;3546&quot; instrument_node=&quot;&quot;&gt;UV radiation technology for use in air purification isn’t completely uncommon, but it is not found nearly as often as other processes such as HEPA. The main reason for this is that the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3544&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.livescience.com/50326-what-is-ultraviolet-light.html&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3545&quot; instrument_node=&quot;&quot;&gt;type of UV radiation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3543&quot; instrument_node=&quot;&quot;&gt; used for the process is UV-C, which is typically considered to be the most dangerous type.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3541&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3539&quot;&gt;&lt;span data-dcnode-id=&quot;3540&quot; instrument_node=&quot;&quot;&gt;The actual process itself is very effective, though. UV-C radiation has the capability to completely destroy (at a cellular level) most airborne contaminants that are targeted to be removed by traditional air purification methods.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3538&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3536&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3534&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;3502&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;3503&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;3504&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;3505&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3506&quot;&gt;&lt;span data-dcnode-id=&quot;3528&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;3520&quot;&gt;&lt;span data-dcnode-id=&quot;3527&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3522&quot;&gt;&lt;span data-dcnode-id=&quot;3526&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;3524&quot;&gt;&lt;span data-dcnode-id=&quot;3525&quot; instrument_node=&quot;&quot;&gt;Ionic&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;3523&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3521&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3519&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;3508&quot;&gt;&lt;span data-dcnode-id=&quot;3518&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;3510&quot;&gt;&lt;span data-dcnode-id=&quot;3517&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3515&quot;&gt;&lt;span data-dcnode-id=&quot;3516&quot; instrument_node=&quot;&quot;&gt;Ionic “filters” really aren’t “filters” at all. Well, at least not in the traditional sense of air flowing through a material and particulates being caught and filtered out.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3514&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3512&quot;&gt;&lt;span data-dcnode-id=&quot;3513&quot; instrument_node=&quot;&quot;&gt;An ionic system is based on simple electrical properties. Using a set of metal plates, a negative charge is generated which creates a field that attracts airborne contaminants and they then actually stick to the plates. It is an efficient process, and a large benefit is that there are no filters to replace over time. With an ionic system, you simply remove the housing that mounts the plates and wash them off.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3511&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3509&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3507&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt; an data-dcnode-id=&quot;3487&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3485&quot;&gt;&lt;span data-dcnode-id=&quot;3486&quot; instrument_node=&quot;&quot;&gt;Sounds great, right?&amp;nbsp; The problem is that ozone itself can be just as bad – if not worse – for your health.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3484&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;3479&quot;&gt;&lt;span data-dcnode-id=&quot;3483&quot; instrument_node=&quot;&quot;&gt;According to the EPA, there are many negative effects that can result from overexposure to ozone (source: &lt;/span&gt;&lt;a data-dcnode-id=&quot;3481&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.epa.gov/indoor-air-quality-iaq/ozone-generators-are-sold-air-cleaners%23harmful-ozone&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3482&quot; instrument_node=&quot;&quot;&gt;EPA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3480&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3478&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;ul class=&quot;fa-ul&quot; data-dcnode-id=&quot;3452&quot;&gt;&lt;span data-dcnode-id=&quot;3477&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3474&quot;&gt;&lt;i class=&quot;reg fa-li fa fa-check-square-o&quot; data-dcnode-id=&quot;3476&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3475&quot; instrument_node=&quot;&quot;&gt;Decreases in lung function&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3473&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;3470&quot;&gt;&lt;i class=&quot;reg fa-li fa fa-check-square-o&quot; data-dcnode-id=&quot;3472&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3471&quot; instrument_node=&quot;&quot;&gt;Aggravation of asthma&lt;/span&gt;&lt;/li&gt;&lt; strument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;2649&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;2650&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;2651&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;2652&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2653&quot;&gt;&lt;span data-dcnode-id=&quot;2696&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;2688&quot;&gt;&lt;span data-dcnode-id=&quot;2695&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2690&quot;&gt;&lt;span data-dcnode-id=&quot;2694&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2692&quot;&gt;&lt;span data-dcnode-id=&quot;2693&quot; instrument_node=&quot;&quot;&gt;Coverage Area&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2691&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2689&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2687&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;2655&quot;&gt;&lt;span data-dcnode-id=&quot;2686&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2657&quot;&gt;&lt;span data-dcnode-id=&quot;2685&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2683&quot;&gt;&lt;span data-dcnode-id=&quot;2684&quot; instrument_node=&quot;&quot;&gt;One of the most common specifications you’ll see when looking for the best air purifiers for allergies and asthma is the coverage area. That’s simply a measure of how big of a room can effectively be purified given the capacity and capability of a particular air purifier model.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2682&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2680&quot;&gt;&lt;span data-dcnode-id=&quot;2681&quot; instrument_node=&quot;&quot;&gt;Knowing the size of the space you want to purify is pretty important as the amount of coverage area is certainly different from model to model.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2679&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2677&quot;&gt;&lt;span data-dcnode-id=&quot;2678&quot; instrument_node=&quot;&quot;&gt;So how can you figure out how much coverage area you need to have?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2676&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2674&quot;&gt;&lt;span data-dcnode-id=&quot;2675&quot; instrument_node=&quot;&quot;&gt;It can be calculated using the simple math formula for an area:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2673&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2671&quot;&gt;&lt;span data-dcnode-id=&quot;2672&quot; instrument_node=&quot;&quot;&gt;L x W = A&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2670&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2668&quot;&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;Now, don’t freak out and think you have to go back to algebra class. Trust me – it wasn’t my favorite either!&amp;nbsp; It’s actually pretty easy to do!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2667&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2665&quot;&gt;&lt;span data-dcnode-id=&quot;2666&quot; instrument_node=&quot;&quot;&gt;For a typical rectangular room, take a tape measure and find out the length of the room is. Then measure the width. Multiply the length (L) times the width (W) and you’ll get the area.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2664&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2662&quot;&gt;&lt;span data-dcnode-id=&quot;2663&quot; instrument_node=&quot;&quot;&gt;For example, let’s say that your living room is 15’ long and 10’ wide. 15’ x 10’ = 150 square feet. All you have to do is target units that exceed that size and you’ll be just fine.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2661&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2659&quot;&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;Be careful to not over specify, though. You don’t need a unit that can purify 1,000 square feet if you only need 150. That will normally lead to you paying more for a unit that is too big for your use.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2658&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2656&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2654&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;2613&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;2614&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;2615&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;2616&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2617&quot;&gt;&lt;span data-dcnode-id=&quot;2648&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;2640&quot;&gt;&lt;span data-dcnode-id=&quot;2647&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper& ionerlab.com/best-air-purifier-for-smoke/&quot;&gt;&lt;span data-dcnode-id=&quot;2629&quot; instrument_node=&quot;&quot;&gt;smell of cigarettes or cigars in the air&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2627&quot; instrument_node=&quot;&quot;&gt; that you may want to get rid of.&amp;nbsp; In that case, HEPA may not be the best solution.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2625&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2623&quot;&gt;&lt;span data-dcnode-id=&quot;2624&quot; instrument_node=&quot;&quot;&gt;Each type of filtration has pros and cons. Take the time to do your homework so that you don’t make a mistake and end up buying a unit that won’t best fit your needs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2622&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2618&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;2580&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;2581&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;2582&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;2583&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2584&quot;&gt;&lt;span data-dcnode-id=&quot;2612&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;2604&quot;&gt;&lt;span data-dcnode-id=&quot;2611&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2606&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2608&quot;&gt;&l quot;&quot;&gt;an ionic air purifier&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2591&quot; instrument_node=&quot;&quot;&gt;, there are no “filters” to be replaced. The plates that collect the contaminants will need to be cleaned periodically, again at an interval suggested by the manufacturer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2589&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2587&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;2550&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;2551&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;2552&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;2553&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2554&quot;&gt;&lt;span data-dcnode-id=&quot;2579&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;2571&quot;&gt;&lt;span data-dcnode-id=&quot;2578&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2573&quot;&gt;&lt;span data-dcnode-id=&quot;2577&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2575&quot;&gt;&lt;span data-dcnode-id=&quot;2576&quot; instrument_node=&quot;&quot;&gt;Particle Removal Capacity&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2574&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2572&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2570&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;2556&quot;&gt;&lt;span data-dcnode-id=&quot;2569&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2558&quot;&gt;&lt;span data-dcnode-id=&quot;2568&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2566&quot;&gt;&lt;span data-dcnode-id=&quot;2567&quot; instrument_node=&quot;&quot;&gt;No two filtration types are the same as far as how effective they are at removing particles. HEPA is the most common, and with good reason, due to the high-efficiency standards, they are manufactured to.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2565&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2563&quot;&gt;&lt;span data-dcnode-id=&quot;2564&quot; instrument_node=&quot;&quot;&gt;There are also filters that are rated for Fine Particulate Matter (PM 2.5). PM 2.5 is a specification similar to HEPA but it relates to particles that are only 2.5 microns in diameter.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2562&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2560&quot;&gt;&lt;span data-dcnode-id=&quot;2561&quot; instrument_node=&quot;&quot;&gt;Ionic technology, by its nature as an electronic process, isn’t limited to particular particle size. This is different from a mechanical filter element such as HEPA, but we have found that ionic air purification may not be as effective.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2559&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2557&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2555&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;2508&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;2509&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;2510&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;2511&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2512&quot;&gt;&lt;span data-dcnode-id=&quot;2549&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;2541&quot;&gt;&lt;span data-dcnode-id=&quot;2548&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2543&quot;&gt;&lt;span data-dcnode-id=&quot;2547&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2545&quot;&gt;&lt;span data-dcnode-id=&quot;2546&quot; instrument_node=&quot;&quot;&gt;CADR&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2544&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2542&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2540&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;2523&quot;&gt;&lt;span data-dcnode-id=&quot;2539&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;2525&quot;&gt;&lt;span data-dcnode-id=&quot;2538&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2533&quot;&gt;&lt;span data-dcnode-id=&quot;2537&quot; instrument_node=&quot;&quot;&gt;A good measure of an air purifier’s capacity is the units CADR rating. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2535&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//airconditionerlab.com/cadr-rating/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2536&quot; instrument_node=&quot;&quot;&gt;Standing for Clean Air Delivery Rate, CADR&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2534&quot; instrument_node=&quot;&quot;&gt; is a numerical value that says how many cubic feet per minute that the unit can effectively purify.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2532&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2530&quot;&gt;&lt;span data-dcnode-id=&quot;2531&quot; instrument_node=&quot;&quot;&gt;Since different hazards related to different types of particulates, there can be several CADR specifications for the same unit. You may find ratings for smoke, pollen, and dust, with smoke particles being the smallest and dust being the largest.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2529&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2527&quot;&gt;&lt;span data-dcnode-id=&quot;2528&quot; instrument_node=&quot;&quot;&gt;High CADR ratings for pollen and dust may be beneficial for those that suffer from allergies or asthma.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2526&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2524&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2522&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_single_image wpb_content_element vc_align_center&quot; data-dcnode-id=&quot;2514&quot;&gt;&lt;span data-dcnode-id=&quot;2521&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;figure class=&quot;wpb_wrapper vc_figure&quot; data-dcnode-id=&quot;2516&quot;&gt;&lt;span data-dcnode-id=&quot;2520&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;vc_single_image-wrapper vc_box_border_grey&quot; data-dcnode-id=&quot;2518&quot;&gt;&lt;img alt=&quot;clean air delivery rate&quot; class=&quot;vc_single_image-img attachment-full nitro-lazy&quot; data-dcnode-id=&quot;2519&quot; height=&quot;206&quot; id=&quot;Mjc1MTo0ODA=-1&quot; nitro-lazy-e  a little bit of white background noise, similar to a fan that is left on.&amp;nbsp; They aren’t overwhelming, though.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;2464&quot;&gt;&lt;span data-dcnode-id=&quot;2465&quot; instrument_node=&quot;&quot;&gt;Noise levels are specified by decibel (dB) ratings. The table below gives a good general example of the dB levels and the sounds that they are equivalent to. You may find that most air purifiers are in the low-to-mid 50’s range.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2463&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2462&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2461&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2460&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2457&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2454&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2452&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2450&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2449&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2448&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2445&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2442&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2440&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2439&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;2433&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-d t;&gt;top air purifiers for mold and mildew&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;751&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;752&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;753&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;754&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;755&quot;&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;769&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;771&quot;&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h5 data-dcnode-id=&quot;773&quot;&gt;&lt;strong data-dcnode-id=&quot;774&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;Pollen&lt;/span&gt;&lt;/strong&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;757&quot;&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;759&quot;&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;Pollen is a fine powder (typically yellow in color) that is produced by all kinds of plants and flowers, and it actually is quite beneficial for natural fertilization.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;It can be so fine that the wind can blow and keep it suspended, causing all kinds of problems if you happen to be allergic to it. Many allergy sufferers have to limit their outdoor exposure when allergy season starts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;723&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;724&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;725&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;726&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;727&quot;&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;741&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h5 data-dcnode-id=&quot;745&quot;&gt;&lt;strong data-dcnode-id=&quot;746&quot;&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;Perfumes&lt;/span&gt;&lt;/strong&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;729&quot;&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;731&quot;&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;736&quot;&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;Those expensive perfumes and colognes people wear may smell great, but they also can trigger allergic reactions in a growing amount of people.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;735&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;733&quot;&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;Fragrance allergens are typically related to the VOC’s that are used in perfume and cologne production. Some can be so allergic that the wrong smell can trigger allergic asthma as well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;732&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;661&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;662&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;663&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;664&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;665&quot;&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;714&quot;&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;716&quot;&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h4 data-dcnode-id=&quot;718&quot;&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;Stages of Filtration Explained&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;667&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;669&quot;&gt;&lt;span data-dcnode-id=&quot;711&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;709&quot;&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;Most units on the market today do not use a single filtration type. Different technologies have distinct benefits over each other, and manufacturers recognize that. In order to design the best all-around air purifiers, it is common to combine the most effective filtration types into a single unit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;706&quot;&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;Three and four stage configurations are the most common.&amp;nbsp; It may be fair to say that the first three stages are almost identical from model to model.&amp;nbsp; Some manufacturers add a different technology for the fourth stage depending on the design intent of the purifier (smoke, allergies and asthma, etc.)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;703&quot;&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;With a three-stage air purifier the first stage is typically a pre-filter.&amp;nbsp; Here is where the largest (and therefore easiest) particles are filtered out, normally by some sort of mechanical filter medium. This helps to ensure that the more efficient processes (such as a HEPA filter) can concentrate on removing the smaller particles that it was intended for.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;700&quot;&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;The second and third stages are usually made up of a carbon element and a HEPA filter (in different order depending on the model).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;699&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;697&quot;&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;Activated carbon has beneficial properties that other technologies may not do very well. It is the filtration type of choice for absorbing harmful VOC’s and gases out of the air, in addition to aiding with odor removal.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;694&quot;&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;HEPA is designed to trap extremely fine particles. The filter medium resembles paper, but it really is a set of small and dense glass fibers.&amp;nbsp; It is very efficient, and that efficiency can be greatly reduced if the surface area of the filter is being used for the larger particles that are taken out in the pre-filter stage.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;689&quot;&gt;&lt;a data-dcnode-id=&quot;691&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.explainthatstuff.com/hepafilters.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;HEPA filters work&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt; by capturing those microscopic particles in one of three manners: impact, interception, and diffusion.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;ul class=&quot;fa-ul&quot; data-dcnode-id=&quot;674&quot;&gt;&lt;span data-dcnode-id=&quot;687&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;684&quot;&gt;&lt;i class=&quot;reg fa-li fa fa-check-square-o&quot; data-dcnode-id=&quot;686&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;Impact is where some particles crash head-on into a fiber and get absorbed.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;680&quot;&gt;&lt;i class=&quot;reg fa-li fa fa-check-square-o&quot; data-dcnode-id=&quot;682&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;Interception is when a particle gets close to a fiber and gets caught against it.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;676&quot;&gt;&lt;i class=&quot;reg fa-li fa fa-check-square-o&quot; data-dcnode-id=&quot;678&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;Diffusion is when particles crash into each other and get forced into the fibers.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;671&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;The fourth stage (when available) is typically a process such as ionization (to catch any particles that may have made it through the HEPA).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;container&quot; data-dcnode-id=&quot;514&quot;&gt;&lt;div class=&quot;vc_row wpb_row vc_row-fluid&quot; data-dcnode-id=&quot;515&quot;&gt;&lt;div class=&quot;wpb_column vc_column_container vc_col-sm-12&quot; data-dcnode-id=&quot;516&quot;&gt;&lt;div class=&quot;vc_column-inner&quot; data-dcnode-id=&quot;517&quot;&gt;&lt;div class=&quot;wpb_wrapper&quot; data-dcnode-id=&quot;518&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_text_column wpb_content_element&quot; data-dcnode-id=&quot;651&quot;&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;wpb_wrapper
