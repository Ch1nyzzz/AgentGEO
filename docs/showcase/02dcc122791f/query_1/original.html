    if (sidebarForm &amp;&amp; sidebarForm.className.includes(formId)) {

    // Default to main content

&lt;meta property=&quot;og:description&quot; content=&quot;Do Air Purifiers Help With Bad Smells?
When you walk through your front door, does your home have a bad smell? It’s an uncomfortable situation, especially if you can’t identify the source. We as humans are uniquely sensitive to smells. Research indicates that humans can identify more than one trillion smells, including many that other mammals cannot. With such a sensitive instrument planted in the middle of your face, you’re bound to detect some unpleasant odors no matter where you go.
When dealing with lingering odors, it’s important to remember that humans’ ability to smell isn’t just a superfluous sensory attribute; it’s an essential survival tool. Like animals, humans make crucial decisions about a particular food or substance’s safety based on smell.
You'll also want to determine bad smells that indicate danger: an alarming burnt smell, a burning plastic smell or even a sour smell can all indicate your home needs immediate attention to prevent disaster.
But if your home has lingering smells that aren't alarming, it could mean several things. If your home smells bad constantly, your nose could be alerting you to the presence of toxins, moisture build up, pet dander or other bacteria. Luckily, there are several ways to address bad smells and their sources, such as running the best air purifiers for odors.
Keep reading to learn what causes bad smells, as well as how to address them and freshen your home’s air.  
Ready to kill unpleasant odors in your home? Air Oasis is here to help. Visit us online to find the best air filter and air purifier for odors, bacteria, viruses, VOCs (volatile organic compounds), allergens and more.
What Causes Bad Smells in My Home?
Sometimes it’s easy to identify the source of a bad smell. For example, a quick inspection may reveal that your cat’s litter box is overflowing, or your teenager left a half-eaten pizza on their bedroom floor. Other times, identifying the root cause of a particular odor isn’t so easy. Musty, chemical and rotting odors are some of the most common, not to mention that notorious wet dog smell.
Poor Ventilation
If you keep your home's windows and doors sealed tightly, bad smells could be coming from improper ventilation. Through every season of the year, ample ventilation helps your home stay fresh and free of bad odor. As soon as you start to notice a weird smell or even that &quot;home smell,&quot; it's time to open some windows and let in some airflow.
Old or Faulty Appliances
Some home appliances can cause unfavorable odors, especially when routine care and maintenance are neglected. Getting rid of spoiled food in the refrigerator and cleaning your dishwasher when necessary are two important ways to prevent bad kitchen smells. If you notice a specific appliance smell, such as gas coming from your fireplace or a chemical smell coming from your HVAC, call your service repairman to address the issue right away.
Lack of Regular Cleaning
Cleaning your home regularly isn't just about making sure it looks welcoming. Cleanliness also helps maintain the general health and hygiene of the entire home. This includes smells. Often, these problems can be eliminated thanks to some regular cleaning in your home:

A dusty odor
Stale home smell
The smell of trash or rotten food
The smell of dirty dishes or dirty sponge
Unclean bathroom smells

A little bit of cleaning every day can help with odor removal and prevent bad odors from building up over time.
What's That Bad Smell? Common Odors to Identify in Your Home
Several unpleasant odors are common in even the most modern homes today. Knowing which type of odor you're smelling can help you determine the source and find a solution. Here are the top odors you might be dealing with.
Musty Odors
If your home smells like a musty attic, dank locker room or a dirty tub, you may be dealing with a mold problem. Although mold spores can hide out anywhere, they commonly colonize in places like basements, closets and bathrooms that have high levels of moisture and relatively little ventilation. They can also accumulate and grow in appliances that use water like washing machines, or in drains and water fixtures. 
As mold grows and spreads, it off-gasses microbial volatile organic compounds (mVOCs), which cause musty odors. Breathing or touching mold can cause allergic reactions like sneezing, a runny nose, itchy skin and throat, watery eyes and even asthma attacks in some people. If your home consistently smells musty, you should check for mold growth. 
Chemical Smells
Does your home have a distinct acrid, chemical or chlorine-like smell? You could be dealing with volatile organic compounds (VOCs) emitted from a number of sources. VOCs are chemical contaminants commonly found in building materials, paints, adhesives, cleaning agents, carpeting, personal hygiene products, air fresheners and more. 
VOCs pose a number of health risks, and prolonged exposure can cause symptoms like nose and throat irritation, shortness of breath, dizziness, headaches and skin issues. Left unaddressed, high concentrations of VOCs can cause damage to the lungs, liver, kidneys and central nervous system and may even cause cancer. 
Rotting Odors
When food decomposes, it releases sulfur and nitrogen-containing compounds that smell bad and indicate rot. With both of these types of compounds, even a little can stink up your whole house. If the source isn’t your garbage can, you should check places where food particles could be trapped, such as the kitchen sink, dishwasher and refrigerator. In addition to stinking up the house, bacteria from rotting food can cause illness when ingested, so it’s important to find the source. 
Old Air Purifier Smells
Air purifiers that are old or that contain dirty filters can sometimes emit a bad smell. These old air purifier smells can be resolved by either cleaning the filter directly or switching the activated carbon filters, depending on the type. Different air purifiers use different methods of filtration.
It may be worth getting a new air purifier altogether -- especially an air purifier that has a HEPA filter. HEPA (high-efficiency particulate absorbing) filters are more effective when addressing odors in the home. Some air purifiers use both HEPA filters and carbon filters for dual action to eliminate particles that may cause a bad smell.
Learn more about air purifiers that utilize HEPA filters and carbon filters to help your home smell like new: Browse the options from Air Oasis.
How to Get Rid of Bad Odors Indoors
The method for removing a bad odor in your home will depend on its origin. After you’ve identified and tried to eliminate the source, you can begin to remediate the odor with proper cleaning, ventilation and air purification.  
Cleaning Tips
When it’s time to clean your home to remove the causes of bad odors, you’ll want to choose your cleaning products wisely. If you purchase a chemical cleaning solution, you’ll only increase the VOCs in the air. That’s why it’s essential to use natural cleaning materials, as well as adopt cleaning practices that mitigate the risk of future odors. 
Best Cleaning Materials to Help With Odors
You can use household products like vinegar, lemon, baking soda and essential oils to make a fresh-smelling, natural cleaner that works for just about anything. To make your own all-purpose cleaning solution, mix 1⁄2 cup of white vinegar, two tablespoons of baking soda, tea tree and eucalyptus essential oils. Add this mixture to a spray bottle and fill the rest of the bottle with water. 
How Often Should You Wash Curtains and Rugs?
Curtains collect allergens like dust over time and can cause unpleasant home odors; it’s a good idea to wash them every three to six months. Carpets collect lots of grime and dirt just by being on the floor. Vacuum carpets frequently to remove allergens, especially if you have pets, and wash them at least once a year. 
Ventilation
When an indoor space isn’t properly ventilated, contaminants like allergens, VOCs and odors become trapped and accumulate. As a result, indoor air can be more polluted than outdoor air, even in large, industrial cities. Lack of airflow increases indoor pollution levels and encourages mold and bacteria growth. 
High indoor humidity levels indicated by moist, dank air can mean your home isn’t getting proper ventilation. Many HVAC systems control indoor humidity levels and ventilate air, but if your air ducts or filters are dirty, running your HVAC system could exacerbate the problem.
The most immediate thing you can do to improve indoor air quality is open the windows and doors so that fresh air can circulate. Once you shut them, make sure to run a high-quality air purifier to clean whatever contaminants remain in the air. Even better, having air purifiers in every room will help maintain your home's natural smell and preferred ambiance.
Making a Room Smell Fresh
After you’ve removed the source of the odor, cleaned and ventilated, you may want to add something to your home to help it smell fresh. However, many store-bought products claiming to freshen your home’s air actually make indoor air quality worse.
Air freshener sprays can release ozone into your home, and plug-in air fresheners and heavily scented candles release other VOCs. Try one of these alternatives to give any room in your home a fresh smell: 

Reed diffuser with your favorite essential oils
Simmer pots with oranges and aromatics
Flowers and houseplants
High-quality air purifiers

Air Purifiers: Bad Smells Be Gone
One of the most effective ways to keep your home smelling fresh is running a high-quality air purifier. Essential oils, diffusers and houseplants can help cover up bad smells, but air purifiers can actually remove many of the contaminants that cause them. 
Eliminate Bad Odors: Indoor Air Purifier Technology
Air purifiers can remove odor-causing contaminants by a variety of methods. At Air Oasis, we know that the most effective air purifiers employ more than one air cleaning strategy. That’s why each of our air purifiers leverages a combination of all of the following technologies: 


Carbon filtration, which traps odors and contaminants through absorption


HEPA filtration, which traps more than 99% of particles in a fine mesh filter


AHPCO® (silver ion), a type of ionization that creates long-lasting ions that seek out and inactivate contaminants


Bi-Polar®, an ionization technology that emits positively and negatively charged ions that attach to contaminants and cause them to fall from the air


UV light, which inactivates bacteria and viruses and can sanitize air and surfaces

        &lt;h1 class=&quot;main-article__heading&quot;&gt;Do Air Purifiers Help With Bad Smells?&lt;/h1&gt;

        &lt;div class=&quot;main-article__info&quot;&gt;
            &lt;div class=&quot;main-article__author&quot;&gt;Air Oasis&lt;/div&gt;
            &lt;span class=&quot;main-article__line&quot;&gt;|&lt;/span&gt;

        &lt;/div&gt;


 
      	&lt;img src=&quot;//www.airoasis.com/cdn/shop/articles/Do-Air-Purifiers-Help-With-Bad-Smells-featured-image.jpg?v=1638316303&amp;amp;width=1000&quot; alt=&quot;Do Air Purifiers Help With Bad Smells?&quot; srcset=&quot;//www.airoasis.com/cdn/shop/articles/Do-Air-Purifiers-Help-With-Bad-Smells-featured-image.jpg?v=1638316303&amp;amp;width=352 352w, //www.airoasis.com/cdn/shop/articles/Do-Air-Purifiers-Help-With-Bad-Smells-featured-image.jpg?v=1638316303&amp;amp;width=832 832w, //www.airoasis.com/cdn/shop/articles/Do-Air-Purifiers-Help-With-Bad-Smells-featured-image.jpg?v=1638316303&amp;amp;width=1000 1000w&quot; width=&quot;1000&quot; height=&quot;525&quot; loading=&quot;eager&quot; class=&quot;main-article__image&quot;&gt;

&lt;!--         &lt;img src=&quot;&quot; alt=&quot;Do Air Purifiers Help With Bad Smells?&quot; width=&quot;&quot; height=&quot;&quot;  class=&quot;main-article__image&quot;/&gt; --&gt;
        &lt;div class=&quot;main-article__article-content wysiwyg&quot;&gt;&lt;h1&gt;&lt;b&gt;Do Air Purifiers Help With Bad Smells?&lt;/b&gt;&lt;/h1&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;When you walk through your front door, does your home have a bad smell? It’s an uncomfortable situation, especially if you can’t identify the source. We as humans are uniquely sensitive to smells. Research indicates that humans can identify more than&lt;/span&gt;&lt;a href=&quot;https://pubmed.ncbi.nlm.nih.gov/24653035/&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;one trillion smells&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;, including many that other mammals cannot. With such a sensitive instrument planted in the middle of your face, you’re bound to detect some unpleasant odors no matter where you go.&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;When dealing with lingering odors, it’s important to remember that humans’ ability to smell isn’t just a superfluous sensory attribute; it’s an&lt;/span&gt;&lt;a href=&quot;https://www.sciencedaily.com/releases/2015/07/150702112110.htm&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;essential survival tool&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;. Like animals, humans make crucial decisions about a particular food or substance’s safety based on smell.&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;You'll also want to determine bad smells that indicate danger: an alarming burnt smell, a burning plastic smell or even a sour smell can all indicate your home needs immediate attention to prevent disaster.&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;But if your home has lingering smells that aren't alarming, it could mean several things. If your home smells bad constantly, your nose could be alerting you to the presence of toxins, moisture build up, pet dander or other bacteria. Luckily, there are several ways to address bad smells and their sources, such as running the&lt;/span&gt;&lt;a href=&quot;https://www.airoasis.com/shop-by-concern-odors&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;best air purifiers for odors&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Keep reading to learn what causes bad smells, as well as how to address them and freshen your home’s air.  &lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;i&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Ready to kill unpleasant odors in your home?&lt;/span&gt;&lt;/i&gt;&lt;a href=&quot;https://www.airoasis.com/&quot;&gt; &lt;i&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Air Oasis&lt;/span&gt;&lt;/i&gt;&lt;/a&gt;&lt;i&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; is here to help. Visit us online to find the best air filter and air purifier for odors, bacteria, viruses, VOCs (volatile organic compounds), allergens and more.&lt;/span&gt;&lt;/i&gt;&lt;/p&gt;
&lt;h2&gt;&lt;b&gt;What Causes Bad Smells in My Home?&lt;/b&gt;&lt;/h2&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Sometimes it’s easy to identify the source of a bad smell. For example, a quick inspection may reveal that your cat’s litter box is overflowing, or your teenager left a half-eaten pizza on their bedroom floor. Other times, identifying the root cause of a particular odor isn’t so easy. Musty, chemical and rotting odors are some of the most common, not to mention that notorious wet dog smell.&lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Poor Ventilation&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;If you keep your home's windows and doors sealed tightly, bad smells could be coming from improper ventilation. Through every season of the year, ample ventilation helps your home stay fresh and free of bad odor. As soon as you start to notice a weird smell or even that &quot;home smell,&quot; it's time to open some windows and let in some airflow.&lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Old or Faulty Appliances&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Some home appliances can cause unfavorable odors, especially when routine care and maintenance are neglected. Getting rid of spoiled food in the refrigerator and cleaning your dishwasher when necessary are two important ways to prevent bad kitchen smells. If you notice a specific appliance smell, such as gas coming from your fireplace or a chemical smell coming from your HVAC, call your service repairman to address the issue right away.&lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Lack of Regular Cleaning&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Cleaning your home regularly isn't just about making sure it looks welcoming. Cleanliness also helps maintain the general health and hygiene of the entire home. This includes smells. Often, these problems can be eliminated thanks to some regular cleaning in your home:&lt;/span&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;A dusty odor&lt;/span&gt;&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Stale home smell&lt;/span&gt;&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;The smell of trash or rotten food&lt;/span&gt;&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;The smell of dirty dishes or dirty sponge&lt;/span&gt;&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Unclean bathroom smells&lt;/span&gt;&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;A little bit of cleaning every day can help with odor removal and prevent bad odors from building up over time.&lt;/span&gt;&lt;/p&gt;
&lt;h2&gt;&lt;b&gt;What's That Bad Smell? Common Odors to Identify in Your Home&lt;/b&gt;&lt;/h2&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Several unpleasant odors are common in even the most modern homes today. Knowing which type of odor you're smelling can help you determine the source and find a solution. Here are the top odors you might be dealing with.&lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Musty Odors&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;If your home smells like a musty attic, dank locker room or a dirty tub, you may be dealing with a mold problem. Although mold spores can hide out anywhere, they commonly colonize in places like basements, closets and bathrooms that have high levels of moisture and relatively little ventilation. They can also accumulate and grow in appliances that use water like washing machines, or in drains and water fixtures. &lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;As mold grows and spreads, it off-gasses&lt;/span&gt;&lt;a href=&quot;https://www.epa.gov/mold/what-does-mold-smell&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;microbial volatile organic compounds&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; (mVOCs), which cause musty odors. Breathing or touching mold can cause allergic reactions like sneezing, a runny nose, itchy skin and throat, watery eyes and even&lt;/span&gt;&lt;a href=&quot;https://www.epa.gov/mold/mold-and-health&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;asthma attacks&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; in some people. If your home consistently smells musty, you should check for mold growth. &lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Chemical Smells&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Does your home have a distinct acrid, chemical or chlorine-like smell? You could be dealing with volatile organic compounds (VOCs) emitted from a number of sources. VOCs are&lt;/span&gt;&lt;a href=&quot;https://www.cdc.gov/niosh/topics/indoorenv/chemicalsodors.html&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;chemical contaminants&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; commonly found in building materials, paints, adhesives, cleaning agents, carpeting, personal hygiene products, air fresheners and more. &lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;VOCs pose a number of health risks, and prolonged exposure can cause symptoms like nose and throat irritation, shortness of breath, dizziness, headaches and skin issues. Left unaddressed, high concentrations of VOCs can cause damage to the lungs, liver, kidneys and central nervous system and&lt;/span&gt;&lt;a href=&quot;https://www.healthlinkbc.ca/healthlinkbc-files/air-quality-VOCs&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;may even cause cancer&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Rotting Odors&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;When food decomposes, it releases sulfur and nitrogen-containing compounds that smell bad and indicate rot. With both of these types of compounds, even a little can stink up your whole house. If the source isn’t your garbage can, you should check places where food particles could be trapped, such as the kitchen sink, dishwasher and refrigerator. In addition to stinking up the house,&lt;/span&gt;&lt;a href=&quot;https://www.foodsafety.gov/food-poisoning/bacteria-and-viruses&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;bacteria from rotting food&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; can cause illness when ingested, so it’s important to find the source. &lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Old Air Purifier Smells&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Air purifiers that are old or that contain dirty filters can sometimes emit a bad smell. These old air purifier smells can be resolved by either cleaning the filter directly or switching the activated carbon filters, depending on the type. Different air purifiers use different methods of filtration.&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;It may be worth getting a new air purifier altogether -- especially an air purifier that has a HEPA filter. HEPA (high-efficiency particulate absorbing) filters are more effective when addressing odors in the home. Some air purifiers use both HEPA filters and carbon filters for dual action to&lt;/span&gt;&lt;a href=&quot;https://www.airoasis.com/pages/shop-by-technology-hepa-filtration&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;eliminate particles&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; that may cause a bad smell.&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;i&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Learn more about air purifiers that utilize HEPA filters and carbon filters to help your home smell like new:&lt;/span&gt;&lt;/i&gt;&lt;a href=&quot;https://www.airoasis.com/collections/air-purifiers-1&quot;&gt; &lt;i&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Browse the options from Air Oasis.&lt;/span&gt;&lt;/i&gt;&lt;/a&gt;&lt;/p&gt;
&lt;h2&gt;&lt;b&gt;How to Get Rid of Bad Odors Indoors&lt;/b&gt;&lt;/h2&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;The method for removing a bad odor in your home will depend on its origin. After you’ve identified and tried to eliminate the source, you can begin to remediate the odor with proper cleaning, ventilation and air purification.  &lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Cleaning Tips&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;When it’s time to clean your home to remove the causes of bad odors, you’ll want to choose your cleaning products wisely. If you purchase a chemical cleaning solution, you’ll only&lt;/span&gt;&lt;a href=&quot;https://www.cdc.gov/nceh/publications/books/housing/cha05.htm&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;increase the VOCs&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; in the air. That’s why it’s essential to use natural cleaning materials, as well as adopt cleaning practices that mitigate the risk of future odors. &lt;/span&gt;&lt;/p&gt;
&lt;h4&gt;&lt;b&gt;Best Cleaning Materials to Help With Odors&lt;/b&gt;&lt;/h4&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;You can use household products like vinegar, lemon, baking soda and essential oils to make a fresh-smelling, natural cleaner that works for just about anything. To make your own all-purpose cleaning solution, mix 1⁄2 cup of white vinegar, two tablespoons of baking soda, tea tree and eucalyptus essential oils. Add this mixture to a spray bottle and fill the rest of the bottle with water. &lt;/span&gt;&lt;/p&gt;
&lt;h4&gt;&lt;b&gt;How Often Should You Wash Curtains and Rugs?&lt;/b&gt;&lt;/h4&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Curtains collect allergens like dust over time and can cause unpleasant home odors; it’s a good idea to wash them every three to six months. Carpets collect lots of grime and dirt just by being on the floor. Vacuum carpets frequently to remove allergens, especially if you have pets, and wash them at least once a year. &lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Ventilation&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;When an indoor space isn’t properly ventilated, contaminants like allergens, VOCs and odors become trapped and accumulate. As a result, indoor air can be&lt;/span&gt;&lt;a href=&quot;https://www.epa.gov/indoor-air-quality-iaq/inside-story-guide-indoor-air-quality&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;more polluted&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; than outdoor air, even in large, industrial cities. Lack of airflow increases indoor pollution levels and encourages mold and bacteria growth. &lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;High indoor humidity levels indicated by moist, dank air can mean your home isn’t getting proper ventilation. Many HVAC systems control indoor humidity levels and ventilate air, but if your air ducts or filters are dirty, running your HVAC system could exacerbate the problem.&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;The most immediate thing you can do to improve indoor air quality is open the windows and doors so that fresh air can circulate. Once you shut them, make sure to run a high-quality air purifier to clean whatever contaminants remain in the air. Even better, having air purifiers in every room will help maintain your home's natural smell and preferred ambiance.&lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Making a Room Smell Fresh&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;After you’ve removed the source of the odor, cleaned and ventilated, you may want to add something to your home to help it smell fresh. However, many store-bought products claiming to freshen your home’s air actually make indoor air quality worse.&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Air freshener sprays can release ozone into your home, and plug-in air fresheners and&lt;/span&gt;&lt;a href=&quot;https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3018511/&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;heavily scented candles&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; release other VOCs. Try one of these alternatives to give any room in your home a fresh smell: &lt;/span&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Reed diffuser with your favorite essential oils&lt;/span&gt;&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Simmer pots with oranges and aromatics&lt;/span&gt;&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Flowers and houseplants&lt;/span&gt;&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;High-quality air purifiers&lt;/span&gt;&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Want to know the best air purifiers to keep your home smelling fresh? First let's look at why they work.&lt;/span&gt;&lt;/p&gt;
&lt;h2&gt;&lt;b&gt;Air Purifiers: Bad Smells Be Gone&lt;/b&gt;&lt;/h2&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;One of the most effective ways to keep your home smelling fresh is running a high-quality air purifier. Essential oils, diffusers and houseplants can help cover up bad smells, but air purifiers can actually remove many of the contaminants that cause them. &lt;/span&gt;&lt;/p&gt;
&lt;h3&gt;&lt;b&gt;Eliminate Bad Odors: Indoor Air Purifier Technology&lt;/b&gt;&lt;/h3&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Air purifiers can remove odor-causing contaminants by a variety of methods. At Air Oasis, we know that the most&lt;/span&gt;&lt;a href=&quot;https://www.airoasis.com/science&quot;&gt; &lt;span style=&quot;font-weight: 400;&quot;&gt;effective air purifiers&lt;/span&gt;&lt;/a&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; employ more than one air cleaning strategy. That’s why each of our air purifiers leverages a combination of all of the following technologies: &lt;/span&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;
&lt;b&gt;Carbon filtration&lt;/b&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;, which traps odors and contaminants through absorption&lt;/span&gt;
&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;
&lt;b&gt;HEPA filtration,&lt;/b&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt; which traps more than 99% of particles in a fine mesh filter&lt;/span&gt;
&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;
&lt;b&gt;AHPCO&lt;/b&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;® (silver ion), a type of ionization that creates long-lasting ions that seek out and inactivate contaminants&lt;/span&gt;
&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;
&lt;b&gt;Bi-Polar&lt;/b&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;®, an ionization technology that emits positively and negatively charged ions that attach to contaminants and cause them to fall from the air&lt;/span&gt;
&lt;/li&gt;
&lt;li style=&quot;font-weight: 400;&quot;&gt;
&lt;b&gt;UV light&lt;/b&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;, which inactivates bacteria and viruses and can sanitize air and surfaces&lt;/span&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2&gt;&lt;b&gt;Best Air Purifiers to Help With Smells&lt;/b&gt;&lt;/h2&gt;
&lt;p&gt;&lt;span style=&quot;font-weight: 400;&quot;&gt;Humans’ keen sense of smell is a mysterious and powerful ability. Smells can trigger memories, cause the mouth to salivate and even repel people from toxic substances. However, you might wish you didn’t have a sense of smell if your house is filled with persistent odors.&lt;/span&gt;&lt;/p&gt;

  function getScrollPercentage() {

(function() {
  // Initialize dataLayer if it doesn't exist
  window.dataLayer = window.dataLayer || [];
  
  // Get page information
  const pagePath = window.location.pathname;
  const pageTitle = document.title;
  
  // Function to send newsletter signup event
  function sendNewsletterSignupEvent(formId, formName, formLocation) {
    // Push to dataLayer
    window.dataLayer.push({
      'event': 'newsletter_signup',
      'form_id': formId,
      'form_name': formName,
      'form_location': formLocation,
      'page_path': pagePath,
      'page_title': pageTitle
    });
    
    // Also log for debugging (remove in production)
    console.log('Newsletter signup tracked:', {
      form_id: formId,
      form_name: formName,
      form_location: formLocation,
      page_path: pagePath,
      page_title: pageTitle
    });
  }
  
  // Track Klaviyo form submissions
  function trackKlaviyoForms() {
    // Look for Klaviyo forms
    const klaviyoForms = document.querySelectorAll('[class*=&quot;klaviyo-form&quot;]');
    
    klaviyoForms.forEach((form, index) =&gt; {
      // Get form location based on parent elements
      let formLocation = 'unknown';
      let formName = 'Klaviyo Newsletter';
      
      // Determine location based on parent sections
      if (form.closest('.footer')) {
        formLocation = 'footer';
        formName = 'Footer Newsletter';
      } else if (form.closest('.newsletter-footer')) {
        formLocation = 'footer';
        formName = 'Newsletter Footer';
      } else if (form.closest('.newsletter-2')) {
        formLocation = 'content';
        formName = 'Newsletter Section';
      } else if (form.closest('.announcement-bar')) {
        formLocation = 'popup';
        formName = 'Announcement Bar Newsletter';
      }
      
      // Get form ID or generate one
      const formId = form.id || form.className || `klaviyo-form-${index}`;
      
      // Listen for Klaviyo form submissions
      // Klaviyo forms typically trigger events when submitted
      const observer = new MutationObserver((mutations) =&gt; {
        mutations.forEach((mutation) =&gt; {
          if (mutation.type === 'childList') {
            // Check if form shows success state
            const successElements = form.querySelectorAll('[class*=&quot;success&quot;], [class*=&quot;thank&quot;], [class*=&quot;submitted&quot;]');
            if (successElements.length &gt; 0) {
              sendNewsletterSignupEvent(formId, formName, formLocation);
              observer.disconnect(); // Stop observing after success
            }
          }
        });
      });
      
      observer.observe(form, {
        childList: true,
        subtree: true
      });
    });
  }
  
  // Track custom newsletter forms
  function trackCustomForms() {
    // Track announcement bar newsletter form
    const announcementForm = document.getElementById('newsletter-form');
    if (announcementForm) {
      announcementForm.addEventListener('submit', function(e) {
        // Wait a bit for the form to process
        setTimeout(() =&gt; {
          const successMessage = document.querySelector('.js-newsletter-success');
          if (successMessage &amp;&amp; successMessage.style.display !== 'none') {
            sendNewsletterSignupEvent(
              'newsletter-form',
              'Announcement Bar Newsletter',
              'popup'
            );
          }
        }, 1000);
      });
    }
    
    // Track any other forms with newsletter-related classes or IDs
    const newsletterForms = document.querySelectorAll('form[action*=&quot;newsletter&quot;], form[class*=&quot;newsletter&quot;], form[id*=&quot;newsletter&quot;]');
    
    newsletterForms.forEach((form) =&gt; {
      if (form.id !== 'newsletter-form') { // Skip the one we already tracked
        let formLocation = 'content';
        let formName = 'Newsletter Form';
        
        // Determine location
        if (form.closest('.footer')) {
          formLocation = 'footer';
          formName = 'Footer Newsletter';
        } else if (form.closest('.popup, .modal')) {
          formLocation = 'popup';
          formName = 'Popup Newsletter';
        }
        
        form.addEventListener('submit', function(e) {
          sendNewsletterSignupEvent(
            form.id || form.className || 'newsletter-form',
            formName,
            formLocation
          );
        });
      }
    });
  }
  
  // Track HubSpot forms
  function trackHubSpotForms() {
    // Listen for HubSpot form submissions
    if (window.hbspt) {
      // Override the default form submission handler
      const originalCreate = window.hbspt.forms.create;
      window.hbspt.forms.create = function(config) {
        const originalCallback = config.onFormSubmitted;
        
        config.onFormSubmitted = function(form) {
          // Call original callback if it exists
          if (originalCallback) {
            originalCallback(form);
          }
          
          // Track the submission
          let formLocation = 'content';
          let formName = 'HubSpot Newsletter';
          
          // Try to determine location from form context
          const formElement = document.querySelector(`[data-portal-id=&quot;${config.portalId}&quot;][data-form-id=&quot;${config.formId}&quot;]`);
          if (formElement) {
            if (formElement.closest('.footer')) {
              formLocation = 'footer';
              formName = 'Footer HubSpot Newsletter';
            } else if (formElement.closest('.popup, .modal')) {
              formLocation = 'popup';
              formName = 'Popup HubSpot Newsletter';
            }
          }
          
          sendNewsletterSignupEvent(
            `hubspot-${config.formId}`,
            formName,
            formLocation
          );
        };
        
        return originalCreate.call(this, config);
      };
    }
  }
  
  // Initialize tracking when DOM is ready
  function initNewsletterTracking() {
    // Track different types of forms
    trackKlaviyoForms();
    trackCustomForms();
    trackHubSpotForms();
    
    // Also listen for dynamic content changes
    const observer = new MutationObserver((mutations) =&gt; {
      mutations.forEach((mutation) =&gt; {
        if (mutation.type === 'childList' &amp;&amp; mutation.addedNodes.length &gt; 0) {
          // Check for new forms that might have been added dynamically
          setTimeout(() =&gt; {
            trackKlaviyoForms();
            trackCustomForms();
          }, 100);
        }
      });
    });
    
    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }
  
  // Start tracking when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initNewsletterTracking);
  } else {
    initNewsletterTracking();
  }
  
  // Also initialize on window load to catch any late-loading forms
  window.addEventListener('load', function() {
    setTimeout(initNewsletterTracking, 500);
  });
  
})();
