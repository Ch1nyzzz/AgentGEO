ss=&quot;entry-title&quot; data-dcnode-id=&quot;281&quot; style=&quot;display: none;&quot;&gt;&lt;span data-dcnode-id=&quot;282&quot; instrument_node=&quot;&quot;&gt;How Do I Set Up Vacuum Filtration And How Does It Work?&lt;/span&gt;&lt;/span&gt;&lt;div class=&quot;post-content&quot; data-dcnode-id=&quot;233&quot;&gt;&lt;div class=&quot;fusion-fullwidth fullwidth-box fusion-builder-row-1 nonhundred-percent-fullwidth non-hundred-percent-height-scrolling&quot; data-dcnode-id=&quot;234&quot; style=&quot;background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;padding-top:0px;padding-right:0px;padding-bottom:0px;padding-left:0px;margin-bottom: 0px;margin-top: 0px;border-width: 0px 0px 0px 0px;border-color:#eae9e9;border-style:solid;&quot;&gt;&lt;div class=&quot;fusion-builder-row fusion-row&quot; data-dcnode-id=&quot;235&quot;&gt;&lt;div class=&quot;fusion-layout-column fusion_builder_column fusion-builder-column-0 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last&quot; data-dcnode-id=&quot;236&quot; style=&quot;margin-top:0px;margin-bottom:0px;&quot;&gt;&lt;div class=&quot;fusion-column-wrapper fusion-flex-column-wrapper-legacy&quot; data-dcnode-id=&quot;237&quot; style=&quot;background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;&quot;&gt;&lt;div class=&quot;fusion-text fusion-text-1&quot; data-dcnode-id=&quot;239&quot;&gt;&lt;h1 class=&quot;fusion-responsive-typography-calculated&quot; data-dcnode-id=&quot;279&quot; data-fontsize=&quot;34&quot; data-lineheight=&quot;47.6px&quot; style=&quot;text-align: center; --fontSize:34; line-height: 1.4;&quot;&gt;&lt;span data-dcnode-id=&quot;280&quot; instrument_node=&quot;&quot;&gt;How Do I Set Up Vacuum Filtration And How Does It Work?&lt;/span&gt;&lt;/h1&gt;&lt;p data-dcnode-id=&quot;277&quot;&gt;&lt;span data-dcnode-id=&quot;278&quot; instrument_node=&quot;&quot;&gt;The vacuum filtration collects pollutants (mainly dust) sucked from the atmosphere to prevent system pollution, and is used between the suction cup and the vacuum generator (or vacuum valve).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;271&quot;&gt;&lt;span data-dcnode-id=&quot;276&quot; instrument_node=&quot;&quot;&gt;It is mainly suitable for &lt;/span&gt;&lt;a data-dcnode-id=&quot;273&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//vacuumfiltrations.com/product/stainless-steel-one-branch-vacuum-filtrations/&quot;&gt;&lt;strong data-dcnode-id=&quot;274&quot;&gt;&lt;span data-dcnode-id=&quot;275&quot; instrument_node=&quot;&quot;&gt;vacuum filtration&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;272&quot; instrument_node=&quot;&quot;&gt; in the production process of chemical medicine, petroleum and other industries. It can ensure that trapped particles are evenly distributed on the surface of the filter membrane, so it is particularly suitable for particulate matter Collection and counting. The other type uses a PTFE-coated stainless steel screen as a filter support pad, which is suitable for collecting filtrate, such as removing particles from samples. This type of filter is also recommended when filtering thicker liquids, such as when collecting particles from oil samples.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;269&quot;&gt;&lt;span data-dcnode-id=&quot;270&quot; instrument_node=&quot;&quot;&gt;Known as a technique that the scientists used to separate a solid from liquid, sometimes the filtration can be deal with gravity which is very simple. But more and more people choose vacuum filtration, because it is faster and more efficient.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;267&quot;&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt;When you set up a vacuum filtration kit,first you should make sure to clamp your filter flask securely, as the flasks are easily upended. Also you should use the trap between your filter flask and the aspirator, and the thick-walled vacuum tubing, not the thin one.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;265&quot;&gt;&lt;span data-dcnode-id=&quot;266&quot; instrument_node=&quot;&quot;&gt;After your setup is done, you can put a piece of filter paper on the filter and make it wet with the solvent you are going to pour through the filter.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;250&quot;&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt;You will find that a mixture of a solid and a liquid separated when you pour it through the filter. You can move the remained solid which stays in the flask with the aid of a spatula and wash it with a small amount of the solvent with low solubility.&lt;/span&gt;&lt;br data-dcnode-id=&quot;263&quot;&gt;&lt;span data-dcnode-id=&quot;262&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Stainless Steel Six-Branches Vacuum Filtrations&quot; class=&quot;alignnone wp-image-406 lazyloaded&quot; data-dcnode-id=&quot;261&quot; data-src=&quot;https://vacuumfiltrations.com/wp-content/uploads/2018/08/Stainless-Steel-Six-Branches-Vacuum-Filtrations.jpg&quot; data-srcset=&quot;https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/Stainless-Steel-Six-Branches-Vacuum-Filtrations-66x66.jpg 66w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/Stainless-Steel-Six-Branches-Vacuum-Filtrations-100x100.jpg 100w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/Stainless-Steel-Six-Branches-Vacuum-Filtrations-150x150.jpg 150w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/Stainless-Steel-Six-Branches-Vacuum-Filtrations-200x200.jpg 200w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/Stainless-Steel-Six-Branches-Vacuum-Filtrations-300x300.jpg 300w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/Stainless-Steel-Six-Branc -Vacuum-Filtrations-300x300.png 300w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-400x400.png 400w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-500x500.png 500w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations.png 600w&quot; height=&quot;438&quot; sizes=&quot;(max-width: 438px) 100vw, 438px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations.png&amp;amp;raw&quot; srcset=&quot;https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-66x66.png 66w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-100x100.png 100w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-150x150.png 150w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-200x200.png 200w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-300x300.png 300w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-400x400.png 400w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-500x500.png 500w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations.png 600w&quot; width=&quot;438&quot;&gt;&lt;noscript data-dcnode-id=&quot;255&quot;&gt;&lt;span data-dcnode-id=&quot;256&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone wp-image-390 lazyload&quot; src=&quot;https://vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations.png&quot; alt=&quot;3-Branches Vacuum Filtrations&quot; width=&quot;438&quot; height=&quot;438&quot; srcset=&quot;https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-66x66.png 66w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-100x100.png 100w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-150x150.png 150w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-200x200.png 200w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-300x300.png 300w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-400x400.png 400w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations-500x500.png 500w, https://www.vacuumfiltrations.com/wp-content/uploads/2018/08/3-Branches-Vacuum-Filtrations.png 600w&quot; sizes=&quot;(max-width: 438px) 100vw, 438px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;br data-dcnode-id=&quot;254&quot;&gt;&lt;span data-dcnode-id=&quot;253&quot; instrument_node=&quot;&quot;&gt; How Does Vacuum Filtration Work?&lt;/span&gt;&lt;br data-dcnode-id=&quot;252&quot;&gt;&lt;span data-dcnode-id=&quot;251&quot; instrument_node=&quot;&quot;&gt; Vacuum filtration is a separation method that can remove a solid from a liquid, which needs a filter to separate the solid from the liquid solution, and the vacuum pump that forces the liquid through the filter. Vacuum filtration set-up is widely used when particles dissolved in a solvent and recovered through heating, as while as the liquid evaporates.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;244&quot;&gt;&lt;span data-dcnode-id=&quot;249&quot; instrument_node=&quot;&quot;&gt;When we use the &lt;/span&gt;&lt;a data-dcnode-id=&quot;246&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//vacuumfiltrations.com/product/stainless-steel-three-branches-vacuum-filtrations/&quot;&gt;&lt;strong data-dcnode-id=&quot;247&quot;&gt;&lt;span data-dcnode-id=&quot;248&quot; instrument_node=&quot;&quot;&gt;vacuum filtration&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;245&quot; instrument_node=&quot;&quot;&gt; to collect the recrystallized solids, the remains after the evaporation process are deposited from the flask onto a filter paper and put into a Buchner funnel.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;242&quot;&gt;&lt;span data-dcnode-id=&quot;243&quot; instrument_node=&quot;&quot;&gt;With the filter flask attached to the funnel and, the air will be sucked out of the side opening through a rubber tube that is attached to the vacuum. After we pour the liquid solution into the funnel with filter paper, the vacuum will force the solvent through the filter paper and we will get the deposited in the filter flask.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;240&quot;&gt;&lt;span data-dcnode-id=&quot;241&quot; instrument_node=&quot;&quot;&gt;The key point to the process is to testing the suction. We attach the rubber tube to the vacuum first and test for suction at the other end of the tube. Then, we attach the tube to the filter flask’s side arm.The filter flask should have enough suction if the connection is secure.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;fusion-clearfix&quot; data-dcnode-id=&quot;238&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;fusion-meta-info&quot; data-dcnode-id=&quot;221&quot;&gt;&lt;div class=&quot;fusion-meta-info-wrapper&quot; data-dcnode-id=&quot;222&quot;&gt;&lt;span class=&quot;vcard rich-snippet-hidden&quot; data-dcnode-id=&quot;229&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;230&quot;&gt;&lt;a data-dcnode-id=&quot;231&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.vacuumfiltrations.com/author/qoybr/&quot; rel=&quot;author&quot; title=&quot;Posts by qoybr&quot;&gt;&lt;span data-dcnode-id=&quot;232&quot; instrument_node=&quot;&quot;&gt;qoybr&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;updated rich-snippet-hidden&quot; data-dcnode-id=&quot;227&quot;&gt;&lt;span data-dcnode-id=&quot;228&quot; instrument_node=&quot;&quot;&gt;2020-03-17T09:11:47+00:00&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;225&quot;&gt;&lt;span data-dcnode-id=&quot;226&quot; instrument_node=&quot;&quot;&gt;March 17th, 2020&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;fusion-inline-sep&quot; data-dcnode-id=&quot;223&quot;&gt;&lt;span data-dcnode-id=&quot;224&quot; instrument_node=&quot;&quot;&gt;|&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/article&gt;&lt;/section&gt;&lt;aside class=&quot;sidebar fusion-widget-area fusion-content-widget-area fusion-sidebar-left fusion-slidingbarwidget1 fusion-sticky-sidebar&quot; data-dcnode-id=&quot;159&quot; id=&quot;sidebar&quot; style=&quot;float: left;&quot;&gt;&lt;div class=&quot;fusion-sidebar-inner-content&quot; data-dcnode-id=&quot;160&quot; data-sticky_kit=&quot;true&quot;&gt;&lt;section class=&quot;widget_text fusion-slidingbar-widget-column widget widget_custom_html&quot; data-dcnode-id=&quot;161&quot; id=&quot;custom_html-3&quot;&gt;&lt;div class=&quot;textwidget custom-html-widget&quot; data-dcnode-id=&quot;163&quot;&gt;&lt;div data-dcnode-id=&quot;164&quot; style=&quot;font-size: 16px;background-color:#f5f5f7;line-height:46px;width:100%;&quot;&gt;&lt;div data-dcnode-id=&quot;216&quot; id=&quot;form&quot; style=&quot;background-color: #676767;height:46px;text-align: center;color: #fff&quot;&gt;&lt;strong data-dcnode-id=&quot;217&quot;&gt;&lt;span data-dcnode-id=&quot;218&quot; instrument_node=&quot;&quot;&gt;Products Categories&lt;/span&gt;&lt;/strong&gt;&lt;/div&gt;&lt;ul data-dcnode-id=&quot;165&quot; style=&quot;line-height: 35px;&quot;&gt;&lt;span data-dcnode-id=&quot;215&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;211&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//vacuumfiltrations.com/product/300ml-
