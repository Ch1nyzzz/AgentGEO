&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;article about=&quot;/blog/liquids-sterilization-by-filtration&quot; class=&quot;article full clearfix&quot; data-dcnode-id=&quot;220&quot; role=&quot;article&quot; typeof=&quot;schema:Article&quot;&gt;&lt;span data-dcnode-id=&quot;1015&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;hidden&quot; content=&quot;How Does Filtration of Liquids in the Lab Work?&quot; data-dcnode-id=&quot;1014&quot; property=&quot;schema:name&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;222&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-paragraphs field--type-entity-reference-revisions field--label-hidden field--items&quot; data-dcnode-id=&quot;304&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item text_intro&quot; data-dcnode-id=&quot;1006&quot;&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-text-intro field--type-string-long field--label-hidden field--item&quot; data-dcnode-id=&quot;1008&quot;&gt;&lt;span data-dcnode-id=&quot;1009&quot; instrument_node=&quot;&quot;&gt;Filtration is an interesting sterilization method in laboratories. It’s the only method that uses force to separate rather than to kill. When you filter a liquid or gas, it passes through a pore, which stops, or filters out, the passage of larger particles. Filtration depends on pore sizes, the smaller the pores the more particles it can screen out, but it also takes more energy to force the liquid through it. Pore sizes can be as small as .01 μm (μm=micrometer), small enough to stop viruses from passing through, but smaller proteins can still get through. There are even really small filters called nano-filters, which stop viruses, proteins and some toxins.&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item text&quot; data-dcnode-id=&quot;984&quot;&gt;&lt;span data-dcnode-id=&quot;1004&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--text paragraph--view-mode--default&quot; data-dcnode-id=&quot;986&quot;&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-t field--type-text-long field--label-hidden field--item&quot; data-dcnode-id=&quot;988&quot;&gt;&lt;p data-dcnode-id=&quot;999&quot;&gt;&lt;strong data-dcnode-id=&quot;1001&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;Bottom line?&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt; Filtration is a great option for sterilizing heat-sensitive liquids, which cannot be autoclaved or sterilized by other sterilization methods.&amp;nbsp; In this blog post, we will explore the ways in which different types of filtration systems work, as well as the practical advantages and disadvantages of using them in a laboratory setting.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;996&quot;&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;What Is Filtration and How Does It work?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;990&quot;&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;Filtration is different from other sterilization methods. &lt;/span&gt;&lt;a data-dcnode-id=&quot;992&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Filtration&quot;&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;Wikipedia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt; defines sterilization as a process that eliminates (removes) or kills (deactivates) all forms of life and other biological agents. Up until now all the sterilization methods we covered deactivate or kill bacteria and viruses. Filtration is the first and only sterilization method that eliminates bacteria by separating the microorganisms from the sterilized medium, but unlike other sterilization methods, it doesn’t kill or stop the bacteria's ability to reproduce. The way it works is actually very simple. You’re probably familiar with water filters found in an office or at home, or a coffee percolator, all of which use the same basic mechanism of filtration.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item image_body&quot; data-dcnode-id=&quot;970&quot;&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--image-body paragraph--view-mode--default&quot; data-dcnode-id=&quot;972&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-post-image-body field--type-image field--label-hidden field--item&quot; data-dcnode-id=&quot;977&quot;&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;field--item text&quot; data-dcnode-id=&quot;924&quot;&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--text paragraph--view-mode--default&quot; data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-t field--type-text-long field--label-hidden field--item&quot; data-dcnode-id=&quot;928&quot;&gt;&lt;p data-dcnode-id=&quot;965&quot;&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;Filtration uses membranous filters that have tiny pores that let the liquid pass through but prevent bigger particles such as bacteria to pass through the filter. Therefore, the smaller the pore, the more likely the filter is to stop more things from going through it. If the pores of a filter, which is designed to remove a microbe, which is a microscopic organism, are small enough, they should be able to stop all living things from passing through.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;962&quot;&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;Filtration of Liquids in the Lab&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;959&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;In laboratories, liquids are filtered through microbial filters to remove any microbes present. It is an effective method of sterilization for heat sensitive liquids. There are four types of filters:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;936&quot;&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;953&quot;&gt;&lt;strong data-dcnode-id=&quot;955&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;Membrane filters&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt; are thin filters that are made of cellulose. They can be used for sterilization during injection by placing the membrane between the syringe and the needle.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;948&quot;&gt;&lt;strong data-dcnode-id=&quot;950&quot;&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;Seitz filters&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt; are usually made of asbestos. They are pad-like and thicker than membrane filters.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;947&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;943&quot;&gt;&lt;strong data-dcnode-id=&quot;945&quot;&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;Sintered glass filters&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;944&quot; instrument_node=&quot;&quot;&gt; are an alternative type of filter that are made of glass and hence do not absorb liquids during filtration.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;938&quot;&gt;&lt;strong data-dcnode-id=&quot;940&quot;&gt;&lt;span data-dcnode-id=&quot;941&quot; instrument_node=&quot;&quot;&gt;Candle filters&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;939&quot; instrument_node=&quot;&quot;&gt; are made of clay-like mud. This special mud has tiny pores made by algae. The microbes get stuck during their travel through the pores.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;933&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;Filtration Techniques&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;930&quot;&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;There is more than one filtration technique. Reverse Osmosis is used in home filtration systems. Other common methods are nano-filtration, ultra-filtration, micro-filtration and particle filtration. We will not discuss these different techniques since they are beyond the scope of this article, but it’s important to know that are several techniques and each technique is suitable for a specific application. Here’s a chart that shows the different uses of these filters:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;field field--name-field-t field--type-text-long field--label-hidden field--item&quot; data-dcnode-id=&quot;310&quot;&gt;&lt;h2 data-dcnode-id=&quot;367&quot;&gt;&lt;span data-dcnode-id=&quot;368&quot; instrument_node=&quot;&quot;&gt;Advantages of Filtration&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;352&quot;&gt;&lt;span data-dcnode-id=&quot;365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;363&quot;&gt;&lt;span data-dcnode-id=&quot;364&quot; instrument_node=&quot;&quot;&gt;Relatively inexpensive, except for those with the smallest pore sizes&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;362&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;360&quot;&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;Filters do not clog easily&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;357&quot;&gt;&lt;span data-dcnode-id=&quot;358&quot; instrument_node=&quot;&quot;&gt;Suitable for heat sensitive liquids as filters do not use heat&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;354&quot;&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;They can filter large volumes of fluid reasonably fast&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;351&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;349&quot;&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;Disadvantages of Filtration&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;348&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;325&quot;&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;345&quot;&gt;&lt;span data-dcnode-id=&quot;346&quot; instrument_node=&quot;&quot;&gt;Filters can only work on liquids and gasses&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;342&quot;&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt;Autoclaving is usually cheaper than filtration since filters are expensive to replace, especially nano-filters&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;339&quot;&gt;&lt;span data-dcnode-id=&quot;340&quot; instrument_node=&quot;&quot;&gt;Glass filters are very brittle and can break easily&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;336&quot;&gt;&lt;span data-dcnode-id=&quot;337&quot; instrument_node=&quot;&quot;&gt;Membrane filters rupture easily&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;333&quot;&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt;The solution in Sietz Filters might get absorbed by the filter pad itself&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;332&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;330&quot;&gt;&lt;span data-dcnode-id=&quot;331&quot; instrument_node=&quot;&quot;&gt;Clogging may occur&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;327&quot;&gt;&lt;span data-dcnode-id=&quot;328&quot; instrument_node=&quot;&quot;&gt;Long process&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;322&quot;&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;Conclusion&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;316&quot;&gt;&lt;span data-dcnode-id=&quot;320&quot; instrument_node=&quot;&quot;&gt;Let’s recap. We explored that filters are a physical method that separates microbes like bacteria from liquids. Then we explained common uses of filtration in the lab. We are thankful for filters as they play an important role in laboratory virus research since&lt;/span&gt;&lt;a data-dcnode-id=&quot;318&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Charles_Chamberland&quot;&gt;&lt;span data-dcnode-id=&quot;319&quot; instrument_node=&quot;&quot;&gt; Charles Chamberlain&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;317&quot; instrument_node=&quot;&quot;&gt; first used them in the late 19th century. But, if possible, it’s always recommended to sterilize a solution with an autoclave and use filtration only when autoclaving is impossible. The rule is that any solution used in the lab should be sterilized.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;312&quot;&gt;&lt;em data-dcnode-id=&quot;313&quot;&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;What type of filtration do you use in your lab? We’d love to hear your take on filtration in the comments section below.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;311&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;309&quot; instrument_node=&quot;&quot;&gt;
