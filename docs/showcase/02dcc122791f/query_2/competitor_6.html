&lt;/span&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;222&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-paragraphs field--type-entity-reference-revisions field--label-hidden field--items&quot; data-dcnode-id=&quot;304&quot;&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item text_intro&quot; data-dcnode-id=&quot;513&quot;&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-text-intro field--type-string-long field--label-hidden field--item&quot; data-dcnode-id=&quot;515&quot;&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;In the previous post we introduced filtration techniques used in the lab to sterilize heat sensitive liquids that cannot be autoclaved. Filtration is not exactly a sterilization technique; unlike any other sterilization method, such as radiation or steam sterilization, it does not kill the microbes, rather it physically blocks their passage. &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item text&quot; data-dcnode-id=&quot;478&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--text paragraph--view-mode--default&quot; data-dcnode-id=&quot;480&quot;&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-t field--type-text-long field--label-hidden field--item&quot; data-dcnode-id=&quot;482&quot;&gt;&lt;p data-dcnode-id=&quot;508&quot;&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;Air filters are common in germ-susceptible locations such as labs and hospitals and even in industrial buildings and airplanes where all the air gets filtered, keeping the environment safe. Just imagine what can happen if there’s a sick person on a plane and the air is not filtered.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;505&quot;&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;In this article we will discuss how air filtration is used in lab steam sterilization. In this case filtration is used as a way to protect the lab environment and lab staff from contamination. However it is relevant to the discussion of sterilization methods since it is used to reduce the bioburden level. In this post you’ll learn about air filtration and&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;493&quot;&gt;&lt;span data-dcnode-id=&quot;503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;501&quot;&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;how steam sterilization can affect the laboratory environment,&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;498&quot;&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;how the environment can potentially affect the sterile load.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;495&quot;&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;and how filtration solves these two problems.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;492&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;490&quot;&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;HEPA Filter Pore Sizes&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;487&quot;&gt;&lt;span data-dcnode-id=&quot;488&quot; instrument_node=&quot;&quot;&gt;HEPA filters are designed to target tiny pollutants and particles as small as viruses that can be 10X smaller than standard bacteria. The particles are trapped through a combination of mechanisms called interception, impaction and diffusion. A detailed discussion of how each mechanism works is beyond the scope of this article. The following table specifies the sizes of the different microorganisms and particles.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;484&quot;&gt;&lt;span data-dcnode-id=&quot;485&quot; instrument_node=&quot;&quot;&gt;HEPA filtration:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--text paragraph--view-mode--default&quot; data-dcnode-id=&quot;449&quot;&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-t field--type-text-long field--label-hidden field--item&quot; data-dcnode-id=&quot;451&quot;&gt;&lt;h2 data-dcnode-id=&quot;459&quot;&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;Sterilization Can Affect the Environment&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;453&quot;&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;In biosafety laboratories with high risk of pathogen exposure, namely BSL3 and BSL4, &amp;nbsp;the separation of hazardous materials from public spaces is vital for the protection of the lab environment and this is why the control of airflow in the lab is so important. How is this accomplished? By the use of air filters, which protect the lab environment and control airflow in and out of separate pressure zones. HEPA stands for &lt;/span&gt;&lt;strong data-dcnode-id=&quot;455&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;'high-efficiency particulate air' filters&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;, and they are probably the most commonly used type of air filters. How do they &amp;nbsp;work in BSL labs?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;450&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item image_body&quot; data-dcnode-id=&quot;433&quot;&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--image-body paragraph--view-mode--default&quot; data-dcnode-id=&quot;435&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-post-image-body field--type-image field--label-hidden field--item&quot; data-dcnode-id=&quot;440&quot;&gt;&lt;span data-dcnode-id=&quot;443&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Air flow structure of a BSL4 lab&quot; class=&quot;img-responsive&quot; data-dcnode-id=&quot;442&quot; decoding=&quot;async&quot; height=&quot;759&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//tuttnauer.com/sites/default/files/blog_images/air-flow-of-bsl-lab.jpg&amp;amp;raw&quot; typeof=&quot;foaf:Image&quot; width=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-image-caption field--type-string field--label-hidden field--item&quot; data-dcnode-id=&quot;437&quot;&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;Air flow structure of a BSL4 lab&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item text&quot; data-dcnode-id=&quot;374&quot;&gt;&lt;span data-dcnode-id=&quot;431&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--text paragraph--view-mode--default&quot; data-dcnode-id=&quot;376&quot;&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-t field--type-text-long field--label-hidden field--item&quot; data-dcnode-id=&quot;378&quot;&gt;&lt;h2 data-dcnode-id=&quot;428&quot;&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;Air Filtration in Steam Sterilization&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;427&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;425&quot;&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;Filters have two intended uses in autoclaves:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;416&quot;&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;421&quot;&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt;protecting the environment from potentially dangerous gasses released from the autoclave&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;418&quot;&gt;&lt;span data-dcnode-id=&quot;419&quot; instrument_node=&quot;&quot;&gt;protecting the sterilized load from potential external contamination&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;413&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;Why Filter Air-Outlet When Using an Autoclave?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;410&quot;&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;Air needs to be filtered when sterilizing lab instruments and biohazardous materials at pre-vacuum stage because it may contain infectious substances. For example, the air inside the autoclave chamber may include medical waste, which can be contaminated by viruses or toxins. If biohazard is released, there is a chance it will harm the drainage and ambient air, as well as laboratory staff&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;407&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;The HEPA air filter blocks all microorganisms from exiting the chamber during the air removal phase. The filter is so small that it blocks viruses that are an average 10X smaller than standard bacteria. This blockage, therefore, prevents the contaminated air from escaping into the atmosphere and instead, catches the harmful microorganism inside exhausting germ free air.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;404&quot;&gt;&lt;span data-dcnode-id=&quot;405&quot; instrument_node=&quot;&quot;&gt;How Does it Work?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;398&quot;&gt;&lt;span data-dcnode-id=&quot;402&quot; instrument_node=&quot;&quot;&gt;An autoclave sterilization cycle begins with air removal by vacuum. The air removed from the autoclave chamber for optimal steam penetration is released into the lab environment. So, before the chamber content is sterilized we already start sucking air out of the chamber by creating this vacuum. &lt;/span&gt;&lt;strong data-dcnode-id=&quot;400&quot;&gt;&lt;span data-dcnode-id=&quot;401&quot; instrument_node=&quot;&quot;&gt;But there’s a catch&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;399&quot; instrument_node=&quot;&quot;&gt;, the air exiting the chamber potentially has a high level of contamination, endangering the environment. The biohazard filter which is located on the biohazard outlet line blocks these dangerous microorganisms from exiting the autoclave chamber together with the air thus keeping the lab safe.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;395&quot;&gt;&lt;span data-dcnode-id=&quot;396&quot; instrument_node=&quot;&quot;&gt;Who Is Afraid of Water?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;392&quot;&gt;&lt;span data-dcnode-id=&quot;393&quot; instrument_node=&quot;&quot;&gt;HEPA filters are hydrophobic. Hydrophobic filters do not pass water, and this is why they are called Hydrophobic: In Greek Hydra is water and Phobic is fear. Hydrophobic filters are designed to filter out gas for venting. A hydrophobic filter must remain dry. If it gets wet it will become blocked, and air will not be able to pass to or from the chamber. On a side note, since the HEPA filter is hydrophobic, the biohazard outlet is located in the upper-middle part of the autoclave chamber. This is to ensure that the outlet will remain condensation free and water will not block the passage of air.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;386&quot;&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;The air outlet is contaminated since sterilization has not taken place yet. Filters guarantee that the air removed from the autoclave is free of harmful microorganisms. The sterilization of air by HEPA filters at pre-vacuum stage is also called &lt;/span&gt;&lt;strong data-dcnode-id=&quot;388&quot;&gt;&lt;span data-dcnode-id=&quot;389&quot; instrument_node=&quot;&quot;&gt;green sterilization&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt;, as its main purpose is not to sterilize the media but to keep the environment safe, by leaving all bacteria and viruses inside the chamber. Once the sterilization cycle runs in the autoclave those microorganisms will be killed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;383&quot;&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt;Extra Safety Meassures&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;382&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;380&quot;&gt;&lt;span data-dcnode-id=&quot;381&quot; instrument_node=&quot;&quot;&gt;We’re not done with simply blocking the bacteria with a HEPA filter. After potentially contaminated air has passed through the filter we are left with a contaminated HEPA filter packed with microorganisms. The filter also needs to be sterilized in order to make it free of living microorganisms. Some users sterilize the filter as a part of the biohazard sterilization cycle. In other cases, there is a specific program dedicated to sterilize the filter post sterilization cycle. In some BSL4 labs two filters are placed serially for extra safety: in case one of the filters fails, the second filter is there to prevent any microorganisms from passing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;377&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item image_body&quot; data-dcnode-id=&quot;360&quot;&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--image-body paragraph--view-mode--default&quot; data-dcnode-id=&quot;362&quot;&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-post-image-body field--type-image field--label-hidden field--item&quot; data-dcnode-id=&quot;367&quot;&gt;&lt;span data-dcnode-id=&quot;370&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Special measures of protection are required in BSL3 and BSL4 labs&quot; class=&quot;img-responsive&quot; data-dcnode-id=&quot;369&quot; decoding=&quot;async&quot; height=&quot;429&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//tuttnauer.com/sites/default/files/blog_images/special-measures-of-protection.jpg&amp;amp;raw&quot; typeof=&quot;foaf:Image&quot; width=&quot;762&quot;&gt;&lt;span data-dcnode-id=&quot;368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-image-caption field--type-string field--label-hidden field--item&quot; data-dcnode-id=&quot;364&quot;&gt;&lt;span data-dcnode-id=&quot;365&quot; instrument_node=&quot;&quot;&gt;Special measures of protection are required in BSL3 and BSL4 labs&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item text&quot; data-dcnode-id=&quot;346&quot;&gt;&lt;span data-dcnode-id=&quot;358&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--text paragraph--view-mode--default&quot; data-dcnode-id=&quot;348&quot;&gt;&lt;span data-dcnode-id=&quot;357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-t field--type-text-long field--label-hidden field--item&quot; data-dcnode-id=&quot;350&quot;&gt;&lt;h2 data-dcnode-id=&quot;355&quot;&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;Trojan Horses in the Lab&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;354&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;352&quot;&gt;&lt;span data-dcnode-id=&quot;353&quot; instrument_node=&quot;&quot;&gt;We all know the story of the Trojan horse the Greeks used to enter the city of Troy and win the war. The Greeks built a huge wooden horse and hid their soldiers in it. The Trojans pulled the horse into their city and the Greek soldiers came out of the horse at night, easily destroying the city of Troy. HEPA filter's purpose is to prevent these Trojan horses from entering the autoclave chamber.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;351&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;349&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item image_body&quot; data-dcnode-id=&quot;332&quot;&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--image-body paragraph--view-mode--default&quot; data-dcnode-id=&quot;334&quot;&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-post-image-body field--type-image field--label-hidden field--item&quot; data-dcnode-id=&quot;339&quot;&gt;&lt;span data-dcnode-id=&quot;342&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;Air filters prevent the viruses and bacteria from entering the autoclave&quot; class=&quot;img-responsive&quot; data-dcnode-id=&quot;341&quot; decoding=&quot;async&quot; height=&quot;762&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//tuttnauer.com/sites/default/files/blog_images/air-filters-prevent-viruses-from-entering.png&amp;amp;raw&quot; typeof=&quot;foaf:Image&quot; width=&quot;676&quot;&gt;&lt;span data-dcnode-id=&quot;340&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-image-caption field--type-string field--label-hidden field--item&quot; data-dcnode-id=&quot;336&quot;&gt;&lt;span data-dcnode-id=&quot;337&quot; instrument_node=&quot;&quot;&gt;Air filters prevent the viruses and bacteria from entering the autoclave&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;331&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field--item text&quot; data-dcnode-id=&quot;306&quot;&gt;&lt;span data-dcnode-id=&quot;330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph paragraph--type--text paragraph--view-mode--default&quot; data-dcnode-id=&quot;308&quot;&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field--name-field-t field--type-text-long field--label-hidden field--item&quot; data-dcnode-id=&quot;310&quot;&gt;&lt;p data-dcnode-id=&quot;327&quot;&gt;&lt;span data-dcnode-id=&quot;328&quot; instrument_node=&quot;&quot;&gt;Filters are used in autoclaves designed for BSL3 and BSL4 labs when air enters the autoclave chamber at post sterilization drying phase. It’s important that only sterile air enters the chamber after the media has already been sterilized. &amp;nbsp;If we were concerned about the protection of the environment at pre-vacuum stage while sterilizing biohazard, now our main concern is to protect the integrity of the load. At the end of sterilization phase, the load in the chamber is sterile. This is why the air has to be filtered before entering the chamber to avoid the passage of microorganism which the ambient air contains. This time a HEPA filter is used in the air inlet line. At the end of the drying stage vacuum is broken inside the chamber and this is when the inlet air-line comes into action.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;324&quot;&gt;&lt;span data-dcnode-id=&quot;325&quot; instrument_node=&quot;&quot;&gt;An Autoclave Within an Autoclave&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;321&quot;&gt;&lt;span data-dcnode-id=&quot;322&quot; instrument_node=&quot;&quot;&gt;The air filter may become contaminated. Therefore the filter &amp;nbsp;needs to be sterilized to kill the microorganisms that were blocked by the filter. This is why the filter is placed in a special housing. The housing functions just like a miniature autoclave: it is equipped with a temperature sensor, steam trap for housing chamber and jacket and it sterilizes the filter thus leaving it free of living microorganism ready for the next cycle.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;318&quot;&gt;&lt;span data-dcnode-id=&quot;319&quot; instrument_node=&quot;&quot;&gt;Tuttnauer provides an option to test filters by a WIT (Water Intrusion Test) in order to confirm that the filters are not ruptured. In addition, Tuttnauer autoclave HEPA filters use filter housing that are equipped with ports for in situ (onsite) integrity testing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;317&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;315&quot;&gt;&lt;span data-dcnode-id=&quot;316&quot; instrument_node=&quot;&quot;&gt;Conclusion/Summary&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;312&quot;&gt;&lt;span data-dcnode-id=&quot;313&quot; instrument_node=&quot;&quot;&gt;To summarize we just explained how air filtration is used when sterilizing biohazard or in BSL3 and BSL4 labs at pre-vacuum stage to protect the environment and at post vacuum stage to protect the integrity of the load. You are invited to share your questions and comments about HEPA filters and air filtration in lab steam sterilization in the comments section below.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;311&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;field__item field__item-label-hidden&quot; data-dcnode-id=&quot;226&quot;&gt;&lt;span data-dcnode-id=&quot;301&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;views-element-container form-group&quot; data-dcnode-id=&quot;228&quot;&gt;&lt;span data-dcnode-id=&quot;300&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;view view-author-bio-short-footer view-id-author_bio_short_footer view-display-id-block_1 js-view-dom-id-bf6488b39f0f918ed8e1aa68c8d996ed5389b273e00830a2bc10c17a50f482fd&quot; data-dcnode-id=&quot;230&quot;&gt;&lt;span data-dcnode-id=&quot;299&quot; instrument_node=&quot;&quot;&gt;
