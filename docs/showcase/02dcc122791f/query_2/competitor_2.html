&lt;/span&gt;&lt;h1 data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;How Do Air Filtration Systems Work?&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;738&quot;&gt;&lt;a data-dcnode-id=&quot;740&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.metroheatcool.com/residential/indoor-air-quality/&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;Indoor air quality&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt; problems are not new to St. Louis and Fenton homeowners. You have known for years that you should do something to keep pollutants and irritants out of your home so your family can breathe safely. Air filtration systems are one part of the puzzle when it comes to improving indoor air quality, but many homeowners are not aware of how they work. Here’s a closer look at what an air filtration device can do to help improve the indoor air quality in your home.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;735&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;The Air Cleaning Process&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;727&quot;&gt;&lt;a data-dcnode-id=&quot;732&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.metroheatcool.com/residential/indoor-air-quality/air-purification/&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;Air purifiers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;729&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.metroheatcool.com/residential/indoor-air-quality/air-filtration/&quot;&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;filtration systems&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt; use internal fans to pull air from your home into the device. A series of filters within the filtration system will remove dust, pollen, and bacteria from the air before sending it back into your home. This process repeats multiple times every single hour, so the air is constantly re-filtered and circulated through your home. If you’d like an even more powerful air purifier, we offer UV air purifiers that use ultraviolet light to kill mold and bacteria inside your AC system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;724&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;In addition, some air filters have an ionizer. This uses a process like static electricity to attract particles to the filter. This can make the system even more effective at trapping particles, because it will naturally attract them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;721&quot;&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;While your HVAC system does already have a built-in air filter, and you can purchase high-efficiency filters to pull as much grime from your air as possible, the HVAC system is limited in how many of the airborne particles it can trap. Air filtration devices pull more of these particles from the air, so you have improved indoor air quality. To get the best possible filtration, look for a system that has a HEPA filter, which is designed to capture ultra-fine particles. To keep the air filtration system working at its best, replace or clean the filter regularly to reduce wear and tear on the system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;718&quot;&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;Benefits of Air Filtration Systems&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;715&quot;&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;Why should you invest in a quality air filtration system? Some of the benefits you will enjoy with one of these systems include:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;691&quot;&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;711&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;Confidence that your family is breathing the cleanest air possible&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;708&quot;&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;Removal of unpleasant odors from your home&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;705&quot;&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;Removal of up to 99% of bacteria from the air in your home&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;
