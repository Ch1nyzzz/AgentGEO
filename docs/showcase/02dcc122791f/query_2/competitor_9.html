&lt;/span&gt;&lt;a data-dcnode-id=&quot;2635&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rockler.com/learn/woodshop-air-filtration&quot;&gt;&lt;img alt=&quot;Replacing two part air filters in powermatic filtration system&quot; data-dcnode-id=&quot;2636&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rockler.com/media/wysiwyg/Learn/replacing-air-filters.jpeg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2634&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;col-m-7&quot; data-dcnode-id=&quot;2624&quot;&gt;&lt;span data-dcnode-id=&quot;2631&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;2630&quot;&gt;&lt;br data-dcnode-id=&quot;2629&quot;&gt;&lt;span data-dcnode-id=&quot;2628&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2626&quot;&gt;&lt;span data-dcnode-id=&quot;2627&quot; instrument_node=&quot;&quot;&gt;If you have a dust collection system in your shop, you may think you're in complete control of your woodshop dust situation. In reality, you're only half way there.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2625&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2622&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;row sect&quot; data-dcnode-id=&quot;2567&quot;&gt;&lt;span data-dcnode-id=&quot;2619&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;col-m-12&quot; data-dcnode-id=&quot;2568&quot;&gt;&lt;span data-dcnode-id=&quot;2618&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2613&quot;&gt;&lt;span data-dcnode-id=&quot;2617&quot; instrument_node=&quot;&quot;&gt;Unfortunately, a thorough explanation of &lt;/span&gt;&lt;a data-dcnode-id=&quot;2615&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rockler.com/rockler-wall-mount-dust-collector-1250-cfm&quot;&gt;&lt;span data-dcnode-id=&quot;2616&quot; instrument_node=&quot;&quot;&gt;dust collection&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2614&quot; instrument_node=&quot;&quot;&gt; design - including formulas for calculating air volume, velocity and static pressure losses - is beyond the scope of this article.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2612&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2610&quot;&gt;&lt;span data-dcnode-id=&quot;2611&quot; instrument_node=&quot;&quot;&gt;&quot;Respirable&quot; dust particles 10 microns and smaller are invisible to the unaided eye, and are extremely difficult to capture with a typical dust collection set-up. In the significant quantities kicked out in most woodshops, fine dust particles also pose a serious threat to the human respiratory system, with health consequences ranging from cold and flu–like symptoms and moderate allergic reactions to the risk of certain forms of cancer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2609&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2604&quot;&gt;&lt;span data-dcnode-id=&quot;2608&quot; instrument_node=&quot;&quot;&gt;To really get on top of the woodshop dust control problem, you need to take a two-pronged approach: You need a dust collection solution for the bulky chips, shavings and large particle saw dust, and you need a ventilation or &lt;/span&gt;&lt;a data-dcnode-id=&quot;2606&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rockler.com/powermatic-air-filtration-system&quot;&gt;&lt;span data-dcnode-id=&quot;2607&quot; instrument_node=&quot;&quot;&gt;air filtration solution&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt; to keep the fine dust in check. And unless you live in the most favorable of climates where fresh air can be continually brought in form outside, air filtration will be the most practical solution.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2603&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2596&quot;&gt;&lt;a data-dcnode-id=&quot;2601&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rockler.com/jet-1000cfm-air-filtration-system&quot;&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt;Air filtration systems&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2600&quot; instrument_node=&quot;&quot;&gt; are outfitted with continuous duty motors and high surface-area filters that make them uniquely suited for cleansing woodshop air of fine dust particles. They’re fairly simple, unobtrusive machines. They hang form the ceiling of your shop, out of the way of you and your work. All you have to do is replace the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2598&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rockler.com/five-micron-outer-filter-for-air-filtration-systems&quot;&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;filer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2597&quot; instrument_node=&quot;&quot;&gt; periodically and remember to flip on the switch when you start work.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2595&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2590&quot;&gt;&lt;span data-dcnode-id=&quot;2594&quot; instrument_node=&quot;&quot;&gt;How much air filtration does your shop need?  Your &lt;/span&gt;&lt;a data-dcnode-id=&quot;2592&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rockler.com/powermatic-pm1250-micro-dust-air-filtration-system&quot;&gt;&lt;span data-dcnode-id=&quot;2593&quot; instrument_node=&quot;&quot;&gt;filtration system&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2591&quot; instrument_node=&quot;&quot;&gt; should be capable of filtering the entire volume of air in your shop 6 to 8 times every hour.  To find the air moving capacity necessary for your shop, follow this formula:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2587&quot;&gt;&lt;span data-dcnode-id=&quot;2588&quot; instrument_node=&quot;&quot;&gt;Find the total volume of air in your shop in cubic feet (if your ceilings are more than 12' high, use 12' as your height):&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2586&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2583&quot;&gt;&lt;strong data-dcnode-id=&quot;2584&quot;&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt;Volume = length x width x height&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2582&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2577&quot;&gt;&lt;span data-dcnode-id=&quot;2581&quot; instrument_node=&quot;&quot;&gt;Multiply the air volume by the number of cycles per hour that you want to move the air through the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2579&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rockler.com/stratus-pro-air-cleaner&quot;&gt;&lt;span data-dcnode-id=&quot;2580&quot; instrument_node=&quot;&quot;&gt;filtration system&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2578&quot; instrument_node=&quot;&quot;&gt; (use 6 if you are a one person shop and don't do an extraordinary amount of sanding or carving with abrasives, otherwise use 8) and divide the result by 60 (an air filtration system's capacity is rated in cfm or “cubic feet per minute”; dividing by 60 translates the time factor into minutes instead of hours):&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2573&quot;&gt;&lt;strong data-dcnode-id=&quot;2574&quot;&gt;&lt;span data-dcnode-id=&quot;2575&quot; instrument_node=&quot;&quot;&gt;Necessary air moving capacity (cfm) = volume x cycles / 60&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2572&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2570&quot;&gt;&lt;span data-dcnode-id=&quot;2571&quot; instrument_node=&quot;&quot;&gt;All that's left is to choose an air filtration system that meets the cfm requirements for your shop.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2569&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2566&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;clear clearfix&quot; data-dcnode-id=&quot;2565&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2564&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2562&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2560&quot; instrument_node=&quot;&quot;&gt;
