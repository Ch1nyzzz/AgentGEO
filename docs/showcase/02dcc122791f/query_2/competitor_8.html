&lt;/span&gt;&lt;div class=&quot;section the_content has_content&quot; data-dcnode-id=&quot;718&quot;&gt;&lt;div class=&quot;section_wrapper&quot; data-dcnode-id=&quot;719&quot;&gt;&lt;div class=&quot;the_content_wrapper&quot; data-dcnode-id=&quot;720&quot;&gt;&lt;div class=&quot;post01&quot; data-dcnode-id=&quot;722&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;867&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;Activated Carbon for Water Filtration: How does it work?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;864&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;Activated carbon has been in the market for quite a long time. But, you must have been wondering why the very same ingredient is being used for a range of applications. Activated carbon can be used for aspects such as water filtration, teeth whitening, medical applications, and even as a critical element for life support in the outer space.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;858&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;Activated carbon today has become a critical component for applications in a range of sectors, which include cosmetic, medical, as well as agriculture. The most popular is the use of &lt;/span&gt;&lt;a data-dcnode-id=&quot;860&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.keiken-engineering.com/en/activated-carbon/&quot;&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;activated carbon for water&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;. This versatile product is crucial for the filtration of water in the best possible way.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;855&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;So, what makes this ingredient so immensely effective?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;852&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;In this blog, we will talk about the unique features of using activated carbon &amp;amp; why it is an optimum choice for filtration of water.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;848&quot; style=&quot;text-align: justify;&quot;&gt;&lt;a data-dcnode-id=&quot;849&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Activated_carbon&quot;&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;Activated Carbon: What is it?&lt;/span&gt;&lt;/a&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;845&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;Also popular by the name, “Activated Charcoal,” this ingredient is a variant of carbon that undergoes processing to possess a massive surface area. The tiny &amp;amp; low-volume carbon pores present within the surface allows for proper absorption &amp;amp; several variants of chemical reactions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;842&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;A gram of the activated carbon houses more than 32,000 ft2 surface area. This means one teaspoon of activated carbon will comprise roughly one large football field area. This area coverage makes this compound extremely useful in a range of day-to-day applications. However, you can initiate more chemical treatment for the activated carbon in order to increase the absorbing properties.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;841&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;839&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;The activated carbon particles are usually derived from any carbonaceous source available. Common examples of such sources include bamboo, wood, willow peat, sawdust, peach pits, coconut shell, petroleum pitch, coir, and so on. However, one needs to keep in mind that the activated carbon for water filtration isn’t the same as the activated carbon.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;836&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;Activated carbon is created by two different methods which include:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;823&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;833&quot; instrument_node=&quot;&quot;&gt;1- Thermal Activation&lt;/span&gt;&lt;br data-dcnode-id=&quot;832&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;
In the thermal activation method, the prime material used is converted by the help of hot gases. Once the material is exposed to enough heat, it is introduced to steam in order to help enlarge the pores.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;825&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;2- Chemical Activation:&lt;/span&gt;&lt;br data-dcnode-id=&quot;827&quot;&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;
In the chemical activation process, certain chemicals are introduced to your source material right before carbonization starts. Generally, the chemical which is used for this process is either a strong acid, base, or even salt. After this, the material can be exposed to high heat &amp;amp; hence the activation process becomes quicker.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;820&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;How does the filter with Activated Carbon work?&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;814&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;818&quot; instrument_node=&quot;&quot;&gt;The effectiveness of &lt;/span&gt;&lt;a data-dcnode-id=&quot;816&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.keiken-engineering.com/en/activated-carbon/&quot;&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;activated carbon for water&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt; filtration is mostly due to its large surface area. Physical absorption serves as the prime method for filtering out any constituent from a given substance with the use of activated carbon.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;811&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;Apart from physical adsorption, activated carbon can also be used for the facilitation of chemical reactions. The most common example of the same involves the use of chlorine molecules. As the chlorine gets close to activated carbon, the molecules in both react to create chloride ions. This helps with the effective removal of chlorine from the water.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;808&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;The overall amount of contaminants that can be removed by activated carbon for water or air completely depends on various factors. This includes the amount and type of pollutant, water/air temperature, acidity, and the time for which air/water is exposed to activated carbon.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;805&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;The specific variant of the activated carbon used for the process can also determine the amount of filtration you will experience. Carbon molecules that come with massive holes can trap in the big &amp;amp; heavy molecules in the pollutant like the ones found within organic chemicals. On the other hand, fine and small pores help pick up the lighter and smaller contaminants. Manufacturers for activated carbon for water filtration tend to label all their products as per their overall absorption potential.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;802&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;Activated Carbon Filter: Types&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;796&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;As of now, there are two variants of &lt;/span&gt;&lt;a data-dcnode-id=&quot;798&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.keiken-engineering.com/en/how-activated-carbon-used-water-treatment/&quot;&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;activated carbon that can be used for the purpose of water filtration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot;&quot;&gt;. These two variants include the PAC (Powdered Activated Carbon) and the GAC (Granular Activated Carbon). In general, the PACs have a smaller molecule size as compared to GAC. PACs are generally more efficient when it comes to removing a range of prominent impurities from water.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;774&quot;&gt;&lt;span data-dcnode-id=&quot;794&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;788&quot;&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;1-GAC Filters:&lt;/span&gt;&lt;br data-dcnode-id=&quot;792&quot;&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;
Also termed as the “Fixed-Bed Carbon Filters,” the GAC filters comprise of cylindrical containers consisting of GAC particles. In this filter, water is poured into the container &amp;amp; as water flows via the system, your activated carbon particles help filter out the impurities.&lt;/span&gt;&lt;br data-dcnode-id=&quot;790&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;
However, channeling can be a common issue with the GAC filters. Now, as the water enters through the chamber, the path with the least resistance is followed. This leads to underutilization of the carbon particles which might reduce the overall filtering efficiency. So, if you are looking for large scale activated carbon for water filtration, you might not consider this option.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;776&quot;&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;2- Carbon Block Filters:&lt;/span&gt;&lt;br data-dcnode-id=&quot;785&quot;&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;
These filters are comprised of densely packed GAC and PAC particle blocks that vary in size. Here, water passes through the carbon block pores &amp;amp; as they travel through a carbon filter, the tiny particles can help remove a range of contaminants.&lt;/span&gt;&lt;p data-dcnode-id=&quot;783&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;777&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;The main advantage of using the block filters as opposed to the GAC filters boils down to channeling elimination. In the block filters, particles tend to be stationary &amp;amp; each of the particles can be used to provide maximum effectiveness with &lt;/span&gt;&lt;a data-dcnode-id=&quot;779&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.keiken-engineering.com/en/activated-carbon/&quot;&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;activated carbon for water&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt; filtration.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;771&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;What does your activated carbon filter help remove?&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;768&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;Activated carbon for water can help remove pollutants such as:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;738&quot;&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;Pesticides&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;Organic contaminants&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;758&quot;&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;Herbicides&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;755&quot;&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;Chlorine&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;752&quot;&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt;VOCs&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;749&quot;&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;Asbestos&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;746&quot;&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;Arsenic&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;Radon&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;740&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;Mercury&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;735&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;Conclusion&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;732&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;Filters with activated carbon are even used in industries that are in constant need of water. This extra amount of water comes from the recycling of the contaminated one. A properly devised activated carbon filtration system can target pollutants without actually stripping the beneficial compounds present in water. This can help make your water healthy and safe for drinking or other day-to-day activity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;
