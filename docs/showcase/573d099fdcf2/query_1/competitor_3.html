&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;533&quot;&gt;&lt;span data-dcnode-id=&quot;534&quot; instrument_node=&quot;&quot;&gt;Overview&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;530&quot;&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;Canadian researchers work with international colleagues to pursue new  knowledge, technologies, and solutions to complex problems. These  collaborations strengthen research excellence in Canada and abroad, and NSERC recognizes the need to support  engagement with international collaborators to further develop areas of  Canadian research strength and leadership. By  combining the expertise of Canadian and leading international researchers, it  is expected that Canadian researchers will leverage  the best international knowledge to help address important research challenges in the natural  sciences and engineering&amp;nbsp;(NSE) disciplines and will provide trainees with  an outstanding research environment. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;527&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;Objectives&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;524&quot;&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;				    Alliance International will provide support for researchers in Canada to  work with leading international researchers from the academic sector, and to  establish and grow international research collaborations and projects that have  a high potential for impact in NSE disciplines. The overall objectives are to:  1)&amp;nbsp;allow Canadian researchers to initiate the development of international  collaborations; and 2)&amp;nbsp;provide support for Canadian researchers  participating in international collaborative projects of global importance and  benefit to Canada. Two&amp;nbsp;grant types are offered: Catalyst grants and  Collaboration grants.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;521&quot;&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt;Alliance International Catalyst grants&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;518&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;				    Catalyst grants will provide funding for one  year to support Canadian researchers in initiating international research collaborations in the NSE disciplines. These grants will allow Canadian  researchers to identify and initiate the first stage of collaboration with the  intent of &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;list-noindent&quot; data-dcnode-id=&quot;509&quot;&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;514&quot;&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;supporting  exploratory research activities&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;511&quot;&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;initiating  exchanges for Canadian personnel where appropriate&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;508&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;506&quot;&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;Alliance  International Collaboration grants&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;503&quot;&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;                    Collaboration grants will allow Canadian researchers  to participate in international projects and leverage the best international  expertise in the NSE disciplines to help address research challenges of impact and benefit for Canada.  International academic collaborators are expected to have already secured  funding from their own national  funding agency for the collaborative project and identified the Canadian  academic researcher(s) in their proposal. This proposal must have been  peer-reviewed. The eligible Canadian researchers participating in the  international project can then apply for a Collaboration grant to cover the costs of their participation in the global-scale  project. The funding obtained by the international academic collaborator(s)  will be recognized for cost sharing. This funding must be at least equal to the  amount requested from NSERC. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;500&quot;&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;These grants cannot be used to support  secret or contract research, nor can they be used to support the work or  expenses incurred by the international collaborator(s). &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;491&quot;&gt;&lt;span data-dcnode-id=&quot;498&quot; instrument_node=&quot;&quot;&gt;At all times, Canadian researchers are encouraged to exercise appropriate  levels of due diligence when managing their research and establishing and/or  continuing partnerships with national, international and multinational  organizations. Resources to do so are provided by the Government of Canada on  the &lt;/span&gt;&lt;a class=&quot;ico-extlink&quot; data-dcnode-id=&quot;496&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//science.gc.ca/eic/site/063.nsf/eng/h_97955.html&quot;&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;Safeguarding Your Research&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;495&quot; instrument_node=&quot;&quot;&gt; portal, including the  &lt;/span&gt;&lt;a class=&quot;ico-extlink&quot; data-dcnode-id=&quot;493&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//science.gc.ca/eic/site/063.nsf/eng/h_98257.html&quot;&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;National Security Guidelines for Research Partnerships&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;492&quot; instrument_node=&quot;&quot;&gt;. NSERC reserves the right to request  additional information, as needed, before making a final funding decision.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;490&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;488&quot;&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;Who can apply?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;479&quot;&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;                  If you are a Canadian university researcher who  is &lt;/span&gt;&lt;a data-dcnode-id=&quot;484&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nserc-crsng.gc.ca/NSERC-CRSNG/Eligibility-Admissibilite/faculty-corpsprof_eng.asp&quot;&gt;&lt;span data-dcnode-id=&quot;485&quot; instrument_node=&quot;&quot;&gt;eligible&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt; to receive NSERC funds, you can apply on your own or as a team with  co-applicants who are also &lt;/span&gt;&lt;a data-dcnode-id=&quot;481&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nserc-crsng.gc.ca/NSERC-CRSNG/Eligibility-Admissibilite/faculty-corpsprof_eng.asp&quot;&gt;&lt;span data-dcnode-id=&quot;482&quot; instrument_node=&quot;&quot;&gt;eligible&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;480&quot; instrument_node=&quot;&quot;&gt; academic researchers. You and any Canadian co-applicants must have an active  NSERC peer-reviewed grant, as primary applicant, at the time of application. There is no requirement for partner organizations or contributions from partner  organizations for this funding opportunity. However, at the time of application,  you must identify at least one international academic researcher with whom you  will collaborate. In the case of an Alliance International Collaboration grant,  your international collaborator must have secured funding from their own  funding agency at the time of your application to NSERC. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;nohover&quot; data-dcnode-id=&quot;468&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nserc-crsng.gc.ca/Innovate-Innover/AllianceInternational-AllianceInternational/Partners-Partenaires_eng.asp&quot;&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt;
