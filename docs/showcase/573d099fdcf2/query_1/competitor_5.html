&lt;/span&gt;&lt;h2 class=&quot;gb-headline gb-headline-98637e69&quot; data-dcnode-id=&quot;447&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;Members of the Dutch Global Health Alliance&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;gb-headline gb-headline-23ca4fcc&quot; data-dcnode-id=&quot;411&quot; id=&quot;intro&quot;&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;The members of the Dutch Global Health Alliance (&lt;/span&gt;&lt;a data-dcnode-id=&quot;443&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//accesstomedicinefoundation.org/&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;Access to Medicine Foundation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;440&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.aidsfonds.org/&quot;&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;Aidsfonds&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;437&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.amref.nl/home&quot;&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;Amref Flying Doctors&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;434&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cordaid.org/en&quot;&gt;&lt;span data-dcnode-id=&quot;435&quot; instrument_node=&quot;&quot;&gt;Cordaid&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;,&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;431&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.kit.nl/&quot;&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;KIT Royal Tropical Institute&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt;,&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;428&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.kncvtbc.org/&quot;&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;KNCV Tuberculosis Foundation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;427&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;425&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//nlrinternational.org/&quot;&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;NLR&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;422&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nvtg.org/&quot;&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;NVTG&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;419&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pharmaccess.org/&quot;&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt;PharmAccess&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;416&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.vluchteling.nl/&quot;&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;Stichting Vluchteling&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;413&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.wemos.nl/en/&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;Wemos&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt;) are dedicated to raising awareness about the need for more concerted global health action and to working towards concrete policy options for the Dutch government that will contribute to stronger health systems worldwide.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;410&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;gb-inside-container boldgrid-section&quot; data-dcnode-id=&quot;365&quot;&gt;&lt;span data-dcnode-id=&quot;407&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;gb-headline gb-headline-98637e69&quot; data-dcnode-id=&quot;405&quot;&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt;A Dutch Global Health Strategy: linking national and international policies for health for all&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;404&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;402&quot;&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;The COVID-19 pandemic has shown again that viruses do not know borders. The health of people in one place is dependent upon the health of people elsewhere. We are all currently confronted with the disastrous consequences of COVID-19, and with the aggravation from the measures taken, to control its spread. Not only is global public health and health security are at stake, but also economic and social stability are jeopardized, with the livelihood of millions of people worldwide under severe and increasing pressure.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;399&quot;&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt;This global health crisis clearly demonstrates the centrality of health in all our lives and its influence upon different areas of our societies. It cannot be any more apparent, that we require an integral, overarching, multi-sectoral approach, in dealing with this virus. Therefore, The Netherlands must develop a global health strategy, which takes all these dimensions of health into account. Only in this way, we can initiate and nurture sustainable solutions against the current health crisis and offer a roadmap in preventing future ones.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;398&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;393&quot;&gt;&lt;span data-dcnode-id=&quot;397&quot; instrument_node=&quot;&quot;&gt;The Dutch Global Health Alliance (DGHA) has taken this first step, by developing a &lt;/span&gt;&lt;a data-dcnode-id=&quot;395&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.dutchglobalhealthalliance.org/wp-content/uploads/2021/02/DGHA-Global-Health-Strategie-februari-2021.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;396&quot; instrument_node=&quot;&quot;&gt;document&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt; that offers a clear direction for such a strategy. The document highlights the principles, elements and processes needed to develop a strong global health strategy for the Netherlands.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;392&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;384&quot;&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;Member of Parliament Anne Kuik (CDA) is driving the parliamentary call for the Netherlands to develop such a strategy. In an earlier &lt;/span&gt;&lt;a data-dcnode-id=&quot;389&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tweedekamer.nl/kamerstukken/moties/detail%3Fid%3D2020Z23498%26did%3D2020D49542&quot;&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;motion&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;388&quot; instrument_node=&quot;&quot;&gt; filed December 2020, she called upon the government to prepare a study that would look into the added value and opportunities of a Dutch Global Health Strategy. This motion was adopted with a large majority of votes. In addition, the House of Representatives will decide this Thursday 25th of February, on whether to &lt;/span&gt;&lt;a data-dcnode-id=&quot;386&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tweedekamer.nl/kamerstukken/moties/detail%3Fid%3D2020Z23498%26did%3D2020D49542&quot;&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt;request an official advice from the Advisory Council on International Affairs (AIV)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt; for the need of such a global health strategy. This would be a great next step in moving towards an integral strategy which not only looks at the current pandemic, but at making us safer against any future ones.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;383&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;381&quot;&gt;&lt;span data-dcnode-id=&quot;382&quot; instrument_node=&quot;&quot;&gt;The DGHA will continue to work closely together with all stakeholders involved in the development of a future Dutch Global Health Strategy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;380&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;377&quot;&gt;&lt;a data-dcnode-id=&quot;378&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.dutchglobalhealthalliance.org/wp-content/uploads/2021/11/DGHA_Reation_To_COVAX_Donation.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;Read the DGHA reaction to the recent donation to the COVAX initiative by the Dutch Government (English and Dutch).&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;gb-headline gb-headline-fa532c48&quot; data-dcnode-id=&quot;374&quot;&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;Co-Creation Conference Policy Brief to the Advisory Council on International Affairs&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p class=&quot;&quot; data-dcnode-id=&quot;284&quot;&gt;&lt;span data-dcnode-id=&quot;285&quot; instrument_node=&quot;&quot;&gt;Education and Remuneration to Ensure Retention&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;&quot; data-dcnode-id=&quot;281&quot;&gt;&lt;span data-dcnode-id=&quot;282&quot; instrument_node=&quot;&quot;&gt;On Friday 4 December 2020, the Dutch Global Health Alliance organized an online panel discussion entitled ‘Investing in Health Workers’. The aim was to provide the Dutch government with recommendations to further develop their investments in the health workforce.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;&quot; data-dcnode-id=&quot;278&quot;&gt;&lt;span data-dcnode-id=&quot;279&quot; instrument_node=&quot;&quot;&gt;The panel consisted of an interesting mix of professionals from different sectors, with a shared passion for the health workforce, namely: Margaret Kilonzo (community health worker in Africa’s biggest slum: Kibera, Nairobi, Kenya), Maisa Elfadul (researcher and health systems analyst from Sudan), Ghassan Karem (physician and director of the Primary Health Care Institute in Libya) and Noortje Verhart (SRHR Portfolio Manager at the Dutch Embassy in Bamako, Mali). They each brought in their valuable and complementary perspectives on health workforce strengthening and their perceptions on the role of donors, which resulted in a fruitful and lively debate. This document linked below offers a summary of the discussion and the key recommendations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;277&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h3 class=&quot;gb-headline gb-headline-fa532c48&quot; data-dcnode-id=&quot;224&quot;&gt;&lt;span data-dcnode-id=&quot;225&quot; instrument_node=&quot;&quot;&gt;Webinar: Local Data, Local Decisions&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;223&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;&quot; data-dcnode-id=&quot;221&quot;&gt;&lt;span data-dcnode-id=&quot;222&quot; instrument_node=&quot;&quot;&gt;The first webinar by the alliance took place on July 2, 2020, and taught about how data works and should work in global health.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;220&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;&quot; data-dcnode-id=&quot;218&quot;&gt;&lt;span data-dcnode-id=&quot;219&quot; instrument_node=&quot;&quot;&gt;Many Dutch development organisations and knowledge institutes are working with low- and middle-income countries to promote the use of subnational data as a means of encouraging locally-tailored decision-making in public health.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;&quot; data-dcnode-id=&quot;215&quot;&gt;&lt;span data-dcnode-id=&quot;216&quot; instrument_node=&quot;&quot;&gt;In light of the COVID-19 pandemic, the value of doing this is clearer than ever: when lockdowns are imposed across an entire country, without nuance to reflect local variations in the epidemic, people and economies suffer more than necessary.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;214&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;&quot; data-dcnode-id=&quot;203&quot;&gt;&lt;span data-dcnode-id=&quot;213&quot; instrument_node=&quot;&quot;&gt;In this webinar – led by three alliance members &lt;/span&gt;&lt;a data-dcnode-id=&quot;211&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cordaid.org/en/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;212&quot; instrument_node=&quot;&quot;&gt;Cordaid&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;210&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;208&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.kit.nl/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;209&quot; instrument_node=&quot;&quot;&gt;KIT Royal Tropical Institute&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;207&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;205&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.kncvtbc.org/en/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;206&quot; instrument_node=&quot;&quot;&gt;KNCV Tuberculosis Foundation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;204&quot; instrument_node=&quot;&quot;&gt; – country partners from Ethiopia, Pakistan and Rwanda shared their experiences with and perceptions of subnational data for health planning, including lessons learned from previous public health emergencies like the tuberculosis epidemic.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;202&quot; instrument_node=&quot;&quot;&gt;
