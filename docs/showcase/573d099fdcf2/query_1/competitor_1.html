&lt;/span&gt;&lt;p data-dcnode-id=&quot;1236&quot;&gt;&lt;span data-dcnode-id=&quot;1237&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1228&quot;&gt;&lt;strong data-dcnode-id=&quot;1233&quot;&gt;&lt;u data-dcnode-id=&quot;1234&quot;&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;How can diplomacy contribute to the enhancement of security in the&amp;nbsp;&lt;/span&gt;&lt;/u&gt;&lt;/strong&gt;&lt;strong data-dcnode-id=&quot;1230&quot;&gt;&lt;u data-dcnode-id=&quot;1231&quot;&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;International system? Please carry out an in-depth analysis of at least one case study.&lt;/span&gt;&lt;/u&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1226&quot;&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt;Diplomacy has gone a long way towards the enhancement of security in the international system and its potential to continue to do so is substantial. Diplomacy has served to diffuse many of the situations where countries’ diametrically opposed viewpoints have posed a threat to world security. Diplomatic actors have learnt lessons and have been able to refine the diplomatic strategies used to manage international security through their involvement in the resolution of situations where security in the international system has been threatened. Take for example the Cuban Missile Crisis, where diplomatic efforts averted a nuclear catastrophe in the height of the Cold War. More recently, multi-lateral diplomatic efforts have diffused the substantial threat posed by the ambitions of the North Koreans to expand their nuclear capabilities. At the time of writing, diplomatic efforts are fervently attempting to resolve the growing threat of military strikes against Iran. In can be argued therefore, that in the face of globalisation, the security of the world is increasingly linked to reliable systems of communication and trust between nation states; systems which are sustained through diplomacy. &lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;alert alert-light border-0 my-3&quot; data-dcnode-id=&quot;1212&quot; data-nosnippet=&quot;data-nosnippet&quot; data-track=&quot;In-Content Banner 1&quot;&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;card-body text-dark text-center&quot; data-dcnode-id=&quot;1214&quot;&gt;&lt;span data-dcnode-id=&quot;1224&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;h3 pb-2&quot; data-dcnode-id=&quot;1222&quot;&gt;&lt;span data-dcnode-id=&quot;1223&quot; instrument_node=&quot;&quot;&gt;Get Help With Your Essay&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;lead&quot; data-dcnode-id=&quot;1219&quot;&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;If you need assistance with writing your essay, our professional essay writing service is here to help!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;btn btn-dark btn-md&quot; data-dcnode-id=&quot;1216&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ukessays.com/services/essay-writing-service.php&quot;&gt;&lt;span data-dcnode-id=&quot;1217&quot; instrument_node=&quot;&quot;&gt;Essay Writing Service&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1211&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1209&quot;&gt;&lt;span data-dcnode-id=&quot;1210&quot; instrument_node=&quot;&quot;&gt;This is not to say that diplomacy is an infallible tool which can be used to enhance security at international level. One only has to look at the failure of diplomatic efforts to avert the war in Iraq, the continued negotiations between Israel and the PLO and those diplomatic efforts which failed to resolve the tension in the Balkans before civil war erupted in order to evidence this viewpoint. However, when considered in overall terms diplomacy has made great inroads in the enhancement of security internationally and has the potential to continue to do so. Perhaps it can be argued that diplomacy is not always a reactionary method of averting crisis; it has an all important role in increasing global security in a pre-emptive way as well. Therefore, diplomacy when understood ‘in the round’ is the lifeblood of any system of trust and communication which is intended to enhance security in the international system, and diplomacy therefore contributes greatly to the enhancement of security in the international system.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1207&quot;&gt;&lt;span data-dcnode-id=&quot;1208&quot; instrument_node=&quot;&quot;&gt;To understand diplomacy and how it contributes to the enhancement of security in the international system, it is perhaps wise to ask the following questions: what is the exact definition of diplomacy?; what is the exact definition of security?; and; how exactly does diplomacy enhance security in the international system? These questions will be addressed during the course of this essay. Also, in terms of analysing how exactly diplomacy can enhance security in the international system it is perhaps useful to explain the role of agencies and alliances like to IAEA, NATO, the EU, the United Nations and the Security Council which promote the enhancement of security internationally by relying on diplomatic efforts. These agencies will be looked at, and their roles will be explained during the course of the essay. Most importantly however are the theoretical underpinnings of why and how diplomacy functions, and these will be addressed in the essay. The theories of Realism and Neo-Realism will be examined in the context of diplomacy and security enhancement in an international context as they are useful springboards to help explain the concept of diplomacy and human interaction at the most basic of levels. A case study will be looked at in the essay and it will be explained in relation to the above mentioned issues. The subject of the case study will be North Korea and the diplomatic efforts that have served to avert what was potentially a nuclear crisis.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1205&quot;&gt;&lt;span data-dcnode-id=&quot;1206&quot; instrument_node=&quot;&quot;&gt;As Fierke (2005) observes, diplomacy can be described as negotiation in an international setting that is often conducted by a mediator who acts as a go-between between the actors seeking to reach agreement. Diplomacy requires subtle and sophisticated communication strategies as well as statesmanship and a good understanding of public affairs. Security is the state of being free from injury and immediate danger. Most situations which pose a threat to international security and which call for diplomatic efforts require ad hoc responses at differing levels from those best equipped and best positioned to intervene diplomatically. No country would find it easy to achieve diplomatic objectives alone, and this fact is evidenced by the existence and the successes of international agencies and alliances which promote diplomatic relations and interventions. The agencies often have common objectives and often act together in order to achieve these. The International Atomic Energy Agency exists to scrutinise the security threats that may be posed by countries who wish to advance their nuclear weapons programs. It has a supervisory as well as a diplomatic function. The European Union, first established to promote economic stability in Western European Countries, has expanded to serve an increasingly diplomatic function. Alliances like the North Atlantic Treaty Organisation (NATO) have more peace-keeping responsibilities and are frequently called upon to preserve peace, so that diplomatic efforts can continue in situations of political and military instability. The United Nations and the Security Council have perhaps the most significant roles, when compared to the rest of these agencies. These organisations were formed to engender peace and diplomacy in a global context, and they have particular powers for example, the power to impose sanctions on those countries that are considered to be posing a threat to international security. The diplomatic deployment of these agencies can contribute and has contributed to the enhancement of security in the international system.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1199&quot;&gt;&lt;span data-dcnode-id=&quot;1204&quot; instrument_node=&quot;&quot;&gt;However, to fully understand the function of diplomacy and how it can enhance security in the international system, it is useful to take a speculative look at how the world might work in the absence of diplomacy. A good place to start in this endeavour is perhaps to examine the theories of Realism and Neo-Realism and how they relate to the ideas of international security and diplomacy. Realism and Neo-Realism are discourses which seek to explain how power in the context of international relations may be seen through the lens of human propensity. They may help one to rationalise diplomacy as they seek to explain human nature and how this idea influences the accrual and preservation of power in the international system. Machiavellian adages such as ‘better feared than loved’ explain the classical realists’ viewpoint that power is, simply, the prize of those who inspire fear in others most effectively&lt;/span&gt;&lt;a data-dcnode-id=&quot;1201&quot; href=&quot;#_edn1&quot; rel=&quot;nofollow&quot;&gt;&lt;sup data-dcnode-id=&quot;1202&quot;&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;[i]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;. Morgenthau, a classical realist suggested that:
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1197&quot;&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt;i)International relations is propelled by a set of objective, rational laws that reflect unchanging human nature;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1195&quot;&gt;&lt;span data-dcnode-id=&quot;1196&quot; instrument_node=&quot;&quot;&gt;ii)Interest is ‘defined in terms of power’ and therefore international politics must be understood as operating outside the spheres of moral and ethical concerns;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;iii)The definition of interest in terms of power is universally true and remains a consistent point of reference which can be used to understand events in international politics;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1191&quot;&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;iv)National interest takes precedence over moral concerns, and therefore states are permitted to act rationally, at all times in order to protect national interests;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1189&quot;&gt;&lt;span data-dcnode-id=&quot;1190&quot; instrument_node=&quot;&quot;&gt;v)States try to behave morally. However, immoral actions can be pursued in the national interest;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1187&quot;&gt;&lt;span data-dcnode-id=&quot;1188&quot; instrument_node=&quot;&quot;&gt;vi) Political considerations must be understood singularly, as a primary concern, because interest is defined in terms of power.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1185&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;The theory of Realism therefore regards power as a dynamic that cannot exist independently of human characteristics such as selfishness and competitiveness. Realists would also argue that power must be relinquished if one pursues a course of action which does not involve behaving selfishly, competitively and ruthlessly. Therefore, a realist would argue that diplomacy cannot contribute to the enhancement of security in the international system as the theory of Realism assumes that the pursuit of diplomacy is not only axiomatic to the effective accrual of power, but sees benevolence and diplomacy as both pointless and naive.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1183&quot;&gt;&lt;span data-dcnode-id=&quot;1184&quot; instrument_node=&quot;&quot;&gt;Neo-Realism on the other hand has a more sophisticated view of how diplomacy can contribute to the enhancement of security in the international system. It has evolved as a more contemporary, more widely accepted rationale and explains power and international security by focusing more on the role of international states in politics, than on the role of human nature. Neo-Realism explains the distribution of power internationally in terms of anarchy, and the absence of centralised authority structures. In the absence of these central authority structures, international actors are forced to follow a route of self preservation which involves behaving competitively, and involves using diplomatic skills like co-operation if these serve to augment their security relative to other states. Therefore when North Korea announced that it intended to withdraw from the thirty-two year old nuclear Non-Proliferation Treaty (NPT) in 2003, neo-realist diplomacy is largely what led to their recent announcement that they would cease their nuclear proliferation objectives in exchange for compensation. The North Koreans have also stated that is it important to maintain a good relationship with the United States. However, how has this diplomatic success story enhanced security in the international system?
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1181&quot;&gt;&lt;span data-dcnode-id=&quot;1182&quot; instrument_node=&quot;&quot;&gt;The answer is that diplomacy enhances security in the international system by identifying and building channels of communication with extremist regimes and other international actors who could pose a potential threat to international security. International security is enhanced by identifying what the best ways to communicate with these actors are. Evidence to support this viewpoint can be seen by again turning to look at the situation in North Korea. North Korea has long been an insular regime, devoted to the rejection of Western values and traditions. George W Bush has even identified North Korea as being part of the ‘axis of evil’ described in a now famous speech about the ‘war on terror’. However, Western diplomacy and communication with North Korea is not something that came about simply to resolve the 2003 nuclear crisis. Diplomacy has been a long running strategy between North Korea and the West. For example, the diplomatic efforts that helped to diffuse the historical long running tension between North and South Korea have created the diplomatic bedrock which was capitalised upon when the 2003 North Korean nuclear crisis emerged. The multi-lateral discussions that led to the eventual resolution of the crisis involved Japan and South Korea; countries that the West has spent years building diplomatic channels of communication with. It is important therefore to understand that diplomacy is not just about communication strategies or strategies that come into play as a reaction to a crisis; diplomacy is about the forming and preserving of relationships and the building of trust and co-operation between international states. It is only when diplomacy is understood in this context that the writer’s argument that diplomacy can contribute to the enhancement of security in the international system gains credibility.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1179&quot;&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;To conclude, it has been argued in this essay that diplomacy can contribute in many ways to the enhancement of security in the international system. Past diplomatic initiatives and past diplomatic successes have been examined and extrapolated in support of this argument. North Korea has been used as a case study to illustrate the writer’s argument. The theoretical relationships between diplomacy, power, international security and human nature have been examined in depth by looking at the theories of Realism and Neo-Realism, and this helped to explain the growing importance of sophisticated diplomatic strategies in enhancing security in the international system. Most importantly this emphasis served to explain and illustrate the many ways in which diplomacy can contribute to the enhancement of security in the international system.
