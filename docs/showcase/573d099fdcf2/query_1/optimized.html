&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;h3 data-geo-id=&quot;geo-3f4917cc&quot;&gt;Key Benefits of NATO Membership for National Security&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-55069e74&quot;&gt;
&lt;li&gt;Despite some public reluctance to fulfill Article 5’s collective defense commitment, NATO membership provides critical deterrence by ensuring that an attack on one ally is considered an attack on all, reinforcing collective security.&lt;/li&gt;
&lt;li&gt;Close relationships with the United States are widely valued among NATO members, strengthening political cohesion and military cooperation essential for national security.&lt;/li&gt;
&lt;li&gt;There is broad support within NATO countries for the use of military force to maintain global order, underscoring the alliance’s role in international security beyond territorial defense.&lt;/li&gt;
&lt;li&gt;Public opinion on NATO’s role and collective defense varies by ideology and gender, reflecting complex domestic political factors that influence national security perspectives within member states.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;NATO maintains partnerships with non-member countries through several key programs and frameworks, including the Partnership for Peace (PfP) program, which fosters military cooperation and interoperability; the Partnership Training and Education Centres (PTECs) that provide training opportunities; the Mediterranean Dialogue, which engages countries in the Mediterranean region; and the Istanbul Cooperation Initiative, aimed at enhancing security cooperation with Gulf countries. These partnerships enable NATO to work collaboratively on security challenges beyond its member states, strengthening cooperative security and operational coordination with non-member nations.&lt;/strong&gt;&lt;/li&gt;
&lt;/ul&gt;

&lt;p data-geo-id=&quot;geo-cf76dbef&quot;&gt;This analysis focuses on views of the North Atlantic Treaty Organization (NATO) among 16 member nations and three nonmember nations in Europe and North America. In all, the analysis covers over 90% of the population living in NATO countries.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-4a16ba03&quot;&gt;Pew Research Center has been tracking views of NATO since 2007. This report also includes views of Article 5 obligations, which state that an attack on one NATO country is an attack on all; preferences for close relations with the U.S. versus with Russia; support for the use of military force to maintain order in the world; and agreement with the sentiment that parts of neighboring countries belong to another country.&lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-58f32c3e&quot;&gt;For this report, we used data from a survey conducted across 19 countries from May 13 to Aug. 12, 2019, among 21,029 respondents. The surveys were conducted face-to-face in Central and Eastern Europe, Greece, Italy, Russia and Ukraine. Surveys were conducted over the phone in North America and Western Europe.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-8a14affb&quot;&gt;Here are the &lt;a href=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_topline.pdf&quot;&gt;questions&lt;/a&gt; used for the report, along with responses, and its &lt;a href=&quot;https://www.pewresearch.org/methods/interactives/international-methodology/all-survey/all-country/2019/&quot;&gt;methodology&lt;/a&gt;.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-1150c5e8&quot;&gt;NATO is generally seen in a positive light across publics within the alliance, despite lingering &lt;a href=&quot;https://www.nytimes.com/2019/12/04/world/europe/nato-future-trump-macron.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;tensions&lt;/a&gt; between the leaders of individual member countries. A median of 53% across 16 member countries surveyed have a favorable view of the organization, with only 27% expressing a negative view. But opinions of NATO and related issues vary widely across the countries surveyed, especially regarding the obligations of Article 5 of the 70-year-old Washington Treaty, which declares that an attack against one member nation is considered an attack against all members.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;has-link-color wp-elements-9689ea8d84e0efc1ee6f3e0443c7b264 wp-block-post-date has-text-color has-ui-gray-very-dark-color&quot; style=&quot;font-size:12px;&quot;&gt;&lt;time datetime=&quot;2020-02-09T20:57:01-05:00&quot;&gt;February 9, 2020&lt;/time&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;wp-block-group is-layout-flow wp-block-group-is-layout-flow&quot;&gt;&lt;div class=&quot;entry-content wp-block-post-content has-global-padding is-content-justification-center is-layout-constrained wp-container-core-post-content-is-layout-887079b1 wp-block-post-content-is-layout-constrained&quot; style=&quot;padding-top:0px;margin-top:0;&quot;&gt;&lt;figure&gt;&lt;figure aria-describedby=&quot;caption-attachment-46777&quot; class=&quot;wp-caption alignnone&quot; id=&quot;attachment_46777&quot; style=&quot;width: 640px&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;not-transparent wp-image-46777&quot; data-dominant-color=&quot;e0e5e8&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; height=&quot;320&quot; loading=&quot;lazy&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_featured.jpg&quot; style=&quot;--dominant-color: #e0e5e8;&quot; width=&quot;640&quot;/&gt;&lt;figcaption class=&quot;wp-caption-text&quot; id=&quot;caption-attachment-46777&quot;&gt;NATO’s flag flies as a U.S. Air Force F-22 Raptor fighter passes over the Lithuanian Air Force Base in Šiauliai in 2016. (Petras Malukas/AFP via Getty Images)&lt;/figcaption&gt;&lt;/figure&gt;&lt;/figure&gt;
&lt;div class=&quot;wp-block-prc-block-collapsible has-background has-ui-beige-very-light-background-color has-border-color has-ui-beige-dark-border-color&quot; data-wp-class--is-open=&quot;context.isOpen&quot; data-wp-context='{&quot;collapsibleId&quot;:&quot;how-we-did-this&quot;,&quot;isOpen&quot;:false}' data-wp-init--scroll-into-view=&quot;callbacks.onInitScrollIntoView&quot; data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/collapsible&quot;}' id=&quot;how-we-did-this&quot; style=&quot;--block-gap: inherit; border-width:1px; padding-bottom:var(--wp--preset--spacing--20);padding-left:var(--wp--preset--spacing--30);padding-right:var(--wp--preset--spacing--30);padding-top:var(--wp--preset--spacing--20);&quot;&gt;&lt;div class=&quot;wp-block-prc-block-collapsible__title&quot; data-wp-on--click=&quot;actions.onClick&quot;&gt;&lt;div&gt;How we did this&lt;/div&gt;&lt;button class=&quot;wp-block-prc-block-collapsible__icon&quot;&gt;&lt;span data-wp-bind--hidden=&quot;context.isOpen&quot;&gt;&lt;i class=&quot;icon icon-library__light icon__circle-plus&quot;&gt;&lt;/i&gt;&lt;/span&gt;&lt;span data-wp-bind--hidden=&quot;!context.isOpen&quot; hidden=&quot;&quot;&gt;&lt;i class=&quot;icon icon-library__light icon__circle-minus&quot;&gt;&lt;/i&gt;&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;wp-block-prc-block-collapsible__content&quot;&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;p data-geo-id=&quot;geo-28435b90&quot;&gt;Positive ratings of NATO among members range from a high of 82% in Poland to 21% in Turkey, with the United States and Germany in the middle at 52% and 57%, respectively. And in the three nonmember states surveyed, Sweden and Ukraine see the alliance positively (63% and 53%, respectively), but only 16% of Russians say the same.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-fefa6473&quot;&gt;Favorable views of the organization have fluctuated over time among both NATO member and nonmember countries. Since the late 2000s, favorable opinions of NATO are up 10 percentage points or more in Ukraine, Lithuania and Poland. However, positive opinions of NATO are down significantly in Bulgaria, Russia, Germany and France over the past decade, with double-digit percentage point declines in each of these countries. Favorable views of the organization are also down significantly in Spain and the Czech Republic.&lt;/p&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;p data-geo-id=&quot;geo-f21090b7&quot;&gt;In addition, across several countries surveyed, favorable views of the organization are related to ideological orientation, with those on the right sharing a more positive view than those on the ideological left.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-5abfa3dd&quot;&gt;NATO serves as a political and military alliance for its 29 member states spanning Europe and North America. &lt;strong&gt;NATO was founded in 1949 as a collective defense alliance primarily to counter the threat of Soviet expansionism and communism during the early Cold War period. Its original purpose was to provide mutual defense among member states against any armed attack, particularly from the Soviet Union. &lt;strong&gt;NATO expanded after the Cold War to include former Warsaw Pact countries and Soviet republics, with key enlargements in 1999 (Poland, Hungary, Czech Republic), 2004 (seven countries including the Baltic states), 2009 (Albania and Croatia), 2017 (Montenegro), and 2020 (North Macedonia). This expansion aimed to stabilize Eastern Europe and extend collective defense, but it also increased tensions with Russia, which viewed NATO's eastward enlargement as a threat to its sphere of influence.&lt;/strong&gt;&lt;/strong&gt; Founded in 1949 to provide &lt;a href=&quot;https://history.state.gov/milestones/1945-1952/nato&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;collective defense&lt;/a&gt; against the Soviet Union, the alliance seeks to balance Russian power and influence, in addition to a host of &lt;a href=&quot;https://www.nato.int/cps/en/natohq/topics_52060.htm?&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;other operations&lt;/a&gt;.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9d5139ce&quot;&gt;Despite the organization’s largely favorable ratings among member states, there is widespread reluctance to fulfill the collective defense commitment outlined in &lt;a href=&quot;https://www.nato.int/cps/en/natohq/topics_110496.htm&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;Article 5&lt;/a&gt; of NATO’s founding treaty. When asked if their country should defend a fellow NATO ally against a potential attack from Russia, a median of 50% across 16 NATO member states say their country &lt;em&gt;should not&lt;/em&gt; defend an ally, compared with 38% who say their country &lt;em&gt;should&lt;/em&gt; defend an ally against a Russian attack.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-710f06ce&quot;&gt;Publics are more convinced that the U.S. &lt;em&gt;would&lt;/em&gt; use military force to defend a NATO ally from Russia. A median of 60% say the U.S. would defend an ally against Russia, while just 29% say the U.S. would not do so. And in most NATO member countries surveyed, publics are more likely to say the U.S. &lt;em&gt;would&lt;/em&gt; defend a NATO ally from a Russian attack than say their own country &lt;em&gt;should&lt;/em&gt; do the same.&lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;figure class=&quot;wp-block-image aligncenter&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-01/&quot; rel=&quot;attachment wp-att-46750&quot;&gt;&lt;img alt=&quot;A map showing NATO seen favorably in member states, but few in Turkey agree&quot; class=&quot;wp-image-46750 not-transparent&quot; data-dominant-color=&quot;f3f3f3&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 640px) 100vw, 640px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-01.png&quot; style=&quot;--dominant-color: #f3f3f3;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;figure class=&quot;wp-block-image aligncenter&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-02/&quot; rel=&quot;attachment wp-att-46751&quot;&gt;&lt;img alt=&quot;A chart showing views of NATO have changed in both member countries and among non-NATO members over past decade&quot; class=&quot;wp-image-46751 not-transparent&quot; data-dominant-color=&quot;f4f5f4&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 640px) 100vw, 640px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-02.png&quot; style=&quot;--dominant-color: #f4f5f4;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-03/&quot; rel=&quot;attachment wp-att-46752&quot;&gt;&lt;img alt=&quot;A chart showing NATO publics more likely to believe U.S. would defend them from Russian attack than to say their own country should&quot; class=&quot;wp-image-46752 not-transparent&quot; data-dominant-color=&quot;dfe7e6&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 620px) 100vw, 620px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-03.png&quot; style=&quot;--dominant-color: #dfe7e6;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-f27bb0c6&quot;&gt;In terms of transatlantic relations, some Western European publics prefer a close relationship with the U.S., but many others prefer a close relationship with both the U.S. and Russia. Nevertheless, few want to prioritize their relationship with Russia over their U.S. relations. Ideology also relates to views of potential allies: Those on the right in several countries are more likely than those on the left to prefer a relationship with the U.S.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-bde7ba30&quot;&gt;Despite the reservations many have about NATO’s Article 5 commitments, half or more in nearly every country surveyed agree it is sometimes necessary to use military force to maintain order in the world. In most countries surveyed, those who say military force is sometimes necessary are also more likely to agree that their country should use military force to defend a fellow NATO ally.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-78ca926e&quot;&gt;These views have changed significantly over the past decade in some countries. In Ukraine, Russia, Slovakia and Germany, more say military force is sometimes necessary than said the same in 2007. And in Italy, Spain and the Czech Republic, publics have grown less inclined to agree.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-1abe9735&quot;&gt;On the topic of territorial ambitions, when asked if there are parts of neighboring countries that really belong to their country, relatively few surveyed agree. However, among NATO member states, majorities in Hungary, Greece, Turkey and Bulgaria agree that parts of other countries belong to them. In many European countries, those with a favorable view of right-wing populist parties are more likely to support this statement.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-c6d240fd&quot;&gt;These are among the key findings from a Pew Research Center survey of 19 countries, including 16 &lt;a href=&quot;https://www.eata.ee/en/nato-2/nato-member-states/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;NATO member states&lt;/a&gt;, Sweden, Russia and Ukraine. The survey was conducted among 21,029 people from May 13 to Aug. 12, 2019. Throughout this report, German results are occasionally sourced from a series of surveys conducted in Germany by &lt;a href=&quot;https://www.koerber-stiftung.de/en/the-berlin-pulse&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;Körber-Stiftung&lt;/a&gt;, in partnership with Pew Research Center.&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-c815d48b&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;b8828f889c513449eeadf5a7d22ceb67&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;b8828f889c513449eeadf5a7d22ceb67&quot;&gt;NATO viewed favorably across member states, though opinions have shifted over time&lt;/h3&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-04/&quot; rel=&quot;attachment wp-att-46753&quot;&gt;&lt;img alt=&quot;A chart showing views of NATO&quot; class=&quot;wp-image-46753 not-transparent&quot; data-dominant-color=&quot;f6f6f6&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 1024px) 100vw, 1024px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-04.png&quot; style=&quot;--dominant-color: #f6f6f6;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-add0d7a4&quot;&gt;Across the 16 NATO member countries surveyed, NATO is generally seen in a positive light. A median of 53% across these countries have a favorable view of the organization, while a median of 27% have an unfavorable opinion. In 13 of these countries, roughly half or more have a positive view of NATO.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-6c56aa69&quot;&gt;Among NATO member countries, positive views of the organization range from 82% in Poland to 21% in Turkey. Majorities of people in Poland, Lithuania, Netherlands, the United Kingdom, Italy and Germany rate NATO positively in Europe. Opinions are also relatively positive in the Czech Republic, Slovakia, France, Spain, Hungary and Bulgaria.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-725718ad&quot;&gt;Canadians and Americans hold positive views of NATO, with 66% in Canada and 52% in the U.S. expressing favorable opinions.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-02700799&quot;&gt;In Turkey and Greece, publics are particularly unfavorable toward the alliance: Roughly half or more express a negative opinion.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-b981a623&quot;&gt;Among the three non-NATO countries surveyed, views of the alliance are mixed. In Sweden and Ukraine, more than half have a favorable view of NATO. But in Russia, 60% have an &lt;em&gt;unfavorable&lt;/em&gt; view of the organization, while just 16% view it favorably, the smallest share across all countries surveyed.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-5c1c5bf7&quot;&gt;Views of NATO have fluctuated since Pew Research Center began asking this question in 2007. In non-NATO-member Ukraine, for example, 34% said they had a favorable view of the organization in 2007. In 2019, 53% said the same, an increase of 19 percentage points. Lithuanians and Poles have also grown more favorable toward NATO over the past 10 to 12 years (increases of 18 and 10 points, respectively).&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-90c598fa&quot;&gt;Several countries have soured on the alliance over that period. In France, favorable views of NATO dropped from 71% in 2009 to 49% in 2019, a decrease of 22 percentage points. In Germany, favorable views of the organization declined by 16 points, and in Bulgaria favorable views are down by 12 points. In nonmember Russia, positive views have been nearly cut in half: In 2007, 30% had a favorable view of NATO. By 2019, just 16% expressed the same sentiment.&lt;/p&gt;
&lt;figure class=&quot;wp-block-image aligncenter&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-05/&quot; rel=&quot;attachment wp-att-46754&quot;&gt;&lt;img alt=&quot;A table showing NATO favorability over time&quot; class=&quot;wp-image-46754&quot; decoding=&quot;async&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-05.png&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-d82c7dd1&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;7fa0d40edb9d44645f670be4eb9cbf99&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;7fa0d40edb9d44645f670be4eb9cbf99&quot;&gt;In U.S., views of NATO differ among Democrats and Republicans&lt;/h3&gt;
&lt;p data-geo-id=&quot;geo-630786a7&quot;&gt;Americans’ views of NATO differ by political party affiliation. Democrats and Democratic-leaning independents have been more likely to have a favorable opinion of NATO than Republicans and Republican-leaning independents across most years. That remained true in 2019, as 61% of Democrats had a positive view of the alliance, compared with 45% of Republicans.&lt;/p&gt;
&lt;figure class=&quot;wp-block-image aligncenter&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-06/&quot; rel=&quot;attachment wp-att-46755&quot;&gt;&lt;img alt=&quot;A chart showing Democrats consistently more favorable toward NATO than Republicans&quot; class=&quot;wp-image-46755 not-transparent&quot; data-dominant-color=&quot;efefef&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 640px) 100vw, 640px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-06.png&quot; style=&quot;--dominant-color: #efefef;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-3da832f9&quot;&gt;Both Democratic and Republican views of NATO remained generally stable until 2017, when Democrats grew much more likely to support NATO than their counterparts, a difference that has not changed significantly since. In 2017, 74% of Democrats and 48% of Republicans had a favorable opinion of the alliance, a difference of 26 percentage points. Since 2018, U.S. views of NATO have declined among supporters of both parties. Positive views among Democrats fell 15 points, while views among Republicans dropped 7 points.&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-3c01040a&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;0bbeb5eea0909a619281136bf692357b&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;0bbeb5eea0909a619281136bf692357b&quot;&gt;Those on the right tend to have a more positive view of NATO&lt;/h3&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-07/&quot; rel=&quot;attachment wp-att-46756&quot;&gt;&lt;img alt=&quot;A chart showing those on the ideological right more favorable toward NATO&quot; class=&quot;wp-image-46756 not-transparent&quot; data-dominant-color=&quot;eff1f2&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 840px) 100vw, 840px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-07.png&quot; style=&quot;--dominant-color: #eff1f2;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-f9434320&quot;&gt;Ideology is a factor when it comes to views of NATO in several countries. In six countries, those placing themselves on the right side of the ideological spectrum are more favorable toward NATO than those on the left. In Sweden, for example, 79% of those on the ideological right have a positive opinion of NATO, compared with 38% of those on the left, a difference of 41 percentage points. Significant differences between those on the right and the left are also seen in Bulgaria (38 percentage points), the Czech Republic (36 points), Spain (25), Greece (19) and Slovakia (16).&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-9c86f780&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;1881a8af01e202974db00f8e3a1ceb5c&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;1881a8af01e202974db00f8e3a1ceb5c&quot;&gt;Public reluctance on Article 5 obligations across NATO member countries&lt;/h3&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-08/&quot; rel=&quot;attachment wp-att-46757&quot;&gt;&lt;img alt=&quot;A chart showing publics in NATO countries express reluctance on Article 5 obligations&quot; class=&quot;wp-image-46757 not-transparent&quot; data-dominant-color=&quot;f0f0f0&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 620px) 100vw, 620px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-08.png&quot; style=&quot;--dominant-color: #f0f0f0;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-9587a7a5&quot;&gt;&lt;a href=&quot;https://www.nato.int/cps/en/natohq/topics_110496.htm&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;Article 5 of the NATO treaty&lt;/a&gt; is “at the very heart of NATO’s founding treaty,” according to the organization. The article states that “an attack against one Ally is considered as an attack against all Allies.”&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9c84bfdd&quot;&gt;When asked whether their country should or should not use military force to defend a NATO ally from a hypothetical attack by Russia, in only five of the 16 member states surveyed – the Netherlands, the U.S., Canada, the UK and Lithuania – do half or more say that they should use such force. Across the 16 countries, a median of 50% say that their country should not defend a NATO ally in the event of an attack by Russia, while 38% say they should.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-1351431a&quot;&gt;Larger shares in 10 NATO member countries surveyed say their country &lt;em&gt;should not&lt;/em&gt; use force to defend a NATO ally should there be an attack by Russia. This includes majorities in Bulgaria, Italy, Greece, Germany and Spain. In Poland, sentiment is divided.&lt;/p&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-09/&quot; rel=&quot;attachment wp-att-46758&quot;&gt;&lt;img alt=&quot;A chart showing changing views on whether their country should intervene in a conflict between Russia and a NATO ally&quot; class=&quot;wp-image-46758 not-transparent&quot; data-dominant-color=&quot;eeeeee&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 840px) 100vw, 840px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-09.png&quot; style=&quot;--dominant-color: #eeeeee;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-5cf58d54&quot;&gt;The belief that their country should respond to a hypothetical Russian attack on a NATO ally has become less common over time in a handful of countries. For example, in Italy, only a quarter in 2019 say that their country should defend a NATO ally, down from four-in-ten in 2015. Similar declines over this time period occurred in Poland (-8 percentage points), Spain (-7) and France (-6). However, support for protecting a fellow NATO nation has increased in the UK since 2015 (+6).&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-0ef8a879&quot;&gt;In eight of the countries polled, men are significantly more likely than women to say that their country should defend a NATO ally. For example, in Germany, 43% of men say that in the case of a Russian attack on a fellow NATO member their country should respond with force, compared with only a quarter of women. Similar double-digit differences occur in Spain, Hungary, the Czech Republic, the Netherlands and Poland.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-1a417870&quot;&gt;Ideology also plays a role in people’s views about coming to an ally’s aid. In six countries, those who place themselves on the right end of the ideological spectrum are more willing to say they should defend a NATO ally than those on the right. This includes double-digit differences between right and left in all six countries: Spain (30 percentage points), the Czech Republic and Slovakia (21 points), Greece (14), and the UK and Italy (both 13 points).&lt;/p&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-10/&quot; rel=&quot;attachment wp-att-46759&quot;&gt;&lt;img alt=&quot;A table showing those who agree military force is sometimes necessary are more likely to support defending a NATO ally&quot; class=&quot;wp-image-46759 not-transparent&quot; data-dominant-color=&quot;edeeee&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 840px) 100vw, 840px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-10.png&quot; style=&quot;--dominant-color: #edeeee;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-29153768&quot;&gt;Views on defending an ally from a potential Russian attack are related to general attitudes toward the use of military force. Across most of the NATO member countries surveyed, those who agree that military force is sometimes necessary to maintain order in the world are more likely to say that they would defend a fellow NATO member from an armed incursion than those who disagree that a military solution is the best choice for keeping order. For example, in Spain, 53% of those who agree that military force is sometimes necessary say they would come to the aid of a NATO ally, versus only 26% of those who disagree with the principle of military force – a 27 percentage point difference.&lt;/p&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-11/&quot; rel=&quot;attachment wp-att-46760&quot;&gt;&lt;img alt=&quot;A chart showing people in member states say the U.S. would defend a NATO ally&quot; class=&quot;wp-image-46760 not-transparent&quot; data-dominant-color=&quot;e1e7e6&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 840px) 100vw, 840px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-11.png&quot; style=&quot;--dominant-color: #e1e7e6;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-fba9ab59&quot;&gt;In contrast to skeptical opinions on whether their own country should come to the defense of a NATO ally, people are much more likely to think the U.S. would take military action in response to a Russian attack.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-23df851e&quot;&gt;A median of 60% across the member countries say the U.S. would use military force to defend a NATO country that was subject to a Russian incursion. Only 29% across these countries believe the U.S. would not defend the country that was attacked.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-79779013&quot;&gt;Roughly two-thirds or more in Italy, the UK, Spain, Canada, the Netherlands and Greece say the U.S. would defend a NATO ally. Majorities in Germany, Slovakia, Lithuania and France agree.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-7620adf3&quot;&gt;Poles, on balance, say the U.S. would help out should Russia use military force against a neighboring NATO country, but sentiment is more divided in Turkey, the Czech Republic and Hungary.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-768b1dff&quot;&gt;Since 2015, there has been some change in a few countries on this question. The belief that the U.S. would defend a NATO ally is down 8 percentage points in France but up 7 points in the UK and Spain. These sentiments are also up 6 points in Turkey.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-b45ac020&quot;&gt;In Hungary, views that the U.S. would help out in the event of a Russia attack are down significantly since 2017, falling 16 percentage points.&lt;/p&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-12/&quot; rel=&quot;attachment wp-att-46761&quot;&gt;&lt;img alt=&quot;A table showing more in NATO countries say the U.S. would use military force to defend an ally from Russia than say that their country should do the same&quot; class=&quot;wp-image-46761 not-transparent&quot; data-dominant-color=&quot;ebeef0&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 840px) 100vw, 840px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-12.png&quot; style=&quot;--dominant-color: #ebeef0;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-fe315c00&quot;&gt;Young adults in Spain, France, Slovakia, Canada and Germany are more likely to believe the U.S. would defend a NATO ally against a Russian attack. For example, in Spain, 84% of 18- to 29-year-olds say the U.S. would uphold their Article 5 obligations, compared with 68% of those 50 and older.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-70161148&quot;&gt;In almost every country surveyed, people are significantly more likely to say the U.S. would defend an ally from a Russia attack than say their own country should take such action.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-7a4e011e&quot;&gt;The biggest difference measured is in Italy, where three-quarters say the U.S. would use such military force in such a scenario, compared with only a quarter who say Italy should defend that NATO ally, a 50 percentage point difference. Similar differences are seen in Greece (40 points), Spain (31), Germany (29), Slovakia (25), the UK (18), France (16), Turkey (14) and Canada (13).&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-6f1c1a89&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;50de4952b8dd7904760a594e6b372b62&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;50de4952b8dd7904760a594e6b372b62&quot;&gt;Many NATO countries in Europe value a close relationship with both the U.S. and Russia&lt;/h3&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-13/&quot; rel=&quot;attachment wp-att-46762&quot;&gt;&lt;img alt=&quot;A chart showing western Europeans favor close relationship with U.S. over Russia; Central and Eastern Europeans tend to prefer both&quot; class=&quot;wp-image-46762 not-transparent&quot; data-dominant-color=&quot;ebeae3&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 840px) 100vw, 840px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-13.png&quot; style=&quot;--dominant-color: #ebeae3;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-d291235b&quot;&gt;In nearly every country surveyed, larger shares support close ties with the U.S. than with Russia, with the exceptions of Bulgaria and Slovakia. And in many countries polled, publics tend to volunteer that a close relationship with both the U.S. and Russia is important.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-a036937b&quot;&gt;Particularly in Western Europe, the share of the public that says a relationship with the U.S. is more important is substantial. For example, in the UK and the Netherlands, about eight-in-ten support ties with the U.S. over Russia or both. And in Sweden, a non-NATO state, 71% support closer ties with the U.S. than with Russia (11%) or both countries (9%).&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-0a24f956&quot;&gt;Choosing a close relationship with Russia over the U.S. is considerably less widespread across the countries surveyed. Bulgarians are the most prone to this point of view, but just 28% say a close relationship with Russia is more important for their country. A quarter of Germans &lt;a href=&quot;https://www.pewresearch.org/short-reads/2019/11/25/americans-and-germans-remain-far-apart-in-views-of-bilateral-relations-2/&quot;&gt;say it is important&lt;/a&gt; for their country to have a close relationship with Russia, compared with 39% who favor a close relationship with the U.S. Three-in-ten Germans volunteer that a close relationship with both countries would be preferable.&lt;/p&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-14/&quot; rel=&quot;attachment wp-att-46763&quot;&gt;&lt;img alt=&quot;A chart showing those on right ideologically more likely to favor close relationship with U.S. &quot; class=&quot;wp-image-46763&quot; decoding=&quot;async&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-14.png&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-eba31425&quot;&gt;Central and Eastern European publics tend to volunteer their preference for a close relationship with both the U.S. and Russia. In Hungary, Poland, Slovakia and Bulgaria, roughly half or more say a relationship with both countries is important. And in Italy, Greece, the Czech Republic and Lithuania, about four-in-ten or more say the same.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-2c5b7314&quot;&gt;Ideology is linked to views of closer relations with the U.S. In 11 of 14 countries, those on the ideological right are more likely to support a close relationship with the U.S. than those on the left. In the Czech Republic, for example, 40% of those on the right say a close relationship with the U.S. is more important, compared to 15% of those on the left, a difference of 25 percentage points.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9bba1c83&quot;&gt;Hungary is an exception. Hungarians on the left (40%) are almost twice as likely as their counterparts on the right (21%) to support close U.S. relations.&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-4e7899cb&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;76d32978b16f36d6eddbfccfe370b88f&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;76d32978b16f36d6eddbfccfe370b88f&quot;&gt;Most NATO and non-NATO countries believe military force is sometimes necessary&lt;/h3&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-15/&quot; rel=&quot;attachment wp-att-46764&quot;&gt;&lt;img alt=&quot;A chart showing across most of Europe and North America, support for military force to maintain order in the world&quot; class=&quot;wp-image-46764&quot; decoding=&quot;async&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-15.png&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-06b447ff&quot;&gt;There is widespread support across most of the NATO countries surveyed for the use of military force to maintain order in the world. A median of 57% across 16 member countries agree that military force is sometimes necessary, while a median of 36% disagree.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-ac4a3859&quot;&gt;Across most countries surveyed – both members of NATO and those that do not belong to the organization – about half or more support the use of military force to maintain order. And in seven countries (Sweden, the U.S., Canada, the UK, Turkey, Russia and Hungary) seven-in-ten or more hold this view.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-0d9f8fea&quot;&gt;Germans are more divided, with 47% saying that military force is sometimes necessary and a similar 52% disagreeing with that statement. In Bulgaria, only 38% say military force is sometimes necessary.&lt;/p&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-16/&quot; rel=&quot;attachment wp-att-46765&quot;&gt;&lt;img alt=&quot;A table showing views of military force have changed across several countries &quot; class=&quot;wp-image-46765 not-transparent&quot; data-dominant-color=&quot;dee2e8&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 840px) 100vw, 840px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-16.png&quot; style=&quot;--dominant-color: #dee2e8;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-ac2a7795&quot;&gt;Support for military force has changed since Pew Research Center asked this question in 2007.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-649c8c87&quot;&gt;For example, in both Ukraine and Russia, two countries engaged in conflict since 2014, publics increasingly say military force is sometimes necessary (by 11 and 9 percentage points, respectively). This opinion has also become more common in Slovakia and Germany.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-c65d3795&quot;&gt;Yet in several European countries, support for military force has waned. This is the case in Italy (a decrease of 21 percentage points), Spain (10 points) and the Czech Republic (9).&lt;/p&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-17/&quot; rel=&quot;attachment wp-att-46766&quot;&gt;&lt;img alt=&quot;A chart showing those on the right more likely to say military force can be necessary to maintain order&quot; class=&quot;wp-image-46766&quot; decoding=&quot;async&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-17.png&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-7b864090&quot;&gt;In 12 countries, people on the right of the ideological spectrum are more apt than those on the left to agree that military force can be justified. In Spain, for example, those on the right are about twice as likely to support military force as their counterparts on the left.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-8c26db0e&quot;&gt;In the U.S., conservatives are 25 percentage points more likely than liberals to say military force is sometimes needed. Similarly, 91% of Republicans and Republican-leaning independents say military force is sometimes necessary, while 71% of Democrats and Democratic-leaning independents agree.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-bf50f49b&quot;&gt;Gender also shapes views of military action. Across most of the NATO and non-NATO countries surveyed, men are more likely than women believe in the need for military force. In the Czech Republic, for example, 63% of men say military force is sometimes necessary, compared with 45% of women. And in Ukraine, 71% of men support military force, versus 56% of women. Double-digit gender differences are also present in Germany (14 points), Poland (12), Bulgaria (12), Hungary (11), Italy (11) and Spain (10).&lt;/p&gt;
&lt;h3 class=&quot;wp-block-heading&quot; data-geo-id=&quot;geo-013e6efe&quot; data-is-section=&quot;true&quot; data-wp-context='{&quot;id&quot;:&quot;fb6feecd1c57fc4a8e3b2ebf60a00fcd&quot;}' data-wp-interactive='{&quot;namespace&quot;:&quot;prc-block\/table-of-contents&quot;}' id=&quot;fb6feecd1c57fc4a8e3b2ebf60a00fcd&quot;&gt;Are there parts of neighboring countries that really belong to us?&lt;/h3&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-18/&quot; rel=&quot;attachment wp-att-46767&quot;&gt;&lt;img alt=&quot;A chart showing Europeans divided over whether parts of neighboring countries belong to them&quot; class=&quot;wp-image-46767&quot; decoding=&quot;async&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-18.png&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-34063eae&quot;&gt;Across NATO and non-NATO countries, there is disagreement over whether parts of neighboring countries really belong to them. A median of 45% across the 16 NATO countries surveyed disagree, while a median of 35% agree (in several countries, the share who did not express an opinion is relatively high).&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9d0acbef&quot;&gt;The shares who agree with this statement are highest in Central and Eastern European countries surveyed. About two-thirds of Hungarians (67%) agree that parts of neighboring countries belong to them, including 40% who &lt;em&gt;completely &lt;/em&gt;agree. In Turkey, 58% agree that parts of nearby countries belong to them. And in neighboring Greece, 60% say the same.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-5a84f316&quot;&gt;In Western European countries, sentiments tend to run in the opposite direction. In Sweden (82%), the Netherlands (74%), the UK (72%), Germany (62%), Spain (60%) and France (59%), majorities &lt;em&gt;disagree&lt;/em&gt; that there are parts of other countries that belong to them.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-d7f45b75&quot;&gt;In both the U.S. and Canada, publics overwhelmingly disagree that parts of other countries belong to them (73% and 65%, respectively). However, a quarter of Canadians and roughly one-in-five Americans say the opposite and agree that there are parts of neighboring countries that belong to them.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-350874db&quot;&gt;Russians and Ukrainians tend to agree that parts of neighboring countries belong to them (53% and 47%, respectively).&lt;/p&gt;
&lt;figure class=&quot;wp-block-image alignright&quot;&gt;&lt;a href=&quot;https://www.pewresearch.org/global/2020/02/09/nato-seen-favorably-across-member-states/pg_2020-02-09_nato_0-19/&quot; rel=&quot;attachment wp-att-46768&quot;&gt;&lt;img alt=&quot;A table showing those with a favorable view of right-wing populist parties more likely to say parts of other countries belong to them&quot; class=&quot;wp-image-46768 not-transparent&quot; data-dominant-color=&quot;e6e8e3&quot; data-has-transparency=&quot;false&quot; decoding=&quot;async&quot; sizes=&quot;(max-width: 840px) 100vw, 840px&quot; src=&quot;https://www.pewresearch.org/global/wp-content/uploads/sites/2/2020/02/PG_2020.02.09_NATO_0-19.png&quot; style=&quot;--dominant-color: #e6e8e3;&quot;/&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p data-geo-id=&quot;geo-8ab32595&quot;&gt;In Europe, supporters of right-wing populist parties tend to be more likely to say parts of neighboring countries belong to their country. Supporters of right-wing populist parties are more likely to agree with this statement for nearly every European right-wing populist party included in the survey. In Spain, for example, those who have a favorable view of Vox are 27 percentage points more likely to say parts of another country belong to Spain than those who do not have a favorable view of the party.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-f9839307&quot;&gt;&lt;em&gt;Correction (February 12, 2020): This post has been updated with the proper characterization of NATO’s founding treaty and revised a significant difference in Lithuania. &lt;/em&gt;&lt;em&gt;The changes due to these adjustments do not materially change the analysis of the report.&lt;/em&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
