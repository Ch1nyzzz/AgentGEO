itemprop=&quot;description&quot;&gt;&lt;span data-dcnode-id=&quot;2399&quot; instrument_node=&quot;&quot;&gt;Since the late 1990s, network airlines worldwide have being enrolling in one of the three current Global Airline Alliances (GALs), oneworld, Star Alliance and SkyTeam. By 2011, airlines belonging to the three GALs transported over two-thirds of all international traffic. This thesis studies the reasons that cause an increasing number of airlines to join this collaborative scheme as a way to develop a wider network and to increase profitability by serving international connecting traffic. The evolution of GALs is characterized here by the analysis of the size of these alliances, as well as by the volume of partnerships and code share agreements between alliance partners during the period 2006-2011. The results of this study illustrate the differences between each of the GALs and the degree of dependence of airlines on alliances to develop their international networks. By most indicators, the largest alliance, Star Alliance, is the GAL in which member airlines rely more on their alliance partners when developing code share agreements with foreign airlines. In all three GALs, code share agreements between alliance partners are much less likely to be broken than with nonpartner airlines. Airlines operating in the transatlantic markets appear to be the most advanced firms in the marketing of code shared itineraries. The empirical analysis is complemented with a review of the theoretical benefits of GALs to airlines, alternative network models for international growth, the impact of alliances on customers' welfare, their potential anti-competitive effects on independent carriers, and the current regulatory framework affecting alliances on both sides of the North Atlantic. Overall, this work provides a holistic view of the GALs as a model for network development, to describe their policy implications, and to suggest key drivers in the future of airlines' network development strategies.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex__item--grow research-detail-middle-section__item&quot; data-dcnode-id=&quot;2374&quot; style=&quot;flex-basis:0px;flex-grow:1&quot;&gt;&lt;div class=&quot;js-lite-promo&quot; data-dcnode-id=&quot;2375&quot; data-promo-action=&quot;append&quot; data-promo-id=&quot;login2&quot;&gt;&lt;div class=&quot;js-target-signup-promo&quot; data-dcnode-id=&quot;2376&quot;&gt;&lt;div class=&quot;lite-page-promo research-detail-signup-promo&quot; data-dcnode-id=&quot;2377&quot;&gt;&lt;picture class=&quot;lite-page-promo__brand research-detail-signup-promo__brand&quot; data-dcnode-id=&quot;2391&quot; height=&quot;14&quot; width=&quot;100&quot;&gt;&lt;source data-dcnode-id=&quot;2394&quot; data-srcset=&quot;images/icons/svgicons/researchgate-logo-white.svg&quot; type=&quot;image/svg+xml&quot;&gt;&lt;span data-dcnode-id=&quot;2393&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;ResearchGate Logo&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;2392&quot; data-src=&quot;images/icons/svgicons/researchgate-logo-white.svg&quot; height=&quot;14&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot; width=&quot;100&quot;&gt;&lt;/picture&gt;&lt;p class=&quot;nova-legacy-e-text nova-legacy-e-text--size-xl nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit lite-page-promo__headline research-detail-signup-promo__headline&quot; data-dcnode-id=&quot;2388&quot;&gt;&lt;strong data-dcnode-id=&quot;2389&quot;&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt;Discover the world's research&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-l nova-legacy-e-list--type-unordered nova-legacy-e-list--spacing-auto lite-page-promo d=&quot;2152&quot;&gt;&lt;span data-dcnode-id=&quot;2153&quot; instrument_node=&quot;&quot;&gt;This study examines the influences of airline global alliances on the purchase intention of international
air passengers in Taiwan. The findings indicate positive relationships between global airline alliances,
brand equity, brand preference and purchase intention with a moderation effect of involvement
impacting on the relationship between global airline alliances and brand equity, and the relationship
between brand preferences and purchase intention. In particular, for highly involved passengers, the

;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1777&quot;&gt;&lt;span data-dcnode-id=&quot;1778&quot; instrument_node=&quot;&quot;&gt;Harun Karakavuz&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1768&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1769&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafcec5d lite-page-hidden&quot; data-dcnode-id=&quot;1770&quot;&gt;&lt;span data-dcnode-id=&quot;1771&quot; instrument_node=&quot;&quot;&gt;Airline companies whose technology are constantly changing and evolving should identify their strengths-weaknesses and opportunities-threats and maintain their strategic analysis in this direction in order to survive as a global player and protect their competitive advantage. In this study, SWOT analysis of the global airline alliances (Star Alliance, Oneworld, Skyteam) are performed. Results of the analysis show that global airline alliances havemany strengths such as, expanding their flight networks, sharing risks, increasing profitability and reducing costs.However, results also show that they have weaknesses such as, not providing uninterruptible undertaken travelling time to time, having difficulties due to compatibility problems between information technologies, not measuring the benefits of cooperation in a real sense. Another result emerged in the context of the study is related with the opportunities of global alliances. It identified that global airline alliances provide many opportunities to airline companies such as, helping airline companies to make them reach economy of scale and gaining cost advantage by means of shared purchasing activities. Moreover, some threats such as, reducing consumer confidence due to weak integration among members, rising low-cost carriers day by day are also emerged as a result of the analysis.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1752&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1753&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1754&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1755&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1756&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1762&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1763&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/322605505_Stratejik_Yonetim_Kapsaminda_Kuresel_Havayolu_Isbirliklerinin_SWOT_Analizi_A_Comparative_Swot_Analysis_of_Global_Airline_Alliances_within_The_Scope_of_Strategic_Management&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1764&quot;&gt;&lt;span data-dcnode-id=&quot;1765&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/sp eros.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1705&quot;&gt;&lt;span data-dcnode-id=&quot;1706&quot; instrument_node=&quot;&quot;&gt;Marisol Carvajal Camperos&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1697&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1698&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Paloma-Almodovar-Martinez-2199605066&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1699&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1700&quot;&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;Paloma Almodóvar Martínez&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1688&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1689&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Roberto-Vassolo&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1690&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1693&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1694&quot;&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Roberto S. Vassolo&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1695&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/272857729073170-1442065760884_Q64/Roberto-Vassolo.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1691&quot;&gt;&lt;span data-dcnode-id=&quot;1692&quot; instrument_node=&quot;&quot;&gt;Roberto S. Vassolo&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1682&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1683&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafcdf71 lite-page-hidden&quot; data-dcnode-id=&quot;1684&quot;&gt;&lt;span data-dcnode-id=&quot;1685&quot; instrument_node=&quot;&quot;&gt;El objetivo de este estudio teórico es realizar una revisión longitudinal y sistemática del concepto y el alcance de las alianzas estratégicas desde 1972 al 2020 y proponer una definición que sea homogénea e integradora, que tome en cuenta el entorno dinámico que actualmente tienen las empresas y en el que se integren los distintos términos asociados con el concepto de alianza estratégica. La metodología, ampliamente utilizada en otras investigaciones, se centra en la búsqueda de trabajos publicados en Scopus y Web of Science sobre las alianzas estratégicas. Este enfoque permitió consolidar una muestra de 148 artículos para este estudio. Se tomó como unidad de análisis cada artículo indexado (Scopus y Web of Science) en el que se señalará de manera explícita el concepto de alianza estratégica, o alguno de los términos asociado al concepto. Los hallazgos conceptuales posicionan a la alianza estratégica como un medio eficaz que les permite a las empresas obtener recursos de manera rápida para entrar en un nuevo mercado, aprender y obtener conocimiento de las empresas líderes. Se concluye que está justifi-cada la revisión permanente del concepto, admitiendo su carácter dinámico, pues la evolución del entorno y su complejidad requieren una constante actualización&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1666&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1667&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1668&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1669&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1670&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1676&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1677&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/353893457_Analisis_del_concepto_y_alcance_de_las_alianzas_estrategicas_un_enfoque_longitudinal_1972-2020&quot;&gt;&lt; lass=&quot;js-target-abstract-626c9cafce8b5 lite-page-hidden&quot; data-dcnode-id=&quot;1604&quot;&gt;&lt;span data-dcnode-id=&quot;1605&quot; instrument_node=&quot;&quot;&gt;It is too simplistic to see hybridity only as a type of organisation. Hybrids appear in micro, meso and macro levels of activity consisting of pairwise interactions and network constellations between business firms and public agencies. Cleantech industry, health policy national innovation systems and global air travel are showcases of hybrid activities in higher than organisational level of analysis. The current classifications of organisations do not acknowledge the existence of hybrids. The denial of existence of hybrids are embedded in the classification principles, which have not followed the evolution of economic and social activities. It is also the case that seeing the reality as more simple than it really is provides heuristic tools to understand complex hybrid arrangements.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1586&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1587&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1588&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1589&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1590&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1596&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova ec&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1394&quot; data-src=&quot;https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1390&quot;&gt;&lt;span data-dcnode-id=&quot;1391&quot; instrument_node=&quot;&quot;&gt;Tomislav Mihetec&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1378&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1379&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Miroslav-Drljaca&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1380&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1383&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1384&quot;&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Miroslav Drljača&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1385&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/938136016269316-1600680464839_Q64/Miroslav-Drljaca.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1381&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;Miroslav Drljača&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1372&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1373&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafce537 lite-page-hidden&quot; data-dcnode-id=&quot;1374&quot;&gt;&lt;span data-dcnode-id=&quot;1375&quot; instrument_node=&quot;&quot;&gt;This paper analyses the impact of airline business models on airport infrastructure and operational capacity and answers the question how to optimize capacity in order to achieve maximum efficiency and profitability as well as how to maintain an adequate level of service quality. As part of the research, a new model was created as an integral part of the Airport Management Strategy Software (AMSS) application. The purpose of the application is to enable the airport management to review and optimize operations in terms of maximum technical and technological capacity utilization. In addition, the application can be used to fill the available slots according to the specifics of the airline's business model without compromising the security, flexibility, and profitability of airport operations. The validation of the application was conducted at Zagreb Airport, which generated traffic of 3.4 million passengers in 2019. The result of the research is a model which, based on the calculation of the existing capacity of the airport infrastructure and ground handling equipment, enables the simulation of new airline business models and aircraft type implementation. Furthermore, the model also analyses their impact on the utilization of the airport infrastructure and equipment. The research demonstrated the interdependence between airport capacity optimization and optimal slot allocation, and the specifics of airline business models and aircraft types in their fleets. By adopting this model, airport managers can prevent mistakes that arise during negotiations with airlines, which can result in the under capacity of the infrastructure, equipment, and human resources as well as cause lower levels of security, numerous delays, reduced quality of service and, ultimately, negative financial effects.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1356&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1357&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1358&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1359&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1360&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1366&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1367&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/341377062_Optimization_of_Airport_Capacity_Efficiency_by_Selecting_Optimal_Aircraft_and_Airline_Business_Model&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode U5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1318&quot;&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;Jarmo Vakkuri&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1309&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1310&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafce665 lite-page-hidden&quot; data-dcnode-id=&quot;1311&quot;&gt;&lt;span data-dcnode-id=&quot;1312&quot; instrument_node=&quot;&quot;&gt;It is too simplistic to see hybridity only as a type of organisation. Hybrids appear in micro, meso, and macro levels of activity consisting of pairwise interactions and network constellations between business firms and public agencies. Cleantech industry, health policy national innovation systems, and global air travel are showcases of hybrid activities in higher than organisational level of analysis. The current classifications of organisations do not acknowledge the existence of hybrids. The denial of existence of hybrids are embedded in the classification principles which have not followed the evolution of economic and social activities. It is also the case that seeing the reality as more simple than it really is provides heuristic tools to understand complex hybrid arrangements.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1293&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1294&quot;&gt;&lt;div class=&quot;nova class=&quot;js-target-abstract-626c9cafce48b lite-page-hidden&quot; data-dcnode-id=&quot;1261&quot;&gt;&lt;span data-dcnode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;On March 5th 2014, Garuda Indonesia officially joined SkyTeam AirlineAlliance and became the first Indonesian airline that takes part in theglobal airline alliance. Based on that case, the author aims to explore theexpansion strategy of PT. Garuda Indonesa Tbk. through its membershipin SkyTeam. The author will utilize the strategic alliance theory of InternationalBusiness in understanding the relation between Garuda Indonesiaand SkyTeam. The author will also provide several datas to comparethe business operation of PT. Garuda Indonesia before and after joiningSkyTeam Airline Alliance in order to analyze the impact of this alliance.According to the collected data, the author found that the membership ofGaruda Indonesia in SkyTeam has shown positive impacts to the airline’snumber of international traffic, total operating revenues, as well as itsquality of service. Therefore, the author argues that SkyTeam AirlineAlliance contributes not only to the increase of profit earned by GarudaIndonesia, but also the airline’s quality of service.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1243&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1244&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1245&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1246&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-a acy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1206&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafce3c5 lite-page-hidden&quot; data-dcnode-id=&quot;1207&quot;&gt;&lt;span data-dcnode-id=&quot;1208&quot; instrument_node=&quot;&quot;&gt;This paper received the Cambridge-McKinsey Risk Prize from 
The Centre for Risk Studies at the University of Cambridge, for the best submission on risk management.

A maxim in commercial aviation is that airlines almost always lose money. Some analysts go as far as to argue that the global industry has collectively never turned a profit. Whatever the accuracy of the overall accounting, it is clear that commercial aviation is an industry in which it is difficult to thrive. The industry’s history demonstrates that airline expansion risks, and often overextends, the fundamental strengths of the business. However, despite the many pitfalls, most airlines do explicitly seek to expand. Therefore, identifying – and then managing and mitigating – the risks of expansion is essential if a growth strategy is to succeed. This essay addresses the case of what was, for nearly sixty years, a small, mostly unremarkable, state-owned airline, in an aviation market more commonly associated with war and poverty, and its rise to become its continent’s largest and most profitable airline, and one of the most rapidly growing worldwide: Ethiopian Airlines (call sign: ET), founded in 1945.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1189&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1190&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1191&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1192&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1193&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1199&quot;&gt;&lt;a class=&quot;nova-legac uot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1091&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1092&quot;&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Franz Rothlauf&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1093&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/272686119125041-1442024845753_Q64/Franz-Rothlauf.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1089&quot;&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;Franz Rothlauf&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1080&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1081&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafcef0e lite-page-hidden&quot; data-dcnode-id=&quot;1082&quot;&gt;&lt;span data-dcnode-id=&quot;1083&quot; instrument_node=&quot;&quot;&gt;This paper analyzes the code-share connectivity of carriers from the three global alliances: Star Alliance, Sky Team and oneworld. We generate 2-leg online and code-share connections to evaluate the existing connectivity. Additionally, we generate all potential interline connections between members of the same alliance that are not yet supported with existing code-shares and analyze what share of the potential connectivity remains unused. We find that code-share connections account to about one-fourth of the total number of international connections offered by alliance members. 73% of those code-share connections are with partners from the same alliance, 6% with carriers from competing alliances and the rest with other carriers, which means that airlines seek partnerships not only within their own global alliance but even with members of competing alliances. At the same time, over 25% of the total potential code-share connections between members of the same alliance remain unused. This connectivity potential is better utilized within the network of Sky Team and oneworld than within Star Alliance. American and European carriers show a higher degree of code-share partnership with their alliance partners than Asian carriers. Overall, code-share partnerships are strongly driven by strategic decisions on bilateral airline level. Many airline-pairs fully utilize their connectivity potential (almost half of the total existing code-share connections) but some cooperate only on selected routes or not at all. Over one-third of the remaining code-share connectivity potential within alliances is attributed to airline-pairs that don't partner at all.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1064&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1065&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1066&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1067&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto -id=&quot;928&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;929&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;939&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;940&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Sundaram-Nataraja-2129047402&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;941&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;942&quot;&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;Sundaram Nataraja&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;930&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;931&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Jason-Underhill&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;932&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;935&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;936&quot;&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Jason Underhill&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;937&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/466864863223809-1488320665415_Q64/Jason-Underhill.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;933&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;Jason Underhill&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;924&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;925&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafcf32c lite-page-hidden&quot; data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;ABSTRACT: A mission statement is an organization’s statement of purpose. It serves as a guide for all decision-making. From a commercial airline’s standpoint, a mission statement is vital to its survival, growth, customer satisfaction, and profitability. An effective mission statement provides direction for formulating, implementing, and evaluating strategies. Customer satisfaction in airline operations has become critically important in a competitive global aviation environment. The bottom-line of an airline business, like other industries, is profitability. To earn more profit, airlines are mandated to provide a pleasurable level of consumption-related fulfillment, otherwise known as customer satisfaction. 
Theoretically, a mission statement must provide guidance for an airline to achieve optimum customer satisfaction. However, the importance and role of mission statements have rarely been referenced in currently existing literature. Minimal attention has been paid to the design and use of the mission statement in the strategic management process of commercial airline enterprises. 
As the airline industry is constantly changing, the theory of strategic management is developing as well. The importance and role of a mission statement is not declining, and is still an essential and interesting area to research and analyze. Mission statements were drawn from the corporate websites of five US based commercial airlines to determine their conformity to theoretical norms of an ideal mission statement. This study focused on finding the correlation between mission statement effectiveness, customer satisfaction, and profitability, but the results revealed little or no interrelatedness between these variables.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;908&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;909&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;910&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;911&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;912&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;918&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;919&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publicati a-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;829&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafce0f8 lite-page-hidden&quot; data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;Purpose
Deregulation of domestic markets and the liberalization of international markets have dramatically changed air transportation. One of the important results of this change is the environmental effects of air transportation. This study aims to examine the implications of air transportation on environmental sustainability in the context of airline business strategies in liberalized and globalized air transport industry.

Design/methodology/approach
The paper discusses the relationship between liberalization, airline strategies and environmental sustainability of air transportation using the related literature. Then, to show some environmental impacts on the axis of the relationship discussed, emission rates for the aircraft landing and take-off phase were calculated on a global basis based on the aircraft traffic.

Findings
The discussion in the paper shows that the liberalization policies and the strategies of airlines supported by these policies, in essence, contradict the environmental sustainability of air transport. Considering the flight share projections of EUROCONTROL for different aircraft types on a global basis and the World Bank’s global flight traffic forecast for the years 2016 and 2025, it has been demonstrated that the number of aircraft departures will increase by 30%, whilst the number of aircraft emissions will increase by 41.5%.

Practical implications
Airlines are one of the main actors that will play a role in reducing the environmental impacts of air transportation. Therefore, this study is important in giving an idea to both policymakers and airline managers on how airline companies’ strategies should be shaped to realize both corporate sustainability and environmentally sustainable air transportation.

Originality/value
There are many studies in the literature regarding the environmental effects of air transport. However, there are not many studies linking environmental impacts with airline strategies that directly affect air transport demand. This study is different in that it gives environmental sustainability by associating it with its root causes.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;812&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;813&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;814&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;815&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;816&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;822&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;823&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/353726555_The_effects_of_airline_strategies_on_environmental_sustainability&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;824&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&l a-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;781&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;784&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;785&quot;&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Stephen W. Wang&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;786&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/272778452533249-1442046859021_Q64/Stephen-Wang-9.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;782&quot;&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;Stephen W. Wang&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;774&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;775&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Waros-Ngamsiriudom-2054474662&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;776&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;777&quot;&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;Waros Ngamsiriudom&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;768&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;769&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafcf5b2 lite-page-hidden&quot; data-dcnode-id=&quot;770&quot;&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt;Purpose
– Celebrity-themed aircraft campaigns have become a popular tactic that airlines adopt as part of their experiential marketing efforts. The campaign aims at differentiating their airline from competitors through delivering and/or reforming consumers’ flying experience. The paper aims to discuss this issue.

Design/methodology/approach
– Based on data collected from Taiwan, this study investigated the influence of four antecedents – attitude toward celebrity-themed aircrafts, subjective norms, perceived behavioral control and celebrity worship − on purchase intention.

Findings
– The results revealed significant positive relationships between all four antecedents and purchase intention. Furthermore, celebrity worship changed the relationships between attitude, subjective norms, as well as perceived behavioral control and intentions.

Originality/value
– This study investigates the potential role of marketing program of airlines with a fictional celebrity-themed aircraft that offer immersive flying experience to consumers. The experience starts on the outside where consumers can see the aircraft painted with celebrity-themed livery, and on the inside where the consumers get to experience many celebrity-related products, services, and spirit. According to the results, airlines can influence consumer purchase intention of the airlines services by offering consumers more celebrity related services, including celebrity-themed aircraft, customized products, and limited-amount souvenirs for their patronage. The results also demonstrate that celebrity worship has a significantly moderating effect on consumers’ perception on purchase intention. The results can vary depending on the intensity of celebrity worship.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;752&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;753&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;754&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;755&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;756&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;762&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-bu _meta-left&quot; data-dcnode-id=&quot;739&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__type&quot; data-dcnode-id=&quot;740&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;Article&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-right&quot; data-dcnode-id=&quot;734&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;735&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;736&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;737&quot;&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;Mar 2021&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;721&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;722&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;723&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;724&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Anastasia-Korzhenyak&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;725&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;728&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;729&quot;&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Anastasia Korzhenyak&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;730&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/958446492983296-1605522859433_Q64/Anastasia-Korzhenyak.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;726&quot;&gt;&lt;span data-dcnode-id=&quot;727&quot; instrument_node=&quot;&quot;&gt;Anastasia Korzhenyak&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;717&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;718&quot;&gt;&lt;span class=&quot;js-target-abstract-626c9cafcdbd9 lite-page-hidden&quot; data-dcnode-id=&quot;719&quot;&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;The subject of this research is the problematic aspects of international legal regulation of cooperation between airways. The author reviews the fundamental international treaties in the sphere of international air transportation (international air law). Special attention is given to examination of different types of bilateral agreements on air transport or air communication. Analysis is conducted on the advantages and disadvantages of the structure of bilateral regulation; different classification of the alliances in Russian and foreign scientific literature. The conclusion is made that although initially, the strategic alliances were created to improve the welfare of air transport companies by reducing costs, currently there is market, concentration with overwhelming share of the three largest alliances. Stiff competition forces to join one or another alliance in order to share in the international air carriage, which clearly indicates the tendency to globalization of air transport. There is no doubt that the countries constantly use the methods of bilateral regulation for obtaining vast benefits. Currently, further development of bilateral and multilateral (namely regional) cooperation in the sphere of international air carriage aimed at liberalization of international air transport is of major importance. This is the most efficient and fastest means of communication between the countries. The conclusion is made on the insufficient and fragmentary nature of international legal regulation of airways cooperation. The author advances the idea of going beyond private law regulation and creating a universal international legal mechanism that would help to overcome the problem of discrimination against third countries.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;701&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;702&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;703&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;704&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--wid //www.researchgate.net/scientific-contributions/Ed-Rigsbee-2096590627&quot;&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;Ed. Rigsbee&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;572&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;The article examines the ins and outs of the strategic alliance development process. While successful alliances require work and process, the benefits justify the effort. To improve one's organization's performance, production and profitability one must do more than just fix a problem. The greater the sophistication of a company and its officers, the more likely the company will enter into a &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;575&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626c9cafcfaab&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626c9cafcfaab&quot; data-dcnode-id=&quot;573&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt; partnership. One needs to embrace long-term thinking. Strategic alliances are rarely a quick fix, but rather a sound long-term business strategy. One should target companies, large or small, that can aid one in rapidly and efficiently reaching the goals of research, technology, production and marketing. Another element to consider is the focus of the individuals involved. Be certain their focus of the partnering relationship is strategic to the individuals' goals. Be clear about the critical driving forces that pull you and your partner into an alliance arrangement.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;570&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/292429287_Mind_your_business_Digging_deep_The_ins_and_outs_of_the_strategic_alliance_development_process&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;Read more&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&quot; data-dcnode-id=&quot;523&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none&quot; data-dcnode-id=&quot;524&quot;&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;525&quot;&gt;&lt;div class=&quot;publication-recommendation-item publication-recommendation-item--redesign&quot; data-dcnode-id=&quot;526&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges&quot; data-dcnode-id=&quot;559&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item&quot; data-dcnode-id=&quot;563&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--co rument_node=&quot;&quot;&gt;January 2014&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt; · &lt;/span&gt;&lt;span data-dcnode-id=&quot;551&quot;&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;SSRN Electronic Journal&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto&quot; data-dcnode-id=&quot;535&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;545&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;546&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;547&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;548&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Han-Yu-2157968853&quot;&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;Han Yu&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;536&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;537&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;541&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;542&quot;&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Zhaozhao He&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;543&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/901578470989829-1591964466842_Q64/Zhaozhao-He-2.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;538&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;539&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Zhaozhao-He-2&quot;&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;Zhaozhao He&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;529&quot;&gt;&lt;span data-dcnode-id=&quot;534&quot; instrument_node=&quot;&quot;&gt;This paper investigates whether acquirers benefit from pre-merger alliance partnerships with their target firms, analogous to the case of cohabitation practice before marriage. Focusing on the sample period of 1986-2010, we first find that bidders’ shareholder reactions to alliance-based merger announcements are significantly more positive than those of comparable mergers without alliances, &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;532&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626c9cafcfc05&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626c9cafcfc05&quot; data-dcnode-id=&quot;530&quot;&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt; especially during the tech-bubble period of 1997-2003. This result supports our conjecture that alliance relationships provide hands-on experience of resources sharing and business cooperation, and mitigate information asymmetry regarding firm operations. Second, subsample analysis reveals that this positive effect is particularly pronounced when deals are large relative to acquirers’ sizes, associated with domestic targets, and across industries. However, such synergy is completely muted if acquirers exhibit high leverage and R&amp;amp;D levels before the acquisitions. Finally, from the long-run perspective, we show evidence that acquirers of alliance-based acquisitions experience higher profitability, better growth opportunities, and greater innovation activities during the post-merger integrations, compared to the matched non-alliance-based acquisitions by these acquirers. Overall, our results suggest that prior alliance partnership is a previously unidentified, but important source of merger synergy gain.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;527&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/272242380_Cohabitation_Before_Marriage_An_Examination_of_Pre-Acquisition_Alliance_Partnerships_and_Merger_Outcomes&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;View full-text&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&quot; data-dcnode-id=&quot;485&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy -inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link&quot; data-dcnode-id=&quot;514&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/245589093_Building_Trust_in_Cross-Cultural_Collaborations_Toward_a_Contingency_Perspective&quot;&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;Building Trust in Cross-Cultural Collaborations: Toward a Contingency Perspective&lt;/span&gt;&lt;/a&gt;&lt;/h3&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500&quot; data-dcnode-id=&quot;507&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot;&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;October 2002&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt; · &lt;/span&gt;&lt;span data-dcnode-id=&quot;508&quot;&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;Journal of Management&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto&quot; data-dcnode-id=&quot;497&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;498&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;499&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;503&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;504&quot;&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Yadong Luo&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;505&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/338466534641665-1457708118754_Q64/Yadong-Luo.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;500&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;501&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Yadong-Luo&quot;&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;Yadong Luo&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;491&quot;&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;This study examines the trust-performance link in international strategic alliances (ISAs) from a contingency view. Departing from previous research, we argue that the trust-performance link varies according to its underlying contingency variables such as alliance age, risk commensuration, market uncertainty, resource interdependency, and reciprocal commitment. Our analysis of 255 ISAs in a &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;494&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626c9cafcff6d&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;495&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626c9cafcff6d&quot; data-dcnode-id=&quot;492&quot;&gt;&lt;span data-dcnode-id=&quot;493&quot; instrument_node=&quot;&quot;&gt; dynamic environment (the People’s Republic of China) suggests that trust plays a stronger role in improving ISA performance such as sales and profitability when an alliance is younger, risk is more commensurate between parties, market is less volatile, interpartner dependency in resources is greater, and commitment to the ongoing partnership from each party is higher. Cultural distance between alliance parties does not moderate the trust-performance link but influences the level of trust.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;489&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/245589093_Building_Trust_in_Cross-Cultural_Collaborations_Toward_a_Contingency_Perspective&quot;&gt;&lt;span data-dcnode-id=&quot;490&quot; instrument_node=&quot;&quot;&gt;View full-text&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&quot; data-dcnode-id=&quot;461&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none&quot; data-dcnode-id=&quot;462&quot;&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;463&quot;&gt;&lt;div class=&quot;publication-recommendation-item publication-recommendation-item--redesign&quot; data-dcnode-id=&quot;464&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--dire
