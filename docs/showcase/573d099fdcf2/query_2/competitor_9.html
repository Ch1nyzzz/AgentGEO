&lt;/span&gt;&lt;a data-dcnode-id=&quot;1949&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.oxfordbibliographies.com/browse%3Fmodule_0%3Dobo-9780199743292&quot;&gt;&lt;span data-dcnode-id=&quot;1952&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;1946&quot;&gt;&lt;span data-dcnode-id=&quot;1947&quot; instrument_node=&quot;&quot;&gt;Trust and International Relations&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1945&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;dl class=&quot;metaInfo&quot; data-dcnode-id=&quot;1939&quot;&gt;&lt;dt class=&quot;author&quot; data-dcnode-id=&quot;1943&quot;&gt;&lt;span data-dcnode-id=&quot;1944&quot; instrument_node=&quot;&quot;&gt;by&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;author&quot; data-dcnode-id=&quot;1940&quot;&gt;&lt;a data-dcnode-id=&quot;1941&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//dbms.ilrt.bris.ac.uk/spais/people/person/torsten-michel/&quot; referrer=&quot;origin-when-cross-origin&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1942&quot; instrument_node=&quot;&quot;&gt;Torsten Michel&lt;/span&gt;&lt;/a&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;div class=&quot;modified&quot; data-dcnode-id=&quot;1931&quot;&gt;&lt;ul data-dcnode-id=&quot;1932&quot;&gt;&lt;li class=&quot;_rev&quot; data-dcnode-id=&quot;1937&quot;&gt;&lt;span data-dcnode-id=&quot;1938&quot; instrument_node=&quot;&quot;&gt;LAST REVIEWED: 13 November 2018&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;_mod&quot; data-dcnode-id=&quot;1935&quot;&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt;LAST MODIFIED: 28 September 2016&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;doi&quot; data-dcnode-id=&quot;1933&quot;&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;DOI: 10.1093/obo/9780199743292-0192&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1930&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;1928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;div1&quot; data-dcnode-id=&quot;1922&quot;&gt;&lt;a data-dcnode-id=&quot;1927&quot; name=&quot;obo-9780199743292-0192-div1-0001&quot;&gt;&lt;/a&gt;&lt;h2 data-dcnode-id=&quot;1925&quot;&gt;&lt;span data-dcnode-id=&quot;1926&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1923&quot;&gt;&lt;span data-dcnode-id=&quot;1924&quot; instrument_node=&quot;&quot;&gt;The theme of trust takes up a somewhat ambiguous role in the study of international relations (IR). Trust is widely recognized as a key component of human interaction and political organization. However, despite its central concern with the relationship between actors both on an aggregate as well as on individual level, the study of trust and its role and nature has been neglected for most of IR’s history of almost one hundred years. In many instances of scholarship in IR, trust has been seen, and continues to be seen, as a negligible factor either because it is deemed dangerous for actors in an internationally anarchic system to trust or, if we are specifically concerned with the problem of cooperation, because it is not deemed necessary to achieve and maintain cooperative behavior. Only recently has the number of studies that take the topic of trust as their central concern increased, and the result has been a variety of conceptually and empirically rich contributions; this scholarship draws on the rich literature of trust from disciplines as diverse as psychology, moral philosophy, and sociology. The ongoing debates about the nature, substance, and function of trust in international politics have developed along a number of different contentions. On the most basic level, the role of rationality and rational decision making in instances of trustful behavior has proved contentious. Positions here range from purely instrumental accounts to those interested in the interactive social dimension to those that see trust as either a moralistic disposition or an emotive attitude. Accordingly, the types of trust identified within the literature do not form a singular conceptual base from which to start empirical inquiries. This heterogeneous state of affairs concerning the conceptual substance of “trust” is further confounded by questions regarding the meaning of related terms such as “confidence” and “reliability” (or “reliance”). Another important dimension of trust scholarship concerns the relation among uncertainty, risk, and trust. A widely accepted premise for the emergence (and necessity) of trust is based on the lack of certainty that pervades (human) interaction. Trust becomes possible (and for sustained and peaceful interaction necessary) only when a situation arises in which the intentions of others are unknown and in which the consequences of their actions could produce harm. This situation of risk in which action and interaction occurs under conditions of limited information is a basic condition for trustful behavior to occur. Yet, contentions remain about the actual nature of this “uncertainty”; in the majority of accounts this uncertainty is tied to limited knowledge about the other and their intentions, i.e., it is described as a form of epistemological uncertainty that arises out of specific ontological constellations. In other accounts, however, this uncertainty itself assumes a more ontological quality and perceives of human existence in general as not reducible to representational knowledge and calculable outcomes. Trust in such understandings appears as a non-articulate disposition, an emotive attitude or a set of beliefs the function of which exceeds the purely calculative dimension of trust as a response to epistemological uncertainty.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;div1&quot; data-dcnode-id=&quot;1834&quot;&gt;&lt;a data-dcnode-id=&quot;1921&quot; name=&quot;obo-9780199743292-0192-div1-0002&quot;&gt;&lt;/a&gt;&lt;h2 data-dcnode-id=&quot;1919&quot;&gt;&lt;span data-dcnode-id=&quot;1920&quot; instrument_node=&quot;&quot;&gt;Conceptual Overviews&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1899&quot;&gt;&lt;span data-dcnode-id=&quot;1918&quot; instrument_node=&quot;&quot;&gt;Many disciplines addressed trust as a subject for academic research and debate long before it made its way to the field of international relations. As with many other themes and concepts, international relations draws heavily on this preexisting literature and, to this day, the field regularly references central works outside the discipline as points of reference. One debate that is taken from this literature and mirrored in international relations broadly concerns questions of trust in the public sphere, i.e., trust in government, forms of government, and public offices more generally. &lt;/span&gt;&lt;a data-dcnode-id=&quot;1916&quot; href=&quot;#obo-9780199743292-0192-bibItem-0006&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;O’Neill 2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1913&quot; href=&quot;#obo-9780199743292-0192-bibItem-0002&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;Hardin 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1912&quot; instrument_node=&quot;&quot;&gt; exemplify these debates quite well. Even more broadly, other publications, including &lt;/span&gt;&lt;a data-dcnode-id=&quot;1910&quot; href=&quot;#obo-9780199743292-0192-bibItem-0004&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1911&quot; instrument_node=&quot;&quot;&gt;Lagerspetz 1998&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1909&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1907&quot; href=&quot;#obo-9780199743292-0192-bibItem-0005&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1908&quot; instrument_node=&quot;&quot;&gt;Lagerspetz 2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1906&quot; instrument_node=&quot;&quot;&gt;, investigate the various dimensions of the notion of trust and the deeply interdisciplinary character of trust research as well as aspects of the relation between trust and cooperation (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1904&quot; href=&quot;#obo-9780199743292-0192-bibItem-0001&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1905&quot; instrument_node=&quot;&quot;&gt;Gambetta 1988&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1903&quot; instrument_node=&quot;&quot;&gt;). Complementing these works are accounts that focus on the complex relation between trust and reason as for instance in &lt;/span&gt;&lt;a data-dcnode-id=&quot;1901&quot; href=&quot;#obo-9780199743292-0192-bibItem-0003&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1902&quot; instrument_node=&quot;&quot;&gt;Hollis 1998&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1900&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1898&quot;&gt;&lt;/p&gt;&lt;ul class=&quot;bibliography&quot; data-dcnode-id=&quot;1837&quot; id=&quot;obo-9780199743292-0192-bibList-1&quot;&gt;&lt;li data-dcnode-id=&quot;1889&quot; id=&quot;obo-9780199743292-0192-bibItemGroup-0001&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1893&quot; id=&quot;obo-9780199743292-0192-bibItem-0001&quot;&gt;&lt;span data-dcnode-id=&quot;1897&quot; instrument_node=&quot;&quot;&gt;Gambetta, Diego, ed. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1895&quot;&gt;&lt;span data-dcnode-id=&quot;1896&quot; instrument_node=&quot;&quot;&gt;Trust: Making and Breaking Cooperative Relations&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1894&quot; instrument_node=&quot;&quot;&gt;. Oxford: Basil Blackwell, 1988. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1892&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1890&quot;&gt;&lt;span data-dcnode-id=&quot;1891&quot; instrument_node=&quot;&quot;&gt;This edited volume provides a very good introduction for those new to the debates on trust. Its contributions engage more generally with theoretical and empirical matters on trust and trusting behavior. Part 1 addresses conceptual and theoretical reflections on the notion, nature, and role of trust in social relations, while Part 2 presents a number of empirical case studies.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1880&quot; id=&quot;obo-9780199743292-0192-bibItemGroup-0002&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1884&quot; id=&quot;obo-9780199743292-0192-bibItem-0002&quot;&gt;&lt;span data-dcnode-id=&quot;1888&quot; instrument_node=&quot;&quot;&gt;Hardin, Russell. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1886&quot;&gt;&lt;span data-dcnode-id=&quot;1887&quot; instrument_node=&quot;&quot;&gt;Trust&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1885&quot; instrument_node=&quot;&quot;&gt;. Cambridge, UK: Polity, 2006. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1883&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1881&quot;&gt;&lt;span data-dcnode-id=&quot;1882&quot; instrument_node=&quot;&quot;&gt;This book addresses the question of the role of trust in the public sphere, on the one hand, and in the private sphere, on the other. It investigates to what extent a crisis exists in public trust and how this can be contextualized within a globalizing setting. It also looks at this growing interconnectedness in terms of impact on the development (and its obstacles) of trust on individual levels.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1868&quot; id=&quot;obo-9780199743292-0192-bibItemGroup-0003&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1875&quot; id=&quot;obo-9780199743292-0192-bibItem-0003&quot;&gt;&lt;span data-dcnode-id=&quot;1879&quot; instrument_node=&quot;&quot;&gt;Hollis, Martin. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1877&quot;&gt;&lt;span data-dcnode-id=&quot;1878&quot; instrument_node=&quot;&quot;&gt;Trust within Reason&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1876&quot; instrument_node=&quot;&quot;&gt;. Cambridge, UK: Cambridge University Press, 1998. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1871&quot;&gt;&lt;span data-dcnode-id=&quot;1874&quot; instrument_node=&quot;&quot;&gt;
	      	  DOI: &lt;/span&gt;&lt;a class=&quot;doi&quot; data-dcnode-id=&quot;1872&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dx.doi.org/10.1017/CBO9780511612244&quot; referrer=&quot;origin-when-cross-origin&quot; tabindex=&quot;0&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1873&quot; instrument_node=&quot;&quot;&gt;10.1017/CBO9780511612244&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1869&quot;&gt;&lt;span data-dcnode-id=&quot;1870&quot; instrument_node=&quot;&quot;&gt;This book engages with the central relationship between trust and reason, offering reflections on the paradoxes and contradiction as well as the promises trust can hold within the framework of the Enlightenment. Importantly, Hollis moves beyond a narrow understanding of reason as instrumental rationality, and, with reference to central thinkers in the Enlightenment tradition, he shows what a wider conception of reason can contribute to our understanding of trust and its development.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1856&quot; id=&quot;obo-9780199743292-0192-bibItemGroup-0004&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1863&quot; id=&quot;obo-9780199743292-0192-bibItem-0004&quot;&gt;&lt;span data-dcnode-id=&quot;1867&quot; instrument_node=&quot;&quot;&gt;Lagerspetz, Olli. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1865&quot;&gt;&lt;span data-dcnode-id=&quot;1866&quot; instrument_node=&quot;&quot;&gt;Trust: The Tacit Demand&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1864&quot; instrument_node=&quot;&quot;&gt;. Dordrecht, The Netherlands: Kluwer Academic, 1998. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1859&quot;&gt;&lt;span data-dcnode-id=&quot;1862&quot; instrument_node=&quot;&quot;&gt;
	      	  DOI: &lt;/span&gt;&lt;a class=&quot;doi&quot; data-dcnode-id=&quot;1860&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dx.doi.org/10.1007/978-94-015-8986-4&quot; referrer=&quot;origin-when-cross-origin&quot; tabindex=&quot;0&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1861&quot; instrument_node=&quot;&quot;&gt;10.1007/978-94-015-8986-4&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1857&quot;&gt;&lt;span data-dcnode-id=&quot;1858&quot; instrument_node=&quot;&quot;&gt;A comprehensive overview of the main issues and contentions surrounding the notion of trust. The book develops along interdisciplinary lines and explores a large variety of interconnected aspects reaching from the emergence of trust to its “pay-offs” to questions of trust and political legitimacy.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1847&quot; id=&quot;obo-9780199743292-0192-bibItemGroup-0005&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1851&quot; id=&quot;obo-9780199743292-0192-bibItem-0005&quot;&gt;&lt;span data-dcnode-id=&quot;1855&quot; instrument_node=&quot;&quot;&gt;Lagerspetz, Olli. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1853&quot;&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;Trust, Ethics and Human Reason&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1852&quot; instrument_node=&quot;&quot;&gt;. London: Bloomsbury, 2015. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1850&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1848&quot;&gt;&lt;span data-dcnode-id=&quot;1849&quot; instrument_node=&quot;&quot;&gt;This book introduces the various conceptual and theoretical dimensions that drive much of trust scholarship. The book offers an intricate, nuanced but accessible overview of the core themes and contentions related to trust in relation to both similar concepts and the conditionalities of trust (e.g., reason, vulnerability, truth). To date, one of the best general introductions to the issues surrounding the notion of trust.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1838&quot; id=&quot;obo-9780199743292-0192-bibItemGroup-0006&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1842&quot; id=&quot;obo-9780199743292-0192-bibItem-0006&quot;&gt;&lt;span data-dcnode-id=&quot;1846&quot; instrument_node=&quot;&quot;&gt;O’Neill, Onora. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1844&quot;&gt;&lt;span data-dcnode-id=&quot;1845&quot; instrument_node=&quot;&quot;&gt;A Question of Trust&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1843&quot; instrument_node=&quot;&quot;&gt;. Cambridge, UK: Cambridge University Press, 2002. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1841&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1839&quot;&gt;&lt;span data-dcnode-id=&quot;1840&quot; instrument_node=&quot;&quot;&gt;This is a printed version of the BBC Reith Lectures given in 2002. The lectures address the questions fundamental to every treatment of trust in a brief yet very reflective and instructive manner: is there a current crisis of trust, how does trust emerge, on what basis is trust well placed, and what are the societal and political conditions under which trust can flourish?&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1836&quot; instrument_node=&quot;&quot;&gt;
