&lt;/span&gt;&lt;span data-dcnode-id=&quot;2162&quot;&gt;&lt;span data-dcnode-id=&quot;2163&quot; instrument_node=&quot;&quot;&gt;Gender and International Relations&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;dl class=&quot;metaInfo&quot; data-dcnode-id=&quot;2155&quot;&gt;&lt;dt class=&quot;author&quot; data-dcnode-id=&quot;2159&quot;&gt;&lt;span data-dcnode-id=&quot;2160&quot; instrument_node=&quot;&quot;&gt;by&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;author&quot; data-dcnode-id=&quot;2156&quot;&gt;&lt;a data-dcnode-id=&quot;2157&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//cla.umn.edu/about/directory/profile/kbt&quot; referrer=&quot;origin-when-cross-origin&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt;Karen Brown&lt;/span&gt;&lt;/a&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;div class=&quot;modified&quot; data-dcnode-id=&quot;2147&quot;&gt;&lt;ul data-dcnode-id=&quot;2148&quot;&gt;&lt;li class=&quot;_rev&quot; data-dcnode-id=&quot;2153&quot;&gt;&lt;span data-dcnode-id=&quot;2154&quot; instrument_node=&quot;&quot;&gt;LAST REVIEWED: 09 February 2021&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;_mod&quot; data-dcnode-id=&quot;2151&quot;&gt;&lt;span data-dcnode-id=&quot;2152&quot; instrument_node=&quot;&quot;&gt;LAST MODIFIED: 27 April 2017&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;doi&quot; data-dcnode-id=&quot;2149&quot;&gt;&lt;span data-dcnode-id=&quot;2150&quot; instrument_node=&quot;&quot;&gt;DOI: 10.1093/obo/9780199756223-0211&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2146&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;2144&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;div1&quot; data-dcnode-id=&quot;2135&quot;&gt;&lt;a data-dcnode-id=&quot;2143&quot; name=&quot;obo-9780199756223-0211-div1-0001&quot;&gt;&lt;/a&gt;&lt;h2 data-dcnode-id=&quot;2141&quot;&gt;&lt;span data-dcnode-id=&quot;2142&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;2136&quot;&gt;&lt;span data-dcnode-id=&quot;2140&quot; instrument_node=&quot;&quot;&gt;Gender analysis offers a distinct perspective on international relations in provoking a new set of questions. Early feminist international relations (IR) theorists joined other critical approaches to the field in interrogating the traditional conceptual terrain of IR scholarship in the 1980s, including states and sovereignty, national security, war, economic development and trade, globalization. Feminist scholarship represented an integral element of the critical foment of the “fourth debate” and its examination of international relations through a post-positivist lens. Scholars who focused on questions of gender and international relations brought a common commitment to understanding how social relations of masculinity and femininity, of gender identities and sexualities, of gender difference, are implicated in international politics. What “work” does gender do in international relations? Gender analysis provides a counterpoint to mainstream (or “malestream”) IR by asking two separate but closely interrelated questions: where are the women? how do gendered power relations undergird and shape the substance of international politics? These questions have led to a broad and diverse body of feminist IR scholarship that offers a reformulation of traditional IR topics as well as a new range of research subjects previously regarded as outside the scope of IR. One of the early tasks of feminist IR scholars was the establishment of a body of research on &lt;/span&gt;&lt;i data-dcnode-id=&quot;2138&quot;&gt;&lt;span data-dcnode-id=&quot;2139&quot; instrument_node=&quot;&quot;&gt;women&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2137&quot; instrument_node=&quot;&quot;&gt;, a necessary corrective to a field focused almost exclusively on the experiences of men and masculinist/male-dominated institutions and practices. This work helped to make a case for hegemonic masculinity. In addition, these scholars have demonstrated that investigation of gender as a means of social differentiation linked to power hierarchies in international relations reveals a more complex and varied conceptual and empirical terrain. From the early interventions when “adding women” represented a radical move in international relations scholarship, an interdisciplinary and extensive body of work now addresses analyses of gender and sexualities in international relations across subject areas, methodologies, and theoretical frameworks. Gender analyses include not only feminist theory, but also queer theory and a recent emphasis on masculinities and IR.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;div1&quot; data-dcnode-id=&quot;2023&quot;&gt;&lt;a data-dcnode-id=&quot;2134&quot; name=&quot;obo-9780199756223-0211-div1-0002&quot;&gt;&lt;/a&gt;&lt;h2 data-dcnode-id=&quot;2132&quot;&gt;&lt;span data-dcnode-id=&quot;2133&quot; instrument_node=&quot;&quot;&gt;General Works&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;2106&quot;&gt;&lt;span data-dcnode-id=&quot;2131&quot; instrument_node=&quot;&quot;&gt;Early general works attempted to pose the question of gender in IR. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2129&quot; href=&quot;#obo-9780199756223-0211-bibItem-0002&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;2130&quot; instrument_node=&quot;&quot;&gt;Enloe 1989&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2128&quot; instrument_node=&quot;&quot;&gt; reveals the lack of attention to both women and gender relations in the broad range of international politics from daily lived experience to international institutions. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2126&quot; href=&quot;#obo-9780199756223-0211-bibItem-0003&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;2127&quot; instrument_node=&quot;&quot;&gt;Grant and Newland 1991&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2125&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;2123&quot; href=&quot;#obo-9780199756223-0211-bibItem-0004&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;2124&quot; instrument_node=&quot;&quot;&gt;Peterson 1992&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2122&quot; instrument_node=&quot;&quot;&gt; examine how gender constitutes IR theories and concepts. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2120&quot; href=&quot;#obo-9780199756223-0211-bibItem-0005&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;2121&quot; instrument_node=&quot;&quot;&gt;Sylvester 1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2119&quot; instrument_node=&quot;&quot;&gt; emphasizes postmodern feminist frameworks. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2117&quot; href=&quot;#obo-9780199756223-0211-bibItem-0006&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;2118&quot; instrument_node=&quot;&quot;&gt;Tickner 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2116&quot; instrument_node=&quot;&quot;&gt; examines changes in IR and international politics at the end of the Cold War from a feminist perspective. As the field develops, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2114&quot; href=&quot;#obo-9780199756223-0211-bibItem-0001&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;2115&quot; instrument_node=&quot;&quot;&gt;Ackerly, et al. 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2113&quot; instrument_node=&quot;&quot;&gt; considers issues in feminist IR methodology. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2111&quot; href=&quot;#obo-9780199756223-0211-bibItem-0008&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;2112&quot; instrument_node=&quot;&quot;&gt;Tickner and Sjoberg 2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2110&quot; instrument_node=&quot;&quot;&gt; evaluates the state of feminist IR by creating conversations between contemporary work and foundational thinkers in the field. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2108&quot; href=&quot;#obo-9780199756223-0211-bibItem-0007&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;2109&quot; instrument_node=&quot;&quot;&gt;Tickner 2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2107&quot; instrument_node=&quot;&quot;&gt; chronicles the development of the field through the author’s writings.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2105&quot;&gt;&lt;/p&gt;&lt;ul class=&quot;bibliography&quot; data-dcnode-id=&quot;2026&quot; id=&quot;obo-9780199756223-0211-bibList-1&quot;&gt;&lt;li data-dcnode-id=&quot;2096&quot; id=&quot;obo-9780199756223-0211-bibItemGroup-0001&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;2100&quot; id=&quot;obo-9780199756223-0211-bibItem-0001&quot;&gt;&lt;span data-dcnode-id=&quot;2104&quot; instrument_node=&quot;&quot;&gt;Ackerly, Brooke, Maria Stern, and Jacqui True, eds. &lt;/span&gt;&lt;em data-dcnode-id=&quot;2102&quot;&gt;&lt;span data-dcnode-id=&quot;2103&quot; instrument_node=&quot;&quot;&gt;Feminist Methodologies for International Relations&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2101&quot; instrument_node=&quot;&quot;&gt;. Cambridge, UK: Cambridge University Press, 2006. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;2099&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;2097&quot;&gt;&lt;span data-dcnode-id=&quot;2098&quot; instrument_node=&quot;&quot;&gt;Essays consider ontology, epistemology, ethics, and methods in a critical feminist methodology for IR research to both advance understanding and enable a normative grounding in the goal of advancing justice. Themes include inclusion/exclusion, marginalized sites and identities, analysis of silences, and collectively generated theory.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2087&quot; id=&quot;obo-9780199756223-0211-bibItemGroup-0002&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;2091&quot; id=&quot;obo-9780199756223-0211-bibItem-0002&quot;&gt;&lt;span data-dcnode-id=&quot;2095&quot; instrument_node=&quot;&quot;&gt;Enloe, Cynthia. &lt;/span&gt;&lt;em data-dcnode-id=&quot;2093&quot;&gt;&lt;span data-dcnode-id=&quot;2094&quot; instrument_node=&quot;&quot;&gt;Bananas, Beaches and Bases: Making Feminist Sense of International Politics&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2092&quot; instrument_node=&quot;&quot;&gt;. London: Pandora, 1989. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;2090&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;2088&quot;&gt;&lt;span data-dcnode-id=&quot;2089&quot; instrument_node=&quot;&quot;&gt;A pathbreaking work asking “where are the women?” that has provoked early conversations about gender and IR. Applying a gender lens, the book offers detailed accounts of how femininity, masculinity, and gendered power relations shape issues from trade to military alliances. Excellent entry point for understanding how “gender makes the world go round.”&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2075&quot; id=&quot;obo-9780199756223-0211-bibItemGroup-0003&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;2082&quot; id=&quot;obo-9780199756223-0211-bibItem-0003&quot;&gt;&lt;span data-dcnode-id=&quot;2086&quot; instrument_node=&quot;&quot;&gt;Grant, Rebecca, and Kathleen Newland, eds. &lt;/span&gt;&lt;em data-dcnode-id=&quot;2084&quot;&gt;&lt;span data-dcnode-id=&quot;2085&quot; instrument_node=&quot;&quot;&gt;Gender and International Relations&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2083&quot; instrument_node=&quot;&quot;&gt;. Bloomington: Indiana University Press, 1991. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;2081&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;2076&quot;&gt;&lt;span data-dcnode-id=&quot;2080&quot; instrument_node=&quot;&quot;&gt;Reflecting early developments in a growing field of gendered analyses of international relations, this book is based, in part, on papers from the special issue of &lt;/span&gt;&lt;em data-dcnode-id=&quot;2078&quot;&gt;&lt;span data-dcnode-id=&quot;2079&quot; instrument_node=&quot;&quot;&gt;Millennium: Journal of International Studies&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2077&quot; instrument_node=&quot;&quot;&gt; in 1988 that marked a crucial early expression of scholarship on women and IR. In addition to reflections on feminist epistemology and the gendered elements of IR theory, contributions include several case studies related to women in development.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2066&quot; id=&quot;obo-9780199756223-0211-bibItemGroup-0004&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;2070&quot; id=&quot;obo-9780199756223-0211-bibItem-0004&quot;&gt;&lt;span data-dcnode-id=&quot;2074&quot; instrument_node=&quot;&quot;&gt;Peterson, V. Spike, ed. &lt;/span&gt;&lt;em data-dcnode-id=&quot;2072&quot;&gt;&lt;span data-dcnode-id=&quot;2073&quot; instrument_node=&quot;&quot;&gt;Gendered States: Feminist (Re)Visions of International Relations Theory&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2071&quot; instrument_node=&quot;&quot;&gt;. Boulder, CO: Lynne Rienner, 1992. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;2069&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;2067&quot;&gt;&lt;span data-dcnode-id=&quot;2068&quot; instrument_node=&quot;&quot;&gt;Collection of papers from a key 1990 conference in building the field of feminist IR scholarship. Essays focus on the ways in which gender is constitutive of the key IR concepts and frameworks, including sovereignty, anarchy, and security.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2057&quot; id=&quot;obo-9780199756223-0211-bibItemGroup-0005&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;2061&quot; id=&quot;obo-9780199756223-0211-bibItem-0005&quot;&gt;&lt;span data-dcnode-id=&quot;2065&quot; instrument_node=&quot;&quot;&gt;Sylvester, Christine. &lt;/span&gt;&lt;em data-dcnode-id=&quot;2063&quot;&gt;&lt;span data-dcnode-id=&quot;2064&quot; instrument_node=&quot;&quot;&gt;Feminist Theory and International Relations in a Postmodern Era&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2062&quot; instrument_node=&quot;&quot;&gt;. Cambridge, UK: Cambridge University Press, 1994. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;2060&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;2058&quot;&gt;&lt;span data-dcnode-id=&quot;2059&quot; instrument_node=&quot;&quot;&gt;A key text in understanding the contributions of feminist theorizing to the development of IR as an academic field. Sylvester argues for feminist insights to the foundational concepts of IR, and its second and third debates, with a particular emphasis on developing a postmodern feminist perspective and the “empathetic cooperation” it enables.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2048&quot; id=&quot;obo-9780199756223-0211-bibItemGroup-0006&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;2052&quot; id=&quot;obo-9780199756223-0211-bibItem-0006&quot;&gt;&lt;span data-dcnode-id=&quot;2056&quot; instrument_node=&quot;&quot;&gt;Tickner, J. Ann. &lt;/span&gt;&lt;em data-dcnode-id=&quot;2054&quot;&gt;&lt;span data-dcnode-id=&quot;2055&quot; instrument_node=&quot;&quot;&gt;Gendering World Politics: Issues and Approaches in the Post–Cold War Era&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2053&quot; instrument_node=&quot;&quot;&gt;. New York: Columbia University Press, 2001. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;2051&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;2049&quot;&gt;&lt;span data-dcnode-id=&quot;2050&quot; instrument_node=&quot;&quot;&gt;Assessment of where feminist work sat in IR field as world politics after the Cold War shifted to issues beyond traditional IR concerns of states and national security. Empirical, normative, and methodological implications of feminism for IR pair with examples of what feminist frameworks reveal in areas including economic globalization and democratization.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2036&quot; id=&quot;obo-9780199756223-0211-bibItemGroup-0007&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;2043&quot; id=&quot;obo-9780199756223-0211-bibItem-0007&quot;&gt;&lt;span data-dcnode-id=&quot;2047&quot; instrument_node=&quot;&quot;&gt;Tickner, J. Ann. &lt;/span&gt;&lt;em data-dcnode-id=&quot;2045&quot;&gt;&lt;span data-dcnode-id=&quot;2046&quot; instrument_node=&quot;&quot;&gt;A Feminist Voyage through International Relations&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2044&quot; instrument_node=&quot;&quot;&gt;. New York: Oxford University Press, 2014. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;2039&quot;&gt;&lt;span data-dcnode-id=&quot;2042&quot; instrument_node=&quot;&quot;&gt;
	      	  DOI: &lt;/span&gt;&lt;a class=&quot;doi&quot; data-dcnode-id=&quot;2040&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dx.doi.org/10.1093/acprof%3Aoso/9780199951246.001.0001&quot; referrer=&quot;origin-when-cross-origin&quot; tabindex=&quot;0&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2041&quot; instrument_node=&quot;&quot;&gt;10.1093/acprof:oso/9780199951246.001.0001&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;2037&quot;&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt;A collection of essays chronicling developments in feminist IR through the writings of Ann Tickner from 1988 to 2014, a central voice in the founding and development of the field. Includes seminal essays in which Tickner highlights key contributions of feminist work.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2027&quot; id=&quot;obo-9780199756223-0211-bibItemGroup-0008&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;2031&quot; id=&quot;obo-9780199756223-0211-bibItem-0008&quot;&gt;&lt;span data-dcnode-id=&quot;2035&quot; instrument_node=&quot;&quot;&gt;Tickner, J. Ann, and Laura Sjoberg, eds. &lt;/span&gt;&lt;em data-dcnode-id=&quot;2033&quot;&gt;&lt;span data-dcnode-id=&quot;2034&quot; instrument_node=&quot;&quot;&gt;Feminism and International Relations: Conversations about the Past, Present and Future&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2032&quot; instrument_node=&quot;&quot;&gt;. New York: Routledge, 2011. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;2030&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;2028&quot;&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt;Contemporary feminist IR research essays placed in conversation with foundational thinkers in the field. Content ranges from human rights and technologies of war to the global political economy of beauty. Creates intentional dialogue on evolution of feminist IR and provides a model for field-shaping scholarly discourse linked to policy considerations.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2025&quot; instrument_node=&quot;&quot;&gt;
