&lt;/span&gt;&lt;a data-dcnode-id=&quot;1939&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.oxfordbibliographies.com/browse%3Fmodule_0%3Dobo-9780199743292&quot;&gt;&lt;span data-dcnode-id=&quot;1942&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;International Relations&quot; data-dcnode-id=&quot;1941&quot; height=&quot;115&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.oxfordbibliographies.com/obo/moduleimage/international-relations&amp;amp;raw&quot; width=&quot;115&quot;&gt;&lt;span data-dcnode-id=&quot;1940&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;1936&quot;&gt;&lt;span data-dcnode-id=&quot;1937&quot; instrument_node=&quot;&quot;&gt;Reputation in International Relations&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;dl class=&quot;metaInfo&quot; data-dcnode-id=&quot;1926&quot;&gt;&lt;dt class=&quot;author&quot; data-dcnode-id=&quot;1933&quot;&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;by&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;author&quot; data-dcnode-id=&quot;1927&quot;&gt;&lt;a data-dcnode-id=&quot;1931&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//crescenzi.web.unc.edu/&quot; referrer=&quot;origin-when-cross-origin&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1932&quot; instrument_node=&quot;&quot;&gt;Mark J.C. Crescenzi&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1930&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1928&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.oxfordbibliographies.com/ViewContributor/document/obo-9780199743292/obo-9780199743292-0208.xml%3Fid%3Dcon7471&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1929&quot; instrument_node=&quot;&quot;&gt;Bailee Donahue&lt;/span&gt;&lt;/a&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;div class=&quot;modified&quot; data-dcnode-id=&quot;1918&quot;&gt;&lt;ul data-dcnode-id=&quot;1919&quot;&gt;&lt;li class=&quot;_rev&quot; data-dcnode-id=&quot;1924&quot;&gt;&lt;span data-dcnode-id=&quot;1925&quot; instrument_node=&quot;&quot;&gt;LAST REVIEWED: 10 January 2019&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;_mod&quot; data-dcnode-id=&quot;1922&quot;&gt;&lt;span data-dcnode-id=&quot;1923&quot; instrument_node=&quot;&quot;&gt;LAST MODIFIED: 27 April 2017&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;doi&quot; data-dcnode-id=&quot;1920&quot;&gt;&lt;span data-dcnode-id=&quot;1921&quot; instrument_node=&quot;&quot;&gt;DOI: 10.1093/obo/9780199743292-0208&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;div1&quot; data-dcnode-id=&quot;1909&quot;&gt;&lt;a data-dcnode-id=&quot;1914&quot; name=&quot;obo-9780199743292-0208-div1-0001&quot;&gt;&lt;/a&gt;&lt;h2 data-dcnode-id=&quot;1912&quot;&gt;&lt;span data-dcnode-id=&quot;1913&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1910&quot;&gt;&lt;span data-dcnode-id=&quot;1911&quot; instrument_node=&quot;&quot;&gt;The concept of reputation in the study of world politics typically describes information adhering to a state or its leaders concerning behavioral or intentional characteristics relating to cooperation or conflict. States or their leaders obtain reputations for some key dimension of information, which others use to predict the state’s actions. For example, a state can develop a reputation for being trustworthy or reliable, and this information may affect future contracts and treaties with other states. States can also develop reputations for being aggressive or untrustworthy, which can exacerbate international relations. Reputation can also be an end to its own, and states can cultivate reputations for being honorable, saving face, or being of high status. As a source of information, reputation is gleaned from multiple sources, such as past behavior, interactions, contracts, or statements, often but not always involving other states in the global arena. The notion of reputation as an influential component of world politics is as old as the study of world politics itself. In his classic historiography of the Peloponnesian War, Thucydides speaks often of reputation both as a measure of status and as a trait worthy of preserving at all costs. This original casting of reputation’s role remained unmodified throughout much of the early evolution of the study of international relations and even took center stage in the aftermath of World War II and the rapid onset of the Cold War. In the aftermath of the Cold War, however, scholars began to reconsider reputation’s influence, and its contribution to our understanding of international conflict began to unravel. Yet at the same time reputation remained a central component of the study of cooperation, and new research points to a renewed understanding of this elusive phenomenon.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;div1&quot; data-dcnode-id=&quot;1828&quot;&gt;&lt;a data-dcnode-id=&quot;1908&quot; name=&quot;obo-9780199743292-0208-div1-0002&quot;&gt;&lt;/a&gt;&lt;h2 data-dcnode-id=&quot;1906&quot;&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;The Classic Debate&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1892&quot;&gt;&lt;span data-dcnode-id=&quot;1905&quot; instrument_node=&quot;&quot;&gt;Regarding the question of reputation and international war, classic theories and their critiques are characterized by their focus on a state’s use of reputation as a mechanism for conveying information about resolve. This resolve is either with respect to the willingness to fight for one’s honor, as in the case of Thucydides, or the willingness to punish, as in the case of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1903&quot; href=&quot;#obo-9780199743292-0208-bibItem-0005&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;Schelling 1960&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1902&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1900&quot; href=&quot;#obo-9780199743292-0208-bibItem-0006&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1901&quot; instrument_node=&quot;&quot;&gt;Schelling 1966&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1899&quot; instrument_node=&quot;&quot;&gt;. This notion of resolve is a key component of deterrence theory, a vast body of work that overlaps with theories of reputation. Critiques of the notion that resolve could be conveyed through reputation focused on the intersubjective context of resolve that causes resolve to be too specific to transform into reputational information. As the Cold War ended, reputation’s role in world politics was called into question. Just as Schelling’s works anchored the classic models that took reputation as a given component of the bargaining and deterrence processes, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1897&quot; href=&quot;#obo-9780199743292-0208-bibItem-0003&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1898&quot; instrument_node=&quot;&quot;&gt;Mercer 1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1896&quot; instrument_node=&quot;&quot;&gt; anchors the challenge against reputation as a systematic and predictable influence in world politics. According to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1894&quot; href=&quot;#obo-9780199743292-0208-bibItem-0004&quot; title=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;1895&quot; instrument_node=&quot;&quot;&gt;Press 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1893&quot; instrument_node=&quot;&quot;&gt;, reputation does not affect crisis behavior. The current calculus of the crisis dominates policy decisions and deliberations.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1891&quot;&gt;&lt;/p&gt;&lt;ul class=&quot;bibliography&quot; data-dcnode-id=&quot;1830&quot; id=&quot;obo-9780199743292-0208-bibList-1&quot;&gt;&lt;li data-dcnode-id=&quot;1879&quot; id=&quot;obo-9780199743292-0208-bibItemGroup-0001&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1886&quot; id=&quot;obo-9780199743292-0208-bibItem-0001&quot;&gt;&lt;span data-dcnode-id=&quot;1890&quot; instrument_node=&quot;&quot;&gt;Copeland, D.&amp;nbsp;C. “Do reputations matter?” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1888&quot;&gt;&lt;span data-dcnode-id=&quot;1889&quot; instrument_node=&quot;&quot;&gt;Security Studies&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1887&quot; instrument_node=&quot;&quot;&gt; 7 (1997): 33–71. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1882&quot;&gt;&lt;span data-dcnode-id=&quot;1885&quot; instrument_node=&quot;&quot;&gt;
	      	  DOI: &lt;/span&gt;&lt;a class=&quot;doi&quot; data-dcnode-id=&quot;1883&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dx.doi.org/10.1080/09636419708429333&quot; referrer=&quot;origin-when-cross-origin&quot; tabindex=&quot;0&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1884&quot; instrument_node=&quot;&quot;&gt;10.1080/09636419708429333&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1880&quot;&gt;&lt;span data-dcnode-id=&quot;1881&quot; instrument_node=&quot;&quot;&gt;Copeland notes that there are inconsistencies in Mercer’s logic, namely that reputations for resolve may be hard to change not because these reputations are hard to form but rather because these reputations are imbedded in the labels states have already given each other. Copeland moves from his critique to create a potential causal framework to understand how reputations become established between actors and to specify under what conditions certain kinds of reputations form.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1867&quot; id=&quot;obo-9780199743292-0208-bibItemGroup-0002&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1874&quot; id=&quot;obo-9780199743292-0208-bibItem-0002&quot;&gt;&lt;span data-dcnode-id=&quot;1878&quot; instrument_node=&quot;&quot;&gt;Huth, P. “Reputations and deterrence: A theoretical and empirical assessment.” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1876&quot;&gt;&lt;span data-dcnode-id=&quot;1877&quot; instrument_node=&quot;&quot;&gt;Security Studies&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1875&quot; instrument_node=&quot;&quot;&gt; 7.1 (1997): 72–99. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1870&quot;&gt;&lt;span data-dcnode-id=&quot;1873&quot; instrument_node=&quot;&quot;&gt;
	      	  DOI: &lt;/span&gt;&lt;a class=&quot;doi&quot; data-dcnode-id=&quot;1871&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dx.doi.org/10.1080/09636419708429334&quot; referrer=&quot;origin-when-cross-origin&quot; tabindex=&quot;0&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1872&quot; instrument_node=&quot;&quot;&gt;10.1080/09636419708429334&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1868&quot;&gt;&lt;span data-dcnode-id=&quot;1869&quot; instrument_node=&quot;&quot;&gt;Huth provides a theoretical and empirical assessment on the state of deterrence theory and reputation. He notes that there is a consequential gap between the intuition that reputations are an important cause of conflict and the empirical evidence that would support such a conclusion.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1858&quot; id=&quot;obo-9780199743292-0208-bibItemGroup-0003&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1862&quot; id=&quot;obo-9780199743292-0208-bibItem-0003&quot;&gt;&lt;span data-dcnode-id=&quot;1866&quot; instrument_node=&quot;&quot;&gt;Mercer, J. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1864&quot;&gt;&lt;span data-dcnode-id=&quot;1865&quot; instrument_node=&quot;&quot;&gt;Reputation and International Politics&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1863&quot; instrument_node=&quot;&quot;&gt;. Ithaca, NY: Cornell University Press, 1996. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1861&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1859&quot;&gt;&lt;span data-dcnode-id=&quot;1860&quot; instrument_node=&quot;&quot;&gt;In his study, Mercer theorizes on the role that cognitive biases play in the construction of reputation. Mercer argues that altering a reputation in the eyes of a state’s allies and enemies is very difficult. Contrary to decades of foreign policy prescription, Mercer argues that reputations may not be worth fighting for.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1849&quot; id=&quot;obo-9780199743292-0208-bibItemGroup-0004&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1853&quot; id=&quot;obo-9780199743292-0208-bibItem-0004&quot;&gt;&lt;span data-dcnode-id=&quot;1857&quot; instrument_node=&quot;&quot;&gt;Press, D.&amp;nbsp;G. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1855&quot;&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt;Calculating Credibility: How Leaders Assess Military Threats&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;. Ithaca, NY: Cornell University Press, 2005. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1852&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1850&quot;&gt;&lt;span data-dcnode-id=&quot;1851&quot; instrument_node=&quot;&quot;&gt;Press argues that rather than assessing their adversaries’ credibility by looking at past behaviors of commitment and credibility, policymakers are focused on the present crisis and do not consider the past when selecting a policy. Press’ study suggests that reputation does not play a role in policymakers’ decisions during crisis.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1840&quot; id=&quot;obo-9780199743292-0208-bibItemGroup-0005&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1844&quot; id=&quot;obo-9780199743292-0208-bibItem-0005&quot;&gt;&lt;span data-dcnode-id=&quot;1848&quot; instrument_node=&quot;&quot;&gt;Schelling, T. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1846&quot;&gt;&lt;span data-dcnode-id=&quot;1847&quot; instrument_node=&quot;&quot;&gt;The Strategy of Conflict&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1845&quot; instrument_node=&quot;&quot;&gt;. Cambridge, UK: Harvard University Press, 1960. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1843&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1841&quot;&gt;&lt;span data-dcnode-id=&quot;1842&quot; instrument_node=&quot;&quot;&gt;In this book, Schelling explores how actors can credibly threaten an adversary. One method of making a credible threat is to stake one’s reputation on fulfilling the threat and ensuring that future bargains will be negatively impacted by defection in the present. Backing down once the threat has been made has a negative reputational impact.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1831&quot; id=&quot;obo-9780199743292-0208-bibItemGroup-0006&quot;&gt;&lt;p class=&quot;citationInfo&quot; data-dcnode-id=&quot;1835&quot; id=&quot;obo-9780199743292-0208-bibItem-0006&quot;&gt;&lt;span data-dcnode-id=&quot;1839&quot; instrument_node=&quot;&quot;&gt;Schelling, T. &lt;/span&gt;&lt;em data-dcnode-id=&quot;1837&quot;&gt;&lt;span data-dcnode-id=&quot;1838&quot; instrument_node=&quot;&quot;&gt;Arms and Influence&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1836&quot; instrument_node=&quot;&quot;&gt;. New Haven, CT: Yale University Press, 1966. &lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;citationActions&quot; data-dcnode-id=&quot;1834&quot;&gt;&lt;/p&gt;&lt;p class=&quot;citationParagraph&quot; data-dcnode-id=&quot;1832&quot;&gt;&lt;span data-dcnode-id=&quot;1833&quot; instrument_node=&quot;&quot;&gt;In his influential work, Schelling notes that one of the few things in the world worth fighting for is “face.” Face, he argues, is a combination of the state’s reputation for taking action and the expectations other countries have of its behavior. This observation has been a fundamental component of the study of reputation in international relations and has been a guiding principle for US policymakers.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;1829&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1827&quot; instrument_node=&quot;&quot;&gt;
