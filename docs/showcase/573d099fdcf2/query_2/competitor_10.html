&lt;/span&gt;&lt;p data-dcnode-id=&quot;1704&quot;&gt;&lt;span data-dcnode-id=&quot;1708&quot; instrument_node=&quot;&quot;&gt;This course has been designed to contribute towards achieving the following United Nations Sustainable Development Goal: &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1705&quot;&gt;&lt;a data-dcnode-id=&quot;1706&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.northampton.ac.uk/about-us/governance-and-management/management/sustainability/sustainable-development-goals/sdg10-reduced-inequalities/&quot;&gt;&lt;span data-dcnode-id=&quot;1707&quot; instrument_node=&quot;&quot;&gt;SDG10 of Reduced Inequalities. &lt;/span&gt;&lt;/a&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1703&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1701&quot;&gt;&lt;span data-dcnode-id=&quot;1702&quot; instrument_node=&quot;&quot;&gt;In today’s society the emergence of transnational economies, increased global communications, the movement of people, cultures and ideas are reshaping the notions of citizenship and community. With this the increase in sectarian violence and new fundamentalisms are challenging security on an individual to international level. With this in mind, there has never been a more interesting time or a greater need for the study of International Relations. The subject gives you a thorough and sensitive knowledge of interests, ethnicities and cultures allowing you to understand the global condition.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1700&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1698&quot;&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;International Relations is a vital and dynamic subject that offers you an interdisciplinary exploration of human interaction. It is not so much a single discipline; rather it is a study of a particular type of behaviour whose comprehension requires the insight and methods of a number of disciplines. Although your MA is set within a strong political and sociological framework, the course is enhanced through the support of Law, History, and American Studies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1697&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1695&quot;&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;Studying International Relations provides you with an opportunity to engage with and adapt to the changing international, national and regional realities post 9/11. The security implications of the events of 9/11, and the impact of global developments on everyday lives, are present in the public mind as never before. Current topical issues are explored through this course including:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1680&quot;&gt;&lt;span data-dcnode-id=&quot;1693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1691&quot;&gt;&lt;span data-dcnode-id=&quot;1692&quot; instrument_node=&quot;&quot;&gt;nuclear proliferation&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1688&quot;&gt;&lt;span data-dcnode-id=&quot;1689&quot; instrument_node=&quot;&quot;&gt;international crime and terrorism&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1687&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1685&quot;&gt;&lt;span data-dcnode-id=&quot;1686&quot; instrument_node=&quot;&quot;&gt;Israel and Palestine&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1682&quot;&gt;&lt;span data-dcnode-id=&quot;1683&quot; instrument_node=&quot;&quot;&gt;western intervention and civil war in Iraq&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1681&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1677&quot;&gt;&lt;span data-dcnode-id=&quot;1678&quot; instrument_node=&quot;&quot;&gt;International Relations develops your critical awareness, conceptual understanding, research methods and the way that you apply your knowledge. Your MA will provide you with an appropriate set of intellectual skills to enable you to come to more informed and effective conclusions in an ‘ever-changing’ global context.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1674&quot;&gt;&lt;span data-dcnode-id=&quot;1675&quot; instrument_node=&quot;&quot;&gt;It is our aim to complement your existing knowledge and build upon your first degree, giving you transferable capabilities and a specialist area of knowledge. This course provides you with a unique opportunity for you to study at a very high level for a postgraduate degree with global relevance, regardless of whether you have studied this subject previously or not.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1673&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1671&quot;&gt;&lt;span data-dcnode-id=&quot;1672&quot; instrument_node=&quot;&quot;&gt;The MA offers an exciting opportunity for graduates to develop their understanding of international affairs both theoretically and through your own or others’ experience.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1670&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;1165&quot;&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;How will I learn?&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1162&quot;&gt;&lt;span data-dcnode-id=&quot;1163&quot; instrument_node=&quot;&quot;&gt;Our International Relations MA is awarded after completion of a mixture of taught courses and a programme of research. The MA lasts at least one year if taken full-time, two years part-time. We also offer advanced short courses that lead to Postgraduate Certificates and Postgraduate Diplomas in International Relations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1159&quot;&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;We recognise that some students may prefer to study in ‘stages’ – funds or time permitting. This is why we provide a named Postgraduate Certificate and a named Postgraduate Diploma. A Postgraduate Diploma in International Relations is available if you successfully complete 120 CATS points but do not complete the 60 CATS dissertation. Alternatively, there is the opportunity to achieve a Postgraduate Certificate in International Relations by successfully gaining 60 CATS points including 40 CATS of IR theory, but excluding 20 CATS of methodology/research, and the 60 CATS dissertation module.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1156&quot;&gt;&lt;span data-dcnode-id=&quot;1157&quot; instrument_node=&quot;&quot;&gt;All of this gives you the added flexibility of opting in or out of awards depending upon your individual needs. This also enables you to complete your study within a timescale suitable to your own specific needs. We offer multiple points of entry (February and September) over a one or two year cycle to give you added flexibility.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1155&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;1153&quot;&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;How will I be assessed?&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;1152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1150&quot;&gt;&lt;span data-dcnode-id=&quot;1151&quot; instrument_node=&quot;&quot;&gt;You will study through a range of coursework and your dissertation. Assessment methods on this course include essays, literature reviews, presentations and research reports. Depending on your option choices, it is possible to study this course without examinations. All coursework reflects the high level of intellectual demands associated with a taught MA and has the aim of developing a range of oral and written skills. You need to be prepared to commit yourself to substantial reading and thought for successful completion of an MA. The lectures and tutor-led teaching on this course provide you with overviews of major theories and themes but the seminars and workshops are where your learning is consolidated, exemplified and put into context.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;1147&quot;&gt;&lt;span data-dcnode-id=&quot;1148&quot; instrument_node=&quot;&quot;&gt;What is the schedule like for this course?&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;1146&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1144&quot;&gt;&lt;span data-dcnode-id=&quot;1145&quot; instrument_node=&quot;&quot;&gt;We aim to encourage student-led debates and the exchange of ideas. Modules will typically alternate fortnightly between classes on campus and online learning activities. Each module incorporates a variety of teaching methods in class, including workshops, presentations and discussions of primary and secondary materials (such as film, images and online resources). Online learning activities include online seminars, discussion boards, podcasts and blogs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1143&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1141&quot;&gt;&lt;span data-dcnode-id=&quot;1142&quot; instrument_node=&quot;&quot;&gt;If you are studying this course full-time you will have six hours of timetabled contact per week, if you are studying this course part-time you will have three hours. Please note that this does not include individual tutorials or dissertation supervision.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1138&quot;&gt;&lt;span data-dcnode-id=&quot;1139&quot; instrument_node=&quot;&quot;&gt;Independent study and assessment time equate to approximately 18 hours per week full-time or nine hours part-time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;1135&quot;&gt;&lt;span data-dcnode-id=&quot;1136&quot; instrument_node=&quot;&quot;&gt;Are there any special features on this course?&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;1134&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1114&quot;&gt;&lt;span data-dcnode-id=&quot;1133&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1131&quot;&gt;&lt;span data-dcnode-id=&quot;1132&quot; instrument_node=&quot;&quot;&gt;strong staff expertise&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1130&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1128&quot;&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;enthusiastic and approachable teaching team providing a supportive atmosphere for research&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1125&quot;&gt;&lt;span data-dcnode-id=&quot;1126&quot; instrument_node=&quot;&quot;&gt;the core modules consider classic texts and the very latest thinking on international theory&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1122&quot;&gt;&lt;span data-dcnode-id=&quot;1123&quot; instrument_node=&quot;&quot;&gt;focus on the study of distinct global regions not just Europe, North America or the West&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1121&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1119&quot;&gt;&lt;span data-dcnode-id=&quot;1120&quot; instrument_node=&quot;&quot;&gt;you will be assigned a personal tutor and will be encouraged to form study groups with colleagues&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1118&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1116&quot;&gt;&lt;span data-dcnode-id=&quot;1117&quot; instrument_node=&quot;&quot;&gt;we invite a variety of guest speakers in to give you their personal insights and experiences&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1115&quot; instrument_node=&quot;&quot;&gt;
