Trained under Dr. Russel H. Williams, M.D. and Dr. Tristan Grimaldo, DNP, his goal is to provide the best possible care for all his patients by listening to their concerns and performing thorough evaluations. He is committed to excellence and is determined to help men achieve their optimal level of health.

Outside of work, he enjoys spending quality time with his wife and children. He values family life and enjoys activities such as mountain biking, hunting, and fishing. He is also fluent in Spanish and is ecstatic to be a part of The Y Factor team.

-test=&quot;collapsible-block&quot;&gt;&lt;span data-dcnode-id=&quot;4355&quot; instrument_node=&quot;&quot;&gt;Dr. Sandeep Mehta is a urologist and urologic surgeon who specializes in minimally invasive surgical treatment and medical management of all urologic conditions. His passion is improving quality of life in patients suffering from benign and malignant diseases.

Having trained with the &quot;father of endourology,&quot; he is particularly adept at kidney stone treatment. In addition to shock wave lithotripsy and ureteroscopy, he is an expert at the Percutaneous Nephrolithotomy (PCNL) for advanced management of large kidney and staghorn stones.

Also unique to his practice is the transcutaneous transperineal prostate biopsy. He has experience with hundreds of this novel approach that avoids infection and maximizes cancer detection.

Dr. Sandeep Mehta is conveniently located at 9230 Katy Freeway in Houston, TX. He currently practices at Houston Metro Urology PA. He is also affiliated with Memorial Hermann Memorial City Medical Center and Houston Methodist West Hospital.

Dr. Mehta completed his medical degree at the University of Texas, Southwestern, followed by an internship in general surgery at the Hofstra Northwell School of Medicine. He further completed a residency in urology at the Donald and Barbara Zucker School of Medicine at Hofstra/Northwell, Smith Institute for Urology.

A well-trained provider, Dr. Mehta is an active member of the Harris County Medical Society and the Texas Medical Association. In addition to pursuing his clinical career, he has published articles and book chapters that focus on various topics in his field of specialization.&lt;/span&gt;&lt;div class=&quot;patient-web-app__sc-192nc1l-1 haqNYm hidden&quot; data-dcnode-id=&quot;4308&quot; data-test=&quot;children-wrap&quot;&gt;&lt;div class=&quot;patient-web-app__sc-st74kp-0 QLAXI&quot; data-dcnode-id=&quot;4349&quot;&gt;&lt;h4 class=&quot;patient-web-app__sc-st74kp-1 hXErsT&quot; data-dcnode-id=&quot;4353&quot;&gt;&lt;span data-dcnode-id=&quot;4354&quot; instrument_node=&quot;&quot;&gt;Practice&lt;/span&gt;&lt;/h4&gt;&lt;ul data-dcnode-id=&quot;4350&quot;&gt;&lt;li data-dcnode-id=&quot;4351&quot;&gt;&lt;span data-dcnode-id=&quot;4352&quot; instrument_node=&quot;&quot;&gt;Houston Metro Urology PA&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;patient-web-app__sc-st74kp-0 QLAXI&quot; data-dcnode-id=&quot;4343&quot;&gt;&lt;h4 class=&quot;patient-web-app__sc-st74kp-1 hXErsT&quot; data-dcnode-id=&quot;4347&quot;&gt;&lt;span data-dcnode-id=&quot;4348&quot; instrument_node=&quot;&quot;&gt;Board certifications&lt;/span&gt;&lt;/h4&gt;&lt;ul data-dcnode-id=&quot;4344&quot;&gt;&lt;li data-dcnode-id=&quot;4345&quot;&gt;&lt;span data-dcnode-id=&quot;4346&quot; instrument_node=&quot;&quot;&gt;American Board of Urology&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;patient-web-app__sc-st74kp-0 QLAXI&quot; data-dcnode-id=&quot;4331&quot;&gt;&lt;h4 class=&quot;patient-web-app__sc-st74kp-1 hXErsT&quot; data-dcnode-id=&quot;4341&quot;&gt;&lt;span data-dcnode-id=&quot;4342&quot; instrument_node=&quot;&quot;&gt;Education&lt;/span&gt;&lt;/h4&gt;&lt;ul data-dcnode-id=&quot;4332&quot;&gt;&lt;li data-dcnode-id=&quot;4339&quot;&gt;&lt;span data-dcnode-id=&quot;4340&quot; instrument_node=&quot;&quot;&gt;Medical School - University of Texas, Southwestern, About Us:
Dr. Durrani is a 2nd-generation, board-certified urologist who received his medical degree from Tulane University and then trained at the Harvard-affiliated Massachusetts General Hospital (MGH) in Boston, the Lahey Clinic, and the University of Pittsburgh (UMPC). He was selected &quot;Physician of the Year&quot; at HCA Houston Healthcare West Hospital in 2014 where he served as Chair of Surgery and presently as Chief of Staff (2018-2020). 
Dr. Durrani specializes in traditional urology along with a focus on male sexual dysfunction (including the most advanced treatments for E.D. and testosterone replacement in men as well as the latest treatments for women's sexual health problems related to the loss of estrogen after menopause). His aim is to deliver expert urologic along with these services in a boutique practice setting enabling his patients to feel better, look better, and live better.&lt;/span&gt;&lt;div class=&quot;patient-web-app__sc-192nc1l-1 haqNYm hidden&quot; data-dcnode-id=&quot;4016&quot; data-test=&quot;children-wrap&quot;&gt;&lt;div class=&quot;patient-web-app__sc-st74kp-0 QLAXI&quot; data-dcnode-id=&quot;4045&quot;&gt;&lt;h4 class=&quot;patient-web-app__sc-st74kp-1 hXErsT&quot; data-dcnode-id=&quot;4049&quot;&gt;&lt;span data-dcnode-id=&quot;4050&quot; instrument_node=&quot;&quot;&gt;Practice&lt;/span&gt;&lt;/h4&gt;&lt;ul data-dcnode-id=&quot;4046&quot;&gt;&lt;li data-dcnode-id=&quot;4047&quot;&gt;&lt;span data-dcnode-id=&quot;4048&quot; instrument_node=&quot;&quot;&gt;DurraniMD&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;patient-web-app__sc-st74kp-0 QLAXI&quot; data-dcnode-id=&quot;4039&quot;&gt;&lt;h4 class=&quot;patient-web-app__sc-st74kp-1 hXErsT&quot; data-dcnode-id=&quot;4043&quot;&gt;&lt;span data-dcnode-id=&quot;4044&quot; instrument_node=&quot;&quot;&gt;Board certifications&lt;/span&gt;&lt;/h4&gt;&lt;ul data-dcnode-id=&quot;4040&quot;&gt;&lt;li data-dcnode-id=&quot;4041&quot;&gt;&lt;span data-dcnode-id=&quot;4042&quot; instrument_node=&quot;&quot;&gt;American Board of Urology&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;patient-web-app__sc-st74kp-0 QLAXI&quot; data-dcnode-id=&quot;4027&quot;&gt;&lt;h4 class=&quot;patient-web-app__sc-st74kp-1 hXErsT&quot; data-dcnode-id=&quot;4037&quot;&gt;&lt;span data-dcnode-id=&quot;4038&quot; instrument_node=&quot;&quot;&gt;Education&lt;/span&gt;&lt;/h4&gt;&lt;ul data-dcnode-id=&quot;4028&quot;&gt; Dr. Mucher earned his medical degree at University of Texas Medical Branch in Galveston, Texas and completed his urology residency at University of Texas Southwestern Medical Center.

He has received several awards, including Physician of the Year at his previous hospital in 2016-2017 and Living Magazine Reader’s Choice Best Urologist in Fort Bend 2016 and 2018.

Dr. Williams treats men of the Houston area experiencing male reproductive, sexual dysfunction, and prostate problems. Dr. Williams believes that the effective treatment of these complications will lead to improving vitality and quality of life.

Dr. Williams is the founder of and medical director at The Y Factor. He is recognized as one of the few reproductive urologists concentrating on male fertility and men’s urological wellness in the Greater Houston area. Dr. Williams’ treatment plans enhance male fertility to make pregnancy more successful through intercourse, artificial intrauterine insemination or in-vitro fertilization.

Performing a broad range of procedures including surgical therapy, medical therapy, laser therapy, vasectomy reversal, no-scalpel no-needle vasectomy, fertility life counseling, and comprehensive urological evaluations, Dr. Williams ensures a treatment plan based on the underlying cause of your health problem.

Dr. Williams’ formal medical education exemplifies commitment and excellence. He received his medical doctorate degree from the University of Texas at Dallas Southwestern Medical Center.

Outside of work, he enjoys spending quality time with his wife and children. He values family life and enjoys activities such as mountain biking, hunting, and fishing. He is also fluent in Spanish and is ecstatic to be a part of The Y Factor team.

;span data-dcnode-id=&quot;3008&quot; instrument_node=&quot;&quot;&gt;77375&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;patient-web-app__sc-84gctr-0 dwbmyT&quot; data-dcnode-id=&quot;2978&quot;&gt;&lt;div class=&quot;patient-web-app__sc-192nc1l-0 idimBL patient-web-app__sc-i5k0wr-0 dKgvhA overflown&quot; data-dcnode-id=&quot;2979&quot; data-test=&quot;collapsible-block&quot;&gt;&lt;span data-dcnode-id=&quot;3003&quot; instrument_node=&quot;&quot;&gt;Tristan Grimaldo is a board-certified family nurse practitioner with a clinical doctorate specializing in reproductive urology.

Dr. Grimaldo brings seven years of nursing experience to The Y Factor team. He gained years of experience through the Memorial Hermann Healthcare system in the following clinical settings: medical surgical, telemetry, emergency department, orthopedics, trauma, surgery, observation, intermediate care unit and oncology.

In 2012, he graduated in the top twenty percent of his class, Cum Laude, with a Bachelor of Science in nursing. He was also inducted into Sigma Theta Tau, the international honor society of nursing. In 2015, he graduated with his master’s degree as a family nurse practitioner from TWU. In 2017, Dr. Grimaldo completed his Doctor of Nursing Practice (DNP), a clinical doctorate specializing in reproductive urology. In 2020, Dr. Grimaldo also completed his post-master’s degree for Health Systems Management &amp;amp; Administration (MHSM).

Dr. Grimaldo was recognized and awarded as the Most Outstanding Doctoral Student of 2017 from TWU and was inducted into the honor society Epsilon Omega Epsilon. He is also an adjunct professor for TWU and teaches students at the graduate level.

Outside of work, Dr. Grimaldo is an avid fitness junkie and enjoys lifting weights, running and playing basketball.

Dr. Williams treats men of the Houston area experiencing male reproductive, sexual dysfunction, and prostate problems. Dr. Williams believes that the effective treatment of these complications will lead to improving vitality and quality of life.

Dr. Williams is the founder of and medical director at The Y Factor. He is recognized as one of the few reproductive urologists concentrating on male fertility and men’s urological wellness in the Greater Houston area. Dr. Williams’ treatment plans enhance male fertility to make pregnancy more successful through intercourse, artificial intrauterine insemination or in-vitro fertilization.

Performing a broad range of procedures including surgical therapy, medical therapy, laser therapy, vasectomy reversal, no-scalpel no-needle vasectomy, fertility life counseling, and comprehensive urological evaluations, Dr. Williams ensures a treatment plan based on the underlying cause of your health problem.

Dr. Williams’ formal medical education exemplifies commitment and excellence. He received his medical doctorate degree from the University of Texas at Dallas Southwestern Medical Center.

;/div&gt;&lt;div class=&quot;patient-web-app__sc-84gctr-0 dwbmyT&quot; data-dcnode-id=&quot;1870&quot;&gt;&lt;div class=&quot;patient-web-app__sc-192nc1l-0 idimBL patient-web-app__sc-i5k0wr-0 dKgvhA overflown&quot; data-dcnode-id=&quot;1871&quot; data-test=&quot;collapsible-block&quot;&gt;&lt;span data-dcnode-id=&quot;1905&quot; instrument_node=&quot;&quot;&gt;Benancio Martinez Jr is a certified Family Nurse Practitioner (FNP-C) and brings a wealth of experience to The Y Factor team. Benancio is the lead medical provider at the Tomball and Woodlands locations and brings to The Y Factor 10 years of nursing experience obtained through the emergency departments of the VA and Kingwood medical centers, as well as clinical experience in family practice, hematology, and oncology.

In 2009, Benancio graduated with honors from TWU with a Bachelor’s of Science and a major in nursing (BSN). He was also recognized and invited into the international honor society of nursing. In 2017, he earned a Master’s of Science (MSN) degree from TWU as a Family Nurse Practitioner.

Trained under Dr. Russel H. Williams, M.D. and Dr. Tristan Grimaldo, DNP, his goal is to provide the best possible care for all his patients by listening to their concerns and performing thorough evaluations. He is committed to excellence and is determined to help men achieve their optimal level of health.

Outside of work, he enjoys spending quality time with his wife and children. He values family life and enjoys activities such as mountain biking, hunting, and fishing. He is also fluent in Spanish and is ecstatic to be a part of The Y Factor team.

;span data-dcnode-id=&quot;1814&quot; instrument_node=&quot;&quot;&gt;77055&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;patient-web-app__sc-84gctr-0 dwbmyT&quot; data-dcnode-id=&quot;1784&quot;&gt;&lt;div class=&quot;patient-web-app__sc-192nc1l-0 idimBL patient-web-app__sc-i5k0wr-0 dKgvhA overflown&quot; data-dcnode-id=&quot;1785&quot; data-test=&quot;collapsible-block&quot;&gt;&lt;span data-dcnode-id=&quot;1809&quot; instrument_node=&quot;&quot;&gt;Tristan Grimaldo is a board-certified family nurse practitioner with a clinical doctorate specializing in reproductive urology.

Dr. Grimaldo brings seven years of nursing experience to The Y Factor team. He gained years of experience through the Memorial Hermann Healthcare system in the following clinical settings: medical surgical, telemetry, emergency department, orthopedics, trauma, surgery, observation, intermediate care unit and oncology.

In 2012, he graduated in the top twenty percent of his class, Cum Laude, with a Bachelor of Science in nursing. He was also inducted into Sigma Theta Tau, the international honor society of nursing. In 2015, he graduated with his master’s degree as a family nurse practitioner from TWU. In 2017, Dr. Grimaldo completed his Doctor of Nursing Practice (DNP), a clinical doctorate specializing in reproductive urology. In 2020, Dr. Grimaldo also completed his post-master’s degree for Health Systems Management &amp;amp; Administration (MHSM).

Dr. Grimaldo was recognized and awarded as the Most Outstanding Doctoral Student of 2017 from TWU and was inducted into the honor society Epsilon Omega Epsilon. He is also an adjunct professor for TWU and teaches students at the graduate level.

Outside of work, Dr. Grimaldo is an avid fitness junkie and enjoys lifting weights, running and playing basketball.

lown&quot; data-dcnode-id=&quot;1250&quot; data-test=&quot;collapsible-block&quot;&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;Dr. Russel Williams has dedicated 20 years of his life to the health and wellbeing of men, specializing in men’s urological wellness and male fertility. 

Dr. Williams treats men of the Houston area experiencing male reproductive, sexual dysfunction, and prostate problems. Dr. Williams believes that the effective treatment of these complications will lead to improving vitality and quality of life.

Dr. Williams is the founder of and medical director at The Y Factor. He is recognized as one of the few reproductive urologists concentrating on male fertility and men’s urological wellness in the Greater Houston area. Dr. Williams’ treatment plans enhance male fertility to make pregnancy more successful through intercourse, artificial intrauterine insemination or in-vitro fertilization.

Dr. Williams’ formal medical education exemplifies commitment and excellence. He received his medical doctorate degree from the University of Texas at Dallas Southwestern Medical Center.

Dr. Williams treats men of the Houston area experiencing male reproductive, sexual dysfunction, and prostate problems. Dr. Williams believes that the effective treatment of these complications will lead to improving vitality and quality of life.

Dr. Williams is the founder of and medical director at The Y Factor. He is recognized as one of the few reproductive urologists concentrating on male fertility and men’s urological wellness in the Greater Houston area. Dr. Williams’ treatment plans enhance male fertility to make pregnancy more successful through intercourse, artificial intrauterine insemination or in-vitro fertilization.

Performing a broad range of procedures including surgical therapy, medical therapy, laser therapy, vasectomy reversal, no-scalpel no-needle vasectomy, fertility life counseling, and comprehensive urological evaluations, Dr. Williams ensures a treatment plan based on the underlying cause of your health problem.

Dr. Williams’ formal medical education exemplifies commitment and excellence. He received his medical doctorate degree from the University of Texas at Dallas Southwestern Medical Center.
