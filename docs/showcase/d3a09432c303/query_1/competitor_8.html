&lt;/span&gt;&lt;div class=&quot;contentText&quot; data-dcnode-id=&quot;265&quot;&gt;&lt;p data-dcnode-id=&quot;301&quot;&gt;&lt;span data-dcnode-id=&quot;302&quot; instrument_node=&quot;&quot;&gt;Our office provides vasectomy procedures daily in Colorado Spring. Most are performed Thursdays and Fridays&amp;nbsp;to allow for a weekend vasectomy recovery time - before returning to work the following week. Each year, between 500,000 and 600,000 men select vasectomy as the permanent birth control method of choice in their family.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;300&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;296&quot;&gt;&lt;span class=&quot;semi-bold&quot; data-dcnode-id=&quot;297&quot;&gt;&lt;br data-dcnode-id=&quot;299&quot;&gt;&lt;span data-dcnode-id=&quot;298&quot; instrument_node=&quot;&quot;&gt;Did you know:&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;295&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;269&quot;&gt;&lt;span data-dcnode-id=&quot;294&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;292&quot;&gt;&lt;span data-dcnode-id=&quot;293&quot; instrument_node=&quot;&quot;&gt;Vasectomy is considered nearly 100 percent effective, safe, and does not interfere with sexual pleasure.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;291&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;289&quot;&gt;&lt;span data-dcnode-id=&quot;290&quot; instrument_node=&quot;&quot;&gt;The No-Scalpel Vasectomy (NSV) procedure was developed in the early 1970s in China by Dr. Li Shunqiang.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;286&quot;&gt;&lt;span data-dcnode-id=&quot;287&quot; instrument_node=&quot;&quot;&gt;During the past few decades, over 15 million vasectomies have been performed around the world using the NSV technique.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;285&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;283&quot;&gt;&lt;span data-dcnode-id=&quot;284&quot; instrument_node=&quot;&quot;&gt;No-scalpel vasectomy can be completed in about 15 - 20 minutes.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;282&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;280&quot;&gt;&lt;span data-dcnode-id=&quot;281&quot; instrument_node=&quot;&quot;&gt;A vasectomy does not reduce a man’s sexual drive, virility or his ability to have or enjoy sex.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;279&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;277&quot;&gt;&lt;span data-dcnode-id=&quot;278&quot; instrument_node=&quot;&quot;&gt;About 85 percent of health care insurance programs include coverage for the vasectomy procedure, so there may be little or no cost to you.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;276&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;274&quot;&gt;&lt;span data-dcnode-id=&quot;275&quot; instrument_node=&quot;&quot;&gt;Most vasectomy procedures are performed by urologists; medical doctors who are specialists in the male and female urinary tract and the male reproductive organs.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;273&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;271&quot;&gt;&lt;span data-dcnode-id=&quot;272&quot; instrument_node=&quot;&quot;&gt;Sterilization for a man (vasectomy) is significantly less expensive than for a woman (tubal ligation), which may be as much as five times more costly.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;270&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;266&quot;&gt;&lt;span data-dcnode-id=&quot;267&quot; instrument_node=&quot;&quot;&gt;If you are considering having a vasectomy and still have questions, Optum is here to help. Call one of our friendly staff today!&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;contentText&quot; data-dcnode-id=&quot;242&quot;&gt;&lt;div class=&quot;contentText&quot; data-dcnode-id=&quot;243&quot;&gt;&lt;span data-dcnode-id=&quot;257&quot; instrument_node=&quot;&quot;&gt;According to statistics from the Centers for Disease Control and Prevention, men are 100% less likely to see a doctor yet more likely to die from the top ten causes of death at a higher rate than women. There are five key risk areas that men need to pay attention to:&lt;/span&gt;&lt;br data-dcnode-id=&quot;256&quot;&gt;&lt;span data-dcnode-id=&quot;255&quot; instrument_node=&quot;&quot;&gt; 1. High Cholesterol&lt;/span&gt;&lt;br data-dcnode-id=&quot;254&quot;&gt;&lt;span data-dcnode-id=&quot;253&quot; instrument_node=&quot;&quot;&gt; 2. High Blood Pressure&lt;/span&gt;&lt;br data-dcnode-id=&quot;252&quot;&gt;&lt;span data-dcnode-id=&quot;251&quot; instrument_node=&quot;&quot;&gt; 3. High Blood Sugar &lt;/span&gt;&lt;br data-dcnode-id=&quot;250&quot;&gt;&lt;span data-dcnode-id=&quot;249&quot; instrument_node=&quot;&quot;&gt;4. High PSA (Prostate-specific Antigen) &lt;/span&gt;&lt;br data-dcnode-id=&quot;248&quot;&gt;&lt;span data-dcnode-id=&quot;247&quot; instrument_node=&quot;&quot;&gt;5. Low Testosterone &lt;/span&gt;&lt;br data-dcnode-id=&quot;246&quot;&gt;&lt;br data-dcnode-id=&quot;245&quot;&gt;&lt;span data-dcnode-id=&quot;244&quot; instrument_node=&quot;&quot;&gt;If you have questions about these or other men's health issues or procedures such as vasectomies or incontinence, call our Urology specialists today.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;241&quot; instrument_node=&quot;&quot;&gt;
