&lt;/span&gt;&lt;img class=&quot;floatright&quot; data-dcnode-id=&quot;1539&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.vasweb.com/images/Vaspage/vasectomy_11.JPG&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;Developed as a means of contraception 
		in the early 20th century, and
		&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1536&quot;&gt;&lt;span data-dcnode-id=&quot;1537&quot; instrument_node=&quot;&quot;&gt;popular&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt; (500,000 procedures per year) since the 1950's, 
		vasectomy is a dependable method of &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1533&quot;&gt;&lt;span data-dcnode-id=&quot;1534&quot; instrument_node=&quot;&quot;&gt;birth control&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1532&quot; instrument_node=&quot;&quot;&gt; for men 
		who think they will never want &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1530&quot;&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;any&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt; or &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1527&quot;&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;any more&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt; 
		children. It is a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1524&quot;&gt;&lt;span data-dcnode-id=&quot;1525&quot; instrument_node=&quot;&quot;&gt;simple 15 minute procedure &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1523&quot; instrument_node=&quot;&quot;&gt;performed 
		in a doctor's office or clinic with a local anesthetic. The objective is 
		to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1521&quot;&gt;&lt;span data-dcnode-id=&quot;1522&quot; instrument_node=&quot;&quot;&gt;prevent sperm from entering the semen&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;, 95% of which 
		is support fluid made by glands called the prostate and seminal vesicles, 
		located in the pelvis behind and beneath the bladder (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1518&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.vasweb.com/vasectomy_anatomy.html&quot;&gt;&lt;span data-dcnode-id=&quot;1519&quot; instrument_node=&quot;&quot;&gt;anatomy 
		diagrams&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;). &lt;/span&gt;&lt;br data-dcnode-id=&quot;1516&quot;&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;center class=&quot;bold italic navytext&quot; data-dcnode-id=&quot;1513&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt;Be her hero!&lt;/span&gt;&lt;/center&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;alignleft&quot; data-dcnode-id=&quot;1509&quot;&gt;&lt;a data-dcnode-id=&quot;1511&quot; name=&quot;Before&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1510&quot; instrument_node=&quot;&quot;&gt;Before Vasectomy...&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;
		Sperm are made in the testes. From each testis, sperm move through a long 
		curled-up tube behind the testis (the epididymis) wherein they become mature. 
		From there, they swim up a foot-long tube (the vas) which guides them up 
		to the channel (urethra) through which men urinate and ejaculate. Just before 
		entering the urethra, the left and right vas tubes are enlarged, and it 
		is here, behind the bladder, where many sperm are stored between ejaculations. 
		The easiest place to access the vas tubes is just above the testes where 
		the vas tubes are just beneath the thin scrotal skin, easy to feel and very 
		mobile.
		&lt;/span&gt;&lt;h2 class=&quot;alignleft&quot; data-dcnode-id=&quot;1503&quot;&gt;&lt;a data-dcnode-id=&quot;1507&quot; name=&quot;Methods&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;Methods...
		&lt;/span&gt;&lt;span class=&quot;smalltext&quot; data-dcnode-id=&quot;1504&quot;&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;(Our preferences are below)&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1499&quot;&gt;&lt;span class=&quot;navytext&quot; data-dcnode-id=&quot;1500&quot;&gt;&lt;span data-dcnode-id=&quot;1501&quot; instrument_node=&quot;&quot;&gt;Anesthesia&lt;/span&gt;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1498&quot; instrument_node=&quot;&quot;&gt;: An anesthetic 
		solution can be injected with a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1496&quot;&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;tiny needle&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1495&quot; instrument_node=&quot;&quot;&gt; to numb the 
		scrotal skin and the vas tubes, or a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1493&quot;&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt;pressure spray applicator&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1492&quot; instrument_node=&quot;&quot;&gt; 
		can be used to numb the skin and vas tubes without using any needles.
		&lt;/span&gt;&lt;br data-dcnode-id=&quot;1491&quot;&gt;&lt;span data-dcnode-id=&quot;1490&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;1489&quot;&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1485&quot;&gt;&lt;span class=&quot;navytext&quot; data-dcnode-id=&quot;1486&quot;&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;Access&lt;/span&gt;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1484&quot; instrument_node=&quot;&quot;&gt;: During &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1482&quot;&gt;&lt;span data-dcnode-id=&quot;1483&quot; instrument_node=&quot;&quot;&gt;conventional 
		vasectomy&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1481&quot; instrument_node=&quot;&quot;&gt;, one or two 1/2-inch scrotal incisions are made to gain 
		access to the vas tubes. These incisions are later closed with sutures, 
		which remain in place for about 5 days until they dissolve or are removed. 
		During &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1479&quot;&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt;no-scalpel vasectomy (NSV)&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1478&quot; instrument_node=&quot;&quot;&gt;, special instruments 
		are used to perform the procedure through a single tiny access-opening on 
		the front side of the scrotum. The 1/4-inch slit usually seals within hours, 
		so no stitches are needed. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1477&quot;&gt;&lt;span data-dcnode-id=&quot;1476&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;1475&quot;&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1471&quot;&gt;&lt;span class=&quot;navytext&quot; data-dcnode-id=&quot;1472&quot;&gt;&lt;span data-dcnode-id=&quot;1473&quot; instrument_node=&quot;&quot;&gt;Blocking the vas tubes&lt;/span&gt;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1470&quot; instrument_node=&quot;&quot;&gt;: Whichever 
		technique of accessing the vas tubes is used, &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1468&quot;&gt;&lt;span data-dcnode-id=&quot;1469&quot; instrument_node=&quot;&quot;&gt;each vas&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1467&quot; instrument_node=&quot;&quot;&gt; 
		(left &amp;amp; right) is &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1465&quot;&gt;&lt;span data-dcnode-id=&quot;1466&quot; instrument_node=&quot;&quot;&gt;divided&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt; about one inch above each 
		testis, where it is just beneath the thin scrotal skin and very easy to 
		reach. What is done with the ends of the divided vas tubes depends on the 
		preference of the person performing the vasectomy. Some operators
		&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1462&quot;&gt;&lt;span data-dcnode-id=&quot;1463&quot; instrument_node=&quot;&quot;&gt;remove a piece&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1461&quot; instrument_node=&quot;&quot;&gt; of vas; others don't. Some &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1459&quot;&gt;&lt;span data-dcnode-id=&quot;1460&quot; instrument_node=&quot;&quot;&gt;tie off 
		one or both vas ends&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1458&quot; instrument_node=&quot;&quot;&gt; using permanent or absorbable sutures or the 
		small clips used to stop bleeding blood vessels during other types of surgical 
		procedures; others &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1456&quot;&gt;&lt;span data-dcnode-id=&quot;1457&quot; instrument_node=&quot;&quot;&gt;cauterize the ends&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1455&quot; instrument_node=&quot;&quot;&gt; so that they will 
		seal by scarring. Still others simply &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1453&quot;&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;place the divided ends out 
		of alignment&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1452&quot; instrument_node=&quot;&quot;&gt;, by closing the vas sheath between the 2 ends with

		portions of the vas tubes within the pelvis still contain live sperm until

		&lt;/span&gt;&lt;br data-dcnode-id=&quot;1431&quot;&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt;

		vas tubes (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1428&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.vasweb.com/vasectomy_anatomy.html&quot;&gt;&lt;span data-dcnode-id=&quot;1429&quot; instrument_node=&quot;&quot;&gt;anatomy diagrams&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt;).

		recycling the proteins back into the system for use in other body functions.

		&lt;/span&gt;&lt;a data-dcnode-id=&quot;1371&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.vasweb.com/media/SexualFcnAfterVasectomy2015.jpg&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;recent study&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1370&quot; instrument_node=&quot;&quot;&gt; 
		concluded that &lt;/span&gt;&lt;span class=&quot;bold&quot; data-dcnode-id=&quot;1368&quot;&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;vasectomy positively impacts the sexual

&lt;/span&gt;&lt;h2 class=&quot;alignleft&quot; data-dcnode-id=&quot;1354&quot;&gt;&lt;a data-dcnode-id=&quot;1356&quot; name=&quot;Risks&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;Risks...&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1346&quot;&gt;&lt;strong data-dcnode-id=&quot;1351&quot;&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;Bleeding&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1350&quot; instrument_node=&quot;&quot;&gt; can occur during or after vasectomy by either 
		method, but it is less common with NSV. If this occurs within the scrotum, 
		drainage of a scrotal hematoma (blood clot) in a hospital operating room 
		could be necessary. Smaller hematomas do not require surgical drainage, 
		but tender swelling can last for 2 to 4 weeks. Both large and small hematomas 
		are &lt;/span&gt;&lt;span class=&quot;bold italic&quot; data-dcnode-id=&quot;1348&quot;&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt;very rare&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;. If the scrotal skin bleeds 
		at the vasectomy access site, the scrotum can become discolored (black and 
		blue) for about a week; this is more common than swelling, but painless.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1345&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1338&quot;&gt;&lt;strong data-dcnode-id=&quot;1343&quot;&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;Infection&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1342&quot; instrument_node=&quot;&quot;&gt; is also a rare complication. Among the first 
		24,000 vasectomy patients served by Dr. Stein, six infections have occurred 
		(infection rate &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1340&quot;&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;1 in 4000&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1339&quot; instrument_node=&quot;&quot;&gt;): two patients had prolonged 
		discomfort and progressive swelling on one side, not responsive to oral 
		antibiotics, eventually maturing to a painful walnut-sized abscess requiring 
		office drainage through a half-inch incision and a two-week period of local 
		wound care. Four other milder infections (swelling unresponsive to anti-inflammatory 
		medications) responded to oral antibiotics.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1337&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1333&quot;&gt;&lt;strong data-dcnode-id=&quot;1335&quot;&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;Sperm granuloma&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt; is a pea-sized (sometimes tender) lump 
		on the vas tube at the vasectomy site, almost never requiring treatment. 
		Some consider sperm granulomas beneficial, as they may increase the likelihood 
		of success with vasectomy reversal. Periodic tenderness usually responds 
		to an anti-inflammatory medication like ibuprofen, but over the past 20 
		years and 40,000 vasectomies, 
		5-10 men been so troubled by chronic tenderness that they chose to undergo 
		removal of the lump, an office procedure performed under local anesthesia 
		similar to the original vasectomy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1325&quot;&gt;&lt;strong data-dcnode-id=&quot;1330&quot;&gt;&lt;span data-dcnode-id=&quot;1331&quot; instrument_node=&quot;&quot;&gt;Congestion&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;, tender buildup of sperm and white blood 
		cells upstream from or at the vasectomy site, can occur anytime after vasectomy, 
		but usually goes away with use of an anti-inflammatory drug such as aspirin 
		or ibuprofen. About one in 2000 patients will experience &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1327&quot;&gt;&lt;span data-dcnode-id=&quot;1328&quot; instrument_node=&quot;&quot;&gt;chronic 
		post-vasectomy discomfort&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1326&quot; instrument_node=&quot;&quot;&gt; (PVPS or Post-Vasectomy Pain Syndrome) 
		severe enough that he will seek vasectomy reversal or neurolysis (division 
		of the sensory nerves coming from the testes). A larger percentage 
		(the medical literature says 1-15%)&amp;nbsp; may have 
		milder forms of chronic pain that can affect quality of life but not severely 
		enough to seek surgical therapy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1305&quot;&gt;&lt;strong data-dcnode-id=&quot;1322&quot;&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;Recanalization&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1321&quot; instrument_node=&quot;&quot;&gt; is the development of a channel for sperm 
		flow between the two cut ends of the vas. If this happens during the healing 
		process (&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1319&quot;&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;early&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;), the semen never becomes sperm-free until 
		the vasectomy is repeated. If recanalization happens &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1316&quot;&gt;&lt;span data-dcnode-id=&quot;1317&quot; instrument_node=&quot;&quot;&gt;late
		&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;(months or years after a man's semen has been examined and declared 
		sperm-free), an unplanned pregnancy could result; but the odds of this occurring 
		is far less after vasectomy than the odds of pregnancy with any other form 
		of birth control including birth control pills and tubal ligation (female 
		sterilization). Failure rates of vasectomy vary with the technique used 
		to obstruct sperm flow through the vas tubes. In our practice, the
		&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1313&quot;&gt;&lt;span data-dcnode-id=&quot;1314&quot; instrument_node=&quot;&quot;&gt;early failure rate is about one in 2500&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1312&quot; instrument_node=&quot;&quot;&gt; and the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1310&quot;&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;
		late failure rate is one in 3500&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1309&quot; instrument_node=&quot;&quot;&gt; (details
		&lt;/span&gt;&lt;a data-dcnode-id=&quot;1307&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.vasweb.com/vasectomy_faqs.html%23failure&quot;&gt;&lt;span data-dcnode-id=&quot;1308&quot; instrument_node=&quot;&quot;&gt;here&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1306&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1304&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1296&quot;&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt;There are &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1301&quot;&gt;&lt;span data-dcnode-id=&quot;1302&quot; instrument_node=&quot;&quot;&gt;no proven long-term health risks&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt; (neither

&lt;/span&gt;&lt;h4 class=&quot;navytext&quot; data-dcnode-id=&quot;1179&quot;&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;No-scalpel ... and no-needle!&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1178&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1155&quot;&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;Drs. Stein and Curington use the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1175&quot;&gt;&lt;span data-dcnode-id=&quot;1176&quot; instrument_node=&quot;&quot;&gt;no-scalpel technique&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1174&quot; instrument_node=&quot;&quot;&gt;, exposing each 
		vas in turn through a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1172&quot;&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt;tiny opening&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1171&quot; instrument_node=&quot;&quot;&gt; in the front scrotal 
		wall under &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1169&quot;&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;local anesthesia&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1168&quot; instrument_node=&quot;&quot;&gt;. Since the opening is so small, 
		it is easy to apply anesthesia &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1166&quot;&gt;&lt;span data-dcnode-id=&quot;1167&quot; instrument_node=&quot;&quot;&gt;without&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt; the use of
		&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1163&quot;&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;needles&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1162&quot; instrument_node=&quot;&quot;&gt;. A
		&lt;/span&gt;&lt;a data-dcnode-id=&quot;1160&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.vasweb.com/vasectomy_faqs.html%23no-needle&quot;&gt;&lt;span data-dcnode-id=&quot;1161&quot; instrument_node=&quot;&quot;&gt;spray applicator&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1159&quot; instrument_node=&quot;&quot;&gt; 
		(MadaJetÂ®) delivers a stream of anesthetic so fine that it penetrates the 
		skin and diffuses to a depth of about 3/16 of an inch, enough to surround 
		and anesthetize each vas tube in turn as it is lifted into position beneath 
		the skin. Most, about 99%, of patients require no more anesthetic than this 
		for completion of the procedure itself without pain. Some, about 1%, of 
		patients do require injection of a little more anesthetic, but since the 
		skin and vas are already partially numb, injection of more anesthetic with 
		a fine needle rarely causes more than the slightest sensation. The tiny 
		opening in the dime-sized area of numb skin is made with a
		&lt;/span&gt;&lt;a data-dcnode-id=&quot;1157&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.vasweb.com/vasectomy_faqs.html%23no-scalpel&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;pointy hemostat&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1156&quot; instrument_node=&quot;&quot;&gt;: 
		one tip makes a pinpoint opening, then the two tips are used to spread and 
		enlarge the opening to about 1/4 of an inch. Since blood vessels in the 
		skin are spread apart rather than cut, bleeding is less than when a scalpel 
		is used, no stitches are required, and the opening is usually sealed closed 
		(often barely visible) by the next day.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1116&quot;&gt;&lt;span data-dcnode-id=&quot;1153&quot; instrument_node=&quot;&quot;&gt;Once each vas tube is lifted through the small skin opening, it is divided

		the ends of the divided vas are placed out of alignment and kept from rejoining 
		by applying a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1148&quot;&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt;tiny clip to the sheath&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt; surrounding the vas 
		so that one end stays inside the sheath, the other outside. While
		&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1145&quot;&gt;&lt;span data-dcnode-id=&quot;1146&quot; instrument_node=&quot;&quot;&gt;extremely effective &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;(failure rate less than 1 in 2000),

		&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;380&quot; instrument_node=&quot;&quot;&gt;Health insurance COMPANIES sell
