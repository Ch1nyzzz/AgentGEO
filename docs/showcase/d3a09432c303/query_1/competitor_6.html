&lt;/span&gt;&lt;h2 class=&quot;HwSectionTitle HwAccessibilityText&quot; data-dcnode-id=&quot;1155&quot; data-fingerprint=&quot;323f2320&quot; data-fingerprint-exact=&quot;258236d1&quot;&gt;&lt;span data-dcnode-id=&quot;1156&quot; instrument_node=&quot;&quot;&gt;Surgery Overview&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1148&quot; data-fingerprint=&quot;1bf3362f&quot; data-fingerprint-exact=&quot;ea0075d7&quot;&gt;&lt;span data-dcnode-id=&quot;1153&quot; instrument_node=&quot;&quot;&gt;A vasectomy is an operation to make a man sterile, or not able to make a woman pregnant. During the procedure, a doctor cuts or blocks the tubes, called the &lt;/span&gt;&lt;a class=&quot;HwLinkMultiMedia&quot; data-articleid=&quot;hw143376&quot; data-dcnode-id=&quot;1150&quot; data-document-href=&quot;hw143376&quot; data-document-type=&quot;MultiMedia&quot; data-hwid=&quot;hw143376&quot; data-link-type=&quot;image&quot; data-section-href=&quot;hw143376-sec&quot; data-topicid=&quot;hw143376-sec&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cigna.com/individuals-families/health-wellness/hw/male-reproductive-system-hw143376&quot;&gt;&lt;span class=&quot;HwLinkText&quot; data-dcnode-id=&quot;1151&quot;&gt;&lt;span data-dcnode-id=&quot;1152&quot; instrument_node=&quot;&quot;&gt;vas deferens&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt;, that carry sperm from the testicles to the penis. This keeps sperm from reaching a woman's egg to make a baby when ejaculation occurs during sex. A vasectomy is a simple procedure. It can be done at your doctor's office or clinic. It takes about 30 minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1140&quot; data-fingerprint=&quot;600dc6b3&quot; data-fingerprint-exact=&quot;9ec7c719&quot;&gt;&lt;span data-dcnode-id=&quot;1146&quot; instrument_node=&quot;&quot;&gt;No-scalpel vasectomy is a technique that uses a small clamp with pointed ends. Instead of using a scalpel to cut the skin, the clamp is poked through the skin of the scrotum and then opened. The benefits of this procedure include less bleeding, a smaller hole in the skin, and fewer complications. It works just as well as traditional vasectomy.&lt;/span&gt;&lt;sup class=&quot;Reference&quot; data-dcnode-id=&quot;1141&quot;&gt;&lt;a class=&quot;HwLinkReference&quot; data-articleid=&quot;hw7265&quot; data-dcnode-id=&quot;1142&quot; data-document-href=&quot;hw7265&quot; data-document-type=&quot;SurgicalDetail&quot; data-hwid=&quot;hw7265&quot; data-name-href=&quot;cite1&quot; data-rel=&quot;cite1-Cit&quot; data-section-href=&quot;hw7265-Bib&quot; data-topicid=&quot;hw7265-Bib&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cigna.com/individuals-families/health-wellness/hw/medical-topics/vasectomy-hw7265&quot;&gt;&lt;span class=&quot;HwAccessibilityText&quot; data-dcnode-id=&quot;1144&quot;&gt;&lt;span data-dcnode-id=&quot;1145&quot; instrument_node=&quot;&quot;&gt;footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1143&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1139&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1132&quot; data-fingerprint=&quot;adb94f95&quot; data-fingerprint-exact=&quot;59c1a355&quot;&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;In the Vasclip implant procedure, the vas deferens is locked closed with a device called a Vasclip. The vas deferens is not cut, sutured, or cauterized (sealed by burning). This may reduce pain and complications. Some studies show that clipping doesn't work as well as other methods of sealing off the vas deferens.&lt;/span&gt;&lt;sup class=&quot;Reference&quot; data-dcnode-id=&quot;1133&quot;&gt;&lt;a class=&quot;HwLinkReference&quot; data-articleid=&quot;hw7265&quot; data-dcnode-id=&quot;1134&quot; data-document-href=&quot;hw7265&quot; data-document-type=&quot;SurgicalDetail&quot; data-hwid=&quot;hw7265&quot; data-name-href=&quot;cite2&quot; data-rel=&quot;cite2-Cit&quot; data-section-href=&quot;hw7265-Bib&quot; data-topicid=&quot;hw7265-Bib&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cigna.com/individuals-families/health-wellness/hw/medical-topics/vasectomy-hw7265&quot;&gt;&lt;span class=&quot;HwAccessibilityText&quot; data-dcnode-id=&quot;1136&quot;&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1131&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1129&quot; data-fingerprint=&quot;324ba458&quot; data-fingerprint-exact=&quot;9ef3a4f1&quot;&gt;&lt;span data-dcnode-id=&quot;1130&quot; instrument_node=&quot;&quot;&gt;A vasectomy won't change your sex drive or your ability to have sex. You will still be able to enjoy sex in the same way as before. You will still produce normal amounts of semen when you climax. The only difference is that the semen will not contain sperm.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1126&quot; data-fingerprint=&quot;b3c82bed&quot; data-fingerprint-exact=&quot;46682693&quot;&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;Vasectomy is considered a permanent method of birth control. You should only consider having one if you have completed your family or are sure that you don't want children.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1125&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1123&quot; data-fingerprint=&quot;4811581a&quot; data-fingerprint-exact=&quot;239b823a&quot;&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;Surgery to reconnect the vas deferens (vasectomy reversal) is available. But it's hard to do. Sometimes a doctor can remove sperm from the testicle in men who have had a vasectomy or a reversal that didn't work. The sperm can then be used for in vitro fertilization. Both vasectomy reversal and sperm retrieval can be expensive. They may not be covered by insurance. And they may not always work. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 class=&quot;HwSectionTitle HwAccessibilityText&quot; data-dcnode-id=&quot;1087&quot; data-fingerprint=&quot;f0ca2bcd&quot; data-fingerprint-exact=&quot;aa9e9669&quot;&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;What To Expect&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1086&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1084&quot; data-fingerprint=&quot;c920c621&quot; data-fingerprint-exact=&quot;9c95cf16&quot;&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;Your scrotum will be numb for 1 to 2 hours after a vasectomy. Apply cold packs to the area and lie on your back as much as you can for the rest of the day. Wearing snug underwear or compression shorts will help ease discomfort and protect the area.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1083&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1081&quot; data-fingerprint=&quot;c0120b96&quot; data-fingerprint-exact=&quot;feebc3a2&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;You may have some swelling and minor pain in your scrotum for several days after the surgery. Unless your work is strenuous, you can return to work in 1 or 2 days. Avoid heavy lifting for a week.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1075&quot; data-fingerprint=&quot;117db9db&quot; data-fingerprint-exact=&quot;2b1bbb2a&quot;&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;You can resume sexual intercourse as soon as you are comfortable, usually in about a week. &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1077&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;But you can still get your partner pregnant until your sperm count is zero. You must use another method of birth control&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt; until you have a follow-up sperm count test 2 months after the vasectomy (or after 10 to 20 ejaculations over a shorter period of time). After your sperm count is zero, no other birth control method is needed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1072&quot; data-fingerprint=&quot;e9301e11&quot; data-fingerprint-exact=&quot;7dda482a&quot;&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;Most people go back to the doctor's office to have their sperm count checked. But there is also a home test available.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1069&quot; data-fingerprint=&quot;2222c01d&quot; data-fingerprint-exact=&quot;c1d481ae&quot;&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;A vasectomy won't interfere with your sex drive, ability to have erections, sensation of orgasm, or ability to ejaculate. You may have mild aching now and then in your testicles during sexual arousal for a few months after the surgery.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;983&quot; data-fingerprint=&quot;d485170c&quot; data-fingerprint-exact=&quot;7fe97623&quot;&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;Vasectomy is a very effective (99.85%) birth control method. Only 1 to 2 women out of 1,000 will have an unplanned pregnancy in the first year after their partners have had a vasectomy.&lt;/span&gt;&lt;sup class=&quot;Reference&quot; data-dcnode-id=&quot;984&quot;&gt;&lt;a class=&quot;HwLinkReference&quot; data-articleid=&quot;hw7265&quot; data-dcnode-id=&quot;985&quot; data-document-href=&quot;hw7265&quot; data-document-type=&quot;SurgicalDetail&quot; data-hwid=&quot;hw7265&quot; data-name-href=&quot;cite3&quot; data-rel=&quot;cite3-Cit&quot; data-section-href=&quot;hw7265-Bib&quot; data-topicid=&quot;hw7265-Bib&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cigna.com/individuals-families/health-wellness/hw/medical-topics/vasectomy-hw7265&quot;&gt;&lt;span class=&quot;HwAccessibilityText&quot; data-dcnode-id=&quot;987&quot;&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;footnote &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;HwSubSectionTitle&quot; data-dcnode-id=&quot;980&quot; data-fingerprint=&quot;e87b6ca6&quot; data-fingerprint-exact=&quot;07492957&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;Risk of failure&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;977&quot; data-fingerprint=&quot;6fc67775&quot; data-fingerprint-exact=&quot;d8a4dbc4&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;Pregnancy may occur after vasectomy because of:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;968&quot; data-fingerprint=&quot;9248b553&quot; data-fingerprint-exact=&quot;24ae396c&quot;&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;973&quot;&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;Failure to use another birth control method until the sperm count is confirmed to be zero. It usually takes 10 to 20 ejaculations to completely clear sperm from the semen.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;970&quot;&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;Spontaneous reconnection of a vas deferens or an opening in one end that allows sperm to mix with the semen again. This is very rare.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;930&quot; data-fingerprint=&quot;b38b2d2e&quot; data-fingerprint-exact=&quot;5895bb1e&quot;&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;The risk of complications after a vasectomy is very low. Complications may include: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;912&quot; data-fingerprint=&quot;13f6da79&quot; data-fingerprint-exact=&quot;e699a133&quot;&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;Bleeding under the skin, which may cause swelling or bruising. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;923&quot;&gt;&lt;span data-dcnode-id=&quot;924&quot; instrument_node=&quot;&quot;&gt;Infection at the site of the incision. In rare instances, an infection develops inside the scrotum. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;922&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;920&quot;&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;Sperm leaking from a vas deferens into the tissue around it and forming a small lump (sperm granuloma). This condition is usually not painful, and it can be treated with rest and pain medicine. Surgery may be needed to remove the granuloma. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;917&quot;&gt;&lt;span data-dcnode-id=&quot;918&quot; instrument_node=&quot;&quot;&gt;Inflammation of the tubes that move sperm from the testicles (congestive epididymitis). &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;914&quot;&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;In rare cases, the vas deferens growing back together (recanalization) so the man becomes fertile again. &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;913&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;
