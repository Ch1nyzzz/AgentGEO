&lt;/span&gt;&lt;meta content=&quot;Language is the carrier of culture. Translation is not only a shift between two languages, in fact, between two cultures. The process of collision and communication is the way of two different cultural exchanges and dialogues. Therefore, “cultural fax” should be the basic source of translation. The so-called cultural fax requires the target language to be culturally oriented and accurately reproduce the meaning, form and style that the original language is intended to convey. It is to convey the cultural connotation of the original language to the greatest extent. It is handed to the target readers so that they can fully understand the original culture. It can produce cultural feelings similar to the original readers so as to enrich the translation culture while exporting the original culture. However, it is not easy to achieve this goal in the process of translation. The paper mainly studies the theoretical basis of cultural translation through the analysis of the relationship among culture, language and translation. Cultural translation is explored through the study of different meanings of culture in a context. It mainly includes the analysis of the structure between culture and language, and the verification of the internal connection between culture and translation. Cultural fax refers to the translation of basic standards, which requires the translation of the meaning, form and style of the text to be accurately expressed from the perspective of culture.&quot; data-dcnode-id=&quot;2107&quot; name=&quot;description&quot;&gt;&lt;span data-dcnode-id=&quot;2106&quot; instrument_node=&quot;&quot;&gt;

	Language is the carrier of culture. Translation is not only a shift between two languages, in fact, between two cultures. The process of collision and communication is the way of two different cultural exchanges and dialogues. Therefore, “cultural fax” should be the basic source of translation. The so-called cultural fax requires the target language to be culturally oriented and accurately reproduce the meaning, form and style that the original language is intended to convey. It is to convey the cultural connotation of the original language to the greatest extent. It is handed to the target readers so that they can fully understand the original culture. It can produce cultural feelings similar to the original readers so as to enrich the translation culture while exporting the original culture. However, it is not easy to achieve this goal in the process of translation. The paper mainly studies the theoretical basis of cultural translation through the analysis of the relationship among culture, language and translation. Cultural translation is explored through the study of different meanings of culture in a context. It mainly includes the analysis of the structure between culture and language, and the verification of the internal connection between culture and translation. Cultural fax refers to the translation of basic standards, which requires the translation of the meaning, form and style of the text to be accurately expressed from the perspective of culture.

                    Zhang, Y.   (2020) A Study of Cultural Translation from the Perspective of Cultural Fax. &lt;/span&gt;&lt;i data-dcnode-id=&quot;1684&quot;&gt;&lt;span data-dcnode-id=&quot;1685&quot; instrument_node=&quot;&quot;&gt;Open Access Library Journal&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1683&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;b data-dcnode-id=&quot;1681&quot;&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1680&quot; instrument_node=&quot;&quot;&gt;, 1-12. doi: &lt;/span&gt;&lt;a data-dcnode-id=&quot;1678&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//doi.org/10.4236/oalib.1106450&quot; onclick=&quot;SetNum(100815)&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1679&quot; instrument_node=&quot;&quot;&gt;10.4236/oalib.1106450&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1677&quot; instrument_node=&quot;&quot;&gt;.

&lt;/span&gt;&lt;div data-dcnode-id=&quot;1474&quot; id=&quot;htmlContent&quot; style=&quot;margin-top:10px;&quot;&gt;&lt;span data-dcnode-id=&quot;1672&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1670&quot;&gt;&lt;img data-dcnode-id=&quot;1671&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//html.scirp.org/file/2-1410169x6.png&amp;amp;raw&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1669&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title1&quot; data-dcnode-id=&quot;1666&quot;&gt;&lt;a data-dcnode-id=&quot;1667&quot; id=&quot;txtF0&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1668&quot; instrument_node=&quot;&quot;&gt;1. Introduction&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1665&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1663&quot;&gt;&lt;span data-dcnode-id=&quot;1664&quot; instrument_node=&quot;&quot;&gt;Language is a vehicle that interprets and records culture. Language is an important tool for human life and communication. It is indispensable to inherit and develop human civilization. It is also influenced by geographical areas, the long-term development of people living in different areas, so language is based on its own character. This requires that in addition to mastering the best English translation skills, the most important thing is to do it from a cultural perspective. Translation needs to maximize the accuracy as well as the meaning of both the Chinese and English content, especially from a practical point of view. It is necessary to analyze the application in detail. To some extent, language is the symbolic representation of a nation, which comprises its cultural backgrounds as well as ways of living and thinking. In the vast culture of Eastern and Western countries, culture translation reflects a nation’s history, custom, religion, etc. Generally, it is also bonded with social activities, natural phenomena, some concrete instances and abstract concepts. Cultural exchange and cooperation between countries are increasing with the development of information age and the speeding up of globalization. In current decades, the world has been changed into a global village where people can’t live without being influenced by others. Meanwhile, it brings misunderstanding and cultural shocks, which are all obstacles we should overcome in cross-cultural communication. Consequently, the necessity of intercultural communication becomes all the more obvious. Intercultural translation has aroused a widespread concern among scholars. Translation is not only carried out in two languages, but also inseparable from cultural factors, such as regions, religions, historical customs and nationalities, psychological awareness, etc.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1662&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title1&quot; data-dcnode-id=&quot;1659&quot;&gt;&lt;a data-dcnode-id=&quot;1660&quot; id=&quot;txtF1&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1661&quot; instrument_node=&quot;&quot;&gt;2. Overview of Cross-Cultural Perspective Transformation&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1658&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1656&quot;&gt;&lt;span data-dcnode-id=&quot;1657&quot; instrument_node=&quot;&quot;&gt;If we analyze it from the perspective of historical development and practice, the main reasons for the transformation of cross-cultural perspective come from the following aspects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1655&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1653&quot;&gt;&lt;span data-dcnode-id=&quot;1654&quot; instrument_node=&quot;&quot;&gt;2.1. Differences between Ethnic Cultures&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1652&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1647&quot;&gt;&lt;span data-dcnode-id=&quot;1651&quot; instrument_node=&quot;&quot;&gt;English translation itself has a certain complexity. It is not only the conversion between Chinese and English, but also the mutual conversion and exchange between the national cultures represented by the two languages. The translator must fully understand the differences between Chinese culture and the national culture of English, so as to ensure that the translation work is easy and improve the accuracy of translation. Because Chinese and English belong to different languages and have different cultural backgrounds, Chinese culture has the characteristics of multiple connotations. If analyzed from the nature of language, it is a specific character formed on the basis of understanding the image of things, focusing on the meaning of Chinese characters. English is different. It belongs to alphabetic writing. It uses abstract letters to express phonetic meaning [&lt;/span&gt;&lt;a class=&quot;content_c1&quot; data-dcnode-id=&quot;1649&quot; href=&quot;#ref1&quot; id=&quot;return0&quot; onclick=&quot;returnAuhor(1,0)&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1650&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1648&quot; instrument_node=&quot;&quot;&gt;].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1646&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1644&quot;&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt;2.2. The Differences between National Life Style&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1641&quot;&gt;&lt;span data-dcnode-id=&quot;1642&quot; instrument_node=&quot;&quot;&gt;Due to the distance between different regions and the difference of surrounding environment, each nation has formed its own unique living habits and customs in the process of development. In ancient times, China’s transportation is inconvenient, and a large part of its territory belongs to inland areas, so Chinese people are accustomed to inland life and have relatively less communication with foreign countries. However, the communication between western countries is closer and they are more open-minded. In addition, the surrounding areas are close to the sea and the shipping industry is developed, which also makes western countries more adventurous and free in character. These differences will also affect the translation between Chinese and English to a certain extent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1640&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1638&quot;&gt;&lt;span data-dcnode-id=&quot;1639&quot; instrument_node=&quot;&quot;&gt;2.3. The Difference of Thinking Mode of National Language&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1637&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1635&quot;&gt;&lt;span data-dcnode-id=&quot;1636&quot; instrument_node=&quot;&quot;&gt;The differences of two languages also exist in thinking and language logic. In a certain degree, it brings many difficulties to the translation work. First of all, Chinese attaches great importance to harmony and unity in language expression, while English thinking is the opposite, from individual to individual. Secondly, influenced by historical factors and ancient philosophical factors, Chinese expression pays more attention to the features of semantics and operation and maintenance, while English pays more attention to structural integrity. In terms of language interpretation, it emphasizes the true meaning represented by some specific language structures. Finally, Chinese is more logical in terms of language expression, which can achieve accurate expression of specific things; English is able to describe and express things through abstraction, not directly reflect things.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1634&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title1&quot; data-dcnode-id=&quot;1631&quot;&gt;&lt;a data-dcnode-id=&quot;1632&quot; id=&quot;txtF2&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1633&quot; instrument_node=&quot;&quot;&gt;3. The Importance of Intercultural Perspective in English Translation&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1630&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1625&quot;&gt;&lt;span data-dcnode-id=&quot;1629&quot; instrument_node=&quot;&quot;&gt;With the development of globalization, international cultural exchanges are becoming more and more frequent. In order to ensure more effective communication in culture, trade and politics, translation has gradually become a key work. English, as one of the most widely used languages in the world, is also the main language tool used in the communication between western countries, which requires English translators to fully understand the differences of different countries in the actual translating process, and to carry out translation work in combination with cultural background, history, living habits, thinking habits and other aspects so that the essence of the same culture can be accurately expressed in the process of translation, reducing the differences between the translated content and the original content. If the translation is based on the literal meaning, it may be contrary to the original content or has a large deviation, which will have a negative impact on the work [&lt;/span&gt;&lt;a class=&quot;content_c2&quot; data-dcnode-id=&quot;1627&quot; href=&quot;#ref2&quot; id=&quot;return1&quot; onclick=&quot;returnAuhor(2,1)&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1628&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1626&quot; instrument_node=&quot;&quot;&gt;]. This is a direct illustration of the importance of cross-cultural transformation in ensuring the accuracy of translation. Therefore, it is necessary for English translators to focus on the reality and consider from multiple levels to realize the relevant transformation between English and Chinese, so as to meet the current needs of China’s foreign trade, political diplomacy, business and other special English occasions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title1&quot; data-dcnode-id=&quot;1621&quot;&gt;&lt;a data-dcnode-id=&quot;1622&quot; id=&quot;txtF3&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;4. Cross Cultural Perspective Transformation and English Translation Skills in English Translation&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1618&quot;&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;Based on the above analysis, it is necessary to change the cross-cultural perspective in English translation. The translator must integrate the cross-cultural perspective and English translation skills from the practical perspective, so as to express the meaning of English text more accurately.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1615&quot;&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt;4.1. Personal Conversion&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1609&quot;&gt;&lt;span data-dcnode-id=&quot;1613&quot; instrument_node=&quot;&quot;&gt;Due to the influence of its own development factors, there are great differences between Chinese and English in terms of language expression, and even the opposite. This requires English translators to have a strong comprehensive quality, fully understand the culture and language habits of both Chinese and English, so as to ensure English translation to the greatest extent Accuracy. For example, in the process of subject expression, English is a way of expression with “things” as the main body, while in Chinese, the main body is often “people”. In view of this situation, in the process of English translation, it is necessary to realize the conversion between people to ensure that the original meaning of the language will not deviate after translation [&lt;/span&gt;&lt;a class=&quot;content_c3&quot; data-dcnode-id=&quot;1611&quot; href=&quot;#ref3&quot; id=&quot;return2&quot; onclick=&quot;returnAuhor(3,2)&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1612&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1610&quot; instrument_node=&quot;&quot;&gt;]. Translators should fully master the planning translation skills, in order to make the text more in line with the reader’s self-Body language habits, easy for readers to understand the relevant content. At the same time, in the western society, understanding is more important in daily life, so in the process of translating the text, we need to consider the content of etiquette, and change the order of person. For example, in the translation of the relevant sentences of responsibility recognition, the translator can put the first person before the other person to avoid misunderstandings and improper etiquette. In addition to the above problems, western countries do not make a more detailed division in terms of all kinds of kinship terms. When it is necessary to translate from Chinese to English, we should pay attention to combining the actual situation and make a preliminary division of the relationship between the characters, so that the conversion between people can be more reasonable and reduce the possibility of errors.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1606&quot;&gt;&lt;span data-dcnode-id=&quot;1607&quot; instrument_node=&quot;&quot;&gt;4.2. Word Conversion&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1603&quot;&gt;&lt;span data-dcnode-id=&quot;1604&quot; instrument_node=&quot;&quot;&gt;In English, the same word often has many different meanings. In addition, the English expression is more willing to describe things abstractly. Therefore, in terms of words, the translator must analyze them as a whole, flexibly transform words and use them alternately according to the actual situation, so as to improve the accuracy of English translation and make the translated text conform to the actual situation. This paper analyzes the relationship between Chinese and western language habits, Chinese logical thinking and so on, so as to ensure that the translation quality can meet the expected requirements, and use some similar words to enhance the appeal of language expression and improve the translation effect. In addition, if there are verbs, nouns and prepositions in the process of translation, it is necessary to fully consider the context, scene and other aspects, combined with the characteristics of Chinese language, translate nouns into verbs, affirmative to negative and other skills, so that readers can further understand the meaning of the text. Take the translation of “no man choose evil because it is evil; he only misses it for happiness, the good he sees” as an example. After translation, the content of this passage is: a person goes to evil not because he yearns for evil, but mistakenly considers evil as the happiness he pursues. In this process, the translator realizes the reasonable conversion of negation and affirmation, which makes the translated text more suitable for people’s reading needs, and makes the effectiveness of translation to the maximum extent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1602&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1600&quot;&gt;&lt;span data-dcnode-id=&quot;1601&quot; instrument_node=&quot;&quot;&gt;4.3. Statement Conversion&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1599&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1597&quot;&gt;&lt;span data-dcnode-id=&quot;1598&quot; instrument_node=&quot;&quot;&gt;Influenced by the differences of Chinese and Western culture, background, living environment, customs and so on, there are obvious differences between Chinese and English in sentence expression. In English, inversion and ellipsis are relatively frequent. They are more willing to put objects and other people in front of them. If they need to criticize, they are more willing to praise first, and then elaborate their own views. For this feature, the translator must fully understand it, and then combine the translation of the original content, transform it into a sentence pattern method that can be widely accepted by all aspects of the readers, and finally meet the readers’ reading needs. In addition to this consideration, the translator should also take into account the actual situation of mood, context and other aspects to determine the translation content more accurately, so that the language statements can be presented to the readers in a clearer and smoother way. It should be noted that translators should pay attention to the differences between the translation of words and the translation of simple sentences. In the content of the article, there will be certain thoughts of the author, and these thoughts themselves have certain uniqueness. Therefore, in the process of translation, translators need to understand the thoughts and creative ideas that the author wants to express more deeply, and integrate their own imagination on the basis of understanding the general idea of the article, so as to achieve a deeper understanding of the content of the article. In order to ensure the translation effect, English translators need to further understand the cultural situation of the author’s country, closely contact with culture, to analyze the original meaning of the author’s writing, translate the content of the article into the most acceptable sentences, and ensure that the sentences, the artistic conception of the article, the connotation and so on can be preserved from the original.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1596&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1594&quot;&gt;&lt;span data-dcnode-id=&quot;1595&quot; instrument_node=&quot;&quot;&gt;4.4. Foreignization Translation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1593&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1588&quot;&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt;In the process of translation, English translators are likely to encounter a variety of different ways of expression, but also cannot directly translate the source language, which requires translators to express the relevant content in the most appropriate and equivalent meaning on the basis of the source language. Although they cannot achieve formal equivalence, they can make the content more comprehensive and specific [&lt;/span&gt;&lt;a class=&quot;content_c4&quot; data-dcnode-id=&quot;1590&quot; href=&quot;#ref4&quot; id=&quot;return3&quot; onclick=&quot;returnAuhor(4,3)&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1591&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;]. On the one hand, translators need to translate positive and negative words flexibly, on the other hand, they need to make full use of English by combining cultural similarities and differences.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1587&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1585&quot;&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;Due to the strong flexibility of vocabulary, the translation content can be reasonably transformed, which makes the current sentence translation not smooth enough, or the sentence problem that cannot be directly translated can be reasonably and effectively solved, so as to improve the overall translation effect. For example, when translating the statement “smoking is not allowed in this theater”, we can apply the passive voice, so as to improve the problem of sentence irregularity and ensure the smooth expression of the sentence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title1&quot; data-dcnode-id=&quot;1581&quot;&gt;&lt;a data-dcnode-id=&quot;1582&quot; id=&quot;txtF4&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;5. Definition of Cultural Translation and Cultural “Fax”&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1578&quot;&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;Cultural “Fax” here means the basic principles of cultural translation. It requires the target language to accurately reproduce the meaning, mode and style of the original language from the perspective of cultural meaning. In other words, it embodies the “form” and “spirit” of the original language in the target language. It can be seen that the study of cultural “Fax” is a key part of translation. The reason why translation is not so easy is that language reflects culture, carries rich cultural connotation and is restricted by culture. Once using language to communicate, there are problems in understanding and expressing cultural connotation. This requires the translator not only to have bilingual ability, but also bicultural and even multi-cultural knowledge, especially to have a certain understanding of the national psychological awareness, cultural formation process, historical customs, traditions, religious culture and a series of regional features of the two languages. It is precisely these mutual factors that reflect the unique national character of the English and Chinese languages and cultures. For example, there is such a sentence in a dream of Red Mansions: “It’s not like the granddaughter of the old ancestor, but the granddaughter of his own family. “It is generally believed that the consanguinity of a legitimate grandson or granddaughter should be related to the grandson or granddaughter. Wang Xifeng undoubtedly means that Lin Daiyu has an extraordinary temperament, just like the granddaughter of Jia Mu, so as to win the favor of Jia Mu. If we translate this sentence as “She doesn’t take after your side of the family, grannie. She’s more like a Jia.” In this way, it may be derogatory to Jia Mu’s family. Yang Kangli, who are familiar with the Chinese tradition, translate this sentence as “She doesn’t take after her father, son-in-law of our old ancestress, but looks more like a Jia.” The translation makes Fengjie’s implication well expressed and faithfully conveys the traditional sense of Chinese feudal family to the readers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1575&quot;&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;The religious beliefs of English and Chinese are different, which will naturally be reflected in the language. The main culture in English is the Christian culture, the Bible, which plays an immeasurable role in the formation and development of Western civilization. Correspondingly, Buddhism culture has a profound influence in China. Both cultures have their own characteristics in thinking mode, language expression forms, lexical images and meanings, so we should pay special attention when we do translation. For example, Hawkes translated “Emituofou” in a dream of Red Mansions into “God bless my soul” and used God to replace the Buddha, which may make Westerners think that Chinese believe in God as well. Such kind of translation greatly reduces the connotation of Chinese culture. Another example is that the idiom of “Heaven takes the lead in killing the earth” uses “heaven” and “Earth” as the symbol of the highest power, but it can only be applied to China which is deeply influenced by the concept of heaven, so it cannot be replaced by “God”, which reflects the Christian faith. The translation of some words with foreign feelings is also a difficult point. As for the translation of English idioms, there are a number of studies. It has been a long tradition in the researching of idioms. The relative studies can elevate people’s language competence and communicative skills. Efforts are made to conclude some common properties and differences of idioms between English culture and Chinese culture, and elaborate further into the reasons which account for the differences. An intensive research on idioms employed in English and Chinese languages is in hope of better understanding the cultural connotations of idioms so as to make the cross-cultural communication more effective. In addition, offering a miniature of the impact on idioms exerted by culture, which can surely promote the communication between people from different cultures. So the research on translation between English and Chinese idioms from a cultural perspective is of great value and will benefit learners in further studies. In the future, more studies will serve to figure out such comparisons and analyses so as to encourage more cross-cultural communication. Translation of English and Chinese idioms has profound reference value to confer, hence the necessary of this research.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1572&quot;&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt;It can be seen from the above that the translation of “cultural translation” is indeed done in the context of “cultural research”, and cultural “Fax” is the key to cultural translation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title1&quot; data-dcnode-id=&quot;1568&quot;&gt;&lt;a data-dcnode-id=&quot;1569&quot; id=&quot;txtF5&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt;6. The Degree of Cultural “Fax” in Translation&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1565&quot;&gt;&lt;span data-dcnode-id=&quot;1566&quot; instrument_node=&quot;&quot;&gt;Cultural “Fax” not only refers to faithfulness of the original language, but also seek the best translation method under the premise of considering foreign culture. As for what is its “degree”, there are no fixed rules to follow, so how to accurately grasp its scale remains to be honed and explored by translators for a long time. The paper intends to talk about his superficial understanding of the “degree” of bilingual transformation from the following three aspects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1562&quot;&gt;&lt;span data-dcnode-id=&quot;1563&quot; instrument_node=&quot;&quot;&gt;6.1. Explore the Historical, Social Background and Cultural Connotation of Words and Accurately Know the of Cultural “Fax”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1559&quot;&gt;&lt;span data-dcnode-id=&quot;1560&quot; instrument_node=&quot;&quot;&gt;Cultural translation should not only consider the historical and social background, but also pay attention to those words with similarities and differences. Translators should keep clear thinking, pay attention to the deep cultural connotation, and understand the similarities and differences of the language.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title3&quot; data-dcnode-id=&quot;1556&quot;&gt;&lt;span data-dcnode-id=&quot;1557&quot; instrument_node=&quot;&quot;&gt;Get Rid of the National Psychological Restriction of Sexual Taboo and Sexual Repression&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1555&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;Sometimes it is difficult for the original text to be translated faithfully because of the similarities and differences of social customs and ethics of different nationalities. In France, for example, once men and women can kiss their lips, they can almost be together. So in order to be accustomed to the national habits and avoid damaging the image of the target country, the French changed the British paternity kiss to French paternity hug when translating English novels. Obviously, this is a rewriting that is different from the original meaning and cannot achieve the effect of “Fax”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1550&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;6.2. Don’t Put on “Long Gown and Mandarin Jacket” to “Foreigners”, and Reflect the Original Cultural “Fax”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1547&quot;&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt;When talking about translation, Lu Xun especially stressed that we should pay attention to foreign sentiment, that is, the so-called Westernization. “Foreign spirit” here refers to the preservation of the foreign cultural features contained in the original language, so as not to bring the unique Chinese color to the English language. At the same time, we should avoid imposing the distinctive national or local color of Chinese into the translation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1544&quot;&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;For example, the English idiom (a region) “flowing with milk and honey” comes from the Bible. Milk and honey are familiar food for westerners. This idiom, for example, if translated into the Chinese “land of fish and rice”, it is somewhat different, though its meaning is similar. Therefore, it is more appropriate to translate it into “a land of abundant resources”. Another example: “when Greek meet Greek, then comes the tug of war”, this proverb originates from the stubborn resistance of ancient Greek cities to the Macedonian King Philip and Alexander. Later it is often used to describe the fierce fighting scene when two warriors or two brave armies fight. Some people translate it as “Zhang Fei meets Zhang Fei and kills all over the world”. In this sentence, Zhang Fei is a historical figure in China, and there is no such one in Britain, so it is not suitable to appear in the translation. It is more original to be translate as “When two heroes meet, their fight will be fierce”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1541&quot;&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;6.3. Appropriate Use of Idioms and Norms in Chinese and Best Way to Show Cultural “Fax”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1538&quot;&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt;The process of cultural translation practice can be said to be the process of deeply analyzing the original language and cultural content, gaining its meaning, realizing its spirit, and then expressing it with the tempered translation language. Not only does the target language maintain the original flavor, but it also needs “local flavor” when necessary, that is, adopting the standard Chinese and the customary expression accepted by the Chinese, otherwise it will not be able to achieve the “Fax” effect.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1537&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title1&quot; data-dcnode-id=&quot;1534&quot;&gt;&lt;a data-dcnode-id=&quot;1535&quot; id=&quot;txtF6&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;7. Cultural Differences Reflected in Idioms&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1531&quot;&gt;&lt;span data-dcnode-id=&quot;1532&quot; instrument_node=&quot;&quot;&gt;In a narrow sense, culture is equal to the intellectual and conceptual culture. In contrast, culture means human culture in a broad sense. Culture is an extremely complex concept and an enormous subject. It consists of both material things and non-material things, such as schools, cities, organizations, as well as customs, languages, ideas and individual values.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1528&quot;&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt;7.1. Significance of Cultural Factors in Idiom Translation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1522&quot;&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt;As a symbolic communication system, human language is infinitely flexible and includes a variety of components. Idiom is more typical to reflect a culture compared with other language ingredients. Eugene A. Nida [&lt;/span&gt;&lt;a class=&quot;content_c5&quot; data-dcnode-id=&quot;1524&quot; href=&quot;#ref5&quot; id=&quot;return4&quot; onclick=&quot;returnAuhor(5,4)&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1525&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1523&quot; instrument_node=&quot;&quot;&gt;] once claimed that “for truly successful translating, biculturalism is even more important than bilingualism, since words only have meanings in terms of the cultures in which they function.” Over the recent decades, as the culture studies deepening, scholars have been dwelling on the relationship between translation and culture and made constant achievements in various aspects. The inseparable relationship between culture and language is sure to exert great influence on translation. Whether the cultural values are same or not, they will certainly leave traces on the corresponding languages’ translation. Similarly, translation is an effective way to transfer them to a certain cultural background as well as absorb the cultural essences of foreign countries. Translation serves as a method of cultural inter-mediation. The more and more frequent and convenient communication has contributed to the vitally important role of translation. It has been a long time since culture and translation have been linked to each other in literary works. Ideas or thoughts should be selected, oriented, and combined in idiom translation. Each culture places its own constraints on the translation process. Idiom, as one of the lexical components, has specific grammatical structure, meaning and usage. It has been considered as a particular genre in linguistic studies so far, in which they apply numerous theories to translation. Needless to say, it closely ties to distinctive cultural factors and cultural values. Idioms are the most culturally loaded element, for they record all the details or trace of the culture. That is to say, idioms can give clear reflection of different cultures. Therefore, the cultural factors reflected in idioms have great values to consult in the process of linguistic transfer. It is necessary for a successful translation to Master the translation of idioms from a cultural perspective.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title2&quot; data-dcnode-id=&quot;1519&quot;&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;7.2. Cultural Factors within Idioms&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title3&quot; data-dcnode-id=&quot;1516&quot;&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;7.2.1. Customs&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1513&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt;Custom involves all sorts of aspects of social life. Everyone, from cradle to grave, behavior, his feeling, and experience are affected by customs. Idioms are featured in profound life flavor and distinctive national color. Customs are the reflections of a nation’s cultural consciousness in the fast development of the society. A great number of idioms are derived from habits or customs. The cultural differences relating to customs between English and Chinese are presented in many aspects. The most typical one lies in men’ attitude towards animals. Human beings advocate peaceful co-existence with animals. In China there are many dog-related idioms and the word “dog” in most phrases is associated with some derogatory connotation, but it is always considered as the most faithful human friend in English custom. Vast majority of such expressions in English are complimentary.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title3&quot; data-dcnode-id=&quot;1510&quot;&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;7.2.2. Religions&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;Religion is a sort of spiritual phenomenon and an important composing part of culture. It reflects different attitudes towards each nation’s taboo and admiration. Since English and Chinese nationalities have different religious beliefs, they also have differences in terms of the word connotations. The sharply different religious idioms are the best representations of the two nations’ religious concept. Chinese people believe in Confucianism, Buddhism, and Taoism, while English people believe in Christianity. In traditional Chinese culture, there are “Emperor” and “Dragon king” in myths and fables. In contrast, God is the cultural image of Englishmen. They believe that God created and arranged the whole world. A famous English saying “Man proposes, God disposes” reflects the great influence of Christianity. Likewise, Buddhism is a major source from which idioms relating with religions derive. A typical example of Chinese idiom “to present Buddha with borrowed flowers” reflects the Chinese worship of Buddha and religious belief.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title3&quot; data-dcnode-id=&quot;1504&quot;&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;7.2.3. Historical Allusions&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1501&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;Both China and Britain have their long-standing languages. Historical allusions are an important cultural factor to influence the formation and development of idioms. To some extent, it expresses the concept of culture in a comprehensive way. The cultural differences caused by historical allusions present a vivid picture of the nations. The emergence of idioms is associated with the labor and life of people. China is located in Eastern Asia, the west coast of Pacific Ocean. Its agriculture is cultivated well. While Britain is an island country and it used to be rich in fishery, ship manufacturing industry and marine transportation. On account of these distinct differences, people in two countries have different attitudes towards the same object. The idioms formed by historical allusions always have relatively simple patterns but profound meanings. In English history, there are two major sources to affect the origins of idioms. That is Rome Conquest and Shakespeare’s excellent works, for instance, “A Herculean task”, which means a task which requires great efforts of the body or mind. It is widely accepted that not all idioms have relative equivalents in another language. As a result, many idioms can only be translated from a cultural perspective according to its in-depth meanings.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title3&quot; data-dcnode-id=&quot;1498&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;7.2.4. Lexical Vacancy and Culture Gap&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1495&quot;&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt;Lexical Vacancy refers to an absence of a word in a particular language. There exists extensively the phenomenon of lexical vacancy between target language and source language in translation. Often a concept lexicalized in one language does not have a corresponding lexical unit in another language. The vacancy in vocabulary mainly exists in its pragmatic and referential meaning. Many experts think that some idioms have gained special connotations and embodied intense national characteristics during the development of the countries. For instances, in the eyes of Chinese, silkworms are willing to sacrifice and don’t make effort to contribute without requiring any pay back. A culture gap is any systematic difference between two cultures which hinders relations and mutual understanding. Culture gaps can relate to ethnicity, religion, age, or social class. Similarly, panda is the national treasure of China, which implies harmony and peace. Giant pandas are regarded as cultural exchanges in “Panda Diplomacy” to express good wishes. As one of precious species, panda is peculiar to China, and it’s for this reason that it has cultural meanings in China.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title3&quot; data-dcnode-id=&quot;1492&quot;&gt;&lt;span data-dcnode-id=&quot;1493&quot; instrument_node=&quot;&quot;&gt;7.2.5. Native Flavor Expression&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1491&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1489&quot;&gt;&lt;span data-dcnode-id=&quot;1490&quot; instrument_node=&quot;&quot;&gt;Let’s take a proverb as an example: the man is the black sheep of family. If we translate this proverb into “that man is the black sheep of the whole family”, we will feel puzzled and wonder what it means. There are two mistakes in the translation: one is that the image in the Chinese people’s mind is not clear; the other is that the similarities are not pointed out. If the underlined part is replaced by the “black horse”, the meaning of the metaphor will be clear at a glance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1486&quot;&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;The mutual reference of languages can enrich the expressiveness of the two languages. Many words with strong foreign flavor have been integrated into Chinese. From the perspective of English, Westerners are also willing to collect some foreign expressions they don’t have. For example, “like two cocks in the same cage” can be translated into English directly, which can be accepted by British and American readers. If you add another one “you’ll see the flying feathers” in English, the Chinese meaning is “sure to fight with blood till the feathers fly”, then it will be more vivid. Another example, “It is better to draw the pond in order to get all the fish” and “to kill the goose that lays the golden eggs”. Though it seems to have lost a little “foreign flavor” for the first sentence, it can embody the local flavor of the idiom with strong Chinese characteristics.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1485&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1483&quot;&gt;&lt;span data-dcnode-id=&quot;1484&quot; instrument_node=&quot;&quot;&gt;The four character structure of Chinese integrates all kinds of language elements and means of expression. It has strict structure and rich implication. If it can be used properly in the translation, it will get a rare rhetorical effect.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;E-Title1&quot; data-dcnode-id=&quot;1479&quot;&gt;&lt;a data-dcnode-id=&quot;1480&quot; id=&quot;txtF7&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;1481&quot; instrument_node=&quot;&quot;&gt;8. Conclusion&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1478&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1476&quot;&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;We must consider three elements: national cultural, tradition cultural content and cultural psychology of different regions in order to accurately grasp the degree of cultural “Fax” in translation. On the macro level, the translator should understand the implication of culture, the basic theory and skills of translation, and on the micro level, he should carefully observe the differences among the above three elements and make a comparison and analysis, so as to find out the causes of “cultural distortion”. In a word, only by integrating “faithfulness, expressiveness and elegance” under the premise of considering foreign cultures, can we do translation appropriately, so as to ensure the realization of cultural “Fax” and really do cultural translation well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1475&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1473&quot; instrument_node=&quot;&quot;&gt;
