ode-id=&quot;1370&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;Twitter&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1363&quot;&gt;&lt;a class=&quot;addthis_button_linkedin&quot; data-dcnode-id=&quot;1364&quot; href=&quot;#&quot; role=&quot;link&quot; target=&quot;_blank&quot; title=&quot;LinkedIn&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;at-icon-wrapper icon-linkedin-square&quot; data-dcnode-id=&quot;1366&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;Linked In&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1359&quot;&gt;&lt;a class=&quot;addthis_button_email&quot; data-dcnode-id=&quot;1360&quot; href=&quot;#&quot; role=&quot;link&quot; target=&quot;_blank&quot; title=&quot;Email&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;at-icon-wrapper icon-Email&quot; data-dcnode-id=&quot;1362&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1361&quot; instrument_node=&quot;&quot;&gt;Email&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;div class=&quot;atclear&quot; data-dcnode-id=&quot;1358&quot;&gt;&lt;/div&gt;&lt;/ul&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/nav&gt;&lt;/div&gt;&lt;div class=&quot;article__body&quot; data-dcnode-id=&quot;367&quot;&gt;&lt;p class=&quot;fulltext&quot; data-dcnode-id=&quot;1348&quot;&gt;&lt;/p&gt;&lt;div class=&quot;hlFld-Abstract&quot; data-dcnode-id=&quot;1345&quot;&gt;&lt;p class=&quot;fulltext&quot; data-dcnode-id=&quot;1346&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;hlFld-Fulltext&quot; data-dcnode-id=&quot;383&quot;&gt;&lt;p data-dcnode-id=&quot;1338&quot;&gt;&lt;span data-dcnode-id=&quot;1342&quot; instrument_node=&quot;&quot;&gt;(Reprinted from &lt;/span&gt;&lt;i data-dcnode-id=&quot;1340&quot;&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;Diagnostic and Statistical Manual of Mental Disorders&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1339&quot; instrument_node=&quot;&quot;&gt;, Fifth Edition:749–759, with permission from the American Psychiatric Association)&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1333&quot;&gt;&lt;span data-dcnode-id=&quot;1337&quot; instrument_node=&quot;&quot;&gt;Understanding the cultural context of illness experience is essential for effective diagnostic assessment and clinical management. &lt;/span&gt;&lt;i data-dcnode-id=&quot;1335&quot;&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;Culture&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt; refers to systems of knowledge, concepts, rules, and practices that are learned and transmitted across generations. Culture includes language, religion and spirituality, family structures, life-cycle stages, ceremonial rituals, and customs, as well as moral and legal systems. Cultures are open, dynamic systems that undergo continuous change over time; in the contemporary world, most individuals and groups are exposed to multiple cultures, which they use to fashion their own identities and make sense of experience. These features of culture make it crucial not to overgeneralize cultural information or stereotype groups in terms of fixed cultural traits.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1329&quot;&gt;&lt;i data-dcnode-id=&quot;1331&quot;&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;Race&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1330&quot; instrument_node=&quot;&quot;&gt; is a culturally constructed category of identity that divides humanity into groups based on a variety of superficial physical traits attributed to some hypothetical intrinsic, biological characteristics. Racial categories and constructs have varied widely over history and across societies. The construct of race has no consistent biological definition, but it is socially important because it supports racial ideologies, racism, discrimination, and social exclusion, which can have strong negative effects on mental health. There is evidence that racism can exacerbate many psychiatric disorders, contributing to poor outcome, and that racial biases can affect diagnostic assessment.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1325&quot;&gt;&lt;i data-dcnode-id=&quot;1327&quot;&gt;&lt;span data-dcnode-id=&quot;1328&quot; instrument_node=&quot;&quot;&gt;Ethnicity&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1326&quot; instrument_node=&quot;&quot;&gt; is a culturally constructed group identity used to define peoples and communities. It may be rooted in a common history, geography, language, religion, or other shared characteristics of a group, which distinguish that group from others. Ethnicity may be self-assigned or attributed by outsiders. Increasing mobility, intermarriage, and intermixing of cultures has defined new mixed, multiple, or hybrid ethnic identities.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1323&quot;&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;Culture, race, and ethnicity are related to economic inequities, racism, and discrimination that result in health disparities. Cultural, ethnic, and racial identities can be sources of strength and group support that enhance resilience, but they may also lead to psychological, interpersonal, and intergenerational conflict or difficulties in adaptation that require diagnostic assessment.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;anchor-spacer&quot; data-dcnode-id=&quot;1322&quot; id=&quot;ac_i1&quot;&gt;&lt;/div&gt;&lt;h2 class=&quot;article-section__title section__title&quot; data-dcnode-id=&quot;1320&quot; id=&quot;_i1&quot;&gt;&lt;span data-dcnode-id=&quot;1321&quot; instrument_node=&quot;&quot;&gt;Outline for Cultural Formulation&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1318&quot;&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;The Outline for Cultural Formulation introduced in DSM-IV provided a framework for assessing information about cultural features of an individual's mental health problem and how it relates to a social and cultural context and history. DSM-5 not only includes an updated version of the Outline but also presents an approach to assessment, using the Cultural Formulation Interview (CFI), which has been field-tested for diagnostic usefulness among clinicians and for acceptability among patients.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1316&quot;&gt;&lt;span data-dcnode-id=&quot;1317&quot; instrument_node=&quot;&quot;&gt;The revised Outline for Cultural Formulation calls for systematic assessment of the following categories:&lt;/span&gt;&lt;/p&gt;&lt;table border=&quot;0&quot; class=&quot;listgroup&quot; data-dcnode-id=&quot;1274&quot; id=&quot;L1&quot; list-type=&quot;bullet&quot; width=&quot;95%&quot;&gt;&lt;tbody data-dcnode-id=&quot;1275&quot;&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;1308&quot;&gt;&lt;td data-dcnode-id=&quot;1314&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;1309&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;1310&quot;&gt;&lt;b data-dcnode-id=&quot;1312&quot;&gt;&lt;span data-dcnode-id=&quot;1313&quot; instrument_node=&quot;&quot;&gt;Cultural identity of the individual:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt; Describe the individual's racial, ethnic, or cultural reference groups that may influence his or her relationships with others, access to resources, and developmental and current challenges, conflicts, or predicaments. For immigrants and racial or ethnic minorities, the degree and kinds of involvement with both the culture of origin and the host culture or majority culture should be noted separately. Language abilities, preferences, and patterns of use are relevant for identifying difficulties with access to care, social integration, and the need for an interpreter. Other clinically relevant aspects of identity may include religious affiliation, socioeconomic background, personal and family places of birth and growing up, migrant status, and sexual orientation.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;1300&quot;&gt;&lt;td data-dcnode-id=&quot;1306&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;1301&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;1302&quot;&gt;&lt;b data-dcnode-id=&quot;1304&quot;&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt;Cultural conceptualizations of distress:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt; Describe the cultural constructs that influence how the individual experiences, understands, and communicates his or her symptoms or problems to others. These constructs may include cultural syndromes, idioms of distress, and explanatory models or perceived causes. The level of severity and meaning of the distressing experiences should be assessed in relation to the norms of the individual’s cultural reference groups. Assessment of coping and help-seeking patterns should consider the use of professional as well as traditional, alternative, or complementary sources of care.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;1292&quot;&gt;&lt;td data-dcnode-id=&quot;1298&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1299&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;1293&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;1294&quot;&gt;&lt;b data-dcnode-id=&quot;1296&quot;&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;Psychosocial stressors and cultural features of vulnerability and resilience:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1295&quot; instrument_node=&quot;&quot;&gt; Identify key stressors and supports in the individual’s social environment (which may include both local and distant events) and the role of religion, family, and other social networks (e.g., friends, neighbors, coworkers) in providing emotional, instrumental, and informational support. Social stressors and social supports vary with cultural interpretations of events, family structure, developmental tasks, and social context. Levels of functioning, disability, and resilience should be assessed in light of the individual's cultural reference groups.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;1284&quot;&gt;&lt;td data-dcnode-id=&quot;1290&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1291&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;1285&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;1286&quot;&gt;&lt;b data-dcnode-id=&quot;1288&quot;&gt;&lt;span data-dcnode-id=&quot;1289&quot; instrument_node=&quot;&quot;&gt;Cultural features of the relationship between the individual and the clinician:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1287&quot; instrument_node=&quot;&quot;&gt; Identify differences in culture, language, and social status between an individual and clinician that may cause difficulties in communication and may influence diagnosis and treatment. Experiences of racism and discrimination in the larger society may impede establishing trust and safety in the clinical diagnostic encounter. Effects may include problems eliciting symptoms, misunderstanding of the cultural and clinical significance of symptoms and behaviors, and difficulty establishing or maintaining the rapport needed for an effective clinical alliance.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;1276&quot;&gt;&lt;td data-dcnode-id=&quot;1282&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1283&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;1277&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;1278&quot;&gt;&lt;b data-dcnode-id=&quot;1280&quot;&gt;&lt;span data-dcnode-id=&quot;1281&quot; instrument_node=&quot;&quot;&gt;Overall cultural assessment:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt; Summarize the implications of the components of the cultural formulation identified in earlier sections of the Outline for diagnosis and other clinically relevant issues or problems as well as appropriate management and treatment intervention.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;div class=&quot;anchor-spacer&quot; data-dcnode-id=&quot;1273&quot; id=&quot;T1&quot;&gt;&lt;/div&gt;&lt;div class=&quot;article-table-holder&quot; data-dcnode-id=&quot;935&quot; data-order=&quot;0&quot;&gt;&lt;div class=&quot;article-table-content&quot; data-dcnode-id=&quot;944&quot; id=&quot;T1&quot;&gt;&lt;figcaption data-dcnode-id=&quot;1271&quot;&gt;&lt;strong data-dcnode-id=&quot;1272&quot;&gt;&lt;/strong&gt;&lt;/figcaption&gt;&lt;table class=&quot;table article-section__table&quot; data-dcnode-id=&quot;945&quot;&gt;&lt;thead data-dcnode-id=&quot;1251&quot;&gt;&lt;tr data-dcnode-id=&quot;1267&quot;&gt;&lt;th align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;1268&quot; rowspan=&quot;1&quot; scope=&quot;colgroup&quot; valign=&quot;top&quot;&gt;&lt;b data-dcnode-id=&quot;1269&quot;&gt;&lt;span data-dcnode-id=&quot;1270&quot; instrument_node=&quot;&quot;&gt;Cultural Formulation Interview (CFI)&lt;/span&gt;&lt;/b&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1263&quot;&gt;&lt;th align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;1264&quot; rowspan=&quot;1&quot; scope=&quot;colgroup&quot; valign=&quot;top&quot;&gt;&lt;b data-dcnode-id=&quot;1265&quot;&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt;Supplementary modules used to expand each CFI subtopic are noted in parentheses.&lt;/span&gt;&lt;/b&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1252&quot;&gt;&lt;th align=&quot;left&quot; class=&quot;align_left&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;1259&quot; rowspan=&quot;1&quot; scope=&quot;colgroup&quot; valign=&quot;top&quot;&gt;&lt;b data-dcnode-id=&quot;1260&quot;&gt;&lt;i data-dcnode-id=&quot;1261&quot;&gt;&lt;span data-dcnode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;GUIDE TO INTERVIEWER&lt;/span&gt;&lt;/i&gt;&lt;/b&gt;&lt;/th&gt;&lt;th align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;1253&quot; rowspan=&quot;1&quot; scope=&quot;col&quot; valign=&quot;top&quot;&gt;&lt;b data-dcnode-id=&quot;1254&quot;&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;INSTRUCTIONS TO THE INTERVIEWER ARE &lt;/span&gt;&lt;i data-dcnode-id=&quot;1256&quot;&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt;ITALICIZED&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1255&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/b&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody data-dcnode-id=&quot;946&quot;&gt;&lt;tr data-dcnode-id=&quot;1240&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;1248&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;1249&quot;&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt;The following questions aim to clarify key aspects of the presenting clinical problem from the point of view of the individual and other members of the individual’s social network (i.e, family, friends, or others involved in current problem). This includes the problem’s meaning, potential sources of help, and expectations for services.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;1241&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;1246&quot;&gt;&lt;span data-dcnode-id=&quot;1247&quot; instrument_node=&quot;&quot;&gt;INTRODUCTION FOR THE INDIVIDUAL:&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt; I would like to understand the problems that bring you here so that I can help you more effectively. I want to know about &lt;/span&gt;&lt;i data-dcnode-id=&quot;1243&quot;&gt;&lt;span data-dcnode-id=&quot;1244&quot; instrument_node=&quot;&quot;&gt;your&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1242&quot; instrument_node=&quot;&quot;&gt; experience and ideas. I will ask some questions about what is going on and how you are dealing with it. Please remember there are no right or wrong answers.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1237&quot;&gt;&lt;td align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;1238&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt;CULTURAL DEFINITION OF THE PROBLEM&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1226&quot;&gt;&lt;td align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;1227&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;C&lt;/span&gt;&lt;span class=&quot;smallcaps smallerCapital&quot; data-dcnode-id=&quot;1234&quot;&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;ultural&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt; D&lt;/span&gt;&lt;span class=&quot;smallcaps smallerCapital&quot; data-dcnode-id=&quot;1231&quot;&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;efinition of the&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt; P&lt;/span&gt;&lt;span class=&quot;smallcaps smallerCapital&quot; data-dcnode-id=&quot;1228&quot;&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;roblem&lt;/span&gt;&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1223&quot;&gt;&lt;td class=&quot;last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;1224&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;(Explanatory Model, Level of Functioning)&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1217&quot;& dcnode-id=&quot;1206&quot; instrument_node=&quot;&quot;&gt;People often understand their problems in their own way, which may be similar to or different from how doctors describe the problem. How would &lt;/span&gt;&lt;i data-dcnode-id=&quot;1204&quot;&gt;&lt;span data-dcnode-id=&quot;1205&quot; instrument_node=&quot;&quot;&gt;you&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt; describe your problem?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1195&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;1198&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;1199&quot;&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;Ask how individual frames the problem for members of the social network.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;1196&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1197&quot; instrument_node=&quot;&quot;&gt;2. Sometimes people have different ways of describing their problem to their family, friends, or others in their community. How would you describe your problem to them?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1189&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;1192&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;Focus on the aspects of the problem that matter most to the individual.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;1190&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;3. What troubles you most about your problem?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1186&quo &gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1165&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;1169&quot; rowspan=&quot;2&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;1170&quot;&gt;&lt;span data-dcnode-id=&quot;1171&quot; instrument_node=&quot;&quot;&gt;Note that individuals may identify multiple causes, depending on the facet of the problem they are considering.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;1166&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;1167&quot;&gt;&lt;span data-dcnode-id=&quot;1168&quot; instrument_node=&quot;&quot;&gt;PROMPT FURTHER IF REQUIRED:&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1162&quot;&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;1163&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;Some people may explain their problem as the result of bad things that happen in their life, problems with others, a physical illness, a spiritual reason, or many other causes.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1156&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;1159&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;1160&quot;&gt;&lt;span data-dcnode-id=&quot;1161&quot; instrument_node=&quot;&quot;&gt;Focus on the views of members of the individual’s social network. These may be diverse and vary from the individual’s.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;1157&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;5. What do others in your family, your friends, or others in your community think is causing your [PROBLEM]?&lt;/span&gt;&lt;/td&gt;& v class=&quot;anchor-spacer&quot; data-dcnode-id=&quot;933&quot; id=&quot;ac_i2&quot;&gt;&lt;/div&gt;&lt;h2 class=&quot;article-section__title section__title&quot; data-dcnode-id=&quot;931&quot; id=&quot;_i2&quot;&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;Cultural Formulation Interview (CFI)&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;930&quot; instrument_node=&quot;&quot;&gt;The Cultural Formulation Interview (CFI) is a set of 16 questions that clinicians may use to obtain information during a mental health assessment about the impact of culture on key aspects of an individual's clinical presentation and care. In the CFI, &lt;/span&gt;&lt;i data-dcnode-id=&quot;928&quot;&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;culture&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt; refers to&lt;/span&gt;&lt;/p&gt;&lt;table border=&quot;0&quot; class=&quot;listgroup&quot; data-dcnode-id=&quot;903&quot; id=&quot;L2&quot; list-type=&quot;bullet&quot; width=&quot;95%&quot;&gt;&lt;tbody data-dcnode-id=&quot;904&quot;&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;920&quot;&gt;&lt;td data-dcnode-id=&quot;924&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;921&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;922&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;The values, orientations, knowledge, and practices that individuals derive from membership in diverse social groups (e.g., ethnic groups, faith communities, occupational groups, veterans groups).&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;914&quot;&gt;&lt;td data-dcnode-id=&quot;918&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;915&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;916&quot;&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;Aspects of an individual's background, developmental experiences, and current social contexts that may affect his or her perspective, such as geographical origin, migration, language, religion, sexual orientation, or race/ethnicity.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;905&quot;&gt;&lt;td data-dcnode-id=&quot;912&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;913&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;906&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;907&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;The influence of family, friends, and other community members (the individual's &lt;/span&gt;&lt;i data-dcnode-id=&quot;909&quot;&gt;&lt;span data-dcnode-id=&quot;910&quot; instrument_node=&quot;&quot;&gt;social network&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;) on the individual's illness experience.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;div class=&quot;anchor-spacer&quot; data-dcnode-id=&quot;902&quot; id=&quot;T2&quot;&gt;&lt;/div&gt;&lt;div class=&quot;article-table-holder&quot; data-dcnode-id=&quot;588&quot; data-order=&quot;1&quot;&gt;&lt;div class=&quot;article-table-content&quot; data-dcnode-id=&quot;597&quot; id=&quot;T2&quot;&gt;&lt;figcaption data-dcnode-id=&quot;900&quot;&gt;&lt;strong data-dcnode-id=&quot;901&quot;&gt;&lt;/strong&gt;&lt;/figcaption&gt;&lt;table class=&quot;table article-section__table&quot; data-dcnode-id=&quot;598&quot;&gt;&lt;thead data-dcnode-id=&quot;884&quot;&gt;&lt;tr data-dcnode-id=&quot;896&quot;&gt;&lt;th align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;897&quot; rowspan=&quot;1&quot; scope=&quot;colgroup&quot; valign=&quot;top&quot;&gt;&lt;b data-dcnode-id=&quot;898&quot;&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;Cultural Formulation Interview (CFI)—Informant Version&lt;/span&gt;&lt;/b&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;885&quot;&gt;&lt;th colspan=&quot;1&quot; data-dcnode-id=&quot;892&quot; rowspan=&quot;1&quot; scope=&quot;col&quot; valign=&quot;top&quot;&gt;&lt;b data-dcnode-id=&quot;893&quot;&gt;&lt;i data-dcnode-id=&quot;894&quot;&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;GUIDE TO INTERVIEWER&lt;/span&gt;&lt;/i&gt;&lt;/b&gt;&lt;/th&gt;&lt;th align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;886&quot; rowspan=&quot;1&quot; scope=&quot;col&quot; valign=&quot;top&quot;&gt;&lt;b data-dcnode-id=&quot;887&quot;&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;INSTRUCTIONS TO THE INTERVIEWER ARE &lt;/span&gt;&lt;i data-dcnode-id=&quot;889&quot;&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;ITALICIZED&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/b&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody data-dcnode-id=&quot;599&quot;&gt;&lt;tr data-dcnode-id=&quot;877&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;881&quot; rowspan=&quot;2&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;882&quot;&gt;&lt;span data-dcnode-id=&quot;883&quot; instrument_node=&quot;&quot;&gt;The following questions aim to clarify key aspects of the presenting clinical problem from the informant’s point of view. This includes the problem’s meaning, potential sources of help, and expectations for services.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;878&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;879&quot;&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;INTRODUCTION FOR THE INFORMANT:&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;871&quot;&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;872&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;876&quot; instrument_node=&quot;&quot;&gt;I would like to understand the problems that bring your family member/friend here so that I can help you and him/her more effectively. I want to know about &lt;/span&gt;&lt;i data-dcnode-id=&quot;874&quot;&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;your&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt; experience and ideas. I will ask some questions about what is going on and how you and your family member/friend are dealing with it. There are no right or wrong answers.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;868&quot;&gt;&lt;td align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;869&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;RELATIONSHIP WITH THE PATIENT&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;862&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;865&quot; rowspan=&quot;3&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;866&quot;&gt;&lt;span data-dcnode-id=&quot;867&quot; instrument_node=&quot;&quot;&gt;Clarify the informant’s relationship with the individual and/or the individual’s family.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;863&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;1. How would you describe your relationship to [INDIVIDUAL OR TO FAMILY]?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;858&quot;&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;859&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;860&quot;&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;PROBE IF NOT CLEAR:&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;855&quot;&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;856&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;How often do you see [INDIVIDUAL]?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;852&quot;&gt;&lt;td align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;853&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;CULTURAL DEFINITION OF THE PROBLEM&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;846&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;849&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;850&quot;&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;Elicit the informant’s view of core problems and key concerns.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;847&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;2. What brings your family member/friend here today?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;839&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;843&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;844&quot;&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;Focus on the informant’s way of understanding the individual’s problem.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;840&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;841&quot;&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;IF INFORMANT GIVES FEW DETAILS OR ONLY MENTIONS SYMPTOMS OR A MEDICAL DIAGNOSIS, PROBE:&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;830&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;836&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;837&quot;&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;Use the term, expression, or brief description elicited in question 1 to identify the problem in subsequent questions (e.g, “her conflict with her son”).&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;831&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;People often understand problems in their own way, which may be similar or different from how doctors describe the problem. How would &lt;/span&gt;&lt;i data-dcnode-id=&quot;833&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;you&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt; describe [INDIVIDUAL’S] problem?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;821&quot;&gt;&lt;td c RT&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;807&quot;&gt;&lt;td align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;808&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;C&lt;/span&gt;&lt;span class=&quot;smallcaps smallerCapital&quot; data-dcnode-id=&quot;809&quot;&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;auses&lt;/span&gt;&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;801&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;804&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;805&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;This question indicates the meaning of the condition for the informant, which may be relevant for clinical care.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;802&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;5. Why do you think this is happening to [INDIVIDUAL]? What do you think are the causes of his/her [PROBLEM]?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;794&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;798&quot; rowspan=&quot;2&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;799&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;Note that informants may identify multiple causes depending on the facet of the problem they are considering.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;795&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;796&quot;&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot etails as needed (e.g., “What got in the way?”).&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;657&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;658&quot;&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;PROBE AS NEEDED:&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;653&quot;&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;654&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;For example, money, work or family commitments, stigma or discrimination, or lack of services that understand his/her language or background?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;650&quot;&gt;&lt;td align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;651&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;CULTURAL FACTORS AFFECTING CURRENT HELP SEEKING&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;645&quot;&gt;&lt;td align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;646&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;P&lt;/span&gt;&lt;span class=&quot;smallcaps smallerCapital&quot; data-dcnode-id=&quot;647&quot;&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;references&lt;/span&gt;&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;639&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;642&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;643&quot;&gt;&lt;span data-dcnode-id=&quot;644&quot; instrument_node=&quot;&quot;&gt;Clarify individual’s current perceived needs and expectations of help, broadly defined, from the point of view of the informant.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;640&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;641&quot; instrument_node=&quot;&quot;&gt;Now let’s talk about the help [INDIVIDUAL] needs.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;633&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;636&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;637&quot;&gt;&lt;span data-dcnode-id=&quot;638&quot; instrument_node=&quot;&quot;&gt;Probe if informant lists only one source of help (e.g., “What other kinds of help would be useful to [INDIVIDUAL] at this time?”).&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;634&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;15. What kinds of help would be most useful to him/her at this time for his/her [PROBLEM]?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;627&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;630&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;631&quot;&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;Focus on the views of the social network regarding help seeking.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;628&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;16. Are there other kinds of help that [INDIVIDUAL’S] family, friends, or other people have suggested would be helpful for him/ her now?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;616&quot;&gt;&lt;td align=&quot;center&quot; class=&quot;align_center last&quot; colspan=&quot;2&quot; data-dcnode-id=&quot;617&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;C&lt;/span&gt;&lt;span class=&quot;smallcaps smallerCapital&quot; data-dcnode-id=&quot;624&quot;&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;linician&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;-P&lt;/span&gt;&lt;span class=&quot;smallcaps smallerCapital&quot; data-dcnode-id=&quot;621&quot;&gt;&lt;span data-dcnode-id=&quot;622&quot; instrument_node=&quot;&quot;&gt;atient&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt; R&lt;/span&gt;&lt;span class=&quot;smallcaps smallerCapital&quot; data-dcnode-id=&quot;618&quot;&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;elationship&lt;/span&gt;&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;610&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;613&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;614&quot;&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;Elicit possible concerns about the clinic or the clinician-patient relationship, including perceived racism, language barriers, or cultural differences that may undermine goodwill, communication, or care delivery.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;611&quot; rowspan=&quot;1&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt;Sometimes doctors and patients misunderstand each other because they come from different backgrounds or have different expectations.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;604&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;607&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;608&quot;&gt;&lt;span data-dcnode-id=&quot;609&quot; instrument_node=&quot;&quot;&gt;Probe details as needed (e.g., “In what way?”).&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;td class=&quot;last&quot; colspan=&quot;1&quot; data-dcnode-id=&quot;605&quot; rowspan=&quot;2&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;17. Have you been concerned about this, and is there anything that we can do to provide [INDIVIDUAL] with the care he/she needs?&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;last&quot; data-dcnode-id=&quot;600&quot;&gt;&lt;td colspan=&quot;1&quot; data-dcnode-id=&quot;601&quot; rowspan=&quot;1&quot; scope=&quot;row&quot; valign=&quot;top&quot;&gt;&lt;i data-dcnode-id=&quot;602&quot;&gt;&lt;span data-dcnode-id=&quot;603&quot; instrument_node=&quot;&quot;&gt;Address possible barriers to care or concerns about the clinic and the clinician-patient relationship raised previously.&lt;/span&gt;&lt;/i&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;&lt;div class=&quot;article-table-holder__opener&quot; data-dcnode-id=&quot;589&quot;&gt;&lt;a aria-label=&quot;icon-table&quot; data-dcnode-id=&quot;595&quot; href=&quot;#&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;icon-table&quot; data-dcnode-id=&quot;596&quot;&gt;&lt;/i&gt;&lt;/a&gt;&lt;div data-dcnode-id=&quot;590&quot;&gt;&lt;figcaption data-dcnode-id=&quot;593&quot;&gt;&lt;strong data-dcnode-id=&quot;594&quot;&gt;&lt;/strong&gt;&lt;/figcaption&gt;&lt;a data-dcnode-id=&quot;591&quot; href=&quot;#&quot;&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;Enlarge table&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;587&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;582&quot;&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt;The CFI is a brief semistructured interview for systematically assessing cultural factors in the clinical encounter that may be used with any individual. The CFI focuses on the individual's experience and the social contexts of the clinical problem. The CFI follows a person-centered approach to cultural assessment by eliciting information from the individual about his or her own views and those of others in his or her social network. This approach is designed to avoid stereotyping, in that each individual's cultural knowledge affects how he or she interprets illness experience and guides how he or she seeks help. Because the CFI concerns the individual’s personal views, there are no right or wrong answers to these questions. The interview follows and is available online at &lt;/span&gt;&lt;a class=&quot;ext-link&quot; data-dcnode-id=&quot;584&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.psychiatry.org/dsm5&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt;www.psychiatry.org/dsm5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;580&quot;&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;The CFI is formatted as two text columns. The left-hand column contains the instructions for administering the CFI and describes the goals for each interview domain. The questions in the right-hand column illustrate how to explore these domains, but they are not meant to be exhaustive. Follow-up questions may be needed to clarify individuals’ answers. Questions may be rephrased as needed. The CFI is intended as a guide to cultural assessment and should be used flexibly to maintain a natural flow of the interview and rapport with the individual.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;578&quot;&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;The CFI is best used in conjunction with demographic information obtained prior to the interview in order to tailor the CFI questions to address the individual's background and current situation. Specific demographic domains to be explored with the CFI will vary across individuals and settings. A comprehensive assessment may include place of birth, age, gender, racial/ethnic origin, marital status, family composition, education, language fluencies, sexual orientation, religious or spiritual affiliation, occupation, employment, income, and migration history.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;The CFI can be used in the initial assessment of individuals in all clinical settings, regardless of the cultural background of the individual or of the clinician. Individuals and clinicians who appear to share the same cultural background may nevertheless differ in ways that are relevant to care. The CFI may be used in its entirety, or components may be incorporated into a clinical evaluation as needed. The CFI may be especially helpful when there is&lt;/span&gt;&lt;/p&gt;&lt;table border=&quot;0&quot; class=&quot;listgroup&quot; data-dcnode-id=&quot;544&quot; id=&quot;L3&quot; list-type=&quot;bullet&quot; width=&quot;95%&quot;&gt;&lt;tbody data-dcnode-id=&quot;545&quot;&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;570&quot;&gt;&lt;td data-dcnode-id=&quot;574&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;571&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;572&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;Difficulty in diagnostic assessment owing to significant differences in the cultural, religious, or socioeconomic backgrounds of clinician and the individual.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;564&quot;&gt;&lt;td data-dcnode-id=&quot;568&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;565&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;566&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;Uncertainty about the fit between culturally distinctive symptoms and diagnostic criteria.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;558&quot;&gt;&lt;td data-dcnode-id=&quot;562&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;559&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;560&quot;&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;Difficulty in judging illness severity or impairment.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;552&quot;&gt;&lt;td data-dcnode-id=&quot;556&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;553&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;554&quot;&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;Disagreement between the individual and clinician on the course of care.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;546&quot;&gt;&lt;td data-dcnode-id=&quot;550&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;547&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;548&quot;&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;Limited engagement in and adherence to treatment by the individual.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;p data-dcnode-id=&quot;543&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;541&quot;&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;The CFI emphasizes four domains of assessment: Cultural Definition of the Problem (questions 1–3); Cultural Perceptions of Cause, Context, and Support (questions 4–10); Cultural Factors Affecting Self-Coping and Past Help Seeking (questions 11–13); and Cultural Factors Affecting Current Help Seeking (questions 14–16). Both the person-centered process of conducting the CFI and the information it elicits are intended to enhance the cultural validity of diagnostic assessment, facilitate treatment planning, and promote the individual’s engagement and satisfaction. To achieve these goals, the information obtained from the CFI should be integrated with all other available clinical material into a comprehensive clinical and contextual evaluation. An Informant version of the CFI can be used to collect collateral information on the CFI domains from family members or caregivers.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;536&quot;&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;Supplementary modules have been developed that expand on each domain of the CFI and guide clinicians who wish to explore these domains in greater depth. Supplementary modules have also been developed for specific populations, such as children and adolescents, elderly individuals, and immigrants and refugees. These supplementary modules are referenced in the CFI under the pertinent subheadings and are available online at &lt;/span&gt;&lt;a class=&quot;ext-link&quot; data-dcnode-id=&quot;538&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.psychiatry.org/dsm5&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;www.psychiatry.org/dsm5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;537&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;anchor-spacer&quot; data-dcnode-id=&quot;535&quot; id=&quot;ac_i3&quot;&gt;&lt;/div&gt;&lt;h2 class=&quot;article-section__title section__title&quot; data-dcnode-id=&quot;533&quot; id=&quot;_i3&quot;&gt;&lt;span data-dcnode-id=&quot;534&quot; instrument_node=&quot;&quot;&gt;Cultural Formulation Interview (CFI) – Informant Version&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;531&quot;&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;The CFI–Informant Version collects collateral information from an informant who is knowledgeable about the clinical problems and life circumstances of the identified individual. This version can be used to supplement information obtained from the core CFI or can be used instead of the core CFI when the individual is unable to provide information—as might occur, for example, with children or adolescents, floridly psychotic individuals, or persons with cognitive impairment.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;anchor-spacer&quot; data-dcnode-id=&quot;530&quot; id=&quot;ac_i4&quot;&gt;&lt;/div&gt;&lt;h2 class=&quot;article-section__title section__title&quot; data-dcnode-id=&quot;528&quot; id=&quot;_i4&quot;&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;Cultural Concepts of Distress&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;512&quot;&gt;&lt;i data-dcnode-id=&quot;526&quot;&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;Cultural concepts of distress&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt; refers to ways that cultural groups experience, understand, and communicate suffering, behavioral problems, or troubling thoughts and emotions. Three main types of cultural concepts may be distinguished. &lt;/span&gt;&lt;i data-dcnode-id=&quot;523&quot;&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;Cultural syndromes&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt; are clusters of symptoms and attributions that tend to co-occur among individuals in specific cultural groups, communities, or contexts and that are recognized locally as coherent patterns of experience. &lt;/span&gt;&lt;i data-dcnode-id=&quot;520&quot;&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;Cultural idioms of distress&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt; are ways of expressing distress that may not involve specific symptoms or syndromes, but that provide collective, shared ways of experiencing and talking about personal or social concerns. For example, everyday talk about “nerves” or “depression” may refer to widely varying forms of suffering without mapping onto a discrete set of symptoms, syndrome, or disorder. &lt;/span&gt;&lt;i data-dcnode-id=&quot;517&quot;&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;Cultural explanations&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt; or &lt;/span&gt;&lt;i data-dcnode-id=&quot;514&quot;&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;perceived causes&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt; are labels, attributions, or features of an explanatory model that indicate culturally recognized meaning or etiology for symptoms, illness, or distress.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;498&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;These three concepts—syndromes, idioms, and explanations—are more relevant to clinical practice than the older formulation &lt;/span&gt;&lt;i data-dcnode-id=&quot;509&quot;&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;culture-bound syndrome.&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;508&quot; instrument_node=&quot;&quot;&gt; Specifically, the term &lt;/span&gt;&lt;i data-dcnode-id=&quot;506&quot;&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;culture-bound syndrome&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt; ignores the fact that clinically important cultural differences often involve explanations or experience of distress rather than culturally distinctive configurations of symptoms. Furthermore, the term &lt;/span&gt;&lt;i data-dcnode-id=&quot;503&quot;&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;culture-bound&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt; overemphasizes the local particularity and limited distribution of cultural concepts of distress. The current formulation acknowledges that &lt;/span&gt;&lt;i data-dcnode-id=&quot;500&quot;&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;all&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt; forms of distress are locally shaped, including the DSM disorders. From this perspective, many DSM diagnoses can be understood as operationalized prototypes that started out as cultural syndromes, and became widely accepted as a result of their clinical and research utility. Across groups there remain culturally patterned differences in symptoms, ways of talking about distress, and locally perceived causes, which are in turn associated with coping strategies and patterns of help seeking.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;496&quot;&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;Cultural concepts arise from local folk or professional diagnostic systems for mental and emotional distress, and they may also reflect the influence of biomedical concepts. Cultural concepts have four key features in relation to the DSM-5 nosology:&lt;/span&gt;&lt;/p&gt;&lt;table border=&quot;0&quot; class=&quot;listgroup&quot; data-dcnode-id=&quot;470&quot; id=&quot;L4&quot; list-type=&quot;bullet&quot; width=&quot;95%&quot;&gt;&lt;tbody data-dcnode-id=&quot;471&quot;&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;490&quot;&gt;&lt;td data-dcnode-id=&quot;494&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;495&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;491&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;492&quot;&gt;&lt;span data-dcnode-id=&quot;493&quot; instrument_node=&quot;&quot;&gt;There is seldom a one-to-one correspondence of any cultural concept with a DSM diagnostic entity; the correspondence is more likely to be one-to-many in either direction. Symptoms or behaviors that might be sorted by DSM-5 into several disorders may be included in a single folk concept, and diverse presentations that might be classified by DSM-5 as variants of a single disorder may be sorted into several distinct concepts by an indigenous diagnostic system.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;484&quot;&gt;&lt;td data-dcnode-id=&quot;488&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;485&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;486&quot;&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;Cultural concepts may apply to a wide range of severity, including presentations that do not meet DSM criteria for any mental disorder. For example, an individual with acute grief or a social predicament may use the same idiom of distress or display the same cultural syndrome as another individual with more severe psychopathology.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;478&quot;&gt;&lt;td data-dcnode-id=&quot;482&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;479&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;480&quot;&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;In common usage, the same cultural term frequently denotes more than one type of cultural concept. A familiar example may be the concept of “depression,” which may be used to describe a syndrome (e.g., major depressive disorder), an idiom of distress (e.g., as in the common expression “I feel depressed”), or a perceived cause (similar to “stress”).&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;472&quot;&gt;&lt;td data-dcnode-id=&quot;476&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;473&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;474&quot;&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;Like culture and DSM itself, cultural concepts may change over time in response to both local and global influences.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;p data-dcnode-id=&quot;469&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;467&quot;&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;Cultural concepts are important to psychiatric diagnosis for several reasons:&lt;/span&gt;&lt;/p&gt;&lt;table border=&quot;0&quot; class=&quot;listgroup&quot; data-dcnode-id=&quot;417&quot; id=&quot;L5&quot; list-type=&quot;bullet&quot; width=&quot;95%&quot;&gt;&lt;tbody data-dcnode-id=&quot;418&quot;&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;459&quot;&gt;&lt;td data-dcnode-id=&quot;465&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;460&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;461&quot;&gt;&lt;b data-dcnode-id=&quot;463&quot;&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;To avoid misdiagnosis:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt; Cultural variation in symptoms and in explanatory models associated with these cultural concepts may lead clinicians to misjudge the severity of a problem or assign the wrong diagnosis (e.g., unfamiliar spiritual explanations may be misunderstood as psychosis).&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;451&quot;&gt;&lt;td data-dcnode-id=&quot;457&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;452&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;453&quot;&gt;&lt;b data-dcnode-id=&quot;455&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;To obtain useful clinical information:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt; Cultural variations in symptoms and attributions may be associated with particular features of risk, resilience, and outcome.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;443&quot;&gt;&lt;td data-dcnode-id=&quot;449&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;450&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;444&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;445&quot;&gt;&lt;b data-dcnode-id=&quot;447&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;To improve clinical rapport and engagement:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt; “Speaking the language of the patient,” both linguistically and in terms of his or her dominant concepts and metaphors, can result in greater communication and satisfaction, facilitate treatment negotiation, and lead to higher retention and adherence.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;435&quot;&gt;&lt;td data-dcnode-id=&quot;441&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;436&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;437&quot;&gt;&lt;b data-dcnode-id=&quot;439&quot;&gt;&lt;span data-dcnode-id=&quot;440&quot; instrument_node=&quot;&quot;&gt;To improve therapeutic efficacy:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt; Culture influences the psychological mechanisms of disorder, which need to be understood and addressed to improve clinical efficacy. For example, culturally specific catastrophic cognitions can contribute to symptom escalation into panic attacks.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;427&quot;&gt;&lt;td data-dcnode-id=&quot;433&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;428&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;429&quot;&gt;&lt;b data-dcnode-id=&quot;431&quot;&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;To guide clinical research:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt; Locally perceived connections between cultural concepts may help identify patterns of comorbidity and underlying biological substrates.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;419&quot;&gt;&lt;td data-dcnode-id=&quot;425&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;420&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;421&quot;&gt;&lt;b data-dcnode-id=&quot;423&quot;&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;To clarify the cultural epidemiology:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt; Cultural concepts of distress are not endorsed uniformly by everyone in a given culture. Distinguishing syndromes, idioms, and explanations provides an approach for studying the distribution of cultural features of illness across settings and regions, and over time. It also suggests questions about cultural determinants of risk, course, and outcome in clinical and community settings to enhance the evidence base of cultural research.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;p data-dcnode-id=&quot;416&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;411&quot;&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt;DSM-5 includes information on cultural concepts in order to improve the accuracy of diagnosis and the comprehensiveness of clinical assessment. Clinical assessment of individuals presenting with these cultural concepts should determine whether they meet DSM-5 criteria for a specified disorder or an &lt;/span&gt;&lt;i data-dcnode-id=&quot;413&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;other specified or unspecified&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt; diagnosis. Once the disorder is diagnosed, the cultural terms and explanations should be included in case formulations; they may help clarify symptoms and etiological attributions that could otherwise be confusing. Individuals whose symptoms do not meet DSM criteria for a specific mental disorder may still expect and require treatment; this should be assessed on a case-by-case basis. In addition to the CFI and its supplementary modules, DSM-5 contains the following information and tools that may be useful when integrating cultural information in clinical practice:&lt;/span&gt;&lt;/p&gt;&lt;table border=&quot;0&quot; class=&quot;listgroup&quot; data-dcnode-id=&quot;385&quot; id=&quot;L6&quot; list-type=&quot;bullet&quot; width=&quot;95%&quot;&gt;&lt;tbody data-dcnode-id=&quot;386&quot;&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;403&quot;&gt;&lt;td data-dcnode-id=&quot;409&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;410&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;404&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;405&quot;&gt;&lt;b data-dcnode-id=&quot;407&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;Data in DSM-5 criteria and text for specific disorders:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt; The text includes information on cultural variations in prevalence, symptomatology, associated cultural concepts, and other clinical aspects. It is important to emphasize that there is no one-to-one correspondence at the categorical level between DSM disorders and cultural concepts. Differential diagnosis for individuals must therefore incorporate information on cultural variation with information elicited by the CFI.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;395&quot;&gt;&lt;td data-dcnode-id=&quot;401&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;402&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;396&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;397&quot;&gt;&lt;b data-dcnode-id=&quot;399&quot;&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt;Other Conditions That May Be a Focus of Clinical Attention:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;398&quot; instrument_node=&quot;&quot;&gt; Some of the clinical concerns identified by the CFI may correspond to V codes or Z codes—for example, acculturation problems, parent-child relational problems, or religious or spiritual problems.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr class=&quot;li1&quot; data-dcnode-id=&quot;387&quot;&gt;&lt;td data-dcnode-id=&quot;393&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;paragraph&quot; colspan=&quot;5&quot; data-dcnode-id=&quot;388&quot; valign=&quot;top&quot;&gt;&lt;p data-dcnode-id=&quot;389&quot;&gt;&lt;b data-dcnode-id=&quot;391&quot;&gt;&lt;span data-dcnode-id=&quot;392&quot; instrument_node=&quot;&quot;&gt;Glossary of Cultural Concepts of Distress:&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt; Located in the Appendix, this glossary provides examples of well-studied cultural concepts of distress that illustrate the relevance of cultural information for clinical diagnosis and some of the interrelationships among cultural syndromes, idioms of distress, and causal explanations.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;p data-dcnode-id=&quot;384&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;response&quot; data-dcnode-id=&quot;380&quot;&gt;&lt;div class=&quot;sub-article-title&quot; data-dcnode-id=&quot;381&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-table-viewer&quot; data-dcnode-id=&quot;368&quot; style=&quot;display: none;&quot;&gt;&lt;div class=&quot;article-table-viewer__content&quot; data-dcnode-id=&quot;370&quot;&gt;&lt;div class=&quot;article-table-viewer__ctrl&quot; data-dcnode-id=&quot;374&quot;&gt;&lt;a class=&quot;article-table-viewer__ctrl__prev&quot; data-dcnode-id=&quot;377&quot; data-nav=&quot;prev&quot; href=&quot;#&quot; title=&quot;Previous Table&quot;&gt;&lt;span class=&quot;icon-arrow_l&quot; data-dcnode-id=&quot;378&quot;&gt;&lt;/span&gt;&lt;/a&gt;&lt;a class=&quot;article-table-viewer__ctrl__next&quot; data-dcnode-id=&quot;375&quot; data-nav=&quot;next&quot; href=&quot;#&quot; title=&quot;Next Table&quot;&gt;&lt;span class=&quot;icon-arrow_r&quot; data-dcnode-id=&quot;376&quot;&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;a class=&quot;table__viewer__closer&quot; data-dcnode-id=&quot;372&quot; href=&quot;#&quot;&gt;&lt;i class=&quot;icon-close_thin&quot; data-dcnode-id=&quot;373&quot;&gt;&lt;/i&gt;&lt;/a&gt;&lt;div class=&quot;article-table-viewer__wrapper&quot; data-dcnode-id=&quot;371&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;article-table-viewer__overlay&quot; data-dcnode-id=&quot;369&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;col-sm-4 col-md-4 col-lg-3 hidden-xs hidden-sm fixed-element&quot; data-dcnode-id=&quot;274&quot; style=&quot;top: 116px;&quot;&gt;&lt;span data-dcnode-id=&quot;365&quot; instrument_node=&quot;&quot;&gt;
