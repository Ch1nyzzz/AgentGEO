&lt;/span&gt;&lt;p data-dcnode-id=&quot;1012&quot;&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;The way we communicate with other cultures is a significant part of&amp;nbsp;inclusion within DE&amp;amp;I. It’s very easy to mess up, ignore, patronise and worse still offend staff members, customers and clients when we fail to understand the nuances&amp;nbsp;of cross-cultural communication.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1009&quot;&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;We know that communication styles are patterns that people learn from the range of cultures in which they have membership. It is equally true to say that every culture has a 'communication style norm'&amp;nbsp;that is used by a majority of people in that culture.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;1004&quot;&gt;&lt;p data-dcnode-id=&quot;1006&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;The key to success is understanding and accepting the differences of a multicultural team.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1001&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;However, there are cultures within cultures so it is important, as practitioners, to understand that there are different levels of communication at play all of the time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;998&quot;&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;The key to success is understanding and accepting the differences of a multicultural team, and then using them to enhance the way the team analyses situations and makes decisions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;992&quot;&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;Below are 10 strategies that will help you leverage greater communication amongst &lt;/span&gt;&lt;a data-dcnode-id=&quot;994&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrzone.com/lead/culture/gender-diversity-commitment-to-women-in-the-workplace-must-be-authentic&quot;&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;diverse teams and promote inclusivity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;, based on my recent experiences.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;advert advert__inline&quot; data-dcnode-id=&quot;983&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;978&quot;&gt;&lt;p data-dcnode-id=&quot;980&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;These strategies are vitally important in the quest for cross cultural harmony.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;975&quot;&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;Being chair of a number of grievances and disciplinaries in recent weeks, I have seen first-hand that miscommunication, a lack of understanding of other people’s cultures and misaligned assumptions has exasperated the situations and has made finding a solution considerably difficult, if not, impossible.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;966&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;These strategies are vitally important in the quest for &lt;/span&gt;&lt;a data-dcnode-id=&quot;971&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrzone.com/lead/culture/diversity-equality-and-inclusion-taking-a-data-driven-approach-that-addresses&quot;&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;cross-cultural harmony&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt;. However, I have found that numbers 2, 4, 7 and 8 have had a profound impact on the way I approach &lt;/span&gt;&lt;a class=&quot;alinks-link&quot; data-dcnode-id=&quot;968&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrzone.com/tags/diversity-and-inclusion&quot; title=&quot;Explore our DEI coverage&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;diversity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;962&quot;&gt;&lt;strong data-dcnode-id=&quot;963&quot;&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;1.&amp;nbsp;Do your research&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;956&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;Before you meet your new member of staff, research the target culture. Many cultures expect a degree of formality at the beginning of communication between individuals. Every culture has its own specific way of indicating this formality and as a leader or practitioner in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;958&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hrzone.com/lead/culture/equality-diversity-and-inclusion-why-hr-needs-to-take-centre-stage&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;HR&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt; field, appropriate etiquette goes a long way in respecting other people’s culture.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;952&quot;&gt;&lt;strong data-dcnode-id=&quot;953&quot;&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt;2. Preconceptions and stereotypes&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;949&quot;&gt;&lt;span data-dcnode-id=&quot;950&quot; instrument_node=&quot;&quot;&gt;Preconceived notions and stereotyping occur when oversimplified characteristics are used to judge a group of people or an individual associated with a group. Reducing the default behaviour of seeing things as ‘good’ or bad’ without really understanding the intent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;945&quot;&gt;&lt;strong data-dcnode-id=&quot;946&quot;&gt;&lt;span data-dcnode-id=&quot;947&quot; instrument_node=&quot;&quot;&gt;3. Avoid slang&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;944&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;942&quot;&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;Non-native English speakers may understand the individual words you use, but not the context or the meaning of slang words, idioms or sayings. Even when speaking the same language and using the same words, individuals can interpret the strength of a word very differently. As a result, you could end up confusing them or even offending them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;938&quot;&gt;&lt;strong data-dcnode-id=&quot;939&quot;&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;4. Be aware of nonverbal misinterpretations&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;935&quot;&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;We send and receive non-verbal messages through our body language, facial expressions, and eye contact. Even clothing and furniture style can communicate an intended or unintended message.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;931&quot;&gt;&lt;strong data-dcnode-id=&quot;932&quot;&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt;5. Speak slowly&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;930&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;928&quot;&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;Even if English is the common language in a cross-cultural situation it’s not a good idea to speak at your normal conversational speed. Modulating your pace will help, as will speaking clearly and pronouncing your words properly. This does not mean that you speak at a snail’s pace which can be seen as both annoying and patronising.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;924&quot;&gt;&lt;strong data-dcnode-id=&quot;925&quot;&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;6. Keep it simple&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;921&quot;&gt;&lt;span data-dcnode-id=&quot;922&quot; instrument_node=&quot;&quot;&gt;In a cross-cultural conversation, there’s no need to make it harder for both of you by using big words. Choose simplicity over complexity in cross-cultural communication – check for an understanding of meanings.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;920&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;917&quot;&gt;&lt;strong data-dcnode-id=&quot;918&quot;&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;7. Assumption of similarities&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;914&quot;&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;The invisible aspects of our culture lead us to assume our communication style and way of behaving is how everyone communicates and behaves. When they act like us we think they are right, or we don’t give it much thought. When someone acts differently, we may judge them negatively. Appreciate the differences, embrace the diversity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;913&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;910&quot;&gt;&lt;strong data-dcnode-id=&quot;911&quot;&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;8. Practice active listening&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;907&quot;&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;Restate or summarise what the other person has said, to ensure that you have understood them correctly, and ask frequent questions. This helps build rapport and ensures that important information doesn’t get missed or misunderstood.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;903&quot;&gt;&lt;strong data-dcnode-id=&quot;904&quot;&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;9. Avoid closed questions&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;902&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;900&quot;&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;Don’t phrase a question that needs requires a yes or no answer. In many cultures it is difficult or embarrassing to answer in the negative, so you will always get a ‘yes’ even if the real answer is ‘no’. Ask open-ended questions that require information as a response.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;896&quot;&gt;&lt;strong data-dcnode-id=&quot;897&quot;&gt;&lt;span data-dcnode-id=&quot;898&quot; instrument_node=&quot;&quot;&gt;10. Be careful with humour&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;893&quot;&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt;Many cultures take business very seriously and believe in behaving professionally and following protocol at all times. If you do decide to use humour make sure it will be understood and appreciated in the other culture and not cause offence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;890&quot;&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;DE&amp;amp;I leaders, executives, managers and HR have a responsibility to understand that culturally learned behavioural differences affect communication behaviours.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;889&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;887&quot;&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;Getting this right will reduce cultural conflicts in the workplace and improve and diversity and inclusion initiatives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;
