&lt;/span&gt;&lt;p data-dcnode-id=&quot;2768&quot; style=&quot;text-align: center; margin: 0px; padding: 0px;&quot;&gt;&lt;strong data-dcnode-id=&quot;2769&quot;&gt;&lt;span data-dcnode-id=&quot;2770&quot; instrument_node=&quot;&quot;&gt;An idiom is a saying or catchphrase that is conventionally understood by fluent language speakers.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2767&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2765&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2757&quot; style=&quot;margin-top: 25px;&quot;&gt;&lt;span data-dcnode-id=&quot;2764&quot; instrument_node=&quot;&quot;&gt;There are three features&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2759&quot;&gt;&lt;span data-dcnode-id=&quot;2763&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;a data-dcnode-id=&quot;2761&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.ling.hawaii.edu/faculty/ogrady/Idioms.1998.pdf&quot; rel=&quot;noopener&quot; role=&quot;link&quot;&gt;&lt;span data-dcnode-id=&quot;2762&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2760&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2758&quot; instrument_node=&quot;&quot;&gt; that define a perfect idiom:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;2740&quot;&gt;&lt;li data-dcnode-id=&quot;2752&quot;&gt;&lt;strong data-dcnode-id=&quot;2754&quot;&gt;&lt;span data-dcnode-id=&quot;2755&quot; instrument_node=&quot;&quot;&gt;Two words or More: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2753&quot; instrument_node=&quot;&quot;&gt;We usually consider an idiom to be a phrase that’s at least two words long.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2751&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2747&quot;&gt;&lt;strong data-dcnode-id=&quot;2749&quot;&gt;&lt;span data-dcnode-id=&quot;2750&quot; instrument_node=&quot;&quot;&gt;Non-Literalism:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2748&quot; instrument_node=&quot;&quot;&gt; The meanings of perfect idioms cannot be logically determined through literal interpretation.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2746&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2742&quot;&gt;&lt;strong data-dcnode-id=&quot;2744&quot;&gt;&lt;span data-dcnode-id=&quot;2745&quot; instrument_node=&quot;&quot;&gt;Conventionality: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2743&quot; instrument_node=&quot;&quot;&gt;The meanings of idioms are determined by cultural convention. You need to be exposed to a culture over time to learn many of them.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;2738&quot;&gt;&lt;span data-dcnode-id=&quot;2739&quot; instrument_node=&quot;&quot;&gt;Idioms are usually hard for English learners to understand until their meanings are explained to you. That’s because they are phrases that often don’t clearly make sense. They only make sense to us because society has collectively agreed upon their non-literal meaning!&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2737&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2616&quot;&gt;&lt;span data-dcnode-id=&quot;2617&quot; id=&quot;1_To_Learn_English&quot;&gt;&lt;span data-dcnode-id=&quot;2618&quot; instrument_node=&quot;&quot;&gt;1. To Learn English&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2615&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2612&quot; style=&quot;padding: 15px; border-radius: 10px; box-shadow: gray 0px 0px 3px; background-color: #fffcd9; text-align: center;&quot;&gt;&lt;strong data-dcnode-id=&quot;2613&quot;&gt;&lt;span data-dcnode-id=&quot;2614&quot; instrument_node=&quot;&quot;&gt;For English language learners, idioms can help you understand how we use our language.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2609&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;You need to understand idioms so when you hear them in conversation you can still follow along with the conversation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2606&quot;&gt;&lt;span data-dcnode-id=&quot;2607&quot; instrument_node=&quot;&quot;&gt;Unfortunately for English learners, we have many thousands of idioms. This makes our language beautiful, fun, and expressive. But it also makes it very hard to learn English.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2600&quot;&gt;&lt;span data-dcnode-id=&quot;2604&quot; instrument_node=&quot;&quot;&gt;In fact, English is widely understood to be one of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2602&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.oxford-royale.com/articles/learning-english-hard/&quot; rel=&quot;noopener&quot; role=&quot;link&quot;&gt;&lt;span data-dcnode-id=&quot;2603&quot; instrument_node=&quot;&quot;&gt;hardest languages to learn&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2601&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2596&quot;&gt;&lt;span data-dcnode-id=&quot;2597&quot; id=&quot;2_To_Communicate_Effectively&quot;&gt;&lt;span data-dcnode-id=&quot;2598&quot; instrument_node=&quot;&quot;&gt;2. To Communicate Effectively&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2595&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2592&quot; style=&quot;padding: 15px; border-radius: 10px; box-shadow: gray 0px 0px 3px; background-color: #fffcd9; text-align: center;&quot;&gt;&lt;strong data-dcnode-id=&quot;2593&quot;&gt;&lt;span data-dcnode-id=&quot;2594&quot; instrument_node=&quot;&quot;&gt;For native English speakers, we use idioms as a means of effective communication.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2591&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2589&quot;&gt;&lt;span data-dcnode-id=&quot;2590&quot; instrument_node=&quot;&quot;&gt;Idioms are a kind of shorthand way to express something more complex.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2588&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2586&quot;&gt;&lt;span data-dcnode-id=&quot;2587&quot; instrument_node=&quot;&quot;&gt;Sometimes it’s incredibly difficult to express our feelings and thoughts. New idioms become part of our common lexicon when people realize there is a fun, expressive, but non-literal way to communicate our feelings.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2582&quot;&gt;&lt;span data-dcnode-id=&quot;2583&quot; id=&quot;3_For_Self-Expression&quot;&gt;&lt;span data-dcnode-id=&quot;2584&quot; instrument_node=&quot;&quot;&gt;3. For Self-Expression&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2578&quot; style=&quot;padding: 15px; border-radius: 10px; box-shadow: gray 0px 0px 3px; background-color: #fffcd9; text-align: center;&quot;&gt;&lt;strong data-dcnode-id=&quot;2579&quot;&gt;&lt;span data-dcnode-id=&quot;2580&quot; instrument_node=&quot;&quot;&gt;Of course, idioms are a tool for self-expression.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2577&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2575&quot;&gt;&lt;span data-dcnode-id=&quot;2576&quot; instrument_node=&quot;&quot;&gt;Every new generation faces new challenges that need new ways to express their generation’s collective thoughts and feelings.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2572&quot;&gt;&lt;span data-dcnode-id=&quot;2573&quot; instrument_node=&quot;&quot;&gt;For example, a great deal of new idioms emerged at the turn of the millennium when the internet spread through the world. With this new way to communicate becoming ubiquitous, a flourish of new internet-themed idioms emerged as shorthand ways to explain our experiences of “surfing the web”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2571&quot; instrument_node=&quot;&quot;&gt;

a-dcnode-id=&quot;992&quot; style=&quot;height: 87px;&quot; width=&quot;206&quot;&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;“I was careful to write my book under the radar so when people found out I was a published author they would be really surprised.”&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;979&quot; style=&quot;height: 64px;&quot;&gt;&lt;td data-dcnode-id=&quot;987&quot; style=&quot;height: 64px;&quot; width=&quot;108&quot;&gt;&lt;strong data-dcnode-id=&quot;988&quot;&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;143. Under the weather&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;984&quot; style=&quot;height: 64px;&quot; width=&quot;154&quot;&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;Sick.&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;981&quot; style=&quot;height: 64px;&quot; width=&quot;206&quot;&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;“I’m not coming to work today because I’m under the weather.”&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;968&quot; style=&quot;height: 64px;&quot;&gt;&lt;td data-dcnode-id=&quot;976&quot; style=&quot;height: 64px;&quot; width=&quot;108&quot;&gt;&lt;strong data-dcnode-id=&quot;977&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;144. Up in the air&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;973&quot; style=&quot;height: 64px;&quot; width=&quot;154&quot;&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;The conclusion has not yet been determined.&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;970&quot; style=&quot;height: 64px;&quot; width=&quot;206&quot;&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;“The winner of this football game is still up in the air.”&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;957&quot; style=&quot;height: 87px;&quot;&gt;&lt;td data-dcnode-id=&quot;965&quot; style=&quot;height: 87px;&quot; width=&quot;108&quot;&gt;&lt;strong data-dcnode-id=&quot;966&quot;&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;145. Wet behind the ears&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;962&quot; style=&quot;height: 87px;&quot; width=&quot;154&quot;&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;To be new at something.&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;959&quot; style=&quot;height: 87px;&quot; width=&quot;206&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;“The person I was put with on this science project is a bit wet behind the ears so I have to take the lead.”&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;946&quot; style=&quot;height: 64px;&quot;&gt;&lt;td data-dcnode-id=&quot;954&quot; style=&quot;height: 64px;&quot; width=&quot;108&quot;&gt;&lt;strong data-dcnode-id=&quot;955&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;146. When it rains it pours&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;951&quot; style=&quot;height: 64px;&quot; width=&quot;154&quot;&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;Multiple things happen at once, usually positively.&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;948&quot; style=&quot;height: 64px;&quot; width=&quot;206&quot;&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt;“I finished school, started a job, and got a new boyfriend this month. When it rains it pours!”&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;935&quot; style=&quot;height: 64px;&quot;&gt;&lt;td data-dcnode-id=&quot;943&quot; style=&quot;height: 64px;&quot; width=&quot;108&quot;&gt;&lt;strong data-dcnode-id=&quot;944&quot;&gt;&lt;span data-dcnode-id=&quot;945&quot; instrument_node=&quot;&quot;&gt;147. Wrap your head around something&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;940&quot; style=&quot;height: 64px;&quot; width=&quot;154&quot;&gt;&lt;span data-dcnode-id=&quot;941&quot; instrument_node=&quot;&quot;&gt;To reach an understanding of something.&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;937&quot; style=&quot;height: 64px;&quot; width=&quot;206&quot;&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;“I can’t wrap my head around the assignment our teacher has given us this week.”&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;924&quot; style=&quot;height: 87px;&quot;&gt;&lt;td data-dcnode-id=&quot;932&quot; style=&quot;height: 87px;&quot; width=&quot;108&quot;&gt;&lt;strong data-dcnode-id=&quot;933&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;148. You can catch more flies with honey than vinegar&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;929&quot; style=&quot;height: 87px;&quot; width=&quot;154&quot;&gt;&lt;span data-dcnode-id=&quot;930&quot; instrument_node=&quot;&quot;&gt;You get your way when you are nice to people, not when you are mean to them.&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;926&quot; style=&quot;height: 87px;&quot; width=&quot;206&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;“I think you’re not going to get him to do what you want him to do when you yell at him like that. You catch more flies with honey, you know.”&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;913&quot; style=&quot;height: 87px;&quot;&gt;&lt;td data-dcnode-id=&quot;921&quot; style=&quot;height: 87px;&quot; width=&quot;108&quot;&gt;&lt;strong data-dcnode-id=&quot;922&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;149. You can lead a horse to water but you can’t make it drink&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;918&quot; style=&quot;height: 87px;&quot; width=&quot;154&quot;&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;You can help people only to a certain extent. They have to help themselves, too.&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;915&quot; style=&quot;height: 87px;&quot; width=&quot;206&quot;&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;“I showed him how to do it but he’s too lazy. You can lead a horse to water but you can’t make him drink!”&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;902&quot; style=&quot;height: 110px;&quot;&gt;&lt;td data-dcnode-id=&quot;910&quot; style=&quot;height: 110px;&quot; width=&quot;108&quot;&gt;&lt;strong data-dcnode-id=&quot;911&quot;&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;150. You can’t judge a book by its cover&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;907&quot; style=&quot;height: 110px;&quot; width=&quot;154&quot;&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;Don’t judge people until you know them.&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;904&quot; style=&quot;height: 110px;&quot; width=&quot;206&quot;&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;“When I first met him I thought he was strange. But now I realize he is really nice. I guess the moral of the story is that you can’t judge a book by its cover.”&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;h2 data-dcnode-id=&quot;897&quot;&gt;&lt;span data-dcnode-id=&quot;898&quot; id=&quot;21st_Century_Idioms&quot;&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;21st Century Idioms&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;896&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;483&quot;&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;Euphemisms are idioms that are used to soften a message that might otherwise be too harsh, blunt or politically incorrect.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;482&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;395&quot;&gt;&lt;span data-dcnode-id=&quot;399&quot; instrument_node=&quot;&quot;&gt;These are idioms that &lt;/span&gt;&lt;a data-dcnode-id=&quot;397&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.google.ca/books/edition/Webster_s_New_World_American_Idioms_Hand/wLPqDwAAQBAJ%3Fhl%3Den%26gbpv%3D0&quot; rel=&quot;noopener&quot; role=&quot;link&quot;&gt;&lt;span data-dcnode-id=&quot;398&quot; instrument_node=&quot;&quot;&gt;can be used independently&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;396&quot; instrument_node=&quot;&quot;&gt; and not as part of a sentence. They are full sentences all by themselves.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;387&quot; width=&quot;200&quot;&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;389&quot;&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;“Don’t judge a book by its cover.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;388&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;h2 data-dcnode-id=&quot;380&quot;&gt;&lt;span data-dcnode-id=&quot;381&quot; id=&quot;Comparisons_to_other_Figures_of_Speech&quot;&gt;&lt;span data-dcnode-id=&quot;382&quot; instrument_node=&quot;&quot;&gt;Comparisons to other Figures of Speech&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;376&quot;&gt;&lt;span data-dcnode-id=&quot;377&quot; id=&quot;Idioms_vs_Metaphors&quot;&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;Idioms vs Metaphors&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;372&quot; style=&quot;padding: 15px; border-radius: 10px; box-shadow: gray 0px 0px 3px; background-color: #fffcd9; text-align: center;&quot;&gt;&lt;strong data-dcnode-id=&quot;373&quot;&gt;&lt;span data-dcnode-id=&quot;374&quot; instrument_node=&quot;&quot;&gt;Many idioms are metaphorical. However, the two concepts are different.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;363&quot;&gt;&lt;span data-dcnode-id=&quot;370&quot; instrument_node=&quot;&quot;&gt;A &lt;/span&gt;&lt;a data-dcnode-id=&quot;368&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//symbolismandmetaphor.com/metaphors-ultimate-guide/&quot; role=&quot;link&quot;&gt;&lt;span data-dcnode-id=&quot;369&quot; instrument_node=&quot;&quot;&gt;metaphor&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt; is a non-literal figure of speech which involves highlighting the similarities of two things by saying they &lt;/span&gt;&lt;em data-dcnode-id=&quot;365&quot;&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;are &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;364&quot; instrument_node=&quot;&quot;&gt;the same thing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;362&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;360&quot;&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;We know the two things being compared are not the same thing. But the speaker says they are for literary effect.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;356&quot;&gt;&lt;strong data-dcnode-id=&quot;357&quot;&gt;&lt;span data-dcnode-id=&quot;358&quot; instrument_node=&quot;&quot;&gt;Idioms can employ metaphor, but an idiom is not defined by its use of metaphorical language.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;353&quot;&gt;&lt;span data-dcnode-id=&quot;354&quot; instrument_node=&quot;&quot;&gt;For example, some idioms are phrases that don’t make clear comparisons between two objects. This means they are not metaphors at all!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;350&quot;&gt;&lt;span data-dcnode-id=&quot;351&quot; instrument_node=&quot;&quot;&gt;You can think of idioms and metaphors as being two concepts with overlapping features, meaning sometimes something can be defined as a metaphor and an idiom:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;349&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;342&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;328&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;319&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;292&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;table data-dcnode-id=&quot;289&quot;&gt;&lt;tbody data-dcnode-id=&quot;290&quot;&gt;&lt;tr data-dcnode-id=&quot;327&quot;&gt;&lt;td data-dcnode-id=&quot;343&quot; style=&quot;background-color: #fffcd9;&quot; width=&quot;200&quot;&gt;&lt;span data-dcnode-id=&quot;348&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;345&quot;&gt;&lt;strong data-dcnode-id=&quot;346&quot;&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;Dominant Features of Idioms&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;336&quot; style=&quot;background-color: #fffcd9;&quot; width=&quot;200&quot;&gt;&lt;span data-dcnode-id=&quot;341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;338&quot;&gt;&lt;strong data-dcnode-id=&quot;339&quot;&gt;&lt;span data-dcnode-id=&quot;340&quot; instrument_node=&quot;&quot;&gt;Overlapping Features&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;337&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;329&quot; style=&quot;background-color: #fffcd9;&quot; width=&quot;200&quot;&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;331&quot;&gt;&lt;strong data-dcnode-id=&quot;332&quot;&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;Dominant Features of Metaphors&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;291&quot;&gt;&lt;td data-dcnode-id=&quot;320&quot; width=&quot;200&quot;&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;322&quot;&gt;&lt;strong data-dcnode-id=&quot;324&quot;&gt;&lt;span data-dcnode-id=&quot;325&quot; instrument_node=&quot;&quot;&gt;Conventionality –&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt; used in regular speech without needing to pause and interpret the meaning every time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;309&quot; width=&quot;200&quot;&gt;&lt;span data-dcnode-id=&quot;318&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;314&quot;&gt;&lt;strong data-dcnode-id=&quot;316&quot;&gt;&lt;span data-dcnode-id=&quot;317&quot; instrument_node=&quot;&quot;&gt;Non-Literalism –&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;315&quot; instrument_node=&quot;&quot;&gt;Both metaphors and idioms are not usually interpreted to be literal.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;313&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;311&quot;&gt;&lt;span data-dcnode-id=&quot;312&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;310&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;293&quot; width=&quot;200&quot;&gt;&lt;span data-dcnode-id=&quot;307&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;303&quot;&gt;&lt;strong data-dcnode-id=&quot;305&quot;&gt;&lt;span data-dcnode-id=&quot;306&quot; instrument_node=&quot;&quot;&gt;Comparison –&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;304&quot; instrument_node=&quot;&quot;&gt; makes direct contrast between two people, places, objects, or concepts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;302&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;295&quot;&gt;&lt;strong data-dcnode-id=&quot;300&quot;&gt;&lt;span data-dcnode-id=&quot;301&quot; instrument_node=&quot;&quot;&gt;Conflation –&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;299&quot; instrument_node=&quot;&quot;&gt;says or implies one thing &lt;/span&gt;&lt;em data-dcnode-id=&quot;297&quot;&gt;&lt;span data-dcnode-id=&quot;298&quot; instrument_node=&quot;&quot;&gt;is&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;296&quot; instrument_node=&quot;&quot;&gt;another thing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;294&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;h3 data-dcnode-id=&quot;286&quot;&gt;&lt;span data-dcnode-id=&quot;287&quot; id=&quot;Idioms_vs_Proverbs&quot;&gt;&lt;span data-dcnode-id=&quot;288&quot; instrument_node=&quot;&quot;&gt;Idioms vs Proverbs&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;285&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;282&quot; style=&quot;padding: 15px; border-radius: 10px; box-shadow: gray 0px 0px 3px; background-color: #fffcd9; text-align: center;&quot;&gt;&lt;strong data-dcnode-id=&quot;283&quot;&gt;&lt;span data-dcnode-id=&quot;284&quot; instrument_node=&quot;&quot;&gt;Idioms and proverbs are very similar. Proverbs can actually be types of idioms.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;281&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;279&quot;&gt;&lt;span data-dcnode-id=&quot;280&quot; instrument_node=&quot;&quot;&gt;A proverb is a short saying that provides universal truths or sage advice. They usually fit the definition of idioms, if they:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;278&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;271&quot;&gt;&lt;li data-dcnode-id=&quot;276&quot;&gt;&lt;span data-dcnode-id=&quot;277&quot; instrument_node=&quot;&quot;&gt;Are non-literal, and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;275&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;273&quot;&gt;&lt;span data-dcnode-id=&quot;274&quot; instrument_node=&quot;&quot;&gt;Are conventionally understood by society.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;269&quot;&gt;&lt;span data-dcnode-id=&quot;270&quot; instrument_node=&quot;&quot;&gt;For example, the phrase “Beggars can’t be choosers” is both idiom and proverb. It is idiomatic (as a ‘transparent idiom’) because it is used in non-literal contexts and is a phrase that is conventionally understood by society.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;266&quot;&gt;&lt;span data-dcnode-id=&quot;267&quot; instrument_node=&quot;&quot;&gt;But, it is also a proverb because it has a moral message within it (That people who are desperate can’t be picky).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;265&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;262&quot;&gt;&lt;span data-dcnode-id=&quot;263&quot; id=&quot;How_to_Teach_Idioms&quot;&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt;How to Teach Idioms&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;261&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;258&quot; style=&quot;padding: 15px; border-radius: 10px; box-shadow: gray 0px 0px 3px; background-color: #fffcd9; text-align: center;&quot;&gt;&lt;strong data-dcnode-id=&quot;259&quot;&gt;&lt;span data-dcnode-id=&quot;260&quot; instrument_node=&quot;&quot;&gt;Learning about idioms can be boring or fun – it all depends on the teacher! Here are three tips on how to teach idioms to students.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;257&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;254&quot;&gt;&lt;span data-dcnode-id=&quot;255&quot; id=&quot;1_Teach_through_Songs&quot;&gt;&lt;span data-dcnode-id=&quot;256&quot; instrument_node=&quot;&quot;&gt;1. Teach through Songs&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;253&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;248&quot;&gt;&lt;span data-dcnode-id=&quot;252&quot; instrument_node=&quot;&quot;&gt;Teaching English through songs is a common way to help people to remember key phrases such as idioms. Songs are catchy, are often popular with young people, and can even &lt;/span&gt;&lt;a data-dcnode-id=&quot;250&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//bold.expert/can-songs-help-students-learn/&quot; rel=&quot;noopener&quot; role=&quot;link&quot;&gt;&lt;span data-dcnode-id=&quot;251&quot; instrument_node=&quot;&quot;&gt;enhance motivation to learn&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;249&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;247&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;244&quot;&gt;&lt;strong data-dcnode-id=&quot;245&quot;&gt;&lt;span data-dcnode-id=&quot;246&quot; instrument_node=&quot;&quot;&gt;Examples of songs featuring idioms include:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;243&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;224&quot;&gt;&lt;li data-dcnode-id=&quot;241&quot;&gt;&lt;span data-dcnode-id=&quot;242&quot; instrument_node=&quot;&quot;&gt;Luke Combs – “When it rains it pours”&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;238&quot;&gt;&lt;span data-dcnode-id=&quot;239&quot; instrument_node=&quot;&quot;&gt;Justin Timberlake – “Cry me a river”&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;237&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;235&quot;&gt;&lt;span data-dcnode-id=&quot;236&quot; instrument_node=&quot;&quot;&gt;Lady Gaga – “Poker Face”&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;234&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;232&quot;&gt;&lt;span data-dcnode-id=&quot;233&quot; instrument_node=&quot;&quot;&gt;Hall and Oats – “You make my dreams come true”&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;231&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;229&quot;&gt;&lt;span data-dcnode-id=&quot;230&quot; instrument_node=&quot;&quot;&gt;Taylor Swift – “Shake it off”&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;228&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;226&quot;&gt;&lt;span data-dcnode-id=&quot;227&quot; instrument_node=&quot;&quot;&gt;New Radicals – “You get what you give”&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;225&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;h3 data-dcnode-id=&quot;221&quot;&gt;&lt;span data-dcnode-id=&quot;222&quot; id=&quot;2_Rote_Memorizaton&quot;&gt;&lt;span data-dcnode-id=&quot;223&quot; instrument_node=&quot;&quot;&gt;2. Rote Memorizaton&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;220&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;218&quot;&gt;&lt;span data-dcnode-id=&quot;219&quot; instrument_node=&quot;&quot;&gt;Unfortunately, idioms are hard to remember because there often isn’t always much logic behind them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;212&quot;&gt;&lt;span data-dcnode-id=&quot;216&quot; instrument_node=&quot;&quot;&gt;So, you often have to just remember idioms by memorizing them through repetition, or what we call &lt;/span&gt;&lt;a data-dcnode-id=&quot;214&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//tophat.com/glossary/r/rote-learning/%23%3A~%3Atext%3DRote%2520learning%2520is%2520the%2520process%2Cthe%2520periodic%2520table%2520of%2520elements.&quot; rel=&quot;noopener&quot; role=&quot;link&quot;&gt;&lt;span data-dcnode-id=&quot;215&quot; instrument_node=&quot;&quot;&gt;rote learning&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;213&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;211&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;208&quot;&gt;&lt;strong data-dcnode-id=&quot;209&quot;&gt;&lt;span data-dcnode-id=&quot;210&quot; instrument_node=&quot;&quot;&gt;Teachers can use rote memorization through:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;207&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;197&quot;&gt;&lt;li data-dcnode-id=&quot;205&quot;&gt;&lt;span data-dcnode-id=&quot;206&quot; instrument_node=&quot;&quot;&gt;Flashcards&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;202&quot;&gt;&lt;span data-dcnode-id=&quot;203&quot; instrument_node=&quot;&quot;&gt;Daily repetition&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;199&quot;&gt;&lt;span data-dcnode-id=&quot;200&quot; instrument_node=&quot;&quot;&gt;Choosing a weekly idiom and using it every day in class&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;198&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;h3 data-dcnode-id=&quot;194&quot;&gt;&lt;span data-dcnode-id=&quot;195&quot; id=&quot;3_Role_Play&quot;&gt;&lt;span data-dcnode-id=&quot;196&quot; instrument_node=&quot;&quot;&gt;3. Role Play&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;193&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;188&quot;&gt;&lt;span data-dcnode-id=&quot;192&quot; instrument_node=&quot;&quot;&gt;Role play is well-known to be a &lt;/span&gt;&lt;a data-dcnode-id=&quot;190&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//academypublication.com/issues2/tpls/vol06/02/02.pdf&quot; rel=&quot;noopener&quot; role=&quot;link&quot;&gt;&lt;span data-dcnode-id=&quot;191&quot; instrument_node=&quot;&quot;&gt;highly effective&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;189&quot; instrument_node=&quot;&quot;&gt; way to teach English. It allows people to practice using the language in lifelike situations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;187&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;185&quot;&gt;&lt;span data-dcnode-id=&quot;186&quot; instrument_node=&quot;&quot;&gt;Have your students create a screenplay (or provide one yourself) where the students use as many idioms as possible in a 5-minute role play scenario.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;182&quot;&gt;&lt;span data-dcnode-id=&quot;183&quot; instrument_node=&quot;&quot;&gt;Then, have the students perform their idiom-riddled plays in front of their peers. It will help the actors remember their idioms and the students watching to have more exposure to the phrases.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;181&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;178&quot;&gt;&lt;span data-dcnode-id=&quot;179&quot; id=&quot;Conclusion&quot;&gt;&lt;span data-dcnode-id=&quot;180&quot; instrument_node=&quot;&quot;&gt;Conclusion&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;177&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;175&quot;&gt;&lt;span data-dcnode-id=&quot;176&quot; instrument_node=&quot;&quot;&gt;Idioms are all around us and new ones are being created every day. As our language has evolved, old idioms have also fallen out of use (known as ‘dead idioms’).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;174&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;169&quot;&gt;&lt;span data-dcnode-id=&quot;173&quot; instrument_node=&quot;&quot;&gt;For English learners, idioms can be hard to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;171&quot;&gt;&lt;span data-dcnode-id=&quot;172&quot; instrument_node=&quot;&quot;&gt;get your head around&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;170&quot; instrument_node=&quot;&quot;&gt;. But, once you have mastered an idiom, it can be very exciting. It opens up new and advanced ways to communicate with native English speakers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;168&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;166&quot;&gt;&lt;span data-dcnode-id=&quot;167&quot; instrument_node=&quot;&quot;&gt;For writers, strong knowledge of idioms can help us to express ourselves more clearly and creatively in order to develop engaging storylines.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;165&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;163&quot;&gt;&lt;span data-dcnode-id=&quot;164&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;162&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;161&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;160&quot; instrument_node=&quot;&quot;&gt;
