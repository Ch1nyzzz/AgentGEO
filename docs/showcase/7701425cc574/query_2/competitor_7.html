&lt;/span&gt;&lt;div data-dcnode-id=&quot;275&quot; style=&quot;text-align: justify;&quot;&gt;&lt;b data-dcnode-id=&quot;276&quot;&gt;&lt;span data-dcnode-id=&quot;277&quot; instrument_node=&quot;&quot;&gt;What is&amp;nbsp;Universal Basic Income?&lt;/span&gt;&lt;/b&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;273&quot; style=&quot;text-align: justify;&quot;&gt;&lt;br data-dcnode-id=&quot;274&quot;&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;271&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;272&quot; instrument_node=&quot;&quot;&gt;Universal basic income (UBI), also called unconditional basic income, basic income, citizen's income, citizen's basic income, basic income guarantee, basic living stipend, guaranteed annual income, universal income security program or universal demogrant, is a theoretical governmental public program for a periodic payment delivered to all citizens of a given population without a means test or work requirement. A basic income can be implemented nationally, regionally, or locally. If the level is sufficient to meet a person's basic needs (i.e., at or above the poverty line) it is sometimes called a full basic income; if it is less than that amount, it may be called a partial basic income.&amp;nbsp;&lt;/span&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;269&quot; style=&quot;text-align: justify;&quot;&gt;&lt;br data-dcnode-id=&quot;270&quot;&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;267&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt;Several political discussions are related to the basic income debate, including those regarding automation, artificial intelligence (AI), and the future of work. A key issue in these debates is whether automation and AI will significantly reduce the number of available jobs and whether a basic income could help alleviate such problems, as well as whether a UBI could be a stepping stone to a resource based economy or post scarcity.&amp;nbsp;&lt;/span&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;265&quot; style=&quot;text-align: justify;&quot;&gt;&lt;br data-dcnode-id=&quot;266&quot;&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;262&quot; style=&quot;text-align: justify;&quot;&gt;&lt;b data-dcnode-id=&quot;263&quot;&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt;Philosophy and morality&amp;nbsp;&lt;/span&gt;&lt;/b&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;260&quot; style=&quot;text-align: justify;&quot;&gt;&lt;br data-dcnode-id=&quot;261&quot;&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;258&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;259&quot; instrument_node=&quot;&quot;&gt;By definition, universal basic income does not make a distinction between &quot;deserving&quot; and &quot;undeserving&quot; individuals when making payments. Opponents argue that this lack of discrimination is unfair: &quot;Those who genuinely choose idleness or unproductive activities cannot expect those who have committed to doing productive work to subsidize their livelihood. Responsibility is central to fairness.&quot;Proponents argue that this lack of discrimination is a way to reduce social stigma.&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;257&quot; instrument_node=&quot;&quot;&gt;
