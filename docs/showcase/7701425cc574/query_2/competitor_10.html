&lt;/span&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;461&quot; id=&quot;ezoic-pub-ad-placeholder-143&quot;&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;454&quot; style=&quot;text-indent: 2em; text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;455&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;As per Oxfam’s latest report (2019), 73% of the wealth generated last year went to the richest 1%, while 67 crore Indians who comprise the poorest half of the population saw only 1 % increase in their wealth. It also highlighted that 37% of India’s billionaires have inherited (family) wealth. Apart from this, The Credit Suisse in their 2018 Global Wealth Report of 2018 stated that the richest 10% of Indians own 77.4% of the country’s wealth.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;451&quot; style=&quot;text-indent: 2em; text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;In the past years the gap between rich and poor has increased rapidly in countries, despite expansion of their economies. The IMF and economists over the world view this as a hurdle to the economic growth. Such a billionaire boom indicates an economic failure and promotes inequalities in education and employment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;450&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;447&quot; style=&quot;text-indent: 2em; text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;The Gini coefficient is understood as the major indicator of unequal wealth distribution, which was 35.1 for India in 2011. But this seems unfair in light of the present situation and on account of unavailability of data for current years. The same was much higher for United States or Russia, where inequality is addressed on a larger scale.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;444&quot;&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;443&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;fusion-responsive-typography-calculated&quot; data-dcnode-id=&quot;440&quot; data-fontsize=&quot;18&quot; data-lineheight=&quot;24.3px&quot; style=&quot;text-align: justify; --fontSize:18; line-height: 1.35; --minFontSize:18;&quot;&gt;&lt;b data-dcnode-id=&quot;441&quot;&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;What Is Wealth Inequality?&lt;/span&gt;&lt;/b&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;436&quot; style=&quot;text-indent: 2em; text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;437&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;Wealth inequality constitutes a type of economic inequality. It refers to the unequal distribution of assets among a group of people. Wealth is a stock concept and majorly constitutes the following:&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;435&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;413&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;431&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;432&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;Savings held in commercial bank deposits&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;427&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;428&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;Ownership of shares issued by stock-market listed companies and equity stakes in private businesses&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;423&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;424&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;425&quot; instrument_node=&quot;&quot;&gt;Ownership of property / real estate&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;419&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;420&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;Wealth held in corporate bonds and government bonds&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;415&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;416&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;Wealth tied up in private (occupational) pension schemes and life assurance schemes&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;410&quot;&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;fusion-responsive-typography-calculated&quot; data-dcnode-id=&quot;406&quot; data-fontsize=&quot;18&quot; data-lineheight=&quot;24.3px&quot; style=&quot;text-align: justify; --fontSize:18; line-height: 1.35; --minFontSize:18;&quot;&gt;&lt;b data-dcnode-id=&quot;407&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;Causes for wealth inequality :-&lt;/span&gt;&lt;/b&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;405&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;402&quot; style=&quot;text-indent: 2em; text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;403&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;404&quot; instrument_node=&quot;&quot;&gt;It is true that wealth inequality has existed always irrespective of the design of the society. But the present the extremes are avoidable upto a great extent which is possible only when we understand the causes behind this, some of which are listed below:&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;395&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;397&quot;&gt;&lt;b data-dcnode-id=&quot;398&quot;&gt;&lt;span data-dcnode-id=&quot;399&quot; instrument_node=&quot;&quot;&gt;Tax Evasion:&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;396&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;391&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;392&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;393&quot; instrument_node=&quot;&quot;&gt;High tax rates are a major reason for the gap between rich and poor especially in India. Tax avoidance follows a high tax rate which leads to a parallel economy. In India the unofficial economy is as strong as the official economy. This is turn leads to more and more concentration of income and wealth in few hands.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;384&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;389&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;386&quot;&gt;&lt;b data-dcnode-id=&quot;387&quot;&gt;&lt;span data-dcnode-id=&quot;388&quot; instrument_node=&quot;&quot;&gt;Unemployment:&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;383&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;380&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;381&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;382&quot; instrument_node=&quot;&quot;&gt;Despite the governments continued efforts to generate employment, unemployment and underemployment continue to be a major reason for wealth inequality. This leads to a low labour productivity and ultimately pushes the unemployed and their families below the poverty line.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;373&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;375&quot;&gt;&lt;b data-dcnode-id=&quot;376&quot;&gt;&lt;span data-dcnode-id=&quot;377&quot; instrument_node=&quot;&quot;&gt;Literacy among people:&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;374&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;369&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;370&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt;Variation in levels of education plays an important role in creating inequality among people. An educated individual has the potential to reach higher positions and ultimately earn more as compared to a person is uneducated. As a result of this those who are not able to afford education or choose not too, are at a disadvantaged position as they earn lower salaries.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;362&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;364&quot;&gt;&lt;b data-dcnode-id=&quot;365&quot;&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;Inflation:&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;358&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;359&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt;Inflation is another major reason for the wide gap between rich and poor. During inflation the rising prices are not bagged by sufficient increase in wages. This leads to concentration of profits in few hands while the people with lower wages become losers. Moreover during rise in prices the workers in the organised sector get wages which partly offset the increase in prices but the real income of the informal sector does not rise.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;351&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;353&quot;&gt;&lt;b data-dcnode-id=&quot;354&quot;&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;Regressive Tax Structure:&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;347&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;348&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;349&quot; instrument_node=&quot;&quot;&gt;It is true that the government highly depends on the indirect taxation system. But the system in regressive in nature and exaggerate the already existing financial burden on the common people. Over the years such taxes have created more and inequality.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;346&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;338&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;340&quot;&gt;&lt;b data-dcnode-id=&quot;341&quot;&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;Other reasons&lt;/span&gt;&lt;span data-dcnode-id=&quot;342&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt; like laws of inheritance, corruption and smuggling, cost of professional training and the deteriorated condition of landless workers and marginal farmers have contributed to the increased wealth inequality.&lt;/span&gt;&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;337&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;335&quot;&gt;&lt;span data-dcnode-id=&quot;336&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;fusion-responsive-typography-calculated&quot; data-dcnode-id=&quot;331&quot; data-fontsize=&quot;18&quot; data-lineheight=&quot;24.3px&quot; style=&quot;text-align: justify; --fontSize:18; line-height: 1.35; --minFontSize:18;&quot;&gt;&lt;b data-dcnode-id=&quot;332&quot;&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;What needs to be done :-&lt;/span&gt;&lt;/b&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;327&quot; style=&quot;text-indent: 2em; text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;328&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;The World Economic Forum was concluded in Davos in the last month. How to fight inequality was one of the major areas of discussion. Oxfam’s report states that the top 1 per cent of the world increased their wealth by $762 billion while the bottom 50 per cent saw no growth. Various economists and governments throughout the world have given several solutions for unequal distribution of wealth; some of them are as follows:&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;320&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;325&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;322&quot;&gt;&lt;b data-dcnode-id=&quot;323&quot;&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;Encouraging women to work:&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;319&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;316&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;317&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;318&quot; instrument_node=&quot;&quot;&gt;Women should be encouraged to work as this will not only reduce income inequality but also increase the gross domestic product. As per IMF Chief Christine Lagarde, if women’s participation in the workforce matched men’s, India could grow at 27 per cent per annum. This would mean more family friendly policies like parental leaves, allowing children at work place or other policies that promote more women workers.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;309&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;311&quot;&gt;&lt;b data-dcnode-id=&quot;312&quot;&gt;&lt;span data-dcnode-id=&quot;313&quot; instrument_node=&quot;&quot;&gt;Investing in agriculture:&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;310&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;305&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;306&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;307&quot; instrument_node=&quot;&quot;&gt;A major part of the population earns a living because of agriculture. Thus investing in the agriculture can uplift the poor farmers and reduce much of income inequality. This will include providing farmers with services such as access to seeds, plant nutrients and insurance against risk and loss.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;304&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;302&quot;&gt;&lt;span data-dcnode-id=&quot;303&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;301&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;fusion-responsive-typography-calculated&quot; data-dcnode-id=&quot;298&quot; data-fontsize=&quot;18&quot; data-lineheight=&quot;24.3px&quot; style=&quot;text-align: justify; --fontSize:18; line-height: 1.35; --minFontSize:18;&quot;&gt;&lt;strong data-dcnode-id=&quot;299&quot;&gt;&lt;span data-dcnode-id=&quot;300&quot; instrument_node=&quot;&quot;&gt;Measures introduced by the government&amp;nbsp;:-&lt;/span&gt;&lt;/strong&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;289&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;296&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;291&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;b data-dcnode-id=&quot;294&quot;&gt;&lt;span data-dcnode-id=&quot;295&quot; instrument_node=&quot;&quot;&gt;Introducing Minimum Wages and Universal Basic Income&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;292&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;293&quot; instrument_node=&quot;&quot;&gt;:&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;290&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;285&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;286&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;287&quot; instrument_node=&quot;&quot;&gt;By introducing Minimum Wages and Universal Basic Income, the workers laws can be reformed. This will also help to decrease the gap. UBI and minimum wages for the less fortunate have a similar motive which is to provide a regular income which can help in sustaining the individual and his/her family.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;284&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;278&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;280&quot;&gt;&lt;b data-dcnode-id=&quot;281&quot;&gt;&lt;span data-dcnode-id=&quot;282&quot; instrument_node=&quot;&quot;&gt;Land reforms:&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;279&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;277&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;274&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;275&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;276&quot; instrument_node=&quot;&quot;&gt;In India wealth inequalities are generally due to concentration of agricultural lands in the hands of few landlords. The Zamindari system worsened the situation further. After independence the government enacted various laws to abolish Zamindari system and reduce the inequalities by redistribution of agricultural land. But the results have not been in accordance with the expectations.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;273&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;267&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;269&quot;&gt;&lt;b data-dcnode-id=&quot;270&quot;&gt;&lt;span data-dcnode-id=&quot;271&quot; instrument_node=&quot;&quot;&gt;Monopolies and Restrictive Trade Practices Act&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;266&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;263&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;264&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;265&quot; instrument_node=&quot;&quot;&gt;The Monopolies and Restrictive Trade Practices Act was passed in 1969 to make provisions for the control of monopolies and prohibit restrictive trade practices. Controlling monopolies and abolishing restrictive trade practices was another way to reduce the unequal income gap.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;262&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;256&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;261&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;258&quot;&gt;&lt;b data-dcnode-id=&quot;259&quot;&gt;&lt;span data-dcnode-id=&quot;260&quot; instrument_node=&quot;&quot;&gt;Social Security measures:&lt;/span&gt;&lt;/b&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;257&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;255&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;252&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;253&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;254&quot; instrument_node=&quot;&quot;&gt;The government has introduced various social security measures like Workmen’s Compensation Act, Maternity Benefit Act, Employee’s Provident Fund Act, Employee’s State Insurance Act and various others to uplift the people by providing for their health related benefits.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;251&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;243&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;250&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;245&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;b data-dcnode-id=&quot;248&quot;&gt;&lt;span data-dcnode-id=&quot;249&quot; instrument_node=&quot;&quot;&gt;Other measures&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;246&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;247&quot; instrument_node=&quot;&quot;&gt; undertaken by the government include:&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;244&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;242&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;212&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;241&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;214&quot; style=&quot;list-style-type: none;&quot;&gt;&lt;span data-dcnode-id=&quot;240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;216&quot;&gt;&lt;span data-dcnode-id=&quot;239&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;218&quot; style=&quot;list-style-type: none;&quot;&gt;&lt;span data-dcnode-id=&quot;238&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;220&quot;&gt;&lt;span data-dcnode-id=&quot;237&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;234&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;235&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;236&quot; instrument_node=&quot;&quot;&gt;Poverty alleviation programs&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;233&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;230&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;231&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;232&quot; instrument_node=&quot;&quot;&gt;Redesigning the pricing policies to provide the basic amenities at lower prices to the weaker sections of the society.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;229&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;226&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;227&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;228&quot; instrument_node=&quot;&quot;&gt;Encouraging the small scale industry&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;225&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;222&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;223&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;224&quot; instrument_node=&quot;&quot;&gt;Expansion of the public sector&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;221&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;219&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;215&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;213&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;211&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;fusion-responsive-typography-calculated&quot; data-dcnode-id=&quot;210&quot; data-fontsize=&quot;18&quot; data-lineheight=&quot;24.3px&quot; style=&quot;--fontSize:18; line-height: 1.35; --minFontSize:18;&quot;&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;209&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;fusion-responsive-typography-calculated&quot; data-dcnode-id=&quot;206&quot; data-fontsize=&quot;18&quot; data-lineheight=&quot;24.3px&quot; style=&quot;text-align: justify; --fontSize:18; line-height: 1.35; --minFontSize:18;&quot;&gt;&lt;b data-dcnode-id=&quot;207&quot;&gt;&lt;span data-dcnode-id=&quot;208&quot; instrument_node=&quot;&quot;&gt;Best Practices Worldwide :-&lt;/span&gt;&lt;/b&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;205&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;202&quot; style=&quot;text-indent: 2em; text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;203&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;204&quot; instrument_node=&quot;&quot;&gt;As per the Oxfam’s report South Korea, Georgia and Indonesia were among countries praised for trying to reduce inequality, through policies on social spending, tax and labour rights. The index comprised of 157 countries which were ranked on different parameters including spending on health education and social protection, progressivity of tax policy and labour rights and minimum wages. These parameters were understood as indicators of country’s commitment to reducing inequality.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;183&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;200&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;197&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;198&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;199&quot; instrument_node=&quot;&quot;&gt;South Korea which was 56 on the list was praised for increasing its minimum wage. &lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;196&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;193&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;194&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;195&quot; instrument_node=&quot;&quot;&gt;Georgia which was 49 on the list was praised for boosting it’s spending on education more than any country.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;189&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;190&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;191&quot; instrument_node=&quot;&quot;&gt;Denmark was placed at top due to the progressive taxation system, schemes relating to social spending and worker protection. &lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;188&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;185&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;186&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;187&quot; instrument_node=&quot;&quot;&gt;The top ten countries on the basis of overall CRI (Commitment To Reducing Inequality) index included Denmark, Germany, Finland, Austria, Norway, Belgium, Sweden, France, Iceland and Luxembourg respectively.&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;182&quot; instrument_node=&quot;&quot;&gt;
