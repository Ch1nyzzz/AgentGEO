&lt;/span&gt;&lt;p data-dcnode-id=&quot;1038&quot;&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;Other studies also contradict the idea that UBI and NIT promote divorce. For instance, according to the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1043&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//basicincome.org/news/2017/12/basic-income-guarantee-experiments-1970s-quick-summary-results/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt;Basic Income Earth Network&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;, participants in Canada’s Mincome experiment were less likely to get divorced than nonparticipants. And a 2011 paper published in &lt;/span&gt;&lt;a data-dcnode-id=&quot;1040&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.jstor.org/stable/41487857%3Fseq%3D1%23page_scan_tab_contents&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;Population Research and Policy Review&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt; found that the EITC had no impact on divorce rates.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1035&quot;&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;5. It Could Reduce Wages&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1032&quot;&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;Supporters of universal basic income hope that giving everyone a minimum income will reduce poverty and inequality. However, some opponents believe that UBI could actually make these problems worse.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1023&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;Critics claim that if UBI gives workers enough money to live on, employers will be able to get away with paying them less than a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1028&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/living-wage/&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;living wage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;. It’s already happening to some extent in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1025&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/popular-side-gigs-make-extra-money/&quot;&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;gig economy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;, where many workers accept low wages because they have other sources of income.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1020&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;However, proponents believe UBI would have the opposite effect. Since workers would have enough income to survive on, they would have much less incentive to keep a job that wasn’t worth their while. That means that unrewarding jobs, such as cleaning public restrooms, would have to pay much more to attract workers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1014&quot;&gt;&lt;span data-dcnode-id=&quot;1018&quot; instrument_node=&quot;&quot;&gt;So far, there haven’t been any studies on a large enough scale to show which view is closer to the truth. However, even if there is a risk that UBI could depress wages, the government could counter this effect by &lt;/span&gt;&lt;a data-dcnode-id=&quot;1016&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/raise-minimum-wage/&quot;&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;raising the minimum wage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1015&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1011&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;6. It’s Inefficient&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1008&quot;&gt;&lt;span data-dcnode-id=&quot;1009&quot; instrument_node=&quot;&quot;&gt;Opponents also claim that universal basic income is an inefficient way to help people in need. Current social welfare programs direct aid to the people with the lowest incomes, those who need it most. By contrast, a true UBI program (one that is really universal with no income limits) would give money to everyone, rich and poor alike.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1005&quot;&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;If the U.S. took all the money it currently spends on aid programs and divided it up among the entire population, the poorest Americans would receive much less aid than they do now. It would effectively be taking money from the poor and giving it to the rich and middle class. A UBI program designed this way could easily make poverty and inequality worse rather than better.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1004&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1002&quot;&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;UBI could still help struggling Americans if it were an add-on to existing social programs rather than a replacement for them. However, that would make the program much more expensive, and it wouldn’t erase the stigma associated with receiving government aid.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;999&quot;&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;Alternatively, the U.S. could replace its existing programs with an even more generous UBI that would pay more than the poorest Americans receive in benefits today. But that would cost even more than the first option. Instead of providing, say, $12,000 per year in UBI to everyone plus $15,000 in aid to low-income Americans only, it would need to give everyone at least $15,000.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;996&quot;&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;7. It Could Trigger Inflation&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;993&quot;&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;While some opponents say universal basic income could depress wages, others argue the opposite. They say UBI will encourage more people to quit their jobs, creating a “tighter” labor market with more available jobs, which would drive up wages.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;992&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;987&quot;&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;That sounds like a good thing for low-income workers, but there’s a catch. Critics argue that rising wages and the influx of extra cash from UBI will trigger &lt;/span&gt;&lt;a data-dcnode-id=&quot;989&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/what-is-inflation-definition-causes-inflation-rate/&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;inflation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt; on a massive scale. Both UBI and higher wages will put more money into the hands of people farther down the income scale, who are more likely to spend it than save it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;984&quot;&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;As a result, there will be much more money in circulation. Each dollar will be worth far less, and the cost of living will skyrocket. As a result, workers will end up no better off — or possibly even worse off — than they would have been without UBI.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;981&quot;&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;There are two problems with this argument. First, one of the reasons many people are proposing UBI right now is the fear that new machines are about to replace a large number of jobs. If the number of available jobs and the number of available workers decline simultaneously, the labor market will be no tighter than it was before.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;975&quot;&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;Second, current inflation rates are quite low by historical standards. According to the &lt;/span&gt;&lt;a data-dcnode-id=&quot;977&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.minneapolisfed.org/community/financial-and-economic-education/cpi-calculator-information/consumer-price-index-and-inflation-rates-1913&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;Federal Reserve Bank of Minneapolis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;, inflation rates since 2009 have mostly hovered between 1.5% and 2.5%, never jumping higher than 3.2%. So if rising incomes drove up inflation to the levels seen in the prosperous 1980s and 1990s, it still wouldn’t be out of control.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;966&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;So far, there is little evidence to either support or contradict the idea that long-term UBI will lead to inflation. The Alaska Permanent Fund has not triggered inflation in the state. In fact, a chart compiled by UBI advocate &lt;/span&gt;&lt;a data-dcnode-id=&quot;971&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.scottsantens.com/consumer-price-index-of-alaska-vs-u-s-before-and-after-existence-of-alaskan-dividend&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;Scott Santens&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt; shows that the &lt;/span&gt;&lt;a data-dcnode-id=&quot;968&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/consumer-price-index-cpi-inflation/&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;Consumer Price Index&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt; is rising at a slower rate in Alaska than in the U.S. as a whole. However, the Permanent Fund’s yearly payout is quite small, so it isn’t likely to move prices as much as a more generous UBI program, such as Yang’s.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;963&quot;&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;8. It’s Too Expensive&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;957&quot;&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;The most common and compelling argument against UBI is that it’s simply too expensive. The government canceled the basic income trial in Ontario early due to what it called “&lt;/span&gt;&lt;a data-dcnode-id=&quot;959&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//news.ontario.ca/en/release/49980/ontarios-government-for-the-people-announces-compassionate-wind-down-of-basic-income-research-projec&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;an extraordinary cost for Ontario taxpayers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;,” and that program covered only 4,000 people.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;951&quot;&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt;For a national program, the costs would be an even bigger hurdle. In her memoir “&lt;/span&gt;&lt;a data-dcnode-id=&quot;953&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//smile.amazon.com/What-Happened-Hillary-Rodham-Clinton-ebook/dp/B01MYE7QP0/ref%3Dsr_1_1%3Fie%3DUTF8%26qid%3D1505230622%26sr%3D8-1%26keywords%3Dwhat%2Bhappened&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt;What Happened&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;,” Hillary Clinton reveals that she wanted to propose a UBI plan when she ran for president in 2016. However, her team just “couldn’t make the numbers work.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;950&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;939&quot;&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt;A true universal basic income plan would cost the government trillions of dollars each year. In her book “&lt;/span&gt;&lt;a data-dcnode-id=&quot;947&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//aax-us-east.amazon-adsystem.com/x/c/QihF320V99B6BMcaXtTIaywAAAFsBckNOgEAAAFKAWvP3ag/https%3A//www.amazon.com/dp/1524758760/%3FcreativeASIN%3D1524758760%26linkCode%3Dw61%26imprToken%3DmAMkQCfJZ936Ai7MTAH6sQ%26slotNum%3D1%26tag%3Dthneyo0f-20&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;Give People Money&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;” (excerpted on &lt;/span&gt;&lt;a data-dcnode-id=&quot;944&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//medium.com/s/free-money/what-a-1-000-a-month-universal-basic-income-would-look-like-e278e11a16e0&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;945&quot; instrument_node=&quot;&quot;&gt;Medium&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;), journalist Annie Lowrey estimates that a $1,000-per-month UBI would cost roughly $3.9 trillion per year. Two economists at the &lt;/span&gt;&lt;a data-dcnode-id=&quot;941&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//gspp.berkeley.edu/assets/uploads/research/pdf/Hoynes-Rothstein-UBI-081518.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;University of California Berkeley&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt; say Yang’s Freedom Dividend would cost about $3 trillion.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;933&quot;&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;By comparison, the entire federal budget in 2019 &lt;/span&gt;&lt;a data-dcnode-id=&quot;935&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cbpp.org/research/federal-budget/policy-basics-where-do-our-federal-tax-dollars-go&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;came to $4.4 trillion&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;. Thus, funding a UBI program entirely with income taxes would require the total amount of tax collected to increase by anywhere from 68% to 88%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;930&quot;&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;As Lowrey points out, that isn’t impossible. It would simply “bring the United States’ tax burden in line with that of the European social democracies.” But it certainly wouldn’t be an easy plan to sell to taxpayers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;927&quot;&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;UBI proponents have proposed a variety of ways to cover all or part of this cost.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;924&quot;&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;Replacing Other Aid Programs&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;921&quot;&gt;&lt;span data-dcnode-id=&quot;922&quot; instrument_node=&quot;&quot;&gt;Since UBI would reduce the need for other forms of government aid, the government could recoup some of the cost by dropping these other programs. The Berkeley economists calculate the total cost of current government aid programs at $2.34 trillion, enough to pay for most of the Freedom Dividend.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;920&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;918&quot;&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;However, they also argue that a $1,000-per-month UBI wouldn’t come close to replacing the value of current benefits for senior citizens, including Social Security, Medicare, and Medicaid. Keeping those three aid programs while dropping the others would result in a savings of only $588 billion, leaving more than $2.4 trillion to be paid for with new taxes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;915&quot;&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;Taxing the Wealthy&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;909&quot;&gt;&lt;span data-dcnode-id=&quot;913&quot; instrument_node=&quot;&quot;&gt;In his book “&lt;/span&gt;&lt;a data-dcnode-id=&quot;911&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.amazon.com/dp/1250196590/%3FcreativeASIN%3D1250196590%26linkCode%3Dw61%26imprToken%3DmAMkQCfJZ936Ai7MTAH6sQ%26slotNum%3D6%26tag%3Dthneyo0f-20&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;Fair Shot: Rethinking Inequality and How We Earn&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;910&quot; instrument_node=&quot;&quot;&gt;,” Facebook co-founder Chris Hughes argues that the fairest way to pay for UBI is to raise taxes on the wealthiest Americans. Hughes claims that taxing those who make over $250,000 per year could raise $290 billion, enough to pay for a modest UBI of $500 per month to low-income working adults.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;903&quot;&gt;&lt;span data-dcnode-id=&quot;907&quot; instrument_node=&quot;&quot;&gt;Yang also proposed some taxes on the wealthy to cover part of the cost of the Freedom Dividend. These included removing the cap on earnings currently subject to Social Security payroll tax, raising the &lt;/span&gt;&lt;a data-dcnode-id=&quot;905&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/reduce-avoid-capital-gains-tax-property-investments/&quot;&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;capital gains tax&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;904&quot; instrument_node=&quot;&quot;&gt;, and creating a new tax on financial transactions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;902&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;900&quot;&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;Value-Added Tax&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;894&quot;&gt;&lt;span data-dcnode-id=&quot;898&quot; instrument_node=&quot;&quot;&gt;Yang proposed to fund the Freedom Dividend primarily through a new &lt;/span&gt;&lt;a data-dcnode-id=&quot;896&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/us-adopt-value-added-tax-vat/&quot;&gt;&lt;span data-dcnode-id=&quot;897&quot; instrument_node=&quot;&quot;&gt;value-added tax&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;, or VAT, a tax on all goods and services a business produces. Yang claimed a VAT of 10% would raise $800 billion per year.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;893&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;888&quot;&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt;Speaking with &lt;/span&gt;&lt;a data-dcnode-id=&quot;890&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cnbc.com/2018/04/11/andrew-yang-wants-to-run-for-president-promising-free-cash-handouts.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;CNBC Make It&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;889&quot; instrument_node=&quot;&quot;&gt;, Eric Toder of the Tax Policy Center confirms that such a VAT could raise anywhere from $500 billion to $1 trillion, depending on how broadly it was applied. However, businesses would undoubtedly pass the cost of VAT on to consumers. That would raise the cost of living, reducing the benefit of the extra income UBI would provide.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;885&quot;&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;Carbon Tax&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;876&quot;&gt;&lt;span data-dcnode-id=&quot;883&quot; instrument_node=&quot;&quot;&gt;Another idea Yang suggested to help cover the cost of UBI is a &lt;/span&gt;&lt;a data-dcnode-id=&quot;881&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/carbon-co2-emissions-tax/&quot;&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;carbon tax&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;, a tax on the burning of fossil fuels based on their &lt;/span&gt;&lt;a data-dcnode-id=&quot;878&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/carbon-footprint-definition-calculate-reduce/&quot;&gt;&lt;span data-dcnode-id=&quot;879&quot; instrument_node=&quot;&quot;&gt;carbon footprint&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;. It would have the added benefit of discouraging fossil fuel use and fighting global warming. However, Yang hasn’t offered any specifics on how much money this tax could raise.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;873&quot;&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt;Deficit Spending&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;867&quot;&gt;&lt;span data-dcnode-id=&quot;871&quot; instrument_node=&quot;&quot;&gt;In her book, Lowrey offers various suggestions to fund UBI, including a higher top tax bracket, a VAT, a carbon tax, or a “modest wealth tax,” a tax based on &lt;/span&gt;&lt;a data-dcnode-id=&quot;869&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/calculate-personal-net-worth/&quot;&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;net worth&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt; rather than annual income. However, she also questions “whether a UBI needs to be ‘paid for’ at all.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;864&quot;&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;Lowrey argues that the government has financed lots of expensive endeavors by adding to the federal debt, and the economy hasn’t suffered as a result. Examples include the Bush tax cuts and the wars in Afghanistan and Iraq. Thus, she believes that if some portion of the UBI needs to come from deficit spending, it’s no cause for concern.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr class=&quot;wp-block-separator&quot; data-dcnode-id=&quot;862&quot;&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;859&quot; id=&quot;chances-of-passing-universal-basic-income&quot;&gt;&lt;span data-dcnode-id=&quot;860&quot; instrument_node=&quot;&quot;&gt;Chances of Passing Universal Basic Income&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;850&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;Universal basic income isn’t universally popular with Americans, but support for it is growing fast. A &lt;/span&gt;&lt;a data-dcnode-id=&quot;855&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//news.gallup.com/poll/228194/public-split-basic-income-workers-replaced-robots.aspx%3Fg_source%3Dlink_NEWSV9%26amp&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;2018 Gallup poll&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt; found that nearly half of Americans say they would support providing a minimum income for workers who have lost their jobs to automation. According to &lt;/span&gt;&lt;a data-dcnode-id=&quot;852&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cnbc.com/2018/02/26/roughly-half-of-americans-now-support-universal-basic-income.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;CNBC&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;, that number has jumped sharply from the 12% who said they would support UBI 10 years ago.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;847&quot;&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;However, support for UBI isn’t uniform across the political spectrum. In the Gallup poll, 65% of Democrats expressed support for it, but 72% of Republicans were opposed. Independents were split roughly 50-50.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;838&quot;&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;The same split appears among politicians. So far, the only ones who have come out in favor of UBI are extremely liberal Democrats. Some conservatives, such as Sens. &lt;/span&gt;&lt;a data-dcnode-id=&quot;843&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rubio.senate.gov/public/index.cfm/2014/1/rubio-delivers-address-on-50th-anniversary-of-the-war-on-poverty&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;Marco Rubio&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt; of Florida and &lt;/span&gt;&lt;a data-dcnode-id=&quot;840&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.lee.senate.gov/public/index.cfm/2013/11/bring-them-in&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;841&quot; instrument_node=&quot;&quot;&gt;Mike Lee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt; of Utah, have argued in favor of streamlining government aid by combining many programs into one. But none of them wants to make these benefits universal. Instead, they typically favor making the work requirements for aid recipients stricter than they are now.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;835&quot;&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;NIT vs. UBI&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;832&quot;&gt;&lt;span data-dcnode-id=&quot;833&quot; instrument_node=&quot;&quot;&gt;Steadfast Republican opposition makes it unlikely the U.S. will have a universal basic income plan in the foreseeable future. However, it could be possible for Democrats and Republicans to compromise on a negative income tax plan.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;829&quot;&gt;&lt;span data-dcnode-id=&quot;830&quot; instrument_node=&quot;&quot;&gt;NIT has many of the same benefits as UBI, battling poverty while reducing red tape, with fewer of the drawbacks. Unlike UBI, NIT gives extra money to only the people who need it the most. It would do more to fight inequality than a truly universal basic income, which would go to everyone regardless of their other income.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;823&quot;&gt;&lt;span data-dcnode-id=&quot;827&quot; instrument_node=&quot;&quot;&gt;Because NIT wouldn’t go to everyone, it might not reduce stigma as effectively as a true UBI. However, there’s less stigma attached to receiving a &lt;/span&gt;&lt;a data-dcnode-id=&quot;825&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/what-is-tax-credit-tax-deduction/&quot;&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;tax credit&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt; than to collecting a welfare check.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;817&quot;&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;For one thing, tax credits are largely invisible. You can’t tell who is collecting them without looking at their tax returns. Also, as Lowrey notes in an interview with &lt;/span&gt;&lt;a data-dcnode-id=&quot;819&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//slate.com/news-and-politics/2018/07/annie-lowrey-on-her-new-book-give-people-money-and-how-ubi-could-work-in-the-u-s.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;Slate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;818&quot; instrument_node=&quot;&quot;&gt;, people are less likely to think of tax perks as “government benefits” than programs such as Temporary Aid to Needy Families (TANF) or food stamps, even if they have the same effect.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;811&quot;&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;NIT would also be much cheaper than UBI. A 2015 article published in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;813&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tandfonline.com/doi/abs/10.1080/10875549.2014.991889&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;Journal of Poverty&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt; concluded that the U.S. could eliminate poverty through a negative income tax that paid $0.50 for every dollar by which a family’s earnings fell below 200% of the poverty line.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;808&quot;&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;Under this plan, a family with no earnings would receive just enough to bring it up to the poverty line. For every dollar earned, the family’s NIT would shrink by $0.50. At twice the poverty line, it would receive nothing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;802&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;In a &lt;/span&gt;&lt;a data-dcnode-id=&quot;804&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.vox.com/policy-and-politics/2017/5/30/15712160/basic-income-oecd-aei-replace-welfare-state&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;Vox&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt; article about the study, the authors estimate that the government could fund such a program with $219 billion in 2007 dollars (about $273 billion in 2020 dollars). Not only is that many times lower than the $3 trillion needed for a true UBI program, but it’s also roughly the same amount the U.S. already spends on aid programs like the EITC, SSI, SNAP, TANF, school lunches, and subsidized housing. So in theory, it would be possible to replace these welfare programs with an NIT that would do more to fight poverty without adding a cent to the federal budget.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;799&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;All these distinctions make NIT much more popular with the right than UBI. In the 1960s, it had the support of the highly conservative Nixon and the right-leaning economist Friedman. The NIT’s potential to reduce the size of government bureaucracy, something most conservatives dislike, should give it a similar appeal for Republicans today.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;796&quot;&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot;&quot;&gt;In fact, as Lowrey notes in her Slate interview, Republicans have already shown support for one NIT program. The EITC, which is basically a modest NIT, enjoys broad support from the right as well as the left.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;793&quot;&gt;&lt;span data-dcnode-id=&quot;794&quot; instrument_node=&quot;&quot;&gt;Other Alternatives to UBI&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;790&quot;&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;NIT isn’t the only way to get some of the benefits of UBI at a lower cost. Another is a universal child benefit, an annual payment to every family in the U.S. for each child in their household. This benefit would go to every household with children, regardless of income or whether the adults in the family work. There would be no limits on how the family spends the money.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;781&quot;&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;Canada and 11 European countries &lt;/span&gt;&lt;a data-dcnode-id=&quot;786&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.jstor.org/stable/pdf/10.7758/rsf.2018.4.2.02.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;already offer universal child benefits&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;. All these countries have much lower rates of child poverty than the U.S., and these benefits are clearly part of the reason. A 2010 report published by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;783&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.fcd-us.org/tackling-child-poverty-and-improving-child-well-being-lessons-from-britain/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;Foundation for Child Development&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt; found that when Britain created its child allowance in 1999, it cut child poverty rates by more than half within 10 years.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;772&quot;&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt;Many conservative politicians likely to oppose UBI would probably support child allowances based on their proven power to fight child poverty. In fact, the U.S. already has a &lt;/span&gt;&lt;a data-dcnode-id=&quot;777&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/parents-tax-deductions-credits-children/&quot;&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;child tax credit&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;, albeit with income limits, and it’s popular on both sides of the aisle. According to the &lt;/span&gt;&lt;a data-dcnode-id=&quot;774&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cbpp.org/research/federal-tax/policy-basics-the-child-tax-credit&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;CBPP&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;, the U.S. first passed this credit in 1997 and expanded it in 2001 “with bipartisan support.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;763&quot;&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;When Rubio and Lee proposed another expansion in 2017, it &lt;/span&gt;&lt;a data-dcnode-id=&quot;768&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rollcall.com/2017/11/30/house-conservatives-deal-blow-to-rubio-lee-child-tax-credit-proposal/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;attracted support from both sides of the aisle&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;, but it didn’t make it into that year’s tax reform bill. However, a temporary expansion to the credit made it through Congress in 2021 as part of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;765&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/get-emergency-financial-assistance-help-bills/&quot;&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;second coronavirus relief package&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt;. Sen. Cory Booker and other Democrats are now working to make this expansion permanent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;760&quot;&gt;&lt;span data-dcnode-id=&quot;761&quot; instrument_node=&quot;&quot;&gt;Another possibility is a carbon dividend. A carbon dividend is essentially a carbon tax with all the revenue returned to the citizens through an annual payment, much like the Alaska Permanent Fund’s dividends. This payment would compensate families for the added fuel costs a carbon tax could bring, and it could also become a cash benefit for low-income households.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;751&quot;&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;Carbon dividend bills in Congress have included the &lt;/span&gt;&lt;a data-dcnode-id=&quot;756&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.congress.gov/bill/116th-congress/house-bill/763&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;Energy Innovation and Carbon Dividend Act&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt; in the House and the &lt;/span&gt;&lt;a data-dcnode-id=&quot;753&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.congress.gov/bill/116th-congress/senate-bill/2284/cosponsors%3FsearchResultViewType%3Dexpanded&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;Climate Action Rebate Act&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt; in the Senate. However, so far, none of these bills has made it out of committee.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;745&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;A carbon dividend would likely be harder to sell to Republicans than a child allowance. According to a &lt;/span&gt;&lt;a data-dcnode-id=&quot;747&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pewresearch.org/fact-tank/2020/04/16/u-s-concern-about-climate-change-is-rising-but-mainly-among-democrats/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;2020 Pew poll&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;, only 30% of Republicans consider global warming an urgent problem.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr class=&quot;wp-block-separator&quot; data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;740&quot; id=&quot;final-word&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;Final Word&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;737&quot;&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;Providing a universal basic income across the entire United States would be an incredibly ambitious project. It would cost a massive amount of money by any measure, and it would face stiff opposition from across the political spectrum.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;734&quot;&gt;&lt;span data-dcnode-id=&quot;735&quot; instrument_node=&quot;&quot;&gt;Many Republicans would object that it discourages work, damaging the economy and depriving individuals of self-worth. Many Democrats would be concerned about the risk that it could depress wages or redistribute tax dollars away from those who can least afford it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;731&quot;&gt;&lt;span data-dcnode-id=&quot;732&quot; instrument_node=&quot;&quot;&gt;A less extreme plan, such as a negative income tax or universal child benefit, has a much better chance of passage. These policies could provide many of the same benefits as a universal basic income, such as reduced poverty and streamlined government bureaucracy, at a much more reasonable cost.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;jp-relatedposts&quot; data-dcnode-id=&quot;728&quot; id=&quot;jp-relatedposts&quot;&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;727&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;

ot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//t.sharethis.com/a/t_.htm%3Fver%3D1.906.23338%26cid%3Dc010%26cls%3DB%23arguments-against-universal-basic-income&quot;&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;Arguments Against Universal Basic Income&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;701&quot;&gt;&lt;a class=&quot;kb-table-of-contents__entry&quot; data-dcnode-id=&quot;702&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//t.sharethis.com/a/t_.htm%3Fver%3D1.906.23338%26cid%3Dc010%26cls%3DB%23chances-of-passing-universal-basic-income&quot;&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;Chances of Passing Universal Basic Income&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;698&quot;&gt;&lt;a class=&quot;kb-table-of-contents__entry&quot; data-dcnode-id=&quot;699&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//t.sharethis.com/a/t_.htm%3Fver%3D1.906.23338%26cid%3Dc010%26cls%3DB%23final-word&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;Final Word&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/nav&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;&quot; data-dcnode-id=&quot;688&quot; id=&quot;right-side-content-sidebar&quot; style=&quot;display: none;&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;mc-top-advert&quot; data-dcnode-id=&quot;663&quot;&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mc-top-advert-image&quot; data-dcnode-id=&quot;681&quot; style=&quot;padding-bottom:5px;&quot;&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img data-dcnode-id=&quot;683&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2019/10/masterworks-logo.png&amp;amp;raw&quot; width=&quot;175px&quot;&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;
