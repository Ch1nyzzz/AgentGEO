&lt;/span&gt;&lt;p data-dcnode-id=&quot;1576&quot;&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;Have you ever wished you could afford to quit your job? Maybe you’d take the opportunity to start that small business you’ve always dreamed about. Maybe you’d go back to school and get a college degree or go to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1578&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/is-grad-school-worth-it/&quot;&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;graduate school&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt;. Or maybe you’d keep working — but at a different job, where you’d earn less and enjoy the work much more.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1570&quot;&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;Public figures like American politicians and tech billionaires would like to help you achieve those dreams. They’re discussing a radical new type of government benefit program called &lt;/span&gt;&lt;a data-dcnode-id=&quot;1572&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/universal-basic-income-history/&quot;&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt;universal basic income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt; (UBI), which would give every single American adult a payment each month with no strings attached. But can it really work in the United States?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1569&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1567&quot; id=&quot;ubi-proposals-in-america&quot;&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;UBI Proposals in America&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1566&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1564&quot;&gt;&lt;span data-dcnode-id=&quot;1565&quot; instrument_node=&quot;&quot;&gt;The idea behind universal basic income is simple. The government sends a payment to everyone in a given group — for instance, every American adult — with no strings attached. These payments can take the place of existing government benefits, such as Social Security, or be an add-on to them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1563&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1558&quot;&gt;&lt;span data-dcnode-id=&quot;1562&quot; instrument_node=&quot;&quot;&gt;An idea closely related to universal basic income is negative income tax, or NIT. This plan creates a set of new &lt;/span&gt;&lt;a data-dcnode-id=&quot;1560&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/calculate-federal-income-tax-brackets-rate-tables/&quot;&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;tax brackets&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt; for people with incomes below a certain level. Instead of paying taxes, people in these brackets get money back from the government.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;money-content&quot; data-dcnode-id=&quot;1547&quot; id=&quot;money-1869728037&quot;&gt;&lt;div data-dcnode-id=&quot;1548&quot; style=&quot;border:1px solid #CACACA; padding:20px; margin-bottom:20px;&quot;&gt;&lt;img data-dcnode-id=&quot;1557&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/wp-content/uploads/2019/02/the-motley-fool-logo-300x82.png&amp;amp;raw&quot; width=&quot;125px&quot;&gt;&lt;br data-dcnode-id=&quot;1556&quot;&gt;&lt;span data-dcnode-id=&quot;1549&quot; style=&quot;font-size:15px; line-height:160%;&quot;&gt;&lt;span data-dcnode-id=&quot;1555&quot; instrument_node=&quot;&quot;&gt;Motley Fool Stock Advisor recommendations have an &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;average return of 618%&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt;. For $79 (or just $1.52 per week), join more than 1 million members and don't miss their upcoming stock picks. 30 day money-back guarantee. &lt;/span&gt;&lt;a data-dcnode-id=&quot;1550&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/go/motley-fool-stock-advisor/incontent&quot; rel=&quot;nofollow&quot; style=&quot;text-decoration:underline;&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;Sign Up Now&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1541&quot;&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;The U.S. already has a minimal form of NIT in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1543&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/earned-income-tax-credit-eitc-requirements/&quot;&gt;&lt;span data-dcnode-id=&quot;1544&quot; instrument_node=&quot;&quot;&gt;earned income tax credit&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt; (EITC). However, this credit isn’t available to everybody, and it doesn’t provide nearly enough to live on.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1532&quot;&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt;In the United States, UBI and NIT have attracted attention across the political spectrum. Both conservative political thinkers like &lt;/span&gt;&lt;a data-dcnode-id=&quot;1537&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.amazon.com/dp/1442260718/%3FcreativeASIN%3D1442260718%26linkCode%3Dw61%26imprToken%3DmAMkQCfJZ936Ai7MTAH6sQ%26slotNum%3D4%26tag%3Dthneyo0f-20&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;Charles Murray&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt; and liberals like 2020 Democratic presidential candidate &lt;/span&gt;&lt;a data-dcnode-id=&quot;1534&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.amazon.com/dp/0316414247/%3FcreativeASIN%3D0316414247%26linkCode%3Dw61%26imprToken%3DmAMkQCfJZ936Ai7MTAH6sQ%26slotNum%3D5%26tag%3Dthneyo0f-20&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt;Andrew Yang&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt; have published books on the subject.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1529&quot;&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;In recent years, interest in this idea has surged across many parts of society. For example:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1505&quot;&gt;&lt;li data-dcnode-id=&quot;1523&quot;&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;According to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1525&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cnbc.com/2019/06/27/free-cash-handouts-what-is-universal-basic-income-or-ubi.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt;CNBC’s Make It&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1524&quot; instrument_node=&quot;&quot;&gt;, Google searches on the topic multiplied 50-fold between 2015 and 2019.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1518&quot;&gt;&lt;span data-dcnode-id=&quot;1522&quot; instrument_node=&quot;&quot;&gt;During his 2020 presidential campaign, Yang proposed a large-scale UBI program called the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1520&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//2020.yang2020.com/policies/the-freedom-dividend/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt;Freedom Dividend&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1519&quot; instrument_node=&quot;&quot;&gt;, which would pay $1,000 per month to every U.S. citizen over 18.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1516&quot;&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;Billionaire businesspeople, including Elon Musk, Mark Zuckerberg, and Richard Branson, have suggested the U.S. will need a basic income program in the future.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1514&quot;&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;Several politicians on the left, including Bernie Sanders and Alexandria Ocasio-Cortez, have expressed support for UBI as a concept.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1506&quot;&gt;&lt;span data-dcnode-id=&quot;1513&quot; instrument_node=&quot;&quot;&gt;In December 2020, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1511&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.businessinsider.com/andrew-yang-joe-biden-universal-basic-income-humanity-forward-administration-2020-12&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;Business Insider&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1510&quot; instrument_node=&quot;&quot;&gt; reported that then-President-elect Joe Biden had spoken with Yang’s nonprofit, Humanity Forward, about the possibility of making regular cash transfers to all Americans as part of a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1508&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/coronavirus-covid-19-financial-resources/&quot;&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;coronavirus relief program&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1507&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1499&quot;&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;There’s already one UBI program in the U.S., but it’s a very limited one. In 1982, Alaska started the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1501&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//pfd.alaska.gov/Payments/Tax-Information&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;Alaska Permanent Fund&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;, which gives all residents a yearly dividend from the state’s oil revenues. In 2020, this payment came to $992. That’s enough to provide some help with the bills, but it’s not really a minimum income.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1498&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1493&quot;&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;With nearly 80% of Americans today &lt;/span&gt;&lt;a data-dcnode-id=&quot;1495&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/stop-living-paycheck-to-paycheck/&quot;&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt;living paycheck to paycheck&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt;, the idea of a free monthly bonus has new appeal. The question is whether such a program can really work in America. There are many reasons UBI could have substantial positive impacts on society as a whole. But equally powerful arguments suggest it would be harmful, inefficient, or at least impractical.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1492&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr class=&quot;wp-block-separator&quot; data-dcnode-id=&quot;1491&quot;&gt;&lt;span data-dcnode-id=&quot;1490&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1488&quot; id=&quot;arguments-for-universal-basic-income&quot;&gt;&lt;span data-dcnode-id=&quot;1489&quot; instrument_node=&quot;&quot;&gt;Arguments for Universal Basic Income&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1485&quot;&gt;&lt;span data-dcnode-id=&quot;1486&quot; instrument_node=&quot;&quot;&gt;The basic idea behind most UBI programs is that they should pay just enough for people to survive on but not live comfortably. That way, people still have an incentive to work for more money. In good times, the monthly check gives them a little extra cash to spend on luxuries or save for a rainy day. In hard times, it ensures no one has to starve on the streets.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1484&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1482&quot;&gt;&lt;span data-dcnode-id=&quot;1483&quot; instrument_node=&quot;&quot;&gt;According to proponents, the concept has some clear advantages. It’s a simple way to fight poverty — far less complicated than the vast array of social programs we have in America today. It can also reduce financial stress and improve health for cash-strapped families.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1481&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1479&quot;&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt;On top of that, UBI can protect workers against the shocks of a changing economy. Some people argue that it could even provide a boost to the economy as a whole if done right. And there’s plenty of evidence to back these ideas up.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1478&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1476&quot;&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;1. It Combats Poverty&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1475&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1473&quot;&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;The most basic argument in favor of universal basic income is that it has the power to eliminate poverty in the U.S. instantly and completely. If you give everybody enough money to survive, then by definition, no one will live below a subsistence level.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1472&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1470&quot;&gt;&lt;span data-dcnode-id=&quot;1471&quot; instrument_node=&quot;&quot;&gt;UBI has undoubtedly shown the ability to reduce poverty in other countries. The very first basic income program, the Berkshire Bread Act of 1795, drastically reduced infant mortality among the poor in rural England.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1469&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1458&quot;&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt;More recently, trial programs around the world — including one by the nonprofit &lt;/span&gt;&lt;a data-dcnode-id=&quot;1466&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.givedirectly.org/research-at-give-directly/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1467&quot; instrument_node=&quot;&quot;&gt;GiveDirectly&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1465&quot; instrument_node=&quot;&quot;&gt; in rural Kenya, one by &lt;/span&gt;&lt;a data-dcnode-id=&quot;1463&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//sewabharat.org/sewas-pioneering-studies-on-basic-income-show-transformative-results/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;SEWA Bharat&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1462&quot; instrument_node=&quot;&quot;&gt; in India, and one by &lt;/span&gt;&lt;a data-dcnode-id=&quot;1460&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.poverty-action.org/study/enterprises-ultra-poor-women-after-war-wings-program-northern-uganda&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1461&quot; instrument_node=&quot;&quot;&gt;Innovations for Poverty Action&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1459&quot; instrument_node=&quot;&quot;&gt; in Uganda — have found that cash payments greatly improved people’s standards of living. Recipients ate better, had better health, and invested in new resources that helped them work and earn more.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1457&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1455&quot;&gt;&lt;span data-dcnode-id=&quot;1456&quot; instrument_node=&quot;&quot;&gt;Of course, all these UBI recipients were much worse off to start than most Americans. In the U.S., even the poorest of the poor generally have access to indoor plumbing and free schools. However, trials have also shown that UBI and its close cousin, NIT, can improve the lives of low-income people, even in wealthier nations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1418&quot;&gt;&lt;li data-dcnode-id=&quot;1447&quot;&gt;&lt;strong data-dcnode-id=&quot;1452&quot;&gt;&lt;span data-dcnode-id=&quot;1453&quot; instrument_node=&quot;&quot;&gt;Nixon-Era U.S.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1451&quot; instrument_node=&quot;&quot;&gt; In the late 1960s and early 1970s, the Nixon administration conducted NIT trials in communities across the U.S. Although initial results looked disappointing, an &lt;/span&gt;&lt;a data-dcnode-id=&quot;1449&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//econpapers.repec.org/article/fipfedbne/y_3a1987_3ai_3amay_3ap_3a32-45.htm&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1450&quot; instrument_node=&quot;&quot;&gt;analysis of the program&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1448&quot; instrument_node=&quot;&quot;&gt; years later found that it actually helped recipients a lot. Their household assets grew, and their children were better nourished and stayed in school longer.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1440&quot;&gt;&lt;strong data-dcnode-id=&quot;1445&quot;&gt;&lt;span data-dcnode-id=&quot;1446&quot; instrument_node=&quot;&quot;&gt;Present-Day U.S. &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1444&quot; instrument_node=&quot;&quot;&gt;A 2016 paper from the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1442&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//iseralaska.org/static/legacy_publication_links/2016_12-PFDandPoverty.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1443&quot; instrument_node=&quot;&quot;&gt;Institute of Social and Economic Research&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1441&quot; instrument_node=&quot;&quot;&gt; at the University of Alaska Anchorage calculated that the small dividends from the Alaska Permanent Fund had a real impact on state poverty rates. Without them, about 25% more people would have fallen below the poverty threshold between 2011 and 2015.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1433&quot;&gt;&lt;strong data-dcnode-id=&quot;1438&quot;&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;1970s Canada&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1437&quot; instrument_node=&quot;&quot;&gt;. In the 1970s, Canada conducted a pilot program called Mincome (a portmanteau of “minimum income”) in Manitoba. In a 2011 paper published in the journal &lt;/span&gt;&lt;a data-dcnode-id=&quot;1435&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/227387994_The_Town_with_No_Poverty_The_Health_Effects_of_a_Canadian_Guaranteed_Annual_Income_Field_Experiment&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1436&quot; instrument_node=&quot;&quot;&gt;Canadian Public Policy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt;, economist Evelyn Forget found that the program improved participants’ physical and mental health and increased the chances teens would stay in school through grade 12.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1426&quot;&gt;&lt;strong data-dcnode-id=&quot;1431&quot;&gt;&lt;span data-dcnode-id=&quot;1432&quot; instrument_node=&quot;&quot;&gt;Present-Day Canada&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt;. From 2017 through 2018, the province of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1428&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ontario.ca/page/ontario-basic-income-pilot&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1429&quot; instrument_node=&quot;&quot;&gt;Ontario&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt; conducted a basic income trial in three towns. An analysis of the experiment by the Basic Income Canada Network showed that recipients increased their savings, decreased their debt, and improved their physical, mental, and social health.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1419&quot;&gt;&lt;strong data-dcnode-id=&quot;1424&quot;&gt;&lt;span data-dcnode-id=&quot;1425&quot; instrument_node=&quot;&quot;&gt;Finland&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1423&quot; instrument_node=&quot;&quot;&gt;. Around the same time, a trial in Finland awarded a monthly stipend of 560 euros (about US$638) to 2,000 randomly selected unemployed people. The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1421&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.kela.fi/web/en/news-archive/-/asset_publisher/lN08GY2nIrZo/content/results-of-the-basic-income-experiment-small-employment-effects-better-perceived-economic-security-and-mental-wellbeing&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1422&quot; instrument_node=&quot;&quot;&gt;results of the study&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1420&quot; instrument_node=&quot;&quot;&gt; show that the recipients were much better off than nonrecipients — financially, physically, and mentally.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1417&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1415&quot;&gt;&lt;span data-dcnode-id=&quot;1416&quot; instrument_node=&quot;&quot;&gt;2. It Reduces Red Tape&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1397&quot;&gt;&lt;span data-dcnode-id=&quot;1413&quot; instrument_node=&quot;&quot;&gt;Of course, UBI isn’t the only way to provide aid to the poor. Right now, the U.S. has hundreds of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1411&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.benefits.gov/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;benefits programs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1410&quot; instrument_node=&quot;&quot;&gt; run by the federal government and state governments. These include &lt;/span&gt;&lt;a data-dcnode-id=&quot;1408&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/subsidized-housing-government-rental-assistance-programs/&quot;&gt;&lt;span data-dcnode-id=&quot;1409&quot; instrument_node=&quot;&quot;&gt;subsidized housing programs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1405&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/help-heating-costs-liheap-eligibility-benefits/&quot;&gt;&lt;span data-dcnode-id=&quot;1406&quot; instrument_node=&quot;&quot;&gt;home heating aid&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt;, health care programs like &lt;/span&gt;&lt;a data-dcnode-id=&quot;1402&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/what-is-medicaid/&quot;&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;Medicaid,&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt; and the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1399&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/get-food-stamps-snap-eligibility/&quot;&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt;Supplemental Nutrition Assistance Program&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt; (SNAP, the new name for food stamps).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1394&quot;&gt;&lt;span data-dcnode-id=&quot;1395&quot; instrument_node=&quot;&quot;&gt;But getting aid through these programs can be quite an undertaking. The mere fact that there are so many different programs makes it hard for people to find the benefits they need. On top of that, each program has strict eligibility limits. They can require proof of income, age, location, family size, and employment. Many benefits are unavailable to the unemployed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1391&quot;&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;With all these requirements, just figuring out which programs you can use, applying for them all, and collecting the money can be a job in itself. And once you manage to get your benefits, the government often places limits on how you can spend the money.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1385&quot;&gt;&lt;span data-dcnode-id=&quot;1389&quot; instrument_node=&quot;&quot;&gt;For instance, the Special Supplemental Nutrition Program for Women, Infants, and Children, or &lt;/span&gt;&lt;a data-dcnode-id=&quot;1387&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/wic-program-eligibility-requirements/&quot;&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;WIC&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt;, provides food aid to new mothers and mothers-to-be. But recipients can only use it for specific foods the government has deemed best for meeting their nutritional needs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1384&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1379&quot;&gt;&lt;span data-dcnode-id=&quot;1383&quot; instrument_node=&quot;&quot;&gt;In these ways, our current benefits system places a high burden on recipients. Economist Milton Friedman made this point in a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1381&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/watch%3Fv%3DxtpgkX588nM&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;1968 TV interview&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1380&quot; instrument_node=&quot;&quot;&gt;. As he put it, the current system forces applicants to jump through lots of bureaucratic hoops to receive lots of different benefits. By contrast, an NIT plan would help them by simply “giving them money, which is what they need.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1373&quot;&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;Red tape isn’t just inconvenient for recipients. It’s also costly. A 2012 analysis by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1375&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cbpp.org/research/romneys-charge-that-most-federal-low-income-spending-goes-for-overhead-and-bureaucrats-is&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;Center on Budget and Policy Priorities&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1374&quot; instrument_node=&quot;&quot;&gt; (CBPP) shows that up to 10% of all federal aid spending goes toward administrative costs. A UBI program with no requirements would mean much less paperwork, allowing nearly all the money collected to go directly to recipients.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1370&quot;&gt;&lt;span data-dcnode-id=&quot;1371&quot; instrument_node=&quot;&quot;&gt;3. It Reduces Stigma&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1364&quot;&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;Another problem with the current benefits system is that there’s a certain social stigma attached to taking government “handouts.” Many Americans think of low-income people who receive benefits like SNAP as lazy, dishonest, or morally weak. However, these views generally don’t apply only to aid that’s available to everyone, such as tax breaks or &lt;/span&gt;&lt;a data-dcnode-id=&quot;1366&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/maximize-social-security-benefits/&quot;&gt;&lt;span data-dcnode-id=&quot;1367&quot; instrument_node=&quot;&quot;&gt;Social Security&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1361&quot;&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;Because of that, many people who could qualify for benefits never apply. Some feel ashamed of having to accept aid, and others worry about facing hostile treatment from aid workers who see them as unworthy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1349&quot;&gt;&lt;span data-dcnode-id=&quot;1359&quot; instrument_node=&quot;&quot;&gt;For instance, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1357&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cbpp.org/snap-tracks-changes-in-share-of-population-that-is-poor-or-near-poor-13&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1358&quot; instrument_node=&quot;&quot;&gt;CBPP&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1356&quot; instrument_node=&quot;&quot;&gt; reports that in 2016, about 18% of Americans qualified for SNAP benefits, but only about 14% of Americans took part in the program. A 2016 study from the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1354&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//carsey.unh.edu/publication/half-wic-families-receive-benefits&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;University of New Hampshire&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt; shows that fewer than half of all families eligible for WIC benefits receive them. And a 2004 paper published in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1351&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.jstor.org/stable/3326264%3Fmag%3Dthe-health-threats-of-welfare-stigma%26seq%3D1%23metadata_info_tab_contents&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;Journal of Policy Analysis and Management&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1350&quot; instrument_node=&quot;&quot;&gt; found that stigma substantially reduced people’s use of both welfare and Medicaid benefits, even when their financial need was high.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1348&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1343&quot;&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;Even when the stigma isn’t enough to deter people from taking benefits, it can still be harmful. For instance, psychologist Keith Payne writes in his book “&lt;/span&gt;&lt;a data-dcnode-id=&quot;1345&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.amazon.com/gp/product/0525429816/ref%3Das_li_qf_asin_il_tl%3Fie%3DUTF8%26tag%3Dmonecras-20%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3D0525429816%26linkId%3Dbbbfdb6a5063943d080cad77481c7cc1&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt;The Broken Ladder&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;” about the time he realized the free lunches he’d been getting at school were a benefit his classmates didn’t have. He became embarrassed about his appearance and almost stopped talking in school.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1342&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1337&quot;&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;President Richard Nixon made a similar point in proposing a guaranteed income plan, known as the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1339&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/watch%3Fv%3D6vHYFzYvCak%26feature%3Dyoutu.be&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1340&quot; instrument_node=&quot;&quot;&gt;Family Assistance Plan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;, in 1969. In his words, the current welfare system “robs recipients of dignity.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1334&quot;&gt;&lt;span data-dcnode-id=&quot;1335&quot; instrument_node=&quot;&quot;&gt;Universal basic income has the potential to be a form of stigma-free government aid. Because the money would go to all Americans equally, nobody could be considered inferior for needing or accepting it. However, if UBI is only an add-on to existing welfare programs, it won’t eliminate the social stigma attached to other forms of government aid.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1333&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1331&quot;&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;One way around this would be to craft a program that provides income only to people below certain income limits. That could be done through NIT or by phasing out payments for high earners. However, it wouldn’t be a truly universal basic income program, so it might not eliminate stigma completely.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1328&quot;&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;4. It Could Reduce Inequality&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1322&quot;&gt;&lt;span data-dcnode-id=&quot;1326&quot; instrument_node=&quot;&quot;&gt;In addition to reducing poverty, some argue that universal basic income could fight &lt;/span&gt;&lt;a data-dcnode-id=&quot;1324&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/income-inequality-america-definition-causes/&quot;&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt;income inequality&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;. The safety net UBI provides would make it easier for people at the low end of the income scale to make choices that help them get ahead. For example, they could pursue a college degree that would boost their future earnings instead of starting work at a young age.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1316&quot;&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;In Zuckerberg’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;1318&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cnbc.com/2017/12/27/what-billionaires-say-about-universal-basic-income-in-2017.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;2017 Harvard commencement address&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1317&quot; instrument_node=&quot;&quot;&gt;, he pointed out that he was only able to start Facebook because of the financial safety net his well-to-do family provided. If he had needed to work instead of having time to code, he said, he “wouldn’t be standing here today.” He argues that a UBI program would give everyone “a cushion to try new things.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1313&quot;&gt;&lt;span data-dcnode-id=&quot;1314&quot; instrument_node=&quot;&quot;&gt;At this time, there’s little evidence either for or against the idea that UBI can help reduce inequality. Income inequality is a large-scale problem, and most UBI experiments have been too limited in scope to impact it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1304&quot;&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;The only modern UBI program to affect a large group of people is the Alaska Permanent Fund. A 2018 analysis by career information and job search site &lt;/span&gt;&lt;a data-dcnode-id=&quot;1309&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.zippia.com/advice/states-highest-lowest-income-inequality/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt;Zippia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1308&quot; instrument_node=&quot;&quot;&gt; shows that Alaska has lower levels of income inequality than any other U.S. state. Moreover, according to calculations from &lt;/span&gt;&lt;a data-dcnode-id=&quot;1306&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.bloomberg.com/news/articles/2014-05-12/mapping-three-decades-of-rising-income-inequality-state-by-state&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;Bloomberg CityLab&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt;, Alaska is one of only four U.S. states where inequality has not risen by at least 10% since 1979.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1301&quot;&gt;&lt;span data-dcnode-id=&quot;1302&quot; instrument_node=&quot;&quot;&gt;5. It Protects &amp;amp; Empowers Workers&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1295&quot;&gt;&lt;span data-dcnode-id=&quot;1299&quot; instrument_node=&quot;&quot;&gt;One reason so many people are talking about universal basic income right now is the fear of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1297&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/robots-automation-technology-replacing-jobs/&quot;&gt;&lt;span data-dcnode-id=&quot;1298&quot; instrument_node=&quot;&quot;&gt;automation replacing jobs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1296&quot; instrument_node=&quot;&quot;&gt; or reducing wages.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1294&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1286&quot;&gt;&lt;span data-dcnode-id=&quot;1293&quot; instrument_node=&quot;&quot;&gt;In a 2016 interview with &lt;/span&gt;&lt;a data-dcnode-id=&quot;1291&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cnbc.com/2016/11/04/elon-musk-robots-will-take-your-jobs-government-will-have-to-pay-your-wage.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;CNBC Make It&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;, Musk argued that the U.S. would need some form of UBI in the future to support all the workers displaced by new technology. Yang cites this concern in his Freedom Dividend proposal, referencing predictions that “a third of all working Americans will lose their job to automation in the next 12 years.” And &lt;/span&gt;&lt;a data-dcnode-id=&quot;1288&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//freakonomics.com/podcast/mincome/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1289&quot; instrument_node=&quot;&quot;&gt;Sam Altman&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1287&quot; instrument_node=&quot;&quot;&gt;, president of the venture capital company Y Combinator, funded a UBI experiment to see if it could smooth over the disruption he believes technology will bring to the economy over the next few decades.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1285&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1280&quot;&gt;&lt;span data-dcnode-id=&quot;1284&quot; instrument_node=&quot;&quot;&gt;Some experts argue there’s little reason to believe new technology will create widespread unemployment. For instance, investor and tech pioneer Marc Andreessen told &lt;/span&gt;&lt;a data-dcnode-id=&quot;1282&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/watch%3Fv%3DF63zWfQwqzI%26feature%3Dyoutu.be&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1283&quot; instrument_node=&quot;&quot;&gt;Recode &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1281&quot; instrument_node=&quot;&quot;&gt;in 2017 that this “recurring panic” about machines taking away people’s jobs pops up “every 25 or 50 years,” and so far, it has never happened.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1277&quot;&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt;Some economists call this the “Luddite fallacy” or “lump of labor fallacy”: the erroneous idea that there are only so many jobs to go around, and when you give jobs to machines, you automatically have fewer jobs for humans. They argue that in the long run, technological progress creates more new jobs than it destroys.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1271&quot;&gt;&lt;span data-dcnode-id=&quot;1275&quot; instrument_node=&quot;&quot;&gt;Other economists say this view is flawed. Investor &lt;/span&gt;&lt;a data-dcnode-id=&quot;1273&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//continuations.com/post/100669288675/lump-of-labor-certainly-a-red-herring-and&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1274&quot; instrument_node=&quot;&quot;&gt;Albert Wenger&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1272&quot; instrument_node=&quot;&quot;&gt; writes that even if you assume automation creates new jobs in the long term, it still puts many people out of work in the short term.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1270&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1265&quot;&gt;&lt;span data-dcnode-id=&quot;1269&quot; instrument_node=&quot;&quot;&gt;And even in the long run, the new jobs created by advancing technology may not pay as well as the old ones. As economist Paul Krugman notes in his &lt;/span&gt;&lt;a data-dcnode-id=&quot;1267&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nytimes.com/2013/06/14/opinion/krugman-sympathy-for-the-luddites.html%3F_r%3D0&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1268&quot; instrument_node=&quot;&quot;&gt;New York Times&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt; column, most of the new wealth created by the modern, high-tech economy goes to wealthier, more educated workers, while unskilled workers fall behind.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1264&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1262&quot;&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;Both Wenger and Krugman conclude that UBI is the best way to help these unskilled or low-skilled workers. It could provide:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1261&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1223&quot;&gt;&lt;li data-dcnode-id=&quot;1254&quot;&gt;&lt;strong data-dcnode-id=&quot;1259&quot;&gt;&lt;span data-dcnode-id=&quot;1260&quot; instrument_node=&quot;&quot;&gt;A Safety Net&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;. At the very least, UBI could ensure that people without jobs, or those struggling to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1256&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/living-on-minimum-wage-possible/&quot;&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt;live on minimum wage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1255&quot; instrument_node=&quot;&quot;&gt;, would have enough income to survive. It could help displaced workers get by while they retrain for the jobs created by advancing technology.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1247&quot;&gt;&lt;strong data-dcnode-id=&quot;1252&quot;&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;More Job Choice&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1251&quot; instrument_node=&quot;&quot;&gt;. Having this safety net to fall back on could free workers from &lt;/span&gt;&lt;a data-dcnode-id=&quot;1249&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/10-reasons-why-you-are-still-at-the-job-you-hate/&quot;&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt;jobs they hate&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;. With more economic security, a worker with a grueling job or an abusive boss would be able to quit without having to worry about how they’ll survive until they find another job.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1237&quot;&gt;&lt;strong data-dcnode-id=&quot;1245&quot;&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt;More Bargaining Power&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1244&quot; instrument_node=&quot;&quot;&gt;. If workers no longer have to take any job to survive, they have more power to &lt;/span&gt;&lt;a data-dcnode-id=&quot;1242&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/negotiate-salary-job-benefits/&quot;&gt;&lt;span data-dcnode-id=&quot;1243&quot; instrument_node=&quot;&quot;&gt;bargain with employers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt; for higher wages or better benefits. If they don’t get what they want, they could simply walk off the job and live on their UBI. That could give workers back some of the leverage they’ve lost with the decline of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1239&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/labor-unions-united-states/&quot;&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;labor unions&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1238&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;1224&quot;&gt;&lt;strong data-dcnode-id=&quot;1235&quot;&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;A Chance to Pursue Other Opportunities&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1234&quot; instrument_node=&quot;&quot;&gt;. UBI could give unskilled workers a chance to quit their low-paying jobs and pursue other opportunities. They could go back to school or invest more time in job hunting, as many workers in the Ontario UBI experiment did. They could also afford to take a risk on a new business venture, such as &lt;/span&gt;&lt;a data-dcnode-id=&quot;1232&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/become-freelancer-types-work/&quot;&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt;freelancing&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;, or trade in their jobs for unpaid work, such as &lt;/span&gt;&lt;a data-dcnode-id=&quot;1229&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/reasons-volunteer-time-work-free/&quot;&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;volunteering for a good cause&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1228&quot; instrument_node=&quot;&quot;&gt; or being a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1226&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/stay-at-home-vs-working-mom/&quot;&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt;stay-at-home parent&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1220&quot;&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;6. It Could Improve the Economy&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1214&quot;&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;Perhaps the most surprising argument in favor of universal basic income appears in a 2017 report by the left-leaning &lt;/span&gt;&lt;a data-dcnode-id=&quot;1216&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//rooseveltinstitute.org/modeling-macroeconomic-effects-ubi/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1217&quot; instrument_node=&quot;&quot;&gt;Roosevelt Institute&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;. It used an economic model called the Levy model to project how three different UBI plans would affect the economy as a whole: paying $1,000 per month to every adult, $500 per month to every adult, or $250 per month to every child.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1211&quot;&gt;&lt;span data-dcnode-id=&quot;1212&quot; instrument_node=&quot;&quot;&gt;The report found that if the government funded any of these UBI programs by adding to the federal debt, the economy would grow dramatically as a result. The most generous program, $1,000 per month to every adult, would expand the economy by about 12.56%, or $2.5 trillion, by 2025. It would also add 4.6 million new jobs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1210&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1208&quot;&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt;If the government paid for the UBI program by raising taxes, the benefit to the economy would be much less. In fact, according to the basic Levy model, there would be no benefit at all since tax increases would eat up the extra money people gained from UBI.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1205&quot;&gt;&lt;span data-dcnode-id=&quot;1206&quot; instrument_node=&quot;&quot;&gt;However, when the authors adjusted the model to account for the fact that UBI would put more money in the hands of lower-income people, who are more likely to spend it, they found that the economy would still see a boost, even with a tax-funded program. Under these circumstances, they predicted, the economy would grow by $515 billion and add about 1.1 million jobs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1196&quot;&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;These findings are controversial. A &lt;/span&gt;&lt;a data-dcnode-id=&quot;1201&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.vox.com/policy-and-politics/2017/8/30/16220134/universal-basic-income-roosevelt-institute-economic-growth&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1202&quot; instrument_node=&quot;&quot;&gt;Vox&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt; article about the report notes that the Levy model relies on “notably rosy assumptions” about how taxes, spending, and deficits affect the economy. For instance, it assumes that even though the economy wasn’t in a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1198&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/prepare-next-recession/&quot;&gt;&lt;span data-dcnode-id=&quot;1199&quot; instrument_node=&quot;&quot;&gt;recession&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1197&quot; instrument_node=&quot;&quot;&gt; in 2017, it still suffered from low consumer demand. In other words, Americans weren’t buying enough stuff. Thus, giving people — especially low-income people — more money would stimulate the economy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1195&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;However, many other economic models suggest that a UBI program funded by debt would hurt the economy, not help it. For instance, according to the Penn Wharton model commonly used by nonpartisan groups, any significant increase in deficit spending would drive up interest rates, hurting American consumers and businesses.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr class=&quot;wp-block-separator&quot; data-dcnode-id=&quot;1191&quot;&gt;&lt;span data-dcnode-id=&quot;1190&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1188&quot; id=&quot;arguments-against-universal-basic-income&quot;&gt;&lt;span data-dcnode-id=&quot;1189&quot; instrument_node=&quot;&quot;&gt;Arguments Against Universal Basic Income&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1187&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1185&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;The most common argument against universal basic income is that it gives money to the wrong people. Liberals say it puts extra income in the hands of millionaires who don’t need it. By contrast, conservatives say that it hands money to drug addicts and criminals who won’t use it responsibly. But there are many other less glaring objections.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1182&quot;&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt;1. It Discourages Productive Work&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1181&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1179&quot;&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;Ever since the days of the Berkshire Bread Act, critics have argued that a guaranteed income encourages laziness. If you give people money for doing nothing, they argue, they have no incentive to engage in productive work, and the economy suffers as a result. But the evidence doesn’t seem to support that fear.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1178&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;1176&quot;&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;Evidence About UBI &amp;amp; Work&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1175&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1173&quot;&gt;&lt;span data-dcnode-id=&quot;1174&quot; instrument_node=&quot;&quot;&gt;Experiments with universal basic income to date don’t offer much evidence to support this viewpoint. In Kenya and India, people who received UBI earned more money, not less. In Finland, the unemployed workers who received UBI didn’t work significantly more than their peers who got nothing, but they certainly didn’t work less.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1167&quot;&gt;&lt;span data-dcnode-id=&quot;1171&quot; instrument_node=&quot;&quot;&gt;A few experiments found that UBI recipients reduced their work hours somewhat, but mostly in ways that helped society. For instance, in the Mincome experiment, most of the decline in work hours came from people taking more &lt;/span&gt;&lt;a data-dcnode-id=&quot;1169&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/maternity-leave-length-pay-insurance/&quot;&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;time off after having a baby&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1168&quot; instrument_node=&quot;&quot;&gt; and from boys staying in school longer before starting work. The American NIT experiments had similar results.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1161&quot;&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;Some economists say these findings aren’t reliable because all these UBI experiments lasted only a limited time. A 2016 &lt;/span&gt;&lt;a data-dcnode-id=&quot;1163&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.economist.com/leaders/2016/06/04/basically-flawed&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;Economist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1162&quot; instrument_node=&quot;&quot;&gt; editorial argues that with a long-term UBI, “the stigma against leaving the workforce would surely erode,” leading more and more people to quit their jobs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1155&quot;&gt;&lt;span data-dcnode-id=&quot;1159&quot; instrument_node=&quot;&quot;&gt;A &lt;/span&gt;&lt;a data-dcnode-id=&quot;1157&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.givedirectly.org/ubi-study/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;longer-term UBI study&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1156&quot; instrument_node=&quot;&quot;&gt; that GiveDirectly is currently running in Kenya will provide some evidence about whether UBI reduces employment over the long haul. However, there’s already one piece of evidence that suggests it doesn’t.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1149&quot;&gt;&lt;span data-dcnode-id=&quot;1153&quot; instrument_node=&quot;&quot;&gt;In 2018, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1151&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//papers.ssrn.com/sol3/papers.cfm%3Fabstract_id%3D3192299&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1152&quot; instrument_node=&quot;&quot;&gt;National Bureau of Economic Research&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1150&quot; instrument_node=&quot;&quot;&gt; published a paper on the Alaska Permanent Fund’s effects. It found that over the past 35 years, the fund’s annual dividend has had no effect on full-time employment in Alaska. Part-time employment has actually increased slightly.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1148&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;1146&quot;&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt;The Current Welfare System &amp;amp; Work&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1145&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1143&quot;&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;There’s another flaw in the argument that universal basic income would reduce employment: For some people, the current welfare system already discourages work.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1142&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1131&quot;&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt;For example, according to the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1139&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ssa.gov/policy/index.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;Social Security Administration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;, close to 10 million Americans are currently on &lt;/span&gt;&lt;a data-dcnode-id=&quot;1136&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/apply-social-security-disability-benefits-requirements/&quot;&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;disability benefits&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;. About 8 million more receive &lt;/span&gt;&lt;a data-dcnode-id=&quot;1133&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.moneycrashers.com/supplemental-security-income/&quot;&gt;&lt;span data-dcnode-id=&quot;1134&quot; instrument_node=&quot;&quot;&gt;Supplemental Security Income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1132&quot; instrument_node=&quot;&quot;&gt; (SSI). These people aren’t allowed to earn more than a certain amount of money from work, or they lose their benefits — not just in part, but entirely.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1130&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1125&quot;&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;According to a 2013 story from &lt;/span&gt;&lt;a data-dcnode-id=&quot;1127&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//apps.npr.org/unfit-for-work/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt;NPR&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1126&quot; instrument_node=&quot;&quot;&gt;, many people on disability or SSI can do some kind of work. However, their limited skills don’t qualify them for any job they can handle physically. So instead of investing in expensive job training, they go on disability and stay on it for the rest of their lives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1122&quot;&gt;&lt;span data-dcnode-id=&quot;1123&quot; instrument_node=&quot;&quot;&gt;If a UBI program took the place of SSI and disability, all these people would be free to work as much as their conditions allow without losing their current income. Rather than discouraging work, UBI would be the thing that makes it possible.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1121&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1119&quot;&gt;&lt;span data-dcnode-id=&quot;1120&quot; instrument_node=&quot;&quot;&gt;2. It Reduces Self-Worth&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1118&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1116&quot;&gt;&lt;span data-dcnode-id=&quot;1117&quot; instrument_node=&quot;&quot;&gt;Altman argues that even if UBI does discourage some people from working, the economy won’t necessarily suffer as a result. Even if 90% of people use UBI to “go smoke pot and play video games,” he claims, the economy could still come out ahead if the other 10% “go create new products and services and new wealth.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1115&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1113&quot;&gt;&lt;span data-dcnode-id=&quot;1114&quot; instrument_node=&quot;&quot;&gt;However, this argument overlooks the fact that the benefits of work aren’t strictly financial. For instance, many economists argue that work adds meaning and purpose to people’s lives in a way that collecting a UBI check can’t.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1101&quot;&gt;&lt;span data-dcnode-id=&quot;1111&quot; instrument_node=&quot;&quot;&gt;For instance, work can give people a sense of accomplishment. It also provides them with valuable social connections and support. Economists who make this case include Erik Brynjolfsson of MIT in a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1109&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//freakonomics.com/podcast/mincome/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt;Freakonomics&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt; interview, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1106&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/lhsummers/status/999621263663554561&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1107&quot; instrument_node=&quot;&quot;&gt;Lawrence Summers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1105&quot; instrument_node=&quot;&quot;&gt; of Harvard, and Nobel laureate Joseph Stiglitz in a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1103&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cnbc.com/2019/06/27/free-cash-handouts-what-is-universal-basic-income-or-ubi.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1104&quot; instrument_node=&quot;&quot;&gt;CNBC Make It&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt; interview.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1098&quot;&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;The Economist’s editors believe that replacing work with UBI would drive people into “alienated idleness.” If people no longer need to work to survive, they will leave the workforce and lose the sense of purpose that a job provides. Although this has not happened in UBI experiments such as Mincome, the editors claim people would drift away from paid work over the long term.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1092&quot;&gt;&lt;span data-dcnode-id=&quot;1096&quot; instrument_node=&quot;&quot;&gt;Polls of American workers provide somewhat mixed support for this argument. According to a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1094&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//news.gallup.com/opinion/chairman/212045/world-broken-workplace.aspx%3Fg_source%3Dposition1%26g_medium%3Drelated%26g_campaign%3Dtiles&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt;2017 Gallup poll&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1093&quot; instrument_node=&quot;&quot;&gt;, only 30% of U.S. workers and 15% of workers worldwide say they feel “engaged” at work. Clearly, people who hate their jobs don’t get much benefit from them beyond the paycheck. UBI could allow them to pursue something else they’d enjoy more.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1091&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1086&quot;&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;However, a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1088&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cnbc.com/2019/04/01/85percent-of-us-workers-are-happy-with-their-jobs-national-survey-shows.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1089&quot; instrument_node=&quot;&quot;&gt;2019 CNBC survey&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt; found entirely different results. It showed that about 85% of American workers like their jobs, and the main reason was the “meaning” they get from them. Workers also said they feel in control at work and valued by their co-workers. That indicates that most American workers get significant mental, emotional, and social benefits from their job.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1083&quot;&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;But when it comes to financial benefits, the story doesn’t look quite as good. On average, workers in the CNBC poll gave their jobs only 13 points out of 20 for pay and 11 points out of 20 for advancement opportunities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1080&quot;&gt;&lt;span data-dcnode-id=&quot;1081&quot; instrument_node=&quot;&quot;&gt;That seems to suggest that many workers would be more satisfied with their jobs if they didn’t have to rely on them for their only source of income. UBI could make these people more likely to keep their jobs for the nonmaterial benefits they provide rather than quitting in search of a new job that pays more.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1077&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;Also, paid work is not the only kind of work that can provide these benefits. Economist Forget points out in Freakonomics that wealthy “gentlemen of leisure” made many of the great scientific and cultural breakthroughs of the 18th and 19th centuries. The fact that these people didn’t need to work for a living gave them free time to pursue other interests and make important contributions to society. In the same way, Forget argues, many Americans could likely find meaning in types of work other than a 9-to-5 job.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1074&quot;&gt;&lt;span data-dcnode-id=&quot;1075&quot; instrument_node=&quot;&quot;&gt;3. It Encourages Irresponsible Spending&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1071&quot;&gt;&lt;span data-dcnode-id=&quot;1072&quot; instrument_node=&quot;&quot;&gt;Some people believe that it’s foolish to put more money into people’s hands without first making sure they will spend it responsibly. They argue that instead of putting UBI funds to productive uses, such as education or paying down debt, many people will simply waste the money on drugs, alcohol, or luxury goods.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1068&quot;&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt;But UBI experiments to date don’t support this view. In Kenya, India, and Uganda, the people who received cash invested it in ways that improved their lives and their incomes. Spending on drugs and alcohol did not increase, and crime often decreased. Likewise, in the Nixon-era NIT experiments, families receiving extra income did not spend significantly more on luxury goods.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1065&quot;&gt;&lt;span data-dcnode-id=&quot;1066&quot; instrument_node=&quot;&quot;&gt;4. It Could Damage Families&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1062&quot;&gt;&lt;span data-dcnode-id=&quot;1063&quot; instrument_node=&quot;&quot;&gt;One of the goals of Nixon’s Family Assistance Plan was to keep families together. The idea was that if a married couple could get more money from negative income tax than a divorced or separated mother would get from welfare, couples would have more incentive to stay together.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1061&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1056&quot;&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;A &lt;/span&gt;&lt;a data-dcnode-id=&quot;1058&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.journals.uchicago.edu/doi/pdfplus/10.1086/226463&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;1977 study&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt; of the NIT program found that it seemed to have the opposite effect. Based on the data, it appeared that the divorce rate was 40% to 60% higher for couples receiving NIT. This finding led Sen. Daniel Patrick Moynihan, who had been one of the strongest advocates for guaranteed income, to withdraw his support for the idea.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1047&quot;&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;However, later analysis suggests that the original study was flawed. When economist Glen Cain re-crunched the numbers in a &lt;/span&gt;&lt;a data-dcnode-id=&quot;1052&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ideas.repec.org/a/fip/fedbcp/y1986p60-105n30.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;1986 paper&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1051&quot; instrument_node=&quot;&quot;&gt;, he found that the actual increase in divorce rates was much lower, between 15% and 30%. And a 1990 analysis by Cain and Douglas A. Wissoker published in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1049&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.journals.uchicago.edu/doi/abs/10.1086/229428&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;American Journal of Sociology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt; concluded that the NIT did not impact divorce rates at all.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;
