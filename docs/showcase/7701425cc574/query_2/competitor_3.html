mp;quot;}&quot; data-image-title=&quot;blockchain-keywords&quot; data-large-file=&quot;https://i0.wp.com/icoshock.com/wp-content/uploads/2020/07/blockchain-keywords-e1596055879223.png?fit=700%2C525&amp;amp;ssl=1&quot; data-medium-file=&quot;https://i0.wp.com/icoshock.com/wp-content/uploads/2020/07/blockchain-keywords-e1596055879223.png?fit=300%2C225&amp;amp;ssl=1&quot; data-orig-file=&quot;https://i0.wp.com/icoshock.com/wp-content/uploads/2020/07/blockchain-keywords-e1596055879223.png?fit=700%2C525&amp;amp;ssl=1&quot; data-orig-size=&quot;700,525&quot; data-permalink=&quot;https://icoshock.com/bitcoin-ubi-how-crypto-could-help-pay-universal-basic-income/blockchain-keywords/&quot; height=&quot;525&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i0.wp.com/icoshock.com/wp-content/uploads/2020/07/blockchain-keywords-e1596055879223.png%3Ffit%3D700%252C525%26ssl%3D1&amp;amp;raw&quot; width=&quot;700&quot;&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;col-lg-9 col-md-9 col-mod-single col-mod-main&quot; data-dcnode-id=&quot;375&quot;&gt;&lt;div class=&quot;row&quot; data-dcnode-id=&quot;376&quot;&gt;&lt;div class=&quot;col-lg-2 col-md-2 col-sm-2 hidden-xs herald-left&quot; data-dcnode-id=&quot;627&quot;&gt;&lt;div class=&quot;entry-meta-wrapper&quot; data-dcnode-id=&quot;628&quot;&gt;&lt;div class=&quot;meta-ad&quot; data-dcnode-id=&quot;629&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;col-lg-10 col-md-10 col-sm-10&quot; data-dcnode-id=&quot;502&quot;&gt;&lt;header class=&quot;entry-header&quot; data-dcnode-id=&quot;609&quot;&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;meta-category&quot; data-dcnode-id=&quot;623&quot;&gt;&lt;a class=&quot;herald-cat-67&quot; data-dcnode-id=&quot;624&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//icoshock.com/category/news/&quot;&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;News&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;h1 class=&quot;entry-title h1&quot; data-dcnode-id=&quot;621&quot;&gt;&lt;span data-dcnode-id=&quot;622&quot; instrument_node=&quot;&quot;&gt;Bitcoin UBI: How Crypto Could Help Pay Universal Basic Income&lt;/span&gt;&lt;/h1&gt;&lt;div class=&quot;entry-meta entry-meta-single&quot; data-dcnode-id=&quot;610&quot;&gt;&lt;div class=&quot;meta-item herald-date&quot; data-dcnode-id=&quot;618&quot;&gt;&lt;span class=&quot;updated&quot; data-dcnode-id=&quot;619&quot;&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;July 29, 2020&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;meta-item herald-author&quot; data-dcnode-id=&quot;613&quot;&gt;&lt;span class=&quot;vcard author&quot; data-dcnode-id=&quot;614&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;615&quot;&gt;&lt;a data-dcnode-id=&quot;616&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//icoshock.com/author/blake-anderson/&quot;&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;Blake Anderson&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;meta-item herald-rtime&quot; data-dcnode-id=&quot;611&quot;&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt;4 Min Read&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/header&gt;&lt;div class=&quot;entry-content herald-entry-content&quot; data-dcnode-id=&quot;503&quot;&gt;&lt;p data-dcnode-id=&quot;607&quot;&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;In the wake of COVID-19, many have been left destitute, relying on a government that isn’t poised to help quickly.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;602&quot;&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;Few day traders of bitcoin rarely think about the power of the tokens they’re dealing in. Instead, loading up their &lt;/span&gt;&lt;a data-dcnode-id=&quot;604&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//bitvavo.com/&quot;&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;Bitvavo&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;603&quot; instrument_node=&quot;&quot;&gt; dashboards and focusing on the money to be made that day. But underneath every cryptocurrency currently being traded, lies the power of blockchain technology. A technology that could easily solve many of the world’s biggest problems.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;rtoc-mokuji-content frame2 preset1 animation-fade rtoc_open default&quot; data-dcnode-id=&quot;570&quot; data-id=&quot;7766&quot; id=&quot;rtoc-mokuji-wrapper&quot;&gt;&lt;div class=&quot;rtoc_left&quot; data-dcnode-id=&quot;595&quot; id=&quot;rtoc-mokuji-title&quot;&gt;&lt;span data-dcnode-id=&quot;601&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;button class=&quot;rtoc_open_close rtoc_open&quot; data-dcnode-id=&quot;599&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;CLOSE&lt;/span&gt;&lt;/button&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;596&quot;&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;Contents&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;ol class=&quot;rtoc-mokuji decimal_ol level-1&quot; data-dcnode-id=&quot;571&quot;&gt;&lt;li class=&quot;rtoc-item&quot; data-dcnode-id=&quot;588&quot;&gt;&lt;a data-dcnode-id=&quot;593&quot; href=&quot;#rtoc-1&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;What Is UBI?&lt;/span&gt;&lt;/a&gt;&lt;ul class=&quot;rtoc-mokuji mokuji_ul level-2&quot; data-dcnode-id=&quot;589&quot;&gt;&lt;li class=&quot;rtoc-item&quot; data-dcnode-id=&quot;590&quot;&gt;&lt;a data-dcnode-id=&quot;591&quot; href=&quot;#rtoc-2&quot;&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;Arguments Against It&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;li class=&quot;rtoc-item&quot; data-dcnode-id=&quot;572&quot;&gt;&lt;a data-dcnode-id=&quot;586&quot; href=&quot;#rtoc-3&quot;&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt;What Does It Have to Do With Bitcoin?&lt;/span&gt;&lt;/a&gt;&lt;ul class=&quot;rtoc-mokuji mokuji_ul level-2&quot; data-dcnode-id=&quot;573&quot;&gt;&lt;li class=&quot;rtoc-item&quot; data-dcnode-id=&quot;583&quot;&gt;&lt;a data-dcnode-id=&quot;584&quot; href=&quot;#rtoc-4&quot;&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt;Negating Inflation&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;rtoc-item&quot; data-dcnode-id=&quot;580&quot;&gt;&lt;a data-dcnode-id=&quot;581&quot; href=&quot;#rtoc-5&quot;&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;Controlling Corruption&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;rtoc-item&quot; data-dcnode-id=&quot;577&quot;&gt;&lt;a data-dcnode-id=&quot;578&quot; href=&quot;#rtoc-6&quot;&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;Mitigating Immigration&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;rtoc-item&quot; data-dcnode-id=&quot;574&quot;&gt;&lt;a data-dcnode-id=&quot;575&quot; href=&quot;#rtoc-7&quot;&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;Cutting Costs&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/div&gt;&lt;h2 data-dcnode-id=&quot;568&quot; id=&quot;rtoc-1&quot;&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;What Is UBI?&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;563&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;UBI, or &lt;/span&gt;&lt;a data-dcnode-id=&quot;565&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.thebalance.com/universal-basic-income-4160668&quot;&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;Universal Basic Income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;, is a system in which a government, whether local or national, gives its citizens a monthly stipend. The money comes with no strings attached and no caveats-providing you’re a citizen of that area. The thing that sets UBI apart from sporadic stimulus checks is that it is enduring, once a month, every month, for a lifetime.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;561&quot;&gt;&lt;span data-dcnode-id=&quot;562&quot; instrument_node=&quot;&quot;&gt;While no country in the world currently holds a long-term UBI plan, many pilot programs have taken place and been suggested. In places like Spain and South Korea are heavily considering these programs in the wake of COVID-19, and the former Democratic Presidential nominee, Andrew Yang championed the idea for the United States- before the coronavirus tore through its borders.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;559&quot; id=&quot;rtoc-2&quot;&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;Arguments Against It&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;557&quot;&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;What stops many people from wanting to adopt UBI is generally due to misconception. A large number of Americans believe that the implementation of the system would encourage people not to work. Putting a further damper on the economy. However, most pilot programs have shown that this isn’t actually the case. One county in California produced a UBI scheme for a number of years, with favorable results. Stating “Poverty results from lack of cash, not character.” Researchers who introduced a similar system in Namibia in order to study the effects noted that recipients began to eat better, attend better schools, and crime rates decreased. While a pilot program in Finland had recipients reporting a higher standard of living and more overall satisfaction in their lives.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;555&quot;&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;The other common issues with UBI have to do with the sheer scale of implementation. As the money may not be difficult to find (Andrew Yang suggested consolidating welfare programs and implementing a VAT of 10%), getting it to where it needs to go in a manner that is difficult to exploit and doesn’t put citizens at risk is another story.&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;553&quot; id=&quot;rtoc-3&quot;&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;What Does It Have to Do With Bitcoin?&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;551&quot;&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;This distribution idea is where cryptocurrency and blockchain technology comes into play. Bitcoin, perhaps the most recognizable form of cryptocurrency, is a decentralized, pseudo-anonymous currency system which exists entirely in the digital world. Cryptocurrencies could reasonably address many of the problems that go hand in hand with the distribution of large-scale UBI programs. Particularly if a government was keen to set up centralized crypto dedicated to the program.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;549&quot; id=&quot;rtoc-4&quot;&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;Negating Inflation&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;547&quot;&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;Monitoring inflation, cost of living, and prices of goods is a bit of a nightmare. Oftentimes, the way these fluctuations in value are tracked is through Secret Shopper programs that are expensive and a data collection headache. By implementing a centralized cryptocurrency UBI token, the information on the costs of goods and even consumption patterns could be calculated near instantaneously. Creating a system in which fair distribution is built-in.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;545&quot; id=&quot;rtoc-5&quot;&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;Controlling Corruption&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;539&quot;&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;Because blockchain represents &lt;/span&gt;&lt;a data-dcnode-id=&quot;541&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Distributed_ledger&quot;&gt;&lt;em data-dcnode-id=&quot;542&quot;&gt;&lt;span data-dcnode-id=&quot;543&quot; instrument_node=&quot;&quot;&gt;Distributed Ledger Technology&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;, corruption, or scamming practices that could rise from UBI would be eliminated. The public ledger allows monitoring by any invested party, and once a transaction is put into the ledger, it’s time-stamped and immutable. Making it impossible to duplicate transactions or get them to go anywhere besides where they are directed. It allows for complete transparency of payments as the currency can be tracked from payment to deposit.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;537&quot; id=&quot;rtoc-6&quot;&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;Mitigating Immigration&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;535&quot;&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;Another big concern of UBI detractors is that of immigration. Should a citizen of one country with UBI move to another with UBI, then they will enjoy double payments. Alternatively, if someone legally immigrates to a country with a UBI system in place, but is not paid that country’s UBI, the welfare gap will only widen. Creating unnecessary social tension. Where cryptocurrencies step in is they are capable of supplying selective UBI payments, using geolocation and VAT revenue. So only people paying directly into anyone UBI scheme would be capable of accessing it.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;533&quot; id=&quot;rtoc-7&quot;&gt;&lt;span data-dcnode-id=&quot;534&quot; instrument_node=&quot;&quot;&gt;Cutting Costs&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;531&quot;&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;Traditional banking structures come with a near cost-prohibitive amount of fees. Just ask anyone who has a mortgage. Cryptocurrency can drastically reduce this intermediary leakage through an automated process, requiring far less in administrative cost consumption. Making the total transactional cost a fraction of what it would be with traditional methods.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;sharedaddy sd-sharing-enabled&quot; data-dcnode-id=&quot;504&quot;&gt;&lt;div class=&quot;robots-nocontent sd-block sd-social sd-social-icon sd-sharing&quot; data-dcnode-id=&quot;505&quot;&gt;&lt;h3 class=&quot;sd-title&quot; data-dcnode-id=&quot;529&quot;&gt;&lt;span data-dcnode-id=&quot;530&quot; instrument_node=&quot;&quot;&gt;Share this:&lt;/span&gt;&lt;/h3&gt;&lt;div class=&quot;sd-content&quot; data-dcnode-id=&quot;506&quot;&gt;&lt;ul data-dcnode-id=&quot;507&quot; data-sharing-events-added=&quot;true&quot;&gt;&lt;li class=&quot;share-twitter&quot; data-dcnode-id=&quot;524&quot;&gt;&lt;a class=&quot;share-twitter sd-button share-icon no-text&quot; data-dcnode-id=&quot;525&quot; data-shared=&quot;sharing-twitter-7766&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//icoshock.com/bitcoin-ubi-how-crypto-could-help-pay-universal-basic-income/%3Fshare%3Dtwitter%26nb%3D1&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot; tit
