uot;602&quot; instrument_node=&quot;&quot;&gt;Proof Points You Can Share Right Now&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;w-layout-grid grid_3els&quot; data-dcnode-id=&quot;557&quot;&gt;&lt;div class=&quot;keyitem&quot; data-dcnode-id=&quot;589&quot; id=&quot;w-node-d850cd43-0bc5-7a86-b8c0-a301092d6fd9-1074209f&quot;&gt;&lt;a class=&quot;link-2 ga-event&quot; data-dcnode-id=&quot;599&quot; data-event-category=&quot;1.2M Canadian Families Link Click&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/groweconomy&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;Universal Basic Income could grow our economy more than it costs, while ending poverty in Canada.&lt;/span&gt;&lt;/a&gt;&lt;p data-dcnode-id=&quot;590&quot;&gt;&lt;a data-dcnode-id=&quot;596&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/groweconomy&quot;&gt;&lt;strong data-dcnode-id=&quot;597&quot;&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;A report by the Canadian Centre for Economic Analysis&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt; shows that UBI could be a sustainable investment in Canadians that grows our economy $80 billion/year, creates hundreds of thousands of jobs, and supports Canada's businesses - all while lifting 3.2 million Canadian families out of poverty, ending poverty. &lt;/span&gt;&lt;a data-dcnode-id=&quot;592&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/groweconomy&quot;&gt;&lt;strong data-dcnode-id=&quot;593&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;Read the full report &amp;amp;&amp;nbsp;highlights here&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;keyitem&quot; data-dcnode-id=&quot;580&quot; id=&quot;w-node-e9d96301-ed01-5f69-ff61-4c825fc6efee-1074209f&quot;&gt;&lt;a class=&quot;link ga-event&quot; data-dcnode-id=&quot;587&quot; data-event-category=&quot;Home - 120 Canadian CEOs Link Click&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ceosforbasicincome.ca/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;120 Canadian CEOs Say Basic Income is Urgent&lt;/span&gt;&lt;/a&gt;&lt;p data-dcnode-id=&quot;581&quot;&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt;In Oct 2018, UBI&amp;nbsp;Works organized the launch of &lt;/span&gt;&lt;a data-dcnode-id=&quot;583&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ceosforbasicincome.ca/&quot; target=&quot;_blank&quot;&gt;&lt;strong data-dcnode-id=&quot;584&quot;&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt;Canadian CEOs for Basic Income&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt; with a letter signed by over 120 Canadian CEOs representing over $2.3B in combined revenues. &amp;nbsp; The letter lays the economic arguments for basic income and asked Doug Ford to not cancel the Ontario Pilot. &amp;nbsp;The founders and CEOs who understand the issues overwhelmingly support a basic income in Canada.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;keyitem&quot; data-dcnode-id=&quot;571&quot; id=&quot;w-node-_5cc486c8-5597-98c2-b2ab-de2b365d1c21-1074209f&quot;&gt;&lt;a class=&quot;link-2 ga-event&quot; data-dcnode-id=&quot;578&quot; data-event-category=&quot;1.2M Canadian Families Link Click&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/ccb&quot;&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;1.2M Canadian Families already get a Basic Income. It's growing the economy, creating jobs, and lifting Canadians out of poverty.&lt;/span&gt;&lt;/a&gt;&lt;p data-dcnode-id=&quot;572&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;Since 2016, &amp;nbsp;Canada has already had a basic income for people with children. It has grown the economy and created jobs, while inflation has been low. &amp;nbsp;Over 1.2M families get an average basic income of $680/month through the &lt;/span&gt;&lt;a data-dcnode-id=&quot;574&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/ccb&quot;&gt;&lt;strong data-dcnode-id=&quot;575&quot;&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;Canada Child Benefit&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;keyitem&quot; data-dcnode-id=&quot;558&quot; id=&quot;w-node-f9508ae6-35d0-eeee-0f9e-31f2fcfc749a-1074209f&quot;&gt;&lt;div class=&quot;h5 redfont&quot; data-dcnode-id=&quot;569&quot;&gt;&lt;span data-dcnode-id=&quot;570&quot; instrument_node=&quot;&quot;&gt;105,000 People Got A Basic Income and Kept Working&lt;/span&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;559&quot;&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;A study of 105K people in 16 basic income trials in the last 50 years found &lt;/span&gt;&lt;a data-dcnode-id=&quot;565&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/329102801_Would_a_Basic_Income_Guarantee_Reduce_the_Motivation_to_Work_An_Analysis_of_Labor_Responses_in_16_Trial_Programs&quot; target=&quot;_blank&quot;&gt;&lt;strong data-dcnode-id=&quot;566&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;no work disincentive&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;. Meanwhile, in Alaska, &lt;/span&gt;&lt;a data-dcnode-id=&quot;561&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nber.org/papers/w24312&quot; target=&quot;_blank&quot;&gt;&lt;strong data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;basic income increased part-time work by 17%&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;, with no drop in full-time work. &amp;nbsp;We don’t need more pilots - we know basic income works, and allows people to build stronger careers and better lives.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;recovery_petition grey_section nobottompadding notoppadding wf-section&quot; data-dcnode-id=&quot;539&quot;&gt;&lt;div class=&quot;largecontainer&quot; data-dcnode-id=&quot;540&quot;&gt;&lt;div class=&quot;w-layout-grid grid_2els _24topmargin&quot; data-dcnode-id=&quot;541&quot;&gt;&lt;p class=&quot;centertext&quot; data-dcnode-id=&quot;552&quot; id=&quot;w-node-_80f96372-f3b7-18f3-d03c-33ae908ea003-1074209f&quot;&gt;&lt;strong class=&quot;bold-text-12&quot; data-dcnode-id=&quot;553&quot;&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;Get Updates to These Projects&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;div class=&quot;form-block-4 w-form&quot; data-dcnode-id=&quot;542&quot; id=&quot;w-node-a8fc9f59-d597-33a3-ac40-ec7ae306d331-1074209f&quot;&gt;&lt;form aria-label=&quot;/home Project Updates&quot; data-dcnode-id=&quot;549&quot; data-gtm-form-name=&quot;home get updates&quot; data-name=&quot;/home Project Updates&quot; id=&quot;wf-form-home-Project-Updates&quot; method=&quot;get&quot; name=&quot;wf-form-home-Project-Updates&quot;&gt;&lt;input class=&quot;text_field _2 w-input&quot; data-dcnode-id=&quot;551&quot; data-name=&quot;Email&quot; id=&quot;Email-7&quot; maxlength=&quot;256&quot; name=&quot;Email&quot; placeholder=&quot;Email&quot; required=&quot;&quot; type=&quot;email&quot;&gt;&lt;input class=&quot;btn fullwidth ga-event w-button&quot; data-dcnode-id=&quot;550&quot; data-event-category=&quot;Home - Get Updates Btn - Email sign up&quot; data-wait=&quot;Please wait...&quot; type=&quot;submit&quot; value=&quot;Submit&quot;&gt;&lt;/form&gt;&lt;div aria-label=&quot;/home Project Updates success&quot; class=&quot;w-form-done&quot; data-dcnode-id=&quot;546&quot; role=&quot;region&quot; tabindex=&quot;-1&quot;&gt;&lt;div data-dcnode-id=&quot;547&quot;&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;Thank you! Your submission has been received!&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div aria-label=&quot;/home Project Updates failure&quot; class=&quot;w-form-fail&quot; data-dcnode-id=&quot;543&quot; role=&quot;region&quot; tabindex=&quot;-1&quot;&gt;&lt;div data-dcnode-id=&quot;544&quot;&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;Oops! Something went wrong while submitting the form.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;recovery_petition grey_section wf-section&quot; data-dcnode-id=&quot;503&quot;&gt;&lt;div class=&quot;largecontainer&quot; data-dcnode-id=&quot;504&quot;&gt;&lt;h2 class=&quot;h2 _30btm&quot; data-dcnode-id=&quot;537&quot;&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;Our Belief&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;w-layout-grid grid_2els&quot; data-dcnode-id=&quot;505&quot;&gt;&lt;div data-dcnode-id=&quot;528&quot;&gt;&lt;p class=&quot;_20px&quot; data-dcnode-id=&quot;529&quot;&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;We believe that UBI works as a key building block in the realization of a human-centred economy that promotes innovation as well as the social and economic well-being of individuals, families, and communities across Canada.&lt;/span&gt;&lt;br data-dcnode-id=&quot;535&quot;&gt;&lt;br data-dcnode-id=&quot;534&quot;&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;We understand that the changing nature of work, driven by technology and globalization, has created many opportunities for the improvement of human life.&lt;/span&gt;&lt;br data-dcnode-id=&quot;532&quot;&gt;&lt;br data-dcnode-id=&quot;531&quot;&gt;&lt;span data-dcnode-id=&quot;530&quot; instrument_node=&quot;&quot;&gt;However, the gains from technological innovation have been highly uneven, with technological job displacement polarizing the economy: creating more low income jobs than high income jobs and splitting cities and provinces into large low income regions and select higher income regions, as middle class jobs continue to be displaced.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;506&quot;&gt;&lt;ul class=&quot;_20px&quot; data-dcnode-id=&quot;507&quot; role=&quot;list&quot;&gt;&lt;li data-dcnode-id=&quot;524&quot;&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;Universal Basic Income is an innovation policy: it recaptures &amp;nbsp;our risk tolerance: &amp;nbsp;unlocking the opportunity for everyone to take bigger risks, think long term, and create.&lt;/span&gt;&lt;strong data-dcnode-id=&quot;525&quot;&gt;&lt;br data-dcnode-id=&quot;526&quot;&gt;&lt;/strong&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;520&quot;&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;A Universal Basic Income defends equality of opportunity &amp;amp; self-reliance in a world where technological job displacement is reducing incomes for many.&lt;/span&gt;&lt;strong data-dcnode-id=&quot;521&quot;&gt;&lt;br data-dcnode-id=&quot;522&quot;&gt;&lt;/strong&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;516&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;A Universal Basic Income guarantees there is no longer a “working poor” ensuring that ongoing technological innovation is directed at preserving and expanding a middle class way of life for everyone.&lt;/span&gt;&lt;strong data-dcnode-id=&quot;517&quot;&gt;&lt;br data-dcnode-id=&quot;518&quot;&gt;&lt;/strong&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;512&quot;&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;UBI is an economic need that puts markets in service to humanity, installing the plumbing into economy that adds resilience and robustness to the economy, ensuring everyone can fully participate to their potential.&lt;/span&gt;&lt;strong data-dcnode-id=&quot;513&quot;&gt;&lt;br data-dcnode-id=&quot;514&quot;&gt;&lt;/strong&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;508&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;Universal Basic Income abolishes poverty and reduces human suffering as well as all reducing the costs of poverty to society.&lt;/span&gt;&lt;strong data-dcnode-id=&quot;509&quot;&gt;&lt;br data-dcnode-id=&quot;510&quot;&gt;&lt;/strong&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;recovery_petition relativesection wf-section&quot; data-dcnode-id=&quot;473&quot;&gt;&lt;div class=&quot;largecontainer&quot; data-dcnode-id=&quot;474&quot;&gt;&lt;div class=&quot;w-layout-grid grid_2els&quot; data-dcnode-id=&quot;475&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;_100img&quot; data-dcnode-id=&quot;502&quot; sizes=&quot;(max-width: 479px) 92vw, (max-width: 767px) 94vw, (max-width: 991px) 86vw, (max-width: 1919px) 89vw, 1170px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40281b92e000_adilia-olp2020.jpg&amp;amp;raw&quot; srcset=&quot;https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40281b92e000_adilia-olp2020-p-500.jpeg 500w, https://assets-global.website-files.c
