.4-.38.65a2 2 0 0 0 0 .9c.08.2.2.4.38.57l1.29 1.31c.27.28.62.42 1.03.42.42 0 .78-.14 1.06-.42l1.23-1.25.79-.78 1.15-1.16c.08-.09.19-.22.28-.4.1-.2.15-.42.15-.67 0-.16-.02-.3-.06-.45l-.02-.02v-.02l-.07-.14s0-.03-.04-.06l-.06-.13-.02-.02c0-.02 0-.03-.02-.05a.6.6 0 0 0-.14-.16l-.48-.5c0-.04.02-.1.04-.15l.06-.12 1.17-1.14.09-.09.56.57c.02.04.08.1.16.18l.05.04.03.06.04.05.03.04.04.06.1.14.02.02c0 .02.01.03.03.04l.1.2v.02c.1.16.2.38.3.68a1 1 0 0 1 .04.25 3.2 3.2 0 0 1 .02 1.33 3.49 3.49 0 0 1-.95 1.87l-.66.67-.97.97-1.56 1.57a3.4 3.4 0 0 1-2.47 1.02c-.97 0-1.8-.34-2.49-1.03l-1.3-1.3a3.55 3.55 0 0 1-1-2.51v-.01h-.02v.02zm5.39-3.43c0-.19.02-.4.07-.63.13-.74.44-1.37.95-1.87l.66-.67.97-.98 1.56-1.56c.68-.69 1.5-1.03 2.47-1.03.97 0 1.8.34 2.48 1.02l1.3 1.32a3.48 3.48 0 0 1 1 2.48c0 .58-.11 1.11-.37 1.6l-.02.02v.02l-.02.04c-.14.27-.35.54-.6.8L16.23 15l-.01.02-.01.02c-.44.42-.92.7-1.43.83a4.55 4.55 0 0 0 1.23-3.52L18 10.38c.18-.21.3-.42.35-.65a2.03 2.03 0 0 0-.01-.9 1.96 1.96 0 0 0-.36-.58l-1.3-1.3a1.49 1.49 0 0 0-1.06-.42c-.42 0-.77.14-1.06.4l-1.2 1.27-.8.8-1.16 1.15c-.08.08-.18.21-.29.4a1.66 1.66 0 0 0-.08 1.12l.02.03v.02l.06.14s.01.03.05.06l.06.13.02.02.01.02.01.02c.05.08.1.13.14.16l.47.5c0 .04-.02.09-.04.15l-.06.12-1.15 1.15-.1.08-.56-.56a2.3 2.3 0 0 0-.18-.19c-.02-.01-.02-.03-.02-.04l-.02-.02a.37.37 0 0 1-.1-.12c-.03-.03-.05-.04-.05-.06l-.1-.15-.02-.02-.02-.04-.08-.17v-.02a5.1 5.1 0 0 1-.28-.69 1.03 1.03 0 0 1-.04-.26c-.06-.23-.1-.46-.1-.7v.01z&quot; data-dcnode-id=&quot;903&quot; fill=&quot;#A8A8A8&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/header&gt;&lt;span class=&quot;l&quot; data-dcnode-id=&quot;894&quot;&gt;&lt;/span&gt;&lt;section data-dcnode-id=&quot;661&quot;&gt;&lt;div data-dcnode-id=&quot;662&quot;&gt;&lt;div class=&quot;fm as iv iw ix iy&quot; data-dcnode-id=&quot;893&quot;&gt;&lt;/div&gt;&lt;div class=&quot;iz ja jb jc jd&quot; data-dcnode-id=&quot;663&quot;&gt;&lt;figure class=&quot;jf jg gr gt jh ji gj gk paragraph-image&quot; data-dcnode-id=&quot;889&quot;&gt;&lt;div class=&quot;jj jk dq jl cf jm&quot; data-dcnode-id=&quot;890&quot; role=&quot;button&quot; tabindex=&quot;0&quot;&gt;&lt;div class=&quot;gj gk je&quot; data-dcnode-id=&quot;891&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;cf jn jo&quot; data-dcnode-id=&quot;892&quot; height=&quot;270&quot; loading=&quot;lazy&quot; role=&quot;presentation&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//miro.medium.com/max/1400/1%2AHKNI2qg4POTrKPBVyJxXbA.png&amp;amp;raw&quot; width=&quot;700&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/figure&gt;&lt;div class=&quot;&quot; data-dcnode-id=&quot;886&quot;&gt;&lt;h1 class=&quot;pw-post-title jp jq jr bn js jt ju jv jw jx jy jz ka kb kc kd ke kf kg kh ki kj kk kl km kn fy&quot; data-dcnode-id=&quot;887&quot; data-selectable-paragraph=&quot;&quot; id=&quot;3ee0&quot;&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;Would a UBI Reduce Work Incentives? Some Answers from Econ 101&lt;/span&gt;&lt;/h1&gt;&lt;/div&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;884&quot; data-selectable-paragraph=&quot;&quot; id=&quot;b7c6&quot;&gt;&lt;span data-dcnode-id=&quot;885&quot; instrument_node=&quot;&quot;&gt;More than half of all college students (in the US) take a basic economics course. A lot of them hate it. The course is full of graphs and charts. That would be bad enough, but what makes it worse is that the graphs in a typical Econ 101 textbook are about boring stuff — whether a farmer should grow beans or peas, whether a student should eat pizza or burritos for lunch. Who cares?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;879&quot; data-selectable-paragraph=&quot;&quot; id=&quot;07cf&quot;&gt;&lt;span data-dcnode-id=&quot;883&quot; instrument_node=&quot;&quot;&gt;But, what if we put those Econ 101 tools to work on something we &lt;/span&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;881&quot;&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;do&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt; care about — something like a Universal Basic Income? Then things could get interesting. Read on to see how we can use some basic econ graphs to answer one of the most frequently asked questions about basic income: Would a UBI reduce work incentives?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;876&quot; data-selectable-paragraph=&quot;&quot; id=&quot;0118&quot;&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;877&quot;&gt;&lt;span data-dcnode-id=&quot;878&quot; instrument_node=&quot;&quot;&gt;How our welfare system kills work incentives&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;871&quot; data-selectable-paragraph=&quot;&quot; id=&quot;d84b&quot;&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;We can begin by showing how our current welfare system kills work incentives. Welfare as we know it is based on &lt;/span&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;873&quot;&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt;means testing&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;. The concept of means testing, as applied to programs like SNAP, TANF, and Medicaid, is that if you are really poor, the government gives you benefits, but if you try to work and get ahead on your own, the government takes your benefits away. Not surprisingly, that is not the way to encourage work.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;866&quot; data-selectable-paragraph=&quot;&quot; id=&quot;7e97&quot;&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;Rather than go through the incentive effects of existing programs one by one (I’ve done that &lt;/span&gt;&lt;a class=&quot;au ln&quot; data-dcnode-id=&quot;868&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//dolanecon.blogspot.com/2016/04/the-social-safety-net-and-work.html&quot; rel=&quot;noopener ugc nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;elsewhere&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;867&quot; instrument_node=&quot;&quot;&gt;), this post will keep things simple by looking at a generic means-tested income support (MTIS) policy.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;861&quot; data-selectable-paragraph=&quot;&quot; id=&quot;6b53&quot;&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;Figure 1 shows what happens if we introduce our MTIS into a labor market that previously had no income support programs at all. (Hat tip to &lt;/span&gt;&lt;a class=&quot;au ln&quot; data-dcnode-id=&quot;863&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.nber.org/papers/w9168.pdf&quot; rel=&quot;noopener ugc nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;Robert Moffitt&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt; for some ideas about how to draw these figures.)&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;lp lq lr ls gv ji gj gk paragraph-image&quot; data-dcnode-id=&quot;858&quot;&gt;&lt;div class=&quot;gj gk lo&quot; data-dcnode-id=&quot;859&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;cf jn jo&quot; data-dcnode-id=&quot;860&quot; height=&quot;441&quot; loading=&quot;lazy&quot; role=&quot;presentation&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//miro.medium.com/max/896/1%2As9878Lzs5mfDuaGeyDX3-A.png&amp;amp;raw&quot; width=&quot;448&quot;&gt;&lt;/div&gt;&lt;/figure&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;856&quot; data-selectable-paragraph=&quot;&quot; id=&quot;81ed&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;The horizontal axis in Figure 1 represents earned income while the vertical axis shows disposable income, that is, earned income plus benefits. To keep things simple, we will assume no income or payroll taxes on earned income. The dashed 45-degree line shows that earned and disposable income are the same when there are no taxes or income support. The solid red line shows the relationship between disposable and earned income with MTIS in force.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;854&quot; data-selectable-paragraph=&quot;&quot; id=&quot;ca46&quot;&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;The generic MTIS policy has three features:&lt;/span&gt;&lt;/p&gt;&lt;ul class=&quot;&quot; data-dcnode-id=&quot;835&quot;&gt;&lt;li class=&quot;lt lu jr kq b kr ks kv kw kz lv ld lw lh lx ll ly lz ma mb fy&quot; data-dcnode-id=&quot;849&quot; data-selectable-paragraph=&quot;&quot; id=&quot;fe41&quot;&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;A minimum guaranteed income, &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;851&quot;&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;G&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;, that households receive if they have no earned income at all.&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;lt lu jr kq b kr mc kv md kz me ld mf lh mg ll ly lz ma mb fy&quot; data-dcnode-id=&quot;841&quot; data-selectable-paragraph=&quot;&quot; id=&quot;5504&quot;&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;A benefit reduction rate (or effective marginal tax rate), &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;846&quot;&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;, indicated by the angle between the 45-degree line and the red MTIS schedule. As the figure is drawn, &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;843&quot;&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt; = 0.75, that is, benefits are reduced by 75 cents for each dollar earned.&lt;/span&gt;&lt;/li&gt;&lt;li class=&quot;lt lu jr kq b kr mc kv md kz me ld mf lh mg ll ly lz ma mb fy&quot; data-dcnode-id=&quot;836&quot; data-selectable-paragraph=&quot;&quot; id=&quot;812d&quot;&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;A break-even income level &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;838&quot;&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt;B&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;, beyond which benefits stop. Past that point, earned income equals disposable income.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;833&quot; data-selectable-paragraph=&quot;&quot; id=&quot;9c52&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;Despite its simplicity, the generic program illustrated in Figure 1 is sufficient to support our first important proposition:&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;830&quot; data-selectable-paragraph=&quot;&quot; id=&quot;9a4e&quot;&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;831&quot;&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;Proposition 1: Any means-tested income support program will unambiguously reduce average work effort.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;828&quot; data-selectable-paragraph=&quot;&quot; id=&quot;515f&quot;&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;The numbered arrows in Figure 1 show why. Begin with Arrow 1, which shows how the program affects your work incentives if your earned income is initially below the break-even level.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;821&quot; data-selectable-paragraph=&quot;&quot; id=&quot;1b6b&quot;&gt;&lt;span data-dcnode-id=&quot;827&quot; instrument_node=&quot;&quot;&gt;First, you can see that regardless of how much you work, you will receive some benefit from the government, so your disposable income will rise. Other things being equal, people tend to “spend” part of their increased income on increased leisure, in the form of shorter hours, longer vacations, a longer time in school, earlier retirement, or longer breaks between jobs. Economists call that &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;823&quot;&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;the &lt;/span&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;824&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;income effect&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt; of a higher income.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;812&quot; data-selectable-paragraph=&quot;&quot; id=&quot;f5d2&quot;&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;Second, the income support program changes the trade-off you face between additional work and additional earned income. Suppose your best available job pays $10 per hour. Without the MTIS, one more hour of work brings you $10 of added disposable income. With the MTIS, one more hour of work raises your disposable income by only $2.50, because the $10 you earn is offset by a loss of $7.50 in benefits. In effect, the program reduces the “price” (more properly, the &lt;/span&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;818&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;opportunity cost&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;) of leisure, so you are more likely to substitute leisure for work and the disposable income it brings in. Economists call that the &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;814&quot;&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;815&quot;&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;substitution effect&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt; of the program.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;810&quot; data-selectable-paragraph=&quot;&quot; id=&quot;d65f&quot;&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;Below the break-even level of income, the income and substitution effects work in the same direction, so there is an unambiguous incentive to work less. Some people might stop working altogether. Some might reduce their hours, take longer vacations, or spend more time between jobs. Whatever the specifics, the average response will be a reduction in work hours.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;805&quot; data-selectable-paragraph=&quot;&quot; id=&quot;959e&quot;&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;Next, suppose your initial earned income is higher than the break-even level. If it is far above &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;807&quot;&gt;&lt;span data-dcnode-id=&quot;808&quot; instrument_node=&quot;&quot;&gt;B&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;, the program will probably not affect your work effort at all. Suppose, though, that your initial income is only a little above the break-even level. In that case, you may be tempted to cut back your hours of work by enough to qualify MTIS benefits. Arrow 2 shows that possibility. If you follow the arrow, you give up a little bit of disposable income, but you gain quite a bit more leisure — a trade-off between work and leisure that is better than you faced before the MTIS program came into force. Not everyone will take advantage of this opportunity, but if at least some do, while others do not change their work habits, then the average work effort of people whose initial incomes were higher than B will decrease.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;803&quot; data-selectable-paragraph=&quot;&quot; id=&quot;65eb&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;In short, introducing a MTIS into an economy where previously there was no income support will tend to reduce the work effort of most people whose incomes were initially below the break-even point and of some with incomes just above break-even. Average work effort for the population as a whole will decrease.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;800&quot; data-selectable-paragraph=&quot;&quot; id=&quot;8cec&quot;&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;801&quot;&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;Sweetening the program&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;789&quot; data-selectable-paragraph=&quot;&quot; id=&quot;8593&quot;&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;Next, consider the effects of “sweetening” the MTIS by increasing the minimum guaranteed income or reducing the benefit reduction rate. Figure 2 shows the effects of both changes together. The old program is the same as shown in Figure 1. The new program has a higher minimum guarantee &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;797&quot;&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;G2&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt; and a lower benefit reduction rate of 0.5, shown by &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;794&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;t2, &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;instead of the original benefit reduction rate of 0.75 for &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;791&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;t1&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;lp lq lr ls gv ji gj gk paragraph-image&quot; data-dcnode-id=&quot;786&quot;&gt;&lt;div class=&quot;gj gk lo&quot; data-dcnode-id=&quot;787&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;cf jn jo&quot; data-dcnode-id=&quot;788&quot; height=&quot;441&quot; loading=&quot;lazy&quot; role=&quot;presentation&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//miro.medium.com/max/896/1%2AEdhW7k6I7MDF9Btt5SLwyA.png&amp;amp;raw&quot; width=&quot;448&quot;&gt;&lt;/div&gt;&lt;/figure&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;784&quot; data-selectable-paragraph=&quot;&quot; id=&quot;a756&quot;&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;The arrows show three possible cases.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;776&quot; data-selectable-paragraph=&quot;&quot; id=&quot;d41c&quot;&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;First, suppose your initial earned income is below &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;781&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;B1&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;, the break-even level for the old program. You now have an increased incentive to work because you get to keep 50 cents of each dollar you earn, rather than 25 cents as before. At the same time, however, your income will be higher, which by itself, will give you an incentive to work less. Since the two effects work in opposite directions, whether you work more or less will depend on whether the income effect or the substitution effect is stronger. The relative strength of the two effects has been widely studied, with the &lt;/span&gt;&lt;a class=&quot;au ln&quot; data-dcnode-id=&quot;778&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.cbo.gov/sites/default/files/cbofiles/attachments/10-25-2012-Recent_Research_on_Labor_Supply_Elasticities.pdf&quot; rel=&quot;noopener ugc nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt;preponderance of evidence&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt; pointing to a larger value for the substitution effect than for the income effect. In that case, the substitution effect will prevail, so that average work effort will increase, as shown by Arrow 1, even if some individuals work less.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;771&quot; data-selectable-paragraph=&quot;&quot; id=&quot;e93e&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;Second, suppose that your initial earned income is just slightly higher than the new break-even level &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;773&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;B2&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;. In that case, you might decide to cut back your work hours by enough to qualify for benefits, as shown by Arrow 2. Not everyone will do so, and the higher their incomes are relative to the break-even level, the less likely it is that they will reduce work. Still, there are likely to be at least a few people in this situation who will reduce work effort.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;763&quot; data-selectable-paragraph=&quot;&quot; id=&quot;66b6&quot;&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;Third, suppose your initial earned income is between &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;768&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;B1&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;765&quot;&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;B2&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt; — too high to qualify for the old program but low enough to qualify for the new one. In that case, the new, more generous, MTIS will increase your disposable income, which, by itself, would cause your work effort to decrease. At the same time, you now face the 50 percent benefit reduction rate of the new program, whereas before you faced no benefit reductions at all. The substitution effect of the benefit reductions provides second disincentive to work. With both effects working in the same direction, you have a double reason to reduce your desired level of work, as shown by Arrow 3.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;761&quot; data-selectable-paragraph=&quot;&quot; id=&quot;5103&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;Taking the three cases together, we can see that formally speaking, the effects of sweetening the MTIS are ambiguous. Some people (Arrow 1) will increase their work effort, while some (Arrows 2 and 3) will reduce theirs. It would not be at all surprising if the negative effects on work to outweighed the positive effects, but we can’t be sure on theoretical grounds alone. Ultimately, the average response for the whole population will depend on the number of people in each group and the relative strength of the income and substitution effects. We can formalize this result as follows:&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;758&quot; data-selectable-paragraph=&quot;&quot; id=&quot;78e1&quot;&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;759&quot;&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;Proposition 2: The effects on work effort of “sweetening” a means-tested income support program by raising the minimum income guarantee, lowering the benefit reduction rate, or both, are ambiguous.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;755&quot; data-selectable-paragraph=&quot;&quot; id=&quot;6428&quot;&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;756&quot;&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;Replacing a MTIS with a UBI&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;735&quot; data-selectable-paragraph=&quot;&quot; id=&quot;f10c&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;Now we come to the heart of the issue we set out to discuss. What will be the effect on work incentives if we replace a pre-existing means-tested income support program with a UBI that is not means tested at all? Figure 3 illustrates this possibility. The MTIS is the version from Figure 1, before sweetening. The UBI grant, &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;752&quot;&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt;Gu&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;, is set at a level slightly below the minimum guaranteed income under the original MTIS, &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;749&quot;&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;Gm&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;. (We will consider the effects of a change in the relative levels of &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;746&quot;&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;Gu &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;and &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;Gm &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;shortly&lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;740&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;.) &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;The benefit reduction rate for the UBI is zero, so the UBI schedule is parallel to the original earned income line and lies above it by the amount of the UBI grant, &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;737&quot;&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;Gu&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;lp lq lr ls gv ji gj gk paragraph-image&quot; data-dcnode-id=&quot;732&quot;&gt;&lt;div class=&quot;gj gk lo&quot; data-dcnode-id=&quot;733&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;cf jn jo&quot; data-dcnode-id=&quot;734&quot; height=&quot;441&quot; loading=&quot;lazy&quot; role=&quot;presentation&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//miro.medium.com/max/896/1%2AdOWleXJpwPKwb22xHQIFIQ.png&amp;amp;raw&quot; width=&quot;448&quot;&gt;&lt;/div&gt;&lt;/figure&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;730&quot; data-selectable-paragraph=&quot;&quot; id=&quot;edb3&quot;&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;The arrows show four possible responses, depending on the original level of income.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;728&quot; data-selectable-paragraph=&quot;&quot; id=&quot;58ea&quot;&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;First, suppose that your original earned income is below the crossover point of the UBI and the MTIS schedules. Now you have two incentives to work more: you can now keep more of each added dollar you earn, and at the same time, unless you increase your work effort, you face a decrease in your disposable income. For this group, the substitution and income effects work together to encourage work effort, as shown by Arrow 1.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;726&quot; data-selectable-paragraph=&quot;&quot; id=&quot;a359&quot;&gt;&lt;span data-dcnode-id=&quot;727&quot; instrument_node=&quot;&quot;&gt;Second, suppose your original earned income is a little above the crossover point of the MTIS and the UBI schedules. As in the first case, the substitution effect is strong because you are no longer subject to the 75 percent benefit reduction rate of the MTIS. At the same time, you face a negative work incentive from the income effect, since your income will rise a little even if you don’t work more. However, the income effect is likely to be weak, because it applies only to the difference between the UBI and the MTIS benefits, not to the full value of the UBI. On balance, it is nearly certain that you will want to increase your work effort, as shown by Arrow 2.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;721&quot; data-selectable-paragraph=&quot;&quot; id=&quot;62cb&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;Third, suppose you are one of those people who would have earned an income above the break-even level &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;723&quot;&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;B&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt; if there had been no MTIS, but who cut back your work effort to qualify for the MTIS–the case shown by Arrow 2 in Figure 1. Now that the sweetened program is not offered, you will increase your work effort compared with how much you would work under the MTIS. This variant is shown by Arrow 3 in Figure 3.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;719&quot; data-selectable-paragraph=&quot;&quot; id=&quot;1633&quot;&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;Fourth, suppose your earned income is far above the break-even level for the MTIS. In that case, the UBI has no substitution effect at all, so you have no incentive from that source to work more. Since your income will rise by the amount of the UBI, you have a small incentive from the income effect to work less, as shown by Arrow 4. However, the effect on your work effort is likely to be slight, because with a substantial earned income to start with, the UBI means only a small percentage increase.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;711&quot; data-selectable-paragraph=&quot;&quot; id=&quot;92e3&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;On balance, replacing a MTIS with a UBI will almost certainly lead to increased work effort. How much depends on the relationship of the UBI grant &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;716&quot;&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;Gu&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt; to the MTIS minimum &lt;/span&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;713&quot;&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;Gm, &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;and also on the benefit reduction rate of the MTIS. The more generous the minimum guarantee of the MTIS relative to the amount of the UBI and the higher the MTIS benefit reduction rate, the more likely it is that replacing an MTIS with a UBI will increase work effort.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;709&quot; data-selectable-paragraph=&quot;&quot; id=&quot;f099&quot;&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;We can summarize these effects as follows:&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;706&quot; data-selectable-paragraph=&quot;&quot; id=&quot;0be6&quot;&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;707&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;Proposition 3: Replacing a means-tested income support program with a UBI would substantially increase work incentives for low-income households while having small disincentive effects, if any, for middle- and upper-income households.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;703&quot; data-selectable-paragraph=&quot;&quot; id=&quot;65c0&quot;&gt;&lt;strong class=&quot;kq js&quot; data-dcnode-id=&quot;704&quot;&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;Policy implications&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;701&quot; data-selectable-paragraph=&quot;&quot; id=&quot;4688&quot;&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;The most important implication of the preceding analysis is that we can intelligently discuss the incentive effects of a UBI only if we specify what we are comparing it to.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;699&quot; data-selectable-paragraph=&quot;&quot; id=&quot;8c66&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;If we were to introduce a UBI where, previously, there was no income support program at all, the UBI would have no substitution effect. In that case, the UBI would be expected to slightly reduce work effort, even if the income effect is small.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;697&quot; data-selectable-paragraph=&quot;&quot; id=&quot;7d34&quot;&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;By comparison, adding a UBI on top of the means-tested welfare system that we now have would result in the maximum disincentive to work. The substitution effect of the current high benefit reduction rates would then remain in force, while the UBI would add to the income effect.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;692&quot; data-selectable-paragraph=&quot;&quot; id=&quot;2a5c&quot;&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;The best policy of all would be to &lt;/span&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;694&quot;&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;replace&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt; the means-tested welfare system we now have with a UBI. In that case, the favorable substitution effect of a UBI would be strong and the unfavorable income effects would be weak. In that situation, the UBI could be expected to increase almost everyone’s work effort.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;684&quot; data-selectable-paragraph=&quot;&quot; id=&quot;f682&quot;&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;Fortunately, UBI advocates are coming around to the idea that a basic income should replace current means-tested programs rather than simply supplementing them. That is the approach taken, for example, by the &lt;/span&gt;&lt;a class=&quot;au ln&quot; data-dcnode-id=&quot;689&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.yang2020.com/what-is-freedom-dividend-faq/&quot; rel=&quot;noopener ugc nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;Freedom Dividend&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt; proposed by Andrew Yang, the entrepreneur and philanthropist who is now a candidate for the 2020 Democratic presidential nomination. In an &lt;/span&gt;&lt;a class=&quot;au ln&quot; data-dcnode-id=&quot;686&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//medium.com/basic-income/how-much-basic-income-can-we-afford-52cc8e9da65&quot; rel=&quot;noopener&quot;&gt;&lt;span data-dcnode-id=&quot;687&quot; instrument_node=&quot;&quot;&gt;earlier post&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt; in this space, I explained in more detail just which current income support programs can advantageously be replaced by a UBI.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;680&quot; data-selectable-paragraph=&quot;&quot; id=&quot;b7b4&quot;&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;682&quot;&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;The bottom line: &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;Applying the simple graphical tools from Econ 101 course shows that far from producing a nation of lay-abouts, a properly designed UBI would have a beneficial effect on work incentives.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;pw-post-body-paragraph ko kp jr kq b kr ks kt ku kv kw kx ky kz la lb lc ld le lf lg lh li lj lk ll iz fy&quot; data-dcnode-id=&quot;664&quot; data-selectable-paragraph=&quot;&quot; id=&quot;87f0&quot;&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;678&quot;&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;Photo courtesy of &lt;/span&gt;&lt;/em&gt;&lt;a class=&quot;au ln&quot; data-dcnode-id=&quot;675&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//pixabay.com/photos/steelworkers-concrete-formwork-1029665/&quot; rel=&quot;noopener ugc nofollow&quot; target=&quot;_blank&quot;&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;676&quot;&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;Pixabay.com&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;673&quot;&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;. Related posts: &lt;/span&gt;&lt;/em&gt;&lt;a class=&quot;au ln&quot; data-dcnode-id=&quot;670&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//medium.com/me/stats/post/9a61624749e5&quot; rel=&quot;noopener&quot;&gt;&lt;em class=&quot;lm&quot; data-dcnode-id=&quot;671&quot;&gt;&lt;span data-dcnode-id=&quo
