&lt;/span&gt;&lt;div class=&quot;left relative&quot; data-dcnode-id=&quot;2012&quot; id=&quot;mvp-content-body&quot;&gt;&lt;span data-dcnode-id=&quot;2499&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;left relative&quot; data-dcnode-id=&quot;2256&quot; id=&quot;mvp-content-body-top&quot;&gt;&lt;span data-dcnode-id=&quot;2498&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;left relative&quot; data-dcnode-id=&quot;2396&quot; id=&quot;mvp-content-main&quot;&gt;&lt;span data-dcnode-id=&quot;2497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mailmunch-forms-before-post&quot; data-dcnode-id=&quot;2496&quot; style=&quot;display: none !important;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2495&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2493&quot;&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;European politics has seen a steady change in it. The sun that never set in the land of Britain is now in a continuous struggle to rise. It took almost three and a half years after Britain’s referendum to leave the European Union and in this&amp;nbsp;“the role of the coalition government was very crucial that collectively set to formulate the British foreign policy.”&amp;nbsp;The British ambition to lead Europe and&amp;nbsp;“the government vision for Global Britain has been a driving force of Brexit.”&amp;nbsp;The UK has always taken a leading role to respond to all the challenges and making out the best for the country. However, this role has been seriously affected by certain entities such as states, non-states, and other actors. Thus, with the changing dynamics of global politics and the rising role of other actors, the states are in a continuous need to secure their national interests. Though in starting it will face certain hurdles but then Britain aspires to be a great power that is independent and that has the sole decision-making authority in Europe. According to the UK’s Foreign Secretary&amp;nbsp;“The UK as a force of good will be leading the world”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2492&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2490&quot;&gt;&lt;span data-dcnode-id=&quot;2491&quot; instrument_node=&quot;&quot;&gt;Impacts on European Union, Future Prospects for the EU and Britain and the Significance of European Union is discussed under.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2489&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2487&quot;&gt;&lt;span data-dcnode-id=&quot;2488&quot; instrument_node=&quot;&quot;&gt;After the United Kingdom formally left the EU on 31 Jan 2020, it entered the transition period. It will only be a party to a single market and the customs union. Now under these circumstances, the UK will continue its relations with the European Union for some time and will also decide the future course of action in terms of trade and security.&amp;nbsp;“The need for a transition period is because it will provide time for that new relationship to be agreed while ensuring that business will only need to adapt to non-European Union rules once the future deal is agreed.”&amp;nbsp;Now, the transition period is not only necessary for the United Kingdom&amp;nbsp; only, but it will also be equally important for the EU. Both will be serious to chalk down future partnerships and collaborations. &amp;nbsp;Thus, they will put them in place when the transition period ends. The UK first needs to negotiate with the European Union on free trade agreements. It would want free trade and a tariff-free agreement where all the trade barriers must be removed. It needs to devise a strategy based on “level playing field rules but it is also necessary to note that all the checks and balances will not be removed.”&amp;nbsp;&amp;nbsp;The United Kingdom needs to think and needs to plan out in all directions. It also needs to pen down all the terms and conditions before trading with all other nations, either be it the European Union, United states, China, Australia, and other nations around the globe. And this we have seen in their much popular slogan of Global Britain.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2486&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2484&quot;&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;There was a mixed sort of reaction to Brexit. For Britain, the European Union was just a shackle from which it freed itself. And for states like France, it was a historic alarm that may threaten the European bloc. Whereas Italy still wants to strengthen its relations with the United Kingdom and calls for a&amp;nbsp;“strategic and privileged partnership”. “As Britain is moving away from current arrangements it will be very uncertain that how Britain will devise new arrangements and whether they will be successful or not?”&amp;nbsp;The European Union will always remain a centerpiece of the United Kingdom’s foreign relations. After Brexit, the UK’s foreign and security policy has remained uncertain and no government official has spoken properly on it. The UK needs to play smart to achieve turn its ambition of Global Britain into reality. It needs to recalibrate its structural, trade policy, developmental and immigration, foreign and fiscal policies. The Brexit is a step taken by the UK to reorder its prestige and has instilled a new wave of neo-nationalism in the entire region that may be disastrous for the whole continent.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;mailmunch-forms-in-post-middle&quot; data-dcnode-id=&quot;2483&quot; style=&quot;display: none !important;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2480&quot;&gt;&lt;span data-dcnode-id=&quot;2481&quot; instrument_node=&quot;&quot;&gt;The United Kingdom&amp;nbsp; was a member of the world’s largest organization and now it had an exit so it is important to know the consequences of this action and it is addressing the questions like what is the future of Britain after Brexit and also its relationships with the European Union. If it is going to get a more bright future and going to be more developed and well economically, politically, and strategically, and if it is going to make its market or cooperation broad across the world then it is possible that some other members can also exit. Britain has many options after Brexit. One option is ‘doing a Norway’ and joining the European Economic Area. This would minimize the trade costs of Brexit, but it would mean paying about 83% as much into the European Union&amp;nbsp; budget as the United Kingdom&amp;nbsp; currently does. It would also require keeping current European Union&amp;nbsp; regulations (without having a seat at the table when the rules are decided). Another option is ‘doing a Switzerland’ and negotiating bilateral deals with the European Union. Switzerland still faces regulation without representation and pays about 40% as much as the United Kingdom to be part of the single market in goods. But the Swiss have no agreement with the European Union on free trade in services, an area where the UK is a major exporter. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2477&quot;&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;A further option is going it alone as a member of the World Trade Organization. This would give the United Kingdom more sovereignty at the price of less trade and a bigger fall in income, even if the United Kingdom were to abolish tariffs completely. Brexit would allow the United Kingdom&amp;nbsp; to negotiate its trade deals with non-European Union&amp;nbsp; countries. But as a small country, the United Kingdom&amp;nbsp; would have less bargaining power than the European Union. Canada’s trade deals with the United States show that losing this bargaining power could be costly for the United Kingdom. To make an informed decision on the merits of leaving the European Union, voters need to know more about what the UK government would do following Brexit. This is the first in a series of briefings analyzing the economic costs and benefits of Brexit for the United Kingdom.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2476&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2474&quot;&gt;&lt;span data-dcnode-id=&quot;2475&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;It is unlikely that Brexit might lead to the disintegration of the European Union. It is because Britain was partially integrated into European Union and it had its currency. Second, European Union has a quota for British citizens for employment, and now that quota will be provided to the people from member countries and it will build the confidence of people in the European Union.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2473&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;mvp-post-add-img left relative&quot; data-dcnode-id=&quot;1940&quot;&gt;&lt;span data-dcnode-id=&quot;1943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;&quot; class=&quot;attachment- size- wp-post-image&quot; data-dcnode-id=&quot;1942&quot; height=&quot;577&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 820px) 100vw, 820px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2019/03/venice-italy.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2019/03/venice-italy.jpg 820w, https://moderndiplomacy.eu/wp-content/uploads/2019/03/venice-italy-600x422.jpg 600w, https://moderndiplomacy.eu/wp-content/uploads/2019/03/venice-italy-300x211.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2019/03/venice-italy-768x540.jpg 768w&quot; width=&quot;820&quot;&gt;&lt;span data-dcnode-id=&quot;1941&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mvp-post-add-cont left relative&quot; data-dcnode-id=&quot;1846&quot;&gt;&lt;span data-dcnode-id=&quot;1937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mvp-post-add-main right relative&quot; data-dcnode-id=&quot;1857&quot;&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mailmunch-forms-before-post&quot; data-dcnode-id=&quot;1935&quot; style=&quot;display: none !important;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1932&quot;&gt;&lt;span data-dcnode-id=&quot;1933&quot; instrument_node=&quot;&quot;&gt;Although Italy has kept a low-profile in the global affairs, it is one of the major member states of the United Nations, the NATO and then the European Union. It is also one of the major economies of the world since it joins the G-7 group which is seen as the “rich nations club” of the globe. Historically, as historian Norman Davies argued, “The Renaissance which was originated from Italy was the spiritual force that cracked the mold of medieval civilization, setting in motion the long process of disintegration which gradually gave birth to modern Europe.” In terms of the EU evolution, Italy has played a pivotal role from drafting The Treaty of Rome to balancing the equilibrium between France and Germany, the dual-engines of the European Union.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1929&quot;&gt;&lt;span data-dcnode-id=&quot;1930&quot; instrument_node=&quot;&quot;&gt;Since the Russo-Ukrainian war started two months ago, the EU has followed the fiat of the United States to impose all kinds of sanctions on Russia. As a major member state of the EU, Italy has to act in line with shared principle that the EU stands united in its solidarity with Ukraine and provides Ukraine and its people with political, financial, humanitarian and all sorts of weapons as well. For example, during his visit to Kiev, the head of European diplomacy, Josep Borrel, reiterated that the war would be resolved not through negotiations, but on the battlefield. His remarks are totally opposite to the spirit of European classic diplomacy referring to negotiation, persuasion, compromise and the use of force only as the last resort in case.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1926&quot;&gt;&lt;span data-dcnode-id=&quot;1927&quot; instrument_node=&quot;&quot;&gt;Prior to the war in Ukraine, Italy has supported the agenda of “the Greater Europe” that is open to welcome Russia as a partner or associate with the EU and the NATO as well. In terms of economic ties, Italy was the second largest trade partner of Russia in Europe. It is noted that Italy has paid a great deal of attention to the relations with Russia, including seeing Russia and a major power of the world in terms of military, politics and particularly energy. Yet, since the war broke out, the U.S., the NATO and the EU have been extremely hostile to Russia and Putin particularly.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1923&quot;&gt;&lt;span data-dcnode-id=&quot;1924&quot; instrument_node=&quot;&quot;&gt;Under such a scenario, it is natural for Italy to make some remarks to denounce the war in Ukraine including reducing the diplomatic staff. Yet, on April 16, Gen. Leonardo Tricarico, former chief of staff of the Italian air force and currently chairman of the think-tank Fondazione ICSA (Intelligence Culture and Strategic Analysis), put it that the Anglo-American-NATO axis has been working against peace in Ukraine. As the war keeps ongoing, the word “negotiation” has never been spoken either by U.S. President Biden nor by NATO Secretary General Stoltenberg, nor by Secretary of State Blinken, nor by U.K. Prime Minister Johnson. This is very serious and also dangerous because the first efforts to reach an agreement have occurred in a quite improbable way. It is self-evident that Biden does not want peace.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1922&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1920&quot;&gt;&lt;span data-dcnode-id=&quot;1921&quot; instrument_node=&quot;&quot;&gt;Born in 1942, Leonardo Tricarico first served in Italian military and then the NATO. After he retired from military services, Tricarico has acted as the president of ICSA with a view to creating a new-type of mechanism to coordinate security, defense and intelligence effectively. He has argued that a defensive strategy should involve immigrations crisis, terrorism and cyber security while accenting the role of laws in the international affairs. He also opines that it is unwise to exclude Russia from the comprehensive security of Europe as the NATO should be a defensive alliance.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;mailmunch-forms-in-post-middle&quot; data-dcnode-id=&quot;1919&quot; style=&quot;display: none !important;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1918&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1916&quot;&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;However, it is apparent that since the war started, Russia and Ukraine began to hold talks on a peace deal. Even though, the EU, the NATO and particularly Anglo-American axis have never made serious efforts for a major structuring of negotiations. Gen. Tricarico observed that if the West reviews all public and non-public statements involved, the world can’t find words such as ‘negotiation’ or ‘ceasefire.’ Evidently, they do not want peace. If Biden does not want peace, nobody else wants it, because Stoltenberg is the direct resonance room for Biden and the British are even more aggressive and imperative than the Americans. This is the reality and it is useless to dance around it: Biden wants “Putin in the dust.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1913&quot;&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;However, the ongoing Russia-Ukraine war has shaken relations between global powers beyond Europe. On the one hand, Washington has threatened Beijing with sanctions should the latter decide to aid Russia. China, on the other hand, has noticed intensifying US official interactions with Taiwan with consistent provocations from the United States, which has intended with Japan’s complicity to start a new hotspot between Chinese mainland and Taiwan. Actually, Shinzo Abe has appealed to station of U.S. nuclear weapons in Japan in case of the Taiwan crisis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1910&quot;&gt;&lt;span data-dcnode-id=&quot;1911&quot; instrument_node=&quot;&quot;&gt;In sum, the war in Ukraine is more widely seen as marking the end of the long peace that followed the end of the Cold War. The U.S. primacy and unipolar world order will be challenged by more military powers or economic centers. It is true that neither Russia nor China is strong enough to openly resist the United States, yet Beijing and Moscow will be more interdependent with each other simply because the U.S.-led NATO has expanded eastwards with scant regard for Russian concerns. Now it is much more difficult if Russia succeeds in incorporating the Donetsk and Luhansk as a land bridge to Crimea. Looking into a near future, no country can save Europe except itself but the precondition is that the EU must be independent from the yoke of the United States. To that end, the dual-driving forces of France and Germany seem insufficient since the EU needs more member states to hold strategic responsibility. Italy is sure to be expected to do something to broker a peace deal if it could and particularly act to fight against the savage vandalism of Europe now which has discriminated Russian culture outrageously.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1909&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mailmunch-forms-after-post&quot; data-dcnode-id=&quot;1908&quot; style=&quot;display: none !important;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;sharedaddy sd-sharing-enabled&quot; data-dcnode-id=&quot;1866&quot;&gt;&lt;div class=&quot;robots-nocontent sd-block sd-social sd-social-icon sd-sharing&quot; data-dcnode-id=&quot;1867&quot;&gt;&lt;h3 class=&quot;sd-title&quot; data-dcnode-id=&quot;1906&quot;&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;Share this:&lt;/span&gt;&lt;/h3&gt;&lt;div class=&quot;sd-content&quot; data-dcnode-id=&quot;1868&quot;&gt;&lt;ul data-dcnode-id=&quot;1869&quot; data-sharing-events-added=&quot;true&quot;&gt;&lt;li class=&quot;share-twitter&quot; data-dcnode-id=&quot;1901&quot;&gt;&lt;a class=&quot;share-twitter sd-button share-icon no-text&quot; data-dcnode-id=&quot;1902&quot; data-shared=&quot;sharing-twitter-51296&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/2022/04/21/italy-acting-a-more-constructive-role-in-eu-strategic-autonomy/%3Fshare%3Dtwitter%26nb%3D1&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot; title=&quot;Click to share on Twitter&quot;&gt;&lt;span data-dcnode-id=&quot;1905&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sharing-screen-reader-text&quot; data-dcnode-id=&quot;1903&quot;&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;Click to share on Twitter (Opens in new window)&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;share-facebook&quot; data-dcnode-id=&quot;1896&quot;&gt;&lt;a class=&quot;share-facebook sd-button share-icon no-text&quot; data-dcnode-id=&quot;1897&quot; data-shared=&quot;sharing-facebook-51296&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/2022/04/21/italy-acting-a-more-constructive-role-in-eu-strategic-autonomy/%3Fshare%3Dfacebook%26nb%3D1&quot &lt;/span&gt;&lt;div class=&quot;mvp-post-add-img left relative&quot; data-dcnode-id=&quot;1779&quot;&gt;&lt;span data-dcnode-id=&quot;1782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;&quot; class=&quot;attachment- size- wp-post-image&quot; data-dcnode-id=&quot;1781&quot; height=&quot;546&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 820px) 100vw, 820px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2020/02/european-union.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2020/02/european-union.jpg 820w, https://moderndiplomacy.eu/wp-content/uploads/2020/02/european-union-600x400.jpg 600w, https://moderndiplomacy.eu/wp-content/uploads/2020/02/european-union-300x200.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2020/02/european-union-768x511.jpg 768w&quot; width=&quot;820&quot;&gt;&lt;span data-dcnode-id=&quot;1780&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1777&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mvp-post-add-cont left relative&quot; data-dcnode-id=&quot;1665&quot;&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mvp-post-add-main right relative&quot; data-dcnode-id=&quot;1676&quot;&gt;&lt;span data-dcnode-id=&quot;1775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mailmunch-forms-before-post&quot; data-dcnode-id=&quot;1774&quot; style=&quot;display: none !important;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1771&quot;&gt;&lt;span data-dcnode-id=&quot;1772&quot; instrument_node=&quot;&quot;&gt;Even if for Russia the events in Ukraine constitute a special military operation aimed at placing this territory in a state which does not pose a threat to its survival and development, then for the European Union it is, of course, about a full-scale struggle, and only the fear of Russian nuclear weapons prevents it from becoming fully engaged.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1768&quot;&gt;&lt;span data-dcnode-id=&quot;1769&quot; instrument_node=&quot;&quot;&gt;This, in fact, is not surprising — by its actions, Moscow has destroyed the possibility of completing the construction of an order in Europe, in which its leading powers would occupy a central place. Therefore, even if the results of the military crisis turn out to be insufficiently optimal from the point of view of Russian interests, the united Europe in any event faces serious challenges, the answer to which also does not even seem relatively clear yet.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1765&quot;&gt;&lt;span data-dcnode-id=&quot;1766&quot; instrument_node=&quot;&quot;&gt;The noteworthy statement by the High Representative of the European Union for Foreign Affairs Borrell that “the war will be won on the battlefield” made many observers in Russia reflect on what, in fact, European integration is now, and in what direction we can expect its further development amid the new conditions. And it would probably be an oversimplification to believe that the European Union has now turned into an “economic department of NATO”, performing only auxiliary functions in relation to the bloc, which is the central instrument of US policy in the western part of Eurasia. First of all, because the future of this association seems to be no less diverse than the prospects of all, including the most powerful participants in the current struggle.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1762&quot;&gt;&lt;span data-dcnode-id=&quot;1763&quot; instrument_node=&quot;&quot;&gt;The key issue for us is the relationship between the conflict with Russia and the development of Europe itself. Unlike the United States, Russia or China, modern Europe is not a single participant in international politics. Therefore, any significant international event or process is important in these cases, precisely in their relationship with the internal development of the group, and its ability to ensure the interests of the participating countries in the best possible way.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1759&quot;&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;It must be understood that even the most intense military-political confrontation with Russia will not be able to solve the internal problems of the European Union, accumulated over decades of successful integration, as well as those that arose in its less brilliant period after 2008. This, at the very least, would contradict linear logic, which sometimes turns out to be true. The case here is that the most famous historical examples of integration success were associated with fundamentally different external conditions. First, we should talk about the initial stages of cooperation between the countries of Western Europe in the second half of the 20th century. Second, about the decisive breakthrough in integration after the end of the Cold War, when, in fact, the foundation was laid for many of the internal contradictions that it is now experiencing. In both cases, Russia (or the USSR) was of paramount importance, either as a threat to push for more internal action, or as a prime target for a friendly, long-term takeover.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1758&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1756&quot;&gt;&lt;span data-dcnode-id=&quot;1757&quot; instrument_node=&quot;&quot;&gt;It is no secret to anyone who is seriously interested in the history of European integration that the European Economic Community, since its inception in 1958, has not been a gathering of vegetarians as far as their relationship to the outside world was concerned. The main practical tasks of the association were to support the efforts of national governments to create economic conditions for successful competition with the USSR and its allies in Eastern Europe, as well as to create conditions for the relations of the former colonial powers with their abandoned possessions in Africa and Asia; conditions that could not differ much from the previous ones. In a number of cases this was impossible to do, but for the most part, the EU institutions coped quite well with this task.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1755&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1753&quot;&gt;&lt;span data-dcnode-id=&quot;1754&quot; instrument_node=&quot;&quot;&gt;Since the very beginning of the Cold War, the USSR presented a challenge to the countries of Western Europe on such a scale that it could only be answered through joint efforts. First of all, in the field of improving the quality of life of their own citizens and reducing the temptation for Europeans to vote for left-wing parties which enjoyed support from Moscow. Since the USSR, for quite a long time, was indeed an alternative to the socio-economic order that dominated Europe, the efforts to integrate economies within the framework of the EEC were indeed aimed at solving an existential problem.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1752&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1750&quot;&gt;&lt;span data-dcnode-id=&quot;1751&quot; instrument_node=&quot;&quot;&gt;In practical terms, the European Community and its executive bodies until the mid-1980s pursued a rather aggressive policy towards the USSR and its interests in those issues that were within their reach. This did not, of course, prevent individual EEC countries from entering into cooperation with Moscow in those areas where it was really beneficial for them on a bilateral basis. However, in all other respects, as is known from documents and academic works of that time, the activities of the Commission of the European Communities regarding the East were consistently restrictive and aimed to cut off the USSR from any opportunity to use the internal market that the Europeans were building for their own development.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;mailmunch-forms-in-post-middle&quot; data-dcnode-id=&quot;1749&quot; style=&quot;display: none !important;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1746&quot;&gt;&lt;span data-dcnode-id=&quot;1747&quot; instrument_node=&quot;&quot;&gt;This also applied to trade, with the exception of a very limited number of goods and technologies, and in general everything that could benefit the USSR or the Council for Mutual Economic Assistance. In this sense, it would be interesting now to compare the measures that the EU countries are introducing against Russia in the form of “sanctions” with restrictive mechanisms that they created between 1961 and 1989. Thus, the practical actions of the institutions of European integration, which were supported by the participating countries, were offensive and provided additional opportunities for Western Europe in the framework of global competition with the socialist bloc and its leader.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1745&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1743&quot;&gt;&lt;span data-dcnode-id=&quot;1744&quot; instrument_node=&quot;&quot;&gt;The second period in the development of European integration is the era after the Cold War, when colossal opportunities really opened up before its main participants. Russia, like the rest of the countries of the former socialist camp, acted during this period as a space for resource development. Of course, Europe had to share the most attractive opportunities for this development with the United States, but strategically, nevertheless, it was within the sphere of European influence. It was with this state of affairs that the incredible scale of the mutual openness of the European and Russian markets was connected, which continued until very recently. It must be emphasised that all the privileges that Russia had and which have now disappeared were due to the general strategy of relations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1740&quot;&gt;&lt;span data-dcnode-id=&quot;1741&quot; instrument_node=&quot;&quot;&gt;It would be a mistake to think that these privileges were connected only with the current attractiveness of Russia as a market — they were much more dependent on the general political format of relations, aimed at integration in the long term. Now these relations have returned to hostility and, accordingly, all ties that are not really of fundamental importance for the EU countries are being curtailed. However, so far this is only a reaction to the fact that Russia’s behaviour may deprive a united Europe of a very important potential source of resources for development — Russia itself.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1737&quot;&gt;&lt;span data-dcnode-id=&quot;1738&quot; instrument_node=&quot;&quot;&gt;The goal of the actions of the countries of the European Union with regard to the Ukrainian issue is by no means Ukraine itself — that country simply does not have the appropriate resources. The real problem is that Russia, by its actions, can build a clear dividing line on its Western borders, which will very likely be much more difficult to cross than it seemed a few months ago. The on-going conflict may well lead to a long-term separation of Russia from Europe within the framework of a world disintegrating into economic blocs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1734&quot;&gt;&lt;span data-dcnode-id=&quot;1735&quot; instrument_node=&quot;&quot;&gt;In the event that this happens, and the Russian state proves to be resilient to the many challenges that it already faces and will face in the near future, Russia may indeed cease to be part of Europe. Therefore, for the European states, it is now becoming a really critical task to prevent Russia from winning in Ukraine and survive in the associated economic war — this will deprive Europe of the most important potential source of resources and geographical space. In this sense, they have quite adequately determined the priority of current goals in their relationship with the fate of European integration.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1733&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;mvp-post-add-main right relative&quot; data-dcnode-id=&quot;1092&quot;&gt;&lt;span data-dcnode-id=&quot;1594&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mailmunch-forms-before-post&quot; data-dcnode-id=&quot;1593&quot; style=&quot;display: none !important;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1590&quot;&gt;&lt;span data-dcnode-id=&quot;1591&quot; instrument_node=&quot;&quot;&gt;Authors: Alexander G. Savelyev and Olga M. Alexandria*&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1587&quot;&gt;&lt;span data-dcnode-id=&quot;1588&quot; instrument_node=&quot;&quot;&gt;The strategic stability concept was created in the United States after it had become absolutely clear that a nuclear war between the USSR and the U.S. would inevitably lead to their complete destruction. This concept is based on the nuclear deterrence policy, which was also devised in the United States at the dawn of the nuclear era and designed to show the U.S. ability to deliver a crushing nuclear strike in the event of a possible adversary’s aggression against America or its allies. But as the strategic arsenals of the two sides equalized, it became absolutely clear that each of them was capable of inflicting unacceptable damage on each other even after absorbing a counter-force attack. Therefore, nuclear war becomes senseless as it will inevitably end in complete destruction of the warring parties.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1584&quot;&gt;&lt;span data-dcnode-id=&quot;1585&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; At first, the Soviet Union and the United States (and then Russia and the U.S.) agreed, informally and later in official nuclear arms control agreements, to maintain the situation of “mutual destruction,” which essentially served as a basis for the strategic stability concept. In June 1990, the sides reached a common understanding of this term. They defined strategic stability as the balance of strategic nuclear forces that rules out incentives for any party to launch a nuclear first strike. The parties did not specify what exactly they meant by such incentives. Nevertheless, based on the overall context of the nuclear deterrence concept, most experts concluded that it could be the acquisition by one side of the ability to launch a disarming first strike.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1581&quot;&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; The set of factors that could influence strategic stability in its initial interpretation was quite limited: it implied only those of them that affect the ability to deliver a first strike and a retaliatory strike. Apart from quantitative and qualitative characteristics of strategic offensive weapons, such factors also include missile defense, antisubmarine defense, and air defense. The Soviet Union and the United States officially recognized the special influence of missile defense on strategic stability and in 1972 concluded an open-ended ABM Treaty, thereby sharply limiting the negative impact of this factor.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1578&quot;&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; As new weapons appeared, including more effective non-nuclear ones, many experts began to say that the new systems could have a serious impact on strategic stability as well. They include strategic non-nuclear systems, precision weapons, primarily non-nuclear global strike weapons, space weapons (if any), and others.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1575&quot;&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;Simultaneously, the term ‘strategic stability’ itself began to be interpreted more broadly. As a result, in many cases, strategic stability became almost synonymous with security, and the range of factors that can affect strategic stability in this interpretation has expanded dramatically. This process is characteristic not only of Russia, but also of the United States and other Western countries. As for China, the term ‘strategic stability’ is not used at all, at least in official rhetoric.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1572&quot;&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt;Such a “broad” approach did not negate the original interpretation of the term ‘strategic stability’ based on the nuclear deterrence concept. As before, this term is used by the professional community when negotiating and evaluating agreements on strategic nuclear weapons, with its almost identical understanding by all parties involved, primarily Russia and the United States.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1569&quot;&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; From our point of view, the “broad” understanding of strategic stability should mean the “sustainability of political-military relations” between both states and their associations. It is difficult to say why the term ‘strategic stability’ came into use instead. Apparently, it turned out to be so handy and attractive that its use in relation to the political and military situation in various areas and regions of the world was considered quite justified not only by Russian, but also by many Western politicians and experts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1566&quot;&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Our survey did not seek to find out what interpretation of strategic stability prevails in the Russian expert community, and what point of view each of the interviewed experts holds. We consider that it is much more important to identify the factors that affect strategic stability at present and will affect it in the foreseeable future, as well as ways to strengthen security and stability in any of the above interpretations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1565&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1562&quot;&gt;&lt;strong data-dcnode-id=&quot;1563&quot;&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;Methods and Composition of the Expert Group&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1559&quot;&gt;&lt;span data-dcnode-id=&quot;1560&quot; instrument_node=&quot;&quot;&gt;Expert surveys use various, often unique, methods. Some of them are created exclusively for a specific case study. Nevertheless, there are some universal guiding principles. This particular survey used an integrated approach, which, in our opinion, proved most effective.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1556&quot;&gt;&lt;span data-dcnode-id=&quot;1557&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; A special questionnaire was drawn up for this survey and sent to each expert individually. The experts did not know who else was participating in the survey or how many people were to be polled. The questionnaire contained questions that each expert had to answer in consecutive order. It also provided sample tables. The survey mainly took place in absentia, but some of the experts were interviewed in person. Their questionnaires were filled in during the interview which was conducted using the standard method. The multi-stage (Delphic) method was not used.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1555&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Experts were selected individually on the basis of open information about their qualifications and authority. The group included leading Russian specialists, with many years’ professional experience in the international security field. The initial plan was that twenty-four experts would take part in the survey, but four of them could not participate for various reasons. The survey was conducted on condition of anonymity, and no names of the experts will appear in this article. However, we must say that the majority of the experts involved have academic degrees (five hold doctoral and thirteen candidate degrees). At least a third of the twenty experts have practical experience in conducting official arms control negotiations, and have worked in various Soviet and Russian military and civilian bodies (Foreign or Defense Ministry). In particular, four of them have the military rank of general. During the survey, the experts gave detailed answers to the questions asked, which allows the authors to make a number of generalizations and conclusions that sufficiently reflect the views of a significant part of the Russian military-political elite on one of the most pressing security issues, that is, the need to strengthen strategic stability.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1550&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; It should be emphasized that Russian experts were invited to participate in the survey regardless of their political views. The selection was based on their professional experience, authority in academic, military, and political circles in Russia and abroad, and a high level of their expertise. With this regard we believe that the conclusions and recommendations presented in this work generally reflect the opinion of the Russian professional expert community on important security and strategic stability issues.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1546&quot;&gt;&lt;strong data-dcnode-id=&quot;1547&quot;&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt;Factors affecting strategic stability&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1543&quot;&gt;&lt;span data-dcnode-id=&quot;1544&quot; instrument_node=&quot;&quot;&gt;According to the results of the survey, experts identified twenty different factors which they believe affect strategic stability at present or will affect it in the future. In fact, more such factors were named, but we combined answers that looked similar in order to systematize the data. For example, the “High-precision weapons group” also included “rapid global strike weapons” and “hypersonic weapons,” and the Ukraine factor was incorporated into the “Growing conflict intensity between leading world powers” group.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1540&quot;&gt;&lt;span data-dcnode-id=&quot;1541&quot; instrument_node=&quot;&quot;&gt;During the survey, each of the experts (with only one exception) named three to ten factors that, to his opinion, affect strategic stability. At the same time, the majority cited from six to seven such factors. In total, nineteen out of twenty experts named 127 factors, which in most cases were identical in different answers. Only one respondent believes that there will be no threats to strategic stability in the foreseeable future, and there are no factors that can motivate countries to use nuclear weapons. At the same time, he thinks that the risk of the use of nuclear weapons remains, but solely due to a combination of accidental events and technical failures.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1537&quot;&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;Most often the factor of space weapons was mentioned (90% of experts). Precision weapons (including rapid global strike and hypersonic weapons) rank second with 85%. They are followed by missile defense (ABM) and cyber weapons (both factors were mentioned by 80% of respondents), third-country nuclear weapons (75%), and non-strategic nuclear weapons (75%). The remaining factors were named by less than half of the experts polled. According to 40% of the survey respondents, the most significant of them are various interpretations of growing conflict intensity between leading countries, primarily Russia and the U.S. and NATO, the U.S. and China, and the West and the East (see Fig. 1).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-block-image size-full&quot; data-dcnode-id=&quot;1534&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;wp-image-51179&quot; data-dcnode-id=&quot;1535&quot; height=&quot;325&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 642px) 100vw, 642px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2022/04/fig1.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig1.jpg 642w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig1-300x152.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig1-600x304.jpg 600w&quot; width=&quot;642&quot;&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1531&quot;&gt;&lt;span data-dcnode-id=&quot;1532&quot; instrument_node=&quot;&quot;&gt;The above picture will be incomplete unless we consider the experts’ responses in terms of the importance of each factor. Space weapons top the list. Nine out of eighteen experts who included this factor in the list named their major impact on strategic stability. Two experts put space weapons in second place, three in fourth place, one in fifth place, and three in sixth place.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1528&quot;&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt;Only one expert named precision weapons as the main factor affecting strategic stability. Three experts put this factor in second place, seven in fourth place, four in fifth place, and two in eighth place. None of the experts considered missile defense to be the main factor influencing strategic stability. Only one respondent put missile defense in second place, three in third place, eight in fifth place, three in sixth place, and one in ninth place. Only one expert mentioned antisubmarine defense (third place), and no one named air defense.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1525&quot;&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Two experts ranked cyber weapons third―the highest position in this group. Three experts put this factor in fourth place, one in fifth, eight in sixth, and two in seventh place. Only one expert named third-country nuclear weapons as the main factor affecting strategic stability. Nine respondents ranked them second, one put them in third place, one in fourth place, one in fifth place, and as many put them in seventh and eighth places. Non-strategic nuclear weapons received two first places, one second place, seven third places, four fourth places, and one seventh place.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1524&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1522&quot;&gt;&lt;span data-dcnode-id=&quot;1523&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Growing conflict intensity between leading world powers was noted as the main factor affecting strategic stability by four experts. One expert put this factor in second place, and one gave it third place. The Ukraine conflict received one first place and one third place.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1519&quot;&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Our preliminary conclusion is that, in terms of quantitative indicators, space weapons are the most important factor that, according to leading Russian experts, affects strategic stability. This factor ranks first both in terms of the total number of references and the number of answers that put it at the top of the list. The quantitative distribution of the other positions does not clearly indicate the importance of the other factors mentioned by the experts. In this case, everything depends on the chosen evaluation methods.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1516&quot;&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; For example, judging by the total number of references (as mentioned above), high-precision weapons should be followed by space weapons, then missile defense and cyber weapons, third-country nuclear weapons and non-strategic nuclear weapons. But if the list of factors is drawn up according to the ranking by the degree of importance (the number of first places), then the picture will change quite dramatically (Fig. 2). Space weapons will remain in first place (nine first places), but the second position will be occupied by growing conflict intensity between leading world powers (five first places). They are followed by non-strategic nuclear weapons (two first places), and four other factors, each holding one first place (third-country nuclear weapons, precision weapons, agreements on strategic offensive weapons, the crisis of the system of international institutions). At the same time, missile defense and cyber weapons, which were never put at the top, fall out of the first part of the list.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-block-image size-full&quot; data-dcnode-id=&quot;1513&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;wp-image-51180&quot; data-dcnode-id=&quot;1514&quot; height=&quot;338&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 614px) 100vw, 614px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2022/04/fig2.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig2.jpg 614w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig2-300x165.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig2-600x330.jpg 600w&quot; width=&quot;614&quot;&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1510&quot;&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;We considered that further specification in determining key factors among those that have the greatest impact on strategic stability, for example, by ranking them according to the average position assigned to them by the experts, would be redundant and even misleading. This would distort the overall picture, since the least often mentioned factors but holding top positions would have an advantage. Therefore, in this case more informative will be analyzing the received results qualitatively by examining these factors in terms of their impact on strategic stability as assessed by Russian experts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1506&quot;&gt;&lt;strong data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;THE IMPACT OF INDIVIDUAL FACTORS ON STRATEGIC STABILITY&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1503&quot;&gt;&lt;span data-dcnode-id=&quot;1504&quot; instrument_node=&quot;&quot;&gt;As mentioned above, the experts assessed how the factors they named will impact strategic stability in 2022, 2026, and 2036. The summary data based on their responses are given in Table 1 and Graphs showing the dynamics of each factor’s impact on strategic stability.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1499&quot;&gt;&lt;strong data-dcnode-id=&quot;1500&quot;&gt;&lt;span data-dcnode-id=&quot;1501&quot; instrument_node=&quot;&quot;&gt;Table 1. Impact of individual factors on strategic stability in 2022, 2026, and 2036, %&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1498&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-block-table is-style-regular&quot; data-dcnode-id=&quot;1398&quot;&gt;&lt;table data-dcnode-id=&quot;1399&quot;&gt;&lt;tbody data-dcnode-id=&quot;1400&quot;&gt;&lt;tr data-dcnode-id=&quot;1478&quot;&gt;&lt;td data-dcnode-id=&quot;1495&quot;&gt;&lt;strong data-dcnode-id=&quot;1496&quot;&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;Factor/Year&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1492&quot;&gt;&lt;strong data-dcnode-id=&quot;1493&quot;&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1487&quot;&gt;&lt;strong data-dcnode-id=&quot;1490&quot;&gt;&lt;span data-dcnode-id=&quot;1491&quot; instrument_node=&quot;&quot;&gt;2022&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1489&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1488&quot;&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1483&quot;&gt;&lt;strong data-dcnode-id=&quot;1485&quot;&gt;&lt;span data-dcnode-id=&quot;1486&quot; instrument_node=&quot;&quot;&gt;2026&lt;/span&gt;&lt;/strong&gt;&lt;strong data-dcnode-id=&quot;1484&quot;&gt;&lt;/strong&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1479&quot;&gt;&lt;strong data-dcnode-id=&quot;1481&quot;&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;2036&lt;/span&gt;&lt;/strong&gt;&lt;strong data-dcnode-id=&quot;1480&quot;&gt;&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1467&quot;&gt;&lt;td data-dcnode-id=&quot;1476&quot;&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;Space weapons&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1474&quot;&gt;&lt;span data-dcnode-id=&quot;1475&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1472&quot;&gt;&lt;span data-dcnode-id=&quot;1473&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1470&quot;&gt;&lt;span data-dcnode-id=&quot;1471&quot; instrument_node=&quot;&quot;&gt;20&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1468&quot;&gt;&lt;span data-dcnode-id=&quot;1469&quot; instrument_node=&quot;&quot;&gt;60&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1456&quot;&gt;&lt;td data-dcnode-id=&quot;1465&quot;&gt;&lt;span data-dcnode-id=&quot;1466&quot; instrument_node=&quot;&quot;&gt;Precision weapons, including rapid global strike and hypersonic weapons&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1463&quot;&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1461&quot;&gt;&lt;span data-dcnode-id=&quot;1462&quot; instrument_node=&quot;&quot;&gt;15&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1459&quot;&gt;&lt;span data-dcnode-id=&quot;1460&quot; instrument_node=&quot;&quot;&gt;35&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1457&quot;&gt;&lt;span data-dcnode-id=&quot;1458&quot; instrument_node=&quot;&quot;&gt;55&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1445&quot;&gt;&lt;td data-dcnode-id=&quot;1454&quot;&gt;&lt;span data-dcnode-id=&quot;1455&quot; instrument_node=&quot;&quot;&gt;Missile defense&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1452&quot;&gt;&lt;span data-dcnode-id=&quot;1453&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1450&quot;&gt;&lt;span data-dcnode-id=&quot;1451&quot; instrument_node=&quot;&quot;&gt;0&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1448&quot;&gt;&lt;span data-dcnode-id=&quot;1449&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;1446&quot;&gt;&lt;span data-dcnode-id=&quot;1447&quot; instrument_node=&quot;&quot;&gt;20&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1434&quot;&gt;&lt;td data-dcn
