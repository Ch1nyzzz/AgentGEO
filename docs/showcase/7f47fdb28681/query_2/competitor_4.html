&lt;/span&gt;&lt;figure class=&quot;wp-block-image size-full&quot; data-dcnode-id=&quot;1386&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;wp-image-51184&quot; data-dcnode-id=&quot;1387&quot; height=&quot;288&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 480px) 100vw, 480px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2022/04/fig6.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig6.jpg 480w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig6-300x180.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig6-400x240.jpg 400w&quot; width=&quot;480&quot;&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;1385&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-block-image size-full&quot; data-dcnode-id=&quot;1383&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;wp-image-51185&quot; data-dcnode-id=&quot;1384&quot; height=&quot;292&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 480px) 100vw, 480px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2022/04/fig7.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig7.jpg 480w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig7-300x183.jpg 300w&quot; width=&quot;480&quot;&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-block-image size-full&quot; data-dcnode-id=&quot;1380&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;wp-image-51186&quot; data-dcnode-id=&quot;1381&quot; height=&quot;288&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 480px) 100vw, 480px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2022/04/fig8.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig8.jpg 480w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig8-300x180.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig8-400x240.jpg 400w&quot; width=&quot;480&quot;&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-block-image size-full&quot; data-dcnode-id=&quot;1377&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;wp-image-51187&quot; data-dcnode-id=&quot;1378&quot; height=&quot;288&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 480px) 100vw, 480px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2022/04/fig9.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig9.jpg 480w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig9-300x180.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig9-400x240.jpg 400w&quot; width=&quot;480&quot;&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1374&quot;&gt;&lt;span data-dcnode-id=&quot;1375&quot; instrument_node=&quot;&quot;&gt;Let us consider each year separately.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1369&quot;&gt;&lt;strong data-dcnode-id=&quot;1371&quot;&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;2022. &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1370&quot; instrument_node=&quot;&quot;&gt;The results of the survey show that the growing conflict intensity between leading world powers has the greatest impact on strategic stability at present. This impact was assessed as “significant” by all six experts who included it in their lists, regardless of its place in them. If we add up the factor of Ukraine (mentioned by two experts who marked it as “significant influence”), we will see that almost half of the experts name these factors as having the main impact on strategic stability.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1366&quot;&gt;&lt;span data-dcnode-id=&quot;1367&quot; instrument_node=&quot;&quot;&gt;Against this background, the factors that topped the lists in the quantitative analysis have noticeably lost their positions. For example, second place is held by non-strategic nuclear weapons, whose impact on strategic stability was assessed as “significant” by four experts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1363&quot;&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt;Three experts assessed the influence of precision weapons as significant. These are followed by third-country nuclear weapons (two), space weapons (one), cyber weapons (one), and missile defense, the impact of which on strategic stability was not regarded as significant by any of the experts polled.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1360&quot;&gt;&lt;span data-dcnode-id=&quot;1361&quot; instrument_node=&quot;&quot;&gt;The impact of strategic offensive weapons, including START treaties, on strategic stability was assessed as significant by all three experts who mentioned this factor.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1359&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1355&quot;&gt;&lt;strong data-dcnode-id=&quot;1357&quot;&gt;&lt;span data-dcnode-id=&quot;1358&quot; instrument_node=&quot;&quot;&gt;2026.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1356&quot; instrument_node=&quot;&quot;&gt; By 2026, several factors can significantly increase their influence on strategic stability, thus moving up to the top of the list and pushing growing conflict intensity to third place. This is, first of all, precision weapons, the influence of which this year was considered significant by seven experts. The same can be said of third-country nuclear weapons (assessed as significant by seven experts).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1354&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1352&quot;&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt;Russian experts expect the impact of growing conflict intensity between leading world powers on strategic stability to slightly decrease. And yet it will most likely remain a major factor. Five experts assessed its impact as significant. One expert expects the Ukraine factor to continue to have a significant impact on stability.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1351&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1349&quot;&gt;&lt;span data-dcnode-id=&quot;1350&quot; instrument_node=&quot;&quot;&gt;Experts noted that the influence of other factors on strategic stability will increase by 2026. These include non-strategic nuclear weapons, space weapons, cyber weapons (four experts considered the effect of each factor significant). The impact of missile defense will also slightly increase (one expert).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1348&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1344&quot;&gt;&lt;strong data-dcnode-id=&quot;1346&quot;&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;2036. &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1345&quot; instrument_node=&quot;&quot;&gt;Russian experts expect the list of the most significant factors in terms of strategic stability to change considerably by 2036. For example, space weapons and third-country nuclear weapons are expected to move up to the top of the list (twelve respondents identified it as significant). Precision weapons, which will somewhat lose their leading position since 2026, and cyber weapons will come close to them (eleven answers each).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1343&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1339&quot;&gt;&lt;span data-dcnode-id=&quot;1342&quot; instrument_node=&quot;&quot;&gt;This is followed by non-strategic nuclear weapons (seven responses). Least of all, strategic stability will be affected by missile defense and growing conflict intensity between leading world powers (four responses each). It should be noted that the fact that growing conflict intensity moves down does not mean that its impact will decrease substantially. This relocation is solely due to the fact that this factor was named by a smaller number of experts than the others. The impact of growing conflict intensity is assessed mainly as significant throughout the projected period (with the exception of the Ukraine factor, which may lose its significance or even disappear from the list of these factors in 2026).&lt;/span&gt;&lt;a data-dcnode-id=&quot;1340&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//disqus.com/embed/comments/%3Fbase%3Ddefault%26f%3Dmdiplomacy%26t_i%3D40779%2520https%253A%252F%252Fmoderndiplomacy.eu%252F%253Fp%253D40779%26t_u%3Dhttps%253A%252F%252Fmoderndiplomacy.eu%252F2021%252F03%252F24%252Feuropean-union-uk-relations-the-post-brexit-era%252F%26t_e%3DEuropean%2520Union-%2520UK%2520Relations%253A%2520The%2520Post%2520Brexit%2520Era%26t_d%3DEuropean%2520Union-%2520UK%2520Relations%253A%2520The%2520Post%2520Brexit%2520Era%26t_t%3DEuropean%2520Union-%2520UK%2520Relations%253A%2520The%2520Post%2520Brexit%2520Era%26s_o%3Ddefault%23_ftn1&quot; id=&quot;_ftnref1&quot;&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1336&quot;&gt;&lt;span data-dcnode-id=&quot;1337&quot; instrument_node=&quot;&quot;&gt;Fig. 3 shows the change expected by experts in the share of individual factors in the stated years in terms of their “significant” impact on strategic stability.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-block-image size-full&quot; data-dcnode-id=&quot;1333&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;wp-image-51188&quot; data-dcnode-id=&quot;1334&quot; height=&quot;302&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 631px) 100vw, 631px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2022/04/fig10.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig10.jpg 631w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig10-300x144.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig10-600x287.jpg 600w&quot; width=&quot;631&quot;&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1330&quot;&gt;&lt;span data-dcnode-id=&quot;1331&quot; instrument_node=&quot;&quot;&gt;As can be seen from Fig. 3, Russian experts believe that by 2036, the main factors affecting strategic stability (except for growing conflict intensity between leading world powers) can become much more significant. All this raises the question of how these factors can be taken into account in order to neutralize their negative impact on security.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1326&quot;&gt;&lt;strong data-dcnode-id=&quot;1327&quot;&gt;&lt;span data-dcnode-id=&quot;1328&quot; instrument_node=&quot;&quot;&gt;NECESSARY MEASURES TO ADDRESS FACTORS AFFECTING STRATEGIC STABILITY&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1325&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1323&quot;&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;All Russian experts noted that the factors they named as affecting strategic stability should be addressed one way or another by 2036 (see Fig. 4). As for 2026, some experts believe that by that time some factors may be ignored due to their small influence on stability. Space weapons (70% of respondents say they need to be factored in) and precision weapons (also supported by 70% of experts) top this list. They are followed by non-strategic nuclear weapons and cyber weapons (65% of the experts insisted that both factors will have to be taken into account). Finally, missile defense and third-country nuclear weapons come third (55% of respondents believe that these factors must be taken into consideration in 2026).&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;mailmunch-forms-in-post-middle&quot; data-dcnode-id=&quot;1322&quot; style=&quot;display: none !important;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1319&quot;&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; The experts offered their views on how and in what form the above factors affecting strategic stability should be dealt with in the future. These proposals include a wide range of measures and initiatives for each of the factors named. At the same time, only one of 113 recommendations implies a military-technical response to the actions of other countries, which, in the opinion of this expert, can weaken or even undermine strategic stability.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;wp-block-image size-full&quot; data-dcnode-id=&quot;1316&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;wp-image-51189&quot; data-dcnode-id=&quot;1317&quot; height=&quot;307&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 616px) 100vw, 616px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2022/04/fig11.jpg&amp;amp;raw&quot; srcset=&quot;https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig11.jpg 616w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig11-300x150.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/fig11-600x299.jpg 600w&quot; width=&quot;616&quot;&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1312&quot;&gt;&lt;strong data-dcnode-id=&quot;1313&quot;&gt;&lt;span data-dcnode-id=&quot;1314&quot; instrument_node=&quot;&quot;&gt;Third-Country Nuclear Weapons&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1309&quot;&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt;Summing up the experts’ proposals, we can note the following. It is important to achieve mutual understanding, primarily between Russia and the United States, on the nuclear arsenals of third countries. The key to solving this problem may be a trilateral dialogue between Russia, the United States, and China, with possible engagement of the other nuclear powers. It should be preceded by increased informal contacts between representatives of these countries, including through international seminars, discussions, other forums, joint projects, etc. To this end, the experts suggest using existing platforms and mechanisms for such contacts, in particular those that have been established and operate within the framework of the Treaty on the Non-Proliferation of Nuclear Weapons.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1306&quot;&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;Ultimately, all efforts should be directed if not towards drafting a multilateral treaty between the five nuclear powers (although some experts suggest such an option), then definitely towards ensuring transparency and predictability in this area. Some experts consider it important to develop a “code of conduct” in the field of nuclear weapons, and persuade individual countries to assume unilateral obligations not to increase their nuclear arsenals.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1302&quot;&gt;&lt;strong data-dcnode-id=&quot;1303&quot;&gt;&lt;span data-dcnode-id=&quot;1304&quot; instrument_node=&quot;&quot;&gt;Missile Defense&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1301&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1299&quot;&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;None of the experts insisted on the restoration of severe ABM restrictions provided for in the 1972 Treaty. In rare cases, a “light” version of this treaty was proposed, with partial restrictions on certain ABM parameters. Some experts believe that the missile defense issue can be addressed through a trilateral U.S.-Russian-Chinese dialogue as the sides move forward in discussing their nuclear arsenals. Some experts insist on linking strategic offensive arms cuts to defensive systems. Others suggest fixing such interdependence in a future START treaty (START-4), as was done in START-3.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1298&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1296&quot;&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Many experts believe it is important to develop confidence-building and predictability measures in the area of strategic defense, as well as voluntary unilateral measures of restraint in implementing relevant programs. Among direct prohibitions, experts named the advisability of reaching an agreement on the non-deployment of missile defense systems and their components in space.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1295&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1293&quot;&gt;&lt;span data-dcnode-id=&quot;1294&quot; instrument_node=&quot;&quot;&gt;In general, according to leading Russian experts, missile defense is not among major factors that affect strategic stability. Nevertheless, they believe that it should be addressed, but not under agreements imposing harsh restrictions, but rather on the basis of better mutual understanding, greater predictability, and self-restraint.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1289&quot;&gt;&lt;strong data-dcnode-id=&quot;1290&quot;&gt;&lt;span data-dcnode-id=&quot;1291&quot; instrument_node=&quot;&quot;&gt;Precision Weapons, Rapid Global Strike Systems, Hypersonic Weapons&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1286&quot;&gt;&lt;span data-dcnode-id=&quot;1287&quot; instrument_node=&quot;&quot;&gt;As mentioned above, in order to systematize the information received from the experts polled, three categories of weapons were combined into one group. In fact, only one out of twenty experts put non-nuclear rapid global strike systems and hypersonic weapons in separate categories. Therefore, the recommendations below will apply to all three arms groups combined under the name “precision weapons.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1285&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1283&quot;&gt;&lt;span data-dcnode-id=&quot;1284&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; A large part of the experts interviewed proposed to conclude agreements on certain categories of these weapons. Some believe that it would be possible to draw up a treaty covering certain categories of precision weapons. Another solution is to incorporate precision weapons capable of carrying nuclear weapons into a new START-4.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1280&quot;&gt;&lt;span data-dcnode-id=&quot;1281&quot; instrument_node=&quot;&quot;&gt;Some experts think that coordinating separate protocols, declarations and joint understandings without drafting a special treaty would be enough. This should be accompanied by increased confidence-building and transparency measures, as well as unilateral steps to address concerns about specific aspects of the introduction, deployment, and operation of precision weapons.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1277&quot;&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Only one expert suggested expanding the strategic partnership between Russia and China in this area, meaning particularly joint creation of the latest weapons for asymmetric deterrence of the United States and its NATO partners.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1273&quot;&gt;&lt;strong data-dcnode-id=&quot;1274&quot;&gt;&lt;span data-dcnode-id=&quot;1275&quot; instrument_node=&quot;&quot;&gt;Space Weapons&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1270&quot;&gt;&lt;span data-dcnode-id=&quot;1271&quot; instrument_node=&quot;&quot;&gt;Since space weapons as such do not exist yet and their control will be quite difficult (most likely, these will be dual purpose weapons), many experts did not insist on harsh restrictions in this area. The majority of experts believe that the most effective way to ensure security in this area would be agreeing on a “code of conduct” in space. Unilateral actions and commitments by states actively exploring outer space could also play a positive role.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1269&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1267&quot;&gt;&lt;span data-dcnode-id=&quot;1268&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Some of the experts insisted that the countries concerned should consider working out a legally binding agreement that would drastically restrict (prohibit) both the deployment of weapons in space and their use against space systems. This implies, first of all, a complete ban on anti-satellite weapons.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1264&quot;&gt;&lt;span data-dcnode-id=&quot;1265&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Experts believe that the development of a mechanism for implementing the proposed measures should begin with a series of consultations between Russia and the United States, to be joined later on by other space powers, primarily China. Some experts suggest starting such consultations immediately in a tripartite or even multilateral format.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1260&quot;&gt;&lt;strong data-dcnode-id=&quot;1261&quot;&gt;&lt;span data-dcnode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;Non-Strategic Nuclear Weapons&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1259&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1257&quot;&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;As is well known, the United States has proposed to address the issue of non-strategic nuclear weapons in future agreements. Some of the experts shared this view, suggesting that not only strategic offensive weapons but also all nuclear systems should be put under control by a single agreement (START-4). Some experts believe that intermediate-range nuclear weapons should be taken out of such a general agreement and addressed in a separate document, similar to the INF Treaty. Some proposed holding relevant negotiations among Russia, the U.S. and China.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1256&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1254&quot;&gt;&lt;span data-dcnode-id=&quot;1255&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Some experts draw attention to the difficulty of non-strategic nuclear arms verification. Detailed negotiations on this issue should be preceded by consultations with the United States on monitoring and transparency in this area. The conclusion of separate monitoring agreements, both with the United States and with other nuclear powers, is not excluded. The view expressed by experts is that such agreements will be enough to neutralize the negative impact of non-strategic nuclear weapons on strategic stability in the foreseeable future.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1251&quot;&gt;&lt;span data-dcnode-id=&quot;1252&quot; instrument_node=&quot;&quot;&gt;Some experts suggested addressing this issue step by step, specifying that the focus should be on nuclear warheads, not on weapons in general. Some experts believe that the resolution of the issue of non-strategic nuclear weapons should be linked to further progress in limiting and reducing strategic offensive weapons. Others proposed to develop separate agreements on the two categories of nuclear weapons regardless of each other.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1247&quot;&gt;&lt;strong data-dcnode-id=&quot;1248&quot;&gt;&lt;span data-dcnode-id=&quot;1249&quot; instrument_node=&quot;&quot;&gt;Cyber Weapons&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1244&quot;&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;As with space weapons, some experts suggested working out a code of conduct in cyberspace. Most experts believe that the impact of cyber weapons on strategic stability should be discussed and resolved through dialogue. At the same time, almost no one mentioned the idea of a legally binding agreement in this area, except maybe on certain issues, particularly the inadmissibility of cyberattacks on military command and control systems and critical infrastructure. They also suggested developing international cooperation to investigate such cases.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1243&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1241&quot;&gt;&lt;span data-dcnode-id=&quot;1242&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Russia, the U.S., and NATO were named as “priority” participants in such a dialogue. Some experts believe that the initial dialogue could be limited just to Russia and the United States. None of the experts polled named China explicitly.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1238&quot;&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Only one expert expressed the opinion that the problem of cyber weapons does not have a solution at all. The majority believes that unilateral obligations can help strengthen strategic stability. In particular, the parties concerned should pledge to refrain from intervening and targeting key systems that ensure strategic stability, including space-based elements of communications and command and control systems of the strategic nuclear forces and theearly warning systems.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1237&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1234&quot;&gt;&lt;strong data-dcnode-id=&quot;1235&quot;&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;OTHER FACTORS AFFECTING STRATEGIC STABILITY&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1228&quot;&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;As noted above, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1230&quot;&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;growing conflict intensity between leading world powers&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt; stands first among the factors that received less than half of the votes from the experts surveyed. Experts suggested solving this problem by restoring dialogue between Russia and the United States, and between Russia and NATO. They believe that such a dialogue should lead to the conclusion of bilateral and/or multilateral legal agreements on security assurances, especially in Europe. Active work of the Nuclear Risk Reduction Centers, the development of confidence-building measures, and arms control can play a role in this process.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1218&quot;&gt;&lt;span data-dcnode-id=&quot;1226&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Some experts pointed to the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1223&quot;&gt;&lt;em data-dcnode-id=&quot;1224&quot;&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;“strategic ‘infantilism’ of political elites and their lack of understanding of the importance of strategic stability.”&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt; To solve this problem, experts proposed to initiate an international campaign with the active participation of &lt;/span&gt;&lt;s data-dcnode-id=&quot;1220&quot;&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;natural&lt;/span&gt;&lt;/s&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt; scientists to explain the real consequences of nuclear irresponsibility, including all aspects of the use of nuclear weapons.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1200&quot;&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;Many of the interviewed experts believe that arms control can also play a positive role in solving &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1210&quot;&gt;&lt;em data-dcnode-id=&quot;1214&quot;&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;the problem of&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em data-dcnode-id=&quot;1211&quot;&gt;&lt;span data-dcnode-id=&quot;1212&quot; instrument_node=&quot;&quot;&gt;new strategic weapons&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt;, and other problems directly related to nuclear and conventional arms. In the latter case, these concern the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1206&quot;&gt;&lt;em data-dcnode-id=&quot;1207&quot;&gt;&lt;span data-dcnode-id=&quot;1208&quot; instrument_node=&quot;&quot;&gt;imbalance in conventional weapons&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1205&quot; instrument_node=&quot;&quot;&gt; and, in general, &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1202&quot;&gt;&lt;em data-dcnode-id=&quot;1203&quot;&gt;&lt;span data-dcnode-id=&quot;1204&quot; instrument_node=&quot;&quot;&gt;conventional triggers of nuclear escalation.&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;em data-dcnode-id=&quot;1201&quot;&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1199&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1196&quot;&gt;&lt;strong data-dcnode-id=&quot;1197&quot;&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt;* &amp;nbsp;* &amp;nbsp;*&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1195&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;The above analysis of the results of the survey among leading Russian experts concerning factors that affect strategic stability showed that the expert community is both united and divided over a number of critical security issues.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1190&quot;&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;In our view, there is no unity on the substance of the very concept of strategic stability. Although no such question was asked, the results of the survey clearly indicate that its participants have different approaches to the issue.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1189&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1185&quot;&gt;&lt;strong data-dcnode-id=&quot;1187&quot;&gt;&lt;span data-dcnode-id=&quot;1188&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;The lack of unity among the Russian experts on this issue was vividly expressed by the fact that they named more than twenty factors affecting strategic stability. We believe this clearly indicates the urgent need to intensify the discussion on the specific content of the notion of strategic stability, which is already actively used by Russian and Western politicians and experts, even though it is understood differently.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1180&quot;&gt;&lt;strong data-dcnode-id=&quot;1182&quot;&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1181&quot; instrument_node=&quot;&quot;&gt;Such differences would have been expected to affect the experts’ approaches to ways and methods of strengthening strategic stability, including the weakening or neutralization of factors that adversely affect stability. But it is precisely this area where the experts were quite unanimous.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1179&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1175&quot;&gt;&lt;strong data-dcnode-id=&quot;1177&quot;&gt;&lt;span data-dcnode-id=&quot;1178&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1176&quot; instrument_node=&quot;&quot;&gt;They were unanimous in saying that problems associated with the negative influence of various factors on strategic stability can be resolved through negotiations. There were practically no proposals concerning “retaliatory,” “asymmetric” or other unilateral military-technical measures. The Russian experts suggested strengthening existing and creating new channels of official and unofficial contacts with the United States and other Western countries in order to jointly find solutions to vital security problems and avoid an arms race in “traditional” and new areas of military activity. In their opinion, efforts to increase mutual understanding, and ensure openness, transparency, and predictability in the military field should facilitate this process.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1174&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1172&quot;&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; In conclusion, we should note that the proposals put forth by the Russian experts cannot be implemented without reciprocity from the West. Contacts between Russia and Western countries, both official (diplomats, the military) and unofficial (scientists, experts), have shrunk significantly in recent years. This can hardly contribute to better understanding between countries and progress in strengthening security and strategic stability, which all international actors are presumably interested in.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1171&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1166&quot;&gt;&lt;strong data-dcnode-id=&quot;1169&quot;&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;Note from the Editors:&lt;/span&gt;&lt;/strong&gt;&lt;em data-dcnode-id=&quot;1167&quot;&gt;&lt;span data-dcnode-id=&quot;1168&quot; instrument_node=&quot;&quot;&gt; This article had been written and accepted for publication before the start of Russia’s military operation in Ukraine. Naturally, the research does not include expert assessments of the latest developments; however, its major conclusions remain remarkably valid.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1158&quot;&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;*&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1162&quot;&gt;&lt;span data-dcnode-id=&quot;1163&quot; instrument_node=&quot;&quot;&gt;Olga M. Alexandria&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1161&quot; instrument_node=&quot;&quot;&gt;, Lomonosov Moscow State University, Russia, Department of International Security of Faculty of World Politics Senior Lecturer; National Research University–Higher School of Economics, Moscow, Russia&lt;/span&gt;&lt;br data-dcnode-id=&quot;1160&quot;&gt;&lt;span data-dcnode-id=&quot;1159&quot; instrument_node=&quot;&quot;&gt;Institute for Advanced Strategic Studies Expert&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1157&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr class=&quot;wp-block-separator&quot; data-dcnode-id=&quot;1156&quot;&gt;&lt;span data-dcnode-id=&quot;1155&quot; instrument_node=&quot;&quot;&gt;
