&lt;/span&gt;&lt;div class=&quot;at-above-post addthis_tool&quot; data-dcnode-id=&quot;904&quot; data-url=&quot;https://ukandeu.ac.uk/long-read/immigration-between-the-referendum-and-brexit/&quot;&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;900&quot;&gt;&lt;img alt=&quot;immigration&quot; class=&quot;alignnone wp-image-27520 size-full&quot; data-dcnode-id=&quot;903&quot; data-lazy-sizes=&quot;(max-width: 745px) 100vw, 745px&quot; data-lazy-src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/UK-border-big-.jpg&quot; data-lazy-srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/UK-border-big-.jpg 745w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/UK-border-big--300x162.jpg 300w&quot; height=&quot;402&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20745%20402'%3E%3C/svg%3E&quot; width=&quot;745&quot;&gt;&lt;noscript data-dcnode-id=&quot;901&quot;&gt;&lt;span data-dcnode-id=&quot;902&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone wp-image-27520 size-full&quot; src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/UK-border-big-.jpg&quot; alt=&quot;immigration&quot; width=&quot;745&quot; height=&quot;402&quot; srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/UK-border-big-.jpg 745w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/UK-border-big--300x162.jpg 300w&quot; sizes=&quot;(max-width: 745px) 100vw, 745px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;895&quot;&gt;&lt;span data-dcnode-id=&quot;896&quot; style=&quot;color: #ff0000;&quot;&gt;&lt;strong data-dcnode-id=&quot;897&quot;&gt;&lt;span data-dcnode-id=&quot;898&quot; instrument_node=&quot;&quot;&gt;LONG READ&lt;/span&gt;&lt;/strong&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;888&quot;&gt;&lt;strong data-dcnode-id=&quot;889&quot;&gt;&lt;span data-dcnode-id=&quot;893&quot; instrument_node=&quot;&quot;&gt;“The old is dying and the new cannot be born; in this interregnum, a great deal of morbid symptoms arise…” [&lt;/span&gt;&lt;a data-dcnode-id=&quot;891&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.amazon.co.uk/Selections-Prison-Notebooks-Antonio-Gramsci/dp/0853152802&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt;Antonio Gramsci, Prison Notebooks&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;885&quot;&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;Immigration was a central factor in the Brexit referendum of 2016. The British public’s concern about the issue was one of the major reasons why David Cameron was forced to call the landmark vote in June of that year, and it went on to be a subject of crucial importance throughout the campaign.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;882&quot;&gt;&lt;span data-dcnode-id=&quot;883&quot; instrument_node=&quot;&quot;&gt;However, four years have passed since the referendum took place and it would be fair to say that the immigration debate in British politics has become somewhat confused and complicated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;881&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;879&quot;&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;The hard reality is that the British government’s immigration policy is still unchanged. As long as the post-Brexit standstill transition continues, the UK will be governed by all the provisions of EU law relating to free movement. Real change will only come once the transition is over and the UK introduces new policies to contain free movement of EU nationals.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;878&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;870&quot;&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;And yet, even as we wait for those policies to be finalised, the contours of the immigration debate in Britain have been changing before our eyes. Over the last four years, there has been a sharp fall in the migration of EU citizens to the UK&lt;/span&gt;&lt;strong data-dcnode-id=&quot;875&quot;&gt;&lt;span data-dcnode-id=&quot;876&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt; Opinion polls suggest there has been a major shift in UK public opinion on the matter, with voters simultaneously becoming both much less concerned about immigration and much more positive about its impacts. And now, the crisis over &lt;/span&gt;&lt;a data-dcnode-id=&quot;872&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ukandeu.ac.uk/coronavirus/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt;Covid-19&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;871&quot; instrument_node=&quot;&quot;&gt; has triggered intense debate about whether Britain can afford to restrict the movement of Europeans working in the critical health and social care sectors – as well as broader questions about the role and status of immigrants in contemporary Britain.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;867&quot;&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;Finally, just in the last few weeks, the government has signalled one other major policy shift – albeit one driven by external geopolitical events, not immigration policy. The commitment to offer extended visas and, eventually, a path to residence and citizenship for British National (Overseas) passport holders from Hong Kong, in the event that the Chinese government implements its proposed security bill, is carefully hedged, and, in the short term at least, is unlikely to result in large migration flows – but nonetheless is extremely significant, particularly in a historical context. In the late 1960s and early 1970s, the arrival of the East African Asians, another group with British passports and a historical connection with the UK, was intensely controversial, opposed by many on explicitly racial (and racist) grounds. Boris Johnson’s decision to associate himself with the legacy of Ted Heath – who did allow entry to Ugandan Asians in 1972 – rather than that of Enoch Powell, Norman Tebbit, and Margaret Thatcher, is more than just symbolic.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;864&quot;&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;So where is the immigration debate heading? What impact could the recent changes in migration numbers and in public opinion have on post-Brexit policy? And what impact is the Covid-19 crisis having? This essay examines those questions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;860&quot;&gt;&lt;strong data-dcnode-id=&quot;861&quot;&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;Politics and the Brexit negotiations since 2016&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;854&quot;&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;First, let’s briefly recap where several years of Brexit negotiations between Britain and the EU have left on immigration. At the time of the referendum, there was an ambiguity over what Brexiters actually wanted to happen on freedom of movement. Daniel Hannan, a leading figure in the Vote Leave campaign, said that “no-one is talking about leaving the single market” and expressed support for a Swiss-style trading relationship, which would have included preserving free movement. So, too, &lt;/span&gt;&lt;a data-dcnode-id=&quot;856&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.reddit.com/r/ukpolitics/comments/70z2ce/nigel_farage_on_a_norway_style_relationship_with/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;did&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt; Nigel Farage, leader of the rival Leave.EU campaign.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;848&quot;&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;However, Vote Leave, led by Boris Johnson, &lt;/span&gt;&lt;a data-dcnode-id=&quot;850&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.voteleavetakecontrol.org/why_vote_leave.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;promised&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt; a new immigration system – an ‘Australian-style points system’ – which would treat EU and non-EU migrants similarly, something which was clearly incompatible with any version of free movement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;842&quot;&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;This left Theresa May facing a choice after she succeeded David Cameron in July 2016. Many policymakers believed it would be clearly in the UK’s economic interests after Brexit to retain most or all of the benefits of membership of the single market – either by maintaining membership of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;844&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ukandeu.ac.uk/fact-figures/what-is-the-eea/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;European Economic Area&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt; (like Norway) or via a series of bilateral agreements (like Switzerland).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;841&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;837&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;alignnone size-full wp-image-27562 entered error&quot; data-dcnode-id=&quot;840&quot; data-lazy-sizes=&quot;(max-width: 745px) 100vw, 745px&quot; data-lazy-src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/theresa-may-big-.jpg&quot; data-lazy-srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/theresa-may-big-.jpg 745w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/theresa-may-big--300x170.jpg 300w&quot; data-ll-status=&quot;error&quot; height=&quot;423&quot; sizes=&quot;(max-width: 745px) 100vw, 745px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ukandeu.ac.uk/wp-content/uploads/2020/06/theresa-may-big-.jpg&amp;amp;raw&quot; srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/theresa-may-big-.jpg 745w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/theresa-may-big--300x170.jpg 300w&quot; width=&quot;745&quot;&gt;&lt;noscript data-dcnode-id=&quot;838&quot;&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone size-full wp-image-27562&quot; src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/theresa-may-big-.jpg&quot; alt=&quot;&quot; width=&quot;745&quot; height=&quot;423&quot; srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/theresa-may-big-.jpg 745w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/theresa-may-big--300x170.jpg 300w&quot; sizes=&quot;(max-width: 745px) 100vw, 745px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;831&quot;&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;But Theresa May rejected such an approach, making clear “we are not leaving the European Union only to give up control of immigration.” This position meant that the EU never seriously considered what, if any, compromises it could make on free movement. Instead, the ‘&lt;/span&gt;&lt;a data-dcnode-id=&quot;833&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/jennifermerode/status/943037113406238720&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;Barnier Staircase&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;’ was deployed by the EU to underline the fact that free movement was an integral part of single market membership.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;830&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;825&quot;&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;As a result, although the negotiations between the UK and the EU on the future economic, trading and security relationship will continue throughout 2020 and perhaps beyond, immigration (beyond a few relatively minor measures to facilitate business visits and so on) will not be a major topic – as the &lt;/span&gt;&lt;a data-dcnode-id=&quot;827&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/840656/Political_Declaration_setting_out_the_framework_for_the_future_relationship_between_the_European_Union_and_the_United_Kingdom.pdf&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;Political Declaration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt; that accompanied the UK’s Withdrawal Agreement made clear.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;822&quot;&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;Instead, the government’s commitment to maintaining regulatory flexibility after Brexit, and the accelerated timetable for negotiating a trade deal with the EU, means there is little prospect of seeing any significant provisions on labour mobility between the UK and the EU in any post-Brexit deal. The UK will, in short, be free to design its own post-Brexit immigration system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;818&quot;&gt;&lt;strong data-dcnode-id=&quot;819&quot;&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;EU citizens in the UK&amp;nbsp; &lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;812&quot;&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;As we recap where negotiations have got to, we also need to take account of the one area where there has been a lot of negotiation: the status of the approximately 3.5m EU citizens who are resident in the UK (and that of their British counterparts elsewhere in the EU). Here, &lt;/span&gt;&lt;a data-dcnode-id=&quot;814&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ecas.org/brexit-citizens-rights-agreement/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;agreement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt; on the legal position has proved relatively straightforward, at least when compared to other issues, in particular the status of Northern Ireland.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;806&quot;&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;The EU has accepted that the jurisdiction of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;808&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ukandeu.ac.uk/fact-figures/what-is-the-european-court-of-justice-2/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;European Court of Justice&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt; over the rights of EU citizens in the UK cannot continue indefinitely, while the UK has accepted that provisions guaranteeing those rights, not just now but in the future, should be embedded in UK law.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;800&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;More importantly, the UK government has implemented a relatively light-touch scheme to give resident EU nationals the right to settled or ‘pre-settled’ status. This recognises the sheer administrative challenge of registering such large numbers of people in a short time. The scheme is largely online, relying heavily (as some of us originally &lt;/span&gt;&lt;a data-dcnode-id=&quot;802&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ukandeu.ac.uk/the-situation-and-rights-of-eu-citizens-in-the-uk/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;proposed&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;) on administrative data already held by government. While there have inevitably – given the numbers involved – been egregious errors, the process has gone as well as could be expected, with over three million grants of settled or ‘pre-settled’ status by March 2020.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;797&quot;&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;The deadline for applications is June 2021; and inevitably, with any scheme of such magnitude, a proportion of the 3.5m people who are eligible will fall through the cracks and fail to apply or to supply the necessary evidence, particularly given the Covid-19 crisis. Such cases are disproportionally likely to be among relatively disadvantaged groups. These problems already arise under the current immigration system for non-EEA nationals, as Windrush and other less-reported scandals have shown. But the number of such cases for EU citizens could dwarf these and might easily be in the tens, if not hundreds of thousands. In principle, such people will be subject to enforcement action, up to and including deportation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;794&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;It seems highly unlikely the government would want to create a ‘Windrush Mark 2’ particularly when it would involve such large numbers of people. So, some form of moratorium or amnesty is likely, even if the government is reluctant to state this publicly at present.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;790&quot;&gt;&lt;strong data-dcnode-id=&quot;791&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;Migration trends&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;787&quot;&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;So, as we said above, the UK must now design its own post-Brexit immigration system. But while it does so, it also knows that two major factors are changing in the immigration debate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;784&quot;&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;First, there is the trend in net migration numbers. In June 2016, when the referendum took place, net migration to the UK reached an all-time record of 333,000.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;778&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;This included net migration of more than 200,000 from elsewhere in the EU, also a record. After the Brexit vote, I &lt;/span&gt;&lt;a data-dcnode-id=&quot;780&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.sagepub.com/doi/abs/10.1177/002795011623800111&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;argued&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt; that a significant fall was likely for a number of reasons. This was because:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;766&quot;&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;774&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;even before the referendum, employment growth in the UK had slowed, while unemployment was falling elsewhere in the EU, in particular in some major source countries, such as Poland, where labour shortages were emerging;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;771&quot;&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;the referendum result was likely to make this fall much sharper, partly through the overall economic impact of Brexit on growth, output, and employment, and partly because migration from some EU countries appears to respond to exchange rate changes, with a fall in the pound making the UK less attractive as a destination country;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;768&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;legal and psychological factors were bound to have an impact. These related to the uncertainty about the future rights that EU citizens currently resident might enjoy, and the more general political and social climate, with the UK no longer seen as a hospitable destination for EU migrants.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;763&quot;&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt;As the chart below shows, net EU migration has indeed fallen by slightly more than 150,000. This is despite the fact that the Brexit process has been slower than anticipated, and despite the resilience of the UK labour market between the referendum and the onset of the Covid-19 crisis. These numbers suggest that while economic conditions remained relatively favourable, the psychological impact of Brexit on past and prospective migrants from elsewhere in the EU has been larger than we anticipated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;756&quot;&gt;&lt;img alt=&quot;immigration&quot; class=&quot;alignnone wp-image-27531 size-full entered lazyloaded&quot; data-dcnode-id=&quot;761&quot; data-lazy-sizes=&quot;(max-width: 1113px) 100vw, 1113px&quot; data-lazy-src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1.png&quot; data-lazy-srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1.png 1113w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1-300x181.png 300w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1-1024x616.png 1024w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1-768x462.png 768w&quot; data-ll-status=&quot;loaded&quot; height=&quot;670&quot; sizes=&quot;(max-width: 1113px) 100vw, 1113px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1.png&amp;amp;raw&quot; srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1.png 1113w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1-300x181.png 300w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1-1024x616.png 1024w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1-768x462.png 768w&quot; width=&quot;1113&quot;&gt;&lt;noscript data-dcnode-id=&quot;759&quot;&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone wp-image-27531 size-full&quot; src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1.png&quot; alt=&quot;immigration&quot; width=&quot;1113&quot; height=&quot;670&quot; srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1.png 1113w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1-300x181.png 300w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1-1024x616.png 1024w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1-768x462.png 768w&quot; sizes=&quot;(max-width: 1113px) 100vw, 1113px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;a data-dcnode-id=&quot;757&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ons.gov.uk/visualisations/dvc758/charts/fig2/line/index.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;Chart source: ONS&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;753&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;At the same time, since mid-2018, there has been a significant rise in non-EU migration. This is likely to reflect labour market pressures, with the fall in EU work-related migration leading to shortages in some sectors and occupations, which have in part been filled by non-EU migrants. This substitution was facilitated by government policy, with the cap on Tier 2 visas for non-EU migrants (that is, relatively skilled or highly paid workers) being relaxed, particularly for those coming to work in the NHS, in late 2018, when it became apparent that enforcing the existing cap would further aggravate existing recruitment issues.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;750&quot;&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;While this represented a relatively minor policy change, it marked the end of the Theresa May era in immigration policy, during which the overriding objective of immigration policy had been to reduce numbers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;747&quot;&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;So, immigration and emigration have undoubtedly fallen sharply, and, as the Covid-19 crisis plays out, it would be no surprise if net migration were to become negative, with long-term residents in the UK returning for family or health reasons to their countries of origin. (It is ironic that, not long after the government formally abandoned David Cameron’s ill-fated 2010 target to reduce migration to the “tens of thousands”, the target has almost certainly now been hit, albeit only as the by-product of a global pandemic.)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;744&quot;&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;A key question ahead is what happens when restrictions relating to the pandemic are eased and international travel – even if restricted – returns. What will change? In the United States, President Trump may well use the pretext of the “Chinese virus” to extend the immigration restrictions he has long advocated. However, similar restrictions seem unlikely here.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;738&quot;&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;True, when the spread of the virus has been definitively suppressed in Britain, it will become necessary to worry about the arrival of infectious people from abroad. But the UK is exceptionally dependent on international travel and connectivity in a way that the US is not. More British people &lt;/span&gt;&lt;a data-dcnode-id=&quot;740&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.independent.co.uk/travel/news-and-advice/british-travellers-iata-world-air-transport-statistics-a9029366.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;fly internationally&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt; every year than citizens of any other country, including, despite the disparity in population size, the US. This means that the imperative for policymakers will be to find a way to allow people to move across our borders in very large numbers again, albeit with the deployment of screening and testing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;735&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;Such measures – not to mention social distancing on planes, if required – will make international travel more difficult, time-consuming, and costly. However, proportionately, that will hit tourism more than immigration. Immigrants already pay multiple thousands of pounds in visa fees and other charges, and are unlikely to be deterred by extra bureaucracy and higher plane fares.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;731&quot;&gt;&lt;strong data-dcnode-id=&quot;732&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;Public opinion&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;722&quot;&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;The second big change since the referendum has been in public opinion. In 2016, immigration was the &lt;/span&gt;&lt;a data-dcnode-id=&quot;727&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ipsos.com/ipsos-mori/en-uk/ipsos-mori-issues-index-april-2020&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;most important single issue&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt; for British voters. But even before the Covid-19 crisis, it had dropped to &lt;/span&gt;&lt;a data-dcnode-id=&quot;724&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ipsos.com/ipsos-mori/en-uk/ipsos-mori-issues-index-april-2020&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;ninth&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt; and has now disappeared from the top ten altogether.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;719&quot;&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;This fall in the salience of immigration has been accompanied by a parallel change in attitudes towards immigration, with an increasing proportion of the population regarding immigration as positive, both from an economic and cultural perspective.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;714&quot;&gt;&lt;img alt=&quot;immigration&quot; class=&quot;alignnone wp-image-27518 size-full&quot; data-dcnode-id=&quot;717&quot; data-lazy-sizes=&quot;(max-width: 1404px) 100vw, 1404px&quot; data-lazy-src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read.png&quot; data-lazy-srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read.png 1404w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-300x167.png 300w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1024x570.png 1024w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-768x427.png 768w&quot; height=&quot;781&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201404%20781'%3E%3C/svg%3E&quot; width=&quot;1404&quot;&gt;&lt;noscript data-dcnode-id=&quot;715&quot;&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone wp-image-27518 size-full&quot; src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read.png&quot; alt=&quot;immigration&quot; width=&quot;1404&quot; height=&quot;781&quot; srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read.png 1404w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-300x167.png 300w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-1024x570.png 1024w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Portes-long-read-768x427.png 768w&quot; sizes=&quot;(max-width: 1404px) 100vw, 1404px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;710&quot;&gt;&lt;a data-dcnode-id=&quot;711&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ipsos.com/sites/default/files/ct/news/documents/2019-03/bbc_crossing_divides_2019_0.pdf&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;Chart source: Ipsos Mori&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;707&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;Why has this change in public attitudes occurred? We can begin by ruling out the fact that the public are less worried about immigration simply because net migration has fallen. After all, net migration remains at historically high levels. It is plausible, however, that while immigration has not fallen by that much, many perceive that it has fallen, or believe that Brexit means that it will fall considerably in future.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;704&quot;&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;It may also be that the prospect of the end of free movement, and hence the increase in the UK’s ability to control migration flows (and move towards a more skill-focused system), may be generating more positive attitudes, even if overall numbers do not reduce significantly; in other words it is the perception of ‘control’, rather than numbers per se, that matters.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;701&quot;&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;There has been a marked shift in both the volume and tone of media coverage since the referendum, with considerably fewer negative or ‘scare’ stories, and more stories which paint immigration in a relatively positive light. In particular, the media has shifted from narratives which show immigration as a cost (e.g. benefit tourism, putting pressure on the health service) to those that show reductions in immigration as potentially damaging (e.g. fewer nurses, skill shortages, etc.).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;698&quot;&gt;&lt;span data-dcnode-id=&quot;699&quot; instrument_node=&quot;&quot;&gt;The Covid-19 crisis has further accentuated this trend. Immigrants are overrepresented in a number of ‘key worker’ categories, most obviously NHS staff and care workers, but also in, for example, public transport, agriculture and food production. The disproportionate number of ethnic minority staff in the NHS who have died during the outbreak has further highlighted the positive contribution of immigration to the UK’s economy and society.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;695&quot;&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;It is too early to judge how the aftermath of the Covid-19 crisis, particularly if it leads to a prolonged recession and sustained high unemployment, will affect attitudes to immigration. Nevertheless, the sustained positive changes over the past few years appear to be well embedded; and it is against this background that the government will have to work out its post-Brexit policy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;691&quot;&gt;&lt;strong data-dcnode-id=&quot;692&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;Designing a new system&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;688&quot;&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;So, as we have seen, major changes in net migration and in the public perceptions of immigration are clearly apparent. Against that background, what decisions are minsters starting to take on what the new system should look like?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;687&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;683&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;alignnone size-full wp-image-27571&quot; data-dcnode-id=&quot;686&quot; data-lazy-sizes=&quot;(max-width: 745px) 100vw, 745px&quot; data-lazy-src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Priti-big.jpg&quot; data-lazy-srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Priti-big.jpg 745w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Priti-big-300x161.jpg 300w&quot; height=&quot;400&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20745%20400'%3E%3C/svg%3E&quot; width=&quot;745&quot;&gt;&lt;noscript data-dcnode-id=&quot;684&quot;&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone size-full wp-image-27571&quot; src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Priti-big.jpg&quot; alt=&quot;&quot; width=&quot;745&quot; height=&quot;400&quot; srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/Priti-big.jpg 745w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/Priti-big-300x161.jpg 300w&quot; sizes=&quot;(max-width: 745px) 100vw, 745px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;677&quot;&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;The government has already set out its proposals for a new, points-based system after the end of the Brexit transition period. &lt;/span&gt;&lt;a data-dcnode-id=&quot;679&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ukandeu.ac.uk/fact-figures/what-is-freedom-of-movement/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;Free movement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt; will end on December 31 and the new system will apply to all those moving to the UK to work, with the exception of Irish citizens. EU (and EEA/Swiss) nationals already resident in the UK are able to apply to remain indefinitely under the “settled status” scheme. As described above, most have already done so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;674&quot;&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt;The government has broadly accepted the recommendations of the independent Migration Advisory Committee (MAC). These are that:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;656&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;670&quot;&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;New migrants should be coming to work in a job paying more than £25,600 or the lower quartile of the average salary, whichever is higher, and in an occupation requiring skills equivalent to at least A-levels;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;667&quot;&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;There will be a lower initial threshold for new entrants and for those in shortage occupations, meaning that for some occupations the salary threshold may be as low as about £20,000;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;664&quot;&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;There will also be a lower threshold for those with PhDs, especially in STEM subjects;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;661&quot;&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;For the National Health Service and education sectors, there will in effect be no salary threshold. If the job is at an appropriate skill level (again, roughly the equivalent of A-levels, and including not just nurses and doctors but radiographers and technicians), then paying the appropriate salary according to existing national pay scales will be sufficient;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;658&quot;&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;There will be an expanded Seasonal Agricultural Workers Scheme, but no other sectoral schemes for workers who do not meet the skill threshold, and in particular not for the social care sector.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;657&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;653&quot;&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;The new system will represent a very significant tightening of controls on EU migration compared to free movement. Migrants coming to work in lower-skilled and paid occupations will in principle no longer be able to gain entry. Even those who do qualify will need their prospective employers to apply on their behalf, will have to pay significant fees, and will, as is the case for non-EU migrants at present, have significantly fewer rights, for example in respect of access to the benefit system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;650&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;By contrast, compared to the current system, the new proposals represent a considerable liberalisation for non-EU migrants, with lower salary and skill thresholds, and no overall cap on numbers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;647&quot;&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;So what will the impact of these changes be on numbers? In reality, the implications for overall levels of immigration may not be that great. As set out above, previous estimates suggested that ending free movement might reduce net migration from the EU by 90,000 to 150,000, compared to pre-referendum levels; but the vast bulk of this reduction has already happened. Further large falls would therefore require a significant exodus of EU workers who are currently resident.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;Given the liberalisation for non-EU workers, the overall impact on numbers may also be relatively small, even if the government remains committed in principle to reducing net migration. In any case, in the short to medium term, the Covid-19 crisis and its aftermath are likely to be far more important in driving migration flows than changes to the system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;643&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;638&quot;&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt;What about the overall economic impacts of the new system? They are likely to be neutral to slightly positive, with any further negative impact of falling numbers being offset by an improvement in the skills mix, since the new system will reduce migration to lower-skilled jobs while increasing it to medium and higher skilled jobs. Retrospective &lt;/span&gt;&lt;a data-dcnode-id=&quot;640&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/government/publications/migration-advisory-committee-mac-report-points-based-system-and-salary-thresholds&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;641&quot; instrument_node=&quot;&quot;&gt;analysis&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;639&quot; instrument_node=&quot;&quot;&gt; by the MAC suggests that – had the new regime been in place over the past 15 years – UK GDP and population would both be lower, but GDP per capita would be (marginally) higher.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;635&quot;&gt;&lt;span data-dcnode-id=&quot;636&quot; instrument_node=&quot;&quot;&gt;What about the impact sector by sector? This will vary. All sectors employing large numbers of EU migrants will face substantial increases in costs and bureaucracy. Sectors like the NHS, finance, business services, and higher education, which are dominated by larger employers, most of which are already accustomed to dealing with the current system for non-EU migrants, are likely to be able to cope. To the extent that the new system is less restrictive for non-EU migrants – and to the extent that the government delivers on its promise to make it more efficient and less bureaucratic – they may even benefit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;634&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;630&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;alignnone size-full wp-image-27565&quot; data-dcnode-id=&quot;633&quot; data-lazy-sizes=&quot;(max-width: 745px) 100vw, 745px&quot; data-lazy-src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/carers-big.jpg&quot; data-lazy-srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/carers-big.jpg 745w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/carers-big-300x161.jpg 300w&quot; height=&quot;399&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20745%20399'%3E%3C/svg%3E&quot; width=&quot;745&quot;&gt;&lt;noscript data-dcnode-id=&quot;631&quot;&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;alignnone size-full wp-image-27565&quot; src=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/carers-big.jpg&quot; alt=&quot;&quot; width=&quot;745&quot; height=&quot;399&quot; srcset=&quot;https://ukandeu.ac.uk/wp-content/uploads/2020/06/carers-big.jpg 745w, https://ukandeu.ac.uk/wp-content/uploads/2020/06/carers-big-300x161.jpg 300w&quot; sizes=&quot;(max-width: 745px) 100vw, 745px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;627&quot;&gt;&lt;span data-dcnode-id=&quot;628&quot; instrument_node=&quot;&quot;&gt;However, some sectors are more at risk. Social care, where wages are well below the salary thresholds and most jobs currently filled by migrants do not meet the skills threshold, is a particular pressure point. The pressures here will only be alleviated if the sector gets a significant infusion of government funding that will allow it to increase wages and training budgets, since it has become heavily reliant on EU migrants to fill vacancies in recent years.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;624&quot;&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;Other sectors that have come to rely on EU migrants to provide a flexible (and often motivated and trained) workforce, from food processing to construction, will also be concerned, with construction particularly threatened by its reliance on self-employed contractors, who will generally not be eligible under the new system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;621&quot;&gt;&lt;span data-dcnode-id=&quot;622&quot; instrument_node=&quot;&quot;&gt;A further major issue is the government’s capacity to deliver the new system on what has always looked like a very demanding timescale, and now with the Covid-19 crisis, looks close to impossible. Many employers will be beginning to recruit employees to start work in 2021 from mid-2020. The Home Office, and in particular those parts responsible for immigration policy and delivery, already have several ongoing major projects, including the implementation of the settled status scheme.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;618&quot;&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;Moreover, there will inevitably be a complex set of interactions between this scheme — applying to EU nationals resident before 31 December– and the new rules applying to some (but not all) of those moving to work after that date. This will be complex both in legal and administrative terms. On top of that, there will inevitably have to be changes to rules governing international travel and visa issuance in the aftermath of the Covid-19 crisis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;612&quot;&gt;&lt;span data-dcnode-id=&quot;616&quot; instrument_node=&quot;&quot;&gt;In addition, civil service morale is low and there have been well-publicised disagreements between &lt;/span&gt;&lt;a data-dcnode-id=&quot;614&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.theguardian.com/politics/2020/mar/27/survey-home-office-staff-bullying-claims&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;ministers and senior officials.&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;613&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;All this has obvious parallels to previous government delivery failures. The most significant economic risk, therefore, is not the policy intention as such, but that there will be an extended period during which the system is in a period of turbulence (or worse), generating uncertainty for both employers and potential migrant employees and hence inhibiting recruitment (as well as potentially damaging the United Kingdom’s reputation after Brexit as ‘open for business’).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;606&quot;&gt;&lt;strong data-dcnode-id=&quot;609&quot;&gt;&lt;span data-dcnode-id=&quot;610&quot; instrument_node=&quot;&quot;&gt;Where next&lt;/span&gt;&lt;/strong&gt;&lt;strong data-dcnode-id=&quot;607&quot;&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;?&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;603&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;There are major question marks about the alignment of this new system with the government’s wider economic strategy. From an economic perspective, there are clear advantages to the basic design proposed by the MAC and endorsed by the government. If the objective is to maximise the economic benefits of immigration, then a purely market solution would imply open borders. However, this is clearly not feasible for political, cultural and social reasons. At which point, a salary threshold is a clear second-best mechanism, because it puts the market, rather than bureaucrats or politicians, in charge of the selection process. This avoids having to pick winners, engage in central planning, or allow the loudest business voices to determine which occupations and sectors qualify and which do not. Not surprisingly, the MAC – dominated by labour market economists – went down this route.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;601&quot; instrument_node=&quot;&quot;&gt;The trouble with such a policy is that it sits rather oddly with the government’s wider economic strategy, which – despite caricature – is very far from a purist free-market approach. Rather, it combines two strands: first, a ‘levelling-up’ agenda, which prioritises the need to address regional and spatial inequalities. Second, a view that the UK’s economic future will be driven by its success in taking advantages of the commercial opportunities growing out of science and technology, including ‘big data’ and artificial intelligence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;599&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;597&quot;&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;But both of these strands require active policy, including an element of planning and picking winners – a ‘developmental state’ rather than a night-watchman state. Neither is necessarily compatible with an immigration system that, by definition, is likely to further advantage those sectors and regions where salaries are already highest and that therefore already benefit the most (notably, London and the financial sector).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;591&quot;&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt;On top of all this, Covid-19 will change the political dynamic. Most obviously, it has highlighted the fact that economic value, as measured by market wages, is not necessarily an accurate reflection of wider social value. Care workers, bus drivers and supermarket staff all fulfil essential functions, and it is far from obvious that there will be public support for an immigration system that excludes them all in favour of relatively junior bankers. As Sunder Katwala &lt;/span&gt;&lt;a data-dcnode-id=&quot;593&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/sundersays/status/1236965832481267713/photo/1&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;points out&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;, this isn’t new – public opinion has always been nuanced about the appropriate definition of ‘skills’ for immigration purposes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;585&quot;&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;So to sum up, as Sophia Wolpers of London First &lt;/span&gt;&lt;a data-dcnode-id=&quot;587&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ft.com/content/e93c8cb0-4878-46a3-875f-cac3d557896b&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;puts it&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt;, are the government’s proposals “based on what is rapidly becoming old thinking”? Yes and no. The most serious problem the government faces is still its political commitment to deliver a new immigration system in time for the end of the Brexit transition period on 1 January 2021 – a goal which looked hopelessly optimistic even before the current crisis put everything else on hold.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;582&quot;&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;The essential problem is that, with Covid-19, the broader policy environment has changed. While suffering from the disease has been widely spread, no-one disputes that immigrants and their children working in the NHS and care systems have borne a hugely disproportionate burden of death and illness. In contrast to the US, anti-immigration sentiment – which had already fallen sharply over the last few years – is likely to decrease even further.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;579&quot;&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;So the government can, should it wish, take the opportunity to address the criticisms of its approach and ensure that the new system supports its wider economic strategy – as well as making it fairer and more humane.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;What might that involve? Some steps would be relatively easy to take and do not require system change. Among these would be a reduction in exorbitant fees, particularly for visa extensions and renewals, settlement and citizenship.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;573&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;The government could also, as the MAC recommends, loosen the current restrictive rules on settlement which discourage people who have contributed to the UK for years from making it their permanent home. All this would help ensure the UK doesn’t lose key workers and others who are essential to an economic revival after Covid-19.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;570&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;As and when the new system is introduced, the government should step back and think again about what it really wants. Which sectors are the priority, from social care to science, and how do you adjust a salary-based scheme to take account of that? What regional or national flexibility would spread the benefits of migration outside London, and who decides? How do you adjust the system – which, inevitably, will be very far from perfect initially – quickly and flexibly without falling into the central planning trap?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;567&quot;&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;To suggest that Covid-19 will mark a sea-change in either attitudes or policy towards immigration probably overstates the case. We were already heading in a more liberal direction anyway and Covid-19 should not, and hopefully will not, change that. The challenge for government is making sure its policy genuinely works for the UK in the uncertain age of Brexit and Covid-19.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;560&quot;&gt;&lt;strong data-dcnode-id=&quot;561&quot;&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;By &lt;/span&gt;&lt;a data-dcnode-id=&quot;563&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ukandeu.ac.uk/experts/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;Jonathan Portes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;562&quot; instrument_node=&quot;&quot;&gt;, senior fellow at UK in a Changing Europe&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;at-below-post addthis_tool&quot; data-dcnode-id=&quot;553&quot; data-url=&quot;https://ukandeu.ac.uk/long-read/immigration-between-the-referendum-and-brexit/&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;
