&lt;/span&gt;&lt;h1 data-dcnode-id=&quot;1143&quot;&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;Brexit: What Next? A Critical Analysis&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;1142&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1139&quot;&gt;&lt;strong data-dcnode-id=&quot;1140&quot;&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt;Mohammed Sawkat Hossain, Jahangirnagar University&lt;/span&gt;&lt;/strong&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1136&quot;&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1130&quot;&gt;&lt;span data-dcnode-id=&quot;1134&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1132&quot; style=&quot;text-align: justify;&quot;&gt;&lt;span data-dcnode-id=&quot;1133&quot; instrument_node=&quot;&quot;&gt;This is a secondary research-based case study that designates the recent global financial issue of Brexit. Hence the primary subject matter of this study involves an analysis and critical review of United Kingdom (UK) exit from European Union (EU). At one strand, we analyze that Brexit is likely to reduce excessive immigration from European Economic Area (EEA) countries to UK and might reduce the possible challenges for UK unemployment and living standard. At another stand, we forecast that Brexit might degrade the UK's real per capita income, create greater uncertainty and thereby decline consumer confidence. Hence the referendum might present a notable reduction in GDP, trade and investment, as well as household losses from hyper-inflation. Therefore, as of March 2019, the so called &quot;Divorce bill&quot;- the UK's inheritance of exiting EU trade agreements, relations with Ireland, and other EU member states still remains uncertain. The precise impact on UK might depend on whether the process would be ultimately a&quot; Hard&quot; or &quot;Soft&quot; Brexit. Therefore, there is a global curiosity and debate if UK should be a member or leave the EU with or without a further deal, though UK is now due to leave the EU at 23:00 GMT on 31 October 2019. All in all, the significance of the study is that it deeply reviews the challenges and opportunities in the global landscape; what possible problems it might encounter; and what strategies it should adopt to sustain economic growth due to Brexit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1131&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ft_below_content&quot; data-dcnode-id=&quot;559&quot;&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1126&quot;&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;Keywords&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1125&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1123&quot;&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;Brexit, European Union, Referendum, Global Economy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1120&quot;&gt;&lt;span data-dcnode-id=&quot;1121&quot; instrument_node=&quot;&quot;&gt;Brexit: An Overview&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1119&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1105&quot;&gt;&lt;span data-dcnode-id=&quot;1118&quot; instrument_node=&quot;&quot;&gt;In general, ‘&lt;/span&gt;&lt;em data-dcnode-id=&quot;1116&quot;&gt;&lt;span data-dcnode-id=&quot;1117&quot; instrument_node=&quot;&quot;&gt;Brexit&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1115&quot; instrument_node=&quot;&quot;&gt;’ is a term that is now widely used as a shorthand way of expressing the UK leaving the EU-a portmanteau of the words “&lt;/span&gt;&lt;em data-dcnode-id=&quot;1113&quot;&gt;&lt;span data-dcnode-id=&quot;1114&quot; instrument_node=&quot;&quot;&gt;Britain&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;” and “&lt;/span&gt;&lt;em data-dcnode-id=&quot;1110&quot;&gt;&lt;span data-dcnode-id=&quot;1111&quot; instrument_node=&quot;&quot;&gt;Exit&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1109&quot; instrument_node=&quot;&quot;&gt;”. In fact, it is in the same way as Greek’s exit from the euro which is dubbed as Grexit in the past. So, Brexit is shorthand for Britain’s split from the EU, changing its relationship to the bloc on trade, security and migration. It is, prima facie, evident that Brexit resembles a simple word, but the effect of that word is not so simple in the current global economy. Its effect could be huge and long-lasting. Hence it is important to review and critically evaluate about what, when &amp;amp; why of Brexit is going to be taken place. As of now, Britain has been debating the pros and cons of membership in a European community of nations almost from the moment the idea is raised. It held its first referendum on membership in what was then called the European Economic Community in 1975, less than three years after it joined, when 67 percent of voters supported staying in the bloc. Later on, in 2013, the Prime Minister David Cameron promised a national referendum on European Union membership with the idea of settling the question once and for all. Consequently, the options it offered are broad and vague- &lt;/span&gt;&lt;em data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;‘Remain or Leave&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;’. At that time, Mr. Cameron was convinced that the remain would win handily. In this respect, British voted on June 23, 2016, as a refugee crisis made migration a subject of political rage across Europe and amid allegations that the Leave campaign had relied on lies and broken election laws. Overall, an ill-defined Brexit won approximately 52 percent of the vote. However, it not only resolve the debate, but also saved for another day the tangled question of what should come next (Zaidi et al., 2017). After nearly three years of debate and negotiation, it still remains unanswered and quite puzzle. Hence Brexit has become the most recent debatable financial issue that could be a paradigm shift particularly in UK’s economy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1102&quot;&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;European Union: An Overview&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1101&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1090&quot;&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;We know that EU is a group of a European country that participates as one unit in the global economy. Hence, we state that EU is a political and economic union of 28 member states that are located primarily in Europe. It consists of a group of countries that acts as single economic unit in the world economy. In particular, it has an area of 4,475,757 km&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1098&quot;&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt; (1,728,099 sq. mi) and an estimated population of about 513 million. Its approved currency is the Euro, 19 of its 28 members now-a-days adopt the currency. Fundamentally, the EU has been inaugurated as the European Coal &amp;amp; Steel Community, initially founded in 1952 by the countries of - Italy; France; Luxembourg; West Germany and Belgium (refer to appendix- 1). The European Coal &amp;amp; Steel Community had named European Economic Community after the Treaty of Rome; and afterward, became the European Community (EC). Later on, in 1973, UK became a member of EC. The EC fundamentally is expanded, and Denmark Ireland, Greece and Spain became the new members. The Maastricht Treaty&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1095&quot;&gt;&lt;span data-dcnode-id=&quot;1096&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt; took effect on 11&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1092&quot;&gt;&lt;span data-dcnode-id=&quot;1093&quot; instrument_node=&quot;&quot;&gt;th&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1091&quot; instrument_node=&quot;&quot;&gt; November, 1993 and thereby the EU replaced by the European Community. In summary, as of now, the EU countries are: Austria, Belgium, Bulgaria, Croatia, Republic of Cyprus, Czech Republic, Denmark, Estonia, Finland, France, Germany, Greece, Hungary, Ireland, Italy, Latvia, Lithuania, Luxembourg, Malta, Netherlands, Poland, Portugal, Romania, Slovakia, Slovenia, Spain, Sweden and the UK. We find that the EU maintains a comparative value against the US Dollar and the EU becomes one of the top producers in the globe. Therefore, we conclude that EU is one of the largest sources and destination for foreign direct investment as well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1089&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1087&quot;&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;Historical Timeframe Of Brexit&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1086&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1066&quot;&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;As stated earlier, Britain had the membership of EU in 1973. Afterwards, in 1975- the 1&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1083&quot;&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;st&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt; referendum raised if UK should be a member of European Community. Almost 65% responded positively. In 2016-the 2&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1080&quot;&gt;&lt;span data-dcnode-id=&quot;1081&quot; instrument_node=&quot;&quot;&gt;nd&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt; referendum is taken place to decide whether the UK should leave or remain in the EU. That time leave won by 52%. In particular, this corresponded to 17,410,742 votes to leave and 16,141,241 to remain, a margin of 1,269,501 votes (&lt;/span&gt;&lt;em data-dcnode-id=&quot;1077&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;The Independent, November 30, 2017&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;). Then on 29th March, 2019- UK has been due to leave, two years after it started the exit process. But the withdrawal agreement between the EU &amp;amp; UK has been rejected for three times by UK MP’s. Finally, on 12&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1074&quot;&gt;&lt;span data-dcnode-id=&quot;1075&quot; instrument_node=&quot;&quot;&gt;th&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt; April, 2019- having granted an initial extension, EU leaders are now backed by six months extension until 31 October, 2019 (&lt;/span&gt;&lt;em data-dcnode-id=&quot;1071&quot;&gt;&lt;span data-dcnode-id=&quot;1072&quot; instrument_node=&quot;&quot;&gt;refer to appendix-2&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;). However, analysts suggest that the UK might leave before this date if the withdrawal agreement is ratified by the UK and the EU before then. The new UK Prime Minister Boris Johnson opines that he plans to renegotiate the Brexit deal agreed with the EU by his predecessor Theresa May. The PM has recently warned that UK MPs are damaging his chances of getting a deal with the EU by trying to block a no-deal Brexit in the name of Hard Brexit (Hunt et al., 2017) (BBC News, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1068&quot;&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt;August 30, 2019)&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;. So, as things stand now, the UK is scheduled to leave the EU at 23:00 GMT on 31 October 2019. If the UK and EU approve the withdrawal agreement before then, the UK might leave on the first day of the following month.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1063&quot;&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;Statistics Of Brexit Vote: A Summary&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1058&quot;&gt;&lt;strong data-dcnode-id=&quot;1060&quot;&gt;&lt;span data-dcnode-id=&quot;1061&quot; instrument_node=&quot;&quot;&gt;Figure &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;1 shows the summary of Brexit vote which is the principal determinant for the future existence of Brexit. We find that England voted for Brexit, by 53.4% to 46.6%. Wales also voted for Brexit, with Leave getting 52.5% of the vote and Remain 47.5%. Scotland and Northern Ireland both backed staying in the EU. Scotland backed Remain by 62% to 38%, while 55.8% in Northern Ireland voted Remain and 44.2%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;row align-items-center mb-3&quot; data-dcnode-id=&quot;1042&quot;&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;col-12 col-sm-2 col-md-3&quot; data-dcnode-id=&quot;1052&quot;&gt;&lt;a class=&quot;thumbnail&quot; data-dcnode-id=&quot;1053&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.abacademies.org/articles-images/international-academy--wanted-brexit-25-2-147-g001.png&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;international-academy-leadership--wanted-brexit&quot; class=&quot;img-fluid img-thumbnail&quot; data-dcnode-id=&quot;1055&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.abacademies.org/articles-images/international-academy--wanted-brexit-25-2-147-g001.png&amp;amp;raw&quot; title=&quot;international-academy-leadership-wanted-brexit&quot;&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1051&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;col-12 col-sm-10 col-md-9&quot; data-dcnode-id=&quot;1044&quot;&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1046&quot;&gt;&lt;strong data-dcnode-id=&quot;1048&quot;&gt;&lt;span data-dcnode-id=&quot;1049&quot; instrument_node=&quot;&quot;&gt;Figure 1:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1047&quot; instrument_node=&quot;&quot;&gt;Why uk wanted brexit?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1043&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1039&quot;&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;We find that the EU member countries agree to open their borders to other EU members, share a common market, and abide by various social and political policies. Despite of these facilities, UK wants to exit from EU. Hence it is a general curiosity to clear up why UK is inclined for Brexit. Let us now identify several of the underlying issues that motivated UK for the debatable issue of Brexit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1035&quot;&gt;&lt;strong data-dcnode-id=&quot;1036&quot;&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;European Debt Crisis&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1030&quot;&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;Since the end of 2009, a multi-year debt crisis has been taking place in the EU. In particular, we find that Greece, Portugal, Ireland, Spain &amp;amp; Cyprus were unable to repay their government debt. They started taking loans from the European Central Bank or the International Monetary Fund. France, Germany, United Kingdom having financially stable economy use to send funds to European Central Bank which then redistributed to various other members states. In this respect, the UK’s thought was “&lt;/span&gt;&lt;em data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt;Why should we have to pay for that”?&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1026&quot;&gt;&lt;strong data-dcnode-id=&quot;1027&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;Great Recession Effects&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1023&quot;&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;The effects of great recession in 2008 are still there in the world. The UK wanted to grow by 3% per year. But they could not do that even the economists from UK predict that on an average a person from UK will borrow 55% of his total expenditure from bank.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1019&quot;&gt;&lt;strong data-dcnode-id=&quot;1020&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;European Refugee Crisis and Security Concern&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1016&quot;&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;The refugee arriving in EU from across the different part from the world can move anywhere in the EU countries. As they can arrive to UK also, UK feels much concern about the security and privacy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1015&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1012&quot;&gt;&lt;strong data-dcnode-id=&quot;1013&quot;&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;Legal Quandary&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1009&quot;&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;One focal point for alleged European control over UK laws is the influence of the European Court of Human Rights, which in certain high-profile cases has made it harder to deport foreign-born criminals. If UK moves away from the ECHR’s influence, it would be in company with isolated Belarus. We find that Belarus is the only European countries not to comply with ECHR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1005&quot;&gt;&lt;strong data-dcnode-id=&quot;1006&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;Membership Fee&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1004&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1002&quot;&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;Brexiteers argued that leaving the EU would result in an immediate cost saving, as the country would no longer contribute to the EU budget. To note that in 2016, Britain paid in £13.1bn, but it also received £4.5bn worth of spending. Hence in a simple understanding the UK’s net contribution was £8.5bn.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;998&quot;&gt;&lt;strong data-dcnode-id=&quot;999&quot;&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;Trade&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;995&quot;&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;The EU is a single market in which imports and exports between member states are exempt from tariffs and other barriers. Services, including financial services, can also be offered without restriction across the continent. The consequences of Brexit for businesses that took advantage of these freedoms was always a matter of debate and conjecture.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;991&quot;&gt;&lt;strong data-dcnode-id=&quot;992&quot;&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;Immigration&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;988&quot;&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;Under EU law, Britain could not prevent a citizen of another member state from coming to live in the UK. The result is a huge increase in immigration into Britain, particularly from eastern and southern Europe.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;984&quot;&gt;&lt;strong data-dcnode-id=&quot;985&quot;&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;Sovereignty&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;981&quot;&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;Another important issue for Brexit is the rise of nationalism across the world. There’s a growing distrust of multinational financial, trade, and defense organizations created after World War II., EU, IMF, and NATO, among others.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;977&quot;&gt;&lt;strong data-dcnode-id=&quot;978&quot;&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;Political Elitism&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;Finally, the political leadership of Britain faced a profound loss. The “leave” voters rejected both the Conservative and Labor parties. Both parties had endorsed remaining with the EU and notice that many of their members go into opposition on the issue (Petrescu &amp;amp; Bhatli, 2017). Hence, we notice that it turned into a sensible financial issue and part of recent global political landscape.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;971&quot;&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;Economic Effects Of Brexit&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;968&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;Economists expect that Brexit might have notable immediate and longer-term effects on the economies of the UK and at least part of the 27 other EU member states. In particular, there is a broad consensus among the economists and in the economic literature that Brexit might likely reduce the UK's economic growth in the medium and long term, and that the Brexit referendum itself might damage the economy. Studies on effects since the referendum is also indicating a negative momentum in GDP, trade and investment, as well as household losses from increased inflation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;964&quot;&gt;&lt;strong data-dcnode-id=&quot;965&quot;&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;Immediate Effect&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;958&quot;&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;Short-term macroeconomic forecasts by the Bank of England and other banks of what would happen immediately after the Brexit referendum are too pessimistic. The assessments assumed that the referendum results would create greater uncertainty in markets and reduce consumer confidence particularly by a negative signaling effect. According to one study, the referendum result had pushed up UK inflation by percentage points in 2017, leading to an annual cost of £404 for the average British household. In this respect, it is also estimated that the economic costs of the Brexit vote were approximately 2.1% of GDP (The Guardian, 11&lt;/span&gt;&lt;sup data-dcnode-id=&quot;960&quot;&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;th&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt; Sept. 2018). According to Financial Times (December 21, 2017), the Brexit referendum results has reduced national British income by between 0.6% and 1.3%. A 2018 analysis by Stanford University and Nottingham University economists estimated that uncertainty around Brexit has reduced investment (Berden et al., 2009) by businesses by approximately 6 percentage points and caused an employment reduction by 1.5 percentage points. A number of studies identified that Brexit-induced uncertainty about the UK's future trade policy and also reduced British international trade since June 2016 onwards. Further, a recent 2019 analysis found that British firms substantially increased offshoring to the European Union after the Brexit referendum, whereas European firms reduced new investments in the UK (BBC News, 15th March 2019).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;954&quot;&gt;&lt;strong data-dcnode-id=&quot;955&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;Medium &amp;amp; Long-term Effect&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;953&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;948&quot;&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;There is overwhelming or near-unanimous agreement among economists that leaving the EU might adversely affect the British economy in the medium- and long-term. Surveys of economists in 2016 showed overwhelming agreement that Brexit would likely to reduce the UK's real per-capita income level. In addition, 2018 and 2017 surveys of existing academic research found that the credible estimates ranged between GDP losses of 1.2–4.5% for the UK, and a cost of between 1–10% of the UK's income per capita. These estimates differ depending on whether the UK exits the EU with a hard or soft Brexit (The Independent, 25 March 2019). In January 2018, the UK government's own Brexit analysis was leaked, which showed that UK economic growth would be stunted by 2–8% for at least 15 years following Brexit, depending on the leave scenario. According to most economists, EU membership has a strong positive effect on trade and as a result the UK's trade would be worse off if it leaves the EU (Zaidi et al. 2017). According to a study conducted by University of Cambridge economists, under a &quot;hard Brexit&quot; whereby the UK reverts to WTO rules, one-third of UK exports to the EU would be tariff-free, one-quarter would face high trade barriers and other exports risk tariffs in the range of 1–10%. A 2017 study found that almost all UK regions are systematically more vulnerable to Brexit than regions in any other country. In addition, the same study examining the economic impact of Brexit-induced reductions in migration recommended that there would likely be a significant negative impact on UK GDP per capita, with marginal positive impacts on wages in the low-skill service sector (Baldwin 2016 &amp;amp; Krasaesuk 2017). Nonetheless, it is unclear how changes in trade and foreign investment might interact with immigration, but these changes are likely to be important for global economy. Further, with Brexit, the EU would lose its second-largest economy in terms of financial capital of the world, the country with the third-largest population (German Münchner Merkur, 12&lt;/span&gt;&lt;sup data-dcnode-id=&quot;950&quot;&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;th&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt; September. 2018). We estimate that the EU would lose its second-largest net contributor to the EU budget 2015 (Germany €14.3 billion, UK €11.5 billion, France €5.5 billion). Thus, the departure of Britain would result in an additional financial burden for the remaining net contributors, unless the budget is reduced accordingly. Germany, for example, would have to pay an additional €4.5 billion for 2019. Again for 2020, UK would no longer be a shareholder in the European Investment Bank, in which only EU members can participate. Britain's share amounts to 16%, €39.2 billion (2013), which Britain would withdraw unless there is an EU treaty change (The Institute for Fiscal Studies, 2015). All the remaining EU members (as well as Switzerland, Norway and Iceland) might also likely experience adverse effects (albeit smaller effects than the UK), in particular Ireland, the Netherlands and Belgium. Let us now discuss in detail about the issue:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;947&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;944&quot;&gt;&lt;strong data-dcnode-id=&quot;945&quot;&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;Trade within Europe&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;941&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;Post-Brexit outcomes which reduce trade or increase the cost of trade between the UK and the rest of Europe might be damaging for both sides. The EU is a more important trade partner for the UK than the UK is for the EU. Hence UK demand is very important in macro terms for many EU countries. To note that UK right now runs large bilateral deficits against several member states.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;937&quot;&gt;&lt;strong data-dcnode-id=&quot;938&quot;&gt;&lt;span data-dcnode-id=&quot;939&quot; instrument_node=&quot;&quot;&gt;Foreign Direct Investment&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;934&quot;&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;The UK is the largest recipient of FDI in the EU. Brexit could reduce the attractiveness of the UK as a gateway to Europe. It could also lead to a reduction in investment from the rest of the EU, which is the biggest source of FDI in the UK. It may become harder to attract corporate HQs. The EU was the source of around 46% of the stock of FDI in the UK in 2013. This dependence has started to fall somewhat in recent years, with the EU share down from 53% in 2009. The UK has many advantages that would be unaffected by Brexit such as language, light regulation and deep capital markets. Even so, the UK may struggle to attract as much new investment following Brexit. Other locations inside the EU are likely to be more attractive for marginal investment decisions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;930&quot;&gt;&lt;strong data-dcnode-id=&quot;931&quot;&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;Liberalization and Regulation&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;927&quot;&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;The UK has championed the single market, but outside the EU would no longer be an effective advocate of further liberalization. UK critics often complain about EU regulatory excesses, but many regulations are intended to create the level playing field the single market requires. A paradox of UK Euroscepticism is that following Brexit the UK would lose influence over EU regulation without gaining much freedom to regulate independently.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;923&quot;&gt;&lt;strong data-dcnode-id=&quot;924&quot;&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;Industrial Policy&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;922&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;920&quot;&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;UK industry benefits from research collaboration in Europe and researchers have done well in EU competitions. While the UK would gain flexibility over industrial policy outside the EU, it would lose the benefits from scale and influence over policy in areas such as energy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;916&quot;&gt;&lt;strong data-dcnode-id=&quot;917&quot;&gt;&lt;span data-dcnode-id=&quot;918&quot; instrument_node=&quot;&quot;&gt;Immigration&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;913&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;Immigration is a troubled political issue in the UK both because the costs and benefits are not distributed evenly and as perceptions have become disconnected with reality. This could be partly due to the hostile media coverage. The scope to tighten immigration depends on the Brexit model. This risk is damaging competitiveness, particularly of London, and being economically costly.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;909&quot;&gt;&lt;strong data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;Financial Services&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;906&quot;&gt;&lt;span data-dcnode-id=&quot;907&quot; instrument_node=&quot;&quot;&gt;Established advantages and agglomeration effects mean the UK has a strong competitive edge that would be hard to dislodge. However, existing EU regulations would make it harder for London to serve European markets, particularly for retail products and in euro trading. Financial inclusion might be jeopardized and business could decline.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;902&quot;&gt;&lt;strong data-dcnode-id=&quot;903&quot;&gt;&lt;span data-dcnode-id=&quot;904&quot; instrument_node=&quot;&quot;&gt;Trade Policy&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;899&quot;&gt;&lt;span data-dcnode-id=&quot;900&quot; instrument_node=&quot;&quot;&gt;The UK would be free to set its own trade policy priorities under some Brexit models, but these are unlikely to be much different from the EU’s. The UK would have less leverage and be a lower priority trade partner than the EU for the major economies. The UK would lose the strength in numbers at the WTO when settling disputes with countries like China (Lagarade, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;898&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;895&quot;&gt;&lt;strong data-dcnode-id=&quot;896&quot;&gt;&lt;span data-dcnode-id=&quot;897&quot; instrument_node=&quot;&quot;&gt;International Influence&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;892&quot;&gt;&lt;span data-dcnode-id=&quot;893&quot; instrument_node=&quot;&quot;&gt;The UK currently enjoys considerable influence both in and through the EU. This would be diminished if the UK leaves the EU. There are, however, risks to the UK’s influence even if the UK stays inside the EU. This is both because of a generational change of staff in key institutions and the risk that the Eurozone assemblies against the UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;888&quot;&gt;&lt;strong data-dcnode-id=&quot;889&quot;&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;Budget&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;885&quot;&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;The direct financial cost of EU membership is relatively easy to quantify. However, the financial benefit from leaving the EU depends on the Brexit model and the outcome of the negotiation between the UK and the rest of the EU. There would be significant variation in the impact across the UK, with some parts gaining, while others lose.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;881&quot;&gt;&lt;strong data-dcnode-id=&quot;882&quot;&gt;&lt;span data-dcnode-id=&quot;883&quot; instrument_node=&quot;&quot;&gt;Uncertainty&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;878&quot;&gt;&lt;span data-dcnode-id=&quot;879&quot; instrument_node=&quot;&quot;&gt;Brexit would be a protracted process, lasting around ten years. The endpoint for the UK-EU relationship would be subject to a negotiation. Business would face high and increasing levels of uncertainty during this process, impacting on investment decisions and with macroeconomic consequences. The referendum could be held in 2016 or 2017 following a renegotiation of the terms of the UK’s membership. The outcome is uncertain because the outcome of the renegotiation is uncertain and plebiscites can often end up being about something else, particularly if the government loses popularity. Based on the existing literature of finance, we find that the highly geared firms will jeopardize the economic growth of the country, make an unstable and quite vulnerable. (Hossain et al., 2018; Brikend &amp;amp; Nedelea 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;874&quot;&gt;&lt;strong data-dcnode-id=&quot;875&quot;&gt;&lt;span data-dcnode-id=&quot;876&quot; instrument_node=&quot;&quot;&gt;Contributions to the EU&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;871&quot;&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;Supporters of withdrawal argued that ending net contributions to the EU would allow for tax cuts or government spending increases. According to the study of The Institute for Fiscal Studies (2016), on the basis of Treasury figures, in 2014 the United Kingdom's gross national contribution (ignoring the rebate) was £18.8 billion, about 1% of GDP. Because the UK receives (per capita) less EU spending than other member states. We notice that a rebate was negotiated that contributed £14.4 billion, approximately 0.8% of GDP. If EU spending in Britain is also taken into account, the average net contribution for the next five years is estimated at about £8 billion a year, which is about 0.4% of national income. The Institute for Fiscal Studies (2018) argued that the majority of forecasts of the impact of Brexit on the UK economy indicated that the government would have less money to spend even if it no longer had to pay into the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;867&quot;&gt;&lt;strong data-dcnode-id=&quot;868&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;Financial Institutions&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;861&quot;&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;We find that the share prices of the five largest British banks fell an average of 21% on the morning after the referendum. Shares in many other non-UK banks also fell by more than 10% (CNBC report, 2017). We notice that both HSBC and Standard Chartered had fully recovered, while Lloyds, RBS Group and Barclays remained more than 10% down. All of the Big Three credit rating agencies reacted negatively to the vote: Standard &amp;amp; Poor's cut the UK credit rating from AAA to AA, Fitch Group cut from AA+ to AA, and Moody's cut the UK's outlook to &quot;&lt;/span&gt;&lt;em data-dcnode-id=&quot;863&quot;&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;Negative&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;&quot;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;860&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;857&quot;&gt;&lt;strong data-dcnode-id=&quot;858&quot;&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;International Monetary Fund&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;854&quot;&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;In July 2016, the IMF released a report warning that Brexit’ marks the materialization of an important downside risk to global growth. Considering the current uncertainty as to how the UK would leave the EU, there is still very much unfolding, more negative outcomes are a distinct possibility. In September 2018, the IMF stated that Brexit would probably, &quot;Entail costs&quot;, but a disorderly leaving could result in, &quot;A significantly worse outcome&quot;. In this respect, Lagarde (2018) said that any deal might not be as good as the smooth process under which goods, services, people and capital move around between the EU and the UK without impediments and obstacles. Overall, our projections assume a timely agreement with the EU on a broad free-trade pact and a relatively smooth Brexit process after that. A more disruptive departure would have a much worse outcome.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;851&quot;&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;Financial Effect Of Brexit On Global Landscape&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;845&quot;&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt;1. The vote's result of referendum defied expectations and roiled global markets, causing the British pound to fall to its lowest level against the dollar in 30 years (The Telegraph, 28&lt;/span&gt;&lt;sup data-dcnode-id=&quot;847&quot;&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;th&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt; December, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;836&quot;&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;2. Brexit fears and slow global growth have hit output in manufacturing sector (The Guardian, 10&lt;/span&gt;&lt;sup data-dcnode-id=&quot;841&quot;&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;th&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt; October, 2018). A double whammy of Brexit uncertainty and a slowdown in global trade has seen order books in Britain’s factories shrink at their fastest pace since the financial crisis (Smith, 2018). The CBI’s industrial trends survey&lt;/span&gt;&lt;sup data-dcnode-id=&quot;838&quot;&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt; showed that business optimism has notably fallen, investment intentions has worsened, and firms has run down the stocks built up ahead of the original Brexit deadline. According to the survey, manufacturers believe an improvement in the political outlook over the coming months might lead to a pickup in orders and output. In addition, (Smith, 2018) stated that as the tailwind from stockpiling weakens, clouds are gathering above the manufacturing sector. It is being hit by the double blow of Brexit uncertainty and slower global growth.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;833&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;3. After analyzing the Brexit effect pre-Brexit and post-Brexit referendum periods on the co-movements between the British pound (GBP), the euro (EUR) and the yen (JPY) against the US dollar (USD), findings indicate a negative impact of the pre-Brexit referendum period on the correlation between GBP and EUR, while there is no significant effect on GBP–JPY and EUR–JPY pairs (Alvarez-Diez et al. 2019). The loss of correlation in the GBP–EUR pairing has not been recovered during the post-Brexit referendum period. This situation could be attributed to the uncertainty about the final impact of Brexit on British and Eurozone economies. The loss of correlation in the GBP–EUR pair has important implications for individual investors, portfolio managers and traders with respect to hedging activities, international trading and investment strategies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;4. We also notice that Post-Brexit referendum, both the London Stock Exchange FTSE100 index (5% decline) and US Dow Jones Industrial Average (450 points decline) indicates violent fluctuations in daily trading described as world-wide stock market crash by the experts (CNBC Report, March 15; 2017). Hence Brexit might have a systematic cascading effect on the global capital market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;827&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;5. According to Olekseyuk et al. (2019) developing countries with close ties to the UK might suffer from Brexit as import duties are once again imposed. In particular, 49 of the world’s poorest countries presently benefit from preferential treatment that covers 99% of all products under the EBA agreement. According to UN Comtrade data for 2016-2017, although countries under EBA agreement account for only 1.15% of the UK’s imports, the share of their exports to the UK exceeds 35% in apparel, 21% in textiles and 9% in sugar. The findings show that losing these preferences together with the UK’s withdrawal from the EU may cause EBA countries’ GDPs to fall by -0.01% to -1.08%. The simulations also indicate that the highest losses is occurred in Cambodia and Malawi, where dependence on the UK market is strong. Moreover, Brexit may cause the number of those living in extreme poverty (PPP $1.90 a day) to rise by nearly 1.7 million in all EBA countries. These are conservative estimates of Brexit’s negative impacts; they do not take into account the additional implications of uncertainty, depreciation of the pound sterling, reduced aid spending, remittances and investments.?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;824&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;6. The global stock markets lost trillions of capitalizations the day after Britain’s surprise vote to withdraw from the EU (Liaw 2018 &amp;amp; Morphet 2014). The government bond yields dropped to record lows in countries where investors sought flight-to-safety. The British Sterling depreciated to a low level. Consequently, the stock markets rebounded to higher than the pre-referendum levels with the passage of time, government bond yields went lower, and the British Sterling continued to slide. The results also show the evidence of contagion from Brexit vote to the Japanese and US stock markets at a bearish performance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;821&quot;&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;Soft or hard brexit? A dilema&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;817&quot;&gt;&lt;strong data-dcnode-id=&quot;818&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;Soft Brexit&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;814&quot;&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;When people talk about Soft Brexit, they are referring to a scenario where the UK stays either within the EU’s Single Market by becoming a member of the European Economic Area (like Norway), or in the European Customs Union, or both. If this happened, the short-term economic impact of leaving the EU would likely to be small. However, if it remained in the Single Market, the UK would have to maintain free movement of EU citizens, it would remain subject to judgments of the European Court of Justice and it would have to contribute to the EU budget. If the UK remained in the Customs Union, it would be unable to strike its own trade deals with other countries. It would benefit from all trade deals signed by the EU. However, those EU deals signed after Brexit would be negotiated without any UK input.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;802&quot;&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;Most recently, Boris Johnson said that UK would leave the bloc &lt;/span&gt;&lt;em data-dcnode-id=&quot;810&quot;&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;&quot;Do or die&quot; &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;on 31 October 2019 - prompting some UK MPs to act to stop the UK leaving without an agreement (&lt;/span&gt;&lt;em data-dcnode-id=&quot;807&quot;&gt;&lt;span data-dcnode-id=&quot;808&quot; instrument_node=&quot;&quot;&gt;BBC News, August 30, 2019&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;). In addition, according to BBC news (19&lt;/span&gt;&lt;sup data-dcnode-id=&quot;804&quot;&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;th&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt; Sept, 2019), confidential documents that reflect the ideas the UK has put forward on Brexit have been shared with the EU. Here we understand that more interesting and live discussions are taking place between the EU and UK about ruling out another delay to Brexit if a deal is agreed. Most recently, we find that Brexit Secretary Stephen Barclay holds optimistic talks with the EU's chief negotiator, Michel Barnier. The discussion follows that a new Brexit deal could still be reached before 31 October. For that purpose, we also notice that Mr Johnson is going to continue more talks with European leaders at a UN summit in New York soon.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;798&quot;&gt;&lt;strong data-dcnode-id=&quot;799&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;Hard Brexit&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;795&quot;&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;Hard Brexit means UK would leave not only the EU but also the EU’s Single Market (of which non-EU countries are also members) and the EU Customs Union (of which non-EU countries are also members). Hence UK would instead aim to secure a free trade deal with the EU, ideally covering both goods and services. In a hard Brexit situation, the UK would not have to sign up to free movement of EU nationals, or be subject to the European Court of Justice. It would probably not to contribute to the EU budget. It would also be able to sign free trade deals with other countries. However, the UK is unlikely to be able to sign a free trade deal with the EU or other countries before it leaves the EU in 2019 (Benjamin Mueller, 2019). Unless a transitional deal with the EU is reached, it is quite likely that for a period of a few years, the UK would have to trade with the EU and other countries under the rules of World Trade Organization (WTO). Overall, this is expected to have a long-lasting adverse impact on the UK economy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;794&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;792&quot;&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;Key Findings&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;786&quot;&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;1. Exit from EU is expected to take place at a longer time. In this respect, Article 50 of the Lisbon Treaty provides rules that it takes 2 years to exit form EU. Within this period the investors might be very indeterminate about the pound rate, about the new policies of trade with the countries of EU. For this reason, it is assumed that by 2020, the investment could fall by 16% to 20%. By 2030, when all the policies are settled, the economy might grow again (The Telegraph, 21&lt;/span&gt;&lt;sup data-dcnode-id=&quot;788&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;st&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt; November, 2018).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;783&quot;&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;2. According to PWC report of Sept. 2018, immediately after Brexit the GDP of UK could fall by 2% to 2.5%. However, we forecast that GDP might regain again after the settlement of all policies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;3. As stated earlier that almost 45% of EU market is held by UK. Hence after Brexit the EU can make some harsh decision about the trading policies with EU, they can put more tariff or custom duties on UK companies. The businessman and Investors from UK need to find a new market to invest this can fall the investment directly. In addition, FDI rate could be decrease, because EU gives a significant rate of FDI to UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;777&quot;&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;4. We expect that once UK exits EU, UK can autonomously control who can migrate to UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;774&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;5. The member countries of European Union have to pay a certain amount of money to European Central Bank. After Brexit the UK do not have to pay this money.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;771&quot;&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;6. As UK can control their migration procedures, they can control with whom they can trade, or people from which country they might allow and not allow to enter. Thus, UK might uphold their sovereignty control.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;768&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;7. Due to Brexit, immediately the employment might fall. But eventually it will increase again after the settlement of the various policies of the country.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;762&quot;&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;8. UK is still not ready for Brexit, though UK is possibly come out from EU before 31&lt;/span&gt;&lt;sup data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;st&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt; October 2019.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;759&quot;&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;9. Brexit might be excellent for those businessmen who run their business only in UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;756&quot;&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;10.Because of Brexit, UK might lose a huge market of skilled worker. Hence more job opportunity for UK citizen might be created.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;753&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;11. Overall, we analyze that the future is uncertain for UK in the global market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;750&quot;&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;Suggestion And Recommendation&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;747&quot;&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;We observe that the decision of Britain leaving EU has always have a two-sided argument. With stagnation and sovereignty at stake (Borchert, 2016) some might claim that it is a right decision. But on the other hand, the various economic impacts ranging from effect on trade, labor and industries might be a contention for discourse. We estimate that the future of the Britain’s economy is uncertain, but not looking bright. They might no longer be in relation with the 27 other countries that can boost their economy, and lend them money whenever it is needed. As of now, the UK could most likely try to negotiate an agreement that allows them access to the EU’s single market without tariff and market barriers. In fact, we call this the Norway option, because it is the same deal that Norway has with the Union, even though they were never a part of it. In summary, Brexit might be highly risky decision on economic aspects for Britain. Finally, for greater interest of Great Britain, UK shouldn’t leave the EU, or they can make a deal with EU and go for a soft exit agreement with the EU. Therefore, we recommend the following suggestions:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;744&quot;&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;1. UK should do some solid deals with EU so that no one is badly affected for long term.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;738&quot;&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;2. There should be a rethink of revised 2&lt;/span&gt;&lt;sup data-dcnode-id=&quot;740&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;nd&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt; Referendum.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;735&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;3. They should carefully think about soft Brexit and take the decision more practically.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;732&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;4. Northern Ireland border should remain open.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;729&quot;&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;5. Single Market could be continued to compete the global market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;726&quot;&gt;&lt;span data-dcnode-id=&quot;727&quot; instrument_node=&quot;&quot;&gt;6. UK should give the opportunity to skilled workers for their jobs and business incentives in UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;720&quot;&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;7. We suggest that the North-South Ministerial Council (NSMC) could have a role in finding a feasible solution to the deadlock over the Irish border&lt;/span&gt;&lt;sup data-dcnode-id=&quot;722&quot;&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;. In fact, the new arrangements to deal with cross-border trade after Brexit could involve the NSMC.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;717&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;APPENDIX 1&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;714&quot;&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;Political Structure of European Union (EU)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;711&quot;&gt;&lt;img alt=&quot;image&quot; class=&quot;img-fluid img-thumbnail&quot; data-dcnode-id=&quot;712&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.abacademies.org/articles-images/international-academy-25-2-147-a001.png&amp;amp;raw&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;708&quot;&gt;&lt;img alt=&quot;image&quot; class=&quot;img-fluid img-thumbnail&quot; data-dcnode-id=&quot;709&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.abacademies.org/articles-images/international-academy-25-2-147-a002.png&amp;amp;raw&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;705&quot;&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;End Notes&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;702&quot;&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;1. The details about EU is available at: https://europa.eu/european-union/index_en&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;699&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;2. The international agreement responsible for the creation of the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;696&quot;&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;3. The details of UK vote to leave EU are available at: https://www.bbc.com/news/politics/eu_referendum/ results.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;693&quot;&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;4. The European Court of Human Rights (ECHR) is a supranational or international court established by the European Convention on Human Rights. The court hears applications alleging that a contracting state has breached one or more of the human rights provisions concerning civil and political rights set out in the Convention and its protocols.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;690&quot;&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;5. We understand that offshoring is the relocation of a business process from one country to another, typically an operational process, such as manufacturing, or supporting processes, such as accounting.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;687&quot;&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;6. Please check for more details about the issue at: https://www.imf.org/external/index.htm, dated 16th June. 2016.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;684&quot;&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;7. https://www.fxstreet.com/economic-calendar/event/8df5f5f7-450c-4ec0-804d-ead18d05050d&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;681&quot;&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;8. Comrade Labs is a place to showcase innovative and experimental uses of UN Comtrade data. Explore visualizations of huge volume of data and metadata, cutting-edge data extraction tools, and alternative dissemination platforms. The details are available: https://comtrade.un.org/.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;678&quot;&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;9. The North South Ministerial Council (NSMC) was established under the Belfast/Good Friday Agreement (1998), to develop consultation, co-operation and action within the island of Ireland. It is the main body for cross-border cooperation between the governments of Northern Ireland and the Republic of Ireland.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;675&quot;&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;Conclusion&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;672&quot;&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;As of now, we notice that a referendum on Brexit is almost certain. While the outcome is far from a foregone conclusion, a vote for Britain to leave the EU is very much possible. The impact of Brexit on British businesses, the UK economy and wider British interests would be severe across multiple channels. Based on the overall analysis and critical review of the study, we analyze that UK might experience particular difficulties after Brexit. But in long term the crack might be filled out. It will depend on how UK would approach the world in various terms. In fact, both the path and the endpoint, in terms of the new relationship between the UK and the rest of the EU, would be uncertain, compounding the costs to the UK. In addition, the direct impact on the rest of the EU would also be significant. The export, supply chain, investment and policy interests of many large corporates would be adversely affected. Nonetheless, perhaps the single biggest impact might be on the cost of raising finance in Europe which is likely to increase. Brexit would have a wider political impact on the EU, by disrupting internal political dynamics and risk of political contagion. Europe would also lose esteem and influence around the globe. Further, member states would be affected in different ways and to different extents. This might most likely influence ways in which states are willing to engage and accommodate the UK during the pre-referendum negotiation. All member states would, however, feel the impact of Brexit, both politically and economically. Therefore, there is still much curiosity about the ultimate consequence of Brexit in global political and business paradigm shift.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;669&quot;&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;References&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;561&quot;&gt;&lt;span data-dcnode-id=&quot;667&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;658&quot; id=&quot;Reference_Titile_Link&quot; value=&quot;1&quot;&gt;&lt;a data-dcnode-id=&quot;666&quot; id=&quot;1&quot; name=&quot;1&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;Alvarez Diez, S., Baixauli-Soler, J.S., &amp;amp; Belda-Ruiz, M. (2019). Co-movements between the British pound, the euro and the Japanese yen: the Brexit impact. &lt;/span&gt;&lt;em data-dcnode-id=&quot;663&quot;&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;Journal of Economic Studies&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;em data-dcnode-id=&quot;660&quot;&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;46(2)&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;, 467-481.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;657&quot; instrument_node=&quot;&quot;&gt;
