quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;855&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;856&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Tim-Bale-21578671&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;857&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;858&quot;&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;Tim Bale&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;849&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;850&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7df57c lite-page-hidden&quot; data-dcnode-id=&quot;851&quot;&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;Insider and journalistic accounts of the formation in May 2010 of the Conservative-Liberal Democrat coalition actually, although not explicitly, rely on types of explanation familiar to those who study politics. They tell us that structure (or at least the economy) was important. So too, they suggest, were institutions (timing and the rules of the game). They also stress the importance of contingency (‘events, dear boy, events’) and agency (who did and said what to whom). While none of these things were unimportant, they only served to make certain an outcome that anyone with a passing acquaintance with the theory and the practice of coalition formation would have predicted—namely a ‘minimum winning coalition’. The only thing that could have made that outcome uncertain was a fundamental ideological difference between the two parties involved; however, it quickly became apparent—to the surprise of those of us who failed to appreciate how much the Liberal Democrats had changed—that no such difference existed. Indeed, it is possible to argue that the coalition formed was not merely minimum winning but ‘minimum connected winning’. As such, its formation was not so much breathtakingly bold and exciting as pretty much inevitable. In the end, the maths and the physics mattered more than the chemistry. Fortunately for the Conservatives, the Liberal Democrats seriously underplayed their hand in the negotiations, with possibly disastrous consequences for them in the long term.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;833&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;834&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;835&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;836&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;837&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;843&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-leg quot;&quot;&gt;Other works have asked whether parties matter; this article asks whether parties’ dominant factions matter. Special focus is placed on whether change in dominant faction or coalition within the party tends to produce other significant party change, and under what circumstances. Three specific hypotheses are developed and tested, one involving motivation for change and the other two involving ‘resources’ which are necessary to make dramatic change possible. Empirical analysis rests upon original data covering seven changes in dominant faction and several dimensions of party change within five parties in the United Kingdom and Germany for the period 1950 to 1990. The authors conclude that not all of the hypothesized factors have equal impact on degree of party change, with ability of the newly dominant faction to control its coalition being primary.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;777&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;778&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;779&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;780&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;781&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;787&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy quot;&quot;&gt;Tim Bale&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;746&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;747&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7df8e4 lite-page-hidden&quot; data-dcnode-id=&quot;748&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;Why parties change is still not that well understood by political scientists. While there are certain seminal attempts that are routinely cited -- by Panebianco (1988) and Harmel and Janda (1994) -- there have been surprisingly few attempts to apply them in detail to particular parties or groups of parties. Ambitious systematic approaches, then, are trailed, then cited, but never properly engaged with. This paper introduces a project that will do the latter, putting abstract hypotheses through their paces in a real-world, over-time scenario, suggesting where they fall down, where they come through, and how they might be modified and supplemented. Scholars in the comparative, quantitative and formal theoretical traditions may be well on their way when it comes to *how* parties shift or stand pat in response to shifting public opinion and good or bad results, but, they note, they still need case studies if they are ‘to explain in detail *why* parties behave in this way.’ The case study in this paper British Conservative Party between 1945 and 1951, during which period enormous organizational changes occurred. These changes were not driven by the Party’s leader, but its dominant coalition, though not particularly cohesive, made a difference. Underpinning everything, however, was the need to bounce back afte d=&quot;557&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;561&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Corina Barbaros&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;563&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/1013995473481733-1618766768880_Q64/Corina-Barbaros.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;558&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;559&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Corina-Barbaros&quot;&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;Corina Barbaros&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;549&quot;&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;This study addresses the deliberative democracy from a critical perspective, highlighting the benefits of the deliberative turn. Among the deliberative democracy's benefits the study includes: community-generating power, improving the accuracy of decisions, democratic legitimation of political power, democratic accountability, shaping policy by market-testing, informing public policy process. But &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;552&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626c5ad7dfd11&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626c5ad7dfd11&quot; data-dcnode-id=&quot;550&quot;&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt; beyond deliberative democracy advantages which are recognized by most scholars, it still remains the issue of the possibility of real-world deliberative democracy. The study presents a number of possibility conditions for deliberative democracy and several models of deliberation that can be extended (deliberative polls, citizens' juries, national issues forums, referenda). We particularly discuss the deliberative democracy's scale problem. The most important research questions in the present study are: How do we go from micro to macro-deliberation? Who is entitled to a say? What counts as good discourse and deliberation? How citizen deliberation can have consequences in democratic practice? The main idea is that deliberative democracy in practice implies a rethinking of politics and its feasibility is part of its desirability.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;547&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/283815793_Matters_of_Deliberative_Democra va-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;521&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;522&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;523&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Larry-Jay-Diamond-2008600417&quot;&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;Larry Jay Diamond&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;513&quot;&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;On March 18, 2000, Taiwan experienced an electoral earthquake. After half a century in power on the island of Taiwan and eight decades of an undisrupted ruling position dating back to its heyday on the Chinese mainland, the Kuomintang (KMT) lost power in a free and fair presidential election. The power rotation at the close of the century is historic by any measure. It has closed an epoch of &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;516&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626c5ad7dfe75&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626c5ad7dfe75&quot; data-dcnode-id=&quot;514&quot;&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt; one-party dominance and inaugurated a period of party dealignment and realignment. It deflated Lee Teng-hui's charisma and brought his era to an abrupt and calamitous end. At the elite level, it has triggered a generational turnover, pushing the baby boomers to the forefront of governing responsibility. Most significantly, it pushed the island's political system for a major step forward toward the consolidation of democracy.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;511&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/260142526_Sizing_Up_Taiwan%27s_Political_Earthquake&quot;&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;Read more&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&quot; data-dcnode-id=&quot;479&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none&quot; data-dcnode-id=&quot;480&quot;&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;481&quot;&gt;&lt;div class=&quot;publication-recommendation-item publication-recommendation-item--redesign&quot; data-dcnode-id=&quot;482&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommend trument_node=&quot;&quot;&gt; polls in terms of their cooperativeness and in terms of possible effects of published opinion polls on the electorate. The use of polls by politicians and governments is regarded under the notion of responsiveness. The entry concludes with a critical outlook on the future of opinion polls in democracies.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;483&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/314602614_Public_Opinion_Polls&quot;&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;Read more&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item&quot; data-dcnode-id=&quot;448&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none&quot; data-dcnode-id=&quot;449&quot;&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;450&quot;&gt;&lt;div class=&quot;publication-recommendation-item publication-recommendation-item--redesign&quot; data-dcnode-id=&quot;451&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges&quot; data-dcnode-id=&quot;475&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item&quot; data-dcnode-id=&quot;476&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legac t;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;461&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;462&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;463&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;464&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Ulf-Himmelstrand-83198330&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;Ulf Himmelstrand&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract&quot; data-dcnode-id=&quot;454&quot;&gt;&lt;span data-dcnode-id=&quot;459&quot; instrument_node=&quot;&quot;&gt;Virtually all social scientists, Marxists or non-Marxists, agree that various aspects of advanced contemporary societies have become increasingly interdependent. Therefore it would seem that piecemeal definitions of issues and social problems are becoming more and more inadequate in dealing with the crucial systemic characteristics of our societies. Decision-makers as well as the public need not &lt;/span&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click&quot; data-dcnode-id=&quot;457&quot; data-lite=&quot;{&amp;quot;click&amp;quot;:[{&amp;quot;t&amp;quot;:&amp;quot;.js-target-626c5ad7e02a7&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;tc(lite-page-hidden)&amp;quot;},{&amp;quot;t&amp;quot;:&amp;quot;self&amp;quot;,&amp;quot;a&amp;quot;:&amp;quot;ac(lite-page-hidden)&amp;quot;}]}&quot;&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;... [Show full abstract]&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;lite-page-hidden js-target-626c5ad7e02a7&quot; data-dcnode-id=&quot;455&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt; only more information, but systemic information based on structural rather than piecemeal definitions of issues and social problems. This paper explores, firstly, how mainstream sociology and Marxism deal with the complexity and interdependency characteristics of mature capitalist societies. Secondly, it explores some normative conclusions about the type of political information and communication needed in mature capitalist societies, according to Marxist and mainstream sociological interpretations. Thirdly, it provides some empirical illustrations of how we can study piecemeal versus structural definitions of issues and problems in political communications and public opinion. Finally, some assertions about holistic versus piecemeal political communication and policy-making are briefly confronted with Popper's views about the compatibility of piecemeal versus utopian or holistic social engineering with political democracy.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign&quot; data-dcnode-id=&quot;452&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/229625249_Structural_versus_Piecemeal_Definitions_of_Social_Issues_A_Subjective_Factor_in_Systern-Transcending_Struggle&quot;&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;Read more&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;lite-page-ad lite-page-ad--has-label lite-page-ad--empty&quot; data-dcnode-id=&quot;419
