l-flex--align-items-stretch@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-nowrap@s-up research-detail-middle-section&quot; data-dcnode-id=&quot;2456&quot;&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex__item--grow research-detail-middle-section__item&quot; data-dcnode-id=&quot;2478&quot; style=&quot;flex-basis:0px;flex-grow:2&quot;&gt;&lt;div class=&quot;nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-1-above&quot; data-dcnode-id=&quot;2479&quot;&gt;&lt;div class=&quot;nova-legacy-c-card__header nova-legacy-c-card__header--show-divider nova-legacy-c-card__header--spacing-inherit&quot; data-dcnode-id=&quot;2483&quot;&gt;&lt;h2 class=&quot;nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-700&quot; data-dcnode-id=&quot;2484&quot;&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit&quot; data-dcnode-id=&quot;2480&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-800 research-detail-middle-section__abstract&quot; data-dcnode-id=&quot;2481&quot; itemprop=&quot;description&quot;&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;We use a detailed study of the reasons behind significant changes in Conservative Party immigration policy over a half a century to see if they can be explained by the three most commonly cited drivers of party change. We find that electoral ‘shocks’ matter but that leaders matter most, while factional turnover is less important than is often thought. We also conclude that any theory of party policy change also needs to take more seriously (a) the requirement on parties to react to events in the ‘real world’, particularly when they are in government and (b) the fact that, in a competitive democracy, politicians are ideologically and instrumentally motivated to continuously monitor and then to reflect public (and party) feeling, and that this may be every bit as important as the periodic signals that they are sent at elections. This accords with recent cross-national research on parties’ policy changes – research which suggests that election results are less likely to trigger changes than are shifts in public opinion. That said, we also observe significant shifts occurring even when there is broad consonance rather than a marked contrast or mismatch between the electorate’s and the party’s preferences.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-l-flex__item nova-legacy-l-flex__item--grow research-detail-middle-section__item&quot; data-dcnode-id=&quot;2457&quot; style=&quot;flex-basis:0px;flex-grow:1&quot;&gt;&lt;div class=&quot;js-lite-promo&quot; data-dcnode-id=&quot;2458&quot; data-promo-action=&quot;append&quot; data-promo-id=&quot;login2&quot;&gt;&lt;div class=&quot;js-target-signup-promo&quot; data-dcnode-id=&quot;2459&quot;&gt;&lt;div class=&quot;lite-page-promo research-detail-signup-promo&quot; data-dcnode-id=&quot;2460&quot;&gt;&lt;picture class=&quot;lite-page-promo__brand research-detail-signup-promo__brand&quot; data-dcnode-id=&quot;2474&quot; height=&quot;14&quot; width=&quot;100&quot;&gt;&lt;source data-dcnode-id=&quot;2477&quot; data-srcset=&quot;images/icons/svgicons/researchgate-logo-white.svg&quot; type=&quot;image/svg+xml&quot;&gt;&lt;span data-dcnode-id=&quot;2476&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;ResearchGate Logo&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;2475&quot; data-src=&quot;images/icons/svgicons/researchgate-logo-white.svg&quot; height=&quot;14&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhE 22&quot;&gt;&lt;div class=&quot;js-target-citation&quot; data-dcnode-id=&quot;1723&quot; id=&quot;citations&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-m nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;1724&quot; type=&quot;bare&quot;&gt;&lt;div data-dcnode-id=&quot;1725&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item publication-citations__item publication-citations__item--redesign&quot; data-dcnode-id=&quot;2275&quot;&gt;&lt;div class=&quot;nova-legacy-v-citation-item&quot; data-dcnode-id=&quot;2276&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;2277&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2327&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip nova-legacy-c-tooltip--position-above-left nova-legacy-c-tooltip--elevation-none nova-legacy-c-tooltip--color-white nova-legacy-c-tooltip--spacing-m nova-legacy-c-tooltip--luminosity-medium nova-legacy-v-citation-item__context&quot; data-dcnode-id=&quot;2328&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__body&quot; data-dcnode-id=&quot;2329&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__body-content&quot; data-dcnode-id=&quot;2332&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;2333&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2334&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;2335&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2352&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;2353&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2354&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;2355&quot;&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;... His successor as minister, James Brokenshire, quickly earned a name for himself with his first ministerial speech in which (almost incredibly given his predecessor's reasons for resigning) he condemned elites employing foreign nationals as nannies, cleaners and tradespeople, when British citizens were without jobs. And all the while, Theresa May has been tightening eligibility and announcing crackdown after crackdown in order to meet the government's ultimately unmeetable target of reducing net migration (the number entering the United Kingdom minus the number leaving) 'from the hundreds to the tens of thousands'a target supposedly based on the migration levels in the United Kingdom in the Major period (Conservative Party, 2010) and, incidentally, one that recalls the Party's manifesto pledge of 1974 to bring down 'new immigration … to a small and inescapable minimum' (cited in &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;2357&quot;&gt;&lt;span data-dcnode-id=&quot;2358&quot; instrument_node=&quot;&quot;&gt;Bale and Partos, 2014)&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;2356&quot; instrument_node=&quot;&quot;&gt;. This is not to say that there has been no liberalisation, especially when Cameron's modernisation project seemed to be in full swing.  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2344&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;2345&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2346&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;2347&quot;&gt;&lt;span data-dcnode-id=&quot;2351&quot; instrument_node=&quot;&quot;&gt;... The desire to cut down on immigration through the family route is nothing new. The Conservatives' 1966 manifesto pledged that those entering the United Kingdom would have to 'declare' potential dependents &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;2349&quot;&gt;&lt;span data-dcnode-id=&quot;2350&quot; instrument_node=&quot;&quot;&gt;(Bale and Partos, 2014)&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;2348&quot; instrument_node=&quot;&quot;&gt;; similarly, the Conservative manifesto of 1979 proposed a register of Commonwealth wives (not husbands) and children elegible for settlement. The pledge was disregarded once the Tories had won office on account of its being impractical, ineffective and expensive, whereas other related measures did not survive legal scrutiny.  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2336&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;2337&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2338&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;2339&quot;&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt;... By 2005, talk of bogus asylum seekers had become a staple of Conservative and media discourse, and of public opinion polls. At the election that year Michael Howard proposed a fixed quota on the number of asylum seekers that the United Kingdom would accept, and even suggested removing its obligations under the 1951 UN Convention on Refugees in order to do this &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;2341&quot;&gt;&lt;span data-dcnode-id=&quot;2342&quot; instrument_node=&quot;&quot;&gt;(Bale and Partos, 2014)&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;2340&quot; instrument_node=&quot;&quot;&gt;. Fast forward to 2014, however, and we find that Cameron's government has not spent time on asylum policy, and nor do the public seem anywhere near as concerned about the issue as they were previously.  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body&quot; data-dcnode-id=&quot;2330&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow-tip&quot; data-dcnode-id=&quot;2331&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;2278&quot;&gt;&lt;div class=&quot;nova-legacy-v-citation-item__context-source&quot; data-dcnode-id=&quot;2279&quot;&gt;&lt;div class=&quot;nova-legacy-v-publicat ndex=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Tim-Bale-21578671&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;2305&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2306&quot;&gt;&lt;span data-dcnode-id=&quot;2307&quot; instrument_node=&quot;&quot;&gt;Tim Bale&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2297&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2298&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7de091 lite-page-hidden&quot; data-dcnode-id=&quot;2299&quot;&gt;&lt;span data-dcnode-id=&quot;2300&quot; instrument_node=&quot;&quot;&gt;This article draws on party documents and media coverage in order to consider the degree to which ‘modernisation’ is evident in Conservative immigration policy during the last decade, separating that policy into four areas: economic, students, family and asylum. It concludes that, after nearly two years of virtual silence on the issue intended to help David Cameron ‘detoxify’ the Tory brand, the outstanding feature of Conservative immigration policy since late 2007 has been the ratcheting up of hard-line rhetoric and policies – this despite an initial stress on distinguishing between ‘good’ and ‘bad’ immigration designed to placate both traditionalists, on the one hand, and modernisers and business backers, on the other. The move towards restriction accelerated after the party entered government and as concerns about UKIP mounted. Family migration policy is hardly a shining example of ‘compassionate Conservatism’, although aspects of the latter are clearly visible in the government’s treatment of particular groups of asylum applicants. Meanwhile, chronic internal tensions on both economic and student migration remain unresolved. Moreover, despite its increasingly restrictive measures, the party missed its target of reducing net annual migration ‘to the tens of thousands’ – in part because it was ultimately unwilling to abandon freedom of movement within the EU.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2281&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2282&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2283&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2284&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;2285&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;2291&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;2292&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/275248072_Immigration_and_asylum_policy_under_Cameron%27s_Conservatives&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;2293&quot;&gt;&lt;span data-dcnode-i Legislature_in_Immigration_Policy-Making_A_Liberal_Constraint&quot;&gt;&lt;span data-dcnode-id=&quot;2257&quot; instrument_node=&quot;&quot;&gt;The Legislature in Immigration Policy-Making: A Liberal Constraint?&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2241&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta&quot; data-dcnode-id=&quot;2242&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-left&quot; data-dcnode-id=&quot;2251&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__type&quot; data-dcnode-id=&quot;2252&quot;&gt;&lt;span data-dcnode-id=&quot;2253&quot; instrument_node=&quot;&quot;&gt;Thesis&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-left&quot; data-dcnode-id=&quot;2248&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-medium nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-ghost nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__fulltext&quot; data-dcnode-id=&quot;2249&quot;&gt;&lt;span data-dcnode-id=&quot;2250&quot; instrument_node=&quot;&quot;&gt;Full-text available&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-right&quot; data-dcnode-id=&quot;2243&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;2244&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;2245&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;2246&quot;&gt;&lt;span data-dcnode-id=&quot;2247&quot; instrument_node=&quot;&quot;&gt;Aug 2017&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2230&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;2231&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;2232&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;2233&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Peter-Walsh-13&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;2234&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;2237&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;2238&quot;&gt;&lt;span data-dcnode-id=&quot;2240&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Peter William Walsh&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;2239&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/776512584314880-1562146435266_Q64/Peter-Walsh-13.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2235&quot;&gt;&lt;span data-dcnode-id=&quot;2236&quot; instrument_node=&quot;&quot;&gt;Peter William Walsh&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2226&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2227&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7ddd3d lite-page-hidden&quot; data-dcnode-id=&quot;2228&quot;&gt;&lt;span data-dcnode-id=&quot;2229&quot; instrument_node=&quot;&quot;&gt;Over the last thirty years, research on the immigration policy-making of liberal democratic states has been preoccupied with the puzzle of why migrant inflows have reached unprecedented levels in Western countries, despite popular calls for restrictionism. A common response of scholars to this puzzle is that whilst governments endeavour to reflect public preferences for restrictive immigration policy, they are prevented from doing so by norms and institutions that are characteristic of liberal democracies. These ‘liberal constraints’ include the national judiciary; international human rights norms; and supranational institutions, such as the European Union. But what of the national legislature? What is the role of this key liberal institution in shaping immigration law within Western democracies? On this question, the literature says remarkably little. This thesis endeavours to redress this apparent neglect. Its case study is the United Kingdom, which is viewed, on the basis of existing research, as a ‘most-likely’ case for having a weak legislature; and in which the executive branch of government has been shown to be relatively unconstrained by the judiciary in comparison with other European states. Does anything, then, act to constrain the immigration restrictionism of the British government? Informed by a novel theoretical framework, ‘interpretive political opportunity structures’, the investigation focuses upon the Parliamentary passage of a single policy: the Immigration Bill 2013-14. Its analysis is based on a detailed examination of the Bill and its legislative process; and on thirty-three interviews that I conducted with key immigration policy stakeholders, including two Government ministers, one from each of the Coalition parties; Government and Opposition MPs; members of the House of Lords; civil servants; legal professionals; and lobbyists. The findings reveal that the UK Parliament had an important liberalising impact upon the Bill, acting to constrain the restrictionist bent of the executive. If the UK is accepted as a case in which we are most likely to find the opposite of this, i.e., a legislature impotent against a dominant executive, then the orthodox view that the legislature is in general a marginal actor in shaping immigration law may have to be revised. Notably, the unelected upper chamber, the House of Lords, appeared to constitute a stronger check on executive power than the elected lower chamber, the House of Commons. This is consonant with Peers’ understanding of their duty to legislate responsibly, rather than responsively (i.e., in line with popular opinion) like MPs in the Commons. Insulated from populist pressures, the Lords invites comparison with respect to its function and impact to the judiciaries of other Western nations, suggesting, perhaps, that in the British constitutional system, known for its pusillanimous judiciary, the Lords evidences an ‘adaptation’ to the marked power imbalance between the judicial and executive branches of the UK state.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2210&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2211&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack- --type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;2184&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;2185&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;2186&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Gillian-Peele-2186859571&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;2187&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2188&quot;&gt;&lt;span data-dcnode-id=&quot;2189&quot; instrument_node=&quot;&quot;&gt;Gillian Peele&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2179&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2180&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7dd79c lite-page-hidden&quot; data-dcnode-id=&quot;2181&quot;&gt;&lt;span data-dcnode-id=&quot;2182&quot; instrument_node=&quot;&quot;&gt;The aim of this chapter is to consider the most complex relationship of the Heath era within the Conservative Party politics, that is, the relationship between the Heath and Enoch Powell, and the challenge that emerged from the politics of Powellism. The chapter opens by identifying the cult of Powell, by assessing his conduct in the General Election campaign of 1970. Not only did the press afford Powell the level of coverage that was normally reserved only for party leaders, but the unexpected victory of the Conservatives could be linked to the appeal of Powellism. The chapter justifies this claim by utilising the academic research that argued that Powell(ism) tapped into latent anti-immigration feeling and was a contributing factor to the swing from Labour to Conservatives, especially amongst working-class voters (the chapter also explores the fears within Conservative circles that had they lost the General Election of 1970 and Heath had resigned, how could they stop Powell from gaining the party leadership).&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2163&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2164&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2165&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2166&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;2167&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;2173&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;2174&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/347839272_Heath_Powell_and_the_Battle_for_the_Soul_of_the_Conservative_Party&quot;&gt;&lt;span class=&quot;nova-legacy-c-button_  nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2070&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7dd97c lite-page-hidden&quot; data-dcnode-id=&quot;2071&quot;&gt;&lt;span data-dcnode-id=&quot;2072&quot; instrument_node=&quot;&quot;&gt;This paper seeks to problematise the historical significance of the EU for British governing strategy with reference to immigration policy and the concept of depoliticisation. Situating British governing strategy in terms of the crisis-prone nature of capitalist society, this paper argues that British immigration policy has been depoliticised through, initially, the invocation of globalisation and, more recently, the EU. Through this strategy, the British state has been able to repeatedly claim that immigration policy is largely out of its hands, as they have no control over workers wishing to enter Britain looking for work. This paper makes three claims: firstly, immigration policy has been used as a means by both Conservative and Labour governments to manage inflation and labour; secondly, successive governments have sought to depoliticise immigration policy through reference to external forces; thirdly, this strategy of depoliticisation ultimately failed, politicising Britain’s relationship with the EU and creating conditions for Britain’s exit from the EU.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2053&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2054&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2055&quot;&gt;&lt;div class=&quot;nova-l 1922&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1923&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Peter-Taylor-Gooby&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1924&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1927&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1928&quot;&gt;&lt;span data-dcnode-id=&quot;1930&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Peter Taylor-Gooby&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1929&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/277671511642127-1443213455715_Q64/Peter-Taylor-Gooby.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1925&quot;&gt;&lt;span data-dcnode-id=&quot;1926&quot; instrument_node=&quot;&quot;&gt;Peter Taylor-Gooby&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1916&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1917&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7ddcf6 lite-page-hidden&quot; data-dcnode-id=&quot;1918&quot;&gt;&lt;span data-dcnode-id=&quot;1919&quot; instrument_node=&quot;&quot;&gt;The 2015 UK General Election campaign was mostly dominated by the issues of immigration, public debt, and income inequality. While most political parties adopted austerity-led programmes in order to reduce the level of public deficit, their stances on immigration vary significantly despite the two main parties converging on a welfare chauvinist frame. This article compares party positions to policy recommendations formulated by participants in a democratic forum as part of the ‘Welfare States Futures: Our Children’s Europe’ project in order to determine whether recent party pledges on immigration are being used by citizens in a large group discussion over the future of welfare policy in the United Kingdom. The analysis shows that while participants are committed to tougher policies in order to reduce existing levels of net migration, most of the policy priorities formulated do not match those of the two mainstream parties (i.e. the Conservative Party and the Labour Party) but rather those of the UK Independence Party (UKIP). It also demonstrates that participants’ individual political preferences do not seem to match their own positions on immigration and that there is little difference between left-leaning and right-leaning voters.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1900&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1901&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1902&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1903&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publ 30756-1470832365409_Q64/Steve-Fenton.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1865&quot;&gt;&lt;span data-dcnode-id=&quot;1866&quot; instrument_node=&quot;&quot;&gt;Steve Fenton&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1856&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1857&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7ddd85 lite-page-hidden&quot; data-dcnode-id=&quot;1858&quot;&gt;&lt;span data-dcnode-id=&quot;1859&quot; instrument_node=&quot;&quot;&gt;In this final chapter we offer a brief conclusion summarising the main arguments presented in the book. We make a case in the book for acknowledging the importance of classes and class experience in influencing the nature of national identities in multinational Britain. Changes in social and economic structures, and in capitalism, have left some classes, remnants of classes and fractions of classes resentful and disenchanted with mainstream politics. These social changes have led in different directions in England, Wales and Scotland. Most notably, Scotland has avoided a resentful nationalism by drawing those voters who abandoned the Labour Party towards a ‘progressive nationalism’.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1840&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; egacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1809&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1815&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1816&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Rebecca-Partos-84268398&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1817&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1818&quot;&gt;&lt;span data-dcnode-id=&quot;1819&quot; instrument_node=&quot;&quot;&gt;Rebecca Partos&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1810&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1811&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Tim-Bale-21578671&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1812&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1813&quot;&gt;&lt;span data-dcnode-id=&quot;1814&quot; instrument_node=&quot;&quot;&gt;Tim Bale&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1804&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1805&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7ddee2 lite-page-hidden&quot; data-dcnode-id=&quot;1806&quot;&gt;&lt;span data-dcnode-id=&quot;1807&quot; instrument_node=&quot;&quot;&gt;There are few policy areas in which the UK’s current Coalition partners have more disparate views than immigration. The differences were apparent during the televised leaders’ debates during the 2010 election campaign. Nick Clegg called for ‘an immigration system which works’, while David Cameron responded that ‘Nick’s ideas would … make the situation worse’ because the Liberal Democrats’ policy of an amnesty for illegal immigrants would lead to higher immigration, and their regional work proposal ‘sounds like they’re going to put up border controls along the M5’ (cited in BBC News, 2010). Clegg said ‘we can’t come up with promises like caps [on immigration, a central Conservative policy], which don’t work’ (ibid.). Coalition, one might have expected, would lead to some sort of compromise or via media. In practice, however, this is a policy area in which the Liberal Democrats have been able to exert very little constraining influence over the Conservatives; a party with a long tradition of tracking and occasionally exploiting public opinion on the issue in populist fashion (see Bale, 2012; Bale and Partos, 2014).&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1788&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1789&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1790&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1791&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-butt __item&quot; data-dcnode-id=&quot;1759&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1760&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Oliver-Gruber&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1761&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1764&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1765&quot;&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Oliver Gruber&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1766&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/1109572639039488-1641554140546_Q64/Oliver-Gruber.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1762&quot;&gt;&lt;span data-dcnode-id=&quot;1763&quot; instrument_node=&quot;&quot;&gt;Oliver Gruber&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1754&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1755&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Tim-Bale-21578671&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1756&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1757&quot;&gt;&lt;span data-dcnode-id=&quot;1758&quot; instrument_node=&quot;&quot;&gt;Tim Bale&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1748&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1749&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7de19f lite-page-hidden&quot; data-dcnode-id=&quot;1750&quot;&gt;&lt;span data-dcnode-id=&quot;1751&quot; instrument_node=&quot;&quot;&gt;Mainstream parties across Europe have been struggling for some time to counter the appeal of the populist radical right. With the rise of the United Kingdom Independence Party (UKIP), the British Conservative Party is now facing a similar challenge. We argue that, since this is the case, it makes sense to ask whether there are lessons it can learn from other countries – in particular Austria, where the centre-right People’s Party (ÖVP) has been competing against the populist radical right (most obviously, the Freedom Party) for almost three decades. In the course of so doing, the ÖVP has tried many ways to deal with the threat posed: treating the populist radical right as a pariah; adopting some of its policies and rhetoric; inviting it into coalition government; and finally pursuing a ‘dual-track’ approach. We evaluate each strategy in turn and find that none of them has enjoyed huge or lasting success. We conclude that the Conservatives need to realise that UKIP is not so much a problem to be solved as a situation to be managed. Seeking to toughen the Tory stance on immigration and asylum is unlikely to pay electoral dividends and carries with it considerable downsides in terms of the party’s credibility and reputation, as well as in terms of public policy. Moreover, even if a more restrictive stance does not prove entirely pointless or (worse) positively counterproductive, it imposes opportunity costs the Conservative Party should think twice before paying. All this suggests the value of a comparative approach to those wanting to understand the new dynamics in British politics.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1732&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1733&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1734&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1735&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1736&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1742&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1743&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/264901437_And_it%27s_good_night_Vienna_How_not_to_deal_with_the_populist_radical_right_The_Conservatives_UKIP_and_some_lessons_from_the_heartland&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1744&quot;&gt;&lt;span data-dcnode-id=&quot;1745&quot; instrument_node=&quot;&quot;&gt;Vie nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1673&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Will-Somerville-2&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1674&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1677&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1678&quot;&gt;&lt;span data-dcnode-id=&quot;1680&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Will Somerville&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1679&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/554860040777728-1509300350107_Q64/Will-Somerville-2.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1675&quot;&gt;&lt;span data-dcnode-id=&quot;1676&quot; instrument_node=&quot;&quot;&gt;Will Somerville&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1666&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1667&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7de372 lite-page-hidden&quot; data-dcnode-id=&quot;1668&quot;&gt;&lt;span data-dcnode-id=&quot;1669&quot; instrument_node=&quot;&quot;&gt;We examine the links between public opinion and policy in the UK over the past thirty years. We show that public views about immigration are responsive to changes in immigration levels and differences between migrant groups, and that policymakers are sensitive to these changes. Policymakers look to respond to the public mood on migration, but face growing constraints in doing so. The interaction of public opinion, policy and constraint has produced three distinct policy regimes. In the first, from 1982-1997, policymakers faced few constraints, immigration was tightly controlled and the public were unconcerned about the issue. In the second, from 1997-2004, migration policy was selectively liberalised in response to external and interest group pressures, producing increasing inflows and growing public demands for restriction. In the third, from 2004 to the time of writing, public demand for restriction is strong but policymakers face significant constraints in responding. In all periods, policymakers seek to focus restriction on the migrant streams most opposed by the public, but as they have lost discretionary power over the issue they have been forced to take action against more economically valuable and socially accepted migrant streams. The growing constraints on policymakers have therefore sharpened the trade-off between the &quot;responsive&quot; government of meeting public demands for immigrations restriction and the &quot;responsible&quot; government goal of providing for the needs of a flexible, globally integrated economy.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1650&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1651&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1652&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id ;&quot;&gt;Political folklore holds that political parties often try to change their images following a disastrous election defeat. This paper inquires into the truth of this common assumption through a systematic analysis of manifestos promulgated by eight parties in Britain, Germany and the USA prior to national elections in the 1950s through 1980s. Each election was classified as triumphal, gratifying, tolerable, disappointing or calamitous from the standpoint of each party. The change in party images for adjacent elections was assessed by correlating the percentages of sentences devoted to standard political themes in the pair of manifestos. We tested the hypothesis that parties were most likely to change their policy images following disappointing or calamitous elections. Our findings suggest that poor electoral performance was not a sufficient condition to produce a major overhaul of party images, but poor performance in the prior election was virtually necessary to produce major change in policy packaging at the next election.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1573&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1574&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1575&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1576&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1577&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1583&quot;& lass=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1539&quot;&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;Kenneth Janda&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1530&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1531&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7de988 lite-page-hidden&quot; data-dcnode-id=&quot;1532&quot;&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;The authors present a theory that seeks to explain why parties change their political strategies, organizational characteristics and issue positions. Whereas most of the existing literature on party change deals with party systems, the focus here is on individual parties. Whereas much of the literature views parties as responding more or less gradually to socioeconomic change, change is here regarded as a discontinuous outcome of specific party decisions linked to party goals. This approach is placed in the literature by reviewing extant theories of party change. Our theory itself is initially advanced in a discursive section which suggests that change does not `just happen', but instead results from leadership change, a change of dominant faction within the party, and/or an external stimulus for change. The article then presents a more formal exposition of this theory, consisting of definitions, assumptions, and a series of testable propositions. It concludes with illustrative examples of this theoretical framework.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__fo n.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1403&quot;&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt;Christopher Wlezien&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1394&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1395&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7dedbc lite-page-hidden&quot; data-dcnode-id=&quot;1396&quot;&gt;&lt;span data-dcnode-id=&quot;1397&quot; instrument_node=&quot;&quot;&gt;A large and growing body of research demonstrates a correspondence between public opinion and policy behavior. Almost all of this research has focused on the US, however. Do similar patterns obtain in other countries? Or is the US unique? This paper represents one step towards answering these questions. We develop a theoretical model implying differences in representation across countries owing to differences in government institutions. Most importantly, we argue that (1) policymakers are less responsive in parliamentary systems than in presidential systems, and (2) public responsiveness to policy change is diminished in federal rather than unitary systems. We then test these propositions, using directly comparable longitudinal measures of public preferences and government spending in the US, UK, and Canada. In the process, we draw conclusions about the success of these countries' government institutions, and distill broader implications for the functioning of modern democracies.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1378&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1379&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1380&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1381&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1382&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1388&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1389&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/241683607_Degrees_of_Democracy_Government_Institutions_and_the_Opinion-Policy_Link&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1390&quot;&gt;&lt;span data-dcnode-id=&quot;1391&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1383&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-butto --spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1175&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7df1fd lite-page-hidden&quot; data-dcnode-id=&quot;1176&quot;&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;Previous research explains the evolution of parties' ideological positions in terms of decision rules that stress the uncertainty of the political environment. The authors extend this research by examining whether parties adjust their ideologies in response to two possible influences: shifts in public opinion, and past election results. Their empirical analyses, which are based on the Comparative Manifesto Project's codings of parties' post-war programmes in eight West European nations, suggest that parties respond to shifts in public opinion, but that these effects are only significant in situations where public opinion is clearly shifting away from the party's policy positions. By contrast, no evidence is found here that parties adjust their ideologies in response to past election results. These findings have important implications for parties' election strategies and for models of political representation.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1158&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1159&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1160&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1161&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-ho  data-dcnode-id=&quot;1130&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Lene-Aaroe&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1131&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1134&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1135&quot;&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Lene Aarøe&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1136&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/280215868723213-1443820077858_Q64/Lene-Aaroe.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1132&quot;&gt;&lt;span data-dcnode-id=&quot;1133&quot; instrument_node=&quot;&quot;&gt;Lene Aarøe&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1123&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1124&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7de496 lite-page-hidden&quot; data-dcnode-id=&quot;1125&quot;&gt;&lt;span data-dcnode-id=&quot;1126&quot; instrument_node=&quot;&quot;&gt;While much research has investigated the persuasive effects of partisan cues on citizens' evaluations of political messages, our knowledge regarding failed persuasion is limited. It remains particularly unclear whether failed elite attempts at persuasion simply leave citizens' attitudes unchanged or whether such attempts at persuading one segment of the electorate can actually lead to a loss of support in others. This study therefore investigates partisan cues and the occurrence of contrast effects, i.e. when the presence of an elite cue induces citizens to shift their attitudes away from the viewpoint advocated in a persuasive message. Based on data from three experiments involving two different party leader cues, I demonstrate that partisan cues can trigger contrast effects among those perceiving the party leader in question as non-likeable and those who vote for a party which is politically opposed to the source. The implications of the findings are discussed.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1107&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1108&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1109&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1110&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1111&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1117&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action e nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1077&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1078&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1079&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Tim-Bale-21578671&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1080&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1081&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;Tim Bale&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1072&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1073&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7de54d lite-page-hidden&quot; data-dcnode-id=&quot;1074&quot;&gt;&lt;span data-dcnode-id=&quot;1075&quot; instrument_node=&quot;&quot;&gt;Centre-right parties are commonly inclined towards appeals and policies on immigration that are both restrictive in nature and populist in tone—in part because this is what they believe in, in part because it affords them an electoral advantage over their rivals on the centre-left. One would expect, however, that the extent to which they focus on immigration and asylum will vary according to public opinion, according to who leads them, and according to whether they are in government or in opposition. This would appear to be the case for the British Conservative Party, but the relationship is not an entirely consistent one. Moreover, while the Party has, for half a century, pursued ever more restrictive policies, the extent to which it has couched its approach in populist rhetoric varies considerably over time—and not always in line with the severity of its stance on immigration. The reason for this lies partly in the social and economic liberalism of some of its leaders (and in their related concern to act ‘responsibly’ on race and immigration) but also in their anxiety not to alienate key sections of the middle classes who must be persuaded to support the Party if it is to win elections. These considerations are likely to weigh heavily with other centre-right parties, too.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1056&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1057&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1058&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1059&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1060&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1066&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1067&quot; href=&quot;https://chatnoir-webcont  instrument_node=&quot;&quot;&gt;Tim Bale&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1025&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1026&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7dea38 lite-page-hidden&quot; data-dcnode-id=&quot;1027&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;Because those who study migration do not focus much on parties, while those who study parties tend to focus on migration only insofar as it affects electoral competition and positioning, the role of political parties in immigration control and integration policy is underestimated. Parties on the centre-right, which have enjoyed nowhere near the attention devoted to their more radical counterparts, are particularly important and interesting in this respect. They make up many European governments and therefore help to determine state and EU policy. Maintaining their ownership of the issues involved makes electoral sense but their policies on control and integration are not purely, or at least primarily, a strategic response to the populist radical right; even before the rise of the latter, immigration and integration were matters of genuine ideological and practical concern for Europe's market liberal, conservative and Christian Democratic parties. Too hard a line, however, risks alienating their supporters in business and in civil society. It is a difficult balance, but one that makes a big difference both to the parties involved and the public policies they help to produce.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1009&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1010&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1011&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1012&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1013&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1019&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1020&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/248990469_Turning_round_the_telescope_Centre-right_parties_and_immigration_and_integration_policy_in_Europe1&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1021&quot;&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1014&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quo t; data-dcnode-id=&quot;972&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Christopher-Wlezien&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;973&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;976&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;977&quot;&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Christopher Wlezien&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;978&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/272784173563927-1442048223649_Q64/Christopher-Wlezien.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;Christopher Wlezien&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;965&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;966&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7ded55 lite-page-hidden&quot; data-dcnode-id=&quot;967&quot;&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;This book develops and tests a “thermostatic” model of public opinion and policy, in which preferences for policy both drive and adjust to changes in policy. The representation of opinion in policy is central to democratic theory and everyday politics. So too is the extent to which public preferences are informed and responsive to changes in policy. The coexistence of both “public responsiveness” and “policy representation” is thus a defining characteristic of successful democratic governance, and the subject of this book. The authors examine both responsiveness and representation across a range of policy domains in the United States, the United Kingdom, and Canada. The story that emerges is one in which representative democratic government functions surprisingly well, though there are important differences in the details. Variations in public responsiveness and policy representation responsiveness are found to reflect the “salience” of the different domains and governing institutions – specifically, presidentialism (versus parliamentarism) and federalism (versus unitary government).&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;949&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;950&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;951&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;952&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;953&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;959&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--s data-dcnode-id=&quot;914&quot;&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;James Hampshire&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;906&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;907&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Rebecca-Partos-84268398&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;908&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;909&quot;&gt;&lt;span data-dcnode-id=&quot;910&quot; instrument_node=&quot;&quot;&gt;Rebecca Partos&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;900&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;901&quot;&gt;&lt;span class=&quot;js-target-abstract-626c5ad7df416 lite-page-hidden&quot; data-dcnode-id=&quot;902&quot;&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;The May 2010 general election represented a change in tone on immigration and asylum policy for the Conservative party. Although its manifesto still contained a promise to limit numbers and expressed concern about the abuse of student visas, the Party's previous fixation with asylum seekers had disappeared. This article considers the rationale for these developments in the light of David Cameron's election as leader in late 2005 and his efforts from then on to reposition his party. Cameron's initial silence on this issue and his appointment of a moderate as immigration spokesman were part of an attempt both to shift the focus onto the economic impact of migration and, more broadly, to ‘decontaminate the Tory brand’ in order to gain ‘permission to be heard’ by small-l liberals who were critical to the Party's electoral recovery but alienated by hard-line stances. That said, immigration was never entirely forgotten even in this early period and was always seen, so long as it was carefully handled, as an issue capable of benefitting the Tories. As such, it was skilfully factored back into the Party's offer from late 2007 onwards. In government, the Conservatives may have the upper hand on immigration over their junior coalition partner, but this is no guarantee that they will be able to deliver the outcomes they promised&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;884&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;885&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;886&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;887&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;888&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;894&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-lega
