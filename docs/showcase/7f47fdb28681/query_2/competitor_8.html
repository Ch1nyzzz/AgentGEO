;&lt;/div&gt;&lt;p data-dcnode-id=&quot;364&quot;&gt;&lt;strong data-dcnode-id=&quot;369&quot;&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;by&lt;/span&gt;&lt;span data-dcnode-id=&quot;370&quot;&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;365&quot;&gt;&lt;a aria-label=&quot;David Lancefield&quot; data-dcnode-id=&quot;366&quot; data-ga-track=&quot;ExternalLink:http://www.strategy-business.com/author?author=David+Lancefield&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.strategy-business.com/author%3Fauthor%3DDavid%2BLancefield&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;strong data-dcnode-id=&quot;367&quot; data-ga-track=&quot;ExternalLink:http://www.strategy-business.com/author?author=David+Lancefield&quot;&gt;&lt;span data-dcnode-id=&quot;368&quot; instrument_node=&quot;&quot;&gt;David Lancefield&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;344&quot;&gt;&lt;span data-dcnode-id=&quot;362&quot; instrument_node=&quot;&quot;&gt;Following Brexit, the British government and the E.U. will spend the next several years negotiating a divorce that balances their economic, political, and social interests. The terms of exit and the trade deals that will follow will be unprecedented in their complexity, and there are no clear rules to follow. Nor is there a certain timetable. The negotiations were supposed to be concluded in two years, but the&lt;/span&gt;&lt;span data-dcnode-id=&quot;360&quot;&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;357&quot;&gt;&lt;a aria-label=&quot;High Court’s recent decision&quot; data-dcnode-id=&quot;358&quot; data-ga-track=&quot;ExternalLink:https://www.theguardian.com/politics/2016/nov/03/high-court-brexit-ruling-what-does-it-all-mean&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.theguardian.com/politics/2016/nov/03/high-court-brexit-ruling-what-does-it-all-mean&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;High Court’s recent decision&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;355&quot;&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;354&quot; instrument_node=&quot;&quot;&gt;mandating that Parliament must be involved, and the ongoing&lt;/span&gt;&lt;span data-dcnode-id=&quot;352&quot;&gt;&lt;span data-dcnode-id=&quot;353&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;349&quot;&gt;&lt;a aria-label=&quot;Supreme Court hearing&quot; data-dcnode-id=&quot;350&quot; data-ga-track=&quot;ExternalLink:http://www.bbc.co.uk/news/uk-politics-38200115&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.bbc.co.uk/news/uk-politics-38200115&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;351&quot; instrument_node=&quot;&quot;&gt;Supreme Court hearing&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;348&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;span data-dcnode-id=&quot;346&quot;&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;calls that into question.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article_paragraph_2&quot; data-dcnode-id=&quot;342&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;331&quot;&gt;&lt;span data-dcnode-id=&quot;340&quot; instrument_node=&quot;&quot;&gt;What should you,&lt;/span&gt;&lt;span data-dcnode-id=&quot;338&quot;&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;335&quot;&gt;&lt;a aria-label=&quot;as a leader&quot; data-dcnode-id=&quot;336&quot; data-ga-track=&quot;ExternalLink:http://www.strategy-business.com/article/10-Principles-of-Strategic-Leadership&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.strategy-business.com/article/10-Principles-of-Strategic-Leadership&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;337&quot; instrument_node=&quot;&quot;&gt;as a leader&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;333&quot;&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;332&quot; instrument_node=&quot;&quot;&gt;of private enterprise, do in the meantime? As you define your post-Brexit strategy, you may find yourself leading amid ambiguity — not just in the external world, but in your own organization. More than 100 C-suite executives have told us that the challenges they have faced since the referendum are different from any they’ve dealt with before. You can build an effective post-Brexit strategy around these basic principles:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;323&quot;&gt;&lt;strong data-dcnode-id=&quot;328&quot;&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;1. Develop a course of action that will be robust under many scenarios.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;327&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a aria-label=&quot;Scenario planning&quot; data-dcnode-id=&quot;325&quot; data-ga-track=&quot;ExternalLink:http://www.strategy-business.com/article/8220&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.strategy-business.com/article/8220&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;Scenario planning&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;, which involves gathering information and analyzing potential outcomes, will give you more confidence in charting a course. First, think about the possible big-picture effects. Then take an existing element of your business — for example, a strategic priority, critical program, or value driver — and think through all the possible ways it could be affected by those larger changes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;322&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;vestpocket&quot; data-dcnode-id=&quot;321&quot; vest-pocket=&quot;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;318&quot;&gt;&lt;span data-dcnode-id=&quot;319&quot; instrument_node=&quot;&quot;&gt;Consolidate your many alternative futures into just a few. Each scenario should be a plausible story that demonstrates how this situation could evolve; they should all be mutually exclusive. Most important, each should have a counterintuitive aspect, something you can learn from. As you put these themes together, consider the unintended consequences of actions that many others are overlooking, but that are relevant to your business. Having articulated these alternative futures, look into the impact each of them could have on your company.&amp;nbsp; Highlight any risks or opportunities involved, especially those that are more elusive.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;317&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;fbs-ad ad-id=&quot;article-0-inread&quot; aria-hidden=&quot;true&quot; data-dcnode-id=&quot;315&quot; position=&quot;inread&quot; progressive=&quot;&quot; role=&quot;presentation&quot;&gt;&lt;div data-dcnode-id=&quot;316&quot; id=&quot;article-0-inread&quot;&gt;&lt;/div&gt;&lt;/fbs-ad&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;312&quot;&gt;&lt;span data-dcnode-id=&quot;313&quot; instrument_node=&quot;&quot;&gt;Finally, instead of devising a separate response for each scenario, bring your colleagues together to consider these questions: What strategy could we adopt that would be robust under any of these scenarios? What investments could we make now to ensure that whatever scenario comes to pass, we will be glad we made that choice? And what can we do now to influence the development of the preferred scenario?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;311&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;306&quot;&gt;&lt;a aria-label=&quot;&quot; class=&quot;image-embed__placeholder&quot; data-dcnode-id=&quot;307&quot; data-ga-track=&quot;InternalLink:http://blogs-images.forbes.com/strategyand/files/2016/12/37399509ab.jpg&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//blogs-images.forbes.com/strategyand/files/2016/12/37399509ab.jpg&quot; style=&quot;padding-top: 124.89%; position: relative;&quot; target=&quot;_self&quot;&gt;&lt;span data-dcnode-id=&quot;310&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;progressive-image alt=&quot;37399509ab&quot; class=&quot;size-full wp-image-804 show-img&quot; data-dcnode-id=&quot;308&quot; data-ga-track=&quot;InternalLink:http://blogs-images.forbes.com/strategyand/files/2016/12/37399509ab.jpg&quot; data-height=&quot;1000&quot; data-width=&quot;800&quot; src=&quot;https://blogs-images.forbes.com/strategyand/files/2016/12/37399509ab.jpg&quot;&gt;&lt;img alt=&quot;37399509ab&quot; data-dcnode-id=&quot;309&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//imageio.forbes.com/blogs-images/strategyand/files/2016/12/37399509ab.jpg%3Ffit%3Dbounds%26format%3Djpg%26width%3D96&amp;amp;raw&quot; style=&quot;display: block;&quot;&gt;&lt;/progressive-image&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;305&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article_paragraph_7&quot; data-dcnode-id=&quot;304&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;303&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;299&quot;&gt;&lt;strong data-dcnode-id=&quot;301&quot;&gt;&lt;span data-dcnode-id=&quot;302&quot; instrument_node=&quot;&quot;&gt;2. Rethink your global footprint.&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;300&quot; instrument_node=&quot;&quot;&gt;The aftershocks of the Brexit vote provide an opening to launch soul-searching exercises to examine the map of countries where you manufacture and sell your portfolio of goods and services. These exercises can also help you reconsider cost allocation, to adjust expenses to match your new global needs. Focus on strategic objectives: making the most of your capabilities, ensuring access to markets where your capabilities can help you stand out, managing regulators, finding suitable labor pools, and providing opportunities for innovation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;298&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;294&quot;&gt;&lt;strong data-dcnode-id=&quot;296&quot;&gt;&lt;span data-dcnode-id=&quot;297&quot; instrument_node=&quot;&quot;&gt;3. Encourage a diversity of perspectives within your company.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;295&quot; instrument_node=&quot;&quot;&gt; It’s particularly important to be inclusive in addressing the challenges of a post-Brexit world. Employees will hold a wide range of views about the risks of your post-Brexit strategy and the direction your company should take. This diversity of perspective is a strength, not a weakness, of your enterprise. Give a large group of trusted managers and employees the task of developing a course of action in Europe and the U.K. Then encourage them to question one another’s biases and assumptions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;293&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;291&quot;&gt;&lt;span data-dcnode-id=&quot;292&quot; instrument_node=&quot;&quot;&gt;To make your prospective pool of decision makers as large as possible, draw in people with a range of experiences, professional backgrounds, interests, and areas of knowledge. Include advisors with deep sets of intelligence in areas as diverse as economic development, political engagement, devolution, immigration policy, industry trends, and customer data. Ask open questions to make sure that responses are not exclusively what people believe management wants to hear.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;290&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;286&quot;&gt;&lt;strong data-dcnode-id=&quot;288&quot;&gt;&lt;span data-dcnode-id=&quot;289&quot; instrument_node=&quot;&quot;&gt;4. As a leader, be transparent and choose your words carefully.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;287&quot; instrument_node=&quot;&quot;&gt;In difficult periods, executives must be cautious about what they say and the stances they take. They should express sincere compassion and be on guard against statements that may ruffle feathers throughout the organization. No matter what your perspective is, allow people to communicate their views freely. If people express fear or concern, offer tangible aid whenever possible. Avoid language that can be perceived by employees as callous or threatening; for example, even low-key statements such as “We’re thinking differently about next year’s budget” could be heard in a menacing way. Be similarly self-aware when interacting with customers, suppliers, and shareholders.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;285&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;280&quot;&gt;&lt;strong data-dcnode-id=&quot;283&quot;&gt;&lt;span data-dcnode-id=&quot;284&quot; instrument_node=&quot;&quot;&gt;5. Develop your company’s “foreign policy.”&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;282&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;281&quot; instrument_node=&quot;&quot;&gt;As the global environment shifts, multinational companies will have to become adept at navigating the changing regulations, consumer preferences, and cultural mores in regional and local markets. If the aftermath of the referendum propels you to move into foreign territories that have their own evolving post-Brexit characteristics, you will need to integrate your company with the local society and government. If your enterprise doesn’t yet have these capabilities, you may need to build them. Use the expertise you have gained in your current business locations to collect on-the-ground intelligence (for example, from observers within local governments) that can inform strategies designed to minimize risk. Instituting a well-resourced corporate foreign policy is an excellent way to buoy your localization strategy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;279&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;277&quot;&gt;&lt;span data-dcnode-id=&quot;278&quot; instrument_node=&quot;&quot;&gt;One critical aspect of your company’s foreign policy is your thoughtful engagement of issues related to Brexit, trade barriers, and globalization. The Japanese government, and some U.S. officials have encouraged businesses to speak out publicly about Brexit, even if it takes them out of their comfort zone. This type of encouragement is unprecedented, and it may lead a number of companies to take positions on Brexit or other geopolitical issues before they have developed true diplomatic skills. The more prowess you have as a company with a foreign policy, the more powerful and nuanced an effect you will have.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;276&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;272&quot;&gt;&lt;strong data-dcnode-id=&quot;274&quot;&gt;&lt;span data-dcnode-id=&quot;275&quot; instrument_node=&quot;&quot;&gt;6. Prepare for further expressions of public antipathy to the establishment.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;273&quot; instrument_node=&quot;&quot;&gt; Business leaders need to recognize the public’s ongoing resentment of income inequality — and of generous executive pay and high dividends. Your employees will be worried about pension deficits and the potential impact of economic uncertainty on their job and wage prospects. We may also see the rise of conscious capitalism, more attuned to the needs of the people business serves and employs. Pay particular attention to attitudes about immigration. Borders will be tighter, and moving people across them will be harder, in terms of both managing the regulations and navigating public opinion. If migration of labor is part of your business model, you’ll have to consider these issues now.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;271&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;269&quot;&gt;&lt;span data-dcnode-id=&quot;270&quot; instrument_node=&quot;&quot;&gt;By taking these steps, you can keep your business healthy while also addressing some of the political and social issues that the electorate has raised. A process like this can catalyze innovation and growth even in the midst of turbulence. You will gain new insight into the strengths of your company: your distinctive identity, your capabilities, and the dedication of your people. You’ll align your company with the devolution of power that appears to be occurring in many countries. One of the surprising long-term results of Brexit may be a higher level of connectivity among citizens, government, business, the environment, and society at large.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;259&quot;&gt;&lt;em data-dcnode-id=&quot;266&quot;&gt;&lt;span data-dcnode-id=&quot;267&quot; instrument_node=&quot;&quot;&gt;For more insights, check out “&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;262&quot;&gt;&lt;a aria-label=&quot;Business Beyond Brexit&quot; data-dcnode-id=&quot;263&quot; data-ga-track=&quot;ExternalLink:http://www.strategy-business.com/article/Business-Beyond-Brexit?gko=cb4ef&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.strategy-business.com/article/Business-Beyond-Brexit%3Fgko%3Dcb4ef&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;264&quot; data-ga-track=&quot;ExternalLink:http://www.strategy-business.com/article/Business-Beyond-Brexit?gko=cb4ef&quot;&gt;&lt;span data-dcnode-id=&quot;265&quot; instrument_node=&quot;&quot;&gt;Business Beyond Brexit&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;/span&gt;&lt;em data-dcnode-id=&quot;260&quot;&gt;&lt;span data-dcnode-id=&quot;261&quot; instrument_node=&quot;&quot;&gt;.”&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;div class=&quot;newsletter_signup_article&quot; data-dcnode-id=&quot;258&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;bottom-contrib-block&quot; data-dcnode-id=&quot;247&quot;&gt;&lt;div class=&quot;fs-author-group-wrapper&quot; data-dcnode-id=&quot;249&quot;&gt;&lt;div class=&quot;contrib-byline&quot; data-dcnode-id=&quot;250&quot;&gt;&lt;a class=&quot;fs-author-avatar&quot; data-dcnode-id=&quot;255&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.forbes.com/sites/strategyand/people/charitydelich2/&quot; title=&quot;Photo of Strategy&amp;amp;, part of the PwC network&quot;&gt;&lt;img alt=&quot;Strategy&amp;amp;, part of the PwC network&quot; class=&quot;fs-author-image&quot; data-dcnode-id=&quot;256&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//blog
