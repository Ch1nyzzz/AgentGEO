&lt;/span&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;icon-print&quot; data-dcnode-id=&quot;1427&quot; style=&quot;background-image: none;&quot;&gt;&lt;svg data-dcnode-id=&quot;1428&quot; focusable=&quot;false&quot; viewBox=&quot;0 0 32.5 28.13&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;defs data-dcnode-id=&quot;1431&quot;&gt;&lt;/defs&gt;&lt;path class=&quot;cls-1&quot; d=&quot;M23.11 9.07H9.39a.93.93 0 0 0-.19 1.85h13.91a.93.93 0 0 0 .19-1.85h-.19M23.11 5.47H9.39a.93.93 0 0 0-.19 1.85h13.91a.93.93 0 0 0 .19-1.85h-.19&quot; data-dcnode-id=&quot;1430&quot;&gt;&lt;/path&gt;&lt;path class=&quot;cls-1&quot; d=&quot;M30.65 24.28a2 2 0 0 1-2 2H3.86a2 2 0 0 1-2-2v-6.34a2 2 0 0 1 2-2h24.78a2 2 0 0 1 2 2zM5.78 3.86a2 2 0 0 1 2-2H24.7a2 2 0 0 1 2 2v10.21H5.78zm22.86 10.21h-.07V3.86A3.87 3.87 0 0 0 24.7 0H7.79a3.86 3.86 0 0 0-3.86 3.86v10.21h-.07A3.86 3.86 0 0 0 0 17.93v6.34a3.86 3.86 0 0 0 3.86 3.86h24.78a3.86 3.86 0 0 0 3.86-3.86v-6.33a3.86 3.86 0 0 0-3.85-3.87&quot; data-dcnode-id=&quot;1429&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1426&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1417&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1411&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wrapper m0-1&quot; data-dcnode-id=&quot;1402&quot;&gt;&lt;span data-dcnode-id=&quot;1410&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;component rich-text intro&quot; data-dcnode-id=&quot;1405&quot;&gt;&lt;span data-dcnode-id=&quot;1409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1407&quot;&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;The UK government has provided more details of the new immigration system that will apply from 1 January 2021.&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1406&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wrapper m0-1&quot; data-dcnode-id=&quot;1372&quot;&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;component rich-text&quot; data-dcnode-id=&quot;1374&quot;&gt;&lt;span data-dcnode-id=&quot;1399&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1397&quot;&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;From this date, free movement for nationals of the European Economic Area (EEA) and Switzerland will end. Non-British and Irish nationals not covered by the withdrawal agreement between the UK and EU will require visas for all but short-term visits to the UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1394&quot;&gt;&lt;span data-dcnode-id=&quot;1395&quot; instrument_node=&quot;&quot;&gt;Arrivals will require passports, unless covered by the withdrawal agreement. National ID cards will not be acceptable. The government intends to introduce a universal 'permission to travel' requirement on a phased basis to 2025, which will mean that anyone other than British or Irish nationals looking to travel to the UK will need to seek permission to do so in advance. A visa, where held, will constitute permission to travel and the plan is to move towards a digital immigration record.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1391&quot;&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;An electronic travel authorisation (ETA) will be introduced for visitors and those transiting through the UK who do not need a visa for short stays in the UK, or who don't have a UK immigration status before travelling.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1388&quot;&gt;&lt;span data-dcnode-id=&quot;1389&quot; instrument_node=&quot;&quot;&gt;Employers should now:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;1385&quot;&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt;Review and plan ahead&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;1384&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1382&quot;&gt;&lt;span data-dcnode-id=&quot;1383&quot; instrument_node=&quot;&quot;&gt;Current sponsored migrants looking to extend their stay after 1 January 2021 will have to do so under the new rules - they will not only be relevant for new recruits.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1381&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;1379&quot;&gt;&lt;span data-dcnode-id=&quot;1380&quot; instrument_node=&quot;&quot;&gt;Consider your recruitment needs&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;1378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1376&quot;&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;Consider whether the typical vacancies arising in your business will qualify under the new requirements. What impact could this have on your recruitment practices and costs? Recruiting EEA and Swiss nationals will undoubtedly be more complex, expensive and time consuming from January 2021, where possible at all. EEA or Swiss nationals recruited to the UK ahead of 31 December will be able to remain in the UK under the EU Settlement Scheme rules, avoiding the new system&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1375&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;1373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1371&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wrapper m8&quot; data-dcnode-id=&quot;1349&quot;&gt;&lt;span data-dcnode-id=&quot;1370&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;component pull-quote pull-quote-simple purple&quot; data-dcnode-id=&quot;1352&quot;&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;person&quot; data-dcnode-id=&quot;1367&quot;&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1366&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;quote&quot; data-dcnode-id=&quot;1361&quot;&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;1363&quot;&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt;
                Now is the time to conduct a 'health check' to ensure your immigration processes and procedures are sufficiently robust; and that you are aware of your compliance duties and adhering to them.
            &lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;icon-quote&quot; data-dcnode-id=&quot;1354&quot; style=&quot;background-image: none;&quot;&gt;&lt;svg data-dcnode-id=&quot;1355&quot; focusable=&quot;false&quot; viewBox=&quot;0 0 26.94 28.24&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;defs data-dcnode-id=&quot;1357&quot;&gt;&lt;/defs&gt;&lt;path class=&quot;cls-1&quot; d=&quot;M0 21.18v-7.34C0 6.42 3.21 1.59 9.32 0v4.67C6.26 5.76 4.86 8.09 4.78 12h5v9.17zM26.94 0v9.78c0 9.9-4.45 16.35-12.79 18.46V22c4.11-1.44 6.17-4.56 6.17-9.78h-6.85V0z&quot; data-dcnode-id=&quot;1356&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wrapper m0-1&quot; data-dcnode-id=&quot;892&quot;&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;component rich-text&quot; data-dcnode-id=&quot;894&quot;&gt;&lt;span data-dcnode-id=&quot;1345&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1343&quot;&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;Neither the current points-based system (PBS) nor the new system permits migrants to enter the UK for lower-skilled work below RQF3. Only a limited number of applicants at RQF3 will qualify given the salary thresholds. There will be no temporary route to avoid a 'cliff edge' scenario for businesses, as was previously promised by Theresa May's government. This is a significant concern for affected businesses and the impact on the construction, care, hospitality, tourism, food processing, manufacturing and retail sectors, all of which already face skills shortages, should not be underestimated. The knock-on effect could be widespread, including in many business supply chains.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1342&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;1340&quot;&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;Check or get a sponsor licence&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;1339&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1337&quot;&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;If you have until now avoided the PBS, you may well find yourself needing to obtain a sponsor licence to recruit the talent you need come 2021. We expect there to be a surge in licence applications in the coming months, which may naturally impact on processing times.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1331&quot;&gt;&lt;span data-dcnode-id=&quot;1335&quot; instrument_node=&quot;&quot;&gt;We recommend employers act now if they are not licensed already, so that they are in a good position to hire the talent they need from 2021. See our Out-Law guide&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1333&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pinsentmasons.com/out-law/guides/uk-immigration-2021-applying-sponsor-licence&quot;&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt;UK immigration from 2021: applying for a sponsor licence&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1328&quot;&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;If you already have a sponsor licence, you are likely to be making greater use of it from January if you need to recruit EEA or Swiss nationals. It is not known whether UKVI will increase its auditing of existing sponsors, but now is the time to conduct a 'health check' to ensure your processes and procedures are sufficiently robust; and that you are aware of your compliance duties and adhering to them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;1325&quot;&gt;&lt;span data-dcnode-id=&quot;1326&quot; instrument_node=&quot;&quot;&gt;Communicate with existing staff&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1322&quot;&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;It is vital that those in the UK on the basis of current EU free movement rights secure their ability to remain by applying under the EU settlement scheme in order to avoid the new requirements. Employers should communicate this to affected staff, and consider and provide sufficient support.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;without-keyline&quot; data-dcnode-id=&quot;1319&quot;&gt;&lt;span data-dcnode-id=&quot;1320&quot; instrument_node=&quot;&quot;&gt;Economic routes to the UK&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1316&quot;&gt;&lt;span data-dcnode-id=&quot;1317&quot; instrument_node=&quot;&quot;&gt;The UK government has proposed amendments to the existing points-based immigration system (PBS) rather than a complete overhaul. Most existing economic routes into the UK remain largely unchanged with the exception of the current Tier 2 General route, which is being replaced by a skilled workers route.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1313&quot;&gt;&lt;span data-dcnode-id=&quot;1314&quot; instrument_node=&quot;&quot;&gt;We await further specifics in the form of detailed immigration rules, guidance and legislation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1310&quot;&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;Currently non-EEA/Swiss visa applicants are required to attend in-person to provide biometric information as part of their visa application. Most EEA/Swiss nationals will not have to do so under the new system, and will be able to provide facial images via smartphones. The government's intention is that all nationalities will eventually be able to self-enrol in this way.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1309&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1307&quot;&gt;&lt;span data-dcnode-id=&quot;1308&quot; instrument_node=&quot;&quot;&gt;The new system will allow most migrants - other than short-term migrants such as visitors and seasonal workers - to switch from one immigration category to another within the UK. If implemented as widely as indicated this will be welcomed by many employers, particularly if applicable in common scenarios such as Tier 2 Dependant moving to become main Tier 2 visa holder or Youth Mobility Scheme visa holders moving to a skilled worker visa.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1306&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;without-keyline&quot; data-dcnode-id=&quot;1304&quot;&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt;Sponsored routes&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1301&quot;&gt;&lt;span data-dcnode-id=&quot;1302&quot; instrument_node=&quot;&quot;&gt;These are the immigration routes for which an employer or university must hold a sponsor licence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1298&quot;&gt;&lt;span data-dcnode-id=&quot;1299&quot; instrument_node=&quot;&quot;&gt;The government has stated an intention to radically change processes, streamline and simplify the system for users to speed things up. If realised this will undoubtedly be welcomed by employers for whom the current PBS can be very complex, time consuming and process-heavy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;1295&quot;&gt;&lt;span data-dcnode-id=&quot;1296&quot; instrument_node=&quot;&quot;&gt;Skilled worker visa&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;1294&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1292&quot;&gt;&lt;span data-dcnode-id=&quot;1293&quot; instrument_node=&quot;&quot;&gt;This new route will replace the current Tier 2 General route.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1291&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1289&quot;&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1287&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1286&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1285&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1270&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1268&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1267&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1264&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1205&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1175&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1174&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1171&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1163&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;table data-dcnode-id=&quot;1160&quot;&gt;&lt;tbody data-dcnode-id=&quot;1162&quot;&gt;&lt;tr data-dcnode-id=&quot;1269&quot;&gt;&lt;th data-dcnode-id=&quot;1283&quot;&gt;&lt;span data-dcnode-id=&quot;1284&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Process&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;1271&quot;&gt;&lt;span data-dcnode-id=&quot;1281&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;
            &lt;/span&gt;&lt;p data-dcnode-id=&quot;1279&quot; style=&quot;letter-spacing: normal;&quot;&gt;&lt;span data-dcnode-id=&quot;1280&quot; instrument_node=&quot;&quot;&gt;Job offer from UK licensed sponsor required&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1276&quot; style=&quot;letter-spacing: normal;&quot;&gt;&lt;span data-dcnode-id=&quot;1277&quot; instrument_node=&quot;&quot;&gt;Suspension of annual cap on entrants&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1275&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1273&quot; style=&quot;letter-spacing: normal;&quot;&gt;&lt;span data-dcnode-id=&quot;1274&quot; instrument_node=&quot;&quot;&gt;No resident labour market test&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1206&quot;&gt;&lt;th data-dcnode-id=&quot;1265&quot;&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Eligibility&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;1208&quot;&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;
            &lt;/span&gt;&lt;p class=&quot;Body&quot; data-dcnode-id=&quot;1261&quot;&gt;&lt;span data-dcnode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;Migrants must score 70 'points'. 50 of these points will be covered by:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1260&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1249&quot; style=&quot;list-style-type: disc;&quot;&gt;&lt;span data-dcnode-id=&quot;1259&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1257&quot;&gt;&lt;span data-dcnode-id=&quot;1258&quot; instrument_node=&quot;&quot;&gt;job offer (and sponsorship) from licenced sponsor;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1256&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1254&quot;&gt;&lt;span data-dcnode-id=&quot;1255&quot; instrument_node=&quot;&quot;&gt;meeting the RQF3 skill threshold, lower than the RQF6 threshold that currently applies under Tier 2 General; and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1251&quot;&gt;&lt;span data-dcnode-id=&quot;1252&quot; instrument_node=&quot;&quot;&gt;English language threshold – with expanded ways in which this can be met.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1246&quot;&gt;&lt;span data-dcnode-id=&quot;1247&quot; instrument_node=&quot;&quot;&gt;An additional 20 points are required - scored according to salary, whether shortage occupation; and, for certain roles, whether the applicant holds a relevant PhD. These points are 'tradeable', but applicants can only score points for one of either shortage occupation or PhD:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1225&quot;&gt;&lt;span data-dcnode-id=&quot;1244&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1242&quot;&gt;&lt;span data-dcnode-id=&quot;1243&quot; instrument_node=&quot;&quot;&gt;20 points – salary of £25,600 or the going rate for the role, whichever higher, down from the current £30,000 in Tier 2 General;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1239&quot;&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;10 pts – salary of at least £23,040 or 90% of the going rate for the role, whichever higher;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1238&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1236&quot;&gt;&lt;span data-dcnode-id=&quot;1237&quot; instrument_node=&quot;&quot;&gt;0 pts – lower salary of at least £20,480 or 80% of the going rate for the role;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1233&quot;&gt;&lt;span data-dcnode-id=&quot;1234&quot; instrument_node=&quot;&quot;&gt;20 pts – shortage occupation;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1230&quot;&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;10 pts – relevant PhD;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1227&quot;&gt;&lt;span data-dcnode-id=&quot;1228&quot; instrument_node=&quot;&quot;&gt;10 pts – relevant PhD in a STEM subject.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1226&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1224&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1222&quot;&gt;&lt;span data-dcnode-id=&quot;1223&quot; instrument_node=&quot;&quot;&gt;New entrants will be able to qualify on a salary of at least £20,480 – down from the current £20,800 – or 70% of the going rate for the role, whichever is higher, without having to acquire additional points. This will apply to those:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1210&quot;&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1218&quot;&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt;under the age of 26 when applying;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1215&quot;&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;switching from the 'student' or 'graduate' routes; or&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1212&quot;&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt;for certain regulated professions and job titles – working towards a recognised professional qualification or moving directly into a post-doctoral position.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1211&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1176&quot;&gt;&lt;th data-dcnode-id=&quot;1202&quot;&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Costs&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;1178&quot;&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;
            &lt;/span&gt;&lt;p class=&quot;Body&quot; data-dcnode-id=&quot;1198&quot;&gt;&lt;span data-dcnode-id=&quot;1199&quot; instrument_node=&quot;&quot;&gt;The government has indicated that the current costs of sponsorship will remain unchanged, with the exception of the immigration health surcharge, which they intend to increase, as follows:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1197&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1183&quot; style=&quot;list-style-type: disc;&quot;&gt;&lt;span data-dcnode-id=&quot;1196&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1194&quot;&gt;&lt;span data-dcnode-id=&quot;1195&quot; instrument_node=&quot;&quot;&gt;£199 sponsorship charge;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1193&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1191&quot;&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;£1,000 p/a immigration skills charge;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1190&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1188&quot;&gt;&lt;span data-dcnode-id=&quot;1189&quot; instrument_node=&quot;&quot;&gt;£464 - £1,408 visa fee;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1187&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1185&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;£400 p/a immigration health surcharge&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1182&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1180&quot;&gt;&lt;span data-dcnode-id=&quot;1181&quot; instrument_node=&quot;&quot;&gt;Visa fees and the immigration health surcharge will also be payable in respect of dependents.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1179&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1164&quot;&gt;&lt;th data-dcnode-id=&quot;1172&quot;&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Settlement&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;1166&quot;&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;
            &lt;/span&gt;&lt;p data-dcnode-id=&quot;1168&quot;&gt;&lt;span data-dcnode-id=&quot;1169&quot; instrument_node=&quot;&quot;&gt;As is currently the case for Tier 2 General, time spent in this route will count towards an application for indefinite leave to remain.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1167&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;1159&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1157&quot;&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;The suspension of the annual cap on entrants and removal of the resident labour market test will be welcomed by employers. Both have significantly increased the complexity and timescales involved in recruiting migrants in the UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1156&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1154&quot;&gt;&lt;span data-dcnode-id=&quot;1155&quot; instrument_node=&quot;&quot;&gt;These changes could result in an increased number of overseas applicants for eligible UK positions. Employers must remain mindful of discrimination considerations stemming from selection decisions, with cost and complexity of sponsorship unlikely to justify refusal of a candidate alone.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1153&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1151&quot;&gt;&lt;span data-dcnode-id=&quot;1152&quot; instrument_node=&quot;&quot;&gt;Employers will be unable to recruit EEA/Swiss nationals to the UK for lower skilled roles, below RQF3, as is the case for non-EEA nationals at present.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1150&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1148&quot;&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt;Lowering the skill and salary thresholds are welcome changes, particularly in the absence of a lower skilled route. However, lower paid roles - between £20,480 and £25,600 - will only qualify for a visa if they are shortage occupations or the individual holds a PhD. Accordingly, these relaxations are likely to benefit a very limited group of people.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1145&quot;&gt;&lt;span data-dcnode-id=&quot;1146&quot; instrument_node=&quot;&quot;&gt;The ability to trade points where a PhD is held will only be available in certain listed occupations and only where that PhD is relevant to the role. Employers will be expected to be able to justify the relevance of the PhD. Many of the occupations listed as eligible to trade PhD points are currently classed as shortage occupations. Tradeable points can be claimed for shortage occupations or a PhD, but not both.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1142&quot;&gt;&lt;span data-dcnode-id=&quot;1143&quot; instrument_node=&quot;&quot;&gt;The 'going rate' for roles may have changed by the time the system is in place. In addition, the government intends to check PAYE records regularly to ensure migrants are being paid the correct amount. It will be particularly important for sponsors to be compliant and retain all required records.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1139&quot;&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;A lower minimum salary of £20,480 or the going rate for the role as determined by national pay scales will apply for certain health and education roles. These individuals will not be able to trade points, with the exception of certain nurses and midwives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;1136&quot;&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;Health &amp;amp; care visa&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1133&quot;&gt;&lt;span data-dcnode-id=&quot;1134&quot; instrument_node=&quot;&quot;&gt;Part of the skilled worker route, this will apply to individuals working in eligible health occupations with a job offer from the NHS; social care sector; or employers and organisations which provide services to the NHS.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1132&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1130&quot;&gt;&lt;span data-dcnode-id=&quot;1131&quot; instrument_node=&quot;&quot;&gt;Eligible individuals will benefit from:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1115&quot;&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1126&quot;&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;fast-track entry;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1125&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1123&quot;&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;reduced application fees;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1120&quot;&gt;&lt;span data-dcnode-id=&quot;1121&quot; instrument_node=&quot;&quot;&gt;dedicated application support; and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1119&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1117&quot;&gt;&lt;span data-dcnode-id=&quot;1118&quot; instrument_node=&quot;&quot;&gt;an exemption from the immigration health surcharge.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1114&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1112&quot;&gt;&lt;span data-dcnode-id=&quot;1113&quot; instrument_node=&quot;&quot;&gt;The limited roles eligible for this route has attracted some criticism, notably the exclusion of care home staff and those providing home care. The government has announced that frontline workers not eligible will have to pay the immigration health surcharge but can benefit from a reimbursement scheme, the precise details of which are to be confirmed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1111&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;1109&quot;&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt;Intra-company transfer (ICT) visa&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1106&quot;&gt;&lt;span data-dcnode-id=&quot;1107&quot; instrument_node=&quot;&quot;&gt;This is an existing route for overseas group employees being transferred to the UK. Its eligibility criteria do not look set to change.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1105&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1066&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1063&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;table data-dcnode-id=&quot;1037&quot;&gt;&lt;tbody data-dcnode-id=&quot;1039&quot;&gt;&lt;tr data-dcnode-id=&quot;1089&quot;&gt;&lt;th data-dcnode-id=&quot;1100&quot;&gt;&lt;span data-dcnode-id=&quot;1101&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Process&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;1091&quot;&gt;&lt;span data-dcnode-id=&quot;1098&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1096&quot;&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt;Job offer from UK licenced sponsor required&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1093&quot;&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt;No resident labour market test&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1092&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1065&quot;&gt;&lt;th data-dcnode-id=&quot;1085&quot;&gt;&lt;span data-dcnode-id=&quot;1086&quot; instrument_node=&quot;&quot;&gt;Eligibility&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;1067&quot;&gt;&lt;span data-dcnode-id=&quot;1083&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1081&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;50 points scored through:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1072&quot;&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1077&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;job offer (and sponsorship) from UK licensed sponsor, with applicable overseas continuous service requirements satisfied;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1074&quot;&gt;&lt;span data-dcnode-id=&quot;1075&quot; instrument_node=&quot;&quot;&gt;salary of £41,500 or more (£23,500 if graduate trainee)&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1069&quot;&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;We expect financial maintenance requirements to remain as currently applicable&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;1041&quot;&gt;&lt;th data-dcnode-id=&quot;1061&quot;&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;Costs&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;1043&quot;&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1045&quot;&gt;&lt;span data-dcnode-id=&quot;1058&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1056&quot;&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;£199 sponsorship charge;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1053&quot;&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;£1,000 p/a immigration skills charge;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1050&quot;&gt;&lt;span data-dcnode-id=&quot;1051&quot; instrument_node=&quot;&quot;&gt;£482-£1,408 visa fee;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1049&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1047&quot;&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;£400 p/a immigration health surcharge&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1034&quot;&gt;&lt;span data-dcnode-id=&quot;1035&quot; instrument_node=&quot;&quot;&gt;One big change relates to switching. Currently ICT migrants looking to move to Tier 2 General must depart the UK, wait out a 12-month cooling-off period and then apply to re-enter the UK, potentially after a resident labour market test is carried out. Under the new system these migrants will be able to switch in-country to the skilled worker route. This will be welcomed by employers who wish to keep such migrants beyond the maximum visa term available to them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt;The 'cooling off' rules applicable to this category are also being simplified. Under the new system, visa holders will simply be limited to remaining in the category for a maximum of five years in a six year period (nine years in the case of high earners). This will allow greater flexibility when it comes to short-term assignments and, when coupled with the ability to switch in-country, will be welcomed by employers. It is not known whether relaxed cooling off provisions of this nature will be extended to the skilled worker category.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;1028&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;Student visas&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1025&quot;&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;The existing Tier 4 student route is not expected to change. However, students will be able to apply for their visa six months before the start of their course. This will likely be welcomed by students and universities alike.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1022&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;Other relaxations will also be implemented, including:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1013&quot;&gt;&lt;span data-dcnode-id=&quot;1020&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1018&quot;&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;no time limit on study at post-graduate level provided the student is progressing academically; and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1015&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;the ability for university sponsors to self-assess an applicant's academic and English language abilities.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1010&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;University sponsors will be subject to a new requirement to retain student engagement records, replacing current attendance monitoring duties.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1009&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1007&quot;&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;A new graduate route will also be introduced, for more on which see below.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;The remaining sponsored categories such as those for sporting, creative and charity roles appear to be set to remain unchanged.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;without-keyline&quot; data-dcnode-id=&quot;1001&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;Non-sponsored routes&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;998&quot;&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;Non-sponsored routes are available to migrants without a job offer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;995&quot;&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;Highly skilled visa&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;992&quot;&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;A new route is proposed for a limited number of the most highly skilled workers to come to the UK without a job offer. This will not be rolled out from 1 January 2021, but possibly later in 2021.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;989&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;Graduate visa&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;986&quot;&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;Another new route, to be launched in the summer of 2021, this will provide international students with the opportunity to stay in the UK to work or to look for work once they graduate. Frustratingly, we still do not have further specifics on when this will open.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;944&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;table data-dcnode-id=&quot;941&quot;&gt;&lt;tbody data-dcnode-id=&quot;943&quot;&gt;&lt;tr data-dcnode-id=&quot;972&quot;&gt;&lt;th data-dcnode-id=&quot;980&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;Eligible individuals&amp;nbsp;&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;976&quot;&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;International students with valid leave as a Tier 4 (General) Student or a Student at the time of application and who have successfully completed a degree at undergraduate level or above at a UK higher education provider&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;957&quot;&gt;&lt;th data-dcnode-id=&quot;968&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;Duration of leave&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;959&quot;&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;964&quot;&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;Two years for undergraduate and master's degree students&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;961&quot;&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;Three years for PhD students&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;945&quot;&gt;&lt;th data-dcnode-id=&quot;953&quot;&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt;Settlement&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;947&quot;&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;949&quot;&gt;&lt;span data-dcnode-id=&quot;950&quot; instrument_node=&quot;&quot;&gt;Time spent in this route will not count towards an eventual indefinite leave to remain application, but individuals may be able to switch to a category which can lead to settlement&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;938&quot;&gt;&lt;span data-dcnode-id=&quot;939&quot; instrument_node=&quot;&quot;&gt;This will be a useful route for employers, as graduates can be taken on without sponsorship initially. It will encourage skilled talent to remain in the UK, helping to make UK universities a more competitive and attractive proposition in the global market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;935&quot;&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;Graduates will have the following options open to them, depending on their particular circumstances:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;920&quot;&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;931&quot;&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;skilled worker visa if they have a job offer;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;930&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;928&quot;&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;returning to the UK as an ICT after a period working overseas;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;925&quot;&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;new graduate visa; or&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;924&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;922&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;another non-sponsored route for which they are eligible.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;917&quot;&gt;&lt;span data-dcnode-id=&quot;918&quot; instrument_node=&quot;&quot;&gt;Other unchanged visa routes&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;914&quot;&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;The variety of remaining unsponsored routes will remain largely unchanged including global talent; start-up and innovator; youth mobility scheme; and visitor visas.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;913&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;without-keyline&quot; data-dcnode-id=&quot;911&quot;&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;Sponsor licences&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;910&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;908&quot;&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;Existing sponsors&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;907&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;905&quot;&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;Those who currently hold sponsor licences will automatically be granted a licence under the new system, with an expiry date consistent with their current licence and an appropriate allocation of Certificates of Sponsorship.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;904&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;902&quot;&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;It is not yet known where this will involve a simple licence rebranding – to account for the new skilled worker route – or replacement. In addition, we wait to hear whether such changes will be accompanied by much-needed simplification and improvement of the online sponsorship management system, something many sponsors would be likely to welcome.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h6 data-dcnode-id=&quot;899&quot;&gt;&lt;span data-dcnode-id=&quot;900&quot; instrument_node=&quot;&quot;&gt;Prospective sponsors&lt;/span&gt;&lt;/h6&gt;&lt;span data-dcnode-id=&quot;898&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;896&quot;&gt;&lt;span data-dcnode-id=&quot;897&quot; instrument_node=&quot;&quot;&gt;Those employers who do not currently have a sponsor licence but who anticipate needing one in the future are encouraged to consider applying for one in advance of the changes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;893&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wrapper m4&quot; data-dcnode-id=&quot;882&quot;&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;component follow-cta&quot; data-dcnode-id=&quot;885&quot;&gt;&lt;span data-dcnode-id=&quot;889&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;cta purple&quot; data-dcnode-id=&quot;887&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pinsentmasons.com/account-settings%3Fsetting%3Dtopicpageimmigration%2315500f01-6d25-4f29-909a-a3a96ad96975&quot; title=&quot;Save in your preference settings&quot;&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;Follow Immigration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;
