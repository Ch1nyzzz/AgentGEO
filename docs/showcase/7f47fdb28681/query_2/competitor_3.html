&lt;/span&gt;&lt;p data-dcnode-id=&quot;2749&quot;&gt;&lt;span data-dcnode-id=&quot;2750&quot; instrument_node=&quot;&quot;&gt;Will the UK’s economy collapse or prosper as a result of Brexit?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2746&quot;&gt;&lt;span data-dcnode-id=&quot;2747&quot; instrument_node=&quot;&quot;&gt;Advocates of both “Leave” and “Remain” agree that the economies of both the UK and the EU are bound to take a hit from Brexit. However, each side has different expectations of how long and how severe this effect will be.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2745&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2743&quot;&gt;&lt;span data-dcnode-id=&quot;2744&quot; instrument_node=&quot;&quot;&gt;Brexit will inevitably impact the size of the UK’s economy by affecting the country’s growth, trade, and jobs. UK economy statistics suggest that 2020 will bring the country’s poorest economic performance in over a decade with a growth rate of only 1.0%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2740&quot;&gt;&lt;span data-dcnode-id=&quot;2741&quot; instrument_node=&quot;&quot;&gt;The uncertainty surrounding the final outcome of Brexit has been threatening to take the financial world’s spotlight off the UK. Analysts predict that London will struggle to maintain its status as a global financial capital; its loss could be New York’s gain.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2739&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2212&quot; id=&quot;&quot;&gt;&lt;span data-dcnode-id=&quot;2213&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2211&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2209&quot; id=&quot;uk-economy-statistics-and-facts-editor-s-choice&quot;&gt;&lt;span data-dcnode-id=&quot;2210&quot; instrument_node=&quot;&quot;&gt;UK economy statistics and facts - Editor’s choice&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2208&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;bullet-list editors-choice py-8 pl-0 md:pl-6&quot; data-dcnode-id=&quot;2191&quot;&gt;&lt;span data-dcnode-id=&quot;2207&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2205&quot;&gt;&lt;span data-dcnode-id=&quot;2206&quot; instrument_node=&quot;&quot;&gt;The United Kingdom's decision to divorce the European Union has already cost £130 billion, with the bill expected to grow by another £70 billion by the end of 2020.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2202&quot;&gt;&lt;span data-dcnode-id=&quot;2203&quot; instrument_node=&quot;&quot;&gt;The combined cost of Brexit since the 2016 vote is expected to surpass the total cost of the UK’s contributions to the EU's budget.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2199&quot;&gt;&lt;span data-dcnode-id=&quot;2200&quot; instrument_node=&quot;&quot;&gt;After adjusting for inflation, the UK will have injected £215 billion into the EU from 1973 to the end of 2020.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2198&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2196&quot;&gt;&lt;span data-dcnode-id=&quot;2197&quot; instrument_node=&quot;&quot;&gt;Brexit will limit the flow of international workers whom the UK has been relying on economically for decades.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2195&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2193&quot;&gt;&lt;span data-dcnode-id=&quot;2194&quot; instrument_node=&quot;&quot;&gt;The UK’s GDP growth rate is expected to average only 1.0% in 2020.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2190&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2188&quot; id=&quot;brexit-and-the-uk-economy&quot;&gt;&lt;span data-dcnode-id=&quot;2189&quot; instrument_node=&quot;&quot;&gt;Brexit and the UK economy&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2187&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2185&quot;&gt;&lt;span data-dcnode-id=&quot;2186&quot; instrument_node=&quot;&quot;&gt;In the referendum that took place on June 23, 2016, the United Kingdom's population chose not to be a member of the European Union anymore. Citizens decided that all the benefits of belonging to the union and its single market were overshadowed by the costs of free migration.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2182&quot;&gt;&lt;span data-dcnode-id=&quot;2183&quot; instrument_node=&quot;&quot;&gt;Putting a single and conclusive figure on the economic impact that Brexit will have not only on the UK but also the rest of the world is not an easy task. We’ve compiled the following United Kingdom economy facts and predictions to try to answer this challenging question:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2181&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2179&quot; id=&quot;brexit-facts-show-that-the-cost-of-the-united-kingdom-s-decision-to-withdraw-from-the-european-union-has-already-reached-130-billion-with-another-70-billion-expected-to-be-added-by-the-end-of-2020&quot;&gt;&lt;span data-dcnode-id=&quot;2180&quot; instrument_node=&quot;&quot;&gt;Brexit facts show that the cost of the United Kingdom's decision to withdraw from the European Union has already reached £130 billion, with another £70 billion expected to be added by the end of 2020.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2178&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2174&quot;&gt;&lt;span data-dcnode-id=&quot;2177&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;2175&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2176&quot; instrument_node=&quot;&quot;&gt;Bloomberg Economics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2173&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2171&quot; id=&quot;business-uncertainty-has-made-the-uk-economy-3-smaller-than-it-may-have-been-if-the-country-hadn-t-opted-out-of-the-eu&quot;&gt;&lt;span data-dcnode-id=&quot;2172&quot; instrument_node=&quot;&quot;&gt;Business uncertainty has made the UK economy 3% smaller than it may have been if the country hadn't opted out of the EU.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2170&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2164&quot;&gt;&lt;span data-dcnode-id=&quot;2169&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2167&quot;&gt;&lt;span data-dcnode-id=&quot;2168&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2165&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2166&quot; instrument_node=&quot;&quot;&gt;Business Insider&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2163&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2161&quot; id=&quot;according-to-brexit-economic-statistics-after-adjusting-for-inflation-the-uk-will-have-injected-215-billion-into-the-eu-from-1973-to-the-end-of-2020&quot;&gt;&lt;span data-dcnode-id=&quot;2162&quot; instrument_node=&quot;&quot;&gt;According to Brexit economic statistics, after adjusting for inflation the UK will have injected £215 billion into the EU from 1973 to the end of 2020.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2160&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2154&quot;&gt;&lt;span data-dcnode-id=&quot;2159&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2157&quot;&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2155&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2156&quot; instrument_node=&quot;&quot;&gt;House of Commons Library&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2153&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2151&quot; id=&quot;the-combined-cost-of-brexit-since-the-2016-vote-is-expected-to-surpass-the-total-cost-of-the-uk-s-contributions-to-the-eu-s-budget-which-were-a-focal-point-of-the-leave-campaign-s-argument&quot;&gt;&lt;span data-dcnode-id=&quot;2152&quot; instrument_node=&quot;&quot;&gt;The combined cost of Brexit since the 2016 vote is expected to surpass the total cost of the UK’s contributions to the EU's budget, which were a focal point of the “Leave” campaign's argument.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2150&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2144&quot;&gt;&lt;span data-dcnode-id=&quot;2149&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2147&quot;&gt;&lt;span data-dcnode-id=&quot;2148&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2145&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2146&quot; instrument_node=&quot;&quot;&gt;Business Insider&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2143&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2141&quot; id=&quot;the-brexit-negotiating-period-has-already-been-extended-three-times-by-the-british-government&quot;&gt;&lt;span data-dcnode-id=&quot;2142&quot; instrument_node=&quot;&quot;&gt;The Brexit negotiating period has already been extended three times by the British government.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2140&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2134&quot;&gt;&lt;span data-dcnode-id=&quot;2139&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2137&quot;&gt;&lt;span data-dcnode-id=&quot;2138&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2135&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2136&quot; instrument_node=&quot;&quot;&gt;Investopedia&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2133&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2131&quot; id=&quot;brexit-statistics-show-that-annual-economic-growth-has-dropped-from-2-to-1-due-to-businesses-holding-back-on-investment-as-a-result-of-the-2016-referendum&quot;&gt;&lt;span data-dcnode-id=&quot;2132&quot; instrument_node=&quot;&quot;&gt;Brexit statistics show that annual economic growth has dropped from 2% to 1% due to businesses holding back on investment as a result of the 2016 referendum.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2130&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2124&quot;&gt;&lt;span data-dcnode-id=&quot;2129&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2127&quot;&gt;&lt;span data-dcnode-id=&quot;2128&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2125&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2126&quot; instrument_node=&quot;&quot;&gt;Bloomberg Economics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2123&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2121&quot; id=&quot;the-british-pound-tumbled-from-1-48-on-the-day-of-the-brexit-referendum-to-1-36-the-following-day-it-averaged-1-30-in-december-2019-and-january-2020&quot;&gt;&lt;span data-dcnode-id=&quot;2122&quot; instrument_node=&quot;&quot;&gt;The British pound tumbled from $1.48 on the day of the Brexit referendum to $1.36 the following day. It averaged $1.30 in December 2019 and January 2020.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2120&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2114&quot;&gt;&lt;span data-dcnode-id=&quot;2119&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2117&quot;&gt;&lt;span data-dcnode-id=&quot;2118&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2115&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2116&quot; instrument_node=&quot;&quot;&gt;Federal Reserve System&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2113&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2111&quot;&gt;&lt;img alt=&quot;Tower Bridge&quot; class=&quot;lazy entered error&quot; data-dcnode-id=&quot;2112&quot; data-ll-status=&quot;error&quot; data-src=&quot;https://trinity-core.s3-us-west-1.amazonaws.com/fortunly/assets/belfast,_northern_ireland_60a3d2d40d363.jpg&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//trinity-core.s3-us-west-1.amazonaws.com/fortunly/assets/belfast%2C_northern_ireland_60a3d2d40d363.jpg&amp;amp;raw&quot; style=&quot;display: block; margin-left: auto; margin-right: auto;&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2110&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2108&quot; id=&quot;the-uk-economy-post-brexit-trade-deals&quot;&gt;&lt;span data-dcnode-id=&quot;2109&quot; instrument_node=&quot;&quot;&gt;The UK economy post Brexit: trade deals&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2107&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2105&quot;&gt;&lt;span data-dcnode-id=&quot;2106&quot; instrument_node=&quot;&quot;&gt;As Brexit approaches, the United Kingdom has been putting lots of effort into trying to recreate all its trade deals with the European Union. This is to ensure that the UK doesn't lose its tariff-free privileges with the EU's trading partners after the transition period ends. If the UK doesn't manage to complete its new trading agreements, the country will face additional taxes on goods under the rules of the World Trade Organization (WTO).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2102&quot;&gt;&lt;span data-dcnode-id=&quot;2103&quot; instrument_node=&quot;&quot;&gt;Up until now, the country has only been able to make arrangements and sign new agreements with countries that have current EU trade deals. After January 31, the Brexit date, the UK will be allowed to negotiate and sign new trade agreements with the US and other countries without existing EU deals.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2101&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2099&quot;&gt;&lt;span data-dcnode-id=&quot;2100&quot; instrument_node=&quot;&quot;&gt;With the transition period expiring on December 31, 2020, the UK will also have to arrange a new trade deal with the EU to ensure its goods remain free of tariffs and other trade barriers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2098&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2096&quot; id=&quot;as-a-member-of-the-eu-the-uk-was-able-to-trade-with-more-than-70-countries-without-needing-to-pay-tariffs-on-most-goods&quot;&gt;&lt;span data-dcnode-id=&quot;2097&quot; instrument_node=&quot;&quot;&gt;As a member of the EU, the UK was able to trade with more than 70 countries without needing to pay tariffs on most goods.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2095&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2089&quot;&gt;&lt;span data-dcnode-id=&quot;2094&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2092&quot;&gt;&lt;span data-dcnode-id=&quot;2093&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2090&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2091&quot; instrument_node=&quot;&quot;&gt;BBC&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2086&quot; id=&quot;of-the-759-treaties-the-uk-will-have-to-renegotiate-after-brexit-295-are-related-to-trade-and-49-to-customs&quot;&gt;&lt;span data-dcnode-id=&quot;2087&quot; instrument_node=&quot;&quot;&gt;Of the 759 treaties the UK will have to renegotiate after Brexit, 295 are related to trade and 49 to customs.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2085&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2079&quot;&gt;&lt;span data-dcnode-id=&quot;2084&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2082&quot;&gt;&lt;span data-dcnode-id=&quot;2083&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2080&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2081&quot; instrument_node=&quot;&quot;&gt;EU Treaties Office Database&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2078&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2076&quot; id=&quot;in-2016-the-year-of-the-brexit-vote-48-of-all-the-goods-and-39-of-all-the-services-the-uk-exported-went-to-the-eu-making-it-by-far-the-country-s-biggest-trading-partner&quot;&gt;&lt;span data-dcnode-id=&quot;2077&quot; instrument_node=&quot;&quot;&gt;In 2016, the year of the Brexit vote, 48% of all the goods and 39% of all the services the UK exported went to the EU, making it by far the country’s biggest trading partner.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2075&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2069&quot;&gt;&lt;span data-dcnode-id=&quot;2074&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2072&quot;&gt;&lt;span data-dcnode-id=&quot;2073&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2070&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2071&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2068&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2066&quot; id=&quot;the-uk-s-automotive-sector-is-particularly-reliant-on-the-future-uk-eu-commerce-agreement-in-2016-eu-countries-accounted-for-88-of-the-uk-s-auto-imports-and-42-of-its-exports&quot;&gt;&lt;span data-dcnode-id=&quot;2067&quot; instrument_node=&quot;&quot;&gt;The UK’s automotive sector is particularly reliant on the future UK-EU commerce agreement. In 2016, EU countries accounted for 88% of the UK’s auto imports and 42% of its exports.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2065&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2059&quot;&gt;&lt;span data-dcnode-id=&quot;2064&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2062&quot;&gt;&lt;span data-dcnode-id=&quot;2063&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2060&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2061&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2058&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2056&quot; id=&quot;if-the-uk-and-the-eu-failed-to-reach-a-trade-agreement-cars-would-be-subject-to-a-10-tariff-under-wto-terms&quot;&gt;&lt;span data-dcnode-id=&quot;2057&quot; instrument_node=&quot;&quot;&gt;If the UK and the EU failed to reach a trade agreement, cars would be subject to a 10% tariff under WTO terms.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2055&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2049&quot;&gt;&lt;span data-dcnode-id=&quot;2054&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2052&quot;&gt;&lt;span data-dcnode-id=&quot;2053&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2050&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2051&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2048&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2046&quot; id=&quot;according-to-the-united-kingdom-s-economic-statistics-the-country-s-financial-companies-directed-24-billion-worth-of-services-to-the-eu-in-2015-this-amounted-to-45-of-the-uk-s-total-financial-services-exports-in-the-year-before-the-referendum&quot;&gt;&lt;span data-dcnode-id=&quot;2047&quot; instrument_node=&quot;&quot;&gt;According to the United Kingdom’s economic statistics, the country’s financial companies directed £24 billion worth of services to the EU in 2015. This amounted to 45% of the UK’s total financial services exports in the year before the referendum.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2045&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2039&quot;&gt;&lt;span data-dcnode-id=&quot;2044&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2042&quot;&gt;&lt;span data-dcnode-id=&quot;2043&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2040&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2041&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2036&quot; id=&quot;the-status-of-london-as-a-financial-center-could-be-shaken-by-the-effects-of-brexit-a-number-of-major-banks-are-contemplating-moving-jobs-offshore-amid-uncertainty-regarding-future-trade-arrangements&quot;&gt;&lt;span data-dcnode-id=&quot;2037&quot; instrument_node=&quot;&quot;&gt;The status of London as a financial center could be shaken by the effects of Brexit. A number of major banks are contemplating moving jobs offshore amid uncertainty regarding future trade arrangements.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2035&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2029&quot;&gt;&lt;span data-dcnode-id=&quot;2034&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2032&quot;&gt;&lt;span data-dcnode-id=&quot;2033&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2030&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2031&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2028&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2026&quot; id=&quot;the-northern-ireland-protocol-the-controversial-irish-backstop-has-been-one-of-the-major-stumbling-blocks-of-brexit-trade-negotiations&quot;&gt;&lt;span data-dcnode-id=&quot;2027&quot; instrument_node=&quot;&quot;&gt;The Northern Ireland Protocol, the controversial Irish backstop, has been one of the major stumbling blocks of Brexit trade negotiations.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2025&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2021&quot;&gt;&lt;span data-dcnode-id=&quot;2024&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;2022&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;BBC&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2020&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2018&quot; id=&quot;theresa-may-s-backstop-solution-was-accepted-by-eu-uk-negotiators-but-faced-a-backlash-among-many-british-mps-who-feared-it-would-trap-the-country-in-the-eu-customs-union-and-prevent-it-from-arranging-its-own-trade-deals&quot;&gt;&lt;span data-dcnode-id=&quot;2019&quot; instrument_node=&quot;&quot;&gt;Theresa May's backstop solution was accepted by EU-UK negotiators but faced a backlash among many British MPs, who feared it would trap the country in the EU customs union and prevent it from arranging its own trade deals.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2017&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2013&quot;&gt;&lt;span data-dcnode-id=&quot;2016&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;2014&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2015&quot; instrument_node=&quot;&quot;&gt;BBC&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2010&quot; id=&quot;the-backstop-deal-was-voted-down-by-mps-three-times-which-ultimately-led-to-theresa-may-s-resignation&quot;&gt;&lt;span data-dcnode-id=&quot;2011&quot; instrument_node=&quot;&quot;&gt;The backstop deal was voted down by MPs three times, which ultimately led to Theresa May’s resignation.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2009&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2005&quot;&gt;&lt;span data-dcnode-id=&quot;2008&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;2006&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;2007&quot; instrument_node=&quot;&quot;&gt;BBC&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2004&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;2002&quot; id=&quot;describing-the-irish-backstop-as-anti-democratic-current-uk-prime-minister-boris-johnson-proposed-the-concept-of-a-single-regulatory-zone-as-a-solution-for-the-island-of-ireland&quot;&gt;&lt;span data-dcnode-id=&quot;2003&quot; instrument_node=&quot;&quot;&gt;Describing the Irish backstop as anti-democratic, current UK Prime Minister Boris Johnson proposed the concept of a &quot;single regulatory zone&quot; as a solution for the island of Ireland.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2001&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1997&quot;&gt;&lt;span data-dcnode-id=&quot;2000&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1998&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1999&quot; instrument_node=&quot;&quot;&gt;BBC&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1996&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1994&quot; id=&quot;uk-economy-statistics-in-the-run-up-to-brexit&quot;&gt;&lt;span data-dcnode-id=&quot;1995&quot; instrument_node=&quot;&quot;&gt;UK economy statistics in the run-up to Brexit&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1993&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1991&quot;&gt;&lt;span data-dcnode-id=&quot;1992&quot; instrument_node=&quot;&quot;&gt;The British economy showed signs of volatility throughout 2019, reflecting the multiple change of Brexit dates in March and October. The October 31 deadline, which was eventually extended by Boris Johnson and the European Union, overshadowed the third quarter of 2019. In anticipation of the Brexit deadline, many companies decided to change the timing of their activities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1990&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1988&quot;&gt;&lt;span data-dcnode-id=&quot;1989&quot; instrument_node=&quot;&quot;&gt;According to official figures, gross domestic product - the broadest measure of a country’s economic prosperity - was more prone to revisions during this period than usual.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1987&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1985&quot;&gt;&lt;span data-dcnode-id=&quot;1986&quot; instrument_node=&quot;&quot;&gt;To calculate the United Kingdom’s gross domestic product for each quarter, the Office for National Statistics gathers UK economic data from thousands of companies that operate in the country. The organization uses three different approaches to measure the country’s quarterly GDP data. The methodology includes the output approach (the total value of finished goods and services produced), the income approach (the total income of all nationals), and the expenditure approach (the total value of what everyone in the country has spent).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1982&quot;&gt;&lt;span data-dcnode-id=&quot;1983&quot; instrument_node=&quot;&quot;&gt;Here are the most important UK economy statistics and facts from this period:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1981&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1979&quot; id=&quot;the-gdp-of-the-uk-increased-by-a-revised-0-4-in-q3-2019&quot;&gt;&lt;span data-dcnode-id=&quot;1980&quot; instrument_node=&quot;&quot;&gt;The GDP of the UK increased by a revised 0.4% in Q3 2019.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1978&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1974&quot;&gt;&lt;span data-dcnode-id=&quot;1977&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1975&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1976&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1971&quot; id=&quot;contrary-to-the-initial-estimates-of-gdp-numbers-the-uk-s-economy-grew-at-a-faster-rate-from-july-to-the-end-of-september-picking-up-after-negative-growth-of-0-2-from-april-to-june-2019&quot;&gt;&lt;span data-dcnode-id=&quot;1972&quot; instrument_node=&quot;&quot;&gt;Contrary to the initial estimates of GDP numbers, the UK's economy grew at a faster rate from July to the end of September, picking up after negative growth of 0.2% from April to June 2019.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1970&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1966&quot;&gt;&lt;span data-dcnode-id=&quot;1969&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1967&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1968&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1965&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1963&quot; id=&quot;in-comparison-with-the-same-quarter-july-to-september-in-the-previous-year-the-economy-of-the-uk-recorded-a-growth-of-1-1-in-q3-last-year&quot;&gt;&lt;span data-dcnode-id=&quot;1964&quot; instrument_node=&quot;&quot;&gt;In comparison with the same quarter (July to September) in the previous year, the economy of the UK recorded a growth of 1.1% in Q3 last year.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1962&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1958&quot;&gt;&lt;span data-dcnode-id=&quot;1961&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1959&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1960&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1955&quot; id=&quot;based-on-the-united-kingdom-s-economy-statistics-during-q3-2019-services-production-and-construction-output-were-all-subject-to-upward-revisions-which-means-they-performed-better-than-was-expected&quot;&gt;&lt;span data-dcnode-id=&quot;1956&quot; instrument_node=&quot;&quot;&gt;Based on the United Kingdom’s economy statistics during Q3 2019, services, production, and construction output were all subject to upward revisions, which means they performed better than was expected.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1954&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1950&quot;&gt;&lt;span data-dcnode-id=&quot;1953&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1951&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1952&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1947&quot; id=&quot;uk-economy-statistics-show-that-services-output-grew-by-a-revised-0-5-in-q3-2019-after-q2-had-ended-with-the-weakest-quarterly-results-in-three-years&quot;&gt;&lt;span data-dcnode-id=&quot;1948&quot; instrument_node=&quot;&quot;&gt;UK economy statistics show that services output grew by a revised 0.5% in Q3 2019 after Q2 had ended with the weakest quarterly results in three years.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1946&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1942&quot;&gt;&lt;span data-dcnode-id=&quot;1945&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1943&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1944&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1939&quot; id=&quot;both-manufacturing-and-production-output-increased-by-0-1-in-q3-2019&quot;&gt;&lt;span data-dcnode-id=&quot;1940&quot; instrument_node=&quot;&quot;&gt;Both manufacturing and production output increased by 0.1% in Q3 2019.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1934&quot;&gt;&lt;span data-dcnode-id=&quot;1937&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1935&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1933&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1931&quot; id=&quot;uk-economy-data-shows-that-following-a-slow-period-from-april-to-june-construction-output-grew-by-1-2-in-q3-2019&quot;&gt;&lt;span data-dcnode-id=&quot;1932&quot; instrument_node=&quot;&quot;&gt;UK economy data shows that, following a slow period from April to June, construction output grew by 1.2% in Q3 2019.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1930&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1926&quot;&gt;&lt;span data-dcnode-id=&quot;1929&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1927&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1928&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1922&quot;&gt;&lt;span data-dcnode-id=&quot;1923&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;img alt=&quot;Belfast, Northern Ireland&quot; class=&quot;lazy&quot; data-dcnode-id=&quot;1924&quot; data-src=&quot;https://trinity-core.s3-us-west-1.amazonaws.com/fortunly/assets/london_60a3d2d5a3d90.jpg&quot; style=&quot;display: block; margin-left: auto; margin-right: auto;&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1921&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1919&quot; id=&quot;the-uk-economy-after-brexit-gdp-forecasts-for-2020&quot;&gt;&lt;span data-dcnode-id=&quot;1920&quot; instrument_node=&quot;&quot;&gt;The UK economy after Brexit: GDP forecasts for 2020&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1918&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1916&quot;&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;Brexit uncertainty is expected to continue weighing on the economy of the UK throughout 2020. With the end of the transition period less than a year away, analysts are concerned about the possibility of another cliff edge in December. Brexit analysis has found that the macroeconomic consequences of the withdrawal from the EU will include a decrease in British GDP compared with the predicted growth that would have occurred if the country had remained part of the European Union and its single market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1913&quot;&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;Here’s a short overview of UK GDP forecast data for 2020:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1910&quot; id=&quot;the-uk-s-gdp-growth-rate-is-expected-to-average-1-0-in-2020&quot;&gt;&lt;span data-dcnode-id=&quot;1911&quot; instrument_node=&quot;&quot;&gt;The UK’s GDP growth rate is expected to average 1.0% in 2020.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1909&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1905&quot;&gt;&lt;span data-dcnode-id=&quot;1908&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1906&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;HM Treasury&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1902&quot; id=&quot;inflation-projections-predict-that-the-consumer-price-index-cpi-will-increase-by-an-average-of-2-2-in-q4-of-2020&quot;&gt;&lt;span data-dcnode-id=&quot;1903&quot; instrument_node=&quot;&quot;&gt;Inflation projections predict that the consumer price index (CPI) will increase by an average of 2.2% in Q4 of 2020.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1901&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1897&quot;&gt;&lt;span data-dcnode-id=&quot;1900&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1898&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1899&quot; instrument_node=&quot;&quot;&gt;HM Treasury&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1896&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1894&quot; id=&quot;based-on-uk-economic-data-the-retail-price-index-rpi-is-expected-to-go-up-by-an-average-of-2-8-in-q4-2020&quot;&gt;&lt;span data-dcnode-id=&quot;1895&quot; instrument_node=&quot;&quot;&gt;Based on UK economic data, the retail price index (RPI) is expected to go up by an average of 2.8% in Q4 2020.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1893&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1889&quot;&gt;&lt;span data-dcnode-id=&quot;1892&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1890&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1891&quot; instrument_node=&quot;&quot;&gt;HM Treasury&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1886&quot; id=&quot;uk-employment-statistics-in-the-run-up-to-brexit&quot;&gt;&lt;span data-dcnode-id=&quot;1887&quot; instrument_node=&quot;&quot;&gt;UK employment statistics in the run-up to Brexit&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1885&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1883&quot;&gt;&lt;span data-dcnode-id=&quot;1884&quot; instrument_node=&quot;&quot;&gt;In the UK, the employment rate is calculated as a proportion of people aged between 16 and 64 years who are in paid work. On the other hand, the unemployment rate doesn’t represent the entire unemployed British population. Unemployment measures people who are not in paid work but have been actively looking for a job within the last four weeks and could start working in a new position within the next two weeks.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1882&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1880&quot;&gt;&lt;span data-dcnode-id=&quot;1881&quot; instrument_node=&quot;&quot;&gt;Estimated employment rates for both men and women aged 16 and older have been consistently increasing since the beginning of 2012. Here are some of the most recent statistics on employment in the lead-up to Brexit:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1879&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1877&quot; id=&quot;uk-economy-stats-show-that-the-country-s-employment-rate-hit-a-record-high-of-76-3-from-september-to-november-2019&quot;&gt;&lt;span data-dcnode-id=&quot;1878&quot; instrument_node=&quot;&quot;&gt;UK economy stats show that the country’s employment rate hit a record high of 76.3% from September to November 2019.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1876&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1872&quot;&gt;&lt;span data-dcnode-id=&quot;1875&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1873&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1874&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1871&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1869&quot; id=&quot;the-country-s-unemployment-rate-between-september-and-november-2019-was-estimated-at-3-8-0-2-lower-than-a-year-earlier&quot;&gt;&lt;span data-dcnode-id=&quot;1870&quot; instrument_node=&quot;&quot;&gt;The country's unemployment rate between September and November 2019 was estimated at 3.8%, 0.2% lower than a year earlier.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1868&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1864&quot;&gt;&lt;span data-dcnode-id=&quot;1867&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1865&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1866&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1863&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1861&quot; id=&quot;according-to-uk-economic-growth-stats-the-projected-annual-increase-in-average-weekly-earnings-for-british-employees-remained-virtually-unchanged-from-september-to-november-2019-3-2-for-total-pay-including-bonuses&quot;&gt;&lt;span data-dcnode-id=&quot;1862&quot; instrument_node=&quot;&quot;&gt;According to UK economic growth stats, the projected annual increase in average weekly earnings for British employees remained virtually unchanged from September to November 2019: 3.2% for total pay including bonuses.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1860&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1856&quot;&gt;&lt;span data-dcnode-id=&quot;1859&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1857&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1858&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1855&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1853&quot; id=&quot;there-were-approximately-805-000-job-openings-in-the-uk-in-the-quarter-from-october-to-december-2019-which-was-49-000-fewer-than-a-year-earlier-in-the-same-quarter&quot;&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;There were approximately 805,000 job openings in the UK in the quarter from October to December 2019, which was 49,000 fewer than a year earlier in the same quarter.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1848&quot;&gt;&lt;span data-dcnode-id=&quot;1851&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1849&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1850&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1847&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1845&quot; id=&quot;more-than-3-million-eu-citizens-are-employed-in-the-uk-with-their-careers-ranging-from-the-hospitality-industry-to-public-services&quot;&gt;&lt;span data-dcnode-id=&quot;1846&quot; instrument_node=&quot;&quot;&gt;More than 3 million EU citizens are employed in the UK, with their careers ranging from the hospitality industry to public services.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1844&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1840&quot;&gt;&lt;span data-dcnode-id=&quot;1843&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1841&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1842&quot; instrument_node=&quot;&quot;&gt;Office for National Statistics&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1839&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1837&quot; id=&quot;as-a-part-of-the-deal-1-3-million-british-nationals-who-live-and-work-in-the-european-union-will-continue-to-do-so-in-their-host-country-without-working-visas-as-will-eu-citizens-in-the-uk&quot;&gt;&lt;span data-dcnode-id=&quot;1838&quot; instrument_node=&quot;&quot;&gt;As a part of the deal, 1.3 million British nationals who live and work in the European Union will continue to do so in their host country without working visas, as will EU citizens in the UK.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1836&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1830&quot;&gt;&lt;span data-dcnode-id=&quot;1835&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1833&quot;&gt;&lt;span data-dcnode-id=&quot;1834&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1831&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1832&quot; instrument_node=&quot;&quot;&gt;House of Commons Library&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1827&quot; id=&quot;brexit-impact-statistics-labor-market&quot;&gt;&lt;span data-dcnode-id=&quot;1828&quot; instrument_node=&quot;&quot;&gt;Brexit impact statistics: labor market&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1824&quot;&gt;&lt;span data-dcnode-id=&quot;1825&quot; instrument_node=&quot;&quot;&gt;Based on UK economic data, uncertainty over Brexit outcome and weak productivity have resulted in somewhat slow wage growth and persistent recruitment difficulties over the past two years. According to the CIPD's Labour Market Outlook 2018 report, more than 40% of the United Kingdom’s employers who took part in the survey said they’ve been having a hard time finding the right workers for their open positions. Here are a few more UK economic statistics related to the labor market:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1823&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1821&quot; id=&quot;brexit-will-limit-the-flow-of-international-workers-that-the-united-kingdom-s-economic-system-has-been-relying-on-for-decades&quot;&gt;&lt;span data-dcnode-id=&quot;1822&quot; instrument_node=&quot;&quot;&gt;Brexit will limit the flow of international workers that the United Kingdom's economic system has been relying on for decades.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1820&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1814&quot;&gt;&lt;span data-dcnode-id=&quot;1819&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1817&quot;&gt;&lt;span data-dcnode-id=&quot;1818&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1815&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1816&quot; instrument_node=&quot;&quot;&gt;CIPD&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1811&quot; id=&quot;recruiters-who-have-found-it-difficult-to-fill-their-organization-s-job-vacancies-cite-unsuitable-candidates-37-and-very-few-applications-31-as-the-prevailing-issues&quot;&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt;Recruiters who have found it difficult to fill their organization's job vacancies cite unsuitable candidates (37%) and very few applications (31%) as the prevailing issues.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1804&quot;&gt;&lt;span data-dcnode-id=&quot;1809&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1807&quot;&gt;&lt;span data-dcnode-id=&quot;1808&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1805&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1806&quot; instrument_node=&quot;&quot;&gt;CIPD&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1803&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1801&quot; id=&quot;about-53-of-the-employers-who-had-a-hard-time-filling-vacant-positions-in-2018-decided-to-increase-starting-salaries&quot;&gt;&lt;span data-dcnode-id=&quot;1802&quot; instrument_node=&quot;&quot;&gt;About 53% of the employers who had a hard time filling vacant positions in 2018 decided to increase starting salaries.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1800&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1794&quot;&gt;&lt;span data-dcnode-id=&quot;1799&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1797&quot;&gt;&lt;span data-dcnode-id=&quot;1798&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1795&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1796&quot; instrument_node=&quot;&quot;&gt;CIPD&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1793&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1791&quot; id=&quot;27-of-employers-from-a-range-of-different-sectors-say-it-has-become-more-difficult-to-retain-current-employees&quot;&gt;&lt;span data-dcnode-id=&quot;1792&quot; instrument_node=&quot;&quot;&gt;27% of employers from a range of different sectors say it has become more difficult to retain current employees.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1790&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1784&quot;&gt;&lt;span data-dcnode-id=&quot;1789&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1787&quot;&gt;&lt;span data-dcnode-id=&quot;1788&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1785&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1786&quot; instrument_node=&quot;&quot;&gt;CIPD&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1783&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1781&quot; id=&quot;the-impact-of-brexit-on-the-eu-economy&quot;&gt;&lt;span data-dcnode-id=&quot;1782&quot; instrument_node=&quot;&quot;&gt;The impact of Brexit on the EU economy&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1780&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1778&quot;&gt;&lt;span data-dcnode-id=&quot;1779&quot; instrument_node=&quot;&quot;&gt;The UK’s decision to divorce the EU after 47 years will not only result in social and economic changes, but also in political shifts and institutional reformations for the union. Analysts say that the Brexit consequences list will be a long one both for the United Kingdom and the economy of the remaining EU countries. Brexit data indicates that the main repercussions of the UK’s withdrawal from the EU will relate to trade.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1777&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1775&quot;&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;Here are a few stats and facts that explain the economic impact of Brexit on the UK and the EU:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1774&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1772&quot; id=&quot;statistics-after-brexit-show-that-the-uk-s-vote-has-encouraged-french-and-german-anti-immigration-parties-if-either-of-those-two-counties-left-the-eu-would-lose-its-economic-pillars-and-almost-certainly-dissolve&quot;&gt;&lt;span data-dcnode-id=&quot;1773&quot; instrument_node=&quot;&quot;&gt;Statistics after Brexit show that the UK's vote has encouraged French and German anti-immigration parties; if either of those two counties left, the EU would lose its economic pillars and almost certainly dissolve.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1771&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1765&quot;&gt;&lt;span data-dcnode-id=&quot;1770&quot; instrument_node=&quot;&quot;&gt;Source:&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1768&quot;&gt;&lt;span data-dcnode-id=&quot;1769&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1766&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt;CIPD&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1762&quot; id=&quot;uk-economy-key-stats-demonstrate-that-the-eu-will-be-considered-a-less-attractive-trade-partner-for-the-us-and-japan-without-the-uk&quot;&gt;&lt;span data-dcnode-id=&quot;1763&quot; instrument_node=&quot;&quot;&gt;UK economy key stats demonstrate that the EU will be considered a less attractive trade partner for the US and Japan without the UK.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1757&quot;&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1758&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1759&quot; instrument_node=&quot;&quot;&gt;Global Counsel&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1754&quot; id=&quot;with-one-of-its-biggest-budget-contributors-leaving-the-eu-will-have-to-fill-the-gap-with-higher-contributions-or-by-limiting-spending&quot;&gt;&lt;span data-dcnode-id=&quot;1755&quot; instrument_node=&quot;&quot;&gt;With one of its biggest budget contributors leaving, the EU will have to fill the gap with higher contributions or by limiting spending.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1753&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1749&quot;&gt;&lt;span data-dcnode-id=&quot;1752&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1750&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1751&quot; instrument_node=&quot;&quot;&gt;Global Counsel&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1746&quot; id=&quot;strong-trading-financial-and-investment-bonds-show-that-the-country-most-exposed-to-brexit-will-be-the-netherlands-followed-by-ireland-and-cyprus&quot;&gt;&lt;span data-dcnode-id=&quot;1747&quot; instrument_node=&quot;&quot;&gt;Strong trading, financial, and investment bonds show that the country most exposed to Brexit will be the Netherlands, followed by Ireland and Cyprus.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1745&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1741&quot;&gt;&lt;span data-dcnode-id=&quot;1744&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1742&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1743&quot; instrument_node=&quot;&quot;&gt;Global Counsel&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1738&quot; id=&quot;the-impact-of-brexit-on-the-global-economy&quot;&gt;&lt;span data-dcnode-id=&quot;1739&quot; instrument_node=&quot;&quot;&gt;The impact of Brexit on the global economy&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1735&quot;&gt;&lt;span data-dcnode-id=&quot;1736&quot; instrument_node=&quot;&quot;&gt;Brexit may prove to be a wise choice for the UK’s economy system in the long run, but there’s no arguing that it is a vote against globalization. The outcome won't only impact the UK and the EU - it will inevitably shake the economy of the whole world, having both positive and negative consequences on the economies of other global powers, including the US.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1732&quot; id=&quot;according-to-brexit-stats-the-euro-fell-by-2-and-the-pound-fell-by-8-the-day-after-the-vote-the-value-of-the-dollar-consequently-increased-ultimately-making-us-shares-more-expensive-for-foreign-investors&quot;&gt;&lt;span data-dcnode-id=&quot;1733&quot; instrument_node=&quot;&quot;&gt;According to Brexit stats, the euro fell by 2% and the pound fell by 8% the day after the vote. The value of the dollar consequently increased, ultimately making US shares more expensive for foreign investors.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1731&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1727&quot;&gt;&lt;span data-dcnode-id=&quot;1730&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1728&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1729&quot; instrument_node=&quot;&quot;&gt;Federal Reserve&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1726&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1724&quot; id=&quot;as-the-uk-and-eu-markets-split-us-banks-will-need-to-rethink-their-commitments-to-the-individual-segments-of-the-banking-market&quot;&gt;&lt;span data-dcnode-id=&quot;1725&quot; instrument_node=&quot;&quot;&gt;As the UK and EU markets split, US banks will need to rethink their commitments to the individual segments of the banking market.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1723&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1719&quot;&gt;&lt;span data-dcnode-id=&quot;1722&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1720&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1721&quot; instrument_node=&quot;&quot;&gt;Deloitte Center for Financial Services&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1718&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1716&quot; id=&quot;enduring-uncertainty-will-push-us-banks-to-downsize-investment-commitments-not-only-in-the-uk-but-also-in-the-eu&quot;&gt;&lt;span data-dcnode-id=&quot;1717&quot; instrument_node=&quot;&quot;&gt;Enduring uncertainty will push US banks to downsize investment commitments not only in the UK but also in the EU.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1711&quot;&gt;&lt;span data-dcnode-id=&quot;1714&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1712&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1713&quot; instrument_node=&quot;&quot;&gt;Deloitte Center for Financial Services&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1708&quot; id=&quot;analysts-predict-new-york-may-benefit-from-london-s-inevitable-struggles-to-keep-its-international-clients-from-the-finance-sector&quot;&gt;&lt;span data-dcnode-id=&quot;1709&quot; instrument_node=&quot;&quot;&gt;Analysts predict New York may benefit from London's inevitable struggles to keep its international clients from the finance sector.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1703&quot;&gt;&lt;span data-dcnode-id=&quot;1706&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1704&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1705&quot; instrument_node=&quot;&quot;&gt;Deloitte Center for Financial Services&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;numbered&quot; data-dcnode-id=&quot;1700&quot; id=&quot;as-the-us-doesn-t-currently-have-a-specific-trade-deal-with-the-eu-the-country-will-be-able-to-negotiate-and-sign-a-special-arrangement-with-the-uk-as-soon-as-the-brexit-date-passes&quot;&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;As the US doesn’t currently have a specific trade deal with the EU, the country will be able to negotiate and sign a special arrangement with the UK as soon as the Brexit date passes.&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1695&quot;&gt;&lt;span data-dcnode-id=&quot;1698&quot; instrument_node=&quot;&quot;&gt;Source: &lt;/span&gt;&lt;span data-dcnode-id=&quot;1696&quot; style=&quot;color: #2baa19;&quot;&gt;&lt;span data-dcnode-id=&quot;1697&quot; instrument_node=&quot;&quot;&gt;CNBC&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1692&quot; id=&quot;glossary&quot;&gt;&lt;span data-dcnode-id=&quot;1693&quot; instrument_node=&quot;&quot;&gt;Glossary&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1684&quot;&gt;&lt;span data-dcnode-id=&quot;1690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1686&quot;&gt;&lt;strong data-dcnode-id=&quot;1688&quot;&gt;&lt;span data-dcnode-id=&quot;1689&quot; instrument_node=&quot;&quot;&gt;Gross domestic product (GDP)&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1687&quot; instrument_node=&quot;&quot;&gt; is calculated by adding up the total monetary value of all finished goods and services produced within the borders of a certain country during a specific period of time. GDP can be measured in three ways: production, expenditures, or incomes. It is used to estimate the size and health of a country's economy. Even though the concept of GDP has its limitations, it's still one of the most important tools for guiding strategic decision making. There are a few different types of GDP measurements: nominal GDP, real GDP, GDP per capita, and GDP growth rate.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1683&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1618&quot;&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1676&quot;&gt;&lt;strong data-dcnode-id=&quot;1680&quot;&gt;&lt;span data-dcnode-id=&quot;1681&quot; instrument_node=&quot;&quot;&gt;Nominal GDP&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1679&quot; instrument_node=&quot;&quot;&gt; is also referred to as &quot;current-price GDP,&quot; &quot;GDP at current prices,&quot; or &quot;money GDP.&quot; It represents gross domestic product evaluated at current market prices. Nominal GDP isn't adjusted for inflation, which means it includes all of the changes in market prices that have taken place throughout the current year due to deflation or inflation.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1678&quot;&gt;&lt;br data-dcnode-id=&quot;1677&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1675&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1669&quot;&gt;&lt;strong data-dcnode-id=&quot;1673&quot;&gt;&lt;span data-dcnode-id=&quot;1674&quot; instrument_node=&quot;&quot;&gt;Real GDP&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1672&quot; instrument_node=&quot;&quot;&gt; is sometimes also described as &quot;GDP corrected for inflation.&quot; &quot;GDP at constant prices,&quot; or &quot;deflated GDP.&quot; Real GDP is a macroeconomic measure that represents gross domestic product corrected for inflation or valued at the market prices of a base year. The base year is subject to change from time to time.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1671&quot;&gt;&lt;br data-dcnode-id=&quot;1670&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1662&quot;&gt;&lt;strong data-dcnode-id=&quot;1666&quot;&gt;&lt;span data-dcnode-id=&quot;1667&quot; instrument_node=&quot;&quot;&gt;GDP per capita&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1665&quot; instrument_node=&quot;&quot;&gt; is calculated by dividing a given country's gross domestic product by its total population. This ratio shows how high a certain country's living standards are. Alongside GDP, GDP per capita is used by economists globally to measure a country's prosperity and economic growth.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1664&quot;&gt;&lt;br data-dcnode-id=&quot;1663&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1661&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1654&quot;&gt;&lt;span data-dcnode-id=&quot;1660&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1658&quot;&gt;&lt;span data-dcnode-id=&quot;1659&quot; instrument_node=&quot;&quot;&gt;GDP growth rate&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1657&quot; instrument_node=&quot;&quot;&gt; is an indicator that shows the dynamics of a certain country's economic growth. It does so by comparing a country's increase in GDP from one quarter to a previous quarter.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1656&quot;&gt;&lt;br data-dcnode-id=&quot;1655&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1653&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1647&quot;&gt;&lt;strong data-dcnode-id=&quot;1651&quot;&gt;&lt;span data-dcnode-id=&quot;1652&quot; instrument_node=&quot;&quot;&gt;Inflation&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1650&quot; instrument_node=&quot;&quot;&gt; is defined as a constant rise in the general level of prices and represents a drop in the purchasing power of a certain currency. Naturally, consumers don't approve of rising market prices. However, a constant and moderate price growth indicates a healthy economy.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1649&quot;&gt;&lt;br data-dcnode-id=&quot;1648&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1646&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1640&quot;&gt;&lt;strong data-dcnode-id=&quot;1644&quot;&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt;Deflation&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt;, as opposed to inflation, represents a constant fall in the general level of prices in an economy.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1642&quot;&gt;&lt;br data-dcnode-id=&quot;1641&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1632&quot;&gt;&lt;span data-dcnode-id=&quot;1638&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1636&quot;&gt;&lt;span data-dcnode-id=&quot;1637&quot; instrument_node=&quot;&quot;&gt;GDP deflator&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1635&quot; instrument_node=&quot;&quot;&gt;, or the implicit price deflator for GDP, is a measure that shows the average price of all domestically produced goods and services in a given economy. This price index is calculated using nominal GDP and real GDP data and it measures price inflation or deflation.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1634&quot;&gt;&lt;br data-dcnode-id=&quot;1633&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1631&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1625&quot;&gt;&lt;strong data-dcnode-id=&quot;1629&quot;&gt;&lt;span data-dcnode-id=&quot;1630&quot; instrument_node=&quot;&quot;&gt;Consumer price index (CPI)&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1628&quot; instrument_node=&quot;&quot;&gt; is another indicator that’s important for the GDP of the UK. It measures changes in overall price levels. There are two main differences between the CPI and the GDP deflator. First, the CPI measures only the change in prices that a typical household has to pay for an average &quot;basket&quot; of goods and services. Second, when calculating the price level index value, the CPI uses the base year numbers, not the current year quantities. By approximating consumption patterns, the CPI essentially tries to estimate the purchasing power of a nation's currency.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1627&quot;&gt;&lt;br data-dcnode-id=&quot;1626&quot;&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1620&quot;&gt;&lt;strong data-dcnode-id=&quot;1622&quot;&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;Retail price index (RPI)&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1621&quot; instrument_node=&quot;&quot;&gt; represents an older measure of inflation that is calculated and issued by the United Kingdom's Office of National Statistics. Although this measurement isn't considered one of the official inflation rates by the UK government, it's still used to calculate the cost of living and wage escalation.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;
