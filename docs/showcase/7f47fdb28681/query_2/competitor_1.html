&lt;/span&gt;&lt;article class=&quot;post-5503 commentary type-commentary status-publish has-post-thumbnail hentry topic-integrationsettlementcitizenship&quot; data-dcnode-id=&quot;244&quot; id=&quot;post-5503&quot;&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;246&quot; style=&quot;margin-bottom:20px;&quot;&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1133&quot;&gt;&lt;span data-dcnode-id=&quot;1139&quot; instrument_node=&quot;&quot;&gt;By &lt;/span&gt;&lt;a data-dcnode-id=&quot;1137&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/about/people/madeleine-sumption/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;Madeleine Sumption&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1136&quot; instrument_node=&quot;&quot;&gt; &amp;amp; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1134&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/about/people/denis-kierans/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;Denis Kierans&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1132&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1130&quot;&gt;&lt;span data-dcnode-id=&quot;1131&quot; instrument_node=&quot;&quot;&gt;One of the major outcomes of Brexit has been the implementation of a new immigration system. From the beginning of January this year, free movement came to an end and EU citizens coming to live or work in the UK will need to apply for a visa.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1118&quot;&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt;The public debate about the new immigration system has focused on its economic impacts, including questions such as how employers will adjust to the new system and what the impacts will be on different parts of the workforce, from &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;1126&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.hospitalitynet.org/opinion/4096893.html&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;hospitality&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1125&quot; instrument_node=&quot;&quot;&gt; to &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;1123&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.jcwi.org.uk/when-the-clapping-stops-eu-care-workers-after-brexit&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;social care&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;. There has also been widespread discussion about the process through which EU citizens already living in the UK must secure their residence rights—the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1120&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/reports/unsettled-status-2020/&quot;&gt;&lt;span data-dcnode-id=&quot;1121&quot; instrument_node=&quot;&quot;&gt;EU settlement scheme (EUSS)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1119&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1117&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1115&quot;&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;How the new system might affect the well-being and integration of both migrants and wider communities in the UK has received less attention. This commentary outlines a few of the ways in which the landscape facing policymakers and practitioners working on migrant integration might change as a result of the new immigration system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1114&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1109&quot;&gt;&lt;span data-dcnode-id=&quot;1113&quot; instrument_node=&quot;&quot;&gt;Overall, the introduction of the new immigration system brings both challenges and opportunities for &lt;/span&gt;&lt;a data-dcnode-id=&quot;1111&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/primers/policy-primer-integration/&quot;&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;integration processes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt;, defined as a “two-way process of mutual accommodation” between migrants and the rest of the population. On the one hand, some factors that have created challenges for local communities in the past may diminish under the new immigration system. In particular, the new system is expected—all else equal—to reduce migration to the UK and thus the pace of change in many local areas. The new immigration system also selects for certain criteria that have traditionally been associated with integration, such as language skills. At the same time, the post-Brexit immigration system creates new vulnerabilities for certain groups of migrants. This is because newly arriving EU migrants will have fewer rights than they had under free movement; some will hold visas that make them dependent on their employers; and the absence of legal migration routes can create incentives for irregular migration, as seen in other countries (de Hass, 2011; Cummings et al, 2015; Holzer, 2011).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1103&quot;&gt;&lt;span data-dcnode-id=&quot;1107&quot; instrument_node=&quot;&quot;&gt;For more discussion of what is meant by integration and the UK’s evidence base on integration, see the Migration Observatory report, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1105&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/reports/integration-in-the-uk-understanding-the-data&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;Integration in the UK: Understanding the Data&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1104&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1100&quot;&gt;&lt;span data-dcnode-id=&quot;1101&quot; instrument_node=&quot;&quot;&gt;What has changed for migrants living in and moving to the UK?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1097&quot;&gt;&lt;span data-dcnode-id=&quot;1098&quot; instrument_node=&quot;&quot;&gt;As of 1 January 2021, EU citizens who wish to move to the UK will be subject to the same rules as citizens from the rest of the world, with the exception of Irish citizens who can continue to move to the UK without restrictions under separate arrangements.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1096&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1091&quot;&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt;EU citizens already living in the UK must apply to the EU Settlement Scheme if they want to continue to live in the UK. The operation of this scheme has been &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;1093&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.freemovement.org.uk/how-to-apply-for-settled-status-temporary-status-brexit/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt;described in detail elsewhere&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1092&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1085&quot;&gt;&lt;span data-dcnode-id=&quot;1089&quot; instrument_node=&quot;&quot;&gt;Migrants newly arriving in the UK from January 2021 need to have permission, such as a work, family or study visa. They face broadly the same rules regardless of their country of origin. In practice, this means that the rules have become &lt;/span&gt;&lt;a data-dcnode-id=&quot;1087&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/commentaries/qa-the-uks-new-points-based-immigration-system-after-brexit/&quot;&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;considerably more restrictive for EU citizens&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1086&quot; instrument_node=&quot;&quot;&gt; who previously had free movement rights. However, the rules have become somewhat less restrictive for non-EU citizens, at least those moving for work. Until the end of 2020, non-EU citizens coming to work in the UK on an ordinary work visa would usually need a salary of at least £30,000 in a graduate job; the new rules allow a wider range of middle-skilled occupations to qualify, with the minimum salary required set at £25,600 as standard and lower still in some cases.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1079&quot;&gt;&lt;span data-dcnode-id=&quot;1083&quot; instrument_node=&quot;&quot;&gt;Family migration rules remain the same for non-EU citizens, requiring a minimum income of £18,600 and payment of fees including the NHS surcharge at £624 per person, per year. These requirements will now be applied to EU citizens too, although there are different, &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;1081&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/family-permit/eu-settlement-scheme-family-permit&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;less restrictive rules&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt; for people moving to join EU citizens who hold pre-settled or settled status under the EU Settlement Scheme.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1076&quot;&gt;&lt;span data-dcnode-id=&quot;1077&quot; instrument_node=&quot;&quot;&gt;As is the case with non-EU students, EU students arriving in the UK from January 2021 and whose course begins after July 2021 need to be sponsored by a licensed educational institution and must also pay international tuition fees, visa fees and the healthcare surcharge (at a discounted rate of £470 a year). Previously, EU students were subject to the same rules and fee structures as UK students. The rules on working after study have been relaxed for all international students in the UK, with a 2-year period of post-study work during which there are no restrictions on salary or occupation, and employer sponsorship is not required. The post-study work period rises to three years upon completion of a PhD.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1075&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1073&quot;&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;Migrants on work visas who wish to apply for permanent status in the UK are no longer subject to a higher salary requirement than the one that applies at admission.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1072&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1070&quot;&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;There are also new visa routes which affect certain sub-groups of migrants. After its closure in 2013, the Seasonal Agricultural Workers Scheme (SAWS) has been partially reinstated – in 2020 as an initial pilot in and in 2021 as an extended pilot (DEFRA and Home Office, 2021). This scheme allows agricultural workers to come to the UK for up to six months. Eligible workers need to be sponsored by a government selected ‘operator’ and there is no route to settlement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1064&quot;&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;The new British National (Overseas) (BNO) visa route allows some people from Hong Kong to move to the UK with close family members. After five years in the UK, they will qualify for settlement. This programme is described in more detail &lt;/span&gt;&lt;a data-dcnode-id=&quot;1066&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/commentaries/qa-the-new-route-to-citizenship-for-some-hong-kong-residents/&quot;&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;elsewhere&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1063&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1061&quot;&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;It remains to be seen what other visa routes or policies may be introduced in response to or anticipation of challenging economic, demographic and political dynamics, especially in light of the COVID-19 pandemic and the roll out of the new immigration system itself.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1058&quot;&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;Impacts on migrants’ rights and status&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1055&quot;&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt;Immigration policy gives different groups in the UK different rights and entitlements. People living in the UK on temporary work, family or study visas generally have restrictions on what they can do here. Most of these restrictions are dropped once they receive permanent status, which is usually referred to as indefinite leave to remain (ILR) for non-EU citizens and settled status for EU citizens.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1043&quot;&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;For example, temporary visa holders and seasonal workers generally have ‘&lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;1051&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.freemovement.org.uk/what-is-the-no-recourse-to-public-funds-condition/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;no recourse to public funds&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;’ (NRPF), which means that they cannot access a prescribed list of ‘public funds’ as defined by the Home Office and including the most common welfare benefits, including Universal Credit. At the end of 2019, available data suggest that there were approximately &lt;/span&gt;&lt;a data-dcnode-id=&quot;1048&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/commentaries/between-a-rock-and-a-hard-place-the-covid-19-crisis-and-migrants-with-no-recourse-to-public-funds-nrpf/&quot;&gt;&lt;span data-dcnode-id=&quot;1049&quot; instrument_node=&quot;&quot;&gt;1.4m non-EU citizens with valid visas that typically come with an NRPF condition&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1047&quot; instrument_node=&quot;&quot;&gt;; this compares to a total &lt;/span&gt;&lt;a data-dcnode-id=&quot;1045&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/briefings/migrants-in-the-uk-an-overview/&quot;&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;non-EU born population&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt; of roughly 5.9m the same year. People on skilled worker visas must be working for the employer that sponsored them, and must reapply to the Home Office if they want to switch employer. Student visa holders have restrictions on the number of hours they can work.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1037&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;One impact of the post-Brexit immigration system is thus a shift in the type of immigration statuses that migrants living in the UK hold, and the accompanying restrictions. Many migrants will hold secure permanent statuses, including settled status for EU citizens. With the exception of the right to vote, stand for election or do certain public sector jobs with nationality restrictions (e.g. in the civil service), their rights are broadly similar to those of citizens. Others will hold temporary statuses, some of which are relatively restrictive in the rights they offer (e.g. student visas) while others give more extensive rights (e.g. EU pre-settled status). Many people with pre-settled status may have full access to benefits but others do not; this depends on their circumstances, including what activities they are undertaking in the UK, as well as the final outcome of the &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;1039&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.freemovement.org.uk/court-of-appeal-bombshell-eu-citizens-with-pre-settled-status-can-claim-benefits/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;legal case Fratila and Tanase v Secretary of State for Work and Pensions&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1035&quot; instrument_node=&quot;&quot;&gt;While under free movement EU citizens expected to be able to live and work in the UK indefinitely, under the new system newly arriving migrants will need to qualify and apply for permanent settlement rights. For people on family visas, this takes five years. However, a &lt;/span&gt;&lt;a class=&quot;external hash&quot; data-dcnode-id=&quot;1033&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/government/statistical-data-sets/managed-migration-datasets%23extensions&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;growing number&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt; of non-EU citizens are now on ten-year routes to settlement because they do not meet all the criteria for the standard, five-year route. In addition to a longer wait for a secure immigration status, these people also face higher costs due to the need to renew their visas more times. Under the post-Brexit immigration system, some EU citizens on family visas will also find themselves in this position.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1025&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;There will also be migrants with no legal status. This will include EU citizens who have not applied to EUSS by the time the deadline arrives at the end of June 2021, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1027&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/reports/not-settled-yet-understanding-the-eu-settlement-scheme-using-the-available-data/&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;whose numbers are not known&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;. Those who miss the deadline will be able to apply late, although the government has said they will require ‘reasonable grounds’ (such as having a debilitating health problem or being a child whose parent or guardian did not apply on their behalf). It is clear from previous research that achieving 100% coverage in government programmes is unlikely (Finn and Goodship, 2014; Daigneault et al., 2012), and EUSS is likely to be no exception.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1019&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;Starting from early 2024, there may also be EU citizens who fail to convert their pre-settled status into settled status, for example because they forget to apply. By the end of 2020, just over 1.9m EU citizens and their family members had been granted pre-settled status; at the time of writing, there is &lt;/span&gt;&lt;a data-dcnode-id=&quot;1021&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/reports/not-settled-yet-understanding-the-eu-settlement-scheme-using-the-available-data/&quot;&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt;no published data&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1020&quot; instrument_node=&quot;&quot;&gt; on how many of these people have converted to settled status.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1013&quot;&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;Finally, some migrants moving to the UK from January 2021 may join the illegally resident population. Under free movement, the vast majority of EU citizens moving to work in the UK were considered lawfully resident, while under the new rules, many jobs will no longer be eligible for work visas. Pressure for irregular migration into these jobs may increase due to the more restrictive immigration system towards workers in low-wage jobs, as seen in the EU-Mediterranean context (de Haas, 2011; Cummings et al., 2015) and in the United States (Holzer, 2011). The size of this group &lt;/span&gt;&lt;a data-dcnode-id=&quot;1015&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/briefings/irregular-migration-in-the-uk/&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;is unlikely to be known&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt; as it is inherently difficult to measure.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1010&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;What do these changes in status mean in practice?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1009&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1007&quot;&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;First, EU citizens moving to the UK under the 2021 immigration rules will have more restrictions on access to certain kinds of support than they did under free movement. Because more migrants will be subject to visas (i.e. EU citizens and not just non-EU citizens), over the long run it is expected that a larger population of migrants will have no recourse to public funds. Adult education is not classified as a ‘public fund’ although NRPF conditions can have the effect of limiting access to English for Speakers of Other Languages (ESOL), because job centres and the benefits system are a key gateway through which ESOL can be accessed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;Second, there are now additional ways for EU citizens to contribute to the irregular migrant population, as noted above. People without legal status face a range of vulnerabilities, because of the restrictions on their daily life and economic activities. For example, past research has shown that irregular migrants are at greater risk of exploitation and have limited bargaining power in relationships with employers (McKay et al, 2009; Bloch, 2013). Under the new immigration system, most newly arriving EU citizens will now be subject to measures implemented under the ‘hostile environment’, such as having to prove their right to rent and work.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;992&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;Third, EU citizens coming on work visas will have fewer rights than those coming under free movement. While many people on work visas are in high-paying, skilled jobs where risks of exploitation are &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;1000&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/333083/MAC-Migrants_in_low-skilled_work__Full_report_2014.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;generally lower&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;, the post-Brexit immigration system expands the range of eligible jobs into middle-skilled jobs (such as chefs, butchers and other skilled trades) that command lower salaries. It also expands the number of work visas for low-wage jobs in seasonal agriculture, to &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;997&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/government/news/up-to-30000-workers-to-help-reap-2021-harvest--2&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;compensate for the impacts of ending free movement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;. Programmes that link workers to specific jobs have raised a range of challenges in the past in the UK and other countries, as described in a &lt;/span&gt;&lt;a data-dcnode-id=&quot;994&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/reports/exploiting-the-opportunity-low-skilled-work-migration-after-brexit/&quot;&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;Migration Observatory report on low-wage work&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;. For example, while it may be possible to switch between jobs, this requires permission and workers must be able to find another employer who is willing to sponsor them. Some migrants may also arrive in the UK with debt, because of the costs of visa fees and particularly the NHS surcharge. These things raise the risk that workers whose visa ties them to a specific job will feel less able to assert their rights at work.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;983&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;Fourth, there are some &lt;/span&gt;&lt;a class=&quot;external hash&quot; data-dcnode-id=&quot;988&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/936478/EUSS_PES_November_2020.pdf%23page%3D82&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;concerns about discrimination&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt; on the basis of immigration status arising from the fact that, due to the digital-only nature of settled status, some members of the population (EU citizens with status under the EUSS) but not others (UK citizens and most non-EU citizens) will have no physical proof of immigration status to show to employers or landlords. Predicting the size of any such effect is very difficult as there has been relatively little research on the impacts of immigration status on discrimination. However, &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;985&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.jcwi.org.uk/passport-please&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;there is some evidence&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt; that not having physical proof of immigration status made it harder for non-EU citizens to secure housing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;980&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;Changes in the scale of EU and non-EU migration&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;977&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;The post-Brexit system is expected to change the nature of migration, including both how many people migrate and with what motivations and individual characteristics. Migration patterns are very difficult to project, and even without policy changes they can vary substantially over time, for reasons such as changing economic conditions at either origin or destination.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;Nonetheless, it is reasonable to assume that the post-Brexit immigration system will slow the growth in the migrant population over the long term, by reducing EU immigration relative to what the UK would have experienced under continued free movement. At the same time, the system facing non-EU citizens has become slightly more liberal for non-EU citizens, which—all else equal—should lead to an increase in non-EU migration.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;962&quot;&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;The government has &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;970&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/government/news/home-secretary-announces-new-uk-points-based-immigration-system&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;said that overall immigration will decrease&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt; as a result of the new policies, and this is plausible given the extent of the restrictions on EU citizens. On average between 2004 and 2019, EU migrants made up around half of the estimated increase in the total migrant population living in the UK (Figure 1). &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;967&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/936121/Revised_Impact_Assessment_for_the_Skilled_Worker_Route_signed.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;Home Office modelling&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;, which does not taken into account the effects of COVID-19, estimated that the new work visa system could reduce long-term EU immigration by 80,000 to 90,000 per year (Home Office, 2020). Meanwhile, annual inflows of long-term non-EU migrants were predicted to increase by around 30,000. While &lt;/span&gt;&lt;a class=&quot;external hash&quot; data-dcnode-id=&quot;964&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/873156/PBS_and_Salary_Thresholds_for_Immigration_Annexes_word_FINAL.pdf%23page%3D49&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;modelling of this kind has limitations&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;, the Home Office predicted that the total number of migrants who would arrive to work long-term in the UK would decrease by roughly 350,000 over a 10-year period.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;959&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;Figure 1&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;

t;&gt;An unexpected error occurred. If you continue to receive this error please contact your Tableau Server Administrator.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;796&quot;&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot;&quot;&gt;Session ID: 9F2B2D3E10904A7C86BC647CB0AF0897-0:0&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;794&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;Would you like to reset the view?&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;fpfh32i&quot; data-dcnode-id=&quot;785&quot; data-tb-test-id=&quot;Dialog-Provider-Dialog-Footer&quot; style=&quot;padding: 0px 18px;&quot;&gt;&lt;div class=&quot;f10krlro&quot; data-dcnode-id=&quot;786&quot;&gt;&lt;div class=&quot;fsy4hkl&quot; data-dcnode-id=&quot;787&quot; data-tb-test-id=&quot;DialogButtons-Confirm-Cancel-Footer&quot;&gt;&lt;button class=&quot;fycmrtt low-density tab-showFocusIndicator&quot; data-dcnode-id=&quot;790&quot; data-eventutils-optout=&quot;true&quot; data-tb-test-id=&quot;YesBtn-Button&quot; tabindex=&quot;0&quot;&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;Yes&lt;/span&gt;&lt;/button&gt;&lt;button class=&quot;f1odzkbq low-density&quot; data-dcnode-id=&quot;788&quot; data-eventutils-optout=&quot;true&quot; data-tb-test-id=&quot;NoBtn-Button&quot; tabindex=&quot;0&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;No&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/body&gt;&lt;/html&gt;&lt;/iframe&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;771&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;765&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;The new immigration system has been introduced at a time of social and economic turmoil resulting from the COVID-19 pandemic. This &lt;/span&gt;&lt;a data-dcnode-id=&quot;767&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/commentaries/where-did-all-the-migrants-go-migration-data-during-the-pandemic/&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;disruption has also affected migration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt; and appears to have led to a reduction in the migrant population in the UK, although the data on this are very uncertain and it is not clear how long this decline might last. As a result, some of the impacts of the post-Brexit immigration system may not become clear for some time. For example, high unemployment in the UK in the short to medium term may mean that employers do not increase their recruitment of non-EU migrants in middle-skilled jobs—which have newly become eligible for work visas—as they might otherwise have been expected to do.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;757&quot;&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;More targeted changes to UK immigration policy may also affect the mix of migrants coming to the UK, although there is significant uncertainty surrounding the effects of these policy changes. For example, the Hong Kong British National (Overseas) (BNO) visa is estimated to open a route to settlement in the UK for as many as 5.4 million Hong Kong residents. However, a &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;761&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.legislation.gov.uk/ukia/2020/70/pdfs/ukia_20200070_en.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;government impact assessment&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt; assumes that far fewer will actually make use of it – between 257,000 and 322,000 applications within the first five years of the policy. For a more in depth discussion about the BNO visa, see the Migration Observatory Q&amp;amp;A, &lt;/span&gt;&lt;a data-dcnode-id=&quot;758&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/commentaries/qa-the-new-route-to-citizenship-for-some-hong-kong-residents/&quot;&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;The new Hong Kong British National (Overseas) visa.&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;754&quot;&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;Changes in the nature and local distribution of migration&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;751&quot;&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;It is likely that new migration policies will also affect the composition of migration to the UK. Again, these changes are difficult to predict with any precision, but based on the policy the expectation is that reductions in EU immigration should be concentrated in lower-wage jobs, leading to a higher earnings profile, on average, among newly arrived workers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;745&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;Over the past 15 years, work has been the main reason for migration for EU citizens (Figure 2), although this could fall as a result of new visa restrictions. EU citizens coming on work visas will also in most cases be required to have a skilled job lined up in advance; this should in theory mean that they are more likely to have jobs that match their qualifications. &lt;/span&gt;&lt;a data-dcnode-id=&quot;747&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/briefings/migrants-in-the-uk-labour-market-an-overview/&quot;&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;Overqualification has been a significant feature&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt; of EU migrants’ outcomes in the labour market over the past decade.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;742&quot;&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;Figure 2&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;548&quot;&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;Different parts of the UK may also be affected differently by the changes, both in the medium and long term. While non-EU migrants outnumber EU migrants in most regions of the UK, EU migration has made up a substantial share of the total in some parts of the UK in recent years (Figure 3). For example, EU and non-EU migrants are roughly similar in number in the East of England, Scotland, and the Southwest. In absolute terms, however, EU-born migrants make up by far the largest share of the population in London (&lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;550&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/internationalmigration/datasets/populationoftheunitedkingdombycountryofbirthandnationality&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;12% in 2019,&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt; compared to 5% across the UK as a whole), which means that sharp changes to EU migration would also be expected to have the largest absolute impact in the capital. Some of these impacts would be expected to manifest in the short to medium term (e.g. lower numbers of workers entering industries reliant on EU citizens), while others would be longer-term effects (e.g. slower growth in the total population). Even in areas with relatively small migrant populations, certain industries and businesses may be heavily reliant on EU workers. The new immigration system could thus have larger effects in these communities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt;

t;&gt;An unexpected error occurred. If you continue to receive this error please contact your Tableau Server Administrator.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;382&quot;&gt;&lt;span data-dcnode-id=&quot;383&quot; instrument_node=&quot;&quot;&gt;Session ID: 2F179F42F6BF4094A4C3ED7848DBDC87-0:0&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;380&quot;&gt;&lt;span data-dcnode-id=&quot;381&quot; instrument_node=&quot;&quot;&gt;Would you like to reset the view?&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;fpfh32i&quot; data-dcnode-id=&quot;371&quot; data-tb-test-id=&quot;Dialog-Provider-Dialog-Footer&quot; style=&quot;padding: 0px 18px;&quot;&gt;&lt;div class=&quot;f10krlro&quot; data-dcnode-id=&quot;372&quot;&gt;&lt;div class=&quot;fsy4hkl&quot; data-dcnode-id=&quot;373&quot; data-tb-test-id=&quot;DialogButtons-Confirm-Cancel-Footer&quot;&gt;&lt;button class=&quot;fycmrtt low-density tab-showFocusIndicator&quot; data-dcnode-id=&quot;376&quot; data-eventutils-optout=&quot;true&quot; data-tb-test-id=&quot;YesBtn-Button&quot; tabindex=&quot;0&quot;&gt;&lt;span data-dcnode-id=&quot;377&quot; instrument_node=&quot;&quot;&gt;Yes&lt;/span&gt;&lt;/button&gt;&lt;button class=&quot;f1odzkbq low-density&quot; data-dcnode-id=&quot;374&quot; data-eventutils-optout=&quot;true&quot; data-tb-test-id=&quot;NoBtn-Button&quot; tabindex=&quot;0&quot;&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;No&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/body&gt;&lt;/html&gt;&lt;/iframe&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;357&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;351&quot;&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;The end of free movement is expected to reduce short-term migration to the UK and therefore mean less churn in local communities, which has been a considerable concern for integration practitioners in the past. A fast pace of change at the local level can erode community cohesion, stress public services and planning and lead to more negative public attitudes towards migrants among certain residents (Mort and Morris, 2020). Migrants’ integration outcomes also typically improve over time in such areas as the labour market, English language skills and education (see the Migration Observatory report, &lt;/span&gt;&lt;a data-dcnode-id=&quot;353&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/reports/integration-in-the-uk-understanding-the-data&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;354&quot; instrument_node=&quot;&quot;&gt;Integration in the UK: Understanding the Data&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;, for a more detailed overview).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;348&quot;&gt;&lt;span data-dcnode-id=&quot;349&quot; instrument_node=&quot;&quot;&gt;All of these factors are unpredictable, however, and this uncertainty is exacerbated by the Covid-19 pandemic. This means that from a practical perspective, local authorities, service providers and others interested in understanding the characteristics of the migrant population will need to plan for a range of plausible scenarios.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;345&quot;&gt;&lt;span data-dcnode-id=&quot;346&quot; instrument_node=&quot;&quot;&gt;Future developments in the post-Brexit immigration system&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;339&quot;&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt;The post-Brexit immigration system was implemented in a relatively short period of time, and the government has said it will take a &lt;/span&gt;&lt;a class=&quot;external hash&quot; data-dcnode-id=&quot;341&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/government/publications/the-uks-points-based-immigration-system-policy-statement/the-uks-points-based-immigration-system-policy-statement%23contents&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;342&quot; instrument_node=&quot;&quot;&gt;‘phased approach’&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;340&quot; instrument_node=&quot;&quot;&gt; to its implementation, with further proposals introduced at a later date. (This may include, for example, an unsponsored work visa for high-skilled migrants.) This means that there is still some uncertainty about the shape of the policies under which migrants will enter in coming years.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;330&quot;&gt;&lt;span data-dcnode-id=&quot;337&quot; instrument_node=&quot;&quot;&gt;The Immigration Minister &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;335&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ft.com/content/edab73d0-8c3e-4c94-80f3-09afd302fd0f&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;336&quot; instrument_node=&quot;&quot;&gt;has also said that&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;334&quot; instrument_node=&quot;&quot;&gt; the government is open to negotiating membership of the Youth Mobility Scheme (YMS) with EU countries, although it is not clear whether and when this might happen. This scheme provides a 2-year, non-renewable visa for people from certain countries to live and work in the UK, with no requirement for employer sponsorship and no minimum salary. If the government does negotiate such agreements with EU countries—and depending on how large they are—this could potentially become a meaningful source of temporary migration to the UK. This in turn would have implications for integration, which is a process that typically takes place over a number of years. Likewise, the government doubled the quota of the Seasonal Agricultural Workers Scheme (SAWS) pilot to 30,000 between 2020 and 2021. SAWS allows migrants to work low-skilled agricultural jobs for up to six months at a time. The implications of short-term migration are discussed in the Migration Observatory’s report on &lt;/span&gt;&lt;a data-dcnode-id=&quot;332&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/reports/exploiting-the-opportunity-low-skilled-work-migration-after-brexit/&quot;&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;low-wage work after Brexit&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;331&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;327&quot;&gt;&lt;span data-dcnode-id=&quot;328&quot; instrument_node=&quot;&quot;&gt;Reduced data on migration due to Covid-19 – but light around the corner&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;315&quot;&gt;&lt;span data-dcnode-id=&quot;325&quot; instrument_node=&quot;&quot;&gt;In the short run, one challenge facing practitioners working on integration is that Covid-19 has significantly disrupted the reliability of already limited data on migration and integration at the local level, where integration strategies are typically developed. (See the Migration Observatory’s commentary on &lt;/span&gt;&lt;a data-dcnode-id=&quot;323&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/commentaries/where-did-all-the-migrants-go-migration-data-during-the-pandemic/&quot;&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;migration data during the pandemic&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;322&quot; instrument_node=&quot;&quot;&gt; and report &lt;/span&gt;&lt;a data-dcnode-id=&quot;320&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//migrationobservatory.ox.ac.uk/resources/reports/integration-in-the-uk-understanding-the-data&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;Integration in the UK: Understanding the Data&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;319&quot; instrument_node=&quot;&quot;&gt;) This means that there is currently no data on immigration or emigration at the local level for 2020, no useful data to be drawn from National Insurance Number (NINo) allocations to overseas nationals, and less reliable data on resident migrant populations. All of these data sources are used to produce local-area estimates of migration populations and patterns, which local authorities and service providers use to understand target groups for integration policies. These data sources can be explored in detail in the &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;317&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dataguide.migrationobservatory.ox.ac.uk/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;318&quot; instrument_node=&quot;&quot;&gt;Migration Observatory’s Local Data Guide&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;316&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;309&quot;&gt;&lt;span data-dcnode-id=&quot;313&quot; instrument_node=&quot;&quot;&gt;This disruption to data collection may make it harder to understand how the dynamics of migrant integration in the UK are changing as a result of the post-Brexit immigration system or other factors such as the impacts of the pandemic on the UK labour market. The Office for National Statistics (ONS) is currently &lt;/span&gt;&lt;a class=&quot;external&quot; data-dcnode-id=&quot;311&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ons.gov.uk/peoplepopulationandcommunity/populationandmigration/internationalmigration/articles/transformationofthepopulationandmigrationstatisticssystemoverview/2019-06-21&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;312&quot; instrument_node=&quot;&quot;&gt;developing new approaches to measuring migration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;310&quot; instrument_node=&quot;&quot;&gt;, although regular figures are not expected until later in the year at the earliest. When these figures do arrive, however, there is some prospect that it will also be possible to develop more reliable local-area data, because they will be based on administrative records that enable scrutiny of smaller populations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;306&quot;&gt;&lt;span data-dcnode-id=&quot;307&quot; instrument_node=&quot;&quot;&gt;The results of the 2021 Census (2022 in Scotland) will also provide detailed data on migrant populations in local areas, and are expected to be available within 1-2 years of the Census dates.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;305&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;303&quot;&gt;&lt;span data-dcnode-id=&quot;304&quot; instrument_node=&quot;&quot;&gt;Acknowledgements&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;302&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;293&quot;&gt;&lt;em data-dcnode-id=&quot;294&quot;&gt;&lt;span data-dcnode-id=&quot;301&quot; instrument_node=&quot;&quot;&gt;Thanks to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;299&quot;&gt;&lt;span data-dcnode-id=&quot;300&quot; instrument_node=&quot;&quot;&gt;Lucy Mort&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;298&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;strong data-dcnode-id=&quot;296&quot;&gt;&lt;span data-dcnode-id=&quot;297&quot; instrument_node=&quot;&quot;&gt;Jacqui Broadhead&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;295&quot; instrument_node=&quot;&quot;&gt; for their comments. This research was produced with the support of the Paul Hamlyn Foundation. &lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;292&quot; instrument_node=&quot;&quot;&gt;
