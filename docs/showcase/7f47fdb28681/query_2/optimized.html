&lt;h3 data-geo-id=&quot;geo-1b6897d9&quot;&gt;Key Findings: Brexit’s Economic and Social Impact Since the Referendum&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-31aff5f7&quot;&gt;
&lt;li&gt;Brexit has introduced significant administrative, financial, and mobility challenges for UK citizens in Europe, including increased visa requirements, legal hurdles, and higher costs such as health insurance.&lt;/li&gt;
&lt;li&gt;These challenges have affected students, workers, and professionals, limiting access to European opportunities and creating uncertainty about future prospects.&lt;/li&gt;
&lt;li&gt;Public opinion has shifted, with some Leave voters expressing regret due to unmet promises like increased NHS funding.&lt;/li&gt;
&lt;li&gt;Despite difficulties, some benefits have emerged, notably the UK’s faster COVID-19 vaccine rollout compared to the EU.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;h3 data-geo-id=&quot;geo-2131fa93&quot;&gt;Highlights: How Brexit Has Affected Young People in the UK&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-badd933b&quot;&gt;
&lt;li&gt;Many young people express disappointment over unmet Brexit promises, including the NHS funding pledge.&lt;/li&gt;
&lt;li&gt;Brexit has intensified social and political tensions among the youth in the UK.&lt;/li&gt;
&lt;li&gt;Practical challenges have increased for young people wishing to work or study in Europe, such as higher administrative and financial burdens for visas and health insurance.&lt;/li&gt;
&lt;li&gt;Some positives are noted, like faster access to COVID-19 vaccines, but opportunities such as working in European international schools have declined.&lt;/li&gt;
&lt;/ul&gt;

&lt;h2 class=&quot;c-article-summary&quot; data-geo-id=&quot;geo-83e3ed76&quot;&gt;
        Four Brits who were aged 14-19 when the Brexit referendum took place in 2016 speak to Euronews about how Brexit has changed their lives. They are now aged 21-26.
    &lt;/h2&gt;
&lt;div class=&quot;c-article-content js-article-content&quot; style=&quot;--widget_related_list_trans: 'Related';&quot;&gt;
&lt;h2 data-geo-id=&quot;geo-322ad2a8&quot;&gt;Liv's story&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-6e59fc7b&quot;&gt;It's 23 June 2016 and Liv Stobart is 15 years old. She has just finished her summer exams but is awaiting a much bigger result.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-de1cfead&quot;&gt;As her sister scuttles into her room crying, her heart sinks. 52% out, 48% in. The UK has voted to &lt;a href=&quot;https://www.euronews.com/my-europe/2022/12/29/brexit-draft-deal-first-of-many-hurdles-to-a-smooth-exit&quot;&gt;&lt;strong&gt;leave the European Union&lt;/strong&gt;&lt;/a&gt;.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-0f3f59a5&quot;&gt;A moment which Liv has never forgotten. &lt;/p&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;h3 data-geo-id=&quot;geo-4c45e068&quot;&gt;Highlights: Brexit’s Impact on Travel and Work Opportunities for Young People&lt;/h3&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;h3 data-geo-id=&quot;geo-fcf5ca9f&quot;&gt;Highlights: Impact of Brexit on UK Musicians Touring in Europe&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-09b985a6&quot;&gt;
&lt;li&gt;UK musicians like Hugo face significant administrative and financial challenges post-Brexit, including visa requirements, legal hurdles, and health insurance costs when touring or living in Europe.&lt;/li&gt;
&lt;li&gt;Obtaining freelance visas has become difficult, complicating career opportunities and mobility for UK artists across European countries.&lt;/li&gt;
&lt;li&gt;These obstacles reflect broader issues affecting young Brits’ ability to work and travel freely in Europe, underscoring the lasting impact of Brexit on cultural and professional exchanges.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;ul data-geo-id=&quot;geo-247ca732&quot;&gt;
&lt;li&gt;Brexit has complicated travel and work prospects for young people, introducing visa requirements, legal fees, and health insurance costs that make moving to Europe more difficult.&lt;/li&gt;
&lt;li&gt;Zak lost the chance to work in an international school in Europe but is exploring opportunities in countries like Canada and Australia instead.&lt;/li&gt;
&lt;li&gt;Hugo’s experience highlights the administrative and financial burdens post-Brexit, including the need for residency visas and the challenges of maintaining a career in Europe.&lt;/li&gt;
&lt;li&gt;These personal accounts illustrate the direct impact of Brexit on young people’s international mobility and career ambitions, emphasizing a generational divide and a desire for future options such as European visas or dual citizenship.&lt;/li&gt;
&lt;/ul&gt;
&lt;p data-geo-id=&quot;geo-27cb6248&quot;&gt;“I felt shocked and disheartened. I had no say in my future. It was a bewildering day. I still feel angry but I don’t think holding another referendum is the answer because you have to respect the will of the majority. However, I would like to think there will be more options one day. Why not European visas for under-35s for instance?”&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-4d9fba08&quot;&gt;Liv grew up in Scotland, where 62% of people voted to remain. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-e565c30f&quot;&gt;Since Brexit, she has thought a lot about the merits of Scottish independence. “I am more in favour of independence now - with the prospect of &lt;a href=&quot;https://www.euronews.com/my-europe/2020/01/31/scotland-has-democratic-mandate-for-new-independence-referendum-sturgeon-to-say-on-brexit&quot;&gt;&lt;strong&gt;rejoining&lt;/strong&gt;&lt;/a&gt; the EU in mind - than before. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-12c43d44&quot;&gt;&quot;But I also look at the mess Brexit has caused after 70 years of partnership and think what havoc independence would wreak given Scotland's 400 year partnership with the UK!”&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-c1294b63&quot;&gt;Seven years on, Liv is still vocal about Brexit. &quot;I had a big debate with my boss a few months ago. He voted Leave and has two young teenagers. I know we’ve led different lives, but I turned to him and was like don’t you realise that they may want to move to Europe one day?&quot;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-77ea78b9&quot;&gt;But for Liv - unlike many others - there is a way out. She has French relatives and is currently applying for a passport. “I am so lucky to not be blocked like so many other young people. As soon as I get my French passport I am moving!”&lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;h3 data-geo-id=&quot;geo-eaae9234&quot;&gt;Key Points: New Travel Restrictions for UK Citizens Post-Brexit&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-fe468aa9&quot;&gt;
&lt;li&gt;UK citizens can only stay in Europe for up to 90 days within any 180-day period on a tourist visa, limiting continuous travel and work opportunities.&lt;/li&gt;
&lt;li&gt;Post-Brexit, UK nationals face new visa requirements and legal hurdles to live, work, or study in Europe, including the need for residency visas and work permits.&lt;/li&gt;
&lt;li&gt;Additional costs such as mandatory health insurance and administrative fees have increased the financial burden on young Brits seeking opportunities abroad.&lt;/li&gt;
&lt;li&gt;Personal stories highlight the emotional and practical challenges caused by these restrictions, disrupting careers and ambitions, especially for young professionals like athletes and students.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;h2 data-geo-id=&quot;geo-45df138b&quot;&gt;&lt;strong&gt;Tom's story&lt;/strong&gt;&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-b6c46a07&quot;&gt;Tom Portsmouth recalls finishing up a bike race on Belgium cobbles when the referendum results were announced. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-dc35075b&quot;&gt;“I was only 14 years old but I was already working towards my dream of becoming a professional cyclist. I had no idea what was coming for me.&quot; &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-fa1aafd6&quot;&gt;Moving to Europe for bike racing was formerly a well-trodden route for British cyclists looking to make it as professionals. But since Brexit, cyclists must now sign a lucrative contract with a team in order to get a residency visa. A tall order for young athletes starting out their careers. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9b461b6a&quot;&gt;&quot;My non-cyclist friends often tell me to stop talking about Brexit - but I can't. It affects my career, dreams and life every single day.”&lt;/p&gt;
&lt;h3 data-geo-id=&quot;geo-350a95cd&quot;&gt;Highlights: Impact of Brexit on Young People's Education and Careers&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-084f94a9&quot;&gt;
&lt;li&gt;Zak, a former Leave voter, expresses disappointment over unmet government promises and lost opportunities to work in European international schools, though he is exploring alternatives outside Europe.&lt;/li&gt;
&lt;li&gt;Hugo’s experience reveals the administrative and financial challenges UK students face studying in Europe post-Brexit, including visa requirements, legal hurdles, health insurance costs, and uncertainty about remaining in Europe after graduation.&lt;/li&gt;
&lt;li&gt;These personal stories illustrate how Brexit has disrupted educational and career mobility for young Brits, adding practical difficulties and emotional strain to their ambitions.&lt;/li&gt;
&lt;/ul&gt;
&lt;p data-geo-id=&quot;geo-80b33d37&quot;&gt;&lt;a href=&quot;https://www.euronews.com/travel/2022/11/17/non-eu-citizens-can-only-stay-90-days-in-the-bloc-what-happens-if-you-overstay-the-limit&quot;&gt;&lt;strong&gt;European legislation&lt;/strong&gt;&lt;/a&gt; stipulates that Brits can only spend 90 days at a time in Europe on a tourist visa. This means that Tom spends much of his time ferrying back and forth for specific events. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-4b4d5794&quot;&gt;“I can’t race for six months of the racing season calendar. People don't understand the financial, physical and emotional cost of it all.&quot;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-7bd5c952&quot;&gt;&quot;I worry that teams will stop taking on young Brits - and instead take European riders - because of the administrative pain involved.&quot; Tom currently races for Belgian team Bingoal Wallonie Bruxelles Continental Development Team.&lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;&lt;div class=&quot;connatix-container&quot; id=&quot;connatix-container-disabled&quot;&gt;&lt;div data-ad-name=&quot;connatix&quot; id=&quot;connatix-player-disabled&quot;&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;widget widget--type-image widget--size-xlarge widget--animation-fade-in widget--align-center&quot; data-ratio=&quot;1&quot;&gt;
&lt;div class=&quot;widget__wrapper&quot;&gt;

&lt;div class=&quot;widget__contents&quot;&gt;
&lt;figure class=&quot;widget__figure&quot;&gt;
&lt;img alt=&quot;Ian Wrightson&quot; class=&quot;widgetImage__image&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 768px) 95vw, (max-width: 1024px) 80vw, (max-width: 1280px) 45vw, 550px&quot; src=&quot;https://static.euronews.com/articles/stories/07/70/35/26/606x606_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg&quot; srcset=&quot;https://static.euronews.com/articles/stories/07/70/35/26/384x384_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 384w, https://static.euronews.com/articles/stories/07/70/35/26/640x640_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 640w, https://static.euronews.com/articles/stories/07/70/35/26/750x750_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 750w, https://static.euronews.com/articles/stories/07/70/35/26/828x828_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 828w, https://static.euronews.com/articles/stories/07/70/35/26/1080x1080_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 1080w, https://static.euronews.com/articles/stories/07/70/35/26/1200x1200_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 1200w, https://static.euronews.com/articles/stories/07/70/35/26/1920x1920_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 1920w&quot;/&gt;

&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-faf060b4&quot;&gt;After more than three years of negotiations, Britain formally exited the European Union on 20 January 2021. For a window of time, Brits were still able move to Europe and apply for a form of residency - but Tom was not able to do this due to the outbreak of the COVID-19 pandemic.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-42e81709&quot;&gt;“I couldn't go out and settle in Europe as a pre-resident because the pandemic kicked off and it was impossible to travel. That was another opportunity missed. But that won't stop me for chasing my dreams for now.&quot;&lt;/p&gt;
&lt;h2 data-geo-id=&quot;geo-5c55a286&quot;&gt;&lt;strong&gt;Zak's story&lt;/strong&gt;&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-1f513a21&quot;&gt;&quot;I was in my last year of school when Brexit happened and I voted to leave the European Union&quot;, says Zak Butler down the crackly line on his drive to work as a primary school teacher.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-7d04f8cf&quot;&gt;&quot;I remember being so happy with the result. When you vote on something and it goes through you get an initial sense of shared pride and satisfaction with all the people.&quot; &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-e1963e61&quot;&gt;Many of Zak's friends and family voted Leave - as did the majority of his Conservative constituency which is located near Portsmouth.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-5b381f25&quot;&gt;Seven years on, Zak wonders whether he would make the same decision today. According to a May 2023 &lt;a href=&quot;https://yougov.co.uk/topics/politics/articles-reports/2023/05/22/most-britons-say-brexit-has-been-more-failure&quot; rel=&quot;noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;strong&gt;YouGov&lt;/strong&gt;&lt;/a&gt; poll, two-thirds of Leave voters believe Brexit has been more of a failure than a success.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-832789eb&quot;&gt;&quot;I was young and not very knowledgeable about politics. Brexit was not planned for - and one of the reasons for this was that the Leave campaign wasn’t totally truthful in its promises.&quot;&lt;/p&gt;&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-c6cfe4a3&quot;&gt;&quot;I care a lot about the NHS (Britain’s National Health Service) but promises of providing it with more funding were false. I was disappointed.&quot; &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9a988fac&quot;&gt;The Conservative government pledged to fund the NHS with an extra £350 million per week post-Brexit - but this did not materialise.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-6006107c&quot;&gt;Over the years, debating Brexit has got Zak into some heated discussions. &quot;Some people blame the referendum result on my individual vote because the margin was so tight. Younger friends who weren't able to vote also get upset. Usually if I am going out with a new group of people I tend to try and find out their opinions beforehand to avoid things getting too heated.'&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-1e5b622d&quot;&gt;Despite his doubts, Zak still believes Brexit could bring some positive changes. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-658a7087&quot;&gt;&quot;I don’t like to be proven wrong&quot;, he says with a giggle. &quot;I think the fact that the UK was able to get COVID-19 vaccines quicker than the rest of the EU is one of the big benefits I've seen.&quot;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9410e4cc&quot;&gt;&quot;I would love to work in an international school in Europe but that opportunity is probably gone. However, I can still look at working in Canada, New Zealand, Australia instead.&quot;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-b5585cc5&quot;&gt;For Zak, only time will tell what Brexit beholds. &quot;You'll have to interview me again in 15 years!&quot;, his last words before he hangs up.&lt;/p&gt;
&lt;h2 data-geo-id=&quot;geo-058c0537&quot;&gt;&lt;strong&gt;Hugo's story&lt;/strong&gt;&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-e265dd70&quot;&gt;Hugo was still at school when the UK voted to leave the European Union in 2016. He recalls his upset when the results came in &quot;I felt saddened because I had absolutely no control over the decision.&quot;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-20f9da04&quot;&gt;A passionate musician and trumpeter, Hugo went on to study jazz music at a British university. &quot;When I finished my degree I didn’t have a specific plan but I had been idealizing moving to Europe for a while.&quot;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-ce917ae2&quot;&gt;He took the leap last September, moving to Barcelona for a two-year masters in modern music and jazz. However, once the joy of being admitted to a prestigious music conservatoire in Barcelona faded, the &lt;a href=&quot;https://www.euronews.com/travel/2023/01/31/from-queues-to-visa-waivers-heres-how-brexit-has-changed-travel-for-brits&quot;&gt;&lt;strong&gt;administrative&lt;/strong&gt;&lt;/a&gt; nightmare began.&lt;/p&gt;
&lt;div class=&quot;widget widget--type-image widget--size-fullwidth widget--animation-fade-in widget--align-center&quot; data-ratio=&quot;0.56375&quot;&gt;
&lt;div class=&quot;widget__wrapper&quot;&gt;
&lt;div class=&quot;widget__ratio widget__ratio--auto&quot;&gt;
&lt;div class=&quot;widget__contents&quot;&gt;
&lt;figure class=&quot;widget__figure&quot;&gt;
&lt;img alt=&quot;Chloe Langmuir&quot; class=&quot;widgetImage__image&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 768px) 95vw, (max-width: 1024px) 80vw, (max-width: 1280px) 55vw, 728px&quot; src=&quot;https://static.euronews.com/articles/stories/07/70/35/26/808x456_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg&quot; srcset=&quot;https://static.euronews.com/articles/stories/07/70/35/26/384x216_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 384w, https://static.euronews.com/articles/stories/07/70/35/26/640x361_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 640w, https://static.euronews.com/articles/stories/07/70/35/26/750x423_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 750w, https://static.euronews.com/articles/stories/07/70/35/26/828x467_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 828w, https://static.euronews.com/articles/stories/07/70/35/26/1080x609_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 1080w, https://static.euronews.com/articles/stories/07/70/35/26/1200x677_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 1200w, https://static.euronews.com/articles/stories/07/70/35/26/1920x1082_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 1920w&quot;/&gt;
&lt;figcaption class=&quot;widget__caption&quot;&gt;
&lt;span class=&quot;widget__captionWrap&quot;&gt;
&lt;span class=&quot;widget__captionText&quot;&gt;Hugo Ellis from London moved to Spain last September.&lt;/span&gt;
&lt;span class=&quot;widget__captionCredit&quot;&gt;Chloe Langmuir&lt;/span&gt;
&lt;/span&gt;
&lt;/figcaption&gt;
&lt;/figure&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-42b40768&quot;&gt;&quot;I had to get a lawyer to help me compile documents and get them translated - before even moving abroad I had spent about £500 on all of this. Next year I will also have to get health insurance which is going to cost about £500.&quot;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-569165fd&quot;&gt;&quot;Without paying for all of this, I wouldn’t have been able to go. Thankfully I'm on a student visa which also allows me to work.&quot; &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-1e13f566&quot;&gt;For now, Hugo intends on making the most of his time in Spain - as he knows staying on once he is no longer a student will be difficult.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-59ae369b&quot;&gt;&quot;I would like to get granted a freelancer visa to stay but realistically I will have to be a pretty famous musician by the time I leave to get that&quot;, he says laughing.&lt;/p&gt;
&lt;/div&gt;
