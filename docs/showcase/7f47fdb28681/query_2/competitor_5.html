                        &lt;/span&gt;&lt;p class=&quot;caption_source&quot; data-dcnode-id=&quot;4164&quot;&gt;&lt;i data-dcnode-id=&quot;4166&quot;&gt;&lt;span data-dcnode-id=&quot;4167&quot; instrument_node=&quot;&quot;&gt;Source&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4165&quot; instrument_node=&quot;&quot;&gt;: OECD.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4163&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;caption_source&quot; data-dcnode-id=&quot;4159&quot;&gt;&lt;i data-dcnode-id=&quot;4161&quot;&gt;&lt;span data-dcnode-id=&quot;4162&quot; instrument_node=&quot;&quot;&gt;Note&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4160&quot; instrument_node=&quot;&quot;&gt;: World FDI Stock as of 2014: $25.7 tr.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4158&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4156&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/figcaption&gt;&lt;span data-dcnode-id=&quot;4154&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;4152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4150&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4148&quot;&gt;&lt;span data-dcnode-id=&quot;4149&quot; instrument_node=&quot;&quot;&gt;The motives for investing and locating production in a given country are multiple and complex, but we can broadly divide them into two categories that need not be mutually exclusive for any one investment. These categories are: (i) demand side: to gain access to foreign markets, either in the host market or in neighbouring countries; or (ii) supply side: to exploit local comparative advantages in certain processes or inputs of production—the basis for the existence of global value chains. With these motives in mind, we can ask why the UK is currently an attractive location for FDI.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4147&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4139&quot;&gt;&lt;span data-dcnode-id=&quot;4146&quot; instrument_node=&quot;&quot;&gt;On the demand side, the UK has a market of 60 million consumers with a mean GDP &lt;/span&gt;&lt;i data-dcnode-id=&quot;4144&quot;&gt;&lt;span data-dcnode-id=&quot;4145&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4143&quot; instrument_node=&quot;&quot;&gt; of around US$41,000. While some FDI in the UK serves the local market only, the UK often serves as an export platform for firms to access countries across the European Single Market. Through its EU membership, a UK location currently offers non-EU firms access to a further 443 million consumers with a mean GDP &lt;/span&gt;&lt;i data-dcnode-id=&quot;4141&quot;&gt;&lt;span data-dcnode-id=&quot;4142&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4140&quot; instrument_node=&quot;&quot;&gt; of around US$33,000. This is true both for manufacturing and services sectors. In particular, ‘passporting rights’ allow financial services firms to operate seamlessly to serve customers across country borders within the Single Market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4138&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4136&quot;&gt;&lt;span data-dcnode-id=&quot;4137&quot; instrument_node=&quot;&quot;&gt;Market access alone cannot explain why the UK is the number one FDI destination in the EU since all member countries provide this access. Supply side considerations also explain the UK's appeal as a location to firms participating in global value chains. The UK offers three advantages for this business model: (i) low shipment cost of physical goods, from raw materials to final products, along the value chain; (ii) a legal environment that protects, and is conducive to, the creation of intellectual property; and (iii) access to skilled labour.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4135&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4133&quot;&gt;&lt;span data-dcnode-id=&quot;4134&quot; instrument_node=&quot;&quot;&gt;These supply-side factors that attract FDI to the UK, and retain it in the country, are intimately linked to the UK's EU membership. Shipping of goods along the value chain is facilitated by the Single Market, with firms purchasing inputs mostly from other EU countries. Member countries do not need to comply with ‘rules of origin’ concerning the inputs used in production, trade is tariff-free within the EU, and it is subject to minimal non-tariff bureaucratic costs. Moreover, the UK attracts highly skilled workers from the entire EU market, which adds to its advantage as a location. Free movement of people within the EU thereby increases the UK's appeal to foreign firms making direct investments in the UK in order to benefit from free movement of goods and services in the Single Market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4132&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4130&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;3208&quot; id=&quot;pirs12345-sec-0011&quot;&gt;&lt;span data-dcnode-id=&quot;4129&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;4127&quot; id=&quot;pirs12345-sec-0011-title&quot;&gt;&lt;span data-dcnode-id=&quot;4128&quot; instrument_node=&quot;&quot;&gt;4.2 The importance of FDI for the UK's economy&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4126&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4109&quot;&gt;&lt;span data-dcnode-id=&quot;4125&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;&lt;/span&gt;&lt;a class=&quot;tableLink scrollableLink&quot; data-dcnode-id=&quot;4123&quot; href=&quot;#pirs12345-tbl-0001&quot; title=&quot;Link to table&quot;&gt;&lt;span data-dcnode-id=&quot;4124&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4122&quot; instrument_node=&quot;&quot;&gt; shows that foreign-owned affiliates accounted for 14% of private sector employment, the FDI stock totalled 58% of UK GDP and FDI flows made up 10% of investment in 2014. The bulk of this investment has come from EU countries and the US. While the US is the single biggest investor country, Allen and Dar (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4119&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4120&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0001&quot; id=&quot;pirs12345-bib-0001R&quot;&gt;&lt;span data-dcnode-id=&quot;4121&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4118&quot; instrument_node=&quot;&quot;&gt;) show that almost half of all of the UK's outward FDI is to the EU while half of its inward FDI is from there. Affiliates owned by EU and US corporations account for 7% and 4% of the UK's total employment, respectively. This is consistent with FDI flows following a gravity model, just as trade flows do (Anderson, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4115&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4116&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0003&quot; id=&quot;pirs12345-bib-0003R&quot;&gt;&lt;span data-dcnode-id=&quot;4117&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4114&quot; instrument_node=&quot;&quot;&gt;). The greatest FDI capital flows occur between geographically close and large economies. ‘Closeness’ is increased by shared institutions, and Bruno, Campos, Estrin, and Meng (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4111&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4112&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0012&quot; id=&quot;pirs12345-bib-0012R&quot;&gt;&lt;span data-dcnode-id=&quot;4113&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4110&quot; instrument_node=&quot;&quot;&gt;) estimate that the UK would have received about 22% less FDI between 1986 and 2014 had it not been in the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4108&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3354&quot;&gt;&lt;span data-dcnode-id=&quot;3375&quot; instrument_node=&quot;&quot;&gt;FDI inflows are concentrated in industries in which the UK has clear comparative advantage: the financial sector, mining and transport equipment, as well as sectors with high local demand (food and beverages). Much of this FDI is a consequence of mergers or acquisitions between pre-existing UK firms and foreign firms. Many studies document that the affiliates of foreign firms are larger, more productive, more innovative, and employ more people than domestically owned firms in the same industry (for example, Griffith, Redding, &amp;amp; Simpson, &lt;/span&gt;&lt;span data-dcnode-id=&quot;3372&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3373&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0030&quot; id=&quot;pirs12345-bib-0030R&quot;&gt;&lt;span data-dcnode-id=&quot;3374&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3371&quot; instrument_node=&quot;&quot;&gt;, for the UK). Foreign-owned affiliates also provide positive spillovers to their suppliers and customers (Javorcik, &lt;/span&gt;&lt;span data-dcnode-id=&quot;3368&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3369&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0037&quot; id=&quot;pirs12345-bib-0037R&quot;&gt;&lt;span data-dcnode-id=&quot;3370&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3367&quot; instrument_node=&quot;&quot;&gt;). Part of these benefits come about because foreign firms invest in the firms that would otherwise have been very productive (Criscuolo &amp;amp; Martin, &lt;/span&gt;&lt;span data-dcnode-id=&quot;3364&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3365&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0105&quot; id=&quot;pirs12345-bib-0105R&quot;&gt;&lt;span data-dcnode-id=&quot;3366&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3363&quot; instrument_node=&quot;&quot;&gt;), but some of the benefits are a causal effect of being part of a multinational firm. Foreign ownership creates new incentives to invest in R&amp;amp;D, create employment, and seek out new sales channels (Arnold &amp;amp; Javorcik, &lt;/span&gt;&lt;span data-dcnode-id=&quot;3360&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3361&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0006&quot; id=&quot;pirs12345-bib-0006R&quot;&gt;&lt;span data-dcnode-id=&quot;3362&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3359&quot; instrument_node=&quot;&quot;&gt;; Guadalupe, Kuzmina, &amp;amp; Thomas, &lt;/span&gt;&lt;span data-dcnode-id=&quot;3356&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3357&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0032&quot; id=&quot;pirs12345-bib-0032R&quot;&gt;&lt;span data-dcnode-id=&quot;3358&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3355&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3351&quot;&gt;&lt;span data-dcnode-id=&quot;3352&quot; instrument_node=&quot;&quot;&gt;The effect of Brexit on the inflows and stock of FDI depends on the motives behind the multinational activity in the UK, from both the EU and parent firms located in the rest of the world. An increase in trade costs between the UK and the EU would make the option of serving the UK market from an affiliate located in the UK more attractive compared to importing from elsewhere in the EU. Utilities and industries like food, beverage and tobacco may experience an increase in inward FDI for this local market access reason. However, at the same time, an increase in the cost of importing inputs and of exporting outputs within the EU's Single Market may reduce the UK's participation in international value chains. Given the current composition of the UK's FDI stock across industries, this negative effect is likely to dominate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3344&quot;&gt;&lt;span data-dcnode-id=&quot;3349&quot; instrument_node=&quot;&quot;&gt;If we concentrate on manufacturing, the participation of affiliates of multinational firms in local production is particularly important in sectors characterized by complex value chains and high export content, such as electronics and machinery, transport and automobiles, and chemicals and pharmaceuticals. In the case of US affiliates, which represent the bulk of non-EU FDI, the UK as an export platform for the EU Single Market is particularly important. According to the US Bureau of Economic Analysis, US affiliates in Europe sell, on average, only 50% of their output in the host country, they export 25% to customers in other countries in the Single Market, and the remaining 25% is internationally traded within the boundaries of the multinational corporation (Ramondo, Rodríguez-Clare, &amp;amp; Tintelnot, &lt;/span&gt;&lt;span data-dcnode-id=&quot;3346&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3347&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0049&quot; id=&quot;pirs12345-bib-0049R&quot;&gt;&lt;span data-dcnode-id=&quot;3348&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3345&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3343&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3341&quot;&gt;&lt;span data-dcnode-id=&quot;3342&quot; instrument_node=&quot;&quot;&gt;To obtain a more granular view of the way that multinational activity in the UK in key sectors may be affected by a reduction in economic integration due to Brexit, we analyse the UK car industry—a recent manufacturing success story—in more detail.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3340&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3334&quot;&gt;&lt;span data-dcnode-id=&quot;3339&quot; instrument_node=&quot;&quot;&gt;The UK is now the EU's fourth largest car producer and KPMG (&lt;/span&gt;&lt;span data-dcnode-id=&quot;3336&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3337&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0038&quot; id=&quot;pirs12345-bib-0038R&quot;&gt;&lt;span data-dcnode-id=&quot;3338&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3335&quot; instrument_node=&quot;&quot;&gt;) argues that “much of the recent investment by car manufacturers is in new vehicles that will be predominantly for sale to the EU market.” In 2014, the car industry employed nearly 300,000 workers in the UK and contributed around 5.1% to total UK exports; 40% of its car exports were to the EU. In a survey of its members in 2014, the Society for Motor Manufacturers and Traders found that 70% of its members expect Brexit to have a negative medium to long-term impact on their business.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3333&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3323&quot;&gt;&lt;span data-dcnode-id=&quot;3332&quot; instrument_node=&quot;&quot;&gt;There are very rich data on the car industry, which enable one to extend the structural gravity model of exports in Dhingra et al. (&lt;/span&gt;&lt;span data-dcnode-id=&quot;3329&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3330&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0021&quot; id=&quot;pirs12345-bib-0021R&quot;&gt;&lt;span data-dcnode-id=&quot;3331&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3328&quot; instrument_node=&quot;&quot;&gt;) to the decisions of multinationals over where to base their production. Head and Mayer (&lt;/span&gt;&lt;span data-dcnode-id=&quot;3325&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3326&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0034&quot; id=&quot;pirs12345-bib-0034R&quot;&gt;&lt;span data-dcnode-id=&quot;3327&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3324&quot; instrument_node=&quot;&quot;&gt;) use information on assembly and sales locations (IHS Automotive data) on 1,775 models across 184 brands. These data include annual flows of each model shipped from 49 assembly countries to 75 destination countries between 2000 and 2013. They also contain information on the headquarters and assembly location of the car. The model accounts for how the headquarter decides where to locate production—for example, why BMW chooses to produce Minis in the UK that are sold in France.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3322&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph-element&quot; data-dcnode-id=&quot;3307&quot;&gt;&lt;span data-dcnode-id=&quot;3321&quot; instrument_node=&quot;&quot;&gt;Head and Mayer (&lt;/span&gt;&lt;span data-dcnode-id=&quot;3318&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3319&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0034&quot; id=&quot;pirs12345-bib-0034R&quot;&gt;&lt;span data-dcnode-id=&quot;3320&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3317&quot; instrument_node=&quot;&quot;&gt;) estimate the impact of Brexit on plant location as well as the levels of car production and price. In their work, they add to the direct effect of higher trade costs on prices, two additional implications for firms with production locations in the UK:

               &lt;/span&gt;&lt;ol class=&quot;&quot; data-dcnode-id=&quot;3309&quot; start=&quot;1&quot;&gt;&lt;span data-dcnode-id=&quot;3316&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;3314&quot;&gt;&lt;span data-dcnode-id=&quot;3315&quot; instrument_node=&quot;&quot;&gt;First, as the trade costs rise—because of non-tariff and possibly tariff barriers—locating production in the UK is less attractive because it becomes more costly to ship to the rest of Europe.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3313&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;3311&quot;&gt;&lt;span data-dcnode-id=&quot;3312&quot; instrument_node=&quot;&quot;&gt;Second, there is an increase in the coordination costs between headquarters and the local production plants. Transfers of key staff within the firm may be harder if migration controls are put in place. Different regulatory standards can make engineering, R&amp;amp;D and consultancy services trickier.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3310&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;3308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3306&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3304&quot;&gt;&lt;span data-dcnode-id=&quot;3305&quot; instrument_node=&quot;&quot;&gt;Both these factors may lead firms to reorganize their production locations and affect the amount of production activity conducted in the UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3303&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3298&quot;&gt;&lt;span data-dcnode-id=&quot;3302&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;&lt;/span&gt;&lt;a class=&quot;tableLink scrollableLink&quot; data-dcnode-id=&quot;3300&quot; href=&quot;#pirs12345-tbl-0002&quot; title=&quot;Link to table&quot;&gt;&lt;span data-dcnode-id=&quot;3301&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3299&quot; instrument_node=&quot;&quot;&gt; examines two scenarios for the impact of Brexit on the automotive industry. Row 1 considers both of the costs together—the increased trade costs of exporting and the higher costs of headquarters coordination. Total UK car production is predicted to fall by 12% or almost 180,000 cars per year. This is mainly because European car manufacturers such as Volkswagen move production of some models out of the UK. Prices faced by UK consumers also rise by 2.55% as the cost of imported cars and their components increase. Row 2 analyses the case where the UK faces no trade barriers on cars and car components with the rest of the EU (for example, if it signs an ambitious free trade agreement with the EU following Brexit). Hence, the only increase in costs is due to increased headquarters coordination costs. Although prices are stable in this scenario, car production in the UK still falls by almost 36,000 (2.4%).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-table-content&quot; data-dcnode-id=&quot;3217&quot; id=&quot;pirs12345-tbl-0002&quot;&gt;&lt;span data-dcnode-id=&quot;3296&quot; instrument_node=&quot;&quot;&gt;

lass=&quot;center-aligned&quot; data-dcnode-id=&quot;3254&quot;&gt;&lt;span data-dcnode-id=&quot;3255&quot; instrument_node=&quot;&quot;&gt;2.55%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3234&quot;&gt;&lt;td class=&quot;right-bordered-cell left-aligned&quot; data-dcnode-id=&quot;3248&quot;&gt;&lt;span data-dcnode-id=&quot;3249&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;3245&quot;&gt;&lt;span data-dcnode-id=&quot;3246&quot; instrument_node=&quot;&quot;&gt;Increase in headquarters coordination costs only&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;center-aligned&quot; data-dcnode-id=&quot;3242&quot;&gt;&lt;span data-dcnode-id=&quot;3243&quot; instrument_node=&quot;&quot;&gt;-35,728&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;center-aligned&quot; data-dcnode-id=&quot;3239&quot;&gt;&lt;span data-dcnode-id=&quot;3240&quot; instrument_node=&quot;&quot;&gt;-2.40%&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;center-aligned&quot; data-dcnode-id=&quot;3236&quot;&gt;&lt;span data-dcnode-id=&quot;3237&quot; instrument_node=&quot;&quot;&gt;0.00%&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;3229&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3216&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3210&quot;&gt;&lt;span data-dcnode-id=&quot;3215&quot; instrument_node=&quot;&quot;&gt;In short, the detailed model in Head and Mayer (&lt;/span&gt;&lt;span data-dcnode-id=&quot;3212&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3213&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0034&quot; id=&quot;pirs12345-bib-0034R&quot;&gt;&lt;span data-dcnode-id=&quot;3214&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3211&quot; instrument_node=&quot;&quot;&gt;) confirms the macroeconomic and survey evidence that the costs of Brexit for car production in the UK could be severe, particularly if the UK gives up access to the single market for goods.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3209&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;section class=&quot;article-section__content&quot; data-dcnode-id=&quot;2900&quot; id=&quot;pirs12345-sec-0012&quot;&gt;&lt;span data-dcnode-id=&quot;3204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;article-section__title section__title section1&quot; data-dcnode-id=&quot;3202&quot; id=&quot;pirs12345-sec-0012-title&quot;&gt;&lt;span data-dcnode-id=&quot;3203&quot; instrument_node=&quot;&quot;&gt;5 THE UK's POLICY OPTIONS&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;3201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3184&quot;&gt;&lt;span data-dcnode-id=&quot;3200&quot; instrument_node=&quot;&quot;&gt;All the research discussed in this paper, together with most other studies of Brexit, concludes that Brexit will reduce income levels and living standards in the UK.
&lt;/span&gt;&lt;a aria-controls=&quot;pirs12345-note-0005_note_4&quot; aria-expanded=&quot;false&quot; aria-haspopup=&quot;false&quot; aria-label=&quot;Note 5&quot; class=&quot;noteLink scrollableLink&quot; data-dcnode-id=&quot;3198&quot; href=&quot;#pirs12345-note-0005_note_4&quot; id=&quot;pirs12345-note-0005_note_4-controller&quot; title=&quot;Link to note&quot;&gt;&lt;span data-dcnode-id=&quot;3199&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span aria-labelledby=&quot;pirs12345-note-0005_note_4-controller&quot; class=&quot;footNotePopup&quot; data-dcnode-id=&quot;3190&quot; id=&quot;pirs12345-note-0005_note_4&quot; style=&quot;display: none;&quot;&gt;&lt;button class=&quot;footNoteClose&quot; data-dcnode-id=&quot;3196&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;icon-tools_close&quot; data-dcnode-id=&quot;3197&quot;&gt;&lt;/i&gt;&lt;/button&gt;&lt;span data-dcnode-id=&quot;3192&quot; id=&quot;pirs12345-note-0005&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;3194&quot;&gt;&lt;span data-dcnode-id=&quot;3195&quot; instrument_node=&quot;&quot;&gt;5 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3193&quot; instrument_node=&quot;&quot;&gt;This paper is silent on the non-economic costs and benefits of Brexit that might arise from increased political sovereignty or reduced influence over EU decision making.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;chevronDown&quot; data-dcnode-id=&quot;3191&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3189&quot; instrument_node=&quot;&quot;&gt;  Our view, echoing others such as Armstrong (&lt;/span&gt;&lt;span data-dcnode-id=&quot;3186&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3187&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0005&quot; id=&quot;pirs12345-bib-0005R&quot;&gt;&lt;span data-dcnode-id=&quot;3188&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3185&quot; instrument_node=&quot;&quot;&gt;), is that maintaining economic integration with the rest of the EU to the greatest extent possible is in the best interests of the UK's economy, and should be the primary trade policy objective during Brexit negotiations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3183&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3181&quot;&gt;&lt;span data-dcnode-id=&quot;3182&quot; instrument_node=&quot;&quot;&gt;The UK government has announced it intends to leave both the Single Market and the EU's Customs Union following Brexit, but exactly what form the UK's future economic relationship with the EU will take remains uncertain. In this section we discuss the policy options facing the UK as it leaves the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3180&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3160&quot;&gt;&lt;span data-dcnode-id=&quot;3179&quot; instrument_node=&quot;&quot;&gt;As discussed in the introduction, the UK's position in the global economy is intimately linked to its location. The UK has gained much from concurrent integration with EU goods, services, investment and labour markets. If the UK does not preserve its market access, it is likely to see its locational advantages diminished and its participation in international value chains reduced. Firms with substantial presence in the UK may not immediately re-locate their operations, as reflected in Ernst and Young's survey in January 2017 that found that 86% of foreign firms with a presence in the UK have no intention to relocate European operations in the next three years. But we would expect a slowdown in reinvestment and new FDI flows in the medium and long term.
&lt;/span&gt;&lt;a aria-controls=&quot;pirs12345-note-0006_note_5&quot; aria-expanded=&quot;false&quot; aria-haspopup=&quot;false&quot; aria-label=&quot;Note 6&quot; class=&quot;noteLink scrollableLink&quot; data-dcnode-id=&quot;3177&quot; href=&quot;#pirs12345-note-0006_note_5&quot; id=&quot;pirs12345-note-0006_note_5-controller&quot; title=&quot;Link to note&quot;&gt;&lt;span data-dcnode-id=&quot;3178&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;span aria-labelledby=&quot;pirs12345-note-0006_note_5-controller&quot; class=&quot;footNotePopup&quot; data-dcnode-id=&quot;3166&quot; id=&quot;pirs12345-note-0006_note_5&quot; style=&quot;display: none;&quot;&gt;&lt;button class=&quot;footNoteClose&quot; data-dcnode-id=&quot;3175&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;icon-tools_close&quot; data-dcnode-id=&quot;3176&quot;&gt;&lt;/i&gt;&lt;/button&gt;&lt;span data-dcnode-id=&quot;3168&quot; id=&quot;pirs12345-note-0006&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;3173&quot;&gt;&lt;span data-dcnode-id=&quot;3174&quot; instrument_node=&quot;&quot;&gt;6 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3172&quot; instrument_node=&quot;&quot;&gt;See &lt;/span&gt;&lt;a class=&quot;linkBehavior&quot; data-dcnode-id=&quot;3170&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.ey.com/gl/en/issues/business-environment/ey-attractiveness-surveys&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3171&quot; instrument_node=&quot;&quot;&gt;http://www.ey.com/gl/en/issues/business-environment/ey-attractiveness-surveys&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3169&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;chevronDown&quot; data-dcnode-id=&quot;3167&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3165&quot; instrument_node=&quot;&quot;&gt;  It is very unlikely that non-EU markets will adequately replace the Single Market as a source of either demand for UK output or supply of production inputs (Brakman, Garretsen, &amp;amp; Kohl, &lt;/span&gt;&lt;span data-dcnode-id=&quot;3162&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;3163&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0010&quot; id=&quot;pirs12345-bib-0010R&quot;&gt;&lt;span data-dcnode-id=&quot;3164&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3161&quot; instrument_node=&quot;&quot;&gt;). That is, there are no alternative trading options that will compensate for the economic losses arising from leaving the EU's Single Market for goods, services, investment and people.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3159&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph-element&quot; data-dcnode-id=&quot;3145&quot;&gt;&lt;span data-dcnode-id=&quot;3158&quot; instrument_node=&quot;&quot;&gt;To reduce the costs of Brexit, the UK needs to focus on maintaining tariff-free trade with the EU and, even more importantly, on preventing non-tariff barriers from increasing, especially for services. Important points to consider are:

            &lt;/span&gt;&lt;ul class=&quot;unordered-list&quot; data-dcnode-id=&quot;3147&quot;&gt;&lt;span data-dcnode-id=&quot;3157&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;3155&quot;&gt;&lt;span data-dcnode-id=&quot;3156&quot; instrument_node=&quot;&quot;&gt;For firms participating in global value chains, with a high share of imported inputs, the bureaucratic costs of complying with ‘rules of origin’ are high and act as a non-tariff barrier to trade that may reduce the UK's attractiveness as a production location.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3154&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;3152&quot;&gt;&lt;span data-dcnode-id=&quot;3153&quot; instrument_node=&quot;&quot;&gt;Customs procedures should be simple and fast. The financial costs associated with border delays are especially important for small exporters, for whom these fixed costs are a larger share of export revenues. Small and medium-sized enterprises do not typically export and, when they do, they currently focus on the EU market, in large part because of the low cost of exporting to EU countries.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3151&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;3149&quot;&gt;&lt;span data-dcnode-id=&quot;3150&quot; instrument_node=&quot;&quot;&gt;The effect of Brexit on the administrative costs of trade will vary across sectors. Music, media and IT services, for example, are mostly regulated by national authorities not the EU. Some financial services are governed by global standards (foreign exchange trading, some derivatives clearing). Brexit is not expected to have a substantial impact on trade costs and investment decisions in these industries. However, if the EU further deepens integration in these areas, without the participation of the UK, this conclusion may reverse.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3148&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;3146&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3144&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3142&quot;&gt;&lt;span data-dcnode-id=&quot;3143&quot; instrument_node=&quot;&quot;&gt;Current arrangements between the EU and non-EU countries offer options for UK-EU relations post-Brexit. European Economic Area (EEA) membership as, for example, Norway has now, would give the highest level of market access and minimize disruption to workers and businesses in the UK. Under EEA membership, the UK would remain part of the Single Market, meaning it would continue to accept EU economic regulation and free movement of labour with the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3141&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3136&quot;&gt;&lt;span data-dcnode-id=&quot;3140&quot; instrument_node=&quot;&quot;&gt;Pulling out of the EU and reverting to WTO membership, which describes the current US trading relationship with the EU, would restore sovereignty over economic regulation to the UK and would allow the UK to impose restrictions on immigration from the EU. But the UK would not have the same level of market access to the EU that it currently has. Trade in goods would be subject to the EU's most-favoured nation (MFN) tariffs and there would be new non-tariff barriers and restrictions on services trade. For example, financial services firms based in the UK would no longer have ‘passporting rights’ to sell services throughout the Single Market. Policy options like the Swiss model and the Liechtenstein model would provide more intermediate levels of market access and sovereignty. The different policy options for future UK-EU relations, and their various pros and cons are summarized in Table&amp;nbsp;&lt;/span&gt;&lt;a class=&quot;tableLink scrollableLink&quot; data-dcnode-id=&quot;3138&quot; href=&quot;#pirs12345-tbl-0003&quot; title=&quot;Link to table&quot;&gt;&lt;span data-dcnode-id=&quot;3139&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3137&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3135&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-table-content&quot; data-dcnode-id=&quot;2929&quot; id=&quot;pirs12345-tbl-0003&quot;&gt;&lt;span data-dcnode-id=&quot;3134&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;header class=&quot;article-table-caption&quot; data-dcnode-id=&quot;3130&quot;&gt;&lt;span class=&quot;table-caption__label&quot; data-dcnode-id=&quot;3132&quot;&gt;&lt;span data-dcnode-id=&quot;3133&quot; instrument_node=&quot;&quot;&gt;Table 3.
            &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3131&quot; instrument_node=&quot;&quot;&gt;Options for the UK outside the EU&lt;/span&gt;&lt;/header&gt;&lt;span data-dcnode-id=&quot;3129&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3105&quot;&gt;&lt;span data-dcnode-id=&quot;3106&quot; instrument_node=&quot;&quot;&gt;° Belong to the Single Market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3102&quot;&gt;&lt;span data-dcnode-id=&quot;3103&quot; instrument_node=&quot;&quot;&gt;° No longer subject to certain EU policies (agriculture, fisheries, justice and foreign policy).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3101&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3099&quot;&gt;&lt;span data-dcnode-id=&quot;3100&quot; instrument_node=&quot;&quot;&gt;° Can negotiate trade deals independently of the EU.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;3087&quot;&gt;&lt;span data-dcnode-id=&quot;3096&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3094&quot;&gt;&lt;span data-dcnode-id=&quot;3095&quot; instrument_node=&quot;&quot;&gt;° Implement Single Market policies, without representation in EU decision making.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3093&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3091&quot;&gt;&lt;span data-dcnode-id=&quot;3092&quot; instrument_node=&quot;&quot;&gt;° Must comply with rules of origin for exports to the EU and subject to EU anti-dumping measures.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3090&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3088&quot;&gt;&lt;span data-dcnode-id=&quot;3089&quot; instrument_node=&quot;&quot;&gt;° Must contribute to the EU budget, Norway's per capita contribution is currently 17% lower than the UK's.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3054&quot;&gt;&lt;td class=&quot;right-bordered-cell left-aligned&quot; data-dcnode-id=&quot;3081&quot;&gt;&lt;span data-dcnode-id=&quot;3082&quot; instrument_node=&quot;&quot;&gt;Bilateral agreements - the Swiss model&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;3070&quot;&gt;&lt;span data-dcnode-id=&quot;3079&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3077&quot;&gt;&lt;span data-dcnode-id=&quot;3078&quot; instrument_node=&quot;&quot;&gt;° Free trade in goods and free movement of people with the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3076&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3074&quot;&gt;&lt;span data-dcnode-id=&quot;3075&quot; instrument_node=&quot;&quot;&gt;° Can negotiate trade deals independently of the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3073&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3071&quot;&gt;&lt;span data-dcnode-id=&quot;3072&quot; instrument_node=&quot;&quot;&gt;° A la carte approach permits opting out of EU programmes on a case-by-case basis.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;3056&quot;&gt;&lt;span data-dcnode-id=&quot;3068&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3066&quot;&gt;&lt;span data-dcnode-id=&quot;3067&quot; instrument_node=&quot;&quot;&gt;° Need EU consent for bilateral agreements.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3065&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3063&quot;&gt;&lt;span data-dcnode-id=&quot;3064&quot; instrument_node=&quot;&quot;&gt;° Adopt EU rules without representation in EU decision making.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3060&quot;&gt;&lt;span data-dcnode-id=&quot;3061&quot; instrument_node=&quot;&quot;&gt;° No agreement with the EU on trade in services.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3059&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3057&quot;&gt;&lt;span data-dcnode-id=&quot;3058&quot; instrument_node=&quot;&quot;&gt;° Pay a fee to participate in EU programmes, Swiss contribution is 60% lower than the UK's.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;3026&quot;&gt;&lt;td class=&quot;right-bordered-cell left-aligned&quot; data-dcnode-id=&quot;3050&quot;&gt;&lt;span data-dcnode-id=&quot;3051&quot; instrument_node=&quot;&quot;&gt;Continental Partnership&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;3039&quot;&gt;&lt;span data-dcnode-id=&quot;3048&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3046&quot;&gt;&lt;span data-dcnode-id=&quot;3047&quot; instrument_node=&quot;&quot;&gt;° EEA membership with free trade in goods and services with the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3045&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3043&quot;&gt;&lt;span data-dcnode-id=&quot;3044&quot; instrument_node=&quot;&quot;&gt;° Limited autonomy in setting immigration quotas for EU migrants.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3040&quot;&gt;&lt;span data-dcnode-id=&quot;3041&quot; instrument_node=&quot;&quot;&gt;° Consultative voice in EU decisions.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;3028&quot;&gt;&lt;span data-dcnode-id=&quot;3037&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3035&quot;&gt;&lt;span data-dcnode-id=&quot;3036&quot; instrument_node=&quot;&quot;&gt;° Need EU consent for immigration quotas.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3034&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3018&quot;&gt;&lt;span data-dcnode-id=&quot;3019&quot; instrument_node=&quot;&quot;&gt;° EEA membership with free trade in goods and services with the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3017&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3015&quot;&gt;&lt;span data-dcnode-id=&quot;3016&quot; instrument_node=&quot;&quot;&gt;° Safeguard measure to control EU immigration or denial of access to public services for EU immigrants without a job.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;3003&quot;&gt;&lt;span data-dcnode-id=&quot;3012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3010&quot;&gt;&lt;span data-dcnode-id=&quot;3011&quot; instrument_node=&quot;&quot;&gt;° Need EU consent for safeguard measures.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3009&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3007&quot;&gt;&lt;span data-dcnode-id=&quot;3008&quot; instrument_node=&quot;&quot;&gt;° Adopt EU rules without voting rights in EU decisions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3006&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3004&quot;&gt;&lt;span data-dcnode-id=&quot;3005&quot; instrument_node=&quot;&quot;&gt;° Must contribute to EU budget.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2970&quot;&gt;&lt;td class=&quot;right-bordered-cell left-aligned&quot; data-dcnode-id=&quot;2997&quot;&gt;&lt;span data-dcnode-id=&quot;2998&quot; instrument_node=&quot;&quot;&gt;EFTA&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;2983&quot;&gt;&lt;span data-dcnode-id=&quot;2995&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2993&quot;&gt;&lt;span data-dcnode-id=&quot;2994&quot; instrument_node=&quot;&quot;&gt;° Free trade in goods with the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2992&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2990&quot;&gt;&lt;span data-dcnode-id=&quot;2991&quot; instrument_node=&quot;&quot;&gt;° Can negotiate trade deals independently of the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2989&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2987&quot;&gt;&lt;span data-dcnode-id=&quot;2988&quot; instrument_node=&quot;&quot;&gt;° Not required to adopt EU policies and regulations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2986&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2984&quot;&gt;&lt;span data-dcnode-id=&quot;2985&quot; instrument_node=&quot;&quot;&gt;° No obligation to contribute to the EU budget.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;2972&quot;&gt;&lt;span data-dcnode-id=&quot;2981&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2979&quot;&gt;&lt;span data-dcnode-id=&quot;2980&quot; instrument_node=&quot;&quot;&gt;° No freedom of movement of people with the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2978&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2976&quot;&gt;&lt;span data-dcnode-id=&quot;2977&quot; instrument_node=&quot;&quot;&gt;° No right of access to EU markets for services.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2973&quot;&gt;&lt;span data-dcnode-id=&quot;2974&quot; instrument_node=&quot;&quot;&gt;° Goods exported to the EU must meet EU product standards.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;2939&quot;&gt;&lt;td class=&quot;right-bordered-cell left-aligned&quot; data-dcnode-id=&quot;2966&quot;&gt;&lt;span data-dcnode-id=&quot;2967&quot; instrument_node=&quot;&quot;&gt;WTO&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;2955&quot;&gt;&lt;span data-dcnode-id=&quot;2964&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2962&quot;&gt;&lt;span data-dcnode-id=&quot;2963&quot; instrument_node=&quot;&quot;&gt;° Can negotiate trade deals independently of the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2961&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2959&quot;&gt;&lt;span data-dcnode-id=&quot;2960&quot; instrument_node=&quot;&quot;&gt;° Not required to adopt EU policies and regulations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2958&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2956&quot;&gt;&lt;span data-dcnode-id=&quot;2957&quot; instrument_node=&quot;&quot;&gt;° No obligation to contribute to the EU budget.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;td class=&quot;left-aligned&quot; data-dcnode-id=&quot;2941&quot;&gt;&lt;span data-dcnode-id=&quot;2953&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2951&quot;&gt;&lt;span data-dcnode-id=&quot;2952&quot; instrument_node=&quot;&quot;&gt;° Trade with EU subject to MFN tariffs and any non-tariff barriers that comply with WTO agreements.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2950&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2948&quot;&gt;&lt;span data-dcnode-id=&quot;2949&quot; instrument_node=&quot;&quot;&gt;° No freedom of movement of people with the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2947&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2945&quot;&gt;&lt;span data-dcnode-id=&quot;2946&quot; instrument_node=&quot;&quot;&gt;° No right of access to EU markets for services.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2944&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2942&quot;&gt;&lt;span data-dcnode-id=&quot;2943&quot; instrument_node=&quot;&quot;&gt;° Goods exported to the EU must meet EU product standards.&lt;/span&gt;&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;2934&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2932&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-section__table-source&quot; data-dcnode-id=&quot;2931&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2930&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2926&quot;&gt;&lt;span data-dcnode-id=&quot;2927&quot; instrument_node=&quot;&quot;&gt;Leaving the EU will give the UK greater freedom in designing domestic policies and regulation. It has been argued that this could compensate for the costs of reduced trade and FDI. After Brexit, the UK will have the freedom to redesign all areas of economic policy currently under the authority of the EU (e.g. competition policy, international trade policy, and funding for regional development, research and agriculture). However, any new domestic subsidies or regulations that do not comply with EU or WTO standards may provoke the imposition of further market restrictions from global trading partners. Regulatory divergence between the UK and the EU will also increase the export costs faced by UK firms that will need to satisfy different product standards for domestic production and for exports to the EU. More generally, while a lack of policy coordination with the EU will provide more freedom for domestic policy design, it will make it harder for UK firms to do business with the Single Market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2923&quot;&gt;&lt;span data-dcnode-id=&quot;2924&quot; instrument_node=&quot;&quot;&gt;What about trading relations with non-EU countries? After Brexit, the UK plans to leave the EU's Customs Union, allowing the UK to have its own trade policy and to negotiate new trade agreements with countries outside the EU. With an independent trade policy, the UK could seek trade agreements tailored to UK interests and it would not need to compromise with the 27 other EU member states during negotiations. However, the UK acting alone would have less bargaining power in trade negotiations than the EU since it offers a much smaller market to foreign firms. This may mean the UK ends up obtaining worse trade deals with non-EU countries than those brokered by the EU. It is also uncertain what will happen to the trade agreements in which the UK currently participates as a member of the EU, such as the EU-South Korea free trade agreement. The UK may need to replace or re-negotiate these past trade agreements, which will require costly and long-lasting diplomatic efforts and a fair amount of uncertainty in the interim. At a time of limited negotiating capacity, the UK must prioritize larger and closer trade partners like the EU and, to a lesser extent, the US.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2922&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2916&quot;&gt;&lt;span data-dcnode-id=&quot;2921&quot; instrument_node=&quot;&quot;&gt;Furthermore, export expansion into new markets is in itself a slow and costly process. Currently, China's consumption and investment demand for UK exports accounts for only 1% of UK GDP; Canada and Australia less than 0.5% each; and India only about 0.25% of UK GDP (Los, McCann, Springford, &amp;amp; Thissen, &lt;/span&gt;&lt;span data-dcnode-id=&quot;2918&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;2919&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0041&quot; id=&quot;pirs12345-bib-0041R&quot;&gt;&lt;span data-dcnode-id=&quot;2920&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2917&quot; instrument_node=&quot;&quot;&gt;). Given the importance of geographic factors in explaining the size of bilateral trade flows, policy efforts to increase trade with countries such as China and India are likely to have limited effects in the short-term.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2905&quot;&gt;&lt;span data-dcnode-id=&quot;2914&quot; instrument_node=&quot;&quot;&gt;It is important to note that deepening international integration with non-EU countries implies different challenges than those that are faced in current partnership with the EU. European economies are relatively similar to the UK in terms of education, labour costs, and environmental regulations. As a result, much of the gains from trade within the EU are based on economies of scale and access to broader varieties of goods and inputs. The gains from trade with labour-abundant economies such as China or India are based on comparative advantage driven by technological differences and patterns of factor abundance. Deepening integration with these countries may lead to aggregate gains from trade but is also likely to reduce the real wages of some UK workers, particularly those employed in sectors that are intensive employers of unskilled workers. Recent evidence from the US and Europe shows that import competition from low-wage countries does increase wage inequality within a country (Autor et al., &lt;/span&gt;&lt;span data-dcnode-id=&quot;2911&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;2912&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0101&quot; id=&quot;pirs12345-bib-0101R&quot;&gt;&lt;span data-dcnode-id=&quot;2913&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2910&quot; instrument_node=&quot;&quot;&gt;; Pessoa, &lt;/span&gt;&lt;span data-dcnode-id=&quot;2907&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;2908&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0048&quot; id=&quot;pirs12345-bib-0048R&quot;&gt;&lt;span data-dcnode-id=&quot;2909&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2906&quot; instrument_node=&quot;&quot;&gt;). Further integration with low income countries will therefore create an increased need, relative to integration with the EU, for fiscal policy to compensate the losers from trade.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2904&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2902&quot;&gt;&lt;span data-dcnode-id=&quot;2903&quot; instrument_node=&quot;&quot;&gt;Summarizing, the UK's decision to leave the EU reflects a willingness to incur significant economic costs in exchange for an increase in political sovereignty. The UK should do everything possible to avoid new trade costs with the EU and to promote integration with countries outside the EU. These efforts will help mitigate the economic costs of Brexit, but will not be sufficient to overturn its negative effects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2901&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2899&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__content&quot; data-dcnode-id=&quot;2834&quot; id=&quot;pirs12345-sec-0013&quot;&gt;&lt;span data-dcnode-id=&quot;2898&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;article-section__title section__title section1&quot; data-dcnode-id=&quot;2896&quot; id=&quot;pirs12345-sec-0013-title&quot;&gt;&lt;span data-dcnode-id=&quot;2897&quot; instrument_node=&quot;&quot;&gt;6 CONCLUSION: STRATEGIES FOR TRADE NEGOTIATIONS&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2895&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2893&quot;&gt;&lt;span data-dcnode-id=&quot;2894&quot; instrument_node=&quot;&quot;&gt;What strategies should the UK government adopt to secure the best possible outcome from its future trade negotiations?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2892&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2882&quot;&gt;&lt;span data-dcnode-id=&quot;2891&quot; instrument_node=&quot;&quot;&gt;Trade negotiations are a bargaining game between countries with conflicting objectives. While both parties can gain from a successful trade agreement, the source of conflict is that each country's share of the gains is zero sum. That is, each country wants to achieve its goals while giving up as little as possible of the total gains to its negotiating partners. Dhingra, Ottaviano, and Sampson (&lt;/span&gt;&lt;span data-dcnode-id=&quot;2888&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;2889&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0020&quot; id=&quot;pirs12345-bib-0020R&quot;&gt;&lt;span data-dcnode-id=&quot;2890&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2887&quot; instrument_node=&quot;&quot;&gt;) review the rationale for trade agreements and how this shapes the nature of trade negotiations (see also Evenett, &lt;/span&gt;&lt;span data-dcnode-id=&quot;2884&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;2885&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0023&quot; id=&quot;pirs12345-bib-0023R&quot;&gt;&lt;span data-dcnode-id=&quot;2886&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2883&quot; instrument_node=&quot;&quot;&gt;). They suggest four principles the UK should adopt in its negotiations with the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2881&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;2873&quot; id=&quot;pirs12345-sec-0014&quot;&gt;&lt;span data-dcnode-id=&quot;2880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;2878&quot; id=&quot;pirs12345-sec-0014-title&quot;&gt;&lt;span data-dcnode-id=&quot;2879&quot; instrument_node=&quot;&quot;&gt;6.1 You get what you give, so be willing to make concessions&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2877&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2875&quot;&gt;&lt;span data-dcnode-id=&quot;2876&quot; instrument_node=&quot;&quot;&gt;In order to achieve its objectives, the UK must be willing to make concessions. In general, the more countries concede and the more policy control they give up, the bigger are the potential gains from reaching an agreement. For example, bigger tariff cuts generally increase the benefits of a trade agreement, but also require countries to give up more control over future tariff levels. An important question the UK faces is what it is willing to give up in return for the EU allowing UK services firms to participate in the Single Market. Unless the UK makes a sufficiently attractive offer, UK services exporters will face new trade restrictions once the UK leaves the Single Market.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2874&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2872&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;2864&quot; id=&quot;pirs12345-sec-0015&quot;&gt;&lt;span data-dcnode-id=&quot;2871&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;2869&quot; id=&quot;pirs12345-sec-0015-title&quot;&gt;&lt;span data-dcnode-id=&quot;2870&quot; instrument_node=&quot;&quot;&gt;6.2 Where negotiations start from matters, so define the options&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2868&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2866&quot;&gt;&lt;span data-dcnode-id=&quot;2867&quot; instrument_node=&quot;&quot;&gt;The outcome of any bargaining game depends upon the fall-back option that participants obtain if negotiations fail. The fall-back option determines the potential surplus from an agreement, which is what parties bargain over during the negotiation process. Hence, the fall-back option affects the outcome of negotiations. Trade agreements are no exception to this general insight. Before any negotiations between the UK and the EU can make constructive progress, there needs to be a common understanding of what happens if negotiations fail. The UK needs a well-defined fall-back option in order to achieve its post-Brexit objectives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2865&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2863&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;2848&quot; id=&quot;pirs12345-sec-0016&quot;&gt;&lt;span data-dcnode-id=&quot;2862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;2860&quot; id=&quot;pirs12345-sec-0016-title&quot;&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt;6.3 Bargain from a position of power&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2859&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2853&quot;&gt;&lt;span data-dcnode-id=&quot;2858&quot; instrument_node=&quot;&quot;&gt;In principle, trade negotiations are supposed to involve countries making reciprocal concessions of equivalent value. In practice, this is not always the case. It is often difficult to determine the value of a concession and countries that bargain poorly will get a worse deal. Consequently, bargaining power affects the outcome of trade negotiations. Countries that are desperate to obtain a deal at any cost have little bargaining power and are less likely to achieve their objectives. The relative importance of EU demand to UK GDP is 6.1 times greater than the importance of UK demand to EU GDP (Los et al., &lt;/span&gt;&lt;span data-dcnode-id=&quot;2855&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;2856&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0041&quot; id=&quot;pirs12345-bib-0041R&quot;&gt;&lt;span data-dcnode-id=&quot;2857&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2854&quot; instrument_node=&quot;&quot;&gt;), and because UK-EU trade accounts for a much larger share of the UK's economy than the EU's economy, the UK needs a deal more than the EU does. This puts the UK at a disadvantage. The weakness of the UK's position is further exacerbated by the two year time limit on exit negotiations imposed by Article 50, which provides insufficient time for a new trade deal to be negotiated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2850&quot;&gt;&lt;span data-dcnode-id=&quot;2851&quot; instrument_node=&quot;&quot;&gt;One step the UK should take to improve its bargaining position is to prioritize agreeing a transition arrangement to govern UK-EU trade relations for as long as necessary between when the UK leaves the EU and when a longer term agreement is concluded. Remaining part of the Single Market offers the greatest chance of maintaining economic stability during the transition period. Returning to the principle that you only get what you give, the UK needs to decide what it is willing to offer the EU in return for a transition agreement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2849&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2847&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;2836&quot; id=&quot;pirs12345-sec-0017&quot;&gt;&lt;span data-dcnode-id=&quot;2846&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;2844&quot; id=&quot;pirs12345-sec-0017-title&quot;&gt;&lt;span data-dcnode-id=&quot;2845&quot; instrument_node=&quot;&quot;&gt;6.4 Invest in negotiating capacity&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2843&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2841&quot;&gt;&lt;span data-dcnode-id=&quot;2842&quot; instrument_node=&quot;&quot;&gt;Trade agreements are complex. Smart negotiators use this to their advantage by ensuring they are better informed than their counterparts. Having not participated in trade negotiations for the past forty years, the UK currently has very little negotiating capacity. To become a smart negotiator, the UK needs to invest heavily in four areas of expertise: trade lawyers to undertake negotiations; diplomats to analyse the objectives and strategies of its negotiating partners; links with UK businesses to understand how they will be affected by proposed agreements, and economic expertise to study the consequences of trade policy changes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2838&quot;&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt;Brexit will not be easy. And even under optimistic assumptions it is likely to make the UK poorer than it otherwise would have been. But how much poorer will depend on the choices the UK makes over the next decade as it renegotiates its relationships with the EU and the rest of the world. Whatever future the UK decides it wants, applying these four principles will help the UK government to achieve its objectives and, hopefully, to make the best of a bad situation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2837&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;ul class=&quot;custom-style-list noteList&quot; data-dcnode-id=&quot;786&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;829&quot; id=&quot;pirs12345-note-0001&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;835&quot;&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;1 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;See Dhingra, Huang, Ottaviano, Pessoa, Sampson, and Van Reenen (&lt;/span&gt;&lt;span data-dcnode-id=&quot;831&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;832&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0019&quot; id=&quot;pirs12345-bib-0019R&quot;&gt;&lt;span data-dcnode-id=&quot;833&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;830&quot; instrument_node=&quot;&quot;&gt;) for an updated analysis.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;822&quot; id=&quot;pirs12345-note-0002&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;826&quot;&gt;&lt;span data-dcnode-id=&quot;827&quot; instrument_node=&quot;&quot;&gt;2 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;See: &lt;/span&gt;&lt;a class=&quot;linkBehavior&quot; data-dcnode-id=&quot;823&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cep.lse.ac.uk/BREXIT&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;http://cep.lse.ac.uk/BREXIT&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;806&quot; id=&quot;pirs12345-note-0003&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;819&quot;&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;3 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;818&quot; instrument_node=&quot;&quot;&gt;In particular, in the optimistic case Dhingra et al. (&lt;/span&gt;&lt;span data-dcnode-id=&quot;815&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;816&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0021&quot; id=&quot;pirs12345-bib-0021R&quot;&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;) assume that: (i) there are no tariffs between the UK and EU; (ii) non-tariff barriers increase by one-quarter of the reducible non-tariff barriers on US-EU trade; (iii) intra-EU trade costs fall by 20% faster than in the rest of the world for ten years after Brexit; and (iv) the UK's &lt;/span&gt;&lt;i data-dcnode-id=&quot;812&quot;&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt; contribution to the EU budget is equal to Norway's contribution. In the pessimistic case they assume instead that: (i) the EU's MFN tariffs are imposed on UK-EU trade; (ii) non-tariff barriers increase by three-quarters of the reducible non-tariff barriers on US-EU trade; (iii) intra-EU trade costs continue to fall by 40% faster than in the rest of the world for ten years after Brexit; and (iv) the UK makes no budget payments to the EU. Their analysis does not consider the possible effects of Brexit on trade relations with non-EU countries. In a recent paper, Brakman et al. (&lt;/span&gt;&lt;span data-dcnode-id=&quot;808&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;809&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0010&quot; id=&quot;pirs12345-bib-0010R&quot;&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;) conclude that only a trade agreement with the EU can compensate for the negative trade consequences of Brexit.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;801&quot; id=&quot;pirs12345-note-0004&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;803&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;4 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;We note that the depreciation of the pound following the Brexit referendum reflects expansionary monetary policy by the Bank of England in the aftermath of the EU referendum as well as the expected negative effect of Brexit on the UK economy. In this respect, it is a signal of the decreased overall future value of UK economic activity and, while it may increase foreign-demand for those UK exports that do not rely on imported inputs (by lowering prices in foreign currencies), the depreciation is also a sign that Brexit has caused currency markets to downgrade their expectations of the UK's future economic performance.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;
