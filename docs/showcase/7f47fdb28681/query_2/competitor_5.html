&lt;/span&gt;&lt;p data-dcnode-id=&quot;4754&quot;&gt;&lt;span data-dcnode-id=&quot;4755&quot; instrument_node=&quot;&quot;&gt;Leaving the EU will reshape the UK's economic relations with the rest of the world. This paper summarizes the findings of recent research studying the UK's role in the global economy, and the consequences of Brexit for UK trade, investment, and living standards. We emphasize that international integration affects investment and labour flows as well as trade in goods and services. There are important interdependencies between different forms of integration that should be accounted for when evaluating policy changes. Brexit is likely to make the UK poorer by reducing trade and investment flows, but the magnitude of the economic decline will depend upon the nature of the UK's post-Brexit economic relations with the EU and the rest of the world. We conclude by considering options for UK-EU relations after Brexit and how the UK should approach future trade negotiations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4753&quot; instrument_node=&quot;&quot;&gt;

l Reino Unido y la UE y cómo debería el Reino Unido abordar las futuras negociaciones sobre comercio.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4717&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4694&quot;&gt;&lt;span data-dcnode-id=&quot;4695&quot; instrument_node=&quot;&quot;&gt;EU離脱は、イギリスが諸外国との経済関係を再構築するということを意味する。本稿では、イギリスの世界経済における役割に関する最近の研究の知見、ブレグジッド(Brexit:イギリスのEU離脱)がイギリスの貿易、投資、生活水準にもたらした影響を要約する。我々は、国際統合が、投資、労働力フロー、そして物品およびサービス取引に影響することを強調する。政策転換の評価を行う際に考慮に入れるべき、異なる統合形式間の大きな相互依存性が存在する。ブレグジッドは取引と投資フローを減少させイギリスをより貧しくする可能性が高いが、経済の衰退の規模は、ブレグジッド後のEUとその他の諸外国との経済関係の性質に依存すると考えられる。最後にブレグジッド後のイギリスとEUの関係として考えられる選択肢と、イギリスが今後の貿易交渉にどのようなアプローチをとるべきか考察する。&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4689&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4687&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;pb-dropzone&quot; data-dcnode-id=&quot;4685&quot; data-pb-dropzone=&quot;below-abstract-group&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section article-section__full&quot; data-dcnode-id=&quot;840&quot;&gt;&lt;span data-dcnode-id=&quot;4683&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__content&quot; data-dcnode-id=&quot;4640&quot; id=&quot;pirs12345-sec-0002&quot;&gt;&lt;span data-dcnode-id=&quot;4682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;article-section__title section__title section1&quot; data-dcnode-id=&quot;4680&quot; id=&quot;pirs12345-sec-0002-title&quot;&gt;&lt;span data-dcnode-id=&quot;4681&quot; instrument_node=&quot;&quot;&gt;1 INTRODUCTION&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;4679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4677&quot;&gt;&lt;span data-dcnode-id=&quot;4678&quot; instrument_node=&quot;&quot;&gt;The UK's participation in global markets has increasingly come to be based on its relatively abundant skilled labour, its business-friendly rule of law, and its geography. These characteristics dictate its pattern of comparative advantage in the trade of goods and services. Importantly, the same characteristics also dictate the direction and nature of the UK's foreign direct investment (FDI) flows.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4670&quot;&gt;&lt;span data-dcnode-id=&quot;4675&quot; instrument_node=&quot;&quot;&gt;Since the UK is a relatively small economy, it requires access to both export and import markets to realize an efficient scale of production and to access many of the inputs used by UK producers. One important reason why trade and FDI are interrelated is the prominent role of global value chains in the UK's economy. The UK is a net exporter of services (financial, IT and media) and sophisticated goods (pharmaceuticals and cars), but these exports are made possible, in large part, by using imported capital, inputs and technical know-how. Indeed, financial services, and IT and communications attracted the largest net FDI flows into the UK in 2015, and, together, accounted for 39% of the UK's stock of FDI, while manufacturing made up a further 17% (ONS, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4672&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4673&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0043&quot; id=&quot;pirs12345-bib-0043R&quot;&gt;&lt;span data-dcnode-id=&quot;4674&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4671&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4669&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4663&quot;&gt;&lt;span data-dcnode-id=&quot;4668&quot; instrument_node=&quot;&quot;&gt;Europe's geographical location and economic size make it the UK's natural trading partner. Because of this, FDI in the UK is often motivated by the ease of selling to the high-income and nearby consumers in the rest of the EU. The importance of geographic factors, such as the distance between countries, for international flows is one of the most well established empirical facts about the global economy (Anderson, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4665&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4666&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0003&quot; id=&quot;pirs12345-bib-0003R&quot;&gt;&lt;span data-dcnode-id=&quot;4667&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4664&quot; instrument_node=&quot;&quot;&gt;). Consequently, new trade agreements with countries outside the EU offer fewer opportunities for the UK to benefit from trade in goods, services, investment and people than the UK's current trade arrangements.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4662&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4660&quot;&gt;&lt;span data-dcnode-id=&quot;4661&quot; instrument_node=&quot;&quot;&gt;In this paper, we discuss the impact Brexit will have on the UK economy. Starting from the premise that Brexit will reduce economic integration between the UK and the EU, we describe how reduced integration will lead to higher trade barriers and lower trade volumes. We present evidence from recent research showing that lower trade volumes will reduce living standards in the UK, and that this reduction will be evenly distributed across households at all income levels.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4659&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4642&quot;&gt;&lt;span data-dcnode-id=&quot;4658&quot; instrument_node=&quot;&quot;&gt;The paper starts by reviewing the canonical conceptual framework used in the economics literature to analyse welfare gains and losses from international trade (&lt;/span&gt;&lt;a class=&quot;sectionLink scrollableLink&quot; data-dcnode-id=&quot;4656&quot; href=&quot;#pirs12345-sec-0003&quot;&gt;&lt;span data-dcnode-id=&quot;4657&quot; instrument_node=&quot;&quot;&gt;Section 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4655&quot; instrument_node=&quot;&quot;&gt;). Next, we discuss evidence on how Brexit is likely to affect the UK's trade (&lt;/span&gt;&lt;a class=&quot;sectionLink scrollableLink&quot; data-dcnode-id=&quot;4653&quot; href=&quot;#pirs12345-sec-0006&quot;&gt;&lt;span data-dcnode-id=&quot;4654&quot; instrument_node=&quot;&quot;&gt;Section 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4652&quot; instrument_node=&quot;&quot;&gt;) and FDI flows (&lt;/span&gt;&lt;a class=&quot;sectionLink scrollableLink&quot; data-dcnode-id=&quot;4650&quot; href=&quot;#pirs12345-sec-0009&quot;&gt;&lt;span data-dcnode-id=&quot;4651&quot; instrument_node=&quot;&quot;&gt;Section 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4649&quot; instrument_node=&quot;&quot;&gt;), together with estimates of the implications of these changes for the level and distribution of income. We then turn to policy recommendations aimed at dampening the negative consequences of Brexit, discussing first the policy options (&lt;/span&gt;&lt;a class=&quot;sectionLink scrollableLink&quot; data-dcnode-id=&quot;4647&quot; href=&quot;#pirs12345-sec-0012&quot;&gt;&lt;span data-dcnode-id=&quot;4648&quot; instrument_node=&quot;&quot;&gt;Section 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4646&quot; instrument_node=&quot;&quot;&gt;) and then concluding by suggesting how the UK government should approach its trade negotiations with the EU (&lt;/span&gt;&lt;a class=&quot;sectionLink scrollableLink&quot; data-dcnode-id=&quot;4644&quot; href=&quot;#pirs12345-sec-0013&quot;&gt;&lt;span data-dcnode-id=&quot;4645&quot; instrument_node=&quot;&quot;&gt;Section 6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4643&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4641&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__content&quot; data-dcnode-id=&quot;4380&quot; id=&quot;pirs12345-sec-0003&quot;&gt;&lt;span data-dcnode-id=&quot;4638&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;article-section__title section__title section1&quot; data-dcnode-id=&quot;4636&quot; id=&quot;pirs12345-sec-0003-title&quot;&gt;&lt;span data-dcnode-id=&quot;4637&quot; instrument_node=&quot;&quot;&gt;2 GAINS AND LOSSES FROM TRADE&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;4635&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4633&quot;&gt;&lt;span data-dcnode-id=&quot;4634&quot; instrument_node=&quot;&quot;&gt;International openness affects both aggregate income (“efficiency”) and its distribution across different types of individuals (“equity”). Theories of international integration usually conclude that the effects of increasing and decreasing economic openness are equal, but opposite. However, the vast majority of empirical work that quantifies efficiency and equity effects draws from episodes of opening up to greater international integration, mostly in the form of reductions in tariffs. This section reviews the literature on the consequences of trade openness. Later in the paper, we will apply this literature to analyse the effects of a reduction in openness—the relevant case for understanding Brexit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;4494&quot; id=&quot;pirs12345-sec-0004&quot;&gt;&lt;span data-dcnode-id=&quot;4631&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;4629&quot; id=&quot;pirs12345-sec-0004-title&quot;&gt;&lt;span data-dcnode-id=&quot;4630&quot; instrument_node=&quot;&quot;&gt;2.1 Efficiency&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4628&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4606&quot;&gt;&lt;span data-dcnode-id=&quot;4627&quot; instrument_node=&quot;&quot;&gt;There is a broad consensus among academic economists that trade creates opportunities that raise overall output, making the world as a whole better off. These gains materialize through many different channels. Some of the most important are the following. More trade allows countries to specialize in industries where they have a comparative advantage increasing the efficiency of production (Ohlin, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4624&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4625&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0044&quot; id=&quot;pirs12345-bib-0044R&quot;&gt;&lt;span data-dcnode-id=&quot;4626&quot; instrument_node=&quot;&quot;&gt;1933&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4623&quot; instrument_node=&quot;&quot;&gt;; Ricardo, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4620&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4621&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0050&quot; id=&quot;pirs12345-bib-0050R&quot;&gt;&lt;span data-dcnode-id=&quot;4622&quot; instrument_node=&quot;&quot;&gt;1817&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4619&quot; instrument_node=&quot;&quot;&gt;). Trade enables countries to import and consume goods that are not produced domestically (Krugman, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4616&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4617&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0039&quot; id=&quot;pirs12345-bib-0039R&quot;&gt;&lt;span data-dcnode-id=&quot;4618&quot; instrument_node=&quot;&quot;&gt;1979&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4615&quot; instrument_node=&quot;&quot;&gt;). Lower trade barriers increase competition between firms in different countries leading to lower prices for consumers (Krugman, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4612&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4613&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0039&quot; id=&quot;pirs12345-bib-0039R&quot;&gt;&lt;span data-dcnode-id=&quot;4614&quot; instrument_node=&quot;&quot;&gt;1979&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4611&quot; instrument_node=&quot;&quot;&gt;). Increased trade raises productivity by causing more productive firms to expand while less productive firms contract (Melitz, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4608&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4609&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0042&quot; id=&quot;pirs12345-bib-0042R&quot;&gt;&lt;span data-dcnode-id=&quot;4610&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4607&quot; instrument_node=&quot;&quot;&gt;). Larger markets allow firms to produce more and take advantage of economies of scale to lower production costs and prices. Greater integration also reduces the cost of knowledge transfer across countries helping to raise productivity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;paragraph-element&quot; data-dcnode-id=&quot;4591&quot;&gt;&lt;span data-dcnode-id=&quot;4604&quot; instrument_node=&quot;&quot;&gt;Quantifying the size of the aggregate economic benefits of trade is a difficult challenge. Nonetheless, recent work by Arkolakis, Costinot, and Rodríguez-Clare (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4601&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4602&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0004&quot; id=&quot;pirs12345-bib-0004R&quot;&gt;&lt;span data-dcnode-id=&quot;4603&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4600&quot; instrument_node=&quot;&quot;&gt;) has shown that in many of the canonical models of trade there is a simple way to express the relationship between trade flows and income: The percentage change in income &lt;/span&gt;&lt;i data-dcnode-id=&quot;4598&quot;&gt;&lt;span data-dcnode-id=&quot;4599&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4597&quot; instrument_node=&quot;&quot;&gt; from a change in the volume of trade can be summarized in the following expression:

               &lt;/span&gt;&lt;div class=&quot;inline-equation&quot; data-dcnode-id=&quot;4593&quot; id=&quot;pirs12345-disp-0001&quot;&gt;&lt;span class=&quot;inline-equation__construct figure&quot; data-dcnode-id=&quot;4595&quot;&gt;&lt;img alt=&quot;urn:x-wiley:10568190:media:pirs12345:pirs12345-math-0001&quot; class=&quot;&quot; data-dcnode-id=&quot;4596&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//rsaiconnect.onlinelibrary.wiley.com/cms/asset/4bc28561-2708-4654-af8a-984606e543d3/pirs12345-math-0001.png&amp;amp;raw&quot;&gt;&lt;/span&gt;&lt;span class=&quot;inline-equation__label&quot; data-dcnode-id=&quot;4594&quot;&gt;&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4582&quot;&gt;&lt;span data-dcnode-id=&quot;4589&quot; instrument_node=&quot;&quot;&gt;In this formula the import penetration ratio is the ratio of a country's total imports to its total demand. When a country trades more its import penetration ratio is higher. The parameter &lt;/span&gt;&lt;i data-dcnode-id=&quot;4587&quot;&gt;&lt;span data-dcnode-id=&quot;4588&quot; instrument_node=&quot;&quot;&gt;Z&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4586&quot; instrument_node=&quot;&quot;&gt; is known as the trade elasticity and is defined as the percentage increase in trade when trade costs fall by 1%, that is, &lt;/span&gt;&lt;i data-dcnode-id=&quot;4584&quot;&gt;&lt;span data-dcnode-id=&quot;4585&quot; instrument_node=&quot;&quot;&gt;Z&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4583&quot; instrument_node=&quot;&quot;&gt; is large when small changes in trade costs cause big changes in trade.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4543&quot;&gt;&lt;span data-dcnode-id=&quot;4580&quot; instrument_node=&quot;&quot;&gt;The formula shows that a rise in the import penetration ratio, due to lower trade costs, increases income &lt;/span&gt;&lt;i data-dcnode-id=&quot;4578&quot;&gt;&lt;span data-dcnode-id=&quot;4579&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4577&quot; instrument_node=&quot;&quot;&gt;. But the size of this effect depends on the trade elasticity Z. The smaller is Z, the greater the increase in income &lt;/span&gt;&lt;i data-dcnode-id=&quot;4575&quot;&gt;&lt;span data-dcnode-id=&quot;4576&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4574&quot; instrument_node=&quot;&quot;&gt; for any given rise in the import penetration ratio. The gains-from-trade formula captures the idea that there are aggregate gains from trade. But this formula is too simple to incorporate all the channels through which trade affects income &lt;/span&gt;&lt;i data-dcnode-id=&quot;4572&quot;&gt;&lt;span data-dcnode-id=&quot;4573&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4571&quot; instrument_node=&quot;&quot;&gt;, implying that it is likely to underestimate the gains from trade. Accounting for differences across industries in the trade elasticity and allowing for trade in intermediate inputs magnifies the gains from trade (Costinot &amp;amp; Rodriguez-Clare, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4568&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4569&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0017&quot; id=&quot;pirs12345-bib-0017R&quot;&gt;&lt;span data-dcnode-id=&quot;4570&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4567&quot; instrument_node=&quot;&quot;&gt;; Ossa, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4564&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4565&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0045&quot; id=&quot;pirs12345-bib-0045R&quot;&gt;&lt;span data-dcnode-id=&quot;4566&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4563&quot; instrument_node=&quot;&quot;&gt;). State-of-the-art quantitative trade models, such as that used by Dhingra, Ottaviano, Sampson, and Van Reenen (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4560&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4561&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0021&quot; id=&quot;pirs12345-bib-0021R&quot;&gt;&lt;span data-dcnode-id=&quot;4562&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4559&quot; instrument_node=&quot;&quot;&gt;) to estimate the consequences of Brexit for the UK economy, include these additional channels and find bigger gains from trade than a naïve application of the gains from trade formula would predict.
&lt;/span&gt;&lt;a aria-controls=&quot;pirs12345-note-0001_note_0&quot; aria-expanded=&quot;false&quot; aria-haspopup=&quot;false&quot; aria-label=&quot;Note 1&quot; class=&quot;noteLink scrollableLink&quot; data-dcnode-id=&quot;4557&quot; href=&quot;#pirs12345-note-0001_note_0&quot; id=&quot;pirs12345-note-0001_note_0-controller&quot; title=&quot;Link to note&quot;&gt;&lt;span data-dcnode-id=&quot;4558&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span aria-labelledby=&quot;pirs12345-note-0001_note_0-controller&quot; class=&quot;footNotePopup&quot; data-dcnode-id=&quot;4545&quot; id=&quot;pirs12345-note-0001_note_0&quot; style=&quot;display: none;&quot;&gt;&lt;button class=&quot;footNoteClose&quot; data-dcnode-id=&quot;4555&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;icon-tools_close&quot; data-dcnode-id=&quot;4556&quot;&gt;&lt;/i&gt;&lt;/button&gt;&lt;span data-dcnode-id=&quot;4547&quot; id=&quot;pirs12345-note-0001&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;4553&quot;&gt;&lt;span data-dcnode-id=&quot;4554&quot; instrument_node=&quot;&quot;&gt;1 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4552&quot; instrument_node=&quot;&quot;&gt;See Dhingra, Huang, Ottaviano, Pessoa, Sampson, and Van Reenen (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4549&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4550&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0019&quot; id=&quot;pirs12345-bib-0019R&quot;&gt;&lt;span data-dcnode-id=&quot;4551&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4548&quot; instrument_node=&quot;&quot;&gt;) for an updated analysis.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;chevronDown&quot; data-dcnode-id=&quot;4546&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4544&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4542&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4524&quot;&gt;&lt;span data-dcnode-id=&quot;4541&quot; instrument_node=&quot;&quot;&gt;An important limitation of quantitative trade models is the assumption that trade does not change the set of technologies available for production. There is, however, empirical evidence that trade can stimulate technology investment by increasing competition between firms and facilitating international knowledge diffusion leading to dynamic productivity gains (Bustos, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4538&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4539&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0015&quot; id=&quot;pirs12345-bib-0015R&quot;&gt;&lt;span data-dcnode-id=&quot;4540&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4537&quot; instrument_node=&quot;&quot;&gt;; Grossman &amp;amp; Helpman, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4534&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4535&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0031&quot; id=&quot;pirs12345-bib-0031R&quot;&gt;&lt;span data-dcnode-id=&quot;4536&quot; instrument_node=&quot;&quot;&gt;1991&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4533&quot; instrument_node=&quot;&quot;&gt;). There is considerable uncertainty over the size of these dynamic gains, but recent theoretical work suggests that dynamic effects may double or treble the gains from trade compared to those estimated by static quantitative trade models (Bloom, Romer, Terry, &amp;amp; Van Reenen, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4530&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4531&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0009&quot; id=&quot;pirs12345-bib-0009R&quot;&gt;&lt;span data-dcnode-id=&quot;4532&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4529&quot; instrument_node=&quot;&quot;&gt;; Sampson, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4526&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4527&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0052&quot; id=&quot;pirs12345-bib-0052R&quot;&gt;&lt;span data-dcnode-id=&quot;4528&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4525&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4523&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4518&quot;&gt;&lt;span data-dcnode-id=&quot;4522&quot; instrument_node=&quot;&quot;&gt;An alternative way to estimate the gains from trade is to analyse the impact of specific changes in trade costs on income levels. Such studies estimate the sum of the static and dynamic gains from trade. The challenge here is in identifying the causal effect of trade on income &lt;/span&gt;&lt;i data-dcnode-id=&quot;4520&quot;&gt;&lt;span data-dcnode-id=&quot;4521&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4519&quot; instrument_node=&quot;&quot;&gt;. Trade policy is correlated with many other potential determinants of income, and richer countries mostly choose more open trade regimes. Thus, the estimates need to isolate the effect of trade from these confounding forces.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4496&quot;&gt;&lt;span data-dcnode-id=&quot;4516&quot; instrument_node=&quot;&quot;&gt;Building upon the observation that trade flows are decreasing in the distance between countries, Frankel and Romer (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4513&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4514&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0028&quot; id=&quot;pirs12345-bib-0028R&quot;&gt;&lt;span data-dcnode-id=&quot;4515&quot; instrument_node=&quot;&quot;&gt;1999&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4512&quot; instrument_node=&quot;&quot;&gt;) use variation in countries’ proximity to their trading partners to isolate plausibly exogenous variation in openness to trade. Feyrer (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4509&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4510&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0026&quot; id=&quot;pirs12345-bib-0026R&quot;&gt;&lt;span data-dcnode-id=&quot;4511&quot; instrument_node=&quot;&quot;&gt;2009a&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4508&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4505&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4506&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0027&quot; id=&quot;pirs12345-bib-0027R&quot;&gt;&lt;span data-dcnode-id=&quot;4507&quot; instrument_node=&quot;&quot;&gt;2009b&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4504&quot; instrument_node=&quot;&quot;&gt;) uses changes in transport costs caused by the introduction of air freight and the closure of the Suez Canal as exogenous shocks to trade. These papers find larger gains from trade than those estimated by quantitative trade models, confirming that the dynamic gains from trade are indeed quantitatively important (Harrison &amp;amp; Rodriguez-Clare, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4501&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4502&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0033&quot; id=&quot;pirs12345-bib-0033R&quot;&gt;&lt;span data-dcnode-id=&quot;4503&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4500&quot; instrument_node=&quot;&quot;&gt;, review the empirical findings from this approach). Feyrer's results imply a 1% increase in trade raises income &lt;/span&gt;&lt;i data-dcnode-id=&quot;4498&quot;&gt;&lt;span data-dcnode-id=&quot;4499&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4497&quot; instrument_node=&quot;&quot;&gt; by between 0.25% and 0.75%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4495&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4493&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;4382&quot; id=&quot;pirs12345-sec-0005&quot;&gt;&lt;span data-dcnode-id=&quot;4492&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;4490&quot; id=&quot;pirs12345-sec-0005-title&quot;&gt;&lt;span data-dcnode-id=&quot;4491&quot; instrument_node=&quot;&quot;&gt;2.2 Equity&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4489&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4487&quot;&gt;&lt;span data-dcnode-id=&quot;4488&quot; instrument_node=&quot;&quot;&gt;The fact that trade generates aggregate economic gains does not mean it necessarily makes everyone better off. Some relatively unproductive firms and industries may suffer from competition with foreign producers, potentially making their workers and owners worse off. Since the late 1970s inequality has increased in many countries, while over the same period international trade has grown rapidly. This has stimulated a large body of research looking at whether trade has contributed to rising inequality.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4486&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4480&quot;&gt;&lt;span data-dcnode-id=&quot;4485&quot; instrument_node=&quot;&quot;&gt;Traditionally, economists mainly analysed the effects of trade on inequality using the Stolper-Samuelson theorem (Stolper &amp;amp; Samuelson, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4482&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4483&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0053&quot; id=&quot;pirs12345-bib-0053R&quot;&gt;&lt;span data-dcnode-id=&quot;4484&quot; instrument_node=&quot;&quot;&gt;1941&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4481&quot; instrument_node=&quot;&quot;&gt;). This theorem predicts that trade integration will increase the wage gap between skilled and unskilled workers in skill abundant developed economies, while reducing wage inequality in developing countries where skilled labour is relatively scarce. This is because, in an open economy, the relative wages of skilled to unskilled workers in each country adjust to reflect their global, rather than domestic, relative supply.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4465&quot;&gt;&lt;span data-dcnode-id=&quot;4478&quot; instrument_node=&quot;&quot;&gt;However, empirical work studying the causes of rising wage inequality in the US and many other countries has found little evidence of Stolper-Samuelson effects. While trade has been found to have a small positive effect on the wage premium to a college education in the US during the 1970s, it is unable to explain the increased college wage premium in the 1980s (Leamer, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4475&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4476&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0040&quot; id=&quot;pirs12345-bib-0040R&quot;&gt;&lt;span data-dcnode-id=&quot;4477&quot; instrument_node=&quot;&quot;&gt;1998&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4474&quot; instrument_node=&quot;&quot;&gt;). Moreover, trade liberalisation has been accompanied by increases in inequality in both developed and developing countries (Goldberg &amp;amp; Pavcnik, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4471&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4472&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0029&quot; id=&quot;pirs12345-bib-0029R&quot;&gt;&lt;span data-dcnode-id=&quot;4473&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4470&quot; instrument_node=&quot;&quot;&gt;). And the increased demand for skilled labour that has led to increased inequality within countries has occurred primarily within industries, whereas Stolper-Samuelson effects are driven by between industry changes (Bekman, Bound, &amp;amp; Machin, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4467&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4468&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0007&quot; id=&quot;pirs12345-bib-0007R&quot;&gt;&lt;span data-dcnode-id=&quot;4469&quot; instrument_node=&quot;&quot;&gt;1998&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4466&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4418&quot;&gt;&lt;span data-dcnode-id=&quot;4463&quot; instrument_node=&quot;&quot;&gt;The empirical failings of the Stolper-Samuelson theorem have led to a burgeoning literature that considers alternative channels through which trade may affect wage inequality. Many of these studies incorporate firm heterogeneity, motivated by the empirical fact that only a select few highly productive firms participate in international trade and, on average, these firms are more skill intensive and pay higher wages than domestically oriented firms (Bernard, Jensen, &amp;amp; Lawrence, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4460&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4461&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0008&quot; id=&quot;pirs12345-bib-0008R&quot;&gt;&lt;span data-dcnode-id=&quot;4462&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4459&quot; instrument_node=&quot;&quot;&gt;). Trade allows high-wage paying, exporting firms to expand and become more profitable, while causing lower-wage paying non-exporters to contract or shut down because of increased import competition (Melitz, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4456&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4457&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0042&quot; id=&quot;pirs12345-bib-0042R&quot;&gt;&lt;span data-dcnode-id=&quot;4458&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4455&quot; instrument_node=&quot;&quot;&gt;; Pavcnik, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4452&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4453&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0047&quot; id=&quot;pirs12345-bib-0047R&quot;&gt;&lt;span data-dcnode-id=&quot;4454&quot; instrument_node=&quot;&quot;&gt;2002&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4451&quot; instrument_node=&quot;&quot;&gt;; Trefler, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4448&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4449&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0054&quot; id=&quot;pirs12345-bib-0054R&quot;&gt;&lt;span data-dcnode-id=&quot;4450&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4447&quot; instrument_node=&quot;&quot;&gt;). These reallocation effects within an industry can increase the wage gap between firms in environments with labour market frictions or heterogeneous workers, leading to higher wage inequality (Egger &amp;amp; Kreickemeier, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4444&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4445&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0022&quot; id=&quot;pirs12345-bib-0022R&quot;&gt;&lt;span data-dcnode-id=&quot;4446&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4443&quot; instrument_node=&quot;&quot;&gt;; Helpman, Itskhoki, &amp;amp; Redding, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4440&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4441&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0036&quot; id=&quot;pirs12345-bib-0036R&quot;&gt;&lt;span data-dcnode-id=&quot;4442&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4439&quot; instrument_node=&quot;&quot;&gt;; Sampson, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4436&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4437&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0051&quot; id=&quot;pirs12345-bib-0051R&quot;&gt;&lt;span data-dcnode-id=&quot;4438&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4435&quot; instrument_node=&quot;&quot;&gt;; Yeaple, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4432&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4433&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0056&quot; id=&quot;pirs12345-bib-0056R&quot;&gt;&lt;span data-dcnode-id=&quot;4434&quot; instrument_node=&quot;&quot;&gt;2005&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4431&quot; instrument_node=&quot;&quot;&gt;). Firm-level evidence also supports the hypothesis that trade increases wage inequality between firms (Amiti &amp;amp; Davis, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4428&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4429&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0002&quot; id=&quot;pirs12345-bib-0002R&quot;&gt;&lt;span data-dcnode-id=&quot;4430&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4427&quot; instrument_node=&quot;&quot;&gt;; Helpman, Itskhoki, Muendler, &amp;amp; Redding, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4424&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4425&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0035&quot; id=&quot;pirs12345-bib-0035R&quot;&gt;&lt;span data-dcnode-id=&quot;4426&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4423&quot; instrument_node=&quot;&quot;&gt;; Verhoogen, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4420&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4421&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0055&quot; id=&quot;pirs12345-bib-0055R&quot;&gt;&lt;span data-dcnode-id=&quot;4422&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4419&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4417&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4395&quot;&gt;&lt;span data-dcnode-id=&quot;4416&quot; instrument_node=&quot;&quot;&gt;Other channels through which trade may increase wage inequality are the offshoring of tasks that employ less skilled workers to developing countries (Feenstra &amp;amp; Hanson, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4413&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4414&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0024&quot; id=&quot;pirs12345-bib-0024R&quot;&gt;&lt;span data-dcnode-id=&quot;4415&quot; instrument_node=&quot;&quot;&gt;1996&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4412&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4409&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4410&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0025&quot; id=&quot;pirs12345-bib-0025R&quot;&gt;&lt;span data-dcnode-id=&quot;4411&quot; instrument_node=&quot;&quot;&gt;1999&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4408&quot; instrument_node=&quot;&quot;&gt;) and trade in capital goods that are complementary to skilled labour (Burstein, Cravino, &amp;amp; Vogel, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4405&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4406&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0013&quot; id=&quot;pirs12345-bib-0013R&quot;&gt;&lt;span data-dcnode-id=&quot;4407&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4404&quot; instrument_node=&quot;&quot;&gt;; Parro, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4401&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4402&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0046&quot; id=&quot;pirs12345-bib-0046R&quot;&gt;&lt;span data-dcnode-id=&quot;4403&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4400&quot; instrument_node=&quot;&quot;&gt;). There is also growing evidence that trade has a negative impact on workers who live in regions that face rapid increases in import competition, such as areas of the US that are highly exposed to imports from China (Autor, Dorn, &amp;amp; Hansen, &lt;/span&gt;&lt;span data-dcnode-id=&quot;4397&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4398&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0101&quot; id=&quot;pirs12345-bib-0101R&quot;&gt;&lt;span data-dcnode-id=&quot;4399&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4396&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4384&quot;&gt;&lt;span data-dcnode-id=&quot;4393&quot; instrument_node=&quot;&quot;&gt;In sum, recent research that looks beyond the Stolper-Samuelson theorem has identified new channels through which trade may affect inequality. Helpman (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4390&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4391&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0100&quot; id=&quot;pirs12345-bib-0100R&quot;&gt;&lt;span data-dcnode-id=&quot;4392&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4389&quot; instrument_node=&quot;&quot;&gt;) reviews these studies and summarizes their findings, concluding that it is likely increased trade has contributed to recent increases in inequality within developed countries. However, the quantitative importance of this effect in the overall increase in inequality is still a matter of debate. Using a quantitative model of the global economy, Burstein and Vogel (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4386&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4387&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0014&quot; id=&quot;pirs12345-bib-0014R&quot;&gt;&lt;span data-dcnode-id=&quot;4388&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4385&quot; instrument_node=&quot;&quot;&gt;) estimate that, because of trade, the average skill premium across countries is 5.1% higher than it would have been in the absence of trade. This effect is important, but does not explain a large share of the observed increase in inequality since the 1970s.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4383&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4381&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__content&quot; data-dcnode-id=&quot;4242&quot; id=&quot;pirs12345-sec-0006&quot;&gt;&lt;span data-dcnode-id=&quot;4378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;article-section__title section__title section1&quot; data-dcnode-id=&quot;4376&quot; id=&quot;pirs12345-sec-0006-title&quot;&gt;&lt;span data-dcnode-id=&quot;4377&quot; instrument_node=&quot;&quot;&gt;3 UK INTERNATIONAL TRADE&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;4375&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4360&quot;&gt;&lt;span data-dcnode-id=&quot;4374&quot; instrument_node=&quot;&quot;&gt;The Centre for Economic Performance (CEP) has produced a series of Brexit Analysis briefings studying how Brexit may affect trade, FDI and immigration between the UK and the EU and quantifying the possible welfare effects of these changes.
&lt;/span&gt;&lt;a aria-controls=&quot;pirs12345-note-0002_note_1&quot; aria-expanded=&quot;false&quot; aria-haspopup=&quot;false&quot; aria-label=&quot;Note 2&quot; class=&quot;noteLink scrollableLink&quot; data-dcnode-id=&quot;4372&quot; href=&quot;#pirs12345-note-0002_note_1&quot; id=&quot;pirs12345-note-0002_note_1-controller&quot; title=&quot;Link to note&quot;&gt;&lt;span data-dcnode-id=&quot;4373&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span aria-labelledby=&quot;pirs12345-note-0002_note_1-controller&quot; class=&quot;footNotePopup&quot; data-dcnode-id=&quot;4362&quot; id=&quot;pirs12345-note-0002_note_1&quot; style=&quot;display: none;&quot;&gt;&lt;button class=&quot;footNoteClose&quot; data-dcnode-id=&quot;4370&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;icon-tools_close&quot; data-dcnode-id=&quot;4371&quot;&gt;&lt;/i&gt;&lt;/button&gt;&lt;span data-dcnode-id=&quot;4364&quot; id=&quot;pirs12345-note-0002&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;4368&quot;&gt;&lt;span data-dcnode-id=&quot;4369&quot; instrument_node=&quot;&quot;&gt;2 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4367&quot; instrument_node=&quot;&quot;&gt;See: &lt;/span&gt;&lt;a class=&quot;linkBehavior&quot; data-dcnode-id=&quot;4365&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cep.lse.ac.uk/BREXIT&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;4366&quot; instrument_node=&quot;&quot;&gt;http://cep.lse.ac.uk/BREXIT&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span class=&quot;chevronDown&quot; data-dcnode-id=&quot;4363&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4361&quot; instrument_node=&quot;&quot;&gt;  In this section we summarize the conclusions of these briefings regarding the impact of Brexit on UK trade and living standards.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4359&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;4288&quot; id=&quot;pirs12345-sec-0007&quot;&gt;&lt;span data-dcnode-id=&quot;4358&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;4356&quot; id=&quot;pirs12345-sec-0007-title&quot;&gt;&lt;span data-dcnode-id=&quot;4357&quot; instrument_node=&quot;&quot;&gt;3.1 Brexit, trade and aggregate welfare&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4353&quot;&gt;&lt;span data-dcnode-id=&quot;4354&quot; instrument_node=&quot;&quot;&gt;The EU's Single Market is not only characterized by tariff-free trade but also by the continuing reduction of non-tariff barriers. Reductions in trade barriers have increased trade between the UK and the EU. Prior to the UK joining the European Economic Community (EEC) in 1973, around one third of UK trade was with the EEC. In 2014, the 27 other EU members accounted for 45% of the UK's exports and 53% of UK imports. EU exports comprise 13% of UK national income.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4350&quot;&gt;&lt;span data-dcnode-id=&quot;4351&quot; instrument_node=&quot;&quot;&gt;Higher trade benefits UK consumers through lower prices and access to better goods and services. At the same time, the UK's workers and businesses benefit from new export opportunities that lead to higher sales and profits and allow the UK to specialize in industries in which it has a comparative advantage. Through these channels, increased trade raises output, incomes, and living standards in the UK.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4349&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4347&quot;&gt;&lt;span data-dcnode-id=&quot;4348&quot; instrument_node=&quot;&quot;&gt;The economic consequences of leaving the EU will depend on the policies the UK adopts following Brexit. But the CEP's analysis finds that lower trade due to reduced integration with EU countries is likely to cost the UK economy far more than is gained from lower contributions to the EU budget, regardless of what form Brexit takes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4346&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4307&quot;&gt;&lt;span data-dcnode-id=&quot;4345&quot; instrument_node=&quot;&quot;&gt;Using a quantitative trade model that builds upon Caliendo and Parro (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4342&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4343&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0016&quot; id=&quot;pirs12345-bib-0016R&quot;&gt;&lt;span data-dcnode-id=&quot;4344&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4341&quot; instrument_node=&quot;&quot;&gt;) and Costinot and Rodriguez-Clare (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4338&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4339&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0017&quot; id=&quot;pirs12345-bib-0017R&quot;&gt;&lt;span data-dcnode-id=&quot;4340&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4337&quot; instrument_node=&quot;&quot;&gt;), Dhingra et al. (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4334&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4335&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0021&quot; id=&quot;pirs12345-bib-0021R&quot;&gt;&lt;span data-dcnode-id=&quot;4336&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4333&quot; instrument_node=&quot;&quot;&gt;) estimate the effects of Brexit on trade and the UK's contribution to the EU budget would be equivalent to a permanent fall in income &lt;/span&gt;&lt;i data-dcnode-id=&quot;4331&quot;&gt;&lt;span data-dcnode-id=&quot;4332&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4330&quot; instrument_node=&quot;&quot;&gt; of between 1.3% and 2.6% (£850 to £1,700 per household per year). The lower estimate of 1.3% corresponds to an optimistic ‘soft Brexit’ case where the UK remains part of the Single Market following Brexit. The larger estimate of 2.6% is for a pessimistic ‘hard Brexit’ case where the UK and the EU do not agree a new trade deal and revert to trading under World Trade Organization (WTO) terms.
&lt;/span&gt;&lt;a aria-controls=&quot;pirs12345-note-0003_note_2&quot; aria-expanded=&quot;false&quot; aria-haspopup=&quot;false&quot; aria-label=&quot;Note 3&quot; class=&quot;noteLink scrollableLink&quot; data-dcnode-id=&quot;4328&quot; href=&quot;#pirs12345-note-0003_note_2&quot; id=&quot;pirs12345-note-0003_note_2-controller&quot; title=&quot;Link to note&quot;&gt;&lt;span data-dcnode-id=&quot;4329&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span aria-labelledby=&quot;pirs12345-note-0003_note_2-controller&quot; class=&quot;footNotePopup&quot; data-dcnode-id=&quot;4309&quot; id=&quot;pirs12345-note-0003_note_2&quot; style=&quot;display: none;&quot;&gt;&lt;button class=&quot;footNoteClose&quot; data-dcnode-id=&quot;4326&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;icon-tools_close&quot; data-dcnode-id=&quot;4327&quot;&gt;&lt;/i&gt;&lt;/button&gt;&lt;span data-dcnode-id=&quot;4311&quot; id=&quot;pirs12345-note-0003&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;4324&quot;&gt;&lt;span data-dcnode-id=&quot;4325&quot; instrument_node=&quot;&quot;&gt;3 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4323&quot; instrument_node=&quot;&quot;&gt;In particular, in the optimistic case Dhingra et al. (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4320&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4321&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0021&quot; id=&quot;pirs12345-bib-0021R&quot;&gt;&lt;span data-dcnode-id=&quot;4322&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4319&quot; instrument_node=&quot;&quot;&gt;) assume that: (i) there are no tariffs between the UK and EU; (ii) non-tariff barriers increase by one-quarter of the reducible non-tariff barriers on US-EU trade; (iii) intra-EU trade costs fall by 20% faster than in the rest of the world for ten years after Brexit; and (iv) the UK's &lt;/span&gt;&lt;i data-dcnode-id=&quot;4317&quot;&gt;&lt;span data-dcnode-id=&quot;4318&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4316&quot; instrument_node=&quot;&quot;&gt; contribution to the EU budget is equal to Norway's contribution. In the pessimistic case they assume instead that: (i) the EU's MFN tariffs are imposed on UK-EU trade; (ii) non-tariff barriers increase by three-quarters of the reducible non-tariff barriers on US-EU trade; (iii) intra-EU trade costs continue to fall by 40% faster than in the rest of the world for ten years after Brexit; and (iv) the UK makes no budget payments to the EU. Their analysis does not consider the possible effects of Brexit on trade relations with non-EU countries. In a recent paper, Brakman et al. (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4313&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4314&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0010&quot; id=&quot;pirs12345-bib-0010R&quot;&gt;&lt;span data-dcnode-id=&quot;4315&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4312&quot; instrument_node=&quot;&quot;&gt;) conclude that only a trade agreement with the EU can compensate for the negative trade consequences of Brexit.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;chevronDown&quot; data-dcnode-id=&quot;4310&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4308&quot; instrument_node=&quot;&quot;&gt;  This range is a lower bound on the effect of Brexit that does not account for changes in FDI, migration, and the dynamic consequences of reduced trade on productivity growth.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4306&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4290&quot;&gt;&lt;span data-dcnode-id=&quot;4305&quot; instrument_node=&quot;&quot;&gt;Once the long-run effects of Brexit on productivity and investment are included, the decline in income &lt;/span&gt;&lt;i data-dcnode-id=&quot;4303&quot;&gt;&lt;span data-dcnode-id=&quot;4304&quot; instrument_node=&quot;&quot;&gt;per capita&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4302&quot; instrument_node=&quot;&quot;&gt; increases to between 6.3% and 9.5% (about £4,200 to £6,400 per household per year). Other possible economic benefits of Brexit, such as better regulation, would have to be very large to outweigh such losses.
&lt;/span&gt;&lt;a aria-controls=&quot;pirs12345-note-0004_note_3&quot; aria-expanded=&quot;false&quot; aria-haspopup=&quot;false&quot; aria-label=&quot;Note 4&quot; class=&quot;noteLink scrollableLink&quot; data-dcnode-id=&quot;4300&quot; href=&quot;#pirs12345-note-0004_note_3&quot; id=&quot;pirs12345-note-0004_note_3-controller&quot; title=&quot;Link to note&quot;&gt;&lt;span data-dcnode-id=&quot;4301&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span aria-labelledby=&quot;pirs12345-note-0004_note_3-controller&quot; class=&quot;footNotePopup&quot; data-dcnode-id=&quot;4292&quot; id=&quot;pirs12345-note-0004_note_3&quot; style=&quot;display: none;&quot;&gt;&lt;button class=&quot;footNoteClose&quot; data-dcnode-id=&quot;4298&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;icon-tools_close&quot; data-dcnode-id=&quot;4299&quot;&gt;&lt;/i&gt;&lt;/button&gt;&lt;span data-dcnode-id=&quot;4294&quot; id=&quot;pirs12345-note-0004&quot;&gt;&lt;span class=&quot;number&quot; data-dcnode-id=&quot;4296&quot;&gt;&lt;span data-dcnode-id=&quot;4297&quot; instrument_node=&quot;&quot;&gt;4 &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4295&quot; instrument_node=&quot;&quot;&gt;We note that the depreciation of the pound following the Brexit referendum reflects expansionary monetary policy by the Bank of England in the aftermath of the EU referendum as well as the expected negative effect of Brexit on the UK economy. In this respect, it is a signal of the decreased overall future value of UK economic activity and, while it may increase foreign-demand for those UK exports that do not rely on imported inputs (by lowering prices in foreign currencies), the depreciation is also a sign that Brexit has caused currency markets to downgrade their expectations of the UK's future economic performance.&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;chevronDown&quot; data-dcnode-id=&quot;4293&quot;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4291&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4289&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4287&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;4244&quot; id=&quot;pirs12345-sec-0008&quot;&gt;&lt;span data-dcnode-id=&quot;4286&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;4284&quot; id=&quot;pirs12345-sec-0008-title&quot;&gt;&lt;span data-dcnode-id=&quot;4285&quot; instrument_node=&quot;&quot;&gt;3.2 Distributional effects of leaving the EU&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4269&quot;&gt;&lt;span data-dcnode-id=&quot;4282&quot; instrument_node=&quot;&quot;&gt;The economic pain of Brexit is likely to be widely shared through its impact on consumer prices. Breinlich, Dhingra, Sampson, and Van Reenen (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4279&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4280&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0011&quot; id=&quot;pirs12345-bib-0011R&quot;&gt;&lt;span data-dcnode-id=&quot;4281&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4278&quot; instrument_node=&quot;&quot;&gt;) study these distributional consequences using data on the heterogeneous expenditure patterns of households in different deciles of the income distribution. They take, as the basis of analysis, the industry price changes predicted by Dhingra et al.'s (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4275&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4276&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0021&quot; id=&quot;pirs12345-bib-0021R&quot;&gt;&lt;span data-dcnode-id=&quot;4277&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4274&quot; instrument_node=&quot;&quot;&gt;) estimates of the aggregate effects of Brexit. Breinlich et al. (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4271&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4272&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0011&quot; id=&quot;pirs12345-bib-0011R&quot;&gt;&lt;span data-dcnode-id=&quot;4273&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4270&quot; instrument_node=&quot;&quot;&gt;) weight these price changes by the industry's relative importance in household expenditure, thereby showing how real incomes fall due to price increases.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4268&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4266&quot;&gt;&lt;span data-dcnode-id=&quot;4267&quot; instrument_node=&quot;&quot;&gt;The reduction in real income is fairly evenly shared across the income distribution, with the middle classes being slightly harder hit than the richest and poorest. Based on their specific expenditure patterns, households on average incomes would face losses of at least 4% of their real income (£1,637 per year) if the UK leaves the EU and trades as a regular member of the WTO, compared with remaining in the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4265&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4263&quot;&gt;&lt;span data-dcnode-id=&quot;4264&quot; instrument_node=&quot;&quot;&gt;Prices would go up most in transport (a price hike of between 4% and 7.5%), alcoholic drinks (4% to 7%), food (3% to 5%) and clothing (2% to 4%). These product groups rely heavily on imported intermediate inputs. By contrast, prices for services will rise the least.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4262&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4260&quot;&gt;&lt;span data-dcnode-id=&quot;4261&quot; instrument_node=&quot;&quot;&gt;For the poorest tenth of households (the bottom decile), real income losses would be 1.7% to 3.6% in the short run and 5.7% to 12.5% in the long run. For the richest households, the short-run losses would be 1.8% to 3.9% and the long-run losses 6% to 13.4%. So the middle class loses out slightly more than the rich and poor.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4259&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4257&quot;&gt;&lt;span data-dcnode-id=&quot;4258&quot; instrument_node=&quot;&quot;&gt;Looking at specific households such as pensioners, families with children, and single people, the pain would also be widely shared. For example, even in the short run, pensioners will lose between 2% and 4% of their real income.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4256&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4246&quot;&gt;&lt;span data-dcnode-id=&quot;4255&quot; instrument_node=&quot;&quot;&gt;Brexit could also affect inequality by changing the distribution of nominal income across households, a channel not studied by Breinlich et al. (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4252&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4253&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0011&quot; id=&quot;pirs12345-bib-0011R&quot;&gt;&lt;span data-dcnode-id=&quot;4254&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4251&quot; instrument_node=&quot;&quot;&gt;). To date there has been little work analysing this possibility, but the distributional effects would have to be substantial to offset the aggregate losses estimated by Dhingra et al. (&lt;/span&gt;&lt;span data-dcnode-id=&quot;4248&quot;&gt;&lt;a class=&quot;bibLink tab-link&quot; data-dcnode-id=&quot;4249&quot; data-tab=&quot;pane-pcw-references&quot; href=&quot;#pirs12345-bib-0021&quot; id=&quot;pirs12345-bib-0021R&quot;&gt;&lt;span data-dcnode-id=&quot;4250&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4247&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4245&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4243&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4241&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__content&quot; data-dcnode-id=&quot;3206&quot; id=&quot;pirs12345-sec-0009&quot;&gt;&lt;span data-dcnode-id=&quot;4240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;article-section__title section__title section1&quot; data-dcnode-id=&quot;4238&quot; id=&quot;pirs12345-sec-0009-title&quot;&gt;&lt;span data-dcnode-id=&quot;4239&quot; instrument_node=&quot;&quot;&gt;4 UK FOREIGN DIRECT INVESTMENT&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;4237&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4235&quot;&gt;&lt;span data-dcnode-id=&quot;4236&quot; instrument_node=&quot;&quot;&gt;The UK has long been one of the world's largest recipients of foreign direct investment. FDI is also an important determinant of the UK's economic performance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4234&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__sub-content&quot; data-dcnode-id=&quot;4131&quot; id=&quot;pirs12345-sec-0010&quot;&gt;&lt;span data-dcnode-id=&quot;4233&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;article-section__sub-title section2&quot; data-dcnode-id=&quot;4231&quot; id=&quot;pirs12345-sec-0010-title&quot;&gt;&lt;span data-dcnode-id=&quot;4232&quot; instrument_node=&quot;&quot;&gt;4.1 The importance of the UK as an FDI destination&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4230&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4222&quot;&gt;&lt;span data-dcnode-id=&quot;4229&quot; instrument_node=&quot;&quot;&gt;FDI inflows reached all-time highs during the years prior to the financial crisis of 2007-08. Although the values of inflows fell in the aftermath of the crisis, the UK remains one of Europe's most popular destinations for FDI flows (Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4227&quot; href=&quot;#pirs12345-fig-0001&quot;&gt;&lt;span data-dcnode-id=&quot;4228&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4226&quot; instrument_node=&quot;&quot;&gt;). As of 2014, the UK was the host to 6% of world FDI stocks, surpassed only by the USA and China (Figure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4224&quot; href=&quot;#pirs12345-fig-0002&quot;&gt;&lt;span data-dcnode-id=&quot;4225&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4223&quot; instrument_node=&quot;&quot;&gt;). According to the CEPII, the UK accounted for 7.4% of announced world greenfield investment projects for 2015. Germany, in comparison, accounted for only 1.6%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4221&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;article-section__inline-figure&quot; data-dcnode-id=&quot;4189&quot;&gt;&lt;span data-dcnode-id=&quot;4220&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;figure class=&quot;figure&quot; data-dcnode-id=&quot;4153&quot; id=&quot;pirs12345-fig-0002&quot;&gt;&lt;a data-dcnode-id=&quot;4182&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//rsaiconnect.onlinelibrary.wiley.com/cms/asset/204f3072-5872-457d-9f32-74ab0ce50d50/pirs12345-fig-0002-m.jpg&quot; target=&quot;_blank&quot;&gt;&lt;picture data-dcnode-id=&quot;4183&quot;&gt;&lt;span data-dcnode-id=&quot;4186&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;figure__caption__header&quot; data-dcnode-id=&quot;4170&quot;&gt;&lt;strong class=&quot;figure__title&quot; data-dcnode-id=&quot;4179&quot;&gt;&lt;span data-dcnode-id=&quot;4180&quot; instrument_node=&quot;&quot;&gt;Figure 2&lt;/span&gt;&lt;/strong&gt;&lt;div class=&quot;figure-extra&quot; data-dcnode-id=&quot;4172&quot;&gt;&lt;a class=&quot;open-figure-link&quot; data-dcnode-id=&quot;4177&quot; href=&quot;#&quot;&gt;&lt;span data-dcnode-id=&quot;4178&quot; instrument_node=&quot;&quot;&gt;Open in figure viewer&lt;/span&gt;&lt;/a&gt;&lt;a class=&quot;ppt-figure-link&quot; data-dcnode-id=&quot;4173&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//rsaiconnect.onlinelibrary.wiley.com/action/downloadFigures%3Fid%3Dpirs12345-fig-0002%26doi%3D10.1111%252Fpirs.12345&quot;&gt;&lt;i aria-hidden=&quot;true&quot; class=&quot;icon-Icon_Download&quot; data-dcnode-id=&quot;4176&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4174&quot;&gt;&lt;span data-dcnode-id=&quot;4175&quot; instrument_node=&quot;&quot;&gt;PowerPoint&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4171&quot; instrument_node=&quot;&quot;&gt;
