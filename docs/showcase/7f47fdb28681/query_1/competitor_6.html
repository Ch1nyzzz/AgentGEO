&lt;/span&gt;&lt;p class=&quot;Detail-tags&quot; data-dcnode-id=&quot;968&quot;&gt;&lt;strong data-dcnode-id=&quot;985&quot;&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;Related tags:&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;982&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/tag/keyword/Hospitality/Staff&quot;&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;Staff&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;,             &lt;/span&gt;&lt;a data-dcnode-id=&quot;979&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/tag/keyword/Hospitality/Employment&quot;&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;Employment&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;,             &lt;/span&gt;&lt;a data-dcnode-id=&quot;976&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/tag/keyword/Hospitality/brexit&quot;&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;brexit&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;,             &lt;/span&gt;&lt;a data-dcnode-id=&quot;973&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/tag/keyword/Hospitality/Legislation&quot;&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;Legislation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;aside class=&quot;AlertAd-front AlertAd--red&quot; data-dcnode-id=&quot;960&quot; id=&quot;text-ad2&quot;&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/aside&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;Detail-intro&quot; data-dcnode-id=&quot;955&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;
                            It’s widely forecast that Britain’s departure from the European Union will trigger a dearth in workers from the continent on which the hospitality sector traditionally relies. 
        &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/header&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;820&quot; id=&quot;pn_rw&quot;&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;aside class=&quot;Ad positionLeft rwd--noMobile adBox&quot; data-dcnode-id=&quot;943&quot; style=&quot;display: none;&quot;&gt;&lt;span data-dcnode-id=&quot;950&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;Ad-loaded&quot; data-dcnode-id=&quot;945&quot; id=&quot;skyscraper&quot;&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;944&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/aside&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;Detail-content RichText&quot; data-dcnode-id=&quot;822&quot;&gt;&lt;span data-dcnode-id=&quot;941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ezxmltext-field RichText&quot; data-dcnode-id=&quot;824&quot;&gt;&lt;p data-dcnode-id=&quot;939&quot;&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;There are now fewer than seven weeks until the Brexit transition period ends and Britain will be forced to either implement a trade deal with the EU or “no deal” World Trade Organisation terms on 1 January 2021.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;934&quot;&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;However, outside of potential pricing fluctuations, the British Institute of Innkeeping’s CEO Steve Alton tells&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;936&quot;&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;The Morning Advertiser (MA)&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;​&amp;nbsp;that a key focus for the pub sector will be on employment as the industry slowly rebuilds footfall levels and consequently a demand for staff.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;932&quot;&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt;“In the New Year, as pubs start to trade under more normal conditions and have a need to increase their teams, for many roles they will undoubtedly need to employ from within the UK,” he says.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;930&quot;&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;“Finding and retaining great people will be a challenge, as will upskilling those staff members who are potentially new to the pub trade, providing them with comprehensive training and development.”&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;928&quot;&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;Yet, Nick Griffin, chief executive of the Licensees Association believes the impact of Brexit will be felt most keenly in pub business’ ability to recruit to meet staffing demands.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;“A reduction in net migration will create pressure on employers who previously recruited from overseas and consequently there will likely be stress put on wage bills at a time when the industry can least cope with it following the pandemic,” he says.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;924&quot;&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;“The quid pro quo to this is that the industry will become more attractive to British workers, particularly the young, and we hope that more training schemes and apprenticeships are put in place to ensure hospitality shines as a career path, something all too often in the past it has sadly failed to do, though we recognise this has been improving in recent years and hope the upwards trajectory continues.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;922&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;“The alternative some may chose will be to lower the staff to customer ratio, but we would consider this a mistake. Service levels will fall and ultimately this is the wrong path to walk.”&lt;/span&gt;&lt;/p&gt;&lt;a data-dcnode-id=&quot;921&quot; id=&quot;eztoc_1_1_1&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;916&quot;&gt;&lt;div class=&quot;object-center&quot; data-dcnode-id=&quot;917&quot;&gt;&lt;figure data-dcnode-id=&quot;918&quot;&gt;&lt;a data-dcnode-id=&quot;919&quot; data-widget=&quot;LightboxGallery&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/media/images/staff-2/3617913-1-eng-GB/Staff-2.jpg&quot;&gt;&lt;img alt=&quot;Staff-2&quot; data-dcnode-id=&quot;920&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/_aliases/reference/media/images/staff-2/3617913-1-eng-GB/Staff-2.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/figure&gt;&lt;/div&gt;&lt;/h3&gt;&lt;a data-dcnode-id=&quot;915&quot; id=&quot;eztoc_2_1_1&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;913&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;Visa issues&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;911&quot;&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;Jamaal Brathwaite, founder and CEO of Manchester-based employment search service Jobseekrs, highlights that an estimated 700,000 (15%) of the 4.5m people who currently work in the British hospitality sector are from the European Union according to statistics from the British Hospitality Association (BHA)&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;909&quot;&gt;&lt;span data-dcnode-id=&quot;910&quot; instrument_node=&quot;&quot;&gt;“Between 2011 and 2015, the number of migrant workers increased by 22%, with the majority of these coming from EU countries,” he adds.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;907&quot;&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;However, as a result of Brexit – and associated visa issues – he explains that he has witnessed a decline in the number of people from Europe seeking work in hospitality.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;905&quot;&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;“For example, near where I live, I know, one hotel chain in particular whose hospitality staff (80%+ of bar and waiting) are predominantly from the European Union, have only lived in the UK for at least the last two to three years and are on £14K–£18K/year.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;903&quot;&gt;&lt;span data-dcnode-id=&quot;904&quot; instrument_node=&quot;&quot;&gt;“What this means is with the current visa requirements for any low-skilled, non-UK workers, earning less than £20,480, these staff won’t qualify there would be huge gap to fill after Brexit. Unfortunately, the responsibility will lay on the business owners to fill this gap.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;901&quot;&gt;&lt;span data-dcnode-id=&quot;902&quot; instrument_node=&quot;&quot;&gt;“Whether they will turn to technical solutions which promote self-service to reduce staff overheads or increase staff salaries to make it more appealing for UK residents and meet these visa thresholds, that is yet to be seen especially in an economy and industry crippled by Covid-19.”&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;object-center&quot; data-dcnode-id=&quot;897&quot;&gt;&lt;figure data-dcnode-id=&quot;898&quot;&gt;&lt;a data-dcnode-id=&quot;899&quot; data-widget=&quot;LightboxGallery&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/media/images/staff-3/3617930-1-eng-GB/Staff-3.jpg&quot;&gt;&lt;img alt=&quot;Staff-3&quot; data-dcnode-id=&quot;900&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/_aliases/reference/media/images/staff-3/3617930-1-eng-GB/Staff-3.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/figure&gt;&lt;/div&gt;&lt;a data-dcnode-id=&quot;896&quot; id=&quot;eztoc_3_1_1&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;894&quot;&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;Costly to fill post-Brexit vacancies&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;892&quot;&gt;&lt;span data-dcnode-id=&quot;893&quot; instrument_node=&quot;&quot;&gt;Ultimately, Natwest Great British Entrepreneur of the Year winner, Peter Kelly, who is CEO and co-founder of Imployable – a service which matches job seekers to their ideal careers by analysing personality traits, qualifications and experience – believes plugging these post-Brexit staff will be very expensive for pub, bar and restaurant operators.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;887&quot;&gt;&lt;span data-dcnode-id=&quot;891&quot; instrument_node=&quot;&quot;&gt;&quot;In 2017 EU nationals made up between 12%-23% of workers in the UK hospitality sector,” he tells&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;889&quot;&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;The MA&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;​. “Since then we have seen an increase in British nationals applying for hospitality jobs, this may have been an effect of the Brexit vote but there are many factors to consider.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;885&quot;&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;“Generally, EU workers in hospitality demand less pay than their British counterparts and, in most cases, are excellent at their jobs, allowing businesses to hire cost effectively whilst ensuring quality to their customers.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;883&quot;&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;“After Brexit, hospitality sector businesses will be faced with two main problems,” he continues. “Firstly, a large portion of eligible, willing workers may leave, creating a talent hole.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;881&quot;&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;“Secondly is cost, with a lot of Britons expecting higher pay, businesses may be forced to pay more to fill the gaps and businesses will be forced to either reduce their margins and swallow the cost or pass the cost to the consumer.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;879&quot;&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;“During a recession, not to mention the coronavirus infection risk, this could be very problematic.”&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;877&quot;&gt;&lt;span data-dcnode-id=&quot;878&quot; instrument_node=&quot;&quot;&gt;CIL Management Consultants’ head of consumer Liam McGuinness also believes that after a tough year for the pub sector, Brexit will lay increased staffing costs at operators’ feet.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;875&quot;&gt;&lt;span data-dcnode-id=&quot;876&quot; instrument_node=&quot;&quot;&gt;“The workforce is comprised of a high percentage of EU nationals and some of these will leave the UK as a result of Brexit; those that don’t will need updated employment contracts – an admin-heavy task that will likely give publicans a headache in the short-term,” he explains.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;873&quot;&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt;“Additionally, the more UK citizens employed by pubs, the more national living wage they must pay – employment costs will rise. These impacts will be felt more acutely in London and other major cities.”&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;object-center&quot; data-dcnode-id=&quot;869&quot;&gt;&lt;figure data-dcnode-id=&quot;870&quot;&gt;&lt;a data-dcnode-id=&quot;871&quot; data-widget=&quot;LightboxGallery&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/media/images/staff-4/3617946-1-eng-GB/Staff-4.jpg&quot;&gt;&lt;img alt=&quot;Staff-4&quot; data-dcnode-id=&quot;872&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/_aliases/reference/media/images/staff-4/3617946-1-eng-GB/Staff-4.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/figure&gt;&lt;/div&gt;&lt;a data-dcnode-id=&quot;868&quot; id=&quot;eztoc_4_1_1&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;866&quot;&gt;&lt;span data-dcnode-id=&quot;867&quot; instrument_node=&quot;&quot;&gt;Pandemic positive?&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;864&quot;&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;Surprisingly, however, Kelly argues that one thing the hospitality sector has going for it in terms of sourcing talent post-Brexit is, believe it or not, the knock-on effects of the Covid-19 pandemic.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;862&quot;&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;“A record number of Britons are facing unemployment,” he explains. “Any hospitality sector business that can ride out the pandemic, take the short-term pain, may be able to gain when the country re-opens.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;860&quot;&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;“With huge amounts of people potentially looking for work, there will be more than enough people to fill the hole initially.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;858&quot;&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;“The employment affects, and benefits, towards the backend of this pandemic will not last forever though and benefiting is not a long-term strategy,” he caveats. “As companies start to create new jobs people will undoubtedly revert back to their original career plans.&quot;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;856&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;Ian Cass, managing director of the Forum of British Pubs also forecasts that record redundancies and Brexit-induced staffing gaps in the hospitality sector can dovetail in the short term.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;854&quot;&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;“I also think the large pub companies will target groups of people who have been particularly impacted with unemployment,” he adds.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;852&quot;&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;“The question is will the pubs which are closing reopen. Many may struggle to do so, so we may see lots of empty pubs which end up classed as unviable and changed to other use, in which case we may see a drop in the need for staff.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;850&quot;&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;“I hope not but it’s a potential scenario, depending on what happens with this pandemic which may change people’s behaviour in the future.”&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;object-center&quot; data-dcnode-id=&quot;846&quot;&gt;&lt;figure data-dcnode-id=&quot;847&quot;&gt;&lt;a data-dcnode-id=&quot;848&quot; data-widget=&quot;LightboxGallery&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/media/images/staff4/3617963-1-eng-GB/Staff.jpg&quot;&gt;&lt;img alt=&quot;Staff&quot; data-dcnode-id=&quot;849&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/_aliases/reference/media/images/staff4/3617963-1-eng-GB/Staff.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/figure&gt;&lt;/div&gt;&lt;a data-dcnode-id=&quot;845&quot; id=&quot;eztoc_5_1_1&quot;&gt;&lt;/a&gt;&lt;h3 data-dcnode-id=&quot;843&quot;&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;Creative recruitment&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;841&quot;&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;When the Brexit training wheels come off in January, Kelly also challenges pubs, restaurants, clubs and bar operators to get creative and think outside the box when it comes to recruitment.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;839&quot;&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;“One thing that strikes me is there is actually a huge talent pool being massively underutilised, ex-offenders,” he says. “There are many hospitality businesses looking to ex-offenders to bolster their work forces already, but there could be more.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;837&quot;&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;“Imagine going through the most devastating year for hospitality in a century with the pandemic and Brexit and coming out the other end as a major contributor to fixing one of the UK biggest social problems.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;835&quot;&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;“As well as fixing a big talent problem for hospitality, on a much wider scale creating a hope for a second chance, helping ex-offenders to become productive members of society whilst having a direct positive impact on mental health, the Police, Home Office, Ministry of Justice and NHS, that is heroic and food for thought.&quot;&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;object-center&quot; data-dcnode-id=&quot;831&quot;&gt;&lt;figure data-dcnode-id=&quot;832&quot;&gt;&lt;a data-dcnode-id=&quot;833&quot; data-widget=&quot;LightboxGallery&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/media/images/staff-5/3617980-1-eng-GB/Staff-5.jpg&quot;&gt;&lt;img alt=&quot;Staff-5&quot; data-dcnode-id=&quot;834&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.morningadvertiser.co.uk/var/wrbm_gb_hospitality/storage/images/_aliases/reference/media/images/staff-5/3617980-1-eng-GB/Staff-5.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;830&quot;&gt;&lt;/p&gt;&lt;aside class=&quot;AlertAd-front&quot; data-dcnode-id=&quot;827&quot; id=&quot;text-ad1&quot;&gt;&lt;/aside&gt;&lt;p data-dcnode-id=&quot;825&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;
