&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1030&quot; id=&quot;12814&quot;&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;1020&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;large&quot; data-dcnode-id=&quot;1026&quot;&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;Employment law in the UK is derived mainly from Acts of Parliament and case law. European law became a further source after 1973 when the UK joined the European Economic Community (subsequently the European Union) and the impact of the EU on employment regulation grew considerably when the UK joined the Social Chapter of the Maastricht Treaty in 1997.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;large&quot; data-dcnode-id=&quot;1024&quot;&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt;The UK formally left the European Union on 31 January 2020. Negotiations then took place for 11 months, resulting in an agreement about how the future relationship between the UK and the EU would be managed. The agreement contains a ‘non-regression’ arrangement as far as employment law and workers’ rights are concerned. In practical terms this means that as of 2021 the UK is no longer bound to follow EU law in the field of employment, but has agreed not to reduce the level of existing social protection in such a way as to distort competition.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1022&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;This factsheet for CIPD members explains the EU’s impact on UK employment law and how EU social policy is made by the Council of Ministers and the EU Parliament. This then becomes directives and regulations, which must become part of member states’ national laws. It describes the enforcement role played to date by the European Court of Justice (ECJ) and how this will change as a result of the UK’s departure from the European Union.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a aria-expanded=&quot;false&quot; class=&quot;accordion-control&quot; data-dcnode-id=&quot;930&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/identity/checkIfLoggedIn&quot; role=&quot;tab&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;h4 content-accordion-control-label&quot; data-dcnode-id=&quot;932&quot;&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt;Brexit and employment law&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;accordion-content&quot; data-dcnode-id=&quot;883&quot; role=&quot;tabpanel&quot;&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;data-content-inner&quot; data-dcnode-id=&quot;885&quot;&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;free-text-block block block-size-s&quot; data-dcnode-id=&quot;887&quot;&gt;&lt;span data-dcnode-id=&quot;924&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;889&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;918&quot;&gt;&lt;span data-dcnode-id=&quot;922&quot; instrument_node=&quot;&quot;&gt;The UK left the European Union on 31 January 2020 following the European Union (Withdrawal Agreement) Act 2020 being passed by Parliament on 23 January 2020. The UK then entered a transitional period ending on 31 December 2020 during which negotiations to conclude the &lt;/span&gt;&lt;a data-dcnode-id=&quot;920&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/948119/EU-UK_Trade_and_Cooperation_Agreement_24.12.2020.pdf&quot; tabindex=&quot;-1&quot; target=&quot;_blank&quot; title=&quot;EU-UK Trade and Co-operation Agreement&quot;&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;EU-UK Trade and Cooperation Agreement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt; took place. This agreement covers all formal aspects of the future relationship between the EU and the UK. It contains a comprehensive free trade arrangement as far as goods are concerned and a range of institutional arrangements to govern its practical operation. It has a short passage on employment rights which represent a compromise between the two sides’ opening negotiation positions. The relevant section of the agreement is Article 6.2. The key paragraph says:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;916&quot;&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;“A Party shall not weaken or reduce, in a manner affecting trade or investment between the Parties, its labour and social levels of protection below the levels in place at the end of the transition period, including by failing to effectively enforce its law and standards.”&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;914&quot;&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;This is, in effect, a ‘non-regression’ arrangement. From the UK’s point of view (Northern Ireland excepted) it means that while existing European employment regulation will no longer have to be applied in the UK from 2021, there can be no reductions in the level of protection that currently exist so significant that they create an unfair advantage to trade or the attraction of investment.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;912&quot;&gt;&lt;span data-dcnode-id=&quot;913&quot; instrument_node=&quot;&quot;&gt;Specific regulations that have a European origin can be amended in the future, but not in a way that would distort fair trade. Relatively minor amendments might thus be made, for example, to the Working Time Regulations, but it would not be possible to repeal them altogether or to make significant changes that would give the UK an unfair advantage when competing economically with the EU. The same is true of existing enforcement mechanisms. The agreement commits both parties to not reducing their effectiveness as a means of gaining a competitive advantage over the other.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;At one stage during the negotiation of the trade agreement, the EU made it clear it was seeking a position of ‘dynamic alignment’ in respect of employment rights whereby the UK government would be obliged, as part of the agreement, to give effect to all future EU employment regulations and that failure to do so would result in the erection of punitive tariffs by the EU ahead of any formal arbitration process. No such clauses appear in the final agreement. The UK will thus not be obliged to mirror future EU employment legislation.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;908&quot;&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;The agreement makes it clear that after 31 December 2020, with the exception of some discrimination laws in Northern Ireland, the European Court of Justice no longer has any constitutional role in the UK. No judgments it makes in the future will apply in the UK and there will be no obligation for the UK courts to follow these precedents. They may choose to do so, but future ECJ rulings will be ‘persuasive precedents’ and not, as formerly, ‘binding precedents’ which the UK, like all member states, has had to follow.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;906&quot;&gt;&lt;span data-dcnode-id=&quot;907&quot; instrument_node=&quot;&quot;&gt;While not covered in this agreement, the EU Withdrawal Act 2020 had already determined that existing ECJ rulings will apply in the UK unless and until the Supreme Court decides to alter any precedents when ruling on a relevant case.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;904&quot;&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;The Trade and Cooperation Agreement allows for a system of arbitration to apply if either side breaches any of its terms – including those relating to employment rights. The arrangements here are complex but they involve an initial consultation phase, lasting 30 days, during which diplomats will try to settle the matter in dispute. If this fails, there is the possibility of an appeal to a body known as ‘the Partnership Council’ which will adjudicate. The council will contain equal numbers of expert representatives from the UK and the EU, with a neutral chair appointed from another country. The council will then rule on whether a distortion in the terms of trade exists and whether tariffs can be imposed to rectify the imbalance.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;902&quot;&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;What all this means in practice is that, for the foreseeable future, all existing employment law with a European origin or which has been an area of European competence will remain on the UK statute book. In other words, nothing will change in the short term.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;900&quot;&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;In the longer term, it’s possible that relatively minor amendments may be made to employment rights and, potentially, some existing ECJ judgments may be overturned or altered. But the agreement precludes any radical change of a nature that would potentially give the UK a competitive advantage when trading with the EU.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;898&quot;&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;Existing, core employment rights will not therefore be diluted.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;896&quot;&gt;&lt;span data-dcnode-id=&quot;897&quot; instrument_node=&quot;&quot;&gt;Over time EU and UK employment rights will start to diverge as new regulations are introduced by one side or the other. UK law will, however, no longer change as EU law changes and new EU employment rights will not apply in the UK any more than new UK employment rights will be followed in the EU. There will also be divergence over time in court judgments. In the past the ECJ has sometimes overturned rulings of the UK Supreme Court in employment cases. This will no longer happen. The Supreme Court in the UK will be the final court of appeal on all matters, including existing employment rights that have an EU origin.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;891&quot;&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;Visit our &lt;/span&gt;&lt;a data-dcnode-id=&quot;893&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/knowledge/brexit-hub/&quot; tabindex=&quot;-1&quot; title=&quot;Brexit hub&quot;&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt;Brexit hub&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt; for resources and support for people professionals.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a aria-expanded=&quot;false&quot; class=&quot;accordion-control&quot; data-dcnode-id=&quot;858&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/identity/checkIfLoggedIn&quot; role=&quot;tab&quot;&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;h4 content-accordion-control-label&quot; data-dcnode-id=&quot;860&quot;&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;How the EU helped shape UK laws&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;accordion-content&quot; data-dcnode-id=&quot;822&quot; role=&quot;tabpanel&quot;&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;data-content-inner&quot; data-dcnode-id=&quot;824&quot;&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;free-text-block block block-size-s&quot; data-dcnode-id=&quot;826&quot;&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;828&quot;&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;849&quot;&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;The UK joined the European Economic Community (EEC) in 1973. The Treaty of Rome committed member states to enforcing the principle of equal pay for equal work between men and women, already being introduced in the UK at the time. As the EEC evolved into the European Union (EU), the scope of European employment law expanded considerably and eventually covered the following areas:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;832&quot;&gt;&lt;li data-dcnode-id=&quot;847&quot;&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;Health and safety.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;845&quot;&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;Transfers of undertakings (TUPE) - rights protecting workers when a business changes hands.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;843&quot;&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;Discrimination on grounds of sex, race, ethnicity, national origin, disability, age, sexual orientation and religion/belief.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;841&quot;&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;Working time.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;839&quot;&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;ata protection.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;837&quot;&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;Information and consultation.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;835&quot;&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;Part-time and fixed-term employees, and agency workers.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;833&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;Family-friendly rights.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;New EU labour law sometimes required Parliament to amend existing UK laws to bring them into line with the EU. On other occasions, the UK has had to create entirely new employment rights which probably would not have been introduced here had the UK not been an EU member.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;827&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;block block-size-a block-last&quot; data-dcnode-id=&quot;737&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;accordion-group&quot; data-accordion-group=&quot;&quot; data-dcnode-id=&quot;739&quot; role=&quot;tablist&quot;&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;accordion accordion-locked&quot; data-dcnode-id=&quot;743&quot; id=&quot;12820&quot;&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a aria-expanded=&quot;false&quot; class=&quot;accordion-control&quot; data-dcnode-id=&quot;797&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/identity/checkIfLoggedIn&quot; role=&quot;tab&quot;&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;h4 content-accordion-control-label&quot; data-dcnode-id=&quot;799&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;How European law is made&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;794&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;accordion-content&quot; data-dcnode-id=&quot;747&quot; role=&quot;tabpanel&quot;&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;data-content-inner&quot; data-dcnode-id=&quot;749&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;free-text-block block block-size-s&quot; data-dcnode-id=&quot;751&quot;&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;753&quot;&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;788&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;European law is derived from three principal sources: EU directives, treaties and regulations.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;786&quot;&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;Directives&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;784&quot;&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;Most EU employment law derives from directives setting out general principles which member states are then obliged to adopt into national law. Governments have a degree of flexibility in how they do this and the amount of time in which they have to do it varies, depending on the significance of the change.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;782&quot;&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;For example, member states had three years to implement the Equal Treatment Framework Directive (2000) but four years for disability discrimination, and six years for age discrimination. The UK already had well-established national laws covering race and disability discrimination, but new regulations had to be introduced for sexual orientation, belief and age discrimination. In practice, the UK sometimes missed the deadline dates by several months, as did other countries.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;The Agency Workers Directive was agreed in May 2008 and had to be implemented by 5 December 2011. On this occasion, the UK was ahead of schedule, bringing in the Agency Workers Regulations 2010 on 1 October 2011 (Northern Ireland’s regulations came into force on 5 December 2011). These regulations are a good example of the flexibility member states are given over directives’ implementation. They were drawn up by a Labour government and the subsequent government - the Conservative/Liberal Democrat coalition - considered making them less restrictive, on the grounds the previous government had gone much further than compliance required. In the event, however, the regulations were implemented in their original form.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;778&quot;&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt;Once the deadline for implementing a directive has passed, it is directly enforceable against public service bodies (technically ‘emanations of the state’), such as the NHS in the UK, in court actions. The way a directive has been implemented can also be challenged in the courts. In 2007, for example, the then Equal Opportunities Commission effectively forced the government to bring forward the Sex Discrimination (Amendment) Regulations 2008 extending sexual harassment and maternity leave rights on the grounds these were needed to comply fully with the sex discrimination directives.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;776&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;The government itself can be challenged in court on the grounds that it has failed to implement a directive fully. In 2007, for example, the then Equal Opportunities Commission (EOC) effectively forced the government to bring forward the Sex Discrimination (Amendment) Regulations 2008 extending sexual harassment and maternity leave rights which the EOC claimed were needed for the UK to comply fully with the sex discrimination directives.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;774&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;Governments can amend employment regulations deriving from EU directives provided the basic requirements of the original directive are still met. For example, the UK’s changes in 2014 to the TUPE regulations (which protect employment rights in business transfers) go further than is strictly required by the EU Acquired Rights Directive.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;772&quot;&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;Treaties&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;770&quot;&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt;The EU’s constitutional powers are set out in treaties negotiated by member governments and ratified by national parliaments:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;763&quot;&gt;&lt;li data-dcnode-id=&quot;768&quot;&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;The Treaty of Rome 1958.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;766&quot;&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;The Treaty of Maastricht, which came into effect in 1993.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;The Treaty of Lisbon, which came into effect in December 2009.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;The legal principles within a treaty can be directly enforceable in national courts from the date it comes into effect, provided they are 'clear and precise, unconditional and unqualified' and are not subject to any additional EU legal measures.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;759&quot;&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;Only one major employment-related treaty article has had direct effect in the UK: Article 157 of the Treaty of Rome, enshrining the principle that men and women should be paid equally for work of equal value. The UK government was effectively forced to introduce the Equal Pay Amendment Act 1983 after the ECJ ruled that existing UK equal pay law was not fully compliant with the Article. The result was the introduction of the principle that a woman can use a man doing a wholly different kind of job in her organisation as a comparator when claiming their jobs are of equal value, and that men can do the same.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;757&quot;&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;Regulations&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;755&quot;&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;European regulations also have direct effect. They can be used to amend existing law in relatively minor ways, and hitherto have mainly concerned health and safety. The exception is the General Data Protection Regulation (GDPR), applicable in the UK from 25 May 2018. This replaced the 1995 Data Protection Directive and ushered in new rights for data subjects, such as the right to be forgotten, and a new requirement for data processors to gain ‘explicit’ consent for processing sensitive personal data. The government committed to amending the UK’s Data Protection Act 1998 in line with the EU regulation prior to Brexit, and we now have a new Data Protection Act 2018.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;732&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;block block-size-a block-last&quot; data-dcnode-id=&quot;685&quot;&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;accordion-group&quot; data-accordion-group=&quot;&quot; data-dcnode-id=&quot;687&quot; role=&quot;tablist&quot;&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a aria-expanded=&quot;false&quot; class=&quot;accordion-control&quot; data-dcnode-id=&quot;722&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/identity/checkIfLoggedIn&quot; role=&quot;tab&quot;&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;h4 content-accordion-control-label&quot; data-dcnode-id=&quot;724&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;How European directives are made&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;accordion-content&quot; data-dcnode-id=&quot;695&quot; role=&quot;tabpanel&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;data-content-inner&quot; data-dcnode-id=&quot;697&quot;&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;free-text-block block block-size-s&quot; data-dcnode-id=&quot;699&quot;&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;701&quot;&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;713&quot;&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;European directives in the employment field usually start out as proposals from the 'social partners' (trade union and employer association representatives meeting at European level) in dialogue with the European Commission. The proposals are then discussed in the principal EU law-making body, the Council of Ministers, and once a draft directive has been agreed, are debated and voted on in the European Parliament.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;711&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;Council of Ministers&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;709&quot;&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;The council, which meets in private, has one representative from each member state, normally an employment minister in the case of employment-related directives. A draft directive is debated in a series of meetings held over a number of months and, in some areas, require unanimous support. Employment legislation is decided by qualified majority voting, requiring a ‘yes’ vote from at least 16 countries representing between them at least 65% of the total EU population. A new directive can only be prevented when a ‘blocking minority’ is formed, consisting of at least four of the member states representing at least 35% of the EU population.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;707&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;It was through this mechanism that successive UK governments managed to retain the 'opt out' from the 48-hour working week limit that is central to the Working Time Directive. No other country in Europe operates the opt-out system and the UK was periodically been put under considerable pressure to abandon it.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;705&quot;&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;European Parliament&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;703&quot;&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;Members of the European Parliament (MEPs) are directly elected to serve five-year terms. Until 31 January 2020, the UK sent 73 MEPs to sit in the Parliament. The EU Parliament can vote down a directive, accept it or, as often happens, accept a directive in principle, but want to see it amended. Where this happens, the amended directive is sent back to the Council of Ministers for a 'second reading'. Once a draft directive has been approved both by the Council of Ministers and by the European Parliament, it becomes a full directive and must be implemented in all member states through national legislation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a aria-expanded=&quot;false&quot; class=&quot;accordion-control&quot; data-dcnode-id=&quot;670&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/identity/checkIfLoggedIn&quot; role=&quot;tab&quot;&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 class=&quot;h4 content-accordion-control-label&quot; data-dcnode-id=&quot;672&quot;&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;How European law is enforced&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;data-content-inner&quot; data-dcnode-id=&quot;641&quot;&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;free-text-block block block-size-s&quot; data-dcnode-id=&quot;643&quot;&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;645&quot;&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;661&quot;&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;National parliaments implement EU directives, and in the vast majority of cases enforcement is in national courts. In the case of employment law, most EU measures have been enforced via the employment tribunal system. In those areas in which the EU has powers to legislate, hitherto appeals have been made on questions of legal interpretation beyond the UK Supreme Court to the ECJ. Since Brexit, the Supreme Court’s decision is final.&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;659&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;The European Court of Justice (ECJ)&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;657&quot;&gt;&lt;span data-dcnode-id=&quot;658&quot; instrument_node=&quot;&quot;&gt;The ECJ sits in Luxemburg and each Member State nominates a judge. Most of the work is carried out by panels of judges, assisted by Advocates General, who review all the cases before they are heard by the court. ECJ rulings are binding on all member states’ national courts and cannot be appealed.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;652&quot;&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;Over the years the ECJ has made many highly significant rulings in UK employment law cases. For example, the court ruled in the case of &lt;/span&gt;&lt;em data-dcnode-id=&quot;654&quot;&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;Barber v Guardian Royal Exchange Group [1990]&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;653&quot; instrument_node=&quot;&quot;&gt; that employers must equalise occupational pension arrangements for male and female employees and, as a result, occupational pension schemes across the whole of Europe have had to equalise retirement ages and ensure their accrual systems do not favour either sex.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;647&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;In another case, &lt;/span&gt;&lt;em data-dcnode-id=&quot;649&quot;&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt;Stringer v HMRC [2009]&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;, the ECJ significantly overturned the decision of the UK courts on appeal. As a result, workers now continue to accrue the holiday entitlements they are due under the Working Time Directive when they are off sick.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt;
