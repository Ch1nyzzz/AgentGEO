&lt;/span&gt;&lt;h1 class=&quot;m-banner__title&quot; data-dcnode-id=&quot;1264&quot;&gt;&lt;span data-dcnode-id=&quot;1265&quot; instrument_node=&quot;&quot;&gt;
The impact of the pandemic on SEN children and young people
&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;m-banner__text&quot; data-dcnode-id=&quot;1258&quot;&gt;&lt;span data-dcnode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1260&quot;&gt;&lt;span data-dcnode-id=&quot;1261&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1259&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;u-container&quot; data-dcnode-id=&quot;868&quot;&gt;&lt;span data-dcnode-id=&quot;1242&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wrapper&quot; data-dcnode-id=&quot;870&quot;&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;row&quot; data-dcnode-id=&quot;872&quot;&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;article class=&quot;col-xs-12 col-sm-7 col-mid-offset-1 col-mid-6&quot; data-dcnode-id=&quot;1159&quot;&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;m-rich-text m-rich-text__article m-rich-text__bullet-- m-rich-text__link--&quot; data-dcnode-id=&quot;1173&quot;&gt;&lt;span data-dcnode-id=&quot;1238&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1235&quot;&gt;&lt;p data-dcnode-id=&quot;1236&quot;&gt;&lt;span data-dcnode-id=&quot;1237&quot; instrument_node=&quot;&quot;&gt;There has been much in the media about the impact of the pandemic and the government response on children’s education, but arguably that impact has been magnified for those children and young people with Special Educational Needs and Disabilities (SEND).&lt;/span&gt;&lt;/p&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1234&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1232&quot;&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt;The Coronavirus Act 2020&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1229&quot;&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;The Coronavirus Act 2020 temporarily amended and extended deadlines for certain Local Authority duties towards children with SEND under The Children and Families Act 2014. These temporary amendments have now come to an end, but their impact is still being felt by children and their families. Children and Families Act 2014. are still catching up on work missed during the height of the pandemic, including annual reviews and in some cases drafting of Education, Health and Care Plans.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1228&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1226&quot;&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt;The Local Authority can no longer rely on these Coronavirus Act extensions for any delays from now on, including carrying out an annual review, ensuring access to the educational placement named in an Education, Health and Care Plan or arranging and maintaining all provision in Section F of an Education, Health and Care Plan.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1223&quot;&gt;&lt;span data-dcnode-id=&quot;1224&quot; instrument_node=&quot;&quot;&gt;Different ways of working virtually have proved successful&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1220&quot;&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;During the lockdowns, and time out of school, many children and young people with Education, Health and Care Plans received at least some of their special educational provision virtually. An example is therapy provision, where face-to-face appointments were not possible nor was the therapist’s attendance in school. A ‘work around’ had to be found to ensure these children and young people did not miss out on required provision.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1217&quot;&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;For some this method has been so successful that it continues, and it can be particularly helpful where there are staff shortages where time is effectively wasted travelling to each school or appointment. For those children and young people who require therapeutic provision face-to-face, this must continue.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1214&quot;&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;Annual review meetings have been taking place virtually online, which in many cases has allowed more attendees to be present and contribute. Most of the families that we work with, and review attendees have agreed that being held virtually has been beneficial and they would welcome this remaining.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1211&quot;&gt;&lt;span data-dcnode-id=&quot;1212&quot; instrument_node=&quot;&quot;&gt;Research and Publications&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1210&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1208&quot;&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt;There has been much research carried out by a variety of agencies and organisations, including the BBC and National Children’s Bureau. All are broadly similar in their findings that the issues for children and young people with SEND have been exacerbated by the pandemic.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1205&quot;&gt;&lt;span data-dcnode-id=&quot;1206&quot; instrument_node=&quot;&quot;&gt;In June 2021 Ofsted published a report titled SEND: old issues, new issues, next steps. Ofsted found that “long-standing problems in the system of care for children and young people with SEND have been made even worse by the COVID-19 pandemic”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1202&quot;&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;Part of the ‘Making Participation Work’ programme (funded by the Department for Education jointly delivered by Council for Disabled Children and Kids) consisted of the commissioning of an England-wide consultation with children and young people with SEND regarding the impact of the pandemic and lockdowns. This took place between February and March 2021 and concluded that “the experiences that children, young people, parents and carers have highlighted through this report clearly communicates the difficulties, pain, anxiety and stress of the last year”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1199&quot;&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;However, there were some positives identified in the research, including smaller class sizes, time to consolidate and the ability to be flexible. In order for the positives to remain, there needs to be a commitment from politicians and those working within the SEND field, as well as adequate funding.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1196&quot;&gt;&lt;span data-dcnode-id=&quot;1197&quot; instrument_node=&quot;&quot;&gt;Repeating a year&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1195&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;There are some children and young people for whom an additional year in education is requested to help address the lack of education received during the pandemic and lockdowns. Although there is no automatic right for children and young people with SEND to be educated out of their chronological year group (or repeat a year) it is possible, should it be required.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1190&quot;&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;If such a special educational provision arrangement is required, then it should be detailed as such in Section F of an Education, Health and Care Plan. Ideally a family will have evidence of the requirement or recommendation to support such a request, for example from an Educational Psychologist.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1189&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1187&quot;&gt;&lt;span data-dcnode-id=&quot;1188&quot; instrument_node=&quot;&quot;&gt;In June the Government stated that providers of 16-19 education would have the option to offer their students in year 13 the opportunity to repeat up to one year if they had been severely affected by the pandemic.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1184&quot;&gt;&lt;span data-dcnode-id=&quot;1185&quot; instrument_node=&quot;&quot;&gt;For children and young people with Education, Health and Care Plans the option to repeat a year should have been discussed at the annual review.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1181&quot;&gt;&lt;span data-dcnode-id=&quot;1182&quot; instrument_node=&quot;&quot;&gt;What next?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1178&quot;&gt;&lt;span data-dcnode-id=&quot;1179&quot; instrument_node=&quot;&quot;&gt;Undoubtedly the time out of school, away from much special educational provision and without a peer group, has put children and young people with SEND at a disadvantage. There is also a concern for families of whether this autumn and winter will bring further challenges, for example with pupils or staff being required to self-isolate or staff shortages due to Covid.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1175&quot;&gt;&lt;span data-dcnode-id=&quot;1176&quot; instrument_node=&quot;&quot;&gt;It is now more important than ever for young people and their families to be fully informed of their legal rights in relation to Special Educational Needs, including Education, Health and Care Plans and access to education. It is also evident that it will be increasingly necessary to challenge Local Authorities, so seeking advice from an expert legal team will be also be vital in assuring access to education.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1174&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1165&quot;&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;This information is for educational purposes only and does not constitute legal advice. It is recommended that specific professional advice is sought before acting on any of the information given. © Shoosmiths LLP 2022.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;
