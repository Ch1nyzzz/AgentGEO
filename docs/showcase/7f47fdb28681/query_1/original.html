            &quot;headline&quot;: &quot;Seven years on: what do young Brits think of Brexit vote?&quot;,
            &quot;description&quot;: &quot;Four Brits who were aged 14-19 when the Brexit referendum took place in 2016 speak to Euronews about how Brexit has changed their lives. They are now aged 21-26.&quot;,
            &quot;articleBody&quot;: &quot;Liv's story It's 23 June 2016 and Liv Stobart is 15 years old. She has just finished her summer exams but is awaiting a much bigger result.   As her sister scuttles into her room crying, her heart sinks. 52% out, 48% in. The UK has voted to  leave the European Union . A moment which Liv has never forgotten.\u00a0 \u201cI felt shocked and disheartened. I had no say in my future. It was a bewildering day. I still feel angry but I don\u2019t think holding another referendum is the answer because you have to respect the will of the majority. However, I would like to think there will be more options one day. Why not European visas for under-35s for instance?\u201d Liv grew up in Scotland, where 62% of people voted to remain.\u00a0 Since Brexit, she has thought a lot about the merits of Scottish independence. \u201cI am more in favour of independence now - with the prospect of  rejoining \u00a0the EU in mind - than before.\u00a0 \u0022But I also look at the mess Brexit has caused after 70 years of partnership and think what havoc independence would wreak given Scotland's 400 year partnership with the UK!\u201d Seven years on, Liv is still vocal about Brexit. \u0022I had a big debate with my boss a few months ago. He voted Leave and has two young teenagers. I know we\u2019ve led different lives, but I turned to him and was like don\u2019t you realise that they may want to move to Europe one day?\u0022 But for Liv - unlike many others - there is a way out. She has French relatives and is currently applying for a passport. \u201cI am so lucky to not be blocked like so many other young people. As soon as I get my French passport I am moving!\u201d Tom's story Tom Portsmouth recalls finishing up a bike race on Belgium cobbles when the referendum results were announced.\u00a0   \u201cI was only 14 years old but I was already working towards my dream of becoming a professional cyclist. I had no idea what was coming for me.\u0022\u00a0 Moving to Europe for bike racing was formerly a well-trodden route for British cyclists looking to make it as professionals. But since Brexit, cyclists must now sign a lucrative contract with a team in order to get a residency visa.\u00a0A tall order for young athletes starting out their careers.\u00a0 \u0022My non-cyclist friends often tell me to stop talking about Brexit - but I can't. It affects my career, dreams and life every single day.\u201d European legislation  stipulates that Brits can only spend 90 days at a time in Europe on a tourist visa.\u00a0This means that Tom spends much of his time ferrying back and forth for specific events.\u00a0 \u201cI can\u2019t race for six months of the racing season calendar. People don't understand the financial, physical and emotional cost of it all.\u0022 \u0022I worry that teams will stop taking on young Brits - and instead take European riders - because of the administrative pain involved.\u0022 Tom currently races for Belgian team Bingoal Wallonie Bruxelles Continental Development Team. After more than three years of negotiations, Britain formally exited the European Union on 20 January 2021. For a window of time, Brits were still able move to Europe and apply for a form of residency - but Tom was not able to do this due to the outbreak of the COVID-19 pandemic. \u201cI couldn't go out and settle in Europe as a pre-resident because the pandemic kicked off and it was impossible to travel. That was another opportunity missed. But that won't stop me for chasing my dreams for now.\u0022 Zak's story \u0022I was in my last year of school when Brexit happened and I voted to leave the European Union\u0022, says Zak Butler down the crackly line on his drive to work as a primary school teacher.   \u0022I remember being so happy with the result. When you vote on something and it goes through you get an initial sense of shared pride and satisfaction with all the people.\u0022\u00a0 Many of Zak's friends and family voted Leave - as did the majority of his Conservative constituency which is located near Portsmouth. Seven years on, Zak wonders whether he would make the same decision today. According to a May 2023  YouGov  poll, two-thirds of Leave voters believe Brexit has been more of a failure than a success. \u0022I was young and not very knowledgeable about politics.\u00a0Brexit was not planned for - and one of the reasons for this was that the Leave campaign wasn\u2019t totally truthful in its promises.\u0022 \u0022I care a lot about the NHS (Britain\u2019s National Health Service) but promises of providing it with more funding were false. I was disappointed.\u0022\u00a0 The Conservative government pledged to fund the NHS with an extra \u00a3350 million per week post-Brexit - but this did not materialise. Over the years, debating Brexit has got Zak into some heated discussions.\u00a0\u0022Some people blame the referendum result on my individual vote because the margin was so tight. Younger friends who weren't able to vote also get upset. Usually if I am going out with a new group of people I tend to try and find out their opinions beforehand to avoid things getting too heated.' Despite his doubts, Zak still believes Brexit could bring some positive changes.\u00a0 \u0022I don\u2019t like to be proven wrong\u0022, he says with a giggle. \u0022I think the fact that the UK was able to get COVID-19 vaccines quicker than the rest of the EU is one of the big benefits I've seen.\u0022 \u0022I would love to work in an international school in Europe but that opportunity is probably gone. However, I can still look at working in Canada, New Zealand, Australia instead.\u0022 For Zak, only time will tell what Brexit beholds.\u00a0\u0022You'll have to interview me again in 15 years!\u0022, his last words before he hangs up. Hugo's story Hugo was still at school when the UK voted to leave the European Union in 2016. He recalls his upset when the results came in \u0022I felt saddened because I had absolutely no control over the decision.\u0022 A passionate musician and trumpeter, Hugo went on to study jazz music at a British university.\u00a0\u0022When I finished my degree I didn\u2019t have a specific plan but I had been idealizing moving to Europe for a while.\u0022 He took the leap last September, moving to Barcelona for a two-year masters in modern music and jazz.\u00a0However, once the joy of being admitted to a prestigious music conservatoire in Barcelona faded, the  administrative  nightmare began. \u0022I had to get a lawyer to help me compile documents and get them translated - before even moving abroad I had spent about \u00a3500 on all of this. Next year I will also have to get health insurance which is going to cost about \u00a3500.\u0022 \u0022Without paying for all of this, I wouldn\u2019t have been able to go. Thankfully I'm on a student visa which also allows me to work.\u0022\u00a0 For now, Hugo intends on making the most of his time in Spain - as he knows staying on once he is no longer a student will be difficult. \u0022I would like to get granted a freelancer visa to stay but realistically I will have to be a pretty famous musician by the time I leave to get that\u0022, he says laughing. &quot;,

;,&quot;iconSharer&quot;:&quot;https:\/\/static.euronews.com\/website\/images\/vector\/social-icons\/article-redesign-threads.svg&quot;,&quot;linkQueryParam&quot;:&quot;text&quot;},&quot;whatsapp&quot;:{&quot;name&quot;:&quot;whatsapp&quot;,&quot;url&quot;:&quot;whatsapp:\/\/send?text=https%3A%2F%2Fwww.euronews.com%2F2023%2F06%2F24%2Fseven-years-on-what-do-young-brits-think-of-brexit-vote&amp;utm_source=Whatsapp&amp;utm_medium=Social&quot;,&quot;share&quot;:&quot;send_this&quot;,&quot;icon&quot;:&quot;https:\/\/static.euronews.com\/website\/images\/vector\/social-icons\/social_icon_whatsapp.svg&quot;,&quot;width&quot;:500,&quot;height&quot;:500,&quot;iconSharer&quot;:&quot;https:\/\/static.euronews.com\/website\/images\/vector\/social-icons\/article-redesign-whatsapp.svg&quot;,&quot;linkQueryParam&quot;:&quot;text&quot;}}},&quot;entities&quot;:{&quot;mainVersion&quot;:{&quot;fullUrl&quot;:&quot;\/2023\/06\/24\/seven-years-on-what-do-young-brits-think-of-brexit-vote&quot;,&quot;url&quot;:&quot;seven-years-on-what-do-young-brits-think-of-brexit-vote&quot;,&quot;title&quot;:&quot;Seven years on: what do young Brits think of Brexit vote?&quot;,&quot;publishedAt&quot;:1687584634},&quot;country&quot;:{&quot;id&quot;:291,&quot;urlSafeValue&quot;:&quot;united-kingdom&quot;,&quot;title&quot;:&quot;United Kingdom&quot;},&quot;continent&quot;:{&quot;id&quot;:104,&quot;urlSafeValue&quot;:&quot;europe&quot;,&quot;title&quot;:&quot;Europe&quot;},&quot;article&quot;:{&quot;id&quot;:2305490,&quot;cid&quot;:&quot;7703526&quot;,&quot;livestream&quot;:[],&quot;technicalTags&quot;:[&quot;euronews.byenglishwebteam&quot;,&quot;euronews&quot;,&quot;video-auto-play&quot;],&quot;relatedIds&quot;:[2331128,2361924,2372834],&quot;externalPartners&quot;:{&quot;dailymotionId&quot;:&quot;&quot;,&quot;youtubeId&quot;:&quot;&quot;},&quot;program&quot;:{&quot;id&quot;:&quot;world&quot;,&quot;urlSafeValue&quot;:&quot;world&quot;,&quot;title&quot;:&quot;World News&quot;},&quot;isWire&quot;:false,&quot;agencyKey&quot;:&quot;euronews&quot;,&quot;masterCMS&quot;:&quot;v2&quot;,&quot;adobeFromBreakingNews&quot;:false,&quot;contentType&quot;:&quot;normal&quot;,&quot;lastPublishedAt&quot;:1687594800,&quot;createdAt&quot;:1687535072,&quot;publishedAt&quot;:1687584634,&quot;firstPublishedAt&quot;:1687551359,&quot;lastModified&quot;:1687594800,&quot;path&quot;:&quot;\/2023\/06\/24\/seven-years-on-what-do-young-brits-think-of-brexit-vote&quot;,&quot;isMagazine&quot;:false,&quot;leadin&quot;:&quot;Four Brits who were aged 14-19 when the Brexit referendum took place in 2016 speak to Euronews about how Brexit has changed their lives. They are now aged 21-26.&quot;,&quot;pfpRelated&quot;:[],&quot;title&quot;:&quot;Seven years on: what do young Brits think of Brexit vote?&quot;,&quot;versionId&quot;:&quot;2&quot;,&quot;plainText&quot;:&quot;Liv's story \n\nIt's 23 June 2016 and Liv Stobart is 15 years old. She has just finished her summer exams but is awaiting a much bigger result.   \n\nAs her sister scuttles into her room crying, her heart sinks. 52% out, 48% in. The UK has voted to  leave the European Union . \n\nA moment which Liv has never forgotten.\u00a0 \n\n\u201cI felt shocked and disheartened. I had no say in my future. It was a bewildering day. I still feel angry but I don\u2019t think holding another referendum is the answer because you have to respect the will of the majority. However, I would like to think there will be more options one day. Why not European visas for under-35s for instance?\u201d \n\nLiv grew up in Scotland, where 62% of people voted to remain.\u00a0 \n\nSince Brexit, she has thought a lot about the merits of Scottish independence. \u201cI am more in favour of independence now - with the prospect of  rejoining \u00a0the EU in mind - than before.\u00a0 \n\n\&quot;But I also look at the mess Brexit has caused after 70 years of partnership and think what havoc independence would wreak given Scotland's 400 year partnership with the UK!\u201d \n\nSeven years on, Liv is still vocal about Brexit. \&quot;I had a big debate with my boss a few months ago. He voted Leave and has two young teenagers. I know we\u2019ve led different lives, but I turned to him and was like don\u2019t you realise that they may want to move to Europe one day?\&quot; \n\nBut for Liv - unlike many others - there is a way out. She has French relatives and is currently applying for a passport. \u201cI am so lucky to not be blocked like so many other young people. As soon as I get my French passport I am moving!\u201d \n\nTom's story \n\nTom Portsmouth recalls finishing up a bike race on Belgium cobbles when the referendum results were announced.\u00a0   \n\n\u201cI was only 14 years old but I was already working towards my dream of becoming a professional cyclist. I had no idea what was coming for me.\&quot;\u00a0 \n\nMoving to Europe for bike racing was formerly a well-trodden route for British cyclists looking to make it as professionals. But since Brexit, cyclists must now sign a lucrative contract with a team in order to get a residency visa.\u00a0A tall order for young athletes starting out their careers.\u00a0 \n\n\&quot;My non-cyclist friends often tell me to stop talking about Brexit - but I can't. It affects my career, dreams and life every single day.\u201d \n\nEuropean legislation  stipulates that Brits can only spend 90 days at a time in Europe on a tourist visa.\u00a0This means that Tom spends much of his time ferrying back and forth for specific events.\u00a0 \n\n\u201cI can\u2019t race for six months of the racing season calendar. People don't understand the financial, physical and emotional cost of it all.\&quot; \n\n\&quot;I worry that teams will stop taking on young Brits - and instead take European riders - because of the administrative pain involved.\&quot; Tom currently races for Belgian team Bingoal Wallonie Bruxelles Continental Development Team. \n\nAfter more than three years of negotiations, Britain formally exited the European Union on 20 January 2021. For a window of time, Brits were still able move to Europe and apply for a form of residency - but Tom was not able to do this due to the outbreak of the COVID-19 pandemic. \n\n\u201cI couldn't go out and settle in Europe as a pre-resident because the pandemic kicked off and it was impossible to travel. That was another opportunity missed. But that won't stop me for chasing my dreams for now.\&quot; \n\nZak's story \n\n\&quot;I was in my last year of school when Brexit happened and I voted to leave the European Union\&quot;, says Zak Butler down the crackly line on his drive to work as a primary school teacher.   \n\n\&quot;I remember being so happy with the result. When you vote on something and it goes through you get an initial sense of shared pride and satisfaction with all the people.\&quot;\u00a0 \n\nMany of Zak's friends and family voted Leave - as did the majority of his Conservative constituency which is located near Portsmouth. \n\nSeven years on, Zak wonders whether he would make the same decision today. According to a May 2023  YouGov  poll, two-thirds of Leave voters believe Brexit has been more of a failure than a success. \n\n\&quot;I was young and not very knowledgeable about politics.\u00a0Brexit was not planned for - and one of the reasons for this was that the Leave campaign wasn\u2019t totally truthful in its promises.\&quot; \n\n\&quot;I care a lot about the NHS (Britain\u2019s National Health Service) but promises of providing it with more funding were false. I was disappointed.\&quot;\u00a0 \n\nThe Conservative government pledged to fund the NHS with an extra \u00a3350 million per week post-Brexit - but this did not materialise. \n\nOver the years, debating Brexit has got Zak into some heated discussions.\u00a0\&quot;Some people blame the referendum result on my individual vote because the margin was so tight. Younger friends who weren't able to vote also get upset. Usually if I am going out with a new group of people I tend to try and find out their opinions beforehand to avoid things getting too heated.' \n\nDespite his doubts, Zak still believes Brexit could bring some positive changes.\u00a0 \n\n\&quot;I don\u2019t like to be proven wrong\&quot;, he says with a giggle. \&quot;I think the fact that the UK was able to get COVID-19 vaccines quicker than the rest of the EU is one of the big benefits I've seen.\&quot; \n\n\&quot;I would love to work in an international school in Europe but that opportunity is probably gone. However, I can still look at working in Canada, New Zealand, Australia instead.\&quot; \n\nFor Zak, only time will tell what Brexit beholds.\u00a0\&quot;You'll have to interview me again in 15 years!\&quot;, his last words before he hangs up. \n\nHugo's story \n\nHugo was still at school when the UK voted to leave the European Union in 2016. He recalls his upset when the results came in \&quot;I felt saddened because I had absolutely no control over the decision.\&quot; \n\nA passionate musician and trumpeter, Hugo went on to study jazz music at a British university.\u00a0\&quot;When I finished my degree I didn\u2019t have a specific plan but I had been idealizing moving to Europe for a while.\&quot; \n\nHe took the leap last September, moving to Barcelona for a two-year masters in modern music and jazz.\u00a0However, once the joy of being admitted to a prestigious music conservatoire in Barcelona faded, the  administrative  nightmare began. \n\n\&quot;I had to get a lawyer to help me compile documents and get them translated - before even moving abroad I had spent about \u00a3500 on all of this. Next year I will also have to get health insurance which is going to cost about \u00a3500.\&quot; \n\n\&quot;Without paying for all of this, I wouldn\u2019t have been able to go. Thankfully I'm on a student visa which also allows me to work.\&quot;\u00a0 \n\nFor now, Hugo intends on making the most of his time in Spain - as he knows staying on once he is no longer a student will be difficult. \n\n\&quot;I would like to get granted a freelancer visa to stay but realistically I will have to be a pretty famous musician by the time I leave to get that\&quot;, he says laughing. \n\n&quot;,&quot;advertising&quot;:0,&quot;advertisingData&quot;:{&quot;sponsorLogoReverse&quot;:&quot;&quot;,&quot;endDate&quot;:0,&quot;isDfp&quot;:false,&quot;sponsorLogo&quot;:&quot;&quot;,&quot;startDate&quot;:0},&quot;isLiveCoverage&quot;:false,&quot;canonical&quot;:&quot;https:\/\/www.euronews.com\/2023\/06\/24\/seven-years-on-what-do-young-brits-think-of-brexit-vote&quot;,&quot;houseNumber&quot;:&quot;230623_NWSU_52174194&quot;,&quot;country&quot;:{&quot;id&quot;:291,&quot;urlSafeValue&quot;:&quot;united-kingdom&quot;,&quot;title&quot;:&quot;United Kingdom&quot;},&quot;isBreakingNews&quot;:false,&quot;type&quot;:&quot;normal&quot;,&quot;numberWords&quot;:1227,&quot;isOpinion&quot;:false,&quot;grapeshotCategories&quot;:[&quot;'gv_safe'&quot;,&quot;'gt_mixed'&quot;,&quot;'gb_safe'&quot;,&quot;'pos_equinor'&quot;,&quot;'pos_facebook'&quot;,&quot;'pos_ukraine-russia'&quot;,&quot;'pos_ukrainecrisis'&quot;,&quot;'sm_politics'&quot;,&quot;'gs_politics'&quot;,&quot;'gs_travel'&quot;,&quot;'gs_politics_misc'&quot;,&quot;'gs_politics_issues_policy'&quot;,&quot;'gs_health'&quot;,&quot;'gs_politics_british'&quot;,&quot;'neg_citi_campaign'&quot;,&quot;'gs_travel_locations'&quot;,&quot;'gs_travel_locations_europe'&quot;,&quot;'neg_intel_en'&quot;,&quot;'custom_politics_brussels'&quot;,&quot;'neg_pmi'&quot;,&quot;'shadow9hu7_pos_pmi'&quot;],&quot;versions&quot;:{&quot;en&quot;:{&quot;fullUrl&quot;:&quot;\/2023\/06\/24\/seven-years-on-what-do-young-brits-think-of-brexit-vote&quot;,&quot;url&quot;:&quot;seven-years-on-what-do-young-brits-think-of-brexit-vote&quot;,&quot;title&quot;:&quot;Seven years on: what do young Brits think of Brexit vote?&quot;,&quot;publishedAt&quot;:1687584634}},&quot;daletEventName&quot;:&quot;WEB: seven years on from brexit&quot;,                     &lt;h2 class=&quot;c-article-summary&quot;&gt;
        Four Brits who were aged 14-19 when the Brexit referendum took place in 2016 speak to Euronews about how Brexit has changed their lives. They are now aged 21-26.
    &lt;/h2&gt;

        



&lt;div class=&quot;c-article-content js-article-content&quot; style=&quot;--widget_related_list_trans: 'Related';&quot;&gt;
  &lt;h2&gt;Liv's story&lt;/h2&gt;
&lt;p&gt;It's 23 June 2016 and Liv Stobart is 15 years old. She has just finished her summer exams but is awaiting a much bigger result.&lt;/p&gt;
&lt;p&gt;As her sister scuttles into her room crying, her heart sinks. 52% out, 48% in. The UK has voted to &lt;a href=&quot;https://www.euronews.com/my-europe/2022/12/29/brexit-draft-deal-first-of-many-hurdles-to-a-smooth-exit&quot;&gt;&lt;strong&gt;leave the European Union&lt;/strong&gt;&lt;/a&gt;.&lt;/p&gt;
&lt;p&gt;A moment which Liv has never forgotten. &lt;/p&gt;
&lt;p&gt;“I felt shocked and disheartened. I had no say in my future. It was a bewildering day. I still feel angry but I don’t think holding another referendum is the answer because you have to respect the will of the majority. However, I would like to think there will be more options one day. Why not European visas for under-35s for instance?”&lt;/p&gt;&lt;div id=&quot;connatix-container-disabled&quot; class=&quot;connatix-container&quot;&gt;&lt;div id=&quot;connatix-player-disabled&quot; data-ad-name=&quot;connatix&quot;&gt;&lt;script id=&quot;bed4ba19931d4bad9e9baedcd606f89f-disabled&quot; defer&gt;&lt;/script&gt;&lt;/div&gt;&lt;/div&gt;
&lt;p&gt;Liv grew up in Scotland, where 62% of people voted to remain. &lt;/p&gt;
&lt;p&gt;Since Brexit, she has thought a lot about the merits of Scottish independence. “I am more in favour of independence now - with the prospect of &lt;a href=&quot;https://www.euronews.com/my-europe/2020/01/31/scotland-has-democratic-mandate-for-new-independence-referendum-sturgeon-to-say-on-brexit&quot;&gt;&lt;strong&gt;rejoining&lt;/strong&gt;&lt;/a&gt; the EU in mind - than before. &lt;/p&gt;
&lt;p&gt;&quot;But I also look at the mess Brexit has caused after 70 years of partnership and think what havoc independence would wreak given Scotland's 400 year partnership with the UK!”&lt;/p&gt;
&lt;p&gt;Seven years on, Liv is still vocal about Brexit. &quot;I had a big debate with my boss a few months ago. He voted Leave and has two young teenagers. I know we’ve led different lives, but I turned to him and was like don’t you realise that they may want to move to Europe one day?&quot;&lt;/p&gt;
&lt;p&gt;But for Liv - unlike many others - there is a way out. She has French relatives and is currently applying for a passport. “I am so lucky to not be blocked like so many other young people. As soon as I get my French passport I am moving!”&lt;/p&gt;
&lt;h2&gt;&lt;strong&gt;Tom's story&lt;/strong&gt;&lt;/h2&gt;
&lt;p&gt;Tom Portsmouth recalls finishing up a bike race on Belgium cobbles when the referendum results were announced. &lt;/p&gt;
&lt;p&gt;“I was only 14 years old but I was already working towards my dream of becoming a professional cyclist. I had no idea what was coming for me.&quot; &lt;/p&gt;
&lt;p&gt;Moving to Europe for bike racing was formerly a well-trodden route for British cyclists looking to make it as professionals. But since Brexit, cyclists must now sign a lucrative contract with a team in order to get a residency visa. A tall order for young athletes starting out their careers. &lt;/p&gt;
&lt;p&gt;&quot;My non-cyclist friends often tell me to stop talking about Brexit - but I can't. It affects my career, dreams and life every single day.”&lt;/p&gt;

        &lt;div class=&quot;widget__ratio widget__ratio--auto&quot;&gt;
            &lt;div class=&quot;widget__contents&quot;&gt;
                &lt;figure class=&quot;widget__figure&quot;&gt;
                    &lt;img class=&quot;widgetImage__image&quot; loading=&quot;lazy&quot; src=&quot;https://static.euronews.com/articles/stories/07/70/35/26/606x606_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg&quot; alt=&quot;Ian Wrightson&quot; srcset=&quot;https://static.euronews.com/articles/stories/07/70/35/26/384x384_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 384w, https://static.euronews.com/articles/stories/07/70/35/26/640x640_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 640w, https://static.euronews.com/articles/stories/07/70/35/26/750x750_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 750w, https://static.euronews.com/articles/stories/07/70/35/26/828x828_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 828w, https://static.euronews.com/articles/stories/07/70/35/26/1080x1080_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 1080w, https://static.euronews.com/articles/stories/07/70/35/26/1200x1200_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 1200w, https://static.euronews.com/articles/stories/07/70/35/26/1920x1920_cmsv2_c5635586-f84f-573d-a651-1929ecd387ed-7703526.jpg 1920w&quot; sizes=&quot;(max-width: 768px) 95vw, (max-width: 1024px) 80vw, (max-width: 1280px) 45vw, 550px&quot;&gt;
                    &lt;figcaption class=&quot;widget__caption&quot;&gt;
                        &lt;span class=&quot;widget__captionWrap&quot;&gt;
                            &lt;span class=&quot;widget__captionText&quot;&gt;Cyclist Tom Portsmouth on a ride.&lt;/span&gt;
                                    &lt;span class=&quot;widget__captionCredit&quot;&gt;Ian Wrightson&lt;/span&gt;
                        &lt;/span&gt;
                    &lt;/figcaption&gt;
                &lt;/figure&gt;
            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;p&gt;&lt;a href=&quot;https://www.euronews.com/travel/2022/11/17/non-eu-citizens-can-only-stay-90-days-in-the-bloc-what-happens-if-you-overstay-the-limit&quot;&gt;&lt;strong&gt;European legislation&lt;/strong&gt;&lt;/a&gt; stipulates that Brits can only spend 90 days at a time in Europe on a tourist visa. This means that Tom spends much of his time ferrying back and forth for specific events. &lt;/p&gt;
&lt;p&gt;“I can’t race for six months of the racing season calendar. People don't understand the financial, physical and emotional cost of it all.&quot;&lt;/p&gt;
&lt;p&gt;&quot;I worry that teams will stop taking on young Brits - and instead take European riders - because of the administrative pain involved.&quot; Tom currently races for Belgian team Bingoal Wallonie Bruxelles Continental Development Team.&lt;/p&gt;
&lt;p&gt;After more than three years of negotiations, Britain formally exited the European Union on 20 January 2021. For a window of time, Brits were still able move to Europe and apply for a form of residency - but Tom was not able to do this due to the outbreak of the COVID-19 pandemic.&lt;/p&gt;
&lt;p&gt;“I couldn't go out and settle in Europe as a pre-resident because the pandemic kicked off and it was impossible to travel. That was another opportunity missed. But that won't stop me for chasing my dreams for now.&quot;&lt;/p&gt;
&lt;h2&gt;&lt;strong&gt;Zak's story&lt;/strong&gt;&lt;/h2&gt;
&lt;p&gt;&quot;I was in my last year of school when Brexit happened and I voted to leave the European Union&quot;, says Zak Butler down the crackly line on his drive to work as a primary school teacher.&lt;/p&gt;
&lt;p&gt;&quot;I remember being so happy with the result. When you vote on something and it goes through you get an initial sense of shared pride and satisfaction with all the people.&quot; &lt;/p&gt;
&lt;p&gt;Many of Zak's friends and family voted Leave - as did the majority of his Conservative constituency which is located near Portsmouth.&lt;/p&gt;
&lt;p&gt;Seven years on, Zak wonders whether he would make the same decision today. According to a May 2023 &lt;a href=&quot;https://yougov.co.uk/topics/politics/articles-reports/2023/05/22/most-britons-say-brexit-has-been-more-failure&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;&lt;strong&gt;YouGov&lt;/strong&gt;&lt;/a&gt; poll, two-thirds of Leave voters believe Brexit has been more of a failure than a success.&lt;/p&gt;
&lt;p&gt;&quot;I was young and not very knowledgeable about politics. Brexit was not planned for - and one of the reasons for this was that the Leave campaign wasn’t totally truthful in its promises.&quot;&lt;/p&gt;
&lt;p&gt;&quot;I care a lot about the NHS (Britain’s National Health Service) but promises of providing it with more funding were false. I was disappointed.&quot; &lt;/p&gt;
&lt;p&gt;The Conservative government pledged to fund the NHS with an extra £350 million per week post-Brexit - but this did not materialise.&lt;/p&gt;
&lt;p&gt;Over the years, debating Brexit has got Zak into some heated discussions. &quot;Some people blame the referendum result on my individual vote because the margin was so tight. Younger friends who weren't able to vote also get upset. Usually if I am going out with a new group of people I tend to try and find out their opinions beforehand to avoid things getting too heated.'&lt;/p&gt;
&lt;p&gt;Despite his doubts, Zak still believes Brexit could bring some positive changes. &lt;/p&gt;
&lt;p&gt;&quot;I don’t like to be proven wrong&quot;, he says with a giggle. &quot;I think the fact that the UK was able to get COVID-19 vaccines quicker than the rest of the EU is one of the big benefits I've seen.&quot;&lt;/p&gt;
&lt;p&gt;&quot;I would love to work in an international school in Europe but that opportunity is probably gone. However, I can still look at working in Canada, New Zealand, Australia instead.&quot;&lt;/p&gt;
&lt;p&gt;For Zak, only time will tell what Brexit beholds. &quot;You'll have to interview me again in 15 years!&quot;, his last words before he hangs up.&lt;/p&gt;
&lt;h2&gt;&lt;strong&gt;Hugo's story&lt;/strong&gt;&lt;/h2&gt;
&lt;p&gt;Hugo was still at school when the UK voted to leave the European Union in 2016. He recalls his upset when the results came in &quot;I felt saddened because I had absolutely no control over the decision.&quot;&lt;/p&gt;
&lt;p&gt;A passionate musician and trumpeter, Hugo went on to study jazz music at a British university. &quot;When I finished my degree I didn’t have a specific plan but I had been idealizing moving to Europe for a while.&quot;&lt;/p&gt;
&lt;p&gt;He took the leap last September, moving to Barcelona for a two-year masters in modern music and jazz. However, once the joy of being admitted to a prestigious music conservatoire in Barcelona faded, the &lt;a href=&quot;https://www.euronews.com/travel/2023/01/31/from-queues-to-visa-waivers-heres-how-brexit-has-changed-travel-for-brits&quot;&gt;&lt;strong&gt;administrative&lt;/strong&gt;&lt;/a&gt; nightmare began.&lt;/p&gt;
&lt;div class=&quot;widget widget--type-image widget--size-fullwidth widget--animation-fade-in widget--align-center&quot; data-ratio=&quot;0.56375&quot;&gt;
    &lt;div class=&quot;widget__wrapper&quot;&gt;
        &lt;div class=&quot;widget__ratio widget__ratio--auto&quot;&gt;
            &lt;div class=&quot;widget__contents&quot;&gt;
                &lt;figure class=&quot;widget__figure&quot;&gt;
                    &lt;img class=&quot;widgetImage__image&quot; loading=&quot;lazy&quot; src=&quot;https://static.euronews.com/articles/stories/07/70/35/26/808x456_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg&quot; alt=&quot;Chloe Langmuir&quot; srcset=&quot;https://static.euronews.com/articles/stories/07/70/35/26/384x216_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 384w, https://static.euronews.com/articles/stories/07/70/35/26/640x361_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 640w, https://static.euronews.com/articles/stories/07/70/35/26/750x423_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 750w, https://static.euronews.com/articles/stories/07/70/35/26/828x467_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 828w, https://static.euronews.com/articles/stories/07/70/35/26/1080x609_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 1080w, https://static.euronews.com/articles/stories/07/70/35/26/1200x677_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 1200w, https://static.euronews.com/articles/stories/07/70/35/26/1920x1082_cmsv2_07c58bff-79f0-5592-8bce-5322aec65875-7703526.jpg 1920w&quot; sizes=&quot;(max-width: 768px) 95vw, (max-width: 1024px) 80vw, (max-width: 1280px) 55vw, 728px&quot;&gt;
                    &lt;figcaption class=&quot;widget__caption&quot;&gt;
                        &lt;span class=&quot;widget__captionWrap&quot;&gt;
                            &lt;span class=&quot;widget__captionText&quot;&gt;Hugo Ellis from London moved to Spain last September.&lt;/span&gt;
                                    &lt;span class=&quot;widget__captionCredit&quot;&gt;Chloe Langmuir&lt;/span&gt;
                        &lt;/span&gt;
                    &lt;/figcaption&gt;
                &lt;/figure&gt;
            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;p&gt;&quot;I had to get a lawyer to help me compile documents and get them translated - before even moving abroad I had spent about £500 on all of this. Next year I will also have to get health insurance which is going to cost about £500.&quot;&lt;/p&gt;
&lt;p&gt;&quot;Without paying for all of this, I wouldn’t have been able to go. Thankfully I'm on a student visa which also allows me to work.&quot; &lt;/p&gt;
&lt;p&gt;For now, Hugo intends on making the most of his time in Spain - as he knows staying on once he is no longer a student will be difficult.&lt;/p&gt;
&lt;p&gt;&quot;I would like to get granted a freelancer visa to stay but realistically I will have to be a pretty famous musician by the time I leave to get that&quot;, he says laughing.&lt;/p&gt;


  &lt;/div&gt;
