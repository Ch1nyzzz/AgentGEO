&lt;/span&gt;&lt;div class=&quot;article-body clippable-element text-clippable image-clippable&quot; data-content-slug=&quot;872b3db5-45d3-4ba3-bda4-3166a075d02f&quot; data-content-type=&quot;Article&quot; data-dcnode-id=&quot;1176&quot; data-firm-ref=&quot;1015515&quot; data-friendly-name=&quot;The impact of the GDPR outside the EU&quot; data-integrity-check=&quot;410FE7D6613C08990AB64E8E0DD63FAF&quot; data-jurisdictions=&quot;67&quot; data-workareas=&quot;14,21&quot; id=&quot;lex-article-body&quot; style=&quot;display:block&quot;&gt;&lt;span data-dcnode-id=&quot;1952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1949&quot;&gt;&lt;em data-dcnode-id=&quot;1950&quot;&gt;&lt;span data-dcnode-id=&quot;1951&quot; instrument_node=&quot;&quot;&gt;Since its entry into force in May 2018, the GDPR has had a significant impact on data protection policy and enforcement beyond the EU. This review by Ius Laboris lawyers in 24 jurisdictions examines GDPR-related legal developments, decisions and harmonisation trends outside the EU. &lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1948&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1945&quot;&gt;&lt;em data-dcnode-id=&quot;1946&quot;&gt;&lt;span data-dcnode-id=&quot;1947&quot; instrument_node=&quot;&quot;&gt;By Anastasia Petrova, ALRUD Law Firm&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1944&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1942&quot;&gt;&lt;span data-dcnode-id=&quot;1943&quot; instrument_node=&quot;&quot;&gt;The General Data Protection Regulation (GDPR) celebrated its first anniversary on 25 May 2019. The first wave of decisions and fines has now been issued by a number of EU DPAs and it is interesting to examine the effects of the GDPR outside the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1939&quot;&gt;&lt;span data-dcnode-id=&quot;1940&quot; instrument_node=&quot;&quot;&gt;The GDPR aims to protect personal data of individuals in the EU, however, the impact of the GDPR goes far beyond the EU. In particular, if processing of personal data by a non-EU controller or processor is carried out in the context of the activities of an establishment of the controller or processor in the EU the GDPR will apply. This is also the case in certain cases where personal data of data subjects located in the EU is processed by a controller or processor that is not established in the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1936&quot;&gt;&lt;span data-dcnode-id=&quot;1937&quot; instrument_node=&quot;&quot;&gt;Since the GDPR sets out high fines (up to EUR 20 million or 4% of total worldwide annual turnover), non-EU organisations that meet the criteria above have also become concerned with ensuring compliance with the new rules.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1933&quot;&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;More than a year on, the GDPR has had varying effects in different countries: there are certain cases of GDPR enforcement outside the EU, some countries have incorporated GDPR provisions into their national legislation and/or got binding national DPA clarifications regarding the applicability of the GDPR; some have attempted to regulate data processing rules based on international treaties while others have maintained a wait-and-see attitude, taking no further steps on harmonisation of national legislation and GDPR. These and other questions are discussed below, on a country-by-country basis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1932&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1929&quot;&gt;&lt;strong data-dcnode-id=&quot;1930&quot;&gt;&lt;span data-dcnode-id=&quot;1931&quot; instrument_node=&quot;&quot;&gt;Argentina&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1924&quot;&gt;&lt;span data-dcnode-id=&quot;1927&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1925&quot;&gt;&lt;span data-dcnode-id=&quot;1926&quot; instrument_node=&quot;&quot;&gt;Verónica Puerta Basaldúa, Funes de Rioja&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1923&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1921&quot;&gt;&lt;span data-dcnode-id=&quot;1922&quot; instrument_node=&quot;&quot;&gt;The country has begun a legislative process to update the National Data protection regime, as a result of the enactment of the GDPR. The Congress is currently analysing a reform of Act 25326 on Data Protection and other related regulations. In January 2019, a new Resolution was passed on recommended practices for access to private data, including protection of biometric data, forms of consent to personal data treatment and access to databases, among other topics.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1920&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1916&quot;&gt;&lt;strong data-dcnode-id=&quot;1918&quot;&gt;&lt;span data-dcnode-id=&quot;1919&quot; instrument_node=&quot;&quot;&gt;Bahrain&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1912&quot;&gt;&lt;em data-dcnode-id=&quot;1913&quot;&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;By Nick O’Connell, Al Tamimi &amp;amp; Company&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1911&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1909&quot;&gt;&lt;span data-dcnode-id=&quot;1910&quot; instrument_node=&quot;&quot;&gt;Bahrain’s Personal Data Protection Law (Law No. 30 of 2018) came into force on 1 August 2019, 12 months after its publication in the official gazette. The law is based on a draft produced more than ten years ago, and does not specifically contemplate GDPR. Whether Bahrain will seek to revise this new legislation to be more aligned to GDPR is unclear, but would seem unlikely at this stage.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1908&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1906&quot;&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;While many companies active in Bahrain are seeking to comply with the requirements set out in the Personal Data Protection Law, the fact that associated Regulations have not yet been issued makes this difficult. For the moment, and noting our comments below regarding criminal offences, the fact that the Data Protection Authority contemplated in the law has not yet been established provides some comfort in terms of the low practical risk of enforcement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1905&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1903&quot;&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;The Personal Data Protection Law criminalises a variety of acts that would, at most, be the subject of administrative penalties in data protection laws elsewhere. Penalties generally comprise up to one year in prison and/or a fine of between BHD1,000 and BHD20,000 (between about USD 2,600 to about USD 53,000) (or a fine only in the case of corporate entities). The following are examples of activities that attract criminal penalties under the Law:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1902&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1882&quot;&gt;&lt;span data-dcnode-id=&quot;1901&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1899&quot;&gt;&lt;span data-dcnode-id=&quot;1900&quot; instrument_node=&quot;&quot;&gt;processing sensitive personal data in violation of the provision specifying requirements for processing sensitive personal data;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1898&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1896&quot;&gt;&lt;span data-dcnode-id=&quot;1897&quot; instrument_node=&quot;&quot;&gt;transferring personal data outside Bahrain contrary to the provisions specifying requirements for transfers to jurisdictions that provide an adequate level of data protection, and associated exceptions;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1895&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1893&quot;&gt;&lt;span data-dcnode-id=&quot;1894&quot; instrument_node=&quot;&quot;&gt;processing personal data without notifying the Authority in accordance with the provision that sets out the obligation to notify the Authority before commencing any data processing activities (except where certain exceptions apply), or failing to update such notification to the Authority;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1892&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1890&quot;&gt;&lt;span data-dcnode-id=&quot;1891&quot; instrument_node=&quot;&quot;&gt;processing personal data contrary to the provision that requires prior authorization from the Authority before processing personal data in certain circumstances;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1889&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1887&quot;&gt;&lt;span data-dcnode-id=&quot;1888&quot; instrument_node=&quot;&quot;&gt;providing false or misleading information to the Authority or to a data subject, or withholding relevant information from the Authority, or otherwise hindering the Authority’s work; and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1886&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1884&quot;&gt;&lt;span data-dcnode-id=&quot;1885&quot; instrument_node=&quot;&quot;&gt;disclosing any data or information accessed due to work, or using the same for own benefit or for the benefit of others unreasonably and in violation of the provisions of this law.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1883&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1881&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1879&quot;&gt;&lt;span data-dcnode-id=&quot;1880&quot; instrument_node=&quot;&quot;&gt;The Personal Data Protection Law does not specifically provide for data breach notification obligations (either to affected individuals or to the Data Protection Authority), although it is possible that requirements of this nature could be introduced when the Regulations are issued. Otherwise, loss or damage arising out of such events could be captured under other Bahrain law provisions, such as those providing for remedy where someone causes damage to another. Depending on the circumstances of a data breach, it may be prudent to consider notifying law enforcement authorities and affected individuals, although there is no generally applicable legal obligation to do so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1878&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1875&quot;&gt;&lt;strong data-dcnode-id=&quot;1876&quot;&gt;&lt;span data-dcnode-id=&quot;1877&quot; instrument_node=&quot;&quot;&gt;Brazil&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1874&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1871&quot;&gt;&lt;em data-dcnode-id=&quot;1872&quot;&gt;&lt;span data-dcnode-id=&quot;1873&quot; instrument_node=&quot;&quot;&gt;By Adriana Fernandes Rollo, Denise Louzano, Juliana Assi &amp;amp; Fábio Pereira, Veirano Advogados&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1870&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1868&quot;&gt;&lt;span data-dcnode-id=&quot;1869&quot; instrument_node=&quot;&quot;&gt;Compared to Europe, where the first data protection laws were created decades ago, Brazil has only recently joined comprehensive discussions on data protection regulations, more accurately in 2009. Until then, the Brazilian data protection regulatory framework was sector-based and primarily regulated by the country’s Civil Rights Framework for the Internet (Internet Act) and Consumer Protection Code, among others.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1867&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1865&quot;&gt;&lt;span data-dcnode-id=&quot;1866&quot; instrument_node=&quot;&quot;&gt;The text for the GDPR approved on 14 April 2016 has deeply impacted the Brazilian initiatives on the creation of specific data protection legislation and consequently inspired the text for the Brazilian General Data Protection Law (LGPD or Law 13.709/18), which was signed into law on 14 August 2018 and will come into force in August of 2020.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1864&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1862&quot;&gt;&lt;span data-dcnode-id=&quot;1863&quot; instrument_node=&quot;&quot;&gt;The legislation replicates key points of the European regulation, following the worldwide trend towards strengthening personal data protection, guaranteeing a series of rights to data subjects, as well as imposing important obligations and relevant penalties on processing agents. However, it also contains some particularities adapted to Brazil. For example, any consent obtained must be specific and data subjects can withdraw their consent at any time. Moreover, the Brazilian law creates ten legal bases allowing the processing of personal data, four more than the European legislation. These include performance of a contract, legitimate interests, legal basis for processing and the protection of credit. This last one is very specifically adapted to the needs of the credit sector in Brazil. This specific provision might suggest that the application of the LGPD can be more flexible in Brazil than what has been established in Europe.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1861&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1859&quot;&gt;&lt;span data-dcnode-id=&quot;1860&quot; instrument_node=&quot;&quot;&gt;On the other hand, similarly to the GDPR, the Brazilian law regulates controllers and processors of personal data and establishes the principle of extraterritoriality, that is, the Law also applies to processors based outside Brazil that treat data collected in Brazilian territory or offer goods or services to individuals located in Brazil, regardless of where the organisation is based.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1856&quot;&gt;&lt;span data-dcnode-id=&quot;1857&quot; instrument_node=&quot;&quot;&gt;Furthermore, the consequences of non-compliance with the LGPD can be just as severe as non-compliance with the GDPR. While EU enforcers can issue fines worth 4% of global revenue, Brazil's regime allows fines of up to 2% of Brazilian revenues, capped at BRL 50 million (approximately USD 13 million or EUR 11,395.140) per infraction.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1855&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1853&quot;&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;Regarding enforcement, Law No. 13,853/2019 established the creation of the National Data Protection Authority (‘NDPA’), which, among other powers, has the authority to:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1841&quot;&gt;&lt;span data-dcnode-id=&quot;1851&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1849&quot;&gt;&lt;span data-dcnode-id=&quot;1850&quot; instrument_node=&quot;&quot;&gt;regulate data protection and privacy matters;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1848&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1846&quot;&gt;&lt;span data-dcnode-id=&quot;1847&quot; instrument_node=&quot;&quot;&gt;impose administrative sanctions in the event of breach of the LGPD provisions;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1845&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1843&quot;&gt;&lt;span data-dcnode-id=&quot;1844&quot; instrument_node=&quot;&quot;&gt;propose guidelines for the creation of the National Policy for the Protection of Personal Data.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1842&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1838&quot;&gt;&lt;span data-dcnode-id=&quot;1839&quot; instrument_node=&quot;&quot;&gt;Since the LGPD is recent, controllers and processors still lack appropriate technology systems, data governance mechanisms, and ways to allow data subjects to exercise their rights. For this reason, organisations are now implementing measures to guarantee compliance with the GDPR and the LGPD when it comes into force, but there is still much more to do.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1837&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1835&quot;&gt;&lt;span data-dcnode-id=&quot;1836&quot; instrument_node=&quot;&quot;&gt;At the time of writing, there is no record of any Brazilian company facing GDPR enforcement, perhaps due to lack of supervision while the country is still adapting to this new regulatory scenario. Expectations are that when the ANPD is properly established and operating, organisations will face closer supervision and sanctions will be imposed on non-compliant organisations to guarantee the efficacy of data protection regulations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1834&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1831&quot;&gt;&lt;strong data-dcnode-id=&quot;1832&quot;&gt;&lt;span data-dcnode-id=&quot;1833&quot; instrument_node=&quot;&quot;&gt;China&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1830&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1827&quot;&gt;&lt;em data-dcnode-id=&quot;1828&quot;&gt;&lt;span data-dcnode-id=&quot;1829&quot; instrument_node=&quot;&quot;&gt;By Tracy Zhu, Fangda Partners&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1824&quot;&gt;&lt;span data-dcnode-id=&quot;1825&quot; instrument_node=&quot;&quot;&gt;The GDPR has been drawing the attention of various Chinese companies and the regulators since 2018 for the following reasons:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1823&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1812&quot;&gt;&lt;span data-dcnode-id=&quot;1822&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1820&quot;&gt;&lt;span data-dcnode-id=&quot;1821&quot; instrument_node=&quot;&quot;&gt;The magnitude of fines that can be imposed for violations of its provisions.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1819&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1817&quot;&gt;&lt;span data-dcnode-id=&quot;1818&quot; instrument_node=&quot;&quot;&gt;Its extra-territorial reach to organisations that are outside the EEA but collect and process personal data of data subjects in the EEA; and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1814&quot;&gt;&lt;span data-dcnode-id=&quot;1815&quot; instrument_node=&quot;&quot;&gt;It is seen by Chinese regulators as a good example of comprehensive legislation on personal data protection.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1811&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1809&quot;&gt;&lt;span data-dcnode-id=&quot;1810&quot; instrument_node=&quot;&quot;&gt;Unlike Japan, South Korea, Thailand or other countries in APAC where the GDPR is used as a benchmark for reviewing current legal regimes on personal data protection, the Chinese authorities do not recognise the direct application of such a foreign law but instead use the GDPR as a good reference for the developing data protection regime in China. In 2018 and the first half of 2019, in awe of the record-breaking fines that were imposed in a few headline law enforcement actions in the EU, the national standard committee (TC260) and some research institutions respectively published white papers commissioned by the Chinese authorities and provided guidance to Chinese organisations on complying with the GDPR, particularly where they have business in the EU or offer services globally, including to data subjects in the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1808&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1806&quot;&gt;&lt;span data-dcnode-id=&quot;1807&quot; instrument_node=&quot;&quot;&gt;To catch up with the trend of increasing transparency of personal data processing activities, China has launched a few nationwide law enforcement initiatives and campaigns focussing on privacy notices and curbing certain privacy practices such as bundled or forced consent. While there is no accountability principle in the Chinese Cyber Security Law, the way that the authorities approach organisation that are in violation of personal data protection laws in China is similar to the GDPR, in the sense that the authorities require those organisations to provide evidence of their compliance with the laws.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1805&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1803&quot;&gt;&lt;span data-dcnode-id=&quot;1804&quot; instrument_node=&quot;&quot;&gt;GDPR also sheds light on how to interpret the fundamental principles of data protection, particularly the European Data Protection Board’s guidelines and clarification. National standards on data protection and cyber security are multiplying in China. These include various principles and requirements under GDPR, such as data protection by design and by default, data protection impact assessments, vendor due diligence and more.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1802&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1800&quot;&gt;&lt;span data-dcnode-id=&quot;1801&quot; instrument_node=&quot;&quot;&gt;China is neither a signatory to Convention 108 nor a participating member of any regional cross-border data transfer regime such as CBPR. For the past two years, China has been working on its cross-border data transfer regime and the Chinese authorities are also seeking inspiration from the GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1799&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1797&quot;&gt;&lt;span data-dcnode-id=&quot;1798&quot; instrument_node=&quot;&quot;&gt;While Chinese companies have not yet received any fines from DPAs in the EU, after how Facebook monetised data was exposed in various incidents and in view of DPAs’ focus on GAFA (Google, Amazon, Facebook and Apple), Chinese companies are mindful about personal data protection, particularly where data subjects in the EU are under discussion. Where Chinese organisations have operations in the EU and local employees’ data is transferred back to headquarters in China, these organisations would also need to consider compliance with the GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1796&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1793&quot;&gt;&lt;strong data-dcnode-id=&quot;1794&quot;&gt;&lt;span data-dcnode-id=&quot;1795&quot; instrument_node=&quot;&quot;&gt;Egypt&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1789&quot;&gt;&lt;em data-dcnode-id=&quot;1790&quot;&gt;&lt;span data-dcnode-id=&quot;1791&quot; instrument_node=&quot;&quot;&gt;By Nick O’Connell, Al Tamimi &amp;amp; Company&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1786&quot;&gt;&lt;span data-dcnode-id=&quot;1787&quot; instrument_node=&quot;&quot;&gt;Some recent media reports have indicated that the Egyptian parliament has approved a draft data protection law. It seems that these reports are not quite accurate, and should have simply reported that a draft data protection law has been reviewed by a parliamentary committee. It is unclear whether the draft law has been prepared with GDPR in mind. At this very early stage of the legislative process, there is a high likelihood that the draft will undergo amendments.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1785&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1783&quot;&gt;&lt;span data-dcnode-id=&quot;1784&quot; instrument_node=&quot;&quot;&gt;In the absence of a modern data protection law, there are other Egyptian law considerations that could be material in the context of considering personal data processing activities, either in an HR context or more broadly. These range from general provisions protecting privacy or providing for remedies where someone causes damage to another, through to specific provisions in the anti-cybercrime legislation that could be material in the context of data processing activities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1780&quot;&gt;&lt;span data-dcnode-id=&quot;1781&quot; instrument_node=&quot;&quot;&gt;Depending on the circumstances of a data breach, it may be prudent to consider notifying law enforcement authorities and affected individuals, although there is no generally applicable legal obligation to do so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1779&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1776&quot;&gt;&lt;strong data-dcnode-id=&quot;1777&quot;&gt;&lt;span data-dcnode-id=&quot;1778&quot; instrument_node=&quot;&quot;&gt;Hong Kong&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1772&quot;&gt;&lt;em data-dcnode-id=&quot;1773&quot;&gt;&lt;span data-dcnode-id=&quot;1774&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Kathryn Weaver, Lewis Silkin&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1771&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1769&quot;&gt;&lt;span data-dcnode-id=&quot;1770&quot; instrument_node=&quot;&quot;&gt;As Hong Kong is home to many EU and UK headquartered companies, GDPR compliance has remained a hot topic notwithstanding the geographic distance between these jurisdictions. The Hong Kong Privacy Commissioner for Personal Data (‘PCPD’) has also publicly encouraged Hong Kong businesses to adopt standards more in line with those required by the GDPR, and has flagged that changes to Hong Kong’s data privacy laws are highly likely in order to bring the regime in line with EU requirements.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1768&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1766&quot;&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt;Until Hong Kong’s data protection laws are updated, however, the GDPR remains a much more onerous regime to comply with. The relative lack of teeth of the Hong Kong laws was highlighted by the recent and widely publicised data breach by Cathay Pacific Airways (‘Cathay’).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1765&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1763&quot;&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;On 6 June 2019, the Office of the PCPD published the results of its investigation into the data breach incident by Cathay. This breach was discovered by Cathay in March 2018 but only self-reported to the PCPD in October 2018. No penalties were imposed for the breach, which involved the personal data of 9.4 million passengers and registered users of Cathay’s website from over 260 locations globally. Instead, Cathay was given six months to take remedial actions specified in an enforcement notice.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1762&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1760&quot;&gt;&lt;span data-dcnode-id=&quot;1761&quot; instrument_node=&quot;&quot;&gt;Under the Personal Data (Privacy) Ordinance (‘PDPO’) Cathay will face a financial penalty if it fails to carry out these remedial measures. The maximum penalty for first conviction will only be HKD 50,000, although also potentially imprisonment for two years. If non-compliance continues after the initial conviction there will be a daily penalty of up to HKD 1,000.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1759&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1757&quot;&gt;&lt;span data-dcnode-id=&quot;1758&quot; instrument_node=&quot;&quot;&gt;This is obviously a far lesser sanction than would have been awarded under the GDPR. The enforcement notice does not deal with Cathay’s delay in reporting the breach, as there are no mandatory breach notification requirements in Hong Kong, although best practice recommendations in this regard are contained in a guidance note issued by the PCPD. In contrast, the GDPR requires certain types of personal data breach to be reported to the relevant supervisory authority within 72 hours after a data controller becomes aware of the breach. A failure to do so may attract the maximum fine of the higher of EUR 10 million or 2% of global turnover.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1754&quot;&gt;&lt;span data-dcnode-id=&quot;1755&quot; instrument_node=&quot;&quot;&gt;However, as Cathay does market its products and services to EU citizens, it is possible that it will face action from an EU regulator and it will be interesting to compare the consequences which arise as a result of the same data breach incident.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1753&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1751&quot;&gt;&lt;span data-dcnode-id=&quot;1752&quot; instrument_node=&quot;&quot;&gt;It is expected that Hong Kong is headed towards an overhaul of its PDPO following this and other recent high profile personal data breach incidents. Comments made by the PCPD in the Cathay enforcement notice in relation to the principle of accountability are potentially significant. This principle is incorporated into the GDPR and includes requirements to compile personal data inventories and to report data breaches. The PCPD stated that although the principle of accountability is yet to be provided for in the law of Hong Kong, businesses in Hong Kong should be well poised to adopt proactive data management measures now. We agree that the adoption of proactive measures is a sensible strategy. This will not only ensure that a business is better prepared for any future changes to the regime in Hong Kong, but may help to prevent enforcement action in other jurisdictions where the principle of accountability is already enshrined.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1750&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1747&quot;&gt;&lt;strong data-dcnode-id=&quot;1748&quot;&gt;&lt;span data-dcnode-id=&quot;1749&quot; instrument_node=&quot;&quot;&gt;Iraq&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1746&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1743&quot;&gt;&lt;em data-dcnode-id=&quot;1744&quot;&gt;&lt;span data-dcnode-id=&quot;1745&quot; instrument_node=&quot;&quot;&gt;Nick O’Connell, Al Tamimi &amp;amp; Company&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1740&quot;&gt;&lt;span data-dcnode-id=&quot;1741&quot; instrument_node=&quot;&quot;&gt;There is currently no modern data protection law in Iraq, and there is accordingly no Data Protection Authority. There are Iraqi law considerations that could be material in the context of considering personal data processing activities, either in an HR context or more broadly. These have not been prepared with GDPR in mind. They range from general provisions protecting privacy or providing for remedies where someone causes damage to another. Depending on the circumstances of a data breach, it may be prudent to consider notifying law enforcement authorities and affected individuals, although there is no generally applicable legal obligation to do so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1736&quot;&gt;&lt;strong data-dcnode-id=&quot;1737&quot;&gt;&lt;span data-dcnode-id=&quot;1738&quot; instrument_node=&quot;&quot;&gt;Israel&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1735&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1732&quot;&gt;&lt;em data-dcnode-id=&quot;1733&quot;&gt;&lt;span data-dcnode-id=&quot;1734&quot; instrument_node=&quot;&quot;&gt;By Ariel Yosefi, Herzog, Fox &amp;amp; Neeman&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1731&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1729&quot;&gt;&lt;span data-dcnode-id=&quot;1730&quot; instrument_node=&quot;&quot;&gt;The GDPR has significantly affected the Israeli regulatory environment in five main aspects; some are direct while the others are indirect.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1728&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1726&quot;&gt;&lt;span data-dcnode-id=&quot;1727&quot; instrument_node=&quot;&quot;&gt;1. In most cases, Israeli companies with a local operational presence in the EU or with a remote offering that is directed to the EU are subject to the GDPR’s territorial or extraterritorial reach. Consequently, such companies have been working on complying with the GDPR’s requirements in the past two years.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1725&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1723&quot;&gt;&lt;span data-dcnode-id=&quot;1724&quot; instrument_node=&quot;&quot;&gt;2. While in many cases local Israeli branches of multinational companies are not directly subject to the GDPR, as their employees and operations are focused on the Israeli market, these companies have been required to comply with global data protection policies which have been adopted by their global management, effectively requiring them to comply with many material aspects of the GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1722&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1720&quot;&gt;&lt;span data-dcnode-id=&quot;1721&quot; instrument_node=&quot;&quot;&gt;3. Similarly, Israeli service providers that process personal information of EU-based data controllers are subject to contractual requirements applying the material GDPR requirements, even when these service providers are not directly subject to the GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1717&quot;&gt;&lt;span data-dcnode-id=&quot;1718&quot; instrument_node=&quot;&quot;&gt;4. Israel has been recognised by the European Commission as an adequate jurisdiction for processing personal information, which allows a straight-forward movement of personal data between controllers and processors in both jurisdictions. This recognition was adopted pursuant the previous data protection regime in the EU, and while it continues to apply under the current regime, there are public discussions among regulators and scholars regarding the possibility of losing this important recognition when it is re-reviewed by the EU, considering the significant developments in the regulatory environment in the EU, with which Israeli law has not fully caught up.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1716&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1714&quot;&gt;&lt;span data-dcnode-id=&quot;1715&quot; instrument_node=&quot;&quot;&gt;5. The GDPR introduced an updated and significantly comprehensive data protection regulatory regime, which has to some extent affected the legislative review of the regime in Israel, as well as the regulatory approach. The GDPR indirectly affected the enactment of the Israeli Protection of Privacy (Data Security) Regulations in 2017, which entered into force at the same time as the GDPR and adopted requirements that are partially similar to the GDPR’s in some aspects, mainly data security and data processing management. The global effect of the GDPR has also indirectly affected the Israeli Data Protection Authority in its regulatory approach with respect to the enforcement of the new Regulations, as well as in enhancing its collaboration with EU-based data protection authorities in the context of GDPR enforcement on Israeli-based companies that are subject to the GDPR’s territorial or extraterritorial reach.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1710&quot;&gt;&lt;strong data-dcnode-id=&quot;1711&quot;&gt;&lt;span data-dcnode-id=&quot;1712&quot; instrument_node=&quot;&quot;&gt;Jordan&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1709&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1706&quot;&gt;&lt;em data-dcnode-id=&quot;1707&quot;&gt;&lt;span data-dcnode-id=&quot;1708&quot; instrument_node=&quot;&quot;&gt;By Nick O’Connell, Al Tamimi &amp;amp; Company&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1705&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1703&quot;&gt;&lt;span data-dcnode-id=&quot;1704&quot; instrument_node=&quot;&quot;&gt;A draft data protection law has been under consideration by the Jordanian parliament for a number of years. It is unclear whether the draft law has been prepared with GDPR in mind, and the likely timeframe for it to become law is unclear.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1700&quot;&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;There is no modern data protection law in Jordan, and there is accordingly no Data Protection Authority. There are Jordanian law considerations that could be material in the context of considering personal data processing activities, either in an HR context or more broadly. These range from general provisions protecting privacy or providing for remedies where someone causes damage to another. Depending on the circumstances of a data breach, it may be prudent to consider notifying law enforcement authorities and affected individuals, although there is no generally applicable legal obligation to do so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1696&quot;&gt;&lt;strong data-dcnode-id=&quot;1697&quot;&gt;&lt;span data-dcnode-id=&quot;1698&quot; instrument_node=&quot;&quot;&gt;Kazakhstan&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1695&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1692&quot;&gt;&lt;em data-dcnode-id=&quot;1693&quot;&gt;&lt;span data-dcnode-id=&quot;1694&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Yekaterina Khamidullina, AEQUITAS Law Firm&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1689&quot;&gt;&lt;span data-dcnode-id=&quot;1690&quot; instrument_node=&quot;&quot;&gt;The Enhanced Partnership and Cooperation Agreement (the ‘Agreement’) between the European Union and its member states and the Republic of Kazakhstan was signed on 21 December 2015. The Agreement was ratified by Kazakhstan on 25 March 2016 and it has been temporarily applied since 1 May 2016 according to a verbal statement from the European Union. Pursuant to Article 237 of the Agreement:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1686&quot;&gt;&lt;span data-dcnode-id=&quot;1687&quot; instrument_node=&quot;&quot;&gt;‘The Parties shall cooperate in order to ensure a high level of protection of personal data, through the exchange of best practices and experience, taking into account European and international legal instruments and standards. This may include, where appropriate and subject to applicable procedures, accession to, and implementation of, the Council of Europe Convention for the Protection of Individuals with regard to Automatic Processing of Personal Data and its additional Protocol by the Republic of Kazakhstan’ (‘Convention 108’).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1683&quot;&gt;&lt;span data-dcnode-id=&quot;1684&quot; instrument_node=&quot;&quot;&gt;As of September 2019, Kazakhstan has not yet acceded to Convention 108.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1680&quot;&gt;&lt;span data-dcnode-id=&quot;1681&quot; instrument_node=&quot;&quot;&gt;In 2018 and 2019, the issues around implementing GDPR standards were actively discussed by legal advisors, representatives of business, governmental authorities and the media at various conferences and seminars and huge number of articles were prepared on this issue.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1677&quot;&gt;&lt;span data-dcnode-id=&quot;1678&quot; instrument_node=&quot;&quot;&gt;During discussions, representatives of governmental authorities, including the Deputy Chairman of the Information Security Committee of the Ministry of Digital Development, Innovations and Aerospace Industry of the Republic of Kazakhstan, often mentioned the problems of enforcing violations of personal data legislation and the great number of gaps in Kazakhstan’s Law on Personal Data and Protection Thereof (‘Data Protection Law’), as well as the absence of a single authorised governmental agency on personal data protection (the role of which could include studying international best practice on personal data protection and the introduction of these practices in Kazakhstan).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1674&quot;&gt;&lt;span data-dcnode-id=&quot;1675&quot; instrument_node=&quot;&quot;&gt;Kazakhstan’s legal databases contain a file with a draft Law on ‘the Introduction of Amendments into Certain Legislative Acts of the Republic of Kazakhstan on the Issues of Digital Technologies Regulation’ (the ‘Draft Law File’). As of August 2019, the Draft Law File provides for the introduction of amendments into a great number of laws and codes of Kazakhstan, including into the Data Protection Law. The Draft Law File contains references to the GDPR as the examined international practice. According to the Draft Law File, an authorised governmental agency dealing with personal data issues has been proposed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1673&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1671&quot;&gt;&lt;span data-dcnode-id=&quot;1672&quot; instrument_node=&quot;&quot;&gt;In view of the above, we believe that in the years to come, Kazakhstan will gradually work on harmonisation of the national rules on personal data protection with GDPR standards.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1668&quot;&gt;&lt;span data-dcnode-id=&quot;1669&quot; instrument_node=&quot;&quot;&gt;To date, no Kazakhstan companies have faced GDPR enforcement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1667&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1664&quot;&gt;&lt;strong data-dcnode-id=&quot;1665&quot;&gt;&lt;span data-dcnode-id=&quot;1666&quot; instrument_node=&quot;&quot;&gt;Kuwait&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1663&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1660&quot;&gt;&lt;em data-dcnode-id=&quot;1661&quot;&gt;&lt;span data-dcnode-id=&quot;1662&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Nick O’Connell, Al Tamimi &amp;amp; Company&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1659&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1657&quot;&gt;&lt;span data-dcnode-id=&quot;1658&quot; instrument_node=&quot;&quot;&gt;There is currently no modern data protection law in Kuwait, and there is accordingly no Data Protection Authority. There are Kuwait law considerations that could be material in the context of considering personal data processing activities, either in an HR context or more broadly. These have not been prepared with GDPR in mind. Of specific relevance is the Electronic Transactions Law (Law No. 20 of 2014), which includes the following:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1656&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1654&quot;&gt;&lt;span data-dcnode-id=&quot;1655&quot; instrument_node=&quot;&quot;&gt;‘Other than in cases set forth by law, state bodies, authorities, public institutions, companies or non-state bodies or those working there-in shall not have the right to peruse, disclose, or publish any data or personal information registered in the electronic processing records or systems pertaining to the professional affairs or social status, medical status, or financial dues of persons or other personal information registered at one of the bodies stated therein unless by the consent of the person whom such information or data are related. Further, the bodies stated above shall set forth the necessary procedure for protecting the personal information and data from loss, damage, disclosure or invalid information or providing in-valid information. In addition, the aforementioned bodies, shall be bound to state the purpose for collecting the data and the collection of the data should be within the limits of such purpose.’&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1653&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1651&quot;&gt;&lt;span data-dcnode-id=&quot;1652&quot; instrument_node=&quot;&quot;&gt;Additionally, there are general provisions in Kuwaiti law protecting privacy and providing for remedies where someone causes damage to another. Depending on the circumstances of a data breach, it may be prudent to consider notifying law enforcement authorities and affected individuals, although there is no generally applicable legal obligation to do so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1650&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1647&quot;&gt;&lt;strong data-dcnode-id=&quot;1648&quot;&gt;&lt;span data-dcnode-id=&quot;1649&quot; instrument_node=&quot;&quot;&gt;Mexico&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1646&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1642&quot;&gt;&lt;em data-dcnode-id=&quot;1644&quot;&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt;By&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt; Teresa Espinosa, Basham, Ringe y Correa&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1641&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1639&quot;&gt;&lt;span data-dcnode-id=&quot;1640&quot; instrument_node=&quot;&quot;&gt;Before the GDPR became enforceable, and since then, many companies in Mexico worried about their compliance with data protection legislation, not only with regard to GDPR but also with local laws, as the intense media coverage that accompanied the GDPR created alarm in Mexico.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1638&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1636&quot;&gt;&lt;span data-dcnode-id=&quot;1637&quot; instrument_node=&quot;&quot;&gt;As a result of many changes in organisations’ compliance programmes and data protection practices worldwide, subsidiaries in Mexico had to adapt to new processes or practices implemented by their parent companies, even if it meant setting higher standards of data protection than those set out in Mexican laws.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1635&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1633&quot;&gt;&lt;span data-dcnode-id=&quot;1634&quot; instrument_node=&quot;&quot;&gt;Additionally, companies in Mexico that do business in the EU or that offer their services and goods there, and also companies that do not directly do business in the EU, were first interested in finding out to what extent, or if at all, the GDPR would apply to them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1630&quot;&gt;&lt;span data-dcnode-id=&quot;1631&quot; instrument_node=&quot;&quot;&gt;To dissipate doubts, various forums and events were held in the country, mainly in Mexico City, where debate regarding the extra-territorial scope of application of the GDPR was a trending topic, as there was a lot of confusion on the subject.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1629&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1627&quot;&gt;&lt;span data-dcnode-id=&quot;1628&quot; instrument_node=&quot;&quot;&gt;Even though some companies are still adapting to the GDPR, especially as they deal with new European clients, providers or individuals, there seems to be more awareness regarding its applicability and the obligations set out in the GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1626&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1624&quot;&gt;&lt;span data-dcnode-id=&quot;1625&quot; instrument_node=&quot;&quot;&gt;On the legislative side, it is expected the Mexican Data Protection legal framework will be amended to resemble the GDPR or to include certain concepts and obligations that are not currently regulated in the country. A couple of topics that could change are the inclusion of the concept of ‘legitimate interest’, as in Mexico consent is the only legal ground for processing data, and the need to require opt-in consent for marketing activities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1621&quot;&gt;&lt;span data-dcnode-id=&quot;1622&quot; instrument_node=&quot;&quot;&gt;Unfortunately, however, it is uncertain when data protection legislation will be amended, as it does not seem a pressing matter for the current (new) Government and administration.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1617&quot;&gt;&lt;strong data-dcnode-id=&quot;1618&quot;&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;Norway&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1613&quot;&gt;&lt;em data-dcnode-id=&quot;1614&quot;&gt;&lt;span data-dcnode-id=&quot;1615&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Claude A. Lenth, Hjort&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1612&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1610&quot;&gt;&lt;span data-dcnode-id=&quot;1611&quot; instrument_node=&quot;&quot;&gt;Although not a member of the EU, Norway is a member of the European Economic Area (EEA). The GDPR was incorporated into the EEA agreement and became applicable in Norway on 20 July 2018. Norway is thus bound by the GDPR in the same manner as EU Member States.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1609&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1607&quot;&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;In preparation for the GDPR, large areas of Norwegian law underwent a thorough review, and legislative changes were made as needed. This included the implementation of a new Privacy Act, and technical changes in the legislation relating to camera monitoring in the work place and access to employees’ emails. The Privacy Act section 6 (the equivalent of GDPR article 88(1)) give employers the right to process special categories of personal data if it is necessary for carrying out the employer or employee’s obligations or rights in the employment field.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1603&quot;&gt;&lt;strong data-dcnode-id=&quot;1604&quot;&gt;&lt;span data-dcnode-id=&quot;1605&quot; instrument_node=&quot;&quot;&gt;Oman&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1602&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1599&quot;&gt;&lt;em data-dcnode-id=&quot;1600&quot;&gt;&lt;span data-dcnode-id=&quot;1601&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Nick O’Connell, Al Tamimi &amp;amp; Company&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1598&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1596&quot;&gt;&lt;span data-dcnode-id=&quot;1597&quot; instrument_node=&quot;&quot;&gt;There is currently no modern data protection law in Oman, and there is accordingly no Data Protection Authority. There are Oman law considerations that could be material in the context of considering personal data processing activities, either in an HR context or more broadly. Of specific relevance is the Electronic Transactions Law (Royal Decree 69/2008), which prohibits data processing that prejudices the data subject’s rights, and which introduces security considerations applicable when transferring personal data abroad. Additionally, there are general provisions in Omani law protecting privacy and providing for remedies where someone causes damage to another. Depending on the circumstances of a data breach, it may be prudent to consider notifying law enforcement authorities and affected individuals, although there is no generally applicable legal obligation to do so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1595&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1592&quot;&gt;&lt;strong data-dcnode-id=&quot;1593&quot;&gt;&lt;span data-dcnode-id=&quot;1594&quot; instrument_node=&quot;&quot;&gt;Panama&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1591&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1588&quot;&gt;&lt;em data-dcnode-id=&quot;1589&quot;&gt;&lt;span data-dcnode-id=&quot;1590&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Mario Adolfo Rognoi, Arosemena, Noriega &amp;amp; Contreras&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1587&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1585&quot;&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;With the implementation of the GDPR, many multinational companies from EU countries with branches or subsidiaries in Panama, and companies established in Panama with European clients, have adjusted their privacy policies in order to comply with GDPR standards.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1582&quot;&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;In line with GDPR standards, Panama enacted Law 81 of 26 March 2019, regulating Personal Data Protection, (‘Law 81’), which will enter into effect on 29 March 2021. Before the enactment of Law 81, there were no specific rules that protected personal data, beyond the general principles contained in the Political Constitution, stating that private mail and documents cannot be examined without the owners' consent or by virtue of a court order for specific purposes in accordance with the law. Moreover, Panama has not signed any treaty aimed at harmonisation with GDPR standards.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1579&quot;&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;Pursuant to Law 81, holders of personal data have the following inalienable rights, without affecting any other legal rights:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1561&quot;&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1575&quot;&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;the right to obtain his or her personal data stored or processed in a public or private institution database;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1572&quot;&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt;the right to request the correction of personal data that is incorrect, incomplete, irrelevant, outdated, inaccurate, false or impertinent;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1569&quot;&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt;the right to request the elimination of personal data that is incorrect, incomplete, irrelevant, outdated, inaccurate, false or impertinent;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1566&quot;&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;the right, with sound and legitimate reasons related to a particular situation, to refuse to provide personal data or to permit that data be subject to certain treatment, as well as the right to revoke consent; and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1565&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1563&quot;&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;the right to obtain a copy of personal data in a structured manner in a generic format use, that permits that the data can be operated by different systems and/or transmitted to another responsible party.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1562&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1560&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1558&quot;&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt;In addition to the above, it is worth noting that Law 81 protects employees’ personal data. As a result, employers may only collect and process confidential employee information with the employee’s consent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1555&quot;&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt;To the best of our knowledge, no Panamanian organisations have been been fined and no complaints have been filed against Panamanian organisations for GDPR data breaches.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1551&quot;&gt;&lt;strong data-dcnode-id=&quot;1552&quot;&gt;&lt;span data-dcnode-id=&quot;1553&quot; instrument_node=&quot;&quot;&gt;Peru&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1550&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1547&quot;&gt;&lt;em data-dcnode-id=&quot;1548&quot;&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Carol Quiroz, Estudio Olaechea&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1544&quot;&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;Peru has a data privacy legal framework since 2011: the Peruvian Data Privacy Law, Nº 29733 (the ‘Law’) was published on 4 July 2011, and its implementing Regulations were published on 22 March 2013 (amended on 2017). Both entered fully into force in May 2013, so all the provisions of both Law and Regulations are mandatory for any individual or legal entity that processes personal information of individuals in Peru.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1541&quot;&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;The purpose of both Law and Regulations is to ensure the fundamental right to protection of personal data as set forth in paragraph 6 of Article 2 of the Peruvian Constitution, in order to guarantee its appropriate processing, so that the respect of other fundamental rights is also assured.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1538&quot;&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt;The Peruvian Data Protection Authority (the ‘Peruvian DPA’) has been aware of the entry into force of the European GDPR, as it is one of the most important data protection reforms in recent years. Indeed, on 4 September 2018, almost four months after it came into force, the Peruvian DPA issued Advisory Opinion N° 46-2018-JUS/DGTAIPD, expressly analysing the applicability of the GDPR in Peruvian territory.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1537&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1535&quot;&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;In this Advisory Opinion the Peruvian DPA stated:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1534&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1532&quot;&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;‘1. The GDPR will be applicable when the processing of personal data of residents of the European Union is carried out in this territory or within the framework of the activities of a branch in the European Union.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1529&quot;&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;2. The GDPR does not apply when European Union residents’ personal data is processed in Peru.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1526&quot;&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;3. Considering the sovereignty of the Peruvian State, the processing of personal data treated in Peru is subject to the provisions of Law N° 29733, Law on Protection of Personal Data, and its Regulations.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1525&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1523&quot;&gt;&lt;span data-dcnode-id=&quot;1524&quot; instrument_node=&quot;&quot;&gt;4. If a legal entity, whose main domicile is Peru, has a branch or headquarters in the European Union, it must comply with the regulations of such territory, within the processing activities carried out in it.’&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1522&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1520&quot;&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt;Therefore, the Peruvian DPA is conscious of the application of the GDPR provisions, although local regulations have prevailed. An example of this is that investigations into the processing of personal information on the Internet (web pages and platforms) have intensified, since the Law is extensive enough to include any type of processing. From our experience in the procedures regarding data processing, it has come to our knowledge that the Peruvian Authority uses the criteria applied by the Spanish Data Protection Authority as a first reference, so it is expected that in practice (using the investigation faculties granted by the Law), the authority will raise the standards of protection until an internal reform is enacted.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1519&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1517&quot;&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;Finally, please note that Peruvian Law includes the following guiding principles:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1516&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1493&quot;&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1513&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt;Personal information can only be processed with free, prior, informed, express and unequivocal consent (through ordinary or electronic means).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1510&quot;&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;The consent document must contain all the information regarding the collection and processing of data, data importers and cross-border flows of data.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;Express consent is only valid if the data subject can choose between an ‘Accept’ or ‘Reject’ option.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1504&quot;&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;Data collectors and data processors must adopt adequate technical, organisational and legal measures to ensure the safety of the information and avoid its alteration, loss or treatment or unauthorised access to it.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1501&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;Processors and sub-processors must guarantee adequate security measures.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1498&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;ARCO (access, rectification, cancellation and opposition) rights are guaranteed and any act or omission that contravenes or fails to comply with the provisions of the Law constitutes a punishable infraction.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1495&quot;&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt;Administrative fines can be imposed for minor, serious or very serious infractions. The amount of fines is between USD 640.00 to USD 130,000 approximately depending on the infraction.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1492&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1489&quot;&gt;&lt;strong data-dcnode-id=&quot;1490&quot;&gt;&lt;span data-dcnode-id=&quot;1491&quot; instrument_node=&quot;&quot;&gt;Qatar&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1485&quot;&gt;&lt;em data-dcnode-id=&quot;1486&quot;&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;By Nick O’Connell, Al Tamimi &amp;amp; Company&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1484&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1482&quot;&gt;&lt;span data-dcnode-id=&quot;1483&quot; instrument_node=&quot;&quot;&gt;Qatar’s Data Protection Law (Law 13 of 2016) came into effect in 2016. It was not drafted with GDPR in mind. The Data Protection Authority contemplated in the law has not yet been established, and the associated Regulations have not yet been established.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1481&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1479&quot;&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt;Under the Data Protection Law, processors have an unqualified obligation to notify data controllers of breach type events, whereas there is a materiality consideration (‘serious damage’) beyond which data controllers would be required to notify data subjects and the Data Protection Authority. Associated penalties include fines of up to QAR 5,000,000 or USD 1.3 million (for processors failing to notify) and QAR 1,000,000 or USD 2.6 million (for data controllers failing to notify).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1478&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1476&quot;&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;Otherwise, loss or damage arising out of such events could be captured under other Qatar law provisions, such as those providing for remedy where someone causes damage to another. Depending on the circumstances of a data breach (and in the absence of a Data Protection Authority as contemplated in the Data Protection Law), it may be prudent to consider notifying law enforcement authorities and affected individuals, although there is no generally applicable legal obligation to do so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1475&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1473&quot;&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;Separate to the generally applicable Data Protection Law, a licensing authority in Qatar, the Qatar Financial Centre, has a modern data protection law applicable to entities licensed by it. The QFC Data Protection Regulation 2005 was not prepared with GDPR in mind, although it bears some similarity to the European Data Protection Directive 95/46. It is unclear whether it is currently being reviewed in order to make it more consistent with GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1472&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1469&quot;&gt;&lt;strong data-dcnode-id=&quot;1470&quot;&gt;&lt;span data-dcnode-id=&quot;1471&quot; instrument_node=&quot;&quot;&gt;Russia&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1465&quot;&gt;&lt;em data-dcnode-id=&quot;1466&quot;&gt;&lt;span data-dcnode-id=&quot;1467&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Anastasia Petrova, ALRUD Law Firm&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1462&quot;&gt;&lt;span data-dcnode-id=&quot;1463&quot; instrument_node=&quot;&quot;&gt;Since many Russian companies have branch or representative offices or subsidiaries in the EU or in target European markets, ensuring compliance with the GDPR has been quite a hot topic in Russia during the past year. In particular, this concern was expressed by, among others, e-commerce companies, banks, carriers, telecoms operators and social networks.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1459&quot;&gt;&lt;span data-dcnode-id=&quot;1460&quot; instrument_node=&quot;&quot;&gt;At first, the Russian DPA was sceptical about the GDPR’s applicability to Russian entities and there is still no national legislation implementing GDPR requirements. However, eventually the Russian DPA issued brief practical guidance regarding territorial applicability of the GDPR, intended to instruct Russian companies on GDPR compliance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1456&quot;&gt;&lt;span data-dcnode-id=&quot;1457&quot; instrument_node=&quot;&quot;&gt;Further, on 10 October 2018 Russia signed a protocol modernising the Convention for the Protection of Individuals with regard to Automatic Processing of Personal Data dd. 1981 (Convention 108). As a party to Convention 108, Russia will have to incorporate the amendments under the protocol and ensure their proper enforcement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1455&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1453&quot;&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;The protocol significantly increases the level of data protection and specifies principles and requirements already implemented in the GDPR. In this sense, incorporation of the protocol’s provisions into national legislation will be a step forward for the harmonisation of Russian data protection legislation with European. Potential novelties in Russian data protection legislation include an obligation to notify data breaches, the roles of data processor and data recipient, new types of sensitive data and a ‘privacy by design’ principle.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1452&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1450&quot;&gt;&lt;span data-dcnode-id=&quot;1451&quot; instrument_node=&quot;&quot;&gt;At the moment Russian companies have not faced GDPR enforcement. However, in August 2018, Belarusian citizen Christian Shinkevich filed a complaint against the well-known Russian social network Vkontakte to the Polish data protection authority. He suggested that Vkontakte’s data processing practices did not meet the privacy standards introduced by the GDPR. This case is still under consideration and currently it is hard to predict its possible outcome.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1449&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1446&quot;&gt;&lt;strong data-dcnode-id=&quot;1447&quot;&gt;&lt;span data-dcnode-id=&quot;1448&quot; instrument_node=&quot;&quot;&gt;Saudi Arabia&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1441&quot;&gt;&lt;span data-dcnode-id=&quot;1444&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1442&quot;&gt;&lt;span data-dcnode-id=&quot;1443&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Nick O’Connell, Al Tamimi &amp;amp; Company&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1438&quot;&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;Saudi Arabia’s law is based on Islamic Shari’ah, which generally affords protection to the privacy of persons. The Basic Law of Governance (a constitution-like document), states that the State shall protect human rights in accordance with the Islamic Shari‘ah. It also contains general protections on correspondence by telegraph and mail, telephone conversations, and other means of communication, which may not be seized, delayed, viewed, or listened to except in cases set forth in the law. The recently issued E-Commerce Law contains provisions relating to protection of personal data in an e-commerce context, including both B2B and B2C e-commerce activities. The Cloud Computing Regulatory Framework, issued by the Communications and Information Technology Commission, contains restrictions relating to the use of cloud computing, and the transfer of customer data to recipients outside Saudi Arabia. The Labour Law contains provisions relating to the maintaining of a file for employees, although this does not go into any detail in terms of data protection principles. In general terms, these are the laws and regulations that we would consider in addressing data protection issues from a Saudi law perspective.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1437&quot; instrument_node=&quot;&quot;&gt;
