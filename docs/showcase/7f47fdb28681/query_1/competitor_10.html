&lt;/span&gt;&lt;p data-dcnode-id=&quot;1435&quot;&gt;&lt;span data-dcnode-id=&quot;1436&quot; instrument_node=&quot;&quot;&gt;Local media reports indicate that a draft data protection law is currently under consideration by the Saudi legislative body. This is not yet publicly available, although it is unlikely that it has been prepared with GDPR in mind.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1431&quot;&gt;&lt;strong data-dcnode-id=&quot;1432&quot;&gt;&lt;span data-dcnode-id=&quot;1433&quot; instrument_node=&quot;&quot;&gt;Singapore&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1427&quot;&gt;&lt;em data-dcnode-id=&quot;1428&quot;&gt;&lt;span data-dcnode-id=&quot;1429&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Lionel Tan, Rajah &amp;amp; Tann Singapore LLP&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1426&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1424&quot;&gt;&lt;span data-dcnode-id=&quot;1425&quot; instrument_node=&quot;&quot;&gt;Singapore is widely considered to be a leading business hub in the Asia-Pacific region and numerous multinational corporations have established their headquarters in Singapore. Their business operations might include potential data transfers between their European and Singapore offices, or the targeting of European subjects to proffer goods and services. Furthermore, with Singapore being the EU’s largest trading partner in the Association of Southeast Asian Nations (ASEAN), it is inevitable that many businesses and organisations based in Singapore will be affected by the GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1423&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1420&quot;&gt;&lt;em data-dcnode-id=&quot;1421&quot;&gt;&lt;span data-dcnode-id=&quot;1422&quot; instrument_node=&quot;&quot;&gt;Government response&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1419&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1417&quot;&gt;&lt;span data-dcnode-id=&quot;1418&quot; instrument_node=&quot;&quot;&gt;The Personal Data Protection Commission (PDPC), Singapore’s data protection regulators, have responded by publishing a factsheet to help businesses better understand the GDPR when applied to the Singaporean context.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1416&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1414&quot;&gt;&lt;span data-dcnode-id=&quot;1415&quot; instrument_node=&quot;&quot;&gt;This included outlining the criteria of who comes under the GDPR. As explained in the factsheet, the main criteria includes organisations that process data which relates to:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1413&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1405&quot;&gt;&lt;span data-dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1410&quot;&gt;&lt;span data-dcnode-id=&quot;1411&quot; instrument_node=&quot;&quot;&gt;offering goods and services to individuals in the EU;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1407&quot;&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;monitoring the behaviour of individuals in the EU.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1406&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1402&quot;&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;Key considerations for ascertaining whether the organisation is offering goods or services to individuals in the EU were also included, and this included the use of a language or currency that is generally used in one or more EU Member States, with the possibility of ordering goods and services in that language.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1399&quot;&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt;The PDPC also distilled the key requirements of the GDPR, helping Singapore firms coming under the GDPR better understand how to comply with it. Key requirements highlighted included:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1381&quot;&gt;&lt;span data-dcnode-id=&quot;1397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1395&quot;&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;basis of processing (Article 6);&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1392&quot;&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt;rights of Individual (Articles 15, 16, 17, 18, 20, 21 &amp;amp; 22);&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1389&quot;&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;accountability and Governance (Articles 25, 35 and 37);&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1386&quot;&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;data breach notification (Articles 33 and 34);&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1385&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1383&quot;&gt;&lt;span data-dcnode-id=&quot;1384&quot; instrument_node=&quot;&quot;&gt;administrative fines (Article 83).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1380&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1378&quot;&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;The PDPC also published online FAQs to help businesses better understand whether the GDPR applies to them, and if so, what Singapore firms need to do to comply with its provisions. The PDPC stressed that requirements for the local Personal Data Protection Act (‘PDPA’) differ from that of the GDPR, and that compliance with the PDPA does not equate to compliance with the GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1375&quot;&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;To help businesses based in Singapore better understand the extent of applicability of GDPR in their own business operations, the PDPC also included real-life scenarios of businesses where GDPR is likely to apply.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1374&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1372&quot;&gt;&lt;span data-dcnode-id=&quot;1373&quot; instrument_node=&quot;&quot;&gt;At the moment, Singapore does not have the right to data portability under the PDPA. The right to data portability is one of the eight rights enforced under the GDPR. To allow for a measure of congruence between the GDPR and the local PDPA, the PDPC, as part of an ongoing review of the PDPA, is considering introducing a Data Portability Obligation under the PDPA. The PDPC, with the Competition and Consumer Commission of Singapore (CCCS), has published a discussion paper on data portability to help businesses and other stakeholders better understand the benefits. The PDPC has also held a public consultation on this issue, seeking feedback and input from various stakeholders to assist in creating data portability provision under the PDPA.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1371&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1368&quot;&gt;&lt;em data-dcnode-id=&quot;1369&quot;&gt;&lt;span data-dcnode-id=&quot;1370&quot; instrument_node=&quot;&quot;&gt;Private sector response&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1367&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1365&quot;&gt;&lt;span data-dcnode-id=&quot;1366&quot; instrument_node=&quot;&quot;&gt;According to the Global Forensic Data Analytics Survey 2018 done by Ernst &amp;amp; Young advisory services, nine out ten companies in Singapore do not have a plan to cope with GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1362&quot;&gt;&lt;span data-dcnode-id=&quot;1363&quot; instrument_node=&quot;&quot;&gt;Professional associations and higher education institutions based in Singapore are offering certification programs and workshops to help professionals and businesses better understand the various aspects of becoming GDPR compliant.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1358&quot;&gt;&lt;strong data-dcnode-id=&quot;1359&quot;&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;Ukraine &lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1354&quot;&gt;&lt;em data-dcnode-id=&quot;1355&quot;&gt;&lt;span data-dcnode-id=&quot;1356&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Oleksandr Melnyk, Vasil Kisil &amp;amp; Partners&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1351&quot;&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;More than one year since the GDPR took effect, the Ukrainian authorities have demonstrated themselves to be more declarative than proactive in its implementation or clarification. Unlike the state, however, the Ukrainian business community and associations have taken a vigorous approach in implementing GDPR-compliant practices, even in the absence of guidance from the local DPA (the Parliamentary Commissioner on Human Rights).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1348&quot;&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt;Back in June 2014, Ukraine concluded an Association Agreement with the EU (the ‘Agreement’). Apparently, the Agreement could not provide for GDPR implementation since the GDPR did not exist at that time. However, under Article 15 of the Agreement, Ukraine and the EU agreed to cooperate ‘in order to ensure an adequate level of protection of personal data in accordance with the highest European and international standards.’&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1345&quot;&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt;Led by this commitment, in October 2017, the Ukrainian Government planned to implement GDPR into national legislation by 25 May 2018, that is, simultaneously with the GDPR taking effect in the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1342&quot;&gt;&lt;span data-dcnode-id=&quot;1343&quot; instrument_node=&quot;&quot;&gt;It comes at no surprise that such an ambitious goal could not be reached in less than six months, and even at the time of writing the GDPR has not been implemented into Ukrainian national legislation. The local DPA, supported by the EU Twinning project, has made several attempts to draft an implementation bill, on which Parliament has not voted. With a new Parliament being elected recently and a new state policy of complete digital transformation, we expect to see new GDPR-related bills.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1339&quot;&gt;&lt;span data-dcnode-id=&quot;1340&quot; instrument_node=&quot;&quot;&gt;At the same time, the Ukrainian DPA has not tried to clarify the GDPR provisions to local businesses, leaving them unclear how the GDPR will apply in Ukraine, and if the Ukrainian DPA will assist its partners from the EU to enforce it locally.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1336&quot;&gt;&lt;span data-dcnode-id=&quot;1337&quot; instrument_node=&quot;&quot;&gt;On the other hand, the Ukrainian business community and professional associations have tried to implement GDPR-compliant practices, even in the absence of clarifications from the local DPA. Companies in the e-commerce, fintech, IT outsourcing and product sectors, as well as banks, mobile operators, and others, have adopted their own policies and procedures to be GDPR-compliant. It is also worth mentioning that Ukrainian IT associations are working on getting the EU Commission’s adequacy decision for the Ukrainian IT industry as a ‘specified sector within third country’, pursuant to Article 45 of the GDPR. This decision could significantly boost the IT services market and make it more competitive for European customers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1333&quot;&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt;Finally, we have not seen any GDPR-related cases within the last year, or any attempts by European DPAs to enforce GDPR against Ukrainian companies. But with GDPR enforcement gaining speed in the EU, we may soon see how it will work in Ukraine too.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1328&quot;&gt;&lt;strong data-dcnode-id=&quot;1330&quot;&gt;&lt;span data-dcnode-id=&quot;1331&quot; instrument_node=&quot;&quot;&gt;United Arab Emirates&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1323&quot;&gt;&lt;em data-dcnode-id=&quot;1325&quot;&gt;&lt;span data-dcnode-id=&quot;1326&quot; instrument_node=&quot;&quot;&gt;By Nick O’Connell, Al Tamimi &amp;amp; Compan&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;y&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1322&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1320&quot;&gt;&lt;span data-dcnode-id=&quot;1321&quot; instrument_node=&quot;&quot;&gt;There is currently no modern data protection law of general application in the United Arab Emirates, and there is accordingly no Data Protection Authority.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1317&quot;&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;Local media reports indicate that a draft data protection law applicable to the financial services sector is being considered, along with a draft data protection law of general application. There has been no indication of the expected timeline for issuance of these laws.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1316&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1314&quot;&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;Otherwise, there are local law considerations that could be material in the context of considering personal data processing activities, either in an HR context or more broadly. These include penal code prohibitions on disclosures of secrets or misuse of information/data, as well as sector specific considerations such as a healthcare technology law requiring data localisation and an IoT (Internet of Things) policy requiring the same. None of these local law considerations have been prepared with GDPR in mind.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1313&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1311&quot;&gt;&lt;span data-dcnode-id=&quot;1312&quot; instrument_node=&quot;&quot;&gt;Depending on the circumstances of a data breach, it may be prudent to consider notifying law enforcement authorities and affected individuals, although there is no generally applicable legal obligation to do so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1308&quot;&gt;&lt;span data-dcnode-id=&quot;1309&quot; instrument_node=&quot;&quot;&gt;The UAE has a number of free zones, some of which have modern data protection regimes applicable to entities licensed in such free zones. Besides a healthcare-focussed free zone that has regulations relating to patient health information, there are two notable financial services free zones: the Dubai International Financial Centre (DIFC); and Abu Dhabi Global Market (ADGM). ADGM and DIFC can be understood as legal jurisdictions with a high degree of legislative autonomy. Both have modern data protection regimes that reflect some degree of similarity with the European Data Protection Directive 95/46. The data protection rules in both these jurisdictions are currently being updated for general consistency with GDPR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1304&quot;&gt;&lt;strong data-dcnode-id=&quot;1305&quot;&gt;&lt;span data-dcnode-id=&quot;1306&quot; instrument_node=&quot;&quot;&gt;United States&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1300&quot;&gt;&lt;em data-dcnode-id=&quot;1301&quot;&gt;&lt;span data-dcnode-id=&quot;1302&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Danielle Van Katwyk, FordHarrison LLP&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1299&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1297&quot;&gt;&lt;span data-dcnode-id=&quot;1298&quot; instrument_node=&quot;&quot;&gt;The implementation of the GDPR has the potential to greatly affect US companies and their current business practices. US companies with employees in the EU or that are doing business in the EU must become aware of the complexity of the GDPR and analyse whether the regulations apply to them. A US business subject to the GDPR should evaluate its potential impact and analyse how best to comply with its provisions. It is best practice to design, implement and maintain a comprehensive data protection compliance programme to implement the GDPS’s requirements and ensure compliance. Failure to do so could expose US companies significant penalties (including the greater of 4% of global revenue or EUR 20 million).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1296&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1294&quot;&gt;&lt;span data-dcnode-id=&quot;1295&quot; instrument_node=&quot;&quot;&gt;California has become the first state to introduce privacy protection for individuals’ personal data comparable to that provided under the GDPR. The California Consumer Privacy Act of 2018 (‘CCPA’ or the ‘Act’), which takes effect on 1 January 2020, is a sweeping digital privacy law that creates new protections and rights for consumers’ personal data.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1293&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1291&quot;&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;The CCPA will grant California consumers the following rights:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1270&quot;&gt;&lt;span data-dcnode-id=&quot;1289&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1287&quot;&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt;to know what personal information is being collected about them;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1286&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1284&quot;&gt;&lt;span data-dcnode-id=&quot;1285&quot; instrument_node=&quot;&quot;&gt;to know whether their personal information is sold or disclosed and to whom;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1281&quot;&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;to say no to the sale of personal information;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1278&quot;&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt;to access their personal information;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1277&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1275&quot;&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;to equal service and price, even if they exercise their privacy rights (e.g., businesses may presumably offer tiered pricing for goods and services, such as offering higher prices for increased privacy); and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1274&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1272&quot;&gt;&lt;span data-dcnode-id=&quot;1273&quot; instrument_node=&quot;&quot;&gt;in addition, to hold companies liable for data breaches.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1271&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1269&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1267&quot;&gt;&lt;span data-dcnode-id=&quot;1268&quot; instrument_node=&quot;&quot;&gt;Efforts to amend the CCPA continue since its quick passage.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1264&quot;&gt;&lt;span data-dcnode-id=&quot;1265&quot; instrument_node=&quot;&quot;&gt;As amended, the CCPA defines ‘personal information’ much more broadly than other privacy statutes in the United States, including California’s own data breach notification statute, closely aligning with the GDPR’s definition of ‘personal information.’ Personal information under the CCPA includes:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1263&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1261&quot;&gt;&lt;span data-dcnode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;‘information that identifies, relates to, describes, is reasonably capable of being associated with, or could be reasonably linked, directly or indirectly, with a particular consumer or household.’&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1260&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1258&quot;&gt;&lt;span data-dcnode-id=&quot;1259&quot; instrument_node=&quot;&quot;&gt;This broad definition specifically includes:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1255&quot;&gt;&lt;span data-dcnode-id=&quot;1256&quot; instrument_node=&quot;&quot;&gt;‘internet or other electronic network activity information, including, but not limited to, browsing history, search history, and information regarding a consumer’s interaction with an internet website, application or advertisement.’&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1254&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1252&quot;&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;Notably, since the CCPA covers ‘households’, this means it protects data even if the record does not contain a name nor relate to a single individual.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1251&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1249&quot;&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt;Additionally, the CCPA requires businesses to make disclosures about the information and the purposes for which it is used. Specifically, under the CCPA, California consumers now have the right to request a business to disclose:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1234&quot;&gt;&lt;span data-dcnode-id=&quot;1247&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1245&quot;&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt;the categories and specific pieces of personal information that it collects about the consumer;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1244&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1242&quot;&gt;&lt;span data-dcnode-id=&quot;1243&quot; instrument_node=&quot;&quot;&gt;the categories of sources from which that information is collected;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1239&quot;&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;the business purposes for collecting or selling the information; and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1238&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1236&quot;&gt;&lt;span data-dcnode-id=&quot;1237&quot; instrument_node=&quot;&quot;&gt;the categories of third parties with which the information is shared.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1231&quot;&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;Further, California consumers have the right to request deletion of their personal information, and businesses are required to delete upon receipt of a verified request, as specified. Notably, consumers may opt out of the sale of personal information by a business, and businesses are prohibited from selling the personal information of a consumer under 16 years of age, unless affirmatively authorised.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1228&quot;&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;The CCPA applies to for-profit entities that conduct business in California and ‘collect consumers’ personal information, or on the behalf of which such information is collected and that alone, or jointly with others, determines the purposes and means of the processing of consumers’ personal information’ and either:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1216&quot;&gt;&lt;span data-dcnode-id=&quot;1226&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1224&quot;&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;have more than USD 25,000,000 in gross revenues;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1223&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1221&quot;&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;annually buy, receive, sell or share the personal information of 50,000 or more consumers; or&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1218&quot;&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt;derive half or more of their annual revenues from selling consumers’ personal information.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1213&quot;&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt;Following amendments, the CCPA’s operative date remains unchanged, however, the enforcement action start date has been moved to either 1 July 2020 or six months after publication of the final regulations, whichever date is earlier.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1212&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1209&quot;&gt;&lt;strong data-dcnode-id=&quot;1210&quot;&gt;&lt;span data-dcnode-id=&quot;1211&quot; instrument_node=&quot;&quot;&gt;And finally (possibly) (maybe) the United Kingdom&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1208&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1205&quot;&gt;&lt;em data-dcnode-id=&quot;1206&quot;&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;By&amp;nbsp;Alexander Milner-Smith, Lewis Silkin&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1202&quot;&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;At some point in the future (near, distant or, of course, non-existent) the United Kingdom may be fully outside the EU post Brexit. From a GDPR application and enforcement perspective not much will change.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1199&quot;&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;The UK has already implemented the GDPR in full via the Data Protection Act 2018 and it is very unlikely the UK government would amend this legislation (further, it will likely copy the material elements of the E-Privacy Regulation when (and if) it comes in to force). It may also be that the Information Commissioner’s Office (‘ICO’, the UK’s data protection authority) and UK courts follow European Court of Justice and EU regulatory decisions on application of the rules.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1196&quot;&gt;&lt;span data-dcnode-id=&quot;1197&quot; instrument_node=&quot;&quot;&gt;As such data processing in the UK, both generally and in the workplace, will still look very much the same as in the EU regarding lawful bases, notices, proportionality, security, accountability and other elements.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1195&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;The UK will have to consider all the extra-territorial implications of GDPR as other countries above have described, but as companies in the UK will already be complying with GDPR principles, this is not likely to make much difference to current practices. There will be also be reverse implications in terms of the extra-territorial application UK data protection rules. Again, this should not make too much difference for EU organisations but non-EU companies should consider this (at the same time as the extra-territorial implications of GDPR as other countries above have described).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1190&quot;&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;The two big (albeit not insurmountable) areas for the UK being outside the EU are:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1189&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1178&quot;&gt;&lt;span data-dcnode-id=&quot;1188&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1183&quot;&gt;&lt;span data-dcnode-id=&quot;1187&quot; instrument_node=&quot;&quot;&gt;Extra-EU (EEA) transfers. For more information on this much misunderstood topic see here &lt;/span&gt;&lt;a class=&quot;logclick ct_cont&quot; data-dcnode-id=&quot;1185&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//theword.iuslaboris.com/hrlaw/insights/uk-no-deal-brexit-and-data-transfers-an-update&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;https://theword.iuslaboris.com/hrlaw/insights/uk-no-deal-brexit-and-data-transfers-an-update&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1184&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1182&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1180&quot;&gt;&lt;span data-dcnode-id=&quot;1181&quot; instrument_node=&quot;&quot;&gt;That the ICO will no longer be party to the EU regulatory (or even the EEA regulatory) mechanisms including the European Data Protection Board, access to the Leading Supervisory Authority system.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1179&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1175&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;screenonly&quot; data-dcnode-id=&quot;978&quot; id=&quot;article-footer&quot;&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;
