&lt;/span&gt;&lt;p data-dcnode-id=&quot;697&quot;&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;Since the EU Referendum vote in June 2016, the CIPD’s Labour Market Outlook and &lt;/span&gt;&lt;a data-dcnode-id=&quot;699&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/knowledge/strategy/resourcing/surveys/&quot; target=&quot;_self&quot; title=&quot;Resourcing and talent planning survey&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;Resource and Talent Planning&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt; surveys have closely monitored the impact of Brexit on employment and workforce trends, as well as market perspectives and expectations. The following digest is compiled from our most recent data and analysis to help employers remain alert to potential changes and sustain their ability to attract and retain people best-suited to their needs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;519&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;Given the shrinking supply of skills and labour, it seems that Brexit has not dampened employers’ interest in employing EU migrant workers. At the beginning of 2018, some &lt;/span&gt;&lt;a data-dcnode-id=&quot;524&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cipd.co.uk/Images/labour-market-outlook_2018-winter-2017-1_tcm18-38214.pdf&quot; title=&quot;Labour Market Outlook Winter 2017-18&quot;&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;two-thirds of organisations said they would continue to recruit EU nationals&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;. The &lt;/span&gt;&lt;a data-dcnode-id=&quot;521&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cipd.co.uk/Images/labour-market-outlook_2018-winter-2017-1_tcm18-38214.pdf&quot; title=&quot;Labour Market Outlook Winter 2017-18&quot;&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt;most common reason given by employers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;as to why they employ EU workers is that they do not consider nationality when hiring, but simply choose the best person for the job. For semi-skilled or unskilled roles, the main reason given was that employers could not find domestic applicants to fill those vacancies.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;517&quot;&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;Ahead of the introduction of new migration restrictions in 2021, employers will need to ensure they have made the necessary preparations to ensure they continue to have access to the skills their business needs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;473&quot;&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt;In addition to increasing salaries to attract staff, employers can introduce more inclusive recruitment practices, &lt;/span&gt;&lt;a data-dcnode-id=&quot;475&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cipd.co.uk/Images/practitioners-guide-to-lmo-summer18_tcm18-45839.pdf&quot; title=&quot;Labour Market Outlook Summer 2018 Report&quot;&gt;&lt;span data-dcnode-id=&quot;476&quot; instrument_node=&quot;&quot;&gt;build on their employee offer through non-financial benefits or enhance their brand&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;474&quot; instrument_node=&quot;&quot;&gt;. These will not only address hiring difficulties in the short term but make their organisations more attractive as an employer in the long run. Likewise, measures such as the provision of flexible working and clear career development will help organisations both recruit and retain the people and skills they need.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;419&quot;&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;The scarcity of available skills and labour, potentially exacerbated by &lt;/span&gt;&lt;a data-dcnode-id=&quot;424&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/knowledge/brexit-hub/emp-law-immigration-policy/&quot; target=&quot;_self&quot; title=&quot;Brexit, immigration and employment law&quot;&gt;&lt;span data-dcnode-id=&quot;425&quot; instrument_node=&quot;&quot;&gt;further reductions post-Brexit&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt; once free movement comes to an end, means workforce planning and &lt;/span&gt;&lt;a data-dcnode-id=&quot;421&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/Images/countering-skills-mismatches-through-people-management-practice_tcm18-47752.pdf&quot; target=&quot;_self&quot; title=&quot;Countering skills mismatches - Guide&quot;&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt;development&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt; should become a priority. To be able to respond in due time, employers need to assign greater urgency to undertake strategic workforce planning that will help identify the skills and knowledge required now and for the future, which in turn will help to narrow down the focus of the learning and development required.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;391&quot;&gt;&lt;a data-dcnode-id=&quot;393&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/Images/labour-market-outlook_2018-winter-2017-1_tcm18-38214.pdf&quot; target=&quot;_self&quot; title=&quot;Labour Market Outlook: Winter 2017-18&quot;&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;Statistics from early 2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;392&quot; instrument_node=&quot;&quot;&gt; showed that while 72% of employers have a dedicated training budget, growth in this area was comparatively slow. More than half (55%) said that leaving the EU has had no impact on their training and skills development investment, while 20% said it had caused them to reduce it. This shows that some employers are dialling back on development and training, at the very time they should be investing heavily to mitigate against the real risk of the current skills shortage worsening post-Brexit.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;386&quot;&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;Interestingly, &lt;/span&gt;&lt;a data-dcnode-id=&quot;388&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//auth.cipd.co.uk/Images/labour-market-outlook_2018-winter-2017-1_tcm18-38214.pdf&quot; target=&quot;_self&quot; title=&quot;Labour Market Outlook: Winter 2017-18&quot;&gt;&lt;span data-dcnode-id=&quot;389&quot; instrument_node=&quot;&quot;&gt;organisations that employ EU nationals&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt; were significantly more likely than employers that don’t recruit EU nationals to be investing in training and seeking to recruit from a wider range of under-represented or disadvantaged groups, such as older workers or those from minority ethnic backgrounds. This strongly indicates that organisations which employ EU migrants were typically doing so as part of wider efforts to find the labour they require and to build workforce skills, not because they were failing to invest in UK-born workers or looking to cut costs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;
