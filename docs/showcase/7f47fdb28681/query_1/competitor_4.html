&lt;/span&gt;&lt;a class=&quot;addthis_button_compact&quot; data-dcnode-id=&quot;1242&quot; href=&quot;#&quot;&gt;&lt;span data-dcnode-id=&quot;1247&quot; instrument_node=&quot;&quot;&gt;Share this page &lt;/span&gt;&lt;span class=&quot;text-primary mx-10&quot; data-dcnode-id=&quot;1245&quot;&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt;/&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1244&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;font-icon-ico-share text-pink&quot; data-dcnode-id=&quot;1243&quot;&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;atclear&quot; data-dcnode-id=&quot;1240&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1238&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1234&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/aside&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;col-xs-12 col-md-8&quot; data-dcnode-id=&quot;341&quot;&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1226&quot;&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;Following the UK’s formal departure from the EU on 31 January 2020, the UK entered into a period of transition, defined by the Withdrawal Agreement 2019, during which the EU and UK negotiated the terms of their Future Relationship.&amp;nbsp;Agreement was reached just days ahead of the formal end to the transition period, 31 December 2020 at 23:00 GMT, and the resulting&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1228&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ec.europa.eu/info/relations-united-kingdom/eu-uk-trade-and-cooperation-agreement_en&quot;&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;Trade and Cooperation Agreement (TCA)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;entered into force provisionally on 1 January 2021.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1217&quot;&gt;&lt;span data-dcnode-id=&quot;1224&quot; instrument_node=&quot;&quot;&gt;On the EU side, the legal basis for ratification required adoption of a Council Decision once the European Parliament (EP) had given its consent.&amp;nbsp; The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1222&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//bit.ly/3vQ4Ymv&quot;&gt;&lt;span data-dcnode-id=&quot;1223&quot; instrument_node=&quot;&quot;&gt;EP consent decision and accompanying 8-page resolution&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;were adopted on 28 April 2021 with overwhelming majorities.&amp;nbsp;The resolution underlines that Brexit is a “historic mistake” and that “a third country cannot have the same rights and benefits as a Member State.”&amp;nbsp;The necessary &lt;/span&gt;&lt;a data-dcnode-id=&quot;1219&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//bit.ly/3aYVVaz&quot;&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;Council decision&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt; was then adopted on 30 April.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1211&quot;&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;The official legal text (under EU law), plus accompanying agreements, was published that same day in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1213&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//bit.ly/3nL8hbM&quot;&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt;Official Journal of the EU: L149 30.4.2021&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1212&quot; instrument_node=&quot;&quot;&gt;. Thus, the TCA is ratified, and entered into force on 30 April 2021.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1210&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1202&quot;&gt;&lt;span data-dcnode-id=&quot;1209&quot; instrument_node=&quot;&quot;&gt;To assist those seeking to navigate the new EU-UK Treaty, the FRWG has prepared an &lt;/span&gt;&lt;a data-dcnode-id=&quot;1207&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.barcouncil.org.uk/uploads/assets/75b99203-471b-4c7e-9e0fa439e35cba48/TCA-Index-OJ-L149-text-of-304.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;1208&quot; instrument_node=&quot;&quot;&gt;annotated index&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1206&quot; instrument_node=&quot;&quot;&gt; of the EU’s official text of the TCA and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1204&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.barcouncil.org.uk/uploads/assets/eba4a026-ac4b-4c1c-b66762291eae02e9/Annexes-protocols-to-TCA-OJ-L149-of-304.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;1205&quot; instrument_node=&quot;&quot;&gt;accompanying annexes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1201&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1199&quot;&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;Since the beginning of 2021, our immediate priority has been to examine the impact of the TCA for our members and their clients, and to assist them in their understanding and adapting to the new arrangements.&amp;nbsp;This is an ongoing process.&amp;nbsp;We continue to update our online advice on key issues as matters become clearer.&amp;nbsp;We also continue to organise events on key questions and participate in those of relevant associations, such as the Bar European Group, the European Circuit etc.&amp;nbsp;Much of the advice below, including the FAQ papers published in the last few months, was drafted to cover all eventualities and thus remains current.&amp;nbsp;Please refer to the papers below and continue to check for updates. &amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div aria-multiselectable=&quot;true&quot; class=&quot;collapsible mb-30 border-top&quot; data-dcnode-id=&quot;875&quot; id=&quot;56976C5A-F87F-48AC-963D8CAF1041BA91&quot; role=&quot;tablist&quot;&gt;&lt;span data-dcnode-id=&quot;1197&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;collapsible-item panel mb-0 border-bottom&quot; data-dcnode-id=&quot;877&quot;&gt;&lt;span data-dcnode-id=&quot;1196&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a aria-expanded=&quot;false&quot; class=&quot;py-30 h5 mb-0 collapsed&quot; data-dcnode-id=&quot;1194&quot; data-target=&quot;#BA586DF2-2525-44D2-8A362A36C81E490F&quot; data-toggle=&quot;collapse&quot;&gt;&lt;span data-dcnode-id=&quot;1195&quot; instrument_node=&quot;&quot;&gt;Impact of TCA on practice rights&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1193&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div aria-expanded=&quot;false&quot; class=&quot;collapsible-item-content collapse&quot; data-dcnode-id=&quot;879&quot; id=&quot;BA586DF2-2525-44D2-8A362A36C81E490F&quot;&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;p-2&quot; data-dcnode-id=&quot;881&quot;&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1190&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1188&quot;&gt;&lt;span data-dcnode-id=&quot;1189&quot; instrument_node=&quot;&quot;&gt;The key point to have in mind in reading this guidance is that leaving the EU means that barristers travelling to and/or providing services to the EU are obliged to engage with 27 sets of national rules for regulatory obligations, visas, VAT etc.&amp;nbsp;The TCA does not interfere with those rules save in so far as existing national rules do not provide the minimum commitments promised by the TCA.&amp;nbsp;Even if member state rules do not respect the minimum commitments in the TCA, remedies are potentially cumbersome.&amp;nbsp;Accordingly any members who do have an arguable right under the Withdrawal Agreement (on which see more in FAQ papers 1 &amp;amp; 2) should argue accordingly as it is considerably more liberal than the TCA which sets a low bar for member states to cross.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1187&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1182&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;This guidance is particularly focussed on the practice rights of members of the self-employed Bar engaged in cross-border work in and into the EU, largely, but not exclusively, from a UK base.&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1184&quot;&gt;&lt;span data-dcnode-id=&quot;1185&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt;The advice developed by bodies such as the Law Society of England and Wales (see links below) provides a good overview of the position for those in employment.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1181&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1179&quot;&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;The closest category of service professional, as defined by the TCA, that covers fly-in, fly out work by self-employed barristers is Independent Professionals (IPs), though there is some overlap with the category Short Term Business Visitors (under which no fees may be taken).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1178&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1174&quot;&gt;&lt;span data-dcnode-id=&quot;1177&quot; instrument_node=&quot;&quot;&gt;This information is provided by way of non-binding, preliminary guidance for members of the Bar in an area where the understanding of the TCA is changing rapidly and the views of specialists are not unanimous on the effect of certain provisions.&amp;nbsp;It cannot substitute for members undertaking their own due diligence as to the specific rules applicable in each member state and to each case in which they are involved.&amp;nbsp;The Bar Council cannot be held liable for any action or inaction taken in reliance on any elements of, or omissions from, this guidance and any links or other data to which it refers.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1176&quot;&gt;&lt;span data-dcnode-id=&quot;1175&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;1171&quot;&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;The basic position under the TCA for members of the Bar of England &amp;amp; Wales&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1168&quot;&gt;&lt;span data-dcnode-id=&quot;1169&quot; instrument_node=&quot;&quot;&gt;If you are:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1167&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1156&quot;&gt;&lt;strong data-dcnode-id=&quot;1161&quot;&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;Called as a full member of the Bar of an EU member state&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1163&quot;&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;and&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1162&quot; instrument_node=&quot;&quot;&gt; hold an EEA nationality&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;, your right to provide legal services in and into the EU using the host state title was preserved by the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1158&quot;&gt;&lt;span data-dcnode-id=&quot;1159&quot; instrument_node=&quot;&quot;&gt;Withdrawal Agreement 2019&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1157&quot; instrument_node=&quot;&quot;&gt; and continues as before.&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1155&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1148&quot;&gt;&lt;strong data-dcnode-id=&quot;1153&quot;&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;Called as a full member of an EU member state Bar but do not hold an EEA nationality&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1152&quot; instrument_node=&quot;&quot;&gt;, your right to provide legal services in and into your Member State of call was preserved by the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1150&quot;&gt;&lt;span data-dcnode-id=&quot;1151&quot; instrument_node=&quot;&quot;&gt;Withdrawal Agreement 2019&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt; and is unchanged, as is your right of audience before the Court of Justice of the EU using the host state title, subject to mobility issues.&amp;nbsp;Practice rights in and into other EU Member States are, however, more limited.&amp;nbsp; See 3. below.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1119&quot;&gt;&lt;strong data-dcnode-id=&quot;1145&quot;&gt;&lt;span data-dcnode-id=&quot;1146&quot; instrument_node=&quot;&quot;&gt;UK-only qualified, self-employed and do not hold an EEA nationality&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;, the TCA commits EU member states, as a minimum, to allow you to provide clients with &lt;/span&gt;&lt;em data-dcnode-id=&quot;1142&quot;&gt;&lt;span data-dcnode-id=&quot;1143&quot; instrument_node=&quot;&quot;&gt;legal advice&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt; on &lt;/span&gt;&lt;em data-dcnode-id=&quot;1139&quot;&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;domestic (UK) law and Public International Law (PIL&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1136&quot;&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt; based on your home title, in and into the EU territory, subject to local registration requirements, reservations and relevant mobility provisions.&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1134&quot;&gt;&lt;span data-dcnode-id=&quot;1133&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;1132&quot;&gt;&lt;span data-dcnode-id=&quot;1131&quot; instrument_node=&quot;&quot;&gt;
	In addition, note that:&lt;/span&gt;&lt;br data-dcnode-id=&quot;1130&quot;&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;
	* Where registration of a lawyer is required, the terms of such should be as favourable as for a lawyer from any other 3&lt;/span&gt;&lt;sup data-dcnode-id=&quot;1127&quot;&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt;rd&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1126&quot; instrument_node=&quot;&quot;&gt; country;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1125&quot;&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;
	* No requalification as a domestic lawyer or establishment of a local office may be required in order to provide legal advice on home state law and PIL;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1123&quot;&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;
	* For junior self-employed practitioners having less than six years professional experience, the TCA contains no guaranteed route to providing even these limited services on a fee-earning basis;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1121&quot;&gt;&lt;span data-dcnode-id=&quot;1120&quot; instrument_node=&quot;&quot;&gt;
	* There is no positive commitment in the TCA to permit barristers to provide advice on EU law, nor, with limited exceptions, to provide representation services on EU territory.&amp;nbsp;However, individual member states may permit either or both.&amp;nbsp;Thus, barristers wishing to offer such services must refer to the specific rules in the relevant member state, including possible conditions or restrictions attached, such as limitations on legal professional privilege.&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1118&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1109&quot;&gt;&lt;span data-dcnode-id=&quot;1117&quot; instrument_node=&quot;&quot;&gt;The TCA contains a carve-out for &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1115&quot;&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;legal arbitration (mediation and conciliation) services based on home title when performed on a &lt;/span&gt;&lt;/strong&gt;&lt;strong data-dcnode-id=&quot;1113&quot;&gt;&lt;span data-dcnode-id=&quot;1114&quot; instrument_node=&quot;&quot;&gt;fly in fly out basis&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1112&quot; instrument_node=&quot;&quot;&gt;, meaning that Member States may be permissive as to the provision of such services by third country practitioners.&amp;nbsp; France and Sweden are examples of states that have historically been so.&amp;nbsp; However, again, there may be conditions attached, such as local Bar registration, or a time limit for stay. &amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1111&quot;&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt;
	&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;1104&quot;&gt;&lt;span data-dcnode-id=&quot;1105&quot; instrument_node=&quot;&quot;&gt;Preservation of Practice Rights under the Withdrawal Agreement&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1101&quot;&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;Independently of the position under the TCA, and apart from those members of the Bar who had completed the applications for, or been called to, an EEA bar before the end of December 2020 (see categories 1 and 2 above), the Withdrawal Agreement 2019 (WA) also preserved practice rights beyond the end of transition for a further category of self-employed person as well as for UK legal practitioners involved in, broadly speaking, two categories of cases:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;1086&quot;&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1094&quot;&gt;&lt;span data-dcnode-id=&quot;1098&quot; instrument_node=&quot;&quot;&gt;For the duration of &lt;/span&gt;&lt;em data-dcnode-id=&quot;1096&quot;&gt;&lt;span data-dcnode-id=&quot;1097&quot; instrument_node=&quot;&quot;&gt;cases that were pending&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt; before the Court of Justice of the EU (CJEU) at the end of the transition period, and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1093&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1088&quot;&gt;&lt;span data-dcnode-id=&quot;1092&quot; instrument_node=&quot;&quot;&gt;For those appearing in cases related to the &lt;/span&gt;&lt;em data-dcnode-id=&quot;1090&quot;&gt;&lt;span data-dcnode-id=&quot;1091&quot; instrument_node=&quot;&quot;&gt;interpretation or breaches of the terms of the WA&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1089&quot; instrument_node=&quot;&quot;&gt; itself, for a period of up to 8 years following the end of transition.&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1081&quot;&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;These exceptions are discussed further in FAQ papers 1 and 2 below.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1083&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;1078&quot;&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;Frontier Workers under the WA&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;1077&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1075&quot;&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;Article 25 WA protects certain cross-border rights of self-employed Frontier Workers (defined in Article 9b WA as “Union citizens or United Kingdom nationals who pursue an economic activity in accordance with Article 45 or 49 TFEU in one or more States in which they do not reside.”).&amp;nbsp;As you know, Article 49 TFEU sets out the right of establishment.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1072&quot;&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;Practitioners who have been providing legal advice or representation services in one or several member states for a sustained period, and on a regular basis, prior to 31 December 2020, may have been entitled to that protection.&amp;nbsp; However, the specific elements of the definition have not been fully tested in this context.&amp;nbsp; It is not clear, for example, whether it requires, e.g. a local office, a minimum or maximum amount of time on the territory, regularity or number of trips, etc.&amp;nbsp; Pure service provision as facilitated by the Lawyers’ Services Directive 77/249 would seem not to be sufficient.&amp;nbsp; &amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1069&quot;&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;In any event, in order to avail of the protections of the WA for citizens’ rights generally, and practice rights in particular, registration for the status sought, or at least application there for, should have been completed prior to 31 December 2020.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1066&quot;&gt;&lt;span data-dcnode-id=&quot;1067&quot; instrument_node=&quot;&quot;&gt;However, we note that some member states are showing some flexibility, both as to the strict definition of frontier worker that they apply, and the timing of the application for registration as same.&amp;nbsp; Any practitioner who thinks he/she may qualify, is advised to inform themselves of the position in the relevant member state(s) as quickly as possible, as this window, if still open, will surely shut in the coming weeks.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1063&quot;&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;Further information can be found on relevant government websites.&amp;nbsp;For example:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1059&quot;&gt;&lt;a data-dcnode-id=&quot;1060&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dofi.ibz.be/sites/dvzoe/EN/Application-guides/Pages/Brexit-2.aspx&quot;&gt;&lt;span data-dcnode-id=&quot;1061&quot; instrument_node=&quot;&quot;&gt;Belgium&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1058&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1055&quot;&gt;&lt;a data-dcnode-id=&quot;1056&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//gouvernement.lu/en/dossiers/2019/brexit.html%23bloub-1&quot;&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;Luxembourg&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1049&quot;&gt;&lt;a data-dcnode-id=&quot;1052&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.ie/en/publication/b6a44-information-for-current-and-future-frontier-workers/&quot;&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;Ireland&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;1051&quot;&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 data-dcnode-id=&quot;1046&quot;&gt;&lt;span data-dcnode-id=&quot;1047&quot; instrument_node=&quot;&quot;&gt;Assistance with practical issues&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1041&quot;&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt;Members of the Bar who are currently or imminently engaged in cross-border work in or into an EU member state must check that state’s regulatory and entry requirements in advance.&amp;nbsp; &amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1043&quot;&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1037&quot;&gt;&lt;strong data-dcnode-id=&quot;1038&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;Third country lawyer practice rights in EU member states:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1035&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;1033&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.lawsociety.org.uk/topics/brexit/preparing-for-the-end-of-the-transition-period&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;Law Society of England &amp;amp; Wales Brexit page&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt; contains links to the rules applicable in several member states, with of course, a focus on the interests of solicitors.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1025&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;Christian Wisskirchen, Head of International at the Bar Council, London, will also try to assist barristers with individual queries at: &lt;/span&gt;&lt;a data-dcnode-id=&quot;1027&quot; href=&quot;mailto:cwisskirchen@barcouncil.org.uk&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;cwisskirchen@barcouncil.org.uk&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1020&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;Please note that the position is evolving, so individual practitioners are advised to continue to update themselves before undertaking work in or into a specific member state.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1022&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1015&quot;&gt;&lt;strong data-dcnode-id=&quot;1017&quot;&gt;&lt;span data-dcnode-id=&quot;1018&quot; instrument_node=&quot;&quot;&gt;Mobility (work permits, visa requirements, etc)&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;996&quot;&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1009&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;Bar Council, January 2021 &lt;/span&gt;&lt;a data-dcnode-id=&quot;1010&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//bit.ly/2ZPkDEn&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;Mobility Seminar guidance&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;The European Commission’s interactive &lt;/span&gt;&lt;a data-dcnode-id=&quot;1005&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ec.europa.eu/immigration/node_en&quot;&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;webpage setting out the immigration requirements of each member state&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;998&quot;&gt;&lt;a data-dcnode-id=&quot;1001&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/government/collections/providing-services-to-eea-and-efta-countries-after-eu-exit&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;HMG generic mobility guidance for service providers&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;1000&quot;&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;
	&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;992&quot;&gt;&lt;strong data-dcnode-id=&quot;993&quot;&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;Legal professional privilege (LPP) &lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;987&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;UK practitioners advising on EU law are recommended, as a matter of course, to ensure that their legal advice is countersigned by an EEA qualified lawyer.&lt;/span&gt;&lt;br data-dcnode-id=&quot;989&quot;&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;983&quot;&gt;&lt;strong data-dcnode-id=&quot;984&quot;&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;Professional indemnity insurance (PII) coverage&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;980&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;As a general rule the Bar Mutual Indemnity Fund provides cover to members of the Bar practising in England &amp;amp; Wales, including those of whom it can be said that their “principal place of business” (though e.g. a tenancy or door tenancy) is in England &amp;amp; Wales, even if the service is provided elsewhere.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;975&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;Nonetheless, when informing themselves as to the regulatory regime applicable to the provision of a particular legal service in or into an EU member state, members are advised to consider the potential implications for their professional indemnity insurance coverage.&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;977&quot;&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;971&quot;&gt;&lt;strong data-dcnode-id=&quot;972&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;Transfers of personal data from the EU to the UK&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;968&quot;&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;Pending the EU’s formal confirmation of the adequacy of the UK’s data protection regime, the TCA provides a temporary solution to keep data flowing, by which personal data shipped to the UK “shall not be considered as transfer to a third country” under EU law.&amp;nbsp;This arrangement will lapse on 30 June 2021 or whenever the EU’s data adequacy decision has been finalized, whichever is sooner.&amp;nbsp; For the time-being therefore, the position is unchanged from pre-end of transition.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;959&quot;&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;On 19 February the Commission tabled two draft adequacy decisions, one under&lt;/span&gt;&lt;a data-dcnode-id=&quot;964&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ec.europa.eu/info/files/draft-decision-adequate-protection-personal-data-united-kingdom-general-data-protection-regulation_en&quot;&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;the General Data Protection Regulation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;961&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ec.europa.eu/info/files/draft-decision-adequate-protection-personal-data-united-kingdom-law-enforcement-directive_en&quot;&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;the other for the Law Enforcement Directive&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;These now await formal confirmation by the European Data Protection Board (EDPB) (opinion due mid-April) as well as by the member states, through the Comitology Procedure.&amp;nbsp;Though this is not yet a done deal, all being well the Commission expects to adopt the two adequacy decisions by early June. &amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;947&quot;&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;952&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;Note that the effect of these adequacy decisions would be to allow personal data to continue to flow from the EU to the UK without any further safeguard being necessary.&amp;nbsp; That would e.g. negate the need for inclusion of &lt;/span&gt;&lt;strong data-dcnode-id=&quot;954&quot;&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt;Standard Contractual Clauses&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;953&quot; instrument_node=&quot;&quot;&gt; in arrangements involving the transfer of personal data from EU territory.&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;949&quot;&gt;&lt;span data-dcnode-id=&quot;950&quot; instrument_node=&quot;&quot;&gt;If and when adopted, these decisions should remain valid for a first period of four years, renewable if the level of protection in the UK were still found adequate.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;944&quot;&gt;&lt;span data-dcnode-id=&quot;945&quot; instrument_node=&quot;&quot;&gt;See further&amp;nbsp;EU materials on this subject:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;940&quot;&gt;&lt;a data-dcnode-id=&quot;941&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ec.europa.eu/info/law/law-topic/data-protection/international-dimension-data-protection/adequacy-decisions_en&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;International dimension of data protection: Adequacy decisions&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;939&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;936&quot;&gt;&lt;a data-dcnode-id=&quot;937&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ec.europa.eu/info/law/law-topic/data-protection/international-dimension-data-protection/brexit_en&quot;&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;International dimension of data protection: Brexit&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;930&quot;&gt;&lt;a data-dcnode-id=&quot;933&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//bit.ly/3bYqqyA&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;UK government advice&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;932&quot;&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;923&quot;&gt;&lt;strong data-dcnode-id=&quot;927&quot;&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;VAT - &lt;/span&gt;&lt;/strong&gt;&lt;strong data-dcnode-id=&quot;925&quot;&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;Legal Services supplied electronically to a non-taxable person&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;924&quot; instrument_node=&quot;&quot;&gt;:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;922&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;920&quot;&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;While the UK was a member state, electronic service supply benefited from the MOSS system, whereby regardless of where the service supplier is based, the VAT is paid in the consumer's home state.&amp;nbsp;Now, a UK service supplier must register for VAT in any member state into which it wants to supply services to a non-taxable person. However, it is possible proactively to register as a third country supplier for the MOSS VAT scheme in one member state, which will then cover you for the whole of the EU.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;913&quot;&gt;&lt;span data-dcnode-id=&quot;918&quot; instrument_node=&quot;&quot;&gt;See:&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;916&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ec.europa.eu/taxation_customs/business/vat/telecommunications-broadcasting-electronic-services/content/guide-vat-mini-one-stop-shop-moss_en&quot;&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;https://ec.europa.eu/taxation_customs/business/vat/telecommunications-broadcasting-electronic-services/content/guide-vat-mini-one-stop-shop-moss_en&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;915&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;909&quot;&gt;&lt;strong data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;Access to EEA Host title – Mutual Recognition of Professional Qualifications &lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;906&quot;&gt;&lt;span data-dcnode-id=&quot;907&quot; instrument_node=&quot;&quot;&gt;For practitioners who wish to provide their services cross border in and into the EU, especially in areas of law that fall outside the scope of home or public international law, the simplest way to avoid the complexity outlined above would be to acquire an EU legal qualification (aka host title), ideally through recognition of their UK one.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;901&quot;&gt;&lt;span data-dcnode-id=&quot;904&quot; instrument_node=&quot;&quot;&gt;The Bar Council is exploring both the possible development of a mutual recognition agreement for (legal) professional qualifications at EU-UK level, which is foreseen as a possibility under the TCA, and in parallel, other possible arrangements with EU national and regional bars, including for the acquisition of partial or temporary titles. We will provide details on this webpage as this work bears fruit.&lt;/span&gt;&lt;br data-dcnode-id=&quot;903&quot;&gt;&lt;span data-dcnode-id=&quot;902&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;900&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;897&quot;&gt;&lt;strong data-dcnode-id=&quot;898&quot;&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;Ongoing request for practitioner feedback on problems arising&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;896&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;891&quot;&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;We are gathering evidence of any problems members of the Bar encounter in cross-border practice in and into the EU. If you encounter any obstacle (e.g. refusal of a relevant visa, or of necessary registration by a bar association; difficulties with recognition under the Withdrawal Agreement&amp;nbsp;or in appearing either as counsel or arbitrator in either any ad hoc or institutional proceedings) that you believe are due to the regulatory and legislative changes that took effect from 1 January 2021, please email Anastasia Kostaki:&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;893&quot; href=&quot;mailto:AKostaki@barcouncil.org.uk&quot;&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt;AKostaki@BarCouncil.org.uk&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt;. &amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;888&quot;&gt;&lt;span data-dcnode-id=&quot;889&quot; instrument_node=&quot;&quot;&gt;Equally if you have any relevant experience of a positive nature, we would also be grateful for your feedback.&amp;nbsp; Please treat this as a continuing request as opportunities for travel open up during the course of this year.&amp;nbsp; Any communication will be treated as confidential.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;885&quot;&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;In submitting any such report, please identify your practice area and the type of advice, case or hearing concerned, whilst respecting client confidentiality. This will help us to make relevant interventions with HMG or other stakeholders in an effort to mitigate any such difficulties.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;867&quot;&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;We will continue our parallel efforts to secure the Bar’s longstanding Brexit priorities: preserving access to justice through judicial cooperation and maximising opportunities for market access for legal services in support of same.&amp;nbsp; We will again provide updates on this page as matters progress.&lt;/span&gt;&lt;br data-dcnode-id=&quot;869&quot;&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;
