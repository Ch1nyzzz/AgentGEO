&quot;&quot;&gt; is a professional specialising in project management. All industries make use of project management professionals. Your project management CV has to show you can take responsibility for the planning, procurement and execution of projects, in any endeavour that has a clearly defined scope, start and finish.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;724&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;719&quot;&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;The potential scope of a project manager CV is vast. But somehow you have to distil that down into a brief, yet effective document that’ll only get &lt;/span&gt;&lt;a data-dcnode-id=&quot;721&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.independent.co.uk/news/uk/home-news/employers-sifting-through-applications-likened-to-swiping-through-tinder-as-research-shows-people-9988512.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;8 seconds of attention&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt; from the hiring manager. To make sure your CV life cycle ends with success, follow these rules.&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;693&quot;&gt;&lt;li data-dcnode-id=&quot;714&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;Use the right &lt;/span&gt;&lt;a data-dcnode-id=&quot;716&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/cv-format&quot;&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;CV format&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;. The best choice for a project manager CV is chronological format. It’s the one recruiters are most familiar with and proves you can walk the walk by putting the spotlight firmly on your job experience.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;706&quot;&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;Use an effective &lt;/span&gt;&lt;a data-dcnode-id=&quot;711&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/cv-layout&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;CV layout&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;. Set your margins to one inch on every side, left align only (don’t use justification) and double space between sections. This creates plenty of &lt;/span&gt;&lt;a data-dcnode-id=&quot;708&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//digitalcommons.wku.edu/cgi/viewcontent.cgi%3Farticle%3D1461%26context%3Dstu_hon_theses&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;white space&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt; to keep it easy to read and help the recruiter find the information they need.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;701&quot;&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;Choose a professional &lt;/span&gt;&lt;a data-dcnode-id=&quot;703&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/best-font-for-a-cv&quot;&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;CV font&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;. Calibri, Helvetica and Garamond are reliable choices.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;696&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;Don’t overdo it. Your &lt;/span&gt;&lt;a data-dcnode-id=&quot;698&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/how-long-should-a-cv-be&quot;&gt;&lt;span data-dcnode-id=&quot;699&quot; instrument_node=&quot;&quot;&gt;CV length&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt; should be a maximum of two pages.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;694&quot;&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;Save your CV as a PDF file. It’s the best CV file format because it keeps your layout intact.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p class=&quot;box box--blue&quot; data-dcnode-id=&quot;687&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;Read more: &lt;/span&gt;&lt;strong data-dcnode-id=&quot;688&quot;&gt;&lt;em data-dcnode-id=&quot;689&quot;&gt;&lt;a data-dcnode-id=&quot;690&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/what-to-include-in-a-cv&quot;&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;What to Include in a CV: Essential Sections&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;/strong&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;685&quot;&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;2. Write a Project Manager CV Profile&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;683&quot;&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;681&quot;&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;A CV personal statement, or personal profile is the introduction to your CV. It’s a short paragraph designed to grab the hiring manager’s attention. Think of it as the kick-off meeting that launches your CV project. All you need to do is answer 3 questions.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;679&quot;&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;ol data-dcnode-id=&quot;672&quot;&gt;&lt;li data-dcnode-id=&quot;677&quot;&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;Who are you?&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;675&quot;&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;What can you offer to the employer?&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;673&quot;&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;What are your career goals?&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p data-dcnode-id=&quot;670&quot;&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;668&quot;&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;The way you answer those questions will be different depending on how experienced you are. For a senior project manager CV follow this approach:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;661&quot;&gt;&lt;li data-dcnode-id=&quot;666&quot;&gt;&lt;span data-dcnode-id=&quot;667&quot; instrument_node=&quot;&quot;&gt;Make a list of all your selling points as a PM. Include all of the professional experience, skills and abilities that make you great at your job.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;664&quot;&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;Then read the job description in the advert and match 3–4 points from your list to the skills and experience listed there.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;662&quot;&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt;Use these points to write a personal profile targeted to the project management job you’re applying for.&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;659&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;657&quot;&gt;&lt;span data-dcnode-id=&quot;658&quot; instrument_node=&quot;&quot;&gt;For an entry-level junior project manager CV do this:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;652&quot;&gt;&lt;li data-dcnode-id=&quot;655&quot;&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;List any skills and abilities you already have. Think of your education and work experience you’ve already gained. Then highlight everything that’s transferable to an entry-level PM job.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;653&quot;&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;Use a combination of that skills and experience plus passion for the role, and knowledge about the employer to prove that you’re a good fit for the job.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;650&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;648&quot;&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;In either case, you’ll find this section easier to write if you leave it until last. It’s much easier when you’ve got your experience, skills and education ready to refer to.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;646&quot;&gt;&lt;span data-dcnode-id=&quot;647&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;Now for the next phase of your CV project life cycle, your work experience section.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;box box--blue&quot; data-dcnode-id=&quot;638&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;643&quot; instrument_node=&quot;&quot;&gt;Check out this guide for even more tips on how to write your personal profile: &lt;/span&gt;&lt;a data-dcnode-id=&quot;639&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/cv-personal-profile&quot;&gt;&lt;strong data-dcnode-id=&quot;640&quot;&gt;&lt;em data-dcnode-id=&quot;641&quot;&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt;How to Write a CV Personal Statement [20+ Examples]&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;/a&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;636&quot;&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;3. Write an Agile PM Work Experience Section&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;634&quot;&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;632&quot;&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;Your work experience section is mission-critical. Hiring managers need PM professionals who can step in and grab the bull by the horns. Here’s how to show you’ve got what it takes.&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;613&quot;&gt;&lt;li data-dcnode-id=&quot;630&quot;&gt;&lt;span data-dcnode-id=&quot;631&quot; instrument_node=&quot;&quot;&gt;Put your most recent PM gig first and work back from there.&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;628&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;For each role, include your job title, the name of your employer, dates of employment (use “present” as the end date if you work there now), then up to six bullet points about the job.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;626&quot;&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;Start your bullet points with a CV action word like boosted, analysed or facilitated, to give them added impact.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;624&quot;&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;Set out measurable achievements, not just a list of duties. It’s not only about what you did, you’ve got to show how well you did it too.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;616&quot;&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;Use the &lt;/span&gt;&lt;a data-dcnode-id=&quot;621&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pcc.edu/staff/tmaldona/wp-content/uploads/sites/114/2018/08/Samples-of-a-PAR-formula-statements.pdf&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;622&quot; instrument_node=&quot;&quot;&gt;PAR (Problem Action Result)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt; formula and &lt;/span&gt;&lt;a data-dcnode-id=&quot;618&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.ubalt.edu/campus-life/career-center/career-services-online/career-cycle/documents/Writing%2520Accomplishment%2520Statements.pdf&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;accomplishment statements&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt; to structure your bullet points.&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;614&quot;&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;Target your work experience section to the job description. Pay attention to the PM skills and experience the hiring manager is looking for and match your experience to what’s required.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p class=&quot;box box--blue&quot; data-dcnode-id=&quot;607&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt;Check out this guide for even more CV writing advice: &lt;/span&gt;&lt;a data-dcnode-id=&quot;608&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/cv-tips&quot;&gt;&lt;strong data-dcnode-id=&quot;609&quot;&gt;&lt;em data-dcnode-id=&quot;610&quot;&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;20+ CV Tips and Advice for Job Application Success&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;/a&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;605&quot;&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;4. Include an Education Section&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;603&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;601&quot;&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;It might seem like I’m stating the obvious, but even if you’re a well-established PM professional you still need an education section on your project manager CV. Here’s how to write it:&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;592&quot;&gt;&lt;li data-dcnode-id=&quot;599&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;Include the university name, years attended, and the name of your degree. If you’re still studying, include your expected graduation date.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;597&quot;&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;If you have post-graduate qualifications, follow reverse-chronological order and put the degree you completed most recently first.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;595&quot;&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;Only include honours if they’re a 2:1 or a first.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;593&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;If you’ve just graduated and don’t have much experience then change the order of your CV and put this section before your work experience section.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p class=&quot;box box--blue&quot; data-dcnode-id=&quot;586&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;Read more: &lt;/span&gt;&lt;strong data-dcnode-id=&quot;587&quot;&gt;&lt;em data-dcnode-id=&quot;588&quot;&gt;&lt;a data-dcnode-id=&quot;589&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/references-on-cv&quot;&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;References on a CV: Should You Include Them?&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;/strong&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;584&quot;&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;582&quot;&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;5. Show Off Your Project Management CV Skills&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;580&quot;&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;578&quot;&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;The list of skills required for effective project management is endless. So how do you choose which skills to include on your CV to give your job application the edge? Here’s what to do.&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;561&quot;&gt;&lt;li data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;Carefully read the job advert and identify which skills are required by the role. Look at the job description and you’ll see exactly what the hiring manager wants. Compile those skills into a list.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;574&quot;&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;Now make a list of your own skills. Refer back to your work experience and education sections for inspiration.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;572&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;Then compare your lists, see what matches, and choose 5–10 of those to include in your CV.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;570&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;Aim for a mix of soft skills, hard skills and technical skills.&amp;nbsp;&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;For each skill, add a sentence showing how you demonstrate it. Don’t just show, &lt;/span&gt;&lt;em data-dcnode-id=&quot;567&quot;&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;tell&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;. E.g. &lt;/span&gt;&lt;strong data-dcnode-id=&quot;564&quot;&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;Time management. &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;Used work breakdown structure to clearly define project activities and tasks.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;559&quot;&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;557&quot;&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;These skills would make a great addition to a project manager CV.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;555&quot;&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;552&quot;&gt;&lt;strong data-dcnode-id=&quot;553&quot;&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;Project Management CV Skills&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;550&quot;&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;525&quot;&gt;&lt;li data-dcnode-id=&quot;548&quot;&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;Time management&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;546&quot;&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt;Risk management&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;543&quot;&gt;&lt;a data-dcnode-id=&quot;544&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/leadership-skills&quot;&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;Leadership skills&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;541&quot;&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;Methodologies (PRINCE2, Agile, Waterfall etc.)&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;539&quot;&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;Problem-solving&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;536&quot;&gt;&lt;a data-dcnode-id=&quot;537&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/interpersonal-skills&quot;&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;Interpersonal skills&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;534&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;Organisation&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;532&quot;&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;Communication&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;530&quot;&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;Delegation&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;528&quot;&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;Cost control&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;526&quot;&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;Quality management&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p class=&quot;box box--blue&quot; data-dcnode-id=&quot;519&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;Read More: &lt;/span&gt;&lt;a data-dcnode-id=&quot;520&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/skills-for-a-cv&quot;&gt;&lt;strong data-dcnode-id=&quot;521&quot;&gt;&lt;em data-dcnode-id=&quot;522&quot;&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;Best List of Skills to Put on a CV [Top Skills &amp;amp; Examples]&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;/a&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;517&quot;&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;6. Add Additional Sections to Your Project Manager CV&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;515&quot;&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;513&quot;&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;Meeting targets is good, but smashing them is even better. The best way to write a CV that exceeds expectations is to include extra sections. They give your CV that extra bit of polish to make it shine brighter than the competition. Here are some ideas.&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;503&quot;&gt;&lt;li data-dcnode-id=&quot;511&quot;&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;Add a languages section. Foreign language skills are needed at all levels of the workforce and are a great choice for PM roles in multinational corporations.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;506&quot;&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;Including volunteer work is another effective strategy. &lt;/span&gt;&lt;a data-dcnode-id=&quot;508&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www2.deloitte.com/content/dam/Deloitte/us/Documents/us-deloitte-impact-survey.pdf&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;82% of managers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt; prefer to hire people with volunteering experience.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;504&quot;&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;You could also include professional certifications, projects (perfect for PMs), achievements, awards, conferences and publications. If it’s relevant and makes you stand out as a candidate, include it.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;501&quot;&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;499&quot;&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;7. Consider a Cover Letter&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;497&quot;&gt;&lt;span data-dcnode-id=&quot;498&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;492&quot;&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;In a world of Gantt charts and organisational breakdown structures, it’s easy to forget that a simple letter can be an incredibly powerful communication tool. Yes, you still need a cover letter. In fact, &lt;/span&gt;&lt;a data-dcnode-id=&quot;494&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.saddleback.edu/uploads/jobs/your_resume_is_your_1st_interview.pdf&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;495&quot; instrument_node=&quot;&quot;&gt;more than half of employers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;493&quot; instrument_node=&quot;&quot;&gt; say they’re a must-have. The best project management CV examples come with a matching cover letter.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;490&quot;&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;485&quot;&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;Here’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;487&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/how-to-write-a-cover-letter&quot;&gt;&lt;span data-dcnode-id=&quot;488&quot; instrument_node=&quot;&quot;&gt;how to write a cover letter&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;463&quot;&gt;&lt;li data-dcnode-id=&quot;480&quot;&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;Use the right &lt;/span&gt;&lt;a data-dcnode-id=&quot;482&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/cover-letter-format&quot;&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;cover letter format&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;476&quot;&gt;&lt;a data-dcnode-id=&quot;478&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/how-to-start-a-cover-letter&quot;&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt;Start your cover letter&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt; with a ‘hook’. Show passion for the role and the employer and include an impressive professional achievement.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;474&quot;&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;Prove your experience and skills will enable you to nail your key deliverables.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;469&quot;&gt;&lt;span data-dcnode-id=&quot;473&quot; instrument_node=&quot;&quot;&gt;Include a &lt;/span&gt;&lt;a data-dcnode-id=&quot;471&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/how-to-end-a-cover-letter&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;cover letter ending&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt; with a call to action asking to meet to discuss the role further.&lt;/span&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;464&quot;&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;Stick to the right &lt;/span&gt;&lt;a data-dcnode-id=&quot;466&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/blog/how-long-should-a-cover-letter-be&quot;&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;cover letter length&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;461&quot;&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;459&quot;&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;One last thing. Always follow up. You’d never just launch a project and let it run without monitoring it. Treat your job application with the same care and attention. If you haven’t got a reply after one week, touch base with the employer by email or phone about the status of your application. It’s an easy way to boost your chances of success.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;457&quot;&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;455&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;And we’re done. You’re all set to write a project management CV to achieve your objective of job-hunting success.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;453&quot;&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;447&quot;&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;Plus, a great cover letter that matches your CV will give you an advantage over other candidates. You can write it in our &lt;/span&gt;&lt;a data-dcnode-id=&quot;449&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//zety.com/uk/cover-letter-builder&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;strong data-dcnode-id=&quot;450&quot;&gt;&lt;span data-dcnode-id=&quot;451&quot; instrument_node=&quot;&quot;&gt;cover letter builder here.&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Here's what it may look like:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;445&quot;&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;441&quot; style=&quot;max-width: 1200px;&quot;&gt;&lt;img alt=&quot;matching set of cv and cover letter&quot; data-dcnode-id=&quot;4
