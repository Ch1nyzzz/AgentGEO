&lt;h3 data-geo-id=&quot;geo-488322d1&quot;&gt;Key Points for Strategic Planning: Step-by-Step Guide&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-bdddfb52&quot;&gt;
&lt;li&gt;Organize your planning process using tools like binders to keep milestones, schedules, and resources clearly structured and easily accessible.&lt;/li&gt;
&lt;li&gt;Set clear, adaptable milestones and maintain persistence and flexibility to adjust your plan as obstacles arise without losing focus on your goals.&lt;/li&gt;
&lt;li&gt;Apply comprehensive time management techniques such as using planners, time blocking, scheduling breaks, and planning weekly to enhance productivity and handle delays effectively.&lt;/li&gt;
&lt;li&gt;Boost motivation by staying positive, rewarding progress, building a support network, tracking achievements, and employing goal-setting methods like the S.M.A.R.T. criteria to clarify and pursue your objectives.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;h3 data-geo-id=&quot;geo-c7e4a345&quot;&gt;Key Points for Project Managers: Action Plan Examples&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-1c35f00f&quot;&gt;
&lt;li&gt;Structure your action plan with clear sections such as milestones, schedules, and contact lists to organize tasks and responsibilities effectively.&lt;/li&gt;
&lt;li&gt;Maintain persistence and flexibility by regularly revising your plan to accommodate unexpected events without losing sight of your final goal.&lt;/li&gt;
&lt;li&gt;Implement time management strategies like using planners, time blocking, scheduling breaks, and building buffers to handle delays and maintain productivity.&lt;/li&gt;
&lt;li&gt;Boost motivation through positivity, rewards, support networks, progress tracking, and applying goal-setting techniques such as S.M.A.R.T. criteria.&lt;/li&gt;
&lt;/ul&gt;

&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_1&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-2-Version-2.jpg&quot;&gt;&lt;picture id=&quot;b7f6dbe8215b520e30f2bb5a85ba2fd9&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/9/99/Create-an-Effective-Action-Plan-Step-2-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-2.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/9/99/Create-an-Effective-Action-Plan-Step-2-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-2.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/9/99/Create-an-Effective-Action-Plan-Step-2-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-2-Version-2.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/9/99/Create-an-Effective-Action-Plan-Step-2-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-2-Version-2.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 1 Know what you want to do.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; onload=&quot;WH.performance.clearMarks('image1_rendered'); WH.performance.mark('image1_rendered');&quot; priority=&quot;high&quot; src=&quot;https://www.wikihow.com/images/thumb/9/99/Create-an-Effective-Action-Plan-Step-2-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-2.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;1&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Know what you want to do.&lt;/b&gt;&lt;sup aria-label=&quot;Link to Reference 1&quot; class=&quot;reference trusted&quot; id=&quot;_ref-1&quot;&gt;&lt;a href=&quot;#_note-1&quot;&gt;[1]&lt;/a&gt;&lt;span class=&quot;ts_popup trustedsource&quot; hidden=&quot;&quot; id=&quot;ts_popup_1&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;a class=&quot;ts_trustworthy&quot; href=&quot;/wikiHow:Delivering-a-Trustworthy-Experience&quot;&gt;Expert Source&lt;/a&gt;
&lt;span class=&quot;ts_name&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_expert_link&quot; href=&quot;/Author/Jennifer-Clark&quot;&gt;&lt;span class=&quot;ts_expert_image&quot;&gt;&lt;picture&gt;&lt;source srcset=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png.webp&quot; type=&quot;image/webp&quot;/&gt;&lt;img alt=&quot;Jennifer Clark&quot; height=&quot;30&quot; loading=&quot;lazy&quot; src=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png&quot; style=&quot;max-width: 30px&quot; width=&quot;30&quot;/&gt;&lt;/picture&gt;&lt;/span&gt;Jennifer Clark&lt;br/&gt;&lt;span class=&quot;ts_blurb&quot;&gt;Life Coach&lt;/span&gt;&lt;/a&gt;
&lt;span class=&quot;ts_description&quot;&gt;Expert Interview&lt;/span&gt;
&lt;/span&gt;
&lt;/sup&gt; The less clear you are about what you want to do, the less effective your plan will be. Try to specifically define what you want to achieve as early as possible — preferably before starting your project.
&lt;ul&gt;&lt;li&gt;Example: You are trying to complete your master’s thesis — basically a very long essay — which needs to be about 40,000 words. It will include an introduction, a literature review (in which you critically discuss other research that informs yours, and discuss your methodology), several chapters in which you put your ideas into practice using concrete examples, and a conclusion. You have 1 year to write it.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_1&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-01&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_2&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-2-Version-3.jpg&quot;&gt;&lt;picture id=&quot;02890d7bde2119bb9db6a5e34439f6b8&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 2 Work backwards from your end goal.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;2&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Work backwards from your end goal.&lt;/b&gt; Identify your end goal, then list everything you need to do to accomplish it. Depending on your goal, you may even consider different ways to reach your goal. After you know what you need to accomplish, break this down into actionable steps to help you create a more realistic plan.
&lt;ul&gt;
&lt;li&gt;Keep in mind that your plan may change as you work toward your goal, so stay flexible.&lt;/li&gt;
&lt;li&gt;Make sure that your goals are S.M.A.R.T. to ensure that your plan is effective:&lt;sup aria-label=&quot;Link to Reference 2&quot; class=&quot;reference&quot; id=&quot;_ref-2&quot;&gt;&lt;a href=&quot;#_note-2&quot;&gt;[2]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_2&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;
&lt;li&gt;Specific - Be clear about what you want to achieve.&lt;/li&gt;
&lt;li&gt;Measurable - You can break down the goal into measurable checkpoints.&lt;/li&gt;
&lt;li&gt;Attainable - You are capable of completing the steps necessary to reach the goal.&lt;/li&gt;
&lt;li&gt;Relevant - The goal makes sense for your life and purpose.&lt;/li&gt;
&lt;li&gt;Timely - You have the time to work toward your goal and are progressing on schedule.&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-02&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_3&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-3-Version-2.jpg&quot;&gt;&lt;picture id=&quot;2cb82bc74daacf49161acdb8ef0668c0&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 3 Be specific and realistic in your planning.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;3&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Be specific and realistic in your planning.&lt;/b&gt; Having a specific goal is just the beginning: you need to be specific and realistic in every aspect of your project — for example, by stating specific and achievable schedules, milestones, and final outcomes.
&lt;ul&gt;
&lt;li&gt;Being specific and realistic while planning a long project is all about pro-actively reducing stress that can accompany poorly planned projects such as missed deadlines and exhausting long hours.&lt;/li&gt;
&lt;li&gt;Example: To finish your thesis on time, you need to write roughly 5,000 words per month, which will give you a couple of months at the end of your timeline to polish your ideas. Being realistic means not placing the expectation on yourself to write more than 5,000 words each month.&lt;/li&gt;
&lt;li&gt;If you’re working as a teaching assistant for three of those months, you’ll need to consider that you may not be able to complete 15,000 words in that time, and you’ll need to spread that amount out over your other months.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_3&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-03&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_4&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-4-Version-2.jpg&quot;&gt;&lt;picture id=&quot;03f6c0ccc68658030e4e82022a09c2a5&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 4 Set measurable milestones.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;4&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Set measurable milestones.&lt;/b&gt; Milestones mark significant stages along the road to achieving your end goal. Create milestones easily by starting at the end (the accomplishment of the goal) and working your way backwards to your present day and circumstances.
&lt;ul&gt;
&lt;li&gt;Having milestones can help you — and if applicable, your team — stay motivated by breaking the work into smaller chunks and tangible goals so that you don’t need to wait until the project is completely finished to feel as though you’ve accomplished something.&lt;/li&gt;
&lt;li&gt;Don’t leave too much time or too little time between milestones — spacing them two weeks apart has been found to be effective.&lt;sup aria-label=&quot;Link to Reference 3&quot; class=&quot;reference&quot; id=&quot;_ref-3&quot;&gt;&lt;a href=&quot;#_note-3&quot;&gt;[3]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_3&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;Example: When writing your thesis, resist the urge to set milestones based on chapter completions, as this could be a matter of months. Instead, set smaller milestones — perhaps based on word counts — every two weeks, and reward yourself when you hit them.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_4&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-04&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_5&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-5-Version-2.jpg&quot;&gt;&lt;picture id=&quot;62d2353f9ffea835de22ad9fa6b6434b&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 5 Break large tasks into smaller, more manageable chunks.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;5&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Break large tasks into smaller, more manageable chunks.&lt;/b&gt; Some tasks or milestones may seem more daunting to achieve than others.
&lt;ul&gt;
&lt;li&gt;If you’re feeling overwhelmed by a large task, you can help ease your anxiety and make it feel more doable by breaking it down into smaller, more manageable chunks.&lt;/li&gt;
&lt;li&gt;Example: The lit review is often the most difficult chapter to write, as it forms the foundation of your thesis. In order to complete your lit review, you need to do a significant amount of research and analysis before you can even begin writing.&lt;/li&gt;
&lt;li&gt;You can break it into three smaller chunks: research, analysis, and writing. You can break it down even smaller by choosing specific articles and books that you need to read, and setting deadlines for analyzing them and writing about them.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_5&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-05&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_6&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-6.jpg&quot;&gt;&lt;picture id=&quot;36ecc1f4e2a646e8f7690c1cd2a97171&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-6.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-6.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-6.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-6.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 6 Make scheduled lists.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-6.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;6&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Make scheduled lists.&lt;/b&gt; Make a list of tasks that you need to complete in order to hit your milestones. A list on its own will not be effective — you must write this list into a timeline associated with specific, realistic actions.
&lt;ul&gt;&lt;li&gt;Example: By breaking your lit review into smaller chunks, you’ll know exactly what you need to get done, and can figure out a realistic timeframe for those tasks. Perhaps every one to two days you will have to read, analyze, and write about one key reading.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_6&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-06&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_7&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-7-Version-2.jpg&quot;&gt;&lt;picture id=&quot;3451e799afc6c4fda83570346cdbe779&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 7 Put timelines on everything.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;7&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Put timelines on everything.&lt;/b&gt; Without specific time frames and deadlines, work will definitely expand to fill the time allotted, and some tasks may never get completed.
&lt;ul&gt;
&lt;li&gt;No matter what action items you choose for which phase of your action plan, it is essential that a time frame be attached to absolutely everything.&lt;/li&gt;
&lt;li&gt;Example: If you know that it takes you roughly 1 hour to read 2,000 words, and you’ll be reading a 10,000-word article, you need to give yourself at least 5 hours to complete that article.&lt;/li&gt;
&lt;li&gt;You’ll need to also account for at least 2 meals during that time, as well as short breaks every 1 to 2 hours for when your brain is feeling tired. In addition, you’ll want to add at least an hour onto your final number just to account for any possible unanticipated interruptions.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_7&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-07&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_8&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-8-Version-2.jpg&quot;&gt;&lt;picture id=&quot;b78f18427aa06363968374d1dbef385e&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 8 Create a visual representation.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;8&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Create a visual representation.&lt;/b&gt; Once you’ve listed your action items and set a specific timeline, create some type of visual representation of your plan. You could use a flow chart, a Gantt chart, a spreadsheet, or some other type of business tool to accomplish this.
&lt;ul&gt;&lt;li&gt;Keep this visual representation in an easily accessible place — even on a wall in your office or study room, if possible.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_8&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-08&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_9&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-9-Version-2.jpg&quot;&gt;&lt;picture id=&quot;816c86395d05c9777486429ad18f5e16&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 9 Mark things off as you go.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;9&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Mark things off as you go.&lt;/b&gt; Marking things off as you go will not only feel satisfying, it will help you keep on track lest you forget what you’ve already done.
&lt;ul&gt;&lt;li&gt;This is particularly important if you’re working with other people. If you’re working with other people, you might consider using a shared online document so that everyone can check in no matter where they are.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_9&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-09&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_10&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-10-Version-3.jpg&quot;&gt;&lt;picture id=&quot;47baa94f948e49f2c8d50d25999991fb&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 10 Keep a record of everything.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;10&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Keep a record of everything.&lt;/b&gt; As you work through your action plan, keep notes of everything. You may find it helpful to have a binder with different tabs in it to section off different aspects of your planning process. Some examples of sections:
&lt;ul&gt;
&lt;li&gt;Ideas/Miscellaneous notes&lt;/li&gt;
&lt;li&gt;Daily Schedules&lt;/li&gt;
&lt;li&gt;Monthly Schedules&lt;/li&gt;
&lt;li&gt;Milestones&lt;/li&gt;
&lt;li&gt;Research&lt;/li&gt;
&lt;li&gt;Follow-up&lt;/li&gt;
&lt;li&gt;Individuals involved/Contacts&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_10&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-010&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_11&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-10-Version-2.jpg&quot;&gt;&lt;picture id=&quot;40ae205d5d02b06d43970015b15ac3cc&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 11 Don’t stop until you’ve reached your final goal.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;11&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Don’t stop until you’ve reached your final goal.&lt;/b&gt; Once your plan is established and shared with the team (if applicable), and your milestones are scheduled, take daily actions to achieve your goal.
&lt;ul&gt;&lt;li&gt;Although you want to stay persistent, you should also be flexible. It's likely that unexpected events will come up that require you to shift your schedule or plan.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_11&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-011&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_1_12&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-11.jpg&quot;&gt;&lt;picture id=&quot;8dd436a1f0b7fd2d7eef4e06588c8590&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-11.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-11.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-11.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-11.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 12 Change the date if you must, but never give up on your goal.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-11.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;12&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Change the date if you must, but never give up on your goal.&lt;/b&gt; Occasionally, circumstances or unforeseen events can arise that throw a wrench in your ability to meet deadlines, complete tasks and achieve your goal.
&lt;ul&gt;&lt;li&gt;If this happens, do not get discouraged – revise your plan and continue working to meet targets and move forward.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
