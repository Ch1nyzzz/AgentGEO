&lt;li id=&quot;step-id-112&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_1&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-12.jpg&quot;&gt;&lt;picture id=&quot;549d10e45d48d0fdda543a2f26ee9a55&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-12.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-12.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-12.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-12.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 1 Get yourself a good planner.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-12.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;1&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Get yourself a good planner.&lt;/b&gt; Whether this is an app or a book, you'll need a planner that will allow you to plan out your time by the hour, each day of the week. Make sure it’s easy to read and easy to use, otherwise you’ll likely not make use of it.
&lt;ul&gt;
&lt;li&gt;Studies have shown that physically writing things down (i.e. with pen and paper) will make you more likely to do them.&lt;sup aria-label=&quot;Link to Reference 4&quot; class=&quot;reference&quot; id=&quot;_ref-4&quot;&gt;&lt;a href=&quot;#_note-4&quot;&gt;[4]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_4&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt; For this reason, you may be best off using a physical planner to plan your time out.&lt;/li&gt;
&lt;li&gt;Keeping a planner also helps you relieve stress and feel calmer because it makes it less likely that you'll ruminate on what needs to be done. Additionally, it helps your plan become more solid in your mind.&lt;sup aria-label=&quot;Link to Reference 5&quot; class=&quot;reference&quot; id=&quot;_ref-5&quot;&gt;&lt;a href=&quot;#_note-5&quot;&gt;[5]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_5&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_13&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-113&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_2&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-13.jpg&quot;&gt;&lt;picture id=&quot;91bd2a01f33047e73f4dc7a880235bd9&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-13.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-13.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-13.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-13.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 2 Avoid to-do lists.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-13.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;2&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Avoid to-do lists.&lt;/b&gt; So you have a long list of things to do, but when will you actually do them? To-do lists are not as effective as scheduling out your tasks. When you schedule your tasks, you make the time to get them done.&lt;sup aria-label=&quot;Link to Reference 6&quot; class=&quot;reference&quot; id=&quot;_ref-6&quot;&gt;&lt;a href=&quot;#_note-6&quot;&gt;[6]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_6&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;&lt;li&gt;When you have specific time blocks in which to work (many day planners literally contain hourly time blocks), you’ll also find that you’re less likely to procrastinate, as you only have an allotted time in which to get your work done before you must move on to the next scheduled task.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_14&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-114&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_3&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-14.jpg&quot;&gt;&lt;picture id=&quot;7ca5c7e45ba511230f4eae2931723f26&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-14.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-14.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-14.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-14.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 3 Learn how to time block.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-14.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;3&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Learn how to time block.&lt;/b&gt; Blocking out your time helps you get a more realistic idea of how much time you actually have in a day. Start with your highest-priority tasks and work backwards.
&lt;ul&gt;
&lt;li&gt;Do this for your whole week. Having a broader view of how your days will add up will help you refine your schedule to be as productive as possible.&lt;sup aria-label=&quot;Link to Reference 7&quot; class=&quot;reference&quot; id=&quot;_ref-7&quot;&gt;&lt;a href=&quot;#_note-7&quot;&gt;[7]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_7&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;Some experts even suggest having at least a general idea of what your whole month will look like.&lt;sup aria-label=&quot;Link to Reference 8&quot; class=&quot;reference&quot; id=&quot;_ref-8&quot;&gt;&lt;a href=&quot;#_note-8&quot;&gt;[8]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_8&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;Some people recommend starting at the end of your day and working backwards — so if you’re done work/homework at 5 p.m., plan backwards from there, to when your day starts, for example, at 7 a.m.&lt;sup aria-label=&quot;Link to Reference 9&quot; class=&quot;reference&quot; id=&quot;_ref-9&quot;&gt;&lt;a href=&quot;#_note-9&quot;&gt;[9]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_9&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_15&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-115&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_4&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-15.jpg&quot;&gt;&lt;picture id=&quot;3b1890648fb3f87408cef80486e79a55&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-15.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-15.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-15.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-15.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 4 Schedule time for leisure and breaks.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-15.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;4&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Schedule time for leisure and breaks.&lt;/b&gt; Studies have shown that scheduling even your free time can help increase your satisfaction with life.&lt;sup aria-label=&quot;Link to Reference 10&quot; class=&quot;reference&quot; id=&quot;_ref-10&quot;&gt;&lt;a href=&quot;#_note-10&quot;&gt;[10]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_10&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt; It has also been proven that long work hours (50+ hours a week) in fact make you less productive.&lt;sup aria-label=&quot;Link to Reference 11&quot; class=&quot;reference&quot; id=&quot;_ref-11&quot;&gt;&lt;a href=&quot;#_note-11&quot;&gt;[11]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_11&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;
&lt;li&gt;Sleep deprivation will kill your productivity.&lt;sup aria-label=&quot;Link to Reference 12&quot; class=&quot;reference&quot; id=&quot;_ref-12&quot;&gt;&lt;a href=&quot;#_note-12&quot;&gt;[12]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_12&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt; Make sure that you sleep at least 7 hours each night if you’re an adult, or 8.5 hours a night if you’re a teenager.&lt;/li&gt;
&lt;li&gt;Studies show that scheduling small, “strategic renewals” (i.e. workouts, brief naps, meditation, stretching) into your day will boost your productivity and overall health.&lt;sup aria-label=&quot;Link to Reference 13&quot; class=&quot;reference&quot; id=&quot;_ref-13&quot;&gt;&lt;a href=&quot;#_note-13&quot;&gt;[13]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_13&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_16&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-116&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_5&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-16.jpg&quot;&gt;&lt;picture id=&quot;230762cd01e96d306669f6f3324522ea&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-16.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-16.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-16.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-16.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 5 Set aside time...&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-16.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;5&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot;&gt;Set aside time to &lt;a href=&quot;/Plan-Your-Week&quot; title=&quot;Plan Your Week&quot;&gt;&lt;b class=&quot;whb&quot;&gt;plan your week&lt;/b&gt;&lt;/a&gt; out.&lt;/b&gt; Many experts suggest scheduling time right at the start of your week to sit down and plan your week. Figure out how you can best use each day to work toward achieving your goals.&lt;sup aria-label=&quot;Link to Reference 14&quot; class=&quot;reference&quot; id=&quot;_ref-14&quot;&gt;&lt;a href=&quot;#_note-14&quot;&gt;[14]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_14&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;
&lt;li&gt;Account for any work or social obligations you have; if you find your schedule is tight, you may need to drop some of your lower-priority plans.&lt;/li&gt;
&lt;li&gt;This doesn’t mean dropping social activities. It’s important to keep up with your good friends and to nurture your close relationships. You need a support network.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_17&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-117&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_6&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-17.jpg&quot;&gt;&lt;picture id=&quot;6221ecf810fc76a0cab892450b7d6376&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-17.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-17.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-17.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-17.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 6 Know what a sample scheduled day looks like.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-17.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;6&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Know what a sample scheduled day looks like.&lt;/b&gt; To return to the thesis-writing example, a regular day might look something like this:
&lt;ul&gt;
&lt;li&gt;7 a.m.: Wake up&lt;/li&gt;
&lt;li&gt;7:15 a.m.: Exercise&lt;/li&gt;
&lt;li&gt;8:30 a.m.: Shower and dress&lt;/li&gt;
&lt;li&gt;9:15 a.m.: Make and eat breakfast&lt;/li&gt;
&lt;li&gt;10 a.m.: Work on Thesis - writing (plus 15 minutes of small breaks)&lt;/li&gt;
&lt;li&gt;12:15 p.m.: Lunch&lt;/li&gt;
&lt;li&gt;1:15 p.m.: Emails&lt;/li&gt;
&lt;li&gt;2 p.m.: Research and response to research (including 20 to 30 minutes of breaks/snacks)&lt;/li&gt;
&lt;li&gt;5 p.m.: Wrap up, check emails, set primary goals for tomorrow&lt;/li&gt;
&lt;li&gt;5:45 p.m.: Leave desk, go grocery shopping&lt;/li&gt;
&lt;li&gt;7:00 p.m.: Make dinner, eat&lt;/li&gt;
&lt;li&gt;9:00 p.m.: Relax — play music&lt;/li&gt;
&lt;li&gt;10:00 p.m.: Prepare for bed, read in bed (30 minutes), sleep&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_18&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-118&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_7&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-18.jpg&quot;&gt;&lt;picture id=&quot;f2a2fe055e2cca169ed77517ec7075f7&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-18.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-18.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-18.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-18.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 7 Know that every day does not have to look the same.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-18.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;7&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Know that every day does not have to look the same.&lt;/b&gt; You can split up tasks into only 1 or 2 days a week — sometimes it’s even helpful to break up tasks as you can return to them with a fresh perspective.
&lt;ul&gt;&lt;li&gt;Example: Maybe you only write and do research Mondays, Wednesdays, and Fridays, and on Thursdays you substitute writing with learning a musical instrument.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_19&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-119&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_8&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-19.jpg&quot;&gt;&lt;picture id=&quot;58555130e8ca0436b0ab147ddd78d2d6&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-19.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-19.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-19.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-19.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 8 Schedule for problems.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-19.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;8&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Schedule for problems.&lt;/b&gt; Build a little bit of extra time into every block that will account for a slow work day or an unanticipated interruption. A good rule of thumb is to give yourself double the time you expect a task to take — particularly when you're just starting out.
&lt;ul&gt;&lt;li&gt;As you become more comfortable with your tasks, or if you already have a good sense of how long something will take, you can shave your time down, but it’s always a good idea to leave in at least a small buffer.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_20&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-120&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_9&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-20.jpg&quot;&gt;&lt;picture id=&quot;887fd5a7c6cee3abf3cc842bc0d212df&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-20.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-20.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-20.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-20.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 9 Be flexible and gentle with yourself.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-20.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;9&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Be flexible and gentle with yourself.&lt;/b&gt; Especially as you’re starting out, be prepared to tweak your schedule as you go. It’s part of the learning process. You may find it helpful to block your time out in pencil.
&lt;ul&gt;&lt;li&gt;You may also find it helpful to spend a week or two recording what you do each day into a planner as you go. This will help you get a sense of how you spend your time and how much time each task takes.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_21&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-121&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_10&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-21.jpg&quot;&gt;&lt;picture id=&quot;e5a0baca7cd3373a2ab9244f8c18678a&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-21.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-21.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-21.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-21.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 10 Disconnect.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-21.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;10&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Disconnect.&lt;/b&gt; Set times in your day where you’ll check your emails or social media. Be strict with yourself, as it’s possible to lose hours just checking in every few minutes here and there.&lt;sup aria-label=&quot;Link to Reference 15&quot; class=&quot;reference&quot; id=&quot;_ref-15&quot;&gt;&lt;a href=&quot;#_note-15&quot;&gt;[15]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_15&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;&lt;li&gt;This includes turning off your phone, if possible — at least for periods where you really want to focus on work.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_22&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-122&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_2_11&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-22.jpg&quot;&gt;&lt;picture id=&quot;9bc7e5c253cb910c1ffa46e3a859c216&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-22.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-22.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-22.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-22.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 11 Do less.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-22.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;11&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Do less.&lt;/b&gt; This relates to disconnecting. Figure out the most important things in your day — the ones that will help you achieve your goals, and focus on those. De-prioritize the less important things that fragment your day: emails, mindless paperwork, etc.
&lt;ul&gt;
&lt;li&gt;One expert recommends not checking your emails for at least the first one or two hours of your day; this way, you can focus on your important tasks without getting distracted by the things that those emails may contain.&lt;sup aria-label=&quot;Link to Reference 16&quot; class=&quot;reference&quot; id=&quot;_ref-16&quot;&gt;&lt;a href=&quot;#_note-16&quot;&gt;[16]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_16&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;If you know you have a lot of small tasks to do (for example, email, paperwork, tidying up your workspace), group them together into a chunk of time in your schedule rather than allowing them to fragment your day or break the flow of other more important tasks that might require more concentration.&lt;sup aria-label=&quot;Link to Reference 17&quot; class=&quot;reference&quot; id=&quot;_ref-17&quot;&gt;&lt;a href=&quot;#_note-17&quot;&gt;[17]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_17&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_23&quot;&gt;&lt;/div&gt;
&lt;/li&gt;

&lt;li id=&quot;step-id-223&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_3_1&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-23.jpg&quot;&gt;&lt;picture id=&quot;0e3c0d7ac4672c9461140e33353619ce&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/7b/Create-an-Effective-Action-Plan-Step-23.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-23.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/7b/Create-an-Effective-Action-Plan-Step-23.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-23.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/7/7b/Create-an-Effective-Action-Plan-Step-23.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-23.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/7/7b/Create-an-Effective-Action-Plan-Step-23.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-23.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 1 Be positive.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/7/7b/Create-an-Effective-Action-Plan-Step-23.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-23.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;1&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Be positive.&lt;/b&gt; Staying positive is fundamental to achieving your goals.&lt;sup aria-label=&quot;Link to Reference 18&quot; class=&quot;reference&quot; id=&quot;_ref-18&quot;&gt;&lt;a href=&quot;#_note-18&quot;&gt;[18]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_18&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt; Believe in yourself and the people around you. Counter any negative self-talk with positive affirmations.
&lt;ul&gt;&lt;li&gt;In addition to being positive, you will benefit from surrounding yourself with positive people. Research has shown that over time, you adopt the habits of those with whom you spend the most time, so choose your company wisely.&lt;sup aria-label=&quot;Link to Reference 19&quot; class=&quot;reference&quot; id=&quot;_ref-19&quot;&gt;&lt;a href=&quot;#_note-19&quot;&gt;[19]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_19&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_24&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-224&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_3_2&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-24.jpg&quot;&gt;&lt;picture id=&quot;49161f94be8baaa3bd4b1d0fd8e30f39&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ed/Create-an-Effective-Action-Plan-Step-24.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-24.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ed/Create-an-Effective-Action-Plan-Step-24.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-24.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/e/ed/Create-an-Effective-Action-Plan-Step-24.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-24.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/e/ed/Create-an-Effective-Action-Plan-Step-24.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-24.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 2 Reward yourself.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/e/ed/Create-an-Effective-Action-Plan-Step-24.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-24.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;2&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Reward yourself.&lt;/b&gt;&lt;sup aria-label=&quot;Link to Reference 20&quot; class=&quot;reference&quot; id=&quot;_ref-20&quot;&gt;&lt;a href=&quot;#_note-20&quot;&gt;[20]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_20&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt; This is particularly important to do each time you hit a milestone. Give yourself tangible rewards — for example, a nice dinner at your favorite restaurant when you hit your first two-week milestone, or a back massage for your two-month milestone.
&lt;ul&gt;&lt;li&gt;One expert suggests giving a friend money and telling them that they can only give it to you if you finish a given task by a specified time. If you don’t finish the task, your friend keeps the money.&lt;sup aria-label=&quot;Link to Reference 21&quot; class=&quot;reference&quot; id=&quot;_ref-21&quot;&gt;&lt;a href=&quot;#_note-21&quot;&gt;[21]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_21&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;

&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_25&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-225&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_3_3&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-25.jpg&quot;&gt;&lt;picture id=&quot;e03649f1b287d2d8dc6d9340b7147555&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-25.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-25.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-25.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-25.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 3 Get a support network.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-25.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;3&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Get a support network.&lt;/b&gt; It’s important to have your friends and family on your side; it’s also important to build connections with people who have similar goals to you. That way you can check in with each other.&lt;sup aria-label=&quot;Link to Reference 22&quot; class=&quot;reference&quot; id=&quot;_ref-22&quot;&gt;&lt;a href=&quot;#_note-22&quot;&gt;[22]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_22&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;&lt;li&gt;Recruit an accountability partner who knows your deadlines and will help you stay accountable to your goals. For example, they might text you and ask about your progress, or you might check in with them weekly over coffee.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_26&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-226&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_3_4&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-26.jpg&quot;&gt;&lt;picture id=&quot;169da8c11452ff9d2176d3bac9d18ee5&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-26.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-26.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-26.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-26.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 4 Track your progress.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-26.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;4&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Track your progress.&lt;/b&gt; Research has shown that progress is the highest motivator.&lt;sup aria-label=&quot;Link to Reference 23&quot; class=&quot;reference&quot; id=&quot;_ref-23&quot;&gt;&lt;a href=&quot;#_note-23&quot;&gt;[23]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_23&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt; You can track your progress simply by ticking off tasks in your schedule as you go.
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_27&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-227&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_3_5&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-27.jpg&quot;&gt;&lt;picture id=&quot;0a48ff98dafbb9779ea86474cec1131d&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-27.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-27.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-27.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-27.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 5 Go to bed early and get up early.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-27.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;5&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Go to bed early and get up early.&lt;/b&gt; When you read about the schedules of highly productive people, a large percentage of them start their days early. These people also have a morning routine — often this is something they can look forward to doing before they go to work.
&lt;ul&gt;&lt;li&gt;Positive ways to start the morning are to do some sort of exercise (from light stretching and yoga to an hour at the gym), eat a healthy breakfast, and spend 20 to 30 minutes writing in a journal.&lt;sup aria-label=&quot;Link to Reference 24&quot; class=&quot;reference&quot; id=&quot;_ref-24&quot;&gt;&lt;a href=&quot;#_note-24&quot;&gt;[24]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_24&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_28&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-228&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_3_6&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-28.jpg&quot;&gt;&lt;picture id=&quot;3324f08169144b2304c6a9870c324629&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-28.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-28.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-28.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-28.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 6 Give yourself downtime.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-28.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;6&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Give yourself downtime.&lt;/b&gt; Taking breaks is imperative to staying motivated. If you are always working, you’ll wind up exhausting yourself. Taking breaks is a pro-active way to prevent yourself from getting exhausted and losing time that you don’t want to lose.
&lt;ul&gt;
&lt;li&gt;Example: Step away from your computer, turn off your phone, just sit somewhere quiet and do nothing. If ideas come to you, write them down in a notebook; if they don’t, enjoy having nothing to do.&lt;sup aria-label=&quot;Link to Reference 25&quot; class=&quot;reference&quot; id=&quot;_ref-25&quot;&gt;&lt;a href=&quot;#_note-25&quot;&gt;[25]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_25&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_source&quot; href=&quot;#&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;
&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;Example: &lt;a href=&quot;/Meditate&quot; title=&quot;Meditate&quot;&gt; Meditate&lt;/a&gt;. Turn off your phone’s ringer, turn off any notifications that you might get, and set a timer for up to 30 minutes, or however long you can afford. Just sit quietly and try to clear your mind. When thoughts come into your mind, you might find it useful to label them and then let them go — for example, if you think about work, just quietly say in your head, “Work” and then let it go, and keep doing this as the thoughts arise.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_29&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-229&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_3_7&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-29.jpg&quot;&gt;&lt;picture id=&quot;848cf9b5323fbcffc6fb6a4b05044182&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/2/29/Create-an-Effective-Action-Plan-Step-29.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-29.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/2/29/Create-an-Effective-Action-Plan-Step-29.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-29.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/2/29/Create-an-Effective-Action-Plan-Step-29.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-29.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/2/29/Create-an-Effective-Action-Plan-Step-29.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-29.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 7 Visualize.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/2/29/Create-an-Effective-Action-Plan-Step-29.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-29.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;7&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Visualize.&lt;/b&gt; Take a few minutes now and then to think about your goal and how it will feel to have achieved it. This will help you get through the harder times that may accompany pursuing your goal.
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_30&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-230&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_3_8&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-30.jpg&quot;&gt;&lt;picture id=&quot;6597a885b083152b2483e726f53a9428&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/0/09/Create-an-Effective-Action-Plan-Step-30.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-30.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/0/09/Create-an-Effective-Action-Plan-Step-30.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-30.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/0/09/Create-an-Effective-Action-Plan-Step-30.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-30.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/0/09/Create-an-Effective-Action-Plan-Step-30.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-30.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 8 Know that it won’t be easy.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/0/09/Create-an-Effective-Action-Plan-Step-30.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-30.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;8&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Know that it won’t be easy.&lt;/b&gt; Things worth having are rarely easy to get. You may have to resolve a lot of issues or work through some things as you work toward your goal. Accept them as they come.
&lt;ul&gt;&lt;li&gt;Many gurus who extol the virtue of living in the present advise to accept setbacks as though you chose them yourself. Instead of fighting them or getting upset, accept them, learn from them, and set to work figuring out how you’ll achieve your goal given the changed circumstances.&lt;sup aria-label=&quot;Link to Reference 26&quot; class=&quot;reference&quot; id=&quot;_ref-26&quot;&gt;&lt;a href=&quot;#_note-26&quot;&gt;[26]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_26&quot; style=&quot;display: none;&quot;&gt;

&lt;/span&gt;
&lt;/sup&gt;&lt;sup aria-label=&quot;Link to Reference 27&quot; class=&quot;reference&quot; id=&quot;_ref-27&quot;&gt;&lt;a href=&quot;#_note-27&quot;&gt;[27]&lt;/a&gt;&lt;span class=&quot;ts_popup&quot; hidden=&quot;&quot; id=&quot;ts_popup_27&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
