&lt;li id=&quot;step-id-331&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_4_1&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-31.jpg&quot;&gt;&lt;picture id=&quot;3286d7e65661b7f69f39120b84fc7f20&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-31.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-31.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-31.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-31.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 1 Write about what you want.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-31.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;1&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Write about what you want.&lt;/b&gt; Do this in a journal or a text document. Think about what overall goal you want to achieve and why you want to achieve it.&lt;sup aria-label=&quot;Link to Reference 28&quot; class=&quot;reference trusted&quot; id=&quot;_ref-28&quot;&gt;&lt;a href=&quot;#_note-28&quot;&gt;[28]&lt;/a&gt;&lt;span class=&quot;ts_popup trustedsource&quot; hidden=&quot;&quot; id=&quot;ts_popup_28&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;a class=&quot;ts_trustworthy&quot; href=&quot;/wikiHow:Delivering-a-Trustworthy-Experience&quot;&gt;Expert Source&lt;/a&gt;
&lt;span class=&quot;ts_name&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_expert_link&quot; href=&quot;/Author/Jennifer-Clark&quot;&gt;&lt;span class=&quot;ts_expert_image&quot;&gt;&lt;picture&gt;&lt;source srcset=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png.webp&quot; type=&quot;image/webp&quot;/&gt;&lt;img alt=&quot;Jennifer Clark&quot; height=&quot;30&quot; loading=&quot;lazy&quot; src=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png&quot; style=&quot;max-width: 30px&quot; width=&quot;30&quot;/&gt;&lt;/picture&gt;&lt;/span&gt;Jennifer Clark&lt;br/&gt;&lt;span class=&quot;ts_blurb&quot;&gt;Life Coach&lt;/span&gt;&lt;/a&gt;
&lt;span class=&quot;ts_description&quot;&gt;Expert Interview&lt;/span&gt;
&lt;/span&gt;
&lt;/sup&gt; This is particularly helpful if you're not entirely sure what you want to do, but just have a feeling about it.
&lt;ul&gt;
&lt;li&gt;For example, if you want to make more money, you may discover that you actually want more freedom. Without knowing that, you might get locked into something that doesn't serve your true goal, like landing in a job where you have plenty of money but no free time for your family or hobbies.&lt;/li&gt;
&lt;li&gt;Writing regularly in a journal is a great way to keep in touch with yourself and to keep up to date on how you’re feeling. Many people claim that writing helps them clarify how they feel and what they want.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_32&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-332&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_4_2&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-32.jpg&quot;&gt;&lt;picture id=&quot;82106a42cdcf0d7c1412e0759aceced6&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-32.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-32.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-32.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-32.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 2 Do your research.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-32.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;2&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Do your research.&lt;/b&gt; Once you have an idea of what you want to do, do your research. Researching your goals will help you narrow down the best way to achieve them.
&lt;ul&gt;
&lt;li&gt;Reach out to people who have achieved goals similar to yours. They can provide you with helpful tips about what works, as well as what to avoid.&lt;/li&gt;
&lt;li&gt;Online forums like Reddit are a great place to look for discussions on most topics — particularly if you want an insider’s view on specific careers.&lt;/li&gt;
&lt;li&gt;Example: While writing your thesis you’re beginning to wonder what you’ll end up doing with it. Read about what others have done with similar degrees to the one that you’re pursuing. This might even help you gear your thesis towards publications or other opportunities that can help further your career.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_33&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-333&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_4_3&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-33.jpg&quot;&gt;&lt;picture id=&quot;46ed57d636aca2b8f7cdcefe2123d99b&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/c/cd/Create-an-Effective-Action-Plan-Step-33.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-33.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/c/cd/Create-an-Effective-Action-Plan-Step-33.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-33.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/c/cd/Create-an-Effective-Action-Plan-Step-33.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-33.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/c/cd/Create-an-Effective-Action-Plan-Step-33.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-33.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 3 Consider your options and choose the one that best serves you.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/c/cd/Create-an-Effective-Action-Plan-Step-33.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-33.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;3&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Consider your options and choose the one that best serves you.&lt;/b&gt;&lt;sup aria-label=&quot;Link to Reference 29&quot; class=&quot;reference trusted&quot; id=&quot;_ref-29&quot;&gt;&lt;a href=&quot;#_note-29&quot;&gt;[29]&lt;/a&gt;&lt;span class=&quot;ts_popup trustedsource&quot; hidden=&quot;&quot; id=&quot;ts_popup_29&quot; style=&quot;display: none;&quot;&gt;
&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
&lt;a class=&quot;ts_trustworthy&quot; href=&quot;/wikiHow:Delivering-a-Trustworthy-Experience&quot;&gt;Expert Source&lt;/a&gt;
&lt;span class=&quot;ts_name&quot;&gt;&lt;/span&gt;
&lt;a class=&quot;ts_expert_link&quot; href=&quot;/Author/Jennifer-Clark&quot;&gt;&lt;span class=&quot;ts_expert_image&quot;&gt;&lt;picture&gt;&lt;source srcset=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png.webp&quot; type=&quot;image/webp&quot;/&gt;&lt;img alt=&quot;Jennifer Clark&quot; height=&quot;30&quot; loading=&quot;lazy&quot; src=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png&quot; style=&quot;max-width: 30px&quot; width=&quot;30&quot;/&gt;&lt;/picture&gt;&lt;/span&gt;Jennifer Clark&lt;br/&gt;&lt;span class=&quot;ts_blurb&quot;&gt;Life Coach&lt;/span&gt;&lt;/a&gt;
&lt;span class=&quot;ts_description&quot;&gt;Expert Interview&lt;/span&gt;
&lt;/span&gt;
&lt;/sup&gt; After you’ve done your research you’ll have a good sense of what each path and result will look like. This should make it easier for you to choose the path that will best serve you in achieving your goal.
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_34&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-334&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_4_4&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-34.jpg&quot;&gt;&lt;picture id=&quot;6a91fd3e23cfa93e97963a292c8a9f5b&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/c/cb/Create-an-Effective-Action-Plan-Step-34.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-34.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/c/cb/Create-an-Effective-Action-Plan-Step-34.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-34.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/c/cb/Create-an-Effective-Action-Plan-Step-34.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-34.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/c/cb/Create-an-Effective-Action-Plan-Step-34.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-34.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 4 Be aware of things related to your goal that may affect you.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/c/cb/Create-an-Effective-Action-Plan-Step-34.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-34.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;4&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Be aware of things related to your goal that may affect you.&lt;/b&gt; This includes being aware of things that may hinder you in your goals — in the case of thesis writing this may include mental exhaustion, lack of research, or unexpected work responsibilities.
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_35&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li class=&quot;final_li&quot; id=&quot;step-id-335&quot;&gt;
&lt;a class=&quot;stepanchor&quot; name=&quot;step_4_5&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg largeimage floatcenter&quot;&gt;&lt;a class=&quot;image&quot; href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-35.jpg&quot;&gt;&lt;picture id=&quot;a2e44a6c4a6d55f33ec5133ea5821bc5&quot;&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/dd/Create-an-Effective-Action-Plan-Step-35.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-35.jpg.webp 460w&quot; type=&quot;image/webp&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(max-width: 728px)&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/dd/Create-an-Effective-Action-Plan-Step-35.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-35.jpg 460w&quot; type=&quot;image/jpeg&quot; width=&quot;460&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/d/dd/Create-an-Effective-Action-Plan-Step-35.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-35.jpg.webp 728w&quot; type=&quot;image/webp&quot; width=&quot;728&quot;/&gt;&lt;source height=&quot;546&quot; media=&quot;(min-width: 729px)&quot; srcset=&quot;/images/thumb/d/dd/Create-an-Effective-Action-Plan-Step-35.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-35.jpg 728w&quot; type=&quot;image/jpeg&quot; width=&quot;728&quot;/&gt;&lt;img alt=&quot;Step 5 Be flexible.&quot; class=&quot;whcdn&quot; decoding=&quot;async&quot; height=&quot;345&quot; loading=&quot;lazy&quot; src=&quot;https://www.wikihow.com/images/thumb/d/dd/Create-an-Effective-Action-Plan-Step-35.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-35.jpg&quot; width=&quot;460&quot;/&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div aria-hidden=&quot;true&quot; class=&quot;step_num&quot;&gt;5&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b aria-hidden=&quot;true&quot; class=&quot;whb&quot;&gt;Be flexible.&lt;/b&gt; Your goals may change as you move toward them. Allow room for yourself, and as a result, your goals, to develop. That said, don’t just give up when it gets hard. There’s a difference between losing interest and losing hope!
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
