&lt;/span&gt;&lt;h1 class=&quot;entry-title&quot; data-dcnode-id=&quot;876&quot; itemprop=&quot;headline&quot;&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;Here’s How to Evaluate Manager Effectiveness&lt;/span&gt;&lt;/h1&gt;&lt;p class=&quot;entry-meta&quot; data-dcnode-id=&quot;867&quot;&gt;&lt;span class=&quot;entry-author&quot; data-dcnode-id=&quot;872&quot; itemprop=&quot;author&quot; itemscope=&quot;&quot; itemtype=&quot;http://schema.org/Person&quot;&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;By &lt;/span&gt;&lt;a class=&quot;author url fn&quot; data-dcnode-id=&quot;873&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/author/ian-cook/&quot; rel=&quot;author&quot; title=&quot;Posts by Ian Cook&quot;&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt;Ian Cook&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;time class=&quot;entry-date published&quot; data-dcnode-id=&quot;870&quot; datetime=&quot;2017-10-23T09:30:17-04:00&quot; itemprop=&quot;datePublished&quot;&gt;&lt;span data-dcnode-id=&quot;871&quot; instrument_node=&quot;&quot;&gt;October 23, 2017&lt;/span&gt;&lt;/time&gt;&lt;time class=&quot;updated&quot; data-dcnode-id=&quot;868&quot; datetime=&quot;2017-10-20T12:29:32-04:00&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;October 20, 2017&lt;/span&gt;&lt;/time&gt;&lt;/p&gt;&lt;div class=&quot;swp_social_panel swp_horizontal_panel swp_flat_fresh swp_default_full_color swp_other_full_color swp_individual_full_color scale-100 scale-full_width&quot; data-dcnode-id=&quot;842&quot; data-float=&quot;top&quot; data-float-color=&quot;&quot; data-float-mobile=&quot;bottom&quot; data-min-width=&quot;&quot; data-post-id=&quot;109134&quot; data-transition=&quot;slide&quot;&gt;&lt;div class=&quot;nc_tweetContainer swp_share_button swp_twitter&quot; data-dcnode-id=&quot;859&quot; data-network=&quot;twitter&quot;&gt;&lt;a class=&quot;nc_tweet swp_share_link&quot; data-dcnode-id=&quot;860&quot; data-link=&quot;https://twitter.com/intent/tweet?text=Here%27s+How+to+Evaluate+Manager+Effectiveness&amp;amp;url=https%3A%2F%2Fwww.tlnt.com%2Fheres-how-to-evaluate-manager-effectiveness%2F&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DHere%2527s%2BHow%2Bto%2BEvaluate%2BManager%2BEffectiveness%26url%3Dhttps%253A%252F%252Fwww.tlnt.com%252Fheres-how-to-evaluate-manager-effectiveness%252F&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span class=&quot;swp_count swp_hide&quot; data-dcnode-id=&quot;861&quot; style=&quot;transition: padding 0.1s linear 0s;&quot;&gt;&lt;span class=&quot;iconFiller&quot; data-dcnode-id=&quot;862&quot;&gt;&lt;span class=&quot;spaceManWilly&quot; data-dcnode-id=&quot;863&quot;&gt;&lt;i class=&quot;sw swp_twitter_icon&quot; data-dcnode-id=&quot;866&quot;&gt;&lt;/i&gt;&lt;span class=&quot;swp_share&quot; data-dcnode-id=&quot;864&quot;&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;Tweet&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nc_tweetContainer swp_share_button swp_facebook&quot; data-dcnode-id=&quot;851&quot; data-network=&quot;facebook&quot;&gt;&lt;a class=&quot;nc_tweet swp_share_link&quot; data-dcnode-id=&quot;852&quot; data-link=&quot;https://www.facebook.com/share.php?u=https%3A%2F%2Fwww.tlnt.com%2Fheres-how-to-evaluate-manager-effectiveness%2F&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.facebook.com/share.php%3Fu%3Dhttps%253A%252F%252Fwww.tlnt.com%252Fheres-how-to-evaluate-manager-effectiveness%252F&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span class=&quot;swp_count swp_hide&quot; data-dcnode-id=&quot;853&quot; style=&quot;transition: padding 0.1s linear 0s;&quot;&gt;&lt;span class=&quot;iconFiller&quot; data-dcnode-id=&quot;854&quot;&gt;&lt;span class=&quot;spaceManWilly&quot; data-dcnode-id=&quot;855&quot;&gt;&lt;i class=&quot;sw swp_facebook_icon&quot; data-dcnode-id=&quot;858&quot;&gt;&lt;/i&gt;&lt;span class=&quot;swp_share&quot; data-dcnode-id=&quot;856&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;Share&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nc_tweetContainer swp_share_button swp_linkedin&quot; data-dcnode-id=&quot;843&quot; data-network=&quot;linkedin&quot;&gt;&lt;a class=&quot;nc_tweet swp_share_link&quot; data-dcnode-id=&quot;844&quot; data-link=&quot;https://www.linkedin.com/cws/share?url=https%3A%2F%2Fwww.tlnt.com%2Fheres-how-to-evaluate-manager-effectiveness%2F&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.linkedin.com/cws/share%3Furl%3Dhttps%253A%252F%252Fwww.tlnt.com%252Fheres-how-to-evaluate-manager-effectiveness%252F&quot; rel=&quot;nofollow noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span class=&quot;swp_count swp_hide&quot; data-dcnode-id=&quot;845&quot; style=&quot;transition: padding 0.1s linear 0s;&quot;&gt;&lt;span class=&quot;iconFiller&quot; data-dcnode-id=&quot;846&quot;&gt;&lt;span class=&quot;spaceManWilly&quot; data-dcnode-id=&quot;847&quot;&gt;&lt;i class=&quot;sw swp_linkedin_icon&quot; data-dcnode-id=&quot;850&quot;&gt;&lt;/i&gt;&lt;span class=&quot;swp_share&quot; data-dcnode-id=&quot;848&quot;&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt;Share&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;841&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/header&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;entry-content&quot; data-dcnode-id=&quot;404&quot; itemprop=&quot;text&quot;&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;836&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;As global markets push businesses to become more agile and responsive, it’s tempting to predict that management roles will virtually disappear from progressive companies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;827&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;But even&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;832&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.holacracy.org/how-it-works/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;833&quot; instrument_node=&quot;&quot;&gt;Holacracy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;(a self-management structure&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;829&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/weekly-wrap-getting-rid-of-all-managers-no-it-wont-even-work-at-zappos/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;830&quot; instrument_node=&quot;&quot;&gt;made famous by online shoe retailer Zappos&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;) has some hierarchy: Instead of “managers,” there are “lead links” who carry leadership functions and oversee new teams as they form and disband with each project cycle.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;818&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;While&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;823&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//hbr.org/2016/07/beyond-the-holacracy-hype&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;widespread adoption of Holacracy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;is not likely in the near future, many organizations are shifting towards more flat structures where teams are gaining in importance. Among 10,000 business and HR leaders, 94% report that agility and collaboration are key to their organization’s success, and 32% say that they are designing their organization to be more adaptable and team-centric, according to Deloitte’s&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;820&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dupress.deloitte.com/dup-us-en/focus/human-capital-trends/2016/organizational-models-network-of-teams.html&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;2017 Global Human Capital Trends&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;report.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;812&quot;&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;These kind of fluid, team-centric operating models require formal structure. As Deloitte’s experts emphasize, structures of teams are enabled by a management model that draws&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;814&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dupress.deloitte.com/dup-us-en/focus/human-capital-trends/2016/organizational-models-network-of-teams.html&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;clear distinctions between&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;“two necessary roles and types of management: the administrative or talent manager (reflecting the traditional, formal structure) and the mission or project manager (representing the new, team-based structure).”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;809&quot;&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;Measuring the Effectiveness of Administrative and Mission Managers&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;808&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;806&quot;&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;If your business is moving towards a dual management structure system, gaining clarity around hiring, compensation, and performance will become even more important. With fluidity comes a certain degree of murkiness, and thus objectively measuring manager effectiveness will become even more complex.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;805&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;803&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;Because the two types of managers serve two very different roles, they need to be measured in very different ways.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;800&quot;&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;A mission manager’s primary function is to get the project delivered on target, while an administrative manager is more focused on an employee’s skills and career development.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;797&quot;&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;Knowing how to measure the different types of leaders will put you in a position to guide your organization through success as it strives to become more responsive to market pressures. Here are two distinct sets of metrics for each type of manager.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;794&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;5 Manager Effectiveness Metrics for Administrative Managers&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;788&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;An old adage says:&amp;nbsp;“&lt;/span&gt;&lt;a data-dcnode-id=&quot;790&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/why-employees-really-quit-and-the-2-things-that-will-keep-them/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;791&quot; instrument_node=&quot;&quot;&gt;People quit their bosses, not their jobs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;.” Because time with a project or mission manager is relatively short&amp;nbsp;—&amp;nbsp;six months or less&amp;nbsp;—&amp;nbsp;employees will gauge their relationship with the organization through their traditional people manager.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;784&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;785&quot; style=&quot;color: #333399;&quot;&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;∼∼∼∼&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;776&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; style=&quot;color: #333399;&quot;&gt;&lt;em data-dcnode-id=&quot;778&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;Researchers have found that only a small percentage of workers quit their job because of their boss. See “&lt;/span&gt;&lt;a data-dcnode-id=&quot;780&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/surprise-most-people-leave-companies-not-managers/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;Surprise! Most People Leave Companies, Not Managers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt;.”&lt;/span&gt;&lt;/em&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;773&quot; style=&quot;text-align: center;&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;∼∼∼∼&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;770&quot;&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt;This means that for administrative managers, it’s important to use metrics that will help you answer questions like: Which managers retain the most top performers? Which managers grow the best employees? From there, you can look to groom more managers like them, have conversations with those who need improvement, and make sure your best managers are guiding your most critical employees.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;767&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;Here are the “must have” metrics to understand how effective your administrative managers are:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;763&quot;&gt;&lt;strong data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;#1: Engagement score&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;752&quot;&gt;&lt;strong data-dcnode-id=&quot;760&quot;&gt;&lt;span data-dcnode-id=&quot;761&quot; instrument_node=&quot;&quot;&gt;Why you need it: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;Managers are not the only factor&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;757&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/this-is-when-engagement-declines-are-most-likely/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;influencing employee engagement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;, however they are pivotal because of their opportunity to understand and support employee engagement at an individual level. Most engagement survey processes have a specific series of questions that look at how &lt;/span&gt;&lt;a data-dcnode-id=&quot;754&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/yes-a-managers-style-does-have-a-great-impact-on-employee-engagement/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;employees view their supervisor&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt;. Understanding and using this score to build a complete view of manager effectiveness is important.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;747&quot;&gt;&lt;strong data-dcnode-id=&quot;749&quot;&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;How to get it: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;The most common way this score is generated is by calculating the mean scores for a series of survey items related to the supervisor relationship.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;742&quot;&gt;&lt;strong data-dcnode-id=&quot;744&quot;&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;Red flags to act on: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;When a manager’s engagement score is significantly lower than similar work groups in the organization, this is an indication that the manager is falling short. Analyzing this score alongside high performer turnover or absence rates will give you a good idea of how big an impact the manager is having on the team. Low engagement coupled with high resignation and/or high absence rates means that action is required to improve the dynamics of that work group. It is also worth doing some investigation based solely on low engagement, as this may be the first sign that resignations and absences will follow.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;738&quot;&gt;&lt;strong data-dcnode-id=&quot;739&quot;&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;#2: High performer resignation rate&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;730&quot;&gt;&lt;strong data-dcnode-id=&quot;735&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;Why you need it: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;A general turnover metric — which also incorporates the turnover of poor performing employees — is too broad to support good quality decisions about management skills. Instead, examine the&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;732&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/use-your-turnover-to-know-if-you-have-a-problem/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;resignation rate of high performers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;to see if specific managers or work units are losing more high performers than others.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;726&quot;&gt;&lt;strong data-dcnode-id=&quot;727&quot;&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;How to get it:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;711&quot;&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;722&quot;&gt;&lt;span data-dcnode-id=&quot;723&quot; instrument_node=&quot;&quot;&gt;Chose a time frame (e.g. previous 12 months).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;719&quot;&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;Count all the high performing employees who resigned.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;716&quot;&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;Calculate the average headcount for high performing employees.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;713&quot;&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;Divide the number of high performers who resigned by the average high performer headcount.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;706&quot;&gt;&lt;strong data-dcnode-id=&quot;708&quot;&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;Red flags to act on: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;Whenever the high performer resignation rate is greater than the overall resignation rate, it signals a problem that needs to be addressed. If you are losing high performers more quickly than your general employee base, this means your overall talent quality is reducing, which is likely to lead to productivity and quality challenges some time in the future.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;703&quot;&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;If the rates for certain managers are substantially higher than other managers, this is an indication that all is not well in that work group. Although it would be too simplistic to assume the manager is the sole cause, it is an indicator that further investigation and insight is needed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;699&quot;&gt;&lt;strong data-dcnode-id=&quot;700&quot;&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;#3: Promotions actioned&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;694&quot;&gt;&lt;strong data-dcnode-id=&quot;696&quot;&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;Why you need it: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;Classic promotion metrics simply look at how many people in a group have received a promotion. This does nothing to indicate whether or not they were promoted within the group or came to the group from somewhere else. When trying to understand whether a manager is good at growing talent or not, you need to understand how many of their people were promoted — both within their team and externally to another team.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;691&quot;&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;For this purpose, look at your promotions actioned, which calculates the number of people who were promoted from a specific work group and gives a true picture of the manager’s ability to develop promotable staff.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;688&quot;&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;By looking at promotions actioned across your organization, you can see from which work units and managers more people than average are being promoted. This indicates which managers are more effective at growing talent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;687&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;684&quot;&gt;&lt;strong data-dcnode-id=&quot;685&quot;&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;How to get it:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;669&quot;&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;680&quot;&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;Chose a time frame.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;677&quot;&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;Identify all of the people who had a promotion within that timeframe.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;674&quot;&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt;Allocate that promotion event to their location / work unit at the start of the time frame – (where they were promoted from, not where they were promoted to).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;671&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;Divide the number of promotions by the average headcount in the workgroup to create a rate.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;661&quot;&gt;&lt;strong data-dcnode-id=&quot;666&quot;&gt;&lt;span data-dcnode-id=&quot;667&quot; instrument_node=&quot;&quot;&gt;Red flags to act on: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;Managers who consistently have a low or zero promotions actioned rate may be &lt;/span&gt;&lt;a data-dcnode-id=&quot;663&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/talent-hoarding-a-hidden-problem-thats-likely-hurting-your-firm/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;talent hogs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;. These people hold back team members to make sure their results get delivered, at the expense of the employee and the organization overall. A rate that is low compared to others, or zero, should be a reason to investigate further and clearly identify why this manager is not able to build staff who can progress through the organization.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;657&quot;&gt;&lt;strong data-dcnode-id=&quot;658&quot;&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;#4: Direct compensation variance from plan&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;649&quot;&gt;&lt;strong data-dcnode-id=&quot;654&quot;&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;Why you need it: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;653&quot; instrument_node=&quot;&quot;&gt;The amount that an organization spends on people in professional services or technology companies ranges from 60 to 80 cents of every dollar. Even with the best financial controls in place, managers play a key role in&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;651&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/what-to-do-when-you-need-to-ignore-your-pay-survey/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;managing the ad-hoc, off-cycle increases to base pay&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt;, as well as the use of variable or supplemental pay to incentivize employees or cover peaks in demand.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;646&quot;&gt;&lt;span data-dcnode-id=&quot;647&quot; instrument_node=&quot;&quot;&gt;The primary job of a manager is to get the work done with the resources provided — whether these are financial resources or human resources. Understanding how closely the people costs of a work unit match the plan provides insight into how well a manager is doing at stewarding resources.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;641&quot;&gt;&lt;strong data-dcnode-id=&quot;643&quot;&gt;&lt;span data-dcnode-id=&quot;644&quot; instrument_node=&quot;&quot;&gt;How to get it: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt;This analysis requires the ability to integrate and align your planning and analytics work. Here is how to calculate the direct compensation variance from plan:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;640&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;623&quot;&gt;&lt;span data-dcnode-id=&quot;639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;637&quot;&gt;&lt;span data-dcnode-id=&quot;638&quot; instrument_node=&quot;&quot;&gt;Align your planning and analytics to use the same basis for modelling people costs (e.g. direct compensation for both includes base pay, variable pay, supplemental pay, etc.).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;636&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;634&quot;&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;Publish your planned direct compensation for each work unit.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;631&quot;&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;Calculate your actual direct compensation from pay data.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;628&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;Subtract your actuals from your plan.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;625&quot;&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;Convert the sum of the difference into a percentage variance (e.g $10 over a $100 plan costs is 10% variance).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;622&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;618&quot;&gt;&lt;strong data-dcnode-id=&quot;620&quot;&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;Red flags to act on: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;Managers should not be expected to constantly hit their plan targets precisely. This level of accuracy suggests too high a focus on costs. However, if there is a variance above plan for several months, or if the variance is higher than 2-3%, then it indicates the need to do some more detailed analysis into what is causing the variance (for example, is the variance due to big increases in base pay due to new hires, or is it due to high supplemental pay payouts as the result of increased work volumes?). A variance does not always indicate a negative situation, but it does indicate the need for investigation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;614&quot;&gt;&lt;strong data-dcnode-id=&quot;615&quot;&gt;&lt;span data-dcnode-id=&quot;616&quot; instrument_node=&quot;&quot;&gt;#5: Absence days per full-time equivalent (FTE)&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;613&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;607&quot;&gt;&lt;strong data-dcnode-id=&quot;611&quot;&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt;Why you need it: &lt;/span&gt;&lt;/strong&gt;&lt;a data-dcnode-id=&quot;609&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.visier.com/workforce-intelligence-101/workations-employee-absenteeism/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;610&quot; instrument_node=&quot;&quot;&gt;Absenteeism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;is often a “sleeper” issue that, when monitored, can provide great insight into which managers are demanding too much of their people or have an engagement problem. There is a level of absence which is “normal” — everyone gets sick sometime. Monitoring this metric is about identifying patterns that do not fit with what is expected and understanding what is causing this abnormal behavior.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ad ad--in-post&quot; data-dcnode-id=&quot;573&quot; id=&quot;div-gpt-ad-1481833841864-0&quot;&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h5 class=&quot;ad-title&quot; data-dcnode-id=&quot;603&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;Article Continues Below&lt;/span&gt;&lt;/h5&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;article class=&quot;type-ere_sponsoredcontent&quot; data-dcnode-id=&quot;575&quot;&gt;&lt;span data-dcnode-id=&quot;601&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;sponsored-supertitle&quot; data-dcnode-id=&quot;599&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;Sponsored Content&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;figure class=&quot;sponsored-image&quot; data-dcnode-id=&quot;594&quot;&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;&quot; class=&quot;attachment-medium-thumbnail size-medium-thumbnail wp-post-image&quot; data-dcnode-id=&quot;596&quot; height=&quot;250&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/wp-content/uploads/sites/4/2022/04/HS_Access22_ERE_300x250.jpg&amp;amp;raw&quot; width=&quot;300&quot;&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;593&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;sponsored-title&quot; data-dcnode-id=&quot;591&quot;&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;Handshake Access 2022 Conference: Accelerating connection, community, and opportunity&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;sponsored-content&quot; data-dcnode-id=&quot;585&quot;&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;587&quot; style=&quot;font-weight: 400&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;The world has changed and so have Gen Z’s career expectations. Bridge the gap at Handshake Access, the largest virtual gathering for employers and higher ed focused on accelerating early careers. Join us on May 18 &amp;amp; 19.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;sponsored-button&quot; data-dcnode-id=&quot;578&quot;&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;button sponsored-link&quot; data-dcnode-id=&quot;580&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//joinhandshake.com/access/%3Futm_medium%3D3rdparty_sponsor%26utm_source%3Dtlnt%26utm_campaign%3DFY22Q1-EMP-AMER-Handshake-Access-2022-Parent%26utm_content%3Dhandshake_access_2022%26utm_term%3Dtlnt_sponsored_content&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;Register now&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/article&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;569&quot;&gt;&lt;strong data-dcnode-id=&quot;570&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;How to get it:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;554&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;565&quot;&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;Chose a time frame.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;Count the number of days absent during the time frame.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;559&quot;&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;Calculate the number of Full Time Equivalents working in each work group.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;556&quot;&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;Divide the number of days absent by the number of FTEs (this gives you a “normalized” or common score that can be compared across work groups).&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;549&quot;&gt;&lt;strong data-dcnode-id=&quot;551&quot;&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;Red flags to act on: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;There are two clear indicators that the behavior of a work group is not effective and that further investigation is required. The first is a consistent level of absence above the average for similar work groups. Absence rates do increase with age, so you need to check if one group is substantially older than another. But in general, absence patterns should be consistent across groups doing similar work with similar demographic make ups.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;546&quot;&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt;The second red flag is an increase in absence. Month-to-month there are likely to be fluctuations, however, a steadily rising trend is an indicator of a work group that may be over-worked or may be disengaged, looking to leave the organization. (The most common way to get time for an interview is to fake a day of sickness.)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;543&quot;&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;3 Manager Effectiveness Metrics for Mission Managers&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;540&quot;&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;The mission manager is essentially a project leader who is task-focused. Successful mission managers are strong communicators who can motivate people and coordinate many moving parts at once to meet project goals. Once you understand who the top performing mission managers are, you can then be strategic about who gets assigned to lead the most critical or complex projects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;537&quot;&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;Here are the “must have” metrics to understand how effective your mission managers are:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;533&quot;&gt;&lt;strong data-dcnode-id=&quot;534&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;#1: Engagement score&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;528&quot;&gt;&lt;strong data-dcnode-id=&quot;530&quot;&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;Why you need it: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;A project manager who drives people to hit mission objectives without consideration for the team’s general well-being can create widespread burnout within the organization. This kind of “all or nothing” attitude can hamper engagement, drive up absenteeism rates, and have a negative impact on retention. Therefore, a mission manager’s engagement score needs to be considered as part of the bigger picture.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;523&quot;&gt;&lt;strong data-dcnode-id=&quot;525&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;How to get it:&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;If your organization typically only evaluates traditional managers who are tied to functional departments, you may need to change the way you capture your engagement data to include mission managers. Add questions to engagement surveys about the employee’s relationship with the mission manager specifically. To create a rolling score over time, include an assessment of the manager at the end of each mission.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;518&quot;&gt;&lt;strong data-dcnode-id=&quot;520&quot;&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;Red flags to act on: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;One bad engagement score related to a specific mission may simply mean the mission manager was learning something new, and is not necessarily reflective of overall performance. However, when a team leader’s score is consistently low&amp;nbsp;—&amp;nbsp;and particularly when this is coupled with high absence rates&amp;nbsp;—&amp;nbsp;it is an indication that he or she could be burning out employees.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;514&quot;&gt;&lt;strong data-dcnode-id=&quot;515&quot;&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;#2: On-target delivery&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;509&quot;&gt;&lt;strong data-dcnode-id=&quot;511&quot;&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;Why you need it: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;Most organizations move towards a more mission-focused structure so they can deliver specific outcomes (such as new software releases) within shorter cycles. This means that getting projects completed on time and within a specific scope is paramount. The on-target delivery metric will help you evaluate how the mission manager is hitting these two objectives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;508&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;505&quot;&gt;&lt;strong data-dcnode-id=&quot;506&quot;&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;How to get it:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;493&quot;&gt;&lt;span data-dcnode-id=&quot;503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;501&quot;&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;Identify the scope and deadline for the current “mission”&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;498&quot;&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;Identify volume of work complete and amount of time that has passed.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;495&quot;&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;Calculate percentage completion by due date e.g. 80% complete on due date.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;492&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;488&quot;&gt;&lt;strong data-dcnode-id=&quot;490&quot;&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;Red flags to act on: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;A common theme of project over-runs indicates that a manager may be having difficulty getting team members to rally around a delivery date. Also, if you see that the team is not on target but that employees are working overtime, you need to drill further by having a conversation with the manager and the team members, as there are many factors that could be contributing to the problem.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;485&quot;&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;You also need to consider the difficulty level of the mission; some are more complex because they have an undefined scope. If the different missions are rated by difficulty when the data is inputted into the project management system, your insight will be that much richer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;481&quot;&gt;&lt;strong data-dcnode-id=&quot;482&quot;&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;#3: Labor utilization variance&lt;/span&gt;&lt;/strong&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;476&quot;&gt;&lt;strong data-dcnode-id=&quot;478&quot;&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt;Why you need it: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt;Skilled mission managers who can organize projects and run teams are tremendous assets. They can evaluate interdependencies of tasks and skills and ensure they are lined up to deliver on the project objectives. The labor utilization variance will help you evaluate whether the manager was efficient in how he or she deployed people.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;472&quot;&gt;&lt;strong data-dcnode-id=&quot;473&quot;&gt;&lt;span data-dcnode-id=&quot;474&quot; instrument_node=&quot;&quot;&gt;How to get it:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;460&quot;&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;468&quot;&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt;Identify the total person hours allocated to the mission.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;465&quot;&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;Identify the person hours that have currently been delivered to the project.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;462&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;Calculate the percentage variance between actual hours and allocated hours e.g. 110 actual hours vs 100 allocated hours = +10% variance.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;459&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;457&quot;&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;(Note: The same calculation can be run based on days if that is easier to track than hours)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;452&quot;&gt;&lt;strong data-dcnode-id=&quot;454&quot;&gt;&lt;span data-dcnode-id=&quot;455&quot; instrument_node=&quot;&quot;&gt;Red flags to act on: &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;If you see that team members have to put in more hours than expected on a regular basis, it could be an indication that the mission manager is struggling to assign people the right tasks, or has difficulty planning complex projects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;451&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;449&quot;&gt;&lt;span data-dcnode-id=&quot;450&quot; instrument_node=&quot;&quot;&gt;Bringing it All Together&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;446&quot;&gt;&lt;span data-dcnode-id=&quot;447&quot; instrument_node=&quot;&quot;&gt;The role that managers play is crucial to the output of the organization. More often than not, businesses rely heavily on the knowledge and commitment of employees. The administrative manager plays a pivotal role in bringing out the best in people long-term, while effective mission managers can skillfully lead a team through challenging, complex projects on tight deadlines.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;443&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;Whenever you perform an analysis of manager effectiveness&amp;nbsp;—&amp;nbsp;whether it’s for an administrative or mission manager&amp;nbsp;—&amp;nbsp;it is important to use metrics to narrow down areas of focus and potential issues. At the same time, remember the metric is not the answer, it is the guide towards a deeper understanding of how the human dynamics in your organization either drive or hinder organizational success.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;440&quot;&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;By monitoring and analyzing manager effectiveness, you will be in a good position to identify where your management team is strong and where further insight is required. When this is combined with recruitment optimization, you can drive strategy and better business outcomes through talented, engaged people.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;434&quot;&gt;&lt;em data-dcnode-id=&quot;435&quot;&gt;&lt;span data-dcnode-id=&quot;436&quot; style=&quot;color: #808080;&quot;&gt;&lt;a data-dcnode-id=&quot;437&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/wp-content/uploads/2017/10/KPI-measure.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-109135&quot; data-dcnode-id=&quot;438&quot; height=&quot;600&quot; sizes=&quot;(max-width: 900px) 100vw, 900px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.tlnt.com/wp-content/uploads/2017/10/KPI-measure.jpg&amp;amp;raw&quot; srcset=&quot;https://www.tlnt.com/wp-content/uploads/sites/4/2017/10/KPI-measure.jpg 900w, https://www.tlnt.com/wp-content/uploads/sites/4/2017/10/KPI-measure-300x200.jpg 300w, https://www.tlnt.com/wp-content/uploads/sites/4/2017/10/KPI-measure-768x512.jpg 768w, https://www.tlnt.com/wp-content/uploads/sites/4/2017/10/KPI-measure-700x467.jpg 700w, https://www.tlnt.com/wp-content/uploads/sites/4/2017/10/KPI-measure-400x266.jpg 400w&quot; width=&quot;900&quot;&gt;&lt;/a&gt;&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;380&quot;&gt;&lt;strong data-dcnode-id=&quot;385&quot;&gt;&lt;span data-dcnode-id=&quot;386&quot; instrument_node=&quot;&quot;&gt;Ian Cook&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt; is recognized for his leadership and insight in the area of workforce analytics and planning. Ian is currently the Director of Product Management at &lt;/span&gt;&lt;a data-dcnode-id=&quot;382&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.visier.com/&quot;&gt;&lt;span data-dcnode-id=&quot;383&quot; instrument_node=&quot;&quot;&gt;Visier&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;381&quot; instrument_node=&quot;&quot;&gt;, and is responsible for continually enhancing the depth of insight available within this leading edge application. Prior to joining Visier, Ian built Canada's leading source of HR Benchmarking data. His knowledge and expertise comes from 10+ years of consulting to global companies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;a aria-controls=&quot;undefined1&quot; data-dcnode-id=&quot;376&quot; data-readmore-toggle=&quot;undefined1&quot; href=&quot;#&quot;&gt;&lt;span data-dcnode-id=&quot;377&quot; instrument_node=&quot;&quot;&gt;Show More&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;
