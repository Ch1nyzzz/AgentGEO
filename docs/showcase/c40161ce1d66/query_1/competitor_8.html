&lt;/span&gt;&lt;div class=&quot;content-area&quot; data-dcnode-id=&quot;373&quot; id=&quot;primary&quot;&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;main class=&quot;site-main&quot; data-dcnode-id=&quot;376&quot; id=&quot;main&quot; role=&quot;main&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;article class=&quot;post-128 post type-post status-publish format-standard hentry category-uncategorized&quot; data-dcnode-id=&quot;703&quot; id=&quot;post-128&quot;&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;header class=&quot;entry-header&quot; data-dcnode-id=&quot;1035&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 class=&quot;entry-title&quot; data-dcnode-id=&quot;1037&quot;&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;Unit 10 – 3.3 Explain how they would evaluate the effectiveness of their plan&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/header&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;entry-content&quot; data-dcnode-id=&quot;810&quot;&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;header-content-container&quot; data-dcnode-id=&quot;942&quot;&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1027&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;My team and I were once summoned to the home office in New York to review the final pitch to a highly coveted account that we had managed to lure for their national business.&lt;/span&gt;&lt;span data-dcnode-id=&quot;1029&quot; id=&quot;more-14619&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;There, in the large but tightly packed theatre at our office on Lexington Ave., we were shown the PowerPoint that would delineate the various points of our strategy. Immediately, I noticed a problem.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1024&quot;&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt;“Excuse me,” I said, sheepishly raising my hand like the new kid in class. “You’ve used the colour blue all throughout these slides. That’s the colour of their chief competitor. Our client’s colour is red.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1018&quot;&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt;I no sooner had I got the word “red” out, than the account supervisor shot up out of his seat in the front row and exclaimed “I warned you guys about the blue …&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;1020&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;now change it!”&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Then all hell broke loose, of course.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1009&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;The point is simply that to&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1014&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.brandingstrategyinsider.com/2017/02/how-to-think-like-a-creative-director.html&quot;&gt;&lt;span data-dcnode-id=&quot;1015&quot; instrument_node=&quot;&quot;&gt;think like a creative director&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;, or a brand marketer for that matter, you must have the ability to judge well – you must practice discernment. That requires doing two things consistently: 1)&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1011&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.brandingstrategyinsider.com/2014/04/are-you-a-strategic-thinking-marketer.html&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;Think critically&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;, and 2) Being willing to challenge ideas, even if makes you a pain in the ass.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1003&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;There’s a quote I often refer to from Sergio Zyman of Coca-Cola fame that I picked up in his book “&lt;/span&gt;&lt;a data-dcnode-id=&quot;1005&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//amzn.to/2nljQdd&quot;&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;Building Brandwidth&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1004&quot; instrument_node=&quot;&quot;&gt;”: “Every detail either makes a sale or breaks a sale.” Sometimes that detail can be as simple as overruling an art director’s colour choice, because you know that strategically it’s a disaster waiting to happen.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1000&quot;&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;Creative directors are not only called to be brilliant conceptually within the framework of the strategy, they are also called on to be brilliant judges of the creative product itself. Ideally, they will have absorbed the strategy deep down so that they can pick a winner or a loser idea within about five seconds of coming eye to eye with it, and challenge it without reservation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;997&quot;&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;The question to ask yourself, as a brand marketer, do you know your brand strategy just as well? Would you be able to articulate or even argue your brand positioning to your agency team? Would you be ready to challenge or champion ideas that support your brand marketing to anyone, including your own management?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;991&quot;&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt;To that end, what evaluation criteria should we, as marketers, use to practice strategic discernment for concepts that support&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;993&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.brandingstrategyinsider.com/2007/12/the-brand-posit.html&quot;&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;the positioning&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;992&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and communication of our brands as a creative director would? Here are seven simple filters to employ for making that all-important judgment about the ideas you are presented.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;986&quot;&gt;&lt;strong data-dcnode-id=&quot;988&quot;&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;1. Is the idea strategic?&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;This, of course, is fundamental. The work should, at the very least, be defendable on its adherence to the creative brief. That’s hardly a guarantee for a “big idea” but it’s the minimum price of entry for consideration.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;981&quot;&gt;&lt;strong data-dcnode-id=&quot;983&quot;&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;2. Is it simple to understand?&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Many so-called great ideas are simply too complicated for the target to grasp quickly. “Too obtuse,” “too nebulous,” or “esoteric” are often labels creative directors put on these failed efforts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;970&quot;&gt;&lt;strong data-dcnode-id=&quot;978&quot;&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;3. Is the idea relevant to the target?&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;975&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.brandingstrategyinsider.com/2016/10/4-factors-driving-brand-relevance.html&quot;&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;Relevancy is a quality&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;that may not be easily discerned from the strategy, but it is nevertheless critical. This has a lot to do with&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;972&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.brandingstrategyinsider.com/2016/08/brands-grow-with-empathy.html&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;having empathy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;, which is often revealed in the execution of the idea. For example, what mother can’t identify with the mom seen snatching a bottle of wine off the supermarket shelf, knowing that she’ll be cooped-up with her kids during an impending blizzard, as in a recent Campbell Soup campaign? That’s purely relevant and resonates with the target audience, creating enormous empathy between the brand and customer. The brand isn’t solely about nutrition, it’s about caring and nurturing – even for adults.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;965&quot;&gt;&lt;strong data-dcnode-id=&quot;967&quot;&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;4. Does it solve a problem or convey a benefit?&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;There must always be something “in it for me” from the customer’s vantage point, otherwise it’s nothing more than self-serving to the brand.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;960&quot;&gt;&lt;strong data-dcnode-id=&quot;962&quot;&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;5. Does it have a call to action, preferably with urgency?&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;This may simply be a phone number or a URL for some messages, but the inference to take action is there.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;955&quot;&gt;&lt;strong data-dcnode-id=&quot;957&quot;&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;6. Is it original and memorable?&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;OK, so there’s nothing truly original under the sun. (Wasn’t it Steve Jobs who quoted Picasso as saying, “Good artists copy. Great artists steal.”) This one is tough because most people want to move this criterion to the front of the line. After all, the first job of any ad is to get noticed. Failing that, everything else is, as they say, academic. Ideas that are clever, bold, funny, outrageous, and pushing the edge should all be encouraged and expected … strategically, that is. When&amp;nbsp;Delta Airlines borrowed the “High-Ho” Disney tune from “Snow White”&amp;nbsp;to celebrate the “early risers who truly change the world” (and happen to fly Delta, of course) they “stole” (see Picasso’s quote) and created an original, memorable message for the brand.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;954&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;950&quot;&gt;&lt;strong data-dcnode-id=&quot;952&quot;&gt;&lt;span data-dcnode-id=&quot;953&quot; instrument_node=&quot;&quot;&gt;7. Does it have legs?&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;Creative directors more often than not think in campaign mode. Big ideas can leverage lots of media vehicles to reach targets at multiple angles with plenty of repetition and frequency.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;947&quot;&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;Brands must be built on a strategic foundation, and they can only soar when every detail falls into place. Your job, as the brand marketer, is to master strategic discernment to help ensure that happens.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 class=&quot;fs-headline speakable-headline font-base&quot; data-dcnode-id=&quot;944&quot;&gt;&lt;span data-dcnode-id=&quot;945&quot; instrument_node=&quot;&quot;&gt;Five Steps To Change the Perception Of Your Brand&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-container color-body font-body&quot; data-dcnode-id=&quot;823&quot;&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;speakable-paragraph&quot; data-dcnode-id=&quot;938&quot;&gt;&lt;span data-dcnode-id=&quot;939&quot; instrument_node=&quot;&quot;&gt;Brand perception is&amp;nbsp;never&amp;nbsp;set in stone. With every new generation of consumers and changes in the markets, a customer’s view of a well-reputed brand has the potential to change – for better or for worse.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;932&quot;&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;This process is sometimes a passive and gradual change, but it could also just as easily be a more abrupt transformation – driven by external events that are beyond one’s control. However, whether the changes in your brand perception are forced upon you or driven&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;934&quot;&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;by&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;you, there will always be an element of uncertainty. After all, you can’t control the thoughts of your customers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;929&quot;&gt;&lt;span data-dcnode-id=&quot;930&quot; instrument_node=&quot;&quot;&gt;For me, brand perception became top-of-mind when I took over the reins of a new digital publishing company. I underwent a rather elaborate process of figuring out what the brand really stood for, both for the readers of the websites I was representing, as well as for the hundreds of advertisers that were making products to reach these readers. We conducted internal and external surveys in which I asked questions such as:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;1. How do consumers and advertisers view our brand?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;923&quot;&gt;&lt;span data-dcnode-id=&quot;924&quot; instrument_node=&quot;&quot;&gt;2. What is our website’s reputation with regard to other websites?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;922&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;921&quot; id=&quot;article-0-inread&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;920&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;918&quot;&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;3. What would advertisers gain from our website’s offerings?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;915&quot;&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;4. What is our internal perception of who we are as a brand?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;912&quot;&gt;&lt;span data-dcnode-id=&quot;913&quot; instrument_node=&quot;&quot;&gt;5. How did we fare against other leading publishers within our category in terms of brand power?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;909&quot;&gt;&lt;span data-dcnode-id=&quot;910&quot; instrument_node=&quot;&quot;&gt;Using these survey results, I then underwent a five-step process in order to determine our existing brand equity and a strategy to further boost its perception. Here are the steps I took, and how you can leverage them to evaluate your own brand, and make changes accordingly:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;vestpocket&quot; data-dcnode-id=&quot;859&quot;&gt;&lt;span data-dcnode-id=&quot;907&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;ntv-wrapper&quot; data-dcnode-id=&quot;861&quot;&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div data-dcnode-id=&quot;885&quot; id=&quot;google_ads_iframe_/7175/fdc.forbes/article-d_3__container__&quot;&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;851&quot;&gt;&lt;strong data-dcnode-id=&quot;856&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;1. Examine the reality.&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;To change a perception, you must first understand what people think, and not what you&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;853&quot;&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;think&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;they think. Asking for open-ended feedback without leading questions is the only way to determine how you are seen. Social media provides ample opportunity to listen to your customer, and if you listen enough, you’ll gather a better understanding. In my scenario, we learned from the reader surveys that the brand’s perception was that of a tired, lagging brand not entirely in tune with the times. This was the reality for us, and we had to change it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;846&quot;&gt;&lt;strong data-dcnode-id=&quot;848&quot;&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt;2. Understand your customers.&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;Gathering feedback is only the first step – now it is vital to understand&amp;nbsp;why&amp;nbsp;they have these thoughts. Does your marketing only hit a certain demographic, leaving vast swaths of your customer base in the dark? Are there geographic or cultural differences? It is vital that you create opportunities for conversation and act upon that feedback. In my situation, we discovered that our customers considered the logos to be old-fashioned, and reminiscent of a dying era. We also realised that the brand was skewed towards a slightly older demographic. Our customers wanted more mobile content, when our focus at the time was on desktop content. All of this information needed to be taken into consideration before developing an actionable plan to give our customers what they were looking for.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;841&quot;&gt;&lt;strong data-dcnode-id=&quot;843&quot;&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;3. Get your people on board.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;It is one thing to understand what your customers think, but it is another matter entirely to explain to your team why they might need to do things a little differently. Many of them will be one or two steps removed from the customers, and it is vital to explain why changes are required. Your brand perception starts with your people, and once you have decided what it is you need to change (an important step in itself!), the changes will only take place if they adopt them as their own. In my case, I had to sit with each of the key stakeholders within the editorial, ops, ad sales and marketing departments to show them the survey results and get their buy-in on a process for pointing the ship in the direction of a new era.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;838&quot;&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt;Forbes Agency Council&amp;nbsp;is an invitation-only community for executives in successful public relations, media strategy, creative and advertising agencies.&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;833&quot;&gt;&lt;strong data-dcnode-id=&quot;835&quot;&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;4. Make a big splash.&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;Small, incremental changes will not have a significant impact on the way your brand is perceived. If you are going to change something, do it for the right reasons, and make sure that you shout it from the rooftops. It is incredibly powerful to tell your customer, “We have listened to you, and we are going to do things a little differently now.” Boldly stating what your brand stands for is the best way of resetting your customer relationship. It requires you to live up to your promises. In my case, our logo was completely revamped into a simplified one to give it a fresh feel. We also completely redid our desktop, apps and mobile sites to make them more visually appealing, and launched downloadable digital magazines that&amp;nbsp;were edgy, fast and built on&amp;nbsp;the latest tech.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;828&quot;&gt;&lt;strong data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;5. Look to the future.&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;Enjoying your current success is fine while it lasts, but in the age of disruption, there are bound to be challenges that will turn your business model upside down. Being proactive regarding the demands of your future customer base is the best way to manage the relationship. Letting your customers know that you are looking forward and growing with them is the best way to ensure their long-term loyalty. At my workplace, we continued to evolve and communicate with our customers by embracing the latest that digital had to offer. Nowadays, advertisers and readers completely trust our content, both of which are extremely important in digital publishing. In the end, I feel we were able to translate our customers’ feedback into tangible improvements that have redefined the brand.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;827&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;825&quot;&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;Changing the perception of your brand is a heavy undertaking, but it could make all the difference in whether or not it stands the test of time years into the future. Staying relevant and meeting the needs of your customers will make you untouchable.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;
