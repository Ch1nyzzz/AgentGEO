&lt;/span&gt;&lt;div class=&quot;idb-post-categories&quot; data-dcnode-id=&quot;1466&quot;&gt;&lt;span data-dcnode-id=&quot;1469&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;1467&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.idashboards.com/blog/category/business-tips/&quot; rel=&quot;category tag&quot;&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt;Business Tips&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1465&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;entry clr&quot; data-dcnode-id=&quot;1123&quot; itemprop=&quot;text&quot;&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;at-above-post addthis_tool&quot; data-dcnode-id=&quot;1463&quot; data-url=&quot;https://www.idashboards.com/blog/2016/11/30/how-to-know-if-your-meeting-was-effective/&quot;&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;1461&quot;&gt;&lt;span data-dcnode-id=&quot;1462&quot; instrument_node=&quot;&quot;&gt;In the corporate work environment, meetings get a pretty bad rap. For many employees, few things evoke the levels of apprehension brought on by a pointless or unproductive company meeting. Even still, meetings are an important – if not integral – part of the workday, from ad hoc to recurring monthly regroups. According to one study, most people label 50% of the time spent in work-related meetings as “wasted.” With an average of 31 hours lost to meetings per employee each month, many organizations have a lot of room to improve meeting effectiveness.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1460&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;bctt-click-to-tweet&quot; data-dcnode-id=&quot;1452&quot;&gt;&lt;div class=&quot;idb-quote-top-border&quot; data-dcnode-id=&quot;1459&quot;&gt;&lt;/div&gt;&lt;span class=&quot;bctt-ctt-text&quot; data-dcnode-id=&quot;1456&quot;&gt;&lt;a data-dcnode-id=&quot;1457&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//www.idashboards.com/blog/2016/11/30/how-to-know-if-your-meeting-was-effective/%26text%3DMost%2520people%2520label%252050%2525%2520of%2520the%2520time%2520spent%2520in%2520work-related%2520%2523meetings%2520as%2520wasted.%26via%3DiDashboards%26related%3DiDashboards&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1458&quot; instrument_node=&quot;&quot;&gt;Most people label 50% of the time spent in work-related #meetings as wasted. &lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;a class=&quot;bctt-ctt-btn&quot; data-dcnode-id=&quot;1453&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//www.idashboards.com/blog/2016/11/30/how-to-know-if-your-meeting-was-effective/%26text%3DMost%2520people%2520label%252050%2525%2520of%2520the%2520time%2520spent%2520in%2520work-related%2520%2523meetings%2520as%2520wasted.%26via%3DiDashboards%26related%3DiDashboards&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;i class=&quot;fa fa-twitter&quot; data-dcnode-id=&quot;1455&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;Click to tweet&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1451&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1449&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1450&quot; instrument_node=&quot;&quot;&gt;Believe It or Not, There Are Metrics to Measure Meeting Effectiveness&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1443&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1447&quot; instrument_node=&quot;&quot;&gt;If you find yourself wondering how to evaluate a meeting to improve overall meeting effectiveness, think back to the last meeting you attended. On a scale of “watching an entire Netflix show in one weekend” to “I finished my Christmas shopping in October,” how productive was it? More importantly, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1445&quot;&gt;&lt;span data-dcnode-id=&quot;1446&quot; instrument_node=&quot;&quot;&gt;why&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1444&quot; instrument_node=&quot;&quot;&gt; was (or wasn’t) it effective?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1439&quot; style=&quot;text-align: left;&quot;&gt;&lt;strong data-dcnode-id=&quot;1440&quot;&gt;&lt;span data-dcnode-id=&quot;1441&quot; instrument_node=&quot;&quot;&gt;Here are a few tangible data points to help you evaluate meeting effectiveness:&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1438&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1436&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1437&quot; instrument_node=&quot;&quot;&gt;1)&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Did the meeting start on time?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1435&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1432&quot; style=&quot;text-align: left;&quot;&gt;&lt;img alt=&quot;Metrics to measure effective meetings&quot; class=&quot;alignleft wp-image-11872&quot; data-dcnode-id=&quot;1434&quot; height=&quot;396&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.idashboards.com/wp-content/uploads/2016/11/Meeting.jpg&amp;amp;raw&quot; width=&quot;287&quot;&gt;&lt;span data-dcnode-id=&quot;1433&quot; instrument_node=&quot;&quot;&gt;Timeliness is the first and easiest way to measure meeting effectiveness. Imagine your meeting starts five minutes late. It isn’t difficult to make up that time by going five minutes over, right? It seems like a simple solution, but starting your meeting on time may be more important than you think.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1431&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1429&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt;If the meeting starts late, you’ll have to regain that time by running a few minutes over time. But this isn’t the only time wasted; assuming some participants were ready on time, an additional five minutes per attendee were wasted waiting for tardy co-workers to arrive. In the end, you’ve actually wasted twice as much time as you thought you did.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1428&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1426&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt;2)&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Did you spend as much time in the meeting as you planned?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1425&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1423&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1424&quot; instrument_node=&quot;&quot;&gt;It’s okay to set aside a little more time than you actually need for your meeting. That’s foresight. If your meetings routinely take up significantly more time than they should, take a step back and examine the cause. Once you understand why, you can start implementing changes to improve potential weak spots.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1422&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1419&quot; style=&quot;text-align: left;&quot;&gt;&lt;strong data-dcnode-id=&quot;1420&quot;&gt;&lt;span data-dcnode-id=&quot;1421&quot; instrument_node=&quot;&quot;&gt;Questions to consider: &lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1418&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1404&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1417&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1415&quot;&gt;&lt;span data-dcnode-id=&quot;1416&quot; instrument_node=&quot;&quot;&gt;Are some participants talking more than others?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1412&quot;&gt;&lt;span data-dcnode-id=&quot;1413&quot; instrument_node=&quot;&quot;&gt;Is the team struggling to stay on track / getting distracted?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1411&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1409&quot;&gt;&lt;span data-dcnode-id=&quot;1410&quot; instrument_node=&quot;&quot;&gt;Did you underestimate the time it would take to complete the agenda?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1406&quot;&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;Would the meeting take less time if attendees were more prepared?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1401&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;3)&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; How many people attended the meeting?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1398&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1399&quot; instrument_node=&quot;&quot;&gt;Some people skip meetings or they may be double booked. However, if team members are habitually absent, your meeting culture could have a problem. As a rule of thumb, the percentage of people who skip larger meetings tends to be greater than the percentage of no-shows for smaller gatherings. Even still, you should expect most people to attend and participate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1395&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;4)&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; What action items did the meeting produce?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1389&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt;Generally, meetings that end with action items are productive. An action item means the team made a decision and has a plan. If you sense your meeting going off the beaten path, keep its original purpose in mind and facilitate decisions related to your objective. Are you looking for ways to facilitate sales? Increase employee engagement? Improve quality control? If the meeting strays from this goal, bring it back. Conversely, if you walk out of a meeting &lt;/span&gt;&lt;em data-dcnode-id=&quot;1391&quot;&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;without&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt; anything on your to-do list, reevaluate what happened and try to figure out why.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1378&quot; style=&quot;text-align: left;&quot;&gt;&lt;span class=&quot;bctt-click-to-tweet&quot; data-dcnode-id=&quot;1380&quot;&gt;&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;idb-quote-top-border&quot; data-dcnode-id=&quot;1387&quot;&gt;&lt;/div&gt;&lt;span class=&quot;bctt-ctt-text&quot; data-dcnode-id=&quot;1384&quot;&gt;&lt;a data-dcnode-id=&quot;1385&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//www.idashboards.com/blog/2016/11/30/how-to-know-if-your-meeting-was-effective/%26text%3DGenerally%252C%2520%2523meetings%2520that%2520end%2520with%2520action%2520items%2520are%2520productive.%26via%3DiDashboards%26related%3DiDashboards&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt;Generally, #meetings that end with action items are productive. &lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;a class=&quot;bctt-ctt-btn&quot; data-dcnode-id=&quot;1381&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//www.idashboards.com/blog/2016/11/30/how-to-know-if-your-meeting-was-effective/%26text%3DGenerally%252C%2520%2523meetings%2520that%2520end%2520with%2520action%2520items%2520are%2520productive.%26via%3DiDashboards%26related%3DiDashboards&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;i class=&quot;fa fa-twitter&quot; data-dcnode-id=&quot;1383&quot;&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;Click to tweet&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p&gt;&lt;/p&gt;&lt;h4 data-dcnode-id=&quot;1373&quot;&gt;&lt;em data-dcnode-id=&quot;1374&quot;&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;Read next: &lt;/span&gt;&lt;a data-dcnode-id=&quot;1375&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.idashboards.com/blog/2018/06/20/how-to-improve-your-teams-productivity-without-compromising-quality-and-efficiency/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;How to Improve Your Team’s Productivity&amp;nbsp;&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1370&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1371&quot; instrument_node=&quot;&quot;&gt;Gather Company-Wide Data &amp;amp; Evaluate&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1367&quot; style=&quot;text-align: left;&quot;&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;By tracking these metrics across your organization (not just the meetings you attend), you’ll get an accurate picture of your company’s meeting “culture” – the attitudes people have toward them and how effective they are. If meeting lacks takeaway action items, for instance, set a goal to walk away with some and make your meetings more purposeful. Once you’ve implemented a plan, revisit these metrics at a later time to measure your success. As you fine-tune your strategy, your meeting metrics should improve as well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1366&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1360&quot;&gt;&lt;strong data-dcnode-id=&quot;1361&quot;&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;Want to learn more about metrics and corporate management? Check out our blog, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1363&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.idashboards.com/blog/2016/09/21/5-essential-project-management-metrics-you-cant-ignore/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt;5 Essential Project Management Metrics You Can’t Ignore&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;, to help you make your meetings even more effective. &lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1359&quot; instrument_node=&quot;&quot;&gt;
