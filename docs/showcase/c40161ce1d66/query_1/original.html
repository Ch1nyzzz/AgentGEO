    &quot;step&quot;: [
        {
            &quot;@type&quot;: &quot;HowToSection&quot;,
            &quot;name&quot;: &quot;Plan Preparation&quot;,
            &quot;itemListElement&quot;: [
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Know what you want to do. The less clear you are about what you want to do, the less effective your plan will be. Try to specifically define what you want to achieve as early as possible \u2014 preferably before starting your project.\nExample: You are trying to complete your master\u2019s thesis \u2014 basically a very long essay \u2014 which needs to be about 40,000 words. It will include an introduction, a literature review (in which you critically discuss other research that informs yours, and discuss your methodology), several chapters in which you put your ideas into practice using concrete examples, and a conclusion. You have 1 year to write it.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/9\/99\/Create-an-Effective-Action-Plan-Step-2-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-2.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-00&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Work backwards from your end goal. Identify your end goal, then list everything you need to do to accomplish it. Depending on your goal, you may even consider different ways to reach your goal. After you know what you need to accomplish, break this down into actionable steps to help you create a more realistic plan.\n\nKeep in mind that your plan may change as you work toward your goal, so stay flexible.\nMake sure that your goals are S.M.A.R.T. to ensure that your plan is effective:\n\nSpecific - Be clear about what you want to achieve.\nMeasurable - You can break down the goal into measurable checkpoints.\nAttainable - You are capable of completing the steps necessary to reach the goal.\nRelevant - The goal makes sense for your life and purpose.\nTimely - You have the time to work toward your goal and are progressing on schedule.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/5\/59\/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-01&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Be specific and realistic in your planning. Having a specific goal is just the beginning: you need to be specific and realistic in every aspect of your project \u2014 for example, by stating specific and achievable schedules, milestones, and final outcomes.\n\nBeing specific and realistic while planning a long project is all about pro-actively reducing stress that can accompany poorly planned projects such as missed deadlines and exhausting long hours.\nExample: To finish your thesis on time, you need to write roughly 5,000 words per month, which will give you a couple of months at the end of your timeline to polish your ideas. Being realistic means not placing the expectation on yourself to write more than 5,000 words each month.\nIf you\u2019re working as a teaching assistant for three of those months, you\u2019ll need to consider that you may not be able to complete 15,000 words in that time, and you\u2019ll need to spread that amount out over your other months.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/9\/95\/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-02&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Set measurable milestones. Milestones mark significant stages along the road to achieving your end goal. Create milestones easily by starting at the end (the accomplishment of the goal) and working your way backwards to your present day and circumstances.\n\nHaving milestones can help you \u2014 and if applicable, your team \u2014 stay motivated by breaking the work into smaller chunks and tangible goals so that you don\u2019t need to wait until the project is completely finished to feel as though you\u2019ve accomplished something.\nDon\u2019t leave too much time or too little time between milestones \u2014 spacing them two weeks apart has been found to be effective.\n\nExample: When writing your thesis, resist the urge to set milestones based on chapter completions, as this could be a matter of months. Instead, set smaller milestones \u2014 perhaps based on word counts \u2014 every two weeks, and reward yourself when you hit them.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/2\/28\/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-03&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Break large tasks into smaller, more manageable chunks. Some tasks or milestones may seem more daunting to achieve than others.\n\nIf you\u2019re feeling overwhelmed by a large task, you can help ease your anxiety and make it feel more doable by breaking it down into smaller, more manageable chunks.\nExample: The lit review is often the most difficult chapter to write, as it forms the foundation of your thesis. In order to complete your lit review, you need to do a significant amount of research and analysis before you can even begin writing.\nYou can break it into three smaller chunks: research, analysis, and writing. You can break it down even smaller by choosing specific articles and books that you need to read, and setting deadlines for analyzing them and writing about them.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/3\/35\/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-04&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Make scheduled lists. Make a list of tasks that you need to complete in order to hit your milestones. A list on its own will not be effective \u2014 you must write this list into a timeline associated with specific, realistic actions.\nExample: By breaking your lit review into smaller chunks, you\u2019ll know exactly what you need to get done, and can figure out a realistic timeframe for those tasks. Perhaps every one to two days you will have to read, analyze, and write about one key reading.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/8e\/Create-an-Effective-Action-Plan-Step-6.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-6.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-05&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Put timelines on everything. Without specific time frames and deadlines, work will definitely expand to fill the time allotted, and some tasks may never get completed.\n\nNo matter what action items you choose for which phase of your action plan, it is essential that a time frame be attached to absolutely everything.\nExample: If you know that it takes you roughly 1 hour to read 2,000 words, and you\u2019ll be reading a 10,000-word article, you need to give yourself at least 5 hours to complete that article.\nYou\u2019ll need to also account for at least 2 meals during that time, as well as short breaks every 1 to 2 hours for when your brain is feeling tired. In addition, you\u2019ll want to add at least an hour onto your final number just to account for any possible unanticipated interruptions.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/89\/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-06&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Create a visual representation. Once you\u2019ve listed your action items and set a specific timeline, create some type of visual representation of your plan. You could use a flow chart, a Gantt chart, a spreadsheet, or some other type of business tool to accomplish this.\nKeep this visual representation in an easily accessible place \u2014 even on a wall in your office or study room, if possible.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/d\/d6\/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-07&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Mark things off as you go. Marking things off as you go will not only feel satisfying, it will help you keep on track lest you forget what you\u2019ve already done.\nThis is particularly important if you\u2019re working with other people. If you\u2019re working with other people, you might consider using a shared online document so that everyone can check in no matter where they are.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/f\/fd\/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-08&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Keep a record of everything. As you work through your action plan, keep notes of everything. You may find it helpful to have a binder with different tabs in it to section off different aspects of your planning process. Some examples of sections:\n\nIdeas\/Miscellaneous notes\nDaily Schedules\nMonthly Schedules\nMilestones\nResearch\nFollow-up\nIndividuals involved\/Contacts&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/4\/44\/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-09&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Don\u2019t stop until you\u2019ve reached your final goal. Once your plan is established and shared with the team (if applicable), and your milestones are scheduled, take daily actions to achieve your goal.\nAlthough you want to stay persistent, you should also be flexible. It's likely that unexpected events will come up that require you to shift your schedule or plan.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/a\/ac\/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-010&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Change the date if you must, but never give up on your goal. Occasionally, circumstances or unforeseen events can arise that throw a wrench in your ability to meet deadlines, complete tasks and achieve your goal.\nIf this happens, do not get discouraged \u2013 revise your plan and continue working to meet targets and move forward.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/88\/Create-an-Effective-Action-Plan-Step-11.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-11.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-011&quot;
                }
            ]
        },
        {
            &quot;@type&quot;: &quot;HowToSection&quot;,
            &quot;name&quot;: &quot;Time Management&quot;,
            &quot;itemListElement&quot;: [
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Get yourself a good planner. Whether this is an app or a book, you'll need a planner that will allow you to plan out your time by the hour, each day of the week. Make sure it\u2019s easy to read and easy to use, otherwise you\u2019ll likely not make use of it.\n\nStudies have shown that physically writing things down (i.e. with pen and paper) will make you more likely to do them. For this reason, you may be best off using a physical planner to plan your time out.\nKeeping a planner also helps you relieve stress and feel calmer because it makes it less likely that you'll ruminate on what needs to be done. Additionally, it helps your plan become more solid in your mind.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/d\/d7\/Create-an-Effective-Action-Plan-Step-12.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-12.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-112&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Avoid to-do lists. So you have a long list of things to do, but when will you actually do them? To-do lists are not as effective as scheduling out your tasks. When you schedule your tasks, you make the time to get them done.\nWhen you have specific time blocks in which to work (many day planners literally contain hourly time blocks), you\u2019ll also find that you\u2019re less likely to procrastinate, as you only have an allotted time in which to get your work done before you must move on to the next scheduled task.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/80\/Create-an-Effective-Action-Plan-Step-13.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-13.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-113&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Learn how to time block. Blocking out your time helps you get a more realistic idea of how much time you actually have in a day. Start with your highest-priority tasks and work backwards.\n\nDo this for your whole week. Having a broader view of how your days will add up will help you refine your schedule to be as productive as possible.\n\nSome experts even suggest having at least a general idea of what your whole month will look like.\n\nSome people recommend starting at the end of your day and working backwards \u2014 so if you\u2019re done work\/homework at 5 p.m., plan backwards from there, to when your day starts, for example, at 7 a.m.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/1\/13\/Create-an-Effective-Action-Plan-Step-14.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-14.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-114&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Schedule time for leisure and breaks. Studies have shown that scheduling even your free time can help increase your satisfaction with life. It has also been proven that long work hours (50+ hours a week) in fact make you less productive.\n\nSleep deprivation will kill your productivity. Make sure that you sleep at least 7 hours each night if you\u2019re an adult, or 8.5 hours a night if you\u2019re a teenager.\nStudies show that scheduling small, \u201cstrategic renewals\u201d (i.e. workouts, brief naps, meditation, stretching) into your day will boost your productivity and overall health.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/e\/ec\/Create-an-Effective-Action-Plan-Step-15.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-15.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-115&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Set aside time to plan your week out. Many experts suggest scheduling time right at the start of your week to sit down and plan your week. Figure out how you can best use each day to work toward achieving your goals.\n\nAccount for any work or social obligations you have; if you find your schedule is tight, you may need to drop some of your lower-priority plans.\nThis doesn\u2019t mean dropping social activities. It\u2019s important to keep up with your good friends and to nurture your close relationships. You need a support network.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/7\/7d\/Create-an-Effective-Action-Plan-Step-16.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-16.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-116&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Know what a sample scheduled day looks like. To return to the thesis-writing example, a regular day might look something like this:\n\n7 a.m.: Wake up\n7:15 a.m.: Exercise\n8:30 a.m.: Shower and dress\n9:15 a.m.: Make and eat breakfast\n10 a.m.: Work on Thesis - writing (plus 15 minutes of small breaks)\n12:15 p.m.: Lunch\n1:15 p.m.: Emails\n2 p.m.: Research and response to research (including 20 to 30 minutes of breaks\/snacks)\n5 p.m.: Wrap up, check emails, set primary goals for tomorrow\n5:45 p.m.: Leave desk, go grocery shopping\n7:00 p.m.: Make dinner, eat\n9:00 p.m.: Relax \u2014 play music\n10:00 p.m.: Prepare for bed, read in bed (30 minutes), sleep&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/e\/ee\/Create-an-Effective-Action-Plan-Step-17.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-17.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-117&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Know that every day does not have to look the same. You can split up tasks into only 1 or 2 days a week \u2014 sometimes it\u2019s even helpful to break up tasks as you can return to them with a fresh perspective.\nExample: Maybe you only write and do research Mondays, Wednesdays, and Fridays, and on Thursdays you substitute writing with learning a musical instrument.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/89\/Create-an-Effective-Action-Plan-Step-18.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-18.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-118&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Schedule for problems. Build a little bit of extra time into every block that will account for a slow work day or an unanticipated interruption. A good rule of thumb is to give yourself double the time you expect a task to take \u2014 particularly when you're just starting out.\nAs you become more comfortable with your tasks, or if you already have a good sense of how long something will take, you can shave your time down, but it\u2019s always a good idea to leave in at least a small buffer.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/d\/d1\/Create-an-Effective-Action-Plan-Step-19.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-19.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-119&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Be flexible and gentle with yourself. Especially as you\u2019re starting out, be prepared to tweak your schedule as you go. It\u2019s part of the learning process. You may find it helpful to block your time out in pencil.\nYou may also find it helpful to spend a week or two recording what you do each day into a planner as you go. This will help you get a sense of how you spend your time and how much time each task takes.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/c\/cf\/Create-an-Effective-Action-Plan-Step-20.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-20.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-120&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Disconnect. Set times in your day where you\u2019ll check your emails or social media. Be strict with yourself, as it\u2019s possible to lose hours just checking in every few minutes here and there.\nThis includes turning off your phone, if possible \u2014 at least for periods where you really want to focus on work.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/5\/54\/Create-an-Effective-Action-Plan-Step-21.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-21.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-121&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Do less. This relates to disconnecting. Figure out the most important things in your day \u2014 the ones that will help you achieve your goals, and focus on those. De-prioritize the less important things that fragment your day: emails, mindless paperwork, etc.\n\nOne expert recommends not checking your emails for at least the first one or two hours of your day; this way, you can focus on your important tasks without getting distracted by the things that those emails may contain.\n\nIf you know you have a lot of small tasks to do (for example, email, paperwork, tidying up your workspace), group them together into a chunk of time in your schedule rather than allowing them to fragment your day or break the flow of other more important tasks that might require more concentration.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/b\/bc\/Create-an-Effective-Action-Plan-Step-22.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-22.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-122&quot;
                }
            ]
        },
        {
            &quot;@type&quot;: &quot;HowToSection&quot;,
            &quot;name&quot;: &quot;Motivational Tips&quot;,
            &quot;itemListElement&quot;: [
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Be positive. Staying positive is fundamental to achieving your goals. Believe in yourself and the people around you. Counter any negative self-talk with positive affirmations.\nIn addition to being positive, you will benefit from surrounding yourself with positive people. Research has shown that over time, you adopt the habits of those with whom you spend the most time, so choose your company wisely.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/7\/7b\/Create-an-Effective-Action-Plan-Step-23.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-23.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-223&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Reward yourself. This is particularly important to do each time you hit a milestone. Give yourself tangible rewards \u2014 for example, a nice dinner at your favorite restaurant when you hit your first two-week milestone, or a back massage for your two-month milestone.\nOne expert suggests giving a friend money and telling them that they can only give it to you if you finish a given task by a specified time. If you don\u2019t finish the task, your friend keeps the money.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/e\/ed\/Create-an-Effective-Action-Plan-Step-24.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-24.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-224&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Get a support network. It\u2019s important to have your friends and family on your side; it\u2019s also important to build connections with people who have similar goals to you. That way you can check in with each other.\nRecruit an accountability partner who knows your deadlines and will help you stay accountable to your goals. For example, they might text you and ask about your progress, or you might check in with them weekly over coffee.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/89\/Create-an-Effective-Action-Plan-Step-25.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-25.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-225&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Track your progress. Research has shown that progress is the highest motivator. You can track your progress simply by ticking off tasks in your schedule as you go.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/f\/f9\/Create-an-Effective-Action-Plan-Step-26.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-26.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-226&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Go to bed early and get up early. When you read about the schedules of highly productive people, a large percentage of them start their days early. These people also have a morning routine \u2014 often this is something they can look forward to doing before they go to work.\nPositive ways to start the morning are to do some sort of exercise (from light stretching and yoga to an hour at the gym), eat a healthy breakfast, and spend 20 to 30 minutes writing in a journal.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/b\/b6\/Create-an-Effective-Action-Plan-Step-27.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-27.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-227&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Give yourself downtime. Taking breaks is imperative to staying motivated. If you are always working, you\u2019ll wind up exhausting yourself. Taking breaks is a pro-active way to prevent yourself from getting exhausted and losing time that you don\u2019t want to lose.\n\nExample: Step away from your computer, turn off your phone, just sit somewhere quiet and do nothing. If ideas come to you, write them down in a notebook; if they don\u2019t, enjoy having nothing to do.\n\nExample:  Meditate. Turn off your phone\u2019s ringer, turn off any notifications that you might get, and set a timer for up to 30 minutes, or however long you can afford. Just sit quietly and try to clear your mind. When thoughts come into your mind, you might find it useful to label them and then let them go \u2014 for example, if you think about work, just quietly say in your head, \u201cWork\u201d and then let it go, and keep doing this as the thoughts arise.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/e\/ef\/Create-an-Effective-Action-Plan-Step-28.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-28.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-228&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Visualize. Take a few minutes now and then to think about your goal and how it will feel to have achieved it. This will help you get through the harder times that may accompany pursuing your goal.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/2\/29\/Create-an-Effective-Action-Plan-Step-29.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-29.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-229&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Know that it won\u2019t be easy. Things worth having are rarely easy to get. You may have to resolve a lot of issues or work through some things as you work toward your goal. Accept them as they come.\nMany gurus who extol the virtue of living in the present advise to accept setbacks as though you chose them yourself. Instead of fighting them or getting upset, accept them, learn from them, and set to work figuring out how you\u2019ll achieve your goal given the changed circumstances.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/0\/09\/Create-an-Effective-Action-Plan-Step-30.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-30.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-230&quot;
                }
            ]
        },
        {
            &quot;@type&quot;: &quot;HowToSection&quot;,
            &quot;name&quot;: &quot;Goal Setting&quot;,
            &quot;itemListElement&quot;: [
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Write about what you want. Do this in a journal or a text document. Think about what overall goal you want to achieve and why you want to achieve it. This is particularly helpful if you're not entirely sure what you want to do, but just have a feeling about it.\n\nFor example, if you want to make more money, you may discover that you actually want more freedom. Without knowing that, you might get locked into something that doesn't serve your true goal, like landing in a job where you have plenty of money but no free time for your family or hobbies.\nWriting regularly in a journal is a great way to keep in touch with yourself and to keep up to date on how you\u2019re feeling. Many people claim that writing helps them clarify how they feel and what they want.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/7\/72\/Create-an-Effective-Action-Plan-Step-31.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-31.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-331&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Do your research. Once you have an idea of what you want to do, do your research. Researching your goals will help you narrow down the best way to achieve them.\n\nReach out to people who have achieved goals similar to yours. They can provide you with helpful tips about what works, as well as what to avoid.\nOnline forums like Reddit are a great place to look for discussions on most topics \u2014 particularly if you want an insider\u2019s view on specific careers.\nExample: While writing your thesis you\u2019re beginning to wonder what you\u2019ll end up doing with it. Read about what others have done with similar degrees to the one that you\u2019re pursuing. This might even help you gear your thesis towards publications or other opportunities that can help further your career.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/b\/b9\/Create-an-Effective-Action-Plan-Step-32.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-32.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-332&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Consider your options and choose the one that best serves you. After you\u2019ve done your research you\u2019ll have a good sense of what each path and result will look like. This should make it easier for you to choose the path that will best serve you in achieving your goal.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/c\/cd\/Create-an-Effective-Action-Plan-Step-33.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-33.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-333&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Be aware of things related to your goal that may affect you. This includes being aware of things that may hinder you in your goals \u2014 in the case of thesis writing this may include mental exhaustion, lack of research, or unexpected work responsibilities.&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/c\/cb\/Create-an-Effective-Action-Plan-Step-34.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-34.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-334&quot;
                },
                {
                    &quot;@type&quot;: &quot;HowToStep&quot;,
                    &quot;text&quot;: &quot;Be flexible. Your goals may change as you move toward them. Allow room for yourself, and as a result, your goals, to develop. That said, don\u2019t just give up when it gets hard. There\u2019s a difference between losing interest and losing hope!&quot;,
                    &quot;image&quot;: &quot;https:\/\/www.wikihow.com\/images\/thumb\/d\/dd\/Create-an-Effective-Action-Plan-Step-35.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-35.jpg&quot;,
                    &quot;url&quot;: &quot;https:\/\/www.wikihow.com\/Create-an-Effective-Action-Plan#step-id-335&quot;
                }
            ]
        }
    ],
    &quot;description&quot;: &quot;Creating a powerful action plan always begins with having a clear purpose, vision or goal in mind. It's designed to take you from wherever you are right now directly to the accomplishment of your stated goal. With a well-designed plan, you...&quot;
}&lt;/script&gt;&lt;script type=&quot;application/ld+json&quot;&gt;{
