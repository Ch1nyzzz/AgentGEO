			&lt;a class=&quot;ts_expert_link&quot; href=&quot;/Author/Jennifer-Clark&quot;&gt;&lt;span class=&quot;ts_expert_image&quot;&gt;&lt;picture&gt;&lt;source type=&quot;image/webp&quot; srcset=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png.webp&quot;&gt;&lt;/source&gt;&lt;img src=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png&quot; alt=&quot;Jennifer Clark&quot; loading=&quot;lazy&quot; width=&quot;30&quot; height=&quot;30&quot; style=&quot;max-width: 30px&quot;&gt;&lt;/picture&gt;&lt;/span&gt;Jennifer Clark&lt;br&gt;&lt;span class=&quot;ts_blurb&quot;&gt;Life Coach&lt;/span&gt;&lt;/a&gt;

&lt;/sup&gt; The less clear you are about what you want to do, the less effective your plan will be. Try to specifically define what you want to achieve as early as possible — preferably before starting your project.
&lt;ul&gt;&lt;li&gt;Example: You are trying to complete your master’s thesis — basically a very long essay — which needs to be about 40,000 words. It will include an introduction, a literature review (in which you critically discuss other research that informs yours, and discuss your methodology), several chapters in which you put your ideas into practice using concrete examples, and a conclusion. You have 1 year to write it.&lt;/li&gt;&lt;/ul&gt;

&lt;a name=&quot;step_1_2&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-2-Version-3.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;02890d7bde2119bb9db6a5e34439f6b8&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 2 Work backwards from your end goal.&quot; src=&quot;https://www.wikihow.com/images/thumb/5/59/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/5\/59\/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/5\/59\/Create-an-Effective-Action-Plan-Step-2-Version-3.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-2-Version-3.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;2&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Work backwards from your end goal.&lt;/b&gt; Identify your end goal, then list everything you need to do to accomplish it. Depending on your goal, you may even consider different ways to reach your goal. After you know what you need to accomplish, break this down into actionable steps to help you create a more realistic plan.
&lt;ul&gt;
&lt;li&gt;Keep in mind that your plan may change as you work toward your goal, so stay flexible.&lt;/li&gt;
&lt;li&gt;Make sure that your goals are S.M.A.R.T. to ensure that your plan is effective:&lt;sup id=&quot;_ref-2&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 2&quot;&gt;&lt;a href=&quot;#_note-2&quot;&gt;[2]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_2&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;
&lt;li&gt;Specific - Be clear about what you want to achieve.&lt;/li&gt;
&lt;li&gt;Measurable - You can break down the goal into measurable checkpoints.&lt;/li&gt;
&lt;li&gt;Attainable - You are capable of completing the steps necessary to reach the goal.&lt;/li&gt;
&lt;li&gt;Relevant - The goal makes sense for your life and purpose.&lt;/li&gt;
&lt;li&gt;Timely - You have the time to work toward your goal and are progressing on schedule.&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

&lt;a name=&quot;step_1_3&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-3-Version-2.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;2cb82bc74daacf49161acdb8ef0668c0&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 3 Be specific and realistic in your planning.&quot; src=&quot;https://www.wikihow.com/images/thumb/9/95/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/9\/95\/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/9\/95\/Create-an-Effective-Action-Plan-Step-3-Version-2.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-3-Version-2.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;3&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Be specific and realistic in your planning.&lt;/b&gt; Having a specific goal is just the beginning: you need to be specific and realistic in every aspect of your project — for example, by stating specific and achievable schedules, milestones, and final outcomes.
&lt;ul&gt;
&lt;li&gt;Being specific and realistic while planning a long project is all about pro-actively reducing stress that can accompany poorly planned projects such as missed deadlines and exhausting long hours.&lt;/li&gt;
&lt;li&gt;Example: To finish your thesis on time, you need to write roughly 5,000 words per month, which will give you a couple of months at the end of your timeline to polish your ideas. Being realistic means not placing the expectation on yourself to write more than 5,000 words each month.&lt;/li&gt;
&lt;li&gt;If you’re working as a teaching assistant for three of those months, you’ll need to consider that you may not be able to complete 15,000 words in that time, and you’ll need to spread that amount out over your other months.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_3&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-03&quot;&gt;
&lt;a name=&quot;step_1_4&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-4-Version-2.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;03f6c0ccc68658030e4e82022a09c2a5&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 4 Set measurable milestones.&quot; src=&quot;https://www.wikihow.com/images/thumb/2/28/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/2\/28\/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/2\/28\/Create-an-Effective-Action-Plan-Step-4-Version-2.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-4-Version-2.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;4&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Set measurable milestones.&lt;/b&gt; Milestones mark significant stages along the road to achieving your end goal. Create milestones easily by starting at the end (the accomplishment of the goal) and working your way backwards to your present day and circumstances.
&lt;ul&gt;
&lt;li&gt;Having milestones can help you — and if applicable, your team — stay motivated by breaking the work into smaller chunks and tangible goals so that you don’t need to wait until the project is completely finished to feel as though you’ve accomplished something.&lt;/li&gt;
&lt;li&gt;Don’t leave too much time or too little time between milestones — spacing them two weeks apart has been found to be effective.&lt;sup id=&quot;_ref-3&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 3&quot;&gt;&lt;a href=&quot;#_note-3&quot;&gt;[3]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_3&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;Example: When writing your thesis, resist the urge to set milestones based on chapter completions, as this could be a matter of months. Instead, set smaller milestones — perhaps based on word counts — every two weeks, and reward yourself when you hit them.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_4&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-04&quot;&gt;
&lt;a name=&quot;step_1_5&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-5-Version-2.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;62d2353f9ffea835de22ad9fa6b6434b&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 5 Break large tasks into smaller, more manageable chunks.&quot; src=&quot;https://www.wikihow.com/images/thumb/3/35/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/3\/35\/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/3\/35\/Create-an-Effective-Action-Plan-Step-5-Version-2.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-5-Version-2.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;5&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Break large tasks into smaller, more manageable chunks.&lt;/b&gt; Some tasks or milestones may seem more daunting to achieve than others.
&lt;ul&gt;
&lt;li&gt;If you’re feeling overwhelmed by a large task, you can help ease your anxiety and make it feel more doable by breaking it down into smaller, more manageable chunks.&lt;/li&gt;
&lt;li&gt;Example: The lit review is often the most difficult chapter to write, as it forms the foundation of your thesis. In order to complete your lit review, you need to do a significant amount of research and analysis before you can even begin writing.&lt;/li&gt;
&lt;li&gt;You can break it into three smaller chunks: research, analysis, and writing. You can break it down even smaller by choosing specific articles and books that you need to read, and setting deadlines for analyzing them and writing about them.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_5&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-05&quot;&gt;
&lt;a name=&quot;step_1_6&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-6.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;36ecc1f4e2a646e8f7690c1cd2a97171&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-6.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-6.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-6.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-6.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 6 Make scheduled lists.&quot; src=&quot;https://www.wikihow.com/images/thumb/8/8e/Create-an-Effective-Action-Plan-Step-6.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-6.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/8e\/Create-an-Effective-Action-Plan-Step-6.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-6.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/8\/8e\/Create-an-Effective-Action-Plan-Step-6.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-6.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;6&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Make scheduled lists.&lt;/b&gt; Make a list of tasks that you need to complete in order to hit your milestones. A list on its own will not be effective — you must write this list into a timeline associated with specific, realistic actions.
&lt;ul&gt;&lt;li&gt;Example: By breaking your lit review into smaller chunks, you’ll know exactly what you need to get done, and can figure out a realistic timeframe for those tasks. Perhaps every one to two days you will have to read, analyze, and write about one key reading.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_6&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-06&quot;&gt;
&lt;a name=&quot;step_1_7&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-7-Version-2.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;3451e799afc6c4fda83570346cdbe779&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 7 Put timelines on everything.&quot; src=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/89\/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/8\/89\/Create-an-Effective-Action-Plan-Step-7-Version-2.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-7-Version-2.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;7&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Put timelines on everything.&lt;/b&gt; Without specific time frames and deadlines, work will definitely expand to fill the time allotted, and some tasks may never get completed.
&lt;ul&gt;
&lt;li&gt;No matter what action items you choose for which phase of your action plan, it is essential that a time frame be attached to absolutely everything.&lt;/li&gt;
&lt;li&gt;Example: If you know that it takes you roughly 1 hour to read 2,000 words, and you’ll be reading a 10,000-word article, you need to give yourself at least 5 hours to complete that article.&lt;/li&gt;
&lt;li&gt;You’ll need to also account for at least 2 meals during that time, as well as short breaks every 1 to 2 hours for when your brain is feeling tired. In addition, you’ll want to add at least an hour onto your final number just to account for any possible unanticipated interruptions.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_7&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-07&quot;&gt;
&lt;a name=&quot;step_1_8&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-8-Version-2.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;b78f18427aa06363968374d1dbef385e&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 8 Create a visual representation.&quot; src=&quot;https://www.wikihow.com/images/thumb/d/d6/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/d\/d6\/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/d\/d6\/Create-an-Effective-Action-Plan-Step-8-Version-2.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-8-Version-2.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;8&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Create a visual representation.&lt;/b&gt; Once you’ve listed your action items and set a specific timeline, create some type of visual representation of your plan. You could use a flow chart, a Gantt chart, a spreadsheet, or some other type of business tool to accomplish this.
&lt;ul&gt;&lt;li&gt;Keep this visual representation in an easily accessible place — even on a wall in your office or study room, if possible.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_8&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-08&quot;&gt;
&lt;a name=&quot;step_1_9&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-9-Version-2.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;816c86395d05c9777486429ad18f5e16&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 9 Mark things off as you go.&quot; src=&quot;https://www.wikihow.com/images/thumb/f/fd/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/f\/fd\/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/f\/fd\/Create-an-Effective-Action-Plan-Step-9-Version-2.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-9-Version-2.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;9&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Mark things off as you go.&lt;/b&gt; Marking things off as you go will not only feel satisfying, it will help you keep on track lest you forget what you’ve already done.
&lt;ul&gt;&lt;li&gt;This is particularly important if you’re working with other people. If you’re working with other people, you might consider using a shared online document so that everyone can check in no matter where they are.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_9&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-09&quot;&gt;
&lt;a name=&quot;step_1_10&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-10-Version-3.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;47baa94f948e49f2c8d50d25999991fb&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 10 Keep a record of everything.&quot; src=&quot;https://www.wikihow.com/images/thumb/4/44/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/4\/44\/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/4\/44\/Create-an-Effective-Action-Plan-Step-10-Version-3.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-3.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;10&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Keep a record of everything.&lt;/b&gt; As you work through your action plan, keep notes of everything. You may find it helpful to have a binder with different tabs in it to section off different aspects of your planning process. Some examples of sections:
&lt;ul&gt;
&lt;li&gt;Ideas/Miscellaneous notes&lt;/li&gt;
&lt;li&gt;Daily Schedules&lt;/li&gt;
&lt;li&gt;Monthly Schedules&lt;/li&gt;
&lt;li&gt;Milestones&lt;/li&gt;
&lt;li&gt;Research&lt;/li&gt;
&lt;li&gt;Follow-up&lt;/li&gt;
&lt;li&gt;Individuals involved/Contacts&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_10&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-010&quot;&gt;
&lt;a name=&quot;step_1_11&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-10-Version-2.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;40ae205d5d02b06d43970015b15ac3cc&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 11 Don’t stop until you’ve reached your final goal.&quot; src=&quot;https://www.wikihow.com/images/thumb/a/ac/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/a\/ac\/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/a\/ac\/Create-an-Effective-Action-Plan-Step-10-Version-2.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-10-Version-2.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;11&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Don’t stop until you’ve reached your final goal.&lt;/b&gt; Once your plan is established and shared with the team (if applicable), and your milestones are scheduled, take daily actions to achieve your goal.
&lt;ul&gt;&lt;li&gt;Although you want to stay persistent, you should also be flexible. It's likely that unexpected events will come up that require you to shift your schedule or plan.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_11&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-011&quot;&gt;
&lt;a name=&quot;step_1_12&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-11.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;8dd436a1f0b7fd2d7eef4e06588c8590&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-11.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-11.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-11.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-11.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 12 Change the date if you must, but never give up on your goal.&quot; src=&quot;https://www.wikihow.com/images/thumb/8/88/Create-an-Effective-Action-Plan-Step-11.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-11.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/88\/Create-an-Effective-Action-Plan-Step-11.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-11.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/8\/88\/Create-an-Effective-Action-Plan-Step-11.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-11.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;12&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Change the date if you must, but never give up on your goal.&lt;/b&gt; Occasionally, circumstances or unforeseen events can arise that throw a wrench in your ability to meet deadlines, complete tasks and achieve your goal.
&lt;ul&gt;&lt;li&gt;If this happens, do not get discouraged – revise your plan and continue working to meet targets and move forward.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;

&lt;a name=&quot;step_2_1&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-12.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;549d10e45d48d0fdda543a2f26ee9a55&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-12.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-12.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-12.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-12.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 1 Get yourself a good planner.&quot; src=&quot;https://www.wikihow.com/images/thumb/d/d7/Create-an-Effective-Action-Plan-Step-12.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-12.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/d\/d7\/Create-an-Effective-Action-Plan-Step-12.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-12.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/d\/d7\/Create-an-Effective-Action-Plan-Step-12.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-12.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;1&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Get yourself a good planner.&lt;/b&gt; Whether this is an app or a book, you'll need a planner that will allow you to plan out your time by the hour, each day of the week. Make sure it’s easy to read and easy to use, otherwise you’ll likely not make use of it.
&lt;ul&gt;
&lt;li&gt;Studies have shown that physically writing things down (i.e. with pen and paper) will make you more likely to do them.&lt;sup id=&quot;_ref-4&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 4&quot;&gt;&lt;a href=&quot;#_note-4&quot;&gt;[4]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_4&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt; For this reason, you may be best off using a physical planner to plan your time out.&lt;/li&gt;
&lt;li&gt;Keeping a planner also helps you relieve stress and feel calmer because it makes it less likely that you'll ruminate on what needs to be done. Additionally, it helps your plan become more solid in your mind.&lt;sup id=&quot;_ref-5&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 5&quot;&gt;&lt;a href=&quot;#_note-5&quot;&gt;[5]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_5&quot; style=&quot;display: none;&quot;&gt;

				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_13&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-113&quot;&gt;
&lt;a name=&quot;step_2_2&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-13.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;91bd2a01f33047e73f4dc7a880235bd9&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-13.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-13.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-13.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-13.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 2 Avoid to-do lists.&quot; src=&quot;https://www.wikihow.com/images/thumb/8/80/Create-an-Effective-Action-Plan-Step-13.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-13.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/80\/Create-an-Effective-Action-Plan-Step-13.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-13.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/8\/80\/Create-an-Effective-Action-Plan-Step-13.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-13.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;2&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Avoid to-do lists.&lt;/b&gt; So you have a long list of things to do, but when will you actually do them? To-do lists are not as effective as scheduling out your tasks. When you schedule your tasks, you make the time to get them done.&lt;sup id=&quot;_ref-6&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 6&quot;&gt;&lt;a href=&quot;#_note-6&quot;&gt;[6]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_6&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;&lt;li&gt;When you have specific time blocks in which to work (many day planners literally contain hourly time blocks), you’ll also find that you’re less likely to procrastinate, as you only have an allotted time in which to get your work done before you must move on to the next scheduled task.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_14&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-114&quot;&gt;
&lt;a name=&quot;step_2_3&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-14.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;7ca5c7e45ba511230f4eae2931723f26&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-14.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-14.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-14.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-14.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 3 Learn how to time block.&quot; src=&quot;https://www.wikihow.com/images/thumb/1/13/Create-an-Effective-Action-Plan-Step-14.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-14.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/1\/13\/Create-an-Effective-Action-Plan-Step-14.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-14.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/1\/13\/Create-an-Effective-Action-Plan-Step-14.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-14.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;3&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Learn how to time block.&lt;/b&gt; Blocking out your time helps you get a more realistic idea of how much time you actually have in a day. Start with your highest-priority tasks and work backwards.
&lt;ul&gt;
&lt;li&gt;Do this for your whole week. Having a broader view of how your days will add up will help you refine your schedule to be as productive as possible.&lt;sup id=&quot;_ref-7&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 7&quot;&gt;&lt;a href=&quot;#_note-7&quot;&gt;[7]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_7&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;Some experts even suggest having at least a general idea of what your whole month will look like.&lt;sup id=&quot;_ref-8&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 8&quot;&gt;&lt;a href=&quot;#_note-8&quot;&gt;[8]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_8&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;Some people recommend starting at the end of your day and working backwards — so if you’re done work/homework at 5 p.m., plan backwards from there, to when your day starts, for example, at 7 a.m.&lt;sup id=&quot;_ref-9&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 9&quot;&gt;&lt;a href=&quot;#_note-9&quot;&gt;[9]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_9&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-115&quot;&gt;
&lt;a name=&quot;step_2_4&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-15.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;3b1890648fb3f87408cef80486e79a55&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-15.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-15.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-15.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-15.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 4 Schedule time for leisure and breaks.&quot; src=&quot;https://www.wikihow.com/images/thumb/e/ec/Create-an-Effective-Action-Plan-Step-15.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-15.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/e\/ec\/Create-an-Effective-Action-Plan-Step-15.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-15.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/e\/ec\/Create-an-Effective-Action-Plan-Step-15.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-15.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;4&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Schedule time for leisure and breaks.&lt;/b&gt; Studies have shown that scheduling even your free time can help increase your satisfaction with life.&lt;sup id=&quot;_ref-10&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 10&quot;&gt;&lt;a href=&quot;#_note-10&quot;&gt;[10]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_10&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt; It has also been proven that long work hours (50+ hours a week) in fact make you less productive.&lt;sup id=&quot;_ref-11&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 11&quot;&gt;&lt;a href=&quot;#_note-11&quot;&gt;[11]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_11&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;
&lt;li&gt;Sleep deprivation will kill your productivity.&lt;sup id=&quot;_ref-12&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 12&quot;&gt;&lt;a href=&quot;#_note-12&quot;&gt;[12]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_12&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt; Make sure that you sleep at least 7 hours each night if you’re an adult, or 8.5 hours a night if you’re a teenager.&lt;/li&gt;
&lt;li&gt;Studies show that scheduling small, “strategic renewals” (i.e. workouts, brief naps, meditation, stretching) into your day will boost your productivity and overall health.&lt;sup id=&quot;_ref-13&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 13&quot;&gt;&lt;a href=&quot;#_note-13&quot;&gt;[13]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_13&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-116&quot;&gt;
&lt;a name=&quot;step_2_5&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-16.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;230762cd01e96d306669f6f3324522ea&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-16.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-16.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-16.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-16.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 5 Set aside time...&quot; src=&quot;https://www.wikihow.com/images/thumb/7/7d/Create-an-Effective-Action-Plan-Step-16.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-16.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/7\/7d\/Create-an-Effective-Action-Plan-Step-16.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-16.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/7\/7d\/Create-an-Effective-Action-Plan-Step-16.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-16.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;5&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot;&gt;Set aside time to &lt;a href=&quot;/Plan-Your-Week&quot; title=&quot;Plan Your Week&quot;&gt;&lt;b class=&quot;whb&quot;&gt;plan your week&lt;/b&gt;&lt;/a&gt; out.&lt;/b&gt; Many experts suggest scheduling time right at the start of your week to sit down and plan your week. Figure out how you can best use each day to work toward achieving your goals.&lt;sup id=&quot;_ref-14&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 14&quot;&gt;&lt;a href=&quot;#_note-14&quot;&gt;[14]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_14&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;
&lt;li&gt;Account for any work or social obligations you have; if you find your schedule is tight, you may need to drop some of your lower-priority plans.&lt;/li&gt;
&lt;li&gt;This doesn’t mean dropping social activities. It’s important to keep up with your good friends and to nurture your close relationships. You need a support network.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
