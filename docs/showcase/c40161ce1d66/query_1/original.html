&lt;/li&gt;
&lt;li id=&quot;step-id-117&quot;&gt;
&lt;a name=&quot;step_2_6&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-17.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;6221ecf810fc76a0cab892450b7d6376&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-17.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-17.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-17.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-17.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 6 Know what a sample scheduled day looks like.&quot; src=&quot;https://www.wikihow.com/images/thumb/e/ee/Create-an-Effective-Action-Plan-Step-17.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-17.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/e\/ee\/Create-an-Effective-Action-Plan-Step-17.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-17.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/e\/ee\/Create-an-Effective-Action-Plan-Step-17.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-17.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;6&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Know what a sample scheduled day looks like.&lt;/b&gt; To return to the thesis-writing example, a regular day might look something like this:
&lt;ul&gt;
&lt;li&gt;7 a.m.: Wake up&lt;/li&gt;
&lt;li&gt;7:15 a.m.: Exercise&lt;/li&gt;
&lt;li&gt;8:30 a.m.: Shower and dress&lt;/li&gt;
&lt;li&gt;9:15 a.m.: Make and eat breakfast&lt;/li&gt;
&lt;li&gt;10 a.m.: Work on Thesis - writing (plus 15 minutes of small breaks)&lt;/li&gt;
&lt;li&gt;12:15 p.m.: Lunch&lt;/li&gt;
&lt;li&gt;1:15 p.m.: Emails&lt;/li&gt;
&lt;li&gt;2 p.m.: Research and response to research (including 20 to 30 minutes of breaks/snacks)&lt;/li&gt;
&lt;li&gt;5 p.m.: Wrap up, check emails, set primary goals for tomorrow&lt;/li&gt;
&lt;li&gt;5:45 p.m.: Leave desk, go grocery shopping&lt;/li&gt;
&lt;li&gt;7:00 p.m.: Make dinner, eat&lt;/li&gt;
&lt;li&gt;9:00 p.m.: Relax — play music&lt;/li&gt;
&lt;li&gt;10:00 p.m.: Prepare for bed, read in bed (30 minutes), sleep&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_18&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-118&quot;&gt;
&lt;a name=&quot;step_2_7&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-18.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;f2a2fe055e2cca169ed77517ec7075f7&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-18.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-18.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-18.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-18.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 7 Know that every day does not have to look the same.&quot; src=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-18.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-18.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/89\/Create-an-Effective-Action-Plan-Step-18.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-18.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/8\/89\/Create-an-Effective-Action-Plan-Step-18.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-18.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;7&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Know that every day does not have to look the same.&lt;/b&gt; You can split up tasks into only 1 or 2 days a week — sometimes it’s even helpful to break up tasks as you can return to them with a fresh perspective.
&lt;ul&gt;&lt;li&gt;Example: Maybe you only write and do research Mondays, Wednesdays, and Fridays, and on Thursdays you substitute writing with learning a musical instrument.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_19&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-119&quot;&gt;
&lt;a name=&quot;step_2_8&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-19.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;58555130e8ca0436b0ab147ddd78d2d6&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-19.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-19.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-19.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-19.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 8 Schedule for problems.&quot; src=&quot;https://www.wikihow.com/images/thumb/d/d1/Create-an-Effective-Action-Plan-Step-19.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-19.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/d\/d1\/Create-an-Effective-Action-Plan-Step-19.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-19.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/d\/d1\/Create-an-Effective-Action-Plan-Step-19.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-19.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;8&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Schedule for problems.&lt;/b&gt; Build a little bit of extra time into every block that will account for a slow work day or an unanticipated interruption. A good rule of thumb is to give yourself double the time you expect a task to take — particularly when you're just starting out.
&lt;ul&gt;&lt;li&gt;As you become more comfortable with your tasks, or if you already have a good sense of how long something will take, you can shave your time down, but it’s always a good idea to leave in at least a small buffer.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-120&quot;&gt;
&lt;a name=&quot;step_2_9&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-20.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;887fd5a7c6cee3abf3cc842bc0d212df&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-20.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-20.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-20.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-20.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 9 Be flexible and gentle with yourself.&quot; src=&quot;https://www.wikihow.com/images/thumb/c/cf/Create-an-Effective-Action-Plan-Step-20.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-20.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/c\/cf\/Create-an-Effective-Action-Plan-Step-20.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-20.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/c\/cf\/Create-an-Effective-Action-Plan-Step-20.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-20.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;9&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Be flexible and gentle with yourself.&lt;/b&gt; Especially as you’re starting out, be prepared to tweak your schedule as you go. It’s part of the learning process. You may find it helpful to block your time out in pencil.
&lt;ul&gt;&lt;li&gt;You may also find it helpful to spend a week or two recording what you do each day into a planner as you go. This will help you get a sense of how you spend your time and how much time each task takes.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-121&quot;&gt;
&lt;a name=&quot;step_2_10&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-21.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;e5a0baca7cd3373a2ab9244f8c18678a&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-21.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-21.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-21.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-21.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 10 Disconnect.&quot; src=&quot;https://www.wikihow.com/images/thumb/5/54/Create-an-Effective-Action-Plan-Step-21.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-21.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/5\/54\/Create-an-Effective-Action-Plan-Step-21.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-21.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/5\/54\/Create-an-Effective-Action-Plan-Step-21.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-21.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;10&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Disconnect.&lt;/b&gt; Set times in your day where you’ll check your emails or social media. Be strict with yourself, as it’s possible to lose hours just checking in every few minutes here and there.&lt;sup id=&quot;_ref-15&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 15&quot;&gt;&lt;a href=&quot;#_note-15&quot;&gt;[15]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_15&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;&lt;li&gt;This includes turning off your phone, if possible — at least for periods where you really want to focus on work.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_22&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-122&quot;&gt;
&lt;a name=&quot;step_2_11&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-22.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;9bc7e5c253cb910c1ffa46e3a859c216&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-22.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-22.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-22.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-22.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 11 Do less.&quot; src=&quot;https://www.wikihow.com/images/thumb/b/bc/Create-an-Effective-Action-Plan-Step-22.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-22.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/b\/bc\/Create-an-Effective-Action-Plan-Step-22.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-22.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/b\/bc\/Create-an-Effective-Action-Plan-Step-22.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-22.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;11&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Do less.&lt;/b&gt; This relates to disconnecting. Figure out the most important things in your day — the ones that will help you achieve your goals, and focus on those. De-prioritize the less important things that fragment your day: emails, mindless paperwork, etc.
&lt;ul&gt;
&lt;li&gt;One expert recommends not checking your emails for at least the first one or two hours of your day; this way, you can focus on your important tasks without getting distracted by the things that those emails may contain.&lt;sup id=&quot;_ref-16&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 16&quot;&gt;&lt;a href=&quot;#_note-16&quot;&gt;[16]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_16&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;If you know you have a lot of small tasks to do (for example, email, paperwork, tidying up your workspace), group them together into a chunk of time in your schedule rather than allowing them to fragment your day or break the flow of other more important tasks that might require more concentration.&lt;sup id=&quot;_ref-17&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 17&quot;&gt;&lt;a href=&quot;#_note-17&quot;&gt;[17]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_17&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Be positive.&lt;/b&gt; Staying positive is fundamental to achieving your goals.&lt;sup id=&quot;_ref-18&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 18&quot;&gt;&lt;a href=&quot;#_note-18&quot;&gt;[18]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_18&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt; Believe in yourself and the people around you. Counter any negative self-talk with positive affirmations.
&lt;ul&gt;&lt;li&gt;In addition to being positive, you will benefit from surrounding yourself with positive people. Research has shown that over time, you adopt the habits of those with whom you spend the most time, so choose your company wisely.&lt;sup id=&quot;_ref-19&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 19&quot;&gt;&lt;a href=&quot;#_note-19&quot;&gt;[19]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_19&quot; style=&quot;display: none;&quot;&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;

&lt;/li&gt;

&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Reward yourself.&lt;/b&gt;&lt;sup id=&quot;_ref-20&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 20&quot;&gt;&lt;a href=&quot;#_note-20&quot;&gt;[20]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_20&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt; This is particularly important to do each time you hit a milestone. Give yourself tangible rewards — for example, a nice dinner at your favorite restaurant when you hit your first two-week milestone, or a back massage for your two-month milestone.
&lt;ul&gt;&lt;li&gt;One expert suggests giving a friend money and telling them that they can only give it to you if you finish a given task by a specified time. If you don’t finish the task, your friend keeps the money.&lt;sup id=&quot;_ref-21&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 21&quot;&gt;&lt;a href=&quot;#_note-21&quot;&gt;[21]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_21&quot; style=&quot;display: none;&quot;&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-225&quot;&gt;
&lt;a name=&quot;step_3_3&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-25.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;e03649f1b287d2d8dc6d9340b7147555&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-25.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-25.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-25.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-25.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 3 Get a support network.&quot; src=&quot;https://www.wikihow.com/images/thumb/8/89/Create-an-Effective-Action-Plan-Step-25.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-25.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/8\/89\/Create-an-Effective-Action-Plan-Step-25.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-25.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/8\/89\/Create-an-Effective-Action-Plan-Step-25.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-25.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;3&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Get a support network.&lt;/b&gt; It’s important to have your friends and family on your side; it’s also important to build connections with people who have similar goals to you. That way you can check in with each other.&lt;sup id=&quot;_ref-22&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 22&quot;&gt;&lt;a href=&quot;#_note-22&quot;&gt;[22]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_22&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;ul&gt;&lt;li&gt;Recruit an accountability partner who knows your deadlines and will help you stay accountable to your goals. For example, they might text you and ask about your progress, or you might check in with them weekly over coffee.&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-226&quot;&gt;
&lt;a name=&quot;step_3_4&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-26.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;169da8c11452ff9d2176d3bac9d18ee5&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-26.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-26.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-26.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-26.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 4 Track your progress.&quot; src=&quot;https://www.wikihow.com/images/thumb/f/f9/Create-an-Effective-Action-Plan-Step-26.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-26.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/f\/f9\/Create-an-Effective-Action-Plan-Step-26.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-26.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/f\/f9\/Create-an-Effective-Action-Plan-Step-26.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-26.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;4&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Track your progress.&lt;/b&gt; Research has shown that progress is the highest motivator.&lt;sup id=&quot;_ref-23&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 23&quot;&gt;&lt;a href=&quot;#_note-23&quot;&gt;[23]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_23&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt; You can track your progress simply by ticking off tasks in your schedule as you go.
&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-227&quot;&gt;
&lt;a name=&quot;step_3_5&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-27.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;0a48ff98dafbb9779ea86474cec1131d&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-27.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-27.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-27.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-27.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 5 Go to bed early and get up early.&quot; src=&quot;https://www.wikihow.com/images/thumb/b/b6/Create-an-Effective-Action-Plan-Step-27.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-27.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/b\/b6\/Create-an-Effective-Action-Plan-Step-27.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-27.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/b\/b6\/Create-an-Effective-Action-Plan-Step-27.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-27.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;5&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Go to bed early and get up early.&lt;/b&gt; When you read about the schedules of highly productive people, a large percentage of them start their days early. These people also have a morning routine — often this is something they can look forward to doing before they go to work.
&lt;ul&gt;&lt;li&gt;Positive ways to start the morning are to do some sort of exercise (from light stretching and yoga to an hour at the gym), eat a healthy breakfast, and spend 20 to 30 minutes writing in a journal.&lt;sup id=&quot;_ref-24&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 24&quot;&gt;&lt;a href=&quot;#_note-24&quot;&gt;[24]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_24&quot; style=&quot;display: none;&quot;&gt;

		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-228&quot;&gt;
&lt;a name=&quot;step_3_6&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-28.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;3324f08169144b2304c6a9870c324629&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-28.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-28.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-28.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-28.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 6 Give yourself downtime.&quot; src=&quot;https://www.wikihow.com/images/thumb/e/ef/Create-an-Effective-Action-Plan-Step-28.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-28.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/e\/ef\/Create-an-Effective-Action-Plan-Step-28.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-28.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/e\/ef\/Create-an-Effective-Action-Plan-Step-28.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-28.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;6&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Give yourself downtime.&lt;/b&gt; Taking breaks is imperative to staying motivated. If you are always working, you’ll wind up exhausting yourself. Taking breaks is a pro-active way to prevent yourself from getting exhausted and losing time that you don’t want to lose.
&lt;ul&gt;
&lt;li&gt;Example: Step away from your computer, turn off your phone, just sit somewhere quiet and do nothing. If ideas come to you, write them down in a notebook; if they don’t, enjoy having nothing to do.&lt;sup id=&quot;_ref-25&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 25&quot;&gt;&lt;a href=&quot;#_note-25&quot;&gt;[25]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_25&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;span class=&quot;ts_name&quot;&gt;Research source&lt;/span&gt;
		&lt;span class=&quot;ts_description&quot;&gt;&lt;/span&gt;
				&lt;a href=&quot;#&quot; class=&quot;ts_source&quot; target=&quot;_blank&quot; rel=&quot;nofollow noreferrer noopener&quot;&gt;&lt;/a&gt;

&lt;/span&gt;
&lt;/sup&gt;
&lt;/li&gt;
&lt;li&gt;Example: &lt;a href=&quot;/Meditate&quot; title=&quot;Meditate&quot;&gt; Meditate&lt;/a&gt;. Turn off your phone’s ringer, turn off any notifications that you might get, and set a timer for up to 30 minutes, or however long you can afford. Just sit quietly and try to clear your mind. When thoughts come into your mind, you might find it useful to label them and then let them go — for example, if you think about work, just quietly say in your head, “Work” and then let it go, and keep doing this as the thoughts arise.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

&lt;/li&gt;
&lt;li id=&quot;step-id-229&quot;&gt;

&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Visualize.&lt;/b&gt; Take a few minutes now and then to think about your goal and how it will feel to have achieved it. This will help you get through the harder times that may accompany pursuing your goal.
&lt;/div&gt;

\/thumb\/0\/09\/Create-an-Effective-Action-Plan-Step-30.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-30.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/0\/09\/Create-an-Effective-Action-Plan-Step-30.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-30.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;8&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Know that it won’t be easy.&lt;/b&gt; Things worth having are rarely easy to get. You may have to resolve a lot of issues or work through some things as you work toward your goal. Accept them as they come.
&lt;ul&gt;&lt;li&gt;Many gurus who extol the virtue of living in the present advise to accept setbacks as though you chose them yourself. Instead of fighting them or getting upset, accept them, learn from them, and set to work figuring out how you’ll achieve your goal given the changed circumstances.&lt;sup id=&quot;_ref-26&quot; class=&quot;reference&quot; aria-label=&quot;Link to Reference 26&quot;&gt;&lt;a href=&quot;#_note-26&quot;&gt;[26]&lt;/a&gt;&lt;span class=&quot;ts_popup &quot; hidden id=&quot;ts_popup_26&quot; style=&quot;display: none;&quot;&gt;

&lt;li id=&quot;step-id-331&quot;&gt;
&lt;a name=&quot;step_4_1&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-31.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;3286d7e65661b7f69f39120b84fc7f20&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-31.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-31.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-31.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-31.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 1 Write about what you want.&quot; src=&quot;https://www.wikihow.com/images/thumb/7/72/Create-an-Effective-Action-Plan-Step-31.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-31.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/7\/72\/Create-an-Effective-Action-Plan-Step-31.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-31.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/7\/72\/Create-an-Effective-Action-Plan-Step-31.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-31.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;1&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Write about what you want.&lt;/b&gt; Do this in a journal or a text document. Think about what overall goal you want to achieve and why you want to achieve it.&lt;sup id=&quot;_ref-28&quot; class=&quot;reference trusted&quot; aria-label=&quot;Link to Reference 28&quot;&gt;&lt;a href=&quot;#_note-28&quot;&gt;[28]&lt;/a&gt;&lt;span class=&quot;ts_popup trustedsource&quot; hidden id=&quot;ts_popup_28&quot; style=&quot;display: none;&quot;&gt;
	&lt;span class=&quot;ts_close&quot;&gt;X&lt;/span&gt;
		&lt;a class=&quot;ts_trustworthy&quot; href=&quot;/wikiHow:Delivering-a-Trustworthy-Experience&quot;&gt;Expert Source&lt;/a&gt;

		&lt;span class=&quot;ts_name&quot;&gt;&lt;/span&gt;
			&lt;a class=&quot;ts_expert_link&quot; href=&quot;/Author/Jennifer-Clark&quot;&gt;&lt;span class=&quot;ts_expert_image&quot;&gt;&lt;picture&gt;&lt;source type=&quot;image/webp&quot; srcset=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png.webp&quot;&gt;&lt;/source&gt;&lt;img src=&quot;/images/thumb/6/69/Jennifer_Clark.png/-crop-100-100-100px-Jennifer_Clark.png&quot; alt=&quot;Jennifer Clark&quot; loading=&quot;lazy&quot; width=&quot;30&quot; height=&quot;30&quot; style=&quot;max-width: 30px&quot;&gt;&lt;/picture&gt;&lt;/span&gt;Jennifer Clark&lt;br&gt;&lt;span class=&quot;ts_blurb&quot;&gt;Life Coach&lt;/span&gt;&lt;/a&gt;

		&lt;span class=&quot;ts_description&quot;&gt;Expert Interview&lt;/span&gt;

&lt;/span&gt;
&lt;/sup&gt; This is particularly helpful if you're not entirely sure what you want to do, but just have a feeling about it.
&lt;ul&gt;
&lt;li&gt;For example, if you want to make more money, you may discover that you actually want more freedom. Without knowing that, you might get locked into something that doesn't serve your true goal, like landing in a job where you have plenty of money but no free time for your family or hobbies.&lt;/li&gt;
&lt;li&gt;Writing regularly in a journal is a great way to keep in touch with yourself and to keep up to date on how you’re feeling. Many people claim that writing helps them clarify how they feel and what they want.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;clearall&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;scrolltomarker&quot; data-isstep=&quot;1&quot; id=&quot;scrollto_marker_steps_32&quot;&gt;&lt;/div&gt;
&lt;/li&gt;
&lt;li id=&quot;step-id-332&quot;&gt;
&lt;a name=&quot;step_4_2&quot; class=&quot;stepanchor&quot;&gt;&lt;/a&gt;&lt;div class=&quot;mwimg  largeimage  floatcenter &quot;&gt;&lt;a href=&quot;#/Image:Create-an-Effective-Action-Plan-Step-32.jpg&quot; class=&quot;image&quot;&gt;&lt;picture id=&quot;82106a42cdcf0d7c1412e0759aceced6&quot;&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-32.jpg.webp 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(max-width: 728px)&quot; width=&quot;460&quot; height=&quot;546&quot; srcset=&quot;https://www.wikihow.com/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-32.jpg 460w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/webp&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-32.jpg.webp 728w&quot;&gt;&lt;/source&gt;&lt;source type=&quot;image/jpeg&quot; media=&quot;(min-width: 729px)&quot; width=&quot;728&quot; height=&quot;546&quot; srcset=&quot;/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-32.jpg 728w&quot;&gt;&lt;/source&gt;&lt;img alt=&quot;Step 2 Do your research.&quot; src=&quot;https://www.wikihow.com/images/thumb/b/b9/Create-an-Effective-Action-Plan-Step-32.jpg/v4-460px-Create-an-Effective-Action-Plan-Step-32.jpg&quot; decoding=&quot;async&quot; class=&quot;whcdn&quot; width=&quot;460&quot; height=&quot;345&quot; loading=&quot;lazy&quot;&gt;&lt;/picture&gt;&lt;div class=&quot;image_details&quot;&gt;&lt;script type=&quot;application/json&quot;&gt;{&quot;smallUrl&quot;:&quot;https:\/\/www.wikihow.com\/images\/thumb\/b\/b9\/Create-an-Effective-Action-Plan-Step-32.jpg\/v4-460px-Create-an-Effective-Action-Plan-Step-32.jpg&quot;,&quot;bigUrl&quot;:&quot;\/images\/thumb\/b\/b9\/Create-an-Effective-Action-Plan-Step-32.jpg\/aid1264071-v4-728px-Create-an-Effective-Action-Plan-Step-32.jpg&quot;,&quot;smallWidth&quot;:460,&quot;smallHeight&quot;:345,&quot;bigWidth&quot;:728,&quot;bigHeight&quot;:546,&quot;licensing&quot;:&quot;&lt;div class=\&quot;mw-parser-output\&quot;&gt;&lt;p&gt;License: &lt;a target=\&quot;_blank\&quot; rel=\&quot;nofollow noreferrer noopener\&quot; class=\&quot;external text\&quot; href=\&quot;https:\/\/creativecommons.org\/licenses\/by-nc-sa\/3.0\/\&quot;&gt;Creative Commons&lt;\/a&gt;&lt;br&gt;\n&lt;\/p&gt;&lt;p&gt;&lt;br \/&gt;\n&lt;\/p&gt;&lt;\/div&gt;&quot;}&lt;/script&gt;&lt;/div&gt;&lt;/a&gt;&lt;/div&gt;
&lt;div class=&quot;step_num&quot; aria-hidden=&quot;true&quot;&gt;2&lt;/div&gt;&lt;div class=&quot;step&quot;&gt;
&lt;b class=&quot;whb&quot; aria-hidden=&quot;true&quot;&gt;Do your research.&lt;/b&gt; Once you have an idea of what you want to do, do your research. Researching your goals will help you narrow down the best way to achieve them.
&lt;ul&gt;
&lt;li&gt;Reach out to people who have achieved goals similar to yours. They can provide you with helpful tips about what works, as well as what to avoid.&lt;/li&gt;
&lt;li&gt;Online forums like Reddit are a great place to look for discussions on most topics — particularly if you want an insider’s view on specific careers.&lt;/li&gt;
&lt;li&gt;Example: While writing your thesis you’re beginning to wonder what you’ll end up doing with it. Read about what others have done with similar degrees to the one that you’re pursuing. This might even help you gear your thesis towards publications or other opportunities that can help further your career.&lt;/li&gt;
&lt;/ul&gt;
