&lt;/span&gt;&lt;div class=&quot;field-item&quot; data-dcnode-id=&quot;519&quot;&gt;&lt;p data-dcnode-id=&quot;1022&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;Research shows that when it comes to allocating resources to training,&amp;nbsp;the highest priority among U.S. companies&amp;nbsp;in 2019&amp;nbsp;will be&amp;nbsp;increasing the &lt;/span&gt;&lt;em data-dcnode-id=&quot;1027&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;effectiveness&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt; of&amp;nbsp;their&amp;nbsp;training programs. Here’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;1024&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/&quot;&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt;how to evaluate any training course&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt; or program in four simple steps.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ins class=&quot;adsbygoogle&quot; data-ad-client=&quot;ca-pub-2468699316526586&quot; data-ad-format=&quot;auto&quot; data-ad-slot=&quot;4989035397&quot; data-dcnode-id=&quot;1018&quot; data-full-width-responsive=&quot;true&quot; style=&quot;display:block&quot;&gt;&lt;/ins&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1013&quot;&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;Why evaluate training effectiveness?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1004&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;According to Training magazine’s&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1009&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//trainingmag.com/trgmag-article/2018-training-industry-report/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;2018 Training Industry Report&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;, total U.S. training expenditures last year were&amp;nbsp;6.4 percent&amp;nbsp;lower compared with 2017. Companies spent an average of $986 per learner, compared with $1,075 the previous year, yet they provided their trainees with &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1006&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;almost the same number of hours of training&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1001&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;How?&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1000&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;995&quot;&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;The answer lies in the way that companies worked to&amp;nbsp;increase&amp;nbsp;the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;997&quot;&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;effectiveness&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt; of their training programs. According to&amp;nbsp;the report&amp;nbsp;from Training magazine,&amp;nbsp;34 percent of companies plan to prioritize the allocation of&amp;nbsp;resources&amp;nbsp;towards this area in 2019.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;992&quot;&gt;&lt;span data-dcnode-id=&quot;993&quot; instrument_node=&quot;&quot;&gt;One of the best routes to&amp;nbsp;increasing the effectiveness of any training program is through evaluation. With so much money and effort devoted to training (U.S.&amp;nbsp;employees received an average of 46.7 hours of training last year) the real&amp;nbsp;issue at stake&amp;nbsp;becomes clear:&amp;nbsp;Did they really learn&amp;nbsp;anything?&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;989&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;The cost of ineffective training&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;986&quot;&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;Training magazine’s report highlights the&amp;nbsp;potential&amp;nbsp;dangers&amp;nbsp;facing firms that run&amp;nbsp;ineffective training programs. While government and military training programs were the costliest at $1,433 per learner, the data shows that small companies spent more ($1,096) than midsized ($858) or large firms&amp;nbsp;($1.046). In other words, if learners aren’t receiving benefits or putting what they learn into practice, companies stand to&amp;nbsp;realize a poor return on their investment in training.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;985&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;983&quot;&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;That’s why&amp;nbsp;learning evaluation models, such as the Kirkpatrick Model,&amp;nbsp;have found favor among companies&amp;nbsp;and organizations&amp;nbsp;of all sizes. Evaluation models give companies a way of measuring whether a training program has met its goals and the goals of the stakeholders. Evaluation models can help improve the quality of the training provided and&amp;nbsp;enhance&amp;nbsp;the outcomes for both the learners and stakeholders&amp;nbsp;alike.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;980&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;Introducing the&amp;nbsp;Kirkpatrick Learning Evaluation Model&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;By far the most widely&amp;nbsp;recognized&amp;nbsp;method for evaluating training effectiveness is the&amp;nbsp;Kirkpatrick&amp;nbsp;Training Evaluation&amp;nbsp;Model. It was created by Don Kirkpatrick in the 1950s and introduced through a series of articles published&amp;nbsp;in the Journal of the ASTD. Over time,&amp;nbsp;Kirkpatrick’s&amp;nbsp;approach to evaluating training effectiveness was developed&amp;nbsp;into&amp;nbsp;the 1993 book&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;976&quot;&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;Four Levels of Training Evaluation&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;964&quot;&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;Kirkpatrick’s model offers a four-level method for evaluating any training program or course. It provides a useful blueprint for assessing any training program.&amp;nbsp;The&amp;nbsp;Kirkpatrick&amp;nbsp;model has undergone significant improvements and changes over the years. In 2007, Don’s son James and his&amp;nbsp;daughter-in-law&amp;nbsp;Wendy co-authored the book,&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;969&quot;&gt;&lt;a data-dcnode-id=&quot;970&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.kirkpatrickpartners.com/product/kirkpatricks-four-levels-of-training-evaluation/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;Kirkpatrick's Four Levels of Training Evaluation&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;The&amp;nbsp;model is currently known as&amp;nbsp;the &lt;/span&gt;&lt;a data-dcnode-id=&quot;966&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.kirkpatrickpartners.com/product/the-four-levels-of-evaluation-an-update/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;New World Kirkpatrick Model&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;961&quot;&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;Here’s how it works:&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;958&quot;&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;The Kirkpatrick model features four levels:&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;928&quot;&gt;&lt;li data-dcnode-id=&quot;951&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;953&quot;&gt;&lt;strong data-dcnode-id=&quot;954&quot;&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt;Level 1: Reaction&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;950&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;944&quot;&gt;&lt;span data-dcnode-id=&quot;949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;946&quot;&gt;&lt;strong data-dcnode-id=&quot;947&quot;&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;Level 2: Learning&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;945&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;937&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;939&quot;&gt;&lt;strong data-dcnode-id=&quot;940&quot;&gt;&lt;span data-dcnode-id=&quot;941&quot; instrument_node=&quot;&quot;&gt;Level 3:&amp;nbsp;Behaviour&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;930&quot;&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;932&quot;&gt;&lt;strong data-dcnode-id=&quot;933&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;Level 4: Impact&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;926&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;Here’s a brief&amp;nbsp;explanation&amp;nbsp;of each level:&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ins class=&quot;adsbygoogle&quot; data-ad-client=&quot;ca-pub-2468699316526586&quot; data-ad-format=&quot;auto&quot; data-ad-slot=&quot;3456461877&quot; data-dcnode-id=&quot;922&quot; data-full-width-responsive=&quot;true&quot; style=&quot;display:block&quot;&gt;&lt;/ins&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;917&quot;&gt;&lt;span data-dcnode-id=&quot;918&quot; instrument_node=&quot;&quot;&gt;Level 1: Reaction&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;907&quot;&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;The first level of the Kirkpatrick Model is known as the ‘Reaction’ level. This is the most basic way to evaluate any type of training as it simply establishes how the learners responded to the training. The most common approach is to ask participants to answer a series of&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;909&quot; lang=&quot;EN-US&quot; xml:lang=&quot;EN-US&quot;&gt;&lt;span data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot;&gt;&lt;a data-dcnode-id=&quot;913&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/blog/10-training-effectiveness-survey-questions-ask&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;training effectiveness survey questions&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;904&quot;&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;Level 2: Learning&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;901&quot;&gt;&lt;span data-dcnode-id=&quot;902&quot; instrument_node=&quot;&quot;&gt;The second level of evaluation in the&amp;nbsp;Kirkpatrick&amp;nbsp;Model attempts to establish whether learning took place. Can the participants demonstrate a greater knowledge or understanding of the course materials&amp;nbsp;after&amp;nbsp;training?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;900&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;898&quot;&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;Level 3: Behavior&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;897&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;889&quot;&gt;&lt;span data-dcnode-id=&quot;896&quot; instrument_node=&quot;&quot;&gt;Level 3 of the Kirkpatrick learning evaluation model looks at whether the&amp;nbsp;participants&amp;nbsp;made use of their training&amp;nbsp;when they returned to work. Did they apply their knowledge, understanding or skills to their jobs? This help you take&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;891&quot; lang=&quot;EN-US&quot; xml:lang=&quot;EN-US&quot;&gt;&lt;span data-dcnode-id=&quot;892&quot;&gt;&lt;span data-dcnode-id=&quot;893&quot;&gt;&lt;a data-dcnode-id=&quot;894&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/blog/how-measure-training-effectiveness-4-simple-steps&quot;&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;simple steps to measure training effectiveness&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;886&quot;&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;Level 4: Results&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;885&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;883&quot;&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;The Kirkpatrick model focuses on ROE – Return on Expectations. In level 4, the model looks that the&amp;nbsp;expectations&amp;nbsp;held by stakeholders and examines whether the training helped to meet them, and if so, to what extent.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;880&quot;&gt;&lt;span data-dcnode-id=&quot;881&quot; instrument_node=&quot;&quot;&gt;As you can see, the Kirkpatrick model provides an extremely comprehensive way of evaluating the&amp;nbsp;effectiveness&amp;nbsp;of any training. But it clearly cannot all be accomplished in&amp;nbsp;just&amp;nbsp;four simple steps.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;879&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;877&quot;&gt;&lt;span data-dcnode-id=&quot;878&quot; instrument_node=&quot;&quot;&gt;Therefore, we’ll have to focus on the first level of the&amp;nbsp;Kirkpatrick&amp;nbsp;Model&amp;nbsp;and ask:&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;876&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;874&quot;&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;Did the training have the right&amp;nbsp;conditions for learning to take place?&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;871&quot;&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;How to evaluate training in four steps&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;868&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;Conveniently, level one evaluations can be broken down into four clear steps:&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;867&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;859&quot;&gt;&lt;li data-dcnode-id=&quot;861&quot;&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;863&quot;&gt;&lt;strong data-dcnode-id=&quot;864&quot;&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;Step #1. Deciding&amp;nbsp;your&amp;nbsp;key questions and data collection methods&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;860&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;ul data-dcnode-id=&quot;837&quot;&gt;&lt;li data-dcnode-id=&quot;853&quot;&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;855&quot;&gt;&lt;strong data-dcnode-id=&quot;856&quot;&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;Step #2. Creating your evaluation&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;846&quot;&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;848&quot;&gt;&lt;strong data-dcnode-id=&quot;849&quot;&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;Step #3. Deploying your evaluation&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;839&quot;&gt;&lt;span data-dcnode-id=&quot;844&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;841&quot;&gt;&lt;strong data-dcnode-id=&quot;842&quot;&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;Step #4. Data analysis and reporting&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;835&quot;&gt;&lt;span data-dcnode-id=&quot;836&quot; instrument_node=&quot;&quot;&gt;Let’s see how this looks in practice.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;832&quot;&gt;&lt;span data-dcnode-id=&quot;833&quot; instrument_node=&quot;&quot;&gt;Step #1. Deciding&amp;nbsp;your&amp;nbsp;key questions and data collection methods&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;829&quot;&gt;&lt;span data-dcnode-id=&quot;830&quot; instrument_node=&quot;&quot;&gt;The goal of Level 1 evaluations&amp;nbsp;is&amp;nbsp;to&amp;nbsp;gather reactions to the training and see how the learners responded to the training methods, the course instructors, the facilities and the administration of the training.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;826&quot;&gt;&lt;span data-dcnode-id=&quot;827&quot; instrument_node=&quot;&quot;&gt;The specific questions you ask will depend on&amp;nbsp;three main factors:&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;822&quot;&gt;&lt;strong data-dcnode-id=&quot;823&quot;&gt;&lt;span data-dcnode-id=&quot;824&quot; instrument_node=&quot;&quot;&gt;1. What are the business stakeholders’ expectations of the training?&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;818&quot;&gt;&lt;strong data-dcnode-id=&quot;819&quot;&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;2. What are the&amp;nbsp;objectives of the training?&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;814&quot;&gt;&lt;strong data-dcnode-id=&quot;815&quot;&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;3. What are the overall objectives of the evaluation?&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;811&quot;&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;It is vital that you align&amp;nbsp;the&amp;nbsp;evaluation objects&amp;nbsp;closely&amp;nbsp;to the key business stakeholders’ expectations of the training and original training objectives. It should flow&amp;nbsp;from one to the next –&amp;nbsp;expectations, training objectives, evaluation&amp;nbsp;objectives.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;808&quot;&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;To illustrate this, let’s consider a scenario where a call center’s&amp;nbsp;stakeholders&amp;nbsp;have decided to deploy a training course that helps&amp;nbsp;their&amp;nbsp;employees&amp;nbsp;improve&amp;nbsp;levels of&amp;nbsp;customer&amp;nbsp;satisfaction.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;801&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;The stakeholders’ expectations may be that the training will result in a positive improvement in customer satisfaction.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;805&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;803&quot;&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;
The training’s objectives would be to help operators answer customer questions&amp;nbsp;faster and&amp;nbsp;more&amp;nbsp;accurately.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;798&quot;&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;Therefore,&amp;nbsp;the&amp;nbsp;objectives of the evaluation&amp;nbsp;should be to find out whether the learners (the&amp;nbsp;call center&amp;nbsp;operators) felt that the training was&amp;nbsp;conducive&amp;nbsp;to learning.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;794&quot;&gt;&lt;img alt=&quot;evaluate_training_effectiveness&quot; data-dcnode-id=&quot;796&quot; data-entity-type=&quot;file&quot; data-entity-uuid=&quot;25c86f11-189f-4618-a8cf-c8d59a4b7e6a&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/sites/default/files/inline-images/abandoned-antique-architecture-263532.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;791&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;To obtain the necessary feedback, the&amp;nbsp;sequential approach outlined below will help you decide which questions to ask. These may include:&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;788&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;Did the learners enjoy the training?&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;785&quot;&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;Did they feel it was a useful way to spend their time?&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;782&quot;&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;Did they find the training relevant? Why/why not?&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;779&quot;&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;Was the training practical? Could they use it in the workplace?&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;776&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;Would the learners recommend the training? Why/why not?&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;773&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;Did the training motivate them to continue with their learning?&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;772&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;760&quot;&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt;For more sample questions that will help you evaluate participants' reaction to&amp;nbsp;training,&amp;nbsp;download our&amp;nbsp;free&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;769&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/guides-more/training-effectiveness-evaluation-form&quot;&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;training effectiveness evaluation form&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;This is one of the&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;762&quot; lang=&quot;EN-US&quot; xml:lang=&quot;EN-US&quot;&gt;&lt;span data-dcnode-id=&quot;763&quot;&gt;&lt;span data-dcnode-id=&quot;764&quot;&gt;&lt;a data-dcnode-id=&quot;766&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/blog/3-best-methods-evaluate-training-effectiveness&quot;&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;best methods to evaluate training effectiveness&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;761&quot; instrument_node=&quot;&quot;&gt; &amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;759&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ins class=&quot;adsbygoogle&quot; data-ad-client=&quot;ca-pub-2468699316526586&quot; data-ad-format=&quot;auto&quot; data-ad-slot=&quot;6246276743&quot; data-dcnode-id=&quot;756&quot; data-full-width-responsive=&quot;true&quot; style=&quot;display:block&quot;&gt;&lt;/ins&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;751&quot;&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;How will you collect your data?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;748&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;Once you have chosen the most appropriate questions to ask, you need to decide how you will collect your data. These two tasks&amp;nbsp;(the questions and the data collection methods)&amp;nbsp;are interrelated so must&amp;nbsp;be considered as one step. You can only formulate your questions when&amp;nbsp;you know how you’ll collect it: a&amp;nbsp;good question for a survey or questionnaire may not work well in the focus group, for example.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;739&quot;&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;There are many&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;741&quot; lang=&quot;EN-US&quot; xml:lang=&quot;EN-US&quot;&gt;&lt;span data-dcnode-id=&quot;742&quot;&gt;&lt;span data-dcnode-id=&quot;743&quot;&gt;&lt;a data-dcnode-id=&quot;744&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/blog/four-good-reasons-evaluate-training-effectiveness&quot;&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;good reasons to evaluate training effectiveness&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt; The most common approach is to design a simple survey or questionnaire that learners can complete during or after the training.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;736&quot;&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;Alternatively,&amp;nbsp;you can use:&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;735&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;728&quot;&gt;&lt;li data-dcnode-id=&quot;730&quot;&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;732&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;meetings&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;729&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;ul data-dcnode-id=&quot;709&quot;&gt;&lt;li data-dcnode-id=&quot;723&quot;&gt;&lt;span data-dcnode-id=&quot;727&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;725&quot;&gt;&lt;span data-dcnode-id=&quot;726&quot; instrument_node=&quot;&quot;&gt;written reports&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;717&quot;&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;719&quot;&gt;&lt;span data-dcnode-id=&quot;720&quot; instrument_node=&quot;&quot;&gt;interviews&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;711&quot;&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;713&quot;&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;focus groups&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;705&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;To a large extent, your data&amp;nbsp;collection&amp;nbsp;method will depend on the size of the organization you are working within, and your budget. Interviews and focus groups will necessitate more time and money than simple surveys, for&amp;nbsp;instance.&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;707&quot;&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;702&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/guides-more/training-effectiveness-evaluation-form&quot;&gt;&lt;img alt=&quot;evaluate training effectiveness&quot; class=&quot;align-center&quot; data-dcnode-id=&quot;703&quot; data-entity-type=&quot;file&quot; data-entity-uuid=&quot;08254177-1512-4f0c-9f5e-103f265104ab&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/sites/default/files/inline-images/Training%2520effectiveness%2520evaluation%2520form_1.png&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;699&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;696&quot;&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;Step #2. Creating your evaluation&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;693&quot;&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;Your second step is to create your evaluation, according to the questions and data collection methods you chose in Step 1.&amp;nbsp;You can produce a handwritten or typed evaluation&amp;nbsp;yourself&amp;nbsp;or use a platform for measuring training effectiveness and learning impact such as KodoSurvey.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;690&quot;&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;How to create a survey&amp;nbsp;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;687&quot;&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;Begin by choosing an appropriate format. It could be a&amp;nbsp;simple&amp;nbsp;printed paper survey, an emailed survey,&amp;nbsp;or an online survey via a platform.&amp;nbsp;You’ll need to spend time&amp;nbsp;creating effective questions and possibly conduct&amp;nbsp;a pilot test to iron out any issues before you deploy your survey.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;684&quot;&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;Longer evaluations tend to have lower completion rates&amp;nbsp;but shorter tend to reduce the quality of the results.&amp;nbsp;So&amp;nbsp;you’ll need to find&amp;nbsp;a&amp;nbsp;balance&amp;nbsp;in your number of questions – so that it drives high quality without reducing completion rates.&amp;nbsp;KodoSurvey&amp;nbsp;will help you automate many stages of creating and deploying a&amp;nbsp;both survey’s that evaluate your training on Kirkpatrick’s first level and tests that evaluate training effectiveness and learning impact&amp;nbsp;on job performance.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;656&quot;&gt;&lt;strong data-dcnode-id=&quot;681&quot;&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;Meetings&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;680&quot;&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;
If you chose to hold a meeting, you’ll need to draft an agenda with the points you want to discuss. Take account of the number of attendees and give time for them to offer feedback about their training experience.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;678&quot;&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;676&quot;&gt;&lt;strong data-dcnode-id=&quot;674&quot;&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt;Written reports&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;673&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;
If you’d prefer to have&amp;nbsp;learners&amp;nbsp;complete written reports, you’ll need to create written guidance that helps participants understand your expectations. Your writing should have clear instructions about the areas that you want the learners to cover.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;671&quot;&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;669&quot;&gt;&lt;strong data-dcnode-id=&quot;667&quot;&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;Interviews&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;665&quot;&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;
Interviews can be an excellent way of obtaining high-quality&amp;nbsp;feedback about learners’ reactions to training. Interview questions will be roughly&amp;nbsp;similar to&amp;nbsp;survey questions, except the interviewer will be on-hand to explain any terms or concepts that the interviewees&amp;nbsp;may need explaining.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;663&quot;&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;661&quot;&gt;&lt;strong data-dcnode-id=&quot;659&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;Focus groups&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;658&quot;&gt;&lt;span data-dcnode-id=&quot;657&quot; instrument_node=&quot;&quot;&gt;
Focus groups lend themselves well to large organizations with high numbers to learners. You can use sampling techniques to understand typical learner reactions&amp;nbsp;to training without having to gather data from every participant.&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;653&quot;&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;Step #3. Deploying your evaluation&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;643&quot;&gt;&lt;span data-dcnode-id=&quot;645&quot; lang=&quot;EN-US&quot; xml:lang=&quot;EN-US&quot;&gt;&lt;span data-dcnode-id=&quot;646&quot;&gt;&lt;span data-dcnode-id=&quot;647&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;Some companies are&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;649&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/blog/are-you-spending-millions-training-without-knowing-its-true-effect&quot;&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt;spending millions on training without knowing its full effect&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;. That's why using an evaluation is essential. Your approach will depend on the&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;644&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;type&amp;nbsp;of evaluation you chose, the size of your company and your time and budget&amp;nbsp;restraints.&amp;nbsp;Ideally, you should deploy your evaluation to all learners, although, as we’ve noted, you may use sampling techniques if there are large numbers of&amp;nbsp;participants.&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;640&quot;&gt;&lt;span data-dcnode-id=&quot;641&quot; instrument_node=&quot;&quot;&gt;Your evaluation should take place at the end of training, or as soon as possible after the end of the training so that it is still fresh in peoples’ minds.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;637&quot;&gt;&lt;span data-dcnode-id=&quot;638&quot; instrument_node=&quot;&quot;&gt;A&amp;nbsp;survey&amp;nbsp;or&amp;nbsp;questionnaire&amp;nbsp;can easily be sent to all participants, while written reports, interviews,&amp;nbsp;and&amp;nbsp;focus groups lend themselves well to sampling methods.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;636&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;631&quot;&gt;&lt;strong data-dcnode-id=&quot;634&quot;&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;Confidentiality&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;633&quot;&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;
Learners are unlikely to provide honest answers if they believe that their responses may be collected and used against them. Reaction evaluations that offer anonymity and&amp;nbsp;confidentiality&amp;nbsp;have a much higher&amp;nbsp;completion&amp;nbsp;rate and provide much more useful, honest data than&amp;nbsp;evaluations&amp;nbsp;where the identity of the trainee is known.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;628&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;For surveys or&amp;nbsp;questionnaires, you should&amp;nbsp;avoid&amp;nbsp;using or requesting the user’s personal information when asking for their responses. You should not ask learners to enter any information that could be used to identify them such as their name, or email address.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;625&quot;&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;You can also offer both written and verbal assurances in other scenarios such as meetings, reports, interviews and focus groups&amp;nbsp;that any information they provide will be held in the strictest confidence and will not be used against them in any way. It is important to make the learners aware of any steps you have taken to ensure confidentiality.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;622&quot;&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;Step #4. Data analysis and reporting&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;612&quot;&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;The&amp;nbsp;fourth and final&amp;nbsp;step of evaluating at Level 1 is to collect&amp;nbsp;the responses and create a report to share with key stakeholders. While few companies currently complete this step, we believe that measuring&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;614&quot; lang=&quot;EN-US&quot; xml:lang=&quot;EN-US&quot;&gt;&lt;span data-dcnode-id=&quot;615&quot;&gt;&lt;span data-dcnode-id=&quot;616&quot;&gt;&lt;a data-dcnode-id=&quot;618&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/blog/why-measuring-training-effectiveness-will-soon-become-standard&quot;&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;training effectiveness will soon become standard&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;613&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;You may also wish to discuss the results of the evaluation with the participants, the course trainers,&amp;nbsp;and&amp;nbsp;the&amp;nbsp;participants'&amp;nbsp;managers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;608&quot;&gt;&lt;img alt=&quot;evaluate_training_effectiveness&quot; data-dcnode-id=&quot;610&quot; data-entity-type=&quot;file&quot; data-entity-uuid=&quot;29fd0e02-afcd-4acb-9160-ad49d4669fa9&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//kodosurvey.com/sites/default/files/inline-images/chart-data-desk-590022_1.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;609&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;607&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;605&quot;&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;If you used&amp;nbsp;KodoSurvey&amp;nbsp;to help create and deploy a&amp;nbsp;Level 1&amp;nbsp;survey,&amp;nbsp;you will automatically get a&amp;nbsp;custom reports&amp;nbsp;using the data. If you used another method, the onus is on your or your staff to collate and&amp;nbsp;interpret&amp;nbsp;the results of the data and&amp;nbsp;draw&amp;nbsp;your own&amp;nbsp;conclusions.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;602&quot;&gt;&lt;span data-dcnode-id=&quot;603&quot; instrument_node=&quot;&quot;&gt;The goal of evaluating participant reaction to training is to identify potential barriers to learning and help learners feel that their needs and preferences are being met. It is highly important to act upon the outcomes and take the necessary action.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;601&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;599&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;For instance, if&amp;nbsp;the&amp;nbsp;learners&amp;nbsp;felt that the training didn’t make especially good use of their time, find out which areas could be improved to make it more worthwhile and relevant in the future.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;596&quot;&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;If the participants reported that they didn’t feel the training was very practical, take this data into account and make future&amp;nbsp;training&amp;nbsp;more effective.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;593&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;Evaluating&amp;nbsp;training&amp;nbsp;effectiveness&amp;nbsp;to improve&amp;nbsp;training&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;551&quot;&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;This&amp;nbsp;simple&amp;nbsp;four-step approach to evaluating training can help any company or training provider understand the strengths and weaknesses of their training and&amp;nbsp;learn&amp;nbsp;how it can be modified in the future. All training programs and courses can be refined and improved so that they meet stakeholders’ expectations.&amp;nbsp;However, keep in mind&amp;nbsp;that&amp;nbsp;research by Michael Gessler shows&amp;nbsp;now correlation between satisfied participants and the use of learning on the job.&amp;nbsp;If the training is of strategic character or for a high volume of participants&amp;nbsp;(i.e. high cost)&amp;nbsp;we&amp;nbsp;always recommend measuring&amp;nbsp;on&amp;nbsp;at least level 2 and 3&amp;nbsp;as well. O&lt;/span&gt;&lt;span data-dcnode-id=&quot;572&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot;&gt;&lt;span data-dcnode-id=&quot;575&quot;&gt;&lt;span data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot;&gt;&lt;span data-dcnode-id=&quot;578&quot;&gt;&lt;span data-dcnode-id=&quot;579&quot;&gt;&lt;span data-dcnode-id=&quot;580&quot;&gt;&lt;span data-dcnode-id=&quot;581&quot;&gt;&lt;span data-dcnode-id=&quot;582&quot;&gt;&lt;span data-dcnode-id=&quot;583&quot;&gt;&lt;span data-dcnode-id=&quot;584&quot;&gt;&lt;span data-dcnode-id=&quot;585&quot;&gt;&lt;span data-dcnode-id=&quot;586&quot;&gt;&lt;span data-dcnode-id=&quot;587&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot;&gt;&lt;span data-dcnode-id=&quot;589&quot;&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;ur&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;learning analytics&amp;nbsp;tool&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;552&quot;&gt;&lt;span data-dcnode-id=&quot;553&quot;&gt;&lt;span data-dcnode-id=&quot;554&quot;&gt;&lt;span data-dcnode-id=&quot;555&quot;&gt;&lt;span data-dcnode-id=&quot;556&quot;&gt;&lt;span data-dcnode-id=&quot;557&quot;&gt;&lt;span data-dcnode-id=&quot;558&quot;&gt;&lt;span data-dcnode-id=&quot;559&quot;&gt;&lt;span data-dcnode-id=&quot;560&quot;&gt;&lt;span data-dcnode-id=&quot;561&quot;&gt;&lt;span data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot;&gt;&lt;span data-dcnode-id=&quot;564&quot;&gt;&lt;span data-dcnode-id=&quot;565&quot;&gt;&lt;span data-dcnode-id=&quot;566&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot;&gt;&lt;span data-dcnode-id=&quot;568&quot;&gt;&lt;span data-dcnode-id=&quot;569&quot;&gt;&lt;span data-dcnode-id=&quot;570&quot; instrument_node=&quot;&quot;&gt;KodoSurvey&amp;nbsp;automates this for you.&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;548&quot;&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;At the heart of the&amp;nbsp;Kirkpatrick&amp;nbsp;model is the goal of accomplishing a return on&amp;nbsp;stakeholders’&amp;nbsp;expectations,&amp;nbsp;or ROE.&amp;nbsp;If training failed to meet these expectations, you can find out what can be done to improve it in the future.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt;
