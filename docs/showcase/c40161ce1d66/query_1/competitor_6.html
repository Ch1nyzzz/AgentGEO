&lt;/span&gt;&lt;u data-dcnode-id=&quot;333&quot;&gt;&lt;h2 data-dcnode-id=&quot;334&quot;&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;Plan:&lt;/span&gt;&lt;/h2&gt;&lt;/u&gt;&lt;span data-dcnode-id=&quot;332&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;311&quot;&gt;&lt;span data-dcnode-id=&quot;331&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;327&quot;&gt;&lt;strong data-dcnode-id=&quot;329&quot;&gt;&lt;span data-dcnode-id=&quot;330&quot; instrument_node=&quot;&quot;&gt;Role Model Development.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;328&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; Senior leaders set the tone in enabling a culture 
	of development. They are good role models for developing employees, they 
	believe that development is important, and they make development a priority. 
	The best leaders see learning not as an expense, but an investment that 
	returns dividends of a workforce more committed to the organization and more 
	willing to expend their discretionary effort to get the job done. When you 
	stop learning, you stop leading!&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;325&quot;&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;320&quot;&gt;&lt;strong data-dcnode-id=&quot;322&quot;&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;Clearly Communicate Expectations.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; Leaders strategically use communication 
	to produce enthusiasm and foster an atmosphere of open exchange and support. 
	They are adept at energizing people to see pathways that get to goals 
	despite challenging conditions. Leaders establish clear performance 
	expectations and hold people accountable to deliver on their work promises 
	to their team, boss, and stakeholders.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;319&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;318&quot;&gt;&lt;span data-dcnode-id=&quot;317&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;313&quot;&gt;&lt;strong data-dcnode-id=&quot;315&quot;&gt;&lt;span data-dcnode-id=&quot;316&quot; instrument_node=&quot;&quot;&gt;Ensure Work Provides Learning.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; The vast majority of employees seek to 
	learn and grow while performing day-to-day work and crave a learning 
	environment in that context. Many managers lament that time constraints or 
	competing priorities limit the time they devote to employee development. The 
	good news is that great leaders incorporate learning as an essential part of 
	their normal job responsibilities and “blur the line” between learning and 
	work. They create learning environments so that, on each work assignment, 
	they can help employees creatively anticipate and find solutions to specific 
	challenges.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;310&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;309&quot;&gt;&lt;span data-dcnode-id=&quot;308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;u data-dcnode-id=&quot;304&quot;&gt;&lt;span data-dcnode-id=&quot;307&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;305&quot;&gt;&lt;span data-dcnode-id=&quot;306&quot; instrument_node=&quot;&quot;&gt;Execute:&lt;/span&gt;&lt;/h2&gt;&lt;/u&gt;&lt;span data-dcnode-id=&quot;303&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;273&quot;&gt;&lt;span data-dcnode-id=&quot;302&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;298&quot;&gt;&lt;strong data-dcnode-id=&quot;300&quot;&gt;&lt;span data-dcnode-id=&quot;301&quot; instrument_node=&quot;&quot;&gt;Encourage Development.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;299&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; Great leaders know that their most important job 
	is to develop their successors and maintain a legacy of leadership. The 
	leaders who are most effective at developing their successors have employees 
	who are more likely to stay, more satisfied with their job, more committed 
	to the organization, and more productive. Choose those you believe have the 
	values you wish to promulgate and the talent to learn the leadership 
	behaviors you believe are important to the future of your organization and 
	then give them personal developmental attention. Yes, it takes time. 
	However, remember your leadership mission: legacy.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;296&quot;&gt;&lt;span data-dcnode-id=&quot;295&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;291&quot;&gt;&lt;strong data-dcnode-id=&quot;293&quot;&gt;&lt;span data-dcnode-id=&quot;294&quot; instrument_node=&quot;&quot;&gt;Help Apply New Skills/Knowledge.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;292&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; Great leaders provide one-on-one 
	coaching and mentoring opportunities to apply new technical skills or 
	knowledge on regular work or new projects and relate these “teachable 
	moments” back to the overall organizational vision or strategy. The 
	appreciative support of helping others grow contributes to a distributed 
	sense of leadership at all levels. Transformational leaders believe in 
	distributed leadership and are often seen mentoring, coaching, and ensuring 
	the development of others.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;290&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;289&quot;&gt;&lt;span data-dcnode-id=&quot;288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;284&quot;&gt;&lt;strong data-dcnode-id=&quot;286&quot;&gt;&lt;span data-dcnode-id=&quot;287&quot; instrument_node=&quot;&quot;&gt;Relate Interpersonally.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;285&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; Leaders set a vibrant high performance 
	organizational culture through effective interpersonal relations, indicated 
	by real dialogue, lots of input, and transparency. Dialogue implies deeper 
	conversations rather than information handoffs. Dialogue involves 
	demonstrating a true concern for the perspective of others and committing to 
	listening rather than trying to convince. Appreciative exploration gives 
	dialogue its power; people see you care and are willing to invest in hearing 
	them out. When people see that you are committed to them, they will commit 
	to you.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;282&quot;&gt;&lt;span data-dcnode-id=&quot;281&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;277&quot;&gt;&lt;strong data-dcnode-id=&quot;279&quot;&gt;&lt;span data-dcnode-id=&quot;280&quot; instrument_node=&quot;&quot;&gt;Pass Along Job and Development Opportunities.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;278&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; The best leaders use their 
	own experience to give employees advice about emerging trends, political 
	relationships, career development, and yes…job openings and development 
	opportunities. You may grow some folks who will take their capabilities 
	elsewhere based on your recommendations…and you’ve built life-long loyalty 
	not only from them, but also from the rest of your team…they recognize your 
	commitment.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;276&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;275&quot;&gt;&lt;span data-dcnode-id=&quot;274&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;u data-dcnode-id=&quot;269&quot;&gt;&lt;h2 data-dcnode-id=&quot;270&quot;&gt;&lt;span data-dcnode-id=&quot;271&quot; instrument_node=&quot;&quot;&gt;Evaluate:&lt;/span&gt;&lt;/h2&gt;&lt;/u&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;247&quot;&gt;&lt;span data-dcnode-id=&quot;267&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;263&quot;&gt;&lt;strong data-dcnode-id=&quot;265&quot;&gt;&lt;span data-dcnode-id=&quot;266&quot; instrument_node=&quot;&quot;&gt;Become Knowledgeable About Employee Performance.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; Leaders are 
	knowledgeable about their employees’ performance, which builds considerable 
	trust and respect. Most would say that this is a “no-brainer,” yet only 
	30-40 percent of employees report that their managers communicate 
	performance standards and provide fair and accurate feedback to help them do 
	their jobs better.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;262&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;261&quot;&gt;&lt;span data-dcnode-id=&quot;260&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;256&quot;&gt;&lt;strong data-dcnode-id=&quot;258&quot;&gt;&lt;span data-dcnode-id=&quot;259&quot; instrument_node=&quot;&quot;&gt;Provide Voluntary, Detailed, Immediate, and Positive Feedback.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;257&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; Most 
	employees believe that formal performance reviews do not help on-the-job 
	performance, yet they crave feedback, especially on strengths. Most managers 
	view formal performance reviews as an administrative requirement rather than 
	as a powerful lever to positively influence employee performance. Only 35 
	percent of employees rate their manager above average in providing feedback 
	and report that they only provide general, non-specific praise. Great 
	leaders catch their people doing something right and point it out to them in 
	a detailed and timely fashion.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;255&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;254&quot;&gt;&lt;span data-dcnode-id=&quot;253&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;249&quot;&gt;&lt;strong data-dcnode-id=&quot;251&quot;&gt;&lt;span data-dcnode-id=&quot;252&quot; instrument_node=&quot;&quot;&gt;Recognize/Emphasize/Leverage Strengths.&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;250&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; Positive leaders are well known 
	for recognizing, emphasizing, and leveraging strengths and what is working 
	rather than the opposite approach of focusing on weaknesses and what isn’t 
	working. Focusing on success creates positive energy by recognizing and 
	appreciating what is working, which produces greater engagement and momentum 
	for change. That doesn’t mean that you never discuss performance gaps…when 
	you do, focus on specific suggestions for improvement or development related 
	directly to job performance. The number one reason why people thrive in an 
	organization is their immediate manager; unfortunately, it’s also the number 
	one reason they quit.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;248&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;246&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;245&quot;&gt;&lt;span data-dcnode-id=&quot;244&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;u data-dcnode-id=&quot;241&quot;&gt;&lt;h2 data-dcnode-id=&quot;242&quot;&gt;&lt;span data-dcnode-id=&quot;243&quot; instrument_node=&quot;&quot;&gt;Bottom Line:&lt;/span&gt;&lt;/h2&gt;&lt;/u&gt;&lt;span data-dcnode-id=&quot;240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul class=&quot;NoBullet&quot; data-dcnode-id=&quot;235&quot;&gt;&lt;span data-dcnode-id=&quot;239&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;237&quot;&gt;&lt;span data-dcnode-id=&quot;238&quot; instrument_node=&quot;&quot;&gt;Establish a performance management based organizational 
	culture, although not from a command and control perspective, but one that 
	involves a coaching environment and conscious attempts at continuous 
	dialogue within work teams to achieve breakthrough improvements in 
	manager-employee relationships and on-the-job results.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;236&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;234&quot; instrument_node=&quot;&quot;&gt;
