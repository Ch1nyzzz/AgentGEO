&lt;/span&gt;&lt;div class=&quot;faded-content&quot; data-dcnode-id=&quot;3128&quot;&gt;&lt;span data-dcnode-id=&quot;3251&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;3249&quot; id=&quot;section---GoalModel&quot;&gt;&lt;span data-dcnode-id=&quot;3250&quot; instrument_node=&quot;&quot;&gt;Goal Model&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3244&quot;&gt;&lt;span data-dcnode-id=&quot;3248&quot; instrument_node=&quot;&quot;&gt;As its name would imply, the &lt;/span&gt;&lt;b data-dcnode-id=&quot;3246&quot;&gt;&lt;span data-dcnode-id=&quot;3247&quot; instrument_node=&quot;&quot;&gt;goal model&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3245&quot; instrument_node=&quot;&quot;&gt;, also called rational goal model, is focused on the goals of an organization. That is, how well it achieves its goals. Of course, an organization has to have goals in the first place! A health care organization may have the goal of providing the best care. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3242&quot;&gt;&lt;span data-dcnode-id=&quot;3243&quot; instrument_node=&quot;&quot;&gt;Now, goals can be subjective, as in the health care example, which can make measuring difficult. But the goal approach does require that there are steps to measure. In the goal model this is called operationalizing the goal. We could analyze factors such as the number of patients seen, patient satisfaction, or time in the ER. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3240&quot;&gt;&lt;span data-dcnode-id=&quot;3241&quot; instrument_node=&quot;&quot;&gt;The goal approach lets you analyze organizational performance against the organization's stated goals. It also lets you see what is actually being done versus what the organization says it is doing. The goal model is heavily focused on goals and operationalizing goals. Goals need to exist in the first place, and they need to be measurable. This model misses out on external factors and forces that can interfere with those goals. For example, your goal may be to reduce premiums on your company health care, but federal regulations can interfere. &lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3238&quot; id=&quot;section---SystemsResourceModel&quot;&gt;&lt;span data-dcnode-id=&quot;3239&quot; instrument_node=&quot;&quot;&gt;Systems Resource Model&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3233&quot;&gt;&lt;span data-dcnode-id=&quot;3237&quot; instrument_node=&quot;&quot;&gt;Although made of people, an organization is a system. It has inter-working parts (departments, work units, and employees) that all work together. The main organization is the system; the components are subsystems. We use the lens of the &lt;/span&gt;&lt;b data-dcnode-id=&quot;3235&quot;&gt;&lt;span data-dcnode-id=&quot;3236&quot; instrument_node=&quot;&quot;&gt;systems resource model&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3234&quot; instrument_node=&quot;&quot;&gt; with this in mind. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3231&quot;&gt;&lt;span data-dcnode-id=&quot;3232&quot; instrument_node=&quot;&quot;&gt;An organization can maintain itself and adapt itself to the environment around it. In other words, it is not a walled-off city hyper-focused on reaching goals. Instead, we look at organizations' systems and subsystems to measure optimal performance. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3229&quot;&gt;&lt;span data-dcnode-id=&quot;3230&quot; instrument_node=&quot;&quot;&gt;The systems resource model actually takes into account an organization's goals, but only as one criterion for effectiveness. It also looks at the organization as a system impacted by external forces (at least those within managerial control). This model looks at the process taken to achieve a goal: looking at what gets done and how it gets done. A big plus to this model is that it looks at the long-term growth of the organization. Additionally, it looks at all the subsystems that impact the entire system or organization. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3227&quot;&gt;&lt;span data-dcnode-id=&quot;3228&quot; instrument_node=&quot;&quot;&gt;Maximizing resources is great, but it could lead the organization down a narrow, rigid path. If you are hyper-focused on a goal, you may miss out on the bigger picture. Achieving a goal is a treat, but it may not benefit the organization longer term. This model also misses out on external forces that management cannot control: shifts in regulation or demographics can change all your plans! &lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3225&quot; id=&quot;section---ProcessModel&quot;&gt;&lt;span data-dcnode-id=&quot;3226&quot; instrument_node=&quot;&quot;&gt;Process Model&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3220&quot;&gt;&lt;span data-dcnode-id=&quot;3224&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;b data-dcnode-id=&quot;3222&quot;&gt;&lt;span data-dcnode-id=&quot;3223&quot; instrument_node=&quot;&quot;&gt;process model&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3221&quot; instrument_node=&quot;&quot;&gt; ties together the goal and systems approaches. There are three main points to consider as part of the model: &lt;/span&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;3209&quot;&gt;&lt;span data-dcnode-id=&quot;3219&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;3217&quot;&gt;&lt;span data-dcnode-id=&quot;3218&quot; instrument_node=&quot;&quot;&gt;Goal optimization &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3216&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;3214&quot;&gt;&lt;span data-dcnode-id=&quot;3215&quot; instrument_node=&quot;&quot;&gt;Open-systems &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3213&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;3211&quot;&gt;&lt;span data-dcnode-id=&quot;3212&quot; instrument_node=&quot;&quot;&gt;Role of the individual &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3210&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;h3 data-dcnode-id=&quot;3207&quot; id=&quot;section---GoalOptimization&quot;&gt;&lt;span data-dcnode-id=&quot;3208&quot; instrument_node=&quot;&quot;&gt;Goal Optimization&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3202&quot;&gt;&lt;span data-dcnode-id=&quot;3206&quot; instrument_node=&quot;&quot;&gt;This process model draws from the goal model, but has a major distinction. Instead of just achieving goals, they should be optimized. &lt;/span&gt;&lt;b data-dcnode-id=&quot;3204&quot;&gt;&lt;span data-dcnode-id=&quot;3205&quot; instrument_node=&quot;&quot;&gt;Goal optimization&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3203&quot; instrument_node=&quot;&quot;&gt; means that we assess the external pressures, for instance, a new regulation will prevent us from lowering premiums and adjust the goal. &lt;/span&gt;&lt;/p&gt;&lt;h3 data-dcnode-id=&quot;3200&quot; id=&quot;section---OpenSystems&quot;&gt;&lt;span data-dcnode-id=&quot;3201&quot; instrument_node=&quot;&quot;&gt;Open-Systems&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3195&quot;&gt;&lt;span data-dcnode-id=&quot;3199&quot; instrument_node=&quot;&quot;&gt;It's nice to have goals, but there are external factors at work. Recall that the goal approach sometimes doesn't appreciate the power of the external environment to interfere with goal attainment. The key to the process approach is that goal optimization includes the appreciation and assessment of external forces. When we say &lt;/span&gt;&lt;b data-dcnode-id=&quot;3197&quot;&gt;&lt;span data-dcnode-id=&quot;3198&quot; instrument_node=&quot;&quot;&gt;open-system&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3196&quot; instrument_node=&quot;&quot;&gt;, we mean that the organization is part of a broader external environment. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3194&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;hidden&quot; data-dcnode-id=&quot;3130&quot; ng-non-bindable=&quot;&quot;&gt;&lt;h3 data-dcnode-id=&quot;3192&quot; id=&quot;section---RoleOfTheIndividual&quot;&gt;&lt;span data-dcnode-id=&quot;3193&quot; instrument_node=&quot;&quot;&gt;Role of the Individual&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3190&quot;&gt;&lt;span data-dcnode-id=&quot;3191&quot; instrument_node=&quot;&quot;&gt;What about the individual? Isn't an organization made up of humans, too? The process model addresses the role of the individual, including the individual's contributions in the organization and how they internalize organizational goals. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3188&quot;&gt;&lt;span data-dcnode-id=&quot;3189&quot; instrument_node=&quot;&quot;&gt;This model focuses on the process being effective. It takes pieces of the goal and systems model and adds a key ingredient: people. You may have seen a balanced scorecard from a company, which shows progress toward goals. This was born out of the systems model. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3186&quot;&gt;&lt;span data-dcnode-id=&quot;3187&quot; instrument_node=&quot;&quot;&gt;Like the goal model, this model assumes that goals exist and can be measured. And even though it does appreciate external forces, like the systems model, it doesn't address things outside of management's control, like a poor economy, federal laws, etc. Also, there is the danger the organization would focus too much on internal efficiencies and lose sight of the long term, and thus become noncompetitive. &lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3184&quot; id=&quot;section---StrategicConstituenciesModel&quot;&gt;&lt;span data-dcnode-id=&quot;3185&quot; instrument_node=&quot;&quot;&gt;Strategic Constituencies Model&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3182&quot;&gt;&lt;span data-dcnode-id=&quot;3183&quot; instrument_node=&quot;&quot;&gt;As a member of your family, you cannot restrict your interactions to only family members. An organization is the same way: people within (employees and leaders) as well as outside the organization (customers and shareholders) can have influence over it. When using this model, you consider an organization to be effective it if meets the demands of stakeholders. This means inside and out. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3180&quot;&gt;&lt;span data-dcnode-id=&quot;3181&quot; instrument_node=&quot;&quot;&gt;This model lets you see who has the most influence and impact on the organization's success. You realize just how powerful certain groups (internal or external) can be. Power isn't always in the typical areas, but sometimes even lower-level employees wield a great deal of informal power. The strategic constituencies model doesn't address a dynamic environment where preferences change and shift over time. &lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3178&quot; id=&quot;section---CompetingValuesModel&quot;&gt;&lt;span data-dcnode-id=&quot;3179&quot; instrument_node=&quot;&quot;&gt;Competing Values Model&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3173&quot;&gt;&lt;span data-dcnode-id=&quot;3177&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;b data-dcnode-id=&quot;3175&quot;&gt;&lt;span data-dcnode-id=&quot;3176&quot; instrument_node=&quot;&quot;&gt;competing values model&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3174&quot; instrument_node=&quot;&quot;&gt; is actually a more robust framework that incorporates a lot of the analyses we've already discussed. In this model, there are four main sectors: flexibility versus control and internal versus external values. &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3171&quot;&gt;&lt;span data-dcnode-id=&quot;3172&quot; instrument_node=&quot;&quot;&gt;Take a look at the chart which highlights the four areas of the model, including human relations, open systems, internal processes, and rational goals: &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3168&quot;&gt;&lt;br clear=&quot;all&quot; data-dcnode-id=&quot;3170&quot;&gt;&lt;span data-dcnode-id=&quot;3169&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3167&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3166&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3165&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3164&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3159&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3157&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;table border=&quot;0&quot; class=&quot;imageplugin&quot; data-dcnode-id=&quot;3156&quot;&gt;&lt;tbody data-dcnode-id=&quot;3158&quot;&gt;&lt;tr data-dcnode-id=&quot;3160&quot;&gt;&lt;td data-dcnode-id=&quot;3162&quot;&gt;&lt;img alt=&quot;competing values framework&quot; data-dcnode-id=&quot;3163&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//fast.wistia.com/cimages/multimages/16/competing_values.png&amp;amp;raw&quot;&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;p data-dcnode-id=&quot;3155&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3152&quot;&gt;&lt;br clear=&quot;all&quot; data-dcnode-id=&quot;3154&quot;&gt;&lt;span data-dcnode-id=&quot;3153&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3150&quot;&gt;&lt;span data-dcnode-id=&quot;3151&quot; instrument_node=&quot;&quot;&gt;While it seems quite robust and informative like the goal model, this one is missing some important pieces. It offers no real solution. How are things going to get done? The pretty boxes are nice, but what is the output? &lt;/span&gt;&lt;/p&gt;&lt;h2 data-dcnode-id=&quot;3148&quot; id=&quot;section---LessonSummary&quot;&gt;&lt;span data-dcnode-id=&quot;3149&quot; instrument_node=&quot;&quot;&gt;Lesson Summary&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;3131&quot;&gt;&lt;span data-dcnode-id=&quot;3147&quot; instrument_node=&quot;&quot;&gt;We've discussed five models that are used to evaluate the effectiveness of organizations. The &lt;/span&gt;&lt;b data-dcnode-id=&quot;3145&quot;&gt;&lt;span data-dcnode-id=&quot;3146&quot; instrument_node=&quot;&quot;&gt;goal approach&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3144&quot; instrument_node=&quot;&quot;&gt; examines organizational goals and how they are implemented. The &lt;/span&gt;&lt;b data-dcnode-id=&quot;3142&quot;&gt;&lt;span data-dcnode-id=&quot;3143&quot; instrument_node=&quot;&quot;&gt;system resource model&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3141&quot; instrument_node=&quot;&quot;&gt; examines what gets done and how in an organization. The &lt;/span&gt;&lt;b data-dcnode-id=&quot;3139&quot;&gt;&lt;span data-dcnode-id=&quot;3140&quot; instrument_node=&quot;&quot;&gt;process model&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3138&quot; instrument_node=&quot;&quot;&gt; examines external factors and influences. The &lt;/span&gt;&lt;b data-dcnode-id=&quot;3136&quot;&gt;&lt;span data-dcnode-id=&quot;3137&quot; instrument_node=&quot;&quot;&gt;strategic constituencies model&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3135&quot; instrument_node=&quot;&quot;&gt; evaluates the internal and external players that influence an organization. And, the &lt;/span&gt;&lt;b data-dcnode-id=&quot;3133&quot;&gt;&lt;span data-dcnode-id=&quot;3134&quot; instrument_node=&quot;&quot;&gt;competing values model&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3132&quot; instrument_node=&quot;&quot;&gt; is a framework that analyzes flexibility versus control and internal versus external values. Not all models examine external factors or are focused on single areas. However, they are valuable tools for researchers in evaluating the effectiveness of organizations.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3129&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3127&quot; instrument_node=&quot;&quot;&gt;
