&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;4878&quot; id=&quot;reviewTextContainer1683054597&quot;&gt;&lt;span data-dcnode-id=&quot;5000&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4997&quot; id=&quot;freeTextContainer3080323893642717494&quot;&gt;&lt;b data-dcnode-id=&quot;4998&quot;&gt;&lt;span data-dcnode-id=&quot;4999&quot; instrument_node=&quot;&quot;&gt;“[General Joffre] signed the order that would be read to the troops when the bugles blew next morning. Ordinarily the French language, especially in public pronouncements, requires an effort if it is not to sound splendid, but this time the words were flat, almost tired; the message hard and uncompromising: ‘Now, as the battle is joined on which the safety of the country depends, everyone must be reminded that this is no longer the time for looking back. Every effort must be made to attack and t&lt;/span&gt;&lt;/b&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4996&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4883&quot; id=&quot;freeText3080323893642717494&quot; style=&quot;display:none&quot;&gt;&lt;b data-dcnode-id=&quot;4994&quot;&gt;&lt;span data-dcnode-id=&quot;4995&quot; instrument_node=&quot;&quot;&gt;“[General Joffre] signed the order that would be read to the troops when the bugles blew next morning. Ordinarily the French language, especially in public pronouncements, requires an effort if it is not to sound splendid, but this time the words were flat, almost tired; the message hard and uncompromising: ‘Now, as the battle is joined on which the safety of the country depends, everyone must be reminded that this is no longer the time for looking back. Every effort must be made to attack and throw back the enemy. A unit which finds it impossible to advance must, regardless of cost, hold its ground and be killed on the spot rather than fall back. In the present circumstances no failure will be tolerated.’ That was all; the time for splendor was past. It did not shout ‘Forward!’ or summon men to glory. After the first thirty days of war in 1914, there was a premonition that little glory lay ahead…”&lt;/span&gt;&lt;/b&gt;&lt;br data-dcnode-id=&quot;4993&quot;&gt;&lt;span data-dcnode-id=&quot;4992&quot; instrument_node=&quot;&quot;&gt;-	Barbara Tuchman, &lt;/span&gt;&lt;i data-dcnode-id=&quot;4990&quot;&gt;&lt;span data-dcnode-id=&quot;4991&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4989&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;br data-dcnode-id=&quot;4988&quot;&gt;&lt;br data-dcnode-id=&quot;4987&quot;&gt;&lt;span data-dcnode-id=&quot;4986&quot; instrument_node=&quot;&quot;&gt;Let’s start with a couple items. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4985&quot;&gt;&lt;br data-dcnode-id=&quot;4984&quot;&gt;&lt;span data-dcnode-id=&quot;4983&quot; instrument_node=&quot;&quot;&gt;First, there is nothing left to be said about Barbara Tuchman’s &lt;/span&gt;&lt;i data-dcnode-id=&quot;4981&quot;&gt;&lt;span data-dcnode-id=&quot;4982&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4980&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4979&quot;&gt;&lt;br data-dcnode-id=&quot;4978&quot;&gt;&lt;span data-dcnode-id=&quot;4977&quot; instrument_node=&quot;&quot;&gt;Second, that is not going to stop me. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4976&quot;&gt;&lt;br data-dcnode-id=&quot;4975&quot;&gt;&lt;i data-dcnode-id=&quot;4973&quot;&gt;&lt;span data-dcnode-id=&quot;4974&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4972&quot; instrument_node=&quot;&quot;&gt; is not only the most famous book written about World War I, it is one of the most famous history books on any topic whatsoever. It won the Pulitzer, became a bestseller, was name-checked by politicians, and still provides a tidy sum to Tuchman’s heirs and designees. Even today, if you do a general search for “World War I” on Amazon, this is the first thing to pop up, even though it was originally published in 1962. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4971&quot;&gt;&lt;br data-dcnode-id=&quot;4970&quot;&gt;&lt;span data-dcnode-id=&quot;4969&quot; instrument_node=&quot;&quot;&gt;This actually isn’t my first time reading this. Ten years ago, I tore through it during the weekend I was waiting for my bar exam results. A weekend, I hasten to add, with not a little anxiety and cocktail consumption. I’m pretty sure I loved it; I’m also pretty sure it didn't penetrate very far. I decided to read it again as part of my WWI centenary reading project to gauge if my vague, decade-ago recollections were correct. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4968&quot;&gt;&lt;br data-dcnode-id=&quot;4967&quot;&gt;&lt;span data-dcnode-id=&quot;4966&quot; instrument_node=&quot;&quot;&gt;They were. This is an awesome book. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4965&quot;&gt;&lt;br data-dcnode-id=&quot;4964&quot;&gt;&lt;i data-dcnode-id=&quot;4962&quot;&gt;&lt;span data-dcnode-id=&quot;4963&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4961&quot; instrument_node=&quot;&quot;&gt; covers the first month of World War I as fighting erupts on both the Western and Eastern Fronts. Famously, however, Tuchman begins in May 1910 with the sight of nine kings riding in the funeral of King Edward VII of England. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4960&quot;&gt;&lt;br data-dcnode-id=&quot;4959&quot;&gt;&lt;blockquote data-dcnode-id=&quot;4957&quot;&gt;&lt;span data-dcnode-id=&quot;4958&quot; instrument_node=&quot;&quot;&gt;[T]he crowd, waiting in hushed and black-clad awe, could not keep back gasps of admiration. In scarlet and blue and green and purple, three by three the sovereigns rode through the palace gates, with plumed helmets, gold braids, crimson sashes, and jeweled orders flashing in the sun. After them came five heirs apparent, forty more imperial or royal high-nesses, seven queens – four dowager and three regent – and a scattering of special ambassadors from uncrowned countries. Together they represented seventy nations in the greatest assemblage of royalty and rank ever gathered in one place and, of its kind, the last.&lt;/span&gt;&lt;/blockquote&gt;&lt;br data-dcnode-id=&quot;4956&quot;&gt;&lt;br data-dcnode-id=&quot;4955&quot;&gt;&lt;span data-dcnode-id=&quot;4954&quot; instrument_node=&quot;&quot;&gt;Tuchman uses the chapter on King Edward’s funeral to give a brisk overview of the troublesome context that brought Europe to cataclysm in 1914. The next section covers the operational plans and purposes of the four main belligerents: Germany, wedded to the grand sweeping offensive devised by Schlieffen; France, haunted by defeat in the Franco-Prussian War; Great Britain, blessed with a mighty navy and small Regular Army; and Russia, the feared steamroller with legions in numbers like the stars. Each of these nations had engaged a delicate balancing act in which old friends became enemies, old enemies became friends, and all sides seemed simultaneously convinced that war would never come and war had to come. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4953&quot;&gt;&lt;br data-dcnode-id=&quot;4952&quot;&gt;&lt;span data-dcnode-id=&quot;4951&quot; instrument_node=&quot;&quot;&gt;Tuchman’s setup is relatively quick. In well less than 100 pages, she broadly sketches the strategic situation at the time of Archduke Ferdinand’s assassination in Sarajevo. The July Crisis is handled even faster. In a page in a half, Tuchman dispenses with a fraught month over which thousands of gallons of ink have been expended. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4950&quot;&gt;&lt;br data-dcnode-id=&quot;4949&quot;&gt;&lt;span data-dcnode-id=&quot;4948&quot; instrument_node=&quot;&quot;&gt;This brings us to the heart of the book – the events of August 1914. The early days of the month are spent on Great Britain’s decision to uphold both Belgium neutrality and their tacit wink-wink-nudge-nudge “understanding” with France. Once Great Britain made it clear she would not sit on the sidelines, German troops began crossing the border into Belgium, beginning what Moltke called “the struggle that will decide the course of history for the next hundred years.” (Moltke, otherwise a failure, certainly pegged this right). &lt;/span&gt;&lt;br data-dcnode-id=&quot;4947&quot;&gt;&lt;br data-dcnode-id=&quot;4946&quot;&gt;&lt;span data-dcnode-id=&quot;4945&quot; instrument_node=&quot;&quot;&gt;Thus begins the battle section of &lt;/span&gt;&lt;i data-dcnode-id=&quot;4943&quot;&gt;&lt;span data-dcnode-id=&quot;4944&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4942&quot; instrument_node=&quot;&quot;&gt;, which comprises the bulk of the narrative. Tuchman covers the siege of Liege, the French thrust into Alsace, the Battle of the Frontiers, the arrival of the British Expeditionary Force, the invasion of East Prussia by Russia, and the Battle of Tannenberg. When the book ends, the pieces are all in place for the Battle of the Marne, which transformed the conflict from a war of maneuver into a war of trenches, barbed wire, and mechanized slaughter. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4941&quot;&gt;&lt;br data-dcnode-id=&quot;4940&quot;&gt;&lt;span data-dcnode-id=&quot;4939&quot; instrument_node=&quot;&quot;&gt;(You might have noticed the absence of events involving Austria-Hungary or Serbia in that list. For some reason, they are almost entirely left out of the book). &lt;/span&gt;&lt;br data-dcnode-id=&quot;4938&quot;&gt;&lt;br data-dcnode-id=&quot;4937&quot;&gt;&lt;img alt=&quot;description&quot; class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;4936&quot; height=&quot;300&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1470269153i/19908630._SX540_.jpg&amp;amp;raw&quot; width=&quot;400&quot;&gt;&lt;br data-dcnode-id=&quot;4935&quot;&gt;&lt;b data-dcnode-id=&quot;4933&quot;&gt;&lt;span data-dcnode-id=&quot;4934&quot; instrument_node=&quot;&quot;&gt;Belgian troops fighting outside Liege&lt;/span&gt;&lt;/b&gt;&lt;br data-dcnode-id=&quot;4932&quot;&gt;&lt;br data-dcnode-id=&quot;4931&quot;&gt;&lt;span data-dcnode-id=&quot;4930&quot; instrument_node=&quot;&quot;&gt;World War I battles are overwhelming. I’ve found that it’s a rare author who can make them even partly imaginable. Earlier battles – like Waterloo or Gettysburg – took place on comprehendible fields that you can walk to this day. Not so with these titanic clashes. Here, you have fronts of 40 to 80 miles, with armies of upwards of a million men. Often times the recounting of these fights devolve into a confusing Roman numeral soup of Armies, Corps, and Divisions moving hither and yon, crossing rivers and capturing intersections and moving through quaint little villages. Unless you have a very good map sitting next to you, it’s nearly impossible for any but the most devoted to fully grasp all the troop movements. Here, Tuchman makes the wise choice to take a pretty macro view of the battles, usually at the Corps level. Even so, it can be a lot to absorb. Moreover, her choice to look at things with a wide-angle lens means that the proceedings are filtered through the eyes of God and the generals, rather than the more tactile experiences of soldiers. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4929&quot;&gt;&lt;br data-dcnode-id=&quot;4928&quot;&gt;&lt;span data-dcnode-id=&quot;4927&quot; instrument_node=&quot;&quot;&gt; As military history, this might come up a bit short. But in other areas, Tuchman excels. She is excellent at the personalities, bringing a dry, sardonic wit to the characters populating this crowded stage. Take, for instance, her brilliant evocation of General Joseph Joffre, the French Commander-in-Chief: &lt;/span&gt;&lt;br data-dcnode-id=&quot;4926&quot;&gt;&lt;br data-dcnode-id=&quot;4925&quot;&gt;&lt;blockquote data-dcnode-id=&quot;4923&quot;&gt;&lt;span data-dcnode-id=&quot;4924&quot; instrument_node=&quot;&quot;&gt;Every morning at eight o’clock Joffree presided at meetings of the section chiefs, a majestic and immobile arbiter but never the puppet of his entourage as outsiders, misled by his silence and his bare desk, supposed. He kept no papers on his desk and no map on his wall; he wrote nothing and said little. Plans were prepared for him, said Foch; “he weighs them and decides.” There were few who did not tremble in his presence. Anyone who was five minutes late at his mess was treated to a thunderous frown and remained an outcast for the remainder of the meal. Joffre ate in silence with a gourmet’s entire devotion to the food. He complained continuously of being kept in the dark by his staff…He used to rub his forehead, murmuring “Poor Joffre!” which his staff came to recognize as his way of refusing to do something that was being urged upon him. He was angered by anyone who tried too openly to make him change his mind. Like Talleyrand he disapproved of too much zeal.&lt;/span&gt;&lt;/blockquote&gt;&lt;br data-dcnode-id=&quot;4922&quot;&gt;&lt;br data-dcnode-id=&quot;4921&quot;&gt;&lt;img alt=&quot;description&quot; class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;4920&quot; height=&quot;200&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1470269153i/19908631._SX540_.jpg&amp;amp;raw&quot; width=&quot;300&quot;&gt;&lt;br data-dcnode-id=&quot;4919&quot;&gt;&lt;b data-dcnode-id=&quot;4917&quot;&gt;&lt;span data-dcnode-id=&quot;4918&quot; instrument_node=&quot;&quot;&gt;Joffre: Lover of good food and rest. Not to be confused with the evil boy-king of the Seven Kingdoms&lt;/span&gt;&lt;/b&gt;&lt;br data-dcnode-id=&quot;4916&quot;&gt;&lt;br data-dcnode-id=&quot;4915&quot;&gt;&lt;span data-dcnode-id=&quot;4914&quot; instrument_node=&quot;&quot;&gt;Tuchman can be pretty sharp, noting continuously how Joffre never missed a meal or an hour’s sleep. But at the same time, she is sympathetic to the humanity of all involved. She presents a very mechanistic view of the outbreak of war, how dogmas like “the cult of the offensive” and master plans such as Schlieffen’s right wing dictated the early stages. At the same time, she recognizes that these were only plans, and that at any point, someone could have changed them. She also recognizes that many of these men were not capable of that.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4913&quot;&gt;&lt;br data-dcnode-id=&quot;4912&quot;&gt;&lt;span data-dcnode-id=&quot;4911&quot; instrument_node=&quot;&quot;&gt;Tuchman is also the master of the literary set piece. Her opening paragraph, quoted partially above, is Exhibit A in how to hook a reader and deliver a scene. Her handling of the escape of the German battle cruiser &lt;/span&gt;&lt;i data-dcnode-id=&quot;4909&quot;&gt;&lt;span data-dcnode-id=&quot;4910&quot; instrument_node=&quot;&quot;&gt;Goeben&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4908&quot; instrument_node=&quot;&quot;&gt; (an incident Tuchman initially wanted to devote an entire book to) is masterful, and shows how individual decisions can greatly affect the outcome grand events. (The &lt;/span&gt;&lt;i data-dcnode-id=&quot;4906&quot;&gt;&lt;span data-dcnode-id=&quot;4907&quot; instrument_node=&quot;&quot;&gt;Goeben&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4905&quot; instrument_node=&quot;&quot;&gt; and the &lt;/span&gt;&lt;i data-dcnode-id=&quot;4903&quot;&gt;&lt;span data-dcnode-id=&quot;4904&quot; instrument_node=&quot;&quot;&gt;Breslau&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4902&quot; instrument_node=&quot;&quot;&gt; both escaped the Germans by entering the Dardanelles and presenting themselves to the Ottomans as a gift. This helped pull the Ottoman Empire into the war on Germany’s side. What followed – Gallipoli, Sykes-Picot – has ramifications that are still felt today). &lt;/span&gt;&lt;br data-dcnode-id=&quot;4901&quot;&gt;&lt;br data-dcnode-id=&quot;4900&quot;&gt;&lt;img alt=&quot;description&quot; class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;4899&quot; height=&quot;200&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1470269153i/19908632._SX540_.jpg&amp;amp;raw&quot; width=&quot;400&quot;&gt;&lt;br data-dcnode-id=&quot;4898&quot;&gt;&lt;b data-dcnode-id=&quot;4893&quot;&gt;&lt;span data-dcnode-id=&quot;4897&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;i data-dcnode-id=&quot;4895&quot;&gt;&lt;span data-dcnode-id=&quot;4896&quot; instrument_node=&quot;&quot;&gt;Goeben&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4894&quot; instrument_node=&quot;&quot;&gt; sails off into history&lt;/span&gt;&lt;/b&gt;&lt;br data-dcnode-id=&quot;4892&quot;&gt;&lt;br data-dcnode-id=&quot;4891&quot;&gt;&lt;span data-dcnode-id=&quot;4890&quot; instrument_node=&quot;&quot;&gt;For whatever reason, I had it in mind that this was a good WWI starter book. Upon rereading, I don’t think that’s the case. It’s fantastic, but complex enough to require a bit of background reading in order to fully engage it. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4889&quot;&gt;&lt;br data-dcnode-id=&quot;4888&quot;&gt;&lt;span data-dcnode-id=&quot;4887&quot; instrument_node=&quot;&quot;&gt;I could go on, but I’ve already gone on longer than necessary. It’s all been said before. The critics are right. &lt;/span&gt;&lt;i data-dcnode-id=&quot;4885&quot;&gt;&lt;span data-dcnode-id=&quot;4886&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4884&quot; instrument_node=&quot;&quot;&gt; lives up to its lofty reputation.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4882&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;4723&quot; id=&quot;reviewTextContainer591797185&quot;&gt;&lt;span data-dcnode-id=&quot;4784&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4779&quot; id=&quot;freeTextContainer2031748399982034029&quot;&gt;&lt;span data-dcnode-id=&quot;4783&quot; instrument_node=&quot;&quot;&gt;“The Guns of August” is the first book I read about the Great War or, as I knew it, World War One. “The Guns of August” is also the first substantial information I obtained about this war. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4782&quot;&gt;&lt;br data-dcnode-id=&quot;4781&quot;&gt;&lt;span data-dcnode-id=&quot;4780&quot; instrument_node=&quot;&quot;&gt;I was born in Germany, in 1939. My family, then containing of my parents, my biological maternal grandmother, and my adoptive maternal grandmother (my biological grand-aunt), talked very little about WWI, probably because WWII was raging, food as well as all other supplies were scarce, and we were surrounded b&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4778&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4728&quot; id=&quot;freeText2031748399982034029&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;4777&quot; instrument_node=&quot;&quot;&gt;“The Guns of August” is the first book I read about the Great War or, as I knew it, World War One. “The Guns of August” is also the first substantial information I obtained about this war. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4776&quot;&gt;&lt;br data-dcnode-id=&quot;4775&quot;&gt;&lt;span data-dcnode-id=&quot;4774&quot; instrument_node=&quot;&quot;&gt;I was born in Germany, in 1939. My family, then containing of my parents, my biological maternal grandmother, and my adoptive maternal grandmother (my biological grand-aunt), talked very little about WWI, probably because WWII was raging, food as well as all other supplies were scarce, and we were surrounded by Nazis, some of them murderous SS criminals. In other words: My family had plenty of present issues to worry about; WWI was history, snow of yesterday.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4773&quot;&gt;&lt;br data-dcnode-id=&quot;4772&quot;&gt;&lt;span data-dcnode-id=&quot;4771&quot; instrument_node=&quot;&quot;&gt;When I went to school/college, history education stopped before 1900. Teachers shied away from recent history. It was too touchy a subject. I never even saw related books in bookstores or libraries. For these reasons, I was totally ignorant of European 20th century history. Once I joined Goodreads and discovered Amazon, I started to devour non-fiction books about the Third Reich, WWII, and the Holocaust, and I am still not finished reading about this era. Yet when August 2014 arrived, I thought it appropriate to read, at least, one book about WWI. So I read “The Guns of August”.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4770&quot;&gt;&lt;br data-dcnode-id=&quot;4769&quot;&gt;&lt;span data-dcnode-id=&quot;4768&quot; instrument_node=&quot;&quot;&gt;This book had me in shock. My family members had disliked Kaiser Wilhelm II and had mentioned more than once that he had been rather stupid. However, nothing had me prepared for what I read in “The Guns of August”. I had not had a clue that he had been a warmonger with zero regard for human lives. Neither had I had a clue that his chancellor and his generals had not been any better. I had known these prototypes of rigid, narrow-minded Germans (you can still find some today), yet to find a German emperor and the politicians and generals surrounding him not only caricatures of dislikable Germans but also evil warmongers and indifferent about human suffering is something I have not been able to get over, six weeks after finishing reading the book.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4767&quot;&gt;&lt;br data-dcnode-id=&quot;4766&quot;&gt;&lt;span data-dcnode-id=&quot;4765&quot; instrument_node=&quot;&quot;&gt;Yes, most politicians and generals of the other countries who would get involved were not exactly saints either. Yes, the German armies were more functional than the rather dysfunctional French, British, and Russian armies. What more is there to say? I came away with great admiration for the King of Belgium, who seemed to be the only head of state of participating countries who was totally innocent, who cared about human lives, and whose decisions were guided by wisdom and common sense. What utterly surprised me was the incompetence of the French leadership and its lack of organization. Any business owner would go bankrupt in no time being as dysfunctional as the French war machine, not even to speak of the Russians, whose incompetence would have been a joke, had it not cost so many lives. Yet whatever I read, my thoughts returned to Kaiser Wilhelm II and his generals, especially general Moltke. How can anyone plan and start a war with so little reason and with total disregard for human lives? How can anyone send millions of young men to their deaths without a solid cause? — Was Wilhelm II the main culprit? I would say so. And to think that he was not hanged as a war criminal (along with a bunch of his generals), but comfortably retired! This makes my blood boil.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4764&quot;&gt;&lt;br data-dcnode-id=&quot;4763&quot;&gt;&lt;span data-dcnode-id=&quot;4762&quot; instrument_node=&quot;&quot;&gt;I know I should say something about the superb writing style of Barbara Tuchman, her ironic wits, and the thoroughly researched contents of the book. So I’ll try. Yes, the book is superbly written, even though I, occasionally, found it going a bit too much into military details for readers with no military background and I also had trouble with a number of tapeworm sentences which remained unclear to me. (A few more commas would have helped.) This is why I rated the book only 4 stars. It just didn’t make it to the full 5 stars on my scale. Yet if the system allowed for it, I would have given 4 1/2 stars.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4761&quot;&gt;&lt;br data-dcnode-id=&quot;4760&quot;&gt;&lt;span data-dcnode-id=&quot;4759&quot; instrument_node=&quot;&quot;&gt;Oh, I almost forgot: My adoptive grandfather (my biological grand-aunt’s husband) was drafted as a reserve officer, a captain, into the Bavarian army. He fought in the Vosges. He returned uninjured, after the war. I still have two carved walking sticks he brought back from the Vosges as souvenirs. Yet this is all I know about my adoptive grandfather’s engagement in WWI, other than that he and his wife (my grand-aunt) adopted my mother when the war broke out. This was for financial reasons. Had my mother's uncle been killed in the war, my mother, as his adopted daughter, would have received an orphan’s pension. This would have enabled my mother's aunt, had she been widowed, to keep up her lifestyle, which would have meant continuing to employ her sister, my biological grandmother, as her cook and what we would call nowadays “household manager”. (My mother’s biological father had died, at age 42, before the war, while only been engaged to my grandmother. He had been an atheist, and my great-grandmother, a devoted Catholic, had forbidden the marriage.) I do not remember my adopted grandfather. He died in 1940, when I was a baby. I only know him from photographs and from tales of my family members. I was told that he had been a good man, kind and compassionate. So I am sure that he was not the prototype of a German officer, such as those described in &quot;The Guns of August&quot;.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4758&quot;&gt;&lt;br data-dcnode-id=&quot;4757&quot;&gt;&lt;span data-dcnode-id=&quot;4756&quot; instrument_node=&quot;&quot;&gt;I know this is not much of a review, but this is all I could think about when reading this book that shook me in my bones.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4755&quot;&gt;&lt;br data-dcnode-id=&quot;4754&quot;&gt;&lt;span data-dcnode-id=&quot;4753&quot; instrument_node=&quot;&quot;&gt;For more sound accounts of the book, please see the following reviews: &lt;/span&gt;&lt;br data-dcnode-id=&quot;4752&quot;&gt;&lt;br data-dcnode-id=&quot;4751&quot;&gt;&lt;a data-dcnode-id=&quot;4749&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.goodreads.com/review/show/344572442%3Fbook_show_action%3Dfalse%26page%3D1&quot; rel=&quot;noopener nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;4750&quot; instrument_node=&quot;&quot;&gt;https://www.goodreads.com/review/show...&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;4748&quot;&gt;&lt;br data-dcnode-id=&quot;4747&quot;&gt;&lt;a data-dcnode-id=&quot;4745&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.goodreads.com/review/show/599311119%3Fbook_show_action%3Dfalse%26page%3D1&quot; rel=&quot;noopener nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;4746&quot; instrument_node=&quot;&quot;&gt;https://www.goodreads.com/re &lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;4506&quot; id=&quot;reviewTextContainer344572442&quot;&gt;&lt;span data-dcnode-id=&quot;4630&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4611&quot; id=&quot;freeTextContainer15474919219060177421&quot;&gt;&lt;br data-dcnode-id=&quot;4629&quot;&gt;&lt;img class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;4628&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1406925946i/10618809._SX540_.jpg&amp;amp;raw&quot;&gt;&lt;br data-dcnode-id=&quot;4627&quot;&gt;&lt;br data-dcnode-id=&quot;4626&quot;&gt;&lt;br data-dcnode-id=&quot;4625&quot;&gt;&lt;span data-dcnode-id=&quot;4624&quot; instrument_node=&quot;&quot;&gt;On the night of the 13th of August 1961 the Government of East Germany began to build the Wall that divided Berlin isolating its Western part within the Communist Eastern block.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4623&quot;&gt;&lt;br data-dcnode-id=&quot;4622&quot;&gt;&lt;span data-dcnode-id=&quot;4621&quot; instrument_node=&quot;&quot;&gt;In 1962, Barbara Tuchman published her &lt;/span&gt;&lt;b data-dcnode-id=&quot;4619&quot;&gt;&lt;span data-dcnode-id=&quot;4620&quot; instrument_node=&quot;&quot;&gt;Guns of August&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4618&quot; instrument_node=&quot;&quot;&gt; and the following year it was awarded the Pulitzer Prize.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4617&quot;&gt;&lt;br data-dcnode-id=&quot;4616&quot;&gt;&lt;span data-dcnode-id=&quot;4615&quot; instrument_node=&quot;&quot;&gt;As many years separate Tuchman’s book from the events she discusses as years separate us from the time its publication: about half a century.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4614&quot;&gt;&lt;br data-dcnode-id=&quot;4613&quot;&gt;&lt;span data-dcnode-id=&quot;4612&quot; instrument_node=&quot;&quot;&gt;Those two lots of five decades each may explain two different reactions&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4610&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4511&quot; id=&quot;freeText15474919219060177421&quot; style=&quot;display:none&quot;&gt;&lt;br data-dcnode-id=&quot;4609&quot;&gt;&lt;img class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;4608&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1406925946i/10618809._SX540_.jpg&amp;amp;raw&quot;&gt;&lt;br data-dcnode-id=&quot;4607&quot;&gt;&lt;br data-dcnode-id=&quot;4606&quot;&gt;&lt;br data-dcnode-id=&quot;4605&quot;&gt;&lt;span data-dcnode-id=&quot;4604&quot; instrument_node=&quot;&quot;&gt;On the night of the 13th of August 1961 the Government of East Germany began to build the Wall that divided Berlin isolating its Western part within the Communist Eastern block.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4603&quot;&gt;&lt;br data-dcnode-id=&quot;4602&quot;&gt;&lt;span data-dcnode-id=&quot;4601&quot; instrument_node=&quot;&quot;&gt;In 1962, Barbara Tuchman published her &lt;/span&gt;&lt;b data-dcnode-id=&quot;4599&quot;&gt;&lt;span data-dcnode-id=&quot;4600&quot; instrument_node=&quot;&quot;&gt;Guns of August&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4598&quot; instrument_node=&quot;&quot;&gt; and the following year it was awarded the Pulitzer Prize.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4597&quot;&gt;&lt;br data-dcnode-id=&quot;4596&quot;&gt;&lt;span data-dcnode-id=&quot;4595&quot; instrument_node=&quot;&quot;&gt;As many years separate Tuchman’s book from the events she discusses as years separate us from the time its publication: about half a century.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4594&quot;&gt;&lt;br data-dcnode-id=&quot;4593&quot;&gt;&lt;span data-dcnode-id=&quot;4592&quot; instrument_node=&quot;&quot;&gt;Those two lots of five decades each may explain two different reactions. On the one hand Tuchman’s choosing as her premise the accountability of Germany and her (sole?) responsibility for the horror of the war, and on the other hand our wider questioning and possibly a more skeptical reception of her views. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4591&quot;&gt;&lt;br data-dcnode-id=&quot;4590&quot;&gt;&lt;span data-dcnode-id=&quot;4589&quot; instrument_node=&quot;&quot;&gt;The stereotypical view of the Germans as supremely efficient and dangerously single-minded is well alive in Tuchman’s interpretation when she wrote her account during the Cold War. This coined idea is still alive but in a different mode. Currently it induces us to think that thank god we have Merkel (originally from the communist Germany) to steer Europe democratically through its (capitalistic) mess, and alleviates us when having to accept Germany winning the World Cup for the fourth time this year. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4588&quot;&gt;&lt;br data-dcnode-id=&quot;4587&quot;&gt;&lt;span data-dcnode-id=&quot;4586&quot; instrument_node=&quot;&quot;&gt;Our understanding of that war has also moved away from focusing on one-sided culpabilities.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4585&quot;&gt;&lt;br data-dcnode-id=&quot;4584&quot;&gt;&lt;span data-dcnode-id=&quot;4583&quot; instrument_node=&quot;&quot;&gt;Tuchman begins her book with the stages that led to the outbreak of the war concentrating on the four great powers only: UK, Germany, France and Russia. Even Austria and the Balkan troublesome maze are just perfunctorily mentioned. For a broader look at the geographic extension of the conflict we have to look elsewhere. The bulk of her history is what the title says, the combat that took place at the very beginning of the war, starting with the last week of July and ending with the first of September of 1914.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4582&quot;&gt;&lt;br data-dcnode-id=&quot;4581&quot;&gt;&lt;img class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;4580&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1406925738i/10618789._SX540_.png&amp;amp;raw&quot;&gt;&lt;br data-dcnode-id=&quot;4579&quot;&gt;&lt;br data-dcnode-id=&quot;4578&quot;&gt;&lt;br data-dcnode-id=&quot;4577&quot;&gt;&lt;span data-dcnode-id=&quot;4576&quot; instrument_node=&quot;&quot;&gt;In that she does an excellent job. She dissects the period spelling out the accumulation of decisions, many mistaken, which clumsily succeeded each other during those dreadful days. She focuses on three arenas: the Eastern and Western Fronts, and the Mediterranean. After explaining very well two of the major military strategies, the &lt;/span&gt;&lt;b data-dcnode-id=&quot;4574&quot;&gt;&lt;span data-dcnode-id=&quot;4575&quot; instrument_node=&quot;&quot;&gt;Schlieffen Plan&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4573&quot; instrument_node=&quot;&quot;&gt; for both the Eastern and Western fronts and the &lt;/span&gt;&lt;b data-dcnode-id=&quot;4571&quot;&gt;&lt;span data-dcnode-id=&quot;4572&quot; instrument_node=&quot;&quot;&gt;Plan XVII&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4570&quot; instrument_node=&quot;&quot;&gt;--with all their quirks and twists as well as the aberrations in the personalities of those who designed them--, she proceeds to show how they failed. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4569&quot;&gt;&lt;br data-dcnode-id=&quot;4568&quot;&gt;&lt;img class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;4567&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1406925117i/10618686._SX540_.jpg&amp;amp;raw&quot;&gt;&lt;br data-dcnode-id=&quot;4566&quot;&gt;&lt;br data-dcnode-id=&quot;4565&quot;&gt;&lt;br data-dcnode-id=&quot;4564&quot;&gt;&lt;span data-dcnode-id=&quot;4563&quot; instrument_node=&quot;&quot;&gt;Her chapters on the invasion of Belgium and northern France are unforgettable. The brutality of the German armies in the way they treated the civilians and the cities, leaving in our memories the unforgivable destruction of Louvain and its treasures, as well as the emblematic Reims cathedral in ruins, is the strongest support she could use for postulating Germany as the nation responsible for the war.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4562&quot;&gt;&lt;br data-dcnode-id=&quot;4561&quot;&gt;&lt;br data-dcnode-id=&quot;4560&quot;&gt;&lt;img class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;4559&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1406925117i/10618687._SX540_.jpg&amp;amp;raw&quot;&gt;&lt;br data-dcnode-id=&quot;4558&quot;&gt;&lt;br data-dcnode-id=&quot;4557&quot;&gt;&lt;br data-dcnode-id=&quot;4556&quot;&gt;&lt;span data-dcnode-id=&quot;4555&quot; instrument_node=&quot;&quot;&gt;She devotes less attention to the Eastern front. She focuses on what has been called the &lt;/span&gt;&lt;b data-dcnode-id=&quot;4553&quot;&gt;&lt;span data-dcnode-id=&quot;4554&quot; instrument_node=&quot;&quot;&gt;Battle of Tannenberg &lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4552&quot; instrument_node=&quot;&quot;&gt;, and in her account it serves mostly to prove how the Schlieffen plan had a faulty design. To support the Eastern front the Western was too quickly weakened.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4551&quot;&gt;&lt;br data-dcnode-id=&quot;4550&quot;&gt;&lt;span data-dcnode-id=&quot;4549&quot; instrument_node=&quot;&quot;&gt;She closes in with the &lt;/span&gt;&lt;b data-dcnode-id=&quot;4547&quot;&gt;&lt;span data-dcnode-id=&quot;4548&quot; instrument_node=&quot;&quot;&gt;Battle of Marne&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4546&quot; instrument_node=&quot;&quot;&gt; and she again proves to be an engaging narrator. Building up tension with the approach to Paris she provides a felicitous ending to that episode with the striking story of the heroic taxi drivers transferring the men to the front.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4545&quot;&gt;&lt;br data-dcnode-id=&quot;4544&quot;&gt;&lt;span data-dcnode-id=&quot;4543&quot; instrument_node=&quot;&quot;&gt;The section I found most instructive was the one devoted to the Mediterranean. She creates great suspense in the way she narrates the persecution of the German battle cruiser &lt;/span&gt;&lt;b data-dcnode-id=&quot;4541&quot;&gt;&lt;span data-dcnode-id=&quot;4542&quot; instrument_node=&quot;&quot;&gt;Goeben&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4540&quot; instrument_node=&quot;&quot;&gt; by the various ships of the Allies. The British blundered; they did not realize the direction the Goeben was pursuing until it was too late. When the German cruiser succeeded in its race and reached the Dardanelles, this prompted the Ottoman Empire, until then neutral, to side with the Central Powers. The result was that Russia was cut-off from her access to the Mediterranean ports and her trade was blocked. Her exports/imports dropped by 98/95% respectively paving the way for the continuing growth of domestic troubles until three years later their revolution exploded.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4539&quot;&gt;&lt;br data-dcnode-id=&quot;4538&quot;&gt;&lt;br data-dcnode-id=&quot;4537&quot;&gt;&lt;img class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;4536&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1406925117i/10618688._SX540_.jpg&amp;amp;raw&quot;&gt;&lt;br data-dcnode-id=&quot;4535&quot;&gt;&lt;br data-dcnode-id=&quot;4534&quot;&gt;&lt;br data-dcnode-id=&quot;4533&quot;&gt;&lt;span data-dcnode-id=&quot;4532&quot; instrument_node=&quot;&quot;&gt;This episode has an additional interest. In its chapter one can read:&lt;/span&gt;&lt;br data-dcnode-id=&quot;4531&quot;&gt;&lt;br data-dcnode-id=&quot;4530&quot;&gt;&lt;blockquote data-dcnode-id=&quot;4525&quot;&gt;&lt;span data-dcnode-id=&quot;4529&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;i data-dcnode-id=&quot;4527&quot;&gt;&lt;span data-dcnode-id=&quot;4528&quot; instrument_node=&quot;&quot;&gt;That morning there arrived at Constantinople the small Italian passenger steamer which had witnessed the Gloucester’s action against the Goeben and Breslau. Among its passengers were the daughter, son-in-law and three grandchildren of the American ambassador Mr. Henry Morgenthau. &lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4526&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;br data-dcnode-id=&quot;4524&quot;&gt;&lt;br data-dcnode-id=&quot;4523&quot;&gt;&lt;span data-dcnode-id=&quot;4522&quot; instrument_node=&quot;&quot;&gt;One of those three children was Barbara Wertheim (later Tuchman).&lt;/span&gt;&lt;br data-dcnode-id=&quot;4521&quot;&gt;&lt;br data-dcnode-id=&quot;4520&quot;&gt;&lt;br data-dcnode-id=&quot;4519&quot;&gt;&lt;span data-dcnode-id=&quot;4518&quot; instrument_node=&quot;&quot;&gt;Apart from the Pulitzer this book is exceptional because it played a determinant role. &lt;/span&gt;&lt;a data-dcnode-id=&quot;4516&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.goodreads.com/author/show/6366.Margaret_MacMillan&quot; rel=&quot;nofollow noopener&quot; title=&quot;Margaret MacMillan&quot;&gt;&lt;span data-dcnode-id=&quot;4517&quot; instrument_node=&quot;&quot;&gt;Margaret MacMillan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4515&quot; instrument_node=&quot;&quot;&gt; has underlined in one of her recent interviews that John F. Kennedy read it during the time when he had to deal with the Cuban missile crisis, and it made him much more aware of the difficulty of controlling when the unexpected happens, so that he made everyone else in his Cabinet and his top military leaders read the book.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4514&quot;&gt;&lt;br data-dcnode-id=&quot;4513&quot;&gt;&lt;span data-dcnode-id=&quot;4512&quot; instrument_node=&quot;&quot;&gt;Tuchman’s tendency to rely too much on national stereotypes, which detracts from the credibility of her research and interpretation, is thereby compensated by the role her analysis played in later events. And to use another cliché, books that do change people’s lives, have to have their own special place in our libraries. &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4510&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;4408&quot; id=&quot;reviewTextContainer55273967&quot;&gt;&lt;span data-dcnode-id=&quot;4422&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4420&quot; id=&quot;freeTextContainer6608058726271690409&quot;&gt;&lt;span data-dcnode-id=&quot;4421&quot; instrument_node=&quot;&quot;&gt;Well, how d'you do, Private Willie McBride, First Class - do you mind if I sit down down here by your graveside? It's so nice to rest for awhile in the warm summer sun... I've been walking all day and I'm nearly done in. Well. So, Willie - I see by your gravestone you were only nineteen when you joined the glorious fallen. 1916 - a long time ago now. Well I hope you died quick and I hope you died clean. But Private Willie McBride, it could have been slow and obscene. Let's not think of that. And&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4419&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4413&quot; id=&quot;freeText6608058726271690409&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;4418&quot; instrument_node=&quot;&quot;&gt;Well, how d'you do, Private Willie McBride, First Class - do you mind if I sit down down here by your graveside? It's so nice to rest for awhile in the warm summer sun... I've been walking all day and I'm nearly done in. Well. So, Willie - I see by your gravestone you were only nineteen when you joined the glorious fallen. 1916 - a long time ago now. Well I hope you died quick and I hope you died clean. But Private Willie McBride, it could have been slow and obscene. Let's not think of that. And did you leave a wife or a sweetheart behind? In some faithful heart is your memory enshrined? And, though you died back in 1916, to that loyal heart you'd be forever nineteen. Or some bollocks like that. That's what they say, isn't it. Sorry to have to tell you but you're probably a stranger, without even a name, peering out from some forgotten glass pane, in an old photograph, in a drawer, torn and tattered and stained, or fading to yellow in a brown leather frame. Well, take a look around now. It's a beautiful day. The sun's shining down on these green fields of France. Feel that, Willie? No, I suppose you don't. The warm wind blows gently, and look, the red poppies are dancing just like they're supposed to. The trenches have all gone, all ploughed under. It's a lovely place now. There's no gas and no barbed wire, no guns firing now. But I suppose here in this graveyard it's still No Man's Land - see how many white crosses there are - well, I couldn't count them all. But at least you're not alone, Willie, eh? There was umpteen thousands like you. But you know I can't help but wonder now, Private Willie McBride, First Class - do all those who lie here know why they died? I mean, did you really believe that your war would end wars? Because that's what they said. You'll remember that. Because, you know, the suffering, the sorrow, the glory, the shame, the killing, the dying, it was all done in vain, Willie. It all happened again. And again, and again, and again, and again. Anyway, that's enough from me. I'll bid you good day. I've got another five miles to go. Thanks for your time.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4417&quot;&gt;&lt;br data-dcnode-id=&quot;4416&quot;&gt;&lt;br data-dcnode-id=&quot;4415&quot;&gt;&lt;span data-dcnode-id=&quot;4414&quot; instrument_node=&quot;&quot;&gt;(with many apologies to Eric Bogle and his great song The Green Fields of France)&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4412&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;4313&quot; id=&quot;freeTextContainer9155971505757512611&quot;&gt;&lt;span data-dcnode-id=&quot;4317&quot; instrument_node=&quot;&quot;&gt;You could almost be excused for thinking that the highest praise one could give a work of non-fiction would be that it reads like a work of fiction. I haven’t looked at any of the other reviews for this book yet, but I would be prepared to bet that many of them say this read like a novel. And it is an incredibly dramatic story and some of the characters are larger than life – but this is no novel.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4316&quot;&gt;&lt;br data-dcnode-id=&quot;4315&quot;&gt;&lt;span data-dcnode-id=&quot;4314&quot; instrument_node=&quot;&quot;&gt;I say that because in a novel you expect at least some of the characters to develop during it – and &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4282&quot; id=&quot;freeText9155971505757512611&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;4311&quot; instrument_node=&quot;&quot;&gt;You could almost be excused for thinking that the highest praise one could give a work of non-fiction would be that it reads like a work of fiction. I haven’t looked at any of the other reviews for this book yet, but I would be prepared to bet that many of them say this read like a novel. And it is an incredibly dramatic story and some of the characters are larger than life – but this is no novel.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4310&quot;&gt;&lt;br data-dcnode-id=&quot;4309&quot;&gt;&lt;span data-dcnode-id=&quot;4308&quot; instrument_node=&quot;&quot;&gt;I say that because in a novel you expect at least some of the characters to develop during it – and the horrible thing about this story is how few of the characters learnt a bloody thing. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4307&quot;&gt;&lt;br data-dcnode-id=&quot;4306&quot;&gt;&lt;span data-dcnode-id=&quot;4305&quot; instrument_node=&quot;&quot;&gt;As a case in point. It might sound like I’m anti-French, I know, but I can’t help it. All of the countries were stupid, but the French were absurd, and that is something else. I’ve been telling people about this book and these have been the things I have been telling them. A Frenchman goes over to watch the Japanese beat the Russians in a war that was held just before the First World War, a mere decade before the date this book is set. What did he notice in his watching? He noticed that it is generally not a good idea to charge against people with machine guns. After, when he mentioned this to other French generals they decided that he was a coward. He said that wearing a uniform that featured a bright blue coat and bright red trousers might be the equivalent of wearing a bull’s eye tied around your neck and a neon sign saying ‘shoot here’. His saying this was considered not only utterly outrageous but also an insult to French soldiers. When there was a suggestion that the French should use BIG guns, the commanders in charge of infantry rejected the suggestion as big cannons would only ‘slow them down’.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4304&quot;&gt;&lt;br data-dcnode-id=&quot;4303&quot;&gt;&lt;span data-dcnode-id=&quot;4302&quot; instrument_node=&quot;&quot;&gt;The lesson is that you can change the technology, but people might not understand what that change will mean. In fact, they probably won’t. They may still want to charge in front of machine guns wearing red trousers and showing the world how ‘brave’ they are. Or they might assume that the new communications technology that worked so well in training will work just as well in the chaos of war. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4301&quot;&gt;&lt;br data-dcnode-id=&quot;4300&quot;&gt;&lt;span data-dcnode-id=&quot;4299&quot; instrument_node=&quot;&quot;&gt;This is a book about a world that has just changed forever and how hard it was for people to realise just what changes had been wrought. It is about how fixed people are in their views, particularly when those views are based on ‘plans’ that have been worked out in detail for years. It is about how hard it is to admit you are wrong, even when all evidence is pointing to the fact. It is about how sometimes people will (effectively) choose death rather than admit they made a mistake.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4298&quot;&gt;&lt;br data-dcnode-id=&quot;4297&quot;&gt;&lt;span data-dcnode-id=&quot;4296&quot; instrument_node=&quot;&quot;&gt;There is a horrible sense in which this book will help to confirm all of your worst fears about humanity. World War One was the opening nightmare of our modern world. And this book looks at the first month of the war, how that month raced towards war and nearly rushed towards the fall of Paris, and left me despairing for humanity.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4295&quot;&gt;&lt;br data-dcnode-id=&quot;4294&quot;&gt;&lt;span data-dcnode-id=&quot;4293&quot; instrument_node=&quot;&quot;&gt;I couldn’t get over how many generals were supporters of Nietzsche and his views on the ‘will to power’. The idea that a great man will use his will-power to create a world in his image. That it does not matter how many enemies you face, that all it takes is courage to prevail. And when their armies were beaten back by superior fire power, larger armies and crippled by there being no supplies these same generals put it all down to their soldiers’ lack of courage or lack of will.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4292&quot;&gt;&lt;br data-dcnode-id=&quot;4291&quot;&gt;&lt;span data-dcnode-id=&quot;4290&quot; instrument_node=&quot;&quot;&gt;All I knew about the start of the war before reading this book was that some Prince got killed in the Balkans, Austria and Germany had a pact that meant if one was attacked the other would have to fight with them – Russia, France and England were in much the same situation. The world started fighting, soldiers dug tranches and everything stayed like that until they called it quits. Oh, and lots and lots of people died.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4289&quot;&gt;&lt;br data-dcnode-id=&quot;4288&quot;&gt;&lt;span data-dcnode-id=&quot;4287&quot; instrument_node=&quot;&quot;&gt;I had no idea how close Germany came to winning the war against France in that first month. This really is a gripping story, but it is still not a novel. In fact, I kept thinking that this would make a much better film than a novel. And it would make an amazing film. The conversations between members of parliament and generals and kings are invariably remarkable. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4286&quot;&gt;&lt;br data-dcnode-id=&quot;4285&quot;&gt;&lt;span data-dcnode-id=&quot;4284&quot; instrument_node=&quot;&quot;&gt;This is well worth getting your hands on. Thanks to Richard for recommending it to me.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4283&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4281&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;4141&quot; id=&quot;reviewTextContainer266239278&quot;&gt;&lt;span data-dcnode-id=&quot;4184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4170&quot; id=&quot;freeTextContainer3749972330388498068&quot;&gt;&lt;span data-dcnode-id=&quot;4183&quot; instrument_node=&quot;&quot;&gt;This is an impressive work on the buildup to World War I and the first month of fighting. I wanted to read this book after a re-read of &lt;/span&gt;&lt;i data-dcnode-id=&quot;4181&quot;&gt;&lt;span data-dcnode-id=&quot;4182&quot; instrument_node=&quot;&quot;&gt;All Quiet on the Western Front&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4180&quot; instrument_node=&quot;&quot;&gt;, to better understand the war. I've heard &lt;/span&gt;&lt;i data-dcnode-id=&quot;4178&quot;&gt;&lt;span data-dcnode-id=&quot;4179&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4177&quot; instrument_node=&quot;&quot;&gt; described as one of the best books about WWI ever written, and while I haven't read enough to testify to that, I do think it was an interesting and insightful work, and I'd recommend it to history buffs.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4176&quot;&gt;&lt;br data-dcnode-id=&quot;4175&quot;&gt;&lt;span data-dcnode-id=&quot;4174&quot; instrument_node=&quot;&quot;&gt;I listened to &lt;/span&gt;&lt;i data-dcnode-id=&quot;4172&quot;&gt;&lt;span data-dcnode-id=&quot;4173&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4171&quot; instrument_node=&quot;&quot;&gt; on audio, and I enjoyed the narratio&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4169&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4146&quot; id=&quot;freeText3749972330388498068&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;4168&quot; instrument_node=&quot;&quot;&gt;This is an impressive work on the buildup to World War I and the first month of fighting. I wanted to read this book after a re-read of &lt;/span&gt;&lt;i data-dcnode-id=&quot;4166&quot;&gt;&lt;span data-dcnode-id=&quot;4167&quot; instrument_node=&quot;&quot;&gt;All Quiet on the Western Front&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4165&quot; instrument_node=&quot;&quot;&gt;, to better understand the war. I've heard &lt;/span&gt;&lt;i data-dcnode-id=&quot;4163&quot;&gt;&lt;span data-dcnode-id=&quot;4164&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4162&quot; instrument_node=&quot;&quot;&gt; described as one of the best books about WWI ever written, and while I haven't read enough to testify to that, I do think it was an interesting and insightful work, and I'd recommend it to history buffs.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4161&quot;&gt;&lt;br data-dcnode-id=&quot;4160&quot;&gt;&lt;span data-dcnode-id=&quot;4159&quot; instrument_node=&quot;&quot;&gt;I listened to &lt;/span&gt;&lt;i data-dcnode-id=&quot;4157&quot;&gt;&lt;span data-dcnode-id=&quot;4158&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4156&quot; instrument_node=&quot;&quot;&gt; on audio, and I enjoyed the narration by Nadia May. My one frustration with this book is that Tuchman had so many countries to cover -- the French, Germans, British, Russians and even Belgians were included -- that sometimes Tuchman would be relating a long story, and by the end I'd be confused about which government she had been talking about. This problem probably would have been eased had I been reading in print, where it's easier to flip back a few pages and be reminded about the context. Frequently I had to hit rewind to try and catch up with the narrative.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4155&quot;&gt;&lt;br data-dcnode-id=&quot;4154&quot;&gt;&lt;span data-dcnode-id=&quot;4153&quot; instrument_node=&quot;&quot;&gt;Overall, I enjoyed learning more about the first world war, and especially the events that led up to it. One of my big takeaways was how gung ho Germany was to invade France, and they had elaborate (and unrealistic) plans about how quickly they could win such a war, despite warnings to the contrary. In hindsight, the world seemed destined to fight this war, because not even common sense was able to stop it.&lt;/span&gt;&lt;br data-dcnode-id=&quot;4152&quot;&gt;&lt;br data-dcnode-id=&quot;4151&quot;&gt;&lt;b data-dcnode-id=&quot;4149&quot;&gt;&lt;span data-dcnode-id=&quot;4150&quot; instrument_node=&quot;&quot;&gt;Favorite Quote&lt;/span&gt;&lt;/b&gt;&lt;br data-dcnode-id=&quot;4148&quot;&gt;&lt;span data-dcnode-id=&quot;4147&quot; instrument_node=&quot;&quot;&gt;&quot;In Whitehall that evening, Sir Edward Grey, standing with a friend at the window as the street lamps below were being lit, made the remark that has since epitomized the hour: 'The lamps are going out all over Europe; we shall not see them lit again in our lifetime.'&quot;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4145&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;4052&quot; id=&quot;freeText18424491740676273803&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;4059&quot; instrument_node=&quot;&quot;&gt;I let go at around page 280 (out of 440 in my edition), when I started realizing that every paragraph is so chunked up with minute details about this general moving these troops out of this place and into this wing on this day because of these emotions and this miscommunication and this people's overconfidence that it just all became so trivial and so unbelievably lifeless--which in a weird way completely contradicts all of the GR reviews I've read about how this book brings life to the first month of the war. I also think the writing just slowly, gradually became less and less vigorous and more rote as the war left its initial stages and moved to the actual fighting of month 1. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4058&quot;&gt;&lt;br data-dcnode-id=&quot;4057&quot;&gt;&lt;span data-dcnode-id=&quot;4056&quot; instrument_node=&quot;&quot;&gt;I realized I didn't want to finish this book when it struck me that it's all just pointless military maneuvers, some of them more successful than others, almost all of them led by a bunch of overconfident idiots, and that I had nothing to gain from learning about these dumb poops and their meaningless military decisions. &lt;/span&gt;&lt;br data-dcnode-id=&quot;4055&quot;&gt;&lt;br data-dcnode-id=&quot;4054&quot;&gt;&lt;span data-dcnode-id=&quot;4053&quot; instrument_node=&quot;&quot;&gt;I actually really liked the first part of the book, and liked the second part. It was the third part, &quot;Battle&quot;, that just gutted me with its unbelievable tediousness. And I hate giving up on books, but there are only so many free seconds in my life to dedicate to things I don't enjoy. &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4051&quot; instrument_node=&quot;&quot;&gt;
