&lt;/span&gt;&lt;span data-dcnode-id=&quot;3932&quot; id=&quot;freeTextContainer6376588503831814970&quot;&gt;&lt;span data-dcnode-id=&quot;3952&quot; instrument_node=&quot;&quot;&gt;Perhaps you can forgive me for saying so &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3950&quot;&gt;&lt;span data-dcnode-id=&quot;3951&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3945&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3949&quot; instrument_node=&quot;&quot;&gt;[ or perhaps not &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3947&quot;&gt;&lt;span data-dcnode-id=&quot;3948&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3946&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3944&quot; instrument_node=&quot;&quot;&gt; but on the one hand I feel conflicted about this book about the First World War, every opinion, it seems to me, from five star to throw the damned thing on the fire and never speak of it to me again, is entirely justifiable. On the other hand I am unconflicted, its strengths are its weaknesses &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3942&quot;&gt;&lt;span data-dcnode-id=&quot;3943&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3937&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3941&quot; instrument_node=&quot;&quot;&gt;[ or possibly the other way round &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3939&quot;&gt;&lt;span data-dcnode-id=&quot;3940&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3938&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3936&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3935&quot;&gt;&lt;br data-dcnode-id=&quot;3934&quot;&gt;&lt;span data-dcnode-id=&quot;3933&quot; instrument_node=&quot;&quot;&gt;This book to my mind is not popular history, because &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3780&quot; id=&quot;freeText6376588503831814970&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;3930&quot; instrument_node=&quot;&quot;&gt;Perhaps you can forgive me for saying so &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3928&quot;&gt;&lt;span data-dcnode-id=&quot;3929&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3923&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3927&quot; instrument_node=&quot;&quot;&gt;[ or perhaps not &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3925&quot;&gt;&lt;span data-dcnode-id=&quot;3926&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3924&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3922&quot; instrument_node=&quot;&quot;&gt; but on the one hand I feel conflicted about this book about the First World War, every opinion, it seems to me, from five star to throw the damned thing on the fire and never speak of it to me again, is entirely justifiable. On the other hand I am unconflicted, its strengths are its weaknesses &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3920&quot;&gt;&lt;span data-dcnode-id=&quot;3921&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3915&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3919&quot; instrument_node=&quot;&quot;&gt;[ or possibly the other way round &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3917&quot;&gt;&lt;span data-dcnode-id=&quot;3918&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3916&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3914&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3913&quot;&gt;&lt;br data-dcnode-id=&quot;3912&quot;&gt;&lt;span data-dcnode-id=&quot;3911&quot; instrument_node=&quot;&quot;&gt;This book to my mind is not popular history, because it is not history at all, it is more in the way of a painting, designed for a certain occasion and to be seen from a certain distance and in a certain light. Standing at the right place when the right light falls on it, its broad brush strokes and bright colours work perfectly, however if you stand just to the left or the right or if the light does not fall just so, then, well, you are looking at a mess.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3910&quot;&gt;&lt;br data-dcnode-id=&quot;3909&quot;&gt;&lt;span data-dcnode-id=&quot;3908&quot; instrument_node=&quot;&quot;&gt;Tuchman's book is not history it is entertainment. Judging it as history is akin to watching a Western and complaining about the tactics of the plains Indians or doubting the veracity of the timing of the arrival of the 7th cavalry. The point is that it is a spectacle displaying wonders of horse riding and sharp shooting, the apparent historicity of the setting and one or two of the characters is neither here nor there.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3907&quot;&gt;&lt;br data-dcnode-id=&quot;3906&quot;&gt;&lt;span data-dcnode-id=&quot;3905&quot; instrument_node=&quot;&quot;&gt;Those who praise and like this book for being like a novel are quite right, Tuchman, I feel, borrows strongly from the techniques of fiction, perhaps more specifically from pantomime, or maybe the Western. Therefore in this story the Germans are the black hatted, moustache twirling villains, to the extent that anything German is bad from Fichte onwards (p.26)&lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3903&quot;&gt;&lt;span data-dcnode-id=&quot;3904&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3898&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3902&quot; instrument_node=&quot;&quot;&gt;[but Goethe and Leopold van Ranke are good, so the precise boundary between German goodness and wickedness is unclear, but by 1914, at least, they are all apparently rotten to the core &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3900&quot;&gt;&lt;span data-dcnode-id=&quot;3901&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3899&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3897&quot; instrument_node=&quot;&quot;&gt; German singing is especially brutal in her opinion, born and brought up in Britain I was of the innocent impression that all soldiers during the First World War sang marching songs, but according to Tuchman those sung by Germans were horrific and the worst aspect of the WWI battlefield &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3895&quot;&gt;&lt;span data-dcnode-id=&quot;3896&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3890&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3894&quot; instrument_node=&quot;&quot;&gt;[ I imagined her running out of concert halls with her fingers in her ears, if by accident she found herself at a performance of Beethoven's 9th when the fourth movement began &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3892&quot;&gt;&lt;span data-dcnode-id=&quot;3893&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3891&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3889&quot; instrument_node=&quot;&quot;&gt;. German badness is further demonstrated by her because all German soldiers were issued with a flask of whisky as part of their kit, leaving to one side the inherent unlikeliness of German soldiers being issued with whisky, I don't think that issuing soldiers with spirits was unusual during WWI.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3888&quot;&gt;&lt;br data-dcnode-id=&quot;3887&quot;&gt;&lt;span data-dcnode-id=&quot;3886&quot; instrument_node=&quot;&quot;&gt;The French although among the white hats, are presented as dunghill cockerels, magnificently colourful, but a bit ridiculous, particularly because they take themselves and their &lt;/span&gt;&lt;i data-dcnode-id=&quot;3884&quot;&gt;&lt;span data-dcnode-id=&quot;3885&quot; instrument_node=&quot;&quot;&gt;Elan&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3883&quot; instrument_node=&quot;&quot;&gt; so seriously, the British, or English as she generally calls them, fail to realise that earlier decisions have consequences and are fantastically divided among themselves, with most if not all of the generals plotting against each other - but Churchill, perhaps inevitability, can do no wrong in her eyes. The Belgians are respectfully treated. King Albert in particular seems to have been a cross between sliced bread and Jesus Christ, a better person, who was not American, cannot be conceived of. The Russians in her account are a joke, purely there for grim comedy value. The Turks are dismissed in much the same way. The implication is that this First World War is going to be an incompetent mess until the USA gets involved and starts sorting out the World's problems &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3881&quot;&gt;&lt;span data-dcnode-id=&quot;3882&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3876&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3880&quot; instrument_node=&quot;&quot;&gt;[ which depending on your perspective may be a reasonable conclusion, or may not have seemed to have worked out so well &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3878&quot;&gt;&lt;span data-dcnode-id=&quot;3879&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3877&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3875&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3874&quot;&gt;&lt;br data-dcnode-id=&quot;3873&quot;&gt;&lt;span data-dcnode-id=&quot;3872&quot; instrument_node=&quot;&quot;&gt;To give you an idea of what this book is, at the top of page 522, Tuchman tells us &lt;/span&gt;&lt;i data-dcnode-id=&quot;3870&quot;&gt;&lt;span data-dcnode-id=&quot;3871&quot; instrument_node=&quot;&quot;&gt;&quot;the BEF...stopped the Germans in Flanders&quot;&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3869&quot; instrument_node=&quot;&quot;&gt;, the very next paragraph begins &lt;/span&gt;&lt;i data-dcnode-id=&quot;3867&quot;&gt;&lt;span data-dcnode-id=&quot;3868&quot; instrument_node=&quot;&quot;&gt;&quot;The Schlieffen plan had failed, but it had succeeded far enough to leave the Germans in occupation of all of Belgium...&quot;&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3866&quot; instrument_node=&quot;&quot;&gt;. So maybe Tuchman did not know that Flanders is in Belgium, or she knew but thought her readers wouldn't? I suspect it is a matter of drama, 'all of Belgium' sounds more dramatic than most or much of Belgium, in this book rhetoric wins, facts come second &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3864&quot;&gt;&lt;span data-dcnode-id=&quot;3865&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3859&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3863&quot; instrument_node=&quot;&quot;&gt;[ and sometimes not all all &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3861&quot;&gt;&lt;span data-dcnode-id=&quot;3862&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3860&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3858&quot; instrument_node=&quot;&quot;&gt;. A little earlier, pp494-7 there is an interesting discussion, weighing up the post war accounts of the participants on the dismissal by Joffre of Lanrezac as commander of the French 5th Army, which left me with the impression that Tuchman was of the opinion that Lanrezac was dropped because his criticisms of Joffre, of his strategy &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3856&quot;&gt;&lt;span data-dcnode-id=&quot;3857&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3851&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3855&quot; instrument_node=&quot;&quot;&gt;[ &quot;ATTACK!&quot; &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3853&quot;&gt;&lt;span data-dcnode-id=&quot;3854&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3852&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3850&quot; instrument_node=&quot;&quot;&gt; and Joffre's opinions on German numbers &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3848&quot;&gt;&lt;span data-dcnode-id=&quot;3849&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3843&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3847&quot; instrument_node=&quot;&quot;&gt;[ 'there are far fewer of them than you think' &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3845&quot;&gt;&lt;span data-dcnode-id=&quot;3846&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3844&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3842&quot; instrument_node=&quot;&quot;&gt; turned out to be correct, and that trying to take the offensive against superior numbers - shockingly- did not work out successfully, and indeed many of us can recognise that being known to be right when are Bosses are proved to be wrong is a dangerous place to be in, however by page 521 Tuchman has flipped her position and accepts Joffre's opinion that Lanrezac had to go because he was broken. In terms of the dramatic story of course it makes better sense to have a calm, imperturbable, wise Joffre in charge rather than another aged General, out of his depth, failing around, refusing to believe the intelligence reports he is getting.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3841&quot;&gt;&lt;br data-dcnode-id=&quot;3840&quot;&gt;&lt;span data-dcnode-id=&quot;3839&quot; instrument_node=&quot;&quot;&gt;Page 71, Tuchman states as a fact that in 1911 Russian Prime minister Stolypin was assassinated by police agents - some people have made such an assertion - but it really is more of a conspiracy theory and certainly not a fact &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3837&quot;&gt;&lt;span data-dcnode-id=&quot;3838&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3832&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3836&quot; instrument_node=&quot;&quot;&gt;[perhaps Tuchman was getting mixed up with the Azef case &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3834&quot;&gt;&lt;span data-dcnode-id=&quot;3835&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3833&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3831&quot; instrument_node=&quot;&quot;&gt;, but in terms of drama it contributes to presenting Russia as a complete basket case&lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3829&quot;&gt;&lt;span data-dcnode-id=&quot;3830&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3816&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3828&quot; instrument_node=&quot;&quot;&gt;[though you can, using facts argue that Russia was ill-prepared for war in 1914 &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3826&quot;&gt;&lt;span data-dcnode-id=&quot;3827&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3821&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3825&quot; instrument_node=&quot;&quot;&gt;[ though as it happened somewhat better prepared than it was in 1904 when it went to war with Japan &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3823&quot;&gt;&lt;span data-dcnode-id=&quot;3824&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3822&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3820&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3818&quot;&gt;&lt;span data-dcnode-id=&quot;3819&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3817&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3815&quot; instrument_node=&quot;&quot;&gt;, as does stating that the Russian army was dependent on horsepower for its logistics once it moved beyond a railhead, implying that it was peculiarly backwards rather than absolutely typical of WWI armies, which is why of course the use of Parisian taxis to bring soldiers to the front during the Battle of the Marne was so important as they could arrive merely car sick rather than exhausted from marching.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3814&quot;&gt;&lt;br data-dcnode-id=&quot;3813&quot;&gt;&lt;span data-dcnode-id=&quot;3812&quot; instrument_node=&quot;&quot;&gt;I did wonder who I might recommend this book too - not as a first book about WWI, the assassination of Franz Ferdinand, was I think mentioned twice, one obliquely, and not explained, and Tuchman decides not to discuss anything about Serbia or Austro-Hungary &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3810&quot;&gt;&lt;span data-dcnode-id=&quot;3811&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3797&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3809&quot; instrument_node=&quot;&quot;&gt;[ except in relation to the Austrian fleet &lt;/span&gt;&lt;a class=&quot;jsShowSpoiler spoilerAction&quot; data-dcnode-id=&quot;3807&quot;&gt;&lt;span data-dcnode-id=&quot;3808&quot; instrument_node=&quot;&quot;&gt;(view spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;spoilerContainer&quot; data-dcnode-id=&quot;3802&quot; style=&quot;display: none&quot;&gt;&lt;span data-dcnode-id=&quot;3806&quot; instrument_node=&quot;&quot;&gt;[ which obviously as fans of &quot;The Sound of Music&quot; remember was very important &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3804&quot;&gt;&lt;span data-dcnode-id=&quot;3805&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3803&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3801&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;jsHideSpoiler spoilerAction&quot; data-dcnode-id=&quot;3799&quot;&gt;&lt;span data-dcnode-id=&quot;3800&quot; instrument_node=&quot;&quot;&gt;(hide spoiler)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3798&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3796&quot; instrument_node=&quot;&quot;&gt;, since trouble in the Balkans was the motor of the crisis which ended in WWI I felt her decision made her opening chapters about the diplomatic manoeuvres between Germany, France and Britain confusing - but the decision strengthens the basic narrative of German wickedness I suppose. Had I been her editor I would have gone further and cut the chapters on the Russian campaign and on the &lt;/span&gt;&lt;i data-dcnode-id=&quot;3794&quot;&gt;&lt;span data-dcnode-id=&quot;3795&quot; instrument_node=&quot;&quot;&gt;Goeben&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3793&quot; instrument_node=&quot;&quot;&gt;, and left this as a book about the unfolding of the German attack through Belgium into France.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3792&quot;&gt;&lt;br data-dcnode-id=&quot;3791&quot;&gt;&lt;span data-dcnode-id=&quot;3790&quot; instrument_node=&quot;&quot;&gt;No, if you are going to read this, it has to be for the entertainment, Tuchman is excellent at the cutting observation, some of which are funny, I think for her rhetoric rules, and she writes things because they sound good that really don't stand up if you are mildly critical of the sources she relies on, or if you have read any other book on WWI. I have sympathy with those reviewers who point out the importance of WWII to her understanding of WWI. This is entertainment, alternatively you could watch &lt;/span&gt;&lt;a data-dcnode-id=&quot;3788&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.imdb.com/title/tt0064754/&quot; rel=&quot;nofollow noopener&quot;&gt;&lt;span data-dcnode-id=&quot;3789&quot; instrument_node=&quot;&quot;&gt;Oh what a lovely war&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3787&quot; instrument_node=&quot;&quot;&gt;, it will take you less time, covers the middle and end of the war as well as its opening, and it has far more songs. Both will give you skewed (but from different perspectives) impressions of the war, but maybe openness to a variety of skewed and flawed perspectives is more reasonable than believing that there is a &lt;/span&gt;&lt;i data-dcnode-id=&quot;3785&quot;&gt;&lt;span data-dcnode-id=&quot;3786&quot; instrument_node=&quot;&quot;&gt;&quot;wie es wirklich war&quot;&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3784&quot; instrument_node=&quot;&quot;&gt; that could be achieved.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3783&quot;&gt;&lt;br data-dcnode-id=&quot;3782&quot;&gt;&lt;span data-dcnode-id=&quot;3781&quot; instrument_node=&quot;&quot;&gt;PS apparently there are at least two boardgames called &quot;the Guns of August&quot; about WWI, I have not played either and have no opinion on their entertainment value.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3779&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;3685&quot; id=&quot;freeTextContainer16392343287866730831&quot;&gt;&lt;span data-dcnode-id=&quot;3690&quot; instrument_node=&quot;&quot;&gt;A truly remarkable account of the first month of WWI. If history were taught to high school students the way Barbara Tuchman presents it, perhaps we would not be doomed to repeat it so often.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3689&quot;&gt;&lt;span data-dcnode-id=&quot;3688&quot; instrument_node=&quot;&quot;&gt; &quot;The Guns of August&quot; is a very readable account of how the Allies almost lost the war in the first 30 days through the bungling due to ego, jealousy, misunderstanding and territorial disputes.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3687&quot;&gt;&lt;span data-dcnode-id=&quot;3686&quot; instrument_node=&quot;&quot;&gt;The Germans were not immune to senseless error, theirs resulting more from Teutonic belief in blindly following orde&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3664&quot; id=&quot;freeText16392343287866730831&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;3683&quot; instrument_node=&quot;&quot;&gt;A truly remarkable account of the first month of WWI. If history were taught to high school students the way Barbara Tuchman presents it, perhaps we would not be doomed to repeat it so often.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3682&quot;&gt;&lt;span data-dcnode-id=&quot;3681&quot; instrument_node=&quot;&quot;&gt; &quot;The Guns of August&quot; is a very readable account of how the Allies almost lost the war in the first 30 days through the bungling due to ego, jealousy, misunderstanding and territorial disputes.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3680&quot;&gt;&lt;span data-dcnode-id=&quot;3679&quot; instrument_node=&quot;&quot;&gt;The Germans were not immune to senseless error, theirs resulting more from Teutonic belief in blindly following order and their insistence on the inferiority of any way but the German way.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3678&quot;&gt;&lt;span data-dcnode-id=&quot;3677&quot; instrument_node=&quot;&quot;&gt; How many global errors of these types are being made today by world military leaders, and what will be the consequences?&lt;/span&gt;&lt;br data-dcnode-id=&quot;3676&quot;&gt;&lt;span data-dcnode-id=&quot;3675&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;br data-dcnode-id=&quot;3674&quot;&gt;&lt;span data-dcnode-id=&quot;3673&quot; instrument_node=&quot;&quot;&gt; I was six years old when this book first came out and I remember it causing quite a stir amount my parents' friends as they passed their one copy from couple to couple.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3672&quot;&gt;&lt;span data-dcnode-id=&quot;3671&quot; instrument_node=&quot;&quot;&gt; I spoke to my mother about it this weekend, and she said her reaction to it was shock. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3670&quot;&gt;&lt;span data-dcnode-id=&quot;3669&quot; instrument_node=&quot;&quot;&gt; She and I agree that all we were taught about WWI was that Kaiser Wilhelm got too big for his britches, some minor Prince got shot by a nutcase and Germany used it as an excuse to invade France. England magnanimously came to France's rescue. Not. what. happened. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3668&quot;&gt;&lt;span data-dcnode-id=&quot;3667&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;br data-dcnode-id=&quot;3666&quot;&gt;&lt;span data-dcnode-id=&quot;3665&quot; instrument_node=&quot;&quot;&gt;Do read this, even if you have to draw the battle plans out on graph paper like I did to understand parts of it. So much of our 21st century world makes sense when you understand the beginning of the last century.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3663&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;3529&quot; id=&quot;reviewTextContainer599311119&quot;&gt;&lt;span data-dcnode-id=&quot;3557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3555&quot; id=&quot;freeTextContainer7467556959484248897&quot;&gt;&lt;span data-dcnode-id=&quot;3556&quot; instrument_node=&quot;&quot;&gt;After reading this book 100 years, sometimes to the day, after some of the events happened, it is difficult to know what to say. Others have written so many excellent reviews. I believe that I will focus on reaction for my review---reaction 100 years after the fact to the apparent ease with which the European world, and then much more, slid into an horrific spilling of blood, the ease with which several leaders gave orders which condemned millions of people to death; cities, towns, even small na&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3554&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3534&quot; id=&quot;freeText7467556959484248897&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;3553&quot; instrument_node=&quot;&quot;&gt;After reading this book 100 years, sometimes to the day, after some of the events happened, it is difficult to know what to say. Others have written so many excellent reviews. I believe that I will focus on reaction for my review---reaction 100 years after the fact to the apparent ease with which the European world, and then much more, slid into an horrific spilling of blood, the ease with which several leaders gave orders which condemned millions of people to death; cities, towns, even small nations to near or total destruction.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3552&quot;&gt;&lt;br data-dcnode-id=&quot;3551&quot;&gt;&lt;span data-dcnode-id=&quot;3550&quot; instrument_node=&quot;&quot;&gt;The pressure for this war had been building for years from what I have read. The Germans feared being encircled within Europe. They feared that the rest of Europe was excluding them from various treaties. The war of brinksmanship had been underway for some time. The British had the best Navy and also had no intention of allowing that fact to change. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3549&quot;&gt;&lt;br data-dcnode-id=&quot;3548&quot;&gt;&lt;span data-dcnode-id=&quot;3547&quot; instrument_node=&quot;&quot;&gt;Ego. Power. Money. Yes they are the same reasons that wars are fought today. Just different weaponry. Then it was mud-filled trenches. Men being mowed down by machine guns or by hand thrown &quot;bombs&quot;, early grenades. The wounded, if lucky might live to fight again. If horribly unlucky, might die out in No Man's Land, alone and unaided, between lines.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3546&quot;&gt;&lt;br data-dcnode-id=&quot;3545&quot;&gt;&lt;span data-dcnode-id=&quot;3544&quot; instrument_node=&quot;&quot;&gt;This went on for four years as generals on all sides pushed their men to impossible lengths. It was devastating. And also devastating to civilians, especially those who happened to be in the path of the German army who adopted a policy of, essentially, &quot;teaching all a lesson.&quot;&lt;/span&gt;&lt;br data-dcnode-id=&quot;3543&quot;&gt;&lt;br data-dcnode-id=&quot;3542&quot;&gt;&lt;span data-dcnode-id=&quot;3541&quot; instrument_node=&quot;&quot;&gt;I had intended to write a review making note of Tuchman's excellent writing and scholarship, with examples of both, but I find I cannot. I am simply too tired, too worn out by the reading, too worn out by this horrible war. (Of course I also read Chevalier's excellent &lt;/span&gt;&lt;a data-dcnode-id=&quot;3539&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.goodreads.com/book/show/18373373.Fear_A_Novel_of_World_War_I&quot; rel=&quot;nofollow noopener&quot; title=&quot;Fear A Novel of World War I by Gabriel Chevallier&quot;&gt;&lt;span data-dcnode-id=&quot;3540&quot; instrument_node=&quot;&quot;&gt;Fear: A Novel of World War I&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3538&quot; instrument_node=&quot;&quot;&gt; which brought the general down to the specific and perhaps tired me more.) But in the end perhaps Tuchman achieved her purpose in me. I hate what I saw in that world of August, 1914.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3537&quot;&gt;&lt;br data-dcnode-id=&quot;3536&quot;&gt;&lt;span data-dcnode-id=&quot;3535&quot; instrument_node=&quot;&quot;&gt;I do recommend this book to any who have not read it.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3533&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;3325&quot; id=&quot;freeTextContainer15119343979068485843&quot;&gt;&lt;span data-dcnode-id=&quot;3329&quot; instrument_node=&quot;&quot;&gt;I've been reading a fair bit about dubya dubya 2 recently but my knowledge of dubya dubya 1 consists of what I dimly recollect from school. That is: arms race, Franz Ferdinand, something something, the Somme, gas gas quick boys, Versailles. I also remember visiting the massive marble monument the Canadians built at Vimy ridge. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3328&quot;&gt;&lt;br data-dcnode-id=&quot;3327&quot;&gt;&lt;span data-dcnode-id=&quot;3326&quot; instrument_node=&quot;&quot;&gt;The 21 years separating 1918 and 1939 are not a great length of time. There's something to be said for the thesis that the two world wars should be understood as one exten&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3312&quot; id=&quot;freeText15119343979068485843&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;3323&quot; instrument_node=&quot;&quot;&gt;I've been reading a fair bit about dubya dubya 2 recently but my knowledge of dubya dubya 1 consists of what I dimly recollect from school. That is: arms race, Franz Ferdinand, something something, the Somme, gas gas quick boys, Versailles. I also remember visiting the massive marble monument the Canadians built at Vimy ridge. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3322&quot;&gt;&lt;br data-dcnode-id=&quot;3321&quot;&gt;&lt;span data-dcnode-id=&quot;3320&quot; instrument_node=&quot;&quot;&gt;The 21 years separating 1918 and 1939 are not a great length of time. There's something to be said for the thesis that the two world wars should be understood as one extended conflict with a brief breather in the middle. Hitler's invasion of France in 1940 bears more than a passing resemblance to the Schlieffen plan. With the fall of three major empires: the Ottoman, the Austro-Hungarian and the Russian, the first world war probably has a greater claim than the second to the title of &quot;the defining event of the twentieth century&quot;. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3319&quot;&gt;&lt;br data-dcnode-id=&quot;3318&quot;&gt;&lt;span data-dcnode-id=&quot;3317&quot; instrument_node=&quot;&quot;&gt;Tuchman is gifted at spinning a narrative and at vividly describing the key personalities. The book is extremely readable, even rollicking. On the other hand she has a fetishistic obsession with the minutiae of troop movements where I would be more interested in overarching and underlying socio-political themes. There's relatively little here about nationalism and imperialism, domestic politics or popular opinion of the war. Practically all we get on the assassination of Franz Ferdinand is Bismarck's prescient quip that the Great War would be kicked off by &quot;some damn foolish thing in the Balkans&quot;.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3316&quot;&gt;&lt;br data-dcnode-id=&quot;3315&quot;&gt;&lt;span data-dcnode-id=&quot;3314&quot; instrument_node=&quot;&quot;&gt;As an easy introduction for someone who knows little about the first world war, it's excellent. For more depth and substance there are doubtless other places to look (I'll take recommendations).&lt;/span&gt;&lt;br data-dcnode-id=&quot;3313&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3311&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;3187&quot; id=&quot;freeText5060764644604285691&quot; style=&quot;display:none&quot;&gt;&lt;b data-dcnode-id=&quot;3204&quot;&gt;&lt;span data-dcnode-id=&quot;3205&quot; instrument_node=&quot;&quot;&gt;The Guns of August which I read in September&lt;/span&gt;&lt;/b&gt;&lt;br data-dcnode-id=&quot;3203&quot;&gt;&lt;br data-dcnode-id=&quot;3202&quot;&gt;&lt;img alt=&quot;Krupp&quot; class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;3201&quot; height=&quot;283&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1411693696i/11266009._SX540_.jpg&amp;amp;raw&quot; width=&quot;400&quot;&gt;&lt;br data-dcnode-id=&quot;3200&quot;&gt;&lt;br data-dcnode-id=&quot;3199&quot;&gt;&lt;i data-dcnode-id=&quot;3197&quot;&gt;&lt;span data-dcnode-id=&quot;3198&quot; instrument_node=&quot;&quot;&gt;“Nothing so comforts the military mind as the maxim of a great but dead general.”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3196&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;br data-dcnode-id=&quot;3195&quot;&gt;&lt;span data-dcnode-id=&quot;3194&quot; instrument_node=&quot;&quot;&gt;― Barbara W. Tuchman, The Guns of August&lt;/span&gt;&lt;br data-dcnode-id=&quot;3193&quot;&gt;&lt;br data-dcnode-id=&quot;3192&quot;&gt;&lt;span data-dcnode-id=&quot;3191&quot; instrument_node=&quot;&quot;&gt;What an amazing piece of historical writing. Tuchman shows how August, 2014 was impacted by two failed plans (Plan 17 &amp;amp; the Schlieffen Plan), Generals and politicos who were either overly optimistic at the wrong time or overly pessimistic at the wrong time. She detailed how inadvertent acts by disgraced Generals might have saved France, how the politics and the national moods of France, Germany, Russia, and Great Britain may have contributed to the length of the Great War.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3190&quot;&gt;&lt;br data-dcnode-id=&quot;3189&quot;&gt;&lt;span data-dcnode-id=&quot;3188&quot; instrument_node=&quot;&quot;&gt;After the Civil War and the War of Franco-Prussian War of 1870, war had morphed into a whole new beast. Few leaders grasped this at the beginning of August but by September 1914 there were very few living on the European continent who could avoid recognizing that war would never be the same again. The vitality and the drama of Tuchman's narrative made this book seemed delivered by 420-millimetre siege howitzers. Chapter after chapter would absolutely devastate me as I read. I am very glad I wasn't in the French (or Belgian or German or Russian) military in August of 1914.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3186&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;3077&quot; id=&quot;reviewTextContainer3916577102&quot;&gt;&lt;span data-dcnode-id=&quot;3089&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3087&quot; id=&quot;freeTextContainer4346057561421463099&quot;&gt;&lt;span data-dcnode-id=&quot;3088&quot; instrument_node=&quot;&quot;&gt;I understand why this is a classic. It's a clear, compulsively readible account of the convoluted politics and policies that led to the First World War. I also think this is why the book has proved to be so popular. Growing up in the early 60's, when the book was written, my contemporaries and I had some idea of what WW2 was about, through popular culture and the accounts of fathers, mothers, uncles, etc. WW1 was much more dim and distant, not to mention nebulous. Some Arch Duke guy got shot. So&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3086&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3082&quot; id=&quot;freeText4346057561421463099&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;3085&quot; instrument_node=&quot;&quot;&gt;I understand why this is a classic. It's a clear, compulsively readible account of the convoluted politics and policies that led to the First World War. I also think this is why the book has proved to be so popular. Growing up in the early 60's, when the book was written, my contemporaries and I had some idea of what WW2 was about, through popular culture and the accounts of fathers, mothers, uncles, etc. WW1 was much more dim and distant, not to mention nebulous. Some Arch Duke guy got shot. So?&lt;/span&gt;&lt;br data-dcnode-id=&quot;3084&quot;&gt;&lt;span data-dcnode-id=&quot;3083&quot; instrument_node=&quot;&quot;&gt;Tuchman makes the people in the sepia photos come to life, with all their foibles, foolishness and mistaken assumptions. As many, many before me have pointed out, the key lesson in the book is how the world blundered its way into a disastrous war. That's a lesson every generation needs to learn. If it isn't the results are Vietnam, the Gulf War, Iraq and Afghanistan.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3081&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;2832&quot; id=&quot;reviewTextContainer1364590264&quot;&gt;&lt;span data-dcnode-id=&quot;2902&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2894&quot; id=&quot;freeTextContainer1049727681440993279&quot;&gt;&lt;span data-dcnode-id=&quot;2901&quot; instrument_node=&quot;&quot;&gt;The guns of World War I first roared to life on August 4, 1914, when Germany invaded Belgium; and in a way, those guns of mechanized modern war have never really fallen silent in more than a century since that day. Barbara Tuchman’s &lt;/span&gt;&lt;i data-dcnode-id=&quot;2899&quot;&gt;&lt;span data-dcnode-id=&quot;2900&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2898&quot; instrument_node=&quot;&quot;&gt; sets forth in a powerful and resonant manner the story of how the First World War began.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2897&quot;&gt;&lt;br data-dcnode-id=&quot;2896&quot;&gt;&lt;span data-dcnode-id=&quot;2895&quot; instrument_node=&quot;&quot;&gt;The roots of war, as Tuchman describes it, go back to the longstanding national rivalry between Germany and France. Frenchmen and Germans had met on many battle&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2893&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2837&quot; id=&quot;freeText1049727681440993279&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2892&quot; instrument_node=&quot;&quot;&gt;The guns of World War I first roared to life on August 4, 1914, when Germany invaded Belgium; and in a way, those guns of mechanized modern war have never really fallen silent in more than a century since that day. Barbara Tuchman’s &lt;/span&gt;&lt;i data-dcnode-id=&quot;2890&quot;&gt;&lt;span data-dcnode-id=&quot;2891&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2889&quot; instrument_node=&quot;&quot;&gt; sets forth in a powerful and resonant manner the story of how the First World War began.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2888&quot;&gt;&lt;br data-dcnode-id=&quot;2887&quot;&gt;&lt;span data-dcnode-id=&quot;2886&quot; instrument_node=&quot;&quot;&gt;The roots of war, as Tuchman describes it, go back to the longstanding national rivalry between Germany and France. Frenchmen and Germans had met on many battlefields, and both countries anticipated the possibility of future conflict. While France relied on what came to be known as the doctrine of &lt;/span&gt;&lt;i data-dcnode-id=&quot;2884&quot;&gt;&lt;span data-dcnode-id=&quot;2885&quot; instrument_node=&quot;&quot;&gt;élan&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2883&quot; instrument_node=&quot;&quot;&gt; -- “the all-conquering will”, or “the spirit of &lt;/span&gt;&lt;i data-dcnode-id=&quot;2881&quot;&gt;&lt;span data-dcnode-id=&quot;2882&quot; instrument_node=&quot;&quot;&gt;la gloire&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2880&quot; instrument_node=&quot;&quot;&gt;, of 1792, of the incomparable ‘Marseillaise’” (p. 31) – Germany adopted a very organized, very Prussian plan for the next war.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2879&quot;&gt;&lt;br data-dcnode-id=&quot;2878&quot;&gt;&lt;span data-dcnode-id=&quot;2877&quot; instrument_node=&quot;&quot;&gt;It came to be known as “the Schlieffen plan,” for Count Alfred von Schlieffen, the Prussian strategist who developed it. The plan involved a massive strike by a German right wing across Belgium, overwhelming the French left and ensuring France’s fall before Germany could become bogged down in a two-front war with France and Russia. Yet the key complication was that Prussia had joined with Austria-Hungary, France, Great Britain, and Russia in an 1839 treaty promising to respect Belgian neutrality. Following the Schlieffen plan might bring Germany victory over France, but it also involved Germany breaking her word to the world.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2876&quot;&gt;&lt;br data-dcnode-id=&quot;2875&quot;&gt;&lt;span data-dcnode-id=&quot;2874&quot; instrument_node=&quot;&quot;&gt;The Schlieffen plan took on a life of its own, with German officers like General Helmuth von Moltke insisting that the plan must go forward, even as problems with the plan became ever more apparent. The German invasion went forward, on schedule, as August began, and German Chancellor Theobald von Bethmann-Hollweg declared to the Reichstag in Berlin that “Whatever our lot may be, August 4, 1914, will remain for all eternity one of Germany’s greatest days!” (p. 128). While Bethmann’s words may have thrilled his nationalistic audience, Germany’s violation of Belgian neutrality guaranteed that its war would be not a swift four-month lightning campaign against France alone, but rather a protracted two-front war with Great Britain and Russia as additional enemies. &lt;/span&gt;&lt;br data-dcnode-id=&quot;2873&quot;&gt;&lt;br data-dcnode-id=&quot;2872&quot;&gt;&lt;span data-dcnode-id=&quot;2871&quot; instrument_node=&quot;&quot;&gt;In her review of the opening days of World War I on the Western Front, Tuchman devotes considerable attention to atrocities committed by the invading Germans. In Tuchman’s reading, the cruelty of the German army at the outset of World War I has its roots in the German experience during the Franco-Prussian War, forty years earlier, when &lt;/span&gt;&lt;i data-dcnode-id=&quot;2869&quot;&gt;&lt;span data-dcnode-id=&quot;2870&quot; instrument_node=&quot;&quot;&gt;francs-tireurs&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2868&quot; instrument_node=&quot;&quot;&gt;, civilian guerrilla volunteers, had challenged not only the Prussian army but also the Prussian mind itself -- or, more specifically, the Prussian idea of how war should and should not be fought. “Fear and horror of the &lt;/span&gt;&lt;i data-dcnode-id=&quot;2866&quot;&gt;&lt;span data-dcnode-id=&quot;2867&quot; instrument_node=&quot;&quot;&gt;franc-tireur&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2865&quot; instrument_node=&quot;&quot;&gt; sprang from the German feeling that civilian resistance was essentially disorderly. If there has to be a choice between injustice and disorder, said Goethe, the German prefers injustice” (p. 319). &lt;/span&gt;&lt;br data-dcnode-id=&quot;2864&quot;&gt;&lt;br data-dcnode-id=&quot;2863&quot;&gt;&lt;span data-dcnode-id=&quot;2862&quot; instrument_node=&quot;&quot;&gt;Some readers might find that interpretation to be overly essentialist; but there is no question that Tuchman, in presenting the horrors of the First World War, is calling upon her readers to look ahead to the Second. After presenting a sort of catalog of German mass executions of Belgian civilians -- 150 at Aerschot, 664 at Dinant -- Tuchman sums up the whole litany of horrors thus: “In Belgium there are many towns whose cemeteries today have rows and rows of memorial stones inscribed with a name, the date 1914, and the legend, repeated over and over: &lt;/span&gt;&lt;i data-dcnode-id=&quot;2860&quot;&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt;”Fusillé par les Allemands”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2859&quot; instrument_node=&quot;&quot;&gt; (Shot by the Germans). In many are newer and longer rows with the same legend and the date 1944” (226).&lt;/span&gt;&lt;br data-dcnode-id=&quot;2858&quot;&gt;&lt;br data-dcnode-id=&quot;2857&quot;&gt;&lt;span data-dcnode-id=&quot;2856&quot; instrument_node=&quot;&quot;&gt;The overall theme that emerges from &lt;/span&gt;&lt;i data-dcnode-id=&quot;2854&quot;&gt;&lt;span data-dcnode-id=&quot;2855&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2853&quot; instrument_node=&quot;&quot;&gt;, for me, is that for all the best-laid plans that politicians and generals may devise, war is a beast that will take a path of its own – a path that no human being can anticipate, a path where the only certainty is that there will be more blood and more pain and more death than anyone expects. We all know what lay beyond the horrors of the First World War and its more than 40 million casualties among soldiers alone: the Russian Revolution and the rise of the Soviet regime, a catastrophic worldwide economic depression, a Second World War even more hideous than the first, the introduction of nuclear weapons, and a Cold War that was still very much in progress when this book was first published in 1962. &lt;/span&gt;&lt;br data-dcnode-id=&quot;2852&quot;&gt;&lt;br data-dcnode-id=&quot;2851&quot;&gt;&lt;span data-dcnode-id=&quot;2850&quot; instrument_node=&quot;&quot;&gt;Small wonder that, at the end of the book’s afterword, Tuchman describes the Battle of the Marne, in progress as of the end of the period covered by this book, as a trap for all of the nations involved – “a trap made during the first thirty days out of battles that failed to be decisive, a trap from which there was, &lt;/span&gt;&lt;i data-dcnode-id=&quot;2848&quot;&gt;&lt;span data-dcnode-id=&quot;2849&quot; instrument_node=&quot;&quot;&gt;and has been&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2847&quot; instrument_node=&quot;&quot;&gt;, no exit” (p. 440; emphasis added). I thought about Tuchman’s words while my wife and I were traveling between Paris and Reims a few years ago, on our way to see our son, then a United States Marine, participate in a joint French and American commemoration of the Battle of Belleau Wood. Those Marne battlegrounds from a century ago are green, peaceful, well-tended farm fields today; but on some battlefield somewhere in the world, the guns of mechanized war have been thundering away, more or less continuously, since August of 1914. Truly, there has been no exit.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2846&quot;&gt;&lt;br data-dcnode-id=&quot;2845&quot;&gt;&lt;span data-dcnode-id=&quot;2844&quot; instrument_node=&quot;&quot;&gt;This 1994 edition of &lt;/span&gt;&lt;i data-dcnode-id=&quot;2842&quot;&gt;&lt;span data-dcnode-id=&quot;2843&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2841&quot; instrument_node=&quot;&quot;&gt; benefits from well-chosen photographs and well-drawn campaign and battle maps. A foreword by fellow historian Robert Massie – like Tuchman, a historian whose work achieved great popularity among the general public – helpfully sets forth the magnitude of Tuchman’s achievements as an historian, and emphasizes well Tuchman’s belief in the importance of presenting history as a story that should be interesting and compelling for both the reader and the writer. &lt;/span&gt;&lt;i data-dcnode-id=&quot;2839&quot;&gt;&lt;span data-dcnode-id=&quot;2840&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2838&quot; instrument_node=&quot;&quot;&gt; achieves its goals effectively and powerfully, and should be required reading for any leader, civilian or military, who may be inclined to shoot first and ask questions later.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2836&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;2714&quot; id=&quot;reviewTextContainer2228942111&quot;&gt;&lt;span data-dcnode-id=&quot;2754&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2749&quot; id=&quot;freeTextContainer3429570173363430986&quot;&gt;&lt;span data-dcnode-id=&quot;2753&quot; instrument_node=&quot;&quot;&gt;For The Centenary Of The Great War&lt;/span&gt;&lt;br data-dcnode-id=&quot;2752&quot;&gt;&lt;br data-dcnode-id=&quot;2751&quot;&gt;&lt;span data-dcnode-id=&quot;2750&quot; instrument_node=&quot;&quot;&gt;The year 2014 marks the 100th anniversary of WW I, and many books are being written in commemoration. I read Barbara Tuchman's famous book, &quot;The Guns of August: The Outbreak of World War I&quot; (1962) after reading some of the more recent histories and becoming interested. Her book remains an invaluable study. The book has attained a life of its own. Tuchman (1912 -- 1989) was a popular historian. She wrote for a broad audience in a way that emphasized character, de&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2719&quot; id=&quot;freeText3429570173363430986&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2747&quot; instrument_node=&quot;&quot;&gt;For The Centenary Of The Great War&lt;/span&gt;&lt;br data-dcnode-id=&quot;2746&quot;&gt;&lt;br data-dcnode-id=&quot;2745&quot;&gt;&lt;span data-dcnode-id=&quot;2744&quot; instrument_node=&quot;&quot;&gt;The year 2014 marks the 100th anniversary of WW I, and many books are being written in commemoration. I read Barbara Tuchman's famous book, &quot;The Guns of August: The Outbreak of World War I&quot; (1962) after reading some of the more recent histories and becoming interested. Her book remains an invaluable study. The book has attained a life of its own. Tuchman (1912 -- 1989) was a popular historian. She wrote for a broad audience in a way that emphasized character, description, drama, and narrative writing rather than scholarly analysis.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2743&quot;&gt;&lt;br data-dcnode-id=&quot;2742&quot;&gt;&lt;span data-dcnode-id=&quot;2741&quot; instrument_node=&quot;&quot;&gt;The book covers the events leading to the outbreak of WW I, but its focus is on the military history of the first month of the war, August 1914. Tuchman describes in great detail actions on the Western front of the War. In August, 1914, the large armies of Germany and France faced each other in what each side thought would be a rapid and offensive war of annihilation. The German army moved through Belgium and France but received a check at the Battle of the Marne in early September and was forced to retreat. A long war of four years in the trenches set in.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2740&quot;&gt;&lt;br data-dcnode-id=&quot;2739&quot;&gt;&lt;span data-dcnode-id=&quot;2738&quot; instrument_node=&quot;&quot;&gt;Tuchman sets the stage for her story and displays her formidable writing skills in the book's opening paragraph. Here are the paragraph's opening two and concluding sentences.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2737&quot;&gt;&lt;br data-dcnode-id=&quot;2736&quot;&gt;&lt;span data-dcnode-id=&quot;2735&quot; instrument_node=&quot;&quot;&gt;&quot;So gorgeous was the spectacle on the May morning of 1910 when nine kings rode in the funeral of Edward VII of England that the crowd waiting in hushed and black-clad awe could not keep back gasps of admiration. In scarlet and blue and green and purple, three by three the sovereigns rode through the palace gates, with plumed helmets, god braid, crimson sashes, and jeweled orders flashing in the sun. .... The muffled tongue of Big Ben tolled nine by the clock as the cortege left the palace, but on history's clock it was sunset; and the sun of the old world was setting in a dying blaze of splendor never to be seen again.&quot;&lt;/span&gt;&lt;br data-dcnode-id=&quot;2734&quot;&gt;&lt;br data-dcnode-id=&quot;2733&quot;&gt;&lt;span data-dcnode-id=&quot;2732&quot; instrument_node=&quot;&quot;&gt;The book is full of descriptive, dramatic, and beautiful writing. As Tuchman introduces the participants from all sides of the Great War, she displays a gift for capturing the heart of an individual's character in pithy. well-chosen words. She continues to develop the strengths and weaknesses of individual characters in following their actions through her story.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2731&quot;&gt;&lt;br data-dcnode-id=&quot;2730&quot;&gt;&lt;span data-dcnode-id=&quot;2729&quot; instrument_node=&quot;&quot;&gt;Much has been written on the reasons for fighting WW I, and little has been found convincing. Tuchman describes the long, tense, history of Europe and the fears of one another that developed in Germany, France, Russia, and Britain. She describes the military plans long in preparation by each of the European powers that were to be impacted and tested in the conflict. The assassination in Serbia and the subsequent brief attempts in July, 1914 to resolve the crisis diplomatically receive relatively little attention in Tuchman's history. She sees the source of the war in broader and underlying tensions and aims.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2728&quot;&gt;&lt;br data-dcnode-id=&quot;2727&quot;&gt;&lt;span data-dcnode-id=&quot;2726&quot; instrument_node=&quot;&quot;&gt;Tuchman's military history begins with Germany's ultimatum to Belgium and the subsequent invasion which brought England into the war. She makes a great deal of the unanticipated resistance of the Belgians, of the German atrocities, and of the decisive turn against Germany in world public opinion. The book includes detailed, dramatic discussions of the campaign in the West. Germany seemed on the verge of triumph, and Tuchman tries to show how its opening campaign ultimately failed. She integrates her discussion of the Western front with shorter but essential discussions of the early battles between Germany and Russia on the Eastern front, with a treatment of the fateful entry of Turkey into the War on the side of Germany, and with a short discussion of the war at sea. Her history is developed in extensive detail and with a strong sense of military realities in addition to her beautiful writing. With her attention to detail, Tuchman also makes the reader feel the broad tragedy of the first month of the Great War together with its impact in sowing the seeds for the Second War and beyond. She concludes: &quot;Afterward there was no turning back. The nations were caught in a trap, a trap made during the first thirty days out of battles that failed to be decisive, a trap from which there was, and has been, no exit.&quot;&lt;/span&gt;&lt;br data-dcnode-id=&quot;2725&quot;&gt;&lt;br data-dcnode-id=&quot;2724&quot;&gt;&lt;span data-dcnode-id=&quot;2723&quot; instrument_node=&quot;&quot;&gt;Although written for a broad audience, &quot;The Guns of August&quot; is slow, well-documented and thoughtful. It is hardly an easy book to read. The continued success of the work speaks well both for the book and for its persistent readers. The book helps readers think about and understand a pivotal event in history and its continued impact. It thus fulfills the critical goals of writing history.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2722&quot;&gt;&lt;br data-dcnode-id=&quot;2721&quot;&gt;&lt;span data-dcnode-id=&quot;2720&quot; instrument_node=&quot;&quot;&gt;Robin Friedman&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2718&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;2604&quot; id=&quot;freeText7866108425350008329&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2617&quot; instrument_node=&quot;&quot;&gt;This is an excellent but somewhat odd book; odd because the emphasis is so much more on the military than the political that you're left wondering why, how, precisely, this war was so inevitable. Granted, the political leaders are discussed in the first few chapters, the German Kaiser and the Russian Czar more so than the French and the British. But the stress is on the generals, and the war planners, on Schlieffen, whose plan had been prepared in 1905-06 and seemed to be restlessly waiting for enactment. Political alliances were there, and military alliances - it was understood that Britain would come to France's aid if France were attacked, and that Germany would assist Austria-Hungary, and that France, Britain and Russia were allied. All that was necessary apparently was a mechanism to ignite; and yet, to ignite what? What seems to be missing from the equation is actual hostility, actual &lt;/span&gt;&lt;i data-dcnode-id=&quot;2615&quot;&gt;&lt;span data-dcnode-id=&quot;2616&quot; instrument_node=&quot;&quot;&gt;reasons&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2614&quot; instrument_node=&quot;&quot;&gt; to fight. There's no Hitler here, no rampaging evil. Just a bunch of nations at the ready, with their war plans, their generals, and their armies.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2613&quot;&gt;&lt;br data-dcnode-id=&quot;2612&quot;&gt;&lt;span data-dcnode-id=&quot;2611&quot; instrument_node=&quot;&quot;&gt;I was expecting this to be a lighter read. It was a Pulitzer winner, after all. Tuchman is a superb writer, writing in an elegant, sometimes effervescent way that probably few historians today could match: &quot;Doubting Lanrezac's mood, Joffre arrived early in the morning at Laon, now Lanrezac's headquarters, to lend him sangfroid out of his own bottomless supply.&quot; She has a charming, dry wit: &quot;Their new Secretary for War was a barrister with a passion for German philosophy, Richard Haldane, who, when asked by the soldiers in Council what kind of army he had in mind, replied, &quot;A Hegelian army.&quot; &quot;The conversation then fell off,&quot; he recorded.&quot; Yet the book is also extremely dense, thoroughly and magnificently researched. No contemporaneous account or memoir has gone unplumbed. If you lose focus for a paragraph or two, you'll be lost. She has a way of not explaining much back story. Things will be referenced obliquely, such as &quot;Kitchener of Khartoum.&quot; You'll have to research it yourself, if you're unfamiliar with it. There is an entire chapter titled &quot;The Shadow of Sedan&quot; where she never explains what Sedan was, or why we need to know about its shadow. (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2609&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//en.wikipedia.org/wiki/Battle_of_Sedan_%25281870%2529&quot; rel=&quot;nofollow noopener&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;The Battle of Sedan (1870)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2608&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2607&quot;&gt;&lt;br data-dcnode-id=&quot;2606&quot;&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt;The maps in my edition, in tones of gray and grayer, were nearly impossible to read. If you really want to know what the outlines and events of these battles were you'll have to consult other sources.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2603&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;2459&quot; id=&quot;reviewTextContainer660379200&quot;&gt;&lt;span data-dcnode-id=&quot;2491&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2489&quot; id=&quot;freeTextContainer4174010457205982281&quot;&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt;Phew, this was a difficult book to digest in the audiobook format. Neither is it easy to digest in a paper book format. It is dense. It is detailed. Names and places and battles are thrown at you in rapid succession. You have to remember who is who, which corps is fighting where and its number, the title of each commander and more. You do not have time to stop and think and recall what was told to you minutes/pages or even hours/chapters before. You need more than a detailed map because you don’&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2464&quot; id=&quot;freeText4174010457205982281&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2487&quot; instrument_node=&quot;&quot;&gt;Phew, this was a difficult book to digest in the audiobook format. Neither is it easy to digest in a paper book format. It is dense. It is detailed. Names and places and battles are thrown at you in rapid succession. You have to remember who is who, which corps is fighting where and its number, the title of each commander and more. You do not have time to stop and think and recall what was told to you minutes/pages or even hours/chapters before. You need more than a detailed map because you don’t have much time to spend looking at that map. What you need most of all is a good memory, a good knowledge of history and geographic knowledge before you even pick up the book. OR you can read this book to begin learning and accept that there will be parts that go over your head. That is what I did, and I enjoyed much of it, but I also spent time exasperated since there were sentences I had to think about and ponder before I understood their implications. I had to rewind and write notes and search on the internet.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2486&quot;&gt;&lt;br data-dcnode-id=&quot;2485&quot;&gt;&lt;span data-dcnode-id=&quot;2484&quot; instrument_node=&quot;&quot;&gt;Does this mean I regret reading it? My response is emphatically no.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2483&quot;&gt;&lt;br data-dcnode-id=&quot;2482&quot;&gt;&lt;span data-dcnode-id=&quot;2481&quot; instrument_node=&quot;&quot;&gt;Much of the book is set in Belgium and France. (It also covers the Eastern Prussian Front.) I have been to many of the towns, cities, citadels, squares, forests and rivers named. Knowing the history of what happened where I have walked is special to me. I am a bit unsure if it would mean as much to one who has not been there. If you have been in the Ardennes you immediately understand the difficulty of moving artillery around there. Having walked in Leuven, Dinant, Mons, Charleroi and Namur, to name a smattering, when you hear of the burning and sacking and murder of hostages, you more intimately understand. I believe my own experiences, &lt;/span&gt;&lt;u data-dcnode-id=&quot;2479&quot;&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt;rather than the writing&lt;/span&gt;&lt;/u&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt; made the events real.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2477&quot;&gt;&lt;br data-dcnode-id=&quot;2476&quot;&gt;&lt;span data-dcnode-id=&quot;2475&quot; instrument_node=&quot;&quot;&gt; It is important to know that this book is focused primarily on the &lt;/span&gt;&lt;u data-dcnode-id=&quot;2473&quot;&gt;&lt;span data-dcnode-id=&quot;2474&quot; instrument_node=&quot;&quot;&gt;military battles&lt;/span&gt;&lt;/u&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt; of the first month of the war. Why? Because what happened then set the course for the four years that followed. You might as well be told that the primary focus is military because that will not appeal to all. The start of World War One is all about the idiosyncrasies of generals. It is about a lack of communication. It is about men who have decided on a plan and from that they will not budge.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2471&quot;&gt;&lt;br data-dcnode-id=&quot;2470&quot;&gt;&lt;span data-dcnode-id=&quot;2469&quot; instrument_node=&quot;&quot;&gt;The narration by John Lee was fine, but he does not speak slowly and that might have made things a bit easier. Some say he speaks with a Scottish dialect. That is fine by me!&lt;/span&gt;&lt;br data-dcnode-id=&quot;2468&quot;&gt;&lt;br data-dcnode-id=&quot;2467&quot;&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt;I will tell you why I liked this book. I now have the basics for how the war started. I appreciate knowing what has happened to the people living around me here in Belgium; I understand them better. I understand why they so quickly capitulated in the Second World War. Today there is so much squabbling going on between the Flemish and the French people of Belgium. It was wonderful to see how in the First World War they fought united, as one people, for their independence and very existence. I needed to learn of this.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2465&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2463&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;2249&quot; id=&quot;reviewTextContainer663448498&quot;&gt;&lt;span data-dcnode-id=&quot;2275&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2269&quot; id=&quot;freeTextContainer2228331049727333616&quot;&gt;&lt;span data-dcnode-id=&quot;2274&quot; instrument_node=&quot;&quot;&gt;The Guns of August is history that reads like a novel. This compelling read delves into personalities and connects them to events with skill and verve bringing alive what could easily be just dull recitation. I am not a war novel buff, but this detailed account of the first month of WWI maintained my interest throughout. Tuchman’s style kept it suspenseful even though I knew the final outcome.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2273&quot;&gt;&lt;span data-dcnode-id=&quot;2272&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;br data-dcnode-id=&quot;2271&quot;&gt;&lt;span data-dcnode-id=&quot;2270&quot; instrument_node=&quot;&quot;&gt;Christopher Brassard of the National War College summarizing Clausewitz called war “a dynamic, inherent&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2268&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2254&quot; id=&quot;freeText2228331049727333616&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2267&quot; instrument_node=&quot;&quot;&gt;The Guns of August is history that reads like a novel. This compelling read delves into personalities and connects them to events with skill and verve bringing alive what could easily be just dull recitation. I am not a war novel buff, but this detailed account of the first month of WWI maintained my interest throughout. Tuchman’s style kept it suspenseful even though I knew the final outcome.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2266&quot;&gt;&lt;span data-dcnode-id=&quot;2265&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;br data-dcnode-id=&quot;2264&quot;&gt;&lt;span data-dcnode-id=&quot;2263&quot; instrument_node=&quot;&quot;&gt;Christopher Brassard of the National War College summarizing Clausewitz called war “a dynamic, inherently unstable interaction of the forces of violent emotion, chance, and rational calculation.” That succinctly describes Barbara Tuchman’s depiction. I was overcome by just how dicey history and our future are. Any one of a countless number of things from a miscommunication or intercepted communication or rash act or indecision or single personality flaw sent years of planning awry.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2262&quot;&gt;&lt;br data-dcnode-id=&quot;2261&quot;&gt;&lt;span data-dcnode-id=&quot;2260&quot; instrument_node=&quot;&quot;&gt;My knowledge of events increased but more importantly so did my understanding of their interrelatedness. In the first section, The Guns of August describes how policies and attitudes resulting from the Napoleonic wars through the 1870 Franco-Prussian war and the 1905 Russo-Japanese war and more immediate causes culminated in WWI. In turn I could see how WWI would be part of this continuum leading to WWII and ultimately to the shaping of the world of today.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2259&quot;&gt;&lt;span data-dcnode-id=&quot;2258&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;br data-dcnode-id=&quot;2257&quot;&gt;&lt;span data-dcnode-id=&quot;2256&quot; instrument_node=&quot;&quot;&gt;Barbara Tuchman is a very gifted writer who gives you a feel for the underlying flow of history. She does so in a style that is both pleasurable while reading and rewarding when finished. I look forward to enjoying many more of her books.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2255&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2253&quot; instrument_node=&quot;&quot;&gt;
