&lt;/span&gt;&lt;span data-dcnode-id=&quot;2052&quot; id=&quot;freeTextContainer12528132833261593416&quot;&gt;&lt;span data-dcnode-id=&quot;2056&quot; instrument_node=&quot;&quot;&gt;Before the outbreak of The Great War, there were two distinct competing forecasts represented by two new books. In &quot;The Great Illusion,&quot; author Normal Angell argued that because of the &quot;interlacing&quot; alliances formed amongst major powers there could be no new war. Because of this interdependence the victor would suffer equally as the vanquished. It could not be profitable, which tuned out to be true.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2055&quot;&gt;&lt;br data-dcnode-id=&quot;2054&quot;&gt;&lt;span data-dcnode-id=&quot;2053&quot; instrument_node=&quot;&quot;&gt;At the same time, a German, General von Bernhardi, was writing his own book, titled &quot;Germany and t&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2051&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2002&quot; id=&quot;freeText12528132833261593416&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2050&quot; instrument_node=&quot;&quot;&gt;Before the outbreak of The Great War, there were two distinct competing forecasts represented by two new books. In &quot;The Great Illusion,&quot; author Normal Angell argued that because of the &quot;interlacing&quot; alliances formed amongst major powers there could be no new war. Because of this interdependence the victor would suffer equally as the vanquished. It could not be profitable, which tuned out to be true.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2049&quot;&gt;&lt;br data-dcnode-id=&quot;2048&quot;&gt;&lt;span data-dcnode-id=&quot;2047&quot; instrument_node=&quot;&quot;&gt;At the same time, a German, General von Bernhardi, was writing his own book, titled &quot;Germany and the Next War&quot; which would prove as influential as Angell's book. As Tuchman explains....&lt;/span&gt;&lt;br data-dcnode-id=&quot;2046&quot;&gt;&lt;br data-dcnode-id=&quot;2045&quot;&gt;&lt;span data-dcnode-id=&quot;2044&quot; instrument_node=&quot;&quot;&gt;&quot;Three of its chapter titles, “The Right to Make War,” “The Duty to Make War,” and “World Power or Downfall,” sum up its thesis.&quot; Another of his chapters was titled &quot;Germany's Historic Mission.&quot; He had authored a previous book based on the thinking of Clausewitz, Treitschke, and Social Darwinism.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2043&quot;&gt;&lt;br data-dcnode-id=&quot;2042&quot;&gt;&lt;span data-dcnode-id=&quot;2041&quot; instrument_node=&quot;&quot;&gt;He wrote.....&lt;/span&gt;&lt;br data-dcnode-id=&quot;2040&quot;&gt;&lt;br data-dcnode-id=&quot;2039&quot;&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt;&quot;War is a biological necessity, it is the carrying out among mankind of the natural law, upon which all the laws of Nature rest, the law of the struggle for existence.” Nations, he said, &quot;must progress or decay; there can be no standing still,” and Germany must choose “world power or downfall.”&lt;/span&gt;&lt;br data-dcnode-id=&quot;2037&quot;&gt;&lt;br data-dcnode-id=&quot;2036&quot;&gt;&lt;span data-dcnode-id=&quot;2035&quot; instrument_node=&quot;&quot;&gt;“The heart of France lies between Brussels and Paris.” (Clausewitz)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2034&quot;&gt;&lt;br data-dcnode-id=&quot;2033&quot;&gt;&lt;span data-dcnode-id=&quot;2032&quot; instrument_node=&quot;&quot;&gt;But everything depended on a quick decision against France. Clausewitz condemned &quot;gradual reduction&quot; of the enemy, or a war of attrition as &quot;the pit of hell.&quot;&lt;/span&gt;&lt;br data-dcnode-id=&quot;2031&quot;&gt;&lt;br data-dcnode-id=&quot;2030&quot;&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt;------&lt;/span&gt;&lt;br data-dcnode-id=&quot;2028&quot;&gt;&lt;br data-dcnode-id=&quot;2027&quot;&gt;&lt;span data-dcnode-id=&quot;2026&quot; instrument_node=&quot;&quot;&gt;Tuchman's writing is good, but not as sensational as the promoters of that era make it out to be.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2025&quot;&gt;&lt;br data-dcnode-id=&quot;2024&quot;&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;She projects WW II heavily on to her book. I'm sure this was part of the appeal of a book that came out in 1962. And certainly the two wars were connected. But this approach feels very dated now. I think this projection clouds the WW I narrative, rather than enlightening it. &lt;/span&gt;&lt;br data-dcnode-id=&quot;2022&quot;&gt;&lt;br data-dcnode-id=&quot;2021&quot;&gt;&lt;span data-dcnode-id=&quot;2020&quot; instrument_node=&quot;&quot;&gt;An essay that explains the serious flaws in her work.....&lt;/span&gt;&lt;br data-dcnode-id=&quot;2019&quot;&gt;&lt;br data-dcnode-id=&quot;2018&quot;&gt;&lt;span data-dcnode-id=&quot;2017&quot; instrument_node=&quot;&quot;&gt;&quot;Tuchman leaves out the Eastern and Balkan fronts. As in completely. The actual, you know, causes of the Great War are covered in about a page.&quot;&lt;/span&gt;&lt;br data-dcnode-id=&quot;2016&quot;&gt;&lt;br data-dcnode-id=&quot;2015&quot;&gt;&lt;a data-dcnode-id=&quot;2013&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//20committee.com/2015/05/12/that-terrible-tuchman-woman/&quot; rel=&quot;noopener nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2014&quot; instrument_node=&quot;&quot;&gt;https://20committee.com/2015/05/12/th...&lt;/span&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;2012&quot;&gt;&lt;br data-dcnode-id=&quot;2011&quot;&gt;&lt;span data-dcnode-id=&quot;2010&quot; instrument_node=&quot;&quot;&gt;===========================&lt;/span&gt;&lt;br data-dcnode-id=&quot;2009&quot;&gt;&lt;br data-dcnode-id=&quot;2008&quot;&gt;&lt;span data-dcnode-id=&quot;2007&quot; instrument_node=&quot;&quot;&gt;It's not an independent treatment along the lines of Paul Fussell's &quot;The Great War and Modern Memory&quot; which is clearly superior to this book.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2006&quot;&gt;&lt;br data-dcnode-id=&quot;2005&quot;&gt;&lt;a data-dcnode-id=&quot;2003&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.goodreads.com/book/show/154472.The_Great_War_and_Modern_Memory&quot; rel=&quot;noopener nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2004&quot; instrument_node=&quot;&quot;&gt;https://www.goodreads.com/book/show/1...&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2001&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;1811&quot; id=&quot;freeText3383428543922300550&quot; style=&quot;display:none&quot;&gt;&lt;i data-dcnode-id=&quot;1872&quot;&gt;&lt;span data-dcnode-id=&quot;1875&quot; instrument_node=&quot;&quot;&gt;&quot;Dead battles, like dead generals, hold the military mind in their dead grip, and Germans no less than other peoples prepare for the last war.&quot;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1874&quot;&gt;&lt;span data-dcnode-id=&quot;1873&quot; instrument_node=&quot;&quot;&gt;-	&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1871&quot; instrument_node=&quot;&quot;&gt; Barbara Tuchman, &lt;/span&gt;&lt;i data-dcnode-id=&quot;1869&quot;&gt;&lt;span data-dcnode-id=&quot;1870&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1868&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1867&quot;&gt;&lt;br data-dcnode-id=&quot;1866&quot;&gt;&lt;img alt=&quot;img: German Cavalry&quot; class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;1865&quot; height=&quot;272&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380410762i/805916._SX540_.jpg&amp;amp;raw&quot; width=&quot;400&quot;&gt;&lt;br data-dcnode-id=&quot;1864&quot;&gt;&lt;br data-dcnode-id=&quot;1863&quot;&gt;&lt;span data-dcnode-id=&quot;1862&quot; instrument_node=&quot;&quot;&gt;In her Pulitzer-Prize winning classic &lt;/span&gt;&lt;i data-dcnode-id=&quot;1860&quot;&gt;&lt;span data-dcnode-id=&quot;1861&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1859&quot; instrument_node=&quot;&quot;&gt;, the story of the first month of World War I, Barbara Tuchman argues convincingly that August 1914 was when the Gilded Age died and the modern era really began. The book opens with a famous depiction of Edward VII’s funeral in 1910, attended by all the kings and princes of the west: “the greatest assemblage of royalty and rank ever gathered in one place and, of its kind, the last.” Other than a few details, this scene would not have been out of place in 1610. But by September 1914, it was clear that the world had changed in a fundamental way. And not necessarily for the better.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1858&quot;&gt;&lt;br data-dcnode-id=&quot;1857&quot;&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt;World War I is most famous for the years of bitter trench warfare that took place on the Western Front. But at the beginning of the war, in August 1914, the leading generals had other ideas. The Germans were determined to execute the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1854&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//en.wikipedia.org/wiki/Schlieffen_Plan&quot; rel=&quot;nofollow noopener&quot;&gt;&lt;span data-dcnode-id=&quot;1855&quot; instrument_node=&quot;&quot;&gt;Schlieffen Plan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1853&quot; instrument_node=&quot;&quot;&gt;, a strategy where the bulk of their forces would attack France from the north, sweeping down the Atlantic coast, crushing French resistance, and taking Paris within 30 days. This necessitated an invasion of Belgium, and in all likelihood would drag England into the conflict, but this was a price the Germans were willing to pay.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1852&quot;&gt;&lt;br data-dcnode-id=&quot;1851&quot;&gt;&lt;img alt=&quot;img: The Schlieffen Plan&quot; class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;1850&quot; height=&quot;309&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380410762i/805917._SX540_.jpg&amp;amp;raw&quot; width=&quot;400&quot;&gt;&lt;br data-dcnode-id=&quot;1849&quot;&gt;&lt;br data-dcnode-id=&quot;1848&quot;&gt;&lt;span data-dcnode-id=&quot;1847&quot; instrument_node=&quot;&quot;&gt;For their part, the French had never really gotten over their humiliating defeat in the Franco-Prussian War of 1870, a loss they blamed on a lack of sufficient offensive spirit, or “&lt;/span&gt;&lt;i data-dcnode-id=&quot;1845&quot;&gt;&lt;span data-dcnode-id=&quot;1846&quot; instrument_node=&quot;&quot;&gt;élan&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1844&quot; instrument_node=&quot;&quot;&gt;.” French leaders refused to sit back and fight a defensive war. Instead, largely ignoring the German menace to their north, they charged east in a fit of medieval gallantry that would have made Charlemagne proud.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1843&quot;&gt;&lt;br data-dcnode-id=&quot;1842&quot;&gt;&lt;img alt=&quot;img: French Armored Cavalry WWI&quot; class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;1841&quot; height=&quot;352&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380410762i/805918._SX540_.jpg&amp;amp;raw&quot; width=&quot;400&quot;&gt;&lt;br data-dcnode-id=&quot;1840&quot;&gt;&lt;br data-dcnode-id=&quot;1839&quot;&gt;&lt;span data-dcnode-id=&quot;1838&quot; instrument_node=&quot;&quot;&gt;Although most of the German forces were attacking from the north, plenty remained in the east, and they were perfectly content to hunker behind their machine guns and let the enemy come to them. The French, dressed in the same bright red and blue uniforms that Napoleon’s soldiers wore a century before, suffered terrible losses and during the Battle of the Frontiers (August 14-24) were driven back to where they started. Meanwhile, French forces in the north (along with the British Expeditionary Force) fought hard to delay the Germans’ advance, but were forced to give ground before the overwhelming German assault. On the Eastern Front, the Germans had annihilated the Russians at the Battle of Tannenberg, and in the west their armies were getting closer to Paris by the day. The reeling French chose to make a desperate last stand at the Marne. Every man was needed; famously, the taxi drivers of Paris were used to ferry troops from the capital to the front in order to plug a hole in the line. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1837&quot;&gt;&lt;br data-dcnode-id=&quot;1836&quot;&gt;&lt;img alt=&quot;img: Marne Taxis&quot; class=&quot;gr-hostedUserImg&quot; data-dcnode-id=&quot;1835&quot; height=&quot;221&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380410762i/805919._SX540_.png&amp;amp;raw&quot; width=&quot;400&quot;&gt;&lt;br data-dcnode-id=&quot;1834&quot;&gt;&lt;br data-dcnode-id=&quot;1833&quot;&gt;&lt;span data-dcnode-id=&quot;1832&quot; instrument_node=&quot;&quot;&gt;The Germans had been pushing their men hard to reach Paris, and in the “Miracle at the Marne” the French and British were able to repel the exhausted Germans and win a historic victory, ending the Germans’ hopes for a quick and decisive war. Instead, the two sides spent the next four years in brutal trench warfare, the Germans were ultimately defeated, and the table was set for round two in 1939. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1831&quot;&gt;&lt;br data-dcnode-id=&quot;1830&quot;&gt;&lt;i data-dcnode-id=&quot;1828&quot;&gt;&lt;span data-dcnode-id=&quot;1829&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1827&quot; instrument_node=&quot;&quot;&gt; covers a lot more ground than this in its 600+ pages, from the naval buildup to reactions in America and beyond. But throughout the book, there is a sense that the world changed forever in August 1914. World War I was a dumb, senseless war in a lot of ways. There were a number of causes, but at the end of the day Germany basically wanted to fight a war for the hell of it. After all, that’s what the nations of Europe had been doing for as long as they’d existed. Some territory would change hands, some lives would be lost and some glory would be won, and everyone would be home by Christmas. But by September 1914, it was clear that advances in technology had forever changed the nature of war. In the Battle of Marne, there were approximately &lt;/span&gt;&lt;b data-dcnode-id=&quot;1825&quot;&gt;&lt;span data-dcnode-id=&quot;1826&quot; instrument_node=&quot;&quot;&gt;500,000&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1824&quot; instrument_node=&quot;&quot;&gt; casualties. To put that in perspective, there were less than 47,000 total casualties at the Battle of Gettysburg, the bloodiest battle of the Civil War. The age of &lt;/span&gt;&lt;i data-dcnode-id=&quot;1822&quot;&gt;&lt;span data-dcnode-id=&quot;1823&quot; instrument_node=&quot;&quot;&gt;élan&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1821&quot; instrument_node=&quot;&quot;&gt; was officially over.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1820&quot;&gt;&lt;br data-dcnode-id=&quot;1819&quot;&gt;&lt;span data-dcnode-id=&quot;1818&quot; instrument_node=&quot;&quot;&gt;The history in this book is fascinating and well researched, but the writing on display is simply superb. Tuchman was one of the best prose stylists of her generation, fiction or nonfiction, and she makes this book an absolute pleasure to read. I went into this book with very high expectations, as &lt;/span&gt;&lt;i data-dcnode-id=&quot;1816&quot;&gt;&lt;span data-dcnode-id=&quot;1817&quot; instrument_node=&quot;&quot;&gt;The Guns of August&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1815&quot; instrument_node=&quot;&quot;&gt; has the reputation of a nonfiction classic. I was not disappointed: this was one of the 2-3 best nonfiction books I’ve ever read and a true masterpiece. &lt;/span&gt;&lt;b data-dcnode-id=&quot;1813&quot;&gt;&lt;span data-dcnode-id=&quot;1814&quot; instrument_node=&quot;&quot;&gt;6 stars&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt;, highest possible recommendation.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1810&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;1695&quot; id=&quot;reviewTextContainer1266892647&quot;&gt;&lt;span data-dcnode-id=&quot;1722&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1716&quot; id=&quot;freeTextContainer2791055177639229718&quot;&gt;&lt;span data-dcnode-id=&quot;1721&quot; instrument_node=&quot;&quot;&gt;I used to repeat the common wisdom that if only the WWI reparations hadn’t been imposed on Germany, there would have been no WWII. Now I understand that it would have been impossible to convince the Allies that the reparations weren’t necessary.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1720&quot;&gt;&lt;br data-dcnode-id=&quot;1719&quot;&gt;&lt;blockquote data-dcnode-id=&quot;1717&quot;&gt;&lt;span data-dcnode-id=&quot;1718&quot; instrument_node=&quot;&quot;&gt;On August 25 the burning of Louvain began. The medieval city on the road from Liege to Brussels was renowned for its University and incomparable Library, founded in 1426...for the Germans burned Louvain not as a punishment for alleged Belgian misdeeds [de&lt;/span&gt;&lt;/blockquote&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1715&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1700&quot; id=&quot;freeText2791055177639229718&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;1714&quot; instrument_node=&quot;&quot;&gt;I used to repeat the common wisdom that if only the WWI reparations hadn’t been imposed on Germany, there would have been no WWII. Now I understand that it would have been impossible to convince the Allies that the reparations weren’t necessary.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1713&quot;&gt;&lt;br data-dcnode-id=&quot;1712&quot;&gt;&lt;blockquote data-dcnode-id=&quot;1710&quot;&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;On August 25 the burning of Louvain began. The medieval city on the road from Liege to Brussels was renowned for its University and incomparable Library, founded in 1426...for the Germans burned Louvain not as a punishment for alleged Belgian misdeeds [defending their neutral country against the German invaders], but as a deterrent and a warning to all their enemies...General von Luttwitz, the new Governor of Brussels...visited in the course of duty by the American and Spanish Ministers, he said to them, “A dreadful thing has occurred at Louvain. Our General there has been shot by the son of the Burgomaster. The population has fired on our troops.” He paused, looked at his visitors, and finished, “And now of course we have to destroy the city.”&lt;/span&gt;&lt;/blockquote&gt;&lt;br data-dcnode-id=&quot;1709&quot;&gt;&lt;br data-dcnode-id=&quot;1708&quot;&gt;&lt;span data-dcnode-id=&quot;1707&quot; instrument_node=&quot;&quot;&gt;I knew, or remembered from school, next to nothing about the war. So Tuchman’s outstanding history gradually built the story and the ’suspense’ of how the Germans were halted into a narrative that kept me on the edge of my seat. Would the English finally fight? Would Gallieni get the troops he needed to defend Paris? Would the troops holding the eastern flank along the Moselle hold? I know it’s ridiculous to be anxious about a war one knows the outcome of, but her writing is that good.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1706&quot;&gt;&lt;br data-dcnode-id=&quot;1705&quot;&gt;&lt;span data-dcnode-id=&quot;1704&quot; instrument_node=&quot;&quot;&gt;Tuchman is masterful at summarizing the lead-up, and following each of the belligerents and key neutrals through the early weeks of mobilization and fighting. She outlines that master plans that underlay both German and French mobilization designs, with their opposite assumptions. She manages to paint quick, memorable portraits of the generals and politicians, so that you understand how each of their decisions followed from both situation and temperament. She spends just the right amount of time on each strategic and tactical decision before returning to another front to catch up with events there. And she describes the movements of each of France’s six armies and Germany’s seven armies on the western front so clearly that the reader never loses track of who’s where, even if she is listening rather than reading, as I was (although I had occasional reference to the maps in a paper version). &lt;/span&gt;&lt;br data-dcnode-id=&quot;1703&quot;&gt;&lt;br data-dcnode-id=&quot;1702&quot;&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;There is undoubtedly an allied bias in this history, but it is hard to understand how there could not be. However, Tuchman doesn’t flinch from showing all of the weaknesses, snobbery, fears, and confusion among the Allies. I ended aghast at the stupidity and destruction, to be shortly followed by more of the same.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;1597&quot; id=&quot;reviewTextContainer29294593&quot;&gt;&lt;span data-dcnode-id=&quot;1620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1613&quot; id=&quot;freeTextContainer12228365955711697501&quot;&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;I don't like technical books about military maneuvers--all that blather about Colonel Blimp, General von Bomb-them-all, and Prince Icantmakeupmymind, and the 5th Army Group attacks the XVI Corps on the right salient---yawn...&lt;/span&gt;&lt;br data-dcnode-id=&quot;1618&quot;&gt;&lt;span data-dcnode-id=&quot;1617&quot; instrument_node=&quot;&quot;&gt;Welcome to a book that makes all this nearly understandable. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1616&quot;&gt;&lt;br data-dcnode-id=&quot;1615&quot;&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt;Tuchman gives a great picture of the men who made the fatal errors of judgement which led to the four years of hell known as WW I and then resulted in, twenty years later, the even worse agony known as WW II. She i&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1612&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1602&quot; id=&quot;freeText12228365955711697501&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;1611&quot; instrument_node=&quot;&quot;&gt;I don't like technical books about military maneuvers--all that blather about Colonel Blimp, General von Bomb-them-all, and Prince Icantmakeupmymind, and the 5th Army Group attacks the XVI Corps on the right salient---yawn...&lt;/span&gt;&lt;br data-dcnode-id=&quot;1610&quot;&gt;&lt;span data-dcnode-id=&quot;1609&quot; instrument_node=&quot;&quot;&gt;Welcome to a book that makes all this nearly understandable. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1608&quot;&gt;&lt;br data-dcnode-id=&quot;1607&quot;&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt;Tuchman gives a great picture of the men who made the fatal errors of judgement which led to the four years of hell known as WW I and then resulted in, twenty years later, the even worse agony known as WW II. She is such a wonderful writer, and has so much knowledge, that she brings life, humor, and human interest to this long and sad saga of the old world order disappearing inexorably in a sucking quagmire of arrogance, stupidity,and criminally mistaken military decisions. This is a fascinating look at a widely diverse group of men who changed the history of the world and led us to the international messiness of today.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1605&quot;&gt;&lt;br data-dcnode-id=&quot;1604&quot;&gt;&lt;span data-dcnode-id=&quot;1603&quot; instrument_node=&quot;&quot;&gt;Most highly recommended to anyone who is interested in history or the military. &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1601&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;1498&quot; id=&quot;freeText15377354573548590624&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;In the 19th Century Henry David Thoreau eloquently stated: &lt;/span&gt;&lt;i data-dcnode-id=&quot;1513&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt;“I learned this, at least, by my experiment: that if one advances confidently in the direction of his dreams, and endeavors to live the life which he has imagined, he will meet with a success unexpected in common hours.”&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt; In the 20th Century, Barbara W. Tuchman full of vision, passion, discipline and self confidence, pursued her American dream and found such success. The historian extraordinaire lacked a PhD but proved to critics that her well focused mind evolved outside the confines of mainstream academics. This bold fact was highlighted in the Forward segment written by Robert K. Massie. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1511&quot;&gt;&lt;br data-dcnode-id=&quot;1510&quot;&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;Much has been written about the German mentality prior to the Great War (WWI). William II the German Kaiser had a thirst for war and the world traveler focused his sights on Paris, but in his life he would never set foot in the notorious French capital. Tuchman provides much insight into the pre-war political and social atmosphere of the Allied countries France, England and Belgium, which is often overlooked.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1508&quot;&gt;&lt;br data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;I appreciated her flair with imagery especially when she mentioned: &lt;/span&gt;&lt;i data-dcnode-id=&quot;1504&quot;&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;“Lanrezac understood him to say he intended employing it as mounted infantry in the line, a contemptible form of activity which the hero of Kimberly would as soon have used as a dry-fly fisherman would use live bait.”&lt;/span&gt;&lt;/i&gt;&lt;br data-dcnode-id=&quot;1503&quot;&gt;&lt;br data-dcnode-id=&quot;1502&quot;&gt;&lt;span data-dcnode-id=&quot;1501&quot; instrument_node=&quot;&quot;&gt;It was to be a true war, a brutal ugly war. As the flames of First Global War fanned out in August of 1914 the chapters detail the initial chess moves of each major participant. The German forward march through Belgium, a stationary pawn, set the tone with rampage looting and the purposeful killing of many innocent citizens. Tuchman’s masterpiece documents the August insane madness with no resolution. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1500&quot;&gt;&lt;br data-dcnode-id=&quot;1499&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;1386&quot; id=&quot;freeText2770512202963216193&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;I usually don't like war books that describe battle after battle but this book was different. Maybe because it was written by a woman historian? She kept the human element and didn't just spew fact after fact. I honestly didn't know that much about World War I history (except that Franz Ferdinand got shot, that it took awhile for the Americans to join, and Germany eventually lost) so I was in suspense to see what happened during this first month. While reading I got mad at the English commander, Sir John French, when he wouldn't help France in decisive battles unless they begged him. And cringed at the &quot;elan&quot; attitude of the French commanders at the beginning of the month. Most of the big action happened in August 1914 and the beginning of September and that is what this book covers. The rest of the war was 4 years of brutal, monotonous trench warfare. What a mess.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1385&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;1277&quot; id=&quot;freeText16573982392074535940&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;1284&quot; instrument_node=&quot;&quot;&gt;This book came highly recommended and I can now see why. Tuchman really brings the war to life, which is quite a harrowing experience, I have to say. This book would be a great starting point for any serious would-be-scholar of the First World War and has just the right general overview to detail ratio for the casual reader like myself.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1283&quot;&gt;&lt;br data-dcnode-id=&quot;1282&quot;&gt;&lt;span data-dcnode-id=&quot;1281&quot; instrument_node=&quot;&quot;&gt;It made me realise how we'd only studied the war from the British perspective at school (many, many, many years ago) and it was very interesting to see the French and German side of things. In fact, I'm not sure if it's my imagination, but the author seems to spend the majority of the book talking about the French point of view.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1280&quot;&gt;&lt;br data-dcnode-id=&quot;1279&quot;&gt;&lt;span data-dcnode-id=&quot;1278&quot; instrument_node=&quot;&quot;&gt;If you have any interest at all in World War I, you could do much worse than to read this book.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;
