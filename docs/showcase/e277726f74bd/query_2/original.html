t; d=&quot;M7 23.5h6.75V25H7v-1.5Z&quot; clip-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;  &lt;path fill-rule=&quot;evenodd&quot; d=&quot;M13.894 19.166 8.061 25 7 23.94l5.834-5.834 1.06 1.06ZM25 7v6.75h-1.5V7H25Z&quot; clip-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;  &lt;path fill-rule=&quot;evenodd&quot; d=&quot;M25 8.5h-6.75V7H25v1.5Z&quot; clip-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;  &lt;path fill-rule=&quot;evenodd&quot; d=&quot;M18.106 12.834 23.939 7 25 8.06l-5.834 5.834-1.06-1.06Z&quot; clip-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;/svg&gt;        &lt;span&gt;Agrandir l’image : Illustration 1&lt;/span&gt;    &lt;/button&gt;    &lt;div role=&quot;dialog&quot; aria-modal=&quot;true&quot; class=&quot;media-modal _hidden&quot;&gt;        &lt;h2 class=&quot;screen-reader-only&quot; id=&quot;modal_reference_1&quot;&gt;Agrandissement : Illustration 1&lt;/h2&gt;        &lt;span&gt;            &lt;button type=&quot;button&quot; class=&quot;media-modal-closer&quot; aria-describedby=&quot;modal_reference_1&quot;&gt;                &lt;svg class=&quot;icon&quot; aria-hidden=&quot;true&quot; focusable=&quot;false&quot; height=&quot;16&quot; width=&quot;16&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; viewbox=&quot;0 0 32 32&quot;&gt;  &lt;path fill-rule=&quot;evenodd&quot; d=&quot;M25.9 24.485a1 1 0 0 1-1.415 1.415L16 17.413 7.515 25.9A1 1 0 1 1 6.1 24.485L14.586 16 6.1 7.515A1 1 0 0 1 7.515 6.1L16 14.586 24.485 6.1A1 1 0 1 1 25.9 7.515L17.413 16l8.485 8.485Z&quot; clip-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;/svg&gt;                &lt;span&gt;Fermer&lt;/span&gt;            &lt;/button&gt;        &lt;/span&gt;        &lt;figure class=&quot;media&quot;&gt;            &lt;span class=&quot;media-container _hidden _pending&quot;&gt;                &lt;img class=&quot;_low-res&quot;&gt;                &lt;img class=&quot;_high-res&quot; src=&quot;https://static.mediapart.fr/etmagine/article_zoomed/files/2020/11/23/650a67c3-1349-4d01-a107-688139f76e1c.jpg&quot; fetchpriority=&quot;high&quot;&gt;            &lt;/span&gt;        &lt;/figure&gt;    &lt;/div&gt;&lt;/template&gt;&lt;/figure&gt;&lt;p&gt;Quite remarkably, I kept my New Years’ resolution this year: “Make 2020 a Visionary Year!” It sounds cheesy, yes, but I mean it sincerely.&lt;/p&gt;&lt;p&gt;Even more remarkably, I am leaving this year with even more optimism than I had when it began. Because I see things even better now. And no matter who is in the White House come January 20th, 2021, my vision will be more encompassing than it had been my whole life to date.&lt;/p&gt;&lt;p&gt;You see (pun intended), the trick is not to forget that there’s a full story, and instead to look at some parts of the story too closely. But most importantly, when you consider the full story to seek knowledge and understanding of it through compassion —humanity.&lt;/p&gt;&lt;p&gt;This quote comes to mind from Barbara W. Tuchman’s &lt;i&gt;A Distant Mirror: The Calamitous 14th Century: &lt;/i&gt;“Disaster is rarely as pervasive as it seems from recorded accounts. The fact of being on the record makes it appear continuous and ubiquitous whereas it is more likely to have been sporadic both in time and place. Besides, persistence of the normal is usually greater than the effect of the disturbance, as we know from our own times. After absorbing the news of today, one expects to face a world consisting entirely of strikes, crimes, power failures, broken water mains, stalled trains, school shutdowns, muggers, drug addicts, neo-Nazis, and rapists. The fact is that one can come home in the evening—on a lucky day—without having encountered more than one or two of these phenomena. This has led me to formulate Tuchman's Law, as follows: ‘The fact of being reported multiplies the apparent extent of any deplorable development by five- to tenfold’ (or any figure the reader would care to supply).”&lt;/p&gt;&lt;p&gt;Tuchman has written that it has been the method of dealing with the working class since the 14th century. The church and aristocracy worked to keep the masses illiterate and working in the fields to support them.&lt;/p&gt;&lt;p&gt;Read those two sentences again.&lt;/p&gt;&lt;p&gt;But the truth is, we all possess the 20/20 vision, we just have to find the courage to sit and be patient with the unknown and unfamiliar circumstances until the full story reveals itself. This requires faith and trust to navigate the course, especially when the waves are rough. Because the media is owned by today’s “aristocracy.”&lt;/p&gt;&lt;p&gt;Barbara Tuchman is very important and matters a great deal to me. You see, despite being part of the world’s top elite and the &lt;i&gt;crème de la crème&lt;/i&gt; of Manhattan, she was able on her own accord to write about history in literary terms, dismissing political influence.&lt;/p&gt;&lt;p&gt;Barbara Wertheim Tuchman was an American historian and author who won the Pulitzer Prize twice, for &lt;i&gt;The Guns of August&lt;/i&gt; (1962), a best-selling history of the prelude to and the first month of World War I, and &lt;i&gt;Stilwell and the American Experience in China&lt;/i&gt; (1971), a biography of General Joseph Stilwell.&lt;/p&gt;&lt;p&gt;Barbara Wertheim was born in 1912, the daughter of the banker Maurice Wertheim, an individual of wealth and prestige, the owner of &lt;a href=&quot;https://www.thenation.com/&quot;&gt;The Nation&lt;/a&gt; magazine, president of the American Jewish Congress, prominent art collector, and a founder of the Theatre Guild. Her mother was the daughter of Henry Morgenthau, Woodrow Wilson's ambassador to the Ottoman Empire. Despite her social status she was herself committed to intellectual honesty.&lt;/p&gt;&lt;p&gt;From an early age, Tuchman, who grew up on the Upper East Side and Park Avenue, rubbed shoulders with the nation’s cultural and political elite. Her mother was part of the Morgenthau clan, making Tuchman the granddaughter of Henry Sr., ambassador to the Ottoman Empire during World War I, and niece to Henry Jr., secretary of the treasury under Franklin Roosevelt. Robert Morgenthau, Manhattan’s legendary district attorney, was her cousin.&lt;/p&gt;&lt;p&gt;Though she wrote about historical events, Tuchman’s relations with professional academic historians were uneasy. According to her, her lack of academic title and graduate degree was a benefit: “It’s what saved me. If I had taken a doctoral degree, it would have stifled any writing capacity.” &lt;br&gt;&lt;/p&gt;&lt;p&gt;She accused historians of producing over-detailed studies that were unreadable. Instead, she preferred the literary approach. She was not a historian’s historian; she was a layperson’s historian who made the past interesting to millions of everyday readers. &lt;/p&gt;&lt;p&gt;Tuchman rejected the academic practice of prefabricating historical systems: &quot;The historian who puts his system first can hardly escape the heresy of preferring the facts which suit his system best.” I agree with her. An association with heretics is impossible.&lt;/p&gt;&lt;p&gt;Barbara Tuchman was born to a patrician family, but her quest for knowledge became her quest for truth. I adore her.&lt;/p&gt;&lt;p&gt;&lt;a href=&quot;/nicholas-molodyko/blog/billets_blog&quot;&gt;My writing on this site&lt;/a&gt; about &lt;a href=&quot;/nicholas-molodyko/blog/111019/war-lobby&quot;&gt;the War Lobby&lt;/a&gt; is a tribute to Barbara Tuchman’s powerful history of the 14th century, in &lt;i&gt;A Distant Mirror &lt;/i&gt;—a story of plague, war, brigandage, bad government, insurrection, and schism.&lt;/p&gt;&lt;p&gt;Tuchman showed how these realities resulted in unrest among the lower classes, a failure of will at the top, and a pervasive sense of disintegration, an atmosphere in which a “cult of death” flourished. I have used no less than those same words.&lt;/p&gt;&lt;p&gt;The War Lobby can be expressed more simply as the cult of death. This is why the conspiracy theory about satanists running things behind the scenes never quite goes away. Subconsciously, people know that we are dealing with human monsters.&lt;/p&gt;&lt;p&gt;In my modest attempt at writing about the &lt;a href=&quot;/nicholas-molodyko/blog/031220/500-words-service-nomads&quot;&gt;service nomads of globalism&lt;/a&gt;, I reflected upon how the Sephardim merchants of Amsterdam in the 17th century as Barbara Tuchman wrote in another context, offer a “distant mirror” that can be held up to the lives and issues faced by minority groups, in general, and Jews, specifically, today.&lt;/p&gt;&lt;p&gt;The ways in which the Sephardim grappled with the surrounding society, tolerance, the blending of cultures, and the limits of assimilation speak strongly to scholars confronting (or refusing to publicly confront, as the case may be) these very same issues in the modern world.&lt;/p&gt;&lt;p&gt;The economic and social opportunities for the Sephardim in 17th century Amsterdam presage the current discussions surrounding globalization and the formation and practice of &lt;a href=&quot;/nicholas-molodyko/blog/020920/500-words-identity-politics&quot;&gt;identity politics&lt;/a&gt; and &lt;a href=&quot;/nicholas-molodyko/blog/310820/500-words-multiculturalism&quot;&gt;multiculturalism&lt;/a&gt; specific to Zionism and &lt;a href=&quot;/nicholas-molodyko/blog/010920/500-words-settler-colonialism&quot;&gt;settler colonialism&lt;/a&gt;, in general.&lt;/p&gt;&lt;p&gt;If we use the “distant mirror” of history to study the positive factors that have allowed Jews and other minorities to live in productive harmony with their neighbors, we might achieve more than fighting anti-Semitism, racism, or even hate, in general.&lt;/p&gt;&lt;p&gt;Barbara Tuchman in &lt;i&gt;Bible and Sword&lt;/i&gt; verifies that our some of our &lt;a href=&quot;/nicholas-molodyko/blog/221120/introducing-puritans&quot;&gt;American forefathers were Protestant religious fanatics who claimed Judaism as their own&lt;/a&gt;. Some historians are quite well aware of all of this (but remain silent on the matter), most Jews are not. It was no secret — they flew the flag of Moses metaphorically, and culturally waged war with episcopal Christianity.&lt;/p&gt;&lt;p&gt;Protestantism has been partitioned greatly and is more divided theologically and ecclesiastically than the Catholic Church or Eastern Orthodoxy. Without any kind of unity in the Protestant Church, Christianity has been tremendously exploited for purely political purposes.&lt;/p&gt;&lt;p&gt;A theme throughout Tuchman’s work is the persistance of religion in politics, a seminal one that can only be addressed honestly —the importance and impact of religion.&lt;/p&gt;&lt;p&gt;During this &lt;i&gt;pause sanitaire&lt;/i&gt; we have been afforded the wealthy opportunity of 20/20 vision, to see the turbulent political climate from a distant mirror of intellectual honesty.&lt;/p&gt;&lt;p&gt;During the stay at home time, I suggest checking out &lt;a href=&quot;https://books.google.com/books/about/Practicing_History.html?id=h2lMI3FJTEMC&quot;&gt;&lt;i&gt;Practicing History: Selected Essays — Barbara Wertheim Tuchman&lt;/i&gt;&lt;/a&gt;. Tuchman presents ideas about history and how it should be written and then some of her actual writings are included to show why she is considered to be a master who rightly disagrees with trying to make history a science.&lt;/p&gt;&lt;p&gt;Narrative history is Barbara Tuchman’s medium—one which is not highly regarded in certain academic quarters. Her writing tells a story, because as she says, “human behavior is timeless.&quot;&lt;/p&gt;
                            &lt;/div&gt;

                    &lt;p class=&quot;gateaux-secs__text&quot;&gt;
                        Les cookies et technologies similaires que nous utilisons sur Mediapart sont de différentes natures et nous permettent de poursuivre différentes finalités. &lt;br&gt;&lt;br&gt; Certains sont nécessaires au fonctionnement du site et de l’application mobile (vous ne pouvez pas les refuser). D’autres sont optionnels mais contribuent à faciliter votre expérience de lecteur ou de lectrice et d’une certaine façon à soutenir Mediapart. Vous pouvez les refuser ou les accepter ci-dessous, selon leurs finalités. &lt;br&gt;&lt;br&gt; &lt;b&gt;Acceptez-vous que Mediapart utilise des cookies ou technologies similaires pour les finalités suivantes&amp;nbsp;?&lt;/b&gt; &lt;br&gt;&lt;br&gt; Vous pouvez faire votre choix, pour chaque catégorie, en activant ou désactivant le bouton interrupteur.

                            &lt;p class=&quot;gateaux-secs__text&quot;&gt;Connexion des abonné·es, mesure d’audience anonymisée, envoi des notifications push, suivi des pannes, mise en avant de nos services&amp;nbsp;: ces outils sont nécessaires au suivi de l’activité de nos services et à leur bon fonctionnement.&lt;/p&gt;

                                &lt;div class=&quot;gateaux-secs__details&quot; hidden&gt;
                                    &lt;p class=&quot;gateaux-secs__text&quot;&gt;Voici les différents cookies et technologies similaires compris dans cette catégorie&amp;nbsp;:&lt;/p&gt;
                                    &lt;ul class=&quot;gateaux-secs__text&quot;&gt;
                                                                                    &lt;li&gt;&lt;b&gt;Cookies d’authentification&lt;/b&gt;&amp;nbsp;: connexion des abonné·es.&lt;/li&gt;
                                                                                    &lt;li&gt;&lt;b&gt;AT Internet&lt;/b&gt;&amp;nbsp;: mesure d’audience anonymisée&lt;/li&gt;
                                                                                    &lt;li&gt;&lt;b&gt;Affichage de contenus éditoriaux multimédias&lt;/b&gt;&amp;nbsp;: vidéos (YouTube, Dailymotion, Vimeo, INA), réseaux sociaux (Facebook, Instagram, Pinterest, Twitter), documents (Scribd, Document Cloud, Slideshare), sons (SoundCloud, Spotify, Deezer), cartes (Google Maps, Mapbox, CartoDB, uMap), infographies (Highcharts, GitHub, Datawrapper, Flourish, Infogram, ThingLink, jQuery, Google Fonts, Bootstrap), live blogs (24liveblog, CoverItLive), aide à l’intégration de média dans les publications Journal et Club (Embedly).&lt;/li&gt;
                                                                                    &lt;li&gt;&lt;b&gt;Typeform&lt;/b&gt;&amp;nbsp;: questionnaires facultatifs pour recueillir les avis des lecteurs sur nos produits numériques.&lt;/li&gt;
                                                                                    &lt;li&gt;&lt;b&gt;Datadog (uniquement sur le site web)&lt;/b&gt;&amp;nbsp;: indicateurs techniques et équilibrage de charge.&lt;/li&gt;
                                                                                    &lt;li&gt;&lt;b&gt;Selligent (uniquement sur le site web)&lt;/b&gt;&amp;nbsp;: communication avec l’abonné·e, mise en avant des services, offres et avantages.&lt;/li&gt;
                                                                                    &lt;li&gt;&lt;b&gt;Batch (uniquement sur l’application)&lt;/b&gt;&amp;nbsp;: envoi de notifications push et de messages in-app.&lt;/li&gt;
                                                                                    &lt;li&gt;&lt;b&gt;Firebase Cloud Messaging (uniquement sur l’application)&lt;/b&gt;&amp;nbsp;: nécessaire au fonctionnement des notifications push sur Android.&lt;/li&gt;
                                                                                    &lt;li&gt;&lt;b&gt;Microsoft App Center (uniquement sur l’application)&lt;/b&gt;&amp;nbsp;: système de mise à jour et de suivi des pannes de l’application.&lt;/li&gt;
                                                                            &lt;/ul&gt;
