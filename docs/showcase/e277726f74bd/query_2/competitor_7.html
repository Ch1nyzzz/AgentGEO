&lt;/span&gt;&lt;header class=&quot;article-header img-wrapper&quot; data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;578&quot; style=&quot;background-image:url(https://www.historydegree.net/wp-content/uploads/2017/08/must-read-history-books-300x115.png)&quot;&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;category-link&quot; data-dcnode-id=&quot;580&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.historydegree.net/resources/&quot; title=&quot;View all posts in Resources&quot;&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;Resources&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;section class=&quot;article-content&quot; data-dcnode-id=&quot;294&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;566&quot;&gt;&lt;span data-dcnode-id=&quot;572&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;If you have a passion for history and want to pursue a degree in this field of study, you will undoubtedly want access to &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;569&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//historydegree.net/careers-for-history-majors/&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;570&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;information that can expand your knowledge&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;567&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;. From magazines to books to films and movies, there are many forms of information that you should take advantage of. As far as books go, though, let’s take a look at a few must-reads for anyone interested in history.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;565&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;562&quot;&gt;&lt;b data-dcnode-id=&quot;563&quot;&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;1. The Little Red Guard by Wenguang Huang&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;558&quot;&gt;&lt;span data-dcnode-id=&quot;559&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;This book depicts an ordinary family as they live their life in a Communist society. It clearly outlines and portrays how political ups and downs have a major impact on those who are helpless in terms of controlling their situations. The book follows a single family, yet this family represents multiple generations. It is through reading about these generations that you gain an understanding of how China changed so much in such a small amount of time. The book discusses how Huang’s grandmother was a victim of the old imperial system, yet she had a great passion for its traditions. She goes on to make the request that she be buried according to a traditional ceremony and in a coffin. While Huang’s parents think this notion is foolish, they do not want to hurt her feelings. As they go about filling her request, each step they take is enveloped with fear and paranoia. You will gain much more than a tour through history as you read this book. In addition, you will view how ordinary families experience and adapt to political upheaval.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;554&quot;&gt;&lt;b data-dcnode-id=&quot;555&quot;&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;2. Stalin’s Englishman by Andrew Lownie&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;550&quot;&gt;&lt;span data-dcnode-id=&quot;551&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;Stalin’s Englishman is a biography of the Cambridge Spy, Guy Burgess. Burgess was recruited back in the 1930s and he used his talent to pass intelligence to Soviet Russia. The biography is extensively researched and provides great detail about the culture during the time period it reflects.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;546&quot;&gt;&lt;b data-dcnode-id=&quot;547&quot;&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;3. The March of Folly: From Troy to Vietnam by Barbara W. Tuchman&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;542&quot;&gt;&lt;span data-dcnode-id=&quot;543&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;Tuchman is a master of style and has a special way of ushering graceful images into her writings. She is also prone to giving readers insightful quotes that you will want to memorize and share with your fellow history lovers. One of her most famous quotes is “To admit error and cut losses is rare among individuals, unknown among states.” While this quote does not come from the book title above — it comes from another must read by Tuchman, A Distant Mirror: The Calamitous Fourteenth Century — it is a direct reflection of the perfect thesis statement for The March of Folly. This book takes you through history allowing you to examine “one of the most compelling paradoxes of history: the pursuit by governments of policies contrary to their own interests.” Tuchman gives you an insightful view of Renaissance popes who had major greed and through their works demoted the church from being something that was viewed by society as something divine into something that in its own way stood in the way of divinity.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;538&quot;&gt;&lt;b data-dcnode-id=&quot;539&quot;&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;4. Eichmann in Jerusalem: A Report on the Banality of Evil by Hannah Arendt&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;537&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;534&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;Although the book does not provide an objective view of history, it does convey the author’s purpose of stripping Nazism from its glamour. Arendt uses the book to point out why she thinks the Holocaust was perpetrated. The book has a lot of controversy surrounding it because it is believed to provoke ire toward the Jewish community. As you read it you will see how the author criticizes some of the Jewish people for their actions during the Holocaust; it is these criticisms that have some readers angered toward Arendt.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;530&quot;&gt;&lt;b data-dcnode-id=&quot;531&quot;&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;5. Magna Carta by David Starkey&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;526&quot;&gt;&lt;span data-dcnode-id=&quot;527&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;A popular historian created a TV show out of the same name as the title of this book. The book itself has been adapted into an easy to read piece of content, providing readers with an easy way to follow the political happenings that majorly shaped the course of history around 1215.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;522&quot;&gt;&lt;b data-dcnode-id=&quot;523&quot;&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;6. The Tudors by G.J. Meyer&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;518&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;This book outlines the furious history behind one of the earth’s most famously-known royal lines. Meyer’s gives you a clear depiction of the legend of the Tudor dynasty. Not all readers of the book agree with the way Meyer’s depicts the main characters, but it definitely gives you an unusual viewpoint of how history actually took place.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;514&quot;&gt;&lt;b data-dcnode-id=&quot;515&quot;&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;7. A People’s History of the United States by Howard Zinn&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;510&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;You have probably heard of this book from the famous movie Good Will Hunting, and if you have ever asked a librarian for a good book on history, then a politically-minded librarian will undoubtedly suggest this reading. Why is it that this book is so famous? Well, mostly it is because of the reputation it holds. You will need a deep-thinking mind to get into this book as it is known for being one of the hardest to read. It is extremely dense and long, and for the most part, incredibly depressing. Throughout the book you will learn about a long list of people who have been crushed by unjustness. The book itself is not meant to be depressing. Instead, it is meant to examine the nation’s (USA) social progress and leave readers with a viewpoint that the progress is left wanting, not reaching its full potential.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;506&quot;&gt;&lt;b data-dcnode-id=&quot;507&quot;&gt;&lt;span data-dcnode-id=&quot;508&quot; instrument_node=&quot;&quot;&gt;8. Beautiful Idiots and Brilliant Lunatics by Rob Baker&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;502&quot;&gt;&lt;span data-dcnode-id=&quot;503&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;The collection found in this book can also be found on the author’s website, Another Nickel in the Machine. Celebrating both the history and culture of the 20th Century, Baker covers everything from the era’s criminals to its finest socialites.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;498&quot;&gt;&lt;b data-dcnode-id=&quot;499&quot;&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;9. SPQR: A History of Ancient Rome by Mary Beard&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;494&quot;&gt;&lt;span data-dcnode-id=&quot;495&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;Giving you a fresh, clear perspective of Ancient Rome, this book outlines one of the world’s most notorious superpowers in terms of political and economic bigfoots. You skip through more than 1000 years of civilization when reading this book and the knowledge you receive is extremely rewarding.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;493&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;490&quot;&gt;&lt;b data-dcnode-id=&quot;491&quot;&gt;&lt;span data-dcnode-id=&quot;492&quot; instrument_node=&quot;&quot;&gt;10. Games Without Rules: The Often-Interrupted History of Afghanistan by Tamim Ansary&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;486&quot;&gt;&lt;span data-dcnode-id=&quot;487&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;488&quot; instrument_node=&quot;&quot;&gt;The game referred to in this title is known as buzkashi. If you have never heard of this game, you will likely think it is very weird. Players in a game of buzhashi spend their time — sometimes for days on end — dragging a goat carcass to a goal. There are many different conditions in which the game can be played, and being that it is conducted according to basically no official rules, it has gained the nickname of being “the game without rules.” Truth is, though, there are rules that the game is to be played by, and as Ansary states in the book, if you don’t know the rules, you shouldn’t be playing. This is an accurate metaphor for the history of Afghanistan. As you read the book you will gain an in-depth understanding of the ways in which Afghanistan has been attempted to be modernized with no success. You will also learn how modern attempts to steer the country in certain directions have failed miserably and backfired. If you have a preference for diplomacy over military action, then this is definitely a book you will want to read.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;485&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;482&quot;&gt;&lt;b data-dcnode-id=&quot;483&quot;&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;11. The Sea and Civilization: A Maritime History of the World by Lincoln Paine&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;478&quot;&gt;&lt;span data-dcnode-id=&quot;479&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;480&quot; instrument_node=&quot;&quot;&gt;Taking you back to pre-Columbus travel, this book gives you a view of the history of the world explained by a man and his relationship to the sea. You will gain a beautiful view of how seafaring has impacted globalization as well as how water isn’t used merely for just the trade of goods.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;474&quot;&gt;&lt;b data-dcnode-id=&quot;475&quot;&gt;&lt;span data-dcnode-id=&quot;476&quot; instrument_node=&quot;&quot;&gt;12. The Secret History of the Mongol Queens by Jack Weatherford&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;473&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;470&quot;&gt;&lt;span data-dcnode-id=&quot;471&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;When most people think of the Mongol Empire, they envision a bunch of horsemen riding into town, causing havoc and ruining everything in their path. This book, though, takes a deeper look at the Mongol Empire and the truth behind its history. It was not a plot of land simply controlled by a bunch of horsemen. The empire itself had a huge impact on government, especially in Europe and China. And not only did its impact spread on a political basis, but as well as on a cultural and economic basis too. As you read this book you will also learn about the balance that was sustained between the religions of Christianity and Islam in Eurasia. Please note that reading this book will require you to have a strong stomach as lots of warfare is explained in great detail.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;466&quot;&gt;&lt;b data-dcnode-id=&quot;467&quot;&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;13. Headstrong – 52 Women Who Changed Science and the World by Rachel Swaby&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;462&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;This is an absolute must-read book that outlines 52 impressive Women who are known for being scientific pioneers. Although many of them have slipped under the radar during much of the past, this book brings them to light and shows you just how much they have contributed to our societies.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;458&quot;&gt;&lt;b data-dcnode-id=&quot;459&quot;&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;14. The English and Their History by Robert Tombs&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;454&quot;&gt;&lt;span data-dcnode-id=&quot;455&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;You’ll read more than a 1,000 pages if you finish this book, so you may find it as a surprise that readers often describe the literature as being a condensed piece outlining the history of England. The epic voyage explained in the book gives you a clear picture of what it means to be truly English.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;450&quot;&gt;&lt;b data-dcnode-id=&quot;451&quot;&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;15. A Little History of the World by E.H. Gombrich&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;446&quot;&gt;&lt;span data-dcnode-id=&quot;447&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;An Austrian art historian wrote this book, giving you proof that your history degree can be put to good use by becoming an author. The book was written in only a few weeks’ time and was originally meant to be a children’s book. Published in 1936, A Little History of the World became an immediate success within German-speaking countries and was eventually translated into multiple languages. Why is this book so special? Because it gives you a clear perception of history from the viewpoint of German-speaking people. The language found throughout the book is a bit old-fashioned, which gives you a clear indication of how history changes over time. One of the most treasured aspects of the book is that it is easy to understand, providing “gentle, simple, and lyrical” language throughout.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;442&quot;&gt;&lt;b data-dcnode-id=&quot;443&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;16. Men at War: What Fiction Tells Us about Conflict, from the Iliad to Catch-22 by Christopher Coker&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;438&quot;&gt;&lt;span data-dcnode-id=&quot;439&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;440&quot; instrument_node=&quot;&quot;&gt;Known for being one of LSE’s best professors, Coker combines a study of war myths with fiction. He delivers a detailed masterpiece of archetypes, what they depict and what we can learn from them.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;437&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;434&quot;&gt;&lt;b data-dcnode-id=&quot;435&quot;&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt;17. Night Walking by Matthew Beaumont&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;430&quot;&gt;&lt;span data-dcnode-id=&quot;431&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;This is a weighty academic piece and provides a good view of life in London once the lights go out. Many readers say the journey they go on when reading this book is a bit dark as the author shows you exactly what happens when the dispossessed take to the streets. Still yet, the readers also say the journey they go on while finishing the book is very enlightening and illuminating, making it a must-read book for history lovers.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;426&quot;&gt;&lt;b data-dcnode-id=&quot;427&quot;&gt;&lt;span data-dcnode-id=&quot;428&quot; instrument_node=&quot;&quot;&gt;18. Napoleon the Great by Andrew Roberts&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;425&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;422&quot;&gt;&lt;span data-dcnode-id=&quot;423&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;Sure, many people might find it a bit of a struggle to title a man who was responsible for millions of deaths as “great,” Roberts delivers an inspiring proposal as to why Napoleon deserves this name. Napoleon was a genius who strived to conquer the world and was considered a major over-achiever. If you are interested in learning about him, then this a book you will greatly enjoy.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;418&quot;&gt;&lt;b data-dcnode-id=&quot;419&quot;&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt;19. Hitler: Ascent, 1889-1939 by Volker Ullrich&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;414&quot;&gt;&lt;span data-dcnode-id=&quot;415&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;416&quot; instrument_node=&quot;&quot;&gt;Book reviews don’t often go viral, but the New York Time’s review of this book most certainly did, and for a very good reason. One of the most notable aspects of the book is that the author never draws a direct connection to Hitler with today’s modern-day politics. Instead, he simply outlines “how the rise of the fascist leader came to pass.” The book is extremely detailed and helps readers gain a better understanding of the myths behind how Hitler came into his power.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;413&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;410&quot;&gt;&lt;b data-dcnode-id=&quot;411&quot;&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt;20. Valiant Ambition by Nathaniel Philbrick&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;406&quot;&gt;&lt;span data-dcnode-id=&quot;407&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;There are very few characters found through American history that have been so misunderstood as Benedict Arnold, a Revolutionary War figure. Philbrick, however, uses his book, Valiant Ambition, to give you a true depiction of Benedict Arnold. He states, “Although it later became convenient to portray Arnold as a conniving Satan from the start, the truth is more complex and, ultimately, more disturbing.” Philbrick also goes on to point out that if it hadn’t been for the uncovering of his treason, Americans may have never discovered the truth — that their real threats to freedom weren’t coming from an outside source. Instead, they were coming from within.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;405&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;400&quot;&gt;&lt;b data-dcnode-id=&quot;403&quot;&gt;&lt;span data-dcnode-id=&quot;404&quot; instrument_node=&quot;&quot;&gt;21. Histories by Herodotu&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;401&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;402&quot; instrument_node=&quot;&quot;&gt;s&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;399&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;396&quot;&gt;&lt;span data-dcnode-id=&quot;397&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;398&quot; instrument_node=&quot;&quot;&gt;This book is believed to be among the first pieces of historical literature in the Western hemisphere. It offers a detailed glimpse regarding lives and customs of those who were living in Herodotus’ time. When reading the book, you’ll definitely want to take advantage of the translated version provided by Penguin Classics as it does a great amount of justice to the author’s original content. As you’re reading, you’ll be provided with a plethora of endnotes and helpful annotations that help you decipher truth from fiction. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;395&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;392&quot;&gt;&lt;b data-dcnode-id=&quot;393&quot;&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;22. D-Day Through German Eyes by Holger Eckhertz&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;385&quot;&gt;&lt;span data-dcnode-id=&quot;386&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;Many &lt;/span&gt;&lt;a data-dcnode-id=&quot;388&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//historydegree.net/using-history-books-to-expand-your-career/&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;389&quot; instrument_node=&quot;&quot;&gt;history books&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt; that you have likely read probably give an account of D-Day through the perspectives of allies. With D-Day through German Eyes, though, you get a fresh look at the conflict that arose during this period of time through an entirely different lens. You’ll see as you read the book that it humanizes the German soldier and allows you to understand what they experienced when stationed in Normandy. Do be prepared, however, to read sections of the book that are extremely detailed and graphics.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;381&quot;&gt;&lt;b data-dcnode-id=&quot;382&quot;&gt;&lt;span data-dcnode-id=&quot;383&quot; instrument_node=&quot;&quot;&gt;23. Rise and Fall of Great Powers by Paul Kennedy&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;380&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;377&quot;&gt;&lt;span data-dcnode-id=&quot;378&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;There has always been a bit of debate over the rise and fall of post-Renaissance powers, but with the Rise and Fall of Great Powers by Paul Kennedy, you get an up-close-and-personal look at 500 years of history. You’ll learn about the economic strength of Portugal as well as its military power, both of which played a vital role in the decline of the nation. Readers constantly rave about this book and its presentation of so much historical data. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;373&quot;&gt;&lt;b data-dcnode-id=&quot;374&quot;&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;24. Guns, Germs and Steel by Jared Diamond&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;369&quot;&gt;&lt;span data-dcnode-id=&quot;370&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt;You’ll study over 13,000 years of history when reading Guns, Germs and Steel by Jared Diamond. This Pulitzer Prize-winning book strives to detail how geography combined with differentials in the environment played such a large role in the technological prominence of Eurasian civilizations. In regards to the divergence between Eurasia and other civilizations, the book presents strong refutations that buck up to outdated theories of genetics. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;365&quot;&gt;&lt;b data-dcnode-id=&quot;366&quot;&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt;25. Stalingrad by Antony Beevor&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;361&quot;&gt;&lt;span data-dcnode-id=&quot;362&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;New York Times raves about Stalingrad, boasting “The colossal scale of Stalingrad, the megalomania, the utter absurdity, the sheer magnitude of the carnage … are marvelously captured in Antony Beevor’s new history, ”Stalingrad.” This Wolfson History Prize-winning book easily became one of Beevor’s best sellers thanks to its detailed narrative regarding the Stalingrad battle that took place between the Germans and Soviets. Nearly two million lives were lost during the battle and while reading the book, you’ll enjoy skillful storytelling that makes you feel as if you are actually a part of the battle yourself. You’ll learn all about the brutal details of the battle and you may even find yourself shedding a tear from time to time. One thing that is for sure is that your interest will be captured from the very first page to the very last word of the book. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;357&quot;&gt;&lt;b data-dcnode-id=&quot;358&quot;&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;26. The Guns of August by Barbara Tuchman&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;353&quot;&gt;&lt;span data-dcnode-id=&quot;354&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;Another book authored by the renowned Barbara Tuchman, The Guns of August is a classic that definitely earns its Pulitzer award. Throughout the book, you’ll learn about the many grim events that took place and led up to World War I. You’ll be wowed with Tuchman’s amount of knowledge regarding the war and how she uses her amazing writing skills to deliver a piece that transforms history into a piece of fine literature. Not only will you learn about the details leading up to the war, but you’ll also get an insightful view of what could have happened to prevent the war from ever taking place.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;349&quot;&gt;&lt;b data-dcnode-id=&quot;350&quot;&gt;&lt;span data-dcnode-id=&quot;351&quot; instrument_node=&quot;&quot;&gt;27. Why Nations Fail by Daron Acemoglu and James A. Robinson&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;348&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;345&quot;&gt;&lt;span data-dcnode-id=&quot;346&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;347&quot; instrument_node=&quot;&quot;&gt;This book gives you a detailed overview of Western Europe and how it eventually became a global hegemon. It provides extensive data outlining why some nations failed and were never developed and why some rose to such prominence and acquired great power. As you’re reading the book, you’ll see an underlying theme that promotes the theory that institutions have had a large impact on individual nations’ trajectories. An amazing 15 years of research are combined in the book and by the time you’re finished reading, you’ll feel confident in being able to answer the always-debatable question of why do some nations fail?&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;341&quot;&gt;&lt;b data-dcnode-id=&quot;342&quot;&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt;28. Game of Queens: The Women Who Made Sixteenth-Century Europe by Sarah Gristwood&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;340&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;337&quot;&gt;&lt;span data-dcnode-id=&quot;338&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;For anyone interested in the history of the queens who made the 16th Century all that it was, the book Game of Queens by Sarah Gristwood is a must-read. From Anne Boleyn to Isabella of Castile to other Queens and Tudors, this book not only provides great insights into the powers these women held but also provides an outline of how they rose to such power. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;336&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;333&quot;&gt;&lt;b data-dcnode-id=&quot;334&quot;&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;29. Ten Restaurants That Changed America by Paul Freedman&lt;/span&gt;&lt;/b&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;332&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;329&quot;&gt;&lt;span data-dcnode-id=&quot;330&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;331&quot; instrument_node=&quot;&quot;&gt;Not every book to do with history has to be about queens and kings and battles and wars. With Paul Freedman’s book, Ten Restaurants That Changed America, you’ll learn how the culinary culture of the United States has been shaped and how the restaurants of the nation constantly conform to the nation’s identity. Over the course of the book, you’ll study 10 restaurants that are believed to have been extremely influential in the food industry in America. This is a must-read for all of you foodies. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;328&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;325&quot;&gt;&lt;span data-dcnode-id=&quot;326&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;327&quot; instrument_node=&quot;&quot;&gt;Must Read History Books&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;316&quot;&gt;&lt;span data-dcnode-id=&quot;322&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;Whether you are &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;319&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//historydegree.net/online-history-degree/&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;320&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;pursuing a degree in history&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;317&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;318&quot; instrument_node=&quot;&quot;&gt; or not, buffering your knowledge of history is an excellent way to expand your knowledge for any career. As you learn about mistakes and failures made throughout history, you can use them to propel yourself to success in any line of work. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;312&quot;&gt;&lt;span data-dcnode-id=&quot;313&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;Even though we’ve outlined several must-read history books above, it’s important to note that there are literally millions of other history-related books that are worth reading. There are also a ton of blogs and articles you can find all across the Internet that gives you detailed glimpses into past societies. And sometimes, one of the best ways to understand history books is to read through reviews. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;311&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;301&quot;&gt;&lt;span data-dcnode-id=&quot;309&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;310&quot; instrument_node=&quot;&quot;&gt;The Internet is a go-to source for learning about history, but don’t forget about the numerous &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;306&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//historydegree.net/history-library/&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;307&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;308&quot; instrument_node=&quot;&quot;&gt;libraries all across the globe that are home to some of the world’s best history books&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;304&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;305&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/span&gt;&lt;br data-dcnode-id=&quot;303&quot;&gt;&lt;span data-dcnode-id=&quot;302&quot; instrument_node=&quot;&quot;&gt;
