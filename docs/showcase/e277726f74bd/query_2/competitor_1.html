&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;3677&quot; id=&quot;reviewTextContainer3780199725&quot;&gt;&lt;span data-dcnode-id=&quot;3704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3702&quot; id=&quot;freeTextContainer15370116038213254668&quot;&gt;&lt;span data-dcnode-id=&quot;3703&quot; instrument_node=&quot;&quot;&gt;Historian and two-time Pulitzer Prize winner Barbara W. Tuchman was known for her substantial amount of contributions to the genre of history, and just before passing away, she added one final historical work to bookshelves and audiences alike. In taking on the unique task of researching and writing about the American Revolution through the transcontinental financial and wartime policies of the Dutch Republic, England, and France, this book meets its target—but misses drastically when keeping th&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3682&quot; id=&quot;freeText15370116038213254668&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;3700&quot; instrument_node=&quot;&quot;&gt;Historian and two-time Pulitzer Prize winner Barbara W. Tuchman was known for her substantial amount of contributions to the genre of history, and just before passing away, she added one final historical work to bookshelves and audiences alike. In taking on the unique task of researching and writing about the American Revolution through the transcontinental financial and wartime policies of the Dutch Republic, England, and France, this book meets its target—but misses drastically when keeping the reader’s attention, sense of depth, and pleasure. Beginning with the very first acknowledgement of American Independence from a foreign nation (by a colony of the Dutch Republic), and ending with the aftermath and legacy of Yorktown, Tuchman sets a nice pace throughout.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3699&quot;&gt;&lt;br data-dcnode-id=&quot;3698&quot;&gt;&lt;span data-dcnode-id=&quot;3697&quot; instrument_node=&quot;&quot;&gt;Unfortunately, the chronology feels scattered by such random tangents as the naval escapades of England’s Admiral Rodney, overdrawn histories of the rivalries and alliances of the three European powers being discussed, and ultra-specific details on such matters as negotiations, frustrations, and battles. As the focus is a bit blurred from one plot being uncovered to the next, the real gems are found in the alliance between France and America. Whether involving French matters of trade policy with the infant nation, or the manner of titles in command and troop strength in battles—there are fascinating tidbits and concise biographies of France’s contribution and its liberty-minded gentry:&lt;/span&gt;&lt;br data-dcnode-id=&quot;3696&quot;&gt;&lt;br data-dcnode-id=&quot;3695&quot;&gt;&lt;i data-dcnode-id=&quot;3693&quot;&gt;&lt;span data-dcnode-id=&quot;3694&quot; instrument_node=&quot;&quot;&gt;…Tarleton had led his Cavalry Legion out for foraging and was returning with wagons loaded with Indian corn when he was met in a narrow lane by Lauzun’s legion armed with lances. When a horse wounded by a lance thrust collided with Tarleton’s, he was thrown; his dragoons scrambled to his rescue, enabling him to seize another horse to remount and escape under the protective rifle fire of his infantry. Outnumbered, they were ordered by Tarleton to retreat, while Lauzun’s men charged in pursuit, protected in their turn by the steady fire of the Virginia militia.&lt;/span&gt;&lt;/i&gt;&lt;br data-dcnode-id=&quot;3692&quot;&gt;&lt;br data-dcnode-id=&quot;3691&quot;&gt;&lt;span data-dcnode-id=&quot;3690&quot; instrument_node=&quot;&quot;&gt;By the end of the book, it becomes apparent that each chapter discussed could very well have had its own separate book—and that wouldn’t necessarily be an issue when considering Tuchman’s expertise and commitment to thorough research. While interesting in its scope and discussion of the foreign weight and influence in the American Revolution, the dryness and spotlights on minor affairs and people involved may leave the reader rather fatigued and unfulfilled by an otherwise fascinating transcontinental history. Detailed maps and a generous amount of illustrations accompany this book, as well as an extensive amount of source material.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3689&quot;&gt;&lt;br data-dcnode-id=&quot;3688&quot;&gt;&lt;i data-dcnode-id=&quot;3683&quot;&gt;&lt;span data-dcnode-id=&quot;3687&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;3509&quot; id=&quot;freeTextContainer1276269435491668695&quot;&gt;&lt;span data-dcnode-id=&quot;3510&quot; instrument_node=&quot;&quot;&gt;Call me a traditionalist, but I think it is reasonable to assume that a book promising to be about the American Revolution, even one claiming a &quot;fresh approach&quot;, should have more than a passing reference to the battle for American independence. Instead, Barbara Tuchman has given us a very scholarly and well-researched discourse on the Dutch and British navies, with an occasional mention of the conflict in the colonies. Ms. Tuchman wants to demonstrate the importance of the Dutch navy, the Dutch'&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3508&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3491&quot; id=&quot;freeText1276269435491668695&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;3507&quot; instrument_node=&quot;&quot;&gt;Call me a traditionalist, but I think it is reasonable to assume that a book promising to be about the American Revolution, even one claiming a &quot;fresh approach&quot;, should have more than a passing reference to the battle for American independence. Instead, Barbara Tuchman has given us a very scholarly and well-researched discourse on the Dutch and British navies, with an occasional mention of the conflict in the colonies. Ms. Tuchman wants to demonstrate the importance of the Dutch navy, the Dutch's recognition of American vessels, and their willingness to trade with the colonies despite Britain's embargo, on the overall outcome of the war. That is all well and good, but she gets so hopelessly bogged down in detail that the average reader loses focus as she meticulously explores topics such as the history of the &quot;ship of the line&quot; method of naval warfare, complete with irrelevant digressions on earlier British court martials of admirals from the 1740's who deviated from the rigid rules of naval warfare. If you have a unique interest in the conflict between the British and Dutch navies, and the historical context of the American Revolution to that European conflict, than this is the book for you.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3506&quot;&gt;&lt;br data-dcnode-id=&quot;3505&quot;&gt;&lt;span data-dcnode-id=&quot;3504&quot; instrument_node=&quot;&quot;&gt;A glaring error is her treatment of Burgoyne's surrendered army.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3503&quot;&gt;&lt;br data-dcnode-id=&quot;3502&quot;&gt;&lt;span data-dcnode-id=&quot;3501&quot; instrument_node=&quot;&quot;&gt;Twice she refers to it as being paroled back to Europe, when it wasn't. Gates terms were too generous for the Continental Congress, and King George III would have adamantly refused to officially recognise the rebellion if it approving the scheme of exchange had ever reached him officially.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3500&quot;&gt;&lt;br data-dcnode-id=&quot;3499&quot;&gt;&lt;span data-dcnode-id=&quot;3498&quot; instrument_node=&quot;&quot;&gt;Furthermore, the &quot;convention army&quot; was not just never paroled, it stayed in the colonies, marched from Boston to Virginia then Pennsylvania as determined by the Congress, until the end of the war; all the while losing over 40% of the 6224 POW's to desertion, ie they liked what they saw in America to life back home with their families, etc.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3497&quot;&gt;&lt;br data-dcnode-id=&quot;3496&quot;&gt;&lt;span data-dcnode-id=&quot;3495&quot; instrument_node=&quot;&quot;&gt;This book is a serious page turner. Too bad that Tuchman doesn't stop at her available documentation. When she runs out of direct quotes and well documented facts, she speculates. It is a shame to see someone who is obviously such a meticulous scholar jump to such conclusions when the facts she had at hand were more than adequate. While trying and to a point succeeding to give an adequate picture of the minds of people like Generals Clinton and Cornwallis, and Admiril Rodney, Tuchman uses eighteenth facts combined with twentieth century sensibilities. The chronicals a large part of the revolutionary war, and the queat to bring an end to Britian's naval superiority in American waters. Tuchman does a wonderful job of searching through accounts of events and battles, but doesn't stop there. When she has told the facts as they are documented, she begins to speculate, perpetuating a number of myths about american social and military history that have taken a century to begin to dispel. This is inexcusable as in many cases the plain truth of the Americans fighting from behind rocks and trees from Lexington to Yorktown have been dispelled and are easy to document as she proves herself, when she provides a map of the siege at youktown laying out the lovely linear siege tactics employed by the French and Americans. She implies that Cornwallis at Yorktown was more interested in preserving some mideavil idea of honor by requesting to march out of Yorktown with his colors displayed in full parade. Her condescinding tone criticises the general sharply without bothering to examine that the military standards of the day dictate that if your defenses are breeched to the point that you can march out through them in full parade and regailia, you are essentially indefensible. If you don't march out, basically, your enemy will march in the same way. Cornwallis wished to prove and document for all time that he was indefensible. Tuchman robs this sad historical figure of this consideration and ridicules him for it. One of the problems I find with historians when it comes to the Rev. War is that without making a study of military history, they make a habit of forming conclusions, which First Salute does repeatedly.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3494&quot;&gt;&lt;br data-dcnode-id=&quot;3493&quot;&gt;&lt;span data-dcnode-id=&quot;3492&quot; instrument_node=&quot;&quot;&gt;The book is diffuse and a bit chaotic - certainly I understand her premise: in telling the history of the Revolutionary War at sea, and its effect on the world itself, it is certainly necessary to detail preceding events - certainly the war of independence was not an isolated event, but one of a web of changing international conditions. But her scope is so ambitious, and her seeming energy and will to accomplish so weak, that I had the feeling of reading a pile of miscellaneous facts, some of them not particularly well researched, rather than a coherent discussion. Admiral Rodney, despite being sidelined during much of the conflict, is given a outsized portion of this book - we have details of his debts and his preoccupations which tell us why he was not there; relevant to an extent that it illustrates the British mishandling of leadership, but not worth page after page - in a book the scope and size of Distant Mirror, this may have been absorbed; in a book this size this admittedly nicely studied character dominates the book, without dominating the story.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3490&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;3273&quot; id=&quot;reviewTextContainer1633121729&quot;&gt;&lt;span data-dcnode-id=&quot;3290&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3288&quot; id=&quot;freeTextContainer1903822553285249716&quot;&gt;&lt;span data-dcnode-id=&quot;3289&quot; instrument_node=&quot;&quot;&gt;This is the first book of Barbara Tuchman that I read and the irony for me is that this is the last one she wrote prior to her death in 1988. I have had Ms. Tuchman’s books on the radar for quite some time and I am hoping to get to her book “Guns of August” before the end of this year or early 2017. Ms. Tuchman had dedicated this book to her four grandchildren – keeping this thought in mind I could see clearly how she was also attempting to teach her grandchildren the finer more detailed levels &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3287&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3278&quot; id=&quot;freeText1903822553285249716&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;3286&quot; instrument_node=&quot;&quot;&gt;This is the first book of Barbara Tuchman that I read and the irony for me is that this is the last one she wrote prior to her death in 1988. I have had Ms. Tuchman’s books on the radar for quite some time and I am hoping to get to her book “Guns of August” before the end of this year or early 2017. Ms. Tuchman had dedicated this book to her four grandchildren – keeping this thought in mind I could see clearly how she was also attempting to teach her grandchildren the finer more detailed levels of the time period. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3285&quot;&gt;&lt;br data-dcnode-id=&quot;3284&quot;&gt;&lt;span data-dcnode-id=&quot;3283&quot; instrument_node=&quot;&quot;&gt;What I thoroughly enjoyed in this book was how it dovetailed with Volume III – The Age of Revolution from A History of English Speaking Peoples (Sir W.S. Churchill) with respect to the section on the “American War for Independence.” The book is properly titled “The First Salute” the coexisting sub-title is in my opinion brilliantly placed. The act of the first salute is a keyhole in a door (if you will) to which one can bend down a bit and peep through the hole to see the much larger room and how the view of the whole by the simple act of a gun salute to the Andrew Doria one of 4 merchant ships of the time converted to create the Continental Navy following the Second Session of the Continental Congress of 1775 – she carried sixteen 6-pounders and was 75 feet in length with a width of 25 feet. She had a hermaphrodite rigging system of square sails on her mainmasts and triangular fore and aft. She carried a crew of 130 and contained many swivel guns atop her deck rails. What Ms. Tuchman was so detailed in this book specifically on was the description of raunchy sea going life of a sailor that was for the time frame. She writes in such a fashion that one can hear the songs of grog drunken sailors and port stops where women entered the berthing areas for a round of interludes. She applies this same sort of feel and writing to the whole of the book and the whole of the book is dedication to the Revolutionary War.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3282&quot;&gt;&lt;br data-dcnode-id=&quot;3281&quot;&gt;&lt;span data-dcnode-id=&quot;3280&quot; instrument_node=&quot;&quot;&gt;Any person interested in the American Revolution will find this book to be a treat – especially those persons that have dived into the topic above the surface and into the manner to which methods of war were fought. This book is now indelibly intertwined with my personal being as during the course of this read my own Father had passed away – this is also a reason it took me so long to finish.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3279&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3277&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;3053&quot; id=&quot;freeTextContainer6140613601575585998&quot;&gt;&lt;span data-dcnode-id=&quot;3057&quot; instrument_node=&quot;&quot;&gt;Tuchman delivers a history of the American Revolution with a perspective on repercussions for Europe. She sees the War of American Independence as the beginning of the modern Western world, where inflamed passions would presage the upheavals of the nineteenth century. She makes an excellent example of France, which in coming to the aid of the colonists, basically bankrupted herself and set the stage for her own revolution, just around the corner. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3056&quot;&gt;&lt;br data-dcnode-id=&quot;3055&quot;&gt;&lt;span data-dcnode-id=&quot;3054&quot; instrument_node=&quot;&quot;&gt;Given the large sweep of history to be explored, &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3052&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;3034&quot; id=&quot;freeText6140613601575585998&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;3051&quot; instrument_node=&quot;&quot;&gt;Tuchman delivers a history of the American Revolution with a perspective on repercussions for Europe. She sees the War of American Independence as the beginning of the modern Western world, where inflamed passions would presage the upheavals of the nineteenth century. She makes an excellent example of France, which in coming to the aid of the colonists, basically bankrupted herself and set the stage for her own revolution, just around the corner. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3050&quot;&gt;&lt;br data-dcnode-id=&quot;3049&quot;&gt;&lt;span data-dcnode-id=&quot;3048&quot; instrument_node=&quot;&quot;&gt;Given the large sweep of history to be explored, Barbara Tuchman also finds time to focus on individuals, such as George Washington and Lord Cornwallis. While I have always found the author rather dry, I nevertheless enjoyed her telling of the saga. The Americans had some rather eccentric leaders and the most amazing part is that they somehow managed to work together to achieve one objective.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3047&quot;&gt;&lt;br data-dcnode-id=&quot;3046&quot;&gt;&lt;i data-dcnode-id=&quot;3040&quot;&gt;&lt;span data-dcnode-id=&quot;3045&quot; instrument_node=&quot;&quot;&gt;&quot;I have come to the conclusion that one useless man is called a disgrace. &lt;/span&gt;&lt;br data-dcnode-id=&quot;3044&quot;&gt;&lt;span data-dcnode-id=&quot;3043&quot; instrument_node=&quot;&quot;&gt;That two are called a law firm.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3042&quot;&gt;&lt;span data-dcnode-id=&quot;3041&quot; instrument_node=&quot;&quot;&gt;And that three or more become a Congress.&quot;&lt;/span&gt;&lt;/i&gt;&lt;br data-dcnode-id=&quot;3039&quot;&gt;&lt;span data-dcnode-id=&quot;3038&quot; instrument_node=&quot;&quot;&gt;- John Adams&lt;/s ll, an interesting take, although the indirect development of the work can be almost maddening at times.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2834&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2832&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;2300&quot; id=&quot;reviewTextContainer313566871&quot;&gt;&lt;span data-dcnode-id=&quot;2322&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2317&quot; id=&quot;freeTextContainer13930465935069742641&quot;&gt;&lt;span data-dcnode-id=&quot;2321&quot; instrument_node=&quot;&quot;&gt;I have read nearly all of this author’s historical works; and after a slow start, I really enjoyed reading this one about the American Revolution and the effects it had on most of the other Western countries besides Great Britain. (At one point, Empress Catherine II of Russia (Catherine the Great) offered to mediate the disputes between Great Britain and her American colonies.)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2320&quot;&gt;&lt;br data-dcnode-id=&quot;2319&quot;&gt;&lt;span data-dcnode-id=&quot;2318&quot; instrument_node=&quot;&quot;&gt;Generally, the book covers the period from 1776 to 1781, and covers the salute to the American colors of the Andrew Dori&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2316&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;2305&quot; id=&quot;freeText13930465935069742641&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2315&quot; instrument_node=&quot;&quot;&gt;I have read nearly all of this author’s historical works; and after a slow start, I really enjoyed reading this one about the American Revolution and the effects it had on most of the other Western countries besides Great Britain. (At one point, Empress Catherine II of Russia (Catherine the Great) offered to mediate the disputes between Great Britain and her American colonies.)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2314&quot;&gt;&lt;br data-dcnode-id=&quot;2313&quot;&gt;&lt;span data-dcnode-id=&quot;2312&quot; instrument_node=&quot;&quot;&gt;Generally, the book covers the period from 1776 to 1781, and covers the salute to the American colors of the Andrew Doria by the Dutch governor of St. Eustatius, the affairs of the Dutch Republic, naval warfare of the period focusing on Admiral Rodney of Great Britain, the American land battles in the South, the intervention of the French with money, material and ships, and the long march leading to the siege of Yorktown.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2311&quot;&gt;&lt;br data-dcnode-id=&quot;2310&quot;&gt;&lt;span data-dcnode-id=&quot;2309&quot; instrument_node=&quot;&quot;&gt;It seems fairly clear that the American colonies had a better will to win the war than the British had to win it. For many years, indeed all the way to Yorktown, the British considered the rebellion of its American colonies to be nothing more than a population of loyal Britons deluded by demagogues who would soon see the error of their ways and return to the mother country. They thus saw the war as being one that would be won by Great Britain as a matter of course, and never entertained the thought that the Americans under Mr. Washington could win the war, with or without French assistance. Additionally, the British priorities were firmly with keeping their islands in the Caribbean safe from the Dutch and French (they were known as the “sugar islands”, and they had a tendency to not send their best men, either army or naval, to tend to the affairs of their colonies farther north. Finally, the French aided the Americans not because they loved the idea of representational democracy (at the time they were a monarchy), but because by doing so they would seriously upset the British trade and British complacency.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2308&quot;&gt;&lt;br data-dcnode-id=&quot;2307&quot;&gt;&lt;span data-dcnode-id=&quot;2306&quot; instrument_node=&quot;&quot;&gt;As always, I enjoyed reading this historical work of the authors; I have read most of her books, and need to find the ones she has written that I haven’t read yet to put in the pile of books to read.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2304&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;2212&quot; id=&quot;freeText598036120353936009&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2215&quot; instrument_node=&quot;&quot;&gt;The re-read reconfirmed my five-star rating. Tuchman's style is vivid, original, and compelling. She sets the scene, including pithy sketches of the cast of characters in the action, then uses quotations and detailed descriptions from the sources, creating tension that makes the reader wondering what happens next. Most satisfying is how she then steps back from the event to ask, &quot;What were they thinking?&quot; Then there are offered intelligent guesses, some ruled in, others ruled out, and often concluding, &quot;We'll never know.&quot; This telling deserves its high reputation. I only wish it was known and understood more widely. The ultimate surrender of Cornwallis at Yorktown could be believed to be a miracle, but in the light of this account, it appears to be an unlikely accident with consequences no one could possibly foresee. &lt;/span&gt;&lt;br data-dcnode-id=&quot;2214&quot;&gt;&lt;span data-dcnode-id=&quot;2213&quot; instrument_node=&quot;&quot;&gt;One little nugget particularly relevant for today: The French Admiral de Grasse, who commanded the fleet that prevented British support for Cornwallis at Yorktown, raised a considerable sum of desperately needed money for the American army from... Cubans! This money helped pay militia who had been near mutiny because of lack of payment from the Continental Congress.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2211&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;2130&quot; id=&quot;freeText16103400265726782759&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2134&quot; instrument_node=&quot;&quot;&gt;Although Tuchman has been criticized by some reviewers for straying off topic, i.e., from the American fight for independence from Great Britain, I found that she provided us with useful viewpoints: starting with Dutch vs British vs French naval forces in the Caribbean and elsewhere just as revolution in America was breaking out. She is very detailed in her explanations. You never have to thumb back through chapters to refresh your memory of whom she is referring to. Every utterance is packed with solid support by research. You can feel that, and it is reassuring. One enlightening conclusion she comes to in the epilogue is not surprising, but it does make one pause, especially after the 2016 presidential election, and that refers to what George Washington had envisioned that a future America would look like. I feel compelled now to read other Barbara Tuchman histories, such as &quot;A Distant Mirror&quot; and &quot;The Guns of August&quot;. Also of note in Wikipedia, is &quot;Tuchman's Law&quot;. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2132&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Barbara_W._Tuchman&quot; rel=&quot;noopener nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2133&quot; instrument_node=&quot;&quot;&gt;https://en.wikipedia.org/wiki/Barbara...&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2131&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2129&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;2045&quot; id=&quot;freeText4043232755838921476&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;2046&quot; instrument_node=&quot;&quot;&gt;Another excellent book by Barbara Tuchman, this time a history of the American Revolution. However, the focus is from an unusual vantage for an American - Tuchman provides the history of how the Revolution was perceived and fit into the economic and political agendas of the European powers. The titular salute was provided by the Dutch for an American ship entering one of its Caribbean ports, and marked the first official recognition of the United States as an entity by a foreign power. Tuchman explores the relationships between the Dutch, the British, the French, and the Spanish powers, and how the American Revolution fit into their various agendas. She follows the Revolution from the time of that salute until the surrender at Yorktown and the aftermath. Gifted with the ability to tell history like a story instead of a dry analysis of dates and names, Tuchman provides a very readable account of a familiar subject from a unique perspective. &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2044&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;1571&quot; id=&quot;reviewTextContainer4124946810&quot;&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1590&quot; id=&quot;freeTextContainer11713587764725026430&quot;&gt;&lt;span data-dcnode-id=&quot;1591&quot; instrument_node=&quot;&quot;&gt;I previously found Barbara Tuchman’s WWI history The Guns of August an enjoyable read. In The First Salute, she turns to the American Revolution, starting in an unusual spot - the Dutch colony of St. Eustatius providing “the first salute” of recognition to the newly independent colonies. If you want a complete overview of the Revolutionary War, this is not your book. Tuchman focuses on the importance of the naval war between the European powers - starting first with the Dutch, and then focusing &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1576&quot; id=&quot;freeText11713587764725026430&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;1588&quot; instrument_node=&quot;&quot;&gt;I previously found Barbara Tuchman’s WWI history The Guns of August an enjoyable read. In The First Salute, she turns to the American Revolution, starting in an unusual spot - the Dutch colony of St. Eustatius providing “the first salute” of recognition to the newly independent colonies. If you want a complete overview of the Revolutionary War, this is not your book. Tuchman focuses on the importance of the naval war between the European powers - starting first with the Dutch, and then focusing on the English and French. In fact, the book’s longest chapter is dedicated to the British admiral George Rodney.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1587&quot;&gt;&lt;br data-dcnode-id=&quot;1586&quot;&gt;&lt;span data-dcnode-id=&quot;1585&quot; instrument_node=&quot;&quot;&gt;Tuchman writes with a interesting style. She enjoys weaving a story, and doesn’t mind moving off on interesting tangents that add color and depth. In doing so, she may appear to get into some minute details that may not be necessary for the story, but also don’t detract from its telling. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1584&quot;&gt;&lt;br data-dcnode-id=&quot;1583&quot;&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;I was surprised midway through the book when Tuchman made the observation on the destructive state of British politics during the war. “Politics as much as anything defeated the British in the American war. The British have always been obsessed with politics, not so much in terms of opposing systems of belief as in terms of who’s in and who’s out.” This thought, written 30+ years ago, might be applied to the current highly polarized American political scene, where the parties can not even come together to wage a common fight against a pandemic disease.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1581&quot;&gt;&lt;br data-dcnode-id=&quot;1580&quot;&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;I’m glad I finally took The First Salute off the shelf. I enjoyed Tuchman’s European perspective of the importance of naval power in winning the American revolution. A solid four star read.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1578&quot;&gt;&lt;br data-dcnode-id=&quot;1577&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;1488&quot; id=&quot;freeText13608852238690696780&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;1489&quot; instrument_node=&quot;&quot;&gt;Another excellent work from Barbara Tuchman. Although I had read this decades ago (shortly after publication), I really didn't get what the author was trying to say. Now, re-reading this after so much time I have a tremendous appreciation for this book. Ms Tuchman tells a thoroughly engaging story that starts with the first country to salute a ship bearing the colors of the Colonies, then takes us through the rise and fall of the Dutch, whose greed drove them to be the middlemen getting arms and ammunition from other countries and passing them on in the port of St. Eustatius, through the frustrations of George Washington attempting to change and end the ongoing war,, and through the detail of how incompetently the British were in handling the unrest and revolution in the colonies. I have a whole new appreciation for the roles of the Dutch and then the French in the success of the birth of the United States.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span class=&quot;readable&quot; data-dcnode-id=&quot;1383&quot; id=&quot;reviewTextContainer2267314796&quot;&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1402&quot; id=&quot;freeTextContainer10360239465625209842&quot;&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;The view of the American Revolution herein is primarily a European view, and a maritime view. Hence, George Washington is mentioned only three times before Page 182. Hence, the front cover illustration is of a ship on stormy seas.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1406&quot;&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt;The view I learned in school was of scrappy Patriots pulling the greatest upset victory of all time over the greatest imperial power of the era, with a bit of help from the French.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1404&quot;&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;What I learned is that many of England's leaders felt it was not a winnable war -- for the&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1388&quot; id=&quot;freeText10360239465625209842&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt;The view of the American Revolution herein is primarily a European view, and a maritime view. Hence, George Washington is mentioned only three times before Page 182. Hence, the front cover illustration is of a ship on stormy seas.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1399&quot;&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;The view I learned in school was of scrappy Patriots pulling the greatest upset victory of all time over the greatest imperial power of the era, with a bit of help from the French.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1397&quot;&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;What I learned is that many of England's leaders felt it was not a winnable war -- for them -- from the beginning, unless an awful lot of Americans turned out to be loyalists. What I learned in school about the war at sea was John Paul Jones saying, &quot;We have not begun to fight,&quot; and I'm not even sure that I've got that right. What I learned here was that the war at sea was paramount.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1395&quot;&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;What I also learned was that England's military leadership in the Revolutionary War ranged from mediocre to worse than mediocre. The exception was Adm. Sir George Brydges Rodney, who may have committed a blunder or two but by and large was a brilliant naval strategist. Barbara W. Tuchman creates the impression that if it had not been for a troublesome prostate that forced Rodney to return to England at a crucial time, the war's outcome might have been entirely different, and we'd all be speaking English now.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1393&quot;&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;For all of the watery themes, Tuchman's writing tends toward the dry side, but it's not without humanity and humor. This bit, describing Washington's encounter with irascible French Adm. Francois Joseph Paul Comte de Grasse, was worth a chuckle:&lt;/span&gt;&lt;br data-dcnode-id=&quot;1391&quot;&gt;&lt;i data-dcnode-id=&quot;1389&quot;&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;De Grasse welcomed his American visitor, almost as tall and imposing as himself, with an embrace, two kisses on his cheeks and, according to report, the enthusiastic greeting &quot;Mon cher petit general!&quot; causing (Gen. Henry) Knox almost to choke in his effort to suppress an explosive laugh. Surely no one had ever addressed the Roman dignity of the American chieftain as &quot;My dear little&quot; anything since his mother in his infancy.&lt;/span&gt;&lt;/i&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;span data-dcnode-id=&quot;1095&quot; id=&quot;freeTextContainer14872423870869569702&quot;&gt;&lt;span data-dcnode-id=&quot;1102&quot; instrument_node=&quot;&quot;&gt;&quot;There's only two things I hate in this world: people who are intolerant of other people's cultures and the Dutch.&quot;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1101&quot;&gt;&lt;br data-dcnode-id=&quot;1100&quot;&gt;&lt;span data-dcnode-id=&quot;1099&quot; instrument_node=&quot;&quot;&gt;If, like Austin Powers' father, you have an irrational hatred of the Dutch, then Barbara Tuchman's 1988 &quot;The First Salute&quot; isn't for you. Otherwise, it's a very well written general history of the Revolutionary War running from 1776 to 1781 focusing primarily on the Dutch impact on English maritime strategy in the Caribbean and it's broader impact on the Revolutionary War. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1098&quot;&gt;&lt;br data-dcnode-id=&quot;1097&quot;&gt;&lt;span data-dcnode-id=&quot;1096&quot; instrument_node=&quot;&quot;&gt;The titul&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1080&quot; id=&quot;freeText14872423870869569702&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;1093&quot; instrument_node=&quot;&quot;&gt;&quot;There's only two things I hate in this world: people who are intolerant of other people's cultures and the Dutch.&quot;&lt;/span&gt;&lt;br data-dcnode-id=&quot;1092&quot;&gt;&lt;br data-dcnode-id=&quot;1091&quot;&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;If, like Austin Powers' father, you have an irrational hatred of the Dutch, then Barbara Tuchman's 1988 &quot;The First Salute&quot; isn't for you. Otherwise, it's a very well written general history of the Revolutionary War running from 1776 to 1781 focusing primarily on the Dutch impact on English maritime strategy in the Caribbean and it's broader impact on the Revolutionary War. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1089&quot;&gt;&lt;br data-dcnode-id=&quot;1088&quot;&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;The titular first salute is when the Dutch island port of Saint Eustatius returned a salute of the American vessel *Andrew Doria* -- thereby becoming the first foreign power to implicitly recognize the colonies as an independent nation. While this angered Britain, it was a more symbolic event than a significant one. Nevertheless, it's an interesting jumping off point for Tuchman to give wonderful insight into the background of the Dutch maritime commercial empire (and the give and take it had with the far superior British navy). &lt;/span&gt;&lt;br data-dcnode-id=&quot;1086&quot;&gt;&lt;br data-dcnode-id=&quot;1085&quot;&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;This is not a comprehensive history of the Revolutionary War -- instead, Tuchman's focus is primarily on British naval strategy as it related to the Caribbean ports and by extension, the colonies. The Netherlands is prominently featured because they obviously had substantial holdings in the area. Tuchman writes wonderfully, but the &quot;focus&quot; of the book is often in doubt. &lt;/span&gt;&lt;br data-dcnode-id=&quot;1083&quot;&gt;&lt;br data-dcnode-id=&quot;1082&quot;&gt;&lt;span data-dcnode-id=&quot;1081&quot; instrument_node=&quot;&quot;&gt;Ultimately, it's a wonderfully written and richly detailed history of the Dutch trading empire, in which the American Revolution makes an extended cameo.&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;
