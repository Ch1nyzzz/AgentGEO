&lt;/span&gt;&lt;div class=&quot;article-content sticky-sidebar-relative&quot; data-dcnode-id=&quot;4433&quot;&gt;&lt;span data-dcnode-id=&quot;4947&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;the-content&quot; data-dcnode-id=&quot;4695&quot;&gt;&lt;span data-dcnode-id=&quot;4946&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4944&quot;&gt;&lt;span data-dcnode-id=&quot;4945&quot; instrument_node=&quot;&quot;&gt;WESTLAKE, Texas (AP) — Anna Salton Eisen found the old pictures of Jewish prisoners who survived the Holocaust in a folder her late father, George Lucius Salton, kept most of his life.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4941&quot;&gt;&lt;span data-dcnode-id=&quot;4942&quot; instrument_node=&quot;&quot;&gt;The Texas woman recognized the names of some of the teens and young men from stories her father told. For three years, the baby-faced captives lived among the dead and dying in barracks and boxcars as Nazi captors moved them from Poland to France to Germany.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4940&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4938&quot;&gt;&lt;span data-dcnode-id=&quot;4939&quot; instrument_node=&quot;&quot;&gt;But suddenly, the familiar names had faces.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;4932&quot; id=&quot;gpt-passback&quot; style=&quot;margin-bottom:26px;&quot;&gt;&lt;span data-dcnode-id=&quot;4936&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4933&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4929&quot;&gt;&lt;span data-dcnode-id=&quot;4930&quot; instrument_node=&quot;&quot;&gt;“Seeing the faces of all of them really brought the story to life,” said Eisen, who discovered the photos while moving her mother, Ruth Salton, 99, from Florida to the Dallas area this past summer.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4926&quot;&gt;&lt;span data-dcnode-id=&quot;4927&quot; instrument_node=&quot;&quot;&gt;Eisen, 62, said she felt compelled to learn more about the confidants who had meant so much to her father, who died at age 88 in 2016.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;newsletter newsletter-article&quot; data-dcnode-id=&quot;4889&quot; data-from=&quot;Texas woman reunites with descendants of Holocaust survivors freed with her dad&quot; data-website=&quot;timesofisrael&quot;&gt;&lt;span data-dcnode-id=&quot;4925&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;newsletter-article-inner&quot; data-dcnode-id=&quot;4893&quot;&gt;&lt;span data-dcnode-id=&quot;4924&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;newsletter-article-text newsletter-article-part&quot; data-dcnode-id=&quot;4916&quot;&gt;&lt;span data-dcnode-id=&quot;4923&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4886&quot;&gt;&lt;span data-dcnode-id=&quot;4887&quot; instrument_node=&quot;&quot;&gt;George Salton was 17 when the United States Army liberated the Wobbelin concentration camp in Germany on May 2, 1945. Over the next few years, the survivors scattered around the world. Most lost touch with each other.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4885&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;4879&quot; id=&quot;attachment_2637104&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;size-large wp-image-2637104&quot; data-dcnode-id=&quot;4884&quot; height=&quot;375&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//static.timesofisrael.com/www/uploads/2021/10/AP21294564518829-640x400.jpg&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;4883&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;4881&quot;&gt;&lt;span data-dcnode-id=&quot;4882&quot; instrument_node=&quot;&quot;&gt;Anna Salton Eisen, daughter of Holocaust survivors, points to a photo of her father, George Lucius Salton, made along with another photo he saved after his internment in Nazi work camps, during an interview in Westlake, Texas, on October 6, 2021. (AP Photo/LM Otero)&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4878&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4876&quot;&gt;&lt;span data-dcnode-id=&quot;4877&quot; instrument_node=&quot;&quot;&gt;But 76 years after American soldiers cut down the barbed wire and fulfilled the prisoners’ impossible dream of freedom, Eisen set out to bring together the survivors’ loved ones. Thanks to the speed of modern technology, she succeeded.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4875&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4873&quot;&gt;&lt;span data-dcnode-id=&quot;4874&quot; instrument_node=&quot;&quot;&gt;As Eisen began her research, she relied on names written in pencil on the picture backs or mentioned repeatedly in Salton’s 2002 book, “The 23rd Psalm: A Holocaust Memoir.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4872&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4870&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;banner-placeholder 336x280_Middle_1&quot; data-dcnode-id=&quot;4859&quot;&gt;&lt;span data-dcnode-id=&quot;4869&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;banner-label&quot; data-dcnode-id=&quot;4867&quot;&gt;&lt;span data-dcnode-id=&quot;4868&quot; instrument_node=&quot;&quot;&gt;Advertisement&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;banner 336x280_Middle_1&quot; data-aa-adunit=&quot;/3933714/TOI_Desktop/336x280_Middle_1&quot; data-aaad=&quot;true&quot; data-dcnode-id=&quot;4861&quot; id=&quot;div-gpt-ad-336x280_Middle_1&quot;&gt;&lt;span data-dcnode-id=&quot;4865&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4860&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4856&quot;&gt;&lt;span data-dcnode-id=&quot;4857&quot; instrument_node=&quot;&quot;&gt;As she combed through Nazi-era data, official documents, concentration camp lists and post-war records stored online through the Arolsen Archives at the International Center on Nazi Persecution in Germany, the Holocaust survivor’s daughter verified survivors’ names and dates of birth.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4855&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4853&quot;&gt;&lt;span data-dcnode-id=&quot;4854&quot; instrument_node=&quot;&quot;&gt;Through Ancestry.com, Eisen explored passenger lists of ships that took Holocaust survivors to other countries, Social Security cards documenting name changes, and obituaries and family trees.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4850&quot;&gt;&lt;span data-dcnode-id=&quot;4851&quot; instrument_node=&quot;&quot;&gt;Google and Facebook searches led Eisen to the children and grandchildren of her father’s friends, most of whom never knew — until now — the full story of what their loved ones experienced.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4849&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4847&quot;&gt;&lt;span data-dcnode-id=&quot;4848&quot; instrument_node=&quot;&quot;&gt;Todd Nussen, a high school history teacher in Oceanside, New York, reacted with shock — and excitement — when Eisen texted him in late July to ask about his namesake grandfather, Tobias Nussen, who died at age 52 in 1973.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4846&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;4840&quot; id=&quot;attachment_2637105&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;size-large wp-image-2637105&quot; data-dcnode-id=&quot;4845&quot; height=&quot;375&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//static.timesofisrael.com/www/uploads/2021/10/AP21294564345577-640x400.jpg&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;4844&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;4842&quot;&gt;&lt;span data-dcnode-id=&quot;4843&quot; instrument_node=&quot;&quot;&gt;Anna Salton Eisen holds a photo of Moses Tuchman, father of Miriam Kershner, left, during a gathering for families of Holocaust survivors, on September 26, 2021, in East Brunswick, NJ. (AP Photo/Brittainy Newman)&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4841&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4839&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4837&quot;&gt;&lt;span data-dcnode-id=&quot;4838&quot; instrument_node=&quot;&quot;&gt;“Now I have details. Now I have facts,” the 40-year-old educator said.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4836&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4834&quot;&gt;&lt;span data-dcnode-id=&quot;4835&quot; instrument_node=&quot;&quot;&gt;As a result of Eisen’s research, family members of eight Holocaust survivors met for the first time on a recent Sunday.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4833&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4831&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;banner-placeholder 336x280_Middle_2&quot; data-dcnode-id=&quot;4820&quot;&gt;&lt;span data-dcnode-id=&quot;4830&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;banner-label&quot; data-dcnode-id=&quot;4828&quot;&gt;&lt;span data-dcnode-id=&quot;4829&quot; instrument_node=&quot;&quot;&gt;Advertisement&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4827&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;banner 336x280_Middle_2&quot; data-aa-adunit=&quot;/3933714/TOI_Desktop/336x280_Middle_2&quot; data-aaad=&quot;true&quot; data-dcnode-id=&quot;4822&quot; id=&quot;div-gpt-ad-336x280_Middle_2&quot;&gt;&lt;span data-dcnode-id=&quot;4826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4823&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4821&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4819&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4817&quot;&gt;&lt;span data-dcnode-id=&quot;4818&quot; instrument_node=&quot;&quot;&gt;Some exchanged hugs and tears in person at a New Jersey hotel suite.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4814&quot;&gt;&lt;span data-dcnode-id=&quot;4815&quot; instrument_node=&quot;&quot;&gt;Others connected via Zoom from Israel, Sweden, and Texas.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4811&quot;&gt;&lt;span data-dcnode-id=&quot;4812&quot; instrument_node=&quot;&quot;&gt;“It just gave me the chills,” Bobbie Ziff, 67, a resident of Jackson, New Jersey, said of the emotional gathering, which came together less than four months after the photos’ discovery.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4808&quot;&gt;&lt;span data-dcnode-id=&quot;4809&quot; instrument_node=&quot;&quot;&gt;Ziff is the daughter of Tobias Nussen and the aunt of Todd Nussen.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;4801&quot; id=&quot;attachment_2637106&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;size-large wp-image-2637106&quot; data-dcnode-id=&quot;4806&quot; height=&quot;375&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//static.timesofisrael.com/www/uploads/2021/10/AP21294564285729-640x400.jpg&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;4805&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;4803&quot;&gt;&lt;span data-dcnode-id=&quot;4804&quot; instrument_node=&quot;&quot;&gt;Anna Salton Eisen hugs Barbara Ringel upon arriving at a gathering for families of Holocaust survivors at a hotel in East Brunswick, NJ, on September 26, 2021. (AP Photo/Brittainy Newman)&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4802&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4800&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4798&quot;&gt;&lt;span data-dcnode-id=&quot;4799&quot; instrument_node=&quot;&quot;&gt;In America, her father built a new life and owned a Brooklyn, New York, luncheonette, Ziff said. He never talked about the Holocaust, but he often endured nightmares and screamed in his sleep.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4797&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4795&quot;&gt;&lt;span data-dcnode-id=&quot;4796&quot; instrument_node=&quot;&quot;&gt;Pictured in another of the photos that Eisen found: Motek Hoffstetter.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4794&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4792&quot;&gt;&lt;span data-dcnode-id=&quot;4793&quot; instrument_node=&quot;&quot;&gt;His daughter Aviva Findler, a retired high school teacher who lives in Tel Aviv, Israel, said her father, like many other survivors, refused to talk about the Holocaust.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4791&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4789&quot;&gt;&lt;span data-dcnode-id=&quot;4790&quot; instrument_node=&quot;&quot;&gt;“During the meeting, I found out he was very respected by his friends, which made me really proud and sad,” Findler said.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4786&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;banner-placeholder 336x280_Middle_3&quot; data-dcnode-id=&quot;4775&quot;&gt;&lt;span data-dcnode-id=&quot;4785&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;banner-label&quot; data-dcnode-id=&quot;4783&quot;&gt;&lt;span data-dcnode-id=&quot;4784&quot; instrument_node=&quot;&quot;&gt;Advertisement&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;banner 336x280_Middle_3&quot; data-aa-adunit=&quot;/3933714/TOI_Desktop/336x280_Middle_3&quot; data-aaad=&quot;true&quot; data-dcnode-id=&quot;4777&quot; id=&quot;div-gpt-ad-336x280_Middle_3&quot;&gt;&lt;span data-dcnode-id=&quot;4781&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4778&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4774&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4772&quot;&gt;&lt;span data-dcnode-id=&quot;4773&quot; instrument_node=&quot;&quot;&gt;For much of his life, Eisen’s own father believed in keeping the past in the past.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4771&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4769&quot;&gt;&lt;span data-dcnode-id=&quot;4770&quot; instrument_node=&quot;&quot;&gt;Fellow survivors did the same, not wanting to dwell on their rotten teeth or explain why they refused to waste even a single piece of bread.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4768&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;4762&quot; id=&quot;attachment_2637107&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;size-large wp-image-2637107&quot; data-dcnode-id=&quot;4767&quot; height=&quot;375&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//static.timesofisrael.com/www/uploads/2021/10/AP21294564401921-640x400.jpg&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;4766&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;4764&quot;&gt;&lt;span data-dcnode-id=&quot;4765&quot; instrument_node=&quot;&quot;&gt;Copies of photos of Holocaust survivors are laid out during a reunion for their families in East Brunswick, NJ, on September 26, 2021. (AP Photo/Brittainy Newman)&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4759&quot;&gt;&lt;span data-dcnode-id=&quot;4760&quot; instrument_node=&quot;&quot;&gt;“It’s a wound,” Ruth Salton said of what she and her husband of 63 years experienced growing up. “We didn’t want any of our kids to carry the stuff that we lived through.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4758&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4756&quot;&gt;&lt;span data-dcnode-id=&quot;4757&quot; instrument_node=&quot;&quot;&gt;George Salton proudly served in the same US Army that had rescued him. He earned degrees in physics and electrical engineering. He worked in a high-level role at the Pentagon and held an executive position in the aerospace industry.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4755&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4753&quot;&gt;&lt;span data-dcnode-id=&quot;4754&quot; instrument_node=&quot;&quot;&gt;But eventually, his three children — especially Eisen — demanded answers about his childhood.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4752&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4750&quot;&gt;&lt;span data-dcnode-id=&quot;4751&quot; instrument_node=&quot;&quot;&gt;With Eisen’s help, Salton recounted the details of his family’s Holocaust experience in his 2002 memoir.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4749&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4747&quot;&gt;&lt;span data-dcnode-id=&quot;4748&quot; instrument_node=&quot;&quot;&gt;“Every day blended with the next, filled with hunger, sleepless nights, hard labor, and the constant threat of beatings, selections, and executions,” he wrote.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4746&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;banner-placeholder 336x260_InContent_1&quot; data-dcnode-id=&quot;4733&quot;&gt;&lt;span data-dcnode-id=&quot;4743&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;banner-label&quot; data-dcnode-id=&quot;4741&quot;&gt;&lt;span data-dcnode-id=&quot;4742&quot; instrument_node=&quot;&quot;&gt;Advertisement&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;banner 336x260_InContent_1&quot; data-aa-adunit=&quot;/3933714/TOI_Desktop/336x260_InContent_1&quot; data-aaad=&quot;true&quot; data-dcnode-id=&quot;4735&quot; id=&quot;div-gpt-ad-336x260_InContent_1&quot;&gt;&lt;span data-dcnode-id=&quot;4739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4732&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4730&quot;&gt;&lt;span data-dcnode-id=&quot;4731&quot; instrument_node=&quot;&quot;&gt;For her part, Eisen is writing a book of her own, “Pillar of Salt: A Daughter’s Life in the Shadow of the Holocaust,” which is due out next April. She is cooperating with a filmmaker, Jacob Wise, on a documentary based on her father’s experience and its impact on the second generation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4729&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption alignnone&quot; data-dcnode-id=&quot;4723&quot; id=&quot;attachment_2637108&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;size-large wp-image-2637108&quot; data-dcnode-id=&quot;4728&quot; height=&quot;375&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//static.timesofisrael.com/www/uploads/2021/10/AP21294564436952-640x400.jpg&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;4727&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;4725&quot;&gt;&lt;span data-dcnode-id=&quot;4726&quot; instrument_node=&quot;&quot;&gt;Bobbie Ziff (center), David Horn (left), and others listen to the stories people shared at a gathering for families of Holocaust survivors, on September 26, 2021, in East Brunswick, NJ. (AP Photo/Brittainy Newman)&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4724&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4722&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4720&quot;&gt;&lt;span data-dcnode-id=&quot;4721&quot; instrument_node=&quot;&quot;&gt;Eisen said the book title reflects her Jewish faith.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4717&quot;&gt;&lt;span data-dcnode-id=&quot;4718&quot; instrument_node=&quot;&quot;&gt;“I felt compelled to look back even though I was warned not to,” she said, referencing the biblical account of Lot’s wife turning into a pillar of salt.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4716&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4714&quot;&gt;&lt;span data-dcnode-id=&quot;4715&quot; instrument_node=&quot;&quot;&gt;“It was not easy for me to bring these other families the truth. It was painful. But it was their story, and it belonged to them.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4711&quot;&gt;&lt;span data-dcnode-id=&quot;4712&quot; instrument_node=&quot;&quot;&gt;It’s important, she believes, to keep the reality of the Holocaust alive.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4708&quot;&gt;&lt;span data-dcnode-id=&quot;4709&quot; instrument_node=&quot;&quot;&gt;Aaron Eisen, Anna’s 30-year-old son, is co-author of “Pillar of Salt.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4705&quot;&gt;&lt;span data-dcnode-id=&quot;4706&quot; instrument_node=&quot;&quot;&gt;“My grandfather, when he would give speeches, would say that the Holocaust was incomprehensible, that we can’t comprehend how this happened,” said Aaron Eisen, who attended the New Jersey gathering. “But I think over time we are beginning to comprehend, and what my mother is talking about, is that there’s still so much to learn.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4702&quot;&gt;&lt;span data-dcnode-id=&quot;4703&quot; instrument_node=&quot;&quot;&gt;As Ruth Salton approaches her 100th birthday, even she now understands the importance of telling the story, she said.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4699&quot;&gt;&lt;span data-dcnode-id=&quot;4700&quot; instrument_node=&quot;&quot;&gt;“That is the only way to carry on,” she said. “I’m so happy that the children are interested. The children want to tell the story, and the children can now live and feel what we did feel all our lives.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4697&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4696&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4689&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;4687&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;crm-post-module in-article bg-blue&quot; data-dcnode-id=&quot;4638&quot; style=&quot;display:none&quot;&gt;&lt;span data-dcnode-id=&quot;4686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;crm-post-module__header&quot; data-dcnode-id=&quot;4682&quot;&gt;&lt;span data-dcnode-id=&quot;4685&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;crm-post-module__title style-1&quot; data-dcnode-id=&quot;4679&quot;&gt;&lt;span data-dcnode-id=&quot;4680&quot; instrument_node=&quot;&quot;&gt;
				We're telling a critical story			&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4678&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;crm-article-popup__content&quot; data-dcnode-id=&quot;4649&quot;&gt;&lt;span data-dcnode-id=&quot;4677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;&quot; class=&quot;attachment-square_large size-square_large wp-post-image&quot; data-dcnode-id=&quot;4676&quot; height=&quot;400&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//static.timesofisrael.com/www/uploads/2022/04/Lazar_600x600-400x400.png&amp;amp;raw&quot; title=&quot;&quot; width=&quot;400&quot;&gt;&lt;span data-dcnode-id=&quot;4675&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;4673&quot;&gt;&lt;span data-dcnode-id=&quot;4674&quot; instrument_node=&quot;&quot;&gt;Israel is now a far more prominent player on the world stage than its size suggests. As The Times of Israel's Diplomatic Correspondent, I'm well aware that Israel's security, strategy and national interests are always scrutinized and have serious implications.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4672&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4670&quot;&gt;&lt;span data-dcnode-id=&quot;4671&quot; instrument_node=&quot;&quot;&gt;It takes balance, determination, and knowledge to accurately convey Israel's story, and I come to work every day aiming to do so fully.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4669&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4665&quot;&gt;&lt;strong data-dcnode-id=&quot;4667&quot;&gt;&lt;span data-dcnode-id=&quot;4668&quot; instrument_node=&quot;&quot;&gt;Financial support from readers like you&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;4666&quot; instrument_node=&quot;&quot;&gt; allows me to travel to witness both war (I just returned from reporting in Ukraine) and the signing of historic agreements. And it enables The Times of Israel to remain the place readers across the globe turn to for accurate news about Israel's relationship with the world.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4664&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4660&quot;&gt;&lt;span data-dcnode-id=&quot;4663&quot; instrument_node=&quot;&quot;&gt;If it's important to you that independent, fact-based coverage of Israel's role in the world exists and thrives, I urge you to support our work. &lt;/span&gt;&lt;strong data-dcnode-id=&quot;4661&quot;&gt;&lt;span data-dcnode-id=&quot;4662&quot; instrument_node=&quot;&quot;&gt;Will you join The Times of Israel Community today?&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4659&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4657&quot;&gt;&lt;span data-dcnode-id=&quot;4658&quot; instrument_node=&quot;&quot;&gt;Thank you,&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4656&quot; instrument_node=&quot;&quot;&gt;
