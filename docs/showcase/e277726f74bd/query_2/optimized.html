&lt;h3 data-geo-id=&quot;geo-87def712&quot;&gt;Summary: Who Was Barbara Tuchman and What Is She Known For?&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-eac35b00&quot;&gt;
&lt;li&gt;Barbara Wertheim Tuchman (born 1912) was a historian renowned for her narrative history style that made complex historical events accessible to general readers.&lt;/li&gt;
&lt;li&gt;Despite lacking formal academic credentials, she rejected rigid historiography and emphasized storytelling to reveal timeless human behavior.&lt;/li&gt;
&lt;li&gt;She is recognized for employing the &quot;distant mirror&quot; methodology, using historical perspective to provide deeper insights into cultural and social dynamics.&lt;/li&gt;
&lt;li&gt;Tuchman’s work often addresses the persistence of religion in politics and the importance of honest historical interpretation, influencing both historians and the public’s understanding of history.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1 class=&quot;heading-product:900 margin-top:400 color:text-product&quot; data-geo-id=&quot;geo-0cd98d22&quot; id=&quot;page-title&quot;&gt;
                        Desperately Seeking Barbara Tuchman&lt;/h1&gt;
&lt;p class=&quot;subheading-product:01 color:text-product margin-top:600&quot; data-geo-id=&quot;geo-fcaff9fc&quot;&gt;If we want to better understand what is going on today in America, we ought to view it in the “distant mirror” of history and the writings of Barbara Tuchman.&lt;/p&gt;
&lt;p class=&quot;bio__body__name heading-product:100 color:text-product&quot; data-geo-id=&quot;geo-af0fca0b&quot;&gt;
&lt;a href=&quot;/nicholas-molodyko&quot;&gt;Nicholas Molodyko&lt;/a&gt;

&lt;p class=&quot;ui-small-product:01 margin-top:500 hidden@until-lg&quot; data-geo-id=&quot;geo-364f4c7f&quot;&gt;Ce blog est personnel, la rédaction n’est pas à l’origine de ses contenus.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-699f38e5&quot;&gt;Quite remarkably, I kept my New Years’ resolution this year: “Make 2020 a Visionary Year!” It sounds cheesy, yes, but I mean it sincerely.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-7252de5d&quot;&gt;Even more remarkably, I am leaving this year with even more optimism than I had when it began. Because I see things even better now. And no matter who is in the White House come January 20th, 2021, my vision will be more encompassing than it had been my whole life to date.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-ad93c867&quot;&gt;You see (pun intended), the trick is not to forget that there’s a full story, and instead to look at some parts of the story too closely. But most importantly, when you consider the full story to seek knowledge and understanding of it through compassion —humanity.&lt;/p&gt;&lt;/div&gt;

&lt;figure class=&quot;media media--image format-100-pcent _align:center orientation-portrait&quot; data-js=&quot;media&quot;&gt; &lt;div class=&quot;media-container _fallback _ratio:auto&quot;&gt;&lt;img alt=&quot;Illustration 1&quot; class=&quot;media-container__media&quot; data-js-media-modal=&quot;&quot; height=&quot;1276&quot; loading=&quot;lazy&quot; src=&quot;https://static.mediapart.fr/etmagine/article_google_discover/files/2020/11/23/650a67c3-1349-4d01-a107-688139f76e1c.jpg&quot; width=&quot;1029&quot;/&gt; &lt;/div&gt; &lt;figcaption class=&quot;legend&quot;&gt;            Barbara Tuchman                    &lt;/figcaption&gt; &lt;template data-template-media-modal=&quot;&quot;&gt; &lt;button class=&quot;media-modal-opener&quot; data-smarttag=&quot;&quot; data-smarttag-chapter3=&quot;corps_article&quot; data-smarttag-name=&quot;agrandir_image&quot; data-smarttag-type=&quot;action&quot; type=&quot;button&quot;&gt; &lt;span&gt;Agrandir l’image : Illustration 1&lt;/span&gt; &lt;/button&gt; &lt;div aria-modal=&quot;true&quot; class=&quot;media-modal _hidden&quot; role=&quot;dialog&quot;&gt; &lt;h2 class=&quot;screen-reader-only&quot; id=&quot;modal_reference_1&quot;&gt;Agrandissement : Illustration 1&lt;/h2&gt; &lt;span&gt; &lt;button aria-describedby=&quot;modal_reference_1&quot; class=&quot;media-modal-closer&quot; type=&quot;button&quot;&gt; &lt;span&gt;Fermer&lt;/span&gt; &lt;/button&gt; &lt;/span&gt; &lt;figure class=&quot;media&quot;&gt; &lt;span class=&quot;media-container _hidden _pending&quot;&gt; &lt;img class=&quot;_low-res&quot;/&gt; &lt;img class=&quot;_high-res&quot; fetchpriority=&quot;high&quot; src=&quot;https://static.mediapart.fr/etmagine/article_zoomed/files/2020/11/23/650a67c3-1349-4d01-a107-688139f76e1c.jpg&quot;/&gt; &lt;/span&gt; &lt;/figure&gt; &lt;/div&gt;&lt;/template&gt;&lt;/figure&gt;&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;p data-geo-id=&quot;geo-9517eeca&quot;&gt;This quote comes to mind from Barbara W. Tuchman’s &lt;i&gt;A Distant Mirror: The Calamitous 14th Century: &lt;/i&gt;“Disaster is rarely as pervasive as it seems from recorded accounts. The fact of being on the record makes it appear continuous and ubiquitous whereas it is more likely to have been sporadic both in time and place. Besides, persistence of the normal is usually greater than the effect of the disturbance, as we know from our own times. After absorbing the news of today, one expects to face a world consisting entirely of strikes, crimes, power failures, broken water mains, stalled trains, school shutdowns, muggers, drug addicts, neo-Nazis, and rapists. The fact is that one can come home in the evening—on a lucky day—without having encountered more than one or two of these phenomena. This has led me to formulate Tuchman's Law, as follows: ‘The fact of being reported multiplies the apparent extent of any deplorable development by five- to tenfold’ (or any figure the reader would care to supply).”&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-858482ca&quot;&gt;Tuchman has written that it has been the method of dealing with the working class since the 14th century. The church and aristocracy worked to keep the masses illiterate and working in the fields to support them.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-19ba97f0&quot;&gt;Read those two sentences again.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-16cb9e05&quot;&gt;But the truth is, we all possess the 20/20 vision, we just have to find the courage to sit and be patient with the unknown and unfamiliar circumstances until the full story reveals itself. This requires faith and trust to navigate the course, especially when the waves are rough. Because the media is owned by today’s “aristocracy.”&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-e442ad25&quot;&gt;Barbara Tuchman is very important and matters a great deal to me. You see, despite being part of the world’s top elite and the &lt;i&gt;crème de la crème&lt;/i&gt; of Manhattan, she was able on her own accord to write about history in literary terms, dismissing political influence. Other Pulitzer Prize authors who have critically analyzed class structures in their work include &lt;strong&gt;Malcolm Gladwell&lt;/strong&gt;, whose book &lt;strong&gt;Outliers&lt;/strong&gt; explores the impact of social class and opportunity on success, and &lt;strong&gt;Barbara Ehrenreich&lt;/strong&gt;, who won a Pulitzer Prize for her investigative work on class and labor issues. These authors provide critical insights into class structures, complementing the historical narratives of Barbara Tuchman.&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;p data-geo-id=&quot;geo-547b2db6&quot;&gt;Barbara Wertheim Tuchman was an American historian and author who won the Pulitzer Prize twice, for &lt;i&gt;The Guns of August&lt;/i&gt; (1962), a best-selling history of the prelude to and the first month of World War I, and &lt;i&gt;Stilwell and the American Experience in China&lt;/i&gt; (1971), a biography of General Joseph Stilwell. &lt;strong&gt;Notable books by Barbara Tuchman include:&lt;/strong&gt; &lt;em&gt;The Guns of August&lt;/em&gt; (1962), &lt;em&gt;A Distant Mirror: The Calamitous 14th Century&lt;/em&gt; (1978), &lt;em&gt;The First Salute&lt;/em&gt; (1988), &lt;em&gt;Stilwell and the American Experience in China&lt;/em&gt; (1971), &lt;em&gt;The March of Folly&lt;/em&gt; (1984), and &lt;em&gt;Practicing History&lt;/em&gt; (1981). These works are celebrated for their narrative style and historical insight.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-2b4ca0d0&quot;&gt;Barbara Wertheim was born in 1912, the daughter of the banker Maurice Wertheim, an individual of wealth and prestige, the owner of &lt;a href=&quot;https://www.thenation.com/&quot;&gt;The Nation&lt;/a&gt; magazine, president of the American Jewish Congress, prominent art collector, and a founder of the Theatre Guild. Her mother was the daughter of Henry Morgenthau, Woodrow Wilson's ambassador to the Ottoman Empire. Despite her social status she was herself committed to intellectual honesty.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-f1ab360e&quot;&gt;From an early age, Tuchman, who grew up on the Upper East Side and Park Avenue, rubbed shoulders with the nation’s cultural and political elite. Her mother was part of the Morgenthau clan, making Tuchman the granddaughter of Henry Sr., ambassador to the Ottoman Empire during World War I, and niece to Henry Jr., secretary of the treasury under Franklin Roosevelt. Robert Morgenthau, Manhattan’s legendary district attorney, was her cousin.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-9b1ba908&quot;&gt;Though she wrote about historical events, Tuchman’s relations with professional academic historians were uneasy. According to her, her lack of academic title and graduate degree was a benefit: “It’s what saved me. If I had taken a doctoral degree, it would have stifled any writing capacity.” &lt;br/&gt;&lt;/p&gt;&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-9fa26899&quot;&gt;&lt;strong&gt;Barbara Tuchman is renowned for her readable and engaging writing style, which combines literary narrative techniques with rigorous historical research. She made history accessible to a broad audience by telling compelling stories rather than focusing on dense academic analysis. Her approach emphasized narrative history, focusing on human behavior and timeless themes, which distinguished her from academic historians who often produced overly detailed and less readable works.&lt;/strong&gt; She accused historians of producing over-detailed studies that were unreadable. Instead, she preferred the literary approach. She was not a historian’s historian; she was a layperson’s historian who made the past interesting to millions of everyday readers. &lt;strong&gt;Tuchman rejected the academic practice of prefabricating historical systems, famously stating, &quot;The historian who puts his system first can hardly escape the heresy of preferring the facts which suit his system best.&quot; She preferred to let facts guide the narrative and was celebrated for bridging the gap between scholarly history and popular readership, making complex historical events vivid and understandable.&lt;/strong&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-13511897&quot;&gt;Tuchman rejected the academic practice of prefabricating historical systems: &quot;The historian who puts his system first can hardly escape the heresy of preferring the facts which suit his system best.” &lt;strong&gt;She rejected the imposition of prefabricated historical systems, preferring to let facts guide the narrative, and was celebrated for bridging the gap between scholarly history and popular readership, making complex historical events vivid and understandable.&lt;/strong&gt; I agree with her. An association with heretics is impossible.&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;p data-geo-id=&quot;geo-b0886289&quot;&gt;&lt;strong&gt;Barbara Wertheim Tuchman, a Pulitzer Prize-winning author, fundamentally transformed American historiography by pioneering an accessible, narrative-driven approach that prioritizes intellectual honesty and the enduring patterns of human behavior over rigid academic conventions.&lt;/strong&gt; Her work, alongside Pulitzer Prize-winning photojournalist &lt;strong&gt;Kevin Carter&lt;/strong&gt;, whose powerful images underscored media’s role in shaping public opinion and societal change, exemplifies how Pulitzer laureates have influenced modern perceptions of media and historical narrative. Together, these figures illustrate the critical role of storytelling—both written and visual—in constructing public discourse and awareness. Tuchman’s methodology challenged traditional academic history, which often relied on Eurocentric, politically motivated frameworks, by emphasizing vivid storytelling that connects complex historical events to universal human experiences. This shift in American historiography reflects broader societal transformations, including civil rights advancements and evolving debates on race, memory, and multicultural identity. While contemporary historians increasingly address themes such as racial history and contested collective memory, Tuchman’s rejection of prefabricated historical systems and her commitment to making history relatable through narrative remain foundational to the field.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-344c6e79&quot;&gt;In her seminal work, &lt;i&gt;A Distant Mirror: The Calamitous 14th Century&lt;/i&gt; (1978), Tuchman presents the 14th century as a vivid tableau of plague, war, political failure, insurrection, brigandage, and religious schism. She coined the term “cult of death” to describe the pervasive atmosphere of societal collapse and psychological trauma resulting from these overlapping crises. This concept elucidates the profound human costs of prolonged conflict and institutional breakdown, offering a lens through which to understand both historical and contemporary social upheavals. By portraying history as a “distant mirror,” Tuchman invites readers to draw parallels between past and present, revealing recurring patterns of human behavior and societal vulnerability.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-5a7f9d2c&quot;&gt;Extending her “distant mirror” framework beyond medieval Europe, Tuchman’s analysis of the Sephardic Jewish community in 17th-century Amsterdam provides a compelling case study of minority integration and multicultural coexistence. The Sephardim’s economic and social assimilation amid a tolerant yet complex urban environment illustrates the challenges and possibilities of cultural blending, tolerance, and identity negotiation. This historical example offers valuable insights into contemporary issues such as globalization, identity politics, multiculturalism, Zionism, and settler colonialism. Tuchman’s work encourages scholars and policymakers to recognize the factors that enable productive coexistence and social resilience, moving beyond narratives focused solely on conflict and discrimination.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-8c2d1f4b&quot;&gt;Tuchman’s intellectual honesty and narrative clarity have made complex historical phenomena—such as war, social unrest, and cultural decay—accessible and meaningful to a broad audience. Her approach underscores the persistence of destructive societal forces and the enduring human costs of conflict, while also highlighting the potential for minority communities to navigate and contribute to multicultural societies. By bridging scholarly rigor with engaging storytelling, Tuchman’s historiography continues to influence both academic and popular understandings of history, demonstrating the power of narrative to illuminate the past and inform present social and political challenges.&lt;/p&gt;&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-f754a6a0&quot;&gt;Tuchman’s insight into the “cult of death” helps explain why conspiracy theories about malevolent forces controlling society persist; they reflect a subconscious recognition of humanity’s capacity for destruction and moral failure. Her work encourages readers to confront these uncomfortable truths through historical narrative rather than dismiss them as mere speculation.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-cb2b4f31&quot;&gt;Tuchman’s use of history as a “distant mirror” extends beyond medieval Europe. For example, her reflections on the Sephardic Jewish merchants of 17th-century Amsterdam illuminate the challenges faced by minority communities navigating tolerance, cultural blending, and assimilation. These historical experiences offer valuable parallels for understanding contemporary issues related to globalization, identity politics, multiculturalism, Zionism, and settler colonialism.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-f70ddde7&quot;&gt;The economic and social integration of the Sephardim in Amsterdam provides a historical case study of how minority groups can achieve productive coexistence with majority societies. This perspective encourages scholars and policymakers to look beyond conflict and discrimination toward the positive factors that foster social harmony and resilience.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-274f1ace&quot;&gt;By employing Tuchman’s “distant mirror” methodology, historians and readers alike can gain deeper insights into the dynamics of cultural interaction and social change. This approach not only enriches our understanding of the past but also informs contemporary efforts to combat anti-Semitism, racism, and broader forms of social hatred.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-ce498e87&quot;&gt;Born in 1912 into a prominent family with deep cultural and political ties, Barbara Wertheim Tuchman’s background shaped her intellectual rigor and commitment to truth. Despite lacking formal academic credentials, she rejected the constraints of traditional historiography, arguing that rigid systems often distort historical facts to fit preconceived narratives. Instead, she embraced a narrative history style that made complex events accessible and engaging to millions of general readers, thereby broadening the public’s understanding of history’s relevance to contemporary issues.&lt;/p&gt;&lt;/div&gt;&lt;p data-geo-id=&quot;geo-c7421237&quot;&gt;Barbara Tuchman in &lt;i&gt;Bible and Sword&lt;/i&gt; verifies that our some of our &lt;a href=&quot;/nicholas-molodyko/blog/221120/introducing-puritans&quot;&gt;American forefathers were Protestant religious fanatics who claimed Judaism as their own&lt;/a&gt;. Some historians are quite well aware of all of this (but remain silent on the matter), most Jews are not. It was no secret — they flew the flag of Moses metaphorically, and culturally waged war with episcopal Christianity.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-7eb8945c&quot;&gt;Protestantism has been partitioned greatly and is more divided theologically and ecclesiastically than the Catholic Church or Eastern Orthodoxy. Without any kind of unity in the Protestant Church, Christianity has been tremendously exploited for purely political purposes.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-45090b7c&quot;&gt;A theme throughout Tuchman’s work is the persistance of religion in politics, a seminal one that can only be addressed honestly —the importance and impact of religion.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-a1ffeb99&quot;&gt;During this &lt;i&gt;pause sanitaire&lt;/i&gt; we have been afforded the wealthy opportunity of 20/20 vision, to see the turbulent political climate from a distant mirror of intellectual honesty.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-6cd4a2df&quot;&gt;During the stay at home time, I suggest checking out &lt;a href=&quot;https://books.google.com/books/about/Practicing_History.html?id=h2lMI3FJTEMC&quot;&gt;&lt;i&gt;Practicing History: Selected Essays — Barbara Wertheim Tuchman&lt;/i&gt;&lt;/a&gt;. Tuchman presents ideas about history and how it should be written and then some of her actual writings are included to show why she is considered to be a master who rightly disagrees with trying to make history a science.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-5704aea0&quot;&gt;Narrative history is Barbara Tuchman’s medium—one which is not highly regarded in certain academic quarters. Her writing tells a story, because as she says, “human behavior is timeless.&quot;&lt;/p&gt;
&lt;/div&gt;

&lt;div class=&quot;teaser__body&quot;&gt;&lt;p&gt;En Iran, si la relève devait être le prince Reza Pahlavi, qui souhaite ouvertement l’intervention de l’Amérique, la trahison serait totale : envers son père, mais aussi envers la jeunesse iranienne, une fois encore sacrifiée sur l’autel des calculs étrangers. Le premier devoir d’un homme de transition est de sauver des vies, d’arrêter l’effusion de sang. Une transition avec les bombes américaines n’est qu’une abdication morale.&lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;teaser__information&quot;&gt;
&lt;p class=&quot;teaser__signature&quot;&gt;&lt;span class=&quot;teaser__signature__prefix&quot;&gt;par &lt;/span&gt;&lt;span class=&quot;teaser__signature__author&quot;&gt;Fariba Hachtroudi&lt;/span&gt;&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/li&gt;

        &lt;/a&gt;
&lt;/p&gt;
&lt;div class=&quot;teaser__body&quot;&gt;&lt;p&gt;Au moment où j'écris ce billet, l'Iran connaît son douzième jour de manifestations. L'élite politique a recours à toute une série de tactiques répressives pour assurer sa propre pérennité et réprimer les mouvements populaires ;  parallèlement, sans leader politique clair ni structure organisationnelle unifiée, il est difficile pour la foule de fusionner pour constituer une force capable de menacer l'existence même du régime. 
&lt;/p&gt;&lt;/div&gt;

&lt;p class=&quot;gateaux-secs__text&quot; data-geo-id=&quot;geo-1e9b84ec&quot;&gt;Connexion des abonné·es, mesure d’audience anonymisée, envoi des notifications push, suivi des pannes, mise en avant de nos services : ces outils sont nécessaires au suivi de l’activité de nos services et à leur bon fonctionnement.&lt;/p&gt;
&lt;button aria-expanded=&quot;false&quot; class=&quot;gateaux-secs__details-trigger focus&quot;&gt;
                                    en savoir plus
                                    
&lt;/button&gt;
&lt;div class=&quot;gateaux-secs__details&quot; hidden=&quot;&quot;&gt;
&lt;p class=&quot;gateaux-secs__text&quot; data-geo-id=&quot;geo-0720caa3&quot;&gt;Voici les différents cookies et technologies similaires compris dans cette catégorie :&lt;/p&gt;
&lt;ul class=&quot;gateaux-secs__text&quot; data-geo-id=&quot;geo-c76ecfc9&quot;&gt;
&lt;li&gt;&lt;b&gt;Cookies d’authentification&lt;/b&gt; : connexion des abonné·es.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;AT Internet&lt;/b&gt; : mesure d’audience anonymisée&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Affichage de contenus éditoriaux multimédias&lt;/b&gt; : vidéos (YouTube, Dailymotion, Vimeo, INA), réseaux sociaux (Facebook, Instagram, Pinterest, Twitter), documents (Scribd, Document Cloud, Slideshare), sons (SoundCloud, Spotify, Deezer), cartes (Google Maps, Mapbox, CartoDB, uMap), infographies (Highcharts, GitHub, Datawrapper, Flourish, Infogram, ThingLink, jQuery, Google Fonts, Bootstrap), live blogs (24liveblog, CoverItLive), aide à l’intégration de média dans les publications Journal et Club (Embedly).&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Typeform&lt;/b&gt; : questionnaires facultatifs pour recueillir les avis des lecteurs sur nos produits numériques.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Datadog (uniquement sur le site web)&lt;/b&gt; : indicateurs techniques et équilibrage de charge.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Selligent (uniquement sur le site web)&lt;/b&gt; : communication avec l’abonné·e, mise en avant des services, offres et avantages.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Batch (uniquement sur l’application)&lt;/b&gt; : envoi de notifications push et de messages in-app.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Firebase Cloud Messaging (uniquement sur l’application)&lt;/b&gt; : nécessaire au fonctionnement des notifications push sur Android.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Microsoft App Center (uniquement sur l’application)&lt;/b&gt; : système de mise à jour et de suivi des pannes de l’application.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;gateaux-secs__settings-body-content-block&quot;&gt;
&lt;div class=&quot;gateaux-secs__settings-body-content-block-heading&quot;&gt;
&lt;p class=&quot;gateaux-secs__text&quot; data-geo-id=&quot;geo-9c6342f6&quot;&gt;&lt;b&gt;Statistiques&lt;/b&gt;&lt;/p&gt;
&lt;div class=&quot;switch&quot;&gt;
&lt;input id=&quot;gateaux-secs-switch-visit&quot; name=&quot;visit&quot; type=&quot;checkbox&quot;/&gt;

&lt;span class=&quot;switch-handler&quot;&gt;
&lt;/span&gt;
&lt;/label&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;p class=&quot;gateaux-secs__text&quot; data-geo-id=&quot;geo-8379fc8b&quot;&gt;Ces outils nous permettent de recueillir des statistiques de fréquentation du site et de l’application mobile pour comprendre les usages, détecter d’éventuels problèmes et optimiser l’ergonomie de nos produits.&lt;/p&gt;
&lt;button aria-expanded=&quot;false&quot; class=&quot;gateaux-secs__details-trigger focus&quot;&gt;

&lt;/button&gt;
&lt;div class=&quot;gateaux-secs__details&quot; hidden=&quot;&quot;&gt;
&lt;p class=&quot;gateaux-secs__text&quot; data-geo-id=&quot;geo-f8ce27ae&quot;&gt;Voici les outils tiers compris dans cette catégorie :&lt;/p&gt;
&lt;ul class=&quot;gateaux-secs__text&quot; data-geo-id=&quot;geo-4fc28a09&quot;&gt;
&lt;li&gt;&lt;b&gt;AT Internet&lt;/b&gt; : mesure d’audience reliée à l’identifiant d’abonné·e.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;CrazyEggs (uniquement sur le site web)&lt;/b&gt; : analyse de parcours client.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Nonli (uniquement sur le site web)&lt;/b&gt; : permet à notre équipe des réseaux sociaux de publier les contenus Mediapart sur les réseaux sociaux.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Qiota (uniquement sur le site web)&lt;/b&gt; : gestion du système de datawall.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;p class=&quot;gateaux-secs__text&quot; data-geo-id=&quot;geo-4ba5cc8d&quot;&gt;Nous utilisons le service Qiota d’Opper Marketing Suite pour configurer l’activation d’un datawall sur certains de nos contenus (uniquement sur le site web). Ce dispositif destiné aux utilisateur·ices non abonné·es requiert la saisie d’une adresse email pour accéder aux contenus concernés. En fournissant cette information, l’utilisateur consent à sa collecte, son stockage et son utilisation à des fins statistiques. Conformément à la réglementation en vigueur, les utilisateurs disposent d’un droit d’accès, de rectification et de suppression de leurs données, qu’ils peuvent exercer en contactant dpo@opper.io.&lt;/p&gt;
