e, which only recently really began accepting that Africans had a dynamic past.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn2&quot; data-dcnode-id=&quot;1999&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;2000&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;2001&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;2002&quot;&gt;&lt;sup data-dcnode-id=&quot;2025&quot;&gt;&lt;span data-dcnode-id=&quot;2026&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2024&quot; instrument_node=&quot;&quot;&gt;This close attention to emotions was and is an ongoing theme in the anthropological literature on Africa. See, for example, Peter Geschiere, &lt;/span&gt;&lt;em data-dcnode-id=&quot;2022&quot;&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;The Modernity of Witchcraft: Politics and the Occult in Postcolonial Africa&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2021&quot; instrument_node=&quot;&quot;&gt;, trans. Peter Geschiere and Janet Roitman (Charlottesville, Va., 1997); Suzette Heald, &lt;/span&gt;&lt;em data-dcnode-id=&quot;2019&quot;&gt;&lt;span data-dcnode-id=&quot;2020&quot; instrument_node=&quot;&quot;&gt;Controlling Anger: The Sociology of Gisu Violence&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt; (Manchester, 1989); Wendy James, “The Names of Fear: Memory, History, and the Ethnography of Feeling among Uduk Refugees,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;2016&quot;&gt;&lt;span data-dcnode-id=&quot;2017&quot; instrument_node=&quot;&quot;&gt;Journal of the Royal Anthropological Institute&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2015&quot; instrument_node=&quot;&quot;&gt; 3, no. 1 (1997): 115–131; Adam Ashforth, &lt;/span&gt;&lt;em data-dcnode-id=&quot;2013&quot;&gt;&lt;span data-dcnode-id=&quot;2014&quot; instrument_node=&quot;&quot;&gt;Witchcraft, Violence, and Democracy in South Africa&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2012&quot; instrument_node=&quot;&quot;&gt; (Chicago, 2005); Deborah Durham, “Love and Jealousy in the Space of Death,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;2010&quot;&gt;&lt;span data-dcnode-id=&quot;2011&quot; instrument_node=&quot;&quot;&gt;Ethnos&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2009&quot; instrument_node=&quot;&quot;&gt; 67, no. 2 (2002): 155–179; Michael Lambek and Jacqueline S. Solway, “Just Anger: Scenarios of Indignation in Botswana and Madagascar,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;2007&quot;&gt;&lt;span data-dcnode-id=&quot;2008&quot; instrument_node=&quot;&quot;&gt;Ethnos&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2006&quot; instrument_node=&quot;&quot;&gt; 66, no. 1 (2001): 49–72. It has been picked up more recently by historians as well; Jennifer Cole and Lynn M. Thomas, eds., &lt;/span&gt;&lt;em data-dcnode-id=&quot;2004&quot;&gt;&lt;span data-dcnode-id=&quot;2005&quot; instrument_node=&quot;&quot;&gt;Love in Africa&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2003&quot; instrument_node=&quot;&quot;&gt; (Chicago, 2009).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn3&quot; data-dcnode-id=&quot;1989&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1990&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1991&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1992&quot;&gt;&lt;sup data-dcnode-id=&quot;1997&quot;&gt;&lt;span data-dcnode-id=&quot;1998&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1996&quot; instrument_node=&quot;&quot;&gt;Jürgen Habermas, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1994&quot;&gt;&lt;span data-dcnode-id=&quot;1995&quot; instrument_node=&quot;&quot;&gt;The Structural Transformation of the Public Sphere: An Inquiry into a Category of Bourgeois Society&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1993&quot; instrument_node=&quot;&quot;&gt; (Cambridge, Mass., 1989).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn4&quot; data-dcnode-id=&quot;1979&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1980&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1981&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1982&quot;&gt;&lt;sup data-dcnode-id=&quot;1987&quot;&gt;&lt;span data-dcnode-id=&quot;1988&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1986&quot; instrument_node=&quot;&quot;&gt;For example, see Joan B. Landes, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1984&quot;&gt;&lt;span data-dcnode-id=&quot;1985&quot; instrument_node=&quot;&quot;&gt;Women and the Public Sphere in the Age of the French Revolution&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1983&quot; instrument_node=&quot;&quot;&gt; (Ithaca, N.Y., 1988).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn5&quot; data-dcnode-id=&quot;1963&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1964&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1965&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1966&quot;&gt;&lt;sup data-dcnode-id=&quot;1977&quot;&gt;&lt;span data-dcnode-id=&quot;1978&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1976&quot; instrument_node=&quot;&quot;&gt;See, for example, Dorothy Ko, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1974&quot;&gt;&lt;span data-dcnode-id=&quot;1975&quot; instrument_node=&quot;&quot;&gt;Teachers of the Inner Chambers: Women and Culture in Seventeenth-Century China&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1973&quot; instrument_node=&quot;&quot;&gt; (Stanford, Calif., 1994); Martin W. Huang, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1971&quot;&gt;&lt;span data-dcnode-id=&quot;1972&quot; instrument_node=&quot;&quot;&gt;Desire and Fictional Narrative in Late Imperial China&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1970&quot; instrument_node=&quot;&quot;&gt; (Cambridge, Mass., 2001); and Wai-yee Li, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1968&quot;&gt;&lt;span data-dcnode-id=&quot;1969&quot; instrument_node=&quot;&quot;&gt;Enchantment and Disenchantment: Love and Illusion in Chinese Literature&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1967&quot; instrument_node=&quot;&quot;&gt; (Princeton, N.J., 1993).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn6&quot; data-dcnode-id=&quot;1953&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1954&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1955&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1956&quot;&gt;&lt;sup data-dcnode-id=&quot;1961&quot;&gt;&lt;span data-dcnode-id=&quot;1962&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1960&quot; instrument_node=&quot;&quot;&gt;Eugenia Lean, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1958&quot;&gt;&lt;span data-dcnode-id=&quot;1959&quot; instrument_node=&quot;&quot;&gt;Public Passions: The Trial of Shi Jianqiao and the Rise of Popular Sympathy in Republican China&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1957&quot; instrument_node=&quot;&quot;&gt; (Berkeley, Calif., 2007).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn7&quot; data-dcnode-id=&quot;1937&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1938&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1939&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1940&quot;&gt;&lt;sup data-dcnode-id=&quot;1951&quot;&gt;&lt;span data-dcnode-id=&quot;1952&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1950&quot; instrument_node=&quot;&quot;&gt;William M. Reddy, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1948&quot;&gt;&lt;span data-dcnode-id=&quot;1949&quot; instrument_node=&quot;&quot;&gt;The Navigation of Feeling: A Framework for the History of Emotions&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1947&quot; instrument_node=&quot;&quot;&gt; (Cambridge, 2001); release date from &lt;/span&gt;&lt;a class=&quot;link link-uri openInAnotherWindow&quot; data-dcnode-id=&quot;1945&quot; data-google-interstitial=&quot;false&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.amazon.com/Navigation-Feeling-Framework-History-Emotions/dp/0521004721&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1946&quot; instrument_node=&quot;&quot;&gt;http://www.amazon.com/Navigation-Feeling-Framework-History-Emotions/dp/0521004721&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1944&quot; instrument_node=&quot;&quot;&gt;. Barbara H. Rosenwein, “Worrying about Emotions in History,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1942&quot;&gt;&lt;span data-dcnode-id=&quot;1943&quot; instrument_node=&quot;&quot;&gt;American Historical Review&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1941&quot; instrument_node=&quot;&quot;&gt; 107, no. 3 (June 2002): 821–845.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn8&quot; data-dcnode-id=&quot;1918&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1919&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1920&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1921&quot;&gt;&lt;sup data-dcnode-id=&quot;1935&quot;&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;See Ute Frevert, “Angst vor Gefühlen? Die Geschichtsmächtigkeit von Emotionen im 20. Jahr-hundert,” in Paul Nolte, Manfred Hettling, Frank-Michael Kuhlemann, and Hans-Walter Schmuhl, eds., &lt;/span&gt;&lt;em data-dcnode-id=&quot;1932&quot;&gt;&lt;span data-dcnode-id=&quot;1933&quot; instrument_node=&quot;&quot;&gt;Perspektiven der Gesellschaftsgeschichte&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1931&quot; instrument_node=&quot;&quot;&gt; (Munich, 2000), 95–111; Martina Kessel, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1929&quot;&gt;&lt;span data-dcnode-id=&quot;1930&quot; instrument_node=&quot;&quot;&gt;Langeweile: Zum Umgang mit Zeit und Gefühlen in Deutschland vom späten 18. bis zum frühen 20. Jahrhundert&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1928&quot; instrument_node=&quot;&quot;&gt; (Göttingen, 2001); Alf Lüdtke, “Emotionen und Politik—zur Politik der Emotionen,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1926&quot;&gt;&lt;span data-dcnode-id=&quot;1927&quot; instrument_node=&quot;&quot;&gt;Sozialwissenschaftliche Informationen&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1925&quot; instrument_node=&quot;&quot;&gt;/&lt;/span&gt;&lt;em data-dcnode-id=&quot;1923&quot;&gt;&lt;span data-dcnode-id=&quot;1924&quot; instrument_node=&quot;&quot;&gt;SOWI&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1922&quot; instrument_node=&quot;&quot;&gt; 30, no. 3 (2001): 4–13; and conferences of Arbeitskreis Geschichte + Theorie (AG+T), including “Medien und Emotionen: Zur Geschichte ihrer Beziehungen seit dem 19. Jahrhundert” (Bochum, 2005), “Rationalisierungen des Gefühls: Zum Verhältnis von Wissenschaft und Emotionalität, 1880–1930” (Berlin, 2006), and “Die Präsenz der Gefühle: Männlichkeit und Emotion in der Moderne” (Berlin, 2007).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn9&quot; data-dcnode-id=&quot;1908&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1909&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1910&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1911&quot;&gt;&lt;sup data-dcnode-id=&quot;1916&quot;&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt;See Jan Plamper, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1913&quot;&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;Geschichte und Gefühl: Grundlagen der Emotionsgeschichte&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1912&quot; instrument_node=&quot;&quot;&gt; (Munich, 2012; forthcoming in English from Oxford University Press).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn10&quot; data-dcnode-id=&quot;1898&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1899&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1900&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1901&quot;&gt;&lt;sup data-dcnode-id=&quot;1906&quot;&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1905&quot; instrument_node=&quot;&quot;&gt;Alexander Pushkin, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1903&quot;&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;Eugene Onegin&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1902&quot; instrument_node=&quot;&quot;&gt;, trans. Charles Johnston (New York, 1979), 52.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn11&quot; data-dcnode-id=&quot;1888&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1889&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1890&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1891&quot;&gt;&lt;sup data-dcnode-id=&quot;1896&quot;&gt;&lt;span data-dcnode-id=&quot;1897&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1895&quot; instrument_node=&quot;&quot;&gt;Norbert Elias, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1893&quot;&gt;&lt;span data-dcnode-id=&quot;1894&quot; instrument_node=&quot;&quot;&gt;The Civilizing Process: Sociogenetic and Psychogenetic Investigations&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1892&quot; instrument_node=&quot;&quot;&gt;, trans. Edmund Jephcott, rev. ed. Eric Dunning, Johan Goudslom, and Stephen Mennell (Oxford, 2000), 162.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn12&quot; data-dcnode-id=&quot;1878&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1879&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1880&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1881&quot;&gt;&lt;sup data-dcnode-id=&quot;1886&quot;&gt;&lt;span data-dcnode-id=&quot;1887&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1885&quot; instrument_node=&quot;&quot;&gt;William D. Paden, Jr., Tilde Sankovitch, and Patricia H. Stäblein, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1883&quot;&gt;&lt;span data-dcnode-id=&quot;1884&quot; instrument_node=&quot;&quot;&gt;The Poems of the Troubadour Bertran de Born&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1882&quot; instrument_node=&quot;&quot;&gt; (Berkeley, Calif., 1986), 33.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn13&quot; data-dcnode-id=&quot;1868&quot;&gt;&lt;s quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1830&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1831&quot;&gt;&lt;sup data-dcnode-id=&quot;1836&quot;&gt;&lt;span data-dcnode-id=&quot;1837&quot; instrument_node=&quot;&quot;&gt;17&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1835&quot; instrument_node=&quot;&quot;&gt;This is suggested by some of the articles in Cole and Thomas, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1833&quot;&gt;&lt;span data-dcnode-id=&quot;1834&quot; instrument_node=&quot;&quot;&gt;Love in Africa&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1832&quot; instrument_node=&quot;&quot;&gt;. See my discussion of this book below.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn18&quot; data-dcnode-id=&quot;1818&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1819&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1820&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1821&quot;&gt;&lt;sup data-dcnode-id=&quot;1826&quot;&gt;&lt;span data-dcnode-id=&quot;1827&quot; instrument_node=&quot;&quot;&gt;18&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1825&quot; instrument_node=&quot;&quot;&gt;Peire Vidal, “Be m'agrada,” in Vidal, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1823&quot;&gt;&lt;span data-dcnode-id=&quot;1824&quot; instrument_node=&quot;&quot;&gt;Poesie&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1822&quot; instrument_node=&quot;&quot;&gt;, ed. D'Arco Silvio Avalle, 2 vols. (Milan, 1960), 1: 22, lines 13–14: “Per amor sui ta fort enamoratz, / Que d'amor son totas mas voluntatz.”&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn19&quot; data-dcnode-id=&quot;1811&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1812&quot;&gt;&lt;div class=&quot;footnote-content&quot; ; data-dcnode-id=&quot;1748&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1749&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1750&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1751&quot;&gt;&lt;sup data-dcnode-id=&quot;1756&quot;&gt;&lt;span data-dcnode-id=&quot;1757&quot; instrument_node=&quot;&quot;&gt;25&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1755&quot; instrument_node=&quot;&quot;&gt;Jochen Hellbeck, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1753&quot;&gt;&lt;span data-dcnode-id=&quot;1754&quot; instrument_node=&quot;&quot;&gt;Revolution on My Mind: Writing a Diary under Stalin&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1752&quot; instrument_node=&quot;&quot;&gt; (Cambridge, Mass., 2006).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn26&quot; data-dcnode-id=&quot;1738&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1739&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1740&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1741&quot;&gt;&lt;sup data-dcnode-id=&quot;1746&quot;&gt;&lt;span data-dcnode-id=&quot;1747&quot; instrument_node=&quot;&quot;&gt;26&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1745&quot; instrument_node=&quot;&quot;&gt;Dorothy Ko, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1743&quot;&gt;&lt;span data-dcnode-id=&quot;1744&quot; instrument_node=&quot;&quot;&gt;Cinderella's Sisters: A Revisionist History of Footbinding&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1742&quot; instrument_node=&quot;&quot;&gt; (Berkeley, Calif., 2005).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn27&quot; data-dcnode-id=&quot;1722&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1723&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1724&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1725&quot;&gt;&lt;sup data-dcnode-id=&quot;1736&quot;&gt;&lt;span data-dcnode-id=&quot;1737&quot; instrument_node=&quot;&quot;&gt;27&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1735&quot; instrument_node=&quot;&quot;&gt;For some others who share this trajectory, see, e.g., Gabrielle M. Spiegel, “Introduction,” in Spiegel, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1733&quot;&gt;&lt;span data-dcnode-id=&quot;1734&quot; instrument_node=&quot;&quot;&gt;Practicing History: New Directions in Historical Writing after the Linguistic Turn&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1732&quot; instrument_node=&quot;&quot;&gt; (New York, 2005), 1–31, here 18–19; Lynn Hunt, “The Experience of Revolution,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1730&quot;&gt;&lt;span data-dcnode-id=&quot;1731&quot; instrument_node=&quot;&quot;&gt;French Historical Studies&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1729&quot; instrument_node=&quot;&quot;&gt; 32, no. 4 (2009): 671–678, here 673–674. On the resurrection of the related important category of experience “as a pretheorized, prediscursive, direct encounter with others, with society, or with the past,” see Harold Mah, “The Predicament of Experience,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1727&quot;&gt;&lt;span data-dcnode-id=&quot;1728&quot; instrument_node=&quot;&quot;&gt;Modern Intellectual History&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1726&quot; instrument_node=&quot;&quot;&gt; 5, no. 1 (2008): 97–119, here 99.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn28&quot; data-dcnode-id=&quot;1712&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1713&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1714&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1715&quot;&gt;&lt;sup data-dcnode-id=&quot;1720&quot;&gt;&lt;span data-dcnode-id=&quot;1721&quot; instrument_node=&quot;&quot;&gt;28&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1719&quot; instrument_node=&quot;&quot;&gt;Ruth Leys, “The Turn to Affect: A Critique,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1717&quot;&gt;&lt;span data-dcnode-id=&quot;1718&quot; instrument_node=&quot;&quot;&gt;Critical Inquiry&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1716&quot; instrument_node=&quot;&quot;&gt; 37, no. 3 (2011): 434–472, here 437.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn29&quot; data-dcnode-id=&quot;1702&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1703&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1704&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1705&quot;&gt;&lt;sup data-dcnode-id=&quot;1710&quot;&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1709&quot; instrument_node=&quot;&quot;&gt;See, e.g., Margot L. Lyon, “Missing Emotion: The Limitations of Cultural Constructionism in the Study of Emotion,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1707&quot;&gt;&lt;span data-dcnode-id=&quot;1708&quot; instrument_node=&quot;&quot;&gt;Cultural Anthropology&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1706&quot; instrument_node=&quot;&quot;&gt; 10, no. 2 (1995): 244–263, esp. 258–259.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn30&quot; data-dcnode-id=&quot;1692&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1693&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1694&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1695&quot;&gt;&lt;sup data-dcnode-id=&quot;1700&quot;&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;See, in particular, Reddy's use of Daniel Wegner's studies on the difficulties associated with mental control, which “introduces an ironic monitoring process that increases the accessibility of the very thoughts that are least desired in consciousness,” and of Margaret Clark's pointing to “some clear evidence that choosing to express an emotion or to cognitively rehearse it may intensify or even create the actual experience of that emotion while choosing to suppress it or not think about it may have the opposite effect.” Reddy, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1697&quot;&gt;&lt;span data-dcnode-id=&quot;1698&quot; instrument_node=&quot;&quot;&gt;The Navigation of Feeling&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;, 29, 104.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn31&quot; data-dcnode-id=&quot;1682&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1683&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1684&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1685&quot;&gt;&lt;sup data-dcnode-id=&quot;1690&quot;&gt;&lt;span data-dcnode-id=&quot;1691&quot; instrument_node=&quot;&quot;&gt;31&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1689&quot; instrument_node=&quot;&quot;&gt;Felicity Callard and Daniel S. Margulies, “The Subject at Rest: Novel Conceptualizations of Self and Brain from Cognitive Neuroscience's Study of the ‘Resting State,’” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1687&quot;&gt;&lt;span data-dcnode-id=&quot;1688&quot; instrument_node=&quot;&quot;&gt;Subjectivity&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1686&quot; instrument_node=&quot;&quot;&gt; 4, no. 3 (2011): 227–257, here 247.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn32&quot; data-dcnode-id=&quot;1675&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1676&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1677&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1678&quot;&gt;&lt;sup data-dcnode-id=&quot;1680&quot;&gt;&lt;span data-dcnode-id=&quot;1681&quot; instrument_node=&quot;&quot;&gt;32&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1679&quot; instrument_node=&quot;&quot;&gt;Ibid., 240–241, 245.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn33&quot; data-dcnode-id=&quot;1668&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1669&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1670&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1671&quot;&gt;&lt;sup data-dcnode-id=&quot;1673&quot;&gt;&lt;span data-dcnode-id=&quot;1674&quot; instrument_node=&quot;&quot;&gt;33&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1672&quot; instrument_node=&quot;&quot;&gt;This was during the Q&amp;amp;A following his keynote lecture “Are Emotions Like Language?” at the conference “Learning to Feel,” Van Leer Institute, Jerusalem, April 14, 2011.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn34&quot; data-dcnode-id=&quot;1658&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1659&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1660&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1661&quot;&gt;&lt;sup data-dcnode-id=&quot;1666&quot;&gt;&lt;span data-dcnode-id=&quot;1667&quot; instrument_node=&quot;&quot;&gt;34&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1665&quot; instrument_node=&quot;&quot;&gt;Hayden White, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1663&quot;&gt;&lt;span data-dcnode-id=&quot;1664&quot; instrument_node=&quot;&quot;&gt;Metahistory: The Historical Imagination in Nineteenth-Century Europe&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1662&quot; instrument_node=&quot;&quot;&gt; (Baltimore, 1973), 26.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn35&quot; data-dcnode-id=&quot;1636&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1637&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1638&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1639&quot;&gt;&lt;sup data-dcnode-id=&quot;1656&quot;&gt;&lt;span data-dcnode-id=&quot;1657&quot; instrument_node=&quot;&quot;&gt;35&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1655&quot; instrument_node=&quot;&quot;&gt;Philippe Ariès, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1653&quot;&gt;&lt;span data-dcnode-id=&quot;1654&quot; instrument_node=&quot;&quot;&gt;Centuries of Childhood: A Social History of Family Life&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1652&quot; instrument_node=&quot;&quot;&gt;, trans. Robert Baldick (New York, 1962); Michael Zuckerman, “The Family Life of William Byrd,” in Zuckerman, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1650&quot;&gt;&lt;span data-dcnode-id=&quot;1651&quot; instrument_node=&quot;&quot;&gt;Almost Chosen People: Oblique Biographies in the American Vein&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1649&quot; instrument_node=&quot;&quot;&gt; (Berkeley, Calif., 1993), 97–114, esp. 104–109; Kenneth A. Lockridge, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1647&quot;&gt;&lt;span data-dcnode-id=&quot;1648&quot; instrument_node=&quot;&quot;&gt;The Diary, and Life, of William Byrd II of Virginia, 1674–1744&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1646&quot; instrument_node=&quot;&quot;&gt; (Chapel Hill, N.C., 1987). For an explication of the term “subject position,” see Linda Alcoff, “The Problem of Speaking for Others,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1644&quot;&gt;&lt;span data-dcnode-id=&quot;1645&quot; instrument_node=&quot;&quot;&gt;Cultural Critique&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1643&quot; instrument_node=&quot;&quot;&gt; 20 (1991–1992): 5–32. See also Dror Wahrman, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1641&quot;&gt;&lt;span data-dcnode-id=&quot;1642&quot; instrument_node=&quot;&quot;&gt;The Making of the Modern Self: Identity and Culture in Eighteenth-Century England&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1640&quot; instrument_node=&quot;&quot;&gt; (New Haven, Conn., 2004), xviii.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn36&quot; data-dcnode-id=&quot;1626&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1627&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1628&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1629&quot;&gt;&lt;sup data-dcnode-id=&quot;1634&quot;&gt;&lt;span data-dcnode-id=&quot;1635&quot; instrument_node=&quot;&quot;&gt;36&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1633&quot; instrument_node=&quot;&quot;&gt;For a recent summary of such studies, see Stephanie Ortigue, Francesco Bianchi-Demicheli, Nisa Patel, Chris Frum, and James W. Lewis, “Neuroimaging of Love: fMRI Meta-Analysis Evidence toward New Perspectives in Sexual Medicine,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1631&quot;&gt;&lt;span data-dcnode-id=&quot;1632&quot; instrument_node=&quot;&quot;&gt;Journal of Sexual Medicine&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1630&quot; instrument_node=&quot;&quot;&gt; 7, no. 11 (2010): 3541–3552.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn37&quot; data-dcnode-id=&quot;1607&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1608&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1609&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1610&quot;&gt;&lt;sup data-dcnode-id=&quot;1624&quot;&gt;&lt;span data-dcnode-id=&quot;1625&quot; instrument_node=&quot;&quot;&gt;37&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;Thomas wrote about the &lt;/span&gt;&lt;em data-dcnode-id=&quot;1621&quot;&gt;&lt;span data-dcnode-id=&quot;1622&quot; instrument_node=&quot;&quot;&gt;passiones animae&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1620&quot; instrument_node=&quot;&quot;&gt; inThomas Aquinas, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1618&quot;&gt;&lt;span data-dcnode-id=&quot;1619&quot; instrument_node=&quot;&quot;&gt;Summa Theologiae&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1617&quot; instrument_node=&quot;&quot;&gt; Ia2ae 22–48. A thorough introduction to his theory and his emotions words is Robert Miner, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1615&quot;&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt;Thomas Aquinas on the Passions: A Study of&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt; Summa Theologiae, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1612&quot;&gt;&lt;span data-dcnode-id=&quot;1613&quot; instrument_node=&quot;&quot;&gt;1a2ae 22–48&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1611&quot; instrument_node=&quot;&quot;&gt; (Cambridge, 2009).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn38&quot; data-dcnode-id=&quot;1600&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1601&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1602&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1603&quot;&gt;&lt;sup data-dcnode-id=&quot;1605&quot;&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt;38&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1604&quot; instrument_node=&quot;&quot;&gt;A quick read is Gendron, Lindquist, Barsalou, and Barrett, “Emotion Words Shape Emotion Precepts.”&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn39&quot; data-dcnode-id=&quot;1590&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1591&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1592&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1593&quot;&gt;&lt;sup data-dcnode-id=&quot;1598&quot;&gt;&lt;span data-dcnode-id=&quot;1599&quot; instrument_node=&quot;&quot;&gt;39&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1597&quot; instrument_node=&quot;&quot;&gt;See Lisa Feldman Barrett, Eliza Bliss-Moreau, Seth L. Duncan, Scott L. Rauch, and Christopher I. Wright, “The Amygdala and the Experience of Affect,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1595&quot;&gt;&lt;span data-dcnode-id=&quot;1596&quot; instrument_node=&quot;&quot;&gt;Social, Cognitive and Affective Neuroscience&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1594&quot; instrument_node=&quot;&quot;&gt; 2, no. 2 (2007): 73–83.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn40&quot; data-dcnode-id=&quot;1580&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1581&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1582&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1583&quot;&gt;&lt;sup data-dcnode-id=&quot;1588&quot;&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;40&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1587&quot; instrument_node=&quot;&quot;&gt;“Toward a Lexicon of Eighteenth-Century Emotion,” in Nicole Eustace, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1585&quot;&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;Passion Is the Gale: Emotion, Power, and the Coming of the American Revolution&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1584&quot; instrument_node=&quot;&quot;&gt; (Chapel Hill, N.C., 2008), 481–486.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn41&quot; data-dcnode-id=&quot;1567&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1568&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1569&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1570&quot;&gt;&lt;sup data-dcnode-id=&quot;1578&quot;&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;41&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt;Unni Wikan, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1575&quot;&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;Managing Turbulent Hearts: A Balinese Formula for Living&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt; (Chicago, 1990); P. J. Lang, M. M. Bradley, and B. N. Cuthbert, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1572&quot;&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt;International Affective Picture System (IAPS): Affective Ratings of Pictures and Instruction Manual&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt; (Gainesville, Fla., 2005).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn42&quot; data-dcnode-id=&quot;1542&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1543&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1544&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1545&quot;&gt;&lt;sup data-dcnode-id=&quot;1565&quot;&gt;&lt;span data-dcnode-id=&quot;1566&quot; instrument_node=&quot;&quot;&gt;42&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;Some recent articles discussing top-down processing are M. Bar et al., “Top-Down Facilitation of Visual Recognition,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1562&quot;&gt;&lt;span data-dcnode-id=&quot;1563&quot; instrument_node=&quot;&quot;&gt;Proceedings of the National Academy of Science&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt; 103, no. 2 (2006): 449–454; Eiling Yee and Julie C. Sedivy, “Eye Movements to Pictures Reveal Transient Semantic Activation during Spoken Word Recognition,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1559&quot;&gt;&lt;span data-dcnode-id=&quot;1560&quot; instrument_node=&quot;&quot;&gt;Journal of Experimental Psychology: Learning, Memory, and Cognition&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt; 32, no. 1 (2006): 1–14; Stephanie D. Preston and R. Brent Stansfield, “I Know How You Feel: Task-Irrelevant Facial Expressions Are Spontaneously Processed at a Semantic Level,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1556&quot;&gt;&lt;span data-dcnode-id=&quot;1557&quot; instrument_node=&quot;&quot;&gt;Cognitive, Affective &amp;amp; Behavioral Neuroscience&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1555&quot; instrument_node=&quot;&quot;&gt; 8, no. 1 (2008): 54–64; Nazanin Derakshan and Michael W. Eysenck, “Anxiety, Processing Efficiency, and Cognitive Performance: New Developments from Attentional Control Theory,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;European Psychologist&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt; 14, no. 2 (2009): 168–176; James J. Gross, Gal Sheppes, and Heather L. Urry, “Emotion Generation and Emotion Regulation: A Distinction We Should Make (Carefully),” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1550&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;Cognition and Emotion&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt; 25, no. 5 (2011): 765–781; Karina S. Blair and R. J. R. Blair, “A Cognitive Neuroscience Approach to Generalized Anxiety Disorder and Social Phobia,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1547&quot;&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt;Emotion Review&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt; 4, no. 2 (2012): 133–138.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn43&quot; data-dcnode-id=&quot;1535&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1536&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1537&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1538&quot;&gt;&lt;sup data-dcnode-id=&quot;1540&quot;&gt;&lt;span data-dcnode-id=&quot;1541&quot; instrument_node=&quot;&quot;&gt;43&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt;Already the database PsychInfo yields 32 results for a simple search on the keywords “DNA” and “emotion.”&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn44&quot; data-dcnode-id=&quot;1519&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1520&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1521&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1522&quot;&gt;&lt;sup data-dcnode-id=&quot;1533&quot;&gt;&lt;span data-dcnode-id=&quot;1534&quot; instrument_node=&quot;&quot;&gt;44&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1532&quot; instrument_node=&quot;&quot;&gt;Joseph LeDoux, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1530&quot;&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;The Emotional Brain: The Mysterious Underpinnings of Emotional Life&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt; (New York, 1996); Antonio R. Damasio, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1527&quot;&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;Descartes' Error: Emotion, Reason, and the Human Brain&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt; (New York, 1998); David M. Eagleman, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1524&quot;&gt;&lt;span data-dcnode-id=&quot;1525&quot; instrument_node=&quot;&quot;&gt;Incognito: The Secret Lives of the Brain&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1523&quot; instrument_node=&quot;&quot;&gt; (New York, 2011).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn45&quot; data-dcnode-id=&quot;1503&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1504&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1505&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1506&quot;&gt;&lt;sup data-dcnode-id=&quot;1517&quot;&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;45&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1516&quot; instrument_node=&quot;&quot;&gt;Daniel M. Gross, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1514&quot;&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;The Secret History of Emotion: From Aristotle's&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1513&quot; instrument_node=&quot;&quot;&gt; Rhetoric &lt;/span&gt;&lt;em data-dcnode-id=&quot;1511&quot;&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;to Modern Brain Science&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1510&quot; instrument_node=&quot;&quot;&gt; (Chicago, 2006); Ruth Leys, “How Did Fear Become a Scientific Object and What Kind of Object Is It?,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1508&quot;&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;Representations&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1507&quot; instrument_node=&quot;&quot;&gt; 110, no. 1 (2010): 66–104.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn46&quot; data-dcnode-id=&quot;1490&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1491&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1492&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1493&quot;&gt;&lt;sup data-dcnode-id=&quot;1501&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;46&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;For starters, I suggest Richard J. Davidson, “Seven Sins in the Study of Emotion: Correctives from Affective Neuroscience,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1498&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;Brain and Cognition&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt; 52, no. 1 (2003): 129–132; or Luiz Pessoa, “On the Relationship between Cognition and Emotion,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1495&quot;&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt;Nature Reviews Neuroscience&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt; 9 (2008): 148–158.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn47&quot; data-dcnode-id=&quot;1468&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1469&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1470&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1471&quot;&gt;&lt;sup data-dcnode-id=&quot;1488&quot;&gt;&lt;span data-dcnode-id=&quot;1489&quot; instrument_node=&quot;&quot;&gt;47&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;For an early and a recent critique of LeDoux's “two roads to fear” hypothesis, see, respectively, Ian Hacking, “By What Links Are the Organs Excited?,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1485&quot;&gt;&lt;span data-dcnode-id=&quot;1486&quot; instrument_node=&quot;&quot;&gt;Times Literary Supplement&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1484&quot; instrument_node=&quot;&quot;&gt;, July 17, 1998, 11–12; and the meta-analysis by Luiz Pessoa and Ralph Adolphs, “Emotion Processing and the Amygdala: From a ‘Low Road’ to ‘Many Roads’ of Evaluating Biological Significance,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1482&quot;&gt;&lt;span data-dcnode-id=&quot;1483&quot; instrument_node=&quot;&quot;&gt;Nature Reviews Neuroscience&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1481&quot; instrument_node=&quot;&quot;&gt; 11 (November 2010): 773–782. For meta-analytic critiques of the SMH and the mirror neuron hypothesis respectively, see Barnaby D. Dunn, Tim Dalgleish, and Andrew D. Lawrence, “The Somatic Marker Hypothesis: A Critical Evaluation,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1479&quot;&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt;Neuroscience and Biobehavioral Reviews&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1478&quot; instrument_node=&quot;&quot;&gt; 30, no. 2 (2006): 239–271; Gregory Hickok and Marc Hauser, “(Mis)understanding Mirror Neurons,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1476&quot;&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;Current Biology&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1475&quot; instrument_node=&quot;&quot;&gt; 20, no. 14 (2010): R593–R594; Vittorio Gallese, Morton Ann Gernsbacher, Cecilia Heyes, Gregory Hickok, and Marco Iacoboni, “Mirror Neuron Forum,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1473&quot;&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;Perspectives on Psychological Science&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1472&quot; instrument_node=&quot;&quot;&gt; 6, no. 4 (2011): 369–407, here 370–371, 373–375.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn48&quot; data-dcnode-id=&quot;1458&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1459&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1460&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1461&quot;&gt;&lt;sup data-dcnode-id=&quot;1466&quot;&gt;&lt;span data-dcnode-id=&quot;1467&quot; instrument_node=&quot;&quot;&gt;48&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1465&quot; instrument_node=&quot;&quot;&gt;See William E. Connolly, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1463&quot;&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;A World of Becoming&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1462&quot; instrument_node=&quot;&quot;&gt; (Durham, N.C., 2011), 24 (bacteria), 26 (dung beetles).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn49&quot; data-dcnode-id=&quot;1448&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1449&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1450&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1451&quot;&gt;&lt;sup data-dcnode-id=&quot;1456&quot;&gt;&lt;span data-dcnode-id=&quot;1457&quot; instrument_node=&quot;&quot;&gt;49&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1455&quot; instrument_node=&quot;&quot;&gt;On this see Otniel E. Dror's work, e.g., “The Affect of Experiment: The Turn to Emotions in Anglo-American Physiology, 1900–1940,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1453&quot;&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;Isis&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1452&quot; instrument_node=&quot;&quot;&gt; 90, no. 2 (1999): 205–237.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn50&quot; data-dcnode-id=&quot;1438&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1439&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1440&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1441&quot;&gt;&lt;sup data-dcnode-id=&quot;1446&quot;&gt;&lt;span data-dcnode-id=&quot;1447&quot; instrument_node=&quot;&quot;&gt;50&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1445&quot; instrument_node=&quot;&quot;&gt;See Plamper, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1443&quot;&gt;&lt;span data-dcnode-id=&quot;1444&quot; instrument_node=&quot;&quot;&gt;Geschichte und Gefühl&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1442&quot; instrument_node=&quot;&quot;&gt;, 287–293.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn51&quot; data-dcnode-id=&quot;1425&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1426&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1427&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1428&quot;&gt;&lt;sup data-dcnode-id=&quot;1436&quot;&gt;&lt;span data-dcnode-id=&quot;1437&quot; instrument_node=&quot;&quot;&gt;51&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1435&quot; instrument_node=&quot;&quot;&gt;“Cogmotive” is derived from “cogmotion” in Douglas Barnett and Hilary Horn Ratner, “Introduction: The Organization and Integration of Cognition and Emotion in Development,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1433&quot;&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt;Journal of Developmental Child Psychology&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1432&quot; instrument_node=&quot;&quot;&gt; 67, no. 3 (1997): 303–316. I first encountered it in Reddy, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1430&quot;&gt;&lt;span data-dcnode-id=&quot;1431&quot; instrument_node=&quot;&quot;&gt;The Navigation of Feeling&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1429&quot; instrument_node=&quot;&quot;&gt;, 15.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn52&quot; data-dcnode-id=&quot;1415&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1416&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1417&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1418&quot;&gt;&lt;sup data-dcnode-id=&quot;1423&quot;&gt;&lt;span data-dcnode-id=&quot;1424&quot; instrument_node=&quot;&quot;&gt;52&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1422&quot; instrument_node=&quot;&quot;&gt;Hugh Shapiro, “The Puzzle of Spermatorrhea in Republican China,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1420&quot;&gt;&lt;span data-dcnode-id=&quot;1421&quot; instrument_node=&quot;&quot;&gt;Positions: East Asia Cultures Critique&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1419&quot; instrument_node=&quot;&quot;&gt; 6, no. 3 (1998): 551–596.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn53&quot; data-dcnode-id=&quot;1405&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1406&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1407&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1408&quot;&gt;&lt;sup data-dcnode-id=&quot;1413&quot;&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;53&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;See, for example, Peter N. Stearns, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1410&quot;&gt;&lt;span data-dcnode-id=&quot;1411&quot; instrument_node=&quot;&quot;&gt;American Cool: Constructing a Twentieth-Century Emotional Style&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1409&quot; instrument_node=&quot;&quot;&gt; (New York, 1994).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn54&quot; data-dcnode-id=&quot;1383&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1384&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1385&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1386&quot;&gt;&lt;sup data-dcnode-id=&quot;1403&quot;&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt;54&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;For what we call emotions today, Cicero used the word &lt;/span&gt;&lt;em data-dcnode-id=&quot;1400&quot;&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt;perturbationes&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1399&quot; instrument_node=&quot;&quot;&gt; (perturbations), Saint Augustine &lt;/span&gt;&lt;em data-dcnode-id=&quot;1397&quot;&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;affectiones&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt; (affects; affections), and Thomas Aquinas &lt;/span&gt;&lt;em data-dcnode-id=&quot;1394&quot;&gt;&lt;span data-dcnode-id=&quot;1395&quot; instrument_node=&quot;&quot;&gt;passiones&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt; (passions); and until recently, even English speakers talked about passions, sentiments, and so on, without needing the word “emotion.” On that point, see Thomas Dixon, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1391&quot;&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;From Passions to Emotions: The Creation of a Secular Psychological Category&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt; (Cambridge, 2003). For the changing terms that have come under the rubric of emotions, see my “Emotion Words,” in Piroska Nagy and Damien Boquet, eds., &lt;/span&gt;&lt;em data-dcnode-id=&quot;1388&quot;&gt;&lt;span data-dcnode-id=&quot;1389&quot; instrument_node=&quot;&quot;&gt;Le sujet des émotions au moyen âge&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt; (Paris, 2008), 93–106.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn55&quot; data-dcnode-id=&quot;1373&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1374&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1375&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1376&quot;&gt;&lt;sup data-dcnode-id=&quot;1381&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;55&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1380&quot; instrument_node=&quot;&quot;&gt;Stearns, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1378&quot;&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;American Cool&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;, 63.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn56&quot; data-dcnode-id=&quot;1363&quot;&gt;&lt;span class=&quot;fn&quot; quot;footnote&quot; content-id=&quot;fn83&quot; data-dcnode-id=&quot;1073&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1074&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1075&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1076&quot;&gt;&lt;sup data-dcnode-id=&quot;1081&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;83&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt;See, e.g., on the multidirectional traffic of emotion concepts between the Greek, Perso-Arabic, Indian, and British contexts, Margrit Pernau, “The Indian Body and Unani Medicine: Body History as Entangled History,” in Axel Michaels and Christoph Wulf, eds., &lt;/span&gt;&lt;em data-dcnode-id=&quot;1078&quot;&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;Images of the Body in India&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1077&quot; instrument_node=&quot;&quot;&gt; (New Delhi, 2011), 97–108, here 104–106.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn84&quot; data-dcnode-id=&quot;1063&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1064&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1065&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1066&quot;&gt;&lt;sup data-dcnode-id=&quot;1071&quot;&gt;&lt;span data-dcnode-id=&quot;1072&quot; instrument_node=&quot;&quot;&gt;84&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;Zouhair Ghazzal, “From Anger on Behalf of God to ‘Forbearance’ in Islamic Medieval Literature,” in Barbara H. Rosenwein, ed., &lt;/span&gt;&lt;em data-dcnode-id=&quot;1068&quot;&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt;Anger's Past: The Social Uses of an Emotion in the Middle Ages&lt;/span&  instrument_node=&quot;&quot;&gt;See Catherine A. Lutz, &lt;/span&gt;&lt;em data-dcnode-id=&quot;1045&quot;&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;Unnatural Emotions: Everyday Sentiments on a Micronesian Atoll and Their Challenge to Western Theory&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt; (Chicago, 1988), 82, 88–89, 92–94, 102–103.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn87&quot; data-dcnode-id=&quot;1018&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1019&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1020&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1021&quot;&gt;&lt;sup data-dcnode-id=&quot;1038&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;87&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;As Carla Hesse writes, “realism, as a philosophical stance, is a necessary foundation for any empirical claim to be able to reconstruct facts from evidence and to claim that language (and more broadly any system of signification—visual, textual or aural) has a denotative as well as a connotative function. That language is at some level referential (that it refers to something outside itself, albeit contingently) is critical, moreover, if one is to be able to make sustainable general claims—about culture, or about any other aspect of human existence.” Hesse, “The New Empiricism,” &lt;/span&gt;&lt;em data-dcnode-id=&quot;1035&quot;&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;Cultural and Social History&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt; 1, no. 2 (2004): 201–207, here 202. On early modern German &lt;/span&gt;&lt;em data-dcnode-id=&quot;1032&quot;&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;Forcht&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt; and nineteenth-century &lt;/span&gt;&lt;em data-dcnode-id=&quot;1029&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;Furcht&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;, see the work of Andreas Bähr, e.g., &lt;/span&gt;&lt;em data-dcnode-id=&quot;1026&quot;&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;Furcht und Furchtlosigkeit: Göttliche Gewalt und Selbstkonstitution im 17. Jahrhundert&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt; (Göttingen, forthcoming 2013); David Lederer, “Fear of the Thirty Years War,” in Michael Laffan and Max Weiss, eds., &lt;/span&gt;&lt;em data-dcnode-id=&quot;1023&quot;&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;Facing Fear: The History of an Emotion in Global Perspective&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt; (Princeton, N.J., 2012), 10–30.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn88&quot; data-dcnode-id=&quot;1011&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;1012&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;1013&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;1014&quot;&gt;&lt;sup data-dcnode-id=&quot;1016&quot;&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;88&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;1015&quot; instrument_node=&quot;&quot;&gt;See, e.g., the freeware programs Signature (by Peter Millican) or JGAAP (the Java Graphical Authorship Attribution Program by Patrick Juola).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/span&gt;&lt;/div&gt;&lt;div
