e nineteenth-century Russian army, whereas everyone talked about it in the twentieth century. One reason for this change was the new place of psychiatry within the military and the new interest among psychiatrists in the role of fear. To deal with the challenges and hazards of modern warfare, psychiatrists were hired to train new recruits. Part of their task was to teach rookie soldiers to control their fear. When these same psychiatrists treated men debilitated by war, they needed to understand fear's many manifestations. Psychiatric theory made fear a “valued”—or at any rate a much-talked-about—emotion.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2399&quot;&gt;&lt;span data-dcnode-id=&quot;2405&quot; instrument_node=&quot;&quot;&gt;All of these explanations make sense. Nevertheless, I see another factor involved in emotional change in history: the rise of certain emotional communities to positions of power or great prestige. In every period there is more than one emotional community, just as there is more than one social group, although the ones in power tend to monopolize the sources that we historians see. As new groups become powerful, whether politically (French Revolutionaries) or economically (Hanse merchants) or religiously (Protestants in seventeenth-century England) or scientifically (members of the eighteenth-century Royal Society of London) or in other ways, they bring their emotional norms, behaviors, standards, valuations, and “scripts” with them.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2401&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2404&quot; id=&quot;jumplink-fn59&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2402&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn59&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn59&quot;&gt;&lt;span data-dcnode-id=&quot;2403&quot; instrument_node=&quot;&quot;&gt;59&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2400&quot; instrument_node=&quot;&quot;&gt; They tend to mute the voices (or rather suppress our ability to hear them) of other communities that, however, are still talking, still feeling, and (at another point in time, perhaps) may themselves come to the fore.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2397&quot;&gt;&lt;span data-dcnode-id=&quot;2398&quot; instrument_node=&quot;&quot;&gt;Because of my interest in a variety of communities, I am not as impressed with the issues of discipline and control as many others in this field. Bill Reddy has, in this very discussion, spoken of how “communities [are] engaged in managing emotions.” Yes, it's true. But people also have a way of finding (or carving out) little islands for themselves—communities that work for them, that make them comfortable—and that “comfort” may be true even for those communities that are very ascetic and very emotionally limiting in the ways that Bill has dubbed emotional suffering. But this is potentially another topic, and a very large one.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2392&quot;&gt;&lt;strong data-dcnode-id=&quot;2394&quot;&gt;&lt;em data-dcnode-id=&quot;2395&quot;&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;William M. Reddy:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2393&quot; instrument_node=&quot;&quot;&gt; Thanks to Barbara for this very thoughtful and thorough review of the options before us in thinking about emotional change in history. I completely agree that the ways in which emotions can change are multiple. I like all four of her proposed models of change. Her reading of my own proposal on this issue is telling and in no need of correction.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2381&quot;&gt;&lt;span data-dcnode-id=&quot;2391&quot; instrument_node=&quot;&quot;&gt;My new book, &lt;/span&gt;&lt;em data-dcnode-id=&quot;2389&quot;&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt;The Making of Romantic Love&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2388&quot; instrument_node=&quot;&quot;&gt;, does argue, as Barbara indicates, that intense longing for specific splendid sexual partners is a feature of many cultural contexts. (Medieval Europe, South Asia, and Japan are dealt with in detail.) Such longing was common in Europe prior to the Gregorian Reform of the twelfth century, I argue, and the church's attempt to treat such longing as a sinful manifestation of sexual appetite contributed in a crucial way to the emergence of courtly love. Rather than suffer the intense shame that reformers wished to heap on those guilty of sexual transgressions, certain aristocrats and courtiers quietly elaborated a different, vernacular code centered on a new emotion called &lt;/span&gt;&lt;em data-dcnode-id=&quot;2386&quot;&gt;&lt;span data-dcnode-id=&quot;2387&quot; instrument_node=&quot;&quot;&gt;fin'amors&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2385&quot; instrument_node=&quot;&quot;&gt; (roughly “true love”). The argument parallels my discussion in &lt;/span&gt;&lt;em data-dcnode-id=&quot;2383&quot;&gt;&lt;span data-dcnode-id=&quot;2384&quot; instrument_node=&quot;&quot;&gt;The Navigation of Feeling&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2382&quot; instrument_node=&quot;&quot;&gt; of the suffering inflicted by the Jacobin emotional style of the 1790s, and the resulting collapse of sentimentalism.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2379&quot;&gt;&lt;span data-dcnode-id=&quot;2380&quot; instrument_node=&quot;&quot;&gt;Limiting all methods by which emotions may change, in my view, is the fact that emotions are partially, but not entirely, subject to “voluntary” shaping, or to “cultural” shaping via discourse and practice. The success of such shaping is never entirely predictable. Therefore, the rise of a new emotional style cannot be a mere process of social “construction”; it tests a community's responses and achieves success only if it “works” well enough. Neither the Jacobins nor the Gregorian reformers offered conceptualizations of emotional response that were sufficiently flexible to “work” for more than a small minority. The implicit functionalism that I embrace in using the verb “works” in this way is, in my view, a very important escape route from the potentially sterile historicism of new cultural history.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2377&quot;&gt;&lt;span data-dcnode-id=&quot;2378&quot; instrument_node=&quot;&quot;&gt;The question of how an emotional style works, and for whom, is also the key to the political significance of emotions. Social collaboration requires sharing of emotional styles; finely coordinated action cannot be achieved without the standardization of an emotional code of some kind. But any given emotional style will impose suffering differentially across a population, and will permit variation and deviation to varying degrees. Pushback can take various forms as well.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2375&quot;&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;Thanks to all for this opportunity to reflect on such important issues.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2370&quot;&gt;&lt;strong data-dcnode-id=&quot;2372&quot;&gt;&lt;em data-dcnode-id=&quot;2373&quot;&gt;&lt;span data-dcnode-id=&quot;2374&quot; instrument_node=&quot;&quot;&gt;Eugenia Lean:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2371&quot; instrument_node=&quot;&quot;&gt; Though historians should of course be concerned with change over time, I would like to express some reservations about how the question has been posed here, namely, an investigation into change over time that does not consider space. To start, by not considering the issue of space explicitly, questions that dwell on change over time often enable assumptions of the West as the normative space to be considered, and the very question of “do emotions change over time” more often than not results in a temporal mapping of emotions in the “West.” This is evident, for instance, in the question's presentation of the genealogy of early Stoicists to Foucault or its focus on the thematics of discipline and control (concerns in the Western history of affect, perhaps, but hardly universal). I appreciate both the Editor's care in the first half of his question to put “civilization” and “modernity” in scare quotes, and Barbara's point that we should put aside Elias's concern with the civilizing process. However, given that this conversation includes scholars covering very different times and places, the presentation of Europe-based thematics and genealogy as self-evidently important to all in the second half of the question sends a message (even if it was not so intended) to those of us not doing European history that Europe once again serves as the norm.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2356&quot;&gt;&lt;span data-dcnode-id=&quot;2369&quot; instrument_node=&quot;&quot;&gt;Moreover, the choice to cite a genealogy of thinkers for their views on affect over time serves to reinforce the very method employed in Western civilization narratives that the first half of the question so carefully seeks to dispose of. As a China historian, I could easily answer this question in the same vein of “change over time” among thinkers and writers of affect in China, and my reading would offer a radically different genealogy, one that moves, for instance, from tracing the ethical concept of “sentiment” (&lt;/span&gt;&lt;em data-dcnode-id=&quot;2367&quot;&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt;qing&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2366&quot; instrument_node=&quot;&quot;&gt;) from the Confucian philosopher Xun Zi (c. 335 &lt;/span&gt;&lt;span class=&quot;small-caps&quot; data-dcnode-id=&quot;2364&quot;&gt;&lt;span data-dcnode-id=&quot;2365&quot; instrument_node=&quot;&quot;&gt;b.c.e&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt;.–ca. 238 &lt;/span&gt;&lt;span class=&quot;small-caps&quot; data-dcnode-id=&quot;2361&quot;&gt;&lt;span data-dcnode-id=&quot;2362&quot; instrument_node=&quot;&quot;&gt;b.c.e&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2360&quot; instrument_node=&quot;&quot;&gt;.) to the Song dynasty thinker Zhu Xi (1130–1200), to the writers of the late imperial Cult of &lt;/span&gt;&lt;em data-dcnode-id=&quot;2358&quot;&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;Qing&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2357&quot; instrument_node=&quot;&quot;&gt;, to early-twentieth-century Mandarin Duck and Butterfly fiction authors, to Mao Zedong. But I am not convinced of the merit of such an exercise. In doing so, the best I could hope for is that I would demonstrate that there exists an Eastern or Chinese civilizational narrative to complement the Western civilizational narrative, and thereby de-center the implicit universalism often assumed in a Western civilizational narrative. But most likely, all that would happen is that historians studying the West would acknowledge that while other civilizations and traditions of affect exist, there is no need to engage or address them substantively, as they are assumed to be separate in their own development over time. The history field at large has moved away from this comparative civilization studies approach with exciting developments in global history, transnational studies, and postcolonial criticism. I think we historians of emotions need to be careful not to resurrect it, even if unintentionally.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2345&quot;&gt;&lt;span data-dcnode-id=&quot;2355&quot; instrument_node=&quot;&quot;&gt;This brings me to my next point, that by not considering one's spatial analysis and taking the “Europe” in a European genealogy of thinkers as a given, or the “Chinese” in a “Chinese tradition” of sentiment as fixed, we historians miss the opportunity to appreciate the actual historical space and spatial linkages that emotions cover and, importantly, constitute. Throughout history, emotions do not solely “develop over time,” but move and traverse over space, small-scale and large, and in messy, unexpected ways that do not conform to civilizational, regional, national, or local boundaries. The methodological challenge, then, is to conceptualize how to grapple with the issue of space. Scholars of other subdisciplines in the field of history are engaging with the question of space in very sophisticated ways, without neglecting development over time. Those informed by postcolonialism and interested in questions of colonial circuits and imperialist networks that span large global spaces are doing so; so too are those investigating the history of science, environment, medicine, and climate, where the objects of study ignore national, regional, imperial boundaries; and those interested in migration of bodies and things in early modern sea voyages, over the Silk Road, through circuits of Buddhism and early Christianity, as well as through today's global networks. Some historians of the intimate are similarly avoiding a Western civilization narrative (or, for that matter, a separate Chinese or South Asian or African civilization narrative) of affect by considering the concrete historical connections and networks of sentiment that cross borders. An excellent example that comes to mind is Ann Stoler's work on how Dutch colonial policy regarding affairs of the heart and matters of the intimate, from miscegenation to interracial child-rearing in nineteenth- and early-twentieth-century Indonesia, impacted the subjectivity of Europeans in the metropole and Dutch colonizers and settlers in Indonesia, as well as the intimate lives of Indonesians.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2351&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2354&quot; id=&quot;jumplink-fn60&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2352&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn60&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn60&quot;&gt;&lt;span data-dcnode-id=&quot;2353&quot; instrument_node=&quot;&quot;&gt;60&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2350&quot; instrument_node=&quot;&quot;&gt; Hers is also a powerful and direct response to Foucault's neglect to consider the importance of the colonial context and the colonial Other in his theorization of the making of the sexual identity of the modern European bourgeois subject.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2346&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2349&quot; id=&quot;jumplink-fn61&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2347&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn61&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn61&quot;&gt;&lt;span data-dcnode-id=&quot;2348&quot; instrument_node=&quot;&quot;&gt;61&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2338&quot;&gt;&lt;span data-dcnode-id=&quot;2344&quot; instrument_node=&quot;&quot;&gt;Beyond the issue of timeliness, there is also a real political and moral imperative in thinking about space when we pose questions about change over time. Tracing one “civilization's” development in isolation from the history of another “civilization” precisely allows for those metanarratives of superiority theorized by Elias and others whom we have noted at several points in this discussion that we want to put aside. Postcolonial critics have long made this point: the civilizational approach and its universalistic presumptions are hardly “pure” or “objective” pursuits of knowledge, but have historically served as the handmaiden to highly violent and extractive practices of colonialism from the eighteenth century onward.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2340&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2343&quot; id=&quot;jumplink-fn62&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2341&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn62&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn62&quot;&gt;&lt;span data-dcnode-id=&quot;2342&quot; instrument_node=&quot;&quot;&gt;62&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2339&quot; instrument_node=&quot;&quot;&gt; And many who have taken seriously the postcolonial intervention are now among those who are moving beyond civilization models, or comparative national histories, to start to investigate more clearly a long history of how transnational, trans-imperial, global networks facilitated exchange and transmission in unexpected ways. I thus urge that we, in our twenty-first-century exchange on the history of emotions, tread carefully and not resort to more conventional methods of analysis, and instead push forward by thinking about emotions in space. In doing so, we have the added benefit of avoiding the risk of re-inscribing politically problematic fault lines in the production of knowledge.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2336&quot;&gt;&lt;span data-dcnode-id=&quot;2337&quot; instrument_node=&quot;&quot;&gt;On a related note, I want to express some concern regarding tracing change over time through disembodied ideas about affect or discrete emotions (e.g., rage, love), especially via “great thinkers” (usually men). By not contextualizing the production of ideas by considering how they were produced, legitimated, and institutionalized in their local, social, political, and spatial contexts, we fail to understand how these ideas of affect gain prominence to shape practice and subjectivity. Such an approach, again, might risk invoking the civilizational narratives we want to avoid, one that has often traditionally focused on the history of (male) ideas developing in fixed spatial units. Ironically, such an approach is, moreover, fundamentally at odds with the approaches that originally inspired the history of emotions—approaches that have long challenged the history of (male) ideas, whether it is social history, poststructuralism, the history of the body, gender studies, the history of everyday life, or anthropology. It moves us away from the issue of the body and gender and the somatic aspect of emotions that we have spent much productive time discussing. It risks appearing in conflict with what was at the heart of our lively discussion and exploration in the previous question regarding neuroscience, namely, debating how to move forward innovatively, if cautiously, by interrogating new methodologies and ways of thinking and writing about the human experience in the past.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2334&quot;&gt;&lt;span data-dcnode-id=&quot;2335&quot; instrument_node=&quot;&quot;&gt;In short, even though I am sure that the original question did not intend to convey a Eurocentric message, my discomfort with it stems from its potential to allow such narratives to emerge. My ambivalence, moreover, does not solely have to do with matters of political correctness, but also stems from the fact that real methodological issues are at stake. Our discussion so far has rather systematically ignored the issue of space even as we have challenged the problems of privileging the history of affect in the modern period. Without any awareness of or attention to this, we historians of emotions will miss a crucial opportunity to make the history of emotions subfield part of a trend that is pushing the field of history forward in innovative ways.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2325&quot;&gt;&lt;strong data-dcnode-id=&quot;2331&quot;&gt;&lt;em data-dcnode-id=&quot;2332&quot;&gt;&lt;span data-dcnode-id=&quot;2333&quot; instrument_node=&quot;&quot;&gt;Julie Livingston:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2330&quot; instrument_node=&quot;&quot;&gt; I am in total agreement with Eugenia on this and very grateful for how she has laid out the problem at hand. Simply dispensing with Elias is not enough to rethink our way out of his shadow or the sort of politics of knowledge that his ideas evidence. If we understand emotions as necessarily social processes, then we must contemplate them within socially complex and dynamic historical worlds. These worlds are linked and at times densely connected through movements of people, goods, ideas, and of course the prevention of movement such that some found themselves trapped in increasingly untenable worlds. The terror of captivity that Africans felt in the barracoons and in the holds of slave ships cannot be easily separated from the cultivated emotional dispositions necessary among European capitalists to commodify human beings as part of a set of “rational,” dry financial calculations. Yet, as Stephanie Smallwood's work on the middle passage shows so brilliantly, the ledger book and the ship's log reveal both at work.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2326&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2329&quot; id=&quot;jumplink-fn63&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2327&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn63&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn63&quot;&gt;&lt;span data-dcnode-id=&quot;2328&quot; instrument_node=&quot;&quot;&gt;63&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2323&quot;&gt;&lt;span data-dcnode-id=&quot;2324&quot; instrument_node=&quot;&quot;&gt;How and why emotional norms or possibilities change is a fine question, but it gets back to the definitional issues that make emotions so fascinating, yet slippery to contemplate. Without conjoining the history of emotions to changing or contested notions of personhood, we risk reducing emotions to property or objects or language or texts (shared or individuated), a process that stands to efface the complexity of consciousness and the primacy of aesthetics and form.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2309&quot;&gt;&lt;span data-dcnode-id=&quot;2322&quot; instrument_node=&quot;&quot;&gt;How emotions change over time (or for that matter how in some moments continuity is maintained when so much else is changing) is an important question. But in order to answer it, we also need to keep our understandings of time open and problematized. Is time moving forward, backward, standing still, looping? Is it a web of intersecting and multidirectional scales? For example, large-scale traumatic events, like famine or war or political violence, can thrust familiar but latent affective possibilities into the foreground, linking recursive pasts to the present. David Schoen-brun's ongoing work on experiences of loss and mourning as central to the history of political legitimation in early modern Bunyoro offers a beautiful example of this.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2318&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2321&quot; id=&quot;jumplink-fn64&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2319&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn64&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn64&quot;&gt;&lt;span data-dcnode-id=&quot;2320&quot; instrument_node=&quot;&quot;&gt;64&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2317&quot; instrument_node=&quot;&quot;&gt; So does Jennifer Cole's book on memory in Madagascar or Elias Mandala's &lt;/span&gt;&lt;em data-dcnode-id=&quot;2315&quot;&gt;&lt;span data-dcnode-id=&quot;2316&quot; instrument_node=&quot;&quot;&gt;The End of Chidyerano&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2314&quot; instrument_node=&quot;&quot;&gt; on food in Malawi, both of which suggest that there are moments beyond the pale that instantiate a surge of memory, a recognition of rupture (but familiar, looping sorts of rupture), the return of knowledge and feeling (and sometimes the return of persons, ancestors to channel, mark, and manage this) that had been set aside and unconsciously carried forward.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2310&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2313&quot; id=&quot;jumplink-fn65&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2311&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn65&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn65&quot;&gt;&lt;span data-dcnode-id=&quot;2312&quot; instrument_node=&quot;&quot;&gt;65&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2307&quot;&gt;&lt;span data-dcnode-id=&quot;2308&quot; instrument_node=&quot;&quot;&gt;I take Eugenia's points quite seriously. I am not suggesting that there is some “African” emotional style or sense of time that is distinct and necessary for the understanding of Africa. I am suggesting that in any context one finds philosophy, modes of remembering, an aesthetics of history that are worth contemplating in highly situated ways, but which are also to some extent portable, worthy of being carried to other contexts in order to stimulate a rethinking of received wisdom, of what have become naturalized categories of analysis. There is a politics here, and setting up a European theoretical genealogy to which we might respond unintentionally evidences that politics, while obscuring the power that underlies it. But it also takes us away from the exciting and productive possibilities that are open to us if we are willing to read more broadly. It doesn't surprise me at all that, for example, many current theories of affect (like the new interest in social networking or the “discovery” by medical sociologists that we are connected to one another more than by virtue of our individual bodies as potential carriers of disease) are actually old hat, well-developed philosophical stances among twentieth-century Batswana. This is not to resurrect some overly romantic vision of timeless African wisdom, goodness knows, but simply to remind us that theorizing, meaning-making, envisioning a different set of possibilities for the world, is an inherently human and an inherently political pursuit.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2302&quot;&gt;&lt;strong data-dcnode-id=&quot;2304&quot;&gt;&lt;em data-dcnode-id=&quot;2305&quot;&gt;&lt;span data-dcnode-id=&quot;2306&quot; instrument_node=&quot;&quot;&gt;William M. Reddy:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2303&quot; instrument_node=&quot;&quot;&gt; One can only be grateful for the last two very engaged and richly suggestive interventions. However, I do feel that, to a certain extent, Eugenia and Julia are pushing on an open door. &lt;/span&gt;&lt;/p&gt;&lt;ol class=&quot;order&quot; data-dcnode-id=&quot;2243&quot;&gt;&lt;li data-dcnode-id=&quot;2297&quot;&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2300&quot;&gt;&lt;span data-dcnode-id=&quot;2301&quot; instrument_node=&quot;&quot;&gt;In the U.S., the history of Europe is ill, pessimists might say, terminally ill. More optimistically, one could say that it is in a fruitful period of crisis, perhaps. Our classrooms are emptying out. Few graduate students are preparing dissertations in this area who are not looking at boundaries, oceans, or cross-continental flows of ideas, persons, things. Few job searches are being announced that do not call for such special expertise.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2298&quot;&gt;&lt;span data-dcnode-id=&quot;2299&quot; instrument_node=&quot;&quot;&gt;Few historians in Europe work on the history of Europe, by the way. Most history departments there focus on national histories, an institutionalized myopia that has surely contributed to the current crisis of the Eurozone.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2281&quot;&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2291&quot;&gt;&lt;span data-dcnode-id=&quot;2296&quot; instrument_node=&quot;&quot;&gt;Insofar as the history of emotions has developed primarily in Europe (the place, not the field) so far, it has arisen mostly as a blocking strategy, to undo the myth of modernity, the myth of the more rational, more scientific European individual, whose internalized regulation of emotion makes “him” superior to others.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2292&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2295&quot; id=&quot;jumplink-fn66&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2293&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn66&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn66&quot;&gt;&lt;span data-dcnode-id=&quot;2294&quot; instrument_node=&quot;&quot;&gt;66&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2284&quot;&gt;&lt;span data-dcnode-id=&quot;2290&quot; instrument_node=&quot;&quot;&gt;The Enlightenment is no longer studied, for example, as an “age of reason.” Scientists of the past are no longer assumed to be free of affect in works by, for example, Otniel Dror, Matthew L. Jones, or Fay Bound Alberti.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2286&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2289&quot; id=&quot;jumplink-fn67&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2287&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn67&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn67&quot;&gt;&lt;span data-dcnode-id=&quot;2288&quot; instrument_node=&quot;&quot;&gt;67&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2285&quot; instrument_node=&quot;&quot;&gt; The practice has been, as well, to strive for European-level and global perspectives, in seminar series at centers for the history of emotions at Queen Mary, University of London, and the Max Planck Institute for Human Development in Berlin, and at international conferences such as that held in Paris last April, or that sponsored by the CHEP (Cultural History of Emotions in Premodernity) network last year in Istanbul (“Emotions East and West”), which included numerous papers on Ottoman and West Asian history and five on Chinese history, covering such topics as funerary art and medicine. In Berlin, a significant number of the members of the Center for the History of Emotions are working on South Asia.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2282&quot;&gt;&lt;span data-dcnode-id=&quot;2283&quot; instrument_node=&quot;&quot;&gt;In the last decade, the history of emotions has perhaps been the single subfield most responsible for efforts, within Europe, to “provincialize” European history, while at the same time attempting to develop a truly European and global (as opposed to narrowly national) perspective. In North America, in contrast, such provincializing efforts have focused more on empire and colonial domination—issues hardly neglected in Europe, but perhaps less transformative there. But again, I see the gap narrowing in, for example, Nicole's work on interactions between colonists and Native Americans in eighteenth-century Pennsylvania.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2250&quot;&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2251&quot;&gt;&lt;span data-dcnode-id=&quot;2280&quot; instrument_node=&quot;&quot;&gt;Dipesh Chakrabarty recognizes that the “Europe” he proposes to provincialize is not the real historical Europe, but a “hyperreal Europe.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2276&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2279&quot; id=&quot;jumplink-fn68&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2277&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn68&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn68&quot;&gt;&lt;span data-dcnode-id=&quot;2278&quot; instrument_node=&quot;&quot;&gt;68&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2275&quot; instrument_node=&quot;&quot;&gt; This, by the way, enables him to continue with his provincializing project without attempting to keep up to date on European historiography.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2271&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2274&quot; id=&quot;jumplink-fn69&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2272&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn69&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn69&quot;&gt;&lt;span data-dcnode-id=&quot;2273&quot; instrument_node=&quot;&quot;&gt;69&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2270&quot; instrument_node=&quot;&quot;&gt; But this gap is being filled by others; see, for example, a recent article by Margrit Pernau.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2266&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2269&quot; id=&quot;jumplink-fn70&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2267&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn70&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn70&quot;&gt;&lt;span data-dcnode-id=&quot;2268&quot; instrument_node=&quot;&quot;&gt;70&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2265&quot; instrument_node=&quot;&quot;&gt; In &lt;/span&gt;&lt;em data-dcnode-id=&quot;2263&quot;&gt;&lt;span data-dcnode-id=&quot;2264&quot; instrument_node=&quot;&quot;&gt;Courtly Culture and Political Life in Early Medieval India&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2262&quot; instrument_node=&quot;&quot;&gt;, Daud Ali takes the critical evaluations of Elias that have been elaborated in European historiography as his starting point, and provides a remarkable new way of reading such texts as the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2260&quot;&gt;&lt;span data-dcnode-id=&quot;2261&quot; instrument_node=&quot;&quot;&gt;Arthashastra&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2259&quot; instrument_node=&quot;&quot;&gt; and the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2257&quot;&gt;&lt;span data-dcnode-id=&quot;2258&quot; instrument_node=&quot;&quot;&gt;Kamasutra&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2256&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2252&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2255&quot; id=&quot;jumplink-fn71&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2253&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn71&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn71&quot;&gt;&lt;span data-dcnode-id=&quot;2254&quot; instrument_node=&quot;&quot;&gt;71&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;/li&gt;&lt;li data-dcnode-id=&quot;2244&quot;&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2245&quot;&gt;&lt;span data-dcnode-id=&quot;2249&quot; instrument_node=&quot;&quot;&gt;The first two respondents to the Editor's question (Barbara and myself) happened to be Europeanists. We reasonably drew on our own research for examples. Necessarily brief, our examples did not enter into the complex questions of varying understandings (across time and space) of the architecture of the subject or of the cosmos. But we are very concerned about these issues. The history of emotions must start with, and constantly return to, such issues. Barbara's work has focused on the Europe of the “dark ages,” which do not appear so dark if one moves beyond philological preoccupations to reimagine the full contexts that produced fragmentary texts. In my most recent work, I attempt to triangulate on the question of emotional change by comparing divergent, but simultaneous, periods of transition: the emergence of courtly love in Anglo-Norman and Occitan-speaking lands is set against the rise of bhakti temple worship in post-Gupta Orissa and Bengal, and the development of an emotional style centered on &lt;/span&gt;&lt;em data-dcnode-id=&quot;2247&quot;&gt;&lt;span data-dcnode-id=&quot;2248&quot; instrument_node=&quot;&quot;&gt;mono no aware&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2246&quot; instrument_node=&quot;&quot;&gt; in Heian Japan. I understand that Eugenia and Julia may have discerned the ghost of hyperreal Europe passing through our abbreviated e-mail messages. I agree that vigilance is necessary. But I trust that their fears would be allayed if they took a closer look.&lt;/span&gt;&lt;/p&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2238&quot;&gt;&lt;strong data-dcnode-id=&quot;2240&quot;&gt;&lt;em data-dcnode-id=&quot;2241&quot;&gt;&lt;span data-dcnode-id=&quot;2242&quot; instrument_node=&quot;&quot;&gt;Julie Livingston:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2239&quot; instrument_node=&quot;&quot;&gt; Without going into too much detail to answer Bill's reply, and certainly without getting into a discussion of the death of European history as a field, I want to clarify my earlier message, as I fear I may have ruffled some feathers. This may be an open door on which we are pushing, but the question the Editor asked (or half of the two-part question) was how we grapple with still-powerful and ubiquitous notions of “one-way development” around emotions, a model central to a range of canonical texts and historical approaches. I too thought this was a settled matter—at least among historians—but then again the Editor no doubt has a very keen sense of the field, given his position in these discussions, and it would seem that he does not share our optimism on that score. And so if this is the question, then I see it as one that cannot be answered without explicit reference to the politics of knowledge as well as the historical record, which are conjoined. I do not suggest that anyone here (certainly neither Barbara, who in her very first message during our preliminary conversations this summer clarified the problems with Elias, nor Bill, whose work is so expansive) is unaware of these politics, nor of these complicated and entangled histories, nor of the theoretical impoverishment we risk by not searching out and circulating theoretical insights from non-canonical sources. But if we are being asked to push yet again on that door, then let us please open it all the way, walk through, and move on to new and more interesting topics.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2230&quot;&gt;&lt;strong data-dcnode-id=&quot;2235&quot;&gt;&lt;em data-dcnode-id=&quot;2236&quot;&gt;&lt;span data-dcnode-id=&quot;2237&quot; instrument_node=&quot;&quot;&gt;Barbara H. Rosenwein:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2234&quot; instrument_node=&quot;&quot;&gt; I would like to suggest that even theories elaborated by Western thinkers may be tested in other spaces and for other sensibilities. So, very briefly, I propose that we consider the four theories of emotional change I outlined in my original answer to this final question in the light of Jennifer Cole and Lynn Thomas's collection of essays on Africa, &lt;/span&gt;&lt;em data-dcnode-id=&quot;2232&quot;&gt;&lt;span data-dcnode-id=&quot;2233&quot; instrument_node=&quot;&quot;&gt;Love in Africa&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2231&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2219&quot;&gt;&lt;span data-dcnode-id=&quot;2229&quot; instrument_node=&quot;&quot;&gt;Although Peter Stearns elaborated his theory of change in the context of the United States, nevertheless his methods as well as his explanation are not irrelevant to Africa. Kenda Mutongi, like Stearns, uses an advice column to talk about “representations of the changing sexual mores in 1960s and 1970s Anglophone Africa.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2225&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2228&quot; id=&quot;jumplink-fn72&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2226&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn72&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn72&quot;&gt;&lt;span data-dcnode-id=&quot;2227&quot; instrument_node=&quot;&quot;&gt;72&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2224&quot; instrument_node=&quot;&quot;&gt; Mutongi explains that these representations reflected actual changes in courtship patterns: “As literacy increased in the mid-twentieth century, and as the print media facilitated courtship discussions, courtship became less a family affair and more a preoccupation of youth.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2220&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2223&quot; id=&quot;jumplink-fn73&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2221&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn73&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn73&quot;&gt;&lt;span data-dcnode-id=&quot;2222&quot; instrument_node=&quot;&quot;&gt;73&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2210&quot;&gt;&lt;span data-dcnode-id=&quot;2218&quot; instrument_node=&quot;&quot;&gt;Can we apply Bill Reddy's notions to Africa? It would seem so, for what all the essays in &lt;/span&gt;&lt;em data-dcnode-id=&quot;2216&quot;&gt;&lt;span data-dcnode-id=&quot;2217&quot; instrument_node=&quot;&quot;&gt;Love in Africa&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2215&quot; instrument_node=&quot;&quot;&gt; show are the numerous emotional experiments that were and are taking place there in different places and among different groups. This is very much Mutongi's point: the “Dear Dolly” advice column provided ways for men and women to, in Bill's words, “change goals in response to bewildering, ambivalent thought activations”—that is, to explore new, sometimes contradictory, feelings.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2211&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2214&quot; id=&quot;jumplink-fn74&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2212&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn74&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn74&quot;&gt;&lt;span data-dcnode-id=&quot;2213&quot; instrument_node=&quot;&quot;&gt;74&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2196&quot;&gt;&lt;span data-dcnode-id=&quot;2209&quot; instrument_node=&quot;&quot;&gt;What can be said about the role of indigenous psychological theories? The essays in &lt;/span&gt;&lt;em data-dcnode-id=&quot;2207&quot;&gt;&lt;span data-dcnode-id=&quot;2208&quot; instrument_node=&quot;&quot;&gt;Love in Africa&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2206&quot; instrument_node=&quot;&quot;&gt; hardly mention local theories of emotion as such, but it stands to reason that these must affect the ways in which one thinks about one's feelings, and consequently the feelings that one recognizes—and therefore “has.” The editors point out that “theories of magic, ritual, and witchcraft … [have implications for] local conceptions of passion.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2202&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2205&quot; id=&quot;jumplink-fn75&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2203&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn75&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn75&quot;&gt;&lt;span data-dcnode-id=&quot;2204&quot; instrument_node=&quot;&quot;&gt;75&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2201&quot; instrument_node=&quot;&quot;&gt; Similarly, the theories of the West, insofar as they were implicit in, say, the Mexican television serial that captured the attention of numerous Nigerians in 2006, suggested new sorts of emotions and emotional relationships to viewers. Not that the notions implicit in such dramas were swallowed whole. To the contrary: they simply provided a jumping-off point for creative self-fashioning.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2197&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2200&quot; id=&quot;jumplink-fn76&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2198&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn76&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn76&quot;&gt;&lt;span data-dcnode-id=&quot;2199&quot; instrument_node=&quot;&quot;&gt;76&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2185&quot;&gt;&lt;span data-dcnode-id=&quot;2195&quot; instrument_node=&quot;&quot;&gt;Can one apply the paradigm of emotional communities to Africa? Rachel Spronk speaks of “a minority social group [of professionals in Nairobi] that … see themselves as explorers and creators of what they perceive to be modern African lives … When it comes to their personal lives, [they] seek to forge intimate relations rooted in romantic and progressive ideals. Their aspirations are in line with other young women and men around the world who take up the ideal of companionate marriage as a way to demonstrate their modern individuality.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2191&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2194&quot; id=&quot;jumplink-fn77&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2192&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn77&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn77&quot;&gt;&lt;span data-dcnode-id=&quot;2193&quot; instrument_node=&quot;&quot;&gt;77&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2190&quot; instrument_node=&quot;&quot;&gt; It remains to be seen whether this group will come to dominate the norms of love and marriage in Kenya or will continue to constitute a minority “emotional community.” But certainly, as Cole and Thomas argue in their introductory essay, these Nairobi professionals are among those who have “remade local affective ideals and practices by engaging those from elsewhere,” that is, from other emotional communities (some of them Western) and their cultural expressions.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2186&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2189&quot; id=&quot;jumplink-fn78&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2187&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn78&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn78&quot;&gt;&lt;span data-dcnode-id=&quot;2188&quot; instrument_node=&quot;&quot;&gt;78&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2174&quot;&gt;&lt;strong data-dcnode-id=&quot;2182&quot;&gt;&lt;em data-dcnode-id=&quot;2183&quot;&gt;&lt;span data-dcnode-id=&quot;2184&quot; instrument_node=&quot;&quot;&gt;Julie Livingston:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2181&quot; instrument_node=&quot;&quot;&gt; Yes, of course they can, and &lt;/span&gt;&lt;em data-dcnode-id=&quot;2179&quot;&gt;&lt;span data-dcnode-id=&quot;2180&quot; instrument_node=&quot;&quot;&gt;Love in Africa&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2178&quot; instrument_node=&quot;&quot;&gt; is a wonderful book, and makes a terrific example here. Again, my point is not that Africa is so radically strange that the 1950s in Africa lie outside the time scale or history of the 1950s elsewhere, or that circulating cultural products and forms and relationships (like soap operas or &lt;/span&gt;&lt;em data-dcnode-id=&quot;2176&quot;&gt;&lt;span data-dcnode-id=&quot;2177&quot; instrument_node=&quot;&quot;&gt;Drum&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2175&quot; instrument_node=&quot;&quot;&gt; magazine) are not relevant in a hermetically sealed Africa. In fact, quite the opposite.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2166&quot;&gt;&lt;strong data-dcnode-id=&quot;2171&quot;&gt;&lt;em data-dcnode-id=&quot;2172&quot;&gt;&lt;span data-dcnode-id=&quot;2173&quot; instrument_node=&quot;&quot;&gt;Nicole Eustace:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2170&quot; instrument_node=&quot;&quot;&gt; I too tried to dispense with Elias-style assumptions from my first answer and to point to how the insights of neuroscience have helped me to think past that perspective. For scholars, the goal in taking a universalist view of emotions—of positing a common biological substrate upon which culturally distinct constructs are built—is &lt;/span&gt;&lt;em data-dcnode-id=&quot;2168&quot;&gt;&lt;span data-dcnode-id=&quot;2169&quot; instrument_node=&quot;&quot;&gt;not&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2167&quot; instrument_node=&quot;&quot;&gt;, as Jan fears, to establish normative emotional values on the basis of which some people or groups can then be judged as aberrant or inferior. Quite the opposite: the point is to make emotion a basis for the recognition of our common humanity, the better to see the historical significance of its expressive variety.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2164&quot;&gt;&lt;span data-dcnode-id=&quot;2165&quot; instrument_node=&quot;&quot;&gt;To restate my basic position one more time: emotional expression is a fundamental form of social communication critical to the exertion and to the contestation of power. As such, the language of emotion offers a code key by which historians can decipher hierarchical relations in any society. Tracing patterns of emotional expression and control—from the micro-hierarchical level of specific exchanges between particular social actors to the macro level of emotional prescriptions for and description of large categories of people—allows us to examine “politics” in the widest sense of power relations. Again, to be clear, this is not a story about emotional restraint as a mark of “progress” or “civility” in the vein of Elias or Freud. Instead, this is an analysis of how efforts at emotional control constitute negotiations of power.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2159&quot;&gt;&lt;span data-dcnode-id=&quot;2163&quot; instrument_node=&quot;&quot;&gt;Emotional expression can function as a code key only when we can be reasonably sure that we do understand the contextual meaning of the emotions we're examining. This kind of analysis requires critical attention to the contemporary &lt;/span&gt;&lt;em data-dcnode-id=&quot;2161&quot;&gt;&lt;span data-dcnode-id=&quot;2162&quot; instrument_node=&quot;&quot;&gt;ideas&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2160&quot; instrument_node=&quot;&quot;&gt; about emotion that defined the message conveyed by the expression (or omission) of emotion in any particular historical context. But this is not to say (as Eugenia rightly cautions us against doing) that we are bound to consider primarily the ideas of Western male intellectuals. To the contrary, we must avoid reifying the notion of emotional discourse as a totalizing system that irreducibly constrains the expression of all actors. We need to recognize with Barbara that many diverse communities of people contribute to the array of emotional meanings available at any given time.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2157&quot;&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt;There are two interrelated yet distinct issues here: what changes did historical actors believe they could effect through the use of emotion, and what changes do we as historians attribute to the influence of emotion? In my work on colonial British America and the early United States, I have documented the emergence of three widespread eighteenth-century beliefs about emotions: that they were the source of human motivation, that they were the mechanism of collective affiliation, and that they were the surest means of moral valuation. We can see these ideas emerging in everything from high European philosophy, to popular revolutionary protest movements, to the rituals demanded by Native American leaders at treaty councils, to the terms invoked by African American antislavery activists. Sometimes emotion lent power to broad social movements. At other times, it gave force to explicitly political projects. An important example of this is the rise of pro-war patriotism in the United States during the War of 1812, the subject of my second book.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2151&quot;&gt;&lt;span data-dcnode-id=&quot;2156&quot; instrument_node=&quot;&quot;&gt;I do see certain connections between modern U.S. scholarship on emotions and these eighteenth-century Atlantic perspectives. Psychologists like Jonathan Haidt now argue that our emotional systems are fundamentally very simple. Just as the decimal system in mathematics can ultimately be reduced to the binary system of zeros and ones, so all emotions can ultimately be boiled down to those that produce approach behaviors and those that produce avoidance, those that promote affiliation and those that provoke disassociation. Powerful snap judgments about the practical and moral worth of a given course of action can result from a person's visceral reaction of desire or disgust to an object of attention. If the twenty-first-century vocabulary of avoidance and approach, excitation and inhibition, desire and disgust is somewhat different from eighteenth-century discussions of selfishness vs. sociability, action vs. passivity, and virtue vs. vice, I would speculate that they are related. I hope that positing a connection between eighteenth-century Atlantic ways of thinking about emotion and twenty-first-century American ones can do two things: one, remind us how historically produced and contextually embedded so-called objective “modern” science actually is; and two, encourage us not to limit the search for explanations of emotion to any one culture. (I am sure that Barbara's most recent experiment in applying Western theories to Africa could be very fruitfully reversed.)&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2152&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2155&quot; id=&quot;jumplink-fn79&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2153&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn79&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn79&quot;&gt;&lt;span data-dcnode-id=&quot;2154&quot; instrument_node=&quot;&quot;&gt;79&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2149&quot;&gt;&lt;span data-dcnode-id=&quot;2150&quot; instrument_node=&quot;&quot;&gt;The ideas that give contextual meaning to emotion and the language in which emotion is expressed will vary almost infinitely across time and place. Yet the personal impact, social effects, and political charge of emotion endure. As historians, we can and should trace the processes by which invocations of emotion are used to provoke political actions. It is in accepting and then analyzing the role of emotion in political change in the broadest sense that scholars can gain strength from the power of feeling.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2134&quot;&gt;&lt;strong data-dcnode-id=&quot;2146&quot;&gt;&lt;em data-dcnode-id=&quot;2147&quot;&gt;&lt;span data-dcnode-id=&quot;2148&quot; instrument_node=&quot;&quot;&gt;Eugenia Lean:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2145&quot; instrument_node=&quot;&quot;&gt; I want to add a quick note in response to Bill's insights about the state of the field in European history and about my and Julie's concerns with the “ghost of hyperreal Europe.” I agree that Julie and I are pushing on an open door, and that this door in the history of emotions is already open in large part because of the pioneering scholarship by Bill himself (whose work I knew of and greatly respected prior to this conversation) and Barbara (whose work I am grateful to have been exposed to as a result of this conversation and whose comments such as those on emotional community have been so insightful). I am also well aware of the exciting new directions in the field of European history being taken by scholars like Matt Jones, a historian of science and my colleague here at Columbia. He is not alone among historians of European science doing innovative work that is quite relevant to the study of emotions and that helps challenge the myth of modern rationality. The list is actually quite impressive: Lorraine Daston's classical work on wonder comes to mind, as do Jessica Riskin's work on sentimental empiricists in the French Enlightenment and Deborah Coen's work that examines the impact of family affective relations on the rise of modern rationality in nineteenth-century Vienna.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2141&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2144&quot; id=&quot;jumplink-fn80&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2142&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn80&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn80&quot;&gt;&lt;span data-dcnode-id=&quot;2143&quot; instrument_node=&quot;&quot;&gt;80&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2140&quot; instrument_node=&quot;&quot;&gt; Others in the history of science are also doing wonderful work on globalizing European history, including Harold Cook.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2136&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2139&quot; id=&quot;jumplink-fn81&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2137&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn81&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn81&quot;&gt;&lt;span data-dcnode-id=&quot;2138&quot; instrument_node=&quot;&quot;&gt;81&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2135&quot; instrument_node=&quot;&quot;&gt; Thus, given the rich state of this field, you can imagine my surprise at the Editor's third question, about how emotional expressiveness changes over time, and its focus on master European thinkers, and the dismay I felt in not hearing any reflection on the political implications of how the question was framed.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2123&quot;&gt;&lt;span data-dcnode-id=&quot;2133&quot; instrument_node=&quot;&quot;&gt;Moreover, it is precisely because the discussion is being published in the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2131&quot;&gt;&lt;span data-dcnode-id=&quot;2132&quot; instrument_node=&quot;&quot;&gt;AHR&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2130&quot; instrument_node=&quot;&quot;&gt;, and in the manner of a “conversation,” that I felt compelled to answer in as forthright a manner as possible. To be sure, the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2128&quot;&gt;&lt;span data-dcnode-id=&quot;2129&quot; instrument_node=&quot;&quot;&gt;AHR&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2127&quot; instrument_node=&quot;&quot;&gt; is not CNN, and our conversations are hardly the “sound bites” on the nightly news that at once mean so little and yet yield far too much influence. It is nonetheless the case that the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2125&quot;&gt;&lt;span data-dcnode-id=&quot;2126&quot; instrument_node=&quot;&quot;&gt;AHR&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2124&quot; instrument_node=&quot;&quot;&gt; is one of the most influential journals, if not the primary journal, of our field. Furthermore, it is precisely in the “casual conversation” format where we have to be vigilant. It is in our abbreviated, shorthand exchanges of knowledge and information where the “ghost of hyperreal Europe” can so easily resurrect itself, if unwittingly, and demonstrate how entrenched its haunting really is. For me, at least, it is only once that ghost is fully exorcised from even the most casual of references that the vigilance ends.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2121&quot;&gt;&lt;span data-dcnode-id=&quot;2122&quot; instrument_node=&quot;&quot;&gt;That said, I am hopeful that this day will come. The lively and productive nature of the exchange that has unfolded here on the politics of the Editor's third question—even if unintended—only brings us closer to that day. And the concrete comments on how to think productively about change over time by considering such issues as emotional communities, social processes and interests, the politics of emotions, as well as space, have been enlightening and thought-provoking. Thank you all for your insights.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2109&quot;&gt;&lt;strong data-dcnode-id=&quot;2118&quot;&gt;&lt;em data-dcnode-id=&quot;2119&quot;&gt;&lt;span data-dcnode-id=&quot;2120&quot; instrument_node=&quot;&quot;&gt;William M. Reddy:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2117&quot; instrument_node=&quot;&quot;&gt; Thanks to Eugenia for clarifying her previous message, and for the references to recent intriguing research in which the reason-emotion dichotomy is being set aside. I would also list another Columbia colleague of hers, Sharon Marcus, whose recent book &lt;/span&gt;&lt;em data-dcnode-id=&quot;2115&quot;&gt;&lt;span data-dcnode-id=&quot;2116&quot; instrument_node=&quot;&quot;&gt;Between Women&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2114&quot; instrument_node=&quot;&quot;&gt; is a methodological model for me, showing how broader conceptions of affect open up new questions about history.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2110&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2113&quot; id=&quot;jumplink-fn82&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2111&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn82&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn82&quot;&gt;&lt;span data-dcnode-id=&quot;2112&quot; instrument_node=&quot;&quot;&gt;82&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2061&quot;&gt;&lt;strong data-dcnode-id=&quot;2106&quot;&gt;&lt;em data-dcnode-id=&quot;2107&quot;&gt;&lt;span data-dcnode-id=&quot;2108&quot; instrument_node=&quot;&quot;&gt;Jan Plamper:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2105&quot; instrument_node=&quot;&quot;&gt; The third question has prompted an exchange to which I would like to add two thoughts, both of which were implicit in the contributions but deserve to be spelled out. The first is that the traffic of emotions between cultures, spaces, regions, languages, groups, individuals, etc., is often &lt;/span&gt;&lt;em data-dcnode-id=&quot;2103&quot;&gt;&lt;span data-dcnode-id=&quot;2104&quot; instrument_node=&quot;&quot;&gt;multi&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2102&quot; instrument_node=&quot;&quot;&gt;directional, and that historians of emotion benefit from remaining aware of this multidirectionality.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2098&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2101&quot; id=&quot;jumplink-fn83&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2099&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn83&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn83&quot;&gt;&lt;span data-dcnode-id=&quot;2100&quot; instrument_node=&quot;&quot;&gt;83&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2097&quot; instrument_node=&quot;&quot;&gt; This multidirectional traffic comes in many forms, including the deliberate closing-off of certain routes. Thus in the first work ever published on the non-Western history of emotions that I am aware of (which was included in a volume that Barbara edited), the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2095&quot;&gt;&lt;span data-dcnode-id=&quot;2096&quot; instrument_node=&quot;&quot;&gt;non&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2094&quot; instrument_node=&quot;&quot;&gt;-travel of medieval Arabic anger concepts is implied to have been a result of the perceived necessity in the new ninth-century ʿAbbāsid Caliphate of creating an uninterrupted, uncorrupted Islamic lineage.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2090&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2093&quot; id=&quot;jumplink-fn84&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2091&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn84&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn84&quot;&gt;&lt;span data-dcnode-id=&quot;2092&quot; instrument_node=&quot;&quot;&gt;84&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2089&quot; instrument_node=&quot;&quot;&gt; The second is that the languages and academic cultures in and through which we produce knowledge about other locales are of course themselves site-specific.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2085&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2088&quot; id=&quot;jumplink-fn85&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2086&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn85&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn85&quot;&gt;&lt;span data-dcnode-id=&quot;2087&quot; instrument_node=&quot;&quot;&gt;85&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2084&quot; instrument_node=&quot;&quot;&gt; Even at the height of social constructionism in emotions anthropology during the 1980s, Catherine Lutz did not persistently speak of Ifaluk &lt;/span&gt;&lt;em data-dcnode-id=&quot;2082&quot;&gt;&lt;span data-dcnode-id=&quot;2083&quot; instrument_node=&quot;&quot;&gt;nunuwan&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2081&quot; instrument_node=&quot;&quot;&gt;, but instead used the English term “emotions.” This was after describing the specificity of &lt;/span&gt;&lt;em data-dcnode-id=&quot;2079&quot;&gt;&lt;span data-dcnode-id=&quot;2080&quot; instrument_node=&quot;&quot;&gt;nunuwan&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2078&quot; instrument_node=&quot;&quot;&gt;—their intersubjectivity (they are most often spoken about in the first-person plural rather than singular), their relationality (one of them usually is interdependent with another), and their “cogmotivity” (they are “feeling-thoughts”)—in such detail that she could easily have made the case for their untranslatability.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2074&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2077&quot; id=&quot;jumplink-fn86&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2075&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn86&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn86&quot;&gt;&lt;span data-dcnode-id=&quot;2076&quot; instrument_node=&quot;&quot;&gt;86&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2073&quot; instrument_node=&quot;&quot;&gt; Social constructivism taken to its extreme is a nominalist enterprise; history as currently practiced is anti-nominalist. Something similar applies to temporal movement: if I study, say, changing Germanophone fear concepts from &lt;/span&gt;&lt;em data-dcnode-id=&quot;2071&quot;&gt;&lt;span data-dcnode-id=&quot;2072&quot; instrument_node=&quot;&quot;&gt;Forcht&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2070&quot; instrument_node=&quot;&quot;&gt; in Martin Luther's time to &lt;/span&gt;&lt;em data-dcnode-id=&quot;2068&quot;&gt;&lt;span data-dcnode-id=&quot;2069&quot; instrument_node=&quot;&quot;&gt;Furcht&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2067&quot; instrument_node=&quot;&quot;&gt; in the nineteenth century, I need to assume some commonality between the two, and that is possible only if I assume that each refers to something other than just itself.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2063&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2066&quot; id=&quot;jumplink-fn87&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2064&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn87&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn87&quot;&gt;&lt;span data-dcnode-id=&quot;2065&quot; instrument_node=&quot;&quot;&gt;87&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2062&quot; instrument_node=&quot;&quot;&gt; Both points are especially important for historians of emotion, since a lot of emotions history, I venture to predict, will involve temporally longer-term and geographically broader comparisons than many other fields of history. The specificity of emotion becomes visible in sharpest relief in such comparisons.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2046&quot;&gt;&lt;span data-dcnode-id=&quot;2060&quot; instrument_node=&quot;&quot;&gt;The thought I would like to close with opens up a new issue, which is perhaps an appropriate way to end an exciting conversation about a young field that is still very much open-ended. It concerns the Editor's question about change over time, and more specifically the case when emotion words disappear from the historical record. I want to challenge the notion that this disappearance necessarily means the disappearance of the emotion. Let me try to illustrate. During the First World War, there was indeed an increase in fear talk among Russian soldiers because of the developments that Barbara aptly summarizes in her response—the rise of military psychiatry, etc. In the Second World War, fear talk among Red Army soldiers largely disappeared. Can we conclude that soldiers no longer experienced fear in World War II? This possibility should not be ruled out &lt;/span&gt;&lt;em data-dcnode-id=&quot;2058&quot;&gt;&lt;span data-dcnode-id=&quot;2059&quot; instrument_node=&quot;&quot;&gt;a priori&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2057&quot; instrument_node=&quot;&quot;&gt;. But the historian of emotions should also consider the possibility that soldiers continued to feel fear but that various social practices actively precluded the entry of fear talk into the historical record, military censorship being the most obvious one. She should be mindful of ersatz fear talk, such as medical descriptions of increases in “purely” somatic cardiovascular diseases during battles that she can safely infer from other evidence to have been especially stressful. She can even discern changes in the micro-logic of a text—an abrupt, non-standard change in tense, a preposition that surfaces only once in an officer's battle account, or a rupture in the narrative logic—and in so doing employ stilometric software that literary scholars use to test the authorship of a text.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2053&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2056&quot; id=&quot;jumplink-fn88&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2054&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn88&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn88&quot;&gt;&lt;span data-dcnode-id=&quot;2055&quot; instrument_node=&quot;&quot;&gt;88&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2052&quot; instrument_node=&quot;&quot;&gt; Once she has reconstructed as best she can the local, site-specific fear constructs of the particular soldier(s) she is studying, she can then infer that they felt fear. This is a method of a careful reading between the lines, or what I have called a hermeneutics of silence.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2048&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2051&quot; id=&quot;jumplink-fn89&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2049&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn89&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn89&quot;&gt;&lt;span data-dcnode-id=&quot;2050&quot; instrument_node=&quot;&quot;&gt;89&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2047&quot; instrument_node=&quot;&quot;&gt; It involves an analytical leap, to be sure. But this analytical leap is less questionable than what is still the most common practice in history-writing: to impute to people in the past the emotions of our own time and space. If this conversation has helped unsettle this practice in some measure, it has been successful.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2041&quot;&gt;&lt;strong data-dcnode-id=&quot;2043&quot;&gt;&lt;em data-dcnode-id=&quot;2044&quot;&gt;&lt;span data-dcnode-id=&quot;2045&quot; instrument_node=&quot;&quot;&gt;AHR Editor:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2042&quot; instrument_node=&quot;&quot;&gt; This round of exchanges, taking off from my last question, has been quite productive, if in unexpected ways. In posing the question I certainly did not, as has in fact been recognized, mean to suggest any notion of one-way development, or a narrative of emotional history, or a historical trajectory shaped by, say, the “civilizing process.” Indeed, I tried to disavow such views, acknowledging only that they are perhaps more prevalent even among historians and social scientists—and certainly the public—than we might care to admit. And while I evoked recognized figures in the Western tradition, from the Stoics to Foucault, I did so merely to suggest a theme in the study of emotions regarding control of the passions and other moves of this sort in various times and places, often at the behest of political or religious authorities, to impose a disciplinary moral regime on society.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2039&quot;&gt;&lt;span data-dcnode-id=&quot;2040&quot; instrument_node=&quot;&quot;&gt;In any case, the happy consequence of my question being read in a certain way has been to broaden the discussion into a more global consideration of emotions in history, and not only across time but also across space—across cultures and peoples—where the differences can be just as striking.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2034&quot;&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt;Perhaps more than with other conversations in these pages, I feel as though we have just scratched the surface of this enormously complex field. I hope that these exchanges have provided readers with a roadmap—including the marvelous range of bibliographical references—that will enable them to appreciate the many byways, some of them only beginning to be explored, that configure this new historical territory. I think that one of the virtues of this discussion is that we have not only “talked the talk,” but also “walked the walk”—which is to say that the participants have at once addressed the conceptual and methodological aspects of thinking historically about emotions &lt;/span&gt;&lt;em data-dcnode-id=&quot;2036&quot;&gt;&lt;span data-dcnode-id=&quot;2037&quot; instrument_node=&quot;&quot;&gt;and&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2035&quot; instrument_node=&quot;&quot;&gt; provided us with myriad examples of how this kind of history is actually being done by scholars, including themselves, from many different fields and periods. It has too often been the case that discussions about method and theory in history remain mired in abstraction or prescriptive pronouncements, with less impact on the practice of history than might be expected. I don't think this could be said for the historical study of emotions, at least as presented by the six participants in this conversation.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;footnote&quot; content-id=&quot;fn1&quot; data-dcnode-id=&quot;2027&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;2028&quot;&gt;&lt;div class=&quot;footnote-content&quot; data-dcnode-id=&quot;2029&quot;&gt;&lt;p class=&quot;footnote-compatibility&quot; data-dcnode-id=&quot;2030&quot;&gt;&lt;sup data-dcnode-id=&quot;2032&quot;&gt;&lt;span data-dcnode-id=&quot;2033&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2031&quot; instrument_node=&quot;&quot;&gt;There had been a longstanding assumption in the Euro-American academy that Africa was somehow outside of history. This was a static place, a residual remnant of antiquity, such that contemporary African societies were manifestations of past evolutionary stages in human social and political organization. Of course, Africans knew otherwise. There were local and court historians within Africa, and strands of African American history, i.e., W. E. B. Du Bois in the early twentieth century, that were concerned with African history, but I am referring to the European/American academy her
