o she does not simply reduce to texts) to offer fleeting evocations of feelings past.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2744&quot;&gt;&lt;span data-dcnode-id=&quot;2745&quot; instrument_node=&quot;&quot;&gt;Second, there are classic questions here about continuity and change. I am curious about how and why new affective norms, or moral sentiments, or moral passions are introduced and cultivated, older ones discarded. I am not sure how we want to account for changes in the emotional communities or emotional habitus, or for that matter for the huge amount of work that would need to go into maintaining emotional communities in the face of other forms of large-scale change.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2717&quot;&gt;&lt;strong data-dcnode-id=&quot;2741&quot;&gt;&lt;em data-dcnode-id=&quot;2742&quot;&gt;&lt;span data-dcnode-id=&quot;2743&quot; instrument_node=&quot;&quot;&gt;Jan Plamper:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2740&quot; instrument_node=&quot;&quot;&gt; When I said that my own trajectory to the history of emotions had begun with frustration with the linguistic imperialism of poststructuralist historiography, it was meant in a descriptive way about me in the early 2000s rather than in a prescriptive way for us in the present.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2736&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2739&quot; id=&quot;jumplink-fn27&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2737&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn27&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn27&quot;&gt;&lt;span data-dcnode-id=&quot;2738&quot; instrument_node=&quot;&quot;&gt;27&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2735&quot; instrument_node=&quot;&quot;&gt; Today I am skeptical that the history of emotions can recover somatic experience in the terms I then had in mind. To dwell on the historicizing question for just a moment, I too am fascinated by the diversity in pathways to the history of emotions even in a sample as small as the six of us. Having read Barbara et al.'s nuanced responses, it seems that one would need to differentiate between regions of the world, disciplines (history, literary and visual studies, etc.), and segments of social life (the arts, scholarship, popular culture, etc.). Here one might point to Ruth Leys's genealogical work on the affective turn in “neuropolitical science” and other social and human sciences, all of which were drawn to “affect” as a new anchor in “the real,” as a category, in Leys's words, “independent of, and in an important sense prior to, ideology—that is, prior to intentions, meanings, reasons, and beliefs—because they are nonsignifying, autonomic processes that take place below the threshold of conscious awareness and meaning.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2731&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2734&quot; id=&quot;jumplink-fn28&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2732&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn28&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn28&quot;&gt;&lt;span data-dcnode-id=&quot;2733&quot; instrument_node=&quot;&quot;&gt;28&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2730&quot; instrument_node=&quot;&quot;&gt; I still suspect that when all is said and done, the current wider boom in emotions will emerge as part of a “post-post” (post-poststructuralist, post-postmodern) rather than a “post” moment. Now, the emotion vs. expression distinction that the Editor brought up is critical. The distinction maps, as Julie has pointed out, onto larger binaries, such as nature/culture. Getting out of this distinction and developing a truly holistic conceptual lens is exceedingly difficult, but it is not that no one has ever tried.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2726&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2729&quot; id=&quot;jumplink-fn29&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2727&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn29&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn29&quot;&gt;&lt;span data-dcnode-id=&quot;2728&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2725&quot; instrument_node=&quot;&quot;&gt; I would like to home in on just one problem with especially Bill's but also Barbara's proposed ways, as I understood them, out of the binary, which is in no way meant to diminish their contribution but rather to celebrate it by demonstrating how the sharpest thinking on the issue also marks the limits of how we can currently know feelings. Both Barbara and Bill adduce empirical data—from historiography, ethnography, and everyday life—on the basis of which they distill universal aspects of what emotion actually &lt;/span&gt;&lt;em data-dcnode-id=&quot;2723&quot;&gt;&lt;span data-dcnode-id=&quot;2724&quot; instrument_node=&quot;&quot;&gt;is&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2722&quot; instrument_node=&quot;&quot;&gt; and then show how life-science findings corroborate these universal claims about emotion's ontological status. Thus Barbara argues that our emotions are “somewhere in the middle” between sincere and insincere, some cultural conditioning notwithstanding (the value a given time and place puts on sincerity), and in support cites neuroscientist Robert Turner (the “default condition of [the] human brain is [a] role-play state”). Bill calls our emotional role-playing in past and present “effortful self-shaping” and argues that it “is subject to failure; it is, in other words, simultaneously self-exploration.” Elsewhere he has grounded this universalizing claim in findings from cognitive and social psychology.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2718&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2721&quot; id=&quot;jumplink-fn30&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2719&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn30&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn30&quot;&gt;&lt;span data-dcnode-id=&quot;2720&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2692&quot;&gt;&lt;span data-dcnode-id=&quot;2716&quot; instrument_node=&quot;&quot;&gt;At bottom, I understand both Barbara and Bill to be saying that scientific hypotheses confirm their interpretation of historical data. Yet others could have interpreted these data differently or adduced different data in the first place. They could have cited competing scientific hypotheses in support. All of which suggests that it is problematic to invoke universalizing natural science to bolster contingent humanities claims. And then again, the history of science and Science and Technology Studies (STS) have been demonstrating for quite some time how deeply science is shaped by culture, politics, and so on. Take the recent rise in neuroscience of the “resting state” (or default mode network, DMN) and its conceptualization of the brain as constantly active, even when one's mind is wandering and during sleep, “a model in which variability in behaviour and perception are modulated by endogenous, somatic fluctuations” rather than by exogenous input as in the older stimulus-response schema.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2712&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2715&quot; id=&quot;jumplink-fn31&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2713&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn31&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn31&quot;&gt;&lt;span data-dcnode-id=&quot;2714&quot; instrument_node=&quot;&quot;&gt;31&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2711&quot; instrument_node=&quot;&quot;&gt; It has been shown how this novel neuroscientific paradigm of what the brain actually &lt;/span&gt;&lt;em data-dcnode-id=&quot;2709&quot;&gt;&lt;span data-dcnode-id=&quot;2710&quot; instrument_node=&quot;&quot;&gt;is&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2708&quot; instrument_node=&quot;&quot;&gt; harks back to the default mode of personal computers, and, what is more, “that resting state research employs tropes of industriousness and the desire for ‘no-backlog’ that are of a piece with today's discourses regarding neo-liberalism.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2704&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2707&quot; id=&quot;jumplink-fn32&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2705&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn32&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn32&quot;&gt;&lt;span data-dcnode-id=&quot;2706&quot; instrument_node=&quot;&quot;&gt;32&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2703&quot; instrument_node=&quot;&quot;&gt; There is at least an elective affinity between the image of a brain that is never entirely switched off and our age of smartphones, the erosion of leisure time, and globalized 24/7 supply-chain management. Who says, then, that Barbara's and Bill's choice of a specific neuroscientific finding isn't conditioned by a contemporary predilection—in Bill's case, for example, if I understand correctly, a distaste for political regimes that penalize ambiguity, hybridity, fluidity, and indeterminacy? I have heard Bill say in public that he “only choose[s] the neuroscience that fits [his] politics,” with his tongue probably placed less firmly in cheek than the audience's laughter suggested.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2699&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2702&quot; id=&quot;jumplink-fn33&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2700&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn33&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn33&quot;&gt;&lt;span data-dcnode-id=&quot;2701&quot; instrument_node=&quot;&quot;&gt;33&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2698&quot; instrument_node=&quot;&quot;&gt; In short, I wonder if we end up making a circular move when we mobilize neuroscience. Perhaps we never got beyond Hayden White's axiom that “there are no extra-ideological grounds on which to arbitrate among the conflicting conceptions of the historical process.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2694&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2697&quot; id=&quot;jumplink-fn34&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2695&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn34&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn34&quot;&gt;&lt;span data-dcnode-id=&quot;2696&quot; instrument_node=&quot;&quot;&gt;34&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2693&quot; instrument_node=&quot;&quot;&gt; Perhaps the best we can still do is to make our ideology—our politics and ethics—transparent. Perhaps I just have to embrace my dissatisfaction with the overwhelming emphasis on language in poststructuralist history-writing and learn to feel happily frustrated.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2687&quot;&gt;&lt;strong data-dcnode-id=&quot;2689&quot;&gt;&lt;em data-dcnode-id=&quot;2690&quot;&gt;&lt;span data-dcnode-id=&quot;2691&quot; instrument_node=&quot;&quot;&gt;Nicole Eustace:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2688&quot; instrument_node=&quot;&quot;&gt; The expression vs. experience question is central to the study of the history of emotions. I set aside the quest to access and assess emotional experience early in my research for a combination of practical, theoretical, and historical reasons. First there's the practical problem of how historians can ever determine what people in the past were experiencing internally. One historical example of this puzzle from early America helped clarify my thinking. In eighteenth-century Virginia, a wealthy slaveholder named William Byrd lost a son. He recorded the event in his diary without making any mention of grief. One historian looked at this written record in 1979 and concluded, in the vein of Philippe Ariès, that early modern parents felt nothing like modern love for their children. A decade later, in 1987, another historian looked at this same case and noted that while Byrd expressed no grief directly, he reported debilitating stomach complaints at just the time of his son's death. This historian inferred from the evidence that Byrd had somatized his underlying grief, reporting emotional pain as physical suffering. These divergent conclusions each had merit, and the question was how to weigh them against each other. This is the practical problem with trying to gauge emotional experience. How can we accurately judge what people in the past felt when, like William Byrd, they themselves may not even have known? As I noted in my first response, another decade later, the work of William Reddy provided invaluable theoretical help by offering a way to think through the gap between language and experience, by focusing on the fact that the differential expression of universal emotional experiences provides a useful index of power relations. Again, Reddy's motto: “Emotional control is the real site of the exercise of power.” In the case of the Byrds, the key fact may be that William Byrd's wife, Lucy, did shed tears for their son, and that William Byrd recorded in detail his efforts to remonstrate with her to control her emotions. To Barbara's points about sincerity, as a scholar I can never know what William Byrd “really” felt (if indeed he himself did), but I can very usefully look for patterns in emotional expression and regulation that reveal much valuable information about social organization and political control.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2675&quot;&gt;&lt;span data-dcnode-id=&quot;2686&quot; instrument_node=&quot;&quot;&gt;Finally, there is a historical insight specific to the eighteenth century that may address the Editor's question about the construction of emotional styles. Modern theorizing about emotion sometimes presupposes that each party to an emotional exchange brings to the interaction a stable and autonomous identity that can be expressed or repressed, but not fundamentally altered, by the act of emoting. Yet this is not at all how people believed that emotion functioned in the eighteenth century. Eighteenth-century actors could not conceive of a self entirely separate from the social order, and so their expressions of emotion could never be entirely personal. Rather, they were inherently relational. We can see this distinction clearly in the eighteenth-century vocabulary of the self. Consider, in this light, the words “disposition” and “personality.” While “disposition” was a word familiar to most in the eighteenth century, “personality” was not. “Personality” is formed from the root word “person”; intrinsic to its very structure is the idea of autonomous identity. According to definition 4b in the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2684&quot;&gt;&lt;span data-dcnode-id=&quot;2685&quot; instrument_node=&quot;&quot;&gt;Oxford English Dictionary&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2683&quot; instrument_node=&quot;&quot;&gt;, “personality” does not merely denote “traits of character,” but more fully describes “that quality or assemblage of qualities which makes a person what he is, as distinct from other persons; distinctive personal or individual character.” “Disposition,” on the other hand, derives from a very nearly antithetical root. It is based on the word “position,” and indeed the first definition of “disposition” in the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2681&quot;&gt;&lt;span data-dcnode-id=&quot;2682&quot; instrument_node=&quot;&quot;&gt;OED&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2680&quot; instrument_node=&quot;&quot;&gt; refers to “arrangement, order; relative position of the parts or elements of a whole.” Fundamental to the word “disposition,” therefore, is the idea that the self exists only in relation to other selves, that a person's “bent of mind” reflects not his or her autonomous individuality, but rather his or her position vis-à-vis a collective whole. The public social impact of putatively personal expressions of emotion becomes hard to ignore if we pause to note the way eighteenth-century subjects thought about the self. In fact, the eighteenth-century notion of “disposition” corresponds closely to the concept of the subject position as articulated by Linda Alcoff. This concept combines in a single term the creation of self and the distribution of power, making it clear that each is inextricably linked to the other. Here a sociological perspective on emotions as labor performed in the service of the group can help us grasp that the expression of emotion can never be isolated as a private description of internal experience, but must necessarily be understood as a public comment on—and creation of—external social relations.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2676&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2679&quot; id=&quot;jumplink-fn35&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2677&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn35&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn35&quot;&gt;&lt;span data-dcnode-id=&quot;2678&quot; instrument_node=&quot;&quot;&gt;35&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2670&quot;&gt;&lt;strong data-dcnode-id=&quot;2672&quot;&gt;&lt;em data-dcnode-id=&quot;2673&quot;&gt;&lt;span data-dcnode-id=&quot;2674&quot; instrument_node=&quot;&quot;&gt;AHR Editor:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2671&quot; instrument_node=&quot;&quot;&gt; Would Bill or Barbara or anyone else like to respond to Jan's comment on neuroscientific literature?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2665&quot;&gt;&lt;strong data-dcnode-id=&quot;2667&quot;&gt;&lt;em data-dcnode-id=&quot;2668&quot;&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;Barbara H. Rosenwein:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2666&quot; instrument_node=&quot;&quot;&gt; Yes, thank you for the invitation to respond to Jan's critique of my use—and by extension, historians' use—of modern neuroscientific literature. In my view, his critique contains much truth. But it is not the whole truth.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2663&quot;&gt;&lt;span data-dcnode-id=&quot;2664&quot; instrument_node=&quot;&quot;&gt;It is true that when I cited the work of Robert Turner, not by chance the son of the famous anthropologist Victor Turner, I was using a shortcut to argue a point. As yet, the neuroscience of emotions is in its infancy (as is the history of emotions, and for much the same reasons), and one can find numerous conflicting schools of thought (as our own conversation has shown to be the case with historians of emotions). We can—we do—choose our schools. Ultimately, as Jan suggests, the science of today will no doubt be considered as absurd as the phlogiston theory now seems to us.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2661&quot;&gt;&lt;span data-dcnode-id=&quot;2662&quot; instrument_node=&quot;&quot;&gt;Moreover, today's science, like everything else that is human, is largely socially constructed. The metaphors that it uses—“areas of the brain that ‘light up’” or “resting states”—are informed by the electric, computer-driven world we live in.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2654&quot;&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;Finally, neuroscience, like so many other sciences concerned with emotions, locates emotions in the brain and neural systems. When an fMRI test shows a richly oxygenated area of my brain “induced” by a picture or the name of my beloved, there is a tendency to claim that scientists thereby have gained a better understanding of love in general.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2656&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2659&quot; id=&quot;jumplink-fn36&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2657&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn36&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn36&quot;&gt;&lt;span data-dcnode-id=&quot;2658&quot; instrument_node=&quot;&quot;&gt;36&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2655&quot; instrument_node=&quot;&quot;&gt; However exciting this idea may be (mainly for new drug therapies), it is quite inadequate emotionally: it doesn't tell us what love means to me, let alone what it has meant (and has not meant, and with what other feelings it has been associated) in the past or will mean in the future.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2638&quot;&gt;&lt;span data-dcnode-id=&quot;2653&quot; instrument_node=&quot;&quot;&gt;Nevertheless, it shows &lt;/span&gt;&lt;em data-dcnode-id=&quot;2651&quot;&gt;&lt;span data-dcnode-id=&quot;2652&quot; instrument_node=&quot;&quot;&gt;something&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2650&quot; instrument_node=&quot;&quot;&gt;. That's the part that I think Jan has left out. I find it helpful to think of our nerves, muscles, and physiology in general as the foundation of what, for want of a better term, I call &lt;/span&gt;&lt;em data-dcnode-id=&quot;2648&quot;&gt;&lt;span data-dcnode-id=&quot;2649&quot; instrument_node=&quot;&quot;&gt;affective potential&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2647&quot; instrument_node=&quot;&quot;&gt;. This potential is universal, but it manifests itself in different ways at different times in response to the conditions, assumptions, values, goals, and everything else that makes up human society and political life. The notion of affective potential cautions us against reifying emotions as “love,” “anger,” and the like and encourages us to seek the various ways in which affective potential manifests itself (i.e., becomes emotions) in each culture. Sometimes I am able to know what those emotions are from a local theory. For example, Thomas Aquinas's &lt;/span&gt;&lt;em data-dcnode-id=&quot;2645&quot;&gt;&lt;span data-dcnode-id=&quot;2646&quot; instrument_node=&quot;&quot;&gt;passiones animae&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt; are handy guides to what terms were considered affectively charged in the thirteenth century.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2640&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2643&quot; id=&quot;jumplink-fn37&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2641&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn37&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn37&quot;&gt;&lt;span data-dcnode-id=&quot;2642&quot; instrument_node=&quot;&quot;&gt;37&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2639&quot; instrument_node=&quot;&quot;&gt; At other times I can find no contemporary theory and must construct it myself, for example by seeing what words, bodily movements (blushing, weeping), and so on were connected to the heart—or, depending on the group, the gut, the liver, or parts of the mind.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2636&quot;&gt;&lt;span data-dcnode-id=&quot;2637&quot; instrument_node=&quot;&quot;&gt;Today's scientific studies help us know something about human (and probably animal) affective potential as well as how it is manifested in our own culture. Since we cannot escape our own categories, since we historians (too) are creatures of our age, we must use the tools, the words, and the metaphors available to us. I welcome, then, the ways of thinking that neuroscience can provide, even if I know that those ways are provisional.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2628&quot;&gt;&lt;strong data-dcnode-id=&quot;2633&quot;&gt;&lt;em data-dcnode-id=&quot;2634&quot;&gt;&lt;span data-dcnode-id=&quot;2635&quot; instrument_node=&quot;&quot;&gt;Nicole Eustace:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt; In his recent comment, Jan critiques historians' turn to neuroscience by saying that “it is problematic to invoke universalizing natural science to bolster contingent humanities claims.” Barbara counters this by saying, “I find it helpful to think of our nerves, muscles, and physiology in general as the foundation of what, for want of a better term, I call &lt;/span&gt;&lt;em data-dcnode-id=&quot;2630&quot;&gt;&lt;span data-dcnode-id=&quot;2631&quot; instrument_node=&quot;&quot;&gt;affective potential&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2629&quot; instrument_node=&quot;&quot;&gt;. This potential is universal, but it manifests itself in different ways at different times in response to the conditions, assumptions, values, goals, and everything else that makes up human society and political life.”&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2626&quot;&gt;&lt;span data-dcnode-id=&quot;2627&quot; instrument_node=&quot;&quot;&gt;While Jan is quite right to observe that the history of emotion was framed at the outset by a debate over whether emotions were biological in basis and universal nature vs. cultural in conception and made manifest only through discourse, I think that historians (and the anthropologists and biologists who have influenced them) are trying to move past this false binary. In fact, as Bill argued in his foundational work, there is no necessary conflict between the linguistic and the biological study of emotion. To the contrary, each is fundamentally interconnected and can perform crucial work in informing the other.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2620&quot;&gt;&lt;span data-dcnode-id=&quot;2625&quot; instrument_node=&quot;&quot;&gt;Quite simply, cutting-edge neuroscientists are discovering what linguistic theorists have been arguing all along: that language fundamentally shapes both the expression and the experience of emotion. There is no culture-free acontextual means of experiencing or accessing emotion. Rather, conceptual processing and the cognitive categorization of affect fundamentally shape the perception of emotion. Psychologist Lisa Feldman Barrett is doing great work in this area.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2621&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2624&quot; id=&quot;jumplink-fn38&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2622&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn38&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn38&quot;&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt;38&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2614&quot;&gt;&lt;span data-dcnode-id=&quot;2619&quot; instrument_node=&quot;&quot;&gt;The really important point here is not that there is no biological basis for emotion, but rather that the neurochemical perception of emotion is formed through language. Feldman and many others continue to see that particular brain regions do play shaping roles in affective experience. She finds, for example, that the amygdala does increase sensitivity to negative stimuli. Feldman's contribution is to emphasize that how that negative stimulus is perceived will be determined by the context created by available linguistic concepts. In other words, whether a negative stimulus is experienced and expressed as terror or anxiety, sadness or despair, or any of dozens of other concepts will be determined by the terminology available. It is this constantly unfolding interplay between the common biological matrices on which emotions are based and the highly contingent processes of social and cultural construction by which they are finally shaped that lends emotions their interpretive utility for historians.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2615&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2618&quot; id=&quot;jumplink-fn39&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2616&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn39&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn39&quot;&gt;&lt;span data-dcnode-id=&quot;2617&quot; instrument_node=&quot;&quot;&gt;39&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2602&quot;&gt;&lt;span data-dcnode-id=&quot;2613&quot; instrument_node=&quot;&quot;&gt;Emotion should be recognized as a key category of historical analysis. If all people have the potential to feel the same emotions, then patterns in how emotions are expressed and attributed, in who expresses which emotions when and to whom, can become a key index of power relations in any society. The crucial point to take from the neurosciences is that there &lt;/span&gt;&lt;em data-dcnode-id=&quot;2611&quot;&gt;&lt;span data-dcnode-id=&quot;2612&quot; instrument_node=&quot;&quot;&gt;is&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt; a biological basis for emotion, making the chronological and cultural variations in its manifestation all the more meaningful. Far from turning away from language, then, historians can and must work to discover the contributions of culture, of both prescription and description, to the available emotional lexicon of any given time and place (or, to use Barbara's formulation, of any given community). In my first book, &lt;/span&gt;&lt;em data-dcnode-id=&quot;2608&quot;&gt;&lt;span data-dcnode-id=&quot;2609&quot; instrument_node=&quot;&quot;&gt;Passion Is the Gale&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2607&quot; instrument_node=&quot;&quot;&gt;, I took this position to its logical conclusion by re-creating a detailed lexicon of eighteenth-century Anglo-American words for emotion.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2603&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2606&quot; id=&quot;jumplink-fn40&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2604&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn40&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn40&quot;&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt;40&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2600&quot;&gt;&lt;span data-dcnode-id=&quot;2601&quot; instrument_node=&quot;&quot;&gt;By showing social and biological scientists how many historically specific cultural assumptions are encoded in their very efforts to test for emotion, historians can contribute invaluably to the overall study of emotion. Scientists need to understand that the reason they can't locate “anger” in any one neural location is that the word (and the concept it encodes) is infinitely culturally malleable. Yet, on the other hand, we should not go to the extreme of denying that there are loci for the processing of stimuli and that there are biological commonalities that underlie affect. Without that crucial caveat, the historical variability of emotion becomes meaningless, the simple result of random electrical activity in the brain.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2595&quot;&gt;&lt;strong data-dcnode-id=&quot;2597&quot;&gt;&lt;em data-dcnode-id=&quot;2598&quot;&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;Julie Livingston:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2596&quot; instrument_node=&quot;&quot;&gt; Nicole, I think, does an excellent job of explaining, as does Barbara. It makes sense to me. And the doubled move of placing science within rather than opposed to culture helps to offer it up as a tool for historical interpretation.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2593&quot;&gt;&lt;span data-dcnode-id=&quot;2594&quot; instrument_node=&quot;&quot;&gt;But, that said, there are other ways of understanding that I am hoping you all might help me to align with this neuroscientific tool. It seems to me that neuroscience nonetheless presumes that a feeling/emotion is an experience of inner life, one that can then be interpreted by a cultural self, and communicated to others in language that is also of course never pre-cultural. But as I believe that Eugenia and others pointed out earlier, this presumes an individuation of the self and an ontology of the emotional experience that might not make any sense within a particular historical context. Certainly it does not in, say, nineteenth-century Bechuanaland, where individual and dividual personhood (to use McKim Marriott's term) coexist in explicit dynamic tension, and where they are somaticized in the gut, liver, waist, or heart, but rarely the head. This is not to say that neuroscience is “wrong”—but rather to ask what is gained and what is lost when a model such as neuroscience, which is predicated on a different body, a different person, and a different model of sociality, is brought to bear on understandings of a given historical context?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2591&quot;&gt;&lt;span data-dcnode-id=&quot;2592&quot; instrument_node=&quot;&quot;&gt;I mean this to be a genuine question. I think we have talked a bit about the gains—but what of the losses?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2581&quot;&gt;&lt;strong data-dcnode-id=&quot;2588&quot;&gt;&lt;em data-dcnode-id=&quot;2589&quot;&gt;&lt;span data-dcnode-id=&quot;2590&quot; instrument_node=&quot;&quot;&gt;William M. Reddy:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2587&quot; instrument_node=&quot;&quot;&gt; It is certainly the case that the vast majority of neuroscience research is carried out with participants drawn from well-informed and cooperative populations such as university undergraduates or clients receiving treatment in clinical settings. Many experimental strategies, in addition, rely on “self-report,” in which participants describe or rank-order their own emotional responses in various ways, acting as isolated modern subjects. Many findings and research paradigms are therefore culture-specific, and cannot be taken at face value. A Balinese person of the 1980s, as described by Unni Wikan, might well refuse to cooperate in a test using the disturbing emotional images of the widely utilized International Affective Picture System (IAPS), for example.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2583&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2586&quot; id=&quot;jumplink-fn41&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2584&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn41&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn41&quot;&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt;41&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2582&quot; instrument_node=&quot;&quot;&gt; If she did participate, she would be likely to systematically underreport all negative responses. Experience of negative emotions, for Wikan's Balinese informants, directly endangered one's health and rendered one vulnerable to black magic, which was the cause of over half of all deaths, in their view. Her informants hardly regarded themselves as emotionally separate or autonomous.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2575&quot;&gt;&lt;span data-dcnode-id=&quot;2580&quot; instrument_node=&quot;&quot;&gt;However, there are also many findings of neuroscience that are not at all dependent for their validity on the cultural background of participants. Take, for example, the widespread recent reporting of “top-down” processing effects. In sensory and emotional perception, it appears that rough sketches of stimuli are rushed forward to higher processing levels, and these higher levels respond by sending signals back down the processing chain, selectively activating likely identifications, to speed recognition. Thus, before one has heard the full first syllable of a phrase, semantic processing is already underway, rushing back out, to auditory processing regions, guesses about the segmentation of the sounds into words based on the likely meaning of the utterance. Such top-down processing also occurs in vision. The prefrontal cortex's modulation of amygdala activation appears to represent a similar top-down emotional processing.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2576&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2579&quot; id=&quot;jumplink-fn42&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2577&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn42&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn42&quot;&gt;&lt;span data-dcnode-id=&quot;2578&quot; instrument_node=&quot;&quot;&gt;42&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2573&quot;&gt;&lt;span data-dcnode-id=&quot;2574&quot; instrument_node=&quot;&quot;&gt;It has been noted that there are just as many efferent pathways in the brain (going outward from prefrontal regions to sensory cortices) as there are afferent ones (coming inward from sensory to prefrontal regions). It seems highly unlikely that such a massive fact about brain architecture could be culturally shaped. If these findings about top-down modulation of perception continue to be confirmed, it suggests, in fact, how deeply influential our learned “cultural” background can be on every act of perception. “Influential,” however, is not the same thing as “constructing from scratch.” This kind of finding can be a useful corrective to the excesses of the “linguistic turn.” There is no reason why our notion of “culture” or of cultural variation needs to remain tied to a notion of language that is a century out of date.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2561&quot;&gt;&lt;strong data-dcnode-id=&quot;2570&quot;&gt;&lt;em data-dcnode-id=&quot;2571&quot;&gt;&lt;span data-dcnode-id=&quot;2572&quot; instrument_node=&quot;&quot;&gt;Barbara H. Rosenwein:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2569&quot; instrument_node=&quot;&quot;&gt; Julie is right to point out that neuroscience is limited. It is limited even with respect to &lt;/span&gt;&lt;em data-dcnode-id=&quot;2567&quot;&gt;&lt;span data-dcnode-id=&quot;2568&quot; instrument_node=&quot;&quot;&gt;our&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2566&quot; instrument_node=&quot;&quot;&gt; emotions, let alone the emotions of the past. (For, as I hardly need point out, no one has managed to give an fMRI to a nineteenth-century Bechuanalander!) Although at the moment the neurosciences seem to dominate scientific investigation, such was not always the case, not even a few years ago, when Paul Ekman's studies of emotion as facial expression were extraordinarily popular. Alongside those were studies of the chemistry of emotion (now largely subsumed under the category of neurochemistry) and of various aspects of the autonomic nervous system. I suspect that studies of DNA and emotions will soon become very popular.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2562&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2565&quot; id=&quot;jumplink-fn43&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2563&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn43&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn43&quot;&gt;&lt;span data-dcnode-id=&quot;2564&quot; instrument_node=&quot;&quot;&gt;43&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2559&quot;&gt;&lt;span data-dcnode-id=&quot;2560&quot; instrument_node=&quot;&quot;&gt;These sorts of studies do not have direct bearing on Bechuanaland or Francia or pre–World War I Russia. But they are nevertheless pioneering and suggestive and useful, though, no doubt, more for understanding ourselves and our own culture than for our historical inquiries.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2554&quot;&gt;&lt;strong data-dcnode-id=&quot;2556&quot;&gt;&lt;em data-dcnode-id=&quot;2557&quot;&gt;&lt;span data-dcnode-id=&quot;2558&quot; instrument_node=&quot;&quot;&gt;William M. Reddy:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2555&quot; instrument_node=&quot;&quot;&gt; Jan quotes me as saying, at a conference in Jerusalem in spring 2011, that “I only choose the neuroscience that fits my politics.” I remember the moment. But I believe my comment was in response to a question about the enormous quantity and variety of neuroscience research. I did not mean to speak tongue-in-cheek, either, if memory serves. Perhaps I did not explain myself well, but what I implied was that my “politics” are consonant with my epistemological stance, a stance grounded in interpretive method. My method derives from “hermeneutics,” in that I attempt to understand human existence by examining the intentions of persons, what they mean to say, what they mean to do. “Intentions,” “persons,” and “meaning” in this context need more explaining than I can attempt here. But, to be brief, I try to avoid relying on reductionistic formulae. Such reductionistic formulae would include, for example, those of classical Pavlovian behaviorism (based on stimulus-response analysis) as well as those of a certain kind of hard-line Marxism or those of neoclassical economics (where class interest and comparative net advantage are offered as hidden, even unconscious, explanations for all kinds of behavior). Freud's “Three Essays on the Theory of Sexuality,” taken at face value, is also, for me, too reductionistic. Rather than reduce intentionality to a few simple algorithms, to puppeteering by the unconscious, or to a mere side effect of a discursive structure (as Foucault seemed to do), I propose that a new class of intentions be added to the mix, that is, intentional shaping of one's own emotions.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2543&quot;&gt;&lt;span data-dcnode-id=&quot;2553&quot; instrument_node=&quot;&quot;&gt;Neuroscientific publications bristle with jargon, and their tone of voice is governed by a certain caution and a certain politeness. An outsider who wishes to find her way faces a steep learning curve. As a result, many scholars turn to books by neuroscientists aimed at explaining developments in the field to a larger public. To rely on these works is a serious mistake. The names are well-known: LeDoux, Damasio, and most recently Eagleman.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2549&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2552&quot; id=&quot;jumplink-fn44&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2550&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn44&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn44&quot;&gt;&lt;span data-dcnode-id=&quot;2551&quot; instrument_node=&quot;&quot;&gt;44&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2548&quot; instrument_node=&quot;&quot;&gt; These authors tend consistently to naturalize Western, especially North American, cultural patterns and to provide accounts of the brain basis of behavior that make these naturalized patterns appear to be genetically preprogrammed. Works by Daniel Gross and Ruth Leys, among others, have offered sharply worded critiques of these popularizations.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2544&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2547&quot; id=&quot;jumplink-fn45&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2545&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn45&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn45&quot;&gt;&lt;span data-dcnode-id=&quot;2546&quot; instrument_node=&quot;&quot;&gt;45&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2536&quot;&gt;&lt;span data-dcnode-id=&quot;2542&quot; instrument_node=&quot;&quot;&gt;But the multidisciplinary field of neuroscience includes many who display a healthy skepticism about the reliability of current methods and about the validity of current explanations. These experts seldom write for larger audiences, I suspect, because they are, quite reasonably, too cautious to attempt such a daunting task. I find that many among them possess an outlook congenial to my own methodological commitments, and thus to my “politics.” These experts include James J. Gross, Luiz Pessoa, James A. Russell, Lisa Feldman Barrett, and Richard J. Davidson, among others.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2538&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2541&quot; id=&quot;jumplink-fn46&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2539&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn46&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn46&quot;&gt;&lt;span data-dcnode-id=&quot;2540&quot; instrument_node=&quot;&quot;&gt;46&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2537&quot; instrument_node=&quot;&quot;&gt; Schooled by such skeptics, one can begin to read the works of neuroscientists without feeling that one has to globally accept or globally reject an author's current experimental “paradigm” (a word they constantly use in an effort to suggest the very limited scope of their explanations). One simply becomes fascinated by the various possibilities that experimental evidence invites us to consider.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2534&quot;&gt;&lt;span data-dcnode-id=&quot;2535&quot; instrument_node=&quot;&quot;&gt;Jan will remember another moment in Jerusalem, when I was asked how I could accept the limits that neuroscience tends to impose on the possible variation in human cultural forms. My response was that I was consistently impressed with how few limits neuroscientists have been able to find. And I remember Jan nodding in agreement. (This comment is in accord with Nicole's most recent post, as well.) Because of my methodological commitments, I am impressed that ethnographic and historical research consistently discovers communities engaged in managing emotions. Groups make constant efforts to regulate their members' emotional responses and emotional habits. Everywhere, it appears, some emotions (a different set in each case) are considered wrong (even though they may “feel” good) and others bad (because of how they “feel”). I would be delighted to hear of research that has turned up a counterexample to this generalization.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2532&quot;&gt;&lt;span data-dcnode-id=&quot;2533&quot; instrument_node=&quot;&quot;&gt;Pity, for example, was greatly admired in eighteenth-century Europe and North America, and enjoyed, even relished, by many; but it has gradually evolved into a feeling with negative, judgmental implications. Pity used to be approved and felt good, and now it is perhaps viewed as neutral (neither inherently good nor bad), but also as not pleasurable in itself. Emotions, in short, change over time, and are politically charged. Elsewhere I have attempted to define emotional suffering. I won't try to repeat all that here. However, because so much suffering seems to result from emotional management attempts gone awry (such as, for example, the emotional management of patriotism and terror in France in the 1790s, or the consistent criminalization of “unnatural” sexual acts by Christian states), I have proposed that we take a stance, as Jan put it (characterizing my politics), against political regimes that “penalize ambiguity, hybridity, fluidity, and indeterminacy.” Thanks to Jan for raising the issue.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2527&quot;&gt;&lt;strong data-dcnode-id=&quot;2529&quot;&gt;&lt;em data-dcnode-id=&quot;2530&quot;&gt;&lt;span data-dcnode-id=&quot;2531&quot; instrument_node=&quot;&quot;&gt;Jan Plamper:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2528&quot; instrument_node=&quot;&quot;&gt; By way of preface, let me emphasize how much admiration I have for the work of everyone involved in this conversation, and how much easier it is to enter an evolving field than to create one almost from scratch, as Bill and Barbara (and the Stearnses) did. I have the utmost respect for their pioneering achievements, their present work, and the generosity with which they are engaging everyone else, myself included, in this conversation.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2521&quot;&gt;&lt;span data-dcnode-id=&quot;2526&quot; instrument_node=&quot;&quot;&gt;As for the use of life science in the history of emotions, first, the responses to my last intervention make it sound as though it isn't the universalizing potential that historians are after when they turn to the neurosciences. But this is not true. It is precisely universalism that historians are seeking. When humanities scholars—or, for that matter, experts on education and law enforcement or anti-feminists—say “neuroscience has shown that … ,” they make a claim to more truth-value than they were ready to make some twenty years ago during postmodernism's heyday. We live in pomophobic times. I am not convinced by the argument that these neuroscientific hypotheses will eventually become dated. It only makes sense to turn to them in the first place if you believe that they are robust and will stand the test of time, more like the Pythagorean theorem than the phlogiston theory, and if you believe that they apply universally, including to ninth-century Francia and nineteenth-century Bechuanaland. The decision about what will stand the test of time has to be made according to life-science criteria—internal, external, and ecological validity as well as replicability are key here—and as Bill reminds us, this decision had better not be based on popularizers like Damasio, but rather on individual articles and meta-analyses of multiple existing studies, the gold standard in the sciences. My general sense of emotions neuroscience is that it has yet to produce sufficiently robust knowledge for us to exploit. Consider the three neuroscientific hypotheses about emotions most popular in the humanities, Joseph LeDoux et al.'s two roads to fear, Antonio Damasio et al.'s Somatic Marker Hypothesis (SMH), and Giacomo Rizzolatti et al.'s mirror neuron hypothesis. At the time of this writing, in fall 2012, it looks like not one of these will survive, and it is not just that they are being fine-tuned and improved, as so often happens in science, amounting to scientific progress, but that they are actually false.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2522&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2525&quot; id=&quot;jumplink-fn47&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2523&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn47&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn47&quot;&gt;&lt;span data-dcnode-id=&quot;2524&quot; instrument_node=&quot;&quot;&gt;47&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2514&quot;&gt;&lt;span data-dcnode-id=&quot;2520&quot; instrument_node=&quot;&quot;&gt;Second, if the universal truth that one distills turns out to be that all humans—I will get to non-human animals in a moment—have “affective potential,” I wonder about the added value of such a broad claim, as I heard it, for the historical discipline. The disciplinary convention of history is presently one that focuses on smaller truths, on truth claims over more circumscribed domains. At the end of the day, history as we know it is ideographic. The inclusion of non-human animals increases this problem manifold, for where among non-human animals do we draw the line? Which organisms possess no “affective potential”? Given the expansionist logic inherent in the claim, we will end up discussing the “affective potential” of bacteria and dung beetles, much as the “new vitalists” or “new materialists” in neuropolitical science are currently debating the agency of bacteria and dung beetles.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2516&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2519&quot; id=&quot;jumplink-fn48&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2517&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn48&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn48&quot;&gt;&lt;span data-dcnode-id=&quot;2518&quot; instrument_node=&quot;&quot;&gt;48&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2515&quot; instrument_node=&quot;&quot;&gt; The ethical and political implications are anything but trivial: if bacteria and dung beetles possess agency (or “affective potential”), they enter the purview of human empathy and become as worthy of protection as human animals. This in turn influences the kinds of difficult choices that privilege human animals, for instance in approving an animal experiment deemed necessary for the development of a new drug. There are of course those who do not want to privilege human animals—fair enough. I do want to privilege them, which makes “affective potential” incompatible with my politics.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2494&quot;&gt;&lt;span data-dcnode-id=&quot;2513&quot; instrument_node=&quot;&quot;&gt;Third, most of today's neuroscience of emotions &lt;/span&gt;&lt;em data-dcnode-id=&quot;2511&quot;&gt;&lt;span data-dcnode-id=&quot;2512&quot; instrument_node=&quot;&quot;&gt;does&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt; downplay intentionality, meaning, agency, and signification through language—which brings me to Bill's comments. Neuroscience must in fact downplay these dimensions; otherwise the study of emotions could never have conformed to the rules of laboratory science as it developed in the late nineteenth century.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2506&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2509&quot; id=&quot;jumplink-fn49&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2507&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn49&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn49&quot;&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt;49&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2505&quot; instrument_node=&quot;&quot;&gt; Neuroscience epistemology differs from historical epistemology in generating truth claims for small domains that stand in for larger ones, and “reductionism” is no term of abuse but rather the logic governing its experimental designs. The differences between our human science discipline of history and the life sciences are best spelled out as clearly as possible and in as much detail as is necessary for each particular case. Bill is right to remind me of my nodding in Jerusalem in agreement with his statement that neuroscience findings impose few limits on the mind-boggling variety of human culture. I hasten to add that I have speculated in public that several areas of neuroscience—functional integration, neuroplasticity, and social neuroscience—currently look as though genuine cooperation with historians might become possible and would produce added value in how we understand the past.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2501&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2504&quot; id=&quot;jumplink-fn50&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2502&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn50&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn50&quot;&gt;&lt;span data-dcnode-id=&quot;2503&quot; instrument_node=&quot;&quot;&gt;50&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt; For example, functional integration—the finding that not just, say, the amygdala but various areas of the brain interact during fear-processing (some differences in intensity of activation notwithstanding)—rather than functional segregation might shed new light on decision-making in the past. It might allow for a truly, for want of a better term, “cogmotive” concept of decision (someday we will need to invent a holistic neologism that leaves behind both the “cognitive” and “emotional” stems) that will permit us to better make sense of why, for instance, middle- and upper-class Mexican, Western European, and North American students in 1968 chose an ideology, Marxism, that ran counter to their class background—a choice that defies Marxist and rational-choice explanations.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2496&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2499&quot; id=&quot;jumplink-fn51&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2497&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn51&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn51&quot;&gt;&lt;span data-dcnode-id=&quot;2498&quot; instrument_node=&quot;&quot;&gt;51&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2495&quot; instrument_node=&quot;&quot;&gt; How can we better come to terms with the rage and the murky feeling of injustice that pervades their first-person accounts of 1968? But all of this is tentative, as functional integration is not robust enough for our purposes.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2492&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;I submit, then, that we hold off on using neuroscience findings until they acquire the degree of robustness that we depend on in a humanities discipline like history. And that when we do start using neuroscience findings, we do so in full awareness of their specific epistemology, which includes reductionist experimental designs, iron distinctions between true/false, and universal claims to truth.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2477&quot;&gt;&lt;strong data-dcnode-id=&quot;2489&quot;&gt;&lt;em data-dcnode-id=&quot;2490&quot;&gt;&lt;span data-dcnode-id=&quot;2491&quot; instrument_node=&quot;&quot;&gt;Eugenia Lean:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2488&quot; instrument_node=&quot;&quot;&gt; I must confess that I am far less familiar with the field and findings of neuroscience than some of you clearly are. So my comments are very much coming from my status as an outsider, and will address the issue of drawing from the fields of life science that is indeed defined by certain epistemological claims that are problematic (as Jan points out) and by assumptions about the body that are historically specific (as Julie rightly points to). These reservations are important to me as a China historian. In terms of the medical tradition that dominates much of the history that I study, the idea that emotions are to be located and managed by the brain and one's neurons is quite foreign. In what by the twentieth century came to be referred to as “Traditional Chinese Medicine,” a living and widely practiced medical system even today, the kidney—not the amygdala—is identified as crucial in governing emotions. The kidney is seen to store the body's vital energy, or &lt;/span&gt;&lt;em data-dcnode-id=&quot;2486&quot;&gt;&lt;span data-dcnode-id=&quot;2487&quot; instrument_node=&quot;&quot;&gt;qi&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;, whose flow is governed by a physiological mechanism or medium referred to as “fire,” which then heats up one's &lt;/span&gt;&lt;em data-dcnode-id=&quot;2483&quot;&gt;&lt;span data-dcnode-id=&quot;2484&quot; instrument_node=&quot;&quot;&gt;qi&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;, causing the circulation and inflammation of one's emotions.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2478&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2481&quot; id=&quot;jumplink-fn52&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2479&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn52&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn52&quot;&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt;52&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2475&quot;&gt;&lt;span data-dcnode-id=&quot;2476&quot; instrument_node=&quot;&quot;&gt;All this said, I wonder if we should reject engagement with neuroscience completely, however fraught that engagement might be. I have found this discussion and some of Bill's writings very thought-provoking. As Bill and Nicole have pointed out, it does seem to have the potential to offer a method for identifying how the history of emotions might provide a way (if not an absolute way) out of the excesses of the “linguistic turn.” And yet, what about the challenges of using neuroscience, as Jan and Julie have rightly cautioned us about?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2473&quot;&gt;&lt;span data-dcnode-id=&quot;2474&quot; instrument_node=&quot;&quot;&gt;The discussion has led me to think about whether it might be productive to approach neuroscience in a way that our colleagues in the history of medicine, and more generally the history of science, approach modern biomedicine and science. In other words, many of our colleagues in the history of medicine are extremely committed to historicizing, and thus dismantling, the universalistic claims, epistemological strategies, and fundamental assumptions about the body that were historically used by biomedical practitioners and advocates in the late nineteenth and the twentieth century (and are still used today) to advance biomedicine above all other forms of healing, squelching highly pluralistic marketplaces of healing throughout the world. Yet even as historians of medicine seek to historicize certain knowledge regimes (whether it is biomedicine or, for that matter, Traditional Chinese Medicine), I am not sure they would (or can) deny that there nonetheless exists a long history of efficacious treatment and healing built on those very knowledge systems that are so historically specific. In other words, while modern biomedicine and Traditional Chinese Medicine diverge radically in their understanding of the body, they both have a long clinical history of providing effective if widely divergent strategies to detect illness, deal with childbirth, heal (at times different) symptoms, and so on. There thus seems to be a recognition that while we do not have to accept universalistic claims of either biomedicine or Traditional Chinese Medicine (and by extension, accept the possibility of pluralistic and competing views of the body and healing), we can still appreciate that within their specific regimes of comprehending and treating the body, there are effective strategies of “reading” physiological phenomena and treating them. I believe that Jan used the term “smaller truths.” While neuroscience may not be as robust as his standards might demand (again, I am writing as an outsider on this point and am taking his word on this; I also wonder if our demands of robustness stem from our discomfort at considering the possibility of plural ways of seeing the body/material world), can we not appreciate the “little truths” or insights—granted, framed from a specific view of the body—that detect top-down physiological manifestations of emotions, or even affective potential (without having to accept that we then need to believe that dung beetles have affective potential)?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2471&quot;&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt;I am certainly in no position to verify neuroscience, and discern what is lasting of neuroscience. Yet it strikes me that a careful engagement with neuroscience, as many of you seem to be doing, can be fruitful or inspiring as we think about how aspects of neuroscience—or other discourses on the physiological manifestation of emotions found in other medical traditions—might allow us as historians to better identify at what point language, culture, and power might intervene to shape bodily or somatic experiences of emotion, give them meaning and significance, and inform how an entire system of treatment and community gets built around them. In turn, and importantly, we historians might then be able to shape a field of life science that has considerable and growing power in our own society, and that could use some critical reflection regarding its own claims and assumptions.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2466&quot;&gt;&lt;strong data-dcnode-id=&quot;2468&quot;&gt;&lt;em data-dcnode-id=&quot;2469&quot;&gt;&lt;span data-dcnode-id=&quot;2470&quot; instrument_node=&quot;&quot;&gt;AHR Editor:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2467&quot; instrument_node=&quot;&quot;&gt; This exchange has been richly suggestive, and I think it has properly framed the issue of the use of neuroscience for historians with skepticism and caution as well as the possibility of new pathways for thinking and research. In the course of this discussion, however, another theme has been raised that more directly relates to a primary concern of historians—that is, changes in emotional expressiveness over time. On one level, I think it is fair to say that we would reject the notion that there is a historical trajectory of emotional development that implies a greater or more intense level of emotionality for people in past times than for those whose “modernity” confers a greater control over their emotions as a sign of being “civilized.” That said, I think it behooves us to acknowledge not only how deeply entrenched this view has been among historians and social scientists until quite recently, but also its continued purchase on public discourse. And I suspect that historians of emotions must be wary of legitimizing an approach that invites us to fall back into such facile generalizations.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2461&quot;&gt;&lt;span data-dcnode-id=&quot;2465&quot; instrument_node=&quot;&quot;&gt;But this does not mean that we should avoid addressing the question of change over time, and some of your comments have indeed raised it. For example, Bill has noted that in eighteenth-century Europe and North America, “pity” had a positive value, “but it has gradually evolved into a feeling with negative, judgmental implications.” Likewise, in her first book, Niki finds that eighteenth-century Americans considered resentment, but &lt;/span&gt;&lt;em data-dcnode-id=&quot;2463&quot;&gt;&lt;span data-dcnode-id=&quot;2464&quot; instrument_node=&quot;&quot;&gt;not&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2462&quot; instrument_node=&quot;&quot;&gt; rage or anger, as legitimate, thus suggesting a politics of emotions with great implications for the period. How do we think about changes and shifts in emotional expressiveness over time? Are the processes for this alteration primarily political, and what does an attentiveness to changing emotional styles bring to our larger understanding of historical change? Finally, without embracing a notion of one-way development, how do we think of such notions—prevalent in understandings from early Stoicism, the Enlightenment, Freud all the way to Foucault—that discipline and control, both imposed and self-generated, play a fundamental role in the history of emotions?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2456&quot;&gt;&lt;strong data-dcnode-id=&quot;2458&quot;&gt;&lt;em data-dcnode-id=&quot;2459&quot;&gt;&lt;span data-dcnode-id=&quot;2460&quot; instrument_node=&quot;&quot;&gt;Barbara H. Rosenwein:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2457&quot; instrument_node=&quot;&quot;&gt; This question is absolutely fundamental. What are the changes that we can see in the history of emotions, and what mechanisms are responsible for those changes?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2438&quot;&gt;&lt;span data-dcnode-id=&quot;2455&quot; instrument_node=&quot;&quot;&gt;It is much easier to &lt;/span&gt;&lt;em data-dcnode-id=&quot;2453&quot;&gt;&lt;span data-dcnode-id=&quot;2454&quot; instrument_node=&quot;&quot;&gt;see&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2452&quot; instrument_node=&quot;&quot;&gt; the changes than to &lt;/span&gt;&lt;em data-dcnode-id=&quot;2450&quot;&gt;&lt;span data-dcnode-id=&quot;2451&quot; instrument_node=&quot;&quot;&gt;explain&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2449&quot; instrument_node=&quot;&quot;&gt; them. The Editor points to Bill Reddy's discussion of the evolving evaluation of pity and Niki's observations about resentment. These are instances of the changing valuations of single emotions. Peter Stearns has looked at this matter with great care, isolating changing ideals or standards for “good” (i.e., privileged) and “bad” (i.e., devalued) emotions in nineteenth- and twentieth-century America.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2445&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2448&quot; id=&quot;jumplink-fn53&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2446&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn53&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn53&quot;&gt;&lt;span data-dcnode-id=&quot;2447&quot; instrument_node=&quot;&quot;&gt;53&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2444&quot; instrument_node=&quot;&quot;&gt; These are not the only sorts of changes we can find: we can see changes in the very terms that are considered “emotions”; even the word “emotions” has not always been accepted.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2440&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2443&quot; id=&quot;jumplink-fn54&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2441&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn54&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn54&quot;&gt;&lt;span data-dcnode-id=&quot;2442&quot; instrument_node=&quot;&quot;&gt;54&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2439&quot; instrument_node=&quot;&quot;&gt; We can also see changes in the ways in which emotions have been expressed. And we can see changes in the arenas in which emotionality (which includes all sorts of emotions) has been acceptable—or not.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2436&quot;&gt;&lt;span data-dcnode-id=&quot;2437&quot; instrument_node=&quot;&quot;&gt;But what explains these changes? If we forget Norbert Elias's civilizing process, which I hope we can do, what processes are left?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2431&quot;&gt;&lt;span data-dcnode-id=&quot;2435&quot; instrument_node=&quot;&quot;&gt;To oversimplify because of space and time, I see thus far three explanations for emotional change over time, and I am working on a fourth one. I suspect that &lt;/span&gt;&lt;em data-dcnode-id=&quot;2433&quot;&gt;&lt;span data-dcnode-id=&quot;2434&quot; instrument_node=&quot;&quot;&gt;all&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2432&quot; instrument_node=&quot;&quot;&gt; of these explanations work at times, and that very often they work together.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2424&quot;&gt;&lt;span data-dcnode-id=&quot;2430&quot; instrument_node=&quot;&quot;&gt;The social constructionist view of emotions (to which, I think, all of us more or less subscribe) by implication suggests that as societies change, so will emotions. Peter Stearns has taken this idea to heart. He proposes a largely (though not entirely) functional explanation of emotional change. As social and economic needs shift, so do emotions. For example: “By the late 1840s people began to realize that the same industrial world that required the family as emotional haven also required new emotional motivations for competitive work … The resultant response explains why Victorianism introduced its most distinctive emotional emphases in arguing for channeled anger and courageous encounters with fear.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2426&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2429&quot; id=&quot;jumplink-fn55&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2427&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn55&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn55&quot;&gt;&lt;span data-dcnode-id=&quot;2428&quot; instrument_node=&quot;&quot;&gt;55&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2425&quot; instrument_node=&quot;&quot;&gt; Note the use of the word “required”: it was not the emotions that required the change; it was the newly industrialized society that necessitated emotional transformation.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2413&quot;&gt;&lt;span data-dcnode-id=&quot;2423&quot; instrument_node=&quot;&quot;&gt;It seems to me that Bill Reddy's work significantly reverses these terms. If I may tread on his turf here, I would say that his notions of emotional suffering and emotional liberty are key to his explanation of change. Where the social constraints on emotional expression are very limiting, where people are not free to “change goals in response to bewildering, ambivalent thought activations” (i.e., change their feelings in response to a range of emotions, some of which are not in accord), they suffer, and as they do, they tend to look for other outlets for emotional expression and experimentation (which Bill calls “emotional liberty”). Sometimes the constraints are so stifling (as at the court of Louis XVI) and the outlets so freeing (as in the salons and theaters) that a revolution (in this case the French Revolution) takes place, bringing a new “emotional regime” to the fore. Here the emotions themselves require change.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2419&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2422&quot; id=&quot;jumplink-fn56&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2420&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn56&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn56&quot;&gt;&lt;span data-dcnode-id=&quot;2421&quot; instrument_node=&quot;&quot;&gt;56&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2418&quot; instrument_node=&quot;&quot;&gt; And even though Bill's new book on romantic love doesn't use the terms “emotional suffering” and “emotional liberty,” the idea is still there: the strictures of the church on sexual desire led the troubadours to create a (slightly) more liberating outlet: romance.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2414&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2417&quot; id=&quot;jumplink-fn57&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2415&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn57&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn57&quot;&gt;&lt;span data-dcnode-id=&quot;2416&quot; instrument_node=&quot;&quot;&gt;57&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2406&quot;&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;Jan Plamper's early work on fear in the Russian army suggests yet another factor involved in emotional change: the theories of medical professionals.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2408&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2411&quot; id=&quot;jumplink-fn58&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2409&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn58&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn58&quot;&gt;&lt;span data-dcnode-id=&quot;2410&quot; instrument_node=&quot;&quot;&gt;58&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2407&quot; instrument_node=&quot;&quot;&gt; No one talked about fear in th
