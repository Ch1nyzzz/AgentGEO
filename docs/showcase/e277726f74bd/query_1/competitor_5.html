nal of American History&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3696&quot; instrument_node=&quot;&quot;&gt;, and numerous encyclopedias and anthologies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3694&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 class=&quot;abstract-title js-splitscreen-abstract-title&quot; data-dcnode-id=&quot;3082&quot; id=&quot;126483592&quot; scrollto-destination=&quot;126483592&quot;&gt;&lt;span data-dcnode-id=&quot;3083&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;3081&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section class=&quot;abstract&quot; data-dcnode-id=&quot;3062&quot;&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3076&quot;&gt;&lt;span data-dcnode-id=&quot;3080&quot; instrument_node=&quot;&quot;&gt;In the past few years, the &lt;/span&gt;&lt;em data-dcnode-id=&quot;3078&quot;&gt;&lt;span data-dcnode-id=&quot;3079&quot; instrument_node=&quot;&quot;&gt;AHR&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3077&quot; instrument_node=&quot;&quot;&gt; has published five “Conversations,” each on a subject of interest to a wide range of historians: “On Transnational History” (2006), “Religious Identities and Violence” (2007), “Environmental Historians and Environmental Crisis” (2008), “Historians and the Study of Material Culture” (2009), and “Historical Perspectives on the Circulation of Information” (2011). For each the process has been the same: the Editor convenes a group of scholars with an interest in the topic who, via e-mail over the course of several months, conduct a conversation, which is then lightly edited and footnoted, finally appearing in the December issue. The goal has been to provide readers with a wide-ranging consideration of a topic at a high level of expertise, in which the participants are recruited across several fields and periods. It is the sort of publishing project that this journal is uniquely positioned to undertake.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3065&quot;&gt;&lt;span data-dcnode-id=&quot;3075&quot; instrument_node=&quot;&quot;&gt;This year's topic is “The Historical Study of Emotions.” Given the expanding range of new methodological and disciplinary forays among historians in recent years, it may be too much to proclaim that we are witnessing an “Emotional Turn.” (Indeed, one conclusion that might be drawn from the June 2012 &lt;/span&gt;&lt;em data-dcnode-id=&quot;3073&quot;&gt;&lt;span data-dcnode-id=&quot;3074&quot; instrument_node=&quot;&quot;&gt;AHR&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3072&quot; instrument_node=&quot;&quot;&gt; Forum on “Historiographic ‘Turns’ in Critical Perspective” is that the very concept of “turns” may have outlived its intellectual usefulness.) But it cannot be denied that the study of emotions has become a thriving pursuit among historians from many different areas and periods. Not only does its emergence as a legitimate subfield foster the interrogation of descriptors—love, hate, resentment, passions, pity, happiness, and the like—that historians are more often likely to use uncritically if at all; it also allows for the crossing of the boundaries between private and public, the personal and collective, that often constrain our work. To be sure, a major problem with the study of emotions is how we can access the emotional lives of people in past times: is it possible to go beyond emotional &lt;/span&gt;&lt;em data-dcnode-id=&quot;3070&quot;&gt;&lt;span data-dcnode-id=&quot;3071&quot; instrument_node=&quot;&quot;&gt;expressions&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3069&quot; instrument_node=&quot;&quot;&gt;—usually conveyed in language—and attain some assurance that these are indicative of actual emotional &lt;/span&gt;&lt;em data-dcnode-id=&quot;3067&quot;&gt;&lt;span data-dcnode-id=&quot;3068&quot; instrument_node=&quot;&quot;&gt;states&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3066&quot; instrument_node=&quot;&quot;&gt;? This is only one of the questions confronted in the course of this wide-ranging conversation.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3063&quot;&gt;&lt;span data-dcnode-id=&quot;3064&quot; instrument_node=&quot;&quot;&gt;Joining the Editor in this conversation are Nicole Eustace, a historian of early America; Eugenia Lean, who studies modern Chinese history, literature, and culture; Julie Livingston, a historian who works in Africa; Jan Plamper, a specialist in Soviet and Russian history; William M. Reddy, who has written widely on modern European as well as comparative history; and Barbara H. Rosenwein, whose research has ranged across the religious, social, and intellectual history of the Middle Ages.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;3061&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;article-metadata-panel clearfix at-ArticleMetadata&quot; data-dcnode-id=&quot;3052&quot;&gt;&lt;div class=&quot;article-metadata-tocSections&quot; data-dcnode-id=&quot;3053&quot;&gt;&lt;span data-dcnode-id=&quot;3060&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-metadata-tocSections-title&quot; data-dcnode-id=&quot;3058&quot;&gt;&lt;span data-dcnode-id=&quot;3059&quot; instrument_node=&quot;&quot;&gt;Issue Section:&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3057&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;3055&quot; data-google-interstitial=&quot;false&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//academic.oup.com/ahr/search-results%3Ff_TocHeadingTitle%3DAHR%2BConversation%253a%2BThe%2BHistorical%2BStudy%2Bof%2BEmotions&quot;&gt;&lt;span data-dcnode-id=&quot;3056&quot; instrument_node=&quot;&quot;&gt;AHR Conversation: The Historical Study of Emotions&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3054&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3051&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;3050&quot; data-google-interstitial=&quot;false&quot; id=&quot;126483593&quot; scrollto-destination=&quot;126483593&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3049&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;fig fig-section js-fig-section&quot; data-dcnode-id=&quot;3044&quot; data-id=&quot;FU1&quot;&gt;&lt;div class=&quot;graphic-wrap&quot; data-dcnode-id=&quot;3045&quot; restricted=&quot;&quot;&gt;&lt;img alt=&quot;graphic&quot; class=&quot;content-image&quot; data-dcnode-id=&quot;3048&quot; data-path-from-xml=&quot;ahr.117.5.1487.f1.gif&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_protected/Journal/ahr/117/5/10.1093_ahr_117.5.1487/2/m_ahr.117.5.1487.f1.gif%3FExpires%3D1655415696%26Signature%3DMoKUeGQitlHgr9gl9Yl6xHUjfAGRE1179YV0cYWkFrAHZN2oQar6lUrzwrS76Cfo0F5fAmq3DLiog8Y8yjOEOrteLfczXrHIyg-26XeiZnzPM~UA1UIFDs7PQTVjtoJVqQ8Plm-F8uj3BeQ3i-eIgtoZISlt~6Onk9TGeKWveUsczLNyeundjMzO3oZ11nwHBVhBb2Kz7oC4P~kaDWpRDR1hvGTr7R-CrmaJbAYNMzlhw9Rl7SRL2aB-3gPLVp4L9II~vn9TtpCArIH6KXqrfsm8bBvetBtnk1cQw3RQowukHcSLEkitklRWsvQB1FVK5WFchb~m8faRr2LFuye7dA__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;amp;raw&quot;&gt;&lt;div class=&quot;copy-right-statement&quot; data-dcnode-id=&quot;3046&quot; style=&quot;display: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3047&quot; instrument_node=&quot;&quot;&gt;
                      Compliance with permission from the rights holder to display this image online prohibits further enlargement or copying.
                    &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;fig fig-modal reveal-modal&quot; content-id=&quot;FU1&quot; data-dcnode-id=&quot;3039&quot; style=&quot;display: block;&quot;&gt;&lt;div class=&quot;graphic-wrap&quot; data-dcnode-id=&quot;3040&quot; restricted=&quot;&quot;&gt;&lt;img alt=&quot;graphic&quot; class=&quot;content-image&quot; data-dcnode-id=&quot;3043&quot; data-path-from-xml=&quot;ahr.117.5.1487.f1.gif&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_protected/Journal/ahr/117/5/10.1093_ahr_117.5.1487/2/m_ahr.117.5.1487.f1.gif%3FExpires%3D1655415696%26Signature%3DMoKUeGQitlHgr9gl9Yl6xHUjfAGRE1179YV0cYWkFrAHZN2oQar6lUrzwrS76Cfo0F5fAmq3DLiog8Y8yjOEOrteLfczXrHIyg-26XeiZnzPM~UA1UIFDs7PQTVjtoJVqQ8Plm-F8uj3BeQ3i-eIgtoZISlt~6Onk9TGeKWveUsczLNyeundjMzO3oZ11nwHBVhBb2Kz7oC4P~kaDWpRDR1hvGTr7R-CrmaJbAYNMzlhw9Rl7SRL2aB-3gPLVp4L9II~vn9TtpCArIH6KXqrfsm8bBvetBtnk1cQw3RQowukHcSLEkitklRWsvQB1FVK5WFchb~m8faRr2LFuye7dA__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;amp;raw&quot;&gt;&lt;div class=&quot;copy-right-statement&quot; data-dcnode-id=&quot;3041&quot; style=&quot;display: none;&quot;&gt;&lt;span data-dcnode-id=&quot;3042&quot; instrument_node=&quot;&quot;&gt;
                      Compliance with permission from the rights holder to display this image online prohibits further enlargement or copying.
                    &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3034&quot;&gt;&lt;strong data-dcnode-id=&quot;3036&quot;&gt;&lt;em data-dcnode-id=&quot;3037&quot;&gt;&lt;span data-dcnode-id=&quot;3038&quot; instrument_node=&quot;&quot;&gt;AHR Editor:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3035&quot; instrument_node=&quot;&quot;&gt; It seems clear that consideration of the role of emotions in history is increasingly recognized as a legitimate approach. There are, however, many different and contrasting understandings that come into play—even on the basic level of what we mean by the term itself or how we can access emotional states in past times. To begin our conversation, I would like to ask each of you what brought you to see this concern as crucial in your work as a historian? What methodological, theoretical, and scholarly considerations mark your appreciation of emotions in history? Are there aspects of your field or period that endow a specificity to your approach to emotions in history?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3029&quot;&gt;&lt;strong data-dcnode-id=&quot;3031&quot;&gt;&lt;em data-dcnode-id=&quot;3032&quot;&gt;&lt;span data-dcnode-id=&quot;3033&quot; instrument_node=&quot;&quot;&gt;William M. Reddy:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3030&quot; instrument_node=&quot;&quot;&gt; I was drawn into the history of emotions by research on gender and popular culture in eighteenth-century Europe, and on what Robert Darnton called the “social history” of the Enlightenment. Historians working on these questions discovered the centrality of sentimentalism in that period, and the extravagant performances of emotion that became routine among the educated elite in the last decades prior to the French Revolution. Norbert Elias had missed this development, which did not fit into his scheme. So had Michel Foucault.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3027&quot;&gt;&lt;span data-dcnode-id=&quot;3028&quot; instrument_node=&quot;&quot;&gt;It seemed to me urgent to ask whether these performances reflected real changes in emotional experience, and if so, how such changes could be understood historically. I turned for help both to anthropological work on variation in emotions across cultures and to experimental psychology, where I found interesting, directly relevant debates underway. I found that such figures as anthropologist Michelle Rosaldo and psychologist James Russell argued persuasively that human emotional experience was deeply influenced by culture and could vary across a wide range.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3017&quot;&gt;&lt;strong data-dcnode-id=&quot;3024&quot;&gt;&lt;em data-dcnode-id=&quot;3025&quot;&gt;&lt;span data-dcnode-id=&quot;3026&quot; instrument_node=&quot;&quot;&gt;Julie Livingston:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3023&quot; instrument_node=&quot;&quot;&gt; The Editor's question has prompted the first occasion for me to think about this. I have never thought of myself as a historian of emotions per se. When asked, I call myself a historian and anthropologist of the human body. I don't remember being consciously drawn into the topic of emotions—but I can identify a few things that I imagine brought me here. First, I was trained, as many Africanists are, to use oral history as a central method in my research. Because of a dearth of (and the skewed nature of) written records even for the modern period in many parts of Africa, and because of the politics of social history that animated the field from its inception in the 1960s, both oral history interviews and oral traditions have long been central to the field. These interviews are then transcribed and analyzed as texts.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3019&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;3022&quot; id=&quot;jumplink-fn1&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;3020&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn1&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn1&quot;&gt;&lt;span data-dcnode-id=&quot;3021&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3018&quot; instrument_node=&quot;&quot;&gt; Yet I became frustrated by how distorted my own interviews seemed when they were stripped of their performative and emotional qualities and reduced to texts. The tape recording was already a pale version of the actual conversation, and the transcription even more so. It mattered whether someone had laughed or cried or grown suddenly silent as they recalled or debated particular events.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3010&quot;&gt;&lt;span data-dcnode-id=&quot;3016&quot; instrument_node=&quot;&quot;&gt;I found that this flattening mirrored a norm in the history of medicine, in which actual embodied experiences of medicine and illness were often sanitized or segregated from the analytic work of history. Here it was the human body that was rendered as text. This, of course, is an inadequate means of approaching the issues of pain, incontinence, paralysis, etc., that abounded in my ethnographic research, where I worked with a home-based care program. This thoroughly material body that I saw in practice and that I found in the archives and oral histories was intersubjective more than individuated, and its meanings and effects in the world could not be accounted for without close attention to the emotions it generated and expressed.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3012&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;3015&quot; id=&quot;jumplink-fn2&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;3013&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn2&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn2&quot;&gt;&lt;span data-dcnode-id=&quot;3014&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3011&quot; instrument_node=&quot;&quot;&gt; But perhaps most importantly, emotions were a fundamental concern of Tswana medicine, a dynamic system of knowledge and practice that was central to the history I was writing. In “traditional” Setswana medicine, the feelings in someone's heart were recognized as having direct effects on the bodily well-being of that person's loved ones, and so there was no way to understand medicine or vernacular forms of embodiment without also grasping the cultural norms of emotional continence and expression as aspects of medicine and public health.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3008&quot;&gt;&lt;span data-dcnode-id=&quot;3009&quot; instrument_node=&quot;&quot;&gt;Lastly, I did the research for my first book over the course of several long-term stays in Botswana between 1996 and 1999, and that was the height of the AIDS epidemic there. My work brought me into the homes, clinics, and hospitals of the sick and the dying. In the village where I lived, and among my friends and co-workers, there was a tremendous existential angst that pervaded daily life. There was a mood (for want of a better word) that was hard to describe, and yet unmistakable, as the church bell tolled each day or sometimes more than once a day to announce a death, as people began to forgo most other types of parties and social occasions so as to be able to attend funerals, etc. This mood was of course experienced and expressed in culturally specific ways—as Michelle Rosaldo, Catherine Lutz, and other anthropologists had taught me to expect. But it was also a profound marking of a precise, if overwrought, historical moment. When I was back in Botswana several years later for an extended stay—after antiretroviral drugs had arrived and the form of the epidemic had shifted—the mood was palpably different. It was still culturally specific (acknowledging, of course, that culture is not monolithic; any collective culture is also marked by internal contradictions and tensions), but it was different than it had been a few years earlier. And now American and European psychologists had arrived and spilled a great deal of ink and money pathologizing Tswana culture, explaining that Batswana “don't grieve properly,” and trying to retrain them to be more expressive. And so this also helped cause me to think about collective emotions, and about how best to write about something like a mood—to convey it in aesthetic terms—and also to think about the politics of emotional expression.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;3003&quot;&gt;&lt;strong data-dcnode-id=&quot;3005&quot;&gt;&lt;em data-dcnode-id=&quot;3006&quot;&gt;&lt;span data-dcnode-id=&quot;3007&quot; instrument_node=&quot;&quot;&gt;Nicole Eustace:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;3004&quot; instrument_node=&quot;&quot;&gt; I came to the study of the history of emotion in the early 1990s, at a point when gender history and the history of the family were becoming hugely influential within my chosen field of early American history, and when emotion seemed to be the next major avenue open to investigation in those fields. At the time, I was seized by two fundamental feminist insights. First, women's historians were upending the nineteenth-century notion of separate gendered spheres, exposing supposed divisions of public and private as historical constructs with little factual basis. Second, these scholars were demonstrating that the use of gender to demarcate public and private gained ubiquity because of the way it seemed to naturalize the differential distribution of power, to ground social hierarchies in the order of nature. Turning to scholarship on emotion from the eighteenth to the twentieth century, I was immediately struck by the traditional opposition between emotion and reason and by the oft-advanced proposition that civilized people were better at controlling their emotions than savage ones. For eighteenth-century British imperialists, this meant that Europeans were superior to Africans and Native Americans; for twentieth-century theorists like John Huizinga and Norbert Elias, this meant that modern rationalists were superior to premodern ranters and ravers. From the eighteenth century to the twentieth, to be civilized and modern was to be farther removed from unbridled emotion and untrammeled nature. Yet along with my professional training as a historian, I also brought to the study of emotion some undergraduate training in neurobiology, as well as a personal history as the child of two psychologists. Against the insistence of many throughout history that distinct emotional patterns provide a useful way of differentiating human groups and, laterally, of stratifying them into hierarchical positions, I could set the insistence of many scientists that emotions have a universal biological basis. With emotion itself historically positioned as a quintessentially feminine, primitive, and private aspect of human experience, the topic seemed ripe for interrogation through new modes of inquiry centered on the analysis of power. If the biological basis of emotion is universal, yet the cultural incidence of emotional expression has been highly varied, then in that gap between experience and expression (to paraphrase a formulation advanced by William Reddy) lie the very foundations of the structures of power. In some sense, the effort to bridge the gap between feeling and language that Reddy and others have identified is a timeless process; the interplay of somatic sensation and linguistic labeling is ever-unfolding. And yet, exactly because this is such a dynamic process, emotion is uniquely suited to the study of change over time. Shifting patterns in who expresses which emotions, when, and to whom provide a key index of power in every society. Every expression of emotion constitutes social communication and political negotiation. Truly, the personal is political.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2988&quot;&gt;&lt;strong data-dcnode-id=&quot;3000&quot;&gt;&lt;em data-dcnode-id=&quot;3001&quot;&gt;&lt;span data-dcnode-id=&quot;3002&quot; instrument_node=&quot;&quot;&gt;Eugenia Lean:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2999&quot; instrument_node=&quot;&quot;&gt; Like several others, I came to the history of emotions in the 1990s, informed by the exciting work being done on gender and cultural history. Foucault and others had started to impact the history field and help shift concerns from social structures as moving forces behind history to the consideration of language and discourse, and to questions of historicizing the constitution of subjectivity, sexuality, and matters of the intimate. This resulted in innovative work being done in the early modern European field that Bill Reddy has mentioned regarding sentimentalism and the French Revolution, which started to link issues of gender, and emotions, to politics and the public arena. This generation of historians examining emotions and politics was responding in part to Habermas's formulation of the bourgeois public sphere, which identified a normatively powerful schema appearing in eighteenth-century Western Europe of a public sphere—dominated by men—that was a realm of rational communicative action and that lay in contradistinction to a private realm that was feminized and the place of emotions.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2995&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2998&quot; id=&quot;jumplink-fn3&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2996&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn3&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn3&quot;&gt;&lt;span data-dcnode-id=&quot;2997&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2994&quot; instrument_node=&quot;&quot;&gt; Historians of gender of the early modern period, in particular, started to take exception to such a formulation.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2990&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2993&quot; id=&quot;jumplink-fn4&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2991&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn4&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn4&quot;&gt;&lt;span data-dcnode-id=&quot;2992&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2989&quot; instrument_node=&quot;&quot;&gt; From the perspective of a modern China historian, these historical and historiographical debates proved inspiring, even as they remained stubbornly Eurocentric in their reliance upon epistemological categories of private-public, emotion-reason, subjectivity-objectivity, as well as the notion of subjectivity/personhood itself.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2973&quot;&gt;&lt;span data-dcnode-id=&quot;2987&quot; instrument_node=&quot;&quot;&gt;My interest in these debates coincided with innovative work being done by colleagues in the China field focused on the seventeenth century and its Cult of Sentiment. They were exploring the role of sentiment, or &lt;/span&gt;&lt;em data-dcnode-id=&quot;2985&quot;&gt;&lt;span data-dcnode-id=&quot;2986&quot; instrument_node=&quot;&quot;&gt;qing&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2984&quot; instrument_node=&quot;&quot;&gt;, in women's culture, literature, and philosophical musings during a period of dynastic decline to show how sentiment came to serve as an antidote to what was perceived as an ineffectual focus in state orthodoxy on ritual as a means to cultivate individuals and harmonize society.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2980&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2983&quot; id=&quot;jumplink-fn5&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2981&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn5&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn5&quot;&gt;&lt;span data-dcnode-id=&quot;2982&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2979&quot; instrument_node=&quot;&quot;&gt; From their rich work, it became clear to me that the Confucian tradition and its vibrant cultural history offered an entirely different epistemological context from which to interrogate how we in the West think about the very category of emotion. I furthermore wanted to extend this approach forward in time, and explore the issue of gender, emotions, and politics for twentieth-century China, when Confucianism was being debunked as official state ideology, empire had come to an end, and a more mass, commercial culture was emerging.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2975&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2978&quot; id=&quot;jumplink-fn6&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2976&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn6&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn6&quot;&gt;&lt;span data-dcnode-id=&quot;2977&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2974&quot; instrument_node=&quot;&quot;&gt; Notions of gender, categories of self/family, imported ideas of “private” and “public,” and collective identity and social organization were subject to intense scrutiny in this period when China's political cosmology was in tremendous flux. Emotions proved a compelling entryway into these issues.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2971&quot;&gt;&lt;span data-dcnode-id=&quot;2972&quot; instrument_node=&quot;&quot;&gt;In a broader sense, my interest in the question of emotions also emerged from the theoretical and methodological debates raging in the 1990s about what it meant to be a historian or social scientist. Poststructuralism's challenge to the idea of an objective social science was implicitly at the heart of those highly impassioned debates that resulted productively in my mind in a questioning among historians about the basic assumption of our work, namely, whether we are able to retrieve through empirical fact the objective truth regarding the past. These debates forced me to think seriously about how our subjectivity and passions come into play when writing history, and about how best to engage in the dispassionate analysis needed for historical inquiry while recognizing our subjective perspectives as historically situated subjects. These methodological explorations went hand in hand with my interest in historicizing emotions and identity, individual and collective.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2925&quot;&gt;&lt;strong data-dcnode-id=&quot;2968&quot;&gt;&lt;em data-dcnode-id=&quot;2969&quot;&gt;&lt;span data-dcnode-id=&quot;2970&quot; instrument_node=&quot;&quot;&gt;Jan Plamper:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2967&quot; instrument_node=&quot;&quot;&gt; By the early 2000s, I had grown increasingly dissatisfied with the overwhelming emphasis on language in poststructuralist history-writing and began looking for less mediated approaches that would restore the visceral qualities of bodily experience to their rightful place, approaches that would also allow for stronger notions of causality than “discursive shifts” or the like. I suspect that many historians of emotion share this trajectory, and it would be worthwhile at some point to explore the conditions that made the “emotions moment” possible in various disciplines and fields, a moment that I would date to September 11, 2001, which cata-lytically sped up several interrelated processes that were already underway. At any rate, I chanced upon Bill Reddy's &lt;/span&gt;&lt;em data-dcnode-id=&quot;2965&quot;&gt;&lt;span data-dcnode-id=&quot;2966&quot; instrument_node=&quot;&quot;&gt;The Navigation of Feeling: A Framework for the History of Emotions&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2964&quot; instrument_node=&quot;&quot;&gt; (which according to Amazon, incidentally but tellingly, was officially released on September 10, 2001), which seemed to offer a highly sophisticated way out of what dissatisfied me, and later upon Barbara Rosenwein's &lt;/span&gt;&lt;em data-dcnode-id=&quot;2962&quot;&gt;&lt;span data-dcnode-id=&quot;2963&quot; instrument_node=&quot;&quot;&gt;AHR&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2961&quot; instrument_node=&quot;&quot;&gt; article “Worrying about Emotions in History,” which gave the field a history and helped to get me thinking more seriously about emotions beyond individuals—“emotional communities,” to use her influential term.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2957&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2960&quot; id=&quot;jumplink-fn7&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2958&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn7&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn7&quot;&gt;&lt;span data-dcnode-id=&quot;2959&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2956&quot; instrument_node=&quot;&quot;&gt; Also, I was living in Germany, where some historians were doing cutting-edge work on the emotions, and the possibility of actually having a group of people to interact with seemed attractive as well.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2952&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2955&quot; id=&quot;jumplink-fn8&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2953&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn8&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn8&quot;&gt;&lt;span data-dcnode-id=&quot;2954&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2951&quot; instrument_node=&quot;&quot;&gt; So I embarked on a project about how (late imperial) Russian soldiers were conditioned to overcome fears, how they actually experienced fear, and how they were dealt with (by the state, medical experts, et al.) when they experienced an emotional breakdown marked by fear-induced symptoms. I started with what seemed easiest to do, namely, to uncover scientific talk that turned fear into an object of inquiry, yet conceptual problems began piling up so fast that at some point I had to try to think some of them through. The result was a several-year-long detour from the fear project and a book that tries to both synthesize and intervene in the history of emotions.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2947&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2950&quot; id=&quot;jumplink-fn9&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2948&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn9&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn9&quot;&gt;&lt;span data-dcnode-id=&quot;2949&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2946&quot; instrument_node=&quot;&quot;&gt; Among the aspects of my Russianist specialization that endow a specificity to my approach to emotions in history, I want to mention just one. In its history, Russia has produced several national emotional (auto)stereotypes, including &lt;/span&gt;&lt;em data-dcnode-id=&quot;2944&quot;&gt;&lt;span data-dcnode-id=&quot;2945&quot; instrument_node=&quot;&quot;&gt;khandra&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2943&quot; instrument_node=&quot;&quot;&gt;, an untranslatable notion of bittersweet despondency or melancholy embodied by literary prototypes such as Alexander Pushkin's Eugene Onegin: “The illness with which he'd been smitten / should have been analyzed when caught, / something like &lt;/span&gt;&lt;em data-dcnode-id=&quot;2941&quot;&gt;&lt;span data-dcnode-id=&quot;2942&quot; instrument_node=&quot;&quot;&gt;spleen&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2940&quot; instrument_node=&quot;&quot;&gt;, that scourge of Britain, / or Russia's &lt;/span&gt;&lt;em data-dcnode-id=&quot;2938&quot;&gt;&lt;span data-dcnode-id=&quot;2939&quot; instrument_node=&quot;&quot;&gt;chondria&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2937&quot; instrument_node=&quot;&quot;&gt;, for short; / it mastered him in slow gradation; / thank God, he had no inclination / to blow his brains out, but in stead / to life grew colder than the dead.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2933&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2936&quot; id=&quot;jumplink-fn10&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2934&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn10&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn10&quot;&gt;&lt;span data-dcnode-id=&quot;2935&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2932&quot; instrument_node=&quot;&quot;&gt; It turns out that many modern nations have generated stereotypes that supposedly capture their collective emotional makeup (think of the British “stiff upper lip,” Portuguese &lt;/span&gt;&lt;em data-dcnode-id=&quot;2930&quot;&gt;&lt;span data-dcnode-id=&quot;2931&quot; instrument_node=&quot;&quot;&gt;saudade&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2929&quot; instrument_node=&quot;&quot;&gt;, or German &lt;/span&gt;&lt;em data-dcnode-id=&quot;2927&quot;&gt;&lt;span data-dcnode-id=&quot;2928&quot; instrument_node=&quot;&quot;&gt;angst&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2926&quot; instrument_node=&quot;&quot;&gt;). Whence this emotional stereotyping? How can we write the genealogies of these stereotypes? This strikes me as one of many fruitful topics of future research in the history of emotions.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2907&quot;&gt;&lt;strong data-dcnode-id=&quot;2922&quot;&gt;&lt;em data-dcnode-id=&quot;2923&quot;&gt;&lt;span data-dcnode-id=&quot;2924&quot; instrument_node=&quot;&quot;&gt;Barbara H. Rosenwein:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2921&quot; instrument_node=&quot;&quot;&gt; My own “emotional turn” followed less directly from gender history than from the “linguistic turn.” I came to the topic of the history of emotions because when I read Norbert Elias, rather late in my career, I knew that he was wrong. He was wrong for the most elementary of reasons: he didn't know how to read his sources. Rather than contextualize his texts, he culled phrases that conformed to his theory. Thus when the troubadour Bertran de Born wrote “I tell you that neither eating, drinking, nor sleep has as much savor for me as when I hear the cry ‘Forwards!’ from both sides, and horses without riders shying and whinnying, and the cry ‘Help! Help!’” and so on, Elias concluded that “rapine, battle, hunting of people and animals … formed part of the pleasures of life.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2917&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2920&quot; id=&quot;jumplink-fn11&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2918&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn11&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn11&quot;&gt;&lt;span data-dcnode-id=&quot;2919&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2916&quot; instrument_node=&quot;&quot;&gt; But I knew that such a view radically limited any exploration of medieval emotions (or manners or pastimes). And, more precisely, I had read William Paden et al.'s book on &lt;/span&gt;&lt;em data-dcnode-id=&quot;2914&quot;&gt;&lt;span data-dcnode-id=&quot;2915&quot; instrument_node=&quot;&quot;&gt;all&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2913&quot; instrument_node=&quot;&quot;&gt; the poems of Bertran, and I knew that, contextualized, Bertran's poetry sprang “from an obsession with conflict and a drive to master conflict by an act of will … He arrogates to himself the power to create meaningful form out of conflict, to force opposed meanings into coincidence.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2909&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2912&quot; id=&quot;jumplink-fn12&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2910&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn12&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn12&quot;&gt;&lt;span data-dcnode-id=&quot;2911&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2908&quot; instrument_node=&quot;&quot;&gt; This is quite different from delighting in rapine.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2898&quot;&gt;&lt;span data-dcnode-id=&quot;2906&quot; instrument_node=&quot;&quot;&gt;Further, rather than consider &lt;/span&gt;&lt;em data-dcnode-id=&quot;2904&quot;&gt;&lt;span data-dcnode-id=&quot;2905&quot; instrument_node=&quot;&quot;&gt;who&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2903&quot; instrument_node=&quot;&quot;&gt; was writing and why they might be saying what they said about other people's behavior, Elias took their word as a transparent window onto the world. I discuss the problems inherent in using sources this way (though in this case my critique is of Johan Huizinga, not Elias) in an article that I published in 2010. Here I explore how the words of a courtly chronicler were used by Huizinga to illuminate “real life” without considering the position of that chronicler or his predilections, prejudices, or desires to manipulate his audience.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2899&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2902&quot; id=&quot;jumplink-fn13&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2900&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn13&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn13&quot;&gt;&lt;span data-dcnode-id=&quot;2901&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2896&quot;&gt;&lt;span data-dcnode-id=&quot;2897&quot; instrument_node=&quot;&quot;&gt;In short, it seemed to me that just by asking good old-fashioned historical questions—who wrote, when, why, with what purposes?—one would come up with a different narrative.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2886&quot;&gt;&lt;span data-dcnode-id=&quot;2895&quot; instrument_node=&quot;&quot;&gt;It would need to be in the first place a narrative based on “discourses”—though my breakthrough, I think, was to see that at any one time there was more than one discourse—because most of our sources are texts. That is not to belittle visual, ritual, or embodied sources, which can also be seen as part of a discourse. The trick is to contextualize each source, so that it is not snatched out of a welter of competing voices (or rituals or dances) and presented as &lt;/span&gt;&lt;em data-dcnode-id=&quot;2893&quot;&gt;&lt;span data-dcnode-id=&quot;2894&quot; instrument_node=&quot;&quot;&gt;the&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2892&quot; instrument_node=&quot;&quot;&gt; voice of the age. Thus in her new book about the War of 1812, Niki makes clear that the voices of the southern states had one set of assumptions and values and emotions, while other voices, mainly confined to the East Coast, tried to assert other positions and express other feelings, albeit without much success.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2888&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2891&quot; id=&quot;jumplink-fn14&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2889&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn14&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn14&quot;&gt;&lt;span data-dcnode-id=&quot;2890&quot; instrument_node=&quot;&quot;&gt;14&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2887&quot; instrument_node=&quot;&quot;&gt; I would call the southerners one “emotional community,” the easterners another.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2867&quot;&gt;&lt;span data-dcnode-id=&quot;2885&quot; instrument_node=&quot;&quot;&gt;To get at the nature of these emotional communities, I again have been influenced by the “linguistic turn” in the sense of being interested in language. Some neuroscientific studies, such as those pursued by Maria Gendron and Lisa Feldman Barrett, give theoretical ballast to my own insistence on figuring out in the first place what the emotional vocabulary is.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2881&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2884&quot; id=&quot;jumplink-fn15&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2882&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn15&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn15&quot;&gt;&lt;span data-dcnode-id=&quot;2883&quot; instrument_node=&quot;&quot;&gt;15&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2880&quot; instrument_node=&quot;&quot;&gt; I don't assume that in the past it was the same as in the present, &lt;/span&gt;&lt;em data-dcnode-id=&quot;2878&quot;&gt;&lt;span data-dcnode-id=&quot;2879&quot; instrument_node=&quot;&quot;&gt;pace&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2877&quot; instrument_node=&quot;&quot;&gt; most psychologists, though I imagine that in the Western past they were closer to our Western vocabulary than in Asia or Africa.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2873&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2876&quot; id=&quot;jumplink-fn16&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2874&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn16&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn16&quot;&gt;&lt;span data-dcnode-id=&quot;2875&quot; instrument_node=&quot;&quot;&gt;16&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2872&quot; instrument_node=&quot;&quot;&gt; To be sure, in our globalized world, that may be changing.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2868&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2871&quot; id=&quot;jumplink-fn17&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2869&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn17&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn17&quot;&gt;&lt;span data-dcnode-id=&quot;2870&quot; instrument_node=&quot;&quot;&gt;17&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2865&quot;&gt;&lt;span data-dcnode-id=&quot;2866&quot; instrument_node=&quot;&quot;&gt;But why are emotions important? There are at least two reasons. First, all historians must concern themselves with master narratives. If the master narrative (here I mean Elias and his many derivatives, including numerous narratives of modernity) is about emotions, then we need to consider them. But more profoundly, there is good reason why the master narrative includes emotions: they are embedded in daily life, politics, what we value, and just about every utterance we may make, whether or not these include or exclude emotion words.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2857&quot;&gt;&lt;strong data-dcnode-id=&quot;2862&quot;&gt;&lt;em data-dcnode-id=&quot;2863&quot;&gt;&lt;span data-dcnode-id=&quot;2864&quot; instrument_node=&quot;&quot;&gt;AHR Editor:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt; I am struck by the diversity of trajectories that have brought you to the study of emotions. Several common themes are apparent, however. The most obvious is a level of frustration with established or traditional approaches that leave the emotional side of human experience unacknowledged or marginalized. These, as Julie Livingston notes, tend to flatten the emotional texture of human expressiveness. Even here, however, there are differences. For Barbara Rosenwein, for example, an “emotional turn” grew out of the “linguistic turn,” whereas Jan Plamper's interest in emotions stemmed from dissatisfaction “with the overwhelming emphasis on language in poststructuralist history-writing.” Like Barbara and Julie, Niki Eustace and Bill Reddy evoke Norbert Elias as having promoted a view of history that tends to discard emotionality as history “progresses,” while Eugenia Lean underscores the reaction to Habermas's influential formulation of a public sphere characterized by (male) rational discourse as a feature of modernity. Whatever the differences, it is this sense of &lt;/span&gt;&lt;em data-dcnode-id=&quot;2859&quot;&gt;&lt;span data-dcnode-id=&quot;2860&quot; instrument_node=&quot;&quot;&gt;frustration&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2858&quot; instrument_node=&quot;&quot;&gt; that strikes me as interesting. To be sure, there is always an element of dissatisfaction in scholarly or intellectual development or critique—why else would one be motivated to seek out new methods and depart from established practices and paradigms? Here, however, I think it's something more—dissatisfaction compounded by an ambitious desire to capture a level of experience or expression that most historians would concede is simply beyond our reach, at least historically. Indeed, I think many historians would express a wistful desire to understand the emotional state of their subjects but at the same time simply refuse to believe that it's possible. So my question has to do with the ways and means of “doing” history of emotions. And in particular I'd like to have you talk about the distinction, already raised, and certainly central to this kind of discussion, between “experience” and “expression.” Clearly, except in the cases Julie describes, where there is someone sitting on the other side of the microphone, we lack any meaningful contact with the emotional experiences of people in past times. Where, then, do we direct our analytical energies, and what can we expect in terms of recovering an emotional level of historical experience? Are expressions of emotion and emotional “styles,” often constructed, perpetuated, legitimated, and otherwise configured by religious, political, or other ideological or collective agencies, the basic objects of our inquiry? If so, to what degree does this suggest the additional qualification that we are largely limited to an arena somewhat removed from what Jan called “the visceral qualities,” or Julie's “somatic sensations,” or the truly subjective that Eugenia alludes to?&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2840&quot;&gt;&lt;strong data-dcnode-id=&quot;2854&quot;&gt;&lt;em data-dcnode-id=&quot;2855&quot;&gt;&lt;span data-dcnode-id=&quot;2856&quot; instrument_node=&quot;&quot;&gt;Barbara H. Rosenwein:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2853&quot; instrument_node=&quot;&quot;&gt; When someone (let's imagine a woman) sits on the other side of a microphone and says “I am in love,” why does that seem more meaningful—more revealing of her emotional experience—than when troubadour Peire Vidal (d. ca. 1204) sings “Through love I am so strongly full of love that all my wishes are of love”?&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2849&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2852&quot; id=&quot;jumplink-fn18&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2850&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn18&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn18&quot;&gt;&lt;span data-dcnode-id=&quot;2851&quot; instrument_node=&quot;&quot;&gt;18&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2848&quot; instrument_node=&quot;&quot;&gt; I will give four reasons why—and then I will problematize them. First, the person on the other side of the microphone does not seem to be speaking in a genre with fixed forms, rules, and topoi. Her words seem spontaneous. Second, we can see her face, which appears sincere, as do her gestures and tone of voice. We can do none of that with Vidal. Third, we can press her for more information, ask questions, and probe. How can we do that with the long-dead Vidal? And fourth, we think we know what she means because we too have been in love, and we can empathize. Of course, that means that we assume (perhaps an unwarranted assumption) that her love is just like our love—or at least close enough. But when Vidal goes on to say “You are beautiful to me, lovely lady … for I am in your lordship [&lt;/span&gt;&lt;em data-dcnode-id=&quot;2846&quot;&gt;&lt;span data-dcnode-id=&quot;2847&quot; instrument_node=&quot;&quot;&gt;senhoriu&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2845&quot; instrument_node=&quot;&quot;&gt;],” we know for sure that his “love” is not our “love.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2841&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2844&quot; id=&quot;jumplink-fn19&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2842&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn19&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn19&quot;&gt;&lt;span data-dcnode-id=&quot;2843&quot; instrument_node=&quot;&quot;&gt;19&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2838&quot;&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt;To the first point: Although we think we know when we are expressing our emotions “sincerely” and “spontaneously”—and when we are not—we largely fool ourselves. That's because even our most “sincere” and “unpremeditated” expressions are willy-nilly constrained by our emotional vocabulary and gestures. They are shaped as well by our conventions, values, and even implicit “theories” of emotion. “I am in love” is a convention, more or less a modern topos. We may try to say something new and different, but it is likely to be just as banal, though just as meaningful and charged with feeling. I don't mean to denigrate our emotional expressions. But I do mean to question how utterly “ours” they are. And they are not ours alone for good reason. Emotions are largely communicative tools, and if we are to understand one another, we are wise to express ourselves through well-worn paths that all of us are familiar with. So the fact that Peire Vidal wrote within a genre that had rules and commonplaces does not obviate our recognizing that he was also expressing emotion.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2826&quot;&gt;&lt;span data-dcnode-id=&quot;2837&quot; instrument_node=&quot;&quot;&gt;But what of the non-verbal cues that we can see, that help us affirm (or deny) the truth of someone's emotion? Certainly this is the premise of psychologist Paul Ekman's training of airport workers for the Transportation Safety Administration: they can look at a face and see the micro-movements that betray emotions otherwise not evident.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2833&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2836&quot; id=&quot;jumplink-fn20&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2834&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn20&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn20&quot;&gt;&lt;span data-dcnode-id=&quot;2835&quot; instrument_node=&quot;&quot;&gt;20&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2832&quot; instrument_node=&quot;&quot;&gt; They know if a person is lying. Well, perhaps. But usually our emotions are not “true” or “false.” They are somewhere in the middle. At a conference in Berlin in 2009, neuropsychologist Robert Turner suggested that the “default condition of [the] human brain is [a] role-play state.”&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2828&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2831&quot; id=&quot;jumplink-fn21&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2829&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn21&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn21&quot;&gt;&lt;span data-dcnode-id=&quot;2830&quot; instrument_node=&quot;&quot;&gt;21&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2827&quot; instrument_node=&quot;&quot;&gt; This does not mean that we are always insincere. But it does suggest that sincerity is adaptable. Indeed, sincerity itself is a value that rises and falls in different periods. We happen to be in a period that values it highly.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2824&quot;&gt;&lt;span data-dcnode-id=&quot;2825&quot; instrument_node=&quot;&quot;&gt;Still, the TSA can probe, ask questions, get at emotional truths in ways that I as a medieval historian, certainly, can never do. This is indeed an issue. On the other hand, with a poet like Peire Vidal, I have many poems to study. And if I look at the people he associated with—his emotional community, I would say—I have even more materials. I cannot know if Vidal himself was “really” in love with a “real” lady who was “really” his lord. But I can know that he was expressing himself in a way that was highly appreciated; that being in love with a lord was an emotional expectation within his community; and that Vidal certainly knew what “being in love” meant (at least on his own terms), whether or not he was “in love” at the moment. I'm not so sure that we can know much more than this about our lady on the other side of the microphone.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2822&quot;&gt;&lt;span data-dcnode-id=&quot;2823&quot; instrument_node=&quot;&quot;&gt;However, we think we know what she is feeling better than we know how Vidal felt because we assume that when she says “I'm in love,” she implies all the baggage that we bring when we say the same words: for example, that she cares deeply about someone; that she is sexually involved with this person at some level; that the feeling has longevity, even permanence. A good historian, however, knows that it is best not to make such assumptions. That is what makes our discipline so very different from the discipline of psychology, which tends to postulate that our emotions are universal and were the same in the past as they are in the present—only differently expressed. The ways in which emotions are expressed are, in fact, our only pathway to them.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2820&quot;&gt;&lt;span data-dcnode-id=&quot;2821&quot; instrument_node=&quot;&quot;&gt;I think I know what Jan Plamper meant when he said that he was unhappy “with the overwhelming emphasis on language in poststructuralist history-writing.” But I would pin my own dissatisfaction not so much on “language” as on the nature of much history-writing today. I'm not sure what to do about it. I am certainly not advocating that we start writing anecdotally or sentimentally. But we do need to be less afraid of what the past is telling us about its own sentiments.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2815&quot;&gt;&lt;strong data-dcnode-id=&quot;2817&quot;&gt;&lt;em data-dcnode-id=&quot;2818&quot;&gt;&lt;span data-dcnode-id=&quot;2819&quot; instrument_node=&quot;&quot;&gt;William M. Reddy:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2816&quot; instrument_node=&quot;&quot;&gt; I very much agree with Barbara's approach to this question. When I first began to read ethnographic research on emotions, I found that anthropologists always reported the existence of emotional norms and of practices aimed at inculcating such norms and sustaining conformity with them. I also found that anthropologists did not appear to have noticed the seeming universality of this pattern. Emotional vocabularies were found to be extremely diverse; emotional norms as well. But the existence of norms is ubiquitous, as are practices that aim at the constant performance and enforcement of such norms. That is, emotional norms are not seen as easy to obey; and those who conform best to them are admired, whereas those who fail most obviously to conform are penalized or excluded from communities. Peter Stearns and associates' early work on what they called “emotionology,” that is, on manuals and how-to books aimed at disseminating emotional codes, was actually focused on the tip of a very large iceberg.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2810&quot;&gt;&lt;span data-dcnode-id=&quot;2814&quot; instrument_node=&quot;&quot;&gt;Attempting to theorize about this pattern, I have argued that emotions constitute a domain of effort for the individual. When a flight attendant says “Welcome aboard,” she is expressing a feeling that she constantly practices. If she is not able to carry off this performance with sufficient consistency—if she is subject to spells of irritability or temper, for example—she will soon be discharged. The same pressure to conform was felt by ladies-in-waiting in the Heian imperial court. Sei Shonagon's &lt;/span&gt;&lt;em data-dcnode-id=&quot;2812&quot;&gt;&lt;span data-dcnode-id=&quot;2813&quot; instrument_node=&quot;&quot;&gt;Pillow Book&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2811&quot; instrument_node=&quot;&quot;&gt;, for example, is full of narratives of remarkable emotional performances. When one received a note with a little love poem on it, one was expected to reply in kind, and quickly. The brilliance—and speed—of one's reply were measures of the depth of one's feeling (not of “literary” skill). The first-century Roman senator Seneca warned of the terrible dangers one ran if one gave in, even the slightest bit, to anger. Members of Parliament in the UK today, in contrast, blast each other every session with noisy reproofs expertly delivered, yet always carefully addressing the speaker and avoiding explicit insults.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2808&quot;&gt;&lt;span data-dcnode-id=&quot;2809&quot; instrument_node=&quot;&quot;&gt;Virtually all social roles are associated with emotional norms, and every human being constantly engages in a kind of emotional self-shaping. But this effortful self-shaping is subject to failure; it is, in other words, simultaneously self-exploration. If this approach has merit, then to ask what are the true or “gut” feelings of a person may be simply to pose the wrong question. Virtually all the feelings an adult “experiences” are the result of training. When love of one's spouse, for example, is gradually undermined by other feelings—of anger, resentment, distance, boredom—neither the love nor these contradictory emotions are what one “really” feels. Nonetheless, a time may come when the love performances required by the role of spouse no longer work. The effort becomes too great, and the results too pro forma. And then a new, seemingly more “real” emotion may be proclaimed, and its status enhanced by the mere act of articulating it.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2806&quot;&gt;&lt;span data-dcnode-id=&quot;2807&quot; instrument_node=&quot;&quot;&gt;With respect to emotional norms, the gaps in historical documents can be as revealing as their content. I have been working on collections of family papers from early-nineteenth-century France. In one case, a captain in the gendarmerie stationed in Paris in the 1820s sent frequent warm and chatty letters to his sister-in-law in the provinces, full of details about his life in the capital, his friendships, his visits to fashionable homes. But after he died suddenly in early 1830, the family learned that he had an illiterate mistress, with whom he had had several children. She asked a friend to write for her, begging for money. We cannot say exactly what this captain felt about his mistress and children, but we can be relatively sure that he saw such feelings as improper, or at least incompatible with the emotions of a well-bred brother-in-law and officer. What remains unsaid can be eloquent.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2793&quot;&gt;&lt;strong data-dcnode-id=&quot;2803&quot;&gt;&lt;em data-dcnode-id=&quot;2804&quot;&gt;&lt;span data-dcnode-id=&quot;2805&quot; instrument_node=&quot;&quot;&gt;Eugenia Lean:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2802&quot; instrument_node=&quot;&quot;&gt; I want to add to the wonderful discussion started by Barbara and Bill about the importance of norms and conventions in the shaping of emotions, and bring the issue of language back into the discussion in explicit terms. While I see why Jan might be frustrated with the overwhelming emphasis on language in poststructuralist history-writing, I want to question the idea that the history of emotions is indeed a way out of the “linguistic turn,” and caution that we not throw the baby out with the bathwater when we problematize the 1990s focus on language and culture. Part of this may be a matter of semantics, and a problem with the implications of the language of “turn,” which has been nicely problematized in a recent &lt;/span&gt;&lt;em data-dcnode-id=&quot;2800&quot;&gt;&lt;span data-dcnode-id=&quot;2801&quot; instrument_node=&quot;&quot;&gt;AHR&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2799&quot; instrument_node=&quot;&quot;&gt; forum.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2795&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2798&quot; id=&quot;jumplink-fn22&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2796&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn22&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn22&quot;&gt;&lt;span data-dcnode-id=&quot;2797&quot; instrument_node=&quot;&quot;&gt;22&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2794&quot; instrument_node=&quot;&quot;&gt; But it is worthwhile nonetheless to reiterate how much of the philosophical inquiry behind the “linguistic turn” in history-writing (e.g., Foucault's work on discourse and knowledge/power) was actually inextricably related to interrogating the historicity of subjectivity, which in turn inspired the work of historians of gender, sexuality, the body, and by extension emotions. In this sense, I agree with Barbara's assertion that the interest in the history of emotions emerged from the “linguistic turn,” and suggest that language is still a starting point for us to historicize the seemingly elusive realm of sensation. Indeed, for historians, text, and thus language, is often our primary access to historical agents of the past, and we need to think critically about both how text mediates our access to affect in the past, and how language—along with bodily practice (which is also historically constructed, and in this way can be metaphorically read as a “text”)—mediated emotional experience for our historical subjects. In terms of accomplishing the latter, the key methodological challenge is not just to identify the words or expressions (textual or bodily) of affect, but to think about how a particular narrative or bodily expression moves from mere rhetoric or empty gesture to become viscerally felt, somatically embodied, or to gain the status of a social norm.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2786&quot;&gt;&lt;span data-dcnode-id=&quot;2792&quot; instrument_node=&quot;&quot;&gt;To this end, it is necessary to consider the material interests involved in rendering one narrative, or emotional gesture, compelling over another. Recent work done by scholars on the importance of “speaking bitterness” in highly emotive campaigns run by the Chinese Communist Party from the 1930s until the end of the Mao period might prove illuminating. In these campaigns, Communist cadres seeking to mobilize peasants, and other ordinary citizens, to turn against landlords and other “Enemies of the People” found the ritual of “speaking bitterness” to be highly effective in literally moving the masses to violence and reshaping social relationships in China's villages and cities in profoundly fundamental ways, a key goal of the Communists. Traditionally, scholars have simply explained these sessions as “mob violence” or argued that brute force and/or politicization and social pressure were the key factors in play. But more recently, historians and social scientists have been examining more carefully the logic behind these staged and powerful campaigns to try to understand how a participant could come to feel deeply the scripted-from-above sessions. How did participants come to sincerely hate and feel tremendous bitterness toward someone—a local landowner, a previous employer—who for years had been a patron, a neighbor, and in some cases a friend or even a family member? Scholars are showing that cadres crafted powerful narratives that were internalized by participants through the ritualistic sessions of these campaigns.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2788&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2791&quot; id=&quot;jumplink-fn23&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2789&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn23&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn23&quot;&gt;&lt;span data-dcnode-id=&quot;2790&quot; instrument_node=&quot;&quot;&gt;23&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2787&quot; instrument_node=&quot;&quot;&gt; What was stunning about these campaigns is that while many people were indeed forced to participate and only paid lip service to the cause, others came to feel this newfound bitterness and anger sincerely or believe it viscerally as they went through the ritual of “speaking” and violently acting out their bitterness. The narratives of bitterness no longer remained mere rhetoric but became fundamental truths that shaped affect, behavior, and outlook, and indeed, the subjectivity of individuals, and of groups. To understand that process, it seems, we need to pay attention to language (or narrative) but also consider how the emotional vocabulary became institutionalized through authoritative cadre policy and these public campaigns, and embodied by the people ritualistically participating in the collective action against the individual (often dramatically through humiliating the targeted person in public). Affective narrative moved from mere rhetoric to become powerful discourse (in the true sense that Foucault meant) that shaped subjects on a fundamental level, often with terrifyingly violent repercussions.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2767&quot;&gt;&lt;span data-dcnode-id=&quot;2785&quot; instrument_node=&quot;&quot;&gt;As for the importance of thinking about ritual in this context, I'd like to move quickly from twentieth-century Communist history back a couple of millennia to China's classical Confucian tradition. Xun Zi, a Confucian-school philosopher of the third century &lt;/span&gt;&lt;span class=&quot;small-caps&quot; data-dcnode-id=&quot;2783&quot;&gt;&lt;span data-dcnode-id=&quot;2784&quot; instrument_node=&quot;&quot;&gt;b.c&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2782&quot; instrument_node=&quot;&quot;&gt;., wrote that “sentiment” (&lt;/span&gt;&lt;em data-dcnode-id=&quot;2780&quot;&gt;&lt;span data-dcnode-id=&quot;2781&quot; instrument_node=&quot;&quot;&gt;qing&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2779&quot; instrument_node=&quot;&quot;&gt;) is fundamental to the organization of human relationships (i.e., society is made up of a web of relationships of sentiment), but that “sentiment” needs to be governed through ritual lest it devolve into illicit and destructive forms of sentiment, namely, desire (&lt;/span&gt;&lt;em data-dcnode-id=&quot;2777&quot;&gt;&lt;span data-dcnode-id=&quot;2778&quot; instrument_node=&quot;&quot;&gt;yu&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2776&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2772&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2775&quot; id=&quot;jumplink-fn24&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2773&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn24&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn24&quot;&gt;&lt;span data-dcnode-id=&quot;2774&quot; instrument_node=&quot;&quot;&gt;24&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2771&quot; instrument_node=&quot;&quot;&gt; Ritual for Xun Zi included music, prescribed rules of social behavior, and, importantly, the regular study of texts or the writing of calligraphy. In other words, ritualized engagement with music, social rules, language, and words (&lt;/span&gt;&lt;em data-dcnode-id=&quot;2769&quot;&gt;&lt;span data-dcnode-id=&quot;2770&quot; instrument_node=&quot;&quot;&gt;wen&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2768&quot; instrument_node=&quot;&quot;&gt; in Chinese) was seen as fundamental in the cultivation of a moral human being, and his or her ability to engage sincerely and authentically in virtuous relations of sentiment that constituted the moral fabric of a harmonious society. If these ideas informed Chinese literati and lettered culture and social practice for centuries to come, for our purposes, Xun Zi's focus on ritual allows us to start thinking methodologically about how emotional vocabulary might become truthful, embodied, institutionalized into norms and affective behavior. What “rituals” render certain emotions normative, meaningful, instinctive? It may be this process—perhaps what Bill refers to as “training” and even “self-shaping”—and the conditions that allow for such internalization that historians of emotion need to pay attention to.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2762&quot;&gt;&lt;strong data-dcnode-id=&quot;2764&quot;&gt;&lt;em data-dcnode-id=&quot;2765&quot;&gt;&lt;span data-dcnode-id=&quot;2766&quot; instrument_node=&quot;&quot;&gt;Julie Livingston:&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2763&quot; instrument_node=&quot;&quot;&gt; I have been slow to weigh in on this question because, as Bill said, it is a tough one. I am very much in agreement with what has already been said, and I think we all have a healthy respect for how difficult it is to enter the somatic space historically, through the remnants of lives long past. And as I think has already been suggested, the distinction between “experience” and “expression” (to use the Editor's provocative phrasing) is perhaps a misleading way to conceptualize affect. It assumes a nature-versus-nurture binary that is too stark, too static, to capture the complexities of personhood as process. Bill has described what I might call the habitus of emotions, and Barbara emotional communities, and Eugenia has pointed to the material interests, the questions of power and morality, that animate these histories, as well as to rituals as dense sites/events through which these dynamics of collective and individual sentiment are cultivated, ingrained, and furthered. Each of you has put it far better than I could.&lt;/span&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2756&quot;&gt;&lt;span data-dcnode-id=&quot;2761&quot; instrument_node=&quot;&quot;&gt;I guess I have two points to add to the discussion. First, I think it helps to be a bit more open in the ambitions and goals we have for our histories than was suggested in the Editor's question. I don't see the history of emotions as only about getting inside the hearts (or spleens or livers or what have you) of persons in the past. Surely that is a wonderful aim, and there are different types and registers of texts and other sources that offer pathways in. If we think about (at least some) text as process, we can perhaps get to some of the complex work of self-making amid purposefully cultivated emotional communities, while bearing in mind Eugenia's earlier comments and leaving the nature of that self open to historical specificity rather than assuming an individuated, interiorized self. I might point to the work of Jochen Hellbeck with Soviet diaries as exemplary for me of how one might trace that emotional habitus at work.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2757&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2760&quot; id=&quot;jumplink-fn25&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2758&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn25&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn25&quot;&gt;&lt;span data-dcnode-id=&quot;2759&quot; instrument_node=&quot;&quot;&gt;25&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p class=&quot;chapter-para&quot; data-dcnode-id=&quot;2746&quot;&gt;&lt;span data-dcnode-id=&quot;2755&quot; instrument_node=&quot;&quot;&gt;But it need not be the only way in which we think about emotions. Contrast Hellbeck's book with Dorothy Ko's &lt;/span&gt;&lt;em data-dcnode-id=&quot;2753&quot;&gt;&lt;span data-dcnode-id=&quot;2754&quot; instrument_node=&quot;&quot;&gt;Cinderella's Sisters&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2752&quot; instrument_node=&quot;&quot;&gt;, which uses material culture (shoes, binding cloths, etc.) together with texts, images, and diagrams to create a history of footbinding spanning a millennium.&lt;/span&gt;&lt;sup data-dcnode-id=&quot;2748&quot;&gt;&lt;span class=&quot;xrefLink&quot; data-dcnode-id=&quot;2751&quot; id=&quot;jumplink-fn26&quot;&gt;&lt;/span&gt;&lt;a class=&quot;link link-ref link-reveal xref-fn js-xref-fn&quot; data-dcnode-id=&quot;2749&quot; data-google-interstitial=&quot;false&quot; data-open=&quot;fn26&quot; href=&quot;javascript:;&quot; reveal-id=&quot;fn26&quot;&gt;&lt;span data-dcnode-id=&quot;2750&quot; instrument_node=&quot;&quot;&gt;26&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2747&quot; instrument_node=&quot;&quot;&gt; Ko writes in reverse, first clearing the ground for a deep history by tackling an emotional history of nineteenth- and early-twentieth-century reformers and missionaries through which the practice has become an orientalist trope. This enables her to glimpse the desires (for feet, for exquisite shoes), the pain, the erotics, and the material interests and gendered projects of the body. As she moves deeper into the past, the reader gains insights, sometimes hazy but nonetheless revealing and evocative, into the feelings that animated this history. But there is no way to get even these wonderful glimpses, or to get the major intellectual rewards she offers to a narrative about gender, class, medicine, etc., in China, without her first addressing the fetish of contemporary academic readers (us!) who are trained to feel revulsion in moral and aesthetic terms, rather than erotic desire (or indifference or whatever other emotions), at the image of bound feet. So Ko helps her readers understand their own emotions as historical products, and how those emotions have become naturalized as a moral position. This enables her to braid together texts, images, and objects (the latter tw
