&lt;/span&gt;&lt;b data-dcnode-id=&quot;248&quot;&gt;&lt;span data-dcnode-id=&quot;249&quot; instrument_node=&quot;&quot;&gt;Historical Background&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;247&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;244&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p align=&quot;left&quot; data-dcnode-id=&quot;237&quot;&gt;&lt;font data-dcnode-id=&quot;238&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;243&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;i data-dcnode-id=&quot;239&quot;&gt;&lt;span data-dcnode-id=&quot;242&quot; instrument_node=&quot;&quot;&gt;
        To appreciate the diversity of ideas and experiences that have shaped our history, we need to be sensitive to the complexities and varieties of cultural documentation, to the enormous possibilities these documents afford us to get at the interior of American lives, to get at peoples long excluded from the American experience, many of them losers in their own time, outlaws, rebels who - individually or collectively - tried to flesh out and give meaning to abstract notions of liberty, equality and freedom.
        &lt;/span&gt;&lt;br data-dcnode-id=&quot;241&quot;&gt;&lt;span data-dcnode-id=&quot;240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/i&gt;&lt;/font&gt;&lt;/p&gt;&lt;div align=&quot;right&quot; data-dcnode-id=&quot;229&quot;&gt;&lt;font data-dcnode-id=&quot;230&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;i data-dcnode-id=&quot;231&quot;&gt;&lt;span data-dcnode-id=&quot;236&quot; instrument_node=&quot;&quot;&gt;
        -Leon Litwack, Ph.D.
        &lt;/span&gt;&lt;br data-dcnode-id=&quot;235&quot;&gt;&lt;span data-dcnode-id=&quot;234&quot; instrument_node=&quot;&quot;&gt;
        Pulitzer Prize Winning Historian,
        &lt;/span&gt;&lt;br data-dcnode-id=&quot;233&quot;&gt;&lt;span data-dcnode-id=&quot;232&quot; instrument_node=&quot;&quot;&gt;
        American Roots Music Adviser
        &lt;/span&gt;&lt;/i&gt;&lt;/font&gt;&lt;/div&gt;&lt;font data-dcnode-id=&quot;225&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;i data-dcnode-id=&quot;227&quot;&gt;&lt;span data-dcnode-id=&quot;228&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;226&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/font&gt;&lt;p data-dcnode-id=&quot;224&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;223&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;213&quot;&gt;&lt;font data-dcnode-id=&quot;214&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;222&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;221&quot; name=&quot;1&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;220&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;218&quot;&gt;&lt;span data-dcnode-id=&quot;219&quot; instrument_node=&quot;&quot;&gt;What is American roots music?&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;216&quot;&gt;&lt;span data-dcnode-id=&quot;215&quot; instrument_node=&quot;&quot;&gt;
        The term &quot;American roots music&quot; may not be a familiar one, and requires some explanation. At the beginning of the 20th Century, the term &quot;folk music&quot; was used by scholars to describe music made by whites of European ancestry, often in the relatively isolated rural South. As the century progressed, the definition of folk music expanded to include the song styles - particularly the blues - of Southern blacks as well. In general, folk music was viewed as a window into the cultural life of these groups. Folk songs communicated the hopes, sorrows and convictions of ordinary people's everyday lives. Increasingly, music made by other groups of Americans such as Native Americans, Mexican-Americans, and Cajuns came under the umbrella of &quot;folk music.&quot; It was sung in churches, on front porches, in the fields and other workplaces, while rocking children to sleep, and at parties. The melodies and words were passed down from parent to child, though songs - and their meanings - often changed to reflect changing times.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;212&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;209&quot;&gt;&lt;font data-dcnode-id=&quot;210&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;211&quot; instrument_node=&quot;&quot;&gt;
        In the 1960s, awareness of folk songs and musicians grew, and popular musicians began to draw on folk music as an artistic source as never before. &quot;Folk music&quot; then became a form of popular music itself, popularized by singer/songwriters such as Bob Dylan, who helped pioneer the intimate, often acoustic performing style that echoed that of community-based folk musicians. Music writers, scholars and fans began to look for new ways to describe the diverse array of musical styles still being sung and played in communities across America, though most often not heard on radios. The term &quot;roots music&quot; is now used to refer to this broad range of musical genres, which include blues, gospel, traditional country, zydeco, tejano, and native American pow-wow.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;208&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;192&quot;&gt;&lt;font data-dcnode-id=&quot;193&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;207&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;206&quot; name=&quot;2&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;205&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;203&quot;&gt;&lt;span data-dcnode-id=&quot;204&quot; instrument_node=&quot;&quot;&gt;What can roots music teach us about cultural identity in the U.S.?&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;202&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;201&quot;&gt;&lt;span data-dcnode-id=&quot;200&quot; instrument_node=&quot;&quot;&gt;
        Songs are an important cultural form through which people assert and preserve their own histories in the face of changing social conditions. Spirituals sung by African-American slaves; protest songs sung by 1960s youth; Texas-Mexicans singing the &lt;/span&gt;&lt;i data-dcnode-id=&quot;198&quot;&gt;&lt;span data-dcnode-id=&quot;199&quot; instrument_node=&quot;&quot;&gt;corrido&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;197&quot; instrument_node=&quot;&quot;&gt;;  and &quot;union songs&quot; sung by labor organizers all suggest how music has been both an intrinsic response to historical and cultural conflict and an expressive vehicle that encouraged collective action. As ethnomusicologist Manuel Pena notes, &quot;the &lt;/span&gt;&lt;i data-dcnode-id=&quot;195&quot;&gt;&lt;span data-dcnode-id=&quot;196&quot; instrument_node=&quot;&quot;&gt;corrido&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;194&quot; instrument_node=&quot;&quot;&gt; functioned as a powerful symbolic response by the Texas-Mexicans to their oppression under the new system installed by the Anglos throughout the Southwest.&quot; Contemporary singer-songwriters from many different ethnic backgrounds continue to use music as a way to call attention to injustice. Roots music has long been a vehicle for offering the disenfranchised a voice. 
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;191&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;188&quot;&gt;&lt;font data-dcnode-id=&quot;189&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;190&quot; instrument_node=&quot;&quot;&gt;
        American roots music draws on the lived experience of ordinary men and women, who were and often still are defined and limited by cultural constructions of race, class and gender. Just as music reflects how Americans have struggled against oppressive social and economic conditions, music is also a means of celebrating and giving dignity to identity.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;187&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;184&quot;&gt;&lt;font data-dcnode-id=&quot;185&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;186&quot; instrument_node=&quot;&quot;&gt;
        Music performance was often a place whites and blacks could come together and transcend the social limits imposed by segregation. Historian Pete Daniel of the Smithsonian Institution points out that travelling black and white musicians often came into contact and influenced each others' musical repertoires and playing styles. However, particularly in the South, racial segregation continued to keep musicians and audiences apart according to an entrenched racial logic. With the advent of radio, a broad range of Americans were exposed to a diversity of musical styles, as there was no way to &quot;segregate&quot; the airwaves. Responses to racism and racial segregation were reflected in American roots music.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;183&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;180&quot;&gt;&lt;font data-dcnode-id=&quot;181&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;182&quot; instrument_node=&quot;&quot;&gt;
        Among all of America's diverse peoples, there has long been reciprocal connections between religion, song, and the reproduction of &quot;community.&quot; In the South, religious music of the 18th and 19th centuries influenced the separate but related development of African American and Anglo sacred music. All night &quot;sings&quot; were events that drew members of a community together to hear Spiritual music in the South; black male members of Gospel quartets formed bonds of reciprocity that continued throughout their life cycles. As Bernice Johnson Reagon notes, &quot;the quartet provided one more community-based structure where people could gather and create out of their own experience.&quot; Within black and white traditions, religious music often was a source for the shaping and performance of secular songs. As historian Bill Malone has pointed out, &quot;Country music has been subject to no greater influence than Southern religious life, evolving in a society where religion was pervasive.&quot; Both black and white Southerners generally received their musical education in a milieu that stressed religious music. Songs such as &quot;Amazing Grace&quot; and &quot;Farther Along&quot; were common to both groups.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;179&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;176&quot;&gt;&lt;font data-dcnode-id=&quot;177&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;178&quot; instrument_node=&quot;&quot;&gt;
        Particularly in the first half of the 20th century, poor rural whites were &quot;objectified&quot; by scholars and collectors as embodying a pure, authentic American culture linked to &quot;Anglo,&quot; northern European sources. While African American folk song collections had been published as early as 1867, the notion of African Americans as authors of part of America's folk heritage did not gain widespread acceptance until later. Due, in part, to the efforts of John Lomax, blacks - particularly rural Bluesmen - came to be viewed as folk &quot;heroes&quot; and white folk scholars began in earnest to collect songs from African American communities as well as Anglo. For example, John Lomax was interested in the hypothetical conjunction between African American music and the origins of our national folk tradition, which he imagined was preserved among black convicts who had been isolated for many years from mainstream culture inside Southern prisons.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;175&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;172&quot;&gt;&lt;font data-dcnode-id=&quot;173&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;174&quot; instrument_node=&quot;&quot;&gt;
        Unequal power relationships, shaped by differences in race and class and often gender, have characterized the development of &quot;folk&quot; music from its roots in local communities to its spread to wide and diverse audiences. Middle-class and elite, most often white, urban musicians, scholars and fans have been drawn to music made by relatively disenfranchised African Americans, whites and Latinos. This relationship has brought rural and &quot;ethnic&quot; music and the musicians themselves to the city, where they reached wide audiences, but were not always fairly compensated or credited by the promoters who helped popularize their music.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;171&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;161&quot;&gt;&lt;font data-dcnode-id=&quot;162&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;170&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;169&quot; name=&quot;3&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;168&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;166&quot;&gt;&lt;span data-dcnode-id=&quot;167&quot; instrument_node=&quot;&quot;&gt;How is roots music related to historical events?&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;165&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;164&quot;&gt;&lt;span data-dcnode-id=&quot;163&quot; instrument_node=&quot;&quot;&gt;
        During the 20th century, the United States experienced monumental changes wrought by developments such as Industrialization, integration and globalization. As the American Roots Music series illustrates, roots music was linked to and reflected many dynamic movements for change, including the war on poverty, the New Deal, the labor movement, the Civil Rights movement and the peace, environmental, Native American, Chicano and women's movements.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;160&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;157&quot;&gt;&lt;font data-dcnode-id=&quot;158&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;159&quot; instrument_node=&quot;&quot;&gt;
        Major historical events had significant impact on both the nature and the popularity of roots music in America. For example, the social and economic changes brought about by WWII had an enormous effect on Blues and white Country music. Before the war, both had been largely regional, developing different styles in different areas, and reaching mainly local audiences. Huge shifts of population combined with economic changes driven by technology and mass media made this music popular with broader audiences. The move from a rural to an urban environment exposed music to new and diverse influences.  Musical styles, instrumentation and lyrics were modified accordingly. Similar dynamics followed historical transformations such as the Great Depression, the Dustbowl, westward expansion, the student movements of the 1960s and the globalization of America at the end of the century.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;156&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;153&quot;&gt;&lt;font data-dcnode-id=&quot;154&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;155&quot; instrument_node=&quot;&quot;&gt;
        The 20th century witnessed an unparalleled development of technology that would have profound implications for every American. As people began to travel by railroads and automobiles and the economy became increasingly industrialized, regional boundaries were crossed and cultural interplay among America's diverse people enriched the nation's musical traditions.  Musical cross-fertilization was also hastened by the development of communication technology such as the wax cylinder recorder, the phonograph, juke boxes, the motion picture camera and the radio, which spread regionally based music to broad audiences across the country.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;149&quot;&gt;&lt;font data-dcnode-id=&quot;150&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;151&quot; instrument_node=&quot;&quot;&gt;
        Freedom has been a key theme in American roots music, both in terms of the ideas expressed by the music and the uses to which music is often put within social change movements. The history of American roots music is intricately woven with individual and collective struggles for social change and freedom from oppression, a dynamic powerfully illustrated by the history of the song &quot;We Shall Overcome,&quot; which became an anthem in the Civil Rights movement. The theme of freedom is also embodied by many of America's musical heroes. One such romantic character is Woody Guthrie, celebrated as a wandering hero who eschewed the constraints of an increasingly industrializing society. Bluesmen and women, such as Muddy Waters and Bessie Smith, who transformed their harsh experiences into powerful musical expression, also embody the spirit of freedom and the refusal of constraint.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;148&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;145&quot;&gt;&lt;font data-dcnode-id=&quot;146&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;147&quot; instrument_node=&quot;&quot;&gt;
        The continuing popularity of roots music throughout the course of the 20th and into the 21st centuries is testimony to its appeal and vitality as a set of musical genres that speak to - and of - the human condition, through very different historical periods. In this current era of globalization, roots music evolves by synthesizing elements from disparate sources. While the &quot;roots&quot; have been lifted from their geographic and cultural bases, roots music continues to give voice to an ever-increasing spectrum of Americans, who use music as a means of reflecting on and, in many cases still, promoting social change.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;144&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;134&quot;&gt;&lt;font data-dcnode-id=&quot;135&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;143&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;142&quot; name=&quot;4&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;141&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;b data-dcnode-id=&quot;139&quot;&gt;&lt;span data-dcnode-id=&quot;140&quot; instrument_node=&quot;&quot;&gt;How is American roots music similar to American literature?&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;138&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;137&quot;&gt;&lt;span data-dcnode-id=&quot;136&quot; instrument_node=&quot;&quot;&gt;
        American vernacular music and literature have always drawn on each other as sources and reflect common historical and humanistic themes. Roots music echoes the concerns found in American literature 
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;133&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;132&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;117&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;table border=&quot;0&quot; cellpadding=&quot;10&quot; cellspacing=&quot;0&quot; data-dcnode-id=&quot;115&quot; width=&quot;100%&quot;&gt;&lt;tbody data-dcnode-id=&quot;116&quot;&gt;&lt;tr data-dcnode-id=&quot;118&quot;&gt;&lt;td align=&quot;left&quot; data-dcnode-id=&quot;119&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;131&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;121&quot;&gt;&lt;font data-dcnode-id=&quot;122&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;130&quot; instrument_node=&quot;&quot;&gt;
          &amp;nbsp;&amp;nbsp;&amp;nbsp;Historian Charles Wolfe writes,
          &lt;/span&gt;&lt;br data-dcnode-id=&quot;129&quot;&gt;&lt;br data-dcnode-id=&quot;128&quot;&gt;&lt;span data-dcnode-id=&quot;127&quot; instrument_node=&quot;&quot;&gt;
          &amp;nbsp;&amp;nbsp;&amp;nbsp;One of the key narrative lines running through all four programs of &lt;/span&gt;&lt;b data-dcnode-id=&quot;124&quot;&gt;&lt;i data-dcnode-id=&quot;125&quot;&gt;&lt;span data-dcnode-id=&quot;126&quot; instrument_node=&quot;&quot;&gt;American Roots Music&lt;/span&gt;&lt;/i&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;123&quot; instrument_node=&quot;&quot;&gt; is the perception of roots music as a powerful and unacknowledged folk literature. It is, in fact, a body of expressive culture that reflects and dramatizes the same kind of themes found in formal American literature: empowerment, freedom in a social structure, preserving traditions in a protean world, maintaining values, and finding strategies for seeking justice. We assume that roots music constitutes an important and neglected chapter in American culture, and that its themes and concerns often overlap with those of more formal culture. Instead of writing books and plays, the artists of roots music craft songs and ballads…hymns and protest songs. Their art has generally been oral, passed on by word of mouth, or by custom and imitation. 
          &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;120&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;114&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;111&quot;&gt;&lt;font data-dcnode-id=&quot;112&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;113&quot; instrument_node=&quot;&quot;&gt;
        Developments in literature also shaped the way roots music was mediated and understood by a broad American audience. &quot;Regionalism&quot; and &quot;naturalism,&quot; two literary movements of the late 19th century, aroused a popular interest in what could be called the &quot;national picturesque&quot;: the Plantation South, the Wild West, and the Appalachian Frontier. These movements helped create an interest in rural America and the musical forms associated with it. &quot;Muckraking&quot; writers such as Upton Sinclair were influenced by the politics surrounding the labor movement and helped raise the level of social consciousness about the problems inherent in industrial society at a time when folk songs were depicting the lives of working-class Americans.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;110&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;98&quot;&gt;&lt;font data-dcnode-id=&quot;99&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;109&quot; instrument_node=&quot;&quot;&gt;
        There are numerous points of thematic contact between American literature and vernacular music. For years, many of our most important writers have recognized links to our folk culture and have celebrated them. Charles Wolfe points out that Mark Twain described a &quot;juba&quot; dance in &lt;/span&gt;&lt;i data-dcnode-id=&quot;107&quot;&gt;&lt;span data-dcnode-id=&quot;108&quot; instrument_node=&quot;&quot;&gt;Huckleberry Finn&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;106&quot; instrument_node=&quot;&quot;&gt;; the poet Carl Sandburg was creating some of his greatest poems as he was compiling his 1925 American Songbag; Ralph Ellison used the Blues as a major element in his novels and stories; Woody Guthrie set out to write a song cycle that would be a people's version of Steinbeck's &lt;/span&gt;&lt;i data-dcnode-id=&quot;104&quot;&gt;&lt;span data-dcnode-id=&quot;105&quot; instrument_node=&quot;&quot;&gt;The Grapes of Wrath&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;103&quot; instrument_node=&quot;&quot;&gt;. Bruce Springsteen invokes John Steinbeck and Woody Guthrie in his record &lt;/span&gt;&lt;i data-dcnode-id=&quot;101&quot;&gt;&lt;span data-dcnode-id=&quot;102&quot; instrument_node=&quot;&quot;&gt;The Ghost of Tom Joad&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;100&quot; instrument_node=&quot;&quot;&gt;, which offers snapshots of contemporary disenfranchised Americans.
        &lt;/span&gt;&lt;/font&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;97&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;96&quot;&gt;&lt;span data-dcnode-id=&quot;95&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;93&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr align=&quot;center&quot; data-dcnode-id=&quot;84&quot; valign=&quot;middle&quot;&gt;&lt;td data-dcnode-id=&quot;86&quot;&gt;&lt;span data-dcnode-id=&quot;87&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;80&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;73&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;72&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;71&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;17&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;15&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;table border=&quot;0&quot; cellpadding=&quot;10&quot; cellspacing=&quot;0&quot; data-dcnode-id=&quot;13&quot; width=&quot;100%&quot;&gt;&lt;tbody data-dcnode-id=&quot;14&quot;&gt;&lt;tr data-dcnode-id=&quot;16&quot;&gt;&lt;td align=&quot;center&quot; bgcolor=&quot;#DB8D29&quot; data-dcnode-id=&quot;18&quot; valign=&quot;top&quot;&gt;&lt;span data-dcnode-id=&quot;70&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;24&quot;&gt;&lt;font data-dcnode-id=&quot;31&quot; face=&quot;Arial, Helvetica, sans-serif&quot; size=&quot;-1&quot;&gt;&lt;span data-dcnode-id=&quot;69&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;67&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pbs.org/americanrootsmusic/index.html&quot;&gt;&lt;span data-dcnode-id=&quot;68&quot; instrument_node=&quot;&quot;&gt;Home&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;66&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;br data-dcnode-id=&quot;53&quot;&gt;&lt;span data-dcnode-id=&quot;52&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;50&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pbs.org/americanrootsmusic/pbs_arm_instruments_innovations.html&quot;&gt;&lt;span data-dcnode-id=&quot;51&quot; instrument_node=&quot;&quot;&gt;Instruments &amp;amp; Innovations&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;49&quot; instrument_node=&quot;&quot;&gt;
    &amp;nbsp; | &amp;nbsp;
    &lt;/span&gt;&lt;a data-dcnode-id=&quot;47&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pbs.org/americanrootsmusic/pbs_arm_behind_the_scenes.html&quot;&gt;&lt;span data-dcnode-id=&quot;48&quot; instrument_node=&quot;&quot;&gt;Behind the Scenes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;46&quot; instrument_node=&quot;&quot;&gt;
    &amp;nbsp; | &amp;nbsp;
    &lt;/span&gt;&lt;a data-dcnode-id=&quot;44&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pbs.org/americanrootsmusic/pbs_arm_links.html&quot;&gt;&lt;span data-dcnode-id=&quot;45&quot; instrument_node=&quot;&quot;&gt;Links&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;43&quot; instrument_node=&quot;&quot;&gt;
    &amp;nbsp; | &amp;nbsp;
    &lt;/span&gt;&lt;a data-dcnode-id=&quot;41&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pbs.org/americanrootsmusic/pbs_arm_into_the_classroom.html&quot;&gt;&lt;span data-dcnode-id=&quot;42&quot; instrument_node=&quot;&quot;&gt;Into the Classroom&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;40&quot; instrument_node=&quot;&quot;&gt;
    &amp;nbsp; | &amp;nbsp;
