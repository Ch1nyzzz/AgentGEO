/span&gt;&lt;span data-dcnode-id=&quot;4326&quot; instrument_node=&quot;&quot;&gt;11.63) and were all American citizens. Participants were paid $1.00 for participating in the survey, which was described as an assessment of people's personality and beliefs about society, and were debriefed about the hypotheses of the study upon completion. The survey took participants less than 10&lt;/span&gt;&lt;span data-dcnode-id=&quot;4325&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4324&quot; instrument_node=&quot;&quot;&gt;min to complete. All participants surveyed were included in analyses except in specific cases where they had missing data and in cases where participants had taken part in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4322&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;4323&quot; instrument_node=&quot;&quot;&gt;Study 1: mobility beliefs in an online sample of Americans&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4321&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4319&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4320&quot; instrument_node=&quot;&quot;&gt;Study 3: the self-relevance of class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4318&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;4271&quot; id=&quot;s0200&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;4314&quot; id=&quot;st0220&quot;&gt;&lt;span data-dcnode-id=&quot;4315&quot; instrument_node=&quot;&quot;&gt;Procedure&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;4306&quot; id=&quot;p0410&quot;&gt;&lt;span data-dcnode-id=&quot;4313&quot; instrument_node=&quot;&quot;&gt;Participants accessed the survey online and filled out demographic information about themselves, including measures of objective social class. Following these survey measures, participants' social class rank was manipulated in a procedure adapted from prior research (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4311&quot; href=&quot;#bb0185&quot; name=&quot;bbb0185&quot;&gt;&lt;span data-dcnode-id=&quot;4312&quot; instrument_node=&quot;&quot;&gt;Kraus, Côté, &amp;amp; Keltner, 2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4310&quot; instrument_node=&quot;&quot;&gt;). In this manipulation, participants were presented with a ladder with 10 rungs and were instructed to “think of the ladder above as representing where people stand in the United States” (see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4308&quot; href=&quot;#bb0005&quot; name=&quot;bbb0005&quot;&gt;&lt;span data-dcnode-id=&quot;4309&quot; instrument_node=&quot;&quot;&gt;Adler et al., 2000&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4307&quot; instrument_node=&quot;&quot;&gt;). Participants were then assigned to either a low or high social class rank position, based on the following instructions: “Now, please compare yourself to the people at the very bottom (top) of the ladder. These are people who are the worst (best) off—those who have the least (most) money, least (most) education, and the least (most) respected jobs. In particular, we'd like you to think about how you are different from these people in terms of your own income, educational history, and job status. Where would you place yourself on this ladder relative to these people at the very bottom (top)?”&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4280&quot; id=&quot;p0415&quot;&gt;&lt;span data-dcnode-id=&quot;4305&quot; instrument_node=&quot;&quot;&gt;Participants were then instructed to place themselves on the ladder relative to the person at the very top or bottom (1&lt;/span&gt;&lt;span data-dcnode-id=&quot;4304&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4303&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4302&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;4300&quot;&gt;&lt;span data-dcnode-id=&quot;4301&quot; instrument_node=&quot;&quot;&gt;bottom rung&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4299&quot; instrument_node=&quot;&quot;&gt;, 10&lt;/span&gt;&lt;span data-dcnode-id=&quot;4298&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4297&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4296&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;4294&quot;&gt;&lt;span data-dcnode-id=&quot;4295&quot; instrument_node=&quot;&quot;&gt;top rung&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4293&quot; instrument_node=&quot;&quot;&gt;; &lt;/span&gt;&lt;em data-dcnode-id=&quot;4291&quot;&gt;&lt;span data-dcnode-id=&quot;4292&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4290&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4289&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4288&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4287&quot; instrument_node=&quot;&quot;&gt;5.00, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4285&quot;&gt;&lt;span data-dcnode-id=&quot;4286&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4284&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4283&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4282&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4281&quot; instrument_node=&quot;&quot;&gt;1.70). To heighten the salience of the manipulated social class rank of the imagined interaction partner, participants then imagined themselves “in a getting acquainted interaction with one of the people you just thought about from the ladder above.” In particular, participants were instructed to “think about how the differences between you might impact what you would talk about, how the interaction is likely to go, and what you and the other person might say to each other.”&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4272&quot; id=&quot;p0420&quot;&gt;&lt;span data-dcnode-id=&quot;4279&quot; instrument_node=&quot;&quot;&gt;Following this procedure, participants filled out the self-relevant class mobility estimates from &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4277&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4278&quot; instrument_node=&quot;&quot;&gt;Study 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4276&quot; instrument_node=&quot;&quot;&gt;. We chose to have participants fill out this self-relevant measure rather than the general mobility estimates because of the stronger observed correlation in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4274&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4275&quot; instrument_node=&quot;&quot;&gt;Study 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4273&quot; instrument_node=&quot;&quot;&gt; with measured subjective social class.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;4091&quot; id=&quot;s0055&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;4268&quot; id=&quot;st0070&quot;&gt;&lt;span data-dcnode-id=&quot;4269&quot; instrument_node=&quot;&quot;&gt;Results&lt;/span&gt;&lt;/h2&gt;&lt;section data-dcnode-id=&quot;4092&quot; id=&quot;s0205&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;4266&quot; id=&quot;st0225&quot;&gt;&lt;span data-dcnode-id=&quot;4267&quot; instrument_node=&quot;&quot;&gt;Social class rank and class mobility beliefs&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;4213&quot; id=&quot;p0430&quot;&gt;&lt;span data-dcnode-id=&quot;4265&quot; instrument_node=&quot;&quot;&gt;In support of our first hypothesis, participants once again made substantial overestimates of self-relevant class mobility (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4263&quot;&gt;&lt;span data-dcnode-id=&quot;4264&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4262&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4261&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4260&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4259&quot; instrument_node=&quot;&quot;&gt;29.38) when compared to a total accuracy score (i.e., “0”), &lt;/span&gt;&lt;em data-dcnode-id=&quot;4257&quot;&gt;&lt;span data-dcnode-id=&quot;4258&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4256&quot; instrument_node=&quot;&quot;&gt;(419)&lt;/span&gt;&lt;span data-dcnode-id=&quot;4255&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4254&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4253&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4252&quot; instrument_node=&quot;&quot;&gt;48.61, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4250&quot;&gt;&lt;span data-dcnode-id=&quot;4251&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4249&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4248&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4247&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4246&quot; instrument_node=&quot;&quot;&gt;.01, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4244&quot;&gt;&lt;span data-dcnode-id=&quot;4245&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4243&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4242&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4241&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4240&quot; instrument_node=&quot;&quot;&gt;4.75. In addition, participants overestimated class mobility even relative to the non-mobility estimates calculated from &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4238&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4239&quot; instrument_node=&quot;&quot;&gt;Study 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4237&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4235&quot;&gt;&lt;span data-dcnode-id=&quot;4236&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4234&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4233&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4232&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4231&quot; instrument_node=&quot;&quot;&gt;7.82), &lt;/span&gt;&lt;em data-dcnode-id=&quot;4229&quot;&gt;&lt;span data-dcnode-id=&quot;4230&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4228&quot; instrument_node=&quot;&quot;&gt;(419)&lt;/span&gt;&lt;span data-dcnode-id=&quot;4227&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4226&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4225&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4224&quot; instrument_node=&quot;&quot;&gt;35.67, p&lt;/span&gt;&lt;span data-dcnode-id=&quot;4223&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4222&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4221&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4220&quot; instrument_node=&quot;&quot;&gt;.01, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4218&quot;&gt;&lt;span data-dcnode-id=&quot;4219&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4217&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4216&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4215&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4214&quot; instrument_node=&quot;&quot;&gt;3.49.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4177&quot; id=&quot;p0435&quot;&gt;&lt;span data-dcnode-id=&quot;4212&quot; instrument_node=&quot;&quot;&gt;As in prior research (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4210&quot; href=&quot;#bb0185&quot; name=&quot;bbb0185&quot;&gt;&lt;span data-dcnode-id=&quot;4211&quot; instrument_node=&quot;&quot;&gt;Kraus et al., 2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4209&quot; instrument_node=&quot;&quot;&gt;), we sought to determine if our manipulation was successful in shifting participants' momentary perceptions of their social class rank. To that end, we examined participants' responses on the 10-rung ladder measure of social class rank in the low and high rank conditions. Results confirmed our expectations: low-rank participants, imagining an interaction with someone at the top of the social class hierarchy, reported being lower in social class rank (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4207&quot;&gt;&lt;span data-dcnode-id=&quot;4208&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4206&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4205&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4204&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4203&quot; instrument_node=&quot;&quot;&gt;4.58) than did high-rank participants who imagined an interaction with someone at the bottom of the hierarchy (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4201&quot;&gt;&lt;span data-dcnode-id=&quot;4202&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4200&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4199&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4198&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4197&quot; instrument_node=&quot;&quot;&gt;5.39), &lt;/span&gt;&lt;em data-dcnode-id=&quot;4195&quot;&gt;&lt;span data-dcnode-id=&quot;4196&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4194&quot; instrument_node=&quot;&quot;&gt;(418)&lt;/span&gt;&lt;span data-dcnode-id=&quot;4193&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4192&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4191&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4190&quot; instrument_node=&quot;&quot;&gt;5.00, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4188&quot;&gt;&lt;span data-dcnode-id=&quot;4189&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4187&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4186&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4185&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4184&quot; instrument_node=&quot;&quot;&gt;.01, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4182&quot;&gt;&lt;span data-dcnode-id=&quot;4183&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4181&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4180&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4179&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4178&quot; instrument_node=&quot;&quot;&gt;0.49.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4093&quot; id=&quot;p0440&quot;&gt;&lt;span data-dcnode-id=&quot;4176&quot; instrument_node=&quot;&quot;&gt;Analyses of class mobility estimates revealed a pattern aligning with the predicted positive relationship between perceived social class rank and mobility beliefs (see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4174&quot; href=&quot;#f0010&quot; name=&quot;bf0010&quot;&gt;&lt;span data-dcnode-id=&quot;4175&quot; instrument_node=&quot;&quot;&gt;Fig.&amp;nbsp;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4173&quot; instrument_node=&quot;&quot;&gt;, rightmost bars): although participants in both conditions overestimated class mobility, participants manipulated to experience elevated social class rank provided higher overestimates of social class mobility than their relatively lower class rank counterparts, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4171&quot;&gt;&lt;span data-dcnode-id=&quot;4172&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4170&quot; instrument_node=&quot;&quot;&gt;(418)&lt;/span&gt;&lt;span data-dcnode-id=&quot;4169&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4168&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4167&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4166&quot; instrument_node=&quot;&quot;&gt;2.38, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4164&quot;&gt;&lt;span data-dcnode-id=&quot;4165&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4163&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4162&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4161&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4160&quot; instrument_node=&quot;&quot;&gt;.02, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4158&quot;&gt;&lt;span data-dcnode-id=&quot;4159&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4157&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4156&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4155&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4154&quot; instrument_node=&quot;&quot;&gt;0.23. Moreover, in a linear regression predicting mobility overestimates with age and the manipulation of subjective social class, the influence of the manipulation &lt;/span&gt;&lt;em data-dcnode-id=&quot;4152&quot;&gt;&lt;span data-dcnode-id=&quot;4153&quot; instrument_node=&quot;&quot;&gt;β&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4151&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4150&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4149&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4148&quot; instrument_node=&quot;&quot;&gt;.10, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4146&quot;&gt;&lt;span data-dcnode-id=&quot;4147&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4145&quot; instrument_node=&quot;&quot;&gt;(417)&lt;/span&gt;&lt;span data-dcnode-id=&quot;4144&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4143&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4142&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4141&quot; instrument_node=&quot;&quot;&gt;2.04, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4139&quot;&gt;&lt;span data-dcnode-id=&quot;4140&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4138&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4137&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4136&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4135&quot; instrument_node=&quot;&quot;&gt;.05 on class mobility overestimates held independently of age. Consistent with the second hypothesis and prior studies, younger participants overestimated social class mobility more than their older counterparts &lt;/span&gt;&lt;em data-dcnode-id=&quot;4133&quot;&gt;&lt;span data-dcnode-id=&quot;4134&quot; instrument_node=&quot;&quot;&gt;β&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4132&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4131&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4130&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4129&quot; instrument_node=&quot;&quot;&gt;−&lt;/span&gt;&lt;span data-dcnode-id=&quot;4128&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4127&quot; instrument_node=&quot;&quot;&gt;.18, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4125&quot;&gt;&lt;span data-dcnode-id=&quot;4126&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4124&quot; instrument_node=&quot;&quot;&gt;(417)&lt;/span&gt;&lt;span data-dcnode-id=&quot;4123&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4122&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4121&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4120&quot; instrument_node=&quot;&quot;&gt;−&lt;/span&gt;&lt;span data-dcnode-id=&quot;4119&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4118&quot; instrument_node=&quot;&quot;&gt;3.83, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4116&quot;&gt;&lt;span data-dcnode-id=&quot;4117&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4115&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4114&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4113&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4112&quot; instrument_node=&quot;&quot;&gt;.01. As in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4110&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;4111&quot; instrument_node=&quot;&quot;&gt;Study 1: mobility beliefs in an online sample of Americans&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4109&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4107&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4108&quot; instrument_node=&quot;&quot;&gt;Study 3: the self-relevance of class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4106&quot; instrument_node=&quot;&quot;&gt;, measured subjective social class was significantly positively correlated with overestimates of class mobility (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4104&quot;&gt;&lt;span data-dcnode-id=&quot;4105&quot; instrument_node=&quot;&quot;&gt;r&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4103&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4102&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4101&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4100&quot; instrument_node=&quot;&quot;&gt;.15, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4098&quot;&gt;&lt;span data-dcnode-id=&quot;4099&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4097&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4096&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4095&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4094&quot; instrument_node=&quot;&quot;&gt;.05).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;3995&quot; id=&quot;s0060&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;4089&quot; id=&quot;st0075&quot;&gt;&lt;span data-dcnode-id=&quot;4090&quot; instrument_node=&quot;&quot;&gt;Discussion&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;4079&quot; id=&quot;p0445&quot;&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4087&quot; href=&quot;#s0190&quot; name=&quot;bs0190&quot;&gt;&lt;span data-dcnode-id=&quot;4088&quot; instrument_node=&quot;&quot;&gt;Study 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4086&quot; instrument_node=&quot;&quot;&gt; found a causal relationship between subjective perceptions of social class and overestimates of class mobility: specifically, manipulated upper-class participants tended to overestimate class mobility more than their relatively lower-class counterparts. This study aligns with the correlational findings of &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4084&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;4085&quot; instrument_node=&quot;&quot;&gt;Study 1: mobility beliefs in an online sample of Americans&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4083&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4081&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4082&quot; instrument_node=&quot;&quot;&gt;Study 3: the self-relevance of class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4080&quot; instrument_node=&quot;&quot;&gt; suggesting that perceptions of elevated social class position enhance beliefs that ascending the economic hierarchy is more likely than reality would suggest.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;3996&quot; id=&quot;s0210&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;4077&quot; id=&quot;st0230&quot;&gt;&lt;span data-dcnode-id=&quot;4078&quot; instrument_node=&quot;&quot;&gt;General discussion&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;4070&quot; id=&quot;p0500&quot;&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;4071&quot;&gt;&lt;p data-dcnode-id=&quot;4072&quot; id=&quot;sp0035&quot;&gt;&lt;span data-dcnode-id=&quot;4076&quot; instrument_node=&quot;&quot;&gt;“So we beat on, boats against the current, borne back ceaselessly into the past.”—F. Scott &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4074&quot; href=&quot;#bb0125&quot; name=&quot;bbb0125&quot;&gt;&lt;span data-dcnode-id=&quot;4075&quot; instrument_node=&quot;&quot;&gt;Fitzgerald (1925 p. 180)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4073&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4041&quot; id=&quot;p0460&quot;&gt;&lt;span data-dcnode-id=&quot;4069&quot; instrument_node=&quot;&quot;&gt;American culture is filled with anecdotes about the promise of equal opportunity and the pursuit of happiness. Beliefs in the American Dream permeate our parenting decisions, educational practices, and political agendas, and yet, according to data we present in this manuscript, Americans are largely inaccurate when asked to describe actual trends in social class mobility in society. Across four studies, samples of online survey participants and university students exhibited substantial and consistent overestimates of class mobility—overestimating the amount of income mobility and educational access in society by a wide margin. A meta-analytic summary of the findings reveals that participants overestimated class mobility by nearly 23 percentage points across the studies (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4067&quot;&gt;&lt;span data-dcnode-id=&quot;4068&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4066&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4065&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4064&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4063&quot; instrument_node=&quot;&quot;&gt;22.97, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4061&quot;&gt;&lt;span data-dcnode-id=&quot;4062&quot; instrument_node=&quot;&quot;&gt;CI&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4060&quot; instrument_node=&quot;&quot;&gt; 95% [22.48, 23.47]) and by 21 points if removing the self-relevant mobility estimates (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4058&quot;&gt;&lt;span data-dcnode-id=&quot;4059&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4057&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4056&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4055&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4054&quot; instrument_node=&quot;&quot;&gt;21.03, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4052&quot;&gt;&lt;span data-dcnode-id=&quot;4053&quot; instrument_node=&quot;&quot;&gt;CI&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4051&quot; instrument_node=&quot;&quot;&gt; 95% [20.43, 21.62]). These mobility estimates were substantially larger than general errors in statistical estimation collected in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4049&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4050&quot; instrument_node=&quot;&quot;&gt;Study 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4048&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4046&quot;&gt;&lt;span data-dcnode-id=&quot;4047&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4045&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4044&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4043&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4042&quot; instrument_node=&quot;&quot;&gt;7.82)—mobility overestimates appear to be larger in magnitude than general errors in statistical probability estimation, at least in relationship to astronauts and American soccer players.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4022&quot; id=&quot;p0465&quot;&gt;&lt;span data-dcnode-id=&quot;4040&quot; instrument_node=&quot;&quot;&gt;Some Americans were more likely to overestimate social class mobility than others, although these effects ranged from small to medium in magnitude. Young participants (r's ranged from&lt;/span&gt;&lt;span data-dcnode-id=&quot;4039&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4038&quot; instrument_node=&quot;&quot;&gt;−&lt;/span&gt;&lt;span data-dcnode-id=&quot;4037&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4036&quot; instrument_node=&quot;&quot;&gt;.09 to&lt;/span&gt;&lt;span data-dcnode-id=&quot;4035&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4034&quot; instrument_node=&quot;&quot;&gt;−&lt;/span&gt;&lt;span data-dcnode-id=&quot;4033&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4032&quot; instrument_node=&quot;&quot;&gt;.19) exhibited more exaggerated overestimates of social class mobility than their older counterparts. We reason that this pattern is influenced by a lack of exposure to class mobility information and by motivated reasoning. Specifically, younger participants have less experience with social class mobility and more motivation to believe that class mobility is possible in the future. We also found evidence suggesting that higher perceived social class (r's ranged from .04 to .27) is associated with greater overestimates of social class mobility—suggesting that people higher in perceived social class justify their elevated positions by suggesting that those positions are attainable by all Americans. Importantly, each experiment provided causal evidence for an informational (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4030&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;4031&quot; instrument_node=&quot;&quot;&gt;Study 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4029&quot; instrument_node=&quot;&quot;&gt;) or motivational (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4027&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4028&quot; instrument_node=&quot;&quot;&gt;Study 3: the self-relevance of class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4026&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4024&quot; href=&quot;#s0190&quot; name=&quot;bs0190&quot;&gt;&lt;span data-dcnode-id=&quot;4025&quot; instrument_node=&quot;&quot;&gt;Study 4: subjective social class rank and class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4023&quot; instrument_node=&quot;&quot;&gt;) account of class mobility beliefs—that people overestimate class mobility because they lack information about the causes of mobility, or because they seek to protect the self.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4014&quot; id=&quot;p0470&quot;&gt;&lt;span data-dcnode-id=&quot;4021&quot; instrument_node=&quot;&quot;&gt;Notwithstanding the promise of the findings from the present research, several limitations merit mention. Our six item mobility beliefs measure asked participants to make an abstract estimate of the extent that social class mobility exists in American society. Of note, removing any one of the specific items from the mobility beliefs measure actually reduces the overall reliability of the measure in each study. Additionally, though we took steps to make the calculations for social class mobility as simple as possible for participants—by for example, asking them to think about 100 people rather than percentages—part of the large overestimation of social class mobility effect might be due to simple arithmetic errors. While examining non-mobility beliefs in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4019&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4020&quot; instrument_node=&quot;&quot;&gt;Study 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4018&quot; instrument_node=&quot;&quot;&gt; was a way for us to account, in part, for these errors, we acknowledge that more research is necessary to determine the extent that general perceptual inaccuracy accounts for these effects (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4016&quot; href=&quot;#bb0300&quot; name=&quot;bbb0300&quot;&gt;&lt;span data-dcnode-id=&quot;4017&quot; instrument_node=&quot;&quot;&gt;Simons &amp;amp; Jensen, 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4015&quot; instrument_node=&quot;&quot;&gt;). Importantly, we did give all participants a chance to respond to our survey by answering the question “Were any of the questions strange, unusual, or particularly difficult?” Indeed, some participants mentioned difficulty in filling out mobility estimates but mentions of this difficulty represented less than 2% of the total sample and removing these participants did not change the results reported in the paper.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4009&quot; id=&quot;p0475&quot;&gt;&lt;span data-dcnode-id=&quot;4013&quot; instrument_node=&quot;&quot;&gt;Despite our efforts in the experiments to shift participant mobility beliefs, these efforts did not elicit complete accuracy in estimates of class mobility. It is interesting to speculate about what other psychological variables might account for the overestimates observed in the present studies. One candidate might be individual differences in legitimacy beliefs (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4011&quot; href=&quot;#bb0145&quot; name=&quot;bbb0145&quot;&gt;&lt;span data-dcnode-id=&quot;4012&quot; instrument_node=&quot;&quot;&gt;Jetten, Haslam, &amp;amp; Barlow, 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4010&quot; instrument_node=&quot;&quot;&gt;)—that is, individuals who are particularly likely to believe in the American Dream, or in a just and meritocratic world more broadly, might be particularly likely to overestimate class mobility. Future research is necessary to test this prediction.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4004&quot; id=&quot;p0480&quot;&gt;&lt;span data-dcnode-id=&quot;4008&quot; instrument_node=&quot;&quot;&gt;With respect to the informational route of mobility estimates, it is interesting to speculate about the sources of information that might reduce overestimates of class mobility (see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4006&quot; href=&quot;#bb0075&quot; name=&quot;bbb0075&quot;&gt;&lt;span data-dcnode-id=&quot;4007&quot; instrument_node=&quot;&quot;&gt;Cimpian &amp;amp; Salomon, 2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4005&quot; instrument_node=&quot;&quot;&gt;): for instance, would participants update their beliefs about class mobility when exposed to any relevant information about actual mobility or would individuals only use information consistent with their current mobility lay theories? How might motivational and informational routes to persuasion interact to influence changes in mobility beliefs? It is possible that based on the present research participants would be resistant to updating their beliefs about economic mobility if the information conflicts with their existing assumptions.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3999&quot; id=&quot;p0485&quot;&gt;&lt;span data-dcnode-id=&quot;4003&quot; instrument_node=&quot;&quot;&gt;Finally, that genetic explanations constrain beliefs in social class mobility suggests that how Americans understand success and failure in life and career are likely to be intimately linked to beliefs about the types of genes an individual possesses. Do Americans have stronger genetic explanations for social class than other countries or cultures? Do these beliefs in the power of genes to dramatically shape life outcomes hinder people from pursuing their career aspirations after encountering initial difficulty (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4001&quot; href=&quot;#bb0095&quot; name=&quot;bbb0095&quot;&gt;&lt;span data-dcnode-id=&quot;4002&quot; instrument_node=&quot;&quot;&gt;Dweck, 1990&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4000&quot; instrument_node=&quot;&quot;&gt;)? These questions and others like them are likely to provide several insights into how Americans think about the events of their lives along with the successes and failures they encounter across the life course.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3997&quot; id=&quot;p0490&quot;&gt;&lt;span data-dcnode-id=&quot;3998&quot; instrument_node=&quot;&quot;&gt;Errors in estimating the lack of social class mobility in American society appear, based on this research, to be substantial. While this inaccuracy in mobility estimates may enhance hard work and effort, it also downplays the inherent strain that economic inequality places on society, and specifically, on individuals at the bottom of the social class hierarchy. Understanding the causes of social class mobility beliefs along with ways to make these beliefs more accurate represents a promising area of future research—with implications for both economic policy change and the pursuit of happiness.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;related-content-links u-hide-from-md&quot; data-dcnode-id=&quot;3989&quot;&gt;&lt;button class=&quot;button button-anchor&quot; data-dcnode-id=&quot;3990&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-text&quot; data-dcnode-id=&quot;3991&quot;&gt;&lt;span data-dcnode-id=&quot;3992&quot; instrument_node=&quot;&quot;&gt;Recommended articles&lt;/span&gt;&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;Tail&quot; data-dcnode-id=&     }&quot;&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;/els-view-pdf-element&gt;&lt;/div&gt;&lt;a aria-describedby=&quot;ref-id-rf0305&quot; class=&quot;link&quot; data-dcnode-id=&quot;448&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scopus.com/inward/record.url%3Feid%3D2-s2.0-24944444417%26partnerID%3D10%26rel%3DR3.0.0&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;View Record in Scopus&lt;/span&gt;&lt;/a&gt;&lt;a aria-describedby=&quot;ref-id-rf0305&quot; class=&quot;link&quot; data-dcnode-id=&quot;446&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DAffective%2520forecasting%2520knowing%2520what%2520to%2520want%26publication_year%3D2005%26author%3DT.D.%2520Wilson%26author%3DD.T.%2520Gilbert&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;447&quot; instrument_node=&quot;&quot;&gt;Google Scholar&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;/section&gt;&lt;/section&gt;&lt;div data-dcnode-id=&quot;331&quot; id=&quot;section-cited-by&quot;&gt;&lt;section class=&quot;ListArticles preview&quot; data-dcnode-id=&quot;332&quot;&gt;&lt;div class=&quot;PageDivider&quot; data-dcnode-id=&quot;440&quot;&gt;&lt;/div&gt;&lt;header data-dcnode-id=&quot;437&quot; id=&quot;citing-articles-header&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-ver u-font-serif&quot; data-dcnode-id=&quot;438&quot;&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;Cited by (136)&lt;/span&gt;&lt;/h2&gt;&lt;/header&gt;&lt;div aria-describedby=&quot;citing-articles-header&quot; data-dcnode-id=&quot;333&quot;&gt;&lt;div class=&quot;citing-articles u-margin-l-bottom&quot; data-dcnode-id=&quot;334&quot;&gt;&lt;ul data-dcnode-id=&quot;340&quot;&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;416&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;431&quot;&gt;&lt;a data-dcnode-id=&quot;434&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022103122000208&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;435&quot; id=&quot;citing-articles-article0-title&quot;&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt;Class attitudes and the American work ethic: Praise for the hardworking poor and derogation of the lazy rich&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;432&quot;&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;2022, Journal of Experimental Social Psychology&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;425&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article0&quot; aria-describedby=&quot;citing-articles-article0-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;426&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;429&quot;&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;427&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;428&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;417&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;418&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;419&quot;&gt;&lt;p data-dcnode-id=&quot;420&quot; id=&quot;sp0065&quot;&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;Across four studies (&lt;/span&gt;&lt;em data-dcnode-id=&quot;422&quot;&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;=&amp;nbsp;1689), this research contributes to an empirical understanding of the relationship between class-related attitudes and perceived work ethic. We tested contexts in which counterstereotypical cues of low socioeconomic status (SES) and White targets lead to more positive evaluations. In study 1, participants judged a low-SES candidate in a job hiring scenario as warmer and more competent than a high-SES candidate. A follow-up study found that trait words related to work ethic were salient in the hiring context, and particularly associated with this low-SES candidate. Study 2 orthogonally manipulated both income and perceptions of work ethic, with the work ethic manipulation impacting participant evaluations of both low- and high-income targets. Study 3 investigated a scenario in which no information on work ethic was provided. In study 4, a counterstereotypical low-income target (described as goal-oriented and studious) was evaluated as more hardworking than the average low-income person, average person on welfare, and average homeless person. Together, these results demonstrate that it is possible for a subtype of the “hardworking poor” to override more general stereotypes of low-SES targets as lazy or incompetent. This research suggests that interpersonal judgments based on SES are highly sensitive to work ethic cues. Additionally, we highlight the need for future research to further investigate experimental manipulations of social class and constructs related to work ethic, including dispositional and situational attributions.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;392&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;410&quot;&gt;&lt;a data-dcnode-id=&quot;413&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022103121001530&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;414&quot; id=&quot;citing-articles-article1-title&quot;&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt;“We built it” in the past, but “let's build it together” in the future: The roles of temporal framing and social justice orientation in shaping attributions for personal success&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;411&quot;&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt;2022, Journal of Experimental Social Psychology&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;404&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article1&quot; aria-describedby=&quot;citing-articles-article1-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;405&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;408&quot;&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;406&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;407&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;393&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;394&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;395&quot;&gt;&lt;p data-dcnode-id=&quot;396&quot; id=&quot;sp0040&quot;&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;Political debates over how to address economic inequality are often rooted in rhetoric about whether or not success is self-made. Attributions for personal successes invoke self-relevant motivational processes and may pose barriers to ideological consensus on economic policy. This research examined the relationship between attributions for personal successes and social justice orientation (an ideological orientation toward providing for the economic welfare of others) as well as the impact of two contextual factors: past/future-framing and thinking about political discourse about inequality. Temporal framing was expected to shift the motivational incentives available for acknowledging the role of external factors; although it may feel good to take personal credit for &lt;/span&gt;&lt;em data-dcnode-id=&quot;401&quot;&gt;&lt;span data-dcnode-id=&quot;402&quot; instrument_node=&quot;&quot;&gt;past&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt; successes already achieved, there may be stronger incentives to acknowledge the situational factors that shape uncertain &lt;/span&gt;&lt;em data-dcnode-id=&quot;398&quot;&gt;&lt;span data-dcnode-id=&quot;399&quot; instrument_node=&quot;&quot;&gt;future&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;397&quot; instrument_node=&quot;&quot;&gt; successes. Studies 1–4 found that individuals low in social justice orientation were reluctant to make external attributions for their past achievements, but that thinking about poverty and successes they hoped to achieve in the future increased their external attributions to levels observed among people high in social justice orientation. The willingness to make greater external attributions for future successes appeared to be motivationally-driven: it yielded affective benefits (Study 5), was seen as desirable (Study 6), and emerged when personal financial vulnerability was primed (Study 7). Attributional shifts were in turn associated with greater support for social justice. These findings suggest that thinking about successes not yet attained may establish a sort of Rawlsian “veil of ignorance” that can encourage individuals to recognize the power of situations and the needs of others.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;374&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;386&quot;&gt;&lt;a data-dcnode-id=&quot;389&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0049089X21000569&quot; target=&quot;_self&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;390&quot; id=&quot;citing-articles-article2-title&quot;&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;Does perceived social mobility shape attitudes toward government and family educational investment?&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;387&quot;&gt;&lt;span data-dcnode-id=&quot;388&quot; instrument_node=&quot;&quot;&gt;2021, Social Science Research&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-dcnode-id=&quot;380&quot;&gt;&lt;button aria-controls=&quot;citing-articles-article2&quot; aria-describedby=&quot;citing-articles-article2-title&quot; aria-expanded=&quot;false&quot; class=&quot;button-link button-link-secondary list-item-details-toggle&quot; data-aa-button=&quot;sd:product:journal:article:location=citing-articles:type=view-details&quot; data-dcnode-id=&quot;381&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-link-text&quot; data-dcnode-id=&quot;384&quot;&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;Show abstract&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-down&quot; data-dcnode-id=&quot;382&quot; focusable=&quot;false&quot; height=&quot;24&quot; viewBox=&quot;0 0 92 128&quot; width=&quot;17.25&quot;&gt;&lt;path d=&quot;m1 51l7-7 38 38 38-38 7 7-45 45z&quot; data-dcnode-id=&quot;383&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/button&gt;&lt;/div&gt;&lt;div aria-hidden=&quot;true&quot; class=&quot;u-display-none&quot; data-dcnode-id=&quot;375&quot;&gt;&lt;div class=&quot;abstract u-margin-m-ver u-margin-xs-right u-font-serif branded&quot; data-dcnode-id=&quot;376&quot; id=&quot;reference-abstract&quot;&gt;&lt;div class=&quot;u-margin-ver-m abstract-font&quot; data-dcnode-id=&quot;377&quot;&gt;&lt;p data-dcnode-id=&quot;378&quot; id=&quot;abspara0010&quot;&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;Education is considered a key driver of intergenerational social mobility in the United States. However, the past several decades have witnessed a dramatic increase in the costs of college attendance, which puts political pressure on what the roles of government and families in education financing ought to be. In this study, we examine how individuals' perception of society's intergenerational mobility affects their willingness to financially support children in college, as well as their opinion on whether the government should take a smaller or bigger role. Perceptions of mobility matter because they reflect individuals' estimated opportunity structure and thereby an important component of returns to education. Using data from a nationally representative online survey and a novel design to measure perceived mobility, we show that (1) individuals who believe to live in a more mobile society exhibit more aversion toward government spending and a preference for students relying on family support; (2) these associations are stronger among higher-SES groups; and (3) information treatments randomly assigning objective social mobility facts make individuals who overestimate the level of social mobility even more eager to contribute to tuition costs. These findings suggest that learning about factual levels of mobility reinforces existing beliefs and possibly their consequences for educational investment.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/li&gt;&lt;li class=&quot;ListArticleItem&quot; data-dcnode-id=&quot;363&quot;&gt;&lt;div class=&quot;sub-heading&quot; data-dcnode-id=&quot;368&quot;&gt;&lt;a data-dcnode-id=&quot;371&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.scopus.com/scopus/inward/record.url%3FpartnerID%3D10%26rel%3D3.0.0%26view%3Dbasic%26eid%3D2-s2.0-85127379441%26md5%3D972ccc132e9781fea1579c8a3e9d56&quot; target=&quot;_blank&quot;&gt;&lt;h3 class=&quot;article-title ellipsis text-s&quot; data-dcnode-id=&quot;372&quot; id=&quot;citing-articles-article3-title&quot;&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt;The Inequality Trap: How High Stakes Fuel Overestimation and Equality Aversion&lt;/span&gt;&lt;/h3&gt;&lt;/a&gt;&lt;div class=&quot;article-source ellipsis&quot; data-dcnode-id=&quot;369&quot;&gt;&lt;span data-dcnode-id=&quot;370&quot; instrument_node=&quot;&quot;&gt;2022, SSRN&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;buttons&quot; data-
