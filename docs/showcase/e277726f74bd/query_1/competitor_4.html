M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6064&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6063&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6062&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6061&quot; instrument_node=&quot;&quot;&gt;3.34, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6059&quot;&gt;&lt;span data-dcnode-id=&quot;6060&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6058&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6057&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6056&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6055&quot; instrument_node=&quot;&quot;&gt;0.81; α&lt;/span&gt;&lt;span data-dcnode-id=&quot;6054&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6053&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6052&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6051&quot; instrument_node=&quot;&quot;&gt;.90).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5657&quot; id=&quot;s0010&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6045&quot; id=&quot;st0025&quot;&gt;&lt;span data-dcnode-id=&quot;6046&quot; instrument_node=&quot;&quot;&gt;Results&lt;/span&gt;&lt;/h2&gt;&lt;section data-dcnode-id=&quot;6001&quot; id=&quot;s0120&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6043&quot; id=&quot;st0140&quot;&gt;&lt;span data-dcnode-id=&quot;6044&quot; instrument_node=&quot;&quot;&gt;Overall estimates of class mobility beliefs&lt;/span&gt;&lt;/h3&gt;&lt;div data-dcnode-id=&quot;6019&quot;&gt;&lt;p data-dcnode-id=&quot;6038&quot; id=&quot;p0165&quot;&gt;&lt;span data-dcnode-id=&quot;6042&quot; instrument_node=&quot;&quot;&gt;We first examined specific social class mobility beliefs for each of the six items. See &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6040&quot; href=&quot;#f0005&quot; name=&quot;bf0005&quot;&gt;&lt;span data-dcnode-id=&quot;6041&quot; instrument_node=&quot;&quot;&gt;Fig.&amp;nbsp;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6039&quot; instrument_node=&quot;&quot;&gt; for comparisons between estimates and actual population data on social class mobility. As shown in the figure, participants overestimated the extent that Americans can move up or down the social class hierarchy. In terms of upward mobility, participants overestimated, over a ten year period, the extent that working 1000 extra hours would improve their income standing, the number of individuals who would move from the bottom 20% to the top 20% of income, the amount that some college would move people out of the bottom 20% of income, and the number of students from the bottom 20% of income families at top universities. Participants also underestimated the extent that students from the top universities are from the top 20% of income families, suggesting again that participants overestimated the extent that universities are open to Americans from lower income levels. For downward mobility beliefs about moving out of the top 20% in income, participant estimates were consistent with actual population data. These results are consistent with our first hypothesis—participants overestimated the extent that people actually move up in wealth, and the extent that colleges and universities are open to people from lower income families.&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;figure text-xs&quot; data-dcnode-id=&quot;6020&quot; id=&quot;f0005&quot;&gt;&lt;span data-dcnode-id=&quot;6028&quot;&gt;&lt;img alt=&quot;&quot; aria-describedby=&quot;ca0015&quot; data-dcnode-id=&quot;6037&quot; height=&quot;404&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0022103115000062-gr1.jpg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;6036&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;ol class=&quot;links-for-figure&quot; data-dcnode-id=&quot;6029&quot;&gt;&lt;li data-dcnode-id=&quot;6030&quot;&gt;&lt;a class=&quot;anchor download-link u-font-sans&quot; data-dcnode-id=&quot;6031&quot; download=&quot;&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0022103115000062-gr1.jpg&quot; target=&quot;_blank&quot; title=&quot;Download full-size image&quot;&gt;&lt;span class=&quot;anchor-text&quot; data-dcnode-id=&quot;6032&quot;&gt;&lt;span data-dcnode-id=&quot;6035&quot; instrument_node=&quot;&quot;&gt;Download : &lt;/span&gt;&lt;span class=&quot;download-link-title&quot; data-dcnode-id=&quot;6033&quot;&gt;&lt;span data-dcnode-id=&quot;6034&quot; instrument_node=&quot;&quot;&gt;Download full-size image&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/span&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;6021&quot;&gt;&lt;span data-dcnode-id=&quot;6022&quot; id=&quot;ca0015&quot;&gt;&lt;p data-dcnode-id=&quot;6023&quot; id=&quot;sp0020&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;6026&quot;&gt;&lt;span data-dcnode-id=&quot;6027&quot; instrument_node=&quot;&quot;&gt;Fig.&amp;nbsp;1&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6025&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;span data-dcnode-id=&quot;6024&quot; instrument_node=&quot;&quot;&gt;Participant estimates of social class mobility on each of the six items (dark gray bars) compared to population data (light gray bars) on actual mobility. Brackets indicate 95% confidence intervals around the estimate.&lt;/span&gt;&lt;/p&gt;&lt;/span&gt;&lt;/span&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;6002&quot; id=&quot;p0170&quot;&gt;&lt;span data-dcnode-id=&quot;6018&quot; instrument_node=&quot;&quot;&gt;To examine the extent that participants in our sample gave an overall overestimation of social class mobility across the six items, we calculated the difference between the actual social class mobility and the estimate for each participant. For this calculation, higher numbers indicate elevated beliefs in class mobility up or down the hierarchy. We then tested this number against zero, which would indicate accuracy in estimates of social class mobility. Consistent with our first hypothesis, we found that participants were likely to overestimate the extent that social class mobility exists in America (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6016&quot;&gt;&lt;span data-dcnode-id=&quot;6017&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6015&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6014&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6013&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6012&quot; instrument_node=&quot;&quot;&gt;18.76, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6010&quot;&gt;&lt;span data-dcnode-id=&quot;6011&quot; instrument_node=&quot;&quot;&gt;CI&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6009&quot; instrument_node=&quot;&quot;&gt; 95% [17.98 to 19.55], &lt;/span&gt;&lt;em data-dcnode-id=&quot;6007&quot;&gt;&lt;span data-dcnode-id=&quot;6008&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6006&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6005&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6004&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6003&quot; instrument_node=&quot;&quot;&gt;3.64).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5658&quot; id=&quot;s0125&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5999&quot; id=&quot;st0145&quot;&gt;&lt;span data-dcnode-id=&quot;6000&quot; instrument_node=&quot;&quot;&gt;Individual differences related to social class mobility beliefs&lt;/span&gt;&lt;/h3&gt;&lt;div data-dcnode-id=&quot;5819&quot;&gt;&lt;p data-dcnode-id=&quot;5994&quot; id=&quot;p0180&quot;&gt;&lt;span data-dcnode-id=&quot;5998&quot; instrument_node=&quot;&quot;&gt;We tested associations with age and social class first by examining correlations between overall mobility overestimates and individual differences in age and measures of social class. The results from this analysis are displayed in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5996&quot; href=&quot;#t0005&quot; name=&quot;bt0005&quot;&gt;&lt;span data-dcnode-id=&quot;5997&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5995&quot; instrument_node=&quot;&quot;&gt;. Consistent with our expectations, younger people tended to overestimate social class mobility more than older participants. Youth was also associated with educational attainment, higher scores on optimism, and more liberal political ideology.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;tables frame-topbot colsep-0 rowsep-0&quot; data-dcnode-id=&quot;5820&quot; id=&quot;t0005&quot;&gt;&lt;span class=&quot;captions&quot; data-dcnode-id=&quot;5980&quot;&gt;&lt;span data-dcnode-id=&quot;5981&quot; id=&quot;ca0005&quot;&gt;&lt;p data-dcnode-id=&quot;5982&quot; id=&quot;sp0010&quot;&gt;&lt;span class=&quot;label&quot; data-dcnode-id=&quot;5992&quot;&gt;&lt;span data-dcnode-id=&quot;5993&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;1&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5991&quot; n data-dcnode-id=&quot;5680&quot; instrument_node=&quot;&quot;&gt;−&lt;/span&gt;&lt;span data-dcnode-id=&quot;5679&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5678&quot; instrument_node=&quot;&quot;&gt;.14, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5676&quot;&gt;&lt;span data-dcnode-id=&quot;5677&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5675&quot; instrument_node=&quot;&quot;&gt;(620)&lt;/span&gt;&lt;span data-dcnode-id=&quot;5674&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5673&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5672&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5671&quot; instrument_node=&quot;&quot;&gt;−&lt;/span&gt;&lt;span data-dcnode-id=&quot;5670&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5669&quot; instrument_node=&quot;&quot;&gt;3.43, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5667&quot;&gt;&lt;span data-dcnode-id=&quot;5668&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5666&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5665&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5664&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5663&quot; instrument_node=&quot;&quot;&gt;.01 provided larger overestimates of class mobility than did liberals. Although the effects were small in comparison to the magnitude of overall class mobility overestimates, this regression analysis indicates that age and subjective social class perceptions uniquely predict mobility beliefs independent of educational attainment—an indirect assessment of exposure to knowledge on class mobility—as well as optimistic views of the future and political ideology.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5660&quot; href=&quot;#fn0005&quot; name=&quot;bfn0005&quot;&gt;&lt;sup data-dcnode-id=&quot;5661&quot;&gt;&lt;span data-dcnode-id=&quot;5662&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5631&quot; id=&quot;s0015&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5655&quot; id=&quot;st0030&quot;&gt;&lt;span data-dcnode-id=&quot;5656&quot; instrument_node=&quot;&quot;&gt;Discussion&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;5651&quot; id=&quot;p0195&quot;&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5653&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5654&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5652&quot; instrument_node=&quot;&quot;&gt; provides correlational evidence in support of our first hypothesis and clarifies our predictions regarding relationships between social class and mobility estimates. Consistent with our first hypothesis, Americans tend to overestimate the extent that people can move up (or down) the social class hierarchy: participants in our sample thought that people move up in income more often than they actually do, do so more easily through extra work hours and education, and overestimated the extent that higher education is accessible to lower income families. On average, these mobility estimates exceeded actual class mobility by nearly 19 percentage points across the indices.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;5646&quot; id=&quot;p0200&quot;&gt;&lt;span data-dcnode-id=&quot;5650&quot; instrument_node=&quot;&quot;&gt;We also found support for an age association with class mobility beliefs: specifically, younger individuals were more likely to overestimate social class mobility relative to their older counterparts—this pattern likely emerged because young people have less experience with class mobility, as well as more motivation to believe in the possibility of future economic opportunity. As well, evidence from &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5648&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5649&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5647&quot; instrument_node=&quot;&quot;&gt; suggests that higher subjective perceptions of social class are related to overestimates of class mobility. We interpret this pattern of results to suggest that perceptions of elevated position in the class hierarchy motivate beliefs that class mobility is fair, just, and possible for many average Americans. In contrast, people with higher educational attainment tend to be better informed (through their education) about economic mobility in America. Importantly, the associations with age and perceived social class held independently of measures of political ideology and trait optimism.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;5632&quot; id=&quot;s0130&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5644&quot; id=&quot;st0150&quot;&gt;&lt;span data-dcnode-id=&quot;5645&quot; instrument_node=&quot;&quot;&gt;Study 2: genetic explanations and class mobility beliefs&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5633&quot; id=&quot;p0210&quot;&gt;&lt;span data-dcnode-id=&quot;5643&quot; instrument_node=&quot;&quot;&gt;The results of &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5641&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5642&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5640&quot; instrument_node=&quot;&quot;&gt; are consistent with our first hypothesis regarding overestimates of social class mobility, but the correlational design leaves open the possibility that unaccounted for third variables unrelated to informational and motivational accounts of class mobility explain patterns of mobility beliefs. In the remaining studies we turn to experimental designs to demonstrate causal shifts in overestimates of class mobility. To wit, Study 2 exposes participants to a faux science news article suggesting either that scientists had discovered the genetic basis for social class, or a lack of genetic influence on social class (i.e., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5638&quot; href=&quot;#bb0200&quot; name=&quot;bbb0200&quot;&gt;&lt;span data-dcnode-id=&quot;5639&quot; instrument_node=&quot;&quot;&gt;Kraus and Keltner, 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5637&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5635&quot; href=&quot;#bb0315&quot; name=&quot;bbb0315&quot;&gt;&lt;span data-dcnode-id=&quot;5636&quot; instrument_node=&quot;&quot;&gt;Tan and Kraus, 2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5634&quot; instrument_node=&quot;&quot;&gt;). We expected that learning about the genetic basis of social class—because it exposes participants to a plausible influence on individual economic opportunity, related to genetic potential—would reduce overestimates of class mobility relative to learning about social class as not influenced by genes.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5438&quot; id=&quot;s0020&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5629&quot; id=&quot;st0035&quot;&gt;&lt;span data-dcnode-id=&quot;5630&quot; instrument_node=&quot;&quot;&gt;Methods&lt;/span&gt;&lt;/h2&gt;&lt;section data-dcnode-id=&quot;5576&quot; id=&quot;s0135&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5627&quot; id=&quot;st0155&quot;&gt;&lt;span data-dcnode-id=&quot;5628&quot; instrument_node=&quot;&quot;&gt;Participants&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5577&quot; id=&quot;p0220&quot;&gt;&lt;span data-dcnode-id=&quot;5626&quot; instrument_node=&quot;&quot;&gt;Participants were 345 undergraduate students enrolled in psychology courses at a major public university in the Midwestern United States. The total sample size was reached by planning to collect data for this study across two full semesters at the university (Spring 2013 and Fall 2013). The majority of participants were female (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5624&quot;&gt;&lt;span data-dcnode-id=&quot;5625&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5623&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5622&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5621&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5620&quot; instrument_node=&quot;&quot;&gt;217). The largest ethnic group was European American (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5618&quot;&gt;&lt;span data-dcnode-id=&quot;5619&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5617&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5616&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5615&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5614&quot; instrument_node=&quot;&quot;&gt;113), followed by Other (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5612&quot;&gt;&lt;span data-dcnode-id=&quot;5613&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5611&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5610&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5609&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5608&quot; instrument_node=&quot;&quot;&gt;87), Asian American (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5606&quot;&gt;&lt;span data-dcnode-id=&quot;5607&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5605&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5604&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5603&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5602&quot; instrument_node=&quot;&quot;&gt;82), Latino/a (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5600&quot;&gt;&lt;span data-dcnode-id=&quot;5601&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5599&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5598&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5597&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5596&quot; instrument_node=&quot;&quot;&gt;43), African American (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5594&quot;&gt;&lt;span data-dcnode-id=&quot;5595&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5593&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5592&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5591&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5590&quot; instrument_node=&quot;&quot;&gt;29), and Native American (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5588&quot;&gt;&lt;span data-dcnode-id=&quot;5589&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5587&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5586&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5585&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5584&quot; instrument_node=&quot;&quot;&gt;2). Participants were permitted to enter more than one ethnic category. Mean age in the sample was 19.42 (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5582&quot;&gt;&lt;span data-dcnode-id=&quot;5583&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5581&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5580&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5579&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5578&quot; instrument_node=&quot;&quot;&gt;1.42). All participants surveyed were included in analyses except in specific cases where they had missing data.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5559&quot; id=&quot;s0140&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5574&quot; id=&quot;st0160&quot;&gt;&lt;span data-dcnode-id=&quot;5575&quot; instrument_node=&quot;&quot;&gt;Procedure&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5560&quot; id=&quot;p0230&quot;&gt;&lt;span data-dcnode-id=&quot;5573&quot; instrument_node=&quot;&quot;&gt;Participants accessed the survey through computer terminals which directed them first to read a consent document for a study designed to measure relationships between personality characteristics and attitudes about society. Following consent, the first part of the study assessed participants' memory for and retention of material in scientific articles. Within this scientific article memory exercise was our genetic beliefs about social class manipulation (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5571&quot; href=&quot;#bb0200&quot; name=&quot;bbb0200&quot;&gt;&lt;span data-dcnode-id=&quot;5572&quot; instrument_node=&quot;&quot;&gt;Kraus &amp;amp; Keltner, 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5570&quot; instrument_node=&quot;&quot;&gt;). In the second part of the study, participants answered questions about their health and emotions (reported in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5568&quot; href=&quot;#bb0315&quot; name=&quot;bbb0315&quot;&gt;&lt;span data-dcnode-id=&quot;5569&quot; instrument_node=&quot;&quot;&gt;Tan &amp;amp; Kraus, in press&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5567&quot; instrument_node=&quot;&quot;&gt;). In the third part of the study, participants answered questions about their beliefs regarding social class mobility in society and answered demographic questionnaires. Following these demographic questionnaires participants were probed for suspicion and debriefed regarding the hypotheses of the study. None (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5565&quot;&gt;&lt;span data-dcnode-id=&quot;5566&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5564&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5563&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5562&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5561&quot; instrument_node=&quot;&quot;&gt;0) of the participants were able to successfully guess the hypotheses of the study when they were probed for suspicion.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5535&quot; id=&quot;s0145&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5557&quot; id=&quot;st0165&quot;&gt;&lt;span data-dcnode-id=&quot;5558&quot; instrument_node=&quot;&quot;&gt;Manipulation of essentialist beliefs&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5536&quot; id=&quot;p0240&quot;&gt;&lt;span data-dcnode-id=&quot;5556&quot; instrument_node=&quot;&quot;&gt;Our manipulation of essentialist beliefs was identical to that of previous research (see, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5554&quot; href=&quot;#bb0200&quot; name=&quot;bbb0200&quot;&gt;&lt;span data-dcnode-id=&quot;5555&quot; instrument_node=&quot;&quot;&gt;Kraus &amp;amp; Keltner, 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5549&quot;&gt;&lt;span data-dcnode-id=&quot;5553&quot; instrument_node=&quot;&quot;&gt;). We had participants read two mock scientific news articles—the first was a filler article about will power in eating and dieting. The second article was one of two possible scientific articles about the (non)-genetic basis of social class. In the article advancing the argument for the genetic basis of social class, researchers were said to have discovered the specific genes underlying a person's social class, that lower-class individuals had more similarity in genes with other lower-class individuals, and that these genes were inherited from their parents. In the article advocating the non-genetic basis for social class, the same researchers suggested that there was no evidence linking specific genes to an individual's social class, that lower-class individuals had no special genetic similarity to other lower-class individuals, and that social class was not inherited from one's parents. To determine the success of the manipulation, we asked attention check questions for retention of article information for both mock science articles. For the first article on will power, we asked participants whether the article was consistent with the statement: “Having sweets readily available should decrease your desire of them.” For the (non)-genetic basis of social class articles, we asked participants if the article argument was consistent with the statements: “Social class is stable, inherent, and biologically determined.” and “There is no genetic basis to social class.” Participants responded to these questions on 7-point &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;5551&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/psychology/likert-scale&quot; title=&quot;Learn more about Likert scales from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;5552&quot; instrument_node=&quot;&quot;&gt;Likert scales&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5550&quot; instrument_node=&quot;&quot;&gt; (1&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5548&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5547&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5546&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;5544&quot;&gt;&lt;span data-dcnode-id=&quot;5545&quot; instrument_node=&quot;&quot;&gt;strongly disagree&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5543&quot; instrument_node=&quot;&quot;&gt;, 7&lt;/span&gt;&lt;span data-dcnode-id=&quot;5542&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5541&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5540&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;5538&quot;&gt;&lt;span data-dcnode-id=&quot;5539&quot; instrument_node=&quot;&quot;&gt;strongly agree&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5537&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5512&quot; id=&quot;s0150&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5533&quot; id=&quot;st0170&quot;&gt;&lt;span data-dcnode-id=&quot;5534&quot; instrument_node=&quot;&quot;&gt;Social class mobility&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5513&quot; id=&quot;p0250&quot;&gt;&lt;span data-dcnode-id=&quot;5532&quot; instrument_node=&quot;&quot;&gt;Participants answered the same six questions related to social class mobility as in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5530&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5531&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5529&quot; instrument_node=&quot;&quot;&gt;. As in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5527&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5528&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5526&quot; instrument_node=&quot;&quot;&gt;, we calculated an overall estimate of social class mobility such that higher scores indicated greater overestimates of mobility up or down (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5524&quot;&gt;&lt;span data-dcnode-id=&quot;5525&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5523&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5522&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5521&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5520&quot; instrument_node=&quot;&quot;&gt;26.34, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5518&quot;&gt;&lt;span data-dcnode-id=&quot;5519&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5517&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5516&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5515&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5514&quot; instrument_node=&quot;&quot;&gt;10.76).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5439&quot; id=&quot;s0155&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5510&quot; id=&quot;st0175&quot;&gt;&lt;span data-dcnode-id=&quot;5511&quot; instrument_node=&quot;&quot;&gt;Objective and subjective social class&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5440&quot; id=&quot;p0260&quot;&gt;&lt;span data-dcnode-id=&quot;5509&quot; instrument_node=&quot;&quot;&gt;Participants filled out measures of income, educational attainment, and subjective social class in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5507&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;5508&quot; instrument_node=&quot;&quot;&gt;Study 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5506&quot; instrument_node=&quot;&quot;&gt;. Because participants were college students, and presumably, not yet fully identified with a particular social class, the income (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5504&quot;&gt;&lt;span data-dcnode-id=&quot;5505&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5503&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5502&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5501&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5500&quot; instrument_node=&quot;&quot;&gt;5.11, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5498&quot;&gt;&lt;span data-dcnode-id=&quot;5499&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5497&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5496&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5495&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5494&quot; instrument_node=&quot;&quot;&gt;1.98) and educational attainment of participants' family (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5490&quot;&gt;&lt;span data-dcnode-id=&quot;5493&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;sub data-dcnode-id=&quot;5491&quot;&gt;&lt;span data-dcnode-id=&quot;5492&quot; instrument_node=&quot;&quot;&gt;mother&lt;/span&gt;&lt;/sub&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5489&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5488&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5487&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5486&quot; instrument_node=&quot;&quot;&gt;1.91, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5482&quot;&gt;&lt;span data-dcnode-id=&quot;5485&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;sub data-dcnode-id=&quot;5483&quot;&gt;&lt;span data-dcnode-id=&quot;5484&quot; instrument_node=&quot;&quot;&gt;mother&lt;/span&gt;&lt;/sub&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5481&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5480&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5479&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5478&quot; instrument_node=&quot;&quot;&gt;0.70; &lt;/span&gt;&lt;em data-dcnode-id=&quot;5474&quot;&gt;&lt;span data-dcnode-id=&quot;5477&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;sub data-dcnode-id=&quot;5475&quot;&gt;&lt;span data-dcnode-id=&quot;5476&quot; instrument_node=&quot;&quot;&gt;father&lt;/span&gt;&lt;/sub&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5473&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5472&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5471&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5470&quot; instrument_node=&quot;&quot;&gt;2.07, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5466&quot;&gt;&lt;span data-dcnode-id=&quot;5469&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;sub data-dcnode-id=&quot;5467&quot;&gt;&lt;span data-dcnode-id=&quot;5468&quot; instrument_node=&quot;&quot;&gt;father&lt;/span&gt;&lt;/sub&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5465&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5464&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5463&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5462&quot; instrument_node=&quot;&quot;&gt;0.79) was assessed using the same categories as in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5460&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5461&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5459&quot; instrument_node=&quot;&quot;&gt;. The median income of the University sample was between $75,001 and $100,000, higher than the National median, but consistent with prior University student data (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5457&quot; href=&quot;#bb0195&quot; name=&quot;bbb0195&quot;&gt;&lt;span data-dcnode-id=&quot;5458&quot; instrument_node=&quot;&quot;&gt;Kraus &amp;amp; Keltner, 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5456&quot; instrument_node=&quot;&quot;&gt;). We assessed family subjective social class rank using the same ladder measure as in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5454&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5455&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5453&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5451&quot;&gt;&lt;span data-dcnode-id=&quot;5452&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5450&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5449&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5448&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5447&quot; instrument_node=&quot;&quot;&gt;6.71, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5445&quot;&gt;&lt;span data-dcnode-id=&quot;5446&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5444&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5443&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5442&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5441&quot; instrument_node=&quot;&quot;&gt;1.63). Political ideology was assessed as in the prior study.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5061&quot; id=&quot;s0025&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5436&quot; id=&quot;st0040&quot;&gt;&lt;span data-dcnode-id=&quot;5437&quot; instrument_node=&quot;&quot;&gt;Results&lt;/span&gt;&lt;/h2&gt;&lt;section data-dcnode-id=&quot;5416&quot; id=&quot;s0160&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5434&quot; id=&quot;st0180&quot;&gt;&lt;span data-dcnode-id=&quot;5435&quot; instrument_node=&quot;&quot;&gt;Overall estimates of class mobility&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5417&quot; id=&quot;p0270&quot;&gt;&lt;span data-dcnode-id=&quot;5433&quot; instrument_node=&quot;&quot;&gt;We first examined the overall estimates of social class mobility collapsed across the manipulation of genetic beliefs about social class. Our first hypothesis, that Americans would overestimate social class mobility was supported in these data: participants substantially overestimated social class mobility in society (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5431&quot;&gt;&lt;span data-dcnode-id=&quot;5432&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5430&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5429&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5428&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5427&quot; instrument_node=&quot;&quot;&gt;26.33, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5425&quot;&gt;&lt;span data-dcnode-id=&quot;5426&quot; instrument_node=&quot;&quot;&gt;CI&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5424&quot; instrument_node=&quot;&quot;&gt; 95% [25.19, 27.48], &lt;/span&gt;&lt;em data-dcnode-id=&quot;5422&quot;&gt;&lt;span data-dcnode-id=&quot;5423&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5421&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5420&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5419&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5418&quot; instrument_node=&quot;&quot;&gt;4.90).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5334&quot; id=&quot;s0165&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5414&quot; id=&quot;st0185&quot;&gt;&lt;span data-dcnode-id=&quot;5415&quot; instrument_node=&quot;&quot;&gt;Manipulation check&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5335&quot; id=&quot;p0280&quot;&gt;&lt;span data-dcnode-id=&quot;5413&quot; instrument_node=&quot;&quot;&gt;We next examined the success of our genetic basis of social class manipulation. We examined response means of the genetic and non-genetic conditions for the three memory items. As expected, the genes group (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5411&quot;&gt;&lt;span data-dcnode-id=&quot;5412&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5410&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5409&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5408&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5407&quot; instrument_node=&quot;&quot;&gt;4.86) thought that social class was more “stable, inherent, and biologically determined” than the no genes group (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5405&quot;&gt;&lt;span data-dcnode-id=&quot;5406&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5404&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5403&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5402&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5401&quot; instrument_node=&quot;&quot;&gt;1.90), &lt;/span&gt;&lt;em data-dcnode-id=&quot;5399&quot;&gt;&lt;span data-dcnode-id=&quot;5400&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5398&quot; instrument_node=&quot;&quot;&gt;(340)&lt;/span&gt;&lt;span data-dcnode-id=&quot;5397&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5396&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5395&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5394&quot; instrument_node=&quot;&quot;&gt;−&lt;/span&gt;&lt;span data-dcnode-id=&quot;5393&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5392&quot; instrument_node=&quot;&quot;&gt;2.96, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5390&quot;&gt;&lt;span data-dcnode-id=&quot;5391&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5389&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5388&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5387&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5386&quot; instrument_node=&quot;&quot;&gt;.01. The no genes group (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5384&quot;&gt;&lt;span data-dcnode-id=&quot;5385&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5383&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5382&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5381&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5380&quot; instrument_node=&quot;&quot;&gt;5.66) agreed with the statement that social class had “no genetic basis” more than the genes group (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5378&quot;&gt;&lt;span data-dcnode-id=&quot;5379&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5377&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5376&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5375&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5374&quot; instrument_node=&quot;&quot;&gt;2.51), &lt;/span&gt;&lt;em data-dcnode-id=&quot;5372&quot;&gt;&lt;span data-dcnode-id=&quot;5373&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5371&quot; instrument_node=&quot;&quot;&gt;(340)&lt;/span&gt;&lt;span data-dcnode-id=&quot;5370&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5369&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5368&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5367&quot; instrument_node=&quot;&quot;&gt;3.15, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5365&quot;&gt;&lt;span data-dcnode-id=&quot;5366&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5364&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5363&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5362&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5361&quot; instrument_node=&quot;&quot;&gt;.01. Both the genes (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5359&quot;&gt;&lt;span data-dcnode-id=&quot;5360&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5358&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5357&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5356&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5355&quot; instrument_node=&quot;&quot;&gt;5.19) and the no genes (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5353&quot;&gt;&lt;span data-dcnode-id=&quot;5354&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5352&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5351&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5350&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5349&quot; instrument_node=&quot;&quot;&gt;5.40) groups agreed with the will power question to a similar degree &lt;/span&gt;&lt;em data-dcnode-id=&quot;5347&quot;&gt;&lt;span data-dcnode-id=&quot;5348&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5346&quot; instrument_node=&quot;&quot;&gt;(340)&lt;/span&gt;&lt;span data-dcnode-id=&quot;5345&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5344&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5343&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5342&quot; instrument_node=&quot;&quot;&gt;1.11, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5340&quot;&gt;&lt;span data-dcnode-id=&quot;5341&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5339&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5338&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5337&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5336&quot; instrument_node=&quot;&quot;&gt;.27. Overall, these analyses suggest that our manipulation was successful in delivering unique information about the genetic basis of social class.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5062&quot; id=&quot;s0170&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5332&quot; id=&quot;st0190&quot;&gt;&lt;span data-dcnode-id=&quot;5333&quot; instrument_node=&quot;&quot;&gt;Genetic explanations and class mobility&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5330&quot; id=&quot;p0290&quot;&gt;&lt;span data-dcnode-id=&quot;5331&quot; instrument_node=&quot;&quot;&gt;For our second hypothesis, we predicted that exposure to genetic exp &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5121&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5120&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5119&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5118&quot; instrument_node=&quot;&quot;&gt;−&lt;/span&gt;&lt;span data-dcnode-id=&quot;5117&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5116&quot; instrument_node=&quot;&quot;&gt;.07, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5114&quot;&gt;&lt;span data-dcnode-id=&quot;5115&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5113&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5112&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5111&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5110&quot; instrument_node=&quot;&quot;&gt;.21) were unrelated to estimates of class mobility in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5108&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;5109&quot; instrument_node=&quot;&quot;&gt;Study 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5107&quot; instrument_node=&quot;&quot;&gt;—although the direction of these effects was consistent with the direction in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5105&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5106&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5104&quot; instrument_node=&quot;&quot;&gt;. It is likely that the college student sample significantly constrained the range of these variables relative to the online participants in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5102&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5103&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5101&quot; instrument_node=&quot;&quot;&gt; (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5099&quot; href=&quot;#bb0070&quot; name=&quot;bbb0070&quot;&gt;&lt;span data-dcnode-id=&quot;5100&quot; instrument_node=&quot;&quot;&gt;Buhrmester, Kwang, &amp;amp; Gosling, 2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5098&quot; instrument_node=&quot;&quot;&gt;). It is also possible that &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5096&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;5097&quot; instrument_node=&quot;&quot;&gt;Study 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5095&quot; instrument_node=&quot;&quot;&gt; lacked sufficient power to observe the small relationships between age, subjective social class, and mobility overestimates found in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5093&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5094&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5092&quot; instrument_node=&quot;&quot;&gt;. Despite these limitations and consistent with &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5090&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5091&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5089&quot; instrument_node=&quot;&quot;&gt; (see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5087&quot; href=&quot;#f0010&quot; name=&quot;bf0010&quot;&gt;&lt;span data-dcnode-id=&quot;5088&quot; instrument_node=&quot;&quot;&gt;Fig.&amp;nbsp;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5086&quot; instrument_node=&quot;&quot;&gt;, three leftmost bars), the younger &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5084&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;5085&quot; instrument_node=&quot;&quot;&gt;Study 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5083&quot; instrument_node=&quot;&quot;&gt; participants (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5079&quot;&gt;&lt;span data-dcnode-id=&quot;5082&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;sub data-dcnode-id=&quot;5080&quot;&gt;&lt;span data-dcnode-id=&quot;5081&quot; instrument_node=&quot;&quot;&gt;age&lt;/span&gt;&lt;/sub&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5078&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5077&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5076&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5075&quot; instrument_node=&quot;&quot;&gt;19.42) provided larger overestimates of class mobility than their older &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5073&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5074&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5072&quot; instrument_node=&quot;&quot;&gt; counterparts (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5068&quot;&gt;&lt;span data-dcnode-id=&quot;5071&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;sub data-dcnode-id=&quot;5069&quot;&gt;&lt;span data-dcnode-id=&quot;5070&quot; instrument_node=&quot;&quot;&gt;age&lt;/span&gt;&lt;/sub&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5067&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5066&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5065&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5064&quot; instrument_node=&quot;&quot;&gt;31.47).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;5028&quot; id=&quot;s0030&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5059&quot; id=&quot;st0045&quot;&gt;&lt;span data-dcnode-id=&quot;5060&quot; instrument_node=&quot;&quot;&gt;Discussion&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;5042&quot; id=&quot;p0310&quot;&gt;&lt;span data-dcnode-id=&quot;5058&quot; instrument_node=&quot;&quot;&gt;The results from &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5056&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;5057&quot; instrument_node=&quot;&quot;&gt;Study 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5055&quot; instrument_node=&quot;&quot;&gt; provide additional evidence in support of our central hypotheses. Consistent with our first hypothesis, university students overestimated social class mobility beliefs to a large degree. We also found support for our second hypothesis: exposure to genetic explanations of social class reduced the overestimates of social class mobility relative to non-genetic explanations. Importantly, our younger university student sample provided overestimates of class mobility that were higher than that of our older online adult participants in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5053&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5054&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5052&quot; instrument_node=&quot;&quot;&gt;—a result consistent with the age findings in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5050&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5051&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5049&quot; instrument_node=&quot;&quot;&gt;. Finally, associations between measures of social class and overestimates of class mobility did not emerge in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5047&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;5048&quot; instrument_node=&quot;&quot;&gt;Study 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5046&quot; instrument_node=&quot;&quot;&gt;, but this lack of association could have been a by-product of the combination of the small effect size of the associations between social class and mobility overestimates or the truncated range of social class at four-year universities (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5044&quot; href=&quot;#bb0305&quot; name=&quot;bbb0305&quot;&gt;&lt;span data-dcnode-id=&quot;5045&quot; instrument_node=&quot;&quot;&gt;Stephens, Markus, &amp;amp; Fryberg, 2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5043&quot; instrument_node=&quot;&quot;&gt;). We continue to track associations between social class and class mobility beliefs in the studies that follow.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;5029&quot; id=&quot;s0175&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5040&quot; id=&quot;st0195&quot;&gt;&lt;span data-dcnode-id=&quot;5041&quot; instrument_node=&quot;&quot;&gt;Study 3: the self-relevance of class mobility beliefs&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;5038&quot; id=&quot;p0320&quot;&gt;&lt;span data-dcnode-id=&quot;5039&quot; instrument_node=&quot;&quot;&gt;Study 3 sought to test our motivated account of class mobility by varying the extent that estimates of class mobility were relevant to the self. Participants in the study were asked to make class mobility estimates in general and for individuals similar to the self in goals, motivation, and abilities. We predicted that increasing the self-relevance of mobility estimates in this fashion would engage enhanced motivated reasoning, and by implication, increase overestimates of class mobility. As in the prior studies, we again assessed associations between class mobility estimates and age and social class. As in the first two studies, we assessed political ideology to determine if class mobility estimates would vary independently of liberal or conservative political beliefs.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;5030&quot; id=&quot;p0325&quot;&gt;&lt;span data-dcnode-id=&quot;5037&quot; instrument_node=&quot;&quot;&gt;Importantly, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5035&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5036&quot; instrument_node=&quot;&quot;&gt;Study 1: mobility beliefs in an online sample of Americans&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5034&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5032&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;5033&quot; instrument_node=&quot;&quot;&gt;Study 2: genetic explanations and class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5031&quot; instrument_node=&quot;&quot;&gt; have relied on a six item mobility belief measure that asks participants to make an abstract estimate of the extent that social class mobility exists in American society. It is possible that the overestimates we have observed in the first two studies are simply due to general errors in perception and estimation of complex statistical probabilities and not class mobility in particular. In Study 3 we account for this alternative explanation by having participants make estimates for abstract statistical information that is unrelated to class mobility. We expected participants to make overestimates of class mobility independent of these non-mobility relevant statistical estimates.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;4816&quot; id=&quot;s0035&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5026&quot; id=&quot;st0050&quot;&gt;&lt;span data-dcnode-id=&quot;5027&quot; instrument_node=&quot;&quot;&gt;Method&lt;/span&gt;&lt;/h2&gt;&lt;section data-dcnode-id=&quot;4993&quot; id=&quot;s0180&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;5024&quot; id=&quot;st0200&quot;&gt;&lt;span data-dcnode-id=&quot;5025&quot; instrument_node=&quot;&quot;&gt;Participants&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;4994&quot; id=&quot;p0335&quot;&gt;&lt;span data-dcnode-id=&quot;5023&quot; instrument_node=&quot;&quot;&gt;As in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;5021&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;5022&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;5020&quot; instrument_node=&quot;&quot;&gt;, we collected a large online sample of the participants (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5018&quot;&gt;&lt;span data-dcnode-id=&quot;5019&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5017&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5016&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5015&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5014&quot; instrument_node=&quot;&quot;&gt;747) from Mechanical Turk to complete our mobility beliefs survey. Participants were 18&lt;/span&gt;&lt;span data-dcnode-id=&quot;5013&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5012&quot; instrument_node=&quot;&quot;&gt;years of age or older (&lt;/span&gt;&lt;em data-dcnode-id=&quot;5010&quot;&gt;&lt;span data-dcnode-id=&quot;5011&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5009&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5008&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5007&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5006&quot; instrument_node=&quot;&quot;&gt;33.92, &lt;/span&gt;&lt;em data-dcnode-id=&quot;5004&quot;&gt;&lt;span data-dcnode-id=&quot;5005&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;5003&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5002&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;5001&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;5000&quot; instrument_node=&quot;&quot;&gt;10.65) and were all American citizens. Participants were paid $1.00 for participating in the survey, which was described as an assessment of people's personality and beliefs about society, and were debriefed about the hypotheses of the study upon completion. The survey took participants less than 10&lt;/span&gt;&lt;span data-dcnode-id=&quot;4999&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4998&quot; instrument_node=&quot;&quot;&gt;min to complete. All participants surveyed were included in analyses except in specific cases where they had missing data or if they had previously taken part in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4996&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;4997&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4995&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;4817&quot; id=&quot;s0185&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;4991&quot; id=&quot;st0205&quot;&gt;&lt;span data-dcnode-id=&quot;4992&quot; instrument_node=&quot;&quot;&gt;Self-relevance manipulation and measures&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;4877&quot; id=&quot;p0345&quot;&gt;&lt;span data-dcnode-id=&quot;4990&quot; instrument_node=&quot;&quot;&gt;Participants completed an identical survey to that of &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4988&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;4989&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4987&quot; instrument_node=&quot;&quot;&gt;, only in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4985&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;4986&quot; instrument_node=&quot;&quot;&gt;Study 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4984&quot; instrument_node=&quot;&quot;&gt; the participants filled out two versions of the six-item mobility beliefs measure in a counterbalanced order—ordering did not change our results. The first version was identical to the wording of &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4982&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;4983&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4981&quot; instrument_node=&quot;&quot;&gt;and reflected a general estimate of class mobility beliefs. The second version heightened the self-relevance of class mobility estimates by asking the part t; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4778&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4777&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4776&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4775&quot; instrument_node=&quot;&quot;&gt;3.35 significantly overestimated the levels of class mobility. In particular, we expected overestimates of class mobility to be larger when framed as relevant to the self. To test this hypothesis we conducted a paired samples t-test comparing means for general and self-relevant estimates of class mobility. The results of this analysis align with our third hypothesis: participants provided larger overestimates of class mobility when the mobility judgments were framed as relevant to the self (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4773&quot;&gt;&lt;span data-dcnode-id=&quot;4774&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4772&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4771&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4770&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4769&quot; instrument_node=&quot;&quot;&gt;24.53) in comparison to when they were not (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4767&quot;&gt;&lt;span data-dcnode-id=&quot;4768&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4766&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4765&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4764&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4763&quot; instrument_node=&quot;&quot;&gt;19.41), &lt;/span&gt;&lt;em data-dcnod that overestimates of class mobility are beyond simple errors in statistical probability calculation. To more directly test this prediction, we examined mobility estimates in comparison to estimates for our non-mobility statistics related to soccer players and astronauts. For this analysis, we conducted a repeated measures analysis of variance (ANOVA) with non-mobility estimates, general class mobility estimates, and self-relevant class mobility estimates as three levels of a single factor. The overall analysis was significant &lt;/span&gt;&lt;em data-dcnode-id=&quot;4738&quot;&gt;&lt;span data-dcnode-id=&quot;4739&quot; instrument_node=&quot;&quot;&gt;F&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4737&quot; instrument_node=&quot;&quot;&gt;(2,1456)&lt;/span&gt;&lt;span data-dcnode-id=&quot;4736&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4735&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4734&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4733&quot; instrument_node=&quot;&quot;&gt;275.38, &lt;/span&gt;&lt;em data-dcnode-id=&quot;4731&quot;&gt;&lt;span data-dcnode-id=&quot;4732&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4730&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4729&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4728&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4727&quot; instrument_node=&quot;&quot;&gt;.01, and revealed significant differences between all three groups that aligned with our predictions (see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4725&quot; href=&quot;#f0010&quot; name=&quot;bf0010&quot;&gt;&lt;span data-dcnode-id=&quot;4726&quot; instrument_node=&quot;&quot;&gt;Fig.&amp;nbsp;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4724&quot; instrument_node=&quot;&quot;&gt;, three light gray bars). Specifically, though participants overestimated non-mobility statistics (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4722&quot;&gt;&lt;span data-dcnode-id=&quot;4723&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4721&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4720&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4719&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4718&quot; instrument_node=&quot;&quot;&gt;7.82) they were more likely to overestimate social class mobility (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4716&quot;&gt;&lt;span data-dcnode-id=&quot;4717&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4715&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4714&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4713&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4712&quot; instrument_node=&quot;&quot;&gt;19.26), and in particular, when these estimates were described as relevant to the self (&lt;/span&gt;&lt;em data-dcnode-id=&quot;4710&quot;&gt;&lt;span data-dcnode-id=&quot;4711&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;4709&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4708&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;4707&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4706&quot; instrument_node=&quot;&quot;&gt;24.30).&lt;/span&gt;&lt;/p&gt;&lt;div data-dcnode-id=&quot;4528&quot;&gt;&lt;p data-dcnode-id=&quot;4694&quot; id=&quot;p0365&quot;&gt;&lt;span data-dcnode-id=&quot;4704&quot; instrument_node=&quot;&quot;&gt;We next tested associations between age, social class measures, and class mobility estimates. See &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4702&quot; href=&quot;#t0010&quot; name=&quot;bt0010&quot;&gt;&lt;span data-dcnode-id=&quot;4703&quot; instrument_node=&quot;&quot;&gt;Table&amp;nbsp;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4701&quot; instrument_node=&quot;&quot;&gt; for correlational analyses examining associations with general (below the diagonal) and self-relevant (above the diagonal) estimates of class mobility. Correlations reveal similar patterns as observed in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4699&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;4700&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4698&quot; instrument_node=&quot;&quot;&gt;. For general class mobility estimates, age was significantly negatively associated with greater overestimates of class mobility. As in &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4696&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;4697&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4695&quot; instrument_node=&quot;&quot;&gt;, higher subjective perceptions of social class rank were significantly associated with overestimates of mobility. Income was also positively associated with class mobility estimates in this sample whereas educational attainment was not associated. Once again, conservatives provided larger overestimates of class mobility. In addition, reduced self-rated knowledge of economic mobility predicted increased overestimates of class mobility—providing more support for the informational component to class mobility overestimates. The same patterns emerged pan&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4384&quot; instrument_node=&quot;&quot;&gt; relative to statistical estimates unrelated to mobility beliefs. Importantly and consistent with our third hypothesis, heightening the self-relevance of the mobility estimates increased the tendency for the participants to overestimate class mobility—this latter finding is consistent with our motivated account of mobility estimates.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4378&quot; id=&quot;p0380&quot;&gt;&lt;span data-dcnode-id=&quot;4382&quot; instrument_node=&quot;&quot;&gt;Age and social class were associated with overestimates of class mobility in line with &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;4380&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;4381&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4379&quot; instrument_node=&quot;&quot;&gt;: younger and higher subjective social class participants overestimated class mobility. Importantly, relationships between age, subjective social class, and overestimates of social class mobility held even after accounting for political ideology, educational attainment, and self-reports of knowledge about economic mobility—a result suggesting that overestimates of class mobility relate to age and social class in ways that are independent of both explicit knowledge of economic mobility and political beliefs.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;4367&quot; id=&quot;s0190&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;4376&quot; id=&quot;st0210&quot;&gt;&lt;span data-dcnode-id=&quot;4377&quot; instrument_node=&quot;&quot;&gt;Study 4: subjective social class rank and class mobility beliefs&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;4368&quot; id=&quot;p0390&quot;&gt;&lt;span data-dcnode-id=&quot;4375&quot; instrument_node=&quot;&quot;
