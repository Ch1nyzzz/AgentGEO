&lt;/span&gt;&lt;meta content=&quot;&lt;div class=&amp;quot;Abstracts u-font-serif&amp;quot; id=&amp;quot;abstracts&amp;quot;&gt;&lt;div class=&amp;quot;abstract author&amp;quot; id=&amp;quot;ab0005&amp;quot;&gt;&lt;h2 class=&amp;quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&amp;quot;&gt;Abstract&lt;/h2&gt;&lt;div id=&amp;quot;as0005&amp;quot;&gt;&lt;p id=&amp;quot;sp0005&amp;quot;&gt;In this research we examine estimates of American social class mobility—the ability to move up or down in education and income status. Across studies, overestimates of class mobility were large and particularly likely among younger participants and those higher in subjective social class—both measured (Studies 1–3) and manipulated (Study 4). Class mobility overestimates were independent of general estimation errors (Study 3) and persisted after accounting for knowledge of class mobility assessed in terms of educational attainment and self-ratings. Experiments revealed that mobility overestimates were shaped by exposure to information about the genetic determinants of social class—a faux science article suggesting genetic constraints to economic advancement increased accuracy in class mobility estimates (Study 2)—and motivated by needs to protect the self—heightening the self-relevance of class mobility increased overestimates (Study 3). Discussion focused on both the costs and benefits of overestimates of class mobility for individuals and society.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&quot; data-dcnode-id=&quot;7157&quot; lang=&quot;en&quot; name=&quot;citation_abstract&quot;&gt;&lt;span data-dcnode-id=&quot;7156&quot; instrument_node=&quot;&quot;&gt;

&quot; id=&quot;ab0015&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6644&quot;&gt;&lt;span data-dcnode-id=&quot;6645&quot; instrument_node=&quot;&quot;&gt;Highlights&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;6626&quot; id=&quot;as9005&quot;&gt;&lt;p data-dcnode-id=&quot;6627&quot; id=&quot;sp9005&quot;&gt;&lt;/p&gt;&lt;dl class=&quot;list&quot; data-dcnode-id=&quot;6628&quot;&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;6642&quot;&gt;&lt;span data-dcnode-id=&quot;6643&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;6639&quot;&gt;&lt;p data-dcnode-id=&quot;6640&quot; id=&quot;p9020&quot;&gt;&lt;span data-dcnode-id=&quot;6641&quot; instrument_node=&quot;&quot;&gt;Americans overestimate the levels of actual class mobility in society.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;6637&quot;&gt;&lt;span data-dcnode-id=&quot;6638&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;6634&quot;&gt;&lt;p data-dcnode-id=&quot;6635&quot; id=&quot;p9025&quot;&gt;&lt;span data-dcnode-id=&quot;6636&quot; instrument_node=&quot;&quot;&gt;Mobility overestimates are larger for younger and higher subjective class people.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;6632&quot;&gt;&lt;span data-dcnode-id=&quot;6633&quot; instrument_node=&quot;&quot;&gt;•&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;6629&quot;&gt;&lt;p data-dcnode-id=&quot;6630&quot; id=&quot;p9030&quot;&gt;&lt;span data-dcnode-id=&quot;6631&quot; instrument_node=&quot;&quot;&gt;Information and motivation contribute to mobility beliefs.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;p&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;abstract author&quot; data-dcnode-id=&quot;6619&quot; id=&quot;ab0005&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6623&quot;&gt;&lt;span data-dcnode-id=&quot;6624&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;6620&quot; id=&quot;as0005&quot;&gt;&lt;p data-dcnode-id=&quot;6621&quot; id=&quot;sp0005&quot;&gt;&lt;span data-dcnode-id=&quot;6622&quot; instrument_node=&quot;&quot;&gt;In this research we examine estimates of American social class mobility—the ability to move up or down in education and income status. Across studies, overestimates of class mobility were large and particularly likely among younger participants and those higher in subjective social class—both measured (Studies 1–3) and manipulated (Study 4). Class mobility overestimates were independent of general estimation errors (Study 3) and persisted after accounting for knowledge of class mobility assessed in terms of educational attainment and self-ratings. Experiments revealed that mobility overestimates were shaped by exposure to information about the genetic determinants of social class—a faux science article suggesting genetic constraints to economic advancement increased accuracy in class mobility estimates (Study 2)—and motivated by needs to protect the self—heightening the self-relevance of class mobility increased overestimates (Study 3). Discussion focused on both the costs and benefits of overestimates of class mobility for individuals and society.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;ul class=&quot;issue-navigation u-margin-s-bottom u-bg-grey1&quot; data-dcnode-id=&quot;6595&quot; id=&quot;issue-navigation&quot;&gt;&lt;li class=&quot;previous move-left u-padding-s-ver u-padding-s-left&quot; data-dcnode-id=&quot;6607&quot;&gt;&lt;a class=&quot;button-alternative button-alternative-tertiary&quot; data-dcnode-id=&quot;6608&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022103115000049&quot;&gt;&lt;svg class=&quot;icon icon-navigate-left&quot; data-dcnode-id=&quot;6616&quot; focusable=&quot;false&quot; height=&quot;32&quot; viewBox=&quot;0 0 54 128&quot; width=&quot;32&quot;&gt;&lt;path d=&quot;m1 61l45-45 7 7-38 38 38 38-7 7z&quot; data-dcnode-id=&quot;6617&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;span class=&quot;button-alternative-text&quot; data-dcnode-id=&quot;6609&quot;&gt;&lt;strong data-dcnode-id=&quot;6614&quot;&gt;&lt;span data-dcnode-id=&quot;6615&quot; instrument_node=&quot;&quot;&gt;Previous &lt;/span&gt;&lt;/strong&gt;&lt;span class=&quot;extra-detail-1&quot; data-dcnode-id=&quot;6612&quot;&gt;&lt;span data-dcnode-id=&quot;6613&quot; instrument_node=&quot;&quot;&gt;article&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;extra-detail-2&quot; data-dcnode-id=&quot;6610&quot;&gt;&lt;span data-dcnode-id=&quot;6611&quot; instrument_node=&quot;&quot;&gt; in issue&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;next move-right u-padding-s-ver u-padding-s-right&quot; data-dcnode-id=&quot;6596&quot;&gt;&lt;a class=&quot;button-alternative button-alternative-tertiary&quot; data-dcnode-id=&quot;6597&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022103115000098&quot;&gt;&lt;span class=&quot;button-alternative-text&quot; data-dcnode-id=&quot;6600&quot;&gt;&lt;strong data-dcnode-id=&quot;6605&quot;&gt;&lt;span data-dcnode-id=&quot;6606&quot; instrument_node=&quot;&quot;&gt;Next &lt;/span&gt;&lt;/strong&gt;&lt;span class=&quot;extra-detail-1&quot; data-dcnode-id=&quot;6603&quot;&gt;&lt;span data-dcnode-id=&quot;6604&quot; instrument_node=&quot;&quot;&gt;article&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;extra-detail-2&quot; data-dcnode-id=&quot;6601&quot;&gt;&lt;span data-dcnode-id=&quot;6602&quot; instrument_node=&quot;&quot;&gt; in issue&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;svg class=&quot;icon icon-navigate-right&quot; data-dcnode-id=&quot;6598&quot; focusable=&quot;false&quot; height=&quot;32&quot; viewBox=&quot;0 0 54 128&quot; width=&quot;32&quot;&gt;&lt;path d=&quot;m1 99l38-38-38-38 7-7 45 45-45 45z&quot; data-dcnode-id=&quot;6599&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;div class=&quot;Keywords u-font-serif&quot; data-dcnode-id=&quot;6576&quot;&gt;&lt;div class=&quot;keywords-section&quot; data-dcnode-id=&quot;6577&quot; id=&quot;ks0005&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6593&quot;&gt;&lt;span data-dcnode-id=&quot;6594&quot; instrument_node=&quot;&quot;&gt;Keywords&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;6590&quot; id=&quot;kw0030&quot;&gt;&lt;span data-dcnode-id=&quot;6591&quot; id=&quot;tx0010&quot;&gt;&lt;span data-dcnode-id=&quot;6592&quot; instrument_node=&quot;&quot;&gt;Social class&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;6587&quot; id=&quot;kw0035&quot;&gt;&lt;span data-dcnode-id=&quot;6588&quot; id=&quot;tx0015&quot;&gt;&lt;span data-dcnode-id=&quot;6589&quot; instrument_node=&quot;&quot;&gt;Socioeconomic status&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;6584&quot; id=&quot;kw0040&quot;&gt;&lt;span data-dcnode-id=&quot;6585&quot; id=&quot;tx0020&quot;&gt;&lt;span data-dcnode-id=&quot;6586&quot; instrument_node=&quot;&quot;&gt;Social cognition&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;6581&quot; id=&quot;kw0045&quot;&gt;&lt;span data-dcnode-id=&quot;6582&quot; id=&quot;tx0025&quot;&gt;&lt;span data-dcnode-id=&quot;6583&quot; instrument_node=&quot;&quot;&gt;Political psychology&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;6578&quot; id=&quot;kw0050&quot;&gt;&lt;span data-dcnode-id=&quot;6579&quot; id=&quot;tx0030&quot;&gt;&lt;span data-dcnode-id=&quot;6580&quot; instrument_node=&quot;&quot;&gt;Self-enhancement&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6575&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;div class=&quot;Body u-font-serif&quot; data-dcnode-id=&quot;3993&quot; id=&quot;body&quot;&gt;&lt;div data-dcnode-id=&quot;3994&quot;&gt;&lt;p data-dcnode-id=&quot;6568&quot; id=&quot;p0495&quot;&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;6569&quot;&gt;&lt;p data-dcnode-id=&quot;6570&quot; id=&quot;sp0030&quot;&gt;&lt;span data-dcnode-id=&quot;6574&quot; instrument_node=&quot;&quot;&gt;“What I offer… is a set of concrete, practical proposals to speed up growth, strengthen the middle class, and build new ladders of opportunity into the middle class.”—President Barack &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6572&quot; href=&quot;#bb0250&quot; name=&quot;bbb0250&quot;&gt;&lt;span data-dcnode-id=&quot;6573&quot; instrument_node=&quot;&quot;&gt;Obama (2014)&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6571&quot; instrument_node=&quot;&quot;&gt;, State of the Union.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6560&quot; id=&quot;p0010&quot;&gt;&lt;span data-dcnode-id=&quot;6567&quot; instrument_node=&quot;&quot;&gt;Economic inequality is among the most pressing societal problems impacting the health and well-being of Americans: inequality reduces well-being—Americans report elevated happiness in years where economic inequality is lower compared to years when it is higher (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6565&quot; href=&quot;#bb0260&quot; name=&quot;bbb0260&quot;&gt;&lt;span data-dcnode-id=&quot;6566&quot; instrument_node=&quot;&quot;&gt;Oishi, Kesebir, &amp;amp; Diener, 2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6564&quot; instrument_node=&quot;&quot;&gt;). As well, roughly 70% of studies examining the health impacts of economic inequality find that societal health worsens as economic inequality intensifies (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6562&quot; href=&quot;#bb0335&quot; name=&quot;bbb0335&quot;&gt;&lt;span data-dcnode-id=&quot;6563&quot; instrument_node=&quot;&quot;&gt;Wilkinson &amp;amp; Pickett, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6561&quot; instrument_node=&quot;&quot;&gt;). When economic inequality deepens, society suffers. These trends are the likely reason why President Barack Obama made reducing economic inequality through increasing social class mobility a primary theme in his 2014 State of the Union Address. Whether or not economic policy changes take hold is likely to depend on a number of factors, among them the extent that Americans recognize, and are aware of, the levels of actual social class mobility in society. This research was designed to examine potential inaccuracies in judgments of class mobility.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6558&quot; id=&quot;p0015&quot;&gt;&lt;span data-dcnode-id=&quot;6559&quot; instrument_node=&quot;&quot;&gt;Across four studies, we compared estimates of American social class mobility to actual available data. We hypothesized that Americans would overestimate levels of income mobility and educational access in the United States. We predicted further that these estimates would be heightened by a lack of awareness of the factors that influence economic opportunity in society, and motivated by a desire to protect the self.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;6530&quot; id=&quot;s0065&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6556&quot; id=&quot;st0085&quot;&gt;&lt;span data-dcnode-id=&quot;6557&quot; instrument_node=&quot;&quot;&gt;Class mobility, equality of opportunity, and the American Dream&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;6539&quot; id=&quot;p0025&quot;&gt;&lt;span data-dcnode-id=&quot;6555&quot; instrument_node=&quot;&quot;&gt;The United States is faced with record levels of income inequality and one of the lowest rates of actual social mobility among industrial nations (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6553&quot; href=&quot;#bb0065&quot; name=&quot;bbb0065&quot;&gt;&lt;span data-dcnode-id=&quot;6554&quot; instrument_node=&quot;&quot;&gt;Burkhauser et al., 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6552&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6550&quot; href=&quot;#bb0120&quot; name=&quot;bbb0120&quot;&gt;&lt;span data-dcnode-id=&quot;6551&quot; instrument_node=&quot;&quot;&gt;Fiske and Markus, 2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6549&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6547&quot; href=&quot;#bb0265&quot; name=&quot;bbb0265&quot;&gt;&lt;span data-dcnode-id=&quot;6548&quot; instrument_node=&quot;&quot;&gt;Piketty and Saez, 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6546&quot; instrument_node=&quot;&quot;&gt;). Despite these constraints on economic opportunities, Americans place significant hope on the American Dream—the promise that individuals, from any sector of society, have an equal opportunity to become better educated, earn more money, and obtain whatever job they desire. These beliefs in social class mobility are widespread, frequently referred to during political speeches (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6544&quot; href=&quot;#bb0250&quot; name=&quot;bbb0250&quot;&gt;&lt;span data-dcnode-id=&quot;6545&quot; instrument_node=&quot;&quot;&gt;Obama, 2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6543&quot; instrument_node=&quot;&quot;&gt;), evoked in contemporary popular fiction and cinema (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6541&quot; href=&quot;#bb0125&quot; name=&quot;bbb0125&quot;&gt;&lt;span data-dcnode-id=&quot;6542&quot; instrument_node=&quot;&quot;&gt;Fitzgerald, 1925&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6540&quot; instrument_node=&quot;&quot;&gt;), and are a core right referred to in historical government documents (i.e., the Bill of Rights).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6531&quot; id=&quot;p0030&quot;&gt;&lt;span data-dcnode-id=&quot;6538&quot; instrument_node=&quot;&quot;&gt;The disconnect between actual economic conditions on the one hand and beliefs in the American Dream on the other suggests that Americans may be unaware of the actual levels of social class mobility in society. Several lines of research anticipate this pattern of inaccuracy: for instance, when a large sample of Americans was asked to guess the levels of wealth inequality in the United States, individuals underestimated the magnitude of economic inequality by a wide margin (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6536&quot; href=&quot;#bb0245&quot; name=&quot;bbb0245&quot;&gt;&lt;span data-dcnode-id=&quot;6537&quot; instrument_node=&quot;&quot;&gt;Norton &amp;amp; Ariely, 2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6535&quot; instrument_node=&quot;&quot;&gt;). Americans also display low awareness of how changes in economic conditions will impact their lives: when asked to forecast how an economic windfall will change their lives, individuals routinely overestimate the extent that these economic changes will increase their happiness and well-being (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6533&quot; href=&quot;#bb0345&quot; name=&quot;bbb0345&quot;&gt;&lt;span data-dcnode-id=&quot;6534&quot; instrument_node=&quot;&quot;&gt;Wilson &amp;amp; Gilbert, 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6532&quot; instrument_node=&quot;&quot;&gt;). These data suggest that Americans are unaware of the actual economic structure of society and of how changes in individual economic conditions shape their own life outcomes, and provide the starting point for our first hypothesis: Americans will overestimate actual levels of social class mobility in society to a substantial degree (Hypothesis I).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6437&quot; id=&quot;s0070&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6528&quot; id=&quot;st0090&quot;&gt;&lt;span data-dcnode-id=&quot;6529&quot; instrument_node=&quot;&quot;&gt;Informational and motivational aspects of class mobility beliefs&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;6514&quot; id=&quot;p0040&quot;&gt;&lt;span data-dcnode-id=&quot;6527&quot; instrument_node=&quot;&quot;&gt;In general, individuals have many blind spots across diverse domains of social life: people become surprisingly unaware of unique objects (i.e., a dancing gorilla) if asked to focus on a separate visual task (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6525&quot; href=&quot;#bb0300&quot; name=&quot;bbb0300&quot;&gt;&lt;span data-dcnode-id=&quot;6526&quot; instrument_node=&quot;&quot;&gt;Simons &amp;amp; Jensen, 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6524&quot; instrument_node=&quot;&quot;&gt;); individuals, primarily from Western cultures, routinely ignore statistical probabilities and claim that they are more moral, more intelligent, and less error-prone than others (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6522&quot; href=&quot;#bb0270&quot; name=&quot;bbb0270&quot;&gt;&lt;span data-dcnode-id=&quot;6523&quot; instrument_node=&quot;&quot;&gt;Pronin, Gilovich, &amp;amp; Ross, 2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6521&quot; instrument_node=&quot;&quot;&gt;); even memories for particularly noteworthy events (e.g., the events of September 11th, 2001) are fraught with inaccuracies that are driven by strong emotional experiences (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6519&quot; href=&quot;#bb0135&quot; name=&quot;bbb0135&quot;&gt;&lt;span data-dcnode-id=&quot;6520&quot; instrument_node=&quot;&quot;&gt;Hirst et al., 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6518&quot; instrument_node=&quot;&quot;&gt;). Research indicates that errors in social perception are driven by both informational factors—such as the lack of awareness of statistical information relevant to actual mobility trends—and motivational factors—the desire to believe that society is meritocratic (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6516&quot; href=&quot;#bb0130&quot; name=&quot;bbb0130&quot;&gt;&lt;span data-dcnode-id=&quot;6517&quot; instrument_node=&quot;&quot;&gt;Greenwald &amp;amp; Banaji, 1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6515&quot; instrument_node=&quot;&quot;&gt;). Here we examine both sources of error in class mobility beliefs.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6509&quot; id=&quot;p0045&quot;&gt;&lt;span data-dcnode-id=&quot;6513&quot; instrument_node=&quot;&quot;&gt;Inaccuracy in social class mobility arises, in part, because individuals have a lack of information about actual class mobility in society beyond their own personal anecdotes (for additional research on inaccuracy in social class lay theories, see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6511&quot; href=&quot;#bb0320&quot; name=&quot;bbb0320&quot;&gt;&lt;span data-dcnode-id=&quot;6512&quot; instrument_node=&quot;&quot;&gt;Varnum, 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6510&quot; instrument_node=&quot;&quot;&gt;). Based on this logic, exposure to information about the determinants of social class would likely reduce overestimates of class mobility. In particular, we predict for our second hypothesis, that calling attention to genetic factors that influence economic advancement will constrain beliefs in class mobility (Hypothesis II).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6501&quot; id=&quot;p0050&quot;&gt;&lt;span data-dcnode-id=&quot;6508&quot; instrument_node=&quot;&quot;&gt;We predict that genetic explanations for social class—explanations suggesting that social class is determined by stable and internal genetic factors (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6506&quot; href=&quot;#bb0200&quot; name=&quot;bbb0200&quot;&gt;&lt;span data-dcnode-id=&quot;6507&quot; instrument_node=&quot;&quot;&gt;Kraus &amp;amp; Keltner, 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6505&quot; instrument_node=&quot;&quot;&gt;)—are likely to reduce overestimates of class mobility for two reasons: first, genetic explanations highlight the possibility that some individuals possess advantaged (inferior) genes that enhance (reduce) the capacity to ascend the economic hierarchy. Thus, genetic explanations provide a concrete reason for why class mobility may not be possible for all Americans. Though research has not tested relationships between genetic explanations and class mobility specifically, genetic explanations of social groups have constrained other beliefs related to social change: For example, increased race-based essentialist beliefs (i.e., beliefs that racial categories are biologically determined) were associated with decreased motivation to change racial inequality in society (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6503&quot; href=&quot;#bb0340&quot; name=&quot;bbb0340&quot;&gt;&lt;span data-dcnode-id=&quot;6504&quot; instrument_node=&quot;&quot;&gt;Williams &amp;amp; Eberhardt, 2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6502&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6477&quot; id=&quot;p0055&quot;&gt;&lt;span data-dcnode-id=&quot;6500&quot; instrument_node=&quot;&quot;&gt;Second, genetic explanations are likely to be persuasive: a large and consistent literature indicates that Americans tend to use internal explanations (e.g., traits and genes) for social events and behaviors more than external explanations (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6498&quot; href=&quot;#bb0150&quot; name=&quot;bbb0150&quot;&gt;&lt;span data-dcnode-id=&quot;6499&quot; instrument_node=&quot;&quot;&gt;Jellison and Green, 1981&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6497&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6495&quot; href=&quot;#bb0235&quot; name=&quot;bbb0235&quot;&gt;&lt;span data-dcnode-id=&quot;6496&quot; instrument_node=&quot;&quot;&gt;Morris and Peng, 1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6494&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6492&quot; href=&quot;#bb0240&quot; name=&quot;bbb0240&quot;&gt;&lt;span data-dcnode-id=&quot;6493&quot; instrument_node=&quot;&quot;&gt;Nisbett and Ross, 1980&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6491&quot; instrument_node=&quot;&quot;&gt;)—making genetic explanations particularly like to shape mobility beliefs. As well, decades of gene research, primarily conducted on twins, suggests that there are genetic components to aspects of social class that include educational attainment and occupation status (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6489&quot; href=&quot;#bb0030&quot; name=&quot;bbb0030&quot;&gt;&lt;span data-dcnode-id=&quot;6490&quot; instrument_node=&quot;&quot;&gt;Baker et al., 1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6488&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6486&quot; href=&quot;#bb0275&quot; name=&quot;bbb0275&quot;&gt;&lt;span data-dcnode-id=&quot;6487&quot; instrument_node=&quot;&quot;&gt;Rietveld et al., 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6485&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6483&quot; href=&quot;#bb0310&quot; name=&quot;bbb0310&quot;&gt;&lt;span data-dcnode-id=&quot;6484&quot; instrument_node=&quot;&quot;&gt;Tambs et al., 1989&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6478&quot;&gt;&lt;span data-dcnode-id=&quot;6482&quot; instrument_node=&quot;&quot;&gt;)—thereby affording genetic explanations for class mobility increased &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6480&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/psychology/plausibility&quot; title=&quot;Learn more about plausibility from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6481&quot; instrument_node=&quot;&quot;&gt;plausibility&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6479&quot; instrument_node=&quot;&quot;&gt; in the minds of Americans. For these reasons, we expect that exposing participants to genetic explanations of social class will reduce estimates of class mobility, relative to exposure to non-genetic explanations.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6457&quot; id=&quot;p0060&quot;&gt;&lt;span data-dcnode-id=&quot;6476&quot; instrument_node=&quot;&quot;&gt;In addition to informational errors, overestimates of social class mobility are driven by motivated social cognition—that is, individuals endorse specific personal or political attitudes because they satisfy basic psychological needs (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6474&quot; href=&quot;#bb0165&quot; name=&quot;bbb0165&quot;&gt;&lt;span data-dcnode-id=&quot;6475&quot; instrument_node=&quot;&quot;&gt;Jost, Glaser, Kruglanski, &amp;amp; Sulloway, 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6473&quot; instrument_node=&quot;&quot;&gt;). Americans benefit from overestimates of social class mobility because they bolster widely held American ideals of meritocracy and equality of opportunity (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6471&quot; href=&quot;#bb0105&quot; name=&quot;bbb0105&quot;&gt;&lt;span data-dcnode-id=&quot;6472&quot; instrument_node=&quot;&quot;&gt;Durkheim, 1933&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6470&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6468&quot; href=&quot;#bb0120&quot; name=&quot;bbb0120&quot;&gt;&lt;span data-dcnode-id=&quot;6469&quot; instrument_node=&quot;&quot;&gt;Fiske and Markus, 2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6467&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6465&quot; href=&quot;#bb0325&quot; name=&quot;bbb0325&quot;&gt;&lt;span data-dcnode-id=&quot;6466&quot; instrument_node=&quot;&quot;&gt;Weber, 1930&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6464&quot; instrument_node=&quot;&quot;&gt;). Thus, overestimates of class mobility satisfy the need to believe that the societal status of the self and others is determined fairly and justly. Class mobility overestimates may also increase the tendency for individuals to work harder and strive for economic advancement—even when they are currently lower in the social hierarchy. In this fashion, overestimates of class mobility can be both beneficial and adaptive for one's life outcomes (c.f., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6462&quot; href=&quot;#bb0020&quot; name=&quot;bbb0020&quot;&gt;&lt;span data-dcnode-id=&quot;6463&quot; instrument_node=&quot;&quot;&gt;Anderson et al., 2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6461&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6459&quot; href=&quot;#bb0155&quot; name=&quot;bbb0155&quot;&gt;&lt;span data-dcnode-id=&quot;6460&quot; instrument_node=&quot;&quot;&gt;Johnson et al., 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6458&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6455&quot; id=&quot;p0065&quot;&gt;&lt;span data-dcnode-id=&quot;6456&quot; instrument_node=&quot;&quot;&gt;Our motivated perspective suggests that class mobility overestimates are likely driven, at least in part, by motivations to protect the self—especially with regard to economic outcomes. Specifically, we predict, for our third hypothesis, that motivations to see the self positively—including with respect to the possibility for future economic advancement and opportunity—will enhance overestimates of class mobility (Hypothesis III).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6438&quot; id=&quot;p0070&quot;&gt;&lt;span data-dcnode-id=&quot;6454&quot; instrument_node=&quot;&quot;&gt;Research on self-enhancement provides indirect empirical support for our third hypothesis: in achievement domains, where people are concerned about the evaluations of others, individuals are likely to engage in self-protection by seeing the self more positively, as well as to seek out enhancing appraisals from others (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6452&quot; href=&quot;#bb0140&quot; name=&quot;bbb0140&quot;&gt;&lt;span data-dcnode-id=&quot;6453&quot; instrument_node=&quot;&quot;&gt;James, 1890&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6451&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6449&quot; href=&quot;#bb0285&quot; name=&quot;bbb0285&quot;&gt;&lt;span data-dcnode-id=&quot;6450&quot; instrument_node=&quot;&quot;&gt;Sedikides and Gregg, 2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6448&quot; instrument_node=&quot;&quot;&gt;). Research on the better-than-average effect—wherein individuals consistently evaluate their traits and behaviors as above average (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6446&quot; href=&quot;#bb0010&quot; name=&quot;bbb0010&quot;&gt;&lt;span data-dcnode-id=&quot;6447&quot; instrument_node=&quot;&quot;&gt;Alicke, 1985&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6445&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6443&quot; href=&quot;#bb0100&quot; name=&quot;bbb0100&quot;&gt;&lt;span data-dcnode-id=&quot;6444&quot; instrument_node=&quot;&quot;&gt;Dunning et al., 1989&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6442&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6440&quot; href=&quot;#bb0115&quot; name=&quot;bbb0115&quot;&gt;&lt;span data-dcnode-id=&quot;6441&quot; instrument_node=&quot;&quot;&gt;Festinger, 1954&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6439&quot; instrument_node=&quot;&quot;&gt;)—has a rich tradition in social psychology, and aligns with our prediction that concerns to protect the self will increase overestimates of class mobility.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6389&quot; id=&quot;s0075&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6435&quot; id=&quot;st0095&quot;&gt;&lt;span data-dcnode-id=&quot;6436&quot; instrument_node=&quot;&quot;&gt;Social class and estimates of class mobility&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;6424&quot; id=&quot;p0080&quot;&gt;&lt;span data-dcnode-id=&quot;6434&quot; instrument_node=&quot;&quot;&gt;Our motivated perspective on class mobility also suggests a relationship between position in the class hierarchy and overestimates of class mobility: with respect to this relationship, research is divided on whether people at the top or bottom of the class hierarchy will be more likely to overestimate class mobility (see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6432&quot; href=&quot;#bb0050&quot; name=&quot;bbb0050&quot;&gt;&lt;span data-dcnode-id=&quot;6433&quot; instrument_node=&quot;&quot;&gt;Brandt, 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6431&quot; instrument_node=&quot;&quot;&gt;). It is possible that relatively lower-class individuals will overestimate class mobility more than their upper-class counterparts, because beliefs in mobility may enhance optimism about future economic success and select research supports this perspective (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6429&quot; href=&quot;#bb0160&quot; name=&quot;bbb0160&quot;&gt;&lt;span data-dcnode-id=&quot;6430&quot; instrument_node=&quot;&quot;&gt;Jost, Banaji, &amp;amp; Nosek, 2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6428&quot; instrument_node=&quot;&quot;&gt;): for instance, recent evidence suggests that relatively lower-class individuals are more likely to engage in behaviors that actually promote economic mobility—Democratic members of the US Congress were more likely to sponsor legislation that decreases economic inequality in society (e.g., raising the minimum wage) if they were lower (versus higher) in average annual wealth (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6426&quot; href=&quot;#bb0180&quot; name=&quot;bbb0180&quot;&gt;&lt;span data-dcnode-id=&quot;6427&quot; instrument_node=&quot;&quot;&gt;Kraus &amp;amp; Callaghan, 2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6425&quot; instrument_node=&quot;&quot;&gt;). Practically, higher levels of educational attainment might provide individuals with more exposure to information about actual social class mobility, and increase accuracy by implication, relative to lower levels.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6407&quot; id=&quot;p0085&quot;&gt;&lt;span data-dcnode-id=&quot;6423&quot; instrument_node=&quot;&quot;&gt;In contrast, evidence and theory also converge on the opposite relationship between social class position and overestimates of class mobility. Specifically, the motivation to believe that one's elevated position in society is both fairly achieved and possible for all Americans will lead individuals from relatively upper-class backgrounds to make larger overestimates of social class mobility. Several lines of research support this perspective: for instance, people with higher status are happier when they believe that positive outcomes in society are based on merit (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6421&quot; href=&quot;#bb9001&quot; name=&quot;bbb9001&quot;&gt;&lt;span data-dcnode-id=&quot;6422&quot; instrument_node=&quot;&quot;&gt;Napier, 2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6420&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6418&quot; href=&quot;#bb0255&quot; name=&quot;bbb0255&quot;&gt;&lt;span data-dcnode-id=&quot;6419&quot; instrument_node=&quot;&quot;&gt;O'Brien and Major, 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6417&quot; instrument_node=&quot;&quot;&gt;) and high-performing members of a group are more likely to advocate dividing resources based solely on merit (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6415&quot; href=&quot;#bb0060&quot; name=&quot;bbb0060&quot;&gt;&lt;span data-dcnode-id=&quot;6416&quot; instrument_node=&quot;&quot;&gt;Brown-Iannuzzi et al., 2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6414&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6412&quot; href=&quot;#bb9000&quot; name=&quot;bbb9000&quot;&gt;&lt;span data-dcnode-id=&quot;6413&quot; instrument_node=&quot;&quot;&gt;Messick and Sentis, 1979&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6411&quot; instrument_node=&quot;&quot;&gt;). As well, individuals who ranked themselves more highly in subjective social class reported a greater belief that the world is both meritocratic and that economic outcomes are fair than did their lower-class counterparts (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6409&quot; href=&quot;#bb0200&quot; name=&quot;bbb0200&quot;&gt;&lt;span data-dcnode-id=&quot;6410&quot; instrument_node=&quot;&quot;&gt;Kraus &amp;amp; Keltner, 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6408&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6390&quot; id=&quot;p0090&quot;&gt;&lt;span data-dcnode-id=&quot;6406&quot; instrument_node=&quot;&quot;&gt;Taken together, though these lines of evidence suggest that mobility estimates will be motivated by one's position in the class hierarchy, the directionality of the relationship remains unclear. In the present research, we use correlational (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6404&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;6405&quot; instrument_node=&quot;&quot;&gt;Study 1: mobility beliefs in an online sample of Americans&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6403&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6401&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;6402&quot; instrument_node=&quot;&quot;&gt;Study 3: the self-relevance of class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6400&quot; instrument_node=&quot;&quot;&gt;) and experimental (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6398&quot; href=&quot;#s0190&quot; name=&quot;bs0190&quot;&gt;&lt;span data-dcnode-id=&quot;6399&quot; instrument_node=&quot;&quot;&gt;Study 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6397&quot; instrument_node=&quot;&quot;&gt;) approaches to explore and estimate the precise direction and strength of the relationship between measures of social class and estimates of class mobility. Moreover, it is possible that distinct components of social class will be differentially related to overestimates of class mobility (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6395&quot; href=&quot;#bb0210&quot; name=&quot;bbb0210&quot;&gt;&lt;span data-dcnode-id=&quot;6396&quot; instrument_node=&quot;&quot;&gt;Kraus, Piff, Mendoza-Denton, Rheinschmidt, &amp;amp; Keltner, 2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6394&quot; instrument_node=&quot;&quot;&gt;)—with education being negatively related given its relationship to information exposure, and subjective rank perceptions of social class being positively related, given associations with meritocracy judgments in prior research (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6392&quot; href=&quot;#bb0060&quot; name=&quot;bbb0060&quot;&gt;&lt;span data-dcnode-id=&quot;6393&quot; instrument_node=&quot;&quot;&gt;Brown-Iannuzzi et al., 2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6391&quot; instrument_node=&quot;&quot;&gt;). Because of these conditions, throughout the studies we separately examine relationships between unique facets of social class and class mobility beliefs.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6316&quot; id=&quot;s0080&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6387&quot; id=&quot;st0100&quot;&gt;&lt;span data-dcnode-id=&quot;6388&quot; instrument_node=&quot;&quot;&gt;The present research&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;6340&quot; id=&quot;p0100&quot;&gt;&lt;span data-dcnode-id=&quot;6386&quot; instrument_node=&quot;&quot;&gt;We used four studies, one correlational and three experimental, to test three hypotheses related to estimates of social class mobility, and to assess the relationship between perceptions of such mobility and various individual differences. In &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6384&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;6385&quot; instrument_node=&quot;&quot;&gt;Study 1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6383&quot; instrument_node=&quot;&quot;&gt;, we measured beliefs about class mobility using an online sample of adults from the United States and compared these estimates to statistics on actual class mobility generated from analyses of the Current Population Survey (&lt;/span&gt;&lt;a data-dcnode-id=&quot;6381&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.stateofworkingamerica.org/&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;6382&quot; instrument_node=&quot;&quot;&gt;www.stateofworkingamerica.org&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6380&quot; instrument_node=&quot;&quot;&gt;; &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6378&quot; href=&quot;#bb0230&quot; name=&quot;bbb0230&quot;&gt;&lt;span data-dcnode-id=&quot;6379&quot; instrument_node=&quot;&quot;&gt;Mishel, Bivens, Gould, &amp;amp; Shierholz, 2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6377&quot; instrument_node=&quot;&quot;&gt;). In &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6375&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;6376&quot; instrument_node=&quot;&quot;&gt;Study 2: genetic explanations and class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6374&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6372&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;6373&quot; instrument_node=&quot;&quot;&gt;Study 3: the self-relevance of class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6371&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6369&quot; href=&quot;#s0190&quot; name=&quot;bs0190&quot;&gt;&lt;span data-dcnode-id=&quot;6370&quot; instrument_node=&quot;&quot;&gt;Study 4: subjective social class rank and class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6368&quot; instrument_node=&quot;&quot;&gt;, participants were exposed to experimental manipulations of genetic beliefs about social class (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6366&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;6367&quot; instrument_node=&quot;&quot;&gt;Study 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6365&quot; instrument_node=&quot;&quot;&gt;), the self-relevance of mobility estimates (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6363&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;6364&quot; instrument_node=&quot;&quot;&gt;Study 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6362&quot; instrument_node=&quot;&quot;&gt;), and subjective social class (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6360&quot; href=&quot;#s0190&quot; name=&quot;bs0190&quot;&gt;&lt;span data-dcnode-id=&quot;6361&quot; instrument_node=&quot;&quot;&gt;Study 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6359&quot; instrument_node=&quot;&quot;&gt;). Throughout the studies we examined associations between estimates of class mobility and individual differences related to age and social class, while accounting for knowledge of economic mobility assessed by educational attainment (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6357&quot; href=&quot;#s0085&quot; name=&quot;bs0085&quot;&gt;&lt;span data-dcnode-id=&quot;6358&quot; instrument_node=&quot;&quot;&gt;Study 1: mobility beliefs in an online sample of Americans&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6356&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6354&quot; href=&quot;#s0130&quot; name=&quot;bs0130&quot;&gt;&lt;span data-dcnode-id=&quot;6355&quot; instrument_node=&quot;&quot;&gt;Study 2: genetic explanations and class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6353&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6351&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;6352&quot; instrument_node=&quot;&quot;&gt;Study 3: the self-relevance of class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6350&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6348&quot; href=&quot;#s0190&quot; name=&quot;bs0190&quot;&gt;&lt;span data-dcnode-id=&quot;6349&quot; instrument_node=&quot;&quot;&gt;Study 4: subjective social class rank and class mobility beliefs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6347&quot; instrument_node=&quot;&quot;&gt;) and self-reports of mobility knowledge (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6345&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;6346&quot; instrument_node=&quot;&quot;&gt;Study 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6344&quot; instrument_node=&quot;&quot;&gt;), general errors in estimation (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6342&quot; href=&quot;#s0175&quot; name=&quot;bs0175&quot;&gt;&lt;span data-dcnode-id=&quot;6343&quot; instrument_node=&quot;&quot;&gt;Study 3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6341&quot; instrument_node=&quot;&quot;&gt;), and individual differences related to trait optimism and political conservatism.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6317&quot; id=&quot;p0105&quot;&gt;&lt;span data-dcnode-id=&quot;6339&quot; instrument_node=&quot;&quot;&gt;The present research advances our understanding of estimates of social class mobility in two primary ways: though social scientists and economists have long claimed that Americans believe in equality of opportunity (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6337&quot; href=&quot;#bb0040&quot; name=&quot;bbb0040&quot;&gt;&lt;span data-dcnode-id=&quot;6338&quot; instrument_node=&quot;&quot;&gt;Benabou &amp;amp; Ok, 2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6336&quot; instrument_node=&quot;&quot;&gt;), this research is among the first, to examine the magnitude of overestimates of class mobility in relationship to real data on actual mobility and to determine the psychological causes of these overestimates. It is important to estimate the magnitude of overestimates of class mobility because large overestimates may render mobility concerns less likely to influence the agendas of policy-makers (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6334&quot; href=&quot;#bb0280&quot; name=&quot;bbb0280&quot;&gt;&lt;span data-dcnode-id=&quot;6335&quot; instrument_node=&quot;&quot;&gt;Schwartz, 2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6333&quot; instrument_node=&quot;&quot;&gt;). Although recent research has examined meritocracy judgments (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6331&quot; href=&quot;#bb0060&quot; name=&quot;bbb0060&quot;&gt;&lt;span data-dcnode-id=&quot;6332&quot; instrument_node=&quot;&quot;&gt;Brown-Iannuzzi et al., 2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6330&quot; instrument_node=&quot;&quot;&gt;), genetic explanations for social class (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6328&quot; href=&quot;#bb0200&quot; name=&quot;bbb0200&quot;&gt;&lt;span data-dcnode-id=&quot;6329&quot; instrument_node=&quot;&quot;&gt;Kraus &amp;amp; Keltner, 2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6327&quot; instrument_node=&quot;&quot;&gt;), and estimates of economic mobility (see &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6325&quot; href=&quot;#bb0090&quot; name=&quot;bbb0090&quot;&gt;&lt;span data-dcnode-id=&quot;6326&quot; instrument_node=&quot;&quot;&gt;Davidai &amp;amp; Gilovich, 2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6324&quot; instrument_node=&quot;&quot;&gt;), this work is also the first to determine, in particular, the causal factors that influence inaccuracies in estimates of class mobility. Given the hypothesized wide disconnect between beliefs in mobility and actual mobility (c.f., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6322&quot; href=&quot;#bb0085&quot; name=&quot;bbb0085&quot;&gt;&lt;span data-dcnode-id=&quot;6323&quot; instrument_node=&quot;&quot;&gt;Charles and Hurst, 2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6321&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6319&quot; href=&quot;#bb0170&quot; name=&quot;bbb0170&quot;&gt;&lt;span data-dcnode-id=&quot;6320&quot; instrument_node=&quot;&quot;&gt;Keister, 2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6318&quot; instrument_node=&quot;&quot;&gt;), understanding the causal psychological processes that bias class mobility estimates has the potential to inform interventions that decrease barriers to economic advancement.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6306&quot; id=&quot;s0085&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6314&quot; id=&quot;st0105&quot;&gt;&lt;span data-dcnode-id=&quot;6315&quot; instrument_node=&quot;&quot;&gt;Study 1: mobility beliefs in an online sample of Americans&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;6312&quot; id=&quot;p0115&quot;&gt;&lt;span data-dcnode-id=&quot;6313&quot; instrument_node=&quot;&quot;&gt;Study 1, compares estimates of social class mobility to available data using a large sample of online participants. We expected overestimates of class mobility to be large, and to be influenced by a lack of available information and by motivations to protect the self. A secondary focus of Study 1 was to assess the associations between individual differences in social class, age, political ideology, and optimism, and their unique associations with estimates of class mobility.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6307&quot; id=&quot;p0120&quot;&gt;&lt;span data-dcnode-id=&quot;6311&quot; instrument_node=&quot;&quot;&gt;With respect to individual differences, our dual account of mobility beliefs suggests that younger individuals might be particularly likely to overestimate class mobility relative to their older counterparts. In terms of information, younger individuals' relative lack of life experience may make them less aware of barriers to class mobility. In terms of motivation, younger individuals may also be motivated to believe in enhanced class mobility and economic opportunity early on in adulthood where opportunities for advancement (e.g., education and training) are more readily available (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6309&quot; href=&quot;#bb0290&quot; name=&quot;bbb0290&quot;&gt;&lt;span data-dcnode-id=&quot;6310&quot; instrument_node=&quot;&quot;&gt;Segerstrom, Taylor, Kemeny, &amp;amp; Fahey, 1998&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6308&quot; instrument_node=&quot;&quot;&gt;). Together, this logic suggests the prediction that younger participants will provide larger overestimates of social class mobility. We also expected social class to relate to class mobility, although we did not make specific predictions about the directionality of this relationship.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6047&quot; id=&quot;s0005&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6304&quot; id=&quot;st0020&quot;&gt;&lt;span data-dcnode-id=&quot;6305&quot; instrument_node=&quot;&quot;&gt;Method&lt;/span&gt;&lt;/h2&gt;&lt;section data-dcnode-id=&quot;6277&quot; id=&quot;s0090&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6302&quot; id=&quot;st0110&quot;&gt;&lt;span data-dcnode-id=&quot;6303&quot; instrument_node=&quot;&quot;&gt;Participants&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;6278&quot; id=&quot;p0130&quot;&gt;&lt;span data-dcnode-id=&quot;6301&quot; instrument_node=&quot;&quot;&gt;We collected a large online sample of participants (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6299&quot;&gt;&lt;span data-dcnode-id=&quot;6300&quot; instrument_node=&quot;&quot;&gt;n&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6298&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6297&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6296&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6295&quot; instrument_node=&quot;&quot;&gt;751) from Mechanical Turk to complete our mobility beliefs survey. The participants were 18&lt;/span&gt;&lt;span data-dcnode-id=&quot;6294&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6293&quot; instrument_node=&quot;&quot;&gt;years of age or older (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6291&quot;&gt;&lt;span data-dcnode-id=&quot;6292&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6290&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6289&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6288&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6287&quot; instrument_node=&quot;&quot;&gt;31.47, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6285&quot;&gt;&lt;span data-dcnode-id=&quot;6286&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6284&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6283&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6282&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6281&quot; instrument_node=&quot;&quot;&gt;11.20) and were all American citizens. Participants were paid $1.00 for participating in the survey, which was described as an assessment of people's personality and beliefs about society, and were debriefed about the hypotheses of the study upon completion. The survey took the participants less than 10&lt;/span&gt;&lt;span data-dcnode-id=&quot;6280&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6279&quot; instrument_node=&quot;&quot;&gt;min to complete. All participants surveyed were included in the analyses except in specific cases where they had missing data.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6048&quot; id=&quot;s0095&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6275&quot; id=&quot;st0115&quot;&gt;&lt;span data-dcnode-id=&quot;6276&quot; instrument_node=&quot;&quot;&gt;Measures&lt;/span&gt;&lt;/h3&gt;&lt;section data-dcnode-id=&quot;6192&quot; id=&quot;s0100&quot;&gt;&lt;h4 class=&quot;u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6273&quot; id=&quot;st0120&quot;&gt;&lt;span data-dcnode-id=&quot;6274&quot; instrument_node=&quot;&quot;&gt;Mobility beliefs&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;6193&quot; id=&quot;p0140&quot;&gt;&lt;span data-dcnode-id=&quot;6272&quot; instrument_node=&quot;&quot;&gt;We created six questions to assess the participants' beliefs in social class mobility. For each of these items, population data exist from the years 1996–2007 on actual social class mobility in the United States (&lt;/span&gt;&lt;a data-dcnode-id=&quot;6270&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.stateofworkingamerica.org/&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;6271&quot; instrument_node=&quot;&quot;&gt;www.stateofworkingamerica.org&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6269&quot; instrument_node=&quot;&quot;&gt;; &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6267&quot; href=&quot;#bb0230&quot; name=&quot;bbb0230&quot;&gt;&lt;span data-dcnode-id=&quot;6268&quot; instrument_node=&quot;&quot;&gt;Mishel et al., 2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6266&quot; instrument_node=&quot;&quot;&gt;). Three of the items assessed beliefs in income mobility: participants were asked to think about 100 people during a ten-year time period from 1997–2006. The questions asked participants to assess how many of these 100 people would (1) move from the bottom 20% of income by working 1000 extra hours (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6264&quot;&gt;&lt;span data-dcnode-id=&quot;6265&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6263&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6262&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6261&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6260&quot; instrument_node=&quot;&quot;&gt;36.08, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6258&quot;&gt;&lt;span data-dcnode-id=&quot;6259&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6257&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6256&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6255&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6254&quot; instrument_node=&quot;&quot;&gt;25.24); (2) move from the bottom 20% of income to the top 20%? (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6252&quot;&gt;&lt;span data-dcnode-id=&quot;6253&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6251&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6250&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6249&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6248&quot; instrument_node=&quot;&quot;&gt;15.60, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6246&quot;&gt;&lt;span data-dcnode-id=&quot;6247&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6245&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6244&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6243&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6242&quot; instrument_node=&quot;&quot;&gt;17.88); and (3) move from the top 1% of income to the bottom 80%? (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6240&quot;&gt;&lt;span data-dcnode-id=&quot;6241&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6239&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6238&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6237&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6236&quot; instrument_node=&quot;&quot;&gt;14.57, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6234&quot;&gt;&lt;span data-dcnode-id=&quot;6235&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6233&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6232&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6231&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6230&quot; instrument_node=&quot;&quot;&gt;17.88). Three educational mobility questions assessed (4) how many of a group of 100 people would move from the bottom 20% of income with some kind of college degree? (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6228&quot;&gt;&lt;span data-dcnode-id=&quot;6229&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6227&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6226&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6225&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6224&quot; instrument_node=&quot;&quot;&gt;61.34, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6222&quot;&gt;&lt;span data-dcnode-id=&quot;6223&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6221&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6220&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6219&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6218&quot; instrument_node=&quot;&quot;&gt;22.52), (5) how many of 100 top college and university students would be from the top 20% of income families? (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6216&quot;&gt;&lt;span data-dcnode-id=&quot;6217&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6215&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6214&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6213&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6212&quot; instrument_node=&quot;&quot;&gt;43.54, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6210&quot;&gt;&lt;span data-dcnode-id=&quot;6211&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6209&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6208&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6207&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6206&quot; instrument_node=&quot;&quot;&gt;20.62); and (6) how many of these 100 students would be from the bottom 20% of income families? (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6204&quot;&gt;&lt;span data-dcnode-id=&quot;6205&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6203&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6202&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6201&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6200&quot; instrument_node=&quot;&quot;&gt;15.83, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6198&quot;&gt;&lt;span data-dcnode-id=&quot;6199&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6197&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6196&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6195&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6194&quot; instrument_node=&quot;&quot;&gt;11.65).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6124&quot; id=&quot;s0105&quot;&gt;&lt;h4 class=&quot;u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6190&quot; id=&quot;st0125&quot;&gt;&lt;span data-dcnode-id=&quot;6191&quot; instrument_node=&quot;&quot;&gt;Objective and subjective social class&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;6125&quot; id=&quot;p0145&quot;&gt;&lt;span data-dcnode-id=&quot;6189&quot; instrument_node=&quot;&quot;&gt;Based on recommendations from prior research (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6187&quot; href=&quot;#bb0215&quot; name=&quot;bbb0215&quot;&gt;&lt;span data-dcnode-id=&quot;6188&quot; instrument_node=&quot;&quot;&gt;Kraus and Stephens, 2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6186&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6184&quot; href=&quot;#bb0210&quot; name=&quot;bbb0210&quot;&gt;&lt;span data-dcnode-id=&quot;6185&quot; instrument_node=&quot;&quot;&gt;Kraus et al., 2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6183&quot; instrument_node=&quot;&quot;&gt;), we assessed social class using four indices: annual income, educational attainment, occupation status, and subjective social class. Annual income was assessed using seven categories: (1) &amp;lt;$15,000; (2) $15,001–$30,000; (3) $30,001–$45,000; (4) $45,001–$75,000; (5) $75,001–$100,000; (6) $100,001–$150,000; and (7) &amp;gt;$150,000 (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6181&quot;&gt;&lt;span data-dcnode-id=&quot;6182&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6180&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6179&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6178&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6177&quot; instrument_node=&quot;&quot;&gt;3.44, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6175&quot;&gt;&lt;span data-dcnode-id=&quot;6176&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6174&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6173&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6172&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6171&quot; instrument_node=&quot;&quot;&gt;1.62). The median income of the sample was between $30,001 and $45,000—a figure consistent with US Census data on national median income levels (&lt;/span&gt;&lt;a data-dcnode-id=&quot;6169&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//census.gov/&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;6170&quot; instrument_node=&quot;&quot;&gt;census.gov&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6168&quot; instrument_node=&quot;&quot;&gt;). Educational attainment was assessed using three categories: (1) high school graduation; (2) college graduation; (3) post-graduate degree (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6166&quot;&gt;&lt;span data-dcnode-id=&quot;6167&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6165&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6164&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6163&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6162&quot; instrument_node=&quot;&quot;&gt;1.73, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6160&quot;&gt;&lt;span data-dcnode-id=&quot;6161&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6159&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6158&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6157&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6156&quot; instrument_node=&quot;&quot;&gt;0.67). Occupation status was assessed using three categories: (1) unemployed; (2) part-time employee; and (3) full-time employee, (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6154&quot;&gt;&lt;span data-dcnode-id=&quot;6155&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6153&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6152&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6151&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6150&quot; instrument_node=&quot;&quot;&gt;2.12, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6148&quot;&gt;&lt;span data-dcnode-id=&quot;6149&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6147&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6146&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6145&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6144&quot; instrument_node=&quot;&quot;&gt;0.87). To assess subjective social class rank (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6142&quot;&gt;&lt;span data-dcnode-id=&quot;6143&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6141&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6140&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6139&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6138&quot; instrument_node=&quot;&quot;&gt;5.00, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6136&quot;&gt;&lt;span data-dcnode-id=&quot;6137&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6135&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6134&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6133&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6132&quot; instrument_node=&quot;&quot;&gt;1.77), we presented participants with a picture of a ten rung ladder representing ascending levels of income, education, and occupation status in society (e.g., &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6130&quot; href=&quot;#bb0005&quot; name=&quot;bbb0005&quot;&gt;&lt;span data-dcnode-id=&quot;6131&quot; instrument_node=&quot;&quot;&gt;Adler et al., 2000&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6129&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6127&quot; href=&quot;#bb0205&quot; name=&quot;bbb0205&quot;&gt;&lt;span data-dcnode-id=&quot;6128&quot; instrument_node=&quot;&quot;&gt;Kraus et al., 2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6126&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6085&quot; id=&quot;s0110&quot;&gt;&lt;h4 class=&quot;u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6122&quot; id=&quot;st0130&quot;&gt;&lt;span data-dcnode-id=&quot;6123&quot; instrument_node=&quot;&quot;&gt;Political orientation&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;6086&quot; id=&quot;p0150&quot;&gt;&lt;span data-dcnode-id=&quot;6117&quot;&gt;&lt;span data-dcnode-id=&quot;6121&quot; instrument_node=&quot;&quot;&gt;Two items were used to assess political orientation. Participants responded to items assessing the extent they identified as socially or economically liberal (conservative) using 7-point &lt;/span&gt;&lt;a class=&quot;topic-link&quot; data-dcnode-id=&quot;6119&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/topics/psychology/likert-scale&quot; title=&quot;Learn more about Likert scales from ScienceDirect's AI-generated Topic Pages&quot;&gt;&lt;span data-dcnode-id=&quot;6120&quot; instrument_node=&quot;&quot;&gt;Likert scales&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6118&quot; instrument_node=&quot;&quot;&gt; (1&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6116&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6115&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6114&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;6112&quot;&gt;&lt;span data-dcnode-id=&quot;6113&quot; instrument_node=&quot;&quot;&gt;very conservative&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6111&quot; instrument_node=&quot;&quot;&gt;, 7&lt;/span&gt;&lt;span data-dcnode-id=&quot;6110&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6109&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6108&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;6106&quot;&gt;&lt;span data-dcnode-id=&quot;6107&quot; instrument_node=&quot;&quot;&gt;very liberal&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6105&quot; instrument_node=&quot;&quot;&gt;). These two items were averaged, given their high correlation (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6103&quot;&gt;&lt;span data-dcnode-id=&quot;6104&quot; instrument_node=&quot;&quot;&gt;r&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6102&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6101&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6100&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6099&quot; instrument_node=&quot;&quot;&gt;.58), for an overall index of political orientation (&lt;/span&gt;&lt;em data-dcnode-id=&quot;6097&quot;&gt;&lt;span data-dcnode-id=&quot;6098&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6096&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6095&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6094&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6093&quot; instrument_node=&quot;&quot;&gt;4.67, &lt;/span&gt;&lt;em data-dcnode-id=&quot;6091&quot;&gt;&lt;span data-dcnode-id=&quot;6092&quot; instrument_node=&quot;&quot;&gt;SD&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6090&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6089&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6088&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6087&quot; instrument_node=&quot;&quot;&gt;1.50).&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;6049&quot; id=&quot;s0115&quot;&gt;&lt;h4 class=&quot;u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;6083&quot; id=&quot;st0135&quot;&gt;&lt;span data-dcnode-id=&quot;6084&quot; instrument_node=&quot;&quot;&gt;Trait optimism&lt;/span&gt;&lt;/h4&gt;&lt;p data-dcnode-id=&quot;6050&quot; id=&quot;p0155&quot;&gt;&lt;span data-dcnode-id=&quot;6082&quot; instrument_node=&quot;&quot;&gt;Participants filled out an eight item measure of optimism based on prior research (&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;6080&quot; href=&quot;#bb0025&quot; name=&quot;bbb0025&quot;&gt;&lt;span data-dcnode-id=&quot;6081&quot; instrument_node=&quot;&quot;&gt;Anderson &amp;amp; Galinsky, 2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6079&quot; instrument_node=&quot;&quot;&gt;). A sample item is “In uncertain times I usually expect the best.” Participants used 7-point Likert scales to enter their responses (1&lt;/span&gt;&lt;span data-dcnode-id=&quot;6078&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6077&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6076&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;6074&quot;&gt;&lt;span data-dcnode-id=&quot;6075&quot; instrument_node=&quot;&quot;&gt;strongly disagree&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6073&quot; instrument_node=&quot;&quot;&gt;, 7&lt;/span&gt;&lt;span data-dcnode-id=&quot;6072&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6071&quot; instrument_node=&quot;&quot;&gt;=&lt;/span&gt;&lt;span data-dcnode-id=&quot;6070&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;6068&quot;&gt;&lt;span data-dcnode-id=&quot;6069&quot; instrument_node=&quot;&quot;&gt;strongly agree&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;6067&quot; instrument_node=&quot;&quot;&gt;; &lt;/span&gt;&lt;em data-dcnode-id=&quot;6065&quot;&gt;&lt;span data-dcnode-id=&quot;6066&quot; instrument_node=&quot;&quot;&gt;
