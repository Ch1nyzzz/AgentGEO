an&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1611&quot; instrument_node=&quot;&quot;&gt; Focus on the key events that changed the discourse.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1609&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;1607&quot;&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;What is the American dream in modern society?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;1604&quot;&gt;&lt;span data-dcnode-id=&quot;1605&quot; instrument_node=&quot;&quot;&gt;The Graffiti Art: the history of the movement and why some people consider it as vandalism.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1603&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;1601&quot;&gt;&lt;span data-dcnode-id=&quot;1602&quot; instrument_node=&quot;&quot;&gt;The background of the democratic movement in Hong Kong.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1600&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;1598&quot;&gt;&lt;span data-dcnode-id=&quot;1599&quot; instrument_node=&quot;&quot;&gt;Analyze how the Cold War influences current events in the US.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1597&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;1595&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1592&quot; id=&quot;how-to-find-sources-for-an-essay-on-historical-topics&quot;&gt;&lt;img alt=&quot;👀&quot; class=&quot;emoji&quot; data-dcnode-id=&quot;1594&quot; draggable=&quot;false&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s.w.org/images/core/emoji/11/svg/1f440.svg&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;1593&quot; instrument_node=&quot;&quot;&gt; How to Find Sources for an Essay on Historical Topics?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1591&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1589&quot;&gt;&lt;span data-dcnode-id=&quot;1590&quot; instrument_node=&quot;&quot;&gt;Finding the right sources for any academic paper is critical. You need them to prove the legitimacy of your work. Good sources provide you with information and improve your critical thinking.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1588&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Tutors judge the references by the organization, collection, and presentation of the evidence.&quot; class=&quot;aligncenter wp-image-98468 size-medium&quot; data-dcnode-id=&quot;1587&quot; data-image=&quot;https://ivypanda.com/essays/wp-content/uploads/2020/04/23-teachers-and-professors-1.png&quot; height=&quot;186&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ivypanda.com/outer/img/png/s.png&amp;amp;raw&quot; style=&quot;height: 0px; padding-bottom: 90.055px;&quot; width=&quot;1200&quot;&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1584&quot;&gt;&lt;span data-dcnode-id=&quot;1585&quot; instrument_node=&quot;&quot;&gt;There are two types of sources: primary and secondary.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1581&quot;&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;Primary sources are materials, which were made during the time of a studied subject. They include literature written by the participants of events. It can be personal (correspondence, diaries) or more official (interviews, newspapers, official statements.)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1578&quot;&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;Secondary sources are materials written post-factum by non-participants. Usually, they analyze the issue and use evidence from primary sources. The most common secondary sources are scholarship works.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1577&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1575&quot;&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;To detect a good history source, you have to ask a few questions:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;ul data-dcnode-id=&quot;1560&quot;&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;1571&quot;&gt;&lt;span data-dcnode-id=&quot;1572&quot; instrument_node=&quot;&quot;&gt;Who created the source? Is this an accredited author?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;1568&quot;&gt;&lt;span data-dcnode-id=&quot;1569&quot; instrument_node=&quot;&quot;&gt;When and where was it created? Is it outdated? Are there any other similar sources produced during this time? Is it a product that relies on the place or time context of its creation?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;1565&quot;&gt;&lt;span data-dcnode-id=&quot;1566&quot; instrument_node=&quot;&quot;&gt;For whom did they produce this source? What is the target audience? What purposes does the source serve?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;1562&quot;&gt;&lt;span data-dcnode-id=&quot;1563&quot; instrument_node=&quot;&quot;&gt;How does this source compare to other sources? Do they overlap or contradict each other? Does it contribute anything to your research?&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Sir Francis Bacon's quote.&quot; class=&quot;aligncenter wp-image-98469 size-medium&quot; data-dcnode-id=&quot;1558&quot; data-image=&quot;https://ivypanda.com/essays/wp-content/uploads/2020/04/24-sir-fracis-quote-1.png&quot; height=&quot;118&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ivypanda.com/outer/img/png/s.png&amp;amp;raw&quot; style=&quot;height: 0px; padding-bottom: 57.1317px;&quot; width=&quot;1200&quot;&gt;&lt;span data-dcnode-id=&quot;1557&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;p data-dcnode-id=&quot;1555&quot;&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt;Thank you for reading this article. We hope it will assist you in choosing and researching your historical topic. Share it with other people who might need some guidance for their studies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1552&quot;&gt;&lt;span data-dcnode-id=&quot;1553&quot; instrument_node=&quot;&quot;&gt;References&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;ol class=&quot;ol--top-level ol--top-level--first&quot; data-dcnode-id=&quot;1441&quot;&gt;&lt;span data-dcnode-id=&quot;1550&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;li data-dcnode-id=&quot;1545&quot;&gt;&lt;cite data-dcnode-id=&quot;1546&quot; itemprop=&quot;citation&quot; itemscope=&quot;&quot; itemtype=&quot;https://schema.org/CreativeWork&quot;&gt;&lt;a data-dcnode-id=&quot;1547&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//worldhistoryproject.org/t
