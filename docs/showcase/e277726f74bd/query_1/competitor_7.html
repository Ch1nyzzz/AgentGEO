ypes affect laws contributing to institutional racism and assignments designed to strengthen students’ advocacy skills should be given. For instance, social work students should be instructed to research policies being introduced in their state that conflict with social work core values. Through research they may find a bill being introduced such as one to drug test all individuals who receive public assistance. This is a social justice issue because it targets a vulnerable population (low income, minorities) and perpetuates the stereotype that people receiving government assistance are substance abusers. In this situation, an assignment can be made to write letters to senators and representatives that are sponsoring the bill. Students can use empirical data in the letters to expose the stereotypes and increase awareness about the unjust policies. Instructors can make arrangements for the class to go to the state capitol and sit in open committee meetings with those sponsoring the bills. There the students can voice concerns about how the particular bill will perpetuate stereotypes and contribute to institutional racism, while using research to support their arguments. These types of assignments are vital to teaching students to advocate against bills and laws that do not have the best interest of vulnerable populations, such as African-American males. If these skills are acquired in school, it is likely that students will continue to advocate and be involved with social justice issues in their communities throughout their careers.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2373&quot;&gt;&lt;span data-dcnode-id=&quot;2380&quot; instrument_node=&quot;&quot;&gt;Lobbying against unjust laws and bills is one step to increasing public awareness in attempts to decrease institutional racism. Students should also become familiar with human rights documents such as the UDHR and the CERD and should be trained around anti-racist behaviors and advocacy (Rozas and Garran &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2378&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR66&quot; id=&quot;ref-link-section-d189313771e849&quot; title=&quot;Rozas, L. W., &amp;amp; Garran, A. M. (2016). Towards a human rights culture in social work education. British Journal of Social Work, 46(4), 890–905. 
                    https://doi.org/10.1093/bjsw/bcv03
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2379&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2377&quot; instrument_node=&quot;&quot;&gt;). Learning to practice from a human rights perspective will enable students to advocate for the right of all individuals to have at the very least a minimal life standard (Rozas&amp;nbsp;and Garran &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2375&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR66&quot; id=&quot;ref-link-section-d189313771e852&quot; title=&quot;Rozas, L. W., &amp;amp; Garran, A. M. (2016). Towards a human rights culture in social work education. British Journal of Social Work, 46(4), 890–905. 
                    https://doi.org/10.1093/bjsw/bcv03
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2374&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2371&quot; id=&quot;Sec9&quot;&gt;&lt;span data-dcnode-id=&quot;2372&quot; instrument_node=&quot;&quot;&gt;CEUs&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2366&quot;&gt;&lt;span data-dcnode-id=&quot;2370&quot; instrument_node=&quot;&quot;&gt;Before social workers can train other professionals to be culturally competent, they must first be culturally competent themselves. According to the U.S.&amp;nbsp;Social Work Code of Ethics (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;2368&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR49&quot; id=&quot;ref-link-section-d189313771e863&quot; title=&quot;National Association of Social Worker. (2008). Social work code of ethics. Retrieved from 
                    https://www.socialworkers.org/LinkClick.aspx?fileticket=KZmmbz15evc%3D&amp;amp;portalid=0
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2369&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2367&quot; instrument_node=&quot;&quot;&gt;), social workers should understand culture, provide culturally competent services, and seek to understand social diversity and oppression. Although ethics training is required by nearly every state licensure board, fewer than 10 states require cultural competency training for license renewal. Therefore, social workers should advocate for state licensure boards to mandate a minimum of three continuing educational units of cultural competence training yearly in every state. Like all people, social workers have biases and must address them. If social workers are advocating for mandated cultural competency training in other fields, our profession must show the importance of the training by making it a requirement to obtain/maintain licensure.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2364&quot; id=&quot;Sec10&quot;&gt;&lt;span data-dcnode-id=&quot;2365&quot; instrument_node=&quot;&quot;&gt;Policy Change&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2362&quot;&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt;Finally, this article is a call to action for social workers to embrace the role as a change agent in dismantling how society has perpetuated the stereotypes of African-American males. The social work core value of social justice maintains that social workers are to pursue social change on behalf of oppressed individuals, such as African-American males. Hence, it is crucial to increase society’s awareness of the stereotypes that play a major role in educational outcomes, hiring processes, and the continued police brutality shown toward African-American males.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2360&quot;&gt;&lt;span data-dcnode-id=&quot;2361&quot; instrument_node=&quot;&quot;&gt;One step to achieve this is by lobbying for policies to be passed that mandate and enforce all State and Federal agencies and organizations to participate in cultural competency training as part of their new worker orientation. It is recommended that this training be provided by a certified cultural competency trainer. Although most agencies currently have some sort of diversity training, employees often report that it is not beneficial. Many times the presenter is not competent in the area of training and rushes through the information, and the employee simply signs a sheet indicating they received the training. There is a lack of accountability or measure as to how much the employee actually learned. Therefore, this proposed mandated training would require that the participant pass a standardized exam noting the worker’s proficiency in the training. No staff would be allowed to move forward in the hiring process until they have demonstrated proficiency in the training with a score of at least 80%. It is also recommended that a refresher course be mandated every year accompanied by a passing score of 80% to remain employed. To ensure that the mandated cultural competency training is implemented as proposed, State and Federal Agencies not in compliance would be at risk of losing state and federal funding until the agency can produce documentation that all staff have completed the mandated training. Failure to be in compliance will result in a fine per each incidence. If the agency continues to be non-compliant, the state and federal funding will be lost. For policies like this to become a reality, the U.S.&amp;nbsp;National Association of Social Workers must commit to being the voice against social injustice by exposing stereotypes that perpetuate institutional racism and must be committed to lobbying for laws supporting equality and against those that oppress individuals.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2358&quot;&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;In addition to lobbying for policies to mandate and enforce cultural competency training for state and federal employees, social workers can empower clients by assisting them in initiating formal complaints about the institutional racism they have experienced. Organizing forums in the community and facilitating opportunities for African-American males to share their perspectives on how institutional racism has impacted their lives can be effective in increasing awareness and knowledge. Finally, social workers can assist businesses by identifying opportunities to create positive change by constructing expectations and accountability for how the organizations will address institutional racism.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2356&quot; id=&quot;Sec11&quot;&gt;&lt;span data-dcnode-id=&quot;2357&quot; instrument_node=&quot;&quot;&gt;Future Research&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2354&quot;&gt;&lt;span data-dcnode-id=&quot;2355&quot; instrument_node=&quot;&quot;&gt;When working with African-American males, it is important to consider the traumatic effects of racism. Social workers and all mental health professionals should acknowledge how stereotypes contribute to racist acts, resulting in trauma. Future research should focus on the psychological effects of racism (increased stress, fear, anger, self- hatred, depression) on African-American males and how their experiences with racism impact their outcomes. Rather than stereotyping African-American males as angry, paranoid, lazy, or substance abusers, social workers should seek to understand the trauma African-American males are experiencing and provide culturally sensitive trauma-focused therapy. Perhaps the anger is a result of racist experiences and the paranoia is justified due to continuous stereotypes and unjust treatment. The laziness may be a lack of motivation due to frustration and hopelessness as a result of institutional racism, and the substance abuse may be self-medicating behaviors because mental health professionals are not treating the trauma.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2352&quot;&gt;&lt;span data-dcnode-id=&quot;2353&quot; instrument_node=&quot;&quot;&gt;Future studies should also examine historical trauma. As a result of slavery, institutional racism, and years of discrimination, traumas can be transmitted across generations. African-American males do not necessarily have to experience racism directly to experience traumatic effects. For instance, African-American males see daily how they are stereotyped in the media; they often hear their parents talking about not getting interviews, jobs, or promotions because of discrimination; and they see reports of other unarmed African-American males being brutally killed by the police on the news. Although they may not be experiencing these things directly, hearing and seeing these situations can be traumatic, instilling fear, anger, and mistrust. Social workers often experience secondary trauma (compassion fatigue) as a result of being exposed to traumatic material they hear from their clients. Much consideration is given to this and self-care is emphasized in social work departments to reduce the traumatic experiences associated with compassion fatigue. Perhaps, more attention should be given to historical trauma faced by African-American males and effective trauma-focused interventions that will benefit them. Social workers must take action and advocate that racism be included in discussions and definitions of trauma in order to provide appropriate culturally competent services.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2336&quot; data-title=&quot;Conclusion&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2337&quot; id=&quot;Sec12-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2347&quot; id=&quot;Sec12&quot;&gt;&lt;span data-dcnode-id=&quot;2348&quot; instrument_node=&quot;&quot;&gt;Conclusion&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2338&quot; id=&quot;Sec12-content&quot;&gt;&lt;p data-dcnode-id=&quot;2339&quot;&gt;&lt;span data-dcnode-id=&quot;2346&quot; instrument_node=&quot;&quot;&gt;Stereotypes are deeply embedded in U.S. culture and often influence acts of prejudice and systemic racism that have contributed to the inequalities of African-American males. Social workers need to continue to bring awareness to the devastating consequences of stereotypes and their impact on laws and policies that perpetuate race disparities in education and employment outcomes, and arrests and sentencing in the judicial system. Social workers must also advocate for changes at the state and federal level to mandate that cultural competency training is implemented in all state and federal agencies to increase individuals’ awareness and knowledge of other cultures that enhance their effectiveness to work with culturally diverse populations. The U.S. government has failed to comply with and enforce CERD, thus allowing human rights violations and racial discrimination to develop, persist, and go unreported and unpunished (Henderson &lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2344&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR34&quot; id=&quot;ref-link-section-d189313771e901&quot; title=&quot;Henderson, L. (2013). Why is racial injustice still permitted in the United States? An international human rights perspective on the United States’ inadequate compliance with the international convention in the elimination of all forms of racial discrimination. Wisconsin International Law Journal, 31(2), 323–351 Retrieved from 
                    https://hosted.law.wisc.edu/wordpress/wilj/files/2014/01/Herndon_final_v2.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2345&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt;). Social workers need to advocate that the Articles of UDHR and CERD be enforced to adopt immediate and effective measures that combat prejudices and promote understanding, tolerance, and friendship among nations and racial or ethnic groups (Henderson &lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2341&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR34&quot; id=&quot;ref-link-section-d189313771e904&quot; title=&quot;Henderson, L. (2013). Why is racial injustice still permitted in the United States? An international human rights perspective on the United States’ inadequate compliance with the international convention in the elimination of all forms of racial discrimination. Wisconsin International Law Journal, 31(2), 323–351 Retrieved from 
                    https://hosted.law.wisc.edu/wordpress/wilj/files/2014/01/Herndon_final_v2.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2342&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2340&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2335&quot; instrument_node=&quot;&quot;&gt;
