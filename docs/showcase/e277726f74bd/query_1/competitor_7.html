=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR55&quot; id=&quot;ref-link-section-d189313771e542&quot; title=&quot;Ogbu, J. U. (2004). Collective identity and the burden of “acting White” in black history, community and education. The Urban Review, 36(1), 1–35.&quot;&gt;&lt;span data-dcnode-id=&quot;2656&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2654&quot; instrument_node=&quot;&quot;&gt;) refers to African-Americans as “caste-like” minorities because they were involuntarily incorporated into American society, have often been victimized by job ceilings keeping them in low-paying jobs that require little education, and view their unequal status in society as irreversible. Thus, African-Americans do not see the value of an education because of the limited opportunities available to them. Environmental factors, lack of resources, stereotypes, and institutional racism are rarely considered by the mainstream population when considering the race achievement gap. Instead, throughout history, these disparities in educational outcomes have been utilized to support stereotypical views of African-American male intelligence.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2592&quot; data-title=&quot;Stereotypes and the Work Force&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2593&quot; id=&quot;Sec4-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2648&quot; id=&quot;Sec4&quot;&gt;&lt;span data-dcnode-id=&quot;2649&quot; instrument_node=&quot;&quot;&gt;Stereotypes and the Work Force&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2594&quot; id=&quot;Sec4-content&quot;&gt;&lt;p data-dcnode-id=&quot;2640&quot;&gt;&lt;span data-dcnode-id=&quot;2647&quot; instrument_node=&quot;&quot;&gt;The poor educational outcomes of African-American males drastically impact African-American families and communities because most high-paying jobs require a diploma or some type of specialized training. If 40% of African-American males are dropping out of school, it will be very likely that they will live in poverty and have a difficult time providing for their families. In 2010, the unemployment rate for African-American males over age 20 was 17.5% as compared to 7.9% for Caucasians (US Department of Labor, Bureau of Labor Statistics &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2645&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR82&quot; id=&quot;ref-link-section-d189313771e554&quot; title=&quot;US Department of labor, Bureau of labor statistics. (2011). Retrieved from 
                    https://www.bls.gov/
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2646&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt;) and 27.4% of African-Americans were poor compared to 9.9% of Caucasians (U.S. Bureau of the Census &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2642&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR77&quot; id=&quot;ref-link-section-d189313771e557&quot; title=&quot;U.S. Bureau of the Census. (2010). Retrieved from 
                    https://www.census.gov/topics/income-poverty/poverty/data.html
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2643&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2641&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2614&quot;&gt;&lt;span data-dcnode-id=&quot;2639&quot; instrument_node=&quot;&quot;&gt;One factor affecting African-American employment is stereotypes held by employers that often result in covert racism in the hiring process (Cornelius &lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2637&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d189313771e563&quot; title=&quot;Cornelius, T. H. (2013). “I’m a black man and I’m doing this job very well”: how African American professional men negotiate the impact of racism on their career development. Journal of African American Studies, 17, 444–460. 
                    https://doi.org/10.1007/s12111-012-9225-2
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2638&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2636&quot; instrument_node=&quot;&quot;&gt;). Bertand and Mullainathan (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;2634&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR2&quot; id=&quot;ref-link-section-d189313771e566&quot; title=&quot;Bertand, M. &amp;amp; Mullainathan, S. (2004). Are Emily adn Greg more employable than Lakisha and Jamal? A field experiment on labor market discrimination. The American Review, 94(4), 991–1013.&quot;&gt;&lt;span data-dcnode-id=&quot;2635&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2633&quot; instrument_node=&quot;&quot;&gt;) found that in identical resumes, altering the name from an European name to an African-American sounding name resulted in the European name receiving 50% more call-backs from employers (Blackmon and Thomas &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2631&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d189313771e569&quot; title=&quot;Blackmon, S. M., &amp;amp; Thomas, A. J. (2014). Linking contextual affordances: examining racial-ethnic socialization and parental career support among African American college students. Journal of Career Development, 41(4), 301–320. 
                    https://doi.org/10.1177/0894845313495588
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2630&quot; instrument_node=&quot;&quot;&gt;). Therefore, obtaining employment for African-Americans is affected by stereotypes. According to the Harvard Law Review (&lt;/span&gt;&lt;a aria-label=&quot;Reference 1991&quot; data-dcnode-id=&quot;2628&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR33&quot; id=&quot;ref-link-section-d189313771e572&quot; title=&quot;Harvard Law Review. (1991). Invisible man: Black and male under Title VII. Harvard Law Review, 104(3), 749–768.&quot;&gt;&lt;span data-dcnode-id=&quot;2629&quot; instrument_node=&quot;&quot;&gt;1991&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2627&quot; instrument_node=&quot;&quot;&gt;), African-American men have many characteristics (verbal directness, expressive, assertive, etc.) that conflict with a predominantly White work environment. These perceived characteristics are stereotypes held by society that explain discrimination, such as the disproportionate salaries and employment rates among African-American men (Cornelius &lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2625&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d189313771e575&quot; title=&quot;Cornelius, T. H. (2013). “I’m a black man and I’m doing this job very well”: how African American professional men negotiate the impact of racism on their career development. Journal of African American Studies, 17, 444–460. 
                    https://doi.org/10.1007/s12111-012-9225-2
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2626&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2624&quot; instrument_node=&quot;&quot;&gt;). According to Cornelius (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2622&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d189313771e579&quot; title=&quot;Cornelius, T. H. (2013). “I’m a black man and I’m doing this job very well”: how African American professional men negotiate the impact of racism on their career development. Journal of African American Studies, 17, 444–460. 
                    https://doi.org/10.1007/s12111-012-9225-2
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2621&quot; instrument_node=&quot;&quot;&gt;), African-American professional men are twice as likely to be unemployed and earn 20% less than their White counterparts (Current Population Survey &lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;2619&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR15&quot; id=&quot;ref-link-section-d189313771e582&quot; title=&quot;Current Population Survey (CPS) (2008). United States Census Bureau.&quot;&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2618&quot; instrument_node=&quot;&quot;&gt;). Of African-American employed men, only 22% are in management/professional jobs compared to 33% of White men (US Department of Labor, Bureau of Labor Statistics&amp;nbsp;&lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2616&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR81&quot; id=&quot;ref-link-section-d189313771e585&quot; title=&quot;US Department of labor, Bureau of labor statistics. (2007). Retrieved from 
                    https://www.bls.gov/cps
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2617&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2615&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2609&quot;&gt;&lt;span data-dcnode-id=&quot;2613&quot; instrument_node=&quot;&quot;&gt;Pager (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2611&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR57&quot; id=&quot;ref-link-section-d189313771e591&quot; title=&quot;Pager, D. (2003). The mark of a criminal record. American Journal of Sociology, 108(5), 937–975 Retrived from 
                    http://www.jstor.org/stable/10.1086/374403?seq=25#page_scan_tab_contents
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2612&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;) conducted a study of Black and White men who applied for hundreds of low wage jobs. Their resumes were equivalent differing only in race. The results of the study showed that African-American male applicants are less likely to be invited to interview, thereby providing fewer opportunities to establish rapport with the employer and demonstrate their skills. African-American males are also less than half as likely to receive consideration by employers as their White counterparts. Pager also found that criminal convictions were less problematic for the White participants. The White males who reported that they were just out of prison were as likely to be called back for a second interview as African-American men who had no criminal history at all. Among African-American males without criminal records, only 14% received call-backs compared to 34% of their White non-criminal counterparts. White men with criminal records received more favorable treatment (17%) compared to African-American males without (14%). Criminal records for African-American men are interrelated to the criminal justice system and difficult to overcome due to the convictions reinforcing longstanding stereotypes of African-American men.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2595&quot;&gt;&lt;span data-dcnode-id=&quot;2608&quot; instrument_node=&quot;&quot;&gt;Stereotypes also play a major role in work evaluations and promotions. Rosette et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;2606&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR65&quot; id=&quot;ref-link-section-d189313771e597&quot; title=&quot;Rosette, A. S., Leonardelli, G. J., &amp;amp; Phillips, K. W. (2008). The White standard: Racial bias in leader categorization. Journal of Applied Psychology, 93(4), 758–777. 
                    https://doi.org/10.1037/0021-9010.93.4.758
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2607&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt;) found that individuals develop a set of beliefs about the behaviors and characteristics of a business leader. Being White is considered a characteristic of the prototypical business leader, and this commonly held belief may lead to biased evaluations of minority leaders, particularly African-Americans who are stereotyped as being lazy and incompetent (Rosette et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;2603&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR65&quot; id=&quot;ref-link-section-d189313771e600&quot; title=&quot;Rosette, A. S., Leonardelli, G. J., &amp;amp; Phillips, K. W. (2008). The White standard: Racial bias in leader categorization. Journal of Applied Psychology, 93(4), 758–777. 
                    https://doi.org/10.1037/0021-9010.93.4.758
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2604&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt;). These stereotypical characteristics of a leader explain why research shows that White leaders are perceived as more effective and successful than Black leaders (Rosette et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;2600&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR65&quot; id=&quot;ref-link-section-d189313771e603&quot; title=&quot;Rosette, A. S., Leonardelli, G. J., &amp;amp; Phillips, K. W. (2008). The White standard: Racial bias in leader categorization. Journal of Applied Psychology, 93(4), 758–777. 
                    https://doi.org/10.1037/0021-9010.93.4.758
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2601&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;). Racial stereotypes also explain why employees view African-Americans as lacking the knowledge and skills necessary for high-level positions (Cunningham and Bopp 2010 cited by Steward and Cunningham &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2597&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR73&quot; id=&quot;ref-link-section-d189313771e606&quot; title=&quot;Steward, A. D., &amp;amp; Cunningham, G. B. (2015). Racial identity and its impact on job applicants. Journal of Sports Management, 29, 245–256. 
                    https://doi.org/10.1123/jsm.2014-0017
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2598&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2596&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2501&quot; data-title=&quot;Stereotypes and the Justice System&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2502&quot; id=&quot;Sec5-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2590&quot; id=&quot;Sec5&quot;&gt;&lt;span data-dcnode-id=&quot;2591&quot; instrument_node=&quot;&quot;&gt;Stereotypes and the Justice System&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2503&quot; id=&quot;Sec5-content&quot;&gt;&lt;p data-dcnode-id=&quot;2582&quot;&gt;&lt;span data-dcnode-id=&quot;2589&quot; instrument_node=&quot;&quot;&gt;Many incarcerated African-American males have limited education. Stereotypes influence their school attendance, referrals for suspensions and expulsions, and completion rates (Diamond &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2587&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d189313771e617&quot; title=&quot;Diamond, J. B. (2006). Still separate and unequal: Examining race, opportunity, and school achievement in “integrated” suburbs. The Journal of Negro Education, 75(3), 495–506 Retrieved from 
                    http://search.proquest.com.proxy1.ncu.edu/docview/222067021?accountid=28180
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2588&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2586&quot; instrument_node=&quot;&quot;&gt;). The correlation between high school dropouts and prison records has been a concern across the nation. The Justice Policy Institute found that 52% of African-American males who did not graduate high school had a prison record by the time they were 30 (Bethell &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2584&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR3&quot; id=&quot;ref-link-section-d189313771e620&quot; title=&quot;Bethell, D. (2012). Igniting a passion for career development success with African American school aged males: what career and school practitioners should know. Journal of Career Planning and Adult Development, 42–56.&quot;&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2583&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2565&quot;&gt;&lt;span data-dcnode-id=&quot;2581&quot; instrument_node=&quot;&quot;&gt;Stereotyping African-Americans is prevalent in the criminal justice system. Tragic police shootings of innocent African-American males are happening at alarming rates. Too often, African-American males are stereotyped as violent, dangerous, and criminals, which reflects a long history of slavery and stereotypes (Oliver &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2579&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR56&quot; id=&quot;ref-link-section-d189313771e626&quot; title=&quot;Oliver, M. (2003). African American men as “criminal and dangerous”: implications of media portrayals of crime on the “criminalization” of African American men. Journal of African American Studies, 7(2). Retrieved from: 
                    http://www.jstor.org/stable/41819017
                    
                  ), 3–18.&quot;&gt;&lt;span data-dcnode-id=&quot;2580&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2578&quot; instrument_node=&quot;&quot;&gt;). Previous research has shown that White people express greater fear of crime when in the presence of African-American men and give more harsh recommendations for African-American suspects than for White suspects (Mauer &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2576&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR47&quot; id=&quot;ref-link-section-d189313771e629&quot; title=&quot;Mauer, M. (2011). Addressing racial disparities in incarceration. The Prison Journal, 91(3), 87S–101S. 
                    https://doi.org/10.1177/0032885511415227
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2577&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2575&quot; instrument_node=&quot;&quot;&gt;). African-Americans are incarcerated five times more than Caucasians and are 2.5 times more likely to be searched when stopped by the police. Although African-Americans make up only 12% of the US population, African-American men account for 34% of drug arrests, and 40% of the total prison population (Darensbourg et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2573&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR16&quot; id=&quot;ref-link-section-d189313771e632&quot; title=&quot;Darensbourg, A., Peres, E., &amp;amp; Blake, J. J. (2010). Overrepresentation of African American males in exclusionary discipline: the role of school-based mental health professionals in dismantling the school to prison pipeline. Journal of African American Males in Education, 1(3), 196–211.&quot;&gt;&lt;span data-dcnode-id=&quot;2574&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2572&quot; instrument_node=&quot;&quot;&gt;). It is estimated that one in every three African-American men born today will be imprisoned sometime during their lifetime (Mauer &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2570&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR47&quot; id=&quot;ref-link-section-d189313771e635&quot; title=&quot;Mauer, M. (2011). Addressing racial disparities in incarceration. The Prison Journal, 91(3), 87S–101S. 
                    https://doi.org/10.1177/0032885511415227
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2571&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2569&quot; instrument_node=&quot;&quot;&gt;). There is also strong evidence that shows that race plays a role in determining death sentences; individuals who kill White people are four times as likely to receive death sentences as those who kill African-Americans (Mauer &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2567&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR47&quot; id=&quot;ref-link-section-d189313771e638&quot; title=&quot;Mauer, M. (2011). Addressing racial disparities in incarceration. The Prison Journal, 91(3), 87S–101S. 
                    https://doi.org/10.1177/0032885511415227
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2568&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2566&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2554&quot;&gt;&lt;span data-dcnode-id=&quot;2564&quot; instrument_node=&quot;&quot;&gt;The mass incarceration of African-American males is reducing family household incomes and producing significant strains on the African-American community. African-American children are nine times more likely to have an incarcerated parent, which is the largest factor contributing to father-child separation in African-American families (Perry and Bright &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2562&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR58&quot; id=&quot;ref-link-section-d189313771e644&quot; title=&quot;Perry, &amp;amp; Bright. (2012). African American fathers and incarceration: paternal Involvement and child outcomes. Social Work in Public Health, 27, 187–203. 
                    https://doi.org/10.1080/19371918.2011.629856
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2563&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2561&quot; instrument_node=&quot;&quot;&gt;). Single parent families are more likely to be in poverty, and there is a correlation between poverty and education outcomes, employment, and the likelihood of engaging in criminal activity (Comfort &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2559&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR12&quot; id=&quot;ref-link-section-d189313771e647&quot; title=&quot;Comfort, M. (2012). It was basically college to us: poverty, prison, and emerging adulthood. Journal of Poverty, 16, 308–322. 
                    https://doi.org/10.1080/10875549.2012.695923
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2560&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2558&quot; instrument_node=&quot;&quot;&gt;; Darensbourg et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2556&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR16&quot; id=&quot;ref-link-section-d189313771e650&quot; title=&quot;Darensbourg, A., Peres, E., &amp;amp; Blake, J. J. (2010). Overrepresentation of African American males in exclusionary discipline: the role of school-based mental health professionals in dismantling the school to prison pipeline. Journal of African American Males in Education, 1(3), 196–211.&quot;&gt;&lt;span data-dcnode-id=&quot;2557&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2555&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2537&quot;&gt;&lt;span data-dcnode-id=&quot;2553&quot; instrument_node=&quot;&quot;&gt;The media also plays a role in perpetuating stereotypes of African-American males as violent criminals. Reality-based TV shows demonstrate that White police officers are more likely to employ force against Black and Latino suspects than toward White suspects (Oliver &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2551&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR56&quot; id=&quot;ref-link-section-d189313771e656&quot; title=&quot;Oliver, M. (2003). African American men as “criminal and dangerous”: implications of media portrayals of crime on the “criminalization” of African American men. Journal of African American Studies, 7(2). Retrieved from: 
                    http://www.jstor.org/stable/41819017
                    
                  ), 3–18.&quot;&gt;&lt;span data-dcnode-id=&quot;2552&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2550&quot; instrument_node=&quot;&quot;&gt;). Although there is often bias in the way in which African-American males are depicted in the media, these reality TV recordings are congruent with what is happening in many communities across the USA. African-American men are the target of mistakenly placed police aggression, which confirms that race plays a role in false assumptions of dangerous individuals (Oliver &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2548&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR56&quot; id=&quot;ref-link-section-d189313771e659&quot; title=&quot;Oliver, M. (2003). African American men as “criminal and dangerous”: implications of media portrayals of crime on the “criminalization” of African American men. Journal of African American Studies, 7(2). Retrieved from: 
                    http://www.jstor.org/stable/41819017
                    
                  ), 3–18.&quot;&gt;&lt;span data-dcnode-id=&quot;2549&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2547&quot; instrument_node=&quot;&quot;&gt;). A study of deadly force by Philadelphia police supported the idea that police are susceptible to implicit bias (Fachner and Carter &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2545&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR21&quot; id=&quot;ref-link-section-d189313771e662&quot; title=&quot;Fachner, G., &amp;amp; Carter, S. (2015). An assessment of deadly force in the Philadelphia police department. Collaborative Reform Initiative. Retrieved from 
                    https://ric-zai-inc.com/Publications/cops-w0753-pub.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2546&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2544&quot; instrument_node=&quot;&quot;&gt;). The study examined the label of threat perception failure. In these instances, the officers believed that the person was armed, and in many instances, it turned out not to be true. The findings revealed that failures were more likely to occur when the subject was Black or Latino (Fachner and Carter &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2542&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR21&quot; id=&quot;ref-link-section-d189313771e665&quot; title=&quot;Fachner, G., &amp;amp; Carter, S. (2015). An assessment of deadly force in the Philadelphia police department. Collaborative Reform Initiative. Retrieved from 
                    https://ric-zai-inc.com/Publications/cops-w0753-pub.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2543&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2541&quot; instrument_node=&quot;&quot;&gt;). There have also been a plethora of shoot/ do-not-shoot studies in which a subject is sitting in front of a computer monitor and photos pop up very quickly on the screen showing a White or a Black man. The man either has a gun or a neutral object like a cell phone in his hand. The subject is told to hit the shoot key if they see a threat and if a threat is not seen to hit the “do not shoot” key. The findings revealed that people were quicker to shoot an unarmed African-American man than an unarmed White man, suggesting implicit bias affects these actions (Department of Justice Report &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2539&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR17&quot; id=&quot;ref-link-section-d189313771e668&quot; title=&quot;Department of Justice Report. (2016). Retrieved from 
                    https://www.justice.gov/crt/file/883296/download
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2540&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2538&quot; instrument_node=&quot;&quot;&gt;). Police officers, like many other people, have an implicit bias linking African-Americans males to crime. Therefore, Black crime implicit bias is impacted in the use of deadly force against African-American males in the USA.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2526&quot;&gt;&lt;span data-dcnode-id=&quot;2536&quot; instrument_node=&quot;&quot;&gt;The undergirding perceptions for treatment of African-American males were born out of the policing policies established from slavery and the Black Codes in the Deep South (BLEAUSA &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2534&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR5&quot; id=&quot;ref-link-section-d189313771e675&quot; title=&quot;BLEAUSA-Blacks in Law Enforcement of America. (2014). Retrieved from 
                    http://www.bleausa.org/modern-police-policies-rooted-in-old-south-slave-codes
                    
                   Bridges (2012). Retrieved from 
                    https://www.youtube.com/watch?v=b0bhSQR14nw
                    
                  
                        &quot;&gt;&lt;span data-dcnode-id=&quot;2535&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2533&quot; instrument_node=&quot;&quot;&gt;, p2). This barbaric dehumanizing handling of African-Americans continued post-legal slavery and after the Civil War (Chaney and Robertson &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2531&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR8&quot; id=&quot;ref-link-section-d189313771e678&quot; title=&quot;Chaney, C., &amp;amp; Robertson, R. (2015). Armed and dangerous? An examination of fatal shootings of unarmed Black people by police. Journal of Pan African Studies, 8(4), 45–78.&quot;&gt;&lt;span data-dcnode-id=&quot;2532&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2530&quot; instrument_node=&quot;&quot;&gt;). Just as alarming, the composition of the patrollers was typical semblance of early police forces in the USA (all White males), who were given legal authority to mistreat African-American males in any manner they saw fit. During the Civil Rights era, it became public knowledge that African-American males were victims of police brutality and yet the mysterious uninvestigated deaths “in the line of duty” were publicly acceptable. Today’s trend of unarmed African American males being killed by police is news-worthy because of videos and public awareness of the real incident. Dulaney (&lt;/span&gt;&lt;a aria-label=&quot;Reference 1996&quot; data-dcnode-id=&quot;2528&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR20&quot; id=&quot;ref-link-section-d189313771e681&quot; title=&quot;Dulaney, W. M. (1996). Black police in America. Bloomington, IN: University of Indiana Press.&quot;&gt;&lt;span data-dcnode-id=&quot;2529&quot; instrument_node=&quot;&quot;&gt;1996&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2527&quot; instrument_node=&quot;&quot;&gt;) suggests that these shooting are the same type of violent policing that African Americans have been receiving since the 17th century.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2518&quot;&gt;&lt;span data-dcnode-id=&quot;2525&quot; instrument_node=&quot;&quot;&gt;These incidents of police brutality can be very traumatic in the African American community. Some African American males may be experiencing PTSD symptoms due to discrimination (Sibrava et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2523&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR68&quot; id=&quot;ref-link-section-d189313771e687&quot; title=&quot;Sibrava, N.J., Perez Benitez, A.C.I., Weisberg, R.B., Bjornsson, A.S., Moitra, E., &amp;amp; Keller, M.B. (2019). Posttraumatic stress disorder in African American and Latinx adults: Clinical course and the role of racial and ethnic discrimination. American Psychologist, 74(1), 101–116. 
                    https://doi.org/10.1037/amp0000339
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2524&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2522&quot; instrument_node=&quot;&quot;&gt;). However, they may not be validated by mental health professionals because racism has not traditionally been considered traumatic and there is limited research examining the relationship between discrimination and PTSD (Sibrava et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2019&quot; data-dcnode-id=&quot;2520&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR68&quot; id=&quot;ref-link-section-d189313771e690&quot; title=&quot;Sibrava, N.J., Perez Benitez, A.C.I., Weisberg, R.B., Bjornsson, A.S., Moitra, E., &amp;amp; Keller, M.B. (2019). Posttraumatic stress disorder in African American and Latinx adults: Clinical course and the role of racial and ethnic discrimination. American Psychologist, 74(1), 101–116. 
                    https://doi.org/10.1037/amp0000339
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2521&quot; instrument_node=&quot;&quot;&gt;2019&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2519&quot; instrument_node=&quot;&quot;&gt;). It is important to consider that many African American males live in fear because it is not uncommon for them or someone they are acquainted with to be treated unfairly, discriminated against of even harassed by the police or someone in authority.. If African-American males do not have a personal experience with racism, they often witness it on television/social media. It is very difficult to excel in school, work, or other areas of one’s life when safety needs are not met. Even if these incidents of perceived stereotypes and racism discussed throughout the paper at any level (school, work, in the community) were not experienced directly, African-American males can still experience secondary trauma by hearing the stories of other African-Americans who have experienced trauma as a result of racism.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2504&quot;&gt;&lt;span data-dcnode-id=&quot;2517&quot; instrument_node=&quot;&quot;&gt;Smith and Holmes (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2515&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR70&quot; id=&quot;ref-link-section-d189313771e696&quot; title=&quot;Smith, B., &amp;amp; Holmes, M. (2003). Community accountability, minority threat, and police brutality: an examination of civil rights criminal complaints. Criminology, 41(4), 1035–1064.&quot;&gt;&lt;span data-dcnode-id=&quot;2516&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2514&quot; instrument_node=&quot;&quot;&gt;) found that brutality toward African-American males occurs because (1) authorities and White citizens tend to stereotype minorities as dangerous and criminally prone; (2) authorities see racially dissimilar minority groups as threatening to the existing social order; and (3) the police may perceive poor minority citizens as a direct threat to their well-being. Jennings (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2512&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR39&quot; id=&quot;ref-link-section-d189313771e699&quot; title=&quot;Jennings, R. (2011). From slavery to contemporary genocide: a literary and linguistic analysis of why American Blacks deserve reparations. Race, Gender, &amp;amp; Class, 18(1/2), 73–94.&quot;&gt;&lt;span data-dcnode-id=&quot;2513&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2511&quot; instrument_node=&quot;&quot;&gt;) suggest that the brutalizing of African-Americans is so routinely done by the police that too often the public thinks the behavior is normal. The main point is that the police “carry the memories and programmed racism forming their origination” (p.77). As previously noted, Whites devalued African Americans and used slave patrols to systematically control them and protect the interest of slave owners Today, the police fulfill the same roles and often feel justified in their efforts to carry out past practices of law enforcement functions. Hence, shooting and killing unarmed African-American males continue the normalizing of controlling African-Americans and protecting the White community (Turner et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2509&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR76&quot; id=&quot;ref-link-section-d189313771e702&quot; title=&quot;Turner, K., Giacopassi, &amp;amp; Vandiver. (2006). Ignoring the past: coverage of slavery and slave patrols in criminal justice texts. Journal of Criminal Justice.&quot;&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt;). Police brutality often goes unreported or unpunished, which is a clear violation of the Convention on the Elimination of All Forms of&amp;nbsp;Racial Discrimination (CERD) (Henderson &lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2506&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR34&quot; id=&quot;ref-link-section-d189313771e705&quot; title=&quot;Henderson, L. (2013). Why is racial injustice still permitted in the United States? An international human rights perspective on the United States’ inadequate compliance with the international convention in the elimination of all forms of racial discrimination. Wisconsin International Law Journal, 31(2), 323–351 Retrieved from 
                    https://hosted.law.wisc.edu/wordpress/wilj/files/2014/01/Herndon_final_v2.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2507&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2505&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2349&quot; data-title=&quot;Implications for Social Work Practice&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2350&quot; id=&quot;Sec6-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2499&quot; id=&quot;Sec6&quot;&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt;Implications for Social Work Practice&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2351&quot; id=&quot;Sec6-content&quot;&gt;&lt;p data-dcnode-id=&quot;2497&quot;&gt;&lt;span data-dcnode-id=&quot;2498&quot; instrument_node=&quot;&quot;&gt;The stereotypes of African-American males are an ongoing concern in the USA dating back to slavery. These stereotypes are embedded in the US culture and often result in systematic racism. There is not one intervention that can miraculously stop the negative stereotypes of African-Americans or the racism in the schools, workforce, and judicial system. However, cultural competency training can be a first step in reducing the negative stereotypes, which may decrease some of the systematic racism discussed throughout this paper. Teachers, business people, police officers, and all professionals need cultural competency training from a human rights perspective to develop a sense of awareness and a skill set to work effectively with diverse populations.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2495&quot; id=&quot;Sec7&quot;&gt;&lt;span data-dcnode-id=&quot;2496&quot; instrument_node=&quot;&quot;&gt;Cultural Competency Interventions&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2484&quot;&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;The authors are aware that cultural competency trainings are not the total solution to dismantling stereotypes. However, the general notion that the unconscious significantly influences human behavior is a noted fact. Earlier documentation presented by Freud continues to the present day (Nosek et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2492&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR54&quot; id=&quot;ref-link-section-d189313771e723&quot; title=&quot;Nosek, B. A., Hawkins, C. B., &amp;amp; Frazier, R. S. (2011). Implicit social cognition: from measures to mechanisms. Trends in Cognitive Science, 15(4), 152–159.&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2491&quot; instrument_node=&quot;&quot;&gt;). In order for society to move beyond the subconscious or unawareness of implicit bias, individuals must begin the process of recodification of stereotypes that are directly tied to the unconscious thoughts associated with racial groups, especially African-American males. Cultural competency training has been successful in some instances in dispelling stereotypes that decrease institutional racism. Although cultural competency training alone is not sufficient to address more than 200&amp;nbsp;years of bondage, oppression, discrimination, and injustices that have played a major role in traumatizing African-American males, it is the first step to begin the long overdue process of reducing stereotypes, while improving cultural sensitivity. The goal of cultural competency training is to (1) increase awareness, (2) gain knowledge, and (3) acquire skills to work with diverse cultures (Hickey &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2489&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR37&quot; id=&quot;ref-link-section-d189313771e726&quot; title=&quot;Hickey, R. (2016). Should cultural competency be a part of police testing? Law Enforcement Executive Forum, 16(2), 85–97.&quot;&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2488&quot; instrument_node=&quot;&quot;&gt;). The literature has documented that when people become aware of how stereotypes influence their behavior and gain knowledge about other cultures, they are able to understand, communicate, and effectively interact with people across cultures. It is imperative that the five core notions of human rights—human dignity; non-discrimination; civil and political rights; economic, social, and cultural rights; and solidarity rights—are integrated in cultural competency training (Rozas and Garran &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2486&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR66&quot; id=&quot;ref-link-section-d189313771e729&quot; title=&quot;Rozas, L. W., &amp;amp; Garran, A. M. (2016). Towards a human rights culture in social work education. British Journal of Social Work, 46(4), 890–905. 
                    https://doi.org/10.1093/bjsw/bcv03
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2487&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2483&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2481&quot; id=&quot;FPar1&quot;&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;Awareness&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2475&quot;&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt;Increasing awareness about the negative impacts of stereotypes on African-American males is an essential first step to increasing social equity mandated by the UDHR (fair access to resources such as education, healthcare, jobs, etc.; full participation in the political and cultural life in one’s community; and self-determination in meeting one’s fundamental needs). Many professionals are reluctant to believe that their own behaviors, their peers' behavior, and their institution's policies may conflict with their professional ethics (Geiger 2006 cited by Griffith et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2477&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR30&quot; id=&quot;ref-link-section-d189313771e739&quot; title=&quot;Griffith, et al. (2007). Dismantling institutional racism: theory and action. American Journal of Community Psychology., 39(3-4), 381–392. 
                    https://doi.org/10.1007/s10464-007-9117-0
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2476&quot; instrument_node=&quot;&quot;&gt;) and may be contributing to institutional racism. For this reason, it is important to practice from a social justice framework to raise consciousness about power and privilege and to encourage advocating against structural forces that violate human rights and perpetuate racism. Many African-American men are resistant to receive medical treatment and mental health services, to participate in school activities, or to interact with the police due to fear and lack of trust, resulting from institutional racism. Therefore, it is imperative that medical and mental health professionals, educators, business people, law enforcement, and politicians recognize the biases they possess that may be negatively influencing the services they provide.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2474&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2460&quot;&gt;&lt;span data-dcnode-id=&quot;2473&quot; instrument_node=&quot;&quot;&gt;One effective way to combat stereotypes is to increase awareness of how stereotypes affect decision-making (Devine et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2471&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR18&quot; id=&quot;ref-link-section-d189313771e745&quot; title=&quot;Devine, P. G., Forscher, P. S., Austin, A. J., &amp;amp; Cox, W. T. L. (2012). Long term reduction in implicit race bias: a prejudice habit-breaking intervention. Journal of Experimental Social Psychology, 48(6), 1267–1278.&quot;&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2470&quot; instrument_node=&quot;&quot;&gt;). Becoming aware of one’s beliefs is the first step to changing values, beliefs, and behaviors (Wahler &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2468&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR83&quot; id=&quot;ref-link-section-d189313771e748&quot; title=&quot;Wahler, E. A. (2012). Identifying and challenging social work student biases. Social Work Education, 31(8), 1058–1070.&quot;&gt;&lt;span data-dcnode-id=&quot;2469&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2467&quot; instrument_node=&quot;&quot;&gt;). There are many activities/exercises/surveys that can be used to increase awareness about one’s stereotypes. Asking questions regarding racial attitudes; and characteristics, beliefs, and perceptions of various populations can help identify a person’s tendency to respond with prejudice. People need to be aware of when biased responses are likely to occur and how to replace those biased responses with responses more consistent with their values (Devine et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2465&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR18&quot; id=&quot;ref-link-section-d189313771e751&quot; title=&quot;Devine, P. G., Forscher, P. S., Austin, A. J., &amp;amp; Cox, W. T. L. (2012). Long term reduction in implicit race bias: a prejudice habit-breaking intervention. Journal of Experimental Social Psychology, 48(6), 1267–1278.&quot;&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2464&quot; instrument_node=&quot;&quot;&gt;). Simply being aware one has stereotypes will not change an individual’s behaviors. According to Devine et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2462&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR18&quot; id=&quot;ref-link-section-d189313771e754&quot; title=&quot;Devine, P. G., Forscher, P. S., Austin, A. J., &amp;amp; Cox, W. T. L. (2012). Long term reduction in implicit race bias: a prejudice habit-breaking intervention. Journal of Experimental Social Psychology, 48(6), 1267–1278.&quot;&gt;&lt;span data-dcnode-id=&quot;2463&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2461&quot; instrument_node=&quot;&quot;&gt;), racial prejudice is an unconscious habit. In order to break the habit, the individual will have to become aware of the unconscious nature of their racial bias and stereotypes, become concerned that they have this bias, and implement strategies that are effective in retraining their automatic responses to racial stimuli. Devine et al. found that increasing awareness of one’s biases will increase their concern about how their biases affect their actions and will motivate them to learn strategies to amend their biases and how their biases affect their behaviors.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2459&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2457&quot; id=&quot;FPar2&quot;&gt;&lt;span data-dcnode-id=&quot;2458&quot; instrument_node=&quot;&quot;&gt;Knowledge&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2456&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2451&quot;&gt;&lt;span data-dcnode-id=&quot;2455&quot; instrument_node=&quot;&quot;&gt;Once an individual becomes aware of their stereotypes, they can begin to increase their knowledge about other cultures and ways to avoid stereotyping. Some effective strategies to replace bias responses with non-bias responses are replacement of stereotypes (recognizing biased responses, considering how the response can be avoided in the future, and replacing them with unbiased responses), counter-stereotype imaging (imagining in detail positive aspects of the group that contradicts their negative stereotypes), and individuating members of ethnic groups (looking at them as individuals rather than a group) (Devine et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2453&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR18&quot; id=&quot;ref-link-section-d189313771e765&quot; title=&quot;Devine, P. G., Forscher, P. S., Austin, A. J., &amp;amp; Cox, W. T. L. (2012). Long term reduction in implicit race bias: a prejudice habit-breaking intervention. Journal of Experimental Social Psychology, 48(6), 1267–1278.&quot;&gt;&lt;span data-dcnode-id=&quot;2454&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2452&quot; instrument_node=&quot;&quot;&gt;). Social workers, teachers, police officers, health professionals, business people, etc. can have this habit-breaking training within the context of their fields, which could reduce unjust treatment and institutional racism in schools, the justice system, health care, and businesses.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2450&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2442&quot;&gt;&lt;span data-dcnode-id=&quot;2449&quot; instrument_node=&quot;&quot;&gt;As awareness increases, it is also important for people to learn about other cultures. Education is key to dismantling the stereotypes that continue to deny African-American men equal access to education, employment, and other resources in their communities. Educating others can be as simple as presenting them with the research that demonstrates how, why, and when stereotypes are most likely to influence decisions (Grewal &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2447&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR29&quot; id=&quot;ref-link-section-d189313771e771&quot; title=&quot;Grewal, D. (2010). Reducing the impact of negative stereotypes on the careers of women and minority scientists. Science.&quot;&gt;&lt;span data-dcnode-id=&quot;2448&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2446&quot; instrument_node=&quot;&quot;&gt;). Research shows that educating people about stereotypes helps foster diversity (Grewal &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2444&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR29&quot; id=&quot;ref-link-section-d189313771e774&quot; title=&quot;Grewal, D. (2010). Reducing the impact of negative stereotypes on the careers of women and minority scientists. Science.&quot;&gt;&lt;span data-dcnode-id=&quot;2445&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2443&quot; instrument_node=&quot;&quot;&gt;). In order to ensure social equity, cultural competency training must be implemented at all levels of society and integrated into social policies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2441&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2418&quot;&gt;&lt;span data-dcnode-id=&quot;2440&quot; instrument_node=&quot;&quot;&gt;Another critical piece to dismantling stereotypes is exposure. Having interaction with individuals of different ethnic groups has been effective in increasing knowledge of other cultures and reducing stereotypes (Devine et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2438&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR18&quot; id=&quot;ref-link-section-d189313771e780&quot; title=&quot;Devine, P. G., Forscher, P. S., Austin, A. J., &amp;amp; Cox, W. T. L. (2012). Long term reduction in implicit race bias: a prejudice habit-breaking intervention. Journal of Experimental Social Psychology, 48(6), 1267–1278.&quot;&gt;&lt;span data-dcnode-id=&quot;2439&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2437&quot; instrument_node=&quot;&quot;&gt;). According to the intergroup theory (Pettigrew &lt;/span&gt;&lt;a aria-label=&quot;Reference 1998&quot; data-dcnode-id=&quot;2435&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR60&quot; id=&quot;ref-link-section-d189313771e783&quot; title=&quot;Pettigrew, T. F. (1998). Intergroup contact theory. Annual Review of Psychology, 49(1), 65–85.&quot;&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;1998&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2434&quot; instrument_node=&quot;&quot;&gt;), increased contact with diverse individuals and having personal relationships with people from different ethnic groups can lower the level of prejudice toward minorities. This theory explains why people who have friends or personal relationships with diverse people show less discrimination and bias toward members of those groups (Wahler &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2432&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR83&quot; id=&quot;ref-link-section-d189313771e786&quot; title=&quot;Wahler, E. A. (2012). Identifying and challenging social work student biases. Social Work Education, 31(8), 1058–1070.&quot;&gt;&lt;span data-dcnode-id=&quot;2433&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2431&quot; instrument_node=&quot;&quot;&gt;). Lowery (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2002&quot; data-dcnode-id=&quot;2429&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR43&quot; id=&quot;ref-link-section-d189313771e789&quot; title=&quot;Lowery, R. M. (2002). Grappling with issues of gender equity: preservice teachers' reflections on children's books. Journal of children's literature, 28(2), 25–32.&quot;&gt;&lt;span data-dcnode-id=&quot;2430&quot; instrument_node=&quot;&quot;&gt;2002&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2428&quot; instrument_node=&quot;&quot;&gt;) contends that the more opportunities teachers have to interact with different student populations, the more open they will be to accepting diverse student populations. Research has also shown that trainings and activities that involve interactions between diverse groups tend to be more successful in promoting long-term attitudinal changes, compared to those activities simply providing information about minority groups (Oskamp 2000 as cited by Wahler &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2426&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR83&quot; id=&quot;ref-link-section-d189313771e792&quot; title=&quot;Wahler, E. A. (2012). Identifying and challenging social work student biases. Social Work Education, 31(8), 1058–1070.&quot;&gt;&lt;span data-dcnode-id=&quot;2427&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2425&quot; instrument_node=&quot;&quot;&gt;). Petrovish and Lowe (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2005&quot; data-dcnode-id=&quot;2423&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR59&quot; id=&quot;ref-link-section-d189313771e796&quot; title=&quot;Petrovish, A., &amp;amp; Lowe, M. (2005). Developing cultural competence: student and alumni perspectives. Journal of Teaching in Social Work, 25(3/4), 157–176.&quot;&gt;&lt;span data-dcnode-id=&quot;2424&quot; instrument_node=&quot;&quot;&gt;2005&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2422&quot; instrument_node=&quot;&quot;&gt;) found that people learned the most about groups different from themselves by exposure and relationship building with minority groups and through hearing their personal stories. Eack and Newhill (2008, as cited by Wahler &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2420&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR83&quot; id=&quot;ref-link-section-d189313771e799&quot; title=&quot;Wahler, E. A. (2012). Identifying and challenging social work student biases. Social Work Education, 31(8), 1058–1070.&quot;&gt;&lt;span data-dcnode-id=&quot;2421&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2419&quot; instrument_node=&quot;&quot;&gt;) also found that contact with individuals in a minority group (such as people who are mentally ill) was the most important factor in their comfort level and knowledge about persons with mental illness.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2417&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2415&quot; id=&quot;FPar3&quot;&gt;&lt;span data-dcnode-id=&quot;2416&quot; instrument_node=&quot;&quot;&gt;Skills&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2414&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2400&quot;&gt;&lt;span data-dcnode-id=&quot;2413&quot; instrument_node=&quot;&quot;&gt;With the insight acquired from cultural competency training and the increased knowledge of other cultures, social workers, educators, law enforcement, and policy makers will gain a skill set that will enable them to provide services that promote social equity for marginalized populations, such as African-American males. Cultural competency training not only allows people to appreciate and embrace the differences, but also enables them to recognize the similarities between cultures. Recognizing and acknowledging similarities may assist professionals (like police officers) in developing rapport with community members different from themselves and may help them react appropriately in culturally diverse situations (Hickey &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2411&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR37&quot; id=&quot;ref-link-section-d189313771e810&quot; title=&quot;Hickey, R. (2016). Should cultural competency be a part of police testing? Law Enforcement Executive Forum, 16(2), 85–97.&quot;&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2410&quot; instrument_node=&quot;&quot;&gt;). Understanding different cultures will assist professionals (social workers, police officers, educators, etc.) in diffusing negative situations because they will be able to understand how people from different cultures react in various situations based on their cultural values and beliefs (Hickey &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2408&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR37&quot; id=&quot;ref-link-section-d189313771e813&quot; title=&quot;Hickey, R. (2016). Should cultural competency be a part of police testing? Law Enforcement Executive Forum, 16(2), 85–97.&quot;&gt;&lt;span data-dcnode-id=&quot;2409&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2407&quot; instrument_node=&quot;&quot;&gt;). As cultural competent skills are acquired, professionals will treat diverse populations with respect and non-judgmental attitudes congruent with the mandates of the UDHR. It is important to note that cultural competency training will not rid an individual of all their biases. Becoming culturally competent should be viewed as a developmental process and a goal that an individual/agency is continually working toward (Cross &lt;/span&gt;&lt;a aria-label=&quot;Reference 1988&quot; data-dcnode-id=&quot;2405&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR14&quot; id=&quot;ref-link-section-d189313771e816&quot; title=&quot;Cross, T. L. (1988). Cultural competence continuum. Journal of Child and Youth Care Work, 83–85.&quot;&gt;&lt;span data-dcnode-id=&quot;2406&quot; instrument_node=&quot;&quot;&gt;1988&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2404&quot; instrument_node=&quot;&quot;&gt;). Regardless of how culturally competent an individual/agency becomes, there will always be room for growth (Cross &lt;/span&gt;&lt;a aria-label=&quot;Reference 1988&quot; data-dcnode-id=&quot;2402&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR14&quot; id=&quot;ref-link-section-d189313771e819&quot; title=&quot;Cross, T. L. (1988). Cultural competence continuum. Journal of Child and Youth Care Work, 83–85.&quot;&gt;&lt;span data-dcnode-id=&quot;2403&quot; instrument_node=&quot;&quot;&gt;1988&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2401&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2399&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;2397&quot; id=&quot;Sec8&quot;&gt;&lt;span data-dcnode-id=&quot;2398&quot; instrument_node=&quot;&quot;&gt;Social Work Curriculum&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;2383&quot;&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;To correct misconceptions about African-Americans and other cultural groups, students need to learn to distinguish between a valid generalization and a stereotype (Moore &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2394&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR48&quot; id=&quot;ref-link-section-d189313771e831&quot; title=&quot;Moore, J. (2006). Shattering stereotypes: a lesson plan for improving student attitudes and behavior toward minority groups. The Social Studies, 97(1), 35–39 Retrieved from 
                    http://eds.a.ebscohost.com/eds/pdfviewer/pdfviewer?vid=2&amp;amp;sid=f1bdaac8-a2db-49ff-ac51-44f44088ea5ba%40sessionmgr4006
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2395&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2393&quot; instrument_node=&quot;&quot;&gt;). According to Moore (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2391&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR48&quot; id=&quot;ref-link-section-d189313771e834&quot; title=&quot;Moore, J. (2006). Shattering stereotypes: a lesson plan for improving student attitudes and behavior toward minority groups. The Social Studies, 97(1), 35–39 Retrieved from 
                    http://eds.a.ebscohost.com/eds/pdfviewer/pdfviewer?vid=2&amp;amp;sid=f1bdaac8-a2db-49ff-ac51-44f44088ea5ba%40sessionmgr4006
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2392&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt;), this skill is needed to be able to advocate on behalf of others. Therefore, students must learn about the origins, purposes, and consequences of stereotypes and the ways to combat them in order to provide optimal services to their clients. Research has shown that incorporating diversity or multicultural courses into college curriculums has contributed to a positive change in racial attitudes (Radloff &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2388&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR62&quot; id=&quot;ref-link-section-d189313771e837&quot; title=&quot;Radloff, T. D. L. (2010). College students’ perception of equal opportunity for African Americans and race-based policy. Do diversity course requirements make a difference? College Studies, 44(2), 558–564.&quot;&gt;&lt;span data-dcnode-id=&quot;2389&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2387&quot; instrument_node=&quot;&quot;&gt;). Therefore, all social work students are required to take a cultural diversity class. However, taking one diversity class is not enough for students to become culturally competent. It is important to engage in ongoing cultural competence training because research supports that individuals who have ongoing training are more effective in delivering culturally competent services (Wahler &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2385&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR83&quot; id=&quot;ref-link-section-d189313771e840&quot; title=&quot;Wahler, E. A. (2012). Identifying and challenging social work student biases. Social Work Education, 31(8), 1058–1070.&quot;&gt;&lt;span data-dcnode-id=&quot;2386&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2384&quot; instrument_node=&quot;&quot;&gt;). It is recommended that various assignments targeted at reducing stereotypes and misconceptions be implemented throughout social work curriculums. Such assignments should expose students to direct contact with people from other cultures. For instance, in a human behavior course, an assignment in which a student has to attend a cultural event in which they are the minority may be helpful in increasing awareness on how minorities may feel on a daily basis. In a practice course, an assignment to interview a minority or international student over lunch and then meet with them weekly for 1&amp;nbsp;month can be used to expose students to other cultures and reduce stereotypes. In research classes, previous studies/experiments such as the Jane Elliott’s blue eye brown eyes experiment or Clark and Clark’s doll study can be replicated to increase awareness and empathy. Finally, a policy class can take a field trip to a civil rights museum to understand the history of African-Americans and how various events throughout history have impacted institutional racism and race disparities. Policy classes can also be assigned to attend town hall meetings and take trips to the state capitol to lobby against unjust bills being passed.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2381&quot;&gt;&lt;span data-dcnode-id=&quot;2382&quot; instrument_node=&quot;&quot;&gt;Advocacy is an important skill for social workers to possess since social justice is a core value of the profession. Cultural competency is a first step to dismantling stereotypes, but policies and laws must be changed to address institutional racism. Therefore, students must be aware of how stereot
