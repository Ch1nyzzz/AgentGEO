&lt;/span&gt;&lt;meta content=&quot;Stereotypes are ingrained in the fabric of the USA and coincide with the institution of slavery. The expected behaviors of African-Americans are fueled by stereotypes maintained by the status quo. Throughout US history, the stereotyping of African-Americans, particularly males, has had a negative impact on African-American families and communities. For instance, the belief that African-Americans are unintelligent, lazy, violent, and criminals has affected educational outcomes, employment opportunities, socioeconomic status, and the dismantling of African-American families and communities. Educators, businessmen, and law enforcement often believe these stereotypes, which influences their treatment of African-Americans. The oppression of African-Americans is a critical human rights issue that has to be addressed in social work practice. This article highlights a historical overview of how stereotypes have contributed to a denial of human rights, evidenced by inequalities in education, employment, and the justice system. Recommendations for culturally competent interventions and practice to improve social equity are discussed.&quot; data-dcnode-id=&quot;3639&quot; name=&quot;dc.description&quot;&gt;&lt;span data-dcnode-id=&quot;3638&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;meta content=&quot;The Historical Perspectives of Stereotypes on African-American Males - Journal of Human Rights and Social Work&quot; data-dcnode-id=&quot;3361&quot; property=&quot;og:title&quot;&gt;&lt;span data-dcnode-id=&quot;3360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;meta content=&quot;Stereotypes are ingrained in the fabric of the USA and coincide with the institution of slavery. The expected behaviors of African-Americans are fueled by stereotypes maintained by the status quo. Throughout US history, the stereotyping of African-Americans, particularly males, has had a negative impact on African-American families and communities. For instance, the belief that African-Americans are unintelligent, lazy, violent, and criminals has affected educational outcomes, employment opportunities, socioeconomic status, and the dismantling of African-American families and communities. Educators, businessmen, and law enforcement often believe these stereotypes, which influences their treatment of African-Americans. The oppression of African-Americans is a critical human rights issue that has to be addressed in social work practice. This article highlights a historical overview of how stereotypes have contributed to a denial of human rights, evidenced by inequalities in education, employment, and the justice system. Recommendations for culturally competent interventions and practice to improve social equity are discussed.&quot; data-dcnode-id=&quot;3359&quot; property=&quot;og:description&quot;&gt;&lt;span data-dcnode-id=&quot;3358&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;c-article-body&quot; data-article-body=&quot;true&quot; data-dcnode-id=&quot;1230&quot; data-track-component=&quot;article body&quot;&gt;&lt;span data-dcnode-id=&quot;2897&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;section aria-labelledby=&quot;Abs1&quot; data-dcnode-id=&quot;2890&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;1244&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;1245&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;1244&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;1245&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Abstract&quot; lang=&quot;en&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2891&quot; id=&quot;Abs1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2895&quot; id=&quot;Abs1&quot;&gt;&lt;span data-dcnode-id=&quot;2896&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2892&quot; id=&quot;Abs1-content&quot;&gt;&lt;p data-dcnode-id=&quot;2893&quot;&gt;&lt;span data-dcnode-id=&quot;2894&quot; instrument_node=&quot;&quot;&gt;Stereotypes are ingrained in the fabric of the USA and coincide with the institution of slavery. The expected behaviors of African-Americans are fueled by stereotypes maintained by the status quo. Throughout US history, the stereotyping of African-Americans, particularly males, has had a negative impact on African-American families and communities. For instance, the belief that African-Americans are unintelligent, lazy, violent, and criminals has affected educational outcomes, employment opportunities, socioeconomic status, and the dismantling of African-American families and communities. Educators, businessmen, and law enforcement often believe these stereotypes, which influences their treatment of African-Americans. The oppression of African-Americans is a critical human rights issue that has to be addressed in social work practice. This article highlights a historical overview of how stereotypes have contributed to a denial of human rights, evidenced by inequalities in education, employment, and the justice system. Recommendations for culturally competent interventions and practice to improve social equity are discussed.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;2889&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;c-article-section__content c-article-section__content--separator&quot; data-dcnode-id=&quot;2868&quot;&gt;&lt;p data-dcnode-id=&quot;2869&quot;&gt;&lt;span data-dcnode-id=&quot;2888&quot; instrument_node=&quot;&quot;&gt;Stereotypes have a long and convoluted history in the USA, widely influencing African-American males who are the most visibly stereotyped racial group in the USA (Harpalnai &lt;/span&gt;&lt;a aria-label=&quot;Reference 2017&quot; data-dcnode-id=&quot;2886&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR32&quot; id=&quot;ref-link-section-d189313771e291&quot; title=&quot;Harpalnai, V. (2017). Counterstereotypic identity among high-achieving Black students. Urban Education Journal, 14(1), 1–9.&quot;&gt;&lt;span data-dcnode-id=&quot;2887&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2885&quot; instrument_node=&quot;&quot;&gt;). This article will conceptualize stereotypes as generalizations about social groups that are rigidly held despite not being proven to be true. Regardless of the accuracy of the stereotype, it is incorporated into the individual’s belief system (Judd and Park &lt;/span&gt;&lt;a aria-label=&quot;Reference 1993&quot; data-dcnode-id=&quot;2883&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR41&quot; id=&quot;ref-link-section-d189313771e294&quot; title=&quot;Judd, C. M., &amp;amp; Park, B. (1993). Definition and assessment of accuracy in social stereotypes. Psychological Review, 100(1), 109–128.&quot;&gt;&lt;span data-dcnode-id=&quot;2884&quot; instrument_node=&quot;&quot;&gt;1993&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2882&quot; instrument_node=&quot;&quot;&gt;). These fixed impressions of the shared attributes of a group of people are broadly held by society and “often aid people in making sense of social settings, situations, and interactions with others” (Nasir 2012; Strangor 1994 as cited by Larnell et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2880&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR42&quot; id=&quot;ref-link-section-d189313771e297&quot; title=&quot;Larnell, G. V., Boston, D., &amp;amp; Bragelman, J. (2014). The stuff of stereotypes: toward unpacking identity threats amid African American students’ learning experiences. Journal of Education, 194(1), 49–57.&quot;&gt;&lt;span data-dcnode-id=&quot;2881&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2879&quot; instrument_node=&quot;&quot;&gt;, p. 49). According to Larnell et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2877&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR42&quot; id=&quot;ref-link-section-d189313771e300&quot; title=&quot;Larnell, G. V., Boston, D., &amp;amp; Bragelman, J. (2014). The stuff of stereotypes: toward unpacking identity threats amid African American students’ learning experiences. Journal of Education, 194(1), 49–57.&quot;&gt;&lt;span data-dcnode-id=&quot;2878&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2876&quot; instrument_node=&quot;&quot;&gt;), stereotypes are linked to biases, prejudice, and systemic discrimination. They are a major factor influencing educational outcomes, employment opportunities, disproportional incarceration rates, and brutal treatment (Hadden &lt;/span&gt;&lt;a aria-label=&quot;Reference 2001&quot; data-dcnode-id=&quot;2874&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR31&quot; id=&quot;ref-link-section-d189313771e303&quot; title=&quot;Hadden, S. (2001). Slave patrols: Law and violence in Virginia and the Carolinas. Cambridge: Harvard University Press.&quot;&gt;&lt;span data-dcnode-id=&quot;2875&quot; instrument_node=&quot;&quot;&gt;2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2873&quot; instrument_node=&quot;&quot;&gt;), resulting in the breakdown of African-American families. Many African-Americans, particularly males, have been stereotyped as dumb, violent, dangerous criminals (Oliver &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2871&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR56&quot; id=&quot;ref-link-section-d189313771e307&quot; title=&quot;Oliver, M. (2003). African American men as “criminal and dangerous”: implications of media portrayals of crime on the “criminalization” of African American men. Journal of African American Studies, 7(2). Retrieved from: 
                    http://www.jstor.org/stable/41819017
                    
                  ), 3–18.&quot;&gt;&lt;span data-dcnode-id=&quot;2872&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2870&quot; instrument_node=&quot;&quot;&gt;). The problem with stereotypes is that they limit opportunities for specific groups. The stereotypes perpetuated against African-American males often result in oppression, which is correlated with poverty and a host of other negative outcomes. This is a critical human rights issue that needs to be addressed in social work practice.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2856&quot;&gt;&lt;p data-dcnode-id=&quot;2857&quot;&gt;&lt;span data-dcnode-id=&quot;2867&quot; instrument_node=&quot;&quot;&gt;Striving to eliminate oppression, discrimination, poverty, social injustices, and violations of human rights continues to be an important goal for social workers. According to the U.S. National Association of Social Work Code of Ethics (NASW Code of Ethics, &lt;/span&gt;&lt;a aria-label=&quot;Reference 2017&quot; data-dcnode-id=&quot;2865&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR50&quot; id=&quot;ref-link-section-d189313771e313&quot; title=&quot;National Association of Social Workers Code of ethics. (2017). Retrieved from 
                    https://urldefense.proofpoint.com/v2/url?u=https-3A__www.socialworkers.org_About_Ethics_Code-2Dof-2DEthics_Code-2Dof-2DEthics-2DEnglish&amp;amp;d=DwIGaQ&amp;amp;c=vh6FgFnduejNhPPD0fl_yRaSfZy8CWbWnIf4XJhSqx8&amp;amp;r=ao7Vv0uBvRwgd0ykVbHjMjeV7vz8HzQ1TmA0JYOvoNuKuAvWNpcltsySHnxfZLM&amp;amp;m=CNHdbCVvTaZqPI2mol6Ml00GMrBSzsR80RKxYa8x8GY&amp;amp;s=KnNrBX-FSKXObmrXsrQMmO9WjzMDLd0Tjjs4K1_oOdk&amp;amp;e=
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2866&quot; instrument_node=&quot;&quot;&gt;2017&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2864&quot; instrument_node=&quot;&quot;&gt;, Preamble), “The primary mission of the social work profession is to enhance human well-being and help meet the basic human needs of all people, with particular attention to the needs and empowerment of people who are vulnerable, oppressed, and living in poverty.” Social justice is a core value of the social work profession which is congruent with the rights framed by the Universal Declaration of Human Rights (UDHR) (Rozas and Garran &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2862&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR66&quot; id=&quot;ref-link-section-d189313771e316&quot; title=&quot;Rozas, L. W., &amp;amp; Garran, A. M. (2016). Towards a human rights culture in social work education. British Journal of Social Work, 46(4), 890–905. 
                    https://doi.org/10.1093/bjsw/bcv03
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2863&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt;). Therefore, it is important that social workers practice from a human rights perspective to seek to understand the nature of oppression experienced by African-American males, address these problems by advocating on behalf of this marginalized group, and provide culturally competent services to ensure that African-American males receive basic human rights identified in the UDHR. Social workers have a responsibility to understand the client, despite differences in beliefs, values, or choices, and to empower them to make the best decisions for themselves (Wahler &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2859&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR83&quot; id=&quot;ref-link-section-d189313771e319&quot; title=&quot;Wahler, E. A. (2012). Identifying and challenging social work student biases. Social Work Education, 31(8), 1058–1070.&quot;&gt;&lt;span data-dcnode-id=&quot;2860&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2858&quot; instrument_node=&quot;&quot;&gt;). The purpose of this paper is to increase awareness of the impact of stereotypes on African-American males by highlighting a historical overview of how stereotypes have contributed to a denial of basic human rights evidenced by inequalities in education, employment, and the justice system. Recommendations for culturally competent interventions and practice to ensure human rights will be discussed.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;section data-dcnode-id=&quot;2819&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;1244&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;1245&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;1244&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;1245&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Overview of Slavery&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2820&quot; id=&quot;Sec1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2854&quot; id=&quot;Sec1&quot;&gt;&lt;span data-dcnode-id=&quot;2855&quot; instrument_node=&quot;&quot;&gt;Overview of Slavery&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2821&quot; id=&quot;Sec1-content&quot;&gt;&lt;p data-dcnode-id=&quot;2846&quot;&gt;&lt;span data-dcnode-id=&quot;2853&quot; instrument_node=&quot;&quot;&gt;Stereotypes about African-Americans in the USA are products of the institution of slavery. These deeply held beliefs stem from White racist attitudes that were operationalized through oppressive and discriminating actions that idealized how slaves should think and behave. Many White slave owners developed beliefs (stereotypes) to rationalize their economic, social, and political dominations (Feagin and Feagin &lt;/span&gt;&lt;a aria-label=&quot;Reference 1999&quot; data-dcnode-id=&quot;2851&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR22&quot; id=&quot;ref-link-section-d189313771e329&quot; title=&quot;Feagin, J., &amp;amp; Feagin, C. (1999). Racial and ethnic relations (6th ed.). Upper Saddle River: NJ Prentice Hall.&quot;&gt;&lt;span data-dcnode-id=&quot;2852&quot; instrument_node=&quot;&quot;&gt;1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2850&quot; instrument_node=&quot;&quot;&gt;). Owning slaves symbolized upper class status among White supremacists who felt compelled to use violence to quell slave resistance through brutalizing treatment. This action dehumanized slaves, relegated their roles, and limited their activities to those deemed only important to their owners. The constraints of social control determined individual and familial relationships and behavioral activity that slaves portrayed. For example, slaves were stripped of their own cultural beliefs to conform to slave owners' expectations. The brutal and dehumanizing treatments were upheld through legal support on state and government levels, politicized as necessary to keep White people in control and became commonplace (Hadden &lt;/span&gt;&lt;a aria-label=&quot;Reference 2001&quot; data-dcnode-id=&quot;2848&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR31&quot; id=&quot;ref-link-section-d189313771e332&quot; title=&quot;Hadden, S. (2001). Slave patrols: Law and violence in Virginia and the Carolinas. Cambridge: Harvard University Press.&quot;&gt;&lt;span data-dcnode-id=&quot;2849&quot; instrument_node=&quot;&quot;&gt;2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2847&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2841&quot;&gt;&lt;span data-dcnode-id=&quot;2845&quot; instrument_node=&quot;&quot;&gt;For slave owners, their strong stereotypical beliefs governed how African-Americans were to be treated, never as individuals, but always collectively. Hence, the racist premises from which laws and policies were based maintained societal perceptions of African-Americans. Even after slavery was abolished, the standards for treatment of African-Americans remained the same. When the slave population outnumbered the White population, political forces were established to regulate the African-Americans to “keep Whites safe” from slaves resisting to the idealized expectations of Whites. The political forces were patrols organized to enforce the superiority-inferiority complex held today toward African-Americans (BLEAUSA &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2843&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR5&quot; id=&quot;ref-link-section-d189313771e338&quot; title=&quot;BLEAUSA-Blacks in Law Enforcement of America. (2014). Retrieved from 
                    http://www.bleausa.org/modern-police-policies-rooted-in-old-south-slave-codes
                    
                   Bridges (2012). Retrieved from 
                    https://www.youtube.com/watch?v=b0bhSQR14nw
                    
                  
                        &quot;&gt;&lt;span data-dcnode-id=&quot;2844&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2842&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2830&quot;&gt;&lt;span data-dcnode-id=&quot;2840&quot; instrument_node=&quot;&quot;&gt;Slaves were property and were overseen by slave patrols to ensure stability for socioeconomic purposes for slave owners. Slave patrol, the first formal arrangement of the police, duties entailed maintaining White supremacy over African-Americans (Turner et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2838&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR76&quot; id=&quot;ref-link-section-d189313771e344&quot; title=&quot;Turner, K., Giacopassi, &amp;amp; Vandiver. (2006). Ignoring the past: coverage of slavery and slave patrols in criminal justice texts. Journal of Criminal Justice.&quot;&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2837&quot; instrument_node=&quot;&quot;&gt;). When slaves ran away, the patrol had the authority to hunt down and return them to their owners. To deter others from running, they would beat, maim, lynch, or just kill the slaves (Chaney and Robertson &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2835&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR8&quot; id=&quot;ref-link-section-d189313771e347&quot; title=&quot;Chaney, C., &amp;amp; Robertson, R. (2015). Armed and dangerous? An examination of fatal shootings of unarmed Black people by police. Journal of Pan African Studies, 8(4), 45–78.&quot;&gt;&lt;span data-dcnode-id=&quot;2836&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2834&quot; instrument_node=&quot;&quot;&gt;). This horrific treatment was condoned and politicized particularly by southern states for the sole purpose of keeping African-Americans under control. The dominant group’s ethnocentrism preserved its status within the context of White supremacy, and African-Americans were subjected to a creation of a collective identity manufactured by former slave owners. These stereotypical beliefs hold firmly to the perception that African-American males, among other things, behave like savage beasts, are stronger than White men, lust for the blood of White women, and can tolerate more pain than White people (Plous and Williams &lt;/span&gt;&lt;a aria-label=&quot;Reference 1995&quot; data-dcnode-id=&quot;2832&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR61&quot; id=&quot;ref-link-section-d189313771e350&quot; title=&quot;Plous, S., &amp;amp; Williams, T. (1995). Racial stereotypes from the days of American slavery: a continuing legacy. Journal of Applied Social Psychology, 25(9), 795–817.&quot;&gt;&lt;span data-dcnode-id=&quot;2833&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2831&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2822&quot;&gt;&lt;span data-dcnode-id=&quot;2829&quot; instrument_node=&quot;&quot;&gt;These stereotypes and the treatment of African-Americans males have been seen throughout history. Systemic racism in schools, the workforce, and the justice system perpetuates the negative stereotypes of African-American males, which results in fewer opportunities, lower educational and employment outcomes, and higher incarceration rates, which often lead to self-fulfilling prophecy. Although slavery “ended” with the Emancipation Proclamation of 1863, negative stereotypes and unjust treatment prevailed. For example, the Jim Crow Laws from 1876 to 1965 ensured that African-Americans were not given the same rights of citizenship as White Americans. During this time, legal racial separation was promoted (Plessy vs. Ferguson) and “White Privilege” that was developed during slavery continued. Caucasians were entitled to the best educations, had the higher paying jobs, and lived in model neighborhoods, which is very similar in today’s society. Although the United Nations adopted the International Convention on the Elimination of All Forms of Racial Discrimination (CERD) in 1965, the USA has not adhered to these international standards (Henderson &lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2827&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR34&quot; id=&quot;ref-link-section-d189313771e356&quot; title=&quot;Henderson, L. (2013). Why is racial injustice still permitted in the United States? An international human rights perspective on the United States’ inadequate compliance with the international convention in the elimination of all forms of racial discrimination. Wisconsin International Law Journal, 31(2), 323–351 Retrieved from 
                    https://hosted.law.wisc.edu/wordpress/wilj/files/2014/01/Herndon_final_v2.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2828&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2826&quot; instrument_node=&quot;&quot;&gt;). The USA is often considered a leader in the human rights movement by advocating for human rights around the world; however, African-Americans have yet to realize equal opportunities promised in the CERD. As a result, the USA lags behind the rest of the world when it comes to racial equality (Henderson&amp;nbsp;&lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2824&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR34&quot; id=&quot;ref-link-section-d189313771e359&quot; title=&quot;Henderson, L. (2013). Why is racial injustice still permitted in the United States? An international human rights perspective on the United States’ inadequate compliance with the international convention in the elimination of all forms of racial discrimination. Wisconsin International Law Journal, 31(2), 323–351 Retrieved from 
                    https://hosted.law.wisc.edu/wordpress/wilj/files/2014/01/Herndon_final_v2.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2825&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2823&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2692&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;1244&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;1245&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;1244&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;1245&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Stereotypes and Education&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2693&quot; id=&quot;Sec2-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2817&quot; id=&quot;Sec2&quot;&gt;&lt;span data-dcnode-id=&quot;2818&quot; instrument_node=&quot;&quot;&gt;Stereotypes and Education&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2694&quot; id=&quot;Sec2-content&quot;&gt;&lt;p data-dcnode-id=&quot;2809&quot;&gt;&lt;span data-dcnode-id=&quot;2816&quot; instrument_node=&quot;&quot;&gt;Many African-Americans were hopeful of equal educational opportunities with Brown vs. Board of Education (1954), a landmark case outlawing state laws establishing separate schools for Black and White students (Caldwell and Obasi &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2814&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR7&quot; id=&quot;ref-link-section-d189313771e370&quot; title=&quot;Caldwell, &amp;amp; Obasi. (2010). Academic performance in African American undergraduates: effects of cultural mistrust, educational value, and achievement motivation. Journal of Career Development, 36(4), 348–369. 
                    https://doi.org/10.1177/0894845309349357
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2815&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2813&quot; instrument_node=&quot;&quot;&gt;). However, it is debatable whether the first Black students who attended integrated schools were receiving equal educational opportunities. These students were escorted to school by the National Guard, they had to be protected from the White adults who were protesting, and they were not able to participate in activities with the White students. For example, Ruby Bridges (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2001&quot; data-dcnode-id=&quot;2811&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR6&quot; id=&quot;ref-link-section-d189313771e373&quot; title=&quot;Bridges. (2001). Through my eyes. Scholastic Press.&quot;&gt;&lt;span data-dcnode-id=&quot;2812&quot; instrument_node=&quot;&quot;&gt;2001&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2810&quot; instrument_node=&quot;&quot;&gt;) the first African-American to attend a White school in Louisiana, entered school each day with people yelling at her, making threats, holding up signs stating “We want to keep our school White,” and “Integration is a moral sin.” Because of the fear of Blacks due to stereotypes ingrained in society, White adults protested and traumatized a young Black child. As a result, Ruby reported having nightmares every night about the black baby doll in a coffin that one of&amp;nbsp;the protestors held in front of Ruby as she entered the school.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2804&quot;&gt;&lt;span data-dcnode-id=&quot;2808&quot; instrument_node=&quot;&quot;&gt;Although Ruby was allowed to be in the same building as the White children, her experience was very different from her White counterparts. She had a teacher in a classroom by herself but was not allowed to interact with any of the other children (Bridges 2001). She was isolated and verbally attacked by the community on a daily basis. Ruby’s traumatic experience, like the experiences of many African-American males today facing systemic racism (often originating with stereotypes), is a violation of the UDHR. Article 5 in the UDHR states “No one shall be subject to torture or to cruel, inhumane or degrading treatment.” Article 26 states, “Education shall be directed to the full development of the human personality and to the strengthening of respect for human rights and fundamental freedoms. It shall promote understanding, tolerance, and friendship among all nations, racial, or religious groups, and shall further the activities of the United Nations for the maintenance of peace” (UDHR &lt;/span&gt;&lt;a aria-label=&quot;Reference 1948&quot; data-dcnode-id=&quot;2806&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR78&quot; id=&quot;ref-link-section-d189313771e379&quot; title=&quot;United Nations. (1948). The Universal Declaration of Human Rights. Retrieved from: 
                    http://www.un.org/en/universal-declaration-human-rights/
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2807&quot; instrument_node=&quot;&quot;&gt;1948&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2805&quot; instrument_node=&quot;&quot;&gt;). With systemic racism throughout the US educational system, these Articles in the UDHR remain unenforced.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2793&quot;&gt;&lt;span data-dcnode-id=&quot;2803&quot; instrument_node=&quot;&quot;&gt;Despite efforts to desegregate schools and provide all children with equal educational opportunities, over 50&amp;nbsp;years after the decision of Board versus Brown, there continues to be disparities in resources received by schools in White communities compared to those in Black communities. The unevenly distributed resources among schools perpetuate the race achievement gap, which continues to be a big concern because Black students continue to lag behind their White counterparts in terms of academic outcomes. For instance, only 17% of African-Americans, compared to 46% of White students, are reading at or above proficient levels in 12th grade (The nations report card &lt;/span&gt;&lt;a aria-label=&quot;Reference 2013&quot; data-dcnode-id=&quot;2801&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR75&quot; id=&quot;ref-link-section-d189313771e385&quot; title=&quot;The Nation's Report Card (2013). Retrieved from 
                    https://www.nationsreportcard.gov/reading_math_2013/#/
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2802&quot; instrument_node=&quot;&quot;&gt;2013&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2800&quot; instrument_node=&quot;&quot;&gt;); the 2015 ACT scores for African-Americans were 17.1 compared to 22.4 for their White peers; the 2013–2014 high school graduation rates for African-Americans were 73% compared to 87% of their White counterparts; and in 2012–2013, 69% of bachelor degrees were held by Caucasians and only 11% by African-Americans (National Center for Education Statistics &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2798&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR52&quot; id=&quot;ref-link-section-d189313771e388&quot; title=&quot;National Center for Educational Statistics. (2016). Retrieved from 
                    www.nces.ed.gov/
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2799&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2797&quot; instrument_node=&quot;&quot;&gt;). African-American males suffer from higher high school dropout rates and lower college entry completion rates than any other group (Johnson-Bailey et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2795&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR40&quot; id=&quot;ref-link-section-d189313771e391&quot; title=&quot;Johnson-Bailey, J., Ray, N., &amp;amp; Lasker-Scott, T. (2014). Race, the Black male, and heterogeneous racism in education. New Directions foe adult and Continuing Education, 144(5-14). 
                    https://doi.org/10.1002/ace.20109
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2796&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2794&quot; instrument_node=&quot;&quot;&gt;). According to the 10th Biannual Schott Foundation for Public Education (2013), during the 2012–2013 school year, 40% of African-American males dropped out of high school and only 60% earned their high school diplomas compared to 80% of their White male counterparts. Caucasians also outperform African-American students at the collegiate level. While only 42% of African-Americans graduate from college, 62% of their White peers graduate. African-American females also graduate at higher rates (46%) than African-American males (35%).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2752&quot;&gt;&lt;span data-dcnode-id=&quot;2792&quot; instrument_node=&quot;&quot;&gt;Herrnstein and Murray (&lt;/span&gt;&lt;a aria-label=&quot;Reference 1994&quot; data-dcnode-id=&quot;2790&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR36&quot; id=&quot;ref-link-section-d189313771e397&quot; title=&quot;Herrnstein, R. J., &amp;amp; Murray, C. (1994). Bell curve: intelligence and class structure in America life. New York: Free Press Paperbook.&quot;&gt;&lt;span data-dcnode-id=&quot;2791&quot; instrument_node=&quot;&quot;&gt;1994&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2789&quot; instrument_node=&quot;&quot;&gt;) theorized that intelligence is inheritable and that both genes and genetics contribute to racial differences in intelligence. The belief that Black people are intellectually inferior to White people has influenced the stereotyping of Black students (Diamond &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2787&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d189313771e400&quot; title=&quot;Diamond, J. B. (2006). Still separate and unequal: Examining race, opportunity, and school achievement in “integrated” suburbs. The Journal of Negro Education, 75(3), 495–506 Retrieved from 
                    http://search.proquest.com.proxy1.ncu.edu/docview/222067021?accountid=28180
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2788&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2786&quot; instrument_node=&quot;&quot;&gt;; James &lt;/span&gt;&lt;a aria-label=&quot;Reference 2012&quot; data-dcnode-id=&quot;2784&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR38&quot; id=&quot;ref-link-section-d189313771e403&quot; title=&quot;James, C. E. (2012). Students “at risk”: stereotypes and the schooling of black boys. Urban Education, 47(2), 464–494. 
                    https://doi.org/10.1177/0042085911429084
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2785&quot; instrument_node=&quot;&quot;&gt;2012&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2783&quot; instrument_node=&quot;&quot;&gt;). Believing stereotypes contributes to teachers having low expectations for African-American students (Mathew &lt;/span&gt;&lt;a aria-label=&quot;Reference 2011&quot; data-dcnode-id=&quot;2781&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR45&quot; id=&quot;ref-link-section-d189313771e406&quot; title=&quot;Mathew, E. M. (2011). Effort optimism in the classroom. Sociology of Education, 84(3),225–245.&quot;&gt;&lt;span data-dcnode-id=&quot;2782&quot; instrument_node=&quot;&quot;&gt;2011&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2780&quot; instrument_node=&quot;&quot;&gt;; Tenenbaum and Ruck &lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2778&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR74&quot; id=&quot;ref-link-section-d189313771e409&quot; title=&quot;Tenenbaum, H. T., &amp;amp; Ruck, M. D. (2007). Are teachers’ expectations different for racial minority than for European American students? A meta-analysis. Journal of Educational Psychology, 99(2), 253–273.&quot;&gt;&lt;span data-dcnode-id=&quot;2779&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2777&quot; instrument_node=&quot;&quot;&gt;); having perceptions that African-Americans, particularly males, are more hyper, immature, impulsive, and aggressive (Ford and Whiting &lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2775&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR24&quot; id=&quot;ref-link-section-d189313771e413&quot; title=&quot;Ford, D. Y., &amp;amp; Whiting, G. W. (2007). A mind is a terrible thing to erase: Black students underrepresentation in gifted education. Multiple Voices, 10(1&amp;amp;2), 28–44.&quot;&gt;&lt;span data-dcnode-id=&quot;2776&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2774&quot; instrument_node=&quot;&quot;&gt;); and making inappropriate referrals to special education due to mistaking cultural differences for cognitive and behavioral disabilities (Neal et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2772&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR53&quot; id=&quot;ref-link-section-d189313771e416&quot; title=&quot;Neal, L. V. I., McCray, A. D., Webb-Johnson, G., &amp;amp; Bridgest, S. T. (2003). The effects of African American movement styles on teachers’ perceptions and reaction. The Journal of Special Education, 37(1). Retrieved from 
                    http://web.pdx.edu/~jhumn/Neal%20et.%20al.pdf
                    
                  ), 49–57.&quot;&gt;&lt;span data-dcnode-id=&quot;2773&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2771&quot; instrument_node=&quot;&quot;&gt;). Teachers report that Black boys have more behavioral problems and have fewer interpersonal skills than White boys and Black girls (Mathew et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2769&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR44&quot; id=&quot;ref-link-section-d189313771e419&quot; title=&quot;Mathew, J. S., Kizzie, K. T., Rowley, S. J., &amp;amp; Cortina, K. (2010). African Americans and boys: understanding the literacy gap, tracing academic trajectories, and evaluating the role of learning-elated skills. Journal of Educational Psychology, 102(3), 757–771 Retrieved from 
                    https://www.researchgate.net/publication/232538334_African_Amerians_and_Boys_Understanding_the_Literacy_Gap_Tracing_Academic_Trajectories_and_Evaluating_the_Role_of_Learning-Related_Skills
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2770&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2768&quot; instrument_node=&quot;&quot;&gt;), causing Black male students to be overrepresented in lower track and special education classes (Diamond &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2766&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d189313771e422&quot; title=&quot;Diamond, J. B. (2006). Still separate and unequal: Examining race, opportunity, and school achievement in “integrated” suburbs. The Journal of Negro Education, 75(3), 495–506 Retrieved from 
                    http://search.proquest.com.proxy1.ncu.edu/docview/222067021?accountid=28180
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2767&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2765&quot; instrument_node=&quot;&quot;&gt;), underrepresented in advanced classes (Henfield et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;2763&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR35&quot; id=&quot;ref-link-section-d189313771e425&quot; title=&quot;Henfield, M. S., Moore, I. L., &amp;amp; Wood, C. (2008). Inside and outside gifted education programming: hidden challenges for African American students. Exceptional Children, 74(4), 433–450 Retrieved from: 
                    http://content.ebscohost.com/pdf9/pdf/2008/EXC/01May08/32968612.pdf?T=P&amp;amp;P=AN&amp;amp;K=32968612&amp;amp;S=R&amp;amp;D=ehh&amp;amp;EbscoContent=dGJyMNHr7ESeprA4wtvhOLCmr0qep7ZSrqe4S7aWxWXS&amp;amp;ContentCustomer=dGJyMPGnsEq3q7FIuePfgeyx43zx
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2764&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2762&quot; instrument_node=&quot;&quot;&gt;), and more likely to receive detentions and suspensions (Mattison and Aber &lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2760&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR46&quot; id=&quot;ref-link-section-d189313771e428&quot; title=&quot;Mattison, E., &amp;amp; Aber, M. S. (2007). Closing the achievement gap: the association of racial climate with achievement and behavioral outcomes. American Journal of Community Psychology, 40(1-2), 1–12. 
                    https://doi.org/10.1007/s10464-007-9128x
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2761&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2759&quot; instrument_node=&quot;&quot;&gt;). Teachers making referrals based off the stereotypes of African-American intelligence are perpetuating the race achievement gap and may explain why African-Americans are half as likely to be placed in honors classes or advanced placement and 2.4 times more likely to be placed in remedial classes (Frye and Vogt &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2757&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR25&quot; id=&quot;ref-link-section-d189313771e432&quot; title=&quot;Frye, B. J., &amp;amp; Vogt, H. A. (2010). The causes of underrepresentation of African American children in gifted programs and the need to address the problem through more culturally responsive teaching practices in teacher education programs. Black History Bulletin, 73(1), 11–17.&quot;&gt;&lt;span data-dcnode-id=&quot;2758&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2756&quot; instrument_node=&quot;&quot;&gt;). When teachers have low expectations for their students, the students tend to have lower academic motivation and academic outcomes (Cokley et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;2754&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR11&quot; id=&quot;ref-link-section-d189313771e435&quot; title=&quot;Cokley, K., Dreher, G. F., &amp;amp; Stockdale, M. S. (2004). Toward the inclusiveness and career success of African Americans in the workplace. In M. S. Stockdale &amp;amp; F. J. Crosby (Eds.), The psychology and management of workplace diversity (pp. 168–190). Malden: Blackwell.&quot;&gt;&lt;span data-dcnode-id=&quot;2755&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2753&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2726&quot;&gt;&lt;span data-dcnode-id=&quot;2751&quot; instrument_node=&quot;&quot;&gt;According to the National Center for Education Statistic (NCES) (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2749&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR51&quot; id=&quot;ref-link-section-d189313771e442&quot; title=&quot;National Center for Educational Statistics. (2010). Retrieved from 
                    www.nhttps://www.socialworkers.org/LinkClick.aspx?fileticket=ms_ArtLqzeI%3d&amp;amp;portalid=0ces.ed.gov/
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2750&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2748&quot; instrument_node=&quot;&quot;&gt;), there is a significant discipline gap; one out of every two African-Americans is suspended sometime during their education compared to one out of every five Caucasian males or one out of ten Caucasian females. These consistent patterns of disproportionate discipline sanctions issued to Black students have been well-documented (Diamond &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2746&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d189313771e445&quot; title=&quot;Diamond, J. B. (2006). Still separate and unequal: Examining race, opportunity, and school achievement in “integrated” suburbs. The Journal of Negro Education, 75(3), 495–506 Retrieved from 
                    http://search.proquest.com.proxy1.ncu.edu/docview/222067021?accountid=28180
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2747&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2745&quot; instrument_node=&quot;&quot;&gt;; Gregory et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2743&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR28&quot; id=&quot;ref-link-section-d189313771e448&quot; title=&quot;Gregory, A., Skiba, R. J., &amp;amp; Noguera, P. A. (2010). The achievement gap and the discipline gap: two sides of the same coin? Educational Researcher, 39(1), 59–68. 
                    https://doi.org/10.3102/0013189X09357621
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2744&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2742&quot; instrument_node=&quot;&quot;&gt;). The school suspension rate in the USA is three times greater for African-Americans than for White students (US Department of Education &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2740&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR79&quot; id=&quot;ref-link-section-d189313771e451&quot; title=&quot;US Department of Education, National Center of Education. (2010). Retrieved from 
                    https://nces.ed.gov/
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2741&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2739&quot; instrument_node=&quot;&quot;&gt;). Twenty percent of African-American male students are given out-of-school suspensions compared to 6% of White males (US Department of Education Office for Civil Rights &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2737&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR80&quot; id=&quot;ref-link-section-d189313771e454&quot; title=&quot;US Department of Education Office for Civil Rights. (2014). Civil rights data collection, Data Snapshot: School Discipline. Retrieved from 
                    https://ocrdata.ed.gov/downloads/crdc-school-discipline-snapshot.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2738&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2736&quot; instrument_node=&quot;&quot;&gt;). Disparities in discipline are seen as early as pre-school. For instance, African-American pre-school students are more than three times as likely to be sent home for misbehaving as White children. These disparities continue in K–12th grade. In 2013–2014, 18% of African-American boys were suspended compared to 10% of African-American girls, 5% of Caucasian boys, and 2% of Caucasian girls (Sparks &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2734&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR71&quot; id=&quot;ref-link-section-d189313771e458&quot; title=&quot;Sparks, S. D. (2016). One key to reducing school suspension: a little respect. Education Week, 35, 8–12 Retrieved form hhtp://
                    www.wditdigest.com
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2735&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2733&quot; instrument_node=&quot;&quot;&gt;). According to the San Francisco Chronicle, almost 20% of Oakland’s Black male students were suspended at least once in 2011, six times the rate of White students (Lyfe 2012; as cited by Rudd &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2731&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR67&quot; id=&quot;ref-link-section-d189313771e461&quot; title=&quot;Rudd, T. (2014). Racial disproportionality in school discipline: Implicit bias is heavily implicated. Kirwan Institute Issue Brief. Retrieved from 
                    http://kirwaninstitute.osu.edu/wp-content/uploads/2014/02/racial-disproportionality-schools-02.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2732&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2730&quot; instrument_node=&quot;&quot;&gt;). In Chicago public schools, Black students comprised 45% of the student body during the 2009–2010 academic year but 76% of the suspensions (New York Times – Education 2012, as cited by Rudd &lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2728&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR67&quot; id=&quot;ref-link-section-d189313771e464&quot; title=&quot;Rudd, T. (2014). Racial disproportionality in school discipline: Implicit bias is heavily implicated. Kirwan Institute Issue Brief. Retrieved from 
                    http://kirwaninstitute.osu.edu/wp-content/uploads/2014/02/racial-disproportionality-schools-02.pdf
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2729&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2727&quot; instrument_node=&quot;&quot;&gt;). These alarming disparities are seen in states across the nation.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2709&quot;&gt;&lt;span data-dcnode-id=&quot;2725&quot; instrument_node=&quot;&quot;&gt;The research consistently shows that the behaviors of African-American male students are more harshly perceived than behavior of other ethnic groups evidenced by the disproportionality in suspension rates and other types of school discipline (Givens et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2016&quot; data-dcnode-id=&quot;2723&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR27&quot; id=&quot;ref-link-section-d189313771e470&quot; title=&quot;Givens, J. R., Nasir, N., Ross, K., &amp;amp; DeRoyston, M. M. (2016). Modeling manhood: reimaging Black male identities in school. Anthropology and Education Quarterly, 47(2), 167–185. 
                    https://doi.org/10.1111/aeq.12147
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2724&quot; instrument_node=&quot;&quot;&gt;2016&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2722&quot; instrument_node=&quot;&quot;&gt;). This is likely due to the stereotypes that African-American males are aggressive. According to Skibam et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2014&quot; data-dcnode-id=&quot;2720&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR69&quot; id=&quot;ref-link-section-d189313771e473&quot; title=&quot;Skibam, R. J., Arredondo, M. I., &amp;amp; Williams, N. T. (2014). More than a metaphor: The contribution of exclusionary discipline to a school-to-prison pipeline. Equity &amp;amp; Excellence in Education, 47(4), 546–564. 
                    https://doi.org/10.1080/10665684.2014.958965
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2721&quot; instrument_node=&quot;&quot;&gt;2014&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2719&quot; instrument_node=&quot;&quot;&gt;), the overrepresentation of suspensions for African-American boys are for those infractions that are subjectively determined such as disobedience or disrespect toward educators. While 42% of students are diverse, 90–92% of teachers are White (Ford and Whiting &lt;/span&gt;&lt;a aria-label=&quot;Reference 2007&quot; data-dcnode-id=&quot;2717&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR24&quot; id=&quot;ref-link-section-d189313771e476&quot; title=&quot;Ford, D. Y., &amp;amp; Whiting, G. W. (2007). A mind is a terrible thing to erase: Black students underrepresentation in gifted education. Multiple Voices, 10(1&amp;amp;2), 28–44.&quot;&gt;&lt;span data-dcnode-id=&quot;2718&quot; instrument_node=&quot;&quot;&gt;2007&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2716&quot; instrument_node=&quot;&quot;&gt;). The existing research suggests that teachers’ stereotypes influence their implicit bias, which mirror those biases of the general population. For instance, 136 teachers from 6 schools were asked to watch a video of students walking. The results showed that the teachers perceived the African-American male students walking with a stroll (a popular cultural style of walking displayed by many African-American males) to be more aggressive, lower in achievement, and more likely to need special education (Neal et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2714&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR53&quot; id=&quot;ref-link-section-d189313771e479&quot; title=&quot;Neal, L. V. I., McCray, A. D., Webb-Johnson, G., &amp;amp; Bridgest, S. T. (2003). The effects of African American movement styles on teachers’ perceptions and reaction. The Journal of Special Education, 37(1). Retrieved from 
                    http://web.pdx.edu/~jhumn/Neal%20et.%20al.pdf
                    
                  ), 49–57.&quot;&gt;&lt;span data-dcnode-id=&quot;2715&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2713&quot; instrument_node=&quot;&quot;&gt;). Therefore, it can be concluded that teachers’ stereotypes are influencing their actions toward African-American male students, resulting in lower expectations and disproportional suspension rates and special education referrals. These negative school experiences associated with racism (fueled by stereotypes) affect African-American male students’ academic motivation and school achievement (Ogbu &lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;2711&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR55&quot; id=&quot;ref-link-section-d189313771e482&quot; title=&quot;Ogbu, J. U. (2004). Collective identity and the burden of “acting White” in black history, community and education. The Urban Review, 36(1), 1–35.&quot;&gt;&lt;span data-dcnode-id=&quot;2712&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2710&quot; instrument_node=&quot;&quot;&gt;), further perpetuating the achievement gap.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2695&quot;&gt;&lt;span data-dcnode-id=&quot;2708&quot; instrument_node=&quot;&quot;&gt;Stereotypes leading to experiences with racism and discrimination in school can be very stressful for students of all ages. Experiences with racism can also be traumatic. However, when discussing types of trauma, it is rare that racism is included. Trauma is an experience or repeated events that completely overwhelms an individual’s ability to cope (Giller &lt;/span&gt;&lt;a aria-label=&quot;Reference 1999&quot; data-dcnode-id=&quot;2706&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR26&quot; id=&quot;ref-link-section-d189313771e488&quot; title=&quot;Giller, E. (1999). What is psychological trauma? Sidran Institute. 
                    https://www.sidran.org/resources/for-survivors-and-loved-ones/what-is-psychological-trauma/
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2707&quot; instrument_node=&quot;&quot;&gt;1999&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2705&quot; instrument_node=&quot;&quot;&gt;). Traumatic experiences are unexpected, the person tends to be unprepared for it, there is nothing the person can do to stop it from happening, and it may be a single or re-occurring event (Robinson et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2018&quot; data-dcnode-id=&quot;2703&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR64&quot; id=&quot;ref-link-section-d189313771e491&quot; title=&quot;Robinson, L., Smith, M., &amp;amp; Segal, J. (2018). Emotional and psychological trauma: Healing and moving on. HELPGUIDE.Org. Retrieved from 
                    https://www.helpguide.org/articles/ptsd-trauma/coping-with-emotional-and-psychological-trauma.htm
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2704&quot; instrument_node=&quot;&quot;&gt;2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2702&quot; instrument_node=&quot;&quot;&gt;). These are all characteristics of racism. Yet, when discussing trauma, rape, abuse, and natural disasters are acknowledged, but not racism. Increased stress, impaired concentration, depression, low self-esteem, self-hatred, anger, irritability, and fear can all be psychological effects of perceived racism. Perhaps it is the stress/trauma of the perceived stereotypes and racism that is influencing academic outcomes of African-American males. Reynolds et al. (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2700&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR63&quot; id=&quot;ref-link-section-d189313771e494&quot; title=&quot;Reynolds, Sneva, &amp;amp; Beehler. (2010). The influence of racism related stress on the academic motivation of Black and Latino students. Journal of College Student Development, 51(2), 135–149.&quot;&gt;&lt;span data-dcnode-id=&quot;2701&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2699&quot; instrument_node=&quot;&quot;&gt;) found that race-related stress predicted both intrinsic and extrinsic motivation in African-American students. Discrimination has also been associated with lower grades, academic self-concepts, and school importance attitudes (Chavous et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2008&quot; data-dcnode-id=&quot;2697&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR9&quot; id=&quot;ref-link-section-d189313771e497&quot; title=&quot;Chavous, T. M., Rivas-Drake, D., &amp;amp; Smalls, C. (2008). Gender matters too: the influence of school racial discrimination and racial identity on academic engagement outcomes among African American adolescents. Developmental Psychology, 44(3), 637–654. 
                    https://doi.org/10.1037/0012-1649.44.3.637
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2698&quot; instrument_node=&quot;&quot;&gt;2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2696&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;2650&quot; data-title=&quot;Stereotypes and Self-Concept&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;2651&quot; id=&quot;Sec3-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;2690&quot; id=&quot;Sec3&quot;&gt;&lt;span data-dcnode-id=&quot;2691&quot; instrument_node=&quot;&quot;&gt;Stereotypes and Self-Concept&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;2652&quot; id=&quot;Sec3-content&quot;&gt;&lt;p data-dcnode-id=&quot;2679&quot;&gt;&lt;span data-dcnode-id=&quot;2689&quot; instrument_node=&quot;&quot;&gt;Throughout history African-Americans have consistently been dehumanized, evidenced by the US constitution considering slaves three-fifths a person, the legalization of slave lynchings, the adoption of Jim Crow Laws, and most recently, police brutality against unarmed African-American males. When individuals are continually degraded and dehumanized, they often believe the stereotypes about their group and internalize the oppression they experience. Internalized oppression refers to the subordinate group adopting the dominant group ideology, resulting in the acceptance that their subordinate status is deserved, natural, and inevitable (Pike 2010 as cited by Aguilar &lt;/span&gt;&lt;a aria-label=&quot;Reference 2015&quot; data-dcnode-id=&quot;2687&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR1&quot; id=&quot;ref-link-section-d189313771e508&quot; title=&quot;Aguilar, D. N. (2015). Oppression, domination, prison: the mass incarceration of Latino and African American men. The Vermont Connection, 35(2), 12–20 Retrieved from 
                    http://scholarworks.uvm.edu/tvc/vol35/iss1/2
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2688&quot; instrument_node=&quot;&quot;&gt;2015&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2686&quot; instrument_node=&quot;&quot;&gt;). Many African-Americans suffer from identity threat, as they believe the stereotypes and identity contingencies assigned to them by the dominant culture. This is seen in early elementary age children. Clark and Clark conducted a doll study in 1939 which children where shown a Black and a White doll and asked a series of questions about the doll. The results of the study showed that both Black and White children had more favorable responses toward the White doll and more negative reactions to the Black doll. The Black doll was considered to be the ugly doll, the bad doll, the dumb doll, and the mean doll. These doll studies have been reenacted several times over 60&amp;nbsp;years with similar results (CNN &lt;/span&gt;&lt;a aria-label=&quot;Reference 2010&quot; data-dcnode-id=&quot;2684&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR10&quot; id=&quot;ref-link-section-d189313771e511&quot; title=&quot;CNN. (2010). Study: White and black children biased toward lighter skin. Retrieved from 
                    www.cnn.com/2010/US/05/13/doll.study
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2685&quot; instrument_node=&quot;&quot;&gt;2010&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2683&quot; instrument_node=&quot;&quot;&gt;). Starting at an early age, many Black children are exposed to negative stereotypes about their culture, often resulting in negative racial identities. The media often stereotypes African-Americans, particularly males, as criminals, drug addicts, unintelligent, and jobless (Oliver &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2681&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR56&quot; id=&quot;ref-link-section-d189313771e514&quot; title=&quot;Oliver, M. (2003). African American men as “criminal and dangerous”: implications of media portrayals of crime on the “criminalization” of African American men. Journal of African American Studies, 7(2). Retrieved from: 
                    http://www.jstor.org/stable/41819017
                    
                  ), 3–18.&quot;&gt;&lt;span data-dcnode-id=&quot;2682&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2680&quot; instrument_node=&quot;&quot;&gt;). When students believe these stereotypes about themselves, it affects their school performance (self-fulfilling prophecy) which will impact the types of jobs they attain in the future, their socioeconomic status, the communities they live in, and their family life.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2653&quot;&gt;&lt;span data-dcnode-id=&quot;2678&quot; instrument_node=&quot;&quot;&gt;These negative stereotypes of African-American males also influence the structural pattern of school districts throughout the USA (Diamond &lt;/span&gt;&lt;a aria-label=&quot;Reference 2006&quot; data-dcnode-id=&quot;2676&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d189313771e520&quot; title=&quot;Diamond, J. B. (2006). Still separate and unequal: Examining race, opportunity, and school achievement in “integrated” suburbs. The Journal of Negro Education, 75(3), 495–506 Retrieved from 
                    http://search.proquest.com.proxy1.ncu.edu/docview/222067021?accountid=28180
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2677&quot; instrument_node=&quot;&quot;&gt;2006&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2675&quot; instrument_node=&quot;&quot;&gt;), teachers perceptions (Neal et al. &lt;/span&gt;&lt;a aria-label=&quot;Reference 2003&quot; data-dcnode-id=&quot;2673&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR53&quot; id=&quot;ref-link-section-d189313771e523&quot; title=&quot;Neal, L. V. I., McCray, A. D., Webb-Johnson, G., &amp;amp; Bridgest, S. T. (2003). The effects of African American movement styles on teachers’ perceptions and reaction. The Journal of Special Education, 37(1). Retrieved from 
                    http://web.pdx.edu/~jhumn/Neal%20et.%20al.pdf
                    
                  ), 49–57.&quot;&gt;&lt;span data-dcnode-id=&quot;2674&quot; instrument_node=&quot;&quot;&gt;2003&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2672&quot; instrument_node=&quot;&quot;&gt;), students’ motivation (Ogbu &lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;2670&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR55&quot; id=&quot;ref-link-section-d189313771e526&quot; title=&quot;Ogbu, J. U. (2004). Collective identity and the burden of “acting White” in black history, community and education. The Urban Review, 36(1), 1–35.&quot;&gt;&lt;span data-dcnode-id=&quot;2671&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;), performance on tests (Steele and Anderson &lt;/span&gt;&lt;a aria-label=&quot;Reference 1995&quot; data-dcnode-id=&quot;2667&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR72&quot; id=&quot;ref-link-section-d189313771e529&quot; title=&quot;Steele, &amp;amp; Anderson. (1995). Stereotype threat and the intellectual test performance of African Americans. Journal of Personality and Social Psychology, 69(5), 797–811.&quot;&gt;&lt;span data-dcnode-id=&quot;2668&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2666&quot; instrument_node=&quot;&quot;&gt;), graduation rates (Fisher &lt;/span&gt;&lt;a aria-label=&quot;Reference 2009&quot; data-dcnode-id=&quot;2664&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR23&quot; id=&quot;ref-link-section-d189313771e532&quot; title=&quot;Fisher, M. J. (2009). A longitudinal examination of the role of stereotype threat and racial climate on college outcomes for minorities at elite institutions. Social Psychology Education, 13(1), 19–40. 
                    https://doi.org/10.1007/s11218-009-9105-3
                    
                  .&quot;&gt;&lt;span data-dcnode-id=&quot;2665&quot; instrument_node=&quot;&quot;&gt;2009&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2663&quot; instrument_node=&quot;&quot;&gt;), and students’ beliefs about their academic abilities (Steele and Anderson &lt;/span&gt;&lt;a aria-label=&quot;Reference 1995&quot; data-dcnode-id=&quot;2661&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR72&quot; id=&quot;ref-link-section-d189313771e536&quot; title=&quot;Steele, &amp;amp; Anderson. (1995). Stereotype threat and the intellectual test performance of African Americans. Journal of Personality and Social Psychology, 69(5), 797–811.&quot;&gt;&lt;span data-dcnode-id=&quot;2662&quot; instrument_node=&quot;&quot;&gt;1995&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;). According to Ogbu (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;2658&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR55&quot; id=&quot;ref-link-section-d189313771e539&quot; title=&quot;Ogbu, J. U. (2004). Collective identity and the burden of “acting White” in black history, community and education. The Urban Review, 36(1), 1–35.&quot;&gt;&lt;span data-dcnode-id=&quot;2659&quot; instrument_node=&quot;&quot;&gt;2004&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2657&quot; instrument_node=&quot;&quot;&gt;), people who are discriminated against and devalued in a society begin to believe and accept the negative stereotypes about themselves. Thus, they act according to the perceptions and it becomes reality (self-fulfilling prophecy). Ogbu (&lt;/span&gt;&lt;a aria-label=&quot;Reference 2004&quot; data-dcnode-id=&quot;2655&quot; data-test=&quot;citation-ref&quot; data-track
