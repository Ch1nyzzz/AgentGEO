&lt;/span&gt;&lt;article class=&quot;clearfix post-908 post type-post status-publish format-standard hentry category-analysis&quot; data-dcnode-id=&quot;308&quot; id=&quot;post-908&quot;&gt;&lt;span data-dcnode-id=&quot;2968&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;header class=&quot;entry-header&quot; data-dcnode-id=&quot;2939&quot;&gt;&lt;span data-dcnode-id=&quot;2967&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 class=&quot;entry-title&quot; data-dcnode-id=&quot;2965&quot;&gt;&lt;span data-dcnode-id=&quot;2966&quot; instrument_node=&quot;&quot;&gt;The neoliberal era in Britain: Historical developments and current perspectives&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;2964&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;issue-meta&quot; data-dcnode-id=&quot;2961&quot;&gt;&lt;a data-dcnode-id=&quot;2962&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//isj.org.uk/issue-139&quot;&gt;&lt;span data-dcnode-id=&quot;2963&quot; instrument_node=&quot;&quot;&gt;Issue: 139&lt;/span&gt;&lt;/a&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2960&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;entry-meta&quot; data-dcnode-id=&quot;2945&quot;&gt;&lt;span data-dcnode-id=&quot;2959&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2948&quot;&gt;&lt;span class=&quot;posted-on&quot; data-dcnode-id=&quot;2954&quot;&gt;&lt;span data-dcnode-id=&quot;2958&quot; instrument_node=&quot;&quot;&gt;Posted on &lt;/span&gt;&lt;a data-dcnode-id=&quot;2955&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//isj.org.uk/the-neoliberal-era-in-britain-historical-developments-and-current-perspectives/&quot; rel=&quot;bookmark&quot; title=&quot;3:08 pm&quot;&gt;&lt;time class=&quot;entry-date published updated&quot; data-dcnode-id=&quot;2956&quot; datetime=&quot;2013-07-05T15:08:00+01:00&quot;&gt;&lt;span data-dcnode-id=&quot;2957&quot; instrument_node=&quot;&quot;&gt;5th July 2013&lt;/span&gt;&lt;/time&gt;&lt;/a&gt;&lt;/span&gt;&lt;span class=&quot;byline&quot; data-dcnode-id=&quot;2949&quot;&gt;&lt;span data-dcnode-id=&quot;2953&quot; instrument_node=&quot;&quot;&gt; by &lt;/span&gt;&lt;span class=&quot;author vcard&quot; data-dcnode-id=&quot;2950&quot;&gt;&lt;a class=&quot;url fn n&quot; data-dcnode-id=&quot;2951&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//isj.org.uk/author/isj846yrcat/&quot; title=&quot;View all posts by ISJ&quot;&gt;&lt;span data-dcnode-id=&quot;2952&quot; instrument_node=&quot;&quot;&gt;ISJ&lt;/span&gt;&lt;/a&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2947&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2944&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 class=&quot;author-meta&quot; data-dcnode-id=&quot;2942&quot;&gt;&lt;span data-dcnode-id=&quot;2943&quot; instrument_node=&quot;&quot;&gt;Neil Davidson&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/header&gt;&lt;span data-dcnode-id=&quot;2938&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;clearfix entry-content&quot; data-dcnode-id=&quot;321&quot;&gt;&lt;span data-dcnode-id=&quot;2937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2925&quot;&gt;&lt;span data-dcnode-id=&quot;2936&quot; instrument_node=&quot;&quot;&gt;The world economy has experienced four systemic crises since the emergence of capitalism as a global system; the years 1873, 1929, 1973 marked the commencement of the first three. As Gérard Duménil and Dominique Lévy write: “Each of these earthquakes introduced the establishment of a new social order and deeply altered international relations.” However, it is less clear whether, as they also claim, “the contemporary crisis marks the beginning of a similar process of transition”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2933&quot; href=&quot;#139davidson_1&quot; name=&quot;139davidson1&quot;&gt;&lt;sup data-dcnode-id=&quot;2934&quot;&gt;&lt;span data-dcnode-id=&quot;2935&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2932&quot; instrument_node=&quot;&quot;&gt; The end of neoliberalism has been proclaimed several times before, often by the same people on different occasions. For example, the late Eric Hobsbawm regularly produced obituaries for it throughout the 1980s and 90s, lastly in his 2002 autobiography.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2929&quot; href=&quot;#139davidson_2&quot; name=&quot;139davidson2&quot;&gt;&lt;sup data-dcnode-id=&quot;2930&quot;&gt;&lt;span data-dcnode-id=&quot;2931&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2928&quot; instrument_node=&quot;&quot;&gt; Hobsbawm refrained from making a similar pronouncement in 2008, even though it would have had greater plausibility than its predecessors. For states throughout the developed world—including those like Britain and the US which had been most committed to &lt;/span&gt;&lt;br data-dcnode-id=&quot;2927&quot;&gt;&lt;span data-dcnode-id=&quot;2926&quot; instrument_node=&quot;&quot;&gt;
neoliberalism—bought massive and in some cases dominant stakes in failing banks, using levels of public spending we had previously been told were no longer available or which could not be used without distorting the market. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2924&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2901&quot;&gt;&lt;span data-dcnode-id=&quot;2923&quot; instrument_node=&quot;&quot;&gt;Thatcher’s personal demise on 8 April 2013 might then have simply confirmed the sense of an ending. Her funeral, although an obscene insult to her many victims, would have merely represented theatrical compensation for her admirers, who were otherwise left contemplating a world in which she was reduced to “a historic footnote in a culture that had abolished history”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2920&quot; href=&quot;#139davidson_3&quot; name=&quot;139davidson3&quot;&gt;&lt;sup data-dcnode-id=&quot;2921&quot;&gt;&lt;span data-dcnode-id=&quot;2922&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2919&quot; instrument_node=&quot;&quot;&gt; Unfortunately, as obituaries and commemorative pull-outs across the political spectrum from the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2917&quot;&gt;&lt;span data-dcnode-id=&quot;2918&quot; instrument_node=&quot;&quot;&gt;Daily Telegraph&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2916&quot; instrument_node=&quot;&quot;&gt; to &lt;/span&gt;&lt;em data-dcnode-id=&quot;2914&quot;&gt;&lt;span data-dcnode-id=&quot;2915&quot; instrument_node=&quot;&quot;&gt;Socialist Worker&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2913&quot; instrument_node=&quot;&quot;&gt; attested, we still live in the world which she helped create. A degree of scepticism is therefore in order when confronted with claims that that “neoliberalism has self-destructed”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2910&quot; href=&quot;#139davidson_4&quot; name=&quot;139davidson4&quot;&gt;&lt;sup data-dcnode-id=&quot;2911&quot;&gt;&lt;span data-dcnode-id=&quot;2912&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2909&quot; instrument_node=&quot;&quot;&gt; The current crisis has not yet led to a new period of “postneoliberalism”. Nor is there even a crisis of neoliberalism, as Duménil and Lévy claim.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2906&quot; href=&quot;#139davidson_5&quot; name=&quot;139davidson5&quot;&gt;&lt;sup data-dcnode-id=&quot;2907&quot;&gt;&lt;span data-dcnode-id=&quot;2908&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2905&quot; instrument_node=&quot;&quot;&gt; In Alfredo Saad-Filho’s terms, we are instead experiencing a crisis in neoliberalism, which, in the absence of successful resistance by the exploited and oppressed, may lead not to its extinction, but to its further evolution.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2902&quot; href=&quot;#139davidson_6&quot; name=&quot;139davidson6&quot;&gt;&lt;sup data-dcnode-id=&quot;2903&quot;&gt;&lt;span data-dcnode-id=&quot;2904&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2900&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2898&quot;&gt;&lt;span data-dcnode-id=&quot;2899&quot; instrument_node=&quot;&quot;&gt;There is, however, one fundamental difference between neoliberalism pre- and post-2008. As we shall see, the key figures in the former period—including Thatcher herself—were always more pragmatic and opportunistic than either their supporters or their opponents claimed. Nevertheless, they all shared a small but clear set of key objectives and strategies, even though these had unintended consequences. Their successors in the current period no longer do so. Instead they display an increasingly well-founded sense of panic and consequent incoherence. Yet in the midst of this chaos and uncertainty the ruling classes of the world have found one measure of agreement: that the cost of the current crisis will be borne by the people over whom they rule, rather than by themselves.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2897&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2891&quot;&gt;&lt;span data-dcnode-id=&quot;2896&quot; instrument_node=&quot;&quot;&gt;We have therefore in many respects returned to our starting point in the mid-1970s. After nearly 40 years of neoliberalism the very same solutions are now being offered to the same problems, with the same intended victims. But this is not an occasion in which “the great events and characters of world history” are repeated “the first time as tragedy, the second as farce”; for if the ruling classes do achieve their goals, they will simply extend and deepen the original tragedy, in circumstances where the social welfare provision built up during the post-war era has in many countries already been significantly reduced.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2893&quot; href=&quot;#139davidson_7&quot; name=&quot;139davidson7&quot;&gt;&lt;sup data-dcnode-id=&quot;2894&quot;&gt;&lt;span data-dcnode-id=&quot;2895&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2892&quot; instrument_node=&quot;&quot;&gt; Resistance to the phase of neoliberalism has already begun. We are not in a position to say what the future of capitalism will involve: a further mutation of neoliberalism; the replacement of neoliberalism by a new method of capitalist organisation; or—however distant this may seem—the overthrow of the entire system. However, we can say what neoliberalism was before 2008 and, equally importantly, what it was not.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2890&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2888&quot;&gt;&lt;span data-dcnode-id=&quot;2889&quot; instrument_node=&quot;&quot;&gt;Neoliberalism as a period in the history of capitalism&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2887&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2881&quot;&gt;&lt;span data-dcnode-id=&quot;2886&quot; instrument_node=&quot;&quot;&gt;Up to this point I have treated neoliberalism and contemporary capitalism as if they were essentially synonymous, but this is of course precisely one of the major points at issue. With some exceptions—notably Alex Callinicos and the present author—contributors to this journal, above all the late Chris Harman, have been sceptical about the notion of neoliberalism as anything other than an ideology, or perhaps a set of policies.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2883&quot; href=&quot;#139davidson_8&quot; name=&quot;139davidson8&quot;&gt;&lt;sup data-dcnode-id=&quot;2884&quot;&gt;&lt;span data-dcnode-id=&quot;2885&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2882&quot; instrument_node=&quot;&quot;&gt; The real question, however, is whether neoliberalism is a useful way of characterising the entire historical period from 1973 to 2008 and possibly beyond. There seem to be two reasons for our suspicion of the term “neoliberalism” to denote a historical period, one valid, the other not.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2867&quot;&gt;&lt;span data-dcnode-id=&quot;2879&quot; instrument_node=&quot;&quot;&gt;The valid reason is a response to some of the ways in which certain characteristics of neoliberalism, especially financialisation and debt, have been used to explain the present crisis. Writers unwilling to abandon core tenets of Marxist crisis theory, including several associated with this journal, have argued instead that its origins have to be found in the systemic long-term problem of profitability experienced by the system since the late 1960s.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2876&quot; href=&quot;#139davidson_9&quot; name=&quot;139davidson9&quot;&gt;&lt;sup data-dcnode-id=&quot;2877&quot;&gt;&lt;span data-dcnode-id=&quot;2878&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2875&quot; instrument_node=&quot;&quot;&gt; I agree with these authors, but reasserting the inescapability of the law of the tendency of the rate of profit to fall (TRPTF) is a necessary but insufficient approach and can produce its own problems. The school of Political Marxism associated with Robert Brenner, for example, tends to focus on the underlying exploitative and competitive relationships constitutive of the system, rejecting attempts at periodisation as being focused on mere epiphenomena.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2872&quot; href=&quot;#139davidson_10&quot; name=&quot;139davidson10&quot;&gt;&lt;sup data-dcnode-id=&quot;2873&quot;&gt;&lt;span data-dcnode-id=&quot;2874&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2871&quot; instrument_node=&quot;&quot;&gt; But capitalism has never existed in a pure form, operating according to the model established by Marx in &lt;/span&gt;&lt;em data-dcnode-id=&quot;2869&quot;&gt;&lt;span data-dcnode-id=&quot;2870&quot; instrument_node=&quot;&quot;&gt;Capital&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2868&quot; instrument_node=&quot;&quot;&gt;, and this is precisely why we attempt to identify successive stages of capitalist development. Indeed, one way of characterising these periods is precisely by identifying the shifting nature of the main countervailing tendencies to TRPTF. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2866&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2860&quot;&gt;&lt;span data-dcnode-id=&quot;2865&quot; instrument_node=&quot;&quot;&gt;In the International Socialist tradition we tend to identify three main periods in the history of capitalism. The period of “classical capitalism”—that is the one most closely approximating to that described by Marx—entered crisis in 1873. This led to the second period, involving the simultaneous formation of monopolies within the heartlands of the system and expansion of colonialism without, ultimately leading to the fusion of both these processes in a new phase of capitalist development variously known as “finance capitalism”, “monopoly capitalism” or “imperialism”. The crisis of monopoly capitalism in 1929 in turn led to a third stage, consisting of the consolidation of state capitalism and underpinned from the start of the Cold War by the permanent arms economy, most completely in the Stalinist states, with social or liberal democratic variants in the advanced West and hybrid forms emergent in non-Stalinist areas of the former colonial world.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2862&quot; href=&quot;#139davidson_11&quot; name=&quot;139davidson11&quot;&gt;&lt;sup data-dcnode-id=&quot;2863&quot;&gt;&lt;span data-dcnode-id=&quot;2864&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2861&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2859&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2846&quot;&gt;&lt;span data-dcnode-id=&quot;2858&quot; instrument_node=&quot;&quot;&gt;This brings me to the invalid reason for rejecting the concept of neoliberalism: our reluctance to accept, at least until very recently, that a new stage or period did in fact open in 1973. Faced with changes to capitalism it is possible to adopt one of three main positions. One is to claim that there has been a fundamental transformation requiring the abandonment of pre-existing positions. “New, new, new. Everything is new”, as Tony Blair exclaimed to no doubt bemused representatives of the Socialist International shortly after Labour’s election victory in 1997.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2855&quot; href=&quot;#139davidson_12&quot; name=&quot;139davidson12&quot;&gt;&lt;sup data-dcnode-id=&quot;2856&quot;&gt;&lt;span data-dcnode-id=&quot;2857&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2854&quot; instrument_node=&quot;&quot;&gt; But even among actual socialists there are, of course, right and left wing responses to allegedly novel situations. The defunct journal &lt;/span&gt;&lt;em data-dcnode-id=&quot;2852&quot;&gt;&lt;span data-dcnode-id=&quot;2853&quot; instrument_node=&quot;&quot;&gt;Marxism Today&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2851&quot; instrument_node=&quot;&quot;&gt;, associated with the Eurocommunist wing of the former Communist Party of Great Britain, adhered to a right wing version, in which changes to capitalism since the Second World War had supposedly so weakened the working class and its organisations, that only alliances with sections of the middle class could deliver “progressive” outcomes.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2848&quot; href=&quot;#139davidson_13&quot; name=&quot;139davidson13&quot;&gt;&lt;sup data-dcnode-id=&quot;2849&quot;&gt;&lt;span data-dcnode-id=&quot;2850&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2847&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2845&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2835&quot;&gt;&lt;span data-dcnode-id=&quot;2844&quot; instrument_node=&quot;&quot;&gt;Italian “autonomism” is a left—indeed ultra-left—response to an earlier set of changes, the emergence of the so-called “mass worker” during the Italian post-war miracle; only in this case the prospects for the working class are apparently excellent, not least because, in the late version associated with Michael Hardt and Antonio Negri at least, the working class has grown to engross everyone who is exploited or oppressed by capital in any way, in the form of a “multitude” which constitutes the new “dangerous class”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2841&quot; href=&quot;#139davidson_14&quot; name=&quot;139davidson14&quot;&gt;&lt;sup data-dcnode-id=&quot;2842&quot;&gt;&lt;span data-dcnode-id=&quot;2843&quot; instrument_node=&quot;&quot;&gt;14&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2840&quot; instrument_node=&quot;&quot;&gt; The latter claim shows that even individual concepts can have both optimistic and pessimistic versions. Guy Standing, for example, argues that what he calls “the precariat” is also the new dangerous class, but not, as in the case of Hardt and Negri, because of their potential to overthrow capital, but because of their potential susceptibility to far-right demagoguery.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2837&quot; href=&quot;#139davidson_15&quot; name=&quot;139davidson15&quot;&gt;&lt;sup data-dcnode-id=&quot;2838&quot;&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt;15&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2836&quot; instrument_node=&quot;&quot;&gt; In the face of this type of theoretical impressionism and the political indeterminacy to which it gives rise, a sense of the continuities involved in capitalism is an indispensable barrier to the adoption of fashionable stupidities. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2834&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2829&quot;&gt;&lt;span data-dcnode-id=&quot;2833&quot; instrument_node=&quot;&quot;&gt;But there is a second position that, far from exaggerating changes to capitalism, refuses to acknowledge that it has undergone—or in some versions, can undergo—&lt;/span&gt;&lt;em data-dcnode-id=&quot;2831&quot;&gt;&lt;span data-dcnode-id=&quot;2832&quot; instrument_node=&quot;&quot;&gt;any&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2830&quot; instrument_node=&quot;&quot;&gt; significant changes. Continuity is all. More commonly, this “fundamentalist” approach is encountered in the politics of the most dogmatic sections of the revolutionary left where the assertion of eternal truths such as “capitalism is still capitalism; the working class is still the working class” substitute for any real analysis. The most famous example of this is, of course, the position adopted by the mainstream Trotskyist movement in 1948, where adherence, not to general claims about the nature of capitalism in this case, but to specific claims made by Trotsky in 1938 that then became the measure of orthodoxy. This example is particularly important in the IS tradition, which was founded on Tony Cliff’s rejection of these claims and his revision of their theoretical assumptions on the grounds that they no longer corresponded to reality. This was not mere iconoclasm, but a recognition that, whatever their original merits, history had overtaken and rendered invalid Trotsky’s views on the nature of Stalinist Russia, the prospects for the world economy and the range of revolutionary outcomes in the Third World.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2828&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2826&quot;&gt;&lt;span data-dcnode-id=&quot;2827&quot; instrument_node=&quot;&quot;&gt;Cliff’s approach, particularly between 1948 and 1963, in a series of ground-breaking works from “The Nature of Stalinist Russia” to “Permanent Revolution” therefore exemplifies a third possible response to change, starting from the understanding that capitalism involves underlying continuities, without which it would cease to exist, but also that it undergoes periodic changes in form, which are the expressions of its historical development. Revolutionaries have to recognise and respond to the latter, rather than denying their existence just because they threaten to disrupt venerable organisational forms or established interventionist strategies. They should instead look for what new possibilities these changes offer, however unfamiliar or unsettling they may be. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2825&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2819&quot;&gt;&lt;span data-dcnode-id=&quot;2824&quot; instrument_node=&quot;&quot;&gt;Writing in this journal in 1979 Cliff used the metaphor of “the downturn” to encapsulate the situation of retreat and demoralisation that the British working class was beginning to undergo in the late 1970s, although the term was rapidly extended to encompass the global decline in the class struggle from the post-war high point between 1968 and 1975. This was a necessary recognition of reality which was contested within the SWP, but as Ian Birchall writes in his biography of Cliff: “The real argument in this period was not so much with those who denied the downturn, but with those who drew different conclusions from the facts.” Birchall is thinking here of the likes of Hobsbawm and André Gorz, and, unlike them, Cliff, “was concerned with a shift in the balance of class forces, not with a change in the nature of society”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2821&quot; href=&quot;#139davidson_16&quot; name=&quot;139davidson16&quot;&gt;&lt;sup data-dcnode-id=&quot;2822&quot;&gt;&lt;span data-dcnode-id=&quot;2823&quot; instrument_node=&quot;&quot;&gt;16&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2820&quot; instrument_node=&quot;&quot;&gt; Now, it is obvious that no one could have predicted what was to come from the vantage point of the late 1970s, not least because—as is always the case at decisive turning points—the future direction was undetermined, dependent as it was on the outcome of the global class struggle; but by the beginning of the 1990s the outline should have been clear: the mid-1970s had seen the beginning of a new period in the development of capitalism. We were dealing with a change in society, not just a change in the balance of class forces. But compared to our analysis of the period between 1948 and 1973, clarity failed to emerge from our discussion of the subsequent decades. Why?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2818&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2806&quot;&gt;&lt;span data-dcnode-id=&quot;2817&quot; instrument_node=&quot;&quot;&gt;The theory of the permanent arms economy was never as complete an explanation for the post-war boom as tends to be assumed in our tradition, but in retrospect it appears that Cliff regarded it as an exceptional interlude in the history of capitalism, after which unresolvable crisis and the “stagnation of the productive forces” proclaimed by Trotsky on the eve of the Second World War would resume, inevitably leading to a revival of the class struggle, regardless of temporary setbacks: “Capitalism in the advanced countries is no longer expanding and so the words of the 1938 Transitional Programme that ‘there can be no discussion of systematic social reforms and the raising of the masses’ living standards’ fits again”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2814&quot; href=&quot;#139davidson_17&quot; name=&quot;139davidson17&quot;&gt;&lt;sup data-dcnode-id=&quot;2815&quot;&gt;&lt;span data-dcnode-id=&quot;2816&quot; instrument_node=&quot;&quot;&gt;17&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2813&quot; instrument_node=&quot;&quot;&gt;  There would be no more countervailing tendencies to the TRPTF, at least of any significance. The concluding passage to Harman’s &lt;/span&gt;&lt;em data-dcnode-id=&quot;2811&quot;&gt;&lt;span data-dcnode-id=&quot;2812&quot; instrument_node=&quot;&quot;&gt;Explaining the Crisis&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2810&quot; instrument_node=&quot;&quot;&gt;, first published in &lt;/span&gt;&lt;em data-dcnode-id=&quot;2808&quot;&gt;&lt;span data-dcnode-id=&quot;2809&quot; instrument_node=&quot;&quot;&gt;International Socialism&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2807&quot; instrument_node=&quot;&quot;&gt; in 1982—the year the neoliberal boom began—expresses the perspective: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2805&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2796&quot;&gt;&lt;span data-dcnode-id=&quot;2804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2798&quot;&gt;&lt;span data-dcnode-id=&quot;2803&quot; instrument_node=&quot;&quot;&gt;This does not mean that the world economy is doomed simply to decline. An overall tendency towards stagnation can still be accompanied by minor booms, with small but temporary increases in employment… The present phase of crisis is likely to go on and on—until it is resolved either by plunging much of the world into barbarism or by a succession of workers’ revolutions.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2800&quot; href=&quot;#139davidson_18&quot; name=&quot;139davidson18&quot;&gt;&lt;sup data-dcnode-id=&quot;2801&quot;&gt;&lt;span data-dcnode-id=&quot;2802&quot; instrument_node=&quot;&quot;&gt;18&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2799&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2797&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2795&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2789&quot;&gt;&lt;span data-dcnode-id=&quot;2794&quot; instrument_node=&quot;&quot;&gt;Harman later noted that the notion of “permanent crisis” was wrong: “It was a mistake on my part to use such a formulation—although I think excusable as we faced only the second real recession my generation had experienced and did so a mere four years after the end of the first.” But this concession was less significant than at first appeared: “It may not be in permanent crisis, but it is in a phase of repeated crises from which it cannot escape, and these will necessarily be political and social as well as economic”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2791&quot; href=&quot;#139davidson_19&quot; name=&quot;139davidson19&quot;&gt;&lt;sup data-dcnode-id=&quot;2792&quot;&gt;&lt;span data-dcnode-id=&quot;2793&quot; instrument_node=&quot;&quot;&gt;19&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2790&quot; instrument_node=&quot;&quot;&gt; I am not clear whether there is any substantive difference between undergoing a permanent crisis and merely experiencing an endless series of repeated crises: both formulations involve the same reluctance to admit that capitalism might be capable of recovering from the recession which opened in 1973. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2782&quot;&gt;&lt;span data-dcnode-id=&quot;2787&quot; instrument_node=&quot;&quot;&gt;Of course, there were immensely challenging implications for revolutionaries in a situation where it might not be enough to simply retrench while intervening as best they could until the balance of forces was once more in their favour. It was as if reaching an understanding of a new period, one in which both labour and capital were being profoundly restructured, and then developing a perspective and a strategy based on that understanding, was simply too massive, too much of a distraction from our immediate tasks to undertake. Without that understanding, however, our ability to accomplish even these immediate tasks will remain in doubt. “But history has shown us too to have been wrong, has revealed our point of view at that time as an illusion”, wrote Engels in 1895, reflecting on the German Revolution of 1848: “It has done even more; it has not merely dispelled the erroneous notions we then held; it has also completely transformed the conditions under which the proletariat has to fight”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2784&quot; href=&quot;#139davidson_20&quot; name=&quot;139davidson20&quot;&gt;&lt;sup data-dcnode-id=&quot;2785&quot;&gt;&lt;span data-dcnode-id=&quot;2786&quot; instrument_node=&quot;&quot;&gt;20&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2783&quot; instrument_node=&quot;&quot;&gt; Comparable reassessments of both the “erroneous notions” which we have held since the 1970s and “the transformed conditions under which we have to fight” are now in order. Of course, preparation of such an assessment involves knowledge already acquired from ongoing practical intervention as much as from theoretical study, but even direct experience of the struggle has to be interpreted. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2781&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2771&quot;&gt;&lt;span data-dcnode-id=&quot;2780&quot; instrument_node=&quot;&quot;&gt;What follows is therefore a first approximation, no doubt inadequate, at assessing the neoliberal era in Britain that has brought us to this point.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2777&quot; href=&quot;#139davidson_21&quot; name=&quot;139davidson21&quot;&gt;&lt;sup data-dcnode-id=&quot;2778&quot;&gt;&lt;span data-dcnode-id=&quot;2779&quot; instrument_node=&quot;&quot;&gt;21&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2776&quot; instrument_node=&quot;&quot;&gt; My aim is to treat the neoliberal era as a totality. Whatever my other disagreements with Harman on this issue, he was certainly right to say that crises cannot be understood simply in economic terms. As Loïc Wacquant has written, “the prevalent conception of neoliberalism is economic”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2773&quot; href=&quot;#139davidson_22&quot; name=&quot;139davidson22&quot;&gt;&lt;sup data-dcnode-id=&quot;2774&quot;&gt;&lt;span data-dcnode-id=&quot;2775&quot; instrument_node=&quot;&quot;&gt;22&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2772&quot; instrument_node=&quot;&quot;&gt; At best, discussions of it as a historical phenomenon focus on the terrain where the economic and the political intersect. But to consider neoliberalism as a whole, we must pay at least as much attention to the social domain that overlaps with and mediates between the economic and the political.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2768&quot;&gt;&lt;span data-dcnode-id=&quot;2769&quot; instrument_node=&quot;&quot;&gt;The long-term effects of capitalist globalisation&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2767&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2765&quot;&gt;&lt;span data-dcnode-id=&quot;2766&quot; instrument_node=&quot;&quot;&gt;During the period of unparalleled growth associated with the great boom of the 1950s and 1960s three developments took place in the world economy that established the framework for what followed. These rendered obsolete the largely national assumptions within which economic policy had been conducted since the Great Crash of 1929. The first was the unprecedented three-fold expansion of international trade, growing twice as fast as actual output across the period, with the biggest increase taking place in the decade immediately prior to the crash of 1973. But as the economies of the major states became more dependent on imports and exports than internal transactions, the relative differences between production costs across borders became far more significant than when the bulk of trade had been territorially self-contained. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2764&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2762&quot;&gt;&lt;span data-dcnode-id=&quot;2763&quot; instrument_node=&quot;&quot;&gt;The second development was an increase in the extent of cross-border production, utilising world forces of production rather than only those of one territorial state—a process driven, above all, by the need to achieve economies of scale that were only possible within a multinational market. We need to be careful of exaggerating the impact of this change: the spread of production across several states, and the consequent partial detachment from the control of any one, tended to be a regional rather than a truly global phenomenon, and it remained more difficult for capital simply to close production in one area and move it to another than multinational corporations would have workforces and governments believe. Nevertheless it did strengthen the position of multinational corporations and weaken that of states in relation to each other. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2755&quot;&gt;&lt;span data-dcnode-id=&quot;2760&quot; instrument_node=&quot;&quot;&gt;The third development was another example of internationalisation, but in this case of finance rather than production. It had two aspects. One was the increase in large-scale foreign direct investment (FDI). The scale of FDI in particular needs to be understood: it grew twice as fast as goods and services in the 1960s and four times as fast in the 1980s, while in the 1990s: “FDI soared by 314 percent, utterly eclipsing the 65 percent increase in world trade and the 40 percent increase in world gross domestic product”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2757&quot; href=&quot;#139davidson_23&quot; name=&quot;139davidson23&quot;&gt;&lt;sup data-dcnode-id=&quot;2758&quot;&gt;&lt;span data-dcnode-id=&quot;2759&quot; instrument_node=&quot;&quot;&gt;23&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2756&quot; instrument_node=&quot;&quot;&gt; The other aspect was the creation of “offshore” banking and flows of money capital unlimited by national boundaries: unlike factories, money can be moved with ease and is not dependent on protection of a territorial state or states. More than any other, this made government policies vulnerable to attack when they were seen to be acting against the interest of capital.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2754&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2745&quot;&gt;&lt;span data-dcnode-id=&quot;2753&quot; instrument_node=&quot;&quot;&gt;None of these developments rendered states completely powerless in the face of markets—that is the myth of globalisation assiduously cultivated by politicians seeking to evade responsibility for their actions. Neoliberalism represented a choice, but it was a choice increasingly difficult to avoid so long as the goal was the preservation and expansion of capitalism at all costs. When Nixon devalued the US dollar and detached it from the Gold Standard in August 1971, this first of all neoliberal policy decisions was, as Morris Berman points out, “the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2751&quot;&gt;&lt;span data-dcnode-id=&quot;2752&quot; instrument_node=&quot;&quot;&gt;result&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2750&quot; instrument_node=&quot;&quot;&gt; of globalisation”, of the cumulative changes brought about by the resumption of the internationalisation of capital after 1945.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2747&quot; href=&quot;#139davidson_24&quot; name=&quot;139davidson24&quot;&gt;&lt;sup data-dcnode-id=&quot;2748&quot;&gt;&lt;span data-dcnode-id=&quot;2749&quot; instrument_node=&quot;&quot;&gt;24&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2746&quot; instrument_node=&quot;&quot;&gt; In so far as there is a relationship between capitalist globalisation and neoliberalism, it was that the former set the conditions for the latter: a highly internationalised economy that had now returned to crisis conditions. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2742&quot;&gt;&lt;span data-dcnode-id=&quot;2743&quot; instrument_node=&quot;&quot;&gt;There were two direct preconditions for neoliberalism. One was the increasing size of the capitalist enterprise. During the great boom there was general support for state intervention among the larger businesses and corporations, while small businesses retained their traditional hostility to it. These differences expressed the relative security of their positions within the market: corporations were protected from the worst exigencies of price competition and were able to plan for longer-term investment growth, often in alliance with the state; small businesses were much more vulnerable and, to them, the state simply represented a source of predatory taxation and bureaucratic regulation. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2735&quot;&gt;&lt;span data-dcnode-id=&quot;2740&quot; instrument_node=&quot;&quot;&gt;Increased global competition changed the relative position of the corporations, so that all but the largest transnational corporations were placed in a similar position to the small businesses of the post-war period, in terms of their relative size within the market: “The process of globalisation has sharply increased the degree of competitive pressure faced by large corporations and banks, as competition has become a worldwide relationship.” Corporations still needed a home state to act as a base, but they increasingly required it to behave differently. Neoliberal globalisation “pushes them towards support for any means to reduce their tax burden and lift regulatory constraints, to free them to compete more effectively with their global rivals”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2737&quot; href=&quot;#139davidson_25&quot; name=&quot;139davidson25&quot;&gt;&lt;sup data-dcnode-id=&quot;2738&quot;&gt;&lt;span data-dcnode-id=&quot;2739&quot; instrument_node=&quot;&quot;&gt;25&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2736&quot; instrument_node=&quot;&quot;&gt; Corporations therefore began to demand some of the policies long advocated by Frederick von Hayek and Milton Friedman, and politicians and state managers began to implement them, not because individual opportunities to do so which previously been missing finally presented themselves, but because changed conditions of accumulation required changed strategies. Given the limited number of these available (assuming them to be in the interests of capital), it is unsurprising that the new practices now demanded began to overlap with existing theories.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2732&quot;&gt;&lt;span data-dcnode-id=&quot;2733&quot; instrument_node=&quot;&quot;&gt;The short-term impact of capitalist crisis&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2731&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2721&quot;&gt;&lt;span data-dcnode-id=&quot;2730&quot; instrument_node=&quot;&quot;&gt;The second, more dramatic development was the resumption of economic crisis in 1973/4. As Ashley Lavelle writes, globalisation is a “proximate” explanation for the rise of neoliberalism, the end of the post-war boom an “ultimate” one: “Thus, the rapprochement [of social democracy] with neoliberalism is best understood as a response to changed economic conditions, which in turn shaped the ideological and political climates to put pressures on governments to open up their economies to cross-border flows of investment and trade, in the process creating the ‘globalisation’ many mistakenly credit with undermining traditional social democratic politics”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2727&quot; href=&quot;#139davidson_26&quot; name=&quot;139davidson26&quot;&gt;&lt;sup data-dcnode-id=&quot;2728&quot;&gt;&lt;span data-dcnode-id=&quot;2729&quot; instrument_node=&quot;&quot;&gt;26&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2726&quot; instrument_node=&quot;&quot;&gt; The precise causes of the return to crisis after 1973 have been widely debated, but some key features are highlighted by most analysts. Increased price competition from West Germany and Japan within the advanced world was made possible by intensive investment in technology and relatively low wages. This forced their hitherto dominant rivals—above all the US—to lower their own prices in a situation where production costs remained unchanged. American corporations were initially prepared to accept a reduced rate of profit in order to maintain market share but ultimately they too undertook a round of new investments, thus raising the capital-labour ratio and increasing the organic composition of capital, leading to consequent further pressure on the rate of profit.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2723&quot; href=&quot;#139davidson_27&quot; name=&quot;139davidson27&quot;&gt;&lt;sup data-dcnode-id=&quot;2724&quot;&gt;&lt;span data-dcnode-id=&quot;2725&quot; instrument_node=&quot;&quot;&gt;27&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2722&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2720&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2714&quot;&gt;&lt;span data-dcnode-id=&quot;2719&quot; instrument_node=&quot;&quot;&gt;As Al Campbell writes, neoliberalism was therefore a solution to “a structural crisis of capitalism” in which “policies, practices and institutions” which had hitherto served capital accumulation no longer did so: “More narrowly, one can say that capitalism abandoned the Keynesian compromise in the face of a falling rate of profit, under the belief that neoliberalism could improve its profit rate and accumulation performance”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2716&quot; href=&quot;#139davidson_28&quot; name=&quot;139davidson28&quot;&gt;&lt;sup data-dcnode-id=&quot;2717&quot;&gt;&lt;span data-dcnode-id=&quot;2718&quot; instrument_node=&quot;&quot;&gt;28&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2715&quot; instrument_node=&quot;&quot;&gt; But the inadequacy of Keynesian policies was itself the result of changes to the nature of the world economy which had taken place during the long boom, and which made these policies increasingly difficult to apply with any possibility of success. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2708&quot;&gt;&lt;span data-dcnode-id=&quot;2712&quot; instrument_node=&quot;&quot;&gt;The emergence of neoliberalism as a conscious ruling class strategy, rather than an esoteric ideological doctrine, therefore took place in response to the end of the post-war boom, but in changed conditions created by that boom. The failure of Keynesianism and other forms of state capitalism predisposed many capitalists, state managers and politicians, not just to accept, but to wholeheartedly embrace, theories which they would earlier have rejected as eccentric, or even dangerously destabilising; but even then the policy shifts which followed were as often pragmatic adaptations as they were born of ideological conviction. In 1974 the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2710&quot;&gt;&lt;span data-dcnode-id=&quot;2711&quot; instrument_node=&quot;&quot;&gt;Economist&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2709&quot; instrument_node=&quot;&quot;&gt;, at that time still advocating a more or less Keynesian approach, accused Sir Keith Joseph of being a “follower” of Friedman. Joseph responded saying that “the evolution of my views owes little to him”:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2698&quot;&gt;&lt;span data-dcnode-id=&quot;2706&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2700&quot;&gt;&lt;span data-dcnode-id=&quot;2705&quot; instrument_node=&quot;&quot;&gt;On the contrary, it stems primarily…from critical re-examination of local orthodoxies in the light of our own bitter experience in the early 1970s… By early this year [1974], we had a historically high rate of inflation, an enfeebled economy, the worst relations with the trade union movement in decades, and a lost election with the greatest fall in our share of the vote since 1929. Surely this was sufficient incentive to rethink—we are practical people who judge ideas and policies by results.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2702&quot; href=&quot;#139davidson_29&quot; name=&quot;139davidson29&quot;&gt;&lt;sup data-dcnode-id=&quot;2703&quot;&gt;&lt;span data-dcnode-id=&quot;2704&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2701&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2699&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2697&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2691&quot;&gt;&lt;span data-dcnode-id=&quot;2696&quot; instrument_node=&quot;&quot;&gt;In public pronouncements neoliberals initially tended to focus less on restoring profitability and more on reducing the amount of state expenditure and the size of the state itself (although usually treated as synonymous these are of course very different goals) and controlling inflation, since these could be presented as beneficial to citizens as taxpayers and consumers. But regardless of the way in which neoliberal goals were expressed, the major obstacle to the reorganisation of capital required by the crisis lay elsewhere. The Argentinian military junta of the 1970s had originally regarded their main opponent as the Peronist movement, but as one member later admitted, “by 1976 we already knew that the problem was the working class”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2693&quot; href=&quot;#139davidson_30&quot; name=&quot;139davidson30&quot;&gt;&lt;sup data-dcnode-id=&quot;2694&quot;&gt;&lt;span data-dcnode-id=&quot;2695&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2692&quot; instrument_node=&quot;&quot;&gt; In fact, the imminence of revolution was no longer a threat by the mid-1970s, so in what sense was the working class “the problem”? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2684&quot;&gt;&lt;span data-dcnode-id=&quot;2689&quot; instrument_node=&quot;&quot;&gt;During the Second World War the Polish economist Michael Kalecki predicted that although “a regime of permanent full employment” would actually increase profits, employers would nevertheless oppose such a development because it would build working class self-confidence, encourage industrial action for improved wages and “create political tension”. In the end, Kalecki wrote, “’discipline in the factories’ and ‘political stability’ are more appreciated than profits by business leaders”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2686&quot; href=&quot;#139davidson_31&quot; name=&quot;139davidson31&quot;&gt;&lt;sup data-dcnode-id=&quot;2687&quot;&gt;&lt;span data-dcnode-id=&quot;2688&quot; instrument_node=&quot;&quot;&gt;31&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2685&quot; instrument_node=&quot;&quot;&gt; The Golden Age did, of course, see many intense industrial struggles, but no concerted attempts to roll back the position of trade unions until the very end. Kalecki underestimated the extent to which employers would be prepared to accept pressure on wages, however unwillingly, provided the rate of profit was maintained at a sufficiently high level. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2683&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2681&quot;&gt;&lt;span data-dcnode-id=&quot;2682&quot; instrument_node=&quot;&quot;&gt;Once it fell below a certain level, as was increasingly the case from the late 1960s, this situation was no longer sustainable for capital, meaning, attacks not only on workplace terms and conditions, but also on those aspects of the welfare state—the “social wage”—which were beneficial to the working class. The main source of funding for welfare provision came from redistribution within the working class itself; but to the extent that it was also a cost to capital, a drain on investment, it was one which capitalists had reluctantly been prepared to pay so long as the system was expanding. When it began to contract, as it did after 1973, these costs to capital, like wages, had to be reduced, by directly attacking provisions directly in the hands of employers (pensions, health insurance) and shifting the burden of taxation even more decisively onto the working class. How was this to be achieved—and who was to achieve it?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2680&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2678&quot;&gt;&lt;span data-dcnode-id=&quot;2679&quot; instrument_node=&quot;&quot;&gt;Vanguard neoliberalism: a regime of reorientation&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2671&quot;&gt;&lt;span data-dcnode-id=&quot;2676&quot; instrument_node=&quot;&quot;&gt;The unevenness of the global spread of neoliberalism indicates not only the relative strength and determination of national labour movements, but the presence of these qualities among the politicians who were intent on making neoliberalism a reality. Capitalist states are sets of permanent institutions run by unelected officials who act in the interests of capital more or less effectively; parliamentary government involves a series of temporary regimes consisting of elected politicians who act in the interests of capital, more or less willingly. But in times of crisis capital requires politicians who will decide on a particular strategy and fight for it with absolute conviction, if necessary against individual members of the capitalist class themselves. During the 1930s Antonio Gramsci discussed this type of ruling class response to crisis as “an organic and normal phenomenon”: “It represents the fusion of an entire social class under a single leadership, which alone is held to be capable of solving an overriding problem of its existence and of fending off a mortal danger”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2673&quot; href=&quot;#139davidson_32&quot; name=&quot;139davidson32&quot;&gt;&lt;sup data-dcnode-id=&quot;2674&quot;&gt;&lt;span data-dcnode-id=&quot;2675&quot; instrument_node=&quot;&quot;&gt;32&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2672&quot; instrument_node=&quot;&quot;&gt; By autumn 1976 leading figures on the right and centre of the Labour Party had essentially accepted the monetarist case for reducing public spending and indeed a number of other New Right positions besides, including those on immigration and education—in some cases from intellectual conversion, but in most from temporary expediency, at least at this stage. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2664&quot;&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;The result, however, was to both give credibility to the arguments of those who advocated these solutions from principle and to expose Labour’s own inability to deliver them in the face of opposition from a still-powerful trade union movement and its own left wing.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2666&quot; href=&quot;#139davidson_33&quot; name=&quot;139davidson33&quot;&gt;&lt;sup data-dcnode-id=&quot;2667&quot;&gt;&lt;span data-dcnode-id=&quot;2668&quot; instrument_node=&quot;&quot;&gt;33&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2665&quot; instrument_node=&quot;&quot;&gt; This was typical: only in the exceptional case of New Zealand after 1984 did an incumbent social democratic party transform itself into the agent of neoliberalism before it became the dominant form of contemporary capitalist organisation. The establishment of neoliberal hegemony in the late 1970s usually required an entirely new political regime, one which did not reluctantly acquiesce in policies they would rather have avoided, but who were fully committed to their implementation and, initially, this meant the established parties of the right. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2663&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2654&quot;&gt;&lt;span data-dcnode-id=&quot;2662&quot; instrument_node=&quot;&quot;&gt;In a British context, the role of Margaret Thatcher was therefore crucial to what followed. Her governments directly represented capital in so far as it was opposed to the working class movement (“vertically”), but could not represent every component of capital (“horizontally”), because there was no general agreement on capitalist strategy during the late 1970s, not least because individual capitals could and did suffer from the one eventually adopted from 1979 onwards.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2659&quot; href=&quot;#139davidson_34&quot; name=&quot;139davidson34&quot;&gt;&lt;sup data-dcnode-id=&quot;2660&quot;&gt;&lt;span data-dcnode-id=&quot;2661&quot; instrument_node=&quot;&quot;&gt;34&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2658&quot; instrument_node=&quot;&quot;&gt; The transition from one form of capitalist organisation to another does not require the bourgeoisie to develop the new institutional forms required for a workers’ revolution: the state is already dedicated to the defence of capitalism in a general sense, but the activity of the various state institutions needs to be decisively turned in a specific and different direction. In the British case the dynamic behind the neoliberal turn came from a minority within the newly elected Conservative Party that acted as the vanguard of the British capitalist class. As late as the aftermath of the 1983 general election, Thatcher could still note that: “There was revolution still to be made, but too few revolutionaries”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2655&quot; href=&quot;#139davidson_35&quot; name=&quot;139davidson35&quot;&gt;&lt;sup data-dcnode-id=&quot;2656&quot;&gt;&lt;span data-dcnode-id=&quot;2657&quot; instrument_node=&quot;&quot;&gt;35&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2653&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2643&quot;&gt;&lt;span data-dcnode-id=&quot;2652&quot; instrument_node=&quot;&quot;&gt;What was the significance of Thatcher as an individual? According to Andy Beckett in his history of the 1970s: “Right up until the last days of the 1979 general election Margaret Thatcher was not the only possible answer to the questions the decade posed.” To support this conclusion he cites an assessment of her ascendancy by Alfred Sherman: “It was chance.” Callaghan could have called the general election for October 1978 and Labour would likely have won, but even if they had not and the Conservatives had taken office at the earlier date, the latter party would then have had to deal with the Winter of Discontent—a contest for which they were unprepared and which Thatcher herself believed would have destroyed the government before it had begun.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2649&quot; href=&quot;#139davidson_36&quot; name=&quot;139davidson36&quot;&gt;&lt;sup data-dcnode-id=&quot;2650&quot;&gt;&lt;span data-dcnode-id=&quot;2651&quot; instrument_node=&quot;&quot;&gt;36&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2648&quot; instrument_node=&quot;&quot;&gt; And, as Colin Hay has argued, Callaghan’s caution in not calling an early election allowed Thatcher and her allies in the media to “construct” the “Winter of Discontent” as a crisis of governability which gathered her support.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2645&quot; href=&quot;#139davidson_37&quot; name=&quot;139davidson37&quot;&gt;&lt;sup data-dcnode-id=&quot;2646&quot;&gt;&lt;span data-dcnode-id=&quot;2647&quot; instrument_node=&quot;&quot;&gt;37&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2642&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2636&quot;&gt;&lt;span data-dcnode-id=&quot;2641&quot; instrument_node=&quot;&quot;&gt;The opposite view to that of Beckett has been taken by the Scottish writer James Kelman, who wrote shortly after Thatcher’s removal from office: “If she hadn’t been around somebody else would have been chosen. The very notion of ‘Thatcherism’ suggests that what is happening in this country began with her and will therefore end with her”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2638&quot; href=&quot;#139davidson_38&quot; name=&quot;139davidson38&quot;&gt;&lt;sup data-dcnode-id=&quot;2639&quot;&gt;&lt;span data-dcnode-id=&quot;2640&quot; instrument_node=&quot;&quot;&gt;38&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2637&quot; instrument_node=&quot;&quot;&gt; Beckett sees the period as involving a series of contingent events which could have had other outcomes. Kelman is deterministic, emphasising the conditions of crisis which would have ultimately brought forth the necessary political leadership in an attempt to resolve them in the interests of capital. Both arguments have some validity, but both ultimately underestimate the role of leadership. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2635&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2633&quot;&gt;&lt;span data-dcnode-id=&quot;2634&quot; instrument_node=&quot;&quot;&gt;Thatcher was in a minority among the leadership of her party which had itself been elected (as it would subsequently be re-elected) by a minority of voters. She nevertheless had several advantages. One was the financial support provided by revenues from the export of North Sea oil, the price of which had soared as an unintended consequence of the Iranian Revolution, and which began to make a serious impact on the balance of payments around the time of the 1979 general election. If this windfall can genuinely be described as a happy accident in terms of her project, the same cannot be said for the fact that the Conservatives faced a compromised and incoherent Labour Party, a section of whose membership and voting base had shifted to the newly formed Social Democratic Party. This rather reflected the crisis of an entire social democratic tradition which depended on the continuing health of the capitalist system to provide reforms, the possibilities for which had now ended. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2622&quot;&gt;&lt;span data-dcnode-id=&quot;2631&quot; instrument_node=&quot;&quot;&gt;Finally, the real enemy of the Conservative government, the broader labour movement, was in ideological and organisational turmoil, already disillusioned by the previous Labour government and weakened by unemployment (although offered some relief by the emergence of the economy from the depths of the 1981-2 slump).&lt;/span&gt;&lt;a data-dcnode-id=&quot;2628&quot; href=&quot;#139davidson_39&quot; name=&quot;139davidson39&quot;&gt;&lt;sup data-dcnode-id=&quot;2629&quot;&gt;&lt;span data-dcnode-id=&quot;2630&quot; instrument_node=&quot;&quot;&gt;39&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2627&quot; instrument_node=&quot;&quot;&gt; Thatcher still came close to defeat on several occasions during the first years of the 1980s. One Thatcherite acolyte, John Hoskyns, Head of the Downing Street Policy Unit in 1980, later claimed that if the steel strike of that year had ended in “humiliation” for the government, “it is quite possible that Thatcher would not now be a household name, nor would union reform, privatisation or any other radical policies have been adopted”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2624&quot; href=&quot;#139davidson_40&quot; name=&quot;139davidson40&quot;&gt;&lt;sup data-dcnode-id=&quot;2625&quot;&gt;&lt;span data-dcnode-id=&quot;2626&quot; instrument_node=&quot;&quot;&gt;40&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt; Her position only became unassailable through two victories. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2621&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2612&quot;&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt;The first was over the Argentinian military in 1982. The “Falklands factor” did not have any lasting popular impact, although it was widely believed to have done by writers around the then influential &lt;/span&gt;&lt;em data-dcnode-id=&quot;2618&quot;&gt;&lt;span data-dcnode-id=&quot;2619&quot; instrument_node=&quot;&quot;&gt;Marxism Today&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2617&quot; instrument_node=&quot;&quot;&gt;. The real impact was to consolidate Thatcher’s supremacy over the Conservative Party. The war was a gamble for Thatcher, not in the sense that there was ever much likelihood of the British forces losing; their relative weight compared to the Argentinians, the military balance of forces, was far too one-sided for that to be plausible. The real risk was that victory would come at the price of so many British casualties as to be publicly unacceptable. It did not.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2614&quot; href=&quot;#139davidson_41&quot; name=&quot;139davidson41&quot;&gt;&lt;sup data-dcnode-id=&quot;2615&quot;&gt;&lt;span data-dcnode-id=&quot;2616&quot; instrument_node=&quot;&quot;&gt;41&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2613&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2601&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;The second victory was over the National Union of Mineworkers (NUM) in 1985, which finally consolidated the neoliberal regime in Britain. In order to win Thatcher was quite prepared to abandon market principles and use the state, in Georg Lukács’s words, “as a weapon”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2607&quot; href=&quot;#139davidson_42&quot; name=&quot;139davidson42&quot;&gt;&lt;sup data-dcnode-id=&quot;2608&quot;&gt;&lt;span data-dcnode-id=&quot;2609&quot; instrument_node=&quot;&quot;&gt;42&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2606&quot; instrument_node=&quot;&quot;&gt; She later revealed that in 1990, when her government began to consider further pit closures as a prelude to privatisation, she “never had regard to the commercial aspects alone”. This, she claims, was partly from a sense of “loyalty and obligation” to the working miners who had scabbed on the 1984-5 strike, but there was another reason: “I knew we might have to face another strike. Where would we be if we had closed the pits at which moderate miners would have gone on working, and kept more profitable but left wing pits open?”&lt;/span&gt;&lt;a data-dcnode-id=&quot;2603&quot; href=&quot;#139davidson_43&quot; name=&quot;139davidson43&quot;&gt;&lt;sup data-dcnode-id=&quot;2604&quot;&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt;43&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt; Thatcher at any rate understood that the general interests of her class sometimes required the adoption of strategies that were contrary to particular economic doctrines. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2594&quot;&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;These victories demonstrated that Thatcher was the genuine embodiment of the bourgeois vanguard, an anti-Lenin prepared to take risks before which more cautious but less decisive members of her class would have retreated or sought compromise. She was necessary to capitalism in Britain in a way that, say, Ronald Reagan was not to capitalism in the US, his role being that of a charismatic but replaceable front-man for the collective leadership of neoconservative ideologues and corporate representatives which actually directed White House policy during his presidency.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2596&quot; href=&quot;#139davidson_44&quot; name=&quot;139davidson44&quot;&gt;&lt;sup data-dcnode-id=&quot;2597&quot;&gt;&lt;span data-dcnode-id=&quot;2598&quot; instrument_node=&quot;&quot;&gt;44&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2595&quot; instrument_node=&quot;&quot;&gt; In that sense Kelman was wrong. Neoliberalism could not have been introduced at the speed and intensity it was without Thatcher or a similar personality. But Beckett is also wrong. The crisis in which British capitalism was engulfed would have forced whichever party was in office to move in neoliberal directions, albeit more slowly and with greater caution; there could be no return to the final years of the Golden Age, which Beckett is concerned to defend. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2593&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2588&quot;&gt;&lt;span data-dcnode-id=&quot;2592&quot; instrument_node=&quot;&quot;&gt;The attack on trade union power involved three chronologically overlapping strategies. The first was to deliberately allow mass unemployment to grow by maintaining high interest rates and refusing to provide state aid to industries in the form of subsidies, contracts or import controls. Interviewed by Adam Curtis in 1992 for his BBC documentary &lt;/span&gt;&lt;em data-dcnode-id=&quot;2590&quot;&gt;&lt;span data-dcnode-id=&quot;2591&quot; instrument_node=&quot;&quot;&gt;Pandora’s Box&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2589&quot; instrument_node=&quot;&quot;&gt;, Sir Alan Budd said that he was concerned that some of politicians “never believed for a moment that this was the correct way to bring down inflation”:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2587&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2579&quot;&gt;&lt;span data-dcnode-id=&quot;2586&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2581&quot;&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt;They did, however, see that it would be a very, very good way to raise unemployment, and raising unemployment was an extremely desirable way of reducing the strength of the working classes—if you like, that what was engineered there in Marxist terms was a crisis of capitalism which re-created a reserve army of labour and has allowed the capitalists to make high profits ever since.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2582&quot; href=&quot;#139davidson_45&quot; name=&quot;139davidson45&quot;&gt;&lt;sup data-dcnode-id=&quot;2583&quot;&gt;&lt;span data-dcnode-id=&quot;2584&quot; instrument_node=&quot;&quot;&gt;45&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2568&quot;&gt;&lt;span data-dcnode-id=&quot;2577&quot; instrument_node=&quot;&quot;&gt;By January 1982 unemployment in Britain exceeded 3 million for the first time since the 1930s and remained at roughly this level until 1986: “Benefit payments were sufficiently low to cut many people off from the company of those who remained in work, which itself reduced the possibility of working class solidarity, but they were not so low that they induced the desperation that might have come from the prospect of starvation”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2574&quot; href=&quot;#139davidson_46&quot; name=&quot;139davidson46&quot;&gt;&lt;sup data-dcnode-id=&quot;2575&quot;&gt;&lt;span data-dcnode-id=&quot;2576&quot; instrument_node=&quot;&quot;&gt;46&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2573&quot; instrument_node=&quot;&quot;&gt; The effect of growing unemployment on the workplace was to discipline trade unionists into accepting what would previously have been unacceptable, including foregoing wage increases or even agreeing to reductions in existing wage levels (“givebacks”) in order to prevent closures which were in many cases only postponed. In some respects this internal discipline still persists. When workers express their concern over the possibility of redundancy, it is often treated as a proof of precarity when, as Kevin Doogan has pointed out, it is not the “likelihood” of job loss that is uppermost in their minds, but the “consequences”—the possibility of a catastrophic fall in income, inability to pay debts, bankruptcy and homelessness, all accompanied by enforced interaction with state institutions whose default attitude towards the unemployed is suspicion or outright hostility.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2570&quot; href=&quot;#139davidson_47&quot; name=&quot;139davidson47&quot;&gt;&lt;sup data-dcnode-id=&quot;2571&quot;&gt;&lt;span data-dcnode-id=&quot;2572&quot; instrument_node=&quot;&quot;&gt;47&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2569&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2561&quot;&gt;&lt;span data-dcnode-id=&quot;2566&quot; instrument_node=&quot;&quot;&gt;The second strategy, the success of which ensured that little effective resistance to closures took place, was to provoke decisive confrontations between state-backed employers and one or two important groups of unionised workers: the showdowns with postal workers in Canada (1978), car workers in Italy (1980), air traffic controllers in the US (1981), textile workers in India (1982) all preceded that with the miners in the UK (1984-5). In 1981 the then general secretary of the Scottish Trade Union Congress, Jimmy Milne, denied that the current recession was comparable to that of the 1930s: “The 30s happened after the severe defeat of the 1926 General Strike. Today the movement is largely undefeated and it is still unbroken”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2563&quot; href=&quot;#139davidson_48&quot; name=&quot;139davidson48&quot;&gt;&lt;sup data-dcnode-id=&quot;2564&quot;&gt;&lt;span data-dcnode-id=&quot;2565&quot; instrument_node=&quot;&quot;&gt;48&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2562&quot; instrument_node=&quot;&quot;&gt; This was true in the sense that there had been no single defeat comparable to that of the British General Strike; indeed, the so-called “Winter of Discontent” of 1978-9 in Britain had seen the highest level of strike days since 1926 in actions which were largely successful: 29,474,000 strike days were “lost” in 1979 compared to 14,750,000 in 1974. But unlike the latter year, or the period from 1968 to 1975 more generally, these strikes were not imbued with feelings of optimism and hope, but of pessimism and despair. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2560&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2558&quot;&gt;&lt;span data-dcnode-id=&quot;2559&quot; instrument_node=&quot;&quot;&gt;The labour movement had been organisationally and ideologically weakened both by compromises with social democracy in office (the “Social Contract”) and an inability to conceive of any alternative to it in opposition. The imposition of neoliberal regimes required imposing the type of defeat which had not yet occurred, but which the weakening of the trade unions made possible. These defeats then acted as examples to other unions, against a background of multiplying legal restraints and increasing employer intransigence. Victory was not guaranteed in advance; it was achieved not only by the unleashed power of the state—formidable though that was—but also by the failure of other unions and the TUC to give effective support to unions under attack. Thatcher rightly gambled that most sections of the trade union bureaucracy would instead give priority to the continued existence of their organisations, however much reduced in power, rather than offering effective solidarity to those under attack. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2551&quot;&gt;&lt;span data-dcnode-id=&quot;2556&quot; instrument_node=&quot;&quot;&gt;The only event which would have resulted in an alternative vision of the future would have been the defeat of the government by the labour movement; in concrete terms, the victory of the NUM in the Great Miners’ Strike. This was by no means the impossibility that tends to be argued by those who—openly or not—welcomed the actual outcome; there were crucial turning points at which the NUM could have achieved victory as late as six months into the strike.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2553&quot; href=&quot;#139davidson_49&quot; name=&quot;139davidson49&quot;&gt;&lt;sup data-dcnode-id=&quot;2554&quot;&gt;&lt;span data-dcnode-id=&quot;2555&quot; instrument_node=&quot;&quot;&gt;49&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2552&quot; instrument_node=&quot;&quot;&gt; Neoliberalism could have suffered a reverse in Britain, as it was later to do in France in 1995, and this would have spared many people from the ravages that in fact occurred. Trade union membership reached an all-time high in 1980 of 13,289,000; by 1990 this had fallen to 9,947,000 and by 1997 to 7,841,000. What is less clear is whether resistance within Britain would have qualitatively shifted the balance in international terms to the extent of preventing neoliberalism becoming established as the dominant regime of capitalist organisation at the international level. Once the neoliberal order had been established in the US and imposed on the transnational economic institutions which it controls, the model acquired a cumulative force: in the developed world the need to compete with the US compelled other states to try to adopt the organisational forms which seemed to have given that economy its advantage; in the Global South states accepted conditions which restructured their economies in neoliberal ways in order to obtain access to loans and aid.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2550&quot; instrument_node=&quot;&quot;&gt;
