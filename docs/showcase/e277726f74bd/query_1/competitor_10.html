lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2101&quot; instrument_node=&quot;&quot;&gt; The result has involved new relationships with private capital. Welfare provision best illustrates the point. Until the advent of the coalition’s austerity programme in 2010 actual levels of spending were maintained, partly because of resistance to attacks, but also because there are limits beneath which expenditure on the social wage cannot drop without endangering the process of accumulation.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2098&quot; href=&quot;#139davidson_115&quot; name=&quot;139davidson115&quot;&gt;&lt;sup data-dcnode-id=&quot;2099&quot;&gt;&lt;span data-dcnode-id=&quot;2100&quot; instrument_node=&quot;&quot;&gt;115&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2097&quot; instrument_node=&quot;&quot;&gt; But beneath headline spending figures, the services have been reconfigured. Care of children, the elderly and people with disabilities or long-term illness, for example, has increasingly been passed from the state to the family—which generally means the female members of the family—with these “informal” arrangements then subject to evaluation by state agencies: “While the state has withdrawn in some ways, its powers and apparatuses have been extended in others—transferring ‘responsibilities’ but simultaneously creating the capabilities of surveillance and enforcement to ensure that such responsibilities are being fulfilled”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2094&quot; href=&quot;#139davidson_116&quot; name=&quot;139davidson116&quot;&gt;&lt;sup data-dcnode-id=&quot;2095&quot;&gt;&lt;span data-dcnode-id=&quot;2096&quot; instrument_node=&quot;&quot;&gt;116&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2092&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2090&quot;&gt;&lt;span data-dcnode-id=&quot;2091&quot; instrument_node=&quot;&quot;&gt;These changes demonstrate the fundamental difference between classical liberalism and neoliberalism. Mark Olssen writes that in the latter the state creates “the appropriate market by providing the conditions, laws and institutions necessary for its operation” and “an individual who is an enterprising and competitive entrepreneur”, the link between them signalled by: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2089&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2080&quot;&gt;&lt;span data-dcnode-id=&quot;2088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2082&quot;&gt;&lt;span data-dcnode-id=&quot;2087&quot; instrument_node=&quot;&quot;&gt;a change in subject position from “homo economicus”, who naturally behaves out of self-interest and is relatively detached from the state, to “manipulatable man”, who is created by the state and who is continually encouraged to be “perpetually responsive”… It is not that the conception of the self-interested subject is replaced or done away with by the new ideals of “neoliberalism”, but that in an age of universal welfare, the perceived possibilities of slothful indolence create necessities for new forms of vigilance, surveillance, “performance appraisal” and forms of control generally.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2084&quot; href=&quot;#139davidson_117&quot; name=&quot;139davidson117&quot;&gt;&lt;sup data-dcnode-id=&quot;2085&quot;&gt;&lt;span data-dcnode-id=&quot;2086&quot; instrument_node=&quot;&quot;&gt;117&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2083&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2081&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2079&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2077&quot;&gt;&lt;span data-dcnode-id=&quot;2078&quot; instrument_node=&quot;&quot;&gt;As this suggests, it is in the areas of repression and surveillance that the power of the state has heightened to a degree previously unimaginable except under conditions of total war last experienced between 1939 and 1945. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2076&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2072&quot;&gt;&lt;em data-dcnode-id=&quot;2074&quot;&gt;&lt;span data-dcnode-id=&quot;2075&quot; instrument_node=&quot;&quot;&gt;A broken society&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2073&quot; instrument_node=&quot;&quot;&gt;? Since neoliberalism has been met with resistance as well as submission, we have seen an extension of the type of legal constraints earlier imposed on trade unions to social movements concerned with, for example, Third World debt or the environment. The limitation on the number of strikers allowed to picket outside a workplace, for example, has its analogue in the more recent proliferation of restraining orders issued against demonstrators outside research laboratories, company headquarters or in urban public space. But resistance was only one driver behind the growth of the state’s repressive capacities. Two other consequences of neoliberalism were of equal significance. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2071&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2069&quot;&gt;&lt;span data-dcnode-id=&quot;2070&quot; instrument_node=&quot;&quot;&gt;The first was the failure of neoliberal policies to achieve what they promised in material terms for the majority of people, and the resulting increases in poverty and inequality on the one hand, and of the illnesses, family breakdown and crime which they tend to bring on the other. As Richard Wilkinson and Kate Pickett note: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2068&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2063&quot;&gt;&lt;span data-dcnode-id=&quot;2067&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2065&quot;&gt;&lt;span data-dcnode-id=&quot;2066&quot; instrument_node=&quot;&quot;&gt;Long before the financial crisis which gathered pace in the latter part of 2008, British politicians commenting on the decline of community or the rise of various forms of anti-social behaviour would sometimes refer to our “broken society”. The financial collapse shifted attention to the broken economy, and while the broken society was sometimes blamed on the behaviour of the poor, the broken economy was widely attributed to the rich.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2064&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2060&quot;&gt;&lt;span data-dcnode-id=&quot;2061&quot; instrument_node=&quot;&quot;&gt;They argue that both breakages are in fact primarily caused by the growth of inequality, which is to say, by the rich: &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2059&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2051&quot;&gt;&lt;span data-dcnode-id=&quot;2058&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2053&quot;&gt;&lt;span data-dcnode-id=&quot;2057&quot; instrument_node=&quot;&quot;&gt;Although it does look as if neoliberal policies widened income differences…there was no government intention to lower social cohesion or to increase violence, teenage births, obesity, drug abuse and everything else… Their increase is, instead, an unintended consequence of the changes in income distribution.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2054&quot; href=&quot;#139davidson_118&quot; name=&quot;139davidson118&quot;&gt;&lt;sup data-dcnode-id=&quot;2055&quot;&gt;&lt;span data-dcnode-id=&quot;2056&quot; instrument_node=&quot;&quot;&gt;118&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2052&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2050&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2048&quot;&gt;&lt;span data-dcnode-id=&quot;2049&quot; instrument_node=&quot;&quot;&gt;Unintended or not, renewed rounds of the kind of state intervention supposedly rejected by neoliberalism in theory were required to deal with the social problems neoliberalism generated in practice. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2047&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2041&quot;&gt;&lt;span data-dcnode-id=&quot;2046&quot; instrument_node=&quot;&quot;&gt;The second consequence was not neoliberalism’s material failures, but its inherently contradictory aspiration to create a population that behaves as sovereign individual consumers in the marketplace, obedient wage labourers in the workplace and subordinate mass citizens before the state. As several very different authors have noted, a market which entrenches personal fulfilment through consumer choice as the ultimate value not only destabilises those forms of identity which have traditionally helped support the capitalist system, like the family and the nation, but the very personal constraints which allow accumulation to take place.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2043&quot; href=&quot;#139davidson_119&quot; name=&quot;139davidson119&quot;&gt;&lt;sup data-dcnode-id=&quot;2044&quot;&gt;&lt;span data-dcnode-id=&quot;2045&quot; instrument_node=&quot;&quot;&gt;119&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2042&quot; instrument_node=&quot;&quot;&gt;  As Zygmunt Bauman argues:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2040&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2031&quot;&gt;&lt;span data-dcnode-id=&quot;2039&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2033&quot;&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt;any turn of events that plays havoc with the expectations suggested by a person-focused ideology is perceived and “made sense of”, in the same ideology of privatisation, as a personal snub, a personally aimed (even if randomly targeted) humiliation; self-respect, as well as feelings of security and self-confidence, are its first casualties. The affected individuals feel debased, and since the ideology of privatisation assumes the presence of a culprit behind every case of suffering or discomfort, there ensues a feverish search for the persons guilty of debasing them; the conflict and enmity that arises is deemed personal. The guilty ones must be located, exposed, publicly condemned and punished. “Them” are as individualised as “us” in the ideology of privatisation.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2035&quot; href=&quot;#139davidson_120&quot; name=&quot;139davidson120&quot;&gt;&lt;sup data-dcnode-id=&quot;2036&quot;&gt;&lt;span data-dcnode-id=&quot;2037&quot; instrument_node=&quot;&quot;&gt;120&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2034&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2032&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2024&quot;&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt;The political implications are ominous. Andrew Sinfield once wrote that “the larger danger of Thatcherism”, which can here be taken as a surrogate for neoliberalism as a whole, was not so much its victories over trade unions or social democracy, but “its eventual failure to satisfy or control the emotions it arouses”: “The rhetoric of Law and Order and victimisation of subordinate groups, with which it attempts to make plausible its social and economic policies, provoke forces of retribution and stimulate expectations that may find terrible kinds of satisfaction”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2026&quot; href=&quot;#139davidson_121&quot; name=&quot;139davidson121&quot;&gt;&lt;sup data-dcnode-id=&quot;2027&quot;&gt;&lt;span data-dcnode-id=&quot;2028&quot; instrument_node=&quot;&quot;&gt;121&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2025&quot; instrument_node=&quot;&quot;&gt; It is this that has helped feed the growth of fascism in Europe, but this may not be the most frightening consequence. Fascism, even under the mask of respectability worn by the Front National in France or by the British National Party, can be identified, isolated and crushed; and in Britain at least there has been a tradition of successfully doing so from the mobilisations of the Anti Nazi League and Rock against Racism in the late 1970s, to those of Unite Against Fascism and Love Music Hate Racism today. A bleaker, because more insidious, scenario would be for racism and xenophobia to become treated as commodities which can be chosen by consumers, not as part of a far-right project, but routinely, like cars or foreign holidays. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2013&quot;&gt;&lt;span data-dcnode-id=&quot;2022&quot; instrument_node=&quot;&quot;&gt;The changes in the form of property ownership brought about by neoliberalism, which did not in any fundamental sense alter capitalist relations of production, nevertheless had effects on human subjectivities. The neoliberal state therefore cannot simply be that of economic management, but also that of social control. Thus, although the late Neil Smith was right that “the neoconservative moment has passed” as a result of the debacle in Iraq, this only refers to a very narrow aspect of neoconservatism as a particularly “adventurist” strategic option for US imperialism.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2019&quot; href=&quot;#139davidson_122&quot; name=&quot;139davidson122&quot;&gt;&lt;sup data-dcnode-id=&quot;2020&quot;&gt;&lt;span data-dcnode-id=&quot;2021&quot; instrument_node=&quot;&quot;&gt;122&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt; Neoconservatism as a necessary repressive accompaniment to neoliberalism in domestic terms is still alive and well. “The anarchy of the market, of competition, and of unbridled individualism…generates a situation that becomes increasingly ungovernable”, writes David Harvey. And in the face of “social anarchy and nihilism” he notes, with perhaps excessive restraint, that “some degree of coercion appears necessary to restore order”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2015&quot; href=&quot;#139davidson_123&quot; name=&quot;139davidson123&quot;&gt;&lt;sup data-dcnode-id=&quot;2016&quot;&gt;&lt;span data-dcnode-id=&quot;2017&quot; instrument_node=&quot;&quot;&gt;123&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2014&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2007&quot;&gt;&lt;span data-dcnode-id=&quot;2011&quot; instrument_node=&quot;&quot;&gt;The turn to neoconservatism in this sense will now become even more marked, as the unemployed, single parents, migrants, refugees and asylum seekers  find themselves the target of a cynical scapegoating strategy to divert hostility away from those responsible for the crisis towards those who will suffer the most as a consequence of it: a classic case of blaming the victims of neoliberalism, in this case to shift responsibility for the failures of neoliberalism to resolve the problems created by capitalism. Unchecked, the future may well be as foreseen by George Steiner at the fall of the Berlin Wall, combining repression and commodification: “The knout on the one hand; the cheeseburger on the other”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2008&quot; href=&quot;#139davidson_124&quot; name=&quot;139davidson124&quot;&gt;&lt;sup data-dcnode-id=&quot;2009&quot;&gt;&lt;span data-dcnode-id=&quot;2010&quot; instrument_node=&quot;&quot;&gt;124&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2006&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2004&quot;&gt;&lt;span data-dcnode-id=&quot;2005&quot; instrument_node=&quot;&quot;&gt;Conclusion&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1998&quot;&gt;&lt;span data-dcnode-id=&quot;2002&quot; instrument_node=&quot;&quot;&gt;If the preceding analysis of neoliberalism is correct, what strategic conclusions can revolutionaries draw for Britain? It was obviously essential for revolutionaries to throw themselves into the attempt to build a strike movement in defence of pensions. Similarly, an organisation like Unite the Resistance is required to link and inform the often very different struggles against austerity. But these are responses to the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2000&quot;&gt;&lt;span data-dcnode-id=&quot;2001&quot; instrument_node=&quot;&quot;&gt;immediate&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1999&quot; instrument_node=&quot;&quot;&gt; onslaught which our class faces; what is also required is a strategic orientation which takes into account “the changed conditions under which the proletariat has to fight”, as these have developed over the last 40 years. Clearly this conclusion is not the place for a detailed discussion but some elements of such a strategy might include the following:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1991&quot;&gt;&lt;span data-dcnode-id=&quot;1996&quot; instrument_node=&quot;&quot;&gt;The first is in relation to the state. One justification for the existence of a revolutionary party is the need for the working class to match the centralised power of the state with a comparably centralised organisation able to act decisively, coherently and uniformly across the national territory. This is obviously still relevant since one feature of neoliberalism has been a continuation of long-term tendencies, dating back to the late 19th century, towards the ever-greater accumulation of state power, especially in the areas of surveillance and repression. (that includes the devolved nations: the Scottish National Party government in Edinburgh is currently engaged in establishing an all-Scottish police force.) But if, as I have argued elsewhere, neoliberal strategy is increasingly to devolve responsibility for imposing austerity down to the lowest elected administrative levels, then this points towards a structure characterised as much by fragmentation as consolidation—with the former tendency being strengthened by the disintegrative effects of privatisation.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1993&quot; href=&quot;#139davidson_125&quot; name=&quot;139davidson125&quot;&gt;&lt;sup data-dcnode-id=&quot;1994&quot;&gt;&lt;span data-dcnode-id=&quot;1995&quot; instrument_node=&quot;&quot;&gt;125&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1992&quot; instrument_node=&quot;&quot;&gt; In these circumstances the ability of the revolutionary party to act in a centralised way has to be complemented by a far greater sensitivity to local situations, not simply in the devolved nations, but at regional and city level, where a variety of different responses and initiatives will be required. This is not a call for the establishment of “federalist” structures, but for recognition of the fact that general perspectives conceived at a national level—which are obviously still essential—must be creatively adapted and applied to specific situations which arise at the local level. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1990&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1975&quot;&gt;&lt;span data-dcnode-id=&quot;1989&quot; instrument_node=&quot;&quot;&gt;The second is in relation to the Labour Party and the question of reformism more generally. For revolutionaries in Britain a central question is whether the Labour Party has been fundamentally changed by the adoption of social neoliberalism. For John McIlroy there is no doubt: “What Lenin had characterised as a contradictory formation, a bourgeois workers’ party would become, in the hands of Blair and Brown, a straightforward bourgeois neoliberal party, its affairs complicated by the institutional role of trade unions”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1986&quot; href=&quot;#139davidson_126&quot; name=&quot;139davidson126&quot;&gt;&lt;sup data-dcnode-id=&quot;1987&quot;&gt;&lt;span data-dcnode-id=&quot;1988&quot; instrument_node=&quot;&quot;&gt;126&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1985&quot; instrument_node=&quot;&quot;&gt; This obviously raises the question of how we define a social democratic party. Revolutionaries tend to emphasise, or oscillate between, highlighting different characteristics at different times, depending on the nature of the argument at hand. It is clear, however, that working class perceptions of Labour alone cannot be decisive unless they actually correspond to reality. Many organised workers and oppressed groups in the US regard the Democrats as fundamentally different from the Republicans, rather than as the second party of US capitalism. This does not, of course, mean that the two parties are identical—there would be little point in having two parties if that were the case. Over some social issues Democrats are notably more liberal than the Republicans, which has benefited workers and oppressed groups, and this is why the former played a vanguard and the latter a social neoliberal role. On fundamental issues like support for US imperialism, however, there are no significant differences. What is it then that workers recognise as making Labour different from other parliamentary parties? There seem to be three main qualities: (i) &lt;/span&gt;&lt;em data-dcnode-id=&quot;1983&quot;&gt;&lt;span data-dcnode-id=&quot;1984&quot; instrument_node=&quot;&quot;&gt;policies&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1982&quot; instrument_node=&quot;&quot;&gt; which are specifically designed to improve the condition of the working class (“reforms”) rather than “the people” or “the nation” in general, (ii) working-class &lt;/span&gt;&lt;em data-dcnode-id=&quot;1980&quot;&gt;&lt;span data-dcnode-id=&quot;1981&quot; instrument_node=&quot;&quot;&gt;membership&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1979&quot; instrument_node=&quot;&quot;&gt;, and (iii) &lt;/span&gt;&lt;em data-dcnode-id=&quot;1977&quot;&gt;&lt;span data-dcnode-id=&quot;1978&quot; instrument_node=&quot;&quot;&gt;links&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1976&quot; instrument_node=&quot;&quot;&gt; to the organised working class.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1974&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1972&quot;&gt;&lt;span data-dcnode-id=&quot;1973&quot; instrument_node=&quot;&quot;&gt;Historically, Labour has a number of important achievements to its credit. We tend to be over-dismissive of these, concentrating instead—for obvious and usually justified reasons—on the record of Labour betrayal. The trouble with this approach is that it makes it difficult to explain why anyone ever believed in the Labour Party in the first place. But these achievements are all in the past—in some cases the very distant past. Increasingly, voting Labour on the basis that it will make any practical difference is more of a historical memory than a contemporary reality. And this is not just about programmes like John Wheatley’s council house building in the 1920s, institutions like the NHS, or legislation like the Equal Pay Act. There used to be a layer of Labour activists in most working class communities—often quite right wing activists—who would lobby councils, organise petitions, and generally act as a focus for local community reformism. This layer is greatly diminished. These activities still get done, but it is no longer Labour members who initiate them as a matter of course.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1971&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1956&quot;&gt;&lt;span data-dcnode-id=&quot;1970&quot; instrument_node=&quot;&quot;&gt;Similar changes have taken place in relation to membership. Originally the Labour Party was predominantly working class, although it also had a strong component of the professional middle classes, typified in their different ways by the Webbs, Attlee and Gaitskell. It was this actual class basis that led Lenin to describe it as a “capitalist workers’ party”, consisting mainly of workers, but acting in the interests of the bourgeoisie. This class base has been declining since the 1960s and especially since the mid-1980s, to the point where the individual membership is dominated by members of the new middle class. In his analysis of the transformation of the European Social Democratic parties, Gerassimos Moschonas notes that although their electorates have retained working class majorities, their membership increasingly consists of the salaried public-sector middle class, the implications of which are more than numeric: “Yet given the &lt;/span&gt;&lt;em data-dcnode-id=&quot;1968&quot;&gt;&lt;span data-dcnode-id=&quot;1969&quot; instrument_node=&quot;&quot;&gt;cultural ascendancy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1967&quot; instrument_node=&quot;&quot;&gt; of these strata, usually recruited from public service and ‘educated bourgeoisie’, as well as their considerable individual and collective &lt;/span&gt;&lt;em data-dcnode-id=&quot;1965&quot;&gt;&lt;span data-dcnode-id=&quot;1966&quot; instrument_node=&quot;&quot;&gt;mobilising potential&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1964&quot; instrument_node=&quot;&quot;&gt;, we are witnessing a &lt;/span&gt;&lt;em data-dcnode-id=&quot;1962&quot;&gt;&lt;span data-dcnode-id=&quot;1963&quot; instrument_node=&quot;&quot;&gt;much greater decline in the influence of working class culture&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1961&quot; instrument_node=&quot;&quot;&gt; than the strictly arithmetic relations of force disclose.” As Moschonas points out, while the working class presence is certainly not “residual”, its influence on the parties is increasingly “indirect” and exercised through the trade unions rather than by membership. Within the parties, working class participation declines and passivity grows, to be followed by silence and departure “which in turn reinforces middle class predominance”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1958&quot; href=&quot;#139davidson_127&quot; name=&quot;139davidson127&quot;&gt;&lt;sup data-dcnode-id=&quot;1959&quot;&gt;&lt;span data-dcnode-id=&quot;1960&quot; instrument_node=&quot;&quot;&gt;127&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1957&quot; instrument_node=&quot;&quot;&gt; Most of Labour’s working class membership now comes from the affiliated trade unions, whose role is therefore decisively important.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1955&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1953&quot;&gt;&lt;span data-dcnode-id=&quot;1954&quot; instrument_node=&quot;&quot;&gt;The affiliated trade unions and, more distantly, the TUC, Scottish TUC and Welsh TUC acted as channels for the expression of organised working class views within the Labour Party. Although always heavily mediated through the bureaucracy, these views did influence Labour policy, a process which reached its peak around 1974. In theory this could still take place, but in practice the bureaucracy have exercised a self-denying ordinance since the advent of New Labour which has led to the marginalisation of working class influence over the party. Other than at the level of rhetoric—principally from Len McCluskey of Unite—there are no signs of this changing. There is no doubt that in purely financial terms Labour would effectively cease to exist without the support it receives from the unions, now that its corporate sponsors have deserted it. It is, however, difficult to identify many policies which the unions have received in return: the minimum wage certainly, Gordon Brown’s covert increase in public sector jobs perhaps, but beyond these? In fact, the main fruits of the trade union link are mainly in other ways: officials holding back struggle on the grounds that it will endanger Labour’s chances of re-election, even though, once re-elected Labour promises nothing but the same policies as the Tories in slow motion. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1950&quot;&gt;&lt;span data-dcnode-id=&quot;1951&quot; instrument_node=&quot;&quot;&gt;It is therefore no accident, as we say, that the unions which are the most politically radical—PCS, UCU—are not affiliated to Labour and their rank and file tend to regard it with the most hostility. It is possible that affiliated unions could reassert themselves, but the point is that the main characteristic which distinguishes Labour from all other parties has had virtually no beneficial effects for the working class. Nevertheless, it will remain a social democratic party so long as it retains the link with the trade unions, which holds open the possibility that working class demands—in however bureaucratised a form—might once again influence what it actually does. But changes to the working class and its consciousness will not remain conveniently frozen while we await this happening.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1942&quot;&gt;&lt;span data-dcnode-id=&quot;1948&quot; instrument_node=&quot;&quot;&gt;Since reformism remains the dominant form of consciousness within the working class, it may appear that nothing much has changed and that this reformism will continue to find expression in the Labour Party, as it has for the last hundred years or so. But there is no necessary connection between reformism in general and the specific form taken by Labourism. A combination of Labour’s own behaviour in office and opposition—above all its acceptance of neoliberalism—together with structural changes in the nature of the working class and the current diminution of trade union consciousness, means that for many working class people, Labour does &lt;/span&gt;&lt;em data-dcnode-id=&quot;1946&quot;&gt;&lt;span data-dcnode-id=&quot;1947&quot; instrument_node=&quot;&quot;&gt;not&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1945&quot; instrument_node=&quot;&quot;&gt; appear to be fundamentally different from the other parties, but is simply “the least worst” of the choices on offer. The willingness of working class people in Scotland to vote for a non social democratic but apparently reformist organisation in the form of the SNP—without which that party would not have been able to form a majority government after the 2011 Holyrood elections—demonstrates &lt;/span&gt;&lt;br data-dcnode-id=&quot;1944&quot;&gt;&lt;span data-dcnode-id=&quot;1943&quot; instrument_node=&quot;&quot;&gt;
that this can have direct political effects. The central issue here is not whether or not revolutionaries continue to call for a Labour vote in certain circumstances; it is to recognise the ways in which the role of the Labour Party has changed. Like similar organisations in Europe and Australasia, Labour has moved extraordinarily far to the right; but there are more fundamental issues, since shifts back to the left are theoretically always possible. On the one hand, the Labour Party no longer acts to inculcate and maintain a degree of basic reformist class consciousness—a problem exacerbated by the fact that for over 85 percent of workers in the private sector, neither do the trade unions. This presents revolutionaries with a significant problem, since we tend to assume a set of pre-existing shared “social democratic” values and beliefs among the people we hope to win to our politics: their absence creates, at the very least, a potential barrier. On the other hand, where social explosions do occur—and we can assume that under crisis conditions they will continue to do so—the Labour Party is no longer in as strong a position to restrain the working class from taking action. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1933&quot;&gt;&lt;span data-dcnode-id=&quot;1940&quot; instrument_node=&quot;&quot;&gt;Moreover, the volatility of the present situation means that radical shifts in class consciousness are likely to occur in unpredictable ways—this is one of the few respects in which uneven and combined development is applicable in the West. It would be a mistake, however, to rely on the possibility of the second aspect counteracting the actuality of the first. The crisis of working class electoral representation requires a response other than simply waiting to see what kind of formation emerges and then becoming involved at a stage when structures and policies have already been set by other political forces. A better approach would be to start by identifying what form of electoral organisation we think is necessary (and it is by no means clear that &lt;/span&gt;&lt;em data-dcnode-id=&quot;1938&quot;&gt;&lt;span data-dcnode-id=&quot;1939&quot; instrument_node=&quot;&quot;&gt;any&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1937&quot; instrument_node=&quot;&quot;&gt; of the existing models is adequate) and then fighting to establish it—not as a way of bringing together the existing left (ie another round of rearranging the deck chairs on the &lt;/span&gt;&lt;em data-dcnode-id=&quot;1935&quot;&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt;Titanic&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;) but of unifying those sections of the class which have broken with or simply been abandoned by Labour.   &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1932&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1923&quot;&gt;&lt;span data-dcnode-id=&quot;1931&quot; instrument_node=&quot;&quot;&gt;The third and final point is in relation to the working class itself. I stressed earlier that the ability of state managers, politicians and capitalists to introduce neoliberal measures was directly or indirectly dependent on their success in weakening the labour movement. Any hope of reversing neoliberalism, let alone of moving towards socialism, will therefore depend on rebuilding that movement and doing so on a basis that is independent of political parties committed to the existing order. Ultimately, then, the issue is one of class power, but it is precisely this conclusion which even critics of neoliberalism find difficult to accept. Many see the working class as a residual element, at least in the West. “With the working class a minority,” write Polly Toynbee and David Walker, “those on low incomes are despised, whether they work or don’t work”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1928&quot; href=&quot;#139davidson_128&quot; name=&quot;139davidson128&quot;&gt;&lt;sup data-dcnode-id=&quot;1929&quot;&gt;&lt;span data-dcnode-id=&quot;1930&quot; instrument_node=&quot;&quot;&gt;128&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1927&quot; instrument_node=&quot;&quot;&gt; But even those who concede its continued existence doubt its ability to act as the potential gravedigger of capitalism. “Today,” writes Andrew Gamble, “as the capitalist wagon careers out of control down the track, spilling its load and its passengers, there are few gravediggers in sight”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1924&quot; href=&quot;#139davidson_129&quot; name=&quot;139davidson129&quot;&gt;&lt;sup data-dcnode-id=&quot;1925&quot;&gt;&lt;span data-dcnode-id=&quot;1926&quot; instrument_node=&quot;&quot;&gt;129&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1922&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1916&quot;&gt;&lt;span data-dcnode-id=&quot;1921&quot; instrument_node=&quot;&quot;&gt;The first claim, about the size of the working class, relies on the widely believed but nonetheless incorrect belief that the majority of workers in service industries belong to the middle class.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1918&quot; href=&quot;#139davidson_130&quot; name=&quot;139davidson130&quot;&gt;&lt;sup data-dcnode-id=&quot;1919&quot;&gt;&lt;span data-dcnode-id=&quot;1920&quot; instrument_node=&quot;&quot;&gt;130&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt; It is the second claim, about the capacity of the working class, which requires more serious consideration, since the first is only possible because of the lack of visibility of the organised working class as a social agent. Neoliberalism has always been resisted in its heartlands, even after the 1980s defeats of the labour movement. As the example of the poll tax suggests, ruling class initiatives did not go unopposed. Indeed, all the major issues to have arisen in Britain since the late 1980s—from the poll tax to the Criminal Justice Bill, from hospital closures to the sell-off of council housing, from the British National Party to asylum seekers, from the imperialist wars in Afghanistan, Iraq and Gaza to solidarity with the Arab Spring, from student opposition to increased tuition fees to the Bedroom Tax—have involved people responding either to attacks on their communities or to geopolitical injustices. The problem has been that, although trade unions have certainly been involved, trade union action has not been central. The point is not that trade unions have ceased to take action over workplace issues: public sector workers (and those in privatised industries such as the railways) in particular have continued to defend both their wages and conditions and the services they provide with heroic resilience through several decades of neoliberal attrition. But even those who rightly reject the claim that workers have come to accept neoliberalism cannot fail to notice that most workers are not unionised, above all in the private sector where union density currently hovers around 14 percent and those who are unionised often belong to declining sectors of the economy. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1909&quot;&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;The rise of increasingly precarious (or “flexible”, in ruling class language) employment acts as a disincentive to organisation. The extent of precarity should neither be exaggerated nor underplayed. Precarity is a relationship to the labour market, not an indication of class position.  For most of the history of capitalism precarity has been the normal experience of most of the working class. The only period in which stable employment has been the norm, across the developed world at least, has been since the onset of the great boom. Like many other aspects of this wholly exceptional period in the history of capitalism, this is now in decline and part of the reason why precarity has become an issue is because many, particularly young workers find themselves in a situation of precarity where they had expected stability. In addition, certain categories of financial, managerial and administrative employment which previously had the greatest security have now become more vulnerable, not least because of the extent of corporate rationalisation and downsizing that tended to follow the acquisitions and mergers boom of the 1990s and 2000s.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1911&quot; href=&quot;#139davidson_131&quot; name=&quot;139davidson131&quot;&gt;&lt;sup data-dcnode-id=&quot;1912&quot;&gt;&lt;span data-dcnode-id=&quot;1913&quot; instrument_node=&quot;&quot;&gt;131&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1910&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1908&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1902&quot;&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;A more serious problem than precarity is simply the failure to unionise, let alone achieve recognition in the many workplaces where workers do have permanent contracts, either formally or in effect. Key groups like engineers still have the potential ability to bring individual workplaces and, in some cases, whole industries to a standstill; but this is more to do with their strategic position rather than their numerical strength. For the purposes of this argument the steep decline of unionisation, especially in the private sector, means that many working class people do not have the opportunity to develop “trade union consciousness”, with all that means in relation to the likelihood of their holding left wing political positions and accepting the need for collective action to improve their condition. These workers could be unionised, but for the moment they are not, and this has had political effects. Of the factors which are supposed obstacles to effective unionisation, there is little evidence that small workplace size (at least above that of the family firm), or the increasingly complex relation between or within firms caused by outsourcing and contracting out, or jobs particularly associated with women or ethnic minorities, necessarily involve barriers to organisation; much depends on how committed and imaginative trade unions are in recruiting.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1904&quot; href=&quot;#139davidson_132&quot; name=&quot;139davidson132&quot;&gt;&lt;sup data-dcnode-id=&quot;1905&quot;&gt;&lt;span data-dcnode-id=&quot;1906&quot; instrument_node=&quot;&quot;&gt;132&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1903&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1901&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1895&quot;&gt;&lt;span data-dcnode-id=&quot;1900&quot; instrument_node=&quot;&quot;&gt;There is no reason why non-union workplaces should remain un-unionised and, although it would be foolish to pretend that there are not huge difficulties in the way, it would be equally foolish to believe these are insurmountable. Unionisation took place in Britain during the 1930s following the great defeat of the 1926 General Strike—think of light engineering and car manufacture in the East Midlands and around London, for example—and, although the process was hardly automatic, mass membership was established relatively quickly. Perhaps even more pertinently, the great unionisation movements in the US during the 1930s were motivated by the desire of a workforce to participate in the consumerist paradise of the 1920s boom from which they were excluded by low wages, but, even more important, by their resistance to the discipline of the foremen and the pressure of keeping up with the production line.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1897&quot; href=&quot;#139davidson_133&quot; name=&quot;139davidson133&quot;&gt;&lt;sup data-dcnode-id=&quot;1898&quot;&gt;&lt;span data-dcnode-id=&quot;1899&quot; instrument_node=&quot;&quot;&gt;133&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1896&quot; instrument_node=&quot;&quot;&gt; These conditions are quite similar, in terms of both financial exclusion and the nature of the workplace regime, to those which currently prevail in the great telesales or financial services office-factories. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1894&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1884&quot;&gt;&lt;span data-dcnode-id=&quot;1893&quot; instrument_node=&quot;&quot;&gt;What role can revolutionaries play in this process? There is always a danger of adapting to the environment in which we have achieved a degree of successful implantation, so that a particular sector is treated as decisively important to the working class simply because it is decisively important to us. The public sector trade unions play this role for the Socialist Workers Party. Resistance by lecturers, civil servants and council workers is obviously important, particularly in political and ideological terms, but with some exceptions—refuse workers, custom and excise officials—it cannot replicate the economic impact of miners, dockers and electricians. (It would be unwise to place too much hope on a strategy which assumes that the nation will be brought to a standstill by working parents having to stay at home during any future national action by the teachers’ unions.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1890&quot; href=&quot;#139davidson_134&quot; name=&quot;139davidson134&quot;&gt;&lt;sup data-dcnode-id=&quot;1891&quot;&gt;&lt;span data-dcnode-id=&quot;1892&quot; instrument_node=&quot;&quot;&gt;134&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1889&quot; instrument_node=&quot;&quot;&gt;) However, nostalgia for the pits, shipyards and power stations, and its corollary, despair over the call centres, supermarkets and dispatch centres, are not only useless, but also quite unnecessary. In this context it is necessary to remember the maxim taught to Walter Benjamin by Bertolt Brecht: “Take your cue not from the good old things but the bad new ones”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1886&quot; href=&quot;#139davidson_135&quot; name=&quot;139davidson135&quot;&gt;&lt;sup data-dcnode-id=&quot;1887&quot;&gt;&lt;span data-dcnode-id=&quot;1888&quot; instrument_node=&quot;&quot;&gt;135&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1885&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1883&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1881&quot;&gt;&lt;span data-dcnode-id=&quot;1882&quot; instrument_node=&quot;&quot;&gt;But unionisation has to be treated as an actual objective in which revolutionaries must be involved rather than merely complaining about the failure of trade union officialdom to do so. In other words—and this is one of the occasions where historical analogies might be useful—how can revolutionaries play a role comparable to the British and US Communist Parties in the 1930s in unionising aerospace and auto workers? For without the entry of the currently unorganised private sector workers into the trade union movement any revival of struggle will be unnecessarily weakened and limited, and their recruitment will not happen automatically. In any case it is not by any means clear that generalised resistance will begin in workplaces, although to succeed it will have to spread there. Most private sector workers (and many public sector workers too) do not currently feel strong or confident at work, and may well find it easier to mobilise in their communities, among friends and family, than they do at work under the gaze of the supervisor. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1878&quot;&gt;&lt;span data-dcnode-id=&quot;1879&quot; instrument_node=&quot;&quot;&gt;One of the central problems, not merely of neoliberalism, but of the capitalist system it seeks to defend, is that it is ultimately incapable of improving or even maintaining the conditions of the majority. Since, to put it mildly, there is unlikely to be a return to generalised boom conditions in the foreseeable future it is—paradoxically—in this contradiction that hope lies. For most people under the neoliberal order, economic life has become more uncertain, political life more meaningless, social life more fragmented and cultural life more degraded. Since, contrary to the neoliberal viewpoint, human beings are not just greedy little bundles of appetite armed with effective demand, they are rebelling and will continue to rebel against these assaults on their humanity. And in this context it is important to remember that we have not returned in all respects to our starting point in the late 1970s. At least some of the people who might have previously been persuaded to accept a supposedly temporary deterioration of their living conditions in order to restructure capitalism for the greater good are considerably less likely to be fooled again, given the way in which over 30 years of sacrifice has benefited only those at the top of society and furthermore failed to prevent a further recession. “My friends’ hatred of the rich is now palpable”, writes Alan Bissett:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1877&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;1866&quot;&gt;&lt;span data-dcnode-id=&quot;1876&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1868&quot;&gt;&lt;span data-dcnode-id=&quot;1875&quot; instrument_node=&quot;&quot;&gt;It’s not because they themselves didn’t become rich, but because they’ve realised that the system was rigged all along. Having rejected socialism for most of their adult lives, having rejected even the very &lt;/span&gt;&lt;em data-dcnode-id=&quot;1873&quot;&gt;&lt;span data-dcnode-id=&quot;1874&quot; instrument_node=&quot;&quot;&gt;existence&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1872&quot; instrument_node=&quot;&quot;&gt; of a working class, they now burn with fury at a system which purports to be meritocratic but which in reality works against them. Their arrival into the “middle class” had become an illusion, sustained by easy credit and an economy requiring conspicuous consumption to sustain itself.&lt;/span&gt;&lt;a data-dcnode-id=&quot;1869&quot; href=&quot;#139davidson_136&quot; name=&quot;139davidson136&quot;&gt;&lt;sup data-dcnode-id=&quot;1870&quot;&gt;&lt;span data-dcnode-id=&quot;1871&quot; instrument_node=&quot;&quot;&gt;136&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1867&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;1865&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1863&quot;&gt;&lt;span data-dcnode-id=&quot;1864&quot; instrument_node=&quot;&quot;&gt;Terrible though the experiences behind these developments have been, they represent potentially positive changes in consciousness, if the revolutionary left is capable of offering an alternative.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr data-dcnode-id=&quot;1861&quot;&gt;&lt;span data-dcnode-id=&quot;1860&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;1858&quot;&gt;&lt;span data-dcnode-id=&quot;1859&quot; instrument_node=&quot;&quot;&gt;Notes&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;1857&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1853&quot;&gt;&lt;a data-dcnode-id=&quot;1855&quot; href=&quot;#139davidson1&quot; name=&quot;139davidson_1&quot;&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt;1: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;Duménil and Lévy, 2011, p2.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1848&quot;&gt;&lt;a data-dcnode-id=&quot;1850&quot; href=&quot;#139davidson2&quot; name=&quot;139davidson_2&quot;&gt;&lt;span data-dcnode-id=&quot;1851&quot; instrument_node=&quot;&quot;&gt;2: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1849&quot; instrument_node=&quot;&quot;&gt;Hobsbawm, 1994, pp412-413; Hobsbawm, 1998, p4; Hobsbawm, 2002, p277.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1847&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1843&quot;&gt;&lt;a data-dcnode-id=&quot;1845&quot; href=&quot;#139davidson3&quot; name=&quot;139davidson_3&quot;&gt;&lt;span data-dcnode-id=&quot;1846&quot; instrument_node=&quot;&quot;&gt;3: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1844&quot; instrument_node=&quot;&quot;&gt;Sinclair, 2013, p39.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1842&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1838&quot;&gt;&lt;a data-dcnode-id=&quot;1840&quot; href=&quot;#139davidson4&quot; name=&quot;139davidson_4&quot;&gt;&lt;span data-dcnode-id=&quot;1841&quot; instrument_node=&quot;&quot;&gt;4: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1839&quot; instrument_node=&quot;&quot;&gt;Birch and Mykhnenko, 2010, p255.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1837&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1833&quot;&gt;&lt;a data-dcnode-id=&quot;1835&quot; href=&quot;#139davidson5&quot; name=&quot;139davidson_5&quot;&gt;&lt;span data-dcnode-id=&quot;1836&quot; instrument_node=&quot;&quot;&gt;5: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1834&quot; instrument_node=&quot;&quot;&gt;Duménil and Lévy, 2011, p33-42.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1832&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1828&quot;&gt;&lt;a data-dcnode-id=&quot;1830&quot; href=&quot;#139davidson6&quot; name=&quot;139davidson_6&quot;&gt;&lt;span data-dcnode-id=&quot;1831&quot; instrument_node=&quot;&quot;&gt;6: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1829&quot; instrument_node=&quot;&quot;&gt;Saad-Filho, 2010, pp242, 249.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1827&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1823&quot;&gt;&lt;a data-dcnode-id=&quot;1825&quot; href=&quot;#139davidson7&quot; name=&quot;139davidson_7&quot;&gt;&lt;span data-dcnode-id=&quot;1826&quot; instrument_node=&quot;&quot;&gt;7: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1824&quot; instrument_node=&quot;&quot;&gt;Marx, 1974, p146. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1822&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1818&quot;&gt;&lt;a data-dcnode-id=&quot;1820&quot; href=&quot;#139davidson8&quot; name=&quot;139davidson_8&quot;&gt;&lt;span data-dcnode-id=&quot;1821&quot; instrument_node=&quot;&quot;&gt;8: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1819&quot; instrument_node=&quot;&quot;&gt;Harman, 2008.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1817&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1813&quot;&gt;&lt;a data-dcnode-id=&quot;1815&quot; href=&quot;#139davidson9&quot; name=&quot;139davidson_9&quot;&gt;&lt;span data-dcnode-id=&quot;1816&quot; instrument_node=&quot;&quot;&gt;9: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1814&quot; instrument_node=&quot;&quot;&gt;One of these writers, Andrew Kliman, helpfully gives references to the authors who take this view, including Carchedi, Desai, Freeman, Harman, Mattick, Roberts, Onishi and Potts. To these we can also add Choonara, 2011, Choonara 2012 and-in specific relation the US-Paitardis and Tsoulfidis, 2012, and Smith and Butovsky, 2013.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1808&quot;&gt;&lt;a data-dcnode-id=&quot;1810&quot; href=&quot;#139davidson10&quot; name=&quot;139davidson_10&quot;&gt;&lt;span data-dcnode-id=&quot;1811&quot; instrument_node=&quot;&quot;&gt;10: &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1809&quot; instrument_node=&quot;&quot;&gt;See, for example, Brenner and Glick, 1991.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1807&quot; instrument_node=&quot;&quot;&gt;
