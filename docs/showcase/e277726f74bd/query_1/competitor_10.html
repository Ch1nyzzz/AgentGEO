&lt;/span&gt;&lt;p data-dcnode-id=&quot;2544&quot;&gt;&lt;span data-dcnode-id=&quot;2549&quot; instrument_node=&quot;&quot;&gt;The third strategy was to establish new productive capacity, and sometimes virtually new industries, in geographical areas with low or non-existent levels of unionisation and to prevent as far as possible the culture of membership from becoming established; latterly the process was repeated in the very areas, like Glasgow, where unionisation had previously been strongest. One of the reasons why unemployment remained high even though new jobs were being created was that these involved new entrants to the labour market such as married women and the young, rather than those who had lost their jobs. This was a more prolonged, molecular process than the first two strategies, and one in which the employers rather than the state took the lead, although the latter gave support through grants, subsidies and tax breaks. If the classic example of this strategy was the movement of productive capital from the old “rustbelt” industrial regions of the north east USA to the southern sunbelt, similar, less extreme versions of the same process took place in England (from the north east and north west to the “M4 Corridor”) and Scotland (from Glasgow to “Silicon Glen” and the New Towns like Livingston). By 1987 fewer than one male worker in ten in Glasgow was employed in manufacturing while nearly a quarter of all workers were women employed in public services.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2546&quot; href=&quot;#139davidson_50&quot; name=&quot;139davidson50&quot;&gt;&lt;sup data-dcnode-id=&quot;2547&quot;&gt;&lt;span data-dcnode-id=&quot;2548&quot; instrument_node=&quot;&quot;&gt;50&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2545&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2526&quot;&gt;&lt;span data-dcnode-id=&quot;2542&quot; instrument_node=&quot;&quot;&gt;These geographical shifts &lt;/span&gt;&lt;em data-dcnode-id=&quot;2540&quot;&gt;&lt;span data-dcnode-id=&quot;2541&quot; instrument_node=&quot;&quot;&gt;within&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2539&quot; instrument_node=&quot;&quot;&gt; nation-states were more common and more damaging to trade union organisation than the threatened geographical shifts to locations in the Global South, threats which were often made by employers, but far less frequently carried out, not least because of the uncertainties over the ability of developing states to provide technological infrastructure and the cost in abandoning fixed capital which such relocations involved.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2536&quot; href=&quot;#139davidson_51&quot; name=&quot;139davidson51&quot;&gt;&lt;sup data-dcnode-id=&quot;2537&quot;&gt;&lt;span data-dcnode-id=&quot;2538&quot; instrument_node=&quot;&quot;&gt;51&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2535&quot; instrument_node=&quot;&quot;&gt; However, as Graham Turner notes, “it is the threat of relocation that proves just as powerful as the reality of a transfer somewhere cheaper”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2532&quot; href=&quot;#139davidson_52&quot; name=&quot;139davidson52&quot;&gt;&lt;sup data-dcnode-id=&quot;2533&quot;&gt;&lt;span data-dcnode-id=&quot;2534&quot; instrument_node=&quot;&quot;&gt;52&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2531&quot; instrument_node=&quot;&quot;&gt; These threats proved successful at least in part because of the way in which sections of the trade union bureaucracy and the left have exaggerated the extent of outsourcing and external relocation, the principal effect of which has been to further reduce the confidence of union members to resist.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2528&quot; href=&quot;#139davidson_53&quot; name=&quot;139davidson53&quot;&gt;&lt;sup data-dcnode-id=&quot;2529&quot;&gt;&lt;span data-dcnode-id=&quot;2530&quot; instrument_node=&quot;&quot;&gt;53&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2527&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2525&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2519&quot;&gt;&lt;span data-dcnode-id=&quot;2524&quot; instrument_node=&quot;&quot;&gt;The relative success of these strategies allowed corporate restructuring, the closing of “unproductive” units and the imposition of “the right of managers to manage” within the workplace, which in turn ensured that wage costs fell and stayed down, so that the share of profits going to capital was increased. The neoliberal onslaught also opened up the possibility of two longer-term developments, to which I will return below. The first was to increase the probability that, when economic growth was resumed, working class organisation would not be in a position to take advantage of increased profit rates by pushing for higher wages and better conditions: in other words, that any future boom would primarily benefit capital, not labour. In Britain trade union density in 1979 was 55.4 percent; by 1983, 47.6 percent; by 1987, 43.4 percent; by 1992, 36.3 percent; and by 1997, 29.9 percent.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2521&quot; href=&quot;#139davidson_54&quot; name=&quot;139davidson54&quot;&gt;&lt;sup data-dcnode-id=&quot;2522&quot;&gt;&lt;span data-dcnode-id=&quot;2523&quot; instrument_node=&quot;&quot;&gt;54&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2520&quot; instrument_node=&quot;&quot;&gt; The second was to assist the social and liberal democratic parties to adapt to neoliberalism by weakening the main source of countervailing pressure from the broader labour movement, thus ensuring that fiscal and other changes favourable to capital were less likely to be reversed. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2518&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2512&quot;&gt;&lt;span data-dcnode-id=&quot;2517&quot; instrument_node=&quot;&quot;&gt;The successful onslaught on the labour movement allowed all the other components of the neoliberal repertoire that Harman called “anti-reforms” to be implemented.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2514&quot; href=&quot;#139davidson_55&quot; name=&quot;139davidson55&quot;&gt;&lt;sup data-dcnode-id=&quot;2515&quot;&gt;&lt;span data-dcnode-id=&quot;2516&quot; instrument_node=&quot;&quot;&gt;55&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2513&quot; instrument_node=&quot;&quot;&gt; Any catalogue of those which proved more enduring would have to include the following, although the list is by no means exhaustive: privatisation of state-owned industries and utilities, flexible labour markets, outsourcing of non-core functions, deregulation of financial markets and the removal of exchange controls, abolition of protective tariffs and subsidies on essential goods, commodification of services once provided free at the point of use, the shift from direct and progressive to indirect and regressive taxation, and a monetary policy dedicated to the maintenance of low levels of inflation. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2511&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2495&quot;&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;Neoliberalism as a system incorporating these elements only emerged in a piecemeal fashion, after many false starts, accidental discoveries, opportunistic manoeuvres and unintended consequences. Privatisation is usually treated as an example of how theory was turned into practice by the Conservative regime after 1979, not least by Thatcher herself, in whose autobiography it is retrospectively presented as a consistently held component of her programme for transforming Britain.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2507&quot; href=&quot;#139davidson_56&quot; name=&quot;139davidson56&quot;&gt;&lt;sup data-dcnode-id=&quot;2508&quot;&gt;&lt;span data-dcnode-id=&quot;2509&quot; instrument_node=&quot;&quot;&gt;56&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2506&quot; instrument_node=&quot;&quot;&gt; There is no doubt that this led to major changes in social and economic life by the opening years of the 21st century.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2503&quot; href=&quot;#139davidson_57&quot; name=&quot;139davidson57&quot;&gt;&lt;sup data-dcnode-id=&quot;2504&quot;&gt;&lt;span data-dcnode-id=&quot;2505&quot; instrument_node=&quot;&quot;&gt;57&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2502&quot; instrument_node=&quot;&quot;&gt; In particular it offered longer-term advantages to individual &lt;/span&gt;&lt;br data-dcnode-id=&quot;2501&quot;&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt;
capitalists (and to the state managers and politicians with whom they increasingly exchanged roles), if not to their states or the system as a whole: it allowed companies to expand markets into sectors from which they were previously excluded and established conditions for international mergers and acquisitions which state-ownership tended to deter.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2497&quot; href=&quot;#139davidson_58&quot; name=&quot;139davidson58&quot;&gt;&lt;sup data-dcnode-id=&quot;2498&quot;&gt;&lt;span data-dcnode-id=&quot;2499&quot; instrument_node=&quot;&quot;&gt;58&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2496&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2492&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;But the privatisation strategy was largely improvised in response to the adverse circumstances Thatcher encountered during her first term in office, and in particular to the combined impact of two pressures on the government, which were themselves aspects of the economic crisis that helped propel the Conservatives into office in the first place. One was the continued upward pressure on state spending caused by both the need for technological investment in the public sector and high levels of unemployment; the sale of key industries and services would both remove the need for the former and provide the Treasury with revenue to meet the latter. The other was the continuing fact of minority support for the Conservatives, despite two general election victories made possible by the British electoral system; the creation of mass share ownership from the flotation of state-owned public assets seemed to offer the possibility of a “people’s capitalism” whose adherents would henceforth look to the Conservatives as their natural political home. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2491&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2481&quot;&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt;Beyond the short-term cash injection attendant on each sale, neither of these goals was achieved. The current costs of subsidising the fragmented rail network, post-privatisation, may actually be greater than those formerly incurred by subsidising British Rail, while there is no evidence to suggest that either former tenants who bought their council houses, or workers who bought shares in privatised companies were any more likely to vote Conservative than before.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2487&quot; href=&quot;#139davidson_59&quot; name=&quot;139davidson59&quot;&gt;&lt;sup data-dcnode-id=&quot;2488&quot;&gt;&lt;span data-dcnode-id=&quot;2489&quot; instrument_node=&quot;&quot;&gt;59&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2486&quot; instrument_node=&quot;&quot;&gt; Anthony Heath and his colleagues found in their study of the British General Election of 1983 that the council house buyers who voted Conservative were already predisposed to do so and that those who had previously voted Labour continued to do so in the same proportion as those who remained council house tenants.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2483&quot; href=&quot;#139davidson_60&quot; name=&quot;139davidson60&quot;&gt;&lt;sup data-dcnode-id=&quot;2484&quot;&gt;&lt;span data-dcnode-id=&quot;2485&quot; instrument_node=&quot;&quot;&gt;60&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2471&quot;&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt;But neoliberal hegemony need not manifest itself in voting for the Conservatives. In fact, the ideological impact of privatisation on the working class was in most cases more subtle than is usually supposed. The shift which most people in Britain were forced to make from rented council housing to private home ownership, for example, did not in itself signal a dilution of working class consciousness; it did, however, mean that workers were in a weaker strategic position. As the Scottish novelist Alan Bissett notes of his friends’ current situation: “They can’t go on strike for longer than a day, because, well, &lt;/span&gt;&lt;em data-dcnode-id=&quot;2477&quot;&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;who’s going to pay the mortgage&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2476&quot; instrument_node=&quot;&quot;&gt;?”&lt;/span&gt;&lt;a data-dcnode-id=&quot;2473&quot; href=&quot;#139davidson_61&quot; name=&quot;139davidson61&quot;&gt;&lt;sup data-dcnode-id=&quot;2474&quot;&gt;&lt;span data-dcnode-id=&quot;2475&quot; instrument_node=&quot;&quot;&gt;61&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt; Any prolonged industrial action by workers threatened their ability to meet debt repayments and consequently raised the prospect of repossession, bankruptcy and homelessness, and this is, of course, a function of debt more generally. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2470&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2468&quot;&gt;&lt;span data-dcnode-id=&quot;2469&quot; instrument_node=&quot;&quot;&gt;The situation led to caution in the face of neoliberal attacks, not conversion to the truth of neoliberal beliefs. Indeed, the way in which high interest rates tended to turn home ownership into a massive financial burden or even, in the era of negative equity, an outright liability was inclined to produce dissatisfaction with the system rather than acceptance of it. The real ideological consequences of privatisation occurred in two other ways. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2467&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2457&quot;&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt;The first is that when public services like health and education are privatised (or simply run as if they were private companies) those aspects of service provision which are not purely functional for capital, such as social justice in the case of the former and personal development in that of the latter, tend to be reduced.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2463&quot; href=&quot;#139davidson_62&quot; name=&quot;139davidson62&quot;&gt;&lt;sup data-dcnode-id=&quot;2464&quot;&gt;&lt;span data-dcnode-id=&quot;2465&quot; instrument_node=&quot;&quot;&gt;62&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2462&quot; instrument_node=&quot;&quot;&gt; In education there is an additional ideological component. As Sheldon Wolin notes, privatisation “represents more than a switch in suppliers”, it also involves a “culture of competitiveness, hierarchy, self-interest”. Even under capitalism education involves not only the acquisition of literacy and other skills, but empowerment, in so far as students develop the ability to think independently: “Privatisation of education signifies not an abstract transfer of public to private but a takeover of the means to reshape the minds of coming generations, perhaps to blend popular education and media culture so as better to manage democracy”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2459&quot; href=&quot;#139davidson_63&quot; name=&quot;139davidson63&quot;&gt;&lt;sup data-dcnode-id=&quot;2460&quot;&gt;&lt;span data-dcnode-id=&quot;2461&quot; instrument_node=&quot;&quot;&gt;63&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2458&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2456&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2447&quot;&gt;&lt;span data-dcnode-id=&quot;2455&quot; instrument_node=&quot;&quot;&gt;The second consequence of privatisation is that when the state retreats from ownership and control it is much easier to present the effects of recession as outwith the reach of human intervention, except through participation in the market. “Separating industry off from the state and subjecting it to the market can depoliticise the attacks on workers that accompany the crisis,” explains Harman, “shifting the blame to the seemingly automatic, natural forces of the market”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2452&quot; href=&quot;#139davidson_64&quot; name=&quot;139davidson64&quot;&gt;&lt;sup data-dcnode-id=&quot;2453&quot;&gt;&lt;span data-dcnode-id=&quot;2454&quot; instrument_node=&quot;&quot;&gt;64&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2451&quot; instrument_node=&quot;&quot;&gt; At the same time, once the market is naturalised in this way, it can also have a consoling effect on those who suffer from its operations: “Frederick Hayek knew that it was much easier to accept inequalities if one can claim that they result from an impersonal blind force”, writes Slavoj Zizek, and “the good thing about the ‘irrationality’ of the market and success and failure in capitalism is that it allows me precisely to perceive my failure or success as ‘undeserved’, contingent”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2448&quot; href=&quot;#139davidson_65&quot; name=&quot;139davidson65&quot;&gt;&lt;sup data-dcnode-id=&quot;2449&quot;&gt;&lt;span data-dcnode-id=&quot;2450&quot; instrument_node=&quot;&quot;&gt;65&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2446&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2440&quot;&gt;&lt;span data-dcnode-id=&quot;2445&quot; instrument_node=&quot;&quot;&gt;Within a ten-year period, between the fall of the Berlin Wall in 1989 and the Battle of Seattle in 1999, all of the vanguard regimes of reorientation had been replaced by parties, or at any rate, individual politicians ostensibly committed to an alternative path: Chile (1989), New Zealand (1990), the USA (1992), Britain (1997), and the USSR (1999). Yet as Callinicos notes, “the hegemony of neoliberalism is demonstrated precisely by the fact that its policies survived the electoral defeat of the parties that inaugurated it”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2442&quot; href=&quot;#139davidson_66&quot; name=&quot;139davidson66&quot;&gt;&lt;sup data-dcnode-id=&quot;2443&quot;&gt;&lt;span data-dcnode-id=&quot;2444&quot; instrument_node=&quot;&quot;&gt;66&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2441&quot; instrument_node=&quot;&quot;&gt; This suggests two questions. First, why did nothing fundamental change? Second, since it did not, why could the neoliberal order not simply have been maintained by the original vanguard regimes? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2437&quot;&gt;&lt;span data-dcnode-id=&quot;2438&quot; instrument_node=&quot;&quot;&gt;Social neoliberalism: a regime of consolidation&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2434&quot;&gt;&lt;span data-dcnode-id=&quot;2435&quot; instrument_node=&quot;&quot;&gt;Neoliberals claim that the establishment of free market policies will automatically produce comparably beneficial effects in other areas of social life. Not only are these claims false, neoliberalism also exacerbates all the inherent evils which capitalism involves in all its incarnations. Consequently, so long as citizens are able to vote, and as long as they have political parties prepared to represent their interests, however inadequately, for which to vote, there is always the possibility that the neoliberal order might be undermined. Neoliberal ideologues offer two solutions to this ruling class dilemma. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2433&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2421&quot;&gt;&lt;span data-dcnode-id=&quot;2432&quot; instrument_node=&quot;&quot;&gt;The first was to ensure that only sympathetic politicians are in control of the state, if necessary by non-democratic means. Hayek argued against making a “fetish of democracy” from &lt;/span&gt;&lt;em data-dcnode-id=&quot;2430&quot;&gt;&lt;span data-dcnode-id=&quot;2431&quot; instrument_node=&quot;&quot;&gt;The Road to Serfdom&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2429&quot; instrument_node=&quot;&quot;&gt; (1944) onwards, but his position is perhaps most clearly expressed in a justly infamous letter to the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2427&quot;&gt;&lt;span data-dcnode-id=&quot;2428&quot; instrument_node=&quot;&quot;&gt;Times&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2426&quot; instrument_node=&quot;&quot;&gt; in 1978, where he wrote: “I have not been able to find a single person even in much-maligned Chile who did not agree that personal freedom was much greater under Pinochet than it had been under Allende”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2423&quot; href=&quot;#139davidson_67&quot; name=&quot;139davidson67&quot;&gt;&lt;sup data-dcnode-id=&quot;2424&quot;&gt;&lt;span data-dcnode-id=&quot;2425&quot; instrument_node=&quot;&quot;&gt;67&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2422&quot; instrument_node=&quot;&quot;&gt; The Chilean option is not, however, the preferred one, mainly because of the many inconveniences which military and still more fascist dictatorships tend to involve for bourgeoisies themselves. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2420&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2414&quot;&gt;&lt;span data-dcnode-id=&quot;2419&quot; instrument_node=&quot;&quot;&gt;The second solution was suggested precisely by the recognition that while formal democracy was desirable, substantive democracy was problematic. And in this respect at least, neoliberalism has attempted to implement the programme of its theoretical antecedents. Ellen Meiksins Wood rightly identifies the current attitude of the US ruling class to democracy as consisting of two strategies: “One is to find electoral processes and institutions that will thwart the majority in one way or another. The other—and this is ultimately the most important—is to empty democracy of as much social content as possible”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2416&quot; href=&quot;#139davidson_68&quot; name=&quot;139davidson68&quot;&gt;&lt;sup data-dcnode-id=&quot;2417&quot;&gt;&lt;span data-dcnode-id=&quot;2418&quot; instrument_node=&quot;&quot;&gt;68&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2415&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2413&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2407&quot;&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;In concrete terms, it was increasingly apparent to more thoughtful members of the bourgeoisie that initial successes against the working class based on a strategy of all-out frontal attack had reached the limit of what was possible, particularly in Britain where the regime overreached itself by imposing a poll tax which provoked the first example of successful generalised resistance to the neoliberal programme. The earlier onslaught had achieved the basic aim of weakening the labour movement, instilling among the trade union bureaucracy a generalised structural reluctance to engage in official all-out action. The achievement of this condition is perhaps the greatest service neoliberalism has achieved for capital. Yet these same successes meant that it was possible to consider supporting, or at least tolerating, different parties from those of the right that had formed the original vanguard.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2409&quot; href=&quot;#139davidson_69&quot; name=&quot;139davidson69&quot;&gt;&lt;sup data-dcnode-id=&quot;2410&quot;&gt;&lt;span data-dcnode-id=&quot;2411&quot; instrument_node=&quot;&quot;&gt;69&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2408&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2406&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2392&quot;&gt;&lt;span data-dcnode-id=&quot;2405&quot; instrument_node=&quot;&quot;&gt;Perry Anderson has pointed out that an electoral base, even a much reduced one, is unlikely to be attracted by “the pure doctrine of the free market that is the animating spirit of neoliberalism”. But the “ideological supplements” offered by Thatcher and Reagan—respectively imperialist nationalism and religious fundamentalism—were as likely to alienate support as to cultivate it. What were required were “regimes of consolidation”, formally characterised by social or liberal democratic rhetoric, which were able to incorporate the rhetoric of social solidarity while maintaining and even extending the essential components of neoliberalism.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2402&quot; href=&quot;#139davidson_70&quot; name=&quot;139davidson70&quot;&gt;&lt;sup data-dcnode-id=&quot;2403&quot;&gt;&lt;span data-dcnode-id=&quot;2404&quot; instrument_node=&quot;&quot;&gt;70&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2401&quot; instrument_node=&quot;&quot;&gt; The social and liberal democratic parties could therefore bring an additional, more ameliorative element into the otherwise forbiddingly bleak repertoire of neoliberalism. This apparent supplementing of the naked laws of the market was originally marketed as a “third way” between traditional social democracy and neoliberalism.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2398&quot; href=&quot;#139davidson_71&quot; name=&quot;139davidson71&quot;&gt;&lt;sup data-dcnode-id=&quot;2399&quot;&gt;&lt;span data-dcnode-id=&quot;2400&quot; instrument_node=&quot;&quot;&gt;71&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2397&quot; instrument_node=&quot;&quot;&gt; It is more accurately described by Alex Law and Gerry Mooney as “social neoliberalism”, since it involves not a synthesis of the two, but an adaptation of the former to the latter.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2394&quot; href=&quot;#139davidson_72&quot; name=&quot;139davidson72&quot;&gt;&lt;sup data-dcnode-id=&quot;2395&quot;&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;72&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2393&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2385&quot;&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt;The transition from regime of reorientation to regime of consolidation involved a transition from what, in Gramsci’s terms, was a war of manoeuvre to a war of position: the first involved a frontal onslaught on the labour movement and the dismantling of formerly embedded social democratic institutions (“roll-back”); the second involved a more molecular process with the gradual commodification of huge new areas of social life and the creation of new institutions specifically constructed on neoliberal principles (“roll-out”).&lt;/span&gt;&lt;a data-dcnode-id=&quot;2387&quot; href=&quot;#139davidson_73&quot; name=&quot;139davidson73&quot;&gt;&lt;sup data-dcnode-id=&quot;2388&quot;&gt;&lt;span data-dcnode-id=&quot;2389&quot; instrument_node=&quot;&quot;&gt;73&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2386&quot; instrument_node=&quot;&quot;&gt; Central to this shift were the social democratic parties that had traditionally seen their role as reforming or even transcending capitalism. How did they come to play the role of open, unapologetic, supporters of the capitalist system in its most uninhibited form?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2384&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2378&quot;&gt;&lt;span data-dcnode-id=&quot;2383&quot; instrument_node=&quot;&quot;&gt;Gregory Elliott argues that social democracy evolved over three distinct periods: 1889-1945, 1945-1975, and 1975 to date.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2380&quot; href=&quot;#139davidson_74&quot; name=&quot;139davidson74&quot;&gt;&lt;sup data-dcnode-id=&quot;2381&quot;&gt;&lt;span data-dcnode-id=&quot;2382&quot; instrument_node=&quot;&quot;&gt;74&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2379&quot; instrument_node=&quot;&quot;&gt; As a movement, it has always been fundamentally supportive of capitalism in practice, but during the first period it was at least programmatically committed to abolishing it. The second period coincided with the post-war boom and allowed the possibility of positive reforms for the working class without threatening the system, although these were also delivered by forces to the right of social democracy, by Christian democracy in particular. Once the possibility of reform was removed, all that remained, for the leaderships at any rate, was the commitment to capitalism and some residual rhetoric. Central to this process was the crisis of Keynesianism. In ideological terms, the collapse of the Stalinist regimes did not so much “prove” as confirm the already widely held belief that any alternative form of economy to neoliberal capitalism was impossible. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2377&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2373&quot;&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;When Blair took office he did not need to reconstruct the state on neoliberal lines, as that had already been accomplished by Thatcher: he inherited the new structure ready made. Relationships between the leadership and the party membership were also different. Like Thatcher, Blair was in a minority in the leadership of his own party, but could draw on the support of a membership which was prepared to support more radical changes in policy. But here the comparisons break down. Thatcher was supported by Conservative Party members who saw her as returning to &lt;/span&gt;&lt;br data-dcnode-id=&quot;2375&quot;&gt;&lt;span data-dcnode-id=&quot;2374&quot; instrument_node=&quot;&quot;&gt;
traditional policies eroded by years of compromise with the trade unions and social democracy. Blair was supported by Labour Party members who were prepared to abandon traditional policies out of desperation at their apparent inability to win elections and the consequent need to compromise with the policies of the Conservatives, which were assumed to have a popular resonance. In many cases the bitterness of this compromise was only made palatable by the self-delusion that the leadership was only pretending to embrace neoliberalism in order to gain power, after which the reforms they wished to see would be implemented. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2364&quot;&gt;&lt;span data-dcnode-id=&quot;2371&quot; instrument_node=&quot;&quot;&gt;No such reversal took place, of course—if anything, the New Labour leadership embraced capitalism and capitalists more enthusiastically than representatives of the traditional right have ever found necessary. As the house journal of neoliberalism, the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2369&quot;&gt;&lt;span data-dcnode-id=&quot;2370&quot; instrument_node=&quot;&quot;&gt;Economist&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt;, noted, Blair’s “lasting legacy” was the way in which no mainstream politician now pursues policies that are radically different from his: “New Labour’s particular blend of free-marketry and social justice is now widely seen as the natural path of British politics, and few politicians of any stripe would dare veer far from it”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2365&quot; href=&quot;#139davidson_75&quot; name=&quot;139davidson75&quot;&gt;&lt;sup data-dcnode-id=&quot;2366&quot;&gt;&lt;span data-dcnode-id=&quot;2367&quot; instrument_node=&quot;&quot;&gt;75&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2357&quot;&gt;&lt;span data-dcnode-id=&quot;2362&quot; instrument_node=&quot;&quot;&gt;One of the key successes that neoliberalism has achieved for capital has therefore been to render inconceivable alternatives to the economic policies established by the initial regimes of reorientation—or at any rate, alternatives to their left. In Britain, for example, each successive phase of the neoliberal experiment saw the incremental abandonment of the repertoire of measures through which governments had traditionally influenced economic activity, beginning with Geoffrey Howe’s abandonment of exchange controls in 1979 and concluding (to date) with Gordon Brown’s transfer of the power to set interest rates from the Treasury to an unelected committee of the Bank of England. Anderson described the former as the Thatcher regime’s “first and most fundamental act on coming to power”, but the same may be said of the second in relation to Thatcher’s successor.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2359&quot; href=&quot;#139davidson_76&quot; name=&quot;139davidson76&quot;&gt;&lt;sup data-dcnode-id=&quot;2360&quot;&gt;&lt;span data-dcnode-id=&quot;2361&quot; instrument_node=&quot;&quot;&gt;76&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2358&quot; instrument_node=&quot;&quot;&gt; The acceptance of neoliberal economic nostrums among mainstream parties has led a form of “depoliticisation”, which, as Peter Burnham says, “is a governing strategy and in that sense remains highly political”; it is a strategy which operates by “placing at one remove the political character of decision making”. It can take three forms:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2347&quot;&gt;&lt;span data-dcnode-id=&quot;2355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2349&quot;&gt;&lt;span data-dcnode-id=&quot;2354&quot; instrument_node=&quot;&quot;&gt;First, there has been a reassignment of tasks away from the party in office to a number of ostensibly “non-political” bodies as a way of underwriting the government’s commitment to achieving objectives… The second form…is in the adoption of measures ostensibly to increase the accountability, transparency and external validation of policy… Finally, depoliticisation strategies have been pursued in an overall context favouring the adoption of binding “rules” which limit government room for manoeuvre.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2351&quot; href=&quot;#139davidson_77&quot; name=&quot;139davidson77&quot;&gt;&lt;sup data-dcnode-id=&quot;2352&quot;&gt;&lt;span data-dcnode-id=&quot;2353&quot; instrument_node=&quot;&quot;&gt;77&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2350&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2348&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2346&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2336&quot;&gt;&lt;span data-dcnode-id=&quot;2345&quot; instrument_node=&quot;&quot;&gt;The potential for these developments has always been present in capitalist democracy. During the 1930s Gramsci distinguished between what he called “conjunctural” and “organic” phenomena. The former “do not have any very far-reaching historical significance; they give rise to political criticism of a minor, day to day character, which has as its subject top political leaders and personalities with direct governmental responsibilities”. The latter, on the other hand “give rise to socio-historical criticism, whose subject is wider social groupings—beyond the top figures and beyond top leaders”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2342&quot; href=&quot;#139davidson_78&quot; name=&quot;139davidson78&quot;&gt;&lt;sup data-dcnode-id=&quot;2343&quot;&gt;&lt;span data-dcnode-id=&quot;2344&quot; instrument_node=&quot;&quot;&gt;78&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2341&quot; instrument_node=&quot;&quot;&gt; What has changed is that the conjunctural is no longer an aspect of politics; it has become its essence. Consequently, most discussion of politics—in the developed world at least—is devoted to expending more or less informed commentary and speculation on essentially meaningless exchanges within parliaments and other supposedly representative institutions. Peter Oborne’s discussion of party convergence in Britain incorrectly assumes the process is complete, rather than simply well advanced, but his essential point is valid: “In practice the differences between the main parties are minor and for the most part technical. The contradiction between apparently bitter party competition on the political stage, and collaboration behind the scenes, defines the contemporary political predicament”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2338&quot; href=&quot;#139davidson_79&quot; name=&quot;139davidson79&quot;&gt;&lt;sup data-dcnode-id=&quot;2339&quot;&gt;&lt;span data-dcnode-id=&quot;2340&quot; instrument_node=&quot;&quot;&gt;79&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2337&quot; instrument_node=&quot;&quot;&gt; Debates therefore have the quality of a shadow play, an empty ritual in which trivial or superficial differences are emphasised in order to give an impression of real alternatives and justify the continuation of party competition. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2325&quot;&gt;&lt;span data-dcnode-id=&quot;2334&quot; instrument_node=&quot;&quot;&gt;The increasing irrelevance of politics has given rise to several clear trends across the West, not only in Britain, including increasing voter volatility and decreasing partisanship, indicating that many of those electors still involved in casting their vote do so—appropriately enough—on a consumer model of political choice, where participation is informed by media-driven perceptions of which result will be to their immediate personal benefit. Unsurprisingly, the numbers prepared to carry out even this minimal level of activity are declining.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2331&quot; href=&quot;#139davidson_80&quot; name=&quot;139davidson80&quot;&gt;&lt;sup data-dcnode-id=&quot;2332&quot;&gt;&lt;span data-dcnode-id=&quot;2333&quot; instrument_node=&quot;&quot;&gt;80&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2330&quot; instrument_node=&quot;&quot;&gt; A British survey from 2004 showed that New Labour’s triumphant re-election of 2001 was achieved on the basis of the lowest poll (59 percent) in any post-war election, although it has since sunk further. The lowest point prior to 2004 was the general election of 1997, when the Labour Party, supposedly reunited with its electoral base, actually won with a lower share of the vote than it received in 1987, when it lost to the Conservatives for the third time in a row.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2327&quot; href=&quot;#139davidson_81&quot; name=&quot;139davidson81&quot;&gt;&lt;sup data-dcnode-id=&quot;2328&quot;&gt;&lt;span data-dcnode-id=&quot;2329&quot; instrument_node=&quot;&quot;&gt;81&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2326&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2322&quot;&gt;&lt;span data-dcnode-id=&quot;2323&quot; instrument_node=&quot;&quot;&gt;The combination of increasing political convergence on the one hand and voter abstention on the other has led to a reconfiguration of the relationship between politicians and the state outlined at the beginning of this section. As Peter Mair notes, where once they were as concerned with “representation” as with “procedure”, the emphasis has now shifted decisively to the latter, away from civil society towards the state:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2313&quot;&gt;&lt;span data-dcnode-id=&quot;2320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2315&quot;&gt;&lt;span data-dcnode-id=&quot;2319&quot; instrument_node=&quot;&quot;&gt;Parties have become agencies that govern—in the widest sense of the word—rather than represent; they bring order rather than give voice. It is in this sense that we can also speak of the disengagement or withdrawal of the elites, although while exiting citizens are often headed towards more privatised worlds, the exiting political leadership is retreating into an institutional one—a world of public offices.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2316&quot; href=&quot;#139davidson_82&quot; name=&quot;139davidson82&quot;&gt;&lt;sup data-dcnode-id=&quot;2317&quot;&gt;&lt;span data-dcnode-id=&quot;2318&quot; instrument_node=&quot;&quot;&gt;82&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2310&quot;&gt;&lt;span data-dcnode-id=&quot;2311&quot; instrument_node=&quot;&quot;&gt;The balance sheet of neoliberalism &lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2309&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2307&quot;&gt;&lt;span data-dcnode-id=&quot;2308&quot; instrument_node=&quot;&quot;&gt;So much for the process by which our current situation was brought about: what type of Britain did the neoliberals create between the economic crises of 1973 and 2008? And how far does that world resemble the one they actually wanted to create? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2306&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2298&quot;&gt;&lt;em data-dcnode-id=&quot;2304&quot;&gt;&lt;span data-dcnode-id=&quot;2305&quot; instrument_node=&quot;&quot;&gt;A boom economy&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2303&quot; instrument_node=&quot;&quot;&gt;? David Harvey has argued that neoliberalism can be interpreted “either as a utopian project to realise a theoretical design for the reorganisation of international capitalism or as a political project to re-establish the conditions for capital accumulation and restore the power of economic elites”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2300&quot; href=&quot;#139davidson_83&quot; name=&quot;139davidson83&quot;&gt;&lt;sup data-dcnode-id=&quot;2301&quot;&gt;&lt;span data-dcnode-id=&quot;2302&quot; instrument_node=&quot;&quot;&gt;83&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2299&quot; instrument_node=&quot;&quot;&gt; There are actually three elements in this formulation, not two. One is neoliberal theory (“a utopian project”) which bears only a tenuous relationship to capitalist reality. The other two are different aspects of what Harvey describes as “a political project”, restoring power to economic elites and re-establishing the conditions for capital accumulation, although they do not depend on each other. I reject the first part of this definition on the grounds that there was no need to restore what had never been lost. What of the second and third? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2291&quot;&gt;&lt;span data-dcnode-id=&quot;2296&quot; instrument_node=&quot;&quot;&gt;Harvey is right to observe that neoliberalism “has not been very effective” in this respect.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2293&quot; href=&quot;#139davidson_84&quot; name=&quot;139davidson84&quot;&gt;&lt;sup data-dcnode-id=&quot;2294&quot;&gt;&lt;span data-dcnode-id=&quot;2295&quot; instrument_node=&quot;&quot;&gt;84&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2292&quot; instrument_node=&quot;&quot;&gt; The underlying problem is that it has failed to increase the rate of profit consistently. As Robert Brenner explains:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2290&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2281&quot;&gt;&lt;span data-dcnode-id=&quot;2289&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2283&quot;&gt;&lt;span data-dcnode-id=&quot;2288&quot; instrument_node=&quot;&quot;&gt;During the long expansion of the 1990s, the average rate of profit in the [US] private economy remained 15-20 percent below that for the 1950s and 1960s, and a good deal more depressed than in Germany and Japan. From 1997, moreover, profitability plummeted in the US and across the world economy, even as the New Economy boom reached its zenith. Rather than setting the US and the world economy on a new course, the forces driving the New Economy actually exacerbated the fundamental problem making for long-term slowed growth—namely, persistent chronic over-capacity in manufacturing and related sectors making for reduced profit rates for the economy as a whole.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2285&quot; href=&quot;#139davidson_85&quot; name=&quot;139davidson85&quot;&gt;&lt;sup data-dcnode-id=&quot;2286&quot;&gt;&lt;span data-dcnode-id=&quot;2287&quot; instrument_node=&quot;&quot;&gt;85&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2284&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2282&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2274&quot;&gt;&lt;span data-dcnode-id=&quot;2279&quot; instrument_node=&quot;&quot;&gt;Brenner correctly points to the failure of neoliberalism in achieving profit rates comparable to those of the Golden Age, but this is not the decisive issue. As David McNally points out: “[The] great boom was the product of an exceptional set of socio-historical circumstances that triggered an unprecedented wave of expansion. But, prolonged expansion with rising levels of output, wages and employment in the core-economies is not the capitalist norm; and the absence of all these is not invariably a ‘crisis’.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;2276&quot; href=&quot;#139davidson_86&quot; name=&quot;139davidson86&quot;&gt;&lt;sup data-dcnode-id=&quot;2277&quot;&gt;&lt;span data-dcnode-id=&quot;2278&quot; instrument_node=&quot;&quot;&gt;86&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2275&quot; instrument_node=&quot;&quot;&gt; Constant use of the great boom as a reference point is problematic for two reasons. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2273&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2271&quot;&gt;&lt;span data-dcnode-id=&quot;2272&quot; instrument_node=&quot;&quot;&gt;First, it has led critics to expect that any subsequent boom must involve similar consequences for workers in terms of rising living standards, expanding welfare provision and increasing class confidence. Since the period after 1973 had precisely the opposite characteristics, the temptation has been to read back from the condition of the working class to the condition of the capitalist system, and claim that the entire period has been, if not one of crisis, then at least one of stagnation. But it is deeply implausible to think that a system as dynamic as capitalism could exist in a state of permanent crisis (or even recurrent crises) for 40 years—indeed, it would be difficult to understand why the events of the latter date could have had such significance had they not been preceded by a period of growth and expansion. There have been booms before, such as those of the 1890s and 1920s, during which most workers did not benefit and indeed continued to be subjected to generalised attacks on their wages and conditions. One of the objectives of the neoliberal assault, after all, was precisely to weaken trade unions to the point where they would be unable to take advantage of any improvement in economic conditions. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2270&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2250&quot;&gt;&lt;span data-dcnode-id=&quot;2269&quot; instrument_node=&quot;&quot;&gt;Second, unlike Marxist economists, capitalists and managers do not tend to look back over a 40-year period to compare conditions then with their current situation. It may be deeply significant to us that capitalist recovery after 1982 never resumed the levels of growth typical of the post-war boom, but this is somewhat unlikely to enter the calculations of the average CEO. Moreover, as Duménil and Lévy write: “The objectives of managers depend on the social order in which management is performed.” These objectives have changed: “After World War II, management basically aimed at growth (within corporations and in the definition of policies) and technical change. In neoliberalism, the main target became the stock market and capital income”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2266&quot; href=&quot;#139davidson_87&quot; name=&quot;139davidson87&quot;&gt;&lt;sup data-dcnode-id=&quot;2267&quot;&gt;&lt;span data-dcnode-id=&quot;2268&quot; instrument_node=&quot;&quot;&gt;87&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2265&quot; instrument_node=&quot;&quot;&gt; Managers now respond to demands from shareholders to produce immediate returns greater than their own performance compared with last year, or with those of their competitors from the current year. The decisive issue is instead whether the rate of profit is sufficiently high for them to continue to invest in production and be confident of an acceptable return, and between 1982 and 2007 this was largely the case.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2262&quot; href=&quot;#139davidson_88&quot; name=&quot;139davidson88&quot;&gt;&lt;sup data-dcnode-id=&quot;2263&quot;&gt;&lt;span data-dcnode-id=&quot;2264&quot; instrument_node=&quot;&quot;&gt;88&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2261&quot; instrument_node=&quot;&quot;&gt; It is true, of course, that the general trajectory of the rate of profit was downward throughout the period since 1973, but the key word here is “continue”, since the general trajectory was also downward &lt;/span&gt;&lt;em data-dcnode-id=&quot;2259&quot;&gt;&lt;span data-dcnode-id=&quot;2260&quot; instrument_node=&quot;&quot;&gt;throughout the period of the post&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2258&quot; instrument_node=&quot;&quot;&gt;–&lt;/span&gt;&lt;em data-dcnode-id=&quot;2256&quot;&gt;&lt;span data-dcnode-id=&quot;2257&quot; instrument_node=&quot;&quot;&gt;war boom&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2255&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2252&quot; href=&quot;#139davidson_89&quot; name=&quot;139davidson89&quot;&gt;&lt;sup data-dcnode-id=&quot;2253&quot;&gt;&lt;span data-dcnode-id=&quot;2254&quot; instrument_node=&quot;&quot;&gt;89&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2251&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2249&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2243&quot;&gt;&lt;span data-dcnode-id=&quot;2248&quot; instrument_node=&quot;&quot;&gt;The neoliberal boom from 1982 was in part the result of the partial recovery from any recession caused by the destruction of some capitals and the rationalisation and retooling of those which survived—although as is widely recognised the destruction of capital was insufficient to purge the system of accumulated dead labour. As a result, four other factors assumed major importance, each of which had, however, in-built limitations.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2245&quot; href=&quot;#139davidson_90&quot; name=&quot;139davidson90&quot;&gt;&lt;sup data-dcnode-id=&quot;2246&quot;&gt;&lt;span data-dcnode-id=&quot;2247&quot; instrument_node=&quot;&quot;&gt;90&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2244&quot; instrument_node=&quot;&quot;&gt; These factors overlapped with each other in time, but their maximum impact on the system occurred in the following order.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2242&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2233&quot;&gt;&lt;span data-dcnode-id=&quot;2241&quot; instrument_node=&quot;&quot;&gt;The first and most fundamental was simply greater exploitation of the workforce, by increasing productivity on the one hand (making fewer workers in each enterprise work harder and longer) and decreasing the share of income going to labour on the other (paying workers less in real terms). The balance between the two differed from country to country: in Britain, for example, unlike the United States, it was the former which had the greatest impact, as average wages tended to increase—although this reflected the experience of workers in unionised and/or public sector workplaces, not all workers, as we shall see below—until 2010, when they began a decline which has still to be reversed.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2238&quot; href=&quot;#139davidson_91&quot; name=&quot;139davidson91&quot;&gt;&lt;sup data-dcnode-id=&quot;2239&quot;&gt;&lt;span data-dcnode-id=&quot;2240&quot; instrument_node=&quot;&quot;&gt;91&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2237&quot; instrument_node=&quot;&quot;&gt; Both means of increasing exploitation were made possible by the relative success of the attack on the labour movement; both contributed to a partial restoration of the rate of profit. Both also had definite limits: the former was not physically sustainable on an indefinite basis and the latter restricted the realisation of value created in production by reducing expenditure on commodities.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2234&quot; href=&quot;#139davidson_92&quot; name=&quot;139davidson92&quot;&gt;&lt;sup data-dcnode-id=&quot;2235&quot;&gt;&lt;span data-dcnode-id=&quot;2236&quot; instrument_node=&quot;&quot;&gt;92&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2232&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2218&quot;&gt;&lt;span data-dcnode-id=&quot;2231&quot; instrument_node=&quot;&quot;&gt;The second and closely related factor was a massive increase in consumer debt. As McNally notes, credit became crucially important in preventing the return to crisis only after the post-1982 recovery had exhausted itself. The East Asian crisis of 1997 and the dotcom collapse of 2000/1 signalled a “gargantuan credit expansion, increasingly fuelled after 2001 by record-low interest rates, postponed the day of reckoning”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2228&quot; href=&quot;#139davidson_93&quot; name=&quot;139davidson93&quot;&gt;&lt;sup data-dcnode-id=&quot;2229&quot;&gt;&lt;span data-dcnode-id=&quot;2230&quot; instrument_node=&quot;&quot;&gt;93&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2227&quot; instrument_node=&quot;&quot;&gt; The main reason for increased debt has been the need to maintain personal or familial income levels. The threefold strategy of allowing unemployment, disciplining labour and relocating production could never be permanently effective in cowing resistance, but the effect was prolonged by the very nature of the neoliberal boom. Because such growth as did take place in the heartlands of the system was based on investment in services rather than manufacturing or other productive sectors of the economy, such new jobs as were created tended to be characterised by more insecure employment or underemployment: “Britain now holds the EU record in the proportion of people employed in such occupations as data entry and call centre reception; there are as many people ‘in service’ (eg maids, nannies, gardeners and the like) as there were in Victorian times”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2224&quot; href=&quot;#139davidson_94&quot; name=&quot;139davidson94&quot;&gt;&lt;sup data-dcnode-id=&quot;2225&quot;&gt;&lt;span data-dcnode-id=&quot;2226&quot; instrument_node=&quot;&quot;&gt;94&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2223&quot; instrument_node=&quot;&quot;&gt; As the British government’s own statisticians recognise, these occupations are at the bottom of the pay scales; on average “personal service occupations earned £14,146 for the 2002/03 tax year”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2220&quot; href=&quot;#139davidson_95&quot; name=&quot;139davidson95&quot;&gt;&lt;sup data-dcnode-id=&quot;2221&quot;&gt;&lt;span data-dcnode-id=&quot;2222&quot; instrument_node=&quot;&quot;&gt;95&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2219&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2217&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2212&quot;&gt;&lt;span data-dcnode-id=&quot;2216&quot; instrument_node=&quot;&quot;&gt;But the creation of low-wage jobs was not the only reason. As we have seen, one of the characteristic features of neoliberalism is privatisation, a consequence of which has been the charging for services which were once either paid for or subsidised out of general taxation. The levels of taxation to which working class people are subject have not fallen; indeed they have increased as the sources of tax revenue have moved from income and property towards consumption, but they are now additionally required to pay for essential services which now take the form of commodities. The need for higher levels of necessary expenditure by the working class therefore encouraged—indeed, one might say, necessitated—a massive expansion in borrowing. At the same time debt also provided an alternative to struggle, in conditions where that was difficult or impossible. While New Labour was in office, total debt held by individuals rose from £570.0 billion to £1,511.7 billion, an increase of 165.2 percent. During the same period the ratio of personal debt to disposable income rose from 101.6 percent to 173.1 percent—an increase of 71.5 percent which exceeds even the increase of 49.8 percent registered during the preceding period of Conservative government.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2213&quot; href=&quot;#139davidson_96&quot; name=&quot;139davidson96&quot;&gt;&lt;sup data-dcnode-id=&quot;2214&quot;&gt;&lt;span data-dcnode-id=&quot;2215&quot; instrument_node=&quot;&quot;&gt;96&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2211&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2201&quot;&gt;&lt;span data-dcnode-id=&quot;2210&quot; instrument_node=&quot;&quot;&gt;The third factor is what Harvey calls “accumulation by dispossession”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2207&quot; href=&quot;#139davidson_97&quot; name=&quot;139davidson97&quot;&gt;&lt;sup data-dcnode-id=&quot;2208&quot;&gt;&lt;span data-dcnode-id=&quot;2209&quot; instrument_node=&quot;&quot;&gt;97&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2206&quot; instrument_node=&quot;&quot;&gt; There are several major difficulties with this notion.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2203&quot; href=&quot;#139davidson_98&quot; name=&quot;139davidson98&quot;&gt;&lt;sup data-dcnode-id=&quot;2204&quot;&gt;&lt;span data-dcnode-id=&quot;2205&quot; instrument_node=&quot;&quot;&gt;98&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2202&quot; instrument_node=&quot;&quot;&gt; Nevertheless, in the British context, one of the processes Harvey identifies was important in the partial recovery of capitalism: the privatisation of state-owned industries and public services. Again no new value is created, but neither is the process simply relocating resources within the system from the public to the private sector. Privatisation provided resources which—potentially at least—could be used directly for production rather than in the process of realisation or as part of the social wage. But here too there are limits to the process. There has been resistance and, although there have been subsequent re-nationalisations in response to the current recession, the opportunities provided by transfers from public to private ownership were essentially once and for all operations the scale of which will never again be repeated. Only the NHS still remains as the great remaining prize for privatisation and in England at least, this is already happening, although in a far more fragmentary way than those of the 1980s or 1990s.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2200&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2191&quot;&gt;&lt;span data-dcnode-id=&quot;2199&quot; instrument_node=&quot;&quot;&gt;The fourth factor, itself a result of profit rates failing to consistently reach what capitalists considered acceptable levels, was a fall in the proportion of surplus value being invested in production and the rise in the proportion being saved, to the point where the latter is greater than the former. Not for the first time in the history of the capitalist system, the need to find profitable uses for surplus capital, where productive investment was insufficiently attractive, tended to draw industrial capitalists towards financial speculation.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2196&quot; href=&quot;#139davidson_99&quot; name=&quot;139davidson99&quot;&gt;&lt;sup data-dcnode-id=&quot;2197&quot;&gt;&lt;span data-dcnode-id=&quot;2198&quot; instrument_node=&quot;&quot;&gt;99&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2195&quot; instrument_node=&quot;&quot;&gt; Indeed, Duménil and Lévy have claimed that neoliberalism operates mainly or even solely for the benefit of the financial component of capital, which “managed the crisis according to its own interests, which prolonged the crisis” and which in turn “made it possible for finance to shift the course of history in its own interests”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2192&quot; href=&quot;#139davidson_100&quot; name=&quot;139davidson100&quot;&gt;&lt;sup data-dcnode-id=&quot;2193&quot;&gt;&lt;span data-dcnode-id=&quot;2194&quot; instrument_node=&quot;&quot;&gt;100&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2190&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2180&quot;&gt;&lt;span data-dcnode-id=&quot;2189&quot; instrument_node=&quot;&quot;&gt;However, it is not true that financial and industrial capital can be separated in this way. The Great Depression of the 1930s showed productive capital that accumulation could no longer depend on a largely unregulated system. “Financial capital, on the contrary, largely continued to adhere to the liberal line that unregulated markets always work best, including financial markets”. &lt;/span&gt;&lt;a data-dcnode-id=&quot;2186&quot; href=&quot;#139davidson_101&quot; name=&quot;139davidson101&quot;&gt;&lt;sup data-dcnode-id=&quot;2187&quot;&gt;&lt;span data-dcnode-id=&quot;2188&quot; instrument_node=&quot;&quot;&gt;101&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2185&quot; instrument_node=&quot;&quot;&gt; The point at which productive capital came to share this view in the 1970s signalled the opening of the neoliberal era, but did not mean that it has become subordinated to financial capital, rather that their interests had converged. The new focus on finance had wider implications than the shifting focus of investment, which tends to be compressed into the term “financialisation”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2182&quot; href=&quot;#139davidson_102&quot; name=&quot;139davidson102&quot;&gt;&lt;sup data-dcnode-id=&quot;2183&quot;&gt;&lt;span data-dcnode-id=&quot;2184&quot; instrument_node=&quot;&quot;&gt;102&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2181&quot; instrument_node=&quot;&quot;&gt; But among all the complexities of arbitrage, derivatives, hedge funds and the rest, the essential point about financialisation is that speculation, like several of the factors discussed here, can increase the profits of individual capitalists at the expense of others, but cannot create new value for the system as a whole. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2179&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2168&quot;&gt;&lt;span data-dcnode-id=&quot;2178&quot; instrument_node=&quot;&quot;&gt;Given that the system was bound to re-enter a period of crisis at some point, it is perhaps unfair to criticise neoliberalism for failing to maintain the rate of profit permanently. It did, however, provide one other major service to the capitalist class and the bourgeoisie more generally, which are outside the terms of Harvey’s definition, although it might be compatible with it if we recast the notion of &lt;/span&gt;&lt;em data-dcnode-id=&quot;2176&quot;&gt;&lt;span data-dcnode-id=&quot;2177&quot; instrument_node=&quot;&quot;&gt;restoring&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2175&quot; instrument_node=&quot;&quot;&gt; power to the ruling class in terms of the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2173&quot;&gt;&lt;span data-dcnode-id=&quot;2174&quot; instrument_node=&quot;&quot;&gt;transfer of wealth and resources&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2172&quot; instrument_node=&quot;&quot;&gt; to the ruling class and its hangers-on. As Sidney Pollard pointed out as early as 1990, of all the advanced economies, Britain had the highest inflation, the highest interest rates and the highest unemployment, combined with falling output, declining national income and the longest hours: “The exception was the one aim which, curiously, the government did not stress in its statements of policy, though it clearly played a large part in its programme; the transfer of income from the poor, and especially the poorest, to the rich, and especially the richest”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2169&quot; href=&quot;#139davidson_103&quot; name=&quot;139davidson103&quot;&gt;&lt;sup data-dcnode-id=&quot;2170&quot;&gt;&lt;span data-dcnode-id=&quot;2171&quot; instrument_node=&quot;&quot;&gt;103&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2167&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2151&quot;&gt;&lt;span data-dcnode-id=&quot;2166&quot; instrument_node=&quot;&quot;&gt;These transfers were a general phenomenon. Duménil and Lévy note two movements in the fortunes of the ruling class: one involving a “relative deterioration” in their holdings at the beginnings of the crisis in the 1970s, and the other “a restoration and more under the neoliberal banner”. The latter is what they describe as a “tour de force accomplished by the dominant classes through neoliberalism, both in the absolute and relative to the other classes of the population”, but it was one which involved diverting declining profits from productive investment.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2163&quot; href=&quot;#139davidson_104&quot; name=&quot;139davidson104&quot;&gt;&lt;sup data-dcnode-id=&quot;2164&quot;&gt;&lt;span data-dcnode-id=&quot;2165&quot; instrument_node=&quot;&quot;&gt;104&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2162&quot; instrument_node=&quot;&quot;&gt; As Saad-Filho writes, in one sense, “the notorious inability of the neoliberal reforms to support high rates of investment or high GDP is really irrelevant…it &lt;/span&gt;&lt;em data-dcnode-id=&quot;2160&quot;&gt;&lt;span data-dcnode-id=&quot;2161&quot; instrument_node=&quot;&quot;&gt;has&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2159&quot; instrument_node=&quot;&quot;&gt; been able to support much higher standards of consumption for the top strata of the population and its promotion of consumer debt”. This, rather than the capacity “to promote growth, reduce inflation or even to increase the portfolio choices of the financial institutions” was the real consequence of neoliberalism.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2156&quot; href=&quot;#139davidson_105&quot; name=&quot;139davidson105&quot;&gt;&lt;sup data-dcnode-id=&quot;2157&quot;&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt;105&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2155&quot; instrument_node=&quot;&quot;&gt; The neoliberal programme benefited individual members of the capitalist class by increasing their personal wealth, at the expense of the living standards of the poor and the working class. In Britain, even after ten years of Thatcherism, the average CEO of one of the FTSE top one hundred companies in 1988 earned “only” 17 times the wage of an average worker; by 2008 it had risen to 75.5 times.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2152&quot; href=&quot;#139davidson_106&quot; name=&quot;139davidson106&quot;&gt;&lt;sup data-dcnode-id=&quot;2153&quot;&gt;&lt;span data-dcnode-id=&quot;2154&quot; instrument_node=&quot;&quot;&gt;106&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2150&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2141&quot;&gt;&lt;span data-dcnode-id=&quot;2149&quot; instrument_node=&quot;&quot;&gt;Neoliberalism had always been an ideology—not disinterested theory, but the articulation of particular class interests. It is unsurprising, therefore, that no significant section of the international ruling class has abandoned its belief in the fundamentals of neoliberal capitalism: they have too much to lose. But neoliberalism is also an ideology in a second sense, not only one which presents the perspective of a particular class as universal, but also one which seeks to explain or justify the discrepancy between theory and reality, between the promise of improved standards of living for all and the delivery of inequalities in which benefits are reserved for the rulers of society. Although the clearest expression of the view that “a fully free, capitalist system has not yet existed anywhere” is to be found in the writings of Ayn Rand and her acolytes, the sentiment is much more widespread.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2146&quot; href=&quot;#139davidson_107&quot; name=&quot;139davidson107&quot;&gt;&lt;sup data-dcnode-id=&quot;2147&quot;&gt;&lt;span data-dcnode-id=&quot;2148&quot; instrument_node=&quot;&quot;&gt;107&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2145&quot; instrument_node=&quot;&quot;&gt; Yet precisely because this vision is unrealisable, neoliberalism can never be satisfied; enemies are never completely overcome, if only because they must be constantly invoked to explain neoliberal failures: “Even after decades of neoliberal reconstruction, it is remarkable how many present-day policy failures are still being tagged to intransigent unions, to invasive regulations, to inept bureaucrats, and to scaremongering advocacy groups”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2142&quot; href=&quot;#139davidson_108&quot; name=&quot;139davidson108&quot;&gt;&lt;sup data-dcnode-id=&quot;2143&quot;&gt;&lt;span data-dcnode-id=&quot;2144&quot; instrument_node=&quot;&quot;&gt;108&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2140&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2128&quot;&gt;&lt;em data-dcnode-id=&quot;2138&quot;&gt;&lt;span data-dcnode-id=&quot;2139&quot; instrument_node=&quot;&quot;&gt;A market state&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2137&quot; instrument_node=&quot;&quot;&gt;? The other area where theory and reality have been at odds is in relation to the role of states.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2134&quot; href=&quot;#139davidson_109&quot; name=&quot;139davidson109&quot;&gt;&lt;sup data-dcnode-id=&quot;2135&quot;&gt;&lt;span data-dcnode-id=&quot;2136&quot; instrument_node=&quot;&quot;&gt;109&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2133&quot; instrument_node=&quot;&quot;&gt; Privatisation notwithstanding, neoliberal capitalism could not dispense with their services—a truth upon which the chief executives of many an ailing financial institution has had occasion to reflect since September 2008. Unlike their neoclassical predecessors, however, neoliberals tended to emphasise anti-state rhetoric, whatever their record in practice. But, as we have seen, the opposition of interventionist state and free market is false. “Neoliberalism rejected the state of the social democratic compromise, not the state in general”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2130&quot; href=&quot;#139davidson_110&quot; name=&quot;139davidson110&quot;&gt;&lt;sup data-dcnode-id=&quot;2131&quot;&gt;&lt;span data-dcnode-id=&quot;2132&quot; instrument_node=&quot;&quot;&gt;110&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2129&quot; instrument_node=&quot;&quot;&gt; Indeed, in some respects states under neoliberalism have accrued even more power to themselves than they did during the Keynesian era. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2127&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2118&quot;&gt;&lt;span data-dcnode-id=&quot;2126&quot; instrument_node=&quot;&quot;&gt;The measures of nationalisation and state control in response to the present crisis are therefore not a return to state interventionism, since it has never ceased. Indeed, even though the neoclassical and neoliberal schools both see an important role for states—enabling market activity on the one hand, disabling collective opposition on the other—their actual role in direct economic terms has gone much further than either theoretical tradition allows. Both the size of states and the level of state expenditure remain substantial and much of this expenditure was directed towards forms of state activity long established during the preceding social democratic era. As far as the economy is concerned, the arms industry saw no diminution of government &lt;/span&gt;&lt;em data-dcnode-id=&quot;2124&quot;&gt;&lt;span data-dcnode-id=&quot;2125&quot; instrument_node=&quot;&quot;&gt;largesse&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2123&quot; instrument_node=&quot;&quot;&gt; in either Britain or the US, and more targeted assistance was made available for companies deemed too important to the economy (“too big”) to fail. Harman points out that “states have intervened more to deal with crises since the 1970s than in the 1960s and 1950s for the simple reason that the crises have been much more severe”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2120&quot; href=&quot;#139davidson_111&quot; name=&quot;139davidson111&quot;&gt;&lt;sup data-dcnode-id=&quot;2121&quot;&gt;&lt;span data-dcnode-id=&quot;2122&quot; instrument_node=&quot;&quot;&gt;111&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2119&quot; instrument_node=&quot;&quot;&gt; What then has changed under neoliberalism? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2117&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2093&quot;&gt;&lt;span data-dcnode-id=&quot;2116&quot; instrument_node=&quot;&quot;&gt;It is not the amount of state expenditure and areas of state intervention that have changed, but where money is spent and how activities are carried out. The process has been one of “reorientation rather than decline”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2113&quot; href=&quot;#139davidson_112&quot; name=&quot;139davidson112&quot;&gt;&lt;sup data-dcnode-id=&quot;2114&quot;&gt;&lt;span data-dcnode-id=&quot;2115&quot; instrument_node=&quot;&quot;&gt;112&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2112&quot; instrument_node=&quot;&quot;&gt; As Costas Lapavistas explains: “What has vanished irretrievably is the notion—characteristic of post-war Keynesianism—that economic intervention should aim at achieving full employment and securing social welfare”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2109&quot; href=&quot;#139davidson_113&quot; name=&quot;139davidson113&quot;&gt;&lt;sup data-dcnode-id=&quot;2110&quot;&gt;&lt;span data-dcnode-id=&quot;2111&quot; instrument_node=&quot;&quot;&gt;113&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2108&quot; instrument_node=&quot;&quot;&gt; John Clarke and Janet Newman have argued that, in effect, this is already happening as the state follows a strategy of “dispersal”: “The state delegates—through a variety of means—its authority to subaltern organisations that are thus empowered to act on its &lt;/span&gt;&lt;em data-dcnode-id=&quot;2106&quot;&gt;&lt;span data-dcnode-id=&quot;2107&quot; instrument_node=&quot;&quot;&gt;behalf&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2105&quot; instrument_node=&quot;&quot;&gt;”.&lt;/span&gt;&lt;a data-dcnode-id=&quot;2102&quot; href=&quot;#139davidson_114&quot; name=&quot;139davidson114&quot;&gt;&lt;sup data-dcnode-id=&quot;2103&quot;&gt;&lt;span data-dcnode-id=&quot;2104&quot; instrument_node=&quot;&quot;&gt;114&lt;/span&gt;&
