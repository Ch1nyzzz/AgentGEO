Though the &lt;/span&gt;&lt;b data-dcnode-id=&quot;8398&quot;&gt;&lt;span data-dcnode-id=&quot;8399&quot; instrument_node=&quot;&quot;&gt;American middle class&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;8397&quot; instrument_node=&quot;&quot;&gt; does not have a definitive definition,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8394&quot; id=&quot;cite_ref-Christian_Science_Monitor_on_What_is_Middle_Class_1-0&quot;&gt;&lt;a data-dcnode-id=&quot;8395&quot; href=&quot;#cite_note-Christian_Science_Monitor_on_What_is_Middle_Class-1&quot;&gt;&lt;span data-dcnode-id=&quot;8396&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8393&quot; instrument_node=&quot;&quot;&gt; contemporary social scientists have put forward several ostensibly congruent theories on it. Depending on the class model used, the middle class constitutes anywhere from 25% to 66% of households.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8357&quot;&gt;&lt;span data-dcnode-id=&quot;8391&quot; instrument_node=&quot;&quot;&gt;One of the first major studies of the middle class in America was &lt;/span&gt;&lt;i data-dcnode-id=&quot;8388&quot;&gt;&lt;a data-dcnode-id=&quot;8389&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/White_Collar%3A_The_American_Middle_Classes&quot; title=&quot;White Collar: The American Middle Classes&quot;&gt;&lt;span data-dcnode-id=&quot;8390&quot; instrument_node=&quot;&quot;&gt;White Collar: The American Middle Classes&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;8387&quot; instrument_node=&quot;&quot;&gt;, published in 1951 by &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;8385&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Sociologist&quot; title=&quot;Sociologist&quot;&gt;&lt;span data-dcnode-id=&quot;8386&quot; instrument_node=&quot;&quot;&gt;sociologist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8384&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;8382&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/C._Wright_Mills&quot; title=&quot;C. Wright Mills&quot;&gt;&lt;span data-dcnode-id=&quot;8383&quot; instrument_node=&quot;&quot;&gt;C.&amp;nbsp;Wright Mills&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8381&quot; instrument_node=&quot;&quot;&gt;. Later sociologists such as &lt;/span&gt;&lt;a data-dcnode-id=&quot;8379&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Dennis_Gilbert_%28sociologist%29&quot; title=&quot;Dennis Gilbert (sociologist)&quot;&gt;&lt;span data-dcnode-id=&quot;8380&quot; instrument_node=&quot;&quot;&gt;Dennis Gilbert&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8378&quot; instrument_node=&quot;&quot;&gt; of &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;8376&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hamilton_College_%28New_York%29&quot; title=&quot;Hamilton College (New York)&quot;&gt;&lt;span data-dcnode-id=&quot;8377&quot; instrument_node=&quot;&quot;&gt;Hamilton College&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8375&quot; instrument_node=&quot;&quot;&gt; commonly divide the middle class into two sub-groups. Constituting roughly 15% to 20% of households is the upper or professional middle class consisting of highly educated, salaried professionals and managers. Constituting roughly one third of households is the &lt;/span&gt;&lt;a data-dcnode-id=&quot;8373&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Lower_middle_class&quot; title=&quot;Lower middle class&quot;&gt;&lt;span data-dcnode-id=&quot;8374&quot; instrument_node=&quot;&quot;&gt;lower middle class&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8372&quot; instrument_node=&quot;&quot;&gt; consisting mostly of semi-professionals, skilled craftsmen and lower-level management.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8369&quot; id=&quot;cite_ref-Society_in_Focus_2-0&quot;&gt;&lt;a data-dcnode-id=&quot;8370&quot; href=&quot;#cite_note-Society_in_Focus-2&quot;&gt;&lt;span data-dcnode-id=&quot;8371&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8366&quot; id=&quot;cite_ref-Marriages,_Families_&amp;amp;_Intimate_Relationships_3-0&quot;&gt;&lt;a data-dcnode-id=&quot;8367&quot; href=&quot;#cite_note-Marriages,_Families_&amp;amp;_Intimate_Relationships-3&quot;&gt;&lt;span data-dcnode-id=&quot;8368&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8365&quot; instrument_node=&quot;&quot;&gt; Middle-class persons commonly have a comfortable standard of living, significant economic security, considerable &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;8363&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Work_autonomy&quot; title=&quot;Work autonomy&quot;&gt;&lt;span data-dcnode-id=&quot;8364&quot; instrument_node=&quot;&quot;&gt;work autonomy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8362&quot; instrument_node=&quot;&quot;&gt; and rely on their expertise to sustain themselves.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8359&quot; id=&quot;cite_ref-The_American_Class_Structure_4-0&quot;&gt;&lt;a data-dcnode-id=&quot;8360&quot; href=&quot;#cite_note-The_American_Class_Structure-4&quot;&gt;&lt;span data-dcnode-id=&quot;8361&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8358&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8335&quot;&gt;&lt;span data-dcnode-id=&quot;8356&quot; instrument_node=&quot;&quot;&gt;Members of the middle class belong to diverse groups which overlap with each other. Overall, middle-class persons, especially upper-middle-class individuals, are characterized by conceptualizing, creating and consulting. Thus, &lt;/span&gt;&lt;a data-dcnode-id=&quot;8354&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Educational_attainment_in_the_United_States&quot; title=&quot;Educational attainment in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;8355&quot; instrument_node=&quot;&quot;&gt;college education&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8353&quot; instrument_node=&quot;&quot;&gt; is one of the main indicators of middle-class status. Largely attributed to the nature of middle-class occupations, middle class values tend to emphasize independence, adherence to intrinsic standards, valuing innovation and respecting &lt;/span&gt;&lt;a data-dcnode-id=&quot;8351&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Dissent&quot; title=&quot;Dissent&quot;&gt;&lt;span data-dcnode-id=&quot;8352&quot; instrument_node=&quot;&quot;&gt;non-conformity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8350&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8347&quot; id=&quot;cite_ref-Society_in_Focus_2-1&quot;&gt;&lt;a data-dcnode-id=&quot;8348&quot; href=&quot;#cite_note-Society_in_Focus-2&quot;&gt;&lt;span data-dcnode-id=&quot;8349&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8344&quot; id=&quot;cite_ref-The_American_Class_Structure_4-1&quot;&gt;&lt;a data-dcnode-id=&quot;8345&quot; href=&quot;#cite_note-The_American_Class_Structure-4&quot;&gt;&lt;span data-dcnode-id=&quot;8346&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8343&quot; instrument_node=&quot;&quot;&gt; The middle class is more &lt;/span&gt;&lt;a data-dcnode-id=&quot;8341&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Political_ideologies_in_the_United_States&quot; title=&quot;Political ideologies in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;8342&quot; instrument_node=&quot;&quot;&gt;politically&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8340&quot; instrument_node=&quot;&quot;&gt; active than other demographics.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8337&quot; id=&quot;cite_ref-Judis,_B._J._(July_11,_2003)._The_trouble_with_Howard_Dean._''Salon.com''._5-0&quot;&gt;&lt;a data-dcnode-id=&quot;8338&quot; href=&quot;#cite_note-Judis,_B._J._(July_11,_2003)._The_trouble_with_Howard_Dean._''Salon.com''.-5&quot;&gt;&lt;span data-dcnode-id=&quot;8339&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8336&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8303&quot;&gt;&lt;a data-dcnode-id=&quot;8333&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Income_in_the_United_States&quot; title=&quot;Income in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;8334&quot; instrument_node=&quot;&quot;&gt;Income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8332&quot; instrument_node=&quot;&quot;&gt; varies considerably, from near the national median to well in excess of US$100,000.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8329&quot; id=&quot;cite_ref-Society_in_Focus_2-2&quot;&gt;&lt;a data-dcnode-id=&quot;8330&quot; href=&quot;#cite_note-Society_in_Focus-2&quot;&gt;&lt;span data-dcnode-id=&quot;8331&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8326&quot; id=&quot;cite_ref-Marriages,_Families_&amp;amp;_Intimate_Relationships_3-1&quot;&gt;&lt;a data-dcnode-id=&quot;8327&quot; href=&quot;#cite_note-Marriages,_Families_&amp;amp;_Intimate_Relationships-3&quot;&gt;&lt;span data-dcnode-id=&quot;8328&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8325&quot; instrument_node=&quot;&quot;&gt; However, &lt;/span&gt;&lt;a data-dcnode-id=&quot;8323&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Household_income_in_the_United_States&quot; title=&quot;Household income in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;8324&quot; instrument_node=&quot;&quot;&gt;household income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8322&quot; instrument_node=&quot;&quot;&gt; figures do not always reflect class status and &lt;/span&gt;&lt;a data-dcnode-id=&quot;8320&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Standard_of_living&quot; title=&quot;Standard of living&quot;&gt;&lt;span data-dcnode-id=&quot;8321&quot; instrument_node=&quot;&quot;&gt;standard of living&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8319&quot; instrument_node=&quot;&quot;&gt; as they are largely influenced by the number of &lt;/span&gt;&lt;a data-dcnode-id=&quot;8317&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Income_earner&quot; title=&quot;Income earner&quot;&gt;&lt;span data-dcnode-id=&quot;8318&quot; instrument_node=&quot;&quot;&gt;income earners&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8316&quot; instrument_node=&quot;&quot;&gt; and fail to recognize household size. It is therefore possible for a large, dual-earner, lower middle class household to out-earn a small, one-earner, upper middle class household.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8313&quot; id=&quot;cite_ref-The_American_Class_Structure_4-2&quot;&gt;&lt;a data-dcnode-id=&quot;8314&quot; href=&quot;#cite_note-The_American_Class_Structure-4&quot;&gt;&lt;span data-dcnode-id=&quot;8315&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8312&quot; instrument_node=&quot;&quot;&gt; The middle classes are very influential as they encompass the majority of voters, writers, teachers, journalists and editors.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8309&quot; id=&quot;cite_ref-test_6-0&quot;&gt;&lt;a data-dcnode-id=&quot;8310&quot; href=&quot;#cite_note-test-6&quot;&gt;&lt;span data-dcnode-id=&quot;8311&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8308&quot; instrument_node=&quot;&quot;&gt; Most societal trends in the U.S. originate within the middle classes.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8305&quot; id=&quot;cite_ref-The_Inner_Life_of_the_Middle_Class_7-0&quot;&gt;&lt;a data-dcnode-id=&quot;8306&quot; href=&quot;#cite_note-The_Inner_Life_of_the_Middle_Class-7&quot;&gt;&lt;span data-dcnode-id=&quot;8307&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8304&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;8302&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;link data-dcnode-id=&quot;8074&quot; href=&quot;mw-data:TemplateStyles:r1033289096&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;div class=&quot;hatnote navigation-not-searchable&quot; data-dcnode-id=&quot;8070&quot; role=&quot;note&quot;&gt;&lt;span data-dcnode-id=&quot;8073&quot; instrument_node=&quot;&quot;&gt;Main article: &lt;/span&gt;&lt;a data-dcnode-id=&quot;8071&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Social_class_in_American_history&quot; title=&quot;Social class in American history&quot;&gt;&lt;span data-dcnode-id=&quot;8072&quot; instrument_node=&quot;&quot;&gt;Social class in American history&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;8069&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;8067&quot;&gt;&lt;span data-dcnode-id=&quot;8068&quot; instrument_node=&quot;&quot;&gt;Scholars have a variety of technical measures of who is  middle-class. By contrast public opinion has a variety of implicit measures. The definitions seem to stretch quite a great deal depending on the political cause that is being invoked or defended, as one commentator noted:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;8066&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote class=&quot;templatequote&quot; data-dcnode-id=&quot;8058&quot;&gt;&lt;p data-dcnode-id=&quot;8059&quot;&gt;&lt;span data-dcnode-id=&quot;8063&quot; instrument_node=&quot;&quot;&gt;Well, it depends on whom you ask. Everyone wants to believe they are middle class. For people on the bottom and the top of the wage scale the phrase connotes a certain Regular Joe cachet. But this eagerness to be part of the group has led the definition to be stretched like a bungee cord - used to defend/attack/describe everything from the Earned Income Tax Credit to the estate tax.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8060&quot; id=&quot;cite_ref-8&quot;&gt;&lt;a data-dcnode-id=&quot;8061&quot; href=&quot;#cite_note-8&quot;&gt;&lt;span data-dcnode-id=&quot;8062&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;8057&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;8047&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;8055&quot; id=&quot;Sub-divisions&quot;&gt;&lt;span data-dcnode-id=&quot;8056&quot; instrument_node=&quot;&quot;&gt;Sub-divisions&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;8048&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;8053&quot;&gt;&lt;span data-dcnode-id=&quot;8054&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;8051&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D2&quot; title=&quot;Edit section: Sub-divisions&quot;&gt;&lt;span data-dcnode-id=&quot;8052&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;8049&quot;&gt;&lt;span data-dcnode-id=&quot;8050&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;8046&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;8038&quot;&gt;&lt;span data-dcnode-id=&quot;8045&quot; instrument_node=&quot;&quot;&gt;The middle class by one definition consists of an &lt;/span&gt;&lt;a data-dcnode-id=&quot;8043&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Upper_middle_class&quot; title=&quot;Upper middle class&quot;&gt;&lt;span data-dcnode-id=&quot;8044&quot; instrument_node=&quot;&quot;&gt;upper middle class&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8042&quot; instrument_node=&quot;&quot;&gt;, made up of professionals distinguished by exceptionally high educational attainment as well as high economic security; and a &lt;/span&gt;&lt;a data-dcnode-id=&quot;8040&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Lower_middle_class&quot; title=&quot;Lower middle class&quot;&gt;&lt;span data-dcnode-id=&quot;8041&quot; instrument_node=&quot;&quot;&gt;lower middle class&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8039&quot; instrument_node=&quot;&quot;&gt;, consisting of semi-professionals. While the groups overlap, differences between those at the center of both groups are considerable.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8026&quot;&gt;&lt;span data-dcnode-id=&quot;8037&quot; instrument_node=&quot;&quot;&gt;The lower middle class has lower educational attainment, considerably less &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;8035&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Workplace_autonomy&quot; title=&quot;Workplace autonomy&quot;&gt;&lt;span data-dcnode-id=&quot;8036&quot; instrument_node=&quot;&quot;&gt;workplace autonomy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;8034&quot; instrument_node=&quot;&quot;&gt;, and lower incomes than the upper middle class. With the emergence of a two-tier labor market, the economic benefits and life chances of upper middle class professionals have grown considerably compared to those of the lower middle class.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8031&quot; id=&quot;cite_ref-Society_in_Focus_2-3&quot;&gt;&lt;a data-dcnode-id=&quot;8032&quot; href=&quot;#cite_note-Society_in_Focus-2&quot;&gt;&lt;span data-dcnode-id=&quot;8033&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8028&quot; id=&quot;cite_ref-The_American_Class_Structure_4-3&quot;&gt;&lt;a data-dcnode-id=&quot;8029&quot; href=&quot;#cite_note-The_American_Class_Structure-4&quot;&gt;&lt;span data-dcnode-id=&quot;8030&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8027&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;8017&quot;&gt;&lt;span data-dcnode-id=&quot;8025&quot; instrument_node=&quot;&quot;&gt;The lower middle class needs two income earners in order to sustain a comfortable standard of living, while many upper middle class households can maintain a similar standard of living with just one income earner.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8022&quot; id=&quot;cite_ref-Middle_income_can't_buy_Middle_class_lifestyle_9-0&quot;&gt;&lt;a data-dcnode-id=&quot;8023&quot; href=&quot;#cite_note-Middle_income_can't_buy_Middle_class_lifestyle-9&quot;&gt;&lt;span data-dcnode-id=&quot;8024&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;8019&quot; id=&quot;cite_ref-Washington_Post_on_the_Middle_class_squeeze_10-0&quot;&gt;&lt;a data-dcnode-id=&quot;8020&quot; href=&quot;#cite_note-Washington_Post_on_the_Middle_class_squeeze-10&quot;&gt;&lt;span data-dcnode-id=&quot;8021&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;8018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;8016&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;8005&quot;&gt;&lt;span data-dcnode-id=&quot;8015&quot; id=&quot;Professional.2Fmanagerial_middle_class&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;8013&quot; id=&quot;Professional/managerial_middle_class&quot;&gt;&lt;span data-dcnode-id=&quot;8014&quot; instrument_node=&quot;&quot;&gt;Professional/managerial middle class&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;8006&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;8011&quot;&gt;&lt;span data-dcnode-id=&quot;8012&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;8009&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D3&quot; title=&quot;Edit section: Professional/managerial middle class&quot;&gt;&lt;span data-dcnode-id=&quot;8010&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;8007&quot;&gt;&lt;span data-dcnode-id=&quot;8008&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;8004&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;link data-dcnode-id=&quot;8003&quot; href=&quot;mw-data:TemplateStyles:r1033289096&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;div class=&quot;hatnote navigation-not-searchable&quot; data-dcnode-id=&quot;7999&quot; role=&quot;note&quot;&gt;&lt;span data-dcnode-id=&quot;8002&quot; instrument_node=&quot;&quot;&gt;Further information: &lt;/span&gt;&lt;a data-dcnode-id=&quot;8000&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Upper_middle_class_in_the_United_States&quot; title=&quot;Upper middle class in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;8001&quot; instrument_node=&quot;&quot;&gt;Upper middle class in the United States&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;7998&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7973&quot;&gt;&lt;span data-dcnode-id=&quot;7997&quot; instrument_node=&quot;&quot;&gt;The &quot;professional class&quot;, also called the &quot;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7995&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Upper_middle_class&quot; title=&quot;Upper middle class&quot;&gt;&lt;span data-dcnode-id=&quot;7996&quot; instrument_node=&quot;&quot;&gt;upper middle class&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7994&quot; instrument_node=&quot;&quot;&gt;,&quot; consists mostly of highly educated &lt;/span&gt;&lt;a data-dcnode-id=&quot;7992&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/White-collar_worker&quot; title=&quot;White-collar worker&quot;&gt;&lt;span data-dcnode-id=&quot;7993&quot; instrument_node=&quot;&quot;&gt;white collar&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7991&quot; instrument_node=&quot;&quot;&gt; salaried professionals, whose work is largely self-directed. In 2005, these household incomes commonly exceed $100,000 per year.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7988&quot; id=&quot;cite_ref-Society_in_Focus_2-4&quot;&gt;&lt;a data-dcnode-id=&quot;7989&quot; href=&quot;#cite_note-Society_in_Focus-2&quot;&gt;&lt;span data-dcnode-id=&quot;7990&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7985&quot; id=&quot;cite_ref-The_American_Class_Structure_4-4&quot;&gt;&lt;a data-dcnode-id=&quot;7986&quot; href=&quot;#cite_note-The_American_Class_Structure-4&quot;&gt;&lt;span data-dcnode-id=&quot;7987&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7982&quot; id=&quot;cite_ref-Occupation_and_Class_Consciousness_in_America_11-0&quot;&gt;&lt;a data-dcnode-id=&quot;7983&quot; href=&quot;#cite_note-Occupation_and_Class_Consciousness_in_America-11&quot;&gt;&lt;span data-dcnode-id=&quot;7984&quot; instrument_node=&quot;&quot;&gt;[11]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7981&quot; instrument_node=&quot;&quot;&gt; Class members typically hold graduate degrees, with educational attainment serving as the main distinguishing feature of this class.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7978&quot; id=&quot;cite_ref-Society_in_Focus_2-5&quot;&gt;&lt;a data-dcnode-id=&quot;7979&quot; href=&quot;#cite_note-Society_in_Focus-2&quot;&gt;&lt;span data-dcnode-id=&quot;7980&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7975&quot; id=&quot;cite_ref-US_Census_Bureau,_personal_income_by_education_12-0&quot;&gt;&lt;a data-dcnode-id=&quot;7976&quot; href=&quot;#cite_note-US_Census_Bureau,_personal_income_by_education-12&quot;&gt;&lt;span data-dcnode-id=&quot;7977&quot; instrument_node=&quot;&quot;&gt;[12]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7974&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7957&quot;&gt;&lt;span data-dcnode-id=&quot;7972&quot; instrument_node=&quot;&quot;&gt;These professionals typically conceptualize, create, consult, and supervise. As a result, upper middle class employees enjoy great autonomy in the work place and are more satisfied with their careers than non-professional middle class individuals. In terms of financial wealth income, the professional middle class fits in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7970&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Household_income_in_the_United_States&quot; title=&quot;Household income in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;7971&quot; instrument_node=&quot;&quot;&gt;top third&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7969&quot; instrument_node=&quot;&quot;&gt;, but seldom reach the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7967&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Income_quintiles&quot; title=&quot;Income quintiles&quot;&gt;&lt;span data-dcnode-id=&quot;7968&quot; instrument_node=&quot;&quot;&gt;top 5%&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7966&quot; instrument_node=&quot;&quot;&gt; of American society.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7963&quot; id=&quot;cite_ref-US_Census_2005_Economic_Survey,_income_data_13-0&quot;&gt;&lt;a data-dcnode-id=&quot;7964&quot; href=&quot;#cite_note-US_Census_2005_Economic_Survey,_income_data-13&quot;&gt;&lt;span data-dcnode-id=&quot;7965&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7962&quot; instrument_node=&quot;&quot;&gt; According to sociologists such as Dennis Gilbert, James M. Henslin, Joseph Hickey, and William Thompson, the upper middle class constitutes 15% of the population.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7959&quot; id=&quot;cite_ref-Society_in_Focus_2-6&quot;&gt;&lt;a data-dcnode-id=&quot;7960&quot; href=&quot;#cite_note-Society_in_Focus-2&quot;&gt;&lt;span data-dcnode-id=&quot;7961&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7958&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;link data-dcnode-id=&quot;7955&quot; href=&quot;mw-data:TemplateStyles:r996844942&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;blockquote class=&quot;templatequote&quot; data-dcnode-id=&quot;7942&quot;&gt;&lt;p data-dcnode-id=&quot;7953&quot;&gt;&lt;span data-dcnode-id=&quot;7954&quot; instrument_node=&quot;&quot;&gt;The upper middle class has grown... and its composition has changed. Increasingly salaried managers and professionals have replaced individual business owners and independent professionals. The key to the success of the upper-middle-class is the growing importance of educational certification... its lifestyles and opinions are becoming increasingly normative for the whole society. It is in fact a porous class, open to people... who earn the right credentials.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;templatequotecite&quot; data-dcnode-id=&quot;7943&quot;&gt;&lt;span data-dcnode-id=&quot;7952&quot; instrument_node=&quot;&quot;&gt;— &lt;/span&gt;&lt;cite data-dcnode-id=&quot;7944&quot;&gt;&lt;span data-dcnode-id=&quot;7951&quot; instrument_node=&quot;&quot;&gt;Dennis Gilbert, &lt;/span&gt;&lt;i data-dcnode-id=&quot;7949&quot;&gt;&lt;span data-dcnode-id=&quot;7950&quot; instrument_node=&quot;&quot;&gt;The American Class Structure&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;7948&quot; instrument_node=&quot;&quot;&gt;, 1998.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7945&quot; id=&quot;cite_ref-American_Class_Structure_in_an_Age_of_Growing_Inequality_14-0&quot;&gt;&lt;a data-dcnode-id=&quot;7946&quot; href=&quot;#cite_note-American_Class_Structure_in_an_Age_of_Growing_Inequality-14&quot;&gt;&lt;span data-dcnode-id=&quot;7947&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/cite&gt;&lt;/div&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;7941&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7928&quot;&gt;&lt;span data-dcnode-id=&quot;7940&quot; instrument_node=&quot;&quot;&gt;Values and mannerisms are difficult to pinpoint for a group encompassing millions of persons. Naturally, any large group of people will feature social diversity to some extent. However, some generalizations can be made using education and income as class defining criteria. William Thompson and Joseph Hickey noted that upper middle class individuals have a more direct and confident manner of speech.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7937&quot; id=&quot;cite_ref-Society_in_Focus_2-7&quot;&gt;&lt;a data-dcnode-id=&quot;7938&quot; href=&quot;#cite_note-Society_in_Focus-2&quot;&gt;&lt;span data-dcnode-id=&quot;7939&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7936&quot; instrument_node=&quot;&quot;&gt; In her 1989 publication &lt;/span&gt;&lt;i data-dcnode-id=&quot;7934&quot;&gt;&lt;span data-dcnode-id=&quot;7935&quot; instrument_node=&quot;&quot;&gt;Effects of Social Class and Interactive Setting on Maternal Speech&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;7933&quot; instrument_node=&quot;&quot;&gt;, Erica Hoff-Ginsberg found that among her surveyed subjects, &quot;upper-middle class mothers talked more per unit of time and sustained longer interactions with children&quot;. She also found that the speech of upper middle-class mothers differs &quot;in its functional, discourse, and lexico-syntactic properties&quot;, from those in the working class.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7930&quot; id=&quot;cite_ref-Education_resource_information_center,_Effects_of_Social_Class_and_Interactive_Setting_on_Maternal_Speech_15-0&quot;&gt;&lt;a data-dcnode-id=&quot;7931&quot; href=&quot;#cite_note-Education_resource_information_center,_Effects_of_Social_Class_and_Interactive_Setting_on_Maternal_Speech-15&quot;&gt;&lt;span data-dcnode-id=&quot;7932&quot; instrument_node=&quot;&quot;&gt;[15]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7899&quot;&gt;&lt;span data-dcnode-id=&quot;7927&quot; instrument_node=&quot;&quot;&gt;Upper middle-class manners tend to require individuals to engage in conversational discourse with rather distant associates and to abstain from sharing excessive personal information. This contradicts working-class speech patterns, which often include frequent mentions of one's personal life.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7924&quot; id=&quot;cite_ref-What's_Class_Got_To_Do_With_It,_American_Society_in_the_Twenty-First_Century_16-0&quot;&gt;&lt;a data-dcnode-id=&quot;7925&quot; href=&quot;#cite_note-What's_Class_Got_To_Do_With_It,_American_Society_in_the_Twenty-First_Century-16&quot;&gt;&lt;span data-dcnode-id=&quot;7926&quot; instrument_node=&quot;&quot;&gt;[16]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7923&quot; instrument_node=&quot;&quot;&gt; Further research also suggests that working-class parents emphasize conformity, traditional &lt;/span&gt;&lt;a data-dcnode-id=&quot;7921&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Gender_role&quot; title=&quot;Gender role&quot;&gt;&lt;span data-dcnode-id=&quot;7922&quot; instrument_node=&quot;&quot;&gt;gender roles&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7920&quot; instrument_node=&quot;&quot;&gt;, and the adherence to external standards in their children, such as being neat and clean and &quot;[believing] in strict leadership&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7917&quot; id=&quot;cite_ref-17&quot;&gt;&lt;a data-dcnode-id=&quot;7918&quot; href=&quot;#cite_note-17&quot;&gt;&lt;span data-dcnode-id=&quot;7919&quot; instrument_node=&quot;&quot;&gt;[17]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7916&quot; instrument_node=&quot;&quot;&gt; This contrasted with professional-class households, where gender roles were more egalitarian and loosely defined. Upper middle class children were largely taught to adhere to internal standards, with &lt;/span&gt;&lt;a data-dcnode-id=&quot;7914&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Curiosity&quot; title=&quot;Curiosity&quot;&gt;&lt;span data-dcnode-id=&quot;7915&quot; instrument_node=&quot;&quot;&gt;curiosity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7913&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7911&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Individuality&quot; title=&quot;Individuality&quot;&gt;&lt;span data-dcnode-id=&quot;7912&quot; instrument_node=&quot;&quot;&gt;individuality&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7910&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7908&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Self-direction&quot; title=&quot;Self-direction&quot;&gt;&lt;span data-dcnode-id=&quot;7909&quot; instrument_node=&quot;&quot;&gt;self-direction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7907&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;7905&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Open-mindedness&quot; title=&quot;Open-mindedness&quot;&gt;&lt;span data-dcnode-id=&quot;7906&quot; instrument_node=&quot;&quot;&gt;openness to new ideas&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7904&quot; instrument_node=&quot;&quot;&gt; being emphasized.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7901&quot; id=&quot;cite_ref-American_Class_Structure_in_an_Age_of_Growing_Inequality_14-1&quot;&gt;&lt;a data-dcnode-id=&quot;7902&quot; href=&quot;#cite_note-American_Class_Structure_in_an_Age_of_Growing_Inequality-14&quot;&gt;&lt;span data-dcnode-id=&quot;7903&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7900&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7883&quot;&gt;&lt;span data-dcnode-id=&quot;7898&quot; instrument_node=&quot;&quot;&gt;While a recent Gallup survey showed &lt;/span&gt;&lt;a data-dcnode-id=&quot;7896&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Mass_affluent&quot; title=&quot;Mass affluent&quot;&gt;&lt;span data-dcnode-id=&quot;7897&quot; instrument_node=&quot;&quot;&gt;mass affluent&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7895&quot; instrument_node=&quot;&quot;&gt; households to be conservative on economic issues while liberal on social issues, the upper middle class seems to be relatively politically polarized. In the 2006 mid-term elections both Democrats and Republicans received over 40% of the vote from those with advanced degrees and those in households with six figure incomes. While households with incomes exceeding $100,000 tend to favor Republicans slightly, they are also the only income demographic where &lt;/span&gt;&lt;a data-dcnode-id=&quot;7893&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Ralph_Nader&quot; title=&quot;Ralph Nader&quot;&gt;&lt;span data-dcnode-id=&quot;7894&quot; instrument_node=&quot;&quot;&gt;Ralph Nader&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7892&quot; instrument_node=&quot;&quot;&gt; won more than 1% of the vote. Among those with graduate degrees, a smaller group than those with six figure incomes, the majority tends to vote Democratic&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7889&quot; id=&quot;cite_ref-CNN_exit_poll,_2006_18-0&quot;&gt;&lt;a data-dcnode-id=&quot;7890&quot; href=&quot;#cite_note-CNN_exit_poll,_2006-18&quot;&gt;&lt;span data-dcnode-id=&quot;7891&quot; instrument_node=&quot;&quot;&gt;[18]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7888&quot; instrument_node=&quot;&quot;&gt; with roughly 1% having voted for Nader in 2004.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7885&quot; id=&quot;cite_ref-CNN_exit_poll,_2004_19-0&quot;&gt;&lt;a data-dcnode-id=&quot;7886&quot; href=&quot;#cite_note-CNN_exit_poll,_2004-19&quot;&gt;&lt;span data-dcnode-id=&quot;7887&quot; instrument_node=&quot;&quot;&gt;[19]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7884&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7882&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;7872&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7880&quot; id=&quot;Lower_middle_class&quot;&gt;&lt;span data-dcnode-id=&quot;7881&quot; instrument_node=&quot;&quot;&gt;Lower middle class&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7873&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7878&quot;&gt;&lt;span data-dcnode-id=&quot;7879&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7876&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D4&quot; title=&quot;Edit section: Lower middle class&quot;&gt;&lt;span data-dcnode-id=&quot;7877&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7874&quot;&gt;&lt;span data-dcnode-id=&quot;7875&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;7871&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7861&quot;&gt;&lt;span data-dcnode-id=&quot;7870&quot; instrument_node=&quot;&quot;&gt;The lower middle class is the 2nd most populous according to both Gilbert's as well as Thompson &amp;amp; Hickey's models, constituting roughly one third of the population, the same percentage as the working class. However, according to Henslin, who also divides the middle class into two sub-groups, the lower middle class is the most populous, constituting 34% of the population.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7867&quot; id=&quot;cite_ref-Marriages,_Families_&amp;amp;_Intimate_Relationships_3-2&quot;&gt;&lt;a data-dcnode-id=&quot;7868&quot; href=&quot;#cite_note-Marriages,_Families_&amp;amp;_Intimate_Relationships-3&quot;&gt;&lt;span data-dcnode-id=&quot;7869&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7866&quot; instrument_node=&quot;&quot;&gt; In all three class models the lower middle class is said to consist of &quot;semi-professionals&quot; and lower level white collar employees. An adaptation by sociologists Brian K. William, Stacy C. Sawyer, and Carl M. Wahlstrom of Dennis Gilbert's class model gave the following description of the lower middle class:&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7863&quot; id=&quot;cite_ref-Marriages,_Families_&amp;amp;_Intimate_Relationships_3-3&quot;&gt;&lt;a data-dcnode-id=&quot;7864&quot; href=&quot;#cite_note-Marriages,_Families_&amp;amp;_Intimate_Relationships-3&quot;&gt;&lt;span data-dcnode-id=&quot;7865&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7860&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;link data-dcnode-id=&quot;7859&quot; href=&quot;mw-data:TemplateStyles:r996844942&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;blockquote class=&quot;templatequote&quot; data-dcnode-id=&quot;7846&quot;&gt;&lt;p data-dcnode-id=&quot;7857&quot;&gt;&lt;span data-dcnode-id=&quot;7858&quot; instrument_node=&quot;&quot;&gt;The lower middle class... these are people in technical and lower-level management positions who work for those in the upper middle class as lower managers, craftspeople, and the like. They enjoy a reasonably comfortable standard of living, although it is constantly threatened by taxes and inflation. Generally, they have a Bachelor's and sometimes Master's college degree.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;templatequotecite&quot; data-dcnode-id=&quot;7847&quot;&gt;&lt;span data-dcnode-id=&quot;7856&quot; instrument_node=&quot;&quot;&gt;— &lt;/span&gt;&lt;cite data-dcnode-id=&quot;7848&quot;&gt;&lt;span data-dcnode-id=&quot;7855&quot; instrument_node=&quot;&quot;&gt;Brian K. William, Stacy C. Sawyer and Carl M. Wahlstrom, &lt;/span&gt;&lt;i data-dcnode-id=&quot;7853&quot;&gt;&lt;span data-dcnode-id=&quot;7854&quot; instrument_node=&quot;&quot;&gt;Marriages, Families &amp;amp; Intimate Relationships&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;7852&quot; instrument_node=&quot;&quot;&gt;, 2006 (Adapted from Dennis Gilbert 1997; and Joseph Kahl 1993)&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7849&quot; id=&quot;cite_ref-Marriages,_Families_&amp;amp;_Intimate_Relationships_3-4&quot;&gt;&lt;a data-dcnode-id=&quot;7850&quot; href=&quot;#cite_note-Marriages,_Families_&amp;amp;_Intimate_Relationships-3&quot;&gt;&lt;span data-dcnode-id=&quot;7851&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/cite&gt;&lt;/div&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;7845&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7830&quot;&gt;&lt;span data-dcnode-id=&quot;7844&quot; instrument_node=&quot;&quot;&gt;Taking into account the percentages provided in the six-class model by Gilbert, as well as the model of Thompson and Hickey, one can apply &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7842&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/U.S._Census_Bureau&quot; title=&quot;U.S. Census Bureau&quot;&gt;&lt;span data-dcnode-id=&quot;7843&quot; instrument_node=&quot;&quot;&gt;U.S.&amp;nbsp;Census Bureau&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7841&quot; instrument_node=&quot;&quot;&gt; statistics regarding &lt;/span&gt;&lt;a data-dcnode-id=&quot;7839&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Income_in_the_United_States&quot; title=&quot;Income in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;7840&quot; instrument_node=&quot;&quot;&gt;income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7838&quot; instrument_node=&quot;&quot;&gt;. According to these class models the lower middle class is located roughly between the 52nd and 84th percentile of society. In terms of personal income distribution in 2005, that would mean &lt;/span&gt;&lt;a data-dcnode-id=&quot;7836&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Personal_income_in_the_United_States&quot; title=&quot;Personal income in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;7837&quot; instrument_node=&quot;&quot;&gt;gross annual personal incomes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7835&quot; instrument_node=&quot;&quot;&gt; from about $32,500 to $60,000.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7832&quot; id=&quot;cite_ref-US_Census_Bureau,_distribution_of_personal_income,_2006_20-0&quot;&gt;&lt;a data-dcnode-id=&quot;7833&quot; href=&quot;#cite_note-US_Census_Bureau,_distribution_of_personal_income,_2006-20&quot;&gt;&lt;span data-dcnode-id=&quot;7834&quot; instrument_node=&quot;&quot;&gt;[20]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7831&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7812&quot;&gt;&lt;span data-dcnode-id=&quot;7829&quot; instrument_node=&quot;&quot;&gt;As 42% of all households, and the majority of those in the top 40%, had two &lt;/span&gt;&lt;a data-dcnode-id=&quot;7827&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Income_earner&quot; title=&quot;Income earner&quot;&gt;&lt;span data-dcnode-id=&quot;7828&quot; instrument_node=&quot;&quot;&gt;income earners&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7826&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;7824&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Household_income_in_the_United_States&quot; title=&quot;Household income in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;7825&quot; instrument_node=&quot;&quot;&gt;household income figures&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7823&quot; instrument_node=&quot;&quot;&gt; would be significantly higher, ranging from roughly $50,000 to $100,000 in 2005.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7820&quot; id=&quot;cite_ref-US_Census_2005_Economic_Survey,_income_data_13-1&quot;&gt;&lt;a data-dcnode-id=&quot;7821&quot; href=&quot;#cite_note-US_Census_2005_Economic_Survey,_income_data-13&quot;&gt;&lt;span data-dcnode-id=&quot;7822&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7819&quot; instrument_node=&quot;&quot;&gt; In terms of &lt;/span&gt;&lt;a data-dcnode-id=&quot;7817&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Educational_attainment_in_the_United_States&quot; title=&quot;Educational attainment in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;7818&quot; instrument_node=&quot;&quot;&gt;educational attainment&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7816&quot; instrument_node=&quot;&quot;&gt;, 27% of persons had a &lt;/span&gt;&lt;a data-dcnode-id=&quot;7814&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Bachelor%2527s_degree_or_higher&quot; title=&quot;Bachelor's degree or higher&quot;&gt;&lt;span data-dcnode-id=&quot;7815&quot; instrument_node=&quot;&quot;&gt;Bachelor's degree or higher&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7813&quot; instrument_node=&quot;&quot;&gt;.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7811&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;7801&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7809&quot; id=&quot;Working_class_majority&quot;&gt;&lt;span data-dcnode-id=&quot;7810&quot; instrument_node=&quot;&quot;&gt;Working class majority&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7802&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7807&quot;&gt;&lt;span data-dcnode-id=&quot;7808&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7805&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D5&quot; title=&quot;Edit section: Working class majority&quot;&gt;&lt;span data-dcnode-id=&quot;7806&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7803&quot;&gt;&lt;span data-dcnode-id=&quot;7804&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;7800&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7791&quot;&gt;&lt;span data-dcnode-id=&quot;7799&quot; instrument_node=&quot;&quot;&gt;Seen from a sociological perspective based on class-cleavages, the majority of Americans can be described as members of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7797&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Working_class&quot; title=&quot;Working class&quot;&gt;&lt;span data-dcnode-id=&quot;7798&quot; instrument_node=&quot;&quot;&gt;working class&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7796&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7793&quot; id=&quot;cite_ref-The_American_Perception_of_Class_21-0&quot;&gt;&lt;a data-dcnode-id=&quot;7794&quot; href=&quot;#cite_note-The_American_Perception_of_Class-21&quot;&gt;&lt;span data-dcnode-id=&quot;7795&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7785&quot;&gt;&lt;span data-dcnode-id=&quot;7790&quot; instrument_node=&quot;&quot;&gt;The use of the term &quot;working class&quot; is applicable if the position of individuals, households and families in relation to the production of goods and services is the main determinant of social class. Class distinctions are seen in the distribution of individuals within society whose influence and importance differ. The nature of a person's work and the associated degrees of influence, responsibility, and complexity determine a person's social class. The higher the degree of influence and responsibility a person has or the more complex the work, the higher his or her status in society.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7787&quot; id=&quot;cite_ref-Social_Class_and_Stratification_22-0&quot;&gt;&lt;a data-dcnode-id=&quot;7788&quot; href=&quot;#cite_note-Social_Class_and_Stratification-22&quot;&gt;&lt;span data-dcnode-id=&quot;7789&quot; instrument_node=&quot;&quot;&gt;[22]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7786&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7769&quot;&gt;&lt;span data-dcnode-id=&quot;7784&quot; instrument_node=&quot;&quot;&gt;As qualified personnel become scarce for relatively important, responsible, and complex occupations &lt;/span&gt;&lt;a data-dcnode-id=&quot;7782&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Household_income_in_the_United_States&quot; title=&quot;Household income in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;7783&quot; instrument_node=&quot;&quot;&gt;income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7781&quot; instrument_node=&quot;&quot;&gt; increases, following the economic theory of scarcity resulting in value. According to this approach, occupation becomes more essential in determining class than income.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7778&quot; id=&quot;cite_ref-Social_Class_and_Stratification_22-1&quot;&gt;&lt;a data-dcnode-id=&quot;7779&quot; href=&quot;#cite_note-Social_Class_and_Stratification-22&quot;&gt;&lt;span data-dcnode-id=&quot;7780&quot; instrument_node=&quot;&quot;&gt;[22]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7777&quot; instrument_node=&quot;&quot;&gt; Whereas professionals tend to create, conceptualize, consult and instruct, most Americans do not enjoy a high degree of independence in their work, as they merely follow set instructions.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7774&quot; id=&quot;cite_ref-The_Inner_Life_of_the_Middle_Class_7-1&quot;&gt;&lt;a data-dcnode-id=&quot;7775&quot; href=&quot;#cite_note-The_Inner_Life_of_the_Middle_Class-7&quot;&gt;&lt;span data-dcnode-id=&quot;7776&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7771&quot; id=&quot;cite_ref-The_American_Perception_of_Class_21-1&quot;&gt;&lt;a data-dcnode-id=&quot;7772&quot; href=&quot;#cite_note-The_American_Perception_of_Class-21&quot;&gt;&lt;span data-dcnode-id=&quot;7773&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7770&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7760&quot;&gt;&lt;span data-dcnode-id=&quot;7768&quot; instrument_node=&quot;&quot;&gt;Definitions of the working class are confusing. Defined in terms of income, they may be split into middle-middle or statistical middle class in order to speak to issues of class structure. Class models such as Dennis Gilbert or Thompson and Hickey estimate that roughly 53% of Americans are members of the working or lower classes.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7765&quot; id=&quot;cite_ref-Society_in_Focus_2-8&quot;&gt;&lt;a data-dcnode-id=&quot;7766&quot; href=&quot;#cite_note-Society_in_Focus-2&quot;&gt;&lt;span data-dcnode-id=&quot;7767&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7762&quot; id=&quot;cite_ref-American_Class_Structure_in_an_Age_of_Growing_Inequality_14-2&quot;&gt;&lt;a data-dcnode-id=&quot;7763&quot; href=&quot;#cite_note-American_Class_Structure_in_an_Age_of_Growing_Inequality-14&quot;&gt;&lt;span data-dcnode-id=&quot;7764&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7761&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7741&quot;&gt;&lt;span data-dcnode-id=&quot;7759&quot; instrument_node=&quot;&quot;&gt;Factors such as nature of work and lack of influence within their jobs leads some theorists to the conclusion that most Americans are working class. They have data that shows the majority of workers are not paid to share their ideas. These workers are closely supervised and do not enjoy independence in their jobs. Also, they are not paid to think. For example: The median annual earnings of salaried dentists were $136,960 in May 2006, indicating a high degree of scarcity for qualified personnel. The opinions and thoughts of dentists, much like those of other professionals, are sought after by their organizations and clients. The dentist creates a diagnosis, consults the patient, and conceptualizes a treatment.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7756&quot; id=&quot;cite_ref-Income_and_nature_of_work_of_dentists_23-0&quot;&gt;&lt;a data-dcnode-id=&quot;7757&quot; href=&quot;#cite_note-Income_and_nature_of_work_of_dentists-23&quot;&gt;&lt;span data-dcnode-id=&quot;7758&quot; instrument_node=&quot;&quot;&gt;[23]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7755&quot; instrument_node=&quot;&quot;&gt; In 2009, &lt;/span&gt;&lt;a data-dcnode-id=&quot;7753&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Dental_assistant&quot; title=&quot;Dental assistant&quot;&gt;&lt;span data-dcnode-id=&quot;7754&quot; instrument_node=&quot;&quot;&gt;Dental assistants&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7752&quot; instrument_node=&quot;&quot;&gt; made roughly $14.40 an hour, about $32,000 annually. Unlike dentists, dental assistants do not have much influence over the treatment of patients.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7749&quot; id=&quot;cite_ref-Income_and_nature_of_work_of_dental_assistants_24-0&quot;&gt;&lt;a data-dcnode-id=&quot;7750&quot; href=&quot;#cite_note-Income_and_nature_of_work_of_dental_assistants-24&quot;&gt;&lt;span data-dcnode-id=&quot;7751&quot; instrument_node=&quot;&quot;&gt;[24]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7748&quot; instrument_node=&quot;&quot;&gt; They carry out routine procedures and follow the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7746&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Dentist&quot; title=&quot;Dentist&quot;&gt;&lt;span data-dcnode-id=&quot;7747&quot; instrument_node=&quot;&quot;&gt;dentists'&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7745&quot; instrument_node=&quot;&quot;&gt; instructions. Here we see that a &lt;/span&gt;&lt;a data-dcnode-id=&quot;7743&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Dental_assistant&quot; title=&quot;Dental assistant&quot;&gt;&lt;span data-dcnode-id=&quot;7744&quot; instrument_node=&quot;&quot;&gt;dental assistant&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7742&quot; instrument_node=&quot;&quot;&gt; being classified as working class. Similar relationships can be observed in other occupations.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;7730&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7738&quot; id=&quot;Weberian_definition&quot;&gt;&lt;span data-dcnode-id=&quot;7739&quot; instrument_node=&quot;&quot;&gt;Weberian definition&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7731&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7736&quot;&gt;&lt;span data-dcnode-id=&quot;7737&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7734&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D6&quot; title=&quot;Edit section: Weberian definition&quot;&gt;&lt;span data-dcnode-id=&quot;7735&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7732&quot;&gt;&lt;span data-dcnode-id=&quot;7733&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;7729&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7705&quot;&gt;&lt;span data-dcnode-id=&quot;7728&quot; instrument_node=&quot;&quot;&gt;Some modern theories of &lt;/span&gt;&lt;a data-dcnode-id=&quot;7726&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Political_economy&quot; title=&quot;Political economy&quot;&gt;&lt;span data-dcnode-id=&quot;7727&quot; instrument_node=&quot;&quot;&gt;political economy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7725&quot; instrument_node=&quot;&quot;&gt; consider a large middle class to be a beneficial and stabilizing influence on society because it has neither the possibly explosive revolutionary tendencies of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7723&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Working_class&quot; title=&quot;Working class&quot;&gt;&lt;span data-dcnode-id=&quot;7724&quot; instrument_node=&quot;&quot;&gt;lower class&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7722&quot; instrument_node=&quot;&quot;&gt;, nor the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7720&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Political_absolutism&quot; title=&quot;Political absolutism&quot;&gt;&lt;span data-dcnode-id=&quot;7721&quot; instrument_node=&quot;&quot;&gt;absolutist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7719&quot; instrument_node=&quot;&quot;&gt; tendencies of an entrenched &lt;/span&gt;&lt;a data-dcnode-id=&quot;7717&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Upper_class&quot; title=&quot;Upper class&quot;&gt;&lt;span data-dcnode-id=&quot;7718&quot; instrument_node=&quot;&quot;&gt;upper class&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7716&quot; instrument_node=&quot;&quot;&gt;. Most &lt;/span&gt;&lt;a data-dcnode-id=&quot;7714&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Sociology&quot; title=&quot;Sociology&quot;&gt;&lt;span data-dcnode-id=&quot;7715&quot; instrument_node=&quot;&quot;&gt;sociological&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7713&quot; instrument_node=&quot;&quot;&gt; definitions of middle class follow &lt;/span&gt;&lt;a data-dcnode-id=&quot;7711&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Max_Weber&quot; title=&quot;Max Weber&quot;&gt;&lt;span data-dcnode-id=&quot;7712&quot; instrument_node=&quot;&quot;&gt;Max Weber&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7710&quot; instrument_node=&quot;&quot;&gt;. Here, the middle class is defined as consisting of professionals or business owners who share a culture of domesticity and sub-urbanity and a level of relative security against social crisis in the form of socially desired skill or wealth. Thus, the theory on the middle class by Weber can be cited as one that supports the notion of the middle class being composed of a quasi-elite of professionals and managers, who are largely immune to economic downturns and trends such as out-sourcing which affect the statistical middle class.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7707&quot; id=&quot;cite_ref-Washington_Post_on_the_Middle_class_squeeze_10-1&quot;&gt;&lt;a data-dcnode-id=&quot;7708&quot; href=&quot;#cite_note-Washington_Post_on_the_Middle_class_squeeze-10&quot;&gt;&lt;span data-dcnode-id=&quot;7709&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7706&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7704&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;7675&quot;&gt;&lt;span data-dcnode-id=&quot;7683&quot; instrument_node=&quot;&quot;&gt;Sociologists   contend that middle class persons usually have above &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7681&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Median_household_income&quot; title=&quot;Median household income&quot;&gt;&lt;span data-dcnode-id=&quot;7682&quot; instrument_node=&quot;&quot;&gt;median&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7680&quot; instrument_node=&quot;&quot;&gt; incomes. As social classes lack clear boundaries and overlap there are no definite income thresholds as for what is considered middle class. In 2004, sociologist Leonard Beeghley identifies a male making $57,000 and a female making $40,000 with a combined households income of $97,000 as a typical American middle-class family.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7677&quot; id=&quot;cite_ref-The_Structure_of_Social_Stratification_in_the_United_States_25-0&quot;&gt;&lt;a data-dcnode-id=&quot;7678&quot; href=&quot;#cite_note-The_Structure_of_Social_Stratification_in_the_United_States-25&quot;&gt;&lt;span data-dcnode-id=&quot;7679&quot; instrument_node=&quot;&quot;&gt;[25]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7676&quot; instrument_node=&quot;&quot;&gt; In 2005, sociologists William Thompson and Joseph Hickey estimate an income range of roughly $35,000 to $75,000 for the lower middle class and $100,000 or more for the upper middle class.
