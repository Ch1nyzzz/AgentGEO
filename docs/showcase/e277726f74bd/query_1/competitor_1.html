&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;7105&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;7106&quot; style=&quot;width:302px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;7112&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ADistribution_of_two_plus_income_households.svg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;7113&quot; data-file-height=&quot;709&quot; data-file-width=&quot;886&quot; decoding=&quot;async&quot; height=&quot;240&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Distribution_of_two_plus_income_households.svg/300px-Distribution_of_two_plus_income_households.svg.png&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Distribution_of_two_plus_income_households.svg/450px-Distribution_of_two_plus_income_households.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Distribution_of_two_plus_income_households.svg/600px-Distribution_of_two_plus_income_households.svg.png 2x&quot; width=&quot;300&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7111&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;7107&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;7109&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;7110&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ADistribution_of_two_plus_income_households.svg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;7108&quot; instrument_node=&quot;&quot;&gt;Percentage distribution of 2+ income households among the quintiles&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;7104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7085&quot;&gt;&lt;a data-dcnode-id=&quot;7102&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Household_income_in_the_United_States&quot; title=&quot;Household income in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;7103&quot; instrument_node=&quot;&quot;&gt;Household income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7101&quot; instrument_node=&quot;&quot;&gt; is one of a household's attributes most commonly used to determine its class status but income may not always accurately reflect a household's position within society or the economy.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7098&quot; id=&quot;cite_ref-Social_Class_and_Stratification_22-2&quot;&gt;&lt;a data-dcnode-id=&quot;7099&quot; href=&quot;#cite_note-Social_Class_and_Stratification-22&quot;&gt;&lt;span data-dcnode-id=&quot;7100&quot; instrument_node=&quot;&quot;&gt;[22]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7097&quot; instrument_node=&quot;&quot;&gt; Unlike personal income, household income does not reflect occupational achievement as much as it measures the number of income earners. Sociologist Dennis Gilbert acknowledges that a &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7095&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/American_working_class&quot; title=&quot;American working class&quot;&gt;&lt;span data-dcnode-id=&quot;7096&quot; instrument_node=&quot;&quot;&gt;working-class&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7094&quot; instrument_node=&quot;&quot;&gt; household with two income earners may out-earn a single-income upper-middle-class household. For example, according to the US Department of Labor, two registered nurses could quite easily command a household income of $126,000 in 2006,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7091&quot; id=&quot;cite_ref-US_Department_of_Labor,_Median_income_of_registered_nurses_28-0&quot;&gt;&lt;a data-dcnode-id=&quot;7092&quot; href=&quot;#cite_note-US_Department_of_Labor,_Median_income_of_registered_nurses-28&quot;&gt;&lt;span data-dcnode-id=&quot;7093&quot; instrument_node=&quot;&quot;&gt;[28]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7090&quot; instrument_node=&quot;&quot;&gt; while the median income for a lawyer was $94,930.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7087&quot; id=&quot;cite_ref-US_Department_of_Labor,_Median_income_of_lawyers_29-0&quot;&gt;&lt;a data-dcnode-id=&quot;7088&quot; href=&quot;#cite_note-US_Department_of_Labor,_Median_income_of_lawyers-29&quot;&gt;&lt;span data-dcnode-id=&quot;7089&quot; instrument_node=&quot;&quot;&gt;[29]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7086&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7079&quot;&gt;&lt;span data-dcnode-id=&quot;7084&quot; instrument_node=&quot;&quot;&gt;Furthermore, household income fails to recognize household size. For example, a single attorney, earning $95,000, may have a higher standard of living than a family of four with an income of $120,000. Yet household income is still a commonly used class indicator.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7081&quot; id=&quot;cite_ref-American_Class_Structure_in_an_Age_of_Growing_Inequality_14-3&quot;&gt;&lt;a data-dcnode-id=&quot;7082&quot; href=&quot;#cite_note-American_Class_Structure_in_an_Age_of_Growing_Inequality-14&quot;&gt;&lt;span data-dcnode-id=&quot;7083&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7080&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7078&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;link data-dcnode-id=&quot;7077&quot; href=&quot;mw-data:TemplateStyles:r996844942&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;blockquote class=&quot;templatequote&quot; data-dcnode-id=&quot;7067&quot;&gt;&lt;p data-dcnode-id=&quot;7075&quot;&gt;&lt;span data-dcnode-id=&quot;7076&quot; instrument_node=&quot;&quot;&gt;The parade [of income earners with height representing income] suggest that [the] relationship between the distribution of income and the class structure is... blurred in the middle...we saw dual-income working class marchers looking down on single-income upper-middle-class marchers. In sum, the class structures as we have defined it...does not exactly match the distribution of household income.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;templatequotecite&quot; data-dcnode-id=&quot;7068&quot;&gt;&lt;span data-dcnode-id=&quot;7074&quot; instrument_node=&quot;&quot;&gt;— &lt;/span&gt;&lt;cite data-dcnode-id=&quot;7069&quot;&gt;&lt;span data-dcnode-id=&quot;7073&quot; instrument_node=&quot;&quot;&gt;Dennis Gilbert, &lt;/span&gt;&lt;i data-dcnode-id=&quot;7071&quot;&gt;&lt;span data-dcnode-id=&quot;7072&quot; instrument_node=&quot;&quot;&gt;The American Class Structure&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;7070&quot; instrument_node=&quot;&quot;&gt;, 1998&lt;/span&gt;&lt;/cite&gt;&lt;/div&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;7066&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;7056&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7064&quot; id=&quot;Influence&quot;&gt;&lt;span data-dcnode-id=&quot;7065&quot; instrument_node=&quot;&quot;&gt;Influence&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7057&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7062&quot;&gt;&lt;span data-dcnode-id=&quot;7063&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7060&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D10&quot; title=&quot;Edit section: Influence&quot;&gt;&lt;span data-dcnode-id=&quot;7061&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7058&quot;&gt;&lt;span data-dcnode-id=&quot;7059&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;7055&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7043&quot;&gt;&lt;span data-dcnode-id=&quot;7054&quot; instrument_node=&quot;&quot;&gt;The influence of the middle class depends on which theory one utilizes. If the middle class is defined as a modern &lt;/span&gt;&lt;a data-dcnode-id=&quot;7052&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Bourgeoisie&quot; title=&quot;Bourgeoisie&quot;&gt;&lt;span data-dcnode-id=&quot;7053&quot; instrument_node=&quot;&quot;&gt;bourgeoisie&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7051&quot; instrument_node=&quot;&quot;&gt;, the &quot;middle class&quot; has great influence. If middle class is used in a manner that includes all persons who are at neither extreme of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7049&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Social_structure&quot; title=&quot;Social structure&quot;&gt;&lt;span data-dcnode-id=&quot;7050&quot; instrument_node=&quot;&quot;&gt;social strata&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7048&quot; instrument_node=&quot;&quot;&gt;, it might still be influential, as such definition may include the &quot;professional middle class&quot;, which is then commonly referred to as the &quot;upper middle class&quot;. Despite the fact that the professional (upper) middle class is a privileged minority, it is the perhaps the most influential class in the United States.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7045&quot; id=&quot;cite_ref-The_Inner_Life_of_the_Middle_Class_7-3&quot;&gt;&lt;a data-dcnode-id=&quot;7046&quot; href=&quot;#cite_note-The_Inner_Life_of_the_Middle_Class-7&quot;&gt;&lt;span data-dcnode-id=&quot;7047&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7044&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;link data-dcnode-id=&quot;7041&quot; href=&quot;mw-data:TemplateStyles:r996844942&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;blockquote class=&quot;templatequote&quot; data-dcnode-id=&quot;7033&quot;&gt;&lt;p data-dcnode-id=&quot;7039&quot;&gt;&lt;span data-dcnode-id=&quot;7040&quot; instrument_node=&quot;&quot;&gt;Most ideas that find their way into the cultural mainstream... are crafted by a relative elite: people who are well educated, reasonably well-paid, and who overlap, socially and through family ties, with at least the middling levels of the business community—in short, the professional middle class.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;templatequotecite&quot; data-dcnode-id=&quot;7034&quot;&gt;&lt;span data-dcnode-id=&quot;7038&quot; instrument_node=&quot;&quot;&gt;— &lt;/span&gt;&lt;cite data-dcnode-id=&quot;7035&quot;&gt;&lt;a data-dcnode-id=&quot;7036&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Barbara_Ehrenreich&quot; title=&quot;Barbara Ehrenreich&quot;&gt;&lt;span data-dcnode-id=&quot;7037&quot; instrument_node=&quot;&quot;&gt;Barbara Ehrenreich&lt;/span&gt;&lt;/a&gt;&lt;/cite&gt;&lt;/div&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;7032&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7014&quot;&gt;&lt;span data-dcnode-id=&quot;7031&quot; instrument_node=&quot;&quot;&gt;Several reasons can be cited as to why the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7029&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Professional_class&quot; title=&quot;Professional class&quot;&gt;&lt;span data-dcnode-id=&quot;7030&quot; instrument_node=&quot;&quot;&gt;professional middle class&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7028&quot; instrument_node=&quot;&quot;&gt; is so influential. One is that journalists, commentators, writers, professors, economists, and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7026&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Political_Scientist&quot; title=&quot;Political Scientist&quot;&gt;&lt;span data-dcnode-id=&quot;7027&quot; instrument_node=&quot;&quot;&gt;political scientists&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7025&quot; instrument_node=&quot;&quot;&gt;, who are essential in shaping public opinion, are almost exclusively members of the professional middle class. Considering the overwhelming presence of professional middle-class persons in &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7023&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Post_secondary_education&quot; title=&quot;Post secondary education&quot;&gt;&lt;span data-dcnode-id=&quot;7024&quot; instrument_node=&quot;&quot;&gt;post secondary education&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7022&quot; instrument_node=&quot;&quot;&gt;, another essential instrument in regards to shaping &lt;/span&gt;&lt;a data-dcnode-id=&quot;7020&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Public_opinion&quot; title=&quot;Public opinion&quot;&gt;&lt;span data-dcnode-id=&quot;7021&quot; instrument_node=&quot;&quot;&gt;public opinion&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7019&quot; instrument_node=&quot;&quot;&gt;, it should come as no surprise that the lifestyle exclusive to this quasi-elite has become indicative of the American mainstream itself. In addition to setting trends, the professional middle class also holds occupations which include managerial duties, meaning that middle-class professionals spend much of their work-life directing others and conceptualizing the workday for the average worker.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7016&quot; id=&quot;cite_ref-The_Inner_Life_of_the_Middle_Class_7-4&quot;&gt;&lt;a data-dcnode-id=&quot;7017&quot; href=&quot;#cite_note-The_Inner_Life_of_the_Middle_Class-7&quot;&gt;&lt;span data-dcnode-id=&quot;7018&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7015&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6984&quot;&gt;&lt;span data-dcnode-id=&quot;7013&quot; instrument_node=&quot;&quot;&gt;Yet another reason is the economic clout generated by this class. In 2005 according to &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7011&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/U.S._Census&quot; title=&quot;U.S. Census&quot;&gt;&lt;span data-dcnode-id=&quot;7012&quot; instrument_node=&quot;&quot;&gt;U.S.&amp;nbsp;Census&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7010&quot; instrument_node=&quot;&quot;&gt; statistics, the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7008&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Income_quintiles&quot; title=&quot;Income quintiles&quot;&gt;&lt;span data-dcnode-id=&quot;7009&quot; instrument_node=&quot;&quot;&gt;top third&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7007&quot; instrument_node=&quot;&quot;&gt; of society, excluding the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7005&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Income_quintiles&quot; title=&quot;Income quintiles&quot;&gt;&lt;span data-dcnode-id=&quot;7006&quot; instrument_node=&quot;&quot;&gt;top 5%&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7004&quot; instrument_node=&quot;&quot;&gt;, controlled the largest share of &lt;/span&gt;&lt;a data-dcnode-id=&quot;7002&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Household_income_in_the_United_States%23Aggregate_income_distribution&quot; title=&quot;Household income in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;7003&quot; instrument_node=&quot;&quot;&gt;income&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7001&quot; instrument_node=&quot;&quot;&gt; in the United States.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6998&quot; id=&quot;cite_ref-US_Census_2005_Economic_Survey,_income_data_13-2&quot;&gt;&lt;a data-dcnode-id=&quot;6999&quot; href=&quot;#cite_note-US_Census_2005_Economic_Survey,_income_data-13&quot;&gt;&lt;span data-dcnode-id=&quot;7000&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6997&quot; instrument_node=&quot;&quot;&gt; Although some in the statistical middle class (for example, police officers and fire fighters in the more affluent suburbs in the San Francisco Bay Area) may have lifestyles as comfortable as those found among the ranks of the professional middle class, only few have the same degree of autonomy and influence over society as those in the professional middle class.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6994&quot; id=&quot;cite_ref-The_Inner_Life_of_the_Middle_Class_7-5&quot;&gt;&lt;a data-dcnode-id=&quot;6995&quot; href=&quot;#cite_note-The_Inner_Life_of_the_Middle_Class-7&quot;&gt;&lt;span data-dcnode-id=&quot;6996&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6993&quot; instrument_node=&quot;&quot;&gt; Other white-collar members of the statistical middle class may not only be unable to afford the middle-class lifestyle&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6990&quot; id=&quot;cite_ref-Middle_income_can't_buy_Middle_class_lifestyle_9-1&quot;&gt;&lt;a data-dcnode-id=&quot;6991&quot; href=&quot;#cite_note-Middle_income_can't_buy_Middle_class_lifestyle-9&quot;&gt;&lt;span data-dcnode-id=&quot;6992&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6989&quot; instrument_node=&quot;&quot;&gt; but also lack the influence found in the professional middle class.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6986&quot; id=&quot;cite_ref-Class,_A_Guide_through_the_American_status_system_30-0&quot;&gt;&lt;a data-dcnode-id=&quot;6987&quot; href=&quot;#cite_note-Class,_A_Guide_through_the_American_status_system-30&quot;&gt;&lt;span data-dcnode-id=&quot;6988&quot; instrument_node=&quot;&quot;&gt;[30]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6985&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6983&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;6973&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6981&quot; id=&quot;Typical_occupations&quot;&gt;&lt;span data-dcnode-id=&quot;6982&quot; instrument_node=&quot;&quot;&gt;Typical occupations&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6974&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6979&quot;&gt;&lt;span data-dcnode-id=&quot;6980&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6977&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D11&quot; title=&quot;Edit section: Typical occupations&quot;&gt;&lt;span data-dcnode-id=&quot;6978&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6975&quot;&gt;&lt;span data-dcnode-id=&quot;6976&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6972&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;6963&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;6964&quot; style=&quot;width:252px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;6970&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ASalinas_Office.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;6971&quot; data-file-height=&quot;666&quot; data-file-width=&quot;1170&quot; decoding=&quot;async&quot; height=&quot;142&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/44/Salinas_Office.jpg/250px-Salinas_Office.jpg&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/4/44/Salinas_Office.jpg/375px-Salinas_Office.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/44/Salinas_Office.jpg/500px-Salinas_Office.jpg 2x&quot; width=&quot;250&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6969&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;6965&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;6967&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;6968&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ASalinas_Office.jpg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6966&quot; instrument_node=&quot;&quot;&gt;Office buildings such as this are often the place of work for the vast majority of middle-class Americans, whether they are upper-middle-class professional or lower-middle-class secretaries&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6962&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6899&quot;&gt;&lt;span data-dcnode-id=&quot;6961&quot; instrument_node=&quot;&quot;&gt;Due to the many different ways of sub-dividing the middle class, some occupations indicative of the professional middle class might be categorized as &lt;/span&gt;&lt;a data-dcnode-id=&quot;6959&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Upper_middle_class&quot; title=&quot;Upper middle class&quot;&gt;&lt;span data-dcnode-id=&quot;6960&quot; instrument_node=&quot;&quot;&gt;upper-middle&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6958&quot; instrument_node=&quot;&quot;&gt; or lower-middle. Typical occupations for members of the middle class are those identified as being part of &quot;the professions&quot; and often include managerial duties as well, with all being &lt;/span&gt;&lt;a data-dcnode-id=&quot;6956&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/White-collar_worker&quot; title=&quot;White-collar worker&quot;&gt;&lt;span data-dcnode-id=&quot;6957&quot; instrument_node=&quot;&quot;&gt;white collar&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6955&quot; instrument_node=&quot;&quot;&gt;:  &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6953&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Accountants&quot; title=&quot;Accountants&quot;&gt;&lt;span data-dcnode-id=&quot;6954&quot; instrument_node=&quot;&quot;&gt;Accountants&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6952&quot; instrument_node=&quot;&quot;&gt;, Tenured Professors (Post-secondary educators), &lt;/span&gt;&lt;a data-dcnode-id=&quot;6950&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Psychologist&quot; title=&quot;Psychologist&quot;&gt;&lt;span data-dcnode-id=&quot;6951& &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6891&quot;&gt;&lt;a data-dcnode-id=&quot;6897&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Autonomy&quot; title=&quot;Autonomy&quot;&gt;&lt;span data-dcnode-id=&quot;6898&quot; instrument_node=&quot;&quot;&gt;Autonomy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6896&quot; instrument_node=&quot;&quot;&gt; is often seen as one of the greatest measurements of a person's class status. Even though some working class employees might also enjoy largely self-directed work, large degrees of autonomy in the work place, as well as influence over the organizational process, which are commonly the results of obtained expertise, these can still be seen as hallmarks of upper-middle-class or professional-middle-class professions.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6893&quot; id=&quot;cite_ref-Occupation_and_Class_Consciousness_in_America_11-3&quot;&gt;&lt;a data-dcnode-id=&quot;6894&quot; href=&quot;#cite_note-Occupation_and_Class_Consciousness_in_America-11&quot;&gt;&lt;span data-dcnode-id=&quot;6895&quot; instrument_node=&quot;&quot;&gt;[11]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6892&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6882&quot;&gt;&lt;span data-dcnode-id=&quot;6890&quot; instrument_node=&quot;&quot;&gt;As for the lower middle class, other less prestigious occupations, many sales positions, entry-level management, secretaries, etc., would be included.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6887&quot; id=&quot;cite_ref-New_York_Times,_guidelines_for_determining_class_in_America_32-0&quot;&gt;&lt;a data-dcnode-id=&quot;6888&quot; href=&quot;#cite_note-New_York_Times,_guidelines_for_determining_class_in_America-32&quot;&gt;&lt;span data-dcnode-id=&quot;6889&quot; instrument_node=&quot;&quot;&gt;[32]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6886&quot; instrument_node=&quot;&quot;&gt; In addition to professionals whose work is largely self-directed and includes managerial duties, many other less privileged members of the statistical middle class would find themselves in semi-independent to independent &lt;/span&gt;&lt;a data-dcnode-id=&quot;6884&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/White-collar_worker&quot; title=&quot;White-collar worker&quot;&gt;&lt;span data-dcnode-id=&quot;6885&quot; instrument_node=&quot;&quot;&gt;white collar&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6883&quot; instrument_node=&quot;&quot;&gt; positions. Many of those in the statistical middle class might work in what are called the professional support fields. These fields include occupations such as dental hygienists, and other professional and sales support.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6881&quot; instrument_node=&quot;&quot;&gt;

&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6869&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;6859&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6867&quot; id=&quot;Consumption&quot;&gt;&lt;span data-dcnode-id=&quot;6868&quot; instrument_node=&quot;&quot;&gt;Consumption&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6860&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6865&quot;&gt;&lt;span data-dcnode-id=&quot;6866&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6863&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D12&quot; title=&quot;Edit section: Consumption&quot;&gt;&lt;span data-dcnode-id=&quot;6864&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6861&quot;&gt;&lt;span data-dcnode-id=&quot;6862&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6858&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6843&quot;&gt;&lt;span data-dcnode-id=&quot;6857&quot; instrument_node=&quot;&quot;&gt;The American middle class, at least those living the lifestyle, has become known around the world for &lt;/span&gt;&lt;a data-dcnode-id=&quot;6855&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Conspicuous_consumption&quot; title=&quot;Conspicuous consumption&quot;&gt;&lt;span data-dcnode-id=&quot;6856&quot; instrument_node=&quot;&quot;&gt;conspicuous consumption&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6854&quot; instrument_node=&quot;&quot;&gt;. To this day, the professional middle class in the United States holds the world record for having the largest homes, most appliances, and most &lt;/span&gt;&lt;a data-dcnode-id=&quot;6852&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Passenger_vehicles_in_the_United_States&quot; title=&quot;Passenger vehicles in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;6853&quot; instrument_node=&quot;&quot;&gt;automobiles&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6851&quot; instrument_node=&quot;&quot;&gt;. In 2005, the average new home had a square footage of 2,434 square feet (roughly 226 square meters) with 58% of these homes having ceilings with heights in excess of nine feet on the first floor. As new homes only represent a small portion of the housing stock in the US, with most suburban homes having been built in the 1970s when the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6849&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Real_estate_pricing&quot; title=&quot;Real estate pricing&quot;&gt;&lt;span data-dcnode-id=&quot;6850&quot; instrument_node=&quot;&quot;&gt;average square footage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6848&quot; instrument_node=&quot;&quot;&gt; was 1,600,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6845&quot; id=&quot;cite_ref-Realty_Times,_the_increasing_size_of_American_homes_33-0&quot;&gt;&lt;a data-dcnode-id=&quot;6846&quot; href=&quot;#cite_note-Realty_Times,_the_increasing_size_of_American_homes-33&quot;&gt;&lt;span data-dcnode-id=&quot;6847&quot; instrument_node=&quot;&quot;&gt;[33]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6844&quot; instrument_node=&quot;&quot;&gt; it is fair to assume that these large new suburban homes will be inhabited by members of the professional middle class.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6825&quot;&gt;&lt;span data-dcnode-id=&quot;6842&quot; instrument_node=&quot;&quot;&gt;Overall, many social critics and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6840&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Intellectuals&quot; title=&quot;Intellectuals&quot;&gt;&lt;span data-dcnode-id=&quot;6841&quot; instrument_node=&quot;&quot;&gt;intellectuals&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6839&quot; instrument_node=&quot;&quot;&gt;, most of whom are members of the professional middle class themselves, have commented on the extravagant consumption habits of the professional middle class. It is also often pointed out that the suburban lifestyle of the American professional middle class is a major reason for its record consumption. The increasing &lt;/span&gt;&lt;a data-dcnode-id=&quot;6837&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Materialism&quot; title=&quot;Materialism&quot;&gt;&lt;span data-dcnode-id=&quot;6838&quot; instrument_node=&quot;&quot;&gt;materialism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6836&quot; instrument_node=&quot;&quot;&gt;, even among such a &lt;/span&gt;&lt;a data-dcnode-id=&quot;6834&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Educational_attainment_in_the_United_States&quot; title=&quot;Educational attainment in the United States&quot;&gt;&lt;span data-dcnode-id=&quot;6835&quot; instrument_node=&quot;&quot;&gt;highly educated&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6833&quot; instrument_node=&quot;&quot;&gt; class, is also often claimed to be connected to the notion of rugged individualism which gained popularity among the ranks of the professional middle class in the 1970s and 1980s.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6830&quot; id=&quot;cite_ref-The_Inner_Life_of_the_Middle_Class_7-7&quot;&gt;&lt;a data-dcnode-id=&quot;6831&quot; href=&quot;#cite_note-The_Inner_Life_of_the_Middle_Class-7&quot;&gt;&lt;span data-dcnode-id=&quot;6832&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6827&quot; id=&quot;cite_ref-Professional_Occupations_according_to_the_US_Department_of_Labor_31-1&quot;&gt;&lt;a data-dcnode-id=&quot;6828&quot; href=&quot;#cite_note-Professional_Occupations_according_to_the_US_Department_of_Labor-31&quot;&gt;&lt;span data-dcnode-id=&quot;6829&quot; instrument_node=&quot;&quot;&gt;[31]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6824&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/th&gt;&lt;th data-dcnode-id=&quot;6776&quot;&gt;&lt;span data-dcnode-id=&quot;6777&quot; instrument_node=&quot;&quot;&gt;Typical characteristics
&lt;/span&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6755&quot;&gt;&lt;th data-dcnode-id=&quot;6771&quot;&gt;&lt;span data-dcnode-id=&quot;6772&quot; instrument_node=&quot;&quot;&gt;Capitalist class (1%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6768&quot;&gt;&lt;span data-dcnode-id=&quot;6769&quot; instrument_node=&quot;&quot;&gt;Top-level executives, high-rung politicians, heirs. Ivy League education common.
&lt;/span&gt;&lt;/td&gt;&lt;th data-dcnode-id=&quot;6765&quot;&gt;&lt;span data-dcnode-id=&quot;6766&quot; instrument_node=&quot;&quot;&gt;Upper class (1%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6762&quot;&gt;&lt;span data-dcnode-id=&quot;6763&quot; instrument_node=&quot;&quot;&gt;Top-level executives, celebrities, heirs; income of $500,000+ common. Ivy league education common.
&lt;/span&gt;&lt;/td&gt;&lt;th data-dcnode-id=&quot;6759&quot;&gt;&lt;span data-dcnode-id=&quot;6760&quot; instrument_node=&quot;&quot;&gt;The super-rich (0.9%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6756&quot;&gt;&lt;span data-dcnode-id=&quot;6757&quot; instrument_node=&quot;&quot;&gt;Multi-millionaires whose incomes commonly exceed $3.5 million or more; includes celebrities and powerful executives/politicians. Ivy League education common.
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6727&quot;&gt;&lt;th data-dcnode-id=&quot;6747&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6752&quot; instrument_node=&quot;&quot;&gt;Upper middle class&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6749&quot; id=&quot;ref_Social_class_in_the_US1&quot;&gt;&lt;a data-dcnode-id=&quot;6750&quot; href=&quot;#endnote_Social_class_in_the_US1&quot;&gt;&lt;span data-dcnode-id=&quot;6751&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6748&quot; instrument_node=&quot;&quot;&gt; (15%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6744&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6745&quot; instrument_node=&quot;&quot;&gt;Highly-educated (often with graduate degrees), most commonly salaried, professionals and middle management with large work autonomy.
&lt;/span&gt;&lt;/td&gt;&lt;th data-dcnode-id=&quot;6737&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6742&quot; instrument_node=&quot;&quot;&gt;Upper middle class&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6739&quot;&gt;&lt;a data-dcnode-id=&quot;6740&quot; href=&quot;#endnote_Social_class_in_the_US1&quot;&gt;&lt;span data-dcnode-id=&quot;6741&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6738&quot; instrument_node=&quot;&quot;&gt; (15%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6734&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6735&quot; instrument_node=&quot;&quot;&gt;Highly-educated (often with graduate degrees) professionals &amp;amp; managers with household incomes varying from the high 5-figure range to commonly above $100,000.
&lt;/span&gt;&lt;/td&gt;&lt;th data-dcnode-id=&quot;6731&quot; rowspan=&quot;1&quot;&gt;&lt;span data-dcnode-id=&quot;6732&quot; instrument_node=&quot;&quot;&gt;The rich (5%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6728&quot; rowspan=&quot;1&quot;&gt;&lt;span data-dcnode-id=&quot;6729&quot; instrument_node=&quot;&quot;&gt;Households with net worth of $1 million or more; largely in the form of home equity. Generally have college degrees.
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6717&quot;&gt;&lt;th data-dcnode-id=&quot;6721&quot; rowspan=&quot;3&quot;&gt;&lt;span data-dcnode-id=&quot;6724&quot; instrument_node=&quot;&quot;&gt;Middle class (plurality/&lt;/span&gt;&lt;br data-dcnode-id=&quot;6723&quot;&gt;&lt;span data-dcnode-id=&quot;6722&quot; instrument_node=&quot;&quot;&gt;majority?; ca. 46%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6718&quot; rowspan=&quot;3&quot;&gt;&lt;span data-dcnode-id=&quot;6719&quot; instrument_node=&quot;&quot;&gt;College-educated workers with considerably higher-than-average incomes and compensation; a man making $57,000 and a woman making $40,000 may be typical.
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6703&quot;&gt;&lt;th data-dcnode-id=&quot;6713&quot;&gt;&lt;span data-dcnode-id=&quot;6714&quot; instrument_node=&quot;&quot;&gt;Lower middle class (30%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6710&quot;&gt;&lt;span data-dcnode-id=&quot;6711&quot; instrument_node=&quot;&quot;&gt;Semi-professionals and craftsmen with a roughly average standard of living. Most have some college education and are white-collar.
&lt;/span&gt;&lt;/td&gt;&lt;th data-dcnode-id=&quot;6707&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6708&quot; instrument_node=&quot;&quot;&gt;Lower middle class (32%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6704&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6705&quot; instrument_node=&quot;&quot;&gt;Semi-professionals and craftsmen with some work autonomy; household incomes commonly range from $35,000 to $75,000. Typically, some college education.
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6695&quot;&gt;&lt;th data-dcnode-id=&quot;6699&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6700&quot; instrument_node=&quot;&quot;&gt;Working class (30%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6696&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6697&quot; instrument_node=&quot;&quot;&gt;Clerical and most blue-collar workers whose work is highly routinized. Standard of living varies depending on number of income earners, but is commonly just adequate. High school education.
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6679&quot;&gt;&lt;th data-dcnode-id=&quot;6691&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6692&quot; instrument_node=&quot;&quot;&gt;Working class (32%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6688&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6689&quot; instrument_node=&quot;&quot;&gt;Clerical, pink- and blue-collar workers with often low job security; common household incomes range from $16,000 to $30,000. High school education.
&lt;/span&gt;&lt;/td&gt;&lt;th data-dcnode-id=&quot;6683&quot; rowspan=&quot;3&quot;&gt;&lt;span data-dcnode-id=&quot;6686&quot; instrument_node=&quot;&quot;&gt;Working class&lt;/span&gt;&lt;br data-dcnode-id=&quot;6685&quot;&gt;&lt;span data-dcnode-id=&quot;6684&quot; instrument_node=&quot;&quot;&gt;(ca. 40–45%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6680&quot; rowspan=&quot;3&quot;&gt;&lt;span data-dcnode-id=&quot;6681&quot; instrument_node=&quot;&quot;&gt;Blue-collar workers and those whose jobs are highly routinized with low economic security; a man making $40,000 and a woman making $26,000 may be typical. High school education.
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6671&quot;&gt;&lt;th data-dcnode-id=&quot;6675&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6676&quot; instrument_node=&quot;&quot;&gt;Working poor (13%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6672&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6673&quot; instrument_node=&quot;&quot;&gt;Service, low-rung clerical and some blue-collar workers. High economic insecurity and risk of poverty. Some high school education.
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6663&quot;&gt;&lt;th data-dcnode-id=&quot;6667&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6668&quot; instrument_node=&quot;&quot;&gt;Lower class (ca. 14–20%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6664&quot; rowspan=&quot;2&quot;&gt;&lt;span data-dcnode-id=&quot;6665&quot; instrument_node=&quot;&quot;&gt;Those who occupy poorly-paid positions or rely on government transfers. Some high school education.
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6649&quot;&gt;&lt;th data-dcnode-id=&quot;6659&quot;&gt;&lt;span data-dcnode-id=&quot;6660&quot; instrument_node=&quot;&quot;&gt;Underclass (12%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6656&quot;&gt;&lt;span data-dcnode-id=&quot;6657&quot; instrument_node=&quot;&quot;&gt;Those with limited or no participation in the labor force. Reliant on government transfers. Some high school education.
&lt;/span&gt;&lt;/td&gt;&lt;th data-dcnode-id=&quot;6653&quot;&gt;&lt;span data-dcnode-id=&quot;6654&quot; instrument_node=&quot;&quot;&gt;The poor (ca. 12%)
&lt;/span&gt;&lt;/th&gt;&lt;td data-dcnode-id=&quot;6650&quot;&gt;&lt;span data-dcnode-id=&quot;6651&quot; instrument_node=&quot;&quot;&gt;Those living below the poverty line with limited to no participation in the labor force; a household income of $18,000 may be typical. Some high school education.
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;6601&quot;&gt;&lt;td colspan=&quot;6&quot; data-dcnode-id=&quot;6602&quot;&gt;&lt;span data-dcnode-id=&quot;6646&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;dd data-dcnode-id=&quot;6605&quot;&gt;&lt;small data-dcnode-id=&quot;6606&quot;&gt;&lt;span class=&quot;citation wikicite&quot; data-dcnode-id=&quot;6611&quot; id=&quot;endnote_Social_class_in_the_US1&quot;&gt;&lt;a data-dcnode-id=&quot;6612&quot; href=&quot;#ref_Social_class_in_the_US1&quot;&gt;&lt;b data-dcnode-id=&quot;6613&quot;&gt;&lt;sup data-dcnode-id=&quot;6614&quot;&gt;&lt;span data-dcnode-id=&quot;6615&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/sup&gt;&lt;/b&gt;&lt;/a&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;6610&quot; instrument_node=&quot;&quot;&gt; The upper middle class may also be referred to as &quot;Professional class&quot; Ehrenreich, B. (1989). &lt;/span&gt;&lt;i data-dcnode-id=&quot;6608&quot;&gt;&lt;span data-dcnode-id=&quot;6609&quot; instrument_node=&quot;&quot;&gt;The Inner Life of the Middle Class&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;6607&quot; instrument_node=&quot;&quot;&gt;. NY, NY: Harper-Collins.&lt;/span&gt;&lt;/small&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;span data-dcnode-id=&quot;6603&quot; instrument_node=&quot;&quot;&gt;
