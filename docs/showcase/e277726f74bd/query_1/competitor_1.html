&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6568&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6576&quot; id=&quot;Struggle_for_reemployment:_downsizing_and_outsourcing&quot;&gt;&lt;span data-dcnode-id=&quot;6577&quot; instrument_node=&quot;&quot;&gt;Struggle for reemployment: downsizing and outsourcing&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6569&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6574&quot;&gt;&lt;span data-dcnode-id=&quot;6575&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6572&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D15&quot; title=&quot;Edit section: Struggle for reemployment: downsizing and outsourcing&quot;&gt;&lt;span data-dcnode-id=&quot;6573&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6570&quot;&gt;&lt;span data-dcnode-id=&quot;6571&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6557&quot;&gt;&lt;span data-dcnode-id=&quot;6566&quot; instrument_node=&quot;&quot;&gt;When middle-class workers lose their jobs, they tend to be rehired but for a lower rate of pay. More often than not, people seek out temporary employment to make ends meet. About 4 percent of workforce, 11.4 million workers, a year are temporary workers.&lt;/span&gt;&lt;sup class=&quot;noprint Inline-Template Template-Fact&quot; data-dcnode-id=&quot;6559&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;6565&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;6561&quot;&gt;&lt;a data-dcnode-id=&quot;6562&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed&quot; title=&quot;Wikipedia:Citation needed&quot;&gt;&lt;span data-dcnode-id=&quot;6563&quot; title=&quot;This claim needs references to reliable sources. (October 2021)&quot;&gt;&lt;span data-dcnode-id=&quot;6564&quot; instrument_node=&quot;&quot;&gt;citation needed&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;6560&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6558&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6543&quot;&gt;&lt;span data-dcnode-id=&quot;6556&quot; instrument_node=&quot;&quot;&gt;According to&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6553&quot; id=&quot;cite_ref-34&quot;&gt;&lt;a data-dcnode-id=&quot;6554&quot; href=&quot;#cite_note-34&quot;&gt;&lt;span data-dcnode-id=&quot;6555&quot; instrument_node=&quot;&quot;&gt;[34]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6552&quot; instrument_node=&quot;&quot;&gt; Christopher B. Doob, outsourcing is companies' subcontracting of services to other companies instead of continuing to provide those services themselves. This takes away from jobs offered in the United States and makes it more difficult to maintain and get jobs. Outsourcing raises the unemployment rate, and while outsourcing has been steadily increasing since the 1990s, data on the subject is limited by the power elite. Companies like&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6549&quot; id=&quot;cite_ref-35&quot;&gt;&lt;a data-dcnode-id=&quot;6550&quot; href=&quot;#cite_note-35&quot;&gt;&lt;span data-dcnode-id=&quot;6551&quot; instrument_node=&quot;&quot;&gt;[35]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6548&quot; instrument_node=&quot;&quot;&gt; Apple and&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6545&quot; id=&quot;cite_ref-36&quot;&gt;&lt;a data-dcnode-id=&quot;6546&quot; href=&quot;#cite_note-36&quot;&gt;&lt;span data-dcnode-id=&quot;6547&quot; instrument_node=&quot;&quot;&gt;[36]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6544&quot; instrument_node=&quot;&quot;&gt; Nike outsource jobs overseas so they can have cheaper labor to make their products and keep from raising prices in the States.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6532&quot;&gt;&lt;span data-dcnode-id=&quot;6542&quot; instrument_node=&quot;&quot;&gt;The deliberate &lt;/span&gt;&lt;a data-dcnode-id=&quot;6540&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Layoff&quot; title=&quot;Layoff&quot;&gt;&lt;span data-dcnode-id=&quot;6541&quot; instrument_node=&quot;&quot;&gt;reduction&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6539&quot; instrument_node=&quot;&quot;&gt; of permanent employees in an effort to provide an organization more efficient operations and to cut costs. Large firms like &lt;/span&gt;&lt;a data-dcnode-id=&quot;6537&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/IBM&quot; title=&quot;IBM&quot;&gt;&lt;span data-dcnode-id=&quot;6538&quot; instrument_node=&quot;&quot;&gt;IBM&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6536&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6534&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/AT%2526T&quot; title=&quot;AT&amp;amp;T&quot;&gt;&lt;span data-dcnode-id=&quot;6535&quot; instrument_node=&quot;&quot;&gt;AT&amp;amp;T&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6533&quot; instrument_node=&quot;&quot;&gt;, and GM are reducing their heavily middle class workforce by 10 to 20 percent because of the advancement of technology and the closing of work facilities. Downsizing has grown significantly in the States, as rising debt has forced companies to downsize so they can remain open. According to Doob, between 2005 and 2007, 3.6 million workers with three or more years on the job lost their positions because of companies closing down, relocating, having insufficient work, or due to the elimination of their positions.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6521&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6529&quot; id=&quot;Increasing_inequality&quot;&gt;&lt;span data-dcnode-id=&quot;6530&quot; instrument_node=&quot;&quot;&gt;Increasing inequality&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6522&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6527&quot;&gt;&lt;span data-dcnode-id=&quot;6528&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6525&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D16&quot; title=&quot;Edit section: Increasing inequality&quot;&gt;&lt;span data-dcnode-id=&quot;6526&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6523&quot;&gt;&lt;span data-dcnode-id=&quot;6524&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6520&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6511&quot;&gt;&lt;span data-dcnode-id=&quot;6519&quot; instrument_node=&quot;&quot;&gt;Inequality and poverty rates are not always correlated. Poverty rates increased early in the 1980s until late in the 1990s when they started to go back down. From 2000-2010, the percentage of all people living in poverty rose from 11.3% to 15.1%. This statistical measure of the poverty rate takes into account only a household's current yearly income, while ignoring the net worth of the household.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6516&quot; id=&quot;cite_ref-Income,_Poverty,_and_Health_Insurance_Coverage_in_the_United_States:_2006_37-0&quot;&gt;&lt;a data-dcnode-id=&quot;6517&quot; href=&quot;#cite_note-Income,_Poverty,_and_Health_Insurance_Coverage_in_the_United_States:_2006-37&quot;&gt;&lt;span data-dcnode-id=&quot;6518&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6513&quot; id=&quot;cite_ref-38&quot;&gt;&lt;a data-dcnode-id=&quot;6514&quot; href=&quot;#cite_note-38&quot;&gt;&lt;span data-dcnode-id=&quot;6515&quot; instrument_node=&quot;&quot;&gt;[38]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6510&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;6500&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6508&quot; id=&quot;Up_to_2008&quot;&gt;&lt;span data-dcnode-id=&quot;6509&quot; instrument_node=&quot;&quot;&gt;Up to 2008&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6501&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6506&quot;&gt;&lt;span data-dcnode-id=&quot;6507&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6504&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D17&quot; title=&quot;Edit section: Up to 2008&quot;&gt;&lt;span data-dcnode-id=&quot;6505&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6502&quot;&gt;&lt;span data-dcnode-id=&quot;6503&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;6499&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;6487&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;6488&quot; style=&quot;width:352px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;6497&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AChart_showing_inflation-adjusted_percentage_increase_in_mean_after-tax_household_income_in_the_United_States_1979%25E2%2580%25932005.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;6498&quot; data-file-height=&quot;310&quot; data-file-width=&quot;512&quot; decoding=&quot;async&quot; height=&quot;212&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Chart_showing_inflation-adjusted_percentage_increase_in_mean_after-tax_household_income_in_the_United_States_1979%25E2%2580%25932005.jpg/350px-Chart_showing_inflation-adjusted_percentage_increase_in_mean_after-tax_household_income_in_the_United_States_1979%25E2%2580%25932005.jpg&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/a/ae/Chart_showing_inflation-adjusted_percentage_increase_in_mean_after-tax_household_income_in_the_United_States_1979%E2%80%932005.jpg 1.5x&quot; width=&quot;350&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6496&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;6489&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;6494&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;6495&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AChart_showing_inflation-adjusted_percentage_increase_in_mean_after-tax_household_income_in_the_United_States_1979%25E2%2580%25932005.jpg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6493&quot; instrument_node=&quot;&quot;&gt;Inflation adjusted percentage increase in after-tax household income for the top 1% and four of the five quintiles, between 1979 and 2005 (gains by top 1% are reflected by bottom bar; bottom quintile by top bar)&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6490&quot; id=&quot;cite_ref-Aron-Dine_&amp;amp;_Sherman_39-0&quot;&gt;&lt;a data-dcnode-id=&quot;6491&quot; href=&quot;#cite_note-Aron-Dine_&amp;amp;_Sherman-39&quot;&gt;&lt;span data-dcnode-id=&quot;6492&quot; instrument_node=&quot;&quot;&gt;[39]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6486&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6463&quot;&gt;&lt;span data-dcnode-id=&quot;6485&quot; instrument_node=&quot;&quot;&gt;Income data indicate that the middle class, including the upper middle class, have seen far slower income growth than the top 1% since 1980.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6482&quot; id=&quot;cite_ref-Johnston,_D._(June_5,_2005)._Richest_Are_Leaving_Even_the_Richest_Far_Behind._''The_New_York_Times''_40-0&quot;&gt;&lt;a data-dcnode-id=&quot;6483&quot; href=&quot;#cite_note-Johnston,_D._(June_5,_2005)._Richest_Are_Leaving_Even_the_Richest_Far_Behind._''The_New_York_Times''-40&quot;&gt;&lt;span data-dcnode-id=&quot;6484&quot; instrument_node=&quot;&quot;&gt;[40]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6479&quot; id=&quot;cite_ref-Yellen,_J._L._(November_6,_2006)._Speech_to_the_Center_for_the_Study_of_Democracy_at_the_University_of_California,_Irvine._''Federal_Reserve_Bank_of_San_Francisco''._41-0&quot;&gt;&lt;a data-dcnode-id=&quot;6480&quot; href=&quot;#cite_note-Yellen,_J._L._(November_6,_2006)._Speech_to_the_Center_for_the_Study_of_Democracy_at_the_University_of_California,_Irvine._''Federal_Reserve_Bank_of_San_Francisco''.-41&quot;&gt;&lt;span data-dcnode-id=&quot;6481&quot; instrument_node=&quot;&quot;&gt;[41]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6478&quot; instrument_node=&quot;&quot;&gt; While its income increased as fast as that of the rich in the years following &lt;/span&gt;&lt;a data-dcnode-id=&quot;6476&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/World_War_II&quot; title=&quot;World War II&quot;&gt;&lt;span data-dcnode-id=&quot;6477&quot; instrument_node=&quot;&quot;&gt;World War II&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6475&quot; instrument_node=&quot;&quot;&gt;, it has since experienced far slower income gains than the top. According to economist &lt;/span&gt;&lt;a data-dcnode-id=&quot;6473&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Janet_Yellen&quot; title=&quot;Janet Yellen&quot;&gt;&lt;span data-dcnode-id=&quot;6474&quot; instrument_node=&quot;&quot;&gt;Janet Yellen&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6472&quot; instrument_node=&quot;&quot;&gt; &quot;the growth [in real income] was heavily concentrated at the very tip of the top, that is, the top 1 percent&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6469&quot; id=&quot;cite_ref-Yellen,_J._L._(November_6,_2006)._Speech_to_the_Center_for_the_Study_of_Democracy_at_the_University_of_California,_Irvine._''Federal_Reserve_Bank_of_San_Francisco''._41-1&quot;&gt;&lt;a data-dcnode-id=&quot;6470&quot; href=&quot;#cite_note-Yellen,_J._L._(November_6,_2006)._Speech_to_the_Center_for_the_Study_of_Democracy_at_the_University_of_California,_Irvine._''Federal_Reserve_Bank_of_San_Francisco''.-41&quot;&gt;&lt;span data-dcnode-id=&quot;6471&quot; instrument_node=&quot;&quot;&gt;[41]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6468&quot; instrument_node=&quot;&quot;&gt; Between 1979 and 2005, the mean after-tax income of the top 1% increased by an inflation adjusted 176% versus 69% for the top 20% overall. The fourth quintile saw its mean net income increase by 29%, the middle income quintile by 21%, the second quintile by 17% and the bottom quintile by 6%, respectively.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6465&quot; id=&quot;cite_ref-Aron-Dine_&amp;amp;_Sherman_39-1&quot;&gt;&lt;a data-dcnode-id=&quot;6466&quot; href=&quot;#cite_note-Aron-Dine_&amp;amp;_Sherman-39&quot;&gt;&lt;span data-dcnode-id=&quot;6467&quot; instrument_node=&quot;&quot;&gt;[39]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6444&quot;&gt;&lt;span data-dcnode-id=&quot;6462&quot; instrument_node=&quot;&quot;&gt;The share of gross annual household income of the top 1% has increased to 19.4%, the largest share since the late 1920s.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6459&quot; id=&quot;cite_ref-Johnston,_D._(March_29,_2007)._Income_Gap_Is_Widening,_Data_Shows._''The_New_York_Times''_42-0&quot;&gt;&lt;a data-dcnode-id=&quot;6460&quot; href=&quot;#cite_note-Johnston,_D._(March_29,_2007)._Income_Gap_Is_Widening,_Data_Shows._''The_New_York_Times''-42&quot;&gt;&lt;span data-dcnode-id=&quot;6461&quot; instrument_node=&quot;&quot;&gt;[42]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6456&quot; id=&quot;cite_ref-Piketty_&amp;amp;_Saez_43-0&quot;&gt;&lt;a data-dcnode-id=&quot;6457&quot; href=&quot;#cite_note-Piketty_&amp;amp;_Saez-43&quot;&gt;&lt;span data-dcnode-id=&quot;6458&quot; instrument_node=&quot;&quot;&gt;[43]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6453&quot; id=&quot;cite_ref-Saez_44-0&quot;&gt;&lt;a data-dcnode-id=&quot;6454&quot; href=&quot;#cite_note-Saez-44&quot;&gt;&lt;span data-dcnode-id=&quot;6455&quot; instrument_node=&quot;&quot;&gt;[44]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6452&quot; instrument_node=&quot;&quot;&gt; As the U.S. is home to a &lt;/span&gt;&lt;a data-dcnode-id=&quot;6450&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Progressive_tax&quot; title=&quot;Progressive tax&quot;&gt;&lt;span data-dcnode-id=&quot;6451&quot; instrument_node=&quot;&quot;&gt;progressive tax&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6449&quot; instrument_node=&quot;&quot;&gt; structure the share of net-income received by the top 1% is smaller, and the share of the middle class consequently larger, than their shares of gross pre-tax income. In 2004, the top percentile's share of net income was 14%, 27.8% less than its share of gross income, but nonetheless nearly twice as large as in 1979, when it was clocked at 7.5%.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6446&quot; id=&quot;cite_ref-Aron-Dine_&amp;amp;_Sherman_39-2&quot;&gt;&lt;a data-dcnode-id=&quot;6447&quot; href=&quot;#cite_note-Aron-Dine_&amp;amp;_Sherman-39&quot;&gt;&lt;span data-dcnode-id=&quot;6448&quot; instrument_node=&quot;&quot;&gt;[39]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6432&quot;&gt;&lt;span data-dcnode-id=&quot;6443&quot; instrument_node=&quot;&quot;&gt;The reduced size of the share of aggregate share of income, both before and after tax, of the middle class has been attributed to the reduced bargaining power of wage earning employees, caused by the decline of unions; a lessening of government redistribution;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6440&quot; id=&quot;cite_ref-Weeks_45-0&quot;&gt;&lt;a data-dcnode-id=&quot;6441&quot; href=&quot;#cite_note-Weeks-45&quot;&gt;&lt;span data-dcnode-id=&quot;6442&quot; instrument_node=&quot;&quot;&gt;[45]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6439&quot; instrument_node=&quot;&quot;&gt; and technological changes which have created opportunities for certain people to accumulate far greater relative wealth very quickly (including larger markets due to &lt;/span&gt;&lt;a data-dcnode-id=&quot;6437&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Globalization&quot; title=&quot;Globalization&quot;&gt;&lt;span data-dcnode-id=&quot;6438&quot; instrument_node=&quot;&quot;&gt;globalization&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6436&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;6434&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Information_Age&quot; title=&quot;Information Age&quot;&gt;&lt;span data-dcnode-id=&quot;6435&quot; instrument_node=&quot;&quot;&gt;Information Age&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6433&quot; instrument_node=&quot;&quot;&gt; technologies allowing faster and wider distribution of work product).
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6415&quot;&gt;&lt;span data-dcnode-id=&quot;6431&quot; instrument_node=&quot;&quot;&gt;In 2006 households that earn between $25,000 and $75,000 represent approximately the middle half of the income distribution tables provided by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6429&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/United_States_Census_Bureau&quot; title=&quot;United States Census Bureau&quot;&gt;&lt;span data-dcnode-id=&quot;6430&quot; instrument_node=&quot;&quot;&gt;U.S. Census Bureau&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6428&quot; instrument_node=&quot;&quot;&gt;. Over the past two decades, the number of households in those brackets decreased by 3.9%, from 48.2% to 44.3%. During the same time period, the number of households with incomes below $25,000 decreased 3.5%, from 28.7% to 25.2%, while the number of households with incomes above $75,000 increased over 7%, from 23.2% to 30.4%.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6425&quot; id=&quot;cite_ref-Income,_Poverty,_and_Health_Insurance_Coverage_in_the_United_States:_2006_37-1&quot;&gt;&lt;a data-dcnode-id=&quot;6426&quot; href=&quot;#cite_note-Income,_Poverty,_and_Health_Insurance_Coverage_in_the_United_States:_2006-37&quot;&gt;&lt;span data-dcnode-id=&quot;6427&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6424&quot; instrument_node=&quot;&quot;&gt; A possible explanation for the increase in the higher earnings categories is that more households now have two wage earners.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6421&quot; id=&quot;cite_ref-Is_America_Becoming_More_of_a_Class_Society?_46-0&quot;&gt;&lt;a data-dcnode-id=&quot;6422&quot; href=&quot;#cite_note-Is_America_Becoming_More_of_a_Class_Society?-46&quot;&gt;&lt;span data-dcnode-id=&quot;6423&quot; instrument_node=&quot;&quot;&gt;[46]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6420&quot; instrument_node=&quot;&quot;&gt; However, a closer analysis reveals all of the 7% increase can be found in households who earn over $100,000.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6417&quot; id=&quot;cite_ref-Income,_Poverty,_and_Health_Insurance_Coverage_in_the_United_States:_2006_37-2&quot;&gt;&lt;a data-dcnode-id=&quot;6418&quot; href=&quot;#cite_note-Income,_Poverty,_and_Health_Insurance_Coverage_in_the_United_States:_2006-37&quot;&gt;&lt;span data-dcnode-id=&quot;6419&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6416&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6406&quot;&gt;&lt;span data-dcnode-id=&quot;6414&quot; instrument_node=&quot;&quot;&gt;A study by &lt;/span&gt;&lt;a data-dcnode-id=&quot;6412&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Brookings_Institution&quot; title=&quot;Brookings Institution&quot;&gt;&lt;span data-dcnode-id=&quot;6413&quot; instrument_node=&quot;&quot;&gt;Brookings Institution&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6411&quot; instrument_node=&quot;&quot;&gt; in June 2006 revealed that Middle-income neighborhoods as a proportion of all metropolitan neighborhoods declined from 58 percent in 1970 to 41 percent in 2000. As housing costs increase, the middle class is squeezed and forced to live in less desirable areas making upward mobility more difficult. Safety, school systems, and even jobs are all linked to neighborhood types.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6408&quot; id=&quot;cite_ref-Where_Did_They_Go?_the_Decline_of_Middle-Income_Neighborhoods_in_Metropolitan_America_47-0&quot;&gt;&lt;a data-dcnode-id=&quot;6409&quot; href=&quot;#cite_note-Where_Did_They_Go?_the_Decline_of_Middle-Income_Neighborhoods_in_Metropolitan_America-47&quot;&gt;&lt;span data-dcnode-id=&quot;6410&quot; instrument_node=&quot;&quot;&gt;[47]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6407&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6396&quot;&gt;&lt;span data-dcnode-id=&quot;6405&quot; instrument_node=&quot;&quot;&gt;The statistics used to track the share of income going to the top 1% have been criticized by Alan Reynolds. He points out that the Tax Reform Act of 1986 changed the way that income is defined on tax returns, which is the primary source of data utilized to compile income shares.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6402&quot; id=&quot;cite_ref-48&quot;&gt;&lt;a data-dcnode-id=&quot;6403&quot; href=&quot;#cite_note-48&quot;&gt;&lt;span data-dcnode-id=&quot;6404&quot; instrument_node=&quot;&quot;&gt;[48]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6401&quot; instrument_node=&quot;&quot;&gt; Among these changes includes the fact that beginning in the 1980s, many C-Corporations switched to S-Corporations, which changed the way that their income is reported on income tax returns. S-Corporations report all income on the individual income tax returns of the owners, while C-Corporations file a separate tax return and corporate profits are not allocated to any individuals. Prior to 1986, approximately one fourth of all American corporations were S-Corporations, but by 1997 this share had risen to more than half. In addition, by 2001 S-Corporations were responsible for about 25% of before-tax profits.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6398&quot; id=&quot;cite_ref-49&quot;&gt;&lt;a data-dcnode-id=&quot;6399&quot; href=&quot;#cite_note-49&quot;&gt;&lt;span data-dcnode-id=&quot;6400&quot; instrument_node=&quot;&quot;&gt;[49]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6390&quot;&gt;&lt;span data-dcnode-id=&quot;6395&quot; instrument_node=&quot;&quot;&gt;This shift to S-Corporations means that income previously not included on personal income tax returns appeared there during this change, as S-Corporation investors directly pay taxes on corporate profit regardless of whether it is distributed or not. Furthermore, Reynolds points out in the same literature that tax-deferred savings accounts grew substantially from the 1980s onward, so that investment income to these accounts was not included as personal income in the years which it accrued. The CBO noted that at the end of 2002, $10.1 trillion was in tax-deferred retirement plans, and that $9 trillion of that was taxable upon withdrawal.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6392&quot; id=&quot;cite_ref-50&quot;&gt;&lt;a data-dcnode-id=&quot;6393&quot; href=&quot;#cite_note-50&quot;&gt;&lt;span data-dcnode-id=&quot;6394&quot; instrument_node=&quot;&quot;&gt;[50]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6391&quot; instrument_node=&quot;&quot;&gt; These numbers amount to potentially large amounts of investment income to middle-class families that are no longer reported on tax returns each year, but were reported prior to the widespread growth of tax-deferred retirement plans.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6384&quot;&gt;&lt;span data-dcnode-id=&quot;6389&quot; instrument_node=&quot;&quot;&gt;Panel data that track the same individuals over time are much more informative than statistical categories that do not correspond to specific people. The Treasury did a study in 2007 that tracked the same individual taxpayers over the age of 25 from 1996 to 2005 and found differing results from what the graph above shows.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6386&quot; id=&quot;cite_ref-51&quot;&gt;&lt;a data-dcnode-id=&quot;6387&quot; href=&quot;#cite_note-51&quot;&gt;&lt;span data-dcnode-id=&quot;6388&quot; instrument_node=&quot;&quot;&gt;[51]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6385&quot; instrument_node=&quot;&quot;&gt; The results showed that during those years, half of taxpayers moved to a different income quintile, with half of those in the bottom quintile moving to a higher one. About 60% of taxpayers in the top 1% in 1996 no longer stayed in that category by 2005.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6382&quot;&gt;&lt;span data-dcnode-id=&quot;6383&quot; instrument_node=&quot;&quot;&gt;On an absolute scale, the lowest incomes saw the greatest gains in percentage terms and the highest incomes actually declined. Half of those in the bottom 20% in 1996 saw their incomes at least double during these years, while the median income of the top 1% declined by 25.8%. The reason that the results are so inconsistent with household income statistics is that household statistics do not track the same people over time; it is important to specify how many of the households in the top 1% in a given year were still there when looking at that category years later and gauging income gains.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6381&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;6371&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6379&quot; id=&quot;2008_and_after&quot;&gt;&lt;span data-dcnode-id=&quot;6380&quot; instrument_node=&quot;&quot;&gt;2008 and after&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6372&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6377&quot;&gt;&lt;span data-dcnode-id=&quot;6378&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6375&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D18&quot; title=&quot;Edit section: 2008 and after&quot;&gt;&lt;span data-dcnode-id=&quot;6376&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6373&quot;&gt;&lt;span data-dcnode-id=&quot;6374&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;6370&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6362&quot;&gt;&lt;span data-dcnode-id=&quot;6369&quot; instrument_node=&quot;&quot;&gt;After the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6367&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Financial_crisis_of_2007%25E2%2580%25932008&quot; title=&quot;Financial crisis of 2007–2008&quot;&gt;&lt;span data-dcnode-id=&quot;6368&quot; instrument_node=&quot;&quot;&gt;financial crisis of 2007–2008&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6366&quot; instrument_node=&quot;&quot;&gt;, inequality between social classes has further increased. As &lt;/span&gt;&lt;a data-dcnode-id=&quot;6364&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/William_Lazonick&quot; title=&quot;William Lazonick&quot;&gt;&lt;span data-dcnode-id=&quot;6365&quot; instrument_node=&quot;&quot;&gt;William Lazonick&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6363&quot; instrument_node=&quot;&quot;&gt; puts it:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6361&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;dl data-dcnode-id=&quot;6355&quot;&gt;&lt;dd data-dcnode-id=&quot;6356&quot;&gt;&lt;span data-dcnode-id=&quot;6360&quot; instrument_node=&quot;&quot;&gt;Five years after the official end of the Great Recession, corporate profits are high, and the stock markets are booming. Yet most Americans are not sharing in the recovery. While the top 0.1% of income recipients—which include most of the highest-ranking corporate executives—reap almost all the income gains, good jobs keep disappearing, and new employment opportunities tend to be insecure and underpaid.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6357&quot; id=&quot;cite_ref-52&quot;&gt;&lt;a data-dcnode-id=&quot;6358&quot; href=&quot;#cite_note-52&quot;&gt;&lt;span data-dcnode-id=&quot;6359&quot; instrument_node=&quot;&quot;&gt;[52]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;span data-dcnode-id=&quot;6354&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;6344&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6352&quot; id=&quot;See_also&quot;&gt;&lt;span data-dcnode-id=&quot;6353&quot; instrument_node=&quot;&quot;&gt;See also&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6345&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6350&quot;&gt;&lt;span data-dcnode-id=&quot;6351&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6348&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmerican_middle_class%26action%3Dedit%26section%3D19&quot; title=&quot;Edit section: See also&quot;&gt;&lt;span data-dcnode-id=&quot;6349&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6346&quot;&gt;&lt;span data-dcnode-id=&quot;6347&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6343&quot; instrument_node=&quot;&quot;&gt;
