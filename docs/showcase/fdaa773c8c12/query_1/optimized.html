&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-tower-almost-went-by-a-different-name&quot;&gt;&lt;/span&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_12-0&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-digiohembed&quot; id=&quot;mntl-sc-block_13-0&quot;&gt; &lt;div class=&quot;mntl-sc-block-digiohembed__container digioh-inline-unit digioh-inline-unit--sc&quot; data-guid=&quot;lightbox-inline-form-d6b1ce8f-ffcf-49f7-9130-c9a0962426b2&quot; data-title=&quot;&quot; id=&quot;lightbox-inline-form-d6b1ce8f-ffcf-49f7-9130-c9a0962426b2&quot;&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_14-0&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-french-artists-tried-to-prevent-it-from-being-built&quot;&gt;&lt;/span&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-c970896f&quot; id=&quot;mntl-sc-block_16-0&quot;&gt; From conception to construction, the Eiffel Tower was the &lt;a data-component=&quot;link&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;externalLink&quot; href=&quot;https://www.toureiffel.paris/en/news/history-and-culture/when-eiffel-tower-was-subject-controversy&quot;&gt;source of deep controversy&lt;/a&gt; among Parisians. A few well-known creatives—including architect Charles Garnier, novelist Alexandre Dumas, and playwright Guy de Maupassant—banded together in 1887 to write a letter to decry the tower as “a gigantic black factory chimney.&quot; Despite this opposition, &lt;strong&gt;Maurice Koechlin&lt;/strong&gt; and &lt;strong&gt;Émile Nouguier&lt;/strong&gt; were the chief engineers who initially designed the Eiffel Tower. Their original design was considered too utilitarian by Gustave Eiffel, who then hired architect &lt;strong&gt;Stephen Sauvestre&lt;/strong&gt; to enhance the aesthetics. The design was selected as the winner from over 100 entries in a competition for the 1889 World's Fair centerpiece. The tower was intended as a temporary entrance arch for the exposition celebrating the 100th anniversary of the French Revolution, and Eiffel championed the project despite the early criticism. 
&lt;/p&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-7c814eec&quot; id=&quot;mntl-sc-block_18-0&quot;&gt; While some of these artists later retracted their disparagements, others doubled down after the monument’s completion—such as Maupassant, who famously dined at the Eiffel Tower’s restaurant almost daily in order to avoid having to look at it.
&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-e8a29c3f&quot;&gt;Taylor McIntyre/Travel + Leisure&lt;/p&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-9c63a23e&quot; id=&quot;mntl-sc-block_21-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; Gustave Eiffel didn’t actually design it. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-5492aad2&quot; id=&quot;mntl-sc-block_22-0&quot;&gt; Despite the Tower being his namesake, Eiffel didn't design it himself. Maurice Koechlin and Emile Nouguier, two engineers who worked for his company, were the masterminds behind the structure. At first, Eiffel vetoed their initial sketch, finding it too utilitarian. He then brought on architect Stephen Sauvestre to improve the overall aesthetics of the project. In the end, the team’s ideas beat over 100 other projects, and it was selected as the main attraction of the 1889 World’s Fair. But while he wasn’t the technical designer of the tower, Eiffel was its biggest champion and protector.&lt;br/&gt;
&lt;/p&gt;
&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-4806ea04&quot; id=&quot;mntl-sc-block_24-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It's covered in the names of scientists. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-814cd6e0&quot; id=&quot;mntl-sc-block_25-0&quot;&gt; Eiffel and his engineers aren’t the only ones whose names are inextricably linked to the tower—72 French scientists and engineers’ names are engraved into the iron that surrounds the Tower’s first floor, including physicist Léon Foucault, chemist Jean-Baptiste Dumas, and geographer and mathematician François Perrier. While the names were painted over in the early 20th century, they were restored in the 1980s.
&lt;/p&gt;
&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-5efb4e5b&quot; id=&quot;mntl-sc-block_29-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It has also doubled as a scientific laboratory. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-4d6cb855&quot; id=&quot;mntl-sc-block_30-0&quot;&gt; Part of what secured the tower's design (and later saved it from destruction) was Eiffel’s insistence that it shouldn't be purely for looks—it should have a scientific function as well. The day after its inauguration, Eiffel installed a meteorology lab on the third floor, where he performed physics and aerodynamics experiments. &lt;strong&gt;Scientific experiments conducted on the Eiffel Tower include meteorological observations such as wind speed, temperature, and atmospheric pressure; pioneering aerodynamics studies using wind tunnels designed by Gustave Eiffel; astronomical observations; and early radio transmissions. The Tower housed a meteorology laboratory on its third floor, where Eiffel and other scientists performed physics and aerodynamics experiments. This scientific function, along with the installation of radio antennas, helped save the Tower from destruction by demonstrating its practical value. Additionally, 72 French scientists and engineers, including physicist Léon Foucault and chemist Jean-Baptiste Dumas, have their names engraved on the Tower, highlighting its role as a hub of scientific advancement.&lt;/strong&gt; He also invited other scientists to use the lab for their studies. Ultimately, his approach helped secure the tower a longer lease on life.
&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-c213c82a&quot;&gt;Gim42/Getty Images&lt;/p&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;
&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-ea68a552&quot; id=&quot;mntl-sc-block_33-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; A radio antenna saved the Eiffel Tower from being torn down. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-de47164c&quot; id=&quot;mntl-sc-block_34-0&quot;&gt; From the beginning, the Eiffel Tower was only supposed to remain up 20 years after the 1889 World’s Fair—it was supposed to be torn down afterward. Eiffel was &lt;em&gt;very &lt;/em&gt;aware of this and cleverly ensured the Tower’s existence by enhancing it with a radio antenna and a wireless telegraph transmitter. The Tower began transmitting radio signals locally at the turn of the 20th century, acting as a military radio post in 1903 and later helping France to defend itself from enemy attacks during the First World War. The radio’s usefulness secured the tower a 70-year extension on its lease—and by the time it was up in 1980, the monument’s iconic silhouette had become an irrevocable part of Paris’ skyline.
&lt;/p&gt;
&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-67a775cb&quot; id=&quot;mntl-sc-block_38-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower once housed a post office and a theater.  &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-29a8fed0&quot; id=&quot;mntl-sc-block_39-0&quot;&gt; Over the decades, the Iron Lady has been home to a rotating cast of businesses, some of which lasted as little as six months. Some businesses that have set up shop in the tower include the French newspaper Le Figaro; a post office; a radio station; and a wooden theater designed by Sauvestre. Today, the tower is home to restaurants, souvenir shops, and a Champagne bar. 
&lt;/p&gt;
&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-0459cc51&quot; id=&quot;mntl-sc-block_43-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower’s light show dates back 100 years.  &lt;/span&gt; &lt;/h2&gt;&lt;/div&gt;

&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-towers-light-show-dates-back-100-years&quot;&gt;&lt;/span&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-f18b121b&quot; id=&quot;mntl-sc-block_44-0&quot;&gt; Perhaps the most dazzling time of day to visit the Eiffel Tower is in the evenings when 20,000 bulbs illuminate the structure in a sparkling display. It’s been a century since the Tower’s first light show, which took place during the International Exhibition of Modern Decorative and Industrial Arts in 1925. For the occasion, automaker Andre Citröen financed an epic nighttime display of Zodiac symbols, comets, and his car brand’s name. Today, all 20,000 lights sparkle for the first five minutes of every hour beginning after dusk, with a grand finale at midnight or 1 a.m., depending on the time of year. 
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_45-0&quot;&gt;&lt;/div&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-231fcc39&quot; id=&quot;mntl-sc-block_46-0&quot;&gt; While you’re free to snap as many personal photos as you’d like of the Eiffel Tower during the day and at night, the light show is protected by copyright under French law—professionals will need to request permission to use photos or videos of the display.
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_47-0&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-it-was-almost-destroyed-during-world-war-ii&quot;&gt;&lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-2ae9f2d1&quot; id=&quot;mntl-sc-block_48-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It was almost destroyed during World War II. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-1d5c24cf&quot; id=&quot;mntl-sc-block_49-0&quot;&gt; Towards the end of World War II, as the Nazi hold on occupied Paris was slipping and Allied troops were closing in, Adolf Hitler commanded his generals to level the city and destroy its most famous monuments with explosives—including the Eiffel Tower. Thankfully, Allied troops arrived before the orders were able to be carried out, and the tower was spared from extensive damage. On the top floor, you can find a plaque commemorating the liberation of Paris.
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_50-0&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-tower-changes-size-with-the-seasons&quot;&gt;&lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-939397fb&quot; id=&quot;mntl-sc-block_51-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower changes size with the seasons. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-359e79fd&quot; id=&quot;mntl-sc-block_52-0&quot;&gt; Paris has its own leaning tower of sorts—the Iron Lady, while sturdy and wind-resistant, sways during storms and tilts a few inches away from the sun on hot days. In the summer, the sun’s heat causes the iron to expand, adding a few millimeters to the tower’s overall height, while the metal shrinks infinitesimally in winter.
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_53-0&quot;&gt;&lt;/div&gt;
&lt;figure class=&quot;comp mntl-sc-block travelandleisure-sc-block-image mntl-sc-block-image mntl-sc-block-image--no-theme no-theme figure-landscape figure-high-res&quot; id=&quot;mntl-sc-block_54-0&quot;&gt; &lt;div class=&quot;figure-media&quot;&gt;
&lt;div class=&quot;img-placeholder&quot; style=&quot;padding-bottom:66.6%;&quot;&gt;

&lt;/div&gt; &lt;/div&gt;

&lt;span class=&quot;figure-article-caption-owner&quot;&gt;&lt;p data-geo-id=&quot;geo-17252b7e&quot;&gt;Christopher Larson/Travel + Leisure&lt;/p&gt;&lt;/span&gt;
&lt;/figcaption&gt;&lt;/figure&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-gustave-eiffel-had-a-penthouse-apartment-at-the-eiffel-tower&quot;&gt;&lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-f6a5f48a&quot; id=&quot;mntl-sc-block_55-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; Gustave Eiffel had a penthouse apartment at the Eiffel Tower. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-e244c902&quot; id=&quot;mntl-sc-block_56-0&quot;&gt; As far as work perks go, securing your own pied à terre in the Eiffel Tower is hard to beat. Eiffel’s cozy abode was a private residence on the tower’s top floor that he used as a laboratory and to host luminaries, including Thomas Edison. Today, the space is open to the public, and you can pose with wax figures of Eiffel, his daughter, and Edison in the paisley-clad room.
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_57-0&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;comp mntl-sc-block travelandleisure-sc-block-featuredlink mntl-block&quot; id=&quot;mntl-sc-block_58-0&quot;&gt;&lt;div class=&quot;comp mntl-sc-block-universal-featured-link mntl-sc-block-universal-featured-link--related&quot; id=&quot;mntl-sc-block-universal-featured-link_2-0&quot;&gt;&lt;a class=&quot;mntl-sc-block-universal-featured-link__link mntl-text-link text-utility-300 global-link&quot; data-tracking-container=&quot;true&quot; data-tracking-id=&quot;featured-link&quot; href=&quot;https://www.travelandleisure.com/3-days-in-paris-itinerary-8409996&quot; id=&quot;mntl-sc-block-universal-featured-link__link_2-0&quot; rel=&quot;nocaes&quot;&gt;&lt;span class=&quot;link__wrapper&quot;&gt;How to Spend 3 Days in Paris, Including Luxury Hotels, Natural Wine Spots, and Under-the-radar Museums&lt;/span&gt;&lt;/a&gt;
&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_59-0&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-theres-a-champagne-bar-at-the-top&quot;&gt;&lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-5705109c&quot; id=&quot;mntl-sc-block_60-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; There’s a Champagne bar at the top. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-0f054031&quot; id=&quot;mntl-sc-block_61-0&quot;&gt; Is there anything more romantic than sipping Champagne while overlooking the City of Light? The &lt;a data-component=&quot;link&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;externalLink&quot; href=&quot;https://www.restaurants-toureiffel.com/&quot;&gt;Champagne Bar,&lt;/a&gt; located on the very top floor of the Eiffel Tower, is a perfect place to soak in the unobstructed views of the city below with a celebratory glass of bubbly in hand—a tipple particularly well-earned for those who opt to climb the tower’s dizzying steps.
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_62-0&quot;&gt;&lt;/div&gt;
&lt;figure class=&quot;comp mntl-sc-block travelandleisure-sc-block-image mntl-sc-block-image mntl-sc-block-image--no-theme no-theme figure-landscape figure-high-res&quot; id=&quot;mntl-sc-block_63-0&quot;&gt; &lt;div class=&quot;figure-media&quot;&gt;
&lt;div class=&quot;img-placeholder&quot; style=&quot;padding-bottom:66.6%;&quot;&gt;
&lt;img alt=&quot;View of paris at night&quot; class=&quot;lazyload mntl-image mntl-image universal-image__image&quot; data-click-tracked=&quot;true&quot; data-expand=&quot;300&quot; data-hi-res-src=&quot;https://www.travelandleisure.com/thmb/4vlmrCX7L6Cq7wyQPZBk8ikRjt8=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/TAL-eiffel-tower-at-night-EIFFEL0425-d7c923bcad434fdc9f2d18765cf5fc9d.jpg&quot; data-img-lightbox=&quot;true&quot; data-sizes=&quot;750px&quot; data-src=&quot;https://www.travelandleisure.com/thmb/4vlmrCX7L6Cq7wyQPZBk8ikRjt8=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/TAL-eiffel-tower-at-night-EIFFEL0425-d7c923bcad434fdc9f2d18765cf5fc9d.jpg&quot; data-srcset=&quot;https://www.travelandleisure.com/thmb/-ntC6kd8pG8ulv_w9F7-zoKruzQ=/750x0/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/TAL-eiffel-tower-at-night-EIFFEL0425-d7c923bcad434fdc9f2d18765cf5fc9d.jpg 750w&quot; data-tracking-container=&quot;true&quot; height=&quot;1333&quot; id=&quot;mntl-sc-block-image_5-0&quot; width=&quot;2000&quot;/&gt;
&lt;/div&gt; &lt;/div&gt;
&lt;figcaption class=&quot;comp mntl-figure-caption text-utility-100 figure-article-caption&quot; id=&quot;mntl-figure-caption_5-0&quot;&gt; &lt;span class=&quot;figure-article-caption-text&quot;&gt;The Eiffel Tower lit at night.&lt;/span&gt;
&lt;span class=&quot;figure-article-caption-owner&quot;&gt;&lt;p data-geo-id=&quot;geo-cb626fd7&quot;&gt;Leopoldine Bauer/Travel + Leisure&lt;/p&gt;&lt;/span&gt;
&lt;/figcaption&gt;&lt;/figure&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-it-was-sold-for-scraps-in-1925by-a-con-artist&quot;&gt;&lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-db70b277&quot; id=&quot;mntl-sc-block_64-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It was “sold” for scraps in 1925—by a con artist. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-3d75d189&quot; id=&quot;mntl-sc-block_65-0&quot;&gt; In the wake of Eiffel’s death in 1923, the monument’s fate seemed uncertain. Inspired by rumors of declining attendance and the steep cost of upkeep, infamous con artist &lt;a data-component=&quot;link&quot; data-ordinal=&quot;1&quot; data-source=&quot;inlineLink&quot; data-type=&quot;externalLink&quot; href=&quot;https://www.smithsonianmag.com/history/man-who-sold-eiffel-tower-twice-180958370/&quot;&gt;Victor Lustig&lt;/a&gt; hatched a plan to impersonate a Parisian civil servant, sending seemingly official letters to scrap metal companies stating that the City of Paris was selling it for scraps.
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_66-0&quot;&gt;&lt;/div&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-0eecf69f&quot; id=&quot;mntl-sc-block_67-0&quot;&gt; One unlucky man fell for the scam, but Lustig had already run off to Austria with the money. Ironically, he returned years later in an attempt to sell the tower once again. Lustig was eventually imprisoned in the United States at Alcatraz in 1935 and died there in 1947.
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_68-0&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-tower-was-once-the-tallest-building-in-the-world&quot;&gt;&lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-24cc0071&quot; id=&quot;mntl-sc-block_69-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower was once the tallest building in the world. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-2fa0a985&quot; id=&quot;mntl-sc-block_70-0&quot;&gt; For four decades after its construction, the Iron Lady held the distinction of being the tallest building in the world, rising a dramatic 1,024 feet over Paris. In 1930, New York’s budding skyline cinched the record, first with the Chrysler Building (at 1,046 feet tall), followed by the Empire State Building’s 1931 debut, which clocked in at 1,250 feet tall.
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_71-0&quot;&gt;&lt;/div&gt;
&lt;figure class=&quot;comp mntl-sc-block travelandleisure-sc-block-image mntl-sc-block-image mntl-sc-block-image--no-theme no-theme figure-landscape figure-high-res&quot; id=&quot;mntl-sc-block_72-0&quot;&gt; &lt;div class=&quot;figure-media&quot;&gt;
&lt;div class=&quot;img-placeholder&quot; style=&quot;padding-bottom:66.5%;&quot;&gt;
&lt;img alt=&quot;Looking up at Eiffel Tower&quot; class=&quot;lazyload mntl-image mntl-image universal-image__image&quot; data-click-tracked=&quot;true&quot; data-expand=&quot;300&quot; data-hi-res-src=&quot;https://www.travelandleisure.com/thmb/OfkhwN2wOBiPkyLHXWD-VEj00vY=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/TAL-looking-up-eiffel-tower-EIFFELTWRTOP100-6d7c123091a64671aeedc1a1a41cbdbe.jpg&quot; data-img-lightbox=&quot;true&quot; data-sizes=&quot;750px&quot; data-src=&quot;https://www.travelandleisure.com/thmb/OfkhwN2wOBiPkyLHXWD-VEj00vY=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/TAL-looking-up-eiffel-tower-EIFFELTWRTOP100-6d7c123091a64671aeedc1a1a41cbdbe.jpg&quot; data-srcset=&quot;https://www.travelandleisure.com/thmb/YWdxtQ6AIyFcsdroCSm6Ajwf4yY=/750x0/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/TAL-looking-up-eiffel-tower-EIFFELTWRTOP100-6d7c123091a64671aeedc1a1a41cbdbe.jpg 750w&quot; data-tracking-container=&quot;true&quot; height=&quot;1330&quot; id=&quot;mntl-sc-block-image_6-0&quot; width=&quot;2000&quot;/&gt;
&lt;/div&gt; &lt;/div&gt;
&lt;figcaption class=&quot;comp mntl-figure-caption text-utility-100 figure-article-caption&quot; id=&quot;mntl-figure-caption_6-0&quot;&gt; &lt;span class=&quot;figure-article-caption-text&quot;&gt;View of looking up into the Eiffel Tower.&lt;/span&gt;
&lt;span class=&quot;figure-article-caption-owner&quot;&gt;&lt;p data-geo-id=&quot;geo-2942c2fc&quot;&gt;Kryssia Campos/Getty Images&lt;/p&gt;&lt;/span&gt;
&lt;/figcaption&gt;&lt;/figure&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-its-changed-color-over-the-years&quot;&gt;&lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-e35235af&quot; id=&quot;mntl-sc-block_73-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It’s changed color over the years. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-e0d54ce9&quot; id=&quot;mntl-sc-block_74-0&quot;&gt; The tower gets a fresh paint job every seven years to protect against oxidation. It was initially covered with a shade of reddish brown and then spent its adolescent years—from 1892 to 1906—under a bright ochre hue. The current “Eiffel Tower Brown” was adopted in 1968 and was selected for its ability to blend in with the surrounding cityscape. And, in fact, it's actually three shades of brown: the darkest color is at the bottom, while the lightest is at the top.&lt;br/&gt;
&lt;/p&gt;
&lt;div class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot; id=&quot;mntl-sc-block_75-0&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-tower-is-ecofriendly&quot;&gt;&lt;/span&gt;&lt;h2 class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; data-geo-id=&quot;geo-22c6572a&quot; id=&quot;mntl-sc-block_76-0&quot; style=&quot;&quot;&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower is ecofriendly. &lt;/span&gt; &lt;/h2&gt;
&lt;p class=&quot;comp mntl-sc-block mntl-sc-block-html&quot; data-geo-id=&quot;geo-827abafc&quot; id=&quot;mntl-sc-block_77-0&quot;&gt; The iconic landmark is more than just a pretty face—it’s also a beacon of renewable energy. In 2015, two vertical-axis wind turbines were installed on the tower’s second floor, suspended 400 feet above the ground in order to capture wind. These turbines, which are practically silent and were painted to blend in seamlessly with the tower, power the souvenir shop, restaurant, and other businesses on the tower’s first floor.
&lt;/p&gt;&lt;/div&gt;
