&lt;/span&gt;&lt;div class=&quot;component-rich-text&quot; data-dcnode-id=&quot;432&quot;&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div data-dcnode-id=&quot;434&quot;&gt;&lt;p data-dcnode-id=&quot;582&quot;&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;The Eiffel tower history represents a part of national heritage. It's&amp;nbsp;as been the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;595&quot;&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;symbol of France and Paris&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt; for decades. But when &lt;/span&gt;&lt;strong data-dcnode-id=&quot;592&quot;&gt;&lt;span data-dcnode-id=&quot;593&quot; instrument_node=&quot;&quot;&gt;Gustave Eiffel&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt; achived its construction in 1889, the tower was only meant to be &lt;/span&gt;&lt;strong data-dcnode-id=&quot;589&quot;&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;temporary&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt; in the Parisian landscape and was far from being the parisians' favourite landmark. Discover the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;583&quot;&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt;evolution and the history of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;585&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pariscityvision.com/en/paris/landmarks/eiffel-tower&quot;&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt;Paris Eiffel Tower&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;579&quot;&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;Eiffel Tower history : the beginning&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;554&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;The most popular tourist place in Paris has stretched to the Parisian skies for &lt;/span&gt;&lt;strong data-dcnode-id=&quot;575&quot;&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;127 years&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;. Although now symbolic of France, it wasn’t meant to last. Without a doubt, &lt;/span&gt;&lt;strong data-dcnode-id=&quot;572&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;the turning point in the Eiffel Tower history took place at the 1889 Universal Exposition&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;. In commemoration of the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;569&quot;&gt;&lt;span data-dcnode-id=&quot;570&quot; instrument_node=&quot;&quot;&gt;100th anniversary of the French Revolution&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;, a competition was organized with the aim to “build on the Champ-de-Mars an iron tower with a square base, 125 meters wide and 300 meters high.” Out of the 107 proposals submitted, &lt;/span&gt;&lt;strong data-dcnode-id=&quot;565&quot;&gt;&lt;a data-dcnode-id=&quot;566&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pariscityvision.com/en/paris/landmarks/eiffel-tower/gustave-eiffel&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;Gustave Eiffel&lt;/span&gt;&lt;/a&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;’s was chosen. By his side were engineers &lt;/span&gt;&lt;strong data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;Maurice Koechlin&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;strong data-dcnode-id=&quot;559&quot;&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;Emile Nouguier&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt; as well as architect &lt;/span&gt;&lt;strong data-dcnode-id=&quot;556&quot;&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;Stephen Sauvestre&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;551&quot;&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;The Iron Lady facing skepticism&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;539&quot;&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;The Eiffel Tower history&amp;nbsp;was not an easy one. At the time, many were against the building and voiced their concern in a letter entitled &quot;&lt;/span&gt;&lt;strong data-dcnode-id=&quot;547&quot;&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;Artists Against Mr. Eiffel’s Tower&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;&quot;, stating the tower to be a threat against the aesthetic nature of Paris. An iron tower erected smack in the heart of Paris &lt;/span&gt;&lt;strong data-dcnode-id=&quot;544&quot;&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;was considered unacceptable&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;543&quot; instrument_node=&quot;&quot;&gt;, a stark contrast to the elegance and refined beauty of the city. For example, Verlaine nicknamed the Eiffel Tower the “&lt;/span&gt;&lt;strong data-dcnode-id=&quot;541&quot;&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;Skeleton of Beffroi&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;” to demonstrate the giant tower’s ungainly appearance that was bound to “disfigure” the city.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;536&quot;&gt;&lt;img class=&quot;lazyload&quot; data-dcnode-id=&quot;537&quot; data-src=&quot;//cdn.pariscityvision.com/library/image/5144.jpg&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;533&quot;&gt;&lt;span data-dcnode-id=&quot;534&quot; instrument_node=&quot;&quot;&gt;The history of the construction of the Eiffel Tower (1887- 1889)&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;527&quot;&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;Despite all the uproar, the frail iron tower would nonetheless see the day. To understand the history of the Eiffel Tower, it is important to know that its construction followed different steps. The &lt;/span&gt;&lt;strong data-dcnode-id=&quot;529&quot;&gt;&lt;span data-dcnode-id=&quot;530&quot; instrument_node=&quot;&quot;&gt;construction itself lasted two years&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;488&quot;&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;521&quot;&gt;&lt;strong data-dcnode-id=&quot;523&quot;&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;June 1884&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt; : The project began and the first drawings were done.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;516&quot;&gt;&lt;strong data-dcnode-id=&quot;518&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;January 28th, 1887&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt; : The works begin.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;511&quot;&gt;&lt;strong data-dcnode-id=&quot;513&quot;&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;April 1st, 1888&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt; : The first stage was completed.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;506&quot;&gt;&lt;strong data-dcnode-id=&quot;508&quot;&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;August 14th, 1888&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt; : The second stage was completed.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;501&quot;&gt;&lt;strong data-dcnode-id=&quot;503&quot;&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;March 31st, 1889&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt; : The third and final stage in which the tower was completed in its entirety ended.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;490&quot;&gt;&lt;strong data-dcnode-id=&quot;498&quot;&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;The Eiffel Tower was inaugurated on March 31, 1889&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;. Gustave Eiffel walked the 1,710 steps to the top of the Tower to place the tricolored &lt;/span&gt;&lt;strong data-dcnode-id=&quot;495&quot;&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;French flag at its summit&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;. At the time, the Tower was &lt;/span&gt;&lt;strong data-dcnode-id=&quot;492&quot;&gt;&lt;span data-dcnode-id=&quot;493&quot; instrument_node=&quot;&quot;&gt;312 meters high&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;482&quot;&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;To know more details about the Eiffel Tower history of the construction, &lt;/span&gt;&lt;a data-dcnode-id=&quot;484&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.toureiffel.paris/en/the-monument/history&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;485&quot; instrument_node=&quot;&quot;&gt;click here&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;479&quot;&gt;&lt;span data-dcnode-id=&quot;480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;476&quot;&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt;Story of a temporary building turned into a French symbol&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;455&quot;&gt;&lt;span data-dcnode-id=&quot;474&quot; instrument_node=&quot;&quot;&gt;When the project came to being, it had been established that the licensing rights linked to the convention for the tower’s construction would last only 20 years, followed by imminent destruction. However, &lt;/span&gt;&lt;strong data-dcnode-id=&quot;472&quot;&gt;&lt;span data-dcnode-id=&quot;473&quot; instrument_node=&quot;&quot;&gt;two million people visited the Tower&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt; during the Universal Exposition. Following this incredible success, the building became a &lt;/span&gt;&lt;strong data-dcnode-id=&quot;469&quot;&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt;symbol of French industrial power&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;. The Tower was as equally as successful during the 1900 Universal Exposition. Determined to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;466&quot;&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;avoid the Tower’s destruction&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;, Gustave Eiffel went to great lengths to &lt;/span&gt;&lt;strong data-dcnode-id=&quot;463&quot;&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;prove its scientific utility&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt;. Scientific experiments were conducted in the fields of astronomy and physiology but what would really save the Tower in the end was its use as a radio antenna tower, first for military communications and then for permanent, radiotelegraphy communications; in fact, &lt;/span&gt;&lt;strong data-dcnode-id=&quot;460&quot;&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;the Tower served many a purpose during the First World War&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;459&quot; instrument_node=&quot;&quot;&gt;. The Eiffel Tower is&lt;/span&gt;&lt;strong data-dcnode-id=&quot;457&quot;&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt; part of the French History&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;443&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;The success story of the Eiffel Tower&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;435&quot;&gt;&lt;strong data-dcnode-id=&quot;440&quot;&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;Every year approximately 7 million visitors climb the Tower&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;. Its success is such that many countries all over the world have replicated the Tower more or less identically to the original one. Can you really imagine Paris without the Eiffel Tower? During your stay in Paris, don't miss the &lt;/span&gt;&lt;a data-dcnode-id=&quot;437&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.pariscityvision.com/en/paris/landmarks/eiffel-tower/eiffel-tower-lights&quot;&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;Eiffel Tower light shows&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt; that have been delighting the tourists and Parisians since the end of the XIXth century.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;
