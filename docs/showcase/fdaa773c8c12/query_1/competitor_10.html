&lt;/span&gt;&lt;p data-dcnode-id=&quot;1472&quot;&gt;&lt;span data-dcnode-id=&quot;1476&quot; instrument_node=&quot;&quot;&gt;Probably the most common explanation for why we see ghosts is sleep paralysis. Sleep paralysis “is like &lt;/span&gt;&lt;a data-dcnode-id=&quot;1474&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/watch%3Fv%3Dm0g7W_fVW-Y&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1475&quot; instrument_node=&quot;&quot;&gt;dreaming with your eyes open&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1473&quot; instrument_node=&quot;&quot;&gt;,” says Dr. Baland Jalal. As a neuroscientist, Dr. Jalal studies sleep paralysis at the University of Cambridge in England. He explains that we often experience very lifelike dreams during REM—rapid eye movement—sleep. While in REM sleep, our eyes can move around fairly rapidly under closed eyelids. However, the rest of our body doesn’t—or can’t—move. People may experience this and think they are paralyzed. However, the inability to move is likely “to prevent people from acting out their dreams.” &lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;code-block code-block-1&quot; data-dcnode-id=&quot;992&quot; style=&quot;margin: 8px 0; clear: both;&quot;&gt;&lt;span data-dcnode-id=&quot;1471&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;985&quot;&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;A lot of the most common examples of supernatural behavior can be explained by this neurological phenomenon: hallucinations, the physical presence of someone or something sitting or lying on a body, and even demon scratches. Yep, you most likely feel something did really happen, but you were in a terrifying awake-dream state instead.&lt;/span&gt;&lt;a data-dcnode-id=&quot;986&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//journals.sagepub.com/doi/full/10.1177/1363461520909609&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;987&quot;&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;941&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;The use of suggestion is a powerful tool, and well-known studies have been done, but only recently have we investigated the power of suggestion with regard to paranormal events. In fact, some might say the entire Spiritualist movement is based on this theory of trickery. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;938&quot;&gt;&lt;span data-dcnode-id=&quot;939&quot; instrument_node=&quot;&quot;&gt;In 2003, Richard Wiseman conducted two experiments for the British Journal of Psychology. The purpose was to examine the power of suggestion in a séance setting, asking whether belief in the paranormal made participants more prone to suggestion. The first experiment consisted of a fake medium who held a séance. During the evening, the psychic inferred that the table had moved. About one-third of the participants later reported that the table did move—though the table remained stationary throughout the experiment. They had wrongly reported the movement. Believers in the paranormal were more likely to misreport such activity than disbelievers. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;935&quot;&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;Paranormal believers were more inclined to believe in the suggestions made or inferred by the medium than disbelievers following the next set of fake séances as well—with one caveat. They only reported that something happened when the suggestion aligned with their personal belief in the paranormal. For example, if the fake medium suggested that an object had not moved when in fact, it had—through trickery, of course—believers were no more likely to accept the suggestion than disbelievers. Overall, around one-fifth of the participants believed they had witnessed genuine paranormal phenomena.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;929&quot;&gt;&lt;span data-dcnode-id=&quot;933&quot; instrument_node=&quot;&quot;&gt;It’s unknown whether the verbal suggestion directly affected the participants’ perception of the event, their memory of the event, or both. An existing belief in the paranormal did reveal the group’s likelihood of reporting a paranormal event when it didn’t happen, whether through true belief, suggestion, or demand characteristics—essentially, subtle cues that reveal to the participants what the experimenter expects to find or how the participants are expected to act. Still, the result is the same: a large minority of the participants reported that certain objects had moved and that they had witnessed genuinely paranormal events.&lt;/span&gt;&lt;a data-dcnode-id=&quot;930&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//psycnet.apa.org/record/2003-07425-001&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;931&quot;&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;928&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;881&quot;&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;It might be cheating to say this, but sometimes supernatural occurrences can be explained by weird, yet not supernatural, things the Earth does every day. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;878&quot;&gt;&lt;span data-dcnode-id=&quot;879&quot; instrument_node=&quot;&quot;&gt;Consider the Oracle of Delphi. Some considered the Pythia’s trance state supernatural and paranormal. She could speak to the spirits, the gods, and any other mythical, magical being to tell the future. People came to Delphi from hundreds of miles just to listen to her visions and see the ancient medium commune with invisible otherworldly beings. Was it all a hoax? Probably not. Scientists are pretty much in unanimous agreement that hydrocarbon gases from bituminous limestone under the Earth where Delphi sat probably brought on the Pythia’s trance. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;869&quot;&gt;&lt;span data-dcnode-id=&quot;876&quot; instrument_node=&quot;&quot;&gt;In fact, a geological team from Wesleyan University found &lt;/span&gt;&lt;a data-dcnode-id=&quot;874&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/article/gaseous-emissions-at-orac/%23%3A~%3Atext%3DThe%2520Oracle%2520of%2520Delphi%2520was%2Cfor%2520guidance%2520in%2520ancient%2520Greece.%26text%3DThe%2520scientists%2520say%2520that%2520hydrocarbon%2Cwater%2520located%2520near%2520the%2520oracle&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;ethane, methane, and ethylene&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt; in spring water near the oracle. All the magical fumes inside the Oracle’s cave? Probably just some extremely toxic gasses. We may not all be suffering from faultline gas poisoning when we see our long-lost grandmother, but some of the oldest tales of the supernatural come from a time where furnaces were poorly regulated, mercury was on the loose in food and drink, and candle flames were notorious for throwing shadows. Eventually, those stories get passed down, revamped, and modernized to create some scary ghosts.&lt;/span&gt;&lt;a data-dcnode-id=&quot;870&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.npr.org/transcripts/533791342&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;871&quot;&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;822&quot;&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;If you’re a frequent watcher of televised ghost hunting shows, you may know about EMF readers. Supposedly, a ghost can manifest itself using the electromagnetic fields in the room. If that frequency is high enough, theoretically, ghosts could just appear and move objects all by themselves. The thing about EMF readers is that they’re incredibly unreliable. Things like cellphones and camera batteries can &lt;/span&gt;&lt;a data-dcnode-id=&quot;824&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.theatlantic.com/science/archive/2016/11/the-broken-technology-of-ghost-hunting/506627/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;set off the meters&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;. However, it turns out there is some science behind EMF and ghostly behavior. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;816&quot;&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;The explanation is something known as the “fear frequency.” Human ears (especially adults) have trouble hearing low-frequencies below ~20 Hertz (or infrasound). However, the body can still sense them, often causing feelings of uneasiness, chills, or “&lt;/span&gt;&lt;a data-dcnode-id=&quot;818&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//theboar.org/2021/10/can-ghosts-be-explained-by-science/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;nervous feelings of revulsion and fear&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;810&quot;&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;This theory helped solve a local ghost story. On Coventry University’s campus, there’s a 14th-century cellar supposedly home to a ghost. That is until lecturer Vic Tandy examined the room and found infrasound levels that explained the paranormal experiences. So, is it a ghost giving you the creeps? Probably not. It’s just your body experiencing a very normal reaction to the environment around it.&lt;/span&gt;&lt;a data-dcnode-id=&quot;811&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.coventrytelegraph.net/news/coventry-news/pioneering-ghost-hunter-vic-dies-3133806&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;812&quot;&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;757&quot;&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;Let’s face it, if you walk into a decrepit hospital or haunted house, you’re already going to be on edge about ghostly apparitions. Perhaps you’re in an area where wiring isn’t a problem, so we don’t have to worry about EMF. There’s not a living soul for miles, so human interference is also out. What about black mold? Asbestos? Rye ergot? There’s a high probability all the abandoned buildings have some of these toxic molds hanging out in the damp basements, deteriorating ceilings, and closed-up rooms, in addition to wafting through the air. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;754&quot;&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;It’s possible all the ghostly sightings are just a result of bad air quality in “haunted” places. Associate Professor of Civil &amp;amp; Environmental Engineering Shane Rogers said, “The links between exposure to toxic indoor molds and psychological effects in people are not well established; however, notably, many hauntings are associated with structures that are prime environments to harbor molds or other indoor air quality problems.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;753&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;748&quot;&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;The mold theory could also be an example of what paranormal investigators sometimes call “demonic activity.” On television, you might see someone instantly feel sick, feel a choking sensation, or experience headaches or lightheadedness when they come across a malignant spirit. Yet, they feel instantly better when they leave the space to get fresh air. Assuming it was an actor putting on their best performance, these symptoms are also a physical manifestation of being exposed to toxic mold and fungus. Sorry to burst your bubble, but it’s probably not a demon. It’s just your body telling you to get out and get fresh air.&lt;/span&gt;&lt;a data-dcnode-id=&quot;749&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedaily.com/releases/2015/03/150331121251.htm&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;750&quot;&gt;&lt;span data-dcnode-id=&quot;751&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;745&quot;&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt; Mind/Body Disconnect&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;lyte-wrapper&quot; data-dcnode-id=&quot;706&quot; style=&quot;width:640px;max-width: 100%;margin:5px auto;&quot; title=&quot;Neuroscientists awaken ghosts… hidden in our cortex&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;lyte lP&quot; data-dcnode-id=&quot;708&quot; id=&quot;WYL_GnusbO8QjbE&quot; itemprop=&quot;video&quot; itemscope=&quot;&quot; itemtype=&quot;https://schema.org/VideoObject&quot;&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;pL&quot; data-dcnode-id=&quot;714&quot; data-src=&quot;https://listverse.com/wp-content/plugins/wp-youtube-lyte-main/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FGnusbO8QjbE%2Fhqdefault.jpg&quot; id=&quot;lyte_GnusbO8QjbE&quot;&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;play&quot; data-dcnode-id=&quot;723&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;709&quot;&gt;&lt;noscript data-dcnode-id=&quot;711&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;&amp;lt;a href=&quot;https://youtu.be/GnusbO8QjbE&quot;&amp;gt;&amp;lt;img src=&quot;https://listverse.com/wp-content/plugins/wp-youtube-lyte-main/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FGnusbO8QjbE%2F0.jpg&quot; alt=&quot;Neuroscientists awaken ghosts&amp;amp;hellip; hidden in our cortex&quot; width=&quot;640&quot; height=&quot;340&quot;&amp;gt;&amp;lt;br /&amp;gt;Watch this video on YouTube&amp;lt;/a&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;meta content=&quot;EPFL News: Ghosts only exist in our minds, and we know precisely where to look for them. Patients suffering from neurological or psychiatric conditions have often reported a strange “feeling of a presence”. EPFL researchers have now succeeded in recreating this illusion in the lab. To know more: http://actu.epfl.ch/news/neuroscientists-awaken-ghosts-hidden-in-our-cortex/&quot; data-dcnode-id=&quot;710&quot; itemprop=&quot;description&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;lL&quot; data-dcnode-id=&quot;704&quot; style=&quot;max-width:100%;width:640px;margin:5px auto;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;701&quot;&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;Feeling like a ghost or another supernatural presence is nearby? It’s likely caused by a glitch in how our brain processes self-awareness and our sense of place in space. The brain is a complex organ and can create supernatural manifestations, even if your body isn’t quite aware it’s happening. When our brains inaccurately represent our bodies in space, it can potentially create a second representation of the body, which is no longer perceived as “me” but as someone else, a “presence.” &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;698&quot;&gt;&lt;span data-dcnode-id=&quot;699&quot; instrument_node=&quot;&quot;&gt;To demonstrate this, a team of Swiss neuroscientists figured out how to conjure those spirits in a lab. The team studied the brains of a dozen patients who all suffered from neurological disorders and claim to have had experiences with ghosts. MRI results showed that they all had abnormal activity in three brain regions involved in self-awareness, movement, and positioning themselves correctly in space. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;695&quot;&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;Next, the researchers looked at a dozen healthy volunteers. They blindfolded their subjects and asked them to move their arm in a predetermined way. The participants were connected to a robot in front of them (the main robot) while a second robot was behind them (the second robot). The participants were unaware of the second robot, which was programmed to mimic the arm movements against the participant’s back. For example, if the participant made a circle then a triangle with their arm, the second robot would lightly “trace” the circle and triangle on the subject’s back. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;689&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;When the second robot completed the movement at the same time the participants moved, they didn’t report feeling anything unusual. Then, the researchers had the second robot perform the series of movements after a few seconds delay, altering the participant’s temporal and spatial perception. After a few minutes, the researchers asked the participants how they felt. Unaware of the study’s goal, several participants claimed to have felt a presence around them, with others reporting that there were ghosts in the room. A few did not complete the experiment, requesting to leave the room before the experiment was finished.&lt;/span&gt;&lt;a data-dcnode-id=&quot;690&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.cell.com/current-biology/fulltext/S0960-9822%2814%2901212-3&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;691&quot;&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;685&quot;&gt;&lt;br data-dcnode-id=&quot;687&quot;&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;678&quot;&gt;&lt;span data-dcnode-id=&quot;680&quot;&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt; Pareidolia&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;647&quot;&gt;&lt;noscript data-dcnode-id=&quot;649&quot;&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt;&amp;lt;a href=&quot;https://youtu.be/7LWrgH0nORE&quot;&amp;gt;&amp;lt;img src=&quot;https://listverse.com/wp-content/plugins/wp-youtube-lyte-main/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2F7LWrgH0nORE%2F0.jpg&quot; alt=&quot;Pareidolia: Why People Keep Seeing Crazy Stuff on Mars&quot; width=&quot;640&quot; height=&quot;340&quot;&amp;gt;&amp;lt;br /&amp;gt;Watch this video on YouTube&amp;lt;/a&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;meta content=&quot;Why do people supposedly see a woman in pictures sent from Mars by the Curiosity Rover? For the same reason that people see Pepe the Frog in their toast, or Jesus in a tortilla: a phenomenon known as pareidolia. Hosted by: Hank Green – ------ – Messages From Subbable Subscribers: &amp;quot;David loves Cori. Cori loves David. Let’s get married. Okay.&amp;quot; ~David and Cori &amp;quot;You are made of stars. Isn't that grand?&amp;quot; ~Sam Hicks &amp;quot;People everywhere in 12th grade would love videos to help with math!&amp;quot; ~Aaron Schwartz – -------- – Dooblydoo thanks go to the following Patreon supporters – we couldn't make SciShow without them! Shout out to Justin Ove, John Szymakowski, Fatima Iqbal, Justin Lentz, David Campos, and Chris Peters. – ------ – Like SciShow? Want to help support us, and also get things to put on your walls, cover your torso and hold your liquids? Check out our awesome products over at DFTBA Records: http://dftba.com/scishow Or help support us by becoming our patron on Patreon: https://www.patreon.com/scishow – ------ – Looking for SciShow elsewhere on the internet? Facebook: http://www.facebook.com/scishow Twitter: http://www.twitter.com/scishow Tumblr: http://scishow.tumblr.com Instagram: http://instagram.com/thescishow Sources: http://onlinelibrary.wiley.com/doi/10.1002/acp.2874/abstract http://www.sciencedirect.com/science/article/pii/S0010945214000288 http://www.minddisorders.com/Py-Z/Rorschach-technique.html http://www.newsmax.com/TheWire/woman-mars-photo-ghost/2015/08/12/id/669697/ http://www.cnet.com/news/ufologists-spy-woman-female-figure-in-mars-rover-pic-nasa-rolls-eyes/ http://www.forbes.com/sites/matthewfrancis/2015/08/10/no-thats-not-a-woman-on-mars/&quot; data-dcnode-id=&quot;648&quot; itemprop=&quot;description&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;639&quot;&gt;&lt;span data-dcnode-id=&quot;640&quot; instrument_node=&quot;&quot;&gt;Once again, the presence of a ghost could just be your brain having a glitch in its self-awareness. This time, it’s a totally normal and natural phenomenon called pareidolia. Pareidolia is the same function of the brain that causes us to see images in clouds or facial features on intimate objects—you know, the image of the Virgin Mary on a grilled cheese sandwich. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;638&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;636&quot;&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;Pareidolia is an ancient ability that may have helped our early ancestors survive by enabling us to identify potential hidden dangers in our environment—was that something in the grass over there? In his 1995 book The Demon-Haunted World: Science as a Candle in the Dark, Carl Sagan helped spread the claim that pareidolia is why we see certain ghostly apparitions. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;630&quot;&gt;&lt;span data-dcnode-id=&quot;634&quot; instrument_node=&quot;&quot;&gt;It’s a phenomenon that explains how our brains interpret light and shadows or figures in the distance on an eerie, foggy battlefield. It’s not that there isn’t something there to see; it’s just your brain filling in missing pieces to create an image that isn’t really there.&lt;/span&gt;&lt;a data-dcnode-id=&quot;631&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//futurism.com/pareidolia-why-we-see-what-isnt-there&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;632&quot;&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;591&quot;&gt;&lt;noscript data-dcnode-id=&quot;593&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;&amp;lt;a href=&quot;https://youtu.be/KNPU0fkUk70&quot;&amp;gt;&amp;lt;img src=&quot;https://listverse.com/wp-content/plugins/wp-youtube-lyte-main/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FKNPU0fkUk70%2F0.jpg&quot; alt=&quot;Do #Ghosts Exist as an Energy Form According to Einstein? | Smart 1-Minute Answers (No. 3) | Spirits&quot; width=&quot;640&quot; height=&quot;340&quot;&amp;gt;&amp;lt;br /&amp;gt;Watch this video on YouTube&amp;lt;/a&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;meta content=&quot;People who prefer calling themselves “ghost hunters” sometimes make a tall claim. They say that when someone dies, the person’s life energy gets conserved according to the law of conservation of energy and this energy sometimes presents itself in the form of a ghost or a spirit. Do you think this is a legitimate scientific observation? No, not really. The entire “ghost detection industry” is based on fake science and none of these so-called “ghost hunters” should be taken seriously. Why? Well, let physics answer your question. First of all, when we die, our energy starts dissipating to the surroundings in the form of heat, through a process described by physicians as “algor mortis”. The chemical energy stored inside cells starts getting consumed by the bacteria and other microorganisms present inside our body. Owing to the above reasons, there is absolutely no chance that our life energy would get magically transformed into a “spooky” form of energy. So long story short, “ghost hunters” are manipulating your mind by selling you something that is not in line with the basic laws of physics. Lastly, Dr. Albert Einstein hasn’t endorsed the existence of ghosts or spirits; neither did he get a Nobel Prize for the same. #paranormal #haunted #supernatural #ghostadventures #demonic #possession #spirit #scary #spooky #science #physics #Einstein Videonium's Playlists: Sci-Tech Research Updates From Around The World (Playlist 1): https://youtube.com/playlist?list=PLj244bOxJxJm0YS1fqm9Uuze4iMlC982t Sci-Tech Research Updates From Around The World (Playlist 2): https://youtube.com/playlist?list=PLj244bOxJxJmv85xdiwYzuzRyxDuICiW0 Smart Tips &amp;amp; &amp;quot;How To&amp;quot; Videos: https://youtube.com/playlist?list=PLj244bOxJxJmpXW8YhVSLzp_vckWsWLNq Highly Unscientific But Entertaining Ghost Videos That Are Fake &amp;amp; Funny (Playlist 1): https://youtube.com/playlist?list=PL9864BC609D8FF182 Highly Unscientific But Entertaining Ghost Videos That Are Fake &amp;amp; Funny (Playlist 2): https://youtube.com/playlist?list=PLj244bOxJxJn-KiurXvgizD08mAvJtGW8 Highly Unscientific But Entertaining Ghost Videos That Are Fake &amp;amp; Funny (Playlist 3): https://youtube.com/playlist?list=PLj244bOxJxJmNCNlmQS2GVMVnj84o-q0J Solved &amp;amp; Unsolved Mysteries: https://youtube.com/playlist?list=PLj244bOxJxJnYDs-InDzPcaEwD-Nx4hsh Interesting Google Doodles: https://youtube.com/playlist?list=PLj244bOxJxJnoLRfVzNVmJAsuSz2jR-Do Please visit the &amp;quot;About&amp;quot; section of our YouTube channel to email your business-related queries to us. Make sure you like, comment, share, and subscribe. Videonium | Targeted YouTube Videos | Q&amp;amp;A | How to | Sci-Tech | Mysteries | Music | Comedy | Random&quot; data-dcnode-id=&quot;592&quot; itemprop=&quot;description&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;583&quot;&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt;Bear with me on this one. It’s an Einstein theory to prove ghosts exist. Let’s assume ghosts are very real, and it’s not an act of supernatural but rather an act of valid scientific theory for why they appear among us. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;577&quot;&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;Paranormal researcher John Kachuba says in his book &lt;/span&gt;&lt;em data-dcnode-id=&quot;579&quot;&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;Ghosthunters&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;, “Einstein proved that all the energy of the universe is constant and that it can neither be created nor destroyed… So what happens to that energy when we die? If it cannot be destroyed, it must then be transformed into another form of energy. What is that new energy?… Could we call that new creation a ghost?” (LINK 4) It’s theorized that all the electricity that keeps our bodies moving is the same that manifests spirits. That’s why ghost hunters rely so heavily on devices to measure that energy. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;574&quot;&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;In fact, Einstein’s theory is still valid, and we do have science to explain what happens to all that energy when we die. However, the answer is not “turns us into ghosts.” After a person dies, the energy in the body goes into the environment—that’s where all organisms’ energy goes after death. When we die, our energy is released in the form of heat. If we are eaten by animals or insects or taken in by plants via the nutrients left behind in the soil by a decomposing body, this energy is then transferred into these animals, insects, or plants. When cremated, our body’s energy leaves us as heat and light. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;568&quot;&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;Consider plants and animals for a moment. Have you ever seen a ghost cow? A ghost Venus Fly Trap? Probably not. When we eat dead plants and animals, we consume their energy and convert it for our own use. Our bodies metabolize food for energy, completing the cycle. To believe that a person’s energy would remain long after the body is gone is highly suspect. Our energy does not remain as a spirit comprised of electromagnetic energy but rather in the form of heat and chemical energy.&lt;/span&gt;&lt;a data-dcnode-id=&quot;569&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nbcnews.com/id/wbna45255505&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;570&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;515&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;I’m not a therapist, but one very common explanation of why the living sees the dead has to do with how our brain processes (or doesn’t process) &lt;/span&gt;&lt;a data-dcnode-id=&quot;517&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.artefactmagazine.com/2015/03/03/seeing-ghosts-post-traumatic-stress-disorder-in-intensive-care/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;trauma&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;512&quot;&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;Based on a study of 88 people who sought psychiatric care from 1974 to 1984, Dr. Lenore Terr proposed that many ghost reports are really the result of hallucinations and illusions drawn from horrible and often life-threatening experiences. PTSD sufferers have reported seeing, hearing, smelling, or “feeling the presence of” ghosts or other beings. Some of the children who had been attacked by animals described being “haunted” by animal spirits. Recent studies have revealed that certain mood and anxiety disorders may also affect sufferers, some of whom admitted to having had hallucinations or delusions or strange beliefs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;506&quot;&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;After a trauma, some people believe that they have psychic abilities. Severe trauma can lead to hallucinations, where what the brain is trying to process on the inside manifests itself as outside voices or images. The trauma may be from a short-term event like a car accident or more long-term events like prolonged domestic violence or child abuse. The inability or fear of dealing with the trauma can enable the sufferer to see or believe they see apparitions and other paranormal activities. These experiences may be the unconscious mind forcing the sufferer to finally deal with their trauma, leading to the end of the “hauntings.”&lt;/span&gt;&lt;a data-dcnode-id=&quot;507&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//drnataliedyer.com/blog/broken-open-how-trauma-can-make-us-psychic/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;508&quot;&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;459&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;I know this sounds a bit like &lt;/span&gt;&lt;em data-dcnode-id=&quot;461&quot;&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt;Ghostbusters&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt; to bring up ions and proton packs, but it’s based on some real science to explore the supernatural. By nature, a negative ion is an atom that carries an extra electron in its shell and vice versa for a positive ion. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;456&quot;&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;Some paranormal researchers claim that spirits can hinder normal ion balance in the atmosphere. In contrast, others say ghosts use the ions’ energy to manifest or interact with the physical world. I wouldn’t trust a ghost hunter with an ion meter. It’s all very unreliable technology to base results on. You see, ions are caused by all kinds of natural phenomena like weather, solar radiation, and radon gas. It all comes down to how one interprets the evidence. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;455&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;450&quot;&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;However, positive and negative ions can affect the moods of the living. Negative ions can make us feel calm and relaxed, while positive ions can give us headaches and nausea. This might explain why people who live in “haunted” houses describe fatigue, headaches, and illness. When they feel an ion imbalance, they may think paranormal, not normal.&lt;/span&gt;&lt;a data-dcnode-id=&quot;451&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.assap.ac.uk/newsite/htmlfiles/NID.html&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;sup data-dcnode-id=&quot;452&quot;&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;
