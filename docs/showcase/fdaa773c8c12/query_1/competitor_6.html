attainability of the VFI, but little has been said about whether a
value-free science is desirable in the first place. This subsection
discusses this topic with special attention to informing and advising
public policy from a scientific perspective. While the VFI, and many
arguments for and against it, can be applied to science as a whole,
the interface of science and public policy is the place where the
intrusion of values into science is especially salient, and where it
is surrounded by the greatest controversy. In the 2009
“Climategate” affair, leaked emails from climate
scientists raised suspicions that they were pursuing a particular
socio-political agenda that affected their research in an improper
way. Later inquiries and reports absolved them from charges of
misconduct, but the suspicions alone did much to damage the authority
of science in the public arena.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2922&quot;&gt;&lt;span data-dcnode-id=&quot;2951&quot; instrument_node=&quot;&quot;&gt;
Indeed, many debates at the interface of science and public policy are
characterized by disagreements on propositions that combine a factual
basis with specific goals and values. Take, for instance, the view
that growing transgenic crops carries too much risk in terms of
biosecurity, or addressing global warming by phasing out fossil
energies immediately. The critical question in such debates is whether
there are theses &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2950&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2940&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;T&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-1-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2945&quot; id=&quot;MJXc-Node-1&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2946&quot; id=&quot;MJXc-Node-2&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2947&quot; id=&quot;MJXc-Node-3&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2948&quot; style=&quot;padding-top: 0.483em; padding-bottom: 0.303em; padding-right: 0.12em;&quot;&gt;&lt;span data-dcnode-id=&quot;2949&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2941&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2942&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2943&quot;&gt;&lt;span data-dcnode-id=&quot;2944&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2937&quot; instrument_node=&quot;&quot;&gt; such that one side in the debate endorses
&lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2936&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2926&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;T&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-2-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2931&quot; id=&quot;MJXc-Node-4&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2932&quot; id=&quot;MJXc-Node-5&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2933&quot; id=&quot;MJXc-Node-6&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2934&quot; style=&quot;padding-top: 0.483em; padding-bottom: 0.303em; padding-right: 0.12em;&quot;&gt;&lt;span data-dcnode-id=&quot;2935&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2927&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2928&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2929&quot;&gt;&lt;span data-dcnode-id=&quot;2930&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2923&quot; instrument_node=&quot;&quot;&gt;, the other side rejects it, the evidence is shared, and both
sides have good reasons for their respective positions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2921&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2916&quot;&gt;&lt;span data-dcnode-id=&quot;2920&quot; instrument_node=&quot;&quot;&gt;
According to the VFI, scientists should uncover an epistemic,
value-free basis for resolving such disagreements and restrict the
dissent to the realm of value judgments. Even if the VNT should turn
out to be untenable, and a strict separation to be impossible, the VFI
may have an important function for &lt;/span&gt;&lt;em data-dcnode-id=&quot;2918&quot;&gt;&lt;span data-dcnode-id=&quot;2919&quot; instrument_node=&quot;&quot;&gt;guiding&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2917&quot; instrument_node=&quot;&quot;&gt; scientific
research and for minimizing the impact of values on an objective
science. In the philosophy of science, one camp of scholars defends
the VFI as a necessary antidote to individual and institutional
interests, such as Hugh Lacey (1999, 2002), Ernan McMullin (1982) and
Sandra Mitchell (2004), while others adopt a critical attitude, such
as Helen Longino (1990, 1996), Philip Kitcher (2011a) and Heather
Douglas (2009). These criticisms we discuss mainly refer to the
desirability or the conceptual (un)clarity of the VFI.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2907&quot;&gt;&lt;span data-dcnode-id=&quot;2914&quot; instrument_node=&quot;&quot;&gt;
First, it has been argued that the VFI is not desirable at all.
Feminist philosophers (e.g., Harding 1991; Okruhlik 1994; Lloyd 2005)
have argued that science often carries a heavy androcentric values,
for instance in biological theories about sex, gender and rape. The
charge against these values is not so much that they are contextual
rather than cognitive, but that they are unjustified. Moreover, if
scientists did follow the VFI rigidly, policy-makers would pay even
less attention to them, with a detrimental effect on the decisions
they take (Cranor 1993). Given these shortcomings, the VFI has to be
rethought if it is supposed to play a useful role for guiding
scientific research and leading to better policy decisions.
 &lt;/span&gt;&lt;a data-dcnode-id=&quot;2912&quot; href=&quot;#FeyeTyraRatiMeth&quot;&gt;&lt;span data-dcnode-id=&quot;2913&quot; instrument_node=&quot;&quot;&gt;Section 4.3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2911&quot; instrument_node=&quot;&quot;&gt;
 and
 &lt;/span&gt;&lt;a data-dcnode-id=&quot;2909&quot; href=&quot;#FemiStanEpis&quot;&gt;&lt;span data-dcnode-id=&quot;2910&quot; instrument_node=&quot;&quot;&gt;section 5.2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2908&quot; instrument_node=&quot;&quot;&gt;
 elaborate on this line of criticism in the context of scientific
community practices, and a science in the service of society.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2906&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2895&quot;&gt;&lt;span data-dcnode-id=&quot;2905&quot; instrument_node=&quot;&quot;&gt;
Second, the autonomy of science often fails in practice due to the
presence of external stakeholders, such as funding agencies and
industry lobbies. To save the epistemic authority of science, Douglas
(2009: 7–8) proposes to detach it from its autonomy by
reformulating the VFI and distinguishing between &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2903&quot;&gt;&lt;span data-dcnode-id=&quot;2904&quot; instrument_node=&quot;&quot;&gt;direct and
indirect roles of values in science&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2902&quot; instrument_node=&quot;&quot;&gt;. Contextual values may
legitimately affect the assessment of evidence by indicating the
appropriate standard of evidence, the representation of complex
processes, the severity of consequences of a decision, the
interpretation of noisy datasets, and so on (see also Winsberg 2012).
This concerns, above all, policy-related disciplines such as climate
science or economics that routinely perform scientific risk analyses
for real-world problems (cf. also Shrader-Frechette 1991). Values
should, however, not be “reasons in themselves”, that is,
evidence or defeaters for evidence (direct role, illegitimate) and as
“helping to decide what should count as a &lt;/span&gt;&lt;em data-dcnode-id=&quot;2900&quot;&gt;&lt;span data-dcnode-id=&quot;2901&quot; instrument_node=&quot;&quot;&gt;sufficient&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2899&quot; instrument_node=&quot;&quot;&gt;
reason for a choice” (indirect role, legitimate). This
prohibition for values to replace or dismiss scientific evidence is
called &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2897&quot;&gt;&lt;span data-dcnode-id=&quot;2898&quot; instrument_node=&quot;&quot;&gt;detached objectivity&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2896&quot; instrument_node=&quot;&quot;&gt; by Douglas, but it is
complemented by various other aspects that relate to a reflective
balancing of various perspectives and the procedural, social aspects
of science (2009: ch. 6).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2894&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2892&quot;&gt;&lt;span data-dcnode-id=&quot;2893&quot; instrument_node=&quot;&quot;&gt;
That said, Douglas’ proposal is not very concrete when it comes
to implementation, e.g., regarding the way diverse values should be
balanced. Compromising in the middle cannot be the solution (Weber
1917 [1949]). First, no standpoint is, just in virtue of being in the
middle, evidentially supported vis-à-vis more extreme
positions. Second, these middle positions are also, from a practical
point of view, the least functional when it comes to advising
policy-makers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2891&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2847&quot;&gt;&lt;span data-dcnode-id=&quot;2890&quot; instrument_node=&quot;&quot;&gt;
Moreover, the distinction between direct and indirect roles of values
in science may not be sufficiently clear-cut to police the legitimate
use of values in science, and to draw the necessary borderlines.
Assume that a scientist considers, for whatever reason, the
consequences of erroneously accepting hypothesis &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2889&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2879&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;H&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-3-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2884&quot; id=&quot;MJXc-Node-7&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2885&quot; id=&quot;MJXc-Node-8&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2886&quot; id=&quot;MJXc-Node-9&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2887&quot; style=&quot;padding-top: 0.483em; padding-bottom: 0.303em; padding-right: 0.057em;&quot;&gt;&lt;span data-dcnode-id=&quot;2888&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2880&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2881&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2882&quot;&gt;&lt;span data-dcnode-id=&quot;2883&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2876&quot; instrument_node=&quot;&quot;&gt; undesirable.
Therefore he uses a statistical model whose results are likely to
favor ¬&lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2875&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2865&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;H&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-4-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2870&quot; id=&quot;MJXc-Node-10&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2871&quot; id=&quot;MJXc-Node-11&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2872&quot; id=&quot;MJXc-Node-12&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2873&quot; style=&quot;padding-top: 0.483em; padding-bottom: 0.303em; padding-right: 0.057em;&quot;&gt;&lt;span data-dcnode-id=&quot;2874&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2866&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2867&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2868&quot;&gt;&lt;span data-dcnode-id=&quot;2869&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2862&quot; instrument_node=&quot;&quot;&gt; over &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2861&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2851&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;H&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-5-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2856&quot; id=&quot;MJXc-Node-13&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2857&quot; id=&quot;MJXc-Node-14&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2858&quot; id=&quot;MJXc-Node-15&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2859&quot; style=&quot;padding-top: 0.483em; padding-bottom: 0.303em; padding-right: 0.057em;&quot;&gt;&lt;span data-dcnode-id=&quot;2860&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2852&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2853&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2854&quot;&gt;&lt;span data-dcnode-id=&quot;2855&quot; instrument_node=&quot;&quot;&gt;H&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2848&quot; instrument_node=&quot;&quot;&gt;. Is this a matter of reasonable
conservativeness? Or doesn’t it amount to reasoning to a
foregone conclusion, and to treating values as evidence (cf. Elliott
2011: 320–321)?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2846&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2844&quot;&gt;&lt;span data-dcnode-id=&quot;2845&quot; instrument_node=&quot;&quot;&gt;
The most recent literature on values and evidence in science presents
us with a broad spectrum of opinions. Steele (2012) and Winsberg
(2012) agree that probabilistic assessments of uncertainty involve
contextual value judgments. While Steele defends this point by
analyzing the role of scientists as policy advisors, Winsberg points
to the influence of contextual values in the selection and
representation of physical processes in climate modeling. Betz (2013)
argues, by contrast, that scientists can largely avoid making
contextual value judgments if they carefully express the uncertainty
involved with their evidential judgments, e.g., by using a scale
ranging from purely qualitative evidence (such as expert judgment) to
precise probabilistic assessments. The issue of value judgments at
earlier stages of inquiry is not addressed by this proposal; however,
disentangling evidential judgments and judgments involving contextual
values at the stage of theory assessment may be a good thing in
itself.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2843&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2838&quot;&gt;&lt;span data-dcnode-id=&quot;2842&quot; instrument_node=&quot;&quot;&gt;
Thus, should we or should we not worried about values in scientific
reasoning? While the interplay of values and evidential considerations
need not be pernicious, it is unclear why it &lt;/span&gt;&lt;em data-dcnode-id=&quot;2840&quot;&gt;&lt;span data-dcnode-id=&quot;2841&quot; instrument_node=&quot;&quot;&gt;adds&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt; to the
success or the authority of science. How are we going to ensure that
the permissive attitude towards values in setting evidential standards
etc. is not abused? In the absence of a general theory about which
contextual values are beneficial and which are pernicious, the VFI
might as well be as a first-order approximation to a sound,
transparent and objective science.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2837&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2835&quot; id=&quot;ObjeFreePersBias&quot;&gt;&lt;span data-dcnode-id=&quot;2836&quot; instrument_node=&quot;&quot;&gt;4. Objectivity as Freedom from Personal Biases&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2834&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2832&quot;&gt;&lt;span data-dcnode-id=&quot;2833&quot; instrument_node=&quot;&quot;&gt;
This section deals with scientific objectivity as a form of
intersubjectivity—as freedom from personal biases. According to
this view, science is objective to the extent that personal biases are
absent from scientific reasoning, or that they can be eliminated in a
social process. Perhaps all science is necessarily perspectival.
Perhaps we cannot sensibly draw scientific inferences without a host
of background assumptions, which may include assumptions about values.
Perhaps all scientists are biased in some way. But objective
scientific results do not, or so the argument goes, depend on
researchers’ personal preferences or experiences—they are
the result of a process where individual biases are gradually filtered
out and replaced by agreed upon evidence. That, among other things, is
what distinguishes science from the arts and other human activities,
and scientific knowledge from a fact-independent social construction
(e.g., Haack 2003).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2831&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2829&quot;&gt;&lt;span data-dcnode-id=&quot;2830&quot; instrument_node=&quot;&quot;&gt;
Paradigmatic ways to achieve objectivity in this sense are measurement
and quantification. What has been measured and quantified has been
verified relative to a standard. The truth, say, that the Eiffel Tower
is 324 meters tall is relative to a standard unit and conventions
about how to use certain instruments, so it is neither aperspectival
nor free from assumptions, but it is independent of the person making
the measurement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2828&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2826&quot;&gt;&lt;span data-dcnode-id=&quot;2827&quot; instrument_node=&quot;&quot;&gt;
We will begin with a discussion of objectivity, so conceived, in
measurement, discuss the ideal of “mechanical objectivity”
and then investigate to what extent freedom from personal biases can
be implemented in statistical evidence and inductive
inference—arguably the core of scientific reasoning, especially
in quantitatively oriented sciences. Finally, we discuss
Feyerabend’s radical criticism of a rational scientific method
that can be mechanically applied, and his defense of the epistemic and
social benefits of personal “bias” and idiosyncrasy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2825&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2823&quot; id=&quot;MeasQuan&quot;&gt;&lt;span data-dcnode-id=&quot;2824&quot; instrument_node=&quot;&quot;&gt;4.1 Measurement and Quantification&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2822&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2820&quot;&gt;&lt;span data-dcnode-id=&quot;2821&quot; instrument_node=&quot;&quot;&gt;
Measurement is often thought to epitomize scientific objectivity, most
famously captured in Lord Kelvin’s dictum&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2819&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2811&quot;&gt;&lt;span data-dcnode-id=&quot;2818&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2813&quot;&gt;&lt;span data-dcnode-id=&quot;2817&quot; instrument_node=&quot;&quot;&gt;
when you cannot express it in numbers, your knowledge is of a meagre
and unsatisfactory kind; it may be the beginning of knowledge, but you
have scarcely, in your thoughts, advanced to the stage of
&lt;/span&gt;&lt;em data-dcnode-id=&quot;2815&quot;&gt;&lt;span data-dcnode-id=&quot;2816&quot; instrument_node=&quot;&quot;&gt;science&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2814&quot; instrument_node=&quot;&quot;&gt;, whatever the matter may be. (Kelvin 1883, 73)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2812&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2810&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2808&quot;&gt;&lt;span data-dcnode-id=&quot;2809&quot; instrument_node=&quot;&quot;&gt;
Measurement can certainly achieve some independence of perspective.
Yesterday’s weather in Durham UK may have been “really
hot” to the average North Eastern Brit and “very
cold” to the average Mexican, but they’ll both accept that
it was 21°C. Clearly, however, measurement does not result in a
“view from nowhere”, nor are typical measurement results
free from presuppositions. Measurement instruments interact with the
environment, and so results will always be a product of both the
properties of the environment we aim to measure as well as the
properties of the instrument. Instruments, thus, provide a
perspectival view on the world (cf. Giere 2006).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2757&quot;&gt;&lt;span data-dcnode-id=&quot;2806&quot; instrument_node=&quot;&quot;&gt;
Moreover, making sense of measurement results requires interpretation.
Consider temperature measurement. Thermometers function by relating an
unobservable quantity, temperature, to an observable quantity,
expansion (or length) of a fluid or gas in a glass tube; that is,
thermometers measure temperature by assuming that length is a function
of temperature: length = &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2805&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2795&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;f&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-6-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2800&quot; id=&quot;MJXc-Node-16&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2801&quot; id=&quot;MJXc-Node-17&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2802&quot; id=&quot;MJXc-Node-18&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2803&quot; style=&quot;padding-top: 0.483em; padding-bottom: 0.483em; padding-right: 0.06em;&quot;&gt;&lt;span data-dcnode-id=&quot;2804&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2796&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2797&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2798&quot;&gt;&lt;span data-dcnode-id=&quot;2799&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2792&quot; instrument_node=&quot;&quot;&gt;(temperature). The function &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2791&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2781&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;f&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-7-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2786&quot; id=&quot;MJXc-Node-19&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2787&quot; id=&quot;MJXc-Node-20&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2788&quot; id=&quot;MJXc-Node-21&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2789&quot; style=&quot;padding-top: 0.483em; padding-bottom: 0.483em; padding-right: 0.06em;&quot;&gt;&lt;span data-dcnode-id=&quot;2790&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2782&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2783&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2784&quot;&gt;&lt;span data-dcnode-id=&quot;2785&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2778&quot; instrument_node=&quot;&quot;&gt; is not
known &lt;/span&gt;&lt;em data-dcnode-id=&quot;2776&quot;&gt;&lt;span data-dcnode-id=&quot;2777&quot; instrument_node=&quot;&quot;&gt;a priori&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2775&quot; instrument_node=&quot;&quot;&gt;, and it cannot be tested either (because it
could in principle only be tested using a &lt;/span&gt;&lt;em data-dcnode-id=&quot;2773&quot;&gt;&lt;span data-dcnode-id=&quot;2774&quot; instrument_node=&quot;&quot;&gt;veridical&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2772&quot; instrument_node=&quot;&quot;&gt;
thermometer, and the veridicality of the thermometer is just what is
at stake here). Making a specific assumption, for instance that &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2771&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2761&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;f&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-8-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2766&quot; id=&quot;MJXc-Node-22&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2767&quot; id=&quot;MJXc-Node-23&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2768&quot; id=&quot;MJXc-Node-24&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2769&quot; style=&quot;padding-top: 0.483em; padding-bottom: 0.483em; padding-right: 0.06em;&quot;&gt;&lt;span data-dcnode-id=&quot;2770&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2762&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2763&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2764&quot;&gt;&lt;span data-dcnode-id=&quot;2765&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2758&quot; instrument_node=&quot;&quot;&gt;
is linear, solves that problem by fiat. But this
“solution” does not take us very far because different
thermometric substances (e.g., mercury, air or water) yield different
results for the points intermediate between the two fixed points
0°C and 100°C, and so they can’t all expand
linearly.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2756&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2740&quot;&gt;&lt;span data-dcnode-id=&quot;2755&quot; instrument_node=&quot;&quot;&gt;
According to Hasok Chang’s account of early thermometry (Chang
2004), the problem was eventually solved by using a “principle
of minimalist overdetermination”, the goal of which was to find
a reliable thermometer while making as few substantial assumptions
(e.g., about the form for &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2754&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2744&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;f&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-9-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2749&quot; id=&quot;MJXc-Node-25&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2750&quot; id=&quot;MJXc-Node-26&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2751&quot; id=&quot;MJXc-Node-27&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2752&quot; style=&quot;padding-top: 0.483em; padding-bottom: 0.483em; padding-right: 0.06em;&quot;&gt;&lt;span data-dcnode-id=&quot;2753&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2745&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2746&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2747&quot;&gt;&lt;span data-dcnode-id=&quot;2748&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2741&quot; instrument_node=&quot;&quot;&gt;) as possible. It was argued that if a
thermometer was to be reliable, different tokens of the same
thermometer type should agree with each other, and the results of air
thermometers agreed the most. “Minimal” doesn’t mean
zero, however, and indeed this procedure makes an important
presupposition (in this case a metaphysical assumption about the
one-valuedness of a physical quantity). Moreover, the procedure
yielded at best a reliable instrument, not necessarily one that was
best at tracking the uniquely real temperature (if there is such a
thing).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2737&quot;&gt;&lt;span data-dcnode-id=&quot;2738&quot; instrument_node=&quot;&quot;&gt;
What Chang argues about early thermometry is true of measurements more
generally: they are always made against a backdrop of metaphysical
presuppositions, theoretical expectations and other kinds of belief.
Whether or not any given procedure is regarded as adequate depends to
a large extent on the purposes pursued by the individual scientist or
group of scientists making the measurements. Especially in the social
sciences, this often means that measurement procedures are laden with
normative assumptions, i.e., values.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2678&quot;&gt;&lt;span data-dcnode-id=&quot;2735&quot; instrument_node=&quot;&quot;&gt;
Julian Reiss (2008, 2013) has argued that economic indicators such as
consumer price inflation, gross domestic product and the unemployment
rate are value-laden in this sense. Consumer-price indices, for
instance, assume that if a consumer prefers a bundle &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2734&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2724&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;x&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-10-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2729&quot; id=&quot;MJXc-Node-28&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2730&quot; id=&quot;MJXc-Node-29&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2731&quot; id=&quot;MJXc-Node-30&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2732&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.303em;&quot;&gt;&lt;span data-dcnode-id=&quot;2733&quot; instrument_node=&quot;&quot;&gt;x&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2725&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2726&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2727&quot;&gt;&lt;span data-dcnode-id=&quot;2728&quot; instrument_node=&quot;&quot;&gt;x&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2721&quot; instrument_node=&quot;&quot;&gt; over an
alternative &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2720&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2710&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;y&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-11-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2715&quot; id=&quot;MJXc-Node-31&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2716&quot; id=&quot;MJXc-Node-32&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2717&quot; id=&quot;MJXc-Node-33&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2718&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.483em; padding-right: 0.006em;&quot;&gt;&lt;span data-dcnode-id=&quot;2719&quot; instrument_node=&quot;&quot;&gt;y&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2711&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2712&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2713&quot;&gt;&lt;span data-dcnode-id=&quot;2714&quot; instrument_node=&quot;&quot;&gt;y&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2707&quot; instrument_node=&quot;&quot;&gt;, then &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2706&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2696&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;x&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-12-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2701&quot; id=&quot;MJXc-Node-34&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2702&quot; id=&quot;MJXc-Node-35&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2703&quot; id=&quot;MJXc-Node-36&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2704&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.303em;&quot;&gt;&lt;span data-dcnode-id=&quot;2705&quot; instrument_node=&quot;&quot;&gt;x&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2697&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2698&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2699&quot;&gt;&lt;span data-dcnode-id=&quot;2700&quot; instrument_node=&quot;&quot;&gt;x&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2693&quot; instrument_node=&quot;&quot;&gt; is better for her than &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;2692&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;2682&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;y&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-13-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;2687&quot; id=&quot;MJXc-Node-37&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;2688&quot; id=&quot;MJXc-Node-38&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;2689&quot; id=&quot;MJXc-Node-39&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;2690&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.483em; padding-right: 0.006em;&quot;&gt;&lt;span data-dcnode-id=&quot;2691&quot; instrument_node=&quot;&quot;&gt;y&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;2683&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;2684&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;2685&quot;&gt;&lt;span data-dcnode-id=&quot;2686&quot; instrument_node=&quot;&quot;&gt;y&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;2679&quot; instrument_node=&quot;&quot;&gt;, which is
as ethically charged as it is controversial. National income measures
assume that nations that exchange a larger share of goods and services
on markets are richer than nations where the same goods and services
are provided by the government or within households, which too is
ethically charged and controversial.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2672&quot;&gt;&lt;span data-dcnode-id=&quot;2676&quot; instrument_node=&quot;&quot;&gt;
While not free of assumptions and values, the goal of many measurement
procedures remains to reduce the influence of personal biases and
idiosyncrasies. The Nixon administration, famously, indexed social
security payments to the consumer-price index in order to eliminate
the dependence of security recipients on the flimsiest of party
politics: to make increases automatic instead of a result of political
negotiations (Nixon 1969). Lorraine Daston and Peter Galison refer to
this as &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2674&quot;&gt;&lt;span data-dcnode-id=&quot;2675&quot; instrument_node=&quot;&quot;&gt;mechanical objectivity&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2673&quot; instrument_node=&quot;&quot;&gt;. They write:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2671&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2666&quot;&gt;&lt;span data-dcnode-id=&quot;2670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2668&quot;&gt;&lt;span data-dcnode-id=&quot;2669&quot; instrument_node=&quot;&quot;&gt;
Finally, we come to the full-fledged establishment of mechanical
objectivity as the ideal of scientific representation. What we find is
that the image, as standard bearer of is objectivity is tied to a
relentless search to replace individual volition and discretion in
depiction by the invariable routines of mechanical reproduction.
(Daston and Galison 1992: 98)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2667&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2665&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2663&quot;&gt;&lt;span data-dcnode-id=&quot;2664&quot; instrument_node=&quot;&quot;&gt;
Mechanical objectivity reduces the importance of human contributions
to scientific results to a minimum, and therefore enables science to
proceed on a large scale where bonds of trust between individuals can
no longer hold (Daston 1992). Trust in mechanical procedures thus
replaces trust in individual scientists.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2662&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2657&quot;&gt;&lt;span data-dcnode-id=&quot;2661&quot; instrument_node=&quot;&quot;&gt;
In his book &lt;/span&gt;&lt;em data-dcnode-id=&quot;2659&quot;&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;Trust in Numbers&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2658&quot; instrument_node=&quot;&quot;&gt;, Theodore Porter pursues this
line of thought in great detail. In particular, on the basis of case
studies involving British actuaries in the mid-nineteenth century, of
French state engineers throughout the century, and of the US Army
Corps of Engineers from 1920 to 1960, he argues for two causal claims.
First, measurement instruments and quantitative procedures originate
in commercial and administrative needs and affect the ways in which
the natural and social sciences are practiced, not the other way
around. The mushrooming of instruments such as chemical balances,
barometers, chronometers was largely a result of social pressures and
the demands of democratic societies. Administering large territories
or controlling diverse people and processes is not always possible on
the basis of personal trust and thus “objective
procedures” (which do not require trust in persons) took the
place of “subjective judgments” (which do). Second, he
argues that quantification is a technology of distrust and weakness,
and not of strength. It is weak administrators who do not have the
social status, political support or professional solidarity to defend
their experts’ judgments. They therefore subject decisions to
public scrutiny, which means that they must be made in a publicly
accessible form.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2656&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2654&quot;&gt;&lt;span data-dcnode-id=&quot;2655&quot; instrument_node=&quot;&quot;&gt;
This is the situation in which scientists who work in areas where the
science/policy boundary is fluid find themselves:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2653&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2645&quot;&gt;&lt;span data-dcnode-id=&quot;2652&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2650&quot;&gt;&lt;span data-dcnode-id=&quot;2651&quot; instrument_node=&quot;&quot;&gt;
The National Academy of Sciences has accepted the principle that
scientists should declare their conflicts of interest and financial
holdings before offering policy advice, or even information to the
government. And while police inspections of notebooks remain
exceptional, the personal and financial interests of scientists and
engineers are often considered material, especially in legal and
regulatory contexts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2649&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2647&quot;&gt;&lt;span data-dcnode-id=&quot;2648&quot; instrument_node=&quot;&quot;&gt;
Strategies of impersonality must be understood partly as defenses
against such suspicions […]. Objectivity means knowledge that
does not depend too much on the particular individuals who author it.
(Porter 1995: 229)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2646&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2639&quot;&gt;&lt;span data-dcnode-id=&quot;2643&quot; instrument_node=&quot;&quot;&gt;
Measurement and quantification help to reduce the influence of
personal biases and idiosyncrasies and they reduce the need to trust
the scientist or government official, but often at a cost.
Standardizing scientific procedures becomes difficult when their
subject matters are not homogeneous, and few domains outside
fundamental physics are. Attempts to quantify procedures for treatment
and policy decisions that we find in evidence-based practices are
currently transferred to a variety of sciences such as medicine,
nursing, psychology, education and social policy. However, they often
lack a certain degree of responsiveness to the peculiarities of their
subjects and the local conditions to which they are applied (see also
 &lt;/span&gt;&lt;a data-dcnode-id=&quot;2641&quot; href=&quot;#FemiStanEpis&quot;&gt;&lt;span data-dcnode-id=&quot;2642&quot; instrument_node=&quot;&quot;&gt;section 5.3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2640&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2638&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2633&quot;&gt;&lt;span data-dcnode-id=&quot;2637&quot; instrument_node=&quot;&quot;&gt;
Moreover, the measurement and quantification of characteristics of
scientific interest is only half of the story. We also want to
describe relations between the quantities and make inferences using
statistical analysis. Statistics thus helps to quantify further
aspects of scientific work. We will now examine whether or not
statistical analysis can proceed in a way free from personal biases
and idiosyncrasies—for more detail, see the entry on
 &lt;/span&gt;&lt;a data-dcnode-id=&quot;2635&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//plato.stanford.edu/entries/statistics/&quot;&gt;&lt;span data-dcnode-id=&quot;2636&quot; instrument_node=&quot;&quot;&gt;philosophy of statistics&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2634&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2630&quot; id=&quot;StatEvid&quot;&gt;&lt;span data-dcnode-id=&quot;2631&quot; instrument_node=&quot;&quot;&gt;4.2 Statistical Evidence&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2629&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2627&quot;&gt;&lt;span data-dcnode-id=&quot;2628&quot; instrument_node=&quot;&quot;&gt;
The appraisal of scientific evidence is traditionally regarded as a
domain of scientific reasoning where the ideal of scientific
objectivity has strong normative force, and where it is also
well-entrenched in scientific practice. Episodes such as
Galilei’s observations of the Jupiter moons, Lavoisier’s
calcination experiments, and Eddington’s observation of the 1919
eclipse are found in all philosophy of science textbooks because they
exemplify how evidence can be persuasive and compelling to scientists
with different backgrounds. The crucial question is therefore: can we
identify an “objective” concept of scientific evidence
that is independent of the personal biases of the experimenter and
interpreter?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2626&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2624&quot;&gt;&lt;span data-dcnode-id=&quot;2625&quot; instrument_node=&quot;&quot;&gt;
Inferential statistics—the field that investigates the validity
of inferences from data to theory—tries to answer this question.
It is extremely influential in modern science, pervading experimental
research as well as the assessment and acceptance of our most
fundamental theories. For instance, a statistical argument helped to
establish the recent discovery of the Higgs Boson. We now compare the
main theories of statistical evidence with respect to the objectivity
of the claims they produce. They mainly differ with respect to the
role of an explicitly subjective interpretation of probability.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2621&quot; id=&quot;BayeInfe&quot;&gt;&lt;span data-dcnode-id=&quot;2622&quot; instrument_node=&quot;&quot;&gt;4.2.1 Bayesian Inference&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2442&quot;&gt;&lt;span data-dcnode-id=&quot;2619&quot; instrument_node=&quot;&quot;&gt;
Bayesian inference quantifies scientific evidence by means of
probabilities that are interpreted as a scientist’s subjective
degrees of belief. The Bayesian thus leaves behind Carnap’s
(1950) idea that probability is determined by a logical relation
between sentences. For example, the prior degree of belief in

conception of evidence (Royall 1997) for the case of two competing

&lt;/span&gt;&lt;p data-dcnode-id=&quot;2045&quot;&gt;&lt;span data-dcnode-id=&quot;2046&quot; instrument_node=&quot;&quot;&gt;
Unsurprisingly, the idea to measure scientific evidence in terms of
subjective probability has met resistance. For example, the
statistician Ronald A. Fisher (1935: 6–7) has argued that
measuring psychological tendencies cannot be relevant for scientific
inquiry and sustain claims to objectivity. Indeed, how should
scientific objectivity square with subjective degree of belief?
Bayesians have responded to this challenge in various ways:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2044&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;2015&quot;&gt;&lt;span data-dcnode-id=&quot;2043&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2035&quot;&gt;&lt;span data-dcnode-id=&quot;2042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2037&quot;&gt;&lt;span data-dcnode-id=&quot;2041&quot; instrument_node=&quot;&quot;&gt;
Howson (2000) and Howson and Urbach (2006) consider the objection
misplaced. In the same way that deductive logic does not judge the
correctness of the premises but just advises you what to infer from
them, &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2039&quot;&gt;&lt;span data-dcnode-id=&quot;2040&quot; instrument_node=&quot;&quot;&gt;Bayesian inductive logic&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2038&quot; instrument_node=&quot;&quot;&gt; provides rational
rules for representing uncertainty and making inductive inferences.
Choosing the premises (e.g., the prior distributions)
“objectively” falls outside the scope of Bayesian
analysis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2036&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2034&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2026&quot;&gt;&lt;span data-dcnode-id=&quot;2033&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2028&quot;&gt;&lt;span data-dcnode-id=&quot;2032&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2030&quot;&gt;&lt;span data-dcnode-id=&quot;2031&quot; instrument_node=&quot;&quot;&gt;Convergence or merging-of-opinion theorems&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt; guarantee
that under certain circumstances, agents with very different initial
attitudes who observe the same evidence will obtain similar posterior
degrees of belief in the long run. However, they are asymptotic
results without direct implications for inference with real-life
datasets (see also Earman 1992: ch. 6). In such cases, the choice of
the prior matters, and it may be beset with idiosyncratic bias and
manifest social values.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2027&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2025&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;2017&quot;&gt;&lt;span data-dcnode-id=&quot;2024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2019&quot;&gt;&lt;span data-dcnode-id=&quot;2023&quot; instrument_node=&quot;&quot;&gt;
Adopting a more modest stance, Sprenger (2018) accepts that Bayesian
inference does not achieve the goal of objectivity in the sense of
intersubjective agreement (concordant objectivity), or being free of
personal values, bias and subjective judgment. However, he argues that
competing schools of inference such as frequentist inference face this
problem to the same degree, perhaps even worse. Moreover, some
features of Bayesian inference (e.g., the transparency about prior
assumptions) fit recent, socially oriented conceptions of objectivity
that we discuss in
 &lt;/span&gt;&lt;a data-dcnode-id=&quot;2021&quot; href=&quot;#ObjeFeatScieCommTheiPrac&quot;&gt;&lt;span data-dcnode-id=&quot;2022&quot; instrument_node=&quot;&quot;&gt;section 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2020&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;2016&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;2014&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2006&quot;&gt;&lt;span data-dcnode-id=&quot;2013&quot; instrument_node=&quot;&quot;&gt;
A radical Bayesian solution to the problem of personal bias is to
adopt a principle that radically constrains an agent’s rational
degrees of belief, such as the &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2011&quot;&gt;&lt;span data-dcnode-id=&quot;2012&quot; instrument_node=&quot;&quot;&gt;Principle of Maximum
Entropy&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2010&quot; instrument_node=&quot;&quot;&gt; (MaxEnt—Jaynes 1968; Williamson 2010).
According to MaxEnt, degrees of belief must be probabilistic and in
sync with empirical constraints, but conditional on these constraints,
they must be equivocal, that is, as middling as possible. This latter
constraint amounts to maximizing the entropy of the probability
distribution in question. The MaxEnt approach eliminates various
sources of subjective bias at the expense of narrowing down the range
of rational degrees of belief. An alternative objective Bayesian
solution consists in so-called &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2008&quot;&gt;&lt;span data-dcnode-id=&quot;2009&quot; instrument_node=&quot;&quot;&gt;“objective
priors”&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2007&quot; instrument_node=&quot;&quot;&gt;: prior probabilities that do not represent an
agent’s factual attitudes, but are determined by principles of
symmetry, mathematical convenience or maximizing the influence of the
data on the posterior (e.g., Jeffreys 1939 [1980]; Bernardo 2012).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2005&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2003&quot;&gt;&lt;span data-dcnode-id=&quot;2004&quot; instrument_node=&quot;&quot;&gt;
Thus, Bayesian inference, which analyzes statistical evidence from the
vantage point of rational belief, provides only a partial answer to
securing scientific objectivity from personal idiosyncrasy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2002&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;2000&quot; id=&quot;FreqInfe&quot;&gt;&lt;span data-dcnode-id=&quot;2001&quot; instrument_node=&quot;&quot;&gt;4.2.2 Frequentist Inference&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;1999&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1991&quot;&gt;&lt;span data-dcnode-id=&quot;1998&quot; instrument_node=&quot;&quot;&gt;
The frequentist conception of evidence is based on the idea of the
&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1996&quot;&gt;&lt;span data-dcnode-id=&quot;1997&quot; instrument_node=&quot;&quot;&gt;statistical test of a hypothesis&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1995&quot; instrument_node=&quot;&quot;&gt;. Under the influence
of the statisticians Jerzy Neyman and Egon Pearson, tests were often
regarded as rational decision procedures that minimize the relative
frequency of wrong decisions in a hypothetical series of repetitions
of a test (hence the name “frequentism”). Rudner’s
argument in
 &lt;/span&gt;&lt;a data-dcnode-id=&quot;1993&quot; href=&quot;#AcceScieHypoValuNeut&quot;&gt;&lt;span data-dcnode-id=&quot;1994&quot; instrument_node=&quot;&quot;&gt;section 3.2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1992&quot; instrument_node=&quot;&quot;&gt;
 has pointed out the limits of this conception of hypothesis tests:
the choice of thresholds for acceptance and rejection (i.e., the
acceptable type I and II error rates) may reflect contextual value
judgments and personal bias. Moreover, the losses associated with
erroneously accepting or rejecting that hypothesis depend on the
context of application which may be unbeknownst to the
experimenter.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1990&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1843&quot;&gt;&lt;span data-dcnode-id=&quot;1989&quot; instrument_node=&quot;&quot;&gt;

evidential interpretation of hypothesis tests and leave decisions to

(&lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;1812&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;1792&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;p&lt;/mi&gt;&lt;mo&gt;&amp;amp;gt;&lt;/mo&gt;&lt;mn&gt;.05&lt;/mn&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-38-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;1801&quot; id=&quot;MJXc-Node-196&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;1802&quot; id=&quot;MJXc-Node-197&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;1809&quot; id=&quot;MJXc-Node-198&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;1810&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.483em;&quot;&gt;&lt;span data-dcnode-id=&quot;1811&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mjx-mo MJXc-space3&quot; data-dcnode-id=&quot;1806&quot; id=&quot;MJXc-Node-199&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-main-R&quot; data-dcnode-id=&quot;1807&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.363em;&quot;&gt;&lt;span data-dcnode-id=&quot;1808&quot; instrument_node=&quot;&quot;&gt;&amp;gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mjx-mn MJXc-space3&quot; data-dcnode-id=&quot;1803&quot; id=&quot;MJXc-Node-200&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-main-R&quot; data-dcnode-id=&quot;1804&quot; style=&quot;padding-top: 0.363em; padding-bottom: 0.363em;&quot;&gt;&lt;span data-dcnode-id=&quot;1805&quot; instrument_node=&quot;&quot;&gt;.05&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;1793&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;1794&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;1799&quot;&gt;&lt;span data-dcnode-id=&quot;1800&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/mi&gt;&lt;mo data-dcnode-id=&quot;1797&quot;&gt;&lt;span data-dcnode-id=&quot;1798&quot; instrument_node=&quot;&quot;&gt;&amp;gt;&lt;/span&gt;&lt;/mo&gt;&lt;mn data-dcnode-id=&quot;1795&quot;&gt;&lt;span data-dcnode-id=&quot;1796&quot; instrument_node=&quot;&quot;&gt;.05&lt;/span&gt;&lt;/mn&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1789&quot; instrument_node=&quot;&quot;&gt;), “significant” (&lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;1788&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;1768&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;p&lt;/mi&gt;&lt;mo&gt;&amp;amp;lt;&lt;/mo&gt;&lt;mn&gt;.05&lt;/mn&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-39-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;1777&quot; id=&quot;MJXc-Node-201&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;1778&quot; id=&quot;MJXc-Node-202&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;1785&quot; id=&quot;MJXc-Node-203&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;1786&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.483em;&quot;&gt;&lt;span data-dcnode-id=&quot;1787&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mjx-mo MJXc-space3&quot; data-dcnode-id=&quot;1782&quot; id=&quot;MJXc-Node-204&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-main-R&quot; data-dcnode-id=&quot;1783&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.363em;&quot;&gt;&lt;span data-dcnode-id=&quot;1784&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mjx-mn MJXc-space3&quot; data-dcnode-id=&quot;1779&quot; id=&quot;MJXc-Node-205&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-main-R&quot; data-dcnode-id=&quot;1780&quot; style=&quot;padding-top: 0.363em; padding-bottom: 0.363em;&quot;&gt;&lt;span data-dcnode-id=&quot;1781&quot; instrument_node=&quot;&quot;&gt;.05&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;1769&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;1770&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;1775&quot;&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/mi&gt;&lt;mo data-dcnode-id=&quot;1773&quot;&gt;&lt;span data-dcnode-id=&quot;1774&quot; instrument_node=&quot;&quot;&gt;&amp;lt;&lt;/span&gt;&lt;/mo&gt;&lt;mn data-dcnode-id=&quot;1771&quot;&gt;&lt;span data-dcnode-id=&quot;1772&quot; instrument_node=&quot;&quot;&gt;.05&lt;/span&gt;&lt;/mn&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1765&quot; instrument_node=&quot;&quot;&gt;),
“highly significant”, and so on. Not only that these
thresholds and labels are largely arbitrary, they also promote
&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1763&quot;&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;publication bias&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1762&quot; instrument_node=&quot;&quot;&gt;: non-significant findings are often
classified as “failed studies” (i.e., the efficacy of the
intervention could not be shown), rarely published and end up in the
proverbial “file drawer”. Much valuable research is
suppressed. Conversely, significant findings may often occur when the
null hypothesis is actually true, especially when researchers have
been “hunting for significance”. In fact, researchers have
an incentive to keep their &lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;1761&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;1751&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;p&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-40-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;1756&quot; id=&quot;MJXc-Node-206&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;1757&quot; id=&quot;MJXc-Node-207&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;1758&quot; id=&quot;MJXc-Node-208&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;1759&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.483em;&quot;&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;1752&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;1753&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;1754&quot;&gt;&lt;span data-dcnode-id=&quot;1755&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1748&quot; instrument_node=&quot;&quot;&gt;-values low: the stronger the
evidence, the more convincing the narrative, the greater the
impact—and the higher the chance for a good publication and
career-relevant rewards. Moving the goalpost by
“p-hacking” outcomes—for example by eliminating
outliers, selective reporting or restricting the analysis to a
subgroup—evidently biases the research results and compromises
the objectivity of experimental research.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1746&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1738&quot;&gt;&lt;span data-dcnode-id=&quot;1745&quot; instrument_node=&quot;&quot;&gt;
In particular, such &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1743&quot;&gt;&lt;span data-dcnode-id=&quot;1744&quot; instrument_node=&quot;&quot;&gt;questionable research practices
(QRP)&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1742&quot; instrument_node=&quot;&quot;&gt; increase the type I error rate, which measures the rate
at which false hypotheses are accepted, substantially over its nominal
5% level and contribute to publication bias (Bakker et al. 2012).
Ioannidis (2005) concludes that “most published research
findings are false”—they are the combined result of a low
base rate of effective causal interventions, the file drawer effect
and the widespread presence of questionable research practices. The
frequentist logic of hypothesis testing aggravates the problem because
it provides a framework where all these biases can easily enter
(Ziliak and McCloskey 2008; Sprenger 2016). These radical conclusions
are also confirmed by empirical findings: in many disciplines
researchers fail to replicate findings by other scientific teams. See
 &lt;/span&gt;&lt;a data-dcnode-id=&quot;1740&quot; href=&quot;#ReprMetaAnalPers&quot;&gt;&lt;span data-dcnode-id=&quot;1741&quot; instrument_node=&quot;&quot;&gt;section 5.1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1739&quot; instrument_node=&quot;&quot;&gt;
 for more detail.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1721&quot;&gt;&lt;span data-dcnode-id=&quot;1736&quot; instrument_node=&quot;&quot;&gt;
Summing up our findings, neither of the two major frameworks of
statistical inference manages to eliminate all sources of personal
bias and idiosyncrasy. The Bayesian considers subjective assumptions
to be an irreducible part of scientific reasoning and sees no harm in
making them explicit. The frequentist conception of evidence based on
&lt;/span&gt;&lt;span class=&quot;MathJax_Preview&quot; data-dcnode-id=&quot;1735&quot; style=&quot;color: inherit; display: none;&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mjx-chtml MathJax_CHTML&quot; data-dcnode-id=&quot;1725&quot; data-mathml=&quot;&lt;math xmlns=&amp;quot;http://www.w3.org/1998/Math/MathML&amp;quot;&gt;&lt;mi&gt;p&lt;/mi&gt;&lt;/math&gt;&quot; id=&quot;MathJax-Element-41-Frame&quot; role=&quot;presentation&quot; style=&quot;font-size: 101%; position: relative;&quot; tabindex=&quot;0&quot;&gt;&lt;span aria-hidden=&quot;true&quot; class=&quot;mjx-math&quot; data-dcnode-id=&quot;1730&quot; id=&quot;MJXc-Node-209&quot;&gt;&lt;span class=&quot;mjx-mrow&quot; data-dcnode-id=&quot;1731&quot; id=&quot;MJXc-Node-210&quot;&gt;&lt;span class=&quot;mjx-mi&quot; data-dcnode-id=&quot;1732&quot; id=&quot;MJXc-Node-211&quot;&gt;&lt;span class=&quot;mjx-char MJXc-TeX-math-I&quot; data-dcnode-id=&quot;1733&quot; style=&quot;padding-top: 0.243em; padding-bottom: 0.483em;&quot;&gt;&lt;span data-dcnode-id=&quot;1734&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;MJX_Assistive_MathML&quot; data-dcnode-id=&quot;1726&quot; role=&quot;presentation&quot;&gt;&lt;math data-dcnode-id=&quot;1727&quot; xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;&gt;&lt;mi data-dcnode-id=&quot;1728&quot;&gt;&lt;span data-dcnode-id=&quot;1729&quot; instrument_node=&quot;&quot;&gt;p&lt;/span&gt;&lt;/mi&gt;&lt;/math&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1722&quot; instrument_node=&quot;&quot;&gt;-values avoids these explicitly subjective elements, but at the
price of a misleading impression of objectivity and frequent abuse in
practice. A defense of frequentist inference should, in our opinion,
stress that the relatively rigid rules for interpreting statistical
evidence facilitate communication and assessment of research results
in the scientific community—something that is harder to achieve
for a Bayesian. We now turn from specific methods for stating and
interpreting evidence to a radical criticism of the idea that there is
a rational scientific method.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1720&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1718&quot; id=&quot;FeyeTyraRatiMeth&quot;&gt;&lt;span data-dcnode-id=&quot;1719&quot; instrument_node=&quot;&quot;&gt;4.3 Feyerabend: The Tyranny of the Rational Method&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1717&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1712&quot;&gt;&lt;span data-dcnode-id=&quot;1716&quot; instrument_node=&quot;&quot;&gt;
In his writings of the 1970s,
 &lt;/span&gt;&lt;a data-dcnode-id=&quot;1714&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//plato.stanford.edu/entries/feyerabend/&quot;&gt;&lt;span data-dcnode-id=&quot;1715&quot; instrument_node=&quot;&quot;&gt;Paul Feyerabend&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1713&quot; instrument_node=&quot;&quot;&gt;
 launched a profound attack on the rationality and objectivity of
scientific method. His position is exceptional in the philosophical
literature since traditionally, the threat for objective and
successful science is located in contextual rather than epistemic
values. Feyerabend turns this view upside down: it is the
“tyranny” of rational method, and the emphasis on
epistemic rather than contextual values that prevents us from having a
science in the service of society. Moreover, he welcomes a diversity
of different personal, also idiosyncratic perspectives, thus denying
the idea that freedom from personal “bias” is
epistemically and socially beneficial.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1709&quot;&gt;&lt;span data-dcnode-id=&quot;1710&quot; instrument_node=&quot;&quot;&gt;
The starting point of Feyerabend’s criticism of rational method
is the thesis that strict epistemic rules such as those expressed by
the VFI only suppress an open exchange of ideas, extinguish scientific
creativity and prevent a free and truly democratic science. In his
classic “Against Method” (1975: chs. 8–13),
Feyerabend elaborates on this criticism by examining a famous episode
in the history of science. When the Catholic Church objected to
Galilean mechanics, it had the better arguments by the standards of
seventeenth-century science. Their conservatism in their position was
scientifically backed: Galilei’s telescopes were unreliable for
celestial observations, and many well-established phenomena (no fixed
star parallax, invariance of laws of motion) could not yet be
explained in the heliocentric system. With hindsight, Galilei managed
to achieve groundbreaking scientific progress just because he
deliberately violated rules of scientific reasoning. Hence
Feyerabend’s dictum “Anything goes”: no methodology
whatsoever is able to capture the creative and often irrational ways
by which science deepens our understanding of the world. Good
scientific reasoning cannot be captured by rational method, as Carnap,
Hempel and Popper postulated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1708&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1706&quot;&gt;&lt;span data-dcnode-id=&quot;1707&quot; instrument_node=&quot;&quot;&gt;
The drawbacks of an objective, value-free and method-bound view on
science and scientific method are not only epistemic. Such a view
narrows down our perspective and makes us less free, open-minded,
creative, and ultimately, less human in our thinking (Feyerabend 1975:
154). It is therefore neither possible nor desirable to have an
objective, value-free science (cf. Feyerabend 1978: 78–79). As a
consequence, Feyerabend sees traditional forms of inquiry about our
world (e.g., Chinese medicine) on a par with their Western
competitors. He denounces appeals to “objective” standards
as rhetorical tools for bolstering the epistemic authority of a small
intellectual elite (=Western scientists), and as barely disguised
statements of preference for one’s own worldview:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1705&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;1700&quot;&gt;&lt;span data-dcnode-id=&quot;1704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1702&quot;&gt;&lt;span data-dcnode-id=&quot;1703&quot; instrument_node=&quot;&quot;&gt;
there is hardly any difference between the members of a
“primitive” tribe who defend their laws because they are
the laws of the gods […] and a rationalist who appeals to
“objective” standards, except that the former know what
they are doing while the latter does not. (1978: 82)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;1699&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1697&quot;&gt;&lt;span data-dcnode-id=&quot;1698&quot; instrument_node=&quot;&quot;&gt;
In particular, when discussing other traditions, we often project our
own worldview and value judgments into them instead of making an
impartial comparison (1978: 80–83). There is no purely rational
justification for dismissing other perspectives in favor of the
Western scientific worldview—the insistence on our Western
approach may be as justified as insisting on absolute space and time
after the Theory of Relativity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1694&quot;&gt;&lt;span data-dcnode-id=&quot;1695&quot; instrument_node=&quot;&quot;&gt;
The Galilei example also illustrates that personal perspective and
idiosyncratic “bias” need not be bad for science.
Feyerabend argues further that scientific research is accountable to
society and should be kept in check by democratic institutions, and
laymen in particular. Their particular perspectives can help to
determine the funding agenda and to set ethical standards for
scientific inquiry, but also be useful for traditionally value-free
tasks such as choosing an appropriate research method and assessing
scientific evidence. Feyerabend’s writings on this issue were
much influenced by witnessing the Civil Rights Movement in the U.S.
and the increasing emancipation of minorities, such as Blacks, Asians
and Hispanics.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1693&quot; instrument_node=&quot;&quot;&gt;
