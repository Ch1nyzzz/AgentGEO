&lt;/span&gt;&lt;div class=&quot;mura-region-local&quot; data-dcnode-id=&quot;356&quot;&gt;&lt;p data-dcnode-id=&quot;720&quot;&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;Legislation introduced last year in Connecticut recognized Gustave Whitehead as “First in Flight.” North Carolina and Ohio briefly ceased their perennial squabbles about who had the best claim to the Wright brothers and joined to complain about Connecticut. Ohio state representative Rick Perales (R) said in October 2013 that it was wrong for one state to “distort history” whereas North Carolina state senator Bill Cook (R) said the Whitehead controversy was “more like a fairy tale told to a child.” In June 2014 the Royal Aeronautical Society published a paper noting that the most recent claims for a Whitehead flight have been “thoroughly discredited.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;714&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;Snippets of original text plucked from the old pages of &lt;/span&gt;&lt;em data-dcnode-id=&quot;716&quot;&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;Scientific American&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt; have been used to claim support for the thesis that Whitehead successfully flew a powered airplane in the first few years of the 20th century. The magazine has been around since 1845, and at the time in question it was one of the leading science and technology publications that reported on progress in aviation. As such, it is an authoritative source for settling the matter.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;711&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;Knowledge, though, is built on data. For social sciences like history, data include primary sources such as news articles. But text works the way data does: one sentence, like a lone data point, holds little significance. Context is needed for the researcher to derive meaning, and a fuller presentation of surrounding text provides us with the context and the meaning. Digging a little deeper into the context of the articles from over 100 years ago confirms that Whitehead never succeeded in flying a powered, piloted, controlled airplane, and also confirms that the Wright brothers retain those laurels.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;708&quot;&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;The following titles and quotes from the original text are not edited; any omissions are marked with ellipses (... or ....).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;698&quot;&gt;&lt;strong data-dcnode-id=&quot;705&quot;&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;INTRODUCTION TO WHITEHEAD&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;704&quot;&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;699&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/article/a-new-flying-machine-1901-06/&quot;&gt;&lt;em data-dcnode-id=&quot;701&quot;&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;Scientific American,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt; June 8, 1901, page 357&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;697&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;693&quot;&gt;&lt;em data-dcnode-id=&quot;695&quot;&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;Scientific American&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;’s first article on Whitehead ran in June 1901. It is a curious fact that Whitehead, although he had previously claimed to have made a free flight in Pittsburgh in 1899, is introduced as not having made any free flights. Here is an early indication that Whitehead may have claimed flights that never happened.&amp;nbsp;The photograph accompanying the article is one of the few images of Whitehead’s flying machines.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;686&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;691&quot; instrument_node=&quot;&quot;&gt;[Title and opening three sentences]&lt;/span&gt;&lt;br data-dcnode-id=&quot;690&quot;&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;
A New Flying Machine&lt;/span&gt;&lt;br data-dcnode-id=&quot;688&quot;&gt;&lt;span data-dcnode-id=&quot;687&quot; instrument_node=&quot;&quot;&gt;
A novel flying machine has just been completed by Mr. Gustave Whitehead, of Bridgeport, Conn., and is now ready for the preliminary trials. Several experiments have been made, but as yet no free flights have been attempted. The machine is built after the model of a bird or bat.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;683&quot;&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;673&quot;&gt;&lt;strong data-dcnode-id=&quot;680&quot;&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;PULLING AIRPLANES&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;679&quot;&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;674&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/article/experiments-with-motor-driven-aerop/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;676&quot;&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;Scientific American,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt; September 19, 1903, page 204&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;670&quot;&gt;&lt;span data-dcnode-id=&quot;671&quot; instrument_node=&quot;&quot;&gt;A sentence fragment from a 1903 article has been used to claim that Whitehead flew a powered airplane: “the aeroplane was made to skim along above the ground.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;667&quot;&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;But a wider look at the context makes it clear that when Whitehead was “flying” gliders or powered airplanes, the machine was pulled aloft and steered by a man running along the ground and pulling a rope, which is different from successfully flying an airplane. Additionally, some confusion may stem from the word “aeroplane,” which in 1903 could mean an airplane, a glider, a working model airplane, or even just the wings on any of those.&lt;/span&gt;&lt;/p&gt;&lt;figure class=&quot;newsletter-promo container&quot; data-dcnode-id=&quot;642&quot;&gt;&lt;span data-dcnode-id=&quot;666&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;newsletter-promo__img&quot; data-dcnode-id=&quot;662&quot;&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;newsletter promo&quot; data-dcnode-id=&quot;664&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//static.scientificamerican.com/sciam/cache/file/4641809D-B8F1-41A3-9E5A87C21ADB2FD8_source.png&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;663&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;newsletter-promo__body&quot; data-dcnode-id=&quot;653&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;655&quot;&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;Sign up for &lt;/span&gt;&lt;em data-dcnode-id=&quot;657&quot;&gt;&lt;span data-dcnode-id=&quot;658&quot; instrument_node=&quot;&quot;&gt;Scientific American&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;’s free newsletters.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;newsletter-promo__cta&quot; data-dcnode-id=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;646&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/page/newsletter-sign-up/%3Forigincode%3D2018_sciam_ArticlePromo_NewsletterSignUp&quot;&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;button class=&quot;btn btn--small&quot; data-dcnode-id=&quot;648&quot; data-track-ecommerce=&quot;promo_click&quot; data-track-ecommerce-promo-creative=&quot;newsletter-signup-article&quot; data-track-ecommerce-promo-id=&quot;NEWS-LTR-ARTCLE&quot; data-track-ecommerce-promo-name=&quot;newsletter-signup-article&quot; data-track-ecommerce-promo-position=&quot;1&quot;&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;Sign Up&lt;/span&gt;&lt;/button&gt;&lt;span data-dcnode-id=&quot;647&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;643&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/figure&gt;&lt;span data-dcnode-id=&quot;641&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;639&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;640&quot; instrument_node=&quot;&quot;&gt;Experiments with Motor-Driven Aeroplanes&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;638&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;634&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;637&quot; instrument_node=&quot;&quot;&gt;[Paragraph 3 talks about Whitehead’s method]&lt;/span&gt;&lt;br data-dcnode-id=&quot;636&quot;&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;
The method of soaring used by Mr. Whitehead consists in running with the aeroplane against the wind, preceded by an assistant who draws it with a rope when it leaves the ground. When sufficient speed is attained, the operator, by tilting the aeroplanes slightly upward, can leave the ground and skim along in the air, as shown in one of the photographs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;629&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;[Paragraph 6 talks about specific experiments]&lt;/span&gt;&lt;br data-dcnode-id=&quot;631&quot;&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt;
By running with the machine against the wind, after the motor had been started, the aeroplane was made to skim along above the ground at heights of from 3 to 16 feet for a distance, without the operator touching, of about 350 yards.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;628&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;626&quot;&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;623&quot;&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;There is no mention in this article of the flights that Whitehead supposedly made in Pittsburgh in 1899 or Bridgeport in 1901. The method he used helped to get his flying machines in the air but this kind of flight cannot be categorized as controlled, sustained or powered flight. These events may be the source of the memories dredged up thirty years later by people who claimed to remember Whitehead flying, to the extent that Whitehead was definitely airborne. By comparison, the Wrights’ fourth flight at Kitty Hawk was shorter than 350 yards, being about 284 yards, but against a headwind it was powered by an engine alone and piloted by Wilbur Wright without contact with the ground.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;622&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;613&quot;&gt;&lt;strong data-dcnode-id=&quot;620&quot;&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;BLURRY PHOTOS, CLEAR HISTORY&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;619&quot;&gt;&lt;span data-dcnode-id=&quot;618&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;614&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/article/the-aero-club-of-americas-exhibit-o/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;616&quot;&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;Scientific American,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt; January 27, 1906, page 93&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;610&quot;&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;A 1906 article has been used to advance claims that a photograph of a Whitehead man-carrying powered machine in flight existed at one point, with the attendant fuss over where such a photograph might now be hidden.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;609&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;607&quot;&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;In reality the wider context of the article makes it clear that there was never a photograph of a Whitehead man-carrying powered machine in flight. The report on the Aero Club’s exhibit in 1906 has a sentence about an extensive collection of photographs. The first phrase of the sentence includes Whitehead’s name in a list of photographs of flying machines by various inventors. The second phrase of the sentence mentions (after a semicolon) “and other photographs showing airships and balloons in flight” (for instance, a photograph in the article shows, in the background, an Alberto Santos-Dumont airship rounding the Eiffel Tower in Paris). The implication is that the first phrase in the sentence (including Whitehead’s mention) shows machines that are not in flight, and the second phrase then goes on to talk about machines in flight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;606&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;604&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;The Aero Club of America's Exhibit of Aeronautical Apparatus&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;603&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;599&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;[Page 93, first paragraph]&lt;/span&gt;&lt;br data-dcnode-id=&quot;601&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;
The original Hargrave box kite was also shown, as well as numerous models designed by Herring and Chanute. Besides these very complete exhibits of apparatus, the walls of the room were covered with a large collection of photographs showing the machines of other inventors, such as Whitehead, Berliner, and Santos-Dumont; and other photographs showing airships and balloons in flight, together with bird's-eye views taken from the same.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;596&quot;&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;Lower down in the article, on page 94, a sentence fragment has been used to claim the existence of a photograph of one of Whitehead’s larger man-carrying machines in flight. However, the photograph in question specifies an unmanned model that was successfully airborne for long enough to have a photograph taken--a feat that does not seem to have extended to any of Whitehead’s larger man-carrying machines. Models were an accepted and traditional method used by aviation pioneers, including Whitehead, to experiment and demonstrate technology.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;593&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;Text on page 94 has four interesting parts. The text: 1) mentions Langley’s successful airplane, an unpiloted scale model named the “Aerodrome” (there’s a nice clear photograph of it on the page as well) 2) mentions Herring’s model airplane 3) complains that there are no photographs of the Herring model in flight 4) continues the complaint with a note that there are no photographs of “larger man-carrying machines in flight” 5) mentions a model by Whitehead driven by compressed air (perhaps using technology similar to Victor Tatin’s 1879 airplane model that was driven by a cylinder of compressed air).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;590&quot;&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;Because the text specifically states that there were no photographs of “larger man-carrying machines in flight,” it is doubtful that the exhibit ever contained a photograph of one of Whitehead’s larger man-carrying machines in flight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;585&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;[page 94, 2nd paragraph]&lt;/span&gt;&lt;br data-dcnode-id=&quot;587&quot;&gt;&lt;span data-dcnode-id=&quot;586&quot; instrument_node=&quot;&quot;&gt;
Among the model self-propelled aeroplanes shown, those of Prof. Langley should undoubtedly have first mention. The steam-driven machine flew about half a mile over the Potomac River at Quantico, Va., a little less than ten years ago, or on May 6, 1896. This was the first flight of a motor-driven aeroplane....&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;582&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;Another interesting model is that exhibited by Mr. Herring, and which he claims has made numerous successful flights. When tethered to a high pole with a long cord, this machine is said to have flown 15 miles in a circle in December, 1902, and to have stopped only when the gasoline supply gave out. A single-cylinder, air-cooled gasoline motor having mechanically-operated inlet and exhaust valves and a make-and-break igniter, all worked from a single cam, and carrying a small propeller on its crankshaft, was shown on this machine. The weight of the motor was said to be only 2 pounds, and its maximum horse-power 0.51 at 3,400 R.P.M. In flight, however, the engine only made about 850 R.P.M. and developed but 0.07 horse-power. The aeroplanes of this model (which is shown in the lower left-hand picture on the preceding page) were 5 1/2 feet long by 14 inches wide....&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;579&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;No photographs of this or of larger man-carrying machines in flight were shown, nor has any trustworthy account of their reported achievements ever been published. A single blurred photograph of a large birdlike machine propelled by compressed air, and which was constructed by Whitehead in 1901, was the only other photograph besides that of Langley's machines of a motor-driven aeroplane in successful flight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;569&quot;&gt;&lt;strong data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;THE SHORT END OF FLIGHT&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;575&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;570&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/article/santos-dumonts-latest-flight/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;572&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;Scientific American,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt; November 24, 1906, page 379&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;560&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;After Alberto Santos-Dumont of Brazil had completed his first takeoff and flight in his &lt;/span&gt;&lt;em data-dcnode-id=&quot;565&quot;&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;14-bis&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt; on October 23, 1906, in Paris (and thus won the laurels for first flight in a man-carrying, powered, heavier-than-air, just-barely-controlled, piloted, attached-wheel-undercarriage airplane that took off under its own power) the &lt;/span&gt;&lt;em data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;Scientific American,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt; in a somewhat snippy editorial (and there are some nationalist undertones as well), pointed out:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;555&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;[First paragraph]&lt;/span&gt;&lt;br data-dcnode-id=&quot;557&quot;&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;
In his enthusiasm the Brazilian aeronaut forgets also that at least three experimenters in America (Herring in 1898, Whitehead in 1901, and Wright brothers in 1903), Maxim in England (1896), and Ader in France (1897), have already flown for short distances with motor-driven aeroplanes, and yet no really practical machine of the kind has as yet been produced and demonstrated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;552&quot;&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;If we can seize on the idea that Whitehead had “flown” for a “short distance” in 1901, we would need to cut out the mentions of Maxim, Ader and Herring to stretch the text enough to claim the first-in-flight laurels for Whitehead. It is particularly significant that Whitehead is included with these other aviation pioneers in a list from 1906 because at that date none of them were proved to have achieved powered, controlled, piloted flights. The article even says so: “no really practical machine of the kind has as yet been produced and demonstrated.” Here’s a list of the impractical machines:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;549&quot;&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;Hiram Maxim’s airplane from 1896 is listed first. A massive machine of 3 1/2 tons, held by rails, the craft produced enough lift to wreck its rail system. Maxim is credited with lift, but lift is only one component of flying, so he is not credited with a controlled flight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;540&quot;&gt;&lt;span data-dcnode-id=&quot;547&quot; instrument_node=&quot;&quot;&gt;Clement Ader’s &lt;/span&gt;&lt;em data-dcnode-id=&quot;545&quot;&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;Avion III&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt; is credited here with one of the flights for “short distances” in 1897, but we now know, after the veil of French military secrecy was lifted, it was the &lt;/span&gt;&lt;em data-dcnode-id=&quot;542&quot;&gt;&lt;span data-dcnode-id=&quot;543&quot; instrument_node=&quot;&quot;&gt;Avion I&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt; in 1890 that made a “flight”: altitude about 8 inches, distance about 150 feet.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;537&quot;&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;Augustus Moore Herring worked with both Samuel P. Langley, who made the machine for the first successful heavier-than-air flight (unpiloted), and Octave Chanute, the aviation author. Herring is sometimes credited with a first flight on October 22, 1898, of perhaps 60 feet, based on thinly substantiated claims. It is possible his machine was briefly airborne, but the engine, driven by compressed air, was limited to 30 seconds of power. If we are to accept a 60-foot hop as a flight, Whitehead is now fourth in line after Maxim, Ader and Herring.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;531&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;The Wright Brothers are listed here as having made a “short flight” in 1903. Does the article therefore show that the Wrights only made a powered hop in 1903, no better than anything demonstrated by Whitehead, Ader, Maxim or Herring? Bear in mind that in 1906 the &lt;/span&gt;&lt;em data-dcnode-id=&quot;533&quot;&gt;&lt;span data-dcnode-id=&quot;534&quot; instrument_node=&quot;&quot;&gt;Scientific American&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt; was still skeptical of the Wright claims, as were many of the public. And the Wrights were just as secretive about their work as Whitehead was opaque. So how do we come to a conclusion that the Wrights were pilots and inventors of the airplane after flights of “short distances” and Whitehead was not?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;530&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;522&quot;&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;Aviation research by the Wrights between 1901 and 1903 included hundreds of well known and successful free-flight (untethered) gliding experiments while they worked out a method of controlling their aircraft. As an aside, it is worth looking at the long development and practical use of three-axis control in gliders and airplanes by the Wrights and contrasting that work with Whitehead’s description of ad hoc aircraft control by having one engine go slightly faster than the other one, and then leaning over in the cockpit. Following the Wrights work at Kitty Hawk, they largely retreated from the public eye and conducted experiments in secret for the next four years, leaving a large gap in the public’s knowledge and &lt;/span&gt;&lt;em data-dcnode-id=&quot;527&quot;&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;Scientific American&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;’s coverage of their work. There were rumors, some mentions within military and aviation circles, letters by the Wrights to aeronautical societies, even an article in &lt;/span&gt;&lt;em data-dcnode-id=&quot;524&quot;&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;Gleanings in Bee Culture&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt; (circulation 25,000).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;516&quot;&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;However, we are now able to fill that knowledge gap with notes, reports, photographs (there’s a splendid series of clear photos of the powered Wright machine in the air above Huffman Prairie in 1904 and 1905 in the collection of the Library of Congress), letters between all of the participants involved, physical artifacts (surviving airplanes and components), eyewitnesses (most of whom were re-interviewed by &lt;/span&gt;&lt;em data-dcnode-id=&quot;518&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;Scientific American&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt; within a year of the events they claimed seeing), and old movies that consistently corroborate every step they claimed or claimed for them in the development of their powered, piloted airplanes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;513&quot;&gt;&lt;span data-dcnode-id=&quot;514&quot; instrument_node=&quot;&quot;&gt;There is as yet no good proof that Whitehead moved beyond the ability to make flights of “short distances.” But bear in mind that Carl Sagan said that “absence of evidence is not evidence of absence”--in other words even if there is no mention of an event, it is hard to prove that the event never occurred. If, on the other hand, you consider the placement of Whitehead with Maxim, Ader and Herring in the pantheon of aviation pioneers who did not fly a powered, controlled airplane, this article comes very close to proving that up to 1906 Whitehead never flew a powered, piloted and controlled airplane.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;503&quot;&gt;&lt;strong data-dcnode-id=&quot;510&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;EDITORIAL COMMENT ON THE WRIGHTS&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;509&quot;&gt;&lt;span data-dcnode-id=&quot;508&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;504&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/article/genesis-of-the-first-successful-aer/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;506&quot;&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;Scientific American,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt; December 15, 1906, page 442&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;500&quot;&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;The best proof of the Wright precedence was their first public flight on August 8, 1908, near Le Mans, France, that showed how far ahead of the competition they were (even if that lead did not last long). They did not achieve that lead except after several years of experimentation on developing a workable airplane.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;497&quot;&gt;&lt;span data-dcnode-id=&quot;498&quot; instrument_node=&quot;&quot;&gt;The reader is invited to consider the difference between the brief treatment of Whitehead and the other inventors in the above excerpt from November 1906 and the lead editorial below from December 15, 1906 that explicitly states where the magazine stood on the question of who flew first. The editorial does not mention Whitehead.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;488&quot;&gt;&lt;span data-dcnode-id=&quot;495&quot; instrument_node=&quot;&quot;&gt;There is no need for laborious, intricate text interpretation, the text is very straightforward. As an aside, the reader is invited to think about qualitative differences in another kind of supporting evidence: witnesses. The veracity of the 17 witnesses of the Wright flights that are mentioned in the &lt;/span&gt;&lt;em data-dcnode-id=&quot;493&quot;&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;Scientific American&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;492&quot; instrument_node=&quot;&quot;&gt; article below has been used to bolster the claimed veracity of Whitehead witnesses. The difference lies in the fact that Whitehead’s witnesses made their statements three decades after the supposed events (readers of &lt;/span&gt;&lt;em data-dcnode-id=&quot;490&quot;&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;Scientific American Mind&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt; will be quite familiar with the kinds of tricks that memory can play, especially over such a long time span), but the Wrights’ witnesses were interviewed within one year; in addition the magazine was able to send follow-up questions to the Wright witnesses.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;483&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;GENESIS OF THE FIRST SUCCESSFUL AEROPLANE&lt;/span&gt;&lt;br data-dcnode-id=&quot;485&quot;&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;
In all the history of invention there is probably no parallel to the unostentatious manner in which the Wright brothers, of Dayton, Ohio, ushered into the world their epoch-making invention of the first successful aeroplane flying machine. At a time when the various experimentalists in the field of aeronautics were dumfounded by the failure of the deservedly renowned Langley to make a practical flight with his government backed $50,000 machine, it was suddenly announced that two young machinists had produced an aeroplane which had made a continuous flight, with one of the inventors on board, of over twenty miles at a high speed and under perfect control.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;482&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;480&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;Their success marked such an enormous stride forward in the art, was so completely unheralded, and was so brilliant that doubt as to the truth of the story was freely entertained; especially as the inventors refused either to give access to the machine or to make any statement as to its broad details.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;477&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;The SCIENTIFIC AMERICAN, however, wrote to the seventeen eye witnesses who were mentioned as having seen the various flights and received letters from these reputable local residents, and published extracts therefrom, which completely set at rest all doubt as to what had been accomplished.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;476&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;467&quot;&gt;&lt;strong data-dcnode-id=&quot;474&quot;&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;STILL COMING UP SHORT&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;473&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;468&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/article/the-second-annual-exhibition-of-the/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;470&quot;&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt;Scientific American,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt; December 15, 1906, page 447&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;458&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;It is tempting to seize on the word “flight” in such articles as this next one and use it as a battering ram over objections that Whitehead was not first in flight. Context, however, proves yet again that Whitehead did not make the long-distance piloted flights that elsewhere have been attributed to him. The key is not the single word “flight” but the fact that the flights here are specifically designated as “short flights”-- powered hops, like the kind that a frog makes. These aviation hops were fairly common (and largely unremarkable) at the turn of the century. The Wrights’ longest flight on December 17, 1903, lasted just short of one minute and covered 284 yards. Scholars of the Wrights note that later in the evening, when their brother Lorin went to give the story to the &lt;/span&gt;&lt;em data-dcnode-id=&quot;463&quot;&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;Dayton&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;em data-dcnode-id=&quot;460&quot;&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;Journal, &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;459&quot; instrument_node=&quot;&quot;&gt;the editor on duty yawned and said “Fifty-seven seconds, hey? If it had been fifty-seven minutes then it might have been a news item.” And if the Wrights had never made another flight of that length, they would never have been credited with inventing the airplane. As it is, that last flight at Kitty Hawk was the first stumbling, imperfect step of the world's first true airplane.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;455&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;The Second Annual Exhibition of the Aero Club of America&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;450&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;[Third paragraph]&lt;/span&gt;&lt;br data-dcnode-id=&quot;452&quot;&gt;&lt;span data-dcnode-id=&quot;451&quot; instrument_node=&quot;&quot;&gt;
The body framework of Gustave Whitehead's latest bat-like aeroplane was shown mounted on pneumatic-tired, ball bearing wire wheels and containing a 3-cylinder, 2-cycle, air-cooled motor of 15 horse-power direct connected to a 6-foot propeller placed in front. This machine ran along the road at a speed of 25 miles an hour in tests made with it last summer. When held stationary, it produced a thrust of 75 pounds. The engine is a 4 1/4 x 4 of an improved type. Whitehead also exhibited the 2-cylinder steam engine that revolved the road wheels of his former bat machine, with which he made a number of short flights in 1901.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;445&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;[In the 7th paragraph, for comparison, we have this note on the Wrights]&lt;/span&gt;&lt;br data-dcnode-id=&quot;447&quot;&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;
The most interesting motor on exhibition was the new 4-cylinder, four-cycle, water-cooled engine built by Messrs. Orville and Wilbur Wright, of Dayton, Ohio, and intended for use on their new aeroplane.... The Wright brothers' original motor, with which they made a flight three years ago, was much heavier than the new one.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;435&quot;&gt;&lt;strong data-dcnode-id=&quot;442&quot;&gt;&lt;span data-dcnode-id=&quot;443&quot; instrument_node=&quot;&quot;&gt;WHAT DID OCTAVE CHANUTE THINK?&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;441&quot;&gt;&lt;span data-dcnode-id=&quot;440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;436&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/scientificamerican/journal/v57/n1473supp/pdf/scientificamerican03261904-23598bsupp.pdf&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;438&quot;&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;Scientific American Supplement,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;437&quot; instrument_node=&quot;&quot;&gt; March 26, 1904, page 23,599&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;429&quot;&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;A few days after the Wright success at Kitty Hawk, Octave Chanute, one of the leading aviation researchers of the day, gave a presentation for the American Association for the Advancement of Science. His December 30, 1903, report was published, with a byline, in the &lt;/span&gt;&lt;em data-dcnode-id=&quot;431&quot;&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;Scientific American Supplement &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt;three months later, and confirmed that Chanute believed (apparently with some reservations) the Wright flights at Kitty Hawk were the first successful use of an airplane. Nowhere in the lengthy article does Chanute mention Whitehead, even though it has been claimed that he was aware of Whitehead’s work:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;428&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;424&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;427&quot; instrument_node=&quot;&quot;&gt;Aerial Navigation&lt;/span&gt;&lt;br data-dcnode-id=&quot;426&quot;&gt;&lt;span data-dcnode-id=&quot;425&quot; instrument_node=&quot;&quot;&gt;
By O. Chanute, Chicago, Ill.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;419&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt;[Opening paragraph, second sentence]&lt;/span&gt;&lt;br data-dcnode-id=&quot;421&quot;&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt;
Navigable balloons have recently been developed to what is believed to be nearly the limit of their efficiency, and after three intelligent but unfortunate attempts by others, a successful dynamic flying machine seems to have been produced by the Messrs. Wright.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;414&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;[Paragraph 29 outlines the steps the Wrights took to be successful pilots]&lt;/span&gt;&lt;br data-dcnode-id=&quot;416&quot;&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt;
This was the kind of practical efficiency acquired by the Wright Brothers, whose flying machine was successfully tested on the seventeenth of December. For three years they experimented with gliding machines, as will be described farther on, and it was only after they had obtained thorough command of their movements in the air that they ventured to add a motor. How they accomplished this must be reserved for them to explain, as they are not yet ready to make known the construction of their machine nor its mode of operation. Too much praise cannot be awarded to these gentlemen. Being accomplished mechanics, they designed and built the apparatus, applying thereto a new and effective mode of control of their own. They learned its use at considerable personal risk of accident. They planned and built the motor, having found none in the market deemed suitable. They evolved a novel and superior form of propeller; and all this was done with their own hands, without financial help from anybody.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;413&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;404&quot;&gt;&lt;strong data-dcnode-id=&quot;411&quot;&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt;STILL STRUGGLING ON&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;410&quot;&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;405&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/article/the-aeronautic-societys-first-exhib/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;407&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;Scientific American,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt; November 14, 1908, page 338&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;398&quot;&gt;&lt;span data-dcnode-id=&quot;402&quot; instrument_node=&quot;&quot;&gt;Two years after Alberto Santos-Dumont’s public powered takeoffs in a wheeled aircraft in October 1906, ten months after Henri Farman flew a one-kilometer circle in France, three months after the news of the Wrights triumphant flights near Le Mans, France, four months after Glenn Curtiss’s first public flight in the U.S. flying the June Bug (he won the &lt;/span&gt;&lt;em data-dcnode-id=&quot;400&quot;&gt;&lt;span data-dcnode-id=&quot;401&quot; instrument_node=&quot;&quot;&gt;Scientific American&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;399&quot; instrument_node=&quot;&quot;&gt; Prize for the flight), Election Day was held in the United States, on 3 November, 1908. At the Aeronautic Society’s first exhibition at Morris Park, Whitehead’s work was represented. The text says it is “an improved type of aeroplane, which was invented some three years ago by Gustave Whitehead, of Bridgeport, Conn.,” and photographs of it were printed. It is an unpowered glider.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;395&quot;&gt;&lt;span data-dcnode-id=&quot;396&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;385&quot;&gt;&lt;strong data-dcnode-id=&quot;392&quot;&gt;&lt;span data-dcnode-id=&quot;393&quot; instrument_node=&quot;&quot;&gt;WHO WAS FIRST IN FLIGHT?&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;391&quot;&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a data-dcnode-id=&quot;386&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.scientificamerican.com/article/the-legal-triumph-of-the-wrights-ti/&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;388&quot;&gt;&lt;span data-dcnode-id=&quot;389&quot; instrument_node=&quot;&quot;&gt;Scientific American,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt; January 24, 1914, page 76&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;382&quot;&gt;&lt;span data-dcnode-id=&quot;383&quot; instrument_node=&quot;&quot;&gt;Following the end of the legal battle between the Wrights and the Curtiss company, the lead editorial for the issue confirms the Wrights as the first in flight. The editorial does not mention Whitehead (although it does mention other aviation pioneers). The text opens with:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;381&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;379&quot; style=&quot;margin-left: 40px;&quot;&gt;&lt;span data-dcnode-id=&quot;380&quot; instrument_node=&quot;&quot;&gt;The decision which has been handed down by the Circuit Court of Appeals in the infringement suit brought by the Wright Company settles once and for all, in this country at least, the question: Who invented the flying machine? To be sure, there was never any doubt in the popular mind. Practical achievement counts for so much and paper discussion for so little, that the inventor who rises above the mere theoretical presentation of his ideas is inevitably glorified. The decision of the Circuit Court of Appeals stamps the popular verdict with approval and recognizes Orville and Wilbur Wright as the inventors of the man-carrying, motor-driven aeroplane.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;373&quot;&gt;&lt;strong data-dcnode-id=&quot;376&quot;&gt;&lt;span data-dcnode-id=&quot;377&quot; instrument_node=&quot;&quot;&gt;ONE NOTE: FOLLOW THE MONEY&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;375&quot;&gt;&lt;span data-dcnode-id=&quot;374&quot; instrument_node=&quot;&quot;&gt;
Stanley Y. Beach, the author of many articles on aviation--quite probably the author of some of the above articles (articles back then rarely included bylines)--was the son of the Editor in Chief of the magazine. He saw to it that over several years some funds were provided to Whitehead to continue his flight experiments. There was therefore a closer relation between journalist and subject than usual. I leave it up to future historians to determine whether this relationship led to the creeping introduction of any kind of bias--pro-Whitehead or anti-Whitehead--in these articles.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;364&quot;&gt;&lt;strong data-dcnode-id=&quot;370&quot;&gt;&lt;span data-dcnode-id=&quot;371&quot; instrument_node=&quot;&quot;&gt;CONCLUSION&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;369&quot;&gt;&lt;span data-dcnode-id=&quot;368&quot; instrument_node=&quot;&quot;&gt;
In determining whether the Wright Brothers or Gustave Whitehead first successfully piloted an airplane, I have enough data--the original text within its original context--at hand, (and now, dear reader, so do you) to show that &lt;/span&gt;&lt;em data-dcnode-id=&quot;366&quot;&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt;Scientific American&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;365&quot; instrument_node=&quot;&quot;&gt; quite clearly gives the priority to the Wright brothers. The data show that not only was Whitehead not first in flight, but that he may never have made a controlled, powered flight at any time. This one strand in the complex web of history lends weight to the argument that Connecticut is wasting time and effort by legislating the erroneous history that Whitehead deserves to be recognized as first in flight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;357&quot;&gt;&lt;em data-dcnode-id=&quot;358&quot;&gt;&lt;span data-dcnode-id=&quot;362&quot; instrument_node=&quot;&quot;&gt;This article is updated and edited from the one originally written by Dan Schlenoff for Carroll F. Gray’s Web site &lt;/span&gt;&lt;a data-dcnode-id=&quot;360&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.flyingmachines.org/&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;http://www.flyingmachines.org/&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt; in November 2013.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;article-rightslink&quot; data-dcnode-id=&quot;342&quot;&gt;&lt;div class=&quot;article-reprintsLink&quot; data-dcnode-id=&quot;343&quot;&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;
