&lt;/span&gt;&lt;li class=&quot;toclevel-1 tocsection-17&quot; data-dcnode-id=&quot;3787&quot;&gt;&lt;a data-dcnode-id=&quot;3788&quot; href=&quot;#External_links&quot;&gt;&lt;span class=&quot;tocnumber&quot; data-dcnode-id=&quot;3792&quot;&gt;&lt;span data-dcnode-id=&quot;3793&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;3791&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span class=&quot;toctext&quot; data-dcnode-id=&quot;3789&quot;&gt;&lt;span data-dcnode-id=&quot;3790&quot; instrument_node=&quot;&quot;&gt;External links&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;3786&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;3772&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;3780&quot; id=&quot;Early_life&quot;&gt;&lt;span data-dcnode-id=&quot;3781&quot; instrument_node=&quot;&quot;&gt;Early life&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;3773&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3778&quot;&gt;&lt;span data-dcnode-id=&quot;3779&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;3776&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGustave_Eiffel%26action%3Dedit%26section%3D1&quot; title=&quot;Edit section: Early life&quot;&gt;&lt;span data-dcnode-id=&quot;3777&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3774&quot;&gt;&lt;span data-dcnode-id=&quot;3775&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;3771&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3738&quot;&gt;&lt;span data-dcnode-id=&quot;3770&quot; instrument_node=&quot;&quot;&gt;Alexandre Gustave Eiffel was born in France, in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3768&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/C%25C3%25B4te-d%27Or&quot; title=&quot;Côte-d'Or&quot;&gt;&lt;span data-dcnode-id=&quot;3769&quot; instrument_node=&quot;&quot;&gt;Côte-d'Or&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3767&quot; instrument_node=&quot;&quot;&gt;, the first child of Catherine-Mélanie (née Moneuse) and Alexandre Bonickhausen dit Eiffel.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3764&quot; id=&quot;cite_ref-google_6-0&quot;&gt;&lt;a data-dcnode-id=&quot;3765&quot; href=&quot;#cite_note-google-6&quot;&gt;&lt;span data-dcnode-id=&quot;3766&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3763&quot; instrument_node=&quot;&quot;&gt; He was a descendant of Marguerite Frédérique (née Lideriz) and Jean-René Bönickhausen and who had emigrated from the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3761&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Germany&quot; title=&quot;Germany&quot;&gt;&lt;span data-dcnode-id=&quot;3762&quot; instrument_node=&quot;&quot;&gt;German&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3760&quot; instrument_node=&quot;&quot;&gt; town of &lt;/span&gt;&lt;a data-dcnode-id=&quot;3758&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Marmagen&quot; title=&quot;Marmagen&quot;&gt;&lt;span data-dcnode-id=&quot;3759&quot; instrument_node=&quot;&quot;&gt;Marmagen&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3757&quot; instrument_node=&quot;&quot;&gt; and settled in Paris at the beginning of the 18th century.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3754&quot; id=&quot;cite_ref-7&quot;&gt;&lt;a data-dcnode-id=&quot;3755&quot; href=&quot;#cite_note-7&quot;&gt;&lt;span data-dcnode-id=&quot;3756&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3753&quot; instrument_node=&quot;&quot;&gt; The family adopted the name Eiffel as a reference to the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3751&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Eifel&quot; title=&quot;Eifel&quot;&gt;&lt;span data-dcnode-id=&quot;3752&quot; instrument_node=&quot;&quot;&gt;Eifel&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3750&quot; instrument_node=&quot;&quot;&gt; mountains in the region from which they had come. Although the family always used the name Eiffel, Gustave's name was registered at birth as Bonickhausen dit Eiffel,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3747&quot; id=&quot;cite_ref-autogenerated249_1-1&quot;&gt;&lt;a data-dcnode-id=&quot;3748&quot; href=&quot;#cite_note-autogenerated249-1&quot;&gt;&lt;span data-dcnode-id=&quot;3749&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3746&quot; instrument_node=&quot;&quot;&gt;  and was not formally changed to Eiffel until 1880.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3743&quot; id=&quot;cite_ref-autogenerated1_2-1&quot;&gt;&lt;a data-dcnode-id=&quot;3744&quot; href=&quot;#cite_note-autogenerated1-2&quot;&gt;&lt;span data-dcnode-id=&quot;3745&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3740&quot; id=&quot;cite_ref-Google_Books_2016_5-1&quot;&gt;&lt;a data-dcnode-id=&quot;3741&quot; href=&quot;#cite_note-Google_Books_2016-5&quot;&gt;&lt;span data-dcnode-id=&quot;3742&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3722&quot;&gt;&lt;span data-dcnode-id=&quot;3737&quot; instrument_node=&quot;&quot;&gt;At the time of Gustave's birth his father, an ex-soldier, was working as an administrator for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3735&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/French_Army&quot; title=&quot;French Army&quot;&gt;&lt;span data-dcnode-id=&quot;3736&quot; instrument_node=&quot;&quot;&gt;French Army&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3734&quot; instrument_node=&quot;&quot;&gt;; but shortly after his birth his mother expanded a charcoal business she had inherited from her parents to include a coal-distribution business, and soon afterwards his father gave up his job to assist her. Due to his mother's business commitments, Gustave spent his childhood living with his grandmother, but nevertheless remained close to his mother, who was to remain an influential figure until her death in 1878. The business was successful enough for Catherine Eiffel to sell it in 1843 and retire on the proceeds.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3731&quot; id=&quot;cite_ref-8&quot;&gt;&lt;a data-dcnode-id=&quot;3732&quot; href=&quot;#cite_note-8&quot;&gt;&lt;span data-dcnode-id=&quot;3733&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3730&quot; instrument_node=&quot;&quot;&gt; Eiffel was not a studious child, and thought his classes at the Lycée Royal in Dijon boring and a waste of time, although in his last two years, influenced by his teachers for history and literature, he began to study seriously, and he gained his &lt;/span&gt;&lt;a data-dcnode-id=&quot;3728&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Baccalaur%25C3%25A9at&quot; title=&quot;Baccalauréat&quot;&gt;&lt;span data-dcnode-id=&quot;3729&quot; instrument_node=&quot;&quot;&gt;baccalauréats&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3727&quot; instrument_node=&quot;&quot;&gt; in humanities and science.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3724&quot; id=&quot;cite_ref-9&quot;&gt;&lt;a data-dcnode-id=&quot;3725&quot; href=&quot;#cite_note-9&quot;&gt;&lt;span data-dcnode-id=&quot;3726&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3723&quot; instrument_node=&quot;&quot;&gt;
An important part in his education was played by his uncle, Jean-Baptiste Mollerat, who had invented a process for distilling vinegar and had a large chemical works near Dijon, and one of his uncle's friends, the chemist Michel Perret. Both men spent a lot of time with the young Eiffel, teaching him about everything from chemistry and mining to theology and philosophy.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3703&quot;&gt;&lt;span data-dcnode-id=&quot;3721&quot; instrument_node=&quot;&quot;&gt;Eiffel went on to attend the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3719&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Coll%25C3%25A8ge_Sainte-Barbe&quot; title=&quot;Collège Sainte-Barbe&quot;&gt;&lt;span data-dcnode-id=&quot;3720&quot; instrument_node=&quot;&quot;&gt;Collège Sainte-Barbe&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3718&quot; instrument_node=&quot;&quot;&gt; in Paris, to prepare for the difficult entrance exams set by engineering colleges in France, and qualified for entry to two of the most prestigious schools – &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3716&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589cole_polytechnique&quot; title=&quot;École polytechnique&quot;&gt;&lt;span data-dcnode-id=&quot;3717&quot; instrument_node=&quot;&quot;&gt;École polytechnique&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3715&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3713&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589cole_Centrale_des_Arts_et_Manufactures&quot; title=&quot;École Centrale des Arts et Manufactures&quot;&gt;&lt;span data-dcnode-id=&quot;3714&quot; instrument_node=&quot;&quot;&gt;École Centrale des Arts et Manufactures&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3712&quot; instrument_node=&quot;&quot;&gt; – and ultimately entered the latter.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3709&quot; id=&quot;cite_ref-10&quot;&gt;&lt;a data-dcnode-id=&quot;3710&quot; href=&quot;#cite_note-10&quot;&gt;&lt;span data-dcnode-id=&quot;3711&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3708&quot; instrument_node=&quot;&quot;&gt; During his second year he chose to specialize in chemistry, and graduated ranking at 13th place out of 80 candidates in 1855. This was the year that Paris hosted the second World's Fair, and Eiffel was bought a season ticket by his mother.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3705&quot; id=&quot;cite_ref-11&quot;&gt;&lt;a data-dcnode-id=&quot;3706&quot; href=&quot;#cite_note-11&quot;&gt;&lt;span data-dcnode-id=&quot;3707&quot; instrument_node=&quot;&quot;&gt;[11]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3702&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;3692&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;3700&quot; id=&quot;Early_career&quot;&gt;&lt;span data-dcnode-id=&quot;3701&quot; instrument_node=&quot;&quot;&gt;Early career&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;3693&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3698&quot;&gt;&lt;span data-dcnode-id=&quot;3699&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;3696&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGustave_Eiffel%26action%3Dedit%26section%3D2&quot; title=&quot;Edit section: Early career&quot;&gt;&lt;span data-dcnode-id=&quot;3697&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3694&quot;&gt;&lt;span data-dcnode-id=&quot;3695&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;3691&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;3682&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;3683&quot; style=&quot;width:222px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;3689&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ABordeaux_passerelle_Eiffel.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;3690&quot; data-file-height=&quot;310&quot; data-file-width=&quot;514&quot; decoding=&quot;async&quot; height=&quot;133&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/19/Bordeaux_passerelle_Eiffel.jpg/220px-Bordeaux_passerelle_Eiffel.jpg&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/1/19/Bordeaux_passerelle_Eiffel.jpg/330px-Bordeaux_passerelle_Eiffel.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/19/Bordeaux_passerelle_Eiffel.jpg/440px-Bordeaux_passerelle_Eiffel.jpg 2x&quot; width=&quot;220&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3688&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;3684&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;3686&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;3687&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ABordeaux_passerelle_Eiffel.jpg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3685&quot; instrument_node=&quot;&quot;&gt;The Bordeaux bridge, Eiffel's first major work&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3681&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3647&quot;&gt;&lt;span data-dcnode-id=&quot;3680&quot; instrument_node=&quot;&quot;&gt;After graduation, Eiffel had hoped to find work in his uncle's workshop in Dijon, but a family dispute made this impossible. After a few months working as an unpaid assistant to his brother-in-law, who managed a &lt;/span&gt;&lt;a data-dcnode-id=&quot;3678&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Foundry&quot; title=&quot;Foundry&quot;&gt;&lt;span data-dcnode-id=&quot;3679&quot; instrument_node=&quot;&quot;&gt;foundry&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3677&quot; instrument_node=&quot;&quot;&gt;, Eiffel approached the railway engineer &lt;/span&gt;&lt;a class=&quot;new&quot; data-dcnode-id=&quot;3675&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCharles_Nepveu%26action%3Dedit%26redlink%3D1&quot; title=&quot;Charles Nepveu (page does not exist)&quot;&gt;&lt;span data-dcnode-id=&quot;3676&quot; instrument_node=&quot;&quot;&gt;Charles Nepveu&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3674&quot; instrument_node=&quot;&quot;&gt;, who gave Eiffel his first paid job as his private secretary.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3671&quot; id=&quot;cite_ref-12&quot;&gt;&lt;a data-dcnode-id=&quot;3672&quot; href=&quot;#cite_note-12&quot;&gt;&lt;span data-dcnode-id=&quot;3673&quot; instrument_node=&quot;&quot;&gt;[12]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3670&quot; instrument_node=&quot;&quot;&gt;  However, shortly afterwards Nepveu's company went bankrupt, Nepveu found Eiffel a job designing a 22&amp;nbsp;m (72&amp;nbsp;ft) sheet iron bridge for the Saint Germaine railway. Some of Nepveu's businesses were then acquired by the Compagnie Belge de Matériels de Chemin de Fer: Nepveu was appointed the managing director of the two factories in Paris, and offered Eiffel a job as head of the research department. In 1857 Nepveu negotiated a contract to build a railway bridge over the river &lt;/span&gt;&lt;a data-dcnode-id=&quot;3668&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Garonne&quot; title=&quot;Garonne&quot;&gt;&lt;span data-dcnode-id=&quot;3669&quot; instrument_node=&quot;&quot;&gt;Garonne&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3667&quot; instrument_node=&quot;&quot;&gt; at &lt;/span&gt;&lt;a data-dcnode-id=&quot;3665&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Bordeaux&quot; title=&quot;Bordeaux&quot;&gt;&lt;span data-dcnode-id=&quot;3666&quot; instrument_node=&quot;&quot;&gt;Bordeaux&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3664&quot; instrument_node=&quot;&quot;&gt;, connecting the Paris-Bordeaux line to the lines running to &lt;/span&gt;&lt;a data-dcnode-id=&quot;3662&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/S%25C3%25A8te&quot; title=&quot;Sète&quot;&gt;&lt;span data-dcnode-id=&quot;3663&quot; instrument_node=&quot;&quot;&gt;Sète&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3661&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3659&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Bayonne&quot; title=&quot;Bayonne&quot;&gt;&lt;span data-dcnode-id=&quot;3660&quot; instrument_node=&quot;&quot;&gt;Bayonne&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3658&quot; instrument_node=&quot;&quot;&gt;, which involved the construction of a 500&amp;nbsp;m (1,600&amp;nbsp;ft) iron girder bridge supported by six pairs of masonry piers on the river bed. These were constructed with the aid of compressed air &lt;/span&gt;&lt;a data-dcnode-id=&quot;3656&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Caisson_%28engineering%29&quot; title=&quot;Caisson (engineering)&quot;&gt;&lt;span data-dcnode-id=&quot;3657&quot; instrument_node=&quot;&quot;&gt;caissons&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3655&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3653&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hydraulic_rams&quot; title=&quot;Hydraulic rams&quot;&gt;&lt;span data-dcnode-id=&quot;3654&quot; instrument_node=&quot;&quot;&gt;hydraulic rams&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3652&quot; instrument_node=&quot;&quot;&gt;, both innovative techniques at the time. Eiffel was initially given the responsibility of assembling the metalwork and eventually took over the management of the entire project from Nepveu, who resigned in March 1860.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3649&quot; id=&quot;cite_ref-13&quot;&gt;&lt;a data-dcnode-id=&quot;3650&quot; href=&quot;#cite_note-13&quot;&gt;&lt;span data-dcnode-id=&quot;3651&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3648&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3608&quot;&gt;&lt;span data-dcnode-id=&quot;3646&quot; instrument_node=&quot;&quot;&gt;Following the completion of the project on schedule Eiffel was appointed as the principal engineer of the Compagnie Belge. His work had also gained the attention of several people who were later to give him work, including Stanislas de la Roche Toulay, who had prepared the design for the metalwork of the Bordeaux bridge, Jean Baptiste Krantz and Wilhelm Nordling. Further promotion within the company followed, but the business began to decline, and in 1865 Eiffel, seeing no future there, resigned and set up as an independent consulting engineer. He was already working independently on the construction of two railway stations, at &lt;/span&gt;&lt;a data-dcnode-id=&quot;3644&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Toulouse&quot; title=&quot;Toulouse&quot;&gt;&lt;span data-dcnode-id=&quot;3645&quot; instrument_node=&quot;&quot;&gt;Toulouse&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3643&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3641&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Agen&quot; title=&quot;Agen&quot;&gt;&lt;span data-dcnode-id=&quot;3642&quot; instrument_node=&quot;&quot;&gt;Agen&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3640&quot; instrument_node=&quot;&quot;&gt;, and in 1866 he was given a contract to oversee the construction of 33 &lt;/span&gt;&lt;a data-dcnode-id=&quot;3638&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Locomotive&quot; title=&quot;Locomotive&quot;&gt;&lt;span data-dcnode-id=&quot;3639&quot; instrument_node=&quot;&quot;&gt;locomotives&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3637&quot; instrument_node=&quot;&quot;&gt; for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3635&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Egypt&quot; title=&quot;Egypt&quot;&gt;&lt;span data-dcnode-id=&quot;3636&quot; instrument_node=&quot;&quot;&gt;Egyptian&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3634&quot; instrument_node=&quot;&quot;&gt; government, a profitable but undemanding job in the course of which he visited Egypt, where he visited the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3632&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Suez_Canal&quot; title=&quot;Suez Canal&quot;&gt;&lt;span data-dcnode-id=&quot;3633&quot; instrument_node=&quot;&quot;&gt;Suez Canal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3631&quot; instrument_node=&quot;&quot;&gt; which was being constructed by &lt;/span&gt;&lt;a data-dcnode-id=&quot;3629&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Ferdinand_de_Lesseps&quot; title=&quot;Ferdinand de Lesseps&quot;&gt;&lt;span data-dcnode-id=&quot;3630&quot; instrument_node=&quot;&quot;&gt;Ferdinand de Lesseps&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3628&quot; instrument_node=&quot;&quot;&gt;. At the same time he was employed by Jean-Baptiste Kranz to assist him in the design of the exhibition hall for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3626&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281867%29&quot; title=&quot;Exposition Universelle (1867)&quot;&gt;&lt;span data-dcnode-id=&quot;3627&quot; instrument_node=&quot;&quot;&gt;Exposition Universelle&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3625&quot; instrument_node=&quot;&quot;&gt; which was to be held in 1867. Eiffel's principal job was to draw up the arch girders of the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3623&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Galerie_des_Machines&quot; title=&quot;Galerie des Machines&quot;&gt;&lt;span data-dcnode-id=&quot;3624&quot; instrument_node=&quot;&quot;&gt;Galerie des Machines&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3622&quot; instrument_node=&quot;&quot;&gt;. In order to carry out this work, Eiffel and Henri Treca, the director of the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3620&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Conservatoire_des_Arts_et_Metiers&quot; title=&quot;Conservatoire des Arts et Metiers&quot;&gt;&lt;span data-dcnode-id=&quot;3621&quot; instrument_node=&quot;&quot;&gt;Conservatoire des Arts et Metiers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3619&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3616&quot; id=&quot;cite_ref-14&quot;&gt;&lt;a data-dcnode-id=&quot;3617&quot; href=&quot;#cite_note-14&quot;&gt;&lt;span data-dcnode-id=&quot;3618&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3615&quot; instrument_node=&quot;&quot;&gt; conducted valuable research on the structural properties of &lt;/span&gt;&lt;a data-dcnode-id=&quot;3613&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Cast_iron&quot; title=&quot;Cast iron&quot;&gt;&lt;span data-dcnode-id=&quot;3614&quot; instrument_node=&quot;&quot;&gt;cast iron&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3612&quot; instrument_node=&quot;&quot;&gt;, definitively establishing the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3610&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Modulus_of_elasticity&quot; title=&quot;Modulus of elasticity&quot;&gt;&lt;span data-dcnode-id=&quot;3611&quot; instrument_node=&quot;&quot;&gt;modulus of elasticity&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3609&quot; instrument_node=&quot;&quot;&gt; applicable to compound castings.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3607&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;3597&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;3605&quot; id=&quot;Eiffel_et_Cie&quot;&gt;&lt;span data-dcnode-id=&quot;3606&quot; instrument_node=&quot;&quot;&gt;Eiffel et Cie&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;3598&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3603&quot;&gt;&lt;span data-dcnode-id=&quot;3604&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;3601&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGustave_Eiffel%26action%3Dedit%26section%3D3&quot; title=&quot;Edit section: Eiffel et Cie&quot;&gt;&lt;span data-dcnode-id=&quot;3602&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3599&quot;&gt;&lt;span data-dcnode-id=&quot;3600&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;3596&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;3585&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;3586&quot; style=&quot;width:222px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;3594&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ABudapest_nyugati_trams.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;3595&quot; data-file-height=&quot;1469&quot; data-file-width=&quot;2213&quot; decoding=&quot;async&quot; height=&quot;146&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Budapest_nyugati_trams.jpg/220px-Budapest_nyugati_trams.jpg&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Budapest_nyugati_trams.jpg/330px-Budapest_nyugati_trams.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Budapest_nyugati_trams.jpg/440px-Budapest_nyugati_trams.jpg 2x&quot; width=&quot;220&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3593&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;3587&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;3591&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;3592&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ABudapest_nyugati_trams.jpg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3590&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3588&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Budapest_Nyugati_railway_station&quot; title=&quot;Budapest Nyugati railway station&quot;&gt;&lt;span data-dcnode-id=&quot;3589&quot; instrument_node=&quot;&quot;&gt;Budapest Nyugati railway station&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3548&quot;&gt;&lt;span data-dcnode-id=&quot;3583&quot; instrument_node=&quot;&quot;&gt;At the end of 1866 Eiffel managed to borrow enough money to set up his own workshops at 48 Rue Fouquet in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3581&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Levallois-Perret&quot; title=&quot;Levallois-Perret&quot;&gt;&lt;span data-dcnode-id=&quot;3582&quot; instrument_node=&quot;&quot;&gt;Levallois-Perret&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3580&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3577&quot; id=&quot;cite_ref-15&quot;&gt;&lt;a data-dcnode-id=&quot;3578&quot; href=&quot;#cite_note-15&quot;&gt;&lt;span data-dcnode-id=&quot;3579&quot; instrument_node=&quot;&quot;&gt;[15]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3576&quot; instrument_node=&quot;&quot;&gt;  His first important commission was for two &lt;/span&gt;&lt;a data-dcnode-id=&quot;3574&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Viaduct&quot; title=&quot;Viaduct&quot;&gt;&lt;span data-dcnode-id=&quot;3575&quot; instrument_node=&quot;&quot;&gt;viaducts&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3573&quot; instrument_node=&quot;&quot;&gt; for the railway line between &lt;/span&gt;&lt;a data-dcnode-id=&quot;3571&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Lyon&quot; title=&quot;Lyon&quot;&gt;&lt;span data-dcnode-id=&quot;3572&quot; instrument_node=&quot;&quot;&gt;Lyon&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3570&quot; instrument_node=&quot;&quot;&gt; and Bordeaux, and the company also began to undertake work in other countries, including &lt;/span&gt;&lt;a data-dcnode-id=&quot;3568&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/St._Mark%2527s_Cathedral%2C_Arica&quot; title=&quot;St. Mark's Cathedral, Arica&quot;&gt;&lt;span data-dcnode-id=&quot;3569&quot; instrument_node=&quot;&quot;&gt;St. Mark's Cathedral&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3567&quot; instrument_node=&quot;&quot;&gt; in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3565&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Arica&quot; title=&quot;Arica&quot;&gt;&lt;span data-dcnode-id=&quot;3566&quot; instrument_node=&quot;&quot;&gt;Arica&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3564&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;3562&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Peru&quot; title=&quot;Peru&quot;&gt;&lt;span data-dcnode-id=&quot;3563&quot; instrument_node=&quot;&quot;&gt;Peru&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3561&quot; instrument_node=&quot;&quot;&gt;, which was an all-metal prefabricated building, manufactured in France and shipped to South America in pieces to be assembled on site; first it was intended for the city of &lt;/span&gt;&lt;a data-dcnode-id=&quot;3559&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Anc%25C3%25B3n_District&quot; title=&quot;Ancón District&quot;&gt;&lt;span data-dcnode-id=&quot;3560&quot; instrument_node=&quot;&quot;&gt;Ancón&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3558&quot; instrument_node=&quot;&quot;&gt;, a beach near &lt;/span&gt;&lt;a data-dcnode-id=&quot;3556&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Lima&quot; title=&quot;Lima&quot;&gt;&lt;span data-dcnode-id=&quot;3557&quot; instrument_node=&quot;&quot;&gt;Lima&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3555&quot; instrument_node=&quot;&quot;&gt;, but the Peruvian Government of President &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3553&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Jose_Balta&quot; title=&quot;Jose Balta&quot;&gt;&lt;span data-dcnode-id=&quot;3554&quot; instrument_node=&quot;&quot;&gt;José Balta&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3552&quot; instrument_node=&quot;&quot;&gt; changed the final destination to Arica because the old church was destroyed by an &lt;/span&gt;&lt;a data-dcnode-id=&quot;3550&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/1868_Arica_earthquake&quot; title=&quot;1868 Arica earthquake&quot;&gt;&lt;span data-dcnode-id=&quot;3551&quot; instrument_node=&quot;&quot;&gt;earthquake on 13 August 1868&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3549&quot; instrument_node=&quot;&quot;&gt;. Because of this, a committee of ladies of Arica asked Balta to relocate Eiffel's structure to Arica.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3527&quot;&gt;&lt;span data-dcnode-id=&quot;3547&quot; instrument_node=&quot;&quot;&gt;On 6 October 1868 he entered into partnership with &lt;/span&gt;&lt;a data-dcnode-id=&quot;3545&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Th%25C3%25A9ophile_Seyrig&quot; title=&quot;Théophile Seyrig&quot;&gt;&lt;span data-dcnode-id=&quot;3546&quot; instrument_node=&quot;&quot;&gt;Théophile Seyrig&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3544&quot; instrument_node=&quot;&quot;&gt;, like Eiffel a graduate of the École Centrale, forming the company Eiffel et Cie.
In 1875, Eiffel et Cie were given two important contracts, one for the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3542&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Budapest_Nyugati_railway_station&quot; title=&quot;Budapest Nyugati railway station&quot;&gt;&lt;span data-dcnode-id=&quot;3543&quot; instrument_node=&quot;&quot;&gt;Budapest Nyugati railway station&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3541&quot; instrument_node=&quot;&quot;&gt; for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3539&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Vienna&quot; title=&quot;Vienna&quot;&gt;&lt;span data-dcnode-id=&quot;3540&quot; instrument_node=&quot;&quot;&gt;Vienna&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3538&quot; instrument_node=&quot;&quot;&gt; to &lt;/span&gt;&lt;a data-dcnode-id=&quot;3536&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Budapest&quot; title=&quot;Budapest&quot;&gt;&lt;span data-dcnode-id=&quot;3537&quot; instrument_node=&quot;&quot;&gt;Budapest&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3535&quot; instrument_node=&quot;&quot;&gt; railway and the other for a bridge over the river &lt;/span&gt;&lt;a data-dcnode-id=&quot;3533&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Douro&quot; title=&quot;Douro&quot;&gt;&lt;span data-dcnode-id=&quot;3534&quot; instrument_node=&quot;&quot;&gt;Douro&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3532&quot; instrument_node=&quot;&quot;&gt; in Portugal.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3529&quot; id=&quot;cite_ref-16&quot;&gt;&lt;a data-dcnode-id=&quot;3530&quot; href=&quot;#cite_note-16&quot;&gt;&lt;span data-dcnode-id=&quot;3531&quot; instrument_node=&quot;&quot;&gt;[16]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3528&quot; instrument_node=&quot;&quot;&gt;  The station in Budapest was an innovative design. The usual pattern for building a railway terminus was to conceal the metal structure behind an elaborate facade: Eiffel's design for Budapest used the metal structure as the centerpiece of the building, flanked on either side by conventional stone and brick-clad structures housing administrative offices.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3526&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tleft&quot; data-dcnode-id=&quot;3515&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;3516&quot; style=&quot;width:222px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;3524&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3APonte_Maria_Pia_-_Porto.JPG&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;3525&quot; data-file-height=&quot;1920&quot; data-file-width=&quot;2560&quot; decoding=&quot;async&quot; height=&quot;165&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/49/Ponte_Maria_Pia_-_Porto.JPG/220px-Ponte_Maria_Pia_-_Porto.JPG&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/4/49/Ponte_Maria_Pia_-_Porto.JPG/330px-Ponte_Maria_Pia_-_Porto.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/49/Ponte_Maria_Pia_-_Porto.JPG/440px-Ponte_Maria_Pia_-_Porto.JPG 2x&quot; width=&quot;220&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3523&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;3517&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;3521&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;3522&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3APonte_Maria_Pia_-_Porto.JPG&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3520&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;3518&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Maria_Pia_Bridge&quot; title=&quot;Maria Pia Bridge&quot;&gt;&lt;span data-dcnode-id=&quot;3519&quot; instrument_node=&quot;&quot;&gt;Maria Pia Bridge&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3514&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3502&quot;&gt;&lt;span data-dcnode-id=&quot;3513&quot; instrument_node=&quot;&quot;&gt;The bridge over the Douro came about as the result of a competition held by the Royal Portuguese Railroad Company. The task was a demanding one: the river was fast-flowing, up to 20&amp;nbsp;m (66&amp;nbsp;ft) deep, and had a bed formed of a deep layer of gravel which made the construction of piers on the river bed impossible, and so the bridge had to have a central span of 160&amp;nbsp;m (520&amp;nbsp;ft). This was greater than the longest arch span which had been built at the time.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3510&quot; id=&quot;cite_ref-17&quot;&gt;&lt;a data-dcnode-id=&quot;3511&quot; href=&quot;#cite_note-17&quot;&gt;&lt;span data-dcnode-id=&quot;3512&quot; instrument_node=&quot;&quot;&gt;[17]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3509&quot; instrument_node=&quot;&quot;&gt;
Eiffel's proposal was for a bridge whose deck was supported by five iron piers, with the abutments of the pair on the river bank also bearing a central supporting arch. The price quoted by Eiffel was FF.965,000, far below the nearest competitor and so he was given the job, although since his company was less experienced than his rivals the Portuguese authorities appointed a committee to report on Eiffel et Cie's suitability. The members included Jean-Baptiste Krantz, Henri Dion and Léon Molinos, both of whom had known Eiffel for a long time: their report was favorable, and Eiffel got the job. On-site work began in January 1876 and was complete by the end of October 1877: the bridge was ceremonially opened by &lt;/span&gt;&lt;a data-dcnode-id=&quot;3507&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Lu%25C3%25ADs_I_of_Portugal&quot; title=&quot;Luís I of Portugal&quot;&gt;&lt;span data-dcnode-id=&quot;3508&quot; instrument_node=&quot;&quot;&gt;King Luís I&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3506&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3504&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Maria_Pia_of_Savoy&quot; title=&quot;Maria Pia of Savoy&quot;&gt;&lt;span data-dcnode-id=&quot;3505&quot; instrument_node=&quot;&quot;&gt;Queen Maria Pia&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3503&quot; instrument_node=&quot;&quot;&gt;, after whom the bridge was named, on 4 November.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3490&quot;&gt;&lt;span data-dcnode-id=&quot;3501&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;3499&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281878%29&quot; title=&quot;Exposition Universelle (1878)&quot;&gt;&lt;span data-dcnode-id=&quot;3500&quot; instrument_node=&quot;&quot;&gt;Exposition Universelle in 1878&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3498&quot; instrument_node=&quot;&quot;&gt; firmly established his reputation as one of the leading engineers of the time. As well as exhibiting models and drawings of work undertaken by the company, Eiffel was also responsible for the construction of several of the exhibition buildings.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3495&quot; id=&quot;cite_ref-18&quot;&gt;&lt;a data-dcnode-id=&quot;3496&quot; href=&quot;#cite_note-18&quot;&gt;&lt;span data-dcnode-id=&quot;3497&quot; instrument_node=&quot;&quot;&gt;[18]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3494&quot; instrument_node=&quot;&quot;&gt; One of these, a pavilion for the Paris Gas Company, was Eiffel's first collaboration with &lt;/span&gt;&lt;a data-dcnode-id=&quot;3492&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Sauvestre&quot; title=&quot;Stephen Sauvestre&quot;&gt;&lt;span data-dcnode-id=&quot;3493&quot; instrument_node=&quot;&quot;&gt;Stephen Sauvestre&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3491&quot; instrument_node=&quot;&quot;&gt;, who was later to become the head of the company's architectural office.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3460&quot;&gt;&lt;span data-dcnode-id=&quot;3489&quot; instrument_node=&quot;&quot;&gt;In 1879 the partnership with Seyrig was dissolved, and the company was renamed the &lt;/span&gt;&lt;b data-dcnode-id=&quot;3487&quot;&gt;&lt;span data-dcnode-id=&quot;3488&quot; instrument_node=&quot;&quot;&gt;Compagnie des Établissements Eiffel.&lt;/span&gt;&lt;/b&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3484&quot; id=&quot;cite_ref-19&quot;&gt;&lt;a data-dcnode-id=&quot;3485&quot; href=&quot;#cite_note-19&quot;&gt;&lt;span data-dcnode-id=&quot;3486&quot; instrument_node=&quot;&quot;&gt;[19]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3483&quot; instrument_node=&quot;&quot;&gt;
The same year the company was given the contract for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3481&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Garabit_viaduct&quot; title=&quot;Garabit viaduct&quot;&gt;&lt;span data-dcnode-id=&quot;3482&quot; instrument_node=&quot;&quot;&gt;Garabit viaduct&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3480&quot; instrument_node=&quot;&quot;&gt;, a railway bridge near &lt;/span&gt;&lt;a class=&quot;new&quot; data-dcnode-id=&quot;3478&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRuynes_en_Margeride%26action%3Dedit%26redlink%3D1&quot; title=&quot;Ruynes en Margeride (page does not exist)&quot;&gt;&lt;span data-dcnode-id=&quot;3479&quot; instrument_node=&quot;&quot;&gt;Ruynes en Margeride&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3477&quot; instrument_node=&quot;&quot;&gt; in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3475&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Cantal&quot; title=&quot;Cantal&quot;&gt;&lt;span data-dcnode-id=&quot;3476&quot; instrument_node=&quot;&quot;&gt;Cantal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3474&quot; instrument_node=&quot;&quot;&gt; département. Like the Douro bridge, the project involved a lengthy viaduct crossing the river valley as well as the river itself, and Eiffel was given the job without any process of competitive tendering due to his success with the bridge over the Douro.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3471&quot; id=&quot;cite_ref-20&quot;&gt;&lt;a data-dcnode-id=&quot;3472&quot; href=&quot;#cite_note-20&quot;&gt;&lt;span data-dcnode-id=&quot;3473&quot; instrument_node=&quot;&quot;&gt;[20]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3470&quot; instrument_node=&quot;&quot;&gt;  To assist him in the work he took on several people who were to play important roles in the design and construction of the Eiffel Tower, including &lt;/span&gt;&lt;a data-dcnode-id=&quot;3468&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Koechlin&quot; title=&quot;Maurice Koechlin&quot;&gt;&lt;span data-dcnode-id=&quot;3469&quot; instrument_node=&quot;&quot;&gt;Maurice Koechlin&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3467&quot; instrument_node=&quot;&quot;&gt;, a young graduate of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3465&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/ETH_Zurich&quot; title=&quot;ETH Zurich&quot;&gt;&lt;span data-dcnode-id=&quot;3466&quot; instrument_node=&quot;&quot;&gt;Zurich Polytechnikum&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3464&quot; instrument_node=&quot;&quot;&gt;, who was engaged to undertake calculations and make drawings, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3462&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589mile_Nouguier&quot; title=&quot;Émile Nouguier&quot;&gt;&lt;span data-dcnode-id=&quot;3463&quot; instrument_node=&quot;&quot;&gt;Émile Nouguier&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3461&quot; instrument_node=&quot;&quot;&gt;, who had previously worked for Eiffel on the construction of the Douro bridge.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3459&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;3450&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;3451&quot; style=&quot;width:222px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;3457&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ARahmenStatue1885.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;3458&quot; data-file-height=&quot;346&quot; data-file-width=&quot;250&quot; decoding=&quot;async&quot; height=&quot;304&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d7/RahmenStatue1885.jpg/220px-RahmenStatue1885.jpg&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/d/d7/RahmenStatue1885.jpg 1.5x&quot; width=&quot;220&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3456&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;3452&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;3454&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;3455&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3ARahmenStatue1885.jpg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3453&quot; instrument_node=&quot;&quot;&gt;Interior structural elements of the Statue of Liberty designed by Gustave Eiffel&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3449&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3434&quot;&gt;&lt;span data-dcnode-id=&quot;3448&quot; instrument_node=&quot;&quot;&gt;The same year Eiffel started work on a system of standardised prefabricated bridges, an idea that was the result of a conversation with the governor of &lt;/span&gt;&lt;a data-dcnode-id=&quot;3446&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/French_Cochinchina&quot; title=&quot;French Cochinchina&quot;&gt;&lt;span data-dcnode-id=&quot;3447&quot; instrument_node=&quot;&quot;&gt;Cochin-China&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3445&quot; instrument_node=&quot;&quot;&gt;. These used a small number of standard components, all small enough to be readily transportable in areas with poor or non-existent roads, and were joined using &lt;/span&gt;&lt;a data-dcnode-id=&quot;3443&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Screw&quot; title=&quot;Screw&quot;&gt;&lt;span data-dcnode-id=&quot;3444&quot; instrument_node=&quot;&quot;&gt;bolts&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3442&quot; instrument_node=&quot;&quot;&gt; rather than &lt;/span&gt;&lt;a data-dcnode-id=&quot;3440&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Rivet&quot; title=&quot;Rivet&quot;&gt;&lt;span data-dcnode-id=&quot;3441&quot; instrument_node=&quot;&quot;&gt;rivets&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3439&quot; instrument_node=&quot;&quot;&gt;, reducing the need for skilled labour on site. A number of different types were produced, ranging from footbridges to standard-gauge railway bridges.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3436&quot; id=&quot;cite_ref-21&quot;&gt;&lt;a data-dcnode-id=&quot;3437&quot; href=&quot;#cite_note-21&quot;&gt;&lt;span data-dcnode-id=&quot;3438&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3435&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3419&quot;&gt;&lt;span data-dcnode-id=&quot;3433&quot; instrument_node=&quot;&quot;&gt;In 1881 Eiffel was contacted by &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3431&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Auguste_Bartholdi&quot; title=&quot;Auguste Bartholdi&quot;&gt;&lt;span data-dcnode-id=&quot;3432&quot; instrument_node=&quot;&quot;&gt;Auguste Bartholdi&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3430&quot; instrument_node=&quot;&quot;&gt; who was in need of an engineer to help him to realise the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3428&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Statue_of_Liberty&quot; title=&quot;Statue of Liberty&quot;&gt;&lt;span data-dcnode-id=&quot;3429&quot; instrument_node=&quot;&quot;&gt;Statue of Liberty&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3427&quot; instrument_node=&quot;&quot;&gt;. Some work had already been carried out by &lt;/span&gt;&lt;a data-dcnode-id=&quot;3425&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Eug%25C3%25A8ne_Viollet-le-Duc&quot; title=&quot;Eugène Viollet-le-Duc&quot;&gt;&lt;span data-dcnode-id=&quot;3426&quot; instrument_node=&quot;&quot;&gt;Eugène Viollet-le-Duc&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3424&quot; instrument_node=&quot;&quot;&gt;, but he had died in 1879. Eiffel was selected because of his experience with wind stresses. Eiffel devised a structure consisting of a four legged pylon to support the copper sheeting which made up the body of the statue. The entire statue was erected at the Eiffel works in Paris before being dismantled and shipped to the United States.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3421&quot; id=&quot;cite_ref-22&quot;&gt;&lt;a data-dcnode-id=&quot;3422&quot; href=&quot;#cite_note-22&quot;&gt;&lt;span data-dcnode-id=&quot;3423&quot; instrument_node=&quot;&quot;&gt;[22]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3420&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3408&quot;&gt;&lt;span data-dcnode-id=&quot;3418&quot; instrument_node=&quot;&quot;&gt;In 1886 Eiffel also designed the dome for the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3416&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Observatoire_de_Nice&quot; title=&quot;Observatoire de Nice&quot;&gt;&lt;span data-dcnode-id=&quot;3417&quot; instrument_node=&quot;&quot;&gt;Astronomical Observatory&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3415&quot; instrument_node=&quot;&quot;&gt; in Nice. This was the most important building in a complex designed by &lt;/span&gt;&lt;a data-dcnode-id=&quot;3413&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Charles_Garnier_%28architect%29&quot; title=&quot;Charles Garnier (architect)&quot;&gt;&lt;span data-dcnode-id=&quot;3414&quot; instrument_node=&quot;&quot;&gt;Charles Garnier&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3412&quot; instrument_node=&quot;&quot;&gt;, later among the most prominent critics of the Tower. The dome, with a diameter of 22.4&amp;nbsp;m (73&amp;nbsp;ft), was the largest in the world when built and used an ingenious bearing device: rather than running on wheels or rollers, it was supported by a ring-shaped hollow girder floating in a circular trough containing a solution of &lt;/span&gt;&lt;a data-dcnode-id=&quot;3410&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Magnesium_chloride&quot; title=&quot;Magnesium chloride&quot;&gt;&lt;span data-dcnode-id=&quot;3411&quot; instrument_node=&quot;&quot;&gt;magnesium chloride&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3409&quot; instrument_node=&quot;&quot;&gt; in water. This had been patented by Eiffel in 1881.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3407&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;3397&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;3405&quot; id=&quot;The_Eiffel_Tower&quot;&gt;&lt;span data-dcnode-id=&quot;3406&quot; instrument_node=&quot;&quot;&gt;The Eiffel Tower&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;3398&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3403&quot;&gt;&lt;span data-dcnode-id=&quot;3404&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;3401&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGustave_Eiffel%26action%3Dedit%26section%3D4&quot; title=&quot;Edit section: The Eiffel Tower&quot;&gt;&lt;span data-dcnode-id=&quot;3402&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3399&quot;&gt;&lt;span data-dcnode-id=&quot;3400&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;3396&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;link data-dcnode-id=&quot;3395&quot; href=&quot;mw-data:TemplateStyles:r1033289096&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;div class=&quot;hatnote navigation-not-searchable&quot; data-dcnode-id=&quot;3391&quot; role=&quot;note&quot;&gt;&lt;span data-dcnode-id=&quot;3394&quot; instrument_node=&quot;&quot;&gt;Main article: &lt;/span&gt;&lt;a data-dcnode-id=&quot;3392&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Eiffel_Tower&quot; title=&quot;Eiffel Tower&quot;&gt;&lt;span data-dcnode-id=&quot;3393&quot; instrument_node=&quot;&quot;&gt;Eiffel Tower&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3390&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;3381&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;3382&quot; style=&quot;width:222px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;3388&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaurice_koechlin_pylone.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;3389&quot; data-file-height=&quot;1086&quot; data-file-width=&quot;750&quot; decoding=&quot;async&quot; height=&quot;319&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maurice_koechlin_pylone.jpg/220px-Maurice_koechlin_pylone.jpg&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maurice_koechlin_pylone.jpg/330px-Maurice_koechlin_pylone.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maurice_koechlin_pylone.jpg/440px-Maurice_koechlin_pylone.jpg 2x&quot; width=&quot;220&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3387&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;3383&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;3385&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;3386&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaurice_koechlin_pylone.jpg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3384&quot; instrument_node=&quot;&quot;&gt;Koechlin's first drawing for the Eiffel Tower. Note the sketched stack of buildings, with Notre Dame at the bottom, indicating the scale of the proposed tower.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;3361&quot;&gt;&lt;span data-dcnode-id=&quot;3380&quot; instrument_node=&quot;&quot;&gt;
The design of the Eiffel Tower was originated by Maurice Koechlin and Emile Nouguier, who had discussed ideas for a centrepiece for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3378&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281889%29&quot; title=&quot;Exposition Universelle (1889)&quot;&gt;&lt;span data-dcnode-id=&quot;3379&quot; instrument_node=&quot;&quot;&gt;1889 Exposition Universelle&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3377&quot; instrument_node=&quot;&quot;&gt;. In May 1884 Koechlin, working at his home, made an outline drawing of their scheme, described by him as &quot;a great pylon, consisting of four lattice girders standing apart at the base and coming together at the top, joined together by metal &lt;/span&gt;&lt;a class=&quot;new&quot; data-dcnode-id=&quot;3375&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTrusse%26action%3Dedit%26redlink%3D1&quot; title=&quot;Trusse (page does not exist)&quot;&gt;&lt;span data-dcnode-id=&quot;3376&quot; instrument_node=&quot;&quot;&gt;trusses&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3374&quot; instrument_node=&quot;&quot;&gt; at regular intervals&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3371&quot; id=&quot;cite_ref-23&quot;&gt;&lt;a data-dcnode-id=&quot;3372&quot; href=&quot;#cite_note-23&quot;&gt;&lt;span data-dcnode-id=&quot;3373&quot; instrument_node=&quot;&quot;&gt;[23]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3370&quot; instrument_node=&quot;&quot;&gt;  Initially Eiffel showed little enthusiasm, although he did sanction further study of the project, and the two engineers then asked &lt;/span&gt;&lt;a data-dcnode-id=&quot;3368&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Sauvestre&quot; title=&quot;Stephen Sauvestre&quot;&gt;&lt;span data-dcnode-id=&quot;3369&quot; instrument_node=&quot;&quot;&gt;Stephen Sauvestre&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3367&quot; instrument_node=&quot;&quot;&gt; to add architectural embellishments. Sauvestre added the decorative arches to the base, a glass pavilion to the first level and the cupola at the top. The enhanced idea gained Eiffel's support for the project, and he bought the rights to the patent on the design which Koechlin, Nougier and Sauvestre had taken out. The design was exhibited at the Exhibition of Decorative Arts in the autumn of 1884, and on 30 March 1885 Eiffel read a paper on the project to the Société des Ingénieurs Civils. After discussing the technical problems and emphasising the practical uses of the tower, he finished his talk by saying that the tower would symbolise&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3364&quot; id=&quot;cite_ref-24&quot;&gt;&lt;a data-dcnode-id=&quot;3365&quot; href=&quot;#cite_note-24&quot;&gt;&lt;span data-dcnode-id=&quot;3366&quot; instrument_node=&quot;&quot;&gt;[24]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;blockquote class=&quot;templatequote&quot; data-dcnode-id=&quot;3358&quot;&gt;&lt;p data-dcnode-id=&quot;3359&quot;&gt;&lt;span data-dcnode-id=&quot;3360&quot; instrument_node=&quot;&quot;&gt;&quot;not only the art of the modern engineer, but also the century of Industry and Science in which we are living, and for which the way was prepared by the great scientific movement of the eighteenth century and by the Revolution of 1789, to which this monument will be built as an expression of France's gratitude.&quot;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;3357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3342&quot;&gt;&lt;span data-dcnode-id=&quot;3356&quot; instrument_node=&quot;&quot;&gt;Little happened until the beginning of 1886, but with the re-election of &lt;/span&gt;&lt;a data-dcnode-id=&quot;3354&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Jules_Gr%25C3%25A9vy&quot; title=&quot;Jules Grévy&quot;&gt;&lt;span data-dcnode-id=&quot;3355&quot; instrument_node=&quot;&quot;&gt;Jules Grévy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3353&quot; instrument_node=&quot;&quot;&gt; as president and his appointment of &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3351&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Edouard_Lockroy&quot; title=&quot;Edouard Lockroy&quot;&gt;&lt;span data-dcnode-id=&quot;3352&quot; instrument_node=&quot;&quot;&gt;Edouard Lockroy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3350&quot; instrument_node=&quot;&quot;&gt; as Minister for Trade decisions began to be made. A budget for the Exposition was passed and on 1 May Lockroy announced an alteration to the terms of the open competition which was being held for a centerpiece for the exposition, which effectively made the choice of Eiffel's design a foregone conclusion: all entries had to include a study for a 300&amp;nbsp;m (980&amp;nbsp;ft) four-sided metal tower on the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3348&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Champ_de_Mars&quot; title=&quot;Champ de Mars&quot;&gt;&lt;span data-dcnode-id=&quot;3349&quot; instrument_node=&quot;&quot;&gt;Champ de Mars&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3347&quot; instrument_node=&quot;&quot;&gt;. On 12 May a commission was set up to examine Eiffel's scheme and its rivals and on 12 June it presented its decision, which was that only Eiffel's proposal met their requirements. After some debate about the exact site for the tower, a contract was signed on 8 January 1887. This was signed by Eiffel acting in his own capacity rather than as the representative of his company, and granted him one and a half million francs toward the construction costs. This was less than a quarter of the estimated cost of six and a half million francs. Eiffel was to receive all income from the commercial exploitation during the exhibition and for the following twenty years.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3344&quot; id=&quot;cite_ref-25&quot;&gt;&lt;a data-dcnode-id=&quot;3345&quot; href=&quot;#cite_note-25&quot;&gt;&lt;span data-dcnode-id=&quot;3346&quot; instrument_node=&quot;&quot;&gt;[25]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3343&quot; instrument_node=&quot;&quot;&gt; Eiffel later established a separate company to manage the tower.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3313&quot;&gt;&lt;span data-dcnode-id=&quot;3341&quot; instrument_node=&quot;&quot;&gt;
The tower had been a subject of some controversy, attracting criticism both from those who did not believe it feasible and from those who objected on artistic grounds. Just as work began at the Champ de Mars, the &quot;Committee of Three Hundred&quot; (one member for each metre of the tower's height) was formed, led by &lt;/span&gt;&lt;a data-dcnode-id=&quot;3339&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Charles_Garnier_%28architect%29&quot; title=&quot;Charles Garnier (architect)&quot;&gt;&lt;span data-dcnode-id=&quot;3340&quot; instrument_node=&quot;&quot;&gt;Charles Garnier&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3338&quot; instrument_node=&quot;&quot;&gt; and including some of the most important figures of the French arts establishment, including &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3336&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Adolphe_Bouguereau&quot; title=&quot;Adolphe Bouguereau&quot;&gt;&lt;span data-dcnode-id=&quot;3337&quot; instrument_node=&quot;&quot;&gt;Adolphe Bouguereau&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3335&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;3333&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Guy_de_Maupassant&quot; title=&quot;Guy de Maupassant&quot;&gt;&lt;span data-dcnode-id=&quot;3334&quot; instrument_node=&quot;&quot;&gt;Guy de Maupassant&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3332&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;3330&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Charles_Gounod&quot; title=&quot;Charles Gounod&quot;&gt;&lt;span data-dcnode-id=&quot;3331&quot; instrument_node=&quot;&quot;&gt;Charles Gounod&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3329&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3327&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Jules_Massenet&quot; title=&quot;Jules Massenet&quot;&gt;&lt;span data-dcnode-id=&quot;3328&quot; instrument_node=&quot;&quot;&gt;Jules Massenet&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3326&quot; instrument_node=&quot;&quot;&gt;: a petition was sent to &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3324&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Jean-Charles_Adolphe_Alphand&quot; title=&quot;Jean-Charles Adolphe Alphand&quot;&gt;&lt;span data-dcnode-id=&quot;3325&quot; instrument_node=&quot;&quot;&gt;Jean-Charles Adolphe Alphand&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3323&quot; instrument_node=&quot;&quot;&gt;, the Minister of Works, and was published by &lt;/span&gt;&lt;i data-dcnode-id=&quot;3320&quot;&gt;&lt;a data-dcnode-id=&quot;3321&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Le_Temps_%28Paris%29&quot; title=&quot;Le Temps (Paris)&quot;&gt;&lt;span data-dcnode-id=&quot;3322&quot; instrument_node=&quot;&quot;&gt;Le Temps&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3319&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3316&quot; id=&quot;cite_ref-26&quot;&gt;&lt;a data-dcnode-id=&quot;3317&quot; href=&quot;#cite_note-26&quot;&gt;&lt;span data-dcnode-id=&quot;3318&quot; instrument_node=&quot;&quot;&gt;[26]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3315&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;link data-dcnode-id=&quot;3314&quot; href=&quot;mw-data:TemplateStyles:r996844942&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;/p&gt;&lt;blockquote class=&quot;templatequote&quot; data-dcnode-id=&quot;3295&quot;&gt;&lt;p data-dcnode-id=&quot;3296&quot;&gt;&lt;span data-dcnode-id=&quot;3312&quot; instrument_node=&quot;&quot;&gt;&quot;To bring our arguments home, imagine for a moment a giddy, ridiculous tower dominating Paris like a gigantic black smokestack, crushing under its barbaric bulk &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3310&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Notre_Dame_de_Paris&quot; title=&quot;Notre Dame de Paris&quot;&gt;&lt;span data-dcnode-id=&quot;3311&quot; instrument_node=&quot;&quot;&gt;Notre Dame&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3309&quot; instrument_node=&quot;&quot;&gt;, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3307&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Tour_Saint-Jacques&quot; title=&quot;Tour Saint-Jacques&quot;&gt;&lt;span data-dcnode-id=&quot;3308&quot; instrument_node=&quot;&quot;&gt;Tour Saint-Jacques&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3306&quot; instrument_node=&quot;&quot;&gt;, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3304&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Louvre&quot; title=&quot;Louvre&quot;&gt;&lt;span data-dcnode-id=&quot;3305&quot; instrument_node=&quot;&quot;&gt;Louvre&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3303&quot; instrument_node=&quot;&quot;&gt;, the Dome of &lt;/span&gt;&lt;a data-dcnode-id=&quot;3301&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Les_Invalides&quot; title=&quot;Les Invalides&quot;&gt;&lt;span data-dcnode-id=&quot;3302&quot; instrument_node=&quot;&quot;&gt;les Invalides&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3300&quot; instrument_node=&quot;&quot;&gt;, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3298&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Arc_de_Triomphe&quot; title=&quot;Arc de Triomphe&quot;&gt;&lt;span data-dcnode-id=&quot;3299&quot; instrument_node=&quot;&quot;&gt;Arc de Triomphe&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3297&quot; instrument_node=&quot;&quot;&gt;, all of our humiliated monuments will disappear in this ghastly dream. And for twenty years ... we shall see stretching like a blot of ink the hateful shadow of the hateful column of bolted sheet metal&quot;&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;3294&quot; instrument_node=&quot;&quot;&gt;
