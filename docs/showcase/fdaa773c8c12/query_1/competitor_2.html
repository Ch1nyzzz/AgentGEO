&lt;/span&gt;&lt;p data-dcnode-id=&quot;3138&quot;&gt;&lt;span data-dcnode-id=&quot;3175&quot; instrument_node=&quot;&quot;&gt;Work on the foundations started on 28 January 1887. Those for the east and south legs were straightforward, each leg resting on four 2&amp;nbsp;m (6.6&amp;nbsp;ft) concrete slabs, one for each of the principal girders of each leg but the other two, being closer to the river &lt;/span&gt;&lt;a data-dcnode-id=&quot;3173&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Seine&quot; title=&quot;Seine&quot;&gt;&lt;span data-dcnode-id=&quot;3174&quot; instrument_node=&quot;&quot;&gt;Seine&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3172&quot; instrument_node=&quot;&quot;&gt; were more complicated: each slab needed two &lt;/span&gt;&lt;a data-dcnode-id=&quot;3170&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Deep_foundation&quot; title=&quot;Deep foundation&quot;&gt;&lt;span data-dcnode-id=&quot;3171&quot; instrument_node=&quot;&quot;&gt;piles&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3169&quot; instrument_node=&quot;&quot;&gt; installed by using compressed-air caissons 15&amp;nbsp;m (49&amp;nbsp;ft) long and 6&amp;nbsp;m (20&amp;nbsp;ft) in diameter driven to a depth of 22&amp;nbsp;m (72&amp;nbsp;ft)&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3166&quot; id=&quot;cite_ref-27&quot;&gt;&lt;a data-dcnode-id=&quot;3167&quot; href=&quot;#cite_note-27&quot;&gt;&lt;span data-dcnode-id=&quot;3168&quot; instrument_node=&quot;&quot;&gt;[27]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3165&quot; instrument_node=&quot;&quot;&gt; to support the concrete slabs, which were 6&amp;nbsp;m (20&amp;nbsp;ft) thick. Each of these slabs supported a &lt;/span&gt;&lt;a data-dcnode-id=&quot;3163&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Limestone&quot; title=&quot;Limestone&quot;&gt;&lt;span data-dcnode-id=&quot;3164&quot; instrument_node=&quot;&quot;&gt;limestone&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3162&quot; instrument_node=&quot;&quot;&gt; block, each with an inclined top to bear the supporting shoe for the ironwork. These shoes were anchored by bolts 10&amp;nbsp;cm (4&amp;nbsp;in) in diameter and 7.5&amp;nbsp;m (25&amp;nbsp;ft) long.
Work on the foundations was complete by 30 June and the erection of the iron work was started. Although no more than 250 men were employed on the site, a prodigious amount of exacting preparatory work was entailed: the drawing office produced 1,700 general drawings and 3,629 detail drawings of the 18,038 different parts needed.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3159&quot; id=&quot;cite_ref-28&quot;&gt;&lt;a data-dcnode-id=&quot;3160&quot; href=&quot;#cite_note-28&quot;&gt;&lt;span data-dcnode-id=&quot;3161&quot; instrument_node=&quot;&quot;&gt;[28]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3158&quot; instrument_node=&quot;&quot;&gt; The task of drawing the components was complicated by the complex angles involved in the design and the degree of precision required: the positions of rivet holes were specified to within 0.1&amp;nbsp;mm (0.004&amp;nbsp;in) and angles worked out to one &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3156&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Arcsecond&quot; title=&quot;Arcsecond&quot;&gt;&lt;span data-dcnode-id=&quot;3157&quot; instrument_node=&quot;&quot;&gt;second of arc&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3155&quot; instrument_node=&quot;&quot;&gt;. The components, some already riveted together into sub-assemblies, were first bolted together, the bolts being replaced by rivets as construction progressed. No drilling or shaping was done on site: if any part did not fit it was sent back to the factory for alteration. The four legs, each at an angle of 54° to the ground, were initially constructed as cantilevers, relying on the anchoring bolts in the masonry foundation blocks. Eiffel had calculated that this would be satisfactory until they approached halfway to the first level: accordingly work was stopped for the purpose of erecting a wooden supporting &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3153&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Scaffold&quot; title=&quot;Scaffold&quot;&gt;&lt;span data-dcnode-id=&quot;3154&quot; instrument_node=&quot;&quot;&gt;scaffold&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3152&quot; instrument_node=&quot;&quot;&gt;. This gave ammunition to his critics, and lurid headlines including &quot;Eiffel Suicide!&quot; and &quot;Gustave Eiffel has gone mad: he has been confined in an Asylum&quot; appeared in the popular press.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3149&quot; id=&quot;cite_ref-29&quot;&gt;&lt;a data-dcnode-id=&quot;3150&quot; href=&quot;#cite_note-29&quot;&gt;&lt;span data-dcnode-id=&quot;3151&quot; instrument_node=&quot;&quot;&gt;[29]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3148&quot; instrument_node=&quot;&quot;&gt; At this stage a small &quot;creeper&quot; &lt;/span&gt;&lt;a data-dcnode-id=&quot;3146&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Crane_%28machine%29&quot; title=&quot;Crane (machine)&quot;&gt;&lt;span data-dcnode-id=&quot;3147&quot; instrument_node=&quot;&quot;&gt;crane&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3145&quot; instrument_node=&quot;&quot;&gt; was installed in each leg, designed to move up the tower as construction progressed and making use of the guides for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3143&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Elevator&quot; title=&quot;Elevator&quot;&gt;&lt;span data-dcnode-id=&quot;3144&quot; instrument_node=&quot;&quot;&gt;elevators&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3142&quot; instrument_node=&quot;&quot;&gt; which were to be fitted in each leg. After this brief pause erection of the metalwork continued, and the critical operation of linking the four legs was successfully completed by March 1888. In order to precisely align the legs so that the connecting girders could be put into place, a provision had been made to enable precise adjustments by placing &lt;/span&gt;&lt;a data-dcnode-id=&quot;3140&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Jack_%28device%29%23Hydraulic_jack&quot; title=&quot;Jack (device)&quot;&gt;&lt;span data-dcnode-id=&quot;3141&quot; instrument_node=&quot;&quot;&gt;hydraulic jacks&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3139&quot; instrument_node=&quot;&quot;&gt; in the footings for each of the girders making up the legs.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3121&quot;&gt;&lt;span data-dcnode-id=&quot;3137&quot; instrument_node=&quot;&quot;&gt;The main structural work was completed at the end of March 1889 and, on 31 March, Eiffel celebrated by leading a group of government officials, accompanied by representatives of the press, to the top of the tower. Since the lifts were not yet in operation, the ascent was made by foot, and took over an hour, Eiffel frequently stopping to make explanations of various features. Most of the party chose to stop at the lower levels, but a few, including Nouguier, Compagnon, the President of the City Council and reporters from &lt;/span&gt;&lt;i data-dcnode-id=&quot;3134&quot;&gt;&lt;a data-dcnode-id=&quot;3135&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Le_Figaro&quot; title=&quot;Le Figaro&quot;&gt;&lt;span data-dcnode-id=&quot;3136&quot; instrument_node=&quot;&quot;&gt;Le Figaro&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3133&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;i data-dcnode-id=&quot;3130&quot;&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3131&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Le_Monde_Illustr%25C3%25A9&quot; title=&quot;Le Monde Illustré&quot;&gt;&lt;span data-dcnode-id=&quot;3132&quot; instrument_node=&quot;&quot;&gt;Le Monde Illustré&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3129&quot; instrument_node=&quot;&quot;&gt;  completed the climb. At 2.35 Eiffel hoisted a large &lt;/span&gt;&lt;a data-dcnode-id=&quot;3127&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Flag_of_France&quot; title=&quot;Flag of France&quot;&gt;&lt;span data-dcnode-id=&quot;3128&quot; instrument_node=&quot;&quot;&gt;tricolour&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3126&quot; instrument_node=&quot;&quot;&gt;, to the accompaniment of a 25-gun salute fired from the lower level.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3123&quot; id=&quot;cite_ref-30&quot;&gt;&lt;a data-dcnode-id=&quot;3124&quot; href=&quot;#cite_note-30&quot;&gt;&lt;span data-dcnode-id=&quot;3125&quot; instrument_node=&quot;&quot;&gt;[30]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3122&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3120&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;3110&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;3118&quot; id=&quot;The_Panama_Scandal&quot;&gt;&lt;span data-dcnode-id=&quot;3119&quot; instrument_node=&quot;&quot;&gt;The Panama Scandal&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;3111&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3116&quot;&gt;&lt;span data-dcnode-id=&quot;3117&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;3114&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGustave_Eiffel%26action%3Dedit%26section%3D5&quot; title=&quot;Edit section: The Panama Scandal&quot;&gt;&lt;span data-dcnode-id=&quot;3115&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3112&quot;&gt;&lt;span data-dcnode-id=&quot;3113&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;3109&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;3100&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;3101&quot; style=&quot;width:222px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;3107&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AEiffel-lock.png&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;3108&quot; data-file-height=&quot;541&quot; data-file-width=&quot;521&quot; decoding=&quot;async&quot; height=&quot;228&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Eiffel-lock.png/220px-Eiffel-lock.png&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Eiffel-lock.png/330px-Eiffel-lock.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Eiffel-lock.png/440px-Eiffel-lock.png 2x&quot; width=&quot;220&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3106&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;3102&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;3104&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;3105&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AEiffel-lock.png&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3103&quot; instrument_node=&quot;&quot;&gt;Illustration of Eiffel's lock design from a contemporary magazine&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3099&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3066&quot;&gt;&lt;span data-dcnode-id=&quot;3098&quot; instrument_node=&quot;&quot;&gt;In 1887, Eiffel became involved with the French effort to construct a &lt;/span&gt;&lt;a data-dcnode-id=&quot;3096&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Panama_Canal&quot; title=&quot;Panama Canal&quot;&gt;&lt;span data-dcnode-id=&quot;3097&quot; instrument_node=&quot;&quot;&gt;canal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3095&quot; instrument_node=&quot;&quot;&gt; across the Panama Isthmus. The French Panama Canal Company, headed by &lt;/span&gt;&lt;a data-dcnode-id=&quot;3093&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Ferdinand_de_Lesseps&quot; title=&quot;Ferdinand de Lesseps&quot;&gt;&lt;span data-dcnode-id=&quot;3094&quot; instrument_node=&quot;&quot;&gt;Ferdinand de Lesseps&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3092&quot; instrument_node=&quot;&quot;&gt;, had been attempting to build a sea-level canal, but came to the realization that this was impractical. The plan was changed to one using &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3090&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Lock_%28water_transport%29&quot; title=&quot;Lock (water transport)&quot;&gt;&lt;span data-dcnode-id=&quot;3091&quot; instrument_node=&quot;&quot;&gt;locks&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3089&quot; instrument_node=&quot;&quot;&gt;, which Eiffel was contracted to design and build. The locks were on a large scale, most having a change of level of 11&amp;nbsp;m (36&amp;nbsp;ft).&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3086&quot; id=&quot;cite_ref-31&quot;&gt;&lt;a data-dcnode-id=&quot;3087&quot; href=&quot;#cite_note-31&quot;&gt;&lt;span data-dcnode-id=&quot;3088&quot; instrument_node=&quot;&quot;&gt;[31]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3085&quot; instrument_node=&quot;&quot;&gt; Eiffel had been working on the project for little more than a year when the company suspended payments of interest on 14 December 1888,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3082&quot; id=&quot;cite_ref-32&quot;&gt;&lt;a data-dcnode-id=&quot;3083&quot; href=&quot;#cite_note-32&quot;&gt;&lt;span data-dcnode-id=&quot;3084&quot; instrument_node=&quot;&quot;&gt;[32]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3081&quot; instrument_node=&quot;&quot;&gt; and shortly afterwards was put into &lt;/span&gt;&lt;a data-dcnode-id=&quot;3079&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Liquidation&quot; title=&quot;Liquidation&quot;&gt;&lt;span data-dcnode-id=&quot;3080&quot; instrument_node=&quot;&quot;&gt;liquidation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3078&quot; instrument_node=&quot;&quot;&gt;. Eiffel's reputation was badly damaged when he was implicated in the financial and political scandal which followed. Although he was simply a contractor, he was charged along with the directors of the project with raising money under false pretenses and misappropriation of funds. On 9 February 1893 Eiffel was found guilty on the charge of misuse of funds, and was fined 20,000 francs and sentenced to two years in prison,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3075&quot; id=&quot;cite_ref-33&quot;&gt;&lt;a data-dcnode-id=&quot;3076&quot; href=&quot;#cite_note-33&quot;&gt;&lt;span data-dcnode-id=&quot;3077&quot; instrument_node=&quot;&quot;&gt;[33]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3074&quot; instrument_node=&quot;&quot;&gt; although he was acquitted on appeal.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3071&quot; id=&quot;cite_ref-34&quot;&gt;&lt;a data-dcnode-id=&quot;3072&quot; href=&quot;#cite_note-34&quot;&gt;&lt;span data-dcnode-id=&quot;3073&quot; instrument_node=&quot;&quot;&gt;[34]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3070&quot; instrument_node=&quot;&quot;&gt; The later American-built canal used new lock designs (see &lt;/span&gt;&lt;a data-dcnode-id=&quot;3068&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Panama_Canal&quot; title=&quot;History of the Panama Canal&quot;&gt;&lt;span data-dcnode-id=&quot;3069&quot; instrument_node=&quot;&quot;&gt;History of the Panama Canal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3067&quot; instrument_node=&quot;&quot;&gt;).
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3050&quot;&gt;&lt;span data-dcnode-id=&quot;3065&quot; instrument_node=&quot;&quot;&gt;Shortly before the trial Eiffel had announced his intention to resign from the Board of Directors of the Compagnie des Etablissements Eiffel, and did so at a General Meeting held on 14 February, saying &quot;I have absolutely decided to abstain from any participation in any manufacturing business from now on, and so that no one can be misled and to make it most evident that I intend to remain absolutely uninvolved with the management of the establishments which bear my name, I insist that my name should disappear from the name of the company.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3062&quot; id=&quot;cite_ref-35&quot;&gt;&lt;a data-dcnode-id=&quot;3063&quot; href=&quot;#cite_note-35&quot;&gt;&lt;span data-dcnode-id=&quot;3064&quot; instrument_node=&quot;&quot;&gt;[35]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3061&quot; instrument_node=&quot;&quot;&gt;  The company changed its name to &lt;/span&gt;&lt;b data-dcnode-id=&quot;3059&quot;&gt;&lt;span data-dcnode-id=&quot;3060&quot; instrument_node=&quot;&quot;&gt;La Société Constructions Levallois-Perret&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3058&quot; instrument_node=&quot;&quot;&gt;, with Maurice Koechlin as managing director. The name was changed to the &lt;/span&gt;&lt;b data-dcnode-id=&quot;3056&quot;&gt;&lt;span data-dcnode-id=&quot;3057&quot; instrument_node=&quot;&quot;&gt;Anciens Etablissements Eiffel&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3055&quot; instrument_node=&quot;&quot;&gt; in 1937.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3052&quot; id=&quot;cite_ref-36&quot;&gt;&lt;a data-dcnode-id=&quot;3053&quot; href=&quot;#cite_note-36&quot;&gt;&lt;span data-dcnode-id=&quot;3054&quot; instrument_node=&quot;&quot;&gt;[36]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3051&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3049&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;3039&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;3047&quot; id=&quot;Later_career&quot;&gt;&lt;span data-dcnode-id=&quot;3048&quot; instrument_node=&quot;&quot;&gt;Later career&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;3040&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3045&quot;&gt;&lt;span data-dcnode-id=&quot;3046&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;3043&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGustave_Eiffel%26action%3Dedit%26section%3D6&quot; title=&quot;Edit section: Later career&quot;&gt;&lt;span data-dcnode-id=&quot;3044&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;3041&quot;&gt;&lt;span data-dcnode-id=&quot;3042&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;3038&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tleft&quot; data-dcnode-id=&quot;3029&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;3030&quot; style=&quot;width:222px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;3036&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AGustave_Eiffel_1910.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;3037&quot; data-file-height=&quot;562&quot; data-file-width=&quot;449&quot; decoding=&quot;async&quot; height=&quot;275&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/df/Gustave_Eiffel_1910.jpg/220px-Gustave_Eiffel_1910.jpg&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/d/df/Gustave_Eiffel_1910.jpg/330px-Gustave_Eiffel_1910.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/df/Gustave_Eiffel_1910.jpg/440px-Gustave_Eiffel_1910.jpg 2x&quot; width=&quot;220&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3035&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;3031&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;3033&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;3034&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AGustave_Eiffel_1910.jpg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3032&quot; instrument_node=&quot;&quot;&gt;Eiffel in 1910&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3028&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3016&quot;&gt;&lt;span data-dcnode-id=&quot;3027&quot; instrument_node=&quot;&quot;&gt;After his retirement from the Compagnie des Etablissements Eiffel, Eiffel went on to do important work in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3025&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Meteorology&quot; title=&quot;Meteorology&quot;&gt;&lt;span data-dcnode-id=&quot;3026&quot; instrument_node=&quot;&quot;&gt;meteorology&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3024&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3022&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Aerodynamics&quot; title=&quot;Aerodynamics&quot;&gt;&lt;span data-dcnode-id=&quot;3023&quot; instrument_node=&quot;&quot;&gt;aerodynamics&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3021&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;3018&quot; id=&quot;cite_ref-flightglobal1924_37-0&quot;&gt;&lt;a data-dcnode-id=&quot;3019&quot; href=&quot;#cite_note-flightglobal1924-37&quot;&gt;&lt;span data-dcnode-id=&quot;3020&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3017&quot; instrument_node=&quot;&quot;&gt;  Eiffel's interest in these areas was a consequence of the problems he had encountered with the effects of wind forces on the structures he had built.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2992&quot;&gt;&lt;span data-dcnode-id=&quot;3015&quot; instrument_node=&quot;&quot;&gt;His first aerodynamic experiments, an investigation in the air resistance of surfaces, was carried out by dropping the surface to be investigated together with a measuring apparatus down a vertical cable stretched between the second level of the Eiffel Tower and the ground. Using this Eiffel definitely established that the air resistance of a body was very closely related to the square of the airspeed. He then built a laboratory on the Champ de Mars at the foot of the tower in 1905, building his first &lt;/span&gt;&lt;a data-dcnode-id=&quot;3013&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wind_tunnel&quot; title=&quot;Wind tunnel&quot;&gt;&lt;span data-dcnode-id=&quot;3014&quot; instrument_node=&quot;&quot;&gt;wind tunnel&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3012&quot; instrument_node=&quot;&quot;&gt; there in 1909. The wind tunnel was used to investigate the characteristics of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;3010&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Airfoil&quot; title=&quot;Airfoil&quot;&gt;&lt;span data-dcnode-id=&quot;3011&quot; instrument_node=&quot;&quot;&gt;airfoil&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3009&quot; instrument_node=&quot;&quot;&gt; sections used by the early pioneers of aviation such as the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;3007&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wright_Brothers&quot; title=&quot;Wright Brothers&quot;&gt;&lt;span data-dcnode-id=&quot;3008&quot; instrument_node=&quot;&quot;&gt;Wright Brothers&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3006&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;3004&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Gabriel_Voisin&quot; title=&quot;Gabriel Voisin&quot;&gt;&lt;span data-dcnode-id=&quot;3005&quot; instrument_node=&quot;&quot;&gt;Gabriel Voisin&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3003&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3001&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Louis_Bl%25C3%25A9riot&quot; title=&quot;Louis Blériot&quot;&gt;&lt;span data-dcnode-id=&quot;3002&quot; instrument_node=&quot;&quot;&gt;Louis Blériot&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3000&quot; instrument_node=&quot;&quot;&gt;. Eiffel established that the lift produced by an airfoil was the result of a reduction of air pressure above the wing rather than an increase of pressure acting on the under surface. Following complaints about noise from people living nearby, he moved his experiments to a new establishment at &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;2998&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Auteuil-Neuilly-Passy&quot; title=&quot;Auteuil-Neuilly-Passy&quot;&gt;&lt;span data-dcnode-id=&quot;2999&quot; instrument_node=&quot;&quot;&gt;Auteuil&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2997&quot; instrument_node=&quot;&quot;&gt; in 1912. Here it was possible to build a larger wind tunnel, and Eiffel began to make tests using scale models of aircraft designs.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2994&quot; id=&quot;cite_ref-38&quot;&gt;&lt;a data-dcnode-id=&quot;2995&quot; href=&quot;#cite_note-38&quot;&gt;&lt;span data-dcnode-id=&quot;2996&quot; instrument_node=&quot;&quot;&gt;[38]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2993&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2977&quot;&gt;&lt;span data-dcnode-id=&quot;2991&quot; instrument_node=&quot;&quot;&gt;
In 1913 Eiffel was awarded the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2989&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Langley_Gold_Medal&quot; title=&quot;Langley Gold Medal&quot;&gt;&lt;span data-dcnode-id=&quot;2990&quot; instrument_node=&quot;&quot;&gt;Samuel P. Langley Medal for Aerodromics&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2988&quot; instrument_node=&quot;&quot;&gt; by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2986&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Smithsonian_Institution&quot; title=&quot;Smithsonian Institution&quot;&gt;&lt;span data-dcnode-id=&quot;2987&quot; instrument_node=&quot;&quot;&gt;Smithsonian Institution&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2985&quot; instrument_node=&quot;&quot;&gt;. In his speech at the presentation of the medal, &lt;/span&gt;&lt;a data-dcnode-id=&quot;2983&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Graham_Bell&quot; title=&quot;Alexander Graham Bell&quot;&gt;&lt;span data-dcnode-id=&quot;2984&quot; instrument_node=&quot;&quot;&gt;Alexander Graham Bell&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2982&quot; instrument_node=&quot;&quot;&gt; said:&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2979&quot; id=&quot;cite_ref-39&quot;&gt;&lt;a data-dcnode-id=&quot;2980&quot; href=&quot;#cite_note-39&quot;&gt;&lt;span data-dcnode-id=&quot;2981&quot; instrument_node=&quot;&quot;&gt;[39]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;link data-dcnode-id=&quot;2978&quot; href=&quot;mw-data:TemplateStyles:r996844942&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;/p&gt;&lt;blockquote class=&quot;templatequote&quot; data-dcnode-id=&quot;2974&quot;&gt;&lt;p data-dcnode-id=&quot;2975&quot;&gt;&lt;span data-dcnode-id=&quot;2976&quot; instrument_node=&quot;&quot;&gt;...his writings upon the resistance of the air have already become classical. His researches, published in 1907 and 1911, on the resistance of the air in connection with aviation, are especially valuable. They have given engineers the data for designing and constructing flying machines upon sound, scientific principles&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2968&quot;&gt;&lt;span data-dcnode-id=&quot;2972&quot; instrument_node=&quot;&quot;&gt;Eiffel had meteorological measuring equipment placed on the tower in 1889, and also built a weather station at his house in &lt;/span&gt;&lt;a data-dcnode-id=&quot;2970&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/S%25C3%25A8vres&quot; title=&quot;Sèvres&quot;&gt;&lt;span data-dcnode-id=&quot;2971&quot; instrument_node=&quot;&quot;&gt;Sèvres&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2969&quot; instrument_node=&quot;&quot;&gt;. Between 1891 and 1892 he compiled a complete set of meteorological readings, and later extended his record-taking to include measurements from 25 different locations across France.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2957&quot;&gt;&lt;span data-dcnode-id=&quot;2967&quot; instrument_node=&quot;&quot;&gt;Eiffel died on 27 December 1923, while listening to Beethoven's 5th symphony &lt;/span&gt;&lt;i data-dcnode-id=&quot;2965&quot;&gt;&lt;span data-dcnode-id=&quot;2966&quot; instrument_node=&quot;&quot;&gt;andante&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2964&quot; instrument_node=&quot;&quot;&gt;, in his mansion on &lt;/span&gt;&lt;a class=&quot;new&quot; data-dcnode-id=&quot;2962&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRue_Rabelais%26action%3Dedit%26redlink%3D1&quot; title=&quot;Rue Rabelais (page does not exist)&quot;&gt;&lt;span data-dcnode-id=&quot;2963&quot; instrument_node=&quot;&quot;&gt;Rue Rabelais&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2961&quot; instrument_node=&quot;&quot;&gt; in Paris. He was buried in the family tomb in &lt;/span&gt;&lt;a data-dcnode-id=&quot;2959&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Levallois-Perret_Cemetery&quot; title=&quot;Levallois-Perret Cemetery&quot;&gt;&lt;span data-dcnode-id=&quot;2960&quot; instrument_node=&quot;&quot;&gt;Levallois-Perret Cemetery&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2958&quot; instrument_node=&quot;&quot;&gt;.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;2946&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;2954&quot; id=&quot;Influence&quot;&gt;&lt;span data-dcnode-id=&quot;2955&quot; instrument_node=&quot;&quot;&gt;Influence&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;2947&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2952&quot;&gt;&lt;span data-dcnode-id=&quot;2953&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2950&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGustave_Eiffel%26action%3Dedit%26section%3D7&quot; title=&quot;Edit section: Influence&quot;&gt;&lt;span data-dcnode-id=&quot;2951&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;2948&quot;&gt;&lt;span data-dcnode-id=&quot;2949&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;2945&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;2928&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;2929&quot; style=&quot;width:172px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;2943&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AEdwardMoran-UnveilingTheStatueofLiberty1886Large.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;2944&quot; data-file-height=&quot;1600&quot; data-file-width=&quot;1260&quot; decoding=&quot;async&quot; height=&quot;216&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6e/EdwardMoran-UnveilingTheStatueofLiberty1886Large.jpg/170px-EdwardMoran-UnveilingTheStatueofLiberty1886Large.jpg&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/6/6e/EdwardMoran-UnveilingTheStatueofLiberty1886Large.jpg/255px-EdwardMoran-UnveilingTheStatueofLiberty1886Large.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6e/EdwardMoran-UnveilingTheStatueofLiberty1886Large.jpg/340px-EdwardMoran-UnveilingTheStatueofLiberty1886Large.jpg 2x&quot; width=&quot;170&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2942&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;2930&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;2940&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;2941&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3AEdwardMoran-UnveilingTheStatueofLiberty1886Large.jpg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;a data-dcnode-id=&quot;2938&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Edward_Moran&quot; title=&quot;Edward Moran&quot;&gt;&lt;span data-dcnode-id=&quot;2939&quot; instrument_node=&quot;&quot;&gt;Edward Moran&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2937&quot; instrument_node=&quot;&quot;&gt;'s 1886 painting, &lt;/span&gt;&lt;i data-dcnode-id=&quot;2935&quot;&gt;&lt;span data-dcnode-id=&quot;2936&quot; instrument_node=&quot;&quot;&gt;The Statue of Liberty Enlightening the World&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;2934&quot; instrument_node=&quot;&quot;&gt;, depicts the unveiling of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2932&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Statue_of_Liberty&quot; title=&quot;Statue of Liberty&quot;&gt;&lt;span data-dcnode-id=&quot;2933&quot; instrument_node=&quot;&quot;&gt;Statue of Liberty&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2931&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2918&quot;&gt;&lt;span data-dcnode-id=&quot;2926&quot; instrument_node=&quot;&quot;&gt;Gustave Eiffel's career was a result of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2924&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Revolution&quot; title=&quot;Industrial Revolution&quot;&gt;&lt;span data-dcnode-id=&quot;2925&quot; instrument_node=&quot;&quot;&gt;Industrial Revolution&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2923&quot; instrument_node=&quot;&quot;&gt;. For a variety of economic and political reasons, this had been slow to make an impact in France,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2920&quot; id=&quot;cite_ref-40&quot;&gt;&lt;a data-dcnode-id=&quot;2921&quot; href=&quot;#cite_note-40&quot;&gt;&lt;span data-dcnode-id=&quot;2922&quot; instrument_node=&quot;&quot;&gt;[40]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2919&quot; instrument_node=&quot;&quot;&gt; and Eiffel had the good fortune to be working at a time of rapid industrial development in France. Eiffel's importance as an engineer was twofold. Firstly he was ready to adopt innovative techniques first used by others, such as his use of compressed-air caissons and hollow cast-iron piers, and secondly he was a pioneer in his insistence on basing all engineering decisions on thorough calculation of the forces involved, combining this analytical approach with an insistence on a high standard of accuracy in drawing and manufacture.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2916&quot;&gt;&lt;span data-dcnode-id=&quot;2917&quot; instrument_node=&quot;&quot;&gt;The growth of the railway network had an immense effect on people's lives, but although the enormous number of bridges and other work undertaken by Eiffel were an important part of this, the two works that did most to make him famous are the Statue of Liberty and the Eiffel Tower, both projects of immense symbolic importance and today internationally recognized landmarks. The Tower is also important because of its role in establishing the aesthetic potential of structures whose appearance is largely dictated by practical considerations.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;2910&quot;&gt;&lt;span data-dcnode-id=&quot;2915&quot; instrument_node=&quot;&quot;&gt;His contribution to the science of aerodynamics is probably of equal importance to his work as an engineer.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;2912&quot; id=&quot;cite_ref-flightglobal1924_37-1&quot;&gt;&lt;a data-dcnode-id=&quot;2913&quot; href=&quot;#cite_note-flightglobal1924-37&quot;&gt;&lt;span data-dcnode-id=&quot;2914&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;2911&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;2156&quot;&gt;&lt;span data-dcnode-id=&quot;2168&quot; instrument_node=&quot;&quot;&gt;A number of works of Gustave Eiffel are in danger today. Some have already been destroyed, like in Vietnam.
