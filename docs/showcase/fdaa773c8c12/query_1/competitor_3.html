&lt;/span&gt;&lt;p data-dcnode-id=&quot;916&quot;&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;You’ll likely know about the horrific science fiction movies that feature living disembodied heads. Still, many governments have funded such creepy programs by medics who want to achieve a chilling first in the real world. In 1954, doctors finally performed a pioneer human organ transplant, the first being a kidney transplant. Experts then suggested the possibility of a future head transplant!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;915&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;913&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;True enough, in 1908, US surgeon Charles Guthrie successfully transplanted a dog’s head onto another dog’s neck, all funded by the government. Later on, in 1951, Vladimir Demikhov, a Soviet surgeon, attempted to perform a canine upper body transplant.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;In response to Demikhov’s work, in the mid-1960s, the US government funded the renowned neurosurgeon Robert J. White’s project. Dr. White sought to experiment by transplanting dog and monkey brains into other animal’s necks and abdomens. Finally, in 1970, Dr. White successfully transplanted a living rhesus monkey’s head onto another monkey’s headless body.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;

e documentaries to suit every taste. RT Documentary’s film crews travel far and wide to bring you diverse and compelling stories. Discover the world with us! SUBSCRIBE TO RTD Channel to get documentaries firsthand! http://bit.ly/1MgFbVy FOLLOW US RTD WEBSITE: https://RTD.rt.com/ RTD ON TWITTER: http://twitter.com/RT_DOC RTD ON FACEBOOK: http://www.facebook.com/RTDocumentary RTD ON INSTAGRAM https://www.instagram.com/rt_documentary_/ RTD LIVE https://rtd.rt.com/on-air/&quot; data-dcnode-id=&quot;871&quot; itemprop=&quot;description&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;860&quot;&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;Have you heard about Unit 731, the Imperial Japanese Army special unit? The squad committed shocking atrocities disguised cleverly as “scientific experiments.” In 1984, the Japanese government finally admitted that state-funded researchers had conducted cruel experiments on humans. The state believed that these experiments would help the Japanese prepare for possible germ warfare.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;857&quot;&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;The dreaded Unit 731 was first established in 1938 to develop biological weapons. The unit received support from Japanese medical schools and universities. They supplied the unit with research staff and doctors who carried out questionable experiments.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;854&quot;&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;In this project, Unit 731 employed civilians and Chinese prisoners as guinea pigs to develop lethal diseases. The researchers injected wartime prisoners with anthrax, the plague, cholera, and other pathogens. Most horrifying, some of these experiments featured vivisection without anesthesia.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;851&quot;&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt;The researchers even used pressure chambers to test how much a human being can take before bursting! Disgustingly, the post-war US administration offered safe passage to the perpetrators of these terrible atrocities to access information on their findings.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;815&quot;&gt;&lt;noscript data-dcnode-id=&quot;817&quot;&gt;&lt;span data-dcnode-id=&quot;818&quot; instrument_node=&quot;&quot;&gt;&amp;lt;a href=&quot;https://youtu.be/3Q7upN1bRFE&quot;&amp;gt;&amp;lt;img src=&quot;https://listverse.com/wp-content/plugins/wp-youtube-lyte-main/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2F3Q7upN1bRFE%2F0.jpg&quot; alt=&quot;Tuskegee Syphilis Experiment - Syphilis Explained&quot; width=&quot;640&quot; height=&quot;340&quot;&amp;gt;&amp;lt;br /&amp;gt;Watch this video on YouTube&amp;lt;/a&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;meta content=&quot;The Tuskegee syphilis experiment, syphilis explained. Do you know which disease was discovered in 1492 when Columbus sailed the ocean blue? Do you know what illness the American gangster Al Capone and the ruthless dictator Adolf Hitler had in common? And do you know which disease was studied in one of the most amoral, deplorable, unethical studies in the history of the United States? Syphilis. This video is intended to be informational only. It is not a medical consultation, nor is it personalized medical advice. For medical advice, please consult your physician. 10 healthy habits for a better you and a better life. Get your FREE Healthy Habits Guide! https://social.drfrita.com/healthyhabits Subscribe so you’ll never miss my latest videos. https://www.youtube.com/channel/UCBve_ppCNE67fs3MsIocitg?sub_confirmation=1 Be sure to follow me on: Instagram:https://www.instagram.com/dr.frita/ Facebook: https://www.facebook.com/Dr.Frita Syphilis is a sexually transmitted infection which was first discovered back in 1492 when Christopher Columbus's crew returned to Europe. Even though syphilis has been around for centuries, do you know it still has not been eradicated? In fact, syphilis is making a comeback. According to the CDC, ever since 2001, the prevalence of syphilis has been increasing each year. Now it is a sexually transmitted infection, but it's preventable. It is absolutely preventable. Currently, it is more common among men having sex with men, but don't let that fool you. Women, you are at high risk, and pregnant women, you can transmit syphilis to your unborn children, congenital syphilis. Syphilis is caused by a bacterium, treponema pallidum. There are four stages of syphilis. Primary, secondary, latent, and tertiary. Syphilis can be passed on through any kind of sexual contact, vaginal, anal, oral, any kind. But again, it can be prevented by using barrier protection, by using condoms. Apparently, Adolf Hitler did not always use condoms because it has been reported that he contracted syphilis from a prostitute. Now after being initially infected, after two to three weeks, Hitler would have developed a chancre. A chancre is an ulcer which is surrounded by a raised, hard border. The chancre appears on the genital area or wherever the sexual contact has occurred. This is the first symptom of primary syphilis. Primary syphilis has the symptom of a chancre on the genital area. Now the scary thing about this chancre is that it is absolutely painless, so if you don't notice that you have the chancre, or if you are in such denial that you can't want to seek treatment, you can go on and be untreated for syphilis, and eventually, this chancre will disappear. The chancre disappears, but syphilis does not, that sneaky syphilis. And in a few weeks or even months, you will develop secondary syphilis, very likely, if you're not treated. So what is secondary syphilis? In secondary syphilis, the symptoms tend to be more generalized. Patients will get fever, rash, sore throat. They may get alopecia or hair loss, and this rash is distinct. It tends to be on the palms of the hands and the soles of the feet. Again, with secondary syphilis, if you don't get treated, eventually, the signs are likely to disappear, but you still have syphilis and you are still very contagious if you have not been treated. That sneaky syphilis. Back in 1932, 399 African-American men were enrolled in a study. These men were recruited from Macon County, Alabama, which was 95% black, and the men had syphilis, mostly primary or secondary syphilis. Most of these men were poor sharecroppers who had never received medical care, and even though the investigators knew that they had syphilis, they did not tell the men. They did not properly enroll the men for the study. They did not tell them that they had the right to stop the study. And even once a treatment for syphilis was discovered in 1947, they did not offer these black men treatment. In fact, they essentially treated them like lab animals and they sat there and documented all of the symptoms of syphilis without treatment. Finally, in 1972, someone blew the whistle on the study. It was declared unethical and it was stopped. But because these men went without treatment for syphilis for over 40 years, most of them who lived progressed to latent syphilis and tertiary syphilis, which are the last two stages of syphilis. What do you think about the Tuskegee experiment? A lot of people in the black population have a mistrust for physicians. Do you think that the Tuskegee experiment is something that has had something to do with that? I want you to comment. Thank you for watching.&quot; data-dcnode-id=&quot;816&quot; itemprop=&quot;description&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;813&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;lL&quot; data-dcnode-id=&quot;810&quot; style=&quot;max-width:100%;width:640px;margin:5px auto;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;807&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;805&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;The Tuskegee Syphilis experiment involved a study of untreated syphilis among the Negro male population. In the name of receiving free treatment, this study turned into an infamous tragedy, attracting widespread condemnation. Initially, 600 men enrolled for this project. The scientists in charge carried out the study from 1932 to 1972. 399 of these men had latent syphilis. 201 men provided the experimental control.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;802&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;Doctors from the US Public Health Service monitored the project. Instead of giving the then recommended penicillin treatment, the doctors administered placebos, including mineral supplements and aspirin, to the test subjects. The doctors sought to understand the effect and spread of syphilis on humans.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;799&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;Tragically, 28 men died of syphilis as a direct result of these unethical procedures. 100 more perished of syphilis-related complications while 40 spouses contracted the disease. Consequently, 19 women who gave birth passed on syphilis to their newborn children.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;789&quot;&gt;&lt;span data-dcnode-id=&quot;797&quot; instrument_node=&quot;&quot;&gt;In 1997, US President Bill Clinton&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;794&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//interestingengineering.com/7-creepiest-science-experiments-of-all-time-that-will-give-you-nightmares&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;u data-dcnode-id=&quot;795&quot;&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;apologized to the survivors&lt;/span&gt;&lt;/u&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;and their families due to the tragic government experiment. The President admitted that the government action was “&lt;/span&gt;&lt;a data-dcnode-id=&quot;790&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//interestingengineering.com/7-creepiest-science-experiments-of-all-time-that-will-give-you-nightmares&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;u data-dcnode-id=&quot;791&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;profoundly and morally wrong.”&lt;/span&gt;&lt;/u&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;785&quot;&gt;&lt;br data-dcnode-id=&quot;787&quot;&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;745&quot;&gt;&lt;span data-dcnode-id=&quot;746&quot; instrument_node=&quot;&quot;&gt;Vladimir Demikhov is recognized as the first medic to successfully perform a coronary artery bypass surgery on a warm-blooded creature. Despite being a successful surgeon in coronary and organ transplant surgery, the medic performed some embarrassing experiments, thrusting him into disrepute. The infamous two-headed dogs’ experiment is one notorious example of his downfall.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;742&quot;&gt;&lt;span data-dcnode-id=&quot;743&quot; instrument_node=&quot;&quot;&gt;In the two-headed dogs’ project, Dr. Demikhov stitched a puppy’s head, shoulders, and front legs onto a German shepherd’s neck. Since both dogs could move around independently after the surgery, the project appeared successful. However, they soon died due to tissue rejection. Demikhov repeated his experiment 20 times, but the longest these creatures lived was one month.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;739&quot;&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;Many considered this a cruel experiment, and I bet you do too!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;687&quot;&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;In his theory, Dr. Stanley turned over 600 inmates into his test subjects. Then came the most horrifying action- the doctor injected his victims with liquefied animal testicles when he could not get enough human testicles!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;684&quot;&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;To prove his success, Dr. Stanley later cited a Caucasian inmate who claimed to feel energetic after undergoing a testicle transplant from an executed convict of an African American background.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;632&quot;&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;In 1971, researchers from Stanford University experimented with investigating why prisoners and guards always seemed to be at loggerheads. The researchers assigned 24 students the roles of prisoners and guards, putting them into a prison-like environment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;631&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;629&quot;&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt;However, in just six days, this bizarre study abruptly came to an end. They initially planned to experiment for two weeks, but that did not happen. The researchers found it impossible to maintain and control the order in the experimental cells.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;628&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;626&quot;&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;Interestingly, prisoners who became guards were instructed to shun violence. Shockingly, a third of the guards became abusive. The surprising thing is that the abused prisoners passively accepted cruel treatment, leading two of them to emotional trauma.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;580&quot;&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;Shockingly, two Russian scientists Dr. Boris Levinskovsky and Sergei Brukhoneko, once released controversial videos featuring dog heads kept alive through an artificial blood circulation system. The released videos were known as Experiments in the Revival of Organisms. In the controversial video, the scientists used the autojektor, a piece of special heart-lung equipment, to display dog heads blinking their eyes, licking their mouths, and wiggling ears in response to sound.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;577&quot;&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;In 2005, American Scientists repeated the same experiment by flushing the dog’s blood and replacing it with sugar-filled saline and oxygen. The unthinkable happened; the dogs came back from the dead three hours later, after undergoing an electric shock and a blood transfusion.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;525&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;Pundits consider the MKUltra among the CIA’s most notable projects. The CIA intended to develop a mind-control technique to be unleashed against enemies during war. The agency carried out the project from 1950 to 1970. The primary goal was to put America in the lead of mind-control technology. However, in time, the project degenerated into an illegal drug-testing regime targeting thousands of citizens.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;522&quot;&gt;&lt;span data-dcnode-id=&quot;523&quot; instrument_node=&quot;&quot;&gt;The CIA used drugs and chemicals, like LSD, to inflict psychological torture. The agency even tried to manipulate the victim’s mental states by altering brain functions. In a curious move, the authorities ordered the destruction of all project-related documentation. Despite this, in 2001, more than 20,000 pages of the program’s documents were released under the Freedom of Information Act.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;483&quot;&gt;&lt;noscript data-dcnode-id=&quot;485&quot;&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;&amp;lt;a href=&quot;https://youtu.be/cMNx17H3dRU&quot;&amp;gt;&amp;lt;img src=&quot;https://listverse.com/wp-content/plugins/wp-youtube-lyte-main/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FcMNx17H3dRU%2F0.jpg&quot; alt=&quot;Extracellular matrix | Structure of a cell | Biology | Khan Academy&quot; width=&quot;640&quot; height=&quot;340&quot;&amp;gt;&amp;lt;br /&amp;gt;Watch this video on YouTube&amp;lt;/a&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;meta content=&quot;Overview of how cells interact with the extracellular matrix. Watch the next lesson: https://www.khanacademy.org/science/biology/structure-of-a-cell/cytoskeleton-junctions-and-extracellular-structures/v/plant-cell-walls?utm_source=YT&amp;amp;utm_medium=Desc&amp;amp;utm_campaign=biology Missed the previous lesson? https://www.khanacademy.org/science/biology/structure-of-a-cell/tour-of-organelles/v/cytoskeletons?utm_source=YT&amp;amp;utm_medium=Desc&amp;amp;utm_campaign=biology Biology on Khan Academy: Life is beautiful! From atoms to cells, from genes to proteins, from populations to ecosystems, biology is the study of the fascinating and intricate systems that make life possible. Dive in to learn more about the many branches of biology and why they are exciting and important. Covers topics seen in a high school or first-year college biology course. About Khan Academy: Khan Academy offers practice exercises, instructional videos, and a personalized learning dashboard that empower learners to study at their own pace in and outside of the classroom. We tackle math, science, computer programming, history, art history, economics, and more. Our math missions guide learners from kindergarten to calculus using state-of-the-art, adaptive technology that identifies strengths and learning gaps. We've also partnered with institutions like NASA, The Museum of Modern Art, The California Academy of Sciences, and MIT to offer specialized content. For free. For everyone. Forever. #YouCanLearnAnything Subscribe to Khan Academy's Biology channel: https://www.youtube.com/channel/UC82qE46vcTn7lP4tK_RHhdg?sub_confirmation=1 Subscribe to Khan Academy: https://www.youtube.com/subscription_center?add_user=khanacademy&quot; data-dcnode-id=&quot;484&quot; itemprop=&quot;description&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;473&quot;&gt;&lt;span data-dcnode-id=&quot;474&quot; instrument_node=&quot;&quot;&gt;This might sound more like science fiction, but can you imagine a scientists’ gallant attempt to grow human brains in mice? The surprising truth is that it happened.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;470&quot;&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt;A group of scientists discovered that they could dry pig-bladder tissue into an extracellular matrix powder. In turn, this powder could help regrow human fingers. Interestingly, the researchers also found that pig-bladder lining cells commonly contain a unique protein that boosts tissue growth. This is strikingly similar to the way lizards regrow their tails. In contrast, the typical mammal grows scar tissue to heal injuries; this prevents future cell growth.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;467&quot;&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;More recently, a few scientists achieved the impossible; they succeeded in injecting a human embryo’s stem cells into the brains of an unborn fetal mouse. After birth, the human brain cells continued developing together with the mouse brain cells. Astoundingly, this proved human stem cells can grow into such cells while “encased” in another living creature.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;464&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;Doctors have used similar treatments to develop new fingertips, reattach severed fingers, and regenerate an Iraqi war veteran’s destroyed muscles. Ultimately, many scholars believe this knowledge could boost human brain disorder research and improve researchers’ testing experimental medications.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;457&quot;&gt;&lt;span data-dcnode-id=&quot;461&quot;&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt;+&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;Bonus Experiment: Spider Genes in Goats&lt;/span&gt;&lt;p data-dcnode-id=&quot;459&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;454&quot;&gt;&lt;span data-dcnode-id=&quot;455&quot; instrument_node=&quot;&quot;&gt;In another development, a team of scientists succeeded in inserting the genes of spider silk into goats. Once they did this, the goats’ milk contained a protein that forms silk. In turn, this likely makes it possible to harvest massive quantities of silk from the goats’ milk. Experts consider spider silk to be five times stronger than ordinary steel! Overall, medics believe this discovery will help them design artificial limbs and bullet-proof vests.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;451&quot;&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;Conclusion&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;450&quot; instrument_node=&quot;&quot;&gt;
