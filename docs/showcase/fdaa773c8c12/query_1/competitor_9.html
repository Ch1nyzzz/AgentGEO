&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;4066&quot;&gt;&lt;a data-dcnode-id=&quot;4123&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4124&quot; instrument_node=&quot;&quot;&gt;Figure 2b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4122&quot; instrument_node=&quot;&quot;&gt; shows that the rubbery modulus &lt;/span&gt;&lt;i data-dcnode-id=&quot;4120&quot;&gt;&lt;span data-dcnode-id=&quot;4121&quot; instrument_node=&quot;&quot;&gt;E&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4117&quot;&gt;&lt;i data-dcnode-id=&quot;4118&quot;&gt;&lt;span data-dcnode-id=&quot;4119&quot; instrument_node=&quot;&quot;&gt;r&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4116&quot; instrument_node=&quot;&quot;&gt; of the copolymer networks increases with increase in crosslinker concentration (see &lt;/span&gt;&lt;a data-dcnode-id=&quot;4114&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;4115&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.2, Fig. S2 and Table S1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4113&quot; instrument_node=&quot;&quot;&gt;), as expected from entropic elasticity&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4110&quot;&gt;&lt;a aria-label=&quot;Reference 54&quot; data-dcnode-id=&quot;4111&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR54&quot; id=&quot;ref-link-section-d186849252e996&quot; title=&quot;Treloar, L. R. G. The physics of rubber elasticity. 2d edn, (Clarendon Press, 1958).&quot;&gt;&lt;span data-dcnode-id=&quot;4112&quot; instrument_node=&quot;&quot;&gt;54&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4109&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;i data-dcnode-id=&quot;4107&quot;&gt;&lt;span data-dcnode-id=&quot;4108&quot; instrument_node=&quot;&quot;&gt;E&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4104&quot;&gt;&lt;i data-dcnode-id=&quot;4105&quot;&gt;&lt;span data-dcnode-id=&quot;4106&quot; instrument_node=&quot;&quot;&gt;r&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4103&quot; instrument_node=&quot;&quot;&gt; = (3&lt;/span&gt;&lt;i data-dcnode-id=&quot;4101&quot;&gt;&lt;span data-dcnode-id=&quot;4102&quot; instrument_node=&quot;&quot;&gt;ρRT&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4100&quot; instrument_node=&quot;&quot;&gt;)/&lt;/span&gt;&lt;i data-dcnode-id=&quot;4098&quot;&gt;&lt;span data-dcnode-id=&quot;4099&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4095&quot;&gt;&lt;i data-dcnode-id=&quot;4096&quot;&gt;&lt;span data-dcnode-id=&quot;4097&quot; instrument_node=&quot;&quot;&gt;c&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4094&quot; instrument_node=&quot;&quot;&gt;; here, &lt;/span&gt;&lt;i data-dcnode-id=&quot;4092&quot;&gt;&lt;span data-dcnode-id=&quot;4093&quot; instrument_node=&quot;&quot;&gt;R&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4091&quot; instrument_node=&quot;&quot;&gt; is the gas constant, &lt;/span&gt;&lt;i data-dcnode-id=&quot;4089&quot;&gt;&lt;span data-dcnode-id=&quot;4090&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4088&quot; instrument_node=&quot;&quot;&gt; is absolute temperature, ρ is polymer density and &lt;/span&gt;&lt;i data-dcnode-id=&quot;4086&quot;&gt;&lt;span data-dcnode-id=&quot;4087&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4083&quot;&gt;&lt;i data-dcnode-id=&quot;4084&quot;&gt;&lt;span data-dcnode-id=&quot;4085&quot; instrument_node=&quot;&quot;&gt;c&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4082&quot; instrument_node=&quot;&quot;&gt; is average molecular weight between crosslinks. The ratio ρ/&lt;/span&gt;&lt;i data-dcnode-id=&quot;4080&quot;&gt;&lt;span data-dcnode-id=&quot;4081&quot; instrument_node=&quot;&quot;&gt;M&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4077&quot;&gt;&lt;i data-dcnode-id=&quot;4078&quot;&gt;&lt;span data-dcnode-id=&quot;4079&quot; instrument_node=&quot;&quot;&gt;c&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4076&quot; instrument_node=&quot;&quot;&gt; is the crosslinking density of the polymer network which is affected by crosslinker concentration as well as the molecular weight of the crosslinker. Comparing the four network systems, the B + DEG network has the highest rubbery modulus at the same mass fraction of crosslinker, as the highest molar weight of DEGDMA leads to the highest crosslinking density (See &lt;/span&gt;&lt;a data-dcnode-id=&quot;4074&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;4075&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.3 and Table S2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4073&quot; instrument_node=&quot;&quot;&gt;) and the highest &lt;/span&gt;&lt;i data-dcnode-id=&quot;4071&quot;&gt;&lt;span data-dcnode-id=&quot;4072&quot; instrument_node=&quot;&quot;&gt;E&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4068&quot;&gt;&lt;i data-dcnode-id=&quot;4069&quot;&gt;&lt;span data-dcnode-id=&quot;4070&quot; instrument_node=&quot;&quot;&gt;r&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4067&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4018&quot;&gt;&lt;span data-dcnode-id=&quot;4065&quot; instrument_node=&quot;&quot;&gt;The effect of crosslinker on failure strain ε&lt;/span&gt;&lt;sub data-dcnode-id=&quot;4062&quot;&gt;&lt;i data-dcnode-id=&quot;4063&quot;&gt;&lt;span data-dcnode-id=&quot;4064&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4061&quot; instrument_node=&quot;&quot;&gt; is shown in &lt;/span&gt;&lt;a data-dcnode-id=&quot;4059&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4060&quot; instrument_node=&quot;&quot;&gt;Fig. 2c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4058&quot; instrument_node=&quot;&quot;&gt;; these results were obtained from uniaxial tensile tests at temperatures 30 °C above each sample’s &lt;/span&gt;&lt;i data-dcnode-id=&quot;4056&quot;&gt;&lt;span data-dcnode-id=&quot;4057&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4053&quot;&gt;&lt;i data-dcnode-id=&quot;4054&quot;&gt;&lt;span data-dcnode-id=&quot;4055&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4052&quot; instrument_node=&quot;&quot;&gt; where sample stays the rubbery state to eliminate the effect of viscoelasticity (see &lt;/span&gt;&lt;a data-dcnode-id=&quot;4050&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;4051&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.2, Fig. S2 and Table S1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4049&quot; instrument_node=&quot;&quot;&gt;). The results shown in &lt;/span&gt;&lt;a data-dcnode-id=&quot;4047&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4048&quot; instrument_node=&quot;&quot;&gt;Fig. 2c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4046&quot; instrument_node=&quot;&quot;&gt; suggest that in the SMP system consisting of the same LCB and crosslinker, the lower crosslinker concentration gives higher stretchability. &lt;/span&gt;&lt;a data-dcnode-id=&quot;4044&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4045&quot; instrument_node=&quot;&quot;&gt;Figure 2c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4043&quot; instrument_node=&quot;&quot;&gt; also shows that the copolymer network system formed with a higher molecular weight crosslinker has higher stretchability. For example, for the copolymer systems consisting of 10% crosslinkers, the stretchability can be increased from &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4041&quot;&gt;&lt;span data-dcnode-id=&quot;4042&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4040&quot; instrument_node=&quot;&quot;&gt;45% to &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4038&quot;&gt;&lt;span data-dcnode-id=&quot;4039&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4037&quot; instrument_node=&quot;&quot;&gt;100% at 30 °C above sample’s &lt;/span&gt;&lt;i data-dcnode-id=&quot;4035&quot;&gt;&lt;span data-dcnode-id=&quot;4036&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4032&quot;&gt;&lt;i data-dcnode-id=&quot;4033&quot;&gt;&lt;span data-dcnode-id=&quot;4034&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4031&quot; instrument_node=&quot;&quot;&gt; by increase the molecular weight from 242.3 g/mol (DEGDMA) to 1700 g/mol (BPA) (See &lt;/span&gt;&lt;a data-dcnode-id=&quot;4029&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;4030&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.2, Fig. S2 and Table S1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4028&quot; instrument_node=&quot;&quot;&gt;). &lt;/span&gt;&lt;a data-dcnode-id=&quot;4026&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4027&quot; instrument_node=&quot;&quot;&gt;Figure 2d&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4025&quot; instrument_node=&quot;&quot;&gt; shows the temperature effect on the failure strain of an SMP sample consisting of 90% BMP and 10% BPA (See &lt;/span&gt;&lt;a data-dcnode-id=&quot;4023&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;4024&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.4 and Fig. S3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4022&quot; instrument_node=&quot;&quot;&gt;). The stretchability of this copolymer network is increased by decreasing the stretching temperatures and finally reaches the maximum of &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4020&quot;&gt;&lt;span data-dcnode-id=&quot;4021&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4019&quot; instrument_node=&quot;&quot;&gt;330% at 40 °C where the temperature is close to the peak of the loss modulus indicating the highest energy dissipation. A more stretchable network can be achieved by further reducing the crosslinker concentration of BPA or replacing BPA with a crosslinker having higher molecular weight.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3960&quot;&gt;&lt;span data-dcnode-id=&quot;4017&quot; instrument_node=&quot;&quot;&gt;Not only does the chemical composition affect the thermomechanical properties of the printed SMP systems, it also affects the photo-polymerization kinetics that determines the build rate during manufacturing. As shown in &lt;/span&gt;&lt;a data-dcnode-id=&quot;4015&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;4016&quot; instrument_node=&quot;&quot;&gt;Fig. 2e&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4014&quot; instrument_node=&quot;&quot;&gt;, at a given UV light intensity, less exposure energy (time) is required to cure a layer of the same thickness when the crosslinker concentration increases (See &lt;/span&gt;&lt;a data-dcnode-id=&quot;4012&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;4013&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.5 and Fig. S4a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4011&quot; instrument_node=&quot;&quot;&gt;). This is mainly attributed to the reaction diffusion-controlled termination during the polymerization of the methacrylate based copolymer system&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4002&quot;&gt;&lt;a aria-label=&quot;Reference 55&quot; data-dcnode-id=&quot;4009&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR55&quot; id=&quot;ref-link-section-d186849252e1094&quot; title=&quot;Anseth, K. S., Decker, C. &amp;amp; Bowman, C. N. Real-Time Infrared Characterization of Reaction Diffusion during Multifunctional Monomer Polymerizations. Macromolecules 28, 4040–4043, doi: 10.1021/ma00115a045 (1995).&quot;&gt;&lt;span data-dcnode-id=&quot;4010&quot; instrument_node=&quot;&quot;&gt;55&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4008&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 56&quot; data-dcnode-id=&quot;4006&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR56&quot; id=&quot;ref-link-section-d186849252e1097&quot; title=&quot;Lovell, L. G., Stansbury, J. W., Syrpes, D. C. &amp;amp; Bowman, C. N. Effects of Composition and Reactivity on the Reaction Kinetics of Dimethacrylate/Dimethacrylate Copolymerizations. Macromolecules 32, 3913–3921, doi: 10.1021/ma990258d (1999).&quot;&gt;&lt;span data-dcnode-id=&quot;4007&quot; instrument_node=&quot;&quot;&gt;56&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4005&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 57&quot; data-dcnode-id=&quot;4003&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR57&quot; id=&quot;ref-link-section-d186849252e1100&quot; title=&quot;Young, J. S. &amp;amp; Bowman, C. N. Effect of Polymerization Temperature and Cross-Linker Concentration on Reaction Diffusion Controlled Termination. Macromolecules 32, 6073–6081, doi: 10.1021/ma9902955 (1999).&quot;&gt;&lt;span data-dcnode-id=&quot;4004&quot; instrument_node=&quot;&quot;&gt;57&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4001&quot; instrument_node=&quot;&quot;&gt;. With more crosslinker, the crosslinking density of the polymer increases, which limits the propagation of free radicals that would otherwise reach each other to terminate the polymerization&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3998&quot;&gt;&lt;a aria-label=&quot;Reference 57&quot; data-dcnode-id=&quot;3999&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR57&quot; id=&quot;ref-link-section-d186849252e1104&quot; title=&quot;Young, J. S. &amp;amp; Bowman, C. N. Effect of Polymerization Temperature and Cross-Linker Concentration on Reaction Diffusion Controlled Termination. Macromolecules 32, 6073–6081, doi: 10.1021/ma9902955 (1999).&quot;&gt;&lt;span data-dcnode-id=&quot;4000&quot; instrument_node=&quot;&quot;&gt;57&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3997&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;a data-dcnode-id=&quot;3995&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;3996&quot; instrument_node=&quot;&quot;&gt;Figure 2e&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3994&quot; instrument_node=&quot;&quot;&gt; also shows that the copolymer network consisting of a lower molecular weight crosslinker (P550) requires less exposure energy (time) to polymerize a same thickness layer. This is primarily because the low molecular weight crosslinker (P550) contains more unreacted double bonds per unit mass than the high molecular weight crosslinker (P750) does. In addition, the increase of photo initiator reduces the exposure energy (time) to cure a same thickness layer (See &lt;/span&gt;&lt;a data-dcnode-id=&quot;3992&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;3993&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.5 and Fig. S4b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3991&quot; instrument_node=&quot;&quot;&gt;). Moreover, it is necessary to note that under the same condition methacrylate based SMP has comparatively lower reactivity&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3988&quot;&gt;&lt;a aria-label=&quot;Reference 57&quot; data-dcnode-id=&quot;3989&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR57&quot; id=&quot;ref-link-section-d186849252e1115&quot; title=&quot;Young, J. S. &amp;amp; Bowman, C. N. Effect of Polymerization Temperature and Cross-Linker Concentration on Reaction Diffusion Controlled Termination. Macromolecules 32, 6073–6081, doi: 10.1021/ma9902955 (1999).&quot;&gt;&lt;span data-dcnode-id=&quot;3990&quot; instrument_node=&quot;&quot;&gt;57&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3987&quot; instrument_node=&quot;&quot;&gt; than those acrylate based materials such as poly(ethylene glycol) diacrylate (PEGDA) and hexanediol diacrylate which have been frequently used to print 3D structure&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3969&quot;&gt;&lt;a aria-label=&quot;Reference 29&quot; data-dcnode-id=&quot;3985&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR29&quot; id=&quot;ref-link-section-d186849252e1119&quot; title=&quot;Sun, C., Fang, N., Wu, D. M. &amp;amp; Zhang, X. Projection micro-stereolithography using digital micro-mirror dynamic mask. Sensors and Actuators a-Physical 121, 113–120, doi: 10.1016/j.sna.2004.12.011 (2005).&quot;&gt;&lt;span data-dcnode-id=&quot;3986&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3984&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 30&quot; data-dcnode-id=&quot;3982&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR30&quot; id=&quot;ref-link-section-d186849252e1122&quot; title=&quot;Zheng, X. et al. Design and optimization of a light-emitting diode projection micro-stereolithography three-dimensional manufacturing system. Review of Scientific Instruments 83, 125001, doi: 10.1063/1.4769050 (2012).&quot;&gt;&lt;span data-dcnode-id=&quot;3983&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3981&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 31&quot; data-dcnode-id=&quot;3979&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR31&quot; id=&quot;ref-link-section-d186849252e1125&quot; title=&quot;Zheng, X. Y. et al. Ultralight, Ultrastiff Mechanical Metamaterials. Science 344, 1373–1377, doi: 10.1126/science.1252291 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;3980&quot; instrument_node=&quot;&quot;&gt;31&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3978&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 44&quot; data-dcnode-id=&quot;3976&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR44&quot; id=&quot;ref-link-section-d186849252e1128&quot; title=&quot;Tumbleston, J. R. et al. Continuous liquid interface production of 3D objects. Science 347, 1349–1352, doi: 10.1126/science.aaa2397 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;3977&quot; instrument_node=&quot;&quot;&gt;44&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3975&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 58&quot; data-dcnode-id=&quot;3973&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR58&quot; id=&quot;ref-link-section-d186849252e1131&quot; title=&quot;Lee, H., Xia, C. &amp;amp; Fang, N. X. First jump of microgel; actuation speed enhancement by elastic instability. Soft Matter 6, 4342–4345, doi: 10.1039/c0sm00092b (2010).&quot;&gt;&lt;span data-dcnode-id=&quot;3974&quot; instrument_node=&quot;&quot;&gt;58&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3972&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 59&quot; data-dcnode-id=&quot;3970&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR59&quot; id=&quot;ref-link-section-d186849252e1134&quot; title=&quot;Lee, H., Zhang, J., Jiang, H. &amp;amp; Fang, N. X. Prescribed Pattern Transformation in Swelling Gel Tubes by Elastic Instability. Physical Review Letters 108, 214304 (2012).&quot;&gt;&lt;span data-dcnode-id=&quot;3971&quot; instrument_node=&quot;&quot;&gt;59&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3968&quot; instrument_node=&quot;&quot;&gt;. This comparatively slow but conversion-dependent&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3965&quot;&gt;&lt;a aria-label=&quot;Reference 57&quot; data-dcnode-id=&quot;3966&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR57&quot; id=&quot;ref-link-section-d186849252e1138&quot; title=&quot;Young, J. S. &amp;amp; Bowman, C. N. Effect of Polymerization Temperature and Cross-Linker Concentration on Reaction Diffusion Controlled Termination. Macromolecules 32, 6073–6081, doi: 10.1021/ma9902955 (1999).&quot;&gt;&lt;span data-dcnode-id=&quot;3967&quot; instrument_node=&quot;&quot;&gt;57&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3964&quot; instrument_node=&quot;&quot;&gt; photo-polymerization kinetics makes the methacrylate based SMPs require higher (longer) exposure energy (time) to cure a layer of the same thickness than the acrylate based materials (See &lt;/span&gt;&lt;a data-dcnode-id=&quot;3962&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;3963&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.5 and Fig. S4c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3961&quot; instrument_node=&quot;&quot;&gt;). Therefore, a high contrast digital micro display with moderate intensity of UV light is needed to avoid any unwanted curing on the unintended parts (Details about the digital micro display are described in Materials).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3931&quot;&gt;&lt;span data-dcnode-id=&quot;3959&quot; instrument_node=&quot;&quot;&gt;In a printed component that consists of more than one material, the interface bonding between them significantly impacts the mechanical performance of the composite. In &lt;/span&gt;&lt;a data-dcnode-id=&quot;3957&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;3958&quot; instrument_node=&quot;&quot;&gt;Fig. 2f&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3956&quot; instrument_node=&quot;&quot;&gt;, we investigated the interfacial bonding by uniaxially stretching a composite with two components arranged in series (Component A: 50% B + 50% P550 with &lt;/span&gt;&lt;i data-dcnode-id=&quot;3954&quot;&gt;&lt;span data-dcnode-id=&quot;3955&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3951&quot;&gt;&lt;i data-dcnode-id=&quot;3952&quot;&gt;&lt;span data-dcnode-id=&quot;3953&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3950&quot; instrument_node=&quot;&quot;&gt; = 31 °C and Component B: 90% B + 10% BPA &lt;/span&gt;&lt;i data-dcnode-id=&quot;3948&quot;&gt;&lt;span data-dcnode-id=&quot;3949&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3945&quot;&gt;&lt;i data-dcnode-id=&quot;3946&quot;&gt;&lt;span data-dcnode-id=&quot;3947&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3944&quot; instrument_node=&quot;&quot;&gt; = 56 °C) at a temperature 30 °C higher than &lt;/span&gt;&lt;i data-dcnode-id=&quot;3942&quot;&gt;&lt;span data-dcnode-id=&quot;3943&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3939&quot;&gt;&lt;i data-dcnode-id=&quot;3940&quot;&gt;&lt;span data-dcnode-id=&quot;3941&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3938&quot; instrument_node=&quot;&quot;&gt; of Component B, where the both components are in their rubbery state (See &lt;/span&gt;&lt;a data-dcnode-id=&quot;3936&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;3937&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.6 and Fig. S5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3935&quot; instrument_node=&quot;&quot;&gt;). The fact that the composite breaks at Component A which has a lower failure strain rather than at the interface indicates a strong interface bonding. The comparison of uniaxial tensile tests between the composite and the two components in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3933&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;3934&quot; instrument_node=&quot;&quot;&gt;Fig. 2e&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3932&quot; instrument_node=&quot;&quot;&gt; reveals that Components A and B form a strong covalently boned interface through which the composite transfers stress completely between the two components. Generally speaking, this strong interface bonding forms between the methacrylate based SMPs made of different compositions and constitutes.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;3929&quot; id=&quot;Sec5&quot;&gt;&lt;span data-dcnode-id=&quot;3930&quot; instrument_node=&quot;&quot;&gt;Shape Memory Behavior&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3856&quot;&gt;&lt;span data-dcnode-id=&quot;3928&quot; instrument_node=&quot;&quot;&gt;Two key attributes of SMPs are their ability to fix a temporary programmed shape (&lt;/span&gt;&lt;i data-dcnode-id=&quot;3926&quot;&gt;&lt;span data-dcnode-id=&quot;3927&quot; instrument_node=&quot;&quot;&gt;fixity&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3925&quot; instrument_node=&quot;&quot;&gt;) and to subsequently recover the original shape upon activation by a stimulus (&lt;/span&gt;&lt;i data-dcnode-id=&quot;3923&quot;&gt;&lt;span data-dcnode-id=&quot;3924&quot; instrument_node=&quot;&quot;&gt;recovery&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3922&quot; instrument_node=&quot;&quot;&gt;). &lt;/span&gt;&lt;a data-dcnode-id=&quot;3920&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;3921&quot; instrument_node=&quot;&quot;&gt;Figure 3a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3919&quot; instrument_node=&quot;&quot;&gt; shows a typical temperature-strain-time shape memory (SM) cycle that we used to investigate the fixity and recovery of SMP samples synthesized from different LCBs and crosslinkers that result in different &lt;/span&gt;&lt;i data-dcnode-id=&quot;3917&quot;&gt;&lt;span data-dcnode-id=&quot;3918&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3914&quot;&gt;&lt;i data-dcnode-id=&quot;3915&quot;&gt;&lt;span data-dcnode-id=&quot;3916&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3913&quot; instrument_node=&quot;&quot;&gt; s. &lt;/span&gt;&lt;a data-dcnode-id=&quot;3911&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;3912&quot; instrument_node=&quot;&quot;&gt;Figure 3b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3910&quot; instrument_node=&quot;&quot;&gt; presents representative strain-time curves of a SMP strip sample made of 80% BMA + 20% P750. The SMP was first stretched to a target strain &lt;/span&gt;&lt;i data-dcnode-id=&quot;3908&quot;&gt;&lt;span data-dcnode-id=&quot;3909&quot; instrument_node=&quot;&quot;&gt;e&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3906&quot;&gt;&lt;span data-dcnode-id=&quot;3907&quot; instrument_node=&quot;&quot;&gt;max&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3905&quot; instrument_node=&quot;&quot;&gt; (20%) with a constant loading rate &lt;/span&gt;&lt;i data-dcnode-id=&quot;3903&quot;&gt;&lt;span data-dcnode-id=&quot;3904&quot; instrument_node=&quot;&quot;&gt;e&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3902&quot; instrument_node=&quot;&quot;&gt; (0.001 s&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3900&quot;&gt;&lt;span data-dcnode-id=&quot;3901&quot; instrument_node=&quot;&quot;&gt;−1&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3899&quot; instrument_node=&quot;&quot;&gt;) at a programming temperature &lt;/span&gt;&lt;i data-dcnode-id=&quot;3897&quot;&gt;&lt;span data-dcnode-id=&quot;3898&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3894&quot;&gt;&lt;i data-dcnode-id=&quot;3895&quot;&gt;&lt;span data-dcnode-id=&quot;3896&quot; instrument_node=&quot;&quot;&gt;D&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3893&quot; instrument_node=&quot;&quot;&gt; (63 °C) and then the temperature was decreased to a &lt;/span&gt;&lt;i data-dcnode-id=&quot;3891&quot;&gt;&lt;span data-dcnode-id=&quot;3892&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3888&quot;&gt;&lt;i data-dcnode-id=&quot;3889&quot;&gt;&lt;span data-dcnode-id=&quot;3890&quot; instrument_node=&quot;&quot;&gt;L&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3887&quot; instrument_node=&quot;&quot;&gt; (&lt;/span&gt;&lt;i data-dcnode-id=&quot;3885&quot;&gt;&lt;span data-dcnode-id=&quot;3886&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3882&quot;&gt;&lt;i data-dcnode-id=&quot;3883&quot;&gt;&lt;span data-dcnode-id=&quot;3884&quot; instrument_node=&quot;&quot;&gt;L&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3881&quot; instrument_node=&quot;&quot;&gt; = 25 °C) with a cooling rate 2.5 °C/min. Once &lt;/span&gt;&lt;i data-dcnode-id=&quot;3879&quot;&gt;&lt;span data-dcnode-id=&quot;3880&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3876&quot;&gt;&lt;i data-dcnode-id=&quot;3877&quot;&gt;&lt;span data-dcnode-id=&quot;3878&quot; instrument_node=&quot;&quot;&gt;L&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3875&quot; instrument_node=&quot;&quot;&gt; was reached, the specimen was held for 2 minutes and then the tensile force was removed. In the free recovery step, the temperature was increased to a recovery temperature &lt;/span&gt;&lt;i data-dcnode-id=&quot;3873&quot;&gt;&lt;span data-dcnode-id=&quot;3874&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3870&quot;&gt;&lt;i data-dcnode-id=&quot;3871&quot;&gt;&lt;span data-dcnode-id=&quot;3872&quot; instrument_node=&quot;&quot;&gt;R&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3869&quot; instrument_node=&quot;&quot;&gt; (in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3867&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;3868&quot; instrument_node=&quot;&quot;&gt;Fig. 3b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3866&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;i data-dcnode-id=&quot;3864&quot;&gt;&lt;span data-dcnode-id=&quot;3865&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3861&quot;&gt;&lt;i data-dcnode-id=&quot;3862&quot;&gt;&lt;span data-dcnode-id=&quot;3863&quot; instrument_node=&quot;&quot;&gt;R&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3860&quot; instrument_node=&quot;&quot;&gt; = 35 °C, 40 °C, 50 °C and 60 °C, respectively) at the same rate of cooling and subsequently stabilized for another 20 min. (Details about the SM behavior testing are presented in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3858&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;3859&quot; instrument_node=&quot;&quot;&gt;Supplementary Material in S2.1 and Fig. S6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3857&quot; instrument_node=&quot;&quot;&gt;).&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;3776&quot; data-test=&quot;figure&quot; data-title=&quot;Figure 3&quot; id=&quot;figure-3&quot;&gt;&lt;figure data-dcnode-id=&quot;3777&quot;&gt;&lt;figcaption data-dcnode-id=&quot;3853&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;3854&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;3855&quot; instrument_node=&quot;&quot;&gt;Figure 3&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;3788&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;3848&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot t;3517&quot;&gt;&lt;span data-dcnode-id=&quot;3518&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3514&quot;&gt;&lt;i data-dcnode-id=&quot;3515&quot;&gt;&lt;span data-dcnode-id=&quot;3516&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3513&quot; instrument_node=&quot;&quot;&gt; requires a longer recovery time.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;3510&quot; id=&quot;Sec6&quot;&gt;&lt;span data-dcnode-id=&quot;3511&quot; instrument_node=&quot;&quot;&gt;Three dimensional printed structures with a single SMP&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3442&quot;&gt;&lt;a data-dcnode-id=&quot;3508&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3509&quot; instrument_node=&quot;&quot;&gt;Figure 4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3507&quot; instrument_node=&quot;&quot;&gt; shows the ability of our additive manufacturing system to create complex 3D structures that exhibit nonlinear large deformation SM behavior. As shown in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3505&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3506&quot; instrument_node=&quot;&quot;&gt;Fig. 4a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3504&quot; instrument_node=&quot;&quot;&gt;I, a spring was fabricated using a SMP with &lt;/span&gt;&lt;i data-dcnode-id=&quot;3502&quot;&gt;&lt;span data-dcnode-id=&quot;3503&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3499&quot;&gt;&lt;i data-dcnode-id=&quot;3500&quot;&gt;&lt;span data-dcnode-id=&quot;3501&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3498&quot; instrument_node=&quot;&quot;&gt; = 43 °C (80% B + 20% P750). We demonstrated the SM effect of the spring by stretching it to a straight strand at 60 °C. The straight strand configuration was fixed (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3496&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3497&quot; instrument_node=&quot;&quot;&gt;Fig. 4a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3495&quot; instrument_node=&quot;&quot;&gt;II) after removing the external load at 20 °C. It recovered the original spring shape (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3493&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3494&quot; instrument_node=&quot;&quot;&gt;Fig. 4a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3492&quot; instrument_node=&quot;&quot;&gt;II–V) after heating back to 60 °C. The complicated nonlinear large deformation SM behavior of the spring was investigated by following the typical SM cycle for a spring with a representative segment (See &lt;/span&gt;&lt;a data-dcnode-id=&quot;3490&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;3491&quot; instrument_node=&quot;&quot;&gt;Supplementary Material S3.3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3489&quot; instrument_node=&quot;&quot;&gt;). &lt;/span&gt;&lt;a data-dcnode-id=&quot;3487&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3488&quot; instrument_node=&quot;&quot;&gt;Figure 4b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3486&quot; instrument_node=&quot;&quot;&gt; shows the force-displacement relation when the spring was stretched at 60 °C. The spring becomes extremely stiff as it approaches to its fully unfolded state. The finite element (FE) simulations present the deformation contours in the progress of stretching the spring. Regardless of the maximum deformation on the two ends, the highest principle engineering strain on the main body of the spring was in the range from 70–100% which is about two to three times higher than the failure strain of previously reported SMPs used for 4D printing&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3484&quot;&gt;&lt;span data-dcnode-id=&quot;3485&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3483&quot; instrument_node=&quot;&quot;&gt;, indicating the enhanced mechanical performance which is a necessity for active structures. In “4D printing” where the fourth dimension is “time”, a key desire is to control of the actuation rate. For the printed shape memory structures, the actuation rate can be controlled by the recovery temperature&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3477&quot;&gt;&lt;a aria-label=&quot;Reference 24&quot; data-dcnode-id=&quot;3481&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR24&quot; id=&quot;ref-link-section-d186849252e1633&quot; title=&quot;Yu, K., Ge, Q. &amp;amp; Qi, H. J. Reduced Time as a Unified Parameter Determining Fixity and Free Recovery of Shape Memory Polymers. Nature Communication 5, 3066 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;3482&quot; instrument_node=&quot;&quot;&gt;24&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3480&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 49&quot; data-dcnode-id=&quot;3478&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR49&quot; id=&quot;ref-link-section-d186849252e1636&quot; title=&quot;Ge, Q., Yu, K., Ding, Y. F. &amp;amp; Qi, H. J. Prediction of temperature-dependent free recovery behaviors of amorphous shape memory polymers. Soft Matter 8, 11098–11105, doi: 10.1039/C2sm26249e (2012).&quot;&gt;&lt;span data-dcnode-id=&quot;3479&quot; instrument_node=&quot;&quot;&gt;49&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3476&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;a data-dcnode-id=&quot;3474&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3475&quot; instrument_node=&quot;&quot;&gt;Figure 4c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3473&quot; instrument_node=&quot;&quot;&gt; shows the recovery ratio of the stretched spring at different recovery temperatures. Here, the recovery ratio of the SM spring is defined as &lt;/span&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;3472&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw178/springer-static/image/art%253A10.1038/srep31110/MediaObjects/41598_2016_Article_BFsrep31110_IEq4_HTML.gif&amp;amp;raw&quot; style=&quot;width:178px;max-width:none;&quot;&gt;&lt;span data-dcnode-id=&quot;3471&quot; instrument_node=&quot;&quot;&gt;, where &lt;/span&gt;&lt;i data-dcnode-id=&quot;3469&quot;&gt;&lt;span data-dcnode-id=&quot;3470&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3468&quot; instrument_node=&quot;&quot;&gt;(&lt;/span&gt;&lt;i data-dcnode-id=&quot;3466&quot;&gt;&lt;span data-dcnode-id=&quot;3467&quot; instrument_node=&quot;&quot;&gt;t&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3465&quot; instrument_node=&quot;&quot;&gt;) is the end-to-end displacement during heating, &lt;/span&gt;&lt;i data-dcnode-id=&quot;3463&quot;&gt;&lt;span data-dcnode-id=&quot;3464&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3461&quot;&gt;&lt;span data-dcnode-id=&quot;3462&quot; instrument_node=&quot;&quot;&gt;max&lt;/span&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3460&quot; instrument_node=&quot;&quot;&gt; is the maximum displacement before unloading at 20 °C and Δ&lt;/span&gt;&lt;i data-dcnode-id=&quot;3458&quot;&gt;&lt;span data-dcnode-id=&quot;3459&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3457&quot; instrument_node=&quot;&quot;&gt; is the bounce back displacement after unloading. As seen in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3455&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3456&quot; instrument_node=&quot;&quot;&gt;Fig. 4c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3454&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;3453&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw18/springer-static/image/art%253A10.1038/srep31110/MediaObjects/41598_2016_Article_BFsrep31110_IEq5_HTML.gif&amp;amp;raw&quot; style=&quot;width:18px;max-width:none;&quot;&gt;&lt;span data-dcnode-id=&quot;3452&quot; instrument_node=&quot;&quot;&gt; is highly dependent on the recovery temperature. At 60 °C, the spring was fully recovered into the initial shape within 3 mins. The recovery rate was significantly slower at 35 °C where only about 10% recovery took place after 20 mins holding. The SM behavior including the free recovery at different temperatures of the 3D printed spring can be simulated by implementing the multi-branch model into FE software ABAQUS (Simulia, Providence, RI, USA). In &lt;/span&gt;&lt;a data-dcnode-id=&quot;3450&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3451&quot; instrument_node=&quot;&quot;&gt;Fig. 4c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3449&quot; instrument_node=&quot;&quot;&gt;, the FE simulation reproduced the free recovery behavior at different recovery temperatures, indicating that the multi-branch model can be used to design complex 4D printed structures that are made of SMPs and exhibit complex nonlinear large deformation thermomechanical behaviors. Details about FE simulation of SM behavior of this printed spring are described in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3447&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;3448&quot; instrument_node=&quot;&quot;&gt;Supplementary Material S3.3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3446&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;3444&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM2&quot;&gt;&lt;span data-dcnode-id=&quot;3445&quot; instrument_node=&quot;&quot;&gt;Supplementary Movies 1a–d&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3443&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;3401&quot; data-test=&quot;figure&quot; data-title=&quot;Figure 4&quot; id=&quot;figure-4&quot;&gt;&lt;figure data-dcnode-id=&quot;3402&quot;&gt;&lt;figcaption data-dcnode-id=&quot;3439&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;3440&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3441&quot; instrument_no al and structural characterization&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3370&quot;&gt;&lt;a aria-label=&quot;Reference 12&quot; data-dcnode-id=&quot;3377&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR12&quot; id=&quot;ref-link-section-d186849252e1746&quot; title=&quot;Yakacki, C. M. et al. Unconstrained recovery characterization of shape-memory polymer networks for cardiovascular applications. Biomaterials 28, 2255–2263, doi: 10.1016/j.biomaterials.2007.01.030 (2007).&quot;&gt;&lt;span data-dcnode-id=&quot;3378&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3376&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 61&quot; data-dcnode-id=&quot;3374&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR61&quot; id=&quot;ref-link-section-d186849252e1749&quot; title=&quot;Yakacki, C. M. et al. Strong, tailored, biocompatible shape-memory polymer networks. Advanced Functional Materials 18, 2428–2435, doi: 10.1002/adfm.200701049 (2008).&quot;&gt;&lt;span data-dcnode-id=&quot;3375&quot; instrument_node=&quot;&quot;&gt;61&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3373&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 62&quot; data-dcnode-id=&quot;3371&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR62&quot; id=&quot;ref-link-section-d186849252e1752&quot; title=&quot;Gall, K. et al. Thermomechanics of the shape memory effect in polymers for biomedical applications. Journal of Biomedical Materials Research Part A 73A, 339–348, doi: 10.1002/jbm.a.30296 (2005).&quot;&gt;&lt;span data-dcnode-id=&quot;3372&quot; instrument_node=&quot;&quot;&gt;62&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3369&quot; instrument_node=&quot;&quot;&gt; and simulations&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3357&quot;&gt;&lt;a aria-label=&quot;Reference 32&quot; data-dcnode-id=&quot;3367&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR32&quot; id=&quot;ref-link-section-d186849252e1756&quot; title=&quot;Srivastava, V., Chester, S. A. &amp;amp; Anand, L. Thermally actuated shape-memory polymers: Experiments, theory and numerical simulations. Journal of the Mechanics and Physics of Solids 58, 1100–1124, doi: 10.1016/j.jmps.2010.04.004 (2010).&quot;&gt;&lt;span data-dcnode-id=&quot;3368&quot; instrument_node=&quot;&quot;&gt;32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3366&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 63&quot; data-dcnode-id=&quot;3364&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR63&quot; id=&quot;ref-link-section-d186849252e1759&quot; title=&quot;Ames, N. M., Srivastava, V., Chester, S. A. &amp;amp; Arland, L. A thermo-mechanically coupled theory for large deformations of amorphous polymers. Part II: Applications. International Journal of Plasticity 25, 1495–1539, doi: 10.1016/j.ijplas.2008.11.005 (2009).&quot;&gt;&lt;span data-dcnode-id=&quot;3365&quot; instrument_node=&quot;&quot;&gt;63&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3363&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 64&quot; data-dcnode-id=&quot;3361&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR64&quot; id=&quot;ref-link-section-d186849252e1762&quot; title=&quot;Anand, L., Ames, N. M., Srivastava, V. &amp;amp; Chester, S. A. A thermo-mechanically coupled theory for large deformations of amorphous polymers. Part I: Formulation. International Journal of Plasticity 25, 1474–1494, doi: 10.1016/j.ijplas.2008.11.004 (2009).&quot;&gt;&lt;span data-dcnode-id=&quot;3362&quot; instrument_node=&quot;&quot;&gt;64&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3360&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 65&quot; data-dcnode-id=&quot;3358&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR65&quot; id=&quot;ref-link-section-d186849252e1765&quot; title=&quot;Srivastava, V., Chester, S. A., Ames, N. M. &amp;amp; Anand, L. A thermo-mechanically-coupled large-deformation theory for amorphous polymers in a temperature range which spans their glass transition. International Journal of Plasticity 26, 1138–1182, doi: 10.1016/j.ijplas.2010.01.004 (2010).&quot;&gt;&lt;span data-dcnode-id=&quot;3359&quot; instrument_node=&quot;&quot;&gt;65&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3356&quot; instrument_node=&quot;&quot;&gt;, the design of the stents has been limited primarily by fabrication methods because traditional manufacturing approaches are usually complex, consisting of multiple time-consuming steps, to achieve the geometric complexity and resolution necessary for stents&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3350&quot;&gt;&lt;a aria-label=&quot;Reference 12&quot; data-dcnode-id=&quot;3354&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR12&quot; id=&quot;ref-link-section-d186849252e1769&quot; title=&quot;Yakacki, C. M. et al. Unconstrained recovery characterization of shape-memory polymer networks for cardiovascular applications. Biomaterials 28, 2255–2263, doi: 10.1016/j.biomaterials.2007.01.030 (2007).&quot;&gt;&lt;span data-dcnode-id=&quot;3355&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3353&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 32&quot; data-dcnode-id=&quot;3351&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR32&quot; id=&quot;ref-link-section-d186849252e1772&quot; title=&quot;Srivastava, V., Chester, S. A. &amp;amp; Anand, L. Thermally actuated shape-memory polymers: Experiments, theory and numerical simulations. Journal of the Mechanics and Physics of Solids 58, 1100–1124, doi: 10.1016/j.jmps.2010.04.004 (2010).&quot;&gt;&lt;span data-dcnode-id=&quot;3352&quot; instrument_node=&quot;&quot;&gt;32&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3349&quot; instrument_node=&quot;&quot;&gt;. Our additive manufacturing system offers the ability to fabricate high resolution 3D shape memory structures with hardly any restriction of geometric complexity. &lt;/span&gt;&lt;a data-dcnode-id=&quot;3347&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3348&quot; instrument_node=&quot;&quot;&gt;Figure 4e&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3346&quot; instrument_node=&quot;&quot;&gt;I shows an array of stents printed in one batch with different geometric parameters including the height and the diameter of a stent, the number of joints, the diameter of ligaments and the angle between ligaments. In &lt;/span&gt;&lt;a data-dcnode-id=&quot;3344&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3345&quot; instrument_node=&quot;&quot;&gt;Fig. 4e&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3343&quot; instrument_node=&quot;&quot;&gt;II, a 3D printed stent was programmed into the temporary shape with a smaller diameter for minimally invasive surgery. After heating, the stent was recovered into the original shape with a larger diameter used to expand a narrowed artery. The finite element (FE) simulation shown in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3341&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig4&quot;&gt;&lt;span data-dcnode-id=&quot;3342&quot; instrument_node=&quot;&quot;&gt;Fig. 4e&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3340&quot; instrument_node=&quot;&quot;&gt;II gives an insight into the local large deformation that occurs in the temporary shape and renders existing additive manufacturing systems and materials infeasible. The simulations provide a guide for the material selection based on the understanding of the thermomechanical properties from &lt;/span&gt;&lt;a data-dcnode-id=&quot;3338&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig2&quot;&gt;&lt;span data-dcnode-id=&quot;3339&quot; instrument_node=&quot;&quot;&gt;Fig. 2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3337&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;3334&quot; id=&quot;Sec7&quot;&gt;&lt;span data-dcnode-id=&quot;3335&quot; instrument_node=&quot;&quot;&gt;Three dimensional printed structures with multiple SMPs&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3295&quot;&gt;&lt;a data-dcnode-id=&quot;3332&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig5&quot;&gt;&lt;span data-dcnode-id=&quot;3333&quot; instrument_node=&quot;&quot;&gt;Figure 5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3331&quot; instrument_node=&quot;&quot;&gt; demonstrates the printing of a 3D printed structure with multiple SMPs - multimaterial grippers that have the potential to function as microgrippers&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3328&quot;&gt;&lt;a aria-label=&quot;Reference 13&quot; data-dcnode-id=&quot;3329&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d186849252e1800&quot; title=&quot;Leong, T. G. et al. Tetherless thermobiochemically actuated microgrippers. Proc Natl Acad Sci USA 106, 703–708, doi: 10.1073/pnas.0807698106 (2009).&quot;&gt;&lt;span data-dcnode-id=&quot;3330&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3327&quot; instrument_node=&quot;&quot;&gt; that can grab objects, or drug delivery devices&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3321&quot;&gt;&lt;a aria-label=&quot;Reference 33&quot; data-dcnode-id=&quot;3325&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR33&quot; id=&quot;ref-link-section-d186849252e1804&quot; title=&quot;Yoon, C. et al. Functional stimuli responsive hydrogel devices by self-folding. Smart Materials and Structures 23, doi: 10.1088/0964-1726/23/9/094008 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;3326&quot; instrument_node=&quot;&quot;&gt;33&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3324&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 66&quot; data-dcnode-id=&quot;3322&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR66&quot; id=&quot;ref-link-section-d186849252e1807&quot; title=&quot;Malachowski, K. et al. Stimuli-Responsive Theragrippers for Chemomechanical Controlled Release. Angewandte Chemie-International Edition 53, 8045–8049, doi: 10.1002/anie.201311047 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;3323&quot; instrument_node=&quot;&quot;&gt;66&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3320&quot; instrument_node=&quot;&quot;&gt; that can release objects. &lt;/span&gt;&lt;a data-dcnode-id=&quot;3318&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig5&quot;&gt;&lt;span data-dcnode-id=&quot;3319&quot; instrument_node=&quot;&quot;&gt;Figure 5a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3317&quot; instrument_node=&quot;&quot;&gt;I shows a number of multimaterial grippers with different designs including different sizes and numbers of digits (comparing &lt;/span&gt;&lt;a data-dcnode-id=&quot;3315&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig5&quot;&gt;&lt;span data-dcnode-id=&quot;3316&quot; instrument_node=&quot;&quot;&gt;Fig. 5a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3314&quot; instrument_node=&quot;&quot;&gt;II and III), multiple materials placing at different positions (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3312&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig5&quot;&gt;&lt;span data-dcnode-id=&quot;3313&quot; instrument_node=&quot;&quot;&gt;Fig. 5a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3311&quot; instrument_node=&quot;&quot;&gt;III and IV) and different mechanisms of the grippers to enable different functionalities (the closed grippers in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3309&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig5&quot;& &lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;3235&quot;&gt;&lt;span data-dcnode-id=&quot;3259&quot; instrument_node=&quot;&quot;&gt;Compared to contemporary manufacturing approaches&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3250&quot;&gt;&lt;a aria-label=&quot;Reference 13&quot; data-dcnode-id=&quot;3257&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d186849252e1868&quot; title=&quot;Leong, T. G. et al. Tetherless thermobiochemically actuated microgrippers. Proc Natl Acad Sci USA 106, 703–708, doi: 10.1073/pnas.0807698106 (2009).&quot;&gt;&lt;span data-dcnode-id=&quot;3258&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3256&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 33&quot; data-dcnode-id=&quot;3254&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR33&quot; id=&quot;ref-link-section-d186849252e1871&quot; title=&quot;Yoon, C. et al. Functional stimuli responsive hydrogel devices by self-folding. Smart Materials and Structures 23, doi: 10.1088/0964-1726/23/9/094008 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;3255&quot; instrument_node=&quot;&quot;&gt;33&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3253&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 66&quot; data-dcnode-id=&quot;3251&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR66&quot; id=&quot;ref-link-section-d186849252e1874&quot; title=&quot;Malachowski, K. et al. Stimuli-Responsive Theragrippers for Chemomechanical Controlled Release. Angewandte Chemie-International Edition 53, 8045–8049, doi: 10.1002/anie.201311047 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;3252&quot; instrument_node=&quot;&quot;&gt;66&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3249&quot; instrument_node=&quot;&quot;&gt; that essentially realized the gripper deformation of folding or unfolding by creating strain mismatches between layers of a thin multilayer hinge with thickness from a few microns to a few hundred nanometers which is about 1000 times smaller than the size of the entire structure&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3240&quot;&gt;&lt;a aria-label=&quot;Reference 13&quot; data-dcnode-id=&quot;3247&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d186849252e1878&quot; title=&quot;Leong, T. G. et al. Tetherless thermobiochemically actuated microgrippers. Proc Natl Acad Sci USA 106, 703–708, doi: 10.1073/pnas.0807698106 (2009).&quot;&gt;&lt;span data-dcnode-id=&quot;3248&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3246&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 33&quot; data-dcnode-id=&quot;3244&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR33&quot; id=&quot;ref-link-section-d186849252e1881&quot; title=&quot;Yoon, C. et al. Functional stimuli responsive hydrogel devices by self-folding. Smart Materials and Structures 23, doi: 10.1088/0964-1726/23/9/094008 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;3245&quot; instrument_node=&quot;&quot;&gt;33&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3243&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 66&quot; data-dcnode-id=&quot;3241&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR66&quot; id=&quot;ref-link-section-d186849252e1884&quot; title=&quot;Malachowski, K. et al. Stimuli-Responsive Theragrippers for Chemomechanical Controlled Release. Angewandte Chemie-International Edition 53, 8045–8049, doi: 10.1002/anie.201311047 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;3242&quot; instrument_node=&quot;&quot;&gt;66&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3239&quot; instrument_node=&quot;&quot;&gt;, our approach is simple and straightforward enabling stiffer grippers with thick joints made of SMPs. Additionally, the capability of multimaterial fabrication enables us to print the tips of the grippers with the materials different from the SMPs constructing the joints and to design the stiffness of the tips based on that of the object to realize a safe contact. Details about material selections of the 3D printed grippers are described in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3237&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;3238&quot; instrument_node=&quot;&quot;&gt;Supplementary Material S4.1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3236&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3184&quot;&gt;&lt;span data-dcnode-id=&quot;3234&quot; instrument_node=&quot;&quot;&gt;Finally, by controlling the dynamic properties of the different SMPs as investigated in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3232&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig3&quot;&gt;&lt;span data-dcnode-id=&quot;3233&quot; instrument_node=&quot;&quot;&gt;Fig. 3d&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3231&quot; instrument_node=&quot;&quot;&gt;, we are able to design the time dependent sequential shape recovery&lt;/span&gt;&lt;sup data-dcnode-id=&quot;3225&quot;&gt;&lt;a aria-label=&quot;Reference 4&quot; data-dcnode-id=&quot;3229&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d186849252e1897&quot; title=&quot;Mao, Y. et al. Sequential Self-Folding Structures by 3D Printed Digital Shape Memory Polymers. Scientific Reports 5, 13616, doi: 10.1038/srep13616 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;3230&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3228&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 67&quot; data-dcnode-id=&quot;3226&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR67&quot; id=&quot;ref-link-section-d186849252e1900&quot; title=&quot;Yu, K., Ritchie, A., Mao, Y., Dunn, M. L. &amp;amp; Qi, H. J. Controlled Sequential Shape Changing Components by 3D Printing of Shape Memory Polymer Multimaterials. Procedia IUTAM 12, 193–203, doi: 10.1016/j.piutam.2014.12.021 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;3227&quot; instrument_node=&quot;&quot;&gt;67&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;3224&quot; instrument_node=&quot;&quot;&gt; of a structure fabricated with multiple SMPs. In &lt;/span&gt;&lt;a data-dcnode-id=&quot;3222&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig6&quot;&gt;&lt;span data-dcnode-id=&quot;3223&quot; instrument_node=&quot;&quot;&gt;Fig. 6&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3221&quot; instrument_node=&quot;&quot;&gt;, we demonstrate sequential shape recovery by printing a multimaterial flower whose inner and outer petals have different &lt;/span&gt;&lt;i data-dcnode-id=&quot;3219&quot;&gt;&lt;span data-dcnode-id=&quot;3220&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3216&quot;&gt;&lt;i data-dcnode-id=&quot;3217&quot;&gt;&lt;span data-dcnode-id=&quot;3218&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3215&quot; instrument_node=&quot;&quot;&gt; s (inners petal made of 90% B + 10% BPA with &lt;/span&gt;&lt;i data-dcnode-id=&quot;3213&quot;&gt;&lt;span data-dcnode-id=&quot;3214&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3210&quot;&gt;&lt;i data-dcnode-id=&quot;3211&quot;&gt;&lt;span data-dcnode-id=&quot;3212&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3209&quot; instrument_node=&quot;&quot;&gt; = 56 °C and outer petals made of 80% B + 20% P750 with &lt;/span&gt;&lt;i data-dcnode-id=&quot;3207&quot;&gt;&lt;span data-dcnode-id=&quot;3208&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3204&quot;&gt;&lt;i data-dcnode-id=&quot;3205&quot;&gt;&lt;span data-dcnode-id=&quot;3206&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3203&quot; instrument_node=&quot;&quot;&gt; = 43 °C). We first closed all the petals at 70 °C and then decreased the temperature to 20 °C. After removal of the external constraint, the flower was fixed at the temporary bud state (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3201&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig6&quot;&gt;&lt;span data-dcnode-id=&quot;3202&quot; instrument_node=&quot;&quot;&gt;Fig. 6a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3200&quot; instrument_node=&quot;&quot;&gt;) where both the inner and outer petals stayed closed. The sequential recovery was triggered by raising the temperature first to 50 °C at which only the outer petals opened. The inner petals with &lt;/span&gt;&lt;i data-dcnode-id=&quot;3198&quot;&gt;&lt;span data-dcnode-id=&quot;3199&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;3195&quot;&gt;&lt;i data-dcnode-id=&quot;3196&quot;&gt;&lt;span data-dcnode-id=&quot;3197&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;3194&quot; instrument_node=&quot;&quot;&gt; of 56 °C opened later after temperature was raised to 70 °C, completing the full shape recovery of the flower to its original blooming state (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3192&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig6&quot;&gt;&lt;span data-dcnode-id=&quot;3193&quot; instrument_node=&quot;&quot;&gt;Fig. 6c&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3191&quot; instrument_node=&quot;&quot;&gt;). In &lt;/span&gt;&lt;a data-dcnode-id=&quot;3189&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig6&quot;&gt;&lt;span data-dcnode-id=&quot;3190&quot; instrument_node=&quot;&quot;&gt;Fig. 6d–f&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3188&quot; instrument_node=&quot;&quot;&gt;, a FE simulation (details can be founded in &lt;/span&gt;&lt;a data-dcnode-id=&quot;3186&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;3187&quot; instrument_node=&quot;&quot;&gt;Supplementary Material S4.2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3185&quot; instrument_node=&quot;&quot;&gt;) predicts this flower blooming process indicating that the multi-branch model can be used to design complex 4D printed structures that are made of multiple SMPs and exhibit sequential shape.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;3140&quot; data-test=&quot;figure&quot; data-title=&quot;Figure 6&quot; id=&quot;figure-6&quot;&gt;&lt;figure data-dcnode-id=&quot;3141&quot;&gt;&lt;figcaption data-dcnode-id=&quot;3181&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;3182&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig6&quot;&gt;&lt;span data-dcnode-id=&quot;3183&quot; instrument_node=&quot;&quot;&gt;Figure 6&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;3152&quot;&gt;&lt;div class=&quot;c-article-section__figure-item&quot; data-dcnode-id=&quot;3176&quot;&gt;&lt;a class=&quot;c-article-section__figure-link&quot; data-dcnode-id=&quot;3177&quot; data-test=&quot;img-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-label=&quot;image&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/srep31110/figures/6&quot; rel=&quot;nofollow&quot;&gt;&lt;picture data-dcnode-id=&quot;3178&quot;&gt;&lt;source data-dcnode-id=&quot;3180&quot; srcset=&quot;//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsrep31110/MediaObjects/41598_2016_Article_BFsrep31110_Fig6_HTML.jpg?as=webp&quot; type=&quot;image/webp&quot;&gt;&lt;img alt=&quot;figure 6&quot; aria-describedby=&quot;Fig6&quot; data-dcnode-id=&quot;3179&quot; height=&quot;475&quot; loading=&quot;lazy&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/srep31110/MediaObjects/41598_2016_Article_BFsrep31110_Fig6_HTML.jpg&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;3153&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-6-desc&quot;&gt;&lt;p data-dcnode-id=&quot;3174&quot;&gt;&lt;span data-dcnode-id=&quot;3175&quot; instrument_node=&quot;&quot;&gt;The sequential recovery of a multimaterial flower.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;3154&quot;&gt;&lt;span data-dcnode-id=&quot;3173&quot; instrument_node=&quot;&quot;&gt;The multimaterial flower in the original shape (&lt;/span&gt;&lt;b data-dcnode-id=&quot;3171&quot;&gt;&lt;span data-dcnode-id=&quot;3172&quot; instrument_node=&quot;&quot;&gt;c&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3170&quot; instrument_node=&quot;&quot;&gt;) was first programmed into the temporary bud state at 20 °C (&lt;/span&gt;&lt;b data-dcnode-id=&quot;3168&quot;&gt;&lt;span data-dcnode-id=&quot;3169&quot; instrument_node=&quot;&quot;&gt;a&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3167&quot; instrument_node=&quot;&quot;&gt;). The outer petals opened first after heating to 50 °C (&lt;/span&gt;&lt;b data-dcnode-id=&quot;3165&quot;&gt;&lt;span data-dcnode-id=&quot;3166&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3164&quot; instrument_node=&quot;&quot;&gt;) and then, the flower fully bloomed at 70 °C (&lt;/span&gt;&lt;b data-dcnode-id=&quot;3162&quot;&gt;&lt;span data-dcnode-id=&quot;3163&quot; instrument_node=&quot;&quot;&gt;c&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3161&quot; instrument_node=&quot;&quot;&gt;). (&lt;/span&gt;&lt;b data-dcnode-id=&quot;3159&quot;&gt;&lt;span data-dcnode-id=&quot;3160&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3158&quot; instrument_node=&quot;&quot;&gt;)–(&lt;/span&gt;&lt;b data-dcnode-id=&quot;3156&quot;&gt;&lt;span data-dcnode-id=&quot;3157&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3155&quot; instrument_node=&quot;&quot;&gt;) represent the FE simulations of the corresponding flower blooming process.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;3142&quot;&gt;&lt;a aria-label=&quot;Full size image figure 6&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;3143&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure6 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/srep31110/figures/6&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;3150&quot;&gt;&lt;span data-dcnode-id=&quot;3151&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;3144&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;3145&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;3146&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;3149&quot; instrument_node=&quot;&quot;&gt;
