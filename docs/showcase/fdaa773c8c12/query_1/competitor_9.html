&lt;/span&gt;&lt;meta content=&quot;We present a new 4D printing approach that can create high resolution (up to a few microns), multimaterial shape memory polymer (SMP) architectures. The approach is based on high resolution projection microstereolithography (PμSL) and uses a family of photo-curable methacrylate based copolymer networks. We designed the constituents and compositions to exhibit desired thermomechanical behavior (including rubbery modulus, glass transition temperature and failure strain which is more than 300% and larger than any existing printable materials) to enable controlled shape memory behavior. We used a high resolution, high contrast digital micro display to ensure high resolution of photo-curing methacrylate based SMPs that requires higher exposure energy than more common acrylate based polymers. An automated material exchange process enables the manufacture of 3D composite architectures from multiple photo-curable SMPs. In order to understand the behavior of the 3D composite microarchitectures, we carry out high fidelity computational simulations of their complex nonlinear, time-dependent behavior and study important design considerations including local deformation, shape fixity and free recovery rate. Simulations are in good agreement with experiments for a series of single and multimaterial components and can be used to facilitate the design of SMP 3D structures.&quot; data-dcnode-id=&quot;5677&quot; name=&quot;dc.description&quot;&gt;&lt;span data-dcnode-id=&quot;5676&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;meta content=&quot;We present a new 4D printing approach that can create high resolution (up to a few microns), multimaterial shape memory polymer (SMP) architectures. The approach is based on high resolution projection microstereolithography (PμSL) and uses a family of photo-curable methacrylate based copolymer networks. We designed the constituents and compositions to exhibit desired thermomechanical behavior (including rubbery modulus, glass transition temperature and failure strain which is more than 300% and larger than any existing printable materials) to enable controlled shape memory behavior. We used a high resolution, high contrast digital micro display to ensure high resolution of photo-curing methacrylate based SMPs that requires higher exposure energy than more common acrylate based polymers. An automated material exchange process enables the manufacture of 3D composite architectures from multiple photo-curable SMPs. In order to understand the behavior of the 3D composite microarchitectures, we carry out high fidelity computational simulations of their complex nonlinear, time-dependent behavior and study important design considerations including local deformation, shape fixity and free recovery rate. Simulations are in good agreement with experiments for a series of single and multimaterial components and can be used to facilitate the design of SMP 3D structures.&quot; data-dcnode-id=&quot;5615&quot; name=&quot;description&quot;&gt;&lt;span data-dcnode-id=&quot;5614&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;section aria-labelledby=&quot;Abs1&quot; data-dcnode-id=&quot;4648&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;783&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;783&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;783&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;783&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Abstract&quot; lang=&quot;en&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;4649&quot; id=&quot;Abs1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;4653&quot; id=&quot;Abs1&quot;&gt;&lt;span data-dcnode-id=&quot;4654&quot; instrument_node=&quot;&quot;&gt;Abstract&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;4650&quot; id=&quot;Abs1-content&quot;&gt;&lt;p data-dcnode-id=&quot;4651&quot;&gt;&lt;span data-dcnode-id=&quot;4652&quot; instrument_node=&quot;&quot;&gt;We present a new 4D printing approach that can create high resolution (up to a few microns), multimaterial shape memory polymer (SMP) architectures. The approach is based on high resolution projection microstereolithography (PμSL) and uses a family of photo-curable methacrylate based copolymer networks. We designed the constituents and compositions to exhibit desired thermomechanical behavior (including rubbery modulus, glass transition temperature and failure strain which is more than 300% and larger than any existing printable materials) to enable controlled shape memory behavior. We used a high resolution, high contrast digital micro display to ensure high resolution of photo-curing methacrylate based SMPs that requires higher exposure energy than more common acrylate based polymers. An automated material exchange process enables the manufacture of 3D composite architectures from multiple photo-curable SMPs. In order to understand the behavior of the 3D composite microarchitectures, we carry out high fidelity computational simulations of their complex nonlinear, time-dependent behavior and study important design considerations including local deformation, shape fixity and free recovery rate. Simulations are in good agreement with experiments for a series of single and multimaterial components and can be used to facilitate the design of SMP 3D structures.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;4647&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;section data-dcnode-id=&quot;4399&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;783&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;783&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;783&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;783&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Introduction&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;4400&quot; id=&quot;Sec1-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;4642&quot; id=&quot;Sec1&quot;&gt;&lt;span data-dcnode-id=&quot;4643&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;4401&quot; id=&quot;Sec1-content&quot;&gt;&lt;p data-dcnode-id=&quot;4569&quot;&gt;&lt;span data-dcnode-id=&quot;4641&quot; instrument_node=&quot;&quot;&gt;Three-dimension (3D) printing technology allows the creation of complex geometries with precisely prescribed microarchitectures that enable new functionality or improved and even optimal performance. While 3D printing has largely emphasized manufacturing with a single material, recent advances in multimaterial printing enable the creation of heterogeneous structures or composites that have myriad scientific and technological applications&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4626&quot;&gt;&lt;a aria-label=&quot;Reference 1&quot; data-dcnode-id=&quot;4639&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR1&quot; id=&quot;ref-link-section-d186849252e492&quot; title=&quot;Bartlett, N. W. et al. A 3D-printed, functionally graded soft robot powered by combustion. Science 349, 161–165, 10.1126/science.aab0129 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;4640&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4638&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 2&quot; data-dcnode-id=&quot;4636&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR2&quot; id=&quot;ref-link-section-d186849252e495&quot; title=&quot;Ge, Q., Dunn, C. K., Qi, H. J. &amp;amp; Dunn, M. L. Active origami by 4D printing. Smart Materials and Structures 23, doi: 10.1088/0964-1726/23/9/094007 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4637&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4635&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 3&quot; data-dcnode-id=&quot;4633&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR3&quot; id=&quot;ref-link-section-d186849252e498&quot; title=&quot;Ge, Q., Qi, H. J. &amp;amp; Dunn, M. L. Active materials by four-dimension printing. Applied Physics Letters 103, doi: 10.1063/1.4819837 (2013).&quot;&gt;&lt;span data-dcnode-id=&quot;4634&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4632&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 4&quot; data-dcnode-id=&quot;4630&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d186849252e501&quot; title=&quot;Mao, Y. et al. Sequential Self-Folding Structures by 3D Printed Digital Shape Memory Polymers. Scientific Reports 5, 13616, doi: 10.1038/srep13616 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;4631&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4629&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 5&quot; data-dcnode-id=&quot;4627&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR5&quot; id=&quot;ref-link-section-d186849252e504&quot; title=&quot;Raviv, D. et al. Active printed materials for complex self-evolving deformations. Scientific Reports 4, 7422, doi: 10.1038/srep07422 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4628&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4625&quot; instrument_node=&quot;&quot;&gt;. Commercial printing systems with these capabilities have been used in many innovative applications, but are limited because their development has largely proceeded with objectives of creating printed components with reliable mechanical properties and applications have generally emphasized linear elastic behavior with small deformations where the innovation arises from the sophisticated geometry. Independently, soft active materials (SAMs) as a class of emerging materials with the capability of exhibiting large elastic deformation in response to environmental stimuli such as heat&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4619&quot;&gt;&lt;a aria-label=&quot;Reference 6&quot; data-dcnode-id=&quot;4623&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR6&quot; id=&quot;ref-link-section-d186849252e508&quot; title=&quot;Lendlein, A. &amp;amp; Kelch, S. Shape-memory polymers. Angewandte Chemie International Edition in English 41, 2035–2057 (2002).&quot;&gt;&lt;span data-dcnode-id=&quot;46 a-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR7&quot; id=&quot;ref-link-section-d186849252e529&quot; title=&quot;Lendlein, A. &amp;amp; Kelch, S. Shape-memory polymers as stimuli-sensitive implant materials. Clinical Hemorheology and Microcirculation 32, 105–116 (2005).&quot;&gt;&lt;span data-dcnode-id=&quot;4603&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4601&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 12&quot; data-dcnode-id=&quot;4599&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR12&quot; id=&quot;ref-link-section-d186849252e532&quot; title=&quot;Yakacki, C. M. et al. Unconstrained recovery characterization of shape-memory polymer networks for cardiovascular applications. Biomaterials 28, 2255–2263, doi: 10.1016/j.biomaterials.2007.01.030 (2007).&quot;&gt;&lt;span data-dcnode-id=&quot;4600&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4598&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 13&quot; data-dcnode-id=&quot;4596&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d186849252e535&quot; title=&quot;Leong, T. G. et al. Tetherless thermobiochemically actuated microgrippers. Proc Natl Acad Sci USA 106, 703–708, doi: 10.1073/pnas.0807698106 (2009).&quot;&gt;&lt;span data-dcnode-id=&quot;4597&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4594&quot; instrument_node=&quot;&quot;&gt;, wearable devices&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4588&quot;&gt;&lt;a aria-label=&quot;Reference 1 -dcnode-id=&quot;4582&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR11&quot; id=&quot;ref-link-section-d186849252e550&quot; title=&quot;Wang, Q. M., Gossweiler, G. R., Craig, S. L. &amp;amp; Zhao, X. H. Cephalopod-inspired design of electro-mechano-chemically responsive elastomers for on-demand fluorescent patterning. Nature Communications 5, doi: 10.1038/Ncomms5899 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4583&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4580&quot; instrument_node=&quot;&quot;&gt; and other smart products&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4571&quot;&gt;&lt;a aria-label=&quot;Reference 16&quot; data-dcnode-id=&quot;4578&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR16&quot; id=&quot;ref-link-section-d186849252e554&quot; title=&quot;Song, Y. M. et al. Digital cameras with designs inspired by the arthropod eye. Nature 497, 95–99, doi: 10.1038/Nature12083 (2013).&quot;&gt;&lt;span data-dcnode-id=&quot;4579&quot; instrument_node=&quot;&quot;&gt;16&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4577&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 17&quot; data-dcnode-id=&quot;4575&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR17&quot; id=&quot;ref-link-section-d186849252e557&quot; title=&quot;Westbrook, K. K. et al. Two-way reversible shape memory effects in a free-standing polymer composite. Smart Materials &amp;amp; Structures 20, doi: 10.1088/0964-1726/20/6/065010 (2011).&quot;&gt;&lt;span data-dcnode-id=&quot;4576&quot; instrument_node=&quot;&quot;&gt;17&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4574&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 18&quot; data-dcnode-id=&quot;4572&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR18&quot; id=&quot;ref-link-section-d186849252e560&quot; title=&quot;Yamano, I. &amp;amp; Maeno, T. Five-fingered robot hand using ultrasonic motors and elastic elements. 2005 IEEE International Conference on Robotics and Automation (ICRA), Vols 1–4, 2673–26782005).&quot;&gt;&lt;span data-dcnode-id=&quot;4573&quot; instrument_node=&quot;&quot;&gt;18&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4570&quot; instrument_node=&quot;&quot;&gt;. However, applications of SAMs are limited by the current manufacturing approaches which constrain active structures and devices to simple geometries, often created with a single material and they have yet to broadly exploit the potential of tailored microarchitectures.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4472&quot;&gt;&lt;span data-dcnode-id=&quot;4568&quot; instrument_node=&quot;&quot;&gt;This picture is changing as 3D printing and SAMs are being integrated. The most notable example is the recently developed “4D printing” technology&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4562&quot;&gt;&lt;a aria-label=&quot;Reference 2&quot; data-dcnode-id=&quot;4566&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR2&quot; id=&quot;ref-link-section-d186849252e567&quot; title=&quot;Ge, Q., Dunn, C. K., Qi, H. J. &amp;amp; Dunn, M. L. Active origami by 4D printing. Smart Materials and Structures 23, doi: 10.1088/0964-1726/23/9/094007 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4567&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4565&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 3&quot; data-dcnode-id=&quot;4563&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR3&quot; id=&quot;ref-link-section-d186849252e570&quot; title=&quot;Ge, Q., Qi, H. J. &amp;amp; Dunn, M. L. Active materials by four-dimension printing. Applied Physics Letters 103, doi: 10.1063/1.4819837 (2013).&quot;&gt;&lt;span data-dcnode-id=&quot;4564&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4561&quot; instrument_node=&quot;&quot;&gt; in which the printed 3D structures are able to actively transform configurations over time in response to environmental stimuli. There are two types of SAMs mainly used to realize 4D printing: hydrogels that swell when solvent molecules diffuse into polymer network and shape memory polymers (SMPs) that are capable of fixing temporary shapes and recovering to the permanent shape upon heating. The examples of the hydrogel-based 4D printing include complex self-evolving structures actuated by multilayer joints&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4558&quot;&gt;&lt;a aria-label=&quot;Reference 5&quot; data-dcnode-id=&quot;4559&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR5&quot; id=&quot;ref-link-section-d186849252e574&quot; title=&quot;Raviv, D. et al. Active printed materials for complex self-evolving deformations. Scientific Reports 4, 7422, doi: 10.1038/srep07422 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4560&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4557&quot; instrument_node=&quot;&quot;&gt;, active valves made of thermally sensitive hydrogel&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4554&quot;&gt;&lt;a aria-label=&quot;Reference 19&quot; data-dcnode-id=&quot;4555&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d186849252e578&quot; title=&quot;Bakarich, S. E., Gorkin, R., Panhuis, M. i. h. &amp;amp; Spinks, G. M. 4D Printing with Mechanically Robust, Thermally Actuating Hydrogels. Macromolecular Rapid Communications 36, 1211–1217, doi: 10.1002/marc.201500079 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;4556&quot; instrument_node=&quot;&quot;&gt;19&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4553&quot; instrument_node=&quot;&quot;&gt;, pattern transformation realized by heat-shrinkable polymer&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4550&quot;&gt;&lt;a aria-label=&quot;Reference 20&quot; data-dcnode-id=&quot;4551&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR20&quot; id=&quot;ref-link-section-d186849252e582&quot; title=&quot;Zhang, Q., Yan, D., Zhang, K. &amp;amp; Hu, G. Pattern Transformation of Heat-Shrinkable Polymer by Three-Dimensional (3D) Printing Technique. Scientific Reports 5, 8936, doi: 10.1038/srep08936 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;4552&quot; instrument_node=&quot;&quot;&gt;20&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4549&quot; instrument_node=&quot;&quot;&gt; and biominic 4D printing achieved by anisotropic hydrogel composites with cellulose fibrils&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4546&quot;&gt;&lt;a aria-label=&quot;Reference 21&quot; data-dcnode-id=&quot;4547&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR21&quot; id=&quot;ref-link-section-d186849252e586&quot; title=&quot;Sydney Gladman, A., Matsumoto, E. A., Nuzzo, R. G., Mahadevan, L. &amp;amp; Lewis, J. A. Biomimetic 4D printing. Nature Materials. 15, 413–418, doi: 10.1038/nmat4544 (2016).&quot;&gt;&lt;span data-dcnode-id=&quot;4548&quot; instrument_node=&quot;&quot;&gt;21&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4545&quot; instrument_node=&quot;&quot;&gt;. However, the low modulus of hydrogels ranging from &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4543&quot;&gt;&lt;span data-dcnode-id=&quot;4544&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4542&quot; instrument_node=&quot;&quot;&gt;kPa to &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4540&quot;&gt;&lt;span data-dcnode-id=&quot;4541&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4539&quot; instrument_node=&quot;&quot;&gt;100 kPa&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4533&quot;&gt;&lt;a aria-label=&quot;Reference 19&quot; data-dcnode-id=&quot;4537&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR19&quot; id=&quot;ref-link-section-d186849252e591&quot; title=&quot;Bakarich, S. E., Gorkin, R., Panhuis, M. i. h. &amp;amp; Spinks, G. M. 4D Printing with Mechanically Robust, Thermally Actuating Hydrogels. Macromolecular Rapid Communications 36, 1211–1217, doi: 10.1002/marc.201500079 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;4538&quot; instrument_node=&quot;&quot;&gt;19&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4536&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 21&quot; data-dcnode-id=&quot;4534&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR21&quot; id=&quot;ref-link-section-d186849252e594&quot; title=&quot;Sydney Gladman, A., Matsumoto, E. A., Nuzzo, R. G., Mahadevan, L. &amp;amp; Lewis, J. A. Biomimetic 4D printing. Nature Materials. 15, 413–418, doi: 10.1038/nmat4544 (2016).&quot;&gt;&lt;span data-dcnode-id=&quot;4535&quot; instrument_node=&quot;&quot;&gt;21&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4532&quot; instrument_node=&quot;&quot;&gt; and the solvent diffusion based slow response rates in the time scale of a few ten minutes, hours and even days&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4523&quot;&gt;&lt;a aria-label=&quot;Reference 5&quot; data-dcnode-id=&quot;4530&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR5&quot; id=&quot;ref-link-section-d186849252e598&quot; title=&quot;Raviv, D. et al. Active printed materials for complex self-evolving deformations. Scientific Reports 4, 7422, doi: 10.1038/srep07422 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4531&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4529&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 21&quot; data-dcnode-id=&quot;4527&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR21&quot; id=&quot;ref-link-section-d186849252e601&quot; title=&quot;Sydney Gladman, A., Matsumoto, E. A., Nuzzo, R. G., Mahadevan, L. &amp;amp; Lewis, J. A. Biomimetic 4D printing. Nature Materials. 15, 413–418, doi: 10.1038/nmat4544 (2016).&quot;&gt;&lt;span data-dcnode-id=&quot;4528&quot; instrument_node=&quot;&quot;&gt;21&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4526&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 22&quot; data-dcnode-id=&quot;4524&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR22&quot; id=&quot;ref-link-section-d186849252e604&quot; title=&quot;Mao, Y. et al. 3D Printed Reversible Shape Changing Components with Stimuli Responsive Materials. Scientific Reports 6, 24761, doi: 10.1038/srep24761 (2016).&quot;&gt;&lt;span data-dcnode-id=&quot;4525&quot; instrument_node=&quot;&quot;&gt;22&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4522&quot; instrument_node=&quot;&quot;&gt; make the hydrogel based 4D printing not suitable for structural and actuation applications. Compared to hydrogels, SMPs have higher modulus ranging &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4520&quot;&gt;&lt;span data-dcnode-id=&quot;4521&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4519&quot; instrument_node=&quot;&quot;&gt;MPa to &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4517&quot;&gt;&lt;span data-dcnode-id=&quot;4518&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4516&quot; instrument_node=&quot;&quot;&gt;GPa&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4510&quot;&gt;&lt;a aria-label=&quot;Reference 7&quot; data-dcnode-id=&quot;4514&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR7&quot; id=&quot;ref-link-section-d186849252e608&quot; title=&quot;Lendlein, A. &amp;amp; Kelch, S. Shape-memory polymers as stimuli-sensitive implant materials. Clinical Hemorheology and Microcirculation 32, 105–116 (2005).&quot;&gt;&lt;span data-dcnode-id=&quot;4515&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4513&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 23&quot; data-dcnode-id=&quot;4511&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR23&quot; id=&quot;ref-link-section-d186849252e611&quot; title=&quot;Lendlein, A. &amp;amp; Kelch, S. Shape-memory polymers. Angew Chem Int Ed Engl 41, 2035–2057 (2002).&quot;&gt;&lt;span data-dcnode-id=&quot;4512&quot; instrument_node=&quot;&quot;&gt;23&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4509&quot; instrument_node=&quot;&quot;&gt; and faster response rates (in the scale of seconds to minutes depending on actuation temperature)&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4503&quot;&gt;&lt;a aria-label=&quot;Reference 24&quot; data-dcnode-id=&quot;4507&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR24&quot; id=&quot;ref-link-section-d186849252e615&quot; title=&quot;Yu, K., Ge, Q. &amp;amp; Qi, H. J. Reduced Time as a Unified Parameter Determining Fixity and Free Recovery of Shape Memory Polymers. Nature Communication 5, 3066 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4508&quot; instrument_node=&quot;&quot;&gt;24&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4506&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 25&quot; data-dcnode-id=&quot;4504&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR25&quot; id=&quot;ref-link-section-d186849252e618&quot; title=&quot;Castro, F., Westbrook, K. K., Long, K. N., Shandas, R. &amp;amp; Qi, H. J. Effects of thermal rates on the thermomechanical behaviors of amorphous shape memory polymers. Mechanics of Time-Dependent Materials 14, 219–241, doi: 10.1007/s11043-010-9109-6 (2010).&quot;&gt;&lt;span data-dcnode-id=&quot;4505&quot; instrument_node=&quot;&quot;&gt;25&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4502&quot; instrument_node=&quot;&quot;&gt;. The examples of the SMP based 4D printing include printed active composites where precisely prescribed SMP fibers were used to activate the complex shape change&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4496&quot;&gt;&lt;a aria-label=&quot;Reference 2&quot; data-dcnode-id=&quot;4500&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR2&quot; id=&quot;ref-link-section-d186849252e622&quot; title=&quot;Ge, Q., Dunn, C. K., Qi, H. J. &amp;amp; Dunn, M. L. Active origami by 4D printing. Smart Materials and Structures 23, doi: 10.1088/0964-1726/23/9/094007 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4501&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4499&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 3&quot; data-dcnode-id=&quot;4497&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR3&quot; id=&quot;ref-link-section-d186849252e625&quot; title=&quot;Ge, Q., Qi, H. J. &amp;amp; Dunn, M. L. Active materials by four-dimension printing. Applied Physics Letters 103, doi: 10.1063/1.4819837 (2013).&quot;&gt;&lt;span data-dcnode-id=&quot;4498&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4495&quot; instrument_node=&quot;&quot;&gt;, sequential self-folding structured where SMP hinges with different responding rates were deliberately placed at different positions&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4492&quot;&gt;&lt;a aria-label=&quot;Reference 4&quot; data-dcnode-id=&quot;4493&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR4&quot; id=&quot;ref-link-section-d186849252e629&quot; title=&quot;Mao, Y. et al. Sequential Self-Folding Structures by 3D Printed Digital Shape Memory Polymers. Scientific Reports 5, 13616, doi: 10.1038/srep13616 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;4494&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4491&quot; instrument_node=&quot;&quot;&gt; and multi-shape active composites where two SMP fibers with different glass transition temperatures&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4488&quot;&gt;&lt;a aria-label=&quot;Reference 26&quot; data-dcnode-id=&quot;4489&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR26&quot; id=&quot;ref-link-section-d186849252e634&quot; title=&quot;Wu, J. et al. Multi-shape active composites by 3D printing of digital shape memory polymers. Scientific Reports 6, 24224, doi: 10.1038/srep24224 (2016).&quot;&gt;&lt;span data-dcnode-id=&quot;4490&quot; instrument_node=&quot;&quot;&gt;26&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4487&quot; instrument_node=&quot;&quot;&gt;. To date, the SMP based 4D printing were mainly realized by commercial Polyjet 3D printer (Stratasys, Objet) which create materials with properties ranging between rigid and elastomeric by mixing the two base resins. The fact that users are not allowed to freely tune the thermomechanical properties beyond the realm of available resins impedes this 4D printing technology to advance to a wider range of applications. For example, the capability of 4D printed actuation is limited as the printed digital materials break at 10–25% &lt;/span&gt;&lt;sup data-dcnode-id=&quot;4484&quot;&gt;&lt;a aria-label=&quot;Reference 27&quot; data-dcnode-id=&quot;4485&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR27&quot; id=&quot;ref-link-section-d186849252e638&quot; title=&quot;Stratasys. Digital Materials Data Sheet

                   (2015), Date of access: 5/6/2016.&quot;&gt;&lt;span data-dcnode-id=&quot;4486&quot; instrument_node=&quot;&quot;&gt;27&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4483&quot; instrument_node=&quot;&quot;&gt;; the printed structures could not be used in high temperature applications as the highest glass transition temperature of the available resin is about &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4481&quot;&gt;&lt;span data-dcnode-id=&quot;4482&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4480&quot; instrument_node=&quot;&quot;&gt;70 °C&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4478&quot;&gt;&lt;span data-dcnode-id=&quot;4479&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4477&quot; instrument_node=&quot;&quot;&gt;. In addition, this technology is not suitable for microscale applications as the lateral printing resolution is up to 200 μm inherently limited by the Polyjet printing method&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4474&quot;&gt;&lt;a aria-label=&quot;Reference 28&quot; data-dcnode-id=&quot;4475&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR28&quot; id=&quot;ref-link-section-d186849252e644&quot; title=&quot;Stratasys. Specifications of Stratasys J750, the ultimate full-color, multi-material 3D printer,

                   (2016), Date of access: 5/6/2016.&quot;&gt;&lt;span data-dcnode-id=&quot;4476&quot; instrument_node=&quot;&quot;&gt;28&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4473&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4402&quot;&gt;&lt;span data-dcnode-id=&quot;4471&quot; instrument_node=&quot;&quot;&gt;In this paper we report a new approach that enables high resolution multimaterial 4D printing by printing highly tailorable SMPs on a projection microstereolithography (PμSL) based additive manufacturing system. We synthesize photo-curable methacrylate based copolymer networks using commercially-available materials. By tuning the material constituents and compositions, the flexibility of the methacrylate based copolymer networks enables highly tailorable SMP thermomechanical properties including rubbery modulus (from &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4469&quot;&gt;&lt;span data-dcnode-id=&quot;4470&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4468&quot; instrument_node=&quot;&quot;&gt;MPa to &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4466&quot;&gt;&lt;span data-dcnode-id=&quot;4467&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4465&quot; instrument_node=&quot;&quot;&gt;100 MPa), glass transition temperature (from &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4463&quot;&gt;&lt;span data-dcnode-id=&quot;4464&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4462&quot; instrument_node=&quot;&quot;&gt;−50 °C to &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4460&quot;&gt;&lt;span data-dcnode-id=&quot;4461&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4459&quot; instrument_node=&quot;&quot;&gt;180 °C) and the failure strain (up to &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4457&quot;&gt;&lt;span data-dcnode-id=&quot;4458&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4456&quot; instrument_node=&quot;&quot;&gt;300%). Methacrylate based SMPs with different constituents or compositions form strong interface bonds with each other and enable fabrication of 3D structures made of multiple SMPs that can exhibit new functionality resulting from their dynamic thermomechanical properties. The PμSL based additive manufacturing system with high lateral resolution up to &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4454&quot;&gt;&lt;span data-dcnode-id=&quot;4455&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4453&quot; instrument_node=&quot;&quot;&gt;1 μm exploits a digital micro-display device as a dynamic photo mask to dynamically generate and reconfigure light patterns, which then converts liquid monomer resin into solid &lt;/span&gt;&lt;i data-dcnode-id=&quot;4451&quot;&gt;&lt;span data-dcnode-id=&quot;4452&quot; instrument_node=&quot;&quot;&gt;via&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4450&quot; instrument_node=&quot;&quot;&gt; photo-polymerization in a layer-by-layer fashion&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4441&quot;&gt;&lt;a aria-label=&quot;Reference 29&quot; data-dcnode-id=&quot;4448&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR29&quot; id=&quot;ref-link-section-d186849252e654&quot; title=&quot;Sun, C., Fang, N., Wu, D. M. &amp;amp; Zhang, X. Projection micro-stereolithography using digital micro-mirror dynamic mask. Sensors and Actuators a-Physical 121, 113–120, doi: 10.1016/j.sna.2004.12.011 (2005).&quot;&gt;&lt;span data-dcnode-id=&quot;4449&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4447&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 30&quot; data-dcnode-id=&quot;4445&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR30&quot; id=&quot;ref-link-section-d186849252e657&quot; title=&quot;Zheng, X. et al. Design and optimization of a light-emitting diode projection micro-stereolithography three-dimensional manufacturing system. Review of Scientific Instruments 83, 125001, doi: 10.1063/1.4769050 (2012).&quot;&gt;&lt;span data-dcnode-id=&quot;4446&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4444&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 31&quot; data-dcnode-id=&quot;4442&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR31&quot; id=&quot;ref-link-section-d186849252e660&quot; title=&quot;Zheng, X. Y. et al. Ultralight, Ultrastiff Mechanical Metamaterials. Science 344, 1373–1377, doi: 10.1126/science.1252291 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4443&quot; instrument_node=&quot;&quot;&gt;31&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4440&quot; instrument_node=&quot;&quot;&gt;. A high resolution, high contrast digital micro-display device ensures high resolution structure made of methacrylate based SMPs that require higher exposure energy than acrylate based polymers which have been frequently used for 3D printing but do not have SM effect. Multimaterial manufacturing is achieved &lt;/span&gt;&lt;i data-dcnode-id=&quot;4438&quot;&gt;&lt;span data-dcnode-id=&quot;4439&quot; instrument_node=&quot;&quot;&gt;via&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4437&quot; instrument_node=&quot;&quot;&gt; an automatic material exchanging mechanism integrated into the PμSL additive manufacturing system. In addition, a highly fidelity computational tool based on the understanding of the shape memory behavior is used to facilitate the design of SMP 3D structures by simulating important design considerations including local deformation, shape fixity and free recovery rate. We believe this novel approach will translate the SMP based 4D printing into a wide variety of practical applications, including biomedical devices&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4425&quot;&gt;&lt;a aria-label=&quot;Reference 12&quot; data-dcnode-id=&quot;4435&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR12&quot; id=&quot;ref-link-section-d186849252e667&quot; title=&quot;Yakacki, C. M. et al. Unconstrained recovery characterization of shape-memory polymer networks for cardiovascular applications. Biomaterials 28, 2255–2263, doi: 10.1016/j.biomaterials.2007.01.030 (2007).&quot;&gt;&lt;span data-dcnode-id=&quot;4436&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4434&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 13&quot; data-dcnode-id=&quot;4432&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR13&quot; id=&quot;ref-link-section-d186849252e670&quot; title=&quot;Leong, T. G. et al. Tetherless thermobiochemically actuated microgrippers. Proc Natl Acad Sci USA 106, 703–708, doi: 10.1073/pnas.0807698106 (2009).&quot;&gt;&lt;span data-dcnode-id=&quot;4433&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4431&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 32&quot; data-dcnode-id=&quot;4429&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR32&quot; id=&quot;ref-link-section-d186849252e673&quot; title=&quot;Srivastava, V., Chester, S. A. &amp;amp; Anand, L. Thermally actuated shape-memory polymers: Experiments, theory and numerical simulations. Journal of the Mechanics and Physics of Solids 58, 1100–1124, doi: 10.1016/j.jmps.2010.04.004 (2010).&quot;&gt;&lt;span data-dcnode-id=&quot;4430&quot; instrument_node=&quot;&quot;&gt;32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4428&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 33&quot; data-dcnode-id=&quot;4426&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR33&quot; id=&quot;ref-link-section-d186849252e676&quot; title=&quot;Yoon, C. et al. Functional stimuli responsive hydrogel devices by self-folding. Smart Materials and Structures 23, doi: 10.1088/0964-1726/23/9/094008 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4427&quot; instrument_node=&quot;&quot;&gt;33&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4424&quot; instrument_node=&quot;&quot;&gt;, deployable aerospace structures&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4418&quot;&gt;&lt;a aria-label=&quot;Reference 34&quot; data-dcnode-id=&quot;4422&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR34&quot; id=&quot;ref-link-section-d186849252e680&quot; title=&quot;Gall, K., Mikulas, M., Munshi, N. A., Beavers, F. &amp;amp; Tupper, M. Carbon Fiber Reinforced Shape Memory Polymer Composites. Journal of Intelligent Material Systems and Structures 11, 877–886, 10.1106/ejgr-ewnm-6clx-3x2m (2000).&quot;&gt;&lt;span data-dcnode-id=&quot;4423&quot; instrument_node=&quot;&quo quot;&gt;37&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4410&quot; instrument_node=&quot;&quot;&gt; and shape changing photovoltaic solar cells&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4404&quot;&gt;&lt;a aria-label=&quot;Reference 38&quot; data-dcnode-id=&quot;4408&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR38&quot; id=&quot;ref-link-section-d186849252e695&quot; title=&quot;Guo, X. Y. et al. Two- and three-dimensional folding of thin film single-crystalline silicon for photovoltaic power applications. P Natl Acad Sci USA 106, 20149–20154, doi: 10.1073/pnas.0907390106 (2009).&quot;&gt;&lt;span data-dcnode-id=&quot;4409&quot; instrument_node=&quot;&quot;&gt;38&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4407&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 39&quot; data-dcnode-id=&quot;4405&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR39&quot; id=&quot;ref-link-section-d186849252e698&quot; title=&quot;Myers, B., Bernardi, M. &amp;amp; Grossman, J. C. Three-dimensional photovoltaics. Applied Physics Letters 96, 071902, doi: 10.1063/1.3308490 (2010).&quot;&gt;&lt;span data-dcnode-id=&quot;4406&quot; instrument_node=&quot;&quot;&gt;39&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4403&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;3137&quot; data-gtm-vis-first-on-screen-50443292_562=&quot;783&quot; data-gtm-vis-first-on-screen-50443292_563=&quot;783&quot; data-gtm-vis-has-fired-50443292_562=&quot;1&quot; data-gtm-vis-has-fired-50443292_563=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_562=&quot;783&quot; data-gtm-vis-recent-on-screen-50443292_563=&quot;783&quot; data-gtm-vis-total-visible-time-50443292_562=&quot;10000&quot; data-gtm-vis-total-visible-time-50443292_563=&quot;10000&quot; data-title=&quot;Results&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;3138&quot; id=&quot;Sec2-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;4397&quot; id=&quot;Sec2&quot;&gt;&lt;span data-dcnode-id=&quot;4398&quot; instrument_node=&quot;&quot;&gt;Results&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;3139&quot; id=&quot;Sec2-content&quot;&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;4395&quot; id=&quot;Sec3&quot;&gt;&lt;span data-dcnode-id=&quot;4396&quot; instrument_node=&quot;&quot;&gt;Multimaterial additive manufacturing system&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;4338&quot;&gt;&lt;span data-dcnode-id=&quot;4394&quot; instrument_node=&quot;&quot;&gt;We fabricate high resolution multimaterial shape memory structures on an additive manufacturing apparatus based on projection microstereolithography (PμSL)&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4385&quot;&gt;&lt;a aria-label=&quot;Reference 29&quot; data-dcnode-id=&quot;4392&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR29&quot; id=&quot;ref-link-section-d186849252e714&quot; title=&quot;Sun, C., Fang, N., Wu, D. M. &amp;amp; Zhang, X. Projection micro-stereolithography using digital micro-mirror dynamic mask. Sensors and Actuators a-Physical 121, 113–120, doi: 10.1016/j.sna.2004.12.011 (2005).&quot;&gt;&lt;span data-dcnode-id=&quot;4393&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4391&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 30&quot; data-dcnode-id=&quot;4389&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR30&quot; id=&quot;ref-link-section-d186849252e717&quot; title=&quot;Zheng, X. et al. Design and optimization of a light-emitting diode projection micro-stereolithography three-dimensional manufacturing system. Review of Scientific Instruments 83, 125001, doi: 10.1063/1.4769050 (2012).&quot;&gt;&lt;span data-dcnode-id=&quot;4390&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4388&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 31&quot; data-dcnode-id=&quot;4386&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR31&quot; id=&quot;ref-link-section-d186849252e720&quot; title=&quot;Zheng, X. Y. et al. Ultralight, Ultrastiff Mechanical Metamaterials. Science 344, 1373–1377, doi: 10.1126/science.1252291 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4387&quot; instrument_node=&quot;&quot;&gt;31&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4384&quot; instrument_node=&quot;&quot;&gt;. As shown schematically in &lt;/span&gt;&lt;a data-dcnode-id=&quot;4382&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;4383&quot; instrument_node=&quot;&quot;&gt;Fig. 1a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4381&quot; instrument_node=&quot;&quot;&gt;, a computer aid design (CAD) model is first sliced into a series of closely spaced horizontal two-dimension (2D) digital images. Then, these 2D images are transmitted to a digital micro display which works as a dynamic photo-mask&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4378&quot;&gt;&lt;a aria-label=&quot;Reference 30&quot; data-dcnode-id=&quot;4379&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR30&quot; id=&quot;ref-link-section-d186849252e727&quot; title=&quot;Zheng, X. et al. Design and optimization of a light-emitting diode projection micro-stereolithography three-dimensional manufacturing system. Review of Scientific Instruments 83, 125001, doi: 10.1063/1.4769050 (2012).&quot;&gt;&lt;span data-dcnode-id=&quot;4380&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4377&quot; instrument_node=&quot;&quot;&gt;. Ultraviolet (UV) light produced from a light emitting diode (LED) array is spatially modulated with the patterns of the corresponding 2D images and illuminated onto the surface of photo-curable polymer solution. Once the material in the exposed area is solidified to form a layer, the substrate on which the fabricated structure rests is lowered by a translational stage, followed by projection of the next image to polymerize a new layer on top of the preceding one. This process proceeds iteratively until the entire structure is fabricated. In the current setup, the projection area is about 3.2 cm × 2.4 cm resulting in a pixel size of &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4375&quot;&gt;&lt;span data-dcnode-id=&quot;4376&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4374&quot; instrument_node=&quot;&quot;&gt;30 μm × 30 μm. The lateral resolution can be further improved up to as high as &lt;/span&gt;&lt;span class=&quot;stix&quot; data-dcnode-id=&quot;4372&quot;&gt;&lt;span data-dcnode-id=&quot;4373&quot; instrument_node=&quot;&quot;&gt;∼&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4371&quot; instrument_node=&quot;&quot;&gt;1 μm if a projection lens with high optical magnification is used&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4368&quot;&gt;&lt;a aria-label=&quot;Reference 29&quot; data-dcnode-id=&quot;4369&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR29&quot; id=&quot;ref-link-section-d186849252e731&quot; title=&quot;Sun, C., Fang, N., Wu, D. M. &amp;amp; Zhang, X. Projection micro-stereolithography using digital micro-mirror dynamic mask. Sensors and Actuators a-Physical 121, 113–120, doi: 10.1016/j.sna.2004.12.011 (2005).&quot;&gt;&lt;span data-dcnode-id=&quot;4370&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4367&quot; instrument_node=&quot;&quot;&gt;. The step-and-repeat method can be employed to extend printing area without compromising lateral resolution&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4364&quot;&gt;&lt;a aria-label=&quot;Reference 30&quot; data-dcnode-id=&quot;4365&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR30&quot; id=&quot;ref-link-section-d186849252e735&quot; title=&quot;Zheng, X. et al. Design and optimization of a light-emitting diode projection micro-stereolithography three-dimensional manufacturing system. Review of Scientific Instruments 83, 125001, doi: 10.1063/1.4769050 (2012).&quot;&gt;&lt;span data-dcnode-id=&quot;4366&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4363&quot; instrument_node=&quot;&quot;&gt;. Multimaterial fabrication is enabled by automating polymer solution exchange during the printing process. Although many efforts&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4354&quot;&gt;&lt;a aria-label=&quot;Reference 40&quot; data-dcnode-id=&quot;4361&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR40&quot; id=&quot;ref-link-section-d186849252e740&quot; title=&quot;Chan, V. et al. Multi-material bio-fabrication of hydrogel cantilevers and actuators with stereolithography. Lab on a Chip 12, 88–98, doi: 10.1039/c1lc20688e (2012).&quot;&gt;&lt;span data-dcnode-id=&quot;4362&quot; instrument_node=&quot;&quot;&gt;40&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4360&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 41&quot; data-dcnode-id=&quot;4358&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR41&quot; id=&quot;ref-link-section-d186849252e743&quot; title=&quot;Choi, J.-W., Kim, H.-C. &amp;amp; Wicker, R. Multi-material stereolithography. Journal of Materials Processing Technology 211, 318–328, doi: 10.1016/j.jmatprotec.2010.10.003 (2011).&quot;&gt;&lt;span data-dcnode-id=&quot;4359&quot; instrument_node=&quot;&quot;&gt;41&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4357&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 42&quot; data-dcnode-id=&quot;4355&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR42&quot; id=&quot;ref-link-section-d186849252e746&quot; title=&quot;Wicker, R. B. &amp;amp; MacDonald, E. W. Multi-material, multi-technology stereolithography. Virtual and Physical Prototyping 7, 181–194, doi: 10.1080/17452759.2012.721119 (2012).&quot;&gt;&lt;span data-dcnode-id=&quot;4356&quot; instrument_node=&quot;&quot;&gt;42&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4353&quot; instrument_node=&quot;&quot;&gt; have been made to develop multimaterial fabrication systems by adding the automated polymer solution exchanging mechanisms into the “top-down” fabrication system (as shown schematically in &lt;/span&gt;&lt;a data-dcnode-id=&quot;4351&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;4352&quot; instrument_node=&quot;&quot;&gt;Fig. 1a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4350&quot; instrument_node=&quot;&quot;&gt;) where the modulated UV light projected downwards to the polymer resin, the multimaterial fabrication system developed based on the “bottom-up” approach making the depth of transparent polymer solution containers independent of the part height helps to significantly reduce material contamination and improve efficiency of material use&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4347&quot;&gt;&lt;a aria-label=&quot;Reference 43&quot; data-dcnode-id=&quot;4348&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR43&quot; id=&quot;ref-link-section-d186849252e753&quot; title=&quot;Zhou, C., Chen, Y., Yang, Z. G. &amp;amp; Khoshnevis, B. Digital material fabrication using mask-image-projection-based stereolithography. Rapid Prototyping Journal 19, 153–165, doi: 10.1108/13552541311312148 (2013).&quot;&gt;&lt;span data-dcnode-id=&quot;4349&quot; instrument_node=&quot;&quot;&gt;43&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4346&quot; instrument_node=&quot;&quot;&gt;, but requires precise control of the oxygen concentration to separate the printed parts from the transparent polymer solution containers without damaging them&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4340&quot;&gt;&lt;a aria-label=&quot;Reference 43&quot; data-dcnode-id=&quot;4344&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR43&quot; id=&quot;ref-link-section-d186849252e757&quot; title=&quot;Zhou, C., Chen, Y., Yang, Z. G. &amp;amp; Khoshnevis, B. Digital material fabrication using mask-image-projection-based stereolithography. Rapid Prototyping Journal 19, 153–165, doi: 10.1108/13552541311312148 (2013).&quot;&gt;&lt;span data-dcnode-id=&quot;4345&quot; instrument_node=&quot;&quot;&gt;43&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4343&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 44&quot; data-dcnode-id=&quot;4341&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR44&quot; id=&quot;ref-link-section-d186849252e760&quot; title=&quot;Tumbleston, J. R. et al. Continuous liquid interface production of 3D objects. Science 347, 1349–1352, doi: 10.1126/science.aaa2397 (2015).&quot;&gt;&lt;span data-dcnode-id=&quot;4342&quot; instrument_node=&quot;&quot;&gt;44&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4339&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;c-article-section__figure js-c-reading-companion-figures-item&quot; data-container-section=&quot;figure&quot; data-dcnode-id=&quot;4306&quot; data-gtm-vis-first-on-screen-50443292_561=&quot;783&quot; data-gtm-vis-has-fired-50443292_561=&quot;1&quot; data-gtm-vis-recent-on-screen-50443292_561=&quot;782&quot; data-gtm-vis-total-visible-time-50443292_561=&quot;10000&quot; data-test=&quot;figure&quot; data-title=&quot;Figure 1&quot; id=&quot;figure-1&quot;&gt;&lt;figure data-dcnode-id=&quot;4307&quot;&gt;&lt;figcaption data-dcnode-id=&quot;4335&quot;&gt;&lt;b class=&quot;c-article-section__figure-caption&quot; data-dcnode-id=&quot;4336&quot; data-test=&quot;figure-caption-text&quot; id=&quot;Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;4337&quot; instrument_node=&quot;&quot;&gt;Figure 1&lt;/span&gt;&lt;/b&gt;&lt;/figcaption&gt;&lt;div class=&quot;c-article-section__figure-content&quot; data-dcnode-id=&quot;4318& ased on PμSL (&lt;/span&gt;&lt;b data-dcnode-id=&quot;4322&quot;&gt;&lt;span data-dcnode-id=&quot;4323&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4321&quot; instrument_node=&quot;&quot;&gt;) Photo-curable shape memory polymer network is constructed by mono-functional monomer, Benzyl methacrylate (BMA) as linear chain builder (LCB) and multi-functional oligomers, Poly (ethylene glycol) dimethacrylate (PEGDMA), Bisphenol A ethoxylate dimethacrylate (BPA) and Di(ethylene glycol) dimethacrylate (DEGDMA) as crosslinkers.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;4308&quot;&gt;&lt;a aria-label=&quot;Full size image figure 1&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;4309&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure1 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/srep31110/figures/1&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;4316&quot;&gt;&lt;span data-dcnode-id=&quot;4317&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;4310&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;4311&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;4312&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;4315&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;path d=&quot;M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z&quot; data-dcnode-id=&quot;4314&quot; fill-rule=&quot;evenodd&quot;&gt;&lt;/path&gt;&lt;span data-dcnode-id=&quot;4313&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;4284&quot;&gt;&lt;span data-dcnode-id=&quot;4305&quot; instrument_node=&quot;&quot;&gt;We fabricate shape memory structures using photo-curable methacrylate copolymers that form polymer networks &lt;/span&gt;&lt;i data-dcnode-id=&quot;4303&quot;&gt;&lt;span data-dcnode-id=&quot;4304&quot; instrument_node=&quot;&quot;&gt;via&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4302&quot; instrument_node=&quot;&quot;&gt; free radical photo-polymerization&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4293&quot;&gt;&lt;a aria-label=&quot;Reference 45&quot; data-dcnode-id=&quot;4300&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR45&quot; id=&quot;ref-link-section-d186849252e796&quot; title=&quot;Anseth, K. S., Wang, C. M. &amp;amp; Bowman, C. N. Reaction behaviour and kinetic constants for photopolymerizations of multi(meth)acrylate monomers. Polymer 35, 3243–3250, doi: 10.1016/0032-3861(94)90129-5 (1994).&quot;&gt;&lt;span data-dcnode-id=&quot;4301&quot; instrument_node=&quot;&quot;&gt;45&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4299&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 46&quot; data-dcnode-id=&quot;4297&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR46&quot; id=&quot;ref-link-section-d186849252e799&quot; title=&quot;Bowman, C. N., Carver, A. L., Kennett, S. N., Williams, M. M. &amp;amp; Peppas, N. A. Polymers for information storage systems III. Crosslinked structure of polydimethacrylates. Polymer 31, 135–139, doi: 10.1016/0032-3861(90)90364-5 (1990).&quot;&gt;&lt;span data-dcnode-id=&quot;4298&quot; instrument_node=&quot;&quot;&gt;46&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4296&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 47&quot; data-dcnode-id=&quot;4294&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR47&quot; id=&quot;ref-link-section-d186849252e802&quot; title=&quot;Kannurpatti, A. R. &amp;amp; Bowman, C. N. Structural evolution of dimethacrylate networks studied by dielectric spectroscopy. Macromolecules 31, 3311–3316, doi: 10.1021/Ma970721r (1998).&quot;&gt;&lt;span data-dcnode-id=&quot;4295&quot; instrument_node=&quot;&quot;&gt;47&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4292&quot; instrument_node=&quot;&quot;&gt;. To understand the thermomechanical properties and shape memory (SM) effects of the materials and structures, we prepared polymer resins by using a mono-functional monomer, Benzyl methacrylate (BMA) as linear chain builder (LCB) and difunctional oligomers, Poly (ethylene glycol) dimethacrylate (PEGDMA), Bisphenol A ethoxylate dimethacrylate (BPA) and Di(ethylene glycol) dimethacrylate (DEGDMA) as crosslinkers that connect the linear chains to form a cross-linked network (shown in &lt;/span&gt;&lt;a data-dcnode-id=&quot;4290&quot; data-track=&quot;click&quot; data-track-action=&quot;figure anchor&quot; data-track-label=&quot;link&quot; href=&quot;#Fig1&quot;&gt;&lt;span data-dcnode-id=&quot;4291&quot; instrument_node=&quot;&quot;&gt;Fig. 1b&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4289&quot; instrument_node=&quot;&quot;&gt;). Details about polymer resin preparations can be founded in Methods. More selections of LCBs and crosslinkers are suggested by Safranski and Gall&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4286&quot;&gt;&lt;a aria-label=&quot;Reference 48&quot; data-dcnode-id=&quot;4287&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR48&quot; id=&quot;ref-link-section-d186849252e809&quot; title=&quot;Safranski, D. L. &amp;amp; Gall, K. Effect of chemical structure and crosslinking density on the thermo-mechanical properties and toughness of (meth)acrylate shape memory polymer networks. Polymer 49, 4446–4455, doi: 10.1016/j.polymer.2008.07.060 (2008).&quot;&gt;&lt;span data-dcnode-id=&quot;4288&quot; instrument_node=&quot;&quot;&gt;48&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4285&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;4282&quot; id=&quot;Sec4&quot;&gt;&lt;span data-dcnode-id=&quot;4283&quot; instrument_node=&quot;&quot;&gt;Experimental Characterization&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;4169&quot;&gt;&lt;span data-dcnode-id=&quot;4281&quot; instrument_node=&quot;&quot;&gt;The photo-curable methacrylate networks provide high tailorability of thermomechanical properties of printed SMPs. Among them, the glass transition temperature (&lt;/span&gt;&lt;i data-dcnode-id=&quot;4279&quot;&gt;&lt;span data-dcnode-id=&quot;4280&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4276&quot;&gt;&lt;i data-dcnode-id=&quot;4277&quot;&gt;&lt;span data-dcnode-id=&quot;4278&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4275&quot; instrument_node=&quot;&quot;&gt;), the rubbery modulus (&lt;/span&gt;&lt;i data-dcnode-id=&quot;4273&quot;&gt;&lt;span data-dcnode-id=&quot;4274&quot; instrument_node=&quot;&quot;&gt;E&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4270&quot;&gt;&lt;i data-dcnode-id=&quot;4271&quot;&gt;&lt;span data-dcnode-id=&quot;4272&quot; instrument_node=&quot;&quot;&gt;r&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4269&quot; instrument_node=&quot;&quot;&gt;) and the failure strain (ε&lt;/span&gt;&lt;sub data-dcnode-id=&quot;4266&quot;&gt;&lt;i data-dcnode-id=&quot;4267&quot;&gt;&lt;span data-dcnode-id=&quot;4268&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4265&quot; instrument_node=&quot;&quot;&gt;) are the most critical properties for the design of active components as they dictate the shape recovery temperature and rate, constrained recovery stress and capability of shape change and/or actuation, respectively&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4250&quot;&gt;&lt;a aria-label=&quot;Reference 24&quot; data-dcnode-id=&quot;4263&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR24&quot; id=&quot;ref-link-section-d186849252e837&quot; title=&quot;Yu, K., Ge, Q. &amp;amp; Qi, H. J. Reduced Time as a Unified Parameter Determining Fixity and Free Recovery of Shape Memory Polymers. Nature Communication 5, 3066 (2014).&quot;&gt;&lt;span data-dcnode-id=&quot;4264&quot; instrument_node=&quot;&quot;&gt;24&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4262&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 48&quot; data-dcnode-id=&quot;4260&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor&quot; data-track-label=&quot;link&quot; href=&quot;#ref-CR48&quot; id=&quot;ref-link-section-d186849252e840&quot; title=&quot;Safranski, D. L. &amp;amp; Gall, K. Effect of chemical structure and crosslinking density on the thermo-mechanical properties and toughness of (meth)acrylate shape memory polymer networks. Polymer 49, 4446–4455, doi: 10.1016/j.polymer.2008.07.060 (2008).&quot;&gt;&lt;span data-dcnode-id=&quot;4261&quot; instrument_node=&quot;&quot;&gt;48&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4259&quot; instrument_node=&quot;&quot;&gt;,&lt;/span&gt;&lt;a aria-label=&quot;Reference 49&quot; data-dcnode-id=&quot;4257&quo reases with increase in the crosslinker concentration (See &lt;/span&gt;&lt;a data-dcnode-id=&quot;4232&quot; data-track=&quot;click&quot; data-track-action=&quot;supplementary material anchor&quot; data-track-label=&quot;link&quot; href=&quot;#MOESM1&quot;&gt;&lt;span data-dcnode-id=&quot;4233&quot; instrument_node=&quot;&quot;&gt;Supplementary Materials S1.1 I and Fig. S1a&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4231&quot; instrument_node=&quot;&quot;&gt;). The &lt;/span&gt;&lt;i data-dcnode-id=&quot;4229&quot;&gt;&lt;span data-dcnode-id=&quot;4230&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4226&quot;&gt;&lt;i data-dcnode-id=&quot;4227&quot;&gt;&lt;span data-dcnode-id=&quot;4228&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4225&quot; instrument_node=&quot;&quot;&gt; of the copolymer networks consisting of the crosslinker PEGDMA with molecular weight of 750 g/mole (denoted as B + P750) and the crosslinker BPA with molecular weight of 1700 g/mole (denoted as B + BPA) follows the same trend of the B + P550 copolymer networks (Fig. S1b,c), while the &lt;/span&gt;&lt;i data-dcnode-id=&quot;4223&quot;&gt;&lt;span data-dcnode-id=&quot;4224&quot; instrument_node=&quot;&quot;&gt;T&lt;/span&gt;&lt;/i&gt;&lt;sub data-dcnode-id=&quot;4220&quot;&gt;&lt;i data-dcnode-id=&quot;4221&quot;&gt;&lt;span data-dcnode-id=&quot;4222&quot; instrument_node=&quot;&quot;&gt;g&lt;/span&gt;&lt;/i&gt;&lt;/sub&gt;&lt;span data-dcnode-id=&quot;4219&quot; instrument_node=&quot;&quot;&gt; increases with increase in the crosslinker concentration of the copolymer network consisting of BMA and DEGDMA (denoted as B + DEG, Fig. S1d). The Couchman equation&lt;/span&gt;&lt;sup data-dcnode-id=&quot;4216&quot;&gt;&lt;a aria-label=&quot;Reference 52&quot; data-dcnode-id=&quot;4217&quot; data-test=&quot;citation-ref&quot; data-track=&quot;click&quot; data-track-action=&quot;reference anchor& .eu/?index=cw22&amp;amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/srep31110/MediaObjects/41598_2016_Article_BFsrep31110_Fig2_HTML.jpg&amp;amp;raw&quot; width=&quot;685&quot;&gt;&lt;/picture&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;c-article-section__figure-description&quot; data-dcnode-id=&quot;4138&quot; data-test=&quot;bottom-caption&quot; id=&quot;figure-2-desc&quot;&gt;&lt;p data-dcnode-id=&quot;4159&quot;&gt;&lt;span data-dcnode-id=&quot;4160&quot; instrument_node=&quot;&quot;&gt;Experimental characterization of methacrylate SMP networks.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4139&quot;&gt;&lt;span data-dcnode-id=&quot;4158&quot; instrument_node=&quot;&quot;&gt;Highly tailorable glass transition temperature (&lt;/span&gt;&lt;b data-dcnode-id=&quot;4156&quot;&gt;&lt;span data-dcnode-id=&quot;4157&quot; instrument_node=&quot;&quot;&gt;a&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4155&quot; instrument_node=&quot;&quot;&gt;), rubbery modulus (&lt;/span&gt;&lt;b data-dcnode-id=&quot;4153&quot;&gt;&lt;span data-dcnode-id=&quot;4154&quot; instrument_node=&quot;&quot;&gt;b&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4152&quot; instrument_node=&quot;&quot;&gt;) and failure strain (&lt;/span&gt;&lt;b data-dcnode-id=&quot;4150&quot;&gt;&lt;span data-dcnode-id=&quot;4151&quot; instrument_node=&quot;&quot;&gt;c&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4149&quot; instrument_node=&quot;&quot;&gt;) are controlled by either changing the mixing LCB/crosslinker ratio or using different crosslinkers. (&lt;/span&gt;&lt;b data-dcnode-id=&quot;4147&quot;&gt;&lt;span data-dcnode-id=&quot;4148&quot; instrument_node=&quot;&quot;&gt;d&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4146&quot; instrument_node=&quot;&quot;&gt;) The temperature effect on the failure strain of the SMP consisting of 90% BMA and 10% BPA. (&lt;/span&gt;&lt;b data-dcnode-id=&quot;4144&quot;&gt;&lt;span data-dcnode-id=&quot;4145&quot; instrument_node=&quot;&quot;&gt;e&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4143&quot; instrument_node=&quot;&quot;&gt;) The normalized exposure energy to cure a thin layer varies with the crosslinker concentration as well as the molecular weight of crosslinker. (&lt;/span&gt;&lt;b data-dcnode-id=&quot;4141&quot;&gt;&lt;span data-dcnode-id=&quot;4142&quot; instrument_node=&quot;&quot;&gt;f&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;4140&quot; instrument_node=&quot;&quot;&gt;) The investigation on the interface bonding of a printed composite with two components arranged in series (inset).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;u-text-right u-hide-print&quot; data-dcnode-id=&quot;4127&quot;&gt;&lt;a aria-label=&quot;Full size image figure 2&quot; class=&quot;c-article__pill-button&quot; data-dcnode-id=&quot;4128&quot; data-test=&quot;article-link&quot; data-track=&quot;click&quot; data-track-action=&quot;view figure&quot; data-track-dest=&quot;link:Figure2 Full size image&quot; data-track-label=&quot;button&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nature.com/articles/srep31110/figures/2&quot; rel=&quot;nofollow&quot;&gt;&lt;span data-dcnode-id=&quot;4135&quot;&gt;&lt;span data-dcnode-id=&quot;4136&quot; instrument_node=&quot;&quot;&gt;Full size image&lt;/span&gt;&lt;/span&gt;&lt;svg aria-hidden=&quot;true&quot; class=&quot;u-icon&quot; data-dcnode-id=&quot;4129&quot; focusable=&quot;false&quot; height=&quot;16&quot; role=&quot;img&quot; width=&quot;16&quot;&gt;&lt;use data-dcnode-id=&quot;4130&quot; xlink:href=&quot;#global-icon-chevron-right&quot; xmlns:xlink=&quot;http://www.w3.org/1999/xlink&quot;&gt;&lt;svg data-dcnode-id=&quot;4131&quot; id=&quot;global-icon-chevron-right&quot; viewBox=&quot;0 0 16 16&quot;&gt;&lt;/svg&gt;&lt;/use&gt;&lt;/svg&gt;&lt;span data-dcnode-id=&quot;4134&quot; instrument_node=&quot;&quot;&gt;
