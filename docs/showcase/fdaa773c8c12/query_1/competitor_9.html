&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/figure&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;3120&quot; data-title=&quot;Methods&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;3121&quot; id=&quot;Sec8-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;3135&quot; id=&quot;Sec8&quot;&gt;&lt;span data-dcnode-id=&quot;3136&quot; instrument_node=&quot;&quot;&gt;Methods&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;3122&quot; id=&quot;Sec8-content&quot;&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;3133&quot; id=&quot;Sec9&quot;&gt;&lt;span data-dcnode-id=&quot;3134&quot; instrument_node=&quot;&quot;&gt;Development of multimaterial fabrication system&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3131&quot;&gt;&lt;span data-dcnode-id=&quot;3132&quot; instrument_node=&quot;&quot;&gt;To develop a high resolution multimaterial system based on PμSL, a CEL5500 LED light engine purchased from Digital Light Innovation (Austin, Taxes, USA) was used to work as the digital micro-display, a translation stage (LTS300) with 0.1 μm minimum achievable incremental movement and 2 μm backlash purchased from Thorlabs (Newton, New Jersey, USA) was used to work as the elevator, a stepper motor purchased from SparkFun Electornics (Niwot, Colorado, USA) controlled by Arduino UNO board works as a shaft to build the automated material exchange system. A custom LabView code was developed to control all the electronic components and automate the printing process.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;3129&quot; id=&quot;Sec10&quot;&gt;&lt;span data-dcnode-id=&quot;3130&quot; instrument_node=&quot;&quot;&gt;Material synthesis&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3127&quot;&gt;&lt;span data-dcnode-id=&quot;3128&quot; instrument_node=&quot;&quot;&gt;All the chemicals including the methacrylate based monomers and crosslinkers, photo initiator and photo absorbers were purchased from Sigma Aldrich (St. Louis, MO, USA) and used as received. Phenylbis (2, 4, 6-trimethylbenzoyl) phosphine oxide works as photo initiator mixed into the methacrylate based polymer resolution at the concentration of 5% by weight. Sudan I and Rhodamine B works as photo absorber fixed at concentration of 0.05% and 1% by weight, respectively.&lt;/span&gt;&lt;/p&gt;&lt;h3 class=&quot;c-article__sub-heading&quot; data-dcnode-id=&quot;3125&quot; id=&quot;Sec11&quot;&gt;&lt;span data-dcnode-id=&quot;3126&quot; instrument_node=&quot;&quot;&gt;Printing and post-processing&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;3123&quot;&gt;&lt;span data-dcnode-id=&quot;3124&quot; instrument_node=&quot;&quot;&gt;The designed 3D structures were first sliced into layers with a prescribed layer thickness (most structures here were sliced with 50 μm per layer). The custom LabVIEW with printing parameters which specify layer thickness, light intensity, exposure time, sends the sliced 2D images in order to digital micro display and controls the light irradiation of the digital micro displace and translational stage motion. Once the 3D structures were printed, they were rinsed by the ethanol solution to remove the extra unreacted polymer solution. After that, the 3D structures were placed into a UV oven (UVP, Ultraviolet Crosslinkers, Upland, CA, USA) for 10 min post-curing.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;3102&quot; data-title=&quot;Additional Information&quot;&gt;&lt;div class=&quot;c-article-section&quot; data-dcnode-id=&quot;3103&quot; id=&quot;Sec12-section&quot;&gt;&lt;h2 class=&quot;c-article-section__title js-section-title js-c-reading-companion-sections-item&quot; data-dcnode-id=&quot;3118&quot; id=&quot;Sec12&quot;&gt;&lt;span data-dcnode-id=&quot;3119&quot; instrument_node=&quot;&quot;&gt;Additional Information&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;c-article-section__content&quot; data-dcnode-id=&quot;3104&quot; id=&quot;Sec12-content&quot;&gt;&lt;p data-dcnode-id=&quot;3105&quot;&gt;&lt;b data-dcnode-id=&quot;3116&quot;&gt;&lt;span data-dcnode-id=&quot;3117&quot; instrument_node=&quot;&quot;&gt;How to cite this article&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3115&quot; instrument_node=&quot;&quot;&gt;: Ge, Q. &lt;/span&gt;&lt;i data-dcnode-id=&quot;3113&quot;&gt;&lt;span data-dcnode-id=&quot;3114&quot; instrument_node=&quot;&quot;&gt;et al.&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3112&quot; instrument_node=&quot;&quot;&gt; Multimaterial 4D Printing with Tailorable Shape Memory Polymers. &lt;/span&gt;&lt;i data-dcnode-id=&quot;3110&quot;&gt;&lt;span data-dcnode-id=&quot;3111&quot; instrument_node=&quot;&quot;&gt;Sci. Rep.&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;3109&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;b data-dcnode-id=&quot;3107&quot;&gt;&lt;span data-dcnode-id=&quot;3108&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/b&gt;&lt;span data-dcnode-id=&quot;3106&quot; instrument_node=&quot;&quot;&gt;, 31110; doi: 10.1038/srep31110 (2016).&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;span data-dcnode-id=&quot;3101&quot; instrument_node=&quot;&quot;&gt;
