&lt;/span&gt;&lt;p data-dcnode-id=&quot;1919&quot;&gt;&lt;span data-dcnode-id=&quot;1924&quot; instrument_node=&quot;&quot;&gt;On October 4, 2011, construction workers were shocked to uncover human remains in an abandoned lot in the Elmhurst neighborhood of Queens, New York. So great was the level of preservation, witnesses first assumed they had stumbled upon a recent homicide. Forensic analysis, however, revealed a remarkably different story. Buried in an elaborate and expensive iron coffin, the body belonged to a young African American woman who died in the first half of the 19th century, before the Civil War and the federal abolishment of slavery. But who was she?&amp;nbsp;&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1921&quot;&gt;&lt;em data-dcnode-id=&quot;1922&quot;&gt;&lt;span data-dcnode-id=&quot;1923&quot; instrument_node=&quot;&quot;&gt;Secrets of the Dead: The Woman in the Iron Coffin&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1920&quot; instrument_node=&quot;&quot;&gt;follows forensic archaeologist Scott Warnasch and a team of historians and scientists as they investigate this woman’s story and the time in which she lived, revealing a vivid picture of what life was like for free African American people in the North.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1918&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1915&quot;&gt;&lt;strong data-dcnode-id=&quot;1916&quot;&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;Noteworthy Facts&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1914&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1891&quot;&gt;&lt;span data-dcnode-id=&quot;1913&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1911&quot;&gt;&lt;span data-dcnode-id=&quot;1912&quot; instrument_node=&quot;&quot;&gt;The iron coffin was created in 1848 by Almond Dunbar Fisk, a stove manufacturer from New York. The coffin was created to preserve bodies for sanitary storage and for transportation prior to modern embalming. The airtight coffins also preserved bodies well enough for legal identification purposes. Iron coffins were very expensive for the era and used by the wealthy and elite, including former first lady Dolley Madison, former President Zachary Taylor, and former Vice President John C. Calhoun.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1910&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1908&quot;&gt;&lt;span data-dcnode-id=&quot;1909&quot; instrument_node=&quot;&quot;&gt;New York, one of the largest slaveholding states, officially abolished slavery on July 4, 1827. Following the abolishment, freed African Americans began to establish communities in New York City, including the Queens community of Newtown (now Elmhurst), where a body was found at what was once the location of an African Methodist Episcopal church and burial ground.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1905&quot;&gt;&lt;span data-dcnode-id=&quot;1906&quot; instrument_node=&quot;&quot;&gt;The “Woman in the Iron Coffin” was first discovered by construction workers on October 4, 2011 and was believed to be a victim of a homicide. Archaeologists were called to the site on October 5, 2011, where they discovered metal fragments, suggesting the woman was buried more than 150 years ago.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1904&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1902&quot;&gt;&lt;span data-dcnode-id=&quot;1903&quot; instrument_node=&quot;&quot;&gt;From initial examinations, it was determined that the body was that of an African American woman, dressed in a long white nightgown with thick, knee-high socks and a hand-crafted comb that held a delicate knit cap on her head.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1901&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1899&quot;&gt;&lt;span data-dcnode-id=&quot;1900&quot; instrument_node=&quot;&quot;&gt;After examining the body and studying the 1850 Census of New York City, Warnasch determines that the remains likely belonged to Martha Peterson, a 26-year-old African American woman living in New York City in 1850. Peterson was the daughter of John and Jane Peterson, prominent figures in Newtown’s African American community.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1898&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1896&quot;&gt;&lt;span data-dcnode-id=&quot;1897&quot; instrument_node=&quot;&quot;&gt;Public records also noted that Martha Peterson lived with William Raymond, the brother-in-law, neighbor and business partner of Almond Dunbar Fisk, the iron coffin creator.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1895&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1893&quot;&gt;&lt;span data-dcnode-id=&quot;1894&quot; instrument_node=&quot;&quot;&gt;In 2016, the “Woman in the Iron Coffin” was given a proper burial by the Saint Mark African Methodist Episcopal Church of Jackson Heights.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1892&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1890&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1885&quot;&gt;&lt;strong data-dcnode-id=&quot;1888&quot;&gt;&lt;span data-dcnode-id=&quot;1889&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;strong data-dcnode-id=&quot;1886&quot;&gt;&lt;span data-dcnode-id=&quot;1887&quot; instrument_node=&quot;&quot;&gt;Buzzworthy Moments&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1884&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;1876&quot;&gt;&lt;span data-dcnode-id=&quot;1883&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1881&quot;&gt;&lt;span data-dcnode-id=&quot;1882&quot; instrument_node=&quot;&quot;&gt;For a non-evasive way to further examine the woman’s remains, Warnasch seeks the help of Prof. Jerry Conlogue to conduct a “virtual” autopsy. Using sophisticated computer software and hardware, Warnasch and Conlogue determine the woman was between 25 and 30 years old, and died from smallpox.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;1878&quot;&gt;&lt;span data-dcnode-id=&quot;1879&quot; instrument_node=&quot;&quot;&gt;Forensic imaging specialist Joe Mullins creates a facial reconstruction of the “Woman in the Iron Coffin” by using a CT scan of the skull, digitally fixing the damaged parts of the skull, and incorporating age-and-ancestry-appropriate features from a database of thousands of body parts. To give back to the Queens community, Warnasch shares the image of the woman with members of the Saint Mark African Methodist Episcopal Church&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;1877&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;1875&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;hr data-dcnode-id=&quot;1874&quot;&gt;&lt;span data-dcnode-id=&quot;1873&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1864&quot;&gt;&lt;strong data-dcnode-id=&quot;1870&quot;&gt;&lt;em data-dcnode-id=&quot;1871&quot;&gt;&lt;span data-dcnode-id=&quot;1872&quot; instrument_node=&quot;&quot;&gt;Secrets of the Dead: The Woman in the Iron Coffin&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1869&quot; instrument_node=&quot;&quot;&gt;is a production of Impossible Factual. Directed by Adam Luria. Stephanie Carter is executive producer for&amp;nbsp;&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1866&quot;&gt;&lt;em data-dcnode-id=&quot;1867&quot;&gt;&lt;span data-dcnode-id=&quot;1868&quot; instrument_node=&quot;&quot;&gt;Secrets of the Dead&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1865&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1863&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1857&quot;&gt;&lt;span data-dcnode-id=&quot;1862&quot; instrument_node=&quot;&quot;&gt;Funding for&amp;nbsp;&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1859&quot;&gt;&lt;em data-dcnode-id=&quot;1860&quot;&gt;&lt;span data-dcnode-id=&quot;1861&quot; instrument_node=&quot;&quot;&gt;Secrets of the Dead&lt;/span&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1858&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;is provided by the Corporation for Public Broadcasting, and by public television viewers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1607&quot;&gt;&lt;span data-dcnode-id=&quot;1610&quot; instrument_node=&quot;&quot;&gt;Detective Davies&lt;/span&gt;&lt;br data-dcnode-id=&quot;1609&quot;&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;
There was some metal that was very intriguing to see&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1602&quot;&gt;&lt;span data-dcnode-id=&quot;1605&quot; instrument_node=&quot;&quot;&gt;Detective Saenz&lt;/span&gt;&lt;br data-dcnode-id=&quot;1604&quot;&gt;&lt;span data-dcnode-id=&quot;1603&quot; instrument_node=&quot;&quot;&gt;
What they did see over there obviously was very unusual. It was surprising to see how well preserved the remains were.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1601&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1597&quot;&gt;&lt;span data-dcnode-id=&quot;1600&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1599&quot;&gt;&lt;span data-dcnode-id=&quot;1598&quot; instrument_node=&quot;&quot;&gt;
Who did these remains belong to? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1596&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1594&quot;&gt;&lt;span data-dcnode-id=&quot;1595&quot; instrument_node=&quot;&quot;&gt;My name is Scott Warnasch, I am a forensic archaeologist.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1593&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1591&quot;&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt;I spent a lot of my early career in archaeology, working on traditional archaeological sites - historic and prehistoric - and I gravitated towards excavating skeletons and cemeteries or burial grounds. I was always interested in forensics although I was very squeamish and I didn’t think I would be able to get through the proper coursework to get that formal degree.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1586&quot;&gt;&lt;span data-dcnode-id=&quot;1589&quot; instrument_node=&quot;&quot;&gt;‘54&lt;/span&gt;&lt;br data-dcnode-id=&quot;1588&quot;&gt;&lt;span data-dcnode-id=&quot;1587&quot; instrument_node=&quot;&quot;&gt;
Scott Warnasch&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1585&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1583&quot;&gt;&lt;span data-dcnode-id=&quot;1584&quot; instrument_node=&quot;&quot;&gt;I originally began working at the medical examiner’s office in the World Trade Centre, handling the remains, doing the case file work and releasing the remains to the family members. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1580&quot;&gt;&lt;span data-dcnode-id=&quot;1581&quot; instrument_node=&quot;&quot;&gt;Recovering potentially human remains and identifying the victims, puts my usual work at a much higher level of satisfaction than typical archaeological projects.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1577&quot;&gt;&lt;span data-dcnode-id=&quot;1578&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1574&quot;&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;October 5th 2011, it started off like a normal day, although a normal day at the medical examiner’s office is probably a bit different than everybody else’s.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1573&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1571&quot;&gt;&lt;span data-dcnode-id=&quot;1572&quot; instrument_node=&quot;&quot;&gt;When we got to work, we were told that we had to get a crew together for the forensic anthropology unit to respond to a potential crime scene in Queens. Apparently, a body was discovered in Elmhurst.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1568&quot;&gt;&lt;span data-dcnode-id=&quot;1569&quot; instrument_node=&quot;&quot;&gt;So, we arrived at the scene on Corona Avenue, walked into the site and spoke to the detectives to get a little background on the situation. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1565&quot;&gt;&lt;span data-dcnode-id=&quot;1566&quot; instrument_node=&quot;&quot;&gt;The team lines up as we approach the scene, and we’re looking on the ground, looking for any type of evidence that may have been dug up from the machinery and spread around the site.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1562&quot;&gt;&lt;span data-dcnode-id=&quot;1563&quot; instrument_node=&quot;&quot;&gt;It was then when I noticed this piece of rusty metal.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1559&quot;&gt;&lt;span data-dcnode-id=&quot;1560&quot; instrument_node=&quot;&quot;&gt;It wouldn’t have been anything to anyone else on the site, however I had some idea of the significance of it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1556&quot;&gt;&lt;span data-dcnode-id=&quot;1557&quot; instrument_node=&quot;&quot;&gt;This told me that this wasn’t an ordinary crime scene. This suggested that the person died over 150 years ago.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1555&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;As we were uncovering the body and exposing it, we quickly realized that we were dealing with an African American woman. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1550&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;She seemed to have been buried in some kind of white nightgown and high, thick knee socks.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1549&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1547&quot;&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt;Forensic protocol suggests that you leave the most sensitive parts of the body covered until the last minute. That way they’re protected from the sun or any other situations. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1544&quot;&gt;&lt;span data-dcnode-id=&quot;1545&quot; instrument_node=&quot;&quot;&gt;My colleague Chris was finishing off sweeping away the last residue of the soil around the woman’s chest and around her face.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1541&quot;&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;That’s when he discovered something kinda shocking.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1538&quot;&gt;&lt;span data-dcnode-id=&quot;1539&quot; instrument_node=&quot;&quot;&gt;And as he’s sweeping away, we can see these lesions all over the top of her chest and on her forehead. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1537&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1535&quot;&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;It looked a lot like smallpox. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1534&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1532&quot;&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;So, the situation went form a potential crime scene to an archaeological discovery to a potential biohazard within like an hour.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1529&quot;&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;So, there were two things that we needed to do right away. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1526&quot;&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;One was to take extra precautions when handling the body and messaging that down the line to the morgue so everybody involved with this understood what we were dealing with.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1525&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1523&quot;&gt;&lt;span data-dcnode-id=&quot;1524&quot; instrument_node=&quot;&quot;&gt;The second was to call the experts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1522&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1516&quot;&gt;&lt;span data-dcnode-id=&quot;1521&quot; instrument_node=&quot;&quot;&gt;Dr. Kevin L. Karem&lt;/span&gt;&lt;br data-dcnode-id=&quot;1520&quot;&gt;&lt;span data-dcnode-id=&quot;1519&quot; instrument_node=&quot;&quot;&gt;
My name is Kevin Karem, and I am a medical researcher, and I work for the Centers for Disease Control and Prevention in Atlanta, Georgia.&lt;/span&gt;&lt;br data-dcnode-id=&quot;1518&quot;&gt;&lt;span data-dcnode-id=&quot;1517&quot; instrument_node=&quot;&quot;&gt;
My career and my role at the CDC over the years has been as an infectious disease researcher. So really helping to protect the public health of the country and we actually have an extensive global program as well. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1513&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt;Dr. Kevin L. Karem &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1510&quot;&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;Within days after getting the call from Queen’s County we prepared to come up to New York and help them with the case. We thought well there is no way that we are going to find anything viable. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;And so, we agreed that we would be quick and brief; we’d take a few specimens externally and move on. Well that changed the next morning when we got to the morgue.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1504&quot;&gt;&lt;span data-dcnode-id=&quot;1505&quot; instrument_node=&quot;&quot;&gt;One of the more shocking things for me was actually opening the body bag and seeing the sheer number of lesions across this young woman’s body from head to toe. The preservation of the body was just totally unexpected&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1501&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;And so that point I got a little more nervous about the possibility that there might be a contagion risk here.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1498&quot;&gt;&lt;span data-dcnode-id=&quot;1499&quot; instrument_node=&quot;&quot;&gt;Smallpox is very unusual, in that it is thought to have killed more people in human history than any other agent that we know of. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1497&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1495&quot;&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt;It was transmitted by aerosol droplets. So, when someone had a cough or sneezing it could actually be carried on those particles in the air and that’s thought to be one of the reasons why it was so contagious.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1492&quot;&gt;&lt;span data-dcnode-id=&quot;1493&quot; instrument_node=&quot;&quot;&gt;Its transmission rates are around 60%, which is actually higher than Ebola. The mortality rate, depending on the outbreak, could be anywhere from 10-60%. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1491&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1489&quot;&gt;&lt;span data-dcnode-id=&quot;1490&quot; instrument_node=&quot;&quot;&gt;But it’s very devastating and, the denser population and community, the higher the probability of spread.  &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1484&quot;&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;Dr. Jeffrey Kroessler&lt;/span&gt;&lt;br data-dcnode-id=&quot;1486&quot;&gt;&lt;span data-dcnode-id=&quot;1485&quot; instrument_node=&quot;&quot;&gt;
We tend to forget that in the cities of the early 1800s, to, even throughout the 19th century, there was a very active disease environment and you didn’t have great sanitary conditions. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1483&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1481&quot;&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;Prof. Carla L. Peterson&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1478&quot;&gt;&lt;span data-dcnode-id=&quot;1479&quot; instrument_node=&quot;&quot;&gt;New York was an incredibly unhealthy place to be in the 19th Century. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1477&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1475&quot;&gt;&lt;span data-dcnode-id=&quot;1476&quot; instrument_node=&quot;&quot;&gt;There are waves of epidemics that sweep the city against which the population you know has no recourse. And it attacks those who are living in the least healthy environments.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1472&quot;&gt;&lt;span data-dcnode-id=&quot;1473&quot; instrument_node=&quot;&quot;&gt;And that was where African Americans of course were allowed to live &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1471&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1469&quot;&gt;&lt;span data-dcnode-id=&quot;1470&quot; instrument_node=&quot;&quot;&gt;Death by epidemic was absolutely very common &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1464&quot;&gt;&lt;span data-dcnode-id=&quot;1467&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1466&quot;&gt;&lt;span data-dcnode-id=&quot;1465&quot; instrument_node=&quot;&quot;&gt;
By the middle of the 20th century, there was a huge effort to wipe out small pox once and for all. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1463&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1461&quot;&gt;&lt;span data-dcnode-id=&quot;1462&quot; instrument_node=&quot;&quot;&gt;Dr. Kevin L. Karem &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1460&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1458&quot;&gt;&lt;span data-dcnode-id=&quot;1459&quot; instrument_node=&quot;&quot;&gt;In 1959 there was a World Health Assembly meeting where they talked about mandatory vaccination program to eradicate the disease.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1457&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1455&quot;&gt;&lt;span data-dcnode-id=&quot;1456&quot; instrument_node=&quot;&quot;&gt;So, disease in the United States was eliminated really before 1970. Vaccination among children of the United States actually stopped in 1973 and then the rest of the world followed suit. And then in 1980 the World Health Organisation declared the world to be smallpox free.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1450&quot;&gt;&lt;span data-dcnode-id=&quot;1453&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1452&quot;&gt;&lt;span data-dcnode-id=&quot;1451&quot; instrument_node=&quot;&quot;&gt;
Although we understood that this woman probably died over 150 years ago, it was important to examine the body to determine whether this was a public health concern. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1449&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1447&quot;&gt;&lt;span data-dcnode-id=&quot;1448&quot; instrument_node=&quot;&quot;&gt;Dr. Kevin L. Karem &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1446&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1444&quot;&gt;&lt;span data-dcnode-id=&quot;1445&quot; instrument_node=&quot;&quot;&gt;So, in this case the type of specimens we took from skin tissue as well as internal organs were very good samples for a test we call called Polymerase Chain Reaction, or PCR.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1443&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1441&quot;&gt;&lt;span data-dcnode-id=&quot;1442&quot; instrument_node=&quot;&quot;&gt;And in that test, we can actually look specifically for viral DNA sequences based on what we know about smallpox virus. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1438&quot;&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;And it was the most effective way for us to test quickly. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1437&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1435&quot;&gt;&lt;span data-dcnode-id=&quot;1436&quot; instrument_node=&quot;&quot;&gt;What we found was that we could not detect any DNA.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1432&quot;&gt;&lt;span data-dcnode-id=&quot;1433&quot; instrument_node=&quot;&quot;&gt;And what it really told us that the tissue and any viral DNA was degraded. Probably due to how long it had been since she had died, the moisture in the body, that sort of thing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1431&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1429&quot;&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt;We felt confident at that point that there was not a contagion present, and that the body really posed no risk relative to smallpox.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1428&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1426&quot;&gt;&lt;span data-dcnode-id=&quot;1427&quot; instrument_node=&quot;&quot;&gt;With the results from the CDC showing there was no public health threat, Scott’s part of the job was officially over.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1425&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1423&quot;&gt;&lt;span data-dcnode-id=&quot;1424&quot; instrument_node=&quot;&quot;&gt;But he couldn’t let the case go.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1422&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1420&quot;&gt;&lt;span data-dcnode-id=&quot;1421&quot; instrument_node=&quot;&quot;&gt;He wanted to know more about this woman and the world she inhabited more than 150 years ago.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1419&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1417&quot;&gt;&lt;span data-dcnode-id=&quot;1418&quot; instrument_node=&quot;&quot;&gt;And so, to help him solve the mystery, Scott turned to science.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1416&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1412&quot;&gt;&lt;span data-dcnode-id=&quot;1415&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1414&quot;&gt;&lt;span data-dcnode-id=&quot;1413&quot; instrument_node=&quot;&quot;&gt;
I was able to get in touch with a specialist on non-invasive ways of examining a body.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1411&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1409&quot;&gt;&lt;span data-dcnode-id=&quot;1410&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1406&quot;&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;My name is Jerry Conlogue and I’m emeritus professor of diagnostic imaging and co-director of the Bioanthropology Research Institute at Quinnipiac.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1403&quot;&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt;I guess you could say I’m a mummy man.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1400&quot;&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt;I’ve probably x-rayed well over a thousand mummies in maybe 16 different countries. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1399&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1395&quot;&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1397&quot;&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;
For me, the real excitement, and I still feel this after 40 years of doing mummies: to be able to use x-ray to find out what’s inside the mummy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1392&quot;&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt;An individual’s skeleton is kind of record of what their body was like, from when they were an infant until when they died, so the history is definitely in the bones.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1389&quot;&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;My job is to be able to get that information out of the bones so that it can be interpreted by someone like Scott, an anthropologist.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1384&quot;&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1386&quot;&gt;&lt;span data-dcnode-id=&quot;1385&quot; instrument_node=&quot;&quot;&gt;
This is unbelievable I have never seen anything like this before. We’ve seen x-rays, we’ve seen some CT scans, but this is a 3D version of this woman.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1383&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1379&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1381&quot;&gt;&lt;span data-dcnode-id=&quot;1380&quot; instrument_node=&quot;&quot;&gt;
The original CT scans Jerry made of the woman have been loaded into a piece of groundbreaking software.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1376&quot;&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;It allows for a “virtual” autopsy of the body, unlocking the secrets contained within without making a single incision.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1375&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1371&quot;&gt;&lt;span data-dcnode-id=&quot;1374&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1373&quot;&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;
Normally I am looking at sections or regions of the body, but this thing lets me see the entire body and I can spin it and roll it and go into it and come out of it. This is a way that I have never been able to look at a body before.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1370&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1366&quot;&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1368&quot;&gt;&lt;span data-dcnode-id=&quot;1367&quot; instrument_node=&quot;&quot;&gt;
With just the swipe of a screen, it can move between multiple layers of the body—&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1363&quot;&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt;digitally stripping back skin, revealing internal organs, and showing the skeleton beneath.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1358&quot;&gt;&lt;span data-dcnode-id=&quot;1361&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1360&quot;&gt;&lt;span data-dcnode-id=&quot;1359&quot; instrument_node=&quot;&quot;&gt;
If we had examined her let’s say in 2000 we would have not have had the capability with the CT and the MR and this wonderful table would have not been there. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1357&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1353&quot;&gt;&lt;span data-dcnode-id=&quot;1356&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1355&quot;&gt;&lt;span data-dcnode-id=&quot;1354&quot; instrument_node=&quot;&quot;&gt;
Yeah, right. We would have X-Rays. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1348&quot;&gt;&lt;span data-dcnode-id=&quot;1351&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1350&quot;&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt;
We’d just have plain X-Rays&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1343&quot;&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1345&quot;&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;
Typically, in an archaeological situation you never really know how someone died, the cause and manner of death. Based on what’s left is usually the skeleton unless they have a bullet hole or an arrowhead in them. Here we can see clearly the cause and manner of this woman’s death is smallpox.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1342&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1338&quot;&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1340&quot;&gt;&lt;span data-dcnode-id=&quot;1339&quot; instrument_node=&quot;&quot;&gt;
Well on the surface, you can see all these small pox lesions on her head, on her neck, on her chest, down into her thigh area and even down into her feet.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1337&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1333&quot;&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1335&quot;&gt;&lt;span data-dcnode-id=&quot;1334&quot; instrument_node=&quot;&quot;&gt;
And then on her heel, then on the pad of her foot, on the ball of her foot. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1328&quot;&gt;&lt;span data-dcnode-id=&quot;1331&quot; instrument_node=&quot;&quot;&gt;Dr. Kevin L. Karem&lt;/span&gt;&lt;br data-dcnode-id=&quot;1330&quot;&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt;
Typically with smallpox the rash really initiates in the mouth, in the oral cavity, and so, they become really sore, you have lesions inside your mouth, and then it becomes a full-blown skin lesions in a centrifugal pattern – that means predominantly in the limbs but also on the trunks.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1325&quot;&gt;&lt;span data-dcnode-id=&quot;1326&quot; instrument_node=&quot;&quot;&gt;And quite often it was documented that they would have you know exceptional fever, immune response and then a significant drop in blood pressure, which indicates some type of organ failure &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1320&quot;&gt;&lt;span data-dcnode-id=&quot;1323&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1322&quot;&gt;&lt;span data-dcnode-id=&quot;1321&quot; instrument_node=&quot;&quot;&gt;
I would have only expected lesions on the surface, but if we look inside her skull, this is her brain. Now covering the brain there is this tissue that is very dense it is kind of a consistency of canvas and that’s to protect the brain and that is called the dura and there are lesions on the dura. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1317&quot;&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;What makes this really unusual is that I don’t think anyone has ever imaged an individual with smallpox, looked inside. And here we have evidence that the lesions are in fact inside.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1316&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1312&quot;&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1314&quot;&gt;&lt;span data-dcnode-id=&quot;1313&quot; instrument_node=&quot;&quot;&gt;
It is amazing. It is like we have a map of how smallpox colonised the human body. That’s a first. That’s a medical first.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1307&quot;&gt;&lt;span data-dcnode-id=&quot;1310&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1309&quot;&gt;&lt;span data-dcnode-id=&quot;1308&quot; instrument_node=&quot;&quot;&gt;
The woman’s body was so well-preserved, the smallpox that killed her remains clearly visible… something Jerry and Scott wouldn’t usually get to see from skeletal remains.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1306&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1302&quot;&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1304&quot;&gt;&lt;span data-dcnode-id=&quot;1303&quot; instrument_node=&quot;&quot;&gt;
The airtight coffin perfectly preserved the woman. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1301&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1297&quot;&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1299&quot;&gt;&lt;span data-dcnode-id=&quot;1298&quot; instrument_node=&quot;&quot;&gt;
The iron coffin was invented by Almond Dunbar Fisk. He was originally a stove manufacturer in Lower Manhattan.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1296&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1294&quot;&gt;&lt;span data-dcnode-id=&quot;1295&quot; instrument_node=&quot;&quot;&gt;In 1844 Almond Fisk’s brother William died in Mississippi during the summertime and there was no way to transport his body back up to New York. This caused a lot of sorrow for his family and especially his father, and this seemed to be the instigation for the development of the coffin.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1293&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1289&quot;&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;Dr. Jeffrey Kroessler&lt;/span&gt;&lt;br data-dcnode-id=&quot;1291&quot;&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;
If you died far from home in the early 1800s, that is where you were buried. You are not going to be transported – a corpse - hundreds of miles over weeks or months. That is out of the realm of possibility. You will be buried where you fell.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1284&quot;&gt;&lt;span data-dcnode-id=&quot;1287&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1286&quot;&gt;&lt;span data-dcnode-id=&quot;1285&quot; instrument_node=&quot;&quot;&gt;
In the age of steam travel, Fisk’s iron coffin was invented to address the issue of people dying far from home.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1281&quot;&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;The coffins were designed to preserve bodies for sanitary storage and long-distance transportation. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1278&quot;&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt;If someone died far away, he or she could now be sent back home for a proper burial among kin. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1277&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1273&quot;&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1275&quot;&gt;&lt;span data-dcnode-id=&quot;1274&quot; instrument_node=&quot;&quot;&gt;
He bought a large farm outside of Newtown, Queens and in one of his barns he set up a little furnace for himself and started his own foundry and started experimenting. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1268&quot;&gt;&lt;span data-dcnode-id=&quot;1271&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1270&quot;&gt;&lt;span data-dcnode-id=&quot;1269&quot; instrument_node=&quot;&quot;&gt;
Today, the Fisk Avenue subway stop on the number 7 line stands a short distance from the location of the 19th-century foundry.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1267&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1263&quot;&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1265&quot;&gt;&lt;span data-dcnode-id=&quot;1264&quot; instrument_node=&quot;&quot;&gt;
In 1848 Almond Fisk was granted the patent for his metallic burial case and started a company with his brother in law William Raymond, the company being Fisk &amp;amp; Raymond&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1262&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1258&quot;&gt;&lt;span data-dcnode-id=&quot;1261&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1260&quot;&gt;&lt;span data-dcnode-id=&quot;1259&quot; instrument_node=&quot;&quot;&gt;
We’re here at the Canton Historical Society Museum in Collinsville, Connecticut. They have the most extraordinary example of a Fisk metallic burial case&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1257&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1255&quot;&gt;&lt;span data-dcnode-id=&quot;1256&quot; instrument_node=&quot;&quot;&gt;There are so many little details that you never get to see from the iron coffins that get excavated from archaeological sites. There’s so much care and craftsmanship in this that it’s just unbelievable.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1254&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1252&quot;&gt;&lt;span data-dcnode-id=&quot;1253&quot; instrument_node=&quot;&quot;&gt;Although they’re considered a manufactured from a factory product, this was the 1840s and 50s, and it took a long time to finish one of these.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1251&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1249&quot;&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt;So, it was sort of maybe a bit of an assembly line, but it wasn’t like they were being pumped out like chocolate bars or anything like this. This was still a product of many craftsmen and many hours of work.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1246&quot;&gt;&lt;span data-dcnode-id=&quot;1247&quot; instrument_node=&quot;&quot;&gt;This coffin was invented prior to modern embalming. This was the closest they could get to some way of preserving the dead for transportation and storage.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1243&quot;&gt;&lt;span data-dcnode-id=&quot;1244&quot; instrument_node=&quot;&quot;&gt;The coffin body itself would be cast in the sand, however certain parts of it were manufactured separately as sort of like medallions and could be pressed into the sand mold to show these different motifs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1242&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1240&quot;&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt;So, the face plate, the nameplate and the footplate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1239&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1237&quot;&gt;&lt;span data-dcnode-id=&quot;1238&quot; instrument_node=&quot;&quot;&gt;They had some variation, they had choices on what they wanted to represent on the coffins.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1236&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1234&quot;&gt;&lt;span data-dcnode-id=&quot;1235&quot; instrument_node=&quot;&quot;&gt;A very important feature of these coffins of the time was that it also had a window for viewing the deceased. This was a time before photography had really caught on as a mode of identification. And it was important for the next of kin to be able to view the body and determine that it was in fact them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1233&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1231&quot;&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;They had some variation, they had choices on what they wanted to represent on the coffins.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1230&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1228&quot;&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;A very important feature of these coffins of the time was that it also had a window for viewing the deceased. This was a time before photography really caught on as a mode of identification. And it was important for the next of kin to be able to view the body and determine that it was in fact them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1227&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1223&quot;&gt;&lt;span data-dcnode-id=&quot;1226&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1225&quot;&gt;&lt;span data-dcnode-id=&quot;1224&quot; instrument_node=&quot;&quot;&gt;
The Fisk iron coffin was completely airtight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1220&quot;&gt;&lt;span data-dcnode-id=&quot;1221&quot; instrument_node=&quot;&quot;&gt;A body sealed inside was kept so well-preserved, it would be recognizable for the purpose of legal identification. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1219&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1215&quot;&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1217&quot;&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;
Once the viewing was over, the lid would be put back on and bolted shut. And theoretically the whole coffin would be airtight at this point.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1212&quot;&gt;&lt;span data-dcnode-id=&quot;1213&quot; instrument_node=&quot;&quot;&gt; The foot of the coffin is probably the most important part for the marketer and inventor, Almond Fisk.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1211&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1209&quot;&gt;&lt;span data-dcnode-id=&quot;1210&quot; instrument_node=&quot;&quot;&gt;This is the patent mark that was granted to Fisk on November 14th 1848. It says, “A. D. Fisk, patent, November 14th” and then a 48 in the centre. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1208&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1204&quot;&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1206&quot;&gt;&lt;span data-dcnode-id=&quot;1205&quot; instrument_node=&quot;&quot;&gt;
The coffins were a marvellous invention to preserve bodies for transportation. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1203&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1201&quot;&gt;&lt;span data-dcnode-id=&quot;1202&quot; instrument_node=&quot;&quot;&gt;As an archaeologist, most of the time all you’re expecting to find are skeletons in varying degrees of preservation. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1198&quot;&gt;&lt;span data-dcnode-id=&quot;1199&quot; instrument_node=&quot;&quot;&gt;But in this case, oh my god! We have everything here; this woman is so preserved.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1197&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1196&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1195&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;
Most bacteria and organisms responsible for bodily decomposition require oxygen.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1190&quot;&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;But in this case, it was difficult for them to do their job, because the iron coffin was airtight.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1189&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1185&quot;&gt;&lt;span data-dcnode-id=&quot;1188&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1187&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;
I’ve certainly never seen a body that is in this state of preservation, that has not been artificially embalmed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1182&quot;&gt;&lt;span data-dcnode-id=&quot;1183&quot; instrument_node=&quot;&quot;&gt;What I am seeing here is her liver. The liver would be the first organs that will probably start to decompose. So, decomposition was stopped, so that speaks to the efficiency of the coffin.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1181&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1177&quot;&gt;&lt;span data-dcnode-id=&quot;1180&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1179&quot;&gt;&lt;span data-dcnode-id=&quot;1178&quot; instrument_node=&quot;&quot;&gt;
The coffins were very expensive for the time, they came in many sizes and they were generally associated with the rich and the elite.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1176&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1174&quot;&gt;&lt;span data-dcnode-id=&quot;1175&quot; instrument_node=&quot;&quot;&gt;In 1849 former first lady Dolley Madison passed away and she was one of the first famous people to be buried in a Fisk coffin. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1173&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1171&quot;&gt;&lt;span data-dcnode-id=&quot;1172&quot; instrument_node=&quot;&quot;&gt;She was a very well beloved American icon at the time. Her funeral was covered in all the papers and the fact that she was in one of these coffins, shortly after they were patented put Fisk and Raymond into a much larger world. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1168&quot;&gt;&lt;span data-dcnode-id=&quot;1169&quot; instrument_node=&quot;&quot;&gt;Many more famous politicians, Henry Clay, President Zachary Taylor, Daniel Webster, John C. Calhoun, even President Lincoln’s son Willie was preserved in a later version of these coffins when he died while the president was still in office. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1167&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1165&quot;&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;When we were originally discovered the woman in Queens and it was revealed that she was African American that was quite a shock because that certainly didn’t fit the pattern of who you would expect to be in one of these elaborate coffins. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1162&quot;&gt;&lt;span data-dcnode-id=&quot;1163&quot; instrument_node=&quot;&quot;&gt;Once we understood she probably died of smallpox that sort of started to make sense why she might be quarantined in one of these coffins, however how she got the coffin would still remain a mystery.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1161&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1157&quot;&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1159&quot;&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;
So, what we have here are a bunch of photos of coffin fragments that were recovered from the scene.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1156&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1154&quot;&gt;&lt;span data-dcnode-id=&quot;1155&quot; instrument_node=&quot;&quot;&gt;I spent some time trying to put it back together, and it turned out we had about 50 or 60 fragments, but not the whole coffin.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1153&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1151&quot;&gt;&lt;span data-dcnode-id=&quot;1152&quot; instrument_node=&quot;&quot;&gt;However, the most important part of the coffin was recovered. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1150&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1148&quot;&gt;&lt;span data-dcnode-id=&quot;1149&quot; instrument_node=&quot;&quot;&gt;It was the most important part because it had the patent mark. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1145&quot;&gt;&lt;span data-dcnode-id=&quot;1146&quot; instrument_node=&quot;&quot;&gt;Most of the patent marks that Fisk put on his coffins are aligned a specific way on the foot and are rotated in a way that you can read them easily, and that’s just his logo at the time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1144&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1142&quot;&gt;&lt;span data-dcnode-id=&quot;1143&quot; instrument_node=&quot;&quot;&gt;However, this coffin is significant because the patent mark is misaligned, and the whole logo is rotated 180 degrees, so it was pretty much botched. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1141&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1139&quot;&gt;&lt;span data-dcnode-id=&quot;1140&quot; instrument_node=&quot;&quot;&gt;Everything about it worked, except that the main marketing part of it was messed up. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1136&quot;&gt;&lt;span data-dcnode-id=&quot;1137&quot; instrument_node=&quot;&quot;&gt;So maybe it was put to the side and saved for a time of need.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1131&quot;&gt;&lt;span data-dcnode-id=&quot;1134&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1133&quot;&gt;&lt;span data-dcnode-id=&quot;1132&quot; instrument_node=&quot;&quot;&gt;
By understanding this one woman, she provides a window into the time that she lived in, we can learn a lot about the environment, her living conditions, maybe even the types of work she did and from there we can extrapolate into the larger population of the African American community.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1130&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1126&quot;&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt;Prof. Clarence Taylor&lt;/span&gt;&lt;br data-dcnode-id=&quot;1128&quot;&gt;&lt;span data-dcnode-id=&quot;1127&quot; instrument_node=&quot;&quot;&gt;
In trying to reconstruct the lives of African Americans in the 19th century and earlier, we face several challenges. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1125&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1123&quot;&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;Many African Americans didn’t read or write so they didn’t leave their memoirs or their stories behind. In addition, many white historians did not record the histories of African Americans; they were essentially ignored. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1122&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1118&quot;&gt;&lt;span data-dcnode-id=&quot;1121&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1120&quot;&gt;&lt;span data-dcnode-id=&quot;1119&quot; instrument_node=&quot;&quot;&gt;
The first step in an identification process is to create a biological profile, and as an anthropologist, we would use the skeleton to start to narrow down potential candidates of who this might be, based on relative age range, their sex, potentially their ancestry and their stature, and through that, you come up with a thumbnail sketch about who this individual is.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1117&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1115&quot;&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;From the skeleton you can learn a lot about the age of the individual based on how well the bones have been formed, and how they have developed. The long bones have these caps and if the caps at the ends of the bones have fused then we can understand that this person is an adult. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1114&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1112&quot;&gt;&lt;span data-dcnode-id=&quot;1113&quot; instrument_node=&quot;&quot;&gt;Then we also have the spine. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1111&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1110&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1109&quot;&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;
Yeah, she has some arthritic changes, this lipping on the ends of the bones, so as arthritis develops you’ll get a bridge or excess bone formed because of the wearing action on the bone. She has got minimal, so I would say she’s probably over 25 but I don’t think she is really that old. I don’t think she’s much older than 30. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1106&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1102&quot;&gt;&lt;span data-dcnode-id=&quot;1105&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1104&quot;&gt;&lt;span data-dcnode-id=&quot;1103&quot; instrument_node=&quot;&quot;&gt;
And we can see a little bit of arthritis in her lower back. It does suggest she probably used her back on a daily basis. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1101&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1097&quot;&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1099&quot;&gt;&lt;span data-dcnode-id=&quot;1098&quot; instrument_node=&quot;&quot;&gt;
These folks had a physical life. So, if you are bending over a lot, unfortunately this is the part of your spine that is going to show these early degenerative changes&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1096&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1092&quot;&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1094&quot;&gt;&lt;span data-dcnode-id=&quot;1093&quot; instrument_node=&quot;&quot;&gt;
The skeleton isn’t suggesting she did a lot of lifting or carrying. If somebody had a life of extreme manual labour, working in the fields I think that would be showing up on a body, even this age.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1091&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1089&quot;&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;As you can see here unfortunately the woman’s face was pretty damaged by the construction equipment when she was discovered. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1086&quot;&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;The damage to her face is just incredible &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1081&quot;&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;Prof. Jerry Conlogue&lt;/span&gt;&lt;br data-dcnode-id=&quot;1083&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;
The right side of her face doesn’t look too bad but the left side. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1078&quot;&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;This area here where you’ve got a fracture through the cheekbone, fracture through the jaw and when I roll this back and forth - and it is one of the beauties of this table - her right ribs look okay but her left ribs are fractured&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1077&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1073&quot;&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1075&quot;&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;
While we are in this view I get to mention an article of clothing that is really fascinating on a lot of levels. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1072&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1070&quot;&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;It’s an exquisite comb carved out of either horn or maybe tortoise shell. It’s beautiful, almost a nimbus cloud of knots over 12 long, straight teeth. This would have been a hand carved comb. It was placed in the back of her hair, it held her hair back and also held a very delicate knit cap that was on the back of her head.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1067&quot;&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;And it shows really personal aspects of her life. It has got little nicks in it; it’s got polishing in certain areas. The little day-to-day motions that this woman had in her life. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1066&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1064&quot;&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt;And it also represents in a large way, the larger community that was involved with preparing her body for the funeral, that they took the time to put her comb in and put the cap on her head and prepare her for a proper burial.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1063&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1059&quot;&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;1061&quot;&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;
Within the time the woman lived it was a very tumultuous period for African Americans in New York, as well as everywhere else in the country. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1058&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1054&quot;&gt;&lt;span data-dcnode-id=&quot;1057&quot; instrument_node=&quot;&quot;&gt;Prof. Clarence Taylor&lt;/span&gt;&lt;br data-dcnode-id=&quot;1056&quot;&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;
America was an emerging nation, it was not the superpower that we think of today. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1053&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1051&quot;&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;The economies were diversifying. By the 19th century slave labour was diminishing in the North whereas it was growing and became quite valuable in the South&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1046&quot;&gt;&lt;span data-dcnode-id=&quot;1049&quot; instrument_node=&quot;&quot;&gt;Prof. Carla Peterson&lt;/span&gt;&lt;br data-dcnode-id=&quot;1048&quot;&gt;&lt;span data-dcnode-id=&quot;1047&quot; instrument_node=&quot;&quot;&gt;
There are great differences among African American communities in terms of geography whether you are in the North or in the South or in the West. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1045&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1043&quot;&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt;In the North the first state to abolish slavery is Vermont, and Vermont is 1777, followed by Pennsylvania and Massachusetts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1038&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;Prof. Clarence Taylor&lt;/span&gt;&lt;br data-dcnode-id=&quot;1040&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;
New York was one of the largest slave holding states in the United States. Proportionately surpassing some of the southern states&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1037&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1035&quot;&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;By 1788, four in ten New York families owned slaves&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1030&quot;&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1032&quot;&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;
New York was one of the last states in the North to abolish slavery.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1025&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;Prof. Carla Peterson&lt;/span&gt;&lt;br data-dcnode-id=&quot;1027&quot;&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;
It’s a somewhat complicated procedure. In 1799 a gradual emancipation bill is passed which says that slaves born before July 4th 1799 are slaves for the rest of their lives, but people born into slavery after July 4, 1799 will be emancipated. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1022&quot;&gt;&lt;span data-dcnode-id=&quot;1023&quot; instrument_node=&quot;&quot;&gt;In 1817, another bill gets passed that declares that people even enslaved before 1799 will be freed on July 4th 1827. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1017&quot;&gt;&lt;span data-dcnode-id=&quot;1020&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;1019&quot;&gt;&lt;span data-dcnode-id=&quot;1018&quot; instrument_node=&quot;&quot;&gt;
Finally, on July 4th 1827, 28 years after the state’s first emancipation bill, New York’s African American community celebrated their liberation. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1014&quot;&gt;&lt;span data-dcnode-id=&quot;1015&quot; instrument_node=&quot;&quot;&gt;In all, about 10,000 people in New York state were set free.  &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1009&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;Prof. Carla Peterson&lt;/span&gt;&lt;br data-dcnode-id=&quot;1011&quot;&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;
The position of the African American community remains very vexed because you do have slave kidnappers coming from the South up North in pursuit of slaves who have escaped to the North and the passage of the Fugitive Slave Act in 1850 meant that they could indeed legitimately go and catch slaves and bring them back. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1006&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;But the real problem is that the kidnappers would come up and were capable of seizing any black off the street and saying ‘oh you are a slave, you are the slave of Mr Johnson whoever and we’re remanding you into slavery’ and that person could protest and say ‘well no I’m free’ and ‘I was born here free’ etcetera, but if you didn’t have your papers on you right then or you couldn’t prove it on you right then and there, you were kidnapped and sent into slavery. And that was a process known as ‘black birding.’&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1003&quot;&gt;&lt;span data-dcnode-id=&quot;1004&quot; instrument_node=&quot;&quot;&gt;One great example is the case of Solomon Northup who was a free black and who was kidnapped and taken to the South, and was twelve years a slave, and lived to gain his freedom and to write that narrative.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;998&quot;&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;Prof. Clarence Taylor&lt;/span&gt;&lt;br data-dcnode-id=&quot;1000&quot;&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;
After emancipation in New York, the abolition of slavery in New York, the black population was made up of free African Americans; it was also made up of people that had escaped slavery and had come to New York, as well as those who had been manumitted from slavery.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;993&quot;&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;995&quot;&gt;&lt;span data-dcnode-id=&quot;994&quot; instrument_node=&quot;&quot;&gt;
Throughout New York, free African Americans established their own communities. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;992&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;990&quot;&gt;&lt;span data-dcnode-id=&quot;991&quot; instrument_node=&quot;&quot;&gt;Weeksville in Brooklyn and Seneca Village –later cleared to make way for Central Park—were among them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;985&quot;&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;987&quot;&gt;&lt;span data-dcnode-id=&quot;986&quot; instrument_node=&quot;&quot;&gt;
New York was a magnet for escaped slaves to migrate north.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;982&quot;&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;What I am really interested to find out is if this woman was a freed slave, an escaped slave, or from a family that had been freed for quite a long time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;977&quot;&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;979&quot;&gt;&lt;span data-dcnode-id=&quot;978&quot; instrument_node=&quot;&quot;&gt;
