Comparing when the coffin was manufactured and her age when she died, this woman must have been born sometime in the early 1800s. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;If she was indeed born in New York after the Emancipation Act of 1799, then it is more likely that she was a free woman rather than enslaved. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;969&quot;&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;971&quot;&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt;
One of the best ways we can determine the origin of the person - where they were born - is isotope analysis.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;966&quot;&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;Dr. Rhonda Quinn &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;965&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;963&quot;&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;My name is Rhonda Quinn. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;960&quot;&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;I am a biological anthropologist. I am a professor at Seton hall University and I use geochemistry to answer anthropological questions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;959&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;957&quot;&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt;If you are looking to paint a picture of where someone was from – the place of origin throughout the time period of their childhood, even into the late childhood, teeth are the best place to go. Teeth are amazing snapshots of time in your life and the environment itself, it tells you about diet, it tells you about location. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;952&quot;&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;954&quot;&gt;&lt;span data-dcnode-id=&quot;953&quot; instrument_node=&quot;&quot;&gt;
Adult teeth begin to develop before birth and continue growing until they are all in place.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;949&quot;&gt;&lt;span data-dcnode-id=&quot;950&quot; instrument_node=&quot;&quot;&gt;As they grow, they absorb the chemicals found in the water the person drinks. These chemicals are unique to geographic regions. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;944&quot;&gt;&lt;span data-dcnode-id=&quot;947&quot; instrument_node=&quot;&quot;&gt;Dr. Rhonda Quinn&lt;/span&gt;&lt;br data-dcnode-id=&quot;946&quot;&gt;&lt;span data-dcnode-id=&quot;945&quot; instrument_node=&quot;&quot;&gt;
The first measurement that we did was oxygen isotopes. Really what this is showing us is what was the signature of the water that she ingested, &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;941&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;What we first found was that, she would have ended up in this blue part, and what do you know, it absolutely overlaps with New York.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;936&quot;&gt;&lt;span data-dcnode-id=&quot;939&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;938&quot;&gt;&lt;span data-dcnode-id=&quot;937&quot; instrument_node=&quot;&quot;&gt;
So, it’s like a snapshot of her childhood environment?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;935&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;931&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;Dr. Rhonda Quinn&lt;/span&gt;&lt;br data-dcnode-id=&quot;933&quot;&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;
Absolutely. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;930&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;928&quot;&gt;&lt;span data-dcnode-id=&quot;929&quot; instrument_node=&quot;&quot;&gt;I cannot differentiate her from people who resided in New York, New Jersey, Pennsylvania.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;925&quot;&gt;&lt;span data-dcnode-id=&quot;926&quot; instrument_node=&quot;&quot;&gt;It’s really only the southern states that I can take out. So only Florida, Alabama, Georgia.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;924&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;920&quot;&gt;&lt;span data-dcnode-id=&quot;923&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;922&quot;&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt;
Specific isotopes found in the tooth match the mineral content of the water in the northeastern United States, meaning she can’t have grown up in the South.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;915&quot;&gt;&lt;span data-dcnode-id=&quot;918&quot; instrument_node=&quot;&quot;&gt;Dr. Rhonda Quinn&lt;/span&gt;&lt;br data-dcnode-id=&quot;917&quot;&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;
The other component we really wanted to look at is lots of different elements in her teeth, lots of different chemicals that are captured in her teeth. They told us a little bit more about how she lived. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;912&quot;&gt;&lt;span data-dcnode-id=&quot;913&quot; instrument_node=&quot;&quot;&gt;We measured lead. Lead was much higher than we would have predicted. You get lead levels this high when you have industrialisation&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;907&quot;&gt;&lt;span data-dcnode-id=&quot;910&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;909&quot;&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;
That’s really interesting because just based on the general area of where this woman seems like she grew up, she was really close to industrial centres of Brooklyn and Lower Manhattan.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;902&quot;&gt;&lt;span data-dcnode-id=&quot;905&quot; instrument_node=&quot;&quot;&gt;Dr. Rhonda Quinn&lt;/span&gt;&lt;br data-dcnode-id=&quot;904&quot;&gt;&lt;span data-dcnode-id=&quot;903&quot; instrument_node=&quot;&quot;&gt;
We have a few locations in the United States that show us that – New York is one of them.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;897&quot;&gt;&lt;span data-dcnode-id=&quot;900&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;899&quot;&gt;&lt;span data-dcnode-id=&quot;898&quot; instrument_node=&quot;&quot;&gt;
While her teeth give clues about where this woman came from…&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;896&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;894&quot;&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;…a sample of her hair provides a window into how she might have lived.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;893&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;889&quot;&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt;Dr. Rhonda Quinn&lt;/span&gt;&lt;br data-dcnode-id=&quot;891&quot;&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;
This represents a different time period in her life. As you can imagine the hair on top of your head is growing at a rate that’s much faster and it’s going to represent a time period very close to her time of death.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;886&quot;&gt;&lt;span data-dcnode-id=&quot;887&quot; instrument_node=&quot;&quot;&gt;A student of mine collected data from a number of New York City residents today. She looks like a lot of New Yorkers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;885&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;881&quot;&gt;&lt;span data-dcnode-id=&quot;884&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;883&quot;&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;
So, does that mean she ate meat like most New Yorkers or protein at least?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;876&quot;&gt;&lt;span data-dcnode-id=&quot;879&quot; instrument_node=&quot;&quot;&gt;Dr. Rhonda Quinn&lt;/span&gt;&lt;br data-dcnode-id=&quot;878&quot;&gt;&lt;span data-dcnode-id=&quot;877&quot; instrument_node=&quot;&quot;&gt;
For the time period that is represented with this hair sample, it looks like she’s getting a fair amount of protein – &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;871&quot;&gt;&lt;span data-dcnode-id=&quot;874&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;873&quot;&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;
So, a fairly balanced diet then? OK &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;866&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;Dr. Rhonda Quinn&lt;/span&gt;&lt;br data-dcnode-id=&quot;868&quot;&gt;&lt;span data-dcnode-id=&quot;867&quot; instrument_node=&quot;&quot;&gt;
There’s probably a little bit of corn in her diet, but it’s not a corn-based system that we see in the United States today in Middle America. She looks like other New Yorkers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;865&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;861&quot;&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;863&quot;&gt;&lt;span data-dcnode-id=&quot;862&quot; instrument_node=&quot;&quot;&gt;
The science seems to confirm that the woman grew up close to New York City.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;860&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;858&quot;&gt;&lt;span data-dcnode-id=&quot;859&quot; instrument_node=&quot;&quot;&gt;But to identify who she was, Scott needs to work backwards from the place where her body was found…&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;857&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;855&quot;&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;…to piece together what Queens was like when she was alive. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;850&quot;&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;852&quot;&gt;&lt;span data-dcnode-id=&quot;851&quot; instrument_node=&quot;&quot;&gt;
The coffin was discovered right here on Corona Avenue here right between Corona Avenue and the railroad tracks. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;849&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;847&quot;&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;Obviously, Queens has changed considerably since the mid-19th century. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;846&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;844&quot;&gt;&lt;span data-dcnode-id=&quot;845&quot; instrument_node=&quot;&quot;&gt;Trying to find out a little bit more background on what was on this property previously, we contacted the New York City Landmarks Commission.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;839&quot;&gt;&lt;span data-dcnode-id=&quot;842&quot; instrument_node=&quot;&quot;&gt;Dr. Jeffrey Kroessler&lt;/span&gt;&lt;br data-dcnode-id=&quot;841&quot;&gt;&lt;span data-dcnode-id=&quot;840&quot; instrument_node=&quot;&quot;&gt;
What was Queens like in the decades before the Civil War? 1830s, 40, 50s? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;838&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;836&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;You have a major town in Jamaica, which serves the southern half of Queens.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;833&quot;&gt;&lt;span data-dcnode-id=&quot;834&quot; instrument_node=&quot;&quot;&gt;The other major town is Flushing. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;832&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;830&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;And then there is Newtown – what is now Elmhurst.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;827&quot;&gt;&lt;span data-dcnode-id=&quot;828&quot; instrument_node=&quot;&quot;&gt;What was Newtown like in the 1850s? &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;824&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;It is a small place. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;821&quot;&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;This is a one street town and there was nothing beyond.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;816&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;818&quot;&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;
The Landmarks Commission explained that the property where we discovered the body was the site of the African church right on Corona Avenue.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;813&quot;&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;Originally it was called Dutch Lane and it had changed names a few of times over the period of the 19th century.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;810&quot;&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;I was able to uncover the original deed for the Dutch Lane cemetery property, which was sold to the United African Society in 1828.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;809&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;805&quot;&gt;&lt;span data-dcnode-id=&quot;808&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;807&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;
Only one year after full emancipation in New York, the African American community in Newtown established its own church.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;800&quot;&gt;&lt;span data-dcnode-id=&quot;803&quot; instrument_node=&quot;&quot;&gt;Dr. Jeffrey Kroessler&lt;/span&gt;&lt;br data-dcnode-id=&quot;802&quot;&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;
The African American population who lived in Newtown were either the children of slaves or they were former slaves themselves.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;797&quot;&gt;&lt;span data-dcnode-id=&quot;798&quot; instrument_node=&quot;&quot;&gt;But at this point, they are free people, who have sufficient funds that they are able to buy property for a cemetery. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;794&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;There isn’t a lot of wealth in the African American community but they are able to build a church.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;789&quot;&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt;Prof. Carla Peterson&lt;/span&gt;&lt;br data-dcnode-id=&quot;791&quot;&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;
The African American community organised itself right from the beginning in very, very powerful ways &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;786&quot;&gt;&lt;span data-dcnode-id=&quot;787&quot; instrument_node=&quot;&quot;&gt;And the whole concept of mutual relief was really the bedrock of the African American community. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;783&quot;&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;You come together in fellowship and brotherhood, and everybody puts in a certain amount of money and that is then reserved to help anybody in need. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;780&quot;&gt;&lt;span data-dcnode-id=&quot;781&quot; instrument_node=&quot;&quot;&gt;And then you have black churches, black denominations like the African Methodist Episcopal church, AME church.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;775&quot;&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;Prof. Clarence Taylor&lt;/span&gt;&lt;br data-dcnode-id=&quot;777&quot;&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;
The African Methodist Episcopal Church was a church that grew out of protest. African Americans in Philadelphia, who were members of the predominantly white Methodist church were essentially discriminated and asked to sit in segregated pews and they refused to do that and left and formed their own church the African Methodist Episcopal Church, and this took off and many other African Methodist Episcopal Churches formed as a way of sort of protesting racial discriminations and segregation in white churches. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;770&quot;&gt;&lt;span data-dcnode-id=&quot;773&quot; instrument_node=&quot;&quot;&gt;Prof. Carla Peterson&lt;/span&gt;&lt;br data-dcnode-id=&quot;772&quot;&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt;
Churches are engaged in political activism and one example would be the Amistad case, when a group of slaves who had mutinied on the Amistad come ashore.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;769&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;767&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;And so black churches galvanised to send money. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;766&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;764&quot;&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;So, churches are really important, not just from a religious point of view but from a social and political point of view.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;763&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;759&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;760&quot; instrument_node=&quot;&quot;&gt;
Today, St. Mark African Methodist Episcopal stands just one mile from the original Dutch Lane church.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;758&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;756&quot;&gt;&lt;span data-dcnode-id=&quot;757&quot; instrument_node=&quot;&quot;&gt;Its history can be traced all the way back to the community established by the United African Society of Newtown, more than 160 years ago.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;755&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;751&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;753&quot;&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;
That church was notified when this woman was discovered, and they were invited to contribute their input on what should be done with the woman.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;746&quot;&gt;&lt;span data-dcnode-id=&quot;749&quot; instrument_node=&quot;&quot;&gt;Rev. Kimberly Detherage&lt;/span&gt;&lt;br data-dcnode-id=&quot;748&quot;&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;
My name is Kimberly L Detherage and I’m the pastor at St Mark African Methodist Episcopal Church here in Jackson Heights, Queens, New York.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;741&quot;&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
St. Mark A.M.E. Church moved away from the Dutch Lane location in 1929.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;740&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;738&quot;&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;Rev. Kimberly L. Detherage Esq.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;737&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;735&quot;&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;The woman that was found represents us. She was found in our African American burial ground and because of that she is a member of our congregation, and as a member of our congregation it was important for us to make sure that we treated her with the very, utmost respect, that her her her life and her body was not treated disrespectfully, but most of all that we paid homage to the person that she, that we believed that she was.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;734&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;732&quot;&gt;&lt;span data-dcnode-id=&quot;733&quot; instrument_node=&quot;&quot;&gt;We had to hire a funeral home, and we wanted to make sure that there was an African American funeral director and a funeral home that would be taking care of her body, because we understood that as a part of our congregation, we wanted someone who looked like her and looked like us, to make sure that she was well taken care of. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;731&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;729&quot;&gt;&lt;span data-dcnode-id=&quot;730&quot; instrument_node=&quot;&quot;&gt;I’m John Houston and I am a funeral director and I’m originally from a small town in north Alabama named Decatur.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;728&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;726&quot;&gt;&lt;span data-dcnode-id=&quot;727&quot; instrument_node=&quot;&quot;&gt;I have been a funeral director for 23 years and this particular funeral home we serve the general north New Jersey area. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;723&quot;&gt;&lt;span data-dcnode-id=&quot;724&quot; instrument_node=&quot;&quot;&gt;I got a call from the church, from St Mark A.M.E.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;722&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;720&quot;&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;And I went to pick up the body and then when I saw her and the clothing that she had on and she was still intact, it was obvious that this was a historical case.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;717&quot;&gt;&lt;span data-dcnode-id=&quot;718&quot; instrument_node=&quot;&quot;&gt;We brought her back here, we took her downstairs, and got an opportunity to look ourselves to see, and it was unbelievable. She was fully clothed. You could see the actual colour of the clothing and you knew that there was someone that had taken great care in preparing this woman for burial – the same thing that we do – and it was just unbelievable.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;714&quot;&gt;&lt;span data-dcnode-id=&quot;715&quot; instrument_node=&quot;&quot;&gt;It was my honour to basically complete that circle - that she was being cared for again. I was honoured to take care of her.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;711&quot;&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;We were her family during that time.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;708&quot;&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;She was buried in a solid mahogany casket. There was a casket spray that gave a sense of Africa and nature, the choir sang. It was a service for a person, just as though that someone had died in the congregation today. There’s no difference. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;705&quot;&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;It was totally unbelievable to me and probably i’ll never get this opportunity to take care of a case like this again.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;702&quot;&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;It’s really part of the African American heritage. We did not come to this continent freely. We were stolen from west Africa and brought here treated terribly and still we are not treated fairly and to see someone who was actually clothed the way that she was and in an expensive casket, it gave us a sense of pride and also gave us a sense of pride to give something back and give her a great going home service.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;697&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;699&quot;&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;
It is important to remember that this isn’t just an archaeological specimen; this is an individual who was a person that had a life. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;694&quot;&gt;&lt;span data-dcnode-id=&quot;695&quot; instrument_node=&quot;&quot;&gt;One of the best ways to humanise her is to give her an identity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;691&quot;&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;I began the identification process using two criteria first based on the time the coffins were manufactured, and second the age range based on the woman’s biological profile&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;688&quot;&gt;&lt;span data-dcnode-id=&quot;689&quot; instrument_node=&quot;&quot;&gt;The date range for the coffin manufacturing began around 1848 to about 1854.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;687&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;685&quot;&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;That gives us a nice window for the identification process to begin.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;680&quot;&gt;&lt;span data-dcnode-id=&quot;683&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;682&quot;&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;
As luck would have it, this time period also gives Scott the perfect place to look for potential names: the 1850 census.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;677&quot;&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;It was the first time African Americans were listed individually by name in the census—&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;674&quot;&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt;the first full accounting of the African American population of Newtown.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;669&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;671&quot;&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;
The biological profile of the woman gave an age range of between 25 and 35 years old.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;666&quot;&gt;&lt;span data-dcnode-id=&quot;667&quot; instrument_node=&quot;&quot;&gt;Combing through the 1850 census came up with 33 possible candidates that fit the biological profile of this woman. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;663&quot;&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;660&quot;&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;As Scott scours the census records, one name stands out.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;655&quot;&gt;&lt;span data-dcnode-id=&quot;658&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;657&quot;&gt;&lt;span data-dcnode-id=&quot;656&quot; instrument_node=&quot;&quot;&gt;
Her name was Martha Peterson and she was 26 years old in 1850.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;652&quot;&gt;&lt;span data-dcnode-id=&quot;653&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;649&quot;&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt;The census data lists Martha Peterson living with a man named William Raymond.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;648&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;646&quot;&gt;&lt;span data-dcnode-id=&quot;647&quot; instrument_node=&quot;&quot;&gt;That’s amazing because William Raymond not only was Fisk’s brother-in-law, he was also his next-door-neighbour and business partner. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;643&quot;&gt;&lt;span data-dcnode-id=&quot;644&quot; instrument_node=&quot;&quot;&gt;Now we have the name of a woman that fits the biological profile who was living with the maker of the coffins.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;640&quot;&gt;&lt;span data-dcnode-id=&quot;641&quot; instrument_node=&quot;&quot;&gt;If this woman was Martha, it’s an easy jump to conclude that if Martha died of smallpox in the house of William Raymond then she would be buried in one of his coffins. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;637&quot;&gt;&lt;span data-dcnode-id=&quot;638&quot; instrument_node=&quot;&quot;&gt;He would be the perfect person to be able to supply the remedy to handle this situation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;636&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;634&quot;&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;And the fact that the patent mark was misaligned and sort of botched may suggest why it was available at the time of Martha’s death. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;631&quot;&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;The woman’s clothing suggests that she was taken care of and was dressed properly for a burial. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;628&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;So, the question becomes who did care for her? Potentially family members; that would be the most likely explanation &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;625&quot;&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;I have been looking at the 1850 census and established that there are five main branches of the Peterson family. Five males are all within the age range of who would have been Martha’s parents’ generation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;622&quot;&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;I have narrowed that down to one particular couple, John and Jane Peterson. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;617&quot;&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;619&quot;&gt;&lt;span data-dcnode-id=&quot;618&quot; instrument_node=&quot;&quot;&gt;
Scott believes the key to identifying John and Jane as Martha’s parents lies in the name of one of her potential nieces.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;616&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;612&quot;&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;614&quot;&gt;&lt;span data-dcnode-id=&quot;613&quot; instrument_node=&quot;&quot;&gt;
If Martha was the daughter of John and Jane Peterson that means that Martha had a brother named Elisha. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;609&quot;&gt;&lt;span data-dcnode-id=&quot;610&quot; instrument_node=&quot;&quot;&gt;Elisha had a daughter that he named Martha. This is the only other Martha I have found in the other Peterson branches, it is not unrealistic to think that Elisha might name a daughter after a departed sister.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;604&quot;&gt;&lt;span data-dcnode-id=&quot;607&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;606&quot;&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;
There is also evidence that the Petersons were prominent members of the African American community in rural Newtown.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;603&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;599&quot;&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;601&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;
So, if John Peterson was Martha Peterson’s father it is really interesting because John Peterson was the president of the United African Society who purchased the property of the cemetery.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;594&quot;&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;596&quot;&gt;&lt;span data-dcnode-id=&quot;595&quot; instrument_node=&quot;&quot;&gt;
It’s another connection between the possible identity of the remains and the location where they were found. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;593&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;589&quot;&gt;&lt;span data-dcnode-id=&quot;592&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;591&quot;&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;
Another interesting fact from the census is that Martha could read and write; we know this because there are boxes next to her name that shows she knows how to read and write.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;584&quot;&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt;Prof. Clarence Taylor&lt;/span&gt;&lt;br data-dcnode-id=&quot;586&quot;&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt;
African Americans craved education, they wanted to learn how to read and write and they would go to great lengths including hiring teachers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;579&quot;&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;Prof. Carla Peterson&lt;/span&gt;&lt;br data-dcnode-id=&quot;581&quot;&gt;&lt;span data-dcnode-id=&quot;580&quot; instrument_node=&quot;&quot;&gt;
Literacy in many ways simply represents freedom. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;576&quot;&gt;&lt;span data-dcnode-id=&quot;577&quot; instrument_node=&quot;&quot;&gt;Black leaders really see education as a path to emancipation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;573&quot;&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;And the one example that sticks out in my mind has to do with James Pennington&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;568&quot;&gt;&lt;span data-dcnode-id=&quot;571&quot; instrument_node=&quot;&quot;&gt;Prof. Clarence Taylor&lt;/span&gt;&lt;br data-dcnode-id=&quot;570&quot;&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;
James Pennington was an African American slave and he was born in 1807 in Eastern Maryland.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;563&quot;&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;Prof. Carla Peterson&lt;/span&gt;&lt;br data-dcnode-id=&quot;565&quot;&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;
He escapes from slavery in Maryland and ends up in Newtown in Queens.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;562&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;558&quot;&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;Prof. Clarence Taylor&lt;/span&gt;&lt;br data-dcnode-id=&quot;560&quot;&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;
Pennington became one of the leading abolitionists in the United States. He spoke against slavery. He travelled overseas and speaking before religious congregations against the system of slavery. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;555&quot;&gt;&lt;span data-dcnode-id=&quot;556&quot; instrument_node=&quot;&quot;&gt;He eventually writes his autobiography that describes his conditions, his life, his experiences under slavery and how he escaped.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;550&quot;&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;Prof. Carla Peterson&lt;/span&gt;&lt;br data-dcnode-id=&quot;552&quot;&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;
He was a blacksmith by trade so when he published a slave narrative it’s titled The Fugitive Blacksmith.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;545&quot;&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;547&quot;&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;
James Pennington eventually by the early 1830s became the first black school teacher of the first black school in Newtown, around the same time that Martha would have been school age, somewhere around 8 or 9 or 10 years old. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;542&quot;&gt;&lt;span data-dcnode-id=&quot;543&quot; instrument_node=&quot;&quot;&gt;It is amazing that Martha may have been taught by James Pennington; this amazing abolitionist and voice of the early black movement of abolition. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;537&quot;&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;539&quot;&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;
Using the 1850 census, Scott has been able to find a likely name for the woman in the iron coffin.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;534&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;But is it also possible to find out what she might have looked like?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;529&quot;&gt;&lt;span data-dcnode-id=&quot;532&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;531&quot;&gt;&lt;span data-dcnode-id=&quot;530&quot; instrument_node=&quot;&quot;&gt;
Giving this woman a face is a little more challenging than some other situations because of the damage that she received from the machinery when she was discovered.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;526&quot;&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;I have asked the forensic artist Joe Mullins to do a facial reconstruction.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;523&quot;&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;Prof. Joe Mullins&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;520&quot;&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;I’m a forensic imaging specialist; a forensic artist.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;517&quot;&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;My duties entail anything to assist law enforcement with identifying the deceased, finding the missing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;514&quot;&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;So, what we want to start with doing a facial reconstruction in this software is a pristine - you know - CT scan of the skull.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;511&quot;&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;The skull tells you everything you need to know about what the face looked like in life. Everything from the projection of the nose, to the width of the nose, to the corners of your mouth, to your eyebrow. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;510&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;508&quot;&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;Seeing all that information in, its makes it very easy to find the right puzzle piece to fit on this face to get the best representation of how she looked in life.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;505&quot;&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;Step one is to repair the damage to the skull, so that means there’s damage to the lower mandible and the mouth is open a little bit. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;502&quot;&gt;&lt;span data-dcnode-id=&quot;503&quot; instrument_node=&quot;&quot;&gt;So, we’re going to kind of mirror this image over here, flip it and – you know – close the mouth. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;499&quot;&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;The details of the face are all here, it’s all mapped out, it’s just a matter of reading the map and applying those features on the right spot.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;498&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;496&quot;&gt;&lt;span data-dcnode-id=&quot;497&quot; instrument_node=&quot;&quot;&gt;Applying the right facial muscles is also crucial in identifying - you know – how much tissue is there. We have landmarks on the skull because the muscles attach on the same place on everybody’s skull, regardless of your age or ancestry.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;495&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;493&quot;&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;So, it’s important as you’re building up these features you’re finding the nose, the ears, the lips, you want to have a kind of structure to place it in. So, coming up with that grid, now the grid is essentially just an outline to tell us where those features are going to go.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;492&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;490&quot;&gt;&lt;span data-dcnode-id=&quot;491&quot; instrument_node=&quot;&quot;&gt;So now we are going to start blocking in some features. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;485&quot;&gt;&lt;span data-dcnode-id=&quot;488&quot; instrument_node=&quot;&quot;&gt;Narration&lt;/span&gt;&lt;br data-dcnode-id=&quot;487&quot;&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;
Joe selects age- and ancestry-appropriate features from a database of thousands of body parts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;480&quot;&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;Prof. Joe Mullins&lt;/span&gt;&lt;br data-dcnode-id=&quot;482&quot;&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;
Coming up with the nose… this is the nose that fits this skull. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;477&quot;&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;She was well preserved within the iron coffin so we could see the hairlines, we knew it was parted in the centre and braided so that takes the guesswork out of it, which is great for a forensic artist having that information in front of us.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;476&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;474&quot;&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;It’s like a digital puzzle that we are piecing together. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;473&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;471&quot;&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;The last step is to modify these, finding the right skin tone and then corresponding that to all the pieces, so making it a uniform skin tone, and make sure it’s age appropriate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;468&quot;&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt;I’ve stared at this face, after we complete, i’ve stared at it probably a hundred times since we’ve completed it because I am just fascinated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;465&quot;&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;It’s not just a pile of remains, or a body that was found in an iron coffin anymore.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;462&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;A person is staring back at me. I have a photograph of a person who died that i’ve… i’ve brought her back to life.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;457&quot;&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;459&quot;&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;
It is really interesting to have Joe reconstruct this woman’s face, so we can finally see what she looks like after 150 years.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;454&quot;&gt;&lt;span data-dcnode-id=&quot;455&quot; instrument_node=&quot;&quot;&gt;But what I really want to do is offer some history back to the community that is directly related to this woman.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;449&quot;&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;451&quot;&gt;&lt;span data-dcnode-id=&quot;450&quot; instrument_node=&quot;&quot;&gt;
Hi ladies&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;444&quot;&gt;&lt;span data-dcnode-id=&quot;447&quot; instrument_node=&quot;&quot;&gt;Historical Committee&lt;/span&gt;&lt;br data-dcnode-id=&quot;446&quot;&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;
Hello&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;443&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;439&quot;&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;Scott Warnasch&lt;/span&gt;&lt;br data-dcnode-id=&quot;441&quot;&gt;&lt;span data-dcnode-id=&quot;440&quot; instrument_node=&quot;&quot;&gt;
Thanks for coming out today for this wonderful revelation of the iron coffin lady. As you remember, the iron coffin lady suffered some damage from the machinery when she was discovered.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;436&quot;&gt;&lt;span data-dcnode-id=&quot;437&quot; instrument_node=&quot;&quot;&gt;So, we were able to find a forensic artist to do a reconstruction of what the woman may have looked like, and I’d like to present that to you today.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;435&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;431&quot;&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;Historical Committee&lt;/span&gt;&lt;br data-dcnode-id=&quot;433&quot;&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;
Oh wow!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;428&quot;&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;Nice!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;427&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;425&quot;&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;She’s very pretty!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;422&quot;&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;She’s real!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;419&quot;&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt;Very good. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;416&quot;&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;She looks like, um, Taylor. She looks like Taylor, our little Taylor.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;413&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;Isn’t she beautiful?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;410&quot;&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;Beautiful.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;407&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;She’s very beautiful.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;404&quot;&gt;&lt;span data-dcnode-id=&quot;405&quot; instrument_node=&quot;&quot;&gt;She looks like us.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;401&quot;&gt;&lt;span data-dcnode-id=&quot;402&quot; instrument_node=&quot;&quot;&gt;We have a face now. And we can truthfully say that she looks as if she’s part of us. I would say. There’s no doubt; she’s a part of our community.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;398&quot;&gt;&lt;span data-dcnode-id=&quot;399&quot; instrument_node=&quot;&quot;&gt;I really feel connected; I feel like I know that she’s family. It’s just returning to what is ours. And she’s ours.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;395&quot;&gt;&lt;span data-dcnode-id=&quot;396&quot; instrument_node=&quot;&quot;&gt;It’s the past colliding with the future and we’re able to see this.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;392&quot;&gt;&lt;span data-dcnode-id=&quot;393&quot; instrument_node=&quot;&quot;&gt;She became a prompt for us to reveal our history. Besides being a person, who is a part of our congregation, besides being a historical artifact, as a mummy, the iron coffin lady was also a prompt for St Mark to – as Judy said – think about our history.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;387&quot;&gt;&lt;span data-dcnode-id=&quot;390&quot; instrument_node=&quot;&quot;&gt;Dr. Jeffrey Kroessler&lt;/span&gt;&lt;br data-dcnode-id=&quot;389&quot;&gt;&lt;span data-dcnode-id=&quot;388&quot; instrument_node=&quot;&quot;&gt;
Once you start asking questions about the people in the past, you can understand a way of life and that cannot but rebound to helping you understand your own life. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;386&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;382&quot;&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;Prof. Clarence Taylor&lt;/span&gt;&lt;br data-dcnode-id=&quot;384&quot;&gt;&lt;span data-dcnode-id=&quot;383&quot; instrument_node=&quot;&quot;&gt;
Those folks at the bottom also shape history. It is not just the history of prominent people who leave their letters, who leave their memoirs, who have power, who shape the sort of narrative.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;381&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;379&quot;&gt;&lt;span data-dcnode-id=&quot;380&quot; instrument_node=&quot;&quot;&gt;Some people call this bottom up history.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;374&quot;&gt;&lt;span data-dcnode-id=&quot;377&quot; instrument_node=&quot;&quot;&gt;Prof. Carla Peterson&lt;/span&gt;&lt;br data-dcnode-id=&quot;376&quot;&gt;&lt;span data-dcnode-id=&quot;375&quot; instrument_node=&quot;&quot;&gt;
It is important for us to tell this story moving forward.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;371&quot;&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;Generally, people have reduced African American history to a very low common denominator. If you said African or black American in 19th century, everybody would say ‘slaves’. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;370&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;368&quot;&gt;&lt;span data-dcnode-id=&quot;369&quot; instrument_node=&quot;&quot;&gt;It is really important that we create this rich and diverse tapestry of African American life in the 19th century, &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;365&quot;&gt;&lt;span data-dcnode-id=&quot;366&quot; instrument_node=&quot;&quot;&gt;So, I think seeing this history is very important for blacks today to understand and recognise as part of their history and not just that ‘oh we were once slaves in the South’. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;360&quot;&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;Rev. Kimberly L. Detherage Esq.&lt;/span&gt;&lt;br data-dcnode-id=&quot;362&quot;&gt;&lt;span data-dcnode-id=&quot;361&quot; instrument_node=&quot;&quot;&gt;
The discovery of the Iron Coffin Lady was actually no accident. You know that God allowed her to be discovered at such a time as this. That the community, that is changing, might be able to learn and understand more about the African American community, and the work and the contributions that African Americans have made to New York City and Queens.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;359&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;357&quot;&gt;&lt;span data-dcnode-id=&quot;358&quot; instrument_node=&quot;&quot;&gt;Our history has been erased, so we don’t get to see this. We don’t get to see real photos. We may see a Harriet Tubman or Sojourner Truth, but we don’t get to see a woman, just an ordinary, everyday woman who lived life in New York day by day.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;356&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;354&quot;&gt;&lt;span data-dcnode-id=&quot;355&quot; instrument_node=&quot;&quot;&gt;But we can identify with her because she does look like us. And so, it does make it personal. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;351&quot;&gt;&lt;span data-dcnode-id=&quot;352&quot; instrument_node=&quot;&quot;&gt;Her life is a testament to our life.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;350&quot; instrument_node=&quot;&quot;&gt;
