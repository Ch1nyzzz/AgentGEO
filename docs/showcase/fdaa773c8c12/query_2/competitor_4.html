&lt;/span&gt;&lt;p data-dcnode-id=&quot;5882&quot;&gt;&lt;span data-dcnode-id=&quot;5883&quot; instrument_node=&quot;&quot;&gt;England is rich in history and, with the British monarchy being one of the oldest in the world, it has many interesting English landmarks that are sure to make anyone visiting fall in love with the place. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5881&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;5879&quot;&gt;&lt;span data-dcnode-id=&quot;5880&quot; instrument_node=&quot;&quot;&gt;Historical buildings aside, the country is full of areas of outstanding natural beauty (AONBs) that are balanced by the ultra-modern architecture found in several cities and towns all around England. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5878&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;5876&quot;&gt;&lt;span data-dcnode-id=&quot;5877&quot; instrument_node=&quot;&quot;&gt;The small size of England may fool some travellers into thinking it may not have many things to do and sights to see, but it is a country that bursts with fascinating sights and century-old castles. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5875&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;5327&quot;&gt;&lt;span data-dcnode-id=&quot;5328&quot; instrument_node=&quot;&quot;&gt;This mighty stone wall stretches 129 km from coast to coast in northern England and took 6 years to complete. It is listed as a UNESCO heritage site and attracts tons of tourists every year. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5326&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;5136&quot;&gt;&lt;span data-dcnode-id=&quot;5137&quot; instrument_node=&quot;&quot;&gt;You can come any time from 11 am to 3 pm Monday through Saturday, while on Sunday, the Coventry Catherdral is open from 12 pm to 3 pm. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5135&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;5133&quot;&gt;&lt;span data-dcnode-id=&quot;5134&quot; instrument_node=&quot;&quot;&gt;There are no entry fees that need to be paid to enter the Coventry Cathedral, but visitors can always donate if they so choose to help with the upkeep of the place.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;5132&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4995&quot;&gt;&lt;span data-dcnode-id=&quot;4999&quot; instrument_node=&quot;&quot;&gt;On the outskirts of Gateshead, looking over the A1 road on the mound of an abandoned coal mine, stands a colossal steel sculpture. The Angel of the North has been here since 1998 and was built by the artist &lt;/span&gt;&lt;a data-dcnode-id=&quot;4997&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.antonygormley.com/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;Antony Gormley&quot;&gt;&lt;span data-dcnode-id=&quot;4998&quot; instrument_node=&quot;&quot;&gt;Antony Gormley&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4996&quot; instrument_node=&quot;&quot;&gt;. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4994&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4992&quot;&gt;&lt;span data-dcnode-id=&quot;4993&quot; instrument_node=&quot;&quot;&gt;It was once a controversial piece of art, but it soon became a famous monument of England. Visitors and locals flock to this sculpture to take a few pictures and marvel at its sheer size. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4989&quot;&gt;&lt;span data-dcnode-id=&quot;4990&quot; instrument_node=&quot;&quot;&gt;The angel's wingspan is as wide as a Boeing 747 at 54 metres, and it stands 20 metres tall. While driving on the A1 road, you can see it, but stop and take a few pictures to appreciate its grandeur.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4988&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4889&quot;&gt;&lt;span data-dcnode-id=&quot;4893&quot; instrument_node=&quot;&quot;&gt;For even more adventures, a trip to the Peak District should be at the top of everyone's list as it's only 40 minutes from Manchester. There are so many &lt;/span&gt;&lt;a data-dcnode-id=&quot;4891&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//sophiessuitcase.com/best-walks-peak-district/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;walks in the Peak District&quot;&gt;&lt;span data-dcnode-id=&quot;4892&quot; instrument_node=&quot;&quot;&gt;walks in the Peak District&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4890&quot; instrument_node=&quot;&quot;&gt; to enjoy, including Kinder Scout, Mam Tor, and Winnats Pass.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4888&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4809&quot;&gt;&lt;span data-dcnode-id=&quot;4813&quot; instrument_node=&quot;&quot;&gt;One of the most famous places in England, let alone Manchester, St Peter's Square is home to many buildings that have historical origins. The gothic-style &lt;/span&gt;&lt;a data-dcnode-id=&quot;4811&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.manchester.gov.uk/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;Manchester Town Hall&quot;&gt;&lt;span data-dcnode-id=&quot;4812&quot; instrument_node=&quot;&quot;&gt;Manchester Town Hall&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4810&quot; instrument_node=&quot;&quot;&gt; can be found here, which was built in 1938. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4808&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4806&quot;&gt;&lt;span data-dcnode-id=&quot;4807&quot; instrument_node=&quot;&quot;&gt;St Peter's Square, with a vast history of its own, is also where you will find the Midland Hotel. Adolf Hitler is reported to have avoided bombing near it because he wanted it to become the headquarters for the Nazis in England. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4805&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4803&quot;&gt;&lt;span data-dcnode-id=&quot;4804&quot; instrument_node=&quot;&quot;&gt;Visitors can visit all these buildings and see the Manchester Cenotaph that was erected in 1924 after the First World War.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4802&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4718&quot;&gt;&lt;span data-dcnode-id=&quot;4719&quot; instrument_node=&quot;&quot;&gt;Located on the north bank of the Thames, the Tower of London is one of the well-known historical places in England. It is steeped in rich history, having been in existence since 1078. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4717&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4712&quot;&gt;&lt;span data-dcnode-id=&quot;4716&quot; instrument_node=&quot;&quot;&gt;The tower was built by &lt;/span&gt;&lt;a data-dcnode-id=&quot;4714&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.royal.uk/william-the-conqueror&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;William the Conqueror&quot;&gt;&lt;span data-dcnode-id=&quot;4715&quot; instrument_node=&quot;&quot;&gt;William the Conqueror&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4713&quot; instrument_node=&quot;&quot;&gt; and has worn many hats during its prime days. It was used as a prison, a palace, a treasure vault, an observatory, and a menagerie (a place where a private collection of wild animals are kept for public view). &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4711&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4709&quot;&gt;&lt;span data-dcnode-id=&quot;4710&quot; instrument_node=&quot;&quot;&gt;The Tower of London has a lot of exciting exhibits that will keep you busy for hours. One of the world's oldest visitor attractions, the Line of Kings, has been showcasing royal armour in all its glory since 1652.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4708&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4706&quot;&gt;&lt;span data-dcnode-id=&quot;4707&quot; instrument_node=&quot;&quot;&gt;While at this attraction, you can visit the White Tower, the Bloody Tower, and the Traitor's Gate that displays the mesmerising Crown Jewels.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4705&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4280&quot;&gt;&lt;span data-dcnode-id=&quot;4284&quot; instrument_node=&quot;&quot;&gt;A famous monument in England, Big Ben, is one of the most visited and known landmarks of the country. It is located at the north end of Westminster Palace and is a must on any &lt;/span&gt;&lt;a data-dcnode-id=&quot;4282&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.destguides.com/en/itineraries/united-kingdom/england/london/4-days-in-london-itinerary&quot; title=&quot;London itinerary&quot;&gt;&lt;span data-dcnode-id=&quot;4283&quot; instrument_node=&quot;&quot;&gt;London itinerary&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4281&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4279&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4277&quot;&gt;&lt;span data-dcnode-id=&quot;4278&quot; instrument_node=&quot;&quot;&gt;Formerly known as the Clock Tower, it was renamed to celebrate the Queen's Diamond Jubilee in 2012 and is now known as the Elizabeth Tower. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4276&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4177&quot;&gt;&lt;span data-dcnode-id=&quot;4181&quot; instrument_node=&quot;&quot;&gt;After the original Gothic cathedral was burnt down in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4179&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.london-fire.gov.uk/museum/history-and-stories/the-great-fire-of-london/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;Great Fire of London&quot;&gt;&lt;span data-dcnode-id=&quot;4180&quot; instrument_node=&quot;&quot;&gt;Great Fire of London&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4178&quot; instrument_node=&quot;&quot;&gt; in 1666, this structure was constructed in its place. For any Royal fans out there, this is a popular place to visit as it is where Lady Diana Spencer and Prince Charles got married. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4176&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4174&quot;&gt;&lt;span data-dcnode-id=&quot;4175&quot; instrument_node=&quot;&quot;&gt;Visitors can take the 259 steps inside St Paul's Cathedral to the Whispering Gallery within the dome's interior. The Golden Gallery on the outside offers stunning views of the city around. The resting place of Wren is deep inside the cathedral's crypt as well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4173&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4089&quot;&gt;&lt;span data-dcnode-id=&quot;4090&quot; instrument_node=&quot;&quot;&gt;One of the most beautiful things about the Greater London area is the grand Hyde Park that sits in the middle of the busy city. It provides an escape from the hustle and bustle of the city and is steeped in rich history. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4086&quot;&gt;&lt;span data-dcnode-id=&quot;4087&quot; instrument_node=&quot;&quot;&gt;Hyde Park is one of 8 royal parks and covers an area of over 350 acres. It has a network of paths linking gardens, sculptures, historic sites, and fountains. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4085&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4080&quot;&gt;&lt;span data-dcnode-id=&quot;4084&quot; instrument_node=&quot;&quot;&gt;It has served as a royal hunting ground for &lt;/span&gt;&lt;a data-dcnode-id=&quot;4082&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.royal.uk/henry-viii&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;Henry VIII&quot;&gt;&lt;span data-dcnode-id=&quot;4083&quot; instrument_node=&quot;&quot;&gt;Henry VIII&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4081&quot; instrument_node=&quot;&quot;&gt; and was owned by the monks on Westminster Abbey until 1536. Apart from the history that this park has, the sheer grandeur is enough to warrant a visit. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4079&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4077&quot;&gt;&lt;span data-dcnode-id=&quot;4078&quot; instrument_node=&quot;&quot;&gt;Walk along the paths and discover hidden historical gems and new art installations that pop up every now and then. Watch the ducks and enjoy a picnic with your family for the perfect day in Hyde Park.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4076&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3980&quot;&gt;&lt;span data-dcnode-id=&quot;3981&quot; instrument_node=&quot;&quot;&gt;The Palace of Westminster is one of the most famous landmarks in England and has been the site of many infamous trials, political rallies and has even survived the notorious Gunpowder Plot.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3979&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;3070&quot;&gt;&lt;span data-dcnode-id=&quot;3071&quot; instrument_node=&quot;&quot;&gt;One of the most popular landmarks of England, especially in the summertime, Glastonbury Tor can be seen for miles around. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3069&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3067&quot;&gt;&lt;span data-dcnode-id=&quot;3068&quot; instrument_node=&quot;&quot;&gt;On top of this rounded hill sits a topless Grade 1 listed church steeped in pagan history. Tor means a cone-shaped hill in Celtic, which gives Glastonbury Tor its name. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3066&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3064&quot;&gt;&lt;span data-dcnode-id=&quot;3065&quot; instrument_node=&quot;&quot;&gt;Glastonbury Tor has been a popular spiritual sight in England for thousands of years. The church atop the hill is topless and was dedicated to Saint Michael in the fourteenth century. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3063&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3061&quot;&gt;&lt;span data-dcnode-id=&quot;3062&quot; instrument_node=&quot;&quot;&gt;From the top of the hill, visitors can enjoy the beautiful views of the Somerset countryside and, in the evenings, enjoy the sunset from this excellent vantage point. Glastonbury is owned by the National Trust and is free to visit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3060&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;2603&quot;&gt;&lt;span data-dcnode-id=&quot;2607&quot; instrument_node=&quot;&quot;&gt;Salisbury Cathedral is known as the Cathedral Church of the Blessed Virgin Mary and has the tallest spire in all of England. It has one of the four surviving original copies of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2605&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.parliament.uk/about/living-heritage/evolutionofparliament/originsofparliament/birthofparliament/overview/magnacarta/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;Magna Carta&quot;&gt;&lt;span data-dcnode-id=&quot;2606&quot; instrument_node=&quot;&quot;&gt;Magna Carta&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2604&quot; instrument_node=&quot;&quot;&gt; and has become one of the most famous monuments in England. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2600&quot;&gt;&lt;span data-dcnode-id=&quot;2601&quot; instrument_node=&quot;&quot;&gt;Visitors to the cathedral can see the oldest working clock in Europe. It also has the largest cathedral cloisters and cathedral close as well as the highest vault in the country. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2597&quot;&gt;&lt;span data-dcnode-id=&quot;2598&quot; instrument_node=&quot;&quot;&gt;The Salisbury Cathedral is one of those landmarks that you need to visit in your time in England, the sheer grandeur of the cathedral is enough to leave you awe-struck. The details, shapes, and patterns inside are stunning and rich in history since its completion in 1258.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2596&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;2277&quot;&gt;&lt;span data-dcnode-id=&quot;2278&quot; instrument_node=&quot;&quot;&gt;Visitors will have to wait for low tide days as the granite causeway used to access this fortress only becomes accessible then. If you don't want to wait, you can always try and find a boat to take you across. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2276&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1539&quot;&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;Another one of the famous landmarks of England that were built by William the Conqueror, Windsor Castle is the Queen's usual place for a weekend retreat. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1536&quot;&gt;&lt;span data-dcnode-id=&quot;1537&quot; instrument_node=&quot;&quot;&gt;Windsor Castle was built in the 1070s and sits high above the River Thames on the edge of the Saxon hunting ground. It is the world's oldest and largest occupied castle. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1530&quot;&gt;&lt;span data-dcnode-id=&quot;1534&quot; instrument_node=&quot;&quot;&gt;Inside the castle are some of the most lavish rooms you may ever see in your life. It has its own chapel, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1532&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.royal.uk/st-georges-chapel&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;St George's Chapel&quot;&gt;&lt;span data-dcnode-id=&quot;1533&quot; instrument_node=&quot;&quot;&gt;St George's Chapel&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1531&quot; instrument_node=&quot;&quot;&gt;, which has hosted many royal weddings. More recently, it was the chapel of choice for Prince Harry and Meghan Markle.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1529&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1439&quot;&gt;&lt;span data-dcnode-id=&quot;1443&quot; instrument_node=&quot;&quot;&gt;The structure was built by Abraham Darby III, based on the design by a local architect, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1441&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Farnolls_Pritchard&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;Thomas Farnolls Pritchard&quot;&gt;&lt;span data-dcnode-id=&quot;1442&quot; instrument_node=&quot;&quot;&gt;Thomas Farnolls Pritchard&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1440&quot; instrument_node=&quot;&quot;&gt;. The bridge is 30 metres long and opened in 1781. It closed for crossing in 1934 for restoration, but it opened up again recently in 2019. Take a walk across the bridge to feel like a part of history.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1438&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1348&quot;&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt;Visitors can go through the museum that covers the history of the slave trade in England. The whole area was regenerated in the 1980s, and it is one of the most famous landmarks in England.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1167&quot;&gt;&lt;span data-dcnode-id=&quot;1168&quot; instrument_node=&quot;&quot;&gt;One of the earliest centres of English Christianity, this small island off the Northumbrian coast is a great stop to add to your England itinerary. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1161&quot;&gt;&lt;span data-dcnode-id=&quot;1165&quot; instrument_node=&quot;&quot;&gt;The first settlement on Holy Island dates back to AD 653, and Irish monks built it. One of the monks was &lt;/span&gt;&lt;a data-dcnode-id=&quot;1163&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Cuthbert&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;Cuthbert&quot;&gt;&lt;span data-dcnode-id=&quot;1164&quot; instrument_node=&quot;&quot;&gt;Cuthbert&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1162&quot; instrument_node=&quot;&quot;&gt;, one of the most important saints in Northern England during the Middle Ages. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1160&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1158&quot;&gt;&lt;span data-dcnode-id=&quot;1159&quot; instrument_node=&quot;&quot;&gt;The Island was abandoned in AD 793 after Vikings raided it. The ruins there today are from the 12th century and were built by monks who had returned to Holy Island.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1157&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1070&quot;&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;It has since then been the seat of the Duke and Duchess of Marlborough and a home for the Churchill family. Winston Churchill was born in this very palace as well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1067&quot;&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;Much of Winston Churchill's life was spent here, and he even proposed to his wife in the Blenheim Palace. It is a magnificent piece of Baroque architecture and is surrounded by lush gardens all around.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1066&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;976&quot;&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;At the end of both the world wars, these cliffs were the first sign of home for the soldiers returning from the war. That is why they are known as the gateway to Britain and have become a symbol of hope. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;970&quot;&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;The National Trust protects the White Cliffs of Dover, and visitors can enjoy various historical sites along the coastline. The views of the English Channel and the Victorian &lt;/span&gt;&lt;a data-dcnode-id=&quot;972&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nationaltrust.org.uk/south-foreland-lighthouse&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot; title=&quot;South Foreland Lighthouse&quot;&gt;&lt;span data-dcnode-id=&quot;973&quot; instrument_node=&quot;&quot;&gt;South Foreland Lighthouse&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt; are stunning from these cliffs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;969&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;713&quot;&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;One of England's greatest Neolithic landmarks, the Stone Circle, is another strange arrangement that has fast become very popular with tourists. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;710&quot;&gt;&lt;span data-dcnode-id=&quot;711&quot; instrument_node=&quot;&quot;&gt;It is a UNESCO world heritage site due to its prehistoric origins. The stone circles were created by farming communities in the region in a shape called a henge.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;709&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;707&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;During the Middle Ages, a village grew among the stones, and some rocks were used for building materials. Other stones were destroyed as they were thought to be associated with paganism and devil worship. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;619&quot;&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;The stunning Gloucester Cathedral is one of the most famous landmarks in England. It was built in 1100 as a Norman abbey church and stayed intact due to its historical connections with the monarchy. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;618&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;616&quot;&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;One of the largest medieval stained glass windows in England, as well as an elegant and classical gothic interior, can be found in the Gloucester Cathedral. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;613&quot;&gt;&lt;span data-dcnode-id=&quot;614&quot; instrument_node=&quot;&quot;&gt;It is the site of Henry II and Henry VIII's coronations and the only cathedral that accepted Edward II's body after his death, serving as his burial site. For any movie buffs out there, this is also where many parts of Harry Potter were filmed.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;612&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;599&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;From the variety of cathedrals and castles to the stunning natural landscapes, England has something for everyone. There are so many attractions steeped in royal history and will leave you feeling like you've stepped back in time too. &lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;598&quot; instrument_node=&quot;&quot;&gt;
