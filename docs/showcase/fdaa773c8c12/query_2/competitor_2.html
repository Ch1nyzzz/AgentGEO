&lt;/span&gt;&lt;div class=&quot;appeared&quot; data-dcnode-id=&quot;4047&quot;&gt;&lt;span data-dcnode-id=&quot;4051&quot; instrument_node=&quot;&quot;&gt;This article first appeared in City &amp;amp; Country, The Edge Malaysia Weekly, on &lt;/span&gt;&lt;span class=&quot;date-display-single&quot; content=&quot;2021-11-15T00:00:00+08:00&quot; data-dcnode-id=&quot;4049&quot; datatype=&quot;xsd:dateTime&quot; property=&quot;dc:date&quot;&gt;&lt;span data-dcnode-id=&quot;4050&quot; instrument_node=&quot;&quot;&gt;November 15, 2021&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;4048&quot; instrument_node=&quot;&quot;&gt; - November 21, 2021.&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4046&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-getimage&quot; data-dcnode-id=&quot;4043&quot;&gt;&lt;center data-dcnode-id=&quot;4044&quot;&gt;&lt;img alt=&quot;The cultural and historical significance of Old Melaka&quot; data-dcnode-id=&quot;4045&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/CC6_Melaka_TEM1396_20211111173256_theedgemarkets.jpg%3FU1l.BH2uUPDYrtAgkh46ArPRLelUcIuW&amp;amp;raw&quot;&gt;&lt;/center&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4042&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;text-size&quot; data-dcnode-id=&quot;4026&quot;&gt;&lt;div class=&quot;text-inner&quot; data-dcnode-id=&quot;4027&quot;&gt;&lt;span data-dcnode-id=&quot;4041&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;changer&quot; data-dcnode-id=&quot;4037&quot; href=&quot;javascript:;&quot; id=&quot;text_resize_decrease&quot;&gt;&lt;sup data-dcnode-id=&quot;4039&quot;&gt;&lt;span data-dcnode-id=&quot;4040&quot; instrument_node=&quot;&quot;&gt;-&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4038&quot; instrument_node=&quot;&quot;&gt;A&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4036&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img class=&quot;text-a&quot; data-dcnode-id=&quot;4035&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.theedgemarkets.com/sites/all/modules/text_resize/a.gif&amp;amp;raw&quot;&gt;&lt;span data-dcnode-id=&quot;4034&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;changer&quot; data-dcnode-id=&quot;4030&quot; href=&quot;javascript:;&quot; id=&quot;text_resize_increase&quot;&gt;&lt;sup data-dcnode-id=&quot;4032&quot;&gt;&lt;span data-dcnode-id=&quot;4033&quot; instrument_node=&quot;&quot;&gt;+&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4031&quot; instrument_node=&quot;&quot;&gt;A&lt;/span&gt;&lt;/a&gt;&lt;div data-dcnode-id=&quot;4029&quot; id=&quot;text_resize_clear&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4028&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4025&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;field field-name-body field-type-text-with-summary field-label-hidden&quot; data-dcnode-id=&quot;3905&quot;&gt;&lt;div class=&quot;field-items&quot; data-dcnode-id=&quot;3906&quot;&gt;&lt;div class=&quot;field-item even&quot; data-dcnode-id=&quot;3907&quot; property=&quot;content:encoded&quot;&gt;&lt;p data-dcnode-id=&quot;4023&quot;&gt;&lt;span data-dcnode-id=&quot;4024&quot; instrument_node=&quot;&quot;&gt;A city rich in culture and heritage, Melaka is one of the most attractive tourist destinations in Malaysia. From its humble beginnings as a coastal village, it would go on to become the setting of the glorious tales of the Melaka Sultanate and later, part of the country’s colonial past with the Portuguese, Dutch and British all leaving a mark in this Unesco World Heritage Site. We explore Old Melaka and its many historical attractions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4022&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt-3 imgw-300 embed-left&quot; data-dcnode-id=&quot;4019&quot;&gt;&lt;a class=&quot;mobx embedimg-icon&quot; data-dcnode-id=&quot;4020&quot; data-rel=&quot;ceolightbox&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_1_TEM1396_theedgemarkets.jpg&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;4021&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_1_TEM1396_theedgemarkets.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4016&quot;&gt;&lt;span data-dcnode-id=&quot;4017&quot; instrument_node=&quot;&quot;&gt;1 Stadthuys&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4015&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4013&quot;&gt;&lt;span data-dcnode-id=&quot;4014&quot; instrument_node=&quot;&quot;&gt;Located opposite Jonker Street and adjacent to the Christ Church, the Stadthuys is one of the most historical sites in the city of Melaka. Built between 1641 and 1660 on the ruins of a Portuguese fort, the Stadthuys was the focus point of several successive governments for more than 300 years, from its completion until 1980.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4012&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4010&quot;&gt;&lt;span data-dcnode-id=&quot;4011&quot; instrument_node=&quot;&quot;&gt;In 1982, the Stadthuys was converted into a museum and currently showcases Melaka’s history, starting with the great Malay Sultanate, the arrivals of the Portuguese, Dutch and British, until the present day. It displays typical features of Dutch colonial architecture — massive walls, louvred windows and chunky doors with wrought-iron hinges, according to malacca.attractionsinmalaysia.com.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4009&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt-3 imgw-300 embed-left&quot; data-dcnode-id=&quot;4006&quot;&gt;&lt;a class=&quot;mobx embedimg-icon&quot; data-dcnode-id=&quot;4007&quot; data-rel=&quot;ceolightbox&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_2_TEM1396_theedgemarkets.jpg&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;4008&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_2_TEM1396_theedgemarkets.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;4005&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4003&quot;&gt;&lt;span data-dcnode-id=&quot;4004&quot; instrument_node=&quot;&quot;&gt;2 &amp;nbsp;Christ Church&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4002&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4000&quot;&gt;&lt;span data-dcnode-id=&quot;4001&quot; instrument_node=&quot;&quot;&gt;Situated opposite the Stadthuys, the Christ Church is an instantly recognisable brick-red building with a huge white cross at the top. It was built to commemorate a century of Dutch rule in Melaka. Construction of the church started in 1741 and was completed in 1753, making it the oldest Protestant church in Malaysia. The interior of the church has 200-year-old handmade pews, decorative fanlights and plaques that honour Dutch soldiers and locals.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3999&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3997&quot;&gt;&lt;span data-dcnode-id=&quot;3998&quot; instrument_node=&quot;&quot;&gt;Apart from its commemorative purpose, the Christ Church was constructed by and for the Dutch after they conquered Melaka as another place of worship, apart from St Paul’s Church, which is a small chapel located on St Paul’s Hill. Later, when the British took over Melaka, a weathercock and bell were added to the church and it was transformed into an Anglican house of worship, according to malacca.ws.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3996&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt-3 imgw-300 embed-left&quot; data-dcnode-id=&quot;3993&quot;&gt;&lt;a class=&quot;mobx embedimg-icon&quot; data-dcnode-id=&quot;3994&quot; data-rel=&quot;ceolightbox&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_3_TEM1396_theedgemarkets.jpg&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;3995&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_3_TEM1396_theedgemarkets.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3992&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;3990&quot;&gt;&lt;span data-dcnode-id=&quot;3991&quot; instrument_node=&quot;&quot;&gt;3 &amp;nbsp;St Paul’s Church&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;3989&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3987&quot;&gt;&lt;span data-dcnode-id=&quot;3988&quot; instrument_node=&quot;&quot;&gt;The historic St Paul’s Church is located at the summit of St Paul’s Hill. Originally called the Nossa Senhora da Anunciada (Our Lady of the Annunciation), it was constructed by Portuguese fidalgo or nobleman captain Duarte Coelho, in gratitude to the Virgin Mary for saving his life in the South China Sea in 1521.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3986&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3984&quot;&gt;&lt;span data-dcnode-id=&quot;3985&quot; instrument_node=&quot;&quot;&gt;When the Dutch invaded Melaka in 1641, the church was badly damaged and the belfry tower was destroyed. It was later repaired and renamed St Paul’s Church, and used as a Protestant church for about 112 years until Christ Church was completed in 1753.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3983&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt-3 imgw-300 embed-right&quot; data-dcnode-id=&quot;3976&quot;&gt;&lt;span data-dcnode-id=&quot;3982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;mobx embedimg-icon&quot; data-dcnode-id=&quot;3978&quot; data-rel=&quot;ceolightbox&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_MelakaMap_TEM1396_theedgemarkets.jpg&quot;&gt;&lt;br data-dcnode-id=&quot;3981&quot;&gt;&lt;span data-dcnode-id=&quot;3980&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;3979&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_MelakaMap_TEM1396_theedgemarkets.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3977&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3973&quot;&gt;&lt;span data-dcnode-id=&quot;3974&quot; instrument_node=&quot;&quot;&gt;According to malacca.ws, the church was enlarged to two storeys in 1556, after the Archbishop of Goa in India handed over the church to the Jesuits in 1548, while gun turrets were added to the chapel by the Portuguese between 1567 and 1596, which ultimately became a fortress. In 1590, a belfry tower was added to the front of the church and it was renamed Igreja de Madre de Deus (Church of the Mother of God).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3972&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3970&quot;&gt;&lt;span data-dcnode-id=&quot;3971&quot; instrument_node=&quot;&quot;&gt;After its construction, the church was often visited by the well-known Jesuit missionary St Francis Xavier, who preached there off and on for 12 years. Following his death off the coast of China on Shangchuan Island in 1552, his body was temporarily interred in the burial vault of St Paul’s Church from March to December 1553, before being transferred to Portuguese Goa on the west coast of India.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3969&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3967&quot;&gt;&lt;span data-dcnode-id=&quot;3968&quot; instrument_node=&quot;&quot;&gt;Today, a white marble statue of St Francis Xavier stands in front of St Paul’s Church. It was put here by the Archbishop of Malaya and Singapore to celebrate the fourth centenary of the temporary burial of Father Francis Xavier in this church.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3966&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt-3 imgw-300 embed-left&quot; data-dcnode-id=&quot;3963&quot;&gt;&lt;a class=&quot;mobx embedimg-icon&quot; data-dcnode-id=&quot;3964&quot; data-rel=&quot;ceolightbox&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_4_TEM1396_theedgemarkets.jpg&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;3965&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_4_TEM1396_theedgemarkets.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3962&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;3960&quot;&gt;&lt;span data-dcnode-id=&quot;3961&quot; instrument_node=&quot;&quot;&gt;4 &amp;nbsp;Porta De Santiago (A’Famosa)&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;3959&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3957&quot;&gt;&lt;span data-dcnode-id=&quot;3958&quot; instrument_node=&quot;&quot;&gt;The Porta De Santiago, or more commonly known as A’Famosa, is a major historical landmark located adjacent to the Stadthuys. It is one of the oldest surviving European architectural remains in Asia.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3956&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3954&quot;&gt;&lt;span data-dcnode-id=&quot;3955&quot; instrument_node=&quot;&quot;&gt;Built in 1511 under the command of general, admiral and statesman Alfonso de Albuquerque, the fortress was constructed to consolidate the Portuguese’s gains in Melaka after defeating the armies of the Melaka Sultanate. At the time, the Portuguese believed that Melaka would become a vital port that linked Portugal to the spice trade from China, according to malacca.attractionsinmalaysia.com.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3953&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3951&quot;&gt;&lt;span data-dcnode-id=&quot;3952&quot; instrument_node=&quot;&quot;&gt;A’Famosa used to house the entire Portuguese administration, including its hospitals, five churches, elongated stockades and four key towers in the 16th century. One tower was a four-storey keep, while the others included an ammunition storage room, captain’s residence and an officers’ quarters. The rest of the bastion comprised townhouses clustered inside the fortress walls, but was then expanded in 1586 to accommodate the growing population of Melaka.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3950&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3948&quot;&gt;&lt;span data-dcnode-id=&quot;3949&quot; instrument_node=&quot;&quot;&gt;The fort changed hands in 1641 when the Dutch successfully drove the Portuguese out of Melaka. What remains is largely the Dutch reconstruction as renovation works were carried out in 1670, following the siege. Now, one would be able to see a small inscription — ANNO 1670 — on the fort’s arch and the coat-of-arms of the Dutch East India Company (VOC), according to malacca.ws.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3947&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt-3 imgw-300 embed-left&quot; data-dcnode-id=&quot;3944&quot;&gt;&lt;a class=&quot;mobx embedimg-icon&quot; data-dcnode-id=&quot;3945&quot; data-rel=&quot;ceolightbox&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_5_TEM1396_theedgemarkets.jpg&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;3946&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_5_TEM1396_theedgemarkets.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3943&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;3941&quot;&gt;&lt;span data-dcnode-id=&quot;3942&quot; instrument_node=&quot;&quot;&gt;5 &amp;nbsp;Melaka Sultanate Palace Museum&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;3940&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3938&quot;&gt;&lt;span data-dcnode-id=&quot;3939&quot; instrument_node=&quot;&quot;&gt;The Melaka Sultanate Palace Museum is a wooden replica of the 15th century palace of the sixth Sultan of Melaka, Sultan Mansur Shah. Located at the bottom of St Paul’s Hill, it was constructed in 1984 using traditional construction techniques and materials, based on the annotations in the Malay Annals. The building was built entirely without nails and supported only with carved, wooden pillars as well as a copper and zinc roof.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3935&quot;&gt;&lt;span data-dcnode-id=&quot;3936&quot; instrument_node=&quot;&quot;&gt;The three-storey museum, which was opened in 1986, comprises about 1,350 artefacts, prints, photographs and drawings detailing the Melaka Malay Sultanate’s history and cultural heritage. It is divided into eight chambers with a variety of weaponry, decorative arts, traditional costumes, brassware and jewellery. There are also three galleries depicting famous legends through dioramas, such as the famous clash between legendary Melaka warriors Hang Tuah and Hang Jebat, according to malacca.ws.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3934&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt-3 imgw-300 embed-left&quot; data-dcnode-id=&quot;3931&quot;&gt;&lt;a class=&quot;mobx embedimg-icon&quot; data-dcnode-id=&quot;3932&quot; data-rel=&quot;ceolightbox&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_6_TEM1396_theedgemarkets.jpg&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;3933&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_6_TEM1396_theedgemarkets.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3930&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;3928&quot;&gt;&lt;span data-dcnode-id=&quot;3929&quot; instrument_node=&quot;&quot;&gt;6 &amp;nbsp;Proclamation of Independence Memorial&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;3927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3925&quot;&gt;&lt;span data-dcnode-id=&quot;3926&quot; instrument_node=&quot;&quot;&gt;Built in 1912 in an elegant Dutch colonial mansion, the two golden onion domes flanking the top of the Proclamation of Independence Memorial’s portico beautifully embellish the stark white stucco. The memorial building was set up and officiated by former prime minister Tunku Abdul Rahman on Aug 31, 1985 — 28 years after the independence of the country.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3924&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3922&quot;&gt;&lt;span data-dcnode-id=&quot;3923&quot; instrument_node=&quot;&quot;&gt;It showcases records and photographs of the early history of the Malay Sultanate, as well as permanent exhibits of historical photographs, dioramas, manuscripts, old currency, slide shows and films chronicling Malaysia’s fight for independence, which are displayed in chronological order, according to malacca.ws.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3921&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;mt-3 imgw-300 embed-left&quot; data-dcnode-id=&quot;3918&quot;&gt;&lt;a class=&quot;mobx embedimg-icon&quot; data-dcnode-id=&quot;3919&quot; data-rel=&quot;ceolightbox&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_7_TEM1396_theedgemarkets.jpg&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;3920&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//assets.theedgemarkets.com/pictures/CC6_Melaka_7_TEM1396_theedgemarkets.jpg&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3917&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;3915&quot;&gt;&lt;span data-dcnode-id=&quot;3916&quot; instrument_node=&quot;&quot;&gt;7 &amp;nbsp;Melaka River&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;3914&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3912&quot;&gt;&lt;span data-dcnode-id=&quot;3913&quot; instrument_node=&quot;&quot;&gt;Dubbed the “Venice of the East” by European seafarers, the Melaka River was a prominent port of entry for traders from Europe and Asia during the late 16th century. According to malacca.ws, the Melaka River winds its way from Dutch Square and goes past Tan Boon Seng Bridge. When the Portuguese invaded Melaka, they seized the bridge and cut off communications between the two sides of the river, effectively dividing Melaka into two, leading to the fall of the city to the Portuguese.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3911&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3909&quot;&gt;&lt;span data-dcnode-id=&quot;3910&quot; instrument_node=&quot;&quot;&gt;It is now a well-known tourist attraction, with a 45-minute river cruise offering scenic views of colonial buildings, antiquated shophouses, local settlements and ancient bridges, as well as modern decorations and local art displays.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3908&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field field-name-field-pullout-category field-type-list-text field-label-hidden&quot; data-dcnode-id=&quot;3902&quot;&gt;&lt;div class=&quot;field-items&quot; data-dcnode-id=&quot;3903&quot;&gt;&lt;div class=&quot;field-item even&quot; data-dcnode-id=&quot;3904&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3901&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;3899&quot; instrument_node=&quot;&quot;&gt;
