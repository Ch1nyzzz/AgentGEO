&lt;/div&gt;&lt;div class=&quot;loc article-content&quot;&gt;&lt;div id=&quot;article__primary-video-container_1-0&quot; class=&quot;comp article__primary-video-container mntl-block&quot;&gt;&lt;div id=&quot;article__primary-video-jw_1-0&quot; class=&quot;comp article__primary-video-jw mntl-jwplayer mm-video lazyload right-rail__offset aspectratio-16:9&quot; data-bgset=&quot;https://cdn.jwplayer.com/v2/media/Vs3klUDo/poster.jpg?width=720&quot; data-sizes=&quot;auto&quot;&gt; &lt;video class=&quot;mntl-jwplayer__video lazyload&quot; preload=&quot;none&quot; data-poster=&quot;https://cdn.jwplayer.com/v2/media/Vs3klUDo/poster.jpg?width=720&quot;&gt;&lt;/video&gt;
&lt;/div&gt;&lt;/div&gt;
&lt;div id=&quot;article-content_1-0&quot; class=&quot;comp article-content mntl-block&quot;&gt;&lt;div id=&quot;travelandleisure-sc-page_1-0&quot; class=&quot;comp travelandleisure-sc-page mntl-sc-page mntl-block structured-content&quot; data-sc-sticky-offset=&quot;90&quot; data-sc-ad-label-height=&quot;24&quot; data-sc-ad-track-spacing=&quot;100&quot; data-sc-min-track-height=&quot;250&quot; data-sc-max-track-height=&quot;600&quot; data-sc-breakpoint=&quot;50em&quot; data-sc-load-immediate=&quot;4&quot; data-sc-content-positions=&quot;[1, 1250, 1550, 1950, 2350, 2750, 3150, 3550, 3950]&quot; data-bind-scroll-on-start=&quot;true&quot;&gt;&lt;p id=&quot;mntl-sc-block_1-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; The Eiffel Tower was initially intended to be a temporary installation for the 1889 Paris Exposition, but it has become an iconic landmark in the French capital against all odds.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_2-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;p id=&quot;mntl-sc-block_3-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; For starters, the Iron Lady almost wasn’t built: a coalition of famous artists criticized and protested the monument’s construction. But Gustave Eiffel’s civil engineering firm forged ahead with their winning design, which used a staggering 7,300 tons of iron and 2.5 million rivets to execute. It took two years, two months, and five days to finish. Today, it&amp;#39;s one of the most popular landmarks in the world, receiving nearly 7 million visitors per year.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_4-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;p id=&quot;mntl-sc-block_5-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; And while you might think you know the Eiffel Tower, it&amp;#39;s not without its secrets. It has changed color and size throughout the decades and even played a pivotal role in World War I.&lt;br/&gt;
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_6-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;p id=&quot;mntl-sc-block_7-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; Here are our favorite little-known facts about the Eiffel Tower.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_8-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;

&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-tower-almost-went-by-a-different-name&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_10-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower almost went by a different name. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_11-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; When Gustave Eiffel was working on the project in 1885, he initially named the monument the &amp;#34;300-Meter Iron Tower”—quite the mouthful, even if it sounds slightly more melodious in French. In casual conversation, it began to be referred to as “Mr. Eiffel’s Tower,” and “the Eiffel Tower” quickly took over the popular lexicon.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_12-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;div id=&quot;mntl-sc-block_13-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-digiohembed&quot;&gt; &lt;div

data-title=&quot;&quot;
&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div id=&quot;mntl-sc-block_14-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-french-artists-tried-to-prevent-it-from-being-built&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_15-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; French artists tried to prevent it from being built. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_16-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; From conception to construction, the Eiffel Tower was the &lt;a href=&quot;https://www.toureiffel.paris/en/news/history-and-culture/when-eiffel-tower-was-subject-controversy&quot; data-component=&quot;link&quot; data-source=&quot;inlineLink&quot; data-type=&quot;externalLink&quot; data-ordinal=&quot;1&quot;&gt;source of deep controversy&lt;/a&gt; among Parisians. A few well-known creatives—including architect Charles Garnier, novelist Alexandre Dumas, and playwright Guy de Maupassant—banded together in 1887 to write a letter to decry the tower as “a gigantic black factory chimney.&quot;
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_17-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;p id=&quot;mntl-sc-block_18-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; While some of these artists later retracted their disparagements, others doubled down after the monument’s completion—such as Maupassant, who famously dined at the Eiffel Tower’s restaurant almost daily in order to avoid having to look at it.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_19-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;

&lt;span class=&quot;heading-toc&quot; id=&quot;toc-gustave-eiffel-didnt-actually-design-it&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_21-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; Gustave Eiffel didn’t actually design it. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_22-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; Despite the Tower being his namesake, Eiffel didn&amp;#39;t design it himself. Maurice Koechlin and Emile Nouguier, two engineers who worked for his company, were the masterminds behind the structure. At first, Eiffel vetoed their initial sketch, finding it too utilitarian. He then brought on architect Stephen Sauvestre to improve the overall aesthetics of the project. In the end, the team’s ideas beat over 100 other projects, and it was selected as the main attraction of the 1889 World’s Fair. But while he wasn’t the technical designer of the tower, Eiffel was its biggest champion and protector.&lt;br/&gt;
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_23-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-its-covered-in-the-names-of-scientists&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_24-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It&amp;#39;s covered in the names of scientists. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_25-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; Eiffel and his engineers aren’t the only ones whose names are inextricably linked to the tower—72 French scientists and engineers’ names are engraved into the iron that surrounds the Tower’s first floor, including physicist Léon Foucault, chemist Jean-Baptiste Dumas, and geographer and mathematician François Perrier. While the names were painted over in the early 20th century, they were restored in the 1980s.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_26-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;div id=&quot;mntl-sc-block_27-0&quot; class=&quot;comp mntl-sc-block mm-video-sc-block-medianetbytes--dynamic-midcirc mntl-block&quot;&gt;&lt;div id=&quot;mm-video-medianet-bytes_1-0&quot; class=&quot;comp mm-video-medianet-bytes&quot; data-medianet-bytes-dimensions=&quot;700x285&quot; data-medianet-bytes-creative-tag-id=&quot;282094339&quot; style=&quot;--medianet-placeholder-height: 285px&quot; data-domain=&quot;travelandleisure.com&quot; data-medianet-bytes-domain=&quot;bytes.travelandleisure.com&quot;&gt; &lt;div class=&quot;mm-video-medianet-bytes__placeholder&quot;&gt;&lt;/div&gt;
&lt;div id=&quot;mm-video-medianet-bytes_1-0-embed&quot; class=&quot;mm-video-medianet-bytes__embed-container&quot;&gt;&lt;/div&gt;
&lt;/div&gt;&lt;/div&gt;
&lt;div id=&quot;mntl-sc-block_28-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-it-has-also-doubled-as-a-scientific-laboratory&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_29-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It has also doubled as a scientific laboratory. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_30-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; Part of what secured the tower&amp;#39;s design (and later saved it from destruction) was Eiffel’s insistence that it shouldn&amp;#39;t be purely for looks—it should have a scientific function as well. The day after its inauguration, Eiffel installed a meteorology lab on the third floor, where he performed physics and aerodynamics experiments. He also invited other scientists to use the lab for their studies. Ultimately, his approach helped secure the tower a longer lease on life.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_31-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;

&lt;span class=&quot;heading-toc&quot; id=&quot;toc-a-radio-antenna-saved-the-eiffel-tower-from-being-torn-down&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_33-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; A radio antenna saved the Eiffel Tower from being torn down. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_34-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; From the beginning, the Eiffel Tower was only supposed to remain up 20 years after the 1889 World’s Fair—it was supposed to be torn down afterward. Eiffel was &lt;em&gt;very &lt;/em&gt;aware of this and cleverly ensured the Tower’s existence by enhancing it with a radio antenna and a wireless telegraph transmitter. The Tower began transmitting radio signals locally at the turn of the 20th century, acting as a military radio post in 1903 and later helping France to defend itself from enemy attacks during the First World War. The radio’s usefulness secured the tower a 70-year extension on its lease—and by the time it was up in 1980, the monument’s iconic silhouette had become an irrevocable part of Paris’ skyline.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_35-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;

&lt;/div&gt;&lt;/div&gt;
&lt;div id=&quot;mntl-sc-block_37-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-tower-once-housed-a-post-office-and-a-theater&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_38-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower once housed a post office and a theater.  &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_39-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; Over the decades, the Iron Lady has been home to a rotating cast of businesses, some of which lasted as little as six months. Some businesses that have set up shop in the tower include the French newspaper Le Figaro; a post office; a radio station; and a wooden theater designed by Sauvestre. Today, the tower is home to restaurants, souvenir shops, and a Champagne bar. 
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_40-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;div id=&quot;mntl-sc-block_41-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-digiohembed&quot;&gt; &lt;div
id=&quot;lightbox-inline-form-763a2b8b-d359-4bd5-ac29-411e30709577&quot;
class=&quot;mntl-sc-block-digiohembed__container &quot;
data-guid=&quot;lightbox-inline-form-763a2b8b-d359-4bd5-ac29-411e30709577&quot;
data-title=&quot;Which European City Should You Visit Next?&quot;
&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div id=&quot;mntl-sc-block_42-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-towers-light-show-dates-back-100-years&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_43-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower’s light show dates back 100 years.  &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_44-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; Perhaps the most dazzling time of day to visit the Eiffel Tower is in the evenings when 20,000 bulbs illuminate the structure in a sparkling display. It’s been a century since the Tower’s first light show, which took place during the International Exhibition of Modern Decorative and Industrial Arts in 1925. For the occasion, automaker Andre Citröen financed an epic nighttime display of Zodiac symbols, comets, and his car brand’s name. Today, all 20,000 lights sparkle for the first five minutes of every hour beginning after dusk, with a grand finale at midnight or 1 a.m., depending on the time of year. 
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_45-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;p id=&quot;mntl-sc-block_46-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; While you’re free to snap as many personal photos as you’d like of the Eiffel Tower during the day and at night, the light show is protected by copyright under French law—professionals will need to request permission to use photos or videos of the display.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_47-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-it-was-almost-destroyed-during-world-war-ii&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_48-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It was almost destroyed during World War II. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_49-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; Towards the end of World War II, as the Nazi hold on occupied Paris was slipping and Allied troops were closing in, Adolf Hitler commanded his generals to level the city and destroy its most famous monuments with explosives—including the Eiffel Tower. Thankfully, Allied troops arrived before the orders were able to be carried out, and the tower was spared from extensive damage. On the top floor, you can find a plaque commemorating the liberation of Paris.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_50-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-tower-changes-size-with-the-seasons&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_51-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower changes size with the seasons. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_52-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; Paris has its own leaning tower of sorts—the Iron Lady, while sturdy and wind-resistant, sways during storms and tilts a few inches away from the sun on hot days. In the summer, the sun’s heat causes the iron to expand, adding a few millimeters to the tower’s overall height, while the metal shrinks infinitesimally in winter.
&lt;/p&gt;

&lt;span class=&quot;heading-toc&quot; id=&quot;toc-gustave-eiffel-had-a-penthouse-apartment-at-the-eiffel-tower&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_55-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; Gustave Eiffel had a penthouse apartment at the Eiffel Tower. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_56-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; As far as work perks go, securing your own pied à terre in the Eiffel Tower is hard to beat. Eiffel’s cozy abode was a private residence on the tower’s top floor that he used as a laboratory and to host luminaries, including Thomas Edison. Today, the space is open to the public, and you can pose with wax figures of Eiffel, his daughter, and Edison in the paisley-clad room.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_57-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;

&lt;span class=&quot;heading-toc&quot; id=&quot;toc-theres-a-champagne-bar-at-the-top&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_60-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; There’s a Champagne bar at the top. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_61-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; Is there anything more romantic than sipping Champagne while overlooking the City of Light? The &lt;a href=&quot;https://www.restaurants-toureiffel.com/&quot; data-component=&quot;link&quot; data-source=&quot;inlineLink&quot; data-type=&quot;externalLink&quot; data-ordinal=&quot;1&quot;&gt;Champagne Bar,&lt;/a&gt; located on the very top floor of the Eiffel Tower, is a perfect place to soak in the unobstructed views of the city below with a celebratory glass of bubbly in hand—a tipple particularly well-earned for those who opt to climb the tower’s dizzying steps.
&lt;/p&gt;

&lt;span class=&quot;heading-toc&quot; id=&quot;toc-it-was-sold-for-scraps-in-1925by-a-con-artist&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_64-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It was “sold” for scraps in 1925—by a con artist. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_65-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; In the wake of Eiffel’s death in 1923, the monument’s fate seemed uncertain. Inspired by rumors of declining attendance and the steep cost of upkeep, infamous con artist &lt;a href=&quot;https://www.smithsonianmag.com/history/man-who-sold-eiffel-tower-twice-180958370/&quot; data-component=&quot;link&quot; data-source=&quot;inlineLink&quot; data-type=&quot;externalLink&quot; data-ordinal=&quot;1&quot;&gt;Victor Lustig&lt;/a&gt; hatched a plan to impersonate a Parisian civil servant, sending seemingly official letters to scrap metal companies stating that the City of Paris was selling it for scraps.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_66-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;p id=&quot;mntl-sc-block_67-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; One unlucky man fell for the scam, but Lustig had already run off to Austria with the money. Ironically, he returned years later in an attempt to sell the tower once again. Lustig was eventually imprisoned in the United States at Alcatraz in 1935 and died there in 1947.
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_68-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-tower-was-once-the-tallest-building-in-the-world&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_69-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower was once the tallest building in the world. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_70-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; For four decades after its construction, the Iron Lady held the distinction of being the tallest building in the world, rising a dramatic 1,024 feet over Paris. In 1930, New York’s budding skyline cinched the record, first with the Chrysler Building (at 1,046 feet tall), followed by the Empire State Building’s 1931 debut, which clocked in at 1,250 feet tall.
&lt;/p&gt;

&lt;span class=&quot;heading-toc&quot; id=&quot;toc-its-changed-color-over-the-years&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_73-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; It’s changed color over the years. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_74-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; The tower gets a fresh paint job every seven years to protect against oxidation. It was initially covered with a shade of reddish brown and then spent its adolescent years—from 1892 to 1906—under a bright ochre hue. The current “Eiffel Tower Brown” was adopted in 1968 and was selected for its ability to blend in with the surrounding cityscape. And, in fact, it&amp;#39;s actually three shades of brown: the darkest color is at the bottom, while the lightest is at the top.&lt;br/&gt;
&lt;/p&gt;
&lt;div id=&quot;mntl-sc-block_75-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-adslot mntl-block&quot;&gt;&lt;/div&gt;
&lt;span class=&quot;heading-toc&quot; id=&quot;toc-the-eiffel-tower-is-ecofriendly&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;mntl-sc-block_76-0&quot; class=&quot;comp mntl-sc-block travelandleisure-sc-block-heading mntl-sc-block-heading&quot; style&gt; &lt;span class=&quot;mntl-sc-block-heading__text text-title-300&quot;&gt; The Eiffel Tower is ecofriendly. &lt;/span&gt; &lt;/h2&gt;
&lt;p id=&quot;mntl-sc-block_77-0&quot; class=&quot;comp mntl-sc-block mntl-sc-block-html&quot;&gt; The iconic landmark is more than just a pretty face—it’s also a beacon of renewable energy. In 2015, two vertical-axis wind turbines were installed on the tower’s second floor, suspended 400 feet above the ground in order to capture wind. These turbines, which are practically silent and were painted to blend in seamlessly with the tower, power the souvenir shop, restaurant, and other businesses on the tower’s first floor.
&lt;/p&gt;&lt;/div&gt;
