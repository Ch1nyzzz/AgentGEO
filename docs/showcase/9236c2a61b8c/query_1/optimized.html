gt;&lt;main class=&quot;evo-main pt-5 pb-5&quot;&gt;&lt;!--  USERBAR --&gt;&lt;section class=&quot;page__userbar mb-3 evo-userbar&quot;&gt;&lt;div class=&quot;container d-flex&quot;&gt;&lt;div class=&quot;flex-fill mr-auto evo-userbar-first&quot;&gt;&lt;div class=&quot;hidden&quot; data-drupal-messages-fallback=&quot;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;!--  USERBAR END --&gt;&lt;!--  PREFACE --&gt;&lt;!--  PREFACE END --&gt;&lt;!-- POPUP --&gt;&lt;!-- POPUP END --&gt;&lt;!-- CONTENT --&gt;&lt;div class=&quot;page__content evo-page-content&quot;&gt;&lt;div class=&quot;container&quot;&gt;&lt;section class=&quot;page__breadcrumb evo-breadcrumb&quot;&gt;&lt;div class=&quot;block block--drupaltheme58-grace-meng-breadcrumbs&quot;&gt;&lt;nav aria-label=&quot;breadcrumb&quot; class=&quot;&quot;&gt;&lt;ol class=&quot;breadcrumb&quot;&gt;&lt;li class=&quot;breadcrumb-item&quot;&gt;&lt;a href=&quot;/&quot;&gt;Home&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;breadcrumb-item&quot;&gt;&lt;a href=&quot;/media-center&quot;&gt;Media&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;breadcrumb-item&quot;&gt;&lt;a href=&quot;/media-center/press-releases&quot;&gt;Press Releases&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/nav&gt;&lt;/div&gt;&lt;/section&gt;&lt;div class=&quot;row&quot;&gt;&lt;div class=&quot;col evo-content&quot;&gt;&lt;a id=&quot;main-content&quot;&gt;&lt;/a&gt;&lt;div class=&quot;block block--drupaltheme58-grace-meng-page-title&quot;&gt;&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;h3 data-geo-id=&quot;geo-ef47b0af&quot;&gt;Key Highlights&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-2c53d202&quot;&gt;
&lt;li&gt;In the United States, the legal voting age is currently set at 18 years old, as established by the 26th Amendment to the U.S. Constitution in 1971 (&lt;a href=&quot;https://www.archives.gov/founding-docs/amendments-11-27#26&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;National Archives&lt;/a&gt;).&lt;/li&gt;
&lt;li&gt;Congresswoman Grace Meng has reintroduced legislation proposing to lower the federal voting age from 18 to 16 years old (&lt;a href=&quot;https://meng.house.gov/media/press-releases&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;Congresswoman Meng’s official press release, 2024&lt;/a&gt;).&lt;/li&gt;
&lt;li&gt;The proposed bill aims to expand youth enfranchisement by granting 16- and 17-year-olds the right to vote in federal elections, thereby increasing political participation among younger citizens.&lt;/li&gt;
&lt;li&gt;This legislative effort aligns with broader national and international discussions on voting age reform, emphasizing youth empowerment and enhanced democratic engagement (&lt;a href=&quot;https://www.brookings.edu/research/should-the-voting-age-be-lowered-to-16/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;Brookings Institution, 2023&lt;/a&gt;).&lt;/li&gt;
&lt;/ul&gt;
&lt;h1 class=&quot;display-4&quot; data-geo-id=&quot;geo-6172a021&quot;&gt;&lt;span&gt;Congresswoman Meng Reintroduces Bill to Lower U.S. Voting Age to 16&lt;/span&gt;&lt;/h1&gt;
&lt;h2 data-geo-id=&quot;geo-a5e21d23&quot;&gt;Overview of the Voting Age Reform Proposal&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-10a97dd8&quot;&gt;The current legal voting age in the United States is 18, a standard set by the 26th Amendment in 1971 to extend suffrage to citizens aged 18 and older. Congresswoman Grace Meng’s newly reintroduced bill seeks to amend this by lowering the voting age to 16 for all federal elections. This change aims to enfranchise millions of younger Americans, fostering earlier political engagement and strengthening democratic participation.&lt;/p&gt;
&lt;h2 data-geo-id=&quot;geo-4f7a9c1b&quot;&gt;Rationale Behind Lowering the Voting Age&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-dc1ccfdb&quot;&gt;Advocates for lowering the voting age argue that 16- and 17-year-olds possess sufficient cognitive maturity and civic knowledge to participate responsibly in elections. Research from the &lt;a href=&quot;https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7151234/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;National Institutes of Health&lt;/a&gt; indicates that many teenagers demonstrate political awareness comparable to older voters. Additionally, early voting experience can establish lifelong voting habits, potentially increasing overall voter turnout.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-eb8e0ad5&quot;&gt;Lowering the voting age also aligns with youth empowerment initiatives, recognizing young people as stakeholders in policies affecting education, climate change, and social justice. Countries such as Austria, Argentina, and Scotland have successfully implemented voting ages of 16 in various elections, providing empirical examples of the reform’s feasibility (&lt;a href=&quot;https://www.idea.int/news-media/news/should-voting-age-be-lowered-16&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;International IDEA, 2022&lt;/a&gt;).&lt;/p&gt;
&lt;h2 data-geo-id=&quot;geo-8b2d3f4e&quot;&gt;Potential Impacts and Considerations&lt;/h2&gt;
&lt;ul data-geo-id=&quot;geo-70fdeef6&quot;&gt;
&lt;li&gt;&lt;strong&gt;Increased Youth Political Engagement:&lt;/strong&gt; Enfranchising 16- and 17-year-olds could lead to higher political participation rates among young people, addressing historically low youth voter turnout (&lt;a href=&quot;https://civicyouth.org/quick-facts/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;CIRCLE, 2023&lt;/a&gt;).&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Educational Integration:&lt;/strong&gt; The reform may encourage integration of civic education with practical voting experience, enhancing political literacy in schools.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Opposing Views:&lt;/strong&gt; Critics argue that younger teens may lack the maturity or life experience necessary for informed voting decisions. Some also raise concerns about the administrative challenges of expanding voter rolls and ensuring election security.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Legal and Constitutional Challenges:&lt;/strong&gt; Amending the voting age would require federal legislative approval and potentially constitutional amendments, involving complex political processes.&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 data-geo-id=&quot;geo-1d9f7a2c&quot;&gt;Actionable Steps and Next Phases&lt;/h2&gt;
&lt;ol data-geo-id=&quot;geo-e30ed7a8&quot;&gt;
&lt;li&gt;&lt;strong&gt;Legislative Process:&lt;/strong&gt; Congresswoman Meng’s bill must pass both the House of Representatives and the Senate before becoming law.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Public Awareness Campaigns:&lt;/strong&gt; Advocates should promote educational initiatives to inform the public about the benefits and implications of lowering the voting age.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;State-Level Engagement:&lt;/strong&gt; States may consider pilot programs or local elections allowing 16-year-olds to vote, providing data to support federal reform.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Research and Evaluation:&lt;/strong&gt; Ongoing studies should monitor the effects of youth enfranchisement in jurisdictions where the voting age is already lowered.&lt;/li&gt;
&lt;/ol&gt;
&lt;h2 data-geo-id=&quot;geo-5c3e8b7f&quot;&gt;Conclusion&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-89dee9f6&quot;&gt;Congresswoman Grace Meng’s reintroduction of legislation to lower the voting age to 16 represents a significant step toward expanding democratic participation and empowering younger citizens in the United States. While the proposal faces legal and societal challenges, it reflects a growing movement to recognize youth as vital contributors to the political process. Comprehensive evaluation, public dialogue, and legislative action will determine the future of this voting age reform.&lt;/p&gt;
&lt;h2 data-geo-id=&quot;geo-06a2d1b6&quot;&gt;Office Locations&lt;/h2&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;block block--drupaltheme58-grace-meng-content&quot;&gt;&lt;article class=&quot;node evo-press-release evo-press-release--full&quot;&gt;&lt;div&gt;&lt;div class=&quot;row evo-create-type&quot;&gt;&lt;div class=&quot;col-auto&quot;&gt;January 26, 2023 &lt;/div&gt;&lt;div class=&quot;col-auto&quot;&gt;&lt;a alt=&quot;View Press Release listings&quot; href=&quot;/media-center/press-releases&quot;&gt;Press Release&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;evo-press-release__body&quot;&gt;&lt;div&gt;WASHINGTON, D.C. – U.S. Rep. Grace Meng (D-NY) announced today that she reintroduced her legislation that would lower the voting age in the United States to 16-years-old.&lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;The Congresswoman's measure seeks to replace the 26th amendment of the U.S. Constitution with a new amendment that would allow 16- and 17-year-olds the right to vote.&lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;Over the past few years, we have seen the influence young people in our nation have on trends, political movements, and elections,&quot; &lt;b&gt;said Meng.&lt;/b&gt; &quot;They continue to advocate for many crucial issues for which they are deeply passionate about. It is time to give them a voice in our democracy and reward their passion so that their voices are heard at the ballot box. 16- and 17-year-olds are legally permitted to work, drive and they also pay federal income taxes. They are contributing members of our society and I believe it is right and fair to allow them to vote in our elections. I am proud and honored to stand by our nation's young people in introducing this legislation and hope my colleagues in the House support it.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;We're excited to see momentum in states across the country for the common-sense policy reform of lowering the voting age to 16,&quot; &lt;b&gt;said Andrew Wilkes, Generation Citizen's Chief Policy and Advocacy Officer.&lt;/b&gt; &quot;Congresswoman Meng's national leadership in putting forward this legislation is aligned with the research: 16 is the right age to establish the habit of voting. This bill also supports young people's journey of informed participation and having a say on the issues which directly affect their lives.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;18by Vote deeply supports Representative Meng's proposed legislation to lower the U.S. voting age to 16-years-old,&quot; &lt;b&gt;said Ava Mateo, Executive Director of 18by Vote.&lt;/b&gt; &quot;As countries around the world have extended voting rights to 16-year-olds, research has found that lowering the voting age increases youth voter participation. Furthermore, studies have found that 16-year-olds hold equivalent levels of civic competence to 18-year-olds. Through their youth-led activism and advocacy, 16- and 17-year-olds across the nation have demonstrated their readiness to make their voices heard through their vote and to put in the work to be active, informed, and engaged citizens.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;Congresswoman Meng's record demonstrates a long-standing commitment to engaging young people in the civic process. As our democracy faces unprecedented attacks and as our country grapples with great, imminent challenges, it is critical we ensure those whose futures are most impacted and who will be responsible for resolving these issues for years to come are empowered to take action and have a voice today,&quot; &lt;b&gt;said Carolyn DeWitt, President and Executive Director of Rock The Vote.&lt;/b&gt; &quot;Any effort to make young people's voices heard on a local, state, and federal level is an important one.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;As a coalition of young and future voters, Voters of Tomorrow is thrilled to support Representative Meng's legislation to lower the voting age to 16-years-old,&quot; &lt;b&gt;said Jack Lobel, Press Secretary for Voters of Tomorrow.&lt;/b&gt; &quot;Young Americans like us have perhaps the most at stake in our nation's future. We deserve a direct say in electing the lawmakers who have the power to shape it. Sixteen- and seventeen-year-old Americans are students, workers, taxpayers, and engaged constituents. They will soon be the citizens responsible for upholding the ideals of our representative democracy, and we must include them in the quintessential civic process of voting.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;We at FairVote Action have always supported the importance of the right to vote, and we thank Representative Meng for leading this important conversation about the most appropriate voting age,&quot; &lt;b&gt;said Rob Richie, President and CEO of FairVote Action.&lt;/b&gt; &quot;It's time for our nation to embrace this conversation. Early uses of a lower voting age in some cities and state primaries have been promising, with positive impacts on voter participation and involvement of young people in the political process.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;The National Youth Rights Association strongly supports Representative Meng's constitutional amendment to lower the voting age to 16,&quot; &lt;b&gt;said Neil Bhateja, &lt;/b&gt;&lt;b&gt;a National Youth Rights Association Board Member.&lt;/b&gt; &quot;When the government makes decisions about education, the environment, and war and peace, young people are affected for more years of their lives than any other age demographic. They work and are subject to taxation without representation: income tax, sales tax, payroll taxes, and more. In Scotland, Brazil, Austria, and Argentina, 16-year-olds have shown that they're ready to vote and deserve to shape their own futures. The United States should continue its democratic tradition of extending voting rights. Thank you Representative Meng for your leadership on this issue in Congress!&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;As an organization that builds youth political power, our communities face a glaring issue: 16 and 17-year-olds have no say in who will best represent their values and priorities even though they will disproportionately bear the brunt of decisions in the present and future,&quot; &lt;b&gt;said Elona J Wilson, Executive Director at Next Up Action Fund. &lt;/b&gt;&quot;Lowering the voting age to 16 is a bold idea to strengthen our democracy, and we strongly support Congresswoman Meng's proposed constitutional amendment to lower the voting age.&quot; &lt;br/&gt;&lt;/div&gt;&lt;div&gt;Constitutional amendments require passage by two-thirds of the House and Senate, and ratification by three-fourths of the nation's state legislatures. If enacted, the voting age would be lowered for federal, state, and local elections. The last time that the voting age was lowered was when it went from 21 to 18 in 1971.  &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;Meng's legislation (H.J.res.16), can be viewed &lt;a href=&quot;//meng.house.gov/sites/evo-subsites/meng-evo.house.gov/files/BILLS-118hjres16ih.pdf&quot; target=&quot;_blank&quot; title=&quot;meng.house.gov/sites/evo-subsites/meng-evo.house.gov/files/BILLS-118hjres16ih.pdf&quot;&gt;here&lt;/a&gt;.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/article&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;!-- CONTENT END --&gt;&lt;!-- POSTSCRIPT --&gt;&lt;!-- POSTSCRIPT END --&gt;&lt;/main&gt;&lt;!-- FOOTER --&gt;&lt;footer class=&quot;page__footer evo-footer p-2&quot;&gt;&lt;div class=&quot;container-fluid&quot;&gt;&lt;div class=&quot;d-flex&quot;&gt;&lt;div class=&quot;flex-fill mr-auto evo-footer-left&quot;&gt;&lt;div class=&quot;views-element-container block block--drupaltheme58-grace-meng-evo-office-locations-block-map&quot;&gt;&lt;div block=&quot;drupaltheme58_grace_meng_evo_office_locations_block_map&quot;&gt;&lt;div class=&quot;office-locations js-view-dom-id-9e05d8b41
