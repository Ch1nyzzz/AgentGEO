&lt;/span&gt;&lt;meta content=&quot;The meaning of “electoral governance” is often equated with “electoral administration”. The process, however, can be divided into three distinct stage…&quot; data-dcnode-id=&quot;1583&quot; property=&quot;og:description&quot;&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;meta content=&quot;&lt;div class=&amp;quot;Abstracts u-font-serif&amp;quot; id=&amp;quot;abstracts&amp;quot;&gt;&lt;div class=&amp;quot;abstract author&amp;quot; id=&amp;quot;abs0010&amp;quot;&gt;&lt;h2 class=&amp;quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&amp;quot;&gt;ABSTRACT&lt;/h2&gt;&lt;div id=&amp;quot;abst0005&amp;quot;&gt;&lt;p id=&amp;quot;spar0005&amp;quot;&gt;The meaning of “electoral governance” is often equated with “electoral administration”. The process, however, can be divided into three distinct stages: 1) formation of regulatory bodies and norms; 2) implementation of these norms; and 3) dispute resolution. Given these three parts, electoral governance amounts to much more than just administration. In this article we explain why many academic studies of electoral governance have neglected the role of conflict resolution, focusing instead on the first two elements. In this way, electoral governance is mistakenly conceived as merely a mechanism for establishing regulatory bodies and rules. Our second goal is to show readers that electoral governance is a process that starts with the enactment of legislation, continues with administrative enforcement and judicial response, and concludes when the process returns to the beginning, either through judicial interpretation or recommendation by a legislative body. Our preliminary conclusion is that a proper understanding of electoral governance must take into account the role of conflict resolution, especially for disputed elections. Lastly, consideration must be given to a final phase which incorporates a cyclical conception explaining the returning process to the legislative dimension.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&quot; data-dcnode-id=&quot;1581&quot; lang=&quot;en&quot; name=&quot;citation_abstract&quot;&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;meta content=&quot;La gobernanza electoral ha sido considerada como la administración de elecciones. Sin embargo, el concepto integral está compuesto por tres dimensione…&quot; data-dcnode-id=&quot;1579&quot; property=&quot;og:description&quot;&gt;&lt;span data-dcnode-id=&quot;1578&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;meta content=&quot;&lt;div class=&amp;quot;Abstracts u-font-serif&amp;quot; id=&amp;quot;abstracts&amp;quot;&gt;&lt;div class=&amp;quot;abstract author&amp;quot; id=&amp;quot;abs0005&amp;quot; lang=&amp;quot;es&amp;quot;&gt;&lt;h2 class=&amp;quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&amp;quot;&gt;RESUMEN&lt;/h2&gt;&lt;div id=&amp;quot;abst0010&amp;quot;&gt;&lt;p id=&amp;quot;spar0010&amp;quot;&gt;La gobernanza electoral ha sido considerada como la administración de elecciones. Sin embargo, el concepto integral está compuesto por tres dimensiones: 1) el diseño constitucional y legal de los órganos reguladores y de los estándares; 2) la aplicación de reglas y 3) la resolución de disputas, considerando estos tres niveles la gobernanza electoral es más que la administración de elecciones. En este artículo mostramos como los estudios sobre la gobernanza electoral han olvidado la dimensión de la resolución de conflictos y se han centrado en las otras dos dimensiones, lo que ha propiciado que la gobernanza sea revisada solamente como un mecanismo para el diseño de órganos y reglas. Esto nos lleva al segundo propósito del trabajo: explicar cómo la gobernanza electoral es un proceso que inicia con la creación de leyes, continúa con la aplicación administrativa y con la resolución judicial, para terminar cuando el proceso reinicia el ciclo, ya sea mediante una interpretación jurisprudencial o por medio de una recomendación al órgano legislativo. Nuestra conclusión preliminar es que una noción integral de la gobernanza electoral debe considerar tanto elementos teóricos como empíricos: primero, el énfasis en la dimensión de resolución de conflictos, especialmente en contextos de elecciones disputadas; segundo, la consideración de una fase final que incorpora una perspectiva cíclica que regresa el proceso a la dimensión legislativa.&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&quot; data-dcnode-id=&quot;1577&quot; lang=&quot;es&quot; name=&quot;citation_abstract&quot;&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;

ot;1258&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;span class=&quot;button-text&quot; data-dcnode-id=&quot;1255&quot;&gt;&lt;span data-dcnode-id=&quot;1256&quot; instrument_node=&quot;&quot;&gt;Cite&lt;/span&gt;&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;ArticleIdentifierLinks&quot; data-dcnode-id=&quot;1244&quot; id=&quot;article-identifier-links&quot;&gt;&lt;a aria-label=&quot;Persistent link using digital object identifier&quot; class=&quot;doi&quot; data-dcnode-id=&quot;1247&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//doi.org/10.1016/j.mexlaw.2015.12.002&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot; title=&quot;Persistent link using digital object identifier&quot;&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;https://doi.org/10.1016/j.mexlaw.2015.12.002&lt;/span&gt;&lt;/a&gt;&lt;a class=&quot;rights-and-content&quot; data-dcnode-id=&quot;1245&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS1870057815000037%26orderBeanReset%3Dtrue&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1246&quot; instrument_node=&quot;&quot;&gt;Get rights and content&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;LicenseInfo&quot; data-dcnode-id=&quot;1235&quot;&gt;&lt;div class=&quot;License&quot; data-dcnode-id=&quot;1239&quot;&gt;&lt;span data-dcnode-id=&quot;1242&quot;&gt;&lt;span data-dcnode-id=&quot;1243&quot; instrument_node=&quot;&quot;&gt;Under a Creative Commons &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1240&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/4.0/&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1241&quot; instrument_node=&quot;&quot;&gt;license&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;OpenAccessLabel&quot; data-dcnode-id=&quot;1236&quot;&gt;&lt;span class=&quot;access-indicator&quot; data-dcnode-id=&quot;1238&quot;&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1237&quot; instrument_node=&quot;&quot;&gt;Open access&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;section class=&quot;ReferencedArticles&quot; data-dcnode-id=&quot;1234&quot;&gt;&lt;/section&gt;&lt;section class=&quot;ReferencedArticles&quot; data-dcnode-id=&quot;1233&quot;&gt;&lt;/section&gt;&lt;div class=&quot;PageDivider&quot; data-dcnode-id=&quot;1232&quot;&gt;&lt;/div&gt;&lt;div class=&quot;Abstracts u-font-serif&quot; data-dcnode-id=&quot;1219&quot; id=&quot;abstracts&quot;&gt;&lt;div class=&quot;abstract author&quot; data-dcnode-id=&quot;1226&quot; id=&quot;abs0010&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;1230&quot;&gt;&lt;span data-dcnode-id=&quot;1231&quot; instrument_node=&quot;&quot;&gt;ABSTRACT&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;1227&quot; id=&quot;abst0005&quot;&gt;&lt;p data-dcnode-id=&quot;1228&quot; id=&quot;spar0005&quot;&gt;&lt;span data-dcnode-id=&quot;1229&quot; instrument_node=&quot;&quot;&gt;The meaning of “electoral governance” is often equated with “electoral administration”. The process, however, can be divided into three distinct stages: 1) formation of regulatory bodies and norms; 2) implementation of these norms; and 3) dispute resolution. Given these three parts, electoral governance amounts to much more than just administration. In this article we explain why many academic studies of electoral governance have neglected the role of conflict resolution, focusing instead on the first two elements. In this way, electoral governance is mistakenly conceived as merely a mechanism for establishing regulatory bodies and rules. Our second goal is to show readers that electoral governance is a process that starts with the enactment of legislation, continues with administrative enforcement and judicial response, and concludes when the process returns to the beginning, either through judicial interpretation or recommendation by a legislative body. Our preliminary conclusion is that a proper understanding of electoral governance must take into account the role of conflict resolution, especially for disputed elections. Lastly, consideration must be given to a final phase which incorporates a cyclical conception explaining the returning process to the legislative dimension.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;abstract author&quot; data-dcnode-id=&quot;1220&quot; id=&quot;abs0005&quot; lang=&quot;es&quot;&gt;&lt;h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;1224&quot;&gt;&lt;span data-dcnode-id=&quot;1225&quot; instrument_node=&quot;&quot;&gt;RESUMEN&lt;/span&gt;&lt;/h2&gt;&lt;div data-dcnode-id=&quot;1221&quot; id=&quot;abst0010&quot;&gt;&lt;p data-dcnode-id=&quot;1222&quot; id=&quot;spar0010&quot;&gt;&lt;span data-dcnode-id=&quot;1223&quot; instrument_node=&quot;&quot;&gt;La gobernanza electoral ha sido considerada como la administración de elecciones. Sin embargo, el concepto integral está compuesto por tres dimensiones: 1) el diseño constitucional y legal de los órganos reguladores y de los estándares; 2) la aplicación de reglas y 3) la resolución de disputas, considerando estos tres niveles la gobernanza electoral es más que la administración de elecciones. En este artículo mostramos como los estudios sobre la gobernanza electoral han olvidado la dimensión de la resolución de conflictos y se han centrado en las otras dos dimensiones, lo que ha propiciado que la gobernanza sea revisada solamente como un mecanismo para el diseño de órganos y reglas. Esto nos lleva al segundo propósito del trabajo: explicar cómo la gobernanza electoral es un proceso que inicia con la creación de leyes, continúa con la aplicación administrativa y con la resolución judicial, para terminar cuando el proceso reinicia el ciclo, ya sea mediante una interpretación jurisprudencial o por medio de una recomendación al órgano legislativo. Nuestra conclusión preliminar es que una noción integral de la gobernanza electoral debe considerar tanto elementos teóricos como empíricos: primero, el énfasis en la dimensión de resolución de conflictos, especialmente en contextos de elecciones disputadas; segundo, la consideración de una fase final que incorpora una perspectiva cíclica que regresa el proceso a la dimensión legislativa.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;ul class=&quot;issue-navigation u-margin-s-bottom u-bg-grey1&quot; data-dcnode-id=&quot;1196&quot; id=&quot;issue-navigation&quot;&gt;&lt;li class=&quot;previous move-left u-padding-s-ver u-padding-s-left&quot; data-dcnode-id=&quot;1208&quot;&gt;&lt;a class=&quot;button-alternative button-alternative-tertiary&quot; data-dcnode-id=&quot;1209&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1870057815000025&quot;&gt;&lt;svg class=&quot;icon icon-navigate-left&quot; data-dcnode-id=&quot;1217&quot; focusable=&quot;false&quot; height=&quot;32&quot; viewBox=&quot;0 0 54 128&quot; width=&quot;32&quot;&gt;&lt;path d=&quot;m1 61l45-45 7 7-38 38 38 38-7 7z&quot; data-dcnode-id=&quot;1218&quot;&gt;&lt;/path&gt;&lt;/svg&gt;&lt;span class=&quot;button-alternative-text&quot; data-dcnode-id=&quot;1210&quot;&gt;&lt;strong data-dcnode-id=&quot;1215&quot;&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;Previous &lt;/span&gt;&lt;/strong&gt;&lt;span class=&quot;extra-detail-1&quot; data-dcnode-id=&quot;1213&quot;&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt;article&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;extra-d ;&gt;&lt;span data-dcnode-id=&quot;1170&quot; instrument_node=&quot;&quot;&gt;Elecciones&lt;/span&gt;&lt;/em&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;1163&quot; id=&quot;kw0035&quot;&gt;&lt;span data-dcnode-id=&quot;1164&quot;&gt;&lt;em data-dcnode-id=&quot;1165&quot;&gt;&lt;span data-dcnode-id=&quot;1166&quot; instrument_node=&quot;&quot;&gt;gobernanza electoral&lt;/span&gt;&lt;/em&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;1159&quot; id=&quot;kw0040&quot;&gt;&lt;span data-dcnode-id=&quot;1160&quot;&gt;&lt;em data-dcnode-id=&quot;1161&quot;&gt;&lt;span data-dcnode-id=&quot;1162&quot; instrument_node=&quot;&quot;&gt;órganos electorales&lt;/span&gt;&lt;/em&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;1155&quot; id=&quot;kw0045&quot;&gt;&lt;span data-dcnode-id=&quot;1156&quot;&gt;&lt;em data-dcnode-id=&quot;1157&quot;&gt;&lt;span data-dcnode-id=&quot;1158&quot; instrument_node=&quot;&quot;&gt;acto-res políticos&lt;/span&gt;&lt;/em&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;keyword&quot; data-dcnode-id=&quot;1151&quot; id=&quot;kw0050&quot;&gt;&lt;span data-dcnode-id=&quot;1152&quot;&gt;&lt;em data-dcnode-id=&quot;1153&quot;&gt;&lt;span data-dcnode-id=&quot;1154&quot; instrument_node=&quot;&quot;&gt;proceso electoral.&lt;/span&gt;&lt;/em&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1148&quot; instrument_node=&quot;&quot;&gt;&lt;/span&gt;&lt;div class=&quot;Body u-font-serif&quot; data-dcnode-id=&quot;769&quot; id=&quot;body&quot;&gt;&lt;div data-dcnode-id=&quot;770&quot;&gt;&lt;section data-dcnode-id=&quot;1118&quot; id=&quot;sec0005&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;1144&quot; id=&quot;sect0025&quot;&gt;&lt;span data-dcnode-id=&quot;1147&quot; instrument_node=&quot;&quot;&gt;I. &lt;/span&gt;&lt;span class=&quot;small-caps&quot; data-dcnode-id=&quot;1145&quot;&gt;&lt;span data-dcnode-id=&quot;1146&quot; instrument_node=&quot;&quot;&gt;Introduction&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1134&quot; id=&quot;par0005&quot;&gt;&lt;span data-dcnode-id=&quot;1143&quot; instrument_node=&quot;&quot;&gt;The integral connection between electoral administration and the democratization process has been noted since studies first appeared on electoral governance.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1140&quot; href=&quot;#fn0005&quot; name=&quot;bfn0005&quot;&gt;&lt;sup data-dcnode-id=&quot;1141&quot;&gt;&lt;span data-dcnode-id=&quot;1142&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1139&quot; instrument_node=&quot;&quot;&gt; In effect, these studies emphasized the role played by the electoral authorities,&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1136&quot; href=&quot;#fn0010&quot; name=&quot;bfn0010&quot;&gt;&lt;sup data-dcnode-id=&quot;1137&quot;&gt;&lt;span data-dcnode-id=&quot;1138&quot; instrument_node=&quot;&quot;&gt;2&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1135&quot; instrument_node=&quot;&quot;&gt; as well as their respective duties to ensure success.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1121&quot; id=&quot;par0010&quot;&gt;&lt;span data-dcnode-id=&quot;1133&quot; instrument_node=&quot;&quot;&gt;In a second phase, interest spread to additional levels of electoral governance, considering for the first time activities performed by electoral bodies as well as the multiple stages of elections.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1130&quot; href=&quot;#fn0015&quot; name=&quot;bfn0015&quot;&gt;&lt;sup data-dcnode-id=&quot;1131&quot;&gt;&lt;span data-dcnode-id=&quot;1132&quot; instrument_node=&quot;&quot;&gt;3&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1129&quot; instrument_node=&quot;&quot;&gt; In the third phase of this process, various scholars started to analyze both the stages and functions of electoral bodies, paying particular attention to the division between administrative and judicial roles during the electoral process.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1126&quot; href=&quot;#fn0020&quot; name=&quot;bfn0020&quot;&gt;&lt;sup data-dcnode-id=&quot;1127&quot;&gt;&lt;span data-dcnode-id=&quot;1128&quot; instrument_node=&quot;&quot;&gt;4&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1125&quot; instrument_node=&quot;&quot;&gt; Thanks to recent studies, we can now take a more comprehensive approach.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1122&quot; href=&quot;#fn0025&quot; name=&quot;bfn0025&quot;&gt;&lt;sup data-dcnode-id=&quot;1123&quot;&gt;&lt;span data-dcnode-id=&quot;1124&quot; instrument_node=&quot;&quot;&gt;5&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1119&quot; id=&quot;par0015&quot;&gt;&lt;span data-dcnode-id=&quot;1120&quot; instrument_node=&quot;&quot;&gt;As this article attempts to explain, electoral governance involves an ongoing cycle of stakeholders acting at different stages of the electoral process. The three distinct areas set forth above serve as reference points to analyze the multiple stages of elections, and show why democracy implies much more than voting booths and vote tallies. In sum, electoral governance is a complex process involving a wide range of actors, norms and authorities.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;953&quot; id=&quot;sec0010&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;1114&quot; id=&quot;sect0030&quot;&gt;&lt;span data-dcnode-id=&quot;1117&quot; instrument_node=&quot;&quot;&gt;II. &lt;/span&gt;&lt;span class=&quot;small-caps&quot; data-dcnode-id=&quot;1115&quot;&gt;&lt;span data-dcnode-id=&quot;1116&quot; instrument_node=&quot;&quot;&gt;Conflicting Approaches&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;1112&quot; id=&quot;par0020&quot;&gt;&lt;span data-dcnode-id=&quot;1113&quot; instrument_node=&quot;&quot;&gt;The study of electoral governance can generally be divided into two distinct approaches: first, emphasis on electoral bodies as institutions of governance; second, emphasis on the multiple stages of elections and the relation between the distinct bodies that comprise the electoral system, including both administrative and judicial elements. We analyze both approaches below.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;1039&quot; id=&quot;sec0015&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;1110&quot; id=&quot;sect0035&quot;&gt;&lt;span data-dcnode-id=&quot;1111&quot; instrument_node=&quot;&quot;&gt;1. Electoral Bodies as Institutions of Governance&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1097&quot; id=&quot;par0025&quot;&gt;&lt;span data-dcnode-id=&quot;1109&quot; instrument_node=&quot;&quot;&gt;The prominent role played by electoral bodies in analyzing electoral governance can be seen in studies realized by Pastor&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1106&quot; href=&quot;#fn0030&quot; name=&quot;bfn0030&quot;&gt;&lt;sup data-dcnode-id=&quot;1107&quot;&gt;&lt;span data-dcnode-id=&quot;1108&quot; instrument_node=&quot;&quot;&gt;6&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1105&quot; instrument_node=&quot;&quot;&gt; and López-Pintor.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1102&quot; href=&quot;#fn0035&quot; name=&quot;bfn0035&quot;&gt;&lt;sup data-dcnode-id=&quot;1103&quot;&gt;&lt;span data-dcnode-id=&quot;1104&quot; instrument_node=&quot;&quot;&gt;7&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1101&quot; instrument_node=&quot;&quot;&gt; These studies, especially the first and last, tend to emphasize the role of electoral administration in the democratization process.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1098&quot; href=&quot;#fn0040&quot; name=&quot;bfn0040&quot;&gt;&lt;sup data-dcnode-id=&quot;1099&quot;&gt;&lt;span data-dcnode-id=&quot;1100&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1087&quot; id=&quot;par0030&quot;&gt;&lt;span data-dcnode-id=&quot;1096&quot; instrument_node=&quot;&quot;&gt;Pastor establishes that “…elections are a prerequisite of democracy…”,&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1093&quot; href=&quot;#fn0045&quot; name=&quot;bfn0045&quot;&gt;&lt;sup data-dcnode-id=&quot;1094&quot;&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt;9&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1092&quot; instrument_node=&quot;&quot;&gt; hence the critical role played by electoral administration in ensuring proper elections, especially in democratic transitions. Although in developed countries electoral administration is usually not in dispute,&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1089&quot; href=&quot;#fn0050&quot; name=&quot;bfn0050&quot;&gt;&lt;sup data-dcnode-id=&quot;1090&quot;&gt;&lt;span data-dcnode-id=&quot;1091&quot; instrument_node=&quot;&quot;&gt;10&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt; governments in developing nations often attempt to manipulate elections.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1082&quot; id=&quot;par0035&quot;&gt;&lt;span data-dcnode-id=&quot;1086&quot; instrument_node=&quot;&quot;&gt;He proposes five ways to classify electoral bodies: (a) an electoral office with government supervision; (b) an electoral office supervised by a judicial body; (c) an electoral office accountable to parliament; (d) a multiparty electoral office; and (e) an independent electoral office.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1083&quot; href=&quot;#fn0055&quot; name=&quot;bfn0055&quot;&gt;&lt;sup data-dcnode-id=&quot;1084&quot;&gt;&lt;span data-dcnode-id=&quot;1085&quot; instrument_node=&quot;&quot;&gt;11&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1076&quot; id=&quot;par0040&quot;&gt;&lt;span data-dcnode-id=&quot;1081&quot; instrument_node=&quot;&quot;&gt;With the aim of safeguarding internal governance, countries in democratic transition often establish independent bodies to oversee proper electoral conduct.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1078&quot; href=&quot;#fn0060&quot; name=&quot;bfn0060&quot;&gt;&lt;sup data-dcnode-id=&quot;1079&quot;&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt;12&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1077&quot; instrument_node=&quot;&quot;&gt; These bodies are responsible for ensuring the integrity of the electoral process during three major stages: pre-Election Day, Election Day and postelection day. These three stages are then divided into 22 specific activities such as partitioning electoral districts; elaborating and distributing materials; monitoring polls; issuing announcements; emitting rulings; and certifying the final results.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1074&quot; id=&quot;par0045&quot;&gt;&lt;span data-dcnode-id=&quot;1075&quot; instrument_node=&quot;&quot;&gt;As explained above, Pastor's work distinguishes between the electoral bodies themselves and the multiple stages of the electoral process. By focusing on the administrative bodies, the activities realized are reduced to a second level of relevance, and something similar occurs with the other author located on this interpretative line.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1061&quot; id=&quot;par0050&quot;&gt;&lt;span data-dcnode-id=&quot;1073&quot; instrument_node=&quot;&quot;&gt;Studies realized by López-Pintor,&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1070&quot; href=&quot;#fn0065&quot; name=&quot;bfn0065&quot;&gt;&lt;sup data-dcnode-id=&quot;1071&quot;&gt;&lt;span data-dcnode-id=&quot;1072&quot; instrument_node=&quot;&quot;&gt;13&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1069&quot; instrument_node=&quot;&quot;&gt; on the other hand, emphasize the importance of electoral bodies as a structuring element of governance. The second, “Electoral administration and democratic consolidation”, clearly stresses the importance of proper organization and administration for successful democracy (e.g., “…the evolution of electoral bodies cannot be separated from the democratization process…”).&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1066&quot; href=&quot;#fn0070&quot; name=&quot;bfn0070&quot;&gt;&lt;sup data-dcnode-id=&quot;1067&quot;&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;14&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1065&quot; instrument_node=&quot;&quot;&gt; López-Pintor's central finding is that “the independent electoral commission or tribunal of the executive branch is the dominating model of organization and electoral management”.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1062&quot; href=&quot;#fn0075&quot; name=&quot;bfn0075&quot;&gt;&lt;sup data-dcnode-id=&quot;1063&quot;&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;15&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1052&quot; id=&quot;par0055&quot;&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;As a result, he finds that permanent electoral administrative bodies (“EAB”) are both less costly than temporary administrations&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1057&quot; href=&quot;#fn0080&quot; name=&quot;bfn0080&quot;&gt;&lt;sup data-dcnode-id=&quot;1058&quot;&gt;&lt;span data-dcnode-id=&quot;1059&quot; instrument_node=&quot;&quot;&gt;16&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt; and more professional. “…The EAB must ensure the participation of all political parties, promote transparency at all stages of the electoral process, be accountable to the legislature and the public, promote the dissemination of information and civic education for voters and implement cost reducing measures…”.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1053&quot; href=&quot;#fn0085&quot; name=&quot;bfn0085&quot;&gt;&lt;sup data-dcnode-id=&quot;1054&quot;&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;17&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1044&quot; id=&quot;par0060&quot;&gt;&lt;span data-dcnode-id=&quot;1051&quot; instrument_node=&quot;&quot;&gt;Although the above recommendations are helpful (in many nations, necessary) they also inevitably lead to excessive activities realized by electoral bodies, which must not only organize elections but also provide education, promote its activities and seek cost-saving measures. As such, electoral bodies are tasked with wide-ranging functions, involving not only organization but also management:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;1045&quot;&gt;&lt;p data-dcnode-id=&quot;1046&quot; id=&quot;spar0020&quot;&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;Establishing a permanent and independent EAB represents a big step forward towards institutional progress, as it can strengthen a nation's electoral system. Just like an independent tribunal or a professional politically-neutral police force, citizens and politicians often take their functions for granted. And like them, their absence or failure can open the doors to chaos and dictatorship.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1047&quot; href=&quot;#fn0090&quot; name=&quot;bfn0090&quot;&gt;&lt;sup data-dcnode-id=&quot;1048&quot;&gt;&lt;span data-dcnode-id=&quot;1049&quot; instrument_node=&quot;&quot;&gt;18&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1042&quot;&gt;&lt;span data-dcnode-id=&quot;1043&quot; instrument_node=&quot;&quot;&gt;The above illustrates how electoral bodies evolved from primarily ensuring democratic transition to becoming arbiters and guardians of democratic consolidation. As such, it assumes a critical role with ever increasing duties.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1040&quot; id=&quot;par0425&quot;&gt;&lt;span data-dcnode-id=&quot;1041&quot; instrument_node=&quot;&quot;&gt;The conceptual weakness to this approach is that it neglects the distinct stages of the electoral process.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;954&quot; id=&quot;sec0020&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;1037&quot; id=&quot;sect0040&quot;&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;2. Rules and Standards of Electoral Governance&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;1032&quot; id=&quot;par0085&quot;&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;Partly in response to this excessive focus on electoral bodies and also as differentiating element, the second approach is based on a series of theoretical, historical and comparative perspectives that facilitate a wider understanding of electoral governance.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1033&quot; href=&quot;#fn0095&quot; name=&quot;bfn0095&quot;&gt;&lt;sup data-dcnode-id=&quot;1034&quot;&gt;&lt;span data-dcnode-id=&quot;1035&quot; instrument_node=&quot;&quot;&gt;19&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1030&quot; id=&quot;par0090&quot;&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;A classic example of this approach is the 2002 volume of the International Political Science Association, which includes articles by several authors who address electoral governance from the introductory studies realized by Mozaffar and Schedler.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1021&quot; id=&quot;par0095&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;These authors views electoral governance as a set of interrelated activities that involve (a) the enactment of rules; (b) the application of these rules; and (c) dispute resolution.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1026&quot; href=&quot;#fn0100&quot; name=&quot;bfn0100&quot;&gt;&lt;sup data-dcnode-id=&quot;1027&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;20&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt; Rule-making is legislative; implementation is administrative; and dispute resolution is judicial. There is also a preliminary stage in which decisions are made regarding who has the authority to determine the rules, goals and constitutional dimension.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1022&quot; href=&quot;#fn0105&quot; name=&quot;bfn0105&quot;&gt;&lt;sup data-dcnode-id=&quot;1023&quot;&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;21&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1015&quot; id=&quot;par0100&quot;&gt;&lt;span data-dcnode-id=&quot;1020&quot; instrument_node=&quot;&quot;&gt;The difficulty of this approach is illustrated in the first chart, which shows three distinct phases of electoral governance with the elements that pertain to each phase.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1017&quot; href=&quot;#fn0110&quot; name=&quot;bfn0110&quot;&gt;&lt;sup data-dcnode-id=&quot;1018&quot;&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt;22&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt; For the purpose of this analysis, the authors propose that the initial phase –at which time the basic rules are established– be divided into two sublevels: the rules governing competition where the electoral formula appears, the partitioning of electoral districts and the size of the congress. which are the variables of the electoral system; and the electoral organization rules, where the voter registry is located, the nomination and registration of candidates, financing, taxation, the electoral observation, all which are organizational elements that in the chart appear as electoral governance.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1013&quot; id=&quot;par0105&quot;&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;The problem with this approach is that it disconnects two types of rules when both the definitions of the electoral system and those corresponding to the organization of the elections originated in the rule design process. In other words, at a constitutional level, what differentiating two related areas implies: organizational rules often influence how elections are determined. This is because both rules, those of competition and those of organization, allow us to understand the electoral process as a whole. Moreover, when proposing to separate them, the position of governance is unclear: should it be in the organizational sublevel of the rule design or in the three levels, with the sublevels and its elements as suggested by the chart.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1008&quot; id=&quot;par0110&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;The above situation becomes complicated when the text emphasizes the formulation and application of rules, but barely mentions dispute resolution, which we consider a notorious failure since it is precisely that level which enables the relationship between administration, organization and electoral management. When electoral candidates dispute election outcomes, there must be a proper mechanism for adjudication. As the authors suggest, the integrity of the electoral process depends on “…the impartial and expeditious resolution of disputes, which represents a cornerstone of the procedural legitimacy of democratic elections.”&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1009&quot; href=&quot;#fn0115&quot; name=&quot;bfn0115&quot;&gt;&lt;sup data-dcnode-id=&quot;1010&quot;&gt;&lt;span data-dcnode-id=&quot;1011&quot; instrument_node=&quot;&quot;&gt;23&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1003&quot; id=&quot;par0115&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;The same publication includes an article about the subnational bodies responsible for dispute resolution in Mexico. The author indicates that although electoral disputes often occur, minimal attention has been given to the bodies responsible for resolution.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;1004&quot; href=&quot;#fn0120&quot; name=&quot;bfn0120&quot;&gt;&lt;sup data-dcnode-id=&quot;1005&quot;&gt;&lt;span data-dcnode-id=&quot;1006&quot; instrument_node=&quot;&quot;&gt;24&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;991&quot; id=&quot;par0120&quot;&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;Using Mexico as an example, we find several types of subnational electoral courts while classifying them according to the role they play in the local courts as ghost tribunals, lyricists, cleaners, employees and workers.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;999&quot; href=&quot;#fn0125&quot; name=&quot;bfn0125&quot;&gt;&lt;sup data-dcnode-id=&quot;1000&quot;&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;25&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt; The first four are deficient tribunals either because they are ignored or because they may be amended by congress or by the government; the only acceptable court is the working court; Eisenstadt in his previous studies has insisted on this idea:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;992&quot;&gt;&lt;p data-dcnode-id=&quot;993&quot; id=&quot;spar0025&quot;&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;As opposed to the typically ideal autonomous courts which are static, the tension inherent in the construction of electoral courts during the transition lies on which will be favored, whether the short term interests of stakeholders or the broader and long term interests of the judicial autonomy.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;994&quot; href=&quot;#fn0130&quot; name=&quot;bfn0130&quot;&gt;&lt;sup data-dcnode-id=&quot;995&quot;&gt;&lt;span data-dcnode-id=&quot;996&quot; instrument_node=&quot;&quot;&gt;26&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;989&quot;&gt;&lt;span data-dcnode-id=&quot;990&quot; instrument_node=&quot;&quot;&gt;Thus we can see that acknowledgment for distinguishing the administration of the elections from the administration of justice in the context of the electoral process is already in place, even though it is still viewed from the body and not so much from the function that it must fulfill.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;963&quot; id=&quot;par0430&quot;&gt;&lt;span data-dcnode-id=&quot;988&quot; instrument_node=&quot;&quot;&gt;In order to illustrate the importance of the activities realized by electoral bodies, Medina,&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;985&quot; href=&quot;#fn0135&quot; name=&quot;bfn0135&quot;&gt;&lt;sup data-dcnode-id=&quot;986&quot;&gt;&lt;span data-dcnode-id=&quot;987&quot; instrument_node=&quot;&quot;&gt;27&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;984&quot; instrument_node=&quot;&quot;&gt; Picado,&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;981&quot; href=&quot;#fn0140&quot; name=&quot;bfn0140&quot;&gt;&lt;sup data-dcnode-id=&quot;982&quot;&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;28&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt; Fleischer and Barreto,&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;977&quot; href=&quot;#fn0145&quot; name=&quot;bfn0145&quot;&gt;&lt;sup data-dcnode-id=&quot;978&quot;&gt;&lt;span data-dcnode-id=&quot;979&quot; instrument_node=&quot;&quot;&gt;29&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;976&quot; instrument_node=&quot;&quot;&gt; Brenes,&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;973&quot; href=&quot;#fn0150&quot; name=&quot;bfn0150&quot;&gt;&lt;sup data-dcnode-id=&quot;974&quot;&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;30&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt; Marchetti&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;969&quot; href=&quot;#fn0155&quot; name=&quot;bfn0155&quot;&gt;&lt;sup data-dcnode-id=&quot;970&quot;&gt;&lt;span data-dcnode-id=&quot;971&quot; instrument_node=&quot;&quot;&gt;31&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt; and Ramírez&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;965&quot; href=&quot;#fn0160&quot; name=&quot;bfn0160&quot;&gt;&lt;sup data-dcnode-id=&quot;966&quot;&gt;&lt;span data-dcnode-id=&quot;967&quot; instrument_node=&quot;&quot;&gt;32&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt; take a broader view of the electoral process by examining election rulings from the perspective of the tribunals.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;957&quot; id=&quot;par0130&quot;&gt;&lt;span data-dcnode-id=&quot;962&quot; instrument_node=&quot;&quot;&gt;In both approaches, there was a series of contributions but also of shortcomings. Regarding the progress, the first approach highlights the importance of institutions in administering proper elections, to end the transition processes, specifically in the states of the third democratizing wave.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;959&quot; href=&quot;#fn0135&quot; name=&quot;bfn0135&quot;&gt;&lt;sup data-dcnode-id=&quot;960&quot;&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;33&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt; This approach made a hindrance of the centrality of the electoral process and emphasized electoral bodies rather than actors or norms, which was clearly deficient.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;955&quot; id=&quot;par0135&quot;&gt;&lt;span data-dcnode-id=&quot;956&quot; instrument_node=&quot;&quot;&gt;Given the inadequacy of this approach, the second method emphasizes the formulation of rules and their application. In this way it highlights the importance of generally-accepted rules and the centrality of the result became the objective to achieve. This methodology is best summarized by the expression: certain procedure, uncertain results. This line has faced the obstacle of recognizing that in addition to the design and implementation of the rules a necessity for a closing mechanism of the electoral process exists and it can be found in the adjudication of disputes carried out by the electoral tribunals, this has been its main deficiency. Therefore, the second interpretative line centered on the electoral justice bodies as the closing operators of the electoral process.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;884&quot; id=&quot;sec0025&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;949&quot; id=&quot;sect0045&quot;&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;III. &lt;/span&gt;&lt;span class=&quot;small-caps&quot; data-dcnode-id=&quot;950&quot;&gt;&lt;span data-dcnode-id=&quot;951&quot; instrument_node=&quot;&quot;&gt;Electoral Process: Norms, Actors and Bodies&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;947&quot; id=&quot;par0145&quot;&gt;&lt;span data-dcnode-id=&quot;948&quot; instrument_node=&quot;&quot;&gt;In this section we reconstruct the object of study to revise the dimensions of electoral governance from the same electoral process with the participation of the actors and authorities responsible for implementing free and democratic elections.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;945&quot; id=&quot;par0150&quot;&gt;&lt;span data-dcnode-id=&quot;946&quot; instrument_node=&quot;&quot;&gt;The electoral process is a complex series of events that take place in several phases. The most highly-visible phase involves political campaigns such as the primaries; candidate nominations; nominations of parties; election propaganda; ballot elections; and the declaration of election results and winners. Governance-related activities take place between elections: voter registration; party registration and funding; auditing; and the eventual cancelation of adherent records, administrative actions subject to review by electoral authorities.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;943&quot; id=&quot;par0155&quot;&gt;&lt;span data-dcnode-id=&quot;944&quot; instrument_node=&quot;&quot;&gt;In this way, the electoral process is governed by rules that govern how elections are conducted and the respective duties of the authorities. In the enactment of norms, the legislature must first determine issues involving constitutionality. Judicial bodies (e.g., tribunals, courts and constitutional rooms) are responsible for dispute resolution.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;941&quot; id=&quot;par0160&quot;&gt;&lt;span data-dcnode-id=&quot;942&quot; instrument_node=&quot;&quot;&gt;The formulation and enactment of rules is largely extraneous, as this activity is realized by legislators, at times with the aid of the government and subject to revision by the judicial authorities. It should be noted that during electoral crisis, it is often necessary for politicians to reformulate and readjust the rules, including those that regulate the institutions that oversee elections. Hence, with the rule design dimension the governance circuit may restart.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;939&quot; id=&quot;par0165&quot;&gt;&lt;span data-dcnode-id=&quot;940&quot; instrument_node=&quot;&quot;&gt;Two actors involved in the formulation and enactment of electoral rules—legislators and judges— must often intervene to enact new rules.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;937&quot; id=&quot;par0170&quot;&gt;&lt;span data-dcnode-id=&quot;938&quot; instrument_node=&quot;&quot;&gt;Once electoral rules have been enacted, electoral bodies with both administrative and judicial functions must be established to oversee their implementation. Election administrators are directly responsible for electoral organization, while electoral judges rule on legal matters.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;935&quot; id=&quot;par0175&quot;&gt;&lt;span data-dcnode-id=&quot;936&quot; instrument_node=&quot;&quot;&gt;Political parties and candidates also participate in rule implementation, as their direct and continued participation make them key actors in election outcomes. Although winners are decided on Election Day, they must be confirmed by the appropriate judicial authorities.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;933&quot; id=&quot;par0180&quot;&gt;&lt;span data-dcnode-id=&quot;934&quot; instrument_node=&quot;&quot;&gt;The application of rules involves the participation of administrative bodies, political parties and citizens. No less important, the electoral courts are responsible for dispute resolution.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;928&quot; id=&quot;par0185&quot;&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;The actors involved in dispute resolution include political parties as well as candidates who challenge administrative decisions. It is worth noting that electoral judges have the authority not only to review elections but also invalidate election results. The role played by electoral judges are critical despite a dearth of academic literature regarding their duties, as scholars often consider this to be outside their area of expertise.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;929&quot; href=&quot;#fn0170&quot; name=&quot;bfn0170&quot;&gt;&lt;sup data-dcnode-id=&quot;930&quot;&gt;&lt;span data-dcnode-id=&quot;931&quot; instrument_node=&quot;&quot;&gt;34&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;926&quot; id=&quot;par0435&quot;&gt;&lt;span data-dcnode-id=&quot;927&quot; instrument_node=&quot;&quot;&gt;In many electoral regimes, especially in Latin America, there is a fourth phase of electoral governance that involves the review of human rights protection by regional authorities.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;920&quot; id=&quot;par0195&quot;&gt;&lt;span data-dcnode-id=&quot;925&quot; instrument_node=&quot;&quot;&gt;This review has two goals: first, to protect the aggrieved parties; and second, to issue a ruling that binds the state's electoral bodies. Hitters&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;922&quot; href=&quot;#fn0175&quot; name=&quot;bfn0175&quot;&gt;&lt;sup data-dcnode-id=&quot;923&quot;&gt;&lt;span data-dcnode-id=&quot;924&quot; instrument_node=&quot;&quot;&gt;35&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;921&quot; instrument_node=&quot;&quot;&gt; has also proposed that these rulings become binding for member-states not involved in the specific controversy.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;918&quot; id=&quot;par0440&quot;&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;At the regional review stage, the actors include political candidates who seek protection of the regional system, the bodies responsible for the national state and, eventually, the public powers of the respondent state. This review is a final mechanism external to the electoral bodies of the national state and a different possibility of governance circuit closure.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;895&quot; id=&quot;par0205&quot;&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;Once the entire electoral process has been realized, including the enactment of rules, declaration of winners, and certification of results, we discover a link between each of the four phases of electoral governance to the following norms and actors:&lt;/span&gt;&lt;/p&gt;&lt;dl class=&quot;list&quot; data-dcnode-id=&quot;896&quot;&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;915&quot;&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;–&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;912&quot;&gt;&lt;p data-dcnode-id=&quot;913&quot; id=&quot;par0210&quot;&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;Enactment of rules: Legal and constitutional norms enacted by legislators with the collaboration of the government and review by constitutional control judges. Responsible body: legislature.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;–&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;907&quot;&gt;&lt;p data-dcnode-id=&quot;908&quot; id=&quot;par0215&quot;&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;Rules application: based on constitutional, legal and regulatory norms; administrative decisions involving parties, candidates, citizens and possible internal review by electoral judges. Responsible body: administrative agencies.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;905&quot;&gt;&lt;span data-dcnode-id=&quot;906&quot; instrument_node=&quot;&quot;&gt;–&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;902&quot;&gt;&lt;p data-dcnode-id=&quot;903&quot; id=&quot;par0220&quot;&gt;&lt;span data-dcnode-id=&quot;904&quot; instrument_node=&quot;&quot;&gt;Dispute resolution: based on constitutional and legal norms; decisions of a jurisdictional nature with the participation of parties, candidates and citizens with the internal revision of electoral judges. Responsible body: judicial authorities.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dt class=&quot;list-label&quot; data-dcnode-id=&quot;900&quot;&gt;&lt;span data-dcnode-id=&quot;901&quot; instrument_node=&quot;&quot;&gt;–&lt;/span&gt;&lt;/dt&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;897&quot;&gt;&lt;p data-dcnode-id=&quot;898&quot; id=&quot;par0225&quot;&gt;&lt;span data-dcnode-id=&quot;899&quot; instrument_node=&quot;&quot;&gt;Review of decisions: based on norms of the system of regional protection; administrative and judicial decisions subject to review by regional judges. Responsible bodies: commissions and human rights courts.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;p&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;893&quot;&gt;&lt;span data-dcnode-id=&quot;894&quot; instrument_node=&quot;&quot;&gt;By linking each stage of the electoral process with decision-making author ities, we find that it is a circuit that begins with rules design and that various actions are executed by the administrative body and revised by the jurisdictional. In this framework, political parties, candidates and citizens become indispensable actors whose active participation in the electoral process are as crucial as the role played by the authorities.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;891&quot; id=&quot;par0230&quot;&gt;&lt;span data-dcnode-id=&quot;892&quot; instrument_node=&quot;&quot;&gt;It is a circuit which is constantly activated and can be restarted once the electoral court emits its final sentence. For this reason, it is necessary to factor in differences between each electoral authority and understand that the courts are necessary both to resolve electoral challenges and maintain the governance circuit active.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;889&quot; id=&quot;par0445&quot;&gt;&lt;span data-dcnode-id=&quot;890&quot; instrument_node=&quot;&quot;&gt;Thus, the electoral governance dimensions obtain their own characteristics through the rules, the bodies and the respective actors, assuming that the electoral process by being a cycle at some point will be likely to return to a previews phase or by the end, review the whole process or, moreover, once the whole process is finished, revise the design and the electoral institutions.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;887&quot; id=&quot;par0450&quot;&gt;&lt;span data-dcnode-id=&quot;888&quot; instrument_node=&quot;&quot;&gt;The previous explanations propose the need to link the rules with the actors and the procedures which involve electoral governance as a whole and not just a part of the rules which are related to Election Day but with the complete organization of the electoral process. Electoral governance is thus characterized by the relation between the rules, the actors and the procedures that are performed during the electoral process for its organization as well as for the resolution of disputes. This conceptual framework sheds light on each stage of governance; the differences between electoral bodies; and the importance of participation by political actors.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;885&quot; id=&quot;par0245&quot;&gt;&lt;span data-dcnode-id=&quot;886&quot; instrument_node=&quot;&quot;&gt;In the next section, we discuss the integral model of governance.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;817&quot; id=&quot;sec0030&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;880&quot; id=&quot;sect0050&quot;&gt;&lt;span data-dcnode-id=&quot;883&quot; instrument_node=&quot;&quot;&gt;IV. &lt;/span&gt;&lt;span class=&quot;small-caps&quot; data-dcnode-id=&quot;881&quot;&gt;&lt;span data-dcnode-id=&quot;882&quot; instrument_node=&quot;&quot;&gt;Modeling Electoral Governance: Dimensions, Category Analysis and Case Comparison&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;874&quot; id=&quot;par0255&quot;&gt;&lt;span data-dcnode-id=&quot;879&quot; instrument_node=&quot;&quot;&gt;Aguilar has proposed that electoral governance be broken into distinct modules in order to facilitate analysis. He also noted that the concept contains a teleological dimension as well as a causal one, making governance “...an institutionally structured process and technically in its activities of defining a sense of direction and the embodiment of sense, which joins the institutions with the political practices and the technical procedures of analysis and management…”.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;876&quot; href=&quot;#fn0180&quot; name=&quot;bfn0180&quot;&gt;&lt;sup data-dcnode-id=&quot;877&quot;&gt;&lt;span data-dcnode-id=&quot;878&quot; instrument_node=&quot;&quot;&gt;36&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;875&quot; instrument_node=&quot;&quot;&gt; We consider it appropriate to carry out a similar procedure of segmentation into categories of analysis for the concept of electoral governance in order to design an integral proposal and to shape various cases.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;859&quot; id=&quot;par0460&quot;&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt;Electoral governance is a cycle rooted in legislative design, passing through administration and internal electoral justice, with the possibility that it will conclude in the regional system of human right revision. As a model, we use categories based on the quantity and nature of electoral rules, government orders, electoral bodies and political actors.&lt;/span&gt;&lt;/p&gt;&lt;dl class=&quot;list&quot; data-dcnode-id=&quot;860&quot;&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;870&quot;&gt;&lt;p data-dcnode-id=&quot;871&quot; id=&quot;par0265&quot;&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;System of rules: regional, national or subnational.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;867&quot;&gt;&lt;p data-dcnode-id=&quot;868&quot; id=&quot;par0270&quot;&gt;&lt;span data-dcnode-id=&quot;869&quot; instrument_node=&quot;&quot;&gt;Levels of government: national or subnational.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;864&quot;&gt;&lt;p data-dcnode-id=&quot;865&quot; id=&quot;par0275&quot;&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;Electoral bodies: administrative, judicial and review.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;dd class=&quot;list-description&quot; data-dcnode-id=&quot;861&quot;&gt;&lt;p data-dcnode-id=&quot;862&quot; id=&quot;par0280&quot;&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;Political actors: citizens, candidates and parties.&lt;/span&gt;&lt;/p&gt;&lt;/dd&gt;&lt;/dl&gt;&lt;p&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;857&quot;&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;By system of rules we refer to the number and types of laws applicable to each election.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;855&quot; id=&quot;par0285&quot;&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;The state may only apply its own regulations; or perhaps the regional regulations; or even both the domestic and the regional regulations are considered a whole (legal monism).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;849&quot; id=&quot;par0290&quot;&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;In the case of norms, the first variation is between one or more systems of rules, in case of more than one system the variables maybe regional, national or subnational.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;851&quot; href=&quot;#fn0185&quot; name=&quot;bfn0185&quot;&gt;&lt;sup data-dcnode-id=&quot;852&quot;&gt;&lt;span data-dcnode-id=&quot;853&quot; instrument_node=&quot;&quot;&gt;37&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt; If a subordinate relation exists the sequence is reversed: sub-national, national and regional.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;844&quot; id=&quot;par0295&quot;&gt;&lt;span data-dcnode-id=&quot;848&quot; instrument_node=&quot;&quot;&gt;The second line of analysis refers to the government entity responsible for implementing the norms. in the levels of government the first variation is also between one or more levels, the variables are subnational and national, the relation between levels depends on the constitutional definition of each state.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;845&quot; href=&quot;#fn0185&quot; name=&quot;bfn0185&quot;&gt;&lt;sup data-dcnode-id=&quot;846&quot;&gt;&lt;span data-dcnode-id=&quot;847&quot; instrument_node=&quot;&quot;&gt;38&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;842&quot; id=&quot;par0465&quot;&gt;&lt;span data-dcnode-id=&quot;843&quot; instrument_node=&quot;&quot;&gt;The third line of analysis refers to electoral bodies, both electoral administration and judicial branches. In the electoral bodies, the variants are between one and more than one and the variables are between administrative and jurisdictional bodies. Something similar occurs with the regional revision authorities; here we also find a variation between one or more authorities.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;840&quot; id=&quot;par0470&quot;&gt;&lt;span data-dcnode-id=&quot;841&quot; instrument_node=&quot;&quot;&gt;The fourth category refers to political actors. The variables are (a) verification that the election involves at least two candidates; and (b) whether candidates are chosen by political parties or nominated directly by citizens.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;838&quot; id=&quot;par0850&quot;&gt;&lt;span data-dcnode-id=&quot;839&quot; instrument_node=&quot;&quot;&gt;With the relations between the rule design, their application by the electoral administration, the adjudications of disputes by the electoral court, the regional revision system with the internal normative systems, the levels of government and the political actors we obtain and integral cycle of the electoral processes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;836&quot; id=&quot;par0955&quot;&gt;&lt;span data-dcnode-id=&quot;837&quot; instrument_node=&quot;&quot;&gt;To observe the relationship between the dimensions with the categories of the second variable, we analyze two emblematic cases, Brazil and Mexico. Both are federalisms of the region and have been subject to electoral governance studies.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;834&quot; id=&quot;par0475&quot;&gt;&lt;span data-dcnode-id=&quot;835&quot; instrument_node=&quot;&quot;&gt;In Brazil, norms are formulated and enacted by two legislative bodies: a federal congress and state legislatures. These two sets of norms are linked to the decisions of the Inter-American Human Rights System (IAHRS). Brazil has two levels of government: a national one for federal elections and a sub-national one for local elections&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;832&quot; id=&quot;par0325&quot;&gt;&lt;span data-dcnode-id=&quot;833&quot; instrument_node=&quot;&quot;&gt;Regardless of the government order in Brazil, electoral administration and justice is overseen by the electoral tribunal (whether federal or state), which oversees the implementation of electoral rules and the adjudication of disputes. In addition, all rulings by the Brazilian authorities are subject to review by the commission or the IAHRS.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;830&quot; id=&quot;par0330&quot;&gt;&lt;span data-dcnode-id=&quot;831&quot; instrument_node=&quot;&quot;&gt;In Brazil, citizens are not permitted to directly nominate candidates, who may be appointed only by political parties. Even so, the political rights of all candidates are subject to internal jurisdiction and the IAHRS.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;828&quot; id=&quot;par0480&quot;&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;In contrast, the Mexican federal congress retains exclusive authority to enact electoral rules. allows discretion for the local legislatures. Mexico has a normative system which incorporates de decisions made by de IAHRS and establishes two levels of government: a national one for federal elections and a subnational one for local elections.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;826&quot; id=&quot;par0485&quot;&gt;&lt;span data-dcnode-id=&quot;827&quot; instrument_node=&quot;&quot;&gt;The electoral and administrative justices are differentiated by the government levels as well as the corresponding authorities. First, whether they are administrative or judicial entities the first are responsible for the application of rules the latter for the resolution of disputes; second, whether they involve national or subnational authorities. Rulings made by the various electoral bodies are subject to review by IAHRS regional headquarters.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;824&quot; id=&quot;par0345&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; instrument_node=&quot;&quot;&gt;In Mexico, candidates may be subject to nomination either by political parties or citizens; in the latter case, however, restrictions normally apply. Those nominated either by citizens directly or a political party may resort to electoral courts to adjudicate disputes. Only candidates and citizens can turn to the IAHRS.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;822&quot; id=&quot;par0490&quot;&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;As can be seen, despite both Brazil and Mexico being federal states each nation defines electoral governance differently. Each country has assigned to different authorities the enactment of electoral rules and oversight for their implementation. They also differ with regard to the nomination of candidates. This said, both are similar with regard to government levels, systems of rules and dispute resolution. Each nation may also request review under the IAHRS.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;820&quot; id=&quot;par0495&quot;&gt;&lt;span data-dcnode-id=&quot;821&quot; instrument_node=&quot;&quot;&gt;It is worth mentioning that rulings by either nation are subject to review by the regional human right authorities. Note also that the results of any election in dispute are considered valid only after a ruling by an electoral court or a regional review committee.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;818&quot; id=&quot;par0500&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; instrument_node=&quot;&quot;&gt;The above illustrates how the four elements that make up electoral governance can be linked to the specific variables of each category, which allows for various types of comparisons both synchronic and diachronic. This is due to the fact that governance is a complex concept that links its dimensions and categories with the political actors, which generates a political definition by the end of the electoral process, this involves more than the administering of elections.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;section data-dcnode-id=&quot;771&quot; id=&quot;sec0035&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;813&quot; id=&quot;sect0055&quot;&gt;&lt;span data-dcnode-id=&quot;816&quot; instrument_node=&quot;&quot;&gt;V. &lt;/span&gt;&lt;span class=&quot;small-caps&quot; data-dcnode-id=&quot;814&quot;&gt;&lt;span data-dcnode-id=&quot;815&quot; instrument_node=&quot;&quot;&gt;Discussion and Reflection&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p data-dcnode-id=&quot;811&quot; id=&quot;par0370&quot;&gt;&lt;span data-dcnode-id=&quot;812&quot; instrument_node=&quot;&quot;&gt;There have been several approaches to the issue of governance which have emphasized various points, first the authorities, then the rules, and levels; a recent proposal concerns electoral integrity. We consider that a comprehensive approach linking the dimensions with the categories and the actors in the various stages of the electoral process is necessary.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;809&quot; id=&quot;par0510&quot;&gt;&lt;span data-dcnode-id=&quot;810&quot; instrument_node=&quot;&quot;&gt;The above proposal is justified by the need to understand that elections are a cycle which begins with the convocation to electoral process and ends with the declaration of results, while governance is a process that can be observed in a circuit; the specific circuit is designed by each national state and to analyze it the dimensions and categories are pertinent.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;807&quot; id=&quot;par0515&quot;&gt;&lt;span data-dcnode-id=&quot;808&quot; instrument_node=&quot;&quot;&gt;From this perspective the analytical elements are necessary for a general approach, to denote the characteristics of each case, to highlight the similarities and differences between cases, whether they are close in space and time, also to obtain a series of observations that in a reasonable lapse of time allow comparisons between cases and of a single case with its many variants.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;805&quot; id=&quot;par0520&quot;&gt;&lt;span data-dcnode-id=&quot;806&quot; instrument_node=&quot;&quot;&gt;Ultimately the approach we propose is conceptual and methodological which serves for various cases without losing the richness of each specific design and generating points of contrast with others, whether similar or dissimilar. The focus on the definition of electoral governance is to achieve a better understanding of the elections, administration and electoral justice.&lt;/span&gt;&lt;/p&gt;&lt;section data-dcnode-id=&quot;772&quot; id=&quot;sec0040&quot;&gt;&lt;h3 class=&quot;u-h4 u-margin-m-top u-margin-xs-bottom&quot; data-dcnode-id=&quot;803&quot; id=&quot;sect0060&quot;&gt;&lt;span data-dcnode-id=&quot;804&quot; instrument_node=&quot;&quot;&gt;Notes on Mexico&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;801&quot; id=&quot;par0395&quot;&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;In this short epilogue we will carry out a diachronic comparison of the Mexican case from 1996, when the electoral bodies turned autonomous until the most recent electoral reform of 2013-3014, which implies having three models, since a reform was also implemented in 2007-2008.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;791&quot; id=&quot;par0400&quot;&gt;&lt;span data-dcnode-id=&quot;800&quot; instrument_node=&quot;&quot;&gt;These three reforms had different purposes: the 1996 reform sought to establish the autonomy of the electoral bodies.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;797&quot; href=&quot;#fn0195&quot; name=&quot;bfn0195&quot;&gt;&lt;sup data-dcnode-id=&quot;798&quot;&gt;&lt;span data-dcnode-id=&quot;799&quot; instrument_node=&quot;&quot;&gt;39&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;796&quot; instrument_node=&quot;&quot;&gt; In 2007-2008, reforms were implemented to create conditions of equality in electoral processes.&lt;/span&gt;&lt;a class=&quot;workspace-trigger&quot; data-dcnode-id=&quot;793&quot; href=&quot;#fn0200&quot; name=&quot;bfn0200&quot;&gt;&lt;sup data-dcnode-id=&quot;794&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;40&lt;/span&gt;&lt;/sup&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;792&quot; instrument_node=&quot;&quot;&gt; The 2013-2014 reform aims to professionalize the electoral authority. Let us examine the terms of the reforms.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;789&quot; id=&quot;par0525&quot;&gt;&lt;span data-dcnode-id=&quot;790&quot; instrument_node=&quot;&quot;&gt;In 1996, both federal congress and state legislatures enacted two sets of electoral rules, national and subnational, which were also replicated in the government levels: one for federal elections and one for local elections.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;787&quot; id=&quot;par0530&quot;&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;Since 1996, the administrations and the electoral justice are differentiated by the government levels as well as the responsible authorities. First, electoral bodies either have administrative or judicial authority. Second, electoral rules can apply at either national or subnational levels. At the time, IAHRS review was still at an early stage.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;785&quot; id=&quot;par0415&quot;&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;According to rules at that time, candidates could only be nominated by political parties. Even though citizens could turn to internal jurisdictions, their chances were limited.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;783&quot; id=&quot;par0420&quot;&gt;&lt;span data-dcnode-id=&quot;784&quot; instrument_node=&quot;&quot;&gt;Candidates and citizens, however, were entitle to protection under the regional protection system. One case in particular was critical: Castañeda Gut-man vs. Mexico. In this ruling, the claimant, who was not registered by the administrative authorities, turned to the IAHRS for relief. The jurisdiction dismissed his claim. The regional human rights courts partially agreed with him and recommended that the Mexican state amend requirements for nonparty candidates.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;781&quot; id=&quot;par0535&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;The 2007-2008 reform did not radically modify the dimensions or categories of electoral governance procedures, except for rules applying to radio and television propaganda, in which case it determined that the national administrative body would solely define these guidelines. With regard to dispute resolution, it allowed citizens to go directly to electoral justice, as well as review by the IAHRS.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;779&quot; id=&quot;par0540&quot;&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;In the Mexican case of 2013-2014, the federal congress retained sole authority for electoral decisions, although local legislatures were given a modicum of influence. Mexico has a normative system which incorporates IAHRS decisions and establishes two government levels: national for federal elections and subnational for local ones.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;777&quot; id=&quot;par0545&quot;&gt;&lt;span data-dcnode-id=&quot;778&quot; instrument_node=&quot;&quot;&gt;The administration and electoral justice remain differentiated by the government levels as well as the responsible bodies with the exception that the local administrative authorities are linked directly to the national bodies. The decisions made by the various electoral bodies can be revised at regional headquarters or by the IAHRS.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;775&quot; id=&quot;par0550&quot;&gt;&lt;span data-dcnode-id=&quot;776&quot; instrument_node=&quot;&quot;&gt;In Mexico both parties and citizens can nominate candidates, although there are restrictions for the citizens. Both candidates and citizens maybe turn to internal jurisdiction for dispute resolution, although only candidates and citizens maybe turn to the IAHRS.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;773&quot; id=&quot;par0555&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;As we can see, between the reforms of 1996 and 2007-2008 there were no major changes. The 2013-2014 reform, however, has modified Mexican electoral governance: there is a great designer: the federal congress, the subnational bodies depend on the national body and both must apply federal rules, citizens can be nominated individually and turn directly to jurisdiction, and along with the candidates, they can turn to the IAHRS. It is quite a change for the architecture of Mexican electoral governance.&lt;/span&gt;&lt;/p&gt;&lt;/section&gt;&lt;/section&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;related-content-links u-hide-from-md&quot; data-dcnode-id=&quot;765&quot;&gt;&lt;button class=&quot;button button-anchor&quot; data-dcnode-id=&quot;766&quot; type=&quot;button&quot;&gt;&lt;span class=&quot;button-text&quot; data-dcnode-id=&quot;767&quot;&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;Recommended articles&lt;/span&gt;&lt;/span&gt;&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;Tail&quot; data-dcnode-id=&quot;764&quot;&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;757&quot; id=&quot;section-cited-by&quot;&gt;&lt;section class=&quot;ListArticles preview&quot; data-dcnode-id=&quot;758&quot;&gt;&lt;div class=&quot;PageDivider&quot; data-dcnode-id=&quot;763&quot;&gt;&lt;/div&gt;&lt;header data-dcnode-id=&quot;760&quot; id=&quot;citing-articles-header&quot;&gt;&lt;h2 class=&quot;u-h3 u-margin-l-ver u-font-serif&quot; data-dcnode-id=&quot;761&quot;&gt;&lt;span data-dcnode-id=&quot;762&quot; instrument_node=&quot;&quot;&gt;Cited by (0)&lt;/span&gt;&lt;/h2&gt;&lt;/header&gt;&lt;div aria-describedby=&quot;citing-articles-header&quot; data-dcnode-id=&quot;759&quot;&gt;&lt;/div&gt;&lt;/section&gt;&lt;/div&gt;&lt;div class=&quot;Footnotes&quot; data-dcnode-id=&quot;239&quot;&gt;&lt;dl class=&quot;footnote&quot; data-dcnode-id=&quot;743&quot;&gt;&lt;dt class=&quot;footnote-label&quot; data-dcnode-id=&quot;753&quot;&gt;&lt;sup data-dcnode-id=&quot;754&quot;&gt;&lt;a data-dcnode-id=&quot;755&quot; href=&quot;#bfn0005&quot;&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/dt&gt;&lt;dd class=&quot;u-margin-xxl-left&quot; data-dcnode-id=&quot;744&quot;&gt;&lt;p data-dcnode-id=&quot;745&quot; id=&quot;npar0005&quot;&gt;&lt;span data-dcnode-id=&quot;752&quot; instrument_node=&quot;&quot;&gt;Robert A. Pastor, &lt;/span&gt;&lt;em data-dcnode-id=&quot;750&quot;&gt;&lt;spa
