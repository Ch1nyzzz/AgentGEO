&lt;/span&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr data-dcnode-id=&quot;7018&quot; valign=&quot;top&quot;&gt;&lt;td data-dcnode-id=&quot;7038&quot;&gt;&lt;span data-dcnode-id=&quot;7064&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;7040&quot;&gt;&lt;li data-dcnode-id=&quot;7062&quot;&gt;&lt;span data-dcnode-id=&quot;7063&quot; instrument_node=&quot;&quot;&gt;Total number of seats in Legislative Council is 90.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7061&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7056&quot;&gt;&lt;span data-dcnode-id=&quot;7060&quot; instrument_node=&quot;&quot;&gt;40 seats will be elected under &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7058&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/First-past-the-post&quot; title=&quot;First-past-the-post&quot;&gt;&lt;span data-dcnode-id=&quot;7059&quot; instrument_node=&quot;&quot;&gt;first-past-the-post&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7057&quot; instrument_node=&quot;&quot;&gt; (FPTP) system. With approximately 4&amp;nbsp;million registered voters, there would be about 100,000 voters in each constituency.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7055&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7044&quot;&gt;&lt;span data-dcnode-id=&quot;7054&quot; instrument_node=&quot;&quot;&gt;50 seats will be elected by &lt;/span&gt;&lt;a data-dcnode-id=&quot;7052&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation&quot; title=&quot;Proportional representation&quot;&gt;&lt;span data-dcnode-id=&quot;7053&quot; instrument_node=&quot;&quot;&gt;proportional representation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7051&quot; instrument_node=&quot;&quot;&gt;, with the whole Hong Kong as one constituency with current &lt;/span&gt;&lt;a data-dcnode-id=&quot;7049&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Largest_remainder_method&quot; title=&quot;Largest remainder method&quot;&gt;&lt;span data-dcnode-id=&quot;7050&quot; instrument_node=&quot;&quot;&gt;largest remainder method&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7048&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;7046&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hare_quota&quot; title=&quot;Hare quota&quot;&gt;&lt;span data-dcnode-id=&quot;7047&quot; instrument_node=&quot;&quot;&gt;Hare quota&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7045&quot; instrument_node=&quot;&quot;&gt;. There is no election threshold in the proposal, any list that obtains more than 2% of votes (assuming voter turnout rate is about 50%, that is about 40,000 votes) can secure one seat.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7043&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7041&quot;&gt;&lt;span data-dcnode-id=&quot;7042&quot; instrument_node=&quot;&quot;&gt;Compare to proposal B, this proposal has fewer seats elected under FPTP, and has no election threshold, it would be relatively beneficial to small parties.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;7039&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;td data-dcnode-id=&quot;7019&quot;&gt;&lt;span data-dcnode-id=&quot;7036&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;7021&quot;&gt;&lt;li data-dcnode-id=&quot;7034&quot;&gt;&lt;span data-dcnode-id=&quot;7035&quot; instrument_node=&quot;&quot;&gt;Number of seats in Legislative Council is 90.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7033&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7031&quot;&gt;&lt;span data-dcnode-id=&quot;7032&quot; instrument_node=&quot;&quot;&gt;50 seats will be elected under FPTP. With about 4&amp;nbsp;million registered voters with estimated about 80,000 voters in each constituency.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7025&quot;&gt;&lt;span data-dcnode-id=&quot;7029&quot; instrument_node=&quot;&quot;&gt;40 seats will be elected under &quot;proportional representation&quot;. Hong Kong will be divided into 6 to 7 constituencies, each constituency will return 6 to 7 seats, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;7027&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/D%2527Hondt_method&quot; title=&quot;D'Hondt method&quot;&gt;&lt;span data-dcnode-id=&quot;7028&quot; instrument_node=&quot;&quot;&gt;D'Hondt method&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7026&quot; instrument_node=&quot;&quot;&gt; will be adopted.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7024&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7022&quot;&gt;&lt;span data-dcnode-id=&quot;7023&quot; instrument_node=&quot;&quot;&gt;Compare to proposal A, this proposal has more seats elected under FPTP. The estimation is that parties with vote share lower than 5% may not get elected. The adoption of the D'Hondt method will reduce the fragmentation of the Legco.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;7020&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;7015&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;7005&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7013&quot; id=&quot;18_Scholar_Proposal&quot;&gt;&lt;span data-dcnode-id=&quot;7014&quot; instrument_node=&quot;&quot;&gt;18 Scholar Proposal&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7006&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7011&quot;&gt;&lt;span data-dcnode-id=&quot;7012&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7009&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D10&quot; title=&quot;Edit section: 18 Scholar Proposal&quot;&gt;&lt;span data-dcnode-id=&quot;7010&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7007&quot;&gt;&lt;span data-dcnode-id=&quot;7008&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;7004&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6992&quot;&gt;&lt;span data-dcnode-id=&quot;7003&quot; instrument_node=&quot;&quot;&gt;A group of 18 moderate academics, including Dr Brian Fong Chi-hang, vice-chairman of the thinktank SyngergyNet, former Legislative Council president &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7001&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Wong_Wang-fat&quot; title=&quot;Andrew Wong Wang-fat&quot;&gt;&lt;span data-dcnode-id=&quot;7002&quot; instrument_node=&quot;&quot;&gt;Andrew Wong Wang-fat&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7000&quot; instrument_node=&quot;&quot;&gt;, Community Care Fund head Dr &lt;/span&gt;&lt;a data-dcnode-id=&quot;6998&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Law_Chi-kwong&quot; title=&quot;Law Chi-kwong&quot;&gt;&lt;span data-dcnode-id=&quot;6999&quot; instrument_node=&quot;&quot;&gt;Law Chi-kwong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6997&quot; instrument_node=&quot;&quot;&gt; and University of Hong Kong law lecturer Eric Cheung Tat-ming, put forward a mid-way proposal in April 2014 to give the public a strong role in selecting Chief Executive candidates without breaching the Basic Law. Under the plan, a candidate who received signatures of support from 2% of registered voters and become a possible candidate to the 1,200-strong nominating committee. Political parties and committee members would also be able to put forward candidates, who would need the support of one-eighth of the committee to enter in the election with universal suffrage.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6994&quot; id=&quot;cite_ref-12&quot;&gt;&lt;a data-dcnode-id=&quot;6995&quot; href=&quot;#cite_note-12&quot;&gt;&lt;span data-dcnode-id=&quot;6996&quot; instrument_node=&quot;&quot;&gt;[12]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6993&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6991&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;6980&quot;&gt;&lt;span data-dcnode-id=&quot;6990&quot; id=&quot;DAB.27s_proposal&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6988&quot; id=&quot;DAB's_proposal&quot;&gt;&lt;span data-dcnode-id=&quot;6989&quot; instrument_node=&quot;&quot;&gt;DAB's proposal&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6981&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6986&quot;&gt;&lt;span data-dcnode-id=&quot;6987&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6984&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D11&quot; title=&quot;Edit section: DAB's proposal&quot;&gt;&lt;span data-dcnode-id=&quot;6985&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6982&quot;&gt;&lt;span data-dcnode-id=&quot;6983&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;6979&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6967&quot;&gt;&lt;span data-dcnode-id=&quot;6978&quot; instrument_node=&quot;&quot;&gt;The Beijing-loyalist &lt;/span&gt;&lt;a data-dcnode-id=&quot;6976&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Alliance_for_the_Betterment_and_Progress_of_Hong_Kong&quot; title=&quot;Democratic Alliance for the Betterment and Progress of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6977&quot; instrument_node=&quot;&quot;&gt;Democratic Alliance for the Betterment and Progress of Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6975&quot; instrument_node=&quot;&quot;&gt; (DAB) on 22 April 2014 also put forward its own proposal, suggesting the formation of the nominating committee should be composed with reference to the composition of the current &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6973&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Election_Committee&quot; title=&quot;Election Committee&quot;&gt;&lt;span data-dcnode-id=&quot;6974&quot; instrument_node=&quot;&quot;&gt;Election Committee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6972&quot; instrument_node=&quot;&quot;&gt;, consisting of four sectors that have equal number of members while establishing subsectors for the counselling profession, women and youth, and SMEs respectively. The DAB's proposal opposes any nominating methods which are not stipulated in the Basic Law, including &quot;public nomination&quot; and &quot;political party nomination&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6969&quot; id=&quot;cite_ref-DAB_13-0&quot;&gt;&lt;a data-dcnode-id=&quot;6970&quot; href=&quot;#cite_note-DAB-13&quot;&gt;&lt;span data-dcnode-id=&quot;6971&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6968&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6961&quot;&gt;&lt;span data-dcnode-id=&quot;6966&quot; instrument_node=&quot;&quot;&gt;An intended candidate should gain endorsements from not less than one-tenth and not more than one-eighth of members of the nominating committee to be recommended as an eligible prospective candidate. More than fifty percent of valid votes in the nominating committee a candidate should acquire for standing in the election for the collective will and the majority rule of the committee to be reflected.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6963&quot; id=&quot;cite_ref-DAB_13-1&quot;&gt;&lt;a data-dcnode-id=&quot;6964&quot; href=&quot;#cite_note-DAB-13&quot;&gt;&lt;span data-dcnode-id=&quot;6965&quot; instrument_node=&quot;&quot;&gt;[13]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6962&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6960&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;6950&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6958&quot; id=&quot;Key_issues&quot;&gt;&lt;span data-dcnode-id=&quot;6959&quot; instrument_node=&quot;&quot;&gt;Key issues&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6951&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6956&quot;&gt;&lt;span data-dcnode-id=&quot;6957&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6954&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D12&quot; title=&quot;Edit section: Key issues&quot;&gt;&lt;span data-dcnode-id=&quot;6955&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6952&quot;&gt;&lt;span data-dcnode-id=&quot;6953&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6938&quot;&gt;&lt;span data-dcnode-id=&quot;6948&quot; id=&quot;.22Love_the_Country_and_love_Hong_Kong.22&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6946&quot; id=&quot;&amp;quot;Love_the_Country_and_love_Hong_Kong&amp;quot;&quot;&gt;&lt;span data-dcnode-id=&quot;6947&quot; instrument_node=&quot;&quot;&gt;&quot;Love the Country and love Hong Kong&quot;&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6939&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6944&quot;&gt;&lt;span data-dcnode-id=&quot;6945&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6942&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D13&quot; title=&quot;Edit section: &amp;quot;Love the Country and love Hong Kong&amp;quot;&quot;&gt;&lt;span data-dcnode-id=&quot;6943&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6940&quot;&gt;&lt;span data-dcnode-id=&quot;6941&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6937&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6925&quot;&gt;&lt;span data-dcnode-id=&quot;6936&quot; instrument_node=&quot;&quot;&gt;On 24 March 2013, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6934&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Qiao_Xiaoyang&quot; title=&quot;Qiao Xiaoyang&quot;&gt;&lt;span data-dcnode-id=&quot;6935&quot; instrument_node=&quot;&quot;&gt;Qiao Xiaoyang&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6933&quot; instrument_node=&quot;&quot;&gt;, chairman of the Law Committee under the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6931&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/National_People%2527s_Congress_Standing_Committee&quot; title=&quot;National People's Congress Standing Committee&quot;&gt;&lt;span data-dcnode-id=&quot;6932&quot; instrument_node=&quot;&quot;&gt;National People's Congress Standing Committee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6930&quot; instrument_node=&quot;&quot;&gt; (NPCSC) stated that Chief Executive candidates must be persons who love the country and love Hong Kong, who do not insist on confronting the central government. Observers stated that Qiao comment was to screen out candidates from the opposition pro-democracy camp.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6927&quot; id=&quot;cite_ref-25/3/13_14-0&quot;&gt;&lt;a data-dcnode-id=&quot;6928&quot; href=&quot;#cite_note-25/3/13-14&quot;&gt;&lt;span data-dcnode-id=&quot;6929&quot; instrument_node=&quot;&quot;&gt;[14]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6926&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6919&quot;&gt;&lt;span data-dcnode-id=&quot;6924&quot; instrument_node=&quot;&quot;&gt;Li Fei, Qiao's successor as chairman of the NPCSC Law Committee stressed the similar statement on 22 November 2013, &quot;the chief executive is accountable to the central government as well as Hong Kong. This means that the post must be taken up by a person who loves the country as well as Hong Kong – anyone opposed to the central government cannot [take it].&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6921&quot; id=&quot;cite_ref-15&quot;&gt;&lt;a data-dcnode-id=&quot;6922&quot; href=&quot;#cite_note-15&quot;&gt;&lt;span data-dcnode-id=&quot;6923&quot; instrument_node=&quot;&quot;&gt;[15]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6920&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6918&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6908&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6916&quot; id=&quot;Civil_nomination&quot;&gt;&lt;span data-dcnode-id=&quot;6917&quot; instrument_node=&quot;&quot;&gt;Civil nomination&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6909&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6914&quot;&gt;&lt;span data-dcnode-id=&quot;6915&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6912&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D14&quot; title=&quot;Edit section: Civil nomination&quot;&gt;&lt;span data-dcnode-id=&quot;6913&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6910&quot;&gt;&lt;span data-dcnode-id=&quot;6911&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6907&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6864&quot;&gt;&lt;span data-dcnode-id=&quot;6906&quot; instrument_node=&quot;&quot;&gt;Some pan-democrats also demand the right of Hong Kong residents to nominate a CE candidate. Student-led group &lt;/span&gt;&lt;a data-dcnode-id=&quot;6904&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Scholarism&quot; title=&quot;Scholarism&quot;&gt;&lt;span data-dcnode-id=&quot;6905&quot; instrument_node=&quot;&quot;&gt;Scholarism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6903&quot; instrument_node=&quot;&quot;&gt; in September 2013 called for parties to sign a charter which lists &lt;/span&gt;&lt;a data-dcnode-id=&quot;6901&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Nominating_petition&quot; title=&quot;Nominating petition&quot;&gt;&lt;span data-dcnode-id=&quot;6902&quot; instrument_node=&quot;&quot;&gt;civil nomination&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6900&quot; instrument_node=&quot;&quot;&gt; as a priority.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6897&quot; id=&quot;cite_ref-20/9/2013_16-0&quot;&gt;&lt;a data-dcnode-id=&quot;6898&quot; href=&quot;#cite_note-20/9/2013-16&quot;&gt;&lt;span data-dcnode-id=&quot;6899&quot; instrument_node=&quot;&quot;&gt;[16]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6896&quot; instrument_node=&quot;&quot;&gt; Under the civil nomination proposal, the nominating committee may put forward to run those candidates who receive a quota of nominations from ordinary voters.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6893&quot; id=&quot;cite_ref-23/12/2013_17-0&quot;&gt;&lt;a data-dcnode-id=&quot;6894&quot; href=&quot;#cite_note-23/12/2013-17&quot;&gt;&lt;span data-dcnode-id=&quot;6895&quot; instrument_node=&quot;&quot;&gt;[17]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6892&quot; instrument_node=&quot;&quot;&gt; The &lt;/span&gt;&lt;a data-dcnode-id=&quot;6890&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28Hong_Kong%29&quot; title=&quot;Democratic Party (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;6891&quot; instrument_node=&quot;&quot;&gt;Democratic Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6889&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6887&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28Hong_Kong%29&quot; title=&quot;Labour Party (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;6888&quot; instrument_node=&quot;&quot;&gt;Labour Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6886&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6884&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Association_for_Democracy_and_People%2527s_Livelihood&quot; title=&quot;Association for Democracy and People's Livelihood&quot;&gt;&lt;span data-dcnode-id=&quot;6885&quot; instrument_node=&quot;&quot;&gt;Association for Democracy and People's Livelihood&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6883&quot; instrument_node=&quot;&quot;&gt; refused to sign it as they disagree that civil nomination is the only way to put forward candidates.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6880&quot; id=&quot;cite_ref-20/9/2013_16-1&quot;&gt;&lt;a data-dcnode-id=&quot;6881&quot; href=&quot;#cite_note-20/9/2013-16&quot;&gt;&lt;span data-dcnode-id=&quot;6882&quot; instrument_node=&quot;&quot;&gt;[16]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6879&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;6877&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Secretary_for_Justice_%28Hong_Kong%29&quot; title=&quot;Secretary for Justice (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;6878&quot; instrument_node=&quot;&quot;&gt;Secretary for Justice&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6876&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;6874&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Rimsky_Yuen&quot; title=&quot;Rimsky Yuen&quot;&gt;&lt;span data-dcnode-id=&quot;6875&quot; instrument_node=&quot;&quot;&gt;Rimsky Yuen&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6873&quot; instrument_node=&quot;&quot;&gt; raised legal arguments against civil nomination as he claimed it may bypass the nominating committee and &quot;turn it into a plastic stamp&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6870&quot; id=&quot;cite_ref-23/12/2013_17-1&quot;&gt;&lt;a data-dcnode-id=&quot;6871&quot; href=&quot;#cite_note-23/12/2013-17&quot;&gt;&lt;span data-dcnode-id=&quot;6872&quot; instrument_node=&quot;&quot;&gt;[17]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6869&quot; instrument_node=&quot;&quot;&gt; as Article 45 of the Basic Law states that &quot;the selection of the Chief Executive by universal suffrage upon nomination by a broadly representative nominating committee in accordance with democratic procedures.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6866&quot; id=&quot;cite_ref-18&quot;&gt;&lt;a data-dcnode-id=&quot;6867&quot; href=&quot;#cite_note-18&quot;&gt;&lt;span data-dcnode-id=&quot;6868&quot; instrument_node=&quot;&quot;&gt;[18]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6865&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6863&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6853&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6861&quot; id=&quot;Organisation_nomination&quot;&gt;&lt;span data-dcnode-id=&quot;6862&quot; instrument_node=&quot;&quot;&gt;Organisation nomination&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6854&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6859&quot;&gt;&lt;span data-dcnode-id=&quot;6860&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6857&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D15&quot; title=&quot;Edit section: Organisation nomination&quot;&gt;&lt;span data-dcnode-id=&quot;6858&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6855&quot;&gt;&lt;span data-dcnode-id=&quot;6856&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6852&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6842&quot;&gt;&lt;span data-dcnode-id=&quot;6851&quot; instrument_node=&quot;&quot;&gt;Qiao Xiaoyang also mentioned in his speech on 24 March 2013 that &quot;the nominating committee is in fact an organisation. The nomination of CE candidates by the nominating committee is a form of organisational nomination.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6848&quot; id=&quot;cite_ref-FOOTNOTEThe_Hong_Kong_Special_Administrative_Region_Government20133_19-0&quot;&gt;&lt;a data-dcnode-id=&quot;6849&quot; href=&quot;#cite_note-FOOTNOTEThe_Hong_Kong_Special_Administrative_Region_Government20133-19&quot;&gt;&lt;span data-dcnode-id=&quot;6850&quot; instrument_node=&quot;&quot;&gt;[19]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6847&quot; instrument_node=&quot;&quot;&gt; It is opposed by the pan-democracy camp as the method to screen out the opposition candidates as the pan-democrat candidates would not get a majority support from the nominating committee. The pan-democrat candidates were able to enter the last CE elections by getting just one-eighth of the nomination threshold from the Election Committee. There were also some interpretations that an organisational nomination would be a breach of the Basic Law.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6844&quot; id=&quot;cite_ref-20&quot;&gt;&lt;a data-dcnode-id=&quot;6845&quot; href=&quot;#cite_note-20&quot;&gt;&lt;span data-dcnode-id=&quot;6846&quot; instrument_node=&quot;&quot;&gt;[20]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6843&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6841&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;6830&quot;&gt;&lt;span data-dcnode-id=&quot;6840&quot; id=&quot;Pan-democrats.27_campaign&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6838&quot; id=&quot;Pan-democrats'_campaign&quot;&gt;&lt;span data-dcnode-id=&quot;6839&quot; instrument_node=&quot;&quot;&gt;Pan-democrats' campaign&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6831&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6836&quot;&gt;&lt;span data-dcnode-id=&quot;6837&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6834&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D16&quot; title=&quot;Edit section: Pan-democrats' campaign&quot;&gt;&lt;span data-dcnode-id=&quot;6835&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6832&quot;&gt;&lt;span data-dcnode-id=&quot;6833&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6829&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6808&quot;&gt;&lt;span data-dcnode-id=&quot;6828&quot; instrument_node=&quot;&quot;&gt;On 21 March 2013, twelve pan-democratic groups on the basis of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6826&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alliance_for_Universal_Suffrage&quot; title=&quot;Alliance for Universal Suffrage&quot;&gt;&lt;span data-dcnode-id=&quot;6827&quot; instrument_node=&quot;&quot;&gt;Alliance for Universal Suffrage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6825&quot; instrument_node=&quot;&quot;&gt; for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6823&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2010_Hong_Kong_electoral_reform&quot; title=&quot;2010 Hong Kong electoral reform&quot;&gt;&lt;span data-dcnode-id=&quot;6824&quot; instrument_node=&quot;&quot;&gt;2010 electoral reform&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6822&quot; instrument_node=&quot;&quot;&gt; formed the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6820&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alliance_for_True_Democracy&quot; title=&quot;Alliance for True Democracy&quot;&gt;&lt;span data-dcnode-id=&quot;6821&quot; instrument_node=&quot;&quot;&gt;Alliance for True Democracy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6819&quot; instrument_node=&quot;&quot;&gt;. Chaired by Convenor &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6817&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Cheng_Yu-shek&quot; title=&quot;Joseph Cheng Yu-shek&quot;&gt;&lt;span data-dcnode-id=&quot;6818&quot; instrument_node=&quot;&quot;&gt;Joseph Cheng Yu-shek&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6816&quot; instrument_node=&quot;&quot;&gt;, political scientist at the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6814&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/City_University_of_Hong_Kong&quot; title=&quot;City University of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6815&quot; instrument_node=&quot;&quot;&gt;City University of Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6813&quot; instrument_node=&quot;&quot;&gt;, the alliance priority would be to strive for public support in the political reform debate, and to form a consensus proposal by the end of the year.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6810&quot; id=&quot;cite_ref-21&quot;&gt;&lt;a data-dcnode-id=&quot;6811&quot; href=&quot;#cite_note-21&quot;&gt;&lt;span data-dcnode-id=&quot;6812&quot; instrument_node=&quot;&quot;&gt;[21]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6809&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6787&quot;&gt;&lt;span data-dcnode-id=&quot;6807&quot; instrument_node=&quot;&quot;&gt;A group called &lt;/span&gt;&lt;a data-dcnode-id=&quot;6805&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_2020&quot; title=&quot;Hong Kong 2020&quot;&gt;&lt;span data-dcnode-id=&quot;6806&quot; instrument_node=&quot;&quot;&gt;Hong Kong 2020&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6804&quot; instrument_node=&quot;&quot;&gt;, launched by Convenor &lt;/span&gt;&lt;a data-dcnode-id=&quot;6802&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Anson_Chan&quot; title=&quot;Anson Chan&quot;&gt;&lt;span data-dcnode-id=&quot;6803&quot; instrument_node=&quot;&quot;&gt;Anson Chan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6801&quot; instrument_node=&quot;&quot;&gt;, the former Chief Secretary for Administration on 24 April 2013, with members such as &lt;/span&gt;&lt;a data-dcnode-id=&quot;6799&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Allen_Lee&quot; title=&quot;Allen Lee&quot;&gt;&lt;span data-dcnode-id=&quot;6800&quot; instrument_node=&quot;&quot;&gt;Allen Lee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6798&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6796&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Chan&quot; title=&quot;Johannes Chan&quot;&gt;&lt;span data-dcnode-id=&quot;6797&quot; instrument_node=&quot;&quot;&gt;Johannes Chan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6795&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;6793&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Gladys_Li&quot; title=&quot;Gladys Li&quot;&gt;&lt;span data-dcnode-id=&quot;6794&quot; instrument_node=&quot;&quot;&gt;Gladys Li&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6792&quot; instrument_node=&quot;&quot;&gt;, strives for the full implementation of the universal suffrage for 2017 CE election and 2020 LegCo election.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6789&quot; id=&quot;cite_ref-22&quot;&gt;&lt;a data-dcnode-id=&quot;6790&quot; href=&quot;#cite_note-22&quot;&gt;&lt;span data-dcnode-id=&quot;6791&quot; instrument_node=&quot;&quot;&gt;[22]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6778&quot;&gt;&lt;span data-dcnode-id=&quot;6786&quot; instrument_node=&quot;&quot;&gt;The New Year demonstration for genuine democracy on 1 January 2014 drew thousands of people. A &quot;New Year Civil Referendum&quot; was also conducted at the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6784&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Victoria_Park%2C_Hong_Kong&quot; title=&quot;Victoria Park, Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6785&quot; instrument_node=&quot;&quot;&gt;Victoria Park&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6783&quot; instrument_node=&quot;&quot;&gt; and over the Internet on the same day. More than 94 percent of over 62,000 voters thought that there should be an &quot;element of civil nomination&quot; in the CE election.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6780&quot; id=&quot;cite_ref-23&quot;&gt;&lt;a data-dcnode-id=&quot;6781&quot; href=&quot;#cite_note-23&quot;&gt;&lt;span data-dcnode-id=&quot;6782&quot; instrument_node=&quot;&quot;&gt;[23]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6779&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6763&quot;&gt;&lt;span data-dcnode-id=&quot;6777&quot; instrument_node=&quot;&quot;&gt;Scholarism also suggested a plan for five legislators from pan-democracy parties to quit as a means to trigger another de facto &lt;/span&gt;&lt;a data-dcnode-id=&quot;6775&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Referendum&quot; title=&quot;Referendum&quot;&gt;&lt;span data-dcnode-id=&quot;6776&quot; instrument_node=&quot;&quot;&gt;referendum&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6774&quot; instrument_node=&quot;&quot;&gt; on political reform, mirroring the similar move that five legislators resigned and launched the &quot;&lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6772&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2010_Hong_Kong_by-election&quot; title=&quot;2010 Hong Kong by-election&quot;&gt;&lt;span data-dcnode-id=&quot;6773&quot; instrument_node=&quot;&quot;&gt;five constituency referendum&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6771&quot; instrument_node=&quot;&quot;&gt;&quot; for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6769&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2010_Hong_Kong_electoral_reform&quot; title=&quot;2010 Hong Kong electoral reform&quot;&gt;&lt;span data-dcnode-id=&quot;6770&quot; instrument_node=&quot;&quot;&gt;2010 reform package&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6768&quot; instrument_node=&quot;&quot;&gt;. However, major pro-democracy parties have expressed reservations, with some fearing that such action could divert public attention from the camp's Occupy Central strategy to fight for universal suffrage.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6765&quot; id=&quot;cite_ref-24&quot;&gt;&lt;a data-dcnode-id=&quot;6766&quot; href=&quot;#cite_note-24&quot;&gt;&lt;span data-dcnode-id=&quot;6767&quot; instrument_node=&quot;&quot;&gt;[24]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6764&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6762&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6752&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6760&quot; id=&quot;Occupy_Central_movement&quot;&gt;&lt;span data-dcnode-id=&quot;6761&quot; instrument_node=&quot;&quot;&gt;Occupy Central movement&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6753&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6758&quot;&gt;&lt;span data-dcnode-id=&quot;6759&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6756&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D17&quot; title=&quot;Edit section: Occupy Central movement&quot;&gt;&lt;span data-dcnode-id=&quot;6757&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6754&quot;&gt;&lt;span data-dcnode-id=&quot;6755&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6751&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;link data-dcnode-id=&quot;6750&quot; href=&quot;mw-data:TemplateStyles:r1033289096&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;div class=&quot;hatnote navigation-not-searchable&quot; data-dcnode-id=&quot;6746&quot; role=&quot;note&quot;&gt;&lt;span data-dcnode-id=&quot;6749&quot; instrument_node=&quot;&quot;&gt;Main article: &lt;/span&gt;&lt;a data-dcnode-id=&quot;6747&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Occupy_Central_with_Love_and_Peace&quot; title=&quot;Occupy Central with Love and Peace&quot;&gt;&lt;span data-dcnode-id=&quot;6748&quot; instrument_node=&quot;&quot;&gt;Occupy Central with Love and Peace&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6745&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6724&quot;&gt;&lt;span data-dcnode-id=&quot;6744&quot; instrument_node=&quot;&quot;&gt;In early 2013, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6742&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Benny_Tai&quot; title=&quot;Benny Tai&quot;&gt;&lt;span data-dcnode-id=&quot;6743&quot; instrument_node=&quot;&quot;&gt;Benny Tai&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6741&quot; instrument_node=&quot;&quot;&gt;, Associate Professor of Law at the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6739&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/University_of_Hong_Kong&quot; title=&quot;University of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6740&quot; instrument_node=&quot;&quot;&gt;University of Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6738&quot; instrument_node=&quot;&quot;&gt; started the campaign called &quot;Occupy Central with Love and Peace&quot; that proposes a &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6736&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Nonviolent&quot; title=&quot;Nonviolent&quot;&gt;&lt;span data-dcnode-id=&quot;6737&quot; instrument_node=&quot;&quot;&gt;nonviolent&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6735&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;6733&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Occupation_%28protest%29&quot; title=&quot;Occupation (protest)&quot;&gt;&lt;span data-dcnode-id=&quot;6734&quot; instrument_node=&quot;&quot;&gt;occupation protest&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6732&quot; instrument_node=&quot;&quot;&gt; at &lt;/span&gt;&lt;a data-dcnode-id=&quot;6730&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Central%2C_Hong_Kong&quot; title=&quot;Central, Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6731&quot; instrument_node=&quot;&quot;&gt;Central, Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6729&quot; instrument_node=&quot;&quot;&gt; in mid 2014 if promises made by the Central People's Government for universal suffrage were not realised.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6726&quot; id=&quot;cite_ref-25/2/13_25-0&quot;&gt;&lt;a data-dcnode-id=&quot;6727&quot; href=&quot;#cite_note-25/2/13-25&quot;&gt;&lt;span data-dcnode-id=&quot;6728&quot; instrument_node=&quot;&quot;&gt;[25]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6725&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6706&quot;&gt;&lt;span data-dcnode-id=&quot;6723&quot; instrument_node=&quot;&quot;&gt;The Occupy Central movement commissioned HKPOP to run a poll on three proposals which involve allowing citizens to directly nominate candidates to present to the Beijing government from 20 to 29 June 2014.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6720&quot; id=&quot;cite_ref-unofficial_referendum_Guardian_26-0&quot;&gt;&lt;a data-dcnode-id=&quot;6721&quot; href=&quot;#cite_note-unofficial_referendum_Guardian-26&quot;&gt;&lt;span data-dcnode-id=&quot;6722&quot; instrument_node=&quot;&quot;&gt;[26]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6719&quot; instrument_node=&quot;&quot;&gt; A total of 792,808 people, equivalent to a fifth of the registered electorate, took part in the poll by either voting online or going to designated polling stations,.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6716&quot; id=&quot;cite_ref-27&quot;&gt;&lt;a data-dcnode-id=&quot;6717&quot; href=&quot;#cite_note-27&quot;&gt;&lt;span data-dcnode-id=&quot;6718&quot; instrument_node=&quot;&quot;&gt;[27]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6715&quot; instrument_node=&quot;&quot;&gt; All three call for the public to be allowed to nominate candidates for the 2017 chief executive election, an idea repeatedly dismissed by Beijing as inconsistent with the Basic Law. However, the Alliance's &quot;three track&quot; proposal would allow the public, the nominating committee, as well as political parties, to put forward candidates.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6712&quot; id=&quot;cite_ref-ATD_wins_28-0&quot;&gt;&lt;a data-dcnode-id=&quot;6713&quot; href=&quot;#cite_note-ATD_wins-28&quot;&gt;&lt;span data-dcnode-id=&quot;6714&quot; instrument_node=&quot;&quot;&gt;[28]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6711&quot; instrument_node=&quot;&quot;&gt; 691,972 voters (87.8 per cent) agreed that the Legislative Council should veto any reform proposal put forward by the government if it failed to meet international standards, compared with 7.5 per cent who disagreed.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6708&quot; id=&quot;cite_ref-ATD_wins_28-1&quot;&gt;&lt;a data-dcnode-id=&quot;6709&quot; href=&quot;#cite_note-ATD_wins-28&quot;&gt;&lt;span data-dcnode-id=&quot;6710&quot; instrument_node=&quot;&quot;&gt;[28]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6707&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6697&quot;&gt;&lt;span data-dcnode-id=&quot;6705&quot; instrument_node=&quot;&quot;&gt;A counter organisation, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6703&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alliance_for_Peace_and_Democracy_%28Hong_Kong%29&quot; title=&quot;Alliance for Peace and Democracy (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;6704&quot; instrument_node=&quot;&quot;&gt;Alliance for Peace and Democracy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6702&quot; instrument_node=&quot;&quot;&gt;, orchestrated by Beijing, was established to counter the Occupy Central movement and it received widespread media attention when it launched a month-long signature campaign for people who oppose the Occupy Central Movement, which lasted from 19 July 2014 to 17 August 2014. The campaign claimed it had collected over a million signatures supporting the campaign, although questions are raised over credibility of the number of signatures collected.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6699&quot; id=&quot;cite_ref-TS1_29-0&quot;&gt;&lt;a data-dcnode-id=&quot;6700&quot; href=&quot;#cite_note-TS1-29&quot;&gt;&lt;span data-dcnode-id=&quot;6701&quot; instrument_node=&quot;&quot;&gt;[29]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6686&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6694&quot; id=&quot;August_talks&quot;&gt;&lt;span data-dcnode-id=&quot;6695&quot; instrument_node=&quot;&quot;&gt;August talks&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6687&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6692&quot;&gt;&lt;span data-dcnode-id=&quot;6693&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6690&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D18&quot; title=&quot;Edit section: August talks&quot;&gt;&lt;span data-dcnode-id=&quot;6691&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6688&quot;&gt;&lt;span data-dcnode-id=&quot;6689&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6659&quot;&gt;&lt;span data-dcnode-id=&quot;6684&quot; instrument_node=&quot;&quot;&gt;In mid August, pan-democratic legislators met with &lt;/span&gt;&lt;a data-dcnode-id=&quot;6682&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Zhang_Xiaoming&quot; title=&quot;Zhang Xiaoming&quot;&gt;&lt;span data-dcnode-id=&quot;6683&quot; instrument_node=&quot;&quot;&gt;Zhang Xiaoming&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6681&quot; instrument_node=&quot;&quot;&gt;, Director of the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6679&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Liaison_Office_of_the_Central_People%2527s_Government_in_Hong_Kong&quot; title=&quot;Liaison Office of the Central People's Government in Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6680&quot; instrument_node=&quot;&quot;&gt;Liaison Office of the Central People's Government in Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6678&quot; instrument_node=&quot;&quot;&gt; in groups to discuss political reform. Zhang stressed again that Hong Kong should consider political reform from a national security point of view and that Beijing and Hong Kong must be wary of a very small number of people trying to turn the territory into a base against the mainland.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6675&quot; id=&quot;cite_ref-talks_30-0&quot;&gt;&lt;a data-dcnode-id=&quot;6676&quot; href=&quot;#cite_note-talks-30&quot;&gt;&lt;span data-dcnode-id=&quot;6677&quot; instrument_node=&quot;&quot;&gt;[30]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6674&quot; instrument_node=&quot;&quot;&gt; Following that, 49 of the 70 Legislative Councillors went to Shenzhen to discuss political reforms on 21 August. It was attended by Director of the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6672&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_and_Macao_Affairs_Office&quot; title=&quot;Hong Kong and Macao Affairs Office&quot;&gt;&lt;span data-dcnode-id=&quot;6673&quot; instrument_node=&quot;&quot;&gt;Hong Kong and Macao Affairs Office&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6671&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;6669&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wang_Guangya&quot; title=&quot;Wang Guangya&quot;&gt;&lt;span data-dcnode-id=&quot;6670&quot; instrument_node=&quot;&quot;&gt;Wang Guangya&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6668&quot; instrument_node=&quot;&quot;&gt; and Basic Law Committee chairman Li Fei and also 15 pan-democrats. The Beijing officials and pan-democrats also met exclusively to further the discussion of the different stances between the two parties. Before the meeting, 26 pan-democrat legislators vowed to veto any reform proposal for the 2017 chief executive election that does not meet international standards for universal suffrage.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6665&quot; id=&quot;cite_ref-31&quot;&gt;&lt;a data-dcnode-id=&quot;6666&quot; href=&quot;#cite_note-31&quot;&gt;&lt;span data-dcnode-id=&quot;6667&quot; instrument_node=&quot;&quot;&gt;[31]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6664&quot; instrument_node=&quot;&quot;&gt; Labour Party lawmaker Lee Cheuk-yan, said Hong Kong should not accept a proposal that only promises &quot;one person, one vote,&quot; but screens out popular candidates.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6661&quot; id=&quot;cite_ref-talks_30-1&quot;&gt;&lt;a data-dcnode-id=&quot;6662&quot; href=&quot;#cite_note-talks-30&quot;&gt;&lt;span data-dcnode-id=&quot;6663&quot; instrument_node=&quot;&quot;&gt;[30]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6660&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6658&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;6647&quot;&gt;&lt;span data-dcnode-id=&quot;6657&quot; id=&quot;NPCSC.27s_31_August_decision_and_the_protests&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6655&quot; id=&quot;NPCSC's_31_August_decision_and_the_protests&quot;&gt;&lt;span data-dcnode-id=&quot;6656&quot; instrument_node=&quot;&quot;&gt;NPCSC's 31 August decision and the protests&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6648&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6653&quot;&gt;&lt;span data-dcnode-id=&quot;6654&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6651&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D19&quot; title=&quot;Edit section: NPCSC's 31 August decision and the protests&quot;&gt;&lt;span data-dcnode-id=&quot;6652&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6649&quot;&gt;&lt;span data-dcnode-id=&quot;6650&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6646&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;link data-dcnode-id=&quot;6645&quot; href=&quot;mw-data:TemplateStyles:r1033289096&quot; rel=&quot;mw-deduplicated-inline-style&quot;&gt;&lt;div class=&quot;hatnote navigation-not-searchable&quot; data-dcnode-id=&quot;6638&quot; role=&quot;note&quot;&gt;&lt;span data-dcnode-id=&quot;6644&quot; instrument_node=&quot;&quot;&gt;Main articles: &lt;/span&gt;&lt;a data-dcnode-id=&quot;6642&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2014_NPCSC_Decision_on_Hong_Kong&quot; title=&quot;2014 NPCSC Decision on Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6643&quot; instrument_node=&quot;&quot;&gt;2014 NPCSC Decision on Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6641&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;6639&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2014_Hong_Kong_protests&quot; title=&quot;2014 Hong Kong protests&quot;&gt;&lt;span data-dcnode-id=&quot;6640&quot; instrument_node=&quot;&quot;&gt;2014 Hong Kong protests&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6637&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6628&quot;&gt;&lt;span data-dcnode-id=&quot;6636&quot; instrument_node=&quot;&quot;&gt;On 31 August 2014, the Tenth Session of the Standing Committee of the Twelfth &lt;/span&gt;&lt;a data-dcnode-id=&quot;6634&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/National_People%2527s_Congress&quot; title=&quot;National People's Congress&quot;&gt;&lt;span data-dcnode-id=&quot;6635&quot; instrument_node=&quot;&quot;&gt;National People's Congress&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6633&quot; instrument_node=&quot;&quot;&gt; (NPCSC) set limits for the 2016 Legislative Council and 2017 Chief Executive elections. While calling for &quot;universal suffrage,&quot; the &lt;/span&gt;&lt;i data-dcnode-id=&quot;6630&quot;&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6631&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/831_decision&quot; title=&quot;831 decision&quot;&gt;&lt;span data-dcnode-id=&quot;6632&quot; instrument_node=&quot;&quot;&gt;Decision of the Standing Committee of the National People's Congress&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;6629&quot; instrument_node=&quot;&quot;&gt; imposes the standard that &quot;the Chief Executive shall be a person who loves the country and loves Hong Kong&quot; and requires that &quot;the method for selecting the Chief Executive by universal suffrage must provide corresponding institutional safeguards for this purpose.&quot;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6622&quot;&gt;&lt;span data-dcnode-id=&quot;6627&quot; instrument_node=&quot;&quot;&gt;The decision states that for the 2017 Chief Executive election, a nominating committee, similar to the present Election Committee system, be formed to nominate two to three candidates, each of whom must receive the support of more than half of the members of the nominating committee. After popular election of one of the nominated candidates, the new Chief Executive &quot;will have to be appointed by the Central People's Government.&quot; The process of forming the 2016 Legislative Council would be unchanged, but following the new process for the election of the Chief Executive, a new system to elect the Legislative Council via universal suffrage would be developed with the approval of Beijing.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6624&quot; id=&quot;cite_ref-32&quot;&gt;&lt;a data-dcnode-id=&quot;6625&quot; href=&quot;#cite_note-32&quot;&gt;&lt;span data-dcnode-id=&quot;6626&quot; instrument_node=&quot;&quot;&gt;[32]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6591&quot;&gt;&lt;span data-dcnode-id=&quot;6621&quot; instrument_node=&quot;&quot;&gt;While Li Fei, a deputy secretary general of the committee, said that the procedure would &quot;protect the broad stability of Hong Kong now and in the future,&quot; pro-democracy advocates viewed the decision as a betrayal of the principle of &quot;one person, one vote,&quot; as they feared that candidates deemed unsuitable by the Beijing authorities would stand no chance at being nominated. The Standing Committee decision is set to be the basis for new electoral law crafted by the Legislative Council, where &lt;/span&gt;&lt;a data-dcnode-id=&quot;6619&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28Hong_Kong%29&quot; title=&quot;Democratic Party (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;6620&quot; instrument_node=&quot;&quot;&gt;Hong Kong's Democratic Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6618&quot; instrument_node=&quot;&quot;&gt; has already promised to &quot;veto this revolting proposal.&quot; As a result of the decision, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6616&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Occupy_Central_with_Love_and_Peace&quot; title=&quot;Occupy Central with Love and Peace&quot;&gt;&lt;span data-dcnode-id=&quot;6617&quot; instrument_node=&quot;&quot;&gt;Occupy Central&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6615&quot; instrument_node=&quot;&quot;&gt; said it was planning &lt;/span&gt;&lt;a data-dcnode-id=&quot;6613&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Civil_disobedience&quot; title=&quot;Civil disobedience&quot;&gt;&lt;span data-dcnode-id=&quot;6614&quot; instrument_node=&quot;&quot;&gt;civil disobedience&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6612&quot; instrument_node=&quot;&quot;&gt; protests.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6609&quot; id=&quot;cite_ref-33&quot;&gt;&lt;a data-dcnode-id=&quot;6610&quot; href=&quot;#cite_note-33&quot;&gt;&lt;span data-dcnode-id=&quot;6611&quot; instrument_node=&quot;&quot;&gt;[33]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6608&quot; instrument_node=&quot;&quot;&gt; Also in response to the CPC decision, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6606&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_Federation_of_Students&quot; title=&quot;Hong Kong Federation of Students&quot;&gt;&lt;span data-dcnode-id=&quot;6607&quot; instrument_node=&quot;&quot;&gt;Hong Kong Federation of Students&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6605&quot; instrument_node=&quot;&quot;&gt; and the student pressure group &lt;/span&gt;&lt;a data-dcnode-id=&quot;6603&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Scholarism&quot; title=&quot;Scholarism&quot;&gt;&lt;span data-dcnode-id=&quot;6604&quot; instrument_node=&quot;&quot;&gt;Scholarism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6602&quot; instrument_node=&quot;&quot;&gt; staged a co-ordinated class boycott in Hong Kong and organise public events, including street assemblies,&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6599&quot; id=&quot;cite_ref-globalpost_34-0&quot;&gt;&lt;a data-dcnode-id=&quot;6600&quot; href=&quot;#cite_note-globalpost-34&quot;&gt;&lt;span data-dcnode-id=&quot;6601&quot; instrument_node=&quot;&quot;&gt;[34]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6596&quot; id=&quot;cite_ref-35&quot;&gt;&lt;a data-dcnode-id=&quot;6597&quot; href=&quot;#cite_note-35&quot;&gt;&lt;span data-dcnode-id=&quot;6598&quot; instrument_node=&quot;&quot;&gt;[35]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6595&quot; instrument_node=&quot;&quot;&gt; which escalated into a 79-day &lt;/span&gt;&lt;a data-dcnode-id=&quot;6593&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2014_Hong_Kong_protests&quot; title=&quot;2014 Hong Kong protests&quot;&gt;&lt;span data-dcnode-id=&quot;6594&quot; instrument_node=&quot;&quot;&gt;large-scale occupy movement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6592&quot; instrument_node=&quot;&quot;&gt;.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;6580&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6588&quot; id=&quot;Second_consultation&quot;&gt;&lt;span data-dcnode-id=&quot;6589&quot; instrument_node=&quot;&quot;&gt;Second consultation&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6581&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6586&quot;&gt;&lt;span data-dcnode-id=&quot;6587&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6584&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D20&quot; title=&quot;Edit section: Second consultation&quot;&gt;&lt;span data-dcnode-id=&quot;6585&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6582&quot;&gt;&lt;span data-dcnode-id=&quot;6583&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6568&quot;&gt;&lt;span data-dcnode-id=&quot;6578&quot; instrument_node=&quot;&quot;&gt;On 7 January 2015, the Hong Kong government published the &lt;/span&gt;&lt;i data-dcnode-id=&quot;6576&quot;&gt;&lt;span data-dcnode-id=&quot;6577&quot; instrument_node=&quot;&quot;&gt;Consultation Document on the Method for Selecting the Chief Executive by Universal Suffrage&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;6575&quot; instrument_node=&quot;&quot;&gt; (Consultation Document) and launched a two-month public consultation on the method for selecting the Chief Executive (CE) by universal suffrage which ended on 7 March 2015. In the same month, the HKSAR government also released the &lt;/span&gt;&lt;i data-dcnode-id=&quot;6573&quot;&gt;&lt;span data-dcnode-id=&quot;6574&quot; instrument_node=&quot;&quot;&gt;Report on the Recent Community and Political Situation in Hong Kong&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;6572&quot; instrument_node=&quot;&quot;&gt;, as its promise to the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6570&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_Federation_of_Students&quot; title=&quot;Hong Kong Federation of Students&quot;&gt;&lt;span data-dcnode-id=&quot;6571&quot; instrument_node=&quot;&quot;&gt;Hong Kong Federation of Students&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6569&quot; instrument_node=&quot;&quot;&gt; after the negiotation with the leaders in the course of the occupy movement.  In protest to the NPCSC, the pan-democracy camp boycotted the consultation.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6560&quot;&gt;&lt;a data-dcnode-id=&quot;6566&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Albert_Chen_Hung-yee&quot; title=&quot;Albert Chen Hung-yee&quot;&gt;&lt;span data-dcnode-id=&quot;6567&quot; instrument_node=&quot;&quot;&gt;Albert Chen Hung-yee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6565&quot; instrument_node=&quot;&quot;&gt;, a constitutional law expert and member of the National People's Congress Basic Law Committee, put forward a proposal suggesting a compromised proposal with &quot;none of the above&quot; option on the ballot paper. Under the plan, if &quot;none of the above&quot; accounts for 50 per cent of the vote or more, there has to be a revote. It is intended to put pressure on the candidates, handpicked by a 1,200-strong nominating body, to lobby for support of the public as well as that of the committee members. Pan-democrats call it a &quot;passive&quot; scheme and dislike the high threshold for a revote, while the pro-Beijing side does not want to give the public veto power. Chen dropped the proposal in March, citing &quot;[a]t this stage I can't see any proposal will be accepted by both camps&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6562&quot; id=&quot;cite_ref-36&quot;&gt;&lt;a data-dcnode-id=&quot;6563&quot; href=&quot;#cite_note-36&quot;&gt;&lt;span data-dcnode-id=&quot;6564&quot; instrument_node=&quot;&quot;&gt;[36]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6547&quot;&gt;&lt;span data-dcnode-id=&quot;6559&quot; instrument_node=&quot;&quot;&gt;On 4 March 2015, Dr &lt;/span&gt;&lt;a data-dcnode-id=&quot;6557&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Robert_Chung&quot; title=&quot;Robert Chung&quot;&gt;&lt;span data-dcnode-id=&quot;6558&quot; instrument_node=&quot;&quot;&gt;Robert Chung&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6556&quot; instrument_node=&quot;&quot;&gt;, director of University of Hong Kong's Public Opinion Programme, suggested the government hold a vote to gauge public views after it releases its reform proposal in the next month. &quot;If two-thirds of the voters say they want to pass the package, the pan-democrats should respect the results and not insist on a veto,&quot;, Chung said, as the two-thirds majority is the requirement laid down in the Basic Law for the legislature to pass any political reform.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6553&quot; id=&quot;cite_ref-37&quot;&gt;&lt;a data-dcnode-id=&quot;6554&quot; href=&quot;#cite_note-37&quot;&gt;&lt;span data-dcnode-id=&quot;6555&quot; instrument_node=&quot;&quot;&gt;[37]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6552&quot; instrument_node=&quot;&quot;&gt; Secretary for Justice Rimsky Yuen Kwok-keung dismissed the idea as &quot;[u]nder the Basic Law, there is no provision for a referendum. And Hong Kong is a special administrative region, therefore, there is no legal basis for us to have a referendum.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6549&quot; id=&quot;cite_ref-38&quot;&gt;&lt;a data-dcnode-id=&quot;6550&quot; href=&quot;#cite_note-38&quot;&gt;&lt;span data-dcnode-id=&quot;6551&quot; instrument_node=&quot;&quot;&gt;[38]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6548&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;6536&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6544&quot; id=&quot;Formal_proposals_by_the_SAR_government&quot;&gt;&lt;span data-dcnode-id=&quot;6545&quot; instrument_node=&quot;&quot;&gt;Formal proposals by the SAR government&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6537&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6542&quot;&gt;&lt;span data-dcnode-id=&quot;6543&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6540&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D21&quot; title=&quot;Edit section: Formal proposals by the SAR government&quot;&gt;&lt;span data-dcnode-id=&quot;6541&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6538&quot;&gt;&lt;span data-dcnode-id=&quot;6539&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6535&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6526&quot;&gt;&lt;span data-dcnode-id=&quot;6534&quot; instrument_node=&quot;&quot;&gt;On 22 April 2015, the Hong Kong government unveiled its proposal for the electoral reform in the &lt;/span&gt;&lt;i data-dcnode-id=&quot;6532&quot;&gt;&lt;span data-dcnode-id=&quot;6533&quot; instrument_node=&quot;&quot;&gt;Report on the Public Consultation on the Methods for Selecting the Chief Executive in 2017 and for Forming the Legislative Council in 2016&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;6531&quot; instrument_node=&quot;&quot;&gt;. Legislative Council convened to discuss the election overhaul plan. The new plan retained the composition of the Election Committee, forming a Nominating Committee at 1200 consisting of four sectors. No changes are proposed to the 38 sub-sectors of the Election Committee.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6528&quot; id=&quot;cite_ref-39&quot;&gt;&lt;a data-dcnode-id=&quot;6529&quot; href=&quot;#cite_note-39&quot;&gt;&lt;span data-dcnode-id=&quot;6530&quot; instrument_node=&quot;&quot;&gt;[39]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6527&quot; instrument_node=&quot;&quot;&gt;
