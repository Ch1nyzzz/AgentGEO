tive of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;7912&quot; instrument_node=&quot;&quot;&gt;Chief Executive&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7910&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;7908&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Leung_Chun-ying&quot; title=&quot;Leung Chun-ying&quot;&gt;&lt;span data-dcnode-id=&quot;7909&quot; instrument_node=&quot;&quot;&gt;Leung Chun-ying&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7907&quot; instrument_node=&quot;&quot;&gt; published the Consultation Report on 15 July 2014.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;7903&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7862&quot;&gt;&lt;span data-dcnode-id=&quot;7891&quot; instrument_node=&quot;&quot;&gt;According to the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7889&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/831_decision&quot; title=&quot;831 decision&quot;&gt;&lt;span data-dcnode-id=&quot;7890&quot; instrument_node=&quot;&quot;&gt;decision&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7888&quot; instrument_node=&quot;&quot;&gt; made by the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7886&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/National_People%2527s_Congress_Standing_Committee&quot; title=&quot;National People's Congress Standing Committee&quot;&gt;&lt;span data-dcnode-id=&quot;7887&quot; instrument_node=&quot;&quot;&gt;National People's Congress Standing Committee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7885&quot; instrument_node=&quot;&quot;&gt; (NPCSC) of the People's Republic of China in 2007, the 2017 Chief Executive election may be implemented by &lt;/span&gt;&lt;a data-dcnode-id=&quot;7883&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Universal_suffrage&quot; title=&quot;Universal suffrage&quot;&gt;&lt;span data-dcnode-id=&quot;7884&quot; instrument_node=&quot;&quot;&gt;universal suffrage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7882&quot; instrument_node=&quot;&quot;&gt;. The issues on how to achieve universal suffrage in the 2017 Chief Executive election became the focal point of the public debates.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7879&quot; id=&quot;cite_ref-1&quot;&gt;&lt;a data-dcnode-id=&quot;7880&quot; href=&quot;#cite_note-1&quot;&gt;&lt;span data-dcnode-id=&quot;7881&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7878&quot; instrument_node=&quot;&quot;&gt; Most of the major political factions campaigned for their ideas on universal suffrage, including &lt;/span&gt;&lt;a data-dcnode-id=&quot;7876&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Occupy_Central_with_Love_and_Peace&quot; title=&quot;Occupy Central with Love and Peace&quot;&gt;&lt;span data-dcnode-id=&quot;7877&quot; instrument_node=&quot;&quot;&gt;Occupy Central with Love and Peace&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7875&quot; instrument_node=&quot;&quot;&gt;, an advocacy group for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7873&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Occupation_%28protest%29&quot; title=&quot;Occupation (protest)&quot;&gt;&lt;span data-dcnode-id=&quot;7874&quot; instrument_node=&quot;&quot;&gt;occupation movement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7872&quot; instrument_node=&quot;&quot;&gt;, to pressure the Beijing government to implement full universal suffrage initiated by the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7870&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Pro-democracy_camp_in_Hong_Kong&quot; title=&quot;Pro-democracy camp in Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;7871&quot; instrument_node=&quot;&quot;&gt;pan-democracy camp&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7869&quot; instrument_node=&quot;&quot;&gt;, as well as the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7867&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alliance_for_Peace_and_Democracy_%28Hong_Kong%29&quot; title=&quot;Alliance for Peace and Democracy (Hong Kong)&quot;&gt;&lt;span data-dcnod &lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7851&quot;&gt;&lt;span data-dcnode-id=&quot;7861&quot; instrument_node=&quot;&quot;&gt;After the first consultation period, lasting from December 2013 to May 2014, a consultation report was submitted to the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7859&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/National_People%2527s_Congress&quot; title=&quot;National People's Congress&quot;&gt;&lt;span data-dcnode-id=&quot;7860&quot; instrument_node=&quot;&quot;&gt;National People's Congress&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7858&quot; instrument_node=&quot;&quot;&gt; in July 2014. On 31 August 2014, the NPCSC decided that a 1200-member Nominating Committee based on the present &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7856&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Election_Committee&quot; title=&quot;Election Committee&quot;&gt;&lt;span data-dcnode-id=&quot;7857&quot; instrument_node=&quot;&quot;&gt;Election Committee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7855&quot; instrument_node=&quot;&quot;&gt; should only select two or three candidates before presenting them for a territory-wide ballot by ordinary voters, and each candidate must have more than half of support members of the Election Committee. It also decided that the 2016 legislative election would undergo no further adaptations since those proposed by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7853&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2010_Hong_Kong_electoral_reform&quot; title=&quot;2010 Hong Kong electoral reform&quot;&gt;&lt;span data-dcnode-id=&quot;7854&quot; instrument_node=&quot;&quot;&gt;2010 electoral reform&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7852&quot; instrument_node=&quot;&quot;&gt;.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7842&quot;&gt;&lt;span data-dcnode-id=&quot;7850&quot; instrument_node=&quot;&quot;&gt;On 18 June 2015, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7848&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Legislative_Council_of_Hong_Kong&quot; title=&quot;Legislative Council of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;7849&quot; instrument_node=&quot;&quot;&gt;Legislative Council&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7847&quot; instrument_node=&quot;&quot;&gt; rejected the electoral reform proposal by 28 votes to 8, despite many pro-Beijing legislators having left the chamber in an attempt to forestall the vote.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7844&quot; id=&quot;cite_ref-2&quot;&gt;&lt;a data-dcnode-id=&quot;7845&quot; href=&quot;#cite_note-2&quot;&gt;&lt;span data-dcnode-id=&quot;7846&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7843&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;7481&quot;&gt;&lt;span data-dcnode-id=&quot;7499&quot; instrument_node=&quot;&quot;&gt;The electoral method of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7497&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Chief_Executive_of_Hong_Kong&quot; title=&quot;Chief Executive of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;7498&quot; instrument_node=&quot;&quot;&gt;Chief Executive of Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7496&quot; instrument_node=&quot;&quot;&gt; (CE) and &lt;/span&gt;&lt;a data-dcnode-id=&quot;7494&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Legislative_Council_of_Hong_Kong&quot; title=&quot;Legislative Council of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;7495&quot; instrument_node=&quot;&quot;&gt;Legislative Council&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7493&quot; instrument_node=&quot;&quot;&gt; (LegCo) has been a long debated issue in Hong Kong since the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7491&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Sino-British_Joint_Declaration&quot; title=&quot;Sino-British Joint Declaration&quot;&gt;&lt;span data-dcnode-id=&quot;7492&quot; instrument_node=&quot;&quot;&gt;Sino-British Joint Declaration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7490&quot; instrument_node=&quot;&quot;&gt; which decided the transfer of the Hong Kong sovereignty to the People's Republic of China (PRC) in 1997. In the Sino-British Joint Declaration, the Annex I states that the Chief Executive in the future Hong Kong Special Administrative Region (HKSAR) shall be selected by election or through consultations and the Legislature of the HKSAR shall be constituted by elections.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7487&quot; id=&quot;cite_ref-3&quot;&gt;&lt;a data-dcnode-id=&quot;7488&quot; href=&quot;#cite_note-3&quot;&gt;&lt;span data-dcnode-id=&quot;7489&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7486&quot; instrument_node=&quot;&quot;&gt; The Joint Declaration stipulates that the government will be composed of local inhabitants and the elections or consultations will be held locally.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7483&quot; id=&quot;cite_ref-4&quot;&gt;&lt;a data-dcnode-id=&quot;7484&quot; href=&quot;#cite_note-4&quot;&gt;&lt;span data-dcnode-id=&quot;7485&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7482&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7467&quot;&gt;&lt;span data-dcnode-id=&quot;7480&quot; instrument_node=&quot;&quot;&gt;The controversy on how the electoral system of the Chief Executive and Legislative Council sparked during the drafting of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7478&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_Basic_Law&quot; title=&quot;Hong Kong Basic Law&quot;&gt;&lt;span data-dcnode-id=&quot;7479&quot; instrument_node=&quot;&quot;&gt;Hong Kong Basic Law&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7477&quot; instrument_node=&quot;&quot;&gt; in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7475&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_Basic_Law_Drafting_Committee&quot; title=&quot;Hong Kong Basic Law Drafting Committee&quot;&gt;&lt;span data-dcnode-id=&quot;7476&quot; instrument_node=&quot;&quot;&gt;Hong Kong Basic Law Drafting Committee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7474&quot; instrument_node=&quot;&quot;&gt; (BLDC) during the late 1980s. In the Basic Law promulgated in 1990, it states the ultimate aim of selecting the Chief Executive and all members of the Legislative Council by way of &lt;/span&gt;&lt;a data-dcnode-id=&quot;7472&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Universal_suffrage&quot; title=&quot;Universal suffrage&quot;&gt;&lt;span data-dcnode-id=&quot;7473&quot; instrument_node=&quot;&quot;&gt;universal suffrage&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7471&quot; instrument_node=&quot;&quot;&gt; is guaranteed respectively in &lt;/span&gt;&lt;a data-dcnode-id=&quot;7469&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_Basic_Law_Article_45&quot; title=&quot;Hong Kong Basic Law Article 45&quot;&gt;&lt;span data-dcnode-id=&quot;7470&quot; instrument_node=&quot;&quot;&gt;Article 45&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7468&quot; instrument_node=&quot;&quot;&gt; and Article 68.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7456&quot;&gt;&lt;span data-dcnode-id=&quot;7466&quot; instrument_node=&quot;&quot;&gt;After the transfer of sovereignty, the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7464&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Pro-democracy_camp_in_Hong_Kong&quot; title=&quot;Pro-democracy camp in Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;7465&quot; instrument_node=&quot;&quot;&gt;pan-democracy camp&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7463&quot; instrument_node=&quot;&quot;&gt;, the opposition camp in the SAR in which its ultimate goal was to fight for the universal suffrage constantly received about 60% of the popular votes in the LegCo &lt;/span&gt;&lt;a data-dcnode-id=&quot;7461&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Geographical_constituency&quot; title=&quot;Geographical constituency&quot;&gt;&lt;span data-dcnode-id=&quot;7462&quot; instrument_node=&quot;&quot;&gt;geographical constituency&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7460&quot; instrument_node=&quot;&quot;&gt; (GC) elections. The annual &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7458&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/July_1_marches&quot; title=&quot;July 1 marches&quot;&gt;&lt;span data-dcnode-id=&quot;7459&quot; instrument_node=&quot;&quot;&gt;July 1 marches&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7457&quot; instrument_node=&quot;&quot;&gt; launched by the pan-democracy camp which demanded genuine democracy as promised in the Basic Law also draw thousands of Hong Kong people each year.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7455&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;7445&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7453&quot; id=&quot;2007_NPCSC_decision&quot;&gt;&lt;span data-dcnode-id=&quot;7454&quot; instrument_node=&quot;&quot;&gt;2007 NPCSC decision&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7446&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7451&quot;&gt;&lt;span data-dcnode-id=&quot;7452&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7449&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D3&quot; title=&quot;Edit section: 2007 NPCSC decision&quot;&gt;&lt;span data-dcnode-id=&quot;7450&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7447&quot;&gt;&lt;span data-dcnode-id=&quot;7448&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;7444&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7430&quot;&gt;&lt;a data-dcnode-id=&quot;7442&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Donald_Tsang&quot; title=&quot;Donald Tsang&quot;&gt;&lt;span data-dcnode-id=&quot;7443&quot; instrument_node=&quot;&quot;&gt;Donald Tsang&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7441&quot; instrument_node=&quot;&quot;&gt;, the then Chief Executive, published the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7439&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Green_Paper_on_Constitutional_Development&quot; title=&quot;Green Paper on Constitutional Development&quot;&gt;&lt;span data-dcnode-id=&quot;7440&quot; instrument_node=&quot;&quot;&gt;Green Paper on Constitutional Development&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7438&quot; instrument_node=&quot;&quot;&gt; to consult the public on the options, roadmap, and timetable for implementing universal suffrage in July 2007. A report was submitted to the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7436&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/National_People%2527s_Congress_Standing_Committee&quot; title=&quot;National People's Congress Standing Committee&quot;&gt;&lt;span data-dcnode-id=&quot;7437&quot; instrument_node=&quot;&quot;&gt;National People's Congress Standing Committee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7435&quot; instrument_node=&quot;&quot;&gt; (NPCSC) subsequently in December 2007. Following that, the NPCSC made the decision that provides:&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7432&quot; id=&quot;cite_ref-5&quot;&gt;&lt;a data-dcnode-id=&quot;7433&quot; href=&quot;#cite_note-5&quot;&gt;&lt;span data-dcnode-id=&quot;7434&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7431&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7429&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote class=&quot;templatequote&quot; data-dcnode-id=&quot;7424&quot;&gt;&lt;p data-dcnode-id=&quot;7425&quot;&gt;&lt;span data-dcnode-id=&quot;7426&quot; instrument_node=&quot;&quot;&gt;The election of the fifth Chief Executive of the Hong Kong Special Administrative Region in the year 2017 may be implemented by the method of universal suffrage, that after the Chief Executive is selected by universal suffrage, the election of the Legislative Council of Hong Kong Special Administrative Region may be implemented by the method of electing all members by universal suffrage.&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;7423&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7415&quot;&gt;&lt;span data-dcnode-id=&quot;7422&quot; instrument_node=&quot;&quot;&gt;The NPCSC Decision rules out the universal suffrage in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7420&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2012_Hong_Kong_Chief_Executive_election&quot; title=&quot;2012 Hong Kong Chief Executive election&quot;&gt;&lt;span data-dcnode-id=&quot;7421&quot; instrument_node=&quot;&quot;&gt;2012 CE Election&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7419&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;7417&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2012_Hong_Kong_legislative_election&quot; title=&quot;2012 Hong Kong legislative election&quot;&gt;&lt;span data-dcnode-id=&quot;7418&quot; instrument_node=&quot;&quot;&gt;2012 LegCo Election&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7416&quot; instrument_node=&quot;&quot;&gt; but on the other hand provides the possibility of universal suffrage for CE in 2017 and LegCo in 2020.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7407&quot;&gt;&lt;span data-dcnode-id=&quot;7414&quot; instrument_node=&quot;&quot;&gt;Although the pan-democracy camp protested against the decision of ruling out the 2007/2008 and 2012 universal suffrage, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7412&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28Hong_Kong%29&quot; title=&quot;Democratic Party (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;7413&quot; instrument_node=&quot;&quot;&gt;Democratic Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7411&quot; instrument_node=&quot;&quot;&gt;, the flagship pro-democratic party in Hong Kong reached the agreement on the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7409&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2010_Hong_Kong_electoral_reform&quot; title=&quot;2010 Hong Kong electoral reform&quot;&gt;&lt;span data-dcnode-id=&quot;7410&quot; instrument_node=&quot;&quot;&gt;2010 Hong Kong electoral reform&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7408&quot; instrument_node=&quot;&quot;&gt; which allowed minor changes to the 2012 CE election and 2012 LegCo Election.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7406&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;7396&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7404&quot; id=&quot;First_consultation_period&quot;&gt;&lt;span data-dcnode-id=&quot;7405&quot; instrument_node=&quot;&quot;&gt;First consultation period&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7397&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7402&quot;&gt;&lt;span data-dcnode-id=&quot;7403&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7400&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D4&quot; title=&quot;Edit section: First consultation period&quot;&gt;&lt;span data-dcnode-id=&quot;7401&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7398&quot;&gt;&lt;span data-dcnode-id=&quot;7399&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;7395&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7374&quot;&gt;&lt;span data-dcnode-id=&quot;7394&quot; instrument_node=&quot;&quot;&gt;Chief Executive &lt;/span&gt;&lt;a data-dcnode-id=&quot;7392&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Leung_Chun-ying&quot; title=&quot;Leung Chun-ying&quot;&gt;&lt;span data-dcnode-id=&quot;7393&quot; instrument_node=&quot;&quot;&gt;Leung Chun-ying&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7391&quot; instrument_node=&quot;&quot;&gt; announced on 17 October 2013 the immediate establishment of the Task Force on Constitutional Development headed by the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7389&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Chief_Secretary_for_Administration&quot; title=&quot;Chief Secretary for Administration&quot;&gt;&lt;span data-dcnode-id=&quot;7390&quot; instrument_node=&quot;&quot;&gt;Chief Secretary for Administration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7388&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7386&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Carrie_Lam_Cheng_Yuet-ngor&quot; title=&quot;Carrie Lam Cheng Yuet-ngor&quot;&gt;&lt;span data-dcnode-id=&quot;7387&quot; instrument_node=&quot;&quot;&gt;Carrie Lam&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7385&quot; instrument_node=&quot;&quot;&gt;, Secretary for Justice Rimsky Yuen, and Secretary for Constitutional and Mainland Affairs &lt;/span&gt;&lt;a data-dcnode-id=&quot;7383&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Raymond_Tam&quot; title=&quot;Raymond Tam&quot;&gt;&lt;span data-dcnode-id=&quot;7384&quot; instrument_node=&quot;&quot;&gt;Raymond Tam&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7382&quot; instrument_node=&quot;&quot;&gt; as members to handle the public consultation. On 4 December 2013, the &lt;/span&gt;&lt;i data-dcnode-id=&quot;7380&quot;&gt;&lt;span data-dcnode-id=&quot;7381&quot; instrument_node=&quot;&quot;&gt;Consultation Document on the Methods for Selecting the Chief Executive in 2017 and for Forming the Legislative Council in 2016&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;7379&quot; instrument_node=&quot;&quot;&gt;, entitled &quot;Let's Talk and Achieve Universal Suffrage&quot;, was published which commenced a five-month public consultation period.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7376&quot; id=&quot;cite_ref-6&quot;&gt;&lt;a data-dcnode-id=&quot;7377&quot; href=&quot;#cite_note-6&quot;&gt;&lt;span data-dcnode-id=&quot;7378&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7375&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7369&quot;&gt;&lt;span data-dcnode-id=&quot;7373&quot; instrument_node=&quot;&quot;&gt;The Consultation Document set out the questions such as the size and composition of the Nominating Committee for the CE election and the size of Legislative Council, the electorate base of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7371&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Functional_constituency_%28Hong_Kong%29&quot; title=&quot;Functional constituency (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;7372&quot; instrument_node=&quot;&quot;&gt;functional constituencies&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7370&quot; instrument_node=&quot;&quot;&gt; and also number of geographical constituencies and number of seats in each geographical constituency.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7364&quot;&gt;&lt;span data-dcnode-id=&quot;7368&quot; instrument_node=&quot;&quot;&gt;The consultation period ended in May with increasingly heated debates and the Consultation Report was published in July 2014. Following that Chief Executive Leung Chun-ying submitted the &lt;/span&gt;&lt;i data-dcnode-id=&quot;7366&quot;&gt;&lt;span data-dcnode-id=&quot;7367&quot; instrument_node=&quot;&quot;&gt;Report by the Chief Executive of the Hong Kong Special Administrative Region to the Standing Committee of the National People's Congress&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;7365&quot; instrument_node=&quot;&quot;&gt;. The public generally speculated that the NPCSC will set the framework of the electoral reform in the meeting in coming August.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;7353&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7361&quot; id=&quot;Alternative_proposals&quot;&gt;&lt;span data-dcnode-id=&quot;7362&quot; instrument_node=&quot;&quot;&gt;Alternative proposals&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7354&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7359&quot;&gt;&lt;span data-dcnode-id=&quot;7360&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7357&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D5&quot; title=&quot;Edit section: Alternative proposals&quot;&gt;&lt;span data-dcnode-id=&quot;7358&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7355&quot;&gt;&lt;span data-dcnode-id=&quot;7356&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;7352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7350&quot;&gt;&lt;span data-dcnode-id=&quot;7351&quot; instrument_node=&quot;&quot;&gt;During the consultation period, there were proposals suggested by various political groups and individuals which included:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7349&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;7338&quot;&gt;&lt;span data-dcnode-id=&quot;7348&quot; id=&quot;Ronny_Tong.27s_proposal&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7346&quot; id=&quot;Ronny_Tong's_proposal&quot;&gt;&lt;span data-dcnode-id=&quot;7347&quot; instrument_node=&quot;&quot;&gt;Ronny Tong's proposal&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7339&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7344&quot;&gt;&lt;span data-dcnode-id=&quot;7345&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7342&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D6&quot; title=&quot;Edit section: Ronny Tong's proposal&quot;&gt;&lt;span data-dcnode-id=&quot;7343&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7340&quot;&gt;&lt;span data-dcnode-id=&quot;7341&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;7337&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7300&quot;&gt;&lt;a data-dcnode-id=&quot;7335&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Civic_Party&quot; title=&quot;Civic Party&quot;&gt;&lt;span data-dcnode-id=&quot;7336&quot; instrument_node=&quot;&quot;&gt;Civic Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7334&quot; instrument_node=&quot;&quot;&gt; legislator &lt;/span&gt;&lt;a data-dcnode-id=&quot;7332&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Ronny_Tong&quot; title=&quot;Ronny Tong&quot;&gt;&lt;span data-dcnode-id=&quot;7333&quot; instrument_node=&quot;&quot;&gt;Ronny Tong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7331&quot; instrument_node=&quot;&quot;&gt; put forward an initial proposal for the Chief Executive universal suffrage in October 2013 and supported by &lt;/span&gt;&lt;a data-dcnode-id=&quot;7329&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Professional_Commons&quot; title=&quot;Professional Commons&quot;&gt;&lt;span data-dcnode-id=&quot;7330&quot; instrument_node=&quot;&quot;&gt;Professional Commons&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7328&quot; instrument_node=&quot;&quot;&gt; legislators &lt;/span&gt;&lt;a data-dcnode-id=&quot;7326&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Dennis_Kwok&quot; title=&quot;Dennis Kwok&quot;&gt;&lt;span data-dcnode-id=&quot;7327&quot; instrument_node=&quot;&quot;&gt;Dennis Kwok&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7325&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;7323&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Charles_Mok&quot; title=&quot;Charles Mok&quot;&gt;&lt;span data-dcnode-id=&quot;7324&quot; instrument_node=&quot;&quot;&gt;Charles Mok&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7322&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a data-dcnode-id=&quot;7320&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Kenneth_Leung&quot; title=&quot;Kenneth Leung&quot;&gt;&lt;span data-dcnode-id=&quot;7321&quot; instrument_node=&quot;&quot;&gt;Kenneth Leung&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7319&quot; instrument_node=&quot;&quot;&gt;. The proposal suggests increasing the membership of nominating committee from the 1,200 member &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7317&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Election_Committee&quot; title=&quot;Election Committee&quot;&gt;&lt;span data-dcnode-id=&quot;7318&quot; instrument_node=&quot;&quot;&gt;Election Committee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7316&quot; instrument_node=&quot;&quot;&gt; to 1,514 and maintain the nomination threshold of 150 votes.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7313&quot; id=&quot;cite_ref-Tong_Plan_7-0&quot;&gt;&lt;a data-dcnode-id=&quot;7314&quot; href=&quot;#cite_note-Tong_Plan-7&quot;&gt;&lt;span data-dcnode-id=&quot;7315&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7312&quot; instrument_node=&quot;&quot;&gt; Tong recommended the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7310&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Instant-runoff_voting&quot; title=&quot;Instant-runoff voting&quot;&gt;&lt;span data-dcnode-id=&quot;7311&quot; instrument_node=&quot;&quot;&gt;instant runoff&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7309&quot; instrument_node=&quot;&quot;&gt; voting system, which is used in Ireland, Australia, Sri Lanka, and mayoral elections in London, San Francisco, and some governors in the states of the United States, to have the elected CE who could accepted by all sectors.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7306&quot; id=&quot;cite_ref-Tong_Plan_7-1&quot;&gt;&lt;a data-dcnode-id=&quot;7307&quot; href=&quot;#cite_note-Tong_Plan-7&quot;&gt;&lt;span data-dcnode-id=&quot;7308&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7305&quot; instrument_node=&quot;&quot;&gt; Tong also recommended cancelling existing law which disallows the Chief Executive belonging to a political party membership. Dennis Kwok suggests increasing the electorate base of the nominating committee to 1&amp;nbsp;million, which fulfils the &quot;broadly representative&quot; principle.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7302&quot; id=&quot;cite_ref-Tong_Plan_7-2&quot;&gt;&lt;a data-dcnode-id=&quot;7303&quot; href=&quot;#cite_note-Tong_Plan-7&quot;&gt;&lt;span data-dcnode-id=&quot;7304&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7301&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7299&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;7289&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7297&quot; id=&quot;Hong_Kong_Democratic_Foundation&quot;&gt;&lt;span data-dcnode-id=&quot;7298&quot; instrument_node=&quot;&quot;&gt;Hong Kong Democratic Foundation&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7290&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7295&quot;&gt;&lt;span data-dcnode-id=&quot;7296&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7293&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D7&quot; title=&quot;Edit section: Hong Kong Democratic Foundation&quot;&gt;&lt;span data-dcnode-id=&quot;7294&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7291&quot;&gt;&lt;span data-dcnode-id=&quot;7292&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;7288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7280&quot;&gt;&lt;span data-dcnode-id=&quot;7287&quot; instrument_node=&quot;&quot;&gt;The &lt;/span&gt;&lt;a data-dcnode-id=&quot;7285&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Think_tank&quot; title=&quot;Think tank&quot;&gt;&lt;span data-dcnode-id=&quot;7286&quot; instrument_node=&quot;&quot;&gt;think tank&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7284&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;7282&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_Democratic_Foundation&quot; title=&quot;Hong Kong Democratic Foundation&quot;&gt;&lt;span data-dcnode-id=&quot;7283&quot; instrument_node=&quot;&quot;&gt;Hong Kong Democratic Foundation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7281&quot; instrument_node=&quot;&quot;&gt; (HKDF) also sets out proposals of 2016 Legislative Council elections and 2017 Chief Executive universal suffrage on 29 May 2013.
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7254&quot;&gt;&lt;span data-dcnode-id=&quot;7279&quot; instrument_node=&quot;&quot;&gt;The HKDF suggests those &lt;/span&gt;&lt;a data-dcnode-id=&quot;7277&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Functional_constituency_%28Hong_Kong%29&quot; title=&quot;Functional constituency (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;7278&quot; instrument_node=&quot;&quot;&gt;functional constituencies&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7276&quot; instrument_node=&quot;&quot;&gt; (FC) in which voting includes corporate voters to be replaced by individual votes from staff and management members of companies, organisations or institutions that are the constituent members of each FC.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7273&quot; id=&quot;cite_ref-HKDF_8-0&quot;&gt;&lt;a data-dcnode-id=&quot;7274&quot; href=&quot;#cite_note-HKDF-8&quot;&gt;&lt;span data-dcnode-id=&quot;7275&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7272&quot; instrument_node=&quot;&quot;&gt; For the 5 &lt;/span&gt;&lt;a data-dcnode-id=&quot;7270&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/District_Council_%28Second%29&quot; title=&quot;District Council (Second)&quot;&gt;&lt;span data-dcnode-id=&quot;7271&quot; instrument_node=&quot;&quot;&gt;District Council FC seats&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7269&quot; instrument_node=&quot;&quot;&gt; requiring candidates to be District Councillors, that qualification would be removed and the 5 seats be reconstituted as a territory-wide geographical constituency (TWGC). The additional one-seat added to each geographical constituency (GC) for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7267&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/2012_Hong_Kong_legislative_election&quot; title=&quot;2012 Hong Kong legislative election&quot;&gt;&lt;span data-dcnode-id=&quot;7268&quot; instrument_node=&quot;&quot;&gt;2012 LegCo election&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7266&quot; instrument_node=&quot;&quot;&gt; should be transferred to the TWGC, so that this constituency would comprise ten seats.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7263&quot; id=&quot;cite_ref-HKDF_8-1&quot;&gt;&lt;a data-dcnode-id=&quot;7264&quot; href=&quot;#cite_note-HKDF-8&quot;&gt;&lt;span data-dcnode-id=&quot;7265&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7262&quot; instrument_node=&quot;&quot;&gt; A further ten new LegCo seats would be added to the TWGC. Candidates for the TWGC would be required to secure a minimum of 500 nominations, 100 nominations from registered voters in each of the five GCs. In conclusion, the 2016 Legislative Council would consist of total 80 seats: 30 seats from 5 &lt;/span&gt;&lt;a data-dcnode-id=&quot;7260&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Geographical_constituency&quot; title=&quot;Geographical constituency&quot;&gt;&lt;span data-dcnode-id=&quot;7261&quot; instrument_node=&quot;&quot;&gt;geographical constituencies&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7259&quot; instrument_node=&quot;&quot;&gt;; 30 seats from functional constituencies and; 20 seats from the Territory-wide geographical constituency.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7256&quot; id=&quot;cite_ref-HKDF_8-2&quot;&gt;&lt;a data-dcnode-id=&quot;7257&quot; href=&quot;#cite_note-HKDF-8&quot;&gt;&lt;span data-dcnode-id=&quot;7258&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7255&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7248&quot;&gt;&lt;span data-dcnode-id=&quot;7253&quot; instrument_node=&quot;&quot;&gt;There are three alternatives for the formation of the nominating committee for electing the Chief Executive:&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7250&quot; id=&quot;cite_ref-HKDF_8-3&quot;&gt;&lt;a data-dcnode-id=&quot;7251&quot; href=&quot;#cite_note-HKDF-8&quot;&gt;&lt;span data-dcnode-id=&quot;7252&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7249&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7247&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;7232&quot;&gt;&lt;li data-dcnode-id=&quot;7239&quot;&gt;&lt;span data-dcnode-id=&quot;7246&quot; instrument_node=&quot;&quot;&gt;By direct election of registered voters electing 3 members in each of the 400 &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7244&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/District_Councils_of_Hong_Kong&quot; title=&quot;District Councils of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;7245&quot; instrument_node=&quot;&quot;&gt;District Council&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7243&quot; instrument_node=&quot;&quot;&gt; sub-constituencies by the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7241&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Single_transferable_voting&quot; title=&quot;Single transferable voting&quot;&gt;&lt;span data-dcnode-id=&quot;7242&quot; instrument_node=&quot;&quot;&gt;single transferable voting&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7240&quot; instrument_node=&quot;&quot;&gt; system.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7238&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7236&quot;&gt;&lt;span data-dcnode-id=&quot;7237&quot; instrument_node=&quot;&quot;&gt;Nomination committee based on 2012 CE election committee with all corporate votes replaced by individual votes from staff and management of companies in each sector and all elected district councillors to join the nominating committee.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7235&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7233&quot;&gt;&lt;span data-dcnode-id=&quot;7234&quot; instrument_node=&quot;&quot;&gt;Nominating committee formed through random selection of a statistically representative sample from all registered voters.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;7231&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7209&quot;&gt;&lt;span data-dcnode-id=&quot;7230&quot; instrument_node=&quot;&quot;&gt;HKDF suggested any Chinese national who is a registered GC voter can become a potential candidate with nominations from at least &lt;/span&gt;&lt;span class=&quot;frac&quot; data-dcnode-id=&quot;7222&quot; role=&quot;math&quot;&gt;&lt;span class=&quot;num&quot; data-dcnode-id=&quot;7226&quot;&gt;&lt;span data-dcnode-id=&quot;7227&quot; instrument_node=&quot;&quot;&gt;1&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7225&quot; instrument_node=&quot;&quot;&gt;⁄&lt;/span&gt;&lt;span class=&quot;den&quot; data-dcnode-id=&quot;7223&quot;&gt;&lt;span data-dcnode-id=&quot;7224&quot; instrument_node=&quot;&quot;&gt;8&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;7221&quot; instrument_node=&quot;&quot;&gt; of the members of the Nominating Committee (NC) or with at least 100,000 nominations from registered GC voters.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7218&quot; id=&quot;cite_ref-HKDF_8-4&quot;&gt;&lt;a data-dcnode-id=&quot;7219&quot; href=&quot;#cite_note-HKDF-8&quot;&gt;&lt;span data-dcnode-id=&quot;7220&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7217&quot; instrument_node=&quot;&quot;&gt; All candidates once elected to be nominated by the NC have to affirm to abide by the Oath of the CE Office. After the closing date for submission of requests for nominations by candidates, the NC (e.g. jointly signed by 100 NC members) has right to evaluate the nominations for compliance with the rules after his or her declaration of candidacy and make complaint to the Electoral Affairs Commission to start a judicial process of removing the candidate. The final list of qualified nominated candidates will stand for election by universal suffrage, using the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7215&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Two-round_system&quot; title=&quot;Two-round system&quot;&gt;&lt;span data-dcnode-id=&quot;7216&quot; instrument_node=&quot;&quot;&gt;two-round system&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7214&quot; instrument_node=&quot;&quot;&gt;. A second round of CE elections will be held if no candidate received more than 50% of the votes and the two candidates with the highest vote count will proceed to the second round.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7211&quot; id=&quot;cite_ref-HKDF_8-5&quot;&gt;&lt;a data-dcnode-id=&quot;7212&quot; href=&quot;#cite_note-HKDF-8&quot;&gt;&lt;span data-dcnode-id=&quot;7213&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7210&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7208&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;7198&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7206&quot; id=&quot;Scholarism&quot;&gt;&lt;span data-dcnode-id=&quot;7207&quot; instrument_node=&quot;&quot;&gt;Scholarism&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7199&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7204&quot;&gt;&lt;span data-dcnode-id=&quot;7205&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7202&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D8&quot; title=&quot;Edit section: Scholarism&quot;&gt;&lt;span data-dcnode-id=&quot;7203&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7200&quot;&gt;&lt;span data-dcnode-id=&quot;7201&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;7197&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7175&quot;&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;7195&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Student_activist&quot; title=&quot;Student activist&quot;&gt;&lt;span data-dcnode-id=&quot;7196&quot; instrument_node=&quot;&quot;&gt;Student activist&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7194&quot; instrument_node=&quot;&quot;&gt; group &lt;/span&gt;&lt;a data-dcnode-id=&quot;7192&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Scholarism&quot; title=&quot;Scholarism&quot;&gt;&lt;span data-dcnode-id=&quot;7193&quot; instrument_node=&quot;&quot;&gt;Scholarism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7191&quot; instrument_node=&quot;&quot;&gt; issued a statement on 23 June 2013 stressed the necessity of civil nomination for the 2017 Chief Executive election. For the 2016 Legislative Council elections, it called for the abolition of the split voting in the Legislative Council; increase of the geographical constituency seats to about 60%; and transfer of the District Council (Second) seats to the geographical constituency.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7188&quot; id=&quot;cite_ref-Scholarism_9-0&quot;&gt;&lt;a data-dcnode-id=&quot;7189&quot; href=&quot;#cite_note-Scholarism-9&quot;&gt;&lt;span data-dcnode-id=&quot;7190&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7187&quot; instrument_node=&quot;&quot;&gt; For the 2017 Chief Executive universal suffrage, it suggests letting all 3.5&amp;nbsp;million registered voters to be the nominating committee, the nomination threshold to be 100 thousand voters and allowing the Chief Executive to have political party membership.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7184&quot; id=&quot;cite_ref-Scholarism_9-1&quot;&gt;&lt;a data-dcnode-id=&quot;7185&quot; href=&quot;#cite_note-Scholarism-9&quot;&gt;&lt;span data-dcnode-id=&quot;7186&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7183&quot; instrument_node=&quot;&quot;&gt; For the 2020 Legislative Council universal suffrage, the Scholarism suggested the abolition of the functional constituencies and increase of the membership of the LegCo from 70 to 80 seats, half of them elected by constituency-wide &lt;/span&gt;&lt;a data-dcnode-id=&quot;7181&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation&quot; title=&quot;Proportional representation&quot;&gt;&lt;span data-dcnode-id=&quot;7182&quot; instrument_node=&quot;&quot;&gt;proportional representation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7180&quot; instrument_node=&quot;&quot;&gt; and the other half by territory-wide proportional representation.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7177&quot; id=&quot;cite_ref-Scholarism_9-2&quot;&gt;&lt;a data-dcnode-id=&quot;7178&quot; href=&quot;#cite_note-Scholarism-9&quot;&gt;&lt;span data-dcnode-id=&quot;7179&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7176&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7174&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h4 data-dcnode-id=&quot;7164&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;7172&quot; id=&quot;Alliance_for_True_Democracy&quot;&gt;&lt;span data-dcnode-id=&quot;7173&quot; instrument_node=&quot;&quot;&gt;Alliance for True Democracy&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;7165&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7170&quot;&gt;&lt;span data-dcnode-id=&quot;7171&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;7168&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D9&quot; title=&quot;Edit section: Alliance for True Democracy&quot;&gt;&lt;span data-dcnode-id=&quot;7169&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;7166&quot;&gt;&lt;span data-dcnode-id=&quot;7167&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;7163&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;7147&quot;&gt;&lt;span data-dcnode-id=&quot;7162&quot; instrument_node=&quot;&quot;&gt;On 8 January 2014, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;7160&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alliance_for_True_Democracy&quot; title=&quot;Alliance for True Democracy&quot;&gt;&lt;span data-dcnode-id=&quot;7161&quot; instrument_node=&quot;&quot;&gt;Alliance for True Democracy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7159&quot; instrument_node=&quot;&quot;&gt; (ATD) released its &quot;Chief Executive Election Plan&quot; with the support of all 27 pro-democratic Legislative Council members.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7156&quot; id=&quot;cite_ref-ATD_CE_10-0&quot;&gt;&lt;a data-dcnode-id=&quot;7157&quot; href=&quot;#cite_note-ATD_CE-10&quot;&gt;&lt;span data-dcnode-id=&quot;7158&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7155&quot; instrument_node=&quot;&quot;&gt; The election plan includes three channels for nomination: &lt;/span&gt;&lt;a data-dcnode-id=&quot;7153&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Nominating_petition&quot; title=&quot;Nominating petition&quot;&gt;&lt;span data-dcnode-id=&quot;7154&quot; instrument_node=&quot;&quot;&gt;civil nomination&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7152&quot; instrument_node=&quot;&quot;&gt;, political party nomination, and nomination by the nominating committee. Civil nomination demands a candidate to secure the signed endorsement of 1% of the registered voters; political party nomination requires a political party receiving 5% or more of the total valid votes in the last Legislative Council direct election. The nominating committee shall not refuse to endorse any civil and political party nominees who meet the legal requirements, such as not less than 40 years old, has no right of abode in any foreign country; political conditions such as &quot;love China, love Hong Kong&quot; and &quot;no confrontations with Beijing&quot; are not acceptable. The Alliance also demands the abolition of the existing stipulation which disallows the Chief Executive belonging to a political party membership.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7149&quot; id=&quot;cite_ref-ATD_CE_10-1&quot;&gt;&lt;a data-dcnode-id=&quot;7150&quot; href=&quot;#cite_note-ATD_CE-10&quot;&gt;&lt;span data-dcnode-id=&quot;7151&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7148&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;7141&quot;&gt;&lt;span data-dcnode-id=&quot;7146&quot; instrument_node=&quot;&quot;&gt;For the Legislative Council elections, the Scholars Group of the ATD put forward proposals for the transition toward the universal suffrage:&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;7143&quot; id=&quot;cite_ref-ATD_LegCo_11-0&quot;&gt;&lt;a data-dcnode-id=&quot;7144&quot; href=&quot;#cite_note-ATD_LegCo-11&quot;&gt;&lt;span data-dcnode-id=&quot;7145&quot; instrument_node=&quot;&quot;&gt;[11]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;7142&quot; instrument_node=&quot;&quot;&gt; For 2016 Legislative Council Election, the Scholars Group suggests:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;7140&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;li data-dcnode-id=&quot;7121&quot;&gt;&lt;span data-dcnode-id=&quot;7122&quot; instrument_node=&quot;&quot;&gt;25 seats will be elected under proportional representation with the whole Hong Kong as a constituency. There is no election threshold, and the largest remainder method&quot; and Hare quota are adopted. Each voter would then have two votes in two tiers of proportional representation.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7120&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7116&quot;&gt;&lt;a data-dcnode-id=&quot;7118&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Functional_constituency_%28Hong_Kong%29&quot; title=&quot;Functional constituency (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;7119&quot; instrument_node=&quot;&quot;&gt;Functional constituency&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;7117&quot; instrument_node=&quot;&quot;&gt; is reduced to 20 seats. In the 30 current traditional FC seats, there are 9 seats for professional sectors; 15 seats for commercial and economic sectors; and 6 seats for social and political sectors. We suggest combining those seats into three large constituencies along the lines above, with each constituency returning two-thirds of its original number of seats. That is, the professional sectors will return 6 seats; 10 seats for commercial and economic sectors; 4 seats for social and political sectors. In each constituency, each elector can cast only one vote. The candidates that get the most votes win.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7115&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;li data-dcnode-id=&quot;7107&quot;&gt;&lt;span data-dcnode-id=&quot;7108&quot; instrument_node=&quot;&quot;&gt;Split Voting in the Legco will be abolished.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;7105&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;li data-dcnode-id=&quot;7097&quot;&gt;&lt;span data-dcnode-id=&quot;7098&quot; instrument_node=&quot;&quot;&gt;60 seats will be elected by universal suffrage, including 35 seats by proportional representation with current division of constituencies.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7096&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7094&quot;&gt;&lt;span data-dcnode-id=&quot;7095&quot; instrument_node=&quot;&quot;&gt;25 seats will be elected by FPTP. Hong Kong is divided into 25 constituencies, with about 150,000 voters in each constituency.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7093&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7091&quot;&gt;&lt;span data-dcnode-id=&quot;7092&quot; instrument_node=&quot;&quot;&gt;Functional constituency is reduced to 20 seats. In the 30 current traditional FC seats, there are 9 seats for professional sectors; 15 seats for commercial and economic sectors; and 6 seats for social and political sectors. We suggest combining those seats into three large constituencies along the lines above, with each constituency returning two-thirds of its original number of seats. That is, the professional sectors will return 6 seats; 10 seats for commercial and economic sectors; 4 seats for social and political sectors. In each constituency, each elector can cast only one vote. The candidates that get the most votes win.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7090&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7088&quot;&gt;&lt;span data-dcnode-id=&quot;7089&quot; instrument_node=&quot;&quot;&gt;The District Council (II) FC seats will be cancelled.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;7087&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;7085&quot;&gt;&lt;span data-dcnode-id=&quot;7086&quot; instrument_node=&quot;&quot;&gt;Split voting in the Legco will be abolished.&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;7083&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;7076&quot;&gt;&lt;span data-dcnode-id=&quot;7077&quot; instrument_node=&quot;&quot;&gt;For the universal suffrage of the Legislative Council, there are two proposals from the Scholar Group:
