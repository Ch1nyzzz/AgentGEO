&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;span data-dcnode-id=&quot;6467&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6465&quot;&gt;&lt;span data-dcnode-id=&quot;6466&quot; instrument_node=&quot;&quot;&gt;Existing requirements that the Chief Executive must not have any political affiliation were maintained.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6454&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6462&quot; id=&quot;Nomination_by_the_Nominating_Committee&quot;&gt;&lt;span data-dcnode-id=&quot;6463&quot; instrument_node=&quot;&quot;&gt;Nomination by the Nominating Committee&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6455&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6460&quot;&gt;&lt;span data-dcnode-id=&quot;6461&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6458&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D22&quot; title=&quot;Edit section: Nomination by the Nominating Committee&quot;&gt;&lt;span data-dcnode-id=&quot;6459&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6456&quot;&gt;&lt;span data-dcnode-id=&quot;6457&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6453&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6451&quot;&gt;&lt;span data-dcnode-id=&quot;6452&quot; instrument_node=&quot;&quot;&gt;The Proposal outlined a two-step nomination:
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6450&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;6441&quot;&gt;&lt;li data-dcnode-id=&quot;6448&quot;&gt;&lt;span data-dcnode-id=&quot;6449&quot; instrument_node=&quot;&quot;&gt;Recommendation by 120 to 240 Members of the Nominating Committee to qualify as Recommended Persons to the election; and&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;6447&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;6442&quot;&gt;&lt;span data-dcnode-id=&quot;6446&quot; instrument_node=&quot;&quot;&gt;Voting for nominating 2 to 3 Candidates by an absolute majority of the Nominating Committee.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6443&quot; id=&quot;cite_ref-40&quot;&gt;&lt;a data-dcnode-id=&quot;6444&quot; href=&quot;#cite_note-40&quot;&gt;&lt;span data-dcnode-id=&quot;6445&quot; instrument_node=&quot;&quot;&gt;[40]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;6440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6430&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6438&quot; id=&quot;Universal_Suffrage&quot;&gt;&lt;span data-dcnode-id=&quot;6439&quot; instrument_node=&quot;&quot;&gt;Universal Suffrage&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6431&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6436&quot;&gt;&lt;span data-dcnode-id=&quot;6437&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6434&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D23&quot; title=&quot;Edit section: Universal Suffrage&quot;&gt;&lt;span data-dcnode-id=&quot;6435&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6432&quot;&gt;&lt;span data-dcnode-id=&quot;6433&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6429&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6423&quot;&gt;&lt;span data-dcnode-id=&quot;6428&quot; instrument_node=&quot;&quot;&gt;The 2 to 3 nominated candidates enter the Chief Executive election by universal suffrage. Chief Executive-elects are elected with simple majority in a single round of voting.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6425&quot; id=&quot;cite_ref-41&quot;&gt;&lt;a data-dcnode-id=&quot;6426&quot; href=&quot;#cite_note-41&quot;&gt;&lt;span data-dcnode-id=&quot;6427&quot; instrument_node=&quot;&quot;&gt;[41]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6422&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6411&quot;&gt;&lt;span data-dcnode-id=&quot;6421&quot; id=&quot;Stakeholders.27_Response&quot;&gt;&lt;/span&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6419&quot; id=&quot;Stakeholders'_Response&quot;&gt;&lt;span data-dcnode-id=&quot;6420&quot; instrument_node=&quot;&quot;&gt;Stakeholders' Response&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6412&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6417&quot;&gt;&lt;span data-dcnode-id=&quot;6418&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6415&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D24&quot; title=&quot;Edit section: Stakeholders' Response&quot;&gt;&lt;span data-dcnode-id=&quot;6416&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6413&quot;&gt;&lt;span data-dcnode-id=&quot;6414&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6410&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6404&quot;&gt;&lt;span data-dcnode-id=&quot;6409&quot; instrument_node=&quot;&quot;&gt;Chief secretary of Hong Kong, Carrie Lam, stated: &quot;We should weigh very carefully whether the passage of these proposals or a standstill in constitutional development will be a more favourable outcome for the overall and long-term interests of Hong Kong.&quot;&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6406&quot; id=&quot;cite_ref-42&quot;&gt;&lt;a data-dcnode-id=&quot;6407&quot; href=&quot;#cite_note-42&quot;&gt;&lt;span data-dcnode-id=&quot;6408&quot; instrument_node=&quot;&quot;&gt;[42]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6405&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6398&quot;&gt;&lt;span data-dcnode-id=&quot;6403&quot; instrument_node=&quot;&quot;&gt;Dissenting pro-democracy legislators had already stated they would veto the proposals. In response to the proposals, they on the wearing black marched from the chamber of the legislature as soon as Lam's speech ended. Some legislators raised yellow umbrellas, a symbol of the Occupy movement.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6400&quot; id=&quot;cite_ref-43&quot;&gt;&lt;a data-dcnode-id=&quot;6401&quot; href=&quot;#cite_note-43&quot;&gt;&lt;span data-dcnode-id=&quot;6402&quot; instrument_node=&quot;&quot;&gt;[43]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6399&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6392&quot;&gt;&lt;span data-dcnode-id=&quot;6397&quot; instrument_node=&quot;&quot;&gt;Members of the Task Force on Constitutional Development – Chief Secretary for Administration Carrie Lam Cheng Yuet-ngor, Secretary for Justice Rimsky Yuen Kwok-keung, and Secretary for Constitutional and Mainland Affairs Raymond Tam Chi-yuen – together with politically appointed officials took part on 25 April in a territory-wide bus parade to appeal for public support for the city's constitutional reform package on an open-top double-decker bus on which slogans of &quot;2017 Make it happen!&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6394&quot; id=&quot;cite_ref-44&quot;&gt;&lt;a data-dcnode-id=&quot;6395&quot; href=&quot;#cite_note-44&quot;&gt;&lt;span data-dcnode-id=&quot;6396&quot; instrument_node=&quot;&quot;&gt;[44]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6393&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6383&quot;&gt;&lt;span data-dcnode-id=&quot;6391&quot; instrument_node=&quot;&quot;&gt;A pro-Beijing group, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6389&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alliance_for_Peace_and_Democracy_%28Hong_Kong%29&quot; title=&quot;Alliance for Peace and Democracy (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;6390&quot; instrument_node=&quot;&quot;&gt;Alliance for Peace and Democracy&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6388&quot; instrument_node=&quot;&quot;&gt; on 9 May launched a nine-day campaign, with hundreds of booths set up to collect signatures from Hong Kongers aged 18 and above, in support of the government's proposed electoral reforms.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6385&quot; id=&quot;cite_ref-45&quot;&gt;&lt;a data-dcnode-id=&quot;6386&quot; href=&quot;#cite_note-45&quot;&gt;&lt;span data-dcnode-id=&quot;6387&quot; instrument_node=&quot;&quot;&gt;[45]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6384&quot; instrument_node=&quot;&quot;&gt; It claimed around 360,000 people added their names over the weekend. Meanwhile, the pan-democracy camp launched a citywide campaign to rally public opinion against the proposal.
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6382&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;6372&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6380&quot; id=&quot;31_May_meeting&quot;&gt;&lt;span data-dcnode-id=&quot;6381&quot; instrument_node=&quot;&quot;&gt;31 May meeting&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6373&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6378&quot;&gt;&lt;span data-dcnode-id=&quot;6379&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6376&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D25&quot; title=&quot;Edit section: 31 May meeting&quot;&gt;&lt;span data-dcnode-id=&quot;6377&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6374&quot;&gt;&lt;span data-dcnode-id=&quot;6375&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;6371&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6352&quot;&gt;&lt;span data-dcnode-id=&quot;6370&quot; instrument_node=&quot;&quot;&gt;On 31 May 2015, three top Beijing officials, Basic Law Committee chairman Li Fei, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6368&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_and_Macau_Affairs_Office&quot; title=&quot;Hong Kong and Macau Affairs Office&quot;&gt;&lt;span data-dcnode-id=&quot;6369&quot; instrument_node=&quot;&quot;&gt;Hong Kong and Macau Affairs Office&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6367&quot; instrument_node=&quot;&quot;&gt; director Wang Guangya and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6365&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Liaison_Office_of_the_Central_People%2527s_Government_in_Hong_Kong&quot; title=&quot;Liaison Office of the Central People's Government in Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6366&quot; instrument_node=&quot;&quot;&gt;Liaison Office of the Central People's Government in Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6364&quot; instrument_node=&quot;&quot;&gt; director &lt;/span&gt;&lt;a data-dcnode-id=&quot;6362&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Zhang_Xiaoming&quot; title=&quot;Zhang Xiaoming&quot;&gt;&lt;span data-dcnode-id=&quot;6363&quot; instrument_node=&quot;&quot;&gt;Zhang Xiaoming&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6361&quot; instrument_node=&quot;&quot;&gt; met with members of the Legislative Council in Shenzhen, which included pan-democratic legislators. The Beijing officials dashed any hope of last-minute concessions from Beijing with tough stances during the four-hour talk and the post-meeting press conference. Li also stressed that the framework set down on 31 August would govern the election of Hong Kong's leader by universal suffrage in 2017 and onwards.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6358&quot; id=&quot;cite_ref-46&quot;&gt;&lt;a data-dcnode-id=&quot;6359&quot; href=&quot;#cite_note-46&quot;&gt;&lt;span data-dcnode-id=&quot;6360&quot; instrument_node=&quot;&quot;&gt;[46]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6357&quot; instrument_node=&quot;&quot;&gt; The pan-democrats said they would definitely veto the political reform package as the meeting with mainland officials left them with no choice.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6354&quot; id=&quot;cite_ref-47&quot;&gt;&lt;a data-dcnode-id=&quot;6355&quot; href=&quot;#cite_note-47&quot;&gt;&lt;span data-dcnode-id=&quot;6356&quot; instrument_node=&quot;&quot;&gt;[47]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6353&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6351&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;6341&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;6349&quot; id=&quot;Legco_voting&quot;&gt;&lt;span data-dcnode-id=&quot;6350&quot; instrument_node=&quot;&quot;&gt;Legco voting&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;6342&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6347&quot;&gt;&lt;span data-dcnode-id=&quot;6348&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;6345&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D26&quot; title=&quot;Edit section: Legco voting&quot;&gt;&lt;span data-dcnode-id=&quot;6346&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;6343&quot;&gt;&lt;span data-dcnode-id=&quot;6344&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;6340&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6334&quot;&gt;&lt;span data-dcnode-id=&quot;6339&quot; instrument_node=&quot;&quot;&gt;Secretary for Constitutional and Mainland Affairs Raymond Tam Chi-yuen confirmed on 2 June 2015 that reform proposals would be tabled to the Legislative Council on 17 June with no modifications.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6336&quot; id=&quot;cite_ref-48&quot;&gt;&lt;a data-dcnode-id=&quot;6337&quot; href=&quot;#cite_note-48&quot;&gt;&lt;span data-dcnode-id=&quot;6338&quot; instrument_node=&quot;&quot;&gt;[48]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;6333&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;thumb tright&quot; data-dcnode-id=&quot;6324&quot;&gt;&lt;div class=&quot;thumbinner&quot; data-dcnode-id=&quot;6325&quot; style=&quot;width:352px;&quot;&gt;&lt;a class=&quot;image&quot; data-dcnode-id=&quot;6331&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3APro-Beijing_legislators_walkout_2015.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;thumbimage&quot; data-dcnode-id=&quot;6332&quot; data-file-height=&quot;2000&quot; data-file-width=&quot;2992&quot; decoding=&quot;async&quot; height=&quot;234&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/09/Pro-Beijing_legislators_walkout_2015.jpg/350px-Pro-Beijing_legislators_walkout_2015.jpg&amp;amp;raw&quot; srcset=&quot;//upload.wikimedia.org/wikipedia/commons/thumb/0/09/Pro-Beijing_legislators_walkout_2015.jpg/525px-Pro-Beijing_legislators_walkout_2015.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/09/Pro-Beijing_legislators_walkout_2015.jpg/700px-Pro-Beijing_legislators_walkout_2015.jpg 2x&quot; width=&quot;350&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6330&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;div class=&quot;thumbcaption&quot; data-dcnode-id=&quot;6326&quot;&gt;&lt;div class=&quot;magnify&quot; data-dcnode-id=&quot;6328&quot;&gt;&lt;a class=&quot;internal&quot; data-dcnode-id=&quot;6329&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/File%3APro-Beijing_legislators_walkout_2015.jpg&quot; title=&quot;Enlarge&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6327&quot; instrument_node=&quot;&quot;&gt;Pro-Beijing legislators walked out right before the historic vote.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;6323&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;6270&quot;&gt;&lt;span data-dcnode-id=&quot;6322&quot; instrument_node=&quot;&quot;&gt;During the second day of the debate on 18 June 2015, right before the vote, pro-Beijing legislators &lt;/span&gt;&lt;a data-dcnode-id=&quot;6320&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Ip_Kwok-him&quot; title=&quot;Ip Kwok-him&quot;&gt;&lt;span data-dcnode-id=&quot;6321&quot; instrument_node=&quot;&quot;&gt;Ip Kwok-him&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6319&quot; instrument_node=&quot;&quot;&gt; (DAB) and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6317&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Jeffrey_Lam_Kin-fung&quot; title=&quot;Jeffrey Lam Kin-fung&quot;&gt;&lt;span data-dcnode-id=&quot;6318&quot; instrument_node=&quot;&quot;&gt;Jeffrey Lam Kin-fung&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6316&quot; instrument_node=&quot;&quot;&gt; (BPA) led a walk-out of members of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6314&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Alliance_for_the_Betterment_and_Progress_of_Hong_Kong&quot; title=&quot;Democratic Alliance for the Betterment and Progress of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6315&quot; instrument_node=&quot;&quot;&gt;DAB&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6313&quot; instrument_node=&quot;&quot;&gt;, the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6311&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Business_and_Professionals_Alliance_for_Hong_Kong&quot; title=&quot;Business and Professionals Alliance for Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;6312&quot; instrument_node=&quot;&quot;&gt;BPA&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6310&quot; instrument_node=&quot;&quot;&gt;, most members of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6308&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_Federation_of_Trade_Unions&quot; title=&quot;Hong Kong Federation of Trade Unions&quot;&gt;&lt;span data-dcnode-id=&quot;6309&quot; instrument_node=&quot;&quot;&gt;FTU&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6307&quot; instrument_node=&quot;&quot;&gt; and other pro-Beijing legislators, after &lt;/span&gt;&lt;a data-dcnode-id=&quot;6305&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Jasper_Tsang&quot; title=&quot;Jasper Tsang&quot;&gt;&lt;span data-dcnode-id=&quot;6306&quot; instrument_node=&quot;&quot;&gt;Jasper Tsang&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6304&quot; instrument_node=&quot;&quot;&gt; denied Lam's request for a 15-minute recess. Lam later explained that the walk-out was an impromptu attempt to &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6302&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Quorum_busting&quot; title=&quot;Quorum busting&quot;&gt;&lt;span data-dcnode-id=&quot;6303&quot; instrument_node=&quot;&quot;&gt;delay the division&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6301&quot; instrument_node=&quot;&quot;&gt; so that his party member &lt;/span&gt;&lt;a data-dcnode-id=&quot;6299&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Lau_Wong-fat&quot; title=&quot;Lau Wong-fat&quot;&gt;&lt;span data-dcnode-id=&quot;6300&quot; instrument_node=&quot;&quot;&gt;Lau Wong-fat&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6298&quot; instrument_node=&quot;&quot;&gt;, who was delayed, could cast his vote in favour of the Beijing-backed reforms.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6295&quot; id=&quot;cite_ref-49&quot;&gt;&lt;a data-dcnode-id=&quot;6296&quot; href=&quot;#cite_note-49&quot;&gt;&lt;span data-dcnode-id=&quot;6297&quot; instrument_node=&quot;&quot;&gt;[49]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6294&quot; instrument_node=&quot;&quot;&gt; Unbeknownst to the lawmakers outside the chamber, however, five &lt;/span&gt;&lt;a data-dcnode-id=&quot;6292&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Party_%28Hong_Kong%29&quot; title=&quot;Liberal Party (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;6293&quot; instrument_node=&quot;&quot;&gt;Liberal Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6291&quot; instrument_node=&quot;&quot;&gt; legislators, &lt;/span&gt;&lt;a data-dcnode-id=&quot;6289&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Chan_Yuen-han&quot; title=&quot;Chan Yuen-han&quot;&gt;&lt;span data-dcnode-id=&quot;6290&quot; instrument_node=&quot;&quot;&gt;Chan Yuen-han&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6288&quot; instrument_node=&quot;&quot;&gt; of the FTU and two other pro-Beijing independents remained in the chamber and voted in favour of the proposal. On the other hand, all 27 pan democrats who had vowed to vote down the reform did so, as did one pro-Beijing legislator &lt;/span&gt;&lt;a data-dcnode-id=&quot;6286&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Leung_Ka-lau&quot; title=&quot;Leung Ka-lau&quot;&gt;&lt;span data-dcnode-id=&quot;6287&quot; instrument_node=&quot;&quot;&gt;Leung Ka-lau&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6285&quot; instrument_node=&quot;&quot;&gt; representing the &lt;/span&gt;&lt;a data-dcnode-id=&quot;6283&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Medical_%28constituency%29&quot; title=&quot;Medical (constituency)&quot;&gt;&lt;span data-dcnode-id=&quot;6284&quot; instrument_node=&quot;&quot;&gt;Medical constituency&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6282&quot; instrument_node=&quot;&quot;&gt;. The government's reform proposal failed as eight legislators voted in favour and 28 voted against, barely meeting the quorum of 35.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6279&quot; id=&quot;cite_ref-50&quot;&gt;&lt;a data-dcnode-id=&quot;6280&quot; href=&quot;#cite_note-50&quot;&gt;&lt;span data-dcnode-id=&quot;6281&quot; instrument_node=&quot;&quot;&gt;[50]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6278&quot; instrument_node=&quot;&quot;&gt; Since it had been expected the reform would be voted down by 41–28 (which would fall only six votes short of the two-thirds &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6276&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Absolute_majority&quot; title=&quot;Absolute majority&quot;&gt;&lt;span data-dcnode-id=&quot;6277&quot; instrument_node=&quot;&quot;&gt;absolute majority&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6275&quot; instrument_node=&quot;&quot;&gt; stipulated by the Basic Law), the failure in pro-Beijing camp's sudden tactics resulted in a surprising landslide defeat that would suggest to outsiders that there was little support for the plan. (Additionally in this case the reform will be defeated even if every legislator remaining in the chamber votes yes in the reform) &lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6272&quot; id=&quot;cite_ref-bickering_51-0&quot;&gt;&lt;a data-dcnode-id=&quot;6273&quot; href=&quot;#cite_note-bickering-51&quot;&gt;&lt;span data-dcnode-id=&quot;6274&quot; instrument_node=&quot;&quot;&gt;[51]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6271&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6252&quot;&gt;&lt;span data-dcnode-id=&quot;6269&quot; instrument_node=&quot;&quot;&gt;The fiasco was described by analysts as an &quot;embarrassment&quot; for Beijing, and the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6267&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Liaison_Office_of_the_Central_People%2527s_Government_in_the_Hong_Kong_Special_Administrative_Region&quot; title=&quot;Liaison Office of the Central People's Government in the Hong Kong Special Administrative Region&quot;&gt;&lt;span data-dcnode-id=&quot;6268&quot; instrument_node=&quot;&quot;&gt;Central Government's Liaison Office&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6266&quot; instrument_node=&quot;&quot;&gt; met or phoned pro-Beijing legislators about it after the voting. Much blame was placed on Jeffrey Lam Kin-fung who was seen as a key instigator of the walkout. Ip Kwok-him, caucus convenor of the DAB who stood up and ushered everyone to the exit apologised for his part. &lt;/span&gt;&lt;a data-dcnode-id=&quot;6264&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/New_People%2527s_Party_%28Hong_Kong%29&quot; title=&quot;New People's Party (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;6265&quot; instrument_node=&quot;&quot;&gt;New People's Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6263&quot; instrument_node=&quot;&quot;&gt; chairwoman &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6261&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Regina_Ip_Lau_Suk-yee&quot; title=&quot;Regina Ip Lau Suk-yee&quot;&gt;&lt;span data-dcnode-id=&quot;6262&quot; instrument_node=&quot;&quot;&gt;Regina Ip Lau Suk-yee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6260&quot; instrument_node=&quot;&quot;&gt; lost her tough composure during a radio show on the next day, openly sobbing as she lamented her failure to cast her ballot. Liberal Party chairman Felix Chung Kwok-pan was offended by those who said it was &quot;unfortunate&quot; the Liberals had stayed behind to vote instead of joining the majority in their walkout. An advert signed by 33 pro-Beijing legislators was published in seven Chinese-language newspapers and in an English version published in &lt;/span&gt;&lt;i data-dcnode-id=&quot;6258&quot;&gt;&lt;span data-dcnode-id=&quot;6259&quot; instrument_node=&quot;&quot;&gt;South China Morning Post&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;6257&quot; instrument_node=&quot;&quot;&gt; on the next days, saying their plan &quot;was foiled by gaps in communication&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6254&quot; id=&quot;cite_ref-bickering_51-1&quot;&gt;&lt;a data-dcnode-id=&quot;6255&quot; href=&quot;#cite_note-bickering-51&quot;&gt;&lt;span data-dcnode-id=&quot;6256&quot; instrument_node=&quot;&quot;&gt;[51]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6253&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;6235&quot;&gt;&lt;span data-dcnode-id=&quot;6251&quot; instrument_node=&quot;&quot;&gt;On 25 June, the &lt;/span&gt;&lt;i data-dcnode-id=&quot;6248&quot;&gt;&lt;a data-dcnode-id=&quot;6249&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Oriental_Daily_News&quot; title=&quot;Oriental Daily News&quot;&gt;&lt;span data-dcnode-id=&quot;6250&quot; instrument_node=&quot;&quot;&gt;Oriental Daily News&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;6247&quot; instrument_node=&quot;&quot;&gt; published a section of leaked WhatsApp group conversation among pro-Beijing legislators before the voting. President of Legco, &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;6245&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Jasper_Tsang_Yok-sing&quot; title=&quot;Jasper Tsang Yok-sing&quot;&gt;&lt;span data-dcnode-id=&quot;6246&quot; instrument_node=&quot;&quot;&gt;Jasper Tsang Yok-sing&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;6244&quot; instrument_node=&quot;&quot;&gt; of the DAB, was revealed to have joined the pro-Beijing legislators' discussion about their timing-control strategy. The pan-democrats criticised him for failing to uphold the impartiality as president and for exposing their plan to the rival camp. Tsang refused to resign, denying having done anything inconsistent with the rules of procedure or violated the neutrality of Legco president.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6241&quot; id=&quot;cite_ref-LeakedWhatsapp_52-0&quot;&gt;&lt;a data-dcnode-id=&quot;6242&quot; href=&quot;#cite_note-LeakedWhatsapp-52&quot;&gt;&lt;span data-dcnode-id=&quot;6243&quot; instrument_node=&quot;&quot;&gt;[52]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6240&quot; instrument_node=&quot;&quot;&gt; Media also noted that there was no mention of Lau Wong-fat at all even though his late arrival would trigger the walk-out.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;6237&quot; id=&quot;cite_ref-LeakedWhatsapp_52-1&quot;&gt;&lt;a data-dcnode-id=&quot;6238&quot; href=&quot;#cite_note-LeakedWhatsapp-52&quot;&gt;&lt;span data-dcnode-id=&quot;6239&quot; instrument_node=&quot;&quot;&gt;[52]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;6236&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;4282&quot;&gt;&lt;span data-dcnode-id=&quot;4319&quot; instrument_node=&quot;&quot;&gt;In April 2014, &lt;/span&gt;&lt;a data-dcnode-id=&quot;4317&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Anson_Chan&quot; title=&quot;Anson Chan&quot;&gt;&lt;span data-dcnode-id=&quot;4318&quot; instrument_node=&quot;&quot;&gt;Anson Chan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4316&quot; instrument_node=&quot;&quot;&gt;, former &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4314&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Chief_Secretary_of_Hong_Kong&quot; title=&quot;Chief Secretary of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;4315&quot; instrument_node=&quot;&quot;&gt;Chief Secretary of Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4313&quot; instrument_node=&quot;&quot;&gt; and founder of pro-democracy group &lt;/span&gt;&lt;a data-dcnode-id=&quot;4311&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong_2020&quot; title=&quot;Hong Kong 2020&quot;&gt;&lt;span data-dcnode-id=&quot;4312&quot; instrument_node=&quot;&quot;&gt;Hong Kong 2020&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4310&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;4308&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Martin_Lee&quot; title=&quot;Martin Lee&quot;&gt;&lt;span data-dcnode-id=&quot;4309&quot; instrument_node=&quot;&quot;&gt;Martin Lee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4307&quot; instrument_node=&quot;&quot;&gt;, founder of Hong Kong's opposition &lt;/span&gt;&lt;a data-dcnode-id=&quot;4305&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28Hong_Kong%29&quot; title=&quot;Democratic Party (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;4306&quot; instrument_node=&quot;&quot;&gt;Democratic Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4304&quot; instrument_node=&quot;&quot;&gt;, went to the United States and met &lt;/span&gt;&lt;a data-dcnode-id=&quot;4302&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Joe_Biden&quot; title=&quot;Joe Biden&quot;&gt;&lt;span data-dcnode-id=&quot;4303&quot; instrument_node=&quot;&quot;&gt;Joe Biden&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4301&quot; instrument_node=&quot;&quot;&gt;, US vice-president at the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4299&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/White_House&quot; title=&quot;White House&quot;&gt;&lt;span data-dcnode-id=&quot;4300&quot; instrument_node=&quot;&quot;&gt;White House&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4298&quot; instrument_node=&quot;&quot;&gt;. The activists spoke out against Beijing increasing control over Hong Kong and their fear of only candidates picked by Beijing would be allowed to take part in the 2017 Chief Executive election. Lee and Chan also voiced concerns over press freedom in Hong Kong, referring to violent assaults on journalists and alleging that Beijing is pressuring advertisers to shun critical media. Biden underscored Washington's &quot;long-standing support for democracy in Hong Kong and for the city's high degree of autonomy under the 'one country, two systems' framework,&quot; the White House said. China warned the United States against meddling in Hong Kong's internal affairs after Biden met with Chan and Lee. In response, &lt;/span&gt;&lt;a data-dcnode-id=&quot;4296&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Foreign_Affairs_of_the_People%2527s_Republic_of_China&quot; title=&quot;Ministry of Foreign Affairs of the People's Republic of China&quot;&gt;&lt;span data-dcnode-id=&quot;4297&quot; instrument_node=&quot;&quot;&gt;Chinese Ministry of Foreign Affairs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4295&quot; instrument_node=&quot;&quot;&gt; said that it &quot;firmly opposes any countries meddling in the city's internal affairs in any way,&quot; &lt;/span&gt;&lt;i data-dcnode-id=&quot;4292&quot;&gt;&lt;a data-dcnode-id=&quot;4293&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/South_China_Morning_Post&quot; title=&quot;South China Morning Post&quot;&gt;&lt;span data-dcnode-id=&quot;4294&quot; instrument_node=&quot;&quot;&gt;South China Morning Post&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4291&quot; instrument_node=&quot;&quot;&gt; quoted.&lt;/span&gt;&lt;sup class=&quot;noprint Inline-Template Template-Fact&quot; data-dcnode-id=&quot;4284&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;4290&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;4286&quot;&gt;&lt;a data-dcnode-id=&quot;4287&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed&quot; title=&quot;Wikipedia:Citation needed&quot;&gt;&lt;span data-dcnode-id=&quot;4288&quot; title=&quot;This claim needs references to reliable sources. (December 2020)&quot;&gt;&lt;span data-dcnode-id=&quot;4289&quot; instrument_node=&quot;&quot;&gt;citation needed&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4285&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4260&quot;&gt;&lt;span data-dcnode-id=&quot;4281&quot; instrument_node=&quot;&quot;&gt;During their trip to America, Lee and Chan also met with &lt;/span&gt;&lt;a data-dcnode-id=&quot;4279&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Nancy_Pelosi&quot; title=&quot;Nancy Pelosi&quot;&gt;&lt;span data-dcnode-id=&quot;4280&quot; instrument_node=&quot;&quot;&gt;Nancy Pelosi&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4278&quot; instrument_node=&quot;&quot;&gt;, minority leader of the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4276&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/US_House_of_Representatives&quot; title=&quot;US House of Representatives&quot;&gt;&lt;span data-dcnode-id=&quot;4277&quot; instrument_node=&quot;&quot;&gt;House of Representatives&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4275&quot; instrument_node=&quot;&quot;&gt;, and members of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4273&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Congressional-Executive_Commission_on_China&quot; title=&quot;Congressional-Executive Commission on China&quot;&gt;&lt;span data-dcnode-id=&quot;4274&quot; instrument_node=&quot;&quot;&gt;Congressional-Executive Commission on China&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4272&quot; instrument_node=&quot;&quot;&gt;. &quot;The future of freedom and democracy in Hong Kong is under serious threat,&quot; Senator &lt;/span&gt;&lt;a data-dcnode-id=&quot;4270&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Sherrod_Brown&quot; title=&quot;Sherrod Brown&quot;&gt;&lt;span data-dcnode-id=&quot;4271&quot; instrument_node=&quot;&quot;&gt;Sherrod Brown&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4269&quot; instrument_node=&quot;&quot;&gt;, head of the commission, said in a prepared statement, as quoted by Reuters. &quot;China is already placing 'pre-conditions' on who can run, raising serious doubts about whether the elections will be free and fair,&quot; he added.&lt;/span&gt;&lt;sup class=&quot;noprint Inline-Template Template-Fact&quot; data-dcnode-id=&quot;4262&quot; style=&quot;white-space:nowrap;&quot;&gt;&lt;span data-dcnode-id=&quot;4268&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;i data-dcnode-id=&quot;4264&quot;&gt;&lt;a data-dcnode-id=&quot;4265&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed&quot; title=&quot;Wikipedia:Citation needed&quot;&gt;&lt;span data-dcnode-id=&quot;4266&quot; title=&quot;This claim needs references to reliable sources. (December 2020)&quot;&gt;&lt;span data-dcnode-id=&quot;4267&quot; instrument_node=&quot;&quot;&gt;citation needed&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4263&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4261&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4206&quot;&gt;&lt;span data-dcnode-id=&quot;4259&quot; instrument_node=&quot;&quot;&gt;In early May 2015, A US bipartisan delegation led by &lt;/span&gt;&lt;a data-dcnode-id=&quot;4257&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Matt_Salmon&quot; title=&quot;Matt Salmon&quot;&gt;&lt;span data-dcnode-id=&quot;4258&quot; instrument_node=&quot;&quot;&gt;Matt Salmon&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4256&quot; instrument_node=&quot;&quot;&gt;, a &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4254&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Republican_Party_%28US%29&quot; title=&quot;Republican Party (US)&quot;&gt;&lt;span data-dcnode-id=&quot;4255&quot; instrument_node=&quot;&quot;&gt;Republican&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4253&quot; instrument_node=&quot;&quot;&gt; who chairs the &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4251&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/United_States_Senate_Foreign_Relations_Subcommittee_on_East_Asia%2C_The_Pacific_and_International_Cybersecurity_Policy&quot; title=&quot;United States Senate Foreign Relations Subcommittee on East Asia, The Pacific and International Cybersecurity Policy&quot;&gt;&lt;span data-dcnode-id=&quot;4252&quot; instrument_node=&quot;&quot;&gt;Subcommittee on East Asian and Pacific Affairs&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4250&quot; instrument_node=&quot;&quot;&gt; with Republican &lt;/span&gt;&lt;a data-dcnode-id=&quot;4248&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Tom_Emmer&quot; title=&quot;Tom Emmer&quot;&gt;&lt;span data-dcnode-id=&quot;4249&quot; instrument_node=&quot;&quot;&gt;Tom Emmer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4247&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4245&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28US%29&quot; title=&quot;Democratic Party (US)&quot;&gt;&lt;span data-dcnode-id=&quot;4246&quot; instrument_node=&quot;&quot;&gt;Democrat&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4244&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;4242&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alan_Lowenthal&quot; title=&quot;Alan Lowenthal&quot;&gt;&lt;span data-dcnode-id=&quot;4243&quot; instrument_node=&quot;&quot;&gt;Alan Lowenthal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4241&quot; instrument_node=&quot;&quot;&gt; on a fact-finding mission visited Hong Kong to learn about developments in Hong Kong. They held meetings with Chief Executive Leung Chun-ying and also legislators across the spectrum on the government's reform package, which pan-democrats have pledged to reject. Matt Salmon told leaders of the four pan-democratic parties, &lt;/span&gt;&lt;a data-dcnode-id=&quot;4239&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28Hong_Kong%29&quot; title=&quot;Democratic Party (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;4240&quot; instrument_node=&quot;&quot;&gt;Democratic Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4238&quot; instrument_node=&quot;&quot;&gt; chairwoman &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4236&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Emily_Lau_Wai-hing&quot; title=&quot;Emily Lau Wai-hing&quot;&gt;&lt;span data-dcnode-id=&quot;4237&quot; instrument_node=&quot;&quot;&gt;Emily Lau Wai-hing&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4235&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;4233&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Civic_Party&quot; title=&quot;Civic Party&quot;&gt;&lt;span data-dcnode-id=&quot;4234&quot; instrument_node=&quot;&quot;&gt;Civic Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4232&quot; instrument_node=&quot;&quot;&gt; leader &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4230&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Alan_Leong_Kah-kit&quot; title=&quot;Alan Leong Kah-kit&quot;&gt;&lt;span data-dcnode-id=&quot;4231&quot; instrument_node=&quot;&quot;&gt;Alan Leong Kah-kit&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4229&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;4227&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28Hong_Kong%29&quot; title=&quot;Labour Party (Hong Kong)&quot;&gt;&lt;span data-dcnode-id=&quot;4228&quot; instrument_node=&quot;&quot;&gt;Labour Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4226&quot; instrument_node=&quot;&quot;&gt; chairman &lt;/span&gt;&lt;a data-dcnode-id=&quot;4224&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Lee_Cheuk-yan&quot; title=&quot;Lee Cheuk-yan&quot;&gt;&lt;span data-dcnode-id=&quot;4225&quot; instrument_node=&quot;&quot;&gt;Lee Cheuk-yan&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4223&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4221&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Association_for_Democracy_and_People%2527s_Livelihood&quot; title=&quot;Association for Democracy and People's Livelihood&quot;&gt;&lt;span data-dcnode-id=&quot;4222&quot; instrument_node=&quot;&quot;&gt;Association for Democracy and People's Livelihood&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4220&quot; instrument_node=&quot;&quot;&gt; lawmaker &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4218&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Frederick_Fung_Kin-kee&quot; title=&quot;Frederick Fung Kin-kee&quot;&gt;&lt;span data-dcnode-id=&quot;4219&quot; instrument_node=&quot;&quot;&gt;Frederick Fung Kin-kee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4217&quot; instrument_node=&quot;&quot;&gt;, that a system where &quot;people are elected by the people&quot; was better than one in which leaders were chosen via a narrow constituency, saying that 'sometimes half a loaf is better than no loaf'. Lee said the congressmen had described the proposed chief executive election plan as &quot;definitely not equal suffrage&quot; and said they were not trying to convince the pan-democrats but to learn more about the reform debate. Fung said the congressmen had described the reform plan as not fully democratic but had stressed it was a decision for Hongkongers to make. &lt;/span&gt;&lt;a data-dcnode-id=&quot;4215&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Tam_Yiu-chung&quot; title=&quot;Tam Yiu-chung&quot;&gt;&lt;span data-dcnode-id=&quot;4216&quot; instrument_node=&quot;&quot;&gt;Tam Yiu-chung&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4214&quot; instrument_node=&quot;&quot;&gt;, ex-chairman of the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4212&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Alliance_for_the_Betterment_and_Progress_of_Hong_Kong&quot; title=&quot;Democratic Alliance for the Betterment and Progress of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;4213&quot; instrument_node=&quot;&quot;&gt;Democratic Alliance for the Betterment and Progress of Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4211&quot; instrument_node=&quot;&quot;&gt; who also met the trio, read the congressmen's interest in compromise as a signal that they wanted to see the reform package passed.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4208&quot; id=&quot;cite_ref-54&quot;&gt;&lt;a data-dcnode-id=&quot;4209&quot; href=&quot;#cite_note-54&quot;&gt;&lt;span data-dcnode-id=&quot;4210&quot; instrument_node=&quot;&quot;&gt;[54]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4207&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4205&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;4195&quot;&gt;&lt;span class=&quot;mw-headline&quot; data-dcnode-id=&quot;4203&quot; id=&quot;United_Kingdom&quot;&gt;&lt;span data-dcnode-id=&quot;4204&quot; instrument_node=&quot;&quot;&gt;United Kingdom&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;mw-editsection&quot; data-dcnode-id=&quot;4196&quot;&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4201&quot;&gt;&lt;span data-dcnode-id=&quot;4202&quot; instrument_node=&quot;&quot;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;4199&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2014%25E2%2580%25932015_Hong_Kong_electoral_reform%26action%3Dedit%26section%3D29&quot; title=&quot;Edit section: United Kingdom&quot;&gt;&lt;span data-dcnode-id=&quot;4200&quot; instrument_node=&quot;&quot;&gt;edit&lt;/span&gt;&lt;/a&gt;&lt;span class=&quot;mw-editsection-bracket&quot; data-dcnode-id=&quot;4197&quot;&gt;&lt;span data-dcnode-id=&quot;4198&quot; instrument_node=&quot;&quot;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;4194&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;4163&quot;&gt;&lt;span data-dcnode-id=&quot;4193&quot; instrument_node=&quot;&quot;&gt;In July 2014, Anson Chan and Martin Lee visited the United Kingdom and met with &lt;/span&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4191&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Deputy_Prime_Minister&quot; title=&quot;Deputy Prime Minister&quot;&gt;&lt;span data-dcnode-id=&quot;4192&quot; instrument_node=&quot;&quot;&gt;Deputy Prime Minister&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4190&quot; instrument_node=&quot;&quot;&gt; and the leader of the coalition's junior partner the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4188&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Democrats_%28UK%29&quot; title=&quot;Liberal Democrats (UK)&quot;&gt;&lt;span data-dcnode-id=&quot;4189&quot; instrument_node=&quot;&quot;&gt;Liberal Democrats&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4187&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;4185&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Nick_Clegg&quot; title=&quot;Nick Clegg&quot;&gt;&lt;span data-dcnode-id=&quot;4186&quot; instrument_node=&quot;&quot;&gt;Nick Clegg&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4184&quot; instrument_node=&quot;&quot;&gt; and raised concerns over China's jurisdiction of the region, and questioning Britain's commitment to Hong Kong's democratic development. Clegg affirmed Britain's commitment to honour the pledge that if China breached the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4182&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Sino-British_Joint_Declaration&quot; title=&quot;Sino-British Joint Declaration&quot;&gt;&lt;span data-dcnode-id=&quot;4183&quot; instrument_node=&quot;&quot;&gt;Sino-British Joint Declaration&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4181&quot; instrument_node=&quot;&quot;&gt;, Britain would &quot;mobilize the international community and pursue every legal and other avenue available&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4178&quot; id=&quot;cite_ref-responsibilities_55-0&quot;&gt;&lt;a data-dcnode-id=&quot;4179&quot; href=&quot;#cite_note-responsibilities-55&quot;&gt;&lt;span data-dcnode-id=&quot;4180&quot; instrument_node=&quot;&quot;&gt;[55]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4177&quot; instrument_node=&quot;&quot;&gt; Clegg also criticised British Prime Minister &lt;/span&gt;&lt;a data-dcnode-id=&quot;4175&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/David_Cameron&quot; title=&quot;David Cameron&quot;&gt;&lt;span data-dcnode-id=&quot;4176&quot; instrument_node=&quot;&quot;&gt;David Cameron&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4174&quot; instrument_node=&quot;&quot;&gt; for prioritising trade with the world's second largest economy over democracy in Hong Kong. A source close to Clegg said Cameron's &lt;/span&gt;&lt;a data-dcnode-id=&quot;4172&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28UK%29&quot; title=&quot;Conservative Party (UK)&quot;&gt;&lt;span data-dcnode-id=&quot;4173&quot; instrument_node=&quot;&quot;&gt;Conservative Party&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4171&quot; instrument_node=&quot;&quot;&gt; had become &quot;so deferential in their attitude to China&quot; they would not stand up for democracy in Hong Kong. China issued a formal complaint to Britain after the meeting. Chinese Foreign Ministry spokesman &lt;/span&gt;&lt;a data-dcnode-id=&quot;4169&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hong_Lei_%28diplomat%29&quot; title=&quot;Hong Lei (diplomat)&quot;&gt;&lt;span data-dcnode-id=&quot;4170&quot; instrument_node=&quot;&quot;&gt;Hong Lei&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4168&quot; instrument_node=&quot;&quot;&gt; said China was firmly opposed to any foreign interference in its internal affairs on any pretext.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4165&quot; id=&quot;cite_ref-56&quot;&gt;&lt;a data-dcnode-id=&quot;4166&quot; href=&quot;#cite_note-56&quot;&gt;&lt;span data-dcnode-id=&quot;4167&quot; instrument_node=&quot;&quot;&gt;[56]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4164&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4151&quot;&gt;&lt;span data-dcnode-id=&quot;4162&quot; instrument_node=&quot;&quot;&gt;Anson Chan and Martin Lee also attended a &lt;/span&gt;&lt;a data-dcnode-id=&quot;4160&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Foreign_Affairs_Select_Committee&quot; title=&quot;Foreign Affairs Select Committee&quot;&gt;&lt;span data-dcnode-id=&quot;4161&quot; instrument_node=&quot;&quot;&gt;Foreign Affairs Select Committee&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4159&quot; instrument_node=&quot;&quot;&gt; hearing, speaking out that they were &quot;concerned that neither of the two signatories to the Joint Declaration – that is, China and Britain – is adequately fulfilling their respective responsibilities on the terms of this internationally binding treaty.&quot; &lt;/span&gt;&lt;a data-dcnode-id=&quot;4157&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Richard_Ottaway&quot; title=&quot;Richard Ottaway&quot;&gt;&lt;span data-dcnode-id=&quot;4158&quot; instrument_node=&quot;&quot;&gt;Richard Ottaway&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4156&quot; instrument_node=&quot;&quot;&gt;, a member of Parliament and chairman of the Foreign Affairs Committee, said that the committee would announce a report as early as next week on the British government's policy toward Hong Kong, but &quot;it's not a report into the internal operations of Hong Kong.&quot; Within two months of its publication, the British government will have to respond to the conclusions and recommendations set out in the report.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4153&quot; id=&quot;cite_ref-responsibilities_55-1&quot;&gt;&lt;a data-dcnode-id=&quot;4154&quot; href=&quot;#cite_note-responsibilities-55&quot;&gt;&lt;span data-dcnode-id=&quot;4155&quot; instrument_node=&quot;&quot;&gt;[55]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4135&quot;&gt;&lt;a data-dcnode-id=&quot;4149&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Liu_Xiaoming&quot; title=&quot;Liu Xiaoming&quot;&gt;&lt;span data-dcnode-id=&quot;4150&quot; instrument_node=&quot;&quot;&gt;Liu Xiaoming&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4148&quot; instrument_node=&quot;&quot;&gt;, PRC's ambassador to Britain, described Martin Lee and Anson Chan as &quot;bent on undermining the stability of Hong Kong&quot;. He sent a letter to the members of parliament on 14 July, warned members against visiting Hong Kong. &quot;I do not think your planned visit to Hong Kong is helpful and strongly advise you not make it,&quot; Liu wrote. A second letter, from the National People's Congress Foreign Affairs Committee, sent to the British committee in July, saying that the inquiry into post-handover Hong Kong by the committee would be seen as interference in China's internal affairs and called for it to be cancelled.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4145&quot; id=&quot;cite_ref-probe_57-0&quot;&gt;&lt;a data-dcnode-id=&quot;4146&quot; href=&quot;#cite_note-probe-57&quot;&gt;&lt;span data-dcnode-id=&quot;4147&quot; instrument_node=&quot;&quot;&gt;[57]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4144&quot; instrument_node=&quot;&quot;&gt; Undeterred by warnings from Beijing, Richard Ottaway told the &lt;/span&gt;&lt;i data-dcnode-id=&quot;4141&quot;&gt;&lt;a class=&quot;mw-redirect&quot; data-dcnode-id=&quot;4142&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Sunday_Morning_Post&quot; title=&quot;Sunday Morning Post&quot;&gt;&lt;span data-dcnode-id=&quot;4143&quot; instrument_node=&quot;&quot;&gt;Sunday Morning Post&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4140&quot; instrument_node=&quot;&quot;&gt;: &quot;We are planning to come in December and I have no reason to think that we won't be there.&quot; &quot;The Hong Kong government, the Chinese government and the National People's Congress shouldn't necessarily think that we are automatically hostile,&quot; Ottaway said.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4137&quot; id=&quot;cite_ref-probe_57-1&quot;&gt;&lt;a data-dcnode-id=&quot;4138&quot; href=&quot;#cite_note-probe-57&quot;&gt;&lt;span data-dcnode-id=&quot;4139&quot; instrument_node=&quot;&quot;&gt;[57]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4136&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4106&quot;&gt;&lt;a data-dcnode-id=&quot;4133&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Chris_Patten&quot; title=&quot;Chris Patten&quot;&gt;&lt;span data-dcnode-id=&quot;4134&quot; instrument_node=&quot;&quot;&gt;Chris Patten&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4132&quot; instrument_node=&quot;&quot;&gt;, the last &lt;/span&gt;&lt;a data-dcnode-id=&quot;4130&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Governor_of_Hong_Kong&quot; title=&quot;Governor of Hong Kong&quot;&gt;&lt;span data-dcnode-id=&quot;4131&quot; instrument_node=&quot;&quot;&gt;Governor of Hong Kong&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4129&quot; instrument_node=&quot;&quot;&gt; under the British rule, wrote in the &lt;/span&gt;&lt;i data-dcnode-id=&quot;4126&quot;&gt;&lt;a data-dcnode-id=&quot;4127&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Financial_Times&quot; title=&quot;Financial Times&quot;&gt;&lt;span data-dcnode-id=&quot;4128&quot; instrument_node=&quot;&quot;&gt;Financial Times&lt;/span&gt;&lt;/a&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;4125&quot; instrument_node=&quot;&quot;&gt; in September, questioning Britain's &quot;sense of honour&quot; in failing to condemn China's planned reforms in Hong Kong, which he said would introduce the kind of stage-managed democracy seen in Iran.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4122&quot; id=&quot;cite_ref-58&quot;&gt;&lt;a data-dcnode-id=&quot;4123&quot; href=&quot;#cite_note-58&quot;&gt;&lt;span data-dcnode-id=&quot;4124&quot; instrument_node=&quot;&quot;&gt;[58]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4121&quot; instrument_node=&quot;&quot;&gt; He said that the UK had a “moral and political obligation” to defend full democracy in the city.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4118&quot; id=&quot;cite_ref-insult_59-0&quot;&gt;&lt;a data-dcnode-id=&quot;4119&quot; href=&quot;#cite_note-insult-59&quot;&gt;&lt;span data-dcnode-id=&quot;4120&quot; instrument_node=&quot;&quot;&gt;[59]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4117&quot; instrument_node=&quot;&quot;&gt; In response to media enquiries on the remarks by Chris Patten, a spokesman for the &lt;/span&gt;&lt;a data-dcnode-id=&quot;4115&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Office_of_the_Chief_Executive&quot; title=&quot;Office of the Chief Executive&quot;&gt;&lt;span data-dcnode-id=&quot;4116&quot; instrument_node=&quot;&quot;&gt;Office of the Chief Executive&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4114&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;4112&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Leung_Chun-ying&quot; title=&quot;Leung Chun-ying&quot;&gt;&lt;span data-dcnode-id=&quot;4113&quot; instrument_node=&quot;&quot;&gt;Leung Chun-ying&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4111&quot; instrument_node=&quot;&quot;&gt; said on 4 September 2014 that none of the Governors of Hong Kong had been elected by Hong Kong people under the British rule; that the Sino-British Joint Declaration did not provide for universal suffrage; and that Hong Kong's constitutional development under the Basic Law was an internal affair of China.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4108&quot; id=&quot;cite_ref-60&quot;&gt;&lt;a data-dcnode-id=&quot;4109&quot; href=&quot;#cite_note-60&quot;&gt;&lt;span data-dcnode-id=&quot;4110&quot; instrument_node=&quot;&quot;&gt;[60]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4107&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4096&quot;&gt;&lt;span data-dcnode-id=&quot;4105&quot; instrument_node=&quot;&quot;&gt;In an official response to China's 31 August decision, the British government said, &quot;We welcome the confirmation that China's objective is for the election of Hong Kong's chief executive through universal suffrage.&quot; A Chinese Foreign Ministry spokesman expressed &quot;strong dissatisfaction&quot; with the response, saying that the reform was &quot;China's internal affair&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4102&quot; id=&quot;cite_ref-61&quot;&gt;&lt;a data-dcnode-id=&quot;4103&quot; href=&quot;#cite_note-61&quot;&gt;&lt;span data-dcnode-id=&quot;4104&quot; instrument_node=&quot;&quot;&gt;[61]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4101&quot; instrument_node=&quot;&quot;&gt; Anson Chan and Martin Lee heavily criticised the UK government's acceptance of China's plan for limiting free elections in its former colony of Hong Kong.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4098&quot; id=&quot;cite_ref-insult_59-1&quot;&gt;&lt;a data-dcnode-id=&quot;4099&quot; href=&quot;#cite_note-insult-59&quot;&gt;&lt;span data-dcnode-id=&quot;4100&quot; instrument_node=&quot;&quot;&gt;[59]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4097&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;4087&quot;&gt;&lt;span data-dcnode-id=&quot;4095&quot; instrument_node=&quot;&quot;&gt;After the electoral reform proposal was voted down, British minister &lt;/span&gt;&lt;a data-dcnode-id=&quot;4093&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Hugo_Swire&quot; title=&quot;Hugo Swire&quot;&gt;&lt;span data-dcnode-id=&quot;4094&quot; instrument_node=&quot;&quot;&gt;Hugo Swire&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;4092&quot; instrument_node=&quot;&quot;&gt; expressed his country's disappointment at the outcome, and said that &quot;a transition to universal suffrage is the best way to guarantee Hong Kong's stability&quot;.&lt;/span&gt;&lt;sup class=&quot;reference&quot; data-dcnode-id=&quot;4089&quot; id=&quot;cite_ref-62&quot;&gt;&lt;a data-dcnode-id=&quot;4090&quot; href=&quot;#cite_note-62&quot;&gt;&lt;span data-dcnode-id=&quot;4091&quot; instrument_node=&quot;&quot;&gt;[62]&lt;/span&gt;&lt;/a&gt;&lt;/sup&gt;&lt;span data-dcnode-id=&quot;4088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;4086&quot; instrument_node=&quot;&quot;&gt;
