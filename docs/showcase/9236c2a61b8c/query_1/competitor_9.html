1. Policy Issues, Concerns, and Challenges10

      Most people agree that the constitutional and legal frameworks in the Philippines provide the
foundations for good governance. The policy environment allows people’s participation and public scrutiny
and criticism of government operations and outputs. Further, the country has adequate laws, rules, and
regulations to establish order and move forward. While underdevelopment can easily be attributed to a lack
of institutional capacity and professional competencies to implement policies and enforce laws, certain
lessons learned and issues related to public policy making deserve mention. The Philippine public policy-
making process bears the following features: (i) policy decisions and programs are arrived at through
institutional mechanisms provided for in the Constitution of the Republic of the Philippines and other laws;
(ii) policy-making process is then characterized as precedent bound, based on laws and forged by such
structures as a bicameral legislative body and the executive branch of the Government; (iii) legislative
branch is composed of the Senate and the House of Representatives, while the president heads the
executive branch of the Government and is the prime initiator and implementer of policies and programs;
and (iv) the decisions of the legislative and executive branches are subject to judicial review by the
Supreme Court and inferior courts on questions of constitutionality and statutory construction.

     Different sets of forces each influence the different stages of public policy making, namely, decisions
on (i) including items in the agenda, (ii) developing any particular agenda item, (iii) passing legislation, and
(iv) implementing new laws. Different constituencies exert their influences at different stages of policy
development and execution. Many policies have nonetheless missed out in giving importance to
meaningful public consultations, constructive debate and criticism, and needed consensus building and
development of a sense of ownership of different stakeholders. Without these elements, and with extensive
graft and corruption in the country (which undermines and subverts the rule of law), many policies fail to
command respect and compliance.

     It should also be made clear that policy initiatives for governance reforms could be undertaken by the
Government even without legislation. In these cases, one might consider whether legislation is useful or
not. The value of legislation is that it binds public institutions to certain decreed directions. If one wants to
assure the future

      Legislation is complicated, not under the complete control of any person or group, and may have
unpredictable results. Embarking on a campaign to get something legislated cannot be a decision taken
lightly or casually. In addition, successful legislation generally occurs when the problems deemed
important meet the solutions deemed highly probable by political personalities or groups in positions of
power. Problems, policies, and politicians have to intersect for proper action to occur.

Legislation as an instrument for achieving desirable societal goals and institutionalizing reforms is
advisable when the underlying assumptions of policies have any or all of the following characteristics:

(i) policies can only be optimally effective when adopted by the whole Government and supported by
stakeholders; (ii) policies can yield best results only when implemented over the life of several
administrations; (iii) policies can be accomplished only with adequate and judicious use of resources; (iv)
policies can be accomplished by the Government’s applying cost-effective measures and using available
technology and resources; (v) policies, when deliberated and agreed, would create a framework for many
people and groups to assume broader responsibilities on an institutional basis.

A policy needs to be very clear and specific about the: (i) nature and magnitude of the problem being
addressed; (ii) basic mechanism for responding to the problem; (iii) standards and provisions for making
the mechanism work; (iv) system of responsibilities and accountabilities for coordination, implementation,
control, and review of results; and (v) organizational and budgetary implications. These elements are often
deficient in many public policies. It is common to have layers of rules and regulations to clarify policy
provisions, not to mention sets of procedures to inform and guide implementers and stakeholders.
fSome policy initiatives may not be ready to be pursued because the data and analysis necessary to make a
decision may be unavailable. In these cases, research is probably more appropriate than formulating a new
policy or draft legislation. Some policies are haphazardly and hastily developed and scarcely take into
account deliberate and careful planning and effective use of objective and accurate information. Public
policy making in the Philippines boldly underscores the need to improve its capacities in undertaking
knowledge-based policy analysis and development.

Access to timely and correct information about public policies also precludes overall efficiency,
effectiveness, and productivity. Those who are affected may sometimes be unaware of or improperly
informed about their rights, duties, and responsibilities provided for in relevant policies.

2. Problems in the Bureaucracy

Bureaucracy is a distinctive arrangement used by human beings to organize their activities. The invention
of Western bureaucracy several centuries ago helped solve the problem for leaders of governing human
systems that grew larger and more complicated with each passing year. The great virtue and probably
defining characteristic of bureaucracy, according to the one of the founders of sociology, German Max
Weber (1864-1920), is as “an institutional method for applying general rules to specific cases, thereby
making the actions of government fair and predictable” However, in the governance process, there are two
problems in a bureaucratic type of government: inefficiency and arbitrariness.

For nearly half a century, the Philippines was caught in an endless cycle of reform exercises that hardly
produced tangible and lasting results. Structural issues— such as (i) duplicated functions and overlapped
jurisdictions, (ii) outdated and slow government procedures, (iii) various loopholes in administrative
procedures, and (iv) limited capacity for policy analysis and strategic long-range planning that caused
delays and higher costs in handling business—made maintaining objectivity, accountability, and
transparency in decision making and government operations difficult and gave rise to a host of other
problems, including poor implementation and coordination. (ADB, 2005).

As reflected in the Country Governance Assessment, (2004) Administrative reform efforts in the
Philippines did not fully succeed because of the following: (1.) lack of acceptance of and commitment to
the need for reform by political authorities and different affected entities; (2.) lack of stakeholder
appreciation and agreement concerning administrative reform being a long, strategic, and continuous
process; (3.) lack of understanding that reform objectives are specific, measurable, realistic, and time
bound; (4.) lack of good reform implementation strategies and adequate resources to carry them out;

(5.) lack of an established central agency tasked with formulating, coordinating, and monitoring reforms
and providing corrective measures; (6.) lack of reform procedures and regulations that are fairly and
consistently applied; (7.) lack of meaningful stakeholder participation in the entire reform process; (8.)
lack of strong and sustained support of political leaders; (9.) lack of an established and enforced system of
accountabilities; and (10.) lack of safety nets for groups and individuals who may be disenfranchised by
interventions.

In the Common country Assessment of the Philippines (2004), an inefficient bureaucracy is one of the
major problems and an area for development cooperation11. Past Philippine administrations have carried
out reorganization and reengineering schemes for the bureaucracy, in an effort to improve efficiency and
reduce corruption. Studies about Philippine civil service system point to several deficiencies include: (1.)
Weak mechanisms for planning, agenda setting and policy-making; (2) Failure to implement and maintain
an appropriate performance management and measurement system; (3) Overlapping and duplicating
government functions and activities; (4.) Overemphasis on rules and procedures rather than direct resource
management towards the realization of intended outcomes and impacts; (5.) A highly politicized
bureaucracy (6.) Lack of required managerial and technical expertise

2. 1. Corruption
f Corruption damages the development process in many ways. It undermines social confidence in the
willingness and capacity of public institutions to fulfill their obligations to the people and it reinforces
existing power relationships that are themselves typically part of the development problem. Losses due to
corruption deepen poverty as they deprive the disadvantaged sectors of much needed programmes and
environmental stewardship. Incidences of bribery and graft are often front page news,

 The Government has recently introduced affirmative actions toward addressing this problem such as the
passage of the Procurement Act, the implementation of lifestyle check among government officials, and the
reactivation of the Inter-Agency Anti-Corruption Committee (IAGCC) to synchronize the various anti-

3. Issue on Public Fiscal Management Another issue on good governance is on public fiscal management.
Prior to government reform programmes, there were weaknesses and constraints in fiscal management,
especially in the budgeting process. Some of these constraints are still lingering.

 Recognizing the impact that the fiscal condition has on macroeconomic stability, the government should
continue to give priority to raising revenues and improving the efficiency of the bureaucracy so that more
and better quality public service can be delivered.

Following the onset of the Asian financial crisis, the Philippines government’s deficit deteriorated quickly,
mainly due to slippages in revenue collection. The major causes of the decline include the following:
f1. Tax evasion and weakness in the tax structure. 2. The private corporate and banking sectors which are
major contributors to the national coffers were weighed down by nonperforming assets.

Box 3. Tax revenues Tax revenues as a share of GDP, fell from 13.9 % in 2000 to 13.5% in 2001. About
PhP150 billion is lost to tax evasion, PhP92 billion of which constitutes uncollected income tax. In
succeeding years, these translated into higher debt service payments, which along with the non passage of
important tax measures, created a vicious cycle of higher deficit and debt. Recognizing the major causes of
declining revenue collection, the government began in 2002 to implement reforms in both the Bureau of
Internal Revenue and Bureau of Customs. On the expenditure side, expenditure reduction programs were
also put in place, such as the Government electronic Procurement System. Moreover, the passage of Dept
Cap Act is expected to ease the problem or rising interest payments.

4. Deficiencies in the Political and Electoral System

 Public confidence in election outcomes is low because of widely alleged irregularities in the Philippine
electoral processes. The modernization of the electoral system in the country today is an attempt to
enhance public confidence in election outcomes and address traditional election anomalies such as
cheating, intimidation and bribery. The government has initiated concrete efforts to institutionalize
electoral reforms through the passage of laws on Election Modernization (see appendix for the full text of
the Election Modernization Act or RA 8436), Party-List System and the Absentee Voting for Overseas
Filipinos13. A democratic and effective political and electoral system is important to ensure that a
development agenda, primarily addressing the needs of poor and disadvantaged, is promoted and sustained
beyond administrations. Civil society organizations are currently working with their government
counterparts of pending reform bills in Congress that also seek to address issues on political dynasties, the
continued practice of party turn-coatism and the diminution of the electoral process into mere contests of
personalities.

The Need for Good Governance: Why Governance Matters

Good governance creates a strong future for an organization by continuously steering towards a vision and
making sure that day-to-day management is always lined up with the organization’s goals. At its core,
governance is about leadership.

An effective board will improve the organization’s results, both financial and social, and make sure the
owners' assets and funds are used appropriately. Poor governance can put organizations at risk of
commercial failure, financial and legal problems for directors/trustees or allow an organization to lose sight
of its purpose and its responsibilities to its owners and people who benefit from its success.

The Rights-Based Approach to governance implies that the holders of rights should also participate fully in
deciding how those rights are fulfilled, such as through participation and greater empowerment. And as the
Millennium Declaration emphasizes, one of the most important requirements for achieving this and the
MDG is “governance” The report points out that Asia and the Pacific has many diverse forms of
democratic governments4. In some cases these have involved highly centralized administrations that have
offered a limited space for popular participation. Nevertheless, in recent years there have been significant
changes. One of the most dramatic examples has been in Indonesia, which for decades until the late 1990s
had a strongly centralized administration. Now the democratic Government in Indonesia has not only
offered free and fair elections; it has also enacted a radical process of decentralization.
