&lt;/span&gt;&lt;a class=&quot;flex items-center&quot; data-dcnode-id=&quot;697&quot; data-module=&quot;scroll&quot; href=&quot;#alignment&quot;&gt;&lt;span data-dcnode-id=&quot;701&quot; instrument_node=&quot;&quot;&gt;
              Alignment
              &lt;/span&gt;&lt;span class=&quot;ml-3 type-caption p-3 font-semibold rounded-lg text-white bg-yellow&quot; data-dcnode-id=&quot;699&quot;&gt;&lt;span data-dcnode-id=&quot;700&quot; instrument_node=&quot;&quot;&gt;Good&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;698&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li class=&quot;mb-5&quot; data-dcnode-id=&quot;689&quot;&gt;&lt;span data-dcnode-id=&quot;693&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;font-semibold&quot; data-dcnode-id=&quot;691&quot; data-module=&quot;scroll&quot; href=&quot;#bibliography&quot;&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;Bibliography&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;690&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;686&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;680&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;container px-10 py-section-sm&quot; data-dcnode-id=&quot;441&quot;&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;row justify-center&quot; data-dcnode-id=&quot;443&quot;&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;col w-full xl:w-8/12 rich-text&quot; data-dcnode-id=&quot;481&quot;&gt;&lt;span data-dcnode-id=&quot;677&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;type-lg font-semibold&quot; data-dcnode-id=&quot;675&quot;&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;
            Indian elections of the 1970s and 1980s were increasingly factional and violent. In 1990 the government realised that action had to be taken. It chose to revive the Model Code of Conduct, a voluntary electoral code that had been largely ignored since its adoption in 1962. The mood had changed, though, and the desire for reform intensified after the assassination of Rajiv Gandhi in 1991. The Election Commission of India spent the next decade persuading politicians to observe the code’s guidelines and conduct peaceful and orderly election campaigns.
          &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;674&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;633&quot; id=&quot;the-initiative&quot;&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;671&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;The initiative&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;666&quot;&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;The first stage of the reform was for the then prime minister to invite the Committee on Electoral Reforms under the minister of law and justice, Dinesh Goswami, to report and make recommendations on how to proceed. “Among other recommendations, the report endorsed 1) the disqualification of candidates who campaigned on caste or religious lines, or instigated communal animosities during elections, and 2) the investigation, special trial or prosecution of candidates who intimidated or coerced voters. In addition, the report recommended that the election commission should void results and arrange fresh elections in cases where misconduct reported by electoral officers turned out to be true.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;667&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//successfulsocieties.princeton.edu/sites/successfulsocieties/files/Policy_Note_ID154.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;668&quot; instrument_node=&quot;&quot;&gt;[1]&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;661&quot;&gt;&lt;span data-dcnode-id=&quot;665&quot; instrument_node=&quot;&quot;&gt;The Committee was of the opinion that “statutory backing should be given to some of the more important provisions of the Model Code” &lt;/span&gt;&lt;a data-dcnode-id=&quot;663&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//books.google.co.uk/books%3Fid%3DoNco2lk5IpUC%26pg%3DPA368%26lpg%3DPA368%26dq%3Dindian%2Belectoral%2Bcode%2B1990%26source%3Dbl%26ots%3DyxP5CcL_-y%26sig%3DascqCILn4JFbZ_jTVTUcIfRCmBg%26hl%3Den%26sa%3DX%26ved%3D0ahUKEwi_65DytNfMAhXENhoKHSeGBHMQ6AEISzAI%23v%3Donepage%26q%3Dindian%2520electoral%2520code%25201990%26f%3Dfalse&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;664&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;662&quot; instrument_node=&quot;&quot;&gt;, such as the use of government funds for party political advertising. This aspect of the recommendations was ignored, and it was implemented as a voluntary code.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;659&quot;&gt;&lt;span data-dcnode-id=&quot;660&quot; instrument_node=&quot;&quot;&gt;In December 1990, President Venkataraman appointed T.N. Seshan as chief of the Election Commission of India (ECI). Subsequently, M.S. Gill took over as in 1996, after Seshan had completed his term of office. Both men recognised that in order to use the Model Code of Conduct as an effective policy tool, the ECI would need to build broad support for the code and its goals, and to induce politicians and parties to abide by the code's recommended campaign practices.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;657&quot;&gt;&lt;span data-dcnode-id=&quot;658&quot; instrument_node=&quot;&quot;&gt;They took the following steps for implementing the code of conduct during their periods of leadership:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;656&quot;&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;636&quot;&gt;&lt;p data-dcnode-id=&quot;655&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;653&quot;&gt;&lt;span data-dcnode-id=&quot;654&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;li data-dcnode-id=&quot;649&quot;&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;Building support and relationships - Seshan was working on the image of the ECI and gathering public support, and Gill later on used several similar tactics to win the cooperation of political leaders. “‘In my view ... the recognised political parties and the Election Commission are linked by an umbilical cord,' Gill said. ‘Neither can exist without the other.'” &lt;/span&gt;&lt;a data-dcnode-id=&quot;650&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//successfulsocieties.princeton.edu/sites/successfulsocieties/files/Policy_Note_ID154.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;651&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;p data-dcnode-id=&quot;648&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;646&quot;&gt;&lt;span data-dcnode-id=&quot;647&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;li data-dcnode-id=&quot;644&quot;&gt;&lt;span data-dcnode-id=&quot;645&quot; instrument_node=&quot;&quot;&gt;Recruiting and managing personnel - large number of election workers from central and state governments to monitor candidates and perform other election duties under the protection of the Representation of the People Acts.&lt;/span&gt;&lt;/li&gt;&lt;p data-dcnode-id=&quot;643&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;641&quot;&gt;&lt;span data-dcnode-id=&quot;642&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;li data-dcnode-id=&quot;639&quot;&gt;&lt;span data-dcnode-id=&quot;640&quot; instrument_node=&quot;&quot;&gt;Compliance by deploying observers - Seshan appointed special electoral officers to monitor compliance, which were further sent to each constituency by Gill.&lt;/span&gt;&lt;/li&gt;&lt;p data-dcnode-id=&quot;638&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;637&quot;&gt;&lt;/p&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;635&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;634&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;622&quot; id=&quot;the-challenge&quot;&gt;&lt;span data-dcnode-id=&quot;631&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;629&quot;&gt;&lt;span data-dcnode-id=&quot;630&quot; instrument_node=&quot;&quot;&gt;The challenge&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;628&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;626&quot;&gt;&lt;span data-dcnode-id=&quot;627&quot; instrument_node=&quot;&quot;&gt;Indian elections in the 1970s and 1980s, culminating in the election campaign of 1989, were characterised by increasing levels of negative campaigning, incendiary and often divisive speeches, and rioting and other forms violence. The electorate's splits along lines of caste, religion (in particular between Hindus and Muslims), language and locality were emphasised and used by politicians to spread discord and seek to win votes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;624&quot;&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;In 1990 there was agreement that reform was required in order to have more peaceful and orderly elections in future and that there had to be a formal basis for the parties' conduct during elections. However, there was much debate about whether the solution was a voluntary electoral code of conduct or whether such a code should be made mandatory by being enacted, in whole or in part, as legislation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;621&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;606&quot; id=&quot;public-impact&quot;&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;618&quot;&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;The public impact&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;612&quot;&gt;&lt;span data-dcnode-id=&quot;616&quot; instrument_node=&quot;&quot;&gt;The Model Code of Conduct was uncontroversial in its principles, the first of which was that “no party or candidate shall [indulge] in any activity which may aggravate existing differences or create mutual hatred or cause tension between different castes and communities, religious or linguistic.&quot; &lt;/span&gt;&lt;a data-dcnode-id=&quot;614&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//eci.nic.in/eci_main/MCC-ENGLISH_28022014.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;615&quot; instrument_node=&quot;&quot;&gt;[4]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;613&quot; instrument_node=&quot;&quot;&gt; Although it initially succeeded in mitigating some of the political misbehaviour, the more divisive and inventive candidates found ways around the code's requirements.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;608&quot;&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;However, by 2010 the code had “become an effective tool for shaping electoral tactics and the behaviour of political parties in India”. &lt;/span&gt;&lt;a data-dcnode-id=&quot;609&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//successfulsocieties.princeton.edu/sites/successfulsocieties/files/Policy_Note_ID154.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;610&quot; instrument_node=&quot;&quot;&gt;[5]&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;607&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;575&quot; id=&quot;stakeholder-engagement&quot;&gt;&lt;span data-dcnode-id=&quot;604&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;602&quot;&gt;&lt;span data-dcnode-id=&quot;603&quot; instrument_node=&quot;&quot;&gt;Stakeholder engagement&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;601&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;599&quot;&gt;&lt;span data-dcnode-id=&quot;600&quot; instrument_node=&quot;&quot;&gt;The main stakeholders were the chiefs of the ECI in the 1990s, Seshan and Gill, along with the government, particularly the Ministry of Law and Justice, other politicians, election observers and voters. Their focus was on getting the Model Code of Conduct accepted through various means:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;598&quot;&gt;&lt;/p&gt;&lt;ul data-dcnode-id=&quot;578&quot;&gt;&lt;p data-dcnode-id=&quot;597&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;595&quot;&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;li data-dcnode-id=&quot;591&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;Seshan chose to seek the support of the Indian electorate, and use their support to persuade politicians to observe the code. “Seshan's contribution to the process was significant. His adroit use of his civil service background and his forceful manner helped push the code into the public and political consciousness.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;592&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//successfulsocieties.princeton.edu/sites/successfulsocieties/files/Policy_Note_ID154.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;593&quot; instrument_node=&quot;&quot;&gt;[6]&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;p data-dcnode-id=&quot;590&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;588&quot;&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;li data-dcnode-id=&quot;586&quot;&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt;Gill shifted the emphasis to a cooperative approach with politicians, designed to create and sustain a working relationship between the parties and the ECI.&lt;/span&gt;&lt;/li&gt;&lt;p data-dcnode-id=&quot;585&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;583&quot;&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;/p&gt;&lt;li data-dcnode-id=&quot;581&quot;&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;The ECI's monitors (who were appointed by Seshan and Gill) collected evidence for them about electoral malpractice that prosecutors could use to prove such criminal charges in court.&lt;/span&gt;&lt;/li&gt;&lt;p data-dcnode-id=&quot;580&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;579&quot;&gt;&lt;/p&gt;&lt;/ul&gt;&lt;p data-dcnode-id=&quot;577&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;574&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;569&quot; id=&quot;political-commitment&quot;&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;571&quot;&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;Political commitment&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;570&quot; instrument_node=&quot;&quot;&gt;
            The government took a number of initiatives to control the violence that had erupted in elections before 1990. It recruited specialised and energetic civil servants to lead the ECI, and set up the Goswami Committee to make recommendations about reform. Even though there were several changes of government and of chiefs of the ECI, there was gradual progress towards the acceptance and observance of the code.
          &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;556&quot; id=&quot;public-confidence&quot;&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;565&quot;&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;Public confidence&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;560&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;“In 1989, when the newly elected government, seeking to consolidate alliances with caste-based political parties, tried to enforce the affirmative action recommendations, violence erupted as students and political groups protested.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;561&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//successfulsocieties.princeton.edu/sites/successfulsocieties/files/Policy_Note_ID154.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;562&quot; instrument_node=&quot;&quot;&gt;[7]&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;558&quot;&gt;&lt;span data-dcnode-id=&quot;559&quot; instrument_node=&quot;&quot;&gt;However, by 1995 a Times of India poll indicated that a majority of the respondents were in favour of Seshan's interpretation of the Model Code of Conduct, and backed his orders to disqualify candidates who engaged in disruptive practices.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;547&quot; id=&quot;clarity-of-objectives&quot;&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;552&quot;&gt;&lt;span data-dcnode-id=&quot;553&quot; instrument_node=&quot;&quot;&gt;Clarity of objectives&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;
            The objectives of Seshan, during the formative period following his appointment as chief of the ECI, were that “the code of conduct could be developed into an effective tool for dealing with fierce electoral competition in multicultural and multi-religious India”. &lt;/span&gt;&lt;a data-dcnode-id=&quot;549&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//successfulsocieties.princeton.edu/sites/successfulsocieties/files/Policy_Note_ID154.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;550&quot; instrument_node=&quot;&quot;&gt;[8]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt; These objectives were maintained by his successor, Gill, during his five-year tenure from 1996-2001. Their success would be measurable by a reduction in violence and malpractice during election campaigns, although the code was only one factor among many.
          &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;532&quot; id=&quot;strength-of-evidence&quot;&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;543&quot;&gt;&lt;span data-dcnode-id=&quot;544&quot; instrument_node=&quot;&quot;&gt;Strength of evidence&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;540&quot;&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;The content of the Model Code of Conduct was based on the electoral code of conduct that was passed in Kerala in 1960 for the Guidance of Political Parties and Candidates, to set rules for candidates during a close electoral race.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;536&quot;&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;“In 1960, an official in the state of Kerala drafted a Model Code of Conduct for the Guidance of Political Parties and Candidates, to set rules for candidates during a close electoral race. Among other aims, the code, in its final form, restricted the use of inflammatory language that could divide India's diverse electorate on the basis of caste, religion or region ... the ECI in 1962 adopted the Kerala document for national use, made a few changes, and circulated it during every election from that year onward.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;537&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//successfulsocieties.princeton.edu/sites/successfulsocieties/files/Policy_Note_ID154.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;[9]&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;534&quot;&gt;&lt;span data-dcnode-id=&quot;535&quot; instrument_node=&quot;&quot;&gt;The code was largely ignored from 1962 to 1990, principally because it lacked legal force. It was only when the level of violence became untenable that the government sought to enforce it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;514&quot; id=&quot;management&quot;&gt;&lt;span data-dcnode-id=&quot;530&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;528&quot;&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;Management&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;525&quot;&gt;&lt;span data-dcnode-id=&quot;526&quot; instrument_node=&quot;&quot;&gt;The chiefs of the ECI, in their different ways, gave the organisation a strong sense of direction and helped give force to the Model Code of Conduct:&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;523&quot;&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;The ECI recruited significant numbers of personnel from the state and central governments during elections.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;521&quot;&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt;Seshan appointed special election observers to check for incendiary campaign speeches, voter intimidation, vote-stealing and other tactics often associated with electoral violence.&amp;nbsp;Early in his tenure at the ECI, Seshan started recruiting larger numbers of election workers from central and state governments under the Representation of the People acts to monitor candidates and perform other election duties.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;516&quot;&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;“Seshan had not anticipated that a tragic political event would further his reform efforts during this time. While campaigning during the 1991 elections, Rajiv Gandhi, leader of the Congress party and a former prime minister, was assassinated.” &lt;/span&gt;&lt;a data-dcnode-id=&quot;518&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//successfulsocieties.princeton.edu/sites/successfulsocieties/files/Policy_Note_ID154.pdf&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;519&quot; instrument_node=&quot;&quot;&gt;[10]&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;517&quot; instrument_node=&quot;&quot;&gt; Gandhi's death shocked Indians and intensified their worries about political violence. It did, however, enable Seshan to implement many of his requests for additional personnel to monitor the electoral process.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;508&quot; id=&quot;measurement&quot;&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;510&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;Measurement&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;
            A large number of electoral officers were recruited under the supervision of Seshan to monitor electoral malpractice. They did so by inspecting publicity materials and candidates’ speeches and reporting on other campaign- and election-related problems. They were therefore observing the main indicator of success: reductions in the levels of violence and corruption during electoral campaigns.
          &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;js-page-section&quot; data-dcnode-id=&quot;502&quot; id=&quot;alignment&quot;&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;type-delta pt-10 pb-5&quot; data-dcnode-id=&quot;504&quot;&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;Alignment&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;503&quot; instrument_node=&quot;&quot;&gt;
            There was good alignment of interest between all the actors to create the impact, starting from the role of government in appointing the Goswami Committee to appointing Seshan and then Gill to head the ECI. They realised that reviving the Model Code of Conduct and making politicians observe it was a difficult task. They took care, therefore, to align their interests in with the Indian citizens and with the politicians themselves. They followed their individual roles in building relations by recruiting the necessary personnel and deploying observers to enforce the code.
          &lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;
