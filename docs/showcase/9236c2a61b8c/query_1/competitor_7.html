search-detail-middle-section__abstract&quot; data-dcnode-id=&quot;4093&quot; itemprop=&quot;description&quot;&gt;&lt;span data-dcnode-id=&quot;4094&quot; instrument_node=&quot;&quot;&gt;Implementation of the insurance-exchange and Medicaid-expansion provisions of the Affordable Care Act offers an opportunity
to analyze the sources and extent of state and federal government leverage in bargaining over the rollout of a major federal
program. What stands out from this study is state officials’ ability to leverage their administrative capacity and policy
expertise as well as their power to decline participation in federal programs in order to influence implementation of a federal
initiative. State officials’ influence is heightened when the program depends on state participation to achieve key federal
objectives, when state threats to decline participation are meaningful, and when state nonparticipation threatens the success

ng-none nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;3882&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3939&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip nova-legacy-c-tooltip--position-above-left nova-legacy-c-tooltip--elevation-none nova-legacy-c-tooltip--color-white nova-legacy-c-tooltip--spacing-m nova-legacy-c-tooltip--luminosity-medium nova-legacy-v-citation-item__context&quot; data-dcnode-id=&quot;3940&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__body&quot; data-dcnode-id=&quot;3941&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__body-content&quot; data-dcnode-id=&quot;3944&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;3945&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3946&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;3947&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3964&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;3965&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3966&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;3967&quot;&gt;&lt;span data-dcnode-id=&quot;3971&quot; instrument_node=&quot;&quot;&gt;... It has, therefore, fallen to the White House and the federal agencies to remake federal policy and find ways to expand Medicaid coverage. They have done so by using waivers to motivate recalcitrant states &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;3969&quot;&gt;&lt;span data-dcnode-id=&quot;3970&quot; instrument_node=&quot;&quot;&gt;(Dinan 2014;&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;3968&quot; instrument_node=&quot;&quot;&gt;Thompson and Gusmano 2014). Likewise, Congress did not intervene for many years after it became clear that no state would be able to satisfy NCLB's progress requirements, and the federal executive branch began to waive certain statutory requirements under agreements with individual states (Kurzweil 2015;Wong 2015).  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3956&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;3957&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3958&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;3959&quot;&gt;&lt;span data-dcnode-id=&quot;3963&quot; instrument_node=&quot;&quot;&gt;... First, recent waivers can fairly be attributed to the President and Executive Office of the President, rather than to federal agencies alone. The Centers for Medicare and Medicaid Services granted a variety of Medicaid waivers only after White House officials, including Senior Advisor Valerie Jarrett, negotiated directly with state governors &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;3961&quot;&gt;&lt;span data-dcnode-id=&quot;3962&quot; instrument_node=&quot;&quot;&gt;(Dinan 2014)&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;3960&quot; instrument_node=&quot;&quot;&gt;. The White House was also involved in the Department of Education's grants of NCLB waivers.  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3948&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;3949&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3950&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;3951&quot;&gt;&lt;span data-dcnode-id=&quot;3955&quot; instrument_node=&quot;&quot;&gt;... For example, although the ACA offers a binary choice of state or federal exchanges, the federal executive has collaborated with a number of states to create ''partnership'' exchanges. Facing state reluctance to assume all of the responsibilities of running an exchange and eager to have state assistance, the Department of Health and Human Services has reached agreements with a diverse group of states, including Arkansas, Delaware, Iowa, and Michigan, to establish a new hybrid form of exchange: The states handle discrete functions such as plan management or consumer assistance while the federal government handles the remaining functions &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;3953&quot;&gt;&lt;span data-dcnode-id=&quot;3954&quot; instrument_node=&quot;&quot;&gt;(Dinan 2014;&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;3952&quot; instrument_node=&quot;&quot;&gt;Jones, Bradley, and Oberlander 2014;Thompson and Gusmano 2014).  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body&quot; data-dcnode-id=&quot;3942&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow-tip&quot; data-dcnode-id=&quot;3943&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3883&quot;&gt;&lt;div class=&quot;nova-legacy-v-citation-item__context-source&quot; data-dcnode-id=&quot;3884&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item&quot; data-dcnode-id=&quot;3885&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__body&quot; data-dcnode-id=&quot;3900&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m&quot; data-dcnode-id=&quot;3901&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3935&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-2 nova-legacy-v-publication-item__title&quot; data-dcnode-id=&quot;3936&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;3937&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/303470070_The_President_and_the_States_Patterns_of_Contestation_and_Collaboration_under_Obama&quot;&gt;&lt;span data-dcnode-id=&quot;3938&quot; instrument_node=&quot;&quot;&gt;The President and the States: Patterns of Contestation and Collaboration under Obama&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3922&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta&quot; data-dcnode-id=&quot;3923&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-left&quot; data-dcnode-id=&quot;3932&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__type&quot; data-dcnode-id=&quot;3933&quot;&gt;&lt;span data-dcnode-id=&quot;3934&quot; instrument_node=&quot;&quot;&gt;Article&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-left&quot; data-dcnode-id=&quot;3929&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-medium nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-ghost nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__fulltext&quot; data-dcnode-id=&quot;3930&quot;&gt;&lt;span data-dcnode-id=&quot;3931&quot; instrument_node=&quot;&quot;&gt;Full-text available&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-right&quot; data-dcnode-id=&quot;3924&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;3925&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;3926&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;3927&quot;&gt;&lt;span data-dcnode-id=&quot;3928&quot; instrument_node=&quot;&quot;&gt;May 2016&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3906&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;3907&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;3917&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;3918&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Jessica-Bulman-Pozen-80919465&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;3919&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3920&quot;&gt;&lt;span data-dcnode-id=&quot;3921&quot; instrument_node=&quot;&quot;&gt;Jessica  Bulman-Pozen&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;3908&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;3909&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Gillian-Metzger&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;3910&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;3913&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;3914&quot;&gt;&lt;span data-dcnode-id=&quot;3916&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Gillian Metzger&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;3915&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/354469796696065-1461523593539_Q64/Gillian-Metzger.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3911&quot;&gt;&lt;span data-dcnode-id=&quot;3912&quot; instrument_node=&quot;&quot;&gt;Gillian Metzger&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3902&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3903&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badf80a lite-page-hidden&quot; data-dcnode-id=&quot;3904&quot;&gt;&lt;span data-dcnode-id=&quot;3905&quot; instrument_node=&quot;&quot;&gt;Current accounts portray President Obama’s tenure as dominated by executive policymaking and vigorous challenges from the
states. We argue that such accounts overlook how federal–state collaboration has been critical to achieving Obama Administration
ends. Partisan polarization has gridlocked Congress and made the President dependent on the states to advance his central
policy initiatives. As a result, these initiatives are both more responsive to state demands and more bipartisan than they
might appear. After exploring tools by which the President works with the states, we discuss implications for federalism,
the separation of powers, and partisan polarization. In particular, the state role in shaping federal regulation raises the
possibility that states are both aggrandizing and checking presidential power.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3886&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3887&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;3888&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;3889&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;3890&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3896&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;3897&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/303470070_The_President_and_the_States_Patterns_of_Contestation_and_Collaboration_under_Obama&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;3898&quot;&gt;&lt;span data-dcnode-id=&quot;3899&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3891&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-butt  Trump administration has been more than willing to take up these tools to limit and reverse the implementation of the ACA (Anderson &amp;amp; Shafer, 2019;Richardson, 2019;Thompson et al., 2018) and to reshape the Medicaid program by limiting enrollment and imposing work requirements (Haeder, 2019b;Richardson, 2019;Thompson et al., 2018).  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3864&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;3865&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3866&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;3867&quot;&gt;&lt;span data-dcnode-id=&quot;3871&quot; instrument_node=&quot;&quot;&gt;... Moreover, the effects of ideology and partisanship were sometimes mediated or even muted by other factors. A number of studies have shown that bureaucrats, particularly in the states, have played a crucial role in this regard (Callaghan &amp;amp; Jacobs, 2017;&lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;3869&quot;&gt;&lt;span data-dcnode-id=&quot;3870&quot; instrument_node=&quot;&quot;&gt;Dinan, 2014;&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;3868&quot; instrument_node=&quot;&quot;&gt;Haeder &amp;amp; Weimer, 2013;Rigby &amp;amp; Haselswerdt, 2013;. More recently, frustrated citizen have resorted to direct democracy efforts to overcome the partisan opposition in their statehouses and governor's mansions (Matsa &amp;amp; Miller, 2019;Richardson, 2019).  ...&lt rofile/Simon-Haeder&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;3834&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;3837&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;3838&quot;&gt;&lt;span data-dcnode-id=&quot;3840&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Simon F. Haeder&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;3839&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/277747034279941-1443231461757_Q64/Simon-Haeder.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3835&quot;&gt;&lt;span data-dcnode-id=&quot;3836&quot; instrument_node=&quot;&quot;&gt;Simon F. Haeder&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3826&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3827&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bade93c lite-page-hidden&quot; data-dcnode-id=&quot;3828&quot;&gt;&lt;span data-dcnode-id=&quot;3829&quot; instrument_node=&quot;&quot;&gt;Few laws have a profound and lasting impact on an entire political system. The Affordable Care Act (ACA), despite its incremental nature and bipartisan heritage, has been one of those remarkable landmarks. Even a decade after its passage, the political struggle is far from over, as the ACA is still facing near constant threats from the incumbent president, Congress, the courts, statehouses, attorneys general, and governors across the nation. How have political scientists responded to the continued struggle? This article provides an overview of the effects of health reform and the ACA on political science research since 2008. While political scientists have written much about the subject, coverage has been distinctly uneven within the discipline. Indeed, it has almost been entirely confined to scholars of public and health policy. Nonetheless, there have been important contributions across disciplinary fields. This article provides an overview of contributions embedded within the study of federalism, policy feedback effects, and political framing. It concludes by emphasizing the need for more engaged scholarship on health policy issues from across the entire discipline, and by highlighting other areas of study that could benefit from broader attention by political scientists.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3810&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3811&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;3812&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;3813&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;3814&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3820&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova- a-dcnode-id=&quot;3799&quot;&gt;&lt;span data-dcnode-id=&quot;3803&quot; instrument_node=&quot;&quot;&gt;... To obtain approval from the Centers for Medicare and Medicaid Services (CMS), all state health insurance exchanges have ''to perform certain activities, many of which fell within the core functions of eligibility and enrollment, plan management, and consumer assistance'' (GAO-13-601, 6-7) as well as financial management of the exchange. But, to induce resistant states to be involved in the exchanges, negotiation between states and DHHS resulted in hybrid forms such as a State Partnership Exchange (SPE), a Marketplace Plan Management (MPM), and other variants &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;3801&quot;&gt;&lt;span data-dcnode-id=&quot;3802&quot; instrument_node=&quot;&quot;&gt;(Dinan 2014;&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;3800&quot; instrument_node=&quot;&quot;&gt;Noh and Krane 2014). The multiple forms of health exchanges differ primarily in terms of which exchange functions a state decides to implement among the four core functions of eligibility and enrollment, plan management, consumer assistance, and financial management.  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3788&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside&quot; data-dcnode-id=&quot;3789&quot;&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3790&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body&quot; data-dcnode-id=&quot;3791&quot;&gt;&lt;span data-dcnode-id=&quot;3795&quot; instrument_node=&quot;&quot;&gt;... However, the interaction between states and the national government and the politics within each state redefined the role of states in the implementation of health exchanges. To induce reluctant or resistant states to participate in health exchanges, DHHS diversified types of health exchanges from only two forms to several forms such as an SPE, an MPM, and other variants &lt;/span&gt;&lt;mark class=&quot;nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow&quot; data-dcnode-id=&quot;3793&quot;&gt;&lt;span data-dcnode-id=&quot;3794&quot; instrument_node=&quot;&quot;&gt;(Dinan 2014)&lt;/span&gt;&lt;/mark&gt;&lt;span data-dcnode-id=&quot;3792&quot; instrument_node=&quot;&quot;&gt; which are characterized by different numbers of core functions a state decides to implement. Each state's choice of exchange (i.e., the number of core exchange functions implemented) varied according to political culture, political ideology, and state financial capacity, along with political configuration (Noh and Krane 2014).  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body&quot; data-dcnode-id=&quot;3782&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow-tip&quot; data-dcnode-id=&quot;3783&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3723&quot;&gt;&lt;div class=&quot;nova-legacy-v-citation-item__context-source&quot; data-dcnode-id=&quot;3724&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item&quot; data-dcnode-id=&quot;3725&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__body&quot; data-dcnode-id=&quot;3740&quot;&gt;&lt;div class=&quot;nova-legacy-v-publicatio &quot;3761&quot; instrument_node=&quot;&quot;&gt;Shihyun Noh&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;3748&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;3749&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Dale-Krane&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;3750&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;3753&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;3754&quot;&gt;&lt;span data-dcnode-id=&quot;3756&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Dale Krane&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;3755&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/276971738157057-1443046616291_Q64/Dale-Krane.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3751&quot;&gt;&lt;span data-dcnode-id=&quot;3752&quot; instrument_node=&quot;&quot;&gt;Dale Krane&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3742&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3743&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badf8d1 lite-page-hidden&quot; data-dcnode-id=&quot;3744&quot;&gt;&lt;span data-dcnode-id=&quot;3745&quot; instrument_node=&quot;&quot;&gt;Intense partisan conflict characterized the Affordable Care Act’s passage and continues to influence its implementation. The
Act granted state officials significant discretionary authority over the implementation of health insurance exchanges and
Medicaid expansion. Decisions by state officials vary from full state involvement to partial involvement to refusal to administer
a state health exchange or expand Medicaid. The federal government administers a health exchange in those states choosing
not to operate an exchange. The article examines whether variation in state program choices affects citizen decisions to enroll
in an exchange. Also examined is whether health insurance premiums vary by which level of government administers the exchange.
The analysis provides evidence that the Act’s goals of increased enrollment in health insurance and affordable premiums are
influenced by state government decisions on the extent of state involvement in health exchanges and Medicaid expansion.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3726&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3727&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;3728&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;3729&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;3730&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3736&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;3737&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/303096692_Implementing_the_Affordable_Care_Act_Health_Insurance_Exchanges_State_Government_Choices_and_Policy_Outcomes&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;3738&quot;&gt;&lt;span data-dcnode-id=&quot;3739&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3731&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-butt &gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3592&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;3593&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;3603&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;3604&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/A-Lee-Hannah-2098867213&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;3605&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3606&quot;&gt;&lt;span data-dcnode-id=&quot;3607&quot; instrument_node=&quot;&quot;&gt;A. Lee Hannah&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;3594&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;3595&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Daniel-Mallinson&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;3596&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;3599&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;3600&quot;&gt;&lt;span data-dcnode-id=&quot;3602&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Daniel J Mallinson&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;3601&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/578902990438400-1515032636787_Q64/Daniel-Mallinson.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3597&quot;&gt;&lt;span data-dcnode-id=&quot;3598&quot; instrument_node=&quot;&quot;&gt;Daniel J Mallinson&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3588&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3589&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badf2bf lite-page-hidden&quot; data-dcnode-id=&quot;3590&quot;&gt;&lt;span data-dcnode-id=&quot;3591&quot; instrument_node=&quot;&quot;&gt;en Diffusion research often characterizes the role of the federal government in innovation adoption as a supportive one, either increasing the likelihood of adoption or its speed. We examine the adoption of medical marijuana laws (MMLs) from 1996 to 2014 to shed light on what motivates states to adopt innovations that are in explicit defiance of federal law. Furthermore, we examine whether federal signals have any influence on the likelihood of adoption. In doing so, we utilize implementation theory to expand our understanding of how the federal government's position impacts state policy innovation adoption. We find mixed evidence for the influence of federal signals on the adoption of MMLs. The results suggest that medical marijuana policies are much more likely to be adopted in states when proponents have the political or institutional capital, rather than a medical or fiscal need. Moreover, this political capital is sufficient independent of the federal government's real or perceived position.

zh 扩散研究常认为联邦政府在创新采纳中扮演着支持的角色, 它不是提高了政策采纳的可能性, 就是加快了采纳的步伐。我们分析了1996年到2014年间的医用大麻法案, 以此来阐明是什么促使各州采纳那些明显违背联邦法律的创新。我们还分析了联邦的信号是否影响了政策采纳的可能性。借此, 我们利用政策执行理论来扩展我们对于联防政府的立场对于州政策创新影响的理解。我们发现联邦信号对于医用大麻法案采纳的影响复杂且模糊。结果表明, 医用大麻政策更可能被那些支持者们有政治或制度资源的州, 而非那些有医疗或财政需求的州所采纳。而且, 这些政治资源足够独立于联邦政府真实的或被感知的立场。&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3572&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3573&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;3574&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;3575&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;3576&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3582&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;3583&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/319308325_Defiant_Innovation_The_Adoption_of_Medical_Marijuana_Laws_in_the_American_States&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;3584&quot;&gt;&lt;span data-dcnode-id=&quot;3585&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&qu e-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;3510&quot;&gt;&lt;span data-dcnode-id=&quot;3512&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Timothy Callaghan&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;3511&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/554177139048448-1509137534513_Q64/Timothy-Callaghan.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3507&quot;&gt;&lt;span data-dcnode-id=&quot;3508&quot; instrument_node=&quot;&quot;&gt;Timothy Callaghan&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3498&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3499&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bade78d lite-page-hidden&quot; data-dcnode-id=&quot;3500&quot;&gt;&lt;span data-dcnode-id=&quot;3501&quot; instrument_node=&quot;&quot;&gt;Context: 
This article provides a detailed picture of the mindset of Americans about Medicaid work requirements and the important roles that perception of deservingness and racial bias play in public attitudes.

Methods: 
We conducted a large original survey to investigate public attitudes toward work requirements. We analyze the predictors of overall support for work requirements, correlates of who should be exempt from them, and attitudes towards work supports that make compliance with work requirements easier.

Findings: 
We find that public opinion is split relatively evenly when it comes to Medicaid work requirements in the abstract. When Americans are confronted with the complexities of issue, important nuances emerge. We find consistent evidence that support for work requirements is higher among conservatives, those who see Medicaid as a short-term program, and racially resentful non-Hispanic whites. We show that groups which have historically been framed as deserving like the disabled and seniors see high levels of support for their exemption. Finally, we find that Americans are supportive of policies providing individuals with help when transitioning into the workforce.

Conclusions: 
Americans' views of Medicaid and the populations it serves are complex and continue to be influenced by perceptions of deservingness and race.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3482&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3483&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;3484&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;3485&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;3486&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3492&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;3493&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/344342384_Lingering_Legacies_Public_Attitudes_about_Medicaid_Beneficiaries_and_Work_Requirements&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;3494&quot;&gt;&lt;span data-dcnode-id=&quot;3495&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3487&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-but heme-bare&quot; data-dcnode-id=&quot;3429&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Susan-Webb-Yackee-25624881&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;3430&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3431&quot;&gt;&lt;span data-dcnode-id=&quot;3432&quot; instrument_node=&quot;&quot;&gt;Susan Webb Yackee&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3422&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3423&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bade8fe lite-page-hidden&quot; data-dcnode-id=&quot;3424&quot;&gt;&lt;span data-dcnode-id=&quot;3425&quot; instrument_node=&quot;&quot;&gt;The Affordable Care Act (ACA) was signed into law a decade ago. Partisanship has limited the number of statutory changes, leaving the law mostly unchanged across the past 10 years. However, the ACA delegated vast powers to the executive branch, which opened the door for significant regulatory policy-making activities (also called “rulemaking”). We collected data on all regulatory actions related to the Affordable Care Act that have been taken since its passage to provide the first exploratory analyses of both the public law itself and the ensuing rulemaking activities. We also provide illustrative examples of two controversial issues: short-term limited-duration insurance plans and contraceptive coverage for women. Despite relative statutory stasis, regulatory actions have continued to shape the implementation of the Affordable Care Act. Both the Obama and Trump administrations have taken advantage of a vast delegation of policy-making power. Importantly, regulatory policy making holds the potential to yield significant changes depending on the policy goals of the presidential administration. Scholars, policy makers, and the public are well-advised to pay attention to ACA-related rulemaking activities. Moreover, “quasi-rulemaking” (i.e., the use of agency guidance as a policy tool) remains largely unexplored but could indicate an even greater regulatory enterprise than illustrated here.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3406&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3407&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;3408&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;3409&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;3410&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3416&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;3417&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/342487392_A_Look_Under_the_Hood_Regulatory_Polic .chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Marilyn-B-Tavenner-2172141243&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;3356&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3357&quot;&gt;&lt;span data-dcnode-id=&quot;3358&quot; instrument_node=&quot;&quot;&gt;Marilyn B. Tavenner&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3348&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3349&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badead7 lite-page-hidden&quot; data-dcnode-id=&quot;3350&quot;&gt;&lt;span data-dcnode-id=&quot;3351&quot; instrument_node=&quot;&quot;&gt;The federal bureaucracy played a critical role in implementing most aspects of the Affordable Care Act's private insurance coverage expansion. Through brief case studies, the authors review three dimensions of this role: the development of the Center for Consumer Information and Insurance Oversight, rulemaking in the formulation of the essential health benefits package, and the implementation of the federal website. They relate these to themes in the public administration literature. Politics—both through state decisions and through continuing congressional action (and inaction)—pervaded the implementation process. The challenges of staffing and situating the new bureaucracy effectively changed vertical boundaries within the Department of Health and Human Services, with long-lasting consequences. Finally, the complex design of the policy itself made passage of the legislation easier but implementation much more difficult. Ultimately, however, implementation was remarkably successful, achieving improvements in coverage consistent with the Congressional Budget Office's projections.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3332&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3333&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;3334&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;3335&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;3336&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3342&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;3343&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/340015988_The_Secretary_Shall_Implementing_the_Affordable_Care_Act%27s_Private_Insurance_Expansions&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;3344&quot;&gt;&lt;span data-dcnode-id=&quot;3345&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3337&quot;&gt;&lt;button class=&quot;n ues, on 16 th December 2014, CNBC reported the enrolment of 2.466 million of people since 15 th November. 41 The implications of Medicaid non-expansion have been discussed above in the analysis of the Sebelius compromise and it is worth repeating that the coverage gap remains the major issue for the social sustainability of the reform as it does not allow the creation of a uniform, equal, and quasi-universal health care system.  ...&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body&quot; data-dcnode-id=&quot;3312&quot;&gt;&lt;div class=&quot;nova-legacy-c-tooltip__arrow-tip&quot; data-dcnode-id=&quot;3313&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-o-stack__item&quot; data-dcnode-id=&quot;3258&quot;&gt;&lt;div class=&quot;nova-legacy-v-citation-item__context-source&quot; data-dcnode-id=&quot;3259&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item&quot; data-dcnode-id=&quot;3260&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__body&quot; data-dcnode-id=&quot;3275&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m&quot; data-dcnode-id=&quot;3276&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3305&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-2 nova-legacy-v-publication-item__title&quot; data-dcnode-id=&quot;3306&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;3307&quot; href=&quot;https://chatnoir-webcontent. acy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;3296&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;3297&quot;&gt;&lt;span data-dcnode-id=&quot;3298&quot; instrument_node=&quot;&quot;&gt;Jan 2016&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3281&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;3282&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;3283&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;3284&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Ilaria-Di-Gioia&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;3285&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;3288&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;3289&quot;&gt;&lt;span data-dcnode-id=&quot;3291&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Ilaria Di Gioia&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;3290&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/966464190308353-1607434427320_Q64/Ilaria-Di-Gioia.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3286&quot;&gt;&lt;span data-dcnode-id=&quot;3287&quot; instrument_node=&quot;&quot;&gt;Ilaria Di Gioia&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3277&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3278&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badf90f lite-page-hidden&quot; data-dcnode-id=&quot;3279&quot;&gt;&lt;span data-dcnode-id=&quot;3280&quot; instrument_node=&quot;&quot;&gt;Universal health care coverage has long been seen as an unattainable goal for Americans. With the Affordable Care Act, the Obama administration addressed the issue with a complex system of mandates, subsidies, and state marketplaces. The implementation of the reform encountered many obstacles including legal challenges, a congressional shut down, system failure, and, recently, a growing number of state legislatures (23 to date) enacting measures to nullify or opt out of the reform. This paper examines the resistance to the Act in two interrelated dimensions: legal challenges and state legislative opposition. These two dimensions of resistance are explored in order to speculate on the legal and political sustainability of the reform. Ultimately, the discussion on the sustainability of health care reform sheds considerable light on the broader sustainability of federal intervention in social policies (gun control, abortion, immigration, death penalty, drug control).&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3261&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3262&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-le e=&quot;&quot;&gt;Shihyun Noh&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3213&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3214&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badf5f0 lite-page-hidden&quot; data-dcnode-id=&quot;3215&quot;&gt;&lt;span data-dcnode-id=&quot;3216&quot; instrument_node=&quot;&quot;&gt;Initial state implementation of the Affordable Care Act health exchanges was marked by political polarization. More than half of the states initially chose not to create their own health exchanges, leading the federal government to adopt a new strategy: dividing the implementation of health exchanges into a series of smaller tasks. States could choose which of four core functions of the exchanges they would implement, with the federal government handling the remaining functions. This strategy induced some resistant states to administer some core functions. Why did some states take part in the exchanges while others did not? Ordered logistic regression analyses provide evidence that both state political context and other factors affected this decision. The analyses also suggest that state officials considered state workforce capacity and financial inducements from the federal government and that they were influenced by divided government.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3197&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3198&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy -dcnode-id=&quot;3151&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badfa45 lite-page-hidden&quot; data-dcnode-id=&quot;3152&quot;&gt;&lt;span data-dcnode-id=&quot;3153&quot; instrument_node=&quot;&quot;&gt;Much has been written in the popular press and academic journals about the Affordable Care Act (ACA). It has been characterized by its supporters as the biggest expansion of coverage since the Great Society, and by its detractors as government overreach and socialism. Even aft er the president’s signature, two major Supreme Court verdicts upholding essential features, and the president’s reelection, political opposition to the ACA, almost exclusively confined to Republicans, has shown few signs of abating. Unfortunately, the often shallow public debate about the ACA largely ignores the historical context of the American grant-in-aid system, its evolutionary nature, and its crucial role in expanding access to health care. We seek to remedy this lack of context by providing an overview of the development of the U.S. grant system, focused on health-care-related programs, from the earliest days of the Republic to the ACA. We argue that much of relevance to understanding the current controversy and predicting how it will play out over time can be learned from this history. It follows a large number of works assessing the development of the American welfare state. However, it significantly differs from previous works by focusing exclusively on programs of shared governance; that is, programs jointly implemented and administered by federal and state governments. Additionally, it differs in its emphasis by exclusively focusing on health-care-related programs.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3134&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3135&quot;&gt;&lt;div class=&quot;nova =&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3104&quot;&gt;&lt;span data-dcnode-id=&quot;3105&quot; instrument_node=&quot;&quot;&gt;Gillian Metzger&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3095&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3096&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badf948 lite-page-hidden&quot; data-dcnode-id=&quot;3097&quot;&gt;&lt;span data-dcnode-id=&quot;3098&quot; instrument_node=&quot;&quot;&gt;Administrative agencies are strikingly absent from leading accounts of contemporary polarization. To the extent they appear, it is largely as acted-upon entities that bear the fall out from the congressional-presidential confrontations that polarization fuels, or as the tools of presidential unilateralism. This failure to incorporate administrative agencies into polarization accounts is a major omission. Agencies possess broad grants of preexisting authority that they can use to reshape governing policy and law, often at presidential instigation, thereby puttingpressure on Congress to respond. In theprocess, they can construct new alliances and arrangements that have the potential to break through partisan divides and alter the political landscape. This Essay, written in honor of Peter Strauss, aims to deepen current understanding of the relationship between administrative agencies and political polarization. Using Professor Strauss’s insight that agencies exist in a web of control relationships as a launching point, the Essay probes how polarization affects these control relationships and the extent to which agencies can develop policy and potentially reshape partisan divides. Yet focusing simply on the forces empoweringor constraining agencies at the federal level misses the critical element of state participation in federal programs and federal regulation. Such state involvement injects a political edge into program implementation and provides a potential mechanism for checking executive branch unilateralism at the same time that it opens up opportunities for bipartisanship. After setting out a conceptual account of the relationship between agencies, polarization, and the states, the Essay examines implementation of the Affordable Care Act (ACA) to assess how these complicated dynamics operate in practice.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3079&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3080&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;3081&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;3082&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;3083&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3089&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;3090&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw2 s=&quot;lite-image&quot; data-dcnode-id=&quot;3057&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/273840962011137-1442300181067_Q64/Daniel-Farber-4.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;3053&quot;&gt;&lt;span data-dcnode-id=&quot;3054&quot; instrument_node=&quot;&quot;&gt;Daniel L Farber&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;3044&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;3045&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badf6b8 lite-page-hidden&quot; data-dcnode-id=&quot;3046&quot;&gt;&lt;span data-dcnode-id=&quot;3047&quot; instrument_node=&quot;&quot;&gt;Deadlines are a ubiquitous feature of lawmaking in contexts such diverse settings as agency rulemakings, federal appropriations, and international negotiations. Despite the expectation that these deadlines will drive conflicting parties toward agreement or overcome bureaucratic inertia, their impact on decision making is mixed, often producing only modest improvements in speed, and perhaps sometimes none at all. On the downside, deadlines can sometimes reduce the quality of decisions or encourage brinksmanship when missing a deadline would have draconian consequences. If there is a case for deadlines, then, it is an uneasy one. Game theory suggests some possibilities for to increase the effectiveness of deadlines as action-forcing strategies, such as improving information sharing between actors and providing enforcement mechanisms for negotiated outcomes.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;3028&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;3029&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;3030&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;3031&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;3032&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3038&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;3039&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/314694463_Racing_the_Clock_Deadlines_Conflict_and_Negotiation_in_Lawmaking&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;3040&quot;&gt;&lt;span data-dcnode-id=&quot;3041&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;3033&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-bl e state had the capacity necessary to put a program in place. The federal government wanted some type of expansion in a Southern state; Arkansas wanted to do it &quot;their way.&quot; Also key to the Arkansas case is the persistence and shared vision of the federal and state actors who in the end trusted each other and produced a policy both were proud of.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2971&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2972&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2973&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2974&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;2975&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;2981&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;2982&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/319093074_Intergovernmental_Negotiation_in_Medicaid_Arkansas_and_the_Premium_Assistance_Waiver&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;2983&quot;&gt;&lt;span data-dcnode-id=&quot;2984&quot; instrument_node=&quot;&qu lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;2954&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;2955&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;2956&quot;&gt;&lt;span data-dcnode-id=&quot;2957&quot; instrument_node=&quot;&quot;&gt;Jul 2017&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2944&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;2945&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;2946&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;2947&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Jennifer-M-Jensen-2131732636&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;2948&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2949&quot;&gt;&lt;span data-dcnode-id=&quot;2950&quot; instrument_node=&quot;&quot;&gt;Jennifer M. Jensen&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2940&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2941&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badf3cf lite-page-hidden&quot; data-dcnode-id=&quot;2942&quot;&gt;&lt;span data-dcnode-id=&quot;2943&quot; instrument_node=&quot;&quot;&gt;Governors have always had to balance state interests with political party interests. However, governors' role in the federal arena, which historically has had a significant bipartisan element, has shifted somewhat, today placing a greater emphasis on party interests. This change is one of the degree; it is less a sea change than a change in the salinity of the sea. I provide evidence of this move to more partisan behavior and explore two sets of interrelated factors that have influenced this change: party polarization in Congress and state legislatures and among voters, and the structure, activities and influence of the National Governors Association, Democratic Governors Association, and Republican Governors Association. This article represents an initial effort to tease out some of the varied causal effects and establish a framework for scholars to further explore the dual gubernatorial responsibilities of advancing state interests and party interests.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2924&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2925&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2926&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2927&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publica
