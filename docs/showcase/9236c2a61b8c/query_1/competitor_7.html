ractious Federalism” in the Statehouse and Ballot Box&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2904&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta&quot; data-dcnode-id=&quot;2905&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-left&quot; data-dcnode-id=&quot;2911&quot;&gt;&lt;span class=&quot;nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__type&quot; data-dcnode-id=&quot;2912&quot;&gt;&lt;span data-dcnode-id=&quot;2913&quot; instrument_node=&quot;&quot;&gt;Article&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__meta-right&quot; data-dcnode-id=&quot;2906&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data&quot; data-dcnode-id=&quot;2907&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item&quot; data-dcnode-id=&quot;2908&quot;&gt;&lt;span class=&quot;&quot; data-dcnode-id=&quot;2909&quot;&gt;&lt;span data-dcnode-id=&quot;2910&quot; instrument_node=&quot;&quot;&gt;Jul 2021&lt;/span&gt;&lt;/span&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2897&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;2898&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;2899&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;2900&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Jake-Haselswerdt-80988376&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;2901&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2902&quot;&gt;&lt;span data-dcnode-id=&quot;2903&quot; instrument_node=&quot;&quot;&gt;Jake Haselswerdt&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2893&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2894&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bade5cb lite-page-hidden&quot; data-dcnode-id=&quot;2895&quot;&gt;&lt;span data-dcnode-id=&quot;2896&quot; instrument_node=&quot;&quot;&gt;Partisan and ideological polarization have been major barriers to the implementation of the Affordable Care Act’s Medicaid expansion in Republican-controlled states. Scholars have referred to this situation as “fractious federalism,” with Republican state policymakers toeing the national party line in refusing to cooperate with a major policy initiative. In some cases, however, diverse advocacy coalitions have overcome fractious federalism to pass expansion legislation in deeply Republican states. More recently, such coalitions have resorted to ballot initiative campaigns as another means of overcoming such polarization, and won impressive victories in a series of “deep red” states. Drawing on forty-four interviews with people involved in expansion advocacy in eleven states, I report important insights on the formation and activities of these coalitions in both the legislative and ballot initiative eras of Medicaid expansion politics.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2877&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2878&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2879&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2880&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;2881&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;2887&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;2888&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/353479879_Advocating_for_Medicaid_Expansion_in_Republican_States_Overcoming_Fractious_Federalism_in_the_Statehouse_and_Ballot_Box&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;2889&quot;&gt;&lt;span data-dcnode-id=&quot;2890&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;2882&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-leg 50&quot;&gt;&lt;span data-dcnode-id=&quot;2851&quot; instrument_node=&quot;&quot;&gt;Matthew J Uttermark&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2841&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2842&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93badf176 lite-page-hidden&quot; data-dcnode-id=&quot;2843&quot;&gt;&lt;span data-dcnode-id=&quot;2844&quot; instrument_node=&quot;&quot;&gt;Intergovernmental health policy has seen centralization and decentralization over the past forty years. The negotiations—and who wins and who loses—often depend on politics more than rational sorting of intergovernmental responsibilities. As in other policies, politics often trumps health policy—even where governors and state legislatures are of the same party as national leadership. Political rhetoric in 2017 once again calls for a larger role for states in possible reform of the nation’s health system, but nation-centered federalism persists. Congressional inaction, executive uncertainty, and partisan polarization can provide states the opportunity for leadership and innovation in health policy.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2825&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2826&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2827&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publicat -id=&quot;2799&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;2800&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;2801&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/John-Dinan-20164236&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;2802&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2803&quot;&gt;&lt;span data-dcnode-id=&quot;2804&quot; instrument_node=&quot;&quot;&gt;John Dinan&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2794&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2795&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bade661 lite-page-hidden&quot; data-dcnode-id=&quot;2796&quot;&gt;&lt;span data-dcnode-id=&quot;2797&quot; instrument_node=&quot;&quot;&gt;State officials have challenged a number of federal policies during the Trump administration. In this article, I chronicle and categorize the tools that states have employed in resisting federal policies and show that states have relied primarily on three tactics: filing lawsuits, declining participation in federal programs, and passing policies inconsistent with federal policies. I also explain why state resistance has become such a prominent feature of U.S. politics. State challenges to federal policies are rooted in part in competing partisan perspectives, whereby members of the minority party at the federal level launch challenges from state offices that they control. State challenges are also grounded in contrasting intergovernmental perspectives, in that state officials who lack meaningful input in the passage of federal policies seek to challenge and shape these polices after they are enacted. In general, state resistance to federal policies during the Trump administration reflects continuity with state activity during other recent administrations and in a way that signals the institutionalization of state resistance to federal directives.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2778&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2779&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2780&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2781&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;2782&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;2788&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;2789&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/347128076_The_Institutionalization_of_State_Resistance_to_Federal_Directives_in_the_21st_Century&quot;&gt; s and partial success of Congress in repealing the Affordable Care Act (ACA), known as Obamacare, with particular attention to lobbying by governors. Most Republican governors behaved as members of a vertical partisan coalition supporting the national party rather than defending insurance coverage in their states. But the activities of a significant minority of these governors impeded ACA retrenchment. We also examine the role of executive federalism, highlighting how state responses to Trump administrative initiatives affected ACA durability. The Trump administration drew on waivers, executive orders, funding decisions, administrative rules, the social media, and other executive branch tools to sabotage the health insurance exchanges and undercut Medicaid. As of 2018, the Trump administration actions had contributed to some erosion in exchange coverage, but far less than many had anticipated. The degree to which Medicaid waivers encouraged by the Trump administration will precipitate enrollment declines in that program remains to be seen.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2709&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2710&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2711&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2712&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;2713&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;2719& e-id=&quot;2477&quot; instrument_node=&quot;&quot;&gt;The U.S. Supreme Court’s decision to grant states the authority to reject Medicaid expansion under the Affordable Care Act without penalty threatened the implementation of this polarized health policy. While many Republican-controlled states followed their national allies and rejected Medicaid expansion, others engaged in bipartisan implementation. Why were some Republican states willing to reject the national partisan agenda and cooperate with Democrats in Washington? I focus on the role of electoral competition within states. I conclude that although electoral competition has been shown to encourage partisan polarization within the states, the combination of intergovernmental implementation and Medicaid expansion’s association with public welfare reverses this dynamic. I employ a Cox proportional-hazards model to examine the impact of state partisan ideology and competition on the likelihood of state Medicaid expansion. I find that strong inter-party competition mitigates the impact of more extreme partisan ideologies, encouraging potentially bipartisan negotiation with the federal administration.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2458&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2459&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2460&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2461&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data- st__item&quot; data-dcnode-id=&quot;2429&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;2430&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Lilliard-Richardson-2&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;2431&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;2434&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;2435&quot;&gt;&lt;span data-dcnode-id=&quot;2437&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Lilliard Richardson&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;2436&quot; data-src=&quot;https://i1.rgstatic.net/ii/profile.image/948424530735104-1603133437866_Q64/Lilliard-Richardson-2.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;2432&quot;&gt;&lt;span data-dcnode-id=&quot;2433&quot; instrument_node=&quot;&quot;&gt;Lilliard Richardson&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;2423&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;2424&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bade6b0 lite-page-hidden&quot; data-dcnode-id=&quot;2425&quot;&gt;&lt;span data-dcnode-id=&quot;2426&quot; instrument_node=&quot;&quot;&gt;This article assesses developments in the first two years of the Trump presidency regarding implementation of the Affordable Care Act (ACA), with a focus on Medicaid policy. Trump administration officials relied on executive actions to chip away at various elements of the ACA and encouraged and granted state requests for waivers allowing work-requirements and other personal-responsibility rules for Medicaid beneficiaries. Governors and state attorneys general were actively involved in lawsuits that led to several federal court rulings blocking implementation of Medicaid work requirements as well as a ruling that re-opened the legitimacy of the entire ACA. Citizens and interest groups had a major impact at the ballot box by approving several ballot measures that expanded Medicaid in states where expansion was opposed by elected officials. These developments demonstrate how policy adjustments and disputes are worked out in the U.S. federal system in a polarized era, with Congress essentially a bystander and other institutions and actors coming to the fore and resulting in variable speed federalism characterized by different partisan trajectories of state implementation of national policies.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2407&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2408&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2409&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2410&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publi . separation-of-powers system has elevated the importance of the administrative
presidency. However, research on this topic has paid scant attention to federal policies that rely on the states to implement
them. We seek to advance knowledge of the administrative presidency under conditions of fractious federalism by examining
the nature and efficacy of the Obama administration’s efforts to secure state cooperation in implementing the Affordable Care
Act (ACA). This law sought to assure that nearly all Americans would have health insurance. Despite strong partisan, ideological
pressures on Republican policy makers in the states to refrain from implementing the ACA, the Obama administration has had
some initial success in overcoming their resistance. Waivers have been a particularly valuable presidential tool.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;2014&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;2015&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;2016&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;2017&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;2018&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;2024&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;2025&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/261511970_The_Administrative_Presidency_and_Fractious_Federalism_The_Case_of_Obamacare&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;2026&quot;&gt;&lt;span data-dcnode-id=&quot;2027&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;2019&quot;&gt;&lt;button class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button- dcnode-id=&quot;1975&quot;&gt;&lt;span data-dcnode-id=&quot;1976&quot; instrument_node=&quot;&quot;&gt;David L. Weimer&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1966&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1967&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bae0371 lite-page-hidden&quot; data-dcnode-id=&quot;1968&quot;&gt;&lt;span data-dcnode-id=&quot;1969&quot; instrument_node=&quot;&quot;&gt;The Patient Protection and Affordable Care Act (ACA) of 2010 has been one of the most controversial laws in decades. The ACA relies extensively on the cooperation of states for its implementation, offering opportunities for both local adaptation and political roadblocks. Health insurance exchanges are one of the most important components of the ACA for achieving its goal of near-universal coverage. Despite significant financial support from the federal government, many governors and legislatures have taken actions that have blocked or delayed significant progress in developing their exchanges. However, many state commissioners of insurance have played constructive roles in moving states forward in exchange planning through their expertise, leadership, and pragmatism, sometimes in spite of strong political opposition to the ACA from governors and legislatures.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1950&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1951&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m no -V-Bradley-2035618385&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1918&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1919&quot;&gt;&lt;span data-dcnode-id=&quot;1920&quot; instrument_node=&quot;&quot;&gt;Katharine W V Bradley&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1911&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1912&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Jonathan-Oberlander-39672546&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1913&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1914&quot;&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt;Jonathan Oberlander&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1905&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1906&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bae058d lite-page-hidden&quot; data-dcnode-id=&quot;1907&quot;&gt;&lt;span data-dcnode-id=&quot;1908&quot; instrument_node=&quot;&quot;&gt;Enactment of the Affordable Care Act (ACA) created a dilemma for Republican policy makers at the state level. States could maximize control over decision making and avoid federal intervention by establishing their own health insurance exchanges. Yet GOP leaders feared that creating exchanges would entrench a law they intensely opposed and undermine legal challenges to the ACA. Republicans' calculations were further complicated by uncertainty over the Supreme Court's ruling on the ACA's constitutionality and the outcome of the November 2012 elections. In the first year of operation, only seventeen states and the District of Columbia chose to design and implement their own exchanges; another seven chose to partner with the federal government, and twenty-six states ceded control to Washington. Out of thirty states with Republican governors in 2013, only four chose to launch their own exchange. Why did many Republican-led states that initially appeared open to establishing exchanges ultimately reverse course? Drawing on interviews with state policy makers and secondary data, we trace the evolution of Republican responses to the exchange dilemma during 2010-13. We explore how exchanges became controversial and explain why so few Republican-led states opted for their own exchange, focusing on the intensifying resistance to Obamacare amid a rightward shift in state politics, partisan polarization, and uncertainty over the ACA's fate.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1889&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1890&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1891&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1892&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot &gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1858&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1859&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1860&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1861&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Samuel-R-Bagenstos-2029121449&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1862&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1863&quot;&gt;&lt;span data-dcnode-id=&quot;1864&quot; instrument_node=&quot;&quot;&gt;Samuel R. Bagenstos&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1854&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1855&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bae06a0 lite-page-hidden&quot; data-dcnode-id=&quot;1856&quot;&gt;&lt;span data-dcnode-id=&quot;1857&quot; instrument_node=&quot;&quot;&gt;This article offers an initial assessment of the Supreme Court’s Spending Clause holding in National Federation of Independent Business v. Sebelius, which addressed the constitutional challenge to the Affordable Care Act. As Justice Ginsburg pointed out, NFIB marks “the first time ever” that the Court has held that a spending condition unconstitutionally coerced the states. The implications of that holding are potentially massive, and some of the language in the decision, if read broadly, would seriously threaten the constitutionality of a broad swath of federal spending legislation. Notwithstanding some of the Court’s language, this article contends that the case is not best read as rendering federal spending conditions unconstitutional simply because they are attached to large amounts of federal money, change the terms of participation in entrenched cooperative programs, or tie together separate programs into a package deal. Rather Chief Justice Roberts’s pivotal opinion is best read as adopting an “anti-leveraging principle” that will find coercion only where all three of these conditions are present at the same time. The anti-leveraging principle both makes the most sense of what the Chief Justice actually said in NFIB and does a better job of accommodating the relevant constitutional values than do alternative readings of the case. Although that principle threatens the constitutionality of far fewer conditional-spending laws than do those alternative readings, it raises challenging questions about the constitutionality of certain spending conditions. And it gives states an important new tool in negotiations with federal administrators.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1838&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1839&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1840&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1841&quot;&gt;&lt;div class=&quot;nova- va-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1765&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bae0842 lite-page-hidden&quot; data-dcnode-id=&quot;1766&quot;&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt;States played a prominent role in policy-making in 2007–2008 in several respects. States were more successful in securing
relief from federal directives regarding the National Guard, homeland security, education, and welfare than in any prior year
in the Bush presidency; they were unable to fend off several new mandates, however, particularly concerning the State Children's
Health Insurance Program. States also continued to be the primary innovators in areas such as immigration, environmental protection,
and health care, although they encountered new constraints in the form of federal court challenges and agency rulings. The
Supreme Court made no notable contributions to the post-1992 decisions that initially curbed and recently deferred to federal
power; however, several rulings interpreting federal statutes and reviewing state acts had important federalism implications.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1748&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1749&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1750&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1751&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1752&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1758&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1759&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/249286473_The_State_of_American_Federalism_2007-2008_Resurgent_State_Influence_in_the_National_Policy_Process_and_Continued_State_Policy_Innovation&quot;&gt;&lt;span class=&quot;nova-legacy-c-button__label&quot; data-dcnode-id=&quot;1760&quot;&gt;&lt;span data-dcnode-id=&quot;1761&quot; instrument_node=&quot;&quot;&gt;View&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1753&quot;&gt;&lt;button class=&quot;nova &lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1714&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1715&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Heather-K-Gerken-80884416&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1716&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1717&quot;&gt;&lt;span data-dcnode-id=&quot;1718&quot; instrument_node=&quot;&quot;&gt;Heather K. Gerken&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1708&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1709&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bae0a69 lite-page-hidden&quot; data-dcnode-id=&quot;1710&quot;&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;This Essay addresses a gap in the federalism literature. Scholars have offered two distinct visions of federal-state relations. The first depicts states as rivals and challengers to the federal government, roles they play by virtue of being autonomous policymakers outside the federal system. A second vision is offered by scholars of cooperative federalism, who argue that in most areas states serve not as autonomous outsiders, but supportive insiders—servants and allies carrying out federal policy. Legal scholarship has not connected these competing visions to consider how the state’s status as servant, insider, and ally might enable it to be a sometime dissenter, rival, and challenger. The literature has not developed a vocabulary for describing how states use regulatory power conferred by the government to resist federal policy, let alone a full account of the implications of this practice. It has thus neglected the possibilities associated with what we call “uncooperative federalism.” In this Essay, we provide an initial descriptive and normative account of this undertheorized aspect of our federalism. We also explore what a strong commitment to uncooperative federalism would mean for the doctrines on commandeering and preemption, offering some counterintuitive conclusions about the ways in which weakening the protections for state autonomy might push states to engage in stronger forms of dissent.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1692&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1693&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1694&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1695&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1696&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1702&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__a Act (PPACA) in federal court. Their principal claims are that the PPACA's regulation of the states violates their independent
sovereignty, and that the Act's minimum coverage requirement exceeds Congress's enumerated powers. This litigation is immensely
important, as it concerns a hugely significant statute and raises fundamental questions of constitutional federalism. This
article offers a detailed description of the claims raised by the states and analyzes their plausibility under current law.

t;1615&quot;&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt;John Dinan&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1606&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1607&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bae0e06 lite-page-hidden&quot; data-dcnode-id=&quot;1608&quot;&gt;&lt;span data-dcnode-id=&quot;1609&quot; instrument_node=&quot;&quot;&gt;The Patient Protection and Affordable Care Act has significant implications for state governments and its passage presents an opportunity to contribute to inquiries into ways that state officials wield influence in the national legislative process. State officials were occasionally influential when they drew on state experience and expertise and congress members were willing to benefit from this knowledge. State officials were also influential when a member of their congressional delegation was in a position to cast a pivotal vote on the bill and willing to withhold support unless state interests were addressed. State officials were also influential when they elevated their concerns in the public consciousness to the point that the bill's supporters were forced to accommodate them or risk the bill's defeat. Copyright 2011, Oxford University Press.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1590&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1591&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto no t; data-dcnode-id=&quot;1554&quot;&gt;&lt;ul class=&quot;nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list&quot; data-dcnode-id=&quot;1555&quot;&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1565&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1566&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/Frank-J-Thompson-79528154&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1567&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1568&quot;&gt;&lt;span data-dcnode-id=&quot;1569&quot; instrument_node=&quot;&quot;&gt;Frank J. Thompson&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;nova-legacy-e-list__item&quot; data-dcnode-id=&quot;1556&quot;&gt;&lt;a class=&quot;nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare&quot; data-dcnode-id=&quot;1557&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/profile/Courtney-Burke-2&quot;&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item&quot; data-dcnode-id=&quot;1558&quot;&gt;&lt;span class=&quot;lite-person-inline-item__image&quot; data-dcnode-id=&quot;1561&quot;&gt;&lt;picture class=&quot;lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full&quot; data-dcnode-id=&quot;1562&quot;&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;img alt=&quot;Courtney Burke&quot; class=&quot;lite-image&quot; data-dcnode-id=&quot;1563&quot; data-src=&quot;https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg&quot; src=&quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==&quot;&gt;&lt;/picture&gt;&lt;/span&gt;&lt;span class=&quot;nova-legacy-v-person-inline-item__fullname&quot; data-dcnode-id=&quot;1559&quot;&gt;&lt;span data-dcnode-id=&quot;1560&quot; instrument_node=&quot;&quot;&gt;Courtney Burke&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div class=&quot;nova-legacy-v-publication-item__stack-item&quot; data-dcnode-id=&quot;1550&quot;&gt;&lt;div class=&quot;nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description&quot; data-dcnode-id=&quot;1551&quot;&gt;&lt;span class=&quot;js-target-abstract-626d93bae0f34 lite-page-hidden&quot; data-dcnode-id=&quot;1552&quot;&gt;&lt;span data-dcnode-id=&quot;1553&quot; instrument_node=&quot;&quot;&gt;Executive federalism emphasizes collaboration between the executive branches at the national and state levels to transform grant programs through the implementation process. In this regard, Medicaid demonstration waivers loomed large during the presidencies of Bill Clinton and George W. Bush. This article documents and compares the volume and substance of section 1115 Medicaid waiver activity under the two presidencies. From the perspective of policy performance, Medicaid demonstration waivers provide modest support for the view that states serve as laboratories for policy learning in the health care arena. More broadly, the waivers have not yielded a major solution to the problem of the uninsured and are unlikely to do so. At the same time, they have not (as some have suggested) been a subterranean force for the erosion of Medicaid. To the contrary, these waivers have often enhanced health services for low-income people; above all, they have helped preserve Medicaid as an entitlement by undercutting support for those seeking to convert the program into a block grant. From the perspective of the democratic process, we find that Congress has been a more significant player in shaping waivers than the executive federalism model suggests. While the decision processes surrounding Medicaid waivers often fall short of democratic standards with respect to transparency and opportunities for public input, they still compare favorably to certain alternatives.&lt;/span&gt;&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;footer class=&quot;nova-legacy-v-publication-item__footer&quot; data-dcnode-id=&quot;1534&quot;&gt;&lt;div class=&quot;nova-legacy-v-publication-item__footer-actions&quot; data-dcnode-id=&quot;1535&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle&quot; data-dcnode-id=&quot;1536&quot;&gt;&lt;div class=&quot;nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group&quot; data-dcnode-id=&quot;1537&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions&quot; data-dcnode-id=&quot;1538&quot;&gt;&lt;div class=&quot;nova-legacy-c-button-group__item&quot; data-dcnode-id=&quot;1544&quot;&gt;&lt;a class=&quot;nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action&quot; data-dcnode-id=&quot;1545&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/publication/5847099_Executive_Federalism_and_Medicaid_Demonstration_Waivers_Implications_for_Policy_and_Democratic_Process&quot;&gt;&lt;span class=&quot;nov
