&lt;/span&gt;&lt;div class=&quot;reading-width stack&quot; data-dcnode-id=&quot;408&quot;&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;595&quot;&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;As the 2017 Parliament grapples with the constitutional challenges of Brexit, it will also have a range of internal ‘housekeeping’ and electoral issues to consider, with the potential to make Parliament look and feel very different at the next election.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;592&quot;&gt;&lt;span data-dcnode-id=&quot;593&quot; instrument_node=&quot;&quot;&gt;Some issues are current (constituency boundary reviews and renovation of the Palace of Westminster). Others are on ‘pause’ but are always under discussion (House of Lords Reform and electoral reform). Changes have been proposed to how MPs support complaints about public services (draft Public Service Ombudsman Bill) and there are relatively new elements of parliamentary machinery already being tested (fixed-term parliaments).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;589&quot;&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;2018 – new constituency boundaries to be proposed&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;586&quot;&gt;&lt;span data-dcnode-id=&quot;587&quot; instrument_node=&quot;&quot;&gt;The Coalition Government of 2010-15 pledged to create “fewer and more equal sized constituencies” and changed the Rules for Redistribution which guide reviews of the size of Parliamentary constituencies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;583&quot;&gt;&lt;span data-dcnode-id=&quot;584&quot; instrument_node=&quot;&quot;&gt;The new Rules state that there should be 600 constituencies, and determine the extent to which the size of the electorate in each constituency can differ from the average.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;582&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;580&quot;&gt;&lt;span data-dcnode-id=&quot;581&quot; instrument_node=&quot;&quot;&gt;These new 600 seats were meant to be in place for the 2015 General Election but the 2013 Review (intended to be the first under the new Rules) was cancelled due to disagreements within the Coalition Government over constitutional reform.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;577&quot;&gt;&lt;span data-dcnode-id=&quot;578&quot; instrument_node=&quot;&quot;&gt;The 2018 Review is underway and the early election has not affected the scheduled delivery of the reports to Government by 1 October 2018.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;574&quot;&gt;&lt;span data-dcnode-id=&quot;575&quot; instrument_node=&quot;&quot;&gt;Once approved, the new boundaries must be implemented at a general election – now expected to be May 2022 rather than 2020. By-elections that are required in the meantime are held on the boundaries in place at the 2017 General Election.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;573&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;571&quot;&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;House of Lords Reform – size and powers&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;570&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;568&quot;&gt;&lt;span data-dcnode-id=&quot;569&quot; instrument_node=&quot;&quot;&gt;Comprehensive reform of the House of Lords was not a priority for the Conservative Government in the 2015 Parliament. Nevertheless, questions about the size and powers of the House arose, leading to calls for change.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;567&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;565&quot;&gt;&lt;span data-dcnode-id=&quot;566&quot; instrument_node=&quot;&quot;&gt;800 and counting&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;564&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;562&quot;&gt;&lt;span data-dcnode-id=&quot;563&quot; instrument_node=&quot;&quot;&gt;Peers regularly express frustrations about the size of the Lords, which currently has 800 members. In September 2015, the Leader of the House of Lords acknowledged that “the House cannot keep growing indefinitely.” In December 2016, the Lords agreed that its size should be reduced and the Lord Speaker appointed a committee of Back-Bench Peers to examine the practical and politically viable options. Both main parties have promised to address the size of the House in their manifestos.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;561&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;559&quot;&gt;&lt;span data-dcnode-id=&quot;560&quot; instrument_node=&quot;&quot;&gt;A line crossed with tax credits?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;558&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;556&quot;&gt;&lt;span data-dcnode-id=&quot;557&quot; instrument_node=&quot;&quot;&gt;In October 2015, the House of Lords prevented the Cameron Government from implementing its policy on tax credits by voting against the necessary changes to secondary legislation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;555&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;553&quot;&gt;&lt;span data-dcnode-id=&quot;554&quot; instrument_node=&quot;&quot;&gt;This led the Government to ask Lord Strathclyde to review secondary legislation and the primacy of the House of Commons. The review recommended a new statutory procedure to allow the Lords to ask the Commons to “think again”, when there was disagreement over a statutory instrument between the two Houses, thus removing the House of Lords’ power to prevent secondary legislation from being implemented. The Government found the review’s analysis to be “compelling” but indicated that “for now” it had no plans to introduce the necessary legislation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;552&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;550&quot;&gt;&lt;span data-dcnode-id=&quot;551&quot; instrument_node=&quot;&quot;&gt;However, if the Lords reject secondary legislation in future, plans to legislate could be revised.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;549&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;547&quot;&gt;&lt;span data-dcnode-id=&quot;548&quot; instrument_node=&quot;&quot;&gt;Electoral reform – will any of it happen?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;546&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;544&quot;&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;It’s been a very busy couple of years for electoral administrators, with frequent and often combined electoral events. This crammed timetable has highlighted the complexity of our current electoral processes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;541&quot;&gt;&lt;span data-dcnode-id=&quot;542&quot; instrument_node=&quot;&quot;&gt;Although on the surface all elections look similar, in reality there are separate rules and regulations for each type, which run to hundreds of pages of primary and secondary legislation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;538&quot;&gt;&lt;span data-dcnode-id=&quot;539&quot; instrument_node=&quot;&quot;&gt;Law Commission review&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;537&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;535&quot;&gt;&lt;span data-dcnode-id=&quot;536&quot; instrument_node=&quot;&quot;&gt;Electoral law has been described as “voluminous” by the Law Commission (the statutory body which keeps the statute book under review) and “no longer fit for purpose” by the Electoral Commission.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;534&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;532&quot;&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;The last consolidation occurred in 1983 and the electoral landscape has been transformed since then.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;531&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;526&quot;&gt;&lt;span data-dcnode-id=&quot;530&quot; instrument_node=&quot;&quot;&gt;The Law Commission’s 2016 interim &lt;/span&gt;&lt;a data-dcnode-id=&quot;528&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.lawcom.gov.uk/wp-content/uploads/2016/02/electoral_law_interim_report.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;529&quot; instrument_node=&quot;&quot;&gt;review of electoral law&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;527&quot; instrument_node=&quot;&quot;&gt; made over 100 recommendations to simplify and consolidate all aspects of election administration and electoral registration. It is currently waiting for a government response.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;525&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;523&quot;&gt;&lt;span data-dcnode-id=&quot;524&quot; instrument_node=&quot;&quot;&gt;Voter ID to combat electoral fraud?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;522&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;517&quot;&gt;&lt;span data-dcnode-id=&quot;521&quot; instrument_node=&quot;&quot;&gt;In 2016 the previous Government’s Anti-Corruption Champion, Sir Eric Pickles, published a &lt;/span&gt;&lt;a data-dcnode-id=&quot;519&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/government/uploads/system/uploads/attachment_data/file/545416/eric_pickles_report_electoral_fraud.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;520&quot; instrument_node=&quot;&quot;&gt;report into electoral fraud&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;518&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;516&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;514&quot;&gt;&lt;span data-dcnode-id=&quot;515&quot; instrument_node=&quot;&quot;&gt;One of his 50 recommendations was a requirement for voters to produce personal identification at a polling station before getting a ballot paper, which the Electoral Commission has been recommending since 2014.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;513&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;508&quot;&gt;&lt;span data-dcnode-id=&quot;512&quot; instrument_node=&quot;&quot;&gt;The Electoral Commission welcomed pilots of this, which are due to be held in some parts of England in May 2018. Others have expressed concern. The Labour Party, while welcoming much of the Pickles report, said plans for voter ID risked discriminating against those entitled to vote but who don’t hold appropriate ID. Some groups (such as the poor, the elderly and black and minority ethnic communities) &lt;/span&gt;&lt;a data-dcnode-id=&quot;510&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.electoralcommission.org.uk/__data/assets/pdf_file/0004/194719/Proof-of-identity-scheme-updated-March-2016.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;are more likely to lack the requirements – for example, a passport or driving licence&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;505&quot;&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;An end to the 15 year rule for overseas voters?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;500&quot;&gt;&lt;span data-dcnode-id=&quot;503&quot; instrument_node=&quot;&quot;&gt;Following the 2015 General Election, the Conservative Party promised to fulfil its manifesto commitment to end the rule whereby UK citizens who have moved overseas can only vote in UK general elections for up to&lt;/span&gt;&lt;br data-dcnode-id=&quot;502&quot;&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;
15 years.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;497&quot;&gt;&lt;span data-dcnode-id=&quot;498&quot; instrument_node=&quot;&quot;&gt;The Cabinet Office is working with the electoral community to deliver a new system and the previous Government had committed to put this in place in time for the 2020 election. The snap election now means that the next scheduled election is due in May 2022.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;494&quot;&gt;&lt;span data-dcnode-id=&quot;495&quot; instrument_node=&quot;&quot;&gt;Is a Bill likely?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;493&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;491&quot;&gt;&lt;span data-dcnode-id=&quot;492&quot; instrument_node=&quot;&quot;&gt;There are dozens of outstanding recommendations from various reviews, as well as initiatives underway to improve registration of under-represented groups, such as students and disabled voters, and to allow anonymous registration of victims of domestic violence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;490&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;488&quot;&gt;&lt;span data-dcnode-id=&quot;489&quot; instrument_node=&quot;&quot;&gt;There is potential for a lot of activity. However, the previous Government indicated that a dedicated electoral reform Bill is unlikely in the near future. It suggested that some measures, particularly relating to overseas voters, could be brought forward in other Bills.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;485&quot;&gt;&lt;span data-dcnode-id=&quot;486&quot; instrument_node=&quot;&quot;&gt;Meanwhile, the devolved administrations could introduce reforms ahead of England as they take on greater responsibilities for devolved elections. Wales, for example, is investigating the potential for votes at 16 and proportional representation in local government elections, which would bring it in line with Scotland.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;484&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;482&quot;&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;A new Public Service Ombudsman with no ‘MP filter’&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;481&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;476&quot;&gt;&lt;span data-dcnode-id=&quot;480&quot; instrument_node=&quot;&quot;&gt;The previous Government published a &lt;/span&gt;&lt;a data-dcnode-id=&quot;478&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/government/publications/draft-public-service-ombudsman-bill&quot;&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt;draft Public Service Ombudsman Bill&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;477&quot; instrument_node=&quot;&quot;&gt; in December 2016 which has yet to be introduced to Parliament.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;473&quot;&gt;&lt;span data-dcnode-id=&quot;474&quot; instrument_node=&quot;&quot;&gt;The draft Bill sought to abolish the existing Parliamentary and Health Service Ombudsman (PHSO) and the Local Government Ombudsman (but not the Housing Ombudsman), merging their existing responsibilities into a single Public Service Ombudsman (PSO) to offer a modernised and simpler system for investigating complaints about a public authority.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;472&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;470&quot;&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt;Scotland, Wales and Northern Ireland already have their own unified public service ombudsmen covering devolved public services.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;465&quot;&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;By convention, the Parliamentary Ombudsman (PO) and the Health Ombudsman are the same person (the PHSO). Currently, all complaints to the PO must be made through an MP – the ‘MP filter’ – a feature unique&lt;/span&gt;&lt;br data-dcnode-id=&quot;467&quot;&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;
to the PO, that was designed as a temporary measure to help deflect complaints outside the PHSO’s remit.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;462&quot;&gt;&lt;span data-dcnode-id=&quot;463&quot; instrument_node=&quot;&quot;&gt;The draft Bill sought to abolish this filter but give MPs the option to add their support to complainants. This was in line with 2014 recommendations by the then Public Administration Committee and a 2000 Cabinet Office review of the PO which found “almost universal dissatisfaction” with the filter. The filter was found to slow down the complaints process unnecessarily, and disempower citizens.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;459&quot;&gt;&lt;img alt=&quot;Complaints handles by the Parliamentary and Health Service Ombudsman&quot; class=&quot;aligncenter wp-image-4186&quot; data-dcnode-id=&quot;460&quot; sizes=&quot;(max-width: 3254px) 100vw, 3254px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//commonslibrary.parliament.uk/wp-content/uploads/2017/06/1.4.1-PHSO-complaints.png&amp;amp;raw&quot; srcset=&quot;https://commonslibrary.parliament.uk/content/uploads/2017/06/1.4.1-PHSO-complaints.png 3254w, https://commonslibrary.parliament.uk/content/uploads/2017/06/1.4.1-PHSO-complaints-300x158.png 300w, https://commonslibrary.parliament.uk/content/uploads/2017/06/1.4.1-PHSO-complaints-1024x538.png 1024w, https://commonslibrary.parliament.uk/content/uploads/2017/06/1.4.1-PHSO-complaints-768x404.png 768w, https://commonslibrary.parliament.uk/content/uploads/2017/06/1.4.1-PHSO-complaints-1536x807.png 1536w, https://commonslibrary.parliament.uk/content/uploads/2017/06/1.4.1-PHSO-complaints-2048x1076.png 2048w, https://commonslibrary.parliament.uk/content/uploads/2017/06/1.4.1-PHSO-complaints-390x205.png 390w&quot; width=&quot;770&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h2 data-dcnode-id=&quot;456&quot;&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;Is the Fixed-term Parliaments Act 2011 working as expected?&lt;/span&gt;&lt;/h2&gt;&lt;span data-dcnode-id=&quot;455&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;450&quot;&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;The Fixed-term Parliaments Act 2011 introduced five-year fixed-term Parliaments to bring an element of stability to the &lt;/span&gt;&lt;a data-dcnode-id=&quot;452&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.gov.uk/government/publications/the-coalition-documentation&quot;&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;Coalition Agreement&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;451&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;447&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;The ‘snap’ 2017 election has prompted questions about whether the Act has succeeded in restricting the power of the Prime Minister to call an election at the time of their choosing and, if an early election can be arranged so easily, whether the Act serves any purpose. The 2017 Conservative Manifesto promised to repeal it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;444&quot;&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;The Act specifies that elections should take place on the first Thursday in May every five years. It also includes two mechanisms to trigger early general elections:&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;443&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;435&quot;&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;440&quot;&gt;&lt;span data-dcnode-id=&quot;441&quot; instrument_node=&quot;&quot;&gt;A House of Commons motion for an early parliamentary general election (requiring a 2/3 majority of the entire House if a division is held); or&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;439&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;437&quot;&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;A vote of no confidence in the Government, following which no alternative government is formed.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;432&quot;&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;Professor Robert Hazell (Constitution Unit, UCL) has cautioned that there is a danger of judging the Act prematurely, on the basis of a single episode. However, the key question remains as to whether there are circumstances where an opposition party would not support calls for an early election.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;431&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;429&quot;&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt;The Act specifies that a committee to review its operation has to be arranged between June and November 2020 with the majority of the membership being MPs. Without the ‘snap’ 2017 election, this review would have begun shortly after the second, scheduled election under the Act.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;428&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;426&quot;&gt;&lt;span data-dcnode-id=&quot;427&quot; instrument_node=&quot;&quot;&gt;The next general election is currently scheduled to take place on 5 May 2022.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;425&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;422&quot;&gt;&lt;em data-dcnode-id=&quot;423&quot;&gt;&lt;span data-dcnode-id=&quot;424&quot; instrument_node=&quot;&quot;&gt;This article is part of Key Issues 2017 – a series of briefings on the topics that will take centre stage in UK and international politics in the new Parliament.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;410&quot;&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt;Image: &lt;/span&gt;&lt;a data-dcnode-id=&quot;418&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.flickr.com/photos/duncanh1/8277567491/in/photolist-dBsGqT-fAE3Q6-9moxrU-9QPp9-doNLeK-ntzPnD-4CX1AQ-5qHDK1-kAe6F1-8BDsWA-73Rbou-9f3rUV-JvzZJf-kAdZBh-TDbRU2-aNYvtT-mgKo5a-oafHo9-9nvEGf-nPMHeg-e4aw9u-2V6Lgm-ph8wm8-axHiJM-9HcamY-TNfri9-9nsCYP-4CSQet-cCRRUu-dsMgwP-pD38j9-afKJwM-cCRS9N-bpFuAW-5NRf9c-qUBPQk-9KZDCS-h2JmAq-9DUStq-8F4VDw-76mCHm-cCRRJy-bCnbVb-3QbxJ-df7sfc-9KoBE2-9nsCSi-kwJEzH-cCRSzC-9nsCt4&quot;&gt;&lt;span data-dcnode-id=&quot;419&quot; instrument_node=&quot;&quot;&gt;London Skyline&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt; by &lt;/span&gt;&lt;a data-dcnode-id=&quot;415&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.flickr.com/photos/duncanh1/&quot;&gt;&lt;span data-dcnode-id=&quot;416&quot; instrument_node=&quot;&quot;&gt;Dun.can&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;, &lt;/span&gt;&lt;a data-dcnode-id=&quot;412&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//creativecommons.org/licenses/by/2.0/&quot;&gt;&lt;span data-dcnode-id=&quot;413&quot; instrument_node=&quot;&quot;&gt;Attribution 2.0 Generic &lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;(CC BY 2.0)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;
