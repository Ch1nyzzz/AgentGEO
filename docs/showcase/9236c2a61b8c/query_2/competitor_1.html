Thank you, Mr. Chairman. Anti-Asian American violence is skyrocketing. We’ve seen a 150% surge in anti Asian American hate crimes in major cities, including an 81 year old woman being punched in the face and lit on fire outside her own home. A 61 year old man being slashed in the face with a box cutter on the subway in New York City, a woman being doused in the face with a burning toxic chemical as she took out the trash at our home and a 15 year old boy being hospitalized after being attacked at school by a bully assailant who claimed he had COVID-19 because he was Asian.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1864&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1857&quot;&gt;&lt;span data-dcnode-id=&quot;1863&quot; instrument_node=&quot;&quot;&gt;Mr. Raskin: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1861&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7838.68&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1862&quot; instrument_node=&quot;&quot;&gt;02:10:38&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1860&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1859&quot;&gt;&lt;span data-dcnode-id=&quot;1858&quot; instrument_node=&quot;&quot;&gt;
The governor of Maryland, Larry Hogan, whose wife Yumi is Korean American, told me in a phone conversation yesterday that he and his wife and his daughter’s closest friends have all been affected by the new wave of hostility against the AAPI community. Governor Hogan told me that close family friends have been assaulted in a convenience store, screamed at by racist telling them to go back to China and told that they did not want to sit next to them on an airplane because they were Asian and had COVID. There’s no free speech defense to commission of violent assaults on Asian-Americans or anybody else. And the bizarre invocation of free speech in this context is a dangerous and irrelevant distraction from the violence engulfing AAPI communities across the land. We’ve got Korean American and Japanese American and Vietnamese American constituents who’ve been attacked by racist fanatics, screaming about the Wuhan flu.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1849&quot;&gt;&lt;span data-dcnode-id=&quot;1855&quot; instrument_node=&quot;&quot;&gt;Mr. Raskin: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1853&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7896.87&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1854&quot; instrument_node=&quot;&quot;&gt;02:11:36&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1852&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1851&quot;&gt;&lt;span data-dcnode-id=&quot;1850&quot; instrument_node=&quot;&quot;&gt;
So just consider the leaps of illogic and fallacy, which lead to this kind of crime. First, you’ve got to blame the COVID-19 virus on the Chinese government or the Chi-Coms as the ranking member proudly puts it. An authoritarian government, which President Trump lavishly praised 37 different times in the first three months of COVID-19 for its excellent response. Then you’ve got to blame the lethal recklessness of President Trump, who said COVID-19 would magically disappear by Easter and suggested injecting bleach is a miracle cure and refuse to develop any nationwide plan to crush the virus on the Chinese government and on the Chinese people. Then you’ve got to associate the alleged policy errors of the Chinese government with the Chinese people. Then you must associate the Chinese people with Chinese American citizens of the United States. Then you must associate Chinese American citizens with Korean Americans, Vietnamese Americans, and so on.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1848&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1841&quot;&gt;&lt;span data-dcnode-id=&quot;1847&quot; instrument_node=&quot;&quot;&gt;Mr. Raskin: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1845&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7955.4&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1846&quot; instrument_node=&quot;&quot;&gt;02:12:35&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1844&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1843&quot;&gt;&lt;span data-dcnode-id=&quot;1842&quot; instrument_node=&quot;&quot;&gt;
Then you must assume that all of your misguided and fallacious views justify violent attacks on Asian-American strangers. And all of these fallacies and lies are built on assumptions of collective guilt, mass punishment, and vigilante justice that are completely at odds with our constitutional values. So it’s remarkable to me that when we try to put a stop to this deranged violence, we have colleagues who think it’s irrelevant or productive to defend Donald Trump’s totally unmolested first amendment rights to blame his own failures on the Chinese government, which he enthusiastically praised 37 different times. So Mr. Yang is the invocation of free speech relevant or constructive to the dialogue about anti-Asian American violence and racism today?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1833&quot;&gt;&lt;span data-dcnode-id=&quot;1839&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1837&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8002.15&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1838&quot; instrument_node=&quot;&quot;&gt;02:13:22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1836&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1835&quot;&gt;&lt;span data-dcnode-id=&quot;1834&quot; instrument_node=&quot;&quot;&gt;
Thank you for that question. And thank you very much for expressing the power for awards that you do. Free speech is not a defense of this. We have no free speech right to yell fire in a crowded theater. And what is happening right now is that Asian-Americans are in a crowded theater where we are being in danger. The other point is regardless of free speech, all of us as leaders have an obligation to model behavior that we want our community to follow and model behavior that would lift our entire country up instead of trying to be divisive and make individuals or communities targets of hate when it is unnecessary. So the last thing that I would say is, as has been established by previous speaker, everyone agrees, there is no medical benefit to using terms such as China virus and Wuhan flu. And everyone agrees that there is some effect and you could debate how much, but there is an effect on the hate that the Asian American community has received. So the cost benefit analysis is clear the cost to the community, the Asian-American community of calling the term that it is, is great. The benefit of using these terms is nil. So in that regard, it makes no sense.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1832&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1825&quot;&gt;&lt;span data-dcnode-id=&quot;1831&quot; instrument_node=&quot;&quot;&gt;Mr. Raskin: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1829&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8075.94&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1830&quot; instrument_node=&quot;&quot;&gt;02:14:35&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1828&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1827&quot;&gt;&lt;span data-dcnode-id=&quot;1826&quot; instrument_node=&quot;&quot;&gt;
Thank you so much. And professor Lee, would you agree that it is dangerous and irrational to conflate the question of random vigilante attacks and violence on American citizens with questions of foreign policy and the behavior of foreign governments?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1824&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1817&quot;&gt;&lt;span data-dcnode-id=&quot;1823&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1821&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8097.94&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1822&quot; instrument_node=&quot;&quot;&gt;02:14:57&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1820&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1819&quot;&gt;&lt;span data-dcnode-id=&quot;1818&quot; instrument_node=&quot;&quot;&gt;
Yeah. Thank you for that great question. It is irrational, but it has been part of our historical record and we have seen where that hate as led. There has been too many times when Japanese Americans, for example, have been conflated with the Japanese enemy. This is one of the ways in which American racism works. We think we should have learned this lessons by now in the 21st century, that as all of the fellow witnesses have reiterated, a point that really should not need to be made in the first place. We are Americans. We are Americans of Asian descent. We are proud of that ancestry and heritage, but conflating us with a foreign government has been an age old way of denigrating us, separating us, making us other, and that has led to racism in the past and it’s leading to racism today.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1809&quot;&gt;&lt;span data-dcnode-id=&quot;1815&quot; instrument_node=&quot;&quot;&gt;Mr. Raskin: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1813&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8159.25&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1814&quot; instrument_node=&quot;&quot;&gt;02:15:59&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1812&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1811&quot;&gt;&lt;span data-dcnode-id=&quot;1810&quot; instrument_node=&quot;&quot;&gt;
Thank you very much, Mr. Chairman, thank you for this great hearing. And I yield back to you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1808&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1801&quot;&gt;&lt;span data-dcnode-id=&quot;1807&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1805&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8164.02&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1806&quot; instrument_node=&quot;&quot;&gt;02:16:04&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1804&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1803&quot;&gt;&lt;span data-dcnode-id=&quot;1802&quot; instrument_node=&quot;&quot;&gt;
Thank you Mr. Raskin. This problem that we see it with the Asian American community has been going on for years. The people who thrust this at us have seen Jews as being double citizens and having double citizenship, dual citizenship with Israel, which of course is not true, but that’s been put out too. And this type stuff has gone on for years and as professor Wiesel said people who hate, hate everyone. And I now like to yield to Ms. Fischbach.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1800&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1793&quot;&gt;&lt;span data-dcnode-id=&quot;1799&quot; instrument_node=&quot;&quot;&gt;Ms. Fischbach: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1797&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8200.51&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1798&quot; instrument_node=&quot;&quot;&gt;02:16:40&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1796&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1795&quot;&gt;&lt;span data-dcnode-id=&quot;1794&quot; instrument_node=&quot;&quot;&gt;
Thank you, Mr. Chair. And I just have a quick, I guess, maybe not quick. A question for Mr. Fa and I was just wondering, in your work fighting discrimination in the education admissions process, do you find that this type of discrimination to be across all types of schools like public, private, regional, religious, non-religious I guess. I’m just kind of wondering if there’s a pattern or a general trend that you observe in the kinds of schools, the types of schools that are having issue?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1785&quot;&gt;&lt;span data-dcnode-id=&quot;1791&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1789&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8235.63&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1790&quot; instrument_node=&quot;&quot;&gt;02:17:15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1788&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1787&quot;&gt;&lt;span data-dcnode-id=&quot;1786&quot; instrument_node=&quot;&quot;&gt;
Okay. Well certainly thank you Congresswoman for that question. Certainly this type of discrimination happens at different types of schools. The Harvard case obviously considers a private school that receives federal funding. So, that’s a lawsuit based on Title VI. The work that we do at Pacific Legal Foundation really focuses on the equal protection clause and the defendants in those cases are government entities and public schools. And we see that throughout the country, we’ve fought discrimination in places like New York, places like Virginia, places like Maryland. And we fought racial quotas representing not just Asian American families across the United States, but also black and Hispanic families who are being denied educational opportunities on the basis of race. So this is a prevalent issue in America, sadly today, but we look forward to enforcing our client’s rights under the equal protection clause and their right to equality before the law.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1784&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1777&quot;&gt;&lt;span data-dcnode-id=&quot;1783&quot; instrument_node=&quot;&quot;&gt;Ms. Fischbach: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1781&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8300.7&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1782&quot; instrument_node=&quot;&quot;&gt;02:18:20&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1780&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1779&quot;&gt;&lt;span data-dcnode-id=&quot;1778&quot; instrument_node=&quot;&quot;&gt;
And, and Mr. Fa, maybe just kind of a follow up. There are some schools that certainly do better at not discriminating. And if you found that, are there some characteristics about those schools that they share that the others don’t have? Have you found anything about that?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1769&quot;&gt;&lt;span data-dcnode-id=&quot;1775&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1773&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8323.58&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1774&quot; instrument_node=&quot;&quot;&gt;02:18:43&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1772&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1771&quot;&gt;&lt;span data-dcnode-id=&quot;1770&quot; instrument_node=&quot;&quot;&gt;
Sure. So many of those schools where we have litigated, the admissions system at least previously had been governed by an objective tests that anybody can take, and your chances of getting into those specialized schools or magnet schools were determined by your score on the test. The highest scores on the test would get in no matter what their race or ethnicity. But unfortunately, local government in places like New York, Montgomery County, Thomas and Virginia have found the results to be, the schools have had too many Asians in their opinion. So they’ve changed the admissions policies in cases to discriminate against Asian-American students. And in the case of our New York clients, low income Asian American students, only because there were in their view, too many Asian Americans at those schools.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1768&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1761&quot;&gt;&lt;span data-dcnode-id=&quot;1767&quot; instrument_node=&quot;&quot;&gt;Ms. Fischbach: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1765&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8391.23&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1766&quot; instrument_node=&quot;&quot;&gt;02:19:51&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1764&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1763&quot;&gt;&lt;span data-dcnode-id=&quot;1762&quot; instrument_node=&quot;&quot;&gt;
Thank you, Mr. Fa. And thank you, Mr. Chair, I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1753&quot;&gt;&lt;span data-dcnode-id=&quot;1759&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1757&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8396.37&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1758&quot; instrument_node=&quot;&quot;&gt;02:19:56&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1756&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1755&quot;&gt;&lt;span data-dcnode-id=&quot;1754&quot; instrument_node=&quot;&quot;&gt;

Thank you so much, Mr. Chairman, and thank you for holding this very important hearing during this very important and sad week. I want to thank everyone on the panel for being here. I want to let you know that my district in North Carolina is home to a large and vibrant Asian American community. These individuals, whether they were born here or came to North Carolina as immigrants are an essential part of the research triangle’s workforce and community. Wake County would not be the hub of innovation and culture that it is without their contributions. I’d like to ask unanimous consent to enter an article from our newspaper, the Raleigh News and Observer on Asian hate crimes that appeared today&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1744&quot; instrument_node=&quot;&quot;&gt;

Thank you, Mr. Chairman. Since the beginning of the COVID 19 pandemic, several of my constituents of Asian descent have reported racist incidents. One Chinese constituent was labeled a communist in a disparaging newspaper article. A college student found her Chinese New Year display in her dorm destroyed. Others have been verbally harassed to the extent that they worry about their safety in public. Unfortunately, this is not the first time in our nation’s history that Asian Americans have found themselves subject to discrimination as we’ve heard today. This stems directly from xenophobic federal policies. Earlier we heard representative Matsui testify about the impact of living in an internment camp on her family. I would like to address my first question to professor Modamura. I know that we’ve talked about anti-Asian laws and how they’ve contributed to our society. Could you give us examples of when anti-Asian laws have been repealed and how public sentiment has come to allow for that repeal?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1728&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1721&quot;&gt;&lt;span data-dcnode-id=&quot;1727&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1725&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8547.67&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1726&quot; instrument_node=&quot;&quot;&gt;02:22:27&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1724&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1723&quot;&gt;&lt;span data-dcnode-id=&quot;1722&quot; instrument_node=&quot;&quot;&gt;
Well, there are several examples, but one is that as I mentioned in testimony, the Chinese exclusion laws were in place from the 1870s until 1943. And I think that one of the influences is that resulted in the repeal of Chinese exclusion was the allyship between United States and China in World War II. So there were, there were other events that came in. I’m not sure there was a particular change of heart with regard to Chinese American community, but there was at that time and then Professor Lee might be able to speak more to this, but there’s much more of a change of attitude trying to distinguish where there was a for her pursuing a time distinguished Chinese on foreign policy and more related reasons from Japanese Americans. And so in some sense, you could look at this as a change of heart with regard to Chinese-Americans, but you could also look at it as an attempt to demonize the Japanese Americans. This is in 1943.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1720&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1713&quot;&gt;&lt;span data-dcnode-id=&quot;1719&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1717&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8605.02&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1718&quot; instrument_node=&quot;&quot;&gt;02:23:25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1716&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1715&quot;&gt;&lt;span data-dcnode-id=&quot;1714&quot; instrument_node=&quot;&quot;&gt;
So that would be one example. And also in 1965, of course, and this is a very long history and we probably don’t want me to get into it on your time, but in 1965, of course you have the end of the National Origins Act. And that too is a racially restrictive scheme that was in place until from 1921 until 1965. And so a lot of influences, that was really part of the civil rights movement to end this a scheme that had strictly divided by race until 1965. So, we’ve had these incidents. We’ve had examples of it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1705&quot;&gt;&lt;span data-dcnode-id=&quot;1711&quot; instrument_node=&quot;&quot;&gt;Ms. Ross: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1709&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8641.64&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1710&quot; instrument_node=&quot;&quot;&gt;02:24:01&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1708&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1707&quot;&gt;&lt;span data-dcnode-id=&quot;1706&quot; instrument_node=&quot;&quot;&gt;
Thank you very much. And then just to follow up, are there examples of current or more recent immigration policies that have impacted the Asian-Americans and their families, even if perhaps they were not the targeted demographic? Were taking up immigration bills this week and I think that would be an important thing to know.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1697&quot;&gt;&lt;span data-dcnode-id=&quot;1703&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1701&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8662.5&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1702&quot; instrument_node=&quot;&quot;&gt;02:24:22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1700&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1699&quot;&gt;&lt;span data-dcnode-id=&quot;1698&quot; instrument_node=&quot;&quot;&gt;
Yeah, well, I think that there are different aspects of this. Some of this has to do with the inability of the American immigration system to fully accommodate the needs of the American economy with regard to workers. And so, you have a bills in place right now that would essentially grant legal immigration status to a number of workers. Many of them are essential workers. Many of them are from Asia. That would be one example of this. I think that there are restrictions right now that limit the ability of Asian immigrants to come to this country. But I think this is also a pattern and the patterns that I was trying to describe earlier, they relate to all different sorts of ethnic groups. I think a much more concerning piece of this or an equally concerning piece of this is, as I mentioned in testimony, the treatment of Latino immigrants and the inability of Latino immigrants to acquire a lawful immigration status. So that would be another one that I think was actually demographically, highly significant as well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1696&quot; instrument_node=&quot;&quot;&gt;

Thank you, Mr. Chairman. I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1681&quot;&gt;&lt;span data-dcnode-id=&quot;1687&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1685&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8736.1&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1686&quot; instrument_node=&quot;&quot;&gt;02:25:36&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1684&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1683&quot;&gt;&lt;span data-dcnode-id=&quot;1682&quot; instrument_node=&quot;&quot;&gt;

I thank the chairman for hosting this very timely hearing, and I would like to ask unanimous consent to submit a 31 second video produced by the Asian Americans Advancing Justice Atlanta Organization regarding violence against members of the AAIP community, along with a letter asking for a community-based response to the violence in Atlanta, which is dated March 18, 2021 and is signed by multiple Asian American community groups in my district for the record.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1672&quot; instrument_node=&quot;&quot;&gt;

Thank you. Mr. Chairman, my heart cries tears of sorrow and solidarity with the families [inaudible 02:26:52] mass murder in Atlanta [inaudible 02:26:53] left with tears of terror of what might happen next to them, their families, and their AAIP friends, whether the massacre in Atlanta was sex based or race based, it was hate based and directed at Asian women.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1656&quot; instrument_node=&quot;&quot;&gt;

The correlation between the rise of xenophobic and racist rhetoric by President Trump and his Republican party supporters and the dramatic and alarming rise in violence against Asian Americans is not coincidental. It is an unfortunate and calculated result, which is open season on Asian Americans in this country. And when folks on this committee talk about Chi-Coms what they’re doing is they’re using these stereotypes against any people, and I resent it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1640&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1633&quot;&gt;&lt;span data-dcnode-id=&quot;1639&quot; instrument_node=&quot;&quot;&gt;Henry Hank Calvin Johnson: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1637&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8912.99&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1638&quot; instrument_node=&quot;&quot;&gt;02:28:32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1636&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1635&quot;&gt;&lt;span data-dcnode-id=&quot;1634&quot; instrument_node=&quot;&quot;&gt;
As a black man in America, I understand what it’s like to be targeted because of how you look. I understand how terrible it is to be viewed by your fellow citizens as other, in a nation that prides itself, supposedly on the melting pot of the world. America, it’s time to admit that we have a problem. It’s time to take affirmative action to correct that problem, and I look forward to a time where we can banish hate and replace it with love in this country. And with that, I’d like to ask you Mr. Yang about the fact that healthcare workers have specifically suffered disproportionately during the pandemic. How have Asian American healthcare workers been impacted by discrimination and violence over the last year, particularly those involved in the healthcare industry specifically?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1625&quot;&gt;&lt;span data-dcnode-id=&quot;1631&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1629&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D8975.19&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1630&quot; instrument_node=&quot;&quot;&gt;02:29:35&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1628&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1627&quot;&gt;&lt;span data-dcnode-id=&quot;1626&quot; instrument_node=&quot;&quot;&gt;
Thank you very much for that question. Thank you first for lifting up the work that is being done in Atlanta, by our community groups there. Because that is vital, it is important. And with respect to the healthcare workers in particular, those are essential frontline workers that we talk about. The people that are putting their health at risk to serve our entire country, not just Asian-Americans, but to serve our entire country. And both Ms. Farr Carney, as well as myself, what we’d look at the incidents that we have coming in, we get sent so many examples of healthcare workers getting shunned and getting spit, getting coughed on or statement saying that we don’t want them to treat us.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1617&quot;&gt;&lt;span data-dcnode-id=&quot;1623&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1621&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9013.24&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1622&quot; instrument_node=&quot;&quot;&gt;02:30:13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1620&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1619&quot;&gt;&lt;span data-dcnode-id=&quot;1618&quot; instrument_node=&quot;&quot;&gt;
And so it has had both a mental toll as well as in some cases, a physical toll. If I might, I do want to go back to one other piece with respect to the community-based response that we’re talking about, which is public safety is not the same thing as law enforcement. Yes, we absolutely need public safety, but we can re-imagine it in a way that we’re not putting sole reliance on law enforcement when we oftentimes, our communities don’t trust that vehicle. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1616&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1609&quot;&gt;&lt;span data-dcnode-id=&quot;1615&quot; instrument_node=&quot;&quot;&gt;Henry Hank Calvin Johnson: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1613&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9040.99&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1614&quot; instrument_node=&quot;&quot;&gt;02:30:40&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1612&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1611&quot;&gt;&lt;span data-dcnode-id=&quot;1610&quot; instrument_node=&quot;&quot;&gt;
Thank you. This hearing is not about defunding the police either. And how does violence and discrimination affect the mental health of members of the AAIP community, collectively?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1601&quot;&gt;&lt;span data-dcnode-id=&quot;1607&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1605&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9061.09&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1606&quot; instrument_node=&quot;&quot;&gt;02:31:01&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1604&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1603&quot;&gt;&lt;span data-dcnode-id=&quot;1602&quot; instrument_node=&quot;&quot;&gt;
If the question is directed to me, it’s clear it affects our entire community. If you ask any of your Asian American friends right now, they will say that this is on their minds. And so one thing I would urge people to do in this moment is to reach out to your friends, reach out to your community and make sure that they feel seen, they feel heard and they feel protected.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1593&quot;&gt;&lt;span data-dcnode-id=&quot;1599&quot; instrument_node=&quot;&quot;&gt;Henry Hank Calvin Johnson: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1597&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9083.46&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1598&quot; instrument_node=&quot;&quot;&gt;02:31:23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1596&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1595&quot;&gt;&lt;span data-dcnode-id=&quot;1594&quot; instrument_node=&quot;&quot;&gt;
Thank you. Mr. Kim, has the government provided enough support to Asian American healthcare workers? And what role do you see Congress playing in addressing these concerns and providing more support to Asian American healthcare care and other frontline workers?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1585&quot;&gt;&lt;span data-dcnode-id=&quot;1591&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1589&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9103.54&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1590&quot; instrument_node=&quot;&quot;&gt;02:31:43&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1588&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1587&quot;&gt;&lt;span data-dcnode-id=&quot;1586&quot; instrument_node=&quot;&quot;&gt;
Well, thank you for the question. I think as it pertains to healthcare workers, the thing that I find most anecdotally is that many of them are experiencing bigotry and hate even as they’re trying to help people fighting this virus. I think the ways that we can support them as friends and members of our community is some of the ways that we have. We’ve seen people play music for them at seven o’clock and clap for them. But the ways that our government can help is really just to support the community at large. And I think those frontline workers are also members of the AAPI community. They may be at work helping people, but they go home and they’re scared to go home the same way the rest of us are. And so I encourage us all to think about the frontline workers as part of the larger community. And these two bills that are before the committee right now will help all AAPIs.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1577&quot;&gt;&lt;span data-dcnode-id=&quot;1583&quot; instrument_node=&quot;&quot;&gt;Henry Hank Calvin Johnson: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1581&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9164.54&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1582&quot; instrument_node=&quot;&quot;&gt;02:32:44&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1580&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1579&quot;&gt;&lt;span data-dcnode-id=&quot;1578&quot; instrument_node=&quot;&quot;&gt;
Thank you. Professor Carney, what is the correlation between the rhetoric of the Trump administration and the rise in violence against AAIPs?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1569&quot;&gt;&lt;span data-dcnode-id=&quot;1575&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1573&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9178.74&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1574&quot; instrument_node=&quot;&quot;&gt;02:32:58&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1572&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1571&quot;&gt;&lt;span data-dcnode-id=&quot;1570&quot; instrument_node=&quot;&quot;&gt;
Congressman for your question. We know from a study that we did, excuse me, in the fall that actually over 700 of the incidents reported to stop AAPI hate of the 2,500 we had received at that point, actually correlated to comments that were made about China as the China virus, the Wuhan virus and Kung flu and similar comments that were made about sending people back to their country. So we know that in fact, comments like that have absolutely resulted in hate incidents being perpetrated against our community members. And we know that because the data shows it. And if I may add to that, just in terms of some of the resources that can be provided, I think local communities, as you have pointed out, could very much benefit from added funding and an infrastructure to provide support for our community members.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1561&quot;&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;Henry Hank Calvin Johnson: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1565&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9246.51&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1566&quot; instrument_node=&quot;&quot;&gt;02:34:06&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1564&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1563&quot;&gt;&lt;span data-dcnode-id=&quot;1562&quot; instrument_node=&quot;&quot;&gt;
Thank you. I want to make it clear that it’s not just white folks who are acting against AAIPs, it’s other communities, including black people. And I want to issue a challenge to all communities, to be aware of the fact that our brothers and sisters in the AAIP community are particularly targeted right now, and we need to embrace them with love and not contribute to the hate that is enveloping them. And with that, I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1560&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1553&quot;&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1557&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9280.71&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;02:34:40&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1555&quot;&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;
Thank you Mr. Johnson. Now I recognize the lady from Houston, Texas.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1552&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1545&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;Ms. Garcia: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1549&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9288.55&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1550&quot; instrument_node=&quot;&quot;&gt;02:34:48&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1547&quot;&gt;&lt;span data-dcnode-id=&quot;1546&quot; instrument_node=&quot;&quot;&gt;
Thank you Mr. Chairman, and thank you to all the witnesses, especially my colleagues for sharing their very, very personal stories. At a time when we should be working together, helping one another as Americans to grapple with a COVID-19 pandemic, we’ve all witnessed the Asian American community like Latinos and the other communities that are facing in alarming rise in violence, hate and discrimination. It is inherently un-American for anyone to discriminate and launch vicious hate crimes against an Asian American. Too often, immigrants have been blamed and scapegoated or harassed, telling them to go back to their country. I know I’ve been told to go back to Mexico. If we can play a quick video clip, Mr. Chairman?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1544&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1537&quot;&gt;&lt;span data-dcnode-id=&quot;1543&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1541&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9343.89&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1542&quot; instrument_node=&quot;&quot;&gt;02:35:43&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1540&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1539&quot;&gt;&lt;span data-dcnode-id=&quot;1538&quot; instrument_node=&quot;&quot;&gt;
Yes, ma’am. Play the video.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1529&quot;&gt;&lt;span data-dcnode-id=&quot;1535&quot; instrument_node=&quot;&quot;&gt;Speaker 10: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1533&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9356.57&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1534&quot; instrument_node=&quot;&quot;&gt;02:35:56&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1532&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1531&quot;&gt;&lt;span data-dcnode-id=&quot;1530&quot; instrument_node=&quot;&quot;&gt;
Get the out of this world, get the out of this state. Go back to whatever Asian country you belong in.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1521&quot;&gt;&lt;span data-dcnode-id=&quot;1527&quot; instrument_node=&quot;&quot;&gt;Ms. Garcia: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1525&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9372.48&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1526&quot; instrument_node=&quot;&quot;&gt;02:36:12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1524&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1523&quot;&gt;&lt;span data-dcnode-id=&quot;1522&quot; instrument_node=&quot;&quot;&gt;
Go back to blank Asian country that you belong. Many of us have heard that. And this is just one example of the various types of discrimination and harassment that Asian-Americans, Latinos and others face too often in our country. This does not represent who we are as a nation. As president Biden has said, violence against Asian Americans is un-American and it must stop. And Mr. Kim, I know that you also added that we need to look at this as a humanity issue, because humanity matters.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1520&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1513&quot;&gt;&lt;span data-dcnode-id=&quot;1519&quot; instrument_node=&quot;&quot;&gt;Ms. Garcia: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1517&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9411.02&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1518&quot; instrument_node=&quot;&quot;&gt;02:36:51&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1516&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1515&quot;&gt;&lt;span data-dcnode-id=&quot;1514&quot; instrument_node=&quot;&quot;&gt;
And the last time you were before this committee, you also told us that what is in the media visually in print, everywhere also matters. I wanted to ask you specifically about the rhetoric coming from politicians as some of you have testified. I know we have focused on the former president, but Senator Cornyn of Texas said, “China is to blame because a culture where people eat bats and snakes and dogs and things like that. China has been the source of a lot of these viruses, like SARS, like MERS, the swine flu, and now the coronavirus.” Senator Cruz also from Texas, said that the Trump was not worried because he wasn’t serving bat soup in Hunan province. An apparent nod to the now debunked myth that outbreak started in Hunan. How do these words and all the coverage that all this gets in print and sometimes in the news visually, how does that impact hate crimes, hate incidents in this country? Are you unmuted, sir?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1505&quot;&gt;&lt;span data-dcnode-id=&quot;1511&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1509&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9490.68&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1510&quot; instrument_node=&quot;&quot;&gt;02:38:10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1508&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1507&quot;&gt;&lt;span data-dcnode-id=&quot;1506&quot; instrument_node=&quot;&quot;&gt;
Thank you for that question representative. Can you hear me?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1497&quot;&gt;&lt;span data-dcnode-id=&quot;1503&quot; instrument_node=&quot;&quot;&gt;Ms. Garcia: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1501&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9492.98&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1502&quot; instrument_node=&quot;&quot;&gt;02:38:12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1500&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1499&quot;&gt;&lt;span data-dcnode-id=&quot;1498&quot; instrument_node=&quot;&quot;&gt;
Yes, I can.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1489&quot;&gt;&lt;span data-dcnode-id=&quot;1495&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1493&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9495.49&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1494&quot; instrument_node=&quot;&quot;&gt;02:38:15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1492&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1491&quot;&gt;&lt;span data-dcnode-id=&quot;1490&quot; instrument_node=&quot;&quot;&gt;
First of all, I want to thank you for showing that clip of the woman in Torrance, California. That happens to be the neighborhood where my brother and his family live. And that woman is Latina, which highlights the point that you were trying to make that this is not just an issue of white people versus Asian people or black people versus Asian people. It is really a question of everybody versus acts of hate and bigotry. And that I think really needs to be highlighted, because this is not part just of the Asian American history, it’s part of the history of America. Now, to your question, I will say that, yes, it matters that other representatives, other than the president had been using these terms of hate and connecting Americans to a virus that they have no connection to whatsoever.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1481&quot;&gt;&lt;span data-dcnode-id=&quot;1487&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1485&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9542.42&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1486&quot; instrument_node=&quot;&quot;&gt;02:39:02&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1484&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1483&quot;&gt;&lt;span data-dcnode-id=&quot;1482&quot; instrument_node=&quot;&quot;&gt;
It is part of our leadership. And I think I’m an idealist because I still do believe in the words of my leaders. I want to believe that they are setting the tone for the rest of the country and that when they use rhetoric like this, it not only affects adults, but it affects our children. It’s a shameful thing to have to say, don’t listen to what your president is saying. Don’t listen to what your Senator is saying. If you cannot teach your children the same things that you would ask of your leaders, then what example are we setting? And the way it becomes insidious in our culture is that this language permeates through to places like Jay Baker, the spokesman for the Sheriff’s office and Cherokee County who actually tweeted out t-shirts making fun of coronavirus and connecting it to China. This is a person who has a direct connection to the shooter of-&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1473&quot;&gt;&lt;span data-dcnode-id=&quot;1479&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1477&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9603.4&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1478&quot; instrument_node=&quot;&quot;&gt;02:40:03&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1476&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1475&quot;&gt;&lt;span data-dcnode-id=&quot;1474&quot; instrument_node=&quot;&quot;&gt;
And who has a direct connection to the shooter of eight people, he is not impartial. It calls into question, the veracity of his position. These are all ways in which it’s connected, and words matter, from our President, from our leaders, for anyone with a platform, which is why I’m here today to ask those of you who are leading us, to speak out for us instead of encouraging hate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1472&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1465&quot;&gt;&lt;span data-dcnode-id=&quot;1471&quot; instrument_node=&quot;&quot;&gt;Ms. Garcia: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1469&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9630.6&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1470&quot; instrument_node=&quot;&quot;&gt;02:40:30&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1468&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1467&quot;&gt;&lt;span data-dcnode-id=&quot;1466&quot; instrument_node=&quot;&quot;&gt;
Thank you. Thank you for that answer and I think what our children and all Americans see in the news, or hear, or read in the paper matters, because words do matter. And as you said, humanity matters, so thank you for the response. Mr. Chairman, I want to introduce the articles that I’ve referenced together with other articles, which unfortunately, the rhetoric is building and the coverage is building. I’d like to introduce these into the records, ask for unanimous consent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1457&quot;&gt;&lt;span data-dcnode-id=&quot;1463&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1461&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9666.68&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1462&quot; instrument_node=&quot;&quot;&gt;02:41:06&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1460&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1459&quot;&gt;&lt;span data-dcnode-id=&quot;1458&quot; instrument_node=&quot;&quot;&gt;
So done, without objection.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1456&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1449&quot;&gt;&lt;span data-dcnode-id=&quot;1455&quot; instrument_node=&quot;&quot;&gt;Ms. Garcia: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1453&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9666.73&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1454&quot; instrument_node=&quot;&quot;&gt;02:41:06&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1452&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1451&quot;&gt;&lt;span data-dcnode-id=&quot;1450&quot; instrument_node=&quot;&quot;&gt;
And with that, Mr. Chairman, I thank you and I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1441&quot;&gt;&lt;span data-dcnode-id=&quot;1447&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1445&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9669.74&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1446&quot; instrument_node=&quot;&quot;&gt;02:41:09&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1444&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1443&quot;&gt;&lt;span data-dcnode-id=&quot;1442&quot; instrument_node=&quot;&quot;&gt;
Thank you, Ms. Garcia, and I believe we have Ms. Bush with us. And Ms. Bush, the honorable Congressperson from St. Louis, Missouri, up the river, is recognized. You have to unmute, though, Ms. Bush. Unmute.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1433&quot;&gt;&lt;span data-dcnode-id=&quot;1439&quot; instrument_node=&quot;&quot;&gt;Cori Bush: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1437&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9682.42&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1438&quot; instrument_node=&quot;&quot;&gt;02:41:22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1436&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1435&quot;&gt;&lt;span data-dcnode-id=&quot;1434&quot; instrument_node=&quot;&quot;&gt;
All right, I’m here. Thank you. And St. Louis and I, again, thank you Chairman, for convening this hearing. I want to extend my deepest condolences to the AAPI community. Many of whom have lost loved ones, been victims of white supremacist hate crimes, or in some way, have been victimized by the horrific incidents of this past year. My heart is with you. There are more than, and it’s been said before over and over again, 3000 hate crimes reported over the last year as a result of anti-Asian-American racism. That 3000 number, it’s horrific. And I don’t want to just gloss over, it’s 3000 incidents. The rise of hate crimes against Asian-Americans is inherently tied to anti-Asian-American rhetoric, some of which have come out of this very chamber. Rhetoric which we have been told, even on this hearing today, that words don’t matter, that we shouldn’t be worried about words, but especially when people from a place of privilege speak about that.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1432&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1425&quot;&gt;&lt;span data-dcnode-id=&quot;1431&quot; instrument_node=&quot;&quot;&gt;Cori Bush: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1429&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9746.73&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1430&quot; instrument_node=&quot;&quot;&gt;02:42:26&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1428&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1427&quot;&gt;&lt;span data-dcnode-id=&quot;1426&quot; instrument_node=&quot;&quot;&gt;
What can directly lead to physical harm? You have to own that, you have to own it causes harm. It causes harm to people, especially people of color. To call it out as if it does not matter, it does, because we’re talking about lives at stake. This is a refusal of responsibility and I’m going to call it out, and this is not a partisan thing. Last week, we held a hearing about member conduct and the need to engage from a place of respect, how we conduct ourselves as leaders, what we say, and who we engage with. That has a direct impact on what happens in our streets. It is our words, and it’s why our words and our actions as leaders are so important. Leading from a place of hate only fuels hateful and violent acts across our country. Leading with love starts with what we say, the words we use, and the meaning behind them. Words can build up communities, or break them down.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1417&quot;&gt;&lt;span data-dcnode-id=&quot;1423&quot; instrument_node=&quot;&quot;&gt;Cori Bush: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1421&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9804.25&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1422&quot; instrument_node=&quot;&quot;&gt;02:43:24&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1420&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1419&quot;&gt;&lt;span data-dcnode-id=&quot;1418&quot; instrument_node=&quot;&quot;&gt;
What we’ve witnessed over the last four years is hateful white supremacist rhetoric. While I cannot speak on behalf of the AAPI community, I do want to say that I stand in solidarity with you, so organize, galvanize, and get justice. Fight against white supremacy with us. Two nights ago, for the six Asian women who tragically lost their lives as a result of racist sentiments, racist rhetoric, and racist policies, it’s not lost on me that we lost women, working women. In fact, a majority of anti- Asian hate crimes are committed against Asian women, and you all have said that over and over again today, but as a black woman, I want to speak that point. So professor Lee, are there reports or experiences that have particularly impacted you on an emotional level? Have you had increased fear for your own safety? I want to bring the humanity into this a little bit more.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1416&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1409&quot;&gt;&lt;span data-dcnode-id=&quot;1415&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1413&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9865.11&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1414&quot; instrument_node=&quot;&quot;&gt;02:44:25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1411&quot;&gt;&lt;span data-dcnode-id=&quot;1410&quot; instrument_node=&quot;&quot;&gt;
Thank you so much for asking. Thank you for those powerful words, powerful words of solidarity, and I think all of our communities really appreciate it. I am an educator, I’m also a researcher and writer, but my real day job is to get in the classroom, or in this case, during the pandemic, just here through Zoom. And my students are traumatized, our communities are traumatized. What this brings up is lifetimes, mysteries, family histories, of trauma. Trauma that perhaps some of our families thought was over and done with because, as Mr. Gang pointed out, the popular media image is that Asian-Americans have made it and everything is okay.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1408&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1401&quot;&gt;&lt;span data-dcnode-id=&quot;1407&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1405&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9918.01&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1406&quot; instrument_node=&quot;&quot;&gt;02:45:18&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1403&quot;&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;
What the pandemic has revealed is, the stark truth that Asian-Americans and Pacific Islanders remain victims of the similar types of white supremacy, that is, it has infected our country for so long. We have people who are afraid to go about their neighborhoods, to do their daily businesses, but we also have an outpouring of new resilience, I believe, of a wake-up call, as Daniel J. Kim mentioned, a reminder that we have been here before, that we have acted out. We have organized, we have sought justice in solidarity with others, and that we’ll continue to do so.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1393&quot;&gt;&lt;span data-dcnode-id=&quot;1399&quot; instrument_node=&quot;&quot;&gt;Cori Bush: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1397&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9969.53&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;02:46:09&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1396&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1395&quot;&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;
Thank you. Mr. Yang, in addition to potential legislation, are there community actions being successfully taken to combat this anti-Asian American violence and harassment, and how best can the government support these efforts, the Federal Government?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1392&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1385&quot;&gt;&lt;span data-dcnode-id=&quot;1391&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1389&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D9985.91&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;02:46:25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1387&quot;&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt;
Thank you very much for that question. Thank you for the solidarity. Absolutely, the Federal Government can do more in terms of appropriations to make sure that these community organizations have the resources that they need, whether it is through grants, through the Office of Justice Programs at DOJ, ensuring that there is language access, ensuring that there’s multi-lingual capacities, there’s budget items for that. Those are some of the small pieces that the Federal Government can do. Certainly, the COVID-19 Hate Crimes Bill, from Representative Mang and Senator Hirono is another piece to that, along with the Jabara-Heyer NO HATE Act.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1384&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1377&quot;&gt;&lt;span data-dcnode-id=&quot;1383&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1381&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10018.66&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;02:46:58&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1380&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1379&quot;&gt;&lt;span data-dcnode-id=&quot;1378&quot; instrument_node=&quot;&quot;&gt;
I apologize, but I do need to go to one prior statement that Representative Garcia made about statements by senators. One report that we received on our website tracking hate, this person reported, “My dad and I were stopped at a red light when my dad noticed a man on the sidewalk. That man came up to me, called me a beep,” a female, so I’m not going to use the word, “a few times and then threatened to kick our teeth in. He did this while calling us disgusting mother effers, and telling us we need to stop eating bats and bringing disease over here.” So yes, words matter, words of our leaders matter. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;
