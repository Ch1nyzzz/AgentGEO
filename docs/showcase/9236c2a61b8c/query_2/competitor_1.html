Yes, thank you. And Mr. Chair, I ask consent to enter into the record, a document from the Asian-American table that details the kinds of programming that are crucial in this moment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1361&quot;&gt;&lt;span data-dcnode-id=&quot;1367&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1365&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10065.55&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1366&quot; instrument_node=&quot;&quot;&gt;02:47:45&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1364&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1363&quot;&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;

Thank you, and I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;

Chairman, thank you so very much. Let me very quickly say that all of us went into a extensive moment of mourning for the loss of those women and men, and others in the killings in Atlanta, but we cannot ignore, we cannot be un-sisterly and un-brotherly-like, to not notice the fact that they were innocent and six were Asian women. Asian-Americans, our sisters, we will not ignore. I would like to have a video shown right now.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;

A three-year-old baby cut, a father cut. The assailant did this heinous act… Are we live? The assailant did this heinous act because he thought the family was Chinese and infecting people with the Coronavirus. He thought the family was Chinese and they were infecting people with the Coronavirus. Take your heads out of the sand. Where is the dignity? Where is the power of the respect for all people and the love of Americans? As we look at the outrage, let me put into the record, the 45th President always referring to Coronavirus as the China virus or Kung Flu, let me call his name, President Trump. Let me also say, in 1942, and I’m glad Congressman Matsui mentioned, that President Franklin Delano Roosevelt signing executive order 9066, which ordered the force internment of 120,000 Japanese-Americans during World War II, innocent, patriotic Americans.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1304&quot; instrument_node=&quot;&quot;&gt;

In 1982, amid a downturn in the U.S. automobile industry, the competition was blamed on Japanese companies. A Chinese-American, Vincent Chin, was beaten to death. Not one of his perpetrators experienced time in jail. And so to you, Mr. Kim, on the evening of the discovery of who did this heinous crime of killing eight people, six of them Asian women, a law enforcement officer decided to say the words, “This individual had a bad day, and this is what happened.” I have a question as well for Mr. Kulkarni, but would you, Mr. Kim, just from your gut, just from your spirit, when you hear on national television, after the murder of six Asian women, that he had a bad day, what are your thoughts?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1296&quot; instrument_node=&quot;&quot;&gt;

Thank you for your question, Representative. Well, I will tell you to start that, when I have a bad day, I think about going home, having a beer, and watching a movie with my family. I don’t think about going out and murdering eight people. It says a lot about this person that when he says that he’s trying to eliminate temptation from his life, instead of seeking help for himself, his way of eliminating temptation is to kill people, take a gun and shoot people. And when he talks about sexual temptation, what does it mean when he sees the manifestation of sexual temptation as an Asian female? These are three places, all that had an association with Asian people. If this were a synagogue or a black church and someone shot up those places, would we really be asking whether this is a hate crime or not? And would we really have the burden of proof? It’s really important, I think, that you highlight Vincent Chin, because the judge in the case of Vincent Chin said that his white murderers, of his white murderers, these are not the kind of men you put in jail.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt;

It echoes directly with what Jay Baker said when he tried to downplay the crime by saying he was having a bad day. [crosstalk 02:53:00]. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1265&quot;&gt;&lt;span data-dcnode-id=&quot;1271&quot; instrument_node=&quot;&quot;&gt;Sheila Jackson Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1269&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10381.19&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1270&quot; instrument_node=&quot;&quot;&gt;02:53:01&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1268&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1267&quot;&gt;&lt;span data-dcnode-id=&quot;1266&quot; instrument_node=&quot;&quot;&gt;
Thank you so very much, Mr. Kulkarni, if I could get this question to you, what does the data show about the impact of anti-Asian rhetoric and violence that has on the mental health of members of the community. And then just quickly, Ms. Lee, if you would just quickly, on the historical record, which we’ve seen in other populations like African-Americans who were enslaved, that 1882 law, how does it continue to negatively impact? Mr. Kulkarni, on the data very quickly. And I thank the Chairman for his indulgence, I’ll be finished after these questions. I thank him very kindly. Mr. Kulkarni?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1264&quot; instrument_node=&quot;&quot;&gt;

Yes, thank you so much for your question. We know that over 700 incidents result, included use of rhetoric against our community members, and that included virulent animosity, scapegoating, as well as anti-immigrant sentiment and racist characterization. And it has led to a 155% increase in depression and anxiety in our community members.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1256&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1249&quot;&gt;&lt;span data-dcnode-id=&quot;1255&quot; instrument_node=&quot;&quot;&gt;Sheila Jackson Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1253&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10444.41&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1254&quot; instrument_node=&quot;&quot;&gt;02:54:04&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1252&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1251&quot;&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt;
I thank you. Professor Lee, and let me indicate, Ms. Kulkarni, let me correct the record. Thank you so very much. I had stepped out when you were doing your testimony. Professor Lee, how does that historical moment [crosstalk 02:54:18]?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;

Yes, thank you, absolutely interconnected. When we are passing these first federal laws to single out an immigrant group for exclusion based on race, we are also instituting Jim Crow segregation. We are also continuing our wars and genocide of indigenous Americans. White supremacy impacts all of us. It may impact us differently, but it impacts us all the same. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1240&quot; instrument_node=&quot;&quot;&gt;

Thank you, Mr. Chairman. This is an excellent hearing. I thank you. I will commit to all of the witnesses, my commitment to anti-hate legislation, specifically dealing with Asian-Americans and really all of us, your dad and others, stand together in fighting against inequality in America. We will not have it. We will not stand for it. We stand with you. With that, I yield back, Mr. Chairman.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1232&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1217&quot;&gt;&lt;span data-dcnode-id=&quot;1223&quot; instrument_node=&quot;&quot;&gt;Tom McClintock: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1221&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10527.41&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1222&quot; instrument_node=&quot;&quot;&gt;02:55:27&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1220&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1219&quot;&gt;&lt;span data-dcnode-id=&quot;1218&quot; instrument_node=&quot;&quot;&gt;
Yeah. Yes, I would. Thank you, Mr. Chairman.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1216&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1209&quot;&gt;&lt;span data-dcnode-id=&quot;1215&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1213&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10529.71&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1214&quot; instrument_node=&quot;&quot;&gt;02:55:29&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1212&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1211&quot;&gt;&lt;span data-dcnode-id=&quot;1210&quot; instrument_node=&quot;&quot;&gt;
You’re welcome. You’re recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1208&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1201&quot;&gt;&lt;span data-dcnode-id=&quot;1207&quot; instrument_node=&quot;&quot;&gt;Tom McClintock: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1205&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10532.77&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1206&quot; instrument_node=&quot;&quot;&gt;02:55:32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1204&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1203&quot;&gt;&lt;span data-dcnode-id=&quot;1202&quot; instrument_node=&quot;&quot;&gt;
Thank you. We seem to be confusing the opposition to the Chinese government, including its actions during the Coronavirus pandemic, with hostility toward eight Americans of Asian descent. And I find that very confusing, since many Asian-Americans spread abuse to governments, including and especially, the Chinese communist regime. Hostility to that government is not hostility to its victims, quite the contrary. Yet, that seems to be the connection that many people are making today. There are despicable racists of every color, in every society, it is the baser side of human nature. But no nation has struggled harder to transcend that nature and isolate and ostracize it’s racists, than have Americans. The American founders placed principles in the Declaration of Independence that they believe would someday produce a nation of free men and women of all races and all religions, together enjoying the blessings of liberty and equal protection of our laws. Lincoln denounced any other claim as, “Having an evil tendency, if not an evil design.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1200&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1193&quot;&gt;&lt;span data-dcnode-id=&quot;1199&quot; instrument_node=&quot;&quot;&gt;Tom McClintock: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1197&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10602.15&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1198&quot; instrument_node=&quot;&quot;&gt;02:56:42&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1196&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1195&quot;&gt;&lt;span data-dcnode-id=&quot;1194&quot; instrument_node=&quot;&quot;&gt;
The violent attacks that have been cited today against Asian-Americans, are heinous, they are despicable, they are inexcusable, but there are two statistics that should add some perspective to this issue. According to the FBI’s Hate Crime Statistics Act report, of all 4,930 victims of reported hate crimes, are motivated by race or ethnicity. 48.5% were due to anti-black bias, 15.7% were due to anti-white bias, 14.1% were due to anti-Hispanic or Latino bias, and 4.4% were due to anti-Asian bias. What should make us all proud as Americans, is the fact that Asian-Americans have the highest median income of any ethnic group in America, including white Americans. Median income for Asian-Americans is 38% higher than the national median. If America were such a hate-filled, discriminatory, racist society, filled with animus against Asian-Americans, how do you explain the remarkable success of Asian-Americans in our country? [crosstalk 02:57:56].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1185&quot;&gt;&lt;span data-dcnode-id=&quot;1191&quot; instrument_node=&quot;&quot;&gt;Tom McClintock: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1189&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10675.78&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1190&quot; instrument_node=&quot;&quot;&gt;02:57:55&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1188&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1187&quot;&gt;&lt;span data-dcnode-id=&quot;1186&quot; instrument_node=&quot;&quot;&gt;
Their success should bring us all together as Americans, to celebrate the opportunities that our country offers to all who seek the blessings from liberty. It deeply saddens me that instead of uniting as Americans, this hearing seeks to divide us as Americans. Any racist sentiment, speech, or act, needs to be vigorously condemned. But to attack our society as systemically racist, a society that has produced the freest, most prosperous, and most harmonious multiracial society in human history, well, that’s an insult and it’s flat-out wrong. Shakespeare reminded us that, “We have no such mirrors as we’ll turn our hidden worthiness into our eye, we might see our shadow.” The protesters fighting for their freedom in Hong Kong, resisting their takeover by the communist government of China, waved American flags as a symbol of their aspirations. Perhaps we should look to them as a mirror to appreciate our own society’s hidden worthiness. And I’d ask Dr. Fa, if he’s still in the committee room, for any thoughts he might have on the subject.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1184&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;1089&quot;&gt;&lt;span data-dcnode-id=&quot;1095&quot; instrument_node=&quot;&quot;&gt;Pramila Jayapal: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1093&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10901.58&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1094&quot; instrument_node=&quot;&quot;&gt;03:01:41&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1092&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1091&quot;&gt;&lt;span data-dcnode-id=&quot;1090&quot; instrument_node=&quot;&quot;&gt;
Mr. Chairman, thank you so much for including me in this hearing and for yielding your time. I want to start by saying some names, some names that we all should be saying every minute of every day and there’re just a few, Delaina Ashley Yaun, Paul Andre Michel’s, Xiaojie Tan, Daoyou Feng, Elcias Hernandez-Ortiz, Julie Park, Hyun-jeong Park. These were people who were murdered in Georgia, just a couple of days ago. And Mr. Chairman, I would just say as an Indian immigrant woman, the first South Asian-American elected to the House of Representatives, the violence and discrimination targeting the Asian-American community hits very close to home. And it’s been a difficult hearing, an important hearing, but a very difficult hearing for many of us. Shortly after 9/11, I founded OneAmerica, Washington State’s largest immigrant rights group, initially to fight back against backlash, targeting Muslim Sikh and South Asian communities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1088&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1081&quot;&gt;&lt;span data-dcnode-id=&quot;1087&quot; instrument_node=&quot;&quot;&gt;Pramila Jayapal: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1085&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D10956.77&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1086&quot; instrument_node=&quot;&quot;&gt;03:02:36&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1084&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1083&quot;&gt;&lt;span data-dcnode-id=&quot;1082&quot; instrument_node=&quot;&quot;&gt;
Back then, it was Balbir Singh Sodhi who was murdered on September 15th, 2001 in Mesa, Arizona. He was shot five times by a man who just, “Wanted to kill a Muslim.” A man who said, as he was arrested, “I stand for America all the way.” Mr. Chairman, there is no question that our words matter, our framing matters, and particularly as members of Congress, when we use our platforms to continue slurs that are seen in a way that encourages racist hate crimes, it is a big problem. Just recently in a committee hearing, some of my colleagues across the aisle continued to call it the China virus. I spoke up, I said that was not correct language, number one, and number two, it incited this kind of hate. And yet, my colleagues continued to use that language. And now here we are continuing to see a huge surge in hate crimes and violence targeting, in particular, most recently, Asian women. I want to start with you, Professor Motomura, how does the history of racist laws that promoted distrust towards Asian-Americans, influence the hate we are seeing today?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1080&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1073&quot;&gt;&lt;span data-dcnode-id=&quot;1079&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1077&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D11031.44&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1078&quot; instrument_node=&quot;&quot;&gt;03:03:51&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1076&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1075&quot;&gt;&lt;span data-dcnode-id=&quot;1074&quot; instrument_node=&quot;&quot;&gt;
Well, those influences are very profound. We start with the Chinese exclusion era, it’s exclusion, as we’ve heard today, exclusion of Asian immigrants, most Asian immigrants. Oh, I’m sorry, Chinese immigrants starting in 1882, it prevails for 60 years. It stunts the growth in the Chinese-American community. We have severe restrictions on Asian immigration, formal restrictions until 1965. I feel, as I mentioned, my testimony is very strongly because my own family was one of the few families that managed to get to the United States during that period. We joined a community that really didn’t exist at that time, of my parents’ contemporaries. These are things that you carry with you for your whole life.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1072&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1065&quot;&gt;&lt;span data-dcnode-id=&quot;1071&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1069&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D11082.68&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1070&quot; instrument_node=&quot;&quot;&gt;03:04:42&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1068&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1067&quot;&gt;&lt;span data-dcnode-id=&quot;1066&quot; instrument_node=&quot;&quot;&gt;
I remember a lot of the sorts of incidents that we’re talking about today, having close calls and those sorts of things. And this is a long time ago, but things that we see from those laws, I think we’ve seen this with regard to the ban that was imposed on majority Muslim countries, that prevailed over the last four years. And I think that’s not exactly entirely what we’re talking about today, but I think it’s very closely-related. I think that a lot of this is something that prevails over time, this is not something that is [inaudible 03:05:18] to a five-year period or 10-year period, but I think we’re still seeing effects, as we’ve seen today, of anti-Chinese laws that took effect in 1875 and 1882.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1064&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1057&quot;&gt;&lt;span data-dcnode-id=&quot;1063&quot; instrument_node=&quot;&quot;&gt;Pramila Jayapal: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1061&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D11130.67&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1062&quot; instrument_node=&quot;&quot;&gt;03:05:30&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1060&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1059&quot;&gt;&lt;span data-dcnode-id=&quot;1058&quot; instrument_node=&quot;&quot;&gt;
Thank you, Professor. Professor Sinnar, you have written about 9/11 and the discriminatory laws and policies against Asian-American, Arab, Muslim, and Sikh communities that came after. Do you believe that there’s a strategy behind demonizing these groups in times of crisis and fear?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1056&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1049&quot;&gt;&lt;span data-dcnode-id=&quot;1055&quot; instrument_node=&quot;&quot;&gt;Shirin Sinnar: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1053&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D11149.37&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1054&quot; instrument_node=&quot;&quot;&gt;03:05:49&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1052&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1051&quot;&gt;&lt;span data-dcnode-id=&quot;1050&quot; instrument_node=&quot;&quot;&gt;
Thank you for your comments and your question to me, Representative Jayapal. What happened after 9/11, was that the government undertook a number of dragnet immigration programs that treated entire communities as threats. Hundreds of immigrants were detained on the basis of their race and ethnicity, without an individual basis for suspicion. 25 Muslim countries, their citizens were subject to special registration, fingerprinting, and interrogation. And all of this sent the message that Muslim, Arab, and South Asian communities were disloyal and threatening. And the lesson here is that, in times of geopolitical tension and security fears, it’s especially important for the government to avoid stigmatizing entire communities, because it does lead to greater violence and discrimination, both in the public sphere as well as [inaudible 03:06:44] policy directly.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1048&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1041&quot;&gt;&lt;span data-dcnode-id=&quot;1047&quot; instrument_node=&quot;&quot;&gt;Pramila Jayapal: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1045&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D11205.55&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1046&quot; instrument_node=&quot;&quot;&gt;03:06:45&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1044&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1043&quot;&gt;&lt;span data-dcnode-id=&quot;1042&quot; instrument_node=&quot;&quot;&gt;
Thank you. I just want to say, I hope that my colleagues understand their words matter and we need everyone’s help in fighting back against these racist attacks. Thank you, Mr. Chairman, I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1040&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1033&quot;&gt;&lt;span data-dcnode-id=&quot;1039&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1037&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D11221.05&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1038&quot; instrument_node=&quot;&quot;&gt;03:07:01&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1036&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1035&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;
I yield back. Thank you. That concludes today’s hearing and I want to thank all of our witnesses. It was a spectacular panel, a lot of knowledge, a lot of information that was important to be dispensed. And I think we did a lot of good today, I hope so. And it brought Hawaii Five-O’s theme song back to my mind, which has been playing over and over and over and over again. Without objection, all members will have five legislative days to submit additional written questions for the witnesses or additional materials for the record. With that, the hearing is adjourned. (silence) We brought context in which we hold today’s hearing on the Constitutional framework for Congress’s ability to uphold standards for member conduct. Events of the last few months have put members of Congress on edge, and the emotional repercussions of these events continue to ripple through the House of Representatives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1025&quot;&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;1029&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D11450.36&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;03:10:50&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;1027&quot;&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt;
To be absolutely clear, my hope in holding this hearing is not to increase the tension inside the people’s House, an institution that we all proudly serve in. Rather, I hope this hearing will serve as a productive exercise in educating ourselves and the public, about the scope of Congress’s authority to maintain discipline within its own rights, as informed by relevant precedents and policy considerations. Let me clear what this hearing is not about. We are not here to adjudicate allegations about potential wrongdoing against specific colleagues, nor are we here to speculate about what punishments could be meted out against any of our colleagues, nor are we here to pass judgment on who does or does not meet minimum qualifications for office, which is also, constitutionally-speaking, not a question of member discipline. These questions are outside of the jurisdiction of the sub-committee. Article 1, Section 5, Clause 2, of the Constitution provides that each house of Congress may determine the rules of its procedures.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;
