&lt;/span&gt;&lt;div class=&quot;fl-callout-text&quot; data-dcnode-id=&quot;1023&quot;&gt;&lt;p data-dcnode-id=&quot;3993&quot;&gt;&lt;span data-dcnode-id=&quot;3999&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3997&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D0.03&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3998&quot; instrument_node=&quot;&quot;&gt;00:00&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3996&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3995&quot;&gt;&lt;span data-dcnode-id=&quot;3994&quot; instrument_node=&quot;&quot;&gt;
Well, liberties will come to order. Without objection, the chair is authorized at the fair recess to the subcommittee at any time. I welcome everyone to today’s hearing on discrimination and violence against Asian-Americans. Before we begin this meeting, I would like to ask that we have a moment of silence in memory of the individuals tragically killed, murdered in Atlanta, Georgia. Thank you. I’d like to remind members that we have established an email address and distribution list dedicated to circulating exhibits, motions, or other written materials and members may want to offer as part of our hearing today. If you’d like to submit those materials, site is judiciarydocs@mail.house.gov, we will distribute them to the members and staff as quickly as possible. Also, I ask unanimous consent that our judiciary committee colleagues, Representatives [inaudible 00:00:59] participate in today’s hearing. Hearing no objection, I welcome into our subcommittee. You’ll be able to question our witnesses if they are yielded time by subcommittee members.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3992&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3985&quot;&gt;&lt;span data-dcnode-id=&quot;3991&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3989&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D67.83&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3990&quot; instrument_node=&quot;&quot;&gt;01:07&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3988&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3987&quot;&gt;&lt;span data-dcnode-id=&quot;3986&quot; instrument_node=&quot;&quot;&gt;
Finally, I would ask all members, both those in person and those appearing remotely to mute your microphones when you’re not speaking, this will help prevent feedback and other technical issues and unmute yourself when you are recognized. I’ll now recognize myself for an opening statement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3984&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3977&quot;&gt;&lt;span data-dcnode-id=&quot;3983&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3981&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D83.45&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3982&quot; instrument_node=&quot;&quot;&gt;01:23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3980&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3979&quot;&gt;&lt;span data-dcnode-id=&quot;3978&quot; instrument_node=&quot;&quot;&gt;
While there’s still many details to be learned about Tuesday’s horrific shootings in Atlanta, that left eight people dead, six of them, reportedly Asian descent, one thing is certain. For many Asian Americans, Tuesday’s shocking events felt like the inevitable culmination of a year in which they were nearly 3,800 reported incidents of anti-Asian hate incidents that grew increasingly more violent over time as the COVID-19 pandemic worsen and some people wrongly blamed Asian-Americans or implied such by calling it the China Virus. These incidents include cases of verbal harassment, being spat at, slapped in the face, lit on fire, slashed with a box cutter, or shoved violently to the ground. And that number of reported incidents is just likely the tip of the iceberg.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3976&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3969&quot;&gt;&lt;span data-dcnode-id=&quot;3975&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3973&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D134.89&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3974&quot; instrument_node=&quot;&quot;&gt;02:14&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3972&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3971&quot;&gt;&lt;span data-dcnode-id=&quot;3970&quot; instrument_node=&quot;&quot;&gt;
I want to make clear that all Asian-Americans who are understandably feeling hurt and afraid right now, and wondering whether anyone else in America cares, that Congress sees you, we stand with you and we would do everything in our power to protect you. Any Asian hate did not begin with the COVID-19 pandemic and it will not end when the pandemic is over. All the pandemic did was exacerbate latent anti Asian prejudices that have a long and ugly history in America. It also provided an excuse for some to act on those prejudices. In fact, there’ve been discrimination against lots of people in this country and all of that has been exacerbated, but the Asian situation has been the most extreme.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3968&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3961&quot;&gt;&lt;span data-dcnode-id=&quot;3967&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3965&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D178.81&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3966&quot; instrument_node=&quot;&quot;&gt;02:58&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3964&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3963&quot;&gt;&lt;span data-dcnode-id=&quot;3962&quot; instrument_node=&quot;&quot;&gt;
Pandemics, wars, geopolitical tensions, and economic competition, and the fear and resentment that these situations create have historically provided the conditions for anti-Asian racism and xenophobia to take root, often leading to tragic consequences for Asian-Americans. For example, social and economic resentment against Chinese laborers in the 1800s led to the enactment of Chinese Exclusion Act of 1882, which barred nearly all immigration from China. And the 1924 immigration act effectively barred immigration from all Asian countries. In 1942, the United States government committed the most sweeping violation of civil liberties and American history, other than slavery itself, when it ordered the forest interment of 120,000 Japanese Americans, many of them second and third generation Americans during the second World War based, not on any legitimate national security concerns, but on the racist and xenophobic assumption that Americans of Japanese ancestry would be disloyal. In 1982, Chinese American Vincent Chen was beaten to death by two white auto workers because attackers thought he was Japanese and therefore, responsible for the decline of the US automobile industry.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3960&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3953&quot;&gt;&lt;span data-dcnode-id=&quot;3959&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3957&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D249.11&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3958&quot; instrument_node=&quot;&quot;&gt;04:09&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3956&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3955&quot;&gt;&lt;span data-dcnode-id=&quot;3954&quot; instrument_node=&quot;&quot;&gt;
On September 15, 2001, Balbir Singh Sodhi, a Sikh gas station owner in Arizona was murdered by a man who blamed him for the 9/11 terrorist attacks. To this list, we now add the most recent victims of anti-Asian hate as Asian-Americans are wrongfully blamed for the COVID-19 pandemic. While many of the recent any Asian incidents may not meet legal definition of hate crime, these attacks nonetheless create an unacceptable environment of fear and terror and Asian-American communities. Attacks like the one on 84 year old Vicha Ratanapakdee on January 28 of this year, was on a walk in his neighborhood, he was walking in his neighborhood. He was violently slammed to the ground. He died a few days later from the brain trauma that he sustained. And now I’d like to play a video of that attack caught by a nearby surveillance camera.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3945&quot;&gt;&lt;span data-dcnode-id=&quot;3951&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3949&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D316.82&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3950&quot; instrument_node=&quot;&quot;&gt;05:16&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3948&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3947&quot;&gt;&lt;span data-dcnode-id=&quot;3946&quot; instrument_node=&quot;&quot;&gt;
Sadly, this incident was one of several recent ones where elderly Asian-Americans were similarly knocked violently to the ground. Left unchecked, racist attitudes, stoked by racist rhetoric can have deadly consequences for innocent people, as we’ve just witnessed in that sad clip. In such a fraught time as the ones that we’re living in is incumbent on all public officials, elected or otherwise, and public figures to speak out against the irrational hatreds and prejudices that could overtake society in the face of a national emergency.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3944&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3937&quot;&gt;&lt;span data-dcnode-id=&quot;3943&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3941&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D348.96&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3942&quot; instrument_node=&quot;&quot;&gt;05:48&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3940&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3939&quot;&gt;&lt;span data-dcnode-id=&quot;3938&quot; instrument_node=&quot;&quot;&gt;
In short, words matter. Indeed, the wrong words can be very harmful leaders who promote stereotypes or use rhetoric aimed at a particular ethnic or racial group can cause increases in levels of discrimination or violence directed against that group. When politicians use terms like China Virus or Kung Flu, to refer COVID-19 is the effect, intentional or not, putting a target on the backs of all Asian-Americans.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3936&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3929&quot;&gt;&lt;span data-dcnode-id=&quot;3935&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3933&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D383.8&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3934&quot; instrument_node=&quot;&quot;&gt;06:23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3932&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3931&quot;&gt;&lt;span data-dcnode-id=&quot;3930&quot; instrument_node=&quot;&quot;&gt;
Used the right way, however, words from our leaders can help calm fears, reassure those feeling under threat, and remind everyone that we all share the same basic negativity as human beings and that we should treat each other accordingly. Thankfully, we had two panels of witnesses who can help show us the way forward, particularly with their testimony. As best we can tell this the last time it was a congressional hearing, specifically focused on anti-Asian hate was in 1987, before this subcommittee. That hearing took place during another time when economic and social problems were being blamed on an Asian country and by unfair extension, Asian-Americans. We can’t ever forget Asian-Americans, not Asians, Asian-Americans. Clearly more work needs to be done and let us use this hearing as a chance to do better.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3921&quot;&gt;&lt;span data-dcnode-id=&quot;3927&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3925&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D435.62&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3926&quot; instrument_node=&quot;&quot;&gt;07:15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3924&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3923&quot;&gt;&lt;span data-dcnode-id=&quot;3922&quot; instrument_node=&quot;&quot;&gt;
Now, like to recognize… Because the ranking member’s not here, Mr. Roy, you’re taking his place.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3920&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3913&quot;&gt;&lt;span data-dcnode-id=&quot;3919&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3917&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D441.05&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3918&quot; instrument_node=&quot;&quot;&gt;07:21&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3916&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3915&quot;&gt;&lt;span data-dcnode-id=&quot;3914&quot; instrument_node=&quot;&quot;&gt;
Yes, sir.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3905&quot;&gt;&lt;span data-dcnode-id=&quot;3911&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3909&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D442.06&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3910&quot; instrument_node=&quot;&quot;&gt;07:22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3908&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3907&quot;&gt;&lt;span data-dcnode-id=&quot;3906&quot; instrument_node=&quot;&quot;&gt;
In lieu of Mr. Johnson, Mr. Chip Roy of Texas, will give the statement for the minority as the ranking member. You’re recognized for five minutes, Mr. Roy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3904&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3897&quot;&gt;&lt;span data-dcnode-id=&quot;3903&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3901&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D452.08&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3902&quot; instrument_node=&quot;&quot;&gt;07:32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3900&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3899&quot;&gt;&lt;span data-dcnode-id=&quot;3898&quot; instrument_node=&quot;&quot;&gt;
Well, thank you, Chairman Cohen, and appreciate our gathering here today. This is obviously an important subject matter and to be clear, all Americans deserve protection and to live in a free and secure society. And the fundamental nature of what we expect out of government, right? Secure the blessings of Liberty as we say in the Constitution of the United States. The victims of race-based violence and their families deserve justice. And this is the case, what we’re talking about here with the tragedy, what we just saw occur in Atlanta, Georgia, I would also suggest that the victims of cartels moving illegal aliens deserve justice, the American citizens in South Texas that are getting absolutely decimated by what’s happening on our Southern border, deserve justice, the victims of riding alluding in the streets last week, businesses closed burned last summer deserve justice. We believe in justice, right?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3896&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3889&quot;&gt;&lt;span data-dcnode-id=&quot;3895&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3893&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D505.82&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3894&quot; instrument_node=&quot;&quot;&gt;08:25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3892&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3891&quot;&gt;&lt;span data-dcnode-id=&quot;3890&quot; instrument_node=&quot;&quot;&gt;
There’s old sayings in Texas about find all the rope in Texas and get a tall Oak tree. We take justice very seriously, and we ought to do that. Round up the bad guys. That’s what we believe. My concern about this hearing is that it seems to want to venture into the policing of rhetoric in a free society, free speech, and away from the rule of law and taken bad guys. And as a former federal prosecutor, I’m kind of predisposed and wired to want to go take out bad guys. And that’s bad guys of all colors, that’s bad guys of all persuasions, that’s bad guys targeting people for all different reasons. And I think we need to be mindful of that.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3881&quot;&gt;&lt;span data-dcnode-id=&quot;3887&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3885&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D555.86&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3886&quot; instrument_node=&quot;&quot;&gt;09:15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3884&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3883&quot;&gt;&lt;span data-dcnode-id=&quot;3882&quot; instrument_node=&quot;&quot;&gt;
And so now we’re talking about whether talking about China, the Chi Coms, the Chinese communist party, whatever phrasing we want to use. And if some people are saying, “Hey, we think those guys are the bad guy guys.” For whatever reason. And let me just stay clearly, I do. I think the Chinese Communist Party, running the country of China, I think they’re the bad guys. And I think that they are harming people and I think they are engaging in modern day slavery and I think that what they’re doing to Uighurs and I think what they’re doing targeting our country, and I think that what they’re doing to undermine our national security, and what they’re doing to steal our intellectual property, and what they’re doing to build up their military and rattle throughout the Pacific, I think it’s patently evil and deserving of condemnation. And I think that what they did to hide the reality of this virus, this is equally deserving of condemnation.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3873&quot;&gt;&lt;span data-dcnode-id=&quot;3879&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3877&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D614.33&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3878&quot; instrument_node=&quot;&quot;&gt;10:14&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3876&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3875&quot;&gt;&lt;span data-dcnode-id=&quot;3874&quot; instrument_node=&quot;&quot;&gt;
There’s hardly any getting around that that in fact happened, right? We’ve got the World Health Organization on Twitter saying, “Preliminary investigation conducted by the Chinese authorities have found no clear evidence of human to human transmission of the novel coronavirus.” WHO had to go back and redo all of that. We know full well. I’ve got a bill that I introduced to posthumously award, a Congressional Gold Medal to Dr. Li Wenliang for coming out and exposing what the Chinese communist government had done to hide the virus.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3872&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3865&quot;&gt;&lt;span data-dcnode-id=&quot;3871&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3869&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D646.85&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3870&quot; instrument_node=&quot;&quot;&gt;10:46&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3868&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3867&quot;&gt;&lt;span data-dcnode-id=&quot;3866&quot; instrument_node=&quot;&quot;&gt;
Dr. Wenliang was a 34 year old ophthalmologist in Wuhan, China, who died from the 2019 coronavirus after he sought to draw attention to the spread of the virus. Research indicates the first patient infected exhibited symptoms in early December, 2019. On January 3rd, after raising concerns about the spread Dr. Wenliang and seven other doctors were detained and questioned by Chinese officials. He was forced to sign a statement retracting his warnings and confessing he spread illegal rumors. That’s the reality and then he ended up dying, but he was beaten. They were targeted for engaging in free speech, for trying to bring to light what was happening.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3864&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3857&quot;&gt;&lt;span data-dcnode-id=&quot;3863&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3861&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D683.39&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3862&quot; instrument_node=&quot;&quot;&gt;11:23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3860&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3859&quot;&gt;&lt;span data-dcnode-id=&quot;3858&quot; instrument_node=&quot;&quot;&gt;
And that’s the reality of what I tend to refer to as the Chi Coms. And I’m not going to be ashamed of saying I oppose the Chi Coms, I oppose the Chinese Communist Party. And when we say things like that, and we’re talking about that, we shouldn’t be worried about having a committee of members of Congress policing our rhetoric because some evil doers go engage in some evil activity as occurred in Atlanta, Georgia. Because when we start policing free speech, we’re doing the very thing that we’re condemning when we condemn what the Chinese Communist Party does to their country. And that’s exactly where this wants to go. This is the road this wants to head down, and nothing could be more dangerous than going down that road because who decides what is hate? Who decides what is the kind of speech that deserves policing? A panel? Panel of this body? A panel in the executive branch? A panel in the Department of Justice?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3849&quot;&gt;&lt;span data-dcnode-id=&quot;3855&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3853&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D752.95&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3854&quot; instrument_node=&quot;&quot;&gt;12:32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3852&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3851&quot;&gt;&lt;span data-dcnode-id=&quot;3850&quot; instrument_node=&quot;&quot;&gt;
And then what does that mean? Who’s deciding when we get into making crimes out of thought crimes out of speech, as opposed to crimes out of the actions of evildoers? Find those who perpetrated what happened in Atlanta. Find those who engage in hate of all forms and punish the absolute hell out of them. But don’t go around policing thought. And then, I have one other thing. I hope today’s hearings will examine discrimination against Asian-Americans in educational settings, a matter that the Trump administration prioritized took seriously and acted upon. In October, for example, the department of justice sued Yale for race and national origin discrimination after determining that Yale was noncompliant with Title Six of the ’64 Civil Rights Act, which prohibits federal financial assistance to any program engaged in racially discriminatory practices.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3848&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3841&quot;&gt;&lt;span data-dcnode-id=&quot;3847&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3845&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D805.36&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3846&quot; instrument_node=&quot;&quot;&gt;13:25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3844&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3843&quot;&gt;&lt;span data-dcnode-id=&quot;3842&quot; instrument_node=&quot;&quot;&gt;
Following a two year investigation, the Department of Justice concluded that Asian American and white students have only one 10th to one fourth of the likelihood of admissions as African-American applicants with comparable academic credentials. The Justice Department alleged that Yale discriminated against Asian-Americans by favoring certain applicants based upon the race, rather than looking for race-neutral alternatives to achieve the university’s goals. As then Assistant Attorney General for the Civil Rights Division explained, “All persons who apply for admission to colleges and universities should expect to know that they will be judged by their character, talents and achievements and not the color of their skin. To do otherwise, to permit our institutions to foster stereotypes, bitterness, and division.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3833&quot;&gt;&lt;span data-dcnode-id=&quot;3839&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3837&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D843.1&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3838&quot; instrument_node=&quot;&quot;&gt;14:03&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3836&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3835&quot;&gt;&lt;span data-dcnode-id=&quot;3834&quot; instrument_node=&quot;&quot;&gt;
I couldn’t agree more. However, only two weeks into president Biden’s term, the Biden ministration suddenly reversed course and dropped the lawsuit against Yale. Mr. Chairman, I’ll close, but I’ll just say, I hope this is the direction we’ll go. I hope we’ll look at this. And we’ll look through the lens of clarity and objective truth, trying to seek justice and not trying to police speech and trying to the objectives we want to achieve. And I thank the chairman.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3832&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3825&quot;&gt;&lt;span data-dcnode-id=&quot;3831&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3829&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D865.72&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3830&quot; instrument_node=&quot;&quot;&gt;14:25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3828&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3827&quot;&gt;&lt;span data-dcnode-id=&quot;3826&quot; instrument_node=&quot;&quot;&gt;
Thank you, Mr. Roy. And before I recognize the chairman for his statement, I just like to reiterate that while speech is important and it has meaning, the incidents I mentioned in my opening statement were being spat at, slapped in the face, lit on fire, slashed with a box cutter, and shoved violently to the ground as the video showed. That’s not speech.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3824&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3817&quot;&gt;&lt;span data-dcnode-id=&quot;3823&quot; instrument_node=&quot;&quot;&gt;Mr. Roy: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3821&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D887.51&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3822&quot; instrument_node=&quot;&quot;&gt;14:47&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3820&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3819&quot;&gt;&lt;span data-dcnode-id=&quot;3818&quot; instrument_node=&quot;&quot;&gt;
Well, just a reminder, I didn’t suggest it was speech.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3809&quot;&gt;&lt;span data-dcnode-id=&quot;3815&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3813&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D891.16&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3814&quot; instrument_node=&quot;&quot;&gt;14:51&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3812&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3811&quot;&gt;&lt;span data-dcnode-id=&quot;3810&quot; instrument_node=&quot;&quot;&gt;
That’s not speech, that’s action. I’d like to recognize the chairman for his opening statement, Mr. Nadler.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3808&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3801&quot;&gt;&lt;span data-dcnode-id=&quot;3807&quot; instrument_node=&quot;&quot;&gt;Mr. Nadler: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3805&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D898.77&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3806&quot; instrument_node=&quot;&quot;&gt;14:58&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3804&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3803&quot;&gt;&lt;span data-dcnode-id=&quot;3802&quot; instrument_node=&quot;&quot;&gt;
Thank you. Mr. Chairman, we’re here today to address the horrific rise in violence, harassment, and discrimination against Asian-Americans that is surging across the country. As we convene this hearing, our thoughts are with the victims, but especially the Asian-American victims in Georgia who were brutally murdered on Tuesday night. Although the motive is still to be investigated, the effect on the Asian American community has been profound. And it is certainly appropriate for us to address the fear gripping the Asian American community. So I want to thank the chairman for convening this hearing. Hate crimes and hate incidents against Asian Americans have been on the rise since 2017. Last year alone, nearly 3,800 incidents were reported, with about 68% of Asian-Americans reporting that they have experienced racial slurs or verbal harassment since the pandemic began. Distressingly, one of the largest increases in the country of hatred and violence against Asian-Americans has occurred in my own congressional district in New York City. This short clip shows just some of the verbal and physical abuse many Asian Americans have faced in recent years.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3800&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3793&quot;&gt;&lt;span data-dcnode-id=&quot;3799&quot; instrument_node=&quot;&quot;&gt;News Anchor: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3797&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D972.99&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3798&quot; instrument_node=&quot;&quot;&gt;16:12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3796&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3795&quot;&gt;&lt;span data-dcnode-id=&quot;3794&quot; instrument_node=&quot;&quot;&gt;
A wave of violent, unprovoked attacks against Asian-Americans consuming the city of New York. A 56 year old man in Manhattan this week, pummeled for no apparent reason. A man riding the subway, sliced across his face from cheek to cheek. A woman viciously shoved in Queens. A 71 year old woman punched in her face in Chinatown. A 36 year old man stabbed in the back, now fighting to stay alive.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3785&quot;&gt;&lt;span data-dcnode-id=&quot;3791&quot; instrument_node=&quot;&quot;&gt;Mr. Nadler: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3789&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D1000.32&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3790&quot; instrument_node=&quot;&quot;&gt;16:40&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3788&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3787&quot;&gt;&lt;span data-dcnode-id=&quot;3786&quot; instrument_node=&quot;&quot;&gt;
Last February, a woman was hit in the face on the subway and called diseased. Last March, a Chinese American dad from Queens and his 10 year old son were harassed and attacked by an assailant was screaming at him for appearing to be Chinese. Last April, an Asian-American woman in Brooklyn suffered significant burns after a chemical attack. Last July, an 89 year old grandmother in Bensonhurst was attacked and set on fire by two men. Just last month, a New Yorker was slashed across the face with a box cutter. He needed more than a hundred stitches. Also last month, in separate incidents on the same day, two elderly women were punched in the face on the subway. A few weeks ago, a man was stabbed outside of the federal courthouse. Just this Tuesday, a woman in Midtown had an unknown liquid poured on her neck. As she was picking up packages. The common denominator, all of the victims were Asian-American or Asian descent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3784&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3777&quot;&gt;&lt;span data-dcnode-id=&quot;3783&quot; instrument_node=&quot;&quot;&gt;Mr. Nadler: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3781&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D1064.09&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3782&quot; instrument_node=&quot;&quot;&gt;17:44&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3780&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3779&quot;&gt;&lt;span data-dcnode-id=&quot;3778&quot; instrument_node=&quot;&quot;&gt;
These are our neighbors, our friends, our family members, our constituents and fellow Americans and that is not only severe violence that Asian Americans in New York have had to fear, there’s also been a barrage of verbal attacks and discrimination against the community. New Yorkers have had racially derogatory remarks written onto the outside of their restaurants and flyers posted around New York City neighborhoods, blaming Asian Americans for the virus. Many of these attacks gone reported and official statistics represent only a fraction of hate crimes or hate incidents. These examples are certainly not exhaustive. And the harassment, the abuse and violence extend to communities across the country. We have witnessed Asian-Americans bloodied and beaten in stores, learned that Asian-American parents fear sending their children back to schools because of racial violence and observed harrowing videos of verbal attacks aimed at Asian-Americans in our public spaces.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3769&quot;&gt;&lt;span data-dcnode-id=&quot;3775&quot; instrument_node=&quot;&quot;&gt;Mr. Nadler: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3773&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D1122.65&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3774&quot; instrument_node=&quot;&quot;&gt;18:42&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3772&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3771&quot;&gt;&lt;span data-dcnode-id=&quot;3770&quot; instrument_node=&quot;&quot;&gt;
And perhaps even more heartbreaking, we have seen Asian American frontline workers battle, not only the pandemic, but also racism and disproportionately high death rates. It’s important to recognize that this surge did not spontaneously rise only at a fears regarding the coronavirus pandemic. Some of this blame lies squarely on political leaders who have demonized China, both because of the virus and ongoing geopolitical tensions. And in turn, Asian Americans have fallen apart way. Words have power. What we say matters. How we treat each other matters. The experts patients and standards we set and how we address this pandemic matter. The conversation we are having today is long overdue, and it is vital that Congress shine a light on this issue. Excuse me.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3768&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3761&quot;&gt;&lt;span data-dcnode-id=&quot;3767&quot; instrument_node=&quot;&quot;&gt;Mr. Nadler: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3765&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D1176.84&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3766&quot; instrument_node=&quot;&quot;&gt;19:36&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3764&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3763&quot;&gt;&lt;span data-dcnode-id=&quot;3762&quot; instrument_node=&quot;&quot;&gt;
The last congressional hearing held on violence against Asian Americans was in 1987 in this subcommittee. 34 years is too long for Congress to leave this issue untouched. Our government must thoroughly investigate and swiftly address growing tensions and violence against the Asian American community, especially in light of the pandemic because lives and livelihoods are truly at stake.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3753&quot;&gt;&lt;span data-dcnode-id=&quot;3759&quot; instrument_node=&quot;&quot;&gt;Mr. Nadler: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3757&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D1202.17&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3758&quot; instrument_node=&quot;&quot;&gt;20:02&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3756&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3755&quot;&gt;&lt;span data-dcnode-id=&quot;3754&quot; instrument_node=&quot;&quot;&gt;
Last week, we reached the one year anniversary of the COVID-19 pandemic in this country, a solemn and difficult moment for our nation as we reflected on all we have suffered and lost, but such hardship can not be used as an excuse for dismissing the pain of our fellow Americans, enabling discrimination against them, or de-valuing their sense of belonging and citizenship. Today, we are privileged to have our fellow members of Congress from both sides of the aisle, testifying about their personal experiences. In addition, we have an expert panel that will walk us through the rise in discrimination and violence and its impact on the community as well as historical perspectives and challenges to inform our legislative efforts moving forward. I look forward to hearing how we can better ensure protection, justice, and healing for our Asian American neighbors in this time of crisis and moving forward. Thank you. I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3752&quot; instrument_node=&quot;&quot;&gt;
