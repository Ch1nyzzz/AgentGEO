&lt;/span&gt;&lt;p data-dcnode-id=&quot;2945&quot;&gt;&lt;span data-dcnode-id=&quot;2951&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2949&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4571.31&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2950&quot; instrument_node=&quot;&quot;&gt;01:16:11&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2948&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2947&quot;&gt;&lt;span data-dcnode-id=&quot;2946&quot; instrument_node=&quot;&quot;&gt;
Great. We’re back. We’re back. Recess is over. No more milk and cookies. Ms. Kulkarni, you’re recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2944&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2937&quot;&gt;&lt;span data-dcnode-id=&quot;2943&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2941&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4584.97&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2942&quot; instrument_node=&quot;&quot;&gt;01:16:24&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2940&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2939&quot;&gt;&lt;span data-dcnode-id=&quot;2938&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;2929&quot;&gt;&lt;span data-dcnode-id=&quot;2935&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2933&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4590.21&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2934&quot; instrument_node=&quot;&quot;&gt;01:16:30&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2932&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2931&quot;&gt;&lt;span data-dcnode-id=&quot;2930&quot; instrument_node=&quot;&quot;&gt;
Thank you, Chairman, Ranking Member and distinguished members of the subcommittee for the opportunity to testify before you today.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2921&quot;&gt;&lt;span data-dcnode-id=&quot;2927&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2925&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4598.14&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2926&quot; instrument_node=&quot;&quot;&gt;01:16:38&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2924&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2923&quot;&gt;&lt;span data-dcnode-id=&quot;2922&quot; instrument_node=&quot;&quot;&gt;
“Go back to Wuhan and take the virus with you. You are the reason for the Coronavirus. Damn, another Asian riding with me, hope you don’t have COVID.” These are but a few examples of what Asian-Americans have experienced over the course of the last year, alongside with refusal of service, workplace discrimination, and sadly, now homicide.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2920&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2913&quot;&gt;&lt;span data-dcnode-id=&quot;2919&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2917&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4625.39&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2918&quot; instrument_node=&quot;&quot;&gt;01:17:05&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2916&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2915&quot;&gt;&lt;span data-dcnode-id=&quot;2914&quot; instrument_node=&quot;&quot;&gt;
For that reason on March 19th, 2020, my organization, Asian Pacific Policy and Planning Council, in conjunction with Chinese for Affirmative Action and San Francisco State University’s Asian-American Studies Department launched Stop AAPI Hate. In the past 11 months, we have received almost 3,800 self-reported incidents of bias and discrimination from all 50 States and the District of Columbia, making Stop AAPI Hate the nation’s leading aggregator of Asian-American hate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2905&quot;&gt;&lt;span data-dcnode-id=&quot;2911&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2909&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4657.26&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2910&quot; instrument_node=&quot;&quot;&gt;01:17:37&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2908&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2907&quot;&gt;&lt;span data-dcnode-id=&quot;2906&quot; instrument_node=&quot;&quot;&gt;
From our analysis, the following trends have emerged. 68% of incidents involve verbal harassment, 20% involve avoidance or shunning, 11% physical assault and 9% civil rights violations, including refusal of service, vandalism, workplace discrimination and discrimination in housing. The vast majority do not involve a hate crime.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2904&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2897&quot;&gt;&lt;span data-dcnode-id=&quot;2903&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2901&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4683.55&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2902&quot; instrument_node=&quot;&quot;&gt;01:18:03&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2900&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2899&quot;&gt;&lt;span data-dcnode-id=&quot;2898&quot; instrument_node=&quot;&quot;&gt;
Businesses, including grocery stores, pharmacies, and big box retail are the primary site of discrimination. This is followed by public streets and public parks. The fact that so many incidents take place at businesses is especially concerning, given that retail venues sell goods necessary for daily living, essential during a pandemic.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2896&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2889&quot;&gt;&lt;span data-dcnode-id=&quot;2895&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2893&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4705.8&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2894&quot; instrument_node=&quot;&quot;&gt;01:18:25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2892&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2891&quot;&gt;&lt;span data-dcnode-id=&quot;2890&quot; instrument_node=&quot;&quot;&gt;
Given that 35% of incidents occur in public spaces is also worrisome. These figures give credence to the anxiety felt by AAPIs that purchasing food, refilling prescriptions, or simply going on a walk might leave them vulnerable to being attacked. Our data indicates that especially vulnerable populations, including women, youth, and seniors, have reported anti-Asian hate incidents at significant rates.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2888&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2881&quot;&gt;&lt;span data-dcnode-id=&quot;2887&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2885&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4735.1&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2886&quot; instrument_node=&quot;&quot;&gt;01:18:55&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2884&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2883&quot;&gt;&lt;span data-dcnode-id=&quot;2882&quot; instrument_node=&quot;&quot;&gt;
As has been noted, 68% of incident reports come from women. This is perhaps to be expected, given the lessons learned from the Me Too movement and a survey of Stop Street Harassment, which found that 81% of women experienced street harassment in their daily lives.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2880&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2873&quot;&gt;&lt;span data-dcnode-id=&quot;2879&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2877&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4753.12&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2878&quot; instrument_node=&quot;&quot;&gt;01:19:13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2876&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2875&quot;&gt;&lt;span data-dcnode-id=&quot;2874&quot; instrument_node=&quot;&quot;&gt;
While Chinese Americans have often been the explicit target of perpetrators, they make up only 42% of individuals who reported to our site, 15% identify as Korean Americans, 9% as Vietnamese and 8% as Filipino American. We have also received reports from South Asian Americans, as well as Pacific Islanders and others, evidencing the fact that Asian Americans across ethnicities are experiencing hate and racism today with our Pacific Islander sisters and brothers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2872&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2865&quot;&gt;&lt;span data-dcnode-id=&quot;2871&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2869&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4787.63&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2870&quot; instrument_node=&quot;&quot;&gt;01:19:47&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2868&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2867&quot;&gt;&lt;span data-dcnode-id=&quot;2866&quot; instrument_node=&quot;&quot;&gt;
Sadly, the 3,800 reported to Stop AAPI Hate represent only a fraction of what has happened in this country. The widespread nature of anti-Asian hate is confirmed by a study by the Pew Research Center, released last July, that found that three in 10 Asian Americans experienced racist jokes and slurs. Similarly, a poll by the Center for Public Integrity found that 60% of Asian Americans have witnessed someone blaming our community for COVID-19.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2864&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2857&quot;&gt;&lt;span data-dcnode-id=&quot;2863&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2861&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4823.44&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2862&quot; instrument_node=&quot;&quot;&gt;01:20:23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2860&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2859&quot;&gt;&lt;span data-dcnode-id=&quot;2858&quot; instrument_node=&quot;&quot;&gt;
Before I close, I want to acknowledge the tremendous mobilization done by Asian-American groups in Georgia in response to the violence there, and read a portion of their statement, “During this time of broader crisis and trauma in our Asian-American communities, we must be guided by a compass of community care that prioritizes assessing and addressing our communities’ immediate needs, including in-language support for mental health, legal employment and immigration services. We must stand firm in decrying misogyny, systemic violence, and white supremacy.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2849&quot;&gt;&lt;span data-dcnode-id=&quot;2855&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2853&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4863.29&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2854&quot; instrument_node=&quot;&quot;&gt;01:21:03&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2852&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2851&quot;&gt;&lt;span data-dcnode-id=&quot;2850&quot; instrument_node=&quot;&quot;&gt;
In addition to sharing our data and the statement from Georgia advocates, I want to share the fact that we have been developing resources for community members who experienced incidents of hate and providing direct assistance through local networks. We are also closely working with local, state and federal policy makers to address the hate incidents that have occurred and seek to prevent additional incidents from taking place in the future.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2848&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2841&quot;&gt;&lt;span data-dcnode-id=&quot;2847&quot; instrument_node=&quot;&quot;&gt;Manjusha Kulkarni: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2845&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4889.6&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2846&quot; instrument_node=&quot;&quot;&gt;01:21:29&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2844&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2843&quot;&gt;&lt;span data-dcnode-id=&quot;2842&quot; instrument_node=&quot;&quot;&gt;
Thank you for the opportunity to testify, and I look forward to taking any questions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2840&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2833&quot;&gt;&lt;span data-dcnode-id=&quot;2839&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2837&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4894.61&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2838&quot; instrument_node=&quot;&quot;&gt;01:21:34&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2836&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2835&quot;&gt;&lt;span data-dcnode-id=&quot;2834&quot; instrument_node=&quot;&quot;&gt;
Thank you very much, and you were perfect on the five minutes. Our next witness is Erika Lee. She’s a Regents Professor of History and Asian-American Studies and the Director of the Immigration History Research Center at the University of Minnesota.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2832&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2825&quot;&gt;&lt;span data-dcnode-id=&quot;2831&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2829&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4907.12&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2830&quot; instrument_node=&quot;&quot;&gt;01:21:47&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2828&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2827&quot;&gt;&lt;span data-dcnode-id=&quot;2826&quot; instrument_node=&quot;&quot;&gt;
She’s the author of four award-winning books, including America for Americans: A History of Xenophobia in the United States, which won the 2020 American Book Award and the 2020 Asian Pacific American Award for Literature. Professor Lee received her MA and PhD in history from the University of California at Berkeley and her BA from Tufts University. Professor Lee, you are now recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2824&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2817&quot;&gt;&lt;span data-dcnode-id=&quot;2823&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2821&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4931.23&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2822&quot; instrument_node=&quot;&quot;&gt;01:22:11&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2820&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2819&quot;&gt;&lt;span data-dcnode-id=&quot;2818&quot; instrument_node=&quot;&quot;&gt;
Thank you so much, Chairman Cohen and members of the committee. I’m so honored to join you. I also want to thank all of the congressional staffers who have helped to make this hearing possible.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2816&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2809&quot;&gt;&lt;span data-dcnode-id=&quot;2815&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2813&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4942.17&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2814&quot; instrument_node=&quot;&quot;&gt;01:22:22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2812&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2811&quot;&gt;&lt;span data-dcnode-id=&quot;2810&quot; instrument_node=&quot;&quot;&gt;
As we’ve just heard from my fellow witnesses, anti-Asian racism and violence has risen alarmingly. As shocking as these incidents are, it is so vital to understand that they are not random acts perpetrated by deranged individuals. They are an expression of our country’s long history of systemic racism, targeting Asian Americans and Pacific Islanders.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2808&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2801&quot;&gt;&lt;span data-dcnode-id=&quot;2807&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2805&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4968.75&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2806&quot; instrument_node=&quot;&quot;&gt;01:22:48&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2804&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2803&quot;&gt;&lt;span data-dcnode-id=&quot;2802&quot; instrument_node=&quot;&quot;&gt;
We’ve heard in the past 24 hours, many describe anti-Asian discrimination and racial violence as un-American. Unfortunately, it is very American. This history, this American history, is over 150 years old.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2800&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2793&quot;&gt;&lt;span data-dcnode-id=&quot;2799&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2797&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4986.56&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2798&quot; instrument_node=&quot;&quot;&gt;01:23:06&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2796&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2795&quot;&gt;&lt;span data-dcnode-id=&quot;2794&quot; instrument_node=&quot;&quot;&gt;
Let me share just a few examples. In 1871, 17 Chinese were lynched by a mob of 500 in Los Angeles. This was the largest mass lynching in US history. In 1886, a mob of 1500 forced out all of Seattle’s Chinese residents. In the early 20th century, South Asians were expelled from cities and Filipino Americans and Japanese Americans were attacked.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2792&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2785&quot;&gt;&lt;span data-dcnode-id=&quot;2791&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2789&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5011.84&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2790&quot; instrument_node=&quot;&quot;&gt;01:23:31&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2788&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2787&quot;&gt;&lt;span data-dcnode-id=&quot;2786&quot; instrument_node=&quot;&quot;&gt;
Most recently in 1982, Vincent Chin, a Chinese American was beaten to death in Detroit, because his attackers thought he was Japanese and blamed him for the economic decline in the auto industry. Throughout the 1980s, attacks on Korean shop keepers and Southeast Asian refugees were widespread. After 9/11, hate crimes targeting Muslim, Middle Eastern and South Asian Americans increased by 1600%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2784&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2777&quot;&gt;&lt;span data-dcnode-id=&quot;2783&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2781&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5039.46&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2782&quot; instrument_node=&quot;&quot;&gt;01:23:59&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2780&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2779&quot;&gt;&lt;span data-dcnode-id=&quot;2778&quot; instrument_node=&quot;&quot;&gt;
As these incidents reveal Asian-Americans have been terrorized. We’ve been treated as enemies. We’ve been discriminated against. Today, we are still viewed as foreigners rather than US citizens. The government of this country has not just ignored this problem, it has been part of the problem.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2776&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2769&quot;&gt;&lt;span data-dcnode-id=&quot;2775&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2773&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5061.17&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2774&quot; instrument_node=&quot;&quot;&gt;01:24:21&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2772&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2771&quot;&gt;&lt;span data-dcnode-id=&quot;2770&quot; instrument_node=&quot;&quot;&gt;
Throughout much of our history Congress and other elected officials have promoted and legalized anti-Asian racism through its laws and its actions. In 1875, Congress passed the so-called Page Act, which effectively barred the entry of Chinese women because lawmakers believed that all Chinese women were prostitutes. In 1882, congress passed the Chinese Exclusion Act. The first federal law singling out an entire group for immigration exclusion based on race.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2768&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2761&quot;&gt;&lt;span data-dcnode-id=&quot;2767&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2765&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5091.56&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2766&quot; instrument_node=&quot;&quot;&gt;01:24:51&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2764&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2763&quot;&gt;&lt;span data-dcnode-id=&quot;2762&quot; instrument_node=&quot;&quot;&gt;
By the 1930s, all other Asian groups, Japanese, Korean, South Asians, Filipinos, were also barred from the US and prevented from becoming naturalized citizens. Asian immigration did not fully open up again until 1965. In 1942, President Roosevelt signed an executive order that allowed for the incarceration of 120,000 Japanese Americans as prisoners without trial. I want to thank Representative Matsui so much for sharing her own family’s history, so that we never forget the real consequences of racism.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2760&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2753&quot;&gt;&lt;span data-dcnode-id=&quot;2759&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2757&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5126.73&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2758&quot; instrument_node=&quot;&quot;&gt;01:25:26&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2756&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2755&quot;&gt;&lt;span data-dcnode-id=&quot;2754&quot; instrument_node=&quot;&quot;&gt;
For many years after 9/11, not just right after the terrorist attacks, but for many years after, South Asian Americans faced systemic racism in the form of profiling by government agencies. During this past year, some of our highest elected officials deliberately and consistently used racist language, tying COVID-19 to Asians. This included the phrases that we’ve been talking about this morning, “Chinese virus,” “Wuhan virus,” and also telling Americans to, “Blame China for the pandemic.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2752&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2745&quot;&gt;&lt;span data-dcnode-id=&quot;2751&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2749&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5161.69&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2750&quot; instrument_node=&quot;&quot;&gt;01:26:01&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2748&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2747&quot;&gt;&lt;span data-dcnode-id=&quot;2746&quot; instrument_node=&quot;&quot;&gt;
These words matter, especially when they repeatedly came from the White House during the previous administration. Researchers have found that the anti-Asian rhetoric promoted by leaders directly correlated with a rise in racist incidents against Asian-Americans. This history of racism is not taught in our schools.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2744&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2737&quot;&gt;&lt;span data-dcnode-id=&quot;2743&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2741&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5182.91&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2742&quot; instrument_node=&quot;&quot;&gt;01:26:22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2740&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2739&quot;&gt;&lt;span data-dcnode-id=&quot;2738&quot; instrument_node=&quot;&quot;&gt;
Instead, many Americans believe that deceptive model minority stereotype, portraying Asian-Americans only as success stories, proving that AAPIs do indeed experience structural racism and institutionalized discrimination remains a persistent challenge.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2729&quot;&gt;&lt;span data-dcnode-id=&quot;2735&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2733&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5201.51&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2734&quot; instrument_node=&quot;&quot;&gt;01:26:41&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2732&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2731&quot;&gt;&lt;span data-dcnode-id=&quot;2730&quot; instrument_node=&quot;&quot;&gt;
The last time, and seemingly the only other time in our country’s history that Congress has held hearings on anti-Asian racism was 34 years ago, before this committee. Over 20 million in number, Asian Americans are now the fastest growing racial group in the United States. We are your constituents, but we are in crisis from the multiple and disproportionate effects of the pandemic on our diverse AAPI communities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2728&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2721&quot;&gt;&lt;span data-dcnode-id=&quot;2727&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2725&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5230.02&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2726&quot; instrument_node=&quot;&quot;&gt;01:27:10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2724&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2723&quot;&gt;&lt;span data-dcnode-id=&quot;2722&quot; instrument_node=&quot;&quot;&gt;
US citizens are being told to go back to their own countries. Nurses and doctors on the front lines are subjected to racist tirades. As we’ve seen in Atlanta, Asian-owned businesses and workers are being attacked, and all of this violence, especially targets women. Like all Americans, AAPIs are struggling with the public health crisis, and the shuttered economy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2720&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2713&quot;&gt;&lt;span data-dcnode-id=&quot;2719&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2717&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5252.25&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2718&quot; instrument_node=&quot;&quot;&gt;01:27:32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2716&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2715&quot;&gt;&lt;span data-dcnode-id=&quot;2714&quot; instrument_node=&quot;&quot;&gt;
But we also have to worry about being attacked or harassed in our own neighborhoods, makes our pandemic experience even more difficult. Congress needs to act definitively and immediately to address the enduring problem of anti-Asian racism in the US. The acts facing AAPIs today are a systemic, national tragedy. They will not simply go away after the pandemic.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2712&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2705&quot;&gt;&lt;span data-dcnode-id=&quot;2711&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2709&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5279.56&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2710&quot; instrument_node=&quot;&quot;&gt;01:27:59&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2708&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2707&quot;&gt;&lt;span data-dcnode-id=&quot;2706&quot; instrument_node=&quot;&quot;&gt;
We call upon our leaders to condemn racism in all of its forms, invest in AAPI communities and support individuals who have experienced race-based violence. We cannot afford to wait another 34 years for Congress to act. Thank you very much.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2704&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2697&quot;&gt;&lt;span data-dcnode-id=&quot;2703&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2701&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5298.84&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2702&quot; instrument_node=&quot;&quot;&gt;01:28:18&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2700&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2699&quot;&gt;&lt;span data-dcnode-id=&quot;2698&quot; instrument_node=&quot;&quot;&gt;
Thank you, Professor Lee. Our next witness is Charles Lehman. Mr. Lehman is a fellow with the Manhattan Institute, working primarily on the policing and public safety initiative. He is also contributing editor of City Journal. Mr. Lehman received his BA from Yale University. Mr. Lehman, you’re recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2696&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2689&quot;&gt;&lt;span data-dcnode-id=&quot;2695&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2693&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5317.79&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2694&quot; instrument_node=&quot;&quot;&gt;01:28:37&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2692&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2691&quot;&gt;&lt;span data-dcnode-id=&quot;2690&quot; instrument_node=&quot;&quot;&gt;
Thank you to the committee for the invitation to speak today about the important issue of rising crime against Asian Americans. Many of our fellow citizens now fear for their safety in their own neighborhoods. I am glad this matter has not escaped Congress’s attention, particularly in light of Tuesday’s awful shooting outside of Atlanta. I am speaking today as a researcher focused on crime, and it is in that capacity that I want to offer two points.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2688&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2681&quot;&gt;&lt;span data-dcnode-id=&quot;2687&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2685&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5342.13&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2686&quot; instrument_node=&quot;&quot;&gt;01:29:02&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2684&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2683&quot;&gt;&lt;span data-dcnode-id=&quot;2682&quot; instrument_node=&quot;&quot;&gt;
The first is that, while some of these offenses were doubtless motivated by bias, you should be cautious when interpreting the broader trends solely as a spike in hate crimes. The second, relatedly, is that these crimes should be understood as part of a larger surgeon violence. As you aware, crime is rising in several Asian-American communities, particularly in the greater Bay Area and New York City.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2680&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2673&quot;&gt;&lt;span data-dcnode-id=&quot;2679&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2677&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5363.49&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2678&quot; instrument_node=&quot;&quot;&gt;01:29:23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2676&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2675&quot;&gt;&lt;span data-dcnode-id=&quot;2674&quot; instrument_node=&quot;&quot;&gt;
There’ve been reports of assaults, daylight robberies and general mayhem targeting Asian citizens, especially the elderly. Many have identified these offenses as hate crimes, linking them to bigoted sentiments inspired by the coronavirus pandemic. The FBI, which tracks such offenses, defines a hate crime as one motivated by an offender’s “bias against a race, religion, disability, sexual orientation, ethnicity, gender, or gender identity.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2672&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2665&quot;&gt;&lt;span data-dcnode-id=&quot;2671&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2669&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5389.68&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2670&quot; instrument_node=&quot;&quot;&gt;01:29:49&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2668&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2667&quot;&gt;&lt;span data-dcnode-id=&quot;2666&quot; instrument_node=&quot;&quot;&gt;
Last spring saw spike in hate crimes against Asian-Americans, as major cities experienced the 150% increase over 2019. This was doubtless driven by rhetoric blaming Asians for the coronavirus crisis. In the latest wave, some offenses are plainly bias motivated, like the attack in Seattle, which assailant Samuel Green told Katherine [Yeager 01:30:08] quote, “Asians need to be put in your place,” as he shoved her to the ground.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2664&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2657&quot;&gt;&lt;span data-dcnode-id=&quot;2663&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2661&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5413.22&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2662&quot; instrument_node=&quot;&quot;&gt;01:30:13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2659&quot;&gt;&lt;span data-dcnode-id=&quot;2658&quot; instrument_node=&quot;&quot;&gt;
But not all of the recent cases are so clear cut. The reason for Tuesday’s horrific shootings in Atlanta remains unclear, but police suspect it was not racially motivated. Law enforcement in both New York and Northern California are reportedly not investigating many of the high profile offenses as hate crimes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2656&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2649&quot;&gt;&lt;span data-dcnode-id=&quot;2655&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2653&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5429.35&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2654&quot; instrument_node=&quot;&quot;&gt;01:30:29&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2652&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2651&quot;&gt;&lt;span data-dcnode-id=&quot;2650&quot; instrument_node=&quot;&quot;&gt;
Other factors are likely at play. Consider Yahya Muslim, arrested for shoving three Asian adults, including a 91-year-old, in Oakland’s Chinatown. Muslim, who was homeless, has a history of mental illness, which is defense counsel blames for the attack. Counsel for Antoine Watson, who allegedly shoved and killed 84-year-old Vicha Ratanapakdee in San Francisco, has also appealed to the teenagers mental health, rejecting charges of bias.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2648&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2641&quot;&gt;&lt;span data-dcnode-id=&quot;2647&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2645&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5452.55&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2646&quot; instrument_node=&quot;&quot;&gt;01:30:52&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2643&quot;&gt;&lt;span data-dcnode-id=&quot;2642&quot; instrument_node=&quot;&quot;&gt;
Other cases start to look different given context. Filipino New Yorker Noel Quintana was a victim of a subway knife attack that some have called racially motivated, but several other non-Asian victims have also recently been slashed on the MTA, part of rising transit crime, which swept up Quintana.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2640&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2633&quot;&gt;&lt;span data-dcnode-id=&quot;2639&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2637&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5469.67&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2638&quot; instrument_node=&quot;&quot;&gt;01:31:09&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2636&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2635&quot;&gt;&lt;span data-dcnode-id=&quot;2634&quot; instrument_node=&quot;&quot;&gt;
My purpose in making these points is not to deny the role biases played in some offenses or to downplay the seriousness of anti-Asian bigotry. I want to condemn in no uncertain terms hate crimes of all sorts. They are a particularly vicious species of offense, motivated by special animus and deserving of special denunciation. No American should have to face discrimination of any kind.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2625&quot;&gt;&lt;span data-dcnode-id=&quot;2631&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2629&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5492.47&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2630&quot; instrument_node=&quot;&quot;&gt;01:31:32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2628&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2627&quot;&gt;&lt;span data-dcnode-id=&quot;2626&quot; instrument_node=&quot;&quot;&gt;
Rather, I wish to emphasize to the committee that if they analyze these offenses solely as hate crimes, they will miss critical context, and thereby, risk making under informed decisions. In particular, we cannot discuss these offenses without highlighting the past year’s violent crime rate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2624&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2617&quot;&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2621&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5507.86&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2622&quot; instrument_node=&quot;&quot;&gt;01:31:47&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2619&quot;&gt;&lt;span data-dcnode-id=&quot;2618&quot; instrument_node=&quot;&quot;&gt;
Criminologist Jeff [Asher 01:31:49] has estimated that 2020 saw the largest one-year spike in homicides on record, as murder increased by more than 30% in nearly 40 major cities. New data indicate the trend has persisted into early 2021. That pattern appears in cities where Asian residents are being attacked.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2616&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2609&quot;&gt;&lt;span data-dcnode-id=&quot;2615&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2613&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5524.93&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2614&quot; instrument_node=&quot;&quot;&gt;01:32:04&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2612&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2611&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;
In San Francisco, homicide was up 17%. In New York, homicides rose 40%, while shootings nearly doubled. In Oakland, 2020 saw the highest homicide rate in eight years, and the city’s on track for worse 2021. With 157 dead, the Atlanta Journal-Constitution called 2020 the city’s deadliest year in decades.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2601&quot;&gt;&lt;span data-dcnode-id=&quot;2607&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2605&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5545.15&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2606&quot; instrument_node=&quot;&quot;&gt;01:32:25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2604&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2603&quot;&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt;
That violence is a product of free roaming criminals. Paul Chan, head of Oakland’s Chinatown Chamber of Commerce, describes how “businesses are so fearful, they prefer to close early. We also have many juveniles driving around Chinatown and carrying guns, so they’re also hurting people before they’re being robbed.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2593&quot;&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2597&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5561.95&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2598&quot; instrument_node=&quot;&quot;&gt;01:32:41&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2596&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2595&quot;&gt;&lt;span data-dcnode-id=&quot;2594&quot; instrument_node=&quot;&quot;&gt;
This is description, not eight crimes, but of out and out lawlessness. This behavior seems obviously tied to recent political hostility to the police. Many cities have yielded to activist demands that they slash police budgets and cut public safety services. Bigotry may have played a role in these offenses, but changing the hearts and minds of bigots is far harder from a policy maker’s perspective than preventing bigotry-driven crimes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2585&quot;&gt;&lt;span data-dcnode-id=&quot;2591&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2589&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5586.71&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2590&quot; instrument_node=&quot;&quot;&gt;01:33:06&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2588&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2587&quot;&gt;&lt;span data-dcnode-id=&quot;2586&quot; instrument_node=&quot;&quot;&gt;
If anything is to blame for the terror now plaguing Asian Americans, it’s public officials’ dereliction of their duty to preserve public safety. I urge the members of the committee to advocate restoration of public safety by pushing back on anti-police rhetoric, by supporting more federal funding for police. This is the best way to ensure that Asian Americans and all Americans can, again, walk the streets free from the fear of violent crime.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2584&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2577&quot;&gt;&lt;span data-dcnode-id=&quot;2583&quot; instrument_node=&quot;&quot;&gt;Charles Lehman: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2581&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5611.44&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2582&quot; instrument_node=&quot;&quot;&gt;01:33:31&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2580&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2579&quot;&gt;&lt;span data-dcnode-id=&quot;2578&quot; instrument_node=&quot;&quot;&gt;
Thank you, and I look forward to taking your questions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2569&quot;&gt;&lt;span data-dcnode-id=&quot;2575&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2573&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5616.29&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2574&quot; instrument_node=&quot;&quot;&gt;01:33:36&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2572&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2571&quot;&gt;&lt;span data-dcnode-id=&quot;2570&quot; instrument_node=&quot;&quot;&gt;
Thank you, Mr. Lehman. Our next witness is with us here person. That’s a nice exception. Nice of you to be here, Mr. Wencong Fa. Mr. Fa is and attorney with the Pacific Legal Foundation, litigating cases focused on free speech and equality before the law.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2568&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2561&quot;&gt;&lt;span data-dcnode-id=&quot;2567&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2565&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5634.92&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2566&quot; instrument_node=&quot;&quot;&gt;01:33:54&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2564&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2563&quot;&gt;&lt;span data-dcnode-id=&quot;2562&quot; instrument_node=&quot;&quot;&gt;
He received his JD from the University of Michigan, not in the NCAA tournament. I think. Maybe they are, I don’t know, and a masters… They are in the tournament, aren’t they? And a master’s degree in political philosophy from the London School of Economics, and a BA from the University of Texas-Dallas. Mr. Fa, you’re recognized for five minutes, sir.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2560&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2553&quot;&gt;&lt;span data-dcnode-id=&quot;2559&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2557&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5654.96&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2558&quot; instrument_node=&quot;&quot;&gt;01:34:14&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2556&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2555&quot;&gt;&lt;span data-dcnode-id=&quot;2554&quot; instrument_node=&quot;&quot;&gt;
Chairman, Ranking Member, thank you for inviting me to testify today. Before I begin, I want to say that I’m saddened by the violence committed in Georgia on Tuesday. I express my heartfelt condolences to the families of the victims.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2552&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2545&quot;&gt;&lt;span data-dcnode-id=&quot;2551&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2549&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5672.33&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2550&quot; instrument_node=&quot;&quot;&gt;01:34:32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2548&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2547&quot;&gt;&lt;span data-dcnode-id=&quot;2546&quot; instrument_node=&quot;&quot;&gt;
I never could have imagined being here today when I boarded a flight from Beijing to San Francisco 25 years ago. I knew two words of English when I got to America, “banana,” which I likely learned on the plane, and goodbye,” which my grandmother taught me in Beijing as she dropped me off at the bus stop every Sunday.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2544&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2537&quot;&gt;&lt;span data-dcnode-id=&quot;2543&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2541&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5692.13&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2542&quot; instrument_node=&quot;&quot;&gt;01:34:52&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2540&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2539&quot;&gt;&lt;span data-dcnode-id=&quot;2538&quot; instrument_node=&quot;&quot;&gt;
Since then, I became the first person in my family to receive a law degree, and I won the first case I litigated before the Supreme Court in June 2018. A few hours after I got the decision in the Supreme Court case, I went to take a citizenship test in front of an immigration officer, and I laughed when he asked me how many justices there were on the Supreme Court. I have since become a proud citizen of the United States.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2529&quot;&gt;&lt;span data-dcnode-id=&quot;2535&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2533&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5722.23&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2534&quot; instrument_node=&quot;&quot;&gt;01:35:22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2532&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2531&quot;&gt;&lt;span data-dcnode-id=&quot;2530&quot; instrument_node=&quot;&quot;&gt;
I am here today to say that racial discrimination is wrong, but when it comes to Asian-Americans in education, far too many in our government condone discrimination. this is something I’ve experienced firsthand as an attorney with the Pacific Legal Foundation, where my colleagues and I represent Asian-American families who have felt the sting of government sanctioned discrimination.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2521&quot;&gt;&lt;span data-dcnode-id=&quot;2527&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2525&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5746.35&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2526&quot; instrument_node=&quot;&quot;&gt;01:35:46&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2524&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2523&quot;&gt;&lt;span data-dcnode-id=&quot;2522&quot; instrument_node=&quot;&quot;&gt;
These families seek to vindicate the principle of equality before the law, which requires government to treat people as individuals and forbids government from treating us differently on the basis of government-sanctioned stereotypes. Last week, Pacific Legal Foundation filed a case-&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2520&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2513&quot;&gt;&lt;span data-dcnode-id=&quot;2519&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2517&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5763.8&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2518&quot; instrument_node=&quot;&quot;&gt;01:36:03&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2516&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2515&quot;&gt;&lt;span data-dcnode-id=&quot;2514&quot; instrument_node=&quot;&quot;&gt;
Types. Last week, Pacific Legal Foundation filed the case, challenging Fairfax County’s discriminatory changes to its admissions policy for Thomas Jefferson High School, or TJ as it is more commonly known. We represent a coalition of parents, including Dr. [Chen 01:36:18] a Chinese immigrant who is now a chemistry professor. His oldest daughter attends TJ, but her younger sister might not get that chance. That’s because the county replaced an objective test with a so-called holistic process designed to racially balance the student body at the expense of Asian-American students.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2505&quot;&gt;&lt;span data-dcnode-id=&quot;2511&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2509&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5802.84&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;01:36:42&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2507&quot;&gt;&lt;span data-dcnode-id=&quot;2506&quot; instrument_node=&quot;&quot;&gt;
The changes at TJ were made against the backdrop of unfounded racial stereotypes. One school board member referred to the culture at TJ as toxic. A Virginia state delegate accused Asian-Americans of being dishonest in getting their children admitted and made the baseless claim that the parents had no intention of staying in America.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2497&quot;&gt;&lt;span data-dcnode-id=&quot;2503&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2501&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5826.05&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2502&quot; instrument_node=&quot;&quot;&gt;01:37:06&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2500&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2499&quot;&gt;&lt;span data-dcnode-id=&quot;2498&quot; instrument_node=&quot;&quot;&gt;
We’re pursuing a similar case in Montgomery County, where efforts to racially balance the magnet middle schools have drastically reduced the number of Asian-American students.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2489&quot;&gt;&lt;span data-dcnode-id=&quot;2495&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2493&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5838.35&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;01:37:18&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2492&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2491&quot;&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt;
In yet another case, I represent Asian-American families in New York. My clients include Asian-American immigrants who want the opportunity for their children to earn their way into public schools like [Stuyvesant 01:37:31], Bronx Science, and Brooklyn Tech. But Mayor de Blasio stated that the majority Asian compositions of those schools was a “monumental injustice” and changed the admissions policy to make it harder for low income Asian-American students to get into those schools.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2481&quot;&gt;&lt;span data-dcnode-id=&quot;2487&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2485&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5872.4&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2486&quot; instrument_node=&quot;&quot;&gt;01:37:52&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2484&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2483&quot;&gt;&lt;span data-dcnode-id=&quot;2482&quot; instrument_node=&quot;&quot;&gt;
Pacific Legal Foundation has also filed a friend of the court brief in Students for Fair Admissions versus Harvard, a case using Harvard’s explicit use of race in a way that decreases Asian-American enrollment. This too has led to pernicious stereotypes, including college guidebooks telling Asian-American students to refrain from saying that they aspire to pursue a career in medicine or major in math or science. Apparently, those interests are too Asian.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2473&quot;&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt;Wencong Fa: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2477&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5900.7&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2478&quot; instrument_node=&quot;&quot;&gt;01:38:20&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2476&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2475&quot;&gt;&lt;span data-dcnode-id=&quot;2474&quot; instrument_node=&quot;&quot;&gt;
This is America. Government should not condone discrimination, and it must not actively engage in it. The subcommittee should continue to explore ways in which official government policy has discriminated against Asian-Americans and continue to work with Pacific Legal Foundation and others to end this racial discrimination. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2472&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2465&quot;&gt;&lt;span data-dcnode-id=&quot;2471&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2469&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5924.37&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2470&quot; instrument_node=&quot;&quot;&gt;01:38:44&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2468&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2467&quot;&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt;
Thank you for your testimony. Thank you for appearing in person. And thank you for keeping your mask up. That’s appreciated by all the committee. Our next witness is Mr. Daniel Dae Kim. Mr. Kim is an actor and producer. He’s best known for his role as Jin-Soo Kwon on the TV series, Lost, which he shared a 2006 screen actors Guild award for best ensemble. He also portrayed Chin Ho Kelly on the series Hawaii Five-O for seven seasons. Last month, together with actor Daniel Wu, he offered a $25,000 reward for information regarding a January 31 assault of a 91-year-old man in Oakland’s Chinatown, following two similar incidents, targeting elderly Asian residents. Mr. Kim received a master of fine arts degree from New York University and his undergraduate degree from Haverford College.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2457&quot;&gt;&lt;span data-dcnode-id=&quot;2463&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2461&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5972.97&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2462&quot; instrument_node=&quot;&quot;&gt;01:39:32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2460&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2459&quot;&gt;&lt;span data-dcnode-id=&quot;2458&quot; instrument_node=&quot;&quot;&gt;
