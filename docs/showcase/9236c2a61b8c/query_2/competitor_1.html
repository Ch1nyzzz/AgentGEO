Thank you very much, Mr. Chairman, Ranking Member, and members of the committee for this opportunity to testify. I’m very proud to join this distinguished panel of our colleagues, and yet, I wish it were not necessary for us to be here under such troubling circumstances to address the disturbing spike in discrimination and violence against AAPI communities across the nation. Just a couple of days ago, eight people, six of whom were women of Asian descent, were shot and killed outside of Atlanta. This latest attack stands as a horrible reminder of the fear and pain felt by the AAPI community across this country.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3552&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3545&quot;&gt;&lt;span data-dcnode-id=&quot;3551&quot; instrument_node=&quot;&quot;&gt;Congresswoman Doris Matsui: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3549&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2030.7&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3550&quot; instrument_node=&quot;&quot;&gt;33:50&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3548&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3547&quot;&gt;&lt;span data-dcnode-id=&quot;3546&quot; instrument_node=&quot;&quot;&gt;
I lived an American story. I grew up on a farm in California, went to UC Berkeley, got a great public education. I got married, settled in Sacramento with my husband. We raised our son, and I had the privilege to work in public service in the White House, and here in Congress, where we work together on issues of healthcare, and clean energy, and all the issues that really do define us as a country, but I have a responsibility and a moral obligation to speak out about the normalizing of attacks on the AAPI community.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3544&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3537&quot;&gt;&lt;span data-dcnode-id=&quot;3543&quot; instrument_node=&quot;&quot;&gt;Congresswoman Doris Matsui: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3541&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2065.07&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3542&quot; instrument_node=&quot;&quot;&gt;34:25&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3540&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3539&quot;&gt;&lt;span data-dcnode-id=&quot;3538&quot; instrument_node=&quot;&quot;&gt;
Since the beginning of the pandemic, we’ve heard constant hostile rhetoric directed at the AAPI community, including from leaders at the highest levels of our government. There is a systemic problem here, and we are duty-bound to stop the spread of xenophobic and racist ideas that have escalated to physical threats. Justice Ruth Bader Ginsburg, who fought against discrimination in her remarkable life, used to talk about her mother, and ask questions what the difference was between a bookkeeper in Brooklyn’s garment district and a Supreme Court Justice? Her answer: one generation. This kind of family history is essential to understanding American history. We all share the charge to ensure that our country not only learns from, but does not forget its past.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3536&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3529&quot;&gt;&lt;span data-dcnode-id=&quot;3535&quot; instrument_node=&quot;&quot;&gt;Congresswoman Doris Matsui: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3533&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2114.41&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3534&quot; instrument_node=&quot;&quot;&gt;35:14&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3532&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3531&quot;&gt;&lt;span data-dcnode-id=&quot;3530&quot; instrument_node=&quot;&quot;&gt;
Because of my history and background, I know I have a duty to speak up. Future generations are listening, especially my grandchildren. In 1942, President Franklin D. Roosevelt signed Executive Order 9066, approving the removal of American citizens of Japanese descent to remote camps. My parents and grandparents were among 120,000 forced to leave their homes and businesses. They were sent by their own government, our government, to a camp in Poston, Arizona. They lived in appalling conditions, surrounded by a barbed wire fence, armed guards on towers, incarcerated solely because of their ancestry.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3528&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3521&quot;&gt;&lt;span data-dcnode-id=&quot;3527&quot; instrument_node=&quot;&quot;&gt;Congresswoman Doris Matsui: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3525&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2156.95&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3526&quot; instrument_node=&quot;&quot;&gt;35:56&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3524&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3523&quot;&gt;&lt;span data-dcnode-id=&quot;3522&quot; instrument_node=&quot;&quot;&gt;
Despite the good fortune in my life, I am not even one generation removed from that experience. I was born in the Poston Internment Camp, but because I was a baby, I have no personal memories, and my parents rarely talked to me about their time there. I had an ordinary childhood. I think my parents didn’t want to burden me with that experience, they just wanted me to move forward and reach for the stars. I would hear conversations from time to time about life in the camp. I sort of knew what happened, but I did not realize at that time how much their lives had been turned upside down. It’s when I went to college that I met students whose parents were very effected by the internment, and we started talking. The vast majority of the people who were sent to camp were American citizens, and you wonder, how did this happen? It was then that we all realized that we had to learn more about it. It is part of our family history, it is part of American history. During World War II, many were blinded by prejudice. Our government and many US leaders advanced the myth that the Japanese American community was inherently the enemy. Americans across the country believed it, [inaudible 00:37:13] to institutionalized racism and acted on it. It was not uncommon to accuse an innocent person of violating our country’s trust, with no evidence. This societal trust shift to accept and normalize wrongdoing was exactly what kept Japanese Americans in prison for over three years. These were Americans who previously lived normal lives. They owned homes, shops, farmers, doctors, lawyers, teachers, just regular folks who were betrayed by their country because of a dangerous spiral of injustice.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3520&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3513&quot;&gt;&lt;span data-dcnode-id=&quot;3519&quot; instrument_node=&quot;&quot;&gt;Congresswoman Doris Matsui: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3517&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2270.89&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3518&quot; instrument_node=&quot;&quot;&gt;37:50&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3516&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3515&quot;&gt;&lt;span data-dcnode-id=&quot;3514&quot; instrument_node=&quot;&quot;&gt;
Last year, when I heard it at the highest levels of government, those people used racist slurs like, “China virus,” to spread xenophobia and cast blame on innocent communities, it was all too familiar. Comments like these only build upon the legacy of racism, anti-Asian sentiment, and insensitivity that seeks to divide our nation. So yes, I was deeply shaken by the [inaudible 00:38:19] recurrence in our nation. The heated discourse at the highest levels of our government cannot be viewed in isolation from ensuing showing violence in our communities. The fear of the other, whether racial, religious, or tribal, that works to suppress the better angels of our nature, we’ve seen the consequences when we go down this path. My family has lived through these consequences. This is what we are working to root out from the deepest place in our social conscience. After the incarceration of the Japanese American community, our country moved on for decades without coming to terms with what our government did, and what many Americans turned a blind eye to. It took decades for testimonies to be heard in Congress. It took decades for lawmakers to hear our pain.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3512&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3505&quot;&gt;&lt;span data-dcnode-id=&quot;3511&quot; instrument_node=&quot;&quot;&gt;Congresswoman Doris Matsui: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3509&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2351.13&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3510&quot; instrument_node=&quot;&quot;&gt;39:11&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3508&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3507&quot;&gt;&lt;span data-dcnode-id=&quot;3506&quot; instrument_node=&quot;&quot;&gt;
My late husband, Bob Matsui, was first elected to Congress in 1978, and served on the Ways and Means Committee. He loved that work, but because of his parents’ experience with the Japanese American community, he passionately believed that justice could not be denied, and therefore devoted an enormous amount of time and dedication to the passage of the Civil Liberties Act of 1988, by which the United States Government apologized, a token compensation for the Japanese Americans who had been incarcerated. Bob said on the floor debate on that legislation, that he believed that it was possible because this is a great and wonderful country. Today’s hearing is another reminder that our country is capable of growth, that this legislative body will no longer sit in silence while our communities suffer racism and hatred. Now is the time to commit, recommit to moving forward with a shared vision for our future, based upon basic human dignity. Again, I thank the Chairman and Ranking Member, and I yield back. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3504&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3497&quot;&gt;&lt;span data-dcnode-id=&quot;3503&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3501&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2417.63&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3502&quot; instrument_node=&quot;&quot;&gt;40:17&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3500&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3499&quot;&gt;&lt;span data-dcnode-id=&quot;3498&quot; instrument_node=&quot;&quot;&gt;
Thank you, Congresswoman Matsui for that history and that testimony. Our next witness is Representative Judy Chu. Congresswoman Chu represents the 27th Congressional District of California, which includes Pasadena Polytechnic School, and the San Gabriel Valley, in that order. She’s been a member of Congress since 2009. Among other things, she’s Chair of the Congressional Asian Pacific American Caucus. Congresswoman Chu, you’re recognized for five minutes. Congresswoman Chu, you need to unmute. Unmute.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3489&quot;&gt;&lt;span data-dcnode-id=&quot;3495&quot; instrument_node=&quot;&quot;&gt;Congresswoman Judy Chu: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3493&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2463.35&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3494&quot; instrument_node=&quot;&quot;&gt;41:03&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3492&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3491&quot;&gt;&lt;span data-dcnode-id=&quot;3490&quot; instrument_node=&quot;&quot;&gt;
Thank you so much.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3488&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3481&quot;&gt;&lt;span data-dcnode-id=&quot;3487&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3485&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2470.06&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3486&quot; instrument_node=&quot;&quot;&gt;41:10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3484&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3483&quot;&gt;&lt;span data-dcnode-id=&quot;3482&quot; instrument_node=&quot;&quot;&gt;
We hear you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3473&quot;&gt;&lt;span data-dcnode-id=&quot;3479&quot; instrument_node=&quot;&quot;&gt;Congresswoman Judy Chu: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3477&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2470.77&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3478&quot; instrument_node=&quot;&quot;&gt;41:10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3476&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3475&quot;&gt;&lt;span data-dcnode-id=&quot;3474&quot; instrument_node=&quot;&quot;&gt;
Thank you Chairman Adler, Ranking Member Jordan, Subcommittee Chairman Cohen, Ranking Member Johnson, and other distinguished members of the committee for the opportunity to testify before you today. It is with a heavy heart that we are here today, still shocked and heartbroken about the murder of eight in Georgia, including six Asian American women, by a gunman who targeted three Asian businesses, the first one being Young’s Asian Massage, then driving 27 miles to two other Asian spas. His targets were no accident, and what we know is that this day was coming. And because of crimes like this, I, as Chair of the Congressional Asian Pacific American Caucus, or CAPAC, urge the committee to undertake this hearing, because the Asian American community has reached a crisis point that cannot be ignored.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3472&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3465&quot;&gt;&lt;span data-dcnode-id=&quot;3471&quot; instrument_node=&quot;&quot;&gt;Congresswoman Judy Chu: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3469&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2530.04&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3470&quot; instrument_node=&quot;&quot;&gt;42:10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3468&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3467&quot;&gt;&lt;span data-dcnode-id=&quot;3466&quot; instrument_node=&quot;&quot;&gt;
Since the beginning of the COVID-19 pandemic, Asian Americans have been terrified by the alarming surge in anti-Asian bigotry and violence we have witnessed across our nation. In fact, it was over one year ago that CAPAC first began to sound the alarm bells about the anti-Asian discrimination we were beginning to see, due to misinformation and stigma that wrongly associated Asian Americans with the coronavirus. But what started out last January’s dirty looks and verbal assaults, has escalated to physical attacks and violence against innocent Asian Americans, and these attacks have increasingly become more deadly.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3464&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3457&quot;&gt;&lt;span data-dcnode-id=&quot;3463&quot; instrument_node=&quot;&quot;&gt;Congresswoman Judy Chu: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3461&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2571.7&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3462&quot; instrument_node=&quot;&quot;&gt;42:51&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3460&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3459&quot;&gt;&lt;span data-dcnode-id=&quot;3458&quot; instrument_node=&quot;&quot;&gt;
Just as many Asian Americans were preparing for the Lunar New Year last month, we saw a surge in anti-Asian violence. Many of the victims have been older and vulnerable, like Vichar Ratanapakdee, an 84 year old Thai man in San Francisco who was killed in an unprovoked assault while on his morning walk. In New York, 61 year old Noel Quintana’s face was slashed from ear to ear with a box cutter in the subway, requiring 100 stitches. In Oakland’s Chinatown, a camera captured a 91 year old man being thrown to the ground by an assailant. In my own congressional district, a Chinese American man was attacked at a bus stop in Rosemead, with his own cane, causing him to lose part of his finger.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3456&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3449&quot;&gt;&lt;span data-dcnode-id=&quot;3455&quot; instrument_node=&quot;&quot;&gt;Congresswoman Judy Chu: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3453&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2618.2&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3454&quot; instrument_node=&quot;&quot;&gt;43:38&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3452&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3451&quot;&gt;&lt;span data-dcnode-id=&quot;3450&quot; instrument_node=&quot;&quot;&gt;
This has become almost a daily tragedy and has had a chilling effect on our community. Today, we find that there have been nearly 3,800 anti-Asian hate crimes and incidents in just the year alone. They were stoked by the words of former President Donald Trump, who sought to shift blame and anger away from his own flawed response to the coronavirus. He used racial slurs like, “Wuhan virus,” “China plague,” and “Kung flu,” despite the back that the CDC and the World Health Organization warned not to associate the virus with a specific ethnicity, country, or geographic region, due to the stigma it causes. Immediately, we in CAPAC took Donald Trump on about this racist terminology. We issued statements, held press conferences, and sent letters, but our pleas and the guidance from experts were ignored. Instead, he doubled down on using these slurs, directing more hate and blame at the Asian American community.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3441&quot;&gt;&lt;span data-dcnode-id=&quot;3447&quot; instrument_node=&quot;&quot;&gt;Congresswoman Judy Chu: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3445&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2680.88&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3446&quot; instrument_node=&quot;&quot;&gt;44:40&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3444&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3443&quot;&gt;&lt;span data-dcnode-id=&quot;3442&quot; instrument_node=&quot;&quot;&gt;
Over the past year, hostile anti-Asian COVID comments on Twitter increased by 900%, and we saw a nearly 150% surge in anti-Asian hate crimes in major US cities. And even though Donald Trump is no longer president, I believe the most recent round of anti-Asian attacks are the aftermath of one year of hateful attacks and four years of ugly comments about immigrants and people of color. That’s why I’m so grateful that we have a new president, Joe Biden, who is working to stop these attacks, not incite them. Within his first week as president, President Biden issued a presidential memorandum to combat and condemn xenophobia against AAPIs, and ensure that the Department of Justice works with our community to address these surging hate crimes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3433&quot;&gt;&lt;span data-dcnode-id=&quot;3439&quot; instrument_node=&quot;&quot;&gt;Congresswoman Judy Chu: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3437&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2731.73&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3438&quot; instrument_node=&quot;&quot;&gt;45:31&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3436&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3435&quot;&gt;&lt;span data-dcnode-id=&quot;3434&quot; instrument_node=&quot;&quot;&gt;
But Congress must do its part as well. That’s why CAPAC pushed for legislation, such as Congresswoman Grace Meng’s resolution to condemn anti-Asian sentiment related to COVID-19, which passed the House last fall. And that’s why it’s important to pass critical legislation like Congressmember Beyer’s requires No Hate Act, and Congresswoman Meng’s COVID-19 Hate Crimes Act, that will help us to better track and respond to hate crimes and incidents against Asian Americans. [inaudible 00:46:04] calling for a national day to speak out against Asian hate on March 26th. It is time that we continue to push back against xenophobia, every time it rears its ugly head. Asian Americans must not be used as scapegoats in times of crisis. Lives are at stake, and it’s critical that Congress takes bold action to address this pandemic of discrimination and hate. I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3432&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3425&quot;&gt;&lt;span data-dcnode-id=&quot;3431&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3429&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2800.15&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3430&quot; instrument_node=&quot;&quot;&gt;46:40&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3428&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3427&quot;&gt;&lt;span data-dcnode-id=&quot;3426&quot; instrument_node=&quot;&quot;&gt;
Thank you, Congresswoman Chu. I remember the smog in the San Gabriel Valley. Our next witness is Senator Tammy Duckworth, and after her we’ll hear Representative Young Kim. Senator Duckworth represents the State of Illinois in the United States Senate, first elected in 2016. She previously served in the United States House of Representatives, and she represented the 8th Congressional District of Illinois for two terms. She has an outstanding communications team, and an outstanding record in Congress. Senator Duckworth, you’re recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3417&quot;&gt;&lt;span data-dcnode-id=&quot;3423&quot; instrument_node=&quot;&quot;&gt;Senator Tammy Duckworth: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3421&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2833.91&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3422&quot; instrument_node=&quot;&quot;&gt;47:13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3420&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3419&quot;&gt;&lt;span data-dcnode-id=&quot;3418&quot; instrument_node=&quot;&quot;&gt;
Thank you, Mr. Chairman, and it was a pleasure to serve alongside you previously in the House. It’s good to see you up on the dais today. Thank you for this hearing. In New York, as we’ve heard, an 89 year old was slapped, and in California, a 91 year old was pushed to the ground. In the middle of a park, a little girl was shoved off her bike, and in the middle of a city sidewalk, a little boy watched as his father was beaten up. Families have had rocks thrown at them, nurses have been spit on, heroes, frontline workers, hospital staff have been blamed for COVID-19, and they’ve been denied service, treated as other than, as less than, simply because they are members of the AAPI community.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3416&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3409&quot;&gt;&lt;span data-dcnode-id=&quot;3415&quot; instrument_node=&quot;&quot;&gt;Senator Tammy Duckworth: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3413&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2876.02&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3414&quot; instrument_node=&quot;&quot;&gt;47:56&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3412&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3411&quot;&gt;&lt;span data-dcnode-id=&quot;3410&quot; instrument_node=&quot;&quot;&gt;
And now, less than 48 hours ago, six members of the Asian American community were murdered in Atlanta, Georgia, another unspeakable tragedy after a year of unfathomable cruelty. There’s nothing, nothing we can say today that will piece back together the shattered lives of the victims’ loved ones. There’s nothing we can do that will give them the solace they deserve, nothing we can provide that would even begin to make sense of this senseless tragedy. But what we can say and should say clearly, unambiguously, is that blaming the AAPI community for a public health crisis is racist and wrong, and continuing to treat our fellow Americans as others, only further divides our country at a time when we should be pushing, pulling, tugging at our nation with all our might, until it lives up to its founding ideas of equality and justice for all.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3408&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3401&quot;&gt;&lt;span data-dcnode-id=&quot;3407&quot; instrument_node=&quot;&quot;&gt;Senator Tammy Duckworth: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3405&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2931.11&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3406&quot; instrument_node=&quot;&quot;&gt;48:51&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3404&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3403&quot;&gt;&lt;span data-dcnode-id=&quot;3402&quot; instrument_node=&quot;&quot;&gt;
Unfortunately, this type of prejudice is far from new. It’s a similar brand of discrimination to the one that marked some of our country’s darkest days and toughest fights, from segregation to immigration. As Congresswoman Matsui has mentioned, it’s in a similar vein to what was witnessed in World War II, as our nation incarcerated Japanese Americans because of their heritage, and trapped thousands of families like Congresswoman Matsui’s, even as their loved ones sacrificed everything on the war front to defend our nation overseas.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3393&quot;&gt;&lt;span data-dcnode-id=&quot;3399&quot; instrument_node=&quot;&quot;&gt;Senator Tammy Duckworth: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3397&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D2963.44&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3398&quot; instrument_node=&quot;&quot;&gt;49:23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3396&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3395&quot;&gt;&lt;span data-dcnode-id=&quot;3394&quot; instrument_node=&quot;&quot;&gt;
Fortunately, the United States government recognized that this type of bigotry was un-American. Yet, the risk of repeating past grave errors is real and chilling. That’s why I introduced the Korematsu-Takai Civil Liberties Protection Act, which would be a first step towards safeguarding freedom and establishing a clear statutory prohibition against un-American policies that seek to imprison, or otherwise detain American citizens on the basis of who they are, rather than what they have done. And as the daughter of an American Vietnam veteran and an immigrant with Chinese Thai heritage, I am deeply committed to supporting our community’s fight against discrimination. I applaud the efforts of this subcommittee to raise awareness of this crisis, and to discuss a plan to advance civil rights for Asian Americans and protect the well-being of all of our families.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3392&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3385&quot;&gt;&lt;span data-dcnode-id=&quot;3391&quot; instrument_node=&quot;&quot;&gt;Senator Tammy Duckworth: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3389&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3015.13&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3390&quot; instrument_node=&quot;&quot;&gt;50:15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3388&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3387&quot;&gt;&lt;span data-dcnode-id=&quot;3386&quot; instrument_node=&quot;&quot;&gt;
The American story as we know it would not exist without the strength of the AAPI community. Quite literally, Asian Americans helped build this country. With their bare hands and bent backs, they laid the railroad tracks that connected us from coast to coast. They tilled the fields and started the businesses, and also picked up the rifles necessary to develop and defend this nation that we all love. And today, even as we face so much bigotry and violence, our community is helping to keep the country running. So I just want to take a minute to thank all the incredible heroic frontline workers who are getting our nation through this crisis, from the doctors and the nurses risking their own lives to try to save the lives of strangers, to the cashier at the market who’s helping our families stay fed, from janitors sweeping up hospital rooms at night, to the teachers patiently helping our kids learn their ABCs over Zoom, I hope you know that we see you and we see your sacrifices, and that we are forever in your debt.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3384&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3377&quot;&gt;&lt;span data-dcnode-id=&quot;3383&quot; instrument_node=&quot;&quot;&gt;Senator Tammy Duckworth: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3381&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3073.24&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3382&quot; instrument_node=&quot;&quot;&gt;51:13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3380&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3379&quot;&gt;&lt;span data-dcnode-id=&quot;3378&quot; instrument_node=&quot;&quot;&gt;
We’ll never be able to fully express our gratitude for all of the AAPIs on the front lines, but every hour of every day, I’m going to keep trying, because that’s the least that these folks, deserve. So I want to say thank you one more time for everything that they do, and going forward, I hope that all Americans will speak up against such hatred towards their neighbors, and I look forward to continuing to work with President Biden’s executive order that assists states and community organizations, make this kind of discrimination a thing of the past. Please know that we have so much work ahead of us, and I thank this committee for how holding this hearing has shed a light on this very, very serious issue that will divide our nation and make us weaker, not stronger. With that, I yield back, Mr. Chairman. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3369&quot;&gt;&lt;span data-dcnode-id=&quot;3375&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3373&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3117.93&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3374&quot; instrument_node=&quot;&quot;&gt;51:57&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3372&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3371&quot;&gt;&lt;span data-dcnode-id=&quot;3370&quot; instrument_node=&quot;&quot;&gt;
Thank you, Senator, and it’s nice to see you and have you back in the House again. Now we’d like to recognize a new member of the House, Representative Young Kim. Representative Kim represents the night 39th Congressional District of California, which includes the northern parts of Orange County. Not sure if she’s got the Big A in Anaheim, the ballpark, or the Disney World, or the Knott’s Berry Farm or those places, but they’re all out there. First elected in 2020. You’re recognized for five minutes [inaudible 00:52:25].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3361&quot;&gt;&lt;span data-dcnode-id=&quot;3367&quot; instrument_node=&quot;&quot;&gt;Representative Young Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3365&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3146.96&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3366&quot; instrument_node=&quot;&quot;&gt;52:26&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3364&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3363&quot;&gt;&lt;span data-dcnode-id=&quot;3362&quot; instrument_node=&quot;&quot;&gt;
Thank you, Chairman, and Ranking Member, and the members of the committee for holding this hearing today on a very important topic that has been prevailing in our national conversation, but one that is very, very personal to me, as an Asian American. I represent California’s 39th Congressional District. This is one of the diverse districts in the country, and it’s also a home to a vibrant Asian American community. My district is truly a representation of America and what makes our country great. Asian Americans have, and continue to make countless contributions to communities across the country, and right here in the halls of Congress.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3353&quot;&gt;&lt;span data-dcnode-id=&quot;3359&quot; instrument_node=&quot;&quot;&gt;Representative Young Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3357&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3190.64&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3358&quot; instrument_node=&quot;&quot;&gt;53:10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3356&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3355&quot;&gt;&lt;span data-dcnode-id=&quot;3354&quot; instrument_node=&quot;&quot;&gt;
Since the beginning of COVID-19, we have increasingly seen Asian Americans becoming targets of hate across the nation, with more than 3,000 hate crimes against the Asian American and Pacific Islander community. Those crimes have been reported nationwide, with an increased number of attacks against seniors. This week, we saw senseless violence in Atlanta that took the lives of six Asian American woman. While the investigation is ongoing and we wait for more information, this comes during a time when violence and attacks against Asian Americans are on the rise. The hate, the bias, and the attacks that we’ve seen against the Asian American community are unacceptable, and they must be stopped.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3345&quot;&gt;&lt;span data-dcnode-id=&quot;3351&quot; instrument_node=&quot;&quot;&gt;Representative Young Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3349&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3238.48&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3350&quot; instrument_node=&quot;&quot;&gt;53:58&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3348&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3347&quot;&gt;&lt;span data-dcnode-id=&quot;3346&quot; instrument_node=&quot;&quot;&gt;
This is wrong, and it has no place in our political discourse, and it’s contrary to the values that America stands for. This should not have to be said, but I want to be very clear. No American of any race or ethnic group is responsible for the COVID-19 pandemic. The virus does not discriminate, it affects everyone. We must come together as Americans, not just to fight COVID-19, but also to stand against the rise of hate and discrimination against the AAPI community and any other group of Americans.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3337&quot;&gt;&lt;span data-dcnode-id=&quot;3343&quot; instrument_node=&quot;&quot;&gt;Representative Young Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3341&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3275.54&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3342&quot; instrument_node=&quot;&quot;&gt;54:35&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3340&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3339&quot;&gt;&lt;span data-dcnode-id=&quot;3338&quot; instrument_node=&quot;&quot;&gt;
We also can not forget that discrimination we’ve seen against the AAPI community is not limited to the violence and attacks. I hope we can look at the nation’s elite universities and other institutions of learning. We have seen institutions discriminating against Asian Americans in their admissions process, in order to deny them the entry. Discrimination is wrong, and goes against our fundamental American values that we hold dear. In America, we value the individual, and we believe that people deserve to be judged on their merits and not penalized because of their heritage, race, or background. These are the values that my family and countless immigrants came here for.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3336&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3329&quot;&gt;&lt;span data-dcnode-id=&quot;3335&quot; instrument_node=&quot;&quot;&gt;Representative Young Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3333&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3323.14&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3334&quot; instrument_node=&quot;&quot;&gt;55:23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3332&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3331&quot;&gt;&lt;span data-dcnode-id=&quot;3330&quot; instrument_node=&quot;&quot;&gt;
When our country seems more divided than ever, we should work together to unify our country and insure future generations of Americans, regardless of their background, have the same opportunity to access the promise of America. No matter our race or background, we are all Americans. Asian are Americans. As an Asian American and a member of Congress, I feel a duty to speak out. So I stand with the AAPI community today and always. So I want to thank you for allowing me to speak on this very, very important issue, and I yield back the balance of my time. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3328&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3321&quot;&gt;&lt;span data-dcnode-id=&quot;3327&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3325&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3366.6&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3326&quot; instrument_node=&quot;&quot;&gt;56:06&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3324&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3323&quot;&gt;&lt;span data-dcnode-id=&quot;3322&quot; instrument_node=&quot;&quot;&gt;
Thank you, Congresswoman Kim. Our next witness is Representative Michelle Park Steel. Congresswoman Steel represents the 48th Congressional District in California, which includes other portions of Orange County. She was first elected in 2020. Congresswoman Steel, you’re recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3313&quot;&gt;&lt;span data-dcnode-id=&quot;3319&quot; instrument_node=&quot;&quot;&gt;Congresswoman Michelle Park Steel: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3317&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3383.26&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3318&quot; instrument_node=&quot;&quot;&gt;56:23&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3316&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3315&quot;&gt;&lt;span data-dcnode-id=&quot;3314&quot; instrument_node=&quot;&quot;&gt;
Chairman Steve Cohen, and Ranking Member Chip Roy, thank you for holding this important conversation today. It has been heartbreaking to see the rise in anti-Asian American hate and harassment over the last year. As we will hear today from our witnesses and we’ve been hearing from our witnesses, hate against the Asian American community is not new. According to Shan Wu, a former federal prosecutor, violence against Asian Americans has been under-scrutinized, under-prosecuted, and often condoned. This is a long set history of intolerance and hate directed at our community, and in the last year, almost 4,000 incidents of verbal harassment, physical assault, and discrimination have been reported. California is at the top of the list, with 44% of all incidents reported happening in my home state. New York is second on the list, making up 13% of all the incidents reported. 68% of these incidents and crimes were targeted towards Asian American women. This has to stop.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3305&quot;&gt;&lt;span data-dcnode-id=&quot;3311&quot; instrument_node=&quot;&quot;&gt;Congresswoman Michelle Park Steel: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3309&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3467.87&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3310&quot; instrument_node=&quot;&quot;&gt;57:47&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3308&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3307&quot;&gt;&lt;span data-dcnode-id=&quot;3306&quot; instrument_node=&quot;&quot;&gt;
When I was chair of the Orange County Board of Supervisors, I introduced the resolution that called for tolerance and compassion towards all residents, and condemned discrimination against the AAPI community. I was proud this year to introduce a similar resolution in Congress, with other Orange County Congresswoman Katie Porter. That’s because combating hate is not a partisan issue. We can all agree that violence against any community should never be tolerated. As a first-generation Korean-American who is now serving her community in the halls of Congress, this is my American dream. I want future generations of Americans to know they can achieve anything in this great country.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3304&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3297&quot;&gt;&lt;span data-dcnode-id=&quot;3303&quot; instrument_node=&quot;&quot;&gt;Congresswoman Michelle Park Steel: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3301&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3523.73&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3302&quot; instrument_node=&quot;&quot;&gt;58:43&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3300&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3299&quot;&gt;&lt;span data-dcnode-id=&quot;3298&quot; instrument_node=&quot;&quot;&gt;
That’s why I would also like to use some of my time today to talk about the discrimination that the AAPI community is experiencing in our nation’s education system. It is one of the reasons why my colleague, Representative Kim, and I joined Ranking Member Jordan, and Subcommittee Ranking Member Johnson, to request the President of Yale University to testify at today’s hearing. Last year, the Department of Justice filed a case alleging that Yale University was discriminating against Asian Americans and white applicants, but the Biden administration dropped the suit last month. This is totally wrong, and sets a dangerous precedent.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3296&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3289&quot;&gt;&lt;span data-dcnode-id=&quot;3295&quot; instrument_node=&quot;&quot;&gt;Congresswoman Michelle Park Steel: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3293&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3575.59&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3294&quot; instrument_node=&quot;&quot;&gt;59:35&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3292&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3291&quot;&gt;&lt;span data-dcnode-id=&quot;3290&quot; instrument_node=&quot;&quot;&gt;
In 1996, I supported and campaigned for California’s Proposition 209, which banned racial preferences in public hiring, education, and contracting. It was modeled after the Civil Rights Act. Before Prop 209 was passed, the four year graduation rate for underrepresented racial minorities in the University of California system was 31.3%. By 2014, that has increased to 51.1%. The six year graduation rate is even better, increasing from six to 6.5% in 1998, to 75.1% in 2013. Last year in California, Democrats introduced Proposition 16, to bring back racial preferences in hiring, contracting, and our education system. Californians overwhelmingly rejected it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3281&quot;&gt;&lt;span data-dcnode-id=&quot;3287&quot; instrument_node=&quot;&quot;&gt;Congresswoman Michelle Park Steel: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3285&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3642.27&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3286&quot; instrument_node=&quot;&quot;&gt;01:00:42&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3284&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3283&quot;&gt;&lt;span data-dcnode-id=&quot;3282&quot; instrument_node=&quot;&quot;&gt;
As a new member of Congress, and immigrant to this country, we should be encouraging all students and young people to succeed, especially in our education system. Discrimination is against the fundamental value of American culture, and that includes discrimination against the AAPI community in the halls of our schools and universities. This is wrong. This type of behavior is only hurting future generations. We should be working together to stop this discrimination and hate in its tracks, and to encourage the next generation to achieve their own American dream. I thank you, the committee, for the opportunity to testify and share this with you today. I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3273&quot;&gt;&lt;span data-dcnode-id=&quot;3279&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3277&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3697.77&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3278&quot; instrument_node=&quot;&quot;&gt;01:01:37&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3276&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3275&quot;&gt;&lt;span data-dcnode-id=&quot;3274&quot; instrument_node=&quot;&quot;&gt;
Thank you, Congresswoman Steel. Thank you very much. Final witness on this first panel is the Honorable Representative Grace Meng. Congresswoman Meng represents the 6th Congressional District of the Empire State, New York. It includes Flushing, Bayside, fresh Meadows, and other portions of Northeastern Queens. She’s been in Congress since 2013. Congresswoman Meng, you’re now recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3265&quot;&gt;&lt;span data-dcnode-id=&quot;3271&quot; instrument_node=&quot;&quot;&gt;Congresswoman Grace Meng: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3269&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3719.54&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3270&quot; instrument_node=&quot;&quot;&gt;01:01:59&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3268&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3267&quot;&gt;&lt;span data-dcnode-id=&quot;3266&quot; instrument_node=&quot;&quot;&gt;
Thank you. Chairman Adler, Chairman Cohen, Ranking Member Thompson, and distinguished members of this committee for organizing today’s hearing. The topic is discrimination and violence against Asian Americans. Some of us seem to be going a little off topic, I’m not sure why. For over a year, Asian Americans have been fighting an additional virus of hate and bigotry. Anti-Asian rhetoric like, “China virus, Kung flu,” misinformation, racism, have left Asian Americans traumatized and fearful for their lives. Mr. Roy mentioned the WHO, and it’s the same World Health Organization that actually said not to use countries of origin when we’re referring to diseases.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3264&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3257&quot;&gt;&lt;span data-dcnode-id=&quot;3263&quot; instrument_node=&quot;&quot;&gt;Congresswoman Grace Meng: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3261&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3765.77&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3262&quot; instrument_node=&quot;&quot;&gt;01:02:45&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3260&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3259&quot;&gt;&lt;span data-dcnode-id=&quot;3258&quot; instrument_node=&quot;&quot;&gt;
Since last year, there have been over 3,800 reported incidents of anti-Asian hate, but we know that the majority of incidents go reported, and in fact, nearly 70% of reported anti-Asian hate incidents have happened to Asian American women. In fact, just this week, we saw the terrible news about the six Asian women who were shot and killed in the Atlanta area. Our community is bleeding, we are in pain, and for the last year, we’ve been screaming out for help. Asian American discrimination, however, is not new in this country. From the 1882 Chinese Exclusion Act, to the World War II incarceration of Japanese Americans, and from the 1975 police brutality in Manhattan’s Chinatown, to the 1982 murder of Vincent Chin, discrimination against Asian Americans is a shameful part of our history.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3256&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3249&quot;&gt;&lt;span data-dcnode-id=&quot;3255&quot; instrument_node=&quot;&quot;&gt;Congresswoman Grace Meng: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3253&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3822.16&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3254&quot; instrument_node=&quot;&quot;&gt;01:03:42&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3252&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3251&quot;&gt;&lt;span data-dcnode-id=&quot;3250&quot; instrument_node=&quot;&quot;&gt;
Unfortunately, so much of this history is not taught in our schools. Excluding Asian Americans from our history books renders us invisible, and deems us the perpetual foreigner. In fact, history has excluded the history of Asian Americans, black Americans, Latino, and Native Americans, and that has led to the systemic inequities at many institutions…&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3248&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3241&quot;&gt;&lt;span data-dcnode-id=&quot;3247&quot; instrument_node=&quot;&quot;&gt;Congresswoman Grace Meng: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3245&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3843.581&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3246&quot; instrument_node=&quot;&quot;&gt;01:04:03&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3244&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3243&quot;&gt;&lt;span data-dcnode-id=&quot;3242&quot; instrument_node=&quot;&quot;&gt;
… and that has led to the systemic inequities at many institutions, including our academic institutions. In the 116th Congress, I introduce my resolution to condemn anti-Asian sentiment related to COVID.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3233&quot;&gt;&lt;span data-dcnode-id=&quot;3239&quot; instrument_node=&quot;&quot;&gt;Congresswoman Grace Meng: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3237&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3855.7&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3238&quot; instrument_node=&quot;&quot;&gt;01:04:15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3236&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3235&quot;&gt;&lt;span data-dcnode-id=&quot;3234&quot; instrument_node=&quot;&quot;&gt;
I was grateful my resolution passed the House with bipartisan support, except for 164 of our Republican colleagues who voted against it, even though some have the audacity to tweet condolences after Atlanta’s tragedy, I’m glad to hear about my colleague Representative Steel’s resolution, and I hope that she has better luck getting her party to support the resolution.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3232&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3225&quot;&gt;&lt;span data-dcnode-id=&quot;3231&quot; instrument_node=&quot;&quot;&gt;Congresswoman Grace Meng: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3229&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3882.73&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3230&quot; instrument_node=&quot;&quot;&gt;01:04:42&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3228&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3227&quot;&gt;&lt;span data-dcnode-id=&quot;3226&quot; instrument_node=&quot;&quot;&gt;
During this last year, it became painfully apparent that we need a comprehensive effort from our local communities to the federal level. That’s why I support bills like the No Hate Act, and that’s why Senator Hirono and I introduced the COVID-19 Hate Crimes Act, which would assign a point person at the Department of Justice to quickly review hate crimes and to make it easier for people to report these incidents.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3224&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3217&quot;&gt;&lt;span data-dcnode-id=&quot;3223&quot; instrument_node=&quot;&quot;&gt;Congresswoman Grace Meng: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3221&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3907.65&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3222&quot; instrument_node=&quot;&quot;&gt;01:05:07&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3220&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3219&quot;&gt;&lt;span data-dcnode-id=&quot;3218&quot; instrument_node=&quot;&quot;&gt;
My bill also builds on President Biden’s presidential memorandum by directing relevant federal agencies to work with community-based organizations, to find ways to talk about the virus in a way that is not racist. I urge my colleagues on this committee for swift consideration of these bills. We cannot turn a blind eye to people living in fear.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3216&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3209&quot;&gt;&lt;span data-dcnode-id=&quot;3215&quot; instrument_node=&quot;&quot;&gt;Congresswoman Grace Meng: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3213&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D3932.7&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3214&quot; instrument_node=&quot;&quot;&gt;01:05:32&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3212&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3211&quot;&gt;&lt;span data-dcnode-id=&quot;3210&quot; instrument_node=&quot;&quot;&gt;
I want to go back to something that Mr. Roy said earlier. Your president and your party, and your colleagues can talk about issues with any other country that you want, but you don’t have to do it by putting a bullseye on the back of Asian Americans across this country, on our grandparents, on our kids.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3208&quot; instrument_node=&quot;&quot;&gt;

Thank you very much, and thank you very much, Chairman Cohen. Thank you to the Ranking Member Johnson and the other members of the committee, really appreciate the opportunity to testify before all of you today. I really appreciate the powerful words from Representative Meng and the other CAPAC members as to why we are here today.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3136&quot; instrument_node=&quot;&quot;&gt;

When I agreed to testify at this hearing, no one could have imagined that this would come two days after the horrific shooting in Atlanta, Georgia. I also want to take a moment to recognize and honor the victims and their families and the suffering that they are going through at this moment, and to remember that we must center ourselves in the Atlanta community and all the local communities that have been affected during this past year with respect to the anti-Asian violence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3128&quot; instrument_node=&quot;&quot;&gt;

Look, for a year now, Asian-Americans have been fighting two viruses, the COVID-19 pandemic affecting all of us, as well as this virus of racism. Asian-Americans, like all Americans, have suffered the economic and health consequences of COVID-19, but at the same time, Asian-Americans have been at the front lines as essential workers in grocery stores, in delivery trucks, in custodial services, as well as in health professions.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3120&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3113&quot;&gt;&lt;span data-dcnode-id=&quot;3119&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3117&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4123.82&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3118&quot; instrument_node=&quot;&quot;&gt;01:08:43&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3116&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3115&quot;&gt;&lt;span data-dcnode-id=&quot;3114&quot; instrument_node=&quot;&quot;&gt;
Unfortunately, Asian Americans have also been fighting this second virus, this virus of racism. We have long struggled for visibility and equity, and now our communities are faced with this additional physical and mental harm that is arising out of the COVID-19 pandemic. As Ms. Kulkarni will testify, web-based self-reporting tools have recorded a tremendous increase in the number of anti-Asian hate that we have seen in this past year. A Pew report from last year confirm what that data shows, that a majority of Asian Americans say it is more common for people to blame Asians for COVID-19 and have expressed insensitive and completely inappropriate views about Asian Americans then before COVID-19.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3112&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3105&quot;&gt;&lt;span data-dcnode-id=&quot;3111&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3109&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4166.97&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3110&quot; instrument_node=&quot;&quot;&gt;01:09:26&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3108&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3107&quot;&gt;&lt;span data-dcnode-id=&quot;3106&quot; instrument_node=&quot;&quot;&gt;
An Ipsos survey shows the same thing, where over 30% of the American population say that they have witnessed harassment or blame of the Asian community for COVID-19, and 60% of the Asian-American population showed that this was similar behavior that they were seeing. These fears are real.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3104&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3097&quot;&gt;&lt;span data-dcnode-id=&quot;3103&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3101&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4186.91&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3102&quot; instrument_node=&quot;&quot;&gt;01:09:46&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3100&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3099&quot;&gt;&lt;span data-dcnode-id=&quot;3098&quot; instrument_node=&quot;&quot;&gt;
The other thing is, the impact on the Asian-American communities is clear with respect to their businesses. As noted in a report by McKinsey and Company, misguided fears of the virus effectively shuttered businesses in many Asian-American cultural districts a full month before lockdowns began nationwide.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3096&quot; instrument_node=&quot;&quot;&gt;

Our organization and others started talking about this issue in late January when we saw this happening, and I [inaudible 01:10:10] districts during that time, when we saw this happening, and to say that it was still safe to go there before the lockdowns. In New York, as demonstrated by a study by our community partner Asian-American Federation, there has been record job losses for the Asian-American community.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3088&quot; instrument_node=&quot;&quot;&gt;

In New York, there was at 6000% increase in unemployment benefit applications from February through June of 2020. Asian-Americans suffered the largest increase in unemployment, going from 3% in February 2020 to over 25%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3080&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3073&quot;&gt;&lt;span data-dcnode-id=&quot;3079&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3077&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4245.87&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3078&quot; instrument_node=&quot;&quot;&gt;01:10:45&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3076&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3075&quot;&gt;&lt;span data-dcnode-id=&quot;3074&quot; instrument_node=&quot;&quot;&gt;
Now look, Asian-American racism is rooted in two very dangerous stereotypes, that have the perpetual foreigner and that of the model minority. The perpetual foreigner suggest that we can be here and we could be born here and we can live here as long as we want, but we are still seen as foreigners. We are still seen as the other, not to be trusted and to be feared.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3072&quot; instrument_node=&quot;&quot;&gt;

On the flip side of that stereotype is the so-called model minority, to suggest that Asian Americans are held up as a good people of color when it is convenient, to plant seeds of division within allied communities of color. Here, I will call out people that try to use affirmative action as a wedge to drive between Asian Americans and other communities of color.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3064&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3057&quot;&gt;&lt;span data-dcnode-id=&quot;3063&quot; instrument_node=&quot;&quot;&gt;John Yang: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;3061&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D4287.41&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;3062&quot; instrument_node=&quot;&quot;&gt;01:11:27&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;3060&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;3059&quot;&gt;&lt;span data-dcnode-id=&quot;3058&quot; instrument_node=&quot;&quot;&gt;
That model minority myth hides the complexities of our community and the economic disparities that exist among Asian Americans. Even as the COVID-19 pandemic recedes, we must remember that anti-Asian racism is likely to continue. We do have legitimate concerns and geopolitical differences with the Chinese government and the Chinese Communist Party, but that is likely to remain for the foreseeable future.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3056&quot; instrument_node=&quot;&quot;&gt;
