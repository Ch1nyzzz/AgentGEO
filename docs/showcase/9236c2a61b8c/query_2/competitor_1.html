Mr. Kim, you’re recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2456&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2449&quot;&gt;&lt;span data-dcnode-id=&quot;2455&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2453&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D5978.13&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2454&quot; instrument_node=&quot;&quot;&gt;01:39:38&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2452&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2451&quot;&gt;&lt;span data-dcnode-id=&quot;2450&quot; instrument_node=&quot;&quot;&gt;
Thank you, Chairman Cohen and ranking member Roy and the members of the judiciary committee. I’m both honored and dismayed to be back in front of you again. Some of you may remember that I was with you just this past September, discussing the importance of diversity in American media. You may recall that the reason I was moved to speak then was because the House had just recently passed H.R. 908, condemning all forms of anti Asian sentiment.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2448&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2441&quot;&gt;&lt;span data-dcnode-id=&quot;2447&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2445&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6003.58&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2446&quot; instrument_node=&quot;&quot;&gt;01:40:03&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2444&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2443&quot;&gt;&lt;span data-dcnode-id=&quot;2442&quot; instrument_node=&quot;&quot;&gt;
But I was disheartened to find that for a bill that required no money or resources, just a simple condemnation of acts of hate against people of Asian descent, 164 members of Congress, all Republican, voted against it. And now here I am again, because as every witness in this hearing has pointed out, the situation has gotten worse, much worse. [foreign language 01:40:25] murdered. [foreign language 01:40:29] murdered. [foreign language 01:40:30] face slashed with a blade from ear to ear. An 89-year-old woman set on fire. [foreign language 01:40:38] a professional jazz pianist, beaten so badly he can no longer play piano. And now seven Asian people shot dead in Georgia two days ago, six of whom were women. These are only a few of the 3,800 reported incidents since last March.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2433&quot;&gt;&lt;span data-dcnode-id=&quot;2439&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2437&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6054.8&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2438&quot; instrument_node=&quot;&quot;&gt;01:40:54&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2435&quot;&gt;&lt;span data-dcnode-id=&quot;2434&quot; instrument_node=&quot;&quot;&gt;
I was speaking to a pollster during the recent elections, and I asked him why, when I see polling results broken down by race, do I so rarely see Asian-Americans as a separate category. He heard my question. He looked me dead in the eye. And he said, “Because Asian-Americans are considered statistically insignificant.” Statistically insignificant. Now all of you listening to me here, by virtue of your own elections, are more familiar with the intricacies of polling than I am. So undoubtedly, you already know what this means.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2432&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2425&quot;&gt;&lt;span data-dcnode-id=&quot;2431&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2429&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6084.29&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2430&quot; instrument_node=&quot;&quot;&gt;01:41:24&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2428&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2427&quot;&gt;&lt;span data-dcnode-id=&quot;2426&quot; instrument_node=&quot;&quot;&gt;
Statistically insignificant literally means we don’t matter. We, as Asian-Americans, have come to this country because we believe in the American dream. Many of us have succeeded, and some of us are even the frontline healthcare workers upon whom we’ve all come to depend during this terrible pandemic. But many of us are struggling too. In fact, the wealth disparity between the richest Asian-Americans and the poorest is the largest of any ethnic group in America. In New York, Asian-Americans have a higher poverty rate than any other minority group, where fully one in four are living below the poverty line. And poverty rates among Asian-American seniors are much higher than the national average. That’s something to consider as we watch the most vulnerable in our community get taunted, pushed, slashed, and murdered.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2424&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2417&quot;&gt;&lt;span data-dcnode-id=&quot;2423&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2421&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6132.03&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2422&quot; instrument_node=&quot;&quot;&gt;01:42:12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2420&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2419&quot;&gt;&lt;span data-dcnode-id=&quot;2418&quot; instrument_node=&quot;&quot;&gt;
Despite this wide disparity of experiences, we continue to be tagged the model minority. We simply cannot continue to live with the myth that the most successful of us represent the totality of us.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2416&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2409&quot;&gt;&lt;span data-dcnode-id=&quot;2415&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2413&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6144.32&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2414&quot; instrument_node=&quot;&quot;&gt;01:42:24&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2411&quot;&gt;&lt;span data-dcnode-id=&quot;2410&quot; instrument_node=&quot;&quot;&gt;
So we know the hurdles we face. The question for us here is what can we do about them? One of the places that starts is with education. Let’s teach them everything that Professor [Lee 01:42:35] so eloquently highlighted for us, including celebrating the fact that the most decorated combat unit in US military history was the 442nd combat team, a unit in World War II made up entirely of Asian-Americans.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2408&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2401&quot;&gt;&lt;span data-dcnode-id=&quot;2407&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2405&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6168.91&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2406&quot; instrument_node=&quot;&quot;&gt;01:42:48&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2404&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2403&quot;&gt;&lt;span data-dcnode-id=&quot;2402&quot; instrument_node=&quot;&quot;&gt;
Now these are not moments in Asian-American history. This is American history. When we are erased from our history books, we are made invisible. And the result, to quote Congresswoman Meng, is that we are perpetually made to feel like foreigners in our own country. Include our stories because they matter.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2393&quot;&gt;&lt;span data-dcnode-id=&quot;2399&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2397&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6187.93&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2398&quot; instrument_node=&quot;&quot;&gt;01:43:07&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2395&quot;&gt;&lt;span data-dcnode-id=&quot;2394&quot; instrument_node=&quot;&quot;&gt;
We must also empower our local community organizers by directing funds to areas that have been historically impoverished, not just for the benefit of the AAPI community, but for the benefit of all communities living there, most of whom are non-white. It’s no wonder that there’s historically been tension among racial groups, when the thing they have most in common is poverty and lack of access to services.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2392&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2385&quot;&gt;&lt;span data-dcnode-id=&quot;2391&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2389&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6209.77&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2390&quot; instrument_node=&quot;&quot;&gt;01:43:29&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2388&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2387&quot;&gt;&lt;span data-dcnode-id=&quot;2386&quot; instrument_node=&quot;&quot;&gt;
And there happen to be two pieces of legislation before this committee, as we speak, that deal with these specific issues. One is the NO HATE bill. It provides necessary grants and money to community organizations, counseling for those convicted of hate crimes, and improved data collection for hate crime reporting, among other important services. The committee also has before right now the COVID-19 Hate Crimes Act introduced by Congresswoman Meng and Senator Hirono. It’s crucial that we have reliable reporting for these hate crimes and an infrastructure that makes it easy for people for whom English is not their primary language.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2384&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2377&quot;&gt;&lt;span data-dcnode-id=&quot;2383&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2381&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6242.87&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2382&quot; instrument_node=&quot;&quot;&gt;01:44:02&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2380&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2379&quot;&gt;&lt;span data-dcnode-id=&quot;2378&quot; instrument_node=&quot;&quot;&gt;
Chairman Adler, you have been an ally to the AAPI community in the past. I respectfully urge you not to let these bills languish in committee, but see them through so that they can be passed by the full House and then onto the Senate.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2369&quot;&gt;&lt;span data-dcnode-id=&quot;2375&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2373&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6255.06&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2374&quot; instrument_node=&quot;&quot;&gt;01:44:15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2372&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2371&quot;&gt;&lt;span data-dcnode-id=&quot;2370&quot; instrument_node=&quot;&quot;&gt;
Now I’m not naive enough to think that I’m going to convince all of you to stand up for us. Trust me, I’ve seen your voting records. But I am speaking to those to whom humanity still matters.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2368&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2361&quot;&gt;&lt;span data-dcnode-id=&quot;2367&quot; instrument_node=&quot;&quot;&gt;Daniel Dae Kim: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2365&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6267.53&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2366&quot; instrument_node=&quot;&quot;&gt;01:44:27&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2364&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2363&quot;&gt;&lt;span data-dcnode-id=&quot;2362&quot; instrument_node=&quot;&quot;&gt;
In closing, let me just say that there are several moments in a country’s history that chart its course indelibly for the future. For Asian-Americans, that moment is now. What happens right now and over the course of the coming months, will send a message for generations to come as to whether we matter. Whether the country we call home chooses to erase us or include us. Dismiss us or respect us. Invisibilize or see us. Because you may consider us statistically insignificant now, but one more fact that has no alternative is that we are the fastest growing racial demographic in the country. We are 23 million strong. We are united, and we are waking up. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2353&quot;&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2357&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6315.14&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2358&quot; instrument_node=&quot;&quot;&gt;01:45:15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2356&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2355&quot;&gt;&lt;span data-dcnode-id=&quot;2354&quot; instrument_node=&quot;&quot;&gt;
Thank you, sir. Our next witness is Shirin Sinnar. She’s professor of law and John A. Wilson faculty scholar at Stanford Law School. Her scholarship focuses on, among other things, the role of institutions in protecting individual rights and democratic values the national security context. Her recent work assesses the legal regime for domestic and international terrorism under US law. Professor Sinnar holds a JD from Stanford, a master of philosophies, international relations from Cambridge University, and an MA and a BA as well from Harvard. She was a law clerk for the Honorable Warren J. Ferguson of the US Court of Appeals for the ninth circuit. Professor Sinnar, you are now recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2352&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2345&quot;&gt;&lt;span data-dcnode-id=&quot;2351&quot; instrument_node=&quot;&quot;&gt;Shirin Sinnar: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2349&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6364.38&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2350&quot; instrument_node=&quot;&quot;&gt;01:46:04&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2348&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2347&quot;&gt;&lt;span data-dcnode-id=&quot;2346&quot; instrument_node=&quot;&quot;&gt;
Thank you for convening this important hearing and inviting me to participate. I want to begin by acknowledging the horrific mass shootings in Atlanta. Whatever the motive, those murders have traumatized Asian-American communities already reeling from a year of persistent hate violence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2337&quot;&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt;Shirin Sinnar: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2341&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6384.11&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2342&quot; instrument_node=&quot;&quot;&gt;01:46:24&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2340&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2339&quot;&gt;&lt;span data-dcnode-id=&quot;2338&quot; instrument_node=&quot;&quot;&gt;
I’d like to make two points today. First, while the causes of hate crimes are complex, academic research shows that hostile rhetoric from political leaders towards immigrants or racial minorities can embolden people to commit violence against them. Research also shows that political events that change perceptions of social norms, like the acceptability of racist or xenophobic views, have triggered hate violence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2336&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2329&quot;&gt;&lt;span data-dcnode-id=&quot;2335&quot; instrument_node=&quot;&quot;&gt;Shirin Sinnar: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2333&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6415.06&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2334&quot; instrument_node=&quot;&quot;&gt;01:46:55&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2332&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2331&quot;&gt;&lt;span data-dcnode-id=&quot;2330&quot; instrument_node=&quot;&quot;&gt;
And specifically with respect to former President Trump, prior studies have shown that hate crimes spiked immediately after his election, and that his negative tweets towards Muslims strongly correlated with anti-Muslim hate crimes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2328&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2321&quot;&gt;&lt;span data-dcnode-id=&quot;2327&quot; instrument_node=&quot;&quot;&gt;Shirin Sinnar: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2325&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6432.62&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2326&quot; instrument_node=&quot;&quot;&gt;01:47:12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2324&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2323&quot;&gt;&lt;span data-dcnode-id=&quot;2322&quot; instrument_node=&quot;&quot;&gt;
That brings us to the past year, when former President Trump and other political leaders relentlessly characterized the coronavirus in racist terms, as recently as this week. Stop AAPI Hate’s research shows that Donald Trump’s anti- Asian tweets were shared on social media over a million times. A substantial number of anti-Asian hate incidents used language similar to Trump’s.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2313&quot;&gt;&lt;span data-dcnode-id=&quot;2319&quot; instrument_node=&quot;&quot;&gt;Shirin Sinnar: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2317&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6462.95&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2318&quot; instrument_node=&quot;&quot;&gt;01:47:42&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2316&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2315&quot;&gt;&lt;span data-dcnode-id=&quot;2314&quot; instrument_node=&quot;&quot;&gt;
Beyond rhetoric, the racial profiling of Chinese and Chinese-American researchers, scientists, and students as security risks exposes Asian-American communities to a higher risk of societal discrimination and violence. This is familiar from the experience of South Asian, Muslim, Sikh, and Arab-American communities treated as suspects over the nearly two decade long War on Terror.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2305&quot;&gt;&lt;span data-dcnode-id=&quot;2311&quot; instrument_node=&quot;&quot;&gt;Shirin Sinnar: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2309&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6492.97&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2310&quot; instrument_node=&quot;&quot;&gt;01:48:12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2308&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2307&quot;&gt;&lt;span data-dcnode-id=&quot;2306&quot; instrument_node=&quot;&quot;&gt;
While hostile rhetoric or discriminatory policy is certainly not the sole cause of recent anti-Asian violence, it has made Asian Americans vulnerable, both to racially motivated and to opportunistic attacks. The second point I’d like to make is that while the response to hate crimes is often billed to call for increased sentences, many Asian-American community organizations are now advocating a broader set of strategies who address hate crimes. Horrific acts like the Atlanta shootings require a serious law enforcement response. But for several reasons, community groups are also looking for solutions beyond criminal law, especially with respect to the more common forms of hate crimes that occur.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2304&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2297&quot;&gt;&lt;span data-dcnode-id=&quot;2303&quot; instrument_node=&quot;&quot;&gt;Shirin Sinnar: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2301&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6548.02&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2302&quot; instrument_node=&quot;&quot;&gt;01:49:08&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2300&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2299&quot;&gt;&lt;span data-dcnode-id=&quot;2298&quot; instrument_node=&quot;&quot;&gt;
For one thing, many incidents of hate speech targeting Asian-Americans do not qualify as criminal, but they still create significant harm. In addition, many victims do not report incidents to police because of mistrust of law enforcement. And concern around over policing and mass incarceration has led many communities of color to consider other avenues to help victims heal, hold perpetrators accountable, and prevent violence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2296&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2289&quot;&gt;&lt;span data-dcnode-id=&quot;2295&quot; instrument_node=&quot;&quot;&gt;Shirin Sinnar: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2293&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6581.95&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2294&quot; instrument_node=&quot;&quot;&gt;01:49:41&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2292&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2291&quot;&gt;&lt;span data-dcnode-id=&quot;2290&quot; instrument_node=&quot;&quot;&gt;
Numerous Asian-American organizations have emphasized the importance of cross racial solidarity in response to hate crimes, rather than pitting struggling communities against one another. Many have advocated deep investments in communities to strengthen support systems, both to prevent violence and to support violence when hate crimes occur. That support can take many forms, whether it is through funding, culturally competent mental healthcare services, reforming victim compensation programs to better support hate crimes victims, hosting conflict deescalation training, or establishing grant programs to protect institutions at high risk of hate crimes. There’s also growing interest in exploring forms of restorative justice to address hate crimes, especially with respect to young offenders and relatively less serious offenses. Restorative justice refers to processes that bring together people affected by an offense, to address the harm and agree upon mechanisms to repair it. Some evidence suggests that restorative justice programs reduce recidivism and alleviate the emotional harm of survivors better than traditional criminal processes. They are not an option in every case, and much more research is necessary, but there is growing interest within communities in creative alternatives to hold people accountable, help victims recover their sense of safety, and prevent further violence. Thank you for the opportunity to share these thoughts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2281&quot;&gt;&lt;span data-dcnode-id=&quot;2287&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2285&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6689.62&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2286&quot; instrument_node=&quot;&quot;&gt;01:51:29&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2284&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2283&quot;&gt;&lt;span data-dcnode-id=&quot;2282&quot; instrument_node=&quot;&quot;&gt;
Thank you for sharing that. Our last witness is Hiroshi Motomura. He is Susan Westerberg Prager distinguished professor of law faculty co-director, Center for Immigration of Law and Policy at UCLA. His teachings and scholarship focus on immigration and citizenship. His book Americans in Waiting: the Lost Story of Immigration and Citizenship in the United States won the professional and scholarly publishing award of the Association of American Publishers as the year’s best book in law and legal studies. Professor Motomura received his JD from Cal Berkeley and his BA from Yale.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2273&quot;&gt;&lt;span data-dcnode-id=&quot;2279&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2277&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6733.69&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2278&quot; instrument_node=&quot;&quot;&gt;01:52:13&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2276&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2275&quot;&gt;&lt;span data-dcnode-id=&quot;2274&quot; instrument_node=&quot;&quot;&gt;
Professor, you’re now recognized for five minutes.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2272&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2265&quot;&gt;&lt;span data-dcnode-id=&quot;2271&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2269&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6738.12&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2270&quot; instrument_node=&quot;&quot;&gt;01:52:18&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2268&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2267&quot;&gt;&lt;span data-dcnode-id=&quot;2266&quot; instrument_node=&quot;&quot;&gt;
Mr. Chairman, ranking member, thank you for the opportunity to speak to you today. My remarks take a step back from the specifics of the incidents that other witnesses have addressed. There’s a natural tendency to explain away these crimes as an isolated acts of a few individuals. And related as natural tendency to avoid a deep look at why these crimes were committed, why more crimes now, why against victims of Asian ancestry. But these crimes follow a long historical pattern, as you’ve heard today, and I’d like to explain a key reason for this history.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2264&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2257&quot;&gt;&lt;span data-dcnode-id=&quot;2263&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2261&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6769.29&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2262&quot; instrument_node=&quot;&quot;&gt;01:52:49&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2260&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2259&quot;&gt;&lt;span data-dcnode-id=&quot;2258&quot; instrument_node=&quot;&quot;&gt;
Individuals commit crimes, but they do so in a society that reflects the laws under which we live. To see hate crimes as isolated is to close their eyes to the role of law in shaping attitudes, especially about who’s worthy and who is not.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2256&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2249&quot;&gt;&lt;span data-dcnode-id=&quot;2255&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2253&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6783.08&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2254&quot; instrument_node=&quot;&quot;&gt;01:53:03&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2252&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2251&quot;&gt;&lt;span data-dcnode-id=&quot;2250&quot; instrument_node=&quot;&quot;&gt;
Our focus is on the immigration laws of the United States, and especially in how these laws have laid the foundation of hate crimes against Asian-Americans in the past, in the present, but I hope not in the future.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2248&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2241&quot;&gt;&lt;span data-dcnode-id=&quot;2247&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2245&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6795.24&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2246&quot; instrument_node=&quot;&quot;&gt;01:53:15&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2244&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2243&quot;&gt;&lt;span data-dcnode-id=&quot;2242&quot; instrument_node=&quot;&quot;&gt;
I’ll start by observing that throughout our nation’s history, immigration laws and statutes, regulations, and executive branch orders have discriminated and excluded on the basis of race, nationality, religion, and ethnicity. There are many examples. Chinese exclusion, as you’ve heard, dates back to the 1870s and 1880s, but it was the law of the land until 1943. My own family was one of the very small number of Japanese allowed to come to America before 1965, when immigration from Asia was severely limited. And similarly, the large undocumented population from Mexico reflects an immigration system that historically has treated Mexican immigrants as disposable labor and today offers too few legal opportunities to work and live with family in this country. Most recently, many people have been barred from the United States because they come from certain majority Muslim or African countries. Immigration laws, at their simplest, separate “them” outside the border from “us” inside the border. And this may be why public figures have felt free to disparage and insult people from certain other countries, even when some of those same public figures might never say the same thing about US citizens tracing family roots to those very same places.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2233&quot;&gt;&lt;span data-dcnode-id=&quot;2239&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2237&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6868&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2238&quot; instrument_node=&quot;&quot;&gt;01:54:28&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2236&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2235&quot;&gt;&lt;span data-dcnode-id=&quot;2234&quot; instrument_node=&quot;&quot;&gt;
But immigration laws don’t just affect people outside the United States. Immigration laws can make it hard or even impossible for some US citizens but not others to live in this country, in their United States with their spouses and children and other close relatives. In other words, to make a family here, to make a life here, in this United States as a family.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2232&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2225&quot;&gt;&lt;span data-dcnode-id=&quot;2231&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2229&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6889.45&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2230&quot; instrument_node=&quot;&quot;&gt;01:54:49&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2228&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2227&quot;&gt;&lt;span data-dcnode-id=&quot;2226&quot; instrument_node=&quot;&quot;&gt;
In this way, immigration laws tell some us citizens they’re still foreigners if they cannot fully partake in American life. If they trace their family origin to disfavored parts of the world, or if they follow a disfavored faith, then the message is that their citizenship isn’t as worthy of respect as the citizenship of other Americans. Their citizenship is devalued. In these ways, immigration laws enable discrimination that’s based on race, and often against US citizens.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2224&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2217&quot;&gt;&lt;span data-dcnode-id=&quot;2223&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2221&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6917.97&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2222&quot; instrument_node=&quot;&quot;&gt;01:55:17&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2220&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2219&quot;&gt;&lt;span data-dcnode-id=&quot;2218&quot; instrument_node=&quot;&quot;&gt;
Chinese exclusion, for example, was rooted in the idea that people of Chinese descent could not become fully equal citizens of this country because they’re not white. When 120, 000 people of Japanese ancestry, most of them were US citizens, were incarcerated in relocation camps during World War II, this too was only possible because they were seen as foreign because of their race.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2216&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2209&quot;&gt;&lt;span data-dcnode-id=&quot;2215&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2213&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6943.01&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2214&quot; instrument_node=&quot;&quot;&gt;01:55:43&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2212&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2211&quot;&gt;&lt;span data-dcnode-id=&quot;2210&quot; instrument_node=&quot;&quot;&gt;
So especially when this permission to discriminate is embraced, endorsed, and amplified by global public figures, what happens next should come as no surprise. The message is that some US citizens don’t belong, that they’re really foreigners, and that their lives and property aren’t worth as much. That message leads to hate crimes against people cast by our American immigration laws as fundamentally less American.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2208&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2201&quot;&gt;&lt;span data-dcnode-id=&quot;2207&quot; instrument_node=&quot;&quot;&gt;Hiroshi Motomura: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2205&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6969.64&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2206&quot; instrument_node=&quot;&quot;&gt;01:56:09&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2204&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2203&quot;&gt;&lt;span data-dcnode-id=&quot;2202&quot; instrument_node=&quot;&quot;&gt;
No hate crime is an isolated act. We need to take national responsibility for the role of law and what we’re seeing today. By discriminating in ways that suggest some US citizens don’t belong here, our immigration laws have laid the foundation for hate crimes. And as long as our laws continue to lay this foundation, our entire country will suffer because the promise of a shared citizenship that can unite us all will remain unfulfilled. Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2200&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2193&quot;&gt;&lt;span data-dcnode-id=&quot;2199&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2197&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D6997.31&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2198&quot; instrument_node=&quot;&quot;&gt;01:56:37&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2196&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2195&quot;&gt;&lt;span data-dcnode-id=&quot;2194&quot; instrument_node=&quot;&quot;&gt;
And thank you, sir. We appreciate your attendance and your participation in our hearing. We will now have a round of questioning, and we will be under the five minute rule ourselves. And I’ll begin by recognizing myself for a question.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2185&quot;&gt;&lt;span data-dcnode-id=&quot;2191&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2189&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7013.75&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2190&quot; instrument_node=&quot;&quot;&gt;01:56:53&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2188&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2187&quot;&gt;&lt;span data-dcnode-id=&quot;2186&quot; instrument_node=&quot;&quot;&gt;
And I’d like to ask Ms. Lee, is there empirical or historical evidence supporting the claim that leaders promoting stereotypes or using rhetoric aimed at a particular ethnic racial group leads to increase levels of discrimination or violence against a group? Are there historical examples of this?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2184&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2177&quot;&gt;&lt;span data-dcnode-id=&quot;2183&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2181&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7036.08&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2182&quot; instrument_node=&quot;&quot;&gt;01:57:16&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2180&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2179&quot;&gt;&lt;span data-dcnode-id=&quot;2178&quot; instrument_node=&quot;&quot;&gt;
Thank you, chairman, for that wonderful question. And the answer is clearly yes. There is unfortunately a huge amount of historical evidence. Of the record is very clear. We’ve got mayors of major cities, we have lawmakers in Congress explaining Asian people in the crudest, most racist terms.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2176&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2169&quot;&gt;&lt;span data-dcnode-id=&quot;2175&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2173&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7061.44&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2174&quot; instrument_node=&quot;&quot;&gt;01:57:41&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2172&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2171&quot;&gt;&lt;span data-dcnode-id=&quot;2170&quot; instrument_node=&quot;&quot;&gt;
In 1876, in San Francisco, Mayor Bryant, mayor of the time of that city, gathered a mob of thousands of people in downtown San Francisco and talked about the Chinese immigration question as one that needed to be solved, or that if Chinese immigration would continue, it would lead to the downfall of American civilization and of the white race.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2168&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2161&quot;&gt;&lt;span data-dcnode-id=&quot;2167&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2165&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7090.04&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2166&quot; instrument_node=&quot;&quot;&gt;01:58:10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2164&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2163&quot;&gt;&lt;span data-dcnode-id=&quot;2162&quot; instrument_node=&quot;&quot;&gt;
In 1882, when Congress is introducing… Lawmakers introduced the Chinese Exclusion Act, some of the lawmakers, including Senator Miller of California, described Chinese immigrants as a degraded and inferior race and a threat to national security. They stole jobs from white workers. They were also a danger to the public good of the country.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2160&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2153&quot;&gt;&lt;span data-dcnode-id=&quot;2159&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2157&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7120.2&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2158&quot; instrument_node=&quot;&quot;&gt;01:58:40&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2156&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2155&quot;&gt;&lt;span data-dcnode-id=&quot;2154&quot; instrument_node=&quot;&quot;&gt;
And then during World War II, our military leaders were very explicit in their descriptions of Japanese people, Japanese-Americans, as “an enemy race.” One of the leaders of that was one of our military officials, Lieutenant General John L. Dewitt, who was in charge of making sure that Japanese-Americans were forcibly removed and relocated from the West Coast.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2152&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2145&quot;&gt;&lt;span data-dcnode-id=&quot;2151&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2149&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7150&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2150&quot; instrument_node=&quot;&quot;&gt;01:59:10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2148&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2147&quot;&gt;&lt;span data-dcnode-id=&quot;2146&quot; instrument_node=&quot;&quot;&gt;
Thank you very much. [crosstalk 01:59:10].&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2144&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2137&quot;&gt;&lt;span data-dcnode-id=&quot;2143&quot; instrument_node=&quot;&quot;&gt;Erika Lee: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2141&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7150&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2142&quot; instrument_node=&quot;&quot;&gt;01:59:10&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2140&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2139&quot;&gt;&lt;span data-dcnode-id=&quot;2138&quot; instrument_node=&quot;&quot;&gt;
Thank you.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2136&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2129&quot;&gt;&lt;span data-dcnode-id=&quot;2135&quot; instrument_node=&quot;&quot;&gt;Mr. Cohen: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2133&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7152.09&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2134&quot; instrument_node=&quot;&quot;&gt;01:59:12&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2132&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2131&quot;&gt;&lt;span data-dcnode-id=&quot;2130&quot; instrument_node=&quot;&quot;&gt;
We have a miserable history in this area. I appreciate your elucidating upon it. And I’d now like to yield the remainder of my time to the Honorable Ted Lieu, Congressman from California.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2128&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2121&quot;&gt;&lt;span data-dcnode-id=&quot;2127&quot; instrument_node=&quot;&quot;&gt;Ted Lieu: (&lt;/span&gt;&lt;a data-dcnode-id=&quot;2125&quot; data-wpel-link=&quot;exclude&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.rev.com/transcript-editor/shared/ItwVZGVfb2q8aqMnuGvNwTo77UC4gBDWqxU7EYbGWFLjIoKllEMdl_ura8vo8HDApT9tRcpN0NnNrP5ZYRonmdpkBZQ%3FloadFrom%3DPastedDeeplink%26ts%3D7162.54&quot; rel=&quot;nofollow&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2126&quot; instrument_node=&quot;&quot;&gt;01:59:22&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2124&quot; instrument_node=&quot;&quot;&gt;)&lt;/span&gt;&lt;br data-dcnode-id=&quot;2123&quot;&gt;&lt;span data-dcnode-id=&quot;2122&quot; instrument_node=&quot;&quot;&gt;
Thank you, Chairman Cohen, for holding this important hearing and for allowing me to participate. Asian-Americans have now experienced a surge in hate crimes, hate incidents, and discrimination since the start of the pandemic. And I want to explore some of the reasons for that.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2120&quot; instrument_node=&quot;&quot;&gt;

When [inaudible 02:00:12] of former President Donald Trump used racist dog whistles that are clearly interpreted as an effort to blame one community or one government, and by implication, the community of people who are thought to be associated with it, that affects the entire society. And Stop AAPI Hate’s research shows, as well, that those tweets from the former President were retweeted over a million times. So once you have that norm setting at the top, that normalizes stigmatizing a particular community for hate, it does lead to ripple effects across society at large.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2104&quot; instrument_node=&quot;&quot;&gt;

Thank you very much. I’d like to now respond to the ranking Republican member today at the hearing. I previously served active duty in United States Air Force. I’m very aware of who the bad guys are and who our foreign enemies are. But this hearing is about Americans of Asian descent who are being targeted in the United States. It’s not about policing speech. I served on active duty so you can say whatever you want on the First Amendment. You can say racist, stupid stuff if you want. But I’m asking you to please stop using racist terms like Kung Flu or Wuhan Virus or other ethnic identifiers in describing this virus. I am not a virus. And when you say things like that, it hurts the Asian-American community. Whatever political points you think you are scoring by using ethnic identifiers in describing this virus, you’re harming Americans who happen to be an Asian descent. So please stop doing that. I yield back.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2096&quot; instrument_node=&quot;&quot;&gt;

Yes. Thank you. Thank you so much, Mr. Chairman. One second, hold tight. We’ve heard a lot today about the alarming rise in violence against Asian-Americans. My heart goes out to the Asian-American community and all victims of crime. No one should feel unsafe in their own neighborhoods. I’m concerned that there’s a cultural lawlessness that’s become pervasive and impacts every community, and we need to follow the facts. For example, in 2008 survey by the San Francisco Police Department studied 300 robberies. In 85% of the assault crimes, the victims were Asian. The perpetrators were black Americans. Between 1980 and 2008, the Department of Justice found that 84% of white victims were killed by white offenders and 93% of black victims were killed by black offenders. What does this tell us about the possibility of a deeper, more systemic issue? Like the deterioration of the family unit and the negative impact it’s having on all communities.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2080&quot; instrument_node=&quot;&quot;&gt;
