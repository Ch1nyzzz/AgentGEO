t;li id=&quot;main-views-viewviewsevo-in-the-news-contentevo-in-the-news&quot; class=&quot;sf-depth-2 sf-no-children sf-first&quot; role=&quot;none&quot;&gt;&lt;a href=&quot;/media-center/in-the-news&quot; title=&quot;View news articles featuring your Member of Congress. &quot; class=&quot;sf-depth-2&quot; role=&quot;menuitem&quot;&gt;In the News&lt;/a&gt;&lt;/li&gt;&lt;li id=&quot;main-views-viewviewsevo-press-releasesevo-media-press-releases&quot; class=&quot;sf-depth-2 sf-no-children&quot; role=&quot;none&quot;&gt;&lt;a href=&quot;/media-center/press-releases&quot; title=&quot;View press releases posted by your Member of Congress. &quot; class=&quot;sf-depth-2&quot; role=&quot;menuitem&quot;&gt;Press Releases&lt;/a&gt;&lt;/li&gt;&lt;li id=&quot;main-menu-link-contente0a2a04d-a1e1-4732-ac71-64b1123c06df&quot; class=&quot;sf-depth-2 sf-no-children&quot; role=&quot;none&quot;&gt;&lt;a href=&quot;/media-center/social-media&quot; title=&quot;View various social media tools by which you may learn more about my views and work in Congress and the District.&quot; class=&quot;sf-depth-2&quot; role=&quot;menuitem&quot;&gt;Social Media&lt;/a&gt;&lt;/li&gt;&lt;li id=&quot;main-menu-link-content38360a41-9c9b-45f3-b582-e118893ad24d&quot; class=&quot;sf-depth-2 sf-no-children&quot; role=&quot;none&quot;&gt;&lt;a href=&quot;/media-center/feeds&quot; title=&quot;My available News Feeds/RSS Feeds as well as some brief information for users new to the use of News Feeds/RSS Feeds.&quot; class=&quot;sf-depth-2&quot; role=&quot;menuitem&quot;&gt;Feeds&lt;/a&gt;&lt;/li&gt;&lt;li id=&quot;main-menu-link-content830e08fe-1605-45fd-8a8f-d84bbb018750&quot; class=&quot;sf-depth-2 sf-no-children&quot; role=&quot;none&quot;&gt;&lt;a href=&quot;/media-center/press-kit&quot; title=&quot;Members of the media can view and download my official press kit.&quot; class=&quot;sf-depth-2&quot; role=&quot;menuitem&quot;&gt;Press Kit&lt;/a&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/nav&gt;&lt;!-- NAVBAR END --&gt;&lt;main class=&quot;evo-main pt-5 pb-5&quot;&gt;&lt;!--  USERBAR --&gt;&lt;section class=&quot;page__userbar mb-3 evo-userbar&quot;&gt;&lt;div class=&quot;container d-flex&quot;&gt;&lt;div class=&quot;flex-fill mr-auto evo-userbar-first&quot;&gt;&lt;div data-drupal-messages-fallback class=&quot;hidden&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;!--  USERBAR END --&gt;&lt;!--  PREFACE --&gt;&lt;!--  PREFACE END --&gt;&lt;!-- POPUP --&gt;&lt;!-- POPUP END --&gt;&lt;!-- CONTENT --&gt;&lt;div class=&quot;page__content evo-page-content&quot;&gt;&lt;div class=&quot;container&quot;&gt;&lt;section class=&quot;page__breadcrumb evo-breadcrumb&quot;&gt;&lt;div class=&quot;block block--drupaltheme58-grace-meng-breadcrumbs&quot;&gt;&lt;nav aria-label=&quot;breadcrumb&quot; class=&quot;&quot;&gt;&lt;ol class=&quot;breadcrumb&quot;&gt;&lt;li class=&quot;breadcrumb-item &quot;&gt;&lt;a href=&quot;/&quot;&gt;Home&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;breadcrumb-item &quot;&gt;&lt;a href=&quot;/media-center&quot;&gt;Media&lt;/a&gt;&lt;/li&gt;&lt;li class=&quot;breadcrumb-item &quot;&gt;&lt;a href=&quot;/media-center/press-releases&quot;&gt;Press Releases&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;/nav&gt;&lt;/div&gt;&lt;/section&gt;&lt;div class=&quot;row&quot;&gt;&lt;div class=&quot;col evo-content&quot;&gt;&lt;a id=&quot;main-content&quot;&gt;&lt;/a&gt;&lt;div class=&quot;block block--drupaltheme58-grace-meng-page-title&quot;&gt;&lt;h1 class=&quot;display-4&quot;&gt;&lt;span&gt;Meng Reintroduces Legislation To Lower The Voting Age In America To 16 Years Old&lt;/span&gt;&lt;/h1&gt;&lt;/div&gt;&lt;div class=&quot;block block--drupaltheme58-grace-meng-content&quot;&gt;&lt;article class=&quot;node evo-press-release evo-press-release--full&quot;&gt;&lt;div&gt;&lt;div  class=&quot;row evo-create-type&quot;&gt;&lt;div class=&quot;col-auto&quot;&gt;January 26, 2023 &lt;/div&gt;&lt;div class=&quot;col-auto&quot;&gt;&lt;a href=&quot;/media-center/press-releases&quot; alt=&quot;View Press Release listings&quot;&gt;Press Release&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;evo-press-release__body&quot;&gt;&lt;div&gt;WASHINGTON, D.C. – U.S. Rep. Grace Meng (D-NY) announced today that she reintroduced her legislation that would lower the voting age in the United States to 16-years-old.&lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;The Congresswoman's measure seeks to replace the 26th amendment of the U.S. Constitution with a new amendment that would allow 16- and 17-year-olds the right to vote.&lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;Over the past few years, we have seen the influence young people in our nation have on trends, political movements, and elections,&quot; &lt;b&gt;said Meng.&lt;/b&gt; &quot;They continue to advocate for many crucial issues for which they are deeply passionate about. It is time to give them a voice in our democracy and reward their passion so that their voices are heard at the ballot box. 16- and 17-year-olds are legally permitted to work, drive and they also pay federal income taxes. They are contributing members of our society and I believe it is right and fair to allow them to vote in our elections. I am proud and honored to stand by our nation's young people in introducing this legislation and hope my colleagues in the House support it.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;We're excited to see momentum in states across the country for the common-sense policy reform of lowering the voting age to 16,&quot; &lt;b&gt;said Andrew Wilkes, Generation Citizen's Chief Policy and Advocacy Officer.&lt;/b&gt; &quot;Congresswoman Meng's national leadership in putting forward this legislation is aligned with the research: 16 is the right age to establish the habit of voting. This bill also supports young people's journey of informed participation and having a say on the issues which directly affect their lives.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;18by Vote deeply supports Representative Meng's proposed legislation to lower the U.S. voting age to 16-years-old,&quot; &lt;b&gt;said Ava Mateo, Executive Director of 18by Vote.&lt;/b&gt; &quot;As countries around the world have extended voting rights to 16-year-olds, research has found that lowering the voting age increases youth voter participation. Furthermore, studies have found that 16-year-olds hold equivalent levels of civic competence to 18-year-olds. Through their youth-led activism and advocacy, 16- and 17-year-olds across the nation have demonstrated their readiness to make their voices heard through their vote and to put in the work to be active, informed, and engaged citizens.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;Congresswoman Meng's record demonstrates a long-standing commitment to engaging young people in the civic process. As our democracy faces unprecedented attacks and as our country grapples with great, imminent challenges, it is critical we ensure those whose futures are most impacted and who will be responsible for resolving these issues for years to come are empowered to take action and have a voice today,&quot; &lt;b&gt;said Carolyn DeWitt, President and Executive Director of Rock The Vote.&lt;/b&gt; &quot;Any effort to make young people's voices heard on a local, state, and federal level is an important one.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;As a coalition of young and future voters, Voters of Tomorrow is thrilled to support Representative Meng's legislation to lower the voting age to 16-years-old,&quot; &lt;b&gt;said Jack Lobel, Press Secretary for Voters of Tomorrow.&lt;/b&gt; &quot;Young Americans like us have perhaps the most at stake in our nation's future. We deserve a direct say in electing the lawmakers who have the power to shape it. Sixteen- and seventeen-year-old Americans are students, workers, taxpayers, and engaged constituents. They will soon be the citizens responsible for upholding the ideals of our representative democracy, and we must include them in the quintessential civic process of voting.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;We at FairVote Action have always supported the importance of the right to vote, and we thank Representative Meng for leading this important conversation about the most appropriate voting age,&quot; &lt;b&gt;said Rob Richie, President and CEO of FairVote Action.&lt;/b&gt; &quot;It's time for our nation to embrace this conversation. Early uses of a lower voting age in some cities and state primaries have been promising, with positive impacts on voter participation and involvement of young people in the political process.&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;The National Youth Rights Association strongly supports Representative Meng's constitutional amendment to lower the voting age to 16,&quot; &lt;b&gt;said Neil Bhateja, &lt;/b&gt;&lt;b&gt;a National Youth Rights Association Board Member.&lt;/b&gt; &quot;When the government makes decisions about education, the environment, and war and peace, young people are affected for more years of their lives than any other age demographic. They work and are subject to taxation without representation: income tax, sales tax, payroll taxes, and more. In Scotland, Brazil, Austria, and Argentina, 16-year-olds have shown that they're ready to vote and deserve to shape their own futures. The United States should continue its democratic tradition of extending voting rights. Thank you Representative Meng for your leadership on this issue in Congress!&quot; &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;&quot;As an organization that builds youth political power, our communities face a glaring issue: 16 and 17-year-olds have no say in who will best represent their values and priorities even though they will disproportionately bear the brunt of decisions in the present and future,&quot; &lt;b&gt;said Elona J Wilson, Executive Director at Next Up Action Fund. &lt;/b&gt;&quot;Lowering the voting age to 16 is a bold idea to strengthen our democracy, and we strongly support Congresswoman Meng's proposed constitutional amendment to lower the voting age.&quot; &lt;br&gt;&lt;/div&gt;&lt;div&gt;Constitutional amendments require passage by two-thirds of the House and Senate, and ratification by three-fourths of the nation's state legislatures. If enacted, the voting age would be lowered for federal, state, and local elections. The last time that the voting age was lowered was when it went from 21 to 18 in 1971.  &lt;/div&gt;&lt;div&gt;&lt;/div&gt;&lt;div&gt;Meng's legislation (H.J.res.16), can be viewed &lt;a href=&quot;//meng.house.gov/sites/evo-subsites/meng-evo.house.gov/files/BILLS-118hjres16ih.pdf&quot; target=&quot;_blank&quot; title=&quot;meng.house.gov/sites/evo-subsites/meng-evo.house.gov/files/BILLS-118hjres16ih.pdf&quot;&gt;here&lt;/a&gt;.&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/article&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;!-- CONTENT END --&gt;&lt;!-- POSTSCRIPT --&gt;&lt;!-- POSTSCRIPT END --&gt;&lt;/main&gt;&lt;!-- FOOTER --&gt;&lt;footer class=&quot;page__footer evo-footer p-2&quot;&gt;&lt;div class=&quot;container-fluid&quot;&gt;&lt;div class=&quot;d-flex&quot;&gt;&lt;div class=&quot;flex-fill mr-auto evo-footer-left&quot;&gt;&lt;div class=&quot;views-element-container block block--drupaltheme58-grace-meng-evo-office-locations-block-map&quot;&gt;&lt;div block=&quot;drupaltheme58_grace_meng_evo_office_locations_block_map&quot;&gt;&lt;div class=&quot;office-locations js-view-dom-id-9e05d8b419447d14679c332fbd3054575c3ee53aef8b3843e761e554bd265114&quot;&gt;&lt;div class=&quot;evo-view-evo-office-locations evo-view-wrapper&quot;&gt;&lt;div class=&quot;evo-views-row-container&quot;&gt;&lt;div class=&quot;views-row evo-views-row views-row-0 views-row-first&quot;&gt;&lt;div class=&quot;views-field views-field-nothing&quot;&gt;&lt;d
