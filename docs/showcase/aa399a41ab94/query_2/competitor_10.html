&lt;/span&gt;&lt;div class=&quot;article-mainbody-centre&quot; data-dcnode-id=&quot;1747&quot;&gt;&lt;span data-dcnode-id=&quot;2003&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-fulltext&quot; data-dcnode-id=&quot;1749&quot;&gt;&lt;span data-dcnode-id=&quot;2002&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2000&quot;&gt;&lt;span data-dcnode-id=&quot;2001&quot; instrument_node=&quot;&quot;&gt;Like many other spiral galaxies in the Universe, the Milky Way Galaxy consists of two disk-like structures – the thin disk and the thick disk. The thick disk, which envelopes the thin disk, contains about 20 percent of the Milky Way's stars and is thought to be the older of the pair based on the composition of its stars (which have greater metallicity) and its puffier nature.&lt;/span&gt;&lt;/p&gt;&lt;div data-dcnode-id=&quot;1993&quot; style=&quot;margin:10px 0;text-align:center;&quot;&gt;&lt;div class=&quot;priad-1 Purch_Y_C_0_1&quot; data-dcnode-id=&quot;1994&quot; id=&quot;Purch_Y_C_0_1&quot;&gt;&lt;div class=&quot;bordeaux-slot bordeaux-filled-slot&quot; data-dcnode-id=&quot;1995&quot; id=&quot;bordeaux-static-slot-6&quot; style=&quot;display: flex; flex-direction: column; margin: auto; width: 300px; height: 250px;&quot;&gt;&lt;a class=&quot;sr-only&quot; data-dcnode-id=&quot;1998&quot; href=&quot;#skip-to-div-bordeaux-static-slot-6&quot; style=&quot;background: #2c2e32;
    color: #fff;
    height: 0;
    overflow: hidden;
    padding: 0;
    position: absolute;
    transition-property: none;
    width: 0;
    z-index: 100000;&quot;&gt;&lt;span data-dcnode-id=&quot;1999&quot; instrument_node=&quot;&quot;&gt;Skip advert&lt;/span&gt;&lt;/a&gt;&lt;div data-dcnode-id=&quot;1997&quot; data-feat-ref=&quot;bordeaux-feat-id-108&quot; id=&quot;bordeaux-preemptive-ad-4&quot; style=&quot;position: sticky; top: 0px; margin: 0px auto;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;sr-only&quot; data-dcnode-id=&quot;1996&quot; id=&quot;skip-to-div-bordeaux-static-slot-6&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1992&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;priad-mobile-spacer&quot; data-dcnode-id=&quot;1990&quot;&gt;&lt;span data-dcnode-id=&quot;1991&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;1985&quot;&gt;&lt;span data-dcnode-id=&quot;1989&quot; instrument_node=&quot;&quot;&gt;However, in a recent study, a team of 38 scientists led by researchers from Australia's &lt;/span&gt;&lt;a data-dcnode-id=&quot;1987&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//astro3d.org.au/&quot;&gt;&lt;span data-dcnode-id=&quot;1988&quot; instrument_node=&quot;&quot;&gt;ARC Centre of Excellence for All Sky Astrophysics in Three Dimensions&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1986&quot; instrument_node=&quot;&quot;&gt; (ASTRO-3D) used data from the now-retired Kepler mission to measure starquakes in the Milky Way's disk.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1983&quot;&gt;&lt;span data-dcnode-id=&quot;1984&quot; instrument_node=&quot;&quot;&gt;From this, they have revised the official estimates on the age of the Milky Way's thick disk, which they conclude is around 10 billion years old.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1975&quot;&gt;&lt;span data-dcnode-id=&quot;1982&quot; instrument_node=&quot;&quot;&gt;The study which describes their findings – titled &quot;&lt;/span&gt;&lt;a data-dcnode-id=&quot;1980&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//academic.oup.com/mnras/article-abstract/490/4/5335/5586605%3FredirectedFrom%3Dfulltext&quot;&gt;&lt;span data-dcnode-id=&quot;1981&quot; instrument_node=&quot;&quot;&gt;The K2-HERMES Survey: age and metallicity of the thick disc&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1979&quot; instrument_node=&quot;&quot;&gt;&quot; – recently appeared in the&lt;/span&gt;&lt;em data-dcnode-id=&quot;1977&quot;&gt;&lt;span data-dcnode-id=&quot;1978&quot; instrument_node=&quot;&quot;&gt; Monthly Notices of the Royal Astronomical Society&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1976&quot; instrument_node=&quot;&quot;&gt;. The research team was led by Dr. Sanjib Sharma of the Sydney Institute for Astronomy and the ARC Centre of Excellence for All Sky Astrophysics in Three Dimensions (ASTRO-3D) and included members from multiple universities and research institutes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1970&quot;&gt;&lt;span class=&quot;wf_caption&quot; data-dcnode-id=&quot;1971&quot; style=&quot;max-width: 700px; width: 100%; display: block;&quot;&gt;&lt;img alt=&quot;Anatomy of the Milky Way. (NASA/JPL Caltech/R.Hurt/SSC)&quot; data-dcnode-id=&quot;1974&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.sciencealert.com/images/2019-12/218673_web1.jpg&amp;amp;raw&quot; style=&quot;width: 100%;&quot; width=&quot;700&quot;&gt;&lt;span data-dcnode-id=&quot;1972&quot; style=&quot;text-align: right; display: block;&quot;&gt;&lt;span data-dcnode-id=&quot;1973&quot; instrument_node=&quot;&quot;&gt;Anatomy of the Milky Way. (NASA/JPL Caltech/R.Hurt/SSC)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1968&quot;&gt;&lt;span data-dcnode-id=&quot;1969&quot; instrument_node=&quot;&quot;&gt;To determine the age of the thick disk, Dr. Sharma and his team employed a method known as asteroseismology. This consists of measuring a star's oscillations caused by starquakes, where the crusts of stars undergo sudden shifts similar to Earthquakes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1966&quot;&gt;&lt;span data-dcnode-id=&quot;1967&quot; instrument_node=&quot;&quot;&gt;This process allows researchers to conduct &quot;galactic-archaeology&quot;, where they are able to look back in time to the formation of the Milky Way (over 13 billion years ago).&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1961&quot;&gt;&lt;span data-dcnode-id=&quot;1965&quot; instrument_node=&quot;&quot;&gt;As Dennis Stello – an associate professor at the University of New South Wales and a co-author on the study – &lt;/span&gt;&lt;a data-dcnode-id=&quot;1963&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.eurekalert.org/pub_releases/2019-12/acoe-svl120319.php&quot;&gt;&lt;span data-dcnode-id=&quot;1964&quot; instrument_node=&quot;&quot;&gt;explained&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1962&quot; instrument_node=&quot;&quot;&gt;, this allowed them to determine a star's internal structures:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;1956&quot;&gt;&lt;span data-dcnode-id=&quot;1960&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1958&quot;&gt;&lt;span data-dcnode-id=&quot;1959&quot; instrument_node=&quot;&quot;&gt;&quot;The quakes generate soundwaves inside the stars that make them ring, or vibrate. The frequencies produced tell us things about the stars' internal properties, including their age. It's a bit like identifying a violin as a Stradivarius by listening to the sound it makes.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;div data-dcnode-id=&quot;1948&quot; style=&quot;margin:10px 0;text-align:center;&quot;&gt;&lt;div class=&quot;priad Purch_Y_C_0_1&quot; data-dcnode-id=&quot;1950&quot; id=&quot;Purch_Y_C_0_1_clone_1&quot;&gt;&lt;span data-dcnode-id=&quot;1955&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1952&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1951&quot; id=&quot;bordeaux-static-slot-4&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1949&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;priad-mobile-spacer&quot; data-dcnode-id=&quot;1946&quot;&gt;&lt;span data-dcnode-id=&quot;1947&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;1944&quot;&gt;&lt;span data-dcnode-id=&quot;1945&quot; instrument_node=&quot;&quot;&gt;It is important to note that astronomers are not able to detect actual &quot;sounds&quot; generated by stars. Instead, movements within a star's interior are measured based on changes in a star's brightness.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1942&quot;&gt;&lt;span data-dcnode-id=&quot;1943&quot; instrument_node=&quot;&quot;&gt;Previously, astronomers had noted that observations conducted by the Kepler mission did not accord with models of the Milky Way's structure – which predicted that the thick disk would possess more low-mass stars.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1940&quot;&gt;&lt;span data-dcnode-id=&quot;1941&quot; instrument_node=&quot;&quot;&gt;Until now, it was unclear if this discrepancy was due to inaccuracies in the galactic models, or due to a problem in the selection criteria of the stars. Using new data from the K2 mission, Sharma and his colleagues found that it was the former.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1938&quot;&gt;&lt;span data-dcnode-id=&quot;1939&quot; instrument_node=&quot;&quot;&gt;Basically, previous galactic models assumed that the thick disk was populated by low-mass, low-metallicity stars.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1933&quot;&gt;&lt;span data-dcnode-id=&quot;1937&quot; instrument_node=&quot;&quot;&gt;However, using the K2 mission data to conduct a fresh spectroscopic analysis, Dr. Sharma and his team determined that the chemical composition incorporated into existing models was incorrect, leading to inaccurate estimates of their ages. By taking this into account, Dr. Sharma and his team were able to bring asteroseismic data into alignment with what galactic models predicted. As Dr. Sharma &lt;/span&gt;&lt;a data-dcnode-id=&quot;1935&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.eurekalert.org/pub_releases/2019-12/acoe-svl120319.php&quot;&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt;explained&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;:&lt;/span&gt;&lt;/p&gt;&lt;blockquote data-dcnode-id=&quot;1928&quot;&gt;&lt;span data-dcnode-id=&quot;1932&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1930&quot;&gt;&lt;span data-dcnode-id=&quot;1931&quot; instrument_node=&quot;&quot;&gt;&quot;This finding clears up a mystery… Earlier data about the age distribution of stars in the disc didn't agree with the models constructed to describe it, but no one knew where the error lay – in the data or the models. Now we're pretty sure we've found it.&quot;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1929&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/blockquote&gt;&lt;div data-dcnode-id=&quot;1920&quot; style=&quot;margin:10px 0;text-align:center;&quot;&gt;&lt;div class=&quot;priad Purch_Y_C_0_1&quot; data-dcnode-id=&quot;1922&quot; id=&quot;Purch_Y_C_0_1_clone_2&quot;&gt;&lt;span data-dcnode-id=&quot;1927&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span data-dcnode-id=&quot;1924&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;bordeaux-slot&quot; data-dcnode-id=&quot;1923&quot; id=&quot;bordeaux-static-slot-5&quot; style=&quot;display: flex; flex-direction: column; margin: auto;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1921&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;priad-mobile-spacer&quot; data-dcnode-id=&quot;1918&quot;&gt;&lt;span data-dcnode-id=&quot;1919&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;1916&quot;&gt;&lt;span data-dcnode-id=&quot;1917&quot; instrument_node=&quot;&quot;&gt;Since it was launched in 2009, the data collected by the Kepler mission suggested that there were a lot more younger stars in the thick disk than models predicted. While it was not primarily designed to conduct astroarchaeology, its ability to measure changes in a star's brightness (ostensibly due to planetary transits) are well-suited for measuring starquakes.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1914&quot;&gt;&lt;span data-dcnode-id=&quot;1915&quot; instrument_node=&quot;&quot;&gt;&quot;Stars are just spherical instruments full of gas, but their vibrations are tiny, so we have to look very carefully,&quot; said Sharma. &quot;The exquisite brightness measurements made by Kepler were ideal for that. The telescope was so sensitive it would have been able to detect the dimming of a car headlight as a flea walked across it.&quot;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1909&quot;&gt;&lt;span data-dcnode-id=&quot;1913&quot; instrument_node=&quot;&quot;&gt;These findings show that even after two of its reaction wheels failed in 2013, Kepler was still able to conduct valuable observations as part of its &lt;/span&gt;&lt;a data-dcnode-id=&quot;1911&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.universetoday.com/111941/kepler-space-telescope-gets-a-new-exoplanet-hunting-mission/&quot;&gt;&lt;span data-dcnode-id=&quot;1912&quot; instrument_node=&quot;&quot;&gt;K2 campaign&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1910&quot; instrument_node=&quot;&quot;&gt;. The results of this study are also a strong indication of the analytical power of asteroseismology and its ability to estimate the ages of stars.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1904&quot;&gt;&lt;span data-dcnode-id=&quot;1908&quot; instrument_node=&quot;&quot;&gt;More revelations are expected as scientists continue to pour over data obtained by the mission before it ceased operations in &lt;/span&gt;&lt;a data-dcnode-id=&quot;1906&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.universetoday.com/140421/its-over-for-kepler-the-most-successful-planet-hunter-ever-built-is-finally-out-of-fuel-and-has-just-been-shut-down/&quot;&gt;&lt;span data-dcnode-id=&quot;1907&quot; instrument_node=&quot;&quot;&gt;November of 2018&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1905&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1896&quot;&gt;&lt;span data-dcnode-id=&quot;1903&quot; instrument_node=&quot;&quot;&gt;The analysis of this data will be combined with new information gathered by NASA's &lt;/span&gt;&lt;a data-dcnode-id=&quot;1901&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nasa.gov/tess-transiting-exoplanet-survey-satellite&quot;&gt;&lt;span data-dcnode-id=&quot;1902&quot; instrument_node=&quot;&quot;&gt;Transiting Exoplanet Survey Satellite&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1900&quot; instrument_node=&quot;&quot;&gt; (TESS) – Kepler's spiritual successor, which took to space just &lt;/span&gt;&lt;a data-dcnode-id=&quot;1898&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.universetoday.com/139064/farewell-kepler-welcome-tess/&quot;&gt;&lt;span data-dcnode-id=&quot;1899&quot; instrument_node=&quot;&quot;&gt;seven months before Kepler retired&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1897&quot; instrument_node=&quot;&quot;&gt;. This information will further improve age estimates for even more stars within the disk and help astronomers to learn more about the formation and evolution of the Milky Way.&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1887&quot;&gt;&lt;strong data-dcnode-id=&quot;1888&quot;&gt;&lt;span data-dcnode-id=&quot;1895&quot; instrument_node=&quot;&quot;&gt;This article was originally published by &lt;/span&gt;&lt;a data-dcnode-id=&quot;1893&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.universetoday.com/&quot;&gt;&lt;span data-dcnode-id=&quot;1894&quot; instrument_node=&quot;&quot;&gt;Universe Today&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1892&quot; instrument_node=&quot;&quot;&gt;. Read the &lt;/span&gt;&lt;a data-dcnode-id=&quot;1890&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.universetoday.com/144282/a-new-way-to-measure-the-age-of-the-milky-way/&quot;&gt;&lt;span data-dcnode-id=&quot;1891&quot; instrument_node=&quot;&quot;&gt;original article&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1889&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;div data-dcnode-id=&quot;1753&quot; id=&quot;trendmd-suggestions&quot;&gt;&lt;div class=&quot;trendmd-widget-container trendmd-widget_title-larger trendmd-widget_body-smaller&quot; data-dcnode-id=&quot;1755&quot; data-trendmd-article-id=&quot;0a3b097a-7b9d-45a6-b46a-6cba2e2a8679&quot; data-trendmd-journal-id=&quot;59554&quot; data-trendmd-swoop=&quot;eyJzd2kiOiJTVy04NDc4NDY5NC0yNiJ9&quot; data-trendmd-widget-id=&quot;0&quot; similar-nonsponsored-merged=&quot;true&quot; style=&quot;display: none;&quot;&gt;&lt;span data-dcnode-id=&quot;1886&quot; instrument_node=&quot;&quot;&gt;
