            We are inside the Milky Way, so we see it edge-on from nearly halfway out to the edge of the disk. This infrared map from the ground-based 2MASS project shows the light from 500 million stars, delineating our galaxy’s disk and the central bulge.

&lt;/span&gt;&lt;div class=&quot;blog-post__body&quot; data-dcnode-id=&quot;839&quot;&gt;&lt;span data-dcnode-id=&quot;1035&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1018&quot;&gt;&lt;span data-dcnode-id=&quot;1034&quot; instrument_node=&quot;&quot;&gt;We live in the Milky Way galaxy, a decently large spiral-armed stellar city that has &lt;/span&gt;&lt;a data-dcnode-id=&quot;1032&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/how-big-is-the-milky-way&quot;&gt;&lt;span data-dcnode-id=&quot;1033&quot; instrument_node=&quot;&quot;&gt;a flat disk&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1031&quot; instrument_node=&quot;&quot;&gt; roughly 120,000 light years across, &lt;/span&gt;&lt;a data-dcnode-id=&quot;1029&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/the-andromeda-galaxys-halo-is-already-colliding-with-the-milky-ways&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1030&quot; instrument_node=&quot;&quot;&gt;a giant halo that extends for a million light years&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;, and &lt;/span&gt;&lt;a data-dcnode-id=&quot;1026&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/milky-way-crosses-its-heart-galactic-x&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1027&quot; instrument_node=&quot;&quot;&gt;a central bulge of stars shaped vaguely like a Tic Tac&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1025&quot; instrument_node=&quot;&quot;&gt;. Besides stars there's also gas, dust, and a &lt;/span&gt;&lt;em data-dcnode-id=&quot;1023&quot;&gt;&lt;span data-dcnode-id=&quot;1024&quot; instrument_node=&quot;&quot;&gt;lot&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1022&quot; instrument_node=&quot;&quot;&gt; of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1020&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.youtube.com/watch%3Fv%3D9W3RsaWuCuE&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1021&quot; instrument_node=&quot;&quot;&gt;dark matter&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1019&quot; instrument_node=&quot;&quot;&gt; (which can't be seen directly, but contributes to the galaxy's gravity overall).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1017&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1015&quot;&gt;&lt;span data-dcnode-id=&quot;1016&quot; instrument_node=&quot;&quot;&gt;Besides the general structure and size, one of the most important characteristics of the Milky Way is its mass, a way to measure the total amount of stuff in it. It's a fundamental property of matter, so you'd think we'd have a decent handle on our galaxy's mass.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1014&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1009&quot;&gt;&lt;span data-dcnode-id=&quot;1013&quot; instrument_node=&quot;&quot;&gt;But it turns out we don't. It's actually really hard to measure. There are a lot of ways to do it, but they depend on very difficult observations and very complicated models of how everything in the galaxy behaves. Worse, there are other galaxies out there, like &lt;/span&gt;&lt;a data-dcnode-id=&quot;1011&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/reassessing-an-irregular-spiral-a-spectacular-image-of-the-large-magellanic-cloud&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;1012&quot; instrument_node=&quot;&quot;&gt;the Large Magellanic Cloud&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1010&quot; instrument_node=&quot;&quot;&gt;, which can skew the results. Until pretty recently, the best astronomers could do was estimate the mass to roughly a factor of two. And that's not good enough if we want to understand how, for example, the Milky Way interacts with other galaxies around it.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1008&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1006&quot;&gt;&lt;span data-dcnode-id=&quot;1007&quot; instrument_node=&quot;&quot;&gt;By coincidence, two research papers on the mass of the Milky Way were recently published on the same day by two different teams of astronomers using different methods. And holy moly, they both get pretty much the same answer, which is welcome.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1005&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1003&quot;&gt;&lt;span data-dcnode-id=&quot;1004&quot; instrument_node=&quot;&quot;&gt;One paper gets a total mass for our galaxy of 690 billion times the mass of the Sun (which serves as a convenient unit), and the other gets a range of roughly 536 – 784 billion.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1002&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1000&quot;&gt;&lt;span data-dcnode-id=&quot;1001&quot; instrument_node=&quot;&quot;&gt;Cool. But there are details and caveats, because of course there are. The Universe is complicated.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;999&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;embedded-entity&quot; data-dcnode-id=&quot;965&quot; data-embed-button=&quot;media&quot; data-entity-embed-display=&quot;view_mode:media.embed&quot; data-entity-type=&quot;media&quot; data-entity-uuid=&quot;972012d8-8c2d-4e0c-b179-7200b0882caf&quot; data-langcode=&quot;en&quot;&gt;&lt;div class=&quot;media__image&quot; data-dcnode-id=&quot;967&quot;&gt;&lt;span data-dcnode-id=&quot;998&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;media__image-wrapper&quot; data-dcnode-id=&quot;986&quot;&gt;&lt;span data-dcnode-id=&quot;997&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div data-dcnode-id=&quot;990&quot;&gt;&lt;span data-dcnode-id=&quot;995&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;picture data-dcnode-id=&quot;991&quot;&gt;&lt;source data-dcnode-id=&quot;994&quot; media=&quot;(min-width: 640px)&quot; srcset=&quot;/sites/syfy/files/styles/blog-post-embedded--tablet/public/milkyway_structure_2000.jpg 1x, /sites/syfy/files/styles/blog-post-embedded--tablet-1_5x/public/milkyway_structure_2000.jpg 1.5x&quot; type=&quot;image/jpeg&quot;&gt;&lt;source data-dcnode-id=&quot;993&quot; media=&quot;(min-width: 300px)&quot; srcset=&quot;/sites/syfy/files/styles/blog-post-embedded--mobile/public/milkyway_structure_2000.jpg 1x, /sites/syfy/files/styles/blog-post-embedded--mobile-1_5x/public/milkyway_structure_2000.jpg 1.5x&quot; type=&quot;image/jpeg&quot;&gt;&lt;img alt=&quot;The structure of the Milky Way: A flattened disk with spiral arms (seen face-on, left, and edge-on, right), with a central bulge, a halo, and more than 150 globular clusters. The location of the Sun about halfway out is indicated.&quot; data-dcnode-id=&quot;992&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/sites/syfy/files/styles/blog-post-embedded--mobile/public/milkyway_structure_2000.jpg&amp;amp;raw&quot; typeof=&quot;foaf:Image&quot;&gt;&lt;/picture&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;989&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;media__metadata-wrapper&quot; data-dcnode-id=&quot;971&quot;&gt;&lt;span data-dcnode-id=&quot;983&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;media__caption&quot; data-dcnode-id=&quot;976&quot;&gt;&lt;span data-dcnode-id=&quot;982&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;978&quot;&gt;&lt;span data-dcnode-id=&quot;981&quot; instrument_node=&quot;&quot;&gt;The structure of the Milky Way: A flattened disk with spiral arms (seen face-on, left, and edge-on, right), with a central bulge, a halo, and more than 150 globular clusters. The location of the Sun about halfway out is indicated. Credit: &lt;/span&gt;&lt;a data-dcnode-id=&quot;979&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.esa.int/spaceinimages/Images/2016/09/Anatomy_of_the_Milky_Way&quot;&gt;&lt;span data-dcnode-id=&quot;980&quot; instrument_node=&quot;&quot;&gt;Left: NASA/JPL-Caltech; right: ESA; layout: ESA/ATG medialab&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;977&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;975&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;span class=&quot;media__credit&quot; data-dcnode-id=&quot;973&quot;&gt;&lt;span data-dcnode-id=&quot;974&quot; instrument_node=&quot;&quot;&gt;Photo: 
            Left: NASA/JPL-Caltech; right: ESA; layout: ESA/ATG medialab
      &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;972&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;970&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;968&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;966&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;964&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;954&quot;&gt;&lt;a data-dcnode-id=&quot;962&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arxiv.org/pdf/2111.09327.pdf&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;963&quot; instrument_node=&quot;&quot;&gt;The first paper looks at stars in the Milky Way's halo&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;961&quot; instrument_node=&quot;&quot;&gt;, the roughly spherical cloud of stars (and dark matter) that surrounds the galaxy. &lt;/span&gt;&lt;a data-dcnode-id=&quot;959&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//h3survey.rc.fas.harvard.edu/&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;960&quot; instrument_node=&quot;&quot;&gt;Using a survey of halo stars&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;958&quot; instrument_node=&quot;&quot;&gt; that goes out as far as roughly 300,000 light years and combining it with measurements from &lt;/span&gt;&lt;a data-dcnode-id=&quot;956&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/gaias-map-of-the-sky-with-two-billion-stars&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;957&quot; instrument_node=&quot;&quot;&gt;the Gaia mission&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;955&quot; instrument_node=&quot;&quot;&gt; (which measures the distances and motions of stars), they look at the distribution and velocities of these stars through space. How fast they move depends on how much mass the galaxy has interior to them — so (to oversimplify a bit) if you look at a star 100,000 light years out, you can find the galactic mass out to that distance — so this can be used to get the mass out to various distances.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;953&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;951&quot;&gt;&lt;span data-dcnode-id=&quot;952&quot; instrument_node=&quot;&quot;&gt;The statistical analysis is fiendishly complex, but what they wind up with is a model of the galaxy's mass versus distance from the center. Choosing a convenient distance out — 100,000 parsecs, equal to 326,000 light years — they get the value of 690 billion solar masses. If they go out to 200,000 (where they have to extrapolate somewhat so the uncertainties are a bit bigger) they get a mass of 1.08 trillion Suns. The uncertainties are roughly ±10%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;950&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;931&quot;&gt;&lt;span data-dcnode-id=&quot;932&quot; instrument_node=&quot;&quot;&gt;A map of the Milky Way galaxy showing the Sun’s position (center) in the thin, minor Orion arm. The minor Sagittarius arm starts on the other side of the galaxy (upper left) and curves around between the galactic center and the Sun. Credit: NASA/JPL-Caltech/R. Hurt (SSC/Caltech)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;930&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;920&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;913&quot;&gt;&lt;a data-dcnode-id=&quot;918&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arxiv.org/pdf/2111.09324.pdf&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;919&quot; instrument_node=&quot;&quot;&gt;The second paper takes a somewhat different approach&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;917&quot; instrument_node=&quot;&quot;&gt;. They also use Gaia data and look to the Milky Way's halo, but instead of stars they use &lt;/span&gt;&lt;a data-dcnode-id=&quot;915&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/hubbles-view-of-the-globular-cluster-m2-its-full-of-weird-stars&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;916&quot; instrument_node=&quot;&quot;&gt;globular clusters&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;914&quot; instrument_node=&quot;&quot;&gt;, tightly packed collections of thousands to millions of stars. These orbit the galaxy center, and about 160 Milky Way globulars are known. How rapidly they move depends on their distance and the mass of the galaxy interior to them, like before. The astronomers also use the rotation curve of the galaxy obtained using Gaia data, which is a measure of how rapidly stars in the flat disk revolve around the galaxy's center versus distance; this also yields a mass.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;912&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;910&quot;&gt;&lt;span data-dcnode-id=&quot;911&quot; instrument_node=&quot;&quot;&gt;They then apply some complicated models and statistics, though based on observations of the Milky Way that are pretty dependable. One thing they also took into account is how the Large Magellanic Cloud (or LMC), which orbits the Milky Way 170,000 light years out, might affect the structure of the galaxy; it can tug gravitationally and create substructures in the galactic disk, for example. There is some discussion that the LMC may be more massive than previously thought, so they try to take this into account as well.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;909&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;embedded-entity&quot; data-dcnode-id=&quot;875&quot; data-embed-button=&quot;media&quot; data-entity-embed-display=&quot;view_mode:media.embed&quot; data-entity-type=&quot;media&quot; data-entity-uuid=&quot;93e9381b-688b-4f73-885f-336d2539830f&quot; data-langcode=&quot;en&quot;&gt;&lt;div class=&quot;media__image&quot; data-dcnode-id=&quot;877&quot;&gt;&lt;span data-dcnode-id=&quot;908&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;869&quot;&gt;&lt;span data-dcnode-id=&quot;873&quot; instrument_node=&quot;&quot;&gt;Because their mass estimate is model-dependent, they get a range of masses for the Milky Way, which is why they get 536 – 784 billion Suns. The formal uncertainty (meaning how confident they can be due to the inputs they used) is about 15% on the lower part of the range but more like 40% on the higher end (&lt;/span&gt;&lt;a data-dcnode-id=&quot;871&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/what-is-the-mass-of-the-milky-way&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;872&quot; instrument_node=&quot;&quot;&gt;it's also lower than a similar study done a few years ago&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;870&quot; instrument_node=&quot;&quot;&gt;, but still close within the quoted uncertainties). Still, it's pretty cool that the first paper's result is right in the middle of that range.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;868&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;857&quot;&gt;&lt;span data-dcnode-id=&quot;867&quot; instrument_node=&quot;&quot;&gt;Both these estimates account for &lt;/span&gt;&lt;em data-dcnode-id=&quot;865&quot;&gt;&lt;span data-dcnode-id=&quot;866&quot; instrument_node=&quot;&quot;&gt;all&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;864&quot; instrument_node=&quot;&quot;&gt; matter, meaning both baryonic (what you can think of as normal matter: protons, atoms, molecules, and the like) and &lt;/span&gt;&lt;a data-dcnode-id=&quot;862&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/is-dark-matter-made-of-teeny-tiny-black-holes-from-another-universe-welllll&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;863&quot; instrument_node=&quot;&quot;&gt;dark matter&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;861&quot; instrument_node=&quot;&quot;&gt;, about which &lt;/span&gt;&lt;a data-dcnode-id=&quot;859&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/axions-dark-matter-and-neutron-stars-how-to-find-the-universes-most-mysterious-matter&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;860&quot; instrument_node=&quot;&quot;&gt;we still don't understand much&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;858&quot; instrument_node=&quot;&quot;&gt;. Dark matter is probably about 85% of all matter in the galaxy, and normal matter 15%.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;856&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;851&quot;&gt;&lt;span data-dcnode-id=&quot;855&quot; instrument_node=&quot;&quot;&gt;These estimates are an improvement on earlier ones, and astronomers will be able to use them to understand better the Milky Way's environment — &lt;/span&gt;&lt;a data-dcnode-id=&quot;853&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.syfy.com/syfy-wire/the-motions-of-66-nearby-galaxies-have-now-been-reliably-measured-not-stars-galaxies&quot; rel=&quot;noreferrer noopener&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;854&quot; instrument_node=&quot;&quot;&gt;we're in a small group of several dozen galaxies large and tiny&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;852&quot; instrument_node=&quot;&quot;&gt; — and even its future, since the Andromeda Galaxy is another beefy spiral only 2.5 million light years away, and may be headed toward us for a future collision. Armed with these numbers, hopefully we'll be able to better figure all this out.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;850&quot; instrument_node=&quot;&quot;&gt;
