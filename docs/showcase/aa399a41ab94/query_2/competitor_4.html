&lt;/span&gt;&lt;h3 class=&quot;pr_typeid&quot; data-dcnode-id=&quot;510&quot;&gt;&lt;span data-dcnode-id=&quot;511&quot; instrument_node=&quot;&quot;&gt;eso2119 — Science Release&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;509&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h1 class=&quot;pr_title&quot; data-dcnode-id=&quot;507&quot;&gt;&lt;span data-dcnode-id=&quot;508&quot; instrument_node=&quot;&quot;&gt;Watch stars move around the Milky Way’s supermassive black hole in deepest images yet&lt;/span&gt;&lt;/h1&gt;&lt;span data-dcnode-id=&quot;506&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;date&quot; data-dcnode-id=&quot;504&quot;&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;14 December 2021&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;archive-image popup&quot; data-dcnode-id=&quot;486&quot;&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;popup&quot; data-dcnode-id=&quot;495&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//cdn.eso.org/images/screen/eso2119a.jpg&quot; title=&quot;ESO’s VLTI images of stars at the centre of the Milky Way&quot;&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;image-container&quot; data-dcnode-id=&quot;497&quot;&gt;&lt;span data-dcnode-id=&quot;500&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;img class=&quot;img-responsive&quot; data-dcnode-id=&quot;499&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//cdn.eso.org/images/newsfeature/eso2119a.jpg&amp;amp;raw&quot; style=&quot;padding:0;&quot;&gt;&lt;span data-dcnode-id=&quot;498&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;496&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;494&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;a class=&quot;popup&quot; data-dcnode-id=&quot;493&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//cdn.eso.org/images/screen/eso2119b.jpg&quot; title=&quot;Stars around Sgr A* in March 2021&quot;&gt;&lt;/a&gt;&lt;a class=&quot;popup&quot; data-dcnode-id=&quot;492&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//cdn.eso.org/images/screen/eso2119c.jpg&quot; title=&quot;Stars around Sgr A* in May 2021&quot;&gt;&lt;/a&gt;&lt;a class=&quot;popup&quot; data-dcnode-id=&quot;491&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//cdn.eso.org/images/screen/eso2119d.jpg&quot; title=&quot;Stars around Sgr A* in June 2021&quot;&gt;&lt;/a&gt;&lt;a class=&quot;popup&quot; data-dcnode-id=&quot;490&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//cdn.eso.org/images/screen/eso2119e.jpg&quot; title=&quot;Stars around Sgr A* in July 2021&quot;&gt;&lt;/a&gt;&lt;a class=&quot;popup&quot; data-dcnode-id=&quot;489&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//cdn.eso.org/images/screen/eso0949l.jpg&quot; title=&quot;Wide-field view of the centre of the Milky Way&quot;&gt;&lt;/a&gt;&lt;a class=&quot;popup&quot; data-dcnode-id=&quot;488&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//cdn.eso.org/images/screen/eso1835b.jpg&quot; title=&quot;Sagittarius A* in the constellation of Sagittarius&quot;&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;487&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;485&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;484&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;483&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p class=&quot;text_intro pr_first&quot; data-dcnode-id=&quot;481&quot;&gt;&lt;span data-dcnode-id=&quot;482&quot; instrument_node=&quot;&quot;&gt;The European Southern Observatory’s Very Large Telescope Interferometer (ESO’s VLTI) has obtained the deepest and sharpest images to date of the region around the supermassive black hole at the centre of our galaxy. The new images zoom in 20 times more than what was possible before the VLTI and have helped astronomers find a never-before-seen star close to the black hole. By tracking the orbits of stars at the centre of our Milky Way, the team has made the most precise measurement yet of the black hole’s mass.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;480&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;472&quot; dir=&quot;ltr&quot;&gt;&lt;span data-dcnode-id=&quot;479&quot; instrument_node=&quot;&quot;&gt;“&lt;/span&gt;&lt;em data-dcnode-id=&quot;477&quot;&gt;&lt;span data-dcnode-id=&quot;478&quot; instrument_node=&quot;&quot;&gt;We want to learn more about the black hole at the centre of the Milky Way, Sagittarius A*: How massive is it exactly? Does it rotate? Do stars around it behave exactly as we expect from Einstein’s general theory of relativity? The best way to answer these questions is to follow stars on orbits close to the supermassive black hole. And here we demonstrate that we can do that to a higher precision than ever before&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;476&quot; instrument_node=&quot;&quot;&gt;,” explains Reinhard Genzel, a director at the Max Planck Institute for Extraterrestrial Physics (MPE) in Garching, Germany who was awarded a Nobel Prize in 2020 for Sagittarius A* research. Genzel and his team’s latest results, which expand on their three-decade-long study of stars orbiting the Milky Way's supermassive black hole, are published today in two papers in &lt;/span&gt;&lt;em data-dcnode-id=&quot;474&quot;&gt;&lt;span data-dcnode-id=&quot;475&quot; instrument_node=&quot;&quot;&gt;Astronomy &amp;amp; Astrophysics&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;473&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;466&quot; dir=&quot;ltr&quot;&gt;&lt;span data-dcnode-id=&quot;470&quot; instrument_node=&quot;&quot;&gt;On a quest to find even more stars close to the black hole, the team, known as the GRAVITY collaboration, developed a new analysis technique that has allowed them to obtain the deepest and sharpest images yet of our Galactic Centre. “&lt;/span&gt;&lt;em data-dcnode-id=&quot;468&quot;&gt;&lt;span data-dcnode-id=&quot;469&quot; instrument_node=&quot;&quot;&gt;The VLTI gives us this incredible spatial resolution and with the new images we reach deeper than ever before. We are stunned by their amount of detail, and by the action and number of stars they reveal around the black hole&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;467&quot; instrument_node=&quot;&quot;&gt;,” explains Julia Stadler, a researcher at the Max Planck Institute for Astrophysics in Garching who led the team’s imaging efforts during her time at MPE. Remarkably, they found a star, called S300, which had not been seen previously, showing how powerful this method is when it comes to spotting very faint objects close to Sagittarius A*.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;463&quot; dir=&quot;ltr&quot;&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;With their latest observations, conducted between March and July 2021, the team focused on making precise measurements of stars as they approached the black hole. This includes the record-holder star S29, which made its nearest approach to the black hole in late May 2021. It passed it at a distance of just 13 billion kilometres, about 90 times the Sun-Earth distance, at the stunning speed of 8740 kilometres per second. No other star has ever been observed to pass that close to, or travel that fast around, the black hole.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;457&quot; dir=&quot;ltr&quot;&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;The team’s measurements and images were made possible thanks to GRAVITY, a unique instrument that the collaboration developed for ESO’s VLTI, located in Chile. GRAVITY combines the light of all four 8.2-metre telescopes of ESO’s Very Large Telescope (VLT) using a technique called interferometry. This technique is complex, &lt;/span&gt;&lt;em data-dcnode-id=&quot;459&quot;&gt;&lt;span data-dcnode-id=&quot;460&quot; instrument_node=&quot;&quot;&gt;“but in the end you arrive at images 20 times sharper than those from the individual VLT telescopes alone, revealing the secrets of the Galactic Centre,”&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;458&quot; instrument_node=&quot;&quot;&gt; says Frank Eisenhauer from MPE, principal investigator of GRAVITY.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;451&quot; dir=&quot;ltr&quot;&gt;&lt;span data-dcnode-id=&quot;455&quot; instrument_node=&quot;&quot;&gt;“&lt;/span&gt;&lt;em data-dcnode-id=&quot;453&quot;&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;Following stars on close orbits around Sagittarius A* allows us to precisely probe the gravitational field around the closest massive black hole to Earth, to test General Relativity, and to determine the properties of the black hole,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;” explains Genzel. The new observations, combined with the team’s previous data, confirm that the stars follow paths exactly as predicted by General Relativity for objects moving around a black hole of mass 4.30 million times that of the Sun. This is the most precise estimate of the mass of the Milky Way’s central black hole to date. The researchers also managed to fine-tune the distance to Sagittarius A*, finding it to be 27 000 light-years away.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;450&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;439&quot; dir=&quot;ltr&quot;&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;To obtain the new images, the astronomers used a machine-learning technique, called&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;447&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.mpa-garching.mpg.de/ift/&quot;&gt;&lt;span data-dcnode-id=&quot;448&quot; instrument_node=&quot;&quot;&gt;Information Field Theory&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;. They made a model of how the real sources may look, simulated how GRAVITY would see them, and compared this simulation with GRAVITY observations. This allowed them to find and track stars around Sagittarius A* with unparalleled depth and accuracy. In addition to the GRAVITY observations, the team also used data from&lt;/span&gt;&lt;a data-dcnode-id=&quot;444&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.eso.org/public/teles-instr/paranal-observatory/vlt/vlt-instr/naco/&quot;&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt; NACO&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;443&quot; instrument_node=&quot;&quot;&gt; and&lt;/span&gt;&lt;a data-dcnode-id=&quot;441&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.eso.org/public/teles-instr/paranal-observatory/vlt/vlt-instr/sinfoni/&quot;&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt; SINFONI&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;440&quot; instrument_node=&quot;&quot;&gt;, two former VLT instruments, as well as measurements from the Keck Observatory and NOIRLab’s Gemini Observatory in the US.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;438&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;430&quot; dir=&quot;ltr&quot;&gt;&lt;span data-dcnode-id=&quot;437&quot; instrument_node=&quot;&quot;&gt;GRAVITY will be updated later this decade to GRAVITY+, which will also be installed on ESO’s VLTI and will push the sensitivity further to reveal fainter stars even closer to the black hole. The team aims to eventually find stars so close that their orbits would feel the gravitational effects caused by the black hole’s rotation. ESO’s upcoming Extremely Large Telescope (ELT), under construction in the Chilean Atacama Desert, will further allow the team to measure the velocity of these stars with very high precision. “&lt;/span&gt;&lt;em data-dcnode-id=&quot;435&quot;&gt;&lt;span data-dcnode-id=&quot;436&quot; instrument_node=&quot;&quot;&gt;With GRAVITY+’s and the ELT’s powers combined, we will be able to find out how fast the black hole spins,&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;” says Eisenhauer. “&lt;/span&gt;&lt;em data-dcnode-id=&quot;432&quot;&gt;&lt;span data-dcnode-id=&quot;433&quot; instrument_node=&quot;&quot;&gt;Nobody has been able to do that so far.&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;431&quot; instrument_node=&quot;&quot;&gt;”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;429&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;427&quot;&gt;&lt;span data-dcnode-id=&quot;428&quot; instrument_node=&quot;&quot;&gt;More information&lt;/span&gt;&lt;/h3&gt;&lt;p data-dcnode-id=&quot;422&quot; dir=&quot;ltr&quot;&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;This research was presented in two GRAVITY Collaboration papers to appear in &lt;/span&gt;&lt;em data-dcnode-id=&quot;424&quot;&gt;&lt;span data-dcnode-id=&quot;425&quot; instrument_node=&quot;&quot;&gt;Astronomy &amp;amp; Astrophysics&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;421&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;416&quot; dir=&quot;ltr&quot;&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt;The team who authored the paper “The mass distribution in the Galactic Centre from interferometric astrometry of multiple stellar orbits” (&lt;/span&gt;&lt;a data-dcnode-id=&quot;418&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.aanda.org/10.1051/0004-6361/202142465&quot;&gt;&lt;span data-dcnode-id=&quot;419&quot; instrument_node=&quot;&quot;&gt;doi:10.1051/0004-6361/202142465&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;417&quot; instrument_node=&quot;&quot;&gt;) is composed of: R. Abuter (European Southern Observatory, Garching, Germany [ESO]), A. Amorim (Universidade de Lisboa - Faculdade de Ciências, Portugal and Centro de Astrofísica e Gravitação, IST, Universidade de Lisboa, Portugal [CENTRA]),&amp;nbsp; M. Bauböck (Max Planck Institute for Extraterrestrial Physics, Garching, Germany [MPE] and Department of Physics, University of Illinois, USA), J. P. Berger (Univ. Grenoble Alpes, CNRS, Grenoble, France [IPAG] and ESO), H. Bonnet (ESO), G. Bourdarot (IPAG and MPE), W. Brandner (Max Planck Institute for Astronomy, Heidelberg, Germany [MPIA]), V. Cardoso (CENTRA and CERN, Genève, Switzerland), Y. Clénet (Observatoire de Paris, Université PSL, CNRS, Sorbonne Université, Université de Paris, Meudon, France [LESIA]), Y. Dallilar (MPE), R. Davies (MPE), P. T. de Zeeuw (Sterrewacht Leiden, Leiden University [Leiden], The Netherlands and MPE), J. Dexter (Department of Astrophysical &amp;amp; Planetary Sciences, JILA, Duane Physics Bldg.,University of Colorado [Colorado], Boulder, USA), A. Drescher (MPE), A. Eckart (1st Institute of Physics, University of Cologne, Germany [Cologne] and Max Planck Institute for Radio Astronomy, Bonn, Germany), F. Eisenhauer (MPE), N. M. Förster Schreiber (MPE), P. Garcia (Faculdade de Engenharia, Universidade do Porto, Portugal and CENTRA), F. Gao (Hamburger Sternwarte, Universität Hamburg, Germany and MPE), E. Gendron (LESIA), R. Genzel (MPE and Departments of Physics and Astronomy, Le Conte Hall, University of California, Berkeley, USA), S. Gillessen (MPE), M. Habibi (MPE), X. Haubois (European Southern Observatory, Santiago, Chile [ESO Chile]), G. Heißel (LESIA), T. Henning (MPIA), S. Hippler (MPIA), M. Horrobin (Cologne), L. Jochum (ESO Chile), L. Jocou (IPAG), A. Kaufer (ESO Chile), P. Kervella (LESIA), S. Lacour (LESIA), V. Lapeyrère (LLESIA), J.-B. Le Bouquin (IPAG), P. Léna (LESIA), D. Lutz (MPE), T. Ott (MPE), T. Paumard (LESIA), K. Perraut (IPAG), G. Perrin (LESIA), O. Pfuhl (ESO and MPE), S. Rabien (MPE), G. Rodríguez-Coira (LESIA), J. Shangguan (MPE), T. Shimizu (MPE), S. Scheithauer (MPIA), J. Stadler (MPE), O. Straub (MPE), C. Straubmeier (Cologne), E. Sturm (MPE), L. J. Tacconi (MPE), K. R. W. Tristram (ESO Chile), F. Vincent (LESIA), S. von Fellenberg (MPE), F. Widmann (MPE), E. Wieprecht (MPE), E. Wiezorrek (MPE), J. Woillez (ESO), S. Yazici MPE and Cologne), and A. Young (MPE).&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;410&quot;&gt;&lt;span data-dcnode-id=&quot;414&quot; instrument_node=&quot;&quot;&gt;The team who authored the paper “Deep images of the Galactic Center with GRAVITY” (&lt;/span&gt;&lt;a data-dcnode-id=&quot;412&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.aanda.org/10.1051/0004-6361/202142459&quot;&gt;&lt;span data-dcnode-id=&quot;413&quot; instrument_node=&quot;&quot;&gt;doi:10.1051/0004-6361/202142459&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;)&amp;nbsp;is composed of: R. Abuter (ESO), P. Arras (Max Planck Institute for Astrophysics [MPA], Garching, Germany and Department of Physics, Technical University Munich [TUM], Garching, Germany), M. Bauböck (MPE and Department of Physics, University of Illinois, USA), H. Bonnet (ESO), W. Brandner (MPIA), G. Bourdarot (IPAG and MPE), V. Cardoso (CENTRA and CERN), Y. Clénet (LESIA), P. T. de Zeeuw (Leiden and MPE), J. Dexter (Colorado and MPE), Y. Dallilar (MPE), A. Drescher (MPE), A. Eckart (Cologne and Max Planck Institute for Radio Astronomy, Bonn, Germany), F. Eisenhauer (MPE), T. Enßlin (MPA), N. M. Förster Schreiber (MPE), P. Garcia (Faculdade de Engenharia, Universidade do Porto, Portugal and CENTRA), F. Gao (Hamburger Sternwarte, Universität Hamburg, Germany and MPE), &amp;nbsp;E. Gendron (LESIA), R. Genzel (MPE and Departments of Physics and Astronomy, Le Conte Hall, University of California, Berkeley, USA), S. Gillessen (MPE), M. Habibi (MPE), X. Haubois (ESO Chile), G. Heißel (LESIA), T. Henning (MPIA), S. Hippler (MPIA), M. Horrobin (Cologne), A. Jiménez-Rosales (MPE), L. Jochum (ESO Chile), L. Jocou (IPAG), A. Kaufer (ESO Chile), P. Kervella (LESIA), S. Lacour (LESIA), V. Lapeyrère (LESIA), J.-B. Le Bouquin (IPAG), P. Léna (LESIA), D. Lutz (MPE), T. Ott (MPE) , T. Paumard (LESIA) , K. Perraut (IPAG) , G. Perrin (LESIA) , O. Pfuhl (ESO and MPE), S. Rabien (MPE), J. Shangguan (MPE), T. Shimizu (MPE), S. Scheithauer (MPIA), J. Stadler (MPE , O. Straub (MPE), C. Straubmeier (Cologne), E. Sturm (MPE), L.J. Tacconi (MPE), K. R. W. Tristram (ESO Chile), F. Vincent (LESIA), S. von Fellenberg (MPE), I. Waisberg (Department of Particle Physics &amp;amp; Astrophysics, Weizmann Institute of Science, Israel and MPE), F. Widmann (MPE), E. Wieprecht (MPE), E. Wiezorrek (MPE), J. Woillez (ESO), S. Yazici (MPE and Cologne), A. Young (MPE) and G. Zins (ESO).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;407&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;The European Southern Observatory (ESO) enables scientists worldwide to discover the secrets of the Universe for the benefit of all. We design, build and operate world-class observatories on the ground — which astronomers use to tackle exciting questions and spread the fascination of astronomy — and promote international collaboration in astronomy. Established as an intergovernmental&amp;nbsp;organisation&amp;nbsp;in 1962, today ESO is supported by 16 Member States (Austria, Belgium, the Czech Republic, Denmark, France, Finland, Germany, Ireland, Italy, the Netherlands, Poland, Portugal, Spain, Sweden, Switzerland and the United Kingdom), along with the host state of Chile and with Australia as a Strategic Partner. ESO’s headquarters and its visitor&amp;nbsp;centre&amp;nbsp;and planetarium, the ESO Supernova, are located close to Munich in Germany, while the Chilean Atacama Desert, a&amp;nbsp;marvellous&amp;nbsp;place with unique conditions to observe the sky, hosts our telescopes. ESO operates three observing sites: La Silla, Paranal and&amp;nbsp;Chajnantor. At Paranal, ESO operates the Very Large Telescope and its Very Large Telescope Interferometer, as well as two survey telescopes, VISTA working in the infrared and the visible-light VLT Survey Telescope.&amp;nbsp;Also&amp;nbsp;at Paranal ESO will host and operate the Cherenkov Telescope Array South, the world’s largest and most sensitive gamma-ray observatory. Together with international partners, ESO operates APEX and ALMA on&amp;nbsp;Chajnantor, two facilities that observe the skies in the&amp;nbsp;millimetre&amp;nbsp;and&amp;nbsp;submillimetre&amp;nbsp;range. At Cerro&amp;nbsp;Armazones, near Paranal, we are building “the world’s biggest eye on the sky” — ESO’s Extremely Large Telescope. From our offices in Santiago, Chile we support our operations in the country and engage with Chilean partners and society.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt;
