gt;&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;150&quot; id=&quot;container&quot;&gt;&lt;div data-dcnode-id=&quot;513&quot; id=&quot;container2&quot;&gt;&lt;div data-dcnode-id=&quot;514&quot; id=&quot;left-div&quot;&gt;&lt;div class=&quot;post-wrapper&quot; data-dcnode-id=&quot;515&quot;&gt;&lt;h1 class=&quot;titles2&quot; data-dcnode-id=&quot;1794&quot;&gt;&lt;span data-dcnode-id=&quot;1797&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;1795&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dailygalaxy.com/2021/12/the-strange-stars-of-sagittarius-a-trace-the-mass-of-milky-ways-supermassive-black-hole/&quot; rel=&quot;bookmark&quot; title=&quot;S-Stars Orbiting Sagittarius A* –Trace the Mass of Milky Way’s Supermassive Black HolePermanent Link to &quot;&gt;&lt;span data-dcnode-id=&quot;1796&quot; instrument_node=&quot;&quot;&gt; S-Stars Orbiting Sagittarius A* –Trace the Mass of Milky Way’s Supermassive Black Hole &lt;/span&gt;&lt;/a&gt;&lt;/h1&gt;&lt;div class=&quot;articleinfo&quot; data-dcnode-id=&quot;1790&quot;&gt;&lt;span data-dcnode-id=&quot;1793&quot; instrument_node=&quot;&quot;&gt;Posted  on Dec 15, 2021 in &lt;/span&gt;&lt;a data-dcnode-id=&quot;1791&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dailygalaxy.com/category/science/&quot; rel=&quot;category tag&quot;&gt;&lt;span data-dcnode-id=&quot;1792&quot; instrument_node=&quot;&quot;&gt;Science&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;1789&quot; style=&quot;clear: both;&quot;&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;1785&quot;&gt;&lt;noscript data-dcnode-id=&quot;1787&quot;&gt;&lt;span data-dcnode-id=&quot;1788&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img decoding=&quot;async&quot; class=&quot;alignnone wp-image-46524 size-full&quot; src=&quot;https://sp-ao.shortpixel.ai/client/to_auto,q_glossy,ret_img,w_650,h_650/https://dailygalaxy.com/wp-content/uploads/2021/12/eso2119d-e1639541544939.jpg&quot; alt=&quot;S Star Cluster&quot; width=&quot;650&quot; height=&quot;650&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;img alt=&quot;S Star Cluster&quot; class=&quot;alignnone wp-image-46524 size-full lazyloaded&quot; data-dcnode-id=&quot;1786&quot; data-src=&quot;https://sp-ao.shortpixel.ai/client/to_auto,q_glossy,ret_img,w_650,h_650/https://dailygalaxy.com/wp-content/uploads/2021/12/eso2119d-e1639541544939.jpg&quot; decoding=&quot;async&quot; height=&quot;650&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//sp-ao.shortpixel.ai/client/to_auto%2Cq_glossy%2Cret_img%2Cw_650%2Ch_650/https%3A//dailygalaxy.com/wp-content/uploads/2021/12/eso2119d-e1639541544939.jpg&amp;amp;raw&quot; width=&quot;650&quot;&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1783&quot;&gt;&lt;span data-dcnode-id=&quot;1784&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1774&quot;&gt;&lt;span data-dcnode-id=&quot;1778&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1782&quot; instrument_node=&quot;&quot;&gt;Nobel-Prize laureate &lt;/span&gt;&lt;a data-dcnode-id=&quot;1780&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//en.wikipedia.org/wiki/Subrahmanyan_Chandrasekhar&quot;&gt;&lt;span data-dcnode-id=&quot;1781&quot; instrument_node=&quot;&quot;&gt;Subrahmanyan Chandrasekhar&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1779&quot; instrument_node=&quot;&quot;&gt;, for whom NASA’s Chandra Observatory was named, described black holes&amp;nbsp; as “the most perfect macroscopic objects there are in the universe: the only elements in their construction are our concepts of space and time.” This quote perfectly describes the supermassive ‘pothole in eternity’ at the center of our Milky Way Galaxy, a black hole known as &lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1777&quot; instrument_node=&quot;&quot;&gt;Sagittarius A*&lt;/span&gt;&lt;b data-dcnode-id=&quot;1775&quot;&gt;&lt;span data-dcnode-id=&quot;1776&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1770&quot;&gt;&lt;span data-dcnode-id=&quot;1773&quot; id=&quot;more-46523&quot;&gt;&lt;/span&gt;&lt;strong data-dcnode-id=&quot;1771&quot;&gt;&lt;span data-dcnode-id=&quot;1772&quot; instrument_node=&quot;&quot;&gt;Mini-Cluster of S Stars&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1764&quot;&gt;&lt;span data-dcnode-id=&quot;1765&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1769&quot; instrument_node=&quot;&quot;&gt;The European Southern Observatory’s &lt;/span&gt;&lt;a data-dcnode-id=&quot;1767&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.eso.org/public/usa/teles-instr/paranal-observatory/vlt/&quot;&gt;&lt;span data-dcnode-id=&quot;1768&quot; instrument_node=&quot;&quot;&gt;Very Large Telescope Interferometer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1766&quot; instrument_node=&quot;&quot;&gt; (ESO’s VLTI) has now obtained the deepest and sharpest images to date of the region around the supermassive black hole at the center of our galaxy. The new images zoom in 20 times more than what was possible before the VLTI and have helped astronomers find a never-before-seen star close to the black hole. By tracking the orbits of stars at the center of our Milky Way, the team has made the most precise measurement yet of the black hole’s mass.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1761&quot;&gt;&lt;span data-dcnode-id=&quot;1762&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1763&quot; instrument_node=&quot;&quot;&gt;The dozens (perhaps hundreds) of stars that directly orbit Sagittarius A* are called S-type stars, forming a mini-cluster at our Galactic center. The observed S-type stars are rather young and massive, and they achieve extremely large velocities in their elliptical orbits as they approach Sagittarius A*. Such massive stars did not likely form in such a dense violent environment. Instead, they likely formed at greater separations than we observe today but were dynamically captured into shorter, highly eccentric orbits around Sagittarius A*.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;blockquote class=&quot;wp-embedded-content&quot; data-dcnode-id=&quot;1757&quot; data-secret=&quot;oJ9D4yt4JD&quot; style=&quot;display: none;&quot;&gt;&lt;p data-dcnode-id=&quot;1758&quot;&gt;&lt;a data-dcnode-id=&quot;1759&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dailygalaxy.com/2021/07/milky-ways-galactic-center-death-zone-confirmed-thousands-of-black-holes-surround-the-sagittarius-a/&quot;&gt;&lt;span data-dcnode-id=&quot;1760&quot; instrument_node=&quot;&quot;&gt;Thousands of Black Holes Surround Mlky Way’s Supermassive Sagittarius A*&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;p data-dcnode-id=&quot;1572&quot;&gt;&lt;iframe class=&quot;wp-embedded-content&quot; data-dcnode-id=&quot;1573&quot; data-secret=&quot;oJ9D4yt4JD&quot; frameborder=&quot;0&quot; height=&quot;283&quot; marginheight=&quot;0&quot; marginwidth=&quot;0&quot; sandbox=&quot;allow-scripts&quot; scrolling=&quot;no&quot; security=&quot;restricted&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dailygalaxy.com/2021/07/milky-ways-galactic-center-death-zone-confirmed-thousands-of-black-holes-surround-the-sagittarius-a/embed/%23%3Fsecret%3DoJ9D4yt4JD&amp;amp;raw&quot; title=&quot;“Thousands of Black Holes Surround Mlky Way’s Supermassive Sagittarius A*” — The Daily Galaxy&quot; width=&quot;500&quot;&gt;&lt;html class=&quot;js&quot; data-dcnode-id=&quot;1575&quot; lang=&quot;en-US&quot;&gt;&lt;head data-dcnode-id=&quot;1689&quot;&gt;&lt;meta charset=&quot;utf-8&quot;&gt;&lt;span data-dcnode- &lt;/span&gt;&lt;span data-dcnode-id=&quot;1579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/body&gt;&lt;/html&gt;&lt;/iframe&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1569&quot;&gt;&lt;b data-dcnode-id=&quot;1570&quot;&gt;&lt;span data-dcnode-id=&quot;1571&quot; instrument_node=&quot;&quot;&gt;How Massive is Sagittarius A*? Do Its Stars Conform to the Theory of Relativity?&amp;nbsp;&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1563&quot;&gt;&lt;span data-dcnode-id=&quot;1564&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1568&quot; instrument_node=&quot;&quot;&gt;“We want to learn more about the black hole at the center of the Milky Way, Sagittarius A*: How massive is it exactly? Does it rotate? Do stars around it behave exactly as we expect from Einstein’s general theory of relativity? The best way to answer these questions is to follow stars on orbits close to the supermassive black hole. And here we demonstrate that we can do that to a higher precision than ever before,” explains &lt;/span&gt;&lt;a data-dcnode-id=&quot;1566&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.nobelprize.org/prizes/physics/2020/genzel/facts/&quot;&gt;&lt;span data-dcnode-id=&quot;1567&quot; instrument_node=&quot;&quot;&gt;Reinhard Genzel&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1565&quot; instrument_node=&quot;&quot;&gt;, a director at the Max Planck Institute for Extraterrestrial Physics (MPE) in Garching, Germany who was awarded a Nobel Prize in 2020 for Sagittarius A* research. Genzel and his team’s latest results, which expand on their three-decade-long study of stars orbiting the Milky Way’s supermassive black hole, are published today in two papers in Astronomy &amp;amp; Astrophysics.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1560&quot;&gt;&lt;b data-dcnode-id=&quot;1561&quot;&gt;&lt;span data-dcnode-id=&quot;1562&quot; instrument_node=&quot;&quot;&gt;Captured Binary Stars&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1549&quot;&gt;&lt;span data-dcnode-id=&quot;1555&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1559&quot; instrument_node=&quot;&quot;&gt;“These S stars could not have formed so close to the black hole,” wrote astrophysicist &lt;/span&gt;&lt;a data-dcnode-id=&quot;1557&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.mpe.mpg.de/~eisenhau/&quot;&gt;&lt;span data-dcnode-id=&quot;1558&quot; instrument_node=&quot;&quot;&gt;Frank Eisenhauer&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1556&quot; instrument_node=&quot;&quot;&gt; at the Max Planck Institute for Extraterrestrial Physics, in an email to &lt;/span&gt;&lt;/span&gt;&lt;i data-dcnode-id=&quot;1552&quot;&gt;&lt;span data-dcnode-id=&quot;1553&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1554&quot; instrument_node=&quot;&quot;&gt;The Daily Galaxy&lt;/span&gt;&lt;/span&gt;&lt;/i&gt;&lt;span data-dcnode-id=&quot;1550&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1551&quot; instrument_node=&quot;&quot;&gt;. “The strong gravitational field of the black hole would have torn apart the interstellar cloud, from which stars usually form,” he explained. “The best explanation is that these S-stars have formed further out in a stellar disc around the black hole, initially as binary stars, some of them ending up on very eccentric orbits. And then, when coming close to the black hole, the more massive of the two stars was captured on the close orbit around the black hole, and the lower mass companion ejected as a hyper-velocity star. The S-stars are those captured stars residing close to the black hole.”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1547&quot;&gt;&lt;span data-dcnode-id=&quot;1548&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;epyt-video-wrapper fluid-width-video-wrapper&quot; data-dcnode-id=&quot;1033&quot; style=&quot pi-pavhs&quot; target=&quot;_blank&quot;&amp;gt;Try watching this video on www.youtube.com&amp;lt;/a&amp;gt;, or enable JavaScript if it is disabled in your browser.&amp;lt;/div&amp;gt;&amp;lt;/div&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/body&gt;&lt;/html&gt;&lt;/iframe&gt;&lt;/div&gt;&lt;p data-dcnode-id=&quot;1030&quot;&gt;&lt;b data-dcnode-id=&quot;1031&quot;&gt;&lt;span data-dcnode-id=&quot;1032&quot; instrument_node=&quot;&quot;&gt;The Gravity Collaboration – Reaching Deeper than Ever Before&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;1024&quot;&gt;&lt;span data-dcnode-id=&quot;1025&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;1029&quot; instrument_node=&quot;&quot;&gt;On a quest to find even more stars close to the black hole, the team, known as the GRAVITY collaboration, developed a new analysis technique that has allowed them to obtain the deepest and sharpest images yet of our Galactic Center. “The VLTI gives us this incredible spatial resolution and with the new images we reach deeper than ever before. We are stunned by their amount of detail, and by the action and number of stars they reveal around the black hole,” explains &lt;/span&gt;&lt;a data-dcnode-id=&quot;1027&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.researchgate.net/scientific-contributions/J-Stadler-2170884299&quot;&gt;&lt;span data-dcnode-id=&quot;1028&quot; instrument_node=&quot;&quot;&gt;Julia Stadler,&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1026&quot; instrument_node=&quot;&quot;&gt; a researcher at the Max Planck Institute for Astrophysics, who led the team’s imaging efforts during her time at MPE. Remarkably, they found a star, called S300, which had not been seen previously, showing how powerful this method is when it comes to spotting very faint objects close to Sagittarius A*.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;blockquote class=&quot;wp-embedded-content&quot; data-dcnode- &lt;/span&gt;&lt;/body&gt;&lt;/html&gt;&lt;/iframe&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;827&quot;&gt;&lt;b data-dcnode-id=&quot;828&quot;&gt;&lt;span data-dcnode-id=&quot;829&quot; instrument_node=&quot;&quot;&gt;S29 –The ‘Speed Demon’ Record Holder&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;824&quot;&gt;&lt;span data-dcnode-id=&quot;825&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;826&quot; instrument_node=&quot;&quot;&gt;With their latest observations, conducted between March and July 2021, the team focused on making precise measurements of stars as they approached the black hole. This includes the record-holder star S29, which made its nearest approach to the black hole in late May 2021. It passed it at a distance of just 13 billion kilometers, about 90 times the Sun-Earth distance, at the stunning speed of 8,740 kilometers per second (3% the speed of light). No other star has ever been observed to pass that close to, or travel that fast around, the black hole. The previous record holder, S2, passed within 120 times the Sun-Earth distance in May 2018.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;818&quot;&gt;&lt;span data-dcnode-id=&quot;819&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;823&quot; instrument_node=&quot;&quot;&gt;The team’s measurements and images were made possible thanks to &lt;/span&gt;&lt;a data-dcnode-id=&quot;821&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.eso.org/public/teles-instr/paranal-observatory/vlt/vlt-instr/gravity/&quot;&gt;&lt;span data-dcnode-id=&quot;822&quot; instrument_node=&quot;&quot;&gt;GRAVITY&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;820&quot; instrument_node=&quot;&quot;&gt;, a unique instrument that the collaboration developed for ESO’s VLTI, located in Chile. GRAVITY combines the light of all four 8.2-metre telescopes of ESO’s Very Large Telescope (VLT) using a technique called interferometry. This technique is complex, “but in the end you arrive at images 20 times sharper than those from the individual VLT telescopes alone, revealing the secrets of the Galactic Centre,” says Eisenhauer, principal investigator of GRAVITY.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;815&quot;&gt;&lt;b data-dcnode-id=&quot;816&quot;&gt;&lt;span data-dcnode-id=&quot;817&quot; instrument_node=&quot;&quot;&gt;Confirms Einstein&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;812&quot;&gt;&lt;span data-dcnode-id=&quot;813&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;814&quot; instrument_node=&quot;&quot;&gt;“Following stars on close orbits around Sagittarius A* allows us to precisely probe the gravitational field around the closest massive black hole to Earth, to test General Relativity, and to determine the properties of the black hole,” explains Genzel. The new observations, combined with the team’s previous data, confirm that the stars follow paths exactly as predicted by General Relativity for objects moving around a black hole of mass 4.30 million times that of the Sun. This is the most precise estimate of the mass of the Milky Way’s central black hole to date. The researchers also managed to fine-tune the distance to Sagittarius A*, finding it to be 27,000 light-years away.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;blockquote class=&quot;wp-embedded-content&quot; data-dcnode-id=&quot;808&quot; data-secret=&quot;zTRkPMWBaM&quot; style=&quot;display: none;&quot;&gt;&lt;p data-dcnode-id=&quot;809&quot;&gt;&lt;a data-dcnode-id=&quot;810&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dailygalaxy.com/2021/10/unknown-object-observed-lurking-near-milky-ways-supermassive-black-hole-is-a-yet-undetected-cosmic-s/&quot;&gt;&lt;span data-dcnode-id=&quot;811&quot; instrument_node=&quot;&quot;&gt;Have Astronomers Detected a Cosmic String from the Dawn &lt;/span&gt;&lt;/body&gt;&lt;/html&gt;&lt;/iframe&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;612&quot;&gt;&lt;b data-dcnode-id=&quot;613&quot;&gt;&lt;span data-dcnode-id=&quot;614&quot; instrument_node=&quot;&quot;&gt;Information Field Theory&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;606&quot;&gt;&lt;span data-dcnode-id=&quot;607&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;To obtain the new images, the astronomers used a machine-learning technique, logic under uncertainty, applied to fields, called &lt;/span&gt;&lt;a data-dcnode-id=&quot;609&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//wwwmpa.mpa-garching.mpg.de/~ensslin/research/research_IFT.html&quot;&gt;&lt;span data-dcnode-id=&quot;610&quot; instrument_node=&quot;&quot;&gt;Information Field Theory&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;. They made a model of how the real sources may look, simulated how GRAVITY would see them, and compared this simulation with GRAVITY observations. This allowed them to find and track stars around Sagittarius A* with unparalleled depth and accuracy. In addition to the GRAVITY observations, the team also used data from NACO and SINFONI, two former VLT instruments, as well as measurements from the Keck Observatory and NOIRLab’s Gemini Observatory in the US.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;603&quot;&gt;&lt;b data-dcnode-id=&quot;604&quot;&gt;&lt;span data-dcnode-id=&quot;605&quot; instrument_node=&quot;&quot;&gt;ESO’s Upcoming Extremely Large Telescope (ELT)&lt;/span&gt;&lt;/b&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;601&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;602&quot; instrument_node=&quot;&quot;&gt;GRAVITY will be updated later this decade to GRAVITY+, which will also be installed on ESO’s VLTI and will push the sensitivity further to reveal fainter stars even closer to the black hole. The team aims to eventually find stars so close that their orbits would feel the gravitational effects caused by the black hole’s rotation.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;597&quot;&gt;&lt;span data-dcnode-id=&quot;598&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;599&quot; instrument_node=&quot;&quot;&gt;ESO’s upcoming Extremely Large Telescope (ELT), under construction in the Chilean Atacama Desert, will further allow the team to measure the velocity of these stars with very high precision. “With GRAVITY+’s and the ELT’s powers combined, we will be able to find out how fast the black hole spins,” says Eisenhauer. “Nobody has been able to do that so far.”&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;580&quot;&gt;&lt;a data-dcnode-id=&quot;594&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.as.arizona.edu/people/postdoctoral/maxwell-moe&quot;&gt;&lt;b data-dcnode-id=&quot;595&quot;&gt;&lt;span data-dcnode-id=&quot;596&quot; instrument_node=&quot;&quot;&gt;Maxwell Moe&lt;/span&gt;&lt;/b&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;592&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;593&quot; instrument_node=&quot;&quot;&gt;, astrophysicist,&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;591&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;span data-dcnode-id=&quot;589&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;590&quot; instrument_node=&quot;&quot;&gt;NASA Einstein Fellow, University of Arizona via &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;586&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.mpe.mpg.de/~eisenhau/&quot;&gt;&lt;span data-dcnode-id=&quot;587&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;588&quot; instrument_node=&quot;&quot;&gt;Frank Eisenhauer&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;584&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;585&quot; instrument_node=&quot;&quot;&gt; and &lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;581&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.eso.org/public/news/eso2119/%3Flang&quot;&gt;&lt;span data-dcnode-id=&quot;582&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;583&quot; instrument_node=&quot;&quot;&gt;ESO&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/p&gt;&lt;p data-dcnode-id=&quot;577&quot;&gt;&lt;span data-dcnode-id=&quot;578&quot; style=&quot;font-weight: 400;&quot;&gt;&lt;span data-dcnode-id=&quot;579&quot; instrument_node=&quot;&quot;&gt;Image credit top of page: This image show stars orbiting very close to Sgr A* (center), the supermassive black hole at the heart of the Milky Way. They were obtained with the GRAVITY instrument on ESO’s Very Large Telescope Interferometer (VLTI) at the end of June 2021. ESO/GRAVITY collaboration&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;saboxplugin-wrap&quot; data-dcnode-id=&quot;562&quot; itemprop=&quot;author&quot; itemscope=&quot;&quot; itemtype=&quot;http://schema.org/Person&quot;&gt;&lt;div class=&quot;saboxplugin-tab&quot; data-dcnode-id=&quot;563&quot;&gt;&lt;div class=&quot;saboxplugin-gravatar&quot; data-dcnode-id=&quot;573&quot;&gt;&lt;noscript data-dcnode-id=&quot;575&quot;&gt;&lt;span data-dcnode-id=&quot;576&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img decoding=&quot;async&quot; src=&quot;https://sp-ao.shortpixel.ai/client/to_auto,q_glossy,ret_img,w_100,h_100/https://dailygalaxy.com/wp-content/uploads/2021/09/Maxwell-Moe.jpg&quot; width=&quot;100&quot;  height=&quot;100&quot; alt=&quot;Maxwell Moe&quot; itemprop=&quot;image&quot;&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;img alt=&quot;Maxwell Moe&quot; class=&quot;lazyloaded&quot; data-dcnode-id=&quot;574&quot; data-src=&quot;https://sp-ao.shortpixel.ai/client/to_auto,q_glossy,ret_img,w_100,h_100/https://dailygalaxy.com/wp-content/uploads/2021/09/Maxwell-Moe.jpg&quot; decoding=&quot;async&quot; height=&quot;100&quot; itemprop=&quot;image&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//sp-ao.shortpixel.ai/client/to_auto%2Cq_glossy%2Cret_img%2Cw_100%2Ch_100/https%3A//dailygalaxy.com/wp-content/uploads/2021/09/Maxwell-Moe.jpg&amp;amp;raw&quot; width=&quot;100&quot;&gt;&lt;/div&gt;&lt;div class=&quot;saboxplugin-authorname&quot; data-dcnode-id=&quot;569&quot;&gt;&lt;a class=&quot;vcard author&quot; data-dcnode-id=&quot;570&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//dailygalaxy.com/author/maxwell-moe/&quot; itemprop=&quot;url&quot; rel=&quot;author&quot;&gt;&lt;span class=&quot;fn&quot; data-dcnode-id=&quot;571&quot; itemprop=&quot;name&quot;&gt;&lt;span data-dcnode-id=&quot;572&quot; instrument_node=&quot;&quot;&gt;Maxwell Moe&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;saboxplugin-desc&quot; data-dcnode-id=&quot;565&quot;&gt;&lt;div data-dcnode-id=&quot;566&quot; itemprop=&quot;description&quot;&gt;&lt;div class=&quot;gmail_default&quot; data-dcnode-id=&quot;567&quot;&gt;&lt;span data-dcnode-id=&quot;568&quot; instrument_node=&quot;&quot;&gt;Maxwell Moe, astrophysicist, NASA Einstein Fellow, University of Arizona. Max can be found two nights a week probing the mysteries of the Universe at the Kitt Peak National Observatory. Max received his Ph.D in astronomy from Harvard University in 2015.&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;clearfix&quot; data-dcnode-id=&quot;564&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;561&quot; style=&quot;clear: both;&quot;&gt;&lt;/div&gt;&lt;div class=&quot;comment-respond&quot; data-dcnode-id=&quot;517&quot; id=&qu
