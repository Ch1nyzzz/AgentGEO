&lt;/span&gt;&lt;p data-dcnode-id=&quot;544&quot;&gt;&lt;span data-dcnode-id=&quot;545&quot; instrument_node=&quot;&quot;&gt;The Milky Way is home to the Sun, our Solar System, and hundreds of billions of stars beyond that. Yet unlike all the other galaxies out there&amp;nbsp;— in our Local Group and in the Universe beyond&amp;nbsp;— we have no good way to view our own galaxy from our position within it. As a result, the full extent of our galaxy, including its total size, mass, matter content, and number of stars, remains mysterious to modern astronomers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;543&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article_paragraph_2&quot; data-dcnode-id=&quot;542&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;541&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;539&quot;&gt;&lt;span data-dcnode-id=&quot;540&quot; instrument_node=&quot;&quot;&gt;We've long looked at the galaxies surrounding our local neighborhood in space and compared ourselves to them. Although there may be more than 60 galaxies present within the Local Group, two of them dominate in every way imaginable: ourselves and Andromeda. We are the two largest, most massive galaxies around, with more stars than all the others combined. But which one is bigger? Long thought to be Andromeda, we're now finding out the Milky Way might have a chance at being number one.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;538&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption wp-caption-wrap alignnone&quot; data-dcnode-id=&quot;511&quot; id=&quot;attachment_9831&quot;&gt;&lt;span data-dcnode-id=&quot;537&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;progressive-image alt=&quot;Our Local Group of galaxies is dominated by Andromeda and the Milky Way, but we still don't know... [+] which one dominates in terms of gravitation. While Andromeda appears to be larger in physical extent and have more stars, it may yet be less massive than we are.&quot; class=&quot;size-full wp-image-9831 show-img&quot; data-dcnode-id=&quot;534&quot; data-height=&quot;960&quot; data-width=&quot;960&quot; src=&quot;https://blogs-images.forbes.com/startswithabang/files/2018/03/local-group.jpg&quot;&gt;&lt;img alt=&quot;Our Local Group of galaxies is dominated by Andromeda and the Milky Way, but we still don't know... [+] which one dominates in terms of gravitation. While Andromeda appears to be larger in physical extent and have more stars, it may yet be less massive than we are.&quot; data-dcnode-id=&quot;535&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//imageio.forbes.com/blogs-images/startswithabang/files/2018/03/local-group.jpg%3Ffit%3Dbounds%26format%3Djpg%26width%3D96&amp;amp;raw&quot; style=&quot;display: block;&quot;&gt;&lt;/progressive-image&gt;&lt;span data-dcnode-id=&quot;533&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;506&quot;&gt;&lt;span data-dcnode-id=&quot;507&quot; instrument_node=&quot;&quot;&gt;It might strike you as a tremendous failing on the part of astronomers that we haven't yet learned how big, massive, or full of stars our own galaxy is, but it shouldn't surprise you. Think about it from another point of view: imagine you were looking out at a room of people, and you wanted to determine what everyone's eye color was.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;505&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;fbs-ad ad-id=&quot;article-0-inread&quot; aria-hidden=&quot;true&quot; data-dcnode-id=&quot;503&quot; position=&quot;inread&quot; progressive=&quot;&quot; role=&quot;presentation&quot;&gt;&lt;div data-dcnode-id=&quot;504&quot; id=&quot;article-0-inread&quot;&gt;&lt;/div&gt;&lt;/fbs-ad&gt;&lt;span data-dcnode-id=&quot;502&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;500&quot;&gt;&lt;span data-dcnode-id=&quot;501&quot; instrument_node=&quot;&quot;&gt;It seems like the easiest experiment of all. All you'd have to do is get close enough to everyone in the room to see what color their eyes were, and you'd know. You'd likely know the eye color of everyone close to you right away, and through use of a tool&amp;nbsp;— a camera, a pair of binoculars, a telescope, etc.&amp;nbsp;— you could determine the eye color of everyone within your view. There'd only be one person in the room who'd give you trouble: yourself.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;499&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;471&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;467&quot;&gt;&lt;span data-dcnode-id=&quot;468&quot; instrument_node=&quot;&quot;&gt;We have two ways of determining our own eye color from within our own bodies.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;466&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;458&quot;&gt;&lt;span data-dcnode-id=&quot;465&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;463&quot;&gt;&lt;span data-dcnode-id=&quot;464&quot; instrument_node=&quot;&quot;&gt;We can shift our perspective outside of our own bodies. Either by asking another person in the room or by taking a selfie, we can learn what the results are and gain the missing data point of our own eye color.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;462&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;460&quot;&gt;&lt;span data-dcnode-id=&quot;461&quot; instrument_node=&quot;&quot;&gt;We can find an accurate-enough reflection, and learn what our eye color is from this light-echo we're observing.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;459&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;457&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;455&quot;&gt;&lt;span data-dcnode-id=&quot;456&quot; instrument_node=&quot;&quot;&gt;For our own bodies, this is easy enough. Many trustworthy external observers exist; camera technology is advanced, accurate, and ubiquitous; reflective surfaces like mirrors, glass, or even bodies of water are abundant. When we're not in isolation, and live in a world with the right tools, it's an observation that's easy to make.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;454&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption wp-caption-wrap alignnone&quot; data-dcnode-id=&quot;427&quot; id=&quot;attachment_12368&quot;&gt;&lt;span data-dcnode-id=&quot;453&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-body-image image-embed__placeholder&quot; data-dcnode-id=&quot;448&quot; style=&quot;padding-top: 80.45%; position: relative;&quot;&gt;&lt;span data-dcnode-id=&quot;452&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;progressive-image alt=&quot;When you look at your reflection in a mirror, that's the simplest way to determine your own eye... [+] color. If no reflective surfaces were available, and no cameras were available. and no one else could observe you, you might never devise a method to know the answer.&quot; class=&quot;size-large wp-image-12368 show-img&quot; data-dcnode-id=&quot;450&quot; data-height=&quot;967&quot; data-width=&quot;1200&quot; src=&quot;https://blogs-images.forbes.com/startswithabang/files/2019/03/Barack_Obama_ties_his_tie-1200x967.jpg&quot;&gt;&lt;img alt=&quot;When you look at your reflection in a mirror, that's the simplest way to determine your own eye... [+] color. If no reflective surfaces were available, and no cameras were available. and no one else could observe you, you might never devise a method to know the answer.&quot; data-dcnode-id=&quot;451&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//imageio.forbes.com/blogs-images/startswithabang/files/2019/03/Barack_Obama_ties_his_tie-1200x967.jpg%3Ffit%3Dbounds%26format%3Djpg%26width%3D96&amp;amp;raw&quot; style=&quot;display: block;&quot;&gt;&lt;/progressive-image&gt;&lt;span data-dcnode-id=&quot;449&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;447&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-image-caption&quot; data-dcnode-id=&quot;429&quot;&gt;&lt;span data-dcnode-id=&quot;446&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;caption-container&quot; data-dcnode-id=&quot;431&quot; ng-class=&quot;caption_state&quot;&gt;&lt;span data-dcnode-id=&quot;445&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;fbs-accordion class=&quot;expandable&quot; current=&quot;-1&quot; data-dcnode-id=&quot;436&quot;&gt;&lt;span data-dcnode-id=&quot;444&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p aria-expanded=&quot;false&quot; aria-hidden=&quot;true&quot; class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;438&quot;&gt;&lt;span data-dcnode-id=&quot;443&quot; instrument_node=&quot;&quot;&gt;When you look at your reflection in a mirror, that's the simplest way to determine your own eye&lt;/span&gt;&lt;span class=&quot;plus&quot; data-dcnode-id=&quot;441&quot; data-ga-track=&quot;caption expand&quot;&gt;&lt;span data-dcnode-id=&quot;442&quot; instrument_node=&quot;&quot;&gt;... [+]&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;expanded-caption&quot; data-dcnode-id=&quot;439&quot;&gt;&lt;span data-dcnode-id=&quot;440&quot; instrument_node=&quot;&quot;&gt; color. If no reflective surfaces were available, and no cameras were available. and no one else could observe you, you might never devise a method to know the answer.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;437&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/fbs-accordion&gt;&lt;span data-dcnode-id=&quot;435&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;small class=&quot;article-photo-credit&quot; data-dcnode-id=&quot;433&quot;&gt;&lt;span data-dcnode-id=&quot;434&quot; instrument_node=&quot;&quot;&gt;Pete Souza / White House&lt;/span&gt;&lt;/small&gt;&lt;span data-dcnode-id=&quot;432&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;428&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;426&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;424&quot;&gt;&lt;span data-dcnode-id=&quot;425&quot; instrument_node=&quot;&quot;&gt;But what if the right tools weren't readily available to you? What if there was no one else outside of your own body that you could contact and whose observations you could rely on? What if there were no reflections of your own face that you could look at and view yourself to determine your eye color? And what if there was no way to take an indelible image of yourself (e.g., a photograph), enabling you to view your likeness?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;423&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;421&quot;&gt;&lt;span data-dcnode-id=&quot;422&quot; instrument_node=&quot;&quot;&gt;It's a hard problem. Being embedded within your own body means there's no good way to take the critical observations yourself without the outside world around you cooperating. Well, being embedded within the Milky Way means that even our best views of our own, home galaxy from within it have fundamental limitations. We might be able to measure the motions and positions of billions of stars, but there's still so much that's obscure.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;420&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption wp-caption-wrap alignnone&quot; data-dcnode-id=&quot;393&quot; id=&quot;attachment_3937&quot;&gt;&lt;span data-dcnode-id=&quot;419&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-body-image image-embed__placeholder&quot; data-dcnode-id=&quot;414&quot; style=&quot;padding-top: 50.07%; position: relative;&quot;&gt;&lt;span data-dcnode-id=&quot;418&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;progressive-image alt=&quot;A map of star density in the Milky Way and surrounding sky, clearly showing the Milky Way, large and... [+] small Magellanic Clouds, and others. But measuring the stars of the Milky Way itself is challenging, as living within the Milky Way renders us unable to view all the stars and their motions inside. All told, the Milky Way contains some 200-400 billion stars over its disk-like extent, with the Sun located some 25,000 light years from the center.&quot; class=&quot;size-large wp-image-3937 show-img&quot; data-dcnode-id=&quot;416&quot; data-height=&quot;601&quot; data-width=&quot;1200&quot; src=&quot;https://blogs-images.forbes.com/startswithabang/files/2016/09/Gaia_Milky_Way_star_density_map_2015-07-03-1200x601.jpg&quot;&gt;&lt;img alt=&quot;A map of star density in the Milky Way and surrounding sky, clearly showing the Milky Way, large and... [+] small Magellanic Clouds, and others. But measuring the stars of the Milky Way itself is challenging, as living within the Milky Way renders us unable to view all the stars and their motions inside. All told, the Milky Way contains some 200-400 billion stars over its disk-like extent, with the Sun located some 25,000 light years from the center.&quot; data-dcnode-id=&quot;417&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//imageio.forbes.com/blogs-images/startswithabang/files/2016/09/Gaia_Milky_Way_star_density_map_2015-07-03-1200x601.jpg%3Ffit%3Dbounds%26format%3Djpg%26width%3D96&amp;amp;raw&quot; style=&quot;display: block;&quot;&gt;&lt;/progressive-image&gt;&lt;span data-dcnode-id=&quot;415&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;413&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-image-caption&quot; data-dcnode-id=&quot;395&quot;&gt;&lt;span data-dcnode-id=&quot;412&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;caption-container&quot; data-dcnode-id=&quot;397&quot; ng-class=&quot;caption_state&quot;&gt;&lt;span data-dcnode-id=&quot;411&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;fbs-accordion class=&quot;expandable&quot; current=&quot;-1&quot; data-dcnode-id=&quot;402&quot;&gt;&lt;span data-dcnode-id=&quot;410&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p aria-expanded=&quot;false&quot; aria-hidden=&quot;true&quot; class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;404&quot;&gt;&lt;span data-dcnode-id=&quot;409&quot; instrument_node=&quot;&quot;&gt;A map of star density in the Milky Way and surrounding sky, clearly showing the Milky Way, large and&lt;/span&gt;&lt;span class=&quot;plus&quot; data-dcnode-id=&quot;407&quot; data-ga-track=&quot;caption expand&quot;&gt;&lt;span data-dcnode-id=&quot;408&quot; instrument_node=&quot;&quot;&gt;... [+]&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;expanded-caption&quot; data-dcnode-id=&quot;405&quot;&gt;&lt;span data-dcnode-id=&quot;406&quot; instrument_node=&quot;&quot;&gt; small Magellanic Clouds, and others. But measuring the stars of the Milky Way itself is challenging, as living within the Milky Way renders us unable to view all the stars and their motions inside. All told, the Milky Way contains some 200-400 billion stars over its disk-like extent, with the Sun located some 25,000 light years from the center.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;403&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/fbs-accordion&gt;&lt;span data-dcnode-id=&quot;401&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;small class=&quot;article-photo-credit&quot; data-dcnode-id=&quot;399&quot;&gt;&lt;span data-dcnode-id=&quot;400&quot; instrument_node=&quot;&quot;&gt;ESA/GAIA&lt;/span&gt;&lt;/small&gt;&lt;span data-dcnode-id=&quot;398&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;396&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;392&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;390&quot;&gt;&lt;span data-dcnode-id=&quot;391&quot; instrument_node=&quot;&quot;&gt;Being located in the plane of the Milky Way, 25,000 light-years from the galactic center, means that there are a number of things we cannot view optically.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;389&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ol data-dcnode-id=&quot;375&quot;&gt;&lt;span data-dcnode-id=&quot;388&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;386&quot;&gt;&lt;span data-dcnode-id=&quot;387&quot; instrument_node=&quot;&quot;&gt;Most of the stars in the galaxy, since the dust in the plane of the Milky Way (or other structures, like nebulae or stars) obscures it.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;385&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;383&quot;&gt;&lt;span data-dcnode-id=&quot;384&quot; instrument_node=&quot;&quot;&gt;The bulk shapes that are traced out; we still argue about the number and size of the spiral arms, the presence or absence of arm spurs, the age and extent of the central bar, etc.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;382&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;380&quot;&gt;&lt;span data-dcnode-id=&quot;381&quot; instrument_node=&quot;&quot;&gt;The number and location of recent supernovae and supernova remnants, since the far side of the galaxy cannot easily be seen.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;379&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;377&quot;&gt;&lt;span data-dcnode-id=&quot;378&quot; instrument_node=&quot;&quot;&gt;And the transverse motions of the stars as they move around the galaxy; because we're located in it, measuring bulk rotational motion as a function of galactic radius is challenging.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;376&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ol&gt;&lt;span data-dcnode-id=&quot;374&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption wp-caption-wrap alignnone&quot; data-dcnode-id=&quot;347&quot; id=&quot;attachment_8642&quot;&gt;&lt;span data-dcnode-id=&quot;373&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-body-image image-embed__placeholder&quot; data-dcnode-id=&quot;368&quot; style=&quot;padding-top: 63.29%; position: relative;&quot;&gt;&lt;span data-dcnode-id=&quot;372&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;progressive-image alt=&quot;This four-panel view shows the Milky Way's central region in four different wavelengths of light,... [+] with the longer (submillimeter) wavelengths at top, going through the far-and-near infrared (2nd and 3rd) and ending in a visible-light view of the Milky Way. Note that the dust lanes and foreground stars obscure the center in visible light, but not so much in the infrared.&quot; class=&quot;size-full wp-image-8642 show-img&quot; data-dcnode-id=&quot;370&quot; data-height=&quot;608&quot; data-width=&quot;960&quot; src=&quot;https://blogs-images.forbes.com/startswithabang/files/2017/11/eso1606d.jpg&quot;&gt;&lt;img alt=&quot;This four-panel view shows the Milky Way's central region in four different wavelengths of light,... [+] with the longer (submillimeter) wavelengths at top, going through the far-and-near infrared (2nd and 3rd) and ending in a visible-light view of the Milky Way. Note that the dust lanes and foreground stars obscure the center in visible light, but not so much in the infrared.&quot; data-dcnode-id=&quot;371&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//imageio.forbes.com/blogs-images/startswithabang/files/2017/11/eso1606d.jpg%3Ffit%3Dbounds%26format%3Djpg%26width%3D96&amp;amp;raw&quot; style=&quot;display: block;&quot;&gt;&lt;/progressive-image&gt;&lt;span data-dcnode-id=&quot;369&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;367&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;caption-container&quot; data-dcnode-id=&quot;351&quot; ng-class=&quot;caption_state&quot;&gt;&lt;span data-dcnode-id=&quot;365&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;fbs-accordion class=&quot;expandable&quot; current=&quot;-1&quot; data-dcnode-id=&quot;356&quot;&gt;&lt;span data-dcnode-id=&quot;364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p aria-expanded=&quot;false&quot; aria-hidden=&quot;true&quot; class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;358&quot;&gt;&lt;span data-dcnode-id=&quot;363&quot; instrument_node=&quot;&quot;&gt;This four-panel view shows the Milky Way's central region in four different wavelengths of light,&lt;/span&gt;&lt;span class=&quot;plus&quot; data-dcnode-id=&quot;361&quot; data-ga-track=&quot;caption expand&quot;&gt;&lt;span data-dcnode-id=&quot;362&quot; instrument_node=&quot;&quot;&gt;... [+]&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;expanded-caption&quot; data-dcnode-id=&quot;359&quot;&gt;&lt;span data-dcnode-id=&quot;360&quot; instrument_node=&quot;&quot;&gt; with the longer (submillimeter) wavelengths at top, going through the far-and-near infrared (2nd and 3rd) and ending in a visible-light view of the Milky Way. Note that the dust lanes and foreground stars obscure the center in visible light, but not so much in the infrared.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;357&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;346&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;344&quot;&gt;&lt;span data-dcnode-id=&quot;345&quot; instrument_node=&quot;&quot;&gt;Multi-wavelength views are helping, as infrared light of various wavelengths is more transparent to the dust, and large-scale sky mapping observatories from both the ground and in space&amp;nbsp;— particularly ESA's Gaia mission&amp;nbsp;— are helping us understand the full extent of the physical properties of our galaxy.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;343&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;341&quot;&gt;&lt;span data-dcnode-id=&quot;342&quot; instrument_node=&quot;&quot;&gt;Andromeda, on the other hand, is very close by at just a little over 2 million light-years distant. It is the largest galaxy beyond the Milky Way in terms of angular size, or the amount of space it takes up on the sky. We have engaged in a number of spectacular observing campaigns of Andromeda, most notably PHAT: the Panchromatic Hubble Andromeda Treasury, which measured and characterized the stars and dust across nearly half of our giant cosmic neighbor.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;340&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption wp-caption-wrap alignnone&quot; data-dcnode-id=&quot;313&quot; id=&quot;attachment_3318&quot;&gt;&lt;span data-dcnode-id=&quot;339&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-body-image image-embed__placeholder&quot; data-dcnode-id=&quot;334&quot; style=&quot;padding-top: 35.72%; position: relative;&quot;&gt;&lt;span data-dcnode-id=&quot;338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;progressive-image alt=&quot;A Mosaic of the 117 million resolved stars, plus many more unresolved ones, in the disk of the... [+] Andromeda galaxy. Only a portion of the central bulge was imaged, but the density of stars in that region is unparalleled anywhere else in the Local Group. These measurements have helped scientists characterize the stars and mass present within the Andromeda Galaxy to greater precisions than ever before.&quot; class=&quot;size-large wp-image-3318 show-img&quot; data-dcnode-id=&quot;336&quot; data-height=&quot;429&quot; data-width=&quot;1200&quot; src=&quot;https://blogs-images.forbes.com/startswithabang/files/2016/07/hs-2015-18-b-web_print-1200x429.jpg&quot;&gt;&lt;img alt=&quot;A Mosaic of the 117 million resolved stars, plus many more unresolved ones, in the disk of the... [+] Andromeda galaxy. Only a portion of the central bulge was imaged, but the density of stars in that region is unparalleled anywhere else in the Local Group. These measurements have helped scientists characterize the stars and mass present within the Andromeda Galaxy to greater precisions than ever before.&quot; data-dcnode-id=&quot;337&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//imageio.forbes.com/blogs-images/startswithabang/files/2016/07/hs-2015-18-b-web_print-1200x429.jpg%3Ffit%3Dbounds%26format%3Djpg%26width%3D96&amp;amp;raw&quot; style=&quot;display: block;&quot;&gt;&lt;/progressive-image&gt;&lt;span data-dcnode-id=&quot;335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;333&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-image-caption&quot; data-dcnode-id=&quot;315&quot;&gt;&lt;span data-dcnode-id=&quot;332&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;caption-container&quot; data-dcnode-id=&quot;317&quot; ng-class=&quot;caption_state&quot;&gt;&lt;span data-dcnode-id=&quot;331&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;fbs-accordion class=&quot;expandable&quot; current=&quot;-1&quot; data-dcnode-id=&quot;322&quot;&gt;&lt;span data-dcnode-id=&quot;330&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p aria-expanded=&quot;false&quot; aria-hidden=&quot;true&quot; class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;324&quot;&gt;&lt;span data-dcnode-id=&quot;329&quot; instrument_node=&quot;&quot;&gt;A Mosaic of the 117 million resolved stars, plus many more unresolved ones, in the disk of the&lt;/span&gt;&lt;span class=&quot;plus&quot; data-dcnode-id=&quot;327&quot; data-ga-track=&quot;caption expand&quot;&gt;&lt;span data-dcnode-id=&quot;328&quot; instrument_node=&quot;&quot;&gt;... [+]&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;expanded-caption&quot; data-dcnode-id=&quot;325&quot;&gt;&lt;span data-dcnode-id=&quot;326&quot; instrument_node=&quot;&quot;&gt; Andromeda galaxy. Only a portion of the central bulge was imaged, but the density of stars in that region is unparalleled anywhere else in the Local Group. These measurements have helped scientists characterize the stars and mass present within the Andromeda Galaxy to greater precisions than ever before.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;323&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/fbs-accordion&gt;&lt;span data-dcnode-id=&quot;321&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;small class=&quot;article-photo-credit&quot; data-dcnode-id=&quot;319&quot;&gt;&lt;span data-dcnode-id=&quot;320&quot; instrument_node=&quot;&quot;&gt;NASA, ESA, J. Dalcanton, B.F. Williams, L.C. Johnson (University of Washington), the PHAT team, and R. Gendler&lt;/span&gt;&lt;/small&gt;&lt;span data-dcnode-id=&quot;318&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;316&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;314&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;312&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;310&quot;&gt;&lt;span data-dcnode-id=&quot;311&quot; instrument_node=&quot;&quot;&gt;When we hold these two galaxies up against one another, comparing our own Milky Way to Andromeda, we find there are some stark differences that suggest Andromeda is the more dominant of the two.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;309&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;ul data-dcnode-id=&quot;298&quot;&gt;&lt;span data-dcnode-id=&quot;308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;306&quot;&gt;&lt;span data-dcnode-id=&quot;307&quot; instrument_node=&quot;&quot;&gt;When we count the number of stars, the (infrared) Spitzer Space Telescope showed that Andromeda has approximately 1 trillion stars inside it, compared to a much smaller number with much larger uncertainties&amp;nbsp;— between 200 billion and 400 billion&amp;nbsp;— for the Milky Way.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;305&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;303&quot;&gt;&lt;span data-dcnode-id=&quot;304&quot; instrument_node=&quot;&quot;&gt;In terms of physical extent, the Andromeda Galaxy's disk diameter is well-measured, and spans 220,000 light-years across. For comparison, the diameter of the Milky Way's disk has long been thought to be only about half that: around 100,000 light-years.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;302&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;li data-dcnode-id=&quot;300&quot;&gt;&lt;span data-dcnode-id=&quot;301&quot; instrument_node=&quot;&quot;&gt;And in terms of the stars present,&amp;nbsp;the Andromeda galaxy's stars are much older, and its star-formation rate is much lower: only about 20-30% that of the Milky Way.&lt;/span&gt;&lt;/li&gt;&lt;span data-dcnode-id=&quot;299&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/ul&gt;&lt;span data-dcnode-id=&quot;297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption wp-caption-wrap alignnone&quot; data-dcnode-id=&quot;270&quot; id=&quot;attachment_3320&quot;&gt;&lt;span data-dcnode-id=&quot;296&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-body-image image-embed__placeholder&quot; data-dcnode-id=&quot;291&quot; style=&quot;padding-top: 67.65%; position: relative;&quot;&gt;&lt;span data-dcnode-id=&quot;295&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;progressive-image alt=&quot;Six of the most spectacular star clusters in Andromeda. The brilliant red star in the fifth image is... [+] actually a foreground star in the Milky Way. These star clusters represent some of the newest stars found by the Panchromatic Hubble Andromeda Treasury, allowing us to characterize star-formation rates and history of Andromeda overall.&quot; class=&quot;size-full wp-image-3320 show-img&quot; data-dcnode-id=&quot;293&quot; data-height=&quot;489&quot; data-width=&quot;722&quot; src=&quot;https://blogs-images.forbes.com/startswithabang/files/2016/07/hs-2015-18-j-web_print.jpg&quot;&gt;&lt;img alt=&quot;Six of the most spectacular star clusters in Andromeda. The brilliant red star in the fifth image is... [+] actually a foreground star in the Milky Way. These star clusters represent some of the newest stars found by the Panchromatic Hubble Andromeda Treasury, allowing us to characterize star-formation rates and history of Andromeda overall.&quot; data-dcnode-id=&quot;294&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//imageio.forbes.com/blogs-images/startswithabang/files/2016/07/hs-2015-18-j-web_print.jpg%3Ffit%3Dbounds%26format%3Djpg%26width%3D96&amp;amp;raw&quot; style=&quot;display: block;&quot;&gt;&lt;/progressive-image&gt;&lt;span data-dcnode-id=&quot;292&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;290&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-image-caption&quot; data-dcnode-id=&quot;272&quot;&gt;&lt;span data-dcnode-id=&quot;289&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;caption-container&quot; data-dcnode-id=&quot;274&quot; ng-class=&quot;caption_state&quot;&gt;&lt;span data-dcnode-id=&quot;288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;fbs-accordion class=&quot;expandable&quot; current=&quot;-1&quot; data-dcnode-id=&quot;279&quot;&gt;&lt;span data-dcnode-id=&quot;287&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p aria-expanded=&quot;false&quot; aria-hidden=&quot;true&quot; class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;281&quot;&gt;&lt;span data-dcnode-id=&quot;286&quot; instrument_node=&quot;&quot;&gt;Six of the most spectacular star clusters in Andromeda. The brilliant red star in the fifth image is&lt;/span&gt;&lt;span class=&quot;plus&quot; data-dcnode-id=&quot;284&quot; data-ga-track=&quot;caption expand&quot;&gt;&lt;span data-dcnode-id=&quot;285&quot; instrument_node=&quot;&quot;&gt;... [+]&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;expanded-caption&quot; data-dcnode-id=&quot;282&quot;&gt;&lt;span data-dcnode-id=&quot;283&quot; instrument_node=&quot;&quot;&gt; actually a foreground star in the Milky Way. These star clusters represent some of the newest stars found by the Panchromatic Hubble Andromeda Treasury, allowing us to characterize star-formation rates and history of Andromeda overall.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/fbs-accordion&gt;&lt;span data-dcnode-id=&quot;278&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;small class=&quot;article-photo-credit&quot; data-dcnode-id=&quot;276&quot;&gt;&lt;span data-dcnode-id=&quot;277&quot; instrument_node=&quot;&quot;&gt;NASA, ESA, and Z. Levay (STScI); Science Credit: NASA, ESA, J. Dalcanton, B.F. Williams, L.C. Johnson (University of Washington), and the PHAT team&lt;/span&gt;&lt;/small&gt;&lt;span data-dcnode-id=&quot;275&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;273&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;271&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;269&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;267&quot;&gt;&lt;span data-dcnode-id=&quot;268&quot; instrument_node=&quot;&quot;&gt;So you'd probably think, if you went and measured the mass of these two galaxies, you'd find that Andromeda would be far greater in mass than the Milky Way. But this isn't the case at all.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;266&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;258&quot;&gt;&lt;span data-dcnode-id=&quot;265&quot; instrument_node=&quot;&quot;&gt;You see, the best way to measure galactic mass is by using the stars and globular clusters found distributed far away from the galactic center or disk: in the galaxy's halo. Doing this for a galaxy like Andromeda is fascinating and educational, teaching us that the massive halo extends for approximately a million light-years in all directions, and contains a large amount of mass in this halo as well, in terms of both gas and dark matter. Although there are large uncertainties, the total mass estimates of Andromeda range &lt;/span&gt;&lt;a aria-label=&quot;from about 800 billion solar masses&quot; data-dcnode-id=&quot;263&quot; data-ga-track=&quot;ExternalLink:https://s3-ap-southeast-2.amazonaws.com/icrar.org/wp-content/uploads/2018/02/13131736/m31-escape-velocity.pdf&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s3-ap-southeast-2.amazonaws.com/icrar.org/wp-content/uploads/2018/02/13131736/m31-escape-velocity.pdf&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;264&quot; instrument_node=&quot;&quot;&gt;from about 800 billion solar masses&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;262&quot; instrument_node=&quot;&quot;&gt; up to &lt;/span&gt;&lt;a aria-label=&quot;1.5 trillion solar masses&quot; data-dcnode-id=&quot;260&quot; data-ga-track=&quot;ExternalLink:https://arxiv.org/abs/1405.0306&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arxiv.org/abs/1405.0306&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;261&quot; instrument_node=&quot;&quot;&gt;1.5 trillion solar masses&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;259&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;These estimates are so different because they're arrived at by using different techniques, which poses an interesting puzzle at present.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;257&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption wp-caption-wrap alignnone&quot; data-dcnode-id=&quot;230&quot; id=&quot;attachment_12366&quot;&gt;&lt;span data-dcnode-id=&quot;256&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-body-image image-embed__placeholder&quot; data-dcnode-id=&quot;251&quot; style=&quot;padding-top: 81.15%; position: relative;&quot;&gt;&lt;span data-dcnode-id=&quot;255&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;progressive-image alt=&quot;This diagram shows how scientists determined the size of the halo of the Andromeda galaxy: by... [+] looking at absorption features from distant quasars, whose light either did or did not pass through the halo surrounding Andromeda. Where the halo is present, its gas absorbs some of the quasar light and darkens it across a very small wavelength range. By measuring the tiny dip in brightness at that specific range, scientists could tell how much gas is between us and each quasar.&quot; class=&quot;size-large wp-image-12366 show-img&quot; data-dcnode-id=&quot;253&quot; data-height=&quot;975&quot; data-width=&quot;1200&quot; src=&quot;https://blogs-images.forbes.com/startswithabang/files/2019/03/Hubble_Finds_Giant_Halo_Around_the_Andromeda_Galaxy-1200x975.jpg&quot;&gt;&lt;img alt=&quot;This diagram shows how scientists determined the size of the halo of the Andromeda galaxy: by... [+] looking at absorption features from distant quasars, whose light either did or did not pass through the halo surrounding Andromeda. Where the halo is present, its gas absorbs some of the quasar light and darkens it across a very small wavelength range. By measuring the tiny dip in brightness at that specific range, scientists could tell how much gas is between us and each quasar.&quot; data-dcnode-id=&quot;254&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//imageio.forbes.com/blogs-images/startswithabang/files/2019/03/Hubble_Finds_Giant_Halo_Around_the_Andromeda_Galaxy-1200x975.jpg%3Ffit%3Dbounds%26format%3Djpg%26width%3D96&amp;amp;raw&quot; style=&quot;display: block;&quot;&gt;&lt;/progressive-image&gt;&lt;span data-dcnode-id=&quot;252&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;250&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-image-caption&quot; data-dcnode-id=&quot;232&quot;&gt;&lt;span data-dcnode-id=&quot;249&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;caption-container&quot; data-dcnode-id=&quot;234&quot; ng-class=&quot;caption_state&quot;&gt;&lt;span data-dcnode-id=&quot;248&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;fbs-accordion class=&quot;expandable&quot; current=&quot;-1&quot; data-dcnode-id=&quot;239&quot;&gt;&lt;span data-dcnode-id=&quot;247&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p aria-expanded=&quot;false&quot; aria-hidden=&quot;true&quot; class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;241&quot;&gt;&lt;span data-dcnode-id=&quot;246&quot; instrument_node=&quot;&quot;&gt;This diagram shows how scientists determined the size of the halo of the Andromeda galaxy: by&lt;/span&gt;&lt;span class=&quot;plus&quot; data-dcnode-id=&quot;244&quot; data-ga-track=&quot;caption expand&quot;&gt;&lt;span data-dcnode-id=&quot;245&quot; instrument_node=&quot;&quot;&gt;... [+]&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;expanded-caption&quot; data-dcnode-id=&quot;242&quot;&gt;&lt;span data-dcnode-id=&quot;243&quot; instrument_node=&quot;&quot;&gt; looking at absorption features from distant quasars, whose light either did or did not pass through the halo surrounding Andromeda. Where the halo is present, its gas absorbs some of the quasar light and darkens it across a very small wavelength range. By measuring the tiny dip in brightness at that specific range, scientists could tell how much gas is between us and each quasar.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;240&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/fbs-accordion&gt;&lt;span data-dcnode-id=&quot;238&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;small class=&quot;article-photo-credit&quot; data-dcnode-id=&quot;236&quot;&gt;&lt;span data-dcnode-id=&quot;237&quot; instrument_node=&quot;&quot;&gt;NASA, ESA, and A. Feild (STScI)&lt;/span&gt;&lt;/small&gt;&lt;span data-dcnode-id=&quot;235&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;233&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;231&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;229&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;224&quot;&gt;&lt;span data-dcnode-id=&quot;228&quot; instrument_node=&quot;&quot;&gt;By measuring the motions of globular clusters within our own Milky Way, however, we don't have to rely only on the radial (along our line-of-sight) measurement, but can obtain transverse (moving perpendicular to our line-of-sight) motions as well. A combination of new data &lt;/span&gt;&lt;a aria-label=&quot;from the Gaia mission and the Hubble Space Telescope&quot; data-dcnode-id=&quot;226&quot; data-ga-track=&quot;ExternalLink:https://www.spacetelescope.org/news/heic1905/?lang&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.spacetelescope.org/news/heic1905/%3Flang&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;227&quot; instrument_node=&quot;&quot;&gt;from the Gaia mission and the Hubble Space Telescope&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;225&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;has given us&amp;nbsp;a total of 46 globular clusters with distances reaching as far as 130,000 light-years from Earth, and was able to pin down the Milky Way's mass more accurately than ever before.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;223&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;221&quot;&gt;&lt;span data-dcnode-id=&quot;222&quot; instrument_node=&quot;&quot;&gt;The result?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;220&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;215&quot;&gt;&lt;span data-dcnode-id=&quot;219&quot; instrument_node=&quot;&quot;&gt;The Gaia data alone indicates a mass of 1.3 trillion solar masses, while the combined Gaia/Hubble data (where Hubble captures the more distant globular clusters) &lt;/span&gt;&lt;a aria-label=&quot;yields a mass of 1.54 trillion solar masses&quot; data-dcnode-id=&quot;217&quot; data-ga-track=&quot;ExternalLink:https://arxiv.org/abs/1804.11348&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//arxiv.org/abs/1804.11348&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;218&quot; instrument_node=&quot;&quot;&gt;yields a mass of 1.54 trillion solar masses&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;216&quot; instrument_node=&quot;&quot;&gt;, with an uncertainty of less than 100 billion solar masses.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;214&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption wp-caption-wrap alignnone&quot; data-dcnode-id=&quot;187&quot; id=&quot;attachment_3924&quot;&gt;&lt;span data-dcnode-id=&quot;213&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-body-image image-embed__placeholder&quot; data-dcnode-id=&quot;208&quot; style=&quot;padding-top: 100.00%; position: relative;&quot;&gt;&lt;span data-dcnode-id=&quot;212&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;progressive-image alt=&quot;A map of the nearest globular clusters surrounding the Milky Way's center. The globular clusters... [+] closest to the galactic center have a higher metal content than the ones on the outskirts, but measuring the 3D motions of these clusters enables us to infer how much mass is present, total, throughout the Milky Way.&quot; class=&quot;size-full wp-image-3924 initial-width&quot; data-dcnode-id=&quot;210&quot; data-height=&quot;640&quot; data-width=&quot;640&quot; enhanced=&quot;&quot; src=&quot;https://blogs-images.forbes.com/startswithabang/files/2016/09/Globulars3.gif?&quot;&gt;&lt;img alt=&quot;A map of the nearest globular clusters surrounding the Milky Way's center. The globular clusters... [+] closest to the galactic center have a higher metal content than the ones on the outskirts, but measuring the 3D motions of these clusters enables us to infer how much mass is present, total, throughout the Milky Way.&quot; data-dcnode-id=&quot;211&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//blogs-images.forbes.com/startswithabang/files/2016/09/Globulars3.gif&amp;amp;raw&quot; style=&quot;display: none;&quot;&gt;&lt;/progressive-image&gt;&lt;span data-dcnode-id=&quot;209&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;207&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-image-caption&quot; data-dcnode-id=&quot;189&quot;&gt;&lt;span data-dcnode-id=&quot;206&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;caption-container&quot; data-dcnode-id=&quot;191&quot; ng-class=&quot;caption_state&quot;&gt;&lt;span data-dcnode-id=&quot;205&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;fbs-accordion class=&quot;expandable&quot; current=&quot;-1&quot; data-dcnode-id=&quot;196&quot;&gt;&lt;span data-dcnode-id=&quot;204&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p aria-expanded=&quot;false&quot; aria-hidden=&quot;true&quot; class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;198&quot;&gt;&lt;span data-dcnode-id=&quot;203&quot; instrument_node=&quot;&quot;&gt;A map of the nearest globular clusters surrounding the Milky Way's center. The globular clusters&lt;/span&gt;&lt;span class=&quot;plus&quot; data-dcnode-id=&quot;201&quot; data-ga-track=&quot;caption expand&quot;&gt;&lt;span data-dcnode-id=&quot;202&quot; instrument_node=&quot;&quot;&gt;... [+]&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;expanded-caption&quot; data-dcnode-id=&quot;199&quot;&gt;&lt;span data-dcnode-id=&quot;200&quot; instrument_node=&quot;&quot;&gt; closest to the galactic center have a higher metal content than the ones on the outskirts, but measuring the 3D motions of these clusters enables us to infer how much mass is present, total, throughout the Milky Way.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;197&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/fbs-accordion&gt;&lt;span data-dcnode-id=&quot;195&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;small class=&quot;article-photo-credit&quot; data-dcnode-id=&quot;193&quot;&gt;&lt;span data-dcnode-id=&quot;194&quot; instrument_node=&quot;&quot;&gt;William E. Harris / McMaster U., and Larry McNish / RASC Calgary&lt;/span&gt;&lt;/small&gt;&lt;span data-dcnode-id=&quot;192&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;190&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;188&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;186&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;184&quot;&gt;&lt;span data-dcnode-id=&quot;185&quot; instrument_node=&quot;&quot;&gt;In other words, even though the stars tell a different story, the overall mass shows that the Milky Way is likely as massive as the most massive estimates for Andromeda. If the radio observations of Andromeda is correct, our galaxy may even be nearly twice as massive as Andromeda.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;183&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;178&quot;&gt;&lt;span data-dcnode-id=&quot;182&quot; instrument_node=&quot;&quot;&gt;What's even more interesting is that another recent study, &lt;/span&gt;&lt;a aria-label=&quot;published last year to very little fanfare&quot; data-dcnode-id=&quot;180&quot; data-ga-track=&quot;ExternalLink:https://www.aanda.org/articles/aa/full_html/2018/04/aa32880-18/aa32880-18.html&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.aanda.org/articles/aa/full_html/2018/04/aa32880-18/aa32880-18.html&quot; rel=&quot;nofollow noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;181&quot; instrument_node=&quot;&quot;&gt;published last year to very little fanfare&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;179&quot; instrument_node=&quot;&quot;&gt;, indicates that the extent of the Milky Way's disk may be much larger than previously estimated: more like 170,000 light-years in diameter, rather than 100,000 light-years. Summing it all up, it looks like the Milky Way may be larger in extent and more massive in nature than we realized, while Andromeda may be more diffuse, spread-out, and less massive than we previously suspected.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;177&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption wp-caption-wrap alignnone&quot; data-dcnode-id=&quot;150&quot; id=&quot;attachment_4385&quot;&gt;&lt;span data-dcnode-id=&quot;176&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;article-body-image image-embed__placeholder&quot; data-dcnode-id=&quot;171&quot; style=&quot;padding-top: 68.50%; position: relative;&quot;&gt;&lt;span data-dcnode-id=&quot;175&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p aria-expanded=&quot;false&quot; aria-hidden=&quot;true&quot; class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;161&quot;&gt;&lt;span data-dcnode-id=&quot;166&quot; instrument_node=&quot;&quot;&gt;Located just outside the Big Dipper, the objects M81 and M82 have often been used as an analogy for&lt;/span&gt;&lt;span class=&quot;plus&quot; data-dcnode-id=&quot;164&quot; data-ga-track=&quot;caption expand&quot;&gt;&lt;span data-dcnode-id=&quot;165&quot; instrument_node=&quot;&quot;&gt;... [+]&lt;/span&gt;&lt;/span&gt;&lt;span class=&quot;expanded-caption&quot; data-dcnode-id=&quot;162&quot;&gt;&lt;span data-dcnode-id=&quot;163&quot; instrument_node=&quot;&quot;&gt; Andromeda and the Milky Way. While Andromeda still has more stars, it's possible that the Milky Way is nearly as large, nearly as luminous, and may even be more massive. More data is needed to know for certain.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;160&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;147&quot;&gt;&lt;span data-dcnode-id=&quot;148&quot; instrument_node=&quot;&quot;&gt;For a very long time, our observations of Andromeda and the Milky Way seemed to indicate that we were second to Andromeda in pretty much every way as far as our local neighborhood was concerned. But&amp;nbsp;the real thing that's changing is our measurements are improving, and we're learning just how difficult it is to accurately measure total mass values even in our own backyard. We're understanding and quantifying our uncertainties, and are realizing just how significant they are.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;146&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;144&quot;&gt;&lt;span data-dcnode-id=&quot;145&quot; instrument_node=&quot;&quot;&gt;There are stellar streams, ancient and recent gravitational interactions, and unknown initial conditions and past histories for every galaxy in question. When we measure these stars and clusters, we are only measuring velocities, yet to understand total mass, we want to measure accelerations, and that's where the difficulty lies. It's very much possible that our Milky Way is as massive or even more massive than Andromeda. As always, it will take more and better science to uncover the final answer.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;newsletter_signup_article&quot; data-dcnode-id=&quot;143&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;sigfile article-body fs-responsive-text&quot; data-dcnode-id=&quot;127&quot;&gt;&lt;span data-dcnode-id=&quot;140&quot;&gt;&lt;span data-dcnode-id=&quot;141&quot; instrument_node=&quot;&quot;&gt;Follow me on&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;a data-dcnode-id=&quot;138&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.twitter.com/StartsWithABang&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;139&quot; instrument_node=&quot;&quot;&gt;Twitter&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;137&quot; instrument_node=&quot;&quot;&gt;.&amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;135&quot;&gt;&lt;span data-dcnode-id=&quot;136&quot; instrument_node=&quot;&quot;&gt;Check out&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;134&quot; instrument_node=&quot;&quot;&gt;my&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;132&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.startswithabang.com/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;133&quot; instrument_node=&quot;&quot;&gt;website&
