            Published: Monday, August 5, 2019&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;tags&quot; data-dcnode-id=&quot;799&quot;&gt;&lt;span data-dcnode-id=&quot;802&quot; instrument_node=&quot;&quot;&gt;
          RELATED TOPICS: 
          &lt;/span&gt;&lt;a data-dcnode-id=&quot;800&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/tags/local-group&quot;&gt;&lt;span data-dcnode-id=&quot;801&quot; instrument_node=&quot;&quot;&gt;LOCAL GROUP&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;602&quot; style=&quot;margin:25px 0 0 0&quot;&gt;&lt;div class=&quot;segment&quot; data-dcnode-id=&quot;760&quot; style=&quot;&quot;&gt;&lt;div class=&quot;heroTop&quot; data-dcnode-id=&quot;790&quot;&gt;&lt;div class=&quot;mediaContainer&quot; data-dcnode-id=&quot;791&quot;&gt;&lt;div data-dcnode-id=&quot;796&quot;&gt;&lt;a class=&quot;cboxElement&quot; data-dcnode-id=&quot;797&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/sitefiles/resources/image.aspx%3Fitem%3D%257B530BF8AD-F384-4E95-A114-9ED825C65F9B%257D&quot; rev=&quot;colorbox&quot;&gt;&lt;img alt=&quot;ASYLG1215_01RE&quot; data-dcnode-id=&quot;798&quot; height=&quot;400&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/-/media/Images/Magazine%2520Articles/2015/12/ASYLG1215_01RE.jpg%3Fmw%3D600&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;794&quot;&gt;&lt;span data-dcnode-id=&quot;795&quot; instrument_node=&quot;&quot;&gt;The Milky Way’s nearest cosmic neighbors, the Magellanic Clouds (right), reign in the southern sky, but our Local Group is home to many other small satellite galaxies.&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;credit&quot; data-dcnode-id=&quot;792&quot;&gt;&lt;span data-dcnode-id=&quot;793&quot; instrument_node=&quot;&quot;&gt;ESO/Babak Tafreshi&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;762&quot;&gt;&lt;span data-dcnode-id=&quot;789&quot; instrument_node=&quot;&quot;&gt;The Milky Way Galaxy is like a hilltop village, according to astronomer Andrew Fox. “At nighttime you can see torches shining in two nearby villages, the Magellanic Clouds, and a more distant one, Andromeda,” he says. “For a long time, those were the only other villages known. Then, one day, someone put two lenses together to make a telescope, looked round, and saw many tiny villages scattered around the surrounding hills and realized that the maps had to be redrawn. That’s the Local Group — it’s where we live.”
&lt;/span&gt;&lt;p data-dcnode-id=&quot;787&quot;&gt;&lt;span data-dcnode-id=&quot;788&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;786&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;784&quot;&gt;&lt;span data-dcnode-id=&quot;785&quot; instrument_node=&quot;&quot;&gt;For most of human history, it was inconceivable that anything existed beyond the Milky Way. After all, the Milky Way is our home galaxy, and its billions of stars provided enough of a nighttime show to fascinate stargazers for millennia. Even now, in the era of space-based telescopes and sensitive cameras, backyard and professional astronomers alike can easily devote lifetimes to studying the Milky Way and its planets, stars, and nebulae.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;783&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;781&quot;&gt;&lt;span data-dcnode-id=&quot;782&quot; instrument_node=&quot;&quot;&gt;But a peek over the celestial fence beyond the Milky Way’s tenuous halo yields a rich view of the nearby universe and galaxy evolution in progress.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;780&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;772&quot;&gt;&lt;span data-dcnode-id=&quot;779&quot; instrument_node=&quot;&quot;&gt;The approximately 85 gravitationally bound galaxies near the Milky Way are collectively known as the Local Group. This population of galaxies, spread over roughly 10 million light-years, encompasses not only the Milky Way and several bright galaxies visible to the naked eye, but also many much smaller galaxies that dominate the Local Group by number. By studying the Local Group, astronomers can observe galaxies in their entirety, no longer confined to understanding a galaxy from the inside out.&lt;/span&gt;&lt;br data-dcnode-id=&quot;778&quot;&gt;&lt;span data-dcnode-id=&quot;777&quot; instrument_node=&quot;&quot;&gt;
&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;776&quot;&gt;&lt;span data-dcnode-id=&quot;775&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;strong data-dcnode-id=&quot;773&quot;&gt;&lt;span data-dcnode-id=&quot;774&quot; instrument_node=&quot;&quot;&gt;Follow the stream&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;771&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;769&quot;&gt;&lt;span data-dcnode-id=&quot;770&quot; instrument_node=&quot;&quot;&gt;Astronomers on Earth have front-row seats to the show of galaxy formation in the Local Group. Comparatively puny galaxies often collide with more massive galaxies, their meager stockpiles of gas and dust being absorbed into the larger system of stars. Dwarf irregular galaxies, as their name&amp;nbsp;suggests, are low in mass and lack geometrical structure. They’re visually unimpressive and resemble jumbles of stars — blink and you’ll miss them — with not a spiral arm in sight. Dwarf irregular galaxies in the Local Group can have just a few thousand stars, which makes them downright pint-sized compared with the Milky Way and its hundreds of billions of stars. Even so, astronomers are keen to better understand these featherweights of the cosmos.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;768&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;766&quot;&gt;&lt;span data-dcnode-id=&quot;767&quot; instrument_node=&quot;&quot;&gt;“By studying the extremes of any population, we learn more about the population as a whole,” explains Marla Geha, an astronomer at Yale University whose research focuses on the origin and evolution of dwarf galaxies.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;765&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;763&quot;&gt;&lt;span data-dcnode-id=&quot;764&quot; instrument_node=&quot;&quot;&gt;The largest and best-known dwarf irregular galaxies in the Local Group are the Large and Small Magellanic Clouds, which look like fuzzy patches in the Southern Hemisphere night sky. The Magellanic Clouds feature prominently in myths: Aboriginal people in Australia tell stories of the Magellanic Clouds alternatively as a man and a woman, hunters, or the ashes of rainbow lorikeets (birds). The Large and Small Magellanic Clouds lie some 160,000 and 200,000 light-years away, respectively, distances slightly greater than the diameter of the Milky Way. Given their relative proximity, each Magellanic Cloud holds the distinction of being one of a smattering of galaxies in which scientists can resolve individual stars.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;761&quot; style=&quot;clear:both;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;segment&quot; data-dcnode-id=&quot;731&quot; style=&quot;&quot;&gt;&lt;div class=&quot;mediaLeft&quot; data-dcnode-id=&quot;751&quot;&gt;&lt;div class=&quot;mediaContainer&quot; data-dcnode-id=&quot;752&quot;&gt;&lt;div data-dcnode-id=&quot;757&quot;&gt;&lt;a class=&quot;cboxElement&quot; data-dcnode-id=&quot;758&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/sitefiles/resources/image.aspx%3Fitem%3D%257B452330F8-9A84-4371-9262-B61731A7A1E5%257D&quot; rev=&quot;colorbox&quot;&gt;&lt;img alt=&quot;ASYLG1215_02&quot; data-dcnode-id=&quot;759&quot; height=&quot;447&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/-/media/Images/Magazine%2520Articles/2015/12/ASYLG1215_02.jpg%3Fmw%3D600&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;755&quot;&gt;&lt;span data-dcnode-id=&quot;756&quot; instrument_node=&quot;&quot;&gt;The Andromeda Galaxy (M31), seen here in ultraviolet light, is the largest galaxy in the Local Group with some 1 trillion stars — roughly twice the population of our own Milky Way.&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;credit&quot; data-dcnode-id=&quot;753&quot;&gt;&lt;span data-dcnode-id=&quot;754&quot; instrument_node=&quot;&quot;&gt;GALEX/NASA/JPL-Caltech&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;733&quot;&gt;&lt;span data-dcnode-id=&quot;750&quot; instrument_node=&quot;&quot;&gt;“Studying the motion and composition of individual stars allows us to build a much more accurate and detailed picture of how a galaxy formed as opposed to studying the combined light from many stars,” Geha says.&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;749&quot;&gt;&lt;span data-dcnode-id=&quot;748&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;746&quot;&gt;&lt;span data-dcnode-id=&quot;747&quot; instrument_node=&quot;&quot;&gt;Hubble Space Telescope images have revealed that the Large Magellanic Cloud is forming stars in dense groups that may be the precursors to globular clusters. Some stars in these groups are thought to weigh as much as 100 Suns; they’re prodigiously bright and emit winds that sculpt nearby gas into bubbles and streamers. These intense star formation sites allow a better understanding of high-mass-star formation, a process common in galaxies that are much farther away than the Local Group.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;745&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;743&quot;&gt;&lt;span data-dcnode-id=&quot;744&quot; instrument_node=&quot;&quot;&gt;The Large and Small Magellanic Clouds are gravitationally bound to the Milky Way, but astronomers have yet to agree whether the galaxies have completed several Milky Way orbits or if they’re plunging into our galaxy’s halo for the first time.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;742&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;740&quot;&gt;&lt;span data-dcnode-id=&quot;741&quot; instrument_node=&quot;&quot;&gt;“I’d say the jury is still out, chiefly because we don’t know the total mass of the Milky Way very well,” says Fox, the Space Telescope Science Institute astronomer who likened the Milky Way to a hilltop village. “This uncertainty means the Milky Way’s gravity is also not precisely known, which directly affects the orbits of the Magellanic Clouds.”&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;739&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;737&quot;&gt;&lt;span data-dcnode-id=&quot;738&quot; instrument_node=&quot;&quot;&gt;Regardless of how many times the Magellanic Clouds have orbited the Milky Way, one fact remains certain: The Milky Way’s gravity is ripping both apart. Fox and his colleagues have shown that the Milky Way is stripping away the gas of the two dwarf galaxies and collecting it in a massive cloud known as the Magellanic Stream. This cloud stretches across one quarter of Earth’s sky. Because gas is necessary to form stars, the Milky Way is collecting star-forming material and depriving the Magellanic Clouds of their stellar fuel.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;736&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;732&quot; style=&quot;clear:both;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;segment&quot; data-dcnode-id=&quot;698&quot; style=&quot;&quot;&gt;&lt;div class=&quot;heroTop&quot; data-dcnode-id=&quot;722&quot;&gt;&lt;div class=&quot;mediaContainer&quot; data-dcnode-id=&quot;723&quot;&gt;&lt;div data-dcnode-id=&quot;728&quot;&gt;&lt;a class=&quot;cboxElement&quot; data-dcnode-id=&quot;729&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/sitefiles/resources/image.aspx%3Fitem%3D%257B6999BDA9-EFC2-4DFC-A260-B4DE76FB8D3D%257D&quot; rev=&quot;colorbox&quot;&gt;&lt;img alt=&quot;ASYLG1215_02b&quot; data-dcnode-id=&quot;730&quot; height=&quot;192&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/-/media/Images/Magazine%2520Articles/2015/12/ASYLG1215_02b.jpg%3Fmw%3D600&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;726&quot;&gt;&lt;span data-dcnode-id=&quot;727&quot; instrument_node=&quot;&quot;&gt;To celebrate the Hubble Space Telescope’s 25th birthday, astronomers created the instrument’s largest image yet thanks to more than 7,000 exposures. This panorama of the Andromeda Galaxy 2.5 million light-years away stretches from our neighbor’s dense central bulge to its sparse outer disk.&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;credit&quot; data-dcnode-id=&quot;724&quot;&gt;&lt;span data-dcnode-id=&quot;725&quot; instrument_node=&quot;&quot;&gt;NASA/ESA/J. Dalcanton, B.F. Williams, and L.C. Johnson (Univ. of Washington)/The PHAT team/R. Gendler&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;700&quot;&gt;&lt;span data-dcnode-id=&quot;721&quot; instrument_node=&quot;&quot;&gt;“There has been a lot of attention in recent years about how much gas there is around galaxies and how that gas enters those galaxies to feed star formation,”&amp;nbsp;says Fox. Observations of the Magellanic Stream afford astronomers a close-up view of gas cycling between galaxies, demonstrating that larger galaxies can act like cannibals and literally consume their smaller companions.&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;720&quot;&gt;&lt;span data-dcnode-id=&quot;719&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;br data-dcnode-id=&quot;718&quot;&gt;&lt;span data-dcnode-id=&quot;717&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;strong data-dcnode-id=&quot;715&quot;&gt;&lt;span data-dcnode-id=&quot;716&quot; instrument_node=&quot;&quot;&gt;Missing metals and mass&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;714&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;712&quot;&gt;&lt;span data-dcnode-id=&quot;713&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;711&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;707&quot;&gt;&lt;span data-dcnode-id=&quot;710&quot; instrument_node=&quot;&quot;&gt;Stars are factories for making metals, which astronomers consider to be any element heavier than helium. Some of the metals that stars produce become part of the nebulae from which later generations of stars are born. Therefore, the prevalence of metals in a galaxy — its metallicity — increases over time, at least for galaxies that are actively forming stars. Larger galaxies contain a higher fraction of metals, on average, than smaller ones.&amp;nbsp;&lt;/span&gt;&lt;br data-dcnode-id=&quot;709&quot;&gt;&lt;span data-dcnode-id=&quot;708&quot; instrument_node=&quot;&quot;&gt;
The most massive galaxies in the Local Group — the Milky Way and Andromeda (M31) — contain the highest fractions of metals, which explains the rings on your fingers, your cellphone, and the spoon you used to stir this morning’s coffee.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;706&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;704&quot;&gt;&lt;span data-dcnode-id=&quot;705&quot; instrument_node=&quot;&quot;&gt;The dwarf irregular galaxies in the Local Group have metallicities that are much lower. Astronomers refer to low-metallicity galaxies as being “chemically pristine” — they are composed almost entirely of hydrogen and helium, just like the universe shortly after the Big Bang. These systems are like time capsules: They let astronomers study what the early universe looked like before stars “polluted” space with metals.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;703&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;701&quot;&gt;&lt;span data-dcnode-id=&quot;702&quot; instrument_node=&quot;&quot;&gt;Researchers discovered one such chemically pristine galaxy in the Local Group using data collected by the Sloan Extension for Galactic Understanding and Exploration (SEGUE), a comprehensive survey of the sky conducted between 2004 and 2008. Astronomers combed through SEGUE data to search for stars that had both similar positions and velocities, hoping to find new galaxies that were much too small and faint to see with current telescopes. In 2009, scientists in the United States and Europe discovered a tiny galaxy in the SEGUE data. The galaxy, which they named Segue 2, orbits the Milky Way but is only 1/500 its size.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;699&quot; style=&quot;clear:both;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;segment&quot; data-dcnode-id=&quot;665&quot; style=&quot;&quot;&gt;&lt;div class=&quot;mediaRight&quot; data-dcnode-id=&quot;689&quot;&gt;&lt;div class=&quot;mediaContainer&quot; data-dcnode-id=&quot;690&quot;&gt;&lt;div data-dcnode-id=&quot;695&quot;&gt;&lt;a class=&quot;cboxElement&quot; data-dcnode-id=&quot;696&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/sitefiles/resources/image.aspx%3Fitem%3D%257B27203A7E-2E05-4AEF-966D-33A7BDCC562C%257D&quot; rev=&quot;colorbox&quot;&gt;&lt;img alt=&quot;ASYLG1215_05&quot; data-dcnode-id=&quot;697&quot; height=&quot;503&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/-/media/Images/Magazine%2520Articles/2015/12/ASYLG1215_05.jpg%3Fmw%3D600&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;693&quot;&gt;&lt;span data-dcnode-id=&quot;694&quot; instrument_node=&quot;&quot;&gt;Andromeda and the Milky Way dominate the Local Group of galaxies, but the Pinwheel (M33) packs a still respectable 40 billion stars, making it the third largest in the neighborhood. It’s also often considered the most distant object visible with the naked eye.&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;credit&quot; data-dcnode-id=&quot;691&quot;&gt;&lt;span data-dcnode-id=&quot;692&quot; instrument_node=&quot;&quot;&gt;ESO&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;667&quot;&gt;&lt;span data-dcnode-id=&quot;688&quot; instrument_node=&quot;&quot;&gt;Since Segue 2 is relatively nearby — 114,000 light-years away, less than the diameter of the Milky Way — astronomers are able to study the prevalence of metals in its resolved stars. In astronomy, as in sports and politics, studying individuals as op-posed to relying on population averages often leads to new insights. Researchers at the University of Michigan and the Uni-versity of California, Irvine, used the 6.5-meter Magellan Telescope in Chile to study the metallicity of Segue 2’s brightest star, a red giant. They found that the star had a surprisingly low metallicity: only 0.1 percent that of the Sun. These measurements&amp;nbsp;suggest that Segue 2 has not experienced much star formation, which other observations confirm.&amp;nbsp;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;686&quot;&gt;&lt;span data-dcnode-id=&quot;687&quot; instrument_node=&quot;&quot;&gt;“Right now, Segue 2 has a few thousand stars, and it took a few hundred million years to form them,” says Evan Kirby, an astronomer at the California Institute of Technology who studies Segue 2. “So that’s an average star formation rate of 0.00001 stars per year, which is pathetic.”&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;685&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;683&quot;&gt;&lt;span data-dcnode-id=&quot;684&quot; instrument_node=&quot;&quot;&gt;Segue 2 is peculiar in another respect: its mass (or lack thereof). Most galaxies contain copious amounts of dark matter, a mysterious substance that interacts gravitationally with other matter but does not emit, reflect, or scatter light. Typical galaxies like the Milky Way have 10 times as much dark matter as normal matter. Less massive dwarf galaxies have relatively more dark matter, up to 1,000 times as much as normal matter. When Kirby and his team first looked at Segue 2, they expected it to also have lots of dark matter. They studied how its stars moved using the Keck II Telescope in Hawaii and inferred that the ratio of dark matter to normal matter in Segue 2 was at most 300 to 1 — far less than predicted.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;682&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;680&quot;&gt;&lt;span data-dcnode-id=&quot;681&quot; instrument_node=&quot;&quot;&gt;“The small ratio potentially indicates that the Milky Way has stripped off some of Segue 2’s dark matter,” Kirby says. The observations revealed that the total mass of Segue 2 — including dark matter — was a puny 200,000 times that of the Sun. That may sound like a lot of mass, but it’s actually 10 million times less massive than the Milky Way.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;679&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;677&quot;&gt;&lt;span data-dcnode-id=&quot;678&quot; instrument_node=&quot;&quot;&gt;Segue 2 is a ladybug to the Milky Way’s Volkswagen Beetle.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;676&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;674&quot;&gt;&lt;span data-dcnode-id=&quot;675&quot; instrument_node=&quot;&quot;&gt;“These systems have all the properties of galaxies but ridiculously few stars. That a galaxy this puny can form at all is a surprise to me,” Geha says.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;673&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;671&quot;&gt;&lt;span data-dcnode-id=&quot;672&quot; instrument_node=&quot;&quot;&gt;And it might not be alone. Astronomers suspect that the Local Group could harbor far more galaxies than the roughly 85 that are currently known. “For every galaxy that we see, there could be a couple hundred that we don’t see,” Kirby says. “To be fair, most of these unseen ‘galaxies’ may not have any stars — just dark matter — which makes it questionable to call them galaxies.”&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;670&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;668&quot;&gt;&lt;span data-dcnode-id=&quot;669&quot; instrument_node=&quot;&quot;&gt;Searches are underway to find such dark- matter-dominated galaxies, and earlier this year a team of astronomers led by Sukanya Chakrabarti at the Rochester Institute of Technology announced four stars possibly belonging to a Local Group galaxy consisting mostly of dark matter.&amp;nbsp;&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;666&quot; style=&quot;clear:both;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;segment&quot; data-dcnode-id=&quot;639&quot; style=&quot;&quot;&gt;&lt;div class=&quot;mediaLeft&quot; data-dcnode-id=&quot;656&quot;&gt;&lt;div class=&quot;mediaContainer&quot; data-dcnode-id=&quot;657&quot;&gt;&lt;div data-dcnode-id=&quot;662&quot;&gt;&lt;a class=&quot;cboxElement&quot; data-dcnode-id=&quot;663&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/sitefiles/resources/image.aspx%3Fitem%3D%257B451F3C0A-E3D8-482E-B753-1EAF7A89165A%257D&quot; rev=&quot;colorbox&quot;&gt;&lt;img alt=&quot;ASYLG1215_04&quot; data-dcnode-id=&quot;664&quot; height=&quot;736&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/-/media/Images/Magazine%2520Articles/2015/12/ASYLG1215_04.jpg%3Fmw%3D600&amp;amp;raw&quot; width=&quot;589&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;660&quot;&gt;&lt;span data-dcnode-id=&quot;661&quot; instrument_node=&quot;&quot;&gt;The Large Magellanic Cloud is close enough for astronomers to resolve individual stars within it, making this dwarf irregular galaxy a rare laboratory to study how galaxies form.&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;credit&quot; data-dcnode-id=&quot;658&quot;&gt;&lt;span data-dcnode-id=&quot;659&quot; instrument_node=&quot;&quot;&gt;NASA/JPL-Caltech/M. Meixner (STScI) &amp;amp; the SAGE Legacy Team &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;641&quot;&gt;&lt;strong data-dcnode-id=&quot;654&quot;&gt;&lt;span data-dcnode-id=&quot;655&quot; instrument_node=&quot;&quot;&gt;Toward the Princess&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;653&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;651&quot;&gt;&lt;span data-dcnode-id=&quot;652&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;650&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;648&quot;&gt;&lt;span data-dcnode-id=&quot;649&quot; instrument_node=&quot;&quot;&gt;The Milky Way’s gravitational entourage — the Magellanic Clouds, Segue 2, and other nearby dwarf irregular galaxies — isn’t unique in the Local Group. The Andromeda Galaxy, some 2.5 million light-years away, has several orbiting satellite galaxies as well. This fact shouldn’t come as a surprise since the Milky Way and M31 are the largest galaxies in the Local Group.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;647&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;645&quot;&gt;&lt;span data-dcnode-id=&quot;646&quot; instrument_node=&quot;&quot;&gt;“As one of the two most massive members of the Local Group, Andromeda drives much of the evolution of the group,” explains Benjamin Williams, an astronomer at the University of Washington who studies stellar populations within nearby galaxies. In fact, M31 shows evidence for even more interactions with its cadre of gravitational groupies than the Milky Way. “It has a more structured stellar halo that is full of streams, indicative of a more violent past,” Williams says. “Its satellite galaxies have much less current star formation, also suggestive of more interactions.”&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;644&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;642&quot;&gt;&lt;span data-dcnode-id=&quot;643&quot; instrument_node=&quot;&quot;&gt;Earlier this year, astronomers at the University of Notre Dame and the Uni-versity of Wisconsin-Madison published the discovery of a massive halo of gas around M31. The halo, which they discovered using Hubble, extends halfway to the Milky Way and contains metals such as carbon, oxygen, and silicon, some of which may have been stripped from satellite galaxies that merged with Andromeda.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;640&quot; style=&quot;clear:both;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;segment&quot; data-dcnode-id=&quot;603&quot; style=&quot;&quot;&gt;&lt;div class=&quot;mediaRight&quot; data-dcnode-id=&quot;630&quot;&gt;&lt;div class=&quot;mediaContainer&quot; data-dcnode-id=&quot;631&quot;&gt;&lt;div data-dcnode-id=&quot;636&quot;&gt;&lt;a class=&quot;cboxElement&quot; data-dcnode-id=&quot;637&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/sitefiles/resources/image.aspx%3Fitem%3D%257BD94076DF-A974-43AA-A8BF-DFE8F450CA48%257D&quot; rev=&quot;colorbox&quot;&gt;&lt;img alt=&quot;ASYLG1215_06&quot; data-dcnode-id=&quot;638&quot; height=&quot;571&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/-/media/Images/Magazine%2520Articles/2015/12/ASYLG1215_06.jpg%3Fmw%3D600&amp;amp;raw&quot; width=&quot;600&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;div class=&quot;caption&quot; data-dcnode-id=&quot;634&quot;&gt;&lt;span data-dcnode-id=&quot;635&quot; instrument_node=&quot;&quot;&gt;Tiny galaxy Segue 2 is one of the strangest neighbors on our cosmic block. Dwarf galaxies typically have many times more dark matter than normal matter, but this one has relatively little — an indication the Milky Way has stripped much of the dark matter away.&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;credit&quot; data-dcnode-id=&quot;632&quot;&gt;&lt;span data-dcnode-id=&quot;633&quot; instrument_node=&quot;&quot;&gt;Garrison-Kimmel, Bullock (UCI)&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;content&quot; data-dcnode-id=&quot;605&quot;&gt;&lt;span data-dcnode-id=&quot;629&quot; instrument_node=&quot;&quot;&gt;Demonstrating that large galaxies consume smaller galaxies is more than just a morbid pursuit, however. “Observing a dwarf galaxy getting stretched out until it disrupts into the smooth outskirts of the Milky Way or Andromeda is to see galaxy growth in action,” Kirby says. Astronomers like Kirby want to understand how galaxies assemble over time into the ones we observe today without having to wait the roughly 5 billion years before the Milky Way and Andromeda collide.&amp;nbsp;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;627&quot;&gt;&lt;span data-dcnode-id=&quot;628&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;626&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;624&quot;&gt;&lt;span data-dcnode-id=&quot;625&quot; instrument_node=&quot;&quot;&gt;“That collision will erase the spiral arms of the Milky Way and Andromeda, and we will be left with one mostly featureless elliptical galaxy,” Kirby says. But the dwarf irregular galaxies in the Local Group aren’t destined for such drastic collisions. “Most of the dwarf irregulars will continue orbiting their larger hosts — even after the big collision — and their stellar populations will remain unchanged.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;621&quot;&gt;&lt;span data-dcnode-id=&quot;622&quot; instrument_node=&quot;&quot;&gt;When the Milky Way and Andromeda do finally collide, the supermassive black hole at the center of each galaxy will orbit around each other, releasing copious amounts of energy. Supermassive black holes are relatively rare in the Local Group, however: Out of the roughly 85 galaxies, only three — the Milky Way, Andromeda, and a&amp;nbsp;dwarf elliptical satellite of Andromeda known as M32 — show evidence for such a monster. It’s no coincidence that these three galaxies are also among the most massive systems in the Local Group. “The smallest galaxies with known central black holes typically have stellar masses of about 1 billion solar masses,” explains Kirby. “Most of the dwarf irregulars in the Local Group top out at 100 million solar masses, so there is not yet any evidence for supermassive black holes in these galaxies.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;618&quot;&gt;&lt;span data-dcnode-id=&quot;619&quot; instrument_node=&quot;&quot;&gt;Cosmic cannibalism appears to be ubiquitous around large galaxies in the Local Group. Even so, some galaxies seem&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;617&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;615&quot;&gt;&lt;span data-dcnode-id=&quot;616&quot; instrument_node=&quot;&quot;&gt;to be remarkably immune to it. The spiral galaxy M33, also known as the Pinwheel Galaxy, is the third-largest galaxy in the Local Group after the Milky Way and M31. It orbits Andromeda yet possesses no central bulge of stars, which is often a telltale sign of previous galactic mergers. Furthermore, its 40 billion stars are arranged in a spiral, a fragile geometry that would have been destroyed by any significant gravitational interactions.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;614&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;612&quot;&gt;&lt;span data-dcnode-id=&quot;613&quot; instrument_node=&quot;&quot;&gt;NGC 604, an enormous star-forming region in M33, is evidence that the galaxy contains copious amounts of gas. If the Pinwheel’s gas reservoirs were somehow stripped away by Andromeda at some point in the past, the gas must have been replenished before NGC 604’s first stars began to form several million years ago.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;609&quot;&gt;&lt;span data-dcnode-id=&quot;610&quot; instrument_node=&quot;&quot;&gt;“M33 gives us a nearby subject for learning about disk formation and evolution in a galaxy that experiences little harassment from satellites,” Williams says.&amp;nbsp;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;606&quot;&gt;&lt;span data-dcnode-id=&quot;607&quot; instrument_node=&quot;&quot;&gt;Far away from the Milky Way and Andromeda, the Local Group’s remaining galaxies exist in relative solitude. They’re the last torches before reaching other distant galaxy clusters, which themselves are part of the larger Virgo Supercluster. Astronomers can now study galaxies in our home supercluster in intricate detail using advanced telescopes and cameras, but the hilltop villages of the Local Group still beckon like beacons.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;604&quot; style=&quot;clear:both;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;commentcounts&quot; data-dcnode-id=&quot;595&quot;&gt;&lt;div class=&quot;bubble ptSans&quot; data-dcnode-id=&quot;600&quot;&gt;&lt;span data-dcnode-id=&quot;601&quot; instrument_node=&quot;&quot;&gt;0&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;data&quot; data-dcnode-id=&quot;596&quot;&gt;&lt;h4 class=&quot;ptSans&quot; data-dcnode-id=&quot;598&quot;&gt;&lt;span data-dcnode-id=&quot;599&quot; instrument_node=&quot;&quot;&gt;JOIN THE DISCUSSION&lt;/span&gt;&lt;/h4&gt;&lt;span data-dcnode-id=&quot;597&quot; instrument_node=&quot;&quot;&gt;
          Read and share your comments on this article
        &lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;relatedArticles&quot; data-dcnode-id=&quot;500&quot;&gt;&lt;h3 class=&quot;topBorder&quot; data-dcnode-id=&quot;593&quot;&gt;&lt;span data-dcnode-id=&quot;594&quot; instrument_node=&quot;&quot;&gt;RELATED ARTICLES&lt;/span&gt;&lt;/h3&gt;&lt;div class=&quot;sliderContainer&quot; data-dcnode-id=&quot;501&quot;&gt;&lt;div class=&quot;center&quot; data-dcnode-id=&quot;508&quot;&gt;&lt;div class=&quot;slider&quot; data-dcnode-id=&quot;509&quot;&gt;&lt;div class=&quot;itemContainer&quot; data-dcnode-id=&quot;510&quot;&gt;&lt;div class=&quot;item&quot; data-dcnode-id=&quot;585&quot;&gt;&lt;div class=&quot;data&quot; data-dcnode-id=&quot;586&quot;&gt;&lt;div data-dcnode-id=&quot;590&quot;&gt;&lt;a data-dcnode-id=&quot;591&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/magazine/greatest-mysteries/2019/07/49-how-many-galaxies-are-in-our-group&quot;&gt;&lt;img alt=&quot;&quot; data-dcnode-id=&quot;592&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/-/media/F58BF6BAC3AE4B9D92561BC2ADBA0C57.jpg%3Fmw%3D180&amp;amp;raw&quot;&gt;&lt;/a&gt;&lt;/div&gt;&lt;div data-dcnode-id=&quot;587&quot;&gt;&lt;a data-dcnode-id=&quot;588&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/magazine/greatest-mysteries/2019/07/49-how-many-galaxies-are-in-our-group&quot;&gt;&lt;span data-dcnode-id=&quot;589&quot; instrument_node=&quot;&quot;&gt;How Many Galaxies are in Our Group?&lt;/span&gt;&lt;/a&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;item&quot; data-dcnode-id=&quot;577&quot;&gt;&lt;div class=&quot;data&quot; data-dcnode-id=&quot;578&quot;&gt;&lt;div data-dcnode-id=&quot;582&quot;&gt;&lt;a data-dcnode-id=&quot;583&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//s7.addthis.com/news/2015/01/study-of-andromeda
