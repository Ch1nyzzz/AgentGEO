We live in a time when common sense has become quite rare. Likewise, the voice of reason has fled humankind. For these reasons the following essay will be quite difficult for many to understand or believe or imbibe.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;3356&quot;&gt;&lt;p data-dcnode-id=&quot;3357&quot;&gt;&lt;strong data-dcnode-id=&quot;3362&quot;&gt;&lt;span data-dcnode-id=&quot;3363&quot; instrument_node=&quot;&quot;&gt;CONTEMPLATION:&lt;/span&gt;&lt;/strong&gt;&lt;br data-dcnode-id=&quot;3361&quot;&gt;&lt;span data-dcnode-id=&quot;3360&quot; instrument_node=&quot;&quot;&gt;
If you were running the world during these tumultuous times, and you knew that events were on the horizon which would forever alter the entire planetary civilization, would you use the global mainstream media to tell everyone?&lt;/span&gt;&lt;br data-dcnode-id=&quot;3359&quot;&gt;&lt;span data-dcnode-id=&quot;3358&quot; instrument_node=&quot;&quot;&gt;
If those earth-shattering events were as unstoppable as they were fateful, would you disseminate this information?&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;3355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3343&quot;&gt;&lt;span data-dcnode-id=&quot;3354&quot; instrument_node=&quot;&quot;&gt;If your answer is “Yes”, what will the 7 billion plus people who reside on Planet Earth do the next day? That is, after you tell them that their world is about to come to an end.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3353&quot;&gt;&lt;span data-dcnode-id=&quot;3352&quot; instrument_node=&quot;&quot;&gt;

Will they continue to support the &lt;/span&gt;&lt;em data-dcnode-id=&quot;3347&quot;&gt;&lt;a data-dcnode-id=&quot;3348&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/%3Fp%3D3765&quot;&gt;&lt;span data-dcnode-id=&quot;3349&quot; instrument_node=&quot;&quot;&gt;Consumer Society&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3346&quot; instrument_node=&quot;&quot;&gt;?&lt;/span&gt;&lt;br data-dcnode-id=&quot;3345&quot;&gt;&lt;span data-dcnode-id=&quot;3344&quot; instrument_node=&quot;&quot;&gt;
Will many of them even want to get out of bed again after they hear what is coming?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3342&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3336&quot;&gt;&lt;span data-dcnode-id=&quot;3341&quot; instrument_node=&quot;&quot;&gt;Herein lies the challenge that is faced by the &lt;/span&gt;&lt;em data-dcnode-id=&quot;3338&quot;&gt;&lt;a data-dcnode-id=&quot;3339&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/%3Fp%3D2328&quot;&gt;&lt;span data-dcnode-id=&quot;3340&quot; instrument_node=&quot;&quot;&gt;World Shadow Government&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;3337&quot; instrument_node=&quot;&quot;&gt; (WSG).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3335&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3321&quot;&gt;&lt;span data-dcnode-id=&quot;3334&quot; instrument_node=&quot;&quot;&gt;Bear in mind that they know exactly what is around the corner. Their strategically-located observatories and high-powered telescopes give them access to scientific data and astronomical phenomena which is so compelling they feel they have no alternative but to:&lt;/span&gt;&lt;br data-dcnode-id=&quot;3333&quot;&gt;&lt;span data-dcnode-id=&quot;3332&quot; instrument_node=&quot;&quot;&gt;
• distract us&lt;/span&gt;&lt;br data-dcnode-id=&quot;3331&quot;&gt;&lt;span data-dcnode-id=&quot;3330&quot; instrument_node=&quot;&quot;&gt;
• deceive us&lt;/span&gt;&lt;br data-dcnode-id=&quot;3329&quot;&gt;&lt;span data-dcnode-id=&quot;3328&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;a data-dcnode-id=&quot;3324&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/planetx-2007-08b1.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;alignright size-full wp-image-5163&quot; data-dcnode-id=&quot;3325&quot; height=&quot;387&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 492px) 100vw, 492px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/planetx-2007-08b1.jpg&amp;amp;raw&quot; srcset=&quot;https://cosmicconvergence.org/wp-content/uploads/2013/10/planetx-2007-08b1.jpg 492w, https://cosmicconvergence.org/wp-content/uploads/2013/10/planetx-2007-08b1-300x235.jpg 300w&quot; title=&quot;planetx-2007-08b&quot; width=&quot;492&quot;&gt;&lt;/a&gt;&lt;br data-dcnode-id=&quot;3323&quot;&gt;&lt;span data-dcnode-id=&quot;3322&quot; instrument_node=&quot;&quot;&gt;
Remember, there is one thing — more than anything else — which the WSG fears.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;3320&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;3308&quot;&gt;&lt;strong data-dcnode-id=&quot;3309&quot;&gt;&lt;em data-dcnode-id=&quot;3310&quot;&gt;&lt;span data-dcnode-id=&quot;3319&quot; instrument_node=&quot;&quot;&gt;That is uncontrolled chaos.&lt;/span&gt;&lt;br data-dcnode-id=&quot;3318&quot;&gt;&lt;span data-dcnode-id=&quot;3317&quot; instrument_node=&quot;&quot;&gt;

quot; instrument_node=&quot;&quot;&gt;Hercolubus is coming. — Carlos Muñoz Ferrada ***************&lt;/span&gt;&lt;/strong&gt;&lt;p data-dcnode-id=&quot;2662&quot;&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2661&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2659&quot;&gt;&lt;span data-dcnode-id=&quot;2660&quot; instrument_node=&quot;&quot;&gt;We are not suggesting that all of the scientific predictions of Carlos Muñoz Ferrada* are entirely accurate. Prophecies of this nature are rarely perfect. However, what this highly intuitive and gifted astronomer and seismologist has told us cannot be ignored.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2658&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2652&quot;&gt;&lt;em data-dcnode-id=&quot;2653&quot;&gt;&lt;span data-dcnode-id=&quot;2657&quot; instrument_node=&quot;&quot;&gt;*Carlos Muñoz Ferrada, predicted with extraordinary accuracy numerous earthquakes in South America during the last century. He did this by making direct correlations between specific astronomical phenomena and various catastrophic earthquakes and volcanic eruptions. His most significant prediction regards the “future arrival of a great &lt;/span&gt;&lt;em data-dcnode-id=&quot;2655&quot;&gt;&lt;span data-dcnode-id=&quot;2656&quot; instrument_node=&quot;&quot;&gt;Comet-Planet”&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2654&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2651&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2646&quot;&gt;&lt;span data-dcnode-id=&quot;2650&quot; instrument_node=&quot;&quot;&gt;For those who did not watch the preceding video, Ferrada calls it a &lt;/span&gt;&lt;em data-dcnode-id=&quot;2648&quot;&gt;&lt;span data-dcnode-id=&quot;2649&quot; instrument_node=&quot;&quot;&gt;Comet-Planet&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2647&quot; instrument_node=&quot;&quot;&gt; because it has the size of a planet, and the speed and elliptical orbit of a comet.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2645&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2643&quot;&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt;Whether you believe or not what this video portrays is not essential. What matters is that there have been numerous prognostications of this nature over millennia which simply can no longer be ignored in the face of such pervasive and compelling evidence.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2642&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2640&quot;&gt;&lt;span data-dcnode-id=&quot;2641&quot; instrument_node=&quot;&quot;&gt;What kind of evidence? Before we go there, it’s important to point out that Latin America has produced other gifted visionaries just like Carlos Muñoz Ferrada. Here are three of those individuals who have independently referred to the future happenings delineated by Carlos Ferrada.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2639&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2637&quot;&gt;&lt;span data-dcnode-id=&quot;2638&quot; instrument_node=&quot;&quot;&gt;(1) V.M. Rabolu (1926 – 2000) was born in Tolima, Colombia.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2636&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2623&quot;&gt;&lt;p data-dcnode-id=&quot;2634&quot;&gt;&lt;span data-dcnode-id=&quot;2635&quot; instrument_node=&quot;&quot;&gt;“In 1998 he wrote “Hercolubus or Red Planet”. Based on his direct and conscious experience, V.M. Rabolu describes the terrible events that will happen on our planet in the short term and explains the path that the human being can follow in order to achieve a deep transformation.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2633&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2631&quot;&gt;&lt;span data-dcnode-id=&quot;2632&quot; instrument_node=&quot;&quot;&gt;“Hercolubus, a planet so called by the sages of antiquity, is approaching our Solar System and is the cause of great concern for those who know about such cosmic phenomena. In our former encounter, Hercolubus put an end to the Atlantean civilization. These facts are duly related through all the “Universal Floods” of different religions and cultures.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2630&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2612&quot;&gt;&lt;p data-dcnode-id=&quot;2613&quot;&gt;&lt;span data-dcnode-id=&quot;2618&quot; instrument_node=&quot;&quot;&gt;“Benjamin Solari Parravicini, the great Argentinean prophet, who was nicknamed “the South American Nostradamus”, wrote some decades ago: “The hour of hours will arrive and in its darkness the crash of the big planet will be received. The Earth will be reversed. Everything will fall”.&lt;/span&gt;&lt;br data-dcnode-id=&quot;2617&quot;&gt;&lt;span data-dcnode-id=&quot;2616&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;2609&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;(3) Samael Aun Weor (March 6, 1917 – December 24, 1977) was born as Victor Manuel Gómez Rodriguez in Bogotá, Colombia&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2601&quot;&gt;&lt;p data-dcnode-id=&quot;2602&quot;&gt;&lt;span data-dcnode-id=&quot;2607&quot; instrument_node=&quot;&quot;&gt;“Samael Aun Weor, the great Gnostic master who gave numerous lectures in Mexico during the 70s. He talked about Hercolubus and explained that, in the times of the end, it would approach the Earth. Due to its great electromagnetic power, he said it would destabilize the Earth’s crust causing huge earthquakes, tidal waves, volcanic eruptions and natural disasters. Hercolubus would have approached our solar system in former occasions to unleash cataclysms that wiped out the Lemurian and Atlantean civilizations. Now, he said, it would come again to end our civilization and allow a new era to begin.”&lt;/span&gt;&lt;br data-dcnode-id=&quot;2606&quot;&gt;&lt;span data-dcnode-id=&quot;2605&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;wp-caption aligncenter&quot; data-dcnode-id=&quot;2595&quot; id=&quot;attachment_4951&quot; style=&quot;width: 650px&quot;&gt;&lt;a data-dcnode-id=&quot;2598&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/6471758_orig.jpg&quot;&gt;&lt;img alt=&quot;&quot; aria-describedby=&quot;caption-attachment-4951&quot; class=&quot;size-full wp-image-4951&quot; data-dcnode-id=&quot;2599&quot; height=&quot;426&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 640px) 100vw, 640px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/6471758_orig.jpg&amp;amp;raw&quot; srcset=&quot;https://cosmicconvergence.org/wp-content/uploads/2013/10/6471758_orig.jpg 640w, https://cosmicconvergence.org/wp-content/uploads/2013/10/6471758_orig-300x199.jpg 300w&quot; title=&quot;6471758_orig&quot; width=&quot;640&quot;&gt;&lt;/a&gt;&lt;p class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;2596&quot; id=&quot;caption-attachment-4951&quot;&gt;&lt;span data-dcnode-id=&quot;2597&quot; instrument_node=&quot;&quot;&gt;The Vatican Advanced Technology Telescope is part of the Mount Graham International Observatory situated on Mount Graham in southeast Arizona, and is operated by the Vatican Observatory, one of the oldest astronomical research institutions in the world.” (Per Wikipedia)&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2594&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2591&quot;&gt;&lt;strong data-dcnode-id=&quot;2592&quot;&gt;&lt;span data-dcnode-id=&quot;2593&quot; instrument_node=&quot;&quot;&gt;Why else do you think the Vatican owns an observatory outside of Safford, Arizona?&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2590&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2588&quot;&gt;&lt;span data-dcnode-id=&quot;2589&quot; instrument_node=&quot;&quot;&gt;Not only does the Vatican operate the Vatican Advanced Technology Telescope (VATT) at Mount Graham International Observatory (MGIO) located in southeast Arizona’s Pinaleno Mountains, they share the same facility with the The Large Binocular Telescope Observatory.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2587&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2580&quot;&gt;&lt;em data-dcnode-id=&quot;2582&quot;&gt;&lt;span data-dcnode-id=&quot;2586&quot; instrument_node=&quot;&quot;&gt;“The Vatican Advanced Technology Telescope, aka the VATT, is a 1.8 meter Gregorian telescope observing in the optical and &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2584&quot;&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt;infrared&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2583&quot; instrument_node=&quot;&quot;&gt;.”&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2581&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; Why infrared? &amp;nbsp;Because Planet X is often referred to as a brown dwarf which has cooled down so much that it can only be detected in this range of light frequency.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2579&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2572&quot;&gt;&lt;p data-dcnode-id=&quot;2573&quot;&gt;&lt;span data-dcnode-id=&quot;2578&quot; instrument_node=&quot;&quot;&gt;“Construction of MGIO began in 1989. MGIO currently operates and maintains facilities for three scientific organizations. The first two telescopes, the Vatican Advanced Technology Telescope and the Heinrich Hertz Submillimeter Telescope began operations in 1993. The Large Binocular Telescope, one of the world’s largest and most powerful telescopes, began operations using mirrors independently in 2004, with joint operations between the two mirrors beginning in 2008.”&lt;/span&gt;&lt;br data-dcnode-id=&quot;2577&quot;&gt;&lt;span data-dcnode-id=&quot;2576&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;em data-dcnode-id=&quot;2574&quot;&gt;&lt;span data-dcnode-id=&quot;2575&quot; instrument_node=&quot;&quot;&gt;(Per Wikipedia – Mount Graham International Observatory)&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2571&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2564&quot;&gt;&lt;a data-dcnode-id=&quot;2569&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.youtube.com/watch%3Fv%3DudCpmY5bOnM&quot;&gt;&lt;span data-dcnode-id=&quot;2570&quot; instrument_node=&quot;&quot;&gt;The Vatican Secret Archives&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2568&quot; instrument_node=&quot;&quot;&gt; has probably more volumes of original documents in the form of scriptural treatises, as well as historical records produced by the ancients, than any other library on Earth. &amp;nbsp;The Roman Catholic Church is further informed about the future of humanity from the numerous Marian apparitions which have occurred around the world over the past two hundred years. It is a well known fact in certain circles (e.g. Curia and Magisterium) that many of the prophecies, which were given to mostly children, have never been released by the Church hierarchy &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2566&quot;&gt;&lt;span data-dcnode-id=&quot;2567&quot; instrument_node=&quot;&quot;&gt;because of the dire content&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2565&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2563&quot; instrument_node=&quot;&quot;&gt;

to&amp;nbsp;&amp;nbsp;“&lt;/span&gt;&lt;em data-dcnode-id=&quot;2544&quot;&gt;&lt;a data-dcnode-id=&quot;2545&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//worldnews.nbcnews.com/_news/2013/03/10/17238040-are-cardinals-electing-the-last-pope-if-you-believe-nostradamus&quot;&gt;&lt;span data-dcnode-id=&quot;2546&quot; instrument_node=&quot;&quot;&gt;flee Rome in December when the great comet is seen in the daytime.&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2543&quot; instrument_node=&quot;&quot;&gt;”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2541&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;2530&quot;&gt;&lt;span data-dcnode-id=&quot;2534&quot; instrument_node=&quot;&quot;&gt;Medjugorje is just one of the latest and most famous series of Marian prophecy which clearly indicates that “&lt;/span&gt;&lt;a data-dcnode-id=&quot;2532&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/%3Fp%3D13&quot;&gt;&lt;span data-dcnode-id=&quot;2533&quot; instrument_node=&quot;&quot;&gt;Huge Changes Are Coming To Planet Earth&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2531&quot; instrument_node=&quot;&quot;&gt;“. &amp;nbsp; Whenever these predictions veer into earth change territory, they always speak of massive, unprecedented and cataclysmic events overtaking the entire planetary realm. &amp;nbsp;No location is spared, except those which are preordained as safe havens for the protected portion of humanity that is to be safeguarded.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2529&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2518&quot;&gt;&lt;span data-dcnode-id=&quot;2528&quot; instrument_node=&quot;&quot;&gt;The Marian apparitions at &lt;/span&gt;&lt;a data-dcnode-id=&quot;2526&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.youtube.com/watch%3Fv%3DQCDDtD-mZYk&quot;&gt;&lt;span data-dcnode-id=&quot;2527&quot; instrument_node=&quot;&quot;&gt;Garabandal&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2525&quot; instrument_node=&quot;&quot;&gt; also imparted prophecy which used similar language about a warning to all of humanity, as well as a chastisement which would humble every human being. &amp;nbsp;So have many other lesser known appearances of the Blessed Virgin Mary such as those known as the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2523&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.tldm.org/Bayside/Messages/bm760928.htm&quot;&gt;&lt;span data-dcnode-id=&quot;2524&quot; instrument_node=&quot;&quot;&gt;Bayside Prophecies&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2522&quot; instrument_node=&quot;&quot;&gt;. &amp;nbsp;Even the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2520&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/%3Fp%3D5057&quot;&gt;&lt;span data-dcnode-id=&quot;2521&quot; instrument_node=&quot;&quot;&gt;Third Secret&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2519&quot; instrument_node=&quot;&quot;&gt; of Fatima is said to concern the end times, which is why it was never officially released by the Vatican.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2517&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2504&quot;&gt;&lt;span data-dcnode-id=&quot;2516&quot; instrument_node=&quot;&quot;&gt;The primary agent of such massive, global change is usually referred to as a shift, specifically an axis pole shift where the Earth actually shifts on its axis by a number of degrees. In her book &lt;/span&gt;&lt;em data-dcnode-id=&quot;2512&quot;&gt;&lt;a data-dcnode-id=&quot;2514&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//allisonwaldock.com.au/marys-message-to-the-world&quot;&gt;&lt;span data-dcnode-id=&quot;2515&quot; instrument_node=&quot;&quot;&gt;Mary’s Message to the World&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2513&quot; instrument_node=&quot;&quot;&gt;,&amp;nbsp;&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2511&quot; instrument_node=&quot;&quot;&gt; &lt;/span&gt;&lt;a data-dcnode-id=&quot;2509&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.ditrianum.org/english/Articles/Prophecies/0007.htm&quot;&gt;&lt;span data-dcnode-id=&quot;2510&quot; instrument_node=&quot;&quot;&gt;Annie Kirkwood&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2508&quot; instrument_node=&quot;&quot;&gt; makes it clear that Mary speaks about the “&lt;/span&gt;&lt;a data-dcnode-id=&quot;2506&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.philstar.com/education-and-home/471662/mother-marys-planet-earth-predictions-all-religions&quot;&gt;&lt;span data-dcnode-id=&quot;2507&quot; instrument_node=&quot;&quot;&gt;turning of the earth”&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2505&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2503&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2496&quot;&gt;&lt;strong data-dcnode-id=&quot;2497&quot;&gt;&lt;span data-dcnode-id=&quot;2502&quot; instrument_node=&quot;&quot;&gt;An axis&amp;nbsp;&lt;/span&gt;&lt;em data-dcnode-id=&quot;2499&quot;&gt;&lt;a data-dcnode-id=&quot;2500&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//en.wikipedia.org/wiki/Pole_shift_hypothesis&quot;&gt;&lt;span data-dcnode-id=&quot;2501&quot; instrument_node=&quot;&quot;&gt;Pole Shift&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2498&quot; instrument_node=&quot;&quot;&gt; is the only planet-wide geophysical event which can generate so many predicted changes.&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2495&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2485&quot;&gt;&lt;span data-dcnode-id=&quot;2494&quot; instrument_node=&quot;&quot;&gt;The historical record, both geological and archaeological, is replete with hard evidence of periodic planetary catastrophism. Our blue orb has, in fact, experienced global land mass rearrangements at the closing of eras and conclusion of epochs since the beginning of time. As we approach the current denouement of the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2491&quot;&gt;&lt;a data-dcnode-id=&quot;2492&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.mother-god.com/kali-yuga.html&quot;&gt;&lt;span data-dcnode-id=&quot;2493&quot; instrument_node=&quot;&quot;&gt;Kali Yuga&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2490&quot; instrument_node=&quot;&quot;&gt; (Age of Conflict), also known as the &lt;/span&gt;&lt;em data-dcnode-id=&quot;2487&quot;&gt;&lt;a data-dcnode-id=&quot;2488&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/%3Fp%3D1463&quot;&gt;&lt;span data-dcnode-id=&quot;2489&quot; instrument_node=&quot;&quot;&gt;Iron Age&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2486&quot; instrument_node=&quot;&quot;&gt;, it is certain that Mother Earth will once again turn on her axis. So that the old lands can be rejuvenated and refreshed, this is but a necessity. So that the new lands can emerge to sustain the new race of humanity is likewise an essential byproduct of axial pole shifts.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2484&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2482&quot;&gt;&lt;span data-dcnode-id=&quot;2483&quot; instrument_node=&quot;&quot;&gt;Therefore, the real $64,000 question is just what kind of celestial event would provide the requisite interplanetary dynamic to precipitate a shifting of the Earth on its axis?&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2481&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2474&quot;&gt;&lt;span data-dcnode-id=&quot;2480&quot; instrument_node=&quot;&quot;&gt;Barring an invisible form of deus ex machina to produce such an outcome, only a celestial intruder of great order would possess all “the right stuff” to cause the Earth to literally roll over … and stay there as the new normal. Hence, we see more weight than ever afforded to the various schools of thought which promote a “&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2476&quot; style=&quot;line-height: 24px;&quot;&gt;&lt;em data-dcnode-id=&quot;2477&quot;&gt;&lt;a data-dcnode-id=&quot;2478&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/%3Fattachment_id%3D5019&quot; style=&quot;color: #ff4b33;&quot;&gt;&lt;span data-dcnode-id=&quot;2479&quot; instrument_node=&quot;&quot;&gt;Planet X&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2475&quot; instrument_node=&quot;&quot;&gt;”.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2473&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2470&quot;&gt;&lt;a data-dcnode-id=&quot;2471&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/Planet-X.png&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-4954&quot; data-dcnode-id=&quot;2472&quot; height=&quot;472&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 622px) 100vw, 622px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/Planet-X.png&amp;amp;raw&quot; srcset=&quot;https://cosmicconvergence.org/wp-content/uploads/2013/10/Planet-X.png 622w, https://cosmicconvergence.org/wp-content/uploads/2013/10/Planet-X-300x227.png 300w&quot; title=&quot;Planet-X&quot; width=&quot;622&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2469&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2462&quot;&gt;&lt;strong data-dcnode-id=&quot;2463&quot;&gt;&lt;span data-dcnode-id=&quot;2468&quot; instrument_node=&quot;&quot;&gt;Planet X ~ Hercolubus ~ Nibiru ~ Wormwood ~ 10th Planet ~ Red Planet&lt;/span&gt;&lt;strong data-dcnode-id=&quot;2465&quot;&gt;&lt;br data-dcnode-id=&quot;2467&quot;&gt;&lt;span data-dcnode-id=&quot;2466&quot; instrument_node=&quot;&quot;&gt;
The Destroyer ~&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2464&quot; instrument_node=&quot;&quot;&gt;Nemesis ~ Marduk ~ Tyche ~ Red Star Kachina ~ Barnard I&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2461&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2456&quot;&gt;&lt;span data-dcnode-id=&quot;2460&quot; instrument_node=&quot;&quot;&gt;All of these names have been proffered as candidates for the heavenly body which may be responsible for both past and future &lt;/span&gt;&lt;a data-dcnode-id=&quot;2458&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.catastrophism.net/&quot;&gt;&lt;span data-dcnode-id=&quot;2459&quot; instrument_node=&quot;&quot;&gt;catastrophism&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2457&quot; instrument_node=&quot;&quot;&gt; on Earth. That’s not to say that there are not other diverse possibilities when considering the various apocalyptic scenarios which the planet has been proven to undergo. However, asteroids and large meteors, gamma bursts and supernovas each have their obvious deficiencies when trying to explain an event like a pole shift.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2455&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2447&quot;&gt;&lt;span data-dcnode-id=&quot;2454&quot; instrument_node=&quot;&quot;&gt;Of all the theories which abound, and there are many on the internet, the narrative surrounding Hercolubus seems to be the most plausible. It also appears to be the one which forms the basis for all the others. Even the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2452&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.bibliotecapleyades.net/esp_hercolobus.htm&quot;&gt;&lt;span data-dcnode-id=&quot;2453&quot; instrument_node=&quot;&quot;&gt;Nibiru&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2451&quot; instrument_node=&quot;&quot;&gt; story, and their &lt;/span&gt;&lt;a data-dcnode-id=&quot;2449&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//en.wikipedia.org/wiki/Anunnaki&quot;&gt;&lt;span data-dcnode-id=&quot;2450&quot; instrument_node=&quot;&quot;&gt;Annunaki&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2448&quot; instrument_node=&quot;&quot;&gt; travelers, seem to have originated from the Hercolubus version of earth-shaking events.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2446&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2441&quot;&gt;&lt;span data-dcnode-id=&quot;2445&quot; instrument_node=&quot;&quot;&gt;It’s true the Sun has been going through some major changes over the past few decades. We wonder if its new location in the galaxy vis-à-vis the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2443&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//en.wikipedia.org/wiki/Galactic_Center&quot;&gt;&lt;span data-dcnode-id=&quot;2444&quot; instrument_node=&quot;&quot;&gt;Galactic Center&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2442&quot; instrument_node=&quot;&quot;&gt; is enough to bring about such a profound and fundamental transformation. We also wonder if there are other galactic happenings – both seen and unseen – which may be triggering and sustaining Sol’s new behavior.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2440&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2438&quot;&gt;&lt;span data-dcnode-id=&quot;2439&quot; instrument_node=&quot;&quot;&gt;As the Sun ages, it is quite possible that it is simply entering a new phase of existence, not too unlike a teenager growing into a young adult. However, there does exist an overwhelming body of evidence which points directly to the influence of sizable planetary sphere within the outer reaches of our Solar System. &amp;nbsp;This would also explain many of the other recent and radical changes undergone by all the other planets.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2437&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2431&quot;&gt;&lt;span data-dcnode-id=&quot;2436&quot; instrument_node=&quot;&quot;&gt;Especially one with an immense gravitational field would be required for the axis shift in question to occur. &amp;nbsp;Such a celestial body would also have to possess other extraordinary properties and unique features in order to effectuate a &lt;/span&gt;&lt;em data-dcnode-id=&quot;2433&quot;&gt;&lt;a data-dcnode-id=&quot;2434&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.youtube.com/watch%3Fv%3D1R8giRIyVvw&quot;&gt;&lt;span data-dcnode-id=&quot;2435&quot; instrument_node=&quot;&quot;&gt;Pole Shift&lt;/span&gt;&lt;/a&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2432&quot; instrument_node=&quot;&quot;&gt;, as is often foretold. &amp;nbsp;In other words it appears to have it’s own type of ‘intelligence’.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2430&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2427&quot;&gt;&lt;strong data-dcnode-id=&quot;2428&quot;&gt;&lt;span data-dcnode-id=&quot;2429&quot; instrument_node=&quot;&quot;&gt;So now the question is: Where is it?&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2426&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2421&quot;&gt;&lt;span data-dcnode-id=&quot;2425&quot; instrument_node=&quot;&quot;&gt;Just where is the heavenly body which may be careening toward our Solar System at this very moment? Dr. Gerry Neugebauer, IRAS chief scientist for California’s Jet Propulsion Laboratory and director of the Palomar Observatory for the California Institute of Technology rendered an account which ended up in the &lt;/span&gt;&lt;a data-dcnode-id=&quot;2423&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/%3Fattachment_id%3D5012&quot;&gt;&lt;span data-dcnode-id=&quot;2424&quot; instrument_node=&quot;&quot;&gt;Washington Post&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2422&quot; instrument_node=&quot;&quot;&gt; back in 1983.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2420&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2410&quot;&gt;&lt;p data-dcnode-id=&quot;2418&quot;&gt;&lt;span data-dcnode-id=&quot;2419&quot; instrument_node=&quot;&quot;&gt;“A heavenly body possibly as large as the giant planet Jupiter and possibly so close to Earth that it would be part of this solar system has been found in the direction of the constellation Orion by an orbiting telescope aboard the U.S. infrared astronomical satellite.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2417&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2414&quot;&gt;&lt;a data-dcnode-id=&quot;2415&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/post.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-5154&quot; data-dcnode-id=&quot;2416&quot; height=&quot;960&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 1000px) 100vw, 1000px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/post.jpg&amp;amp;raw&quot; srcset=&quot;https://cosmicconvergence.org/wp-content/uploads/2013/10/post.jpg 1000w, https://cosmicconvergence.org/wp-content/uploads/2013/10/post-300x288.jpg 300w&quot; title=&quot;post&quot; width=&quot;1000&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2413&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2411&quot;&gt;&lt;span data-dcnode-id=&quot;2412&quot; instrument_node=&quot;&quot;&gt;“So mysterious is the object that astronomers do not know if it is a planet, a giant comet, a nearby “protostar” that never got hot enough to become a star, a distant galaxy so young that it is still in the process of forming its first stars or a galaxy so shrouded in dust that none of the light cast by its stars ever gets through. “All I can tell you is that we don’t know what it is,” Dr. Gerry Neugebauer … said in an interview.”&lt;/span&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2409&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2401&quot;&gt;&lt;span data-dcnode-id=&quot;2408&quot; instrument_node=&quot;&quot;&gt;Another noted astronomer &lt;/span&gt;&lt;a data-dcnode-id=&quot;2406&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//yowusa.com/planetx/2008/planetx-2008-05b/1.shtml&quot;&gt;&lt;span data-dcnode-id=&quot;2407&quot; instrument_node=&quot;&quot;&gt;Dr. Robert S. Harrington&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2405&quot; instrument_node=&quot;&quot;&gt;, was convinced of the existence of a “&lt;/span&gt;&lt;a data-dcnode-id=&quot;2403&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//adsabs.harvard.edu/full/1988AJ.....96.1476H&quot;&gt;&lt;span data-dcnode-id=&quot;2404&quot; instrument_node=&quot;&quot;&gt;Planet X&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2402&quot; instrument_node=&quot;&quot;&gt;” because of the perturbations which many in his field had observed on both Neptune and Uranus.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2400&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2393&quot;&gt;&lt;p data-dcnode-id=&quot;2394&quot;&gt;&lt;span data-dcnode-id=&quot;2399&quot; instrument_node=&quot;&quot;&gt;“Robert Sutton Harrington (October 21, 1942 – January 23, 1993) was an American astronomer who worked at the United States Naval Observatory (USNO) … Harrington became a believer in the existence of a Planet X beyond Pluto and undertook searches for it, with positive results coming from the IRAD probe in 1983. Harrington collaborated initially with T. C. (Tom) Van Flandern.”&lt;/span&gt;&lt;br data-dcnode-id=&quot;2398&quot;&gt;&lt;span data-dcnode-id=&quot;2397&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;em data-dcnode-id=&quot;2395&quot;&gt;&lt;span data-dcnode-id=&quot;2396&quot; instrument_node=&quot;&quot;&gt;(Per Wikipedia – Robert Sutton Harrington)&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2392&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2382&quot;&gt;&lt;p data-dcnode-id=&quot;2383&quot;&gt;&lt;span data-dcnode-id=&quot;2391&quot; instrument_node=&quot;&quot;&gt;“When scientists noticed that Uranus wasn’t following its predicted orbit for example, they didn’t question their theories. Instead they blamed the anomalies on an as yet unseen planet and, sure enough, Neptune was discovered in 1846. Now astronomers are using the same strategy to explain quirks in the orbits of Uranus and Neptune. According to John Anderson of the Jet Propulsion Laboratory in Pasadena, Calif., this odd behavior suggests that the sun has an unseen companion, a dark star gravitationally bound to it but billions of miles away. … Other scientists suggest that the most likely cause of the orbital snags is a tenth planet 4 to 7 billion miles beyond Neptune. A companion star would tug the outer planets, not just Uranus and Neptune, says Thomas Van Flandern of the U.S Naval Observatory. And where he admits a tenth planet is possible, but argues that it would have to be so big – a least the size of Uranus – that it should have been discovered by now.”&lt;/span&gt;&lt;br data-dcnode-id=&quot;2390&quot;&gt;&lt;span data-dcnode-id=&quot;2389&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;em data-dcnode-id=&quot;2384&quot;&gt;&lt;span data-dcnode-id=&quot;2388&quot; instrument_node=&quot;&quot;&gt;— “Does the Sun Have a &lt;/span&gt;&lt;a data-dcnode-id=&quot;2386&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.space.com/8028-sun-nemesis-pelted-earth-comets-study-suggests.html&quot;&gt;&lt;span data-dcnode-id=&quot;2387&quot; instrument_node=&quot;&quot;&gt;Dark Companion&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2385&quot; instrument_node=&quot;&quot;&gt;?” – Newsweek; June 28 1982&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2381&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;div class=&quot;wp-caption aligncenter&quot; data-dcnode-id=&quot;2376&quot; id=&quot;attachment_4956&quot; style=&quot;width: 710px&quot;&gt;&lt;a data-dcnode-id=&quot;2379&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/1754.jpg&quot;&gt;&lt;img alt=&quot;&quot; aria-describedby=&quot;caption-attachment-4956&quot; class=&quot;wp-image-4956&quot; data-dcnode-id=&quot;2380&quot; height=&quot;498&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 700px) 100vw, 700px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/1754.jpg&amp;amp;raw&quot; srcset=&quot;https://cosmicconvergence.org/wp-content/uploads/2013/10/1754.jpg 700w, https://cosmicconvergence.org/wp-content/uploads/2013/10/1754-300x213.jpg 300w&quot; title=&quot;1754&quot; width=&quot;700&quot;&gt;&lt;/a&gt;&lt;p class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;2377&quot; id=&quot;caption-attachment-4956&quot;&gt;&lt;span data-dcnode-id=&quot;2378&quot; instrument_node=&quot;&quot;&gt;Might this crop circle be telling us about an approaching celestial body (aka Planet X) from outside our Solar System?&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2375&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2372&quot;&gt;&lt;a data-dcnode-id=&quot;2373&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/147-crop-circle-2012.jpg&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-5034&quot; data-dcnode-id=&quot;2374&quot; height=&quot;501&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 600px) 100vw, 600px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/147-crop-circle-2012.jpg&amp;amp;raw&quot; srcset=&quot;https://cosmicconvergence.org/wp-content/uploads/2013/10/147-crop-circle-2012.jpg 600w, https://cosmicconvergence.org/wp-content/uploads/2013/10/147-crop-circle-2012-300x250.jpg 300w&quot; title=&quot;147-crop-circle-2012&quot; width=&quot;600&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2371&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2365&quot;&gt;&lt;strong data-dcnode-id=&quot;2366&quot;&gt;&lt;span data-dcnode-id=&quot;2370&quot; instrument_node=&quot;&quot;&gt;What is causing the dramatic and&amp;nbsp;&lt;/span&gt;&lt;a data-dcnode-id=&quot;2368&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//tmgnow.com/repository/global/planetophysical1.html&quot;&gt;&lt;span data-dcnode-id=&quot;2369&quot; instrument_node=&quot;&quot;&gt;meteoric changes&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2367&quot; instrument_node=&quot;&quot;&gt; throughout the Solar System?&lt;/span&gt;&lt;/strong&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2364&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2356&quot;&gt;&lt;span data-dcnode-id=&quot;2363&quot; instrument_node=&quot;&quot;&gt;The Planets — &lt;/span&gt;&lt;a data-dcnode-id=&quot;2361&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/%3Fattachment_id%3D5282&quot;&gt;&lt;span data-dcnode-id=&quot;2362&quot; instrument_node=&quot;&quot;&gt;all of them&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2360&quot; instrument_node=&quot;&quot;&gt; — have been experiencing unparalleled and dramatic &lt;/span&gt;&lt;a data-dcnode-id=&quot;2358&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//tmgnow.com/repository/global/planetophysical4.html&quot;&gt;&lt;span data-dcnode-id=&quot;2359&quot; instrument_node=&quot;&quot;&gt;transformation&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2357&quot; instrument_node=&quot;&quot;&gt; never seen or recorded before.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;2330&quot;&gt;&lt;p data-dcnode-id=&quot;2350&quot;&gt;&lt;span data-dcnode-id=&quot;2354&quot; instrument_node=&quot;&quot;&gt;“They are undergoing variations in their atmospheres. For example, the Martian atmosphere is getting sizably thicker and Earth’s moon is growing an atmosphere and according to &lt;/span&gt;&lt;a data-dcnode-id=&quot;2352&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//tmgnow.com/repository/global/planetophysical.html&quot;&gt;&lt;span data-dcnode-id=&quot;2353&quot; instrument_node=&quot;&quot;&gt;Dr. Alexey Dmitriev&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;2351&quot; instrument_node=&quot;&quot;&gt;, there is a 6,000 kilometer deep layer of Natrium that wasn’t there previously. He says that we’re having this kind of change in the upper levels of Earth’s atmosphere where HO gas is forming that wasn’t there before; it simply did not exist in the quantity that it does now. It’s not related to global warming and it’s not related to CFCs or fluorocarbon emissions or any of that stuff. It’s just showing up.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2349&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2347&quot;&gt;&lt;span data-dcnode-id=&quot;2348&quot; instrument_node=&quot;&quot;&gt;“Magnetic fields and brightness of the planets are changing. The planets are experiencing sizable increases in their overall luminosity. Venus for example, is showing us marked elevations in its overall brightness. Jupiter has such a high energetic charge now that there is actually a visible tube of ionizing radiation that has formed between it and its moon. You can actually see the luminous energy tube in photographs that have been taken recently. In addition, the magnetic field strength of each planet has increased.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2346&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2344&quot;&gt;&lt;span data-dcnode-id=&quot;2345&quot; instrument_node=&quot;&quot;&gt;“Uranus and Neptune appear to have had recent pole shifts. When the Voyager 2 space probe flew past Uranus and Neptune, the apparent north and south magnetic poles were sizably offset from where the rotational pole was. In one case, it was 50 degrees off and in the other case the difference was around 40 degrees, both of which are pretty big changes.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2343&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2331&quot;&gt;&lt;span data-dcnode-id=&quot;2342&quot; instrument_node=&quot;&quot;&gt;“The overall changes could essentially be broken down into three categories:&lt;/span&gt;&lt;br data-dcnode-id=&quot;2341&quot;&gt;&lt;span data-dcnode-id=&quot;2340&quot; instrument_node=&quot;&quot;&gt;
• Energy field changes&lt;/span&gt;&lt;br data-dcnode-id=&quot;2339&quot;&gt;&lt;span data-dcnode-id=&quot;2338&quot; instrument_node=&quot;&quot;&gt;
• Luminosity changes&lt;/span&gt;&lt;br data-dcnode-id=&quot;2337&quot;&gt;&lt;span data-dcnode-id=&quot;2336&quot; instrument_node=&quot;&quot;&gt;
• Atmospheric changes”&lt;/span&gt;&lt;br data-dcnode-id=&quot;2335&quot;&gt;&lt;span data-dcnode-id=&quot;2334&quot; instrument_node=&quot;&quot;&gt;
— &lt;/span&gt;&lt;em data-dcnode-id=&quot;2332&quot;&gt;&lt;span data-dcnode-id=&quot;2333&quot; instrument_node=&quot;&quot;&gt;“The Biggest Danger for Earth – The Hercolubus (Planet X) Inbound” by Luis Fredas; August 29, 2010&lt;/span&gt;&lt;/em&gt;&lt;/p&gt;&lt;/blockquote&gt;&lt;span data-dcnode-id=&quot;2329&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;div class=&quot;wp-caption aligncenter&quot; data-dcnode-id=&quot;1404&quot; id=&quot;attachment_5138&quot; style=&quot;width: 730px&quot;&gt;&lt;a data-dcnode-id=&quot;1407&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/30040-medium.jpg&quot;&gt;&lt;img alt=&quot;&quot; aria-describedby=&quot;caption-attachment-5138&quot; class=&quot;size-full wp-image-5138&quot; data-dcnode-id=&quot;1408&quot; height=&quot;450&quot; loading=&quot;lazy&quot; sizes=&quot;(max-width: 720px) 100vw, 720px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/30040-medium.jpg&amp;amp;raw&quot; srcset=&quot;https://cosmicconvergence.org/wp-content/uploads/2013/10/30040-medium.jpg 720w, https://cosmicconvergence.org/wp-content/uploads/2013/10/30040-medium-300x187.jpg 300w&quot; title=&quot;30040-medium&quot; width=&quot;720&quot;&gt;&lt;/a&gt;&lt;p class=&quot;wp-caption-text&quot; data-dcnode-id=&quot;1405&quot; id=&quot;caption-attachment-5138&quot;&gt;&lt;span data-dcnode-id=&quot;1406&quot; instrument_node=&quot;&quot;&gt;The ***PHOENIX*** is reborn from its own funeral pyre after self immolating at the end of its life cycle.&lt;/span&gt;&lt;/p&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1403&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;blockquote data-dcnode-id=&quot;1298&quot;&gt;&lt;p data-dcnode-id=&quot;1396&quot;&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &amp;nbsp; &amp;nbsp; &amp;nbsp; &lt;/span&gt;&lt;span data-dcnode-id=&quot;1397&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt;*** &lt;/span&gt;&lt;strong data-dcnode-id=&quot;1399&quot;&gt;&lt;span data-dcnode-id=&quot;1400&quot; instrument_node=&quot;&quot;&gt; The Esoteric Meaning of the PHOENIX &lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1398&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp;***&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1395&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1388&quot;&gt;&lt;span data-dcnode-id=&quot;1389&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &amp;nbsp;Also known as the legendary &lt;/span&gt;&lt;a data-dcnode-id=&quot;1391&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//cosmicconvergence.org/wp-content/uploads/2013/10/Firebird1.pdf&quot;&gt;&lt;span data-dcnode-id=&quot;1392&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt;Firebird,&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt; the PHOENIX[1] is a mythological and metaphorical harbinger foretold by many of the ancient civilizations. From time immemorial, this winged messenger has represented what all the cultures of antiquity knew about the cyclical ending of the ages. Especially at the end of the Kali Yuga, because of the turbulent, tumultuous and tempestuous transition to the Golden Age, is this apocalyptic allegory more relevant than ever.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1387&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1384&quot;&gt;&lt;span data-dcnode-id=&quot;1385&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &amp;nbsp;Perhaps the PHOENIX is just another name for Nibiru, like Hercolubus and the many other labels for the planet-comet known as Planet X. &amp;nbsp;After all, the myth associated with this legendary bird does portray the oft-prophesied ending of the Iron Age with uncanny precision. &amp;nbsp;The PHOENIX self immolates on its own funeral pyre only to rise from its ashes, just as human society is now doing during this twilight period of the Kali Yuga. Who among us has not heard of the coming Golden Age — an age that can only begin after the dissolution of the current planetary civilization?&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1383&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1370&quot;&gt;&lt;span data-dcnode-id=&quot;1371&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &amp;nbsp;In 1997, simultaneous with the appearance of the awesome &lt;/span&gt;&lt;span data-dcnode-id=&quot;1378&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;a data-dcnode-id=&quot;1380&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www2.jpl.nasa.gov/comet/&quot;&gt;&lt;span data-dcnode-id=&quot;1381&quot; instrument_node=&quot;&quot;&gt;Comet Hale Bopp&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;[2]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;, another event took place in the skies over Phoenix, Arizona. &amp;nbsp;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1373&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;a data-dcnode-id=&quot;1375&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//www.thephoenixlights.net/GAP.htm&quot;&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;The Phoenix Lights&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1374&quot; instrument_node=&quot;&quot;&gt;[3]&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;, as they are known, was arguably the most dramatic UFO display in modern history. &amp;nbsp;It is quite significant that this winged formation of extraordinary lights appeared over PHOENIX. &amp;nbsp;It’s also no coincidence that this slow-moving, triangular pattern of lights occurred in the skies of a major American city very near in time to the perihelion (closest point to Earth) of the extraordinary comet Hale-Bopp.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1364&quot;&gt;&lt;span data-dcnode-id=&quot;1367&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;&amp;nbsp; &amp;nbsp;Truly, the PHOENIX appears to every human race or culture, civilization or society, planet or continent, that is ready to be reborn. &amp;nbsp;The current race of humanity knows that Mother Earth is ripe for such a planetary renewal and rejuvenation of her biosphere. &amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;span data-dcnode-id=&quot;1365&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;span data-dcnode-id=&quot;1366&quot; instrument_node=&quot;&quot;&gt;And so it shall be done.&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1356&quot;&gt;&lt;span data-dcnode-id=&quot;1357&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;[1] Comet Hale-Bopp (aka the “&lt;/span&gt;&lt;a data-dcnode-id=&quot;1359&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=http%3A//astrolife.tk/uploads/posts/2012-12/1355947198_comet-c1995-o1.jpg&quot;&gt;&lt;span data-dcnode-id=&quot;1360&quot; style=&quot;color: #cc6600;&quot;&gt;&lt;span data-dcnode-id=&quot;1361&quot; instrument_node=&quot;&quot;&gt;Great Comet of 1997&lt;/span&gt;&lt;/span&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1358&quot; instrument_node=&quot;&quot;&gt;″) was most visible in the skies around the world during the entire month of March of 1997.&amp;nbsp;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;
