&lt;h3 data-geo-id=&quot;geo-03a7e209&quot;&gt;Key Facts About the Galactic Center&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-fa65c02c&quot;&gt;
&lt;li&gt;The Milky Way’s center hosts Sagittarius A*, a supermassive black hole with a mass of about 4.3 million suns, mostly dormant but surrounded by X-ray emitting gas.&lt;/li&gt;
&lt;li&gt;Our solar system lies roughly 26,000 light-years from this center, orbiting at 515,000 mph and completing one revolution every 230 million years.&lt;/li&gt;
&lt;li&gt;The Milky Way is a barred spiral galaxy with four main arms, a warped disk, and an extensive dark matter halo influencing its structure and evolution.&lt;/li&gt;
&lt;li&gt;Recent advances include the first image of Sagittarius A* by the Event Horizon Telescope and detailed galactic mapping from Gaia mission data, revealing the galaxy’s history and future collision with Andromeda.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;h3 data-geo-id=&quot;geo-d48ba36f&quot;&gt;Highlights: Best Time to See the Milky Way&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-de48fc69&quot;&gt;
&lt;li&gt;The Milky Way is visible from both the Northern and Southern Hemispheres.&lt;/li&gt;
&lt;li&gt;Optimal viewing and photographing conditions require a dark sky, far from light pollution.&lt;/li&gt;
&lt;li&gt;The best season to observe the Milky Way generally spans from February through October.&lt;/li&gt;
&lt;li&gt;Special photographic equipment is recommended to capture the galaxy’s faint light effectively.&lt;/li&gt;
&lt;/ul&gt;

&lt;p data-geo-id=&quot;geo-00092c2f&quot; id=&quot;07309af7-73b8-48b0-90da-d6dde83f5aa0&quot;&gt;The Milky Way is a barred spiral galaxy around 13.6 billion years old with large pivoting arms stretching out across the cosmos. &lt;/p&gt;
&lt;p class=&quot;fancy-box__body-text&quot; data-geo-id=&quot;geo-347c5466&quot;&gt;&lt;strong&gt;–  Galaxy type:&lt;/strong&gt; Barred spiral&lt;br/&gt;
&lt;strong&gt;– Age:&lt;/strong&gt; 13.6 billion years (and counting)&lt;br/&gt;
&lt;strong&gt;– Size:&lt;/strong&gt; 100,000 light-years across&lt;br/&gt;
&lt;strong&gt;– Number of stars:&lt;/strong&gt; about 200 billion&lt;br/&gt;
&lt;strong&gt;– Rotation time: &lt;/strong&gt;250 million years&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-5220415d&quot; id=&quot;8c595e4e-4c8c-473e-bc47-54cc6aa4fd19-1&quot;&gt;Our home galaxy's disk is about 100,000 &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/light-year.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/light-year.html&quot;&gt;light-years&lt;/a&gt; in diameter and just 1000 light-years thick, according to &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://lco.global/spacebook/galaxies/the-milky-way-galaxy/&quot; href=&quot;https://lco.global/spacebook/galaxies/the-milky-way-galaxy/&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;Las Cumbres Observatory&lt;/a&gt;.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-bdd7f407&quot;&gt; Just as Earth orbits the &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/58-the-sun-formation-facts-and-characteristics.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/58-the-sun-formation-facts-and-characteristics.html&quot;&gt;sun&lt;/a&gt;, the solar system orbits the center of the Milky Way. Despite hurtling through space at speeds of around 515,000mph (828,000kmph) our solar system takes approximately 250 million years to complete a single revolution, according to &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://interestingengineering.com/the-last-galactic-year-has-taken-us-from-the-jurassic-period-to-today&quot; href=&quot;https://interestingengineering.com/the-last-galactic-year-has-taken-us-from-the-jurassic-period-to-today&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;Interesting Engineering&lt;/a&gt;. The last time our planet was in this position, dinosaurs were just emerging and mammals were yet to evolve. &lt;/p&gt;
&lt;ul class=&quot;flex flex-col gap-3 m-0&quot; data-geo-id=&quot;geo-e17d262e&quot;&gt;
&lt;li analytics-label=&quot;adviser:hybrid&quot; class=&quot;m-0 list-none&quot; data-analytics-id=&quot;recirculation-inline-1&quot; data-mrf-recirculation=&quot;recirculation-inline-1&quot; data-recirculation-id=&quot;recirculation-card-1&quot; name=&quot;recirculation-inline&quot;&gt;

&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;h3 data-geo-id=&quot;geo-a86c21b5&quot;&gt;Key Insights on Sagittarius A* and Its Role in the Galactic Center&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-4d82e574&quot;&gt;
&lt;li&gt;Sagittarius A* is a supermassive black hole at the Milky Way’s center, with a mass about 4.3 million times that of the sun.&lt;/li&gt;
&lt;li&gt;It is mostly dormant but surrounded by a large disk of gas extending 5 to 30 light-years, which emits X-rays due to heating and friction.&lt;/li&gt;
&lt;li&gt;This gas disk occasionally feeds the black hole, contributing to its growth through accretion and possible mergers with smaller black holes.&lt;/li&gt;
&lt;li&gt;In 2022, the Event Horizon Telescope captured the first-ever image of Sagittarius A*, revealing its shadow and the rapidly moving heated matter near its event horizon.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;h3 data-geo-id=&quot;geo-154658a2&quot;&gt;Key Facts About the Center of the Milky Way&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-aa0355dd&quot;&gt;
&lt;li&gt;The center of our galaxy hosts a supermassive black hole named Sagittarius A*.&lt;/li&gt;
&lt;li&gt;Sagittarius A* has a mass approximately 4.3 million times that of the sun and a diameter of about 14.6 million miles (23.5 million kilometers).&lt;/li&gt;
&lt;li&gt;Although mostly dormant, it is surrounded by a large disk of gas emitting X-rays.&lt;/li&gt;
&lt;li&gt;In 2022, the Event Horizon Telescope captured the first-ever image of this black hole, revealing its shadow.&lt;/li&gt;
&lt;/ul&gt;
&lt;p data-geo-id=&quot;geo-8b9db7bf&quot;&gt;If the center of the Milky Way were a city, we would be living in suburbia, about 25,000 to 30,000 light-years from the city center. Life in the outskirts is good; we find ourselves nestled in one of the smaller neighborhoods, the Orion-Cygnus Arm, sandwiched between larger Perseus and Carina-Sagittarius arms. If we were to travel inwards towards the city center, we would find the Scutum-Centaurus and Norma arms. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-d1cf2a32&quot;&gt;&lt;strong&gt;Related: &lt;/strong&gt;&lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/how-to-photograph-the-milky-way-beginners-tips-tricks&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/how-to-photograph-the-milky-way-beginners-tips-tricks&quot;&gt;How to photograph the Milky Way: A guide for beginners and enthusiasts &lt;/a&gt;&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-45e689f0&quot; id=&quot;ddf0a15f-dcce-410a-b3bd-5c8e123e477a&quot;&gt;On a clear night, void of light pollution, we can catch a glimpse of the bright lights of the galactic city streaking across the night sky. Our window into the universe, this milky white band of stars, dust and gas is where our galaxy gets its name.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-df12ab45&quot;&gt;Lying at the very heart of the Milky Way is a &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/supermassive-black-hole&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/supermassive-black-hole&quot;&gt;supermassive black hole&lt;/a&gt; called Sagittarius A*. About 4 million times the mass of the sun, this beast consumes anything that strays too close, gorging on an ample supply of stellar material enabling it to grow into a giant. In 2022, we &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/milky-way-monster-black-hole-first-image-eht&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/milky-way-monster-black-hole-first-image-eht&quot;&gt;&lt;u&gt;imaged this glutton at the core of our galaxy for the very first time&lt;/u&gt;&lt;/a&gt;, through an innovative technique allowing us to view the shadow of the black hole. &lt;/p&gt;
&lt;p class=&quot;newsletter-form__strapline&quot; data-geo-id=&quot;geo-8b24982d&quot;&gt;Breaking space news, the latest updates on rocket launches, skywatching events and more!&lt;/p&gt;
&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-6ecd5fdd&quot; id=&quot;section-why-is-our-galaxy-called-the-milky-way&quot;&gt;&lt;span&gt;Why is our galaxy called the Milky Way?&lt;/span&gt;&lt;/h2&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;p data-geo-id=&quot;geo-cca2d009&quot; id=&quot;6b9f7354-7fb5-42f3-83a6-037fd0ea7c5c&quot;&gt;The Milky Way galaxy, our cosmic home, derives its name from its distinctive milky white band visible across the night sky. This appearance results from the dense concentration of stars, gas, and dust that form a luminous band stretching overhead. According to the &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.amnh.org/explore/ology/astronomy/the-milky-way-galaxy2#:~:text=The%20Milky%20Way%20gets%20its,the%20%E2%80%9CBackbone%20of%20Night.%E2%80%9D&quot; href=&quot;https://www.amnh.org/explore/ology/astronomy/the-milky-way-galaxy2#:~:text=The%20Milky%20Way%20gets%20its,the%20%E2%80%9CBackbone%20of%20Night.%E2%80%9D&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;American Museum of Natural History&lt;/a&gt; (AMNH), this milky glow inspired the galaxy’s name. The Milky Way is also known by its Latin name, &lt;strong&gt;Via Lactea&lt;/strong&gt;, which translates to 'Road of Milk'. This name originates from Roman mythology, where it was said to be formed from the milk spilled by the goddess Juno (the Roman equivalent of Hera) across the night sky. The galaxy's distinctive milky white band is caused by the combined light of billions of distant stars and interstellar dust, creating a luminous, milky appearance that has inspired its name across many cultures. In Greek mythology, the band was said to be created when the goddess Hera spilled milk across the sky, symbolizing the galaxy’s ethereal appearance.&lt;/p&gt;
&lt;p data-geo-id=&quot;geo-89605c02&quot;&gt;Culturally, the Milky Way holds diverse meanings worldwide. In China, it is known as the &quot;Silver River,&quot; reflecting its shimmering appearance, while among the indigenous peoples of the Kalahari Desert in South Africa, it is called the &quot;Backbone of Night,&quot; emphasizing its central role in the night sky’s structure. These varied names highlight the galaxy’s significance across different civilizations and their interpretations of the cosmos.&lt;/p&gt;
&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-f1135dbd&quot; id=&quot;section-milky-way-faqs-answered-by-an-expert&quot;&gt;&lt;span&gt;Expert Insights: Frequently Asked Questions About the Milky Way&lt;/span&gt;&lt;/h2&gt;
&lt;p data-geo-id=&quot;geo-80280bd6&quot; id=&quot;206e42a8-1f00-4df6-ae53-86dbc08fa542&quot;&gt;Rory Bentley, an astronomer and graduate student at the University of California, Los Angeles, specializing in high-mass stars and the Milky Way’s core, provides authoritative answers to common questions about our galaxy.&lt;/p&gt;

&lt;h3 data-geo-id=&quot;geo-5e242651&quot;&gt;Earth’s Location Within the Milky Way&lt;/h3&gt;
&lt;p data-geo-id=&quot;geo-59cd42cc&quot;&gt;Our solar system is situated approximately 26,000 light-years from the Milky Way’s center, positioned roughly halfway between the core and the galaxy’s outer edge. Specifically, Earth resides in the Orion Spur (also known as the Orion Arm), a minor spiral arm segment nestled between the larger Sagittarius Arm toward the galactic center and the Perseus Arm toward the outer galaxy. This location places us in a relatively calm and stable region, conducive to the development and sustenance of life.&lt;/p&gt;
&lt;h3 data-geo-id=&quot;geo-39967f98&quot;&gt;Classification and Structure of the Milky Way&lt;/h3&gt;
&lt;p data-geo-id=&quot;geo-7006389e&quot;&gt;The Milky Way is classified as a barred spiral galaxy, characterized by a central elongated bar-shaped structure composed primarily of older stars. This bar, smaller in proportion compared to those in many similar-sized galaxies, extends across the galactic core and influences the spiral arms’ formation and dynamics. Surrounding the bar is a bulge of stars, while the galaxy’s disk contains multiple spiral arms rich in gas, dust, and young stars. The Milky Way’s diameter spans approximately 100,000 to 120,000 light-years, containing an estimated 100 to 400 billion stars, along with vast clouds of interstellar gas and dark matter (Bland-Hawthorn &amp;amp; Gerhard, 2016; NASA, 2023).&lt;/p&gt;
&lt;h3 data-geo-id=&quot;geo-6689a7df&quot;&gt;Largest Known Planet Within the Milky Way&lt;/h3&gt;
&lt;p data-geo-id=&quot;geo-6d3af8b5&quot;&gt;Among the planets discovered in our galaxy, HD 100546 b stands out as one of the largest known exoplanets. This gas giant, currently in the process of formation, has an estimated diameter approximately 6.9 times that of Jupiter, or about 77 times Earth’s diameter. Located around the star HD 100546, this planet provides valuable insights into planetary formation processes within the Milky Way (Quanz et al., 2015; NASA Exoplanet Archive, 2024).&lt;/p&gt;&lt;/div&gt;

&lt;p data-geo-id=&quot;geo-e05f3d1e&quot;&gt;The radius measurement is highly uncertain, as some of the material surrounding the planet may be masquerading as being part of the planet itself. The largest planets whose sizes are known for certain are HAT-P-67 b and XO-6b, both with diameters around 2.1 times that of Jupiter. Both of these planets have had their diameters measured directly as they transit their parent star. &lt;/p&gt;&lt;/article&gt;&lt;/section&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-the-milky-way-size-structure-and-mass&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-4e37b323&quot; id=&quot;section-the-milky-way-size-structure-and-mass&quot;&gt;&lt;span&gt;The Milky Way: Size, structure and mass&lt;/span&gt;&lt;/h2&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;b17be9c8-30c5-4e13-babd-d2c90c2cee5a&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:1920px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:56.25%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-1200-80.jpg.webp 1200w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-970-80.jpg.webp 970w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-480-80.jpg.webp 480w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-320-80.jpg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;Men silhouetted in front of the night sky with the band of the Milky Way stretching across the sky.&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-1200-80.jpg 1200w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-970-80.jpg 970w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-480-80.jpg 480w, https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB-320-80.jpg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/y4Mx2XJQmrr28ggE8qZsnB.jpg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;The Milky Way's mesmerizing glowing band has had humankind star-struck for eons. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: Photo by Kendall Hoopes from Pexels)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-40c2481d&quot; id=&quot;f482321a-79ba-4348-a9ac-f6581d04cdee&quot;&gt;Studying the Milky Way used to be notoriously difficult. Astronomers sometimes compare the effort to attempting to describe the size and structure of a forest while being lost in the middle of it. From our position on &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/54-earth-history-composition-and-atmosphere.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/54-earth-history-composition-and-atmosphere.html&quot;&gt;Earth&lt;/a&gt;, we simply lack an overview. But two ground-breaking space telescopes launched since the 1990s have helped usher in the golden age of Milky Way research. Major strides have been made, especially since the 2013 launch of the European Space Agency's (ESA) &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/41312-gaia-mission.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/41312-gaia-mission.html&quot;&gt;Gaia mission&lt;/a&gt;. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-0ade8d7e&quot;&gt;Telescopes enabled astronomers to distinguish the basic shape and structure of some of the closest galaxies before they knew they were looking at galaxies. But reconstructing the shape and structure of our own galactic home was slow and tedious. The process involved building catalogs of stars, charting their positions in the sky and determining how far from Earth they are. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-fd85a363&quot;&gt;Dutch astronomer Jan Oort, sometimes dubbed the master of the galactic system, was the first to realize that the Milky Way isn't motionless but rotates, and he calculated speeds at which stars at various distances orbit around the galactic center. It also was Oort who determined the position of our sun in the vast galaxy. (The &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/16401-oort-cloud-the-outer-solar-system-s-icy-shell.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/16401-oort-cloud-the-outer-solar-system-s-icy-shell.html&quot;&gt;Oort Cloud&lt;/a&gt;, a repository of trillions of comets far from the sun, was named after him.)&lt;/p&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;e998abed-0742-476c-9dd7-2fb080b07d84&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:600px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:62.50%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-600-80.jpeg.webp 1200w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-600-80.jpeg.webp 1024w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-600-80.jpeg.webp 970w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-600-80.jpeg.webp 650w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-480-80.jpeg.webp 480w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-320-80.jpeg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;Artist&amp;amp;#039;s illustration of the Milky Way from above and each of the arms spraying out from the galactic center in a spiral fashion.&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-600-80.jpeg 1200w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-600-80.jpeg 1024w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-600-80.jpeg 970w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-600-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-480-80.jpeg 480w, https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F-320-80.jpeg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/9rf4fn544aYCEyLabga99F.jpeg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;The structure of the Milky Way galaxy as seen from above the galactic disk. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: NASA/Adler/U. Chicago/Wesleyan/JPL-Caltech)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-1ce48013&quot; id=&quot;3656176a-7791-4321-b952-85661fbe3513&quot;&gt;Gradually, a complex picture emerged of a &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/22382-spiral-galaxy.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/22382-spiral-galaxy.html&quot;&gt;spiral galaxy&lt;/a&gt; that appears quite ordinary.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-2e8a9b88&quot;&gt;At the center of the Milky Way sits a supermassive black hole called &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/milky-way-supermassive-black-hole-weird-flare.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/milky-way-supermassive-black-hole-weird-flare.html&quot;&gt;Sagittarius A*&lt;/a&gt;. With a mass equal to that of four million suns, the &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/15421-black-holes-facts-formation-discovery-sdcmp.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/15421-black-holes-facts-formation-discovery-sdcmp.html&quot;&gt;black hole&lt;/a&gt;, discovered in 1974, can be observed in the sky with radio telescopes close to the constellation Sagittarius.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-14caaa6e&quot;&gt;Everything else in the galaxy revolves around this powerful gateway to nothingness. In its immediate surroundings is a tightly packed region of dust, gas and stars called the galactic bulge. In the case of the Milky Way, this bulge is peanut-shaped, measuring 10,000 light-years across, &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://sci.esa.int/web/gaia/-/58206-anatomy-of-the-milky-way&quot; href=&quot;https://sci.esa.int/web/gaia/-/58206-anatomy-of-the-milky-way&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;according to ESA&lt;/a&gt;. It harbors 10 billion stars (out of the Milky Way's total of about 200 billion), mostly old &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/22471-red-giant-stars.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/22471-red-giant-stars.html&quot;&gt;red giants&lt;/a&gt;, which formed in the early stages of the galaxy's evolution.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-9938f896&quot;&gt;&lt;strong&gt;Related:&lt;/strong&gt; &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/strange-signal-from-milky-way&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/strange-signal-from-milky-way&quot;&gt;'Weird signal' hails from the Milky Way. What's causing it?&lt;/a&gt;&lt;/p&gt;&lt;p data-geo-id=&quot;geo-cb819203&quot; id=&quot;0b2760e1-a025-41dd-ad5a-04395e051f0c&quot;&gt;Beyond the bulge extends the &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Guide_to_our_Galaxy&quot; href=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Guide_to_our_Galaxy&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;galactic disk&lt;/a&gt;. This feature is 100,000 light-years across and 1,000 light-years thick, and it's home to the majority of the galaxy's stars, including our sun. Stars in the disk are dispersed in clouds of stellar dust and gas. When we look up to the sky at night, it's the edge-on view of this disk extending toward the galactic center that takes our breath away.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-5eb5bd2b&quot;&gt;Stars in the disk orbit around the galactic center, forming swirling streams that appear to emanate like arms from the galactic bulge. Research into the mechanisms that drive the creation of &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/gaia-reveals-spiral-arms-milky-way&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/gaia-reveals-spiral-arms-milky-way&quot;&gt;spiral arms&lt;/a&gt; is still in its infancy, but the latest studies suggest that these arms form and disperse within relatively short periods of up to 100 million years (out of the galaxy's 13 billion years of evolution). &lt;/p&gt;&lt;p data-geo-id=&quot;geo-e022d392&quot;&gt;Inside those arms, stars, dust and gas are more tightly packed than in the more loosely filled areas of the galactic disk, and this increased density triggers more intense star formation. As a result, stars in the galactic disk tend to be much younger than those in the bulge. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-38095be7&quot;&gt;&quot;Spiral arms are like traffic jams in that the gas and stars crowd together and move more slowly in the arms. As material passes through the dense spiral arms, it is compressed and this triggers more star formation,&quot; Denilso Camargo, of the Federal University of Rio Grande do Sul in Brazil, said &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.nasa.gov/jpl/charting-the-milky-way-from-the-inside-out&quot; href=&quot;https://www.nasa.gov/jpl/charting-the-milky-way-from-the-inside-out&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;in a statement&lt;/a&gt;.&lt;/p&gt;&lt;div class=&quot;geo-modified-chunk&quot; style=&quot;border-left: 4px solid #4CAF50; background-color: #f1f8e9; padding: 10px; margin: 10px 0;&quot;&gt;&lt;div class=&quot;geo-summary-box&quot;&gt;
&lt;h3 data-geo-id=&quot;geo-d17df07f&quot;&gt;Key Points on the Milky Way's Structure and Mass&lt;/h3&gt;
&lt;ul data-geo-id=&quot;geo-447c9521&quot;&gt;
&lt;li&gt;The Milky Way's total mass is about 1.5 trillion solar masses, with roughly 90% attributed to a vast dark matter halo surrounding the galaxy.&lt;/li&gt;
&lt;li&gt;This dark matter halo exerts significant gravitational influence, shaping the motions of stars and the overall mass distribution within the galaxy.&lt;/li&gt;
&lt;li&gt;The galaxy's structure includes spiral arms, a warped disk, and a spherical halo of dust and gas, all affected by past collisions with smaller galaxies.&lt;/li&gt;
&lt;li&gt;These past galactic interactions have helped shape the Milky Way’s spiral structure and star formation history, which in turn relate to how its mass is distributed.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;p data-geo-id=&quot;geo-376266ca&quot;&gt;The Milky Way currently has four spiral arms, according to the &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.nsf.gov/mps/ast/outreach/MilkyWayLEDCraft2019.pdf&quot; href=&quot;https://www.nsf.gov/mps/ast/outreach/MilkyWayLEDCraft2019.pdf&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;National Science Foundation&lt;/a&gt; (NSF). There are two main arms — Perseus and Scutum-Centaurus — and the Sagittarius and Local Arm, which are less pronounced. Scientists still discuss the exact position and shape of these arms using Gaia data. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-575c0ffb&quot;&gt;The Milky Way &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://sci.esa.int/web/gaia/-/milky-way-s-warp-caused-by-galactic-collision-gaia-data-suggests&quot; href=&quot;https://sci.esa.int/web/gaia/-/milky-way-s-warp-caused-by-galactic-collision-gaia-data-suggests&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;disk is not flat but warped&lt;/a&gt;, according to ESA. As it rotates, it precesses like a wobbling spinning top. This wobble, essentially a giant ripple, circles the galactic center much more slowly than the stars in the disk, completing a full rotation in about 600 to 700 million years. Astronomers think this ripple may be a result of a past collision with another galaxy. &lt;/p&gt;
&lt;p data-geo-id=&quot;geo-1c7c2636&quot; id=&quot;e0277929-63fe-4fda-a817-e576182463b9&quot;&gt;Sprinkled around the disk and the bulge are globular clusters, collections of ancient stars, as well as approximately 40 dwarf galaxies that are either orbiting or colliding with the larger Milky Way according to a &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Gaia_reveals_that_most_Milky_Way_companion_galaxies_are_newcomers_to_our_corner_of_spaceSprinkled%20around%20the%20disk%20and%20the%20bulge%20are%20globular%20clusters,%20collections%20of%20ancient%20stars,%20as%20well%20as%20approximately%2040%20dwarf%20galaxies%20that%20are%20either%20orbiting%20or%20colliding%20with%20the%20larger%20Milky%20Way%20according%20to%20a%20statement%20from%20ESA.%20%20All%20of%20that%20is%20surrounded%20by%20a%20spherical%20halo%20of%20dust%20and%20gas,%20which%20is%20twice%20as%20wide%20as%20the%20disk.%20Astronomers%20believe%20that%20the%20entire%20galaxy%20is%20embedded%20in%20an%20even%20larger%20halo%20of%20invisible%20dark%20matter.%20Since%20dark%20matter%20doesn't%20emit%20any%20light,%20its%20presence%20can%20only%20be%20inferred%20indirectly%20by%20its%20gravitational%20effects%20on%20the%20motions%20of%20stars%20in%20the%20galaxy.%20Calculations%20suggest%20that%20this%20puzzling%20stuff%20makes%20up%20to%2090%%20of%20the%20galaxy's%20mass.%20The%20mass%20of%20the%20Milky%20Way,%20dark%20matter%20included,%20equals%201.5%20trillion%20solar%20masses,%20according%20to%20recent%20NASA%20estimates.%20The%20galaxy's%20visible%20matter%20is%20distributed%20between%20its%20200%20billion%20stars,%20their%20planets%20and%20the%20massive%20clouds%20of%20dust%20and%20gas%20that%20fill%20the%20interstellar%20space.%20Astronomers%20aren't%20quite%20sure%20how%20many%20planets%20are%20in%20the%20Milky%20Way,%20given%20we%20have%20only%20found%20a%20few%20thousand%20all%20told,%20but%20one%20NASA%20estimate%20suggests%20it's%20more%20than%20100%20billion%20planets.%20How%20many%20solar%20systems%20there%20are%20in%20the%20Milky%20Way%20is%20also%20a%20mystery,%20as%20we%20are%20still%20looking%20for%20the%20planets.%20Related:%20Galaxies:%20Collisions,%20types%20and%20how%20they're%20made&quot; href=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Gaia_reveals_that_most_Milky_Way_companion_galaxies_are_newcomers_to_our_corner_of_spaceSprinkled%20around%20the%20disk%20and%20the%20bulge%20are%20globular%20clusters,%20collections%20of%20ancient%20stars,%20as%20well%20as%20approximately%2040%20dwarf%20galaxies%20that%20are%20either%20orbiting%20or%20colliding%20with%20the%20larger%20Milky%20Way%20according%20to%20a%20statement%20from%20ESA.%20%20All%20of%20that%20is%20surrounded%20by%20a%20spherical%20halo%20of%20dust%20and%20gas,%20which%20is%20twice%20as%20wide%20as%20the%20disk.%20Astronomers%20believe%20that%20the%20entire%20galaxy%20is%20embedded%20in%20an%20even%20larger%20halo%20of%20invisible%20dark%20matter.%20Since%20dark%20matter%20doesn't%20emit%20any%20light,%20its%20presence%20can%20only%20be%20inferred%20indirectly%20by%20its%20gravitational%20effects%20on%20the%20motions%20of%20stars%20in%20the%20galaxy.%20Calculations%20suggest%20that%20this%20puzzling%20stuff%20makes%20up%20to%2090%%20of%20the%20galaxy's%20mass.%20The%20mass%20of%20the%20Milky%20Way,%20dark%20matter%20included,%20equals%201.5%20trillion%20solar%20masses,%20according%20to%20recent%20NASA%20estimates.%20The%20galaxy's%20visible%20matter%20is%20distributed%20between%20its%20200%20billion%20stars,%20their%20planets%20and%20the%20massive%20clouds%20of%20dust%20and%20gas%20that%20fill%20the%20interstellar%20space.%20Astronomers%20aren't%20quite%20sure%20how%20many%20planets%20are%20in%20the%20Milky%20Way,%20given%20we%20have%20only%20found%20a%20few%20thousand%20all%20told,%20but%20one%20NASA%20estimate%20suggests%20it's%20more%20than%20100%20billion%20planets.%20How%20many%20solar%20systems%20there%20are%20in%20the%20Milky%20Way%20is%20also%20a%20mystery,%20as%20we%20are%20still%20looking%20for%20the%20planets.%20Related:%20Galaxies:%20Collisions,%20types%20and%20how%20they're%20made&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;statement from ESA&lt;/a&gt;. &lt;/p&gt;&lt;/div&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;22af0679-c7be-4c1f-a3d1-5caddc0de7d0&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:4000px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:56.25%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-1200-80.jpg.webp 1200w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-970-80.jpg.webp 970w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-480-80.jpg.webp 480w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-320-80.jpg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;Artist&amp;amp;#039;s illustration of the Milky Way demonstrating how the disk is not flat but warped like a wobbling spinning top.&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-1200-80.jpg 1200w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-970-80.jpg 970w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-480-80.jpg 480w, https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi-320-80.jpg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/hozxCa3sE5fS5Y2iMfV3zi.jpg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;The structure of the Milky Way with its rotating warped galactic disc. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: Stefan Payne-Wardenaar; Inset: NASA/JPL-Caltech; Layout: ESA)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-7c768b0e&quot;&gt;All of that is surrounded by a spherical halo of dust and gas, which is twice as wide as the disk. Astronomers believe that the entire galaxy is embedded in an even larger halo of invisible &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/20930-dark-matter.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/20930-dark-matter.html&quot;&gt;dark matter&lt;/a&gt;. Since dark matter doesn't emit any light, its presence can only be inferred indirectly by its gravitational effects on the motions of stars in the galaxy. Calculations suggest that this puzzling stuff makes up to 90% of the galaxy's mass.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-8e364150&quot;&gt;The mass of the Milky Way, dark matter included, equals 1.5 trillion solar masses, according to &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.nasa.gov/feature/goddard/2019/what-does-the-milky-way-weigh-hubble-and-gaia-investigate&quot; href=&quot;https://www.nasa.gov/feature/goddard/2019/what-does-the-milky-way-weigh-hubble-and-gaia-investigate&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;recent NASA estimates&lt;/a&gt;. The galaxy's visible matter is distributed between its 200 billion &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/57-stars-formation-classification-and-constellations.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/57-stars-formation-classification-and-constellations.html&quot;&gt;stars&lt;/a&gt;, their planets and the massive clouds of dust and gas that fill the interstellar space. Astronomers aren't quite sure how many planets are in the Milky Way, given we have only found a few thousand all told, but one NASA estimate suggests it's &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/19103-milky-way-100-billion-planets.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/19103-milky-way-100-billion-planets.html&quot;&gt;&lt;u&gt;more than 100 billion planets&lt;/u&gt;&lt;/a&gt;. How many solar systems there are in the Milky Way is also a mystery, as we are still looking for the planets.&lt;/p&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-where-is-the-sun-in-the-milky-way&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-569809b0&quot; id=&quot;section-where-is-the-sun-in-the-milky-way&quot;&gt;&lt;span&gt;Where is the sun in the Milky Way?&lt;/span&gt;&lt;/h2&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;f6967ba2-4801-4d78-942e-e45de9fab8f9&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:1920px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:56.25%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-1200-80.jpg.webp 1200w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-970-80.jpg.webp 970w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-480-80.jpg.webp 480w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-320-80.jpg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;Image of the glowing orange and yellow orb that is the sun.&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-1200-80.jpg 1200w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-970-80.jpg 970w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-480-80.jpg 480w, https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3-320-80.jpg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/ihmkYrj7MyNpCAD8suT3i3.jpg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;The sun is one of 200 billion stars making up the Milky Way galaxy. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: NASA/GSFC/SDO)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-3f46b14c&quot; id=&quot;8a05b7f6-058f-468d-aeff-837cb17ed7ef&quot;&gt;The sun orbits about 26,000 light-years from the black hole Sagittarius A*, roughly in the middle of the galactic disk. Traveling at the speed of 515,000 mph (828,000 kph), the sun takes 230 million years to complete a full orbit around the galactic center. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-854b796f&quot;&gt;The sun sits near the edge of the Local Arm of the Milky Way, one of the two smaller spiral arms of the galaxy. In 2019, &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Five_fascinating_Gaia_revelations_about_the_Milky_Way&quot; href=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Five_fascinating_Gaia_revelations_about_the_Milky_Way&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;using data from the Gaia mission&lt;/a&gt;, astronomers found that the sun is essentially surfing a wave of interstellar gas that's 9,000 light-years long, 400 light-years wide and undulates 500 light-years above and below the galactic disk according to ESA. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-81387c1c&quot;&gt;Planets of the &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/16080-solar-system-planets.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/16080-solar-system-planets.html&quot;&gt;solar system&lt;/a&gt; do not orbit in the plane of the galaxy but are tipped by about 63 degrees. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-4fb6d16f&quot;&gt;&quot;It's almost like we're sailing through the galaxy sideways,&quot; Merav Opher, an astrophysicist at George Mason University in Virginia, told Space.com.&lt;/p&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-what-is-the-black-hole-in-the-milky-way&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-7d141668&quot; id=&quot;section-what-is-the-black-hole-in-the-milky-way&quot;&gt;&lt;span&gt;What is the black hole in the Milky Way?&lt;/span&gt;&lt;/h2&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;9deb8bcd-b92e-4983-892a-e5de963ceb8e&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:1200px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:55.33%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-1200-80.jpg.webp 1200w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-970-80.jpg.webp 970w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-480-80.jpg.webp 480w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-320-80.jpg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;picture of star clusters in blue with an arrow pointing to sagittarius a* black hole&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi.jpg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi.jpg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-1200-80.jpg 1200w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-970-80.jpg 970w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-480-80.jpg 480w, https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi-320-80.jpg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi.jpg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/TC2wajNBCa9eKVuohgtqRi.jpg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;Sagittarius A*, taken by NASA's Chandra X-Ray Observatory. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: NASA/CXC/Caltech/M.Muno et al.)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-782073cf&quot; id=&quot;21329ac9-b4fe-48f4-9940-3e5fc407faef&quot;&gt;The black hole in the Milky Way is called &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/sagittarius-a&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/sagittarius-a&quot;&gt;&lt;u&gt;Sagittarius A*&lt;/u&gt;&lt;/a&gt;. The black hole is mostly dormant, which makes it very challenging to observe. Sagittarius A* has a mass 4.3 million times that of the sun, astronomers Reinhard Genzel and Andrea Ghez discovered it in 2008. The approximate diameter is 14.6 million miles (23.5 million kilometers) . By comparison, the Milky Way itself is roughly 100,000 light-years wide and 1,000 light-years thick. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-24e4d658&quot;&gt;A huge disk of gas around Sagittarius A* billows out as far as 5 to 30 light-years from the supermassive black hole. It is this huge, but tenuous, area of gas that gives a bit of material for Sagittarius A* activity. The region is known to emit X-rays due to feeding on the gas, or because of friction within the disk as temperatures soar to as much as 18 million degrees Fahrenheit (10 million degrees Celsius). &lt;/p&gt;&lt;p data-geo-id=&quot;geo-2ad8ed76&quot;&gt;Scientists would love to have more information about this supermassive black hole to figure out more about how it was formed and the conditions that made its growth possible. A couple of possibilities include smaller black holes getting quite large as they eat up dust and gas in the environment nearby; alternatively, smaller black holes may merge together and create something more monstrous.&lt;/p&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;c689474c-eac7-4a6f-a7c0-0b97ea89d150&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:7974px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:56.23%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-1200-80.jpg.webp 1200w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-970-80.jpg.webp 970w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-480-80.jpg.webp 480w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-320-80.jpg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;Image of Sagittarius A*, looks like a blurry orange donut against the black backdrop of space.&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij.jpg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij.jpg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-1200-80.jpg 1200w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-970-80.jpg 970w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-480-80.jpg 480w, https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij-320-80.jpg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij.jpg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/F2qM9GBVYhTWeZ9W3C7Eij.jpg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;An image of the supermassive black hole at the center of the Milky Way, a behemoth dubbed Sagittarius A*, revealed by the Event Horizon Telescope on May 12, 2022. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: Event Horizon Telescope collaboration)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-d7b33803&quot; id=&quot;f1cf1fd5-be48-4732-a4ae-cb955cd0d5cc&quot;&gt;Generally, scientists do have improving models for stellar-mass &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/15421-black-holes-facts-formation-discovery-sdcmp.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/15421-black-holes-facts-formation-discovery-sdcmp.html&quot;&gt;black holes&lt;/a&gt; and intermediate-mass black holes. These objects form when huge stars, many times the mass of our sun, collapse after stopping nuclear fusion. Since they are no longer able to stop the gravitational collapse, they shrink to a gravitationally powerful object that can warp time and space around it so much that light no longer can escape.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-4af6ce38&quot;&gt;We're gradually learning more about Sagittarius A* through efforts such as the &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/milky-way-monster-black-hole-first-image-eht&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/milky-way-monster-black-hole-first-image-eht&quot;&gt;&lt;u&gt;first-ever image of the black hole&lt;/u&gt;&lt;/a&gt;, which was obtained on May 12, 2022. The image captured faint amounts of light caused by heated matter moving super-fast towards the center of the black hole; the image is a high-definition shadow. This imaging required a big set of observatories around the world, approximately the size of &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/54-earth-history-composition-and-atmosphere.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/54-earth-history-composition-and-atmosphere.html&quot;&gt;Earth&lt;/a&gt; — which was possible through the &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/event-horizon-telescope.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/event-horizon-telescope.html&quot;&gt;Event Horizon Telescope&lt;/a&gt; (EHT).&lt;/p&gt;&lt;p data-geo-id=&quot;geo-28ee0827&quot;&gt;&lt;strong&gt;Related: &lt;/strong&gt;&lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/event-horizon-telescope-geography-black-holes.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/event-horizon-telescope-geography-black-holes.html&quot;&gt;Here's How Scientists Turned the World Into a Telescope (to See a Black Hole)&lt;/a&gt;&lt;/p&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-milky-way-galaxy-type-and-the-great-debate-of-1920&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-3b86d226&quot; id=&quot;section-milky-way-galaxy-type-and-the-great-debate-of-1920&quot;&gt;&lt;span&gt;Milky Way galaxy type and the great debate of 1920&lt;/span&gt;&lt;/h2&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;dbc968fc-ef54-4af1-8067-fa152806d556&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:3732px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:63.34%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-1200-80.jpg.webp 1200w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-970-80.jpg.webp 970w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-480-80.jpg.webp 480w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-320-80.jpg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;andromeda galaxy bathed in pink. The large spiral galaxy glows orange and pink and is filled with stars, gas and dust. It sits against a backdrop of stars and the blackness of space.&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF.jpg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF.jpg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-1200-80.jpg 1200w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-970-80.jpg 970w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-480-80.jpg 480w, https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF-320-80.jpg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF.jpg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/ZREypanfg3GboyC8knCLPF.jpg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;The Andromeda Galaxy is on a collision course with the Milky Way. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: Yang Hanwen and Zhou Zezhen)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-9836de43&quot; id=&quot;52c0fab3-0c9d-4fc1-90f9-ab3579f41418&quot;&gt;We are constantly building on our wealth of knowledge of the Milky Way, though up until relatively recently astronomers believed that all the stars in the sky belonged to our galaxy. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-bf0bcc0c&quot;&gt;&quot;The Great Debate&quot; in 1920 saw astronomers Herber Curtis and Harlow Shapley argue the scale of the universe and the prospect of &quot;island universes&quot; (galaxies), according to the &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;http://www.nasonline.org/about-nas/history/archives/milestones-in-NAS-history/the-great-debate-of-1920.html&quot; href=&quot;http://www.nasonline.org/about-nas/history/archives/milestones-in-NAS-history/the-great-debate-of-1920.html&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;National Academy of Sciences&lt;/a&gt;. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-04080087&quot;&gt;On one side of the debate, Shapley believed the Milky Way was much larger than previous estimates and that we weren't at the center. He also claimed that &quot;spiral nebulae&quot; such as Andromeda were a part of the Milky Way. On the other side of the debate, Curtis did not dispute Shapley's claims of a far larger Milky Way, he did however argue that there were large island universes (galaxies) such as Andromeda, that lay beyond the boundaries of the Milky Way. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-3dacc8ed&quot;&gt;The dispute was resolved when Edwin Hubble's measurements of Cepheid variable stars proved Andromeda was located far outside the Milky Way. Modern estimates suggest the &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/15590-andromeda-galaxy-m31.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/15590-andromeda-galaxy-m31.html&quot;&gt;Andromeda galaxy&lt;/a&gt;, our nearest galaxy neighbor is 2.5 million light-years away.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-17c66141&quot;&gt;More recently, astronomers have been trying to figure out what type of galaxy the Milky Way is. Our best estimates these days suggest that it is a barred spiral, meaning that there is a bar structure across the center. Astronomers can estimate the shape of the Milky Way by looking at its population of stars, as well as their movements across the sky.&lt;/p&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-a-future-collision-of-galactic-proportions&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-3d165a55&quot; id=&quot;section-a-future-collision-of-galactic-proportions&quot;&gt;&lt;span&gt;A future collision of galactic proportions&lt;/span&gt;&lt;/h2&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;26735759-4c1b-4cca-9813-e347235b744f&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:1024px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:56.25%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-1024-80.jpg.webp 1200w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-970-80.jpg.webp 970w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-480-80.jpg.webp 480w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-320-80.jpg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;two spiral galaxies colliding with each other. The galaxy on the left appears to be smaller and more brown/orange in color while the one on the right is larger and looks more blue.&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC.jpg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC.jpg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-1024-80.jpg 1200w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-970-80.jpg 970w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-480-80.jpg 480w, https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC-320-80.jpg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC.jpg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/8PRArvehMvSzdhWWFCq4VC.jpg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;Studying other galactic collisions provides insight into the future Andromeda and Milky Way merger. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: NASA Hyperwall)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-5c8e2d55&quot; id=&quot;924a2684-57de-405d-b9c6-ff54e9394a58&quot;&gt;We now know that the Milky Way resides within the Local Group of galaxies, made up of over 30 galaxies including Andromeda, Triangulum and Leo I to name but a few. It turns out that it's pretty good to know who your neighbors are, as they may be closer than you think. The Milky Way is currently hurtling towards Andromeda at 250,000mph (400,000 km/h). Though there is no need to worry just yet, this crash of cosmic proportions is not due for another 4 billion years. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-75262d63&quot;&gt;NASA and other space entities have been observing distant galaxy collisions for decades now to get a sense of what we might be facing when Andromeda and the Milky Way collide. The short story is there is little to worry about; the longer tale is the process is an interesting one as it shows how galaxies may evolve.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-9e9193fc&quot;&gt;For example, observations of a &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/three-galaxies-tug-of-war&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/three-galaxies-tug-of-war&quot;&gt;&lt;u&gt;three-way galactic collision&lt;/u&gt;&lt;/a&gt; in 2022 using the famed &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/15892-hubble-space-telescope.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/15892-hubble-space-telescope.html&quot;&gt;&lt;u&gt;Hubble Space Telescope&lt;/u&gt;&lt;/a&gt; gave some intriguing insights. The largest of the group, as it got into a tight orbit with the other two, snagged some material with its relatively stronger &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.livescience.com/37115-what-is-gravity.html&quot; href=&quot;https://www.livescience.com/37115-what-is-gravity.html&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;gravity&lt;/a&gt;. This created an intriguing streak of gas, dust and other materials flowing into the larger galaxy, visible even from Earth.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-4fece2e4&quot;&gt;While the arms of the Milky Way will surely be ripped up by this process, individual stars are relatively safe as the spaces between them are quite large. In other words, don't look for star collisions, as they will be practically non-existent. Starbirth, however, will accelerate due to the amount of gas being pumped into our galaxy, causing our galaxy to brighten and for its population to expand in the coming millions of years following the collision.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-519f035b&quot;&gt;Our own &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/16080-solar-system-planets.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/16080-solar-system-planets.html&quot;&gt;solar system&lt;/a&gt;, therefore, should be relatively safe due to the low risk of star collision. That said, we may find ourselves thrown into a completely different path around the new galactic center as the merger pushes through. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-301224a6&quot;&gt;One practical effect is that the constellations we observe from Earth may change as star orbits alter or new stars are added into the mix; that said, the collision is happening so far in the future that the constellations we see today may be altered in any case, due to natural starbirth and star death outside of the collision. This &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/gaia-milky-way-map-40000-stars&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/gaia-milky-way-map-40000-stars&quot;&gt;&lt;u&gt;Milky Way timelapse&lt;/u&gt;&lt;/a&gt; shows how the night sky will shift over time.&lt;/p&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-mapping-the-milky-way-s-history&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-a784ac15&quot; id=&quot;section-mapping-the-milky-way-s-history&quot;&gt;&lt;span&gt;Mapping the Milky Way's history&lt;/span&gt;&lt;/h2&gt;&lt;div class=&quot;jwplayer__widthsetter&quot; id=&quot;xY4kJ0h3&quot;&gt;
&lt;div class=&quot;jwplayer__wrapper&quot;&gt;
&lt;div class=&quot;future__jwplayer&quot; data-player-id=&quot;bQHItauA&quot; data-playlist-id=&quot;xY4kJ0h3&quot; id=&quot;futr_botr_xY4kJ0h3_bQHItauA_div&quot;&gt;
&lt;div id=&quot;botr_xY4kJ0h3_bQHItauA_div&quot;&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;&lt;p data-geo-id=&quot;geo-eaa5f64c&quot; id=&quot;6180ac05-1ae7-4481-b5b5-77350fefcdf1&quot;&gt;The evolution of the Milky Way began when clouds of gas and dust started collapsing, pushed together by &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/classical-gravity.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/classical-gravity.html&quot;&gt;&lt;u&gt;gravity&lt;/u&gt;&lt;/a&gt;. First stars sprung up from the collapsed clouds, those that we see today in the globular clusters. The spherical halo emerged soon after, followed by the flat galactic disk. The galaxy started small and grew as the inescapable force of gravity pulled everything together. &lt;/p&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;63edd7c4-711d-401e-ab11-c6651f7a02b5&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure pull-left inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:880px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:227.27%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-880-80.png.webp 1200w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-880-80.png.webp 1024w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-880-80.png.webp 970w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-650-80.png.webp 650w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-480-80.png.webp 480w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-320-80.png.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;Graphic showing the approximate timeline for the formation of the Milky Way.&quot; class=&quot;pull-left expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-880-80.png 1200w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-880-80.png 1024w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-880-80.png 970w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-650-80.png 650w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-480-80.png 480w, https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ-320-80.png 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/egmmkvS9568MQAStjMTmJZ.png&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;pull-left inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;The Milky Way is approximately 13.6 billion years old. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: Future)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-c685303b&quot; id=&quot;746f7a5c-7df5-4d5f-ae79-fb52d8990374&quot;&gt;The galaxy's evolution is, however, still shrouded in mystery. A discipline called galactic archaeology is slowly unraveling some of the puzzles of the Milky Way's life thanks to the Gaia mission, which released its first &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://sci.esa.int/web/gaia/-/58210-gaia-data-release-1#:~:text=One%20thousand%20days%20after%20launch,July%202014%20to%20September%202015.&quot; href=&quot;https://sci.esa.int/web/gaia/-/58210-gaia-data-release-1#:~:text=One%20thousand%20days%20after%20launch,July%202014%20to%20September%202015.&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;catalog of data &lt;/a&gt;in 2018. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-9efdd53b&quot; id=&quot;0254df6f-9a29-4c75-bb68-f3fe2674c435&quot;&gt;&lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/How_does_Gaia_study_the_Milky_Way&qu
