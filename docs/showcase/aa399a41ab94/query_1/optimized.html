ot; href=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/How_does_Gaia_study_the_Milky_Way&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;Gaia measures&lt;/a&gt; the exact positions and distances of more than 1 billion stars, as well as their light spectra, which enables scientists to understand the stars' composition and age, according to ESA. The position data allow astronomers to determine the speeds and directions in which the stars move in space. As things in space follow predictable trajectories, astronomers can reconstruct the paths of the stars billions of years into the past and future. Combining these reconstructed trajectories into one stellar movie captures the evolution of the galaxy over eons. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-18591fa7&quot; id=&quot;485f4b43-1a61-4f3b-81be-eb9155927ad9&quot;&gt;There is also &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Five_fascinating_Gaia_revelations_about_the_Milky_Way&quot; href=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Five_fascinating_Gaia_revelations_about_the_Milky_Way&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;evidence&lt;/a&gt; that the Milky Way collided with several smaller galaxies during its evolution. In 2018, a team of Dutch astronomers found &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Galactic_ghosts_Gaia_uncovers_major_event_in_the_formation_of_the_Milky_Way&quot; href=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Galactic_ghosts_Gaia_uncovers_major_event_in_the_formation_of_the_Milky_Way&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;a group of 30,000 stars&lt;/a&gt; moving in sync through the sun's neighborhood in the opposite direction to the rest of the stars in the data set. The motion pattern matched what scientists had previously seen in computer simulations of galactic collisions. These stars also differed in color and brightness, which suggested they came from a different galaxy. &lt;/p&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;e352577f-bdf1-4d82-93ef-9493d57a2e9f&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:1920px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:56.25%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-1200-80.jpg.webp 1200w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-970-80.jpg.webp 970w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-480-80.jpg.webp 480w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-320-80.jpg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;Monochrome image showing the Milky Way bulge stretching across the center and several smaller dwarf galaxies are seen in the vicinity. White boxes surround the smaller galaxies so their location can be seen.&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-1200-80.jpg 1200w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-970-80.jpg 970w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-480-80.jpg 480w, https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL-320-80.jpg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/XMhjHpgmk7Xhro6YTs79tL.jpg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;Contrary to expectations, dwarf galaxies in the vicinity of the Milky Way have only just arrived. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: ESA)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;div class=&quot;fancy-box&quot; id=&quot;7b1036cc-b4c9-497c-9d57-cc34f5f9461a&quot;&gt;&lt;div class=&quot;fancy_box-title&quot;&gt;Related stories:&lt;/div&gt;&lt;div class=&quot;fancy_box_body&quot;&gt;&lt;p class=&quot;fancy-box__body-text&quot; data-geo-id=&quot;geo-b6b73bf1&quot;&gt;— &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/23854-gaia-spacecraft-photos-milky-way-galaxy.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/23854-gaia-spacecraft-photos-milky-way-galaxy.html&quot;&gt;Photos: Gaia spacecraft mapping Milky Way galaxy&lt;/a&gt;&lt;/p&gt;&lt;p class=&quot;fancy-box__body-text&quot; data-geo-id=&quot;geo-49b13580&quot;&gt;— &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/57-stars-formation-classification-and-constellations.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/57-stars-formation-classification-and-constellations.html&quot;&gt;Star facts: The basics of star names and stellar evolution&lt;/a&gt; &lt;/p&gt;&lt;p class=&quot;fancy-box__body-text&quot; data-geo-id=&quot;geo-cc1da7da&quot;&gt;— &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/12637-stunning-galaxy-collision-photos.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/12637-stunning-galaxy-collision-photos.html&quot;&gt;When galaxies collide: Photos of great galactic crashes&lt;/a&gt;   &lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;p data-geo-id=&quot;geo-e64595fc&quot; id=&quot;e4525231-c23d-443e-8ebf-0e32a7d517f0&quot;&gt;Remnants of another, slightly younger, collision were spotted a year later. The Milky Way continues devouring smaller galaxies to this day. A galaxy called Sagittarius (not to be mistaken with the black hole) currently orbits close to the Milky Way and has likely &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Galactic_crash_may_have_triggered_Solar_System_formation&quot; href=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Galactic_crash_may_have_triggered_Solar_System_formation&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;smashed through its disk several times&lt;/a&gt; in the past 7 billion years. Using Gaia data, scientists found that these collisions triggered periods of intense star formation in the Milky Way and may even have something to do with the galaxy's trademark spiral shape. The study suggests that our sun was born during one of those periods some 4.6 billion years ago. &lt;/p&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-photographing-the-milky-way&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-3cb76007&quot; id=&quot;section-photographing-the-milky-way&quot;&gt;&lt;span&gt;Photographing the Milky Way&lt;/span&gt;&lt;/h2&gt;&lt;a data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;b0d02d13-ed5c-424c-b66f-c539c5c34dab&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;figure class=&quot;van-image-figure inline-layout&quot; data-bordeaux-image-check=&quot;&quot;&gt;&lt;div class=&quot;image-full-width-wrapper&quot;&gt;&lt;div class=&quot;image-widthsetter&quot; style=&quot;max-width:2133px;&quot;&gt;&lt;p class=&quot;vanilla-image-block&quot; style=&quot;padding-top:56.26%;&quot;&gt; &lt;picture data-new-v2-image=&quot;true&quot;&gt;
&lt;source sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-1200-80.jpg.webp 1200w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-970-80.jpg.webp 970w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-480-80.jpg.webp 480w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-320-80.jpg.webp 320w&quot; type=&quot;image/webp&quot;/&gt;
&lt;img alt=&quot;Milky way galaxy stretching across the night sky.&quot; class=&quot;expandable&quot; data-new-v2-image=&quot;true&quot; data-original-mos=&quot;https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ.jpg&quot; data-pin-media=&quot;https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ.jpg&quot; loading=&quot;lazy&quot; sizes=&quot;(min-width: 1000px) 970px, calc(100vw - 40px)&quot; src=&quot;https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ.jpg&quot; srcset=&quot;https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-1200-80.jpg 1200w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-970-80.jpg 970w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-480-80.jpg 480w, https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ-320-80.jpg 320w&quot;/&gt;
&lt;/picture&gt;&lt;a class=&quot;expand-button icon-expand-image icon&quot; data-hl-processed=&quot;none&quot; data-url=&quot;https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ.jpg&quot; href=&quot;https://cdn.mos.cms.futurecdn.net/cR4zdAkCXZFsY2owvZCUfQ.jpg&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;figcaption class=&quot;inline-layout&quot; itemprop=&quot;caption description&quot;&gt;&lt;span class=&quot;caption-text&quot;&gt;Photographing the Milky Way requires a dark sky. &lt;/span&gt;&lt;span class=&quot;credit&quot; itemprop=&quot;copyrightHolder&quot;&gt;(Image credit: Getty)&lt;/span&gt;&lt;/figcaption&gt;&lt;/figure&gt;&lt;/a&gt;&lt;p data-geo-id=&quot;geo-2c94d763&quot; id=&quot;ab588841-7112-422c-aaed-50cf91be3989&quot;&gt;Photographing the Milky Way requires a dark sky, a good &quot;season&quot; (generally between February and October), some distance from light pollution, and the ability to use photographic equipment to catch its faint light. Luckily, the Milky Way is visible in both the northern and southern hemispheres and it is possible to capture it using standard amateur photography items. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-00084fec&quot;&gt;If you can, get to your site in the daytime as you will likely want to scout the area for the best angles. Good Milky Way images tend to make use of the landscape in creative ways, so look for interesting and prominent natural features like mountains, boulders or rock shapes.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-e450ba59&quot;&gt;Next comes the photo shoot. Generally speaking, use a tripod, set your equipment for a timelapse mode and be prepared to experiment with different focuses and different lenses. For beginners, we also have a full guide on &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/how-to-photograph-the-milky-way-beginners-tips-tricks&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/how-to-photograph-the-milky-way-beginners-tips-tricks&quot; target=&quot;_blank&quot;&gt;&lt;u&gt;how to photograph the Milky Way&lt;/u&gt;&lt;/a&gt;.&lt;/p&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-the-future-of-the-milky-way-research&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h2 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-6606a825&quot; id=&quot;section-the-future-of-the-milky-way-research&quot;&gt;&lt;span&gt;The future of the Milky Way research&lt;/span&gt;&lt;/h2&gt;&lt;p data-geo-id=&quot;geo-891a07fd&quot; id=&quot;863c6782-f6eb-487b-9912-3fa06cb404ba&quot;&gt;Since the beginning of its operations, the Gaia mission has provided three updates to its massive stellar catalog. Astronomers from all over the world continue analyzing the data in search of new patterns and revelations. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-44910813&quot;&gt;Gaia data currently generates more research papers than even the famous &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/15892-hubble-space-telescope.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/15892-hubble-space-telescope.html&quot;&gt;Hubble Space Telescope&lt;/a&gt;. Gaia will continue charting the galaxy until at least 2025, as long as the spacecraft remains in good health, and the catalog it has compiled will keep astronomers busy for decades to come. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-ccb90254&quot;&gt;Before Gaia, the largest dataset about positions and distances of stars in the Milky Way came from a mission called &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.cosmos.esa.int/web/hipparcos&quot; href=&quot;https://www.cosmos.esa.int/web/hipparcos&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;Hipparcos&lt;/a&gt;, after an ancient Greek astronomer who began charting the night sky 150 years before Christ. Hipparcos only saw about 100,000 of the &lt;a data-analytics-id=&quot;inline-link&quot; data-before-rewrite-localise=&quot;https://www.space.com/21640-star-luminosity-and-magnitude.html&quot; data-mrf-recirculation=&quot;inline-link&quot; href=&quot;https://www.space.com/21640-star-luminosity-and-magnitude.html&quot;&gt;brightest stars&lt;/a&gt; in the sun's neighborhood, compared to Gaia's one billion. The data was also less precise. &lt;/p&gt;&lt;p data-geo-id=&quot;geo-305f500a&quot;&gt;Even though Gaia sees less than 1% of stars in the galaxy, astronomers can expand their findings and model the behavior of the entire Milky Way. &lt;/p&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-additional-resources&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h3 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-ff7fc7db&quot; id=&quot;section-additional-resources&quot;&gt;&lt;span&gt;Additional resources&lt;/span&gt;&lt;/h3&gt;&lt;p data-geo-id=&quot;geo-768dabd1&quot; id=&quot;4ff9be1c-e19c-47ca-a919-a3ba71440a6b&quot;&gt;Discover more about the Milky Way and other galaxies with this free learning material from the &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.open.edu/openlearn/mod/oucontent/view.php?id=66945&amp;amp;section=2.2&quot; href=&quot;https://www.open.edu/openlearn/mod/oucontent/view.php?id=66945&amp;amp;section=2.2&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;Open University&lt;/a&gt;. Explore the Milky Way in &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://sci.esa.int/web/gaia/-/60036-gaia-data-release-2-virtual-reality-resources&quot; href=&quot;https://sci.esa.int/web/gaia/-/60036-gaia-data-release-2-virtual-reality-resources&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;virtual reality&lt;/a&gt; with ESA's Gaia mission. Tour the Milky Way with &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://zah.uni-heidelberg.de/gaia/outreach/gaiasky&quot; href=&quot;https://zah.uni-heidelberg.de/gaia/outreach/gaiasky&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;Gaia Sky&lt;/a&gt;, a real-time, 3D, astronomy visualization software that uses ESA's Gaia mission data. Learn why it was so difficult to study the Milky Way before Gaia in this &lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Why_was_it_so_difficult_to_study_the_Milky_Way_before_Gaia&quot; href=&quot;https://www.esa.int/Science_Exploration/Space_Science/Gaia/Why_was_it_so_difficult_to_study_the_Milky_Way_before_Gaia&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;article from ESA&lt;/a&gt;. &lt;/p&gt;&lt;a aria-hidden=&quot;true&quot; class=&quot;paywall&quot; data-hl-processed=&quot;none&quot; data-url=&quot;&quot; href=&quot;&quot; id=&quot;elk-bibliography&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;&lt;/a&gt;&lt;h3 class=&quot;article-body__section&quot; data-geo-id=&quot;geo-8ae43fa9&quot; id=&quot;section-bibliography&quot;&gt;&lt;span&gt;Bibliography&lt;/span&gt;&lt;/h3&gt;&lt;p data-geo-id=&quot;geo-69e00d4d&quot; id=&quot;478c5826-2ecf-49e8-a1e8-420db29ecd1c&quot;&gt; Xiang, M., Rix, HW. &quot;&lt;a data-analytics-id=&quot;inline-link&quot; data-google-interstitial=&quot;false&quot; data-hl-processed=&quot;skimlinks&quot; data-mrf-recirculation=&quot;inline-link&quot; data-placeholder-url=&quot;https://go.redirectingat.com?id=92X1588396&amp;amp;xcust=hawk-custom-tracking&amp;amp;xs=1&amp;amp;url=https%3A%2F%2Fwww.nature.com%2Farticles%2Fs41586-022-04496-5%2520%23citeas&amp;amp;sref=https%3A%2F%2Fwww.space.com%2F19915-milky-way-galaxy.html&quot; data-url=&quot;https://www.nature.com/articles/s41586-022-04496-5%20#citeas&quot; href=&quot;https://go.redirectingat.com?id=92X1588396&amp;amp;xcust=space_us_3865923109706214356&amp;amp;xs=1&amp;amp;url=https%3A%2F%2Fwww.nature.com%2Farticles%2Fs41586-022-04496-5%2520%23citeas&amp;amp;sref=https%3A%2F%2Fwww.space.com%2F19915-milky-way-galaxy.html&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; rel=&quot;sponsored noopener&quot; target=&quot;_blank&quot;&gt;A time-resolved picture of our Milky Way's early formation history&lt;/a&gt;&quot;. Nature 603, 599–603 (2022). https://doi.org/10.1038/s41586-022-04496-5&lt;/p&gt;&lt;p data-geo-id=&quot;geo-ab7fe5b6&quot;&gt;Robin, Annie C., et al. &quot;&lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.aanda.org/articles/aa/abs/2003/38/aa3188/aa3188.html&quot; href=&quot;https://www.aanda.org/articles/aa/abs/2003/38/aa3188/aa3188.html&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;A synthetic view on structure and evolution of the Milky Way.&lt;/a&gt;&quot; Astronomy &amp;amp; Astrophysics 409.2 (2003): 523-540.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-c36876f2&quot;&gt;Dehnen, Walter, and James Binney. &quot;&lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://academic.oup.com/mnras/article/414/3/2446/1042117?login=true&quot; href=&quot;https://academic.oup.com/mnras/article/414/3/2446/1042117?login=true&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;Mass models of the Milky Way.&lt;/a&gt;&quot; Monthly Notices of the Royal Astronomical Society 294.3 (1998): 429-438.&lt;/p&gt;&lt;p data-geo-id=&quot;geo-ca740bb3&quot;&gt;Helmi, Amina. &quot;&lt;a data-analytics-id=&quot;inline-link&quot; data-hl-processed=&quot;none&quot; data-mrf-recirculation=&quot;inline-link&quot; data-url=&quot;https://www.annualreviews.org/doi/abs/10.1146/annurev-astro-032620-021917&quot; href=&quot;https://www.annualreviews.org/doi/abs/10.1146/annurev-astro-032620-021917&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; target=&quot;_blank&quot;&gt;Streams, substructures, and the early history of the Milky Way.&lt;/a&gt;&quot; Annual Review of Astronomy and Astrophysics 58 (2020): 205-256. &lt;/p&gt;
