&lt;/span&gt;&lt;p data-dcnode-id=&quot;2654&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-30090 entered error&quot; data-dcnode-id=&quot;2657&quot; data-lazy-sizes=&quot;(max-width: 1280px) 100vw, 1280px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world.jpg 1280w, https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world-836x470.jpg 836w, https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world-768x432.jpg 768w&quot; data-ll-status=&quot;error&quot; height=&quot;720&quot; sizes=&quot;(max-width: 1280px) 100vw, 1280px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world.jpg&amp;amp;raw&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world.jpg 1280w, https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world-836x470.jpg 836w, https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world-768x432.jpg 768w&quot; width=&quot;1280&quot;&gt;&lt;noscript data-dcnode-id=&quot;2655&quot;&gt;&lt;span data-dcnode-id=&quot;2656&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-30090&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world.jpg&quot; alt=&quot;&quot; width=&quot;1280&quot; height=&quot;720&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world.jpg 1280w, https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world-836x470.jpg 836w, https://www.disneytouristblog.com/wp-content/uploads/2019/08/guardians-galaxy-epcot-transformation-reimagining-disney-world-768x432.jpg 768w&quot; sizes=&quot;(max-width: 1280px) 100vw, 1280px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2653&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2648&quot;&gt;&lt;span data-dcnode-id=&quot;2652&quot; instrument_node=&quot;&quot;&gt;Guardians of the Galaxy: Cosmic Rewind is a Marvel-themed roller coaster under construction at Epcot. This first-of-its-kind attraction is the biggest addition of Walt Disney World’s 50th Anniversary. This covers everything you need to know about the ride: when it’ll open, concept art, details, and more. (&lt;/span&gt;&lt;em data-dcnode-id=&quot;2650&quot;&gt;&lt;span data-dcnode-id=&quot;2651&quot; instrument_node=&quot;&quot;&gt;Updated April 9, 2022&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2649&quot; instrument_node=&quot;&quot;&gt;.)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2647&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2645&quot;&gt;&lt;span data-dcnode-id=&quot;2646&quot; instrument_node=&quot;&quot;&gt;The saga of a Guardians of the Galaxy attraction at Walt Disney World dates back years. It started with rumors of a replacement for the iconic Twilight Zone Tower of Terror at Disney’s Hollywood Studios a la Guardians of the Galaxy – Mission Breakout at Disneyland Resort. Then came rumors that the Marvel misfits would take over the nearby Rock ‘n’ Roller Coaster Starring Aerosmith (an overlay that actually would’ve made a ton of sense).&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2644&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2642&quot;&gt;&lt;span data-dcnode-id=&quot;2643&quot; instrument_node=&quot;&quot;&gt;Walt Disney World has since officially announced Guardians of the Galaxy: Cosmic Rewind, replacing the dinosaurs of Universe of Energy at Epcot. Here’s everything we know about that attraction–for the latest developments, construction progress, and OFFICIAL OPENING DATE, scroll down to the “April 9, 2022 Update” heading…&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;adthrive-ad adthrive-content adthrive-content-1&quot; data-dcnode-id=&quot;2641&quot; id=&quot;AdThrive_Content_1_desktop&quot; style=&quot;min-height: 250px;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2640&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2635&quot;&gt;&lt;span data-dcnode-id=&quot;2639&quot; instrument_node=&quot;&quot;&gt;Walt Disney World has repeatedly referred to Guardians of the Galaxy: Cosmic Rewind as the first &lt;/span&gt;&lt;em data-dcnode-id=&quot;2637&quot;&gt;&lt;span data-dcnode-id=&quot;2638&quot; instrument_node=&quot;&quot;&gt;other&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;2636&quot; instrument_node=&quot;&quot;&gt;-world showcase pavilion at Epcot. While releasing new details about the three new neighborhoods replacing Future World, Disney shed more light on how this pavilion will fit into the park.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2634&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2632&quot;&gt;&lt;span data-dcnode-id=&quot;2633&quot; instrument_node=&quot;&quot;&gt;The former Universe of Energy Pavilion is now the Wonders of Xandar Pavilion, which will be come to Guardians of the Galaxy: Cosmic Rewind. The Wonders of Xandar Pavilion will be located in the World Discovery neighborhood of Epcot.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2631&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2627&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter wp-image-22702 size-full entered error&quot; data-dcnode-id=&quot;2630&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2017/07/guardians-galaxy-epcot-photo.jpg&quot; data-ll-status=&quot;error&quot; height=&quot;349&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/wp-content/uploads/2017/07/guardians-galaxy-epcot-photo.jpg&amp;amp;raw&quot; width=&quot;620&quot;&gt;&lt;noscript data-dcnode-id=&quot;2628&quot;&gt;&lt;span data-dcnode-id=&quot;2629&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter wp-image-22702 size-full&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2017/07/guardians-galaxy-epcot-photo.jpg&quot; alt=&quot;&quot; width=&quot;620&quot; height=&quot;349&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2626&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2624&quot;&gt;&lt;span data-dcnode-id=&quot;2625&quot; instrument_node=&quot;&quot;&gt;This area will showcase science, technology, and intergalactic adventure. Other offerings in the World Discovery area of Epcot will include the Play Pavilion, Space 220 Restaurant, Mission Space, and Test Track.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2623&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2621&quot;&gt;&lt;span data-dcnode-id=&quot;2622&quot; instrument_node=&quot;&quot;&gt;According to Disney, “Epcot just may be the perfect place for a Guardians-inspired attraction — Peter Quill (aka Star Lord) actually visited Epcot as a kid!” Plenty of EPCOT Center purists might disagree with that sentiment–whether that’s a good explanation for the thematic fit or a ham-fisted attempt at shoehorning Marvel into Epcot is in the eye of the beholder.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2620&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2616&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-22700 entered error&quot; data-dcnode-id=&quot;2619&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2017/07/guardians-galaxy-universe-energy.jpg&quot; data-ll-status=&quot;error&quot; height=&quot;274&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/wp-content/uploads/2017/07/guardians-galaxy-universe-energy.jpg&amp;amp;raw&quot; width=&quot;620&quot;&gt;&lt;noscript data-dcnode-id=&quot;2617&quot;&gt;&lt;span data-dcnode-id=&quot;2618&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-22700&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2017/07/guardians-galaxy-universe-energy.jpg&quot; alt=&quot;&quot; width=&quot;620&quot; height=&quot;274&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2615&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2613&quot;&gt;&lt;span data-dcnode-id=&quot;2614&quot; instrument_node=&quot;&quot;&gt;Regardless, Guardians of the Galaxy: Cosmic Rewind starts in the “Galaxarium,” a planetarium-like exhibition that explores the similarities and mysteries of the formation of Earth’s galaxy and Xandar.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;adthrive-ad adthrive-content adthrive-content-1&quot; data-dcnode-id=&quot;2612&quot; id=&quot;AdThrive_Content_2_desktop&quot; style=&quot;min-height: 250px;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2611&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2609&quot;&gt;&lt;span data-dcnode-id=&quot;2610&quot; instrument_node=&quot;&quot;&gt;The conceit is that the Nova Corps have arrived on earth (that’s a Star Blaster parked out front) and are inviting guests to learn more about the treasures Xandar has to share. The premise is likely to be that the main building houses a science museum type exhibition.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2608&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2604&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-32908 entered error&quot; data-dcnode-id=&quot;2607&quot; data-lazy-sizes=&quot;(max-width: 1000px) 100vw, 1000px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1.jpg 1000w, https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1-900x407.jpg 900w, https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1-768x347.jpg 768w&quot; data-ll-status=&quot;error&quot; height=&quot;452&quot; sizes=&quot;(max-width: 1000px) 100vw, 1000px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1.jpg&amp;amp;raw&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1.jpg 1000w, https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1-900x407.jpg 900w, https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1-768x347.jpg 768w&quot; width=&quot;1000&quot;&gt;&lt;noscript data-dcnode-id=&quot;2605&quot;&gt;&lt;span data-dcnode-id=&quot;2606&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-32908&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1.jpg&quot; alt=&quot;&quot; width=&quot;1000&quot; height=&quot;452&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1.jpg 1000w, https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1-900x407.jpg 900w, https://www.disneytouristblog.com/wp-content/uploads/2020/03/guardians-galaxy-cosmic-rewind-epcot-disney-world-concept-art-1-768x347.jpg 768w&quot; sizes=&quot;(max-width: 1000px) 100vw, 1000px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2603&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2601&quot;&gt;&lt;span data-dcnode-id=&quot;2602&quot; instrument_node=&quot;&quot;&gt;In the teaser video for the attraction in Epcot Experience, a recorded video of a Xandarian welcomes earthlings to the installation before being interrupted by Rocket Raccoon for being boring. (When the feed is restored, we hear the Xandarian say, “…and now you know the secret of the universe.”)&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2600&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2598&quot;&gt;&lt;span data-dcnode-id=&quot;2599&quot; instrument_node=&quot;&quot;&gt;The expectation is that the actual attraction will play out along these lines, with the pre-show involving an edutainment component that pays homage to the original message of EPCOT Center. That will likely be interrupted when the Guardians of the Galaxy arrive, culminating in the Big Bang, and an adventure across the cosmos ensuing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2597&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2593&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-30913 entered error&quot; data-dcnode-id=&quot;2596&quot; data-lazy-sizes=&quot;(max-width: 800px) 100vw, 800px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/10/epcot-experience-imagineering-preview-disney-world-326.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/10/epcot-experience-imagineering-preview-disney-world-326.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2019/10/epcot-experience-imagineering-preview-disney-world-326-768x411.jpg 768w&quot; data-ll-status=&quot;error&quot; height=&quot;428&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/wp-content/uploads/2019/10/epcot-experience-imagineering-preview-disney-world-326.jpg&amp;amp;raw&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/10/epcot-experience-imagineering-preview-disney-world-326.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2019/10/epcot-experience-imagineering-preview-disney-world-326-768x411.jpg 768w&quot; width=&quot;800&quot;&gt;&lt;noscript data-dcnode-id=&quot;2594&quot;&gt;&lt;span data-dcnode-id=&quot;2595&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-30913&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/10/epcot-experience-imagineering-preview-disney-world-326.jpg&quot; alt=&quot;&quot; width=&quot;800&quot; height=&quot;428&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2019/10/epcot-experience-imagineering-preview-disney-world-326.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2019/10/epcot-experience-imagineering-preview-disney-world-326-768x411.jpg 768w&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2592&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2590&quot;&gt;&lt;span data-dcnode-id=&quot;2591&quot; instrument_node=&quot;&quot;&gt;Walt Disney World is touting Guardians of the Galaxy: Cosmic Rewind as a “storytelling coaster,” which is to say it’s a roller coaster with show scenes. Disney has indicated that it’s a family-friendly attraction–but it’ll still probably have a height requirement.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2589&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2587&quot;&gt;&lt;span data-dcnode-id=&quot;2588&quot; instrument_node=&quot;&quot;&gt;Imagineering is calling this an OmniCoaster ride system, and it’s a collaboration between WDI and Vekoma, a Netherlands-based roller coaster manufacturer. Cosmic Rewind’s vehicles will be able to rotate 360 degrees and do a reverse launch–a first for Walt Disney World.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;adthrive-ad adthrive-content adthrive-content-1&quot; data-dcnode-id=&quot;2586&quot; id=&quot;AdThrive_Content_3_desktop&quot; style=&quot;min-height: 250px;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2585&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;2063&quot;&gt;&lt;span data-dcnode-id=&quot;2064&quot; instrument_node=&quot;&quot;&gt;Walt Disney Imagineering released the above video of the the OmniCoaster ride system.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2062&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2060&quot;&gt;&lt;span data-dcnode-id=&quot;2061&quot; instrument_node=&quot;&quot;&gt;This was presumably shot on Vekoma’s test track in the Netherlands, and not on-site at Walt Disney World or even in Glendale, California.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2059&quot; instrument_node=&quot;&quot;&gt;

uardians-galaxy-cosmic-rewind-ride-vehicle.jpeg&quot; alt=&quot;&quot; width=&quot;1280&quot; height=&quot;854&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle.jpeg 1280w, https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle-704x470.jpeg 704w, https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle-768x512.jpeg 768w, https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle-180x120.jpeg 180w&quot; sizes=&quot;(max-width: 1280px) 100vw, 1280px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2054&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2052&quot;&gt;&lt;span data-dcnode-id=&quot;2053&quot; instrument_node=&quot;&quot;&gt;For years, Disney stated that Guardians of the Galaxy: Cosmic Rewind would open “in time for the 50th anniversary of Walt Disney World Resort.” However, that has not been the case since the closure/reopening.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2051&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2049&quot;&gt;&lt;span data-dcnode-id=&quot;2050&quot; instrument_node=&quot;&quot;&gt;Walt Disney World did not offer any official statements about the opening timeline for Guardians of the Galaxy: Cosmic Rewind for over a year after Epcot closed and reopened. Fortunately, that has changed since Walt Disney World’s 50th Anniversary kicked off.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2048&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2046&quot;&gt;&lt;span data-dcnode-id=&quot;2047&quot; instrument_node=&quot;&quot;&gt;With that in mind, here’s a look at the latest updates, including the official opening date…&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;adthrive-ad adthrive-content adthrive-content-1&quot; data-dcnode-id=&quot;2045&quot; id=&quot;AdThrive_Content_4_desktop&quot; style=&quot;min-height: 250px;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2044&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;2042&quot;&gt;&lt;span data-dcnode-id=&quot;2043&quot; instrument_node=&quot;&quot;&gt;April 9, 2022 Update&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;2041&quot; instrument_node=&quot;&quot;&gt;

peg&quot; alt=&quot;&quot; width=&quot;1280&quot; height=&quot;720&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/03/guardians-galaxy-cosmic-rewind-opening-memorial-day-weekend-epcot.jpeg 1280w, https://www.disneytouristblog.com/wp-content/uploads/2022/03/guardians-galaxy-cosmic-rewind-opening-memorial-day-weekend-epcot-900x506.jpeg 900w, https://www.disneytouristblog.com/wp-content/uploads/2022/03/guardians-galaxy-cosmic-rewind-opening-memorial-day-weekend-epcot-768x432.jpeg 768w&quot; sizes=&quot;(max-width: 1280px) 100vw, 1280px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2036&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2031&quot;&gt;&lt;span data-dcnode-id=&quot;2035&quot; instrument_node=&quot;&quot;&gt;Walt Disney World has officially announced that &lt;/span&gt;&lt;a data-dcnode-id=&quot;2032&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/guardians-galaxy-cosmic-rewind-opening-date-epcot/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;strong data-dcnode-id=&quot;2033&quot;&gt;&lt;span data-dcnode-id=&quot;2034&quot; instrument_node=&quot;&quot;&gt;Guardians of the Galaxy: Cosmic Rewind will open on May 27, 2022!&lt;/span&gt;&lt;/strong&gt;&lt;/a&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2030&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2028&quot;&gt;&lt;span data-dcnode-id=&quot;2029&quot; instrument_node=&quot;&quot;&gt;This E-Ticket is Epcot’s biggest addition in years, and will be the blockbuster attraction of the summer season. Expect to see a huge marketing blitz as Walt Disney World tries to draw even more tourists to the already-crowded parks.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2027&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2023&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-43692 entered error&quot; data-dcnode-id=&quot;2026&quot; data-lazy-sizes=&quot;(max-width: 800px) 100vw, 800px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world-654x620.jpg 654w, https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world-768x728.jpg 768w&quot; data-ll-status=&quot;error&quot; height=&quot;758&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world.jpg&amp;amp;raw&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world-654x620.jpg 654w, https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world-768x728.jpg 768w&quot; width=&quot;800&quot;&gt;&lt;noscript data-dcnode-id=&quot;2024&quot;&gt;&lt;span data-dcnode-id=&quot;2025&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-43692&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world.jpg&quot; alt=&quot;&quot; width=&quot;800&quot; height=&quot;758&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world-654x620.jpg 654w, https://www.disneytouristblog.com/wp-content/uploads/2022/04/guardians-galaxy-cosmic-rewind-cast-previews-disney-world-768x728.jpg 768w&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;div class=&quot;adthrive-ad adthrive-content adthrive-content-1&quot; data-dcnode-id=&quot;2022&quot; id=&quot;AdThrive_Content_5_desktop&quot; style=&quot;min-height: 250px;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;2021&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2019&quot;&gt;&lt;span data-dcnode-id=&quot;2020&quot; instrument_node=&quot;&quot;&gt;In addition to that, we now know that Cast Member previews will open for registration on April 11 and a D23 member preview event opens for booking on April 12, 2022.&amp;nbsp;Our expectation is that Annual Passholder and Disney Vacation Club preview registration will go live sometime after that, probably only a few days later.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2018&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2012&quot;&gt;&lt;span data-dcnode-id=&quot;2017&quot; instrument_node=&quot;&quot;&gt;It’s common for Disney emails to be hit or miss, but you do not need the email invitation to register for the event–just the link in the email. Both of us will be watching for this like hawks in the coming days and weeks and will give subscribers to our newsletter a heads up ASAP when preview registration goes live. You can &lt;/span&gt;&lt;strong data-dcnode-id=&quot;2014&quot;&gt;&lt;a data-dcnode-id=&quot;2015&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/newsletter-2/&quot; rel=&quot;noopener noreferrer&quot; target=&quot;_blank&quot;&gt;&lt;span data-dcnode-id=&quot;2016&quot; instrument_node=&quot;&quot;&gt;subscribe to our FREE email newsletter for instant alerts&lt;/span&gt;&lt;/a&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;2013&quot; instrument_node=&quot;&quot;&gt;.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2011&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2007&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-43511 entered error&quot; data-dcnode-id=&quot;2010&quot; data-lazy-sizes=&quot;(max-width: 900px) 100vw, 900px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/02/guardians-galaxy-cosmic-rewind-galaxarium-planetarium-queue-epcot-disney-world.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/02/guardians-galaxy-cosmic-rewind-galaxarium-planetarium-queue-epcot-disney-world.jpg 900w, https://www.disneytouristblog.com/wp-content/uploads/2022/02/guardians-galaxy-cosmic-rewind-galaxarium-planetarium-queue-epcot-disney-world-768x432.jpg 768w&quot; data-ll-status=&quot;error&quot; height=&quot;506&quot; sizes=&quot;(max-width: 900px) 100vw, 900px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/wp-content/uploads/2022/02/guardians-galaxy-cosmic-rewind-galaxarium-planetarium-queue-epcot-disney-world.jpg&amp;amp;raw&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/02/guardians-galaxy-cosmic-rewind-galaxarium-planetarium-queue-epcot-disney-world.jpg 900w, https://www.disneytouristblog.com/wp-content/uploads/2022/02/guardians-galaxy-cosmic-rewind-galaxarium-planetarium-queue-epcot-disney-world-768x432.jpg 768w&quot; width=&quot;900&quot;&gt;&lt;noscript data-dcnode-id=&quot;2008&quot;&gt;&lt;span data-dcnode-id=&quot;2009&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-43511&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/02/guardians-galaxy-cosmic-rewind-galaxarium-planetarium-queue-epcot-disney-world.jpg&quot; alt=&quot;&quot; width=&quot;900&quot; height=&quot;506&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/02/guardians-galaxy-cosmic-rewind-galaxarium-planetarium-queue-epcot-disney-world.jpg 900w, https://www.disneytouristblog.com/wp-content/uploads/2022/02/guardians-galaxy-cosmic-rewind-galaxarium-planetarium-queue-epcot-disney-world-768x432.jpg 768w&quot; sizes=&quot;(max-width: 900px) 100vw, 900px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2006&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;2003&quot;&gt;&lt;span data-dcnode-id=&quot;2004&quot; style=&quot;font-family: -apple-system, BlinkMacSystemFont, 'segoe ui', Roboto, Oxygen-Sans, Ubuntu, Cantarell, 'helvetica neue', sans-serif;&quot;&gt;&lt;span data-dcnode-id=&quot;2005&quot; instrument_node=&quot;&quot;&gt;Beyond that, Walt Disney World has already been offering select groups previews of the queue and pre-show, known as the Galaxarium (pictured above). This planetarium-like exhibition showcases the connections between Xandar and Earth. &lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;2002&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1999&quot;&gt;&lt;span data-dcnode-id=&quot;2000&quot; style=&quot;font-family: -apple-system, BlinkMacSystemFont, 'segoe ui', Roboto, Oxygen-Sans, Ubuntu, Cantarell, 'helvetica neue', sans-serif;&quot;&gt;&lt;span data-dcnode-id=&quot;2001&quot; instrument_node=&quot;&quot;&gt;The full Galaxarium loop will be over 30 minutes long (assuming you’re waiting in line that long–unlikely if you buy an Individual Lightning Lane), and will include Xandar, Earth, the Andromeda, Milky Way Galaxies, and Star-Lord’s iconic Awesome Mix Vol. 1!&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1998&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1994&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-42160 entered error&quot; data-dcnode-id=&quot;1997&quot; data-lazy-sizes=&quot;(max-width: 1080px) 100vw, 1080px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg 1080w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world-827x620.jpeg 827w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world-768x576.jpeg 768w&quot; data-ll-status=&quot;error&quot; height=&quot;810&quot; sizes=&quot;(max-width: 1080px) 100vw, 1080px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg&amp;amp;raw&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg 1080w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world-827x620.jpeg 827w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world-768x576.jpeg 768w&quot; width=&quot;1080&quot;&gt;&lt;noscript data-dcnode-id=&quot;1995&quot;&gt;&lt;span data-dcnode-id=&quot;1996&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-42160&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg&quot; alt=&quot;&quot; width=&quot;1080&quot; height=&quot;810&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg 1080w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world-827x620.jpeg 827w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-guardians-galaxy-cosmic-rewind-epcot-disney-world-768x576.jpeg 768w&quot; sizes=&quot;(max-width: 1080px) 100vw, 1080px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;div class=&quot;adthrive-ad adthrive-content adthrive-content-1&quot; data-dcnode-id=&quot;1993&quot; id=&quot;AdThrive_Content_6_desktop&quot; style=&quot;min-height: 250px;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1992&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1990&quot;&gt;&lt;span data-dcnode-id=&quot;1991&quot; instrument_node=&quot;&quot;&gt;The news about Guardians of the Galaxy: Cosmic Rewind’s opening is exciting, and unsurprising given the status of construction. By and large, the attraction is finished–just a little bit of landscaping around the Nova Corps Starblaster ship that’ll mark the Guardians of the Galaxy: Cosmic Rewind entrance.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1989&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1987&quot;&gt;&lt;span data-dcnode-id=&quot;1988&quot; instrument_node=&quot;&quot;&gt;Above is a look at the installation of that 51-foot-tall ship from earlier this winter courtesy of Walt Disney Imagineering.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1986&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1982&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-42157 entered error&quot; data-dcnode-id=&quot;1985&quot; data-lazy-sizes=&quot;(max-width: 1080px) 100vw, 1080px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg 1080w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-620x620.jpeg 620w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-768x768.jpeg 768w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-200x200.jpeg 200w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-50x50.jpeg 50w&quot; data-ll-status=&quot;error&quot; height=&quot;1080&quot; sizes=&quot;(max-width: 1080px) 100vw, 1080px&quot; src=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg&amp;amp;raw&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg 1080w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-620x620.jpeg 620w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-768x768.jpeg 768w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-200x200.jpeg 200w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-50x50.jpeg 50w&quot; width=&quot;1080&quot;&gt;&lt;noscript data-dcnode-id=&quot;1983&quot;&gt;&lt;span data-dcnode-id=&quot;1984&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-42157&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg&quot; alt=&quot;&quot; width=&quot;1080&quot; height=&quot;1080&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg 1080w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-620x620.jpeg 620w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-768x768.jpeg 768w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-200x200.jpeg 200w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-2-guardians-galaxy-cosmic-rewind-epcot-disney-world-50x50.jpeg 50w&quot; sizes=&quot;(max-width: 1080px) 100vw, 1080px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1981&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1979&quot;&gt;&lt;span data-dcnode-id=&quot;1980&quot; instrument_node=&quot;&quot;&gt;Last month, that prompted some online backlash from Walt Disney World fans who assume that support column will remain exposed. In some ways, I can’t totally fault those fans–not like WDI’s recent track record with ‘show’ is sterling in Epcot. Just take a look at the giant blue box behind the attraction or the giant off-center Stargate or water tacos in World Showcase Lagoon.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1978&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1976&quot;&gt;&lt;span data-dcnode-id=&quot;1977&quot; instrument_node=&quot;&quot;&gt;It certainly does not going to float like depicted in the concept art…but was anyone realistically expecting that? For one thing, Disney has always taken a lot of “artistic liberties” with concept art. For another, RCID has strict standards, making this essentially a 51-foot ninja star in the event of a hurricane if not properly secured. My expectation is that the column will be blended to the point that the ship draws the eye and the support structure is easily overlooked. I doubt it’ll be perfect, but hopefully that’s good enough.&lt;/span&gt;&lt;/p&gt;&lt;div class=&quot;adthrive-ad adthrive-content adthrive-content-1&quot; data-dcnode-id=&quot;1975&quot; id=&quot;AdThrive_Content_7_desktop&quot; style=&quot;min-height: 250px;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1974&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1970&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-42159&quot; data-dcnode-id=&quot;1973&quot; data-lazy-sizes=&quot;(max-width: 1076px) 100vw, 1076px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg 1076w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world-620x620.jpeg 620w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world-768x768.jpeg 768w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world-200x200.jpeg 200w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world-50x50.jpeg 50w&quot; height=&quot;1076&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201076%201076'%3E%3C/svg%3E&quot; width=&quot;1076&quot;&gt;&lt;noscript data-dcnode-id=&quot;1971&quot;&gt;&lt;span data-dcnode-id=&quot;1972&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-42159&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg&quot; alt=&quot;&quot; width=&quot;1076&quot; height=&quot;1076&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world.jpeg 1076w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world-620x620.jpeg 620w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world-768x768.jpeg 768w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world-200x200.jpeg 200w, https://www.disneytouristblog.com/wp-content/uploads/2022/01/ship-art-guardians-galaxy-cosmic-rewind-epcot-disney-world-50x50.jpeg 50w&quot; sizes=&quot;(max-width: 1076px) 100vw, 1076px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1969&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1967&quot;&gt;&lt;span data-dcnode-id=&quot;1968&quot; instrument_node=&quot;&quot;&gt;The Nova Corps Starblaster ship is the signature icon of the Wonders of Xandar pavilion and will help establish the Xandarian storyline inside the attraction.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1966&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1964&quot;&gt;&lt;span data-dcnode-id=&quot;1965&quot; instrument_node=&quot;&quot;&gt;Aside from that, work continues around this courtyard, on the attraction facade, painting columns, and roofing.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1963&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1959&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-41958&quot; data-dcnode-id=&quot;1962&quot; data-lazy-sizes=&quot;(max-width: 800px) 100vw, 800px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/12/jeff-vahle-2-guardians-galaxy-cosmic-rewind-construction-epcot-disney-world-423.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/12/jeff-vahle-2-guardians-galaxy-cosmic-rewind-construction-epcot-disney-world-423.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/12/jeff-vahle-2-guardians-galaxy-cosmic-rewind-construction-epcot-disney-world-423-768x554.jpg 768w&quot; height=&quot;577&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20577'%3E%3C/svg%3E&quot; width=&quot;800&quot;&gt;&lt;noscript data-dcnode-id=&quot;1960&quot;&gt;&lt;span data-dcnode-id=&quot;1961&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-41958&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/12/jeff-vahle-2-guardians-galaxy-cosmic-rewind-construction-epcot-disney-world-423.jpg&quot; alt=&quot;&quot; width=&quot;800&quot; height=&quot;577&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/12/jeff-vahle-2-guardians-galaxy-cosmic-rewind-construction-epcot-disney-world-423.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/12/jeff-vahle-2-guardians-galaxy-cosmic-rewind-construction-epcot-disney-world-423-768x554.jpg 768w&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;div class=&quot;adthrive-ad adthrive-content adthrive-content-1&quot; data-dcnode-id=&quot;1958&quot; id=&quot;AdThrive_Content_8_desktop&quot; style=&quot;min-height: 250px;&quot;&gt;&lt;/div&gt;&lt;span data-dcnode-id=&quot;1957&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1955&quot;&gt;&lt;span data-dcnode-id=&quot;1956&quot; instrument_node=&quot;&quot;&gt;Another very positive development is that Walt Disney World invited current Cast Members to apply for transfer opportunities from their existing roles to Guardians of the Galaxy: Cosmic Rewind earlier this winter.&amp;nbsp;Opening teams are normally onboarded a couple of months in advance for training, test &amp;amp; adjust, and any previews.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1954&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1952&quot;&gt;&lt;span data-dcnode-id=&quot;1953&quot; instrument_node=&quot;&quot;&gt;Those Cast Members should now be fully trained as of April 2022.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1951&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1947&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-41291&quot; data-dcnode-id=&quot;1950&quot; data-lazy-sizes=&quot;(max-width: 800px) 100vw, 800px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-epcot-disney-world.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-epcot-disney-world.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-epcot-disney-world-768x429.jpg 768w&quot; height=&quot;447&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20447'%3E%3C/svg%3E&quot; width=&quot;800&quot;&gt;&lt;noscript data-dcnode-id=&quot;1948&quot;&gt;&lt;span data-dcnode-id=&quot;1949&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-41291&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-epcot-disney-world.jpg&quot; alt=&quot;&quot; width=&quot;800&quot; height=&quot;447&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-epcot-disney-world.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-epcot-disney-world-768x429.jpg 768w&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1946&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1940&quot;&gt;&lt;span data-dcnode-id=&quot;1945&quot; instrument_node=&quot;&quot;&gt;Another development came via a story in a recent issue of &lt;/span&gt;&lt;a data-dcnode-id=&quot;1942&quot; href=&quot;https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;amp;url=https%3A//ew.com/movies/guardians-of-the-galaxy-cosmic-rewind-roller-coaster-preview-epcot/&quot; rel=&quot;noopener&quot; target=&quot;_blank&quot;&gt;&lt;em data-dcnode-id=&quot;1943&quot;&gt;&lt;span data-dcnode-id=&quot;1944&quot; instrument_node=&quot;&quot;&gt;Entertainment Weekly&lt;/span&gt;&lt;/em&gt;&lt;/a&gt;&lt;span data-dcnode-id=&quot;1941&quot; instrument_node=&quot;&quot;&gt;, there’s an interview with Imagineer Wyatt Winter.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1939&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1937&quot;&gt;&lt;span data-dcnode-id=&quot;1938&quot; instrument_node=&quot;&quot;&gt;He revealed that Cosmic Rewind will feature a “stand-alone” Guardians of the Galaxy story, inside the largest show building on Walt Disney World property. The attraction will feature digital media and the James Gunn-directed series’ signature soundtrack of pop-rock hits, all in the name of amping up the same “energy and excitement” from the films.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1936&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1932&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-41290&quot; data-dcnode-id=&quot;1935&quot; data-lazy-sizes=&quot;(max-width: 800px) 100vw, 800px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-2-epcot-disney-world.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-2-epcot-disney-world.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-2-epcot-disney-world-768x355.jpg 768w&quot; height=&quot;370&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20370'%3E%3C/svg%3E&quot; width=&quot;800&quot;&gt;&lt;noscript data-dcnode-id=&quot;1933&quot;&gt;&lt;span data-dcnode-id=&quot;1934&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-41290&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-2-epcot-disney-world.jpg&quot; alt=&quot;&quot; width=&quot;800&quot; height=&quot;370&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-2-epcot-disney-world.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-queue-concept-art-2-epcot-disney-world-768x355.jpg 768w&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1931&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1929&quot;&gt;&lt;span data-dcnode-id=&quot;1930&quot; instrument_node=&quot;&quot;&gt;Winter also didn’t reveal the ride’s launch speed–or whether it features a return launch–but he did say that the overall thrill factor of Guardians of the Galaxy: Cosmic Rewind is somewhere between that of Big Thunder Mountain Railroad and the Rock ‘n’ Roller Coaster.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1928&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1926&quot;&gt;&lt;span data-dcnode-id=&quot;1927&quot; instrument_node=&quot;&quot;&gt;He also indicated that this Guardians of the Galaxy story is on a unique timeline, and has some surprises in store. Given its time-traveling theme, the attraction will combine bits of Marvel and Walt Disney World history. “Fans of both the films and Disney parks are going to find Easter eggs,” Winter promises.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1925&quot; instrument_node=&quot;&quot;&gt;
