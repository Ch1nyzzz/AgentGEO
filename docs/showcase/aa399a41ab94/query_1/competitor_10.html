dcnode-id=&quot;1412&quot; instrument_node=&quot;&quot;&gt;&amp;lt;div class=&quot;player-unavailable&quot;&amp;gt;&amp;lt;h1 class=&quot;message&quot;&amp;gt;An error occurred.&amp;lt;/h1&amp;gt;&amp;lt;div class=&quot;submessage&quot;&amp;gt;&amp;lt;a href=&quot;https://www.youtube.com/watch?v=AuBHqwkPReU&quot; target=&quot;_blank&quot;&amp;gt;Try watching this video on www.youtube.com&amp;lt;/a&amp;gt;, or enable JavaScript if it is disabled in your browser.&amp;lt;/div&amp;gt;&amp;lt;/div&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/body&gt;&lt;/html&gt;&lt;/iframe&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1405&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1403&quot;&gt;&lt;span data-dcnode-id=&quot;1404&quot; instrument_node=&quot;&quot;&gt;During Destination D23, Disney also shared a special announcement (above) from Academy Award-nominated actress Glenn Close reprising her role as Nova Prime, the Xandarian leader and commander of the Nova Corps.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1402&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1400&quot;&gt;&lt;span data-dcnode-id=&quot;1401&quot; instrument_node=&quot;&quot;&gt;That’s not the only good news. Guardians of the Galaxy director James Gunn recently revealed that Cosmic Rewind has started shooting. This shouldn’t take too long (and might already be finished!), but it was one of the other holdups for Guardians of the Galaxy: Cosmic Rewind. That should no longer be the case, either.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1399&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1395&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-38872&quot; data-dcnode-id=&quot;1398&quot; data-lazy-sizes=&quot;(max-width: 900px) 100vw, 900px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/07/construction-epcot-disney-world-609.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/07/construction-epcot-disney-world-609.jpg 900w, https://www.disneytouristblog.com/wp-content/uploads/2021/07/construction-epcot-disney-world-609-768x452.jpg 768w&quot; height=&quot;530&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20900%20530'%3E%3C/svg%3E&quot; width=&quot;900&quot;&gt;&lt;noscript data-dcnode-id=&quot;1396&quot;&gt;&lt;span data-dcnode-id=&quot;1397&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-38872&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/07/construction-epcot-disney-world-609.jpg&quot; alt=&quot;&quot; width=&quot;900&quot; height=&quot;530&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/07/construction-epcot-disney-world-609.jpg 900w, https://www.disneytouristblog.com/wp-content/uploads/2021/07/construction-epcot-disney-world-609-768x452.jpg 768w&quot; sizes=&quot;(max-width: 900px) 100vw, 900px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1394&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1392&quot;&gt;&lt;span data-dcnode-id=&quot;1393&quot; instrument_node=&quot;&quot;&gt;In addition to this main entrance and exit, there is a large gravity building located backstage near Epcot’s parking lot. The set-up here is similar to that of Rock ‘n’ Roller Coaster over at Disney’s Hollywood Studios, which also launches into a hidden gravity or show building.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1391&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1389&quot;&gt;&lt;span data-dcnode-id=&quot;1390&quot; instrument_node=&quot;&quot;&gt;The main difference here is that this towering show building for the main roller coaster segments of the attraction is visible throughout Epcot. Despite being painted shades of “blend-in blue” and “go-away green,” it competes with Spaceship Earth for attention.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1388&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1384&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-35707&quot; data-dcnode-id=&quot;1387&quot; data-lazy-sizes=&quot;(max-width: 411px) 100vw, 411px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle-test-push-pull.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle-test-push-pull.jpg 411w, https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle-test-push-pull-312x470.jpg 312w&quot; height=&quot;620&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20411%20620'%3E%3C/svg%3E&quot; width=&quot;411&quot;&gt;&lt;noscript data-dcnode-id=&quot;1385&quot;&gt;&lt;span data-dcnode-id=&quot;1386&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-35707&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle-test-push-pull.jpg&quot; sizes=&quot;(max-width: 411px) 100vw, 411px&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle-test-push-pull.jpg 411w, https://www.disneytouristblog.com/wp-content/uploads/2020/11/guardians-galaxy-cosmic-rewind-ride-vehicle-test-push-pull-312x470.jpg 312w&quot; alt=&quot;&quot; width=&quot;411&quot; height=&quot;620&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1383&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1378&quot;&gt;&lt;span data-dcnode-id=&quot;1382&quot; instrument_node=&quot;&quot;&gt;As for the gravity building, I had a chance to see inside during the World’s Most Magical Celebration media event. My main impression is that &lt;/span&gt;&lt;em data-dcnode-id=&quot;1380&quot;&gt;&lt;span data-dcnode-id=&quot;1381&quot; instrument_node=&quot;&quot;&gt;it’s huge. &lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1379&quot; instrument_node=&quot;&quot;&gt;Hardly a bombshell revelation, as the colossal building is visible from across World Showcase Lagoon and has been one point of contention about the attraction.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1377&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1375&quot;&gt;&lt;span data-dcnode-id=&quot;1376&quot; instrument_node=&quot;&quot;&gt;Beyond the size of the space, there’s a lot of OmniCoaster track weaving through that colossal area. For me, the amount of track was the most reassuring aspect of the visit—it’s difficult to judge from the ground, but it looks like the ride duration should be fairly satisfying.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1374&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1370&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-40213&quot; data-dcnode-id=&quot;1373&quot; data-lazy-sizes=&quot;(max-width: 800px) 100vw, 800px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/09/guardians-galaxy-cosmic-rewind-opening-date-epcot-50th-anniversary-disney-world.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/09/guardians-galaxy-cosmic-rewind-opening-date-epcot-50th-anniversary-disney-world.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/09/guardians-galaxy-cosmic-rewind-opening-date-epcot-50th-anniversary-disney-world-768x434.jpg 768w&quot; height=&quot;452&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20452'%3E%3C/svg%3E&quot; width=&quot;800&quot;&gt;&lt;noscript data-dcnode-id=&quot;1371&quot;&gt;&lt;span data-dcnode-id=&quot;1372&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-40213&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/09/guardians-galaxy-cosmic-rewind-opening-date-epcot-50th-anniversary-disney-world.jpg&quot; alt=&quot;&quot; width=&quot;800&quot; height=&quot;452&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/09/guardians-galaxy-cosmic-rewind-opening-date-epcot-50th-anniversary-disney-world.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/09/guardians-galaxy-cosmic-rewind-opening-date-epcot-50th-anniversary-disney-world-768x434.jpg 768w&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1369&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1367&quot;&gt;&lt;span data-dcnode-id=&quot;1368&quot; instrument_node=&quot;&quot;&gt;There are also several tunnels, screens along the perimeter of the upper level of the track, a jump point, and even a large moon or planet that the OmniCoaster vehicles circle. It’s going to be a very obscure comparison, but the whole thing reminded me of a very amped-up version of Space Fantasy — The Ride (that’s very high praise). Photos weren’t allowed inside, so you’ll just have to take my word for all of that.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1366&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1364&quot;&gt;&lt;span data-dcnode-id=&quot;1365&quot; instrument_node=&quot;&quot;&gt;One thing that’s notable is that we did not wear hardhats or safety vests. That’s significant, as it means construction is finished inside the gravity building. In fact, Imagineers who guided the tour said that there’s only a brief window right now when they could greet groups, as testing will begin in the coming weeks. Now, that doesn’t mean Guardians of the Galaxy: Cosmic Rewind will be ready to open right at the beginning of Summer 2022, as there’s still that other building that’s home to the attraction’s opening act—roughly half of the attraction, per Imagineers.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1363&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1361&quot;&gt;&lt;span data-dcnode-id=&quot;1362&quot; instrument_node=&quot;&quot;&gt;When Will Guardians of the Galaxy Cosmic Rewind Open?&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1360&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1356&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-32643&quot; data-dcnode-id=&quot;1359&quot; data-lazy-sizes=&quot;(max-width: 800px) 100vw, 800px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/02/construction-epcot-future-world-disney-world-808.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/02/construction-epcot-future-world-disney-world-808.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2020/02/construction-epcot-future-world-disney-world-808-788x470.jpg 788w, https://www.disneytouristblog.com/wp-content/uploads/2020/02/construction-epcot-future-world-disney-world-808-768x458.jpg 768w&quot; height=&quot;477&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20477'%3E%3C/svg%3E&quot; width=&quot;800&quot;&gt;&lt;noscript data-dcnode-id=&quot;1357&quot;&gt;&lt;span data-dcnode-id=&quot;1358&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-32643&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/02/construction-epcot-future-world-disney-world-808.jpg&quot; alt=&quot;&quot; width=&quot;800&quot; height=&quot;477&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/02/construction-epcot-future-world-disney-world-808.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2020/02/construction-epcot-future-world-disney-world-808-788x470.jpg 788w, https://www.disneytouristblog.com/wp-content/uploads/2020/02/construction-epcot-future-world-disney-world-808-768x458.jpg 768w&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1355&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1351&quot;&gt;&lt;strong data-dcnode-id=&quot;1353&quot;&gt;&lt;span data-dcnode-id=&quot;1354&quot; instrument_node=&quot;&quot;&gt;UPDATE:&amp;nbsp;&lt;/span&gt;&lt;/strong&gt;&lt;span data-dcnode-id=&quot;1352&quot; instrument_node=&quot;&quot;&gt;As indicated above, Guardians of the Galaxy: Cosmic Rewind will open on May 27, 2022.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1350&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1348&quot;&gt;&lt;span data-dcnode-id=&quot;1349&quot; instrument_node=&quot;&quot;&gt;There’s no point in reading what follows now that Walt Disney World has officially announced the debut date. We’re leaving it here for the sake of posterity.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1347&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1345&quot;&gt;&lt;span data-dcnode-id=&quot;1346&quot; instrument_node=&quot;&quot;&gt;—&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1344&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1342&quot;&gt;&lt;span data-dcnode-id=&quot;1343&quot; instrument_node=&quot;&quot;&gt;Finally, there’s the question of when Guardians of the Galaxy: Cosmic Rewind will open. As noted above, Walt Disney World has revealed the nebulous “Summer 2022” timeframe. Technically, that means any time from June 21 through September 22, 2022.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1341&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1339&quot;&gt;&lt;span data-dcnode-id=&quot;1340&quot; instrument_node=&quot;&quot;&gt;Typically, that’s not how Walt Disney World’s seasons work. Rather than following the Farmer’s Almanac (or wherever those dates are derived), Disney uses the ‘colloquial calendar’ that defines summer in the United States as Memorial Day through Labor Day.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1338&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1334&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-40116&quot; data-dcnode-id=&quot;1337&quot; data-lazy-sizes=&quot;(max-width: 533px) 100vw, 533px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/09/fab-50-statues-epcot-disney-world-orlando-florida-347.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/09/fab-50-statues-epcot-disney-world-orlando-florida-347.jpg 533w, https://www.disneytouristblog.com/wp-content/uploads/2021/09/fab-50-statues-epcot-disney-world-orlando-florida-347-413x620.jpg 413w&quot; height=&quot;800&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20533%20800'%3E%3C/svg%3E&quot; width=&quot;533&quot;&gt;&lt;noscript data-dcnode-id=&quot;1335&quot;&gt;&lt;span data-dcnode-id=&quot;1336&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-40116&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/09/fab-50-statues-epcot-disney-world-orlando-florida-347.jpg&quot; alt=&quot;&quot; width=&quot;533&quot; height=&quot;800&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/09/fab-50-statues-epcot-disney-world-orlando-florida-347.jpg 533w, https://www.disneytouristblog.com/wp-content/uploads/2021/09/fab-50-statues-epcot-disney-world-orlando-florida-347-413x620.jpg 413w&quot; sizes=&quot;(max-width: 533px) 100vw, 533px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1333&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1328&quot;&gt;&lt;span data-dcnode-id=&quot;1332&quot; instrument_node=&quot;&quot;&gt;There’s every reason to believe that Disney will open Guardians of the Galaxy: Cosmic Rewind when it’s strategically most advantageous. Officially, the &lt;/span&gt;&lt;em data-dcnode-id=&quot;1330&quot;&gt;&lt;span data-dcnode-id=&quot;1331&quot; instrument_node=&quot;&quot;&gt;World’s Most Magical Celebration&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1329&quot; instrument_node=&quot;&quot;&gt; will last 18 months, through March 2023.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1327&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1325&quot;&gt;&lt;span data-dcnode-id=&quot;1326&quot; instrument_node=&quot;&quot;&gt;The 18-month anniversary celebration gives Walt Disney World the chance to do something of a soft reset about halfway through, “amping up” the festivities with new attractions and entertainment. This will incentivize visitors who already experienced the first half of the celebration to come back, and will also lure new guests. That halfway reset will likely be headlined by Guardians of the Galaxy: Cosmic Rewind.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1324&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1320&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter wp-image-32569 size-full&quot; data-dcnode-id=&quot;1323&quot; data-lazy-sizes=&quot;(max-width: 535px) 100vw, 535px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/02/guardians-galaxy-cosmic-rewind-poster-epcot-disney-world-770.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/02/guardians-galaxy-cosmic-rewind-poster-epcot-disney-world-770.jpg 535w, https://www.disneytouristblog.com/wp-content/uploads/2020/02/guardians-galaxy-cosmic-rewind-poster-epcot-disney-world-770-314x470.jpg 314w&quot; height=&quot;800&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20535%20800'%3E%3C/svg%3E&quot; width=&quot;535&quot;&gt;&lt;noscript data-dcnode-id=&quot;1321&quot;&gt;&lt;span data-dcnode-id=&quot;1322&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter wp-image-32569 size-full&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/02/guardians-galaxy-cosmic-rewind-poster-epcot-disney-world-770.jpg&quot; alt=&quot;&quot; width=&quot;535&quot; height=&quot;800&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2020/02/guardians-galaxy-cosmic-rewind-poster-epcot-disney-world-770.jpg 535w, https://www.disneytouristblog.com/wp-content/uploads/2020/02/guardians-galaxy-cosmic-rewind-poster-epcot-disney-world-770-314x470.jpg 314w&quot; sizes=&quot;(max-width: 535px) 100vw, 535px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1319&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1317&quot;&gt;&lt;span data-dcnode-id=&quot;1318&quot; instrument_node=&quot;&quot;&gt;Halfway through the 50th Anniversary Celebration would be roughly May 2022. Memorial Day weekend would make sense, as would early June 2022.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1316&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1314&quot;&gt;&lt;span data-dcnode-id=&quot;1315&quot; instrument_node=&quot;&quot;&gt;This would also align with test rides already having started for Walt Disney World leaders, and the fact that Cast Members are being recruited for the opening team.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1313&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1309&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-40961&quot; data-dcnode-id=&quot;1312&quot; data-lazy-sizes=&quot;(max-width: 800px) 100vw, 800px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/remys-ratatouille-adventure-epcot-genie-plus-disney-world-038.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/remys-ratatouille-adventure-epcot-genie-plus-disney-world-038.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/11/remys-ratatouille-adventure-epcot-genie-plus-disney-world-038-768x545.jpg 768w&quot; height=&quot;568&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20568'%3E%3C/svg%3E&quot; width=&quot;800&quot;&gt;&lt;noscript data-dcnode-id=&quot;1310&quot;&gt;&lt;span data-dcnode-id=&quot;1311&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-40961&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/remys-ratatouille-adventure-epcot-genie-plus-disney-world-038.jpg&quot; alt=&quot;&quot; width=&quot;800&quot; height=&quot;568&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/remys-ratatouille-adventure-epcot-genie-plus-disney-world-038.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/11/remys-ratatouille-adventure-epcot-genie-plus-disney-world-038-768x545.jpg 768w&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1308&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1306&quot;&gt;&lt;span data-dcnode-id=&quot;1307&quot; instrument_node=&quot;&quot;&gt;It’s also consistent with past precedent. Of the recent additions with summer openings at Walt Disney World, Pandora – World of Avatar debuted on May 27 and Toy Story Land opened on June 30.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1305&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1303&quot;&gt;&lt;span data-dcnode-id=&quot;1304&quot; instrument_node=&quot;&quot;&gt;It’s also worth noting that Pandora had extensive registration-only previews for APs and DVC prior to that in May. The same was true for Remy’s Ratatouille Adventure last fall. The latter was a savvy move by Disney, as it got locals and diehard fans to Epcot at a time that was otherwise uncrowded. The lead-up to Memorial Day is similarly an attendance lull, so lengthy previews might likewise be strategically advantageous.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1302&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1298&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-40516&quot; data-dcnode-id=&quot;1301&quot; data-lazy-sizes=&quot;(max-width: 800px) 100vw, 800px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/10/beacons-magic-spaceship-earth-epcot-disney-world-238.jpg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/10/beacons-magic-spaceship-earth-epcot-disney-world-238.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/10/beacons-magic-spaceship-earth-epcot-disney-world-238-768x512.jpg 768w, https://www.disneytouristblog.com/wp-content/uploads/2021/10/beacons-magic-spaceship-earth-epcot-disney-world-238-180x120.jpg 180w&quot; height=&quot;533&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20533'%3E%3C/svg%3E&quot; width=&quot;800&quot;&gt;&lt;noscript data-dcnode-id=&quot;1299&quot;&gt;&lt;span data-dcnode-id=&quot;1300&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-40516&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/10/beacons-magic-spaceship-earth-epcot-disney-world-238.jpg&quot; alt=&quot;&quot; width=&quot;800&quot; height=&quot;533&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/10/beacons-magic-spaceship-earth-epcot-disney-world-238.jpg 800w, https://www.disneytouristblog.com/wp-content/uploads/2021/10/beacons-magic-spaceship-earth-epcot-disney-world-238-768x512.jpg 768w, https://www.disneytouristblog.com/wp-content/uploads/2021/10/beacons-magic-spaceship-earth-epcot-disney-world-238-180x120.jpg 180w&quot; sizes=&quot;(max-width: 800px) 100vw, 800px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1297&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1295&quot;&gt;&lt;span data-dcnode-id=&quot;1296&quot; instrument_node=&quot;&quot;&gt;In our view, an official opening around Memorial Day or the weekend thereafter makes much more sense than debuting in July through September, which is almost entirely unprecedented. Usually, July bookings are strong regardless, with things dropping off in mid-August through September as schools go back into session.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1294&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1289&quot;&gt;&lt;span data-dcnode-id=&quot;1293&quot; instrument_node=&quot;&quot;&gt;Guardians of the Galaxy: Cosmic Rewind has a ton of marketing potential. It could convince Marvel enthusiasts (&lt;/span&gt;&lt;em data-dcnode-id=&quot;1291&quot;&gt;&lt;span data-dcnode-id=&quot;1292&quot; instrument_node=&quot;&quot;&gt;and there are a lot of them&lt;/span&gt;&lt;/em&gt;&lt;span data-dcnode-id=&quot;1290&quot; instrument_node=&quot;&quot;&gt;) to not just visit Epcot, but to book Walt Disney World trips. As such, we’d expect a June 2022 opening at the latest to take full advantage of this marketing potential.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1288&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1284&quot;&gt;&lt;img alt=&quot;&quot; class=&quot;aligncenter size-full wp-image-41285&quot; data-dcnode-id=&quot;1287&quot; data-lazy-sizes=&quot;(max-width: 600px) 100vw, 600px&quot; data-lazy-src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-attraction-poster-epcot.jpeg&quot; data-lazy-srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-attraction-poster-epcot.jpeg 600w, https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-attraction-poster-epcot-413x620.jpeg 413w&quot; height=&quot;900&quot; src=&quot;data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20900'%3E%3C/svg%3E&quot; width=&quot;600&quot;&gt;&lt;noscript data-dcnode-id=&quot;1285&quot;&gt;&lt;span data-dcnode-id=&quot;1286&quot; instrument_node=&quot;&quot;&gt;&amp;lt;img class=&quot;aligncenter size-full wp-image-41285&quot; src=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-attraction-poster-epcot.jpeg&quot; alt=&quot;&quot; width=&quot;600&quot; height=&quot;900&quot; srcset=&quot;https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-attraction-poster-epcot.jpeg 600w, https://www.disneytouristblog.com/wp-content/uploads/2021/11/guardians-galaxy-cosmic-rewind-attraction-poster-epcot-413x620.jpeg 413w&quot; sizes=&quot;(max-width: 600px) 100vw, 600px&quot; /&amp;gt;&lt;/span&gt;&lt;/noscript&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1283&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1281&quot;&gt;&lt;span data-dcnode-id=&quot;1282&quot; instrument_node=&quot;&quot;&gt;Of course, a lot could happen and change between now and then. It’s thus impossible to make any sort of credible predictions about when Guardians of the Galaxy: Cosmic Rewind will open beyond “Summer 2022.”&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1280&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1278&quot;&gt;&lt;span data-dcnode-id=&quot;1279&quot; instrument_node=&quot;&quot;&gt;Whenever it does open, Guardians of the Galaxy: Cosmic Rewind will instantly blast into the #1 attraction spot at Epcot. Regardless of how we might feel about how it fits into Epcot (both thematically and physically), this is undeniably a blockbuster attraction with a colossal budget and a ride system that’s likely to give it wide appeal to guests of all ages.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1277&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1275&quot;&gt;&lt;span data-dcnode-id=&quot;1276&quot; instrument_node=&quot;&quot;&gt;In short, Guardians of the Galaxy: Cosmic Rewind is likely to be a crowd-pleasing attraction that wows guests with both its thrills and technology, plus its layer of Imagineered detail and storytelling, plus popular music and the irreverence of these Marvel misfits. It’ll likely rival Star Wars: Rise of the Resistance, Tron Lightcycle Run, and Avatar Flight of Passage for the longest wait times and most coveted Lightning Lane selections in all of Walt Disney World.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1274&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;h3 data-dcnode-id=&quot;1249&quot;&gt;&lt;span data-dcnode-id=&quot;1250&quot; instrument_node=&quot;&quot;&gt;Your Thoughts&lt;/span&gt;&lt;/h3&gt;&lt;span data-dcnode-id=&quot;1248&quot; instrument_node=&quot;&quot;&gt;
&lt;/span&gt;&lt;p data-dcnode-id=&quot;1246&quot;&gt;&lt;span data-dcnode-id=&quot;1247&quot; instrument_node=&quot;&quot;&gt;Are you excited for Guardians of the Galaxy: Cosmic Rewind? If you’re also an EPCOT Center purist, are you apprehensive that this will fit the park, or do you think the storyline and pre-show will sufficiently weave things together? When do you predict that Guardians of the Galaxy: Cosmic Rewind will open? Do you agree or disagree with any of our thoughts? Any questions we can help you answer? Hearing your feedback–even when you disagree with us–is both interesting to us and helpful to other readers, so please share your thoughts below in the comments!&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;1245&quot; instrument_node=&quot;&quot;&gt;

&lt;/span&gt;&lt;p data-dcnode-id=&quot;896&quot;&gt;&lt;span data-dcnode-id=&quot;897&quot; instrument_node=&quot;&quot;&gt;“ Winter also didn’t reveal the ride’s launch speed–or whether it features a return launch–but he did say that the overall thrill factor of Guardians of the Galaxy: Cosmic Rewind is somewhere between that of Big Thunder Mountain Railroad and the Rock ‘n’ Roller Coaster.” This is probably not a common reaction, but I’m a bit sad about this characterization. I guess I was putting too much hope into the “story” part of this coming “storycoaster” and hoping it would be milder than it sounds. I’ve done the R’n’R coaster in the past, but am not really a fan of thrill rides generally. It feels like Disney is leaning more into thrill rides as time goes on and that disappoints me. My partner has a lower thrill tolerance than me and all of a sudden it feels like most major attractions are thrill-forward. Can I justify dragging him there in the future, with costs skyrocketing and the attraction types we may enjoy being replaced with higher-thrill rides? I guess that’s what most people expect from amusement parks, but I lived the EPCOT of my childhood, when every ride was pretty suitable for people across the spectrum of thrill-tolerance, size, and age.&lt;/span&gt;&lt;/p&gt;&lt;span data-dcnode-id=&quot;895&quot; instrument_node=&quot;&quot;&gt;
