seek to boost revenues and market share by maximizing their local relevance. Through Aggregation, they attempt to deliver economies of scale by creating regional, or sometimes global, operations. And through Arbitrage, they exploit disparities between national or regional markets, often by locating different parts of the supply chain in different places--for instance, call centers in India, factories in China, and retail shops in Western Europe. Ghemawat draws on several examples that illustrate how organizations use and balance these strategies and describes the trade-offs they make as they do so. Because most enterprises should draw from all three As to some extent, the framework can be used to develop a summary scorecard indicating how well the company is globalizing. However, given the tensions among the strategies, it's not enough simply to tick off the corresponding boxes. Strategic choice requires some degree of prioritization--and the framework can help with that as well. While it is possible to make progress on all three strategies, companies usually must focus on one or two when trying to build competitive advantage." data-dcnode-id="642" data-react-helmet="true" property="og:description"><meta content="/static/media/article.f69715d2..svg" data-dcnode-id="641" data-react-helmet="true" property="og:image"><meta content="en_US" data-dcnode-id="640" data-react-helmet="true" property="og:locale"><meta content="Harvard Business Publishing" data-dcnode-id="639" data-react-helmet="true" property="og:site_name"><meta content="@HarvardBizEdu" data-dcnode-id="638" data-react-helmet="true" property="twitter:creator"><meta content="summary_large_image" data-dcnode-id="637" data-react-helmet="true" property="twitter:card"><meta content="Managing Differences: The Central Challenge of Global Strategy, Japanese Version" data-dcnode-id="636" data-react-helmet="true" property="twitter:title"><meta content="The main goal of any international strategy should be to manage the ading" data-dcnode-id="305"><i class="he-icon he-call-to-action__icon courtesy-navigation__search-icon" data-dcnode-id="306" data-icon=""></i></button></nav><div class="courtesy-navigation__search-box" data-dcnode-id="294" id="searchBoxTopNav"><div class="courtesy-navigation__search-box-content" data-dcnode-id="295"><section aria-hidden="true" aria-label="Search Content" class="search undefined" data-dcnode-id="296"><form class="search__form" data-dcnode-id="297" role="search"><div class="typeahead search__typeahead" data-dcnode-id="302"><input aria-label="Search our catalog" class="search__input" data-dcnode-id="303" placeholder="Search our catalog" type="text" value=""></div><button aria-hidden="true" aria-label="Reset search" class="he-call-to-action he-button search__close-button qa-search-container__erase-btn is-dark is-link is-direct-color has-icon is-icon-only is-not-loading" data-dcnode-id="300" type="button"><i class="he-icon he-call-to-action__icon search__close-icon" data-dcnode-id="301" data-icon=""></i></button><button aria-label="Enter Search" class="he-call-to-action he-button search__search-button qa-search-container__search-button is-dark is-link is-direct-color has-icon is-icon-only is-not-loading" data-dcnode-id="298" type="submit"><i class="he-icon he-call-to-action__icon search__search-icon" data-dcnode-id="299" data-icon=""></i></button></form></section></div></div></section><div class="app-body" data-dcnode-id="38" id="maincontent"><div class="container" data-dcnode-id="39"><div class="item-detail-page-view" data-dcnode-id="114"><div data-dcnode-id="285" itemscope="" itemtype="http://schema.org/Product"><meta content="R0703C-PDF-JPN" data-dcnode-id="292" itemprop="mpn"><meta content="The main goal of any international strategy should be to manage the large differences that arise at the borders of markets. Yet executives often fail to exploit market and production discrepancies, focusing instead on the tensions between standardization and localization. In this article, Pankaj Ghemawat presents a new framework that encompasses all three effective responses to the challenges of globalization. He calls it the AAA Triangle. The As stand for the three distinct types of international strategy. Through Adaptation, companies seek to boost revenues and market share by maximizing their local relevance. Through Aggregation, they attempt to deliver economies of scale by creating regional, or sometimes global, operations. And through Arbitrage, they exploit disparities between national or regional markets, often by locating different parts of the supply chain in different places--for instance, call centers in India, factories in China, and retail shops in Western Europe. Ghemawat draws on several examples that illustrate how organizations use and balance these strategies and describes the trade-offs they make as they do so. Because most enterprises should draw from all three As to some extent, the framework can be used to develop a summary scorecard indicating how well the company is globalizing. However, given the tensions among the strategies, it's not enough simply to tick off the corresponding boxes. Strategic choice requires some degree of prioritization--and the framework can help with that as well. While it is possible to make progress on all three strategies, companies usually must focus on one or two when trying to build competitive advantage." data-dcnode-id="291" itemprop="description"><meta content="R0703C-PDF-JPN" data-dcnode-id="290" itemprop="sku"><meta content="Managing Differences: The Central Challenge of Global Strategy, Japanese Version" data-dcnode-id="289" itemprop="name"><link data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbsp.harvard.edu/static/media/article.f69715d2..svg&amp;raw" itemprop="image"><div data-dcnode-id="286" itemprop="brand" itemscope="" itemtype="http://schema.org/Brand"><meta content="Harvard Business Publishing" data-dcnode ls" role="tab"><span data-dcnode-id="179" instrument_node="">Included Materials</span></a></li><li class="tab__item" data-dcnode-id="174" role="presentation"><a aria-controls="related" aria-selected="false" class="tab__link is-not-active" data-dcnode-id="175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbsp.harvard.edu/product/R0703C-PDF-JPN%3FactiveTab%3Drelated%26itemFindingMethod%3D" id="related" role="tab"><span data-dcnode-id="176" instrument_node="">Related</span></a></li></ul></div></div><div class="tab-section__content" data-dcnode-id="116"><section class="overview-section" data-dcnode-id="117"><div class="overview-section__container" data-dcnode-id="118"><div class="overview-section__left-column" data-dcnode-id="167"><p class="overview-section__abstract-description" data-dcnode-id="168"><span class="Linkify" data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">The main goal of any international strategy should be to manage the large differences that arise at the borders of markets. Yet executives often fail to exploit market and production discrepancies, focusing instead on the tensions between standardization and localization. In this article, Pankaj Ghemawat presents a new framework that encompasses all three effective responses to the challenges of globalization. He calls it the AAA Triangle. The As stand for the three distinct types of international strategy. Through Adaptation, companies seek to boost revenues and market share by maximizing their local relevance. Through Aggregation, they attempt to deliver economies of scale by creating regional, or sometimes global, operations. And through Arbitrage, they exploit disparities between national or regional markets, often by locating different parts of the supply chain in different places--for instance, call centers in India, factories in China, and retail shops in Western Europe. Ghemawat draws on several examples that illustrate how organizations use and balance these strategies and describes the trade-offs they make as they do so. Because most enterprises should draw from all three As to some extent, the framework can be used to develop a summary scorecard indicating how well the company is globalizing. However, given the tensions among the strategies, it's not enough simply to tick off the corresponding boxes. Strategic choice requires some degree of prioritization--and the framework can help with that as well. While it is possible to make progress on all three strategies, companies usually must focus on one or two when trying to build competitive advantage.</span></span></p></div><div class="overview-section__right-column" data-dcnode-id="119"><div class="overview-section__learning-objectives-container" data-dcnode-id="161"><h6 class="overview-section__title" data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Learning Objectives</span></h6><div class="overview-section__learning-objectives" data-dcnode-id="162"><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">To see how to shift among and combine three types of globalization strategies: standardizing operations, customizing offerings to meet local needs, and exploiting cross-regional differences.</span></p></div></div><div class="overview-section__details" data-dcnode-id="120"><h6 class="overview-section__title" data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Details</span></h6><div class="overview-section__details-row" data-dcnode-id="153"><p class="overview-section__details-text" data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Pub Date:</span></p><p class="overview-section__details-text" data-dcnode-id="154"><span data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Mar 1, 2007</span></span></p></div><div class="overview-section__details-row" data-dcnode-id="148"><p class="overview-section__details-text" data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Discip
