</span><meta content="The main goal of any international strategy should be to manage the large differences that arise at the borders of markets. Yet executives often fail to exploit market and production discrepancies, focusing instead on the tensions between standardization and localization. In this article, Pankaj Ghemawat presents a new framework that encompasses all three effective responses to the challenges of globalization. He calls it the AAA Triangle. The A's stand for the three distinct types of international strategy. Through adaptation, companies seek to boost revenues and market share by maximizing their local relevance. Through aggregation, they attempt to deliver economies of scale by creating regional, or sometimes global, operations. And through arbitrage, they exploit disparities between national or regional markets, often by locating different parts of the supply chain in different places--for instance, call centers in India, factories in China, and retail shops in Western Europe. Ghemawat draws on several examples that illustrate how organizations use and balance these strategies and describes the trade-offs they make as they do so. Because most enterprises should draw from all three A's to some extent, the framework can be used to develop a summary scorecard indicating how well the company is globalizing. However, given the tensions among the strategies, it's not enough simply to tick off the corresponding boxes. Strategic choice requires some degree of prioritization--and the framework can help with that as well. While it is possible to make progress on all three strategies, companies usually must focus on one or two when trying to build competitive advantage." data-dcnode-id="113" lang="" name="citation_abstract"><span data-dcnode-id="112" instrument_node="">

</span><h2 class="title" data-dcnode-id="32"><span data-dcnode-id="33" instrument_node="">
        Abstract
        
      </span></h2><span data-dcnode-id="31" instrument_node="">
</span><div class="abstract-content selected" data-dcnode-id="26" id="enc-abstract"><span data-dcnode-id="30" instrument_node="">
</span><p data-dcnode-id="28"><span data-dcnode-id="29" instrument_node="">
      
      The main goal of any international strategy should be to manage the large differences that arise at the borders of markets. Yet executives often fail to exploit market and production discrepancies, focusing instead on the tensions between standardization and localization. In this article, Pankaj Ghemawat presents a new framework that encompasses all three effective responses to the challenges of globalization. He calls it the AAA Triangle. The A's stand for the three distinct types of international strategy. Through adaptation, companies seek to boost revenues and market share by maximizing their local relevance. Through aggregation, they attempt to deliver economies of scale by creating regional, or sometimes global, operations. And through arbitrage, they exploit disparities between national or regional markets, often by locating different parts of the supply chain in different places--for instance, call centers in India, factories in China, and retail shops in Western Europe. Ghemawat draws on several examples that illustrate how organizations use and balance these strategies and describes the trade-offs they make as they do so. Because most enterprises should draw from all three A's to some extent, the framework can be used to develop a summary scorecard indicating how well the company is globalizing. However, given the tensions among the strategies, it's not enough simply to tick off the corresponding boxes. Strategic choice requires some degree of prioritization--and the framework can help with that as well. While it is possible to make progress on all three strategies, companies usually must focus on one or two when trying to build competitive advantage.
