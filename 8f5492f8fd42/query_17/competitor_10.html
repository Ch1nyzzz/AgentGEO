</span><article class="post-367 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="657" id="post-367"><span data-dcnode-id="779" instrument_node="">
</span><header class="entry-header" data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">How cultural differences impact our communication and the way we do business with foreigners</span></h1><span data-dcnode-id="775" instrument_node=""> </span></header><span data-dcnode-id="772" instrument_node="">
</span><div class="entry-content" data-dcnode-id="686"><span data-dcnode-id="771" instrument_node="">
</span><div data-dcnode-id="760" style=""><div data-dcnode-id="769" style="display:inline;"><iframe allowtransparency="true" data-dcnode-id="770" frameborder="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/plugins/like.php%3Fhref%3Dhttp%253A%252F%252Faccentonlanguages.com%252Fblog%252F%253Fp%253D367%26send%3Dfalse%26layout%3Dbutton_count%26width%3D120%26show_faces%3Dfalse%26action%3Dlike%26colorscheme%3Dlight%26font%26height%3D21&amp;raw" style="border:none; overflow:hidden; width:120px; height:21px;"></iframe></div><div data-dcnode-id="765" style="display:inline;"><a class="twitter-share-button" data-count="horizontal" data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/share%3Furl%3Dhttp%253A%252F%252Faccentonlanguages.com%252Fblog%252F%253Fp%253D367"><span data-dcnode-id="768" instrument_node="">Tweet</span></a></div><div data-dcnode-id="761" style="display:inline;"><g:plusone data-dcnode-id="764" href="http://accentonlanguages.com/blog/?p=367" size="medium"></g:plusone></div></div><p data-dcnode-id="757" style="text-align: justify;"><span data-dcnode-id="758" style="color: #003300;"><span data-dcnode-id="759" instrument_node="">Culture is one of the factors that determine the way people think, act and interact; and it is composed of many layers. Some of them are obvious, such as customs, arts, food and celebrations. Others, such as social status, body language, social interaction, sense of humor, concept of time, or even the definition of insanity, aren’t as noticeable.</span></span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="753" style="text-align: justify;"><span data-dcnode-id="754" style="color: #003300;"><span data-dcnode-id="755" instrument_node="">The iceberg is often used as a metaphor to define culture: the external part directly visible above the “waterline”, with the much larger part hidden under the surface. Doing business with foreigners is about understanding this hidden part of their underlying culture.</span></span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="748" style="text-align: justify;"><span data-dcnode-id="749" style="color: #003300;"><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//accentonlanguages.com/blog/wp-content/uploads/2013/07/cultural-iceberg.jpg"><img alt="cultural iceberg" class="alignnone size-full wp-image-368" data-dcnode-id="751" height="474" sizes="(max-width: 709px) 85vw, (max-width: 909px) 67vw, (max-width: 984px) 61vw, (max-width: 1362px) 45vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//accentonlanguages.com/blog/wp-content/uploads/2013/07/cultural-iceberg.jpg&amp;raw" srcset="http://accentonlanguages.com/blog/wp-content/uploads/2013/07/cultural-iceberg.jpg 745w, http://accentonlanguages.com/blog/wp-content/uploads/2013/07/cultural-iceberg-300x190.jpg 300w" width="745"></a></span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="744" style="text-align: justify;"><span data-dcnode-id="745" style="color: #003300;"><span data-dcnode-id="746" instrument_node="">Every country has a specific inherent culture, which can vary from one region to another. Anthropologist Edward T. Hall introduced the concept of high and low-context culture, as well as the use of personal space by individuals within a culture.</span></span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="740" style="text-align: justify;"><span data-dcnode-id="741" style="color: #003300;"><span data-dcnode-id="742" instrument_node="">High-context cultures, which include many Asian, South American and African countries, value society and collectivity. Group harmony and intuition are important concepts. Context is more valuable than words themselves, and much of the meaning of speech is implied. Body language, eye behavior and even the use of silence are valued means of communication. In low-context cultures, however, facts, descriptions and precision of words are considered a lot more important than context. Logic is also given more credit than intuition and society tends to be individualistic. It is customary to speak out and explain one’s point of view in detail.</span></span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="736" style="text-align: justify;"><span data-dcnode-id="737" style="color: #003300;"><span data-dcnode-id="738" instrument_node="">As culture influences behavior and one’s reaction to a given situation, it is a primary element of communication in general and even more so in a business environment. Doing business with foreigners is particularly delicate: It can differ from one culture to another and what is customary in one country could be considered extremely rude in another one needs to be aware of the other person’s culture when a transaction is at stake.</span></span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="732" style="text-align: justify;"><span data-dcnode-id="733" style="color: #003300;"><span data-dcnode-id="734" instrument_node="">Business etiquette, negotiations and even contracts (the latter of which, in some countries, are a sign of distrust), are just a few of the numerous business practices that are influenced by culture.</span></span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="728" style="text-align: justify;"><span data-dcnode-id="729" style="color: #003300;"><span data-dcnode-id="730" instrument_node="">In the high-context Chinese culture formality is very important and hierarchy is a big part of the culture. It is therefore especially important to take these cultural aspects into consideration when doing business with China. Part of the business etiquette is to hand out or receive a business card with both hands, and it is considered rude not to look at it carefully before putting it away. In some countries, negotiations cannot take place before socializing, drinking tea or coffee or having a meal.</span></span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" style="color: #003300;"><span data-dcnode-id="726" instrument_node="">&nbsp;</span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//accentonlanguages.com/blog/wp-content/uploads/2013/07/Business-in-China.jpg"><img alt="Business in China" class="size-full wp-image-370 aligncenter" data-dcnode-id="725" height="366" sizes="(max-width: 500px) 85vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//accentonlanguages.com/blog/wp-content/uploads/2013/07/Business-in-China.jpg&amp;raw" srcset="http://accentonlanguages.com/blog/wp-content/uploads/2013/07/Business-in-China.jpg 500w, http://accentonlanguages.com/blog/wp-content/uploads/2013/07/Business-in-China-300x219.jpg 300w" width="500"></a></span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="718" style="text-align: justify;"><span data-dcnode-id="719" style="color: #003300;"><span data-dcnode-id="720" instrument_node="">It is essential to get acquainted with all these practices before a business trip or a meeting with foreigners.</span></span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="704" style="text-align: justify;"><span data-dcnode-id="715" style="color: #003300;"><span data-dcnode-id="716" instrument_node="">Hiring a language company for your business translations or interpretations will facilitate your professional interactions. It can prevent deal-breaking</span></span><span data-dcnode-id="714" instrument_node=""> </span><i data-dcnode-id="708"><span data-dcnode-id="712" style="color: #003300;"><span data-dcnode-id="713" instrument_node="">faux</span></span><span data-dcnode-id="711" instrument_node=""> </span><span data-dcnode-id="709" style="color: #003300;"><span data-dcnode-id="710" instrument_node="">pas</span></span></i><span data-dcnode-id="707" instrument_node=""> </span><span data-dcnode-id="705" style="color: #003300;"><span data-dcnode-id="706" instrument_node="">and other mistakes, and ensure a strong, successful long-term business relationship with your foreign collaborators.</span></span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="700" style="text-align: justify;"><span data-dcnode-id="701" style="color: #003300;"><span data-dcnode-id="702" instrument_node="">Trained bilingual and bicultural experts will help you with the translation of important documents and interpretation at conferences or meetings. Accent on Languages works with the best language professionals and can be a valuable partner for all your linguistic and cultural needs.</span></span></p><span data-dcnode-id="699" instrument_node="">
