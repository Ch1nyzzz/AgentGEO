ument_node="">Submit</span></button></form></aside><div class="nav-dropdown collapsed" data-dcnode-id="2431" data-v-b33947ae=""><div class="inner" data-dcnode-id="2432" data-v-b33947ae=""><div class="drop-box" data-dcnode-id="2458" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="2461" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="2462" instrument_node="">What is Open Access?</span></a><p data-dcnode-id="2459" data-v-b33947ae=""><span data-dcnode-id="2460" instrument_node="">Open Access is an initiative that aims to make scientific research freely available to all. To date our community has made over 100 million downloads. It’s based on principles of collaboration, unobstructed discovery, and, most importantly, scientific progression. As PhD students, we found it difficult to access the research we needed, so we decided to create a new Open Access publisher that levels the playing field for scientists across the world. How? By making research easy to access, and puts the academic needs of the researchers before the business interests of publishers.</span></p></div><div class="drop-box" data-dcnode-id="2453" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="2456" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/authors-and-editors"><span data-dcnode-id="2457" instrument_node="">Our authors and editors</span></a><p data-dcnode-id="2454" data-v-b33947ae=""><span data-dcnode-id="2455" instrument_node="">We are a community of more than 103,000 authors and editors from 3,291 institutions spanning 160 countries, including Nobel Prize winners and some of the world’s most-cited researchers. Publishing on IntechOpen allows authors to earn citations and find new collaborators, meaning more people see your work not only from your own field of study, but from other related fields too.</span></p></div><div class="drop-box" data-dcnode-id="2444" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="2451" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/content-alerts"><span data-dcnode-id="2452" instrument_node="">Content Alerts</span></a><p data-dcnode-id="2449" data-v-b33947ae=""><span data-dcnode-id="2450" instrument_node="">Brief introduction to this section that descibes Open Access especially from an IntechOpen perspective</span></p><a class="nav-item" data-dcnode-id="2447" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="2448" instrument_node="">How it works</span></a><a class="nav-item" data-dcnode-id="2445" data-v-b33947ae="" href="#"><span data-dcnode-id="2446" instrument_node="">Manage preferences</span></a></div><div class="drop-box" data-dcnode-id="2433" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="2442" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/contact-us"><span data-dcnode-id="2443" instrument_node="">Contact</span></a><p data-dcnode-id="2438" data-v-b33947ae=""><span data-dcnode-id="2441" instrument_node="">Want to get in touch? Contact our London head office or </span><a data-dcnode-id="2439" data-v-b33947ae="" href="#"><span data-dcnode-id="2440" instrument_node="">media team here</span></a></p><a class="drop-item" data-dcnode-id="2436" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/careers-at-intechopen"><span data-dcnode-id="2437" instrument_node="">Careers</span></a><p data-dcnode-id="2434" data-v-b33947ae=""><span data-dcnode-id="2435" instrument_node="">Our team is growing all the time, so we’re always on the lookout for smart people who want ode="">

                        </span></a><div class="ads-link" data-dcnode-id="2000" data-v-e85dd3ce="" id="intechopen-intechopen-5" style="padding-bottom: 4.5rem;"></div></div></div></aside><div class="middle-col" data-dcnode-id="499" data-v-e85dd3ce=""><div class="info collapsed" data-dcnode-id="1967" data-v-7ab7a970="" data-v-e85dd3ce="" id="section-chapter-and-author"><div class="toggle-header" data-dcnode-id="1988" data-v-7ab7a970=""><h2 class="title" data-dcnode-id="1991" data-v-7ab7a970=""><span data-dcnode-id="1992" instrument_node="">Author Information</span></h2><a class="title" data-dcnode-id="1989" data-v-7ab7a970=""><span data-dcnode-id="1990" instrument_node="">Show +</span></a></div><div class="wrap" data-dcnode-id="1968" data-v-7ab7a970=""><ul data-dcnode-id="1971" data-v-7ab7a970=""><li class="authorsItem" data-dcnode-id="1980" data-v-7ab7a970=""><h4 class="author" data-dcnode-id="1985" data-v-7ab7a970=""><span data-dcnode-id="1987" instrument_node="">Lowell C.  Matthews</span></h4><span class="position" data-dcnode-id="1981" data-v-7ab7a970=""><ul class="list" data-dcnode-id="1982"><li data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Southern New Hampshire University, Manchester, NH, USA</span></li></ul></span></li><li class="authorsItem" data-dcnode-id="1972" data-v-7ab7a970=""><h4 class="author" data-dcnode-id="1977" data-v-7ab7a970=""><span data-dcnode-id="1979" instrument_node="">Bharat S.  Thakkar</span></h4><span class="position" data-dcnode-id="1973" data-v-7ab7a970=""><ul class="list" data-dcnode-id="1974"><li data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">PREMGroup, Inc. and Faculty, College of Business, Walden University, USA</span></li></ul></span></li></ul><p class="title" data-dcnode-id="1969" data-v-7ab7a970=""><span data-dcnode-id="1970" instrument_node="">*Address all correspondence to: </span></p></div></div><div class="reader-body reader-body" data-dcnode-id="1137" data-v-2206b564="" data-v-e85dd3ce=""><div class="section" data-dcnode-id="1907" data-lvl="1" id="sec_1"><h2 class="heading main-title" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">1. Introduction</span></h2><p data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node="">In a global environment the ability to communicate effectively can be a challenge. Even when both parties speak the same language there can still be misunderstandings due to ethic and cultural differences. Over the last decade, there have been countless examples from the business sector that demonstrate how poor communication can lead to poor organizational performance. Understanding the impact of globalization on cross-culture communication is imperative for organizations seeking to create a competitive advantage in the global market. Recent economic challenges further highlight the need for organizations to develop the internal communication capacity necessary to control and monitor external threats. As society becomes more globally connected the ability to communicate across cultural boundaries has gained increasing prominence. Global businesses must understand how to communicate with employees and customers from different cultures in order to fulfill the organization’s mission and build value for stakeholders. The use of technology has had a profound impact on how businesses communicate globally and market their products and services. However, with the advancements in technology organizations must still be cognoscente of the culture nuisances that can potentially present obstacles in trying to increase profits and market share. According to Genevieve Hilton, “cultural proficiency doesn't mean memorizing every cultural nuance of every market. It's knowing when to listen, when to ask for help, and when—finally—to speak” [</span><a class="ref-link" data-dcnode-id="1961" data-ref-style="bibr" href="#B1"><span data-dcnode-id="1962" instrument_node="">1</span></a><span data-dcnode-id="1960" instrument_node="">].</span></p><p data-dcnode-id="1951"><span data-dcnode-id="1958" instrument_node="">For companies involved in global business operations the relationship of managers and subordinates in multinational firms is important. In research conducted by Thomas and Ravlin [</span><a class="ref-link" data-dcnode-id="1956" data-ref-style="bibr" href="#B2"><span data-dcnode-id="1957" instrument_node="">2</span></a><span data-dcnode-id="1955" instrument_node="">] it was found that participants to whom nationality was more important indicated lower perceptions of similarity with the manager, lower intentions to associate, and lower perceptions of managerial effectiveness. The results of the study strongly indicate that teaching members of different cultures to behave like each other is an ineffective approach to improving intercultural interactions in business settings [</span><a class="ref-link" data-dcnode-id="1953" data-ref-style="bibr" href="#B2"><span data-dcnode-id="1954" instrument_node="">2</span></a><span data-dcnode-id="1952" instrument_node="">]. Focus should be placed on using individual differences to create innovation. Training and development of individuals involved in intercultural interactions should involve more than simply promoting cultural adaptation</span></p><p data-dcnode-id="1946"><span data-dcnode-id="1950" instrument_node="">Communication is vital for businesses to effectively explain how their products and services differ from their competitors. Companies that are successfully able to communicate cross-culturally have a competitive advantage because they can devote more time and resources to conducting business and less time on internal and external communication issues [</span><a class="ref-link" data-dcnode-id="1948" data-ref-style="bibr" href="#B1"><span data-dcnode-id="1949" instrument_node="">1</span></a><span data-dcnode-id="1947" instrument_node="">]. Communication is necessary for individuals to express themselves and to fulfill basic needs. The same holds true for businesses, governments, and countries. Without the ability to communicate and understand each other, there would be chaos.Communication that is based on cultural understanding is more apt to prevent misunderstandings caused by personal biases and prejudices. </span></p><p data-dcnode-id="1938"><span data-dcnode-id="1945" instrument_node="">To illustrate the importance of communication on building relationships globally consider the example of the United States and South Korea. The relationship between these two countries is one built upon a rich history. In 1884, the United States government became the first foreign entity to purchase property in Korea [</span><a class="ref-link" data-dcnode-id="1943" data-ref-style="bibr" href="#B3"><span data-dcnode-id="1944" instrument_node="">3</span></a><span data-dcnode-id="1942" instrument_node="">]. Before this time no foreigner was permitted to live inside Seoul. Despite significant cultural differences, South Korea and the United States have been able to develop a communication process that other countries seek to replicate. The American Chamber of Commerce in Korea was established in 1953 with the chief purpose to promote the advancement of trade and commerce between Korea and the United States. Article II of the Chamber’s constitution outlines the following six objectives [</span><a class="ref-link" data-dcnode-id="1940" data-ref-style="bibr" href="#B4"><span data-dcnode-id="1941" instrument_node="">4</span></a><span data-dcnode-id="1939" instrument_node="">]:</span></p><ol data-dcnode-id="1919" style="list-style-type: order;"><li data-dcnode-id="1935"><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">To promote the development of commerce between the United States of America and Korea; </span></p></li><li data-dcnode-id="1932"><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">To promote measure calculated to benefit and protect the interests in Korea of member companies and citizens of the United States; </span></p></li><li data-dcnode-id="1929"><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">To represent, express, and give effect to the opinions of the Chamber business community of the United States regarding trade, commerce, finance, industry, and related questions; </span></p></li><li data-dcnode-id="1926"><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">To collect, evaluate, and disseminate among its members statistical and other information concerning commerce or other undertakings of interest to them; </span></p></li><li data-dcnode-id="1923"><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">To associate and cooperate with other organizations sharing mutual interests; </span></p></li><li data-dcnode-id="1920"><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">To do any and all other things incidental or related to the attainment of the above objectives.</span></p></li></ol><p data-dcnode-id="1908"><span data-dcnode-id="1918" instrument_node="">When countries are able to exchange ideas and communicate in an open society everyone benefits. Kathleen Stephens, U.S. Ambassador to the Republic of Korea, summed it up by saying, “we must use our shared interests and values to compliment and transform each other’s growth” [</span><a class="ref-link" data-dcnode-id="1916" data-ref-style="bibr" href="#B5"><span data-dcnode-id="1917" instrument_node="">5</span></a><span data-dcnode-id="1915" instrument_node="">]. The main purpose of this study is to develop a cross-cultural communication model that can be applied by companies that communicate with employees from different cultures. The aim is to identify the steps that leaders of organizations competing in a global environment should consider when communicating to different cultures. This study uses a group a college students participating in the 2</span><sup data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">nd</span></sup><span data-dcnode-id="1912" instrument_node=""> Korea America Student Conference (KASC) as the main research source for creating the model. KASC is supported by the International Student Conferences, a non-profit organization located in Washington, D.C., which sponsors student-run educational and cultural exchange programs for university students from the United States, Japan, and Korea [</span><a class="ref-link" data-dcnode-id="1910" data-ref-style="bibr" href="#B6"><span data-dcnode-id="1911" instrument_node="">6</span></a><span data-dcnode-id="1909" instrument_node="">]. The researchers used a mix of qualitative and quantitative research methodologies to generate the model. A comparative literature review is conducted and organizational examples of Samsung and Hyundai are considered to demonstrate the impact of globalization on cross-culture communication practices. The study also highlights the action research methodology that was employed to design the cross-culture communication model. In conclusion, the 4 C’s Global Leadership Model is introduced to demonstrate how organizational leaders can create innovation in a global environment by managing conflict, communication, creativity, and connectivity. </span></p></div><div class="section" data-dcnode-id="1572" data-lvl="1" id="sec_2"><span data-dcnode-id="1906" instrument_node="">
