2.1z" data-dcnode-id="1642"></path></svg><svg class="jw-svg-icon jw-svg-icon-fullscreen-on" data-dcnode-id="1639" focusable="false" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg"><path d="M96.3,186.1c1.9,1.9,1.3,4-1.4,4.4l-50.6,8.4c-1.8,0.5-3.7-0.6-4.2-2.4c-0.2-0.6-0.2-1.2,0-1.7l8.4-50.6c0.4-2.7,2.4-3.4,4.4-1.4l14.5,14.5l28.2-28.2l14.3,14.3l-28.2,28.2L96.3,186.1z M195.8,39.1l-50.6,8.4c-2.7,0.4-3.4,2.4-1.4,4.4l14.5,14.5l-28.2,28.2l14.3,14.3l28.2-28.2l14.5,14.5c1.9,1.9,4,1.3,4.4-1.4l8.4-50.6c0.5-1.8-0.6-3.6-2.4-4.2C197,39,196.4,39,195.8,39.1L195.8,39.1z" data-dcnode-id="1640"></path></svg><div class="jw-reset-text jw-tooltip jw-tooltip-fullscreen" data-dcnode-id="1637" dir="auto"><div class="jw-text" data-dcnode-id="1638"></div></div></div></div></div></div></div><div class="afs_ads ad-placement" data-dcnode-id="1630" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="1631" instrument_node="">&nbsp;</span></div></div><h2 class="heading main-title" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">2. Literature review</span></h2><p data-dcnode-id="1619"><span data-dcnode-id="1626" instrument_node="">Research on cross-cultural communication often focuses on understanding how individual differences influence our ability to communicate with others. Since most individuals grow up within a single culture having to interact with others from a different culture or background can represent a challenge [</span><a class="ref-link" data-dcnode-id="1624" data-ref-style="bibr" href="#B7"><span data-dcnode-id="1625" instrument_node="">7</span></a><span data-dcnode-id="1623" instrument_node="">]. Exposure to different cultures affects our ability to communicate with others in a way that leads to positive outcomes. Fink, Neyer, and Kölling propose that researchers involved in cross-cultural studies should develop an understanding of the interrelations between cultural dimensions, cultural standards, and personality traits [</span><a class="ref-link" data-dcnode-id="1621" data-ref-style="bibr" href="#B7"><span data-dcnode-id="1622" instrument_node="">7</span></a><span data-dcnode-id="1620" instrument_node="">]. This increased awareness helps an individual to manage their own cross-cultural behavior as well as that of others. </span></p><p data-dcnode-id="1608"><span data-dcnode-id="1618" instrument_node="">Reza Najafbagy refers to co-orientation, the ability to familiarize all aspects of one’s own life in relation to someone of a different culture, as a primary component of intercultural communication [</span><a class="ref-link" data-dcnode-id="1616" data-ref-style="bibr" href="#B8"><span data-dcnode-id="1617" instrument_node="">8</span></a><span data-dcnode-id="1615" instrument_node="">]. Individuals that have experienced different cultures are more cognizant of how to alter their communication style so that others understand the information they are trying to transfer. Research conducted by Seak and Enderwick revealed the importance of providing cross-cultural communication and training skills for expatriates assigned to foreign locations in particularly, China, Hong Kong, Taiwan, Japan and South Korea [</span><a class="ref-link" data-dcnode-id="1613" data-ref-style="bibr" href="#B9"><span data-dcnode-id="1614" instrument_node="">9</span></a><span data-dcnode-id="1612" instrument_node="">]. Now more than ever global organizations must ensure that their employees have the skills required to communicate across cultural boundaries. Cross-cultural communication enhances innovation by allowing for collective problem solving and the open dissemination of information [</span><a class="ref-link" data-dcnode-id="1610" data-ref-style="bibr" href="#B10"><span data-dcnode-id="1611" instrument_node="">10</span></a><span data-dcnode-id="1609" instrument_node="">].</span></p><p data-dcnode-id="1600"><span data-dcnode-id="1607" instrument_node="">Cohen and Levinthal define the term absorptive capacity as an organization’s ability to identify and recognize the value of new external information, absorb it, and implement it into their business operations [</span><a class="ref-link" data-dcnode-id="1605" data-ref-style="bibr" href="#B11"><span data-dcnode-id="1606" instrument_node="">11</span></a><span data-dcnode-id="1604" instrument_node="">]. Organizations that understand the importance of external information are better able to use their core competencies to create a competitive advantage. Cross-culture communication enhances an organization’s absorptive capacity because it provides a new of perspective for satisfying the needs of stakeholders.Communication is the life-blood of organizations and must be allowed to flow throughout the entire organization. However, when information flows are random and there is no apparent directive of how to apply the outside knowledge the organization will not benefit [</span><a class="ref-link" data-dcnode-id="1602" data-ref-style="bibr" href="#B11"><span data-dcnode-id="1603" instrument_node="">11</span></a><span data-dcnode-id="1601" instrument_node="">]. Productivity decreases when organizational leaders are not able to communicate clear and concise expectations. Furthermore, conflict and tension arises when employees do not understand how their personal efforts contribute to the overall success of the organization.</span></p><p data-dcnode-id="1592"><span data-dcnode-id="1599" instrument_node="">Culture can affect how we perceive the actions of others. Ambassador Stephens gave the example of a “cheerleading group from North Korea that was participating in a sports competition in South Korea. When the group was heading to the venue one of the cheerleaders yelled for the bus stop. She then proceeds to get off the bus in the rain to get a poster of the North Korean leader that was getting wet. Why? Usually, 70% of Americans would say it was for show. 70% of Koreans would respond that the cheerleader really felt something” [</span><a class="ref-link" data-dcnode-id="1597" data-ref-style="bibr" href="#B5"><span data-dcnode-id="1598" instrument_node="">5</span></a><span data-dcnode-id="1596" instrument_node="">]. Our perception of others directly affects how we interpret their behavior and actions. Effective cross-culture communication requires that we base our perceptions on facts and not merely on personal biases and prejudices. The Global Leadership and Organizational Behavior Effectiveness Project (GLOBE) examined cultural values of organizational practices and leadership. The study focuses on identifying cultural influences on leadership and management practices. Some scholars believe that as society becomes more interconnected cultural differences will converge [</span><a class="ref-link" data-dcnode-id="1594" data-ref-style="bibr" href="#B12"><span data-dcnode-id="1595" instrument_node="">12</span></a><span data-dcnode-id="1593" instrument_node="">]. Even though some convergence may occur over time, countries will still maintain distinct cultural differences that will transcend technology and external influences.</span></p><p data-dcnode-id="1584"><span data-dcnode-id="1591" instrument_node="">Successful business leaders must be able to balance organizational objectives with external global challenges. As organizations become more interconnected the role of leaders in managing global teams is becoming increasingly important. Being able to navigate through different cultural nuances is a key skill for global leaders. Rabotin defines cultural intelligence as “the ability to interact with others from diverse cultural backgrounds, being aware of our cultural values that drive our attitudes, behaviors, and beliefs” [</span><a class="ref-link" data-dcnode-id="1589" data-ref-style="bibr" href="#B13"><span data-dcnode-id="1590" instrument_node="">13</span></a><span data-dcnode-id="1588" instrument_node="">]. Regardless of their geographic location leaders must be able to communicate across borders in order to create a competitive advantage and achieve results. It is clearly apparent that physical boundaries are increasingly becoming transparent. A global leader must be aware of their personal cultural biases and be willing to change their opinions by learning from those that are different from them [</span><a class="ref-link" data-dcnode-id="1586" data-ref-style="bibr" href="#B13"><span data-dcnode-id="1587" instrument_node="">13</span></a><span data-dcnode-id="1585" instrument_node="">]. </span></p><p data-dcnode-id="1573"><span data-dcnode-id="1583" instrument_node="">In research conducted by Choi and Chang it was noted that organizational culture directly impacts the attitudes and motivation of employees towards innovation [</span><a class="ref-link" data-dcnode-id="1581" data-ref-style="bibr" href="#B14"><span data-dcnode-id="1582" instrument_node="">14</span></a><span data-dcnode-id="1580" instrument_node="">]. The researchers identified three organizational factors of management support, resource availability, and support for learning as key enablers for innovation [</span><a class="ref-link" data-dcnode-id="1578" data-ref-style="bibr" href="#B14"><span data-dcnode-id="1579" instrument_node="">14</span></a><span data-dcnode-id="1577" instrument_node="">]. All three factors were found to be significantly correlated to implementation, however; only management support was determined to be a significant predictor of innovation [</span><a class="ref-link" data-dcnode-id="1575" data-ref-style="bibr" href="#B14"><span data-dcnode-id="1576" instrument_node="">14</span></a><span data-dcnode-id="1574" instrument_node="">]. This research supports the conclusion that when employees are fully engaged in the process of innovation success is more likely to be achieved. Organizations must have in place procedures that encourage innovation throughout the entire company. Every employee must feel vested in the company and continually seeking ways to improve processes.</span></p></div><div class="section" data-dcnode-id="1491" data-lvl="1" id="sec_3"><span data-dcnode-id="1571" instrument_node="">
</span><a class="ads-link" data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="1570" instrument_node="">Advertisement</span></a><span data-dcnode-id="1568" instrument_node="">
</span><div class="ads" data-dcnode-id="1567" id="intechopen-intechopen-3"></div><h2 class="heading main-title" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">3. Methodology</span></h2><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">A qualitative and quantitative research strategy consisting of group observations, interviews, and surveys were used to gather information. These methods are most appropriate because of the complexity involved in studying culture and communication from an individual perspective. By using these methods the researchers were able to ascertain underlying factors that are relevant to understanding the affects of culture on communication when two different groups interact with each other. </span></p><p data-dcnode-id="1558"><span data-dcnode-id="1562" instrument_node="">Participants were undergraduate and graduate students from South Korea and the United States selected to participate in the 2</span><sup data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">nd</span></sup><span data-dcnode-id="1559" instrument_node=""> Korea America Student Conference (KASC). Selection to KASC is based on a competitive process. Participation in the study was completely voluntary and students were asked to complete a consent form. A total of 46 students attended KASC and 65% were female. 52% of the students resided in South Korea and 48% in the United States. Interestingly, 73% of all the students identified Korean as part of their ethnicity. 91% of the students were 19 to 23 years of age. </span></p><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">The researchers focused on collecting data from participants to assist in the development of a cross-cultural communication model. The researcher addressed the differences and similarities in communication strategies and the affect on building relationships. Previous research on culture has applied a field-based approach that allows for the exchange of information from multiple sources. The researchers followed a similar structure when participating in KASC over a two-week period. </span></p><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">The role of the researchers was that of consultants that sought to serve as a bridge between the participants and the administrators of the conference. It was important for the researcher to develop a level of trust with the participants quickly. To accomplish this, the researchers assisted staff with administrative tasks during the conference and shared in activities with the participants. The researchers used current programs established by KASC to expand opportunities to exchange information. For example, the researcher attended lectures, group discussions, and roundtable sessions.</span></p><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">The topics discussed during interviews included: a) reasons for participating in KASC, b) individual experiences and interactions with different cultures, c) reactions to changes that occurred during the conference, and d) discussion of how culture affects the communication between American and Korean students. During group observations the researchers focused on key words and phrases that were used by the students and categorized them according to relevant themes. Based on the words and phrases a concept map was created that helped to identify the predictors used in the study.</span></p><p data-dcnode-id="1547"><span data-dcnode-id="1551" instrument_node="">Five cultural measurements of acceptance, conflict, individualism, risk, and sharing were used to predict the country of residence. </span><a class="ref-link" data-dcnode-id="1549" data-ref-style="table" href="#T1"><span data-dcnode-id="1550" instrument_node="">Table 1</span></a><span data-dcnode-id="1548" instrument_node=""> defines the variables used in the study. The country of residence index was selected as the dependent variable because it is directly affected by culture.</span></p><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Rigor and validity were addressed by continuously redefining the key issues identified by participants. Participant feedback was vital to this study and was used to form and shape the cross-cultural communication model. The survey that was developed for this study consisted of 23 items that were rated on five point Likert scale with 1=strongly disagree to 5=strongly agree. Each of the items assessed one of the cultural measurements of acceptance, conflict, individualism, risk, or sharing. </span></p><div class="table-wrap" data-dcnode-id="1492" id="T1"><div class="table-content" data-dcnode-id="1500"><table data-dcnode-id="1501" margin-left="0"><colgroup data-dcnode-id="1542"><col data-dcnode-id="1544" width="71.5"><col data-dcnode-id="1543" width="297"></colgroup><tbody data-dcnode-id="1502"><tr data-dcnode-id="1533"><td align="left" bgcolor="auto" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1538"><strong data-dcnode-id="1539"><bold data-dcnode-id="1540" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1541" instrument_node="">Variable</span></bold></strong></td><td align="left" bgcolor="auto" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1534"><strong data-dcnode-id="1535"><bold data-dcnode-id="1536" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1537" instrument_node="">Definition</span></bold></strong></td></tr><tr data-dcnode-id="1528"><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Acceptance</span></td><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">A measure of how important it is for an individual to be liked and accepted by others</span></td></tr><tr data-dcnode-id="1523"><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Conflict</span></td><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">A measure of an individual’s ability to work with those they do not agree with</span></td></tr><tr data-dcnode-id="1518"><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Individualism</span></td><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">An assessment of how independent an individual behaves in making decisions</span></td></tr><tr data-dcnode-id="1513"><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Risk</span></td><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">A measure of how open an individual is to trying new things and stepping outside of their comfort zone</span></td></tr><tr data-dcnode-id="1508"><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Sharing</span></td><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">A measure of how willing an individual is to share their opinions and feelings</span></td></tr><tr data-dcnode-id="1503"><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Country of residence</span></td><td align="left" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">The country identified as the primary place of residence</span></td></tr></tbody></table></div><div class="table-caption" data-dcnode-id="1493"><h3 class="heading" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Table 1.</span></h3><div class="text" data-dcnode-id="1495"><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Variables in Cross-Cultural Communication Study</span></p></div><div class="text" data-dcnode-id="1494"></div></div></div></div><div class="section" data-dcnode-id="1351" data-lvl="1" id="sec_4"><span data-dcnode-id="1490" instrument_node="">
</span><a class="ads-link" data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="1489" instrument_node="">Advertisement</span></a><span data-dcnode-id="1487" instrument_node="">
</span><div class="ads" data-dcnode-id="1486" id="intechopen-intechopen-4"></div><h2 class="heading main-title" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">4. Results</span></h2><p data-dcnode-id="1474"><span data-dcnode-id="1483" instrument_node="">A multiple regression analysis was conducted to evaluate how well the five independent variables for culture predict the country of residence. The linear combination of culture measures was significantly related to the country of residence index, </span><em data-dcnode-id="1480"><italic data-dcnode-id="1481" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1482" instrument_node="">F</span></italic></em><span data-dcnode-id="1479" instrument_node=""> (5, 17) = 3.57, </span><em data-dcnode-id="1476"><italic data-dcnode-id="1477" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1478" instrument_node="">p</span></italic></em><span data-dcnode-id="1475" instrument_node=""> &lt;.01. The sample multiple correlation coefficient was.71, indicating that approximately 51% of the variance of the country of residence index in the sample can be accounted for by the linear combination of culture measures.</span></p><div class="table-wrap" data-dcnode-id="1420" id="T2"><div class="table-content" data-dcnode-id="1428"><table data-dcnode-id="1429" margin-left="0"><colgroup data-dcnode-id="1468"><col data-dcnode-id="1473" width="39.85"><col data-dcnode-id="1472" width="28.75"><col data-dcnode-id="1471" width="53.8"><col data-dcnode-id="1470" width="106.5"><col data-dcnode-id="1469" width="139.6"></colgroup><tbody data-dcnode-id="1430"><tr data-dcnode-id="1447"><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1464" valign="center"><strong data-dcnode-id="1465"><bold data-dcnode-id="1466" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1467" instrument_node="">Model</span></bold></strong></td><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1460" valign="center"><strong data-dcnode-id="1461"><bold data-dcnode-id="1462" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1463" instrument_node="">R</span></bold></strong></td><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1456" valign="center"><strong data-dcnode-id="1457"><bold data-dcnode-id="1458" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1459" instrument_node="">R Square</span></bold></strong></td><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1452" valign="center"><strong data-dcnode-id="1453"><bold data-dcnode-id="1454" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1455" instrument_node="">Adjusted R Square</span></bold></strong></td><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1448" valign="center"><strong data-dcnode-id="1449"><bold data-dcnode-id="1450" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1451" instrument_node="">Std. Error of the Estimate</span></bold></strong></td></tr><tr data-dcnode-id="1434"><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1445" valign="center"><span data-dcnode-id="1446" instrument_node="">1</span></td><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1441" valign="center"><span data-dcnode-id="1444" instrument_node="">.715</span><sup data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">a</span></sup></td><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1439" valign="center"><span data-dcnode-id="1440" instrument_node="">.512</span></td><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1437" valign="center"><span data-dcnode-id="1438" instrument_node="">.368</span></td><td align="center" bgcolor="FFFFFF" border-bottom=".25" border-left=".25" border-right=".25" border-top=".25" data-dcnode-id="1435" valign="center"><span data-dcnode-id="1436" instrument_node="">.471</span></td></tr><tr data-dcnode-id="1431"><td align="left" bgcolor="FFFFFF" border-bottom="0" border-left="0" border-right="0" border-top=".25" colspan="5" data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">a. Predictors: (Constant), Risk, Acceptance, Conflict, Individualism, Share; b. Dependent Variable: Residence</span></td></tr></tbody></table></div><div class="table-caption" data-dcnode-id="1421"><h3 class="heading" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Table 2.</span></h3><div class="text" data-dcnode-id="1423"><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Model Summary</span></p></div><div class="text" data-dcnode-id="1422"></div></div></div><p data-dcnode-id="1415"><span data-dcnode-id="1419" instrument_node="">The partial regression plots for conflict and sharing exhibit the best correlations for predicting the country of residence index. </span><a class="ref-link" data-dcnode-id="1417" data-ref-style="table" href="#T3"><span data-dcnode-id="1418" instrument_node="">Table 3</span></a><span data-dcnode-id="1416" instrument_node=""> presents indices to indicate the relative strength of the individual predictors. As expected all of the bivariate correlations between the country of residence index were positive.</span></p><div class="table-wrap" data-dcnode-id="1352" id="T3"><div class="table-content" data-dcnode-id="1360"><table data-dcnode-id="1361" margin-left="0"><colgroup data-dcnode-id="1411"><col data-dcnode-id="1414" width="53.05"><col data-dcnode-id="1413" width="130.7"><col data-dcnode-id="1412" width="184.75"></colgroup><tbody data-dcnode-id="1362"><tr data-dcnode-id="1398"><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1407" valign="center"><em data-dcnode-id="1408"><italic data-dcnode-id="1409" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1410" instrument_node="">Predictors</span></italic></em></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1403" valign="center"><em data-dcnode-id="1404"><italic data-dcnode-id="1405" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1406" instrument_node="">Correlation between each predictor and the country of residence index</span></italic></em></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1399" valign="center"><em data-dcnode-id="1400"><italic data-dcnode-id="1401" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1402" instrument_node="">Correlation between each predictor and the country of residence index controlling for all other predictors</span></italic></em></td></tr><tr data-dcnode-id="1391"><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1396" valign="center"><span data-dcnode-id="1397" instrument_node="">Acceptance</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1394" valign="center"><span data-dcnode-id="1395" instrument_node="">.123</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1392" valign="center"><span data-dcnode-id="1393" instrument_node="">-.140</span></td></tr><tr data-dcnode-id="1384"><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1389" valign="center"><span data-dcnode-id="1390" instrument_node="">Conflict</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1387" valign="center"><span data-dcnode-id="1388" instrument_node="">.556</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1385" valign="center"><span data-dcnode-id="1386" instrument_node="">.558</span></td></tr><tr data-dcnode-id="1377"><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1382" valign="center"><span data-dcnode-id="1383" instrument_node="">Individualism</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1380" valign="center"><span data-dcnode-id="1381" instrument_node="">.243</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1378" valign="center"><span data-dcnode-id="1379" instrument_node="">-.045</span></td></tr><tr data-dcnode-id="1370"><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1375" valign="center"><span data-dcnode-id="1376" instrument_node="">Share</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1373" valign="center"><span data-dcnode-id="1374" instrument_node="">.493</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1371" valign="center"><span data-dcnode-id="1372" instrument_node="">.457</span></td></tr><tr data-dcnode-id="1363"><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1368" valign="center"><span data-dcnode-id="1369" instrument_node="">Risk</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1366" valign="center"><span data-dcnode-id="1367" instrument_node="">.021</span></td><td align="center" border-bottom=".5" border-left=".5" border-right=".5" border-top=".5" data-dcnode-id="1364" valign="center"><span data-dcnode-id="1365" instrument_node="">-.341</span></td></tr></tbody></table></div><div class="table-caption" data-dcnode-id="1353"><h3 class="heading" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Table 3.</span></h3><div class="text" data-dcnode-id="1355"><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">The Bivariate and Partial Correlations of the Predictors with the Country of Residence Index</span></p></div><div class="text" data-dcnode-id="1354"></div></div></div></div><div class="section" data-dcnode-id="1324" data-lvl="1" id="sec_5"><span data-dcnode-id="1350" instrument_node="">
</span><a class="ads-link" data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="1349" instrument_node="">Advertisement</span></a><span data-dcnode-id="1347" instrument_node="">
</span><div class="ads" data-dcnode-id="1346" id="intechopen-intechopen-6"></div><h2 class="heading main-title" data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">5. Cross-cultural communication model</span></h2><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">The purpose of communication is to transfer ideas and knowledge from one entity to the other. The first step in communication is input; someone must say something that is received by someone else. The communication loop is successful when the receiver demonstrates that he or she understands what was being communicated. From an organizational perspective there are many barriers than can impede the flow of communication. These barriers include culture, technology, language, workforce, and environment. For the purpose of this model culture refers to the traditions and customs that are prevalent in the country where each company is located. These traditions and customs influence policies and procedures implemented by businesses. Technology is simply the use of mediums such as email, Internet, text messaging, and cell phones to communicate. When a company does not have experience using a particular technological medium to communicate it may rely on older methods that the other company views as inadequate. Language is what is spoken in the country where the company is located. If the languages of the two companies are different, then one company must learn the other’s language or a new language must be created. Workforce refers to the internal structure of the company, including employees, managers, and organizational leaders. Environment refers to the external forces that affect the company. For example, the economy can have an adverse impact on an organization and present an obstacle to cross-culture communication.</span></p><p data-dcnode-id="1337"><span data-dcnode-id="1341" instrument_node="">As illustrated in </span><a class="ref-link" data-dcnode-id="1339" data-ref-style="fig" href="#F1"><span data-dcnode-id="1340" instrument_node="">Figure 1</span></a><span data-dcnode-id="1338" instrument_node="">, when these barriers are eliminated companies are able to experience innovation, reduced conflict, and better dissemination of information. J. Ku-Hyun (personal communication, July 20, 2009) stated “to be successful as a global corporation communication is critical.” Without communication organizations will cease to be. The challenge for organizations that must communicate cross-culturally is to ensure that their message is understood the way that it was intended. When communication barriers are not removed it is easy to make assumptions about what is being communicated. Our assumptions of what we thought was being communicated can be very different from the original message. Communication takes effort, it is much easier to sit back and simply assume what we think others are trying to tell us. To actively engage in communication takes time and energy. Organizations must be willing to invest the resources needed to support cross-culture communication.</span></p><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Successful cross-cultural communication creates a dialogue, a continuous transfer of information. This exchange of information addresses our assumptions and clarifies points we do not understand. It also provides the opportunity for us to ask questions and confirm the information that was received. Having a dialogue reduces conflict because cultural misunderstandings can be dealt with when they arise. The dialogue only occurs when both parties agree to share information and ensure that the transfer of information is not blocked. </span></p><figure class="media-panel" data-dcnode-id="1325" id="F1"><div class="media" data-dcnode-id="1333"><img alt="" class="figure-link" data-dcnode-id="1334" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/38267/media/image1.jpeg&amp;raw"></div><figcaption class="caption" data-dcnode-id="1326"><h4 data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Figure 1.</span></h4><p data-dcnode-id="1330"></p><p data-dcnode-id="1328" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1329" instrument_node="">Cross-Culture Communication Model</span></p><p data-dcnode-id="1327"></p></figcaption></figure></div><div class="section" data-dcnode-id="1261" data-lvl="1" id="sec_6"><span data-dcnode-id="1323" instrument_node="">
</span><a class="ads-link" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="1322" instrument_node="">Advertisement</span></a><span data-dcnode-id="1320" instrument_node="">
</span><div class="ads" data-dcnode-id="1319" id="intechopen-intechopen-7"></div><h2 class="heading main-title" data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">6. Samsung and Hyundai</span></h2><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">To illustrate how companies can utilize the cross-culture communication model to improve business practices consider the examples of Samsung and Hyundai. Samsung is unique because of its focus on human resources and risk taking initiatives. The company was founded in 1938 and is the world’s largest conglomerate. Samsung is recognized as a global industry leader because of its inner capacity to take advantage of distinct initiatives (J. Ku-Hyun, personal communication, July 20, 2009). It hires a small percentage of non-Koreans inside Korea but employs a higher percentage off non-Koreans outside of Korea. The culture of the organization is very family centric. Decisions occur in a collective atmosphere that allows for communication at all levels of the organization. However, even when decisions are clearly communicated throughout the organization employees may not always show support.</span></p><p data-dcnode-id="1310"><span data-dcnode-id="1314" instrument_node="">The workforce can represent a barrier to cross-cultural communication when employees feel they are not valued. This presented an issue at Samsung. The expectation was that you stayed at job until your assignment was completed. However, with the increase of younger employees entering the workforce who had different expectations, Samsung had to make a change. Management made the decision to change the workday from five-to-nine to seven-to-four [</span><a class="ref-link" data-dcnode-id="1312" data-ref-style="bibr" href="#B15"><span data-dcnode-id="1313" instrument_node="">15</span></a><span data-dcnode-id="1311" instrument_node="">]. The reason for Samsung’s change was to get employees to be more team oriented and more productive. Changing the hours of the workday required employees to work together and it also required managers and supervisors to have a more active role in completing daily tasks. The seven-to-four schedule was a cultural shift that was instigated by new employees entering the company with a different outlook towards work and personal time. Prior to the change, employees were expected to stay on the job until it was completed. With the change the office closed at four and everything stopped. Now employees have to proactively plan their workday in order to ensure that everything is accomplished in a timely fashion. </span></p><p data-dcnode-id="1302"><span data-dcnode-id="1309" instrument_node="">Samsung has been able to become a global leader because of its commitment to the development of technological capabilities [</span><a class="ref-link" data-dcnode-id="1307" data-ref-style="bibr" href="#B16"><span data-dcnode-id="1308" instrument_node="">16</span></a><span data-dcnode-id="1306" instrument_node="">]. Management’s objective is to “develop technology capabilities for value creation in diverse business areas” that will ultimately support growth in global competition [</span><a class="ref-link" data-dcnode-id="1304" data-ref-style="bibr" href="#B16"><span data-dcnode-id="1305" instrument_node="">16</span></a><span data-dcnode-id="1303" instrument_node="">]. The focus on innovation requires the sharing of business practices and technology throughout the organization. Samsung must communicate with employees and customers simultaneously to ensure that company objectives are met.</span></p><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">J. Ku-Hyun (personal communication, July 20, 2009) reports that Samsung’s competitive advantages include 1) commitment to work that is translated into speed advantages, 2) highly skilled engineers and technicians, and 3) management talent and experience. Samsung has used these competitive advantages to enhance its relationship with customers and expand globally.</span></p><p data-dcnode-id="1286"><span data-dcnode-id="1299" instrument_node="">Hyundai Motor Company was formed in 1967 and has established itself as company that focuses on quality improvement and innovation [</span><a class="ref-link" data-dcnode-id="1297" data-ref-style="bibr" href="#B17"><span data-dcnode-id="1298" instrument_node="">17</span></a><span data-dcnode-id="1296" instrument_node="">]. From the small beginning in Seoul, Korea the company has now expanded to more than ten countries including the United States, Canada, India, China, Turkey, Russia, Malaysia, Sudan, Egypt, Indonesia, Iran, and Japan [</span><a class="ref-link" data-dcnode-id="1294" data-ref-style="bibr" href="#B17"><span data-dcnode-id="1295" instrument_node="">17</span></a><span data-dcnode-id="1293" instrument_node="">]. For this expansion to take place requires effective communication that is able to overcome cultural barriers and accomplish global management initiatives. Research conducted by Wright, Suh, and Leggett revealed that Hyundai’s achievement at globalization depended upon its ability to expand international sales as it gained experience in international markets [</span><a class="ref-link" data-dcnode-id="1291" data-ref-style="bibr" href="#B18"><span data-dcnode-id="1292" instrument_node="">18</span></a><span data-dcnode-id="1290" instrument_node="">]. The move from domestic to global production means Hyundai must operate in “unfamiliar and uncertain economic and cultural contexts” [</span><a class="ref-link" data-dcnode-id="1288" data-ref-style="bibr" href="#B18"><span data-dcnode-id="1289" instrument_node="">18</span></a><span data-dcnode-id="1287" instrument_node="">].</span></p><p data-dcnode-id="1278"><span data-dcnode-id="1285" instrument_node="">Over the years Hyundai has learned valuable lessons on the importance of knowing and valuing the needs of its customers. In the early 1990s, Hyundai experienced problems when trying to expand production to Canada. The primary issue was that the company did not adapt the design of the Sonata for North American customers [</span><a class="ref-link" data-dcnode-id="1283" data-ref-style="bibr" href="#B18"><span data-dcnode-id="1284" instrument_node="">18</span></a><span data-dcnode-id="1282" instrument_node="">]. Consequently, the company lost market share to Toyota’s Camry and Honda’s Accord. Another important lesson was learned when Hyundai made the decision to start production in Turkey because of the lower cost for workers. Because of the lower wages management decided to use more hand-operated technology instead of the automated manufacturing processes utilized in its domestic plants. As a result, the production rate of the Turkish plant was 25% lower than that in Korea [</span><a class="ref-link" data-dcnode-id="1280" data-ref-style="bibr" href="#B18"><span data-dcnode-id="1281" instrument_node="">18</span></a><span data-dcnode-id="1279" instrument_node="">]. From these experiences Hyundai learned the importance of researching the culture of a country before making profound business decisions. Cross-culture communication involves adapting organizational policies to fit the context of where business transactions will occur.</span></p><p data-dcnode-id="1267"><span data-dcnode-id="1277" instrument_node="">Key to Hyundai’s success is its corporate philosophy that places the needs of customers as top priority in all business areas. This customer-oriented management style requires organizational leaders to be receptive to new ideas and to think outside the box. To encourage employees to expand their cultural awareness the company encourages three-month assignments to its overseas sites. For example, when the company was building a site in Alabama it allowed employees to visit and study the culture [</span><a class="ref-link" data-dcnode-id="1275" data-ref-style="bibr" href="#B19"><span data-dcnode-id="1276" instrument_node="">19</span></a><span data-dcnode-id="1274" instrument_node="">].The company promotes an employee backpack travel program around the globe where teams of three design their cultural experience. The teams compete for a company sponsorship of 15-day expeditions by writing what they hope to learn [</span><a class="ref-link" data-dcnode-id="1272" data-ref-style="bibr" href="#B19"><span data-dcnode-id="1273" instrument_node="">19</span></a><span data-dcnode-id="1271" instrument_node="">]. More than 47 teams have traveled to 70 countries, including Peru, Turkey, and Greece [</span><a class="ref-link" data-dcnode-id="1269" data-ref-style="bibr" href="#B19"><span data-dcnode-id="1270" instrument_node="">19</span></a><span data-dcnode-id="1268" instrument_node="">]. Employees that participate bring back what they learn and share it with their colleagues. </span></p><p data-dcnode-id="1262"><span data-dcnode-id="1266" instrument_node="">“Hyundai Motor Company is strengthening its position as a global brand, establishing local production systems on a global scale and supplying automobiles that meet the needs and tastes of customers in each specific region” [</span><a class="ref-link" data-dcnode-id="1264" data-ref-style="bibr" href="#B17"><span data-dcnode-id="1265" instrument_node="">17</span></a><span data-dcnode-id="1263" instrument_node="">]. During a visit to the Asan Plant located in Chungchungnam-do, Korea, it was very apparent of how the company is being innovative. The plant has a production capacity of 300,000 units and utilizes the latest in robotic technology to assemble vehicles (Tour Guide, personal communication, July 27, 2009). One unit is produced every 57 seconds and 100% of all the welding is completely automated. The Asan plant has 34,000 employees; the average annual salary is $50,000. The plant operates two ten-hour shifts and provides numerous incentives for employees that are innovative on the job.</span></p></div><div class="section" data-dcnode-id="1139" data-lvl="1" id="sec_7"><span data-dcnode-id="1260" instrument_node="">
</span><a class="ads-link" data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="1259" instrument_node="">Advertisement</span></a><span data-dcnode-id="1257" instrument_node="">
</span><div class="ads" data-dcnode-id="1256" id="intechopen-intechopen-8"></div><h2 class="heading main-title" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">7. Conclusion</span></h2><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">The researchers proposed attending the 2nd Korea-America Student Conference in order to develop a relationship with participants that have a vested interest in global issues and to define the criteria for the proposed cross-culture communication model by using various qualitative methods. These objectives were accomplished and much insight gained into understanding how culture affects communication. </span></p><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Samsung and Hyundai are only two examples of organizations that are effectively communicating cross-culturally. Both organizations have been able to learn from their past mistakes and create strategies that support their growth in the global market. The sharing of information makes it possible for other organizations to also benefit from the mistakes made by these organizations. </span></p><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">During one of the group observations a Korean participant stated, “A smile is a basic tool of communication” (personal communication, July 16, 2009). How true it is that a simple smile can break down communication barriers and build bridges of understanding. Cross-culture communication is not easy, especially when we are unfamiliar with the receiver of the information. Organizational leaders that have to communicate cross-culturally can use the following steps: </span></p><ol data-dcnode-id="1235" style="list-style-type: order;"><li data-dcnode-id="1245"><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Develop clear and concise expectations for how the organization will accomplish its mission;</span></p></li><li data-dcnode-id="1242"><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Ensure that employees understand their role in the organization; </span></p></li><li data-dcnode-id="1239"><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Be willing to invest time to communicate;</span></p></li><li data-dcnode-id="1236"><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Remember that communication is a two-way process, listen before you speak.</span></p></li></ol><p data-dcnode-id="1227"><span data-dcnode-id="1234" instrument_node="">“Many misunderstanding have occurred, not only because of mistakes in the usage of words or expressions, but also because of the lack of goodwill and cultural knowledge” [</span><a class="ref-link" data-dcnode-id="1232" data-ref-style="bibr" href="#B8"><span data-dcnode-id="1233" instrument_node="">8</span></a><span data-dcnode-id="1231" instrument_node="">]. Mistakes are a normal part life and at times if we are not careful our mistakes can have lasting consequences. “We can make mistakes as long as we can correct mistakes. We can get feedback from the global market” [</span><a class="ref-link" data-dcnode-id="1229" data-ref-style="bibr" href="#B10"><span data-dcnode-id="1230" instrument_node="">10</span></a><span data-dcnode-id="1228" instrument_node="">]. The cross-culture communication model developed from this study provides a mechanism for obtaining feedback from the global market. The model identifies the barriers to cross-culture communication and summarizes the outcomes that can be achieved when these barriers are tackled.</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">The results of study verified that the five independent variables of acceptance, conflict, individualism, risk, and sharing could be used to predict country residence. A limitation to this study was the small sample size that used. In order to validate the validity and reliability of the study a larger sample size should be used in future studies. The participants of the study were also aware of the need to increase cultural awareness and displayed a desire to gain a deeper understanding of American and Korean relations. The study adds to the current body of knowledge on cross-culture communication by demonstrating the importance of culture in business settings.</span></p><p data-dcnode-id="1214"><span data-dcnode-id="1224" instrument_node="">Organizational cross-functionality or connectivity is essential to innovation because it brings together a diverse group of people from different functional backgrounds [</span><a class="ref-link" data-dcnode-id="1222" data-ref-style="bibr" href="#B20"><span data-dcnode-id="1223" instrument_node="">20</span></a><span data-dcnode-id="1221" instrument_node="">]. Management must take steps to ensure that cross-functionality does not create conflict and hinder communication within the team [</span><a class="ref-link" data-dcnode-id="1219" data-ref-style="bibr" href="#B20"><span data-dcnode-id="1220" instrument_node="">20</span></a><span data-dcnode-id="1218" instrument_node="">]. To effectively generate innovation the level of expertise and individual skill set of each team member must be ascertained. The innovation process is supported when members share a common vision and goal. Research indicates that cross-functional teams are more effective at new produce development that is valued by the customer [</span><a class="ref-link" data-dcnode-id="1216" data-ref-style="bibr" href="#B21"><span data-dcnode-id="1217" instrument_node="">21</span></a><span data-dcnode-id="1215" instrument_node="">]. </span></p><p data-dcnode-id="1209"><span data-dcnode-id="1213" instrument_node="">Leadership is the foundation to cross-functionality because it provides the oversight and direction necessary for it to work. Leaders that are innovators are receptive to change and value feedback from those around them. They recognize that they cannot be successful unless those around them are successful. For innovative organizations it is necessary for management to develop innovative leaders. This is done by having in place recruitment strategies that target successful applicants that possess the skills necessary to the organization to the next level [</span><a class="ref-link" data-dcnode-id="1211" data-ref-style="bibr" href="#B22"><span data-dcnode-id="1212" instrument_node="">22</span></a><span data-dcnode-id="1210" instrument_node="">]. There should also be in place a well-developed talent-management process that identifies innovators, connects them to the mission of the organization, and provides the necessary internal resources for them to be successful. </span></p><figure class="media-panel" data-dcnode-id="1199" id="F2"><div class="media" data-dcnode-id="1207"><img alt="" class="figure-link" data-dcnode-id="1208" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/38267/media/image2.jpeg&amp;raw"></div><figcaption class="caption" data-dcnode-id="1200"><h4 data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Figure 2.</span></h4><p data-dcnode-id="1204"></p><p data-dcnode-id="1202" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:sym="http://www.w3.org/2012/symbol" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1203" instrument_node="">The 4 C’s Global Leadership Model</span></p><p data-dcnode-id="1201"></p></figcaption></figure><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">A comparison of leadership strategies between Samsung and Hyundai provides the basis for developing the 4 C’s Global Leadership Model that can be employed by organizations to make certain that they have the right person for the job. The model consists of four key factors: communication, conflict, creativity, and connectivity. Being aware of what types of individuals make good global leaders allows the organization to develop HR policies to support recruitment and succession. By creating a pipeline of capable global leaders the organization is able to sustain innovation and change. </span></p><p data-dcnode-id="1189"><span data-dcnode-id="1196" instrument_node="">Leaders are the main link responsible for harnessing the ideas of employees to create innovation. They must also assess the development of their competitors and the needs of customers. Bringing together individuals from different cultural backgrounds will lead to conflict; however, this does not have to be perceived as a negative. The challenge for global leaders is to use the conflict as a benefit for the organization. Gehani and Gehani define conflict as simply the result of natural differences that occur between people from different backgrounds [</span><a class="ref-link" data-dcnode-id="1194" data-ref-style="bibr" href="#B23"><span data-dcnode-id="1195" instrument_node="">23</span></a><span data-dcnode-id="1193" instrument_node="">]. Different ideas and views lead to innovation and new products and services. From this perspective leaders should encourage healthy conflict. “Conflict between diverse groups of people can be used to drive the growth of their organizations” [</span><a class="ref-link" data-dcnode-id="1191" data-ref-style="bibr" href="#B23"><span data-dcnode-id="1192" instrument_node="">23</span></a><span data-dcnode-id="1190" instrument_node="">]. If there were no conflict to spark discussion there would be no innovation.</span></p><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Communication helps to moderate the relationship between conflict and innovation. This fact is furthermore impacted by the complexity of competing in global environment. Leaders must be aware of the communication styles that are needed when working with multicultural teams. The use of the email, conference calls, and other technological innovations to communicate need to be addressed to ensure that all members are able to participate fully. When members feel they are not able to communicate openly innovation is hindered and the organization suffers. </span></p><p data-dcnode-id="1179"><span data-dcnode-id="1186" instrument_node="">As global competition continues to increase, successful organizations must evolve to meet the changing needs of consumers. Innovation provides the opportunity for organizations to think outside the box and “produce better product, faster, cheaper and more efficiently than competitors [</span><a class="ref-link" data-dcnode-id="1184" data-ref-style="bibr" href="#B24"><span data-dcnode-id="1185" instrument_node="">24</span></a><span data-dcnode-id="1183" instrument_node="">]. Creativity is directly linked to communication and innovation. Increased attention on innovation has caused organizational leaders to develop systems to manage the process and support the efforts of employees. According to Dooley &amp; O’Sullivan being able to identify the correct process for implementing innovation will directly impact the success [</span><a class="ref-link" data-dcnode-id="1181" data-ref-style="bibr" href="#B24"><span data-dcnode-id="1182" instrument_node="">24</span></a><span data-dcnode-id="1180" instrument_node="">]. It is easier to implement innovation when the culture of the organization allows for employee feedback, planning, and evaluation. </span></p><p data-dcnode-id="1168"><span data-dcnode-id="1178" instrument_node="">Employees play a vital role in innovation. In research conducted by Barnett and Storey it was found that there was a strong connection between learning and innovation in organizations [</span><a class="ref-link" data-dcnode-id="1176" data-ref-style="bibr" href="#B25"><span data-dcnode-id="1177" instrument_node="">25</span></a><span data-dcnode-id="1175" instrument_node="">]. The researchers studied 220 employees at a manufacturing company, Tensator, located in the United Kingdom. Key to Tensator’s success is their ability to integrate succession planning with sustaining innovation [</span><a class="ref-link" data-dcnode-id="1173" data-ref-style="bibr" href="#B25"><span data-dcnode-id="1174" instrument_node="">25</span></a><span data-dcnode-id="1172" instrument_node="">]. Instead of focusing solely on keeping top management positions filled, the organization seeks to keep the pipeline of skilled laborers in amble supply to support innovation. Tensator follows a growth strategy that centers on “grow-your-own” [</span><a class="ref-link" data-dcnode-id="1170" data-ref-style="bibr" href="#B25"><span data-dcnode-id="1171" instrument_node="">25</span></a><span data-dcnode-id="1169" instrument_node="">]. This strategy requires the company to continually provide learning and development opportunities for employees to ensure that they remain at the top of their game.</span></p><p data-dcnode-id="1160"><span data-dcnode-id="1167" instrument_node="">Microsoft is applying a holistic approach to innovation in seeking to compete with Yahoo and Google in the development of search engines [</span><a class="ref-link" data-dcnode-id="1165" data-ref-style="bibr" href="#B26"><span data-dcnode-id="1166" instrument_node="">26</span></a><span data-dcnode-id="1164" instrument_node="">]. Management is aware they must do more than simply try to catch up with their competitors; they must redesign the way that search engines are viewed and utilized. The holistic approach is further supported by Porter in work done with organizations to help them improve their supply chains [</span><a class="ref-link" data-dcnode-id="1162" data-ref-style="bibr" href="#B27"><span data-dcnode-id="1163" instrument_node="">27</span></a><span data-dcnode-id="1161" instrument_node="">]. Organizations that use a holistic approach are able to obtain a broader view of how they fit into the global market. Instead of focusing on small segments of their business operations, attention is given to the entire process. This allows for the organization to implement innovation that will create value for customers.</span></p><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Connectivity is defined as the ability to orchestrate organizational networks to move in the same direction in order to accomplish the company’s mission. Employees must feel contacted to the organization and understand how their individual effort contributes to the bottom line. Global leaders must look for opportunities to connect everyone within the organization to the overall goals and objectives. When employees understand the big picture and the direction the organization is taking innovation and change are supported.</span></p><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">The 4 C’s Global Leadership Model is designed to provide a basis for organizational leaders to use in mapping out strategies for working globally with multicultural teams. The business environment is continually evolving and global leaders must persistently develop new organization strategies to meet global challenges. Although, Samsung and Hyundai both compete in different industries there are parallels that can be gleamed from how they communicate and inspire innovation from their employees. The Cross-Culture Communication Model and 4 C’s Global Leadership Model are tools designed to assist organizational leaders to compete in the ever-changing global environment.</span></p><p data-dcnode-id="1148"><span data-dcnode-id="1155" instrument_node="">The core aspects of global leadership critical to leading innovation and change are vision, communication, and responsibility. In 2008 a group of scholars and business leaders identified twenty-five factors that are important for managers in implementing innovation [</span><a class="ref-link" data-dcnode-id="1153" data-ref-style="bibr" href="#B28"><span data-dcnode-id="1154" instrument_node="">28</span></a><span data-dcnode-id="1152" instrument_node="">]. Key among them was that management must have a clear vision for the organization. The organizational vision provides a roadmap for employees by defining what the organization hopes to accomplish.Communication is important because it allows for the exchange and refinement of ideas. Effective communication requires that organizations not become bogged down with hierarchal thinking that can typically slow down the communication process. Large organizations must operate like small organizations and be able to respond quickly to organizational and market changes [</span><a class="ref-link" data-dcnode-id="1150" data-ref-style="bibr" href="#B28"><span data-dcnode-id="1151" instrument_node="">28</span></a><span data-dcnode-id="1149" instrument_node="">].</span></p><p data-dcnode-id="1140"><span data-dcnode-id="1147" instrument_node="">Successful organizations must focus on goals that are socially responsible [</span><a class="ref-link" data-dcnode-id="1145" data-ref-style="bibr" href="#B28"><span data-dcnode-id="1146" instrument_node="">28</span></a><span data-dcnode-id="1144" instrument_node="">]. Innovation is not just creating the coolest new gadget but it is creating the coolest new gadget that serves the environment in a sustainable manner. As organizations become more global the focus on corporate social responsibility increases. Organizations can no longer operate within a silo. The actions of one organization can affect many others. According to Westlund it is no longer sufficient for organizations only to make a profit and comply with the law [</span><a class="ref-link" data-dcnode-id="1142" data-ref-style="bibr" href="#B29"><span data-dcnode-id="1143" instrument_node="">29</span></a><span data-dcnode-id="1141" instrument_node="">]. They must also be socially responsible and give something back to the global community that they serve.</span></p></div><span data-dcnode-id="1138" instrument_node="">
