</span><div class="row" data-dcnode-id="520"><span data-dcnode-id="684" instrument_node="">
</span><div class="col-md-12 col-lg-12 py-3" data-dcnode-id="652"><span data-dcnode-id="683" instrument_node="">
</span><div class="title" data-dcnode-id="668" style="font-weight: 800; "><span data-dcnode-id="682" instrument_node="">
</span><h2 data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Challenges Faced by MSMEs</span></h2><hr data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">
</span><small data-dcnode-id="674"><b data-dcnode-id="675"><i class="icofont-man-in-glasses" data-dcnode-id="677"></i><span data-dcnode-id="676" instrument_node="">  YRSK</span></b></small><span data-dcnode-id="673" instrument_node=""> | 
            </span><small data-dcnode-id="670"><b data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Published: 04-03-21</span></b></small><span data-dcnode-id="669" instrument_node="">
</span></div><span data-dcnode-id="667" instrument_node="">
</span><div class="img-hoder" data-dcnode-id="661" style=" width:100%; height:auto;"><span data-dcnode-id="666" instrument_node="">
</span><img alt="blog-trends2_1606713462" data-dcnode-id="665" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yrskmarketing.com/storage/public/cover_image/blog-trends2_1606713462.jpg&amp;raw" style="width:100%; height:auto;"><span data-dcnode-id="664" instrument_node="">
</span><span class="PIN_1652486735698_button_pin PIN_1652486735698_round PIN_1652486735698_tall" data-dcnode-id="663" data-pin-href="https://www.pinterest.com/pin/create/button/" data-pin-log="button_pinit_bookmarklet"></span><span data-dcnode-id="662" instrument_node="">
</span></div><span data-dcnode-id="660" instrument_node="">
</span><div class="py-3 text-justify" data-dcnode-id="655"><span data-dcnode-id="659" instrument_node="">
</span><i data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">
                Micro, Small and Medium Enterprises (MSMEs) are amongst the strongest drivers of economic development, innovation and employment. The MSME sector also contributes in a significant way to the growth of the Indian economy with a vast network of about 63.38 million enterprises.                
            </span></i><span data-dcnode-id="656" instrument_node="">
</span></div><hr data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">
</span></div><span data-dcnode-id="651" instrument_node="">
</span><div class="col-lg-12 col-md-12 text-justify" data-dcnode-id="537"><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">The sector contributes about 45% to manufacturing output, more than 40% of exports, over 28% of the GDP while creating employment for about 111 million people, which in terms of volume stands next to the agricultural sector.</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">MSME as a whole has lots of potential for growth, innovation, contribution to the economy and further job creation. Unfortunately, these enterprises also face challenges which keep threatening their survival and restrict their ability to grow.&nbsp;</span></p><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">As grave are the challenges faced by the MSME businesses, the Government of India has taken into account the hardships faced by these blossoming small size entities of the economy and has leaded a number of initiatives in this regard. However, increasing awareness among MSME businesses can only lead to higher adoption of these schemes. All the business solutions be it enhancing technical, marketing prowess or building a strong foundation of capital and quality workforce are being made available at low cost.&nbsp;</span></p><h2 data-dcnode-id="641"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The key challenges faced by the sectors along with their solutions:</span></strong></h2><p data-dcnode-id="638"><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">MSMEs has a significant contribution in Indian economic growth, yet they struggle to have access to wide markets and does not get opportunity and support to expand their market across the globe. They have not been able to scale the business for want of access across the domestic and the global market. The case continues to be so capping the growth potential.&nbsp;The six major problems that are faced by old and new businesses in SME sectors are</span></strong></p><ul data-dcnode-id="619"><li data-dcnode-id="635"><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Inadequate access to market</span></strong></li><li data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Unwillingness on adoption of technology</span></strong></li><li data-dcnode-id="629"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Limited Access to credit</span></strong></li><li data-dcnode-id="626"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Non availability of skilled labour</span></strong></li><li data-dcnode-id="623"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">&nbsp;Lack of Experience of Using External Experts</span></strong></li><li data-dcnode-id="620"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Over Reliance on Existing Clients</span></strong></li></ul><h3 data-dcnode-id="616"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">&nbsp;1) Inadequate access to market</span></strong></h3><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">All the businesses primarily need adequate fund and marketing backup to succeed in the competitive market. Hence, the Government has launched the </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//msme.gov.in/sites/default/files/Udyog_Aadhar_Booklet.pdf"><span data-dcnode-id="614" instrument_node="">Udyog Aadhar Memorandum</span></a><span data-dcnode-id="612" instrument_node=""> for the smooth promotion of the MSME businesses.</span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">It is like the Indian Aadhar Card giving identity to the MSME businesses and allowing smaller businesses smooth access to necessary services like reduced cost patency, tax rebates, and loans at low interest rates. It also helps in getting faster Government tenders to thrive in the competitive market.</span></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">&nbsp;Marketing support is also extended by the National Small Industries Corporation by arranging and offering a large subsidy to the small enterprises for participation in the trade fairs in India and abroad.</span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">&nbsp;MSME ministry is leaving no stones unturned in their attempt to augment awareness levels among a larger population of the MSME businesses about the various Government aids. The businesses can easily use these support services to grow bigger and better and increase their market reach to national and international levels. &nbsp;</span></p><h3 data-dcnode-id="602"><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">2) Unwillingness on Adoption of technology</span></strong></h3><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Technological advancements can make or break their business. Their ability to adopt new technologies can make them more competitive, cost effective and access to market can be easier. But day to day urgencies of these businesses hinder their long term perspective. Lack of adoption will make them obsolete and existence will be under threat.</span></p><p data-dcnode-id="595"><span data-dcnode-id="599" instrument_node="">&nbsp;Now, the MSMEs businesses can leverage the technical support offered by the Government agencies and modernise their operations to flourish and grow into larger businesses in no time. </span><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clcss.dcmsme.gov.in/"><span data-dcnode-id="598" instrument_node="">Credit Linked Capital Subsidy</span></a><span data-dcnode-id="596" instrument_node=""> for Technology Upgradation program has opened vistas for technological improvisation by offering Knowledge partners in a number of fields including Agriculture, khadi and many more at 15% capital subsidy. The technical prowess can be best employed for the application of the ZED model which implies zero defects and zero effects. The environmental concerns like the carbon credit aggregation and other pollution measures are also being taken care of.&nbsp;</span></p><h3 data-dcnode-id="592"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">3) Limited Access to Credit</span></strong></h3><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Another significant constraint to the growth of MSMEs is lack of quality credit infrastructure. Overall credit infrastructure has various bottle necks; long sanction process, high rates, collateral requirements, and delay in disbursements. The inability to access funds at a good rate as also in a timely manner hinders the growth.&nbsp;</span></p><p data-dcnode-id="585"><span data-dcnode-id="589" instrument_node="">The short term cash flow constraints and monetary constraints faced in the long term are well addressed with number of schemes launched by the Government by launching the Credit Guarantee Fund Trust. (</span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.startupindia.gov.in/content/sih/en/government-schemes/cgtsme.html"><span data-dcnode-id="588" instrument_node="">https://www.startupindia.gov.in/content/sih/en/government-schemes/cgtsme.html</span></a><span data-dcnode-id="586" instrument_node="">)Started in 2000, it has been proactive in providing credit to this credit deficient sector at a low rate of interest. This safeguards them from the clutches of the private moneylenders who outlay loans at a very high rate of interest making it difficult for the MSME to repay thereby stunting their growth.&nbsp;</span></p><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">&nbsp;The MSME support and outreach program is among the 12 initiatives proposed by the prime minister enabling easy loan facilities of up to 1 crore in short duration of just 59 minutes.</span></p><p data-dcnode-id="564"><span data-dcnode-id="582" instrument_node="">Now &nbsp;</span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yrskmarketing.com/news/show-news/4-YES%2520BANK%2520new%2520initiative%2520for%2520MSME"><i data-dcnode-id="579"><strong data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Yes Bank</span></strong></i><span data-dcnode-id="578" instrument_node=""> introduced a Yes </span><i data-dcnode-id="575"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">MSME Loan</span></strong></i><span data-dcnode-id="574" instrument_node=""> scheme through which Startups and </span><i data-dcnode-id="571"><strong data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">MSMEs</span></strong></i><span data-dcnode-id="570" instrument_node=""> can avail Collateral Free </span><i data-dcnode-id="567"><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">loan</span></strong></i><span data-dcnode-id="566" instrument_node=""> of amount Up to Rs. 5 crore.</span></a></p><h3 data-dcnode-id="561"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">4) Non availability of Skilled Labour</span></strong></h3><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">One of the perennial issues faced by the MSMEs is their inability to attract and devote quality Human Resource on growth agenda. Most of these MSMEs are often in the stage of frequent fire fighting and shortage of manpower given that they so thinly staffed.&nbsp; This makes it very difficult for them to allocate these resources to work on long and midterm projects.&nbsp;</span></p><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Most of the workforce employed is either undereducated or undertrained making the lower skillsets problem more pronounced in the MSME sector. Hence, Small Industries Development Bank of India has studied and identified a number of skill gaps and also delved on the sector specific urgency requirement for the upgrading of the worker skill sets depending on the complexity of the manufacturing process and the already available manpower skills. For example, in the apparel manufacturing sector, there are many training courses made available in a number of reputed Government recognised training institutes. This include&nbsp; certifications and diploma courses in sewing machine operation, cutting and tailoring, knitwear designing and many more which can be availed for both worker and managerial levels.</span></p><h3 data-dcnode-id="554"><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">&nbsp;5) Lack of Experience of Using External Experts</span></strong></h3><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">A good consultant or a vendor often saves time and effort. They help by way of bringing expertise and talent. However, most MSMEs largely depend on the capabilities of the founders or the core team. The common build or buy dilemma makes them feel it is better to do things in-house with their own staff. Many a times, in-house team may not have the required experience and knowledge the time, effort and costs escalate.&nbsp;</span></p><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Technological progress is the base of economical advancement. Hence, increasing the competitiveness, export potential and innovation proficiency requires cost effective solutions and expert advice from external sources. This problem is effectively being addressed by the Design Clinic Scheme in collaboration with National Institute of Design especially for the manufacturing clusters of the MSME. They provide prompt technical and designing solutions to make the existing products of MSME sounder in terms of quality. Technology access is also made possible with the 20 hubs and 100 tool rooms in the 6000 crore package released for technological promotion of this sector by the Indian Government.&nbsp;</span></p><h3 data-dcnode-id="547"><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">6) Over Reliance on Existing Clients:</span></strong></h3><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Some of these companies once having acquired some large or key clients let the business run on autopilot. This can limit their business and ability to maximize their potential. This also results into high concentration risk as over reliance can prove disastrous if the existing clients were to move away. These businesses should always look at adding clients across sizes, geographies, industry wherever possible.</span></p><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Whatever reasons, they should continuously build brand value and focus on adding new client along with the focus on retaining the existing ones. Fund constraints hamper the use of marketing channels to create a strong sales funnel.&nbsp;</span></p><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Hence, the digital platform has provided a concrete and cost effective business set up to add more customers into the business in a comfortable way and allow the MSME sector to have a level pegging with the bigger businesses in their domain area. The marketing and trading propositions can be effectively conducted by simply opening business profiles on the social media platforms like Facebook, Instagram, Twitter handles.&nbsp;</span></p><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">The commercial value of the business also gets a boost with blogging, collection of positive customer testimonies on the business websites and other platforms which furthers the brand value through word of mouth.&nbsp; These marketing efforts complement the local outdoor advertisements channels like hoardings, billboards and also enhance the global outreach.</span></p><span data-dcnode-id="538" instrument_node=""> </span></div><span data-dcnode-id="536" instrument_node="">
