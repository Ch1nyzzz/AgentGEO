</span><article data-dcnode-id="1045"><span data-dcnode-id="1339" instrument_node="">
</span><h1 data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Challenges faced by Colgate-Palmolive Company</span></h1><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">God has given the human beings the fortunate thing of knowledge and judgment to think upon the signs of the creation and to draw conclusions. That is the reason why they disclose the hidden facts of it, is the same way every business men / entrepreneur gets in born wisdom and knowledge to understand and to think how the people are behave and act in different situations, though experience is the key of success, but every step counts in the experience, so new bird will never learn to fly unless she does not fall from the sky.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Nowadays business is like a war that has every things seem fair, but as a human being we need to kept in mind that all the ethical and moral issues that pertain to all the stake holders. Issues and problems are the ingredient of every business and life, but the only successful business man are the true fighter of all internal and external forces those create obstacle / hindrance in the success ladder.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">This report contain all the aspect of challenges faced by the contemporary business man in running his / her business, and all those issues that he / she has to face in his / her daily routine. This report contain four part in the first part we have discussed the portfolio of the business, secondly PEST analysis, third we discussed the current issues of business and in the last we have conclude all the above stated issue and formerly recommendation.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">COMPANY BACKGROUND &amp; INFORMATION</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Colgate-Palmolive Company (NYSE:Â&nbsp;CL)</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">This is an American corporation that has the focused on the distribution, production, personal products, provision of household and health care such as detergents, soaps, toothpaste and toothbrushes (oral hygiene products).</span></p><span data-dcnode-id="1318" instrument_node="">
</span><h2 data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">History</span></h2><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">William Colgate, a candle and soap maker opened up a starch, soap, and candle factory located on Dutch Street with the name of William Colgate &amp; Company in New York City in 1806. The firm in the initial years began to sell individual bars but later on in 1857, after the death of William the company started reorganized as “Colgate &amp; Company” operated by his son. In the starting of the year 1872, company introduced a perfumed soap with name of Cashmere Bouquet. Colgate sold the first toothpaste in 1896 with the brand name of Colgate Ribbon Dental Cream but after the success of this brand, company started mass selling in 1908 (Wikipedia 2010).</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Colgate people have built a reputation as a successful company that has the highest ethical standards. Through living the values of Global Teamwork, Caring, Continuous Improvement, and adhering to the principles of honor, integrity and concern for the environment, as the company seeks to:</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Provide quality products of value to customers</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Opportunities for professional growth to all company people</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Fulfill CSR as a member of the international community</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Increase shareholder value (Wikipedia 2010)</span></p><span data-dcnode-id="1297" instrument_node="">
</span><h2 data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Factors affecting the Business:</span></h2><span data-dcnode-id="1294" instrument_node="">
</span><h2 data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Government Factors:</span></h2><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Government does not have much influence on the FMCG industry in terms of regulations. There are consumer protection laws but they are not implemented as they should be. There are not much regulations involved in this industry (Krutz 2004).</span></p><span data-dcnode-id="1288" instrument_node="">
</span><h2 data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Political factors:</span></h2><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Political factors are influencing this industry because the recent and order conditions have affected the whole economy which in turn affected the industry. Many of the factories of the big companies were burnt after the assassination of Benazir (Krutz 2004).</span></p><span data-dcnode-id="1282" instrument_node="">
</span><h2 data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Economic factors:</span></h2><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">The overall economy of the country is showing a stable growth. Therefore this industry is also showing a growth of 10%. But the inflation is growing rapidly which is not a good sign for the new entrants. Change in the interest rate also affects the industry. Hence the new entrants are also threatened by the increasing interest rates (Wikipedia 2010).</span></p><span data-dcnode-id="1276" instrument_node="">
</span><h2 data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Social trends:</span></h2><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">The social trends are in favor of this industry. Mass awareness is created through media. So people are shifting from their traditional methods of washing clothes, skin care etc to the modern methods. This is a good sign for the new entrants. People have become more educated and health conscious. High population growth is another opportunity for the new entrants (Muravchik 2004).</span></p><span data-dcnode-id="1270" instrument_node="">
</span><div data-dcnode-id="1259" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="uf086d8d1dbf14def45937937da73c264" data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//customwritings.co/importance-of-supply-chain-at-retail-organisation/" target="_blank"><div data-dcnode-id="1261" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Read also</span></span><span data-dcnode-id="1264" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">importance of supply chain at retail organisation</span></span></div></a></div><h2 data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Technological change:</span></h2><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The technology can support this industry well. If the whole system can be automated from the import of raw material to the finished goods then it would save time and money. This is a good sign for the new entrants. But in this industry technology does not play a major role because the traditional formulae of soap or toothpaste are not that much complicated (Louviere 2001).</span></p><span data-dcnode-id="1253" instrument_node="">
</span><h2 data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Colgate-Palmolive’s Mission Statement</span></h2><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Company mission statement focusing on the following factors</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Caring</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Every Company has claims cares about people but the Colgate Company has original care for its business partners, people, shareholders and customers. Colgate is dedicated to act with empathy, integrity and candor in all circumstances, to pay attention to customer according to the value differences and others. Similarly the Company is committed to defend the universal environment and to augment the communities where Colgate people are alive and work (Wikipedia 2010).</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Global Teamwork</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">All Colgate employees are part of a worldwide squad, devoted to working together across countries and all through the world. Only by allocation ideas, technologies and talents can the Company accomplish and maintain profitable growth.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Continuous Improvement</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Colgate is dedicated to getting improved every day in all it does, as persons and as teams. By better sympathetic consumers’ potential and incessantly working to improve and innovation in services, processes and products Colgate can be the best. (Wikipedia 2010)</span></p><span data-dcnode-id="1229" instrument_node="">
</span><h2 data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">INTRODUCTION</span></h2><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Every management has to face difficulties in every step of business development and Effective management is the main ingredients for the establishment / growth and success of the business. The success of the management is to examine the marketplace, background and create employment. In order to make profit opportunities that give the financial viability and potential growth for the business. Beside that the importance of management is usually misunderstood and wrongly interprets because people are giving more focus on the result somewhat than the course of management (Laroche, Michel,Â&nbsp;Zhou and Kim 1996).</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Concurrently with the increase in demand about quality, business man attracted the attention of customers. A sudden wave of successful entrepreneurs looks as if to render earlier management concepts obsolete while ignoring the marketing / organizing talents of the success full business man / entrepreneur (Griffin and Pustay 2009).</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Planning is critical for developing a firm’s potential. This view tended to short term enhances profits, however created along term dysfunctional business environment. However, many small businesses do not distinguish the need for long-term plans, for the reason that the miniature no of people concerned in working the business involves equal conscientiousness in the decision making and planning processes (Gauzente and Ranchhod 2002).</span></p><span data-dcnode-id="1217" instrument_node="">
</span><h2 data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">3.0 Critical issue / problem for today business:</span></h2><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Every new day bring the challenge for any business person, because to stay alive in the market you need to fight efficiently and smartly, as the world moving; complexity in every aspect of life is increase though technology has improved along but as much we belong to technology we get more depended. Following are the hot buttons for today business, and every business men more or less facing and struggling</span></p><span data-dcnode-id="1211" instrument_node="">
</span><h2 data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Political instability and involvement:</span></h2><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Every government is eager to impose taxes to earn more and more profit, due to recent shock of recession most of the industries are move toward bankruptcy or liquidate just because of high taxes and less benefit given by the government. It is common these day small business or large organization owners to be unaware of current legal issues that can hit them because continuous changes in the business policies and implication by the governments put them in trouble. The problem is that legal trouble can cost them. It can even cost you your business. After 9/11 money laundering and other compliance issues are more dealt in the organization standard operating procedure (Wikipedia 2010)</span></p><span data-dcnode-id="1205" instrument_node="">
</span><h2 data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Poverty and inequality of income:</span></h2><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Due to high inflation and high unemployment rate continuously hitting the poverty level to increase, and that all because of inequality of income, contrary as the inflation increase the cost of business will also increase that thing put the pressure on the business man to reduce the prices because consumer start searching for alternative. In Pakistan micro finance is getting importance as an effective tool for social mobilization &amp; poverty alleviation. Currently in Pakistan, a variety of institution including micro finance banks &amp; Others ranging from NGO’s to private &amp; Government sponsored ruler support programs are delivering services to the poor, who don’t have access to or neglected by the commercial banks. Micro finance aims at empowering individuals to earn a reasonable income through micro credits. Micro finance caters the needs of borrowers and usually focuses on the segment of the population whose economic status falls below poverty level (Krutz 2004)</span></p><span data-dcnode-id="1199" instrument_node="">
</span><div data-dcnode-id="1188" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="u45b4f2c7e72fe9e826d240e037e1e531" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//customwritings.co/stress-management-in-the-workplace/" target="_blank"><div data-dcnode-id="1190" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Read also</span></span><span data-dcnode-id="1193" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Stress Management In The Workplace</span></span></div></a></div><h2 data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Ethical issues in business:</span></h2><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Ethics and moral compulsion are something that we all come across at one time or another. All persons have to act in a way that would support the society in a proficient setting. In every business there are own policy of individuals and ethics within the particular business have adhere the compliance of the code conduct most of the organization investing lot of resource in order to maintain the ethic and code of conduct within the organization, even though regulatory bodies also penalized the organization if in case of non – compliance (Krutz 2004)</span></p><span data-dcnode-id="1182" instrument_node="">
</span><h2 data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Constantly Changing Economic Environment:</span></h2><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Dynamic economic environment is a night mare for the Contemporary business, because already exist giant in the market is a serious threat for them, because most of them have made cartel and create obstacle for the new business men to enter in the market or survival.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Economical changes like inflation , Balance of payment, unemployment and poverty is also hindrance for the growth of business, for the fighting against all these indicators, entrepreneur need specific skill and knowledge, because without that he / she cannot be able to run the business smoothly (Griffin and Pustay 2009)</span></p><span data-dcnode-id="1173" instrument_node="">
</span><h2 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Risk Management:</span></h2><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Every organization is vulnerable of low chances events that could have a potentially appalling effect. Every single step has creating question for the organization success, and organization has to fight not only with external factor but has to manage the internal factor of the organization. All around us we find some people / object / substances that are working against the organization and the entire factor is consist of those indicators that need to be monitored.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Theft of property</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Breach of laws</span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Computer crimes</span></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Fraud</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Weather related damage</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">In order to determine the variance between the expected and achieving results company has to determine the specific road map and checklist of the indicator which plays are major role in the indicator (Cateora and Graham 2007).</span></p><span data-dcnode-id="1149" instrument_node="">
</span><h2 data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Developing and Mentoring Employees:</span></h2><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Managing the employees / labor is the critical issue for the business men in these days because as the dynamic environment is coming around, for competing with that we need to keep our staff in the phase of learning, and continuous training is required to make them up to date..</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">The actual problem comes when the employee / labor are unwilling to change and create hindrance in the way, so fighting with this problem is the main issue for the entrepreneurs.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><h2 data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">5. Negotiating and Managing Critical Relationships with stake holders:</span></h2><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Developing / maintaining the relationship with all the stake holders is the important thing for the entrepreneurs because each and every one has its own importance, and without making good relation with them survival is difficult, for all the building relationship entrepreneurs need to have the negotiation and communication skills (Wikipedia 2010).</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Every day we have noticed that lots of entrepreneurs were lost their businesses just because they are lack with these skills and for understanding the critical relation with the stakeholders we must need to understand the importance, if we neglect the customers, so we lose business, if we neglect the good supplier so we lose the quality, if we neglect the distributor so we lose the perfection is services, and finally if we neglect the Government so we have to ready for the sanctions and implication / charges / penalties.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><div data-dcnode-id="1120" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="ub2e61be8b3676df6bca9263d8cbe16d5" data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//customwritings.co/business-factor-analysis-walt-disney/" target="_blank"><div data-dcnode-id="1122" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Read also</span></span><span data-dcnode-id="1125" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Business Factor Analysis: Walt Disney</span></span></div></a></div><h2 data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Managing global operation:</span></h2><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">While organizations turn into global they frequently end up paying a intense price in requisites of managing complex challenges and issues.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Host Country Norms and Customs.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Workforce management</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Host country languages</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Unfamiliar laws and regulations.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Unexpected Cost mix.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Globalization has exaggerated most of business tremendously. Multinational Corporations are functioning and operating in almost every part of the world. It is significant to expend time in considerate how globalization formulates it pertinent and necessary for a MNC to scatter and spread its capacity and meaning of Operation. It would be correct if attempt to know the philosophy of Multinational Companies are not operating in any certain regions or countries. Similarly, the western worlds describe these shortcomings of Globalization, if a business decides to close up its business and depart from a host company. The general disadvantages which direct to a Multi National Company forgoing globalization include (Gauzente and Ranchhod 2002).</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Proprietary Technology to host countries.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Poor Employee skills.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Political risks.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Customer response time is slow.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Effective communication</span></p><span data-dcnode-id="1081" instrument_node="">
</span><h2 data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Common reasons why organization Fail:</span></h2><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">We can identify certain familiar reasons why Organizations fail to achieve a competitive advantage and end up losing out to their competitors. These reasons are universal in nature and find the same footing in Pakistan as well as any other place in the world. http://smallbiztrends.com/category/current-issues</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">1. Too much emphasis on short-term financial performance. Quite often, cost cutting, profit maximizing at the cost of social responsibility or employee motivation is a failed strategy pursued by organizations, which just hastens their status to oblivion.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">2. Failing to take advantage of strengths and opportunities. This is in reality failing to hold on to proven successful strategies or core competencies. Sometimes a change in leadership leads to change in strategy, where just for the sake of glory and high profits, organizations forget their core competence and opt for strategies and tactic which cause their downfall.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">3. Failing to recognize competitive threats. This reason is the exact opposite of failure to make use of the organizations strengths. Quite often organizations decide to pursue status quo and ends up bringing no new product or service or even no innovation in its existing product or service line leading to lack of customer satisfaction, decline in profits and finally being declared a failure.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">4. Neglecting operations strategy. This is definitely the most important reason of failure; organizations often end up employing non productive techniques which lead to inconsistent and failed operations.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">5. Too much emphasis in product and service design and not enough on improvement. Differentiation in terms of service and product, American companies in 1980s did that they never introduced incremental refinements rather went for big changes and thus lost to Japanese competitors.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">6. Neglecting investments in capital and human resources: A total disregard to use the best resource. Capital and human resources in the long run make or break an organization.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><h2 data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">4.0 Conclusion:</span></h2><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Successful management is founded on the mastery of a multitude of details and the success of the business is depended on the efficient management from the available resources and decision making for best purpose. While management teach the significance of focusing attention on main issues affect the business, managers realize the main issues are the variety form the business. The small mistake to the business is unrecoverable bankruptcy, in a progressively more controlled society, inattentiveness to one slight detail cans consequence in considerable commotion of the business. Above mentioned problems is not the only problem faced by the entereprenurers but also every day they faced some sort of problem and hazard in conducting operations and meeting the standards, internal and external players of the market are the main indicator that need to be monitored and effectively organized.</span></p><span data-dcnode-id="1051" instrument_node="">
