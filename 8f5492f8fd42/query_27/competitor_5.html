-id="795" instrument_node="">
</span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterslice.com/contact-us" target="_blank"><img alt="SP Services" class="add-img" data-dcnode-id="794" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterslice.com/admin/style/images/advertisement/20190629110006_enterslice%2520learning.png&amp;raw"></a></div><div class="current-blog-detail" data-dcnode-id="644"><div class="current-blog-title" data-dcnode-id="789"><h1 data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">
What are the Challenges Faced by ARC in Case of NPAs</span></h1></div><div class="current-blog-author mt-4 d-flex" data-dcnode-id="773"><span data-dcnode-id="788" instrument_node=""> </span><img alt="Narendra Kumar" class="avatar avatar-50 wp-user-avatar wp-user-avatar-50 alignnone photo" data-dcnode-id="787" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterslice.com/learning/wp-content/uploads/2019/04/nk-1-150x150.jpg&amp;raw" width="50"><h3 class="ml-3" data-dcnode-id="774"><span data-dcnode-id="786" instrument_node="">
</span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterslice.com/learning/author/enterslice/" rel="author" target="_blank" title="Posts by Narendra Kumar"><span data-dcnode-id="785" instrument_node="">Narendra Kumar</span></a><span data-dcnode-id="783" instrument_node=""> | </span><span class="blog-time" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Updated: Jul 28, 2018</span></span><span data-dcnode-id="780" instrument_node=""> | </span><span class="blog-time" data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">Category:
</span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterslice.com/learning/category/finance-license/rbi-registration/" rel="category tag" target="_blank"><span data-dcnode-id="778" instrument_node="">RBI Registration</span></a><span data-dcnode-id="776" instrument_node=""> </span></span></h3></div><div class="current-blog-image mt-5" data-dcnode-id="770"><span data-dcnode-id="772" instrument_node=""> </span><img alt="Asset Reconstruction Companies (ARCs)" class="img-fluid" data-dcnode-id="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterslice.com/learning/wp-content/uploads/2018/07/Asset-Reconstruction-Companies-ARCs.jpeg&amp;raw"></div><div class="mt-4" data-dcnode-id="654"><h2 data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">What are the Asset Reconstruction Companies (ARCs)?</span></h2><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">An Asset Reconstruction Companies (ARCs) is a specific type of financial institution (having registered with the RBI) purchasing the NPAs or bad assets from banks so that the latter can clear such debts from their balance sheets. Thus, ARCs are in the activities of purchasing the bad loans from the banks or even financial institutions.</span></p><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Thus, the balance sheet of the banks is cleaned up when they sell their NPAs to the ARCs. This will help the banks to focus on their routine banking activities and save their time of chasing the defaulters for recovery. The banks sell the bad assets (NPAs) to the Asset Reconstruction Companies (ARCs) at a mutually agreed value.</span></p><p data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">It is observed that out of 19 Public Sector Banks (excluding State Bank Group), majority i.e. 10 are under Prompt Corrective Action (PCA) by </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rbi.org.in/" target="_blank"><span data-dcnode-id="762" instrument_node="">RBI</span></a><span data-dcnode-id="760" instrument_node=""> due to NPAs. Further, the stressed assets of the banking system are at a significantly elevated level and they are ever increasing.</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">However, the ARC faces many hurdles and challenges to overcome in order to perform its best in this field.</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Further, the Government of India has passed the Insolvency and Bankruptcy Code (IBC) offering various measures to overcome many such problems related to the functions of Asset Reconstruction Companies (ARCs).</span></p><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">The various challenges which stop ARCs scale up to a leading role in whole NPA play can be discussed as follow:</span></p><ul data-dcnode-id="730"><li data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">First and foremost, the requirement of the ARC is to have sufficient availability of funds to match the huge amount of NPA market. It will be welcomed if the government establishes </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterslice.com/asset-reconstruction-company-registration" target="_blank"><span data-dcnode-id="751" instrument_node="">Asset Reconstruction Company</span></a><span data-dcnode-id="749" instrument_node=""> (ARC) with an equity contribution from the government itself and the Reserve Bank of India (RBI) to strengthen its capital base. Thus ARC will have sufficient fund to deal NPA problem.</span></li><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Second, even if sufficient funds are available with ARC, the price expectation mismatch between selling bank (s) and buying ARC and agreement on an acceptable valuation of the bad assets will also create a challenge for ARC.</span></li><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">It is the absence of a vibrant distressed debt market in India. It is also difficult to sell NPA assets in the market.</span></li><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">It is observed that mostly the debt aggregation is carried out. Unless a majority of the debt is aggregated in one ARC, the fast and efficient resolution will be difficult to attain.</span></li><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">To develop and possess requisite skill sets in managing turnaround story is also another big challenge for ARCs.</span></li><li data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">The absence of professional expertise for a turnaround in ARC is very common. The professionals such as bankers, lawyers and chartered accountants who join ARCs usually expect some extra return such as </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Employee_stock_ownership_plan" target="_blank"><span data-dcnode-id="738" instrument_node="">employee stock ownership plans (ESOPs</span></a><span data-dcnode-id="736" instrument_node="">) as a major mode of compensation. But due to regulatory issues, this is not possible easily and ARC is deprived of professionals’ service of experts which may help it tremendously.</span></li><li data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">There is the absence of a mature secondary market for security receipts issued by ARC to Qualified Institutional Buyers. This further leads the Banks to buy SRs backed by their own stressed assets. It is observed that currently, over 80% of SRs are held by seller banks themselves only.</span></li><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">The Regulatory Constraints: Currently, all ARCs are subject to the regulation and scrutiny of the regulator i.e. the RBI and it is observed that some stringent regulations have hampered their growth and viability. Thus, the ARC is not being able to function with all its potentials.</span></li></ul><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">It is utmost necessary for a rigorous and a realistic approach to pricing between the banks and ARCs.</span></p><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Therefore, it is an urgent need for all stakeholders, including the regulator, to come together to make the entire process of NPA sale, resolution, recovery and revival fast and smooth.</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The ARC has a very vital role to play in current scenario and it should be strengthened to solve the massive NPA problem prevailing in Indian banking industry.</span></p><div class="heateorSssClear" data-dcnode-id="723"></div><div class="heateor_sss_sharing_container heateor_sss_horizontal_sharing" data-dcnode-id="656" data-heateor-sss-href="https://enterslice.com/learning/asset-reconstruction-companies-arcs/"><div class="heateor_sss_sharing_title" data-dcnode-id="722" style="font-weight:bold"></div><div class="heateor_sss_sharing_ul" data-dcnode-id="658"><a class="heateor_sss_facebook" data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fenterslice.com%252Flearning%252Fasset-reconstruction-companies-arcs%252F" rel="nofollow noopener" style="font-size:32px!important;box-shadow:none;display:inline-block;vertical-align:middle" target="_blank" title="Facebook"><span class="heateor_sss_svg" data-dcnode-id="717" style="background-color:#3c589a;width:70px;height:35px;border-radius:8px;display:inline-block;opacity:1;float:left;font-size:32px;box-shadow:none;display:inline-block;font-siz
