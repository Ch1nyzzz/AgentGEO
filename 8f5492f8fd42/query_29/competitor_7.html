</span><h4 data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">The Evolution and Impact of Online Influencers Around the World</span></h4><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">Across the globe, word of mouth has been shown to influence between </span><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/business-functions/marketing-and-sales/our-insights/a-new-way-to-measure-word-of-mouth-marketing" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1047" instrument_node="">20 to 50 percent of all purchasing decisions</span></a><span data-dcnode-id="1045" instrument_node="">. In the ever-changing world of social networking, this extends well beyond recommendations from friends and family into the realm of online influencers. As social media channels continue to evolve, there is still a fundamental need for human connection. These important connections have grown significantly with the advent of social networking.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1042" instrument_node="">Despite the closeness social networking can provide, there are still some fascinating behavioral quirks that exist online across the globe. When a business is embarking on a social strategy, it is important to understand how various regions view, and use, social media. Businesses looking to push their social media presence globally should invest in </span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globesmart.com/" rel="noopener" target="_blank"><span data-dcnode-id="1041" instrument_node="">cultural intelligence resources like GlobeSmart</span></a><span data-dcnode-id="1039" instrument_node=""> to understand the cultural differences at play on- and offline.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><h4 data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Social Media: The Fastest Growing Population On The Planet – Serving 2.03 Billion People and Rising</span></h4><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1033" instrument_node="">Nearly 30 percent of the global population is on social media. Over 2.03 billion people worldwide are active social media users. </span><em data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">This reach on a global scale is nearly one billion people more than the entire population of China.</span></em><span data-dcnode-id="1030" instrument_node=""> Due to the Chinese government’s block of Facebook and Twitter, China’s social landscape is unique. The second most popular social networking platform in the world is China’s online messaging platform QQ, with nearly 820 million users. However, by far the most popular social networking platform worldwide is Facebook, with 1.3 billion monthly active users.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1027" instrument_node="">Cultural customs impact the adoption of social media networks and how they are used. For instance, </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weforum.org/agenda/2017/03/most-popular-social-networks-mapped/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1026" instrument_node="">according to the World Economic Forum</span></a><span data-dcnode-id="1024" instrument_node="">, as of January 2017, Japan is the only country where Twitter is the most popular platform, with 35 million active monthly users; while Facebook has 25 million. Japanese society usually sees a high level of social conformity. Because of this, social networks may take some time to become popular. Also, Japanese culture tends to discourage boasting or self-promotion, and most Japanese prefer to use pseudonyms online. In 2017, </span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/553748/facebook-penetration-in-japan/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1023" instrument_node="">Facebook was only used by 22.9 percent of the population of Japan</span></a><span data-dcnode-id="1021" instrument_node="">. According to </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.socialmediatoday.com/content/social-media-fast-facts-japan" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1020" instrument_node="">research by Social Media Today</span></a><span data-dcnode-id="1018" instrument_node="">, it’s more commonly used as a professional tool, similar to LinkedIn. By contrast, 94 percent of the population in India has a Facebook account.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Instagram, which has 600 million active global users, is runner-up in 37 countries and Twitter is second in the US and most of Western Europe. The second choice for Indians is LinkedIn, while social news aggregator Reddit took the number two position in Australia, Canada, Denmark, New Zealand and Norway.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1012" instrument_node="">Social media strategist Vincenzo Cosenza has been charting the most popular social networks by country since 2009. His </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vincos.it/world-map-of-social-networks/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1011" instrument_node="">January 2017 World Map of Social Networks</span></a><span data-dcnode-id="1009" instrument_node="">, based on traffic data from Alexa and SimilarWeb, reveals that Facebook is still the leader in 119 out of 149 countries analyzed.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1004" instrument_node="">

</span><h4 data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Global Trends in Social Media and Online Influencers</span></h4><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="964"><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.twitter.com/marketing/en_us/a/2016/new-research-the-value-of-influencers-on-twitter.html"><span data-dcnode-id="967" instrument_node="">Research from Twitter</span></a><span data-dcnode-id="965" instrument_node=""> shows that 49 percent of consumers seek purchase guidance from social media influencers, and nearly 40 percent of Twitter users said they had made a purchase as a direct result of an influencer’s Tweet. On Instagram, brands are investing billions in influencers.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">A study by integrated communications agency </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.prnasia.com/pr/2014/01/22/140023712.shtml"><span data-dcnode-id="961" instrument_node="">Waggener Edstrom</span></a><span data-dcnode-id="959" instrument_node=""> examined brand engagement trends within the Asia Pacific region. The research found that 78 percent of consumers in the APAC region get information about products and services on social media, and 68 percent share that brand-related information on social channels.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">It’s clear this burgeoning economy of social media and online influencers is continuing to evolve and become increasingly important, worldwide.</span></p><span data-dcnode-id="954" instrument_node="">
</span><h4 data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Say Hello to Top Social Media Influencers from Across the Globe</span></h4><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Recently, Forbes launched its global “Influencer List”, a quarterly feature spotlighting power players from around the world, who have turned their social media audiences — on platforms like Twitter, YouTube, Facebook and Instagram — into empires.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Today, we’ll look at some of the top social media influencers from across the globe, and what makes them so popular within the social networking realm of their home countries and beyond. These influencers built their fame strictly from the internet, rather than celebrities who happen to have large online audiences.</span></p><span data-dcnode-id="945" instrument_node="">

</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Social networking is now the new norm, making our world even smaller. No matter where you are, there are social media outlets that will bring us all together. Influencers in this online world are an important part of business conversations. Understanding cultural nuances and the social networking matrix of what works and doesn’t work both on- and off-line in different countries is key.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Could it be that the fast-moving landscape of social media influence is shifting from conventional celebrities to everyday, passionate, tenacious individuals from around the globe who have made a name for themselves in social media? Only time will tell.</span></p><span data-dcnode-id="459" instrument_node="">
