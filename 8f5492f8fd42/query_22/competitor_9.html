</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1003"><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1046" style="color: #c0911c;"><strong data-dcnode-id="1047"><img alt="" class="wp-image-12373 size-full alignright" data-dcnode-id="1049" height="270" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2021/04/MattJudge.png&amp;raw" srcset="https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/04/MattJudge.png 200w, https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/04/MattJudge-100x135.png 100w" width="200"><span data-dcnode-id="1048" instrument_node=""> Matt Parsons </span></strong></span><span data-dcnode-id="1045" instrument_node="">&nbsp;</span><strong data-dcnode-id="1037"><span data-dcnode-id="1038" style="color: #000000;"><span data-dcnode-id="1044" instrument_node="">| </span><span data-dcnode-id="1039" style="color: #c0911c;"><span data-dcnode-id="1043" instrument_node="">Founder&nbsp; </span><span data-dcnode-id="1041" style="color: #000000;"><span data-dcnode-id="1042" instrument_node="">| </span></span><span data-dcnode-id="1040" instrument_node="">Radius Networks</span></span></span></strong></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" style="font-size: 12pt; color: #000000;"><span data-dcnode-id="1034" instrument_node="">As the founder of Radius Networks, Matthew helps the world’s leading organisations to empower their employee networks and drive diversity, equity and inclusion.&nbsp;</span></span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1028" style="text-align: justify;"><span data-dcnode-id="1029" style="font-size: 12pt; color: #000000;"><span data-dcnode-id="1030" instrument_node="">An award-winning entrepreneur, Matthew founded Radius in 2011 after working in the events industry. As a gay man dealing with the challenges of ADHD and dyslexia, he found a sense of belonging when he joined and later founded his own employee network. The experience was life-changing.</span></span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1024" style="text-align: justify;"><span data-dcnode-id="1025" style="font-size: 12pt; color: #000000;"><span data-dcnode-id="1026" instrument_node="">Seeing first-hand the power of employee networks to ignite change, Matthew set up Radius, the first and only organisation solely dedicated to supporting network leaders and turning their passion into action.&nbsp;</span></span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1017" style="text-align: justify;"><span data-dcnode-id="1018" style="color: #000000;"><span data-dcnode-id="1021" style="font-size: 12pt;"><span data-dcnode-id="1022" instrument_node="">Leading the industry for over a decade, Radius now works with hundreds of organisations across more than 100 countries, including household names such as the BBC, Bank of America, Coca Cola, Disney, Facebook, IBM plus HM Government.&nbsp;</span></span><span data-dcnode-id="1019" style="font-size: 12pt;"><span data-dcnode-id="1020" instrument_node="">&nbsp;</span></span></span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1013" style="text-align: justify;"><span data-dcnode-id="1014" style="font-size: 12pt; color: #000000;"><span data-dcnode-id="1015" instrument_node="">Radius supports employee networks across all different types of diversity, helping businesses to drive a bottom-up revolution. By developing network leaders, Matthew helps employers to build better, stronger networks that support communities’ wellbeing and create a place where everyone belongs.&nbsp;</span></span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" style="font-size: 12pt; color: #000000;"><span data-dcnode-id="1011" instrument_node="">A National Diversity Awards winner, Matthew&nbsp;provides strategic support to many D&amp;I businesses and has served on the volunteer board of Diversity Role Models.&nbsp;</span></span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1005" style="text-align: justify;"><span data-dcnode-id="1006" style="font-size: 12pt; color: #000000;"><span data-dcnode-id="1007" instrument_node="">Today Matthew is passionate about promoting human growth through cross cultural understanding and helping businesses connect globally across perceived divides. As more of us join the global, digital workspace, this work feels more important than ever.&nbsp;</span></span></p><span data-dcnode-id="1004" instrument_node="">
</span></div><span data-dcnode-id="1002" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="994" data-index="32" id="panel-3640-1-0-31"><span data-dcnode-id="999" instrument_node=""> </span><div class="textwidget" data-dcnode-id="996"><hr data-dcnode-id="998"><span data-dcnode-id="997" instrument_node="">
</span></div><span data-dcnode-id="995" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="969" data-index="33" id="panel-3640-1-0-32"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="970"><span data-dcnode-id="993" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="972"><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="988" style="color: #c0911c;"><strong data-dcnode-id="989"><img alt="" class="wp-image-12377 size-full alignright" data-dcnode-id="991" height="270" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2021/04/LizJudge.png&amp;raw" srcset="https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/04/LizJudge.png 200w, https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/04/LizJudge-100x135.png 100w" width="200"><span data-dcnode-id="990" instrument_node=""> Liz Johnson </span></strong></span><span data-dcnode-id="987" instrument_node="">&nbsp;</span><strong data-dcnode-id="979"><span data-dcnode-id="980" style="color: #000000;"><span data-dcnode-id="986" instrument_node="">| </span><span data-dcnode-id="981" style="color: #c0911c;"><span data-dcnode-id="985" instrument_node="">Co-Founder&nbsp; </span><span data-dcnode-id="983" style="color: #000000;"><span data-dcnode-id="984" instrument_node="">|&nbsp; </span></span><span data-dcnode-id="982" instrument_node="">The Ability People</span></span></span></strong></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" style="color: #000000;"><span data-dcnode-id="976" instrument_node="">Paralympic gold-medallist Liz Johnson spent the last 20 years winning accolades in the world of elite sport. She swept the Paralympics, World and European Championships and was selected as London 2012’s Paralympic Oath Taker. Beyond her sports career, Liz was struck by the UK’s massive disability gap which has stood at 30% for the past decade. To tackle this and the stigma around disability she co-founded The Ability People (TAP). TAP is a unique consultancy created to end disability discrimination in the workplace and close the disability employment gap. TAP is staffed entirely by people with disabilities and works with companies to help them become authentically inclusive. Liz is also a passionate disability rights campaigner and fronted a UN award-winning disability awareness campaign with the IPC. She is an Ambassador for the charity Panathlon Challenge and a patron of Dreamflight.</span></span></p><span data-dcnode-id="973" instrument_node="">
</span></div><span data-dcnode-id="971" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="963" data-index="34" id="panel-3640-1-0-33"><span data-dcnode-id="968" instrument_node=""> </span><div class="textwidget" data-dcnode-id="965"><hr data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">
</span></div><span data-dcnode-id="964" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="922" data-index="35" id="panel-3640-1-0-34"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="923"><span data-dcnode-id="962" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="925"><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" style="color: #c0911c;"><strong data-dcnode-id="959"><img alt="" class="alignright wp-image-6286 size-full" data-dcnode-id="960" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2019/04/Dave.jpg&amp;raw" width="200"></strong></span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" style="color: #000000;"><strong data-dcnode-id="950"><span data-dcnode-id="954" style="color: #c0911c;"><span data-dcnode-id="955" instrument_node="">Dave Thompson MBE DL MBA</span></span><span data-dcnode-id="953" instrument_node=""> | </span><span data-dcnode-id="951" style="color: #c0911c;"><span data-dcnode-id="952" instrument_node="">Warrington Disability Partnership</span></span></strong></span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" style="color: #800080;"><a class="ProfileHeaderCard-screennameLink u-linkComplex js-nav" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/Davet21" rel="noopener noreferrer" style="color: #800080;"><span class="username u-dir" data-dcnode-id="943" dir="ltr"><span data-dcnode-id="946" instrument_node="">@</span><b class="u-linkComplex-target" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Davet21</span></b></span></a></span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" style="color: #000000;"><span data-dcnode-id="938" instrument_node="">Dave is the founder and Chief Executive of Warrington Disability Partnership, a user led organisation, employing over 50 staff and nearly 200 volunteers. Together they provide a wide range of independent living services including two Independent Living Centres, Direct Payments and Payroll Services, Shopmobility, Inclusive Sports, and a number of Employment and Educational contracts.</span></span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" style="color: #000000;"><span data-dcnode-id="934" instrument_node="">Until April 2015 Dave worked as a senior manager in the NHS. He started out his 20 year career as the UK’s first full-time Disability Advisor. Completing his NHS career as the Assistant Director of Inclusion where he led on equality &amp; diversity, patient &amp; public involvement and social inclusion. Dave has been involved in a number of high profile initiatives working with NHS Employers and NHS England, including policies and procedures still used across health and social care services.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" style="color: #c0911c;"><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">&nbsp;</span></strong></span></p><span data-dcnode-id="926" instrument_node="">
</span></div><span data-dcnode-id="924" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="916" data-index="36" id="panel-3640-1-0-35"><span data-dcnode-id="921" instrument_node=""> </span><div class="textwidget" data-dcnode-id="918"><hr data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
</span></div><span data-dcnode-id="917" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="894" data-index="37" id="panel-3640-1-0-36"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="895"><span data-dcnode-id="915" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="897"><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="910" style="color: #c0911c;"><strong data-dcnode-id="911"><img alt="" class="wp-image-9031 size-full alignright" data-dcnode-id="913" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2020/02/MeganKey-1.png&amp;raw" width="200"><span data-dcnode-id="912" instrument_node=""> Megan Key </span></strong></span><span data-dcnode-id="909" instrument_node="">&nbsp;</span><strong data-dcnode-id="904"><span data-dcnode-id="905" style="color: #000000;"><span data-dcnode-id="908" instrument_node="">|&nbsp; </span><span data-dcnode-id="906" style="color: #c0911c;"><span data-dcnode-id="907" instrument_node="">HMPPS</span></span></span></strong></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" style="color: #000000;"><span data-dcnode-id="901" instrument_node="">Megan Key is an award winning Diversity &amp; Inclusion Leader in the public sector and has over 10 years experience in trans activism and volunteering. She has contributed to public policy and shared her experiences in print, online and on TV on a range of topics including employment, media representation, sex and relationships and mental health. Megan is currently a Director of London LGBTQ+ Community Centre.</span></span></p><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="888" data-index="38" id="panel-3640-1-0-37"><span data-dcnode-id="893" instrument_node=""> </span><div class="textwidget" data-dcnode-id="890"><hr data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">
</span></div><span data-dcnode-id="889" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="847" data-index="39" id="panel-3640-1-0-38"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="848"><span data-dcnode-id="887" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="850"><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="882" style="color: #c0911c;"><strong data-dcnode-id="883"><img alt="" class="alignright wp-image-14761 size-full" data-dcnode-id="885" height="270" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2022/01/VanessaV.png&amp;raw" srcset="https://www.inclusivecompanies.co.uk/wp-content/uploads/2022/01/VanessaV.png 200w, https://www.inclusivecompanies.co.uk/wp-content/uploads/2022/01/VanessaV-100x135.png 100w" width="200"><span data-dcnode-id="884" instrument_node=""> Vanessa Vallely </span></strong></span><span data-dcnode-id="881" instrument_node="">&nbsp;</span><strong data-dcnode-id="873"><span data-dcnode-id="874" style="color: #000000;"><span data-dcnode-id="880" instrument_node="">|&nbsp; </span><span data-dcnode-id="875" style="color: #c0911c;"><span data-dcnode-id="879" instrument_node="">WeAreTheCity </span><span data-dcnode-id="877" style="color: #000000;"><span data-dcnode-id="878" instrument_node="">|</span></span><span data-dcnode-id="876" instrument_node=""> MD</span></span></span></strong></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" style="color: #000000;"><span data-dcnode-id="870" instrument_node="">Vanessa is one of the UK’s most well-networked women and has provided keynotes on a variety of career related topics for over 400 companies worldwide. Vanessa is also one of the UK’s most prominent figures in gender equality and often provides guidance and consultancy to both government and corporate organisations who are seeking to attract, develop and retain their female talent.</span></span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" style="color: #000000;"><span data-dcnode-id="866" instrument_node="">At the height of her successful 25 year career in the financial services, Vanessa launched the award winning WeAreTheCity.com in 2008 as a vehicle to help corporate women connect and grow professionally and personally. WeAreTheCity.com now has over 60,000 members and in 2013 launched a sister site in India.</span></span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" style="color: #000000;"><span data-dcnode-id="862" instrument_node="">Vanessa is the also the -founder of UK wide diversity forum Gender Networks. Gender Networks (formerly The Network of Networks) brings together diversity leaders from over 120 firms to share best practice. Vanessa is the author of the book “Heels of Steel: Surviving and Thriving in the Corporate World” which tracks her career and shares 13 chapters of tips to succeed in the workplace.</span></span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" style="color: #000000;"><span data-dcnode-id="858" instrument_node="">Over the past seven years, she has been named Women in Banking &amp; Finance’s Champion for Women, Financial News Top 100RisingStar, The International Alliance for Women Top 100 Women globally &amp; Brummells Top 30 London Entrepreneurs. In 2015 Vanessa was in GQ UK’s Top 100 Connected Women and the Evening Standard’s 1000 Most Influential Londoners. Vanessa is a regular guest on TV and radio and also sits on the Government Digital Services advisory board.</span></span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" style="color: #000000;"><span data-dcnode-id="854" instrument_node="">Vanessa is also the Pearly Queen of The City of London, a tradition that has been in her family for over 100 years. She is an avid charity worker and sits on the board for Cancer Research UK as one of its Women of Influence.</span></span></p><span data-dcnode-id="851" instrument_node="">
</span></div><span data-dcnode-id="849" instrument_node="">
</span></div></div><div class="so-panel widget_text panel-last-child" data-dcnode-id="841" data-index="40" id="panel-3640-1-0-39"><span data-dcnode-id="846" instrument_node=""> </span><div class="textwidget" data-dcnode-id="843"><hr data-dcnode-id="845"><span data-dcnode-id="844" instrument_node="">
