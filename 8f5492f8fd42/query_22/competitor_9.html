</span><p data-dcnode-id="1842"><span data-dcnode-id="1843" style="color: #000000;"><span data-dcnode-id="1844" instrument_node="">Alexis joined Penna in 2014 after spending seven years at Capita Resourcing and Reed Professional Services. Here she worked on large-scale resourcing strategies and digital projects for the Office for National Statistics, Barclays Retail, the BBC and others. At Penna, Alexis combined her passion and career to shape her dream job, bringing diversity and inclusion expertise to our clients as the businesses’ D&amp;I Lead. She’s also leading Penna on their own D&amp;I journey.</span></span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" style="color: #000000;"><span data-dcnode-id="1840" instrument_node="">Alexis oversees the entire recruitment and employee lifecycle for Penna’s attraction, selection, assessment work and retention; ensuring it promotes the highest standards of diversity and inclusion. She offers client support in all things D&amp;I to set clear responsibilities for strategy and programme development, challenging organisations to change and grow. Her approach is to stop focusing on culture ‘fit’ and start focusing on culture ‘add’, eradicating unhealthy monocultures in workplaces.</span></span></p><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" style="color: #000000;"><span data-dcnode-id="1836" instrument_node="">It’s this approach which has delivered award-winning results for clients - most recently ‘Best Digital Experience for Early Talent’ at the 2020 RAD awards. She’s passionate about all strands of diversity, and has mostly recently worked across the UK and USA to ensure actions are being taken to remove racial inequality in the workplace, in light of the recent height of the Black Lives Matter movement.</span></span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1830"><span data-dcnode-id="1831" style="color: #000000;"><span data-dcnode-id="1832" instrument_node="">Alexis’ D&amp;I remit spans across strategic consultancy, audits and reviews, learning and development, analysis, knowledge sharing, equality impact assessments and enabling inclusive recruitment.</span></span></p><span data-dcnode-id="1829" instrument_node="">
</span></div><span data-dcnode-id="1827" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1819" data-index="2" id="panel-3640-1-0-1"><span data-dcnode-id="1824" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1821"><hr data-dcnode-id="1823"><span data-dcnode-id="1822" instrument_node="">
</span></div><span data-dcnode-id="1820" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1778" data-index="3" id="panel-3640-1-0-2"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1779"><span data-dcnode-id="1818" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1781"><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1803"><strong data-dcnode-id="1808"><img alt="" class="alignright wp-image-14457 size-full" data-dcnode-id="1816" height="270" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2021/09/Paul.png&amp;raw" srcset="https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/09/Paul.png 200w, https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/09/Paul-100x135.png 100w" width="200"><span data-dcnode-id="1809" style="color: #000000;"><span data-dcnode-id="1814" style="color: #c0911c;"><span data-dcnode-id="1815" instrument_node="">Paul Sesay</span></span><span data-dcnode-id="1813" instrument_node="">&nbsp;| </span><span data-dcnode-id="1811" style="color: #c0911c;"><span data-dcnode-id="1812" instrument_node="">Inclusive Awards</span></span><span data-dcnode-id="1810" instrument_node="">&nbsp;|&nbsp;</span></span></strong><span data-dcnode-id="1804" style="color: #c0911c;"><strong data-dcnode-id="1805"><span class="Apple-style-span" data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Founder &amp; CEO</span></span></strong></span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" style="color: #800080;"><a class="ProfileHeaderCard-screennameLink u-linkComplex js-nav" data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/SesayPaul" rel="noopener" style="color: #800080;"><span class="username u-dir" data-dcnode-id="1798" dir="ltr"><span data-dcnode-id="1801" instrument_node="">@</span><b class="u-linkComplex-target" data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">SesayPaul</span></b></span></a></span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" style="color: #000000;"><span data-dcnode-id="1793" instrument_node="">Paul Sesay is the Founder and Chief Executive Officer of the Inclusive Top 50 UK Employers, National Diversity Awards, Inclusive Awards and Inclusive Jobs since 2006. Paul’s business acumen has mainly been with a social focus.</span></span></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" style="color: #000000;"><span data-dcnode-id="1789" instrument_node="">With over fifteen years worth of experience within the Diversity, Equality and Inclusion sector, Paul has worked with some of the largest organisations in the world on their diversity and inclusion profiles.</span></span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" style="color: #000000;"><span data-dcnode-id="1785" instrument_node="">He has also worked within local communities to help people from various backgrounds to achieve and empower disadvantaged groups throughout the UK. Paul’s initiatives have helped thousands of organisations and individuals get recognised for their hard work and dedication to diversity.</span></span></p><span data-dcnode-id="1782" instrument_node="">
</span></div><span data-dcnode-id="1780" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1772" data-index="4" id="panel-3640-1-0-3"><span data-dcnode-id="1777" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1774"><hr data-dcnode-id="1776"><span data-dcnode-id="1775" instrument_node="">
</span></div><span data-dcnode-id="1773" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1730" data-index="5" id="panel-3640-1-0-4"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1731"><span data-dcnode-id="1771" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1733"><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1750"><span data-dcnode-id="1765" style="color: #c0911c;"><strong data-dcnode-id="1766"><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.talktalk.co.uk/shop/" rel="noopener"><img alt="" class="alignright wp-image-10241 size-full" data-dcnode-id="1769" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2020/05/Lisa.png&amp;raw" width="200"></a><span data-dcnode-id="1767" instrument_node="">Lisa Adkin </span></strong></span><span data-dcnode-id="1764" instrument_node="">&nbsp;</span><strong data-dcnode-id="1751"><span data-dcnode-id="1760" style="color: #000000;"><span data-dcnode-id="1763" instrument_node="">| </span><span data-dcnode-id="1761" style="color: #c0911c;"><span data-dcnode-id="1762" instrument_node="">TalkTalk</span></span></span><span data-dcnode-id="1754" style="color: #000000;"><span data-dcnode-id="1755" style="color: #c0911c;"><strong data-dcnode-id="1756"><span data-dcnode-id="1759" instrument_node=""> &nbsp;</span><span data-dcnode-id="1757" style="color: #000000;"><span data-dcnode-id="1758" instrument_node="">| </span></span></strong></span></span><span class="s1" data-dcnode-id="1752" style="color: #c0911c;"><span data-dcnode-id="1753" instrument_node="">Inclusion Manager</span></span></strong></p><span data-dcnode-id="1749" instrument_node="">
</span><p class="p1" data-dcnode-id="1746"><span class="s1" data-dcnode-id="1747" style="color: #000000;"><span data-dcnode-id="1748" instrument_node="">Lisa has been working in the diversity and inclusion space for over seven years. With a background in financial services and&nbsp;telecommunications, Lisa drives&nbsp;impactful inclusion activity to make positive change. Lisa is an advocate for equality for all and&nbsp;a strong believer in taking an inter-sectional&nbsp;approach to inclusion.</span></span></p><span data-dcnode-id="1745" instrument_node="">
</span><p class="p1" data-dcnode-id="1739"><span data-dcnode-id="1740" style="color: #000000;"><span class="s1" data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Lisa is currently leading the inclusion strategy at TalkTalk; living the values of ‘We’re For Everyone’ and weaving inclusion through all areas of the business.</span></span><span class="s1" data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">&nbsp;</span></span></span></p><span data-dcnode-id="1738" instrument_node="">
</span><p class="p1" data-dcnode-id="1735"><span class="s1" data-dcnode-id="1736" style="color: #000000;"><span data-dcnode-id="1737" instrument_node="">Being a qualified counsellor, Lisa has&nbsp;a naturally empathic approach. She has volunteered for various charities and champions all elements of wellbeing. Lisa is an advocate for flexible working practices and ensuring there are diverse voices at the table. Always&nbsp;happy to share her own authentic story and truly role model inclusive behaviours.</span></span></p><span data-dcnode-id="1734" instrument_node="">
</span></div><span data-dcnode-id="1732" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1724" data-index="6" id="panel-3640-1-0-5"><span data-dcnode-id="1729" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1726"><hr data-dcnode-id="1728"><span data-dcnode-id="1727" instrument_node="">
</span></div><span data-dcnode-id="1725" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1666" data-index="7" id="panel-3640-1-0-6"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1667"><span data-dcnode-id="1723" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1669"><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1709"><strong data-dcnode-id="1713"><img alt="" class="alignright wp-image-14454 size-full" data-dcnode-id="1721" height="270" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2021/09/MichaelV.png&amp;raw" srcset="https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/09/MichaelV.png 200w, https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/09/MichaelV-100x135.png 100w" width="200"><span data-dcnode-id="1714" style="color: #000000;"><span data-dcnode-id="1719" style="color: #c0911c;"><span data-dcnode-id="1720" instrument_node="">Michael Vermeersch</span></span><span data-dcnode-id="1718" instrument_node="">&nbsp;| </span><span data-dcnode-id="1716" style="color: #c0911c;"><span data-dcnode-id="1717" instrument_node="">Microsoft UK</span></span><span data-dcnode-id="1715" instrument_node=""> | </span></span></strong><span data-dcnode-id="1710" style="color: #c0911c;"><strong data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Accessibility Product Marketing Manager, UK Disability Employee Resource Group Chair, Marketing &amp; Operations</span></strong></span></p><span data-dcnode-id="1708" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1698"><span data-dcnode-id="1699" style="color: #000000;"><span class="markwnmhqrd8q" data-dcnode-id="1706" data-markjs="true" data-ogab="" data-ogac="" data-ogsb="" data-ogsc=""><span data-dcnode-id="1707" instrument_node="">Michael</span></span><span data-dcnode-id="1705" instrument_node=""> is Microsoft UK’s Accessibility Product Marketing Manager; he is focused on landing our commitment to bridge the “Disability Divide”. </span><span data-dcnode-id="1700" lang="EN-US"><span data-dcnode-id="1704" instrument_node="">Working company-wide, alongside customers, partners, and communities, </span><span class="markwnmhqrd8q" data-dcnode-id="1702" data-markjs="true" data-ogab="" data-ogac="" data-ogsb="" data-ogsc=""><span data-dcnode-id="1703" instrument_node="">Michael</span></span><span data-dcnode-id="1701" instrument_node="">’s scope is to increase societal inclusion for people with disabilities. The commitment covers, technology, talent development and workplace culture. </span></span></span></p><span data-dcnode-id="1697" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1691"><span data-dcnode-id="1692" style="color: #000000;"><span data-dcnode-id="1696" instrument_node="">Using his creative neuro-diverse thinking and passion for inclusion, </span><span class="markwnmhqrd8q" data-dcnode-id="1694" data-markjs="true" data-ogab="" data-ogac="" data-ogsb="" data-ogsc=""><span data-dcnode-id="1695" instrument_node="">Michael</span></span><span data-dcnode-id="1693" instrument_node=""> created Microsoft’s Digital Inclusion offering, helping organisations gain greater business advantage, embedding this in their transformational journeys.</span></span></p><span data-dcnode-id="1690" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1685"><span data-dcnode-id="1686" style="color: #000000;"><span class="markwnmhqrd8q" data-dcnode-id="1688" data-markjs="true" data-ogab="" data-ogac="" data-ogsb="" data-ogsc=""><span data-dcnode-id="1689" instrument_node="">Michael</span></span><span data-dcnode-id="1687" instrument_node=""> also chairs Microsoft’s UK Disability Employee Resource Group and was invited to 10 Downing Street to present his views on bringing disabled talent into work.</span></span></p><span data-dcnode-id="1684" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1681"><span data-dcnode-id="1682" style="color: #000000;"><span data-dcnode-id="1683" instrument_node="">His personal proudest achievement still, is having brought Microsoft UK to Disability Confident Leadership status.</span></span></p><span data-dcnode-id="1680" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1675"><span data-dcnode-id="1676" style="color: #000000;"><span class="markwnmhqrd8q" data-dcnode-id="1678" data-markjs="true" data-ogab="" data-ogac="" data-ogsb="" data-ogsc=""><span data-dcnode-id="1679" instrument_node="">Michael</span></span><span data-dcnode-id="1677" instrument_node=""> received Microsoft’s highest Platinum Club award for his work in disability inclusion.</span></span></p><span data-dcnode-id="1674" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1671"><span data-dcnode-id="1672" style="color: #000000;"><span data-dcnode-id="1673" instrument_node="">He is listed as one of “125 People to follow” on LinkedIn about Diversity and Inclusion.</span></span></p><span data-dcnode-id="1670" instrument_node="">
</span></div><span data-dcnode-id="1668" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1660" data-index="8" id="panel-3640-1-0-7"><span data-dcnode-id="1665" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1662"><hr data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">
</span></div><span data-dcnode-id="1661" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1587" data-index="9" id="panel-3640-1-0-8"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1588"><span data-dcnode-id="1659" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1590"><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1655" style="color: #c0911c;"><strong data-dcnode-id="1656"><img alt="" class="alignright size-full wp-image-6118" data-dcnode-id="1657" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2019/03/Bijna.png&amp;raw" width="200"></strong></span><span data-dcnode-id="1645" style="color: #c0911c;"><strong data-dcnode-id="1650"><span data-dcnode-id="1651" lang="EN-IN"><span data-dcnode-id="1654" instrument_node="">Dr Bijna Kotak Dasani MBE, FRSA </span><span data-dcnode-id="1652" style="color: #000000;"><span data-dcnode-id="1653" instrument_node="">| </span></span></span></strong><span data-dcnode-id="1646" style="color: #c0911c;"><strong data-dcnode-id="1647"><span data-dcnode-id="1648" lang="EN-IN"><span data-dcnode-id="1649" instrument_node="">Executive Director, Morgan Stanley</span></span></strong></span></span></p><span data-dcnode-id="1643" instrument_node="">
</span><div data-dcnode-id="1592"><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" style="color: #800080;"><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/drbijna%3Flang%3Den" rel="noopener" style="color: #800080;"><strong data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">@DrBijna</span></strong></a></span></p><span data-dcnode-id="1636" instrument_node="">
</span><div data-dcnode-id="1594"><span data-dcnode-id="1635" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1632"><span data-dcnode-id="1633" style="color: #000000;"><span data-dcnode-id="1634" instrument_node="">With over 20 years of experience, Bijna has led Strategy, Transformation and Innovation across the Financial Services sector across the UK, EMEA, the Americas and Asia.</span></span></p><span data-dcnode-id="1631" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1628"><span data-dcnode-id="1629" style="color: #000000;"><span data-dcnode-id="1630" instrument_node="">Additionally, Bijna serves the Boards of The Inclusive Companies Network, FinTech Connect, CIONET, Generation Success, Cajigo and Restorative Justice for All; she also provides advisory services to Fintech’s and more established groups such as Bank if Lichtenstein.</span></span></p><span data-dcnode-id="1627" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1624"><span data-dcnode-id="1625" style="color: #000000;"><span data-dcnode-id="1626" instrument_node="">She also serves as a Host / Judge for a portfolio of initiatives including the Inclusive Companies Awards, Dublin Tech Summit and The Diversity in Tech Awards powered by Microsoft</span></span></p><span data-dcnode-id="1623" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1620"><span data-dcnode-id="1621" style="color: #000000;"><span data-dcnode-id="1622" instrument_node="">On the subjects of Diversity, Equity, Inclusion and Technology, Bijna has addressed audiences globally for Deutsche Bank, Deloitte, Edinburgh DataFest, Amazon, Sky, Lloyds Banking Group, Universities (Auburn, BPP, Edinburgh, De Montfort, Imperial College, Oxford, Sheffield), Appway, CIO NEXT, Bloomberg, Retail Banking Forum Europe, FinTech Connect, Bold Strategy Summit, EveryWoman India, The Next Gen Project, Genpact, Morgan Stanley, Citywire, BBC, etc.</span></span></p><span data-dcnode-id="1619" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1616"><span data-dcnode-id="1617" style="color: #000000;"><span data-dcnode-id="1618" instrument_node="">Bijna is featured various publications including the Citywire Tech Travels Podcast (2021) and the following books: Aspire To (2021), The Ultimate Professional Networker's Guidebook Volume 1 (2019) and Women Kind: Unlocking the power of women supporting women (2018).</span></span></p><span data-dcnode-id="1615" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1612"><span data-dcnode-id="1613" style="color: #000000;"><span data-dcnode-id="1614" instrument_node="">She has been recognised by Yahoo Finance and Involve People as one of the Top 100 Ethnic Minority Executives (2021) and as one of the Top 100 Women Executives (2020) across all industries and sectors globally.</span></span></p><span data-dcnode-id="1611" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1608"><span data-dcnode-id="1609" style="color: #000000;"><span data-dcnode-id="1610" instrument_node="">Bijna has been appointed a Member of the Most Excellent Order of the British Empire (2020) by Her Majesty, The Queen for her services to Diversity and Inclusion in Financial Services.</span></span></p><span data-dcnode-id="1607" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1604"><span data-dcnode-id="1605" style="color: #000000;"><span data-dcnode-id="1606" instrument_node="">Bijna has also been appreciated as follows: Bijna was named Britain’s Rising Star, UK Women of Inspiration awards (2019), #29 in the World’s Top 100 Women Execs by Yahoo and HERoes (2019), one of Top 50 Women to Watch (2019) by Cranfield University, #EMRoleModels19 Top 100 Ethnic Minority Executives (2019), Innovate Finance Women in Fintech Powerlist (2019-18), one of the #TechWomen100 (2019), as 'Business Role Model of the Year' by the Women in IT Awards &amp; Amazon (2019), by the Lloyds Banking Group Top 100 BAME Role Models List (2019, 2018) as a 'Global Champion' (#60) of the Top 100 Executive #FTHERoes18 by the Financial Times (2018) and with an Honorary Doctorate from De Montfort University (2018) for her ‘outstanding services to Business’.</span></span></p><span data-dcnode-id="1603" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1600"><span data-dcnode-id="1601" style="color: #000000;"><span data-dcnode-id="1602" instrument_node="">She has also been honoured by felicitation at the House of Lords (UK), at the NRI Pride of India World Summit (2017) for 'Making India Proud'. Bijna is credited as one of the Top 50 Visionary Young Leaders in Business, by Henley Business School (2017), one of 35 leading British Businesswomen under 35, by Management Today, Accenture and The Telegraph (2015) and has received recognition with 15 further honours including the National Diversity Awards (2012) and the Asian Women of Achievement Awards (2010). Bijna is also the International Women’s Day Young Achiever of the Year (2006).</span></span></p><span data-dcnode-id="1599" instrument_node="">
</span><p class="x_MsoNormal" data-dcnode-id="1596"><span data-dcnode-id="1597" style="color: #000000;"><span data-dcnode-id="1598" instrument_node="">Bijna is a Fellow of the Royal Society of Arts, Manufactures and Commerce (FRSA), and an alumnus of Oriel College, University of Oxford and Leicester Castle Business School, De Montfort University.</span></span></p><span data-dcnode-id="1595" instrument_node="">
</span></div><span data-dcnode-id="1593" instrument_node="">
</span></div><span data-dcnode-id="1591" instrument_node="">
</span></div><span data-dcnode-id="1589" instrument_node="">

</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1495"><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1576" style="color: #c0911c;"><strong data-dcnode-id="1577"><img alt="" class="alignright wp-image-15289 size-full" data-dcnode-id="1578" height="270" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2022/03/SamBudd.png&amp;raw" srcset="https://www.inclusivecompanies.co.uk/wp-content/uploads/2022/03/SamBudd.png 200w, https://www.inclusivecompanies.co.uk/wp-content/uploads/2022/03/SamBudd-100x135.png 100w" width="200"></strong></span><strong data-dcnode-id="1569"><span data-dcnode-id="1574" style="color: #c0911c;"><span data-dcnode-id="1575" instrument_node="">Samantha Budd, FRSA, Cmgr CCMI </span></span><span data-dcnode-id="1570" style="color: #000000;"><span data-dcnode-id="1573" instrument_node="">| </span><span data-dcnode-id="1571" style="color: #c0911c;"><span data-dcnode-id="1572" instrument_node="">Inclusion and cultural transformation Advisor</span></span></span></strong></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" style="color: #800080;"><a class="ProfileHeaderCard-screennameLink u-linkComplex js-nav" data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/ubusam63" rel="noopener" style="color: #800080;"><span class="username u-dir" data-dcnode-id="1563" dir="ltr"><span data-dcnode-id="1566" instrument_node="">@</span><b class="u-linkComplex-target" data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">ubusam63</span></b></span></a></span></p><span data-dcnode-id="1559" instrument_node="">
</span><p class="p3" data-dcnode-id="1553"><span class="s1" data-dcnode-id="1554" style="color: #000000;"><span data-dcnode-id="1558" instrument_node="">Until recently Samantha Budd was the Chief Executive of an award winning, Higher Education charity and continues as an Associate Director of a NHS mental health trust.</span><span class="Apple-converted-space" data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1555" instrument_node="">The recent focus on racism resulting from the George Floyd and subsequent BLM campaign has brought this hugely important discussion into the public consciousness. She has decided to focus her energy on tackling this issue as an independent advisor helping organisations to develop their confidence and capacity in addressing institutional racism through a holistic approach to cultural transformation. </span></span></p><span data-dcnode-id="1552" instrument_node="">
</span><p class="p1" data-dcnode-id="1548"><strong data-dcnode-id="1549"><span class="s1" data-dcnode-id="1550" style="color: #000000;"><span data-dcnode-id="1551" instrument_node="">Her professional life has largely been people focused with a particular emphasis on creating fair access to education, work and health for everyone. Samantha is passionate about EDI issues leading to awards for her teams:</span></span></strong></p><span data-dcnode-id="1547" instrument_node="">
</span><ul data-dcnode-id="1503"><span data-dcnode-id="1546" instrument_node="">
</span><li class="p1" data-dcnode-id="1543"><span class="s1" data-dcnode-id="1544" style="color: #000000;"><span data-dcnode-id="1545" instrument_node="">2009 Guardian Public Sector Award for an innovative transport solution for disabled students at Gloucestershire County Council;</span></span></li><span data-dcnode-id="1542" instrument_node="">
</span><li class="p1" data-dcnode-id="1539"><span class="s1" data-dcnode-id="1540" style="color: #000000;"><span data-dcnode-id="1541" instrument_node=""> 2016 Queens Award for the community volunteering work at Bristol SU; </span></span></li><span data-dcnode-id="1538" instrument_node="">
</span><li class="p1" data-dcnode-id="1535"><span class="s1" data-dcnode-id="1536" style="color: #000000;"><span data-dcnode-id="1537" instrument_node="">2016 National Centre for Diversity SU of the Year and shortlisted as Chief Executive of the year;</span></span></li><span data-dcnode-id="1534" instrument_node="">
</span><li class="p1" data-dcnode-id="1531"><span class="s1" data-dcnode-id="1532" style="color: #000000;"><span data-dcnode-id="1533" instrument_node=""> 2017 Bristol SU recipient of the NUS national Diversity Award.</span></span></li><span data-dcnode-id="1530" instrument_node="">
</span><li class="p1" data-dcnode-id="1527"><span class="s1" data-dcnode-id="1528" style="color: #000000;"><span data-dcnode-id="1529" instrument_node="">2018 awarded the Simpson King Staff Achievement Award by the NUS </span></span></li><span data-dcnode-id="1526" instrument_node="">
</span><li class="p1" data-dcnode-id="1523"><span class="s1" data-dcnode-id="1524" style="color: #000000;"><span data-dcnode-id="1525" instrument_node="">2018 awarded Diversity Champion, Education Sector – Inclusive Companies awards </span></span></li><span data-dcnode-id="1522" instrument_node="">
</span><li class="p1" data-dcnode-id="1513"><span data-dcnode-id="1514" style="color: #000000;"><span class="s1" data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node=""> 2018 Bristol SU ranked 43</span></span><span class="s2" data-dcnode-id="1517"><sup data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">rd</span></sup></span><span class="s1" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node=""> of top 50 Inclusive Companies in the UK</span></span></span></li><span data-dcnode-id="1512" instrument_node="">
</span><li class="p1" data-dcnode-id="1509"><span class="s1" data-dcnode-id="1510" style="color: #000000;"><span data-dcnode-id="1511" instrument_node=""> 2018 Bristol SU winner in the Third Sector Excellence 2-499 category at the Investors in People Awards </span></span></li><span data-dcnode-id="1508" instrument_node="">
</span><li class="p1" data-dcnode-id="1505"><span class="s1" data-dcnode-id="1506" style="color: #000000;"><span data-dcnode-id="1507" instrument_node="">2019 runner up Charity Governance Awards ( Board inclusivity and Diversity)</span></span></li><span data-dcnode-id="1504" instrument_node="">
</span></ul><span data-dcnode-id="1502" instrument_node="">
</span><hr data-dcnode-id="1501"><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1497"><em data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">"As we start to understand the role that employers have in contributing to the creation of a fairer society, we understand the importance of recognizing and celebrating excellence in the field of Inclusion and diversity. I am very proud to be involved in the judging panel for the Inclusive Companies Awards as I believe that the traction that these awards are making across all sectors, sizes and types of organisations is extraordinary. The ICAs shine a light on this important agenda and encourages us as business leaders to step up and ensure that we are playing our role and making a difference” </span></em></p><span data-dcnode-id="1496" instrument_node="">
</span></div><span data-dcnode-id="1494" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1486" data-index="12" id="panel-3640-1-0-11"><span data-dcnode-id="1491" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1488"><hr data-dcnode-id="1490"><span data-dcnode-id="1489" instrument_node="">
</span></div><span data-dcnode-id="1487" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1449" data-index="13" id="panel-3640-1-0-12"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1450"><span data-dcnode-id="1485" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1452"><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1480" style="color: #c0911c;"><strong data-dcnode-id="1481"><img alt="Jiten Patel" class="wp-image-11949 size-full alignright" data-dcnode-id="1483" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2021/02/JitenJudge.png&amp;raw" width="200"><span data-dcnode-id="1482" instrument_node=""> Jiten Patel </span></strong></span><span data-dcnode-id="1479" instrument_node="">&nbsp;</span><strong data-dcnode-id="1471"><span data-dcnode-id="1472" style="color: #000000;"><span data-dcnode-id="1478" instrument_node="">| </span><span data-dcnode-id="1473" style="color: #c0911c;"><span data-dcnode-id="1477" instrument_node="">Director </span><span data-dcnode-id="1475" style="color: #000000;"><span data-dcnode-id="1476" instrument_node="">| </span></span><span data-dcnode-id="1474" instrument_node="">Diversync</span></span></span></strong></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" style="color: #000000;"><span data-dcnode-id="1468" instrument_node="">Jiten is an award-winning EDI strategist, and practitioner, a published author and blogger on matters pertaining to Inclusion through diversity. He has a background in Financial Services and, upon leaving his Diversity and Inclusion role at HSBC, Jiten set up his own company in 2001 and has worked with a vast range of clients from Blue Chip companies all the way through to small local charities.</span></span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" style="color: #000000;"><span data-dcnode-id="1464" instrument_node="">As well as all the four nations of the United Kingdom, his work has taken him to continental and Eastern Europe and India. He was the winner of the Diversity Champion (Education Sector) award in 2015 and received the ‘Highly Commended Head of Diversity and Inclusion’ award at the 2016 and 2017 Inclusive Company Awards. He was also a top 3 finalist at the 2011 Race for Opportunity awards for the design and development of his highly successful ‘Aspire~’ Positive Action Programme. He was also the original creator of the Civil Service Learning’s Positive Action Programme, Positive Action Pathway, which witnessed some 30% of staff achieving career related moves as a result of attendance on the programme.</span></span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" style="color: #000000;"><span data-dcnode-id="1460" instrument_node="">In his spare time Jiten has been involved a variety of charitable work; he is a past Chair of ‘Working Families’ a charity specialising in assisting people and employers to implement effective agile working to facilitate work-life-family commitments. Since 2002, Jiten has a trustee of a number of charities. He is currently a Trustee at ‘MK SNAP’ (a charity specialising in the needs of post 16 learners with learning disabilities) and the LPSOL (focusing on supporting people from South Gujarat who have settled in the UK).</span></span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" style="color: #000000;"><span data-dcnode-id="1456" instrument_node="">Jiten’s first book, Demystifying Diversity (co-authored by Gamiel Yafai), was published in 2016 and is currently going into its second edition which will include new content about Cognitive Diversity.</span></span></p><span data-dcnode-id="1453" instrument_node="">
</span></div><span data-dcnode-id="1451" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1443" data-index="14" id="panel-3640-1-0-13"><span data-dcnode-id="1448" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1445"><hr data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">
</span></div><span data-dcnode-id="1444" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1398" data-index="15" id="panel-3640-1-0-14"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1399"><span data-dcnode-id="1442" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1401"><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1436" style="color: #c0911c;"><strong data-dcnode-id="1437"><a data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ey.com/en_uk" rel="noopener"><img alt="" class="alignright wp-image-9023 size-full" data-dcnode-id="1440" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2020/02/Sally.png&amp;raw" width="200"></a><span data-dcnode-id="1438" instrument_node="">Sally Bucknell </span></strong></span><strong data-dcnode-id="1424"><span data-dcnode-id="1432" style="color: #000000;"><span data-dcnode-id="1435" instrument_node="">| </span><span data-dcnode-id="1433" style="color: #c0911c;"><span data-dcnode-id="1434" instrument_node="">EY</span></span></span><span data-dcnode-id="1425" style="color: #000000;"><span data-dcnode-id="1429" style="color: #c0911c;"><strong data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">&nbsp;</span></strong></span><span data-dcnode-id="1428" instrument_node="">|&nbsp;</span><span data-dcnode-id="1426" style="color: #c0911c;"><span data-dcnode-id="1427" instrument_node="">Director, Diversity &amp; Inclusiveness, UK &amp; Ireland </span></span></span></strong></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" style="color: #000000;"><span data-dcnode-id="1421" instrument_node="">Sally Bucknell is a thought leader and agent for change on the diversity and inclusion (D&amp;I) agenda in UK business. She advises the leadership team at global professional services firm EY on how to accelerate parity in the workplace. </span></span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" style="color: #000000;"><span data-dcnode-id="1417" instrument_node="">Sally has driven EY’s approach on D&amp;I, which is firmly regarded as core to the firm’s strategy. EY believes different perspectives, shared in an inclusive environment, creates commercial advantage and will help the firm to respond to the fast pace of change in the workplace of the future.</span></span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" style="color: #000000;"><span data-dcnode-id="1413" instrument_node="">“We’ve seen first-hand how working in more diverse teams improves performance and client satisfaction. Our people tell us they’re happier and more productive when they are free to be their true selves at work,” says Sally.</span></span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" style="color: #000000;"><span data-dcnode-id="1409" instrument_node="">During Sally’s 16-year tenure at EY, she has introduced some ground-breaking initiatives focussed on supporting women and BME (Black and Minority Ethnic) professionals achieve their ambitions. She has also led the charge on what she believes is the ‘game changer’ on this agenda – inclusive leadership training for business leaders - that challenges the culture of the workplace.</span></span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" style="color: #000000;"><span data-dcnode-id="1405" instrument_node="">A flexible working advocate, Sally works at EY four days a week. She is also a member of Keele University Council and a supporter of Northern Power Women – a forum set up to connect and showcase role models in the North of England. She also mentors entrepreneurs through EY’s independent charity, EY Foundation.</span></span></p><span data-dcnode-id="1402" instrument_node="">
</span></div><span data-dcnode-id="1400" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1392" data-index="16" id="panel-3640-1-0-15"><span data-dcnode-id="1397" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1394"><hr data-dcnode-id="1396"><span data-dcnode-id="1395" instrument_node="">
</span></div><span data-dcnode-id="1393" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1356" data-index="17" id="panel-3640-1-0-16"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1357"><span data-dcnode-id="1391" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1359"><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1385" style="color: #c0911c;"><strong data-dcnode-id="1386"><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.everycloud.co.uk/" rel="noopener"><img alt="" class="alignright wp-image-10286 size-full" data-dcnode-id="1389" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2020/05/Rob.png&amp;raw" width="200"></a><span data-dcnode-id="1387" instrument_node="">Rob Mukherjee</span></strong></span><span data-dcnode-id="1384" instrument_node="">&nbsp;</span><strong data-dcnode-id="1375"><span data-dcnode-id="1380" style="color: #000000;"><span data-dcnode-id="1383" instrument_node="">| </span><span data-dcnode-id="1381" style="color: #c0911c;"><span data-dcnode-id="1382" instrument_node="">EveryCloud Security Ltd </span></span></span><span data-dcnode-id="1376" style="color: #000000;"><span data-dcnode-id="1379" instrument_node="">|&nbsp;</span><span data-dcnode-id="1377" style="color: #c0911c;"><span data-dcnode-id="1378" instrument_node="">Director of Transformation</span></span></span></strong></p><span data-dcnode-id="1373" instrument_node="">
</span><p class="p1" data-dcnode-id="1370"><span class="s1" data-dcnode-id="1371" style="color: #000000;"><span data-dcnode-id="1372" instrument_node="">A firm believer in building a people-led future fuelled by technology (and not vice versa), Rob is Director of Transformation at EveryCloud, a leading cloud communications and cloud security provider, with clients ranging from global financial services firms to major hospitality and entertainment brands to premier league football clubs.</span></span></p><span data-dcnode-id="1369" instrument_node="">
</span><p class="p1" data-dcnode-id="1366"><span class="s1" data-dcnode-id="1367" style="color: #000000;"><span data-dcnode-id="1368" instrument_node="">A regular public speaker on Diversity &amp; Inclusion and The Future Of Work, Rob has won numerous awards for his work on inclusion and is currently listed in the EMpower Top 100 Ethnic Minority Executives and the HERoes Top 40 Advocates Of Women In Business. A Trustee on the board of GreaterSport, a Manchester-based charity passionate about changing lives through sport and physical activity – Rob is a lifelong Everton fan and is old enough to have been at Wembley the last time they lifted a trophy!</span></span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1363" style="color: #000000;"><span data-dcnode-id="1364" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1362" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1360" instrument_node="">
</span></div><span data-dcnode-id="1358" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1350" data-index="18" id="panel-3640-1-0-17"><span data-dcnode-id="1355" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1352"><hr data-dcnode-id="1354"><span data-dcnode-id="1353" instrument_node="">
</span></div><span data-dcnode-id="1351" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1318" data-index="19" id="panel-3640-1-0-18"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1319"><span data-dcnode-id="1349" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1321"><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" style="color: #c0911c;"><strong data-dcnode-id="1337"><img alt="" class="wp-image-12050 size-full alignright" data-dcnode-id="1347" height="270" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2021/03/SueLibnew2.png&amp;raw" srcset="https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/03/SueLibnew2.png 200w, https://www.inclusivecompanies.co.uk/wp-content/uploads/2021/03/SueLibnew2-100x135.png 100w" width="200"><span data-dcnode-id="1346" instrument_node="">Sue Liburd MBE</span><span data-dcnode-id="1344" style="color: #000000;"><span data-dcnode-id="1345" instrument_node="">|</span></span><span data-dcnode-id="1343" instrument_node=""> Non Executive Director </span><span data-dcnode-id="1341" style="color: #000000;"><span data-dcnode-id="1342" instrument_node="">|</span></span><span data-dcnode-id="1340" instrument_node=""> Abstract UK</span><br data-dcnode-id="1339"><span data-dcnode-id="1338" instrument_node="">
</span></strong></span></p><span data-dcnode-id="1334" instrument_node="">
</span><p class="p1" data-dcnode-id="1331"><span class="s1" data-dcnode-id="1332" style="color: #000000;"><span data-dcnode-id="1333" instrument_node="">Sue is an award-winning businesswoman, senior executive strategist and human capital innovation consultant. In addition, Sue has a portfolio of Non-Executive directorships, NHS public appointments and is a Deputy Lieutenant for Lincolnshire. Awarded an MBE for her services to Business, Charity and Voluntary organisations, Sue works across a range of sectors for some of the world’s leading companies, influencing thinking at the highest levels.</span></span></p><span data-dcnode-id="1330" instrument_node="">
</span><p class="p1" data-dcnode-id="1327"><span class="s1" data-dcnode-id="1328" style="color: #000000;"><span data-dcnode-id="1329" instrument_node="">As a recipient of the National Diversity Champion Award at the Inclusive Companies Awards 2019 and recognised as one of the top one hundred women leaders driving change for gender diversity in the workplace in 2020, Sue is becoming a recognised voice and emergent thought leader in the field of Diversity and Inclusion. Deeply committed to alleviating health, education and workplace inequality, Sue’s purpose is to have a profound impact on the way the world does business. She has a special interest and successful track record in assisting women and other under-represented groups achieve C-suite success.</span></span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" style="color: #000000;"><span data-dcnode-id="1325" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1322" instrument_node="">
</span></div><span data-dcnode-id="1320" instrument_node="">

</span></div><span data-dcnode-id="1313" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1279" data-index="21" id="panel-3640-1-0-20"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1280"><span data-dcnode-id="1311" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1282"><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1305" style="color: #c0911c;"><strong data-dcnode-id="1306"><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cheshire.police.uk/" rel="noopener"><img alt="" class="alignright wp-image-10170 size-full" data-dcnode-id="1309" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2020/04/Fez.png&amp;raw" width="200"></a><span data-dcnode-id="1307" instrument_node=""> Fez Khan </span></strong></span><strong data-dcnode-id="1293"><span data-dcnode-id="1301" style="color: #000000;"><span data-dcnode-id="1304" instrument_node="">| </span><span data-dcnode-id="1302" style="color: #c0911c;"><span data-dcnode-id="1303" instrument_node=""> Cheshire Constabulary</span></span></span><span data-dcnode-id="1294" style="color: #000000;"><span data-dcnode-id="1298" style="color: #c0911c;"><strong data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">&nbsp;</span></strong></span><span data-dcnode-id="1297" instrument_node="">| </span><span data-dcnode-id="1295" style="color: #c0911c;"><span data-dcnode-id="1296" instrument_node="">T/Chief Inspector </span></span></span></strong></p><span data-dcnode-id="1291" instrument_node="">
</span><p class="p1" data-dcnode-id="1288"><span class="s1" data-dcnode-id="1289" style="color: #000000;"><span data-dcnode-id="1290" instrument_node="">I joined Cheshire Constabulary in 2005, having joined straight from university where I completed an LLb Bachelor of Law degree at Sheffield Hallam University. I have worked in a variety of frontline uniform and detective roles across Cheshire, having worked in Ellesmere Port, Chester, Northwich, Winsford and now Runcorn where I am currently the LPU Commander. I am a trained Hostage and Crisis Negotiator and a Bronze Public Order Commander. I have been involved with our staff network since early 2017 which was around the time where Cheshire hosted the fantastic National BPA Conference.</span></span></p><span data-dcnode-id="1287" instrument_node="">
</span><p class="p1" data-dcnode-id="1284"><span class="s1" data-dcnode-id="1285" style="color: #000000;"><span data-dcnode-id="1286" instrument_node="">I am extremely proud to recently have been elected as the Chair of what is now Cheshire Constabulary Multicultural Network (formerly CCMEG) and to be able to take our network forward in continuing to support our members to flourish and also to promote the excellent work and engagement the network continues to do in our communities, in order to attract a diverse and representative workforce.</span></span></p><span data-dcnode-id="1283" instrument_node="">
</span></div><span data-dcnode-id="1281" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1273" data-index="22" id="panel-3640-1-0-21"><span data-dcnode-id="1278" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1275"><hr data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">
</span></div><span data-dcnode-id="1274" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1232" data-index="23" id="panel-3640-1-0-22"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1233"><span data-dcnode-id="1272" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1235"><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1267" style="color: #c0911c;"><strong data-dcnode-id="1268"><img alt="" class="wp-image-11901 size-full alignright" data-dcnode-id="1270" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2021/02/SamCoop.png&amp;raw" width="200"><span data-dcnode-id="1269" instrument_node=""> Sam Cooper-Gray </span></strong></span><span data-dcnode-id="1266" instrument_node="">&nbsp;</span><strong data-dcnode-id="1258"><span data-dcnode-id="1259" style="color: #000000;"><span data-dcnode-id="1265" instrument_node="">| </span><span data-dcnode-id="1260" style="color: #c0911c;"><span data-dcnode-id="1264" instrument_node="">Head of Commercialisation </span><span data-dcnode-id="1262" style="color: #000000;"><span data-dcnode-id="1263" instrument_node="">| </span></span><span data-dcnode-id="1261" instrument_node="">HSBC Global Business Banking</span></span></span></strong></p><span data-dcnode-id="1256" instrument_node="">
</span><p class="p1" data-dcnode-id="1253"><span data-dcnode-id="1254" style="color: #000000;"><span data-dcnode-id="1255" instrument_node="">Sam Cooper-Gray is the Head of Commercialisation for HSBC Global Business Banking, based in London. Sam was appointed to this role in 2019.</span></span></p><span data-dcnode-id="1252" instrument_node="">
</span><p class="p1" data-dcnode-id="1249"><span data-dcnode-id="1250" style="color: #000000;"><span data-dcnode-id="1251" instrument_node="">In this role, she is responsible for leading the proposition for Global Business Banking, supporting over 1.3 million customers in 18 markets and territories to access the best products and services for their needs.</span></span></p><span data-dcnode-id="1248" instrument_node="">
</span><p class="p1" data-dcnode-id="1245"><span data-dcnode-id="1246" style="color: #000000;"><span data-dcnode-id="1247" instrument_node="">In addition to her responsibilities at HSBC Global Business Banking, Sam is the Global Sponsor for HSBC BALANCE Advocates programme and Global Co-Chair for HSBC BALANCE. HSBC BALANCE has over 50,000 members, 220 Executive Leader Ambassadors and 1,000 Advocates across 44 markets and is an employee resource group focussed on ending gender imbalance within the bank and across the industry, by creating an environment where gender balance is the norm. She is also a Board member for Women on the Wharf, leading the creation of the new Beyond Mentoring programme connecting over 550 mentors and mentees across eleven major firms in Canary Wharf, London. In addition to this Sam is a Non Exec Director for a number of firms, advising on diversity and inclusion and is a mentor both internally and externally.</span></span></p><span data-dcnode-id="1244" instrument_node="">
</span><p class="p1" data-dcnode-id="1241"><span data-dcnode-id="1242" style="color: #000000;"><span data-dcnode-id="1243" instrument_node="">Prior to taking on her current role, Sam was the Global Head of Learning for HSBC Commercial Banking, supporting the development of over 24,000 employees across 53 markets and has held senior positions within HSBC for over 21 years, including roles in Risk, Trade, Leadership and the Chief Operating Office.</span></span></p><span data-dcnode-id="1240" instrument_node="">
</span><p class="p1" data-dcnode-id="1237"><span data-dcnode-id="1238" style="color: #000000;"><span data-dcnode-id="1239" instrument_node="">Sam holds a Bachelor’s degrees in History and Politics from the University of Kent at Canterbury and in Banking and Finance from the University of Manchester.</span></span></p><span data-dcnode-id="1236" instrument_node="">
</span></div><span data-dcnode-id="1234" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1226" data-index="24" id="panel-3640-1-0-23"><span data-dcnode-id="1231" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1228"><hr data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">
</span></div><span data-dcnode-id="1227" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1165" data-index="25" id="panel-3640-1-0-24"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1166"><span data-dcnode-id="1225" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1168"><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1220" style="color: #c0911c;"><strong data-dcnode-id="1221"><img alt="" class="alignright wp-image-14752 size-full" data-dcnode-id="1223" height="270" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2022/01/Leila.png&amp;raw" srcset="https://www.inclusivecompanies.co.uk/wp-content/uploads/2022/01/Leila.png 200w, https://www.inclusivecompanies.co.uk/wp-content/uploads/2022/01/Leila-100x135.png 100w" width="200"><span data-dcnode-id="1222" instrument_node=""> Leila McKenzie-Delis </span></strong></span><strong data-dcnode-id="1211"><span data-dcnode-id="1212" style="color: #000000;"><span data-dcnode-id="1219" instrument_node="">| </span><span data-dcnode-id="1213" style="color: #c0911c;"><span data-dcnode-id="1218" instrument_node="">CEO &amp; Founder </span><span data-dcnode-id="1214" style="color: #000000;"><span data-dcnode-id="1217" instrument_node="">| </span><span data-dcnode-id="1215" style="color: #c0911c;"><span data-dcnode-id="1216" instrument_node="">DIAL Global &amp; The McKenzie-Delis Foundation</span></span></span></span></span></strong></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" style="color: #000000;"><span data-dcnode-id="1208" instrument_node="">A passionate thought leader with multiple business and charitable interests, Leila McKenzie-Delis is moving the dial on diversity, inclusion and aspirations in business.</span></span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" style="color: #000000;"><span data-dcnode-id="1204" instrument_node="">In 2019, Leila founded DIAL Global, a global community for ‘Diverse Inclusive Aspirational Leaders’.</span></span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" style="color: #000000;"><span data-dcnode-id="1200" instrument_node="">DIAL Global’s purpose is to foster a more open, diverse and inclusive society by helping organisations to think differently about their working culture, recruitment, attitudes and understanding of diversity in all its forms.</span></span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" style="color: #000000;"><span data-dcnode-id="1196" instrument_node="">The community includes a podcast series ‘Diverse Inclusive Leaders’ and YouTube channel, featuring exclusive talks with the most inspirational and accomplished thought leaders of today.</span></span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" style="color: #000000;"><span data-dcnode-id="1192" instrument_node="">Leila has also created the McKenzie-Delis Foundation – a charity dedicated to furthering the research and insight into diversity, inclusion and belonging. While the D&amp;I agenda has long been a high priority in the UK, until this point there has not been a comprehensive review of how the country’s largest employers are addressing and prioritising their efforts across the ten facets of workplace diversity and inclusion.</span></span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" style="color: #000000;"><span data-dcnode-id="1188" instrument_node="">In 2020, they launched the McKenzie-Delis Review - a ground-breaking report on diversity and inclusion in the UK workplace. The MD Review charitable research will take place again in 2021 surveying the FTSE 500 and Fortune 500 organisations about their practices across ten visible and invisible facets of diversity.</span></span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" style="color: #000000;"><span data-dcnode-id="1184" instrument_node="">The McKenzie-Delis Review represents a significant step forward in how diversity and inclusion is measured – proving a unique level of insight into where we are, and what more we need to do. The MD Review in the USA and UK partners with Ipsos MORI, the United Nations GC, and is chaired by Lord Simon Wooley CBE and co-chaired by Ben Page, chief executive of Ipsos MORI.</span></span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" style="color: #000000;"><span data-dcnode-id="1180" instrument_node="">Leila’s passion and commitment to diversity and inclusion has been inspired by her upbringing and career to date. Originally born in Hong Kong, Leila was adopted as a baby by a British couple and grew up in Harrogate, Yorkshire. As one of the relatively few non-white people in her school and the local area, Leila began to think about the nature of identity, race and professional ambition.</span></span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" style="color: #000000;"><span data-dcnode-id="1176" instrument_node="">Although Leila went on to excel academically, graduating top of her class and with a first a first-class honours degree, she quickly came across difficulties in accessing opportunities to graduate jobs and internships – while her friends and peers around Harrogate did not experience the same barriers. Committed to creating opportunities for herself, Leila went on to run several businesses and built a successful career in Executive Search, where she was able to promote the idea of more diverse C-suite hires to major organisations. One day, at a round table event, Leila noticed that she was the only female and only person of colour. From that moment onwards, the idea for DIAL Global was born as a way to create more opportunities for diverse candidates to access top level careers and leadership roles.</span></span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" style="color: #000000;"><span data-dcnode-id="1172" instrument_node="">Today, Leila spends her time managing numerous directorships and advisory positions whilst continuing to promote and campaign for the benefits of inclusion and diversity in business and in wider society. Her mission is to build DIAL Global and The McKenzie-Delis Foundation in order to forge a more diverse and inclusive society.</span></span></p><span data-dcnode-id="1169" instrument_node="">
</span></div><span data-dcnode-id="1167" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1159" data-index="26" id="panel-3640-1-0-25"><span data-dcnode-id="1164" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1161"><hr data-dcnode-id="1163"><span data-dcnode-id="1162" instrument_node="">
</span></div><span data-dcnode-id="1160" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1107" data-index="27" id="panel-3640-1-0-26"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1108"><span data-dcnode-id="1158" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1110"><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1153" style="color: #c0911c;"><strong data-dcnode-id="1154"><img alt="" class="alignright wp-image-14751 size-full" data-dcnode-id="1156" height="270" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2022/01/SteFrost.png&amp;raw" srcset="https://www.inclusivecompanies.co.uk/wp-content/uploads/2022/01/SteFrost.png 200w, https://www.inclusivecompanies.co.uk/wp-content/uploads/2022/01/SteFrost-100x135.png 100w" width="200"><span data-dcnode-id="1155" instrument_node=""> Stephen Frost </span></strong></span><strong data-dcnode-id="1144"><span data-dcnode-id="1145" style="color: #000000;"><span data-dcnode-id="1152" instrument_node="">| </span><span data-dcnode-id="1146" style="color: #c0911c;"><span data-dcnode-id="1151" instrument_node="">CEO </span><span data-dcnode-id="1149" style="color: #000000;"><span data-dcnode-id="1150" instrument_node="">| </span></span><em data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Included</span></em></span></span></strong></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" style="color: #000000;"><span data-dcnode-id="1141" instrument_node="">Stephen is a globally recognised diversity, inclusion and leadership expert, and founded&nbsp;</span><em data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Included</span></em><span data-dcnode-id="1138" instrument_node="">&nbsp;in 2012. He leads the team and works with leaders around the world to embed inclusive leadership in their decision-making.</span></span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" style="color: #000000;"><span data-dcnode-id="1134" instrument_node="">From 2007-2012 Stephen designed, led and implemented the inclusion programmes for the London Olympic and Paralympic Games as Head of Diversity and Inclusion for the London Organising Committee. From 2004-2007 Stephen established and led the workplace team at Stonewall. Stephen has also led D&amp;I at KPMG and worked in advertising and consulting.</span></span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" style="color: #000000;"><span data-dcnode-id="1130" instrument_node="">Stephen was a Hertford College Scholar at Oxford and a Fulbright Scholar at Harvard. He remains a Visiting Fellow of the Women and Public Policy Program. He has won various awards from the 2010 Peter Robertson Award for Equality and Diversity Champions and 2011 Young Global Leader by the World Economic Forum to one of Management Today’s Change Agents for his race and gender work.</span></span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" style="color: #000000;"><span data-dcnode-id="1126" instrument_node="">He has taught Inclusive Leadership at Harvard Business School, Singapore Management University and Sciences Po in France and advised the British Government, Royal Air Force and the White House. He is author of&nbsp;</span><em data-dcnode-id="1123"><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.included.com/book/the-inclusion-imperative/" rel="noreferrer noopener" style="color: #000000;"><span data-dcnode-id="1125" instrument_node="">The Inclusion Imperative</span></a></em><span data-dcnode-id="1122" instrument_node="">&nbsp;(2014),&nbsp;</span><em data-dcnode-id="1119"><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.included.com/book/inclusive-talent-management/" rel="noreferrer noopener" style="color: #000000;"><span data-dcnode-id="1121" instrument_node="">Inclusive Talent Management</span></a></em><span data-dcnode-id="1118" instrument_node="">&nbsp;(2016) and&nbsp;</span><em data-dcnode-id="1115"><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.included.com/book/how-to-build-an-inclusive-organisation/" rel="noreferrer noopener" style="color: #000000;"><span data-dcnode-id="1117" instrument_node="">Building an Inclusive Organization</span></a></em><span data-dcnode-id="1114" instrument_node="">&nbsp;(February 2019).</span></span></p><span data-dcnode-id="1111" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span></div></div><div class="so-panel widget_text" data-dcnode-id="1101" data-index="28" id="panel-3640-1-0-27"><span data-dcnode-id="1106" instrument_node=""> </span><div class="textwidget" data-dcnode-id="1103"><hr data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">
</span></div><span data-dcnode-id="1102" instrument_node="">
</span></div><div class="so-panel widget_sow-editor" data-dcnode-id="1058" data-index="29" id="panel-3640-1-0-28"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1059"><span data-dcnode-id="1100" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1061"><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1095" style="color: #c0911c;"><strong data-dcnode-id="1096"><img alt="" class="wp-image-11952 size-full alignright" data-dcnode-id="1098" height="270" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivecompanies.co.uk/wp-content/uploads/2021/02/PepiJudges.png&amp;raw" width="200"><span data-dcnode-id="1097" instrument_node=""> Pepi Sappal </span></strong></span><span data-dcnode-id="1094" instrument_node="">&nbsp;</span><strong data-dcnode-id="1086"><span data-dcnode-id="1087" style="color: #000000;"><span data-dcnode-id="1093" instrument_node="">| </span><span data-dcnode-id="1088" style="color: #c0911c;"><span data-dcnode-id="1092" instrument_node="">Founder &amp; Director </span><span data-dcnode-id="1090" style="color: #000000;"><span data-dcnode-id="1091" instrument_node="">| </span></span><span data-dcnode-id="1089" instrument_node="">Fair Play Talks</span></span></span></strong></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" style="color: #000000;"><span data-dcnode-id="1083" instrument_node="">Fair Play Talks' Founder and Director Pepi Sappal has a long history of writing on diversity, equity, inclusion and wellbeing issues, as well as HR, business, marketing and international management, spanning more than two decades for publications, such as&nbsp;</span><i data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">the Wall St Journal (WSJ)</span></i><span data-dcnode-id="1080" instrument_node="">,&nbsp;</span><i data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Dow Jones&nbsp;</span></i><span data-dcnode-id="1077" instrument_node="">and&nbsp;</span><i data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Edge&nbsp;</span></i><span data-dcnode-id="1074" instrument_node="">Magazine. She was also the diversity columnist for the&nbsp;</span><i data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">WSJ&nbsp;</span></i><span data-dcnode-id="1071" instrument_node="">for a number of years, and the former editor of several business magazines such as the British Chambers of Commerce's </span><i data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">National Review and&nbsp;</span></i><span data-dcnode-id="1068" instrument_node="">HR publications &nbsp;</span><i data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Global HR,&nbsp;HR World and&nbsp;Human Resources Magazine</span></i><span data-dcnode-id="1065" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1062" instrument_node="">
</span></div><span data-dcnode-id="1060" instrument_node="">
