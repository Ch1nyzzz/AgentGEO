</span><div data-bg="transparent" data-comments="0" data-commentsbg="transparent" data-content-offset="0" data-dcnode-id="1035" data-endfg="transparent" data-fg="#0c58b6" data-fgopacity="1.00" data-location="page" data-mute="" data-mutedfg="#0c58b6" data-mutedopacity="1.00" data-non-touch="1" data-placement="top" data-placement-offset="73" data-placement-offset-touch="65" data-placement-touch="top" data-rtl="" data-shadow="1" data-touch="1" data-transparent="1" data-width="4" id="wtr-content"><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Many companies are committed to building inclusive work cultures where employees from all backgrounds feel supported and appreciated. However, this commitment must start before the employee’s first day of work. Inclusive hiring is a key piece of the employee experience and can lead to higher employee retention, improved morale, and better business results. Here are some benefits of inclusive hiring practices, as well as some inclusive hiring best practices you can implement at your organization.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><h2 data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">What is inclusive hiring?</span></h2><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1376" instrument_node="">Inclusive hiring is a recruitment process that not only recognizes the importance of diversity, but embraces the needs of diverse candidates with hiring practices that aim to level the playing field for all. Inclusive hiring practices work to overcome </span><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/hiring-bias-types/"><span data-dcnode-id="1375" instrument_node="">unconscious biases</span></a><span data-dcnode-id="1373" instrument_node=""> that can impact hiring teams; not only does inclusive hiring combat discrimination, but it also makes candidates feel valued and empowered throughout the recruitment process.&nbsp;</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1370" instrument_node="">“Inclusive hiring allows you to find ‘</span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/hiddengems/"><span data-dcnode-id="1369" instrument_node="">hidden gem</span></a><span data-dcnode-id="1367" instrument_node="">’ talent that other companies don’t recognize. And, you’ll make fewer mistakes, or mis-hires: candidates who look a certain part but ultimately fail to deliver results,” wrote the experts at </span><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lever.co/blog/a-step-by-step-guide-to-cultivating-diversity-and-inclusion-part-4-reducing-hiring-bias" rel="noopener" target="_blank"><span data-dcnode-id="1366" instrument_node="">Lever</span></a><span data-dcnode-id="1364" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1357"><span data-dcnode-id="1361" instrument_node="">[Read: </span><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/diversity-hiring-in-2020/"><span data-dcnode-id="1360" instrument_node="">5 Reasons Why Hiring Diverse Candidates Is Still Hard In 2021</span></a><span data-dcnode-id="1358" instrument_node="">]</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1355" instrument_node="">Inclusive hiring considers more than seeking candidates of different races or genders. Inclusive hiring takes into account the needs of candidates with </span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.brillianthire.io/guide-to-inclusive-hiring/" rel="noopener" target="_blank"><span data-dcnode-id="1354" instrument_node="">cognitive differences</span></a><span data-dcnode-id="1352" instrument_node="">, abilities, educational backgrounds, socioeconomic status, and more. By broadening your hiring practices to be inclusive of all, your company can attract a wider pool of candidates and increase your chances of finding the right fit — someone who can do the job well and help the company grow.&nbsp;</span></p><span data-dcnode-id="1350" instrument_node="">
</span><h2 data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Benefits of inclusive hiring practices</span></h2><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Inclusion hiring benefits both candidates and companies. Candidates enjoy a hiring process that encourages them to showcase their skills and expertise, while recruiting teams get the information they need to extend an offer to the right person the first time.&nbsp;</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1343" instrument_node="">Inclusive hiring has become the expectation, rather than the exception, from candidates all over the world. A global survey by Monster.com found that inclusion in the workplace is important to </span><a class="rank-math-link" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.monster.com/marketing/2021/inclusive-hiring.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1342" instrument_node="">86% of candidates</span></a><span data-dcnode-id="1340" instrument_node=""> worldwide. Furthermore, their research showed that </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.monster.com/marketing/2021/inclusive-hiring.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1339" instrument_node="">62% of people</span></a><span data-dcnode-id="1337" instrument_node=""> would even turn down a job offer if the organization didn’t support an inclusive culture. The next generation of workers — </span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.hubspot.net/hubfs/4976390/E-books/English%2520e-books/The%2520everything%2520guide%2520to%2520gen%2520z/the-everything-guide-to-gen-z.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1336" instrument_node="">Gen Z</span></a><span data-dcnode-id="1334" instrument_node=""> and Millennials — expect companies to not only support their differences but to celebrate them.&nbsp;</span></p><span data-dcnode-id="1332" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1314"><figure class="aligncenter size-large is-resized" data-dcnode-id="1315"><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/wp-content/uploads/2021/05/benefits-of-inclusive-hiring-practices.png"><picture class="wp-image-19211" data-dcnode-id="1326" title="8 Inclusive Hiring Practices You Need To Adopt Today 1"><span data-dcnode-id="1331" instrument_node="">
</span><source data-dcnode-id="1330" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://vervoe.com/wp-content/uploads/2021/05/benefits-of-inclusive-hiring-practices-1024x768.png.webp 1024w, https://vervoe.com/wp-content/uploads/2021/05/benefits-of-inclusive-hiring-practices-300x225.png.webp 300w, https://vervoe.com/wp-content/uploads/2021/05/benefits-of-inclusive-hiring-practices-768x576.png.webp 768w" sizes="(max-width: 1024px) 100vw, 1024px" srcset="https://vervoe.com/wp-content/uploads/2021/05/benefits-of-inclusive-hiring-practices-1024x768.png.webp 1024w, https://vervoe.com/wp-content/uploads/2021/05/benefits-of-inclusive-hiring-practices-300x225.png.webp 300w, https://vervoe.com/wp-content/uploads/2021/05/benefits-of-inclusive-hiring-practices-768x576.png.webp 768w" type="image/webp"><span data-dcnode-id="1329" instrument_node="">

</span></noscript></a><figcaption data-dcnode-id="1316"><strong data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Source:</span></strong><span data-dcnode-id="1319" instrument_node=""> </span><a class="rank-math-link" data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.monster.com/marketing/2021/inclusive-hiring.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1318" instrument_node="">Monster.com</span></a></figcaption></figure></div><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1312" instrument_node="">Inclusive hiring is good for business, too. Hiring teams that emphasize inclusion from day one build companies that are </span><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/benefits-of-diversity/"><span data-dcnode-id="1311" instrument_node="">more innovative</span></a><span data-dcnode-id="1309" instrument_node="">, more profitable, more productive, and better at problem-solving. </span><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/most-diverse-companies/"><span data-dcnode-id="1308" instrument_node="">Inclusive companies</span></a><span data-dcnode-id="1306" instrument_node=""> are better positioned to </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theewgroup.com/benefits-diversity-inclusion-workplace/" rel="noopener" target="_blank"><span data-dcnode-id="1305" instrument_node="">learn about their customers</span></a><span data-dcnode-id="1303" instrument_node="">, create products and services that meet a market need, and communicate more effectively. Inclusive hiring allows recruiting teams to build a pipeline of truly engaged candidates who will be motivated at every stage of the hiring process.&nbsp;</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">[Read more: </span><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/diversity-statistics/"><span data-dcnode-id="1299" instrument_node="">35 Impressive Diversity In The Workplace Statistics</span></a><span data-dcnode-id="1297" instrument_node="">]</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1294" instrument_node="">“Your revenue is tethered to culture whether you like it or not, and culture includes all of your contributors,” Ruhal Dooley, an HR knowledge advisor at SHRM </span><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.monster.com/marketing/2021/inclusive-hiring.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1293" instrument_node="">told Monster.</span></a><span data-dcnode-id="1291" instrument_node=""> “The best talent available is proven to be everywhere, not just in some historically reserved place where everyone is the same. If the best talent yields the best result, diversity is necessary to compete.”&nbsp;</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1284"><span data-dcnode-id="1288" instrument_node="">[Read more: </span><a data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/diversity-at-work/"><span data-dcnode-id="1287" instrument_node="">Diverse Companies Perform Better</span></a><span data-dcnode-id="1285" instrument_node="">]</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Inclusive hiring encourages companies to look at the skills and expertise that really matter, not things like education or gender that could miscue a person’s ability. How can you begin to benefit from inclusion hiring? Consider implementing some of these inclusive hiring best practices.&nbsp;</span></p><span data-dcnode-id="1280" instrument_node="">
</span><h2 data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">8 Inclusive hiring practices&nbsp;</span></h2><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Inclusive hiring doesn’t just happen overnight. It takes investing in specific parts of the hiring process to make sure all candidates can not only participate, but put forth their strongest case for joining your company.&nbsp;</span></p><span data-dcnode-id="1274" instrument_node="">
</span><h3 data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">1. Write inclusive job descriptions</span></h3><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1270" instrument_node="">The language used in job descriptions can play a big role in inclusive hiring. Research shows that words like </span><a data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//business.linkedin.com/talent-solutions/blog/job-descriptions/2018/writing-job-descriptions-6-common-mistakes-and-how-to-avoid-them" rel="noopener" target="_blank"><span data-dcnode-id="1269" instrument_node="">“strong” and “competitive”</span></a><span data-dcnode-id="1267" instrument_node=""> are perceived as male-specific and can deter female candidates from applying. Likewise, terms like “sensitive” dissuade male candidates from submitting an application.&nbsp;</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1264" instrument_node="">The complexity of your job description also plays a role. Use short, simple sentences that emphasize the must-have skills for a candidate, rather than an exhaustive list of qualifications.&nbsp; Many companies inadvertently discourage diverse talent from applying by </span><a data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/diversity-hiring/%23how-do-you-increase-diversity"><span data-dcnode-id="1263" instrument_node="">setting too high a bar.</span></a><span data-dcnode-id="1261" instrument_node=""> A </span><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.cuna.org/articles/117796-ways-to-attract-diverse-talent" rel="noopener" target="_blank"><span data-dcnode-id="1260" instrument_node="">2017 Allegis Group talent acquisition study</span></a><span data-dcnode-id="1258" instrument_node=""> revealed that only 28% of hiring managers expect candidates to meet every qualification listed. Listing every qualification under the sun may intimidate candidates who would be a good fit from applying.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Finally, pay attention to your formatting. Italics and underlining can make it difficult for candidates with dyslexia or visual impairments from reading your job posting. Stick to large fonts and bold words that you wish to emphasize.&nbsp;</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1252" instrument_node="">Try using tools like </span><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gender-decoder.katmatfield.com/" rel="noopener" target="_blank"><span data-dcnode-id="1251" instrument_node="">The Gender Decoder</span></a><span data-dcnode-id="1249" instrument_node=""> or </span><a class="rank-math-link" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//textio.com/" rel="noopener" target="_blank"><span data-dcnode-id="1248" instrument_node="">Textio</span></a><span data-dcnode-id="1246" instrument_node=""> to make sure your job descriptions are as inclusive a possible.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1229"><figure class="aligncenter size-large is-resized" data-dcnode-id="1230"><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/wp-content/uploads/2021/05/write-inclusive-job-descriptions.png"><picture class="wp-image-19214" data-dcnode-id="1238" title="8 Inclusive Hiring Practices You Need To Adopt Today 2"><span data-dcnode-id="1243" instrument_node="">
</span><source data-dcnode-id="1242" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://vervoe.com/wp-content/uploads/2021/05/write-inclusive-job-descriptions-1024x696.png.webp 1024w, https://vervoe.com/wp-content/uploads/2021/05/write-inclusive-job-descriptions-300x204.png.webp 300w, https://vervoe.com/wp-content/uploads/2021/05/write-inclusive-job-descriptions-768x522.png.webp 768w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20696'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1241" instrument_node="">

</span><h3 data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">2. Make sure your career site is accessible to all.&nbsp;</span></h3><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1224" instrument_node="">In addition to writing your job descriptions carefully, it’s critical to make sure your careers site is accessible to all viewers. “Digital accessibility refers to designing devices, products and environments such that people with disabilities or sensory impairments can successfully use the device or product or navigate the environment,” explained </span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shrm.org/resourcesandtools/hr-topics/talent-acquisition/pages/6-ways-to-make-your-careers-site-more-accessible.aspx" rel="noopener" target="_blank"><span data-dcnode-id="1223" instrument_node="">SHRM</span></a><span data-dcnode-id="1221" instrument_node="">.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1218" instrument_node="">As you build or update your careers page, there are a few different things to pay attention to that can help candidates better navigate the application process. Consider these </span><a data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shrm.org/resourcesandtools/hr-topics/talent-acquisition/pages/6-ways-to-make-your-careers-site-more-accessible.aspx" rel="noopener" target="_blank"><span data-dcnode-id="1217" instrument_node="">elements</span></a><span data-dcnode-id="1215" instrument_node="">:</span></p><span data-dcnode-id="1213" instrument_node="">
</span><ul data-dcnode-id="1196"><li data-dcnode-id="1209"><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Navigation</span></strong><span data-dcnode-id="1210" instrument_node="">: Do you have detailed and consistent navigational elements in the page structure, such as headers, titles and lists, that can make it easy for an assistive screen reader tool to scan?</span></li><li data-dcnode-id="1205"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Color palette</span></strong><span data-dcnode-id="1206" instrument_node="">: Does your site use proper color contrast so those with visual impairments or color blindness can differentiate between design elements?</span></li><li data-dcnode-id="1201"><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Video captions</span></strong><span data-dcnode-id="1202" instrument_node="">: If you have a video on your careers page, do you have transcripts and captions so aurally-impaired prospective applicants can still consume your content?</span></li><li data-dcnode-id="1197"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Keyboard accessibility</span></strong><span data-dcnode-id="1198" instrument_node="">: Can someone navigate your website without the use of a mouse?&nbsp;</span></li></ul><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">There are many inclusive design elements that you can build into your website to help diverse candidates connect with your organization. For more, refer to the </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.w3.org/WAI/standards-guidelines/wcag/" rel="noopener" target="_blank"><span data-dcnode-id="1193" instrument_node="">Web Content Accessibility Guidelines (WCAG)</span></a><span data-dcnode-id="1191" instrument_node="">.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1177"><figure class="aligncenter size-large is-resized" data-dcnode-id="1178"><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/wp-content/uploads/2021/05/inclusive-hiring-best-practices.png"><picture class="wp-image-19217" data-dcnode-id="1183" title="8 Inclusive Hiring Practices You Need To Adopt Today 3"><span data-dcnode-id="1188" instrument_node="">
</span><source data-dcnode-id="1187" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://vervoe.com/wp-content/uploads/2021/05/inclusive-hiring-best-practices-1024x768.png.webp 1024w, https://vervoe.com/wp-content/uploads/2021/05/inclusive-hiring-best-practices-300x225.png.webp 300w, https://vervoe.com/wp-content/uploads/2021/05/inclusive-hiring-best-practices-768x576.png.webp 768w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20768'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1186" instrument_node="">

&lt;/picture&gt;
</span></noscript></a></figure></div><span data-dcnode-id="1176" instrument_node="">
</span><h3 data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">3. Provide bias awareness training for hiring teams</span></h3><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">One of the most difficult parts of combatting unconscious biases is that they’re…unconscious. Few recruiters are aware that they are operating using heuristics (mental shortcuts) that incidentally benefit some candidates more than others. Unconscious bias training, as well as training on </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/fair-hiring-practices/"><span data-dcnode-id="1171" instrument_node="">fair hiring practices</span></a><span data-dcnode-id="1169" instrument_node="">, can help shed light on hiring practices that may be unfair.&nbsp;</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1166" instrument_node="">Offer bias awareness and fair hiring training to anyone participating in the hiring process (not just recruiters). Unconscious bias training should be offered regularly to all employees to ensure they are supported and supportive of the inclusive work culture you are building. Ideally, this training can be combined with </span><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/blind-hiring/"><span data-dcnode-id="1165" instrument_node="">blind hiring</span></a><span data-dcnode-id="1163" instrument_node=""> and other inclusive practices that layer support for diverse candidates as they go through your hiring process.&nbsp;</span></p><span data-dcnode-id="1161" instrument_node="">
</span><h3 data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">4. Add inclusion to your employer branding</span></h3><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Publicize your efforts to be diverse and inclusive to attract more diverse candidates to your organization. Inclusive recruitment must be meaningful and authentic: go beyond simply publishing stock images of diverse people on your careers site. Show (with permission) photos and videos of your diverse team at work. Share information about your employee resource groups, your DE&amp;I statement, and, if possible, be transparent about your progress toward building a more diverse workforce.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Capturing the true benefit of a diverse workforce means not just hiring someone for their background, but also their experience, ability, and perspectives. The employer branding that you use in tandem with inclusion hiring allows you to showcase the way your organization values a range of abilities and skill sets.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><h3 data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">5. Use tools that keep candidates engaged</span></h3><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Technology can play a major role in inclusive hiring. First, it can help even the playing field by standardizing important parts of the hiring process. Second, it can help recruiters keep candidates engaged throughout the experience.&nbsp;</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1145" instrument_node="">By definition, inclusive hiring requires leveling the playing field for all candidates. One way to do that is to replace </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/blog/how-vervoe-takes-the-bias-out-of-job-interviews/"><span data-dcnode-id="1144" instrument_node="">resume screening</span></a><span data-dcnode-id="1142" instrument_node=""> with an </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/job-simulations/"><span data-dcnode-id="1141" instrument_node="">on-the-job simulation</span></a><span data-dcnode-id="1139" instrument_node=""> like Vervoe’s </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/skill-assessment-software/"><span data-dcnode-id="1138" instrument_node="">skills assessments software</span></a><span data-dcnode-id="1136" instrument_node="">. A skill test with questions crafted to mimic the role allows candidates to perform tasks relevant to the job they’ve applied for and showcase their abilities in the process.&nbsp;</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1133" instrument_node="">Moreover, an </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/solutions/diversity-and-inclusion-software/"><span data-dcnode-id="1132" instrument_node="">AI diversity recruiting software</span></a><span data-dcnode-id="1130" instrument_node=""> tool can use an algorithm to score the results, ranking candidates rather than eliminating them. Vervoe’s smart algorithm delivers recruiters a&nbsp; list of the top candidates after their qualifications have been validated; recruiters can then invite candidates to the interview stage and beyond.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1116"><figure class="aligncenter size-large is-resized" data-dcnode-id="1117"><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/wp-content/uploads/2021/05/inclusive-hiring-tools.png"><picture class="wp-image-19225" data-dcnode-id="1122" title="8 Inclusive Hiring Practices You Need To Adopt Today 4"><span data-dcnode-id="1127" instrument_node="">

&lt;/picture&gt;
</span></noscript></a></figure></div><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">Skill tests often result in </span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/graduate-recruiting-case-study-orica/"><span data-dcnode-id="1113" instrument_node="">high levels of candidate engagement</span></a><span data-dcnode-id="1111" instrument_node="">, too. Companies that use Vervoe’s assessments experience a 97% candidate completion rate, which is among the highest engagement rates in the industry. Candidates love the opportunity to stand out from the crowd.&nbsp;</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1104"><span data-dcnode-id="1108" instrument_node="">[Read more: </span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/skill-testing/"><span data-dcnode-id="1107" instrument_node="">Skill Tests: Complete Guide To Assessments + Examples</span></a><span data-dcnode-id="1105" instrument_node="">]&nbsp;</span></p><span data-dcnode-id="1103" instrument_node="">
</span><h3 data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">6. Utilize diverse interview teams</span></h3><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1099" instrument_node="">Inclusion hiring benefits from diverse hiring teams. At Intel, for instance, requiring each interview panel to require at least two women and/or members of an underrepresented group empowered the company to grow diverse new hires </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.workingmother.com/diverse-interview-panels-may-be-key-to-workplace-diversity" rel="noopener" target="_blank"><span data-dcnode-id="1098" instrument_node="">by 41% in two years</span></a><span data-dcnode-id="1096" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">When candidates go through the hiring process and engage with people from many different backgrounds, it can validate that yours is a truly inclusive culture. Interview teams that are made up of unique individuals from different parts of your organization can create a more inclusive environment for new people. They can also help you ask different questions, bring new perspectives to the interview, and improve the quality of your vetting process.&nbsp;</span></p><span data-dcnode-id="1091" instrument_node="">
</span><h3 data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">7. Measure your efforts</span></h3><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Inclusion can be somewhat nebulous and difficult to measure. How can you assess how empowered your candidates feel throughout the hiring process?&nbsp;</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Inclusivity is manifested in the policies and procedures that your company creates to make everyone feel valued. The psychological safety a candidate feels is quite subjective, especially in an environment as personal as a job interview.&nbsp;</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">One way to measure the inclusiveness of your hiring process is to offer a short survey to the candidates who exit the hiring process, whether voluntarily or because their application was rejected at a later stage. Ask these questions:</span></p><span data-dcnode-id="1079" instrument_node="">
</span><ol data-dcnode-id="1072"><li data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Do you feel you have an equal opportunity to succeed here and reach your full potential?</span></li><li data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Do you feel that the hiring process provided an opportunity to showcase your best possible skills, qualifications, and expertise?</span></li><li data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">How have you observed and/or experienced bias, discrimination, and inequity?</span></li></ol><span data-dcnode-id="1071" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">[Read more: </span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/measure-diversity-and-inclusion/"><span data-dcnode-id="1069" instrument_node="">How To Measure Diversity, Equity And Inclusion</span></a><span data-dcnode-id="1067" instrument_node="">]&nbsp;</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Exit interviews can help you assess how well you’re performing on candidate inclusiveness. You can also look at data from the hiring pipeline to see where diverse candidates are dropping out. For instance, if you see a large number of candidates starting the job application questionnaire and not finishing it, that may indicate there are too many questions or that the format isn’t user-friendly.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><h3 data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">8. Invest in inclusive benefits and compensation</span></h3><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Lastly, inclusive hiring is only as good as the culture that follows: how inclusive is the employee experience?</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1055" instrument_node="">“The key to inclusion is understanding who your employees really are,” reported </span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2018/12/to-retain-employees-focus-on-inclusion-not-just-diversity" rel="noopener" target="_blank"><span data-dcnode-id="1054" instrument_node="">Harvard Business Review</span></a><span data-dcnode-id="1052" instrument_node="">. Building an inclusive culture may mean offering compensation that levels the playing field for men and women, offering mentorship programs for minorities, investing in employee resource groups, or instituting gender-neutral parental leave policies. Think about what benefits and compensation can make employees feel supported and maximize the contribution of diverse employees.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1045"><span data-dcnode-id="1049" instrument_node="">[Read more: </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/diversity-hiring/"><span data-dcnode-id="1048" instrument_node="">The Ultimate Guide To Diversity Hiring In 2021</span></a><span data-dcnode-id="1046" instrument_node="">]&nbsp;</span></p><span data-dcnode-id="1044" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">For more resources and help improving inclusive hiring practices at your business, read about </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vervoe.com/solutions/diversity-and-inclusion-software/"><span data-dcnode-id="1040" instrument_node="">Vervoe for Diversity Hiring</span></a><span data-dcnode-id="1038" instrument_node=""> and subscribe to our newsletter for future updates.</span></p><span data-dcnode-id="1036" instrument_node="">
