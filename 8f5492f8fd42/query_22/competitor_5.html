</span><p data-dcnode-id="1395"><a data-dcnode-id="1398" id="backtotop"></a><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">What do you look for in your ideal company?</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">High salaries and bonuses?</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Perks and benefits?</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Work-life balance?</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">The companies in these lists offer these – and more.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1381" instrument_node="">Here are the </span><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">best companies to work for in Singapore</span></strong><span data-dcnode-id="1378" instrument_node="">, based on feedback from employees working there!</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Read on to see what they have to say:</span></p><span data-dcnode-id="1373" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node="">
</span><h2 data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Best Places to Work Singapore: Employees’ Choice (Glassdoor)</span></h2><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1367" instrument_node="">According to Glassdoor’s inaugural </span><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glassdoor.sg/Award/Best-Places-to-Work-Singapore-LST_KQ0%2C29.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1366" instrument_node="">2020 edition of ‘Best Places to Work in Singapore’</span></a><span data-dcnode-id="1364" instrument_node="">, these are the top 10 companies:</span></p><span data-dcnode-id="1362" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1290"><table border="5" data-dcnode-id="1291"><tbody data-dcnode-id="1292"><tr data-dcnode-id="1353"><th data-dcnode-id="1358"><span data-dcnode-id="1359" style="color: #ffffff;"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Rank</span></strong></span></th><th data-dcnode-id="1354"><span data-dcnode-id="1355" style="color: #ffffff;"><strong data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Company</span></strong></span></th></tr><tr data-dcnode-id="1347"><td data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">#1</span></td><td data-dcnode-id="1348"><a data-dcnode-id="1349" href="#google" style="color: #34aeef;"><span data-dcnode-id="1350" instrument_node="">Google</span></a></td></tr><tr data-dcnode-id="1341"><td data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">#2</span></td><td data-dcnode-id="1342"><a data-dcnode-id="1343" href="#facebook" style="color: #34aeef;"><span data-dcnode-id="1344" instrument_node="">Facebook</span></a></td></tr><tr data-dcnode-id="1335"><td data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">#3</span></td><td data-dcnode-id="1336"><a data-dcnode-id="1337" href="#shell" style="color: #34aeef;"><span data-dcnode-id="1338" instrument_node="">Shell</span></a></td></tr><tr data-dcnode-id="1329"><td data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">#4</span></td><td data-dcnode-id="1330"><a data-dcnode-id="1331" href="#amazon" style="color: #34aeef;"><span data-dcnode-id="1332" instrument_node="">Amazon</span></a></td></tr><tr data-dcnode-id="1323"><td data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">#5</span></td><td data-dcnode-id="1324"><a data-dcnode-id="1325" href="#microsoft" style="color: #34aeef;"><span data-dcnode-id="1326" instrument_node="">Microsoft</span></a></td></tr><tr data-dcnode-id="1317"><td data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">#6</span></td><td data-dcnode-id="1318"><a data-dcnode-id="1319" href="#visa" style="color: #34aeef;"><span data-dcnode-id="1320" instrument_node="">Visa Inc.</span></a></td></tr><tr data-dcnode-id="1311"><td data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">#7</span></td><td data-dcnode-id="1312"><a data-dcnode-id="1313" href="#aia" style="color: #34aeef;"><span data-dcnode-id="1314" instrument_node="">AIA</span></a></td></tr><tr data-dcnode-id="1305"><td data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">#8</span></td><td data-dcnode-id="1306"><a data-dcnode-id="1307" href="#hubspot" style="color: #34aeef;"><span data-dcnode-id="1308" instrument_node="">HubSpot</span></a></td></tr><tr data-dcnode-id="1299"><td data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">#9</span></td><td data-dcnode-id="1300"><a data-dcnode-id="1301" href="#jpmorgan" style="color: #34aeef;"><span data-dcnode-id="1302" instrument_node="">J.P. Morgan</span></a></td></tr><tr data-dcnode-id="1293"><td data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">#10</span></td><td data-dcnode-id="1294"><a data-dcnode-id="1295" href="#hp" style="color: #34aeef;"><span data-dcnode-id="1296" instrument_node="">HP Inc.</span></a></td></tr></tbody></table></figure><span data-dcnode-id="1289" instrument_node="">
</span><h3 data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">About Glassdoor’s top companies in Singapore list</span></h3><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Glassdoor Singapore’s list is compiled based on anonymous employee feedback on companies.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Reviews take into account multiple factors influencing employees’ quality of work, including career opportunities, compensation, senior management and culture and values.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">It’s interesting that these top 10 companies are international MNCs in Singapore. Granted, companies had to have over 1,000 employees to be eligible for the list in the first place</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1276" instrument_node="">Glassdoor Singapore also highlights the trend of companies – big name companies in Singapore and around the world – placing </span><strong data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">increasing emphasis on culture and inclusivity</span></strong><span data-dcnode-id="1273" instrument_node="">, as a defining trend for the next decade.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Here’s what Glassdoor president and COO Christian Sutherland-Wong has to say of the new culture-first decade:</span></p><span data-dcnode-id="1268" instrument_node="">
