</span><div class="nativo-tout nativo-tout--in-content" data-dcnode-id="1476"></div><p data-dcnode-id="1468"><span data-dcnode-id="1475" instrument_node="">That’s what the research and consultancy firm Great Place to Work, a </span><em data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Fortune</span></em><span data-dcnode-id="1472" instrument_node=""> partner, found in their most recent analysis of thousands of employee surveys from hundreds of multinational companies. </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fortune.com/global-best-companies/" target="_blank"><span data-dcnode-id="1471" instrument_node="">Google takes the cake among global employers for the fourth year running</span></a><span data-dcnode-id="1469" instrument_node="">—landing at or near the top of Great Place’s rankings in six countries. Accolades should also go to the countries that hosted more than an average number of great places to work, including Peru, Brazil, Canada, India, the U.S., and Germany—all home to more than eight of the top companies’ offices.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1466" instrument_node="">Here, Great Place to Work and </span><em data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Fortune</span></em><span data-dcnode-id="1463" instrument_node=""> present the cream of the crop of this year’s global workplaces based on feedback from employees around the world. For the complete methodology, visit </span><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greatplacetowork.com/list-calendar/multinational" target="_blank"><span data-dcnode-id="1462" instrument_node="">greatplacetowork.com</span></a><span data-dcnode-id="1460" instrument_node="">.</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1455"><a data-dcnode-id="1456" href="#methodology"><span data-dcnode-id="1457" instrument_node="">See our methodology.</span></a></p><span data-dcnode-id="1454" instrument_node="">
</span><hr data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">
</span><h2 data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node="">1. </span><a data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortune.com/company/alphabet" target="_blank"><span data-dcnode-id="1450" instrument_node="">Google</span></a><span data-dcnode-id="1448" instrument_node=""> (GOOGL)</span></h2><span data-dcnode-id="1446" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1439" id="attachment_1826706" style="width:4578px"><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.fortune.com/wp-content/uploads/2016/10/1-google-gettyimages-506276978.jpg%3Fw%3D810"><img alt="Inside Google Canada's Development Headquarters" class="wp-image-1826706 size-full" data-dcnode-id="1445" height="3160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.fortune.com/wp-content/uploads/2016/10/1-google-gettyimages-506276978.jpg%3Fw%3D810&amp;raw" width="4578"></a><figcaption class="wp-caption-text" data-dcnode-id="1442" id="caption-attachment-1826706"><span data-dcnode-id="1443" instrument_node="">Cole Burston—Bloomberg via Getty Images</span></figcaption><div class="image-credit" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Cole Burston—Bloomberg via Getty Images</span></div></figure><span data-dcnode-id="1438" instrument_node="">

</span><div data-dcnode-id="1432" id="div-gpt-ad-instream0" style="text-align: center; 
            margin-bottom: 24px; 
            margin-left: auto; 
            margin-right: auto;"><div class="fortune-ad-tag__instream" data-dcnode-id="1433" id="div-gpt-ad-instream0-slot" style="text-align: center;"></div></div><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">“I love working for the greatest company in the history of the world! This place has been amazing and keeps getting better. There is nothing we can’t accomplish and everyone walking the halls feels they can change the world.”</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">“People talk about Google’s perks, and they are great. But what makes Google truly special is the people. I worked at 5 other companies before coming to Google, and I have never been anywhere with coworkers that are this smart, this motivated, this caring and this awesome. Everybody above me in my management chain is smarter than me and works harder than me—I think that is amazing. Almost everybody here is world-class at something, and, oh yeah, has a hobby where they are also world-class. It’s an amazing—sometimes intimidating—place to work, but that’s what makes it a great place to work: working with the best people on world-class problems.”</span></p><span data-dcnode-id="1426" instrument_node="">

</span><div data-dcnode-id="1378" id="div-gpt-ad-instream1" style="text-align: center; 
            margin-bottom: 24px; 
            margin-left: auto; 
            margin-right: auto;"><div class="fortune-ad-tag__instream" data-dcnode-id="1379" id="div-gpt-ad-instream1-slot" style="text-align: center;"></div></div><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">“More than anywhere else I’ve experienced, our company feels like a small, interconnected and supportive community. The workplace values and culture, which extend beyond the office and working hours, spreads between all employees. When you need help, there is always someone willing to help. … I couldn’t be more excited to have become a part of the family at SAS.”</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">“After working for 12 years a science teacher, I made the decision to leave and explore my interests outside of the classroom. It was hard to walk away from a career I was so passionate about and had spent so much of my time and energy building—and then I found myself at SAS, a dream come true! It is truly a different world here, one where I look forward to going to work each day. From the start, everyone has been so kind, welcoming and supportive.”</span></p><span data-dcnode-id="1372" instrument_node="">

</span><h2 data-dcnode-id="143" id="methodology"><span data-dcnode-id="144" instrument_node="">Methodology</span></h2><span data-dcnode-id="142" instrument_node="">
</span><p data-dcnode-id="139"><strong data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">About the World’s Best Multinational Workplaces list</span></strong></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="131"><span data-dcnode-id="137" instrument_node="">Since 2011, Great Place to Work has identified the top organizations that create great workplaces in multiple countries in which they operate through the publication of the World’s Best Multinational Workplaces list. To be considered eligible for the multinational list, companies must meet our definition of a Multinational Company and appear on a minimum of 5 national best workplaces lists that rank organizations based on the results of their Trust Index employee survey and Culture Audit assessment (to qualify in the United States, we look at winners of the </span><a data-dcnode-id="133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fortune.com/best-companies/" target="_blank"><em data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">Fortune</span></em><span data-dcnode-id="134" instrument_node=""> 100 Best Companies to Work For</span></a><span data-dcnode-id="132" instrument_node=""> list). The results of those national lists, in addition to extra points awarded for the number of countries an organization surveyed employees in, and the percentage of the company’s global workforce represented by those surveys, are combined to create a top 25 ranking.</span></p><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Candidates for the list must have a minimum of 5,000 employees worldwide, and 40% of their workforce (or 5,000 employees) must be based outside of the country in which they are headquartered. Candidates for the 2016 World’s Best Multinational Workplaces list will have appeared on the following lists: Best Workplaces in Asia 2016, Best Workplaces in Latin America 2016, Best Workplaces in Europe 2016, Best Workplaces in Canada 2016, Best Workplaces in Nigeria 2016, Best Workplaces in Brazil 2016 and Fortune Best Companies to Work For in US 2016.</span></p><span data-dcnode-id="127" instrument_node="">
</span><p data-dcnode-id="122"><em data-dcnode-id="123"><a data-dcnode-id="125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fortune.com/2016/10/26/best-global-companies-to-work-for/" target="_blank"><span data-dcnode-id="126" instrument_node="">Click here</span></a><span data-dcnode-id="124" instrument_node=""> for more on Fortune’s “25 Best Global Companies to Work For.”</span></em></p><span data-dcnode-id="121" instrument_node="">
