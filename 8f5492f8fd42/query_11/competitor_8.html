in-p-800.jpeg 800w, https://assets-global.website-files.com/6116570187f45b6d4a8978f9/622af3685cc86a214fce80b5_cultural_barriers_overcome_advancesuccess-min-p-1080.jpeg 1080w, https://assets-global.website-files.com/6116570187f45b6d4a8978f9/622af3685cc86a214fce80b5_cultural_barriers_overcome_advancesuccess-min.jpg 1280w"><div class="cms-text-content" data-dcnode-id="1797"><div class="blog-card-type article-type" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Organizational Cultures</span></div><h1 class="blog-card-heading blog-page" data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Cultural barriers - How to overcome them and advance to success</span></h1><div class="blog-card-profile-block author-profile" data-dcnode-id="1798"><img alt="HR blogs" class="blog-card-profile-image" data-dcnode-id="1810" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/6116570187f45b55238978f4/6116570187f45b6b1e897d5e_blog-card-profile.svg&amp;raw"><div class="blog-card-profile-text-block" data-dcnode-id="1799"><div class="blog-card-profile-name" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Admin</span></div><div class="blog-card-profile-time-stamp" data-dcnode-id="1800"><div class="blog-card-published-date" data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">March 28, 2022</span></div><img alt="Human Resource Management Platform" class="blog-card-clock-icon" data-dcnode-id="1805" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/6116570187f45b55238978f4/6116570187f45bc6be897d5d_ant-design_clock-circle-outlined.svg&amp;raw"><div class="blog-card-published-time" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">2</span></div><div class="text-block-122" data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">mins</span></div></div></div></div></div><article class="rich-text-block w-richtext" data-dcnode-id="1683"><p data-dcnode-id="1793"><strong data-dcnode-id="1794"><em data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">This is a guest post from Radical Candor</span></em></strong></p><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">‍</span></p><p data-dcnode-id="1786"><span data-dcnode-id="1790" instrument_node="">When talking about Radical Candor, I often get asked about how it applies to different cultures. Can Radical Candor be used for feedback and interactions across countries and </span><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplehum.com/glossary/company-culture" target="_blank"><span data-dcnode-id="1789" instrument_node="">cultures</span></a><span data-dcnode-id="1787" instrument_node="">? Do you have to approach it differently for different cultures? Here are my thoughts on Radical Candor and cultural barriers:</span></p><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Radical Candor is universally human, but interpersonally and culturally relative</span></p><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">I introduced this idea in a post about&nbsp;self-awareness and Radical Candor&nbsp;— the key is that Challenging Directly and showing you Care Personally are both sensitive to context and perception; they get measured at the listener’s ear, not at the speaker’s mouth.</span></p><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">‍</span></p><h2 data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Overcoming cultural barriers </span></h2><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">‍</span></p><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Radical Candor works only if the other person feels you are Challenging Directly and showing you Care Personally. What seems Radically Candid to one person or team may feel too obnoxious or too touchy-feely to another. Going from one company to another or from one country to another may mean even more differences in perception, so you need to consider individual and cultural preferences and adjust accordingly.</span></p><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Let me share some stories to show how Radical Candor and cultural differences has played out for me.</span></p><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">‍</span></p><figure class="w-richtext-align-center w-richtext-figure-type-image" data-dcnode-id="1767"><div data-dcnode-id="1768"><img alt="Cultural barriers - How to overcome them and advance to success | peopleHum" data-dcnode-id="1769" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/6116570187f45b6d4a8978f9/6116570187f45b0a17899d4a_4.png&amp;raw"></div></figure><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">‍</span></p><h2 data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">When the culture expects direct challenges</span></h2><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">‍</span></p><p data-dcnode-id="1756"><span data-dcnode-id="1760" instrument_node="">Shortly after I graduated from business school, I took a job with Deltathree, a voice over IP start-up based in Jerusalem. I was raised in the American South, where people will do almost anything to avoid </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplehum.com/blog/key-challenges-in-the-workplace" target="_blank"><span data-dcnode-id="1759" instrument_node="">conflict</span></a><span data-dcnode-id="1757" instrument_node=""> or argument. In Israel, the opposite was true. Conversations seemed to encourage conflict.</span></p><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">I’ll never forget overhearing Noam Bardin, Deltathree’s COO, yelling at an engineer, “That design could be fifteen times more efficient. You&nbsp;know&nbsp;you could have built it better. Now we’re going to have to rip what you did out and start over. We’ve lost a month, and for what? What were you&nbsp;thinking??”</span></p><p data-dcnode-id="1749"><span data-dcnode-id="1753" instrument_node="">I was a little shocked by this — I don’t think I had ever heard such a direct challenge in the </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplehum.com/blog/9-ways-to-create-a-learning-culture-in-the-workplace" target="_blank"><span data-dcnode-id="1752" instrument_node="">workplace</span></a><span data-dcnode-id="1750" instrument_node="">. But the engineer seemed to think this challenge was perfectly acceptable.</span></p><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">As I spent more time in Jerusalem and built relationships with the Israelis on the team, I began to understand the Israeli culture better. I began to understand that in the workplace and elsewhere, it was OK to challenge&nbsp;everything. It was not a sign of disrespect to argue vehemently with each other; rather it was a sign that the issue at hand was an important one to think about and discuss. I realized that Noam’s challenge to the engineer was a sign of respect. When you try to understand a culture better, you inevitably overcome the cultural barriers.</span></p><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">‍</span></p><h2 data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">When the culture is reluctant to challenge directly</span></h2><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">‍</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">I had a very different experience when I managed a team in Tokyo a few years later. The team there was enormously frustrated with how the Product team at Google’s U.S. headquarters was approaching ads in mobile applications. But the Japanese team felt that it would be a sign of disrespect to voice these problems to the team responsible for product management, so they weren’t getting fixed. When I pushed them to challenge the approach to mobile applications at Google headquarters, the team just stared at me as though I were crazy.</span></p><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Trying to get the team in Tokyo to challenge directly the way Noam Bardin did in Jerusalem wouldn’t have worked. The kind of argument that would be taken as a sign of respect in Jerusalem would have been offensive in Tokyo. I found my own Southern upbringing helpful in understanding the Japanese perspective: both cultures placed a great emphasis on manners and on not contradicting people in public. So I encouraged the team in Tokyo to be “politely persistent.” Being polite was their preferred way of showing they Cared Personally. Being persistent was the way they were most comfortable challenging Google’s product direction.</span></p><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">I was gratified to see the results. The team in Tokyo became not just persistent but relentless in their campaign to be heard. Thanks in part to their </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplehum.com/blog/perseverance-key-real-stories" target="_blank"><span data-dcnode-id="1735" instrument_node="">polite persistence,</span></a><span data-dcnode-id="1733" instrument_node=""> a new product, AdSense for Mobile Applications, was born.</span></p><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Of course, it isn’t always that simple. If you are a single person in a culture that is unwilling to challenge directly or thinks caring personally is “unprofessional” then it can be daunting to change the culture around you and how to overcome cultural barriers. When I teach Radical Candor, students often say to me, “This is all well and good. I agree with everything you’re saying. But my boss doesn’t operate this way!” When your boss or the culture doesn’t support you, it’s definitely harder. But the good news is that if you are a manager, you can usually create a subculture of Radical Candor on your team. And often the positive benefits to both morale and results are apparent enough it gets copied.</span></p><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">‍</span></p><h2 data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Showing you care personally looks different in different cultures</span></h2><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">‍</span></p><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">My friend Astrid Tuminez has a great story about how important it is to adapt the way you show you care to different cultures.</span></p><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Astrid grew up in the slums of the Philippines and went on to have a career that spanned Moscow (where I worked with her), New York, and Singapore. While at the US Institute of Peace, she was invited to work on the peace process with the Moro Islamic Liberation Front in the southern Philippines. When she first arrived, she acted like a New Yorker—very business-like, making back-to-back appointments.</span></p><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Then a member of the Philippine negotiating team told her that someone from the Muslim/Moro group had sent a note to Manila saying, “Who is this woman and what planet is she from?” The person who gave Astrid this feedback was particularly invested in Astrid’s success because they had connected over the fact that they were from the same province. However, Astrid had gone to college and graduate school in the US and had developed American habits and an American affect.</span></p><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">To the Muslims, Astrid had come across as unfeeling, inhospitable, and foreign even though she was Filipino and could speak Filipino. Thinking it over, she realized that she’d made some significant mistakes—such as hosting meetings with people without offering them real food, which was so important in the culture. She spent the next few months listening and making only “loose” appointments. She attended public events and made the rounds without scheduling people back-to-back. And she made sure she had a lot of food available when she hosted meetings. Listening to people and understanding them is very important. Team building is difficult but once you understand the essence of it, it becomes easy. </span></p><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">By taking time to show she cared about the people she was working within the way that was expected culturally, she was able to build trust and show she cared deeply about the peace process. Eventually, the Moros became very willing to speak to her and to take her places where other outsiders couldn’t or wouldn’t go. It made all the difference in her ability to be effective in the complex and nuanced negotiations her job required.</span></p><p data-dcnode-id="1709"><span data-dcnode-id="1713" instrument_node="">I met Astrid when we both worked in Moscow, where the cultural norms were very different. I was working for the Soviet Companies Fund. My job was to teach factory directors to write business plans to help attract investment from American pension funds. This was in 1991, just a couple years after the fall of the Berlin Wall and the end of the Cold War, and we were working with military factories. As you can imagine, there was a good deal of suspicion about these American&nbsp;</span><em data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Kapitalistes</span></em><span data-dcnode-id="1710" instrument_node="">&nbsp;coming in to “help.” At first, I was helped by my appearance. I was 23, five feet tall, and female. “Why we expected a capitalist pig and in comes a little girl!” exclaimed one executive. Luckily, I knew my stuff well enough to earn his respect. By the end of the day, he exclaimed, “Well, now we know you can write a 'beezneess' plan. Now, let’s see if you can drink vodka!”</span></p><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">If I had been back in college at a party, I would have ignored this as a stupid challenge best met by leaving without a sip. But I had been in Russia long enough to know that wasn’t what was happening at all here. He wasn’t challenging me to show how tough I was, he was asking me to earn their trust. I needed to show that I cared about them and that I was a human being, just like them, and not a cold-hearted American. Matching those men shot for shot was the best way I could show I cared personally. I’m of Irish extraction, was raised in the South, and had spent my early twenties in Moscow, so I was a world-class drinker, and able to do it.</span></p><p data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">Of course, if you don’t drink, you don’t have to drink just because it’s a cultural norm in order to show you care personally. You just have to be sensitive to the cultural norms and explain your way around them. For example, I once had to do a deal in Islamabad. The negotiation happened over copious amounts of tea and eventually the inevitable happened. I had to use the bathroom. As there was no women’s room in this particular building, this was a cause of some consternation. One man suggested he guard the door, but a more conservative man was clearly profoundly uncomfortable with a woman using the restroom. Instead, he proposed a bucket in a mop closet. That was where my cultural </span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//peoplehum.com/blog/employee/salary-of-employees/" target="_blank"><span data-dcnode-id="1705" instrument_node="">sensitivity</span></a><span data-dcnode-id="1703" instrument_node=""> ended. However, I didn’t want to push him to a place where he was uncomfortable. I suggested I drive back to the hotel, use the facilities there, and then return. I figured he’d opt to let me use the restroom rather than wait an hour for me. However, he was happy to wait.</span></p><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">I answered a question about Radical Candor and cultural differences at Betterworks Goal Summit 2016:</span></p><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">So again, Radical Candor can be applied across all cultures, but it may look very different from one culture to the next. I’ve led teams all over the world and have seen firsthand that it’s possible to adapt Radical Candor equally well for Jerusalem, Tokyo, Moscow and everywhere else I’ve worked.</span></p><p data-dcnode-id="1693"><span data-dcnode-id="1697" instrument_node="">One of the best things you can do to understand how to adjust for different people and to overcome cultural barriers is to be clear about your intentions for Radical Candor and then to ask people to&nbsp;gauge your interactions. Knowing how someone perceived an interaction with respect to how you perceived it will help you adjust in the future and ways on how to overcome cultural barriers. Open communication must be fostered at the workplaces. A lot of </span><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplehum.com/" target="_blank"><span data-dcnode-id="1696" instrument_node="">HRMS platforms</span></a><span data-dcnode-id="1694" instrument_node=""> are on the rise which fosters open, two-way communication.</span></p><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Do you have any stories to share about adjusting the communication at your workplace and moving across cultural barriers? Let us know about how you handle Radical Candor and cultural barriers.</span></p><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Adapted from an excerpt from&nbsp;Radical Candor: Be a Kickass Boss Without Losing Your Humanity.&nbsp;</span></p><p data-dcnode-id="1684"><span data-dcnode-id="1688" instrument_node="">Overcoming workplace cultural barriers is important. How important is company culture? Company culture pronounces the personality of a company and has a direct impact on employee retention. Talking about retention, </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//peoplehum.com/blog/employee-engagement/employee-engagement-survey/" target="_blank"><span data-dcnode-id="1687" instrument_node="">are you engaging with employees the right way?</span></a><span data-dcnode-id="1685" instrument_node=""> Are you discussing pay regularly? Do things right the right way.</span></p></article></div><div class="cms-sticky" data-dcnode-id="1647"><a class="sticky-image-div w-inline-block" data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplehum.com/demo"><img alt="" data-dcnode-id="1681" loading="eager" sizes="(max-width: 991px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/6116570187f45b55238978f4/62302d8338d7dd50f19dd898_peopleHum-blog-sticky-image%2520%281%29.jpg&amp;raw" srcset="https://assets-global.website-files.com/6116570187f45b55238978f4/62302d8338d7dd50f19dd898_peopleHum-blog-sticky-image%20(1)-p-500.jpeg 500w, https://assets-global.website-files.com/6116570187f45b55238978f4/62302d8338d7dd50f19d
