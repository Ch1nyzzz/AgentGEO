</span><a class="anchor" data-dcnode-id="1163" id="intro"></a><span data-dcnode-id="1162" instrument_node="">
</span><h2 data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Overview</span></h2><span data-dcnode-id="1159" instrument_node="">
</span></div><span data-dcnode-id="1157" instrument_node="">
</span><div class="intro-container row-fluid span12" data-dcnode-id="1107"><span data-dcnode-id="1156" instrument_node="">
</span><i data-dcnode-id="1112"><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">With families that do not speak English as a first language, the first step to overcome communication barriers is to address language issues. Schools should provide interpreters and translators as needed for parent/caregiver-teacher meetings instead of using students to translate for their families. In schools serving significant populations of immigrant parents who speak the same language, for example, Mandarin-speaking parents, it is important that all communication should be bilingual.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1152" instrument_node="">Bilingual staff can also act as intermediaries between families and teachers. Research shows that having an interpreter serving as a bridge between teachers and parents can be determinant in the success of parent-teacher communication</span><sup data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">1</span></sup><span data-dcnode-id="1149" instrument_node="">. In addition to providing interpreters and translators, teachers and schools can translate classroom and school signs, monthly newsletters, and other types of regular communications. Teachers and schools can also offer discussions about the home and visiting cultures. The more at ease families feel when they communicate with teachers, the more they will attend and actively participate in meetings with teachers and other school staff members.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1144"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Jargon </span></strong></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">The use of educational jargon can also hinder effective parent-teacher communication. This is because the particular language of education and the terminology used is not always clear to families. Every profession has its own vocabulary and terminology that is designed to facilitate communication among its members. But this terminology can become a communication obstacle when members of a profession (e.g., teachers) use it to communicate with individuals or groups outside the profession (e.g., parents, family members, and other community representatives).</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1139" instrument_node="">The field of education has an extensive list of technical terms and acronyms that changes often. Using an overly technical language (e.g., “rubrics”, “performance criteria”, “differentiated instruction”, and “backwards design”) might be confusing to folks unfamiliar with terms often used by educators. Some teachers use this language because they are used to it when communicating with colleagues, others may feel like they speak with more authority when they do so. Communication can be simplified by using direct explanations of the concepts rather than technical terms</span><sup data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">1</span></sup><span data-dcnode-id="1136" instrument_node="">.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1133" instrument_node="">Language is often the major barrier to communicating with educators among parents for whom English is not their first language. Parents may avoid going to schools because they are worried about their ability to communicate using English, and there is often no one at school who speaks their native language</span><sup data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">2</span></sup><span data-dcnode-id="1130" instrument_node="">. Parents often depend on their children to function in the new language, including interpreting the discussion at parent-teacher conferences. This may be problematic, because their children are often learning English and they may not have mastered the subtleties of coded speech in the school context</span><sup data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">3</span></sup><span data-dcnode-id="1127" instrument_node="">. Sometimes this leads to miscommunication between the teacher and the parent or caregivers. With parents and family members who are more fluent in English, the use of educational jargon can hinder effective parent-teacher communication (Gaskell, 2001).</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">To optimize communication with parents, teachers can&nbsp;minimize or avoid the use of professional terms and jargon. &nbsp;Instead, use descriptive language that can be understood by most of the population. When using acronyms, teachers should always spell them out and explain their meanings and relevance to the conversation at hand. Finally, teachers should check with families often to make sure that the information is clear to all parties.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1121" instrument_node="">1. Ramsey, 2009</span><br data-dcnode-id="1120"><span data-dcnode-id="1119" instrument_node="">
2. Scarcella, 1990</span><br data-dcnode-id="1118"><span data-dcnode-id="1117" instrument_node="">
3. Guo, 2006</span><br data-dcnode-id="1116"><span data-dcnode-id="1115" instrument_node="">
4. Gaskell, 2001</span></p><span data-dcnode-id="1113" instrument_node="">
</span></i><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
</span><hr class="sections" data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">
</span></div><span data-dcnode-id="1106" instrument_node="">
</span><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">
</span><div class="entry-content row-fluid span6" data-dcnode-id="75"><span data-dcnode-id="1103" instrument_node="">
</span><div class="row-fluid span3" data-dcnode-id="1098"><span data-dcnode-id="1102" instrument_node="">
</span><h2 data-dcnode-id="1100" id="lesson_assignments"><span data-dcnode-id="1101" instrument_node="">Activities</span></h2><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span><div class="content-container row-fluid span12" data-dcnode-id="77"><span data-dcnode-id="1096" instrument_node="">
</span><a class="anchor" data-dcnode-id="1095" id="acitivites-1"></a><p class="content-title" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Overcoming Language Barriers</span></p><p class="content-box" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Explain what language differences are, how you can address them, and the steps you will take to ameliorate barriers related to language differences in your classroom.</span></p><br data-dcnode-id="1090"><p class="content-box" data-dcnode-id="1089"></p><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">1. Identify the native languages of your students and&nbsp;the languages spoken at home. (Please refer to module 1 for several activities to gather this information.)</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">2. Consider how can you create an inclusive learning environment and ameliorate language difference barriers.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1082" instrument_node="">3. Go to </span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DPWx9YllpEYY"><span data-dcnode-id="1081" instrument_node="">https://www.youtube.com/watch?v=PWx9YllpEYY</span></a><span data-dcnode-id="1079" instrument_node=""> and watch the video of an elementary school teacher, Diane Holtam, talk about how her school welcomed a sudden influx of Korean families into the school district. As you watch, think about and jot down some things that the school did to support these students and their families, as well as some strategies they used to establish connections between the school and the families? What are other initiatives that you think could be done?</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">4. Reflect on your school’s linguistic landscape. What is already being done to support the non-native English-speaking students and families in the community? What more could be done to bridge the language divide and to welcome the rich linguistic diversity of Hawaii?</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">5. Share your thoughts with colleagues, administrators, students, parents, the PTSA, and other relevant parties and make a plan to address the issues that were brought up. Implement the plan and reflect upon it: What worked? What needs to be changed?</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1070"></p><div class="accordion" data-dcnode-id="1006"><div class="accordion-group" data-dcnode-id="1033"><div class="accordion-heading" data-dcnode-id="1067"><a class="accordion-toggle" data-dcnode-id="1068" data-toggle="collapse" href="#collapse1-1"><span data-dcnode-id="1069" instrument_node="">Hawaii Teacher Performance Standards</span></a></div><div class="accordion-body collapse" data-dcnode-id="1034" id="collapse1-1"><div class="accordion-inner" data-dcnode-id="1035"><p data-dcnode-id="1064"><strong data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">InTASC Model Core Teaching Standards</span></strong></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1060"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Standard #1: Learner Development</span></strong></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">1(a) The teacher regularly assesses individual and group performance in order to design and modify instruction to meet learners’ needs in each area of development (cognitive, linguistic, social, emotional, and physical) and scaffolds the next level of development.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">1(e) The teacher understands that each learner’s cognitive, linguistic, social, emotional, and physical development influences learning and knows how to make instructional decisions that build on learners’ strengths and needs.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">1(g) The teacher understands the role of language and culture in learning and knows how to modify instruction to make language comprehensible and instruction relevant, accessible, and challenging.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1047"><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Standard #2: Learning Differences</span></strong></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">2(o) The teacher values diverse languages and dialects and seeks to integrate them into his/her instructional practice to engage students in learning.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1040"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Standard #3: Learning Environments&nbsp;</span></strong></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">8(k) The teacher knows how to apply a range of developmentally, culturally, and linguistically appropriate instructional strategies to achieve learning goals.</span></p><span data-dcnode-id="1036" instrument_node="">
</span></div></div></div><div class="accordion-group" data-dcnode-id="1007"><div class="accordion-heading" data-dcnode-id="1030"><a class="accordion-toggle" data-dcnode-id="1031" data-toggle="collapse" href="#collapse2-1"><span data-dcnode-id="1032" instrument_node="">Resources</span></a></div><div class="accordion-body collapse" data-dcnode-id="1008" id="collapse2-1"><div class="accordion-inner" data-dcnode-id="1009"><p data-dcnode-id="1026"><span data-dcnode-id="1029" instrument_node="">1. “Overcome the Language Barrier” at </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ptotoday.com/pto-today-articles/article/261-overcome-the-language-barrier"><span data-dcnode-id="1028" instrument_node="">http://www.ptotoday.com/pto-today-articles/article/261-overcome-the-language-barrier</span></a></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1024" instrument_node="">2. “Helping Students Overcome Language Barriers in the Classroom at </span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k12teacherstaffdevelopment.com/tlb/helping-students-overcome-language-barriers-in-the-classroom/"><span data-dcnode-id="1023" instrument_node="">https://k12teacherstaffdevelopment.com/tlb/helping-students-overcome-language-barriers-in-the-classroom/</span></a></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1019" instrument_node="">3. Additional tips for overcoming language barriers in the classroom at </span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.learningsciences.com/2017/08/29/new-ell-students/"><span data-dcnode-id="1018" instrument_node="">https://blog.learningsciences.com/2017/08/29/new-ell-students/</span></a></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1014" instrument_node="">4. “6 Ways Educators Can Overcome Language Barriers with Parents” at </span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinegrad.baylor.edu/resources/language-barriers-parent-teacher-communication/"><span data-dcnode-id="1013" instrument_node="">https://onlinegrad.baylor.edu/resources/language-barriers-parent-teacher-communication/</span></a></p><span data-dcnode-id="1010" instrument_node="">
</span></div></div></div></div><hr class="sections" data-dcnode-id="1005"><a class="anchor" data-dcnode-id="1004" id="acitivites-2"></a><p class="content-title" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Minimize Jargon</span></p><p class="content-box" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Learn what jargon is, how it is used in education, and how it can unintentionally hamper communication with families. Gather information about various ways in which you can make your language clear and direct to enhance communication with families.</span></p><br data-dcnode-id="999"><p class="content-box" data-dcnode-id="998"></p><p data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">1. Learn how to become aware of how jargon may be overused and how this overuse may hamper communication with families.&nbsp;</span><strong data-dcnode-id="994"><br data-dcnode-id="996"><span data-dcnode-id="995" instrument_node="">
</span></strong></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="991" instrument_node="">2.&nbsp;Read the following link, which explains what jargon is and how its overuse can lead to miscommunication in any field </span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.business.com/articles/cut-the-code-why-speaking-in-technical-jargon-is-not-making-you-look-smarter/"><span data-dcnode-id="990" instrument_node="">https://www.business.com/articles/cut-the-code-why-speaking-in-technical-jargon-is-not-making-you-look-smarter/</span></a></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">2. Read the following two examples from the educational arena:</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="981"><i data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">EXAMPLE 1→ Jargon: On this nationally norm-referenced standardized test, your child’s score fell at the seventy-fifth percentile.</span></i></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="977"><i data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">(Huh?)</span></i></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="973"><i data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">EXAMPLE 2→ Plain Talk: Your child’s score was as high or higher than seventy-five percent of students the same age across the country who have taken the same test.</span></i></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="969"><i data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">(Wow!)</span></i></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Does the information differ from the first to the second example? How does the format differ? Indicate at least two uses of jargon in the first example. What changes were made to make the second example more accessible? What further changes could you make to the language to make it even more accessible? Which tools or strategies could you use to help families understand what “high or higher” than seventy-five percent” means?</span></p><span data-dcnode-id="965" instrument_node="">

lign="top"></td><td data-dcnode-id="594" valign="top"></td></tr><tr data-dcnode-id="579"><td data-dcnode-id="588" valign="top"><span data-dcnode-id="589" instrument_node="">NEA</span></td><td data-dcnode-id="585" valign="top"><span data-dcnode-id="586" instrument_node="">National Education Association</span></td><td data-dcnode-id="583" valign="top"></td><td data-dcnode-id="581" valign="top"></td></tr><tr data-dcnode-id="566"><td data-dcnode-id="575" valign="top"><span data-dcnode-id="576" instrument_node="">NCLB</span></td><td data-dcnode-id="572" valign="top"><span data-dcnode-id="573" instrument_node="">No Child Left Behind</span></td><td data-dcnode-id="570" valign="top"></td><td data-dcnode-id="568" valign="top"></td></tr><tr data-dcnode-id="553"><td data-dcnode-id="562" valign="top"><span data-dcnode-id="563" instrument_node="">PTA</span></td><td data-dcnode-id="559" valign="top"><span data-dcnode-id="560" instrument_node="">Parent Teacher Association</span></td><td data-dcnode-id="557" valign="top"></td><td data-dcnode-id="555" valign="top"></td></tr><tr data-dcnode-id="542"><td data-dcnode-id="550" valign="top"></td><td data-dcnode-id="548" valign="top"></td><td data-dcnode-id="546" valign="top"></td><td data-dcnode-id="544" valign="top"></td></tr><tr data-dcnode-id="529"><td data-dcnode-id="537" valign="top"><b data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">HAWAI‘I ACRONYMS</span></b></td><td data-dcnode-id="535" valign="top"></td><td data-dcnode-id="533" valign="top"></td><td data-dcnode-id="531" valign="top"></td></tr><tr data-dcnode-id="516"><td data-dcnode-id="525" valign="top"><span data-dcnode-id="526" instrument_node="">HDOE</span></td><td data-dcnode-id="522" valign="top"><span data-dcnode-id="523" instrument_node="">Hawai‘i Department of Education</span></td><td data-dcnode-id="520" valign="top"></td><td data-dcnode-id="518" valign="top"></td></tr><tr data-dcnode-id="503"><td data-dcnode-id="512" valign="top"><span data-dcnode-id="513" instrument_node="">HSTA</span></td><td data-dcnode-id="509" valign="top"><span data-dcnode-id="510" instrument_node="">Hawai‘i State Teachers Association</span></td><td data-dcnode-id="507" valign="top"></td><td data-dcnode-id="505" valign="top"></td></tr><tr data-dcnode-id="490"><td data-dcnode-id="499" valign="top"><span data-dcnode-id="500" instrument_node="">HSA</span></td><td data-dcnode-id="496" valign="top"><span data-dcnode-id="497" instrument_node="">Hawai‘i State Assessment</span></td><td data-dcnode-id="494" valign="top"></td><td data-dcnode-id="492" valign="top"></td></tr><tr data-dcnode-id="477"><td data-dcnode-id="486" valign="top"><span data-dcnode-id="487" instrument_node="">HCPS</span></td><td data-dcnode-id="483" valign="top"><span data-dcnode-id="484" instrument_node="">Hawai‘i Content Performance Standards (retired)</span></td><td data-dcnode-id="481" valign="top"></td><td data-dcnode-id="479" valign="top"></td></tr><tr data-dcnode-id="464"><td data-dcnode-id="473" valign="top"><span data-dcnode-id="474" instrument_node="">PCNCC</span></td><td data-dcnode-id="470" valign="top"><span data-dcnode-id="471" instrument_node="">Parent Community Networking Center Coordinator</span></td><td data-dcnode-id="468" valign="top"></td><td data-dcnode-id="466" valign="top"></td></tr><tr data-dcnode-id="451"><td data-dcnode-id="460" valign="top"><span data-dcnode-id="461" instrument_node="">SASA</span></td><td data-dcnode-id="457" valign="top"><span data-dcnode-id="458" instrument_node="">School Administrative Services Assistant</span></td><td data-dcnode-id="455" valign="top"></td><td data-dcnode-id="453" valign="top"></td></tr><tr data-dcnode-id="438"><td data-dcnode-id="447" valign="top"><span data-dcnode-id="448" instrument_node="">SCC</span></td><td data-dcnode-id="444" valign="top"><span data-dcnode-id="445" instrument_node="">School Community Council</span></td><td data-dcnode-id="442" valign="top"></td><td data-dcnode-id="440" valign="top"></td></tr></tbody></table><span data-dcnode-id="433" instrument_node="">
</span><hr data-dcnode-id="432"><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><img data-dcnode-id="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//affect.coe.hawaii.edu/wp-content/uploads/2016/12/20mistakes.jpg&amp;raw"></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="427"></p><div class="accordion" data-dcnode-id="357"><div class="accordion-group" data-dcnode-id="377"><div class="accordion-heading" data-dcnode-id="424"><a class="accordion-toggle" data-dcnode-id="425" data-toggle="collapse" href="#collapse1-2"><span data-dcnode-id="426" instrument_node="">Hawaii Teacher Performance Standards</span></a></div><div class="accordion-body collapse" data-dcnode-id="378" id="collapse1-2"><div class="accordion-inner" data-dcnode-id="379"><p data-dcnode-id="421"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">InTASC Model Core Teaching Standards</span></strong></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="417"><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Standard #1: Learner Development</span></strong></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">1(g) The teacher understands the role of language and culture in learning and knows how to modify instruction to make language comprehensible and instruction relevant, accessible, and challenging.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="410"><strong data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Standard #2: Learning Differences</span></strong></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">2(e) The teacher incorporates tools of language development into planning and instruction, including strategies for making content accessible to English language learners and for evaluating and supporting their development of English proficiency.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">2(o) The teacher values diverse languages and dialects and seeks to integrate them into his/her instructional practice to engage students in learning.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="400"><strong data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Standard #3:&nbsp;Learning Environments</span></strong></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">3(f) The teacher communicates verbally and nonverbally in ways that demonstrate respect for and responsiveness to the cultural backgrounds and differing perspectives learners bring to the learning environment.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">3(q) The teacher seeks to foster respectful communication among all members of the learning community.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">3(r) The teacher is a thoughtful and responsive listener and observer.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="387"><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Standard #10:&nbsp;Leadership and Collaboration</span></strong></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">10(d) The teacher works collaboratively with learners and their families to establish mutual expectations and ongoing communication to support learner development and achievement.</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">10(n) The teacher knows how to work with other adults and has developed skills in collaborative interaction appropriate for both face-to-face and virtual contexts.</span></p><span data-dcnode-id="380" instrument_node="">
</span></div></div></div><div class="accordion-group" data-dcnode-id="358"><div class="accordion-heading" data-dcnode-id="374"><a class="accordion-toggle" data-dcnode-id="375" data-toggle="collapse" href="#collapse2-2"><span data-dcnode-id="376" instrument_node="">Resources</span></a></div><div class="accordion-body collapse" data-dcnode-id="359" id="collapse2-2"><div class="accordion-inner" data-dcnode-id="360"><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">1. Lewis-Darden, J. (2013). Educational acronyms &amp; terminologies: A new teacher’s guide.</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="370" instrument_node="">2. Hiding Behind Education Jargon at </span><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//schoolwisepress.com/hiding-behind-education-jargon/"><span data-dcnode-id="369" instrument_node="">https://schoolwisepress.com/hiding-behind-education-jargon/</span></a></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="365" instrument_node="">3. Glossary of educational terms at </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edglossary.org/all-terms/"><span data-dcnode-id="364" instrument_node="">https://www.edglossary.org/all-terms/</span></a></p><span data-dcnode-id="361" instrument_node="">
</span></div></div></div></div><hr class="sections" data-dcnode-id="356"><a class="anchor" data-dcnode-id="355" id="acitivites-3"></a><p class="content-title" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Report Cards</span></p><p class="content-box" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Report cards are supposed to be official communication documents that help teachers communicate with families about the behavior and academic performance of students. However, oftentimes these documents are so specialized that they obstruct rather than assist communication. Study your report cards, develop strategies to make the report card a useful communication exchange, and acquire knowledge, resources, and materials to help families make good use of the information contained in report cards.</span></p><br data-dcnode-id="350"><p class="content-box" data-dcnode-id="349"></p><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Report cards are a major tool for the school to communicate with parents, but often the parents do not understand them very well. Even for the native-English speaking parents, the categories and symbols on the report card might be confusing. In this activity, we’ll consider how to make a fundamental school tool of communication, such as the report card, more accessible to all families including parents of English-Language Learners.</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">1. Consider what you can do to make the school report card more accessible to all families in your school community. For example, could you simplify the curriculum and assessment jargon?</span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">2. Use your school’s Open House, Back to School Night, or other beginning of the school year orientation event to introduce and explain the basics of reading and understanding the report card. This is a very tangible and productive method to empower your students’ parents/guardians and strengthen the school-family communication network.</span></p><span data-dcnode-id="340" instrument_node="">
</span><ul data-dcnode-id="332"><span data-dcnode-id="339" instrument_node="">
</span><li data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">&nbsp;At the aforementioned school event, display an example report card and explain the format, terminology, and expectations. You can highlight, annotate, and/or paraphrase in the template order to make the language more accessible to parents. See an example.</span></li><span data-dcnode-id="336" instrument_node="">
</span><li data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">&nbsp;Share a copy of an old report card or two (with no confidential or recognizable information included).</span></li><span data-dcnode-id="333" instrument_node="">
</span></ul><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="330" instrument_node="">3. In lieu of or in addition to explaining the report card at one of the beginning of the school year events, you may also consider sending home a parent letter and explanation of your grade’s report card. An example of a report card letter used for 1st grade students can be found here: </span><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/Report-Card-Letter-to-Parents-4577297%3Fst%3D29722064ae6809afefd92155f63824db"><span data-dcnode-id="329" instrument_node="">https://www.teacherspayteachers.com/Product/Report-Card-Letter-to-Parents-4577297?st=29722064ae6809afefd92155f63824db</span></a></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">4. If there are some dominant languages in your school consider having a report card translated or at least translate some key aspects of the report card. This can be done for groups of grades in a collaborative manner.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><img data-dcnode-id="322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//affect.coe.hawaii.edu/wp-content/uploads/2016/12/annotatedreport.jpg&amp;raw"></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><img data-dcnode-id="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//affect.coe.hawaii.edu/wp-content/uploads/2016/12/annotatedreport2.jpg&amp;raw"></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">&nbsp;</span></p><span data-dcnode-id="314" instrument_node="">
</span><hr data-dcnode-id="313"><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="309"><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">EXAMPLE OF HDOE TEACHER LETTER TO FAMILIES REGARDING REPORT CARDS</span></strong></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">[INSERT DATE]</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Dear Parents,</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Welcome to a new school year! I am&nbsp;[INSERT TEACHER’S NAME], and I will be your child’s teacher this school year. We will be using the standards-based report card to inform you of your child’s progress and achievement of the Hawaii Content and Performance Standards (HCPS) or the Common Core State Standards in English language arts and mathematics.</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Although the report card is an important part of home and school communication, it is not the only way to know how your child is doing. Throughout the year, your child will be working on many activities that will help him or her learn new concepts and skills. Please take the time to review some of these activities and assignments with your child. They will give you various sources of information about what your child is learning. Also, please review your child’s planner daily. It will contain homework assignments and notes from me when needed. Please write any comments or questions you have for me in the planner as well.</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Your child will be assessed according to grade level benchmarks or standards. His or her progress will be reported quarterly on the standards-based report card. Grades will be based on a variety of evidence such as projects, presentations, tests, observations, and conversations. Remember, learning takes time and practice – just like athletics.</span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Lastly, the report card also has a section on the General Learner Outcomes for all students in all grade levels. These are the positive behaviors and skills that lead to success in work, home and school – responsibility, work habits, thinking skills, quality performance, communication and technology. I will let you know how often your child demonstrates these behaviors. Please support your child by checking if your child completes homework daily, asking your child what he or she is learning, and helping your child work and play well with others.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">If you ever have any questions or concerns, please contact me at&nbsp;[INSERT PHONE NUMBER]&nbsp;or the counselor,[INSERT COUSELOR’S NAME]&nbsp;at&nbsp;[INSERT PHONE NUMBER].</span></p><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Sincerely,</span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">[INSERT TEACHER’S NAME]</span></p><span data-dcnode-id="281" instrument_node="">
</span><hr data-dcnode-id="280"><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="276"><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">EXAMPLE OF HDOE REPORT CARD NEWSLETTER</span></strong></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="272"><b data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Standards-Based Report Cards</span></b></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">This year,&nbsp;[INSERT SCHOOL NAME]&nbsp;along with all other public elementary schools in Hawaii, will introduce Common Core State Standards (CCSS) in English language arts and mathematics for Kindergarten, Grade 1, and Grade 2. The standards-based report card in these grade levels will align with the Common Core State Standards (CCSS) that, as of April 2011, have been adopted by 43 states including Hawaii, and four territories. Grades 3-6 will continue to use the Hawaii Content and Performance Standards III (HCPS III) for instruction and assessment until School Year 2013-2014. In School Year 2013-2014, the Grades 3-6 standards-based report cards will also include the CCSS.</span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Whether it is the CCSS or HCPS III being used for instruction and assessment, all standards make clear what a child is expected to know and be able to do. Teachers will assess each student’s grade level progress and achievement of the standards will be documented on the report card. At parent-teacher conferences, information and strategies to support each child will be shared with parents.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">The Hawaii State Department of Education’s (DOE) goal is for the standards-based report card to help everyone understand a child’s interests, strengths, and talents. With this information, steps can be taken to improve school performance and to make parents full partners in the academic and social development of their child.</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="261"></p><div class="accordion" data-dcnode-id="166"><div class="accordion-group" data-dcnode-id="198"><div class="accordion-heading" data-dcnode-id="258"><a class="accordion-toggle" data-dcnode-id="259" data-toggle="collapse" href="#collapse1-3"><span data-dcnode-id="260" instrument_node="">Hawaii Teacher Performance Standards</span></a></div><div class="accordion-body collapse" data-dcnode-id="199" id="collapse1-3"><div class="accordion-inner" data-dcnode-id="200"><p data-dcnode-id="255"><strong data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">InTASC Model Core Teaching Standards</span></strong></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="251"><strong data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Standard #1: Learner Development</span></strong></p><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">1(k) The teacher values the input and contributions of families, colleagues, and other professionals in understanding and supporting each learner’s development.</span></p><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="244"><strong data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Standard #2: Learning Differences</span></strong></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">2(l) The teacher believes that all learners can achieve at high levels and persists in helping each learner reach his/her full potential.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="237"><strong data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Standard #6: Assessment</span></strong></p><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">6(l) The teacher knows how to analyze assessment data to understand patterns and gaps in learning, to guide planning and instruction, and to provide meaningful feedback to all learners.</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">6(n) The teacher understands the positive impact of effective descriptive feedback for learners and knows a variety of strategies for communicating this feedback.</span></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">6(o) The teacher knows when and how to evaluate and report learner progress against standards.</span></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="224"><strong data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Standard #7: Planning for Instruction</span></strong></p><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">7(b) The teacher plans how to achieve each student’s learning goals, choosing appropriate strategies and accommodations, resources, and materials to differentiate instruction for individuals and groups of learners.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">7(f) The teacher evaluates plans in relation to short- and long-range goals and systematically adjusts plans to meet each student’s learning needs and enhance learning.</span></p><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">7(o) The teacher values planning as a collegial activity that takes into consideration the input of learners, colleagues, families, and the larger community.</span></p><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">7(p) The teacher takes professional responsibility to use short- and long-term planning as a means of assuring student learning.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="208"><strong data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Standard #10: Leadership and Collaboration</span></strong></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">10(d) The teacher works collaboratively with learners and their families to establish mutual expectations and ongoing communication to support learner development and achievement.</span></p><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">10(q) The teacher respects families’ beliefs, norms, and expectations and seeks to work collaboratively with learners and families in setting and meeting challenging goals.</span></p><span data-dcnode-id="201" instrument_node="">
</span></div></div></div><div class="accordion-group" data-dcnode-id="167"><div class="accordion-heading" data-dcnode-id="195"><a class="accordion-toggle" data-dcnode-id="196" data-toggle="collapse" href="#collapse2-3"><span data-dcnode-id="197" instrument_node="">Resources</span></a></div><div class="accordion-body collapse" data-dcnode-id="168" id="collapse2-3"><div class="accordion-inner" data-dcnode-id="169"><p data-dcnode-id="191"><span data-dcnode-id="194" instrument_node="">1. “Overcome the Language Barrier: Effective Strategies Parent Groups Use to Reach Out to Non-English Speakers” at </span><a data-dcnode-id="192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ptotoday.com/pto-today-articles/article/261-overcome-the-language-barrier"><span data-dcnode-id="193" instrument_node="">http://www.ptotoday.com/pto-today-articles/article/261-overcome-the-language-barrier</span></a></p><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="189" instrument_node="">2. Six Steps to Writing Thoughtful Report Card Comments at </span><a data-dcnode-id="187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scholastic.com/teachers/articles/teaching-content/six-steps-writing-thoughtful-report-card-comments/"><span data-dcnode-id="188" instrument_node="">https://www.scholastic.com/teachers/articles/teaching-content/six-steps-writing-thoughtful-report-card-comments/</span></a></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="179"><span data-dcnode-id="184" instrument_node="">3. Report card comments and helpful hints</span><br data-dcnode-id="183"><span data-dcnode-id="182" instrument_node="">
</span><a data-dcnode-id="180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lakeshorelearning.com/media/images/free_resources/teachers_corner/printables/reportcardcomments.pdf"><span data-dcnode-id="181" instrument_node="">http://www.lakeshorelearning.com/media/images/free_resources/teachers_corner/printables/reportcardcomments.pdf</span></a></p><span data-dcnode-id="178" instrument_node="">
</span><p data-dcnode-id="174"><span data-dcnode-id="177" instrument_node="">4. Teach Comments on Report Cards at </span><a data-dcnode-id="175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kellybear.com/TeacherArticles/TeacherTip67.html"><span data-dcnode-id="176" instrument_node="">http://www.kellybear.com/TeacherArticles/TeacherTip67.html</span></a></p><span data-dcnode-id="173" instrument_node="">
</span><p data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">5. Teachers’ Messages for Report Cards, Grades K – 8 [Paperback] by Fearon (Compiler) [BOOK]</span></p><span data-dcnode-id="170" instrument_node="">
</span></div></div></div></div><hr class="sections" data-dcnode-id="165"><a class="anchor" data-dcnode-id="164" id="acitivites-4"></a><p class="content-title" data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Multilingual Strategies</span></p><p class="content-box" data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Gain a deeper understanding of how language differences can prevent families from full participation in the education of their children. Expand your knowledge of strategies you and your school can use to overcome language barriers and promote effective partnerships with families.</span></p><br data-dcnode-id="159"><p class="content-box" data-dcnode-id="158"></p><p data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">1. Identify the native languages of your students as well as the languages spoken at home. (Please refer to module 1 for several activities to gather this information.)</span></p><span data-dcnode-id="155" instrument_node="">
</span><p data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">2. Consider how can you create an inclusive learning environment and ameliorate language difference barriers.</span></p><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="151" instrument_node="">3. Go to the website </span><a data-dcnode-id="149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tolerance.org/professional-development/family-engagement%3Fttnewslette_%2528%253Ca_style%3D"><span data-dcnode-id="150" instrument_node="">https://www.tolerance.org/professional-development/family-engagement?ttnewslette_%28%3Ca_style=</span></a><span data-dcnode-id="148" instrument_node="">&nbsp;and watch the video of an elementary school teacher, Diane Holtam, talk about how her school welcomed a sudden influx of Korean families into the school district. As you watch, think about and jot down some things that the school did to support these students and their families, as well as some strategies they used to establish connections between the school and the families? What are other initiatives that you think could be done?</span></p><span data-dcnode-id="146" instrument_node="">
</span><p data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">4. Reflect on your school’s linguistic landscape. What is already being done to support the non-native English-speaking students and families in the community? What more could be done to bridge the language divide and to welcome the rich linguistic diversity of Hawaii?</span></p><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">5. Share your thoughts with colleagues, administrators, students, parents, the PTSA, and other relevant parties and make a plan to address the issues that were brought up. Implement the plan and reflect upon it: What worked? What needs to be changed?</span></p><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="139"></p><div class="accordion" data-dcnode-id="80"><div class="accordion-group" data-dcnode-id="102"><div class="accordion-heading" data-dcnode-id="136"><a class="accordion-toggle" data-dcnode-id="137" data-toggle="collapse" href="#collapse1-4"><span data-dcnode-id="138" instrument_node="">Hawaii Teacher Performance Standards</span></a></div><div class="accordion-body collapse" data-dcnode-id="103" id="collapse1-4"><div class="accordion-inner" data-dcnode-id="104"><p data-dcnode-id="133"><strong data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">InTASC Model Core Teaching Standards</span></strong></p><span data-dcnode-id="132" instrument_node="">
</span><p data-dcnode-id="129"><strong data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">Standard #1 : Learner Development</span></strong></p><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">1(a) The teacher regularly assesses individual and group performance in order to design and modify instruction to meet learners’ needs in each area of development (cognitive, linguistic, social, emotional, and physical) and scaffolds the next level of development.</span></p><span data-dcnode-id="125" instrument_node="">
</span><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">1(e) The teacher understands that each learner’s cognitive, linguistic, social, emotional, and physical development influences learning and knows how to make instructional decisions that build on learners’ strengths and needs.</span></p><span data-dcnode-id="122" instrument_node="">
</span><p data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">1(g) The teacher understands the role of language and culture in learning and knows how to modify instruction to make language comprehensible and instruction relevant, accessible, and challenging.</span></p><span data-dcnode-id="119" instrument_node="">
</span><p data-dcnode-id="116"><strong data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">Standard #2: Learning Differences</span></strong></p><span data-dcnode-id="115" instrument_node="">
</span><p data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">2(o) The teacher values diverse languages and dialects and seeks to integrate them into his/her instructional practice to engage students in learning.</span></p><span data-dcnode-id="112" instrument_node="">
</span><p data-dcnode-id="109"><strong data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">Standard #8: Instructional Strategies</span></strong></p><span data-dcnode-id="108" instrument_node="">
</span><p data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">8(k) The teacher knows how to apply a range of developmentally, culturally, and linguistically appropriate instructional strategies to achieve learning goals.</span></p><span data-dcnode-id="105" instrument_node="">
</span></div></div></div><div class="accordion-group" data-dcnode-id="81"><div class="accordion-heading" data-dcnode-id="99"><a class="accordion-toggle" data-dcnode-id="100" data-toggle="collapse" href="#collapse2-4"><span data-dcnode-id="101" instrument_node="">Resources</span></a></div><div class="accordion-body collapse" data-dcnode-id="82" id="collapse2-4"><div class="accordion-inner" data-dcnode-id="83"><p data-dcnode-id="95"><span data-dcnode-id="98" instrument_node="">1. “Steps Toward Learning: A Guide to Overcoming Language Barriers in Children’s Education” at </span><a data-dcnode-id="96" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savethechildren.org.uk/content/dam/global/reports/steps-towards-learning-lr.pdf"><span data-dcnode-id="97" instrument_node="">https://www.savethechildren.org.uk/content/dam/global/reports/steps-towards-learning-lr.pdf</span></a></p><span data-dcnode-id="94" instrument_node="">
</span><p data-dcnode-id="90"><span data-dcnode-id="93" instrument_node="">2. Tolerance.org for a video of an elementary school teacher, Diane Holtam, talk about how her school welcomed a sudden influx of Korean families into the school community: </span><a data-dcnode-id="91" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tolerance.org/professional-development/family-engagement%3Fttnewslette_%2528%253Ca_style%3D"><span data-dcnode-id="92" instrument_node="">https://www.tolerance.org/professional-development/family-engagement?ttnewslette_%28%3Ca_style=</span></a></p><span data-dcnode-id="89" instrument_node="">
</span><p data-dcnode-id="85"><span data-dcnode-id="88" instrument_node="">3. “Overcome the Language Barrier” at </span><a data-dcnode-id="86" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ptotoday.com/pto-today-articles/article/261-overcome-the-language-barrier"><span data-dcnode-id="87" instrument_node="">http://www.ptotoday.com/pto-today-articles/article/261-overcome-the-language-barrier</span></a></p><span data-dcnode-id="84" instrument_node="">
