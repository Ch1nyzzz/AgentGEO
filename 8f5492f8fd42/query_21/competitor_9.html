</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Breaking Down Cultural Barriers in Healthcare</span></h2><span data-dcnode-id="981" instrument_node=""> </span></div><span data-dcnode-id="979" instrument_node="">
</span></div><span data-dcnode-id="977" instrument_node="">

</span><div class="elementor-container elementor-column-gap-no" data-dcnode-id="920"><span data-dcnode-id="963" instrument_node="">

</span><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-7480ed3" data-dcnode-id="924" data-element_type="column" data-id="7480ed3"><span data-dcnode-id="961" instrument_node="">
</span><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="926"><span data-dcnode-id="960" instrument_node="">

</span><div class="elementor-element elementor-element-862da06 elementor-widget elementor-widget-theme-post-content" data-dcnode-id="930" data-element_type="widget" data-id="862da06" data-widget_type="theme-post-content.default"><span data-dcnode-id="958" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="932"><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">When traveling to other countries unlike your own, you know how important it is to study and understand their cultures ; in many cases, committing a cultural faux pas will be met with contempt and offense. For instance, it is illegal to chew gum in Singapore, so, after enjoying one of Singapore’s many signature dishes, opt for the mint instead. When shaking hands in Fiji, be prepared to hold hands with your new acquaintance for the entire duration of your conversation, and whatever you do, do not insult the king of Thailand, even in jest, unless you want to spend some serious time behind bars!</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">When traveling to different countries, adapting to their cultures and customs is expected, but what happens when you experience cultural barriers within your own country?</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">This is an issue that’s been affecting the world of healthcare for years because, when it comes to healthcare, cause, treatment, and even the definition of a “doctor” varies from culture to culture. In Vietnamese culture, for example, it is believed that hot and cold poles control bodily functions and that health is achieved when these poles are at harmony. And when making decisions with the family of an Asian/Pacific Islander patient, oftentimes, the oldest male is considered to be the spokesperson. And then, of course, within each culture, there are subcultures to understand, each of which might contain fundamental cultural differences.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">It is incorrect, and unfair, to work under the assumption that other cultures might simply comply with all mainstream healthcare values. Doing so can lead to confusion, miscommunication, and, worse, mistrust, only further aggravating the cultural barrier.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">To break cultural barriers and open the lines of communication, some healthcare organizations have been working to attract individuals from a more diverse range of ethnicities and economical backgrounds. In doing so, they hope to better understand and serve their patients, by better understanding differing cultures, values, and perspectives. All cultures have unique ways of practicing healthcare, and it’s important that healthcare leaders are properly equipped to best serve their patients’ social, cultural, and linguistic needs.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">As a healthcare leader, by familiarizing yourself with your patients’ cultures and national backgrounds, paying close attention to their body language, and recognizing their emotions, you will be able to provide them the best service possible.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">At Coors Healthcare Solutions, we are a diverse team, dedicated to offering our clients unparalleled customer service and custom solutions to meet their own unique needs. When it comes to physician placement, our clients’ needs are at the center of everything we do. When interim leaders are matched to the appropriate team, stronger leaders are built, and with that, comes stronger teams and a stronger healthcare system.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Our recruitment philosophy is about building synergistic, high functioning teams. We can build you a team that will drive success for you and your organization. Our interim services can bridge any gaps your team may be experiencing to avoid dysfunction. Let us partner with you to create the ideal team.</span></p><span data-dcnode-id="933" instrument_node="">
</span></div><span data-dcnode-id="931" instrument_node="">
</span></div><span data-dcnode-id="929" instrument_node="">
</span></div><span data-dcnode-id="927" instrument_node="">
</span></div><span data-dcnode-id="925" instrument_node="">
</span></div><span data-dcnode-id="923" instrument_node="">
</span></div><span data-dcnode-id="921" instrument_node="">

</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Susan Leys is a healthcare consultant who combines her skills of process improvement, program development, coaching, and training in healthcare to assist professionals and teams with developing the critical interpersonal strategies necessary to work compassionately and collaboratively within fast-paced, acute healthcare environments.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">In addition to assisting healthcare organizations with the retention of clinical teams during her 30-year career in healthcare, Susan has developed 25 programs in inpatient and outpatient settings in behavioral health, crisis management, and traumatic stress. She has trained hundreds of professionals and presented in grand rounds, conferences, and community and government organizations.</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Susan’s passion is consulting, coaching, and training the healthcare professionals and teams who care for all of us and seeing results in the collaboration and cohesiveness of top-notch teams providing compassionate and empathic care for the patients and families they serve. She has her Master’s degree in Counseling Psychology, two Graduate Certificates in High-Performance Leadership, and The Business of Medicine and is a John Maxwell Certified coach.</span></p><span data-dcnode-id="478" instrument_node="">

</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Chris Engles has over forty years of business experience, numerous leadership positions, and recruiting high quality individuals. Chris retired from the Navy in 2013 after thirty-two years of active service. During his years of service, he was responsible for recruiting, managing, and leading groups of people from five to over eighty-five thousand. Chris formed groups of people into cohesive organizations that not only complete but exceeded all mission assignments and expectations. Leading a Nuclear-powered aircraft carrier on deployment with over sixty aircraft was his high mark at sea and leading eighty-five thousand people on seventy-two Naval facilities around the world was his final assignment in the Navy. Chris has three years international experience with private industry in educating and implementation of personnel throughout Europe and Africa on leadership, process improvement, and risk mitigation. Throughout his career he has been known as the person who can not only do but can educate others. For the last year Chris has been working with COORS Leadership Capitol as a consultant focusing on recruiting and leadership training. Chris is committed to the Mission, Vision and Values of COORS Leadership Capital.</span></p><span data-dcnode-id="310" instrument_node="">

</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Today, she has established herself as one of the top Search Consultants in the recruiting industry and has expanded her services to include leadership development training, executive coaching, and board education. In 1999, Cheryl founded COORS to bring the highest standard of professionalism, integrity, and personalized service to the healthcare search industry. She has successfully placed over 500 professionals at varying levels and transformed numerous organizations.</span></p><span data-dcnode-id="292" instrument_node="">
