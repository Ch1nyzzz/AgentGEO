            <template shadowrootmode="closed"><html data-dcnode-id="1" dir="ltr" lang="en-gb" slick-uniqueid="3"><head data-dcnode-id="1233"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1.0" data-dcnode-id="1286" name="viewport"><meta charset="utf-8" data-dcnode-id="1285"><meta content="Cross Cultural Communications" data-dcnode-id="1283" property="og:title"><meta content="Why You Should Attend This Course
&nbsp;
In this workshop, we will discuss and understand how a multicultural organization with a strong regional presence, intercultural awareness and partnerships are vital to their growth and success. 

Identify performance gaps and maximize growth potential
Enhance cooperation, team working and sharing
Understand the perception gap regarding the Group values
Increase awareness of differences to strengthen the similarities
Create a strong commitment of people to change behaviors &amp; practices
Have fun while embracing multiculturalism as part the Group’s dynamics

&nbsp;
Learning Outcomes
&nbsp;
After attending this workshop participants will be able to:

Work effectively and productively in a multicultural context.
Develop a global mindset along global competencies. 
Adopt skills, techniques, attitudes and behaviours to provide an atmosphere of trust, respect and supportive communication between colleagues and clients.
Consciously practise the global skill-set which is not only nice to know but necessary in today's multicultural environments.
Discover the specifics of relevant cultures, in order to achieve communication excellence.

&nbsp;
Course Outline
Module One: Creating the Context for the Programme


Workshop Outline

Learning Needs
Course Objectives
Conscious Awareness&nbsp;

Module Two: Understanding Culture
In this module, we will discuss and understand how cultures are defined and how they are established based on observable and non-observable behaviours. We will learn the four cross-cultural concepts and the specific cultural differences of the different countries you deal with in business. The topics included are:


Definition of culture

Components and levels of culture

Norms, Values and basic assumptions
Observable vs non-observable behaviors



&nbsp;
Module Three: Dimensions of Culture
&nbsp;
&nbsp;
In this module we will discuss specific theories and experiences that impact and influence cultures and their practices. Topics will include:

Particularism Vs Universalism
High Power distance Vs. Low Power Distance
Uncertainty Vs. Certainty
Polychronic Vs. Monochronic
Low Context Vs. High Context Cultures
Empathy Vs. Ethnocentrism



Module Four: Understanding Yourself and Your Communication Style
&nbsp;
Through a communication analysis questionnaire, the participants will discover: 


Individual personality profile

The different types of communication styles
Their own communication style
How to adapt communication styles to suit different people and cultures


Module Five: Working with Specific Cultures 
&nbsp;
A practical session which will focus on cultural practices and how we communicate and provide excellent service, focusing on commonalities and by understanding the differences to achieve win-win outcomes across borders such as:

Europe vs. USA

Overview
Meeting &amp; Greetings
Dressing &amp; Traditional Attire
Non-Verbal Communication
Dining Etiquette: American vs. Continental
Gift Giving Etiquette
Common phrases 
Things to Remember

Other countries that will be covered in depth: 
&nbsp;
Japan, Middle East (KSA), China, and India
Methodology: Presentation, discussion and role play

Countries that will be covered in the form of case studies: 
Europe countries, Great Britain, Australia and New Zealand
South Korea, Malaysia and Indonesia 
Methodology: Presentation &amp; discussion 
&nbsp;
Module Six: Conclusion


Appendix - Working in a Multi-cultural Environment 


Takeaways


Action Plan


Methodology: Discussion and learning journal
&nbsp;
&nbsp;
&nbsp;
Target Audience:
&nbsp;
Maximum 15 participants 
The maximum class size is intended to provide time for each participant to assimilate the concepts covered. Also to discover and find clarity about personal behaviours they need to work on and how to develop a clear and measurable plan for personal progress
&nbsp;

Trainer Profile:
(Course will be conducted by&nbsp;one of the following trainers)
Shirley Han is a Senior Consultant in Personal Empowerment courses. These include courses in Presentation Skills, Professional/Corporate Image, Grooming and Deportment, Interpersonal Communication, Conflict Management, Time Management, Customer Service and Telephone Etiquette. She is also a trainer in Singapore Airlines for their Cabin Crew and Ground Personnel in Etiquette &amp; Deportment, Effective Communication and Professional Imaging.
Besides being a trainer, Shirley’s overall experience covers other areas of marketing and communication. This includes Business Development, Advertising &amp; Public Relations, Marketing &amp; Communications, Client Management, and Event Management. Specialising in the lifestyle and service industry, she works in the capacity of a Creative Director, Copywriter and Art Director. This includes press liaison, scriptwriting for television commercials, corporate videos, and CDRoms.
Shirley has a Bachelor of Arts Degree in Economics, Sociology and Philosophy from the National University of Singapore. She studied Neuro-Linguistic Programming with the Master Trainer Institute of New York. Serving multinationals and statutory boards on both local and regional levels, her client list cover various industries, including:


Banking and Finance – AIA, Citibank, Credit Swiss First Boston, MAS, KPMG, UOB, UBS


Education – NUS, Nanyang Business School, Jurong Institute, MIS, Ong Teng Cheong Institute of Labour Studies, Nanyang Girls’ Secondary School


Government Institutions – NorthEast &amp; SouthEast Community Development Councils, HDB, Ministry of Environment, LTA, SMRT


Lifestyle – Cartier International, Lancome Cosmetics, Readers’ Digest, Glamour Shots


Manufacturing/Logistics – TIMKEN, SANDEN, Singapore Technology Logistics


Medical – Baxter Healthcare, Pfizer, SGH


Trade/Property – Temasek Holdings, Sumitomo Trading Corporation, Diethelm, Unilever


Travel – Singapore Airlines, Singapore Changi Airport Services Enterprise, Aerospace Training Center, United Airlines


Technology – National Computer Services, Singapore Technology College, Defense Science Organization, Hewlett Packard


&nbsp;
Parul Sandhu Chopra is an enthusiastic, engaging and articulate Corporate Trainer, Coach and Consultant with over 10 years of experience within the Marine, Education and Corporate sectors. Working with companies such as Singapore Airlines, Aon and Pfizer, she uses her knowledge of Strengths Theory, Emotional Intelligence and Positive Psychology to engage and empower her participants to excel in their roles. 
Having grown up in India, Hong-Kong and Singapore, Parul is a very ‘culturally-competent’ Trainer. She has incorporated a unique style of delivery, leveraging on her diverse multicultural exposure, to effectively deliver workshops such as: 
‘Effective Presentation Skills’, ‘Professional Branding &amp; Grooming’, ‘Etiquette &amp; Deportment’, ‘Emotional Intelligence’, ‘Business Networking’, ‘Personal Assertiveness’ as well as ‘Effective Communication Skills’. 
Academically, Parul studied at Canadian International School (Singapore) before pursuing an Honors degree in Psychology from the University of Toronto (Canada) in 2005. She later went on to attain a Post-Graduate Diploma in Human Resources and Talent Management from Singapore Human Resource Institute in 2011. Educated in Human Psychology studies, Parul better understands that the emotional fabric in Human Resources is what forms the base for all relationships, behavior and change, in the workplace. A happy and safe work environment is the key to increasing productivity, service quality and retention which ultimately leads to more productive and engaged workforce. 
&nbsp;
Parul’s Experience:


Aon Service Corporation A.T.Kearney Bohler Pacific Pte Ltd Fuji Oil 


Jebsen &amp; Jessen (SEA) 


Ministry of Education- Schools 


Nanyang Technological University (NTU) 


Singapore Airlines (SIA) 


Singapore University of Technology and Design (SUTD) 


SP Jain School of Global Management 


Surbana Jurong Pfizer Asia Manufacturing PL 




&nbsp;

utline</span></span></strong></p><p data-dcnode-id="785"><span data-dcnode-id="786" style="font-size: 12pt;"><strong data-dcnode-id="787"><span data-dcnode-id="788" style="font-family: 'Arial','sans-serif';"><span data-dcnode-id="789" instrument_node="">Module One: Creating the Context for the Programme</span></span></strong></span></p><ul data-dcnode-id="762" style="list-style-type: disc; direction: ltr;"><span data-dcnode-id="784" instrument_node=""> </span><li data-dcnode-id="780" style="font-style: normal; font-weight: normal;"><p data-dcnode-id="781" style="text-align: justify; line-height: normal; font-style: normal; font-weight: normal; margin-top: 0cm; margin-bottom: 0pt;"><span data-dcnode-id="782" style="font-family: 'Arial','sans-serif';"><span data-dcnode-id="783" instrument_node="">Workshop Outline</span></span></p></li><span data-dcnode-id="779" instrument_node=""> </span><li data-dcnode-id="776"><span data-dcnode-id="777" style="font-family: 'Arial','sans-serif';"><span data-dcnode-id="778" instrument_node="">Learning Needs</span></span></li><span data-dcnode-id="775" instrument_node=""> </span><li data-dcnode-id="771"><span data-dcnode-id="772" style="font-family: 'Arial','sans-serif';"><span data-dcnode-id="773" style="font-family: 'Arial','sans-serif';"><span data-dcnode-id="774" instrument_node="">Course Objectives</span></span></span></li><span data-dcnode-id="770" instrument_node=""> </span><li data-dcnode-id="764"><span data-dcnode-id="766" style="font-family: 'Arial','sans-serif';"><span data-dcnode-id="767" style="font-family: 'Arial','sans-serif';"><span data-dcnode-id="768" style="font-family: 'Arial','sans-serif';"><span data-dcnode-id="769" instrument_node="">Conscious Awareness</span></span></span></span><span data-dcnode-id="765" instrument_node="">&nbsp;</span></li><span data-dcnode-id="763" instrument_node=""> </span></ul><h4 data-dcnode-id="757"><span data-dcnode-id="758" style="font-size: 12pt;"><strong data-dcnode-id="759"><span da e, Grooming and Deportment, Interpersonal Communication, Conflict Management, Time Management, Customer Service and Telephone Etiquette. She is also a trainer in Singapore Airlines for their Cabin Crew and Ground Personnel in Etiquette &amp; Deportment, Effective Communication and Professional Imaging.</span></span></p><p data-dcnode-id="476"><span data-dcnode-id="477" style="font-family: 'Arial','sans-serif'; font-size: 12pt;"><span data-dcnode-id="478" instrument_node="">Besides being a trainer, Shirley’s overall experience covers other areas of marketing and communication. This includes Business Development, Advertising &amp; Public Relations, Marketing &amp; Communications, Client Management, and Event Management. Specialising in the lifestyle and service industry, she works in the capacity of a Creative Director, Copywriter and Art Director. This includes press liaison, scriptwriting for television commercials, corporate videos, and CDRoms.</span></span></p><p data-dcnode-id="472"><span data-dcnode-id="473" style="font-family: 'Arial','sans-serif'; font-size: 12pt;"><span data-dcnode-id="474" style="font-family: 'Arial','sans-serif'; font-size: 12pt;"><span data-dcnode-id="475" instrument_node="">Shirley has a Bachelor of Arts Degree in Economics, Sociology and Philosophy from the National University of Singapore. She studied Neuro-Linguistic Programming with the Master Trainer Institute of New York. Serving multinationals and statutory boards on both local and regional levels, her client list cover various industries, including:</span></span></span></p><ul data-dcnode-id="379" style="list-style-type: disc; direction: ltr;"><span data-dcnode-id="471" instrument_node=""> </span><li data-dcnode-id="467" style="font-style: normal; font-weight: normal;"><p data-dcnode-id="468" style="text-align: justify; line-height: normal; font-style: normal; font-weight: normal; margin-top: 0cm; margin-bottom: 10pt;"><span data-dcnode-id="469" style="font-family: 'Arial','sans-s
