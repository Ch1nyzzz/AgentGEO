</span><h2 data-dcnode-id="3711"><span class="mw-headline" data-dcnode-id="3719" id="Origins_and_culture"><span data-dcnode-id="3720" instrument_node="">Origins and culture</span></span><span class="mw-editsection" data-dcnode-id="3712"><span class="mw-editsection-bracket" data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">[</span></span><a data-dcnode-id="3715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D1" title="Edit section: Origins and culture"><span data-dcnode-id="3716" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3710" instrument_node="">
</span><p data-dcnode-id="3651"><span data-dcnode-id="3709" instrument_node="">During the </span><a data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="3708" instrument_node="">Cold War</span></a><span data-dcnode-id="3706" instrument_node="">, the economy of the United States was largely self-contained because the world was polarized into two separate and competing powers: the </span><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="3705" instrument_node="">East</span></a><span data-dcnode-id="3703" instrument_node=""> and the </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Bloc" title="Western Bloc"><span data-dcnode-id="3702" instrument_node="">West</span></a><span data-dcnode-id="3700" instrument_node="">. However, changes and advancements in economic relationships, political systems, and technological options began to break down old cultural barriers. Business transformed from individual-country capitalism to </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization%23Modern" title="Globalization"><span data-dcnode-id="3699" instrument_node="">global capitalism</span></a><span data-dcnode-id="3697" instrument_node="">. Thus, the study of cross-cultural communication was originally found within businesses and government, both seeking to expand globally. Businesses began to offer </span><a data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Language_education" title="Language education"><span data-dcnode-id="3696" instrument_node="">language training</span></a><span data-dcnode-id="3694" instrument_node=""> to their employees and programs were developed to train employees to understand how to act when abroad.  With this also came the development of the </span><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_Service_Institute" title="Foreign Service Institute"><span data-dcnode-id="3693" instrument_node="">Foreign Service Institute</span></a><span data-dcnode-id="3691" instrument_node="">, or FSI, through the </span><a class="mw-redirect" data-dcnode-id="3689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_Service_Act" title="Foreign Service Act"><span data-dcnode-id="3690" instrument_node="">Foreign Service Act</span></a><span data-dcnode-id="3688" instrument_node=""> of 1946, where government employees received training and prepared for overseas posts.</span><sup class="reference" data-dcnode-id="3685" id="cite_ref-2"><a data-dcnode-id="3686" href="#cite_note-2"><span data-dcnode-id="3687" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3684" instrument_node=""> There began also implementation of a "</span><a class="mw-redirect" data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_view" title="World view"><span data-dcnode-id="3683" instrument_node="">world view</span></a><span data-dcnode-id="3681" instrument_node="">" perspective in the curriculum of higher education.</span><sup class="reference" data-dcnode-id="3678" id="cite_ref-3"><a data-dcnode-id="3679" href="#cite_note-3"><span data-dcnode-id="3680" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3677" instrument_node="">
In 1974, the </span><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Progress_Organization" title="International Progress Organization"><span data-dcnode-id="3676" instrument_node="">International Progress Organization</span></a><span data-dcnode-id="3674" instrument_node="">, with the support of </span><a data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO" title="UNESCO"><span data-dcnode-id="3673" instrument_node="">UNESCO</span></a><span data-dcnode-id="3671" instrument_node=""> and under the auspices of </span><a data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senegal" title="Senegal"><span data-dcnode-id="3670" instrument_node="">Senegalese</span></a><span data-dcnode-id="3668" instrument_node=""> President </span><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%25C3%25A9opold_S%25C3%25A9dar_Senghor" title="Léopold Sédar Senghor"><span data-dcnode-id="3667" instrument_node="">Léopold Sédar Senghor</span></a><span data-dcnode-id="3665" instrument_node="">, held an international conference on "The Cultural Self-comprehension of Nations" (</span><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Innsbruck" title="Innsbruck"><span data-dcnode-id="3664" instrument_node="">Innsbruck</span></a><span data-dcnode-id="3662" instrument_node="">, </span><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria" title="Austria"><span data-dcnode-id="3661" instrument_node="">Austria</span></a><span data-dcnode-id="3659" instrument_node="">, 27–29 July 1974) which called upon </span><a data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="3658" instrument_node="">United Nations</span></a><span data-dcnode-id="3656" instrument_node=""> member states "to organize systematic and global comparative research on the different cultures of the world" and "to make all possible efforts for a more intensive training of diplomats in the field of international cultural co-operation ... and to develop the cultural aspects of their foreign policy."</span><sup class="reference" data-dcnode-id="3653" id="cite_ref-4"><a data-dcnode-id="3654" href="#cite_note-4"><span data-dcnode-id="3655" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3652" instrument_node="">
</span></p><p data-dcnode-id="3641"><span data-dcnode-id="3650" instrument_node="">There has become an increasing pressure for universities across the world to incorporate intercultural and international understanding and knowledge into the education of their students.</span><sup class="reference" data-dcnode-id="3647" id="cite_ref-5"><a data-dcnode-id="3648" href="#cite_note-5"><span data-dcnode-id="3649" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3646" instrument_node=""> International literacy and cross-cultural understanding have become critical to a country's cultural, technological, economic, and political health. It has become essential for universities to educate, or more importantly, "transform", to function effectively and comfortably in a world characterized by close, multi-faceted relationships and permeable borders. Students must possess a certain level of global competence to understand the world they live in and how they fit into this world. This level of global competence starts at ground level- the university and its faculty- with how they generate and transmit cross-cultural knowledge and information to students.</span><sup class="reference" data-dcnode-id="3643" id="cite_ref-Bartell,_M._2003_6-0"><a data-dcnode-id="3644" href="#cite_note-Bartell,_M._2003-6"><span data-dcnode-id="3645" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3642" instrument_node="">
</span></p><span data-dcnode-id="3640" instrument_node="">
</span><h2 data-dcnode-id="3630"><span class="mw-headline" data-dcnode-id="3638" id="Interdisciplinary_orientation"><span data-dcnode-id="3639" instrument_node="">Interdisciplinary orientation</span></span><span class="mw-editsection" data-dcnode-id="3631"><span class="mw-editsection-bracket" data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">[</span></span><a data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D2" title="Edit section: Interdisciplinary orientation"><span data-dcnode-id="3635" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3629" instrument_node="">
</span><p data-dcnode-id="3624"><span data-dcnode-id="3628" instrument_node="">Cross-cultural communication endeavors to bring together the relatively unrelated fields of </span><a data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_anthropology" title="Cultural anthropology"><span data-dcnode-id="3627" instrument_node="">cultural anthropology</span></a><span data-dcnode-id="3625" instrument_node=""> with established areas of communication. At its core, cross-cultural communication involves understanding the ways in which culturally distinct individuals communicate with each other. Its charge is to also produce some guidelines with which people from different cultures can better communicate with each other.
</span></p><p data-dcnode-id="3610"><span data-dcnode-id="3623" instrument_node="">Cross-cultural communication requires an interdisciplinary approach. It involves literacy in fields such as </span><a data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthropology" title="Anthropology"><span data-dcnode-id="3622" instrument_node="">anthropology</span></a><span data-dcnode-id="3620" instrument_node="">, </span><a data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_studies" title="Cultural studies"><span data-dcnode-id="3619" instrument_node="">cultural studies</span></a><span data-dcnode-id="3617" instrument_node="">, </span><a data-dcnode-id="3615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychology" title="Psychology"><span data-dcnode-id="3616" instrument_node="">psychology</span></a><span data-dcnode-id="3614" instrument_node=""> and communication. The field has also moved both toward the treatment of interethnic relations, and toward the study of communication strategies used by </span><a class="new" data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCo-cultural_populations%26action%3Dedit%26redlink%3D1" title="Co-cultural populations (page does not exist)"><span data-dcnode-id="3613" instrument_node="">co-cultural populations</span></a><span data-dcnode-id="3611" instrument_node="">, i.e., communication strategies used to deal with majority or mainstream populations.
</span></p><p data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">The study of languages other than one's own can serve not only to help one understand what we as humans have in common, but also to assist in the understanding of the diversity which underlines our languages' methods of constructing and organizing knowledge. Such understanding has profound implications with respect to developing a critical awareness of social relationships. Understanding social relationships and the way other cultures work is the groundwork of successful globalization business affairs.
</span></p><p data-dcnode-id="3574"><span data-dcnode-id="3607" instrument_node="">Language socialization can be broadly defined as "an investigation of how language both presupposes and creates anew, social relations in cultural context".</span><sup class="reference" data-dcnode-id="3604" id="cite_ref-Rymes_7-0"><a data-dcnode-id="3605" href="#cite_note-Rymes-7"><span data-dcnode-id="3606" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3603" instrument_node=""> It is imperative that the speaker understands the grammar of a language, as well as how elements of language are socially situated in order to reach communicative competence. Human experience is culturally relevant, so elements of language are also culturally relevant.</span><sup class="reference" data-dcnode-id="3600" id="cite_ref-Rymes_7-1"><a data-dcnode-id="3601" href="#cite_note-Rymes-7"><span data-dcnode-id="3602" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3597"><span data-dcnode-id="3598" title="Page / location: 3"><span data-dcnode-id="3599" instrument_node="">: 3 </span></span></sup><span data-dcnode-id="3596" instrument_node="">  One must carefully consider semiotics and the evaluation of sign systems to compare cross-cultural norms of communication.</span><sup class="reference" data-dcnode-id="3593" id="cite_ref-Rymes_7-2"><a data-dcnode-id="3594" href="#cite_note-Rymes-7"><span data-dcnode-id="3595" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3590"><span data-dcnode-id="3591" title="Page / location: 4"><span data-dcnode-id="3592" instrument_node="">: 4 </span></span></sup><span data-dcnode-id="3589" instrument_node=""> There are several potential problems that come with language socialization, however. Sometimes people can over-generalize or label cultures with stereotypical and subjective characterizations. Another primary concern with documenting alternative cultural norms revolves around the fact that no social actor uses language in ways that perfectly match normative characterizations.</span><sup class="reference" data-dcnode-id="3586" id="cite_ref-Rymes_7-3"><a data-dcnode-id="3587" href="#cite_note-Rymes-7"><span data-dcnode-id="3588" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3583"><span data-dcnode-id="3584" title="Page / location: 8"><span data-dcnode-id="3585" instrument_node="">: 8 </span></span></sup><span data-dcnode-id="3582" instrument_node=""> A methodology for investigating how an individual uses language and other semiotic activity to create and use new models of conduct and how this varies from the cultural norm should be incorporated into the study of language socialization.</span><sup class="reference" data-dcnode-id="3579" id="cite_ref-Rymes_7-4"><a data-dcnode-id="3580" href="#cite_note-Rymes-7"><span data-dcnode-id="3581" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3576"><span data-dcnode-id="3577" title="Page / location: 11, 12"><span data-dcnode-id="3578" instrument_node="">: 11, 12 </span></span></sup><span data-dcnode-id="3575" instrument_node="">
</span></p><span data-dcnode-id="3573" instrument_node="">
</span><h2 data-dcnode-id="3563"><span class="mw-headline" data-dcnode-id="3571" id="Global_rise"><span data-dcnode-id="3572" instrument_node="">Global rise</span></span><span class="mw-editsection" data-dcnode-id="3564"><span class="mw-editsection-bracket" data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">[</span></span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D3" title="Edit section: Global rise"><span data-dcnode-id="3568" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3562" instrument_node="">
</span><p data-dcnode-id="3538"><span data-dcnode-id="3561" instrument_node="">With increasing </span><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="3560" instrument_node="">globalization</span></a><span data-dcnode-id="3558" instrument_node=""> and international trade, it is unavoidable that different cultures will meet, conflict, and blend together. People from different culture find it is difficult to communicate not only due to language barriers, but also are affected by culture styles.</span><sup class="reference" data-dcnode-id="3555" id="cite_ref-CC_8-0"><a data-dcnode-id="3556" href="#cite_note-CC-8"><span data-dcnode-id="3557" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3554" instrument_node=""> For instance, in </span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Individualistic_culture" title="Individualistic culture"><span data-dcnode-id="3553" instrument_node="">individualistic cultures</span></a><span data-dcnode-id="3551" instrument_node="">, such as in the United States, Canada, and Western Europe, an independent figure or self is dominant. This independent figure is characterized by a sense of self relatively distinct from others and the environment. In </span><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-enhancement%23Culture" title="Self-enhancement"><span data-dcnode-id="3550" instrument_node="">interdependent cultures</span></a><span data-dcnode-id="3548" instrument_node="">, usually identified as Asian, Latin American, African, and Southern European cultures, an interdependent figure of self is dominant. There is a much greater emphasis on the interrelatedness of the individual to others and the environment; the self is meaningful only (or primarily) in the context of social relationships, duties, and roles. In some degree, the effect brought by cultural difference override the language gap. This culture style difference contributes to one of the biggest challenges for cross-culture communication. Effective communication with people of different cultures is especially challenging. Cultures provide people with ways of thinking—ways of seeing, hearing, and interpreting the world. Thus the same words can mean different things to people from different cultures, even when they speak the "same" language. When the languages are different, and translation has to be used to communicate, the potential for misunderstandings increases. The study of cross-cultural communication is a global research area.  As a result, cultural differences in the </span><i data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">study</span></i><span data-dcnode-id="3545" instrument_node=""> of cross-cultural communication can already be found.  For example, cross-cultural communication is generally considered part of </span><a data-dcnode-id="3543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communication_studies" title="Communication studies"><span data-dcnode-id="3544" instrument_node="">communication studies</span></a><span data-dcnode-id="3542" instrument_node=""> in the US, but is emerging as a sub-field of </span><a data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Applied_linguistics" title="Applied linguistics"><span data-dcnode-id="3541" instrument_node="">applied linguistics</span></a><span data-dcnode-id="3539" instrument_node=""> in the UK.
</span></p><span data-dcnode-id="3537" instrument_node="">
</span><h2 data-dcnode-id="3527"><span class="mw-headline" data-dcnode-id="3535" id="Cross-cultural_communications_in_the_workplace"><span data-dcnode-id="3536" instrument_node="">Cross-cultural communications in the workplace</span></span><span class="mw-editsection" data-dcnode-id="3528"><span class="mw-editsection-bracket" data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">[</span></span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D4" title="Edit section: Cross-cultural communications in the workplace"><span data-dcnode-id="3532" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3526" instrument_node="">
</span><p data-dcnode-id="3498"><span data-dcnode-id="3525" instrument_node="">Corporations have grown into new countries, regions, and continents around the world, which has caused people of various cultures to move and learn to adapt to their environment. This has led to cross-cultural communication becoming more important in the work environment. Over the past few decades, many Western corporations have expanded into </span><a data-dcnode-id="3523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sub-Saharan_Africa" title="Sub-Saharan Africa"><span data-dcnode-id="3524" instrument_node="">Sub-Saharan Africa</span></a><span data-dcnode-id="3522" instrument_node="">. James Baba Abugre conducted a study on western </span><a data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expatriate" title="Expatriate"><span data-dcnode-id="3521" instrument_node="">expatriates</span></a><span data-dcnode-id="3519" instrument_node=""> who have moved to work in </span><a data-dcnode-id="3517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghana" title="Ghana"><span data-dcnode-id="3518" instrument_node="">Ghana</span></a><span data-dcnode-id="3516" instrument_node="">. Abugre interviewed both the expatriates and Ghanaians, and found that </span><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_competence" title="Cultural competence"><span data-dcnode-id="3515" instrument_node="">cultural competence</span></a><span data-dcnode-id="3513" instrument_node=""> is essential to working with others of different cultures in order to avoid conflict between the Western and Eastern cultural norms. It is important that workers understand both verbal and non-verbal communication styles. Expatriates who move to work in a culture that is not their own should be prepared, be properly trained, and have access to educational resources to help them succeed and to appreciate the culture they have moved into, in order to navigate it effectively. Abugre's main finding is that cultural competency is important to cross-cultural communication.</span><sup class="reference" data-dcnode-id="3510" id="cite_ref-:12_9-0"><a data-dcnode-id="3511" href="#cite_note-:12-9"><span data-dcnode-id="3512" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3509" instrument_node=""> </span><a data-dcnode-id="3507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paula_Caligiuri" title="Paula Caligiuri"><span data-dcnode-id="3508" instrument_node="">Paula Caligiuri</span></a><span data-dcnode-id="3506" instrument_node=""> has proposed training of international workers in </span><a data-dcnode-id="3504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_agility" title="Cultural agility"><span data-dcnode-id="3505" instrument_node="">cultural agility</span></a><span data-dcnode-id="3503" instrument_node=""> techniques as a way to improve such communication.</span><sup class="reference" data-dcnode-id="3500" id="cite_ref-10"><a data-dcnode-id="3501" href="#cite_note-10"><span data-dcnode-id="3502" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3499" instrument_node="">
</span></p><p data-dcnode-id="3453"><span data-dcnode-id="3497" instrument_node="">Yaila Zotzmann, Dimitri van der Linden, and Knut Wyra looked at </span><a data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asia" title="Asia"><span data-dcnode-id="3496" instrument_node="">Asia</span></a><span data-dcnode-id="3494" instrument_node="">, </span><a data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="3493" instrument_node="">Europe</span></a><span data-dcnode-id="3491" instrument_node="">, and </span><a data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_America" title="North America"><span data-dcnode-id="3490" instrument_node="">North America</span></a><span data-dcnode-id="3488" instrument_node="">. Together they had a focus on employees in each continent with a focus on error orientation. The authors define this as "one's attitude toward dealing with, communicating about, and learning from errors". They studied employees from </span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="3487" instrument_node="">China</span></a><span data-dcnode-id="3485" instrument_node="">, </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="3484" instrument_node="">Germany</span></a><span data-dcnode-id="3482" instrument_node="">, </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungary" title="Hungary"><span data-dcnode-id="3481" instrument_node="">Hungary</span></a><span data-dcnode-id="3479" instrument_node="">, </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="3478" instrument_node="">Japan</span></a><span data-dcnode-id="3476" instrument_node="">, </span><a data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaysia" title="Malaysia"><span data-dcnode-id="3475" instrument_node="">Malaysia</span></a><span data-dcnode-id="3473" instrument_node="">, the </span><a data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="3472" instrument_node="">Netherlands</span></a><span data-dcnode-id="3470" instrument_node="">, the </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3469" instrument_node="">United States of America</span></a><span data-dcnode-id="3467" instrument_node="">, and </span><a data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam" title="Vietnam"><span data-dcnode-id="3466" instrument_node="">Vietnam</span></a><span data-dcnode-id="3464" instrument_node="">. Country differences, cultural values, and personality factors were also accounted for. The study was </span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quantitative_research" title="Quantitative research"><span data-dcnode-id="3463" instrument_node="">quantitave</span></a><span data-dcnode-id="3461" instrument_node=""> and looked at a single organization that had offices in eight countries. Results showed error orientation varied based on the culture they were in. Americans tend to be more open to errors and learn from them as well as speaking about their mistakes, whereas Japanese subjects had the lowest tolerance for errors. The Japanese showed concern about how it may impact those around them and the organization. The study also referred to </span><a data-dcnode-id="3459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hofstede%2527s_cultural_dimensions_theory" title="Hofstede's cultural dimensions theory"><span data-dcnode-id="3460" instrument_node="">Hofstede's cultural dimensions theory</span></a><span data-dcnode-id="3458" instrument_node="">. The findings show a potential relationship between error orientation and an employee's culture. Other important factors are the country they live in or personality dimensions.</span><sup class="reference" data-dcnode-id="3455" id="cite_ref-:10_11-0"><a data-dcnode-id="3456" href="#cite_note-:10-11"><span data-dcnode-id="3457" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3454" instrument_node="">
</span></p><p data-dcnode-id="3423"><span data-dcnode-id="3452" instrument_node="">Cross-cultural communications and boundaries are present in all sectors. In Europe, cross-cultural communication in primary care is important, for example in dealing with migrants in the present </span><a class="mw-redirect" data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_migrant_crisis" title="European migrant crisis"><span data-dcnode-id="3451" instrument_node="">European migrant crisis</span></a><span data-dcnode-id="3449" instrument_node="">. Maria van den Muijsenbergh conducted a study on primary care in Europe as well as a new program, RESTORE. The program stands for: "REsearch into implementation STrategies to support patients of different ORigins and language background in a variety of European primary care settings". The countries participating are </span><a data-dcnode-id="3447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ireland" title="Ireland"><span data-dcnode-id="3448" instrument_node="">Ireland</span></a><span data-dcnode-id="3446" instrument_node="">, </span><a data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/England" title="England"><span data-dcnode-id="3445" instrument_node="">England</span></a><span data-dcnode-id="3443" instrument_node="">, </span><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scotland" title="Scotland"><span data-dcnode-id="3442" instrument_node="">Scotland</span></a><span data-dcnode-id="3440" instrument_node="">, </span><a data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria" title="Austria"><span data-dcnode-id="3439" instrument_node="">Austria</span></a><span data-dcnode-id="3437" instrument_node="">, the </span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="3436" instrument_node="">Netherlands</span></a><span data-dcnode-id="3434" instrument_node="">, and </span><a data-dcnode-id="3432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greece" title="Greece"><span data-dcnode-id="3433" instrument_node="">Greece</span></a><span data-dcnode-id="3431" instrument_node="">. Muijsenbergh found in her study that there was a range of issues in primary care for migrants in Europe. There are both language and culture barriers between medical professionals and patients, which has an impact on their communication. The study also found that migrants were more likely to use </span><a class="mw-redirect" data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emergency_services" title="Emergency services"><span data-dcnode-id="3430" instrument_node="">emergency services</span></a><span data-dcnode-id="3428" instrument_node="">, which was consistent in countries with a steady influx of migrants or few migrants, and during times of economic prosperity or recession. Muijsenbergh found that migrants have worse health than native Europeans, with her findings suggesting that this is a result of the language and cultural barriers. She recommends medical professionals use different training and educational resources in order to become cross-cultural communicators.</span><sup class="reference" data-dcnode-id="3425" id="cite_ref-:11_12-0"><a data-dcnode-id="3426" href="#cite_note-:11-12"><span data-dcnode-id="3427" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3424" instrument_node="">
</span></p><span data-dcnode-id="3422" instrument_node="">
</span><h2 data-dcnode-id="3412"><span class="mw-headline" data-dcnode-id="3420" id="Incorporation_into_college_programs"><span data-dcnode-id="3421" instrument_node="">Incorporation into college programs</span></span><span class="mw-editsection" data-dcnode-id="3413"><span class="mw-editsection-bracket" data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">[</span></span><a data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D5" title="Edit section: Incorporation into college programs"><span data-dcnode-id="3417" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3411" instrument_node="">
</span><p data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">The application of cross-cultural communication theory to foreign language education is increasingly appreciated around the world. Cross-cultural communication classes can now be found within foreign language departments of some universities, while other schools are placing cross-cultural communication programs in their departments of education.
</span></p><p data-dcnode-id="3395"><span data-dcnode-id="3408" instrument_node="">With the increasing pressures and opportunities of globalization, the incorporation of international networking alliances has become an "essential mechanism for the internationalization of higher education".</span><sup class="reference" data-dcnode-id="3405" id="cite_ref-13"><a data-dcnode-id="3406" href="#cite_note-13"><span data-dcnode-id="3407" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3404" instrument_node=""> Many universities from around the world have taken great strides to increase intercultural understanding through processes of organizational change and innovations. In general, university processes revolve around four major dimensions which include: organizational change, curriculum innovation, staff development, and student mobility.</span><sup class="reference" data-dcnode-id="3401" id="cite_ref-14"><a data-dcnode-id="3402" href="#cite_note-14"><span data-dcnode-id="3403" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3400" instrument_node=""> Ellingboe emphasizes these four major dimensions with his own specifications for the internationalization process. His specifications include: (1) college leadership; (2) faculty members' international involvement in activities with colleagues, research sites, and institutions worldwide; (3) the availability, affordability, accessibility, and transferability of study abroad programs for students; (4) the presence and integration of international students, scholars, and visiting faculty into campus life; and (5) international co-curricular units (residence halls, conference planning centers, student unions, career centers, cultural immersion and language houses, student activities, and student organizations).</span><sup class="reference" data-dcnode-id="3397" id="cite_ref-Bartell,_M._2003_6-1"><a data-dcnode-id="3398" href="#cite_note-Bartell,_M._2003-6"><span data-dcnode-id="3399" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3396" instrument_node="">
</span></p><p data-dcnode-id="3381"><span data-dcnode-id="3394" instrument_node="">Above all, universities need to make sure that they are open and responsive to changes in the outside environment. In order for internationalization to be fully effective, the university (including all staff, students, curriculum, and activities) needs to be current with cultural changes, and willing to adapt to these changes.</span><sup class="reference" data-dcnode-id="3391" id="cite_ref-15"><a data-dcnode-id="3392" href="#cite_note-15"><span data-dcnode-id="3393" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3390" instrument_node=""> As stated by Ellingboe, internationalization "is an ongoing, future-oriented, multidimensional, interdisciplinary, leadership-driven vision that involves many stakeholders working to change the internal dynamics of an institution to respond and adapt appropriately to an increasingly diverse, globally focused, ever-changing external environment".</span><sup class="reference" data-dcnode-id="3387" id="cite_ref-16"><a data-dcnode-id="3388" href="#cite_note-16"><span data-dcnode-id="3389" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3386" instrument_node=""> New distance learning technologies, such as interactive teleconferencing, enable students located thousands of miles apart to communicate and interact in a virtual classroom.</span><sup class="reference" data-dcnode-id="3383" id="cite_ref-17"><a data-dcnode-id="3384" href="#cite_note-17"><span data-dcnode-id="3385" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3382" instrument_node="">
</span></p><p data-dcnode-id="3375"><span data-dcnode-id="3380" instrument_node="">Research has indicated that certain themes and images such as children, animals, life cycles, relationships, and sports can transcend cultural differences, and may be used in international settings such as traditional and online university classrooms to create common ground among diverse cultures (Van Hook, 2011).</span><sup class="reference" data-dcnode-id="3377" id="cite_ref-18"><a data-dcnode-id="3378" href="#cite_note-18"><span data-dcnode-id="3379" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3376" instrument_node="">
</span></p><p data-dcnode-id="3363"><span data-dcnode-id="3374" instrument_node="">Many </span><a data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Master_of_Science_in_Management" title="Master of Science in Management"><span data-dcnode-id="3373" instrument_node="">Master of Science in Management</span></a><span data-dcnode-id="3371" instrument_node=""> programs have an internationalization specialization which may place a focus on cross-cultural communication. For example, the </span><a data-dcnode-id="3369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ivey_Business_School" title="Ivey Business School"><span data-dcnode-id="3370" instrument_node="">Ivey Business School</span></a><span data-dcnode-id="3368" instrument_node=""> has a course titled Cross Cultural Management.</span><sup class="reference" data-dcnode-id="3365" id="cite_ref-19"><a data-dcnode-id="3366" href="#cite_note-19"><span data-dcnode-id="3367" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3364" instrument_node="">
</span></p><p data-dcnode-id="3357"><span data-dcnode-id="3362" instrument_node="">Jadranka Zlomislić, Ljerka Rados Gverijeri, and Elvira Bugaric study inter-cultural competency of students. As globalization progresses the world has become more interconnected, leading to job and study opportunities abroad in different countries and cultures, where the students are surrounded by a language that is not their mother tongue. Findings suggest that the internet is helpful but, not the answer; students should enroll in language and inter-cultural courses in order to fight stereotypes and develop inter-cultural competence and make them into better cross-cultural communicators.</span><sup class="reference" data-dcnode-id="3359" id="cite_ref-20"><a data-dcnode-id="3360" href="#cite_note-20"><span data-dcnode-id="3361" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3358" instrument_node="">
</span></p><p data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Cross-cultural communication gives opportunities to share ideas, experiences, and different perspectives and perception by interacting with local people.
</span></p><span data-dcnode-id="3354" instrument_node="">
</span><h2 data-dcnode-id="3344"><span class="mw-headline" data-dcnode-id="3352" id="Challenges_in_cross-language_qualitative_research"><span data-dcnode-id="3353" instrument_node="">Challenges in cross-language qualitative research</span></span><span class="mw-editsection" data-dcnode-id="3345"><span class="mw-editsection-bracket" data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">[</span></span><a data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D6" title="Edit section: Challenges in cross-language qualitative research"><span data-dcnode-id="3349" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3343" instrument_node="">
</span><p data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">Cross-language research refers to research involving two or more languages. Specifically, it can refer to: 1) researchers working with participants in a language that they are not fluent in, or; 2) researchers working with participants utilizing a language that is neither of their native languages, or;  3) translation of research or findings in another language, or;  4) researchers and participants speak the same language (not English). However, the research process and findings are directed to an English-speaking audience.
</span></p><p data-dcnode-id="3336"><span data-dcnode-id="3340" instrument_node="">Cross-language issues are of growing concern in research of all methodological forms, but they raise particular concerns for </span><a data-dcnode-id="3338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qualitative_research" title="Qualitative research"><span data-dcnode-id="3339" instrument_node="">qualitative research</span></a><span data-dcnode-id="3337" instrument_node="">. Qualitative researchers seek to develop a comprehensive understanding of human behavior, using inductive approaches to investigate the meanings people attribute to their behavior, actions, and interactions with others. In other words, qualitative researchers seek to gain insights into life experiences by exploring the depth, richness, and complexity inherent to human phenomenon. To gather data, qualitative researchers use direct observation and immersion, interviews, open-ended surveys, focus groups, content analysis of visual and textual material, and oral histories. Qualitative research studies involving cross-language issues are particularly complex in that they require investigating meanings, interpretations, symbols, and the processes and relations of social life.
</span></p><p data-dcnode-id="3295"><span data-dcnode-id="3335" instrument_node="">Although a range of scholars have dedicated their attention to challenges in conducting </span><a data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qualitative_research" title="Qualitative research"><span data-dcnode-id="3334" instrument_node="">qualitative studies</span></a><span data-dcnode-id="3332" instrument_node=""> in </span><a data-dcnode-id="3330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cross-Cultural_Research" title="Cross-Cultural Research"><span data-dcnode-id="3331" instrument_node="">cross-cultural</span></a><span data-dcnode-id="3329" instrument_node=""> contexts,</span><sup class="reference" data-dcnode-id="3326" id="cite_ref-:0_21-0"><a data-dcnode-id="3327" href="#cite_note-:0-21"><span data-dcnode-id="3328" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3325" instrument_node=""> no methodological consensus has emerged from these studies. For instance, Edwards</span><sup class="reference" data-dcnode-id="3322" id="cite_ref-Edwards_197–208_22-0"><a data-dcnode-id="3323" href="#cite_note-Edwards_197%E2%80%93208-22"><span data-dcnode-id="3324" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3321" instrument_node="">  noticed how the inconsistent or inappropriate use of </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Translation" title="Translation"><span data-dcnode-id="3320" instrument_node="">translators</span></a><span data-dcnode-id="3318" instrument_node=""> or </span><a data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Language_interpretation" title="Language interpretation"><span data-dcnode-id="3317" instrument_node="">interpreters</span></a><span data-dcnode-id="3315" instrument_node=""> can threaten the trustworthiness of cross-language qualitative research and the applicability of the translated findings on participant populations.  Researchers who fail to address the methodological issues translators/interpreters present in a cross-language qualitative research can decrease the trustworthiness of the data as well as compromise the overall rigor of the study</span><sup class="reference" data-dcnode-id="3312" id="cite_ref-Edwards_197–208_22-1"><a data-dcnode-id="3313" href="#cite_note-Edwards_197%E2%80%93208-22"><span data-dcnode-id="3314" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="3309" id="cite_ref-23"><a data-dcnode-id="3310" href="#cite_note-23"><span data-dcnode-id="3311" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3308" instrument_node="">  Temple and Edwards</span><sup class="reference" data-dcnode-id="3305" id="cite_ref-Temple_1–12_24-0"><a data-dcnode-id="3306" href="#cite_note-Temple_1%E2%80%9312-24"><span data-dcnode-id="3307" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3304" instrument_node=""> also describe the important role of translation in research, pointing out that language is not just a tool or technical label for conveying concepts; Indeed, language incorporates values and beliefs and carries cultural, social, and political meanings of a particular social reality that may not have a conceptual equivalence in the language into which will be translated.</span><sup class="reference" data-dcnode-id="3301" id="cite_ref-25"><a data-dcnode-id="3302" href="#cite_note-25"><span data-dcnode-id="3303" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3300" instrument_node=""> In the same veing, it has also been noted that the same words can mean different things in different cultures. For instance, as Temple et al.</span><sup class="reference" data-dcnode-id="3297" id="cite_ref-Temple_1–12_24-1"><a data-dcnode-id="3298" href="#cite_note-Temple_1%E2%80%9312-24"><span data-dcnode-id="3299" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3296" instrument_node=""> observe, the words we choose matter. Thus, it is crucial to give attention to how researchers describe the use of translators and/or interpreters since it reflects their competence in addressing language as a methodological issue.
</span></p><span data-dcnode-id="3294" instrument_node="">
</span><h3 data-dcnode-id="3284"><span class="mw-headline" data-dcnode-id="3292" id="Historical_discussion_of_cross-language_issues_and_qualitative_research"><span data-dcnode-id="3293" instrument_node="">Historical discussion of cross-language issues and qualitative research</span></span><span class="mw-editsection" data-dcnode-id="3285"><span class="mw-editsection-bracket" data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">[</span></span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D7" title="Edit section: Historical discussion of cross-language issues and qualitative research"><span data-dcnode-id="3289" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3283" instrument_node="">
</span><p data-dcnode-id="3262"><span data-dcnode-id="3282" instrument_node="">In 1989, Saville-Troike</span><sup class="reference" data-dcnode-id="3279" id="cite_ref-:1_26-0"><a data-dcnode-id="3280" href="#cite_note-:1-26"><span data-dcnode-id="3281" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3278" instrument_node=""> was one of the first to turn to apply the use of qualitative research (in the form of ethnographic investigation) to the topic of cross-cultural communication. Using this methodology, Saville-Troike demonstrated that for successful communication to take place, a person must have the appropriate linguistic knowledge, interaction skills, and cultural knowledge. In a cross-cultural context, one must be aware of differences in norms of interaction and interpretation, values and attitudes, as well as cognitive maps and schemata.</span><sup class="reference" data-dcnode-id="3275" id="cite_ref-:1_26-1"><a data-dcnode-id="3276" href="#cite_note-:1-26"><span data-dcnode-id="3277" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3274" instrument_node="">  Regarding </span><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cross-cultural_studies" title="Cross-cultural studies"><span data-dcnode-id="3273" instrument_node="">cross-cultural</span></a><span data-dcnode-id="3271" instrument_node=""> interviews, subsequently Stanton</span><sup class="reference" data-dcnode-id="3268" id="cite_ref-:2_27-0"><a data-dcnode-id="3269" href="#cite_note-:2-27"><span data-dcnode-id="3270" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3267" instrument_node=""> argued in 1996 that in order to avoid misunderstandings, the interviewer should try to walk in the other person's shoes. In other words, the interviewer needed to pay attention to the point of view of the interviewee, a notion dubbed as "connected knowing," which refers to a clear and undistorted understanding of the perspective of the interviewee.</span><sup class="reference" data-dcnode-id="3264" id="cite_ref-:2_27-1"><a data-dcnode-id="3265" href="#cite_note-:2-27"><span data-dcnode-id="3266" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3263" instrument_node="">
</span></p><span data-dcnode-id="3261" instrument_node="">
</span><h3 data-dcnode-id="3251"><span class="mw-headline" data-dcnode-id="3259" id="Relationship_between_cross-language_issues_and_qualitative_research"><span data-dcnode-id="3260" instrument_node="">Relationship between cross-language issues and qualitative research</span></span><span class="mw-editsection" data-dcnode-id="3252"><span class="mw-editsection-bracket" data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">[</span></span><a data-dcnode-id="3255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D8" title="Edit section: Relationship between cross-language issues and qualitative research"><span data-dcnode-id="3256" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3250" instrument_node="">
</span><p data-dcnode-id="3241"><span data-dcnode-id="3249" instrument_node="">As one of the primary methods for collecting rich and detailed information in qualitative research, interviews conducted in cross-cultural linguistic contexts raise a number of issues.  As a form of data collection, interviews provide researchers with insight into how individuals understand and narrate aspects of their lives. Challenges may arise, however, when language barriers exist between researchers and participants. In multilingual contexts, the study of language differences is an essential part of qualitative research.  van Ness et al. claim that </span><a data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Language" title="Language"><span data-dcnode-id="3248" instrument_node="">language</span></a><span data-dcnode-id="3246" instrument_node=""> differences may have consequences for the research process and outcome, because concepts in one language may be understood differently in another language.</span><sup class="reference" data-dcnode-id="3243" id="cite_ref-:3_28-0"><a data-dcnode-id="3244" href="#cite_note-:3-28"><span data-dcnode-id="3245" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3242" instrument_node=""> For these authors, language is central in all phases of qualitative research, ranging from data collection to analysis and representation of the textual data in publications.
</span></p><p data-dcnode-id="3220"><span data-dcnode-id="3240" instrument_node="">In addition, as</span><sup class="reference" data-dcnode-id="3237" id="cite_ref-:3_28-1"><a data-dcnode-id="3238" href="#cite_note-:3-28"><span data-dcnode-id="3239" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3236" instrument_node=""> van Ness et al. observe, challenges of translation can be from the perspective that interpretation of meaning is the core of qualitative research. Interpretation and representation of meaning may be challenging in any communicative act; however, they are more complicated in </span><a data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cross-cultural" title="Cross-cultural"><span data-dcnode-id="3235" instrument_node="">cross-cultural</span></a><span data-dcnode-id="3233" instrument_node=""> contexts where interlingual translation is necessary.</span><sup class="reference" data-dcnode-id="3230" id="cite_ref-:3_28-2"><a data-dcnode-id="3231" href="#cite_note-:3-28"><span data-dcnode-id="3232" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3229" instrument_node="">).  Interpretation and understanding of meanings are essential in qualitative research, not only for the interview phase, but also for the final phase when meaning will be represented to the audience through oral or written text.</span><sup class="reference" data-dcnode-id="3226" id="cite_ref-Temple_1–12_24-2"><a data-dcnode-id="3227" href="#cite_note-Temple_1%E2%80%9312-24"><span data-dcnode-id="3228" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3225" instrument_node=""> Temple and Edwards claim that without a high level of translated understanding, qualitative research cannot shed light on different perspectives, circumstances that could shut out the voices of those who could enrich and challenge our understandings.</span><sup class="reference" data-dcnode-id="3222" id="cite_ref-Temple_1–12_24-3"><a data-dcnode-id="3223" href="#cite_note-Temple_1%E2%80%9312-24"><span data-dcnode-id="3224" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3221" instrument_node="">
</span></p><span data-dcnode-id="3219" instrument_node="">
</span><h3 data-dcnode-id="3209"><span class="mw-headline" data-dcnode-id="3217" id="Current_state_of_affairs_of_cross-language_studies_in_qualitative_research"><span data-dcnode-id="3218" instrument_node="">Current state of affairs of cross-language studies in qualitative research</span></span><span class="mw-editsection" data-dcnode-id="3210"><span class="mw-editsection-bracket" data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">[</span></span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D9" title="Edit section: Current state of affairs of cross-language studies in qualitative research"><span data-dcnode-id="3214" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3208" instrument_node="">
</span><p data-dcnode-id="3180"><span data-dcnode-id="3207" instrument_node="">According to Temple et al.,</span><sup class="reference" data-dcnode-id="3204" id="cite_ref-Temple_1–12_24-4"><a data-dcnode-id="3205" href="#cite_note-Temple_1%E2%80%9312-24"><span data-dcnode-id="3206" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3203" instrument_node=""> a growing number of researchers are conducting studies in English language societies with people who speak little or no English. However, few of these researchers acknowledge the influence of interpreters and translators. In addition, as Temple et al.</span><sup class="reference" data-dcnode-id="3200" id="cite_ref-Temple_1–12_24-5"><a data-dcnode-id="3201" href="#cite_note-Temple_1%E2%80%9312-24"><span data-dcnode-id="3202" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3199" instrument_node=""> noticed, little attention is given to the involvement of interpreters in research interviews and even less attention to language difference in focus group research with people who do not speak English.  An exception would be the work of  Esposito.</span><sup class="reference" data-dcnode-id="3196" id="cite_ref-:4_29-0"><a data-dcnode-id="3197" href="#cite_note-:4-29"><span data-dcnode-id="3198" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3195" instrument_node="">  There is some work on the role of interpreters and translators in relation to best practice and models of provision, such as that of Thomson et al.,</span><sup class="reference" data-dcnode-id="3192" id="cite_ref-30"><a data-dcnode-id="3193" href="#cite_note-30"><span data-dcnode-id="3194" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3191" instrument_node="">  However, there is a body of literature aimed at English speaking health and social welfare professionals on how to work with interpreters.</span><sup class="reference" data-dcnode-id="3188" id="cite_ref-31"><a data-dcnode-id="3189" href="#cite_note-31"><span data-dcnode-id="3190" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="3185" id="cite_ref-32"><a data-dcnode-id="3186" href="#cite_note-32"><span data-dcnode-id="3187" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="3182" id="cite_ref-33"><a data-dcnode-id="3183" href="#cite_note-33"><span data-dcnode-id="3184" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3181" instrument_node="">
</span></p><p data-dcnode-id="3149"><span data-dcnode-id="3179" instrument_node="">Temple and Edwards</span><sup class="reference" data-dcnode-id="3176" id="cite_ref-Temple_1–12_24-6"><a data-dcnode-id="3177" href="#cite_note-Temple_1%E2%80%9312-24"><span data-dcnode-id="3178" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3175" instrument_node=""> point out the absence of technically focused literature on translation.  This is problematic because there is strong evidence that communication across languages involves more than just a literal transfer of information.</span><sup class="reference" data-dcnode-id="3172" id="cite_ref-34"><a data-dcnode-id="3173" href="#cite_note-34"><span data-dcnode-id="3174" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="3169" id="cite_ref-:5_35-0"><a data-dcnode-id="3170" href="#cite_note-:5-35"><span data-dcnode-id="3171" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="3166" id="cite_ref-36"><a data-dcnode-id="3167" href="#cite_note-36"><span data-dcnode-id="3168" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="3163" id="cite_ref-37"><a data-dcnode-id="3164" href="#cite_note-37"><span data-dcnode-id="3165" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3162" instrument_node=""> In this regard, Simon claims that the translator is not someone who simply offers words in a one-to-one exchange.</span><sup class="reference" data-dcnode-id="3159" id="cite_ref-:5_35-1"><a data-dcnode-id="3160" href="#cite_note-:5-35"><span data-dcnode-id="3161" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3158" instrument_node=""> Rather, the translator is someone who negotiates meanings in relation to a specific context. These meanings cannot be found within the language of translation, but they are embedded in the negotiation process, which is part of their continual reactivation.</span><sup class="reference" data-dcnode-id="3155" id="cite_ref-:5_35-2"><a data-dcnode-id="3156" href="#cite_note-:5-35"><span data-dcnode-id="3157" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3154" instrument_node=""> For this reason, the translator needs to make continuous decisions about the cultural meanings language conveys. Thus, the process of meaning transfer has more to do with reconstructing the value of a term, rather than its cultural inscription.</span><sup class="reference" data-dcnode-id="3151" id="cite_ref-:5_35-3"><a data-dcnode-id="3152" href="#cite_note-:5-35"><span data-dcnode-id="3153" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3150" instrument_node="">
</span></p><span data-dcnode-id="3148" instrument_node="">
</span><h3 data-dcnode-id="3138"><span class="mw-headline" data-dcnode-id="3146" id="Significant_contributions_to_cross-language_studies_in_qualitative_research"><span data-dcnode-id="3147" instrument_node="">Significant contributions to cross-language studies in qualitative research</span></span><span class="mw-editsection" data-dcnode-id="3139"><span class="mw-editsection-bracket" data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">[</span></span><a data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D10" title="Edit section: Significant contributions to cross-language studies in qualitative research"><span data-dcnode-id="3143" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3114"><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacques_Derrida" title="Jacques Derrida"><span data-dcnode-id="3136" instrument_node="">Jacques Derrida</span></a><span data-dcnode-id="3134" instrument_node=""> is widely acknowledged to be one of the most significant contributors to the issue of language in qualitative social research.</span><sup class="reference" data-dcnode-id="3131" id="cite_ref-38"><a data-dcnode-id="3132" href="#cite_note-38"><span data-dcnode-id="3133" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="3128" id="cite_ref-39"><a data-dcnode-id="3129" href="#cite_note-39"><span data-dcnode-id="3130" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="3125" id="cite_ref-40"><a data-dcnode-id="3126" href="#cite_note-40"><span data-dcnode-id="3127" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="3122" id="cite_ref-41"><a data-dcnode-id="3123" href="#cite_note-41"><span data-dcnode-id="3124" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="3119" id="cite_ref-42"><a data-dcnode-id="3120" href="#cite_note-42"><span data-dcnode-id="3121" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="3116" id="cite_ref-43"><a data-dcnode-id="3117" href="#cite_note-43"><span data-dcnode-id="3118" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3115" instrument_node="">  The challenges that arise in studies involving people who speak multiple languages have also been acknowledged.
</span></p><p data-dcnode-id="3095"><span data-dcnode-id="3113" instrument_node="">Today, the main contributions concerning issues of translation and interpretation come from the </span><a data-dcnode-id="3111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nursing" title="Nursing"><span data-dcnode-id="3112" instrument_node="">nursing</span></a><span data-dcnode-id="3110" instrument_node=""> field. In a globalized era, setting the criteria for qualitative research that is linguistically and culturally representative of study participants is crucial for improving the quality of care provided by health care professionals.</span><sup class="reference" data-dcnode-id="3107" id="cite_ref-:4_29-1"><a data-dcnode-id="3108" href="#cite_note-:4-29"><span data-dcnode-id="3109" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="3104" id="cite_ref-44"><a data-dcnode-id="3105" href="#cite_note-44"><span data-dcnode-id="3106" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3103" instrument_node=""> Scholars in the health field, like Squires,</span><sup class="reference" data-dcnode-id="3100" id="cite_ref-:6_45-0"><a data-dcnode-id="3101" href="#cite_note-:6-45"><span data-dcnode-id="3102" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="3097" id="cite_ref-:0_21-1"><a data-dcnode-id="3098" href="#cite_note-:0-21"><span data-dcnode-id="3099" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3096" instrument_node=""> provide useful guidelines for systematically evaluating the methodological issues in cross-language research in order to address language barriers between researchers and participants.
</span></p><span data-dcnode-id="3094" instrument_node="">
</span><h3 data-dcnode-id="3084"><span class="mw-headline" data-dcnode-id="3092" id="Cross-language_concerns_in_qualitative_research"><span data-dcnode-id="3093" instrument_node="">Cross-language concerns in qualitative research</span></span><span class="mw-editsection" data-dcnode-id="3085"><span class="mw-editsection-bracket" data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">[</span></span><a data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D11" title="Edit section: Cross-language concerns in qualitative research"><span data-dcnode-id="3089" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3061"><span data-dcnode-id="3082" instrument_node="">Squires</span><sup class="reference" data-dcnode-id="3079" id="cite_ref-:0_21-2"><a data-dcnode-id="3080" href="#cite_note-:0-21"><span data-dcnode-id="3081" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3078" instrument_node=""> defines </span><b data-dcnode-id="3075"><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cross-language_information_retrieval" title="Cross-language information retrieval"><span data-dcnode-id="3077" instrument_node="">cross-language</span></a></b><span data-dcnode-id="3074" instrument_node=""> as the process that occurs when a language barrier is present between the researcher and participants. This barrier is frequently mediated using a translator or interpreter. When the research involves two languages, interpretation issues might result in loss of meaning and thus loss of the validity of the qualitative study.  As Oxley et al.</span><sup class="reference" data-dcnode-id="3071" id="cite_ref-:7_46-0"><a data-dcnode-id="3072" href="#cite_note-:7-46"><span data-dcnode-id="3073" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3070" instrument_node=""> point out, in a multilingual setting </span><b data-dcnode-id="3067"><a data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interpretation_%28logic%29" title="Interpretation (logic)"><span data-dcnode-id="3069" instrument_node="">interpretation</span></a></b><span data-dcnode-id="3066" instrument_node=""> challenges arise when researcher and participants speak the same non-English native language, but the results of the study are intended for an English-speaking audience. For instance, when interviews, observation, and other methods of gathering data are used in cross-cultural environments, the data collection and analysis processes become more complicated due to the inseparability of the human experience and the language spoken in a culture</span><sup class="reference" data-dcnode-id="3063" id="cite_ref-:7_46-1"><a data-dcnode-id="3064" href="#cite_note-:7-46"><span data-dcnode-id="3065" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3062" instrument_node=""> Oxley et al. (2017). Therefore, it is crucial for researchers to be clear on what they know and believe. In other words, they should clarify their position in the research process.
</span></p><p data-dcnode-id="3047"><span data-dcnode-id="3060" instrument_node="">In this context, </span><b data-dcnode-id="3057"><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standpoint_theory" title="Standpoint theory"><span data-dcnode-id="3059" instrument_node="">positionality</span></a></b><span data-dcnode-id="3056" instrument_node=""> refers to the ethical and relational issues the researchers face when choosing a language over another to communicate their findings. For example, in his study on Chinese international students in a Canadian university, Li</span><sup class="reference" data-dcnode-id="3053" id="cite_ref-47"><a data-dcnode-id="3054" href="#cite_note-47"><span data-dcnode-id="3055" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3052" instrument_node=""> considers the ethical and relational issues of language choice experienced when working with the Chinese and English language. In this case, it is important that the researcher offers a rationale behind his/her language choice.  Thus, as Squires</span><sup class="reference" data-dcnode-id="3049" id="cite_ref-:6_45-1"><a data-dcnode-id="3050" href="#cite_note-:6-45"><span data-dcnode-id="3051" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3048" instrument_node="">  observes, language plays a significant role in cross-cultural studies; it helps participants represent their sense of self.
</span></p><p data-dcnode-id="3029"><span data-dcnode-id="3046" instrument_node="">Similarly, qualitative research interviews involve a continuous reflection on language choices because they may impact the research process and outcome. In his work, Lee</span><sup class="reference" data-dcnode-id="3043" id="cite_ref-:8_48-0"><a data-dcnode-id="3044" href="#cite_note-:8-48"><span data-dcnode-id="3045" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3042" instrument_node=""> illustrates the central role that </span><b data-dcnode-id="3039"><a data-dcnode-id="3040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflexivity_%28social_theory%29" title="Reflexivity (social theory)"><span data-dcnode-id="3041" instrument_node="">reflexivity</span></a></b><span data-dcnode-id="3038" instrument_node=""> plays in setting researcher's priorities and his/her involvement in the translation process. Specifically, his study focuses on the dilemma that researchers speaking the same language of participants face when the findings are intended to an English-speaking audience only. Lee</span><sup class="reference" data-dcnode-id="3035" id="cite_ref-:8_48-1"><a data-dcnode-id="3036" href="#cite_note-:8-48"><span data-dcnode-id="3037" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3034" instrument_node="">  introduces the article by arguing that "Research conducted by English-speaking researchers about other language speaking subjects is essentially cross-cultural and often multilingual, particularly with QR that involves participants communicating in languages other than English" (p.&nbsp;53</span><sup class="reference" data-dcnode-id="3031" id="cite_ref-:8_48-2"><a data-dcnode-id="3032" href="#cite_note-:8-48"><span data-dcnode-id="3033" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3030" instrument_node="">).  Specifically, Lee addresses the problems that arise in making sense of interview responses in Mandarin, preparing transcriptions of interviews, and translating the Mandarin/Chinese data for an English-speaking/reading audience. Lee's work then, demonstrates the importance of reflexivity in cross-language research since the researcher's involvement in the language translation can impact the research process and outcome.
</span></p><p data-dcnode-id="3011"><span data-dcnode-id="3028" instrument_node="">Therefore, in order to ensure </span><b data-dcnode-id="3025"><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trust_%28social_science%29" title="Trust (social science)"><span data-dcnode-id="3027" instrument_node="">trustworthiness</span></a></b><span data-dcnode-id="3024" instrument_node="">, which  is a measure of the rigor of the study, Lincoln &amp; Guba,</span><sup class="reference" data-dcnode-id="3021" id="cite_ref-49"><a data-dcnode-id="3022" href="#cite_note-49"><span data-dcnode-id="3023" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3020" instrument_node=""> Sutsrino et al.</span><sup class="reference" data-dcnode-id="3017" id="cite_ref-:9_50-0"><a data-dcnode-id="3018" href="#cite_note-:9-50"><span data-dcnode-id="3019" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3016" instrument_node=""> argue that it is necessary to minimize translation errors, provide detail accounts of the translation, involve more than one translator, and remain open to inquiry from those seeking access to the translation process. For example, in research conducted in the educational context, Sutsrino et al.</span><sup class="reference" data-dcnode-id="3013" id="cite_ref-:9_50-1"><a data-dcnode-id="3014" href="#cite_note-:9-50"><span data-dcnode-id="3015" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3012" instrument_node=""> recommend bilingual researchers the use of inquiry audit for establishing trustworthiness. Specifically, investigators can require an outside person to review and examine the translation process and the data analysis in order to ensure that the translation is accurate, and the findings are consistent.
</span></p><span data-dcnode-id="3010" instrument_node="">
</span><h2 data-dcnode-id="3000"><span class="mw-headline" data-dcnode-id="3008" id="International_educational_organizations"><span data-dcnode-id="3009" instrument_node="">International educational organizations</span></span><span class="mw-editsection" data-dcnode-id="3001"><span class="mw-editsection-bracket" data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">[</span></span><a data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D12" title="Edit section: International educational organizations"><span data-dcnode-id="3005" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2999" instrument_node="">
</span><h3 data-dcnode-id="2988"><span data-dcnode-id="2998" id="The_Society_for_Intercultural_Education.2C_Training_and_Research"></span><span class="mw-headline" data-dcnode-id="2996" id="The_Society_for_Intercultural_Education,_Training_and_Research"><span data-dcnode-id="2997" instrument_node="">The Society for Intercultural Education, Training and Research</span></span><span class="mw-editsection" data-dcnode-id="2989"><span class="mw-editsection-bracket" data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">[</span></span><a data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D13" title="Edit section: The Society for Intercultural Education, Training and Research"><span data-dcnode-id="2993" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2987" instrument_node="">
</span><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">SIETAR is an educational membership organization for those professionals who are concerned with the challenges and rewards of intercultural relations. SIETAR was founded in the United States in 1974 by a few dedicated individuals to draw together professionals engaged in various forms of intercultural learning and engagement research and training. SIETAR now has loosely connected chapters in numerous countries and a large international membership.
</span></p><span data-dcnode-id="2984" instrument_node="">
