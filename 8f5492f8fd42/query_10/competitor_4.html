</span><h3 data-dcnode-id="2974"><span class="mw-headline" data-dcnode-id="2982" id="WYSE_International"><span data-dcnode-id="2983" instrument_node="">WYSE International</span></span><span class="mw-editsection" data-dcnode-id="2975"><span class="mw-editsection-bracket" data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">[</span></span><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D14" title="Edit section: WYSE International"><span data-dcnode-id="2979" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2966"><a data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WYSE_International" title="WYSE International"><span data-dcnode-id="2972" instrument_node="">WYSE International</span></a><span data-dcnode-id="2970" instrument_node=""> is a worldwide educational charity specializing in education and development for emerging leaders established in 1989. It is a non-governmental organization associated with the </span><a class="mw-redirect" data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Department_of_Public_Information" title="Department of Public Information"><span data-dcnode-id="2969" instrument_node="">Department of Public Information</span></a><span data-dcnode-id="2967" instrument_node=""> of the United Nations.
</span></p><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Over 3000 participants from 110 countries have attended their courses, they have run in 5 continents. Its flagship International Leadership Programme is a 12-day residential course for 30 people from on average 20 countries (aged 18 – 35).
</span></p><p data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">WYSE International's website states its aims are to:
</span></p><span data-dcnode-id="2961" instrument_node="">
</span><blockquote data-dcnode-id="2952"><span data-dcnode-id="2960" instrument_node="">
</span><p data-dcnode-id="2954"><span data-dcnode-id="2959" instrument_node="">"provide education independently of political, religious or social backgrounds and promote visionary leadership capable of responding to evolving world needs."</span><sup class="reference" data-dcnode-id="2956" id="cite_ref-51"><a data-dcnode-id="2957" href="#cite_note-51"><span data-dcnode-id="2958" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2955" instrument_node="">
</span></p><span data-dcnode-id="2953" instrument_node="">
</span></blockquote><span data-dcnode-id="2951" instrument_node="">
</span><h3 data-dcnode-id="2941"><span class="mw-headline" data-dcnode-id="2949" id="Middle_East_Entrepreneurs_of_Tomorrow"><span data-dcnode-id="2950" instrument_node="">Middle East Entrepreneurs of Tomorrow</span></span><span class="mw-editsection" data-dcnode-id="2942"><span class="mw-editsection-bracket" data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">[</span></span><a data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D15" title="Edit section: Middle East Entrepreneurs of Tomorrow"><span data-dcnode-id="2946" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2940" instrument_node="">
</span><p data-dcnode-id="2936"><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East_Entrepreneurs_of_Tomorrow" title="Middle East Entrepreneurs of Tomorrow"><span data-dcnode-id="2939" instrument_node="">Middle East Entrepreneurs of Tomorrow</span></a><span data-dcnode-id="2937" instrument_node=""> is an innovative educational initiative aimed at creating a common professional language between Israeli and Palestinian young leaders. Israeli and Palestinian students are selected through an application process and work in small bi-national teams to develop technology and business projects for local impact. Through this process of cross-cultural communication, students build mutual respect, cultural competence and understanding of each others.
I need to be more open to people and limit my mind in order to get clues about stereotypes, race, religion, and media. I should give people enough time to speak so I can figure out what my mind is missing about a particular group of people. By being open, I mean having healthy conversations with people, which should begin gradually depending on the situation and people involved. Allowing myself some time to reflect on these elements, where I am going wrong, and where I need to improve. Meanwhile, I'm updating my mental knowledge based on the authentic information I'm gaining through experiential learning. 
</span></p><span data-dcnode-id="2935" instrument_node="">
</span><h2 data-dcnode-id="2925"><span class="mw-headline" data-dcnode-id="2933" id="Theories"><span data-dcnode-id="2934" instrument_node="">Theories</span></span><span class="mw-editsection" data-dcnode-id="2926"><span class="mw-editsection-bracket" data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">[</span></span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D16" title="Edit section: Theories"><span data-dcnode-id="2930" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2924" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2923" instrument_node="">The main theories for cross-cultural communication are based on the work done looking at value differences between different cultures, especially the works of </span><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_T._Hall" title="Edward T. Hall"><span data-dcnode-id="2922" instrument_node="">Edward T. Hall</span></a><span data-dcnode-id="2920" instrument_node="">, </span><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_D._Lewis" title="Richard D. Lewis"><span data-dcnode-id="2919" instrument_node="">Richard D. Lewis</span></a><span data-dcnode-id="2917" instrument_node="">, </span><a data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geert_Hofstede" title="Geert Hofstede"><span data-dcnode-id="2916" instrument_node="">Geert Hofstede</span></a><span data-dcnode-id="2914" instrument_node="">, and </span><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fons_Trompenaars" title="Fons Trompenaars"><span data-dcnode-id="2913" instrument_node="">Fons Trompenaars</span></a><span data-dcnode-id="2911" instrument_node="">. </span><a data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clifford_Geertz" title="Clifford Geertz"><span data-dcnode-id="2910" instrument_node="">Clifford Geertz</span></a><span data-dcnode-id="2908" instrument_node=""> was also a contributor to this field. Also Jussi V. Koivisto's model on cultural crossing in internationally operating organizations elaborates from this base of research.
</span></p><p data-dcnode-id="2893"><span data-dcnode-id="2906" instrument_node="">These theories have been applied to a variety of different communication theories and settings, including general business and management (</span><a data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fons_Trompenaars" title="Fons Trompenaars"><span data-dcnode-id="2905" instrument_node="">Fons Trompenaars</span></a><span data-dcnode-id="2903" instrument_node=""> and </span><a data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Hampden-Turner" title="Charles Hampden-Turner"><span data-dcnode-id="2902" instrument_node="">Charles Hampden-Turner</span></a><span data-dcnode-id="2900" instrument_node="">) and marketing (</span><a class="new" data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMarieke_de_Mooij%26action%3Dedit%26redlink%3D1" title="Marieke de Mooij (page does not exist)"><span data-dcnode-id="2899" instrument_node="">Marieke de Mooij</span></a><span data-dcnode-id="2897" instrument_node="">, </span><a data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephan_Dahl" title="Stephan Dahl"><span data-dcnode-id="2896" instrument_node="">Stephan Dahl</span></a><span data-dcnode-id="2894" instrument_node="">). There have also been several successful educational projects which concentrate on the practical applications of these theories in cross-cultural situations.
</span></p><p data-dcnode-id="2863"><span data-dcnode-id="2892" instrument_node="">These theories have been criticized mainly by management scholars (e.g. </span><a class="new" data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNigel_Holden%26action%3Dedit%26redlink%3D1" title="Nigel Holden (page does not exist)"><span data-dcnode-id="2891" instrument_node="">Nigel Holden</span></a><span data-dcnode-id="2889" instrument_node="">) for being based on the culture concept derived from 19th century cultural anthropology and emphasizing on culture-as-difference and culture-as-essence. Another criticism has been the uncritical way </span><a class="mw-redirect" data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hofstede" title="Hofstede"><span data-dcnode-id="2888" instrument_node="">Hofstede</span></a><span data-dcnode-id="2886" instrument_node="">'s dimensions are served up in textbooks as facts (</span><a class="new" data-dcnode-id="2884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPeter_W._Cardon%26action%3Dedit%26redlink%3D1" title="Peter W. Cardon (page does not exist)"><span data-dcnode-id="2885" instrument_node="">Peter W. Cardon</span></a><span data-dcnode-id="2883" instrument_node="">). There is a move to focus on 'cross-cultural interdependence' instead of the traditional views of comparative differences and similarities between cultures. Cross-cultural management is increasingly seen as a form of </span><a data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knowledge_management" title="Knowledge management"><span data-dcnode-id="2882" instrument_node="">knowledge management</span></a><span data-dcnode-id="2880" instrument_node="">. While there is debate in academia, over what cross-cultural teams can do in practice, a meta-analysis by </span><a class="new" data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DG%25C3%25BCnter_Stahl%26action%3Dedit%26redlink%3D1" title="Günter Stahl (page does not exist)"><span data-dcnode-id="2879" instrument_node="">Günter Stahl</span></a><span data-dcnode-id="2877" instrument_node="">, </span><a class="new" data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMartha_Maznevski%26action%3Dedit%26redlink%3D1" title="Martha Maznevski (page does not exist)"><span data-dcnode-id="2876" instrument_node="">Martha Maznevski</span></a><span data-dcnode-id="2874" instrument_node="">, </span><a class="new" data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAndreas_Voigt%26action%3Dedit%26redlink%3D1" title="Andreas Voigt (page does not exist)"><span data-dcnode-id="2873" instrument_node="">Andreas Voigt</span></a><span data-dcnode-id="2871" instrument_node=""> and </span><a class="new" data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKarsten_Jonsen%26action%3Dedit%26redlink%3D1" title="Karsten Jonsen (page does not exist)"><span data-dcnode-id="2870" instrument_node="">Karsten Jonsen</span></a><span data-dcnode-id="2868" instrument_node=""> on research done on multicultural groups, concluded "Research suggests that cultural diversity leads to process losses through task conflict and decreased social integration, but to process gains through increased creativity and satisfaction."</span><sup class="reference" data-dcnode-id="2865" id="cite_ref-52"><a data-dcnode-id="2866" href="#cite_note-52"><span data-dcnode-id="2867" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2864" instrument_node="">
</span></p><span data-dcnode-id="2862" instrument_node="">
</span><h2 data-dcnode-id="2852"><span class="mw-headline" data-dcnode-id="2860" id="Aspects"><span data-dcnode-id="2861" instrument_node="">Aspects</span></span><span class="mw-editsection" data-dcnode-id="2853"><span class="mw-editsection-bracket" data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">[</span></span><a data-dcnode-id="2856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D17" title="Edit section: Aspects"><span data-dcnode-id="2857" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2851" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="2808" role="presentation"><tbody data-dcnode-id="2809"><tr data-dcnode-id="2810"><td class="mbox-image" data-dcnode-id="2847"><div data-dcnode-id="2848" style="width:52px"><a class="image" data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="2850" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="2811"><div class="mbox-text-span" data-dcnode-id="2812"><span data-dcnode-id="2846" instrument_node="">This section </span><b data-dcnode-id="2839"><span data-dcnode-id="2845" instrument_node="">does not </span><a data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="2844" instrument_node="">cite</span></a><span data-dcnode-id="2842" instrument_node=""> any </span><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="2841" instrument_node="">sources</span></a></b><span data-dcnode-id="2838" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="2827"><span data-dcnode-id="2837" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit"><span data-dcnode-id="2836" instrument_node="">improve this section</span></a><span data-dcnode-id="2834" instrument_node=""> by </span><a data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="2833" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="2831" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="2830" instrument_node="">removed</span></a><span data-dcnode-id="2828" instrument_node="">.</span></span><span data-dcnode-id="2826" instrument_node=""> </span><span class="date-container" data-dcnode-id="2820"><i data-dcnode-id="2821"><span data-dcnode-id="2825" instrument_node="">(</span><span class="date" data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">July 2013</span></span><span data-dcnode-id="2822" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="2813"><i data-dcnode-id="2814"><span data-dcnode-id="2819" instrument_node=""> (</span><small data-dcnode-id="2816"><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="2818" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="2815" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">There are several parameters that may be perceived differently by people of different cultures:
</span></p><span data-dcnode-id="2804" instrument_node="">
</span><ul data-dcnode-id="2792"><li data-dcnode-id="2799"><span data-dcnode-id="2803" instrument_node="">High- and low-context cultures: context is the most important cultural dimension and also difficult to define. The idea of context in culture was advanced by the anthropologist Edward T Hall. He divides culture into two main groups: High and Low context cultures. He refers to context as the stimuli, environment or ambiance surrounding the environment.  Depending on how a culture relies on the three points to communicate their meaning, will place them in either high or low- context cultures. For example, Hall goes on to explain that low-context cultures assume that the individuals know very little about what they are being told, and therefore must be given a lot of background information. High-context cultures assume the individual is knowledgeable about the subject and has to be given very little background information.</span><sup class="reference" data-dcnode-id="2800" id="cite_ref-53"><a data-dcnode-id="2801" href="#cite_note-53"><span data-dcnode-id="2802" instrument_node="">[53]</span></a></sup></li><span data-dcnode-id="2798" instrument_node="">
</span><li data-dcnode-id="2793"><span data-dcnode-id="2797" instrument_node="">Nonverbal, oral and written: the main goal behind improving intercultural audiences is to pay special attention to specific areas of communication to enhance the effectiveness of the intercultural messages. The specific areas are broken down into three sub categories: nonverbal, oral and written messages.</span><sup class="reference" data-dcnode-id="2794" id="cite_ref-:13_54-0"><a data-dcnode-id="2795" href="#cite_note-:13-54"><span data-dcnode-id="2796" instrument_node="">[54]</span></a></sup></li></ul><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2783"><span data-dcnode-id="2790" instrument_node="">Nonverbal contact involves everything from something as obvious as eye contact and facial expressions to more discreet forms of expression such as the use of space. Experts have labeled the term </span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kinesics" title="Kinesics"><span data-dcnode-id="2789" instrument_node="">kinesics</span></a><span data-dcnode-id="2787" instrument_node=""> to mean communicating through body movement. Huseman, author of </span><i data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Business Communication</span></i><span data-dcnode-id="2784" instrument_node="">, explains that the two most prominent ways of communication through kinesics are eye contact and facial expressions.
</span></p><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Eye contact, Huseman goes on to explain, is the key factor in setting the tone between two individuals and greatly differs in meaning between cultures. In the Americas and Western Europe, eye contact is interpreted the same way, conveying interest and honesty. People who avoid eye contact when speaking are viewed in a negative light, withholding information and lacking in general confidence. However, in the Middle East, Africa, and especially Asia, eye contact is seen as disrespectful and even challenging of one's authority. People who make eye contact, but only briefly, are seen as respectful and courteous.
</span></p><p data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Facial expressions are their own language by comparison and universal throughout all cultures. Dale Leathers, for example, states that facial expression can communicate ten basic classes of meaning.
</span></p><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">The final part to nonverbal communication lies in our gestures, and can be broken down into five subcategories:
</span></p><span data-dcnode-id="2776" instrument_node="">
</span><ul data-dcnode-id="2772"><li data-dcnode-id="2773"><b data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Emblems</span></b></li></ul><span data-dcnode-id="2771" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2770" instrument_node="">Emblems refer to sign language (such as, thumbs up, one of the most recognized symbols in the world)</span><sup class="reference" data-dcnode-id="2767" id="cite_ref-:13_54-1"><a data-dcnode-id="2768" href="#cite_note-:13-54"><span data-dcnode-id="2769" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2766" instrument_node="">
</span></p><span data-dcnode-id="2764" instrument_node="">
</span><ul data-dcnode-id="2760"><li data-dcnode-id="2761"><b data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Illustrators</span></b></li></ul><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2758" instrument_node="">Illustrators mimic what is spoken (such as gesturing how much time is left by holding up a certain number of fingers).</span><sup class="reference" data-dcnode-id="2755" id="cite_ref-:13_54-2"><a data-dcnode-id="2756" href="#cite_note-:13-54"><span data-dcnode-id="2757" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2754" instrument_node="">
</span></p><span data-dcnode-id="2752" instrument_node="">
</span><ul data-dcnode-id="2748"><li data-dcnode-id="2749"><b data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Regulators</span></b></li></ul><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2741"><span data-dcnode-id="2746" instrument_node="">Regulators act as a way of conveying meaning through gestures (raising up a hand for instance indicates that one has a certain question about what was just said) and become more complicated since the same regulator can have different meanings across different cultures (making a circle with a hand, for instance, in the Americas means agreement, in Japan is symbolic for money, and in France conveys the notion of worthlessness).</span><sup class="reference" data-dcnode-id="2743" id="cite_ref-:13_54-3"><a data-dcnode-id="2744" href="#cite_note-:13-54"><span data-dcnode-id="2745" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2742" instrument_node="">
</span></p><span data-dcnode-id="2740" instrument_node="">
</span><ul data-dcnode-id="2736"><li data-dcnode-id="2737"><b data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Affect displays</span></b></li></ul><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Affect displays reveal emotions such as happiness (through a smile) or sadness (mouth trembling, tears). 
</span></p><span data-dcnode-id="2732" instrument_node="">
</span><ul data-dcnode-id="2728"><li data-dcnode-id="2729"><b data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">Adaptors</span></b></li></ul><span data-dcnode-id="2727" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2726" instrument_node="">Adaptors are more subtle such as a yawn or clenching fists in anger.</span><sup class="reference" data-dcnode-id="2723" id="cite_ref-:13_54-4"><a data-dcnode-id="2724" href="#cite_note-:13-54"><span data-dcnode-id="2725" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2722" instrument_node="">
</span></p><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">The last nonverbal type of communication deals with communication through the space around people, or proxemics. Huseman goes on to explain that Hall identifies three types of space:
</span></p><span data-dcnode-id="2718" instrument_node="">
</span><ol data-dcnode-id="2709"><li data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Feature-fixed space: deals with how cultures arrange their space on a large scale, such as buildings and parks.</span></li><span data-dcnode-id="2715" instrument_node="">
</span><li data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Semifixed feature space: deals with how space is arranged inside buildings, such as the placement of desks, chairs and plants.</span></li><span data-dcnode-id="2712" instrument_node="">
</span><li data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Informal space: the space and its importance, such as talking distance, how close people sit to one another and office space are all examples. A production line worker often has to make an appointment to see a supervisor, but the supervisor is free to visit the production line workers at will.</span></li></ol><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2707" instrument_node="">Oral and written communication is generally easier to learn, adapt and deal with in the business world for the simple fact that each language is unique. The one difficulty that comes into play is </span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paralanguage" title="Paralanguage"><span data-dcnode-id="2706" instrument_node="">paralanguage</span></a><span data-dcnode-id="2704" instrument_node="">, how something is said.
</span></p><span data-dcnode-id="2702" instrument_node="">
</span><h2 data-dcnode-id="2692"><span class="mw-headline" data-dcnode-id="2700" id="Differences_between_Western_and_Indigenous_Australian_communication"><span data-dcnode-id="2701" instrument_node="">Differences between Western and Indigenous Australian communication</span></span><span class="mw-editsection" data-dcnode-id="2693"><span class="mw-editsection-bracket" data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">[</span></span><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D18" title="Edit section: Differences between Western and Indigenous Australian communication"><span data-dcnode-id="2697" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2671"><span data-dcnode-id="2690" instrument_node="">According to Michael Walsh and </span><a data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghil%2527ad_Zuckermann" title="Ghil'ad Zuckermann"><span data-dcnode-id="2689" instrument_node="">Ghil'ad Zuckermann</span></a><span data-dcnode-id="2687" instrument_node="">,</span><sup class="noprint Inline-Template" data-dcnode-id="2680" style="white-space:nowrap;"><span data-dcnode-id="2686" instrument_node="">[</span><i data-dcnode-id="2682"><a data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AQualify_evidence" title="Wikipedia:Qualify evidence"><span data-dcnode-id="2684" title="Cited sources need context/evaluation"><span data-dcnode-id="2685" instrument_node="">qualify evidence</span></span></a></i><span data-dcnode-id="2681" instrument_node="">]</span></sup><span data-dcnode-id="2679" instrument_node=""> Western conversational interaction is typically "dyadic", between two particular people, where eye contact is important and the speaker controls the interaction; and "contained" in a relatively short, defined time frame. However, traditional Australian Aboriginal conversational interaction is "communal", broadcast to many people, eye contact is not important, the listener controls the interaction; and "continuous", spread over a longer, indefinite time frame.</span><sup class="reference" data-dcnode-id="2676" id="cite_ref-Engaging_55-0"><a data-dcnode-id="2677" href="#cite_note-Engaging-55"><span data-dcnode-id="2678" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="2673" id="cite_ref-56"><a data-dcnode-id="2674" href="#cite_note-56"><span data-dcnode-id="2675" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2672" instrument_node="">
</span></p><span data-dcnode-id="2670" instrument_node="">
</span><h2 data-dcnode-id="2660"><span class="mw-headline" data-dcnode-id="2668" id="Challenges"><span data-dcnode-id="2669" instrument_node="">Challenges</span></span><span class="mw-editsection" data-dcnode-id="2661"><span class="mw-editsection-bracket" data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">[</span></span><a data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D19" title="Edit section: Challenges"><span data-dcnode-id="2665" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2659" instrument_node="">
</span><p data-dcnode-id="2654"><i data-dcnode-id="2656"><b data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Different spoken languages</span></b></i><span data-dcnode-id="2655" instrument_node="">
</span></p><p data-dcnode-id="2644"><span data-dcnode-id="2653" instrument_node="">Spoken language is the most important communication tool between people. Spoken language is seen as people's natural production tool, more common and normal, while written language is seen as intricate because of its broad rules.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2646" style="white-space:nowrap;"><span data-dcnode-id="2652" instrument_node="">[</span><i data-dcnode-id="2648"><a data-dcnode-id="2649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2650" title="This claim needs references to reliable sources. (April 2022)"><span data-dcnode-id="2651" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2647" instrument_node="">]</span></sup><span data-dcnode-id="2645" instrument_node=""> The same language has different meanings in different contexts. When two countries that use the same language communicate, there may also be some misunderstandings due to some dialects. American English and British English is a example for when two different of cross-cultural communication.
</span></p><span data-dcnode-id="2643" instrument_node="">
</span><h2 data-dcnode-id="2633"><span class="mw-headline" data-dcnode-id="2641" id="See_also"><span data-dcnode-id="2642" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="2634"><span class="mw-editsection-bracket" data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">[</span></span><a data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCross-cultural_communication%26action%3Dedit%26section%3D20" title="Edit section: See also"><span data-dcnode-id="2638" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2632" instrument_node="">
</span><div class="div-col" data-dcnode-id="2572" style="column-width: 20em;"><span data-dcnode-id="2629" instrument_node="">
</span><ul data-dcnode-id="2573"><li data-dcnode-id="2626"><a class="mw-redirect" data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Contact_Zone_%28theoretical_concept%29" title="The Contact Zone (theoretical concept)"><span data-dcnode-id="2628" instrument_node="">The Contact Zone (theoretical concept)</span></a></li><span data-dcnode-id="2625" instrument_node="">

</span><li data-dcnode-id="2610"><a data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_competence" title="Cultural competence"><span data-dcnode-id="2612" instrument_node="">Cultural competence</span></a></li><span data-dcnode-id="2609" instrument_node="">
