</span><section data-dcnode-id="1109" id="pf_text_1"><span data-dcnode-id="1110" instrument_node="">Today’s work environment is more complex than it has ever been. With the number of global companies increasing and the competition that has resulted from this business practice, there has been tremendous demand for organizations to improve their workforce practices. The pressures of organizations to be globally competitive has led to drastic changes in the way that business work practices are utilized. Organizations had to develop strategies that increased efficiency, productivity, and also profitability. The resulting changes has shifted the work environment from an individualistic nature to more of a team oriented structure. The complexity and makeup of some projects makes it difficult for an individual to complete designated tasks effectively. As a result, organizations will develop teams of people with complementary abilities which allows for the combining of knowledge and experience to accomplish widespread objectives. Work teams can consist of not only domestic teams, but also of teams that are multicultural and multinational.</span></section><span data-dcnode-id="1108" instrument_node="">
</span><section data-dcnode-id="1107"></section><span data-dcnode-id="1106" instrument_node="">
</span><section data-dcnode-id="1100"><span data-dcnode-id="1105" instrument_node="">Multinational, multicultural teams have to be innovative and productive in order to overcome the intense competition that exists in today’s business environment. If you calculate the person-hours devoted to IBM’s team projects, they amount to more than 180,000 hours of management time each year. Do you think this is a wise investment of IBM’s human resources? Why or why not? The amount of hours IBM devotes to management time for team projects is an excellent idea along with being a wise investment that has proven to various organizations how well work teams can transform an organization for the better. A multicultural and multinational team can offer a company tremendous benefits, however there are some major obstacles that need to be overcome. Our text states that “research on global considerations in the use of teams is just</span><p data-dcnode-id="1104"></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">beginning, but three areas are particularly worth mentioning: the extent of teamwork, self-managed teams, and team cultural diversity”(Robbins; S. &amp; Judge, T. 2010, p.331). The objective of a multicultural and multinational</span></p></section><span data-dcnode-id="1099" instrument_node="">
</span><section data-dcnode-id="1097" id="pf_text_2"><span data-dcnode-id="1098" instrument_node="">high performance work team would be to: deliver the highest quality product possible, provide extraordinary service, along with achieving the highest efficiency, productivity, and profitability. (South University Online, 2014, Work Teams, para.2). The conflicts and challenges of dealing daily with individuals from different nationalities and cultures are numerous. These include the ability to understand, appreciate, and respect ethnic diversity, different cultures, and individual personalities. An organization can reap tremendous benefits from an organizational team that overcomes these obstacles. IBM is an example of an organization that invested a lot of time and resources into forming successful multinational, multicultural teams.</span></section><span data-dcnode-id="1096" instrument_node="">
</span><section data-dcnode-id="1095"></section><span data-dcnode-id="1094" instrument_node="">
</span><section data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Why do you think IBM’s culture changed from formal, stable, and individualistic to informal, impermanent, and team oriented? IBM was a company that saw the benefits of progressing from a individualistic organization into a team oriented organization. The IBM culture changed in 1993 when Louis Gerstner was named CEO. He was the first executive of IBM that had not been promoted from within the organization, and his goal was to transform IBM into a more streamlined corporation which led to improved efficiency, productivity, and profitability (IBM, 2014, para.4) Mr. Gerstner realized that he had to take dramatic action in order to keep IBM a major player and be globally competitive in an ever changing market. He realized that IBM at the time was an individualistic organization, where employees and departments worked solely by themselves. A majority of &nbsp;IBM’s business was global, so IBM needed to increase awareness about the company and the products they offered. What better way to increase the interest in the company than to incorporate a team structure that would involve teams from areas which were not totally aware of IBM’s products.</span></section><span data-dcnode-id="1091" instrument_node="">
</span><section data-dcnode-id="1090"></section><span data-dcnode-id="1089" instrument_node="">
</span><section data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Once IBM became so wide and diverse the need for an informal, impermanent, and team oriented environment became necessary. Describe the stages of group development these teams should expect to experience. At each stage, make recommendations that will help move the team into the next stage. There are five stages of group development that teams will experience. These stages are all needed and should be anticipated in order for the team to develop, to deal with challenges, to undertake problems, to uncover solutions, to strategize the effort, and to provide the desired outcome.&nbsp;The initial stage involved in the team building process is the forming stage. This is when the forming of the team occurs and the team members are uncertain about what the process will be. This stage is to identify group behaviors, principles and standards and methods to manage behavioral problems. In this stage team members get to know one another and develop opinions about one another’s personalities.</span></section><span data-dcnode-id="1086" instrument_node="">
</span><section data-dcnode-id="1085"></section><span data-dcnode-id="1084" instrument_node="">
</span><section data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">The team members are finding out the extent of the mission and how to tackle the opportunities and challenges they will encounter, along with establishing and agreeing to goals. After the group begins to get fairly comfortable with one another’s behavioral characteristics and the details of the project are sorted out, the team will begin the advancement to the next stage of the group development. The second stage involved in the team building process is the storming stage. This stage is identified by competition and conflict as a way for team members to express their individuality and compete for their thoughts &nbsp;and ideas to be considered. This stage is when team members take an intense stand on the issue and support their positions against others, therefore it is during this stage where disagreement is expected to be greatest. The team members may also struggle with the desire to take control of the leadership of the group. If there is too much conflict involved, some groups never escape from the storming stage. If all team members accept practical methods and produce remarkable responses that offer the opportunity to complete the task and produces satisfactory results for all team members involved, then the team will advance to the next stage of the group development.</span></section><span data-dcnode-id="1081" instrument_node="">
</span><section data-dcnode-id="1080"></section><span data-dcnode-id="1079" instrument_node="">
</span><section data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">The next stage involved in the team building process is the norming stage. The norming stage happens when the team members conclude their disagreements and come together to resolve the dilemma. This emergence phase is identified after one member assumes more of a leadership role, although leadership can be cohesive. At this point the team members choose to abandon their own agendas and ideas and come to an agreement with other team members in an effort to make the team perform successfully In this stage, all team members take responsibility and move to sharing the same objective, which is to work toward the successful achievement of the team’s goals. After coming together to work toward achieving the necessary goal, the team will now begin the transformation toward the next stage of&nbsp;the group development.</span></section><span data-dcnode-id="1076" instrument_node="">
</span><section data-dcnode-id="1075"></section><span data-dcnode-id="1074" instrument_node="">
</span><section data-dcnode-id="1068"><span data-dcnode-id="1073" instrument_node="">The next to last stage involved in the team building process is the performing stage. This is the stage where the group should perform at the most productive level. The task purpose becomes problem resolving, which will guide the team toward the best possible solutions and optimum group development. There is collaboration for testing solutions to solve problems and an emphasis on attaining the desired result. Team motivation is at the maximum level. The team consensus is to generate the productivity necessary to achieve the common goal of completing the task through</span><p data-dcnode-id="1072"></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">problem solving and maximum effort. When the relative team achieves the ultimate goal of task completion, they now begin the journey to the last stage of the group development For work teams that are continuous or permanent, the last stage involved in the team building process is the performing stage. When it comes to short-term groups or teams, that have a limited task to perform, the adjourning stage is the final stage of the group development. The adjoining stage involves the process of disbanding the team. Tying up any loose ends is the concentration rather than high task performance This process involves the termination of task performances and disengagement from personal relationships. This finality stage usually includes recognition for everyone’s participation and the team’s achievement along with an opportunity for members to give final farewells.(University of Oregon Teaching Effectiveness Program, 2014, pages 1&amp;2). Multicultural project teams often face problems with communication, expectations, and values. How do you think some of these challenges can be overcome?</span></p></section><span data-dcnode-id="1067" instrument_node="">
</span><section data-dcnode-id="1066"></section><span data-dcnode-id="1065" instrument_node="">
</span><section data-dcnode-id="1059"><span data-dcnode-id="1064" instrument_node="">For many global organizations, there is an increasing need to get teams or groups from different nationalities and cultures to work together effectively either as permanent teams or as temporary teams assembled to address specific projects involving key business concerns. The primary step in overcoming any challenges is to identify the potential personality differences or any nationality and cultural differences within the team. Once these differences are identified, a plan needs to be developed to ensure that the team members can put any individualistic differences aside for the betterment of the team. Unless people come to comprehend the differences among them through cultural awareness, problems can continually&nbsp;persist and even intensify. A way to combat this issue is to form a team that has members who are properly trained to be fluent and</span><p data-dcnode-id="1063"></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">understanding in various languages and cultures, and ensure that they can emotionally handle and thrive in such situations. Cultural diversity can be an asset for situations that have a need for a variety of viewpoints Planning the structure for developing a high performing team which not only takes into account the cultural differences, but also uses the diversities present in an international team, is paramount to the success of the team.(Moon, D., 2012.) Discuss at least three recommendations to help make these teams effective. Building effective multicultural teams is about increasing awareness and tolerance towards nationalities and cultures, and eliminating, or even decreasing, confrontation and conflict towards one another. The challenge in managing multicultural teams effectively is to recognize the issues that are present. Three recommendations to make these teams effective are to provide the resources and other contextual influences, the team composition, and the process variables necessary to make teams effective.</span></p></section><span data-dcnode-id="1058" instrument_node="">
</span><section data-dcnode-id="1057"></section><span data-dcnode-id="1056" instrument_node="">
</span><section data-dcnode-id="1050"><span data-dcnode-id="1055" instrument_node="">Together these three components allow the team to overcome the underlying cultural causes of conflict, intervene in ways that get the team back on track, and empower team members to deal with future challenges themselves. (Robbins; S. &amp; Judge, T. 2010, p.318) Identify three factors that will help make individuals into team players. The three factors that can turn individuals into team players by including the proper selecting of team players, the proper training of employees to become team players, and rewarding the appropriate team behaviors such as encouraging cooperative efforts rather than competitive ones. These will enhance and ensure that the individuals to become very effective team players in the organization. (Robbins; S. &amp; Judge, T. 2010, p.329-330)</span><p data-dcnode-id="1054"></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">In conclusion this paper provided and explained various topics involving multicultural, multinational teams. The first topic covered if IBM made a wise investment of the organization’s human resources, what possessed IBM’s culture to change from formal, stable, and individualistic to informal, impermanent, and team oriented. Then it described the stages of group development these teams should expect to experience and at each stage, make</span></p></section><span data-dcnode-id="1049" instrument_node="">
</span><section data-dcnode-id="1040" id="pf_text_6"><span data-dcnode-id="1048" instrument_node="">recommendations that will help move the team into the next stage. after that it described how multicultural project teams often face problems with communication, expectations, and values and how some of these challenges can be overcome. Next this paper explained some of the group decision-making challenges the team may experience and recommended ways to overcome them. The next topic discussed at least three recommendations to help make these teams effective. Finally this paper identified three factors that will help make individuals into team players.</span><p data-dcnode-id="1047"></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1045" instrument_node="">References</span><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node="">
Robbins, S. and Judge, T. (2011). Organizational Behavior, 14th Edition [Vital Source digital version]. Upper Saddle River, New Jersey: Prentice Hall. Retrieved from: http://digitalbookshelf.southuniversity.edu/books…. South University Online. (2014). MGT3002 S01:Organizational Behavior Week 3 Work Teams Retrieved from myeclassonline.com…. IBM. (2014). Chronological History of IBM 1990s, Retrieved 4/22/2014 from: http://www-03.ibm.com/ibm/history/history/decade_1990.html University of Oregon Teaching Effectiveness Program, (2014) Managing Groups, Tuckman’s 5 Stages of Group Development. Retrieved 4/22/2014 from: Moon, D., (2012). Multicultural Teams: Where Culture, Leadership, Decision Making, and Communication Connect Retrieved 4/22/2014 from: http://www.wciujournal.org/uploads/files/Don%20Moon%20Where%20culture%20leadership%20decision%20making%20and%20communication%20connect.pdf</span></p><span data-dcnode-id="1041" instrument_node="">
</span></section><span data-dcnode-id="1039" instrument_node="">
