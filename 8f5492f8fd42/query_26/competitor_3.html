 if necessary. However, we used English coding labels across all transcripts. If interviewees used particularly compelling language, we adopted “in vivo” codes that reflected respondents' exact words. For instance, the quotation “An integrative and open leadership style is a very good approach to bring different competences together” yielded the code “integrative leadership”. Whenever we noticed connections between our data and extant theoretical concepts, we created codes informed by the literature. For example, the statement “My purchasing manager speaks perfect English, but he keeps falling back into German” generated the code “code-switching”. The qualitative data analysis software ATLAS.ti supported this coding process.</span></p><p data-dcnode-id="6632" id="p0225"><span data-dcnode-id="6648" instrument_node="">In the subsequent step of analysis, we brought together different first-order codes, which linked together through higher-order categories. We teased out these categories and examined the theoretical relationships between them using the constant comparative method (</span><a class="workspace-trigger" data-dcnode-id="6646" href="#bb0100" name="bbb0100"><span data-dcnode-id="6647" instrument_node="">Glaser and Strauss, 1967</span></a><span data-dcnode-id="6645" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6643" href="#bb0350" name="bbb0350"><span data-dcnode-id="6644" instrument_node="">Parry, 1999</span></a><span data-dcnode-id="6642" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6640" href="#bb0380" name="bbb0380"><span data-dcnode-id="6641" instrument_node="">Rynes and Gephart, 2004</span></a><span data-dcnode-id="6639" instrument_node="">). We compared different parts each interview, different interviews within each MNT, statements of interviewees on different hierarchical levels, in different teams and corporations. During this comparative process, connections between previously fragmented codes emerged. We merged similar codes into superordinate categories or linked them to form a new category. With respect to language-based emotions, for example, we collapsed the codes “language-based inhibition”, “feeling of insecurity” and “fear of face loss” into the higher-order category “anxiety”. Regarding leadership strategies, we merged the codes “code-switching”, “speaking time” and “redundant communication” into the category “reducing the impact of language barriers”, consolidated the codes “humor” and “common goals” into the category “redirecting attention” and brought the codes “appreciation” and “meta-communication” together into the category “positive appraisal of linguistic diversity”. Leadership outcomes were condensed in a similar fashion. In the final step of analysis, we arranged these categories into a set of core findings. During the entire data analysis process we cycled back and forth between our data, codes and categories in an iterative fashion until no new categories emerged and saturation was reached (</span><a class="workspace-trigger" data-dcnode-id="6637" href="#bb0255" name="bbb0255"><span data-dcnode-id="6638" instrument_node="">Locke, 2001</span></a><span data-dcnode-id="6636" instrument_node="">). We also constantly recorded ideas about codes and their relationships in the form of theoretical memos (</span><a class="workspace-trigger" data-dcnode-id="6634" href="#bb0105" name="bbb0105"><span data-dcnode-id="6635" instrument_node="">Glaser, 1978</span></a><span data-dcnode-id="6633" instrument_node="">).</span></p><p data-dcnode-id="6630" id="p0230"><span data-dcnode-id="6631" instrument_node="">Upon finalization of the data collection phase, we scrutinized the validity of our findings and conclusions by sharing an eight-page summary of findings and practical recommendations with all interviewees and by conducting a feedback round with selected informants. Doing so yielded additional details that sharpened our conclusions and ensured that we captured the impact of language on MNT members' emotions and the moderating role of MNT leaders as they pervaded informants' experience.</span></p></section></section><section data-dcnode-id="5984" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6626" id="st0020"><span data-dcnode-id="6627" instrument_node="">Results</span></h2><p data-dcnode-id="6624" id="p0235"><span data-dcnode-id="6625" instrument_node="">To answer our first research question, we will explore MNT members' negative emotional reactions to language barriers. Based on our analysis through constant comparison, we will classify these negative emotions into two discrete categories and thereby provide a systematic problem description. To address our second and main research question, we will show possible solutions by outlining a variety of measures MNT leaders have at their disposal to counter-act language-induced negative emotions. Our content analysis has shown that we can subsume these measures under three general strategies. To highlight the relevance of these findings, we will also outline the positive outcomes of successful emotion management through MNT leaders.</span></p><section data-dcnode-id="6438" id="s0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6622" id="st0090"><span data-dcnode-id="6623" instrument_node="">Defining the problem: two categories of negative emotional reactions to language barriers</span></h3><p data-dcnode-id="6620" id="p0245"><span data-dcnode-id="6621" instrument_node="">Our critical incident investigations revealed that language barriers gave rise to substantial negative feelings, particularly at the beginning of a team's cooperation. During our iterative coding process, we discovered that we can subsume the various problems under two discrete categories. We labeled these two categories self-directed anxiety and other-directed resentment.</span></p><section data-dcnode-id="6526" id="s0075"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6618" id="st0095"><span data-dcnode-id="6619" instrument_node="">Self-directed anxiety triggered by language barriers</span></h4><p data-dcnode-id="6607" id="p0780"><span data-dcnode-id="6617" instrument_node="">In terms of self-directed emotions, interviewees who judged their proficiency in the shared language as unsatisfactory, associated communication in a foreign language with “insecurity”, “embarrassment”, “feeling threatened”, “showing weaknesses” and “having no self-confidence”. In line with </span><a class="workspace-trigger" data-dcnode-id="6615" href="#bb0040" name="bbb0040"><span data-dcnode-id="6616" instrument_node="">Brett, Behfar and Kern (2006)</span></a><span data-dcnode-id="6614" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="6612" href="#bb0315" name="bbb0315"><span data-dcnode-id="6613" instrument_node="">Neeley (2013)</span></a><span data-dcnode-id="6611" instrument_node=""> we also found that many non-native speakers of the shared language fear to receive lower performance ratings due to a lack of proficiency:</span></p><blockquote data-dcnode-id="6608"><p data-dcnode-id="6609" id="sp0055"><span data-dcnode-id="6610" instrument_node="">Many people who are excellent specialists, have extensive knowledge and are very competent just don't come across so well because of language problems. (…) In fact, I noticed that for myself. I didn't get such a good feedback because of this. (AUTO1 member 6, Greek)</span></p></blockquote><p></p><p data-dcnode-id="6602"><span data-dcnode-id="6606" instrument_node="">Informants who lack fluency in their group's working language furthermore reported their constant fear of missing important information:</span></p><blockquote data-dcnode-id="6603"><p data-dcnode-id="6604" id="sp0060"><span data-dcnode-id="6605" instrument_node="">Chinese colleagues have problems if emails are just sent to everyone in German. They don't know what it's all about and are very scared of missing something. (AUTO2 member 3, Chinese)</span></p></blockquote><p></p><p data-dcnode-id="6597" id="p0785"><span data-dcnode-id="6601" instrument_node="">The distress of being unable to express oneself adequately exacerbates this strain:</span></p><blockquote data-dcnode-id="6598"><p data-dcnode-id="6599" id="sp0065"><span data-dcnode-id="6600" instrument_node="">You feel so STUPID! If you listen to the others and have an idea, you want to express it but don't find the words — then it is too late and they have already passed on to the next topic. You feel so helpless! (AUTO1 member 4, Chinese)</span></p></blockquote><p></p><div data-dcnode-id="6567"><p data-dcnode-id="6592" id="p0280"><span data-dcnode-id="6596" instrument_node="">Taken together, these emotions create a pervasive anxiety triggered by language barriers. The quotations reproduced in </span><a class="workspace-trigger" data-dcnode-id="6594" href="#t0010" name="bt0010"><span data-dcnode-id="6595" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="6593" instrument_node=""> provide further evidence of how salient this anxiety appeared in our interviews.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6568" id="t0010"><span class="captions" data-dcnode-id="6585"><span data-dcnode-id="6586" id="ca0010"><p data-dcnode-id="6587" id="sp0020"><span class="label" data-dcnode-id="6590"><span data-dcnode-id="6591" instrument_node="">Table&nbsp;2</span></span><span data-dcnode-id="6589" instrument_node="">. </span><span data-dcnode-id="6588" instrument_node="">Self-directed anxiety triggered by language barriers.</span></p></span></span><div class="groups" data-dcnode-id="6569"><table data-dcnode-id="6570"><tbody data-dcnode-id="6571"><tr class="valign-top" data-dcnode-id="6572"><td class="align-left" data-dcnode-id="6573"><span data-dcnode-id="6584" instrument_node="">Japanese people are afraid of making mistakes, and they are afraid of what will happen after that. German people are better than Japanese people in speaking and listening to English, so I think they are more relaxed. If they don't understand what Japanese people are saying, they ask us many questions to clarify. Usually people cannot express exactly what they want to say. These things make us Japanese uncomfortable. (MOTOR2 member 10, Japanese)</span><br data-dcnode-id="6583"><span data-dcnode-id="6582" instrument_node="">Japanese colleagues find it dishonorable to misspeak in a foreign language. They would not want to offend the person that they are speaking to by improper use of the language. (…) I think that's where the reluctance comes from — it's not a drive for perfection, it's more a fear of saying something that would be dishonorable or upset. (MOTORCORP superordinate manager 1, American)</span><br data-dcnode-id="6581"><span data-dcnode-id="6580" instrument_node="">You notice that you lack practice and vocabulary — and that automatically creates the bad feeling that you can't communicate what you want to say and that you may come across incompetent. (AUTO1 member 5, Greek)</span><br data-dcnode-id="6579"><span data-dcnode-id="6578" instrument_node="">You don't want to disturb the general conversation, so if you aren't 100% sure how to say something you don't dare to speak up. I'm standing there, my English isn't so good, maybe I also have to argue my point — that would require excellent fluency. So lest I go under I better say nothing at all. People don't want to be vulnerable. (AUTO1 member 1, German)</span><br data-dcnode-id="6577"><span data-dcnode-id="6576" instrument_node="">The pressure created by the language mandate is extremely high. I would be particularly ashamed if the other colleagues were better in English than I am. (…) Overall, Chinese colleagues are always scared of losing face in front of the larger group. (CAR4 member 3, Chinese)</span><br data-dcnode-id="6575"><span data-dcnode-id="6574" instrument_node="">You don't feel secure in a foreign language. You are missing words, so you can't express what you like to say and don't come across as smart as if you were speaking German. (…) I'm sure many colleagues think I haven't even understood the topic, just because I can't bring it across right. (CAR3 member 3, German)</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6550"><span data-dcnode-id="6566" instrument_node="">Overall, our results corroborate </span><a class="workspace-trigger" data-dcnode-id="6564" href="#bb0180" name="bbb0180"><span data-dcnode-id="6565" instrument_node="">Hinds et al.'s (2014)</span></a><span data-dcnode-id="6563" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6561" href="#bb0315" name="bbb0315"><span data-dcnode-id="6562" instrument_node="">Neeley's (2013)</span></a><span data-dcnode-id="6560" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="6558" href="#bb0325" name="bbb0325"><span data-dcnode-id="6559" instrument_node="">Neeley et al.'s (2012)</span></a><span data-dcnode-id="6557" instrument_node=""> recent finding that an MNC's language mandate can cause heightened anxiety among the non-native speakers of the working language. However, in contrast to these previous studies, which found that low-fluency individuals minimized their use of the working language and thereby deflected language-induced anxiety, this was close to impossible in the highly interdependent teams we investigated. Our data further suggest that an MNT member's anxiety negatively correlates not so much with his or her </span><em data-dcnode-id="6555"><span data-dcnode-id="6556" instrument_node="">absolute</span></em><span data-dcnode-id="6554" instrument_node=""> language proficiency but with his or her </span><em data-dcnode-id="6552"><span data-dcnode-id="6553" instrument_node="">relative</span></em><span data-dcnode-id="6551" instrument_node=""> proficiency level compared to colleagues. More specifically, informants reported feeling more secure in conversations with others who encountered similar or higher linguistic difficulties than they did. In contrast, anxieties appeared much more salient in conversations with more proficient colleagues, be they highly skilled non-native or native speakers of the shared language.</span></p><p data-dcnode-id="6527" id="p0790"><span data-dcnode-id="6549" instrument_node="">Our investigations also showed that self-directed anxiety was mostly task-related, i.e. team members were afraid to receive negative evaluations for their work, to miss important task-related information or to be unable to contribute to the team task due to limited proficiency in the team's working language. Consequently, they tried to disguise this self-directed emotion in front of colleagues and strove to sustain outward countenance. Such efforts to hide negative feelings imply a high degree of emotional labor (</span><a class="workspace-trigger" data-dcnode-id="6547" href="#bb0180" name="bbb0180"><span data-dcnode-id="6548" instrument_node="">Hinds et al., 2014</span></a><span data-dcnode-id="6546" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6544" href="#bb0250" name="bbb0250"><span data-dcnode-id="6545" instrument_node="">Lively, 2000</span></a><span data-dcnode-id="6543" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6541" href="#bb0325" name="bbb0325"><span data-dcnode-id="6542" instrument_node="">Neeley et al., 2012</span></a><span data-dcnode-id="6540" instrument_node="">), i.e. MNT members manage emotional expression to be consistent with their colleagues' expectations about appropriate emotional expression (</span><a class="workspace-trigger" data-dcnode-id="6538" href="#bb0115" name="bbb0115"><span data-dcnode-id="6539" instrument_node="">Gooty et al., 2010</span></a><span data-dcnode-id="6537" instrument_node="">). Interestingly, our findings apply not only to those MNT members whose cultures discourage the open display of emotions (particularly East Asian cultures, see </span><a class="workspace-trigger" data-dcnode-id="6535" href="#bb0290" name="bbb0290"><span data-dcnode-id="6536" instrument_node="">Mesquita &amp; Albert, 2007</span></a><span data-dcnode-id="6534" instrument_node="">), but to interviewees from all nationalities and mother tongues. This may be explained by the similarity of anxiety to fear, which causes people to avoid rather than approach the emotion-inducing event (</span><a class="workspace-trigger" data-dcnode-id="6532" href="#bb0120" name="bbb0120"><span data-dcnode-id="6533" instrument_node="">Gooty et al., 2009</span></a><span data-dcnode-id="6531" instrument_node="">). MNT leaders therefore require a high degree of empathy to recognize the hidden language-based anxieties among their subordinates. According to </span><a class="workspace-trigger" data-dcnode-id="6529" href="#bb0340" name="bbb0340"><span data-dcnode-id="6530" instrument_node="">Ostell (1996)</span></a><span data-dcnode-id="6528" instrument_node="">, employees facing extreme anxiety may even experience a state of freezing, i.e. they become incapable of taking action. Consequently, it is of utmost importance for MNT leaders to address this negative language-induced emotion.</span></p></section><section data-dcnode-id="6439" id="s0080"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6524" id="st0100"><span data-dcnode-id="6525" instrument_node="">Other-directed resentment triggered by language barriers</span></h4><p data-dcnode-id="6522" id="p0300"><span data-dcnode-id="6523" instrument_node="">In addition to self-directed anxiety, a second form of negative emotions emerged from our data: resentment towards others. Whereas we observed language-induced anxiety mostly among low- and, to a lesser degree, among medium-fluency MNT members, we found other-directed resentment to occur independent of fluency levels. However, low- and high-proficiency speakers of their team's working language tended to resent different aspects of their situation.</span></p><p data-dcnode-id="6517" id="p0795"><span data-dcnode-id="6521" instrument_node="">MNT members with low fluency levels in the working language sometimes openly displayed their resentment of the fact that they had to conduct meetings in a foreign language:</span></p><blockquote data-dcnode-id="6518"><p data-dcnode-id="6519" id="sp0070"><span data-dcnode-id="6520" instrument_node="">I don't like that we have to communicate in English all day, even though the majority of people here is German and not everyone has the same level of English proficiency. That leads to tension and dissatisfaction among the German colleagues. (CAR2 member 2, German)</span></p></blockquote><p></p><p data-dcnode-id="6506"><span data-dcnode-id="6516" instrument_node="">In line with </span><a class="workspace-trigger" data-dcnode-id="6514" href="#bb0315" name="bbb0315"><span data-dcnode-id="6515" instrument_node="">Neeley's (2013)</span></a><span data-dcnode-id="6513" instrument_node=""> finding that non-native speakers of the working language resent native speakers' ease of communication, we also found low-fluency team members disliking native speakers' ability to dominate meetings. They even resented other non-native speakers leveraging their superior language proficiency. Highly proficient or native speakers of the working language remained mostly unaware of these feelings. However, they resented the fact that their less proficient colleagues frequently switched into their mother tongues during meetings. This “code-switching” (</span><a class="workspace-trigger" data-dcnode-id="6511" href="#bb0180" name="bbb0180"><span data-dcnode-id="6512" instrument_node="">Hinds et al., 2014: 545</span></a><span data-dcnode-id="6510" instrument_node="">) produced substantial frustration among those who were unable to follow and therefore felt excluded:</span></p><blockquote data-dcnode-id="6507"><p data-dcnode-id="6508" id="sp0075"><span data-dcnode-id="6509" instrument_node="">When I was a beginner in Spanish [i.e. Castellano] I could follow conversations in Spanish only with great difficulties. But my Catalan colleagues even slipped frequently into Catalan. That made me mad and I said “Guys, that's impossible! I hardly understand anything anyway!” (AUTO2 leader, German)</span></p></blockquote><p></p><div data-dcnode-id="6467"><p data-dcnode-id="6498" id="p0325"><span data-dcnode-id="6505" instrument_node="">Our results are in line with </span><a class="workspace-trigger" data-dcnode-id="6503" href="#bb0070" name="bbb0070"><span data-dcnode-id="6504" instrument_node="">Dotan-Eliaz, Sommer and Rubin's (2009)</span></a><span data-dcnode-id="6502" instrument_node=""> finding that people who are linguistically ostracized by means of code-switching often feel rejected and angry towards co-workers. The quotes reproduced in </span><a class="workspace-trigger" data-dcnode-id="6500" href="#t0015" name="bt0015"><span data-dcnode-id="6501" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="6499" instrument_node=""> further illustrate the causes of other-directed resentment experienced by low- and high-fluency speakers of the working language.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6468" id="t0015"><span class="captions" data-dcnode-id="6491"><span data-dcnode-id="6492" id="ca0015"><p data-dcnode-id="6493" id="sp0025"><span class="label" data-dcnode-id="6496"><span data-dcnode-id="6497" instrument_node="">Table&nbsp;3</span></span><span data-dcnode-id="6495" instrument_node="">. </span><span data-dcnode-id="6494" instrument_node="">Other-directed resentment triggered by language barriers.</span></p></span></span><div class="groups" data-dcnode-id="6469"><table data-dcnode-id="6470"><thead data-dcnode-id="6485"><tr class="valign-top rowsep-1" data-dcnode-id="6486"><th class="align-left" data-dcnode-id="6489" scope="col"><span data-dcnode-id="6490" instrument_node="">Experienced by less proficient speakers of the working language</span></th><th class="align-left" data-dcnode-id="6487" scope="col"><span data-dcnode-id="6488" instrument_node="">Experienced by proficient speakers of the working language</span></th></tr></thead><tbody data-dcnode-id="6471"><tr class="valign-top" data-dcnode-id="6472"><td class="align-left" data-dcnode-id="6479"><span data-dcnode-id="6484" instrument_node="">I sometimes get annoyed if we have to speak in English only because one person doesn't understand German. I am annoyed that the whole three-hour meeting has to be in English. All of us only understand 80% and miss other things — just because of one person! (MOTOR5 member 2, German–Spanish)</span><br data-dcnode-id="6483"><span data-dcnode-id="6482" instrument_node="">This dissatisfaction was all a problem of communication. (…) These are small things, but when they pile up, every day a little more, then a critical point is reached and something is bound to happen. (AUTO1 member 4, Chinese)</span><br data-dcnode-id="6481"><span data-dcnode-id="6480" instrument_node="">They [the British] were laughing their heads off when we came over, because they were talking among themselves in their slang and we didn't understand anything. I was sitting there and said “Guys, could you PLEASE talk in some kind of style that I can also understand?” (CAR4 leader, German)</span></td><td class="align-left" data-dcnode-id="6473"><span data-dcnode-id="6478" instrument_node="">It was really frustrating for the American colleagues when my team would break away into German. (MOTOR2 leader, American)</span><br data-dcnode-id="6477"><span data-dcnode-id="6476" instrument_node="">When we have a meeting and colleagues are speaking Chinese all the time — I made it a habit to just get up and leave right away! (AUTO3 member 4, Italian)</span><br data-dcnode-id="6475"><span data-dcnode-id="6474" instrument_node="">When I worked in the US plant, there were three Germans in my team. Of course, whenever they met in the corridor, they talked in German. Some Americans really got steamed up about this — if they walked along the corridor, they didn't understand anything. (AUTO2 member 1, German)</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6462" id="p0800"><span data-dcnode-id="6466" instrument_node="">In line with research on cultural norms of emotions display (</span><a class="workspace-trigger" data-dcnode-id="6464" href="#bb0315" name="bbb0315"><span data-dcnode-id="6465" instrument_node="">Mesquita &amp; Albert, 2007</span></a><span data-dcnode-id="6463" instrument_node="">), other-directed resentment was mostly reported by informants from individualist cultures. However, indirect information like the British respondent's statement above about his Japanese colleagues allowed us to conclude that MNT members with a more collectivistic background also experienced these emotions.</span></p><p data-dcnode-id="6457"><span data-dcnode-id="6461" instrument_node="">In contrast to task-related anxiety, we found that other-directed resentment triggered by language barriers was almost exclusively of interpersonal nature, i.e. interviewees resented the way their colleagues used language resources to their advantage. Comparisons between teams furthermore demonstrated that language-induced resentment and resentment based on non-linguistic interpersonal conflict mutually reinforced each other. This finding not only supports </span><a class="workspace-trigger" data-dcnode-id="6459" href="#bb0435" name="bbb0435"><span data-dcnode-id="6460" instrument_node="">von Glinow et al.'s (2004)</span></a><span data-dcnode-id="6458" instrument_node=""> proposition that language barriers make it particularly hard to resolve conflicts by talking them through, it also shows that team members are more resentful of language mandates, unequal language proficiency and code-switching if they are biased by conflict from other sources.</span></p><p data-dcnode-id="6440" id="p0335"><span data-dcnode-id="6456" instrument_node="">These findings once more highlight the challenge for MNT leaders to recognize their subordinates' language-induced emotions. As emphasized by </span><a class="workspace-trigger" data-dcnode-id="6454" href="#bb0290" name="bbb0290"><span data-dcnode-id="6455" instrument_node="">Ostell (1996)</span></a><span data-dcnode-id="6453" instrument_node="">, negative other-directed emotions have a highly disruptive influence on personal relations within a group. Following the principle of emotional contagion (</span><a class="workspace-trigger" data-dcnode-id="6451" href="#bb0020" name="bbb0020"><span data-dcnode-id="6452" instrument_node="">Barsade, 2002</span></a><span data-dcnode-id="6450" instrument_node="">), people “catch” emotions from others, i.e. the emotion displayed by one individual is taken over by others (</span><a class="workspace-trigger" data-dcnode-id="6448" href="#bb0005" name="bbb0005"><span data-dcnode-id="6449" instrument_node="">Ashkanasy and Daus, 2002</span></a><span data-dcnode-id="6447" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6445" href="#bb0115" name="bbb0115"><span data-dcnode-id="6446" instrument_node="">Gooty et al., 2010</span></a><span data-dcnode-id="6444" instrument_node="">). As resentment or anger arises from a perceived insult and motivates the individual to actively correct this wrongdoing (</span><a class="workspace-trigger" data-dcnode-id="6442" href="#bb0120" name="bbb0120"><span data-dcnode-id="6443" instrument_node="">Gooty et al., 2009</span></a><span data-dcnode-id="6441" instrument_node="">), resentful team members may either approach others in an aggressive way and thereby trigger resentment from their counterparts' side or talk negatively about third persons, thus passing on own negative feelings to others. As will be shown in the following section, MNT leaders need to manage these effects carefully.</span></p></section></section><section data-dcnode-id="6121" id="s0085"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6436" id="st0105"><span data-dcnode-id="6437" instrument_node="">Finding solutions: three emotion management strategies for MNT leaders</span></h3><p data-dcnode-id="6434" id="p0355"><span data-dcnode-id="6435" instrument_node="">In response to our second research question, our data collection and analysis revealed a series of measures MNT leaders have at their disposal to mitigate their subordinates' negative language-induced emotions. Through our coding process, we established that these measures fall into three general emotion management strategies.</span></p><section data-dcnode-id="6322" id="s0090"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6432" id="st0110"><span data-dcnode-id="6433" instrument_node="">Reducing the impact of language barriers</span></h4><p data-dcnode-id="6430" id="p0360"><span data-dcnode-id="6431" instrument_node="">The first and most effective leadership strategy aims to reduce the negative impact of language barriers on MNT members. MNT members are much less likely to experience negative emotions if their leader succeeds in diffusing the actual problematic situation and thereby takes away the cause of negative emotions. Our investigations have shown that language-related causes of emotions may be diffused by the following measures: moderating subordinates' code-switching, allocating speaking time to less proficient team members and enhancing understanding through frequent repetitions.</span></p><p data-dcnode-id="6425" id="p0805"><span data-dcnode-id="6429" instrument_node="">Preventing subordinates from frequent code-switching to their native tongues in the presence of colleagues unable to understand this language emerged as a very important measure in this context. Our informants considered the degree of language discipline to be an important element of a team's work culture, which the MNT leader can shape:</span></p><blockquote data-dcnode-id="6426"><p data-dcnode-id="6427" id="sp0080"><span data-dcnode-id="6428" instrument_node="">It depends on the culture you introduce to your team. If you as the leader allow language switching, it will happen again and again. But if you try to control it, it won't happen so much. (AUTO2 leader, German)</span></p></blockquote><p></p><p data-dcnode-id="6420"><span data-dcnode-id="6424" instrument_node="">Whereas our informants recognized the importance of restricting side-conversations in tongues other than the working language, they acknowledged that striving for absolute language discipline would also create emotional strain. As shown above, the mandate to use a foreign language in all workplace communication meets stress-based resentment among less proficient speakers. Leaders of multilingual teams therefore need to perform a tightrope walk between imposing a strict language discipline and granting team members the occasion to confer in their own language, particularly at occasions when they simply want to ensure they have understood arguments put forward in the working language. An American MNT leader with German proficiency highlighted the importance of his moderating role:</span></p><blockquote data-dcnode-id="6421"><p data-dcnode-id="6422" id="sp0085"><span data-dcnode-id="6423" instrument_node="">It was frustrating for the American colleagues when we would break into German. You'd have to excuse and say “Hey, we got to get through this.” Then as long as you in the end did a good job of summarizing what had been said, I think that being an American myself, they trusted that I summarized the previous discussions in German correctly and that everything was correctly communicated. (MOTOR2 leader, American)</span></p></blockquote><p></p><p data-dcnode-id="6415" id="p0810"><span data-dcnode-id="6419" instrument_node="">The MNT leader's balancing act becomes particularly challenging if side conversations are triggered by emotional content, on the one hand reinforcing the code-switchers' impulse to discuss these sensitive issues in their native tongue, while simultaneously increasing tension among excluded colleagues. In these cases, MNT leaders should ask for summaries of side conversations, which may help code-switchers to distance themselves from their initial emotional outbreaks:</span></p><blockquote data-dcnode-id="6416"><p data-dcnode-id="6417" id="sp0090"><span data-dcnode-id="6418" instrument_node="">I have learned that strategically allowing this [code-switching] in short segments actually builds trust — as long as the mother tongue group discussion is then translated in summary form, including the emotional elements that were seen but not understood by the complete group. I have also found that repeating the emotional portion in summary form often creates humor and diffuses the tenseness of the original situation. (MOTORCORP superordinate manager 1, American)</span></p></blockquote><p></p><p data-dcnode-id="6410"><span data-dcnode-id="6414" instrument_node="">Besides acting as a moderator for code-switching, our data suggest that the MNT leader can also reduce the impact of language barriers on subordinates by actively allocating speaking time to less fluent team members:</span></p><blockquote data-dcnode-id="6411"><p data-dcnode-id="6412" id="sp0095"><span data-dcnode-id="6413" instrument_node="">The team leader helped me to integrate myself into the team. He gives me the time to talk about my issues. Because the meetings are held in English and English speakers are so fast, I cannot interrupt them. That is very difficult! The team leader has noticed my situation, so he gives me time. (MOTOR2 member 9, Japanese)</span></p></blockquote><p></p><p data-dcnode-id="6402" id="p0815"><span data-dcnode-id="6409" instrument_node="">Enabling low-fluency team members to gain voice in a foreign-language conversation emerged as an effective remedy against the anxiety they experience. To complement this measure, MNT leaders also need to remind English native speakers to speak “international English” with a reduced lexical variety (</span><a class="workspace-trigger" data-dcnode-id="6407" href="#bb0175" name="bbb0175"><span data-dcnode-id="6408" instrument_node="">Henderson, 2005: 76</span></a><span data-dcnode-id="6406" instrument_node="">), avoiding slang, jargon and any particular accent they might have, and to decrease their speaking speed:</span></p><blockquote data-dcnode-id="6403"><p data-dcnode-id="6404" id="sp0100"><span data-dcnode-id="6405" instrument_node="">I have to slow down our American native speakers if I notice that the speed must be too high for the others. I have to make sure that they articulate themselves clearly. (AUTOCORP superordinate manager 1, German)</span></p></blockquote><p></p><p data-dcnode-id="6397"><span data-dcnode-id="6401" instrument_node="">Frequent repetitions and paraphrasing of important arguments by the MNT leader emerged as another important measure to enhance the clarity of communication, thereby reducing the negative impact of language barriers:</span></p><blockquote data-dcnode-id="6398"><p data-dcnode-id="6399" id="sp0105"><span data-dcnode-id="6400" instrument_node="">It is really helpful to build feedback cycles into team meetings – maybe after each agenda item – and to paraphrase and check if everyone is on the same page or if there are still some misunderstandings. (MOTOR2 member 6, German)</span></p></blockquote><p></p><p data-dcnode-id="6392" id="p0820"><span data-dcnode-id="6396" instrument_node="">The same interviewee, however, conceded that using this technique resembles a balancing act. If the MNT leader repeats too frequently and too obviously, some subordinates may feel patronized:</span></p><blockquote data-dcnode-id="6393"><p data-dcnode-id="6394" id="sp0110"><span data-dcnode-id="6395" instrument_node="">How quickly does someone feel loss of face, how tolerant is he for mistakes? So if I explain things twice, will this be seen as support or as an insult? Along the lines of “He explains this to me so often, he must think I'm an idiot.” (…) I think this is the crux of the matter: I need to repeat until everything is clear, but mustn't overdo it. (CAR4 leader, German)</span></p></blockquote><p></p><p data-dcnode-id="6384"><span data-dcnode-id="6391" instrument_node="">This finding coincides with </span><a class="workspace-trigger" data-dcnode-id="6389" href="#bb0450" name="bbb0450"><span data-dcnode-id="6390" instrument_node="">Williams' (2007: 599)</span></a><span data-dcnode-id="6388" instrument_node=""> proposition that even well intended offers to help can lower an employee's self-esteem by implying that he is incapable of mastering a situation on his own. A experienced manager therefore recommended to save subordinates' face by taking the blame for regular repetitions:</span></p><blockquote data-dcnode-id="6385"><p data-dcnode-id="6386" id="sp0115"><span data-dcnode-id="6387" instrument_node="">Whoever was speaking: Regularly check if things have really come across. I sometimes act the fool a little and pretend I didn't fully understand either. I summarize what I understood and ask if this came across for the others as well. (MOTORCORP superordinate manager 3, German)</span></p></blockquote><p></p><div data-dcnode-id="6337"><p data-dcnode-id="6376" id="p0445"><span data-dcnode-id="6383" instrument_node="">The interview excerpts reproduced in </span><a class="workspace-trigger" data-dcnode-id="6381" href="#t0020" name="bt0020"><span data-dcnode-id="6382" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="6380" instrument_node=""> provide an overview of leadership measures aimed at reducing the negative impact of language barriers on subordinates. Geared towards improving communication and avoiding misunderstandings, these leadership measures not only help to prevent the above-described emotional reactions to language barriers; they also enhance the team's efficiency in task fulfillment. This may explain why informants from all nationalities, who might otherwise be expected to favor different leadership styles (</span><a class="workspace-trigger" data-dcnode-id="6378" href="#bb0195" name="bbb0195"><span data-dcnode-id="6379" instrument_node="">House et al., 2004</span></a><span data-dcnode-id="6377" instrument_node="">), equally mentioned these measures as hallmarks of effective multilingual leadership.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6338" id="t0020"><span class="captions" data-dcnode-id="6369"><span data-dcnode-id="6370" id="ca0020"><p data-dcnode-id="6371" id="sp0030"><span class="label" data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">Table&nbsp;4</span></span><span data-dcnode-id="6373" instrument_node="">. </span><span data-dcnode-id="6372" instrument_node="">Preventing language-induced negative emotions by reducing the impact of language barriers.</span></p></span></span><div class="groups" data-dcnode-id="6339"><table data-dcnode-id="6340"><thead data-dcnode-id="6361"><tr class="valign-top rowsep-1" data-dcnode-id="6362"><th class="align-left" data-dcnode-id="6367" scope="col"><span data-dcnode-id="6368" instrument_node="">Moderate code-switching</span></th><th class="align-left" data-dcnode-id="6365" scope="col"><span data-dcnode-id="6366" instrument_node="">Allocate speaking time to less fluent team members</span></th><th class="align-left" data-dcnode-id="6363" scope="col"><span data-dcnode-id="6364" instrument_node="">Secure understanding through redundant communication</span></th></tr></thead><tbody data-dcnode-id="6341"><tr class="valign-top" data-dcnode-id="6342"><td class="align-left" data-dcnode-id="6355"><span data-dcnode-id="6360" instrument_node="">A short coordination in another language is legitimate. But afterwards this group has to state what has been discussed and that the side conversation is over. (CAR2 leader, Austrian)</span><br data-dcnode-id="6359"><span data-dcnode-id="6358" instrument_node="">We have one person in the team who speaks no German at all. Everyone keeps forgetting that. I must constantly say: “Hey guys, English! Stop, change back!” And then they look at me grumpily: “Ooh, ok.” (MOTOR1 leader, American)</span><br data-dcnode-id="6357"><span data-dcnode-id="6356" instrument_node="">When I lead a meeting I always say “No conversations in your mother tongues, please! Everyone please stick to English, so that we can all listen.” Of course, if we get down into details it may sometimes be more efficient if the team leader quickly confirms something with team members in their mother tongue. It’s ok if this is announced. We quickly talk it through and then try to bring this in for the rest of the team. (AUTO2 leader, German)</span></td><td class="align-left" data-dcnode-id="6349"><span data-dcnode-id="6354" instrument_node="">The team leader needs to meet people where they stand. He just cannot let someone be silent over a two-hour meeting, if on the other side a colleague is talking like a machine gun! (CAR1 member 2, Brazilian)</span><br data-dcnode-id="6353"><span data-dcnode-id="6352" instrument_node="">You turn to the Japanese colleagues and you say: “Well, what do you think about this?” Everyone else was polite enough to accept “Ok, now we need to listen to a Japanese colleague.” Initially that was how you got them to speak. But later on, they felt more like “I’m ok to speak in this group” and “This group listens to me, this group will respect me.” (MOTOR2 leader, American)</span><br data-dcnode-id="6351"><span data-dcnode-id="6350" instrument_node="">I’m inhibited myself if I have to present my topics in English. If I have to ask a question to everyone, but got the sentence wrong … I think that happens everywhere. If you notice that you have such people in the team, then you should explicitly give them their speaking turns and encourage them to voice their opinions. (AUTO4 leader, German)</span></td><td class="align-left" data-dcnode-id="6343"><span data-dcnode-id="6348" instrument_node="">I think it’s my task to say: “Guys, please come again slowly for the stupid German. I didn’t catch this, please explain once more.” Then they change down one gear. (CAR3 leader, German)</span><br data-dcnode-id="6347"><span data-dcnode-id="6346" instrument_node="">Oftentimes you would have to listen to the German speaker and interpret for the Japanese. And the Japanese speakers, you have to listen to them and interpret that for the Germans. Even if it was all done in English, you would still have to clarify different points. (MOTOR2 leader, American)</span><br data-dcnode-id="6345"><span data-dcnode-id="6344" instrument_node="">The team leader always has to put extra effort in speaking with those who may not have understood. So we have many meetings about the same issue to secure understanding. You have to build in redundancies. (AUTO1 member 3, German)</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6323" id="p0825"><span data-dcnode-id="6336" instrument_node="">By reducing incidents of code-switching, making sure that less proficient MNT members have enough time to contribute and fostering understanding through frequent repetitions, MNT leaders reduce the linguistic exclusion and misunderstandings which are likely to trigger negative emotions in the first place. If we compare our findings to the established model of emotion management (see e.g. </span><a class="workspace-trigger" data-dcnode-id="6334" href="#bb0175" name="bbb0175"><span data-dcnode-id="6335" instrument_node="">Gross and Thompson, 2007</span></a><span data-dcnode-id="6333" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6331" href="#bb0245" name="bbb0245"><span data-dcnode-id="6332" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="6330" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6328" href="#bb0450" name="bbb0450"><span data-dcnode-id="6329" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="6327" instrument_node="">), the leadership measures which emerged from our study show parallels to the general strategy of altering an emotion provoking situation. Concerning team members facing language barriers, </span><a class="workspace-trigger" data-dcnode-id="6325" href="#bb0180" name="bbb0180"><span data-dcnode-id="6326" instrument_node="">Hinds et al. (2014)</span></a><span data-dcnode-id="6324" instrument_node=""> found that they are often caught up in their negative emotions and frequently resort to behaviors igniting further negative emotional responses among their colleagues. Our study has shown, however, that skillful MNT leaders have the capability to approach this problem from a more rationally detached vantage point, enabling them to reduce the impact of language barriers for everyone in their teams. Going beyond previous research, we have been able to specify concrete measures of how the impact of language barriers on team members can be mitigated. Consequently, our study supports the established and more general model of emotion management and contextualizes it specifically for multilingual workplaces.</span></p></section><section data-dcnode-id="6221" id="s0095"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6320" id="st0115"><span data-dcnode-id="6321" instrument_node="">Redirecting MNT members' attention away from language barriers</span></h4><p data-dcnode-id="6318" id="p0460"><span data-dcnode-id="6319" instrument_node="">Not in all cases can MNT leaders alter the situation by diffusing the impact of language barriers on communication. In those instances where this strategy is not applicable, we found that MNT leaders still have means to mitigate the disruptive effect of language barriers on team members' emotions. One strategy towards this end lies, according to our data, in redirecting subordinates' attention away from the language barriers and their negative effects. MNT leaders may achieve this with the help of humor and joking or by focusing subordinates' attention on common goals.</span></p><p data-dcnode-id="6313" id="p0845"><span data-dcnode-id="6317" instrument_node="">According to many interviewees, the use of humor may be a successful leadership measure to relax or lighten emotionally burdensome situations produced by language barriers:</span></p><blockquote data-dcnode-id="6314"><p data-dcnode-id="6315" id="sp0120"><span data-dcnode-id="6316" instrument_node="">You need icebreakers, which make people smile or laugh. (…) You need something different, something funny to relax the situation a little bit. (MOTOR2 member 6, German)</span></p></blockquote><p></p><p data-dcnode-id="6305"><span data-dcnode-id="6312" instrument_node="">This is in line with </span><a class="workspace-trigger" data-dcnode-id="6310" href="#bb0330" name="bbb0330"><span data-dcnode-id="6311" instrument_node="">Niven et al. (2009)</span></a><span data-dcnode-id="6309" instrument_node="">, who state that joking can shift people's attention. However, this emotion management measure may not always be easy to implement, since humor requires a high level of language proficiency. Reflecting this tension, MNT leaders who spoke the working language as their mother tongue frequently recommended using humor, whereas non-native speakers took a more skeptical position towards this technique. Clearly, MNT leaders should not rely on sophisticated puns, which may exacerbate the feeling of exclusion among less proficient speakers of the working language. Instead, they may target language differences as a source of humor in itself:</span></p><blockquote data-dcnode-id="6306"><p data-dcnode-id="6307" id="sp0125"><span data-dcnode-id="6308" instrument_node="">I always joke about the fact that my level of German skills is similar to what you would hear from a kindergartener. So when you drop the conversation down to kindergarten level, that helps lighten the mood sometimes in a very difficult conversation. (MOTORCORP superordinate manager 1, American)</span></p></blockquote><p></p><p data-dcnode-id="6300" id="p0850"><span data-dcnode-id="6304" instrument_node="">Given that laughter creates a feeling of sociability and links people together, humor may be a means to avoid a quarrel, solve a conflict, play down disagreement or help to overcome awkward situations. Following the principles of emotional contagion (</span><a class="workspace-trigger" data-dcnode-id="6302" href="#bb0330" name="bbb0330"><span data-dcnode-id="6303" instrument_node="">Barsade, 2002</span></a><span data-dcnode-id="6301" instrument_node="">), an MNT leader who frequently uses humor to lighten the mood can effectively spread positive emotions. Yet, in some cultures the use of too much humor at the workplace carries also the risk for the MNT leader of appearing an unserious person. Confining the use of humor to after-hours occasions (e.g., in Germany or Japan) can help to lighten the emotional burden while at the same time preserving the MNT leader's authority and professionalism.</span></p><p data-dcnode-id="6295"><span data-dcnode-id="6299" instrument_node="">Highlighting the similarities of individual team members and their common goals emerged as a second frequently mentioned technique to redirect MNT members' attention in a positive way. MNT leaders may bring their subordinates closer together and disperse language-induced resentment by stressing similarities on the individual level:</span></p><blockquote data-dcnode-id="6296"><p data-dcnode-id="6297" id="sp0130"><span data-dcnode-id="6298" instrument_node="">You need to highlight similarities and teach your staff that regardless of your language, your culture, at the end of the day we are all basically coming from the same background. Put your kids in a good school, put food on your table, save for your retirement — no matter where someone comes from, which culture or mother tongue, everyone has the same goals. (MOTOR1 leader, American)</span></p></blockquote><p></p><p data-dcnode-id="6290" id="p0485"><span data-dcnode-id="6294" instrument_node="">More important than highlighting individual commonalities, however, is an emphasis on a common professional objective. If the members of a multilingual work group focus on their individual similarities and on common professional goals, language differences retreat into the background:</span></p><blockquote data-dcnode-id="6291"><p data-dcnode-id="6292" id="sp0135"><span data-dcnode-id="6293" instrument_node="">We have a common goal that we want to achieve. That is what brings us together. Team members are not interested in language barriers as long as they focus on their common objective. (CAR3 leader, German)</span></p></blockquote><p></p><p data-dcnode-id="6273" id="p0855"><span data-dcnode-id="6289" instrument_node="">These team-specific findings coincide with previous studies from the larger literature on global leadership. </span><a class="workspace-trigger" data-dcnode-id="6287" href="#bb0205" name="bbb0205"><span data-dcnode-id="6288" instrument_node="">Huy (1999)</span></a><span data-dcnode-id="6286" instrument_node="">, for instance, believes that successful leadership requires inspiring followers with a captivating vision of shared goals. </span><a class="workspace-trigger" data-dcnode-id="6284" href="#bb0030" name="bbb0030"><span data-dcnode-id="6285" instrument_node="">Bird et al. (2010)</span></a><span data-dcnode-id="6283" instrument_node=""> even define global leadership as the process of motivating different groups to work together synergistically towards a common vision and common goal (also see </span><a class="workspace-trigger" data-dcnode-id="6281" href="#bb0285" name="bbb0285"><span data-dcnode-id="6282" instrument_node="">Mendenhall et al., 2012</span></a><span data-dcnode-id="6280" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6278" href="#bb0335" name="bbb0335"><span data-dcnode-id="6279" instrument_node="">Osland, 2008</span></a><span data-dcnode-id="6277" instrument_node="">). If MNC employees focus on this common ground, interaction can be facilitated and negative emotions reduced (</span><a class="workspace-trigger" data-dcnode-id="6275" href="#bb0390" name="bbb0390"><span data-dcnode-id="6276" instrument_node="">Schweiger, Atamer, &amp; Calori, 2003</span></a><span data-dcnode-id="6274" instrument_node="">).</span></p><div data-dcnode-id="6222"><p data-dcnode-id="6253" id="p0515"><span data-dcnode-id="6272" instrument_node="">The interview excerpts reproduced in </span><a class="workspace-trigger" data-dcnode-id="6270" href="#t0025" name="bt0025"><span data-dcnode-id="6271" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="6269" instrument_node=""> further illustrate the measures MNT leaders can use to redirect subordinates' attention away from language barriers. By using humor to make subordinates forget the language-induced emotional burden or by focusing team members' attention on the team's common goals, MNT leaders “distract attention away from the emotion-provoking situation” (</span><a class="workspace-trigger" data-dcnode-id="6267" href="#bb0450" name="bbb0450"><span data-dcnode-id="6268" instrument_node="">Williams, 2007: 605</span></a><span data-dcnode-id="6266" instrument_node="">). If we compare our findings with the established typology of emotion management strategies (see e.g. </span><a class="workspace-trigger" data-dcnode-id="6264" href="#bb0135" name="bbb0135"><span data-dcnode-id="6265" instrument_node="">Gross and Thompson, 2007</span></a><span data-dcnode-id="6263" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6261" href="#bb0245" name="bbb0245"><span data-dcnode-id="6262" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="6260" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6258" href="#bb0330" name="bbb0330"><span data-dcnode-id="6259" instrument_node="">Niven et al., 2009</span></a><span data-dcnode-id="6257" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6255" href="#bb0450" name="bbb0450"><span data-dcnode-id="6256" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="6254" instrument_node="">), we find interesting parallels. Hence, our findings constitute a specification for multilingual settings of the general strategy of altering attention by distracting from the cause of emotions.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6223" id="t0025"><span class="captions" data-dcnode-id="6246"><span data-dcnode-id="6247" id="ca0025"><p data-dcnode-id="6248" id="sp0035"><span class="label" data-dcnode-id="6251"><span data-dcnode-id="6252" instrument_node="">Table&nbsp;5</span></span><span data-dcnode-id="6250" instrument_node="">. </span><span data-dcnode-id="6249" instrument_node="">Mitigating language-induced negative emotions by redirecting MNT members’ attention away from language barriers.</span></p></span></span><div class="groups" data-dcnode-id="6224"><table data-dcnode-id="6225"><thead data-dcnode-id="6240"><tr class="valign-top rowsep-1" data-dcnode-id="6241"><th class="align-left" data-dcnode-id="6244" scope="col"><span data-dcnode-id="6245" instrument_node="">Use humor and joking</span></th><th class="align-left" data-dcnode-id="6242" scope="col"><span data-dcnode-id="6243" instrument_node="">Highlight common goals</span></th></tr></thead><tbody data-dcnode-id="6226"><tr class="valign-top" data-dcnode-id="6227"><td class="align-left" data-dcnode-id="6234"><span data-dcnode-id="6239" instrument_node="">Overall, we have a good cooperation despite the sometimes rather bumpy language issues. If someone makes a joke then things look good and positive again. (MOTOR2 member 3, American)</span><br data-dcnode-id="6238"><span data-dcnode-id="6237" instrument_node="">If humor comes into play you need certain sensitivity for the language. (…) The longer you lived abroad the easier you will find it to have a casual conversation. (CAR3 member 2, German)</span><br data-dcnode-id="6236"><span data-dcnode-id="6235" instrument_node="">It’s really difficult to make a joke in a language that isn’t your own. This can easily backfire. (AUTO5 leader, German)</span></td><td class="align-left" data-dcnode-id="6228"><span data-dcnode-id="6233" instrument_node="">If your team agrees that you all have the same goals, then they realize “Hey! We all go into the same direction, just use different ways!” And when they got this, I noticed, the team really comes together. (AUTO3 leader, German)</span><br data-dcnode-id="6232"><span data-dcnode-id="6231" instrument_node="">As long as they see the common goal as the highest objective cooperation across language barriers is possible. It really helps to see the bigger picture. (MOTOR2 leader, American)</span><br data-dcnode-id="6230"><span data-dcnode-id="6229" instrument_node="">We have a common goal and are all working towards it. If everyone is willing to do this, then we can deal with all other problems. (AUTO5 member 1, German)</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="6122" id="s0100"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6219" id="st0120"><span data-dcnode-id="6220" instrument_node="">Reducing the negative appraisal of language barriers</span></h4><p data-dcnode-id="6214" id="p0865"><span data-dcnode-id="6218" instrument_node="">Based on our interviews we found that MNT leaders can also mitigate the problematic relationship between language barriers and negative emotions by helping subordinates to perceive language barriers as less threatening. If MNT members believe that their lack of fluency in the working language impairs team efficiency or harms their personal standing in the team, they will experience intense negative emotions. In contrast, if they can be convinced that the team will effectively cope with language barriers and that individual contributions are appraised independent of fluency, they will be more relaxed. Guiding subordinates towards the latter view emerged as an important emotion management strategy from our investigations. We found evidence for two major leadership techniques to achieve this: conveying appreciation for everyone's contributions and conducting meta-communication about the impact of language barriers. We found in particular the former measure to be highly instrumental for MNT members' positive appraisals of their multilingual work environments:</span></p><blockquote data-dcnode-id="6215"><p data-dcnode-id="6216" id="sp0140"><span data-dcnode-id="6217" instrument_node="">I think the first and foremost prerequisites are trust, mutual appreciation and respect. That is the most important thing, no matter which language you speak. This creates open communication — on this basis you can achieve a lot. (MOTOR5 leader, Chinese)</span></p></blockquote><p></p><p data-dcnode-id="6206"><span data-dcnode-id="6213" instrument_node="">Supporting </span><a class="workspace-trigger" data-dcnode-id="6211" href="#bb0330" name="bbb0330"><span data-dcnode-id="6212" instrument_node="">Niven et al.'s (2009)</span></a><span data-dcnode-id="6210" instrument_node=""> proposition that an individual's emotional state can be improved by explicitly valuing this person, our informants highlighted that MNT leaders need to give everyone the impression that their contribution is valued, even if it is brought forward in halting speech. Language barriers appeared much less threatening if leaders explicitly communicated positive evaluations to low-fluency speakers. This finding lends support to </span><a class="workspace-trigger" data-dcnode-id="6208" href="#bb0320" name="bbb0320"><span data-dcnode-id="6209" instrument_node="">Neeley's (2012)</span></a><span data-dcnode-id="6207" instrument_node=""> recommendation to increase employee's beliefs in their language capacity through positive reinforcement.</span></p><p data-dcnode-id="6201" id="p0530"><span data-dcnode-id="6205" instrument_node="">As a second technique to reduce subordinates' negative appraisal of language barriers, MNT leaders can encourage open discussions about the effects of language differences:</span></p><blockquote data-dcnode-id="6202"><p data-dcnode-id="6203" id="sp0145"><span data-dcnode-id="6204" instrument_node="">Team leaders need to say: “We have a global team here. If time permits, let's take half a day to talk about our differences. Let's understand how the others tick, let's develop a common understanding this way. Let's define clear rules for communication.” (MOTOR2 member 6, German)</span></p></blockquote><p></p><p data-dcnode-id="6199" id="p0870"><span data-dcnode-id="6200" instrument_node="">This meta-communication raises the capacity of individual team members to recognize their colleagues' emotions and, consequently, creates the prerequisites for jointly counteracting disruptive emotional dynamics. In many cases, open communication reduces language-induced anxiety and resentment merely by showing team members that others experience similar problems, by creating emotional solidarity and by revealing the underlying reasons of colleagues' language-induced coping behaviors such as code-switching.</span></p><p data-dcnode-id="6191"><span data-dcnode-id="6198" instrument_node="">Our informants' conviction that teams facing language differences need to engage in collective self-reflection through open communication is in line with previous conflict management research suggesting that sharing is an efficient means of regulating one's emotions (</span><a class="workspace-trigger" data-dcnode-id="6196" href="#bb0385" name="bbb0385"><span data-dcnode-id="6197" instrument_node="">Salovey et al., 2008</span></a><span data-dcnode-id="6195" instrument_node="">). In this we differ from </span><a class="workspace-trigger" data-dcnode-id="6193" href="#bb0435" name="bbb0435"><span data-dcnode-id="6194" instrument_node="">von Glinow et al. (2004)</span></a><span data-dcnode-id="6192" instrument_node="">, who proposed that talk may not be an optimal solution to the emotional problems of MNTs. According to these authors, members of those cultures preferring to express feelings of conflict indirectly may not welcome candid talk. Moreover, they argue that so-called “hot cognitions” block the ability of emotionally agitated individuals to find the right words in a foreign language. We argue that these effects hardly impede the type of meta-communication suggested by our informants, since it is of a more general, preventive nature. It does not force team members to talk about concrete incidents and emotions, but operates like general awareness training. One informant who joined his team in the role of a cross-cultural coach proposed to discuss emotional issues in the form of anonymized case studies to avoid any face threatening implications.</span></p><div data-dcnode-id="6140"><p data-dcnode-id="6171" id="p0555"><span data-dcnode-id="6190" instrument_node="">Meta-communication about language barriers and their emotional implications encourages the affected individuals to understand their counterparts' feelings and motivations through perspective-taking, i.e. through imagining their thoughts, motives, or feelings from their point of view (</span><a class="workspace-trigger" data-dcnode-id="6188" href="#bb0450" name="bbb0450"><span data-dcnode-id="6189" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="6187" instrument_node="">). Previous studies have shown that perspective taking reduces intergroup bias, prejudice, stereotyping and outgroup derogation (</span><a class="workspace-trigger" data-dcnode-id="6185" href="#bb0090" name="bbb0090"><span data-dcnode-id="6186" instrument_node="">Galinsky &amp; Moskowitz, 2000</span></a><span data-dcnode-id="6184" instrument_node="">). Whereas this skill is helpful in all cooperative settings (</span><a class="workspace-trigger" data-dcnode-id="6182" href="#bb0125" name="bbb0125"><span data-dcnode-id="6183" instrument_node="">Grant &amp; Berry, 2011</span></a><span data-dcnode-id="6181" instrument_node="">), it is seen as especially important for realizing the potential benefits of diversity at the workplace (</span><a class="workspace-trigger" data-dcnode-id="6179" href="#bb0185" name="bbb0185"><span data-dcnode-id="6180" instrument_node="">Hoever, van Knippenberg, van Ginkel, &amp; Barkema, 2012</span></a><span data-dcnode-id="6178" instrument_node="">). More specifically, our study reinforces </span><a class="workspace-trigger" data-dcnode-id="6176" href="#bb0180" name="bbb0180"><span data-dcnode-id="6177" instrument_node="">Hinds et al.'s (2014)</span></a><span data-dcnode-id="6175" instrument_node=""> recent finding that perspective-taking helps to mitigate language-induced negative emotions among MNT members: if high- and low-fluency speakers of the working language try to see the situation from each other's point of view, they can define agreed-upon procedures to deal with linguistic challenges and thus prevent vicious cycles of negative emotions. To further substantiate the value of leadership measures geared towards reducing subordinates' negative appraisal of language barriers, we provide additional quotes in </span><a class="workspace-trigger" data-dcnode-id="6173" href="#t0030" name="bt0030"><span data-dcnode-id="6174" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="6172" instrument_node="">.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6141" id="t0030"><span class="captions" data-dcnode-id="6164"><span data-dcnode-id="6165" id="ca0030"><p data-dcnode-id="6166" id="sp0040"><span class="label" data-dcnode-id="6169"><span data-dcnode-id="6170" instrument_node="">Table&nbsp;6</span></span><span data-dcnode-id="6168" instrument_node="">. </span><span data-dcnode-id="6167" instrument_node="">Mitigating language-induced negative emotions by reducing MNT members’ negative appraisal of language barriers.</span></p></span></span><div class="groups" data-dcnode-id="6142"><table data-dcnode-id="6143"><thead data-dcnode-id="6158"><tr class="valign-top rowsep-1" data-dcnode-id="6159"><th class="align-left" data-dcnode-id="6162" scope="col"><span data-dcnode-id="6163" instrument_node="">Convey appreciation of everyone's contributions</span></th><th class="align-left" data-dcnode-id="6160" scope="col"><span data-dcnode-id="6161" instrument_node="">Conduct meta-communication</span></th></tr></thead><tbody data-dcnode-id="6144"><tr class="valign-top" data-dcnode-id="6145"><td class="align-left" data-dcnode-id="6152"><span data-dcnode-id="6157" instrument_node="">An integrative leadership style is important. If you know that someone doesn’t understand so well, you need to go an extra round to make sure he understands. This way you give everyone the impression that their contribution is valued, even if it comes a little slowly. (MOTOR2 member 6, German)</span><br data-dcnode-id="6156"><span data-dcnode-id="6155" instrument_node="">Just don’t pay attention to how long someone takes to speak or if he expressed himself correctly. If you treat foreign colleagues' contributions just like the ones of German colleagues, that does them really good. (AUTO2 member 3, Chinese)</span><br data-dcnode-id="6154"><span data-dcnode-id="6153" instrument_node="">You must put yourself in your colleagues' shoes. What kind of communication are they used to? The most important thing for me is showing appreciation for team members. Give them responsibilities, hear their opinions, and let them speak! (AUTO4 member 2, German)</span></td><td class="align-left" data-dcnode-id="6146"><span data-dcnode-id="6151" instrument_node="">We need joint training sessions to make all parties aware of our communication problems. (…) It is of course difficult to create the necessary interaction, because people feel inhibited. They don’t want to admit that they resent what others are doing in the first place. You need to find an elegant way to talk this through. (CAR1 member 1, German)</span><br data-dcnode-id="6150"><span data-dcnode-id="6149" instrument_node="">The team needs to understand that there can be language problems in the first place, but that there are also ways to sensitize oneself and others for these effects. (MOTOR 2 member 6, German)</span><br data-dcnode-id="6148"><span data-dcnode-id="6147" instrument_node="">I think we need to make people conscious of the fact that our diversity is a big asset, (…) that it makes our team richer. It helps a lot if everyone internalizes that. (AUTO1 member 2, German)</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6123" id="p0545"><span data-dcnode-id="6139" instrument_node="">If MNT leaders enhance subordinates' beliefs in their language capacity by conveying appreciation and encourage perspective taking through open communication about language issues, they help their subordinates to reframe the multilingual workplace situation in more positive terms. If we compare these leadership measures to reduce MNT members' negative perceptions of multilingual workplaces with established general emotion management strategies (see e.g. </span><a class="workspace-trigger" data-dcnode-id="6137" href="#bb0135" name="bbb0135"><span data-dcnode-id="6138" instrument_node="">Gross and Thompson, 2007</span></a><span data-dcnode-id="6136" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6134" href="#bb0245" name="bbb0245"><span data-dcnode-id="6135" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="6133" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6131" href="#bb0450" name="bbb0450"><span data-dcnode-id="6132" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="6130" instrument_node="">), we notice again parallels. This regards in particular the strategy of altering the cognitive meaning of a situation causing negative emotional responses. Whereas previous studies rather generally recommended fostering a positive reappraisal of emotion-provoking situations (</span><a class="workspace-trigger" data-dcnode-id="6128" href="#bb0260" name="bbb0260"><span data-dcnode-id="6129" instrument_node="">Loewenstein, 2007</span></a><span data-dcnode-id="6127" instrument_node="">), our investigation revealed specific techniques helping to reduce negative perceptions of language differences. According to </span><a class="workspace-trigger" data-dcnode-id="6125" href="#bb0135" name="bbb0135"><span data-dcnode-id="6126" instrument_node="">Gross and Thompson (2007)</span></a><span data-dcnode-id="6124" instrument_node="">, such reappraisals are very effective in that they can actually lead to decreased experience of negative emotions.</span></p></section></section><section data-dcnode-id="5985" id="s0105"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6119" id="st0125"><span data-dcnode-id="6120" instrument_node="">The positive outcomes of language-related emotion management through MNT leaders</span></h3><p data-dcnode-id="6117" id="p0575"><span data-dcnode-id="6118" instrument_node="">So far, we have identified and described a range of strategies and specific measures MNT leaders have at their disposal to mitigate negative language-induced emotions. Beyond mitigating these emotions, the MNT leaders' emotion management also leads directly to various positive leadership outcomes. We found that successful emotion management through MNT leaders in particular improves sensemaking within MNTs, creates a more productive team climate and thus enhances subordinates' willingness to follow the leader.</span></p><section data-dcnode-id="6090" id="s0110"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6115" id="st0130"><span data-dcnode-id="6116" instrument_node="">Improving sensemaking within the team</span></h4><p data-dcnode-id="6104" id="p0875"><span data-dcnode-id="6114" instrument_node="">Improved sensemaking in terms of “constructing meaning, interacting in pursuit of mutual understanding” (</span><a class="workspace-trigger" data-dcnode-id="6112" href="#bb0440" name="bbb0440"><span data-dcnode-id="6113" instrument_node="">Weick, 1995: 6</span></a><span data-dcnode-id="6111" instrument_node="">) within MNTs emerged as the most important direct outcome of the above outlined emotion management strategies. Considering than language barriers are usually conceptualized as “obstacles to effective communication” (</span><a class="workspace-trigger" data-dcnode-id="6109" href="#bb0410" name="bbb0410"><span data-dcnode-id="6110" instrument_node="">Tenzer et al., 2014: 509</span></a><span data-dcnode-id="6108" instrument_node="">), particularly the measures geared towards reducing the impact of language barriers improve the joint construction of meaning in MNTs. An American MNT leader explained how he secured mutual understanding by acting as a bridge-maker between language groups:</span></p><blockquote data-dcnode-id="6105"><p data-dcnode-id="6106" id="sp0150"><span data-dcnode-id="6107" instrument_node="">Oftentimes you would have to listen to the German speaker and interpret for the Japanese. And the Japanese speaker, you have to listen to them and interpret that for the Germans and clarify. Even if it was all done in English, you would still have to clarify different points. “Yes, they really meant this” or “No, they really meant that”. (MOTOR2 leader, American)</span></p></blockquote><p></p><p data-dcnode-id="6099"><span data-dcnode-id="6103" instrument_node="">Beyond the intuitive benefits of leadership measures reducing perceived language barriers, interventions aiming to reduce team members' negative appraisal of linguistic diversity also enhanced sensemaking:</span></p><blockquote data-dcnode-id="6100"><p data-dcnode-id="6101" id="sp0155"><span data-dcnode-id="6102" instrument_node="">The main advice I would have for a team leader is working in an integrative way. … If you know that someone doesn't understand so well, give him the impression that his contribution is valued, even if it gets communicated a little slowly. This is how you support mutual understanding. (MOTOR2 member 6, German)</span></p></blockquote><p></p><p data-dcnode-id="6091" id="p0880"><span data-dcnode-id="6098" instrument_node="">According to </span><a class="workspace-trigger" data-dcnode-id="6096" href="#bb0435" name="bbb0435"><span data-dcnode-id="6097" instrument_node="">von Glinow et al. (2004: 580)</span></a><span data-dcnode-id="6095" instrument_node="">, whenever team members experience intense emotions, their “reasoning ability … is dominated by visual imagery and sensations … including ‘hot cognitions’ that apparently block their ability to find words”. Consequently, if MNT leaders mitigate negative language-induced emotions by encouraging a positive reappraisal of linguistic diversity, they guide their subordinates back to detached, “cool” cognitions, which leave greater cognitive resources for rational sensemaking. Thus, they improve the quality and efficacy of collective information processing in the team, which in turn constitutes a core prerequisite for team performance (</span><a class="workspace-trigger" data-dcnode-id="6093" href="#bb0460" name="bbb0460"><span data-dcnode-id="6094" instrument_node="">Zaccaro et al., 2001</span></a><span data-dcnode-id="6092" instrument_node="">).</span></p></section><section data-dcnode-id="6054" id="s0115"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6088" id="st0135"><span data-dcnode-id="6089" instrument_node="">Creating a productive team climate</span></h4><p data-dcnode-id="6083" id="p0885"><span data-dcnode-id="6087" instrument_node="">Along with enhanced sensemaking, we also found that effective emotion management creates a more productive team climate. An experienced manager emphasized the importance of a productive team atmosphere, characterized by a focus on work performance and not on language proficiency:</span></p><blockquote data-dcnode-id="6084"><p data-dcnode-id="6085" id="sp0160"><span data-dcnode-id="6086" instrument_node="">I think when you facilitate a dialogue in a multilingual environment, the facilitator needs to create an atmosphere in which people aren't afraid to make mistakes as it relates to the language barrier. (MOTORCORP superordinate manager 1, American)</span></p></blockquote><p></p><p data-dcnode-id="6075"><span data-dcnode-id="6082" instrument_node="">In line with </span><a class="workspace-trigger" data-dcnode-id="6080" href="#bb0345" name="bbb0345"><span data-dcnode-id="6081" instrument_node="">Ozcelik et al.'s (2008)</span></a><span data-dcnode-id="6079" instrument_node=""> belief that encouragement through positive feedback improves emotional climate, we also found that MNT leaders communicating performance-related appreciation to low-fluency speakers can guide team members to a favorable assessment of MNT diversity. However, a productive climate is not only created through leadership strategies geared towards a positive reappraisal of diversity. Redirecting team members' attention away from language barriers may already suffice:</span></p><blockquote data-dcnode-id="6076"><p data-dcnode-id="6077" id="sp0165"><span data-dcnode-id="6078" instrument_node="">If you regularly tell a joke or something else, something casual, to relax the situation a little bit, then you can create a climate of wellbeing over time. Then you suddenly make progress with your task again! (MOTOR2 member 6, German)</span></p></blockquote><p></p><p data-dcnode-id="6055" id="p0890"><span data-dcnode-id="6074" instrument_node="">Team climate is important for team members' motivation to learn or at least appreciate the use of relevant foreign languages (</span><a class="workspace-trigger" data-dcnode-id="6072" href="#bb0345" name="bbb0345"><span data-dcnode-id="6073" instrument_node="">Youssef &amp; Luthans, 2012</span></a><span data-dcnode-id="6071" instrument_node="">). It fosters the performance of work groups by increasing trust, cooperation and cohesion between members (</span><a class="workspace-trigger" data-dcnode-id="6069" href="#bb0020" name="bbb0020"><span data-dcnode-id="6070" instrument_node="">Barsade, 2002</span></a><span data-dcnode-id="6068" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6066" href="#bb0395" name="bbb0395"><span data-dcnode-id="6067" instrument_node="">Stewart et al., 2011</span></a><span data-dcnode-id="6065" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6063" href="#bb0450" name="bbb0450"><span data-dcnode-id="6064" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="6062" instrument_node="">), by heightening organizational identification and optimism (</span><a class="workspace-trigger" data-dcnode-id="6060" href="#bb0205" name="bbb0205"><span data-dcnode-id="6061" instrument_node="">Huy, 1999</span></a><span data-dcnode-id="6059" instrument_node="">) and by encouraging risk taking among innovators (</span><a class="workspace-trigger" data-dcnode-id="6057" href="#bb0275" name="bbb0275"><span data-dcnode-id="6058" instrument_node="">McAllister, 1995</span></a><span data-dcnode-id="6056" instrument_node="">).</span></p></section><section data-dcnode-id="5986" id="s0120"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6052" id="st0140"><span data-dcnode-id="6053" instrument_node="">Increasing subordinates' willingness to follow</span></h4><p data-dcnode-id="6047" id="p0895"><span data-dcnode-id="6051" instrument_node="">In close connection with the above-described effects, we found that MNT leaders who successfully manage
