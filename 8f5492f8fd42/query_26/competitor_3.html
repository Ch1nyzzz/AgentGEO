 language-induced emotions are held in high esteem among their subordinates, who appreciate and willingly follow their initiatives. A German MNT leader explained how an emotionally aware approach increased a Japanese subordinate's contribution to the team:</span></p><blockquote data-dcnode-id="6048"><p data-dcnode-id="6049" id="sp0170"><span data-dcnode-id="6050" instrument_node="">In the beginning, X-San wasn't integrated into the team. He just sat there and left after the meeting. When I took over the team I started to assign jobs to him, which he can clarify with his Japanese colleagues and bring back to the team. I encourage him in this work, so he feels like an accepted team member. I can really see how he has been thriving since he started on these tasks. He is always very cooperative, fulfills his jobs very well. I think he feels good about this. (MOTOR4 leader, German)</span></p></blockquote><p></p><p data-dcnode-id="6042"><span data-dcnode-id="6046" instrument_node="">Subordinates, who willingly embraced the culture their MNT leader aimed to inculcate in the group, shared this positive appraisal of emotionally aware leadership:</span></p><blockquote data-dcnode-id="6043"><p data-dcnode-id="6044" id="sp0175"><span data-dcnode-id="6045" instrument_node="">We are adopting the “we can do it”-mentality from the Americans. I have to say that the leaders of our global functional teams do a pretty good job in rallying everyone around this culture. (MOTOR1 member 2, German)</span></p></blockquote><p></p><div data-dcnode-id="5995"><p data-dcnode-id="6034" id="p0650"><span data-dcnode-id="6041" instrument_node="">Considering </span><a class="workspace-trigger" data-dcnode-id="6039" href="#bb0200" name="bbb0200"><span data-dcnode-id="6040" instrument_node="">House and Javidan's (2004: 15)</span></a><span data-dcnode-id="6038" instrument_node=""> definition of leadership as “the ability of an individual to influence, motivate, and enable others”, inspiring a willingness to follow is a hallmark of effective leaders. Thus, if the successful management of language-induced emotions enhances MNT members' preparedness to follow their leaders, it secures the prerequisite for any type of impact these leadership personalities can make. </span><a class="workspace-trigger" data-dcnode-id="6036" href="#t0035" name="bt0035"><span data-dcnode-id="6037" instrument_node="">Table&nbsp;7</span></a><span data-dcnode-id="6035" instrument_node=""> illustrates the positive leadership outcomes of the above outlined emotion management strategies with exemplary quotations.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="5996" id="t0035"><span class="captions" data-dcnode-id="6027"><span data-dcnode-id="6028" id="ca0035"><p data-dcnode-id="6029" id="sp0045"><span class="label" data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">Table&nbsp;7</span></span><span data-dcnode-id="6031" instrument_node="">. </span><span data-dcnode-id="6030" instrument_node="">The positive outcomes of language-related emotion management through MNT leaders.</span></p></span></span><div class="groups" data-dcnode-id="5997"><table data-dcnode-id="5998"><thead data-dcnode-id="6019"><tr class="valign-top rowsep-1" data-dcnode-id="6020"><th class="align-left" data-dcnode-id="6025" scope="col"><span data-dcnode-id="6026" instrument_node="">Improved sensemaking</span></th><th class="align-left" data-dcnode-id="6023" scope="col"><span data-dcnode-id="6024" instrument_node="">More productive team climate</span></th><th class="align-left" data-dcnode-id="6021" scope="col"><span data-dcnode-id="6022" instrument_node="">Increased willingness to follow the leader</span></th></tr></thead><tbody data-dcnode-id="5999"><tr class="valign-top" data-dcnode-id="6000"><td class="align-left" data-dcnode-id="6013"><span data-dcnode-id="6018" instrument_node="">Our team leader often schedules several meetings about the same topic. This way he brings us all on the same page and ensures that everyone has understood. (MOTOR2 member 4, German)</span><br data-dcnode-id="6017"><span data-dcnode-id="6016" instrument_node="">If team members are talking and the leader notices that they do not understand each other because of German-English issues, then he steps in: “Wait, what exactly did you just say?” At least 10% of his job consists in mediating between groups, I think. (CAR5 member 1, German)</span><br data-dcnode-id="6015"><span data-dcnode-id="6014" instrument_node="">It is a little time-consuming for the leader, but he must take care that employees speaking a foreign language also somehow get all the information. He needs to motivate the others to address the foreigner directly and to clarify issues with him. (CAR2 member 2, Italian)</span></td><td class="align-left" data-dcnode-id="6007"><span data-dcnode-id="6012" instrument_node="">In our team, the leader is from America, so the meeting style is very relaxed in my opinion. … Therefore, it is easy for me to talk about my items and discuss them. So this depends on the leader. (MOTOR2 member 9, Japanese)</span><br data-dcnode-id="6011"><span data-dcnode-id="6010" instrument_node="">If the leader clearly communicates his requirements and expectations, he can change the team’s culture. Then Chinese colleagues can open up, saying “Ok, the boss wants me to say what I need, so I’ll do this next time.” We are all flexible, after all. (CAR4 member 3, Chinese)</span><br data-dcnode-id="6009"><span data-dcnode-id="6008" instrument_node="">If people have the general impression that they are treated fairly, then they will forgive smaller blunders and say “He just didn’t know this, he didn’t mean it that way.” … Fairness on the personal level is the prerequisite for a task-related discussion. (CAR3 leader, German)</span></td><td class="align-left" data-dcnode-id="6001"><span data-dcnode-id="6006" instrument_node="">I had everyone participate in these decisions: how do we organize ourselves? How do we communicate? Who calls whom? In the end, I secured that everyone supported and accepted this. … You have to give people the feeling that there is something in it for them — this really motivates them to contribute to the team. (AUTO1 leader, German)</span><br data-dcnode-id="6005"><span data-dcnode-id="6004" instrument_node="">In functional team 2, we are quite integrated. I think it is a matter of how open the leader is. The leader of functional team 1 is also quite open now, but team 3 … not so much. That makes it more difficult for the Japanese to integrate themselves into the functional team. So it really depends on how the leader acts. (MOTOR2 member 10, Japanese)</span><br data-dcnode-id="6003"><span data-dcnode-id="6002" instrument_node="">A leader with empathy can achieve so much more than someone who tries the “steamroller tactics”. You need a person who mediates between the different worlds to bring the team together. (CAR5 member 3, German)</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="5987" id="p0900"><span data-dcnode-id="5994" instrument_node="">Overall, the positive outcomes of language-related emotion management through MNT leaders we identified in our study support the widespread view that effective team leadership enhances the outcomes of multicultural and multilingual teams (</span><a class="workspace-trigger" data-dcnode-id="5992" href="#bb0465" name="bbb0465"><span data-dcnode-id="5993" instrument_node="">Zander &amp; Butler, 2010</span></a><span data-dcnode-id="5991" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5989" href="#bb0460" name="bbb0460"><span data-dcnode-id="5990" instrument_node="">Zaccaro et al. (2001: 452)</span></a><span data-dcnode-id="5988" instrument_node=""> even believe “that effective leadership processes represent perhaps the most critical factor in the success of organizational teams”, once again highlighting the relevance of our study's topic.</span></p></section></section></section><section data-dcnode-id="5743" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5982" id="st0025"><span data-dcnode-id="5983" instrument_node="">Discussion</span></h2><div data-dcnode-id="5939"><p data-dcnode-id="5959" id="p0665"><span data-dcnode-id="5981" instrument_node="">To summarize and systematize the inductively generated findings from our study, we generated a model which is depicted in </span><a class="workspace-trigger" data-dcnode-id="5979" href="#f0005" name="bf0005"><span data-dcnode-id="5980" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="5978" instrument_node="">. It illustrates the relationship between language barriers and negative emotions, which ultimately lead to reduced performance outcomes, but also details the moderating effect of leadership strategies geared to mitigate this relationship and presents their positive leadership outcomes. Providing a systematization of potential problems, our study revealed that MNT members' negative emotional reactions to language barriers can be subsumed under two central categories: self-directed anxiety and other-directed resentment. On this basis, we outlined a range of emotion management measures, which MNT leaders can engage in thanks to their formally assigned position power. We categorized these measures into three strategies: reducing the impact of language barriers; redirecting attention away from language barriers; and reducing the negative appraisal of language barriers. By employing these strategies and thus showing good leadership, MNT leaders not only mitigate negative emotions, but also generate sensemaking with their followers, create a productive team climate and increase team members' willingness to follow their leadership initiatives. Given that previous studies have already established the detrimental performance implications of negative emotions (e.g. </span><a class="workspace-trigger" data-dcnode-id="5976" href="#bb0280" name="bbb0280"><span data-dcnode-id="5977" instrument_node="">McColl-Kennedy and Anderson, 2002</span></a><span data-dcnode-id="5975" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5973" href="#bb0300" name="bbb0300"><span data-dcnode-id="5974" instrument_node="">Mooney et al., 2007</span></a><span data-dcnode-id="5972" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5970" href="#bb0435" name="bbb0435"><span data-dcnode-id="5971" instrument_node="">von Glinow et al., 2004</span></a><span data-dcnode-id="5969" instrument_node="">) and the beneficial impact of successful leadership on performance (e.g. </span><a class="workspace-trigger" data-dcnode-id="5967" href="#bb9000" name="bbb9000"><span data-dcnode-id="5968" instrument_node="">Burke et al., 2006</span></a><span data-dcnode-id="5966" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5964" href="#bb0460" name="bbb0460"><span data-dcnode-id="5965" instrument_node="">Zaccaro et al., 2001</span></a><span data-dcnode-id="5963" instrument_node="">), we indicated these relationships in </span><a class="workspace-trigger" data-dcnode-id="5961" href="#f0005" name="bf0005"><span data-dcnode-id="5962" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="5960" instrument_node=""> (in gray) without explicitly investigating them again in the present study.</span></p><figure class="figure text-xs" data-dcnode-id="5940" id="f0005"><span data-dcnode-id="5949"><img alt="" aria-describedby="ca0040" data-dcnode-id="5958" height="458" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1048984315000636-gr1.jpg&amp;raw"><span data-dcnode-id="5957" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5950"><li data-dcnode-id="5951"><a class="anchor download-link u-font-sans" data-dcnode-id="5952" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1048984315000636-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5953"><span data-dcnode-id="5956" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5941"><span data-dcnode-id="5942" id="ca0040"><p data-dcnode-id="5943" id="sp0050"><span class="label" data-dcnode-id="5947"><span data-dcnode-id="5948" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="5946" instrument_node="">. </span><span data-dcnode-id="5944" instrument_node="">Overview of language-induced emotions, MNT leaders' strategies to mitigate them and related leadership outcomes.</span></p></span></span></figure></div><section data-dcnode-id="5849" id="s0125"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5937" id="st0145"><span data-dcnode-id="5938" instrument_node="">Theoretical significance</span></h3><section data-dcnode-id="5932" id="s0130"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5935" id="st0150"><span data-dcnode-id="5936" instrument_node="">Connecting leadership, language and emotions</span></h4><p data-dcnode-id="5933" id="p0680"><span data-dcnode-id="5934" instrument_node="">By systematizing language-induced emotions and exploring possible strategies MNT leaders may apply to resolve these issues, our study has established an important link between the literatures on leadership and position power in MNTs, language barriers in MNCs and emotions in organizations. Besides providing a link between these research streams, our study also contributes to each of these areas.</span></p></section><section data-dcnode-id="5896" id="s0135"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5930" id="st0155"><span data-dcnode-id="5931" instrument_node="">Contributions to research on leadership and position power in MNTs</span></h4><p data-dcnode-id="5925" id="p0685"><span data-dcnode-id="5929" instrument_node="">Our study advances the emerging literature on MNT leadership through an analysis of the bridge-making activities leaders of multilingual teams have to perform in the context of negative emotions and the skill-sets they need for these tasks. Previous studies on MNT leadership largely neglected language-induced challenges in general and even more so those in the specific context of emotions. We address this gap by suggesting concrete strategies how MNT leaders can mitigate negative emotions within their multilingual groups and act successfully as “blenders” (</span><a class="workspace-trigger" data-dcnode-id="5927" href="#bb0050" name="bbb0050"><span data-dcnode-id="5928" instrument_node="">Butler et al., 2012: 242</span></a><span data-dcnode-id="5926" instrument_node="">), who are able to integrate proficient and less proficient speakers of the MNC's working language into effective teams.</span></p><p data-dcnode-id="5908" id="p0690"><span data-dcnode-id="5924" instrument_node="">Beyond the MNT context, our study also contributes to the wider cross-cultural leadership research aiming to define a set of global leadership competencies and skills (see e.g. </span><a class="workspace-trigger" data-dcnode-id="5922" href="#bb0030" name="bbb0030"><span data-dcnode-id="5923" instrument_node="">Bird et al., 2010</span></a><span data-dcnode-id="5921" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5919" href="#bb0240" name="bbb0240"><span data-dcnode-id="5920" instrument_node="">Levy et al., 2007</span></a><span data-dcnode-id="5918" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5916" href="#bb0335" name="bbb0335"><span data-dcnode-id="5917" instrument_node="">Osland, 2008</span></a><span data-dcnode-id="5915" instrument_node="">). Whereas the literature about leaders' global mindsets has so far focused on their cross-</span><em data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">cultural</span></em><span data-dcnode-id="5912" instrument_node=""> skills, our study highlights the need for global leaders to develop also multi</span><em data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">lingual</span></em><span data-dcnode-id="5909" instrument_node=""> competency to recognize and address the distinctive challenges linguistic diversity entails. Independent of their subordinates' particular constellation of cultures and mother tongues, leaders need to consider both factors to ensure smooth cooperation across borders.</span></p><p data-dcnode-id="5897" id="p0695"><span data-dcnode-id="5907" instrument_node="">Due to our specific focus on vertical leadership displayed by assigned MNT leaders, our study also contributes to the growing literature on position power in teamwork (see e.g. </span><a class="workspace-trigger" data-dcnode-id="5905" href="#bb5530" name="bbb5530"><span data-dcnode-id="5906" instrument_node="">Greer, 2014</span></a><span data-dcnode-id="5904" instrument_node="">). “Whether it comes from structure or from hierarchy, access to power (especially position power) is critical to one's ability to realize leadership outcomes” (</span><a class="workspace-trigger" data-dcnode-id="5902" href="#bb0215" name="bbb0215"><span data-dcnode-id="5903" instrument_node="">Kan &amp; Parry, 2004: 478</span></a><span data-dcnode-id="5901" instrument_node="">). The leaders of the 15 multilingual teams under study could effectively engage in emotion management also thanks to their formal appointment as MNT leaders. As such, they did not only succeed in stopping the vicious cycle of negative language-induced emotions, but also created a series of positive leadership outcomes. With this favorable assessment of position power in MNTs, our study contributes to the ongoing debate about the positive or negative effects of vertical differentiation in teamwork (see e.g. </span><a class="workspace-trigger" data-dcnode-id="5899" href="#bb0150" name="bbb0150"><span data-dcnode-id="5900" instrument_node="">Halevy, Chou, &amp; Galinsky, 2011</span></a><span data-dcnode-id="5898" instrument_node="">).</span></p></section><section data-dcnode-id="5882" id="s0140"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5894" id="st0160"><span data-dcnode-id="5895" instrument_node="">Contributions to research on language barriers in MNCs</span></h4><p data-dcnode-id="5883" id="p0700"><span data-dcnode-id="5893" instrument_node="">We contribute to the fast growing research stream on language barriers in MNCs by introducing the interplay of language-induced emotions and leadership into this research area. In addition, our study highlights the complexity of language effects in multinational workplaces, thereby encouraging a more sophisticated concept of language diversity in international management research. Many publications in the field of international management still focus on the instrumental benefits of a common corporate language for communication, collaboration and information sharing, assuming that language diversity can be easily managed (</span><a class="workspace-trigger" data-dcnode-id="5891" href="#bb0265" name="bbb0265"><span data-dcnode-id="5892" instrument_node="">Luo &amp; Shenkar, 2006</span></a><span data-dcnode-id="5890" instrument_node="">). However, our in-depth investigation of the emotional implications of language barriers has shown that MNCs cannot erase language barriers by simply adopting a common corporate language. These findings lend strong support to the emerging view that the traditional, “instrumental” concept of language as an easily managed, neutral code is becoming outdated (also see </span><a class="workspace-trigger" data-dcnode-id="5888" href="#bb0210" name="bbb0210"><span data-dcnode-id="5889" instrument_node="">Janssens, Lambert, &amp; Steyaert, 2004</span></a><span data-dcnode-id="5887" instrument_node="">). Reinforcing </span><a class="workspace-trigger" data-dcnode-id="5885" href="#bb0430" name="bbb0430"><span data-dcnode-id="5886" instrument_node="">Vaara et al.'s (2005: 596)</span></a><span data-dcnode-id="5884" instrument_node=""> view that “the role of natural languages in social life can hardly be overestimated”, our study demonstrates that this concept needs to be replaced by a more nuanced perspective on language which gives justice to its complex effects.</span></p></section><section data-dcnode-id="5850" id="s0145"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5880" id="st0165"><span data-dcnode-id="5881" instrument_node="">Contributions to research on emotions in organizations</span></h4><p data-dcnode-id="5851" id="p0705"><span data-dcnode-id="5879" instrument_node="">Answering to the call that “theories of emotion as well as empirical research need to take into account the context wherein emotions occur” (</span><a class="workspace-trigger" data-dcnode-id="5877" href="#bb0120" name="bbb0120"><span data-dcnode-id="5878" instrument_node="">Gooty et al., 2009: 836</span></a><span data-dcnode-id="5876" instrument_node="">), our study contributes to emotion-sensitive organizational studies by contextualizing previously established emotion management models (e.g. </span><a class="workspace-trigger" data-dcnode-id="5874" href="#bb0135" name="bbb0135"><span data-dcnode-id="5875" instrument_node="">Gross and Thompson, 2007</span></a><span data-dcnode-id="5873" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5871" href="#bb0245" name="bbb0245"><span data-dcnode-id="5872" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="5870" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5868" href="#bb0450" name="bbb0450"><span data-dcnode-id="5869" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="5867" instrument_node="">) to multilingual environments. Interestingly, our exploratory investigation only yields parallels to those emotion management strategies which </span><a class="workspace-trigger" data-dcnode-id="5865" href="#bb0135" name="bbb0135"><span data-dcnode-id="5866" instrument_node="">Gross and Thompson (2007)</span></a><span data-dcnode-id="5864" instrument_node=""> (also see </span><a class="workspace-trigger" data-dcnode-id="5862" href="#bb0245" name="bbb0245"><span data-dcnode-id="5863" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="5861" instrument_node="">) characterize as antecedent-focused. If MNT leaders reduce the impact of language barriers on communication, redirect subordinates' attention away from language barriers or encourage a more positive appraisal of language barriers, they address the causes (or antecedents) of language-induced emotions. In contrast, response-focused strategies of emotion regulation, which merely aim to manipulate emotional expressions (responses), but leave their causes unaffected, did not seem to be employed by the MNT leaders in our study. Hence, our study shows that successful MNT leaders actively address the causes of language-induced anxiety and resentment rather than merely suppressing the symptoms. Consequently, it supports the assumption that employees' emotions need to be effectively mitigated rather than repressed (</span><a class="workspace-trigger" data-dcnode-id="5859" href="#bb0340" name="bbb0340"><span data-dcnode-id="5860" instrument_node="">Ostell, 1996</span></a><span data-dcnode-id="5858" instrument_node="">), possibly also because the latter may result in job dissatisfaction and burnout (for a review see </span><a class="workspace-trigger" data-dcnode-id="5856" href="#bb0260" name="bbb0260"><span data-dcnode-id="5857" instrument_node="">Loewenstein, 2007</span></a><span data-dcnode-id="5855" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5853" href="#bb0205" name="bbb0205"><span data-dcnode-id="5854" instrument_node="">Huy (1999)</span></a><span data-dcnode-id="5852" instrument_node=""> believes that repressing emotions is particularly harmful in fast-paced environments, as it blocks creativity, impeding the emergence of new ideas. Given that creativity and innovative capabilities can be a key strength of multinational and multilingual teams, blocking emotions would be particularly harmful in these contexts.</span></p></section></section><section data-dcnode-id="5793" id="s0150"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5847" id="st0170"><span data-dcnode-id="5848" instrument_node="">Managerial relevance</span></h3><p data-dcnode-id="5830" id="p0715"><span data-dcnode-id="5846" instrument_node="">Managing emotional conflict is not only of theoretical, but also of highest practical importance (</span><a class="workspace-trigger" data-dcnode-id="5844" href="#bb0435" name="bbb0435"><span data-dcnode-id="5845" instrument_node="">von Glinow et al., 2004</span></a><span data-dcnode-id="5843" instrument_node="">), as this type of conflict can distract teams from their tasks, lower decision quality and diminish employee satisfaction and performance (</span><a class="workspace-trigger" data-dcnode-id="5841" href="#bb0300" name="bbb0300"><span data-dcnode-id="5842" instrument_node="">Mooney et al., 2007</span></a><span data-dcnode-id="5840" instrument_node="">). Negative emotions may also cause risk-aversion (</span><a class="workspace-trigger" data-dcnode-id="5838" href="#bb0375" name="bbb0375"><span data-dcnode-id="5839" instrument_node="">Reus &amp; Liu, 2004</span></a><span data-dcnode-id="5837" instrument_node="">), absenteeism and turnover (</span><a class="workspace-trigger" data-dcnode-id="5835" href="#bb0245" name="bbb0245"><span data-dcnode-id="5836" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="5834" instrument_node="">), thereby impeding MNC employees' performance potential (</span><a class="workspace-trigger" data-dcnode-id="5832" href="#bb0280" name="bbb0280"><span data-dcnode-id="5833" instrument_node="">McColl-Kennedy &amp; Anderson, 2002</span></a><span data-dcnode-id="5831" instrument_node="">). Our investigation of leadership strategies helping to mitigate negative language-induced emotions therefore carries significant implications for leaders of MNTs, their superiors and human resource managers in MNCs.</span></p><section data-dcnode-id="5822" id="s0155"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5828" id="st0175"><span data-dcnode-id="5829" instrument_node="">Being aware of the emotional impact of language barriers</span></h4><p data-dcnode-id="5823" id="p0720"><span data-dcnode-id="5827" instrument_node="">In terms of recommendations, our findings highlight the importance for MNT leaders to know about and reflect on the emotional impact of language differences. Particularly MNT leaders speaking their team's working language with high or native proficiently need to engage frequently in perspective taking to recognize how less fluent subordinates are affected. Since we found that MNT members of all nationalities and mother tongues tend to hide self-directed emotions, MNT leaders need to rely very much on indirect cues when monitoring their subordinates' language-induced emotions. Rather than expecting their subordinates to communicate their negative emotions directly, they need to observe team members' behavior to evaluate possible emotion regulation strategies. This requires a high degree of emotional awareness from MNT leaders. Recognizing language-induced emotions becomes even more challenging with respect to other-directed feelings, which team members display differently depending on their cultural backgrounds (</span><a class="workspace-trigger" data-dcnode-id="5825" href="#bb0290" name="bbb0290"><span data-dcnode-id="5826" instrument_node="">Mesquita &amp; Albert, 2007</span></a><span data-dcnode-id="5824" instrument_node="">).</span></p></section><section data-dcnode-id="5805" id="s0160"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5820" id="st0180"><span data-dcnode-id="5821" instrument_node="">Managing language-induced negative emotions</span></h4><p data-dcnode-id="5806" id="p0725"><span data-dcnode-id="5819" instrument_node="">Our study's core findings also highlight the necessity for MNT leaders to manage negative language-induced emotions actively, reinforcing </span><a class="workspace-trigger" data-dcnode-id="5817" href="#bb0470" name="bbb0470"><span data-dcnode-id="5818" instrument_node="">Zander et al.'s (2012: 594)</span></a><span data-dcnode-id="5816" instrument_node=""> critique of “laissez-faire leadership”. In agreement with </span><a class="workspace-trigger" data-dcnode-id="5814" href="#bb0415" name="bbb0415"><span data-dcnode-id="5815" instrument_node="">Thiel et al. (2012: 518)</span></a><span data-dcnode-id="5813" instrument_node="">, who believe that providing leaders with the requisite knowledge and skills for emotion regulation is crucial for effective leadership and performance, we outlined a set of concrete measures enabling MNT leaders to address the specific emotional challenges of multilingual work environments. The language-specific emotion management measures which we presented and classified into various strategies can prevent negative emotional spirals like the ones described by </span><a class="workspace-trigger" data-dcnode-id="5811" href="#bb0155" name="bbb0155"><span data-dcnode-id="5812" instrument_node="">Harzing and Feely (2008)</span></a><span data-dcnode-id="5810" instrument_node=""> or </span><a class="workspace-trigger" data-dcnode-id="5808" href="#bb0325" name="bbb0325"><span data-dcnode-id="5809" instrument_node="">Neeley et al. (2012)</span></a><span data-dcnode-id="5807" instrument_node="">. However, the beneficial impact of these strategies goes beyond preventing or mitigating negative emotions. As our study has shown, the successful management of language-induced emotions through MNT leaders also improves sensemaking within MNTs, creates a productive team climate and thus increases team members' willingness to follow the designated leader. As established by previous research, these leadership outcomes have a highly beneficial impact on team performance.</span></p></section><section data-dcnode-id="5794" id="s0165"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5803" id="st0185"><span data-dcnode-id="5804" instrument_node="">Training MNT leaders for cross-lingual sensitivity</span></h4><p data-dcnode-id="5795" id="p0730"><span data-dcnode-id="5802" instrument_node="">The present study also carries significant implications for leadership development in MNCs. Our findings suggest that MNCs should provide training programs geared towards sensitizing current and potential MNT leaders to the distinctive impact of language barriers on cooperation. The scope of diversity training, which has so far mostly focused on cultural, racial, generational or gender differences (</span><a class="workspace-trigger" data-dcnode-id="5800" href="#bb0025" name="bbb0025"><span data-dcnode-id="5801" instrument_node="">Bezrukova, Jehn, &amp; Spell, 2012</span></a><span data-dcnode-id="5799" instrument_node="">), thus needs to be expanded to include cross-</span><em data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">lingual</span></em><span data-dcnode-id="5796" instrument_node=""> sensitivity as a key qualification for MNT leaders.</span></p></section></section><section data-dcnode-id="5744" id="s0170"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5791" id="st0190"><span data-dcnode-id="5792" instrument_node="">Limitations and further research</span></h3><p data-dcnode-id="5786" id="p0740"><span data-dcnode-id="5790" instrument_node="">Our study is subject to a number of limitations, which provide the basis for further research in this area. First, we purposefully chose to keep industry and home country constant, thus being able to focus our investigation on language-induced effects. Future research could investigate language-induced emotions and related leadership strategies in other industries and home countries to discover similarities and differences across contexts. In addition, given the focus on one home country, we had a disproportionately large number of interviewees from this country. However, given that our sample still includes MNT leaders from five different nationalities and subordinates from 19 different countries, we are confident that our data provide sufficient spread to arrive at differentiated arguments about effective strategies of managing language-induced emotions. In addition, our approach also entailed advantages related to our background as researchers. Speaking the home country language German as our mother tongue and being very familiar with German business culture helped us to make sense of informants' accounts in a way that preserved the authenticity of their perspectives (</span><a class="workspace-trigger" data-dcnode-id="5788" href="#bb0235" name="bbb0235"><span data-dcnode-id="5789" instrument_node="">Langley, 1999</span></a><span data-dcnode-id="5787" instrument_node="">).</span></p><p data-dcnode-id="5784" id="p0745"><span data-dcnode-id="5785" instrument_node="">Second, space restrictions did not allow us to discuss in detail possible cultural preferences for particular emotion management strategies. However, a large majority of our interviewees across different cultural backgrounds embraced the above outlined emotion management strategies. Consequently, we found national culture to be of little relevance for the specific language-based challenges of MNT leaders. We nevertheless encourage future studies to explore in greater depth how the solutions to language-induced emotions play out in different cultural environments.</span></p><p data-dcnode-id="5776" id="p0750"><span data-dcnode-id="5783" instrument_node="">Third, we focused in particular on emotion management as performed by MNT leaders, since this emerged to be of particular relevance to our respondents. This focus implied, however, that we did not account for team members' self-management and, hence, their contribution to emotions at work. We acknowledge the validity of </span><a class="workspace-trigger" data-dcnode-id="5781" href="#bb0395" name="bbb0395"><span data-dcnode-id="5782" instrument_node="">Stewart et al.'s (2011)</span></a><span data-dcnode-id="5780" instrument_node=""> idea that entire teams actively engage in the regulation of team emotions and refer to </span><a class="workspace-trigger" data-dcnode-id="5778" href="#bb0180" name="bbb0180"><span data-dcnode-id="5779" instrument_node="">Hinds et al.'s (2014)</span></a><span data-dcnode-id="5777" instrument_node=""> recent study on global virtual team members coping with language-induced emotions.</span></p><p data-dcnode-id="5765" id="p0755"><span data-dcnode-id="5775" instrument_node="">Fourth, while our interviews did not allow us to capture intra-individual variation in emotions in real time (</span><a class="workspace-trigger" data-dcnode-id="5773" href="#bb0120" name="bbb0120"><span data-dcnode-id="5774" instrument_node="">Gooty et al., 2009</span></a><span data-dcnode-id="5772" instrument_node="">), we argue that our critical incident-based interviewing technique is well suited to capture the dynamic nature of individual emotions (</span><a class="workspace-trigger" data-dcnode-id="5770" href="#bb0115" name="bbb0115"><span data-dcnode-id="5771" instrument_node="">Gooty et al., 2010</span></a><span data-dcnode-id="5769" instrument_node="">). This technique focuses informants' attention on specific events, which triggered particularly intense emotional experiences. It is therefore in line with affective events theory (</span><a class="workspace-trigger" data-dcnode-id="5767" href="#bb0445" name="bbb0445"><span data-dcnode-id="5768" instrument_node="">Weiss &amp; Cropanzano, 1996</span></a><span data-dcnode-id="5766" instrument_node="">), which posits that particular events are a chief source of emotions. Nevertheless, we encourage future research studying the intra-individual variation in language-induced emotions specifically with event-based design.</span></p><p data-dcnode-id="5745" id="p0760"><span data-dcnode-id="5764" instrument_node="">Fifth, we did not explicitly examine how language-induced negative emotions and the positive leadership outcomes of language-related emotion management influence team performance, as the relationships between negative emotions and performance (e.g. </span><a class="workspace-trigger" data-dcnode-id="5762" href="#bb0280" name="bbb0280"><span data-dcnode-id="5763" instrument_node="">McColl-Kennedy and Anderson, 2002</span></a><span data-dcnode-id="5761" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5759" href="#bb0300" name="bbb0300"><span data-dcnode-id="5760" instrument_node="">Mooney et al., 2007</span></a><span data-dcnode-id="5758" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5756" href="#bb0435" name="bbb0435"><span data-dcnode-id="5757" instrument_node="">von Glinow et al., 2004</span></a><span data-dcnode-id="5755" instrument_node="">) and between leadership outcomes and performance (e.g. </span><a class="workspace-trigger" data-dcnode-id="5753" href="#bb9000" name="bbb9000"><span data-dcnode-id="5754" instrument_node="">Burke et al., 2006</span></a><span data-dcnode-id="5752" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5750" href="#bb0460" name="bbb0460"><span data-dcnode-id="5751" instrument_node="">Zaccaro et al., 2001</span></a><span data-dcnode-id="5749" instrument_node="">) have already been investigated to large extents. Moreover, since team performance is a multifaceted construct with context-specific indicators (</span><a class="workspace-trigger" data-dcnode-id="5747" href="#bb0095" name="bbb0095"><span data-dcnode-id="5748" instrument_node="">Gibson, Zellmer-Bruhn, &amp; Schwab, 2003</span></a><span data-dcnode-id="5746" instrument_node="">), we argue that general performance measures would not adequately capture the dynamics of MNT leadership. However, our study indicates the beneficial effect of language-related emotion management strategies on MNT performance by providing clear evidence for its positive effects both in terms of mitigating negative emotions and creating directly positive leadership outcomes. We encourage qualitative follow-up investigations to examine these relationships in more depth and quantitative studies to test them statistically.</span></p></section></section><section data-dcnode-id="5736" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5741" id="st0030"><span data-dcnode-id="5742" instrument_node="">Conclusion</span></h2><p data-dcnode-id="5739" id="p0765"><span data-dcnode-id="5740" instrument_node="">Recent pioneering work has indicated the problematic emotional impact of language barriers on MNT members, but has not explained how MNT leaders can address this problem. Our study demonstrated that MNT leaders are capable of preventing negative emotions like anxiety and resentment in the first place and have effective strategies at their disposal to mitigate these disruptive emotions when they do occur. By redirecting team member's attention away from language-induced emotions and by helping them to reappraise linguistic diversity, MNT leaders foster team sensemaking, team climate, and subordinates' willingness to follow.</span></p><p data-dcnode-id="5737" id="p0770"><span data-dcnode-id="5738" instrument_node="">Our in-depth qualitative study encourages further research at the cross-roads of leadership, language and emotion research in MNTs. Additional qualitative research should investigate language-induced emotions and related leadership strategies in further industries and home countries to discover similarities and differences across other substantive leadership contexts. Based on the relationships these studies would uncover, scholars should then generate quantitatively testable hypotheses. Ultimately, these hypotheses should be tested in a representative sample across a range of cultural and linguistic contexts.</span></p></section></div><section data-dcnode-id="5730" id="ac0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5733" id="st0035"><span data-dcnode-id="5734" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="5731" id="p0775"><span data-dcnode-id="5732" instrument_node="">We thank Anne-Wil Harzing and Vasiliki Gargalianou for her helpful comments on an earlier draft of this manuscript.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="5722"><button class="button button-anchor" data-dcnode-id="5726" type="button"><span class="button-text" data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="5723" type="button"><span class="button-text" data-dcnode-id="5724"><span data-dcnode-id="5725" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="5721"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="427" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5719"><span data-dcnode-id="5720" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="428" id="bs0005"><dl class="references" data-dcnode-id="429" id="reference-links-bs0005"><dt class="label" data-dcnode-id="5716"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="5717" href="#bbb0005" id="r 34)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="296"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="297"><ul data-dcnode-id="303"><li class="ListArticleItem" data-dcnode-id="405"><div class="sub-heading" data-dcnode-id="417"><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1075425321000958" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="421" id="citing-articles-article0-title"><span data-dcnode-id="422" instrument_node="">Leaders' cultural gap bridging behaviors and subordinates' work engagement in multinational teams</span></h3></a><div class="article-source ellipsis" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">2022, Journal of International Management</span></div></div><div class="buttons" data-dcnode-id="411"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="412" type="button"><span class="button-link-text" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="413" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="414"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="406"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="407" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="408"><p data-dcnode-id="409" id="sp0050"><span data-dcnode-id="410" instrument_node="">The effect of leadership on individuals in multinational teams remains underexplored. Based on self-concept theory, our study investigates how subordinates' work engagement is influenced by their perception of leader cultural gap bridging (CGB) behaviors that seek to facilitate intercultural collaboration in multinational teams. We draw on a quantitative, two-wave, individual-level study with 280 employees working in multinational teams. Our results reveal that subordinates' perception of leaders' CGB behaviors enhance their work engagement through its effect on their team identification. The positive indirect effect is contingent on the level of relationship conflict in the multinational teams.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="381"><div class="sub-heading" data-dcnode-id="399"><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1090951620301127" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="403" id="citing-articles-article1-title"><span data-dcnode-id="404" instrument_node="">The impact of language barriers on knowledge processing in multinational teams</span></h3></a><div class="article-source ellipsis" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">2021, Journal of World Business</span></div></div><div class="buttons" data-dcnode-id="393"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="394" type="button"><span class="button-link-text" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="395" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="396"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="382"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="383" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="384"><p data-dcnode-id="385" id="spar0015"><span data-dcnode-id="392" instrument_node="">This qualitative study investigates how language diversity in multinational teams affects communication, which, in turn, influences knowledge processing. We show that </span><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">evident</span></em><span data-dcnode-id="389" instrument_node=""> language barriers (lack of lexical and syntactical proficiency) reduce participation in team communication, which impedes both basic and sophisticated knowledge processing activities. We also demonstrate that </span><em data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">hidden</span></em><span data-dcnode-id="386" instrument_node=""> language barriers (pragmatic and prosodic transfer between mother tongues and working language) impair sensemaking in the team, which disrupts sophisticated knowledge processing activities. By highlighting the relevance of hidden barriers, our study encourages a more comprehensive conceptualization of language barriers and uncovers the micro-foundations of knowledge processing in multilingual teams. Contrasting evident and hidden barriers, our study juxtaposes the instrumental and the cultural perspective on language. By distinguishing basic and sophisticated knowledge processing activities, we weigh the information processing against the socio-cognitive perspective on knowledge. We integrate these divergent perspectives on language and knowledge processing both within and across the respective research fields.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="357"><div class="sub-heading" data-dcnode-id="369"><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1090951617308453" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="379" id="citing-articles-article2-title"><span data-dcnode-id="380" instrument_node="">The role of emotions in intercultural business communication: Language standardization in the context of international knowledge transfer</span></h3></a><div class="article-source ellipsis" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">2020, Journal of World Business</span></div><div class="CitedSection" data-dcnode-id="370"><div class="snippet" data-dcnode-id="371"><div class="cite-header" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">So the safest way is not to speak at all” (#1 Chinese). Thus, the experience of shame can better explain why the inferior proficiency in the corporate lingua franca might distort self-evaluation of professional expertise in knowledge transfer as reported in the previous literature (e.g., Vaara et al., 2005; Tenzer &amp; Pudelko, 2015). Indebtedness is defined as “a state of obligation to repay another”, which arises from norm of reciprocity (Greenberg, 1980, p.4).</span></p></div></div></div><div class="buttons" data-dcnode-id="363"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="364" type="button"><span class="button-link-text" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="365" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="366"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="358"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="359" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="360"><p data-dcnode-id="361" id="spar0040"><span data-dcnode-id="362" instrument_node="">We examine language standardization in a multinational enterprise in the context of international knowledge transfer treated as an act of communication. Based on psychological theories of emotions and a qualitative study of a Chinese owned company with English as a working language, we find that both native and non-native English-speakers experience anxiety in intercultural communication. This triggers emotions that are culturally predisposed affecting communication behavior. We provide a framework within which intercultural business communication takes place and demonstrate the intermediating role that emotions play when language is standardized.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="339"><div class="sub-heading" data-dcnode-id="351"><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1090951620300213" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="355" id="citing-articles-article3-title"><span data-dcnode-id="356" instrument_node="">The emotional benefits and performance costs of building a psychologically safe language climate in MNCs</span></h3></a><div class="article-source ellipsis" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">2020, Journal of World Business</span></div></div><div class="buttons" data-dcnode-id="345"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="346" type="button"><span class="button-link-text" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="347" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="348"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="340"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="341" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="342"><p data-dcnode-id="343" id="spar0020"><span data-dcnode-id="344" instrument_node="">How employees cope with the requirement to work in a foreign language has received little scholarly attention. To narrow this gap, we conducted an ethnographic study at KONE and NOKIA, companies using English as a lingua franca. Results indicate that employees who are non-native lingua franca speakers may cope collectively with the language demands by building a psychologically safe language climate. Although benefitting them emotionally, psychologically safe language climate may simplify the lingua franca and, in turn, decrease innovative performance. Our findings contribute to research on language-coping mechanisms and psychological safety in adding language as a potential barrier to innovativeness.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="315"><div class="sub-heading" data-dcnode-id="327"><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969593117300434" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="337" id="citing-articles-article4-title"><span data-dcnode-id="338" instrument_node="">“I just don't feel comfortable speaking English”: Foreign language anxiety as a catalyst for spoken-language barriers in MNCs</span></h3></a><div class="article-source ellipsis" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">2017, International Business Review</span></div><div class="CitedSection" data-dcnode-id="328"><div class="snippet" data-dcnode-id="329"><div class="cite-header" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Table 2 further illustrates the feelings of foreign language anxiety experienced by non-natives. Our findings about the anxiety in English led further support to previous research in classrooms (Horwitz et al., 1986) and newer research in IB (Tenzer &amp; Pudelko, 2015; Tenzer et al., 2014) suggesting that the use of a foreign language can invoke both physical and psychological anxiety responses from non-native speakers. In line with Horwitz et al., we found that foreign language anxiety is strongly related to a fear of negative evaluations and an anxiety to perform badly in English.</span></p></div></div></div><div class="buttons" data-dcnode-id="321"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="322" type="button"><span class="button-link-text" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="323" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="324"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="316"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="317" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="318"><p data-dcnode-id="319" id="spar0025"><span data-dcnode-id="320" instrument_node="">Over the last two decades, the impact of language standardization in MNCs has attracted considerable research attention. However, although the current IB literature strongly suggests that the introduction of English can cause a significant barrier, we still have not fully understood the micro-foundations of such barriers. We conducted an inductive study and interpret our findings using an interdisciplinary approach drawing from both IB related research as well as research from the field of linguistics and language studies. We propose that a major challenge for MNC employees is the foreign language anxiety they typically experience in a non-native language. It is manifest in communication avoidance and withdrawal, as well as code-switching. Our findings indicate that such communicative behaviors can have a considerable impact on interpersonal communication, affecting both the content and relationship dimension. Our study contributes to emerging research on the role of anxiety-related factors as micro-foundations of language barriers and provides a so far rather neglected starting point for firms to reduce the language barrier in corporations.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="304"><div class="sub-heading" data-dcnode-id="309"><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S1366728921000122" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="313" id="citing-articles-article5-title"><span data-dcnode-id="314" instrument_node="">Insights into codeswitching from online communication: Effects of language preference and conditions arising from vocabulary richness</span></h3></a><div class="article-source ellipsis" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">2021, Bilingualism</span></div></div><div class="buttons" data-dcnode-id="308"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="305"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="306" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="307"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84938997629%26md5%3Dd36fccb22b2b3990978aad1017d580" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="301" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="302"></path></svg><span class="button-alternative-text" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="269"><dl class="footnote" data-dcnode-id="278"><dt class="footnote-label" data-dcnode-id="290"><sup data-dcnode-id="291"><a data-dcnode-id="292" href="#bfn0005"><span data-dcnode-id="293" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="279"><p data-dcnode-id="280" id="np0005"><span data-dcnode-id="289" instrument_node="">Tel.: +</span><span data-dcnode-id="287" instrument_node="">&nbsp;</span><span data-dcnode-id="285" instrument_node="">49 7071 2974150; fax: +</span><span data-dcnode-id="283" instrument_node="">&nbsp;</span><span data-dcnode-id="281" instrument_node="">49 7071 295534.</span></p></dd></dl><dl class="footnote" data-dcnode-id="270"><dt class="footnote-label" data-dcnode-id="274"><sup data-dcnode-id="275"><a data-dcnode-id="276" href="#bfn0010"><span data-dcnode-id="277" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="271"><p data-dcnode-id="272" id="np0010"><span data-dcnode-id="273" instrument_node="">As this paper is part of a major research project on language in MNTs, the same data have also been employed in the investigation of other research questions.</span></p></dd></dl></div><div class="Copyright" data-dcnode-id="266"><span class="copyright-line" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Copyright © 2015 Elsevier Inc. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SpecialIssueArticles" data-dcnode-id="152" id="special-issue-articles"><div class="part-of-issue u-padding-s-bottom" data-dcnode-id="238"><h2 class="part-of-issue-text u-h4" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Part of special issue:</span></h2><div data-dcnode-id="244"><a class="part-of-issue-title" data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/journal/10489843/26/4"><span data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Special Issue: Leadership and Emotions</span></span></a><div class="part-of-issue-editors" data-dcnode-id="245"><span data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Edited by </span></span><div class="authors" data-dcnode-id="246"><span data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Shane</span></span><span data-dcnode-id="255" instrument_node=""> </span><span data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Connelly</span></span><span data-dcnode-id="252" instrument_node="">, </span><span data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Janaki</span></span><span data-dcnode-id="249" in
