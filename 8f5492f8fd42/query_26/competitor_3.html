</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0005&quot;>This study shows which negative emotion language barriers can provoke among multinational team (MNT) members and investigates how MNT leaders can successfully mitigate these detrimental effects. Multilingual teams constitute a leadership context of paramount importance in today&amp;#x27;s organizations, which prior research has neglected. Our study contributes to the literature on MNT leaders&amp;#x27; emotion regulation strategies by investigating the specific challenges they face in this setting. We advance research on leadership in teams by exploring successful leadership strategies geared towards addressing language-induced emotions and by demonstrating the positive outcomes of MNT leaders leveraging their power in this context. Our study contributes to research on language barriers in multinational corporations by introducing the interplay of language-induced emotions and leadership to this area. Furthermore, it contributes to emotion-sensitive organizational studies by specifying previously established emotion management models for multilingual environments. On this basis, we draw conclusions for the development of future MNT leaders.</p></div></div></div>" data-dcnode-id="8253" lang="en" name="citation_abstract"><span data-dcnode-id="8252" instrument_node="">

data-dcnode-id="7703" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="7691" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="7694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.leaqua.2015.05.006" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="7695" instrument_node="">https://doi.org/10.1016/j.leaqua.2015.05.006</span></a><a class="rights-and-content" data-dcnode-id="7692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS1048984315000636%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7693" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="7690"></section><section class="ReferencedArticles" data-dcnode-id="7689"></section><div class="PageDivider" data-dcnode-id="7688"></div><div class="Abstracts u-font-serif" data-dcnode-id="7681" id="abstracts"><div class="abstract author" data-dcnode-id="7682" id="ab0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7686"><span data-dcnode-id="7687" instrument_node="">Abstract</span></h2><div data-dcnode-id="7683" id="as0005"><p data-dcnode-id="7684" id="sp0005"><span data-dcnode-id="7685" instrument_node="">This study shows which negative emotion language barriers can provoke among multinational team (MNT) members and investigates how MNT leaders can successfully mitigate these detrimental effects. Multilingual teams constitute a leadership context of paramount importance in today's organizations, which prior research has neglected. Our study contributes to the literature on MNT leaders' emotion regulation strategies by investigating the specific challenges they face in this setting. We advance research on leadership in teams by exploring successful leadership strategies geared towards addressing language-induced emotions and by demonstrating the positive outcomes of MNT leaders leveraging their power in this context. Our study contributes to research on language barriers in multinational corporations by introducing the interplay of language-induced emotions and leadership to this area. Furthermore, it contributes to emotion-sensitive organizational studies by specifying previously established emotion management models for multilingual environments. On this basis, we draw conclusions for the development of future MNT leaders.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="7658" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="7670"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1048984315000612"><svg class="icon icon-navigate-left" data-dcnode-id="7679" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="7680"></path></svg><span class="button-alternative-text" data-dcnode-id="7672"><strong data-dcnode-id="7677"><span data-dcnode-id="7678" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="7675"><span data-dcnode-id="7676" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7673"><span data-dcnode-id="7674" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="7659"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1048984315000685"><span class="button-alternative-text" data-dcnode-id="7663"><strong data-dcnode-id="7668"><span data-dcnode-id="7669" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="7666"><span data-dcnode-id="7667" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7664"><span data-dcnode-id="7665" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="7661" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="7662"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="7642"><div class="keywords-section" data-dcnode-id="7643" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7656"><span data-dcnode-id="7657" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="7653" id="kw0025"><span data-dcnode-id="7654" id="tx0010"><span data-dcnode-id="7655" instrument_node="">Multinational team leadership</span></span></div><div class="keyword" data-dcnode-id="7650" id="kw0030"><span data-dcnode-id="7651" id="tx0015"><span data-dcnode-id="7652" instrument_node="">Language barrier</span></span></div><div class="keyword" data-dcnode-id="7647" id="kw0035"><span data-dcnode-id="7648" id="tx0020"><span data-dcnode-id="7649" instrument_node="">Emotion management</span></span></div><div class="keyword" data-dcnode-id="7644" id="kw0040"><span data-dcnode-id="7645" id="tx0025"><span data-dcnode-id="7646" instrument_node="">Multinational corporation</span></span></div></div></div><span data-dcnode-id="7641" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="5729" id="body"><div data-dcnode-id="5735"><section data-dcnode-id="7556" id="s0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7639" id="st0045"><span data-dcnode-id="7640" instrument_node="">Introduction: motivation of the study</span></h2><p data-dcnode-id="7607" id="p0010"><span data-dcnode-id="7638" instrument_node="">Given that most multinational corporations (MNCs) are also multilingual (</span><a class="workspace-trigger" data-dcnode-id="7636" href="#bb0160" name="bbb0160"><span data-dcnode-id="7637" instrument_node="">Harzing et al., 2011</span></a><span data-dcnode-id="7635" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7633" href="#bb0265" name="bbb0265"><span data-dcnode-id="7634" instrument_node="">Luo and Shenkar, 2006</span></a><span data-dcnode-id="7632" instrument_node="">), the management of language barriers constitutes a key leadership challenge in these companies (</span><a class="workspace-trigger" data-dcnode-id="7630" href="#bb0470" name="bbb0470"><span data-dcnode-id="7631" instrument_node="">Zander, Mockaitis, &amp; Butler, 2012</span></a><span data-dcnode-id="7629" instrument_node="">). Despite the fact that languages are “the basic means of communication in organizations [and] the basis for knowledge creation” (</span><a class="workspace-trigger" data-dcnode-id="7627" href="#bb0430" name="bbb0430"><span data-dcnode-id="7628" instrument_node="">Vaara, Piekkari, Tienari, &amp; Säntti, 2005: 595</span></a><span data-dcnode-id="7626" instrument_node="">), language barriers have surprisingly long been neglected both by researchers and practitioners (</span><a class="workspace-trigger" data-dcnode-id="7624" href="#bb0165" name="bbb0165"><span data-dcnode-id="7625" instrument_node="">Harzing and Pudelko, 2013</span></a><span data-dcnode-id="7623" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7621" href="#bb0160" name="bbb0160"><span data-dcnode-id="7622" instrument_node="">Harzing et al., 2011</span></a><span data-dcnode-id="7620" instrument_node="">). Only recently have management scholars started to explore the multifaceted role of language in MNCs (</span><a class="workspace-trigger" data-dcnode-id="7618" href="#bb0035" name="bbb0035"><span data-dcnode-id="7619" instrument_node="">Brannen, Piekkari, &amp; Tietze, 2014</span></a><span data-dcnode-id="7617" instrument_node="">). A particularly active sub-stream within this emerging area is concerned with the impact of language barriers on multinational teams (MNTs). Given that teamwork “has become the contemporary ‘modus operandi’” in MNCs (</span><a class="workspace-trigger" data-dcnode-id="7615" href="#bb0465" name="bbb0465"><span data-dcnode-id="7616" instrument_node="">Zander &amp; Butler, 2010: 258</span></a><span data-dcnode-id="7614" instrument_node="">) and considering that MNTs depend on the interaction between members speaking different mother tongues, the effective management of language barriers in these contexts is very important. The task of bridging linguistic boundaries in MNTs is mostly assigned to MNT leaders (</span><a class="workspace-trigger" data-dcnode-id="7612" href="#bb0050" name="bbb0050"><span data-dcnode-id="7613" instrument_node="">Butler et al., 2012</span></a><span data-dcnode-id="7611" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7609" href="#bb0470" name="bbb0470"><span data-dcnode-id="7610" instrument_node="">Zander et al., 2012</span></a><span data-dcnode-id="7608" instrument_node="">), but there is a paucity of specific guidelines on how they can address the challenges of language barriers.</span></p><p data-dcnode-id="7563" id="p0015"><span data-dcnode-id="7606" instrument_node="">The negative emotions language barriers can trigger among MNT members present a particularly acute leadership challenge. Recent studies indicated that language-induced emotions can erode collaborative efforts and lead to losses in productivity and performance of MNTs (</span><a class="workspace-trigger" data-dcnode-id="7604" href="#bb0180" name="bbb0180"><span data-dcnode-id="7605" instrument_node="">Hinds, Neeley, &amp; Cramton, 2014</span></a><span data-dcnode-id="7603" instrument_node="">) or even on the MNC level (</span><a class="workspace-trigger" data-dcnode-id="7601" href="#bb0155" name="bbb0155"><span data-dcnode-id="7602" instrument_node="">Harzing and Feely, 2008</span></a><span data-dcnode-id="7600" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7598" href="#bb0325" name="bbb0325"><span data-dcnode-id="7599" instrument_node="">Neeley et al., 2012</span></a><span data-dcnode-id="7597" instrument_node="">). Whereas management studies have only recently taken a “linguistic turn” (</span><a class="workspace-trigger" data-dcnode-id="7595" href="#bb0420" name="bbb0420"><span data-dcnode-id="7596" instrument_node="">Tietze, 2008: 2</span></a><span data-dcnode-id="7594" instrument_node="">), the “affective revolution” in organizational behavior research (</span><a class="workspace-trigger" data-dcnode-id="7592" href="#bb0115" name="bbb0115"><span data-dcnode-id="7593" instrument_node="">Gooty et al., 2010</span></a><span data-dcnode-id="7591" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7589" href="#bb0120" name="bbb0120"><span data-dcnode-id="7590" instrument_node="">Gooty et al., 2009</span></a><span data-dcnode-id="7588" instrument_node="">), which turned scholars' attention to the impact of employees' emotions on organizational outcomes, already started in the late 1990s. Ever since, the investigation of emotions has taken center stage in organizational behavior (</span><a class="workspace-trigger" data-dcnode-id="7586" href="#bb0120" name="bbb0120"><span data-dcnode-id="7587" instrument_node="">Gooty et al., 2009</span></a><span data-dcnode-id="7585" instrument_node="">). Positive emotions are seen as “the wellspring of human motivation” (</span><a class="workspace-trigger" data-dcnode-id="7583" href="#bb0385" name="bbb0385"><span data-dcnode-id="7584" instrument_node="">Salovey, Detweiler-Bedell, Detweiler-Bedell, &amp; Mayer, 2008: 540</span></a><span data-dcnode-id="7582" instrument_node="">), but recent studies particularly highlighted the disruptive potential of negative emotions and the need to understand and control them (e.g. </span><a class="workspace-trigger" data-dcnode-id="7580" href="#bb0230" name="bbb0230"><span data-dcnode-id="7581" instrument_node="">Kulik et al., 2009</span></a><span data-dcnode-id="7579" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7577" href="#bb0245" name="bbb0245"><span data-dcnode-id="7578" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="7576" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7574" href="#bb0300" name="bbb0300"><span data-dcnode-id="7575" instrument_node="">Mooney et al., 2007</span></a><span data-dcnode-id="7573" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7571" href="#bb0435" name="bbb0435"><span data-dcnode-id="7572" instrument_node="">von Glinow et al., 2004</span></a><span data-dcnode-id="7570" instrument_node="">). Consequently, the management of employees' emotions emerged as an important component of effective leadership (</span><a class="workspace-trigger" data-dcnode-id="7568" href="#bb0220" name="bbb0220"><span data-dcnode-id="7569" instrument_node="">Kaplan et al., 2014</span></a><span data-dcnode-id="7567" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7565" href="#bb0415" name="bbb0415"><span data-dcnode-id="7566" instrument_node="">Thiel et al., 2012</span></a><span data-dcnode-id="7564" instrument_node="">).</span></p><p data-dcnode-id="7561" id="p0020"><span data-dcnode-id="7562" instrument_node="">The pioneering studies on the emotional outcomes of language barriers mainly focused on analyzing the problem of language-induced emotions in multinational work environments, but did not provide a detailed account of possible solutions. Consequently, we still know very little about how MNT leaders can manage emotions triggered by language barriers. To address this gap, we conducted an inductive study investigating successful leadership measures to mitigate language-induced negative emotions in MNCs.</span></p><p data-dcnode-id="7559" id="p0025"><span data-dcnode-id="7560" instrument_node="">In our qualitative investigation, we conducted semi-structured interviews with 15 leaders and 67 members of 15 multinational and multilingual teams as well as 8 superordinate managers in three MNCs, allowing us to triangulate different perspectives on language-induced negative emotions and their management through MNT leaders. Our article will first reveal that MNT members' various emotional reactions to language barriers fall into two discrete categories: self-directed anxiety and other-directed resentment. Second, and more importantly, we will systematically investigate strategies to mitigate the emotional impact of language barriers. Consequently, the main thrust of this article lies in exploring the measures MNT leaders have at their disposal to manage their subordinates' negative language-induced emotions. As we will show, these measures form part of three major strategies: reducing the impact of language barriers, redirecting MNT members' attention away from language barriers, and reducing the negative appraisal of language barriers. These measures benefit the MNT through improved sensemaking, a more productive team climate and an increased willingness of MNT members to follow their leader.</span></p><p data-dcnode-id="7557" id="p0030"><span data-dcnode-id="7558" instrument_node="">Our study is the first to build on, contribute to and systematically connect research on leadership, language barriers and emotions in MNCs. As such, it contributes to research on MNT leaders' emotion regulation strategies by investigating the specific challenges MNT leaders face in multilingual settings, a leadership context which has despite its relevance been surprisingly neglected by prior studies. We advance leadership research with a fine-grained analysis of MNT leaders' cross-lingual bridge-making activities and provide an extension of leadership skills with cross-lingual competencies. We extend the growing literature on position power in teams by demonstrating the positive outcomes of MNT leaders leveraging their power through active emotion management. Our study also contributes to the investigation of language barriers in international management by highlighting the complexity of language effects and confirming that the instrumental view of language as an easily managed, neutral code has become obsolete. Furthermore, it contributes to emotion-sensitive organizational studies by contextualizing previously established emotion management models specifically for multilingual environments. In terms of practical recommendations, our study highlights the importance of MNT leaders' emotional awareness in multilingual settings, shows that emotions need to be actively managed rather than suppressed and draws important conclusions for global leadership development.</span></p></section><section data-dcnode-id="7266" id="s0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7554" id="st0050"><span data-dcnode-id="7555" instrument_node="">Theoretical framework</span></h2><p data-dcnode-id="7552" id="p0040"><span data-dcnode-id="7553" instrument_node="">Our study is based on leadership research in multicultural and multilingual settings, the investigation of language barriers in MNCs and research on emotions in organizations. Below we will review selected findings and models from previous studies in these areas, which indicate connections between these three streams and therefore provide core references for our study.</span></p><section data-dcnode-id="7469" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7550" id="st0055"><span data-dcnode-id="7551" instrument_node="">MNT leaders' tasks and skills</span></h3><p data-dcnode-id="7533" id="p0050"><span data-dcnode-id="7549" instrument_node="">Leadership can be defined as “a process of social influence” (</span><a class="workspace-trigger" data-dcnode-id="7547" href="#bb0350" name="bbb0350"><span data-dcnode-id="7548" instrument_node="">Parry, 1999: 134</span></a><span data-dcnode-id="7546" instrument_node="">) or “the ability of an individual to influence, motivate, and enable others to contribute towards the effectiveness and success of the organizations of which they are members” (</span><a class="workspace-trigger" data-dcnode-id="7544" href="#bb0200" name="bbb0200"><span data-dcnode-id="7545" instrument_node="">House &amp; Javidan, 2004: 15</span></a><span data-dcnode-id="7543" instrument_node="">). Our study specifically focuses on formally assigned MNT leaders as the “individuals who are primarily responsible for defining team goals and for developing and structuring the team to accomplish these missions” (</span><a class="workspace-trigger" data-dcnode-id="7541" href="#bb0460" name="bbb0460"><span data-dcnode-id="7542" instrument_node="">Zaccaro, Rittman, &amp; Marks, 2001: 452</span></a><span data-dcnode-id="7540" instrument_node="">), thus displaying leadership. This focus on vertical leadership (</span><a class="workspace-trigger" data-dcnode-id="7538" href="#bb0465" name="bbb0465"><span data-dcnode-id="7539" instrument_node="">Zander &amp; Butler, 2010</span></a><span data-dcnode-id="7537" instrument_node="">) clearly presupposes hierarchical teams with a defined leadership role and an appointed leader. Most organizational teams have such structures. Along with </span><a class="workspace-trigger" data-dcnode-id="7535" href="#bb0460" name="bbb0460"><span data-dcnode-id="7536" instrument_node="">Zaccaro et al. (2001)</span></a><span data-dcnode-id="7534" instrument_node="">, we believe that even in experienced teams in which other members may take over some leadership functions, designated leaders still fulfill boundary spanning functions.</span></p><p data-dcnode-id="7510" id="p0055"><span data-dcnode-id="7532" instrument_node="">The challenges leaders face in multinational settings are a key item on the agenda of leadership research, as leaders with global competencies and perspectives are an indispensable prerequisite for the success of MNCs (</span><a class="workspace-trigger" data-dcnode-id="7530" href="#bb0045" name="bbb0045"><span data-dcnode-id="7531" instrument_node="">Brewster &amp; Suutari, 2005</span></a><span data-dcnode-id="7529" instrument_node="">). Not only top managers need to address the challenges of a highly diverse workforce (</span><a class="workspace-trigger" data-dcnode-id="7527" href="#bb0240" name="bbb0240"><span data-dcnode-id="7528" instrument_node="">Levy, Beechler, Taylor &amp; Boyacigiller, 2007</span></a><span data-dcnode-id="7526" instrument_node="">) by spanning cultural and linguistic boundaries, creating links and establishing communication between multiple groups in their organizations (</span><a class="workspace-trigger" data-dcnode-id="7524" href="#bb0285" name="bbb0285"><span data-dcnode-id="7525" instrument_node="">Mendenhall et al., 2012</span></a><span data-dcnode-id="7523" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7521" href="#bb0470" name="bbb0470"><span data-dcnode-id="7522" instrument_node="">Zander et al., 2012</span></a><span data-dcnode-id="7520" instrument_node="">). Leaders in the middle management, particularly the leaders of multinational and multilingual teams, are also expected to motivate and inspire, to blend diverse collections of individuals into effective teams and to leverage the creative potential of team diversity (</span><a class="workspace-trigger" data-dcnode-id="7518" href="#bb0050" name="bbb0050"><span data-dcnode-id="7519" instrument_node="">Butler et al., 2012</span></a><span data-dcnode-id="7517" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7515" href="#bb0465" name="bbb0465"><span data-dcnode-id="7516" instrument_node="">Zander and Butler, 2010</span></a><span data-dcnode-id="7514" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7512" href="#bb0470" name="bbb0470"><span data-dcnode-id="7513" instrument_node="">Zander et al., 2012</span></a><span data-dcnode-id="7511" instrument_node="">).</span></p><p data-dcnode-id="7481" id="p0060"><span data-dcnode-id="7509" instrument_node="">Whereas specific research on the competencies of MNT leaders is still quite limited, pioneering studies in the field (</span><a class="workspace-trigger" data-dcnode-id="7507" href="#bb0465" name="bbb0465"><span data-dcnode-id="7508" instrument_node="">Zander and Butler, 2010</span></a><span data-dcnode-id="7506" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7504" href="#bb0470" name="bbb0470"><span data-dcnode-id="7505" instrument_node="">Zander et al., 2012</span></a><span data-dcnode-id="7503" instrument_node="">) borrow from the broader stream of literature investigating global leadership skills at the top management level. This research area centers on the concept of a leader's “global mindset”, which is often defined in terms of cross-cultural skills and intercultural competencies (for reviews see e.g. </span><a class="workspace-trigger" data-dcnode-id="7501" href="#bb0030" name="bbb0030"><span data-dcnode-id="7502" instrument_node="">Bird et al., 2010</span></a><span data-dcnode-id="7500" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7498" href="#bb0240" name="bbb0240"><span data-dcnode-id="7499" instrument_node="">Levy et al., 2007</span></a><span data-dcnode-id="7497" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7495" href="#bb0335" name="bbb0335"><span data-dcnode-id="7496" instrument_node="">Osland, 2008</span></a><span data-dcnode-id="7494" instrument_node="">). The majority of studies in this context focus on leaders' ability to manage differences in subordinates' cultural values as outlined by the dominant dimensional models of culture (e.g. </span><a class="workspace-trigger" data-dcnode-id="7492" href="#bb0190" name="bbb0190"><span data-dcnode-id="7493" instrument_node="">Hofstede, 2001</span></a><span data-dcnode-id="7491" instrument_node="">). We argue that this focus on cross-cultural competencies has diverted scholarly attention away from the specific challenges of other diversity types global leaders need to deal with. Considering the multilingual reality of today's MNCs (</span><a class="workspace-trigger" data-dcnode-id="7489" href="#bb0265" name="bbb0265"><span data-dcnode-id="7490" instrument_node="">Luo &amp; Shenkar, 2006</span></a><span data-dcnode-id="7488" instrument_node="">), employees' linguistic diversity and the resulting language barriers in organizational communication also constitute very important leadership challenges, which have not yet been investigated in all their complexity. So far, scholars have only recognized leaders' own language skills as a part of their global mindset (</span><a class="workspace-trigger" data-dcnode-id="7486" href="#bb0140" name="bbb0140"><span data-dcnode-id="7487" instrument_node="">Gupta and Govindarajan, 2002</span></a><span data-dcnode-id="7485" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7483" href="#bb0400" name="bbb0400"><span data-dcnode-id="7484" instrument_node="">Story et al., 2014</span></a><span data-dcnode-id="7482" instrument_node="">). However, they surprisingly neglected the fact that MNT leaders also need to facilitate communication across language barriers among their subordinates.</span></p><p data-dcnode-id="7470" id="p0065"><span data-dcnode-id="7480" instrument_node="">Considering the recent proliferation of studies on the disruptive impact of language barriers on different team processes (see e.g. </span><a class="workspace-trigger" data-dcnode-id="7478" href="#bb0180" name="bbb0180"><span data-dcnode-id="7479" instrument_node="">Hinds et al., 2014</span></a><span data-dcnode-id="7477" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7475" href="#bb0410" name="bbb0410"><span data-dcnode-id="7476" instrument_node="">Tenzer et al., 2014</span></a><span data-dcnode-id="7474" instrument_node="">), it is particularly crucial that MNT leaders develop skills to help their teams build mutual understanding across such barriers (</span><a class="workspace-trigger" data-dcnode-id="7472" href="#bb0470" name="bbb0470"><span data-dcnode-id="7473" instrument_node="">Zander et al., 2012</span></a><span data-dcnode-id="7471" instrument_node="">). Our study advances the emerging research on MNT leadership by investigating specific strategies, which help MNT leaders to perform this challenging task.</span></p></section><section data-dcnode-id="7403" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7467" id="st0060"><span data-dcnode-id="7468" instrument_node="">The impact of language barriers on MNT members' emotions</span></h3><p data-dcnode-id="7447" id="p0075"><span data-dcnode-id="7466" instrument_node="">Both management scholars and practitioners have long neglected the complex influence of language on MNCs, because many believed that the use of English as a worldwide common business language would effectively erase language barriers (</span><a class="workspace-trigger" data-dcnode-id="7464" href="#bb0425" name="bbb0425"><span data-dcnode-id="7465" instrument_node="">Tietze and Dick, 2013</span></a><span data-dcnode-id="7463" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7461" href="#bb0455" name="bbb0455"><span data-dcnode-id="7462" instrument_node="">Youssef and Luthans, 2012</span></a><span data-dcnode-id="7460" instrument_node="">). Only recently has management research dedicated increasing attention to the complex role of language in MNCs. Among other effects, studies published within the past years found language barriers to create power-authority distortions (</span><a class="workspace-trigger" data-dcnode-id="7458" href="#bb0315" name="bbb0315"><span data-dcnode-id="7459" instrument_node="">Neeley, 2013</span></a><span data-dcnode-id="7457" instrument_node="">), impede knowledge sharing (</span><a class="workspace-trigger" data-dcnode-id="7455" href="#bb0225" name="bbb0225"><span data-dcnode-id="7456" instrument_node="">Klitmøller &amp; Lauring, 2013</span></a><span data-dcnode-id="7454" instrument_node="">) and the formation of trust (</span><a class="workspace-trigger" data-dcnode-id="7452" href="#bb0410" name="bbb0410"><span data-dcnode-id="7453" instrument_node="">Tenzer et al., 2014</span></a><span data-dcnode-id="7451" instrument_node="">) in multinational work environments. Language was shown to have particularly disruptive effects on MNTs, which rely on the interaction of members from different national backgrounds (</span><a class="workspace-trigger" data-dcnode-id="7449" href="#bb0075" name="bbb0075"><span data-dcnode-id="7450" instrument_node="">Earley &amp; Gibson, 2002</span></a><span data-dcnode-id="7448" instrument_node="">) and therefore depend on the efficiency of communication between colleagues speaking different mother tongues.</span></p><p data-dcnode-id="7409" id="p0080"><span data-dcnode-id="7446" instrument_node="">In the context of multinational teamwork, team members' emotional reactions to linguistic diversity are particularly important. Previous studies linking language barriers with emotions, defined as “reaction[s] to an event” and the experiences related to these reactions (</span><a class="workspace-trigger" data-dcnode-id="7444" href="#bb0445" name="bbb0445"><span data-dcnode-id="7445" instrument_node="">Weiss &amp; Cropanzano, 1996: 18</span></a><span data-dcnode-id="7443" instrument_node="">), did so in two different ways: First, language barriers have been described to substantially aggravate already existing friction in a multilingual workforce. Considering that emotions are already very difficult to communicate, interpret and address in a common native language, this is even more so the case in a foreign language (</span><a class="workspace-trigger" data-dcnode-id="7441" href="#bb0175" name="bbb0175"><span data-dcnode-id="7442" instrument_node="">Henderson, 2005</span></a><span data-dcnode-id="7440" instrument_node="">). This makes it particularly difficult to talk things through and overcome problems effectively (</span><a class="workspace-trigger" data-dcnode-id="7438" href="#bb0435" name="bbb0435"><span data-dcnode-id="7439" instrument_node="">von Glinow et al., 2004</span></a><span data-dcnode-id="7437" instrument_node="">). Second, and more importantly, language barriers constitute a source of negative emotions in themselves. </span><a class="workspace-trigger" data-dcnode-id="7435" href="#bb0325" name="bbb0325"><span data-dcnode-id="7436" instrument_node="">Neeley et al. (2012)</span></a><span data-dcnode-id="7434" instrument_node=""> found that language barriers can lead to emotional conflict between native and non-native speakers of an MNC's working language, as the latter might experience apprehension, anxiety, embarrassment, stress, shame and frustration; feel restricted in their communication skills and reduced in their professional standing; and fear negative performance appraisals or job loss (also see </span><a class="workspace-trigger" data-dcnode-id="7432" href="#bb0155" name="bbb0155"><span data-dcnode-id="7433" instrument_node="">Harzing &amp; Feely, 2008</span></a><span data-dcnode-id="7431" instrument_node="">). Consequently, non-native speakers of the working language tend to perceive native speakers as arrogant and resent or mistrust them. They cope with these negative feelings by avoiding situations that require use of the working language and, if having to speak the working language, by frequently switching back into their mother tongue (</span><a class="workspace-trigger" data-dcnode-id="7429" href="#bb0180" name="bbb0180"><span data-dcnode-id="7430" instrument_node="">Hinds et al., 2014</span></a><span data-dcnode-id="7428" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7426" href="#bb0325" name="bbb0325"><span data-dcnode-id="7427" instrument_node="">Neeley et al., 2012</span></a><span data-dcnode-id="7425" instrument_node="">). As a result, native speakers of English often feel excluded, devalued, disrespected, and isolated and might even leave meetings in protest (</span><a class="workspace-trigger" data-dcnode-id="7423" href="#bb0325" name="bbb0325"><span data-dcnode-id="7424" instrument_node="">Neeley et al., 2012</span></a><span data-dcnode-id="7422" instrument_node="">). This conflict further impedes effective communication, leads to divisive language-based subgrouping within multilingual teams (</span><a class="workspace-trigger" data-dcnode-id="7420" href="#bb0180" name="bbb0180"><span data-dcnode-id="7421" instrument_node="">Hinds et al., 2014</span></a><span data-dcnode-id="7419" instrument_node="">) and can produce, in the worst case, a vicious cycle of negative emotions (</span><a class="workspace-trigger" data-dcnode-id="7417" href="#bb0325" name="bbb0325"><span data-dcnode-id="7418" instrument_node="">Neeley et al., 2012</span></a><span data-dcnode-id="7416" instrument_node="">). Consequently, language-induced negative emotions can introduce inefficiencies, impede collaborative efforts and lead to losses in productivity and performance (</span><a class="workspace-trigger" data-dcnode-id="7414" href="#bb0325" name="bbb0325"><span data-dcnode-id="7415" instrument_node="">Neeley et al., 2012</span></a><span data-dcnode-id="7413" instrument_node="">). On a more macro level, with respect to HQ-subsidiary communication, these dynamics can even hamper strategic decision making on a global scale, impeding effective global integration and control (</span><a class="workspace-trigger" data-dcnode-id="7411" href="#bb0155" name="bbb0155"><span data-dcnode-id="7412" instrument_node="">Harzing &amp; Feely, 2008</span></a><span data-dcnode-id="7410" instrument_node="">).</span></p><p data-dcnode-id="7404" id="p0085"><span data-dcnode-id="7408" instrument_node="">These few, above referred to studies made important contributions in bringing the emotional impact of language barriers to the fore. The present study builds on them by examining and systematizing the various negative language-induced emotions experienced by the members of multinational and multilingual teams. More importantly, however, we take the logical next step and focus on the search for solutions to these problematic emotional reactions.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="7406" href="#bb0180" name="bbb0180"><span data-dcnode-id="7407" instrument_node="">Hinds et al. (2014)</span></a><span data-dcnode-id="7405" instrument_node=""> recently explored how the members of global virtual teams cope with their language-induced emotions and found that they frequently use strategies, which impair team interactions and efficiency. We argue that MNT leaders are in a much better position than individual team members to implement truly successful emotion regulation strategies. Therefore, our study will develop leadership strategies geared towards mitigating MNT members' negative language-induced emotions.</span></p></section><section data-dcnode-id="7267" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7401" id="st0065"><span data-dcnode-id="7402" instrument_node="">Emotion management through leaders</span></h3><p data-dcnode-id="7372" id="p0095"><span data-dcnode-id="7400" instrument_node="">Emotion management, also called emotion regulation in the psychological literature, is defined as either managing the antecedents to one's own or others' emotions or manipulating own or others' emotional responses (</span><a class="workspace-trigger" data-dcnode-id="7398" href="#bb0245" name="bbb0245"><span data-dcnode-id="7399" instrument_node="">Little et al., 2012: 407</span></a><span data-dcnode-id="7397" instrument_node="">). Whereas psychological research mainly focuses on self-management or self-regulation (for an overview see </span><a class="workspace-trigger" data-dcnode-id="7395" href="#bb0135" name="bbb0135"><span data-dcnode-id="7396" instrument_node="">Gross &amp; Thompson, 2007</span></a><span data-dcnode-id="7394" instrument_node="">), an increasing number of studies has recently been dedicated to the management or regulation of others' emotions (e.g. </span><a class="workspace-trigger" data-dcnode-id="7392" href="#bb0330" name="bbb0330"><span data-dcnode-id="7393" instrument_node="">Niven et al., 2009</span></a><span data-dcnode-id="7391" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7389" href="#bb0450" name="bbb0450"><span data-dcnode-id="7390" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="7388" instrument_node="">). Since employees in lower ranks of an organization usually have little scope to influence their colleagues' emotions, most of these studies focus on higher-ranking managers addressing their subordinates' emotions (e.g. </span><a class="workspace-trigger" data-dcnode-id="7386" href="#bb0280" name="bbb0280"><span data-dcnode-id="7387" instrument_node="">McColl-Kennedy and Anderson, 2002</span></a><span data-dcnode-id="7385" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7383" href="#bb0345" name="bbb0345"><span data-dcnode-id="7384" instrument_node="">Ozcelik et al., 2008</span></a><span data-dcnode-id="7382" instrument_node="">). A number of studies found that managing subordinates' emotions constitutes an important component of effective leadership (</span><a class="workspace-trigger" data-dcnode-id="7380" href="#bb0010" name="bbb0010"><span data-dcnode-id="7381" instrument_node="">Ayoko and Konrad, 2012</span></a><span data-dcnode-id="7379" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7377" href="#bb0220" name="bbb0220"><span data-dcnode-id="7378" instrument_node="">Kaplan et al., 2014</span></a><span data-dcnode-id="7376" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7374" href="#bb0415" name="bbb0415"><span data-dcnode-id="7375" instrument_node="">Thiel et al., 2012</span></a><span data-dcnode-id="7373" instrument_node="">).</span></p><p data-dcnode-id="7310" id="p0100"><span data-dcnode-id="7371" instrument_node="">Following the work of </span><a class="workspace-trigger" data-dcnode-id="7369" href="#bb0130" name="bbb0130"><span data-dcnode-id="7370" instrument_node="">Gross (1998)</span></a><span data-dcnode-id="7368" instrument_node="">, a dominant model of emotion management has emerged, which distinguishes four central emotion management strategies. Different authors use a slightly varied terminology, but agree on the following typology: The first and most proactive strategy to counteract negative emotions lies in </span><em data-dcnode-id="7366"><span data-dcnode-id="7367" instrument_node="">altering the situation</span></em><span data-dcnode-id="7365" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="7363" href="#bb0450" name="bbb0450"><span data-dcnode-id="7364" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="7362" instrument_node="">) of the affected person by modifying or removing some or all of its emotion provoking elements (</span><a class="workspace-trigger" data-dcnode-id="7360" href="#bb0135" name="bbb0135"><span data-dcnode-id="7361" instrument_node="">Gross and Thompson, 2007</span></a><span data-dcnode-id="7359" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7357" href="#bb0245" name="bbb0245"><span data-dcnode-id="7358" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="7356" instrument_node="">). The second strategy aims at </span><em data-dcnode-id="7354"><span data-dcnode-id="7355" instrument_node="">altering attention</span></em><span data-dcnode-id="7353" instrument_node=""> by distracting attention away from the emotion-provoking situation (</span><a class="workspace-trigger" data-dcnode-id="7351" href="#bb0135" name="bbb0135"><span data-dcnode-id="7352" instrument_node="">Gross and Thompson, 2007</span></a><span data-dcnode-id="7350" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7348" href="#bb0450" name="bbb0450"><span data-dcnode-id="7349" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="7347" instrument_node="">). Leaders can achieve this by redirecting subordinates' attention away from those elements of a situation that are perceived as harmful while focusing on its non-threatening aspects (</span><a class="workspace-trigger" data-dcnode-id="7345" href="#bb0135" name="bbb0135"><span data-dcnode-id="7346" instrument_node="">Gross and Thompson, 2007</span></a><span data-dcnode-id="7344" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7342" href="#bb0245" name="bbb0245"><span data-dcnode-id="7343" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="7341" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7339" href="#bb0330" name="bbb0330"><span data-dcnode-id="7340" instrument_node="">Niven et al., 2009</span></a><span data-dcnode-id="7338" instrument_node="">). A third possible strategy aims at </span><em data-dcnode-id="7336"><span data-dcnode-id="7337" instrument_node="">altering the cognitive meaning of the situation</span></em><span data-dcnode-id="7335" instrument_node=""> causing the negative emotional responses. To do this, leaders may encourage employees to reinterpret the situation as being less harmful (</span><a class="workspace-trigger" data-dcnode-id="7333" href="#bb0245" name="bbb0245"><span data-dcnode-id="7334" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="7332" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7330" href="#bb0330" name="bbb0330"><span data-dcnode-id="7331" instrument_node="">Niven et al., 2009</span></a><span data-dcnode-id="7329" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7327" href="#bb0415" name="bbb0415"><span data-dcnode-id="7328" instrument_node="">Thiel et al., 2012</span></a><span data-dcnode-id="7326" instrument_node="">) or help them to positively reappraise their capacity to manage the demands of the situation (</span><a class="workspace-trigger" data-dcnode-id="7324" href="#bb0135" name="bbb0135"><span data-dcnode-id="7325" instrument_node="">Gross &amp; Thompson, 2007</span></a><span data-dcnode-id="7323" instrument_node="">). A fourth and rather superficial strategy lies in </span><em data-dcnode-id="7321"><span data-dcnode-id="7322" instrument_node="">suppressing subordinates</span></em><span data-dcnode-id="7320" instrument_node="">' </span><em data-dcnode-id="7318"><span data-dcnode-id="7319" instrument_node="">emotional responses</span></em><span data-dcnode-id="7317" instrument_node=""> by interrupting current emotional outbreaks, for example by encouraging the affected person to calm down or breathe deeply (</span><a class="workspace-trigger" data-dcnode-id="7315" href="#bb0245" name="bbb0245"><span data-dcnode-id="7316" instrument_node="">Little et al., 2012</span></a><span data-dcnode-id="7314" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7312" href="#bb0450" name="bbb0450"><span data-dcnode-id="7313" instrument_node="">Williams, 2007</span></a><span data-dcnode-id="7311" instrument_node="">).</span></p><p data-dcnode-id="7302" id="p0105"><span data-dcnode-id="7309" instrument_node="">The first three of these strategies are antecedent-focused, as they aim to remedy the problem by addressing the causes (antecedents) of emotions. Leaders typically employ these strategies before fully developed emotional responses can arise in a given situation. The fourth strategy is response-focused in that it merely aims to interrupt emotional outbreaks (responses). This strategy occurs after emotional responses have already arisen (</span><a class="workspace-trigger" data-dcnode-id="7307" href="#bb0135" name="bbb0135"><span data-dcnode-id="7308" instrument_node="">Gross and Thompson, 2007</span></a><span data-dcnode-id="7306" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7304" href="#bb0260" name="bbb0260"><span data-dcnode-id="7305" instrument_node="">Loewenstein, 2007</span></a><span data-dcnode-id="7303" instrument_node="">).</span></p><p data-dcnode-id="7270" id="p0110"><span data-dcnode-id="7301" instrument_node="">To date empirical research specifically on MNT leaders managing emotions in </span><em data-dcnode-id="7299"><span data-dcnode-id="7300" instrument_node="">diverse</span></em><span data-dcnode-id="7298" instrument_node=""> groups is still very limited (</span><a class="workspace-trigger" data-dcnode-id="7296" href="#bb0010" name="bbb0010"><span data-dcnode-id="7297" instrument_node="">Ayoko &amp; Konrad, 2012</span></a><span data-dcnode-id="7295" instrument_node="">). The few studies addressing this topic for multinational settings focus exclusively on the emotional challenges of cross-</span><em data-dcnode-id="7293"><span data-dcnode-id="7294" instrument_node="">cultural</span></em><span data-dcnode-id="7292" instrument_node=""> cooperation and investigate cultural differences in the display of emotions (</span><a class="workspace-trigger" data-dcnode-id="7290" href="#bb0290" name="bbb0290"><span data-dcnode-id="7291" instrument_node="">Mesquita &amp; Albert, 2007</span></a><span data-dcnode-id="7289" instrument_node="">) or culture-specific expectations towards leaders (</span><a class="workspace-trigger" data-dcnode-id="7287" href="#bb0195" name="bbb0195"><span data-dcnode-id="7288" instrument_node="">House et al., 2004</span></a><span data-dcnode-id="7286" instrument_node="">). In contrast, scholars have so far neglected the specific challenges of emotion management in multi</span><em data-dcnode-id="7284"><span data-dcnode-id="7285" instrument_node="">lingual</span></em><span data-dcnode-id="7283" instrument_node=""> contexts. Even though cultural barriers and language barriers are closely intertwined (</span><a class="workspace-trigger" data-dcnode-id="7281" href="#bb0225" name="bbb0225"><span data-dcnode-id="7282" instrument_node="">Klitmøller &amp; Lauring, 2013</span></a><span data-dcnode-id="7280" instrument_node="">), they are still separate concepts (</span><a class="workspace-trigger" data-dcnode-id="7278" href="#bb0170" name="bbb0170"><span data-dcnode-id="7279" instrument_node="">Harzing &amp; Pudelko, 2014</span></a><span data-dcnode-id="7277" instrument_node="">). Consequently, language barriers are likely to entail unique emotional challenges (</span><a class="workspace-trigger" data-dcnode-id="7275" href="#bb0180" name="bbb0180"><span data-dcnode-id="7276" instrument_node="">Hinds et al., 2014</span></a><span data-dcnode-id="7274" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7272" href="#bb0325" name="bbb0325"><span data-dcnode-id="7273" instrument_node="">Neeley et al., 2012</span></a><span data-dcnode-id="7271" instrument_node="">), which will transcend the impact of cultural value differences and, hence, require specifically tailored leadership measures to manage and regulate them.</span></p><p data-dcnode-id="7268" id="p0115"><span data-dcnode-id="7269" instrument_node="">We will develop our contribution to this field in two steps. First, we will investigate the language-induced emotional challenges on the basis of the following research question: “Which negative emotional reactions do language barriers trigger among MNT members?” In response to this question, our study will provide a classification of MNT members' negative emotional reactions to language barriers. In a second step, we will search for suitable leadership measures to manage these disruptive emotions. Our second and main research question therefore is: “How can MNT leaders mitigate negative language-induced emotions among their subordinates?” In responding to this question, we will develop specific guidelines for MNT leaders to follow.</span></p></section></section><section data-dcnode-id="6628" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7264" id="st0015"><span data-dcnode-id="7265" instrument_node="">Method</span></h2><section data-dcnode-id="7219" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7262" id="st0070"><span data-dcnode-id="7263" instrument_node="">Research design</span></h3><p data-dcnode-id="7245" id="p0125"><span data-dcnode-id="7261" instrument_node="">MNTs provide a particularly information-rich context for the specific purpose of our study. First, they typically have a higher degree of linguistic diversity compared to regular hierarchies. Second, teams constitute “cauldrons of bubbling emotions” (</span><a class="workspace-trigger" data-dcnode-id="7259" href="#bb0110" name="bbb0110"><span data-dcnode-id="7260" instrument_node="">Goleman, 1998: 101</span></a><span data-dcnode-id="7258" instrument_node="">), as their work involves “social mechanisms of sharing, accountability and managing relationships, all of which can be inherently and intensely emotional” (</span><a class="workspace-trigger" data-dcnode-id="7256" href="#bb0395" name="bbb0395"><span data-dcnode-id="7257" instrument_node="">Stewart, Williams, Castro, &amp; Reus, 2011: 2</span></a><span data-dcnode-id="7255" instrument_node="">). Third, MNT leaders usually have a lower degree of formal authority over team members compared to superiors in traditional hierarchies (</span><a class="workspace-trigger" data-dcnode-id="7253" href="#bb0360" name="bbb0360"><span data-dcnode-id="7254" instrument_node="">Pinto, 2000</span></a><span data-dcnode-id="7252" instrument_node="">). Hence, in order to be accepted as leaders, MNT leaders in particular need to show good leadership. Finally, work teams “are the basic units in business organizations around the world, and their activities are ubiquitous within organizations” (</span><a class="workspace-trigger" data-dcnode-id="7250" href="#bb0060" name="bbb0060"><span data-dcnode-id="7251" instrument_node="">Chen &amp; Lin, 2013: 675</span></a><span data-dcnode-id="7249" instrument_node="">). Particularly MNTs are considered at “the ‘heart’ of globalization” (</span><a class="workspace-trigger" data-dcnode-id="7247" href="#bb0470" name="bbb0470"><span data-dcnode-id="7248" instrument_node="">Zander et al., 2012: 592</span></a><span data-dcnode-id="7246" instrument_node="">), so research in this context is of highest theoretical and practical relevance.</span></p><p data-dcnode-id="7231" id="p0130"><span data-dcnode-id="7244" instrument_node="">Given the lack of theory development on the regulation of language-induced emotions in teamwork, we considered a qualitative, exploratory and inductive approach the most appropriate for our purpose. This research design helps us to address “how” questions such as ours (</span><a class="workspace-trigger" data-dcnode-id="7242" href="#bb0365" name="bbb0365"><span data-dcnode-id="7243" instrument_node="">Pratt, 2009</span></a><span data-dcnode-id="7241" instrument_node="">), to investigate complex subject areas (</span><a class="workspace-trigger" data-dcnode-id="7239" href="#bb0405" name="bbb0405"><span data-dcnode-id="7240" instrument_node="">Suddaby, 2006</span></a><span data-dcnode-id="7238" instrument_node="">) and to capture the mechanisms under study in the form of robust mid-range theory (</span><a class="workspace-trigger" data-dcnode-id="7236" href="#bb0080" name="bbb0080"><span data-dcnode-id="7237" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="7235" instrument_node="">). Specifically for research on leadership and emotions, </span><a class="workspace-trigger" data-dcnode-id="7233" href="#bb0115" name="bbb0115"><span data-dcnode-id="7234" instrument_node="">Gooty et al. (2010)</span></a><span data-dcnode-id="7232" instrument_node=""> call for more qualitative studies conducted in naturalistic settings.</span></p><p data-dcnode-id="7220" id="p0135"><span data-dcnode-id="7230" instrument_node="">Following </span><a class="workspace-trigger" data-dcnode-id="7228" href="#bb0085" name="bbb0085"><span data-dcnode-id="7229" instrument_node="">Eisenhardt and Graebner (2007)</span></a><span data-dcnode-id="7227" instrument_node="">, we grounded our study in prior research, specifically theories on language effects in international business and on emotion management as a leadership challenge. Although the emotion management strategies outlined in the literature provided some focus to our data collection (</span><a class="workspace-trigger" data-dcnode-id="7225" href="#bb0080" name="bbb0080"><span data-dcnode-id="7226" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="7224" instrument_node="">), we did not have any preconceived notions about how MNT leaders might enact such strategies to address the particular emotional challenges of multilingual settings. Our study's contribution lies in the specific investigation of language effects on MNT members' emotions and the related leadership strategies. We therefore follow the dominant methodological paradigm of the fast growing research stream on language in MNCs, which is seeking in-depth information about employees' subjective perceptions based on semi-structured interviews (</span><a class="workspace-trigger" data-dcnode-id="7222" href="#bb0370" name="bbb0370"><span data-dcnode-id="7223" instrument_node="">Pudelko, Tenzer, &amp; Harzing, 2015</span></a><span data-dcnode-id="7221" instrument_node="">).</span></p></section><section data-dcnode-id="6704" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7217" id="st0075"><span data-dcnode-id="7218" instrument_node="">Research setting</span></h3><p data-dcnode-id="7206" id="p0145"><span data-dcnode-id="7216" instrument_node="">To focus our analysis on the phenomena under study, we intended to control for industry and home country effects by conducting all our investigations in one industry and one country. More specifically, we considered German automotive firms to be particularly well suited for our investigation. Automotive companies in general have traditionally been associated with cutting-edge management practice (</span><a class="workspace-trigger" data-dcnode-id="7214" href="#bb0015" name="bbb0015"><span data-dcnode-id="7215" instrument_node="">Barnes &amp; Morris, 2008</span></a><span data-dcnode-id="7213" instrument_node="">) due to their very complex products, their intense competition and their high degree of globalization. Due to the particular success of German firms in this sector, MNTs in German car companies seem to be particularly promising research objects. This research setting also helped to interpret interviewees' accounts in a way that preserved the authenticity of their perspectives (</span><a class="workspace-trigger" data-dcnode-id="7211" href="#bb0235" name="bbb0235"><span data-dcnode-id="7212" instrument_node="">Langley, 1999</span></a><span data-dcnode-id="7210" instrument_node="">), since both authors have a profound understanding of the German business culture and speak German as their mother tongue. For inductive investigations like ours, the researchers' ability to understand the research setting deeply can be an important advantage in the interpretation of rich data (</span><a class="workspace-trigger" data-dcnode-id="7208" href="#bb0305" name="bbb0305"><span data-dcnode-id="7209" instrument_node="">Morgan &amp; Smircich, 1980</span></a><span data-dcnode-id="7207" instrument_node="">). We collected our data in three out of the seven major players in the German automotive industry (pseudonyms MOTORCORP, AUTOCORP and CARCORP). Two of the remaining German automakers were not included, as they form part of the same corporate group as one of the companies already represented in our dataset. We did not consider the remaining two corporations, as they belong to American automotive groups.</span></p><p data-dcnode-id="7194" id="p0150"><span data-dcnode-id="7205" instrument_node="">Our dataset consists of in-depth investigations in 15 MNTs, five in each of the three selected organizations.</span><a class="workspace-trigger" data-dcnode-id="7202" href="#fn0010" name="bfn0010"><sup data-dcnode-id="7203"><span data-dcnode-id="7204" instrument_node="">2</span></sup></a><span data-dcnode-id="7201" instrument_node=""> We included several teams in each firm to look beyond team idiosyncrasies and compared MNTs employed by different corporations to capture potential influences of the organizational context on language use, employees' emotions and leadership. Sampling multiple teams across organizational contexts strengthens our research design (</span><a class="workspace-trigger" data-dcnode-id="7199" href="#bb0270" name="bbb0270"><span data-dcnode-id="7200" instrument_node="">Mathieu, Maynard, Rapp, &amp; Gilson, 2008</span></a><span data-dcnode-id="7198" instrument_node="">), as it allows us to probe the robustness of our emerging theory (</span><a class="workspace-trigger" data-dcnode-id="7196" href="#bb0085" name="bbb0085"><span data-dcnode-id="7197" instrument_node="">Eisenhardt &amp; Graebner, 2007</span></a><span data-dcnode-id="7195" instrument_node="">).</span></p><p data-dcnode-id="7186" id="p0155"><span data-dcnode-id="7193" instrument_node="">To sample the most interesting (</span><a class="workspace-trigger" data-dcnode-id="7191" href="#bb0310" name="bbb0310"><span data-dcnode-id="7192" instrument_node="">Myers, 2008</span></a><span data-dcnode-id="7190" instrument_node="">) and information-rich (</span><a class="workspace-trigger" data-dcnode-id="7188" href="#bb0355" name="bbb0355"><span data-dcnode-id="7189" instrument_node="">Patton, 2002</span></a><span data-dcnode-id="7187" instrument_node="">) cases with respect to our research questions, we selected MNTs based on high linguistic diversity, different MNT leader nationalities and mother tongues as well as a high degree of interdependency and interaction between their members. With the exception of the bi-national team AUTO4, we selected only teams including members of three or more nationalities and mother tongues. To capture the influence of particular language practices on MNT members' emotions, we also sampled teams following different language policies. Whereas the teams MOTOR 1–4 and CAR 3–5 adopted English, the lingua franca of international business, as their working language, the teams AUTO 1 and AUTO 2 used German, the home country language. The remaining teams did not regulate language use and allowed members to switch at discretion.</span></p><div data-dcnode-id="6705"><p data-dcnode-id="7181" id="p0160"><span data-dcnode-id="7185" instrument_node="">To sample teams with frequent direct interaction and, as a consequence, intense emotional dynamics, we focused our study on MNTs which were primarily co-located. Furthermore, we sought out a broad range of functional areas, including R&amp;D, cost planning, purchasing, production, sales, IT, HR and business development. Comparisons between these teams allowed us to uncover possible variations or commonalities in language-induced emotions and leadership measures across functions. </span><a class="workspace-trigger" data-dcnode-id="7183" href="#t0005" name="bt0005"><span data-dcnode-id="7184" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="7182" instrument_node=""> summarizes the relevant characteristics of our case study teams and interviewees.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6706" id="t0005"><span class="captions" data-dcnode-id="7173"><span data-dcnode-id="7174" id="ca0005"><p data-dcnode-id="7175" id="sp0010"><span class="label" data-dcnode-id="7179"><span data-dcnode-id="7180" instrument_node="">Table&nbsp;1</span></span><span data-dcnode-id="7178" instrument_node="">. </span><span data-dcnode-id="7176" instrument_node="">Overview of investigated teams.</span></p></span></span><div class="groups" data-dcnode-id="6718"><table data-dcnode-id="6719"><thead data-dcnode-id="7153"><tr class="valign-top rowsep-1" data-dcnode-id="7154"><th class="align-left" data-dcnode-id="7171" scope="col"><span data-dcnode-id="7172" instrument_node="">Firm</span></th><th class="align-left" data-dcnode-id="7169" scope="col"><span data-dcnode-id="7170" instrument_node="">Team</span></th><th class="align-left" data-dcnode-id="7167" scope="col"><span data-dcnode-id="7168" instrument_node="">Functional area</span></th><th class="align-left" data-dcnode-id="7165" scope="col"><span data-dcnode-id="7166" instrument_node="">Team size and composition</span></th><th class="align-left" data-dcnode-id="7163" scope="col"><span data-dcnode-id="7164" instrument_node="">Official team language</span></th><th class="align-left" data-dcnode-id="7161" scope="col"><span data-dcnode-id="7162" instrument_node="">Year foun-ded</span></th><th class="align-left" data-dcnode-id="7159" scope="col"><span data-dcnode-id="7160" instrument_node="">Interviewees</span></th><th class="align-left" data-dcnode-id="7157" scope="col"><span data-dcnode-id="7158" instrument_node="">Duration recorded interviews</span></th><th class="align-left" data-dcnode-id="7155" scope="col"><span data-dcnode-id="7156" instrument_node="">No. of transcript pages</span></th></tr></thead><tbody data-dcnode-id="6720"><tr class="valign-top" data-dcnode-id="7134"><td class="align-left" data-dcnode-id="7151" rowspan="6"><span dat e-id="6816" instrument_node="">9 AT, 6 DE, 3 IT, 3 ES, 3 US, 1 UK</span></td><td class="align-left" data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">NR, German or English</span></td><td class="align-left" data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">2008</span></td><td class="align-left" data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">2 AT (1 TL), 1 IT</span></td><td class="align-left" data-dcnode-id="6799"><span data-dcnode-id="6808" instrument_node="">1</span><span data-dcnode-id="6806" instrument_node="">&nbsp;</span><span data-dcnode-id="6804" instrument_node="">h 26</span><span data-dcnode-id="6802" instrument_node="">&nbsp;</span><span data-dcnode-id="6800" instrument_node="">min</span></td><td class="align-left" data-dcnode-id="6797"><span data-dcnode-id="6798" instrument_node="">26</span></td></tr><tr class="valign-top" data-dcnode-id="6771"><td class="align-left" data-dcnode-id="6794"><span data-dcnode-id="6795" instrument_node="">CAR3</span></td><td class="align-left" data-dcnode-id="6792"><span data-dcnode-id="6793" instrument_node="">R&amp;D</span></td><td class="align-left" data-dcnode-id="6790"><span data-dcnode-id="6791" instrument_node="">9 DE, 4 UK, 3 US,1 ZA, 1 F</span></td><td class="align-left" data-dcnode-id="6788"><span data-dcnode-id="6789" instrument_node="">English</span></td><td class="align-left" data-dcnode-id="6786"><span data-dcnode-id="6787" instrument_node="">2009</span></td><td class="align-left" data-dcnode-id="6784"><span data-dcnode-id="6785" instrument_node="">3 DE (1 TL), 1 F</span></td><td class="align-left" data-dcnode-id="6774"><span data-dcnode-id="6783" instrument_node="">3</span><span data-dcnode-id="6781" instrument_node="">&nbsp;</span><span data-dcnode-id="6779" instrument_node="">h 37</span><span data-dcnode-id="6777" instrument_node="">&nbsp;</span><span data-dcnode-id="6775" instrument_node="">min</span></td><td class="align-left" data-dcnode-id="6772"><span data-dcnode-id="6773" instrument_node="">45</span></td></tr><tr class="valign-top" data-dcnode-id="6746"><td class="align-left" data-dcnode-id="6769"><span data-dcnode-id="6770" instrument_node="">CAR4</span></td><td class="align-left" data-dcnode-id="6767"><span data-dcnode-id="6768" instrument_node="">Purchasing</span></td><td class="align-left" data-dcnode-id="6765"><span data-dcnode-id="6766" instrument_node="">12 CN, 5 DE, 1 F</span></td><td class="align-left" data-dcnode-id="6763"><span data-dcnode-id="6764" instrument_node="">English</span></td><td class="align-left" data-dcnode-id="6761"><span data-dcnode-id="6762" instrument_node="">2009</span></td><td class="align-left" data-dcnode-id="6759"><span data-dcnode-id="6760" instrument_node="">3 DE (1 TL), 1 F, 1 CN</span></td><td class="align-left" data-dcnode-id="6749"><span data-dcnode-id="6758" instrument_node="">4</span><span data-dcnode-id="6756" instrument_node="">&nbsp;</span><span data-dcnode-id="6754" instrument_node="">h 24</span><span data-dcnode-id="6752" instrument_node="">&nbsp;</span><span data-dcnode-id="6750" instrument_node="">min</span></td><td class="align-left" data-dcnode-id="6747"><span data-dcnode-id="6748" instrument_node="">79</span></td></tr><tr class="valign-top" data-dcnode-id="6721"><td class="align-left" data-dcnode-id="6744"><span data-dcnode-id="6745" instrument_node="">CAR5</span></td><td class="align-left" data-dcnode-id="6742"><span data-dcnode-id="6743" instrument_node="">R&amp;D</span></td><td class="align-left" data-dcnode-id="6740"><span data-dcnode-id="6741" instrument_node="">6 DE, 6 US, 2 MEX, 1 AR</span></td><td class="align-left" data-dcnode-id="6738"><span data-dcnode-id="6739" instrument_node="">English</span></td><td class="align-left" data-dcnode-id="6736"><span data-dcnode-id="6737" instrument_node="">2008</span></td><td class="align-left" data-dcnode-id="6734"><span data-dcnode-id="6735" instrument_node="">4 DE (1 TL), 2 US</span></td><td class="align-left" data-dcnode-id="6724"><span data-dcnode-id="6733" instrument_node="">4</span><span data-dcnode-id="6731" instrument_node="">&nbsp;</span><span data-dcnode-id="6729" instrument_node="">h 31</span><span data-dcnode-id="6727" instrument_node="">&nbsp;</span><span data-dcnode-id="6725" instrument_node="">min</span></td><td class="align-left" data-dcnode-id="6722"><span data-dcnode-id="6723" instrument_node="">66</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="6707"></p><p data-dcnode-id="6708" id="sp0015"><span data-dcnode-id="6717" instrument_node="">NR</span><span data-dcnode-id="6716" instrument_node="">&nbsp;</span><span data-dcnode-id="6715" instrument_node="">=</span><span data-dcnode-id="6714" instrument_node="">&nbsp;</span><span data-dcnode-id="6713" instrument_node="">not regulated; TL</span><span data-dcnode-id="6712" instrument_node="">&nbsp;</span><span data-dcnode-id="6711" instrument_node="">=</span><span data-dcnode-id="6710" instrument_node="">&nbsp;</span><span data-dcnode-id="6709" instrument_node="">team leader; Country codes: Argentina: AR, Austria: AT, Brazil: BR, China: CN, France: F, Germany: DE, Greece: GR, Hungary: HU, India: IN, Italy: IT, Japan: J, Mexico: MEX, Morocco: MA, Netherlands: NL, Reunion: RE, Romania: RO, Russia: RU, South Africa: ZA, Spain: ES, Sweden: SE, Turkey: TR, USA: US, and United Kingdom: UK.</span></p><p></p></div></div></section><section data-dcnode-id="6659" id="s0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6702" id="st0080"><span data-dcnode-id="6703" instrument_node="">Data collection</span></h3><p data-dcnode-id="6688" id="p0175"><span data-dcnode-id="6701" instrument_node="">This investigation is based on 90 semi-structured interviews (conducted in 2011–2012) with the formally assigned leaders of all 15 selected MNTs, 67 of their subordinates and eight superordinate managers of the three MNCs under study. Emotions are experienced at the level of the individual MNT member and the respective measures to regulate them are performed by individual MNT leaders. Therefore, we argue that interviews are best suited for obtaining in-depth insights into the lived experiences of these distinct groups. We considered semi-structured interviews most appropriate for our theory building purpose, as they secure comparability through a certain degree of consistency in questions, but still allow informants to bring up additional issues they consider important (</span><a class="workspace-trigger" data-dcnode-id="6699" href="#bb0310" name="bbb0310"><span data-dcnode-id="6700" instrument_node="">Myers, 2008</span></a><span data-dcnode-id="6698" instrument_node="">). We designed our interviews in a problem-centered fashion, asking our interviewees to illustrate their reflections on the emotional impact of language with critical incidents (</span><a class="workspace-trigger" data-dcnode-id="6696" href="#bb0145" name="bbb0145"><span data-dcnode-id="6697" instrument_node="">Hajro &amp; Pudelko, 2010</span></a><span data-dcnode-id="6695" instrument_node="">), i.e. occurrences from their working environment which they perceived as both problematic and significant in the context of the general topic (</span><a class="workspace-trigger" data-dcnode-id="6693" href="#bb0055" name="bbb0055"><span data-dcnode-id="6694" instrument_node="">Chell, 2004</span></a><span data-dcnode-id="6692" instrument_node="">). According to </span><a class="workspace-trigger" data-dcnode-id="6690" href="#bb0115" name="bbb0115"><span data-dcnode-id="6691" instrument_node="">Gooty et al. (2010)</span></a><span data-dcnode-id="6689" instrument_node="">, critical incident techniques are well suited to capture the dynamic nature of individual emotions.</span></p><p data-dcnode-id="6686" id="p0180"><span data-dcnode-id="6687" instrument_node="">We started each interview with initial demographic questions and gathered information about team composition, language practices and policies. We subsequently continued the interviews in an exploratory fashion, asking, among others, about informants' emotional experiences related to working in a multilingual environment. We introduced this topic with rather open questions such as “How do you feel about the need to communicate in a foreign language at work?” or “How do you feel about the unequal working language proficiencies in your team?” When speaking with MNT leaders, we added the question “How do you think your subordinates feel about these issues?” Based on the emotions our informants named, we subsequently asked probing questions to capture related critical incidents: “Could you please describe a specific situation in which language barriers created anxiety/resentment in your team?” With questions such as “How do MNT members and their leader cope with language anxiety/resentment?”, we explored successful measures to manage the negative emotional impact of language barriers.</span></p><p data-dcnode-id="6684" id="p0185"><span data-dcnode-id="6685" instrument_node="">In the process of interviewing, it quickly emerged that MNT leaders have a highly prominent role in the mitigation of language-induced emotions. Since the respondents we interviewed in the early phase of data gathering stressed this aspect very prominently, we focused our subsequent data collection even more on the MNT leader's role. At this stage, we asked general questions such as “What does your leader do to mitigate language anxiety/resentment?” and probing questions such as “Could you please describe a specific situation in which the MNT leader successfully addressed language-related emotions in your team?” When speaking with MNT leaders themselves, we adjusted the wording of these questions accordingly. We constantly compared our findings to the extant literature on leadership in MNTs, language in international business and emotions in organizations.</span></p><p data-dcnode-id="6679" id="p0190"><span data-dcnode-id="6683" instrument_node="">To triangulate different perspectives on language-related emotions and their management by leaders, it was crucial to sample informants from different hierarchical levels. First, we gathered in-depth problem descriptions by interviewing those who were most affected by language-induced emotions, i.e. MNT members. These interviewees also provided us with descriptions and evaluations of how their leaders have addressed language-induced emotions, respectively how they should have addressed them. To obtain diverse perspectives from MNT members on the issues under study, we aimed to sample interviewees from as many different nationalities and native tongues as possible. Our final sample includes team members from 19 nationalities, speaking 14 different mother tongues. With the recommendation of theoretical sampling (</span><a class="workspace-trigger" data-dcnode-id="6681" href="#bb0100" name="bbb0100"><span data-dcnode-id="6682" instrument_node="">Glaser &amp; Strauss, 1967</span></a><span data-dcnode-id="6680" instrument_node="">) in mind, we moreover covered interviewees with varying proficiency levels in English (the working language of many MNTs) and German (the companies' home country language and the working language of some MNTs).</span></p><p data-dcnode-id="6677" id="p0195"><span data-dcnode-id="6678" instrument_node="">Considering that individual MNT leaders perform the leadership measures geared towards regulating language-induced emotions, it was also crucial to gain insights into their lived experiences. Therefore, we interviewed the assigned leaders of all 15 investigated MNTs. These informants enhanced our problem description by providing us with their understanding of subordinates' language-induced emotions. More importantly, however, they allowed us in-depth insights into their leadership experiences with and perspectives on managing these problematic issues. Including informants from Germany, Austria, the US, China and Turkey, our sample includes a broad range of national backgrounds, even for the smaller group of MNT leaders. Most of the MNT leaders we interviewed were native speakers of their team's working language or had gained high fluency through previous international experience. However, several of them still did not consider their proficiency fully satisfactory and, hence, experienced themselves first-hand some language-based emotions.</span></p><p data-dcnode-id="6675" id="p0200"><span data-dcnode-id="6676" instrument_node="">Finally, we complemented our data collection in MNTs with the perspectives of eight superordinate managers of the three automotive MNCs. These individuals disposed of extensive leadership experience in a variety of multilingual contexts and were in the position to influence management practices of lower-level MNT leaders. Consequently, they were able to provide us with comprehensive accounts of emotion management from a more elevated perspective.</span></p><p data-dcnode-id="6670" id="p0205"><span data-dcnode-id="6674" instrument_node="">As a consequence of this theoretically guided interviewee selection, we reached data saturation (</span><a class="workspace-trigger" data-dcnode-id="6672" href="#bb0255" name="bbb0255"><span data-dcnode-id="6673" instrument_node="">Locke, 2001</span></a><span data-dcnode-id="6671" instrument_node="">) after nearly two thirds of our 90 interviews, when the marginal increase in knowledge gained from each subsequent interview became quite small. Nevertheless, we conducted additional interviews, further broadening the range of informants' mother tongues and including additional MNTs into our sample, to make sure that we really achieved saturation.</span></p><p data-dcnode-id="6660" id="p0210"><span data-dcnode-id="6669" instrument_node="">We conducted the interviews with German or English native speakers in their native tongue. Informants speaking other mother tongues were interviewed in either German or English or in a mix of both languages, depending on which option they preferred. Whereas one may argue that interviewing other native speakers in their respective mother tongues as well may have optimized the rapport between researchers and interviewees, all interviewees were used to speaking either English or German in their daily team practice. The length of our interviews typically varied between 45</span><span data-dcnode-id="6667" instrument_node="">&nbsp;</span><span data-dcnode-id="6665" instrument_node="">min and 1</span><span data-dcnode-id="6663" instrument_node="">&nbsp;</span><span data-dcnode-id="6661" instrument_node="">h. We digitally recorded all interviews and transcribed them in their original language.</span></p></section><section data-dcnode-id="6629" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6657" id="st0085"><span data-dcnode-id="6658" instrument_node="">Data analysis</span></h3><p data-dcnode-id="6649" id="p0220"><span data-dcnode-id="6656" instrument_node="">We already initiated the content analysis of our interviews during the data collection phase in order to enable iterations between data, emerging concepts and the existing literature (</span><a class="workspace-trigger" data-dcnode-id="6654" href="#bb0255" name="bbb0255"><span data-dcnode-id="6655" instrument_node="">Locke, 2001</span></a><span data-dcnode-id="6653" instrument_node="">). In this first stage of analysis, we followed the process of open coding (</span><a class="workspace-trigger" data-dcnode-id="6651" href="#bb0100" name="bbb0100"><span data-dcnode-id="6652" instrument_node="">Glaser &amp; Strauss, 1967</span></a><span data-dcnode-id="6650" instrument_node="">), in which we labeled every single passage of our interviews with codes reflecting the topics informants touched upon. During this process, we left interview transcripts in their original languages to preserve their specific meanings and only translated the quotations used for illustration in this article into English,
