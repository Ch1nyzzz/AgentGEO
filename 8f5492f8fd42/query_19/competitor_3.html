</span><meta content="What are Cultural Barriers in Negotiation? Intercultural negotiations are common these days—and so are culture clashes. Here’s how to overcome cultural barriers in negotiation. If you negotiate regularly on the job, you probably have engaged in multiple business negotiations with counterparts from other cultures. Negotiating across cultural barriers can significantly expand your organization’s reach and bring great rewards. Yet negotiating cross-culturally also can pose challenges. For example, misunderstandings and even conflict based on cultural differences come up from time to time. Cultural barriers often spring from our different histories or from communication gaps. One approach, however, suggests that rather than focusing on overcoming the differences caused by cultural barriers, look for ways to bridge the two (or more) cultures represented in your business negotiations. That bridge-building might mean pointing out cultural similarities, such as a shared ancestry or familiar customs. Or it could involve finding commonalities that go beyond cultures, such as a shared experience, interest, or goal. Here are a few simple rules for coping with&nbsp;cultural barriers in international negotiations&nbsp;and transactions: Show respect for cultural differences. Respect for cultural differences will get you a lot farther than ignorance, so it’s important to do your research when entering into negotiations with unfamiliar counterparts. Be aware of how your culture is perceived.&nbsp;You can adjust your approach during negotiations to get a better outcome if any of these perspectives are negative. Consider the individual. If rule number one in an&nbsp;international negotiation is to know the other side’s culture, rule number two is to avoid overreliance on that knowledge. Just as you wouldn’t want the other party to view you as a walking, talking cultural stereotype, neither will they. To learn more,&nbsp;download a complimentary copy of our special report, Negotiation Training: Overcoming Cultural Barriers in Negotiations, right now, and discover exactly what negotiation tactics work for overcoming cultural barriers. &nbsp; &nbsp;" data-dcnode-id="4509" property="og:description"><span data-dcnode-id="4508" instrument_node="">

</span><p data-dcnode-id="3789"><span data-dcnode-id="3796" instrument_node="">Learn how to negotiate like a diplomat, think on your feet like an improv performer, and master job offer negotiation like a professional athlete when you download a copy of our FREE special report,</span><strong data-dcnode-id="3791"><span data-dcnode-id="3795" instrument_node="">&nbsp;</span><em data-dcnode-id="3792"><a data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/freemium/improve-your-negotiation-skills-negotiation-training-from-the-pros/"><span data-dcnode-id="3794" instrument_node="">Negotiation Skills: Negotiation Strategies and Negotiation Techniques to Help You Become a Better Negotiator</span></a></em></strong><span data-dcnode-id="3790" instrument_node="">, from the Program on Negotiation at Harvard Law School.</span></p><span data-dcnode-id="3788" instrument_node="">

</span><h1 class="page-title" data-dcnode-id="3780" itemprop="headline"><span data-dcnode-id="3781" instrument_node="">cultural barriers</span></h1><span data-dcnode-id="3779" instrument_node="">
</span><h1 data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">What are Cultural Barriers in Negotiation?</span></h1><span data-dcnode-id="3776" instrument_node="">
</span><h2 class="subheadline" data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">Intercultural negotiations are common these days—and so are culture clashes. Here’s how to overcome cultural barriers in negotiation.</span></h2><span data-dcnode-id="3773" instrument_node="">
</span><p data-dcnode-id="3768"><span data-dcnode-id="3772" instrument_node="">If you negotiate regularly on the job, you probably have engaged in multiple business negotiations with counterparts from other cultures. Negotiating across </span><a data-dcnode-id="3770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/daily/international-negotiation-daily/bridging-the-cultural-divide-in-international-business-negotiations/"><span data-dcnode-id="3771" instrument_node="">cultural barriers</span></a><span data-dcnode-id="3769" instrument_node=""> can significantly expand your organization’s reach and bring great rewards.</span></p><span data-dcnode-id="3767" instrument_node="">
</span><p data-dcnode-id="3762"><span data-dcnode-id="3766" instrument_node="">Yet negotiating cross-culturally also can pose challenges. For example, misunderstandings and even conflict based on </span><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/daily/conflict-resolution/a-cross-cultural-negotiation-example-how-to-overcome-cultural-barriers/"><span data-dcnode-id="3765" instrument_node="">cultural differences</span></a><span data-dcnode-id="3763" instrument_node=""> come up from time to time. Cultural barriers often spring from our different histories or from communication gaps.</span></p><span data-dcnode-id="3761" instrument_node="">
</span><p data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">One approach, however, suggests that rather than focusing on overcoming the differences caused by cultural barriers, look for ways to bridge the two (or more) cultures represented in your business negotiations. That bridge-building might mean pointing out cultural similarities, such as a shared ancestry or familiar customs. Or it could involve finding commonalities that go beyond cultures, such as a shared experience, interest, or goal.</span></p><span data-dcnode-id="3758" instrument_node="">
</span><p data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Here are a few simple rules for coping with&nbsp;cultural barriers in international negotiations&nbsp;and transactions:</span></p><span data-dcnode-id="3755" instrument_node="">
</span><ol data-dcnode-id="3738"><span data-dcnode-id="3754" instrument_node="">
</span><li data-dcnode-id="3750"><strong data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">Show respect for cultural differences.</span></strong><span data-dcnode-id="3751" instrument_node=""> Respect for cultural differences will get you a lot farther than ignorance, so it’s important to do your research when entering into negotiations with unfamiliar counterparts.</span></li><span data-dcnode-id="3749" instrument_node="">
</span><li data-dcnode-id="3745"><strong data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">Be aware of how your culture is perceived.</span></strong><span data-dcnode-id="3746" instrument_node="">&nbsp;You can adjust your approach during negotiations to get a better outcome if any of these perspectives are negative.</span></li><span data-dcnode-id="3744" instrument_node="">
</span><li data-dcnode-id="3740"><strong data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">Consider the individual.</span></strong><span data-dcnode-id="3741" instrument_node=""> If rule number one in an&nbsp;international negotiation is to know the other side’s culture, rule number two is to avoid overreliance on that knowledge. Just as you wouldn’t want the other party to view you as a walking, talking cultural stereotype, neither will they.</span></li><span data-dcnode-id="3739" instrument_node="">
</span></ol><span data-dcnode-id="3737" instrument_node="">
</span><p data-dcnode-id="3731"><span data-dcnode-id="3736" instrument_node="">To learn more,&nbsp;download a complimentary copy of our special report, </span><a data-dcnode-id="3733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/freemium/new-free-report-overcoming-cultural-barriers-in-negotiation/"><em data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">Negotiation Training: Overcoming Cultural Barriers in Negotiations</span></em></a><span data-dcnode-id="3732" instrument_node="">, right now, and discover exactly what negotiation tactics work for overcoming cultural barriers.</span></p><span data-dcnode-id="3730" instrument_node="">
</span><p data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3727" instrument_node="">
</span><p data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3724" instrument_node="">
</span><p data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">The following items are tagged cultural barriers:</span></p><span data-dcnode-id="3721" instrument_node="">

</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Understanding how to arrange the meeting space is a key aspect of preparing for negotiation.  In this video, Professor Guhan Subramanian discusses a real world example of how seating arrangements can influence a negotiator’s success.  This discussion was held at the 3 day executive education workshop for senior executives at the Program on Negotiation at Harvard Law School.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p class="footnote" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Guhan Subramanian is the Professor of Law and Business at the Harvard Law School and Professor of Business Law at the Harvard Business School.</span></p><span data-dcnode-id="885" instrument_node="">
