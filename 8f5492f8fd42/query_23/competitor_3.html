</span><div class="section post-header" data-dcnode-id="905"><span data-dcnode-id="913" instrument_node="">
</span><div class="blog-details-featured-image" data-dcnode-id="911"><img alt="How To Overcome The Top 4 Communication Barriers In The Workplace" data-dcnode-id="912" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.talaera.com/hubfs/How%2520To%2520Overcome%2520The%2520Top%25204%2520Communication%2520Barriers%2520In%2520The%2520Workplace.png&amp;raw"></div><span data-dcnode-id="910" instrument_node="">
</span><h1 data-dcnode-id="907"><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_text" data-dcnode-id="908" data-hs-cos-general-type="meta_field" data-hs-cos-type="text" id="hs_cos_wrapper_name" style=""><span data-dcnode-id="909" instrument_node="">How To Overcome The Top 4 Communication Barriers In The Workplace</span></span></h1><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="904" instrument_node="">
</span><div class="section post-body" data-dcnode-id="485"><span data-dcnode-id="903" instrument_node="">
</span><p class="author-date-published" data-dcnode-id="896"><span data-dcnode-id="902" instrument_node="">By </span><span data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Ming Wu</span></span><span data-dcnode-id="899" instrument_node=""> on </span><span data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Jun 28, 2021 12:22:08 PM</span></span></p><span data-dcnode-id="895" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="487" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="884"><span data-dcnode-id="894" instrument_node="">Globalization means many of us are enjoying the benefits of working in a more diverse team, but diversity can bring challenges around communication. Savvy HR managers are rethinking communication strategies to facilitate effective communication in a diverse workplace. They understand the impact poor communication can have on a business. </span><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//markets.businessinsider.com/news/stocks/miscommunications-at-work-impact-the-bottom-line-study-finds-1019717736" rel="noopener" target="_blank"><span data-dcnode-id="892" style="text-decoration: underline; color: #0c5394;"><span data-dcnode-id="893" instrument_node="">Business Insider</span></span></a><span data-dcnode-id="890" instrument_node=""> reported on a survey that found poor communication contributed to increased stress, delayed or incomplete projects, missed performance goals, poor </span><span data-dcnode-id="887" style="text-decoration: underline; color: #0c5394;"><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.talaera.com/employee-engagement" rel="noopener" style="color: #0c5394; text-decoration: underline;" target="_blank"><span data-dcnode-id="889" instrument_node="">employee engagement</span></a></span><span data-dcnode-id="886" instrument_node="">, and lost sales. </span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">So how do you ensure your business doesn’t suffer these consequences? Let’s explore four categories of barriers to effective communication in the workplace (language barriers, inclusion barriers, cultural barriers, and environmental barriers). We’ll also look at how to overcome them with tips for effective communication with diverse workplace audiences.&nbsp;&nbsp;</span></p><span data-dcnode-id="880" instrument_node="">
</span><h2 data-dcnode-id="876"><span data-dcnode-id="877" style="color: #000000;"><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">#1 How to overcome language barriers</span></strong></span></h2><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Multinational organizations should be aware of the following potential workplace language barriers:</span></p><span data-dcnode-id="872" instrument_node="">
</span><h3 data-dcnode-id="869" style="font-weight: normal;"><span data-dcnode-id="870" style="color: #000000;"><span data-dcnode-id="871" instrument_node="">Help employees achieve common language proficiency</span></span></h3><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="867" instrument_node="">The most talented of employees cannot perform at their best without sufficient language skills to communicate effectively with coworkers and clients. It can cause misunderstandings, missed deadlines and can even be dangerous. </span><span data-dcnode-id="865" style="font-weight: bold;"><span data-dcnode-id="866" instrument_node="">TIP:</span></span><span data-dcnode-id="864" instrument_node=""> Employees must have the necessary skills and confidence in their common language at work. HR teams should consider </span><span data-dcnode-id="861" style="text-decoration: underline; color: #0c5394;"><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.talaera.com/enterprise" rel="noopener" style="color: #0c5394; text-decoration: underline;" target="_blank"><span data-dcnode-id="863" instrument_node="">business English training</span></a></span><span data-dcnode-id="860" instrument_node=""> a worthwhile investment to enable employees to do their best work.</span></p><span data-dcnode-id="858" instrument_node="">
</span><h3 data-dcnode-id="855" style="font-weight: normal;"><span data-dcnode-id="856" style="color: #000000;"><span data-dcnode-id="857" instrument_node="">Limit colloquial phrases</span></span></h3><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">‘They hit it out of the park!’ is a phrase commonly used in North America. It’s a reference to baseball and means ‘they did an excellent job’. Coworkers who are proficient in English, but with no interest in sport and are not from North America, might not understand its meaning. People use colloquialisms quite naturally, but in a diverse workplace, it can cause confusion. </span><span data-dcnode-id="851" style="font-weight: bold;"><span data-dcnode-id="852" instrument_node="">TIP:</span></span><span data-dcnode-id="850" instrument_node=""> Encourage employees to use the standard version of your common language and avoid regionally specific colloquialisms.</span></p><span data-dcnode-id="848" instrument_node="">
</span><h3 data-dcnode-id="845" style="font-weight: normal;"><span data-dcnode-id="846" style="color: #000000;"><span data-dcnode-id="847" instrument_node="">Avoid jargon</span></span></h3><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">The use of technical language in wider communications presents a challenge in understanding. Those who are not developers may not understand ‘HTML element’ and those who are not seamstresses may not be familiar with ‘grade seams’. </span><span data-dcnode-id="841" style="font-weight: bold;"><span data-dcnode-id="842" instrument_node="">TIP:</span></span><span data-dcnode-id="840" instrument_node=""> For effective communication, employees should be reminded to use ‘plain English’ and avoid technical jargon when addressing coworkers in different roles and departments.&nbsp;&nbsp;</span></p><span data-dcnode-id="838" instrument_node="">
</span><h2 data-dcnode-id="832"><span data-dcnode-id="835" style="color: #000000;"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">#2 How to overcome </span></strong></span><strong data-dcnode-id="833" style="color: #000000;"><span data-dcnode-id="834" instrument_node="">inclusion barriers</span></strong></h2><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">To ensure effective communication in a diverse workplace, employees should keep their communication inclusive by avoiding the following:</span></p><span data-dcnode-id="828" instrument_node="">
</span><h3 data-dcnode-id="825" style="font-weight: normal;"><span data-dcnode-id="826" style="color: #000000;"><span data-dcnode-id="827" instrument_node="">Use inclusive language</span></span></h3><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="823" instrument_node="">Non-inclusive language can be difficult to understand and can result in audiences feeling excluded or offended. People often use non-inclusive language unintentionally and don’t mean to confuse or offend their audience. </span><span data-dcnode-id="821" style="font-weight: bold;"><span data-dcnode-id="822" instrument_node="">TIP:</span></span><span data-dcnode-id="820" instrument_node=""> Encourage the use of inclusive language in the workplace. Using plain English, short sentences, and providing clear instructions accommodates coworkers with different skill sets and language abilities. Inclusive language is free from words and phrases that might cause someone to feel excluded or offended. It makes people feel their differences are valued and that they are part of the conversation. For example, using ‘chair’ or ‘chairperson’ rather than ‘chairman’ keeps the communication gender-neutral, avoiding gender stereotypes, and is respectful to chairs who are male, female, or non-binary. This is just one example and there are many that we should be aware of. Share </span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.talaera.com/inclusive-language-workplace" rel="noopener" target="_blank"><span data-dcnode-id="818" style="text-decoration: underline; color: #0c5394;"><span data-dcnode-id="819" instrument_node="">inclusive language resources</span></span></a><span data-dcnode-id="816" instrument_node=""> with your employees to help them incorporate inclusive language into their communications.</span></p><span data-dcnode-id="814" instrument_node="">
</span><h3 data-dcnode-id="811" style="font-weight: normal;"><span data-dcnode-id="812" style="color: #000000;"><span data-dcnode-id="813" instrument_node="">Make communication accessible</span></span></h3><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">Effective communication must be accessible. If some team members work remotely, a notice pinned to a board in reception is not accessible. </span><span data-dcnode-id="807" style="font-weight: bold;"><span data-dcnode-id="808" instrument_node="">TIP:</span></span><span data-dcnode-id="806" instrument_node=""> Talk to employees about considering their audience’s needs when communicating and commit to providing resources they need to make their communications accessible. For example, if members of your team are blind, ensure documents are screen-reader compatible. For coworkers who are hearing impaired, arrange a sign language interpreter at the next conference. Use images to make signs more accessible to those with dyslexia or for whom English is a second language, and provide communications training to those who are not proficient in the language.</span></p><span data-dcnode-id="804" instrument_node="">
</span><span class="hs-cta-wrapper" data-dcnode-id="794" id="hs-cta-wrapper-6e145177-8d87-4785-8802-412a272814da"><span class="hs-cta-node hs-cta-6e145177-8d87-4785-8802-412a272814da" data-dcnode-id="798" data-hs-drop="true" id="hs-cta-6e145177-8d87-4785-8802-412a272814da" style="visibility: visible; display: block; text-align: center;"><a class="cta_button" cta_dest_link="https://offers.talaera.com/overview-demo-hr" data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//offers.talaera.com/cs/c/%3Fcta_guid%3D0d73ef8a-7ed1-4cdd-8f1b-941f4d66db66%26signature%3DAAH58kGgxG6HkRHyLJoUGqi8uFM1qoPMdQ%26pageId%3D49335750148%26placement_guid%3D6e145177-8d87-4785-8802-412a272814da%26canon%3Dhttps%253A%252F%252Fblog.talaera.com%252Flanguage-barriers%26portal_id%3D4586384" id="cta_button_4586384_0d73ef8a-7ed1-4cdd-8f1b-941f4d66db66" rel="noopener" style="margin: 20px auto;" target="_blank" title="Request more info about our English training"><span data-dcnode-id="800" style="color: #000000; font-size: 20px;"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Request more info about our English training</span></strong></span></a></span></span><span data-dcnode-id="792" instrument_node="">
</span><h3 data-dcnode-id="789" style="font-weight: normal;"><span data-dcnode-id="790" style="color: #000000;"><span data-dcnode-id="791" instrument_node="">Remember regional teams</span></span></h3><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">Teams based in regional offices can feel excluded and overshadowed by the head office. They might receive company-wide emails about ‘Pizza Friday’ or the annual conference, taking place at the head office. Over time, teams in regional offices can develop an ‘us against them’ attitude and silos can form, which discourages communication. </span><span data-dcnode-id="785" style="font-weight: bold;"><span data-dcnode-id="786" instrument_node="">TIP:</span></span><span data-dcnode-id="784" instrument_node=""> Employers should ensure any social perks at the head office are matched at regional offices, regional news and successes are reported in company updates, and events are held in different locations, so the same teams are not expected to travel each time. Be sensitive to time differences too. Schedule calls and deadlines with regional working hours in mind. This kind of inclusive communication conveys appreciation and instills a sense of belonging.</span></p><span data-dcnode-id="782" instrument_node="">
</span><h2 data-dcnode-id="779" style="font-weight: bold;"><span data-dcnode-id="780" style="color: #000000;"><span data-dcnode-id="781" instrument_node="">#3 How to overcome cultural barriers</span></span></h2><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">International businesses can experience cultural barriers to communication if employees are unfamiliar with local business etiquette and customs, which may lead to poor employee experience. As working relationships develop, communication style evolves to suit individual preferences, but cultural awareness gives us a good indication of how we should communicate at the beginning of a partnership. Here are some examples of cultural differences we should be aware of to keep communication open and effective.</span></p><span data-dcnode-id="775" instrument_node="">
</span><h3 data-dcnode-id="772" style="font-weight: normal;"><span data-dcnode-id="773" style="color: #000000;"><span data-dcnode-id="774" instrument_node="">Be aware of cultural differences in time perception</span></span></h3><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="765" style="color: #000000;"><span data-dcnode-id="767" style="font-weight: normal;"><span data-dcnode-id="769" style="font-weight: bold;"><span data-dcnode-id="770" instrument_node="">Working hours</span></span><span data-dcnode-id="768" instrument_node=""> vary acr</span></span><span data-dcnode-id="766" instrument_node="">oss cultures, affecting how you can expect to communicate with coworkers and clients. </span></span><span data-dcnode-id="763" style="font-weight: bold;"><span data-dcnode-id="764" instrument_node="">TIP:</span></span><span data-dcnode-id="762" instrument_node=""> Be mindful of local working hours when communicating internationally. For example, the French '</span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortune.com/2017/01/01/french-right-to-disconnect-law/" rel="noopener" target="_blank"><span data-dcnode-id="760" style="text-decoration: underline; color: #0c5394;"><span data-dcnode-id="761" instrument_node="">right to disconnect</span></span></a><span data-dcnode-id="758" instrument_node="">' law, designed to preserve work-life balance, means you wouldn’t expect someone in France to respond to emails or hop on a call after hours. If you need a response on the same day, ask your questions early.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="755" instrument_node="">Cultural difference</span><span data-dcnode-id="750" style="font-weight: normal;"><span data-dcnode-id="754" instrument_node="">s in </span><span data-dcnode-id="752" style="font-weight: bold;"><span data-dcnode-id="753" instrument_node="">timekeeping</span></span><span data-dcnode-id="751" instrument_node=""> can affec</span></span><span data-dcnode-id="749" instrument_node="">t communication in a global workplace.</span><span data-dcnode-id="747" style="font-weight: bold;"><span data-dcnode-id="748" instrument_node=""> TIP: </span></span><span data-dcnode-id="746" instrument_node="">Be prepared to adjust your schedule when meeting clients in another country. For example, factor in an extra 30 minutes when setting up client meetings in Brazil, where it’s not unusual or considered disrespectful to arrive late for meetings. If you have employees in India where timekeeping is generally more relaxed, make sure you agree early on what is acceptable in terms of punctuality. For example, you may be open to flexible working hours, but client deadlines must be adhered to.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="743" instrument_node="">How </span><span data-dcnode-id="738" style="font-weight: normal;"><span data-dcnode-id="742" instrument_node="">we </span><span data-dcnode-id="740" style="font-weight: bold;"><span data-dcnode-id="741" instrument_node="">describe the passing of time</span></span><span data-dcnode-id="739" instrument_node=""> can be a</span></span><span data-dcnode-id="737" instrument_node="">mbiguous and </span><span data-dcnode-id="734" style="text-decoration: underline; color: #0c5394;"><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/how-different-cultures-understand-time-2014-5" style="color: #0c5394; text-decoration: underline;"><span data-dcnode-id="736" instrument_node="">cultural differences in time perception</span></a></span><span data-dcnode-id="733" instrument_node=""> which also cause miscommunication in business. </span><span data-dcnode-id="731" style="font-weight: bold;"><span data-dcnode-id="732" instrument_node="">TIP:</span></span><span data-dcnode-id="730" instrument_node=""> Avoid ambiguity (and missed deadlines) by being specific and descriptive. ‘By 5 pm on Friday’ is clearer than ‘by Friday’ or ‘by close of business on Friday’ (business closes at different times in different cultures), ‘in 30 minutes’ is better than ‘shortly‘ and ‘every six months’ is clearer than ‘bi-annually' (which could also mean once every two years).</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="718"><span class="hs-cta-wrapper" data-dcnode-id="720" id="hs-cta-wrapper-79b1b398-3d46-4330-96ba-29f2219acfbf"><span class="hs-cta-node hs-cta-79b1b398-3d46-4330-96ba-29f2219acfbf" data-dcnode-id="724" data-hs-drop="true" id="hs-cta-79b1b398-3d46-4330-96ba-29f2219acfbf" style="visibility: visible; display: block; text-align: center;"><a class="cta_button" cta_dest_link="https://offers.talaera.com/employee-engagement-ideas-guide-download" data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//offers.talaera.com/cs/c/%3Fcta_guid%3De2dd86fb-3f0d-46d5-9727-af1db23284eb%26signature%3DAAH58kEkG_kWFRHsgQZNw5_rSz4srjTqnA%26pageId%3D49335750148%26placement_guid%3D79b1b398-3d46-4330-96ba-29f2219acfbf%26canon%3Dhttps%253A%252F%252Fblog.talaera.com%252Flanguage-barriers%26portal_id%3D4586384" id="cta_button_4586384_e2dd86fb-3f0d-46d5-9727-af1db23284eb" rel="noopener" target="_blank"><img alt="Employee Engagement Ideas - Guide Download" class="hs-cta-img" data-dcnode-id="726" height="210" id="hs-cta-img-79b1b398-3d46-4330-96ba-29f2219acfbf" mce_noresize="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f.hubspotusercontent30.net/hubfs/4586384/hub_generated/resized/f035b3e5-8e66-4155-ad2b-7728f33649c9.png&amp;raw" srcset="https://f.hubspotusercontent30.net/hubfs/4586384/hub_generated/resized/e6f7e3ee-3744-41f9-9737-0eb0c78b0f8c.png 3x, https://f.hubspotusercontent30.net/hubfs/4586384/hub_generated/resized/e5620dc1-14c2-4507-8214-f65370fe9034.png 2x" style="border-width: 0px; margin: 20px auto;" width="400"></a></span></span></p><span data-dcnode-id="717" instrument_node="">
</span><h3 data-dcnode-id="714" style="font-weight: normal;"><span data-dcnode-id="715" style="color: #000000;"><span data-dcnode-id="716" instrument_node="">Research local customs</span></span></h3><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="712" instrument_node="">Customs around meeting someone in a professional setting and how you communicate with each other vary greatly across cultures. A failure to acknowledge such customs can be disrespectful and bad for business. For your next meeting with international participants, spend some time researching their customs and business etiquette. </span><span data-dcnode-id="710" style="font-weight: bold;"><span data-dcnode-id="711" instrument_node="">TIP:</span></span><span data-dcnode-id="709" instrument_node=""> Cultural awareness training or at least ample research, will save embarrassment and get things off to a good start. To convey respect may require some adjustments to your natural behavior. For example, when meeting a business associate in Japan you should be familiar with </span><span data-dcnode-id="706" style="text-decoration: underline; color: #0c5394;"><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//livejapan.com/en/in-tokyo/in-pref-tokyo/in-tokyo_train_station/article-a0002470/" rel="noopener" style="color: #0c5394; text-decoration: underline;" target="_blank"><span data-dcnode-id="708" instrument_node="">business etiquette in Japan</span></a></span><span data-dcnode-id="705" instrument_node="">. You would learn that you should be dressed formally (even if that means changing just before your plane lands), It is customary to bow and exchange gifts (but don’t open your gift in each other’s company, to save embarrassment if one gift is better than the other). You should present your business card and receive your associate’s card with both hands and study the card you receive before putting it away carefully.&nbsp;</span></p><span data-dcnode-id="703" instrument_node="">
</span><h3 data-dcnode-id="700" style="font-weight: normal;"><span data-dcnode-id="701" style="color: #000000;"><span data-dcnode-id="702" instrument_node="">Be sensitive to different communication styles</span></span></h3><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="698" instrument_node="">It may be necessary to </span><span data-dcnode-id="696" style="font-weight: bold;"><span data-dcnode-id="697" instrument_node="">adjust your communication style</span></span><span data-dcnode-id="695" instrument_node=""> if you have a culturally diverse audience at work. In hierarchical cultures, as you may find in India, coworkers may be reluctant to speak up before their managers and often won’t contradict them. Learn more about communication styles in </span><span data-dcnode-id="692" style="text-decoration: underline; color: #0c5394;"><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.talaera.com/talaera-talks-communication-styles" rel="noopener" style="color: #0c5394; text-decoration: underline;" target="_blank"><span data-dcnode-id="694" instrument_node="">this podcast episode</span></a></span><span data-dcnode-id="691" instrument_node="">. </span><span data-dcnode-id="689" style="font-weight: bold;"><span data-dcnode-id="690" instrument_node="">TIP:</span></span><span data-dcnode-id="688" instrument_node=""> Provide an opportunity for coworkers to express their opinions, perhaps in an email following the meeting, so they feel more comfortable speaking up. Ask questions that cannot be answered with ‘yes’ or ‘no’ to encourage them to share their own thoughts rather than agreeing with you out of respect.&nbsp;</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="685" instrument_node="">The same </span><span data-dcnode-id="683" style="font-weight: bold;"><span data-dcnode-id="684" instrument_node="">negotiation style</span></span><span data-dcnode-id="682" instrument_node=""> can get very different results in different cultures. When negotiating a deal in Russia, early disagreements are considered an invitation to a lively discussion, whereas in Mexico such a start could promptly bring an end to any negotiation. TIP: Before embarking on cross-border business ventures, it is wise to research the </span><span data-dcnode-id="679" style="text-decoration: underline; color: #0c5394;"><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2015/12/getting-to-si-ja-oui-hai-and-da" rel="noopener" style="color: #0c5394; text-decoration: underline;" target="_blank"><span data-dcnode-id="681" instrument_node="">regional rules of negotiation</span></a></span><span data-dcnode-id="678" instrument_node=""> and be prepared to adjust the way you negotiate accordingly.&nbsp;</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="675" instrument_node="">There are even culturally sensitive ways to</span><span data-dcnode-id="673" style="font-weight: bold;"><span data-dcnode-id="674" instrument_node=""> disagree</span></span><span data-dcnode-id="672" instrument_node="">. Using words with too little or too much emphasis can either fail to convey your message accurately or come across insincere or disrespectful. </span><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">TIP:</span></strong><span data-dcnode-id="669" instrument_node=""> Before presenting a problem, consider which words would communicate your message accurately without causing offense. You would use downgraded words such as ‘little’ and slightly’ in Peru, Ghana, and Thailand. In Israel, Germany, and France, upgrading your words to ‘completely’ and ‘absolutely’ is acceptable.&nbsp;</span></p><span data-dcnode-id="667" instrument_node="">
</span><h2 data-dcnode-id="662" style="font-weight: bold;"><span data-dcnode-id="663" style="color: #000000;"><span data-dcnode-id="666" instrument_node="">#4 </span><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">How to overcome environmental barriers</span></strong></span></h2><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Our environment can present barriers to effective communication at work. Below are some examples we should be aware of.</span></p><span data-dcnode-id="658" instrument_node="">
</span><h3 data-dcnode-id="655" style="font-weight: normal;"><span data-dcnode-id="656" style="color: #000000;"><span data-dcnode-id="657" instrument_node="">Rethink your physical workspace</span></span></h3><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="653" instrument_node="">Traditional office layouts where managers have individual offices create physical barriers to communication, whereas open-plan offices with cubicles (cellular layouts) can be distracting, cause anxiety, and result in inefficient communication. TIP: To create a workspace free of these physical and emotional barriers, consider a flexible, multi-space layout. With open-plan space, separate rooms, and breakout areas, employees choose where to work depending on whether they need collaboration for team projects, privacy for sensitive discussions, or a quiet area for focus. A study by </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/228130371_Impact_of_Office_Layout_on_Communication_in_a_Science-Driven_Business" rel="noopener" target="_blank"><span data-dcnode-id="651" style="text-decoration: underline; color: #0c5394;"><span data-dcnode-id="652" instrument_node="">ResearchGate</span></span></a><span data-dcnode-id="649" instrument_node=""> found employees communicated three times more often, for shorter periods, and left longer between communications when in a multi-space setting compared to a cellular layout. It suggests that this layout encourages more frequent, efficient communication, with more time to concentrate on work between communications.&nbsp;</span></p><span data-dcnode-id="647" instrument_node="">
</span><h3 data-dcnode-id="644" style="font-weight: normal;"><span data-dcnode-id="645" style="color: #000000;"><span data-dcnode-id="646" instrument_node="">Set up remote working for good communication</span></span></h3><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="642" instrument_node="">The</span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.institutelm.com/resourceLibrary/going-remote-leading-dispersed-teams.html" rel="noopener" style="color: #0563c1;" target="_blank"><span data-dcnode-id="638"><span data-dcnode-id="641" instrument_node="">&nbsp;</span><span data-dcnode-id="639" style="text-decoration: underline; color: #0c5394;"><span data-dcnode-id="640" instrument_node="">Institute of Leadership and Management</span></span></span></a><span data-dcnode-id="636" instrument_node=""> reported that 88% of remote workers struggle with miscommunication. </span><span data-dcnode-id="634" style="font-weight: bold;"><span data-dcnode-id="635" instrument_node="">TIP:</span></span><span data-dcnode-id="633" instrument_node=""> Provide structure and a culture of regular communication by scheduling regular catch-ups and welcoming impromptu questions and comments from employees. Show empathy when personal circumstances affect employees’ work, so you can openly discuss it and find a solution. Online socializing such as virtual happy hour or quizzes can build relationships and encourage communication.</span></p><span data-dcnode-id="631" instrument_node="">
</span><h3 data-dcnode-id="628" style="font-weight: normal;"><span data-dcnode-id="629" style="color: #000000;"><span data-dcnode-id="630" instrument_node="">Choose technology that works for your team</span></span></h3><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">Technology that’s difficult to use, slow, or unsuitable may be hindering effective communication within your team. </span><span data-dcnode-id="624" style="font-weight: bold;"><span data-dcnode-id="625" instrument_node="">TIP:</span></span><span data-dcnode-id="623" instrument_node=""> Evaluate the messaging platform, project management tool, and conferencing software your team uses. As a team, decide if they meet your needs. There may be industry-specific or customizable alternatives that could make communication smoother.</span></p><span data-dcnode-id="621" instrument_node="">
</span><h3 data-dcnode-id="618" style="font-weight: normal;"><span data-dcnode-id="619" style="color: #000000;"><span data-dcnode-id="620" instrument_node="">Create communication opportunities</span></span></h3><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="616" instrument_node="">Without the appropriate time and setting to communicate their thoughts, often employees simply don’t. </span><span data-dcnode-id="614" style="font-weight: bold;"><span data-dcnode-id="615" instrument_node="">TIP:</span></span><span data-dcnode-id="613" instrument_node=""> Providing different forums for employees to talk openly creates opportunities for them to share ideas or raise issues. For some, a one-to-one meeting is most comfortable. For others, having a less formal mentor to talk to works. Perhaps assigning a champion or committee to certain issues gives employees somewhere to direct their concerns. ‘Town hall’ meetings are a great way to update employees on news and projects across the business and provide an opportunity to discuss issues that have been raised by employees, giving feedback, setting out action plans, or simply acknowledging there is an issue, and committing to resolve it. Read these </span><span data-dcnode-id="610" style="text-decoration: underline; color: #0c5394;"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//offers.talaera.com/employee-engagement-ideas-guide-download" rel="noopener" style="color: #0c5394; text-decoration: underline;" target="_blank"><span data-dcnode-id="612" instrument_node="">59 excellent employee engagement ideas that actually work</span></a></span><span data-dcnode-id="609" instrument_node="">.</span></p><span data-dcnode-id="607" instrument_node="">
</span><h2 data-dcnode-id="603"><span data-dcnode-id="604" style="color: #000000;"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Conclusion</span></strong></span></h2><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="601" instrument_node="">Effective communication in a diverse workforce is key to the success of a global business. Companies may face barriers when trying to achieve a culture of open communication, but identifying these barriers means they can be addressed. HR managers can equip employees with the resources, tools, and training required, and employers should lead by example to build a culture of inclusive, open, and effective communication in their workplace. All these initiatives will, all in all, help you boost </span><span data-dcnode-id="598" style="text-decoration: underline; color: #0c5394;"><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.talaera.com/employee-engagement" rel="noopener" style="color: #0c5394; text-decoration: underline;" target="_blank"><span data-dcnode-id="600" instrument_node="">employee engagement</span></a></span><span data-dcnode-id="597" instrument_node=""> in your organization.</span></p><span data-dcnode-id="595" instrument_node="">
</span><h2 data-dcnode-id="592" style="font-weight: bold;"><span data-dcnode-id="593" style="color: #000000;"><span data-dcnode-id="594" instrument_node="">Looking for more ways to overcome communication barriers?</span></span></h2><span data-dcnode-id="591" instrument_node="">
