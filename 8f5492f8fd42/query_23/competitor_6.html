</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id3&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id4&quot;><p>This paper aims at better understanding the dynamics of international project groups by grasping the strategies project leaders set up to cope with cultural diversity. Three kinds of cross-cultural practices emerged from the comparative study of European project groups: (1) to draw upon individual tolerance and self-control, (2) to enter into a trial-and-error process coupled with relationship development and (3) to capitalize on transnational corporate or professional cultures. An alternative method to enhance the functioning of cross-cultural projects is also suggested. It consists in the construction of cross-cultural patterns based upon a structured examination of the cultural sense-making processes of project members. The paper concludes on the necessarily culture bound approaches of cross-cultural management in transnational project groups.</p></div></div></div>" data-dcnode-id="1716" lang="en" name="citation_abstract"><span data-dcnode-id="1715" instrument_node="">

</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="1399" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/S1090-9516%2803%2900007-5" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="1403" instrument_node="">https://doi.org/10.1016/S1090-9516(03)00007-5</span></a><a class="rights-and-content" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS1090951603000075%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1401" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="1398"></section><section class="ReferencedArticles" data-dcnode-id="1397"></section><div class="PageDivider" data-dcnode-id="1396"></div><div class="Abstracts u-font-serif" data-dcnode-id="1389" id="abstracts"><div class="abstract author" data-dcnode-id="1390" id="aep-abstract-id3"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Abstract</span></h2><div data-dcnode-id="1391" id="aep-abstract-sec-id4"><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">This paper aims at better understanding the dynamics of international project groups by grasping the strategies project leaders set up to cope with cultural diversity. Three kinds of cross-cultural practices emerged from the comparative study of European project groups: (1) to draw upon individual tolerance and self-control, (2) to enter into a trial-and-error process coupled with relationship development and (3) to capitalize on transnational corporate or professional cultures. An alternative method to enhance the functioning of cross-cultural projects is also suggested. It consists in the construction of cross-cultural patterns based upon a structured examination of the cultural sense-making processes of project members. The paper concludes on the necessarily culture bound approaches of cross-cultural management in transnational project groups.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="1366" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="1378"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1090951603000063"><svg class="icon icon-navigate-left" data-dcnode-id="1387" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="1388"></path></svg><span class="button-alternative-text" data-dcnode-id="1380"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="1367"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1090951603000087"><span class="button-alternative-text" data-dcnode-id="1371"><strong data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="1369" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="1370"></path></svg></a></li></ul><span data-dcnode-id="1365" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="987" id="body"><div data-dcnode-id="988"><p data-dcnode-id="1354"><span data-dcnode-id="1364" instrument_node="">Transnational project groups are flourishing in various business contexts. They are temporary structures designed to achieve one goal and which result from the search for horizontal cooperation in organizations. But beyond the general label, horizontal projects correspond to different managerial realities. They appear in different contexts and may aim at several kinds of goals. For instance, some project groups result from various forms of cooperation between companies such as strategic alliances, partnerships, joint-ventures, or consortiums (</span><a class="workspace-trigger" data-dcnode-id="1362" href="#BIB18" name="bBIB18"><span data-dcnode-id="1363" instrument_node="">Hamel, Doz, &amp; Prahalad, 1989</span></a><span data-dcnode-id="1361" instrument_node="">). Transnational projects are also encountered within international multidivisional companies to avoid double parallel work in subsidiaries and to make the most of complementary resources. Management by projects appears to be an appropriate way to coordinate activities in organizations torn apart by centrifugal forces (</span><a class="workspace-trigger" data-dcnode-id="1359" href="#BIB5" name="bBIB5"><span data-dcnode-id="1360" instrument_node="">Bartlett &amp; Ghoshal, 1992</span></a><span data-dcnode-id="1358" instrument_node="">). In many alliances, consortiums and cross-company projects, one main goal is research and development. Even though they are in competition, firms may be interested in doing research together for several reasons. First, the burden of R&amp;D expenses can be shared among the partners who can launch more ambitious projects. They can also benefit from each other’s knowledge and skills. And last but not least, as companies coordinate their endeavors in early stages of technical research and development they are likely to be more effective in creating and imposing to the market new technical standards. MNC also resort more and more to project groups to design and develop new products (</span><a class="workspace-trigger" data-dcnode-id="1356" href="#BIB4" name="bBIB4"><span data-dcnode-id="1357" instrument_node="">Aldridge &amp; Swamidass, 1996</span></a><span data-dcnode-id="1355" instrument_node="">). The logic of project management replaces the former mass production system with occasional innovations. Project structures allow greater autonomy than traditional hierarchical pyramids and greater creativity since they rely on multidisciplinary teams. Furthermore, a separate task force is more likely to introduce radical change than a team embedded in organizational routines.</span></p><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Thus, project groups have multiple forms, stakes and constraints. In some of them, the project is physically located in one site and members meet one another on a daily basis while in others, the project team is virtual, their members being dispatched in different units. In some project teams, members share the corporate culture and objectives while other projects gather individuals from different companies. Finally, the pressure towards results varies considerably according to the very nature of the task. For instance, the long-term expectations about new technical orientations and standards in R&amp;D teams exert a lower pressure than the immediate objectives in terms of costs, quality and deadlines in product development teams. However, all project groups involving MNCs have something in common; they make up cross-cultural teams, that is they encompass members with different nationalities. Our study precisely focuses on the dynamics of cross-cultural collaboration in multinational horizontal projects. Indeed, the effectiveness and efficiency of projects are affected by their cross-cultural characteristics.</span></p><section data-dcnode-id="1285" id="aep-section-id5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1346"><span data-dcnode-id="1351" instrument_node="">1</span><span data-dcnode-id="1349" instrument_node="">. </span><span data-dcnode-id="1347" instrument_node="">How national cultures impact cross-cultural project teams</span></h2><p data-dcnode-id="1308"><span data-dcnode-id="1345" instrument_node="">For over twenty years, researchers have precisely shown that management practices are embedded in national cultures and that the search for a universal effective way of management is meaningless (</span><a class="workspace-trigger" data-dcnode-id="1343" href="#BIB19" name="bBIB19"><span data-dcnode-id="1344" instrument_node="">Hofstede, 1980</span></a><span data-dcnode-id="1342" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1340" href="#BIB29" name="bBIB29"><span data-dcnode-id="1341" instrument_node="">Trompenaars, 1997</span></a><span data-dcnode-id="1339" instrument_node="">). People embedded in a given cultural context tend to share certain worldviews (</span><a class="workspace-trigger" data-dcnode-id="1337" href="#BIB3" name="bBIB3"><span data-dcnode-id="1338" instrument_node="">Alderfer &amp; Smith, 1982</span></a><span data-dcnode-id="1336" instrument_node="">) including specific representations of appropriate ways of cooperating, managing conflicts, accepting authority, or simply communicating (</span><a class="workspace-trigger" data-dcnode-id="1334" href="#BIB12" name="bBIB12"><span data-dcnode-id="1335" instrument_node="">d’Iribarne, Henry, Segal, Chevrier, &amp; Globokar, 1998</span></a><span data-dcnode-id="1333" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="1331" href="#BIB28" name="bBIB28"><span data-dcnode-id="1332" instrument_node="">Triandis, 1994</span></a><span data-dcnode-id="1330" instrument_node="">). Cross-cultural research has demonstrated that national culture explains between 25 and 50% of variation in attitudes (</span><a class="workspace-trigger" data-dcnode-id="1328" href="#BIB15" name="bBIB15"><span data-dcnode-id="1329" instrument_node="">Gannon, 1994</span></a><span data-dcnode-id="1327" instrument_node="">). Whether the variety of worldviews of their members affect positively or negatively the functioning of teams has not been clearly established. The conclusion of empirical researches are mixed (</span><a class="workspace-trigger" data-dcnode-id="1325" href="#BIB22" name="bBIB22"><span data-dcnode-id="1326" instrument_node="">Raghuram &amp; Garud, 1996</span></a><span data-dcnode-id="1324" instrument_node="">). On the one hand, it is advocated that the diversity of worldviews increases the available pool of resources that members of cross-cultural teams can bring to bear on complex problems. Thus, they are potentially more creative in problem solving than national homogenous teams (</span><a class="workspace-trigger" data-dcnode-id="1322" href="#BIB30" name="bBIB30"><span data-dcnode-id="1323" instrument_node="">Watson, Kumar, &amp; Michaelsen, 1993</span></a><span data-dcnode-id="1321" instrument_node="">). On the other hand, diversity increases the ambiguity, complexity and confusion in group processes, thus being potentially devastating for the effectiveness of the team. Therefore, no direct relationship can be established between cross-cultural diversity of teams and effectiveness but contextual and intermediate variables should be scrutinized to account for these contrasted results. Some researchers have introduced variables such as the proportional representation of the different groups suggesting that relatively equal proportions are required to benefit from the diversity (</span><a class="workspace-trigger" data-dcnode-id="1319" href="#BIB7" name="bBIB7"><span data-dcnode-id="1320" instrument_node="">Cox, 1993</span></a><span data-dcnode-id="1318" instrument_node="">). Others have insisted on the distribution of power among members which influence members’ behaviors and there fore the cross-cultural dynamics (</span><a class="workspace-trigger" data-dcnode-id="1316" href="#BIB2" name="bBIB2"><span data-dcnode-id="1317" instrument_node="">Alderfer, 1987</span></a><span data-dcnode-id="1315" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="1313" href="#BIB14" name="bBIB14"><span data-dcnode-id="1314" instrument_node="">Ely and Thomas (2001)</span></a><span data-dcnode-id="1312" instrument_node=""> have identified three “perspectives on workforce diversity” that people embrace, each with different implications for a work group’s ability to realize the benefits of its cultural diversity. More generally, the impact of national cultures on the functioning of international work team depends on management processes. “Only if well managed can culturally diverse groups hope to achieve their potential productivity” (</span><a class="workspace-trigger" data-dcnode-id="1310" href="#BIB1" name="bBIB1"><span data-dcnode-id="1311" instrument_node="">Adler, 1986</span></a><span data-dcnode-id="1309" instrument_node="">: 118).</span></p><p data-dcnode-id="1288"><span data-dcnode-id="1307" instrument_node="">Our research aims precisely at studying the management processes of cultural diversity in transnational projects. Indeed, to help practitioners faced with this kind of problems, a large literature (</span><a class="workspace-trigger" data-dcnode-id="1305" href="#BIB13" name="bBIB13"><span data-dcnode-id="1306" instrument_node="">Earley &amp; Erez, 1997</span></a><span data-dcnode-id="1304" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="1302" href="#BIB25" name="bBIB25"><span data-dcnode-id="1303" instrument_node="">Simons, Vazquez, &amp; Harris, 1993</span></a><span data-dcnode-id="1301" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="1299" href="#BIB27" name="bBIB27"><span data-dcnode-id="1300" instrument_node="">Thiederman, 1991</span></a><span data-dcnode-id="1298" instrument_node="">) focus on appropriate behaviors in international work environment. Many authors are concerned with effective global leadership (</span><a class="workspace-trigger" data-dcnode-id="1296" href="#BIB20" name="bBIB20"><span data-dcnode-id="1297" instrument_node="">House, 2000</span></a><span data-dcnode-id="1295" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1293" href="#BIB25" name="bBIB25"><span data-dcnode-id="1294" instrument_node="">Simons et al., 1993</span></a><span data-dcnode-id="1292" instrument_node="">). However, </span><a class="workspace-trigger" data-dcnode-id="1290" href="#BIB24" name="bBIB24"><span data-dcnode-id="1291" instrument_node="">Segalla, Fischer, and Sandner (2000)</span></a><span data-dcnode-id="1289" instrument_node=""> argue that most cross-cultural knowledge stems from questionnaires implicitly conveying North American values. It means that skills and traits frequently associated with successful leaders like flexibility, charisma, honesty or self-confidence might not be so useful in a cross-cultural project involving for instance European and Asian members. Besides, most literature about cross-cultural leadership is normative; it is illustrated by a great amount of spicy anecdotes and success stories, but at least to our knowledge, few empirical researches have been made on actual strategies that leaders of multinational teams actually use to manage cross-cultural differences. Our research focuses on how project leaders deal with cultural differences to surmount and even benefit from the variety of national cultures in their team. We have studied actual practices and related outcomes.</span></p><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">We first present the methodology of our field study. In the second part, we depict three cross-cultural practices that project leaders explicitly or implicitly use to manage their international team. Beside these descriptive findings, we suggest an alternative strategy to enhance the functioning of such projects.</span></p></section><section data-dcnode-id="1134" id="aep-section-id6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1279"><span data-dcnode-id="1284" instrument_node="">2</span><span data-dcnode-id="1282" instrument_node="">. </span><span data-dcnode-id="1280" instrument_node="">The research method</span></h2><p data-dcnode-id="1244"><span data-dcnode-id="1278" instrument_node="">To figure out actual practices of management of cultural diversity, we conducted a comparative study of three international project groups. The three projects have in common to gather engineers from several European countries. However, there are very different in terms of contexts, goals and structures. Each case is presented in Exhibit 1.</span><span class="display" data-dcnode-id="1246"></span></p><div aria-label="" class="article-textbox" data-dcnode-id="1247" id="aep-textbox-id7" role="region"><div data-dcnode-id="1248"><p data-dcnode-id="1275"><em data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Case 1: A consortium for R&amp;D</span></em></p><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">The first project group is a European consortium set up to make R&amp;D in the telecommunication industry. It involves sixteen companies and over fifty persons from eight different countries. These countries are not equally represented since the consortium includes five French, four Swedish and two Norwegian companies and only one company from each following country: Denmark, Italy, Ireland, Netherlands and Portugal. Furthermore, the companies involved do not dedicate the same number of engineers to the project. Eventually, French and Swedish members are the more numerous while Italy or Ireland has each less than four representatives. Excepted for an American and a native of Luxembourg, the project team is composed of people who work in their home country.</span></p><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">The characteristics of the project are largely specified in a contract signed by member companies and the European Union, which finances part of the project. For instance, the contract designates one of the companies as the prime contractor, and this company appoints a project leader among its engineers. However, it is important to note that the project leader has no hierarchical authority over the other partners. Formally, each partner has one vote when time comes to make a decision. The contract also defines the main lines of the organization of the project such as the executive board and the work units. However, the partners have completed this contract with very formalized rules and procedures that regulate relationships between members. These rules are written in a handbook and define precisely the roles of partner leaders, the format of the documents to be produced, the approval process of these documents by all partners. They even formalize in details appropriate ways of working and behaving. For example, they mention all the steps that a chairperson should go through to conduct an effective meeting: start the meeting on time, give each participant a chance to express his/her view, control irrelevant digression, etc.</span></p><p data-dcnode-id="1266"><span data-dcnode-id="1270" instrument_node="">Practically, the work is carried out in several geographical sites at the same time. To overcome the problems due to the distance between partners, the handbook plans whole weeks of meeting during which all members come to the same place. Four or five times a year, “</span><em data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">project weeks</span></em><span data-dcnode-id="1267" instrument_node="">” are organized, each partner (at least the largest ones) being in charge for the material organization on its turn. Therefore, these “weeks” always take place in different sites (Paris, Stockholm, Toulouse, Madeira, etc.). Between the project weeks, the exchange of information and document management are made mainly through electronic media. Rarely, members resort to phone calls or smaller meetings involving members concerned with a particular technical aspect.</span></p><p data-dcnode-id="1263"><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Case 2: A project team in electrical engineering</span></em></p><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">This project team deals with electrical engineering. It is one of the teams stemming from the management by projects implemented in a German Swiss subsidiary of a large European industrial group which has its headquarter in France. Precisely, the team is in charge for turnkey projects for power distribution in Pakistan. This project includes engineering, supply of equipment, civil works, commissioning, maintenance and after sales services. The team is composed of a project manager, engineers in different fields, a specialist of purchase and a controller. Most of them comes from the different areas of Switzerland (German, French, and Italian parts) or from the French headquarter. But many other nationalities are represented. Several engineers come from the former East Germany, a Belgian, a Malay, a Brazilian, and a British also joined the company and the team for various personal or professional reasons.</span></p><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">This project group is embedded in the matrix structure of the company; it involves collaboration between different departments. Such projects generally last from three to five years and each team member is involved in several projects at the time. Therefore, the greatest difficulty for the project manager is to make the work required for his own project a priority for team members who are very much in demand. Practically, all team members are located on different floors of the subsidiary building, even if they often have to travel to the site of the future power station.</span></p><p data-dcnode-id="1256"><em data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Case 3: A product development project</span></em></p><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The third project aims at conceiving and developing with pilot customers new products in wireless telecommunications. The project is dispatched among five main European subsidiaries and three other secondary sites of a multinational corporation. Two of the main subsidiaries are located in Germany, one is in France, one in Belgium and the last one in Italy. Several reasons account for this multi-site organization. Firstly the development costs are too heavy to be supported by only one entity. Secondly, the project can benefit from complementary technical know-how spread over the units. And thirdly, the distribution of roles allows two subsidiaries to capitalize on their close relations with pilot customers.</span></p><p data-dcnode-id="1249"><span data-dcnode-id="1253" instrument_node="">However, the scattered activities of development require sophisticated mechanisms of coordination. The “</span><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">central group</span></em><span data-dcnode-id="1250" instrument_node="">” is in charge for coordinating the development process. It is located in the French subsidiary and encompasses about eighty persons coming from the different sites. The central group is not a registered company; its members are personnel appointed by the subsidiaries. Therefore, some are expatriates, other have local French contracts. Practically, the central group coordinates the specification activities, integrates and tests the technical developments made in various sites and manages the project documentation. The central group is mainly composed of French and German engineers but is in constant interactions with many nationalities in the development centers. Communication within the project is quite dense; it relies on frequent meetings, daily electronic mails and videoconferences. This project requires advanced coordination to solve quickly a great amount of technical problems and a close follow-up of budgets. Its members experience a strong time pressure because of the cut-throat competition on the telecommunication market.</span></p></div></div><span data-dcnode-id="1245" instrument_node="">
</span><p></p><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">In each project, one manager has been appointed as the main leader. However, in the Cases 1 and 3, other managers also have the responsibility for leading cross-cultural teams which are subsets of the larger project. In the consortium, the project is split in five work units. Each unit has a leader in charge of managing their team and getting the work done. Like the main project manager, these leaders lack any hierarchical authority over the team members. In the product development team, the central group includes a project director but also three other persons who shoulder the responsibility of leading cross-cultural smaller teams. Therefore, in the study ten people have been considered as project managers dealing with cross-cultural diversity.</span></p><section data-dcnode-id="1135" id="aep-section-id8"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1238"><span data-dcnode-id="1241" instrument_node="">2.1</span><span data-dcnode-id="1240" instrument_node="">. </span><span data-dcnode-id="1239" instrument_node="">Data collection and analysis</span></h3><div data-dcnode-id="1177"><p data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node="">The field work for this research consisted mainly of interviews with the project members and attendance to their meetings as a participant–observer. The methodology for data collection is further detailed in </span><a class="workspace-trigger" data-dcnode-id="1235" href="#TBL1" name="bTBL1"><span data-dcnode-id="1236" instrument_node="">Table 1</span></a><span data-dcnode-id="1234" instrument_node="">.</span></p><div class="tables colsep-0 rowsep-0 frame-topbot" data-dcnode-id="1178" id="TBL1"><span class="captions" data-dcnode-id="1226"><span data-dcnode-id="1227"><p data-dcnode-id="1228"><span class="label" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Table 1</span></span><span data-dcnode-id="1230" instrument_node="">. </span><span data-dcnode-id="1229" instrument_node="">Data collection techniques</span></p></span></span><div class="groups" data-dcnode-id="1179"><table data-dcnode-id="1180"><tbody data-dcnode-id="1181"><tr class="rowsep-1" data-dcnode-id="1218"><td class="colsep-0" data-dcnode-id="1225"></td><td class="colsep-0" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Project 1</span></td><td class="colsep-0" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Project 2</span></td><td class="colsep-0" data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Project 3</span></td></tr><tr data-dcnode-id="1209"><td class="colsep-0" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Formal interviews</span></td><td class="colsep-0" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">32</span></td><td class="colsep-0" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">25</span></td><td class="colsep-0" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">20</span></td></tr><tr data-dcnode-id="1200"><td class="colsep-0" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Meeting attendance</span></td><td class="colsep-0" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Yes</span></td><td class="colsep-0" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Yes</span></td><td class="colsep-0" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Yes</span></td></tr><tr data-dcnode-id="1191"><td class="colsep-0" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Daily presence among the project team</span></td><td class="colsep-0" data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">2 “project weeks”</span></td><td class="colsep-0" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">2 1/2 months</span></td><td class="colsep-0" data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">No</span></td></tr><tr data-dcnode-id="1182"><td class="colsep-0" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Informal discussions (lunch and pauses)</span></td><td class="colsep-0" data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Yes</span></td><td class="colsep-0" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Yes</span></td><td class="colsep-0" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Yes</span></td></tr></tbody></table></div></div></div><div data-dcnode-id="1142"><p data-dcnode-id="1172"><span data-dcnode-id="1176" instrument_node="">The data analysis was made through two stages: the description of each case and comparative analysis of the three cases (</span><a class="workspace-trigger" data-dcnode-id="1174" href="#TBL2" name="bTBL2"><span data-dcnode-id="1175" instrument_node="">Table 2</span></a><span data-dcnode-id="1173" instrument_node="">).</span></p><div class="tables colsep-0 rowsep-0 frame-topbot" data-dcnode-id="1143" id="TBL2"><span class="captions" data-dcnode-id="1165"><span data-dcnode-id="1166"><p data-dcnode-id="1167"><span class="label" data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Table 2</span></span><span data-dcnode-id="1169" instrument_node="">. </span><span data-dcnode-id="1168" instrument_node="">Descriptive analysis process</span></p></span></span><div class="groups" data-dcnode-id="1144"><table data-dcnode-id="1145"><tbody data-dcnode-id="1146"><tr class="rowsep-1" data-dcnode-id="1162"><td class="colsep-0" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Descriptive analysis of each case</span></td></tr><tr data-dcnode-id="1159"><td class="colsep-0" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">1. Making interviews and attending meetings</span></td></tr><tr data-dcnode-id="1156"><td class="colsep-0" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">2. Cutting of transcripted interviews and meeting notes by theme (i.e., cross-cultural decision making, communication processes, perceived effectiveness of the team, etc.)</span></td></tr><tr data-dcnode-id="1153"><td class="colsep-0" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">3. Triangulating information from all interviewees for each theme</span></td></tr><tr data-dcnode-id="1150"><td class="colsep-0" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">4. Writing of a monograph (synthesis for all themes)</span></td></tr><tr data-dcnode-id="1147"><td class="colsep-0" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">5. Validation/correction by interviewees of the descriptive monograph</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Each monograph was an attempt to account for the actual work processes of the team, the social relationships between members and the structural and historical context of the project team. Once the cases had been validated by team members, the comparison enabled us to point out the salient features of each case, the invariant items and the contextual aspects and to construct sorts of “ideal-types” of cross-cultural management practices and relate them to outcomes on project progresses and members’ feelings.</span></p><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">More precisely, the strategies of cross-cultural management have been identified either because they have been explicitly explained by the leaders themselves or because they have been induced from the analysis of regulation processes within the project teams. For instance, members of all projects explicitly insisted on the role of professional cultures to overcome differences while the trial-and-error processes used to adapt to one another was induced from the longitudinal observation of meetings and decision making in the consortium.</span></p><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">As our research was an exploratory study, we focused on the qualitative description of cross-cultural practices and analysis of their impact on group projects rather than on the accurate quantification of their occurrence in teams. The result of the analysis has eventually been compared with the available literature on cross-cultural management and leadership.</span></p></section></section><section data-dcnode-id="1013" id="aep-section-id9"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1128"><span data-dcnode-id="1133" instrument_node="">3</span><span data-dcnode-id="1131" instrument_node="">. </span><span data-dcnode-id="1129" instrument_node="">Findings</span></h2><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">The study evidences three kinds of cross-cultural practices implemented by transnational project managers. It is important to mention that these strategies are not exclusive. One given leader often resorts to several practices simultaneously, and within one project, leaders of cross-cultural at various levels often set up different strategies.</span></p><section data-dcnode-id="1077" id="aep-section-id10"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1120"><span data-dcnode-id="1125" instrument_node="">3.1</span><span data-dcnode-id="1123" instrument_node="">. </span><span data-dcnode-id="1121" instrument_node="">Drawing upon individual tolerance and self-control</span></h3><p data-dcnode-id="1115"><span data-dcnode-id="1119" instrument_node="">In the electrical engineering project, the Swiss manager straightforwardly declared he did not want to make any difference and was careful to manage all team members the same way. Indeed, the simplest way to manage multinational project teams is not to pay any particular attention to cross-cultural differences. Consistently with the findings of </span><a class="workspace-trigger" data-dcnode-id="1117" href="#BIB21" name="bBIB21"><span data-dcnode-id="1118" instrument_node="">Laurent (1998)</span></a><span data-dcnode-id="1116" instrument_node="">, we observed that when managers encounter cross-cultural differences, they often do nothing and consider that it is legitimate not to talk about them. This attitude is especially overwhelming when the cross-cultural dimension of the projects stems from historical hazards as is the case in the Swiss company rather than from the very construction of the project as in a multinational project designed precisely to make the most of complementary views and competencies. However, equal treatment to all despite differences has also been observed in the other cases.</span></p><p data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">When nothing is purposefully set up to manage differences, heterogeneous interpretations and practices coexist. For instance, in the R&amp;D consortium, partners from Southern Europe extensively express their opinion while those from Northern Europe and especially Scandinavia only speak up when they disagree with what is being said. These behavioral differences go with the implementation of different parallel technical methods but they do not prevent the project team to pursue its goals, even if as a member said “</span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">it annoys people</span></em><span data-dcnode-id="1111" instrument_node="">.” However, in most projects as in Cases 2 and 3, there is a strong need for integration between members; several solutions cannot be developed at the same time and close coordination is compulsory. Then, compromises on both technical solutions and procedures have to be negotiated.</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1109" instrument_node="">In both situations—coexistence of practices or compromise negotiation—the lack of institutional management of cross-cultural differences means that the leader explicitly or implicitly relies on tolerance and self-control of team members to surmount difficulties. Indeed, each participant takes upon him/herself to make concessions and enable the team to operate properly. For instance, some German members of the product development project said that they would not put up with other Germans coming to meetings unprepared but they accepted it from their French colleagues. Despite their irritation, they control themselves to avoid conflicts. More generally, almost all interviewees have stated that cross-cultural teams could not be effective without special personal qualities of their members, namely “</span><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">opennes</span></em><span data-dcnode-id="1106" instrument_node="">s,” “</span><em data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">patience</span></em><span data-dcnode-id="1103" instrument_node="">,” “</span><em data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">self-control</span></em><span data-dcnode-id="1100" instrument_node="">.”</span></p><p data-dcnode-id="1088"><span data-dcnode-id="1098" instrument_node="">This appeal to tolerance is in line with two opposite discourses: minimizing or praising cultural differences. Part of our interviewees said that in multinational teams, they tended to forget the nationality of their colleague and to focus on technical issues. When talking about cultural differences, they make carefully phrased remarks such as “</span><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">they should not be exaggerated</span></em><span data-dcnode-id="1095" instrument_node="">,” “</span><em data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">it’s a matter of persons first</span></em><span data-dcnode-id="1092" instrument_node="">,” etc. Some of them have taken part in many multinational projects and have been so much exposed to cultural diversity that they feel </span><em data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">blasé</span></em><span data-dcnode-id="1089" instrument_node="">. They are used to adapting to various cultural contexts and nationals. Oppositely, the second part of interviewees puts the emphasis on the significance of differences and asserts that they should be respected and turned into advantages. They say that they make their best to struggle against prejudices, stereotypes and ethnocentrism. For them, endeavors to adjust to diversity have their counterpart in what they can learn from their foreign colleagues.</span></p><p data-dcnode-id="1080"><span data-dcnode-id="1087" instrument_node="">How tolerance and self-control can contribute to project team effectiveness? If culture is considered as a set of worldviews and references that a community uses to make sense of situations, then, it does not command behaviors. A context of interpretation is compatible with a wide range of behaviors. Indeed, within a given cultural community, individuals do not behave all the same in comparable situations and use the “margin of malleability” that goes with every context of interpretation. This malleability of people is what </span><a class="workspace-trigger" data-dcnode-id="1085" href="#BIB8" name="bBIB8"><span data-dcnode-id="1086" instrument_node="">Demorgon (1989)</span></a><span data-dcnode-id="1084" instrument_node=""> calls “</span><em data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">oscillation</span></em><span data-dcnode-id="1081" instrument_node="">.” It allows cross-cultural learning and makes acculturation possible. It also accounts for the fact that some individuals may feel more comfortable with practices from another culture than their own. For instance, in the consortium, a Portuguese respondent said that she easily adapted to the detailed and definite planning of activities and that she had troubles to adjust to improvisation when she was back home.</span></p><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">However, all required adjustments are not so immediate. Cross-cultural management, which mainly relies on the willingness of participants as in Case 2, generates frustrations. They can be observed in a number of side conversations or whispers between nationals; these discussions are riddled with negative opinions on others. The small informal groups of nationals that form up at breaks often contribute to release part of the tensions that members experience because of permanent self-control. They often allow potential conflicts to remain latent. Furthermore, continuous adjustments are accepted since members usually do not wish to block the group progresses but are not necessarily well interpreted. For some respondents, they mean giving up more interesting solutions and leveling down.</span></p></section><section data-dcnode-id="1061" id="aep-section-id11"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1071"><span data-dcnode-id="1076" instrument_node="">3.2</span><span data-dcnode-id="1074" instrument_node="">. </span><span data-dcnode-id="1072" instrument_node="">Trial-and-error processes coupled with personal relationships</span></h3><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">The second strategy for coping with cultural differences is to make team members become well acquainted with one another. When they know each other very well, they may empirically set up working arrangements more easily. This strategy is clearly applied by the project manager of the consortium. Social events like diners organized every project week contribute to develop acquaintance, complicity or even friendship among team members.</span></p><p data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node="">Personal relationships enable effective mutual agreements. Participants are not necessarily conscious of the reasons why such or such arrangement is possible because cross-cultural adjustments are not distinct from other adjustments to personalities, genders, regional, professional or corporate cultures which are required in any team, be it national (</span><a class="workspace-trigger" data-dcnode-id="1066" href="#BIB23" name="bBIB23"><span data-dcnode-id="1067" instrument_node="">Sackmann, Phillips, &amp; Goodman, 1999</span></a><span data-dcnode-id="1065" instrument_node="">). Frequent communications with other team members make it possible to discover through a trial-and-error process what is acceptable for the partners and what one cannot go against. With time, this method can lead to the development of effective routines even though the contexts of interpretation of others remain obscure.</span></p><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">The limit of this strategy stems from the frailty of empirical adjustments, which do not clear up the eventual matters of conflict. When participants change or when the situation evolves, the pragmatic local arrangements are no longer valid. Compromises based on the willingness of the persons involved in the project do not necessarily make up stable procedures of cooperation. Furthermore, the positive dynamic of mutual understanding as people get to know each other is not automatic. Oppositely, it may happen as we observed in Case 2 that the frequent interactions reinforce negative stereotypes and polarization between cultural groups. The willingness of participants to solve problems may not be enough to make divergent views and interpretations properly match.</span></p></section><section data-dcnode-id="1035" id="aep-section-id12"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1055"><span data-dcnode-id="1060" instrument_node="">3.3</span><span data-dcnode-id="1058" instrument_node="">. </span><span data-dcnode-id="1056" instrument_node="">Setting up transnational cultures</span></h3><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">If leaders of international project teams cannot draw upon shared national cultures, they may resort to other international cultures such as professional or corporate cultures to federate participants.</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1052" instrument_node="">In the three studied teams, the engineering culture played a leading role in overcoming cultural barriers as all members shared a common core of knowledge, know-how and representations. Several project leaders and members explained they tried to focus on technical discussions to get away with cultural issues. Indeed, occupational cultures act as catalysts facilitating cross-cultural communication. They provide several conditions favorable to international communication, i.e., a content for exchanges and a common language including technical lexicons and an environment fostering the development of good interpersonal relationships. As one of our respondent of Case 1 pointed: “</span><em data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">the most important is the university course of individuals. If someone made high technical studies in Lille and someone else high technical studies in Stuttgart, they are closer than a French philosopher and a French technician</span></em><span data-dcnode-id="1049" instrument_node="">.”</span></p><p data-dcnode-id="1040"><span data-dcnode-id="1047" instrument_node="">However, the federating power of occupational cultures should not be overestimated. First, the multiple specialties within a profession introduce differentiation, for instance, different methodological approaches to deal with the same kind of problems. Second, one’s occupation may be a deep source of identity, providing social status and social recognition. And, the social identity of engineers is not the same in all the countries (</span><a class="workspace-trigger" data-dcnode-id="1045" href="#BIB16" name="bBIB16"><span data-dcnode-id="1046" instrument_node="">Grelon, 1998</span></a><span data-dcnode-id="1044" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1042" href="#BIB26" name="bBIB26"><span data-dcnode-id="1043" instrument_node="">Sorge, 1998</span></a><span data-dcnode-id="1041" instrument_node="">). Furthermore, most international projects, as Cases 2 and 3 gather different professions to benefit from their synergy. Therefore, the professional common core is often reduced to the culture of the branch.</span></p><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">When technical preoccupations are not shared across cultural borders, project leaders may try to take advantage of the organizational culture, in the product development team, the project director tried to promote the norms of the MNC culture. The corporate culture conveys institutional norms of behaviors with which employees, whatever their nationality, are supposed to comply. Instead of mutual arrangements resting on the willingness of individuals, we observe the convergence of the actions of people towards the same institutional references. Corporate culture may contribute to cross-cultural effectiveness since its rituals provide a sense of security which substitutes to the stress stemming from the encounter with unknown “others.” It also provides a shared frame for international work including appropriate behaviors in various situations. These behavioral norms are supposed to replace national habits and to allow pragmatic adjustment.</span></p><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">However, despite the endeavors of the project director and her team, our research showed that the common corporate culture remained in an embryonic state in the team where it was susceptible to play a large role. The subcultures of units had more influence on behaviors than the corporate culture still to be developed. But more importantly, if ever the corporate culture can solve superficial problems by fixing common norms about work hours, appropriate preparation before meetings, appropriate moments to speak up during meetings and so on, it cannot help to cope with cultural conflicts when fundamental cultural interpretations diverge. It is not so easy to set up common norms when they refer to illegitimate practices in one cultural context. The adjustment capabilities of people are limited when required adaptations mean to go against one’s conceptions of what is legitimate. The famous Hofstede’s research conducted exclusively in the subsidiaries of only one major corporation clearly shows that national cultures do not dissolve even in a strong organizational culture. Lastly, a transnational corporate culture that is compatible with the basic conceptions of all involved cultures can be founded only on a very small common denominator, which considerably reduces the space for action. Such a strategy eventually denies cultural differences rather than makes the most of them.</span></p></section><section data-dcnode-id="1014" id="aep-section-id13"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="1029"><span data-dcnode-id="1034" instrument_node="">3.4</span><span data-dcnode-id="1032" instrument_node="">. </span><span data-dcnode-id="1030" instrument_node="">Ad hoc cross-cultural management</span></h3><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The strategies mentioned above were only partly satisfying to the majority of the leaders but they said they had to put up with such strategies lacking better solution. As said before, they were resignated to the fact that in cross-cultural teams, members have to be patient, tolerant, etc. To enhance the functioning of cross-cultural projects, we suggest an alternative strategy drawing upon both the analysis of the limits of the three former ones and the literature on cross-cultural cooperation.</span></p><p data-dcnode-id="1019"><span data-dcnode-id="1026" instrument_node="">The proposed strategy relies on two basic assumptions. The first assumes that the effectiveness of international project teams requires the deep understanding of the contexts of meaning of their members (</span><a class="workspace-trigger" data-dcnode-id="1024" href="#BIB11" name="bBIB11"><span data-dcnode-id="1025" instrument_node="">d’Iribarne, 1996</span></a><span data-dcnode-id="1023" instrument_node="">). The second hypothesis is that one cannot expect such an understanding to naturally result from the interactions between team members. In different contexts, frequent cross-cultural cooperation results either in better mutual understanding or in the radical polarization of cultural groups together with a reinforcement of reciprocal negative stereotypes (</span><a class="workspace-trigger" data-dcnode-id="1021" href="#BIB6" name="bBIB6"><span data-dcnode-id="1022" instrument_node="">Brown, 1983</span></a><span data-dcnode-id="1020" instrument_node="">). Therefore, we suggest that a kind of cultural mediator helps the cross-cultural team in deciphering each other’s system of meaning and constructing acceptable compromises.</span></p><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Precisely, the suggested strategy consists in joint and patient construction of cross-cultural patterns of action fostered by a structured examination of cultural contexts of interpretation of project members. Practically, the cultural mediator invites participants to regularly think of problematic situations that they have encountered. The inventory of cross-cultural critical incidents is progressively turned into a classification of similar problems. Then, each partner involved is invited to give her/his interpretation of the situation: why did s/he act as s/he did? What was the meaning of her/his move and why s/he thought s/he was doing right. From these explanations, participants and the mediator deduce step by step the interpretation systems that are used by one another. This knowledge is then used to discuss about possible collective practices that would be acceptable for everyone, even if they are legitimate for very different reasons. For instance, in one of the team, French and Swiss engineers both agreed to resort to the project leader to bring discussions to a close when team members could not find themselves an agreement. This solution was effective since asking the chief to solve conflict is legitimate in both cultural contexts. Precisely, for French engineers the decision of the chief is acceptable because of its formal authority and because s/he is supposed to be skilled and wise enough to overcome the local views of members and to take the global interests of the project into account. For their Swiss counterparts, the decision s/he makes is legitimate as the referee’s decision. For them, the procedure to solve the conflict is accepted, therefore, the decision, whatever it might be, is legitimate.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The process of collective construction of local solutions integrates cognitive understanding of others and involvement into actions.</span></p></section></section><section data-dcnode-id="989" id="aep-section-id14"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1007"><span data-dcnode-id="1012" instrument_node="">4</span><span data-dcnode-id="1010" instrument_node="">. </span><span data-dcnode-id="1008" instrument_node="">Discussion</span></h2><p data-dcnode-id="996"><span data-dcnode-id="1006" instrument_node="">The strategies to cope with cross-cultural differences are themselves culture bound approaches. For example, to draw upon professional cultures to federate international teams fit the French context of interpretation within which the occupation is part and parcel of personal identity and plays a large role in the regulation of working relations. Indeed, in French corporations, relationships between employees depend on their professional status (</span><a class="workspace-trigger" data-dcnode-id="1004" href="#BIB10" name="bBIB10"><span data-dcnode-id="1005" instrument_node="">d’Iribarne, 1989</span></a><span data-dcnode-id="1003" instrument_node="">). Thus, diversity management through the emphasis on occupational culture can be seen as the extrapolation at the international level of a French approach of working relations. Such a strategy may be meaningless with Japanese partners who do not pay so much attention to occupations (</span><a class="workspace-trigger" data-dcnode-id="1001" href="#BIB9" name="bBIB9"><span data-dcnode-id="1002" instrument_node="">Deval, 1993</span></a><span data-dcnode-id="1000" instrument_node="">). The last approach, which relies on communication between actors and on unveiling tacit sets of meanings fits the American context, which emphasizes explicit rules. The notion of feedback, praised in American literature to enhance cross-cultural communication shows the widespread belief that making hidden evidences explicit fosters mutual understanding. Making meaning explicit and giving feedback are definitely typical of “low context” cultures like the United States (</span><a class="workspace-trigger" data-dcnode-id="998" href="#BIB17" name="bBIB17"><span data-dcnode-id="999" instrument_node="">Hall, 1976</span></a><span data-dcnode-id="997" instrument_node="">). Once again, it is probable that such a strategy will not fit “high context” cultures, which favor implicit communication.</span></p><p data-dcnode-id="990"><span data-dcnode-id="995" instrument_node="">Both the approaches to cope with cultural barriers (individual adjustments, occupational cultures, cultural mediator</span><span data-dcnode-id="993" instrument_node="">&nbsp;</span><span data-dcnode-id="991" instrument_node="">…) and the concrete solutions identified (procedures to make decision, to carry out operations or to control the work) are culture bound. Cross-cultural management in international projects is contingent. Consistently with our relativist assumptions, we cannot hope for a culture free grammar of cross-cultural cooperation. Appropriate patterns of collective action can only be identified through interactions and depend on the context. This does not mean that in the search for pragmatic adjustments project leaders cannot find fruitful sources of inspiration on solutions developed in previous project teams faced with a closely related problematic.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="980"><button class="button button-anchor" data-dcnode-id="984" type="button"><span class="button-text" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="981" type="button"><span class="button-text" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="979"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="379" id="aep-bibliography-id15"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="380" id="aep-bibliography-sec-id16"><dl class="references" data-dcnode-id="381" id="reference-links-aep-bibliography-sec-id16"><dt class="label" data-dcnode-id="974"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="975" href="#bBIB1" id="ref-id-BIB1"><span data-dcnode-id="976" instrument_node="">Adler, 1986</span></a></dt><dd class="reference" data-dcnode-id="965"><span data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">Adler, N. (1  instrument_node=""> (</span><span data-dcnode-id="398" instrument_node="">1993</span><span data-dcnode-id="396" instrument_node="">)</span><span data-dcnode-id="394" instrument_node="">, pp. </span><span data-dcnode-id="392" instrument_node="">590</span><span data-dcnode-id="390" instrument_node="">-</span><span data-dcnode-id="388" instrument_node="">602</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="383"><span data-dcnode-id="386" instrument_node=""></span><a class="link" data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DCultural%2520diversitys%2520impact%2520on%2520interaction%2520process%2520and%2520performance%3A%2520Comparing%2520homogeneous%2520and%2520diverse%2520task%2520groups" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="385" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="262" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="263"><div class="PageDivider" data-dcnode-id="378"></div><header data-dcnode-id="375" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Cited by (106)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="264"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="265"><ul data-dcnode-id="271"><li class="ListArticleItem" data-dcnode-id="357"><div class="sub-heading" data-dcnode-id="369"><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1075425321000958" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="373" id="citing-articles-article0-title"><span data-dcnode-id="374" instrument_node="">Leaders' cultural gap bridging behaviors and subordinates' work engagement in multinational teams</span></h3></a><div class="article-source ellipsis" data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">2022, Journal of International Management</span></div></div><div class="buttons" data-dcnode-id="363"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="364" type="button"><span class="button-link-text" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="365" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="366"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="358"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="359" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="360"><p data-dcnode-id="361" id="sp0050"><span data-dcnode-id="362" instrument_node="">The effect of leadership on individuals in multinational teams remains underexplored. Based on self-concept theory, our study investigates how subordinates' work engagement is influenced by their perception of leader cultural gap bridging (CGB) behaviors that seek to facilitate intercultural collaboration in multinational teams. We draw on a quantitative, two-wave, individual-level study with 280 employees working in multinational teams. Our results reveal that subordinates' perception of leaders' CGB behaviors enhance their work engagement through its effect on their team identification. The positive indirect effect is contingent on the level of relationship conflict in the multinational teams.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="323"><div class="sub-heading" data-dcnode-id="345"><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2212267218318926" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="355" id="citing-articles-article1-title"><span data-dcnode-id="356" instrument_node="">The International Nutrition Care Process and Terminology Implementation Survey: Towards a Global Evaluation Tool to Assess Individual Practitioner Implementation in Multiple Countries and Languages</span></h3></a><div class="article-source ellipsis" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">2019, Journal of the Academy of Nutrition and Dietetics</span></div><div class="CitedSection" data-dcnode-id="346"><div class="snippet" data-dcnode-id="347"><div class="cite-header" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">For example, in Denmark and Sweden, Module 4 (NCP knowledge) was not included in this study because this module was considered not to appeal to their needs at the time of the survey. This is also a good illustration of the cultural dimensions within countries that need to be considered in a multinational research project.43 Although cultural differences exist, the final version of the INIS tool showed high content validity and test–retest reliability in most included countries.</span></p></div></div></div><div class="buttons" data-dcnode-id="339"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="340" type="button"><span class="button-link-text" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="341" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="342"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="324"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="325" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="326"><p data-dcnode-id="337" id="abspara0010"><span data-dcnode-id="338" instrument_node="">The Nutrition Care Process (NCP) and NCP Terminology (NCPT) is a systematic framework for critical thinking, decision making, and communication for dietetics practitioners worldwide, aiming to improve quality and patient safety in nutrition care. Although dietetics practitioners in several countries have implemented the NCP/NCPT during recent years, to date there is no globally validated instrument for the evaluation of NCP/NCPT implementation that is available in different languages and applicable across cultures and countries.</span></p><p data-dcnode-id="335" id="abspara0015"><span data-dcnode-id="336" instrument_node="">The aim of this study was to develop and test a survey instrument in several languages to capture information at different stages of NCP/NCPT implementation across countries and cultures.</span></p><p data-dcnode-id="333" id="abspara0020"><span data-dcnode-id="334" instrument_node="">In this collaboration between dietetics practitioners and researchers from 10 countries, an International NCP/NCPT Implementation Survey tool was developed and tested in a multistep process, building on the experiences from previous surveys. The tool was translated from English into six other languages. It includes four modules and describes demographic information, NCP/NCPT implementation, and related attitudes and knowledge.</span></p><p data-dcnode-id="331" id="abspara0025"><span data-dcnode-id="332" instrument_node="">The survey was reviewed by 42 experts across 10 countries to assess content validity and clarity. After this, 30 dietetics practitioners participated in cognitive interviews while completing the survey. A pilot study was performed with 210 participants, of whom 40 completed the survey twice within a 2- to 3-week interval.</span></p><p data-dcnode-id="329" id="abspara0030"><span data-dcnode-id="330" instrument_node="">Scale content validity index average was 0.98 and question clarity index was 0.8 to 1.0. Cognitive interviews and comments from experts led to further clarifications of the survey. The repeated pilot test resulted in Krippendorff’s α=.75. Subsequently, refinements of the survey were made based on comments submitted by the pilot survey participants.</span></p><p data-dcnode-id="327" id="abspara0035"><span data-dcnode-id="328" instrument_node="">The International NCP/NCPT Implementation Survey tool demonstrated excellent content validity and high test–retest reliability in seven different languages and across an international context. This tool will be valuable in future research and evaluation of implementation strategies.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="305"><div class="sub-heading" data-dcnode-id="317"><a data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0963868716301251" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="321" id="citing-articles-article2-title"><span data-dcnode-id="322" instrument_node="">Sourcing knowledge in open source software projects: The impacts of internal and external social capital on project success</span></h3></a><div class="article-source ellipsis" data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">2018, Journal of Strategic Information Systems</span></div></div><div class="buttons" data-dcnode-id="311"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="312" type="button"><span class="button-link-text" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="313" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="314"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="306"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="307" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="308"><p data-dcnode-id="309" id="sp0010"><span data-dcnode-id="310" instrument_node="">Open source software (OSS) development has become an essential element of IT strategy: many firms seek OSS as a strategic means of unlocking the business value in external developer communities and internal knowledge sources. However, integrating external and internal sources of social capital is challenging and identifying appropriate integration strategies is crucial for the success of such endeavors. This study examines the simultaneous effects of external and internal sources of social capital, in the form of participant and project differences, and examines how they interact to influence OSS project success. We propose a taxonomy of participant differences (language, role, and contribution) and project differences (development environment and connectedness) and postulate their main and moderating effects on project success. Using a four-year panel data set of 329 SourceForge projects, we show that development environment difference has a curvilinear relationship with success and that connectedness reduces the positive impact of role and contribution diversity on project success. We also show that when development environment difference is moderate, the impact of role diversity is the most positive. We present the implications of these findings for theory and practice.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="294"><div class="sub-heading" data-dcnode-id="299"><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1108/IJPSM-06-2021-0150" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="303" id="citing-articles-article3-title"><span data-dcnode-id="304" instrument_node="">Fragmentation and performance dialogues in public management</span></h3></a><div class="article-source ellipsis" data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">2022, International Journal of Public Sector Management</span></div></div><div class="buttons" data-dcnode-id="298"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="295"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="296" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="297"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="283"><div class="sub-heading" data-dcnode-id="288"><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/buildings11090403" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="292" id="citing-articles-article4-title"><span data-dcnode-id="293" instrument_node="">Contextual communicative competence in multinational infrastructure projects</span></h3></a><div class="article-source ellipsis" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">2021, Buildings</span></div></div><div class="buttons" data-dcnode-id="287"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="284"><div class="abstract u-margin-m-
