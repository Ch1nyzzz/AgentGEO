</span><div class="full-post__content font-rules in-view" data-dcnode-id="838" data-view="fadeIn"><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" style="font-weight: 400;"><span data-dcnode-id="1795" instrument_node="">We’ve got more opportunities to connect with people from different parts of the world than ever before, and we should be endlessly grateful for it! However, running into language barriers more often is a side effect that’s undeniably frustrating.&nbsp;</span></span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" style="font-weight: 400;"><span data-dcnode-id="1791" instrument_node="">A language barrier can be an obstacle to getting help when you need it. It can also be a mild irritation, just skimming the nuance from a message you want to share. Either way, in the age of globalization, language barriers are something we all need to get comfortable with. Of course, there won’t always be a way to pole-vault right over the barrier you’re facing, but here are ten tips to help you peer over the top.&nbsp;</span></span></p><span data-dcnode-id="1788" instrument_node="">

</span><p data-dcnode-id="1255"><img alt="" class="aligncenter size-large wp-image-20204" data-dcnode-id="1256" height="683" loading="lazy" sizes="(max-width: 1440px) 100vw, 700px, (max-width: 500px) 200px, (max-width: 700px) 300px, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/wp-content/uploads/2020/10/pexels-tima-miroshnichenko-5717622-1024x683.jpg&amp;raw" srcset="https://preply.com/wp-content/uploads/2020/10/pexels-tima-miroshnichenko-5717622-1024x683.jpg 1024w, https://preply.com/wp-content/uploads/2020/10/pexels-tima-miroshnichenko-5717622-300x200.jpg 300w, https://preply.com/wp-content/uploads/2020/10/pexels-tima-miroshnichenko-5717622-768x512.jpg 768w, https://preply.com/wp-content/uploads/2020/10/pexels-tima-miroshnichenko-5717622-650x433.jpg 650w, https://preply.com/wp-content/uploads/2020/10/pexels-tima-miroshnichenko-5717622.jpg 2048w" width="1024"></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1252" style="font-weight: 400;"><span data-dcnode-id="1253" instrument_node="">If you work for a multinational company, the chances are you work for a multilingual one too. You’re probably sharing expertise with clients and colleagues from all over the world, and that’s a beautiful thing. And not just from a personal growth perspective, either! A </span></span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/forbesinsights/innovation_diversity/index.html" rel="noopener" target="_blank"><span data-dcnode-id="1250" style="font-weight: 400;"><span data-dcnode-id="1251" instrument_node="">study</span></span></a><span data-dcnode-id="1247" style="font-weight: 400;"><span data-dcnode-id="1248" instrument_node=""> from Forbes even showed that a diverse workplace is a major driver of innovation and growth.&nbsp;</span></span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" style="font-weight: 400;"><span data-dcnode-id="1244" instrument_node="">However, a language barrier is often the flip side of this coin. If you don’t speak some of the languages common in your office, you’ll miss out on bonding time with colleagues. Perhaps this will simply make it harder for you to join in when co-workers chat informally. More seriously, perhaps it will make it more difficult to express your ideas during important meetings.&nbsp;</span></span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" style="font-weight: 400;"><span data-dcnode-id="1240" instrument_node="">In our age of globalization, language barriers at work are pretty much unavoidable, but here are steps to make them less frustrating.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1236"></p><h3 data-dcnode-id="1233" id="scroll-to-heading-2"><span data-dcnode-id="1234" style="font-weight: 400;"><span data-dcnode-id="1235" instrument_node="">During travel&nbsp;</span></span></h3><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" style="font-weight: 400;"><span data-dcnode-id="1231" instrument_node="">If you’re traveling to a place where your language isn’t spoken, you’ve voluntarily entered a situation where language barriers are likely. Most of the time, that’s part of the adventure! But when your plans go awry, overcoming a language barrier can have really high stakes. Perhaps you are completely lost on the sketchy side of town, and don’t know how to get back to your hotel. Perhaps you’re only 60% sure you’ve taken the correct train. Not being able to communicate effectively during travel can be an absolute nightmare — the difference between a day of mind-opening memories and a risky situation.&nbsp;</span></span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" style="font-weight: 400;"><span data-dcnode-id="1227" instrument_node="">Even if the language barrier you’re facing doesn’t put you in danger, it will certainly play a role in your travel experience. One of the joys of travel is having authentic interactions with people you meet along the way. In order to make the most of these, it’s a great idea to plan some workarounds to the inevitable language barrier ahead of your trip.&nbsp;</span></span></p><span data-dcnode-id="1224" instrument_node="">
</span><h3 data-dcnode-id="1221" id="scroll-to-heading-3"><span data-dcnode-id="1222" style="font-weight: 400;"><span data-dcnode-id="1223" instrument_node="">During school&nbsp;</span></span></h3><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1218" style="font-weight: 400;"><span data-dcnode-id="1219" instrument_node="">If you’re ambitious with your studies, there’s every chance you’re open to going to college in another country — or even another continent — than your home. A study from Kazan Federal University found that many students from neighboring countries </span></span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revistaespacios.com/a18v39n02/a18v39n02p18.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1216" style="font-weight: 400;"><span data-dcnode-id="1217" instrument_node="">pursue higher education in Russia</span></span></a><span data-dcnode-id="1213" style="font-weight: 400;"><span data-dcnode-id="1214" instrument_node="">; and in 2019 </span></span><a data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//educationdata.org/international-student-enrollment-statistics%23%3A~%3Atext%3DIn%25202019%252C%2520the%2520total%2520number%2Ca%2520-1.3%2525%2520decrease%2520from%25202018" rel="noopener" target="_blank"><span data-dcnode-id="1211" style="font-weight: 400;"><span data-dcnode-id="1212" instrument_node="">5.5% of US college students</span></span></a><span data-dcnode-id="1208" style="font-weight: 400;"><span data-dcnode-id="1209" instrument_node=""> came from overseas.&nbsp;</span></span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" style="font-weight: 400;"><span data-dcnode-id="1205" instrument_node="">Studying abroad has a glamorous reputation, and many students look back at their time at a “foreign” university as an enriching and life-changing experience. But if you’re coupling a new culture with a huge language barrier, your academic and personal life are likely to suffer. You might fall behind during lectures and struggle with course materials, and it’ll be harder to bond with peers and professors. In the toughest cases, this might lead to anxiety, social isolation, and difficulty adjusting to your host culture. This is one language barrier you should definitely prepare for!&nbsp;</span></span></p><span data-dcnode-id="1202" instrument_node="">
</span><h3 data-dcnode-id="1199" id="scroll-to-heading-4"><span data-dcnode-id="1200" style="font-weight: 400;"><span data-dcnode-id="1201" instrument_node="">When dating</span></span></h3><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><img alt="" class="aligncenter size-large wp-image-20206" data-dcnode-id="1197" height="683" loading="lazy" sizes="(max-width: 1440px) 100vw, 700px, (max-width: 500px) 200px, (max-width: 700px) 300px, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/wp-content/uploads/2020/10/pexels-ketut-subiyanto-4246243-1024x683.jpg&amp;raw" srcset="https://preply.com/wp-content/uploads/2020/10/pexels-ketut-subiyanto-4246243-1024x683.jpg 1024w, https://preply.com/wp-content/uploads/2020/10/pexels-ketut-subiyanto-4246243-300x200.jpg 300w, https://preply.com/wp-content/uploads/2020/10/pexels-ketut-subiyanto-4246243-768x512.jpg 768w, https://preply.com/wp-content/uploads/2020/10/pexels-ketut-subiyanto-4246243-650x433.jpg 650w, https://preply.com/wp-content/uploads/2020/10/pexels-ketut-subiyanto-4246243.jpg 2048w" width="1024"></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1193" style="font-weight: 400;"><span data-dcnode-id="1194" instrument_node="">With the rise of extremely multicultural cities, it’s becoming more and more common for couples to get together, who have different first languages. For many </span></span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/en/blog/learn-partners-language/" rel="noopener" target="_blank"><span data-dcnode-id="1191" style="font-weight: 400;"><span data-dcnode-id="1192" instrument_node="">multilingual couples</span></span></a><span data-dcnode-id="1188" style="font-weight: 400;"><span data-dcnode-id="1189" instrument_node="">, the language barrier isn’t an impenetrable stone wall. It’s a thin piece of netting that obscures just enough of the day-to-day subtleties of communication for miscommunication-related mischief to be frequent.&nbsp;</span></span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" style="font-weight: 400;"><span data-dcnode-id="1185" instrument_node="">Perhaps you get exasperated with your partner’s use of baffling idioms and expressions. Perhaps you accidentally offend them with nicknames that aren’t insulting in your culture at all! Perhaps it’s just a little harder to express intense feelings of love and rage than you’d prefer.&nbsp;</span></span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1180" style="font-weight: 400;"><span data-dcnode-id="1181" instrument_node="">A language barrier sometimes shows up like an annoying third person in a relationship, making an appearance whenever clear communication is most necessary. In fact, lots of people around the Preply office have </span></span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/en/blog/learn-partners-language/" rel="noopener" target="_blank"><span data-dcnode-id="1178" style="font-weight: 400;"><span data-dcnode-id="1179" instrument_node="">learned their partner’s first language</span></span></a><span data-dcnode-id="1175" style="font-weight: 400;"><span data-dcnode-id="1176" instrument_node=""> to overcome this problem!&nbsp;</span></span></p><span data-dcnode-id="1173" instrument_node="">
</span><h2 data-dcnode-id="1170" id="scroll-to-heading-5"><span data-dcnode-id="1171" style="font-weight: 400;"><span data-dcnode-id="1172" instrument_node="">10 ways to overcome language barriers</span></span></h2><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" style="font-weight: 400;"><span data-dcnode-id="1168" instrument_node="">Here are a few simple things you can do to prepare if you know you’ll need to communicate in an unfamiliar language soon. We’ve also got you covered if your conversation partner doesn’t speak your language well, with some tips to give them a fighting chance of understanding you!&nbsp;</span></span></p><span data-dcnode-id="1165" instrument_node="">
</span><h3 data-dcnode-id="1162" id="scroll-to-heading-6"><span data-dcnode-id="1163" style="font-weight: 400;"><span data-dcnode-id="1164" instrument_node="">1. Plan ahead&nbsp;</span></span></h3><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><img alt="" class="aligncenter size-large wp-image-9159" data-dcnode-id="1160" height="683" loading="lazy" sizes="(max-width: 1440px) 100vw, 700px, (max-width: 500px) 200px, (max-width: 700px) 300px, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/wp-content/uploads/2018/04/night-camera-lens-map-1024x683.jpg&amp;raw" srcset="https://preply.com/wp-content/uploads/2018/04/night-camera-lens-map-1024x683.jpg 1024w, https://preply.com/wp-content/uploads/2018/04/night-camera-lens-map-300x200.jpg 300w, https://preply.com/wp-content/uploads/2018/04/night-camera-lens-map-768x512.jpg 768w, https://preply.com/wp-content/uploads/2018/04/night-camera-lens-map-650x433.jpg 650w, https://preply.com/wp-content/uploads/2018/04/night-camera-lens-map-333x222.jpg 333w, https://preply.com/wp-content/uploads/2018/04/night-camera-lens-map-762x508.jpg 762w, https://preply.com/wp-content/uploads/2018/04/night-camera-lens-map.jpg 1125w" width="1024"></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" style="font-weight: 400;"><span data-dcnode-id="1157" instrument_node="">Of course, many times when a language barrier is a real problem, it’s because you didn’t see it coming. But if you know you’re going into a situation where language will be an issue, set yourself up for success! Consider:&nbsp;</span></span></p><span data-dcnode-id="1154" instrument_node="">
</span><ul data-dcnode-id="1145"><li data-dcnode-id="1151" style="font-weight: 400;"><span data-dcnode-id="1152" style="font-weight: 400;"><span data-dcnode-id="1153" instrument_node="">Are there any words or phrases you know you’re going to need in a different language?&nbsp;</span></span></li><span data-dcnode-id="1150" instrument_node="">
</span><li data-dcnode-id="1147" style="font-weight: 400;"><span data-dcnode-id="1148" style="font-weight: 400;"><span data-dcnode-id="1149" instrument_node="">Could you do a quick online search for significant cultural differences to know about?&nbsp;</span></span></li><span data-dcnode-id="1146" instrument_node="">
</span></ul><p data-dcnode-id="1142"><span data-dcnode-id="1143" style="font-weight: 400;"><span data-dcnode-id="1144" instrument_node="">For instance, if you’re traveling in an unfamiliar country and your phone is about to run out of battery, you might want to look up the phrase for “Excuse me, where can I charge my phone around here?” and also find out whether it’s considered rude to tap someone on the shoulder to ask for help!&nbsp;</span></span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1130"><i data-dcnode-id="1138"><span data-dcnode-id="1139" style="font-weight: 400;"><span data-dcnode-id="1140" instrument_node="">Is English the language you’re battling against? Check out our list of </span></span></i><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/en/blog/travel-english-vocabulary-phrases/" rel="noopener" target="_blank"><i data-dcnode-id="1135"><span data-dcnode-id="1136" style="font-weight: 400;"><span data-dcnode-id="1137" instrument_node="">useful travel vocabulary phrases</span></span></i></a><i data-dcnode-id="1131"><span data-dcnode-id="1132" style="font-weight: 400;"><span data-dcnode-id="1133" instrument_node="">.&nbsp;</span></span></i></p><span data-dcnode-id="1129" instrument_node="">
</span><h3 data-dcnode-id="1126" id="scroll-to-heading-7"><span data-dcnode-id="1127" style="font-weight: 400;"><span data-dcnode-id="1128" instrument_node="">2. Have a translation app handy</span></span></h3><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" style="font-weight: 400;"><span data-dcnode-id="1124" instrument_node="">Translation apps get a lot of bad publicity, and for good reason. The differences between languages are almost invariably too complicated and too subtle for any robot to tackle successfully. However, there is a time and a place for them — and that’s when a language barrier is very obstructive, and you need a quick fix. The translation won’t be perfect — maybe not even good — but the essence of your message will come across. We are very lucky to live in an age where there’s always Google Translate to fall back on.&nbsp;</span></span></p><span data-dcnode-id="1121" instrument_node="">
</span><h3 data-dcnode-id="1118" id="scroll-to-heading-8"><span data-dcnode-id="1119" style="font-weight: 400;"><span data-dcnode-id="1120" instrument_node="">3. Learn a few essential phrases&nbsp;</span></span></h3><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1115" style="font-weight: 400;"><span data-dcnode-id="1116" instrument_node="">If you’ve got an important meeting with someone you don’t share a common language with, try to learn a few basic phrases in their mother tongue. This can be surprisingly useful even if you have no prior knowledge of their native language at all. </span></span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2017/08/170817141717.htm" rel="noopener" target="_blank"><span data-dcnode-id="1113" style="font-weight: 400;"><span data-dcnode-id="1114" instrument_node="">Studies have shown</span></span></a><span data-dcnode-id="1110" style="font-weight: 400;"><span data-dcnode-id="1111" instrument_node=""> that people have a stronger emotional connection to words they hear in their own language, even if they can understand the same sentiment expressed in a different language. Learning some essentials of your conversation partner’s language will trigger their empathy, and help build a rapport with them.&nbsp;</span></span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" style="font-weight: 400;"><span data-dcnode-id="1107" instrument_node="">It is also just widely considered a considerate thing to do — don’t put all the onus on the other person to try and traverse the language barrier! Native English speakers are often very guilty of doing this, since English is so widely spoken. But if you want to communicate with someone who doesn’t speak your first language, it’s not their problem that they don’t understand you — it’s your problem too!&nbsp;</span></span></p><span data-dcnode-id="1104" instrument_node="">
</span><h3 data-dcnode-id="1099" id="scroll-to-heading-9"><span data-dcnode-id="1103" instrument_node="">4. </span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/en/online/english-tutors" rel="noopener" target="_blank"><span data-dcnode-id="1101" style="font-weight: 400;"><span data-dcnode-id="1102" instrument_node="">Find a tutor</span></span></a></h3><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><img alt="get a personal tutor" class="aligncenter size-large wp-image-16885" data-dcnode-id="1097" height="683" loading="lazy" sizes="(max-width: 1440px) 100vw, 700px, (max-width: 500px) 200px, (max-width: 700px) 300px, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/wp-content/uploads/2018/11/Preply_5-1024x683.jpg&amp;raw" srcset="https://preply.com/wp-content/uploads/2018/11/Preply_5-1024x683.jpg 1024w, https://preply.com/wp-content/uploads/2018/11/Preply_5-300x200.jpg 300w, https://preply.com/wp-content/uploads/2018/11/Preply_5-768x512.jpg 768w, https://preply.com/wp-content/uploads/2018/11/Preply_5-1536x1024.jpg 1536w, https://preply.com/wp-content/uploads/2018/11/Preply_5-650x433.jpg 650w, https://preply.com/wp-content/uploads/2018/11/Preply_5.jpg 2048w" width="1024"></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1093" style="font-weight: 400;"><span data-dcnode-id="1094" instrument_node="">If there’s a language barrier making problems in your day-to-day life, a few lessons with </span></span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/" rel="noopener" target="_blank"><span data-dcnode-id="1091" style="font-weight: 400;"><span data-dcnode-id="1092" instrument_node="">an online language tutor</span></span></a><span data-dcnode-id="1088" style="font-weight: 400;"><span data-dcnode-id="1089" instrument_node=""> can make a world of difference. This is the fast track to being able to hold conversations in a new language. You’ll be speaking from the first lesson, and the focus is on exactly the topics </span></span><i data-dcnode-id="1085"><span data-dcnode-id="1086" style="font-weight: 400;"><span data-dcnode-id="1087" instrument_node="">you</span></span></i><span data-dcnode-id="1083" style="font-weight: 400;"><span data-dcnode-id="1084" instrument_node=""> need to know.&nbsp;</span></span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" style="font-weight: 400;"><span data-dcnode-id="1080" instrument_node="">Whether your language barrier occurs during travel, at work, or during romance, a few 1-on-1 lessons with a tutor can transform your experience. A tutor will be able to teach you the “survival” phrases you shouldn’t travel without, a sprinkle of polite business phrases to win over your clients, or some sweet-talking expressions to impress your girlfriend. Crucially, they’ll also show you how to pronounce them correctly, and role-play the answers with you until you speak with confidence! It’s immeasurably more efficient than learning from an app or YouTube video, and practicing with a human will give you the confidence to try out your language skills in real life.&nbsp;</span></span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1076"></p><div class="short-cta" data-dcnode-id="1037" id="short_cta_uniq_id"><span data-dcnode-id="1075" instrument_node="">

</span><span data-dcnode-id="1043"><span data-dcnode-id="1046" instrument_node="">1456 reviews,
					</span><mark data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">“Excellent”</span></mark></span><span data-dcnode-id="1042" instrument_node="">
</span></li><span data-dcnode-id="1040" instrument_node="">
</span></ul><span data-dcnode-id="1038" instrument_node="">
</span></div><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1035"></p><span data-dcnode-id="1034" instrument_node="">
</span><h3 data-dcnode-id="1031" id="scroll-to-heading-10"><span data-dcnode-id="1032" style="font-weight: 400;"><span data-dcnode-id="1033" instrument_node="">5. Avoid idioms and slang</span></span></h3><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" style="font-weight: 400;"><span data-dcnode-id="1029" instrument_node="">When faced with an awkward situation — a client who doesn’t want to talk about money, for example, or an unenthusiastic date — many people instinctively start using more idioms and slang than they usually would. This is normal! Idioms put us at a distance from the words we’re using, so our meaning is slightly cushioned. Instead of saying something like:</span></span></p><span data-dcnode-id="1026" instrument_node="">
</span><ul data-dcnode-id="1021"><li data-dcnode-id="1023" style="font-weight: 400;"><span data-dcnode-id="1024" style="font-weight: 400;"><span data-dcnode-id="1025" instrument_node="">&nbsp;“That will be really expensive!”</span></span></li><span data-dcnode-id="1022" instrument_node="">
</span></ul><p data-dcnode-id="1018"><span data-dcnode-id="1019" style="font-weight: 400;"><span data-dcnode-id="1020" instrument_node="">…which could come across as confrontational, direct, possibly rude, a native English speaker might opt for an idiom like:&nbsp;</span></span></p><span data-dcnode-id="1017" instrument_node="">
</span><ul data-dcnode-id="1012"><li data-dcnode-id="1014" style="font-weight: 400;"><span data-dcnode-id="1015" style="font-weight: 400;"><span data-dcnode-id="1016" instrument_node="">“That would cost a pretty penny!”&nbsp;</span></span></li><span data-dcnode-id="1013" instrument_node="">
</span></ul><p data-dcnode-id="1009"><span data-dcnode-id="1010" style="font-weight: 400;"><span data-dcnode-id="1011" instrument_node="">…which expresses the same message in a way that is indirect, cute and friendly.&nbsp;</span></span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1006" style="font-weight: 400;"><span data-dcnode-id="1007" instrument_node="">You probably do this yourself in many uncomfortable situations without even noticing. When faced with a language barrier, you must fight this very normal instinct! For once, being as direct as possible is </span></span><i data-dcnode-id="1003"><span data-dcnode-id="1004" style="font-weight: 400;"><span data-dcnode-id="1005" instrument_node="">polite</span></span></i><span data-dcnode-id="1001" style="font-weight: 400;"><span data-dcnode-id="1002" instrument_node="">. If your tone is more confrontational than normal, you’re doing it right!&nbsp;</span></span></p><span data-dcnode-id="999" instrument_node="">
</span><h3 data-dcnode-id="996" id="scroll-to-heading-11"><span data-dcnode-id="997" style="font-weight: 400;"><span data-dcnode-id="998" instrument_node="">6. Use simple terms &amp; phrases</span></span></h3><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" style="font-weight: 400;"><span data-dcnode-id="994" instrument_node="">When English speakers adopt a polite tone — the kind of tone you’d use to speak to a stranger you meet at work or on travels, and want to show respect to — we often unconsciously use quite complicated grammar. Instead of asking:&nbsp;</span></span></p><span data-dcnode-id="991" instrument_node="">
</span><ul data-dcnode-id="986"><li data-dcnode-id="988" style="font-weight: 400;"><span data-dcnode-id="989" style="font-weight: 400;"><span data-dcnode-id="990" instrument_node="">Can you write the report soon?&nbsp;</span></span></li><span data-dcnode-id="987" instrument_node="">
</span></ul><p data-dcnode-id="983"><span data-dcnode-id="984" style="font-weight: 400;"><span data-dcnode-id="985" instrument_node="">We might phrase the same question using the passive voice, and/or a conditional tense:</span></span></p><span data-dcnode-id="982" instrument_node="">
</span><ul data-dcnode-id="977"><li data-dcnode-id="979" style="font-weight: 400;"><span data-dcnode-id="980" style="font-weight: 400;"><span data-dcnode-id="981" instrument_node="">Could we please get the report done soon?&nbsp;</span></span></li><span data-dcnode-id="978" instrument_node="">
</span></ul><p data-dcnode-id="974"><span data-dcnode-id="975" style="font-weight: 400;"><span data-dcnode-id="976" instrument_node="">The urge to use complicated grammar needs ditching alongside the culture-specific idioms. To overcome the language barrier, you’ll have to have the courage to say what you mean directly!&nbsp;</span></span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" style="font-weight: 400;"><span data-dcnode-id="972" instrument_node="">Conversely, if you’re the one speaking in a less familiar language, don’t be afraid to ask “Can you say that more simply please?”&nbsp;</span></span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><img alt="speaking exercises" class="aligncenter size-large wp-image-16154" data-dcnode-id="968" height="576" loading="lazy" sizes="(max-width: 1440px) 100vw, 700px, (max-width: 500px) 200px, (max-width: 700px) 300px, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/wp-content/uploads/2018/08/mindful-speaking-two-friends-talking-1024x576.jpg&amp;raw" srcset="https://preply.com/wp-content/uploads/2018/08/mindful-speaking-two-friends-talking-1024x576.jpg 1024w, https://preply.com/wp-content/uploads/2018/08/mindful-speaking-two-friends-talking-300x169.jpg 300w, https://preply.com/wp-content/uploads/2018/08/mindful-speaking-two-friends-talking-768x432.jpg 768w, https://preply.com/wp-content/uploads/2018/08/mindful-speaking-two-friends-talking-650x366.jpg 650w, https://preply.com/wp-content/uploads/2018/08/mindful-speaking-two-friends-talking.jpg 1200w" width="1024"></p><span data-dcnode-id="966" instrument_node="">
</span><h3 data-dcnode-id="963" id="scroll-to-heading-12"><span data-dcnode-id="964" style="font-weight: 400;"><span data-dcnode-id="965" instrument_node="">7. Enunciate slowly &amp; carefully</span></span></h3><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" style="font-weight: 400;"><span data-dcnode-id="961" instrument_node="">One final point about fighting our tendencies to speak without clarity in formal or uncomfortable situations! If your partner is the one battling a less familiar language, you can greatly improve their chances of understanding you by speaking slowly, and enunciating each word carefully.&nbsp;</span></span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" style="font-weight: 400;"><span data-dcnode-id="957" instrument_node="">When learning a new language, many people often find native speakers much harder to understand compared to non-native ones. Native speakers are so comfortable in their language that they don’t think about the pronunciation of their words at all!</span></span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" style="font-weight: 400;"><span data-dcnode-id="953" instrument_node="">&nbsp;If you’re trying to overcome a language barrier, you should try to become conscious of how your words will sound to the other person. Slow it down, and don’t run two words into each other, if you can help it. The textbook version of your language is friendlier and more considerate to a learner than the less formal version you use with friends.&nbsp;</span></span></p><span data-dcnode-id="950" instrument_node="">
</span><h3 data-dcnode-id="947" id="scroll-to-heading-13"><span data-dcnode-id="948" style="font-weight: 400;"><span data-dcnode-id="949" instrument_node="">8. Try to communicate visually</span></span></h3><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="944" style="font-weight: 400;"><span data-dcnode-id="945" instrument_node="">Sometimes a language barrier is so total that no amount of sentence simplification is going to overcome it. If you and your conversation partner share absolutely zero common language, you’ll need to think beyond words! Luckily, most experts agree that </span></span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youth-time.eu/to-talk-or-not-to-talk-that-is-the-question-at-least-70-percent-of-communication-is-non-verbal/" rel="noopener" target="_blank"><span data-dcnode-id="942" style="font-weight: 400;"><span data-dcnode-id="943" instrument_node="">70 to 93 percent of all communication is nonverbal</span></span></a><span data-dcnode-id="939" style="font-weight: 400;"><span data-dcnode-id="940" instrument_node="">. To emphasise these aspects, you can always try:&nbsp;</span></span></p><span data-dcnode-id="937" instrument_node="">
</span><ul data-dcnode-id="924"><li data-dcnode-id="934" style="font-weight: 400;"><span data-dcnode-id="935" style="font-weight: 400;"><span data-dcnode-id="936" instrument_node="">Miming what you mean&nbsp;</span></span></li><span data-dcnode-id="933" instrument_node="">
</span><li data-dcnode-id="930" style="font-weight: 400;"><span data-dcnode-id="931" style="font-weight: 400;"><span data-dcnode-id="932" instrument_node="">Pointing to things&nbsp;</span></span></li><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="926" style="font-weight: 400;"><span data-dcnode-id="927" style="font-weight: 400;"><span data-dcnode-id="928" instrument_node="">Drawing pictures&nbsp;</span></span></li><span data-dcnode-id="925" instrument_node="">
</span></ul><p data-dcnode-id="921"><span data-dcnode-id="922" style="font-weight: 400;"><span data-dcnode-id="923" instrument_node="">Now is also the time to give your facial muscles a workout. It’s amazing how much can be communicated through eyebrow gymnastics — emojis are the great universal language of our time, after all.&nbsp;</span></span></p><span data-dcnode-id="920" instrument_node="">
</span><h3 data-dcnode-id="917" id="scroll-to-heading-14"><span data-dcnode-id="918" style="font-weight: 400;"><span data-dcnode-id="919" instrument_node="">9. Pay special attention to body language&nbsp;</span></span></h3><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><img alt="" class="aligncenter size-large wp-image-20207" data-dcnode-id="915" height="683" loading="lazy" sizes="(max-width: 1440px) 100vw, 700px, (max-width: 500px) 200px, (max-width: 700px) 300px, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/wp-content/uploads/2020/10/pexels-august-de-richelieu-4260105-1024x683.jpg&amp;raw" srcset="https://preply.com/wp-content/uploads/2020/10/pexels-august-de-richelieu-4260105-1024x683.jpg 1024w, https://preply.com/wp-content/uploads/2020/10/pexels-august-de-richelieu-4260105-300x200.jpg 300w, https://preply.com/wp-content/uploads/2020/10/pexels-august-de-richelieu-4260105-768x513.jpg 768w, https://preply.com/wp-content/uploads/2020/10/pexels-august-de-richelieu-4260105-650x434.jpg 650w, https://preply.com/wp-content/uploads/2020/10/pexels-august-de-richelieu-4260105.jpg 2048w" width="1024"></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" style="font-weight: 400;"><span data-dcnode-id="912" instrument_node="">When faced with a language barrier, we often instinctively communicate more with our face and body than usual. This is likely to be just as true for your partner as it is for you! If you’re throwing out non-verbal cues, you should be “listening” for them too.&nbsp;</span></span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" style="font-weight: 400;"><span data-dcnode-id="908" instrument_node="">Watch your partner’s body language closely, and you’ll be able to tell how your communication is making them feel. If they react very differently to a message than you expect them to, that’s a clear sign that the language barrier is getting in the way. Call out the problem where you can by saying something like:&nbsp;</span></span></p><span data-dcnode-id="905" instrument_node="">
</span><ul data-dcnode-id="896"><li data-dcnode-id="902" style="font-weight: 400;"><span data-dcnode-id="903" style="font-weight: 400;"><span data-dcnode-id="904" instrument_node="">You seem upset, perhaps the word [idiot] means something more offensive than I meant it to?&nbsp;</span></span></li><span data-dcnode-id="901" instrument_node="">
</span><li data-dcnode-id="898" style="font-weight: 400;"><span data-dcnode-id="899" style="font-weight: 400;"><span data-dcnode-id="900" instrument_node="">Do you understand? I think I have not been clear. My Italian isn’t very good.&nbsp;</span></span></li><span data-dcnode-id="897" instrument_node="">
</span></ul><p data-dcnode-id="893"><span data-dcnode-id="894" style="font-weight: 400;"><span data-dcnode-id="895" instrument_node="">With a little patience and sensitivity, you can become a body language detective — and it’ll really help.</span></span></p><span data-dcnode-id="892" instrument_node="">
</span><h3 data-dcnode-id="889" id="scroll-to-heading-15"><span data-dcnode-id="890" style="font-weight: 400;"><span data-dcnode-id="891" instrument_node="">10. Use an interpreter</span></span></h3><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" style="font-weight: 400;"><span data-dcnode-id="887" instrument_node="">There are some language barriers that even the bluntest sentences, the smartest translation app and the most elastic eyebrows can’t tear down. If you’re going into an important meeting where language will be a major issue, it’s worth considering an interpreter. There’s a reason that this job exists, after all!&nbsp;</span></span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" style="font-weight: 400;"><span data-dcnode-id="883" instrument_node="">Whether you’re dealing with language barriers related to legal documents, medical issues when traveling or important clients at work, sometimes the stakes are just too high to allow for communication errors, and it’s wise to consult expert advice.&nbsp;</span></span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="878" style="font-weight: 400;"><span data-dcnode-id="879" instrument_node="">Thanks to freelancing sites like </span></span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peopleperhour.com/" rel="noopener" target="_blank"><span data-dcnode-id="876" style="font-weight: 400;"><span data-dcnode-id="877" instrument_node="">Peopleperhour</span></span></a><span data-dcnode-id="873" style="font-weight: 400;"><span data-dcnode-id="874" instrument_node=""> and </span></span><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upwork.com/" rel="noopener" target="_blank"><span data-dcnode-id="871" style="font-weight: 400;"><span data-dcnode-id="872" instrument_node="">Upwork</span></span></a><span data-dcnode-id="868" style="font-weight: 400;"><span data-dcnode-id="869" instrument_node="">, the services of an interpreter won’t necessarily be expensive, and in the digital age, you can always employ someone to join you remotely. You could even ask your friends if any of them can play interpreter! After all, it’s estimated that </span></span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ilanguages.org/bilingual.php%23%3A~%3Atext%3DMonolingual%253A%2520A%2520person%2520knowing%2520only%2C%2813%2525%2520of%2520world%2520population%29" rel="noopener" target="_blank"><span data-dcnode-id="866" style="font-weight: 400;"><span data-dcnode-id="867" instrument_node="">53% of the world are bi- or trilingual</span></span></a><span data-dcnode-id="863" style="font-weight: 400;"><span data-dcnode-id="864" instrument_node="">. Put a call out on your social media channels and you’ll probably be surprised how many people can help.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="861" instrument_node="">
</span><h2 data-dcnode-id="858" id="scroll-to-heading-16"><span data-dcnode-id="859" style="font-weight: 400;"><span data-dcnode-id="860" instrument_node="">Break down those language barriers with 1-on-1 online lessons&nbsp;</span></span></h2><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" style="font-weight: 400;"><span data-dcnode-id="856" instrument_node="">When you and your conversation partner have a different set of tools to communicate with, communication is distilled to the most essential information. This can be a huge pain, a small frustration or, occasionally, a source of comedy gold!&nbsp;</span></span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="851" style="font-weight: 400;"><span data-dcnode-id="852" instrument_node="">In any case, the surest way to break through a language barrier and have authentic interactions is </span></span><i data-dcnode-id="848"><span data-dcnode-id="849" style="font-weight: 400;"><span data-dcnode-id="850" instrument_node="">preparation</span></span></i><span data-dcnode-id="846" style="font-weight: 400;"><span data-dcnode-id="847" instrument_node="">. And the most effective way to prepare for speaking a new language is to speak it! </span></span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preply.com/" rel="noopener" target="_blank"><span data-dcnode-id="844" style="font-weight: 400;"><span data-dcnode-id="845" instrument_node="">1-on-1 online tutoring</span></span></a><span data-dcnode-id="841" style="font-weight: 400;"><span data-dcnode-id="842" instrument_node=""> isn’t just for people who want to learn a new language in its entirety. It’s also for those who just want to learn enough of an unfamiliar language to enjoy friendlier communication with a native speaker. You’ll be amazed at how a few basic lessons can help that language barrier start to come tumbling down! &nbsp; </span></span></p><span data-dcnode-id="839" instrument_node="">
</span></div><span data-dcnode-id="837" instrument_node="">

</span><div class="author-block__title" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Article by:</span></div><span data-dcnode-id="762" instrument_node="">
