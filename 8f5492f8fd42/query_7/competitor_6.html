</span><meta content="The Improving Global Health (IGH) programme develops leadership capacity within the National Health Service (NHS) in a novel way. NHS employees collaboratively run quality improvement projects within organisations in low-income and middle-income countries with whom long-standing healthcare partnerships have been built. Leadership behaviours are developed through theoretical and experiential learning, alongside induction and mentorship. The health systems of overseas partners are strengthened through projects that align with local priorities. This article develops solutions to two main problems: how reciprocal global health programmes can be designed and how global health programmes based in leadership can attract women and black and minority ethnic groups into leadership. The outcomes of both sides of the IGH programme are described here. The overseas perspective is described using the reflections of two current partners, highlighting improvements in the local healthcare system and demonstrating growth in local team members. The UK perspective is evaluated using two surveys sent to different groups of returned IGH participants. Leadership, global health and quality improvement skills improve, having a significant and long-lasting impact on career trajectory. The IGH programme is attracting women and black and minority ethnic groups into leadership. Through collaboration and reciprocity, the IGH programme is developing a new cadre of NHS leader that is diverse and inclusive. The use of long-standing healthcare partnerships ensures that learning is shared and growth is mutual, creating development within the overseas and UK partner alike.

All data relevant to the study are included in the article." data-dcnode-id="4153" name="DC.Description"><span data-dcnode-id="4152" instrument_node="">

</span><meta content="The Improving Global Health (IGH) programme develops leadership capacity within the National Health Service (NHS) in a novel way. NHS employees collaboratively run quality improvement projects within organisations in low-income and middle-income countries with whom long-standing healthcare partnerships have been built. Leadership behaviours are developed through theoretical and experiential learning, alongside induction and mentorship. The health systems of overseas partners are strengthened through projects that align with local priorities. This article develops solutions to two main problems: how reciprocal global health programmes can be designed and how global health programmes based in leadership can attract women and black and minority ethnic groups into leadership. The outcomes of both sides of the IGH programme are described here. The overseas perspective is described using the reflections of two current partners, highlighting improvements in the local healthcare system and demonstrating growth in local team members. The UK perspective is evaluated using two surveys sent to different groups of returned IGH participants. Leadership, global health and quality improvement skills improve, having a significant and long-lasting impact on career trajectory. The IGH programme is attracting women and black and minority ethnic groups into leadership. Through collaboration and reciprocity, the IGH programme is developing a new cadre of NHS leader that is diverse and inclusive. The use of long-standing healthcare partnerships ensures that learning is shared and growth is mutual, creating development within the overseas and UK partner alike.

All data relevant to the study are included in the article." data-dcnode-id="3987" name="twitter:description"><span data-dcnode-id="3986" instrument_node="">

4"><a data-dcnode-id="2404" id="aff-7" name="aff-7"></a><address data-dcnode-id="2395"><sup data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">7</span></sup><span class="institution" data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Transition Programme Director</span></span><span data-dcnode-id="2399" instrument_node="">, </span><span class="addr-line" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Wiltshire</span></span><span data-dcnode-id="2396" instrument_node="">, UK</span></address></li></ol></div><ol class="corresp-list" data-dcnode-id="2383"><li class="corresp" data-dcnode-id="2384" id="corresp-1"><span class="corresp-label" data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Correspondence to</span></span><span data-dcnode-id="2389" instrument_node=""> Dr Ann-Marie Streeton; </span><span class="em-link" data-dcnode-id="2385"><span class="em-addr" data-dcnode-id="2386"><a data-dcnode-id="2387" href="mailto:annmarie.streeton@yahoo.co.uk"><span data-dcnode-id="2388" instrument_node="">annmarie.streeton@yahoo.co.uk</span></a></span></span></li></ol></div></div></div><span data-dcnode-id="2379" instrument_node=""> </span></div><span data-dcnode-id="2377" instrument_node="">

</span><div class="highwire-markup" data-dcnode-id="2338"><div data-dcnode-id="2339" id="content-block" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article abstract-view" data-dcnode-id="2341"><span class="highwire-journal-article-marker-start" data-dcnode-id="2371"></span><div class="section abstract" data-dcnode-id="2366" id="abstract-1"><h2 data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Abstract</span></h2><p data-dcnode-id="2367" id="p-2"><span data-dcnode-id="2368" instrument_node="">The Improving Global Health (IGH) programme develops leadership capacity within the National Health Service (NHS) in a novel way. NHS employees collaboratively run quality improvement projects within organisations in low-income and middle-income countries with whom long-standing healthcare partnerships have been built. Leadership behaviours are developed through theoretical and experiential learning, alongside induction and mentorship. The health systems of overseas partners are strengthened through projects that align with local priorities. This article develops solutions to two main problems: how reciprocal global health programmes can be designed and how global health programmes based in leadership can attract women and black and minority ethnic groups into leadership. The outcomes of both sides of the IGH programme are described here. The overseas perspective is described using the reflections of two current partners, highlighting improvements in the local healthcare system and demonstrating growth in local team members. The UK perspective is evaluated using two surveys sent to different groups of returned IGH participants. Leadership, global health and quality improvement skills improve, having a significant and long-lasting impact on career trajectory. The IGH programme is attracting women and black and minority ethnic groups into leadership. Through collaboration and reciprocity, the IGH programme is developing a new cadre of NHS leader that is diverse and inclusive. The use of long-standing healthcare partnerships ensures that learning is shared and growth is mutual, creating development within the overseas and UK partner alike.</span></p></div><ul class="kwd-group" data-dcnode-id="2357"><li class="kwd" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">health education and promotion</span></li><li class="kwd" data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">health economics</span></li><li class="kwd" data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">health policy</span></li><li class="kwd" data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">health systems evaluation</span></li></ul><div class="section data-availability" data-dcnode-id="2352" id="sec-19"><h2 class="" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Data availability statement</span></h2><p data-dcnode-id="2353" id="p-76"><span data-dcnode-id="2354" instrument_node="">All data relevant to the study are included in the article.</span></p></div><div class="license" data-dcnode-id="2343" id="license-1"><span class="ali-license-ref" data-dcnode-id="2349"><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//creativecommons.org/licenses/by-nc/4.0/" rel="license"><span data-dcnode-id="2351" instrument_node="">http://creativecommons.org/licenses/by-nc/4.0/</span></a></span><p data-dcnode-id="2344" id="p-1"><span data-dcnode-id="2348" instrument_node="">This is an open access article distributed in accordance with the Creative Commons Attribution Non Commercial (CC BY-NC 4.0) license, which permits others to distribute, remix, adapt, build upon this work non-commercially, and license their derivative works on different terms, provided the original work is properly cited, appropriate credit is given, any changes made indicated, and the use is non-commercial. See:&nbsp;</s </span><div class="pane-content" data-dcnode-id="706"><span data-dcnode-id="2224" instrument_node="">
</span><div class="highwire-markup" data-dcnode-id="708"><div class="content-block-markup" data-dcnode-id="709" xmlns="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml"><div class="article fulltext-view" data-dcnode-id="711"><span class="highwire-journal-article-marker-start" data-dcnode-id="2223"></span><ul class="kwd-group" data-dcnode-id="2210"><li class="kwd" data-dcnode-id="2220"><a class="hw-term hw-article-keyword hw-article-keyword-health-education-and-promotion" data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/keyword/health-education-and-promotion" rel="nofollow"><span data-dcnode-id="2222" instrument_node="">health education and promotion</span></a></li><li class="kwd" data-dcnode-id="2217"><a class="hw-term hw-article-keyword hw-article-keyword-health-economics" data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/keyword/health-economics" rel="nofollow"><span data-dcnode-id="2219" instrument_node="">health economics</span></a></li><li class="kwd" data-dcnode-id="2214"><a class="hw-term hw-article-keyword hw-article-keyword-health-policy" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/keyword/health-policy" rel="nofollow"><span data-dcnode-id="2216" instrument_node="">health policy</span></a></li><li class="kwd" data-dcnode-id="2211"><a class="hw-term hw-article-keyword hw-article-keyword-health-systems-evaluation" data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/keyword/health-systems-evaluation" rel="nofollow"><span data-dcnode-id="2213" instrument_node="">health systems evaluation</span></a></li></ul><div class="boxed-text" data-dcnode-id="2182" id="boxed-text-1"><h3 data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Summary box</span></h3><ul class="list-unord" data-dcnode-id="2183" id="list-1"><li data-dcnode-id="2205" id="list-item-1"><p data-dcnode-id="2206" id="p-3"><span data-dcnode-id="2207" instrument_node="">Leadership development is needed throughout the National Health Service (NHS) and is known to have a positive effect on the quality of health delivery.</span></p></li><li data-dcnode-id="2202" id="list-item-2"><p data-dcnode-id="2203" id="p-4"><span data-dcnode-id="2204" instrument_node="">The experience of working internationally is known to improve leadership skills.</span></p></li><li data-dcnode-id="2199" id="list-item-3"><p data-dcnode-id="2200" id="p-5"><span data-dcnode-id="2201" instrument_node="">The Improving Global Health (IGH) programme is a novel leadership development programme based on experiential learning through overseas placement.</span></p></li><li data-dcnode-id="2196" id="list-item-4"><p data-dcnode-id="2197" id="p-6"><span data-dcnode-id="2198" instrument_node="">Many returned fellows reported a substantial development in their leadership behaviours. Improved confidence to be a leader, better knowledge of quality improvement methodology and a better understanding of global health were also reported. Completing the fellowship had a substantial and long-standing impact on career trajectory.</span></p></li><li data-dcnode-id="2193" id="list-item-5"><p data-dcnode-id="2194" id="p-7"><span data-dcnode-id="2195" instrument_node="">IGH in-country partners report healthcare system improvements.</span></p></li><li data-dcnode-id="2190" id="list-item-6"><p data-dcnode-id="2191" id="p-8"><span data-dcnode-id="2192" instrument_node="">The IGH programme is attracting women and minority ethnic groups into leadership.</span></p></li><li data-dcnode-id="2187" id="list-item-7"><p data-dcnode-id="2188" id="p-9"><span data-dcnode-id="2189" instrument_node="">Leadership development programmes, such as the IGH programme, must be encouraged and scaled up in order to promote the training of a diverse and inclusive group of NHS leaders of the future.</span></p></li><li data-dcnode-id="2184" id="list-item-8"><p data-dcnode-id="2185" id="p-10"><span data-dcnode-id="2186" instrument_node="">The success of the IGH programmes’ global health work is due to its focus on reciprocity through mutual learning and development.</span></p></li></ul></div><div class="section intro" data-dcnode-id="2155" id="sec-1"><h2 class="" data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Introduction</span></h2><p data-dcnode-id="2167" id="p-11"><span data-dcnode-id="2179" instrument_node="">The Improving Global Health (IGH) programme is a National Health Service (NHS) leadership development programme that, owing to its practice of running projects in low-income or middle-income countries, is unique in its design. Leadership is developed through the experiential learning of an overseas placement while improvements in the local healthcare system are realised, in contrast to other NHS leadership programmes that are based in the UK.</span><a class="xref-bibr" data-dcnode-id="2177" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="2178" instrument_node="">1</span></a><span data-dcnode-id="2176" instrument_node=""> </span><span class="xref-sep" data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">,</span></span><a class="xref-bibr" data-dcnode-id="2172" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="2173" instrument_node="">2</span></a><span data-dcnode-id="2171" instrument_node=""> Through vertical leadership development,</span><a class="xref-bibr" data-dcnode-id="2169" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="2170" instrument_node="">3</span></a><span data-dcnode-id="2168" instrument_node=""> the programme creates leaders who are independent of thought, adaptable and are able to face challenges; they are more culturally and emotionally aware (accepted for publishing, ‘a qualitative analysis of vertical leadership development among NHS healthcare workers in low to middle income country settings’, January 2020). These leaders are needed in a fast changing and ever more pressurised NHS.</span></p><p data-dcnode-id="2156" id="p-12"><span data-dcnode-id="2166" instrument_node="">Women are under-represented in more senior clinical NHS roles</span><a class="xref-bibr" data-dcnode-id="2164" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="2165" instrument_node="">4</span></a><span data-dcnode-id="2163" instrument_node=""> and fewer senior NHS staff are from black and minority ethnic background.</span><a class="xref-bibr" data-dcnode-id="2161" href="#ref-5" id="xref-ref-5-1"><span data-dcnode-id="2162" instrument_node="">5</span></a><span data-dcnode-id="2160" instrument_node=""> The under-representation of women and minority ethnic groups within NHS leadership can be addressed by fostering a culture of inclusivity within leadership development programmes. This article highlights the reciprocal nature of the IGH programme by outlining leadership development in the returned fellow and describing the impact of the programme on the host country’s healthcare system and workers. The IGH programmes’ ethos of ‘co-development and mutual learning’ as a replacement for ‘more outdated ideas of international development’</span><a class="xref-bibr" data-dcnode-id="2158" href="#ref-6" id="xref-ref-6-1"><span data-dcnode-id="2159" instrument_node="">6</span></a><span data-dcnode-id="2157" instrument_node=""> is highlighted, and a framework for fostering reciprocity in global health programmes is drawn.</span></p></div><div class="section" data-dcnode-id="2140" id="sec-2"><h2 class="" data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Programme overview</span></h2><p data-dcnode-id="2145" id="p-13"><span data-dcnode-id="2152" instrument_node="">The IGH programme gained recognition as a programme which provides benefit to all participants. Since it began, 254 fellows have completed a placement, each spending on average 6 months overseas. Participants, known as ‘fellows’, work in partnership with in-country health workers to implement projects using quality improvement (QI) methodology. Leadership behaviours are developed through experiential learning,</span><a class="xref-bibr" data-dcnode-id="2150" href="#ref-7" id="xref-ref-7-1"><span data-dcnode-id="2151" instrument_node="">7</span></a><span data-dcnode-id="2149" instrument_node=""> using the NHS Healthcare Leadership Model as a framework.</span><a class="xref-bibr" data-dcnode-id="2147" href="#ref-8" id="xref-ref-8-1"><span data-dcnode-id="2148" instrument_node="">8</span></a><span data-dcnode-id="2146" instrument_node=""> Fellows do not provide clinical care but act as project coordinators, contributing to local healthcare improvement. Project topics are chosen by the in-country team with the Sustainable Development Goals (SDGs) in mind, ensuring work is aligned with local healthcare priorities.</span></p><p data-dcnode-id="2143" id="p-14"><span data-dcnode-id="2144" instrument_node="">During the lifetime of the programme, 12 overseas partnerships have been formed with organisations in Cambodia, Myanmar, Tanzania, Kenya, South Africa, Zambia, Lesotho and Uganda. Preplacement, fellows complete 4 days of UK-based induction where they learn concepts of leadership, communication skills and behaviours; project planning, implementation and evaluation; QI methods; peer learning and support; concepts of public health and the wider determinants of health; the SDGs, teaching and learning and cultural preparation for their placement site. There is allocated time to complete and receive feedback regarding their Myers-Briggs Type Indicator (MBTI).</span></p><p data-dcnode-id="2141" id="p-15"><span data-dcnode-id="2142" instrument_node="">Fellows are each allocated a mentor to support and challenge them and have access to a partnership-link lead (PLL) who supports the relationship with the partnership organisation. Mentors are recruited from IGH alumni. They attend a training day called ‘Coaching Conversations’ which is updated every 2 years. The PLL is a voluntary role, and they all complete 5 days of training to become an MBTI Practitioner (level 1). Postplacement, fellows complete a project report, reflect on their leadership development and present their work and learning to their colleagues.</span></p></div><div class="section" data-dcnode-id="2033" id="sec-3"><h2 class="" data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Leadership and the IGH programme</span></h2><p data-dcnode-id="2134" id="p-16"><span data-dcnode-id="2137" instrument_node="">‘Leadership is becoming less about being the smartest in the room and much more about how we collaborate, work with diverse stakeholders, inspire and bring the best out of others. Being more inclusive and collaborative. It’s about developing our ability to be curious; our ability to explore new approaches, new perspectives, engage different stakeholders and view points and empathise with diverse perspectives’.</span><a class="xref-bibr" data-dcnode-id="2135" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="2136" instrument_node="">9</span></a></p><p data-dcnode-id="2121" id="p-17"><span data-dcnode-id="2133" instrument_node="">There has been a call for leadership within the NHS at every level that is high quality, inclusive and compassionate.</span><a class="xref-bibr" data-dcnode-id="2131" href="#ref-10" id="xref-ref-10-1"><span data-dcnode-id="2132" instrument_node="">10–12</span></a><span data-dcnode-id="2130" instrument_node=""> NHS Improvement outlines that QI and leadership must be embedded within healthcare curricula and revalidation processes, making programmes such as the IGH programme ever more necessary.</span><a class="xref-bibr" data-dcnode-id="2128" href="#ref-13" id="xref-ref-13-1"><span data-dcnode-id="2129" instrument_node="">13</span></a><span data-dcnode-id="2127" instrument_node=""> The modern world has been described as increasingly: volatile, uncertain, complex and ambiguous; descriptors that are readily applied to health systems such as the NHS.</span><a class="xref-bibr" data-dcnode-id="2125" href="#ref-14" id="xref-ref-14-1"><span data-dcnode-id="2126" instrument_node="">14 15</span></a><span data-dcnode-id="2124" instrument_node=""> There is therefore a need for strong leadership. A review of NHS leadership concludes that properly developed leadership can lead to improvements in patient satisfaction, patient mortality, financial performance, staff well-being, engagement, turnover and overall quality of care.</span><a class="xref-bibr" data-dcnode-id="2122" href="#ref-16" id="xref-ref-16-1"><span data-dcnode-id="2123" instrument_node="">16</span></a></p><p data-dcnode-id="2107" id="p-18"><span data-dcnode-id="2120" instrument_node="">The IGH programme is centred on developing the leadership behaviours described in the NHS Healthcare Leadership Model</span><a class="xref-bibr" data-dcnode-id="2118" href="#ref-8" id="xref-ref-8-2"><span data-dcnode-id="2119" instrument_node="">8</span></a><span data-dcnode-id="2117" instrument_node=""> and has evolved to use the framework of vertical and horizontal leadership development</span><a class="xref-bibr" data-dcnode-id="2115" href="#ref-3" id="xref-ref-3-2"><span data-dcnode-id="2116" instrument_node="">3</span></a><span data-dcnode-id="2114" instrument_node=""> to support this. Horizontal leadership development is about imparting knowledge and facts, while vertical leadership development is about changing the way you think.</span><a class="xref-bibr" data-dcnode-id="2112" href="#ref-3" id="xref-ref-3-3"><span data-dcnode-id="2113" instrument_node="">3</span></a><span data-dcnode-id="2111" instrument_node=""> The structure of the IGH programme fits well with the proposed design of a horizontal and vertical leadership development programme. Vertical leadership development needs a ‘heat experience’, ‘colliding perspectives’ and ‘elevated sensemaking’ (</span><a class="xref-fig" data-dcnode-id="2109" href="#F1" id="xref-fig-1-1"><span data-dcnode-id="2110" instrument_node="">figure 1</span></a><span data-dcnode-id="2108" instrument_node="">).</span></p><div class="fig pos-float odd" data-dcnode-id="2075" id="F1"><div class="highwire-figure" data-dcnode-id="2086"><div class="fig-inline-img-wrapper" data-dcnode-id="2100"><div class="fig-inline-img" data-dcnode-id="2101"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="2102" data-figure-caption="<div class=&quot;highwire-markup&quot;>The IGH programme as a vertical leadership development programme. Reproduced and adapted from Petrie (2015).3 IGH, Improving Global Health.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F1.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1361158549" title="The IGH programme as a vertical leadership development programme. Reproduced and adapted from Petrie (2015).3 IGH, Improving Global Health."><span class="hw-responsive-img" data-dcnode-id="2103"><img alt="Figure 1" class="highwire-fragment fragment-image lazyloaded" data-dcnode-id="2106" data-src="https://gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F1.medium.gif" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F1.medium.gif&amp;raw" width="440"><noscript data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Figure 1" src="https://gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F1.medium.gif" width="440" height="269"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="2087"><li class="download-fig first" data-dcnode-id="2097"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="2098" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F1.large.jpg%3Fdownload%3Dtrue" title="Download Figure 1"><span data-dcnode-id="2099" instrument_node="">Download figure</span></a></li><span data-dcnode-id="2096" instrument_node="">
</span><li class="new-tab" data-dcnode-id="2093"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="2094" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F1.large.jpg" target="_blank"><span data-dcnode-id="2095" instrument_node="">Open in new tab</span></a></li><span data-dcnode-id="2092" instrument_node="">
</span><li class="download-ppt last" data-dcnode-id="2089"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="2090" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/highwire/powerpoint/148841"><span data-dcnode-id="2091" instrument_node="">Download powerpoint</span></a></li><span data-dcnode-id="2088" instrument_node="">
</span></ul></div><div class="fig-caption" data-dcnode-id="2076" xmlns:xhtml="http://www.w3.org/1999/xhtml"><span class="fig-label" data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Figure 1</span></span><span data-dcnode-id="2083" instrument_node=""> </span><p class="first-child" data-dcnode-id="2078" id="p-19"><span data-dcnode-id="2082" instrument_node="">The IGH programme as a vertical leadership development programme. Reproduced and adapted from Petrie (2015).</span><a class="xref-bibr" data-dcnode-id="2080" href="#ref-3" id="xref-ref-3-4"><span data-dcnode-id="2081" instrument_node="">3</span></a><span data-dcnode-id="2079" instrument_node=""> IGH, Improving Global Health.</span></p><div class="sb-div caption-clear" data-dcnode-id="2077"></div></div></div><p data-dcnode-id="2065" id="p-20"><span data-dcnode-id="2074" instrument_node="">The induction programme provides the horizontal development through classroom learning of theoretical knowledge, while the overseas placement facilitates the vertical development. The placement puts fellows in an unfamiliar environment, within a country and healthcare system that is different from their own. They co-ordinate a project in a specialty or area that they may have little or no prior knowledge or experience. This serves as their ‘heat experience’, and they face a challenging situation where their normal way of operating is inadequate, forcing them to consider new ways of thinking. The fellows work in partnership with people they have only just met, from a different culture and society. Communication, experiences and training are different, producing the ‘colliding perspectives’ element of vertical leadership development. At a time when the fellows are open to new ways of thinking, they are presented with a range of new perspectives to consider and sample. Finally, they are provided with a mentor, an in-country project supervisor and a PLL who work to coach the fellows to establish new thought processes, called ‘elevated sensemaking’.</span><a class="xref-bibr" data-dcnode-id="2072" href="#ref-3" id="xref-ref-3-5"><span data-dcnode-id="2073" instrument_node="">3</span></a><span data-dcnode-id="2071" instrument_node=""> The aspiration is to take leaders from the state of the ‘faithful follower’, to ‘independent thinker’ and finally to the ‘interdependent collaborator’ (</span><a class="xref-fig" data-dcnode-id="2069" href="#F2" id="xref-fig-2-1"><span data-dcnode-id="2070" instrument_node="">figure 2</span></a><span data-dcnode-id="2068" instrument_node="">). It is in this final state that leaders become better adapted to cope with the uncertainty of a modern health system, such as the NHS.</span><a class="xref-bibr" data-dcnode-id="2066" href="#ref-17" id="xref-ref-17-1"><span data-dcnode-id="2067" instrument_node="">17</span></a></p><div class="fig pos-float odd" data-dcnode-id="2034" id="F2"><div class="highwire-figure" data-dcnode-id="2044"><div class="fig-inline-img-wrapper" data-dcnode-id="2058"><div class="fig-inline-img" data-dcnode-id="2059"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="2060" data-figure-caption="<div class=&quot;highwire-markup&quot;>Stages of vertical leadership development. Reproduced and adapted from Petrie (2014).17</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F2.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1361158549" title="Stages of vertical leadership development. Reproduced and adapted from Petrie (2014).17"><span class="hw-responsive-img" data-dcnode-id="2061"><img alt="Figure 2" class="highwire-fragment fragment-image lazyloaded" data-dcnode-id="2064" data-src="https://gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F2.medium.gif" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F2.medium.gif&amp;raw" width="440"><noscript data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Figure 2" src="https://gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F2.medium.gif" width="440" height="210"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="2045"><li class="download-fig first" data-dcnode-id="2055"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="2056" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F2.large.jpg%3Fdownload%3Dtrue" title="Download Figure 2"><span data-dcnode-id="2057" instrument_node="">Download figure</span></a></li><span data-dcnode-id="2054" instrument_node="">
</span><li class="new-tab" data-dcnode-id="2051"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="2052" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F2.large.jpg" target="_blank"><span data-dcnode-id="2053" instrument_node="">Open in new tab</span></a></li><span data-dcnode-id="2050" instrument_node="">
</span><li class="download-ppt last" data-dcnode-id="2047"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="2048" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/highwire/powerpoint/148843"><span data-dcnode-id="2049" instrument_node="">Download powerpoint</span></a></li><span data-dcnode-id="2046" instrument_node="">
</span></ul></div><div class="fig-caption" data-dcnode-id="2035"><span class="fig-label" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Figure 2</span></span><span data-dcnode-id="2041" instrument_node=""> </span><p class="first-child" data-dcnode-id="2037" id="p-21"><span data-dcnode-id="2040" instrument_node="">Stages of vertical leadership development. Reproduced and adapted from Petrie (2014).</span><a class="xref-bibr" data-dcnode-id="2038" href="#ref-17" id="xref-ref-17-2"><span data-dcnode-id="2039" instrument_node="">17</span></a></p><div class="sb-div caption-clear" data-dcnode-id="2036"></div></div></div></div><div class="section" data-dcnode-id="2017" id="sec-4"><h2 class="" data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Global health</span></h2><p data-dcnode-id="2023" id="p-22"><span data-dcnode-id="2030" instrument_node="">The overseas placement is integral to the programme’s design, partly as it contributes to the ‘heat experience’ described above and also in helping participants to understand another health system and develop their cultural intelligence.</span><a class="xref-bibr" data-dcnode-id="2028" href="#ref-18" id="xref-ref-18-1"><span data-dcnode-id="2029" instrument_node="">18</span></a><span data-dcnode-id="2027" instrument_node=""> Cultural intelligence is described as building on emotional intelligence.</span><a class="xref-bibr" data-dcnode-id="2025" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="2026" instrument_node="">19</span></a><span data-dcnode-id="2024" instrument_node=""> ‘A person with high cultural intelligence can somehow tease out of a person’s or group’s behaviour those features that would be true of all people and all groups, those peculiar to this person or this group, and those that are neither universal nor idiosyncratic’. This ability enables people to work more effectively with colleagues and patients from a range of cultural backgrounds.</span></p><p data-dcnode-id="2018" id="p-23"><span data-dcnode-id="2022" instrument_node="">Prior to the COVID-19 pandemic, the world was described as becoming smaller, with a greater interconnectedness due to ease and desire for travel as well as developments in technology allowing collaboration without the need for travel. Many healthcare practitioners are increasingly interested in global health and there are a growing number of learning opportunities, both experiential and academic. It is recognised that by so doing, healthcare workers from all over the world can benefit as they learn and work together. Boelen</span><a class="xref-bibr" data-dcnode-id="2020" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="2021" instrument_node="">20</span></a><span data-dcnode-id="2019" instrument_node=""> describes the need for healthcare professionals the world over to be ‘fit for practice’. This includes the ability to serve local communities while also being global citizens.</span></p></div><div class="section" data-dcnode-id="1994" id="sec-5"><h2 class="" data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Overseas perspective</span></h2><p data-dcnode-id="2013" id="p-24"><span data-dcnode-id="2014" instrument_node="">A 2017 evaluation of the sustainability of IGH project work outlines how fellows bring with them an ability to challenge and ‘hold up a mirror’ to the local health system. This was seen as a positive aspect of the NHS culture, along with a ‘can do’ attitude, a culture of being ‘change agents’ and an ‘evidence-based practice culture’ (unpublished, Monitoring and evaluation of system-strengthening project work, 2017). The reciprocity of the IGH programme is outlined here through the use of case studies from two sights, chosen to provide a balanced perspective, with Cambodia being one of the oldest partnerships and Myanmar one of the youngest.</span></p><div class="subsection" data-dcnode-id="2004" id="sec-6"><h3 data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Maddox Jolie-Pitt (MJP) Foundation, Cambodia written by Munichan Kung, CEO</span></h3><p data-dcnode-id="2009" id="p-25"><span data-dcnode-id="2010" instrument_node="">Poverty reduction among the most vulnerable communities in Samlaut District is a part of MJP Foundation’s core mission. MJP has been supporting the Ministry of Health’s delivery of basic healthcare in the district since 2006 to reduce child mortality and sickness, improve maternal health, and tackle preventable diseases.</span></p><p data-dcnode-id="2007" id="p-26"><span data-dcnode-id="2008" instrument_node="">The IGH partnership has provided MJP with several years of technical support in the delivery of sustainable healthcare, in the areas of capacity-building, systems-strengthening and the integration of health outcomes into the wider work of MJP. With support from the IGH fellows, we have provided medical training sessions for local healthcare staff, helping them to develop their skills and expertise to deliver a high standard of clinical care. The IGH fellows supported school-based and community-wide education programmes to increase awareness of the importance of hygiene—from hand washing to waste disposal. They also worked with MJP to mount an immediate response to tackle outbreaks of diseases such as malaria, dengue and COVID-19. In 2017, the IGH fellows conducted a health services assessment and formulated a thorough long-term ‘Health Strategy’ for the Samlaut district. The document established a clear roadmap and reference for the MJP health programme.</span></p><p data-dcnode-id="2005" id="p-27"><span data-dcnode-id="2006" instrument_node="">Participation in the programme has supported leadership development in the Cambodian team. Two of the health team successfully applied for competitive government grants to undertake advanced postgraduate education overseas and have returned to take up more senior roles in the healthcare system. The partnership has proved that a difference of cultures is not an obstacle to hard work for the improvement of lives.</span></p></div><div class="subsection" data-dcnode-id="1995" id="sec-7"><h3 data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Myanmar General Practice, written by Myint Oo, Vice-President, General Practitioners Society (GPS)</span></h3><p data-dcnode-id="2000" id="p-28"><span data-dcnode-id="2001" instrument_node="">Myanmar aims to achieve Universal Health Coverage goals by 2030. General practitioners (GP) in Myanmar receive little formal training in general practice. There is no Primary Care Trust or Clinical Commissioning Group, and health insurance is non-existent. GPS is the only professional body to provide Continuing Medical Education to these private GPs.</span></p><p data-dcnode-id="1998" id="p-29"><span data-dcnode-id="1999" instrument_node="">Ten IGH fellows have engaged with the GPS on projects ranging from the use of point of care testing, medicines management and identification of quality markers in GP clinics, to the development of a GPS website and a GP database. Fellows have made oral and poster presentations at national GPS and international conferences and have published articles in collaboration with GPS mentors. Feedback from GPS has been exceptional. One fellow, in conjunction with Royal College of General Practitioners (RCGP) representatives and GPS, met with the Union Minister for Health to champion a QI project. This project is currently being delivered virtually to over 100 local GPs from four townships. As a result of the IGH programme, the Myanmar GP improvement agenda has become one of the priorities of the Myanmar-UK Health Alliance programme.</span></p><p data-dcnode-id="1996" id="p-30"><span data-dcnode-id="1997" instrument_node="">Myanmar GPs have developed their knowledge of medicine and have furthered their careers as a consequence of the programme. Fellows helped prepare Myanmar GPs for the Membership of RCGP International examination resulting in six passing. The leadership and soft skills training created by the IGH fellows helped Myanmar GPs to strengthen their relationship with Freiburg University in Germany, resulting in a 4-year grant to launch ‘psychosomatic basic care training’ for GPs, nurses and psychiatrists being won.</span></p></div></div><div class="section" data-dcnode-id="1954" id="sec-8"><h2 class="" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">UK programme evaluation</span></h2><p data-dcnode-id="1990" id="p-31"><span data-dcnode-id="1991" instrument_node="">A qualitative evaluation was conducted to investigate the leadership development and long-term impact of the IGH programme on alumni. An online survey was designed with support from an experienced education researcher. It uses 10 open and 18 closed questions to explore the respondents’ thoughts and experiences. Piloted through its use in a previous programme evaluation, the survey was distributed using ‘Online Surveys’ and was sent to different groups of fellows at two different time points, July 2019 and September 2020. The ‘first survey’ refers to the survey sent to fellows who completed placements between 2008 and 2019. The ‘second survey’ refers to the survey sent to fellows who completed placements between 2015 and 2018. Fellows who did not respond initially were reminded. The first survey asked about demographics where the second did not.</span></p><p data-dcnode-id="1985" id="p-32"><span data-dcnode-id="1989" instrument_node="">The structured question responses were collated and the free-text responses were open coded and a thematic framework developed for each of the questions. For the purpose of this article, only relevant themes have been reported. The results have been described using the terms ‘a few’, relating to ideas described by less than 25% of respondents, ‘some’ relating to ideas described by 25%–50% of respondents, ‘many’ relating to ideas described by 50%–75% of respondents and ‘most’ relating to ideas described by over 75% of respondents. Some key quotes are summarised in </span><a class="xref-boxed-text" data-dcnode-id="1987" href="#boxed-text-2" id="xref-boxed-text-2-1"><span data-dcnode-id="1988" instrument_node="">box 1</span></a><span data-dcnode-id="1986" instrument_node="">.</span></p><div class="boxed-text" data-dcnode-id="1955" id="boxed-text-2"><span class="boxed-text-label" data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Box 1</span></span><span data-dcnode-id="1982" instrument_node=""> </span><h3 data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Quotes from returned fellows, taken from survey responses</span></h3><p data-dcnode-id="1977" id="p-33"><em data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">‘The unique blend of needing to be assertive when implementing a change as well as understanding both the complexity and the necessity of tailoring a change to the circumstances.’</span></em></p><p data-dcnode-id="1974" id="p-34"><em data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">‘I know the theory quite a lot better and more importantly…I have experienced it now…I think quality improvement is hard work. It requires a lot of energy and the development of specific personal characteristics.’</span></em></p><p data-dcnode-id="1971" id="p-35"><em data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">‘It’s really hard to articulate the ways in which it has changed my life and career; the time on the fellowship allowed me to think, to be creative, to try and be a leader in a way that I had never experienced previously in the NHS. As a doctor in training you often feel as if you are on a conveyor belt with frequent hoops to jump through but little attention paid to you if you succeed in doing so - and little time to truly reflect on where you are and where you're going. I appreciated the chance to be taught, to be listened to, to have responsibility for a greater level of service other than direct clinical service provision on the shop floor. I am now interested in getting in to policy, whether that be for the CCG or for a think tank alongside my clinical work. Personally, it has given me the confidence to take a step back every now and then to think about the bigger picture and how my career choices align with my values. Working in healthcare systems through IGH in seriously income deprived countries has reaffirmed my desire to serve and support the NHS.’</span></em></p><p data-dcnode-id="1968" id="p-36"><em data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">‘I wanted an opportunity to contribute to development in a structured and supported way. The IGH programme offered this opportunity with well-established links to a number of organisations. The leadership development aspect was also an important consideration and allowed the opportunity to develop skills which have been valuable in my continued career progression.’</span></em></p><p data-dcnode-id="1965" id="p-37"><em data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">‘I learnt the importance of truly listening to understand. I discovered…the importance of not jumping to conclusions, the complexity of systems and networking.’</span></em></p><p data-dcnode-id="1962" id="p-38"><em data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">‘I now have much more confidence in myself and my abilities. I feel better prepared to take on leadership roles and when things can be done better on the wards I am more likely to think “how can we improve this?” rather than just complain and put up with it!’</span></em></p><p data-dcnode-id="1959" id="p-39"><em data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">'In my new role since returning from placement (Education Supervisor) I am using coaching and mentoring skills that I learned during placement preparation and during placement. I am also using leadership skills that I used in placement. Quality Improvement is another area I use after I practiced in placement.’</span></em></p><p data-dcnode-id="1956" id="p-40"><em data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">‘As CCG clinical director I use leadership, quality improvement and co-production skills all the time which I began the development of during my IGH placements.’</span></em></p></div></div><div class="section results" data-dcnode-id="1909" id="sec-9"><h2 class="" data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Results</span></h2><div class="subsection" data-dcnode-id="1945" id="sec-10"><h3 data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">The Respondents</span></h3><p data-dcnode-id="1948" id="p-41"><span data-dcnode-id="1949" instrument_node="">The first survey had 98 (49%) responses and the second 47 (51%). The majority of fellows (70 (71%) and 35 (74%)) in both surveys were doctors, in a range of postgraduate training roles. The other respondents included nurses, occupational therapists, radiographers, dieticians, clinical psychologists, physiotherapists, podiatrists, speech and language therapists, pharmacists, project managers and midwives. The inclusivity of the programme is increased by its multidisciplinary approach.</span></p><p data-dcnode-id="1946" id="p-42"><span data-dcnode-id="1947" instrument_node="">Many respondents (in both surveys) described feeling motivated to apply to the programme to gain experience of working within a global healthcare setting. Many fellows in the first survey and some from the second were looking for personal or leadership development. Other reasons cited were to develop QI skills, as a career development step and wanting to gain life experience. Looking for personal or leadership development became more popular with time.</span></p></div><div class="subsection" data-dcnode-id="1929" id="sec-11"><h3 data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Demographics</span></h3><p data-dcnode-id="1935" id="p-43"><span data-dcnode-id="1942" instrument_node="">There were 15 (15%) male and 83 (85%) female respondents in the first survey. There is a preponderance of women compared with NHS Employer’s data,</span><a class="xref-bibr" data-dcnode-id="1940" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="1941" instrument_node="">21</span></a><span data-dcnode-id="1939" instrument_node=""> where 77% of NHS employees are reported to be women. NHS employer’s data also show fewer female NHS consultants than junior doctors and fewer senior female NHS clinical staff, excluding doctors and dentists, compared with junior.</span><a class="xref-bibr" data-dcnode-id="1937" href="#ref-21" id="xref-ref-21-2"><span data-dcnode-id="1938" instrument_node="">21</span></a><span data-dcnode-id="1936" instrument_node=""> There is a need for more women to be drawn into leadership roles, making inclusive leadership programmes such as this necessary.</span></p><p data-dcnode-id="1930" id="p-44"><span data-dcnode-id="1934" instrument_node="">Seventy-six (78%) identified as white, 17 (17%) of black and minority ethnic background, 3 (3%) mixed race and 2 (2%) preferred not to say, in the first survey. Workforce Race Equality Standard (WRES) data report fewer board members (8.4%), very senior managers (7.7%) and senior doctors are from black and minority ethnic background.</span><a class="xref-bibr" data-dcnode-id="1932" href="#ref-5" id="xref-ref-5-2"><span data-dcnode-id="1933" instrument_node="">5</span></a><span data-dcnode-id="1931" instrument_node=""> The higher representation of IGH fellows with a black and minority ethnic background adds further evidence to its inclusivity.</span></p></div><div class="subsection" data-dcnode-id="1922" id="sec-12"><h3 data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Career Path</span></h3><p data-dcnode-id="1925" id="p-45"><span data-dcnode-id="1926" instrument_node="">Respondents most commonly took part in the programme as part of a career break, 52 (53%) in the first survey and 14 (29%) in the second. Other times mentioned were taking part in the programme at the end of a contract or as an ‘Out of Programme Experience’. Fifty-one (52%) fellows from the first survey and 26 (55%) from the second felt that completing the fellowship had a substantial impact on their career path, with only one fellow from each survey reporting that there had been no impact. There is an increase from the first (37 (38%)) to the second survey (20 (43%)) in the percentage of respondents who felt that they were now doing a job that they would not have done prior to completing the fellowship.</span></p><p data-dcnode-id="1923" id="p-46"><span data-dcnode-id="1924" instrument_node="">Both surveys illustrate an increase in the number of fellows in a more senior clinical role, particularly when looking at medical training grades, after completion of the fellowship. This is partly explained by the natural career progression of trainee doctors. There are more consultants and GP partners after completion of the fellowship and several doctors took on additional roles such as Medical/ Clinical Directorships and Company Directorship. There is a greater variety of job roles with a number of fellows changing the focus of their career path, for example working for the Department of Health, NHS England/NHS Improvement and the Civil Service. These changes are greater in the first survey where we are looking at a longer-term follow-up, suggesting that the effect on career change is long lasting.</span></p></div><div class="subsection" data-dcnode-id="1915" id="sec-13"><h3 data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Leadership and quality improvement</span></h3><p data-dcnode-id="1918" id="p-47"><span data-dcnode-id="1919" instrument_node="">On completion of the programme many of the respondents from the first survey described feeling better informed about QI methodology and how it can make a difference. When asked about their current job roles, some fellows felt they had better knowledge and ability to take on QI projects and some reported improved confidence in being a leader. A few described an improved understanding of global health. This was the same in both surveys. Sixty-five per cent of the respondents in both surveys felt involvement in the programme had developed their leadership behaviours substantially. A few respondents from the first survey state using improved team member engagement, communication skills, a better understanding of themselves and improved project management skills in their current job role.</span></p><p data-dcnode-id="1916" id="p-48"><span data-dcnode-id="1917" instrument_node="">A number of fellows specifically mentioned that their learning has helped with managing COVID-19 challenges. A few fellows reported an overall increase in confidence (challenging the status quo, speaking up, put themselves forward for projects) which was the most commonly mentioned area. Other areas mentioned were a better understanding of what leadership behaviours are and becoming more self-aware/reflective.</span></p></div><div class="subsection" data-dcnode-id="1910" id="sec-14"><h3 data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">The Mentors</span></h3><p data-dcnode-id="1911" id="p-49"><span data-dcnode-id="1912" instrument_node="">Eighty-seven (89%) of respondents in the first and 45 (96%) in the second felt that having a mentor supported their leadership development.</span></p></div></div><div class="section" data-dcnode-id="1880" id="sec-15"><h2 class="" data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Program feedback</span></h2><p data-dcnode-id="1902" id="p-50"><span data-dcnode-id="1906" instrument_node="">Ninety-eight per cent of all fellows from both surveys reflected that they would recommend the fellowship to others. The most commonly reported areas that the IGH team do well were general support and guidance, the use of mentors, programme induction and the availability of postplacement opportunities (eg, becoming an IGH mentor). Things the programme could do to improve the programme are summarised in </span><a class="xref-table" data-dcnode-id="1904" href="#T1" id="xref-table-wrap-1-1"><span data-dcnode-id="1905" instrument_node="">table 1</span></a><span data-dcnode-id="1903" instrument_node="">.</span></p><div class="table pos-float" data-dcnode-id="1881" id="T1"><div class="table-inline table-callout-links" data-dcnode-id="1889"><div class="callout" data-dcnode-id="1890"><span data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">View this table:</span></span><ul class="callout-links" data-dcnode-id="1891"><li class="view-inline first" data-dcnode-id="1897"><a class="table-expand-inline highwireTablesMarkupProcessor-processed" data-dcnode-id="1898" data-hide-link-title="0" data-icon-position="" data-table-url="/highwire/markup/148845/expansion?postprocessors=highwire_tables%2Chighwire_reclass%2Chighwire_figures%2Chighwire_math%2Chighwire_inline_linked_media%2Chighwire_embed&amp;table-expand-inline=1" href="#%23"><span data-dcnode-id="1899" instrument_node="">View inline</span></a></li><span data-dcnode-id="1896" instrument_node="">
</span><li class="view-popup last" data-dcnode-id="1893"><a class="colorbox colorbox-load table-expand-popup init-colorbox-processed cboxElement" data-dcnode-id="1894" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/highwire/markup/148845/expansion%3Fwidth%3D1000%26height%3D500%26iframe%3Dtrue%26postprocessors%3Dhighwire_tables%252Chighwire_reclass%252Chighwire_figures%252Chighwire_math%252Chighwire_inline_linked_media%252Chighwire_embed" rel="gallery-fragment-tables"><span data-dcnode-id="1895" instrument_node="">View popup</span></a></li><span data-dcnode-id="1892" instrument_node="">
</span></ul></div></div><div class="table-caption" data-dcnode-id="1882"><span class="table-label" data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Table 1</span></span><span data-dcnode-id="1886" instrument_node=""> </span><p class="first-child" data-dcnode-id="1884" id="p-51"><span data-dcnode-id="1885" instrument_node="">Programme feedback—‘what one thing could the IGH team do differently to improve the program’, most commonly mentioned themes</span></p><div class="sb-div caption-clear" data-dcnode-id="1883"></div></div></div></div><div class="section discussion" data-dcnode-id="1817" id="sec-16"><h2 class="" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Discussion</span></h2><p data-dcnode-id="1870" id="p-59"><span data-dcnode-id="1877" instrument_node="">Most of this group of fellows felt that involvement in the IGH programme developed their leadership behaviours substantially, and they improved their knowledge of QI methodology and improved their confidence in being a leader. There is an increase in the number of senior roles taken up on completion of the programme, and the effect on career trajectory is long-lasting. As the programme has grown, looking for leadership or personal development as a motivation for applying to the programme has become more common, reflecting the increasing focus on leadership within training curricula and revalidation.</span><a class="xref-bibr" data-dcnode-id="1875" href="#ref-13" id="xref-ref-13-2"><span data-dcnode-id="1876" instrument_node="">13</span></a><span data-dcnode-id="1874" instrument_node=""> Previous programme evaluations have also shown a growth in leadership skills and behaviours.</span><a class="xref-bibr" data-dcnode-id="1872" href="#ref-22" id="xref-ref-22-1"><span data-dcnode-id="1873" instrument_node="">22 23</span></a><span data-dcnode-id="1871" instrument_node=""> A more recent evaluation provides evidence of both vertical and horizontal leadership development in IGH fellows and concludes that the programme creates more mature, adaptable and culturally aware leaders (accepted for publishing, ‘a qualitative analysis of vertical leadership development among NHS healthcare workers in low to middle income country settings’, January 2020).</span></p><p data-dcnode-id="1865" id="p-60"><span data-dcnode-id="1869" instrument_node="">The use of a UK programme evaluation alongside the overseas perspectives aims to create a balanced understanding of the programme’s outcomes, highlighting the IGH culture of reciprocity. Reciprocity is seen here to be created by a culture of mutual respect. The needs of both parties are different, and consideration of these individual and specific needs creates mutual benefit. As described in the overseas perspectives, the low-income or middle-income country seeks development in their local healthcare system, aiming to improve the health outcomes of their citizens and develop their healthcare workers. For the UK, the need is to create leaders that are able to work within the complex and ever-changing environment of the NHS. Spending time developing individual long-term relationships through long-standing organisational partnerships creates a cohesive team that spans country borders. A system of open communication and regular programme evaluation, such as that presented here, produces flexibility to the evolving needs of both parties. Central concepts for creating reciprocity within a global health programme, drawn from the IGH experience, are outlined in </span><a class="xref-fig" data-dcnode-id="1867" href="#F3" id="xref-fig-3-1"><span data-dcnode-id="1868" instrument_node="">figure 3</span></a><span data-dcnode-id="1866" instrument_node="">.</span></p><div class="fig pos-float odd" data-dcnode-id="1836" id="F3"><div class="highwire-figure" data-dcnode-id="1844"><div class="fig-inline-img-wrapper" data-dcnode-id="1858"><div class="fig-inline-img" data-dcnode-id="1859"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="1860" data-figure-caption="<div class=&quot;highwire-markup&quot;>Emergent themes to running a reciprocal global health programme.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F3.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1361158549" title="Emergent themes to running a reciprocal global health programme."><span class="hw-responsive-img" data-dcnode-id="1861"><img alt="Figure 3" class="highwire-fragment fragment-image lazyload" data-dcnode-id="1864" data-src="https://gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F3.medium.gif" height="440" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="403"><noscript data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Figure 3" src="https://gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F3.medium.gif" width="403" height="440"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="1845"><li class="download-fig first" data-dcnode-id="1855"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="1856" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F3.large.jpg%3Fdownload%3Dtrue" title="Download Figure 3"><span data-dcnode-id="1857" instrument_node="">Download figure</span></a></li><span data-dcnode-id="1854" instrument_node="">
</span><li class="new-tab" data-dcnode-id="1851"><a class="highwire-figure-link highwire-figure-link-newtab" data-dcnode-id="1852" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F3.large.jpg" target="_blank"><span data-dcnode-id="1853" instrument_node="">Open in new tab</span></a></li><span data-dcnode-id="1850" instrument_node="">
</span><li class="download-ppt last" data-dcnode-id="1847"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="1848" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/highwire/powerpoint/148842"><span data-dcnode-id="1849" instrument_node="">Download powerpoint</span></a></li><span data-dcnode-id="1846" instrument_node="">
</span></ul></div><div class="fig-caption" data-dcnode-id="1837"><span class="fig-label" data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Figure 3</span></span><span data-dcnode-id="1841" instrument_node=""> </span><p class="first-child" data-dcnode-id="1839" id="p-61"><span data-dcnode-id="1840" instrument_node="">Emergent themes to running a reciprocal global health programme.</span></p><div class="sb-div caption-clear" data-dcnode-id="1838"></div></div></div><p data-dcnode-id="1820" id="p-62"><span data-dcnode-id="1835" instrument_node="">The proportion of women taking part in the IGH programme is higher than the percentage of female NHS employees.</span><a class="xref-bibr" data-dcnode-id="1833" href="#ref-21" id="xref-ref-21-3"><span data-dcnode-id="1834" instrument_node="">21</span></a><span data-dcnode-id="1832" instrument_node=""> Women are known to be under-represented in more senior clinical NHS roles.</span><a class="xref-bibr" data-dcnode-id="1830" href="#ref-4" id="xref-ref-4-2"><span data-dcnode-id="1831" instrument_node="">4</span></a><span data-dcnode-id="1829" instrument_node=""> The IGH programme also has a 20% representation of black and minority ethnic backgrounds; these groups are known to be under-represented in NHS leadership positions.</span><a class="xref-bibr" data-dcnode-id="1827" href="#ref-5" id="xref-ref-5-3"><span data-dcnode-id="1828" instrument_node="">5</span></a><span data-dcnode-id="1826" instrument_node=""> The IGH programme is therefore developing both women and black and minority ethnic leadership behaviours and capacity within the NHS. The programme is also attracting a multidisciplinary group of NHS workers, although the majority are still junior doctors. Evidence is building of the inclusive nature of the programme, although more work is needed to understand exactly how and why. The proportion of other professions who take part in the programme must be increased. This particularly relates to nurses, who not only make up 50% of all professionally qualified clinical staff</span><a class="xref-bibr" data-dcnode-id="1824" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="1825" instrument_node="">24</span></a><span data-dcnode-id="1823" instrument_node=""> but also report their most important factor when looking for a new role as ‘opportunities for development’.</span><a class="xref-bibr" data-dcnode-id="1821" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="1822" instrument_node="">25</span></a></p><p data-dcnode-id="1818" id="p-63"><span data-dcnode-id="1819" instrument_node="">The IGH programme has faced many challenges over the years. Some have successfully been overcome such as the maintenance of long-standing health partnerships and recruitment to mentor and PLL roles through a growing network of IGH alumni, while others remain a problem. Attracting a more multidisciplinary group of fellows to the programme remains an issue likely due to the difficulty faced in being granted leave from NHS roles, as does ensuring timely completion of fellow reports and achieving sustainability in health service improvements in the low-income or middle-income countries.</span></p></div><div class="section" data-dcnode-id="1812" id="sec-17"><h2 class="" data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Recommendations</span></h2><p data-dcnode-id="1813" id="p-64"><span data-dcnode-id="1814" instrument_node="">While the in-country case studies have shed light on the impact of the programme on the host institutions, more work is needed to assess improvements in local healthcare systems and also development of the in-country healthcare workers. A semistructured interview or survey looking at local benefits is suggested. More work is needed to understand how and why the IGH programme is attracting women and black and minority ethnic groups into leadership, if this translates to their taking up NHS leadership roles and if this ultimately leads to improved NHS outcomes.</span></p></div><div class="section conclusions" data-dcnode-id="1771" id="sec-18"><h2 class="" data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Conclusion</span></h2><p data-dcnode-id="1805" id="p-65"><span data-dcnode-id="1809" instrument_node="">The IGH programme has been running for over 12 years, from its inception the goal has been to develop leadership skills in NHS employees, while contributing to the development of healthcare systems in low-income and middle-income countries. As time has progressed the organisation and delivery of this programme has evolved, building on the feedback and experience of previous years. The result is a truly unique leadership development programme that attracts diversity in both gender and ethnicity into leadership within the NHS. The IGH programme builds long-term health partnerships with its overseas team. Here, reflective accounts from overseas partners have been used to outline the impact of the programme on partnership sites. Not only have healthcare systems strengthened but the local team also have developed themselves and their careers(</span><a class="xref-fig" data-dcnode-id="1807" href="#F4" id="xref-fig-4-1"><span data-dcnode-id="1808" instrument_node="">figure 4</span></a><span data-dcnode-id="1806" instrument_node="">)</span></p><div class="fig pos-float odd" data-dcnode-id="1776" id="F4"><div class="highwire-figure" data-dcnode-id="1784"><div class="fig-inline-img-wrapper" data-dcnode-id="1798"><div class="fig-inline-img" data-dcnode-id="1799"><a class="highwire-fragment fragment-images colorbox-load highwireFiguresMarkupProcessor-processed cboxElement" data-dcnode-id="1800" data-figure-caption="<div class=&quot;highwire-markup&quot;>Summary box of key messages. IGH, Improving Global Health; NHS, National Health Service.</div>" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F4.large.jpg%3Fwidth%3D800%26height%3D600%26carousel%3D1" rel="gallery-fragment-images-1361158549" title="Summary box of key messages. IGH, Improving Global Health; NHS, National Health Service."><span class="hw-responsive-img" data-dcnode-id="1801"><img alt="Figure 4" class="highwire-fragment fragment-image lazyload" data-dcnode-id="1804" data-src="https://gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F4.medium.gif" height="287" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="440"><noscript data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">&lt;img class="highwire-fragment fragment-image" alt="Figure 4" src="https://gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F4.medium.gif" width="440" height="287"/&gt;</span></noscript></span></a></div></div><ul class="highwire-figure-links inline" data-dcnode-id="1785"><li class="download-fig first" data-dcnode-id="1795"><a class="highwire-figure-link highwire-figure-link-download" data-dcnode-id="1796" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/content/bmjgh/6/Suppl_6/e004533/F4.large.jpg%3Fdownload%3Dtrue" title="Download Figure 4"><span data-dcnode-id="1797" instrument_node="">Download figure</span></a></li><span data-dcnode-id="1794" instrument_node="">

</span><li class="download-ppt last" data-dcnode-id="1787"><a class="highwire-figure-link highwire-figure-link-ppt" data-dcnode-id="1788" data-hide-link-title="0" data-icon-position="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gh.bmj.com/highwire/powerpoint/148844"><span data-dcnode-id="1789" instrument_node="">Download powerpoint</span></a></li><span data-dcnode-id="1786" instrument_node="">
</span></ul></div><div class="fig-caption" data-dcnode-id="1777"><span class="fig-label" data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Figure 4</span></span><span data-dcnode-id="1781" instrument_node=""> </span><p class="first-child" data-dcnode-id="1779" id="p-66"><span data-dcnode-id="1780" instrument_node="">Summary box of key messages. IGH, Improving Global Health; NHS, National Health Service.</span></p><div class="sb-div caption-clear" data-dcnode-id="1778"></div></div></div><p data-dcnode-id="1774" id="p-67"><span data-dcnode-id="1775" instrument_node="">This article outlines how working in partnership with low-income and middle-income healthcare systems, to share knowledge and improve health is an effective strategy for working within the global health setting. The experiences of the IGH programme demonstrate that it is possible to design global health programmes that are mutually beneficial, an approach to this has been outlined here.</span></p><p data-dcnode-id="1772" id="p-68"><span data-dcnode-id="1773" instrument_node="">The two words that are central to the IGH programme are, inclusivity and reciprocity, these concepts are key to its aim of supporting sustainable change while stimulating leadership development in its fellows. It is hoped that the data and feedback outlined here will provide a valuable insight to other programmes who aim to address similar problems.</span></p></div><div class="section data-availability" data-dcnode-id="1766" id="sec-19"><h2 class="" data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Data availability statement</span></h2><p data-dcnode-id="1767" id="p-76"><span data-dcnode-id="1768" instrument_node="">All data relevant to the study are included in the article.</span></p></div><div class="section ethics-statement" data-dcnode-id="1758" id="sec-20"><h2 class="" data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Ethics statements</span></h2><div class="section" da
