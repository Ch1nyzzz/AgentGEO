</span><div class="preference__checks" data-dcnode-id="2842"><span data-dcnode-id="2848" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-answer field--type-text-long field--label-hidden field__item" data-dcnode-id="2844"><p data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">On-site covid-19 testing will be available at the Convention Centre on Thursday April 21st and Friday, April 22nd. You will be able to drop in for this test from 8am to 2pm on both days and the cost will be €25 for Antigen and €65 for PCR. You can choose depending on what you need to travel home or to your next destination. The PCR test result &amp; certificate should be returned to you within 6 hours and the Antigen test within 2 hours. You must have your passport number.</span></p><span data-dcnode-id="2845" instrument_node="">

</span><div class="clearfix text-formatted field field--name-field-answer field--type-text-long field--label-hidden field__item" data-dcnode-id="2810"><p data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">After Global, SITE Global will report your attendance directly to Events Industry Council.&nbsp; EIC will email you directly prompting you to log into your EIC account and claim the total number of hours you spent in CMP-approved sessions during Global.&nbsp; Global is eligible for up to 15.50 hours of CMP continuing education credits for education offered on days three and four of the conference (April 21 and 22). EIC requires SITE to upload each day of the conference separate, so remember to claim your hours of each day of the event. Because SITE is a CMP Preferred Provider, you are not required to upload any additional documentation.</span></p><span data-dcnode-id="2811" instrument_node="">

</span></h3><span data-dcnode-id="2308" instrument_node="">
</span><div class="o-accordion--expand" data-dcnode-id="2301"><span data-dcnode-id="2307" instrument_node="">

</span><div class="preference__checks" data-dcnode-id="2156"><span data-dcnode-id="2295" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-answer field--type-text-long field--label-hidden field__item" data-dcnode-id="2158"><p data-dcnode-id="2284"><span data-dcnode-id="2285"><span data-dcnode-id="2286"><span data-dcnode-id="2287" lang="EN-US" xml:lang="EN-US"><span data-dcnode-id="2288"><span data-dcnode-id="2294" instrument_node="">You must agree to </span><span data-dcnode-id="2289"><span data-dcnode-id="2290"><span data-dcnode-id="2293" instrument_node="">adhere to the restrictions and protocols put in place by&nbsp;Ireland, and can review the restrictions and required forms for entry&nbsp;</span><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.ie/en/campaigns/75d92-covid-19-travel-advice/" rel="nofollow"><span data-dcnode-id="2292" instrument_node="">here.</span></a></span></span></span></span></span></span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2282" instrument_node="">SITE’s official policy for 2022, as voted by our International Board of Directors, is that all attendees at SITE events should, in the first instance, be</span><strong data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node=""> fully vaccinated</span></strong><span data-dcnode-id="2279" instrument_node=""> and then follow whatever protocols prevail in the host destination.</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2267"><span data-dcnode-id="2268"><span data-dcnode-id="2273"><span data-dcnode-id="2274"><span data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">We will accept </span></span></span></span><span data-dcnode-id="2269" lang="EN-US" xml:lang="EN-US"><span data-dcnode-id="2270"><span data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">WHO-approved vaccines, plus&nbsp;vaccines&nbsp;authorized or approved by the national health authority of the country where it was administered. The full list&nbsp;of accepted&nbsp;vaccines&nbsp;is:</span></span></span></span></span></span></p><span data-dcnode-id="2265" instrument_node="">
</span><ul data-dcnode-id="2183"><span data-dcnode-id="2264" instrument_node="">
</span><li data-dcnode-id="2257"><span data-dcnode-id="2258"><span data-dcnode-id="2259"><span data-dcnode-id="2260"><span data-dcnode-id="2261"><span data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">CanSino COVID-19&nbsp;vaccine</span></span></span></span></span></span></li><span data-dcnode-id="2256" instrument_node="">
</span><li data-dcnode-id="2249"><span data-dcnode-id="2250"><span data-dcnode-id="2251"><span data-dcnode-id="2252"><span data-dcnode-id="2253"><span data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">CoviVac COVID-19&nbsp;vaccine</span></span></span></span></span></span></li><span data-dcnode-id="2248" instrument_node="">
</span><li data-dcnode-id="2241"><span data-dcnode-id="2242"><span data-dcnode-id="2243"><span data-dcnode-id="2244"><span data-dcnode-id="2245"><span data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Johnson&nbsp;&amp;&nbsp;Johnson COVID-19&nbsp;vaccine&nbsp;</span></span></span></span></span></span></li><span data-dcnode-id="2240" instrument_node="">
</span><li data-dcnode-id="2233"><span data-dcnode-id="2234"><span data-dcnode-id="2235"><span data-dcnode-id="2236"><span data-dcnode-id="2237"><span data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Moderna (mRNA-1273) COVID-19&nbsp;vaccine</span></span></span></span></span></span></li><span data-dcnode-id="2232" instrument_node="">

</span><li data-dcnode-id="2217"><span data-dcnode-id="2218"><span data-dcnode-id="2219"><span data-dcnode-id="2220"><span data-dcnode-id="2221"><span data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Oxford/AstraZeneca COVID-19&nbsp;vaccine&nbsp;</span></span></span></span></span></span></li><span data-dcnode-id="2216" instrument_node="">
</span><li data-dcnode-id="2209"><span data-dcnode-id="2210"><span data-dcnode-id="2211"><span data-dcnode-id="2212"><span data-dcnode-id="2213"><span data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Pfizer-BioNTech COVID-19&nbsp;vaccine&nbsp;</span></span></span></span></span></span></li><span data-dcnode-id="2208" instrument_node="">
</span><li data-dcnode-id="2201"><span data-dcnode-id="2202"><span data-dcnode-id="2203"><span data-dcnode-id="2204"><span data-dcnode-id="2205"><span data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Sinopharm COVID-19&nbsp;vaccine&nbsp;</span></span></span></span></span></span></li><span data-dcnode-id="2200" instrument_node="">
</span><li data-dcnode-id="2193"><span data-dcnode-id="2194"><span data-dcnode-id="2195"><span data-dcnode-id="2196"><span data-dcnode-id="2197"><span data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Sinovac COVID-19&nbsp;vaccine&nbsp;</span></span></span></span></span></span></li><span data-dcnode-id="2192" instrument_node="">
</span><li data-dcnode-id="2185"><span data-dcnode-id="2186"><span data-dcnode-id="2187"><span data-dcnode-id="2188"><span data-dcnode-id="2189"><span data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Sputnik&nbsp;V COVID-19&nbsp;vaccine</span></span></span></span></span></span></li><span data-dcnode-id="2184" instrument_node="">
</span></ul><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2177"><span data-dcnode-id="2178"><span data-dcnode-id="2179"><span data-dcnode-id="2180" lang="EN-US" xml:lang="EN-US"><span data-dcnode-id="2181" instrument_node="">We will also accept a mix of two of the above vaccines (e.g.&nbsp;one dose of Moderna and one dose of Pfizer&nbsp;vaccines).&nbsp;</span></span></span></span></span></p><span data-dcnode-id="2175" instrument_node="">

</span><p data-dcnode-id="2160"><span data-dcnode-id="2161"><span data-dcnode-id="2162"><strong data-dcnode-id="2163"><span data-dcnode-id="2164"><span data-dcnode-id="2165"><span data-dcnode-id="2168" instrument_node="">We recommend you download this handy App for Travel: </span><a data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myverifly.com/%23/" rel="nofollow" title="https://www.myverifly.com/#/"><span data-dcnode-id="2167" instrument_node="">https://www.myverifly.com/#/</span></a></span></span></strong></span></span></p><span data-dcnode-id="2159" instrument_node="">

</span><p data-dcnode-id="1910"><span data-dcnode-id="1911"><span data-dcnode-id="1912"><span data-dcnode-id="1913"><span data-dcnode-id="1919"><span data-dcnode-id="1923" instrument_node="">If you prefer to use a Taxi App we suggest downloading the </span><strong data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">FREENOW taxi app</span></strong><span data-dcnode-id="1920" instrument_node=""> from the App Store or Google Play store. Free Now is </span></span><span data-dcnode-id="1914"><span data-dcnode-id="1915"><span data-dcnode-id="1916"><span data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">a licensed ride-hailing app for taxis in Ireland and you can book and pay-in app.</span></span></span></span></span></span></span></span></p><span data-dcnode-id="1909" instrument_node="">

</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="1564"><p data-dcnode-id="1596"><span data-dcnode-id="1597"><span data-dcnode-id="1598"><span data-dcnode-id="1599"><span data-dcnode-id="1600"><span data-dcnode-id="1601"><span data-dcnode-id="1608" instrument_node="">On </span><strong data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Tuesday 19 April</span></strong><span data-dcnode-id="1605" instrument_node=""> from 12:45 to 17:30 and again on </span><strong data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Wednesday 20 April</span></strong><span data-dcnode-id="1602" instrument_node=""> from 08:15 – 13:00, our destination hosts have created 3 wonderful “discover Dublin” opportunities for us.</span></span></span></span></span></span></p><span data-dcnode-id="1595" instrument_node="">
