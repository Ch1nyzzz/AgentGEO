</span></span><span class="float-right color-e48100" data-dcnode-id="4059"><b data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">$37.50</span></b></span></div></div><span class="glyphicon glyphicon-menu-up float-right color-e48100" data-dcnode-id="4056" id="SpecialOfferUp1"></span></div></div></div></div></div><div data-dcnode-id="4050" id="add-to-cart-collapse"></div></div><div class="col-xs-12 col-sm-8 col-sm-pull-4 col-md-9 col-md-pull-3" data-dcnode-id="126"><h2 class="margin-top-sm" data-dcnode-id="4047" id="abstract"><span data-dcnode-id="4048" instrument_node="">Abstract</span></h2><span data-dcnode-id="4046" instrument_node="">How leaders and management culture in higher education thinks about particular events as normal, and expected does not always fit with the experiences of college instructors, particularly the overworked, underpaid exploited contingent instructors teaching in higher education. Whenever people with money have power over people with less money, you have the potential for exploitation. As adult educators and administrators in this context, might there be better ways we can improve or change the way we treat our contingent teaching faculty by developing a better understanding of the issues facing nontenure track, adjunct, or part-time faculty? What is the strategic role of alternative approaches toward the treatment for these instructors? In this chapter, the authors discuss the need to use alternative frameworks as administrators make decisions to cut costs while maintaining education programs. This chapter discusses the motivation behind their exploitation, effect on student success, court cases, and realities for adjuncts, will be explored in this chapter as well as recommendations. </span><div class="xml-reader-bookstore" data-dcnode-id="3991" id="sample"><div class="preview-header" data-dcnode-id="4044" id="chapter-preview"><span data-dcnode-id="4045" instrument_node="">Chapter Preview</span></div><span class="tophash" data-dcnode-id="4041"><a class="navlinkc" data-dcnode-id="4042" href="#"><span data-dcnode-id="4043" instrument_node="">Top</span></a></span><h2 data-dcnode-id="4039" id="introduction"><span data-dcnode-id="4040" instrument_node="">Introduction</span></h2><div class="headerdivider" data-dcnode-id="4038"></div><p data-dcnode-id="4033"><span data-dcnode-id="4037" instrument_node="">Not only are high student debt, student loan default, excessive executive salaries and high remedial rates causing a crisis in higher education; the massive faculty layoffs and the widespread incorporation of hiring part-time faculty are causing additional fractures that are reshaping the infrastructure of higher education (Fulton, 2000; Nutting, 2003). If there is one word to describe the hiring trends of the 21</span><sup data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">st</span></sup><span data-dcnode-id="4034" instrument_node=""> century workforce it is the word, adjunct.</span></p><p data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">The term adjunct is Latin for accessory. It refers to the teachers and instructors whose compensation and/or benefits, even at a prorated proportion do not equal those of full-time contractual or tenure-track faculty. Temporary, part-timers, contingent workers, or adjuncts are the words to describe trends in today’s workforce. This is a growing movement, from retail to banking, to K-12, to higher education hiring practices. Employers across the nation are exploiting temporary workers in order to avoid paying health benefits, cost of living and mandatory pay raises, and other benefits (Cashwell, 2009; Underwood, 2003).</span></p><p data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">This chapter explores some of the key issues regarding the growing use and exploitation of adjuncts by institutions of higher education and the challenges adjuncts face. The motivation behind their exploitation, effect on student success, court cases, and realities for adjuncts; what can strategic leadership and management do to stop this unjust practice will be explored in this chapter as well.</span></p><div data-dcnode-id="3992"><h3 data-dcnode-id="4027" id="exploitation-of-adjuncts:-a-human-rights-issue"><span data-dcnode-id="4028" instrument_node="">Exploitation of Adjuncts: A Human Rights Issue</span></h3><p data-dcnode-id="4022"><span data-dcnode-id="4026" instrument_node="">Part-time faculties who work in higher education have recently received considerable attention by the courts and the media. Due to lack of fair salary pay, compensation and benefits, lack of unionization, and poor general working conditions, adjuncts are finding it difficult to make a living wage (Berry, 2005; Fulton, 2000; Underwood, 2003). Many community colleges and universities know this, but because it is a cost savings to their budgets they employ more adjuncts (part-time contingent faculty) than full time faculty. This hiring practice has crossed over to become a key 21</span><sup data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">st</span></sup><span data-dcnode-id="4023" instrument_node=""> century civic rights violation, which is ironic because while institutions of higher education charge the faculty to impart civic engagement and democratic ethos to students, their administrations deny adjuncts the ability to be fully engaged and active participants in the campus community (AACU, 2014) while at the same time adjuncts are denied benefits and a decent living wage (Chronicle of Higher Education 2014; Institute for Policy Studies, 2014).</span></p><p data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">Having a high ratio of adjuncts affects student success. Research shows there are correlations between decreases in student persistence, coupled with negative student outcomes with the increase of exposure to part-time faculty (Eagan &amp; Jaeger, 2009; Maynard &amp; Joseph, 2008; Smith, 2010). Universities and colleges especially use contingent faculty in lower-level and introductory courses, a role less valued than upper course levels or engaging in research (Kezar &amp; Sam, 2010b; Gappa &amp; Leslie, 1993). College administration need to employ more inclusive techniques, it is questionable whether authentic learning can take place in an environment that does not foster inclusion, justice, and collaboratively oriented action (AACU, 2014; Nutting 2003; Smith 2010). Adjuncts respond positively to being cared for by being paid a living wage, consequently this positivity will in turn trickle down and be grasped by the students.</span></p><p data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">No one in higher education can doubt that issues surrounding the over-use of adjunct faculties at American colleges and universities have entered the social injustice language. The exploitation of adjuncts is becoming a human rights and social justice issue (Underwood, 2003). In addition, it is a violation of the Code of Ethics, as noted by the Board of Directors for American Association of Community Colleges-AACC.</span></p><p data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">According to the Code, the college or university chief executive officer and other members of the campus organization should strive to promote the following core values as noted from the AACC—both internally and externally:</span></p><ul class="xmlReaderUl" data-dcnode-id="3995"><li data-dcnode-id="4011"><i data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">1. </span></i><p data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">Trust and respect for all individuals.</span></p></li><li data-dcnode-id="4006"><i data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">2. </span></i><p data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">Honesty in all actions.</span></p></li><li data-dcnode-id="4001"><i data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">3. </span></i><p data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">Just and fair treatment of all people.</span></p></li><li data-dcnode-id="3996"><i data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">4. </span></i><p data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">Integrity in all actions (AACC, 2012).</span></p></li></ul><p data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">Clearly, knowingly exploiting adjunct instructors is a violation of this Code.</span></p></div></div><h2 data-dcnode-id="3989" id="key-terms"><span data-dcnode-id="3990" instrument_node="">Key Terms in this Chapter</span></h2><p data-dcnode-id="3985"><a data-dcnode-id="3987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.igi-global.com/dictionary/human-rights/35780"><span data-dcnode-id="3988" instrument_node="">Human Rights</span></a><span data-dcnode-id="3986" instrument_node="">: Human rights in the workplace refer to a work environment that is free from victimization. This can include intimidation, bullying by coworkers, being denied a promotion, being moved to a position to lower responsibility, being refused further contract work or dismissal from employment (hrcouncil.ca, 2016).</span></p><p data-dcnode-id="3981"><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.igi-global.com/dictionary/social-injustice/57987"><span data-dcnode-id="3984" instrument_node="">Social Injustice</span></a><span data-dcnode-id="3982" instrument_node="">: The quality or fact of being unjust; inequity regarding fair play especially in social and economic treatment of workers. A situation in which the rights of a person or a group of people are ignored (Merriam-webster.com 2016).</span></p><p data-dcnode-id="3977"><a data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.igi-global.com/dictionary/contingent-workers/57986"><span data-dcnode-id="3980" instrument_node="">Contingent Workers</span></a><span data-dcnode-id="3978" instrument_node="">: Part-time instructors, or adjunct instructors in higher education that are often seen as “temporary” workers, but who would like to be full-time instructors ( Cashwell, 2009 ; Underwood, 2003 ).</span></p><p data-dcnode-id="3973"><a data-dcnode-id="3975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.igi-global.com/dictionary/adjunct-exploitation/57985"><span data-dcnode-id="3976" instrument_node="">Adjunct Exploitation</span></a><span data-dcnode-id="3974" instrument_node="">: The word, Adjunct is Latin for accessory. It refers to the teachers and instructors whether in secondary or postsecondary education, whose compensation and/or benefits, even at a prorated proportion do not equal those of full-time contractual or tenure-track faculty ( Underwood, 2003 ).</span></p><p data-dcnode-id="3969"><a data-dcnode-id="3971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.igi-global.com/dictionary/tenure-track/57988"><span data-dcnode-id="3972" instrument_node="">Tenure Track</span></a><span data-dcnode-id="3970" instrument_node="">: A career appointment for a college or university professor leading to stable employment that lasts until retirement, except for dismissal for just cause (Merriam-webster.com 2016).</span></p><div data-dcnode-id="127" id="table-of-contents"><h2 data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Complete Chapter List</span></h2><div class="search-contents" data-dcnode-id="3956"><span class="text" data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">
