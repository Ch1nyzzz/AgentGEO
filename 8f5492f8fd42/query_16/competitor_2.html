</span><p data-dcnode-id="2103"><strong data-dcnode-id="2104"><span data-dcnode-id="2108" instrument_node="">Sign up now for our </span><a data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.diversityresources.com/diversity-newsletter"><span data-dcnode-id="2107" instrument_node="">diversity newsletter</span></a><span data-dcnode-id="2105" instrument_node=""> – get monthly diversity tips, tools and insights</span></strong></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">People today are more likely than ever before to work with people from wildly different cultures – even if they never leave headquarters.</span></p><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Take for example Jean Moncrieff, a marketing consultant. He’s based in Canada, his business partner is in South America, and their team is distributed across the United States, Eastern Europe, and Africa.</span></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2095" instrument_node="">And while most organizations have excellent global infrastructure, </span><strong data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">few organizations do the training necessary to prepare team members to interact with other cultures</span></strong><span data-dcnode-id="2092" instrument_node="">, writes Erin Meyer, affiliate professor of organizational behavior at INSEAD.</span></p><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2089" instrument_node="">Dr. Meyer is author of the new book </span><em data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">The Culture Map: Breaking through the Invisible Boundaries of Global Business.</span></em><br data-dcnode-id="2086"><span data-dcnode-id="2085" instrument_node="">
For your people to be effective in today’s global economy, it’s essential they receive </span><strong data-dcnode-id="2082"><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.diversityresources.com/vid-multiculturalteam/"><span data-dcnode-id="2084" instrument_node="">training on working with multicultural teams</span></a></strong><span data-dcnode-id="2081" instrument_node="">.</span></p><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Here are some of the essential training points for leading multicultural teams.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2072"><strong data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Individual versus group:</span></strong><span data-dcnode-id="2073" instrument_node=""> some cultures are focused on the individual, while others prize the group. Do they compete – or collaborate?</span></p><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">In the United States for example, people generally focus on the individual. Each person has responsibilities, and it’s up to him or her to get the job done. Employees are also more short-term, and companies employees are less loyal to each other – people move around from job to job.</span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2067" instrument_node="">But in most other parts of the world, people are more group oriented. These cultures include Asia, Latin America, and the Middle East. In these regions, the nation, organization, and family come first. There is </span><strong data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">more emphasis on team collaboration, and groups share praise – or blame</span></strong><span data-dcnode-id="2064" instrument_node="">.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2061" instrument_node="">In individualistic societies, people are more likely to be singled out for credit or blame. But in group oriented cultures, people are </span><strong data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">less comfortable with a spotlight on the individual</span></strong><span data-dcnode-id="2058" instrument_node="">. So when working with people from group-oriented cultures, it’s important to give praise or blame and private.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2055" instrument_node="">These cultural factors dramatically affect teams, whether they’re in person, or even if </span><strong data-dcnode-id="2051"><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.diversityresources.com/product/vid-multiculturalteam/"><span data-dcnode-id="2054" instrument_node="">different cultures are working together on virtual teams</span></a><span data-dcnode-id="2052" instrument_node="">.</span></strong></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2045"><strong data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Authoritarian or egalitarian</span></strong><span data-dcnode-id="2046" instrument_node="">: work is also affected by whether team members come from cultures that are authoritarian or egalitarian. In egalitarian cultures, leaders and team members are more likely to see each other as equals. For example, a founding credo of the United States “All Men Are Created Equal.” In these egalitarian cultures, authority and decision-making are often shared by many.</span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2039"><span data-dcnode-id="2043" instrument_node="">But in authoritarian cultures, people are more accustomed to strong, consolidated leadership from the top. In Asia, Latin America, and the Middle East, power and decision-making is concentrated among those the top. People from these cultures are more likely to focus on hierarchy and class. There is </span><strong data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">greater emphasis on and respect for seniority and hierarchy</span></strong><span data-dcnode-id="2040" instrument_node="">.</span></p><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2037" instrument_node="">In egalitarian societies, leaders are often seen as equals. They’re highly accessible, and are addressed by their first names. But authoritarian societies, they are more distant and wield absolute power. </span><strong data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Team members from Asia, Latin America or the Middle East are much less likly to question their leader – even if the leader is wrong</span></strong><span data-dcnode-id="2034" instrument_node="">. In this regard, egalitarian team members often see their role as pleasing the boss, even if withholding are delaying bad news.</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2031" instrument_node="">Conclusion: today’s work environment routinely involves team members from a variety of cultures. These cultures have fundamentally different ways of seeing the world, and interacting with others. For your teams to be effective, it’s essential that they have proper training. For more help, check our </span><strong data-dcnode-id="2028"><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.diversityresources.com/browse-topics/team-diversity/"><span data-dcnode-id="2030" instrument_node="">resources for training culturally diverse teams</span></a></strong><span data-dcnode-id="2027" instrument_node="">.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2022" instrument_node="">
