</span><p class="best-articles__article-deck" data-dcnode-id="1777"></p><span data-dcnode-id="1776" instrument_node="">
</span></li><span data-dcnode-id="1774" instrument_node="">
</span><li class="best-articles__article" data-dcnode-id="1767"><span data-dcnode-id="1773" instrument_node="">
</span><a class="best-articles__article-link" data-dcnode-id="1771" data-track-click="Sidebar Menu" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sloanreview.mit.edu/issue/2022-spring/"><span data-dcnode-id="1772" instrument_node="">Spring 2022 Issue</span></a><span data-dcnode-id="1770" instrument_node="">
</span><p class="best-articles__article-deck" data-dcnode-id="1769"></p><span data-dcnode-id="1768" instrument_node="">
</span></li><span data-dcnode-id="1766" instrument_node="">

</span><aside class="article-ad ad-300 ad-300x250 ad-desktop" data-dcnode-id="1754"><span data-dcnode-id="1761" instrument_node="">
</span><div data-dcnode-id="1756" id="div-gpt-ad-1582853918972-0" style="height:250px; width:300px;"><span data-dcnode-id="1760" instrument_node="">
</span><span data-dcnode-id="1757" instrument_node="">
</span></div><span data-dcnode-id="1755" instrument_node="">
</span></aside><aside class="article-ad ad-300 ad-300x250 ad-mobile" data-dcnode-id="1746"><span data-dcnode-id="1753" instrument_node="">
</span><div data-dcnode-id="1748" id="div-gpt-ad-1582855116148-0" style="height:250px; width:300px;"><span data-dcnode-id="1752" instrument_node="">
</span><span data-dcnode-id="1749" instrument_node="">
</span></div><span data-dcnode-id="1747" instrument_node="">
</span></aside><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Teams are the typical building blocks of an organization: They provide companies with the means to combine the various skills, talents and perspectives of a group of individuals to achieve corporate goals. In the past, managers used to colocate team members because of the high levels of interdependencies that are inherent in group work. Recently, though, more and more companies are beginning to organize projects over distance, with teams increasingly consisting of people who are based in dispersed geographical locations, come from different cultural backgrounds, speak different languages and were raised in different countries with different value systems.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1741" instrument_node="">Over the past 10 years, various studies have investigated the differences in performance of colocated and dispersed teams, quietly assuming that members of the latter never meet in person and members of the former work together in the same office throughout a project. But dispersion is not only a matter of degree; it is also a matter of kind. Most teams are dispersed on some level. They can be spatially separated (from “across the hall” to “scattered worldwide”), temporally separated (spanning different time zones), configurationally uneven (for example, five members in one location and two in another) and culturally diverse. And as past research has repeatedly shown, even the smallest degrees of dispersion, such as working on different floors in the same building, can greatly affect the quality of collaboration.</span><a class="reflink" data-dcnode-id="1739" href="#ref1" id="ref_1"><span data-dcnode-id="1740" instrument_node="">1</span></a><span data-dcnode-id="1738" instrument_node=""> In our own study, we have investigated the performance of 80 software development teams with varying levels of dispersion, including those with members in different cities, countries or continents. Such geographically distributed teams have commonly been referred to as “virtual” teams,</span><a class="reflink" data-dcnode-id="1736" href="#ref2" id="ref_2"><span data-dcnode-id="1737" instrument_node="">2</span></a><span data-dcnode-id="1735" instrument_node=""> but that label is something of a misnomer, because these groups are very real with respect to the work they can accomplish. We found that virtual teams offer tremendous opportunities despite their greater managerial challenges. In fact, with the appropriate processes in place, dispersed teams can significantly outperform their colocated counterparts.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><div class="callout-highlight" data-dcnode-id="1720"><span data-dcnode-id="1732" instrument_node="">
</span><aside class="l-content-wrap" data-dcnode-id="1722"><span data-dcnode-id="1731" instrument_node="">
</span><article data-dcnode-id="1724"><span data-dcnode-id="1730" instrument_node="">
</span><h4 data-dcnode-id="1726"><span data-dcnode-id="1729" instrument_node="">Winner of the </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sloanreview.mit.edu/the-magazine/2010-summer/51499/the-richard-beckhard-memorial-prize-2/"><span data-dcnode-id="1728" instrument_node="">2010 Richard Beckhard Memorial Prize</span></a></h4><span data-dcnode-id="1725" instrument_node="">
</span></article><span data-dcnode-id="1723" instrument_node="">
</span></aside><span data-dcnode-id="1721" instrument_node="">
</span></div><span data-dcnode-id="1719" instrument_node="">
</span><h3 data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">The Bright and Dark Sides of Dispersion</span></h3><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">A team’s level of dispersion is neither preordained nor fixed; rather, it is an organizational design parameter that companies can set and adjust. When making such decisions, managers should take into consideration the various pluses and minuses of separation.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Not surprisingly, several studies have found that collaboration across distance is more difficult than in a colocated environment. Potential issues include difficulties in communication and coordination, reduced trust, and an increased inability to establish a common ground. In contrast, proximity tends to promote more frequent communication and the development of closer and more positive interpersonal relationships. Indeed, the regular physical presence of coworkers improves people’s feelings of familiarity and fondness, and frequent informal interactions serve to strengthen social ties. Conversely, physical distance decreases closeness and affinity, which then leads to a greater potential for conflict. Distance also brings with it other issues, such as team members having to negotiate multiple time zones and requiring them to reorganize their workdays to accommodate others’ schedules. In such situations, frustration and confusion can ensue, especially if coworkers are regularly unavailable for discussion or clarification of task-related issues.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><div class="callout-highlight" data-dcnode-id="1688"><span data-dcnode-id="1709" instrument_node="">
</span><aside class="l-content-wrap" data-dcnode-id="1690"><span data-dcnode-id="1708" instrument_node="">
</span><article data-dcnode-id="1692"><span data-dcnode-id="1707" instrument_node="">
</span><h4 data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">About the Research</span></h4><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">
We studied 80 software development teams from 28 labs worldwide (including labs in Brazil, China, Denmark, France, Germany, India and the United States). The labs varied in size (employing between 20 and 5,500 software developers), and each team contained up to nine members. Our research included those software development projects that were completed within 12 months prior to data collection. A total of 392 managers, team leaders and team members participated in the study, and data from multiple respondents were used to ensure the validity of results and to overcome common method bias.
</span></p><span data-dcnode-id="1701" instrument_node="">
</span><div class="callout-toggle" data-dcnode-id="1696" style="display: none;"><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">
To measure geographic distribution, we used the descriptions provided by team leaders to identify each member’s office location. We then calculated a dispersion index taking into account the following factors: (1) miles between team members, (2) time zone difference, (3) number of locations per team, (4) percentage of isolated team members and (5) unevenness of membership across sites. To assess team performance, managers were asked to evaluate the teams with respect to effectiveness (in terms of product quality, reliability, usability, customer satisfaction and so on) and efficiency (in terms of adherence to preset budget and schedule constraints).</span></p><span data-dcnode-id="1697" instrument_node="">
</span></div><span data-dcnode-id="1695" instrument_node="">
</span><span class="callout-more" data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Read more</span></span></article><span data-dcnode-id="1691" instrument_node="">
</span></aside><span data-dcnode-id="1689" instrument_node="">
</span></div><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1686" instrument_node="">On the other hand, dispersion potentially has substantial advantages. First, in order to accomplish increasingly complex activities such as research and development, companies (particularly larger ones like IBM, General Electric or SAP) tend to cluster their competencies in different centers of excellence, which are often scattered geographically although part of an international corporate network of operations. SAP Aktiengesellschaft, for instance, has its global headquarters in Walldorf, Germany, but has built up large R&amp;D centers in India, China, Israel and the United States in order to reduce costs and leverage their global know-how in software engineering. Within each of these competence centers, the depth of expertise tends to be very strong, while the diversity of functional backgrounds is relatively weak because of specialization. Managers can take advantage of this organizational structure by assembling employees from different locations in such networks to create a team that can optimally integrate the different pools of expertise to perform a particular task.</span><a class="reflink" data-dcnode-id="1684" href="#ref3" id="ref_3"><span data-dcnode-id="1685" instrument_node="">3</span></a></p><span data-dcnode-id="1682" instrument_node="">

</span></div><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1620" instrument_node="">Second, companies can take advantage of the increased heterogeneity that is inherent in the nature of dispersed teams. Virtual teams tend to incorporate higher levels of structural and demographic diversity than do colocated teams, and both types of diversity can be highly beneficial.</span><a class="reflink" data-dcnode-id="1618" href="#ref4" id="ref_4"><span data-dcnode-id="1619" instrument_node="">4</span></a><span data-dcnode-id="1617" instrument_node=""> Structural diversity is a direct consequence of having team members from multiple locations associated with different business units and reporting to different managers. Such diversity can be highly valuable for teams, because it exposes members to heterogeneous sources of work experience, feedback and networking opportunities.</span><a class="reflink" data-dcnode-id="1615" href="#ref5" id="ref_5"><span data-dcnode-id="1616" instrument_node="">5</span></a><span data-dcnode-id="1614" instrument_node=""> In addition, virtual team members are often diverse in nationality. Although such diversity may complicate team dynamics, it can also enhance the overall problem-solving capacity of the group by bringing more vantage points to bear on a particular project.</span><a class="reflink" data-dcnode-id="1612" href="#ref6" id="ref_6"><span data-dcnode-id="1613" instrument_node="">6</span></a></p><span data-dcnode-id="1610" instrument_node="">
</span><div class="article-sidebar" data-dcnode-id="1599"><span data-dcnode-id="1609" instrument_node="">
</span><figure data-dcnode-id="1601"><span data-dcnode-id="1608" instrument_node="">
</span><img alt="Photo: Courtesy SAP" data-dcnode-id="1607" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sloanreview.mit.edu/files/2009/06/hoegl-420-2116.jpg&amp;raw" width="300"><figcaption data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">
</span><p class="attribution" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Image courtesy of SAP.</span></p><span data-dcnode-id="1603" instrument_node="">
</span></figcaption></figure><span data-dcnode-id="1600" instrument_node="">
</span></div><span data-dcnode-id="1598" instrument_node="">
</span><h3 data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Performance of Dispersed vs. Colocated Teams</span></h3><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1594" instrument_node="">Most past studies have found that dispersion hurts performance.</span><a class="reflink" data-dcnode-id="1592" href="#ref7" id="ref_7"><span data-dcnode-id="1593" instrument_node="">7</span></a><span data-dcnode-id="1591" instrument_node=""> Often, dispersed teams fail to perform important processes effectively and are therefore unable to realize their potential. But given the fact that virtual teams have become an increasing reality for many companies, it behooves managers to understand how to maximize the benefits of dispersion while minimizing its disadvantages. Thus, our research investigated two fundamental questions: (1) When do virtual teams outperform colocated ones? and (2) how should companies manage dispersed teams? To answer these questions, we studied software development teams from 28 different labs in countries including Brazil, China, Denmark, France, Germany, India and the United States. From that broad survey, we found that the key drivers of performance are certain crucial team processes that, for example, help coordinate work and facilitate communication among members. In fact, we found that virtual teams with such processes can outperform their colocated counterparts, and that was true even for colocated teams with the same high levels of those processes.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><div class="callout-highlight" data-dcnode-id="1571"><span data-dcnode-id="1588" instrument_node="">
</span><aside class="l-content-wrap" data-dcnode-id="1573"><span data-dcnode-id="1587" instrument_node="">
</span><article data-dcnode-id="1575"><span data-dcnode-id="1586" instrument_node="">
</span><h4 data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">The Pros and Cons of Dispersion</span></h4><span data-dcnode-id="1583" instrument_node="">
</span><p class="caption" data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Virtual teams provide a number of benefits but incur certain costs. Companies need to manage them in specific ways that take advantage of the opportunities while minimizing the liabilities.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1576"><img alt="The Pros and Cons of Dispersion" data-dcnode-id="1579" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sloanreview.mit.edu/files/2009/07/hoegl-s16.png&amp;raw"><br data-dcnode-id="1578"><span data-dcnode-id="1577" instrument_node="">
</span></p></article><span data-dcnode-id="1574" instrument_node="">
</span></aside><span data-dcnode-id="1572" instrument_node="">
</span></div><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">In general, team processes can be classified into two categories: task-related — including those that help ensure each member is contributing fully; and socio-emotional — including those that increase the cohesion of the group. Our study found that those processes that are directly task-related are the most critical for the performance of dispersed teams. Specifically, virtual teams that had processes that increased the levels of mutual support, member effort, work coordination, balance of member contributions and task-related communications consistently outperformed other teams with lower levels. Moreover, dispersed teams that had high levels of task-related processes were notably able to outperform colocated teams with similar levels of those same processes despite the physical separation of their members. In other words, the overall effect of dispersion is not necessarily detrimental but rather depends on the quality of a team’s task-related processes. That said, dispersion carries significant risks: Those teams with poor task-related processes suffered heavily with increased dispersion. The bottom line is that the quality of task-related processes appears to be a significant factor in deciding whether dispersion becomes a liability or an opportunity.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><aside class="article-ad ad-300 ad-300x600 ad-desktop" data-dcnode-id="1559"><span data-dcnode-id="1566" instrument_node="">
</span><div data-dcnode-id="1561" id="div-gpt-ad-1582901433465-0" style="height:600px; width:300px;"><span data-dcnode-id="1565" instrument_node="">
</span><span data-dcnode-id="1562" instrument_node="">
</span></div><span data-dcnode-id="1560" instrument_node="">
</span></aside><aside class="article-ad ad-300 ad-300x250 ad-mobile" data-dcnode-id="1551"><span data-dcnode-id="1558" instrument_node="">
</span><div data-dcnode-id="1553" id="div-gpt-ad-1582855229074-0" style="height:250px; width:300px;"><span data-dcnode-id="1557" instrument_node="">
</span><span data-dcnode-id="1554" instrument_node="">
</span></div><span data-dcnode-id="1552" instrument_node="">
</span></aside><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Beyond task-related processes, organizations must also ensure that team members commit to the overall group goals, identify with the team and actively support a team spirit. In other words, social-emotional processes are important too. Especially in teams with physically dispersed members, interpersonal differences are a greater threat to the team’s social stability because of the greater difficulty in resolving conflicts across geographic boundaries. Such difficulties can, in turn, demotivate members from contributing fully, thus jeopardizing team performance. Social processes that increase team cohesion, identification and informal communication can prevent that by helping to establish and maintain interpersonal bonds that enable a group to better cope with conflicts. In our study, we found that social processes were able to boost the performance of virtual as well as colocated teams. We had no indication, however, that virtual teams with favorable socio-emotional processes outperformed colocated teams with similar levels of the same processes. Our belief is that, although socio-emotional processes were not a differentiating factor, they likely facilitated more task-related processes (and hence indirectly enhanced the performance of virtual teams) through, for instance, increased knowledge transfer and better resolution of team conflicts.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><h3 data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">The Dos and Don’ts of Managing Dispersion</span></h3><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">To boost the performance of its teams, a company needs to implement the appropriate mechanisms for boosting both socio-emotional and task-related processes. Particularly for virtual teams, managers need to pay special attention to task-related processes that will capitalize on the specialized knowledge and expertise of such groups. The following key lessons can help companies maximize the performance of their virtual teams:</span></p><span data-dcnode-id="1541" instrument_node="">
</span><div class="callout-highlight" data-dcnode-id="1523"><span data-dcnode-id="1540" instrument_node="">
</span><aside class="l-content-wrap" data-dcnode-id="1525"><span data-dcnode-id="1539" instrument_node="">
</span><article data-dcnode-id="1527"><span data-dcnode-id="1538" instrument_node="">
</span><h4 data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Small Distances Matter</span></h4><span data-dcnode-id="1535" instrument_node="">
</span><p class="caption" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">In general, team performance tends to drop with increasing member dispersion. But sometimes even a low level of dispersion (namely, members working on different floors in the same building) can have a surprisingly large effect, especially with respect to a team’s efficiency.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1528"><img alt="Small Distances Matter" data-dcnode-id="1531" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sloanreview.mit.edu/files/2009/07/hoegl-s26.png&amp;raw"><br data-dcnode-id="1530"><span data-dcnode-id="1529" instrument_node="">
</span></p></article><span data-dcnode-id="1526" instrument_node="">
</span></aside><span data-dcnode-id="1524" instrument_node="">
</span></div><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1518"><strong data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Don’t underestimate the significance of small distances.</span></strong><span data-dcnode-id="1519" instrument_node=""> Our research shows that performance is noticeably lower for teams with people located in the same building but on different floors when compared with teams where all members are on the same floor. This was true regarding both effectiveness (that is, the quality of team output) and efficiency (in terms of time and cost). Interestingly, teams with members in the same building but on different floors also performed worse than teams with greater degrees of dispersion, including those that had members spread across a city, country or even continent. In fact, the only teams that fared worse were the intercontinental teams, with a significantly higher level of intercultural diversity and temporal dispersion (spanning many time zones).</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">At first glance, those results might seem odd, but consider. Teams with members in the same building, albeit on different floors, do not usually consider themselves as being dispersed and, hence, may easily underestimate the barriers to collaboration deriving from, for instance, having to climb a flight of stairs to meet a teammate face to face. In contrast, groups that are dispersed across a country or continent are more aware of their situation and may make extra efforts to improve such vital processes as task-related communication and coordination. One manager of a leading worldwide software company in our study stated that team leaders regularly underestimate the significance of small distances. They tend to treat team members located on different floors or in an adjacent building as being in direct proximity, failing to acknowledge the negative effects of even such comparatively small distances. A team leader from the same company commented that sometimes “colocated” teams spread across his laboratory use electronic communication technologies such as e-mail, telephone and voicemail just as much as globally dispersed teams do — a sign that people might be allowing short physical distances to become larger obstacles than they should. To prevent that from happening, companies such as Cisco Systems, BMW and Corning have designed their office layouts to maximize interpersonal interactions. At Cisco Systems Inc.’s sites in Germany, for example, only three people have their own individual offices. All of the other 850 employees work in an open-space environment that provides ample opportunities for “hall talks” and other informal interactions. </span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1510"><strong data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Emphasize teamwork skills.</span></strong><span data-dcnode-id="1511" instrument_node=""> Clearly, one of the key reasons for organizing a dispersed team is to draw on the superior knowledge that resides in remote locations. But many companies make the mistake of staffing such teams primarily (if not solely) on the basis of people’s expertise and availability. Instead, managers must also consider social skills — a major prerequisite for good teamwork — as a much more pivotal part of the catalog of requirements. In other words, it’s unrealistic to bring together individuals from different locations with the expectation that they will automatically know how to collaborate in a virtual environment. Groups with increasing levels of dispersion are also progressively more dependent on their level of teamwork, specifically, their ability to perform key processes such as mutual support, communication and coordination. In order for virtual teams to achieve their greater potential (and take advantage of their functional and structural diversity), members must first and foremost be able to establish a basis for the effective exchange of their varying capabilities — all of which requires teamwork-related skills as a critical ingredient. Otherwise, the virtual team could very likely perform worse than a colocated group. Thus, managers need to consider teamwork skills as a necessary attribute when selecting the members of a virtual team.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><div class="callout-highlight" data-dcnode-id="1491"><span data-dcnode-id="1508" instrument_node="">
</span><aside class="l-content-wrap" data-dcnode-id="1493"><span data-dcnode-id="1507" instrument_node="">
</span><article data-dcnode-id="1495"><span data-dcnode-id="1506" instrument_node="">
</span><h4 data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">The Importance of Task-Related Processes</span></h4><span data-dcnode-id="1503" instrument_node="">
</span><p class="caption" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Teams with a high level of task-related processes (such as those that help ensure each member is contributing fully) outperform teams with a low level. The difference becomes particularly acute the more dispersed the team is. Moreover, virtual teams with high levels of task processes are able to outperform colocated teams with similar levels of those same processes despite the physical separation of their members. That is, the overall effect of dispersion can be beneficial, depending on the quality of a team’s task-related processes.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1496"><img alt="The Importance of Task-Related Processes" data-dcnode-id="1499" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sloanreview.mit.edu/files/2009/07/hoegl-s36.png&amp;raw"><br data-dcnode-id="1498"><span data-dcnode-id="1497" instrument_node="">
</span></p></article><span data-dcnode-id="1494" instrument_node="">
</span></aside><span data-dcnode-id="1492" instrument_node="">
</span></div><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1486"><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Promote self-leadership across the team.</span></strong><span data-dcnode-id="1487" instrument_node=""> Beyond social skills, managers need to ensure that dispersed teams have broad-based leadership capabilities. When a group is closely colocated, an individual leader can more easily detect any deficiencies in teamwork and address them with a hands-on managerial style. An interpersonal conflict, for example, might be resolved by talking in person with the different parties in an informal setting. Such an approach is largely nonexistent in virtual teams. Geographic dispersion and cultural diversity make it difficult for any individual leader to ensure that the team is functioning effectively. Even though the advanced use of the latest information and communications technologies can help, they are no magical panacea for managing people across countries and time zones. “We are often not able to overcome the cultural problems,” admits one team leader in the study. “And only very experienced team leaders can handle these challenges and lead these teams to success.” For a virtual team to succeed, members generally need to be aware of the difficulties of dispersed collaboration and find effective ways to overcome those obstacles on their own. This highlights the need for people to be more self-sufficient in how they manage their own work because the team leader is less in a position to help. Consequently, companies that are serious about virtual collaboration must target their HR efforts not only at designated team leaders but also at team members so that those individuals can develop the skills necessary to work in a virtual setting.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1481"><strong data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Provide for face-to-face meetings.</span></strong><span data-dcnode-id="1482" instrument_node=""> Periodic face-to-face meetings of dispersed team members can be particularly effective for initiating and maintaining key social processes that will encourage informal communication, team identification and cohesion. A project kick-off meeting, for example, can be used to bring everyone together in one location for several days so that people can develop a shared understanding of the task at hand and begin to identify with the team. These processes, in turn, will support task collaboration during the project. The time and expense necessary to provide such opportunities for face-to-face interactions then become an investment that can lead to large returns if the virtual team is able to take full advantage of its diverse expertise and heterogeneity. Companies should also remember that informal interactions can be just as important as formal ones — if not more so. One experienced team leader in the study, for instance, asserted that projects should include one essential initial step: “to go out for a beer with all team members in order to establish a common ground before starting the collaboration.”</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1476"><strong data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Foster a “global culture.”</span></strong><span data-dcnode-id="1477" instrument_node=""> Our research suggests that a global mind-set, in which people see themselves as part of an international network, helps provide an environment that is conducive to dispersed teams. Accordingly, managers and team members need to recognize and frame their company as such, communicating the international nature of the organization’s operations and markets. Various human resource strategies can help foster that mind-set, including temporary staff assignments at foreign locations and inter-cultural training. Nestlé, General Electric, IBM and SAP — all known for the global reach of their business activities — provide good examples of how to actively foster a global employee mind-set. Managers at Nestlé S.A., for instance, are expected to move to another country every three or four years so that they can learn about the specifics of each of those markets and develop a global mind-set from their experiences. Such practices advance the development of diversity-friendly attitudes and the ability to work in different contexts, which in turn help employees cope with the challenges of distance when working on virtual teams. At General Electric Co., a steering committee oversees the company’s global R&amp;D efforts, and employees are assigned to different locations worldwide in order to facilitate the development of an informal network across all four main R&amp;D sites in the United States, China, Germany and India.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Conventional wisdom suggests that the performance of teams suffers with increasing levels of dispersion. Because of that, managers have typically viewed dispersion as a liability rather than an opportunity. But dispersion can provide substantial benefits if companies can take advantage of the diversity and varied expertise of team members at different locations. In fact, our research shows that virtual teams can outperform their colocated counterparts when they are set up and managed in the right way. In other words, a company can’t just assemble a dispersed team of top-notch talent and hope for the best; it also needs to ensure that the group has the necessary socio-emotional and task-related processes in place. Only then can virtual teams effectively integrate dispersed knowledge to take advantage of their cultural and structural diversity, thereby avoiding some of the drawbacks of dispersion while reaping its benefits.</span></p><span data-dcnode-id="1472" instrument_node="">

I work as a trainer and make a presentations at the client's office or remotely from mine. In the second case, it requires less preparation time and costs are reduced of both parties (materials, travel, accommodation), but also the effectiveness of the presentation and the attention of my audience are reduced as well. It's important for me that the participants of on-line conference will get my materials with the best quality.
It's not a secret that for those who makes Remote Presentation, Skype is a must have tool. But sometimes just sharing your screen is not effective due to a bad internet connection, so for me is very important that all participant will be able to watch, listen and use in further my documents with no limits. 
Mostly I share my mindmaps and projects, I use Conceptdraw software for it. I show my presentations via Skype, it works with Conceptrraw  mindmap easy and fast irrespectively the internet speed, because my file is loading to viewers computers and is used by program, not by network. All the participants can view and discuss in same time. Priceless option for distance work.</span></pre><span data-dcnode-id="839" instrument_node="">

</span><pre data-dcnode-id="772" style="white-space: pre-wrap;"><span data-dcnode-id="773" instrument_node="">Thank you professor Frank Siebdrat  for sharing your research findings.  I do believe "Virtual teams will become as important as Web to companies" in near future. We have done a survey study and published a series of papers on “Virtual teams” and “ virtual R&amp;D teams” which is available on http://ssrn.com/author=1379350 . All in all, we define a new definition for “virtual team”  (virtual team “is small temporary groups of geographically, organizationally and/ or time dispersed knowledge workers who coordinate their work predominantly with electronic information and communication technologies in order to accomplish one or more organization tasks”[1]) and found the advantages of employing virtual teams is far from conventional teams. 
Nader Ale Ebrahim http://aleebrahim.com/Nader%20Ale%20Ebrahim.aspx


[1]- Ale Ebrahim, N.; Ahmed, S.; Taha, Z. (December 2009). "Virtual R &amp; D teams in small and medium enterprises: A literature review". Scientific Research and Essay 4 (13): 1575–1590. Retrieved January 18, 2011.</span></pre><span data-dcnode-id="771" instrument_node="">

</span><div class="article-comments__text" data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">
</span><pre data-dcnode-id="749" style="white-space: pre-wrap;"><span data-dcnode-id="750" instrument_node="">This study is very interesting and very aligned with my research and work with virtual teams: http://aim-strategies.com/AIMVTTrendsReport.pdf
In fact, for my current book, A Manager's Guide to Virtual Teams:http://amzn.to/oEoJXf, research conducted with 150+ virtual managers and members several trends emerged. With teammates dispersed throughout the globe, members had less time boundaries and worked around the clock (52%) and coordinated across time zones (44%). Building the human connection and replacing hallway chats becomes challenging, and even in the virtual environment, occasional face-to-face communication was considered vital for team interaction (particularly during team setup and conflict resolution). Some teams had the luxury of meeting in person while others did not meet at all. I found it interesting that there are so many confirming principles presented in this article that are reinforced my consulting and training experience when working with dispersed virtual teams - whether across the hall, across the state or on the other side of the world. 

Thank you. 

Yael Zofi, AIM Strategies
http://aim-strategies.com/blog/</span></pre><span data-dcnode-id="748" instrument_node="">

</span><pre data-dcnode-id="659" style="white-space: pre-wrap;"><span data-dcnode-id="660" instrument_node="">Great article, good comments. Will investigate sococo. 
I'm on many dispersed teams and 4 things really help:
1 - using IM chat routinely (1-1, and for ad hoc group chats, to kickoff an ad hoc web session, etc). Use basic stds (post status, use DND as needed, etc). Chat informally from time to time for social connection - it works; use to resolve issues, etc. 
2 - the initial face to face can be via TelePresence a good runner up to in person
3 - shared sophistication re teamwork, remote issues - people who are used to colocation can be clueless at first.
4 - clear tasks - Definitely agree. BTW, a great tool for anytime/realtime global collaboration is Mindjet Catalyst - Mindmanager in the cloud, a quantum leap</span></pre><span data-dcnode-id="658" instrument_node="">

</span><pre data-dcnode-id="636" style="white-space: pre-wrap;"><span data-dcnode-id="637" instrument_node="">I managed a variety of dispersed teams at Yahoo and found that the  lack of informal, ad hoc interaction was the single biggest issue impacting performance.  Absent the informal, interacions it was very hard to create a sense of team.  Travel helps, but is never enough.

To address these problems, I founded Sococo (www.sococo.com), a new communication company that lets people work together as if they were in the same physical place.  Teams can have scheduled interactions as well as the informal hallway discussions all in a virtual office setting. 

Paul Brody SM'93</span></pre><span data-dcnode-id="635" instrument_node="">

</span><h6 class="article-comments__name" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">mdaffern</span></h6><span data-dcnode-id="600" instrument_node="">
</span><time class="article-comments__date" data-dcnode-id="595" datetime="2010-04-27 13:08:07" pubdate=""><span data-dcnode-id="599" instrument_node="">
</span><abbr class="published updated" data-dcnode-id="597" title="2010-04-27 13:08:07"><span data-dcnode-id="598" instrument_node="">April 27, 2010</span></abbr><span data-dcnode-id="596" instrument_node="">
</span></time><span data-dcnode-id="594" instrument_node="">
</span><div class="article-comments__text" data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">
</span><pre data-dcnode-id="591" style="white-space: pre-wrap;"><span data-dcnode-id="592" instrument_node="">I define communication as "the right people acting on the right information at the right time" and have found there is a non-linear correlation between the aggregate distance separating team members - be it physically, temporally or culturally - and the necessity for formal communication management.  I suggest the early dip in the graph depicting the importance of task-related processes stems not only from an under-appreciation of the need for communication management, but also from an underlying assumption of similarity (of purpose, mind set, etc) by team members who are collocated by site but not necessarily in continuous physical association.

I also would argue the downward trend in performance as dispersion increases results, in part, from the belief a fixeed set of communication management tools and practices is scalable across the range of dispersion.  I suggest the authors consider examining if, and how, the teams employ different techniques of management based on the level of team dispersion.  As an example, for highly dispersed teams, I've found the periodic use of face-to-face meetings involving the whole team can serve to refocus and refine the team's efforts when placed at the proper junctures in a project's life.  The associated cost becomes a rounding error when compared with the opportunities lost as a result of a late or poorly designed or executed project.</span></pre><span data-dcnode-id="590" instrument_node="">
</span></div><span data-dcnode-id="588" instrument_node="">

</span><time class="article-comments__date" data-dcnode-id="550" datetime="2009-09-20 17:41:54" pubdate=""><span data-dcnode-id="554" instrument_node="">

</span><div class="article-comments__text" data-dcnode-id="544"><span data-dcnode-id="548" instrument_node="">
</span><pre data-dcnode-id="546" style="white-space: pre-wrap;"><span data-dcnode-id="547" instrument_node="">Great article.  I am very interested in learning more about the socio-emotional processes employers are using to create a sense of team and belonging among dispersed teammates.  What specific best practices are being used to bridge gaps caused by short distance dispersion when relocation to the same floor is not an option?  I'm also curious about specific practices used by HR partners to effectively engage/support team members in the field. Thanks very much.  -Joanna Shepard</span></pre><span data-dcnode-id="545" instrument_node="">
</span></div><span data-dcnode-id="543" instrument_node="">

</span><article class="article-comments__comment" data-dcnode-id="519" id="comment-228"><span data-dcnode-id="540" instrument_node="">
</span><div class="article-comments__photo" data-dcnode-id="536"><span data-dcnode-id="539" instrument_node="">
</span><img alt="" data-dcnode-id="538" height="61px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/d23e29e43a12f5ef611cecbd6fd9ec4d%3Fs%3D96%26d%3Dblank%26r%3Dg&amp;raw" width="61px"><span data-dcnode-id="537" instrument_node=""> </span></div><span data-dcnode-id="535" instrument_node="">
</span><h6 class="article-comments__name" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Mary McGuire</span></h6><span data-dcnode-id="532" instrument_node="">
</span><time class="article-comments__date" data-dcnode-id="527" datetime="2009-07-02 17:17:34" pubdate=""><span data-dcnode-id="531" instrument_node="">
</span><abbr class="published updated" data-dcnode-id="529" title="2009-07-02 17:17:34"><span data-dcnode-id="530" instrument_node="">July 02, 2009</span></abbr><span data-dcnode-id="528" instrument_node="">
</span></time><span data-dcnode-id="526" instrument_node="">
</span><div class="article-comments__text" data-dcnode-id="521"><span data-dcnode-id="525" instrument_node="">
</span><pre data-dcnode-id="523" style="white-space: pre-wrap;"><span data-dcnode-id="524" instrument_node="">Having recently completed a project in Angola where half of the team where located in UK, I can concur with many of the findings in this article.

Team managers that ensured that roles were well clarified, tasks clearly defined and good collaboration across teams brought about considerable performance improvement.

Other teams that we worked with were much less clear about roles and tended to be territorial  (them &amp; us) in attitude.  Without a doubt the strength and commitment of the team leaders in bridging those gaps is key.  One take-away from this research is perhaps the need for multi-nationals to spend more time developing the collaboration skills in their leaders for dispersed team working.  Mary McGuire - Agents2change.com</span></pre><span data-dcnode-id="522" instrument_node="">
</span></div><span data-dcnode-id="520" instrument_node="">

</span><h6 class="article-comments__name" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">jajenney</span></h6><span data-dcnode-id="487" instrument_node="">
</span><time class="article-comments__date" data-dcnode-id="482" datetime="2009-07-02 09:48:06" pubdate=""><span data-dcnode-id="486" instrument_node="">

</span></time><span data-dcnode-id="481" instrument_node="">
</span><div class="article-comments__text" data-dcnode-id="476"><span data-dcnode-id="480" instrument_node="">
</span><pre data-dcnode-id="478" style="white-space: pre-wrap;"><span data-dcnode-id="479" instrument_node="">Your research supports my many years of experience with dispersed and colocated teams. However, the principles can be boiled down substantially. Yes, processes are key. The principle is to design processes to minimize data latency. Social issues are also important and bringing the team together for a few days as described is crucial. Once people have had a chance to interact on a face to face basis they learn the communication cues characteristic of each other and this makes future communications more effective. Finally, cultural differences must be addressed up front; at the first group meeting if possible. Everyone has to buy into the team goal and into how the team will work. Sometimes this requires that part of the team work in a way that is not part of the team's normal culture. Discuss approaches to the work sufficiently to uncover such differences and get commitments to follow the teams selected approach. This sometimes takes a strong leader. 
Joe Jenney</span></pre><span data-dcnode-id="477" instrument_node="">
</span></div><span data-dcnode-id="475" instrument_node="">

</span><h6 class="article-comments__name" data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">tirian</span></h6><span data-dcnode-id="442" instrument_node="">

</span><abbr class="published updated" data-dcnode-id="439" title="2009-07-01 19:46:11"><span data-dcnode-id="440" instrument_node="">July 01, 2009</span></abbr><span data-dcnode-id="438" instrument_node="">
</span></time><span data-dcnode-id="436" instrument_node="">
</span><div class="article-comments__text" data-dcnode-id="431"><span data-dcnode-id="435" instrument_node="">
</span><pre data-dcnode-id="433" style="white-space: pre-wrap;"><span data-dcnode-id="434" instrument_node="">Loved your research and article on virtual teams. We are based in Asia where virtual teams has been a big issue for many years. 

When a cross cultural element is added to the mix its even more interesting. As a result we designed a simulation to show participants exactly what happens at work, in front of them as a team that has come together. 

We feel this is the best way to get the real issues on the table and start to develop clear &amp; honest communication structures to deal with the issues. We love that you have identified that virtual teams can be in the same building as once we started to run our simulation we discovered that the problems were not just geographical located teams but anyone that does not invest enough face to face time to build trust and allow the benefit of the doubt when dealing with tricky issues. 

The best research we found on this topic was from Antarctica so our simulation game is set there (On Thin ICE). 

To compliment the corporate research we have also interviewed Antarctic explorers where the peak performance of a virtual team is about life and death. More extreme than corporate but we have discovered that the issues are the same.

- Andrew Grant www.tirian.com</span></pre><span data-dcnode-id="432" instrument_node="">
