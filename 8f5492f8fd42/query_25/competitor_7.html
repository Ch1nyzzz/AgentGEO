</span></div></div></header><div class="page_title_container" data-dcnode-id="852" id="page_title_container" style="background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url(https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-619544030.jpg) center center no-repeat; color: #fff; background-size: cover; padding: 225px 15px;"><h1 class="page-title" data-dcnode-id="855" style="color: #fff; text-shadow: 0px 0px 10px rgba(109, 109, 109, 1);"><span data-dcnode-id="856" instrument_node="">How to Leverage Global Citizenship and Build Stronger Cross-Cultural Teams</span></h1><p class="boss_post_excerpt_text" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Diversity in the workplace means leaders need to be ready to build strong teams with cross-cultural members from different backgrounds.</span></p></div><div class="site-inner" data-dcnode-id="347"><div class="wrap" data-dcnode-id="348"><div class="content-sidebar-wrap" data-dcnode-id="349"><main class="content" data-dcnode-id="627"><article aria-label="How to Leverage Global Citizenship and Build Stronger Cross-Cultural Teams" class="post-10298 post type-post status-publish format-standard has-post-thumbnail category-leadership tag-diversity tag-globalization tag-leadership tag-leadership-advice entry" data-dcnode-id="635"><header class="entry-header" data-dcnode-id="842"><p class="entry-meta" data-dcnode-id="843" style="display: none;"><time class="entry-time" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">April 26, 2017</span></time><span data-dcnode-id="849" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="845"><a class="entry-author-link" data-dcnode-id="846" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebossmagazine.com/author/boss-editorial-team/" rel="author follow noopener"><span class="entry-author-name" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">BOSS Editorial Team</span></span></a></span><span data-dcnode-id="844" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="656"><div class="addtoany_share_save_container addtoany_content addtoany_content_top" data-dcnode-id="660"><div class="a2a_kit a2a_kit_size_34 addtoany_list" data-a2a-title="How to Leverage Global Citizenship and Build Stronger Cross-Cultural Teams" data-a2a-url="https://thebossmagazine.com/cross-cultural-teams/" data-dcnode-id="815" style="line-height: 34px;"><a class="a2a_button_twitter" data-dcnode-id="836" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebossmagazine.com/%23twitter" rel="nofollow noopener" target="_blank" title="Twitter"><span class="a2a_svg a2a_s__default a2a_s_twitter" data-dcnode-id="839" style="background-color: rgb(42, 42, 42); width: 34px; line-height: 34px; height: 34px; background-size: 34px; border-radius: 5px;"><svg aria-hidden="true" data-dcnode-id="840" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M28 8.557a9.913 9.913 0 01-2.828.775 4.93 4.93 0 002.166-2.725 9.738 9.738 0 01-3.13 1.194 4.92 4.92 0 00-3.593-1.55 4.924 4.924 0 00-4.794 6.049c-4.09-.21-7.72-2.17-10.15-5.15a4.942 4.942 0 00-.665 2.477c0 1.71.87 3.214 2.19 4.1a4.968 4.968 0 01-2.23-.616v.06c0 2.39 1.7 4.38 3.952 4.83-.414.115-.85.174-1.297.174-.318 0-.626-.03-.928-.086a4.935 4.935 0 004.6 3.42 9.893 9.893 0 01-6.114 2.107c-.398 0-.79-.023-1.175-.068a13.953 13.953 0 007.55 2.213c9.056 0 14.01-7.507 14.01-14.013 0-.213-.005-.426-.015-.637.96-.695 1.795-1.56 2.455-2.55z" data-dcnode-id="841" fill="#ffffff"></path></svg></span><span class="a2a_label" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Twitter</span></span></a><a class="a2a_button_linkedin" data-dcnode-id="830" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebossmagazine.com/%23linkedin" rel="nofollow noopener" target="_blank" title="LinkedIn"><span class="a2a_svg a2a_s__default a2a_s_linkedin" data-dcnode-id="833" style="background-color: rgb(42, 42, 42); width: 34px; line-height: 34px; height: 34px; background-size: 34px; border-radius: 5px;"><svg aria-hidden="true" data-dcnode-id="834" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M6.227 12.61h4.19v13.48h-4.19V12.61zm2.095-6.7a2.43 2.43 0 010 4.86c-1.344 0-2.428-1.09-2.428-2.43s1.084-2.43 2.428-2.43m4.72 6.7h4.02v1.84h.058c.56-1.058 1.927-2.176 3.965-2.176 4.238 0 5.02 2.792 5.02 6.42v7.395h-4.183v-6.56c0-1.564-.03-3.574-2.178-3.574-2.18 0-2.514 1.7-2.514 3.46v6.668h-4.187V12.61z" data-dcnode-id="835" fill="#ffffff"></path></svg></span><span class="a2a_label" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">LinkedIn</span></span></a><a class="a2a_button_facebook" data-dcnode-id="824" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebossmagazine.com/%23facebook" rel="nofollow noopener" target="_blank" title="Facebook"><span class="a2a_svg a2a_s__default a2a_s_facebook" data-dcnode-id="827" style="background-color: rgb(42, 42, 42); width: 34px; line-height: 34px; height: 34px; background-size: 34px; border-radius: 5px;"><svg aria-hidden="true" data-dcnode-id="828" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M17.78 27.5V17.008h3.522l.527-4.09h-4.05v-2.61c0-1.182.33-1.99 2.023-1.99h2.166V4.66c-.375-.05-1.66-.16-3.155-.16-3.123 0-5.26 1.905-5.26 5.405v3.016h-3.53v4.09h3.53V27.5h4.223z" data-dcnode-id="829" fill="#ffffff"></path></svg></span><span class="a2a_label" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Facebook</span></span></a><a class="a2a_dd addtoany_share_save addtoany_share" data-dcnode-id="816" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.addtoany.com/share%23url%3Dhttps%253A%252F%252Fthebossmagazine.com%252Fcross-cultural-teams%252F%26title%3DHow%2520to%2520Leverage%2520Global%2520Citizenship%2520and%2520Build%2520Stronger%2520Cross-Cultural%2520Teams" rel="external noopener" target="_blank"><span class="a2a_svg a2a_s__default a2a_s_a2a" data-dcnode-id="819" style="background-color: rgb(42, 42, 42); width: 34px; line-height: 34px; height: 34px; background-size: 34px; border-radius: 5px;"><svg aria-hidden="true" data-dcnode-id="820" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="821" fill="#ffffff"><path d="M14 7h4v18h-4z" data-dcnode-id="823"></path><path d="M7 14h18v4H7z" data-dcnode-id="822"></path></g></svg></span><span class="a2a_label a2a_localize" data-a2a-localize="inner,Share" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Share</span></span></a></div><span class="rt-reading-time" data-dcnode-id="806" style="display: block;"><span class="rt-label rt-prefix" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Reading Time: </span></span><span data-dcnode-id="812" instrument_node=""> </span><span class="rt-time" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">5</span></span><span data-dcnode-id="809" instrument_node=""> </span><span class="rt-label rt-postfix" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">minutes</span></span></span><h2 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Diversity in the workplace means leaders need to be ready to build strong teams with cross-cultural members from different backgrounds.</span></h2><p data-dcnode-id="799"><img alt="There has been an avalanche of recent research demonstrating that cross-cultural teams generate better results." class="normal aligncenter wp-image-10308 size-full lazyloaded" data-dcnode-id="803" data-sizes="(max-width: 960px) 100vw, 960px" data-src="https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430.jpg" data-srcset="https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430.jpg 960w, https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430-300x191.jpg 300w, https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430-768x489.jpg 768w, https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430-740x471.jpg 740w" height="611" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430.jpg&amp;raw" srcset="https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430.jpg 960w, https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430-300x191.jpg 300w, https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430-768x489.jpg 768w, https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430-740x471.jpg 740w" width="960"><noscript data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">&lt;img class="normal aligncenter wp-image-10308 size-full" src="https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430.jpg" alt="There has been an avalanche of recent research demonstrating that cross-cultural teams generate better results." width="960" height="611" srcset="https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430.jpg 960w, https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430-300x191.jpg 300w, https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430-768x489.jpg 768w, https://thebossmagazine.com/wp-content/uploads/2017/04/iStock-524538430-740x471.jpg 740w" sizes="(max-width: 960px) 100vw, 960px"&gt;</span></noscript><span data-dcnode-id="800" instrument_node="">In today’s globalized environment, the need to communicate effectively cross-culturally is becoming imperative to guarantee long-term business relationships. However, the ability to do so still requires due diligence.</span></p><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Parties may speak the same language, but cultural and ethical differences may still cause misunderstandings. Countless examples over the years demonstrate how a lack of communication can ultimately result in poor business performance.</span></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Geographical boundaries, time zones, and continents are becoming less of an issue as companies expand across them. Advancements in technology and transport are part of the reason, as well as a shift in values for millennials who consistently express a desire to prevent nationality from defining them.</span></p><p data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">Last year, a </span><a data-dcnode-id="792" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-36139904" rel="external noopener" target="_blank"><span data-dcnode-id="793" instrument_node="">BBC World Service poll</span></a><span data-dcnode-id="791" instrument_node=""> reported that an increasing number of people are choosing to identify as ‘global citizens.’</span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Reflecting on one’s nationality and residency is not unique to millennials: it’s something that has been embraced by the progressive and the affluent for some time now, especially with regards to dual citizenship.</span></p><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Around 50 percent of the world’s high-net-worth individuals (HNWIs) have lived in more than one country.</span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">The rise of the BBC’s ‘global citizen,’ otherwise known as the ‘citizen of the world,’ has led to an increase in the diversity of workplaces. There has been an avalanche of recent research demonstrating that cross-cultural teams generate better results.</span></p><p data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">For instance, one study by </span><a data-dcnode-id="781" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2014/03/21/292225798/does-diversity-on-research-team-improve-quality-of-science" rel="external noopener" target="_blank"><span data-dcnode-id="782" instrument_node="">NPR</span></a><span data-dcnode-id="780" instrument_node=""> indicated researchers cites cross-cultural teams and their papers in scientific papers more often than they cite papers written by teams of individuals from the same cultural background.</span></p><p data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">There has also been </span><a data-dcnode-id="776" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w17640" rel="external noopener" target="_blank"><span data-dcnode-id="777" instrument_node="">further research</span></a><span data-dcnode-id="775" instrument_node=""> which reports that increased diversity in cities spurs economic development.</span></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">As diversity boosts innovation and creativity—two qualities highly praised in today’s fast-paced world—it makes good business sense to leverage the benefits of a cross-cultural team.</span></p><p data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">One company that is embracing cross-cultural operations is </span><a data-dcnode-id="769" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//csglobalpartners.com/" rel="external noopener" target="_blank"><span data-dcnode-id="770" instrument_node="">CS Global Partners</span></a><span data-dcnode-id="768" instrument_node="">, which has multiple offices around the world. There are 13 different spoken languages in the company’s London office alone.</span></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">With team members from South America, Africa, Asia, and Europe all coming together to work as one, staff members can educate and immerse themselves in cultures, values, and influences from all over the world.</span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Multiculturalism within the office also allows employees to build deeper, valuable, and more authentic connections with clients and business associates. Cultural awareness and sensitivity are crucial to the success of a firm that interacts with international clients, stakeholders, and employees.</span></p><p data-dcnode-id="760"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">4 Ways to Strengthen a Diverse Team</span></strong></p><p data-dcnode-id="757"><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Communicate</span></strong></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">We often take for granted that our colleagues and employees will fully understand what we are saying or asking them to do because similar cultural backgrounds allow us to share frames of reference.</span></p><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">However, in a team comprised of varying nationalities and backgrounds, idioms, phrases, and references, this may cause misunderstandings. Non-native speakers, although fluent, may not always have the capability to read between the lines, grasp the certain socio-cultural or historical context, or understand nuances.</span></p><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">To be able to effectively communicate with all team members, choose to avoid ‘management speak’ or colloquialisms, and instead opt for simple language to convey clear messages.</span></p><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Be sure to create a culture where questions are welcome in order to clarify doubts: patience and courtesy are key. Consistently delivering the message that varying cultural backgrounds influences behavior and communication style is crucial in reducing misunderstandings.</span></p><p data-dcnode-id="746"><strong data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Acknowledge Differences</span></strong></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Diverse cultures should be celebrated! Being able to acknowledge and navigate the varying backgrounds in a diverse team will only serve to optimize performance.</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">From behaviors, language, values and expectations, to norms and even interspersed words or short phrases, how cultural diversity manifests often fluctuates. Educating yourself in what those manifestations are will improve in-house interaction.</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">One way to tackle this approach head-on is by discussing backgrounds, and particularly individual expectations relating to the business and role played by each employee. This drives a culture of understanding.</span></p><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">It’s also important to acknowledge different cultures by embracing the elements of the cultures in our day-to-day activities.</span></p><p data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">The </span><a data-dcnode-id="735" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geert-hofstede.com/national-culture.html" rel="external noopener" target="_blank"><span data-dcnode-id="736" instrument_node="">Geert Hofstede cultural dimension model</span></a><span data-dcnode-id="734" instrument_node=""> is particularly useful when dealing with cross-cultural teams, as it explains the effect that growing up in a certain cultural environment may have on people, their values, and their expectations with respect to their activities and their interactions with others.</span></p><p data-dcnode-id="730"><strong data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Build Trust</span></strong></p><p data-dcnode-id="721"><span data-dcnode-id="729" instrument_node="">The ability to collaborate is based on mutual respect and trust, but, of course, building trust takes time. Creating an environment where people feel comfortable enough to share their personal experiences and histories is a proven strategy to build trust. </span><a data-dcnode-id="727" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tablegroup.com/pat/" rel="external noopener" target="_blank"><span data-dcnode-id="728" instrument_node="">Patrick Lencioni</span></a><span data-dcnode-id="726" instrument_node="">’s book, </span><a data-dcnode-id="723" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Five-Dysfunctions-Team-Leadership-Fable/dp/0787960756" rel="external noopener" target="_blank"><em data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The Five Dysfunctions of a Team</span></em></a><span data-dcnode-id="722" instrument_node="">, is an excellent read on the subject.</span></p><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Face-to-face interaction is also crucial to building confidence in team members, as the person you are communicating with becomes more than just a letter or email, but a human to whom you can associate unique characteristics.</span></p><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Body language and tone of voice only come across through in-person communication. Even if you are communicating across time zones and continents, don’t fall prey to relying on email. Schedule meetings using visual platforms such as Skype.</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Finally, it has been shown that teams working towards one common goal succeed at building unity. This is because each member of the team has one objective and purpose, making collaboration practical and advantageous.</span></p><p data-dcnode-id="712"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Create a Team Identity</span></strong></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">It’s essential that everyone involved is made aware of the target that the team is working toward and common values that drive them as members of that team. Being able to pinpoint the means by which a team operates and its end goal allows team members to make those means and end goal their own.</span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">The team member thus identifies with the larger team, and places the interests of the team above personal ones. This is especially the case when the individual feels that his or her contribution is valued and necessary to the team’s overall success.</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Nurturing personal connections, such as by designing social situations that allow team members to create bonds with one another, will also enable the team to develop a strong common identity. The outdated view that ‘we don’t have to like each other’ is now widely disregarded.</span></p><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">Quite to the contrary, reputable publications such as </span><a data-dcnode-id="703" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2015/03/positive-teams-are-more-productive" rel="external noopener" target="_blank"><span data-dcnode-id="704" instrument_node="">Harvard Business Review</span></a><span data-dcnode-id="702" instrument_node=""> now extol workplaces that apply ‘positive and virtuous’ practices, which they believe result in the business excelling in a number of domains.</span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Acknowledgment of cultural differences is not enough when it comes to citizens of the world and cross-cultural teams. Instead, these differences should be embraced and leveraged. Having a cross-cultural team presents many opportunities for creativity, innovation, and, ultimately, success.</span></p><hr data-dcnode-id="698"><p data-dcnode-id="691"><img alt="There has been an avalanche of recent research demonstrating that cross-cultural teams generate better results." class="normal size-thumbnail wp-image-10310 alignleft lazyloaded" data-dcnode-id="697" data-sizes="(max-width: 150px) 100vw, 150px" data-src="https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-150x150.jpg" data-srcset="https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-150x150.jpg 150w, https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-300x300.jpg 300w, https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett.jpg 400w, https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-65x65.jpg 65w, https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-75x75.jpg 75w" height="150" sizes="(max-width: 150px) 100vw, 150px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-150x150.jpg&amp;raw" srcset="https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-150x150.jpg 150w, https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-300x300.jpg 300w, https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett.jpg 400w, https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-65x65.jpg 65w, https://thebossmagazine.com/wp-content/uploads/2017/04/Micha-Emmett-75x75.jpg 75w" width="
