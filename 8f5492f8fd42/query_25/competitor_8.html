</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">One of the most essential characteristics for a high-functioning team —&nbsp;perhaps the single most important characteristic —&nbsp;is trust. Anyone who has worked on a team knows that team members must be able to trust each other to get the job done, and be committed and dedicated to the overall welfare of the group. In any group of individuals, trust is challenging to create and sustain, but in the case of a multicultural team it can be especially difficult for a variety of different reasons.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="998" instrument_node="">First of all, </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2015/12/how-to-run-a-meeting-of-people-from-different-cultures" target="_blank"><span data-dcnode-id="997" instrument_node="">communication styles</span></a><span data-dcnode-id="995" instrument_node=""> vary across cultures; so, too, does the extent to which people socialize or&nbsp;</span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2014/02/in-a-new-culture-wait-to-cut-to-the-chase/" target="_blank"><span data-dcnode-id="994" instrument_node="">get down to business</span></a><span data-dcnode-id="992" instrument_node=""> at the start of a meeting. There are differences in conventions around </span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2015/04/when-cultural-differences-interfere-with-your-time" target="_blank"><span data-dcnode-id="991" instrument_node="">time</span></a><span data-dcnode-id="989" instrument_node="">, </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2013/02/giving-feedback-across-cultures" target="_blank"><span data-dcnode-id="988" instrument_node="">giving feedback</span></a><span data-dcnode-id="986" instrument_node="">, and </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2015/05/learning-the-language-of-indirectness" target="_blank"><span data-dcnode-id="985" instrument_node="">disagreeing publicly</span></a><span data-dcnode-id="983" instrument_node="">. Multicultural teams are prone to friction due to perceptions of ethnocentrism, with minority team members feeling ignored or not taken seriously.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">How can leaders of multicultural teams leverage the upside of diversity without falling prey to its inherent challenges?&nbsp;In our collective experience working with hundreds of individuals on cross-cultural teams around the globe, leaders of multicultural teams can use the following five tips to build trust between team members.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="965"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Structure the team for success.</span></strong><span data-dcnode-id="975" instrument_node=""> The great organizational behavior scholar </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jrichardhackman.com/" target="_blank"><span data-dcnode-id="974" instrument_node="">Richard Hackman</span></a><span data-dcnode-id="972" instrument_node=""> used to argue that the best way to ensure a positive process in a team is to create initial conditions that set up the team for success. For a multicultural team, that means making sure the team has a clear and compelling direction, its members have access to the information and resources they need to successfully carry out the work, stakeholders in different geographies and functions are on board with the team’s agenda, and the team is staffed wisely —&nbsp;ideally with people who have the requisite technical skills as well as </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2004/10/cultural-intelligence" target="_blank"><span data-dcnode-id="971" instrument_node="">cultural intelligence</span></a><span data-dcnode-id="969" instrument_node=""> and </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/product/global-dexterity-how-to-adapt-your-behavior-across-cultures-without-losing-yourself-in-the-process/11182E-KND-ENG" target="_blank"><span data-dcnode-id="968" instrument_node="">global dexterity</span></a><span data-dcnode-id="966" instrument_node="">. Given the built-in challenges these teams face to begin with, it’s essential to staff them with as many curious, flexible, thoughtful, and emotionally stable members as possible.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="957"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Understand the cross-cultural makeup of your team.</span></strong><span data-dcnode-id="961" instrument_node="">&nbsp;The leader of any cross-cultural team needs&nbsp;to </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aperianglobal.com/learning-solutions/online-learning-tools/globesmart/" target="_blank"><span data-dcnode-id="960" instrument_node="">understand the different cultures</span></a><span data-dcnode-id="958" instrument_node="">, language differences, and “fault lines” within the team, as well as the potential for misconception and miscommunication. For example, if the team comprises&nbsp;three Germans and three Koreans, you might guess that feedback will be a cultural tripwire. Many Germans are notoriously comfortable giving direct, unmitigated feedback, whereas the reverse is typically the case in Korea unless the dialogue is between senior and junior colleagues. Making note of these tensions can help you anticipate potential challenges and resolve them swiftly and effectively.</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">That said, leaders also must understand individual personalities. What if the three Korean members of the team all went to school in the U.S., lived and worked in Europe, and are anything but prototypical Korean in their cultural style? That would make for a very different set of predictions about group dynamics.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="946"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Set very clear norms and stick to them. </span></strong><span data-dcnode-id="950" instrument_node="">Multicultural team members are inevitably going to bring a wide variety of </span><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aperianglobal.com/learning-solutions/online-learning-tools/globesmart-profile-2/" target="_blank"><span data-dcnode-id="949" instrument_node="">different work styles</span></a><span data-dcnode-id="947" instrument_node=""> and personal preferences to the table. The team leader must establish team norms that everyone sticks to —&nbsp;no matter what their personal default might be. Rather than simply imposing your own preferred style, start by taking into account what will work best for the team as a whole, and consider incorporating practices from other cultures that could be useful. For instance, if you normally assign individual responsibilities but many team members have a preference for handling work in small project groups, you could assign complex tasks to small groups.</span></p><span data-dcnode-id="945" instrument_node="">
</span><article-promo class="article-promo promo--half" data-dcnode-id="879"><span data-dcnode-id="944" instrument_node="">
</span><h4 class="mbs" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">You and Your Team Series</span></h4><span data-dcnode-id="941" instrument_node="">
</span><h3 class="mbm text-gray-light" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Managing Across Cultures</span></h3><span data-dcnode-id="938" instrument_node="">
</span><div class="promo-contents" data-dcnode-id="881"><span data-dcnode-id="937" instrument_node="">
</span><ul data-dcnode-id="883"><span data-dcnode-id="936" instrument_node="">
</span><li data-dcnode-id="885"><span data-dcnode-id="935" instrument_node="">
</span><figure class="mbm" data-dcnode-id="931"><span data-dcnode-id="934" instrument_node="">
</span><img data-dcnode-id="933" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/resources/images/article_assets/2016/05/further-reading-across-cultures.png&amp;raw"><span data-dcnode-id="932" instrument_node="">
</span></figure><span data-dcnode-id="930" instrument_node=""> </span><h6 class="hed mbs mtl" data-dcnode-id="925"><span data-dcnode-id="929" instrument_node=""> </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2016/05/what-leadership-looks-like-in-different-cultures"><span data-dcnode-id="928" instrument_node="">What Leadership Looks Like in Different Cultures</span></a><span data-dcnode-id="926" instrument_node=""> </span></h6><span data-dcnode-id="924" instrument_node="">
</span><div class="stream-item-info" data-dcnode-id="886"><span data-dcnode-id="923" instrument_node="">
</span><ul class="byline byline-list line-height-tight" data-dcnode-id="918"><span data-dcnode-id="922" instrument_node="">
</span><li data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Tomas Chamorro-Premuzic</span></li><span data-dcnode-id="919" instrument_node="">
</span></ul><span data-dcnode-id="917" instrument_node="">
</span><h6 class="hed mbs mtm" data-dcnode-id="912"><span data-dcnode-id="916" instrument_node=""> </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2016/03/having-a-difficult-conversation-with-someone-from-a-different-culture"><span data-dcnode-id="915" instrument_node="">Having a Difficult Conversation with Someone from a Different Culture</span></a><span data-dcnode-id="913" instrument_node=""> </span></h6><span data-dcnode-id="911" instrument_node="">
</span><div class="stream-item-info" data-dcnode-id="888"><span data-dcnode-id="910" instrument_node="">
</span><ul class="byline byline-list line-height-tight" data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">
</span><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Andy Molinsky and Melissa Hahn</span></li><span data-dcnode-id="906" instrument_node="">
</span></ul><span data-dcnode-id="904" instrument_node="">
</span><h6 class="hed mbs mtm" data-dcnode-id="899"><span data-dcnode-id="903" instrument_node=""> </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2016/03/global-teams-should-have-office-visits-not-offsites"><span data-dcnode-id="902" instrument_node="">Global Teams Should Have Office Visits, Not Offsites</span></a><span data-dcnode-id="900" instrument_node=""> </span></h6><span data-dcnode-id="898" instrument_node="">
</span><div class="stream-item-info" data-dcnode-id="890"><span data-dcnode-id="897" instrument_node="">
</span><ul class="byline byline-list line-height-tight" data-dcnode-id="892"><span data-dcnode-id="896" instrument_node="">
</span><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Pamela Hinds</span></li><span data-dcnode-id="893" instrument_node="">
</span></ul><span data-dcnode-id="891" instrument_node="">
</span></div><span data-dcnode-id="889" instrument_node="">
</span></div><span data-dcnode-id="887" instrument_node="">
</span></div></li><span data-dcnode-id="884" instrument_node="">
</span></ul><span data-dcnode-id="882" instrument_node="">
</span></div><span data-dcnode-id="880" instrument_node="">
</span></article-promo><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">Make the norms clear, but be aware of who on the team might find it difficult to meet those expectations due to cultural backgrounds. You may need additional communication for those team members. For example, if you have established that team members must arrive at&nbsp;meetings by the designated time to ensure a prompt start (Western-style punctuality), you’ll need to reinforce that norm consistently across the group. The same goes for patterns of communication. Multicultural team members benefit from knowing what type of information they will receive when, and from having a regular rhythm for video conferences, teleconferences, email updates, and one-on-one discussions. This creates context and predictability that helps to compensate for those instances when team members are </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aperianglobal.com/technology-and-teamwork/" target="_blank"><span data-dcnode-id="876" instrument_node="">remote from one another</span></a><span data-dcnode-id="874" instrument_node="">. Of course, sometimes things change and adjustment is required, but in general, keeping a consistent, clear structure regarding work styles and expectations is a critical way to create a common-ground team culture.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="865"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Find ways to build personal bonds. </span></strong><span data-dcnode-id="869" instrument_node="">Both of us have found that one of the most powerful tools in easing potential conflict on a team is establishing personal connections. Naturally, different global cultures have different norms about relationship building.&nbsp;In some cultures, like the UK, it takes a long time for people to build a friendship; in other cultures, like </span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aperianglobal.com/one-meeting-in-brazil-three-perspectives/" target="_blank"><span data-dcnode-id="868" instrument_node="">Brazil</span></a><span data-dcnode-id="866" instrument_node="">, it seemingly happens overnight. Given this, you may not be able to encourage deep, personal relationships — but you can foster rapport and individual connections. Perhaps you discover that someone with a completely different background from you is also an amateur photographer, or you both have children who play the piano. You’d be surprised at the power of these personal bonds, especially on a multicultural team. Leaders must create conditions for these connections to form: Organize social events, pair quieter team members with vocal ones, or directly facilitate introductions between specific members who you think might have hidden commonalities. Chances are, the benefits will circle directly back to the team.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="854"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">When conflict arises, address it immediately.</span></strong><span data-dcnode-id="861" instrument_node=""> Conflict is inevitable in any team, let alone a multicultural one. If tension arises, address it quickly so that a small conflict doesn’t balloon into something impossible to manage. Leaders need to be capable of </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aperianglobal.com/inclusive-leadership-transforming-knowledge-into-action/" target="_blank"><span data-dcnode-id="860" instrument_node="">understanding multiple cultural perspectives</span></a><span data-dcnode-id="858" instrument_node=""> and serving as a cultural bridge between parties in conflict situations. This may require an understanding of </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2015/05/learning-the-language-of-indirectness" target="_blank"><span data-dcnode-id="857" instrument_node="">indirect as well as direct communication styles</span></a><span data-dcnode-id="855" instrument_node="">, and a readiness to have a frank group discussion or confidential side conversations, depending on the situation.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Trust is the glue that makes any team function at a high level, but it doesn’t happen magically, especially in the case of a team composed of culturally diverse members. With the motivation to make things work and the tips above, you should be in a great position to leverage the benefits of diversity while minimizing its challenges.</span></p><span data-dcnode-id="850" instrument_node="">
</span><span data-dcnode-id="848" instrument_node="">
