nt_node=""> </span><img alt="Site Logo" data-dcnode-id="411" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehfactor.com/wp-content/uploads/2018/08/site-logo.png&amp;raw"><span data-dcnode-id="410" instrument_node=""> </span></a></div><div class="stm_mobile__switcher stm_flex_last js_trigger__click" data-dcnode-id="401" data-element=".stm-header, .stm-header__overlay" data-toggle="false"><span data-dcnode-id="407" instrument_node=""> </span><span class="mbc" data-dcnode-id="406"></span><span data-dcnode-id="405" instrument_node=""> </span><span class="mbc" data-dcnode-id="404"></span><span data-dcnode-id="403" instrument_node=""> </span><span class="mbc" data-dcnode-id="402"></span></div></div></div></div><div class="site-content" data-dcnode-id="219"><div class="container no_vc_container" data-dcnode-id="220"><div class="stm_titlebox stm_titlebox_style_2 stm_titlebox_text-center" data-dcnode-id="391" style="width: 1024px; margin-left: -42px;"><div class="container" data-dcnode-id="392"><div class="stm_flex stm_flex_last stm_flex_center" data-dcnode-id="393"><div class="stm_titlebox__inner" data-dcnode-id="394"><h1 class="h1 stm_titlebox__title no_line text-transform stm_mgb_2" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node=""> Multicultural teams: How to cope with cultural-based challenges while transitioning to a global company</span></h1><div class="stm_titlebox__subtitle" data-dcnode-id="395"></div></div></div></div></div><div class="stm_single_post_layout_1" data-dcnode-id="221"><div class="" data-dcnode-id="222"><div class="stm_markup stm_markup_right stm_single_post" data-dcnode-id="223"><div class="stm_markup__content" data-dcnode-id="272"><div class="stm_single_post stm_single_post_style_1" data-dcnode-id="273"><h1 class="h2 text-transform" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Multicultural teams: How to cope with cultural-based challenges while transitioning to a global company</span></h1><div class="stm_post_details clearfix mbc wtc stm_mf" data-dcnode-id="372"><ul class="clearfix" data-dcnode-id="379"><li class="post_date" data-dcnode-id="384"><div class="no_deco wtc" data-dcnode-id="385" href="https://thehfactor.com/multicultural-teams-cope-cultural-based-challenges/"><span data-dcnode-id="388" instrument_node=""> </span><i class="stmicon-calendar3" data-dcnode-id="387"></i><span data-dcnode-id="386" instrument_node=""> February 8, 2019</span></div></li><li class="post_by" data-dcnode-id="380"><span data-dcnode-id="383" instrument_node=""> </span><i class="stmicon-user_b" data-dcnode-id="382"></i><span data-dcnode-id="381" instrument_node=""> Posted by: The H Factor</span></li></ul><div class="comments_num" data-dcnode-id="373"><span data-dcnode-id="378" instrument_node=""> </span><a class="wtc no_deco wtc_h" data-dcnode-id="374" href="#respond"><span data-dcnode-id="377" instrument_node=""> </span><i class="stmicon-comment3" data-dcnode-id="376"></i><span data-dcnode-id="375" instrument_node=""> No Comments </span></a></div></div><div class="post_thumbnail stm_mgb_32" data-dcnode-id="369"><span data-dcnode-id="371" instrument_node=""> </span><img alt="multicultural team" class="img-responsive fullimage wp-post-image" data-dcnode-id="370" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehfactor.com/wp-content/uploads/2018/11/rawpixel-558597-unsplash-1110x630.jpg&amp;raw" width="1110"></div><div class="stm_mgb_20 stm_single_post__content" data-dcnode-id="303"><div class="sharethis-inline-share-buttons" data-dcnode-id="368" style="margin-top: 0px; margin-bottom: 0px;"></div><p data-dcnode-id="365"><em data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Multicultural teams are no longer hard to find in today’s companies. They have evolved from an anecdote into a tendency due to economic and workforce globalization. However, how to manage a multicultural team is still a tough subject.</span></em></p><p data-dcnode-id="359"><em data-dcnode-id="360"><u data-dcnode-id="362"><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2006/11/managing-multicultural-teams"><span data-dcnode-id="364" instrument_node="">Harvard’s Business Review</span></a></u><span data-dcnode-id="361" instrument_node="">&nbsp;pointed out 4 problem categories that can create barriers to a multicultural team’s success:&nbsp;Direct Versus Indirect Communication,&nbsp;Trouble With Accents and Fluency, Differing Attitudes Towards Hierarchy and Authority and Conflicting Norms for Decision Making.</span></em></p><p data-dcnode-id="355"><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">The H Factor</span></strong><span data-dcnode-id="356" instrument_node=""> makes some proposals to effectively address all these issues:</span></p><h4 data-dcnode-id="352"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">1) Direct versus Indirect Communication:</span></strong></h4><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">There are two main communication styles in the workplace: direct and indirect. In direct communication (US Americans, Australians, and Germans), both literal truthfulness and efficiency in communication are highly valued and to some extent are a higher priority than personal or political sensitivities. We encourage giving frank discussions.</span></p><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">In indirect communication (Japanese, Chinese, and Indians), directly communicating negative information is seen as impolite and rude, especially in a business setting. To those who use the indirect communication style, diplomacy is the way. In this manner, solving problems is more productive if they handle them with tact and discretion.</span></p><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Having both styles within a team can create conflicts or miscommunications.&nbsp; For example, a Chinese co-worker might not be able to provide direct feedback to their US co-worker, the latter can get upset and perceive his Chinese colleague as not being frank. This can negatively impact team relationships and decrease business efficiency.</span></p><h5 data-dcnode-id="342"><span data-dcnode-id="345" instrument_node="">Our solution:&nbsp;</span><strong data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Establish a Company Language</span></strong></h5><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">To avoid communication issues within the company, it is important to raise awareness about different styles of communication within the multicultural team: both parties – direct &amp; indirect communicators – have to be aware of the other’s style and how each one works. Once this is adjusted, managers can make sure each team member knows how to speak the company’s selected language. You can do this through team building meetings or workshops on communication styles. The company is born with an inherent language that is usually the most convenient style for the business to grow. However, it is not always black or white, it can be a mixture of both styles.</span></p><h4 data-dcnode-id="337"><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">2)&nbsp;The trouble with Accents and Fluency:</span></strong></h4><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Non-native speakers of the official company language can feel uncomfortable in the workplace because they have difficulty conveying what they want to say. Some of them may even opt for not putting a voice to their ideas and keep their points to themselves. This automatically reduces the company’s point of views and the ability to debate about new ideas.</span></p><h5 data-dcnode-id="331"><span data-dcnode-id="334" instrument_node="">Our solution:&nbsp;</span><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Embrace and Leverage Diversity.</span></strong></h5><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Multicultural teams are composed of people from different social and professional cultures who work together towards a common goal. Make sure your employees focus on the final goal rather than on each other’s differences. Remind them that foreign accents are a sign of bravery.&nbsp;Through providing language courses or making the team practice their language, native co-workers will help them to improve their skills. The objective is to convert the issue into a synergy, which will promote language exchange and make the team grow culturally. Organizing company dinners, off sites or activities out of the office, in a non-business setting are all good instances that will help employees feel less pressured, more willing to practice languages, and strengthen team bonds.</span></p><h4 data-dcnode-id="326"><strong data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">3)&nbsp;Differing Attitudes towards Hierarchy and Authority:</span></strong></h4><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Hierarchical company culture is not unique: top-down, flat, adhocracies, clan cultures, market cultures, etc. All organizations choose or create the one that fits best with their corporate culture. Authority can be given by expertise, influenceability, punition or other critical resources. It is important to establish which ones are valid for each company because otherwise, some professionals could abuse their own resources and act on a position they do not have permission on. In every company, there is a person responsible for specific subjects. It is relevant to respect that ownership in order to avoid duplicities, overlaps and work strategically as a team.</span></p><h5 data-dcnode-id="320"><span data-dcnode-id="323" instrument_node="">Our solution:</span><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">&nbsp;Define a Protocol.</span></strong></h5><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">It is important to assure each team member understands how the communication works between company members. This way, it doesn’t matter where they come from. It is also imperative to clearly define corporate levels and structures, if any, through a protocol. This protocol should be part of your on-boarding program for each new employee. Giving them the tools and communication path will ease the interactions between team members and avoid conflicts.</span></p><h4 data-dcnode-id="315"><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">4)&nbsp;Conflicting Norms for Decision Making:</span></strong></h4><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Not all people use the same norms to make decisions. Norms are&nbsp;understandings that govern the behaviour of members of a society, team, or office. It is important that all members know and understand the acceptable group conducts. Consequently, they are able to act according to the company norms, this also empowers them to make acceptable decisions.</span></p><h5 data-dcnode-id="309"><span data-dcnode-id="312" instrument_node="">Our solution:&nbsp;</span><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Create Processes.</span></strong></h5><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Companies must create procedures for each decision and encourage personal responsibility. Communicate the procedure to your multicultural team, train them and make them learn the company steps. Processes should not be imposed – the “why” is important for their assimilation. Managers should accompany employees in their decisions to guide them.</span></p><p data-dcnode-id="304"><em data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">In short, any member is a valuable asset that brings a new perspective to the company. Although new ideas, cultural aspects, skills and experiences are enriching, it is important to guide and adapt all new perspectives into the company culture framework. Companies who embrace diversity and foster their multicultural team deserve that all members respect and agree to work according to the company ethos. Making everyone feel appreciated will make the difference and ultimately lead to success.</span></em></p></div><div class="clearfix" data-dcnode-id="302"></div><div class="stm_post_panel tbc" data-dcnode-id="297"><div class="stm_flex stm_flex_center stm_flex_last" data-dcnode-id="298"><div class="stm_single_post__tags" data-dcnode-id="301"></div><div class="stm_single_event__share" data-dcnode-id="299"><div class="sharethis-inline-share-buttons" data-dcnode-id="300"></div></div></div></div><div class="stm_author_box clearfix stm_mgb_50" data-dcnode-id="287"><div class="stm_author_box__avatar" data-dcnode-id="294"><span data-dcnode-id="296" instrument_node=""> </span><img alt="Avatar" class="avatar avatar-174 wp-user-avatar wp-user-avatar-174 photo avatar-default" data-dcnode-id="295" height="174" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehfactor.com/wp-content/uploads/2019/01/48274914_326536221410465_8217964525513605120_n-300x300.png&amp;raw" width="174"></div><div class="stm_author_box__info" data-dcnode-id="288"><div class="stm_author_box__name" data-dcnode-id="290"><span data-dcnode-id="293" instrument_node=""> Author: </span><strong data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">The H Factor</span></strong></div><div class="stm_author_box__content" data-dcnode-id="289"></div></div></div><div class="stm_post_comments" data-dcnode-id="274"><div class="comments-area" data-dcnode-id="275" id="comments"><div class="comment-respond" data-dcnode-id="276" id="respond"><h3 class="comment-reply-title" data-dcnode-id="282" id="reply-title">
