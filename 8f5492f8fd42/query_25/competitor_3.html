</span><div class="field field--name-field-caption field--type-text-long field--label-hidden caption field__item" data-dcnode-id="1579"><span class="caption__byline" data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Image by: </span></span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Opensource.com</span></p><span data-dcnode-id="1580" instrument_node="">

</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="1407"><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">A few weeks ago, I witnessed an interesting interaction between two work colleagues—Jason, who is from the United States; and Raj, who was visiting from India.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Raj typically calls into a daily standup meeting at 9:00am US Central Time from India, but since he was in the US, he and his teammates headed toward the scrum area for the meeting. Jason stopped Raj and said, “Raj, where are you going? Don’t you always call into the stand-up? It would feel strange if you don’t call in.” Raj responded, “Oh, is that so? No worries,” and headed back to his desk to call into the meeting.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">I went to Raj’s desk. “Hey, Raj, why aren’t you going to the daily standup?” Raj replied, “Jason asked me to call in.” Meanwhile, Jason was waiting for Raj to come to the standup.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">What happened here? Jason was obviously joking when he made the remark about Raj calling into the meeting. But how did Raj miss this?</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Jason’s statement was meant as a joke, but Raj took it literally. This was a clear example of a misunderstanding that occurred due to unfamiliarity with each other’s cultural context.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">I often encounter emails that end with “Please revert back to me.” At first, this phrase left me puzzled. I thought, "What changes do they want me to revert?" Finally, I figured out that “please revert” means “Please reply.”</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1552" instrument_node="">In his TED talk, “</span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DQIoAkFpN8wQ" target="_blank"><span data-dcnode-id="1551" instrument_node="">Managing Cross Cultural Remote Teams,</span></a><span data-dcnode-id="1549" instrument_node="">” Ricardo Fernandez describes an interaction with a South African colleague who ended an IM conversation with “I’ll call you just now.” Ricardo went back to his office and waited for the call. After fifteen minutes, he called his colleague: “Weren’t you going to call me just now?” The colleague responded, “Yes, I was going to call you just now.” That's when Ricardo realized that to his South African colleague, the phrase “just now” meant “sometime in the future.”</span></p><span data-dcnode-id="1547" instrument_node="">
</span><div class="embedded-callout-menu callout-float-right" data-dcnode-id="1499"><span data-dcnode-id="1546" instrument_node="">
</span><div class="view view-related-content-callout view-id-related_content_callout view-display-id-default" data-dcnode-id="1501"><span data-dcnode-id="1545" instrument_node="">
</span><div class="view-header" data-dcnode-id="1540"><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">More DevOps resources</span></p><span data-dcnode-id="1541" instrument_node="">
</span></div><span data-dcnode-id="1539" instrument_node="">
</span><div class="view-content" data-dcnode-id="1503"><span data-dcnode-id="1538" instrument_node="">
</span><div class="item-list" data-dcnode-id="1505"><span data-dcnode-id="1537" instrument_node="">
</span><ul data-dcnode-id="1507"><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1533"><a data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opensource.com/resources/devops%3Fintcmp%3D7013a00000263HlAAI"><span data-dcnode-id="1535" instrument_node="">What is DevOps?</span></a></li><span data-dcnode-id="1532" instrument_node="">
</span><li data-dcnode-id="1529"><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opensource.com/downloads/devops-hiring-guide%3Fintcmp%3D7013a00000263HlAAI"><span data-dcnode-id="1531" instrument_node="">The ultimate DevOps hiring guide</span></a></li><span data-dcnode-id="1528" instrument_node="">
</span><li data-dcnode-id="1525"><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opensource.com/downloads/devops-monitoring-guide%3Fintcmp%3D7013a00000263HlAAI"><span data-dcnode-id="1527" instrument_node="">DevOps monitoring tools guide</span></a></li><span data-dcnode-id="1524" instrument_node="">
</span><li data-dcnode-id="1521"><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opensource.com/downloads/devsecops%3Fintcmp%3D7013a00000263HlAAI"><span data-dcnode-id="1523" instrument_node="">Getting started with DevSecOps</span></a></li><span data-dcnode-id="1520" instrument_node="">
</span><li data-dcnode-id="1517"><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterprisersproject.com/cheat-sheet-devops-glossary%3Fintcmp%3D7013a00000263HlAAI"><span data-dcnode-id="1519" instrument_node="">Download the DevOps glossary</span></a></li><span data-dcnode-id="1516" instrument_node="">
</span><li data-dcnode-id="1513"><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ansible.com/resources/ebooks/ansible-for-devops%3Fintcmp%3D7013a00000263HlAAI"><span data-dcnode-id="1515" instrument_node="">eBook: Ansible for DevOps</span></a></li><span data-dcnode-id="1512" instrument_node="">
</span><li data-dcnode-id="1509"><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opensource.com/tags/devops%3Fsrc%3Ddevops_resource_menu2"><span data-dcnode-id="1511" instrument_node="">Latest DevOps articles</span></a></li><span data-dcnode-id="1508" instrument_node="">
</span></ul><span data-dcnode-id="1506" instrument_node="">
</span></div><span data-dcnode-id="1504" instrument_node="">
</span></div><span data-dcnode-id="1502" instrument_node="">
</span></div><span data-dcnode-id="1500" instrument_node="">
</span></div><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">In today's workplace, our colleagues may not be located in the same office, city, or even country. A growing number of tech companies have a global workforce comprised of employees with varied experiences and perspectives. This diversity allows companies to compete in the rapidly evolving technological environment.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">But geographically dispersed teams can face challenges. Managing and maintaining high-performing development teams is difficult even when the members are co-located; when team members come from different backgrounds and locations, that makes it even harder. Communication can deteriorate, misunderstandings can happen, and teams may stop trusting each other—all of which can affect the success of the company.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1491" instrument_node="">What factors can cause confusion in global communication? In her book, “</span><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/The-Culture-Map-Invisible-Boundaries/dp/1610392507" target="_blank"><span data-dcnode-id="1490" instrument_node="">The Culture Map</span></a><span data-dcnode-id="1488" instrument_node="">,” Erin Meyer presents eight scales into which all global cultures fit. We can use these scales to improve our relationships with international colleagues. She identifies the United States as a very low-context culture in the communication scale. In contrast, Japan is identified as a high-context culture.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">What does it mean to be a high- or low-context culture? In the United States, children learn to communicate explicitly: “Say what you mean; mean what you say” is a common principle of communication. On the other hand, Japanese children learn to communicate effectively by mastering the ability to “read the air.” That means they are able to read between the lines and pick up on social cues when communicating.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Most Asian cultures follow the high-context style of communication. Not surprisingly, the United States, a young country composed of immigrants, follows a low-context culture: Since the people who immigrated to the United States came from different cultural backgrounds, they had no choice but to communicate explicitly and directly.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><h2 data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The three R’s</span></h2><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">How can we overcome challenges in cross-cultural communication? Americans communicating with Japanese colleagues, for example, should pay attention to the non-verbal cues, while Japanese communicating with Americans should prepare for more direct language. If you are facing a similar challenge, follow these three steps to communicate more effectively and improve relationships with your international colleagues.</span></p><span data-dcnode-id="1474" instrument_node="">
</span><h3 data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Recognize the differences in cultural context</span></h3><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">The first step toward effective cross-cultural communication is to recognize that there are differences. Start by increasing your awareness of other cultures.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><h3 data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Respect the differences in cultural context</span></h3><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Once you become aware that differences in cultural context can affect cross-cultural communication, the next step is to respect these differences. When you notice a different style of communication, learn to embrace the difference and actively listen to the other person’s point of view.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><h3 data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Reconcile the differences in cultural context</span></h3><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Merely recognizing and respecting cultural differences is not enough; you must also learn how to reconcile the cultural differences. Understanding and being empathetic towards the other culture will help you reconcile the differences and learn how to use them to better advance productivity.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><h2 data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">5 ways to improve communications for cultural context</span></h2><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Over the years, I have incorporated various approaches, tips, and tricks to strengthen relationships among team members across the globe. These approaches have helped me overcome communication challenges with global colleagues. Here are a few examples:</span></p><span data-dcnode-id="1450" instrument_node="">
</span><h3 data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Always use video conferencing when communicating with global teammates</span></h3><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Studies show that about 55% of communication is non-verbal. Body language offers many subtle cues that can help you decipher messages, and video conferencing enables geographically dispersed team members to see each other. Videoconferencing is my default choice when conducting remote meetings.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><h3 data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Ensure that every team member gets an opportunity to share their thoughts and ideas</span></h3><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Although I prefer to conduct meetings using video conferencing, this is not always possible. If video conferencing is not a common practice at your workplace, it might take some effort to get everyone comfortable with the concept. Start by encouraging everyone to participate in audio meetings.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">One of our remote team members, who frequently met with us in audio conferences, mentioned that she often wanted to share ideas and contribute to the meeting but since we couldn’t see her and she couldn’t see us, she had no idea when to start speaking. If you are using audio conferencing, one way to mitigate this is to ensure that every team member gets an opportunity to share their ideas.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><h3 data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Learn from one another</span></h3><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Leverage your international friends to learn about their cultural context. This will help you interact more effectively with colleagues from these countries. I have friends from South Asia and South America who have helped me better understand their cultures, and this knowledge has helped me professionally.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">For programmers, I recommend conducting code reviews with your global peers. This will help you understand how those from different cultures give and receive feedback, persuade others, and make technical decisions.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><h3 data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Be empathetic</span></h3><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Empathy is the key to strong relationships. The more you are able to put yourself in someone else's shoes, the better able you will be to gain trust and build long-lasting connections. Encourage “water-cooler” conversations among your global colleagues by allocating the first few minutes of each meeting for small talk. This offers the additional benefit of putting everyone in a more relaxed mindset. If you manage a global team, make sure every member feels included in the discussion.</span></p><span data-dcnode-id="1420" instrument_node="">
</span><h3 data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Meet your global colleagues in person</span></h3><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">The best way to build long-lasting relationships is to meet your team members in person. If your company can afford it, arrange for this to happen. Meeting colleagues with whom you have been working will likely strengthen your relationship with them. The companies I have worked for have a strong record of periodically sending US team members to other countries and global colleagues to the US office.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Another way to bring teams together is to attend conferences. This not only creates educational and training opportunities, but you can also carve out some in-person team time.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">In today's increasingly global economy, it is becoming more important for companies to maintain a geographically diverse workforce to remain competitive. Although global teams can face communication challenges, it is possible to maintain a high-performing development team despite geographical and cultural differences. Share some of the techniques you use in the comments.</span></p><span data-dcnode-id="1408" instrument_node="">
</span></div><span data-dcnode-id="1406" instrument_node="">
