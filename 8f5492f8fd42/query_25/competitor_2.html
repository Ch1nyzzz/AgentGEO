</span><div class="ast-post-format- ast-no-thumb single-layout-1" data-dcnode-id="955"><span data-dcnode-id="1053" instrument_node="">
</span><header class="entry-header ast-no-thumbnail" data-dcnode-id="1021"><span data-dcnode-id="1052" instrument_node="">
</span><div class="ast-single-post-order" data-dcnode-id="1023"><span data-dcnode-id="1051" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1049" itemprop="headline"><span data-dcnode-id="1050" instrument_node="">Mapping out Cultural Differences on Teams</span></h1><div class="entry-meta" data-dcnode-id="1025"><span data-dcnode-id="1048" instrument_node=""> </span><span class="comments-link" data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">
</span><a data-dcnode-id="1045" href="#comments"><span data-dcnode-id="1046" instrument_node="">12 Comments</span></a><span data-dcnode-id="1044" instrument_node=""> </span></span><span data-dcnode-id="1042" instrument_node="">

			 / </span><span class="cat-links" data-dcnode-id="1036"><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erinmeyer.com/category/articles/" rel="category tag"><span data-dcnode-id="1041" instrument_node="">Articles</span></a><span data-dcnode-id="1039" instrument_node="">, </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erinmeyer.com/category/articles/insead-knowledge/" rel="category tag"><span data-dcnode-id="1038" instrument_node="">INSEAD Knowledge</span></a></span><span data-dcnode-id="1035" instrument_node=""> / By </span><span class="posted-by vcard author" data-dcnode-id="1027" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="1034" instrument_node=""> </span><a class="url fn n" data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erinmeyer.com/author/erin/" itemprop="url" rel="author" title="View all posts by Erin Meyer"><span data-dcnode-id="1033" instrument_node="">
</span><span class="author-name" data-dcnode-id="1031" itemprop="name"><span data-dcnode-id="1032" instrument_node="">Erin Meyer</span></span><span data-dcnode-id="1030" instrument_node="">
</span></a><span data-dcnode-id="1028" instrument_node="">
</span></span><span data-dcnode-id="1026" instrument_node="">
</span></div><span data-dcnode-id="1024" instrument_node=""> </span></div><span data-dcnode-id="1022" instrument_node="">
</span></header><span data-dcnode-id="1019" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="958" itemprop="text"><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">The way we are conditioned to see the world in our own culture seems obvious and commonplace. To maximise a multicultural team, managers should identify what is typical in their culture but different from others to open a dialogue of sharing, learning and understanding.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">During a course I conducted on multicultural negotiations, a young MBA student from Ukraine approached me during a break and said “Erin, you have been talking about the importance of cultural differences, but I have always believed that no matter where we come from, humans are fundamentally the same. Isn’t this true?”</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Of course the answer to this question is yes and I answered as such. At a deep level, no matter where we come from, we are driven by common physiological and psychological needs and motivations. Yet the culture in which we grow up in has a significant bearing on the ways we see communication patterns as effective or undesirable, to find certain arguments persuasive or lacking merit, to consider certain ways of making decisions or measuring time “natural” or “strange”.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">While leaders have always had to understand personality differences and manage how people interact with one another, as globalisation transforms the way we work we now need the ability to decode cultural differences in order to work effectively with clients, suppliers and colleagues around the world.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><h3 data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Mapping cultures</span></h3><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Olivier, a former student and vice president at automotive supplier Valeo, a French firm with big bases in Germany and Japan, and a growing presence in China, emailed me about his challenges working with colleagues across all four countries.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">“When I moved to China, I thought the difficulty would be in bridging the cultural differences between Asians and Europeans. And it is true that the Asian members of my team are uncomfortable with the way our French and German members publicly disagree with them and give them negative feedback. I’ve coached the team members on how to moderate their approaches and reactions to work more effectively together.</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">“But to my surprise, the most serious difficulties we have on the team are between the Chinese and the Japanese. The Chinese gripe that the Japanese are slow to make decisions, inflexible, and unwilling to change. The Japanese complain that the Chinese don’t think things through, make rash decisions, and seem to thrive in chaos. Not only do these two Asian groups have difficulty working together, but the Japanese in many ways behave more like the Germans than like the Chinese—something I never anticipated.”</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">As I’ve outlined in my book, The Culture Map, Olivier should start addressing his problem by creating a culture map across eight scales I have identified that show how cultures vary from one extreme to its opposite. By analysing the position of one culture relative to another, the scales can help you decode how culture influences behaviour.</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="987"><img alt="erin_meyer_multicultural_characteristics_chart" class="aligncenter wp-image-531 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="990" data-lazy-loaded="1" height="500" loading="eager" sizes="(max-width: 569px) 100vw, 569px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erinmeyer.com/wp-content/uploads/2016/01/erin_meyer_multicultural_characteristics_chart.jpg&amp;raw" srcset="https://erinmeyer.com/wp-content/uploads/2016/01/erin_meyer_multicultural_characteristics_chart.jpg 569w, https://erinmeyer.com/wp-content/uploads/2016/01/erin_meyer_multicultural_characteristics_chart-300x264.jpg 300w" width="569"><noscript data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">&lt;img class="aligncenter wp-image-531 size-full" src="https://erinmeyer.com/wp-content/uploads/2016/01/erin_meyer_multicultural_characteristics_chart.jpg" alt="erin_meyer_multicultural_characteristics_chart" width="569" height="500" srcset="https://erinmeyer.com/wp-content/uploads/2016/01/erin_meyer_multicultural_characteristics_chart.jpg 569w, https://erinmeyer.com/wp-content/uploads/2016/01/erin_meyer_multicultural_characteristics_chart-300x264.jpg 300w" sizes="(max-width: 569px) 100vw, 569px" /&gt;</span></noscript></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">In this example, which I did for Olivier, you can see that on several scales, the Chinese and Japanese cluster together. As he’d experienced, the Chinese and Japanese are both uncomfortable with direct feedback and open disagreement. On the other hand, France and Germany cluster towards the other side.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">However, when we look at deciding and scheduling, we’re able to identify the likely source of frustration for Olivier. Although Japan, like China is very hierarchical, it’s a consensual society where decisions are often made by the group in a bottom-up manner. That means decisions take longer, as input from everyone is gathered before decisions are made. By contrast, in China, decisions are most often made by the boss in a top-down fashion. Once the decision is made, there is a great rush towards the finish line.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Furthermore, the Japanese build plans and stick to them. Being organised and on time are values they share with their German colleagues and are rooted in culture. Germany, for example, was one of the first countries in the world to become heavily industrialised and it’s still a manufacturing-dominated economy. If a German factory worker turns up late for a shift, the cost is clear and calculable.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">In comparison, the Chinese tend to make decisions quickly and change plans often, valuing flexibility and adaptability.</span></p><span data-dcnode-id="974" instrument_node="">
</span><h3 data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">It comes down to awareness</span></h3><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">The next step for Olivier, having identified his team’s differences on the map, is to increase the awareness of his team members about how culture impacts their effectiveness. He might start by organising a team gathering where these issues are discussed openly and good humouredly over a dinner. Just as a fish doesn’t know it’s in water, people often find it difficult to see and recognise their own culture until they start comparing it with others.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">At a higher level, he could organise his team so there is less cultural homogeneity at each location by having Germans, French and Chinese all living and working together in Japan. He could also rotate his team members when possible, so they all spend a few months or even years in another location. Another valuable step could be hiring people who are bi-cultural or have extensive experience living in more than one culture.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">While sometimes cultural diversity on global teams creates fault lines, at other times the same level of diversity can be a great advantage. A project with lots of tight deadlines might be better off with people on your team who have strong linear-time preferences. If you have a client who is constantly changing their mind and serving him or her well requires flexibility, having team members who are flexible with time will help meet their needs. Having people with a frank feedback style are invaluable, but at other times, you might need a small group of people to give negative feedback to a sensitive and valued client. Here is an opportunity to call on those who are pros at indirect negative feedback.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">When you look at your team, consider not just the difficulties that might arise from the gaps but also the strengths that the differences provide. Managed with care, cultural diversity can become your team’s greatest asset.</span></p><span data-dcnode-id="959" instrument_node="">
</span></div><span data-dcnode-id="956" instrument_node="">
