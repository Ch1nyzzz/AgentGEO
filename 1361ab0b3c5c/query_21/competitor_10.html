</span><h2 data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Handmade tiles direct from Mexico.</span></h2><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2865"><span data-dcnode-id="2869" instrument_node="">Mexico has been famous for the quality of it's </span><b data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">handmade tiles</span></b><span data-dcnode-id="2866" instrument_node=""> for over 400 years. Examples of intricate tile makers' work can be seen on many public and private Mexican buildings. These beautiful wall tiles are unique, functional and practical. A vivid, distinctive and lively finish for any wall space.</span></p><span data-dcnode-id="2864" instrument_node="">
</span><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">The Mexican tiles that we stock are in a class of their own, the best quality and most affordable handmade tiles you will find anywhere. We have over 35 years experience with Mexican tiles and only supply hand made tiles of the finest quality. We offer fast delivery and ship worldwide.</span></p><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2838"><span data-dcnode-id="2860" instrument_node="">We stock handmade tiles in either 10cm or 5cm sizes. To order your tiles just scroll down on this page. You can also experiment with different hand made tile designs using our </span><a data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hammocks.co.uk/handmade-tiles-collage-creator.htm" title="Collage Creator"><span data-dcnode-id="2859" instrument_node="">"</span><u data-dcnode-id="2856"><b data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Collage Creator</span></b></u><span data-dcnode-id="2855" instrument_node="">"</span></a><span data-dcnode-id="2853" instrument_node=""> or, if you know your wall dimensions, use the </span><a data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hammocks.co.uk/handmade-tiles-wall-designer.htm" title="Tile Wall Designer"><span data-dcnode-id="2852" instrument_node="">"</span><u data-dcnode-id="2849"><b data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Tile Wall Designer</span></b></u><span data-dcnode-id="2848" instrument_node="">"</span></a><span data-dcnode-id="2846" instrument_node=""> or </span><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hammocks.co.uk/handmade-tiles-random-pattern-designer.htm" title="Random Tile Pattern Designer"><span data-dcnode-id="2845" instrument_node="">"</span><u data-dcnode-id="2842"><b data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Random Tile Pattern Designer</span></b></u><span data-dcnode-id="2841" instrument_node="">"</span></a><span data-dcnode-id="2839" instrument_node=""> to create unique, compelling, random hand made tile designs. Each application allows you to print your finished design.</span></p><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2827"><span data-dcnode-id="2836" instrument_node="">Click </span><a data-dcnode-id="2833" href="#mexican_tiles_10cm"><u data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">here</span></u></a><span data-dcnode-id="2832" instrument_node=""> for the 10cm tiles or </span><a data-dcnode-id="2829" href="#mexican_tiles_5cm"><u data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">here</span></u></a><span data-dcnode-id="2828" instrument_node=""> for the 5cm tiles.</span></p><span data-dcnode-id="2826" instrument_node="">

</span><p data-dcnode-id="239"><span class="dropside2" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">T</span></span><span data-dcnode-id="240" instrument_node="">here is nothing quite like a beautiful rich wall of handmade tiles. Compare the warm, intimate feel that comes from the irregular flame of a real fire to the static, uniform glow of an imitation gas fire. This is similar to the difference between an irregular, undulating wall of handmade tiles and the flat, regimented appearance of mass-produced, machine made tiles. One evokes a feeling of life and intimacy while the other is relatively sterile</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="234"><span class="dropside2" data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">D</span></span><span data-dcnode-id="235" instrument_node="">ecorative handmade tiles have been used throughout the ages to adorn palaces, tombs and important public and private buildings. Now is your chance to add a touch of real Mexico to your home with these beautiful handmade ceramic wall tiles. Each tile is unique and indelibly marked by the hands of our tile makers in Guanajuato who have been creating these handmade tiles for generations.</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="224"><span class="dropside2" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">T</span></span><span data-dcnode-id="230" instrument_node="">ry our </span><a data-dcnode-id="226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hammocks.co.uk/handmade-tiles-wall-designer.htm" title="Handmade Tile Wall Designer"><u data-dcnode-id="227"><b data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">drag and drop handmade tile wall designer</span></b></u></a><span data-dcnode-id="225" instrument_node=""> to experiment with different tile combinations for your own wall. A quick, easy and fun way to create your perfect hand made tile wall design.</span></p><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="214"><span class="dropside2" data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">T</span></span><span data-dcnode-id="220" instrument_node="">ry our </span><a data-dcnode-id="216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hammocks.co.uk/handmade-tiles-random-pattern-designer.htm" title="Handmade Tiles Random Pattern Designer"><u data-dcnode-id="217"><b data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">drag and drop handmade tile randomiser</span></b></u></a><span data-dcnode-id="215" instrument_node=""> to generate multiple random designs using selected tiles on a preset wall size. Create compelling, asymmetric random designs which tease and challenge the senses.</span></p><span data-dcnode-id="213" instrument_node="">
</span><p data-dcnode-id="209"><span class="dropside2" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">T</span></span><span data-dcnode-id="210" instrument_node="">he Mexican Hammock Company has been working with a small family-run tile making enterprise in central Mexico for the past 35 years or so. It's not all about hammocks. We are also a Bristol based tile supplier providing handmade tiles to both individuals and the trade throughout the UK and Europe. We aim to be competitive both in price and quality and are committed to providing excellent customer care.</span></p><span data-dcnode-id="208" instrument_node="">
