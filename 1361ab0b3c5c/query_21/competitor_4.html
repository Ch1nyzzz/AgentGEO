</span><p data-dcnode-id="3737"><span data-dcnode-id="3741" instrument_node="">Handmade rugs are definitely eco-friendly. They are made entirely from </span><a data-dcnode-id="3739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catalinarug.com/rug-encyclopedia/persian-rugs-oriental-rugs-guide/%23material"><span data-dcnode-id="3740" instrument_node="">all natural materials such as wool, cotton or silk</span></a><span data-dcnode-id="3738" instrument_node="">. No synthetic materials are used at all. Even the dyes are extracted from plant parts and other materials found in nature. The manner in which they are made also ensures that no effluents are released into the environment.</span></p><p data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">The entire process from beginning to end is clean and green. And because these rugs last for decades, there’s no need to throw it out and replace it with a new one, adding to the landfill.</span></p><span data-dcnode-id="3734" instrument_node=""> </span></div><span data-dcnode-id="3732" instrument_node="">

</span><p data-dcnode-id="3647"><strong data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">Warp &amp; Weft</span></strong></p><p data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">Every rug has a foundation which is composed of strong, durable threads that run its entire length and width.</span></p><p data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">The parallel series of threads that runs along the length is called the warp and the parallel series of threads that runs along the width is called the weft. The warp and the weft are stretched tautly around the loom to create a firm foundation for the pile.</span></p><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">The fineness of the weave is determined by the number of warps that are strung on the loom.</span></p><span data-dcnode-id="3640" instrument_node=""> </span></div><span data-dcnode-id="3638" instrument_node="">

</span><p data-dcnode-id="3610"><strong data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Pile</span></strong></p><p data-dcnode-id="3605"><span data-dcnode-id="3609" instrument_node="">The pile refers to the density of fibers that lay on top of the foundation. </span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catalinarug.com/rug-encyclopedia/persian-rugs-oriental-rugs-guide/%23material"><span data-dcnode-id="3608" instrument_node="">Most Persian rugs have a wool or silk pile</span></a><span data-dcnode-id="3606" instrument_node="">. The thickness of the rug is determined by the pile height, which is measured from the surface of the rug to its backing. Rugs with longer pile heights tend to be plusher.</span></p><p data-dcnode-id="3600"><span data-dcnode-id="3604" instrument_node="">In some </span><a data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catalinarug.com/rug-encyclopedia/origins-of-rugs/part-2-types-of-persian-rugs/"><span data-dcnode-id="3603" instrument_node="">types of rugs</span></a><span data-dcnode-id="3601" instrument_node=""> with more elaborate designs, the pile is deliberately cut short. This allows the every feature of the design to be seen more clearly.</span></p><p data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3597" instrument_node=""> </span></div><span data-dcnode-id="3595" instrument_node="">

</span><p data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">When looking for a handmade rug, you’ll hear a lot off discussions about Persian rugs and Oriental rugs. The first thing to understand is the difference between the two.</span></p><p data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">Only rugs produced in the region of Iran, which was formerly known as Persia, can be called Persian rugs. On the other hand, Oriental rugs produced in any of the Oriental countries including Afghanistan, India, China, Pakistan, and Iran. In other words, all Persian rugs are Oriental rugs but all Oriental rugs are not Persian rugs.</span></p><p data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">There are several aspects that set Persian rugs apart from Oriental rugs. Some of the characteristics of Persian rugs that are immediately noticeable are the wider palette of colors used as well as the larger array of motifs and elaborate patterns.</span></p><p data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">Also, Persian rugs are higher in quality in every way, from the materials and dyes used to the knotting techniques, complexity of the designs, and superior workmanship.</span></p><p data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">If you are looking specifically for a Persian rug, it’s important to stress this fact when you visit a rug store, whether online or offline.</span></p><span data-dcnode-id="3354" instrument_node=""> </span></div><span data-dcnode-id="3352" instrument_node="">

</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Although Persian rugs feature a vast variety of designs, patterns, and motifs, there are a few components that are common in all of them. The uniqueness of each rug lies in the way the weaver combines the various elements within their creation and the colors they use. This is what sets each rug apart from all others.</span></p><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">These are among the most common designs and patterns used in Persian rugs:</span></p><p data-dcnode-id="2637"><span data-dcnode-id="2662" instrument_node="">• Medallion</span><br data-dcnode-id="2661"><span data-dcnode-id="2660" instrument_node="">• Floral</span><br data-dcnode-id="2659"><span data-dcnode-id="2658" instrument_node="">• Hunting</span><br data-dcnode-id="2657"><span data-dcnode-id="2656" instrument_node="">• Geometrical</span><br data-dcnode-id="2655"><span data-dcnode-id="2654" instrument_node="">• Boteh</span><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node="">• Open field</span><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">• Allover</span><br data-dcnode-id="2649"><span data-dcnode-id="2648" instrument_node="">• Birds</span><br data-dcnode-id="2647"><span data-dcnode-id="2646" instrument_node="">• Herati</span><br data-dcnode-id="2645"><span data-dcnode-id="2644" instrument_node="">• Garden design</span><br data-dcnode-id="2643"><span data-dcnode-id="2642" instrument_node="">• Tribal</span><br data-dcnode-id="2641"><span data-dcnode-id="2640" instrument_node="">• Forest</span><br data-dcnode-id="2639"><span data-dcnode-id="2638" instrument_node="">• Panel</span></p><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">When looking for a Persian rug for your home, don’t let the various design terms and terminology confuse you. The key is to consider your current décor and decide whether you’re looking for a rug that complements it or acts to contrast it.</span></p><span data-dcnode-id="2634" instrument_node=""> </span></div><span data-dcnode-id="2632" instrument_node="">

</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Rectangular, square, round and oblong are the most common shapes you’ll find in Persian rugs. The best shape for your home will depend on where you intend to place the rug.</span></p><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">While a long runner rug will look good in the hallway, a smaller rectangular or round rug may be more appropriate in the kitchen, bathroom, kid’s bedroom or under the coffee table in the living room. You’ll need a larger rectangular or round rug if you want to place all of your living room furniture on the rug.</span></p><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">The best shape for your dining room will depend on the shape of your dining table. A rectangular rug is best for a rectangular table while a round rug will be more appropriate for a round dining table.</span></p><span data-dcnode-id="2192" instrument_node=""> </span></div><span data-dcnode-id="2190" instrument_node="">

</span><p data-dcnode-id="1921"><span data-dcnode-id="1925" instrument_node="">If you want to buy a rug, it is always best to opt for a handmade rug even though you will pay more for it. There are many </span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catalinarug.com/blog/7-reasons-why-your-next-rug-should-be-wool/"><span data-dcnode-id="1924" instrument_node="">reasons why handmade rugs are a better choice</span></a><span data-dcnode-id="1922" instrument_node="">:</span></p><ul data-dcnode-id="1906"><li data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Handmade rugs are more durable and can last a lifetime.</span></li><li data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Each handmade rug is created with passion and creativity.</span></li><li data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Handmade rugs narrate a story as artisans use skills passed down generations based on their interpretation of life and the skills they have acquired.</span></li><li data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Unlike machine made rugs, handmade rugs are unique. No two rugs will be the same as it depends on the artisan.</span></li><li data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Handmade rugs epitomize workmanship and artistry. An artisan has to be adept in his craft to create these stellar pieces.</span></li><li data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">A handmade rug will have minor imperfections, which give it character and uniqueness.</span></li><li data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Artisans use the best quality materials to weave handmade rugs.</span></li></ul><span data-dcnode-id="1905" instrument_node=""> </span></div><span data-dcnode-id="1903" instrument_node="">
