</span><span data-dcnode-id="3090" id="freeText1475416459575535880" style="display:none"><span data-dcnode-id="3091" instrument_node="">This is my first review, and I dedicate it to my friend, Margaret Unger, who suggested that I join Goodreads. If you love the Arts and Crafts movement as I do, and yearn to understand William Morris, then this is the book for you. I selected this book as my first to review because Morris was fascinated with Iceland and Margaret lives there. Morris learned Icelandic and translated some of the old epics into English. He visited Iceland twice when such a visit was a major undertaking. I reread MacCarthy's descriptions of Morris's visits recently, and was moved by her description of his love for the sometimes bleak beauty of that island. At 780 pages, I can't say it is a quick or easy read, but it is worth the effort.</span></span><span data-dcnode-id="3089" instrument_node="">

</span><span data-dcnode-id="2895" id="freeText2440566916434793959" style="display:none"><span data-dcnode-id="2905" instrument_node="">William Morris's wallpaper patterns are ubiquitous yet there is so much more to remember him by. McCarthy's biography pays homage to his genius(not a term I use lightly)and his warm, eccentric, erratic nature. His creative life is explored in detail - and what creativity he had! His output was outstanding, from epic poems, short stories and novels to tapestry, painting, furniture design, book-printing, calligraphy, philosophy, socialist treatises, running a company and, of course, a few wallpaper patterns.</span><br data-dcnode-id="2904"><br data-dcnode-id="2903"><span data-dcnode-id="2902" instrument_node="">McCarthy probes into the heartbreak he endured as his wife, Janey (the muse/model for many a pre-raphaelite painting) carried on an affair with his friend, Rossetti over a period of years. Rossetti comes across as a bit of a rotter in this book. Particularly nice is Morris's warm relationship with his two daughters.</span><br data-dcnode-id="2901"><br data-dcnode-id="2900"><span data-dcnode-id="2899" instrument_node="">One of the best things about the book was the inclusion of cartoons of Morris by his friend, Edward Burne Jones; these ridicule Morris in an affectionate, funny way and are a delight.</span><br data-dcnode-id="2898"><br data-dcnode-id="2897"><span data-dcnode-id="2896" instrument_node="">I agree with another reviewer that McCarthy's focus on his early years is a bit dry and cumbersome. Once that is done, and Morris grows into his creative powers, the book is wonderful. </span></span><span data-dcnode-id="2894" instrument_node="">

</span><span data-dcnode-id="2613" id="freeText10680316073045840845" style="display:none"><span data-dcnode-id="2621" instrument_node="">An avid reader of Mr. William Morris’ fiction and socio-political writing, an admirer of his craft and loving follower of his faith, I have contemplated this nonetheless fascinating account of Morris’ life with revolving feelings over the time it took me to complete my reading of it. The first part of the book is truly an elucidating and endearing journey through the poet’s early life and artistic rendezvous. Author Fiona MacCarthy knows her subject well, no doubt, and the book transpires both entertainment and well-supported information.</span><br data-dcnode-id="2620"><br data-dcnode-id="2619"><span data-dcnode-id="2618" instrument_node="">My only - I won’t say problem, surely; more like an hesitation with it, comes from the second part of the book, so to speak. Here, I find that the author is quick to accept a certain vision of Morris that is not clearly grounded, unless by specific assertions of her own making. MacCarthy’s account of Morris’ political leanings seems to border too much on a personal quest, and this becomes apparent with sure mentions of prior thought and early scrutinising of his political mindset. It’s possible that MacCarthy is trying to disturb early consensus among scholars regarding Morris’ statement for Marxism, but it is also possible that, in doing so, she drifts off into speculation that don’t quite fit with what Morris himself had to say – and did say – on certain subjects (for instance, anarchism).</span><br data-dcnode-id="2617"><br data-dcnode-id="2616"><span data-dcnode-id="2615" instrument_node="">In comparison to countless other biographies on William Morris, Fiona MacCarthy’s book represents a fresh and, in many respects, deserving new take on this person of note. It rivals E. P. Thompson’s biography in its love and respect for Morris, his work and thought, even though, like Thompson’s work, it is not without its faults. I recommend that this book be read in light draughts, coupled with readings of Morris’s own writings. </span><br data-dcnode-id="2614"></span><span data-dcnode-id="2612" instrument_node="">

</span><span data-dcnode-id="2449" id="freeText4313443573993491219" style="display:none"><span data-dcnode-id="2450" instrument_node="">I first discovered William Morris by reading his wonderful fantasy novels (The Sundering Flood, The Well at the Worlds End, The Water of the Wondrous Isles and The Wood Beyond the World) published by Ballantine books in the late 1960's and early 1970's. Later I acquired a Morris Chair (designed by William Morris, one of the first reclining chairs) and became interested in the Arts and Crafts moment (of which Morris is considered a progenitor). Over the years I have seen Morris wallpapers, furniture, and artwork at museums, especially in the UK. I found this 1995 biography of Morris at a local book sale and decided it was time I learned more of this mans life. If you ever read a biography of someone you admire, be prepared to find out they may be both more and less than you imagined as a person. Morris was brilliant, often difficult, wildly passionate about art and politics, oddly charismatic, a bit of a bully, he had either some type of mental illness or very bad impulse control, and with all of this, the man was far ahead of his time, was able to laugh at himself, pretty much invented the modern fantasy novel (along with Lord Dunsany and George MacDonald) and his vision for a fairer, more humane world is still unfinished business. While I support his humanitarian ideas, I did find the chapters on his Socialist/Communist/Anarchist involvement rather tedious and sadly know the dismal outcome of these ideas. If you are interested in William Morris, the Arts and Crafts movement or the history of English Socialism, there is much here for you, I found not rather rewarding and learned a great deal.</span></span><span data-dcnode-id="2448" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="2384" title="really liked it"><span class="staticStar p10" data-dcnode-id="2389" size="15x15"><span data-dcnode-id="2390" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="2388" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2387" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2386" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2385" size="15x15"></span></span><span data-dcnode-id="2383" instrument_node="">

</span><span data-dcnode-id="2374" id="freeTextContainer18285327553205590434"><span data-dcnode-id="2378" instrument_node="">I have a love/hate relationship with William Morris and I had a love/hate relationship with Fiona MacCarthy's biography.</span><br data-dcnode-id="2377"><br data-dcnode-id="2376"><span data-dcnode-id="2375" instrument_node="">William Morris was one of those volcanic Victorian personalities - stupendously energetic, deeply moral, highly persuasive, dazzlingly brilliant, massively influential, greatly change-making - like W. E. Gladstone, Isambard Kingdom Brunel, Charles Darwin, Henry Cole, Charles Dickens and Florence Nightingale. The Victorian era threw up people like that. Morris's energy was legen</span></span><span data-dcnode-id="2373" instrument_node="">
</span><span data-dcnode-id="2349" id="freeText18285327553205590434" style="display:none"><span data-dcnode-id="2372" instrument_node="">I have a love/hate relationship with William Morris and I had a love/hate relationship with Fiona MacCarthy's biography.</span><br data-dcnode-id="2371"><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node="">William Morris was one of those volcanic Victorian personalities - stupendously energetic, deeply moral, highly persuasive, dazzlingly brilliant, massively influential, greatly change-making - like W. E. Gladstone, Isambard Kingdom Brunel, Charles Darwin, Henry Cole, Charles Dickens and Florence Nightingale. The Victorian era threw up people like that. Morris's energy was legendary. He did six things at once and he wanted to do everything for himself: designing, writing poetry, embroidery, wood-engraving, dyeing, printing, lecturing, preserving old buildings and revolutionary politics. Physically he was remarkable: short and stout, scruffy, loud, rapid in his movements and subject to rages, which Fiona MacCarthy thinks were a form of epilepsy because they were followed by trances and forgetfulness. When he died aged 62, his doctor said he died of being William Morris.</span><br data-dcnode-id="2368"><br data-dcnode-id="2367"><span data-dcnode-id="2366" instrument_node="">It's not without significance that his first intention was to go into holy orders, and his life was a moral crusade against ugliness and injustice. He said that he was motivated by a hatred of modern civilisation. In 1861, at the age of 26, he started his company, Morris, Marshall, Faulkner &amp; Co. with great self-confidence and rapidly won decorating and furnishing contracts for ecclesiastical and institutional buildings - one of his earliest jobs was St James's Palace. By the time of his death in 1896, every house of taste had some Morris wallpaper or Morris furniture in it. He was the dominant influence in the Arts and Crafts Movement, which was at its height from about 1880 to 1914. He was probably a greater inspiration to the early members of the Labour Party than Karl Marx. His approach to design and manufacturing revolutionised the teaching of art in Britain and his influence was felt in the art schools right up until the end of the Second World War.</span><br data-dcnode-id="2365"><br data-dcnode-id="2364"><span data-dcnode-id="2363" instrument_node="">So Morris was a man of enormous significance in Britain - and, indeed overseas: he was looked up to by design reformers in Europe, America and Japan - and he's a man whom it's hard not to love. But he was backward-looking and he encouraged Britain to be backward-looking too. He hated modern society, hated the railways, hated the factory system, hated the city, hated the division of labour and wanted everyone to be a craftsman. His inspiration was a fantasy of the Middle Ages drawn from Chaucer and the Morte d'Arthur. His first reading was The Waverley Novels, which he had completed by the age of seven. He and his Arts and Crafts Followers were, to a large extent, gentlemen with a contempt for trade and commerce. His ideal society, as described in "News from Nowhere" was a ridiculous fantasy of tiny craft workshops, no government, no police, no prisons, no religion, no marriage. It was written not in his adolescence but towards the end of his life as a mature statement of his creed. You cannot take it seriously.</span><br data-dcnode-id="2362"><br data-dcnode-id="2361"><span data-dcnode-id="2360" instrument_node="">His influence as a designer is impossible to ignore. His wallpaper designs have never been out of print. He is hugely popular, though he was not unique. The revolt against the design excesses of the Great Exhibition of 1851, ornate, overblown and ugly, was actually begun by Henry Cole, the very man who organised the Exhibition. His contemporary, Owen Jones, produced a large illustrated "Grammar of Ornament" that advocated the flat, simple designs that Morris produced. Every designer in the 19th century read it and they continue to read it in modern editions. Jones's protege, Christopher Dresser, went further than him and some of his designs from the 1880s are so modern-looking that they appear to have been made in the 1930s. Morris's superficially attractive craft ideas were not accepted by all designers. Even though he was a Master of the Art Workers Guild, Lewis Foreman Day argued against the Arts and Crafts idea that every artisan should be a designer and every designer an artisan, because designing and making were specialised skills and you could not do either well if you did not concentrate on one or the other. </span><br data-dcnode-id="2359"><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">Graham Wallas, an admirer of Morris and later a founder of the London School of Economics, shot Morris's economics to pieces: "Once, while I listened to him lecturing, I made a rough calculation that the citizens of his commonwealth, in order to produce by the methods he advocated the quantity of beautiful and delicious tilings which they were to enjoy, would have to work about two hundred hours a week. It was only the same fact looked at from another point of view which made it impossible for any of Morris's workmen, or indeed for anyone at all whose income was near the present English average, to buy the products either of Morris's workshop at Merton or of his Kelmscott Press."</span><br data-dcnode-id="2356"><br data-dcnode-id="2355"><span data-dcnode-id="2354" instrument_node="">Fiona MacCarthy has written probably the best biography of Morris. It covers Morris as designer, poet, political activist and man. It's subtitled "A Life for our Time". But Morris, in my humble opinion, has nothing to offer our time. After he died, his influence on design in Britain was wholly negative and held up progress for fifty years. The initiative passed rapidly to Germany and Britain became an Arts and Crafts backwater. The design lessons had been learned and were being applied to industry. His socialism was woolly and romantic and had no practical application. His idea of a craft-based economy, which pervaded the crafts in Britain until the 1970s, was reactionary and irrelevant. MacCarthy does well with Morris's poetry and novels, which are of variably quality, and admits that he wrote verse too easily - 1,000 lines a day was normal for him. </span><br data-dcnode-id="2353"><br data-dcnode-id="2352"><span data-dcnode-id="2351" instrument_node="">This is an immensely warm and readable biography of a great but flawed individual. MacCarthy's passion for Morris and her belief in his ideals makes it a good read, though, for myself, I would have preferred a more critical account.</span><br data-dcnode-id="2350"></span><span data-dcnode-id="2348" instrument_node="">

</span><span data-dcnode-id="1982" id="freeText7219181229451503004" style="display:none"><span data-dcnode-id="1983" instrument_node="">I'm still reading it, having gotten bogged down in the chapters about his politics, but as a good comprehensive biography of Morris, it is perfect. Although I could have used less inclusion of Dante Gabriel Rossetti's opinions and cartoons about Morris; seeing as he was cuckolding Morris, I don't see how his views about him can be taken with anything but a large dose of rock salt. It almost seems as though, big Morris fan that she is, MacCarthy is afraid of seeming too partisan, and throws in all the Rossetti insults to keep things balanced. But honestly, I really wish she had felt satisfied with including just a representative few, rather than inundating the chapters with them. Since I have very little time for Rossetti the man, I had even less interest in his nonsense than others might who like him better. The political chapters are good. But with all the political nonsense going on in our own time, I just haven't got the stomach for 19th century stuff. I'll get back to it after the election, hopefully.</span></span><span data-dcnode-id="1981" instrument_node="">
