"2" data-dcnode-id="3029" style="background-color: #b0c4de"><span data-dcnode-id="3030" instrument_node="">Background information</span></th></tr><tr data-dcnode-id="3016"><th class="infobox-label" data-dcnode-id="3026" scope="row"><span data-dcnode-id="3027" instrument_node="">Born</span></th><td class="infobox-data" data-dcnode-id="3017"><span data-dcnode-id="3021" style="display:none"><span data-dcnode-id="3025" instrument_node=""> (</span><span class="bday" data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">1938-05-26</span></span><span data-dcnode-id="3022" instrument_node="">) </span></span><span data-dcnode-id="3020" instrument_node="">May 26, 1938</span><span class="noprint ForceAgeToShow" data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node=""> (age&nbsp;83)</span></span></td></tr><tr data-dcnode-id="3011"><th class="infobox-label" data-dcnode-id="3014" scope="row"><span data-dcnode-id="3015" instrument_node="">Origin</span></th><td class="infobox-data" data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">American</span></td></tr><tr data-dcnode-id="3005"><th class="infobox-label" data-dcnode-id="3008" scope="row"><span class="nowrap" data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Occupations</span></span></th><td class="infobox-data role" data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">Composer, Pianist</span></td></tr></tbody></table><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="3001" style="display:none"><span data-dcnode-id="3002" instrument_node="">Musical artist</span></div><span data-dcnode-id="3000" instrument_node="">
</span><p data-dcnode-id="2968"><b data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">William Elden Bolcom</span></b><span data-dcnode-id="2997" instrument_node=""> (born May 26, 1938) is an American </span><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Composer" title="Composer"><span data-dcnode-id="2996" instrument_node="">composer</span></a><span data-dcnode-id="2994" instrument_node=""> and </span><a data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Piano" title="Piano"><span data-dcnode-id="2993" instrument_node="">pianist</span></a><span data-dcnode-id="2991" instrument_node="">. He has received the </span><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize" title="Pulitzer Prize"><span data-dcnode-id="2990" instrument_node="">Pulitzer Prize</span></a><span data-dcnode-id="2988" instrument_node="">, the National Medal of Arts, a</span><sup class="reference" data-dcnode-id="2985" id="cite_ref-Bolcom_ND_1-0"><a data-dcnode-id="2986" href="#cite_note-Bolcom_ND-1"><span data-dcnode-id="2987" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2984" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grammy_Award" title="Grammy Award"><span data-dcnode-id="2983" instrument_node="">Grammy Award</span></a><span data-dcnode-id="2981" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="2979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detroit_Music_Award" title="Detroit Music Award"><span data-dcnode-id="2980" instrument_node="">Detroit Music Award</span></a><span data-dcnode-id="2978" instrument_node=""> and was named 2007 Composer of the Year by Musical America. He taught composition at the </span><a data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Michigan" title="University of Michigan"><span data-dcnode-id="2977" instrument_node="">University of Michigan</span></a><span data-dcnode-id="2975" instrument_node=""> from 1973 until 2008. He is married to </span><a data-dcnode-id="2973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mezzo-soprano" title="Mezzo-soprano"><span data-dcnode-id="2974" instrument_node="">mezzo-soprano</span></a><span data-dcnode-id="2972" instrument_node=""> </span><a data-dcnode-id="2970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joan_Morris" title="Joan Morris"><span data-dcnode-id="2971" instrument_node="">Joan Morris</span></a><span data-dcnode-id="2969" instrument_node="">.

</span><h2 data-dcnode-id="2868"><span class="mw-headline" data-dcnode-id="2876" id="Early_life_and_education"><span data-dcnode-id="2877" instrument_node="">Early life and education</span></span><span class="mw-editsection" data-dcnode-id="2869"><span class="mw-editsection-bracket" data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">[</span></span><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Bolcom%26action%3Dedit%26section%3D1%26editintro%3DTemplate%3ABLP_editintro" title="Edit section: Early life and education"><span data-dcnode-id="2873" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2825"><span data-dcnode-id="2866" instrument_node="">Bolcom was born in </span><a class="mw-redirect" data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seattle%2C_Washington" title="Seattle, Washington"><span data-dcnode-id="2865" instrument_node="">Seattle, Washington</span></a><span data-dcnode-id="2863" instrument_node="">. At age 11, he entered the </span><a data-dcnode-id="2861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Washington" title="University of Washington"><span data-dcnode-id="2862" instrument_node="">University of Washington</span></a><span data-dcnode-id="2860" instrument_node=""> to study </span><a data-dcnode-id="2858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Musical_composition" title="Musical composition"><span data-dcnode-id="2859" instrument_node="">composition</span></a><span data-dcnode-id="2857" instrument_node=""> privately with </span><a data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Frederick_McKay" title="George Frederick McKay"><span data-dcnode-id="2856" instrument_node="">George Frederick McKay</span></a><span data-dcnode-id="2854" instrument_node=""> and </span><a data-dcnode-id="2852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Verrall" title="John Verrall"><span data-dcnode-id="2853" instrument_node="">John Verrall</span></a><span data-dcnode-id="2851" instrument_node=""> and </span><a data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Piano" title="Piano"><span data-dcnode-id="2850" instrument_node="">piano</span></a><span data-dcnode-id="2848" instrument_node=""> with Madame Berthe Poncy Jacobson. "He later studied with </span><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darius_Milhaud" title="Darius Milhaud"><span data-dcnode-id="2847" instrument_node="">Darius Milhaud</span></a><span data-dcnode-id="2845" instrument_node=""> at </span><a data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mills_College" title="Mills College"><span data-dcnode-id="2844" instrument_node="">Mills College</span></a><span data-dcnode-id="2842" instrument_node=""> while working on his Master of Arts degree, with </span><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leland_Smith" title="Leland Smith"><span data-dcnode-id="2841" instrument_node="">Leland Smith</span></a><span data-dcnode-id="2839" instrument_node=""> at </span><a data-dcnode-id="2837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanford_University" title="Stanford University"><span data-dcnode-id="2838" instrument_node="">Stanford University</span></a><span data-dcnode-id="2836" instrument_node=""> while working on his D.M.A., and with </span><a data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olivier_Messiaen" title="Olivier Messiaen"><span data-dcnode-id="2835" instrument_node="">Olivier Messiaen</span></a><span data-dcnode-id="2833" instrument_node=""> at the </span><a class="mw-redirect" data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Conservatoire" title="Paris Conservatoire"><span data-dcnode-id="2832" instrument_node="">Paris Conservatoire</span></a><span data-dcnode-id="2830" instrument_node="">, where he received the 2ème Prix de Composition".</span><sup class="reference" data-dcnode-id="2827" id="cite_ref-Bolcom2017_2-0"><a data-dcnode-id="2828" href="#cite_note-Bolcom2017-2"><span data-dcnode-id="2829" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2826" instrument_node="">
</span></p><span data-dcnode-id="2824" instrument_node="">
</span><h2 data-dcnode-id="2814"><span class="mw-headline" data-dcnode-id="2822" id="Career"><span data-dcnode-id="2823" instrument_node="">Career</span></span><span class="mw-editsection" data-dcnode-id="2815"><span class="mw-editsection-bracket" data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">[</span></span><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Bolcom%26action%3Dedit%26section%3D2%26editintro%3DTemplate%3ABLP_editintro" title="Edit section: Career"><span data-dcnode-id="2819" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2813" instrument_node="">
</span><p data-dcnode-id="2773"><span data-dcnode-id="2812" instrument_node="">Bolcom won the </span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulitzer_Prize" title="Pulitzer Prize"><span data-dcnode-id="2811" instrument_node="">Pulitzer Prize</span></a><span data-dcnode-id="2809" instrument_node=""> for music in 1988 for </span><i data-dcnode-id="2806"><a class="mw-redirect" data-dcnode-id="2807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/12_New_Etudes_for_Piano" title="12 New Etudes for Piano"><span data-dcnode-id="2808" instrument_node="">12 New Etudes for Piano</span></a></i><span data-dcnode-id="2805" instrument_node="">.</span><sup class="reference" data-dcnode-id="2802" id="cite_ref-Pulitzer1988_3-0"><a data-dcnode-id="2803" href="#cite_note-Pulitzer1988-3"><span data-dcnode-id="2804" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2801" instrument_node=""> In the fall of 1994, he was named the </span><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ross_Lee_Finney" title="Ross Lee Finney"><span data-dcnode-id="2800" instrument_node="">Ross Lee Finney</span></a><span data-dcnode-id="2798" instrument_node=""> Distinguished University Professor of Composition at the </span><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Michigan" title="University of Michigan"><span data-dcnode-id="2797" instrument_node="">University of Michigan</span></a><span data-dcnode-id="2795" instrument_node="">.  In 2006, he was awarded the </span><a data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Medal_of_Arts" title="National Medal of Arts"><span data-dcnode-id="2794" instrument_node="">National Medal of Arts</span></a><span data-dcnode-id="2792" instrument_node="">. Notable students include </span><a data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabriela_Lena_Frank" title="Gabriela Lena Frank"><span data-dcnode-id="2791" instrument_node="">Gabriela Lena Frank</span></a><span data-dcnode-id="2789" instrument_node="">, </span><a data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carter_Pann" title="Carter Pann"><span data-dcnode-id="2788" instrument_node="">Carter Pann</span></a><span data-dcnode-id="2786" instrument_node="">, </span><a data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elena_Ruehr" title="Elena Ruehr"><span data-dcnode-id="2785" instrument_node="">Elena Ruehr</span></a><span data-dcnode-id="2783" instrument_node="">, </span><a data-dcnode-id="2781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Derek_Bermel" title="Derek Bermel"><span data-dcnode-id="2782" instrument_node="">Derek Bermel</span></a><span data-dcnode-id="2780" instrument_node="">, </span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joel_Puckett" title="Joel Puckett"><span data-dcnode-id="2779" instrument_node="">Joel Puckett</span></a><span data-dcnode-id="2777" instrument_node="">, and </span><a data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_T._Little" title="David T. Little"><span data-dcnode-id="2776" instrument_node="">David T. Little</span></a><span data-dcnode-id="2774" instrument_node="">.
</span></p><p data-dcnode-id="2755"><span data-dcnode-id="2772" instrument_node="">As a pianist, Bolcom has performed and recorded frequently in collaboration with Joan Morris, whom he married in 1975.</span><sup class="reference" data-dcnode-id="2769" id="cite_ref-GroveDict2001_Bolcom_4-0"><a data-dcnode-id="2770" href="#cite_note-GroveDict2001_Bolcom-4"><span data-dcnode-id="2771" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2768" instrument_node=""> They have recorded more than two dozen albums together, beginning with the Grammy-nominated </span><i data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">After the Ball,</span></i><span data-dcnode-id="2765" instrument_node=""> a collection of popular songs from around the turn of the 20th century. Their primary specialties in both concerts and recordings are show tunes, parlor, and popular songs from the late 19th and early 20th century by </span><a data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Russell_%28musician%29" title="Henry Russell (musician)"><span data-dcnode-id="2764" instrument_node="">Henry Russell</span></a><span data-dcnode-id="2762" instrument_node="">, </span><a data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Clay_Work" title="Henry Clay Work"><span data-dcnode-id="2761" instrument_node="">Henry Clay Work</span></a><span data-dcnode-id="2759" instrument_node=""> and others, and </span><a data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cabaret" title="Cabaret"><span data-dcnode-id="2758" instrument_node="">cabaret</span></a><span data-dcnode-id="2756" instrument_node=""> songs. 
</span></p><p data-dcnode-id="2739"><span data-dcnode-id="2754" instrument_node="">As a soloist, Bolcom has recorded his own compositions, as well as music by </span><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Gershwin" title="George Gershwin"><span data-dcnode-id="2753" instrument_node="">George Gershwin</span></a><span data-dcnode-id="2751" instrument_node="">, Milhaud</span><sup class="reference" data-dcnode-id="2748" id="cite_ref-GroveDict2001_Bolcom_4-1"><a data-dcnode-id="2749" href="#cite_note-GroveDict2001_Bolcom-4"><span data-dcnode-id="2750" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2747" instrument_node=""> and several of the classic </span><a data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ragtime" title="Ragtime"><span data-dcnode-id="2746" instrument_node="">ragtime</span></a><span data-dcnode-id="2744" instrument_node=""> composers. His compositions have been recognized and highlighted at Michigan State University in their Michigan Writers Series.</span><sup class="reference" data-dcnode-id="2741" id="cite_ref-MathsonETAL2002_5-0"><a data-dcnode-id="2742" href="#cite_note-MathsonETAL2002-5"><span data-dcnode-id="2743" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2740" instrument_node="">
</span></p><span data-dcnode-id="2738" instrument_node="">
</span><h2 data-dcnode-id="2728"><span class="mw-headline" data-dcnode-id="2736" id="Works"><span data-dcnode-id="2737" instrument_node="">Works</span></span><span class="mw-editsection" data-dcnode-id="2729"><span class="mw-editsection-bracket" data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">[</span></span><a data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Bolcom%26action%3Dedit%26section%3D3%26editintro%3DTemplate%3ABLP_editintro" title="Edit section: Works"><span data-dcnode-id="2733" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2727" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2720" role="note"><span data-dcnode-id="2724" instrument_node="">For a more comprehensive list, see </span><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_compositions_by_William_Bolcom" title="List of compositions by William Bolcom"><span data-dcnode-id="2723" instrument_node="">List of compositions by William Bolcom</span></a><span data-dcnode-id="2721" instrument_node="">.</span></div><span data-dcnode-id="2719" instrument_node="">
</span><p data-dcnode-id="2689"><span data-dcnode-id="2718" instrument_node="">Bolcom's earliest compositions were written when he was around eleven years old; his early influences include </span><a data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roy_Harris" title="Roy Harris"><span data-dcnode-id="2717" instrument_node="">Roy Harris</span></a><span data-dcnode-id="2715" instrument_node=""> and </span><a data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/B%25C3%25A9la_Bart%25C3%25B3k" title="Béla Bartók"><span data-dcnode-id="2714" instrument_node="">Béla Bartók</span></a><span data-dcnode-id="2712" instrument_node="">. His compositions from around 1960 employed a modified </span><a data-dcnode-id="2710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serialism" title="Serialism"><span data-dcnode-id="2711" instrument_node="">serial technique</span></a><span data-dcnode-id="2709" instrument_node="">, under the influence of </span><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_Boulez" title="Pierre Boulez"><span data-dcnode-id="2708" instrument_node="">Pierre Boulez</span></a><span data-dcnode-id="2706" instrument_node="">, </span><a data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karlheinz_Stockhausen" title="Karlheinz Stockhausen"><span data-dcnode-id="2705" instrument_node="">Karlheinz Stockhausen</span></a><span data-dcnode-id="2703" instrument_node="">, and </span><a data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luciano_Berio" title="Luciano Berio"><span data-dcnode-id="2702" instrument_node="">Luciano Berio</span></a><span data-dcnode-id="2700" instrument_node="">, whose music he particularly admired. In the 1960s he gradually began to embrace an eclectic use of a wider variety of musical styles. His goal has been to erase boundaries between </span><a data-dcnode-id="2698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_music" title="Popular music"><span data-dcnode-id="2699" instrument_node="">popular music</span></a><span data-dcnode-id="2697" instrument_node=""> and </span><a data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_music" title="Art music"><span data-dcnode-id="2696" instrument_node="">art music</span></a><span data-dcnode-id="2694" instrument_node="">.</span><sup class="reference" data-dcnode-id="2691" id="cite_ref-GroveDict2001_Bolcom_4-2"><a data-dcnode-id="2692" href="#cite_note-GroveDict2001_Bolcom-4"><span data-dcnode-id="2693" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2690" instrument_node="">
</span></p><p data-dcnode-id="2618"><span data-dcnode-id="2688" instrument_node="">He has composed four major operas. Three of them, </span><i data-dcnode-id="2685"><a data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/McTeague_%28opera%29" title="McTeague (opera)"><span data-dcnode-id="2687" instrument_node="">McTeague</span></a></i><span data-dcnode-id="2684" instrument_node="">, </span><i data-dcnode-id="2681"><a data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_View_from_the_Bridge" title="A View from the Bridge"><span data-dcnode-id="2683" instrument_node="">A View from the Bridge</span></a></i><span data-dcnode-id="2680" instrument_node="">, and </span><i data-dcnode-id="2677"><a data-dcnode-id="2678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Wedding_%28opera%29" title="A Wedding (opera)"><span data-dcnode-id="2679" instrument_node="">A Wedding</span></a></i><span data-dcnode-id="2676" instrument_node=""> were commissioned and premiered by the </span><a data-dcnode-id="2674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyric_Opera_of_Chicago" title="Lyric Opera of Chicago"><span data-dcnode-id="2675" instrument_node="">Lyric Opera of Chicago</span></a><span data-dcnode-id="2673" instrument_node=""> and conducted by </span><a data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dennis_Russell_Davies" title="Dennis Russell Davies"><span data-dcnode-id="2672" instrument_node="">Dennis Russell Davies</span></a><span data-dcnode-id="2670" instrument_node="">. All of these were composed with librettist </span><a data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arnold_Weinstein" title="Arnold Weinstein"><span data-dcnode-id="2669" instrument_node="">Arnold Weinstein</span></a><span data-dcnode-id="2667" instrument_node="">, sometimes in collaboration with other writers. </span><i data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">McTeague</span></i><span data-dcnode-id="2664" instrument_node="">, based on the </span><a data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/McTeague" title="McTeague"><span data-dcnode-id="2663" instrument_node="">1899 novel</span></a><span data-dcnode-id="2661" instrument_node=""> by </span><a data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_Norris" title="Frank Norris"><span data-dcnode-id="2660" instrument_node="">Frank Norris</span></a><span data-dcnode-id="2658" instrument_node="">, with libretto by Weinstein, was premiered on October 31, 1992. </span><i data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">A View from the Bridge</span></i><span data-dcnode-id="2655" instrument_node="">, with libretto by Weinstein and </span><a data-dcnode-id="2653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Miller" title="Arthur Miller"><span data-dcnode-id="2654" instrument_node="">Arthur Miller</span></a><span data-dcnode-id="2652" instrument_node="">, was premiered October 9, 1999. </span><i data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">A Wedding</span></i><span data-dcnode-id="2649" instrument_node="">, based on the </span><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Wedding_%281978_film%29" title="A Wedding (1978 film)"><span data-dcnode-id="2648" instrument_node="">1978 motion picture</span></a><span data-dcnode-id="2646" instrument_node=""> by </span><a data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Altman" title="Robert Altman"><span data-dcnode-id="2645" instrument_node="">Robert Altman</span></a><span data-dcnode-id="2643" instrument_node=""> and </span><a data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Considine_%28actor%29" title="John Considine (actor)"><span data-dcnode-id="2642" instrument_node="">John Considine</span></a><span data-dcnode-id="2640" instrument_node="">, with libretto by Weinstein and Altman, was premiered on December 11, 2004. His fourth opera, </span><a data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dinner_at_Eight_%28opera%29" title="Dinner at Eight (opera)"><i data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Dinner at Eight</span></i></a><span data-dcnode-id="2636" instrument_node="">, composed with librettist </span><a data-dcnode-id="2634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mark_Campbell_%28librettist%29" title="Mark Campbell (librettist)"><span data-dcnode-id="2635" instrument_node="">Mark Campbell</span></a><span data-dcnode-id="2633" instrument_node="">, based on the </span><a data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_S._Kaufman" title="George S. Kaufman"><span data-dcnode-id="2632" instrument_node="">George S. Kaufman</span></a><span data-dcnode-id="2630" instrument_node=""> and </span><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edna_Ferber" title="Edna Ferber"><span data-dcnode-id="2629" instrument_node="">Edna Ferber</span></a><span data-dcnode-id="2627" instrument_node=""> play of the same name, was premiered March 11, 2017, by the commissioning organization, Minnesota Opera.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2620" style="white-space:nowrap;"><span data-dcnode-id="2626" instrument_node="">[</span><i data-dcnode-id="2622"><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2624" title="This claim needs references to reliable sources. (November 2018)"><span data-dcnode-id="2625" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2621" instrument_node="">]</span></sup><span data-dcnode-id="2619" instrument_node="">
</span></p><p data-dcnode-id="2571"><span data-dcnode-id="2617" instrument_node="">He has also composed concertos such as </span><i data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">Lyric Concerto</span></i><span data-dcnode-id="2614" instrument_node=""> for Flute and Orchestra for </span><a data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Galway" title="James Galway"><span data-dcnode-id="2613" instrument_node="">James Galway</span></a><span data-dcnode-id="2611" instrument_node="">, the Concerto in D for Violin and Orchestra for </span><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergiu_Luca" title="Sergiu Luca"><span data-dcnode-id="2610" instrument_node="">Sergiu Luca</span></a><span data-dcnode-id="2608" instrument_node="">, the Concerto for Clarinet and Orchestra for </span><a data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanley_Drucker" title="Stanley Drucker"><span data-dcnode-id="2607" instrument_node="">Stanley Drucker</span></a><span data-dcnode-id="2605" instrument_node="">, and Concert Suite for </span><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alto_saxophone" title="Alto saxophone"><span data-dcnode-id="2604" instrument_node="">alto saxophone</span></a><span data-dcnode-id="2602" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Band_%28music%29" title="Band (music)"><span data-dcnode-id="2601" instrument_node="">band</span></a><span data-dcnode-id="2599" instrument_node="">, composed for University of Michigan professor </span><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Sinta" title="Donald Sinta"><span data-dcnode-id="2598" instrument_node="">Donald Sinta</span></a><span data-dcnode-id="2596" instrument_node=""> in 1998. He composed his concerto </span><i data-dcnode-id="2593"><a class="mw-redirect" data-dcnode-id="2594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaea_for_Two_Pianos_Left_Hand%2C_and_Orchestra" title="Gaea for Two Pianos Left Hand, and Orchestra"><span data-dcnode-id="2595" instrument_node="">Gaea</span></a></i><span data-dcnode-id="2592" instrument_node=""> for two pianos (left hand) and orchestra for </span><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gary_Graffman" title="Gary Graffman"><span data-dcnode-id="2591" instrument_node="">Gary Graffman</span></a><span data-dcnode-id="2589" instrument_node=""> and </span><a data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leon_Fleisher" title="Leon Fleisher"><span data-dcnode-id="2588" instrument_node="">Leon Fleisher</span></a><span data-dcnode-id="2586" instrument_node="">, both of whom have suffered from debilitating problems with their right hands.  It received its first performance on April 11, 1996 by the Baltimore Symphony conducted by </span><a data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Zinman" title="David Zinman"><span data-dcnode-id="2585" instrument_node="">David Zinman</span></a><span data-dcnode-id="2583" instrument_node="">. The concerto is constructed so that it can be performed in one of three ways, with either piano part alone with reduced orchestra, or with both piano parts and the two reduced orchestras combined into a full orchestra. This structure mimics that of a similar three-in-one work by his teacher, </span><a data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darius_Milhaud" title="Darius Milhaud"><span data-dcnode-id="2582" instrument_node="">Darius Milhaud</span></a><span data-dcnode-id="2580" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2573" style="white-space:nowrap;"><span data-dcnode-id="2579" instrument_node="">[</span><i data-dcnode-id="2575"><a data-dcnode-id="2576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2577" title="This claim needs references to reliable sources. (November 2018)"><span data-dcnode-id="2578" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2574" instrument_node="">]</span></sup><span data-dcnode-id="2572" instrument_node="">
</span></p><p data-dcnode-id="2531"><span data-dcnode-id="2570" instrument_node="">Bolcom's other works include nine </span><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Symphony" title="Symphony"><span data-dcnode-id="2569" instrument_node="">symphonies</span></a><span data-dcnode-id="2567" instrument_node="">, twelve string quartets, four violin sonatas, a number of </span><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ragtime" title="Ragtime"><span data-dcnode-id="2566" instrument_node="">piano rags</span></a><span data-dcnode-id="2564" instrument_node=""> (one written in collaboration with </span><a data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Albright_%28musician%29" title="William Albright (musician)"><span data-dcnode-id="2563" instrument_node="">William Albright</span></a><span data-dcnode-id="2561" instrument_node="">), four volumes of </span><i data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Gospel Preludes</span></i><span data-dcnode-id="2558" instrument_node=""> for organ, four volumes of cabaret songs, three musical theater works (</span><i data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Casino Paradise</span></i><span data-dcnode-id="2555" instrument_node="">, </span><i data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Dynamite Tonite</span></i><span data-dcnode-id="2552" instrument_node="">, and </span><i data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Greatshot</span></i><span data-dcnode-id="2549" instrument_node="">; all with Weinstein), and a one-act chamber opera, </span><i data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Lucrezia</span></i><span data-dcnode-id="2546" instrument_node="">, with librettist Mark Campbell. William Bolcom was also commissioned to write </span><i data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Recuerdos</span></i><span data-dcnode-id="2543" instrument_node=""> for two pianos by </span><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Dranoff_International_Two_Piano_Foundation" title="The Dranoff International Two Piano Foundation"><span data-dcnode-id="2542" instrument_node="">The Dranoff International Two Piano Foundation</span></a><span data-dcnode-id="2540" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2533" style="white-space:nowrap;"><span data-dcnode-id="2539" instrument_node="">[</span><i data-dcnode-id="2535"><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2537" title="This claim needs references to reliable sources. (November 2018)"><span data-dcnode-id="2538" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2534" instrument_node="">]</span></sup><span data-dcnode-id="2532" instrument_node="">
</span></p><span data-dcnode-id="2530" instrument_node="">
</span><h3 data-dcnode-id="2520"><span class="mw-headline" data-dcnode-id="2528" id="Song_cycles"><span data-dcnode-id="2529" instrument_node="">Song cycles</span></span><span class="mw-editsection" data-dcnode-id="2521"><span class="mw-editsection-bracket" data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">[</span></span><a data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Bolcom%26action%3Dedit%26section%3D4%26editintro%3DTemplate%3ABLP_editintro" title="Edit section: Song cycles"><span data-dcnode-id="2525" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2518" instrument_node="">Bolcom has written a number of song cycles. A very large portion of these song cycles were cabarets with lyrics by librettist/lyricist Arnold Weinstein and meant to be sung by mezzo-soprano Joan Morris,</span><sup class="reference" data-dcnode-id="2515" id="cite_ref-Holland2007_6-0"><a data-dcnode-id="2516" href="#cite_note-Holland2007-6"><span data-dcnode-id="2517" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2514" instrument_node=""> William Bolcom's wife. These 24 cabarets were released in four volumes from the 1970s to the 1990s</span><sup class="reference" data-dcnode-id="2511" id="cite_ref-AACCLib_a_7-0"><a data-dcnode-id="2512" href="#cite_note-AACCLib_a-7"><span data-dcnode-id="2513" instrument_node="">[7]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="2504" style="white-space:nowrap;"><span data-dcnode-id="2510" instrument_node="">[</span><i data-dcnode-id="2506"><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="2508" title="The material near this tag failed verification of its source citation(s). (November 2018)"><span data-dcnode-id="2509" instrument_node="">failed verification</span></span></a></i><span data-dcnode-id="2505" instrument_node="">]</span></sup><span data-dcnode-id="2503" instrument_node=""> and were released all together on CD. Among Bolcom's other song cycles, the most well-known is his setting of William Blake's </span><i data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Songs of Innocence and of Experience.</span></i><span data-dcnode-id="2500" instrument_node=""> The recording of this massive work was estimated at $375,000 USD and its length stands at about two and a half hours.</span><sup class="reference" data-dcnode-id="2497" id="cite_ref-AACCLib_a_7-1"><a data-dcnode-id="2498" href="#cite_note-AACCLib_a-7"><span data-dcnode-id="2499" instrument_node="">[7]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="2490" style="white-space:nowrap;"><span data-dcnode-id="2496" instrument_node="">[</span><i data-dcnode-id="2492"><a data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="2494" title="The material near this tag failed verification of its source citation(s). (November 2018)"><span data-dcnode-id="2495" instrument_node="">failed verification</span></span></a></i><span data-dcnode-id="2491" instrument_node="">]</span></sup><span data-dcnode-id="2489" instrument_node="">.
</span></p><span data-dcnode-id="2487" instrument_node="">
</span><h3 data-dcnode-id="2476"><span class="mw-headline" data-dcnode-id="2484" id="Songs_of_Innocence_and_of_Experience"><i data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Songs of Innocence and of Experience</span></i></span><span class="mw-editsection" data-dcnode-id="2477"><span class="mw-editsection-bracket" data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">[</span></span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Bolcom%26action%3Dedit%26section%3D5%26editintro%3DTemplate%3ABLP_editintro" title="Edit section: Songs of Innocence and of Experience"><span data-dcnode-id="2481" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2474" instrument_node="">Bolcom's setting of </span><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Blake" title="William Blake"><span data-dcnode-id="2473" instrument_node="">William Blake</span></a><span data-dcnode-id="2471" instrument_node="">'s </span><i data-dcnode-id="2468"><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Songs_of_Innocence_and_of_Experience" title="Songs of Innocence and of Experience"><span data-dcnode-id="2470" instrument_node="">Songs of Innocence and of Experience</span></a></i><span data-dcnode-id="2467" instrument_node="">, a three-hour work for soloists, choruses, and orchestra, was a culmination of 25 years of work on the piece.
</span></p><span data-dcnode-id="2465" instrument_node="">
</span><dl data-dcnode-id="2443"><dd data-dcnode-id="2444"><b data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Inspiration </span></b><span data-dcnode-id="2462" instrument_node="">
</span><dl data-dcnode-id="2445"><dd data-dcnode-id="2446"><span data-dcnode-id="2461" instrument_node="">At the age of seventeen, William Bolcom wanted to set the complete poems of </span><i data-dcnode-id="2458"><a data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Songs_of_Innocence_and_of_Experience" title="Songs of Innocence and of Experience"><span data-dcnode-id="2460" instrument_node="">Songs of Innocence and of Experience</span></a></i><span data-dcnode-id="2457" instrument_node=""> by </span><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Blake" title="William Blake"><span data-dcnode-id="2456" instrument_node="">William Blake</span></a><span data-dcnode-id="2454" instrument_node=""> to music.</span><sup class="reference" data-dcnode-id="2451" id="cite_ref-Lister2006_8-0"><a data-dcnode-id="2452" href="#cite_note-Lister2006-8"><span data-dcnode-id="2453" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2450" instrument_node=""> As he comprehended the huge diversity of the artistic ideas and the technical styles presented in the poems, he realized that he needed more musical vocabulary of different styles in order to complete his music. This realization also bolstered his ideas that genres of music should not be placed in a hierarchy and that there was no distinction between "serious" music and "popular" music.</span><sup class="reference" data-dcnode-id="2447" id="cite_ref-Hu2004_9-0"><a data-dcnode-id="2448" href="#cite_note-Hu2004-9"><span data-dcnode-id="2449" instrument_node="">[9]</span></a></sup></dd></dl></dd></dl><span data-dcnode-id="2442" instrument_node="">
</span><dl data-dcnode-id="2431"><dd data-dcnode-id="2432"><b data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Style and instrumentation</span></b><span data-dcnode-id="2439" instrument_node="">
</span><dl data-dcnode-id="2433"><dd data-dcnode-id="2434"><span data-dcnode-id="2438" instrument_node="">Bolcom incorporated a variety of different musical styles and genres in the music, including modern classical style using pentatonic scales, tonal classical style, bluegrass, country, soul, folk vaudeville, rock musical, and reggae. Bolcom has used instruments that are not usually used in a traditional orchestra but are used in the genres that he chose: saxophones, guitar, electric guitar, bass guitar, harmonica, electric violin, and "country, rock, and folk singers".</span><sup class="reference" data-dcnode-id="2435" id="cite_ref-WBConversation2019_10-0"><a data-dcnode-id="2436" href="#cite_note-WBConversation2019-10"><span data-dcnode-id="2437" instrument_node="">[10]</span></a></sup></dd></dl></dd></dl><span data-dcnode-id="2430" instrument_node="">
</span><dl data-dcnode-id="2383"><dd data-dcnode-id="2384"><b data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Premiere and performances</span></b><span data-dcnode-id="2427" instrument_node="">
</span><dl data-dcnode-id="2385"><dd data-dcnode-id="2386"><span data-dcnode-id="2426" instrument_node="">According to </span><a class="mw-redirect" data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naxos_Records" title="Naxos Records"><span data-dcnode-id="2425" instrument_node="">Naxos Records</span></a><span data-dcnode-id="2423" instrument_node="">, the premiere of the </span><i data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Songs</span></i><span data-dcnode-id="2420" instrument_node=""> at the Stuttgart Opera in 1984 was followed by performances in </span><a data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ann_Arbor%2C_Michigan" title="Ann Arbor, Michigan"><span data-dcnode-id="2419" instrument_node="">Ann Arbor</span></a><span data-dcnode-id="2417" instrument_node="">, </span><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grant_Park_%28Chicago%29" title="Grant Park (Chicago)"><span data-dcnode-id="2416" instrument_node="">Grant Park</span></a><span data-dcnode-id="2414" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chicago%2C_Illinois" title="Chicago, Illinois"><span data-dcnode-id="2413" instrument_node="">Chicago, Illinois</span></a><span data-dcnode-id="2411" instrument_node="">, the </span><a data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brooklyn_Academy_of_Music" title="Brooklyn Academy of Music"><span data-dcnode-id="2410" instrument_node="">Brooklyn Academy of Music</span></a><span data-dcnode-id="2408" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Louis%2C_Missouri" title="St. Louis, Missouri"><span data-dcnode-id="2407" instrument_node="">St. Louis</span></a><span data-dcnode-id="2405" instrument_node="">, </span><a data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carnegie_Hall" title="Carnegie Hall"><span data-dcnode-id="2404" instrument_node="">Carnegie Hall</span></a><span data-dcnode-id="2402" instrument_node="">, and </span><a data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London" title="London"><span data-dcnode-id="2401" instrument_node="">London</span></a><span data-dcnode-id="2399" instrument_node="">'s </span><a data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Festival_Hall" title="Royal Festival Hall"><span data-dcnode-id="2398" instrument_node="">Royal Festival Hall</span></a><span data-dcnode-id="2396" instrument_node="">, the latter performed by the </span><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BBC_Symphony_Orchestra" title="BBC Symphony Orchestra"><span data-dcnode-id="2395" instrument_node="">BBC Symphony Orchestra</span></a><span data-dcnode-id="2393" instrument_node=""> under the direction of </span><a data-dcnode-id="2391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonard_Slatkin" title="Leonard Slatkin"><span data-dcnode-id="2392" instrument_node="">Leonard Slatkin</span></a><span data-dcnode-id="2390" instrument_node="">.</span><sup class="reference" data-dcnode-id="2387" id="cite_ref-Naxos2004_Slatkin_11-0"><a data-dcnode-id="2388" href="#cite_note-Naxos2004_Slatkin-11"><span data-dcnode-id="2389" instrument_node="">[11]</span></a></sup></dd></dl></dd></dl><span data-dcnode-id="2382" instrument_node="">
</span><dl data-dcnode-id="2350"><dd data-dcnode-id="2351"><b data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Awards and reception</span></b><span data-dcnode-id="2379" instrument_node="">
</span><dl data-dcnode-id="2352"><dd data-dcnode-id="2353"><span data-dcnode-id="2378" instrument_node="">In 2004, Naxos Records produced a recording of the </span><i data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Songs</span></i><span data-dcnode-id="2375" instrument_node=""> on location at </span><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hill_Auditorium" title="Hill Auditorium"><span data-dcnode-id="2374" instrument_node="">Hill Auditorium</span></a><span data-dcnode-id="2372" instrument_node="">, featuring the </span><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Michigan_School_of_Music%2C_Theatre_%2526_Dance" title="University of Michigan School of Music, Theatre &amp; Dance"><span data-dcnode-id="2371" instrument_node="">University of Michigan School of Music, Theatre &amp; Dance</span></a><span data-dcnode-id="2369" instrument_node=""> Symphony Orchestra, the student choirs from the same university, </span><a data-dcnode-id="2367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_Musical_Society" title="University Musical Society"><span data-dcnode-id="2368" instrument_node="">University Musical Society Choral Union</span></a><span data-dcnode-id="2366" instrument_node="">, </span><a data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michigan_State_University_Children%2527s_Choir" title="Michigan State University Children's Choir"><span data-dcnode-id="2365" instrument_node="">Michigan State University Children's Choir</span></a><span data-dcnode-id="2363" instrument_node="">, and a variety of solo instrumentalists and singers (who also included </span><a data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joan_Morris" title="Joan Morris"><span data-dcnode-id="2362" instrument_node="">Joan Morris</span></a><span data-dcnode-id="2360" instrument_node="">, wife of Bolcom). In 2006, it won four </span><a class="mw-redirect" data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grammy_Award" title="Grammy Award"><span data-dcnode-id="2359" instrument_node="">Grammy Awards</span></a><span data-dcnode-id="2357" instrument_node=""> for Best Choral Performance, Best Classical Contemporary Composition, Best Classical Album, and Best Producer of the Year, Classical.</span><sup class="reference" data-dcnode-id="2354" id="cite_ref-NPRMusic20060209_12-0"><a data-dcnode-id="2355" href="#cite_note-NPRMusic20060209-12"><span data-dcnode-id="2356" instrument_node="">[12]</span></a></sup></dd></dl></dd></dl><span data-dcnode-id="2349" instrument_node="">
</span><dl data-dcnode-id="2334"><dd data-dcnode-id="2335"><dl data-dcnode-id="2336"><dd data-dcnode-id="2337"><span data-dcnode-id="2348" instrument_node="">Composer and critic Robert Carl has stated that Bolcom wrote seemingly disparate genres of music with "sincerity," without irony, "as equal partners," and with "love for and mastery of popular music".</span><sup class="reference" data-dcnode-id="2345" id="cite_ref-Carl1990_13-0"><a data-dcnode-id="2346" href="#cite_note-Carl1990-13"><span data-dcnode-id="2347" instrument_node="">[13]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="2338" style="white-space:nowrap;"><span data-dcnode-id="2344" instrument_node="">[</span><i data-dcnode-id="2340"><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="2342" title="This citation requires a reference to the specific page or range of pages in which the material appears. (March 2018)"><span data-dcnode-id="2343" instrument_node="">page&nbsp;needed</span></span></a></i><span data-dcnode-id="2339" instrument_node="">]</span></sup></dd></dl></dd></dl><span data-dcnode-id="2333" instrument_node="">
</span><h2 data-dcnode-id="2323"><span class="mw-headline" data-dcnode-id="2331" id="Festivals"><span data-dcnode-id="2332" instrument_node="">Festivals</span></span><span class="mw-editsection" data-dcnode-id="2324"><span class="mw-editsection-bracket" data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">[</span></span><a data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Bolcom%26action%3Dedit%26section%3D6%26editintro%3DTemplate%3ABLP_editintro" title="Edit section: Festivals"><span data-dcnode-id="2328" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2321" instrument_node="">VocalEssence celebrated the music of William Bolcom with a two-week festival in </span><a data-dcnode-id="2319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minneapolis" title="Minneapolis"><span data-dcnode-id="2320" instrument_node="">Minneapolis</span></a><span data-dcnode-id="2318" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Paul%2C_Minnesota" title="St. Paul, Minnesota"><span data-dcnode-id="2317" instrument_node="">St. Paul, Minnesota</span></a><span data-dcnode-id="2315" instrument_node=""> in April 2007. Nine different performances and a number of </span><a data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Master_class" title="Master class"><span data-dcnode-id="2314" instrument_node="">master classes</span></a><span data-dcnode-id="2312" instrument_node=""> were part of the festival. The spotlight performance was of Bolcom's setting of William Blake's Songs </span><i data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">of Innocence and of Experience</span></i><span data-dcnode-id="2309" instrument_node="">, performed in Orchestra Hall in Minneapolis with over 400 musicians performing under projections of Blake's accompanying artwork by Wendell K. Harrington.
</span></p><p data-dcnode-id="2302"><span data-dcnode-id="2307" instrument_node="">Eastern Michigan University Celebrated its 16th Biennial Contemporary Music Festival by featuring William Bolcom as a guest composer.  The three-day festival showcased a range of Bolcom's compositions as well as a discussion on "Musical Grass-Roots" led by Bolcom himself.</span><sup class="reference" data-dcnode-id="2304" id="cite_ref-14"><a data-dcnode-id="2305" href="#cite_note-14"><span data-dcnode-id="2306" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2303" instrument_node="">
</span></p><p data-dcnode-id="2288"><span data-dcnode-id="2301" instrument_node="">Le Piano Ouvert celebrated Bolcom's 75th birthday with a week of concerts and masterclasses in Paris in March 2014. William Bolcom and Joan Morris both performed, and were featured on France Musique</span><sup class="reference" data-dcnode-id="2298" id="cite_ref-FranceMusique2014b_15-0"><a data-dcnode-id="2299" href="#cite_note-FranceMusique2014b-15"><span data-dcnode-id="2300" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2297" instrument_node=""> in a series of live performances and interviews.</span><sup class="reference" data-dcnode-id="2294" id="cite_ref-FranceMusique2014a_16-0"><a data-dcnode-id="2295" href="#cite_note-FranceMusique2014a-16"><span data-dcnode-id="2296" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2293" instrument_node=""> The festival was directed by Guy Livingston, Anne de Fornel, and David Levi. Concerts were held at the Mona Bismarck American Center in Paris, and at the Hôtel Talleyrand on Place de la Concorde.</span><sup class="reference" data-dcnode-id="2290" id="cite_ref-wordpress2014c_17-0"><a data-dcnode-id="2291" href="#cite_note-wordpress2014c-17"><span data-dcnode-id="2292" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2289" instrument_node="">
