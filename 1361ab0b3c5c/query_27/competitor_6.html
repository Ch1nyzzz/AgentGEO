</span><p data-dcnode-id="5639"><span data-dcnode-id="5683" instrument_node="">The </span><b data-dcnode-id="5681"><span data-dcnode-id="5682" instrument_node="">Morris Canal</span></b><span data-dcnode-id="5680" instrument_node=""> (1829–1924) was a 107-mile (172&nbsp;km) </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toll_road" title="Toll road"><span data-dcnode-id="5679" instrument_node="">common carrier</span></a><span data-dcnode-id="5677" instrument_node=""> </span><a data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthracite" title="Anthracite"><span data-dcnode-id="5676" instrument_node="">anthracite coal</span></a><span data-dcnode-id="5674" instrument_node=""> </span><a data-dcnode-id="5672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canal" title="Canal"><span data-dcnode-id="5673" instrument_node="">canal</span></a><span data-dcnode-id="5671" instrument_node=""> across northern </span><a data-dcnode-id="5669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Jersey" title="New Jersey"><span data-dcnode-id="5670" instrument_node="">New Jersey</span></a><span data-dcnode-id="5668" instrument_node=""> in the United States that connected the two industrial canals at </span><a data-dcnode-id="5666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Easton%2C_Pennsylvania" title="Easton, Pennsylvania"><span data-dcnode-id="5667" instrument_node="">Easton, Pennsylvania</span></a><span data-dcnode-id="5665" instrument_node="">, across the </span><a data-dcnode-id="5663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delaware_River" title="Delaware River"><span data-dcnode-id="5664" instrument_node="">Delaware River</span></a><span data-dcnode-id="5662" instrument_node=""> from its western terminus at </span><a data-dcnode-id="5660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phillipsburg%2C_New_Jersey" title="Phillipsburg, New Jersey"><span data-dcnode-id="5661" instrument_node="">Phillipsburg, New Jersey</span></a><span data-dcnode-id="5659" instrument_node="">, to </span><a data-dcnode-id="5657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_Harbor" title="New York Harbor"><span data-dcnode-id="5658" instrument_node="">New York Harbor</span></a><span data-dcnode-id="5656" instrument_node=""> and </span><a data-dcnode-id="5654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_City" title="New York City"><span data-dcnode-id="5655" instrument_node="">New York City</span></a><span data-dcnode-id="5653" instrument_node=""> via its eastern terminals in </span><a data-dcnode-id="5651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newark%2C_New_Jersey" title="Newark, New Jersey"><span data-dcnode-id="5652" instrument_node="">Newark</span></a><span data-dcnode-id="5650" instrument_node=""> and on the </span><a data-dcnode-id="5648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hudson_River" title="Hudson River"><span data-dcnode-id="5649" instrument_node="">Hudson River</span></a><span data-dcnode-id="5647" instrument_node=""> in </span><a data-dcnode-id="5645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jersey_City%2C_New_Jersey" title="Jersey City, New Jersey"><span data-dcnode-id="5646" instrument_node="">Jersey City</span></a><span data-dcnode-id="5644" instrument_node="">. The canal was sometimes called the Morris and Essex Canal,</span><sup class="reference" data-dcnode-id="5641" id="cite_ref-4"><a data-dcnode-id="5642" href="#cite_note-4"><span data-dcnode-id="5643" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5640" instrument_node=""> in error, due to confusion with the nearby and unrelated Morris and Essex Railroad.
</span></p><p data-dcnode-id="5627"><span data-dcnode-id="5638" instrument_node="">With a total elevation change of more than 900 feet (270&nbsp;m), the canal was considered an ingenious technological marvel for its use of </span><a data-dcnode-id="5636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydropower" title="Hydropower"><span data-dcnode-id="5637" instrument_node="">water-driven</span></a><span data-dcnode-id="5635" instrument_node=""> </span><a data-dcnode-id="5633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canal_inclined_plane" title="Canal inclined plane"><span data-dcnode-id="5634" instrument_node="">inclined planes</span></a><span data-dcnode-id="5632" instrument_node="">, the first in the United States, to cross the northern New Jersey hills.</span><sup class="reference" data-dcnode-id="5629" id="cite_ref-6"><a data-dcnode-id="5630" href="#cite_note-6"><span data-dcnode-id="5631" instrument_node="">[a]</span></a></sup><span data-dcnode-id="5628" instrument_node="">
</span></p><p data-dcnode-id="5605"><span data-dcnode-id="5626" instrument_node="">It was built primarily to move coal to industrializing eastern cities that had stripped their environs of wood.</span><sup class="reference" data-dcnode-id="5623" id="cite_ref-Held_5-1"><a data-dcnode-id="5624" href="#cite_note-Held-5"><span data-dcnode-id="5625" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="5620" id="cite_ref-9"><a data-dcnode-id="5621" href="#cite_note-9"><span data-dcnode-id="5622" instrument_node="">[b]</span></a></sup><span data-dcnode-id="5619" instrument_node=""> Completed to Newark in 1831, the canal was extended eastward to Jersey City between 1834 and 1836. In 1839, </span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hot_blast" title="Hot blast"><span data-dcnode-id="5618" instrument_node="">hot blast</span></a><span data-dcnode-id="5616" instrument_node=""> technology was married to </span><a data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blast_furnace" title="Blast furnace"><span data-dcnode-id="5615" instrument_node="">blast furnaces</span></a><span data-dcnode-id="5613" instrument_node=""> fired entirely using anthracite, allowing the continuous high-volume production of plentiful </span><a class="mw-redirect" data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthracite_pig_iron" title="Anthracite pig iron"><span data-dcnode-id="5612" instrument_node="">anthracite pig iron</span></a><span data-dcnode-id="5610" instrument_node="">.</span><sup class="reference" data-dcnode-id="5607" id="cite_ref-FOOTNOTEBrenckmanChapter_II_-_Improvements_10-0"><a data-dcnode-id="5608" href="#cite_note-FOOTNOTEBrenckmanChapter_II_-_Improvements-10"><span data-dcnode-id="5609" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5606" instrument_node="">
</span></p><p data-dcnode-id="5582"><span data-dcnode-id="5604" instrument_node="">The Morris Canal eased the transportation of anthracite from </span><a data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pennsylvania" title="Pennsylvania"><span data-dcnode-id="5603" instrument_node="">Pennsylvania</span></a><span data-dcnode-id="5601" instrument_node="">'s </span><a data-dcnode-id="5599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Valley" title="Lehigh Valley"><span data-dcnode-id="5600" instrument_node="">Lehigh Valley</span></a><span data-dcnode-id="5598" instrument_node=""> to northern </span><a data-dcnode-id="5596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Jersey" title="New Jersey"><span data-dcnode-id="5597" instrument_node="">New Jersey</span></a><span data-dcnode-id="5595" instrument_node="">'s growing iron industry and other developing industries adopting steam power in New Jersey and the New York City area. It also carried minerals and iron ore westward to </span><a class="mw-redirect" data-dcnode-id="5593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blast_furnaces" title="Blast furnaces"><span data-dcnode-id="5594" instrument_node="">blast furnaces</span></a><span data-dcnode-id="5592" instrument_node=""> in western New Jersey and eastern Pennsylvania (famously, </span><a data-dcnode-id="5590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allentown%2C_Pennsylvania" title="Allentown, Pennsylvania"><span data-dcnode-id="5591" instrument_node="">Allentown</span></a><span data-dcnode-id="5589" instrument_node=""> and </span><a data-dcnode-id="5587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bethlehem%2C_Pennsylvania" title="Bethlehem, Pennsylvania"><span data-dcnode-id="5588" instrument_node="">Bethlehem</span></a><span data-dcnode-id="5586" instrument_node="">) until the development of </span><a data-dcnode-id="5584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Lakes" title="Great Lakes"><span data-dcnode-id="5585" instrument_node="">Great Lakes</span></a><span data-dcnode-id="5583" instrument_node=""> iron ore caused the trade to decline.
</span></p><p data-dcnode-id="5577"><span data-dcnode-id="5581" instrument_node="">The Morris Canal remained in heavy use through the 1860s. But railroads had begun to eclipse canals in the United States, and in 1871, it was leased to the </span><a data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Valley_Railroad" title="Lehigh Valley Railroad"><span data-dcnode-id="5580" instrument_node="">Lehigh Valley Railroad</span></a><span data-dcnode-id="5578" instrument_node="">.
</span></p><p data-dcnode-id="5575"><span data-dcnode-id="5576" instrument_node="">Like many enterprises that depended on anthracite, the canal's revenues dried up with the rise of oil fuels and truck transport. It was taken over by the state of New Jersey in 1922, and formally abandoned in 1924.
</span></p><p data-dcnode-id="5549"><span data-dcnode-id="5574" instrument_node="">Although it was largely dismantled in the following five years, portions of the canal and its accompanying feeders and ponds are preserved. A statewide greenway for cyclists and pedestrians is planned, beginning in Phillipsburg, traversing Warren, Sussex, Morris, Passaic, Essex, and Hudson Counties and including the old route through </span><a class="mw-redirect" data-dcnode-id="5572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jersey_City" title="Jersey City"><span data-dcnode-id="5573" instrument_node="">Jersey City</span></a><span data-dcnode-id="5571" instrument_node="">.</span><sup class="reference" data-dcnode-id="5568" id="cite_ref-11"><a data-dcnode-id="5569" href="#cite_note-11"><span data-dcnode-id="5570" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5567" instrument_node=""> The canal was added to the </span><a data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Register_of_Historic_Places" title="National Register of Historic Places"><span data-dcnode-id="5566" instrument_node="">National Register of Historic Places</span></a><span data-dcnode-id="5564" instrument_node=""> on October 1, 1974, for its significance in engineering, industry, and transportation.</span><sup class="reference" data-dcnode-id="5561" id="cite_ref-nrhpdoc_12-0"><a data-dcnode-id="5562" href="#cite_note-nrhpdoc-12"><span data-dcnode-id="5563" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5560" instrument_node=""> The boundary was increased in 2016 to include the </span><a data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lake_Hopatcong_station" title="Lake Hopatcong station"><span data-dcnode-id="5559" instrument_node="">Lake Hopatcong station</span></a><span data-dcnode-id="5557" instrument_node=""> in </span><a data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landing%2C_New_Jersey" title="Landing, New Jersey"><span data-dcnode-id="5556" instrument_node="">Landing</span></a><span data-dcnode-id="5554" instrument_node="">.</span><sup class="reference" data-dcnode-id="5551" id="cite_ref-nrhpdoc2_13-0"><a data-dcnode-id="5552" href="#cite_note-nrhpdoc2-13"><span data-dcnode-id="5553" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5550" instrument_node="">
</span></p><span data-dcnode-id="5548" instrument_node="">

</span><h2 data-dcnode-id="5342"><span class="mw-headline" data-dcnode-id="5350" id="Description"><span data-dcnode-id="5351" instrument_node="">Description</span></span><span class="mw-editsection" data-dcnode-id="5343"><span class="mw-editsection-bracket" data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">[</span></span><a data-dcnode-id="5346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D1" title="Edit section: Description"><span data-dcnode-id="5347" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5341" instrument_node="">
</span><p data-dcnode-id="5297"><span data-dcnode-id="5340" instrument_node="">On the canal's western end, at Phillipsburg, a </span><a data-dcnode-id="5338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cable_ferry" title="Cable ferry"><span data-dcnode-id="5339" instrument_node="">cable ferry</span></a><span data-dcnode-id="5337" instrument_node=""> allowed Morris Canal boats to cross the Delaware River westward to </span><a data-dcnode-id="5335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Easton%2C_Pennsylvania" title="Easton, Pennsylvania"><span data-dcnode-id="5336" instrument_node="">Easton, Pennsylvania</span></a><span data-dcnode-id="5334" instrument_node="">, and travel up the </span><a data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Canal" title="Lehigh Canal"><span data-dcnode-id="5333" instrument_node="">Lehigh Canal</span></a><span data-dcnode-id="5331" instrument_node=""> to </span><a data-dcnode-id="5329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Thorpe%2C_Pennsylvania" title="Jim Thorpe, Pennsylvania"><span data-dcnode-id="5330" instrument_node="">Mauch Chunk</span></a><span data-dcnode-id="5328" instrument_node="">, in the anthracite coal regions, to receive their cargoes from the mines. From Phillipsburg, the Morris Canal ran eastward through the valley of the </span><a data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Musconetcong_River" title="Musconetcong River"><span data-dcnode-id="5327" instrument_node="">Musconetcong River</span></a><span data-dcnode-id="5325" instrument_node="">, which it roughly paralleled upstream to its source at </span><a data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lake_Hopatcong" title="Lake Hopatcong"><span data-dcnode-id="5324" instrument_node="">Lake Hopatcong</span></a><span data-dcnode-id="5322" instrument_node="">, New Jersey's largest lake. From the lake, the canal descended through the valley of the </span><a data-dcnode-id="5320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rockaway_River" title="Rockaway River"><span data-dcnode-id="5321" instrument_node="">Rockaway River</span></a><span data-dcnode-id="5319" instrument_node=""> to </span><a data-dcnode-id="5317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boonton%2C_New_Jersey" title="Boonton, New Jersey"><span data-dcnode-id="5318" instrument_node="">Boonton</span></a><span data-dcnode-id="5316" instrument_node="">, eventually around the northern end of </span><a data-dcnode-id="5314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paterson%2C_New_Jersey" title="Paterson, New Jersey"><span data-dcnode-id="5315" instrument_node="">Paterson</span></a><span data-dcnode-id="5313" instrument_node="">'s </span><a data-dcnode-id="5311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Garret_Mountain_Reservation" title="Garret Mountain Reservation"><span data-dcnode-id="5312" instrument_node="">Garret Mountain</span></a><span data-dcnode-id="5310" instrument_node="">, and south to its 1831 terminus at </span><a data-dcnode-id="5308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newark%2C_New_Jersey" title="Newark, New Jersey"><span data-dcnode-id="5309" instrument_node="">Newark</span></a><span data-dcnode-id="5307" instrument_node=""> on the </span><a data-dcnode-id="5305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passaic_River" title="Passaic River"><span data-dcnode-id="5306" instrument_node="">Passaic River</span></a><span data-dcnode-id="5304" instrument_node="">. From there it continued eastward across </span><a data-dcnode-id="5302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kearny%2C_New_Jersey" title="Kearny, New Jersey"><span data-dcnode-id="5303" instrument_node="">Kearny</span></a><span data-dcnode-id="5301" instrument_node=""> Point and through Jersey City to the Hudson River. The extension through Jersey City was at sea level and was supplied with water from the lower </span><a data-dcnode-id="5299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hackensack_River" title="Hackensack River"><span data-dcnode-id="5300" instrument_node="">Hackensack River</span></a><span data-dcnode-id="5298" instrument_node="">.
</span></p><p data-dcnode-id="5283"><span data-dcnode-id="5296" instrument_node="">With its two navigable feeders, the canal was 107&nbsp;mi (172&nbsp;km) long. Its ascent eastward from Phillipsburg to its feeder from Lake Hopatcong was 760&nbsp;ft (230&nbsp;m), and the descent from there to tidewater was 914&nbsp;ft (279&nbsp;m). Surmounting the height difference was considered a major engineering feat of its day, accomplished through 23 </span><a class="mw-redirect" data-dcnode-id="5294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canal_lock" title="Canal lock"><span data-dcnode-id="5295" instrument_node="">locks</span></a><span data-dcnode-id="5293" instrument_node=""> and 23 </span><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canal_inclined_plane" title="Canal inclined plane"><span data-dcnode-id="5292" instrument_node="">inclined planes</span></a><span data-dcnode-id="5290" instrument_node=""> — essentially, short railways that carried canal boats in open cars uphill and downhill using water-powered </span><a data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Winch" title="Winch"><span data-dcnode-id="5289" instrument_node="">winches</span></a><span data-dcnode-id="5287" instrument_node="">. Inclined planes required less time and water than </span><a class="mw-redirect" data-dcnode-id="5285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Staircase_locks" title="Staircase locks"><span data-dcnode-id="5286" instrument_node="">locks</span></a><span data-dcnode-id="5284" instrument_node="">, although they were more expensive to build and maintain.
</span></p><span data-dcnode-id="5282" instrument_node="">
</span><h2 data-dcnode-id="5272"><span class="mw-headline" data-dcnode-id="5280" id="History"><span data-dcnode-id="5281" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="5273"><span class="mw-editsection-bracket" data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">[</span></span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D2" title="Edit section: History"><span data-dcnode-id="5277" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5271" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5260"><div class="thumbinner" data-dcnode-id="5261" style="width:222px;"><a class="image" data-dcnode-id="5269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWaterloo_Village%2C_NJ_-_Morris_Canal_and_Smith%2527s_General_Store.jpg"><img alt="" class="thumbimage" data-dcnode-id="5270" data-file-height="2268" data-file-width="3402" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Waterloo_Village%252C_NJ_-_Morris_Canal_and_Smith%2527s_General_Store.jpg/220px-Waterloo_Village%252C_NJ_-_Morris_Canal_and_Smith%2527s_General_Store.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Waterloo_Village%2C_NJ_-_Morris_Canal_and_Smith%27s_General_Store.jpg/330px-Waterloo_Village%2C_NJ_-_Morris_Canal_and_Smith%27s_General_Store.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Waterloo_Village%2C_NJ_-_Morris_Canal_and_Smith%27s_General_Store.jpg/440px-Waterloo_Village%2C_NJ_-_Morris_Canal_and_Smith%27s_General_Store.jpg 2x" width="220"></a><span data-dcnode-id="5268" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5262"><div class="magnify" data-dcnode-id="5266"><a class="internal" data-dcnode-id="5267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWaterloo_Village%2C_NJ_-_Morris_Canal_and_Smith%2527s_General_Store.jpg" title="Enlarge"></a></div><span data-dcnode-id="5265" instrument_node="">Canal in 2018 at </span><a class="mw-redirect" data-dcnode-id="5263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waterloo_Village" title="Waterloo Village"><span data-dcnode-id="5264" instrument_node="">Waterloo Village</span></a></div></div></div><span data-dcnode-id="5259" instrument_node="">
</span><p data-dcnode-id="5251"><span data-dcnode-id="5258" instrument_node="">The idea for constructing the canal is credited to </span><a data-dcnode-id="5256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morristown%2C_New_Jersey" title="Morristown, New Jersey"><span data-dcnode-id="5257" instrument_node="">Morristown</span></a><span data-dcnode-id="5255" instrument_node=""> businessman </span><a class="new" data-dcnode-id="5253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGeorge_P._MacCulloch%26action%3Dedit%26redlink%3D1" title="George P. MacCulloch (page does not exist)"><span data-dcnode-id="5254" instrument_node="">George P. MacCulloch</span></a><span data-dcnode-id="5252" instrument_node="">, who reportedly conceived the idea while visiting Lake Hopatcong. In 1822, MacCulloch brought together a group of interested citizens at Morristown to discuss the idea.
</span></p><p data-dcnode-id="5240"><span data-dcnode-id="5250" instrument_node="">The </span><i data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">Palladium of Liberty</span></i><span data-dcnode-id="5247" instrument_node="">, a Morristown newspaper of the day, reported on August 29, 1822:  "...Membership of a committee which studied the practicality of a canal from Pennsylvania to Newark, New Jersey, consisted of two prominent citizens from each county (NJ) concerned: Hunterdon County, Nathaniel Saxton, Henry Dusenberry; Sussex County, Morris Robinson, </span><a data-dcnode-id="5245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamaliel_Bartlett" title="Gamaliel Bartlett"><span data-dcnode-id="5246" instrument_node="">Gamaliel Bartlett</span></a><span data-dcnode-id="5244" instrument_node="">; Morris County, Lewis Condict, Mahlon Dickerson; Essex County, Gerald Rutgers, </span><a data-dcnode-id="5242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Kinsey" title="Charles Kinsey"><span data-dcnode-id="5243" instrument_node="">Charles Kinsey</span></a><span data-dcnode-id="5241" instrument_node="">; Bergen County, John Rutherford, William Colefax ...".
</span></p><p data-dcnode-id="5235"><span data-dcnode-id="5239" instrument_node="">On November 15, 1822, the </span><a data-dcnode-id="5237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Jersey_Legislature" title="New Jersey Legislature"><span data-dcnode-id="5238" instrument_node="">New Jersey Legislature</span></a><span data-dcnode-id="5236" instrument_node=""> passed an act appointing three commissioners, one of whom was MacCulloch, to explore the feasibility of the project, determine the canal's possible route, and estimate its costs. MacCulloch initially greatly underestimated the height difference between the Passaic and Lake Hopatcong, pegging it at only 185&nbsp;ft (56&nbsp;m).
</span></p><p data-dcnode-id="5227"><span data-dcnode-id="5234" instrument_node="">On December 31, 1824, the New Jersey Legislature chartered the </span><a class="mw-redirect" data-dcnode-id="5232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morris_Canal_and_Banking_Company" title="Morris Canal and Banking Company"><span data-dcnode-id="5233" instrument_node="">Morris Canal and Banking Company</span></a><span data-dcnode-id="5231" instrument_node="">, a private corporation charged with the construction of the canal. The corporation issued 20,000 shares of stock at $100 a share, providing $2 million of capital, divided evenly between funds for building the canal and funds for </span><a class="mw-redirect" data-dcnode-id="5229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banking" title="Banking"><span data-dcnode-id="5230" instrument_node="">banking</span></a><span data-dcnode-id="5228" instrument_node=""> privileges. The charter provided that New Jersey could take over the canal at the end of 99 years. In the event that the state did not take over the canal, the charter would remain in effect for 50 years more, after which the canal would become the property of the state without cost.
</span></p><span data-dcnode-id="5226" instrument_node="">
</span><h3 data-dcnode-id="5216"><span class="mw-headline" data-dcnode-id="5224" id="Construction"><span data-dcnode-id="5225" instrument_node="">Construction</span></span><span class="mw-editsection" data-dcnode-id="5217"><span class="mw-editsection-bracket" data-dcnode-id="5222"><span data-dcnode-id="5223" instrument_node="">[</span></span><a data-dcnode-id="5220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D3" title="Edit section: Construction"><span data-dcnode-id="5221" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5215" instrument_node="">
</span><p data-dcnode-id="5202"><span data-dcnode-id="5214" instrument_node="">In 1823, the canal company hired Ephraim Beach, who was originally an assistant engineer on the </span><a data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Erie_Canal" title="Erie Canal"><span data-dcnode-id="5213" instrument_node="">Erie Canal</span></a><span data-dcnode-id="5211" instrument_node="">, as its chief engineer, to survey the routes for the Morris Canal.</span><sup class="reference" data-dcnode-id="5208" id="cite_ref-Goller12_14-0"><a data-dcnode-id="5209" href="#cite_note-Goller12-14"><span data-dcnode-id="5210" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5207" instrument_node="">
Construction started in 1824 in Newark, with a channel 31 feet (9.4&nbsp;m) wide and 4 feet (1.2&nbsp;m) deep. The canal started from Upper Newark Bay, followed the Passaic River and crossed it at Little Falls, then went on to Boonton, Dover, then the southern tip of Lake Hopatcong, whereupon it went to Phillipsburg.</span><sup class="reference" data-dcnode-id="5204" id="cite_ref-15"><a data-dcnode-id="5205" href="#cite_note-15"><span data-dcnode-id="5206" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5203" instrument_node="">
</span></p><p data-dcnode-id="5196"><span data-dcnode-id="5201" instrument_node="">On October 15, 1825, ground was broken at the summit level at the "Great Pond" (i.e. lake Hopatcong). By 1828, 82 of the 97 eastern sections and 43 of the 74 western sections were finished. By 1829, some sections were completed and opened for traffic, and in 1830, the 38-mile (61&nbsp;km) section from Newark to Rockaway was opened.</span><sup class="reference" data-dcnode-id="5198" id="cite_ref-16"><a data-dcnode-id="5199" href="#cite_note-16"><span data-dcnode-id="5200" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5197" instrument_node="">
</span></p><p data-dcnode-id="5187"><span data-dcnode-id="5195" instrument_node="">Because the locks could only handle boats of 25 long tons (25&nbsp;t), that meant that through traffic from the </span><a data-dcnode-id="5193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Canal" title="Lehigh Canal"><span data-dcnode-id="5194" instrument_node="">Lehigh Canal</span></a><span data-dcnode-id="5192" instrument_node=""> was impossible, requiring reloading coal at Easton.</span><sup class="reference" data-dcnode-id="5189" id="cite_ref-Drago119_17-0"><a data-dcnode-id="5190" href="#cite_note-Drago119-17"><span data-dcnode-id="5191" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5188" instrument_node="">
</span></p><span data-dcnode-id="5186" instrument_node="">
</span><h4 data-dcnode-id="5176"><span class="mw-headline" data-dcnode-id="5184" id="Design_and_building_of_the_inclined_planes"><span data-dcnode-id="5185" instrument_node="">Design and building of the inclined planes</span></span><span class="mw-editsection" data-dcnode-id="5177"><span class="mw-editsection-bracket" data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">[</span></span><a data-dcnode-id="5180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D4" title="Edit section: Design and building of the inclined planes"><span data-dcnode-id="5181" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5175" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5166"><div class="thumbinner" data-dcnode-id="5167" style="width:202px;"><a class="image" data-dcnode-id="5173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AInclined_Plane_Powerhose_from_HAER.pdf"><img alt="" class="thumbimage" data-dcnode-id="5174" data-file-height="1647" data-file-width="1293" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/12/Inclined_Plane_Powerhose_from_HAER.pdf/page1-200px-Inclined_Plane_Powerhose_from_HAER.pdf.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/12/Inclined_Plane_Powerhose_from_HAER.pdf/page1-300px-Inclined_Plane_Powerhose_from_HAER.pdf.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/12/Inclined_Plane_Powerhose_from_HAER.pdf/page1-400px-Inclined_Plane_Powerhose_from_HAER.pdf.jpg 2x" width="200"></a><span data-dcnode-id="5172" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5168"><div class="magnify" data-dcnode-id="5170"><a class="internal" data-dcnode-id="5171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AInclined_Plane_Powerhose_from_HAER.pdf" title="Enlarge"></a></div><span data-dcnode-id="5169" instrument_node="">Drawing of the powerhouse for the Boonton Plane (7 East).</span></div></div></div><span data-dcnode-id="5165" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5156"><div class="thumbinner" data-dcnode-id="5157" style="width:202px;"><a class="image" data-dcnode-id="5163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_Canal_Plane_7_West_from_HAER_%28cropped%29.tiff"><img alt="" class="thumbimage" data-dcnode-id="5164" data-file-height="3152" data-file-width="4439" decoding="async" height="142" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Morris_Canal_Plane_7_West_from_HAER_%2528cropped%2529.tiff/lossy-page1-200px-Morris_Canal_Plane_7_West_from_HAER_%2528cropped%2529.tiff.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Morris_Canal_Plane_7_West_from_HAER_%28cropped%29.tiff/lossy-page1-300px-Morris_Canal_Plane_7_West_from_HAER_%28cropped%29.tiff.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Morris_Canal_Plane_7_West_from_HAER_%28cropped%29.tiff/lossy-page1-400px-Morris_Canal_Plane_7_West_from_HAER_%28cropped%29.tiff.jpg 2x" width="200"></a><span data-dcnode-id="5162" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5158"><div class="magnify" data-dcnode-id="5160"><a class="internal" data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_Canal_Plane_7_West_from_HAER_%28cropped%29.tiff" title="Enlarge"></a></div><span data-dcnode-id="5159" instrument_node="">Powerhouse which has the machinery can be seen in the middle of the photo, as well as the flume and the routing of the cables for Inclined Plane 7 West</span></div></div></div><span data-dcnode-id="5155" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5146"><div class="thumbinner" data-dcnode-id="5147" style="width:202px;"><a class="image" data-dcnode-id="5153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AControls_for_Inclined_Plane_on_Morris_Canal_from_HABS.png"><img alt="" class="thumbimage" data-dcnode-id="5154" data-file-height="3483" data-file-width="4424" decoding="async" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Controls_for_Inclined_Plane_on_Morris_Canal_from_HABS.png/200px-Controls_for_Inclined_Plane_on_Morris_Canal_from_HABS.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Controls_for_Inclined_Plane_on_Morris_Canal_from_HABS.png/300px-Controls_for_Inclined_Plane_on_Morris_Canal_from_HABS.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Controls_for_Inclined_Plane_on_Morris_Canal_from_HABS.png/400px-Controls_for_Inclined_Plane_on_Morris_Canal_from_HABS.png 2x" width="200"></a><span data-dcnode-id="5152" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5148"><div class="magnify" data-dcnode-id="5150"><a class="internal" data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AControls_for_Inclined_Plane_on_Morris_Canal_from_HABS.png" title="Enlarge"></a></div><span data-dcnode-id="5149" instrument_node="">Controls inside a powerhouse for one of the planes</span></div></div></div><span data-dcnode-id="5145" instrument_node="">
</span><p data-dcnode-id="5121"><span data-dcnode-id="5144" instrument_node="">The vertical movement on the Morris Canal 1,672 feet (510&nbsp;m) was 18 feet per mile (3.4&nbsp;m/km), in comparison with less than 1 foot per mile (19&nbsp;cm/km) on the </span><a data-dcnode-id="5142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Erie_Canal" title="Erie Canal"><span data-dcnode-id="5143" instrument_node="">Erie Canal</span></a><span data-dcnode-id="5141" instrument_node="">, and would have required a lock every 2 miles (3.2&nbsp;km), which would have made the costs prohibitive.</span><sup class="reference" data-dcnode-id="5138" id="cite_ref-18"><a data-dcnode-id="5139" href="#cite_note-18"><span data-dcnode-id="5140" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5137" instrument_node="">
</span><a data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Renwick_%28physicist%29" title="James Renwick (physicist)"><span data-dcnode-id="5136" instrument_node="">James Renwick</span></a><span data-dcnode-id="5134" instrument_node="">, a professor at Columbia University, devised the idea of using inclined planes to raise the boats 1,600 feet (490&nbsp;m) in 90 miles (140&nbsp;km), instead of using about 300 lift locks, since a lift lock of that time typically lifted about 6 feet (1.8&nbsp;m).</span><sup class="reference" data-dcnode-id="5131" id="cite_ref-19"><a data-dcnode-id="5132" href="#cite_note-19"><span data-dcnode-id="5133" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5130" instrument_node=""> In the end, Renwick used only 23 inclined planes and 23 locks.</span><sup class="reference" data-dcnode-id="5127" id="cite_ref-Drago119_17-1"><a data-dcnode-id="5128" href="#cite_note-Drago119-17"><span data-dcnode-id="5129" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5126" instrument_node=""> Lock dimensions were originally 9 feet (2.7&nbsp;m) wide and 75 feet (23&nbsp;m) long</span><sup class="reference" data-dcnode-id="5123" id="cite_ref-Morris3_20-0"><a data-dcnode-id="5124" href="#cite_note-Morris3-20"><span data-dcnode-id="5125" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5122" instrument_node="">
</span></p><p data-dcnode-id="5111"><span data-dcnode-id="5120" instrument_node="">Renwick's original design seems to have been to have double tracks on all inclined planes, with the descending caisson holding more water; thus, the system theoretically would not have needed external power.</span><sup class="reference" data-dcnode-id="5117" id="cite_ref-Goller11_21-0"><a data-dcnode-id="5118" href="#cite_note-Goller11-21"><span data-dcnode-id="5119" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5116" instrument_node=""> Nevertheless, the inclined planes were built with overshot water wheels to supply power.</span><sup class="reference" data-dcnode-id="5113" id="cite_ref-Goller11_21-1"><a data-dcnode-id="5114" href="#cite_note-Goller11-21"><span data-dcnode-id="5115" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5112" instrument_node="">
</span></p><p data-dcnode-id="5102"><span data-dcnode-id="5110" instrument_node="">The early planes were done by different contractors and differed greatly. In 1829, the canal company hired </span><a data-dcnode-id="5108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Bates_Douglass" title="David Bates Douglass"><span data-dcnode-id="5109" instrument_node="">David Bates Douglass</span></a><span data-dcnode-id="5107" instrument_node=""> from West Point, who became the chief engineer of the planes. He supervised the construction of the remaining planes to be built and also altered the already built planes.</span><sup class="reference" data-dcnode-id="5104" id="cite_ref-Goller12_14-1"><a data-dcnode-id="5105" href="#cite_note-Goller12-14"><span data-dcnode-id="5106" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5103" instrument_node="">
</span></p><p data-dcnode-id="5080"><span data-dcnode-id="5101" instrument_node="">The inclined planes had a set of tracks, gauge about </span><span class="frac" data-dcnode-id="5090" role="math"><span data-dcnode-id="5098" instrument_node="">12</span><span class="sr-only" data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">+</span></span><span class="num" data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">1</span></span><span data-dcnode-id="5093" instrument_node="">⁄</span><span class="den" data-dcnode-id="5091"><span data-dcnode-id="5092" instrument_node="">2</span></span></span><span data-dcnode-id="5089" instrument_node=""> feet (3.8&nbsp;m), running from the lower level up the incline, over the crest of the hill at the top, and down into the next level. Tracks were submerged at both ends. A large cradle, holding the boat, ran on the tracks.</span><sup class="reference" data-dcnode-id="5086" id="cite_ref-22"><a data-dcnode-id="5087" href="#cite_note-22"><span data-dcnode-id="5088" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5085" instrument_node=""> Iron overshot waterwheels originally powered the planes.</span><sup class="reference" data-dcnode-id="5082" id="cite_ref-23"><a data-dcnode-id="5083" href="#cite_note-23"><span data-dcnode-id="5084" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5081" instrument_node="">
</span></p><p data-dcnode-id="5056"><span data-dcnode-id="5079" instrument_node="">The </span><a data-dcnode-id="5077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Segner_wheel" title="Segner wheel"><span data-dcnode-id="5078" instrument_node="">Scotch (reaction) turbines</span></a><span data-dcnode-id="5076" instrument_node="">, which later replaced the overshot water wheels, were </span><link data-dcnode-id="5075" href="mw-data:TemplateStyles:r1020198016" rel="mw-deduplicated-inline-style"><span class="frac" data-dcnode-id="5066" role="math"><span data-dcnode-id="5074" instrument_node="">12</span><span class="sr-only" data-dcnode-id="5072"><span data-dcnode-id="5073" instrument_node="">+</span></span><span class="num" data-dcnode-id="5070"><span data-dcnode-id="5071" instrument_node="">1</span></span><span data-dcnode-id="5069" instrument_node="">⁄</span><span class="den" data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">2</span></span></span><span data-dcnode-id="5065" instrument_node=""> feet (3.8&nbsp;m) feet in diameter and made of cast iron. They could pull boats up an 11% grade. The longest plane was the double-tracked Plane 9 West, which was 1,510 feet (460&nbsp;m) long and lifted boats 100 feet (30&nbsp;m) up (i.e. 6% grade) in 12 minutes.</span><sup class="reference" data-dcnode-id="5062" id="cite_ref-Morris3_20-1"><a data-dcnode-id="5063" href="#cite_note-Morris3-20"><span data-dcnode-id="5064" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5061" instrument_node=""> The total weight of the boat, cargo, and cradle was about 110–125 long tons (112–127&nbsp;t).</span><sup class="reference" data-dcnode-id="5058" id="cite_ref-Morris3_20-2"><a data-dcnode-id="5059" href="#cite_note-Morris3-20"><span data-dcnode-id="5060" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5057" instrument_node="">
</span></p><p data-dcnode-id="5009"><span data-dcnode-id="5055" instrument_node="">The Scotch turbines produced (for example, on Plane 2 West) 235 horsepower using a 45-foot (14&nbsp;m) head of water and had a discharge rate of 1,000 cubic feet (28&nbsp;m</span><sup data-dcnode-id="5053"><span data-dcnode-id="5054" instrument_node="">3</span></sup><span data-dcnode-id="5052" instrument_node="">) per minute. Some turbines were also reported to develop 704 horsepower.</span><sup class="reference" data-dcnode-id="5049" id="cite_ref-24"><a data-dcnode-id="5050" href="#cite_note-24"><span data-dcnode-id="5051" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5048" instrument_node=""> The winding drum was 12 feet (3.7&nbsp;m) in diameter and had a spiral grove of 3 inches (76&nbsp;mm) pitch. The rope was fastened on both ends to the drum, and there was a clutch that allowed the direction of the wheel to be reversed. The plane had two lines of steel rails, with a gauge of </span><link data-dcnode-id="5047" href="mw-data:TemplateStyles:r1020198016" rel="mw-deduplicated-inline-style"><span data-dcnode-id="5046" instrument_node="">12&nbsp;feet </span><span class="frac" data-dcnode-id="5037" role="math"><span data-dcnode-id="5045" instrument_node="">4</span><span class="sr-only" data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">+</span></span><span class="num" data-dcnode-id="5041"><span data-dcnode-id="5042" instrument_node="">1</span></span><span data-dcnode-id="5040" instrument_node="">⁄</span><span class="den" data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">2</span></span></span><span data-dcnode-id="5036" instrument_node="">&nbsp;inches (3.772&nbsp;m) from center of rail to center. Rails were </span><link data-dcnode-id="5035" href="mw-data:TemplateStyles:r1020198016" rel="mw-deduplicated-inline-style"><span class="frac" data-dcnode-id="5026" role="math"><span data-dcnode-id="5034" instrument_node="">3</span><span class="sr-only" data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">+</span></span><span class="num" data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">1</span></span><span data-dcnode-id="5029" instrument_node="">⁄</span><span class="den" data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">8</span></span></span><span data-dcnode-id="5025" instrument_node=""> inches (7.9&nbsp;cm) wide at top and </span><link data-dcnode-id="5024" href="mw-data:TemplateStyles:r1020198016" rel="mw-deduplicated-inline-style"><span class="frac" data-dcnode-id="5015" role="math"><span data-dcnode-id="5023" instrument_node="">3</span><span class="sr-only" data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">+</span></span><span class="num" data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">1</span></span><span data-dcnode-id="5018" instrument_node="">⁄</span><span class="den" data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">2</span></span></span><span data-dcnode-id="5014" instrument_node=""> inches (8.9&nbsp;cm) high, and weighed 76 pounds per yard (38&nbsp;kg/m). The cradle had a brake, in case the load went downhill too fast. Descent was also checked by the plane-man by putting about half power through the turbine.</span><sup class="reference" data-dcnode-id="5011" id="cite_ref-catskill_25-0"><a data-dcnode-id="5012" href="#cite_note-catskill-25"><span data-dcnode-id="5013" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5010" instrument_node=""> The water was fed into the turbines from below, thus relieving friction on the bearings and balancing them.
</span></p><p data-dcnode-id="4994"><span data-dcnode-id="5008" instrument_node="">A comparison of Plane 2 West (Stanhope), which had a 72-foot (22&nbsp;m) lift, with a flight of 12 locks yields the following: the plane took 5 minutes 30 seconds, and consumed 3,180 cubic feet (90&nbsp;m</span><sup data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">3</span></sup><span data-dcnode-id="5005" instrument_node="">) of water lifting a loaded boat. Locks 95 by 11 by 6 feet (29.0&nbsp;m ×&nbsp;3.4&nbsp;m ×&nbsp;1.8&nbsp;m), meaning 6,270 cubic feet (178&nbsp;m</span><sup data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">3</span></sup><span data-dcnode-id="5002" instrument_node="">) of water per lock) would consume 72,240 cubic feet (2,046&nbsp;m</span><sup data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">3</span></sup><span data-dcnode-id="4999" instrument_node="">) for 12 locks (about 23 times more water) and would take 96 minutes.</span><sup class="reference" data-dcnode-id="4996" id="cite_ref-catskill_25-1"><a data-dcnode-id="4997" href="#cite_note-catskill-25"><span data-dcnode-id="4998" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4995" instrument_node="">
</span></p><p data-dcnode-id="4982"><span data-dcnode-id="4993" instrument_node="">The </span><a data-dcnode-id="4991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elbl%25C4%2585g_Canal" title="Elbląg Canal"><span data-dcnode-id="4992" instrument_node="">Elbląg Canal</span></a><span data-dcnode-id="4990" instrument_node="">, one of </span><a data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seven_Wonders_of_Poland" title="Seven Wonders of Poland"><span data-dcnode-id="4989" instrument_node="">Seven Wonders of Poland</span></a><span data-dcnode-id="4987" instrument_node="">, used the Morris Canal's technology as inspiration for its inclined planes; for that reason, the inclined planes on that canal strongly resemble those on the Morris Canal.</span><sup class="reference" data-dcnode-id="4984" id="cite_ref-catskill_25-2"><a data-dcnode-id="4985" href="#cite_note-catskill-25"><span data-dcnode-id="4986" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4983" instrument_node="">
</span></p><p data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">The Newark Eagle reported in 1830:
</span></p><span data-dcnode-id="4979" instrument_node="">
</span><blockquote data-dcnode-id="4970"><span data-dcnode-id="4978" instrument_node="">
</span><p data-dcnode-id="4972"><span data-dcnode-id="4977" instrument_node="">The machinery was set in motion under the direction of Major Douglass, the enterprising Engineer. The boat, with two hundred persons on board, rose majestically out of the water; in one minute it was upon the summit, which it passed apparently with all the ease that a ship would cross a wave of the sea. As the forward wheels of the car commenced their descent, the boat seemed gently to bow to the spectators and the town below, then glided quickly down the wooden way. In six minutes and thirty seconds it descended from the summit and re-entered the canal, thus passing a plane one thousand and forty feet long, with a descent of seventy feet, in six and one half minutes.</span><sup class="reference" data-dcnode-id="4974" id="cite_ref-26"><a data-dcnode-id="4975" href="#cite_note-26"><span data-dcnode-id="4976" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4973" instrument_node="">
</span></p><span data-dcnode-id="4971" instrument_node="">
</span></blockquote><span data-dcnode-id="4969" instrument_node="">
</span><p data-dcnode-id="4960"><span data-dcnode-id="4968" instrument_node="">An English visitor, </span><a data-dcnode-id="4966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frances_Milton_Trollope" title="Frances Milton Trollope"><span data-dcnode-id="4967" instrument_node="">Fanny Trollope</span></a><span data-dcnode-id="4965" instrument_node="">, in her 1832 book </span><i data-dcnode-id="4962"><a data-dcnode-id="4963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Domestic_Manners_of_the_Americans" title="Domestic Manners of the Americans"><span data-dcnode-id="4964" instrument_node="">Domestic Manners of the Americans</span></a></i><span data-dcnode-id="4961" instrument_node="">, wrote of the canal:
</span></p><span data-dcnode-id="4959" instrument_node="">
</span><blockquote data-dcnode-id="4946"><p data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">We spent a delightful day in New Jersey, in visiting, with a most agreeable party, the inclined planes, which are used instead of locks on the Morris canal.
</span></p><p data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">This is a very interesting work; it is one among a thousand which prove the people of America to be the most enterprising in the world. I was informed that this important canal, which connects the waters of the Hudson and the Delaware, is a hundred miles long, and in this distance overcomes a variation of level amounting to sixteen hundred feet. Of this, fourteen hundred are achieved by inclined planes. The planes average about sixty feet of perpendicular lift each, and are to support about forty tons. The time consumed in passing them is twelve minutes for one hundred feet of perpendicular rise. The expense is less than a third of what locks would be for surmounting the same rise. If we set about any more canals, this may be worth attending to.
</span></p><p data-dcnode-id="4947"><span data-dcnode-id="4954" instrument_node="">
This Morris canal is certainly an extraordinary work; it not only varies its level sixteen hundred feet, but at one point runs along the side of a mountain at thirty feet above the tops of the highest buildings in the town of Paterson, below; at another it crosses the falls of the Passaic in a stone aqueduct sixty feet above the water in the river. This noble work, in a great degree, owes its existence to the patriotic and scientific energy of </span><a data-dcnode-id="4952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cadwallader_Colden" title="Cadwallader Colden"><span data-dcnode-id="4953" instrument_node="">Mr. Cadwallader Colden</span></a><span data-dcnode-id="4951" instrument_node="">.</span><sup class="reference" data-dcnode-id="4948" id="cite_ref-Trollope_27-0"><a data-dcnode-id="4949" href="#cite_note-Trollope-27"><span data-dcnode-id="4950" instrument_node="">[25]</span></a></sup></p></blockquote><span data-dcnode-id="4945" instrument_node="">
</span><h5 data-dcnode-id="4935"><span class="mw-headline" data-dcnode-id="4943" id="Orange_Street_Inclined_Plane"><span data-dcnode-id="4944" instrument_node="">Orange Street Inclined Plane</span></span><span class="mw-editsection" data-dcnode-id="4936"><span class="mw-editsection-bracket" data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">[</span></span><a data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D5" title="Edit section: Orange Street Inclined Plane"><span data-dcnode-id="4940" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">]</span></span></span></h5><span data-dcnode-id="4934" instrument_node="">
</span><p data-dcnode-id="4928"><span data-dcnode-id="4933" instrument_node="">In 1902, after a fatal crash between a Delaware and Lackawanna railroad train and a streetcar, the railroad grade was lowered (to the level it occupies today) and the Morris Canal had to make an electrically driven incline plane to bring boats up and over the railroad and Orange street, and then back down into the canal, with a pipe to carry the water across the break.</span><sup class="reference" data-dcnode-id="4930" id="cite_ref-28"><a data-dcnode-id="4931" href="#cite_note-28"><span data-dcnode-id="4932" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4929" instrument_node="">
</span></p><span data-dcnode-id="4927" instrument_node="">
</span><h4 data-dcnode-id="4917"><span class="mw-headline" data-dcnode-id="4925" id="Aqueducts"><span data-dcnode-id="4926" instrument_node="">Aqueducts</span></span><span class="mw-editsection" data-dcnode-id="4918"><span class="mw-editsection-bracket" data-dcnode-id="4923"><span data-dcnode-id="4924" instrument_node="">[</span></span><a data-dcnode-id="4921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D6" title="Edit section: Aqueducts"><span data-dcnode-id="4922" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4916" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4907"><div class="thumbinner" data-dcnode-id="4908" style="width:172px;"><a class="image" data-dcnode-id="4914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_Canal_Aqueduct_over_Pompton_River_from_HABS.png"><img alt="" class="thumbimage" data-dcnode-id="4915" data-file-height="3351" data-file-width="4440" decoding="async" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Morris_Canal_Aqueduct_over_Pompton_River_from_HABS.png/170px-Morris_Canal_Aqueduct_over_Pompton_River_from_HABS.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Morris_Canal_Aqueduct_over_Pompton_River_from_HABS.png/255px-Morris_Canal_Aqueduct_over_Pompton_River_from_HABS.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Morris_Canal_Aqueduct_over_Pompton_River_from_HABS.png/340px-Morris_Canal_Aqueduct_over_Pompton_River_from_HABS.png 2x" width="170"></a><span data-dcnode-id="4913" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4909"><div class="magnify" data-dcnode-id="4911"><a class="internal" data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_Canal_Aqueduct_over_Pompton_River_from_HABS.png" title="Enlarge"></a></div><span data-dcnode-id="4910" instrument_node="">The Pompton River aqueduct, which was the longest one at 236 feet (72&nbsp;m), was just upstream of where US Route 202 crosses the river</span></div></div></div><span data-dcnode-id="4906" instrument_node="">
</span><p data-dcnode-id="4893"><span data-dcnode-id="4905" instrument_node="">Several </span><a data-dcnode-id="4903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Navigable_aqueduct" title="Navigable aqueduct"><span data-dcnode-id="4904" instrument_node="">aqueducts</span></a><span data-dcnode-id="4902" instrument_node=""> were built for the canal: the 80-foot (24&nbsp;m) Little Falls Aqueduct over the Passaic River in Paterson, New Jersey, and the 236-foot (72&nbsp;m) Pompton River Aqueduct,</span><sup class="reference" data-dcnode-id="4899" id="cite_ref-Morris3_20-3"><a data-dcnode-id="4900" href="#cite_note-Morris3-20"><span data-dcnode-id="4901" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4898" instrument_node=""> as well as aqueducts over the Second and Third river</span><sup class="reference" data-dcnode-id="4895" id="cite_ref-29"><a data-dcnode-id="4896" href="#cite_note-29"><span data-dcnode-id="4897" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4894" instrument_node="">
</span></p><p data-dcnode-id="4887"><span data-dcnode-id="4892" instrument_node="">The longest level was 17 miles (27&nbsp;km), from Bloomfield to Lincoln Park; the second-longest, 11 miles (18&nbsp;km) from Port Murray to Saxon Falls.</span><sup class="reference" data-dcnode-id="4889" id="cite_ref-Morris3_20-4"><a data-dcnode-id="4890" href="#cite_note-Morris3-20"><span data-dcnode-id="4891" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4888" instrument_node="">
</span></p><p data-dcnode-id="4875"><span data-dcnode-id="4886" instrument_node="">The aqueduct over the </span><a data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pohatcong_Creek" title="Pohatcong Creek"><span data-dcnode-id="4885" instrument_node="">Pohatcong Creek</span></a><span data-dcnode-id="4883" instrument_node=""> at the base of Inclined Plane 7 West is now used as a road bridge on Plane Hill Road in </span><a data-dcnode-id="4881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bowerstown%2C_New_Jersey" title="Bowerstown, New Jersey"><span data-dcnode-id="4882" instrument_node="">Bowerstown</span></a><span data-dcnode-id="4880" instrument_node="">.</span><sup class="reference" data-dcnode-id="4877" id="cite_ref-30"><a data-dcnode-id="4878" href="#cite_note-30"><span data-dcnode-id="4879" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4876" instrument_node="">
</span></p><span data-dcnode-id="4874" instrument_node="">
</span><h4 data-dcnode-id="4864"><span class="mw-headline" data-dcnode-id="4872" id="Opening_of_the_canal"><span data-dcnode-id="4873" instrument_node="">Opening of the canal</span></span><span class="mw-editsection" data-dcnode-id="4865"><span class="mw-editsection-bracket" data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">[</span></span><a data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D7" title="Edit section: Opening of the canal"><span data-dcnode-id="4869" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4863" instrument_node="">
</span><p data-dcnode-id="4838"><span data-dcnode-id="4862" instrument_node="">On November 1, 1830, before the whole canal was finished, the eastern side of the canal between Dover and Newark was tested with several boats loaded with iron ore and iron. These went through the planes without incident.</span><sup class="reference" data-dcnode-id="4859" id="cite_ref-Drago119_17-2"><a data-dcnode-id="4860" href="#cite_note-Drago119-17"><span data-dcnode-id="4861" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4858" instrument_node=""> On May 20, 1832, the canal was officially opened.</span><sup class="reference" data-dcnode-id="4855" id="cite_ref-Drago119_17-3"><a data-dcnode-id="4856" href="#cite_note-Drago119-17"><span data-dcnode-id="4857" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4854" instrument_node=""> The first boat passing entirely through the canal was the </span><i data-dcnode-id="4852"><span data-dcnode-id="4853" instrument_node="">Walk-on-Water</span></i><span data-dcnode-id="4851" instrument_node="">,</span><sup class="reference" data-dcnode-id="4848" id="cite_ref-31"><a data-dcnode-id="4849" href="#cite_note-31"><span data-dcnode-id="4850" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4847" instrument_node=""> followed by two coal-laden boats went from Phillipsburg all the way to Newark.</span><sup class="reference" data-dcnode-id="4844" id="cite_ref-Drago119_17-4"><a data-dcnode-id="4845" href="#cite_note-Drago119-17"><span data-dcnode-id="4846" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4843" instrument_node=""> This initial section (not counting the Jersey City portion, which was done later) ran 98.62 miles (158.71&nbsp;km) and cost $2,104,413 (equivalent to $57,120,784 in 2021).</span><sup class="reference" data-dcnode-id="4840" id="cite_ref-32"><a data-dcnode-id="4841" href="#cite_note-32"><span data-dcnode-id="4842" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4839" instrument_node="">
</span></p><span data-dcnode-id="4837" instrument_node="">
</span><h3 data-dcnode-id="4827"><span class="mw-headline" data-dcnode-id="4835" id="Operating_years"><span data-dcnode-id="4836" instrument_node="">Operating years</span></span><span class="mw-editsection" data-dcnode-id="4828"><span class="mw-editsection-bracket" data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">[</span></span><a data-dcnode-id="4831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D8" title="Edit section: Operating years"><span data-dcnode-id="4832" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4826" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4811"><div class="thumbinner" data-dcnode-id="4812" style="width:222px;"><a class="image" data-dcnode-id="4824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_Canal%2C_Scotch_Turbine_Display_-_general_view.jpg"><img alt="" class="thumbimage" data-dcnode-id="4825" data-file-height="3534" data-file-width="2650" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Morris_Canal%252C_Scotch_Turbine_Display_-_general_view.jpg/220px-Morris_Canal%252C_Scotch_Turbine_Display_-_general_view.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Morris_Canal%2C_Scotch_Turbine_Display_-_general_view.jpg/330px-Morris_Canal%2C_Scotch_Turbine_Display_-_general_view.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/14/Morris_Canal%2C_Scotch_Turbine_Display_-_general_view.jpg/440px-Morris_Canal%2C_Scotch_Turbine_Display_-_general_view.jpg 2x" width="220"></a><span data-dcnode-id="4823" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4813"><div class="magnify" data-dcnode-id="4821"><a class="internal" data-dcnode-id="4822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_Canal%2C_Scotch_Turbine_Display_-_general_view.jpg" title="Enlarge"></a></div><span data-dcnode-id="4820" instrument_node="">Scotch or </span><a class="mw-redirect" data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reaction_turbine" title="Reaction turbine"><span data-dcnode-id="4819" instrument_node="">reaction turbine</span></a><span data-dcnode-id="4817" instrument_node=""> used for Inclined Plane 3 East on display at </span><a data-dcnode-id="4815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hopatcong_State_Park" title="Hopatcong State Park"><span data-dcnode-id="4816" instrument_node="">Hopatcong State Park</span></a><span data-dcnode-id="4814" instrument_node="">. This turbine, running with 47 feet (14&nbsp;m) head at 58 rpm, venting 90.6 second feet, gives 30% efficiency. Water goes in the bottom, and comes out the sides, relieving pressure on bearings.</span></div></div></div><span data-dcnode-id="4810" instrument_node="">
</span><p data-dcnode-id="4792"><span data-dcnode-id="4809" instrument_node="">Soon after opening, it became apparent that the canal had to be widened and had to be extended across to the New York Bay across Bayonne.</span><sup class="reference" data-dcnode-id="4806" id="cite_ref-Drago119_17-5"><a data-dcnode-id="4807" href="#cite_note-Drago119-17"><span data-dcnode-id="4808" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4805" instrument_node=""> Early boats, called "flickers," could only carry 18 tons.</span><sup class="reference" data-dcnode-id="4802" id="cite_ref-Goller8_33-0"><a data-dcnode-id="4803" href="#cite_note-Goller8-33"><span data-dcnode-id="4804" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4801" instrument_node=""> By 1840 the company had finished enlarging the locks, canal, and planes, and finished building the extension to Jersey City. Boats were divided in two, hitched with a pin, as were the trucks (cradles) on the inclined planes.</span><sup class="reference" data-dcnode-id="4798" id="cite_ref-Drago120_34-0"><a data-dcnode-id="4799" href="#cite_note-Drago120-34"><span data-dcnode-id="4800" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4797" instrument_node=""> The enlarged locks' dimensions were now 11 feet (3.4&nbsp;m) wide and 90 feet (27&nbsp;m) long.</span><sup class="reference" data-dcnode-id="4794" id="cite_ref-Morris3_20-5"><a data-dcnode-id="4795" href="#cite_note-Morris3-20"><span data-dcnode-id="4796" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4793" instrument_node="">
</span></p><p data-dcnode-id="4778"><span data-dcnode-id="4791" instrument_node="">The original company failed in 1841 amid banking scandals, and the canal was leased to private bidders for three years.</span><sup class="reference" data-dcnode-id="4788" id="cite_ref-Goller7_35-0"><a data-dcnode-id="4789" href="#cite_note-Goller7-35"><span data-dcnode-id="4790" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4787" instrument_node=""> The canal company was reorganized in 1844, with a capitalization of $1 million. The canal bed was inspected, and improvements were made. First, the places where seepage occurred were lined with clay, and two feeders were dug, to Lake Hopatcong and to Pompton. The inclined planes were rebuilt with wire cabling.</span><sup class="reference" data-dcnode-id="4784" id="cite_ref-Drago120_34-1"><a data-dcnode-id="4785" href="#cite_note-Drago120-34"><span data-dcnode-id="4786" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4783" instrument_node=""> Banking privileges were removed in 1849, leaving the company as a canal-operating business only.</span><sup class="reference" data-dcnode-id="4780" id="cite_ref-Goller7_35-1"><a data-dcnode-id="4781" href="#cite_note-Goller7-35"><span data-dcnode-id="4782" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4779" instrument_node="">
</span></p><p data-dcnode-id="4773"><span data-dcnode-id="4777" instrument_node="">By 1860, the canal had been progressively enlarged to accommodate boats of 70 long tons (71&nbsp;t). Traffic reached a peak in 1866, when the canal carried 889,220 long tons (903,490&nbsp;t) of freight (equivalent to nearly 13,000 boatloads). Between 1848 and 1860, the original overshot </span><a data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_wheel" title="Water wheel"><span data-dcnode-id="4776" instrument_node="">water wheels</span></a><span data-dcnode-id="4774" instrument_node=""> that powered the inclined planes were replaced with more powerful water turbines. The locks and inclines planes were also renumbered since some had been combined or eliminated.
</span></p><p data-dcnode-id="4734"><span data-dcnode-id="4772" instrument_node="">Boats of 79 long tons (80&nbsp;t) were now </span><link data-dcnode-id="4771" href="mw-data:TemplateStyles:r1020198016" rel="mw-deduplicated-inline-style"><span class="frac" data-dcnode-id="4762" role="math"><span data-dcnode-id="4770" instrument_node="">87</span><span class="sr-only" data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">+</span></span><span class="num" data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">1</span></span><span data-dcnode-id="4765" instrument_node="">⁄</span><span class="den" data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">2</span></span></span><span data-dcnode-id="4761" instrument_node=""> feet (26.7&nbsp;m) long, </span><link data-dcnode-id="4760" href="mw-data:TemplateStyles:r1020198016" rel="mw-deduplicated-inline-style"><span class="frac" data-dcnode-id="4751" role="math"><span data-dcnode-id="4759" instrument_node="">10</span><span class="sr-only" data-dcnode-id="4757"><span data-dcnode-id="4758" instrument_node="">+</span></span><span class="num" data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">1</span></span><span data-dcnode-id="4754" instrument_node="">⁄</span><span class="den" data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">2</span></span></span><span data-dcnode-id="4750" instrument_node=""> feet (3.2&nbsp;m) wide, and drew </span><link data-dcnode-id="4749" href="mw-data:TemplateStyles:r1020198016" rel="mw-deduplicated-inline-style"><span class="frac" data-dcnode-id="4740" role="math"><span data-dcnode-id="4748" instrument_node="">4</span><span class="sr-only" data-dcnode-id="4746"><span data-dcnode-id="4747" instrument_node="">+</span></span><span class="num" data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">1</span></span><span data-dcnode-id="4743" instrument_node="">⁄</span><span class="den" data-dcnode-id="4741"><span data-
