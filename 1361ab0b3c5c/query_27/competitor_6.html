</span><h3 data-dcnode-id="4585"><span class="mw-headline" data-dcnode-id="4593" id="Cargo"><span data-dcnode-id="4594" instrument_node="">Cargo</span></span><span class="mw-editsection" data-dcnode-id="4586"><span class="mw-editsection-bracket" data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">[</span></span><a data-dcnode-id="4589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D9" title="Edit section: Cargo"><span data-dcnode-id="4590" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4584" instrument_node="">
</span><p data-dcnode-id="4562"><span data-dcnode-id="4583" instrument_node="">The Morris canal carried coal, malleable pig iron,</span><sup class="reference" data-dcnode-id="4580" id="cite_ref-Drago120_34-2"><a data-dcnode-id="4581" href="#cite_note-Drago120-34"><span data-dcnode-id="4582" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4579" instrument_node=""> and iron ore. It also carried grain, wood, cider, vinegar, beer, whiskey, bricks, hay, hides, sugar, lumber, manure, lime,</span><sup class="reference" data-dcnode-id="4576" id="cite_ref-37"><a data-dcnode-id="4577" href="#cite_note-37"><span data-dcnode-id="4578" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4575" instrument_node=""> and ice. Although it is said that the Morris Canal was mainly a freight canal and not a passenger canal,</span><sup class="reference" data-dcnode-id="4572" id="cite_ref-Drago120_34-3"><a data-dcnode-id="4573" href="#cite_note-Drago120-34"><span data-dcnode-id="4574" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4571" instrument_node=""> some boats on the Morris Canal did offer "Cool summer rides accompanied by a shipment of ice".</span><sup class="reference" data-dcnode-id="4568" id="cite_ref-Sloane_38-0"><a data-dcnode-id="4569" href="#cite_note-Sloane-38"><span data-dcnode-id="4570" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4567" instrument_node=""> Additional cargo include scrap metal, zinc, sand, clay, and farm products.</span><sup class="reference" data-dcnode-id="4564" id="cite_ref-39"><a data-dcnode-id="4565" href="#cite_note-39"><span data-dcnode-id="4566" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4563" instrument_node="">
</span></p><p data-dcnode-id="4547"><span data-dcnode-id="4561" instrument_node="">Iron ore from the Ogden Mine was brought to Nolan's Point (Lake Hopatcong). In 1880 the canal transported 1,700 boatloads (about 108,000 long tons (110,000&nbsp;t)) of iron ore.</span><sup class="reference" data-dcnode-id="4558" id="cite_ref-Morris3_20-7"><a data-dcnode-id="4559" href="#cite_note-Morris3-20"><span data-dcnode-id="4560" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4557" instrument_node=""> Thereafter, competition from </span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taconite" title="Taconite"><span data-dcnode-id="4556" instrument_node="">taconite</span></a><span data-dcnode-id="4554" instrument_node=""> ore in the </span><a data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lake_Superior" title="Lake Superior"><span data-dcnode-id="4553" instrument_node="">Lake Superior</span></a><span data-dcnode-id="4551" instrument_node=""> region brought a decline in New Jersey </span><a data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bog_iron" title="Bog iron"><span data-dcnode-id="4550" instrument_node="">bog iron</span></a><span data-dcnode-id="4548" instrument_node="">.
</span></p><span data-dcnode-id="4546" instrument_node="">
</span><h3 data-dcnode-id="4536"><span class="mw-headline" data-dcnode-id="4544" id="Working_hours"><span data-dcnode-id="4545" instrument_node="">Working hours</span></span><span class="mw-editsection" data-dcnode-id="4537"><span class="mw-editsection-bracket" data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">[</span></span><a data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D10" title="Edit section: Working hours"><span data-dcnode-id="4541" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4535" instrument_node="">
</span><p data-dcnode-id="4529"><span data-dcnode-id="4534" instrument_node="">The plane tender of Plane 11 East reported that during the operating days, boats would tie up at night up to a mile above the plane, down another mile to Lock 15 East (Lock 14 East in the old 1836 numbering), and then about a mile below Lock 14 East. They would start putting boats through starting around 4 a.m. (dawn), and go all day long until 10 p.m., often handling boatmen who had gone through that morning, unloaded in Newark, and were returning.</span><sup class="reference" data-dcnode-id="4531" id="cite_ref-40"><a data-dcnode-id="4532" href="#cite_note-40"><span data-dcnode-id="4533" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4530" instrument_node="">
</span></p><span data-dcnode-id="4528" instrument_node="">
</span><h3 data-dcnode-id="4518"><span class="mw-headline" data-dcnode-id="4526" id="Decline"><span data-dcnode-id="4527" instrument_node="">Decline</span></span><span class="mw-editsection" data-dcnode-id="4519"><span class="mw-editsection-bracket" data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">[</span></span><a data-dcnode-id="4522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D11" title="Edit section: Decline"><span data-dcnode-id="4523" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4517" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4508"><div class="thumbinner" data-dcnode-id="4509" style="width:222px;"><a class="image" data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_H._Rau%2C_Morris_Canal_From_Green%2527s_Bridge%2C_c._1895%2C_NGA_165394.jpg"><img alt="" class="thumbimage" data-dcnode-id="4516" data-file-height="3345" data-file-width="4000" decoding="async" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/48/William_H._Rau%252C_Morris_Canal_From_Green%2527s_Bridge%252C_c._1895%252C_NGA_165394.jpg/220px-William_H._Rau%252C_Morris_Canal_From_Green%2527s_Bridge%252C_c._1895%252C_NGA_165394.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/48/William_H._Rau%2C_Morris_Canal_From_Green%27s_Bridge%2C_c._1895%2C_NGA_165394.jpg/330px-William_H._Rau%2C_Morris_Canal_From_Green%27s_Bridge%2C_c._1895%2C_NGA_165394.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/48/William_H._Rau%2C_Morris_Canal_From_Green%27s_Bridge%2C_c._1895%2C_NGA_165394.jpg/440px-William_H._Rau%2C_Morris_Canal_From_Green%27s_Bridge%2C_c._1895%2C_NGA_165394.jpg 2x" width="220"></a><span data-dcnode-id="4514" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4510"><div class="magnify" data-dcnode-id="4512"><a class="internal" data-dcnode-id="4513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_H._Rau%2C_Morris_Canal_From_Green%2527s_Bridge%2C_c._1895%2C_NGA_165394.jpg" title="Enlarge"></a></div><span data-dcnode-id="4511" instrument_node="">William H. Rau, Morris Canal From Green's Bridge, c. 1895</span></div></div></div><span data-dcnode-id="4507" instrument_node="">
</span><p data-dcnode-id="4501"><span data-dcnode-id="4506" instrument_node="">The canal's profitability was undermined by railroads, which could deliver in five hours cargo that took four days by boat.</span><sup class="reference" data-dcnode-id="4503" id="cite_ref-Drago120_34-4"><a data-dcnode-id="4504" href="#cite_note-Drago120-34"><span data-dcnode-id="4505" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4502" instrument_node="">
</span></p><p data-dcnode-id="4496"><span data-dcnode-id="4500" instrument_node="">In 1871, the canal was leased by the </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Valley_Railroad" title="Lehigh Valley Railroad"><span data-dcnode-id="4499" instrument_node="">Lehigh Valley Railroad</span></a><span data-dcnode-id="4497" instrument_node="">, which sought the valuable terminal properties at Phillipsburg and Jersey City. The railroad never realized a profit from the operation of the canal.
</span></p><p data-dcnode-id="4482"><span data-dcnode-id="4495" instrument_node="">By the early 20th century, commercial traffic on the canal had become negligible. Two committees, in 1903 and 1912, recommended abandoning the canal.</span><sup class="reference" data-dcnode-id="4492" id="cite_ref-Goller8_33-1"><a data-dcnode-id="4493" href="#cite_note-Goller8-33"><span data-dcnode-id="4494" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4491" instrument_node=""> The 1912 survey wrote, "...from Jersey City to Paterson, [the canal] was little more than an open sewer ... but its value beyond Paterson was of great importance, no longer as a freight transit line but as a parkway."</span><sup class="reference" data-dcnode-id="4488" id="cite_ref-41"><a data-dcnode-id="4489" href="#cite_note-41"><span data-dcnode-id="4490" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4487" instrument_node=""> Many of the existing photographs of the working canal were shot as part of these surveys, as well as by other people who wanted photographs of the canal before its demise.</span><sup class="reference" data-dcnode-id="4484" id="cite_ref-Goller8_33-2"><a data-dcnode-id="4485" href="#cite_note-Goller8-33"><span data-dcnode-id="4486" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4483" instrument_node="">
</span></p><p data-dcnode-id="4469"><span data-dcnode-id="4481" instrument_node="">In 1918, the canal company filed a lawsuit to block the construction of the </span><a data-dcnode-id="4479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wanaque_Reservoir" title="Wanaque Reservoir"><span data-dcnode-id="4480" instrument_node="">Wanaque Reservoir</span></a><span data-dcnode-id="4478" instrument_node=""> in Passic County, asserting that the reservoir would divert water needed for the Pompton feeder. The company won the suit in 1922, but the victory was Pyrrhic; the canal was now viewed as an impediment to the development of the area's water supply. On March 1, 1923, the state of New Jersey took possession of the canal;</span><sup class="reference" data-dcnode-id="4475" id="cite_ref-Goller8_33-3"><a data-dcnode-id="4476" href="#cite_note-Goller8-33"><span data-dcnode-id="4477" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4474" instrument_node=""> it shut it down the following year. Over the next five years, the state largely dismantled the canal: the water was drained out, banks were cut, and canal works destroyed, including needlessly dynamiting the Little Falls aqueduct.</span><sup class="reference" data-dcnode-id="4471" id="cite_ref-42"><a data-dcnode-id="4472" href="#cite_note-42"><span data-dcnode-id="4473" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4470" instrument_node="">
</span></p><p data-dcnode-id="4464"><span data-dcnode-id="4468" instrument_node="">The Newark City Subway, now </span><a data-dcnode-id="4466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newark_Light_Rail" title="Newark Light Rail"><span data-dcnode-id="4467" instrument_node="">Newark Light Rail</span></a><span data-dcnode-id="4465" instrument_node="">, was built along its route.
</span></p><span data-dcnode-id="4463" instrument_node="">
</span><h2 data-dcnode-id="4453"><span class="mw-headline" data-dcnode-id="4461" id="Canal_today"><span data-dcnode-id="4462" instrument_node="">Canal today</span></span><span class="mw-editsection" data-dcnode-id="4454"><span class="mw-editsection-bracket" data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">[</span></span><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMorris_Canal%26action%3Dedit%26section%3D12" title="Edit section: Canal today"><span data-dcnode-id="4458" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4452" instrument_node="">
</span><p data-dcnode-id="4433"><span data-dcnode-id="4451" instrument_node="">The Morris Canal Historic District was added to the </span><a data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Jersey_Register_of_Historic_Places" title="New Jersey Register of Historic Places"><span data-dcnode-id="4450" instrument_node="">New Jersey Register of Historic Places</span></a><span data-dcnode-id="4448" instrument_node=""> in 1973 and to the </span><a data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Register_of_Historic_Places" title="National Register of Historic Places"><span data-dcnode-id="4447" instrument_node="">National Register of Historic Places</span></a><span data-dcnode-id="4445" instrument_node=""> in 1974.</span><sup class="reference" data-dcnode-id="4442" id="cite_ref-43"><a data-dcnode-id="4443" href="#cite_note-43"><span data-dcnode-id="4444" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4441" instrument_node=""> The canal was listed as a </span><a class="mw-redirect" data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Historic_Civil_Engineering_Landmark" title="National Historic Civil Engineering Landmark"><span data-dcnode-id="4440" instrument_node="">National Historic Civil Engineering Landmark</span></a><span data-dcnode-id="4438" instrument_node=""> in 1980.</span><sup class="reference" data-dcnode-id="4435" id="cite_ref-44"><a data-dcnode-id="4436" href="#cite_note-44"><span data-dcnode-id="4437" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4434" instrument_node="">
</span></p><p data-dcnode-id="4425"><span data-dcnode-id="4432" instrument_node="">Portions of the canal are preserved. </span><a class="mw-redirect" data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waterloo_Village" title="Waterloo Village"><span data-dcnode-id="4431" instrument_node="">Waterloo Village</span></a><span data-dcnode-id="4429" instrument_node="">, a restored canal town in </span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sussex_County%2C_New_Jersey" title="Sussex County, New Jersey"><span data-dcnode-id="4428" instrument_node="">Sussex County</span></a><span data-dcnode-id="4426" instrument_node="">, has the remains of an inclined plane, a guard lock, a watered section of the canal, a canal store, and other period buildings. The Canal Society of New Jersey maintains a museum in the village.
</span></p><p data-dcnode-id="4410"><span data-dcnode-id="4424" instrument_node="">Other remnants and artifacts of the canal can be seen along its former course. On the South </span><a data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kearny%2C_New_Jersey" title="Kearny, New Jersey"><span data-dcnode-id="4423" instrument_node="">Kearny, New Jersey</span></a><span data-dcnode-id="4421" instrument_node="">, peninsula, where the canal ran just south of and parallel to the </span><a data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lincoln_Highway" title="Lincoln Highway"><span data-dcnode-id="4420" instrument_node="">Lincoln Highway</span></a><span data-dcnode-id="4418" instrument_node="">, now </span><a data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Route_1/9_Truck" title="U.S. Route 1/9 Truck"><span data-dcnode-id="4417" instrument_node="">U.S. Route 1/9 Truck</span></a><span data-dcnode-id="4415" instrument_node="">, the cross-highway bridges for Central Avenue and the rail spur immediately to its east were built to span the highway and the canal,</span><sup class="reference" data-dcnode-id="4412" id="cite_ref-45"><a data-dcnode-id="4413" href="#cite_note-45"><span data-dcnode-id="4414" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4411" instrument_node=""> resulting in spans that today seem unnecessarily long.
</span></p><p data-dcnode-id="4402"><span data-dcnode-id="4409" instrument_node="">The inlet where the canal connected to the Hudson River is now the north edge of </span><a data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberty_State_Park" title="Liberty State Park"><span data-dcnode-id="4408" instrument_node="">Liberty State Park</span></a><span data-dcnode-id="4406" instrument_node="">, and the right-of-way of the </span><a class="mw-redirect" data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hudson-Bergen_Light_Rail" title="Hudson-Bergen Light Rail"><span data-dcnode-id="4405" instrument_node="">Hudson-Bergen Light Rail</span></a><span data-dcnode-id="4403" instrument_node=""> follows the canal for part of its length..
</span></p><span data-dcnode-id="4401" instrument_node="">

</span><p data-dcnode-id="4372"><span data-dcnode-id="4389" instrument_node="">The </span><a data-dcnode-id="4387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Jersey_Transportation_Planning_Authority" title="North Jersey Transportation Planning Authority"><span data-dcnode-id="4388" instrument_node="">North Jersey Transportation Planning Authority</span></a><span data-dcnode-id="4386" instrument_node=""> is developing the Morris Canal Greenway, a group of passive recreation parks and preserves along parts of the former canal route.</span><sup class="reference" data-dcnode-id="4383" id="cite_ref-46"><a data-dcnode-id="4384" href="#cite_note-46"><span data-dcnode-id="4385" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="4380" id="cite_ref-47"><a data-dcnode-id="4381" href="#cite_note-47"><span data-dcnode-id="4382" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="4377" id="cite_ref-48"><a data-dcnode-id="4378" href="#cite_note-48"><span data-dcnode-id="4379" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="4374" id="cite_ref-ONeill-2017-11-26_49-0"><a data-dcnode-id="4375" href="#cite_note-ONeill-2017-11-26-49"><span data-dcnode-id="4376" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4373" instrument_node="">

</span><div class="reflist reflist-lower-alpha" data-dcnode-id="3813"><span data-dcnode-id="3931" instrument_node="">
</span><div class="mw-references-wrap" data-dcnode-id="3814"><ol class="references" data-dcnode-id="3815"><span data-dcnode-id="3930" instrument_node="">
</span><li data-dcnode-id="3890" id="cite_note-6"><span class="mw-cite-backlink" data-dcnode-id="3926"><b data-dcnode-id="3927"><a aria-label="Jump up" data-dcnode-id="3928" href="#cite_ref-6" title="Jump up"><span data-dcnode-id="3929" instrument_node="">^</span></a></b></span><span data-dcnode-id="3925" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3892"><span data-dcnode-id="3924" instrument_node="">Massachusetts </span><a data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middlesex_Canal" title="Middlesex Canal"><span data-dcnode-id="3923" instrument_node="">Middlesex Canal</span></a><span data-dcnode-id="3921" instrument_node=""> (1793-1808), the </span><a data-dcnode-id="3919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Canal" title="Lehigh Canal"><span data-dcnode-id="3920" instrument_node="">Lehigh Canal</span></a><span data-dcnode-id="3918" instrument_node="">'s 1st successes (1819,1820-1824), and New York's 1st</span><a data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Erie_Canal" title="Erie Canal"><span data-dcnode-id="3917" instrument_node="">Erie Canal</span></a><span data-dcnode-id="3915" instrument_node=""> sections (1821) had inspired industrialists and merchants in Baltimore and Pennsylvania to look for a way west, and better ways to travel faster. In and near most major settlements by the 1790s, homeowners and industrialists were looking for reachable </span><a data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wood" title="Wood"><span data-dcnode-id="3914" instrument_node="">wood</span></a><span data-dcnode-id="3912" instrument_node=""> stands or </span><a data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charcoal" title="Charcoal"><span data-dcnode-id="3911" instrument_node="">charcoal</span></a><span data-dcnode-id="3909" instrument_node=""> for heat and metalworking.</span><sup class="reference" data-dcnode-id="3906" id="cite_ref-Held_5-0"><a data-dcnode-id="3907" href="#cite_note-Held-5"><span data-dcnode-id="3908" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3905" instrument_node=""> In fuel-desperate Philadelphia, industrialist </span><a data-dcnode-id="3903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josiah_White" title="Josiah White"><span data-dcnode-id="3904" instrument_node="">Josiah White</span></a><span data-dcnode-id="3902" instrument_node="">, whose employees had developed a technique for getting </span><a data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthracite" title="Anthracite"><span data-dcnode-id="3901" instrument_node="">anthracite coal</span></a><span data-dcnode-id="3899" instrument_node=""> to ignite and burn, proposed a navigation canal along the Lehigh River in 1814-15, later known as the </span><a data-dcnode-id="3897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Canal" title="Lehigh Canal"><span data-dcnode-id="3898" instrument_node="">Lehigh Canal</span></a><span data-dcnode-id="3896" instrument_node="">. This feat, along with his involvement with the (less spectacularly successful) </span><a data-dcnode-id="3894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schuylkill_Canal" title="Schuylkill Canal"><span data-dcnode-id="3895" instrument_node="">Schuylkill Canal</span></a><span data-dcnode-id="3893" instrument_node=""> inspired business interests along the entire eastern seaboard to think anthracite and think bigger.
  </span></span><span data-dcnode-id="3891" instrument_node="">
</span></li><span data-dcnode-id="3889" instrument_node="">
</span><li data-dcnode-id="3849" id="cite_note-9"><span class="mw-cite-backlink" data-dcnode-id="3885"><b data-dcnode-id="3886"><a aria-label="Jump up" data-dcnode-id="3887" href="#cite_ref-9" title="Jump up"><span data-dcnode-id="3888" instrument_node="">^</span></a></b></span><span data-dcnode-id="3884" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3851"><span data-dcnode-id="3883" instrument_node=""> </span><a data-dcnode-id="3881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josiah_White" title="Josiah White"><span data-dcnode-id="3882" instrument_node="">Josiah White</span></a><span data-dcnode-id="3880" instrument_node=""> also spearheaded using Anthracite in a blast furnace to smelt </span><a data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthracite_iron" title="Anthracite iron"><span data-dcnode-id="3879" instrument_node="">anthracite iron</span></a><span data-dcnode-id="3877" instrument_node=""> at the </span><a class="mw-redirect" data-dcnode-id="3875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Crane_Iron_Works" title="Lehigh Crane Iron Works"><span data-dcnode-id="3876" instrument_node="">Lehigh Crane Iron Works</span></a><span data-dcnode-id="3874" instrument_node="">, an 1839 subsidiary of </span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Coal_%2526_Navigation_Company" title="Lehigh Coal &amp; Navigation Company"><span data-dcnode-id="3873" instrument_node="">Lehigh Coal &amp; Navigation Company</span></a><span data-dcnode-id="3871" instrument_node=""> (LC&amp;N Co.), that began casting pig iron on July 4, 1840. Ores from </span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sussex_County%2C_New_Jersey" title="Sussex County, New Jersey"><span data-dcnode-id="3870" instrument_node="">Sussex</span></a><span data-dcnode-id="3868" instrument_node=""> and </span><a data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morris_County%2C_New_Jersey" title="Morris County, New Jersey"><span data-dcnode-id="3867" instrument_node="">Morris County, New Jersey</span></a><span data-dcnode-id="3865" instrument_node="">, flowed across the Delaware from New Jersey and up the Lehigh to his furnaces at </span><a data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catasauqua%2C_Pennsylvania" title="Catasauqua, Pennsylvania"><span data-dcnode-id="3864" instrument_node="">Catasauqua, Pennsylvania</span></a><span data-dcnode-id="3862" instrument_node=""> (above </span><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allentown%2C_Pennsylvania" title="Allentown, Pennsylvania"><span data-dcnode-id="3861" instrument_node="">Allentown</span></a><span data-dcnode-id="3859" instrument_node="">)</span><sup class="reference" data-dcnode-id="3856" id="cite_ref-HistCC01_7-0"><a data-dcnode-id="3857" href="#cite_note-HistCC01-7"><span data-dcnode-id="3858" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="3853" id="cite_ref-LHVguide_8-0"><a data-dcnode-id="3854" href="#cite_note-LHVguide-8"><span data-dcnode-id="3855" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3852" instrument_node=""> The canal fostered the growth of Allentown and Bethlehem.</span></span><span data-dcnode-id="3850" instrument_node="">
</span></li><span data-dcnode-id="3848" instrument_node="">
</span><li data-dcnode-id="3833" id="cite_note-50"><span class="mw-cite-backlink" data-dcnode-id="3844"><b data-dcnode-id="3845"><a aria-label="Jump up" data-dcnode-id="3846" href="#cite_ref-50" title="Jump up"><span data-dcnode-id="3847" instrument_node="">^</span></a></b></span><span data-dcnode-id="3843" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3835"><span data-dcnode-id="3842" instrument_node="">If the Lehigh Canal hadn't been built, the other Canals reaching the Delaware would likely have had nothing worth the expense to ship, so excepting the </span><a data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delaware_and_Hudson_Canal" title="Delaware and Hudson Canal"><span data-dcnode-id="3841" instrument_node="">Delaware and Hudson Canal</span></a><span data-dcnode-id="3839" instrument_node=""> which was a similar venture to the Lehigh in that it reached deep right up to the coal sources, their investment would likely never have happened. The principal customer of the Delaware Canal was the coal barges coming down the Lehigh shipped by </span><a data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Coal_%2526_Navigation_Company" title="Lehigh Coal &amp; Navigation Company"><span data-dcnode-id="3838" instrument_node="">Lehigh Coal &amp; Navigation Company</span></a><span data-dcnode-id="3836" instrument_node="">, which also came to manage the Delaware Canal into the 1960s.</span></span><span data-dcnode-id="3834" instrument_node="">
</span></li><span data-dcnode-id="3832" instrument_node="">
</span><li data-dcnode-id="3817" id="cite_note-51"><span class="mw-cite-backlink" data-dcnode-id="3828"><b data-dcnode-id="3829"><a aria-label="Jump up" data-dcnode-id="3830" href="#cite_ref-51" title="Jump up"><span data-dcnode-id="3831" instrument_node="">^</span></a></b></span><span data-dcnode-id="3827" instrument_node=""> </span><span class="reference-text" data-dcnode-id="3819"><span data-dcnode-id="3826" instrument_node="">The </span><a data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schuylkill_Canal" title="Schuylkill Canal"><span data-dcnode-id="3825" instrument_node="">Schuylkill Canal</span></a><span data-dcnode-id="3823" instrument_node=""> was long delayed by investors quarreling over the best way to proceed. Disgusted, White and Hazard explored tapping Anthracite via the Lehigh and ended up incorporating the </span><a data-dcnode-id="3821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lehigh_Coal_and_Navigation_Company" title="Lehigh Coal and Navigation Company"><span data-dcnode-id="3822" instrument_node="">Lehigh Coal and Navigation Company</span></a><span data-dcnode-id="3820" instrument_node=""> which spearheaded many technological initiatives.</span></span><span data-dcnode-id="3818" instrument_node="">
</span></li><span data-dcnode-id="3816" instrument_node="">
</span></ol></div></div><span data-dcnode-id="3812" instrument_node="">
