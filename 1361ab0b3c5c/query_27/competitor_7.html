</span><p class="statement headline" data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">Morris Adjmi, FAIA established MA in 1997 following a 13-year collaboration with Pritzker Prize-winning architect Aldo Rossi. On that strong foundation, Morris built a design practice known for its thoughtful engagement with history, distinct interpretation of industrial forms, and creative expression of materials.</span></p><span data-dcnode-id="5852" instrument_node="">
</span><section class="services" data-dcnode-id="5823"><span data-dcnode-id="5851" instrument_node="">
</span><div class="hl-wrapper" data-dcnode-id="5846"><span data-dcnode-id="5850" instrument_node="">

</span><div class="img-text" data-dcnode-id="5825"><span data-dcnode-id="5844" instrument_node="">
</span><div class="img" data-dcnode-id="5837"><span data-dcnode-id="5843" instrument_node="">

</span><img alt="MA in-studio photo of our team" class="lazy" data-dcnode-id="5841" data-src="https://tff-maa.imgix.net/img/content-images/assets/uploads/studio_02_profileImage_Left_1.jpg?w=1500&amp;auto=compress"><span data-dcnode-id="5840" instrument_node="">

</span></div><span data-dcnode-id="5836" instrument_node="">
</span><div class="text" data-dcnode-id="5827"><span data-dcnode-id="5835" instrument_node="">
</span><p class="large headline" data-dcnode-id="5833"><span data-dcnode-id="5834" instrument_node="">We create buildings that stand out by fitting in.
</span></p><span data-dcnode-id="5832" instrument_node="">
</span><div class="copy" data-dcnode-id="5829"><p data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">Each design decision is guided by a deep appreciation for and understanding of the integral architectural, artistic, cultural, civic, environmental, and economic forces that shape a project.&nbsp;This rigorous, research-based approach has helped to establish MA as a leader in the revitalization of post-industrial neighborhoods and historic districts with projects that are imbued with a distinct sense of place and purpose.</span></p></div><span data-dcnode-id="5828" instrument_node="">
</span></div><span data-dcnode-id="5826" instrument_node="">
</span></div><span data-dcnode-id="5824" instrument_node="">

</span><p class="statement headline" data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">The firm strives to maintain a strong sense of community and culture by creating an enriching work environment complemented by engaging programming. We are dedicated to fostering a mentoring environment to facilitate professional growth and providing an atmosphere in which everyone can flourish.</span></p><span data-dcnode-id="5794" instrument_node="">

</span><p class="large headline" data-dcnode-id="5779"><span data-dcnode-id="5780" instrument_node="">Morris Adjmi loves cities.</span></p><span data-dcnode-id="5778" instrument_node="">
</span><div class="copy" data-dcnode-id="5769"><p data-dcnode-id="5776"><span data-dcnode-id="5777" instrument_node="">As the founder and principal of MA, he&nbsp;is&nbsp;dedicated to understanding the history and complex forces that shape them to&nbsp;create buildings that are contextual but unmistakably contemporary.&nbsp;The resulting work has become a favorite of both forward-thinking developers and history-minded preservationists.</span></p><span data-dcnode-id="5775" instrument_node="">
</span><p data-dcnode-id="5773"><br data-dcnode-id="5774"></p><span data-dcnode-id="5772" instrument_node="">
</span><p data-dcnode-id="5770"><span data-dcnode-id="5771" instrument_node="">Adjmi’s passion for historic and industrial architecture was formed by the cast-iron French Quarter balconies and crumbling Creole cottages in his hometown of New Orleans and refined in New York and Milan during a 13-year collaboration with Pritzker Prize-winning architect, Aldo Rossi.</span></p></div><span data-dcnode-id="5768" instrument_node="">
</span></div><span data-dcnode-id="5766" instrument_node="">

</span><p data-dcnode-id="5632"><span data-dcnode-id="5633" instrument_node="">Drawing on nearly three decades of industry experience, Jennifer serves as MA’s Director of Documentation and Construction Administration. In this leadership role, she is responsible for developing and implementing processes that improve MA’s documentation standards, protocols during construction, and the overall quality of the firm’s project deliverables. Monthly, she facilitates cross-studio communication with the firm’s project managers and project architects to proactively discuss new ideas and practical, implementable solutions to meet the firm’s high standards for quality control, project efficiency, and client satisfaction. Since joining the firm, Jennifer has also spearheaded construction administration services on several of the firm’s large-scale developments in Philadelphia and Washington, D.C.</span></p><span data-dcnode-id="5631" instrument_node="">

</span><em data-dcnode-id="5572"></em><span data-dcnode-id="5571" instrument_node="">
</span></p><span data-dcnode-id="5569" instrument_node="">
</span><div class="bio" data-dcnode-id="5561"><span data-dcnode-id="5568" instrument_node="">
</span><p data-dcnode-id="5566"><span data-dcnode-id="5567" instrument_node="">As Director of Interiors, Angela oversees the delivery of all interior design services—working closely with the firm’s architectural studios to ensure each project reflects a holistic and integrated approach. Her extensive experience includes designing and executing a broad range of residential, commercial, hospitality, and mixed-use projects within the U.S. and internationally. Most recently, Angela has overseen the design of unit interiors and amenity spaces within several multifamily projects, most significantly including Front &amp; York—a 1.2 million-square-foot mixed-use multifamily development in Dumbo, Brooklyn, that encompasses more than 720 residential units and 150,000 square feet of amenity space.</span></p><span data-dcnode-id="5565" instrument_node="">
</span><p data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">A proven leader, Angela is known for her ability to nurture constructive relationships between clients, consultant teams, and stakeholders to advance complex projects.</span></p><span data-dcnode-id="5562" instrument_node="">

</span><em data-dcnode-id="5492"></em><span data-dcnode-id="5491" instrument_node="">
</span></p><span data-dcnode-id="5489" instrument_node="">
</span><div class="bio" data-dcnode-id="5481"><span data-dcnode-id="5488" instrument_node="">
</span><p data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">Tom is a Studio Director at MA recognized for his ability to deliver a wide range of complex residential, commercial, and institutional projects, including those involving highly publicized entitlement processes. This has recently included the delivery of Atlantic Plumbing 901W—a unique 354,000-square-foot mixed-use multifamily development in Washington, D.C., consisting of two 11-story through-block structures joined by a sky-bridge. He&nbsp;is currently overseeing several large-scale mixed-use projects in various stages of completion across the U.S., including the delivery of 350 &amp; 400 Summer Street—two adjacent commercial towers in Boston's Seaport District totaling more than 1 million square feet, as well as the documentation of&nbsp;a 380,000-square-foot dormitory project MA designed&nbsp;for the U.C. College System.&nbsp;</span></p><span data-dcnode-id="5485" instrument_node="">
</span><p data-dcnode-id="5483"><span data-dcnode-id="5484" instrument_node="">In addition, Tom leads MA's Sustainability Committee, ensuring the firm continues to employ the latest advancements in green technology and design.</span></p><span data-dcnode-id="5482" instrument_node="">

</span></p><span data-dcnode-id="5414" instrument_node="">
</span><div class="bio" data-dcnode-id="5409"><span data-dcnode-id="5413" instrument_node="">
</span><p data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">Based in MA’s New Orleans Office, Studio Director Ian Mills oversees many of the firm’s projects in the south and on the west coast, including a wide range of hotels and&nbsp;multifamily projects that offer unique hospitality experiences. Recently, this has included overseeing several projects within the master-planned Water Street Tampa development: The EDITION Hotel &amp; Residence, which features a blend of condominium units and hotel rooms, as well as 1050 Water Street, a 788,000-square-foot development featuring 500 residential units—a portion of which will be furnished and operated under an extended-stay hotel brand. Both projects are currently in construction. Also in Florida, Ian was responsible for the delivery of the recently completed Goodtime Hotel within the Miami Beach Art Deco Historic District. Back in New Orleans, he is currently overseeing the adaptive reuse&nbsp;of a historic building as a&nbsp;96,000-square-foot&nbsp;boutique hotel with 50 apartment-style guest suites, a food hall, cafe, and multiple bar venues.</span></p><span data-dcnode-id="5410" instrument_node="">

</span><p data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">As a Studio Director at MA, Lucas leads a team of architects and designers in the delivery of a wide range of projects varying in typology, scale, and complexity. This has recently included overseeing the delivery of 520 West 20th—an 85,000-square-foot adaptive reuse project in New York City involving the transformation of a historic warehouse into a contemporary work environment inspired by art and technology. </span></p><span data-dcnode-id="5333" instrument_node="">
</span><p data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">And while Lucas has a special appreciation for working on projects that shape the New York City neighborhoods he frequents, he also enjoys the challenge of designing buildings outside of&nbsp;the city, particularly those within historic, post-industrial districts. His team is currently leading several large-scale efforts throughout the U.S., including 900 Randolph—a new 43-story multifamily tower within Chicago’s historic Fulton Market District and The Wharf Parcel 10—a sustainability-focused office building in Washington, D.C.</span></p><span data-dcnode-id="5330" instrument_node="">

</span><em data-dcnode-id="5265"></em><span data-dcnode-id="5264" instrument_node="">
</span></p><span data-dcnode-id="5262" instrument_node="">
</span><div class="bio" data-dcnode-id="5239"><span data-dcnode-id="5261" instrument_node="">
</span><p data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">As MA’s Design Director of Interiors, Becca works closely with the firm’s Principal, Design Director of Architecture, and Studio Directors to steer the development of warm yet refined spaces that harmoniously integrate within a project’s architectural and commercial contexts. In this leadership role, she helps to establish overall design goals and standards for the firm, inspire creativity, and ensure that projects are completed to the highest level of quality.</span></p><span data-dcnode-id="5258" instrument_node="">
</span><p data-dcnode-id="5241"><span data-dcnode-id="5257" instrument_node="">Leveraging more than 15 years of industry experience, Becca’s award-winning work is guided by the principle that the most successful spaces don’t just look beautiful, they feel good as well. Prior to joining MA, she served as the Director of Interior Design at One Kings Lane and formerly AvroKO, where she received recognition for highly-publicized projects, such as The Zodiac Room restaurant at Neiman Marcus in Hudson Yards, which was featured in </span><em data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">Interior Design</span></em><span data-dcnode-id="5254" instrument_node=""> and </span><em data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">Hospitality Design </span></em><span data-dcnode-id="5251" instrument_node="">magazines; the Perry Lane Hotel, named the "Best New Hotel in the World" by </span><em data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">Travel + Leisure</span></em><span data-dcnode-id="5248" instrument_node="">; as well as the renovation of Minnie Driver's Malibu residence, featured in </span><em data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">House Beautiful</span></em><span data-dcnode-id="5245" instrument_node=""> and </span><em data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">People</span></em><span data-dcnode-id="5242" instrument_node="">.</span></p><span data-dcnode-id="5240" instrument_node="">

</span><div class="bio" data-dcnode-id="5165"><span data-dcnode-id="5172" instrument_node="">
</span><p data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">As the Director of MA Art Services, Lyle leads the design and development of all interior and exterior art programming for the firm's projects. Specializing in the thoughtful curation of artwork and the coordination of original commissions, he has recently overseen the selection and placement of art at Nexus Club New York, a 34,000-square-foot social club offering a wide range of amenity spaces and services in Manhattan. Lyle has also conceived and executed several conceptual, art-based placemaking initiatives such as the neon “WELCOME” sign that illuminates the New York City skyline. </span></p><span data-dcnode-id="5169" instrument_node="">
</span><p data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Lyle has worked as an artist and in art services for the past 25 years. His artwork is showcased in the permanent collections of the MoMA and the Guggenheim Museum.</span></p><span data-dcnode-id="5166" instrument_node="">

</span><p data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">With more than 25 years of experience, Studio Director&nbsp;Michelle Wagner excels in the management of large-scale projects and has played a vital role in leading the design and delivery of some of the firm’s most ambitious mixed-use developments. Most recently this includes&nbsp;Front &amp; York, a highly anticipated, 1.2 million-square-foot mixed-use multifamily&nbsp;complex in Brooklyn, NY.&nbsp;In addition, Michelle is guiding the delivery of Steel House—a 558,000-square-foot commercial building with ground-floor retail and a generous package of high-end amenities located within the RiNo neighborhood in her hometown of Denver,&nbsp;as well as a 670,000-gross-square-foot multi-parcel project in Atlanta, GA, featuring a 450,000-square-foot mixed-use residential tower. </span></p><span data-dcnode-id="5100" instrument_node="">
</span><p data-dcnode-id="5097"><span data-dcnode-id="5099" instrument_node="">Prior to joining MA, Michelle worked on the World Trade Center Master Plan and Design Guidelines with Studio Daniel Libeskind.</span><br data-dcnode-id="5098"></p><span data-dcnode-id="5096" instrument_node="">

</span><div class="bio" data-dcnode-id="4942"><span data-dcnode-id="4955" instrument_node="">
</span><p data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">As MA’s Managing Director, Michael is responsible&nbsp;for providing firm-wide leadership in all phases of&nbsp;a project's life cycle, including overseeing project&nbsp;staffing and ensuring quality control standards are&nbsp;being met throughout design and construction.&nbsp;Specializing in the delivery of large-scale mixed-use projects, he has provided executive oversight of&nbsp;nearly 4 million gross square feet of built space&nbsp;while at MA in major&nbsp;cities across the country. As a result,&nbsp;Michael has gained a detailed understanding of local codes and regulations and helps guide the firm's projects through complex zoning and&nbsp;entitlements.</span></p><span data-dcnode-id="4952" instrument_node="">
</span><p data-dcnode-id="4944"><span data-dcnode-id="4951" instrument_node="">Previously, Michael worked at Pentagram, where he co-founded the architecture department and, among other projects, worked on the Harley Davidson Museum, which was recognized with a New York State AIA Award and publication in </span><em data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">Architectural Record</span></em><span data-dcnode-id="4948" instrument_node="">, as well as a high-end private residence in Montauk that was published in </span><em data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">The New York Times</span></em><span data-dcnode-id="4945" instrument_node="">.</span></p><span data-dcnode-id="4943" instrument_node="">

</span><p data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">Bob is an architectural designer with a growing portfolio of residential and commercial experience. He is currently supporting some of the firm’s largest, most complex commercial developments, including a&nbsp;230,000-square-foot development in Queens, NY, as well as a 550,000-square-foot development in Toronto, Canada. Both projects encompass the adaptive reuse and renovation of existing structures, as well as the construction of new buildings to create creative and contemporary office spaces. He is also contributing to the design of a 640,000-square-foot mixed-use multifamily building in Santa Clara, CA, featuring 300 rental units, an expansive amenity program, and ground-floor retail.</span></p><span data-dcnode-id="4859" instrument_node="">

</span><p data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">Sarah is a project architect in MA’s New Orleans office with more than&nbsp;12 years of experience in the design and delivery of hospitality, residential, commercial, and mixed-use typologies. Most recently, this included leading a large-scale mixed-use project in Nashville involving the development of nearly 500,000 square feet of residential, commercial, and statement food &amp; beverage spaces&nbsp;within two new buildings and an existing, revitalized bow truss warehouse. The site will also include a pedestrian promenade that features retail on both sides.&nbsp;</span></p><span data-dcnode-id="4644" instrument_node="">
</span><p data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">Sarah also recently contributed to the design of 1050 Water Street—a 788,000-square-foot multifamily building currently under construction&nbsp;in Tampa, as well as and a boutique hospitality development in downtown New Orleans encompassing the adaptive reuse of several historic buildings.&nbsp;</span></p><span data-dcnode-id="4641" instrument_node="">

</span></p><span data-dcnode-id="4565" instrument_node="">
</span><div class="bio" data-dcnode-id="4560"><span data-dcnode-id="4564" instrument_node="">
</span><p data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">Uli is a project manager with nearly 15 years of experience delivering a wide range of large-scale, logistically complex residential, commercial, and mixed-use projects in New York City and abroad. Most recently, this includes managing the design and delivery of 1 Florida Avenue—a 468,000-square-foot multifamily building in Washington, D.C., and 315 Broadway—a 97,000-square-foot, 20-story mixed-use development in Manhattan requiring LPC approval. As a project manager, Uli is well-regarded for his attention to detail and commitment to meeting client expectations, ensuring the project is delivered on time, on budget, and within all design and regulatory parameters. Dedicated to curating dynamic, functional, and aesthetically pleasing projects, he never loses sight of remaining creative and inquisitive in his design process.</span></p><span data-dcnode-id="4561" instrument_node="">

</span><div class="bio" data-dcnode-id="4486"><span data-dcnode-id="4493" instrument_node="">
</span><p data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">Nick is an architectural designer who possesses a strong command of New York City's complex zoning, building code, and Landmark Preservation Commission&nbsp;regulations, gained over more than 15 years of local project experience. Specializing in land use, permitting, urban design, and related entitlement processes, he serves as&nbsp;MA's zoning analyst and&nbsp;has led&nbsp;countless feasibility and planning studies, both within New York and nationwide,&nbsp;to uncover a project site's full development potential.&nbsp;</span></p><span data-dcnode-id="4490" instrument_node="">
</span><p data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">Outside of the office, Nick is a lecturer at the Parsons&nbsp;School of Design. In this role, he provides&nbsp;guidance to the next generation of designers&nbsp;through his research and teachings, which focus&nbsp;on infrastructure, policy, and finance in urban&nbsp;design.</span></p><span data-dcnode-id="4487" instrument_node="">

</span><div class="bio" data-dcnode-id="4415"><span data-dcnode-id="4419" instrument_node="">
</span><p data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">Chris is an architectural designer with a growing portfolio of projects varying in scope, scale, and typology. He is currently supporting the design of a 24-story, 130,000-square-foot&nbsp;residential tower on West 55th Street in midtown Manhattan, as well as the&nbsp;construction administration phases for 625 and 658 Driggs—a complementary pair of cattycorner multifamily buildings located within Williamsburg, Brooklyn. Chris also&nbsp;recently contributed to the design of Steel House in Denver—a 558,000-square-foot commercial office building with terraced outdoor space, a unique package of high-end amenities, and engaging retail on the ground floor.&nbsp;As a highly engaged and collaborative designer, he is dedicated to&nbsp;creating&nbsp;compelling solutions to complex challenges.</span></p><span data-dcnode-id="4416" instrument_node="">

</span><div class="bio" data-dcnode-id="4344"><span data-dcnode-id="4348" instrument_node="">
</span><p data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">Christopher is a project manager with nearly 20 years of experience delivering creative and contemporary multifamily projects across the U.S. and abroad. He is currently leading the delivery of Gallaudet Union Market Parcel 3, a 714,000-square-foot mixed-use multifamily development across the street from Gallaudet University’s historic campus in northeast Washington, D.C. Christopher is also currently serving as the project manager for FÖRENA, an 87,000-square-foot luxury&nbsp;condominium building currently in construction in Downtown Manhattan. As a result of his careful leadership, the project met the client’s highly ambitious design schedule and is progressing smoothly through construction administration. Prior to his promotion to project manager, Christopher served as the lead architect on The Standard—the firm’s inaugural project in New Orleans. Located within the burgeoning South Market District, the new multifamily building has been recognized for ushering in the neighborhood’s modern context at the intersection of the city’s business and arts districts.</span></p><span data-dcnode-id="4345" instrument_node="">

</span><div class="bio" data-dcnode-id="4269"><span data-dcnode-id="4276" instrument_node="">
</span><p data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">Angela is a project manager at MA with over 15 years of experience leading large, complex mixed-use multifamily projects.&nbsp;This includes 550 Clinton Avenue, a new 29-story, 276,000-square-foot residential tower currently in construction along Brooklyn’s rapidly evolving Atlantic Avenue corridor. Additionally, Angela recently managed the design and delivery of two adjacent multifamily buildings in Washington, D.C.: 10K Hill South and One Hill South. The former is approximately 390,000 square feet while the latter encompasses approximately 575,000 square feet. Together, the two “sister structures” complete a full city block within D.C.’s Capitol Riverfront neighborhood. &nbsp;</span></p><span data-dcnode-id="4273" instrument_node="">
</span><p data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">Prior to joining MA, her work included&nbsp;large multifamily buildings, a dormitory for the PanAm Games in Toronto, a Mercedes Benz showroom&nbsp;in Manhattan, and a horse stable for the NYPD. Angela serves on MA's Accessibility Committee and has led the development of firmwide resources. She was also a founding leader of the firm’s Women in Design group and has led the MA Runners group&nbsp;through multiple summer racing seasons.</span></p><span data-dcnode-id="4270" instrument_node="">

</span><p data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">With more than 15 years of experience supporting projects of varying scopes and sizes, Magdalena (Magda)&nbsp;is a project manager with a primary focus and personal passion for&nbsp;design-oriented, high-end residential projects. Her portfolio includes a wide variety of&nbsp;scopes ranging&nbsp;from&nbsp;bespoke renovations of single-family homes to the new construction of luxury multifamily developments. Most recently this encompasses&nbsp;leading multiple project teams on efforts throughout the U.S., including overseeing the&nbsp;design of 18 West 55th Street—a new 24-story, 130,000-square-foot mixed-use multifamily building in Manhattan, as well as a unique mixed-use residential project in Los Angeles. In her leadership role,&nbsp;Magda has become especially adept in the navigation of complex project zoning, building code, ADA compliance, and spatial planning challenges.</span></p><span data-dcnode-id="4199" instrument_node="">

</span><p data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">Monika is an architectural designer with extensive experience in the design of cultural and institutional facilities, including theaters and other unique performing arts centers. This included the renovation of Webster Hall, one of New York City’s most iconic and historically significant music venues. Since joining MA, Monika has expanded her project portfolio to include residential and mixed-use typology projects. She is currently supporting the design of 100&nbsp;V at The Stacks—a mixed-use multifamily project that is part of a larger master-planned development in Washington, D.C., and a state-of-the-art 455,000-square-foot dormitory project in northern California&nbsp;for the U.C. College System.</span></p><span data-dcnode-id="4133" instrument_node="">

</span><div class="bio" data-dcnode-id="4063"><span data-dcnode-id="4070" instrument_node="">
</span><p data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Luke is an architect whose work is informed by a belief that buildings should be infused with a sense of emotion, mystery, and memory. These ideas have shaped his evolving portfolio of multifamily, hospitality, and commercial projects. Since joining MA, this includes The&nbsp;Rockaway Hotel in Queens, NY—a 6-story, 72,000-square-foot mixed-use development offering a unique blend of hospitality and residential programs and shared community-oriented amenity spaces; 2100 M Street—a 390,000 square foot&nbsp;commercial development in Washington, D.C., involving the renovation and&nbsp;reskinning of a circa 1960s brutalist building; as well as&nbsp;the four-building&nbsp;Rye Street Market commercial complex located within the evolving Port Covington neighborhood in Baltimore,&nbsp;encompassing approximately&nbsp;275,000 gross square feet of office and retail programming.&nbsp;</span></p><span data-dcnode-id="4067" instrument_node="">
</span><p data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">Beyond&nbsp;his work at MA,&nbsp;Luke’s own artistic architectural concepts have been&nbsp;published and exhibited in various galleries. He is a MacDowell Fellow.&nbsp;</span></p><span data-dcnode-id="4064" instrument_node="">

</span><p data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">Ashley Fetzer&nbsp;LeJeune is an architect in MA’s New Orleans office. Her portfolio encompasses a wide range of&nbsp;commercial and residential scopes in cities throughout the&nbsp;U.S. She is currently supporting the construction administration phase&nbsp;of 1050 Water Street—a 788,000-square-foot multifamily tower designed by MA&nbsp;within the master-planned Water Street development in Tampa. She is also working on 639 South La Brea Avenue in Los Angeles—a 310,000 square-foot mixed-use building featuring a blend of market-rate and affordable&nbsp;residential units, as well as&nbsp;hospitality suites.&nbsp;</span></p><span data-dcnode-id="3921" instrument_node="">

</span><em data-dcnode-id="3856"></em><span data-dcnode-id="3855" instrument_node="">
</span></p><span data-dcnode-id="3853" instrument_node="">
</span><div class="bio" data-dcnode-id="3842"><span data-dcnode-id="3852" instrument_node="">
</span><p data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">Erica is an experienced architect with a diverse portfolio of innovative commercial and residential projects throughout the U.S. Since joining MA, she has served as an architect and designer for a range of project typologies, including a&nbsp;455,000-square-foot, state-of-the-art dormitory complex in northern California&nbsp;for the U.C. College System; a 430,000-square-foot multi-parcel development located within Philadelphia’s evolving Northern Liberties neighborhood;&nbsp;and a new condo building located within Boston's historic context, among others.&nbsp;&nbsp;</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Her previous work includes award-winning office buildings, notably the Mercedes-Benz USA Headquarters and Shaw Create Centre creative office—both located in Georgia, as well as a one-million-square-foot office tower in midtown Manhattan.&nbsp;</span></p><span data-dcnode-id="3846" instrument_node="">
</span><p data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">As a LEED Accredited Professional, Erica&nbsp;is committed to incorporating sustainability principles on all projects and believes building design should respond to current climate, social, and cultural contexts.</span></p><span data-dcnode-id="3843" instrument_node="">

</span></p><span data-dcnode-id="3775" instrument_node="">
</span><div class="bio" data-dcnode-id="3764"><span data-dcnode-id="3774" instrument_node="">
</span><p data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">Chris is a senior project manager with nearly 15 years of experience developing a diverse portfolio of residential, commercial, and institutional projects throughout the U.S. His recent work includes leading large, complex multifamily programs, such as Atlantic Plumbing 901W in Washington D.C. Nearing completion, the unique project encompasses approximately 354,000 square feet of high-end and market-rate residential units, an assortment of fully furnished Whyle apartments for short term lease, and ground floor commercial space within two 11-story through-block structures joined by a sky bridge.&nbsp;</span></p><span data-dcnode-id="3771" instrument_node="">
</span><p data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">In addition, Chris is currently managing the design development of 100 V at The Stacks—another mixed-use multifamily development in Washington, D.C., totaling approximately 300,000 square feet. Prior to joining MA, Chris worked on the mixed-use West End Square 37 and Square 50 projects in D.C., comprising approximately 400,000 square feet total. Square 50 layers a fire station, a squash club, and 55 units of affordable housing, while Square 37 encompasses 71 high-end condominiums and 93 market-rate apartments above a 20,000 square-foot public library.&nbsp;</span></p><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node=""> As a project manager, Chris works collaboratively with all stakeholders to build consensus around the client’s vision and objectives and deliver contextual and compelling design solutions. </span></p><span data-dcnode-id="3765" instrument_node="">

</span><p data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">Jasmine is an architect with nearly&nbsp;10 years of experience designing a wide range of multifamily developments, including high-end condominium buildings, market-rate rental buildings, and affordable housing, or a mix thereof. This includes recent work on&nbsp;1 Huron—a two-tower, 266,000-square-foot multifamily building with ground-floor retail and a generous package of high-end amenities located within Brooklyn’s Greenpoint neighborhood, as well as 211 Schermerhorn—a recently completed&nbsp;90,000-square-foot infill condominium building located on a formerly industrial block between Downtown Brooklyn and Boerum Hill.&nbsp;</span></p><span data-dcnode-id="3699" instrument_node="">
</span><p data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">In addition to her residential experience, Jasmine also has a growing portfolio of commercial office projects, including ongoing work on Steel House—a 558,000-square-foot state-of-the-art&nbsp;office building located within&nbsp;Denver's RiNo Arts District.&nbsp;</span></p><span data-dcnode-id="3696" instrument_node="">
</span><p data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">Outside of her&nbsp;project work, Jasmine serves as the head of MA’s BIM committee and is dedicated to advancing the firm's design development and documentation&nbsp;standards.</span></p><span data-dcnode-id="3693" instrument_node="">

</span><p data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">Russell is an experienced architectural designer whose portfolio encompasses a variety of commercial and residential buildings. Since joining MA, this has included supporting the design and delivery of The Wharf Parcel 10—a state-of-the-art, sustainability-focused commercial office building situated along&nbsp;Washington, D.C.'s evolving waterfront.&nbsp;Russell also contributed to the design of 550 Clinton Avenue—a 29-story residential building currently under construction that bridges Pacific Park—a major mixed-use development within Brooklyn’s Prospect Heights neighborhood, as well as&nbsp;Gallaudet Union Market Parcel 3—a 714,000-square-foot residential building located within a Planned Unit Development&nbsp;in Washington, D.C.&nbsp;</span></p><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Russell’s tactile&nbsp;approach to architectural design is enriched by his practical skills in carpentry and woodworking.</span></p><span data-dcnode-id="3613" instrument_node="">

</span></p><span data-dcnode-id="3475" instrument_node="">
</span><div class="bio" data-dcnode-id="3467"><span data-dcnode-id="3474" instrument_node="">
</span><p data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">George brings a global perspective and passion for sustainability to his work as a senior project manager. Since joining MA, he has excelled in the management of large-scale multifamily, commercial, and mixed-use projects, consistently proving his capacity to meet client expectations with regard to budget, schedule, and sustainability objectives. Ongoing experience includes managing the delivery of 350 &amp; 400 Summer Street—two adjacent commercial towers totaling more than 1 million square feet of new development within Boston’s Seaport District, as well as a state-of-the-art 380,000-square-foot mixed-use dormitory project for U.C. Berkeley, all three of which are pursuing LEED Gold certification.&nbsp;</span></p><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Additionally, as a trained Climate Reality Leader, George serves in a key leadership role on the firm’s Sustainability Committee and is currently overseeing the development of the MA’s Sustainability Action Plan. Outside of the office, he is a part-time lecturer at the New School and serves on the board of directors of New York PassiveHouse, as well as the Greek Institute of Architects in New York. </span></p><span data-dcnode-id="3468" instrument_node="">

</span><p data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">Andras is an architect with a diverse portfolio of hospitality, commercial, and residential project experience. Informed by his time living in Hungary, The Netherlands, and New Orleans, he brings a unique international perspective to the dialogue between buildings and their inhabitants. He is currently working on an 87,000-square-foot adaptive reuse hospitality project in New Orleans, a one-million-square-foot sustainability-focused office/laboratory building in East Palo Alto, CA, as well as a 310,000-square-foot, 8-story mixed-use building comprised of approximately 125 hotel keys and 120 residential units in Los Angeles. In addition to his design work, Andras is highly skilled in BIM and is responsible for establishing and maintaining the New Orleans Studio’s BIM models. </span></p><span data-dcnode-id="3391" instrument_node="">

</span><div class="bio" data-dcnode-id="3313"><span data-dcnode-id="3317" instrument_node="">
</span><p data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">Tony is a seasoned&nbsp;architectural designer with a unique understanding of construction means and methods. He is currently applying that knowledge to lead a smooth construction administration process for&nbsp;550 Clinton Avenue—a 29-story residential building on the rise&nbsp;within Brooklyn’s Prospect Heights neighborhood. Prior experience includes recently&nbsp;completed and highly publicized&nbsp;residential projects, such as&nbsp;116 University Place—a 20,000 square-foot, 6-story luxury multifamily&nbsp;building in Manhattan, and 10K Hill South—a 389,000-square-foot, 13-story mixed-use multifamily building in Washington, D.C. His strong understanding of BIM and proclivity for open collaboration&nbsp;make Tony a valuable team member and&nbsp;have contributed to the success of these projects.</span></p><span data-dcnode-id="3314" instrument_node="">

</span><p data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Paul is an architectural designer with a growing portfolio of residential, commercial, and institutional projects. He is currently supporting the design of some of the firm’s most exciting projects, including a 670,000-square-foot mixed-use, multi-parcel development in Atlanta, GA, featuring a unique blend of residential, hospitality, and retail spaces; a state-of-the-art 380,000-square-foot dormitory project in northern California for the&nbsp;U.C. College System; as well as 350 &amp; 400 Summer Street—two&nbsp;adjacent commercial towers totaling more than one million square feet of new development within Boston’s Seaport District.</span></p><span data-dcnode-id="3176" instrument_node="">

</span><div class="bio" data-dcnode-id="3106"><span data-dcnode-id="3113" instrument_node="">
</span><p data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">Jesse is a senior project manager at MA with more than 15 years of experience leading design teams in the delivery of projects varying in typology, scale, and complexity. Most recently, she served as the project manager of The Rockaway Hotel in Queens, NY—a 6-story, 72,000-square-foot mixed-use development offering a unique blend of hospitality and residential programs and shared community-oriented&nbsp;amenity spaces. Jesse is currently managing&nbsp;the delivery of  625 and 658 Driggs Avenue—two neighboring multifamily buildings designed by MA &nbsp;within Brooklyn’s Williamsburg neighborhood—both of which are nearing construction completion, as well as a new 65,630-square foot commercial building on St. Marks Place in Manhattan. </span></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Informed by prior experience working within the public sector on city zoning and building code regulations, Jesse is skilled at guiding clients through contentious regulatory reviews and has a proven ability to secure design approvals for complex projects.</span></p><span data-dcnode-id="3107" instrument_node="">

</span><p data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Brittany is a senior project manager at MA with more than 15 years of experience. She excels in the management of complex, contextually driven projects in historic districts and post-industrial neighborhoods throughout the U.S., often involving rigorous entitlement processes. Most recently, this has included overseeing the delivery of several high-end multifamily projects in Manhattan, including 45 East 7th Street in the East Village/Lower East Side Historic District, as well as 260 Bowery and The Grand Mulberry in the Little Italy Special Purpose District. Brittany is also currently managing the design development of a unique two-tower mixed-use development in Raleigh, NC, encompassing 1,280,000 gross square feet of residential, office, and retail programming&nbsp;across the two new buildings. </span></p><span data-dcnode-id="3030" instrument_node="">

</span><p data-dcnode-id="2963"><span data-dcnode-id="2966" instrument_node="">Nick is project manager&nbsp;in MA’s New Orleans office with more than 11&nbsp;years of experience focused primarily on the&nbsp;ground-up construction of unique mixed-use&nbsp;developments. Since joining MA, this has included&nbsp;two new construction projects that combine</span><br data-dcnode-id="2965"><span data-dcnode-id="2964" instrument_node="">multifamily and hospitality programs, including the&nbsp;new 27-story, 327,000-square-foot EDITION Hotel&nbsp;&amp; Residences in Tampa, FL, featuring a blend of&nbsp;172 hotel rooms and 32 condominiums, as well&nbsp;as an 8-story, 310,000-square-foot mixed-use&nbsp;development on South La Brea in Los Angeles&nbsp;containing 121 apartments and 125 hotel rooms. Nick also has extensive experience in the adaptive reuse of existing, historic buildings.&nbsp;Most recently this has&nbsp;included the adaptive reuse of the Auction House and the historic rehabilitation&nbsp;of Tulane University’s Mussafer Hall—both located in New Orleans. He is also currently managing the design development of a unique hospitality development encompassing several historic buildings in downtown New Orleans, including a landmarked structure.</span></p><span data-dcnode-id="2962" instrument_node="">
</span><p data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Leveraging his wide range of design and delivery&nbsp;experience, Nick is skilled at guiding projects&nbsp;to success from initial concept phases through&nbsp;construction administration.</span></p><span data-dcnode-id="2959" instrument_node="">

</span><em data-dcnode-id="2592"></em><span data-dcnode-id="2591" instrument_node="">
</span></p><span data-dcnode-id="2589" instrument_node="">
</span><div class="bio" data-dcnode-id="2577"><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Rossana is a senior designer with nearly 20 years&nbsp;of international experience creating compelling&nbsp;and contemporary designs for buildings of varying scales and architectural styles.&nbsp;Employing a strong understanding of materiality and articulation, she is particularly skilled in façade&nbsp;design and fenestration detailing.</span></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2582"><span data-dcnode-id="2584" instrument_node="">Since joining MA, her diverse project portfolio runs&nbsp;the gamut, encompassing everything from large-scale&nbsp;rental towers to boutique condominium&nbsp;buildings and hospitality developments. Most recently, this includes&nbsp;Gallaudet Union Market Parcel 3—a 714,000-square-foot residential complex&nbsp;in Washington, D.C. that helps link the historic university to the adjacent and evolving&nbsp;Union Market neighborhood, as well as 529 King Street—a new 5-story hotel in Charleston,&nbsp;offering 50 extended stay units, a penthouse restaurant, rooftop bar and lounge, and lush interior courtyard.</span><br data-dcnode-id="2583"></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Possessing a collaborative spirit, Rossana has a&nbsp;deep appreciation for the exchange of ideas—particularly those that challenge convention.</span></p><span data-dcnode-id="2578" instrument_node="">

</span><em data-dcnode-id="2519"></em><span data-dcnode-id="2518" instrument_node="">
</span></p><span data-dcnode-id="2516" instrument_node="">
</span><div class="bio" data-dcnode-id="2511"><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Seth is an architectural designer with significant experience developing enclosure packages and working closely with façade consultants. Leveraging these skills, he is currently advancing the design of a mixed-use, multi-parcel development located within Philadelphia’s Northern Liberties neighborhood featuring a 352,000-square-foot, 23-story tower that will hold multiple commercial spaces at the ground floor and nearly 400 apartments above. Prior to joining MA, Seth worked on several significant multifamily projects, including the 37-story, 525,000-square-foot Carlyle Building in Alexandria, Virginia, featuring large volume shifts, long cantilevers, and attached townhouses, as well as The Peninsula Phase II—a 500,000-square-foot development encompassing two residential towers with a shared sub-grade parking structure and on-site affordable housing. On a more intimate scale, Seth also supported the development of the Courtyard House as part of the revitalization and expansion of the Robert Rauschenberg Foundation artist residence complex on Captiva Island in Florida.</span></p><span data-dcnode-id="2512" instrument_node="">

</span><div class="bio" data-dcnode-id="2445"><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">As a project manager, Danielle works collaboratively with all stakeholders to build consensus around a shared project vision. She is currently managing the delivery of the highly anticipated&nbsp;Front &amp; York project&nbsp;in Brooklyn, NY. Named for its bordering streets, the unprecedented 1.2-million-square-foot mixed-use multifamily development will supply enough housing to increase the population of DUMBO by 25 percent.&nbsp;Leveraging more than 12 years of industry experience and a&nbsp;strong working knowledge&nbsp;of&nbsp;building codes and specifications, Danielle has excelled in the management of day-to-day project operations&nbsp;while never losing sight of the big picture.</span></p><span data-dcnode-id="2446" instrument_node="">

</span><p data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">Allison is a highly skilled project manager&nbsp;with more than 10 years of experience in&nbsp;the design and delivery of a wide range of&nbsp;project typologies. Most recently this has&nbsp;encompassed several unique commercial&nbsp;office developments, including multiple&nbsp;mixed-use sites within a master-planned&nbsp;district adjacent to Fenway Park in&nbsp;Boston, which aspires to build community&nbsp;and activity via engaging streetscapes&nbsp;and new public uses, while respecting&nbsp;the historic fabric and significance of the&nbsp;stadium.&nbsp;</span></p><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">Additionally, Allison has served as the&nbsp;project manager on Steel House&nbsp;in Denver—a 558,000-square-foot&nbsp;commercial office building with terraced&nbsp;outdoor space, a unique package of high-end&nbsp;amenities, and engaging retail on the&nbsp;ground floor. Allison’s project management experience&nbsp;also includes leading the design effort of a&nbsp;co-located&nbsp;450,000-square-foot residential building&nbsp;and 180,000-square-foot hotel joined by a&nbsp;pedestrian bridge within Atlanta's evolving Old Fourth Ward neighborhood.</span></p><span data-dcnode-id="2371" instrument_node="">

</span><div class="bio" data-dcnode-id="2221"><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2230" instrument_node="">Graeme is a project manager with more than 10 years of experience working on mixed-use multifamily buildings of varying scopes and scales. He is currently managing 45 East 7</span><sup data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">th</span></sup><span data-dcnode-id="2227" instrument_node=""> Street— a 7-story condominium building in the East Village/Lower East Side Historic District and 38 West 8</span><sup data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">th&nbsp;</span></sup><span data-dcnode-id="2224" instrument_node="">Street—a 7-story mixed-use residential building in the Greenwich Village Historic District, both of which are currently under construction. As a result of this New York City-specific project experience, Graeme has developed an extensive understanding of the city’s zoning and building codes and is skilled at guiding clients through complex regulatory reviews. He is also supporting the design development of a unique mixed-use development in Raleigh, NC, encompassing nearly 1.3 million&nbsp;gross square feet of residential, office, and retail programming within two new towers. </span></p><span data-dcnode-id="2222" instrument_node="">

</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Lawrence is an architectural designer currently supporting the development of a mixed-use, multiparcel project within Miami’s evolving Wynwood neighborhood, encompassing nearly 800,000 gross square feet of multifamily, office, and retail programming across two new buildings. Prior to joining MA full time, he supported the design development of Front &amp; York as an intern, helping the project team work through clashes and clarifications on the 1.2 million-square-foot multifamily project. During his internship, Lawrence also supported the conceptual design of a co-located 450,000-square-foot residential building and 180,000-square-foot hotel joined by a pedestrian bridge within Atlanta's master planned Old Fourth Ward neighborhood, assisting in the study of massing organizations and façade progressions. Outside of the office, Lawrence is an accomplished ceramic artist and avid climber. </span></p><span data-dcnode-id="2151" instrument_node="">

</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Kun is an architectural designer with project experience throughout the U.S. He is currently supporting the development of a new 1 million-square-foot sustainably-designed office complex in East Palo Alto, CA, as well as 639 South La Brea, an&nbsp;8-story, 310,000-square-foot mixed-use building on South La Brea Avenue in Los Angeles that encompasses a combination of hospitality and residential programming. In addition to his portfolio of ground-up projects, Kun also has experience working on the restoration and renovation of historically significant buildings in New Orleans. Most recently this includes&nbsp;an ongoing effort involving the adaptive reuse&nbsp;of several historic structures, including a&nbsp;landmarked bank, as a unique 87,000-square-foot hospitality development.</span></p><span data-dcnode-id="1868" instrument_node="">

</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Katy is an interior designer currently supporting the development of interior spaces within a two-tower mixed-use complex in Raleigh, NC, encompassing nearly 1.3 million gross square feet of residential, office, and retail programming across two new buildings. Prior to joining MA’s New York City studio, she lived in New Orleans and worked on a wide range of large-scale luxury private residential projects throughout the south, as well as the complete redesign of a 10,000-square-foot athletic club. To complement her thoughtful design sensibilities, Katy has a keen eye for strategic FF&amp;E selections and can deliver creative, cohesive concepts on tight budgets. </span></p><span data-dcnode-id="1779" instrument_node="">

</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Yara is an interior designer with a wide range of residential experience, as well as a growing portfolio of commercial and hospitality projects. Leveraging her skills in the selection of finishes and furniture, she is currently supporting the interior design of lobby and amenity spaces within a mixed-use, multi-parcel development in Miami’s vibrant Wynwood neighborhood, featuring both commercial and residential programming. Prior to joining MA, Yara worked on a number of high-end private residences, including a 7-story townhouse in Chelsea, New York, and a 4-story home in Kuwait City where she was responsible for creating furniture plans and custom millwork details. Additionally, Yara’s prior experience includes the Haden Flour Mill Hotel in Tempe, Arizona, that encompassed the adaptive reuse of a historic grain elevator, requiring extensive entitlement approvals from the City of Tempe and the National Park Service.</span></p><span data-dcnode-id="1576" instrument_node="">

</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Yi-En is an interior designer with experience designing and documenting innovative, high-end commercial, residential, and hospitality projects. Since joining MA, her  portfolio has grown to include the recently completed 10,000-square-foot Davines U.S. Headquarters in Williamsburg, Brooklyn, which encompasses a retail component, traditional workspace, exploration space, as well as a hair academy—all designed to reflect the Italian haircare company’s brand philosophy of sustainable beauty. Yi-En is also supporting the interior design development and documentation of spaces within two residential projects in Washington, D.C.: 375 M Street—a 340,000-square-foot high-rise building encompassing over 300 units and 100 V at The Stacks—a mixed-use multifamily development totaling approximately 347,000 square feet. </span></p><span data-dcnode-id="1306" instrument_node="">

</span><p data-dcnode-id="1088"><span data-dcnode-id="1095" instrument_node="">Reflected in the exceptional quality of her work, Jenn brings more than 18 years of project experience and an artistic sensibility to her role as an interior designer. Her diverse portfolio includes a wide range of contemporary, truly bespoke multifamily, office, and hospitality projects. Most recently, this has included the design of spaces within FÖRENA—the highly anticipated 87,000-square-foot high-rise condominium building currently under construction in downtown Manhattan. Also located in Manhattan, Jenn is currently documenting the interior design of 38 West 8</span><sup data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">th</span></sup><span data-dcnode-id="1092" instrument_node=""> Street—a 36,000-square-foot mixed-use rental building featuring 41 micro-apartments and more than&nbsp;3,000 square feet of amenities in Greenwich Village. In addition, Jenn served as the interiors project manager for 520 West 20</span><sup data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">th</span></sup><span data-dcnode-id="1089" instrument_node="">—a recently completed 85,000-square-foot commercial office building located just off the High Line in Chelsea’s Gallery District, featuring interiors inspired by the surrounding art spaces.&nbsp;</span></p><span data-dcnode-id="1087" instrument_node="">

</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">An excellent communicator with a focus on collaboration, Melissa is known for her ability to&nbsp;create synergy between all stakeholders to build consensus around a shared project vision. </span></p><span data-dcnode-id="1018" instrument_node="">

</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Silvia is an interior designer with extensive experience creating compelling spaces throughout the U.S. and Europe. Her well-rounded residential&nbsp;portfolio encompasses scopes ranging from the interior renovation of luxury private apartments and villas to the design of units and amenity areas for new large-scale multifamily buildings.&nbsp;Most recently this has included 18 West 55th Street—a new 130,000-square-foot infill high-rise in Manhattan encompassing 96 luxury units and a generous package of amenities; 1 Huron—a 266,000-square-foot, family-oriented multifamily building located within Brooklyn’s Greenpoint neighborhood; and 100 V at The Stacks, a unique 347,000-square-foot mixed-use, multi-family project in Washington, D.C.&nbsp;Silvia also has a diverse portfolio of commercial project experience, encompassing the interior design of retail stores, showrooms, and membership clubs.</span></p><span data-dcnode-id="952" instrument_node="">

</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Tina is an interior designer with a growing portfolio of high-end private and multifamily residences. As an interior designer, she is responsible for design, documentation, and FF&amp;E selection for some of the firm’s significant projects. She is currently contributing to the interior design of 1 Huron— a 266,000-square-foot multifamily building with ground-floor retail and a generous package of high-end amenities and Front &amp; York— a highly anticipated 1.2-million-square-foot multifamily building both currently under construction in Brooklyn. Tina’s holistic approach to creating user-friendly spaces is shaped by her love for modern/warm furniture and textiles, and her impeccable attention to detail.</span></p><span data-dcnode-id="886" instrument_node="">

</span></p><span data-dcnode-id="824" instrument_node="">
</span><div class="bio" data-dcnode-id="813"><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Ryan is an&nbsp;interior architect and project manager with extensive experience leading commercial and multifamily projects within New York City. On each project, he works closely with the client and MA's architectural project team to create contextual interiors that speak directly to the building's exterior design, location within the city, and&nbsp;target market.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Most recently, he has managed the conversion of&nbsp;a historic loft building in Brooklyn, NY, into the U.S. headquarters for the Davines luxury haircare brand. He has also&nbsp;led interior design efforts for several ground-up multifamily developments throughout New York City, including the recently completed rental building at&nbsp;45 East 7th Street in Manhattan, as well as 215 North 10th Street in Williamsburg, Brooklyn—a 108,000-square-foot building featuring a unique blend of residential and commercial office programming. Currently, he&nbsp;is working on advancing the design of interior spaces within Steel House—a 558,000-square-foot commercial complex&nbsp;designed by MA&nbsp;in Denver's RiNo Arts District. </span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Within the office,&nbsp;Ryan has a demonstrated dedication&nbsp;to sustainability and&nbsp;has taken the initiative to organize the Interior Design Studio's Materials Library based on a&nbsp;ranking scheme he devised&nbsp;to help vet materials.</span></p><span data-dcnode-id="814" instrument_node="">

</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">JoJo is an interior designer with a growing portfolio of residential and commercial interior renovation projects. She is intrigued by technology’s ability to enrich the design experience and actively applies it to her design work. This includes supporting the interior design of a 24-story mixed-use residential tower in Reston, VA; Gallaudet Union Market Parcel 3—a 714,000-square-foot residential high-rise building in Washington, D.C.; and a 180,000-square-foot hospitality development&nbsp;in Atlanta, GA. She is currently working on the interiors of 375 M Street—a 340,000-square-foot mixed-use residential building in Washington, D.C. featuring over 300 residential units. In addition to her versatile design capabilities, JoJo is particularly skilled in client coordination and consensus-building.</span></p><span data-dcnode-id="737" instrument_node="">
