see evidence of this in his manner of eating, drinking, 
and indulgence in social pleasures, from which 
we may gather some notion of the, boundless obstacles 
which stand in the way of his immediate or remote 
regeneration. It is as much a quest for physical 
excitement as the promise of pecuniary gain which 
impels the negro to indulge in petty gambling and 
makes him the chief "policy-player" of the community, 
in every city, North and South. So deeply 
rooted is this impulse, that both "saints and sinners," 
the leaders and the led of the negro men and 
women, constantly haunt such gambling-places, and, 
notwithstanding arrest, imprisonment, and disgrace 
are not rare incidents in their experience, they 
continue to be the most persistent supporters of "policy" promoters. It is chiefly a desire for physical 
sensation which causes snuff-dipping to be such a 
prevalent custom among black people. Even the 
children at their mothers' breasts are taught to use 
it; and the bleared eyes and blotched checks of men 
and women sodden with the use of tobacco betokens

</span></p><hr data-dcnode-id="2902"><a data-dcnode-id="2900" name="thoma190"><span data-dcnode-id="2901" instrument_node=""> Page 190</span></a><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">



but too well to what excess they have gone in the 
use of loathsome narcotics. For like reasons 
rum-drinking is also universal among both sexes; and all 
grades of negro society, preachers and laity seem to 
vie with each other in the use of intoxicating liquors. 
So excessive is their indulgence in these two vices 
that it has been reliably estimated that the freedmen 
spend over sixty millions of dollars annually 
for rum and tobacco.</span></p><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A deplorable fact to be noted is that, while venereal 
diseases, especially those of a syphilitic nature, 
were almost unknown among the negroes during
slavery, since their freedom these diseases have 
overspread the entire South. This is specially true 
of syphilis; and while it rarely assumes the malignant 
form so often exhibited in cold climates, owing 
to its peculiar amenability to tropical and subtropical 
temperatures, yet so deep-seated is it among the 
negroes that it threatens to baffle the skill of the 
medical profession. So firmly rooted are these 
venereal diseases among the freed people of the cities that 
many persons, especially women, are unconscious of 
the nature of their ailments, and, when chance 
apprises them of their misfortune, false notions of 
modesty or innate cowardice leads them to seek 
relief through quack medicines rather than through 
the advice and treatment of capable physicians. 
These physical disorders are extending to the plantation 
negroes, and are largely brought about through 
rural freedwomen, who have been permitted to

</span></p><hr data-dcnode-id="2894"><a data-dcnode-id="2892" name="thoma191"><span data-dcnode-id="2893" instrument_node=""> Page 191</span></a><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">



indulge briefly in the allurements of city life, to
whose attractions they have readily yielded. On
return to their homes they become the
ignorant disseminators of loathsome diseases.</span></p><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Our statements concerning the immoral tendencies 
of the freed people may shock the sensibilities of
those persons who are ignorant of their physical 
inclinations. It is altogether likely that they will 
wound the vanity of the race inculpated. Nevertheless, 
the certainty of our conclusions is as demonstrable 
as any problem of Euclid. We shall, however, 
cite some facts which will go toward substantiating
our conclusions. For example, a noted teacher in a
Southern negro school, who has charge of several
hundred children, ranging in age from six to fifteen, 
has informed us that it was well-nigh impossible to 
keep the boys and girls from indulging in immoral 
practices even while together in the schoolyard, and 
that several instances of carnal contact had taken 
place despite the presence of numerous onlooking 
companions. This is not an exceptional experience. 
Co-sexual assemblages of negroes, whether of 
children or adults, in the schoolroom or sanctuary, would, 
if the light were turned on, disclose an equal degree
of moral turpitude. We have also been informed by 
a trustworthy physician, who has had an exceptionally 
large female practice, that he had professionally 
examined over nine hundred negro girls ranging in 
age from ten to twenty-five years, and that, out of 
that number, only two furnished proofs of virginity,

</span></p><hr data-dcnode-id="2886"><a data-dcnode-id="2884" name="thoma192"><span data-dcnode-id="2885" instrument_node=""> Page 192</span></a><p data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">



while most of the others exhibited indisputable 
evidence of unchastity. He further stated that he 
found the greatest manifestation of sexual desire in 
those girls who were under twenty years of age.</span></p><span data-dcnode-id="2881" instrument_node="">
</span><p data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We anticipate that these statements may be 
controverted, and the averment made that evidence of 
female immorality is lacking where its usual fruitage 
is invisible. Such an objection is groundless, for, 
while wifeless maternity is decreasing among negroes, 
ante-nuptial infanticide is increasing at an alarming 
rate. Besides, the fact is not to be overlooked that 
early sexual indulgence precipitates an internal 
derangement of the physical organs which renders 
conception difficult, if not improbable. When it 
does take place, however, the young negro woman
is not without adequate resources, for in the South 
the fields around her cabin supply her with a potent 
remedy of whose peculiar efficacy she is fully aware. 
Then, again, in the cities and towns of either section 
she can and does have recourse to criminal operations 
with the knowledge and approval of her parents. 
Criminal malpractice is not rare, as all well-informed 
people know. For example, we have in mind a 
prominent white physician residing in a leading 
Southern city, who has in a confidential way privately 
acknowledged to having been instrumental in 
effecting over two hundred abortions among young 
negro women at the instance of their white paramours. 
This is not an exceptional medical experience, 
but one that can be duplicated in every

</span></p><hr data-dcnode-id="2878"><a data-dcnode-id="2876" name="thoma193"><span data-dcnode-id="2877" instrument_node=""> Page 193</span></a><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">



Southern city, and in not a few of those of the 
North. So widespreading is this disorder that, if not
arrested, American negro women are likely to become 
as infertile as the Greek courtesans, and it is needless 
to say that the people of any race is doomed to 
extinction when the women cease to become mothers.</span></p><span data-dcnode-id="2873" instrument_node="">
</span><p data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This reference to criminal operations for the 
destruction of sexual fruitage calls up another phase 
of social conditions that cannot be ignored in any 
attempted uplifting of the race. We refer to the 
well-nigh universal custom in the South, as well as 
in many sections of the North, of white men keeping 
negro mistresses. This shameless prostitution of 
an inferior people by the men of a superior race 
offers the most forcible obstacle to be encountered 
in any effort for the moral regeneration of the freed 
people. Not only are the inherent lascivious 
instincts of the race to be met and overcome, but the 
subtle and powerful machinations of an adroit libertinism, 
interested in perpetuating negro degradation,
must be courageously reckoned with. That such 
grave social complications exist is well attested by 
the fact that Southern grand juries, composed of 
reputable white citizens have been outspoken in 
their condemnation of the prevalent negro concubinage 
of their section, and their presentments to the 
courts of their vicinage have repeatedly affirmed that 
their young white men are not marrying, and would 
not marry, their social peers, so long as they were 
permitted to keep negro mistresses. The causes

</span></p><hr data-dcnode-id="2870"><a data-dcnode-id="2868" name="thoma194"><span data-dcnode-id="2869" instrument_node=""> Page 194</span></a><p data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">



which have brought about this anomalous social 
phase are not far to seek. They will be found in 
the lax morality, the love of luxury, and that material 
greed which so largely permeates our civilization, 
and which are doing for us what the same influences 
wrought in the French people,--that is, producing a 
class of voluptuous white celibates, who will not 
create conjugal homes and rear legitimate families, 
because they have greater freedom and less expense 
in a misalliance with an inferior and subjective 
female class. We may, to be sure, blindly ignore 
existing facts, and be oblivious to the drift of 
events, but any sane forecast of the future will 
reveal impending evils of prodigious magnitude to a 
people who are neither "marrying nor given in marriage."</span></p><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There may be a disposition by well-intentioned 
persons who have more or less knowledge of this 
matter to question the facts underlying our statements 
concerning negro social conditions. If so, 
they are advised in advance that no conclusive evidence 
to the contrary exists; furthermore, to all who 
are disposed to challenge the veracity of these 
statements, we suggest a simple method by which they 
may reasonably ascertain for themselves the correctness 
of what we say. For example, let those interested 
in this subject make out, from among their 
immediate acquaintances, a random list of one hundred 
female negroes; then scan the list critically, and 
we venture the assertion that they will be amazed

</span></p><hr data-dcnode-id="2862"><a data-dcnode-id="2860" name="thoma195"><span data-dcnode-id="2861" instrument_node=""> Page 195</span></a><p data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">



and mortified at the number of moral lapses which
a mere inspection of the list will disclose. Of course
an adequate and authoritative comprehension of this
question can only be reached in this, as in other
departments of knowledge, from facts, from analytical
investigation and verified data. We shall, however,
in view of all the known facts at our command,
be justified in assuming that not only are fully
ninety per cent of the negro women of America
lascivious by instinct and in bondage to physical
pleasure, but that the social degradation of our 
freedwomen is without a parallel in modern civilization.</span></p><span data-dcnode-id="2857" instrument_node="">
</span><p data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;In advancing this conclusion we shall briefly note, 
in addition to what has already been said in this 
connection, that the leading causes which have wrought
their downfall and which perpetuate their shame, 
are an aversion for manual labor, the desire for 
physical ease, a craving for gaudy display in dress, 
the lack of conception or knowledge of the 
fundamental duties, obligations, and social requirements 
of womankind, and the consciousness of white 
superiority and negro debasement. These incitements 
to personal degradation are supplemented and 
overshadowed by the racial distinctions instilled in the 
minds of negro girls by many mothers, who not only 
bring them up in an atmosphere of lax morality, but 
in many instances with positive aversion to their 
own race and color, thereby effecting their early 
transition from purity to concubinage. While these 
social statements fairly indicate the status and trend

</span></p><hr data-dcnode-id="2854"><a data-dcnode-id="2852" name="thoma196"><span data-dcnode-id="2853" instrument_node=""> Page 196</span></a><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">



of negro development, the question arises again, Is 
it instinct, impulse, or will, or all of them combined, 
which leads the negro to prefer darkness to light,
vice to virtue, crime to innocence, death to life? To 
our mind the answer lies in a sentence,--it is an 
insatiate craving for physical sensations, an impulse 
that constitutes the supreme motif of negroid activity. 
In order to apprehend the significance of this 
statement in all its bearings, there is need to realize 
that the psychical endowment of the negro has not 
developed adequate mental and spiritual forces. He 
is lacking in continuity of purpose, in abstract 
endeavor, and seeks satisfaction in such concrete 
sensations as taste and feeling.</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It was not deemed necessary to the verification 
of our statements that special incidents should be 
related in detail, either as to person or act. Such 
disclosures could serve no useful end; besides, the 
characteristic data of which we have made use is 
everywhere present in the negro people, and readily 
accessible to the observant public. It is hardly 
necessary to add that these animadversions of negro 
shortcomings are not indulged in for the sake of 
denunciation. Wherefore, then, it may be questioned, 
are these revelations, this exhibit of frailty, this analysis 
of weakness? For this: to arouse moral apathy 
into earnest discontent, to protest against bigotry, 
to stimulate uprising against ignorance, to revolt
against infamy,--to the end that hoary mendacities, 
sacerdotal hypocrisies, the ghastly corpses of servile

</span></p><hr data-dcnode-id="2846"><a data-dcnode-id="2844" name="thoma197"><span data-dcnode-id="2845" instrument_node=""> Page 197</span></a><p data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">



mummeries, and all other duplicities which shackle 
the conscience and blur the vision of enthralled souls 
shall be tossed aside and trampled under foot, and 
that the dross be utterly consumed in the indignation 
of reclaimed men and women.</span></p><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The moral status of a race is fixed by the character 
of its women; but, as moral rectitude is not a 
predominant trait in negro nature, female chastity is not 
one of its endowments. Nor has negro womankind any 
strong incentive for virtuous living when the pure 
and the impure are received on an equal footing in 
social intercourse, and the ability to wear good clothes 
is the sole criterion of individual social standing. The 
manifest disposition of the negro people to blot out 
all moral distinctions in social intercourse has had its 
inevitable fruits. The women of that race are evading 
honest toil to live in licentious ease. Moreover, 
as fine clothes are the open sesame to social recognition, 
a craze for dress and personal adornment has 
aroused within the freedmen a passionate discontent 
that urges them to resort to all sorts of reprehensible 
follies, and even crime, to obtain their desire. This 
greed and unrest among their women, which would 
be laudable if it led them to honest labor and thrifty 
forethought, is a strong incitement to immoral vices,--so much so that, without remorse or shame, for the 
sake of obtaining luxuries without labor, they will 
traffic in their bodies, which is the most marketable 
commodity they possess.</span></p><span data-dcnode-id="2838" instrument_node="">
</span><p data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;So visibly universal is the strife for personal adornment

</span></p><hr data-dcnode-id="2835"><a data-dcnode-id="2833" name="thoma198"><span data-dcnode-id="2834" instrument_node=""> Page 198</span></a><p data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">



that negro mothers cannot be held blameless
for the immoralities of their daughters, and there is
at least ground for believing that sexual impurity
is deliberately inculcated in them, since, in many
instances, their maternal guardians appear to be
never so pleased as when the physical charms of
their daughters have procured for them dress and
jewels beyond the ability of their parents to provide.
Nor do the girls themselves appear to be abashed by
any publicity of their immoralities. On the contrary, 
they are conspicuous in the social gatherings
of their people, and parade with shameless audacity
their wanton finery before their envious and less
successful female friends. These facts would be
incredible did we not realize that negro women are
admittedly weak in purpose, timid in execution,
superstitious in thought, lascivious in conduct, and
signally lacking in those enduring qualities which
make for morality, thrift, and industry. Therefore,
as they are seldom animated by high aspirations and
noble purposes, the common-sense lessons of life
which universal experience teaches are rarely heeded
by them.</span></p><span data-dcnode-id="2830" instrument_node="">
</span><p data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;So far as we can discern, negro motherhood is not 
animated with profound convictions of truth and 
duty. The freedwomen evidently do not realize that 
they are the custodians of the souls as well as the 
bodies of their children, and the first and chief 
teachers in life of purity in speech and action, of 
right-doing in all its phases, and the God-ordained

</span></p><hr data-dcnode-id="2827"><a data-dcnode-id="2825" name="thoma199"><span data-dcnode-id="2826" instrument_node=""> Page 199</span></a><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">



creators of true manhood and womanhood. On the 
contrary, they bring to the discharge of their domestic 
duties illiterate minds, unskilled hands, impetuous 
tempers, untidy deportment, and shiftless methods. 
Moreover, as their chief defects are ignorance and 
laziness, filth and squalor, these advance agents of 
intemperance and vice pervade and dominate their 
domestic endeavors, and such conditions are increasingly 
perpetuated as the negro children come into 
being. Where such conditions exist it is obvious 
that any uplifting movement begun for the race 
must attack every point of life and character 
requiring amendment or improvement; though, first 
and foremost, let us realize that it is example and 
environment which make for the good or ill of 
mankind. We see that vice propagates vice, that
wholesome surroundings induce virtuous living, and 
nothing more strongly exemplifies this fact, either 
in the direction of upward or downward growth, 
than the law of habit. Obviously we build solid 
characters of truth and righteousness mainly through 
pure association and the steady repetition of good 
deeds. On the other hand, evil contact and vicious 
example as certainly lead to vice and infamy. We 
shall therefore make no mistake in saying that 
until an all-pervading desire for cleanliness, sobriety, 
industry, and chastity awakens within the freedwomen 
and arouses them to reformatory action, no 
amount of theoretical knowledge will be of the 
slightest value to them, solely because knowledge

</span></p><hr data-dcnode-id="2822"><a data-dcnode-id="2820" name="thoma200"><span data-dcnode-id="2821" instrument_node=""> Page 200</span></a><p data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">



is valuable only in proportion as it is applied to the 
actual needs of life.</span></p><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;These observations lead us to note that, whether 
considered as units of contrasts or as inclusive 
aggregates of type characteristics, there is a fundamental 
difference in the racial character, habits, integrity, 
courage, and strength of negro and white Americans.
What makes it? The answer lies in one word--their women. But while that fact is obvious, it 
furnishes no solution of another equally patent, 
which is this: Girls of the two races will grow up 
side by side, attend the same schools, go through 
the same course of study, and enjoy equal mental 
advantages, yet the chances are two to one that the 
negro girl at twenty will be a giggling idiot and 
lascivious wreck, while her white companion in 
school and church, of the same age, has blossomed 
out into chaste womanhood, intelligent in mind and 
accomplished in manner. This difference between 
them becomes of fundamental significance when we
reflect that each girl represents the future maternal 
life-blood of her respective people, and that the wives 
and mothers of a race are its earliest and most convincing 
teachers. How important, then, that negro 
women should comprehend and uphold, under all 
circumstances and in all places, the purity, dignity, 
and worth of chaste living. Is it not obvious that 
the negro people will never become great, wise, or 
true, until its women become the qualified teachers 
of infant life and the moral censors of mature existence,

</span></p><hr data-dcnode-id="2814"><a data-dcnode-id="2812" name="thoma201"><span data-dcnode-id="2813" instrument_node=""> Page 201</span></a><p data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">



until they institute such safeguards and assurances 
of chaste maidenhood as characterize Hebrew 
social life?</span></p><span data-dcnode-id="2809" instrument_node="">
</span><p data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;So far as the questions of marriage and divorce 
relate to the freedman we are confronted by conditions 
that no amount of common-sense pleading will 
eliminate. Marriage rites are held by negroes to 
effect a mystical union between two persons of opposite 
sex, in much the same sense that regeneration is 
understood to operate upon their spiritual natures. 
That is to say, no matter how divergent in character, 
sentiment, habit, or inclination, two persons may be, 
they are by some supernatural process made one 
through a ceremonial incantation uttered by clerical 
lips. Ceremonial marriage, therefore, with the 
negroes, is invested with a superstitious halo, notwithstanding 
the fact that the nature, purpose, duties, and 
obligations of marital relations are unknown to most 
of those contracting connubial ties, and when known 
to them are frequently unheeded. In the presence 
of such beliefs it would be a waste of time and words 
to say that true marriage is a complete union of the 
aims, ideals, purposes, and interests of two persons, of 
such consummate oneness as to shut out all variant 
individual interests and compel personal selfishness 
to give way to dual welfare; that actual marriage 
is neither mercenary nor sensuous, but replete with 
sacrifice and service, with a constant preference of 
another for self, and that when these do not exist 
the essentials of wedded life are wanting.</span></p><span data-dcnode-id="2806" instrument_node="">
</span><hr data-dcnode-id="2805"><a data-dcnode-id="2803" name="thoma202"><span data-dcnode-id="2804" instrument_node=""> Page 202</span></a><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">
</span></p><p data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Concurrent with the freedman's notion concerning 
marriage there is a disposition among many of the 
leading negro societies to discredit the legitimate 
function of divorce, some of which have even gone 
so far as to usurp functions belonging to the state 
by not only undertaking to regulate marriage among 
their followers, but to pass in review the mandates 
of the state and impeach the legality of its acts. The 
consequence is that, should a man or woman of these 
societies when mated with an impure companion 
procure a severance of marital ties through divorce, and 
to live a decent life thereafter marry another, he or 
she is liable to be adjudged guilty of bigamy. The 
negro conjugal maxim is, once married always married; 
to which doubtless he has been led by his creed, 
which is, once in Christ always in Christ. In each 
condition, however, he is sadly derelict in conjoining 
practice with belief, and chiefly because he is 
more concerned with the form than with the facts of 
morality. The religious negro often expresses an 
abhorrence of divorces, while he freely indulges in 
conjugal separation, and exhibits a decided preference 
for sexual alliances free from legal restraint.</span></p><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2797" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;For ourselves, we believe in maintaining, </span><font color="red" data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">whereever</span></font><span data-dcnode-id="2794" instrument_node=""> it is possible, the integrity of marriage, the 
purity of home, the fidelity of husband and wife to 
all the duties and requirements imposed by marital 
obligations. But we as firmly believe, when these 
duties are disregarded, when family honor is imperilled 
and home life desecrated with nuptial infidelity,

</span></p><hr data-dcnode-id="2792"><a data-dcnode-id="2790" name="thoma203"><span data-dcnode-id="2791" instrument_node=""> Page 203</span></a><p data-dcnode-id="2785"><span data-dcnode-id="2789" instrument_node="">



that the legitimate and honorable step for self-respect 
and conscious rectitude to take is immediate 
separation and divorce. Marriage, as all intelligent 
people know, is a civil compact, consummated by 
two individuals of opposite sex, under such limitations 
and restrictions as the civic organism has made 
and provided. It is a civil contract between persons 
capable of making a legal agreement; the sanction
of the state is necessary to its validity; it is 
annullable for cause through judicial process. Hence 
a decree for divorce from a court having jurisdiction 
is </span><i data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">prima facie</span></i><span data-dcnode-id="2786" instrument_node=""> evidence of the annulment of the 
previously contracted marriage, and, unless it can be 
clearly established before a competent judicial 
tribunal that such decree was obtained through 
collusion and fraud, it will not be set aside. These are 
facts of which it appears the negro is wilfully 
ignorant, or to which he opposes obstinate indifference.</span></p><span data-dcnode-id="2784" instrument_node="">
</span><p data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The question naturally arises, What can be done to 
ameliorate the condition of these negro people? We 
have but one solution to offer, and that is an amenable 
family supervision of such a character as will 
impart to its old and young useful knowledge of 
immediate needs, and induce one and all to strive for 
sincere social betterment. As we see this question, 
the one supreme need of negro family life is regenerated 
fathers and mothers and wholesome living. Evidently, 
then, as long as these are lacking the moral 
and social redemption of badly reared, poorly 
nurtured, and viciously environed boys and girls is

</span></p><hr data-dcnode-id="2781"><a data-dcnode-id="2779" name="thoma204"><span data-dcnode-id="2780" instrument_node=""> Page 204</span></a><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">



impossible, unless the reformatory discipline to which 
they are subjected extends to their homes and includes 
their parents. The value of this suggestion lies in 
the fact that any adequate family supervision would 
awaken in parents a desire for social betterment, and 
open the way for a sympathetic development of their 
children. Moreover, as there is a perceptible awakening 
to the evils of immoral degradation among 
negroes themselves, it is reasonable to believe that 
the more self-respecting freedmen would welcome 
corrective oversight, and be fairly amenable to any 
agency which, in a helpful spirit, undertook to 
improve their social condition. As matters now stand, 
they cannot effect their own extrication.</span></p><span data-dcnode-id="2776" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But such lessons in living as the negro needs 
cannot be imparted through any process of mental 
abstraction. Memorized precepts will not leaven sinful 
humanity with truth and righteousness; neither will 
verbal gymnastics bring about moral transformation. 
What the negro stands in absolute need of is such a 
renovating education as will implant within his 
untutored nature high ideals of sound sentiments respecting 
manhood and womanhood, and, at the same time, 
will train his mind, enlighten his soul, and discipline 
his body in every essential function of wholesome 
living. Already something has been accomplished in 
this direction, and both the flower and fruitage of 
racial evolution may be seen in that class of men 
and women among the freedmen who are honestly 
striving to free themselves from immoral entanglement.

</span></p><hr data-dcnode-id="2773"><a data-dcnode-id="2771" name="thoma205"><span data-dcnode-id="2772" instrument_node=""> Page 205</span></a><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">



Nevertheless, it is obviously impossible for 
a fraction of regenerated negroes, with neither faith 
nor force behind them,--not to mention a lack of 
other essential endowments,--to change the habits 
and ideals of those from whom they have emerged, 
and who, in consequence, are bound to regard them 
as not a whit better than themselves.</span></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The duty of all serious promoters of negro enlightenment 
is to apply to racial viciousness such correctives 
as the soundest experience has demonstrated 
to be the most efficacious in promoting the social 
bettering of mankind. Present methods will not 
regenerate the negro race; neither sobriety nor 
stability is ever attained by a homeless people. The 
negro needs to be taught how to create and maintain 
a home in honor and purity, and to that end he 
requires the influence of wholesome example and the 
inspiration of supervising contact. But no substantial 
moral elevation of the negro is possible without 
the intervention and coöperation of highly qualified 
women, such as are thoroughly capable, painstaking, 
and God-fearing teachers of truth and righteousness. 
This is a common-sense suggestion, and it is in line 
with conditions of aid which now exist. Negroes
are accustomed to industrial control, and have 
been for centuries in abject submission to the white 
people of the South, who know, as no others can, all 
their good and bad qualities. We are therefore 
constrained to believe that, were the best representatives 
of Southern white civilization to lay aside their

</span></p><hr data-dcnode-id="2765"><a data-dcnode-id="2763" name="thoma206"><span data-dcnode-id="2764" instrument_node=""> Page 206</span></a><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">



exclusive race arrogance, there is little doubt but 
that prodigious results would follow any candid and 
serious purpose on their part to accomplish the 
freedman's regeneration.</span></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It ought, moreover, to be said that this duty is 
fairly incumbent upon those who have so interminably 
dominated an inferior race, and with whom, 
through vicious sexual alliance, they have become 
inextricably entangled in blood, lineage, speech, and 
habits. Candidly speaking, the white people of the 
South owe it to our civilization and Christianity, as 
well as to themselves and their posterity, to purify, 
by chaste speech and wholesome example, the homes 
of the blacks whom they and their ancestors have so 
wantonly debauched. It is no less a matter of moral 
preservation than their imperative duty, to arrest 
the degeneracy of that race with whom their future 
is inseparably bound up. But, whether or not this 
work is taken up by the white men and women of 
the South, the fetidness of negro sensuality must be 
eradicated. It can only be done, however, through 
an army of good and true women; and as no sufficient 
number of such women are to be found within the 
race itself, they must be sought from without. Where 
can such divinely consecrated teachers and exemplars 
of righteousness as this work requires be found? The 
only feasible hope for such a consummation centres in 
such white women of the North as may be aroused to 
a sense of the needs and wants of a degraded black 
sisterhood, and who, by going to its relief, shall train

</span></p><hr data-dcnode-id="2757"><a data-dcnode-id="2755" name="thoma207"><span data-dcnode-id="2756" instrument_node=""> Page 207</span></a><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">



the young negro women into abhorrence for immorality, 
and lead them to chaste living.</span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The freedmen require in this, as in other respects, 
not benevolent pandering nor lordly oversight, but 
genuine service unstintedly rendered for helpful and 
wholesome race improvement. To blunder in the 
face of such opportunities would be criminal, and it 
would be an unpardonable blunder to exploit any 
half-hearted measures for the freedman's redemption. 
The conscience of the negro is imperfectly developed, 
and he needs constant drill in moral endeavor, under 
such guidance and surrounded by such influences as 
will reduce the possibilities of immoral relapse to a 
minimum. Such training should begin at the cradle. 
Never, until this is done, shall we succeed in inculcating 
in this people such ideals as will develop 
characters grounded on integrity and consecrated 
to service and duty. Despite their vanity, sensuous 
follies, and instability of temperament, our freed men 
and women have within them an unfathomed wealth 
of sentiment, which only awaits the deft hand of 
moral tactfulness to be moulded into serious and 
steady response to the demands of life.</span></p><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2748"></p><hr data-dcnode-id="2747"><a data-dcnode-id="2745" name="thoma208"><span data-dcnode-id="2746" instrument_node=""> Page 208</span></a><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">CHAPTER VIII</span></h3><span data-dcnode-id="2740" instrument_node="">
</span><h3 align="center" data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">CRIMINAL INSTINCTS</span></h3><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;EVERY social organism is founded on laws defining 
right and wrong. But, apart from any legal definition, 
a sense of right and wrong is grounded in the 
human understanding. Crimes are offences prohibited 
by municipal law. Crime is a menace to social order, 
an infringement upon individual rights, an assault 
on private property. Criminals are the open and 
avowed enemies of mankind, against whom society 
has a right to protect itself in every possible way. 
The crime instinct has its source in moral obtuseness 
and physical desire, and the criminal class may be 
divided into the congenital, the habitual, and the 
spasmodic, according to the proclivities evinced in 
each particular person.</span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The extent of the crime instinct in the negro is 
indeterminate for the reason that accurate data are 
unattainable. In so far as he has been held to an 
outward observance of moral restraints, it is obvious 
that fear of bodily harm has been the chief influence 
which has kept him in check. That his nature is 
surcharged with latent ferocity is shown by abundant 
evidence of atrociousness, committed on weak and 

</span></p><hr data-dcnode-id="2731"><a data-dcnode-id="2729" name="thoma209"><span data-dcnode-id="2730" instrument_node=""> Page 209</span></a><p data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">



defenceless objects. Indeed, there is good ground for 
believing that, were the negro once convincingly 
assured of personal security, all the malignity of his 
slumbering savagery would immediately find expression 
in the most revolting acts of physical lawlessness. 
His passions are easily excited, and his feelings 
readily inflamed to the point of reckless vindictiveness, 
though a natural unsteadiness of character renders 
him fickle and unstable in purpose.</span></p><span data-dcnode-id="2726" instrument_node="">
</span><p data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;For the commission of crime requiring forethought, 
coolness, sagacity, and persistency, the negro would 
be entirely wanting in the requisite courage. He 
can and does commit offences of horrible atrociousness, 
but rather as the sequence of impulse than as 
the outcome of deliberate preparation. At every 
step in his criminal career he is timid and cowardly, 
and, whether his victims be human or animal, he is 
never generous in treatment nor magnanimous in 
forbearance so long as he occupies the vantage ground. 
When detected and apprehended, he exhibits all the 
cravenness of a servile nature by confessing with verbose 
volubility every harrowing detail of his revolting 
misdeeds, and the more heinous the crime committed 
the greater appears his self-heroism. Should he be 
adjudged guilty and sentenced to undergo capital 
punishment, he awaits the end with a seeming impatience 
and a serenity that betokens resignation and submission 
to a just award, though as a matter of fact his 
attitude is merely the result of moral obtuseness and 
apathetic indifference to an impending fate.</span></p><span data-dcnode-id="2723" instrument_node="">
</span><hr data-dcnode-id="2722"><a data-dcnode-id="2720" name="thoma210"><span data-dcnode-id="2721" instrument_node=""> Page 210</span></a><p data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">
</span></p><p data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A secondary explanation is to be found in the fact 
that negroes guilty of heinous crimes are taught by 
their religious teachers that God will pardon them, 
and that in becoming pardoned all sense of guilt is 
expunged; so rapists and murderers sing and shout 
on the gallows and claim to be regenerated men. Of 
course, this is sheer nonsense and gross self-deception. 
There is no real change in men who, if released, 
would repeat their crimes at the first opportunity. 
Such teaching is therefore an unconscious or deliberate 
crime-breeder, and crime flourishes and will continue 
to flourish among freedmen so long as the doctrine 
obtains that all evil is condonable, and every infraction 
of morality a matter of intercession and forgiveness.</span></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The chief expression of negro criminality is directed 
against property. The negro, being devoid of any
sense of responsibility to public opinion, is moved 
to the commission of criminal acts by impulse and 
thoughtless disregard of consequences. It is fair to 
say he does not steal for the sake of stealing, but 
because he has very little sense of individual ownership, 
and takes what his appetite suggests or passions 
crave because it is present to him and within his 
reach. Theft, therefore, of great or small things, 
is not a culpable offence in the eyes of freedmen, 
and the black thief is not an object of aversion to 
them unless the criminal act has been perpetrated 
against their own persons or belongings, when they 
are the loudest in denunciation of the crime and the 
most vociferous in condemnation of the criminal.

</span></p><hr data-dcnode-id="2712"><a data-dcnode-id="2710" name="thoma211"><span data-dcnode-id="2711" instrument_node=""> Page 211</span></a><p data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">



Where it is otherwise, the criminal is shielded, and 
felonious acts committed against the white race are 
condoned even by the better sort of freedmen, who 
doggedly affirm that petty peculations of subsistence 
from the whites are always justified. Is it not merely 
"spoiling the Egyptians"? So in every negro breast 
there are inculcated sentiments instigating the 
purloining of usable property from the dominant race; 
and where food or clothing belonging to white people 
is obtainable and wanted by the blacks, it is sure 
to be appropriated.</span></p><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This phase of racial turpitude will be better comprehended 
when it is realized that the negro's rational 
faculties have not been awakened through his more 
recent acquaintance with books, just as his ethical 
acquirements have not imposed restraints upon his 
physical impulses. He has but a slight sense of 
amenability to social rectitude, and the criminal 
classes of his race do not have that feeling of shame, 
and sense of degradation, which is usually found 
among all convicted persons except those of the most 
hardened class of white criminals. But we shall do 
well to bear in mind that negro criminality is not 
primarily instigated by any sordid desire for material 
possession. In most instances it is precipitated by a 
craving for sensations. The crime is means to an end.</span></p><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The negro who steals his neighbor's chickens, for 
example, does not rob him of his property out of ill 
will; there is neither malice, retaliation, nor revenge 
involved in the act, and the poultry thief will purloin

</span></p><hr data-dcnode-id="2701"><a data-dcnode-id="2699" name="thoma212"><span data-dcnode-id="2700" instrument_node=""> Page 212</span></a><p data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">



as readily from his relatives and friends as from an
entire stranger. The sole animus of this theft is 
simply a covetous impulse to satisfy gustatory appetite. 
Physical desire is so ingrained in his nature 
that those of all degrees of social development will 
gratify their propensity by petty thieving. The 
preacher in charge of the moral training of his 
people, and the teacher engaged in their mental instruction, 
will steal from each other and from the whites 
as readily as the most indigent freedman. By filchings 
the orchard is robbed of its choicest fruits, the 
garden despoiled of its luscious products, the hennery 
stripped of fowls, and the sty of pigs, to satisfy the 
rapacious gluttony of racial indolence.</span></p><span data-dcnode-id="2696" instrument_node="">
</span><p data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But while the primary impulse of the negro to 
steal is derived from his appetites, nevertheless, as he 
grows in intelligence and wants, the area of motives 
that induce theft enlarges. The ignorant negro 
steals food to eat and a garment to wear; the more 
intelligent steals cotton from the gin-houses, corn 
from the crib, hogs from the pens, cattle from the 
field, or horses from the stable, and offers his theft 
for sale or barter in localities where it cannot be 
identified. Should his first attempt at crime succeed, 
he is launched on a career that is eventually steeped 
in wickedness and terminates only in death. We 
have just remarked that the area of criminality 
is enlarging. That is always a foreseen result in 
any class entering on a criminal career, and where 
the transition from minor to major offences is an

</span></p><hr data-dcnode-id="2693"><a data-dcnode-id="2691" name="thoma213"><span data-dcnode-id="2692" instrument_node=""> Page 213</span></a><p data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">



inevitable sequent of moral induration. This 
observation holds true in the case of the criminal freedman, 
who, to his petty pilferings of food and clothes, now 
adds burglary, arson, rape, and homicide. It is 
significant that arson is an increasing crime in the 
South, and one mainly instigated by a spirit of 
revenue for real or fancied injuries of a white man 
against a negro, though it rarely happens that 
inhabited dwelling-houses are burned. Negro cravenness 
confines its fiendish vindictiveness to the destruction 
of the gin-houses, corn-cribs, smoke-houses, and stables 
of persons who have been unfortunate enough to 
excite the enmity of their black neighbors.</span></p><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A generation ago the negro was a comparative 
stranger to judicial supervision, and when present 
in court was rarely other than an idle spectator. 
But when restraints to which he had long been 
accustomed and to which he yielded passive obedience 
were removed, and he was left in a condition 
of license, all the abeyant passions of his undisciplined 
nature were brought into prominence and 
antagonism with an environment where reciprocal 
obligations have not always found their highest 
expression. The consequence is that negroes who 
do not yield ready obedience to reason and due 
regard for the rights and property of others are 
perpetually embroiled in judicial controversies with one 
another, when not engaged in defending themselves 
from accusations brought against them by some 
despoiled property owner, It may also be of interest

</span></p><hr data-dcnode-id="2685"><a data-dcnode-id="2683" name="thoma214"><span data-dcnode-id="2684" instrument_node=""> Page 214</span></a><p data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">



to know that the freedwomen are more pugnacious 
litigants than the men and less amenable to 
legal corrections. Litigation among negroes is rarely 
instituted to establish rights or to correct wrongs, 
but rather to appease malevolent desires and procure 
revenge for causes of action that among a less 
emotional people would find adjustment in rational 
agreement and sober conduct. So ungovernable are 
negroes in their impulses and desires, and so unceasing 
are their petty strifes, engendered in a hundred 
different ways, that their vanity can only be mollified 
by recourse to the municipal court, with which every 
paltry complaint is lodged, and where the negro 
litigant derives his greatest satisfaction in the condemnation 
of his rival in folly. To confirm these 
statements we need but call attention to the fact 
that the grand jury of Montgomery, Alabama, in 
one of their official presentments, stated that 
seven-eighths of the complaints brought to their attention 
and seven-eighths of the court trials were instigated 
by negro litigants. Nor does this instance represent 
an anomalous condition of affairs. Grand juries of 
other counties in Alabama, as well as those of every 
Southern state, have made substantially the same 
declaration. Without seeking extenuation for negro 
foolhardiness, it is just as well to know that there 
are not wanting white lawyers and justices of 
inferior courts who encourage strife among negroes 
merely for the sake of the costs and fees which 
such legal contentions bring them.</span></p><span data-dcnode-id="2680" instrument_node="">
</span><hr data-dcnode-id="2679"><a data-dcnode-id="2677" name="thoma215"><span data-dcnode-id="2678" instrument_node=""> Page 215</span></a><p data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">
</span></p><p data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The seriousness of the situation is seen when we 
state that the freedmen represent seventy-five per 
cent of the incarcerated criminal class of the South. 
Moreover, when it is realized that one-third of the 
crimes committed in the United States and one-third 
of the convicted criminals are negroes, we are 
furnished with convincing proof of the criminal 
degradation that obtains among this people. But while 
these statements are unimpeachable, we have not 
the slightest doubt that many negro convicts are 
really innocent of the crimes for which they have been 
condemned on the testimony of their own race. 
This statement should not be discredited when we 
reflect what sort of creatures many negroes are and 
by what means they subsist. In all sections where 
the freedmen are to be found in any considerable 
number there are among them idle, vicious beings 
who constitute a group of despicable spies and 
infamous informers. These persons are readily amenable 
to flattery or bribery, and a cast-off article of apparel 
given by a white person will move the garrulous negro 
to tell all he knows inimical to his race, and where 
facts are wanting he will fabricate charges that rarely 
fail to put in jeopardy the lives and liberty of those 
accused. Where envy and hate play so important a 
part in their social intercourse, we have substantial 
grounds for asserting that many a negro who has 
unwittingly offended some white person has been 
sent to prison on the evidence of another negro, who, 
without remorse, has perjured himself for the sake

</span></p><hr data-dcnode-id="2672"><a data-dcnode-id="2670" name="thoma216"><span data-dcnode-id="2671" instrument_node=""> Page 216</span></a><p data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">



of discarded raiment or a gratuity of food bestowed 
by an unprincipled white patron of lust and crime.</span></p><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Southern criminal jurisprudence has devised 
various methods of punishment for those who commit 
crimes, but the most atrocious of them is what is 
known as the "chain and gang system," for the 
reason that all classes of offenders, the old and 
young, male and female, the habitual lawbreaker, 
and those whom passion, evil associates, or physical 
wants have unwittingly swept into criminal turpitude, 
are all herded together and subjected to the 
same dehumanizing treatment by their irresponsible 
keepers. The brutal barbarities of this system cannot 
be adequately depicted. Its shameless pretences, 
its brazen audacities, its lustful horrors, its school of 
infamy, its crime-breeding fecundity, appal and outrage 
every instinct of morality. The condition 
which makes possible its existence is a damning blot 
on American civilization. This phase of Southern 
penal servitude, moreover, has not the slightest excuse 
or justification for its existence. It was instituted 
by white cupidity, and, though hedged about with 
shotguns and Winchester rifles, does not abate crime 
and is wholly without deterrent features. On the 
contrary, every brutal passion and debasing instinct 
is aroused and kept alive in the breast of the victim, 
who, should his sentence be survived, is irrevocably 
transformed into an habitual criminal. Such social 
injustice is infamous. Penal institutions have no 
right to become purveyors of crime, and American

</span></p><hr data-dcnode-id="2664"><a data-dcnode-id="2662" name="thoma217"><span data-dcnode-id="2663" instrument_node=""> Page 217</span></a><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">



manhood ought to exterminate the convict lease 
system in every state, both as it relates to inmates 
within the penitentiary and to those employed without 
its walls.</span></p><span data-dcnode-id="2659" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;That a criminal instinct of greater or less intensity 
pervades all submerged classes is not to be 
controverted, hence, where crime-inspiring conditions 
confront us, the essential duty is to devise feasible ways 
and means for their suppression and eradication. In 
general terms it may be said that, for any 
comprehensive management of the criminal class of any 
race, faith and force are the most efficient factors, 
though, as the negro is largely devoid of intelligent 
faith, it is absolutely necessary to have recourse to 
force for keeping him in legal subjection. It is with 
this end in view that much of that which now follows 
is set forth. We suggest two ways of treating 
negro criminals in the South, both of which would 
exert a salutary effect on the criminal and contribute 
to the welfare of the community.</span></p><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Our first suggestion is that convicts should be 
graded into groups and classified according to age, 
sex, nature of offence, term of sentence, degree of 
criminal depravity, and moral obduracy. Those 
undergoing a life sentence should be confined in a 
penitentiary and employed in such labor in the 
institution as would, in providing for their maintenance, 
effect the least competition with the honest industrial 
world. Other male convicts undergoing a sentence 
of five or more years should be set to work on

</span></p><hr data-dcnode-id="2653"><a data-dcnode-id="2651" name="thoma218"><span data-dcnode-id="2652" instrument_node=""> Page 218</span></a><p data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">



public highways, and it is conceivable that an 
elaborate system of road-making might be undertaken 
that would, in a short time, give the South the best 
highways in the country. Without doubt good roads 
would add immensely to the wealth and welfare of 
the country in which they were built. So far as our 
knowledge goes, a road tax is now levied in most, if 
not all, of the states upon their male inhabitants, and 
where it obtains no innovation would be introduced 
other than to substitute in the place of crude 
workmen a corps of trained road-builders such as these 
convicts would speedily become under the guidance 
of capable civil engineers.</span></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Our second suggestion is that punishment for 
minor offences should always be a fine in the shape 
of a labor commutation, which should be reckoned 
at a fixed rate for a day's work representing eight 
hours' labor. One half of the convict's earnings 
should go to the state in payment of his fine, and the 
other half to the support of his family if he has one. 
When he has no one dependent upon him for support, 
it should be held in reserve and paid to the convict 
himself on the expiration of his sentence. Our 
suggestion is that every county in the South should have 
a convict farm and industrial workhouse, as an 
adjunct to the state penitentiary, and in each of these 
institutions the mental, moral, and industrial training 
of the incarcerated should be carried on by 
capable and efficient agents of the states thoroughly in 
sympathy with all feasible efforts for the eradication

</span></p><hr data-dcnode-id="2645"><a data-dcnode-id="2643" name="thoma219"><span data-dcnode-id="2644" instrument_node=""> Page 219</span></a><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">



of crime and the reformation of the criminal. All 
negro convicts serving a sentence of less than five 
years should be committed to state farms in the 
county where conviction is made, and should there 
be engaged in crop-raising. The produce in excess 
of that necessary for their own subsistence and 
the expense of production would furnish ample 
subsistence for the other two classes of convicts which 
we have described,--beside returning under capable 
management a lucrative reserve fund to the state 
treasury.</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;These county farms should not only be made to 
provide ample resources in the way of subsistence for 
all the convicts of the state, but as examples of model 
farms and diversified crop production they should, 
through their care and culture of grain foods, serve 
as a highly important object-lesson to surrounding 
farmers. The state of Texas has some county farms to 
which minor convicts are sent, but so far as we know 
they are without reformatory features, and our best 
impressions are that they represent a very harsh system 
of legal industrial servitude. Each of these systems 
which we have described could be conducted 
under such wholesome restraining influences as would 
exert a beneficial effect upon all criminals except the 
perversely incorrigible,--who should always be kept 
apart from the less vicious in every penal institution. 
As negro women form no small proportion of the 
Southern convict class, the opportunities for their 
domestic industrial training and the probabilities of

</span></p><hr data-dcnode-id="2637"><a data-dcnode-id="2635" name="thoma220"><span data-dcnode-id="2636" instrument_node=""> Page 220</span></a><p data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">



their moral reclamation are infinitely greater in a 
well-conducted rural reformatory than in the best-equipped 
Southern penitentiary.</span></p><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A fundamental feature in racial criminology, and 
one whose consideration should never be put aside in 
endeavor after penal treatment, is the fact that the 
negro is a moral pervert, not so much from inclination 
as from a lack of training; that as a criminal 
he comes into the custody of the state charged with a 
violation of its laws, but ignorant of ethical distinctions. 
The duty, then, of the state, as we see it, is to 
take up the work of ethical training at its very 
foundations, and make of the negro man or woman 
committed to its keeping what we have a right to
expect of children reared in an atmosphere of moral 
rectitude. It may be objected that this is not the 
purport of penal discipline, but such objection should 
have no weight. These people are the product of an 
environing civilization, which, though far from being 
satisfactory in achievement, has neglected to do its 
obvious duty by its inferior classes. The sole question 
is, Shall the state arrest depravity by moral culture, 
or engulf society by neglecting to instil in the 
minds of its citizens habits of sobriety, industry, and 
morality? Where these elements of character exist, 
crime is unknown; hence every measure which has 
for its object the substantial and effective reduction 
of crime must have root and foundation in the moral 
elevation of the individual. This can only be achieved 
by the inculcation of sound morality imparted through

</span></p><hr data-dcnode-id="2629"><a data-dcnode-id="2627" name="thoma221"><span data-dcnode-id="2628" instrument_node=""> Page 221</span></a><p data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">



righteous examples of living, healthful and wholesome 
surroundings, industrial training, and steady 
employment in youth and manhood. So much the 
social organism owes to its members. The eradication 
of crime will come, we may be sure, just in 
proportion as mankind becomes more rational in thought 
and moral in action, and submits to self-imposed 
restraints upon passion, cupidity, and other infractions 
of the Golden Rule.</span></p><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Fundamentally speaking, the congenital criminal 
class is rarely amenable to such reformatory agents 
as are aimed to effect a moral aversion to criminal 
acts. Negroes of this class can be restrained by fear, 
though whatever induces fear must be swift, inexorable, 
and certain. Nevertheless, while fear may and 
does secure their outward conformity to ordained 
requirements, it is entirely devoid of vitalizing 
regenerative force. To comprehend these conditions 
it is necessary to realize that to the negro mind the 
serving out of an imposed penalty fully pays all legal 
indebtedness to society for the infraction of its laws, 
much in the same respect that a financial debt may 
be liquidated by the payment of current money. 
With these facts before us, and aware that the great 
majority of the freedmen's misdeeds are limited to 
minor infractions of law, it is well to consider the 
degree of punishment which such crimes merit.</span></p><span data-dcnode-id="2621" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Broadly stated, the license of liberty has 
well-nigh destroyed in the crime-disposed freedman every 
vestige of law-abiding desire; hence, for some offences,

</span></p><hr data-dcnode-id="2618"><a data-dcnode-id="2616" name="thoma222"><span data-dcnode-id="2617" instrument_node=""> Page 222</span></a><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">



the negro should be whipped: he will respect the 
lash when he will respect nothing else. A judicially 
administered whipping, we are confident, would 
be an efficacious remedy for certain phases of negro 
crime, and would prove a wholesome deterrent to 
many who are criminally inclined. It would be 
opprobrious on account of its association with slavery, 
and the negro culprit, deservedly chastised, would be 
more amenable thereafter to law and social order 
than if he had undergone a long imprisonment. In 
fact, incarceration in jail may be said to involve no 
punishment for negroes, but rather gives to the idle 
and vicious desired rest, and in the eyes of their 
racial friends elevates them to the dignity of martyrs. 
We seriously advise, therefore, for many obvious 
reasons, the infliction of corporal punishment 
upon all freedmen who commit offences not subject 
to long terms of imprisonment. To those who know 
the negro, the merits of this proposition will be 
incontrovertible. He is an overgrown, irresponsible child, 
and must be treated as a wilful, untrained child 
should be; though for sound reasons of public policy 
all punishment calculated to render a culprit execrable 
should be inflicted in private.</span></p><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We hold no brief for the Southern white people, 
and have no unreasonable prejudice against the race 
with which, in color, we are identified. It is therefore 
in no partisan spirit that we enter upon the 
discussion of a phase of negro criminality which has 
attracted world-wide attention, and has to do with

</span></p><hr data-dcnode-id="2610"><a data-dcnode-id="2608" name="thoma223"><span data-dcnode-id="2609" instrument_node=""> Page 223</span></a><p data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">



those crimes against chastity alleged to be committed
by individual freedmen. No one denies that grave 
social conditions exist between the races, or that the 
established social organism ordains that, while the 
negro may assimilate with American ideas, he cannot 
perpetuate his barbarous instincts on American soil 
without engendering a war of extermination. These 
distinctions are not unreasonable. The negro is of 
a preëminently sensual race, and one whose male 
members have an inordinate craving for carnal 
knowledge of white women. This observation may 
be conclusively verified by noting the lascivious 
glances and wanton actions of negroes toward such 
persons, in public or private contact. This yearning 
of the negro for consort with white women is 
conspicuously exemplified in Northern cities, where the 
degraded social atmosphere of the submerged 
conditions permits an indiscriminate commingling of 
white and black viciousness. It is the absence of such 
conditions in the South, but of whose existence the 
freedman has full knowledge, that inflames negro 
desire, and impels the ignorant and bestial to commit 
felonious assaults on women of all ages and 
colors. Such facts make evident to thoughtful 
observers that our conceptions of the rights and 
remedies of the racial problem must be recast in the light 
of what the negro really is, before a permanent 
solution can be reached.</span></p><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Sound opinion is agreed that a forcible violation 
of the person of a chaste woman is an atrocious

</span></p><hr data-dcnode-id="2602"><a data-dcnode-id="2600" name="thoma224"><span data-dcnode-id="2601" instrument_node=""> Page 224</span></a><p data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">



offence of inexcusable malignity, and deserving of
rigorous punishment, and that race condition does
not detract from the enormity of a crime involving
so much sinister brutality. Men have a right to be
exasperated when wives, mothers, sisters, and daughters
are outraged and murdered by animal brutality,
and never in such cases is vengeance too urgent in
its demands for expiation and redress. Effective
methods of punishment should be instituted and
carried into effect with remorseless insistence. We
do not object to the killing of negroes or others who
actually commit rape. We object to the methods 
resorted to in these summary executions, which are 
likely, through engendering habit, to permeate society 
and make possible lawless civic conditions.</span></p><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2596" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;As white and black society is now constituted it 
is evident that negroes are certain to be lynched, 
especially in the South, when it is believed that they 
have committed criminal assaults upon white women. 
It is but fair to say that, so far as our knowledge goes, 
no one has ever been executed for this crime unless 
there was in existence strong </span><i data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">prima facie</span></i><span data-dcnode-id="2593" instrument_node=""> evidence 
of guilt. It is significant that, however horrible 
may have been the cruelties inflicted in some 
instances of summary punishment, decent negro 
innocence is never lynched for indecent acts. It is 
still more surprising, in view of the widespread 
asseverations of the innocence of negro victims, and 
the deserved denunciation of their murderers, that 
the freedmen have never engaged in any organized


225


attempt to bring well-known white lawbreakers to 
justice. They have neither procured warrants of 
arrest from examining magistrates, nor sought their 
indictment before grand juries, nor even undertaken 
to create a wholesome sentiment against Southern 
lawlessness. It cannot be said, in extenuation of this 
condition of affairs, that the freedmen are helpless 
and ignorant when the wealth and intelligence of 
their race is lodged in the South. The truth is, the 
freedmen know there are negroes, of a certain class 
who, bestial by nature and lascivious by breeding, 
are wholly lacking in self-restraint when their sexual 
instincts are aroused; that when opportunity 
offers they will, and do, commit criminal assaults 
on women and female children of either race. 
This fact is patent to every intelligent resident in 
the South.</span></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Since the representative freedmen, who are on
the ground and have full knowledge of all the facts
at issue, neither protest nor make public affirmation
that innocent members of their race are victims of
lawless summary executions, it would be well for the
negroes of the North who are bent on apotheosizing
their criminal brethren and execrating the white
avengers of chaste womanhood, to understand that
they are in no position to advise or to direct in this
matter. When they have spoken, they have not
only condoned actual crime, but advised lawless
retaliation in cases where known negro criminals
have been summarily punished. Such advice, it is

</span></p><hr data-dcnode-id="2588"><a data-dcnode-id="2586" name="thoma226"><span data-dcnode-id="2587" instrument_node=""> Page 226</span></a><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">



needless to say, is wanting in every element of 
common sense, and gives evidence that they are 
inferior to their Southern brethren in qualities of 
manhood. But lawlessness will not be suppressed by 
lawlessness. The law-abiding negroes of our Southern 
section, knowing their race criminals to be 
criminal from choice, and deserving neither defence 
nor pity, will never follow the revolutionary teachings 
of harebrained sophists, who, safe in their own 
section, are advising them to seek destruction through 
lawless retaliation. We are all agreed that illiterate 
degradation is a blight upon any community, and, 
when not eradicated by contact with civilization, it 
ought to be forcibly exterminated. How much more 
pernicious, then, must be the moral infamy of a 
people? Instead of counselling the negro to greater 
lawlessness, every effort should be made to endow 
him with self-respect and self-discipline in order 
that he may learn to repress his evil instincts and 
cease to commit crimes. We guarantee that, when 
he is taught to know and respect the rights of others
and is gifted with manhood and common sense, racial 
friction will cease, and lawless murders, so far as the 
negro is concerned, will end.</span></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Meanwhile, we are not to lose sight of the fact 
that the relation between the races is daily becoming 
more liable at any moment to precipitate actual 
hostilities between them. The gravity of the 
situation is further accentuated for the reason that the 
ignorant and credulous freedmen have no adequate

</span></p><hr data-dcnode-id="2580"><a data-dcnode-id="2578" name="thoma227"><span data-dcnode-id="2579" instrument_node=""> Page 227</span></a><p data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">



conception of their shortcomings. Devoid of 
discernment and sober judgment, they pose as the peers 
of their immediate white fellow-citizens, such is 
their colossal conceit, and are imbued with the 
belief that the people of the North stand ready to 
support and defend them in these pretensions. We 
have a well-founded belief that these disorders are 
amenable to corrective influences, and so far as 
negroes are related the process is simple. Lynching 
will stop when they cease to commit heinous crimes, 
and when the freed men and women who desire 
the confidence and esteem of their fellow-citizens 
set a higher estimate on morality and chastity. But, 
as the matter now stands, there is much in Southern 
social conditions that will not bear the light of 
criticism, and that too on the part of the freedmen, 
so low in many instances is the moral sense and 
self-respect of their teachers and preachers. While 
more might be said on this subject, one thing is 
evident: the moral regeneration and social transformation 
of Southern society, as represented by both 
races and sexes, is of imperative requirement before 
there can be any permanent erasement of social 
disorder in that section.</span></p><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;In dealing with negro criminality we must never 
lose sight of the fact that our freedmen are incapable 
of originating independent methods of living; 
that above everything else they are imitators pure 
and simple, and inevitably adopt the manners of 
those around them. Surrounded by a civilization to

</span></p><hr data-dcnode-id="2572"><a data-dcnode-id="2570" name="thoma228"><span data-dcnode-id="2571" instrument_node=""> Page 228</span></a><p data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">



whose control they are held in abject, if not willing, 
submission, they follow is a matter of course the 
example of their superiors in criminal knowledge. 
The depravity of the race is a result of environment, 
as well as of heredity and largely instigated by the
lawlessness of a resident white class, and it ought
to be evident that negro regeneration is out of the
question until the white race is elevated into orderly 
methods of conduct. How that shall be done is a 
serious problem, though it does seem as though the 
sober sense of the nation would some day awake to 
the folly of contributing hundreds of men and millions 
of dollars to doubtful missionary enterprises 
abroad, when so much misery and crime riot in our 
midst. A Christianity which ebbs and flows in 
carnal incongruities at home is hardly the proper 
custodian of the morals of alien races. It is a 
common-sense conclusion, that we should first right 
our own wrongs and correct our own abuses before 
undertaking to impose our civilization on others. 
These just remarks are deserved of a people who 
trample under foot the golden precepts of the divine 
Teacher, and who, without justice or mercy, 
wantonly inflict savage methods of punishment upon an 
ignorant and helpless class of cobelievers and 
fellow-citizens.</span></p><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is correct to say that fully ninety per cent of 
the freedmen are reasonably law-abiding, and, apart 
from an instinct for petty pilfering, are fairly honest 
in deportment. They have the confidence and support

</span></p><hr data-dcnode-id="2564"><a data-dcnode-id="2562" name="thoma229"><span data-dcnode-id="2563" instrument_node=""> Page 229</span></a><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">



of orderly white society, and are rarely molested 
by its lawless class. On the other hand, the most 
liberal estimate will not allow the negro criminal 
class to exceed ten per cent of the race, and, singularly 
enough, this is about the percentage that white 
lawlessness bears to the orderly people of the South. 
Each, however, is a constant menace to the community 
in which it exists and odious from sheer 
wantonness: one, because of the heinousness of 
lustful crimes; the other, by its lawless summary 
executions. It is not the number of negroes lynched that 
makes such acts execrable, for the annual summary 
executions are less than two hundred, but the fact 
that such lawless methods deny to the accused the 
exercise of his highest privilege,--a free and 
impartial trial before a legally constituted tribunal. Were 
this phase of lawlessness directed solely against 
criminal assaults on women, it might have a color 
of justification; but while that is the offence for 
which negroes are mainly lynched, there are not 
infrequently summary executions of them for murder, 
arson, and theft. Heinous and inexcusable brutalities 
have also been perpetrated upon this people for 
no other reason than their affiliation with the 
Republican party. A carnival of injustice and cruelty 
drove them from the domain of politics. Demoralization 
followed; and then a retributive justice brought 
disaster to those who were the chief instigators of 
the forceful exclusion of the negro from the political 
field.</span></p><span data-dcnode-id="2559" instrument_node="">
</span><hr data-dcnode-id="2558"><a data-dcnode-id="2556" name="thoma230"><span data-dcnode-id="2557" instrument_node=""> Page 230</span></a><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">
</span></p><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Lynching may be correctly described as the infliction
of summary punishment for alleged offences,
without authority of law; and there is among sane
