minds common agreement that such lawless violence
is an execrable usurpation of ordained legal functions.
As a mode of punishment for the freedmen
criminal class there is never under any circumstance
excuse or justification for resorting to it. It cannot
be said that it is to be approved by the best sentiment
of any community, yet when inflicted upon negroes
for the commission of certain crimes the perpetrators
are assured of absolute immunity from punishment.
No negro is likely to be legally acquitted in the
South of the charge of criminal assault, or in fact of
any heinous offence, when a strong presumption of
guilt exists. No negro charged with criminal assault
upon a white woman ever has been acquitted. Hence 
there is justification for the assertion that, so far as 
the white people are concerned, the impulse to 
indulge in mob brutalities arises from their low sense 
of accountability to law; that their lawlessness is 
the sequence of freedom from those restraints which 
obtain in law-abiding communities.</span></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Lynching is resorted to merely to appease and 
gratify an instinctive brutality on the part of a lawless 
element of the white race. No man can foresee 
the final results of such disorders. Nevertheless, it 
is evident that, if current individual usurpations of 
authority continue, all legal morality and social
obedience will cease, our civilization will be erased,

</span></p><hr data-dcnode-id="2548"><a data-dcnode-id="2546" name="thoma231"><span data-dcnode-id="2547" instrument_node=""> Page 231</span></a><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">



and barbaric methods will take the place of law and 
order. What the South needs is an enforcement of 
equitable law. Its mobs now exercise a tremendous 
discretionary power, of such far-reaching 
consequences as should make men pause in their 
madness.</span></p><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The question has been raised again and again as to 
why the national government does not take 
cognizance of local disorders, and use its authority for the 
suppression of lynching. But one familiar with the 
genius of our social organism will readily understand 
that constitutional limitations effectually intervene. 
The Federal government is limited to national interests. 
It is inhibited from taking cognizance of the 
acts of individual citizens except as they may become 
trespassers upon national rights. Under existing 
conditions, then, national functions can neither deal 
with white lawlessness nor cope with black criminals, 
and no enactment by the Congress of the United 
States touching this matter would have the slightest 
standing in the Federal judiciary. We do not doubt 
but that Congress has the constitutional right to 
enact a law for the trial and punishment of lynchers 
by United States courts when the victims of mob 
violence are aliens or non-resident citizens. In such 
cases, the responsibility of the Federal government 
for individual protection seems to be established. On 
the other hand, the state is supreme within its own 
domain, and has full and complete control over its 
citizens. No writ nor process of law can issue and

</span></p><hr data-dcnode-id="2540"><a data-dcnode-id="2538" name="thoma232"><span data-dcnode-id="2539" instrument_node=""> Page 232</span></a><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">



no action can be begun in a Federal court against a
citizen of a state unless the plaintiff is a resident of 
another state, or unless the alleged offence was 
committed against the United States. Personal wrongs 
are to be corrected and personal rights defended by 
that state within whose jurisdiction cause of action 
lies. If that state will not act on the complaint of 
its citizens or is powerless to enforce its decrees, the 
individual sufferer has no relief, so long as public 
sentiment is against him.</span></p><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This brief exposition of state and national duties 
and functions exhibits a phase of jurisdiction which 
ought to be eliminated from our civil polity. For, 
so long as these lawless conditions obtain, the 
character of our civilization is impeached, the stability of 
our institutions imperilled, the integrity of our 
judicial system questioned, and our social fabric brought 
to the verge of disrepute. Unquestionably, then, 
two grave and imperative duties are laid upon 
us: one is to eliminate usurpation of the law's 
prerogative, the other to suppress criminal assaults 
upon chastity,--for no social autonomy is secure 
that does not rest on the virtue and morality of its 
citizens.</span></p><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We recognize a disposition on the part of thoughtful 
men in the South to face this problem in an 
honest and righteous way,--men who are showing 
by words and acts that they not only feel a personal 
responsibility for lawless citizenship, but are using 
such means as lie within their power to rid their

</span></p><hr data-dcnode-id="2529"><a data-dcnode-id="2527" name="thoma233"><span data-dcnode-id="2528" instrument_node=""> Page 233</span></a><p data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">



section of so foul a stigma. To this better element 
of the Southern white people, grappling with a 
tremendous social problem, sympathy and help should 
be freely extended. While they have among their
own people a vicious and turbulent element, whom 
they are endeavoring to mould into respect for and 
obedience to law, they have also to deal with a negro 
class who are not only unresponsive to moral requirements, 
but are largely incapable of self-government. 
We are indebted to the sentiment they have aroused 
for the suggestion that there should be municipal 
liability in every county where sanguinary outbreaks 
occur, and adequate compensation awarded to the 
heirs of persons who are the victims of mob violence. 
It is also proposed that local municipalities should be 
held amenable to the state for failure to protect the 
life of the alleged criminal, as well as for failure to 
conform to the requirements of law in the punishment 
of the mob offenders.</span></p><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We are concerned chiefly with the cause which 
instigates sectional lawlessness, and our message to 
Southern civilization is to exterminate by law its 
lawless white element; at the same time, to 
exterminate at all hazards and at any cost the savage 
despoilers of maiden virtue or wifely honor, and do it 
so thoroughly that the inexorable, remorseless 
certitude of punishment will make the lives and persons 
of the women of the South as safe in field, forest, 
and public highway as in their private homes. Our 
interest in the public welfare has prompted us to

</span></p><hr data-dcnode-id="2521"><a data-dcnode-id="2519" name="thoma234"><span data-dcnode-id="2520" instrument_node=""> Page 234</span></a><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">



draft a measure for the correction of these evils, and 
one which we are gratified to know has received the 
approval of many of the leading publicists of the 
country. Its chief merits are the adequate 
safeguarding of all the rights of accused persons, the 
infliction of a penalty that would effectually deter 
others from committing like crimes, and the removal 
of all incitement to lawless usurpation of authority 
or justified excuse for its exercise. The punishment 
which we suggest for persons convicted by due 
process of law of criminal assaults upon women is an 
untried remedy, and the most that can be urged 
against it is that a heinous crime has a harsh 
punishment. Nevertheless, in the present abnormal 
condition of public morality, a measure of this kind 
cannot do otherwise than exert a wholesome 
influence on white and black society.</span></p><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is proposed that, when any male person of the 
age of fifteen or upward shall be charged with an 
attempt to commit an assault on a female person 
of any age or condition, with intent to violate her 
chastity and have carnal knowledge of her under 
duress and against her will, or upon the commission 
of such act, such person shall undergo an examination 
before a court of competent jurisdiction, and, 
upon conviction thereof, by due process of law, shall 
undergo emasculation, and be further subjected to 
such restraint as the nature of the case and the 
welfare of the community justifies. It will be observed 
that this proposition embraces deterrent features,

</span></p><hr data-dcnode-id="2513"><a data-dcnode-id="2511" name="thoma235"><span data-dcnode-id="2512" instrument_node=""> Page 235</span></a><p data-dcnode-id="2506"><span data-dcnode-id="2510" instrument_node="">



as well as punitive functions. One is as essential 
to the well-being of society as the other, and any 
measure which does not exert a restraining influence 
upon the vicious classes is of doubtful value. It 
may be that in actual operation the severity of this 
proposition might work occasional injustice to innocent 
persons. That, of course, must be a regrettable 
miscarriage of justice. But such a remote 
possibility should not prevent a resort to heroic 
methods in dealing with the outlawries of our 
civilization. On the other hand, the lawless and 
barbarous methods of </span><i data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">ex parte</span></i><span data-dcnode-id="2507" instrument_node=""> criminal procedure now in 
vogue, and bound to continue unless suppressed by 
orderly judicial methods, can never be approved even 
as crime deterrents. For, if current reports are to 
be trusted, felonious assaults on female chastity 
multiply in inverse ratio to the severities inflicted on 
the offenders.</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;All law-abiding people prefer that retribution for 
crime shall be judicially and legally decreed. The 
merit of the above suggestion lies in the fact that it 
substitutes orderly procedure for private passion and 
revengeful force. Were it in force, such acts would 
not be committed, unless instigated by sheer wantonness. 
Observe that accusations of criminal assaults 
on women are to be sifted in private before a properly 
constituted tribunal. Where the guilt of the accused 
is established, the culprit is by surgical methods to be 
rendered incapable of repeating the act. The prime 
object of legal punishment is to avenge society and

</span></p><hr data-dcnode-id="2502"><a data-dcnode-id="2500" name="thoma236"><span data-dcnode-id="2501" instrument_node=""> Page 236</span></a><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">



deter others from committing like offences against 
social order, and both of these ends are compassed in 
this proposition. Moreover, our knowledge of negro 
nature convinces us that one living example of 
judicial emasculation would be worth, as a deterrent 
object-lesson to the race, a thousand summary executions 
of appalling barbarity. There are negroes who 
commit unspeakable offences, and will do so as long 
as such crimes are not made odious, and vice and 
virtue cleft asunder by a chasm of spanless width.</span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2496"></p><hr data-dcnode-id="2495"><a data-dcnode-id="2493" name="thoma237"><span data-dcnode-id="2494" instrument_node=""> Page 237</span></a><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">CHAPTER IX</span></h3><span data-dcnode-id="2488" instrument_node="">
</span><h3 align="center" data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">MENTAL TRAINING</span></h3><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;THE American system of free public instruction, to 
which we owe that general diffusion of knowledge so 
characteristic of Northern people, had its origin in 
New England. The Puritans bequeathed an inestimable 
legacy when they instituted free schools in the 
struggling colonies, and gave to an embryo nation 
institutions of higher education. We are also indebted 
to that fearless people of rugged virtues and stern 
morals for many of the best phases of our social 
development, and Puritan influence is conspicuously 
visible in those lofty national impulses which regard 
knowledge and wealth as instruments of beneficent 
service to humanity.</span></p><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2481" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The present school system of the South may be
fairly designated as a visible landmark of </span><i data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">post bellum</span></i><span data-dcnode-id="2478" instrument_node="">
reconstruction and legacy of Republican administrative
control. Previous to that period, the public
school, though a recognized institution in most of
the Southern states, had but a fitful existence and
meagre support,--chiefly because the children of the
wealthy class attended private schools. The poor
whites were indifferent to learning, and to teach the
blacks, free or slave, was a crime. As it now exists,

</span></p><hr data-dcnode-id="2476"><a data-dcnode-id="2474" name="thoma238"><span data-dcnode-id="2475" instrument_node=""> Page 238</span></a><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">



the Southern school system is inferior in achievement 
to the Northern. The cost of public instruction is 
increased by the requirement of separate teachers and 
buildings for the white and negro children. Moreover, 
as the cities alone have really efficient schools, 
dense ignorance abounds among both classes of 
children in the rural districts. The Southern negro
children of school age aggregate 2,800,000, yet only 
about half of that number are enrolled in the public 
schools, and of those registered less than three-fifths
are in constant attendance. That there are gross
defects in the current school system is evidenced by 
the fact that, since 1868, the Southern states have 
raised by taxation, and expended for negro education, 
nearly $100,000,000 without making 
any visible inroad on negro illiteracy,--or rather, we should 
say, on negro obtuseness; for many of the freedmen 
who read and write are incomprehensibly lacking in 
intelligence.</span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The gravity of the Southern illiterate situation has 
attracted wide attention, and many plans have been 
suggested for bettering it; among others, national aid 
for the education of the negro and other illiterate 
citizens has been from time to time suggested. Of 
course, we are familiar with the constitutional objections 
which have been raised to Federal interference 
in matters of this sort, notwithstanding it is admitted 
on all sides that illiteracy is a menace to republican 
institutions. We, however, believe it to be the imperative 
duty of a free government to provide ways and

</span></p><hr data-dcnode-id="2468"><a data-dcnode-id="2466" name="thoma239"><span data-dcnode-id="2467" instrument_node=""> Page 239</span></a><p data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">



means for an intelligent instruction of its citizens; 
and that this essential and true function of government 
cannot be evaded without imperilling the 
foundations on which our institutions rest, viz. an 
intelligent consent of the governed.</span></p><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Two distinct and antagonistic forces are engaged 
in attempts to enlighten the freedmen; one is civic, 
the other sectarian, in management and influence. 
The one under municipal supervision imparts instruction 
in studies ranging from the lowest primary to 
the highest academic, and in time service ranges 
from two to nine months a year. The state institutions 
devoted to advanced negro learning, and classified 
as high schools, normal institutes, and colleges, 
are, so far as we have been able to ascertain, 68 in 
number. The students in annual attendance upon 
them will not fall far short of 18,000, four-fifths of 
whom must be reckoned as pupils of the city high 
schools.</span></p><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The Southern negro schools under sectarian 
control comprise 22 universities, 31 colleges, 26 normal 
schools, 23 institutes, 15 academies, and 12 seminaries. 
They have an estimated value of eight millions, and 
a reported annual income of $850,000. The latest 
statistics, which are here given in round numbers, 
show the student attendance to be in collegiate, 
professional, and normal courses, 8000; in intermediate 
grades, 16,000; in elementary grades, 28,000; those 
engaged in industrial studies are put at 17,000. These 
statistics, we caution, are not to be implicitly trusted,

</span></p><hr data-dcnode-id="2457"><a data-dcnode-id="2455" name="thoma240"><span data-dcnode-id="2456" instrument_node=""> Page 240</span></a><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">



for, although furnished by those in control, they are
nevertheless inaccurate in details, and altogether 
misleading in many other very important respects. One
significant feature not likely to escape notice is that,
notwithstanding their high-sounding titles, all of these
institutions are chiefly engaged in primary work, and 
appear to be attempting to do what the public schools 
are doing.</span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The instruction of the freedmen was first undertaken 
in the fall of 1861, under the guidance of many 
noble, self-sacrificing white men and women from the 
North, who unfortunately began their labors under 
the false notion that their negro pupils, with centuries 
of mental density behind them, should be taught 
by the same methods and along the same lines as 
Northern white children of intelligent ancestry 
environed with more or less cultured homes. The 
result has been that a series of misfortunes have 
ensued, all too apparent to intelligent and impartial 
observers. The chief blunder, however, and the one 
which has inflicted lasting harm upon the freedmen, 
was committed when religious bigotry and sectarian 
rivalry, casting aside all notions of the negro's 
welfare, decreed his ethical and mental spoliation. This 
conclusion is obviously just; for when the war ended 
and reconstruction began, there sprang up all over 
the South sectarian universities, colleges, academies, 
institutes, and seminaries, in name, but not in 
efficiency, and which have since proved a delusion and 
snare to the cause of enlightenment.</span></p><span data-dcnode-id="2449" instrument_node="">
</span><hr data-dcnode-id="2448"><a data-dcnode-id="2446" name="thoma241"><span data-dcnode-id="2447" instrument_node=""> Page 241</span></a><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">
</span></p><p data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To test the correctness of the foregoing statement, 
we need only refer to the fact that Atlanta, Georgia 
has 7 negro institutions of learning; Nashville, 
Tennessee, 4; and New Orleans, Louisiana, 4; and that 
out of these 15 institutions, the Congregationalists 
control 4, the Baptists 4, and the Methodists 5 
schools, with all of them constantly engaged in a 
factional warfare for supremacy in influence and 
patronage. An analysis of the latest statistics of these 
several institutions conclusively substantiates our 
contention that academic training for the negro masses 
at this stage of their development, is detrimental to 
the best interests of the race.</span></p><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Observe that 8 of these institutions are set down 
as universities, 3 as colleges, 3 as seminaries, and 
1 as an institute. They report 232 teachers, of 
whom 148 are white, and their combined attendance 
of students is put at 4112, of whom 2835 
are engaged in elementary common school branches. 
Their undergraduates number about 1265, though less 
than 50 are annually graduated. A closer examination 
into this subject shows that all of these institutions 
are located in cities having excellent common 
school facilities, and that, out of the 4000 students 
in attendance, nearly 3000 are engaged in those 
elementary studies that the public schools teach. The 
irresistible conclusion is that these denominational 
colleges and universities are wasting a wealth of 
energy to no good purpose. To nine-tenths of 
negroes such academic attendance is a senseless

</span></p><hr data-dcnode-id="2438"><a data-dcnode-id="2436" name="thoma242"><span data-dcnode-id="2437" instrument_node=""> Page 242</span></a><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">



waste of time, for few of those who enter these 
institutions complete the prescribed course.</span></p><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The fundamental objection to current methods of 
negro education is that existing institutions breed and
foster in the minds of their students false notions of 
the intent and purpose of a college training. This 
is made evident by the fact that negro students are
known to spend their time in skimming their textbooks 
without acquiring any adequate conception of
what their contents teach, but are fixed in the belief
that mere attendance at the school confers distinction. 
Such cases are not rare. We have knowledge 
of scores of young men and women with diplomas 
from negro colleges, and of many undergraduates 
engaged in Latin and Greek studies, who cannot 
without great difficulty read plain English print, and 
whose current speech betrays their ignorance of, or 
indifference to, the simple grammatical construction 
of their mother tongue. Moreover, nowhere is the 
arrogance of ignorance and paucity of knowledge more 
exemplified than in these college attendants, whose 
silly vaporings provoke the contempt of sensible 
people.</span></p><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Many rural freedmen have deprived themselves of 
the necessaries for living in order to support a son or 
daughter at some distant college in the hope of better 
things to come, only to discover later that their 
educated children were no longer in sympathy with 
humble parentage. Their hearthstone was forgotten 
and ties of kinship broken, when the college egotist,

</span></p><hr data-dcnode-id="2427"><a data-dcnode-id="2425" name="thoma243"><span data-dcnode-id="2426" instrument_node=""> Page 243</span></a><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">



sensational in speech, extravagant in manner, ignoble 
in aims, and ignominious in ends, went forth from a 
community which had looked to him for inspiration 
and guidance because his opportunities for knowledge 
were greater than its own. Another lamentable 
outcome of these conditions is that the South is 
being overrun with incompetent teachers, incapable 
lawyers, illiterate doctors, and immoral preachers, 
who rival each other in preying on the credulity 
of a confiding constituency.</span></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It ought to be clear to every intelligent mind
aware of these facts, that any mechanical knowledge
of books imparted to men and women condemned to
inexorable poverty merely opens their eyes to wants
that can never be met, and to a sphere of living
they can never enter. Are not desires impossible to
gratify awakened, social contrasts discovered, and a
material longing aroused that is destined never to be
gratified other than in iridescent dreams? To take
men from the plough, and women from the hoe, and,
by a sham process of enlightenment, transform them
from actual producers into idle consumers, is to
foment infinite mischief. Far better for them and
the race that they should till small plots of ground,
have homes, rear families, and live in comparative 
ignorance, than to undergo a brief existence in what is
none other than a fool's paradise of specious learning.</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But, while facts fully justify our exhibit of the 
mental characteristics of the negro, no sane person 
believes him to be solely blamable for his mental

</span></p><hr data-dcnode-id="2416"><a data-dcnode-id="2414" name="thoma244"><span data-dcnode-id="2415" instrument_node=""> Page 244</span></a><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">



density. Under the methods employed for his 
enlightenment, it would have been surpassingly strange 
had he emerged therefrom in any other plight than 
he has. It is therefore with good reason that we 
assert that the fatuity of race educational sponsors is 
largely responsible for the mental and moral blunders 
of our educated negroes. Nor is there the slightest 
doubt that false notions of the functions of school 
training are responsible for much that is amiss in 
many phases of race life. The negro has been taught 
to believe that his mental powers are merely hidden 
in darkness, that schools are bound to bring them to 
light, and that attendance on schools educates; and 
that education is the ability to state, more or less 
correctly, prescribed phrases.</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The belief that such "education" really awakens 
any and every sort of mind is widespread among 
illiterate classes, and is strengthened by the fact that 
negroes seem ready to acquire knowledge, when
they are learning nothing but words. Negroes,
therefore, imagine they know a subject-matter when
they have acquired its terminology. Facile speech
gives them credit for knowledge which they do not
possess nor are likely ever to acquire. Intelligent 
conception, reflection, comparison, and judgment are 
largely absent from their mental outfit. Most of the 
race who undergo such methods of mental training 
are ignorant of every fundamental principle of life 
and living. But how could it be otherwise, when 
the drowsy energies of the brain are not awakened

</span></p><hr data-dcnode-id="2408"><a data-dcnode-id="2406" name="thoma245"><span data-dcnode-id="2407" instrument_node=""> Page 245</span></a><p data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">



to intelligent action nor the how and why of things 
ascertained.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Our objections to the results attained by the average 
college training of the freedmen are well sustained 
by the mischievous policy of leading negro educators, 
but as this does not cover the whole ground, we shall 
consider other equally important features. At the 
beginning of his free career two fundamental obstacles, 
blinding, bewildering, and insurmountable, were thrust 
in the pathway of the freedman. One was partisan 
politics, the other sectarian education. Each still 
clutches him with a remorseless grip, and what the 
outcome will be no man can foresee. One thing is 
evident, with all our innumerable agencies and reformatory 
devices, we are not making headway in the 
regeneration of negro mankind. While the 
school-taught generation of negroes has acquired a veneer 
of intellectual superiority over their unlearned fathers 
and mothers, they have neither their strength of 
character nor sincerity of purpose, and are immensely 
below them in sober conduct and enduring worth.</span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No broad scheme for the solution of these educational 
difficulties has ever been broached by those 
essaying to direct affairs. To us, however, it does 
seem feasible that all Southern negro educational 
agencies might unite in some sort of federative 
union for common warfare against ignorance and 
immorality. In fact, were personal ambition and 
sectarian folly set aside, it would be possible to 
institute a rational method of negro education,

</span></p><hr data-dcnode-id="2397"><a data-dcnode-id="2395" name="thoma246"><span data-dcnode-id="2396" instrument_node=""> Page 246</span></a><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">



wherein each state would have one well-equipped 
college, with efficient preparatory schools established 
in each county. The means of knowledge would 
thus be brought within reach of all classes, and we
should have uniformity in method of instruction.</span></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Institutional rivalry develops reprehensible methods 
for securing support and attendance. In many 
instances, in order to obtain students, free tuition is 
given and personal maintenance tendered, to which 
end donations are secured from the philanthropic 
North. This may be legitimate, but our conviction
is that no institution of learning which is dependent
upon public charity for its own existence and the
maintenance of its students, can by any process of
educational legerdemain impart to those whom it
undertakes to instruct a robust manhood or 
womanhood. An endless chain of financial dependence
runs all through its educational methods, and both
teachers and students are, by the storm and stress
of circumstances, compelled to assume the position
of subservient mendicants. This attitude, in the
case of negro students, breeds infinite mischief;
for, dependent by nature on others, they sink into
abject helplessness in becoming the beneficiaries of
sentimental support.</span></p><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To make a plain and candid presentation, many of 
the educators of the negro are neither honest in 
statement nor courageous in act in their effort to get 
money from the Northern people, and in exalting
themselves at the expense of their rivals they set

</span></p><hr data-dcnode-id="2386"><a data-dcnode-id="2384" name="thoma247"><span data-dcnode-id="2385" instrument_node=""> Page 247</span></a><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">



up pretensions which have no foundation in fact. 
Especially are those claims reprehensible which 
imply that any particular negro school is essential 
to the welfare of the freedmen. Any honest investigation 
will show that there is no preëminence among 
the hundred and more fairly respectable negro 
institutions of higher learning, each of which is doing 
all that is possible under existing methods for the 
enlightenment of its pupils. Such pretensions to 
superior usefulness appear ridiculous when we 
consider that there are within the United States more 
than 35,000 negro graduates of various institutions 
of learning, though it cannot be said that their 
education has transformed them into teachers of 
righteousness and prophets of wisdom. The fundamental 
question, touching alike the usefulness of 
schools and pupils, is, What have these graduates 
contributed toward the regeneration and enlightenment 
of their people? This is a question that 
distant benefactors may rightly ask; and the more 
than $30,000,000 which they have given for the 
enlightenment of negroes since their emancipation 
entitles them to courteous and candid answers.</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;While our statements concerning Southern negro 
schools and their methods of education will in the 
main hold true of all, it is a genuine pleasure to us, 
and but simple justice to a worthy institution, to 
make an exception in the case of Berea College. 
This school, which is located in Kentucky, on the 
border line between the Blue Grass region and the

</span></p><hr data-dcnode-id="2378"><a data-dcnode-id="2376" name="thoma248"><span data-dcnode-id="2377" instrument_node=""> Page 248</span></a><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">



mountains in the eastern section of that state, enjoys 
the unique distinction of being the only institution 
in the South which admits white and colored 
students in any considerable number. Its average 
annual attendance, exceeding four hundred pupils, is 
about equally divided between the sexes and races, 
all of whom sit together side by side at a common 
table, and recite in the same classes.</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Berea College ranks as the pioneer school in 
Southern negro education; but, what is of far greater 
importance, it has also practically and successfully 
solved the problem of the coeducation of the races, 
not only for that state but for the entire South, and 
it is a matter of profound satisfaction to state that 
not a single case of misalliance has followed this 
experiment. On the contrary, a wholesome restraint 
and marked respect is shown by both races in their 
mutual intercourse, and the effects here noted are 
exerting a healthy and increasing influence elsewhere 
upon the Southern educational work.</span></p><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This institution of which we have made mention 
has had a corporate existence for more than forty 
years, and owes its inception and success to the 
indefatigable labors of Rev. John G. Fee and his worthy 
associates in the home mission service. It was 
primarily established for the educational wants of the 
white mountain people of the South, whose poverty 
and ignorance at that period held them in subjection 
and chattelism to a near-by oligarchy, but whose 
growing millions may yet become an important factor in

</span></p><hr data-dcnode-id="2367"><a data-dcnode-id="2365" name="thoma249"><span data-dcnode-id="2366" instrument_node=""> Page 249</span></a><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">



American patriotism and civilization. The mountains 
and valleys of Virginia, North Carolina, Kentucky, 
Tennessee, Georgia, and Alabama shelter the 
cabins of the most unique class of illiterates on the 
American continent, and furnish the most profitable 
field for humanitarian effort within the whole range 
of Christian endeavor. Nor will philanthropy ever 
bestow a worthier benefaction than that which shall 
bring to these people light and knowledge.</span></p><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have spoken in terms of commendation of the 
results of co-race education at Berea. Nevertheless 
we should not approve, even if it were possible to 
effect it, mixed school education throughout the 
South, for at this time neither race is prepared to 
enter upon so hazardous an experiment. But, as all 
things come to those who work and wait, we should 
in the meantime use all diligence and discretion in 
training the negro into docility, sobriety, intelligence, 
and morality, against the day of his inheritance of 
every right and privilege of American citizenship.
</span></p><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Before proceeding farther it may be well to define 
our understanding of the term education. Our 
conception is that education is not an accumulation of 
facts, but an attitude of mind, a mental poise, that 
imparts to its possessor the power of knowing how 
to know. Stored mental facts, while an essential 
and the chief element in successful human endeavor, 
differ as widely from education as flower from 
fruitage. Education, in the true sense, is the development 
under sound discipline of all our faculties,

</span></p><hr data-dcnode-id="2356"><a data-dcnode-id="2354" name="thoma250"><span data-dcnode-id="2355" instrument_node=""> Page 250</span></a><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">



mental, moral, and physical, to the end that knowledge,
capacity, fitness, and completeness may be
embodied in the learner. In support of this position
we may quote no less an authority than President
Eliot of Harvard University, who, in speaking of
mental development, says, "There are four things in which the individual youth should be thoroughly trained, if his judgment and reasoning powers are to be systematically developed, and those four things are observing accurately, recording correctly, comparing, grouping, and inferring justly, and the ability of expressing the result of these mental apprehensions in cogent, coherent language." Nothing less than a training of this character will endow the negro with intelligence.</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This being our view of what education is, we shall seek to ascertain to what extent the negro is amenable to its teachings. When the negro is for the first time brought under intellectual instruction, we
are impressed with his mental and moral obtuseness. We observe no intelligent awakening of his slumbering reason, no manifestation of mental activity, and we discover that his apparent intelligence is a superimposed outfit. Inquiry into the causes which produce this state of mind reveals the fact that negro intellect is abnormally constituted, and rarely evinces other than sluggish response to intellectual promptings. Such disclosures enable us to understand why the negro is deficient in strong mental power, and why, with all his scholastic training, he

</span></p><hr data-dcnode-id="2348"><a data-dcnode-id="2346" name="thoma251"><span data-dcnode-id="2347" instrument_node=""> Page 251</span></a><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">



has never attained profound erudition nor given proof of originality in thought. The educators of the freedmen may be honest in belief, but they are mistaken in fact, whenever they assert that negro
students understand and assimilate the ideas and moral principles set forth in their teachings. We can easily comprehend how such teachers may be
deceived by the mental retentiveness or memory of the negro, his clever imitations, and fluent speech.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What we desire to have clearly realized is that the freedman, who is bred in mental stupor and reared in moral insensibility, cannot be awakened to efficient intelligence by any system of superficial
instruction, a fact that holds true throughout every stage of negro development. For example, the child of the ordinary freedman is from birth enveloped by
a home life of credulous darkness; mental distortions are its inheritance, and weird superstitions its acquirements,
both of which are ingrained in a nature that instinctively resists rational thought and sober action. Therefore, when a child of this sort appears in the
schoolroom, the honest teacher faces a twofold problem: one is to uproot false notions obstinately
inhering; the other, to awaken thought in the mind of a being to whom every mental step is a puzzle
and every new notion a bewilderment. There is also an ever present consciousness of the danger of hopeless relapse, when the pupil passes from the radiance of the schoolroom to the twilight of the fireside. Since all educators of the freedmen find among their

</span></p><hr data-dcnode-id="2340"><a data-dcnode-id="2338" name="thoma252"><span data-dcnode-id="2339" instrument_node=""> Page 252</span></a><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">



students these mental conditions, it is obvious that the character of the instruction given ought to conform
to actual needs, regardless of preconceived
notions or accustomed methods of instruction. We
should deal with negro necessities; for the present,
in education as in material things, he can forgo
luxuries.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The negro student, then, should be taught to read
with discrimination as well as to know the art
and function of legible writing. A capable knowledge
of the fundamental principles of arithmetic are to him
a necessity. Moreover, his obvious deficiencies in
speech, in private and public conversation, render it
needful that he should have a thorough understanding
of the elements of grammar. And equally
important is his intelligent comprehension of the
geography and history of his country. None of these
should be neglected. But what he needs even more
is sound instruction in ethics and civics, in order that
he may have a just appreciation of his relation
to God and his fellow-men. As for any higher instruction,
the biography of noble men will awaken in
his breast worthy sentiments, and instill in his nature courageous desire. A knowledge of music will
calm his turbulent emotions and awaken spiritual longings which an enlightened reason will soberly
foster. Thus disciplined, he will become in due course an exemplary and worthy citizen.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The matter of training the negro in the ancient classics should be divested of all bigotry and ignorance,

</span></p><hr data-dcnode-id="2329"><a data-dcnode-id="2327" name="thoma253"><span data-dcnode-id="2328" instrument_node=""> Page 253</span></a><p data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">



and dealt with in a spirit of fairness to all interests involved. We should consider that the Southern negro student inherits poverty and is environed by ignorance, and that a limited classical training breeds in him exaggerated notions of his scholarship and pedantic satisfaction with his scant attainments. For many sound reasons, it is madness for negroes who are ignorant of the essential principles of manhood or character to prowl round ancient cemeteries of literature, and pretentiously haunt the mausoleums of dead thought, while millions of their brethren are sitting in darkness and in the shadow of death. For our part, we regard a knowledge of the classics as one of the luxuries of literature, whose acquirement is not necessary to the busy life of our century; and especially do we look upon the acquisition of these tongues as useless to a people whose rudimentary intelligence has not awakened to needs pressing in more important directions.</span></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Within the whole range of negro scholarship we know of no one who would not be infinitely better qualified for rendering efficient service to mankind, did he, instead of having an elementary knowledge of the classics, possess an intelligent knowledge of the English language, and a substantial acquaintance with what it contains. A language which is known to be the vernacular of well-nigh a hundred and sixty millions of the foremost people on the face of the earth, and voices a literature of value and permanence beyond that of any other in the world, ought

</span></p><hr data-dcnode-id="2321"><a data-dcnode-id="2319" name="thoma254"><span data-dcnode-id="2320" instrument_node=""> Page 254</span></a><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">



to be assiduously studied; and to be ignorant of its treasures is to stand in the twilight of the most transcendent mental illumination accessible to modern man.</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We say, educate the negro by all means, deeply,
broadly, and thoroughly, but do not waste time and
means on promiscuous effort. The force of this suggestion is manifest when we consider that not one
negro in a thousand has sufficient mental or moral
stamina to take sound scholastic training, or live
to the full measure of to-day's opportunities and
loyally meet obligations of racehood. Hence, dealing now with the realities of life and knowledge, our
insistence is that none but negro men and women of inherent worth, of whom there are not a few, ought to be selected or permitted to take an academic training,
and especially at the expense of the generous
public. The requirement that we would impose is
that all negro students, before being permitted to
engage in classical studies, should undergo a judicious and discriminating investigation as to character, capacity, and contemplated vocation; and
that only those who give ample proof of possessing
all of the required qualifications should be trained in higher educational methods. To be sure, sound judgment and discriminating insight into negro characteristics would be essentials for those who undertook
the task of assorting the deserving from the undeserving among the freed people. But, however onerous the burden, this ought to be done, if wholesome

</span></p><hr data-dcnode-id="2313"><a data-dcnode-id="2311" name="thoma255"><span data-dcnode-id="2312" instrument_node=""> Page 255</span></a><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">



race development is sought. The fatuous methods employed in their instruction become more and more censurable when one considers the loss of time, waste of means, and neglect of opportunity to the negroes of restricted abilities, and when one acquires a clearer insight into the character of such training. But, despite sane protest, and notwithstanding the futility of these so-called classical educational methods, they are likely to continue so long as misinformed philanthropy can be induced to continue its rash generosity. To our negro educators and Northern benefactors we commend this bit of philosophy, uttered by a shrewd, commonsense member of the race,
"There is no use in wasting a thousand-dollar education on a ten-cent brain."</span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The chief concern in training the freedmen should be the endeavor to impart knowledge under such genuine inspiration as will awaken aspiration, stimulate desire of knowledge, quicken apprehension, strengthen purpose, and develop negro character in harmony with the truths of life and nature. Education, as Herbert Spencer says, "should not teach men how to live, but how to deal justly with one another," and surely the negro, above all others, needs the clear sunlight of wise discernment, a strong basis of moral rectitude, a right discipline of instinctive habits, and a true sense of the requirements of domestic life, in order that he may know the rights of others as well as his own obligations, and gain the conviction that self-knowledge, self-control, and self-reverence is the fulcrum of all power and the gateway to all truth.</span></p><span data-dcnode-id="2305" instrument_node="">
</span><hr data-dcnode-id="2304"><a data-dcnode-id="2302" name="thoma256"><span data-dcnode-id="2303" instrument_node=""> Page 256</span></a><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">
</span></p><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This, however, is not the kind of education the freedmen are acquiring, in the schools and out of them. There is among negroes of intellectual pretensions the disposition to regard deftness in verbal gymnastics as the highest type of scholastic achievement, notwithstanding the fact that fluency in speech is no assurance of knowledge, and that mere words, without the breath of life upon them, have never yet awakened the soul of man. Hazlitt truly says, "Mere intellectual endeavor, however keen-witted, and sharp-edged in expression, is the meanest of human faculties when stripped of all vital humanizing power, and represents nothing more than an ingenious piece of mental machinery." There is a world of wisdom in this utterance. But ignorance is a bigot, and its negro disciples, heedless of facts, cling with stolid indifference to the notion that words and not ideas constitute intelligence. The negro is the adult infant of our composite society, who, wanting in wholesome thought and prudent conduct, has been surfeited with sentiment, bewildered by precepts, and crazed by flattery, until he believes himself to have passed at one bound from the depths of ignorance to the summits of knowledge. We may concede the good intentions of his educators but we deplore their mistakes. Their persistent blundering emphasizes our conviction that from the cradle to the grave the freedman sadly needs the strong hand and firm guidance of educated, God-fearing men and women, who, for conscience' sake, teach him truth and righteousness.</span></p><span data-dcnode-id="2297" instrument_node="">
</span><hr data-dcnode-id="2296"><a data-dcnode-id="2294" name="thoma257"><span data-dcnode-id="2295" instrument_node=""> Page 257</span></a><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">
</span></p><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Are the negroes aware of the inadequacy of their educational methods?--if so, why do they not institute some substantial protest within their own ranks?--are questions which naturally occur to thoughtful people interested in the freedmen's welfare. The answer to these questions must be that negroes to whom race leadership is accredited have shown a general incapacity for dealing intelligently with the great problems growing out of their race economy. There is no substantial reason for believing them conscious of the defects in their mental training. To assume otherwise would credit them with an understanding wholly at variance with their acts. We must also remember that the negro did not originate the system of instruction under which he has been trained, but took without choice that which was thrust upon him by those who were utterly ignorant of his actual needs. Still, there are some things that might have been done, and which negroes have omitted to do.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The recognized race leaders of the freedmen are their preachers and teachers. That these leaders are indifferent to race degradation, know nothing of disinterested service, and have no conception of robust integrity and steady obedience to truth and duty, is inferred from the fact that more than twelve thousand negro preachers are in the Southern states, engaged, in the main, in leading idle, if not vicious, lives. If these men were filled with an honest purpose to serve their people, they would, it seems, at

</span></p><hr data-dcnode-id="2286"><a data-dcnode-id="2284" name="thoma258"><span data-dcnode-id="2285" instrument_node=""> Page 258</span></a><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">



least have taught their ignorant followers how to read the Bible about which they prate, and have accomplished the infinite good that might have been wrought, had every church been transformed into a temple of learning. Had that course been pursued, negro illiteracy would now have been a thing of the past. But, despite earnest and disinterested appeals to them, that was not done, nor even attempted. We therefore make no reservation in the assertions that the religious leaders of the race have never given a whole-hearted support to its education, and that they are directly responsible for the race's present ignorance, as well as for some other phases of its degradation. The number of negro illiterates, young and old, exceeds three millions: and this mass of servile ignorance is convincing proof that the religious leaders are more intent on promoting their selfish ease, than in rendering unstinted service to the cause of human enlightenment.</span></p><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Under common-sense management the religious organizations controlled by negroes are capable of rendering excellent service to the cause of education. So far they have taken no steps to supplant their illiterate priesthood with an educated ministry. In the work in which they do engage they persist in undertaking impossible achievements. Their several societies claim to have in operation some sixty odd schools, many of which are reported as universities and colleges, but which by their own exhibit are without adequate support or capable management,

</span></p><hr data-dcnode-id="2278"><a data-dcnode-id="2276" name="thoma259"><span data-dcnode-id="2277" instrument_node=""> Page 259</span></a><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">



and which make a ceaseless demand upon the scant resources of a deluded people. In order to lure means and students for their nondescript institutions, the mendacious claim of non-sectarian teaching is set up, notwithstanding none but sectarian leaders of the most bigoted type are in the seat of government, while the one great cardinal dogma, jealously guarding the ramparts of their belief, is that "He who is not with us is against us." It may be pertinently questioned why these schools are established and maintained, if not in the interest of and for the propagation of sectarian thought. Besides, these negroes ought to know that there does not exist non-sectarianism within denominational religious economy.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But, while the negro is known to be crassly ignorant, and confessedly on the lowest rung of American social development, he is not to be accredited with insurmountable mental density. What we have said, and do say, is that the agencies so far employed for his enlightenment have failed to awaken in him a spirit responsive to the civilization that environs him. On the other hand, we are convinced that, were the right means employed in negro training, his moral and mental nature would unfold in accord with the best impulses of the age. And we are not without hope that both negro pupils and their teachers may gather inspiration from the trend of the newer educational movements, and bring themselves into agreement with methods whose tide is toward practical

</span></p><hr data-dcnode-id="2270"><a data-dcnode-id="2268" name="thoma260"><span data-dcnode-id="2269" instrument_node=""> Page 260</span></a><p data-dcnode-id="2263"><span data-dcnode-id="2267" instrument_node="">



achievements. The aim of the best expressions of current educational work is, not to make scholars, but to make men and women. To that end the physical senses are trained in connection with the intellect to a point where the one supplements the other, in a common effort to lead from slumbering depths, into form and being, the ideas and faculties innate and inherent in human nature. This process does not crowd the memory with fact and data gleaned by other hands, nor cram the mind with opinions formulated </span><i data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">ex cathedra.</span></i><span data-dcnode-id="2264" instrument_node=""> It does, however, develop natural faculties and physical endowments. The acquisition of knowledge is of secondary consideration, and bound to come, under any circumstances, in proportion as the intellect is broadened through observation. But to bring out and utilize in the highest measure the most valuable qualities of the head, the heart, and the hand, and the consecration of these functions to the reverence and obedience to God and the love and service of humanity, is, in our judgment, the realization of the ideal education.</span></p><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Before the time of Christ the Greek philosophers asked, "What shall we teach the young?" and the answer then, as it ought to be now, was, "Teach them what they will have to do when they are men." We have here the hint and key for the instruction of the negro,--for whom the system of education should be primary and fundamental, and every step forward verified by actual proof of the intelligent discernment of the pupil. To this end, the best and most profitable

</span></p><hr data-dcnode-id="2259"><a data-dcnode-id="2257" name="thoma261"><span data-dcnode-id="2258" instrument_node=""> Page 261</span></a><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">



elementary instruction for illiterate and submerged classes like the negroes is, in our judgment, that which begins with what well-conducted kindergartens teach. We say this for the reason that children, coming from slovenly and disorderly homes, will there be taught to be deft of hand, gentle of touch, keen of vision, alert in action, tidy in habits, and modest in deportment,--acquirements that will prove of no small advantage to the future men and women of the race. In all the higher graded schools, public or private, there should be a well-defined system of daily industrial instruction, not with the view of teaching a trade (that cannot be done, and should never be undertaken in connection with mental training), but for the purpose of steadying and increasing the intellectual efficiency of pupils. The most serviceable instruction of this sort may be imparted through those industries with which the pupils are somewhat familiar; but, where these are not available, the most important factor within our knowledge is some method of sloyd.</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Our preference for this system lies in the fact that, while it does not impart a knowledge of specialities, it lays a solid foundation for future industrial growth, which is all any method of school industrial training should undertake to do. Aside from the mental and physical development which negro pupils may acquire through sloyd and the kindergarten, both boys and girls should be daily exercised in military drills, the need and usefulness of which have long been obvious

</span></p><hr data-dcnode-id="2251"><a data-dcnode-id="2249" name="thoma262"><span data-dcnode-id="2250" instrument_node=""> Page 262</span></a><p data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">



to us. Military drill, apart from its many excellent physically developing features, teaches prompt and unquestioning obedience, and instils a respect for rightful authority. It inculcates courage, confidence, patience, and self-control, and enables pupils to perform with greater exactness their other duties, great and small. We are convinced that no method of supervising control is so productive of good results, in minds prone to disregard the essential elements of citizenship, as military discipline intelligently imparted and wisely enforced.</span></p><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The foundation and superstructure of prosperity for men and nations lies in creative industrial activity, which truth, we fear, the negro will never fully realize until he has undergone systematic industrial discipline, and realized the pleasure and dignity which accrues from well-doing. We say this because we have observed among the freedmen a prevalent notion that mental training exempts them from manual effort, and because many of those who indulge in intellectual pretensions openly regard physical labor as involving personal degradation. Such aversion emphasizes the conviction that the primary and essential need of all classes struggling in the throes of poverty and illiteracy is sound industrial training. We regard such discipline as a fundamental factor in the development of negroes, in whom industrial inefficiency is conspicuously lacking. Our conclusions may appear paradoxical to those who are aware that the freedmen

</span></p><hr data-dcnode-id="2243"><a data-dcnode-id="2241" name="thoma263"><span data-dcnode-id="2242" instrument_node=""> Page 263</span></a><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">



now constitute the bulk of the Southern labor
class, and are mindful of their generations of servile
bondage. But there is a wide distinction between
the intelligent industrial discipline we suggest and
that forced drudgery of slave life which bred aversion to diligent labor and thoroughly unfitted the negro to become a true worker.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What we mean by industrial education is an intelligent training of the perceptive, constructive, and executive faculties of man, in order that he may have an intelligent notion of what he undertakes to do, and the faculty of knowing when and how to do it in the best way possible,--an acquirement of mental power which, it is needless to say, endows its possessor with intelligence of a high order. Nor does industrial training in conjunction with mental culture impair the efficiency of labor, despite existing false notions to the contrary. For nowhere is the power of knowledge more fully exemplified than in knowing how to do. It is a secret of thrift, just as poverty is the fruit of ignorance. It is also the true scientific method of mind awakening, and the only process of human education that makes men and women capable of the highest efficiency in service to their fellow-creatures. A training of this sort should be the leading requirement and set purpose of every negro school, in order that physical indolence as well as mental ignorance may be eradicated from minds prone to succumb to such forces.</span></p><span data-dcnode-id="2235" instrument_node="">
</span><hr data-dcnode-id="2234"><a data-dcnode-id="2232" name="thoma264"><span data-dcnode-id="2233" instrument_node=""> Page 264</span></a><p data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">
</span></p><p data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Instead of sneering at industrial efforts or wasting golden opportunities in devising ways and means to evade industrial duties, we ought to realize that an ability to devise and construct is a divine faculty, and that the finite creations of man are inspired by an infinite Creator. Instructed hands are instruments of incalculable value and inconceivable possibilities; contrariwise, untaught hands and undisciplined muscles are as much raw material as iron, wool, and cotton; but just as their manufactured products increase many fold the use and value of the crude ore and staples, so trained hands, directed by intelligent brains, give to the man or woman possessing them an infinite superiority over their fellows who lack in this particular. When, therefore, the negro race acquires in the broadest and
best sense an industrial education, there will come a radical regeneration of Southern social economy, and negro education will then stand for home life, domestic industry, public integrity, and national welfare. The lesson which negroes have yet to learn is that no man escapes some measure of toil, and that honest work of whatever kind never degrades a true man or woman, all of whom should learn to labor with patience, accuracy, and fidelity. Therefore the farmer, mechanic, dressmaker, wage-worker, and bread-winner of every sort needs to be thoroughly trained and equipped for whatever work may fall to his lot. It is this sort of training that constitutes an education in the truest sense, and

</span></p><hr data-dcnode-id="2227"><a data-dcnode-id="2225" name="thoma265"><span data-dcnode-id="2226" instrument_node=""> Page 265</span></a><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">



those who fail to avail themselves of such opportunities when they offer, deserve neither pity nor aid in any failure that may come to them in their future industrial career.</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;So far as the negro women are related to this question, their primary and fundamental need is a thorough training and discipline in the art of making and keeping a home. They are not skilful purveyors of the needs and wants of a home, and know scarcely anything of the nature and nutritive properties of food products, or their economical preparation and use. They need to know how
To make wholesome bread, cook nutritious food, keep tidy homes, and rear decent families; otherwise the most recondite knowledge avails nothing, for it is no credit to a woman to write poetry, paint a picture, rave over music, and declaim nonsense from a public platform, and be a sloven and slattern in her home. It is a caricature of common sense, a parody of culture, for such persons to sniff at the working-women of their race. An aversion to work induces many negro women to forego laundry work rather than be put to the exertion of washing, and to keep only their reception room tidy while their bedrooms and kitchens are covered with dirt. We are moved to say that, instead of sending money South to educate young women in books, a wiser philanthropy would put them as domestics into Northern Christian country homes, where a three years' residence would do more to qualify them intelligently for the duties of

</span></p><hr data-dcnode-id="2219"><a data-dcnode-id="2217" name="thoma266"><span data-dcnode-id="2218" instrument_node=""> Page 266</span></a><p data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">



life than any number of years spent in the best institution of learning.</span></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The industrial training which negro men should now receive is in that field of labor and kind of work to which they are limited. A thorough and complete knowledge of agricultural work is the one thing needful to them, and it should embrace such features as would give them an insight into the nature and productive capacity of different kinds of soils, and the drainage, irrigation, and tillage of these; the character, cultivation, and use of the different grain foods; the growth and curing of different grasses and the effect of their growth on the soil; the culture of leguminous and saccharine plants and of tuberous roots, and their use and value for foods; the growth and use of textile fibres; breeding and rearing of domestic animals, dairy farming, bee culture, and fruit growing, and every other essential feature bearing on a successful knowledge of agricultural life. It is this kind of knowledge that a dependent, toiling people need, a knowledge that will give them a workable insight into the forces of nature, and make them creators and producers in the material domain.</span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;An industrial education of such character as we have described covers the entire ground of negro needs and wants. In comparison with this the current industrial teaching of his schools is no more than a senseless fad, honeycombed with wasted opportunities. We believe with Carlyle that all

</span></p><hr data-dcnode-id="2208"><a data-dcnode-id="2206" name="thoma267"><span data-dcnode-id="2207" instrument_node=""> Page 267</span></a><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">



work is divine, and until that sentiment is thoroughly comprehended and religiously followed, our freedmen will neither acquire social freedom nor rise above their present unenviable condition. Who can estimate the incalculable benefit that will come to them when they acquire an appreciation of the nobility of labor. When once a true conception of the functions of labor is acquired, there will come a desire for the technical knowledge of specialties, and negro institutions, with facilities for making capable mechanics, will then arise. The South needs trained workmen; and when it has educated its negro labor, it will have possessed itself of a superior type for its industries.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Some munificent donations have been made to the cause of negro education. Dr. Charles Avery left a bequest of more than $500,000, a large part of which was used in founding Hampton Institute; while William F. Slater and Daniel Hand have each contributed $1,000,000 toward this purpose. The Hand gift was intrusted to the care of the American Missionary Association. The Slater donation was committed to the custody of a board of trustees selected by the donor. It is nigh on to a score of years since this latter sum became available, during which time its trustees have annually distributed the net income among a number of Southern schools. Yet we deem it necessary to say that, with the best intentions on the part of its management, this money has failed to produce those results which the friends of negro education had a right to expect from its use.</span></p><span data-dcnode-id="2200" instrument_node="">
</span><hr data-dcnode-id="2199"><a data-dcnode-id="2197" name="thoma268"><span data-dcnode-id="2198" instrument_node=""> Page 268</span></a><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">
</span></p><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The truth is that our Northern philanthropists, with no trustworthy knowledge of the conditions of the freedmen, have neither sought nor acquired capable insight into the needs and wants of negro life. Having been influenced by the special pleadings of interested advocates and their own imperious convictions, it is consequently small wonder that they have hitherto failed to deal with this problem in the most satisfactory manner. There are many excellent features of commendable character, both in the methods and results, of some phases of the Southern negro educational work. Nevertheless, its most zealous advocates, in confessing to a sense of disappointment, will not deny that a series of blunders have been committed by those who assume to be the negro's benefactor. The managers of the Slater fund have been, from the inception of their trust, in a position to reconstruct effectively the whole system of negro society; but so far, we regret to say, they have unwisely permitted golden opportunities to pass beyond their grasp.</span></p><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The conviction is that the aim and intent of the donor of this fund was to give the largest measure of assistance compatible with a safe investment and assured income, to the race whom he sought to benefit. Obviously, then, the dictates of sound policy and business foresight required that this donation should have been invested in good agricultural lands in the South, and rented to selected negro families. Nor can the neglect to do this be excused on the ground of ignorance

</span></p><hr data-dcnode-id="2189"><a data-dcnode-id="2187" name="thoma269"><span data-dcnode-id="2188" instrument_node=""> Page 269</span></a><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">



of Southern conditions. We pointed out to the trustees of the Slater fund, through Ex-President Hayes, many years ago, the feasibility of such an undertaking, and said then, as we do now, that the suggestions which we advanced regarding the training of the freedmen were by all odds the most rational method yet devised for their elevation, for in any practical application of them the physical amelioration and mental enlightenment of the freedmen were bound to keep pace together.</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;That a discriminating public may judge of the merits of our suggestions, we will recount them. Our advice was that twenty square miles of land should be purchased in each of ten designated Southern states; that the land bought in each state should be purchased in three different localities, with two of the tracts containing 4200 acres of land, and the other 4400 acres,--the aim of this distinction being to make the largest area a central supervising agent in each state. We further advised that after the land was bought 100 negro families of approved industry and integrity should be located on each purchase, in allotted homesteads of 40 acres to each family, and under conditions that required them to build their own cabins, furnish their own farming implements and animals, and pay for the use of the land an annual rental of four bales of cotton. These suggestions, as may be observed, contemplated the purchase of more than 100,000 acres of land, the selection and location of 3000 negro families, in separate

</span></p><hr data-dcnode-id="2181"><a data-dcnode-id="2179" name="thoma270"><span data-dcnode-id="2180" instrument_node=""> Page 270</span></a><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">


communities, and the establishment and maintenance of thirty schools. Of course no such movement should have been entered upon unadvisedly, and especially was it necessary to consider carefully what its probable cost and prospective results were likely to be.</span></p><span data-dcnode-id="2176" instrument_node="">
