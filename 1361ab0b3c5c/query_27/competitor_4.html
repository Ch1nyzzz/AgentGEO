</span><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;In order to fully elucidate our proposition, we submitted detailed estimates, which were elaborated with great care. For example, we computed that the land would cost, at a maximum valuation, a sum not in excess of $600,000; that the advance to tenants for subsistence would require $150,000; while the cost of such necessary buildings as schoolhouses, houses for teachers, churches, stores, blacksmith and carpenter shops, would not have exceeded $10,000 for each community. So far we have accounted for an expenditure of $850,000, to which add $50,000 for supervision and teaching, and we have an initial outlay of $900,000 to record as the maximum expenditure to set on foot so extended a scheme for community education. On the other hand, a conservative estimate of probable results justifies the statement, that the annual rent from 3000 tenants would aggregate 12,000 bales of cotton, which, at the price cotton has ranged during the last ten years, would have brought at least $300,000. Of course, the $150,000 expended for food advances to tenants would also have been returned to the treasury, while the land reserved to educational uses would have produced enough cotton and breadstuffs to feed the teachers and pay their salaries. The industrial features

</span></p><hr data-dcnode-id="2173"><a data-dcnode-id="2171" name="thoma271"><span data-dcnode-id="2172" instrument_node=""> Page 271</span></a><p data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">



which we mentioned would, as a matter of course, be self-supporting; and it may be not unfairly claimed that, had such an educational work been inaugurated by the custodians of the Slater trust, the net income the first year would have exceeded $400,000.</span></p><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Had that amount been invested in a similar movement, the net income the second year would have exceeded a half million dollars; and had so wise and sensible a course been pursued for ten years, the trustees of this fund would then have had control of nearly 2,000,000 acres of land, the wholesome oversight of more than 30,000 negro families, the management of 300 industrial institutions; the supervision of the instructors of 60,000 pupils. They would, moreover, have had the supreme satisfaction of knowing that they had not only exceeded the most sanguine anticipations of the devisor of this trust, but, in having solved the problem of dealing with illiterate and indigent masses, they had furnished an object-lesson in political economy of inestimable value to the world. This, however, was not done; not even one experimental school was established. The original million-dollar gift is intact, and its income, amounting to about $45,000 per annum, is parcelled out to importuning negro schools.</span></p><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The consummation of an educational movement along the line of this suggestion would have eventually realized what the intent and purpose of negro training ought to be. Nor can it be said that visionary

</span></p><hr data-dcnode-id="2162"><a data-dcnode-id="2160" name="thoma272"><span data-dcnode-id="2161" instrument_node=""> Page 272</span></a><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">



and untried methods were proposed. Only existing and familiar agencies were to lay foundations for character building and intelligent development, the evident purpose of which was to train the negro to rely upon disciplined reason and sound judgment. Land and education, we have said again and again, lie at the root of any movement for the successful uplifting of any illiterate and submerged class, whether white or black. But as the matter now stands the negro's mental poverty keeps pace with his material indigence, nor will his awakening ever be achieved so long as physical wants are neglected.</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Under the right sort of supervision, such as we have described, even the more impoverished negro tenants, as prospective landowners, are certain to acquire habits of thrift, frugality, and foresight in crop-raising. They would be trained to cultivate and reserve food products for future use; and reserved subsistence liberates the tenant from bondage to the shopkeeper as effectually as landownership lifts him from indigent beggary to comparative wealth. When a man has nutritious food, comfortable clothing, and snug shelter, with useful, remunerative employment, he has in every needful respect all the essentials of material riches. And while the members of a community would be inevitably brought together under processes of thrift and enlightenment, none the less would true family relations be developed through a kinship of aims and ends. With

</span></p><hr data-dcnode-id="2154"><a data-dcnode-id="2152" name="thoma273"><span data-dcnode-id="2153" instrument_node=""> Page 273</span></a><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">



these events achieved, we should no longer deal with phantoms, but realities, because we should then have accomplished for the negro race what all else has hitherto failed to do for it,--that is, put within its reach the means for self-help, and the opportunity to demonstrate its capacity for intelligent self-direction.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Reviewing what has preceded in this discussion, certain facts associated with the negro seem to have been established, namely, the paucity of his mental nature, the audacity of his egotism, the superficiality of his knowledge, and the inadequacy of the methods employed in his training. A great defect in negro institutional work is the forced insulation of the pupil from to-day's relations, and his subjection to an environment that, for the time being, dominates, but does not elevate or awaken his higher nature. We are therefore convinced that a feasible system of community education offers the most remunerative and satisfactory solution of the negro question.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The establishment of such communities involves an authoritative oversight and capable supervision of all dependent members. It involves the creation of schools of instruction, which resident children within certain ages would be required to attend eight months in the year, and where they would be taught such lessons as are best calculated to instil a sound knowledge of elementary letters and Christian morality. It involves also the guidance of each individual in such industrial exercises as would give

</span></p><hr data-dcnode-id="2143"><a data-dcnode-id="2141" name="thoma274"><span data-dcnode-id="2142" instrument_node=""> Page 274</span></a><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">



them a knowledge of household or of agricultural work. This system of education begins by creating a home for the homeless, and seeks to develop a love for it by inculcating sentiments of fraternal and filial obedience, by devising and promoting true family relations, and by undertaking to influence each and all of its members to habits of thrift, sobriety, reverence, and integrity in daily living.</span></p><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;When every mitigating circumstance is brought forward and every excuse rendered, we are still justified in saying that the neglect to plant and maintain efficient schools in the rural districts of the South was a stupendous blunder, which falls little short of crime. The country grows the strongest, and in most respects the best, examples of negro character. The rural freedmen bred in illiterate simplicity constitute the bone and sinew of the race. They are docile in habits and responsive to instruction; they represent the virile germs of the race's development. But life to them is a serious problem, which begins in hope and ends in despair. From dawn to dusk a surfeit of ignorance, a want whose insatiate greeds are never appeased, confronts them. Their vocation now is plantation labor, and for ages to come they will constitute our brawny toilers in subtropical fields. But the great body of them live and die shut out from any intelligent training in schools or churches, and in complete isolation from those external forces everywhere required to lift mankind out of darkness into the clear sunlight of truth and righteousness. Every

</span></p><hr data-dcnode-id="2135"><a data-dcnode-id="2133" name="thoma275"><span data-dcnode-id="2134" instrument_node=""> Page 275</span></a><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">



instinct, therefore, of humanity and common sense demands that the plantation freedmen, whose multitudes constitute the great body of the negro people, should be trained in mental and industrial efficiency. Nor will permanent results ever be achieved in any attempted amelioration of their condition, unless they are sought in country life. The negro school which in pursuance of these suggestions shall be the first to forego its Northward quest for precarious support, and found homes and impart knowledge to the rural freedman, will thereby lay up for itself a wealth of revenue that will make it the most powerful factor for negro development in the Southern field.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Many years have passed since reconstruction set in motion the machinery of popular education. The freedmen were then eager to get knowledge, but are now indifferent to learning because the methods employed have neither reached nor interested the majority of that people. Three decades ago, when the negro, then a physical and illiterate mendicant, overwhelmed with credulous benightedness, was begging for the bread of common understanding, we built universities and fettered his feeble brain with moth-eaten hieroglyphics. To-day, after he has toiled through one generation of industrial servitude without making serious headway, we are making puerile attempts at his industrial development, much after the same manner that mistaken, but doubtless well-meaning people, are teaching millinery and lace-making to blanketed Indian women. Some people are

</span></p><hr data-dcnode-id="2127"><a data-dcnode-id="2125" name="thoma276"><span data-dcnode-id="2126" instrument_node=""> Page 276</span></a><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">



prone to ask of what avail, in either case, are these senseless fads? But from the dawn of freedom the negro has been deluged with false expectations. He was told that enfranchisement would make him a man, but he speedily awoke to that deception. He was told that education would lift him out of industrial bondage, but a taste of the fruit of the tree of knowledge has merely opened his eyes to the bitterness of his degradation. He is now told that industrial training in schools will transform the race into trade artisans, and that through industrial strife will come the redemption of the freed people. But this mirage of golden expectations is doomed to fade away, just as the others have done. It is not external, but internal, development that the negro needs.</span></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2121"></p><hr data-dcnode-id="2120"><a data-dcnode-id="2118" name="thoma277"><span data-dcnode-id="2119" instrument_node=""> Page 277</span></a><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">CHAPTER X</span></h3><span data-dcnode-id="2113" instrument_node="">
</span><h3 align="center" data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">SOCIAL RIGHTS</span></h3><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ABSOLUTE human rights are those of personal
liberty, of personal security, and the unquestionable
right to think, speak, and act according to the dictates of an enlightened conscience. Growing out of these fundamentals are numerous subdivisions of rights, such as legal, civil, and social rights, the
latter of which we shall now consider. Social rights
cover a wide field, and include both absolute and
conferred rights. Even in the restricted sense in
which we shall deal with this subject, it takes in
such common law rights as that of contract, compensation for labor, the purchase and sale of real and personal property, transit by public conveyance, admission to public places of amusement or instruction,
together with all expressed or implied social rights
inherent in public franchises, created under authority
from the states, and carried on by individuals or
corporations for public service. In setting forth
these well-established principles as correct definitions
of social rights, we do not mean to imply that public
carriers and other servants of the people have not
the inherent right to make such regulations regarding the manner and method of rendering such service--

</span></p><hr data-dcnode-id="2107"><a data-dcnode-id="2105" name="thoma278"><span data-dcnode-id="2106" instrument_node=""> Page 278</span></a><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">



so long as its quality is unimpaired and free from individual discrimination--as will best subserve their corporate or individual welfare.</span></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Social rights and personal association are sometimes
inextricably confounded in the popular mind. The two, however, are wholly distinct from each
other. Social rights are universal franchises, and
relate entirely to public privileges. Social intercourse, on the other hand, is an inherent and personal prerogative, in no wise amenable to municipal
regulation; it may, therefore, be indulged in or not,
just as individual tastes determine. Municipal law,
then, has no right to say who shall or shall not consort
together; first, because it would be of no avail
where individuals were strongly attracted toward, or repelled from, each other; and secondly, because any law permitting, or restricting, social intercourse, is an obvious invasion of primary individual rights, inasmuch as choice of association, as well as option of religious belief, are, for adult people, God-ordained functions. Hence, any infringement of privilege inherent in either social rights or personal association by municipal law or social custom becomes an inexcusable act of tyranny. Any and all races have the right of unrestricted social intercourse, either as individuals or communities, whenever and wherever reciprocal sentiments prompt such intercourse. Social freedom always carries with it the right of social union. Hence, where persons of opposite sexes or races, of their own free will and choice, seek to enter

</span></p><hr data-dcnode-id="2099"><a data-dcnode-id="2097" name="thoma279"><span data-dcnode-id="2098" instrument_node=""> Page 279</span></a><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">



into conjugal relations, municipal restrictions have no right to interfere, either by forbidding such marriages or by annulling them after consummation.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have already remarked that men will select their associates despite civic regulations, and that municipal functions are supereminent whenever any attempt is made to separate races or create class distinctions by organic authority. In thus enunciating these principles of social intercourse, we are not contending for such an abrogation of all municipal oversight as would supplant liberty with license. Such conclusions would be far astray from our meaning. Social affiliations are, as we have said, the outcome of personal desire for congenial association, and in so far as individual commingling does not endanger the welfare of the state, as where the vicious undertake to seduce the virtuous members of society, the right of private judgment in accepting or declining overtures for social intercourse, and in contracting or severing individual friendship, is supreme. What, we may ask, are the functions of the municipality in dealing with its members, if not to protect and conserve their public and private
rights? Among the latter, is not the inviolability
of private life to be placed first and foremost? Do
not the peace, security, preservation, and integrity of
the social organism rest on the great magna charta
of personal liberty, which declares "A man's house
is his castle," and which, so long as the occupant is
not answerable to processes of law, he may defend

</span></p><hr data-dcnode-id="2091"><a data-dcnode-id="2089" name="thoma280"><span data-dcnode-id="2090" instrument_node=""> Page 280</span></a><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">



against all comers? At its threshold all public surveillance ends, and its master alone has the right to say who shall enter and who shall remain on the outside.</span></p><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have been at some pains to state these well-known elementary principles of social intercourse, in order to show how ineffectual would any municipal
mandate prove which undertook to compel social
intercourse among races or classes fundamentally
antagonistic, or to forbid the association of a people
affinitively related. Under normal conditions of social
development these abstract principles apply to both
white and black social intercourse. Negroes have no
just ground of complaint against the white race for
refusing to associate with them, nor have the whites
any right to force their society on the blacks. In
all cases social intercourse should be free and untrammelled. These statements will also assist in preserving accurate distinctions between public and
private intercourse, for the bugbear of negro social
equality has stood in the way of many just and
equitable measures affecting the freedmen.</span></p><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We shall add a word to what has already been said regarding co-race intercourse. It is evident to any observant person, that in any Southern community of blacks and whites there is more of absolute social equality and personal freedom, in the intermingling of the races, than has ever obtained in the North, where, in the main, the public social rights of the negro are respected, but against whom pronounced

</span></p><hr data-dcnode-id="2080"><a data-dcnode-id="2078" name="thoma281"><span data-dcnode-id="2079" instrument_node=""> Page 281</span></a><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">



caste distinctions are applied in private intercourse. We are, therefore, of the belief, that, should wealth, culture, and character come to the great body of the negroes, all traces of race prejudice would disappear from our Southern section as effectually as it has been obliterated in Portugal and the Latin-American countries. In that event, the members of each race would be attracted toward the other by a parity of social development, and their difference in color would be merely an accident of contact, without becoming a factor of separation.</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have indicated what social rights and social intercourse are, and in what respect they differ from each other. We shall now attempt to show how social rights may be nullified and abrogated altogether through social prejudices. Personal likes and dislikes are amenable to no authority save that of individual judgment and conscience, and may be well founded or superficial in their conclusion. The most pronounced prejudices of mankind grow out of their social, legal, political, and religious distinctions. Social prejudices may be racial and national, though there will always be found individual members of a proscribed people who are exempt from its operations. Municipal law is powerless to eliminate personal prejudices, nor is any attempt made in that direction, though the principles of our civic institutions are arrayed against racial distinctions and class legislation. Neither this, nor any other, government is founded on principles embodying purely abstract

</span></p><hr data-dcnode-id="2072"><a data-dcnode-id="2070" name="thoma282"><span data-dcnode-id="2071" instrument_node=""> Page 282</span></a><p data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">



human rights. Governments are not sentimental affairs, but practical organizations, created for specific purposes, in the interest and for the welfare of the whole body of those who constitute their inhabitants.</span></p><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;So far as the social rights of the freedmen are concerned, the following is our position regarding co-race intercourse under normal conditions. Negroes are citizens of the United States, and as such they have, in common with all other citizens, a right to the enjoyment of all public privileges created and maintained by the state. We are aware that a widely different view was taken of this subject in the earlier stages of American development, and that legislative attempts were made to control the social rights of this people,--in much the same way that some of the early colonies undertook to supervise the religious beliefs of their citizens. At that time laws were in force which forbade public social interminglings of the blacks and whites, and prohibited with severe penalties their intercourse in public conveyances, schools, churches, hotels, and theatres. There was a time when not one of the older states was free from legislation imposing barbarous and execrable distinctions on its black citizens. Happily, the force of enlightened public sentiment has swept away most of these odious restrictions, with the result that where public rights are accorded to our several classes of citizens, such commingling does not excite the slightest friction, nor provoke the least invasion of private rights.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><hr data-dcnode-id="2063"><a data-dcnode-id="2061" name="thoma283"><span data-dcnode-id="2062" instrument_node=""> Page 283</span></a><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">
</span></p><p data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Much useless ado has been made over the caste legislation of the South, by persons who have only a superficial knowledge of the conditions which obtain in that section. On the face of it such legislation
has the appearance of being harsh and extremely unjust. This in fact it is, to a large and intelligent body of our freed citizens. But on closer inspection it will be seen that there are sound reasons for imposing discriminations in a region where diversity in the social development of its classes is so complex as
to forbid unrestricted intercourse. Moreover, however justly our indignation may be aroused at the
sight of such barbaric remnants clinging to our civilization, we ought not to forget that scarcely a third of a century has elapsed since negroes were compelled
to ride on the outside of coaches and street cars, in
Boston, New York, and Philadelphia, the present
centres of American culture and civilization. To a much later date they were rigorously excluded from the hotels and restaurants of these cities, and are to-day debarred from renting or buying houses in their more respectable localities. The conduct of our Southern white neighbors toward the negro is open to grave criticism, but sober reflection shows that neither North nor South has a monopoly of social justice for its weaker members, though it is evident that the freedmen get more of the essentials of life in the latter section than in the former.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The fundamental objection, however, which may
be urged against Southern social injustice is, that in

</span></p><hr data-dcnode-id="2053"><a data-dcnode-id="2051" name="thoma284"><span data-dcnode-id="2052" instrument_node=""> Page 284</span></a><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">



making color the sole criterion of racial distinction a crude and illogical standard is adopted. Obviously, mental and moral character are not determined by physical accidents, and in every well-ordered community these two qualities are the only recognized endowments of manhood and womanhood. It is no justification for the present condition of affairs to plead that the laws are impartial in operation, and effect both white and black alike. Such restrictions are infringements upon the rights of American citizenship, and impose restraints to which neither white nor black men ought to submit. The separate car law is a fair sample of the legislation we are discussing, and of which it is but fair to say that the end which the legal authorities appear to have had in mind was the separation of the orderly from the disorderly members of society. In so far the intention was good; but basing the separation on color does not accomplish that end, since all of one color are assigned to a designated car, and, through arbitrary methods, the intelligent, the refined, the well-dressed, and well-behaved passenger is forced to occupy the same seat with the vulgar and dissolute,--a condition of affairs equally disagreeable to white and black women travelling alone, and one which often leads to unpleasant results.</span></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A more logical method would be to have, on every railway, first and second class carriages, and to allow all persons, regardless of color, to select that mode of conveyance most in consonance with their means,

</span></p><hr data-dcnode-id="2045"><a data-dcnode-id="2043" name="thoma285"><span data-dcnode-id="2044" instrument_node=""> Page 285</span></a><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">



taste, and behavior. It is reasonable to assume that, where such regulations existed, the objectionable element would, as a matter of preference, take the cheaper rate. When that is not done, discretionary power should be lodged in the hands of the ticket-seller and conductor to make such changes as might be necessary for the peace and security of self-respecting travellers. This plan, in our judgment, offers a solution of the problems growing out of conditions of Southern race intercourse in railway travel, and it is one we have repeatedly suggested to those in authority. It is also gratifying to state that quite recently the railroads of the Southwest, as well as some in the South, have adopted a second-class passenger rate. This marks a step in the right direction, although such rate has not included all the features here indicated.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The separate coach law, as instituted by the several Southern states, explicitly provides for equal accommodation and service for both races. Nevertheless, under its actual operation, vastly inferior cars are furnished to the freedmen. Railway authorities are opposed to these restrictions, though not so much out of sympathy for the negro as for the fact that they entail an additional and wholly unnecessary outlay in running expenses. There is ground for the suspicion that in many instances dilapidated cars are set apart for the freedmen with the purpose, and in the hope, that public sentiment may be aroused and may lead to the abrogation of this law, as well as to other desired

</span></p><hr data-dcnode-id="2037"><a data-dcnode-id="2035" name="thoma286"><span data-dcnode-id="2036" instrument_node=""> Page 286</span></a><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">



changes in railway legislation. We were speaking once of this matter to a prominent Southern governor, and he said to us that he saw the injustice to which the travelling negro was subjected, and had repeatedly urged the representative freedmen of his state to call his official attention to the discriminations which the railroads practised against them; but as no amount of persuasion would induce them to take the matter up, he was powerless to interfere. He further gave it as his opinion that, so long as greed for individual notoriety and personal gain actuated the leaders, there was not likely to be any substantial movement set on foot for race amelioration.</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We confess that our knowledge of the freedmen induces us to coincide with these views. It is not to be denied that negroes are unjustly deprived of many of their legal rights. But an acknowledged universal subjection to common disabilities has neither woven a bond of mutual sympathy nor created affinity or coherence among them. Instead of finding unanimity of sentiment and combined action for the overthrow of race oppression, we merely discover individuals here and there endeavoring in a clandestine way to secure recognition from the dominant forces of society. So far as the mass of the freed people are concerned, they are not reckoned in any scheme which their accredited leaders have concocted, nor is the ordinary negro spokesman to be regarded as a trustworthy exponent of race needs and wants; he is not enamored of the literal truth, either as it

</span></p><hr data-dcnode-id="2029"><a data-dcnode-id="2027" name="thoma287"><span data-dcnode-id="2028" instrument_node=""> Page 287</span></a><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">



affects himself or his people. Perhaps we ought not so much to wonder that these things exist, as that they are not more widespread among a people who were yesterday slaves,--a span by far too short to have rid them of inbred defects, either of mind or rudimentary character.</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is a world-wide difference between caste distinctions and race prejudice. The strongest caste systems are erected within homogeneous colored races, the most pronounced being among people of the same hue; as, for example, in India. Caste, however, as understood in the Eastern world, is a social division of society, which separates and classifies into hereditary groups the functional capacity of its members, and is wholly a civic arrangement.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The Aryan race by the genius of its endowments is fundamentally grounded on class distinctions, the basis of which rests, not on color, but capable well-doing. Capable well-doing is the standard of race efficiency, and around it are ranged those distinctions which separate wealth from poverty, intelligence from ignorance, industry from idleness. These tests of racial efficiency are not doubtful standards, but clear, unequivocal gauges of the merits of men's endeavors measured by an adult standard of inexorable exactness. As childish performances are never subjected to other than an adolescent criterion, we are enabled to discover, with impartial exactness, the manly races or childish races and individuals of our composite organism, and give them distinctive groupings.
</span></p><span data-dcnode-id="2018" instrument_node="">
</span><hr data-dcnode-id="2017"><a data-dcnode-id="2015" name="thoma288"><span data-dcnode-id="2016" instrument_node=""> Page 288</span></a><p data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">
</span></p><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It will therefore be seen that the essential features of a caste system are in vogue among us, and functioned with as great a cleavage of classes as obtains elsewhere. Yet our class segregations are neither hereditary nor permanent in operation, for the reason that we divide our social forces into achievers and non-achievers, and group them according to their mental, moral, and industrial capacity. But, while no man can pass from the non-progressive to the progressive class until he achieves substantial success in endeavor, the way is always open to all of every hue. Nor are these caste requirements segments of prejudice,--which after all is merely a prejudgment formed from insufficient data, and in a candid mind liable at any time to revision and reversion. That of which we are speaking is more than personal bias and greater than mere opinion. It is a law of growth, the criterion of development, which the Occidental world has set up for its guidance, and to which all human activities within its purview must conform.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A predominant idea among us is that, in both ethical and social life, equal opportunity should be given to every one to exercise his best endeavor in the strife which attends human activity. There is a fundamental and vital difference in men, but such differences are not to be accounted for on any physical basis. Only the puerile judgment of an inferior people adopts such criterions. Wherein, then, lies the distinction between nations and individuals other

</span></p><hr data-dcnode-id="2007"><a data-dcnode-id="2005" name="thoma289"><span data-dcnode-id="2006" instrument_node=""> Page 289</span></a><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">



than in a difference in possession of power? Even race antipathy may be founded upon legitimate causes and justifiable grounds. There is such a thing as righteous contempt for wilful degradation. Both custom and prejudice are to be respected when they involve something more than mere conceits, and behind each may lie fundamental principles of vast import to the well-being of society. Therefore, when nations or men steadfastly refuse to consort with inferior standards of right-doing, and stand ready to defend by force what they believe to be right and true, all sound minds regard their conduct as heroic and worthy of emulation.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Social bias, however, is not always the outgrowth
of rational conviction or wise judgment. There are
prejudices born of ignorance, whose inceptions began
we know not how, but which are disseminated and
perpetuated by unthinking acquiescence. Experience
also shows that foolish whims may be as stubbornly
adhered to as rational convictions, and defended with
as great valor as courage is capable of. Personal
prejudices may, therefore, be the outgrowth of a foolish fancy or of deep-seated convictions of truth and
justice. Personal prejudices may take in a whole
race of beings,--as our aversion to the Chinese of
the Pacific Coast. But it will be found that intelligent human prejudices are rarely directed against
physical qualities, and that the inciting causes are
ethical, social, or political, and affect whole races to
such degree only as they give a maximum or minimum

</span></p><hr data-dcnode-id="1999"><a data-dcnode-id="1997" name="thoma290"><span data-dcnode-id="1998" instrument_node=""> Page 290</span></a><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">



ground of offence. Caste distinctions and race prejudices are not coördinate terms. Caste distinctions may exist in full force and effect where race prejudice is largely wanting. In this country we have an abhorrence of legal caste distinctions, nevertheless, we tolerate class segregation and foster race antagonisms to a degree that ill comports with our republican institutions.</span></p><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Some observers claim that race prejudices are fundamental characteristics of human nature, and as such are ineradicable, especially where they originate in a conscious superiority on one side, and an admitted inferiority on the other. There are national prejudices arising from insulation and egotism; organic prejudices subsisting between monarchial and democratic forms of government; and there may be, as in our own country, sectional prejudices within the same nation; but none of these several phases of prejudice can be rightfully termed fundamental and ineradicable. What is true of masses of humanity is also true of individual members. Prejudices, then, of various shades and degrees extend through all the ramifications of society, and they are eradicable. We would now discover what of them are directed against the characteristics of a people, and what are superinduced by physical accidents; because, where antagonism is the outgrowth of objectionable traits of character, the elimination of objectionable traits is all that is needed to remove the opposition.</span></p><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is a plea set up among the negroes, and

</span></p><hr data-dcnode-id="1988"><a data-dcnode-id="1986" name="thoma291"><span data-dcnode-id="1987" instrument_node=""> Page 291</span></a><p data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">



reëchoed from without, that a color prejudice which is intense and unappeasable bars every opportunity and fetters every attempt at race development. Such statements afford no satisfactory solution of the question at issue. Where so many conflicting elements exist it is absurd to single out a particular prejudice and hold it up. Of course, some prejudices are more reprehensible than others, because they work a more positive injury to society. Such, for example, are those aversions founded on the involuntary accidents of physical life and based on personal appearance, whether of color or form. Apart
from and above incidental distinctions of society there lies within the reach of each of its members the power to acquire character; and character represents the sum total of all that is excellent in human endowment.</span></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;When we consider existing phases of Southern social intercourse, the plea of fundamental antagonism between the races becomes mendacious on the part of those who enunciate it. The conduct of the white people toward the freedmen shows that race prejudice is not a fundamental quality of their character. They have always exhibited a genuine fondness for them in all relations aside from that of political action. As far as the freedman is concerned, it is broadly affirmed by those who hold the race in social subjection that the "negro is never so happy as when serving a white man,"--an affirmation to which the cold facts of race experience give

</span></p><hr data-dcnode-id="1980"><a data-dcnode-id="1978" name="thoma292"><span data-dcnode-id="1979" instrument_node=""> Page 292</span></a><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">



color and credence, to set aside which something more tangible than the bravado of speech is needed. It is evident that no permanent racial antagonism can exist where good feelings are uppermost on both sides. Hence the plea of fundamental aversion to negro color and race must be set aside.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Social prejudices are not confined to color or races; they pervade all segments of society, and enter into all the ramifications of human life. Nowhere are they more intense and unreasonable than among the negroes themselves, who have established within their own ranks innumerable social distinctions which, strange to say, are based solely on color. For example, in many sections, light-hued negroes associate together, and hold themselves as much aloof from contact with the blacks as do the most exclusive whites. In fact, there exists among these people a graduated series of color distinctions, with the blackest constituting the base, and the fairest the apex, of the social column. But, though there is neither logic nor sense in discriminations based on variations of racial color, nevertheless these social antipathies of the freedmen are as pronounced in character and as relentless in effect as those which their most inveterate white enemies have shown. Of course, such grotesque pretensions to superiority as these distinctions evince indicate very clearly the low state of development of the negro's social condition,--which in every stage of its clamorings

</span></p><hr data-dcnode-id="1972"><a data-dcnode-id="1970" name="thoma293"><span data-dcnode-id="1971" instrument_node=""> Page 293</span></a><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">



for white recognition has utterly failed to realize that character and capacity are the basal elements that bring men together in fraternal intercourse.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But, disregarding the practical teaching of race environment and strangely blind to its real needs and wants, there are not wanting those who persist in the contention that, as color constitutes the barrier of separation between the races, an elimination of dark hues will open the way to cordial social reciprocity as well as immeasurably uplift the black people in character and capacity. Such statements are false and vicious. A mere change of hue will not improve the capacity of any race. Moreover, ignorance, stupidity, and immorality are as pronounced among the fair negro types as among the darker shades. In truth, many of them are weaker in this respect than their black brethren, nor does their light color have any advantage over black in sections where both are known and rated according to their actual worth. A yellow-hued negro is dominated as mercilessly as a black one, nor are his presumptions tolerated in any superior quarter, despite mixed race arrogance. The essential fact, overlooked by those who lay stress on the efficiency of color as a solvent of race prejudice, is that social relations are based on mutual attractions and reciprocal obligations. There is no other law of harmonious personal intercourse; and what worthy qualities, inherent or acquired, have negroes to proffer to their white neighbors?</span></p><span data-dcnode-id="1964" instrument_node="">
</span><hr data-dcnode-id="1963"><a data-dcnode-id="1961" name="thoma294"><span data-dcnode-id="1962" instrument_node=""> Page 294</span></a><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">
</span></p><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Color, we insist, is merely the incident, and not the foundation, of prejudice. Ample verification of this is afforded, by the low class of whites who inhabit our Southern states, and whose condition is infinitely inferior to that of the lowest plantation negro, both as to opportunity for work, means of living, and social recognition on the part of a superior oversight. These people are white, and of the same race as their oppressors, nevertheless their color neither alleviates their distresses, nor furnishes an avenue of escape from domination. To decry their social ostracism as an ugly manifestation of human nature avails nothing in the face of the fact that prejudices of various degrees are subtly interwoven into the fibre of all people backed by pride of ancestry and achievement. We have the utmost contempt for every shade of vulgar prejudice, and for the conditions which evolve them as well. Yet we have profound respect and reverence for the distinctions which sort and separate the wise from the simple, the good from the bad, the capable from the incapable of mankind.</span></p><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;That white people have prejudices against the negro may well be admitted. But what of that? Do not all of us have our social antipathies? We may further venture to say, guided by intimate knowledge of the characteristics of both races, that, were their relations reversed, with the negro constituting the master class and possessing the endowments of the white race, and with the latter in a low

</span></p><hr data-dcnode-id="1953"><a data-dcnode-id="1951" name="thoma295"><span data-dcnode-id="1952" instrument_node=""> Page 295</span></a><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">



state of development similar to that of the freedman, the racial contempt and oppression which would follow would represent a much more accentuated and intense phase of experience than that which the negro has so far undergone. This conclusion is fairly sustained by the present attitude of the negro toward the poor whites of the South, between whom and himself there is an intense and wholly unnecessary bitterness, and with whom had he been wise in his day of opportunity during sectional reconstruction, he might have established friendly relations. In that event, these two classes would then have controlled the South. The negro, however, had neither sufficient forethought nor sagacity to compass so sane an undertaking. He was blindly perched on an eminence of egotistical delusions, and made neither rational advances toward his superiors, nor comported himself with such discretion toward this class of whites as would tend toward the abatement of existing prejudices.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;That race prejudices exist no sane man denies, but that color is the prime cause of American prejudice against negroes is not to be believed for one moment. Every shred of authentic evidence disproves conclusions so preposterous. Abstractly considered, black and white are negative colors, neither of which has any inherent superiority over the other. Whence, then, comes race prejudice? Simply through a concatenation of circumstances, by which black represents an enslaved, and white a master class; and, as

</span></p><hr data-dcnode-id="1945"><a data-dcnode-id="1943" name="thoma296"><span data-dcnode-id="1944" instrument_node=""> Page 296</span></a><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">



a servile race is always a despised people, the logical and inevitable sequence of negro bondage was to create an aversion for black, not on its own account, but solely because it was the chief visible badge of personal degradation.</span></p><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;While it is true that the conditions of slavery dishonor the freedmen of to-day, as all servile debasement has done the descendants of an enslaved race,
and while we cannot hope for their eradication so long as the prejudices which are superinduced by chattelism continue to be perpetuated by the crude endeavors of the negro himself, nevertheless, the obvious duty of the freedman is to conduct himself so worthily as to disarm racial antagonism. If he is a man, that he can do. If not, then he deserves to be pushed aside without pity or remorse. In this matter all that the negro can justly ask is opportunity to demonstrate his capacity for efficient service. Should he fail to establish his claims of equality with other races, he must perforce return to his subordinate conditions. Should he succeed, he is thenceforth to be enrolled in the ranks of the capable and efficient members of our social group. We are aware that, so long as black is a symbol of inefficiency, it will be well-nigh impossible for even the capable and worthy negro to escape some measure of the odium universally attaching to his people; and it may fairly be added that any civilization is defective in which injustice exacts penalty for the unavoidable incident of color and birth. The common-sense conclusion is

</span></p><hr data-dcnode-id="1937"><a data-dcnode-id="1935" name="thoma297"><span data-dcnode-id="1936" instrument_node=""> Page 297</span></a><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">



that assumed limitations of a race ought not to shut out from recognition and opportunity its individual members of capable parts and original powers.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We fear, however, that the freedmen are not content to abide by the sober restraints of life, and to await a revolution in public sentiment through their own well-doing. On the contrary, we notice that the ever recurring justification for race inefficiency is the excuse that color prejudice is the bar to its capable achievement. By what process of reason the elimination of proscriptive social regulations will implant energy in the place of illiterate idleness, or convert imbecile folly into sane conduct, is beyond our knowledge. It is questioned whether the removal of proscriptive regulations will, or can, make an industrious man out of an indolent one, a capable mechanic out of a shiftless and careless laborer, or endow a man with integrity and prudence who is handicapped with
a strong desire to evade steady and sober endeavor.</span></p><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The truth is that negroes have not yet realized that
their inefficiency is due to fundamental and inherent traits of character in no wise related to external conditions. Nor do they comprehend that the eradication of such characteristic defects is the one thing needful before they can hope to secure recognition and place among the efficient forces of society. There is more or less clamoring on the part of the freed people for the privileges which the white people enjoy, yet, when the way is open, they seldom avail themselves of the opportunities to any such extent

</span></p><hr data-dcnode-id="1926"><a data-dcnode-id="1924" name="thoma298"><span data-dcnode-id="1925" instrument_node=""> Page 298</span></a><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">



as would indicate a profound appreciation of the benefits conferred. For instance, there are sections of the United States where unlimited social and civic freedom is enjoyed by all classes, but where the condition of the negro is not one whit superior to that of parts where his race is denied such privileges. We may therefore conclude that it is self-conquest of which the negro stands most in need, together with such an endowment of capacity as will compel recognition in the most reluctant quarters.</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We are a heterogeneous people, and any honest facing of the situation shows that caste distinctions and social prejudices are pronounced factors in every phase of American life; though it is equally obvious that neither is an ineradicable trait of our civilization. Under such conditions, it is not strange that prejudice against negroes is a social fact. In so far as it is directed toward their color the negroes have solid ground for complaint. Nevertheless, in protesting against wrongs, it behooves them to discriminate between their absolute rights and permitted privileges. The negro has a God-ordained right to protest against his exclusion from means for self-support. He has equal right to protest when deprived of legal and civil justice, or when the opportunity to knowledge and sober living is denied him. He has no just cause of complaint, however, when excluded from social intercourse with the white race for the obvious reason that mankind does not mingle on terms of social equality,--a fact as true of black men as of

</span></p><hr data-dcnode-id="1918"><a data-dcnode-id="1916" name="thoma299"><span data-dcnode-id="1917" instrument_node=""> Page 299</span></a><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">



white. Nor is negro exclusion from membership in white churches a trespass on race rights, for, after all, a church is neither more nor less than a social family.</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What all mankind has a right to demand and possess, is freedom of opportunity for self-development. Neither the superior social or civic forces of society have a right to fetter uplifting human activity. Furthermore, all social rights ought to be respected. Savagery, ignorance, is the wild play of misdirected energy; civilization, knowledge, is the fruitage of endeavor,--and endeavor is not the property of a specific color, but is independent of all color. Despite existing social conditions, we are sanguine enough to believe that the time will come when race discriminations will cease; for the highest freedom is always possible where full discussion of fundamental principles is untrammelled, and where opportunity for intelligent activity is unfettered. That is what really obtains in our American commonwealth.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1909"></p><hr data-dcnode-id="1908"><a data-dcnode-id="1906" name="thoma300"><span data-dcnode-id="1907" instrument_node=""> Page 300</span></a><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">CHAPTER XI</span></h3><span data-dcnode-id="1901" instrument_node="">
</span><h3 align="center" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">ENFRANCHISED FUNCTIONS</span></h3><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;THE status of citizenship is vested in all persons born or naturalized in the United States and subject to its jurisdiction. The first authoritative definition of American citizenship was contained in the Fourteenth Constitutional Amendment, which made all individuals, in any state or territory of the Union, who came within its prescribed definitions, American citizens owing direct allegiance to Federal authority. Before that amendment was adopted, there was no common standard; citizenship was a local institution, and determined by the laws of the several states, hence a person who was a citizen in one state might be an alien in another. But by virtue of that amendment, every inhabitant born or naturalized in the United States, in becoming Federal citizens, acquired citizenship in any particular state in which residence was made. This amendment wrought a sweeping revolution in the status of citizenship, which was not fully grasped at the time, and whose significance is by no means generally apprehended now. It was this amendment which conferred citizenship on the American negro, North and South. By one of its sections provision was made for restricting the representation

</span></p><hr data-dcnode-id="1895"><a data-dcnode-id="1893" name="thoma301"><span data-dcnode-id="1894" instrument_node=""> Page 301</span></a><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">



of a state when persons were denied suffrage. The obvious intent of this section was to limit congressional representation to the actually qualified voters of the several states. Negroes were not then entitled to vote. They had, as slaves, added three-fifths to the Southern representative apportionment, and would, as citizens, increase the congressional representation of that section two score.</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To understand the effect of the acts which grew out of our war legislation, it is necessary to advert briefly to some of the causes which led up to them. The possible dissolution of the Union had been upper most in men's minds from the adoption of the Constitution. The possible severance of allegiance was the attitude of Virginia in 1799; also later of Kentucky, South Carolina, Georgia, and Alabama. It was preëminently evidenced in the far-reaching plot of Burr to form an empire in the Mississippi Valley. Even New England, with Massachusetts in the lead, showed an inclination in this direction, in the Hartford Convention of 1814. We may say that the conception of a single supreme sovereignty which should be a "government of the people, by the people, and for the people," had no existence in the mind of any one in the early days of the nation. Popular sovereignty was, therefore, an inconceivable possibility. The nearest approach to it was the town meetings of New England, and these institutions of local self-government were ill-equipped to grasp the profound significance wrapped up in the idea of a supreme

</span></p><hr data-dcnode-id="1887"><a data-dcnode-id="1885" name="thoma302"><span data-dcnode-id="1886" instrument_node=""> Page 302</span></a><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">



authority, created by individual assent, and exacting loyalty to the exclusion of local interests and sectional prejudices. Sound notions respecting the nature and functions of a federal government were impossible to incongruous, isolated colonists, deeply rooted in local prejudices. The fact is that, from its creation to the close of our civil strife, the Federal government was viewed by all classes with all the suspicion that attaches to foreign control. Fraternity of states and national loyalty were unbudded plants, that had no flower and fruitage until strife and bloodshed brought men to see that friendship and unity were better than hate and separation.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Before their rebellion the seceding states were civic organizations, owing official allegiance to the Union, and amenable to Federal control. The citizens of the several states held, in a primary sense, allegiance to their several states, and only through their civic relation to the state were they bound in allegiance to the Federal government. Consequently the rebellion of the state not only destroyed its organic relations to the Federal government, but carried its individual citizens, except such as gave their allegiance directly to the Federal government, outside of all national civic rights. Logically speaking, then, though the secessionist was an inhabitant of Federal territory when the Rebellion ceased, he was not a citizen, but in every sense an alien subject. The severity of these conclusions, while not stated in express terms, was fully borne out by the attitude of Congress in

</span></p><hr data-dcnode-id="1879"><a data-dcnode-id="1877" name="thoma303"><span data-dcnode-id="1878" instrument_node=""> Page 303</span></a><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">



dealing with Southern reconstruction. The official declarations of our Federal legislature and judiciary were that their rebellion had destroyed the former organic and legal status of the states in regard to the Federal government. To be sure, no physical territory was alienated or destroyed,--that was still within, and the property of, the nation; but the former municipal organism to which the inhabitants of such territory were in subjection was obliterated. Therefore, in the absence of any recognized legal government, and in pursuance of the mandate of the Constitution to provide a republican form of government for each state, it was held that Congress had the undoubted right to prescribe the form and method by which new municipalities should be organized.</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is not our purpose to present a history of the
steps which led to the conferring of suffrage on the
freedmen and the enactment of the Fifteenth Amendment. For a proper understanding of certain parts, however, a brief statement is necessary. Eleven states had been in armed rebellion against the national government. When hostilities ceased, no provision had been made for the restoration of these states to the Union. Congress was not in session, President Lincoln had been assassinated, and the man who had succeeded him to the presidency, though at first disposed to resort to rigorous measures in dealing with the Confederates, was speedily led, under the persuasive influence of Mr. Seward,

</span></p><hr data-dcnode-id="1871"><a data-dcnode-id="1869" name="thoma304"><span data-dcnode-id="1870" instrument_node=""> Page 304</span></a><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">



then Secretary of State, to issue pardons to many of the leading Southern conspirators. Guided by the same influence, he appointed provisional governors for the several Southern states, and directed that in each a convention should be held for the purpose of resuming administrative functions; the only conditions imposed were the adoption of the Thirteenth Amendment and the repudiation of the Confederate debt. The consequence was that, when Congress met in December, 1865, each of the eleven rebellious states had, under such terms, effected a complete restoration of their state administrative functions, and had sent their senators and representatives for admission to the Federal Congress.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Congressional inquiry into the means and methods by which these events had been accomplished disclosed the fact that these state governments were organized, not in accordance with, but in defiance of, the expressed sentiment and policy of the nation; and especially was this observable in the attitude of these states toward the Thirteenth Amendment. It is true they had perfunctorily given their assent to that amendment, though, as was claimed by them, under duress; but they nullified both spirit and letter of the Amendment by such odious and inhuman laws against the freedmen as practically to reënslave the whole negro race. In fact, the laws for the control of the freedmen, enacted by the Southern states immediately after the close of the war, effectually reduced that people to a condition of helpless servility

</span></p><hr data-dcnode-id="1863"><a data-dcnode-id="1861" name="thoma305"><span data-dcnode-id="1862" instrument_node=""> Page 305</span></a><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">



such as had had no parallel on this continent. It was this attitude of the South toward the freedmen, and the manifest purpose of its leaders to evade and ignore every requirement which the logic of events and national legislation had imposed, that finally awakened the North to the true intent and purpose of the South, and created a demand for the enactment of the Fourteenth Amendment. The ratification of this by the seceding states was made a prerequisite condition of their admission to the Union.</span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Previously, the political leaders of the South had defiantly rejected every congressional measure for reconstruction. They stubbornly contended that Congress had nothing to do with presenting terms to the late Confederate states for their reëntrance into the Union; and, fixed in this illogical attitude, they steadily held aloof from countenance or support of every step in Federal readjustment, from the inception to the consummation of the act. The rejection of the Fourteenth Amendment was the cause of the establishment of provisional military government in the South; through which government, according to the testimony of leading Southerners, law and order was brought to a turbulent people. Public opinion was divided as to the wisdom of enfranchising the negro, but out of the chaotic mass of reconstructive endeavors it was finally arranged that each Southern state should hold a constitutional convention, for whose members all loyal citizens, regardless of color,

</span></p><hr data-dcnode-id="1855"><a data-dcnode-id="1853" name="thoma306"><span data-dcnode-id="1854" instrument_node=""> Page 306</span></a><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">



should be permitted to vote. These events transpired in 1868. It was not until 1870 that the Fifteenth Constitutional Amendment was enacted. It will thence be seen that the freedmen were permitted to vote two years in advance of the time when most Northern negroes were granted suffrage, and only three years from the date of their actual emancipation.</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The three years immediately following our Civil War was the golden period of white Southern opportunity. Had there been loyal acquiescence in the Thirteenth Amendment, the Fourteenth would have been long delayed. Had the Fourteenth Amendment been promptly ratified, the Fifteenth would never have been promulgated; consequently, negro suffrage would have been altogether eliminated from Southern reconstruction. Even as matters were finally arranged, with the negro a factor in the premises, the actual determination of the political situation remained in the hands of the white South. For the freedmen, dazed with their sudden transition to giddy heights and overawed by unknown responsibilities, turned to their former masters, and, with a spirit of self-abnegation from which they are wholly divorced in these latter days, implored the white leaders of the South to accept place and preferment at their hands. But they were spurned with contempt. There was no other resource but to confide in strangers whose pretensions of disinterested service had won their confidence. Under such conditions state control

</span></p><hr data-dcnode-id="1847"><a data-dcnode-id="1845" name="thoma307"><span data-dcnode-id="1846" instrument_node=""> Page 307</span></a><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">



and national representation passed into the hands of an alien white class,--an event for which there will always rest upon the white South the greater blame. There were some persons of conviction and patriotic purpose, to whom political activity was a fulfilment of duty, regardless of partisan results or personal gains. Such were those who put country before party. If political passion and personal selfishness had been eliminated in their endeavor, with a broadminded statesmanship ruling the nation, the latent union sentiment existing in all the states would have been brought to the fore, and the governments established would have been universally superior and of more lasting benefit to all concerned than those which were erected.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;When the civil governments of the South were finally reconstructed, the white people of that section and their political sympathizers of the North sought to discredit them with the cry of negro domination. It was a baseless charge, but it served to arouse the worst passions of a masterful class. Its sole plausibility lay in the fact that negroes were voters, and held various subordinate offices under the new order of things. Southern reconstruction marks the blackest page in American history. It is well that its infamies and crimes are fast sinking into oblivion. These facts, however, are to be noted for the purpose of showing the important part the negro bore in public affairs. The constitutions of the reconstructed states were framed by white men, under the direction

</span></p><hr data-dcnode-id="1839"><a data-dcnode-id="1837" name="thoma308"><span data-dcnode-id="1838" instrument_node=""> Page 308</span></a><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">



and with the approval of the best legal intelligence of America. The majority of state executive offices and the most important were always filled by white men. The congressional delegations were composed of the same class of individuals. The leading men in both branches of every state legislature were representatives of the dominant race, as were the chief county officials. These white men planned and directed the financial and civic policy of their several states. It was they who created a bonded indebtedness, negotiated loans, levied and collected taxes, disbursed revenues, and therefore they, and they alone, were responsible for the good or evil wrought by a government of unique exigencies. The negro had a place in this nondescript scheme, but his place was that of registering factor of the schemes of white men whom he blindly trusted, and for whose culpability he is now vindictively execrated.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The odium attaching to Republican government in the South during the period of reconstruction is unjustly laid at the door of the negro. His ignorance, inexperience, and utter incapacity for intelligently exercising the functions of citizenship are made the source of all the venality, peculation, and mismanagement that characterized these states at that period. We may easily admit that it was a caricature on manhood suffrage to invest with civic functions ignorant beings clothed in patches, sleeping in hovels, and scarcely one remove in intelligence from their inseparable animal companions of plantation life. It

</span></p><hr data-dcnode-id="1831"><a data-dcnode-id="1829" name="thoma309"><span data-dcnode-id="1830" instrument_node=""> Page 309</span></a><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">



would, however, evidence unpardonable ignorance in any one who said that the negro has ever been a factor in legislation or a force in government. He has in no instance controlled a state or county government, or even dictated an important nomination. He is now, as he was the first day of his enfranchisement, the partisan tool of designing white men. Nor does this fact alter, whether the negro vote in any given community is numbered by hundreds or thousands; a venial Southern white Republican is its recognized political master.</span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It will not exonerate those whose duplicity led the negro to ruin to plead that he is utterly lacking in sincerity of motive or steadfastness of purpose, or that he seems unable to discriminate between the true and false, either as to men or things. If it is true that he failed to discern between knavery and candor, falsehood and truth, it is largely because specious promises were employed to beguile him. It does not extenuate the culpability of white leadership to say that among all classes the strong rule and the weak obey. We grant it; but does it not follow that leadership implies moral responsibility and power?--personal obligation to do right? It was an unpardonable blunder to enfranchise the negro, but it is an execrable crime to hold him responsible for the misdeeds of those who were in every sense the actual leaders. It is the rankest injustice to shift the crimes of intelligence to the shoulders of ignorance. It is a perversion of every

</span></p><hr data-dcnode-id="1823"><a data-dcnode-id="1821" name="thoma310"><span data-dcnode-id="1822" instrument_node=""> Page 310</span></a><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">



moral instinct, an insult to every sense of right-doing, to welcome back and honor the Northern white knave who went South penniless after the war and returned laden with the spoils of reconstructive peculation, and at the same time hurl anathemas at the black freedman whose only offence lay in faithfully doing the bidding of those who were accredited to him as guides and friends.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Neither partisan bigotry nor race prejudice should ignore facts. Less than two score years ago we had in our midst four million slaves in dense illiteracy, without the power of self-guidance, and ignorant of every principle of civilization or government policy. In that condition they were emancipated,--an act that made men and women of chattels and citizens of serfs. When enfranchisement clothed the negro with the badge of an elector, he voted the Republican ticket: that party had not only emancipated him, but conferred citizenship and suffrage. What was more natural than that he should affiliate with his friends? True, he was not conscious of the dignities or duties of citizenship, but he was anxious to learn, and after a fashion did acquire a dim apprehension of his civic functions. Had he then been blessed with honest and capable instructors, their guidance would have made a strong and stalwart man of him. But his leaders, selfish and corrupt themselves, constantly used him to subserve base purposes. To secure his vote they excited his cupidity and inflamed his passions, but they never sought to train his reason

</span></p><hr data-dcnode-id="1815"><a data-dcnode-id="1813" name="thoma311"><span data-dcnode-id="1814" instrument_node=""> Page 311</span></a><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">



or calm his judgment. During a political canvass he was industriously sought after, cajoled, and petted; at other times he was neglected and unknown. Of course, under such conditions the negro was easily corrupted. He saw himself simply as a political commodity, to be bought and sold to the highest bidder; and he has been, and is, bought and sold in state and national conventions by men who pose as examples of integrity and champions of the rights of man. This is the political school in which the negro has been trained, and in which he has been corrupted by his friends and overawed by his enemies. He is a coward because he is a political parasite. He is corrupt because he is a partisan mendicant. Hence he is the scapegoat of every disorder, the culprit in every crime.</span></p><span data-dcnode-id="1810" instrument_node="">
