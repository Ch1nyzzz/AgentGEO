</span></p><hr data-dcnode-id="3955"><a data-dcnode-id="3953" name="thoma65"><span data-dcnode-id="3954" instrument_node=""> Page 65</span></a><p data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">



of black men that they occupied responsible and 
confidential positions in the homes of the best Northern 
families, the doors of which to-day are closed to 
all negro applicants. Not only are they often 
excluded from the more exacting phases of domestic 
service, but they are largely shut out from kindred 
offices, such as those of steward, coachman, and 
private waiter,--lines of service that a generation 
ago were filled entirely by them. Nor has the negro 
fared better in other industries; for even as a barber, 
the Frenchman, Italian, Portuguese, and German 
have effectually supplanted him, and, through the 
evolutions of social change, have lifted what was 
in his hands menial work to an almost artistic 
perfection. We have referred to the increasing 
exclusion of negroes from private service. Perhaps the 
greatest drawback in the way of their procuring 
domestic employment is the innate fondness of negro 
men for white women. Coming from a section where 
social delinquencies are winked at, the less restrictive 
intercourse of the races in the North raises the 
presumption in their minds that all social barriers are 
eliminated. Therefore, while the negro women are 
amenable to impure proposals from their social 
superiors, the negro, men, crazed by their social freedom, 
become so emboldened by vicious contact as 
frequently to make improper advances toward the 
white female domestics of the houses where they are 
employed. The possibility of such occurrences 
furnishes the ground, it is fair to presume, for the

</span></p><hr data-dcnode-id="3950"><a data-dcnode-id="3948" name="thoma66"><span data-dcnode-id="3949" instrument_node=""> Page 66</span></a><p data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">



exclusion of negroes from vocations where they once 
enjoyed a monopoly, and which, in many respects, 
they are better fitted to fill than are the members of 
any other race.</span></p><span data-dcnode-id="3945" instrument_node="">
</span><p data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But while it is impossible for the negro to escape 
the consequences of his foolhardy pretensions, yet 
much of the social and industrial disaster which has 
overtaken him since emancipation has not been altogether 
of his own creating, but rather the direct outcome 
of the sophistical exhortations of his early 
accredited teachers. Their insistence was that he 
should abandon the fields of industry, of which he 
had some knowledge, and betake himself to others 
of unknown and untried endeavor, and for which he 
had neither preparatory training nor visible aptitude. 
Hence, jeered at as scullions and derided as menials, 
the modern negroes have quit the callings in which 
their fathers had right worthily wrought, to become 
declaiming pettifoggers, pulpit ranters, quack doctors,
and sham teachers. It is the nondescript representatives 
of these vocations who evince a proneness 
to speak in terms of depreciation, if not of positive 
contempt, of their ancestors and negroes of the present 
time employed in domestic capacities. But it is 
no undeserved tribute to say in this connection, that 
some of the best examples of good conduct and high 
character the race has ever known belonged to the 
class of humble domestic workers. Moreover, many 
of the former head waiters and stewards employed 
in hotel and steamboat service, in the selection of

</span></p><hr data-dcnode-id="3942"><a data-dcnode-id="3940" name="thoma67"><span data-dcnode-id="3941" instrument_node=""> Page 67</span></a><p data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">



subordinates and by the example they set in speech 
and demeanor, did more to create and maintain high 
ideals of negro manhood than the blatant pretensions 
of our modern negro ministry are ever likely to 
accomplish.</span></p><span data-dcnode-id="3937" instrument_node="">
</span><p data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Universal experience has demonstrated that ignorant 
masses of mankind are not aroused or elevated 
by mere contact with intelligent forces; and that fact 
brings into prominence a racial characteristic which, 
in view of its industrial bearing, ought to be 
considered. For two centuries and a half the negro 
has dwelt in the presence of a superior and vigorous 
civilization, and one that at times has sought 
to inculcate in him lofty notions of duty, industry, 
and power, with the result that he has acquired a 
fair degree of diligence, and is reasonably industrious 
when under capable supervision. But what he has 
not yet acquired is that self-propelling force inherent 
in the white race; nor has he fairly utilized in freedom 
what he gained in compulsory bondage. For, 
notwithstanding its wanton abuse of power, slavery 
taught negroes trades, and made many of them 
skilled workmen in every department of mechanical 
handicraft. To these freedom gave an unlimited 
field for the exercise of their trained faculties. It 
was this class of artisans who became men of affairs, 
took contracts, made money, acquired credit, bought 
property, and became substantial citizens in our 
Southern commonwealths,--a fact which furnishes 
conclusive evidence that a knowledge of tools lifts

</span></p><hr data-dcnode-id="3934"><a data-dcnode-id="3932" name="thoma68"><span data-dcnode-id="3933" instrument_node=""> Page 68</span></a><p data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">



a man immeasurably above his fellows and crowns 
him with the emblems of industrial kingship.</span></p><span data-dcnode-id="3929" instrument_node="">
</span><p data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But the slave-disciplined mechanic has no successor 
in the ranks of the freedmen, for the simple reason 
that they are lacking in mental energy and that 
subtle intelligence required of efficient artisans. The 
exclusion of the negro from the higher mechanical 
industries is due largely to his incapacity for acquiring 
a thorough painstaking knowledge of details. 
His sloven and slipshod methods are justly chargeable 
with his inability to achieve place and distinction 
in the mechanical field. Nor are we far amiss 
in saying that to these causes is due the fact that 
the race is not employed to any considerable extent 
in those large corporations managing the cotton and 
wool industries, the shoe factories, the iron mills, and 
machine shops of the country, North and South, 
though isolated examples of capable and trustworthy 
freedmen may be found in every department of 
skilled industry. There is a phase of this question, 
however, which has an important bearing on the 
future industrial development of the negro, and even 
now affects a saving remnant of the race; it is therefore 
entitled to candid treatment. We refer to the 
fact that there are black mechanics of known capacity 
and tried integrity who are not infrequently shut 
out from plying their vocation solely on account of 
racial prejudice, and in consequence thereof are compelled 
to resort to crude employments or starve.</span></p><span data-dcnode-id="3926" instrument_node="">
</span><p data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Now it is evident that exclusion from opportunity

</span></p><hr data-dcnode-id="3923"><a data-dcnode-id="3921" name="thoma69"><span data-dcnode-id="3922" instrument_node=""> Page 69</span></a><p data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">



to earn a living, based on color or other physical 
incident equally irrelevant, is an invasion of the 
rights of labor, and one which contravenes the spirit
and teachings of American institutions. A thorough 
preparation and competent performance should be 
insisted upon, but no less strenuously opportunity for 
achievement. When skilled negro labor is excluded 
from opportunities for work and material gain open 
to white men of no greater mechanical endowment,
a grave wrong has been perpetrated, and one that 
merits universal condemnation at the hands of all 
right-thinking men. But the crux of the whole
matter lies in the fact that the competent and 
incompetent, the trustworthy and untrustworthy negroes, 
are set apart from their white fellow-men by a 
distinctive color badge common to all. The caste 
disabilities, therefore, with which the deserving members 
of the race are burdened, become really formidable 
when we consider what color means to the educated, 
industrious, competent negro.</span></p><span data-dcnode-id="3918" instrument_node="">
</span><p data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Black is deemed a symbol of ignorance and inefficiency. 
The unknown negro of capacity and integrity, 
essaying to enter competitive avenues of industry, 
encounters at the very threshold of his career an 
intense and deep-seated distrust of his ability, which, 
if it does not summarily thrust him aside without 
opportunity of vindication, subjects him to suspicious 
surveillance and unjust exactions, until incontestible 
demonstration of personal ability compels recognition 
and subsequent respect. This is the gantlet which

</span></p><hr data-dcnode-id="3915"><a data-dcnode-id="3913" name="thoma70"><span data-dcnode-id="3914" instrument_node=""> Page 70</span></a><p data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">



all skilled negro laborers have to run in seeking 
employment. It is, however, the wholesome examples 
of such workmen as gain a foothold in the industrial 
world, through sheer pluck and endurance, that are 
slowly eliminating race prejudice, and inclining the 
employers of labor more and more to take men for 
what they can do in the way of productive results. 
We note also a growing tendency on the part of the 
trade unions, which have always been formidable 
barriers to the employment of freedmen in competitive 
vocations, to take broader views of the industrial 
problem. This is evinced by their permitting negroes 
in many instances to become members of trade associations. 
We may therefore cherish the hope that 
at no distant day the capable representatives of labor 
of every type will fraternize in competitive rivalry, 
and that when the industrial worker seeks for 
opportunities to render service, there will be no lack of 
steady work and a due appreciation of both white 
and black laboring men.</span></p><span data-dcnode-id="3910" instrument_node="">
</span><p data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The general unfitness of negro labor for other than 
the crudest endeavor has been thoroughly demonstrated 
in the United States and other parts of 
America where the negro dwells. But to substantiate 
our contention that he is industrially inefficient by 
inheritance, we quote a single well-attested example, 
furnished by South African experience. In 1898 
there were employed in one industry, in that section,
73,000 laborers, of whom 9000 were white men and 
the remainder negroes. All were engaged in the same

</span></p><hr data-dcnode-id="3907"><a data-dcnode-id="3905" name="thoma71"><span data-dcnode-id="3906" instrument_node=""> Page 71</span></a><p data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">



kind of labor, yet, owing to their superior fitness, the
white men earned, during the year, $15,000,000 in
wages, a sum as great as that which the 64,000 negroes
received during the same period. That is to say, the
white men earned per capita an average of $1784,
while their negro fellow-laborers received but $230
per capita, thus showing a difference in the individual
earning capacity of the two races of over $1500. 
What are the conclusions to be drawn from this 
statement and comparison, other than that the best 
educated and disciplined men always have a tremendous 
advantage over the inferiorly equipped; and 
further, that those who have acquired only a common 
rudimentary training are not only distanced at the 
start by better-trained competitors, but are forever 
doomed to constitute the rear-guard of our great 
industrial army. What is true of all conditions of life 
is not to be waived aside by flippant speech or craven 
plaints. Moreover, so long as all human growth is 
due solely to individual energy and intelligent foresight, 
the negro ought fully to realize that untiring 
industry and self-denying thrift are potential forces 
in any struggle for material acquisition, and that, 
when these factors are associated with intelligent 
prudence, they inevitably become, in all competitive 
industrial activities, the foreordained winners.</span></p><span data-dcnode-id="3902" instrument_node="">
</span><p data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No impartial observer of current phases of industrial 
economics fails to see that moral inadequacy is a
characteristic defect of the unskilled class, or to 
realize that there is no place in the modern world for

</span></p><hr data-dcnode-id="3899"><a data-dcnode-id="3897" name="thoma72"><span data-dcnode-id="3898" instrument_node=""> Page 72</span></a><p data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">



the sloven, the indifferent, or the unskilled industrial 
toiler. The untrained man is always at the mercy 
of conditions, and in every undertaking invites defeat 
from the start. Nor can one who works fitfully 
compete with a steady plodder. Such being the case, the 
question of discipline and training becomes a paramount 
issue in dealing with manual inefficiency. 
But, while there ought to be uniformity in industrial 
educational methods, and equality in opportunity for 
employment as well as for learning, yet it is the 
greatest folly to assume that one industrial worker is 
as good as another, though both may have had the 
same advantages. Industrial success is dependent 
upon the perceptive power and sense of moral 
responsibility inherent in the individual worker. 
Furthermore, as skill is the sole key to success, it becomes 
more and more evident that the future belongs to
the most strongly qualified and equipped races, and, 
within races themselves, to the best-trained men. 
Moreover all that is implied in industrial education 
is that the individual should make the wisest use of 
accessible means, and that a trained industrial worker 
is one who has the requisite ability to do a specific 
thing as it ought to be done.</span></p><span data-dcnode-id="3894" instrument_node="">
</span><p data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But, notwithstanding the manual inefficiency of 
the freedmen appears to be clearly demonstrated, we 
have profound belief in eventual negro regeneration 
through forceful methods of discipline; nor ought
there to exist any serious doubt that adequate training 
in constructive industries under capable instruction

</span></p><hr data-dcnode-id="3891"><a data-dcnode-id="3889" name="thoma73"><span data-dcnode-id="3890" instrument_node=""> Page 73</span></a><p data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">



will bring to the race self-mastery and efficient
development. The freedmen should be subjected therefore 
to thorough industrial drill in every department
of manual activity. It will raise their efficiency and
increase their compensation, but above all it is 
desirable because well-doing in itself brings out all of the
highest and best qualities in man. Work in itself is 
the highest opportunity and greatest instrument of 
negro development. But the supreme need of the 
hour is a racial baptism in truth, integrity, frugality, 
continuity of purpose, intelligent action. Endowed 
with these qualities, negroes cease to be the inferiors 
of others, but are the equals of all, and capable of 
reasonable achievements.</span></p><span data-dcnode-id="3886" instrument_node="">
</span><p data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We are ourselves of the conviction that any true 
uplifting of the negro in this country is to be found
in a return to country life and in working the soil;
nor will he, in our judgment, ever be rid of the shams
and delusions that now environ him until he is back
in simple touch with God and nature. If he desires
to acquire steadiness, sobriety, intelligence, morality,
physical harmony, and a clearer insight into duties
and responsibilities than the submerged living and
incessant strife of his present condition can possibly
afford, he will find that rural work constitutes a
basis for character-building incomparably beyond
that of any other agency within his reach.</span></p><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3882"></p><hr data-dcnode-id="3881"><a data-dcnode-id="3879" name="thoma74"><span data-dcnode-id="3880" instrument_node=""> Page 74</span></a><p data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">CHAPTER IV</span></h3><span data-dcnode-id="3874" instrument_node="">
</span><h3 align="center" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">MATERIAL THRIFT</span></h3><span data-dcnode-id="3871" instrument_node="">
</span><p data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;CONTRARY to a general impression, property owners 
were not rare among the free negro residents of the 
United States, prior to the Civil War. We have no 
trustworthy data by which to measure the wealth 
of those residing in the North, though it is known 
to have been considerable; but in the South, 
where separate racial statistics were kept, the value 
of property owned by free negroes was between 
$35,000,000 and $40,000,000. In the early history 
of the country free negroes had equal chance with 
the whites to acquire an interest in the soil, for the 
public domain was open to them for settlement on 
the same terms as to others. That in many 
instances they availed themselves of such opportunities 
is established by the fact that in Virginia and 
the other colonies they were taxed as landowners. 
But while the South formerly had and still contains 
the largest number of negro property owners, the 
mass of the freedmen have not made the advance in 
material prosperity which we of right had expected 
of them. To be sure, there is no authorized statistical 
exhibit which sets forth the aggregate material 

</span></p><hr data-dcnode-id="3868"><a data-dcnode-id="3866" name="thoma75"><span data-dcnode-id="3867" instrument_node=""> Page 75</span></a><p data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">



accumulations of the negro people; but, from the 
most trustworthy sources accessible, it may be 
inferred that at least fifteen per cent of them own 
property, and a conservative estimate puts the 
value of all real and personal property now held by 
that class throughout the United States at about 
$700,000,000, on which it is said they pay state 
and municipal taxes in excess of $3,000,000.</span></p><span data-dcnode-id="3863" instrument_node="">
</span><p data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We shall get a more accurate view of the freedman's 
opportunity for material gain by an 
inspection of his annual wage-earnings, which may be 
fairly put at $450,000,000, or about $56 per capita. 
The range of his expenditures is said to be: for food, 
$180,000,000; for clothes, $90,000,000; for rum 
and vices, $65,000,000 ; for rent, $40,000,000; for 
housefurnishings, $25,000,000; for fuel, $21,000,000; 
for landed property, $8,000,000; and deposits in 
banks, $5,000,000. Should these sums approximate 
the actual facts, the obvious conclusion is that the 
negro is not only deficient in industrial perseverance, 
but in provident forethought. For example, 
were negroes creative producers of wealth to the 
extent of one dollar per month, their yearly savings 
would foot up $100,000,000; or if from their earnings 
a saving per capita of twenty-five cents a month 
were made, the total annual cash deposits would reach 
$25,000,000. That this is not done is evidence that 
the freedmen do not represent a saving people, 
though there are to be found among them many 
striking examples of self-denying thrift. We grant

</span></p><hr data-dcnode-id="3860"><a data-dcnode-id="3858" name="thoma76"><span data-dcnode-id="3859" instrument_node=""> Page 76</span></a><p data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">



that adverse causes have operated against the race 
in the past, but, nevertheless, we are moved to point 
out these serious existing conditions in the belief 
that substantial benefit may accrue to those who 
have eyes to see and ears to hear.</span></p><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This exhibit is valuable to us chiefly for the sidelight 
which it throws on the financial status of the 
freedmen. For, granting they have accumulated 
property to the amount of $700,000,000, a division 
of that sum among 8,000,000 people will give to 
each individual less than $90 worth of property, 
or, in other words, it represents a saving of about 
$2.60 a year since emancipation. Such facts are 
significant, and effectually dispose of that bubble 
which asserts that "The freedmen have made 
unparalleled material progress since the war." 
Another unwarranted assertion, frequently indulged in 
by overzealous friends of the blacks, is that they 
are the wealth-producers of the South. It may be 
that they are mechanical factors in the primary 
forces of wealth-production. But who does not realize 
that back of any kind of mechanism stands the 
guiding force of mind, and as negroes are obviously 
deficient in administrative qualities, we deny that 
they are now, or ever have been, directing forces in 
any department of industrial activity. In fact, as 
matters stand, any cessation of their crude labors for 
others renders their starvation imminent.</span></p><span data-dcnode-id="3852" instrument_node="">
</span><p data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Broadly speaking, the three primary sources of 
material gain are agriculture, manufacture, and

</span></p><hr data-dcnode-id="3849"><a data-dcnode-id="3847" name="thoma77"><span data-dcnode-id="3848" instrument_node=""> Page 77</span></a><p data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">



trade. But as neither manufacturing nor commerce 
were distinctive features of Southern economy before 
the war, the people of that section were agriculturists, 
whose chief employment was raising cotton, 
the whitened fields of which were tilled by slave 
labor. In the other departments of industry the 
machinery, which exacted only the crudest knowledge 
of mechanics, was also in the hands of the 
bondmen, or the more shiftless poor whites. Dormant 
energies and inventive faculties were never 
stimulated into intelligent activity. Neither natural 
resources nor local incentive were wanting, for 
mineral wealth of fabulous value cropped out of every 
hillside and lay at its feet untouched, and from 
every mountain spur went forth a magnificent 
waterpower rivalling those of many Northern mill-sites 
Nevertheless, manufacturing languished, The swift-flowing 
stream was a stranger to the hum of the 
spindle or the vibration of the loom. The silence of 
the pine-covered hillside was undisturbed by the 
delving shovel, or plodding pick. Cotton was king, 
and negro slave labor its abject subject. Moreover, 
despite its pretensions to wealth, the South, as we 
now see, was in reality poor.</span></p><span data-dcnode-id="3844" instrument_node="">
</span><p data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The advent of freedom wrought in the South 
changes so great that within a single score of year 
it has built more railroads, constructed more cotton 
mills, erected more iron furnaces, located more factories, 
opened more coal mines, discovered a large 
mineral area, raises annually more cotton, and is in

</span></p><hr data-dcnode-id="3841"><a data-dcnode-id="3839" name="thoma78"><span data-dcnode-id="3840" instrument_node=""> Page 78</span></a><p data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">



possession of more available wealth than during the 
whole period of negro chattelism. Through these 
mighty forces of a silent and irresistible revolution 
every dashing river is alive with throbbing machinery 
and thriving activity; and mountains and hills are 
dotted with excavations for carboniferous deposits, 
and covered with tramways for transporting metallic 
ore. But what is of greater significance is that there 
may sometimes be seen in the wake of such transformative 
progress those who were the slave autocrats 
of yesterday and their former chattels, each 
busily engaged in acquiring the means for subsistence 
and wealth, and not infrequently rivals in competitive 
strife. Current statistics show that in the 
matter of cotton manufacture alone the South 
possesses over 500,000 spindles, and that its more than 
500 mills represent one-fourth of the textile 
industry of the country, and have an aggregate value 
exceeding $100,000,000. Fifty millions are invested 
in the cotton-seed oil industry, whose annual output 
exceeds $100,000,000. The value of the cotton crop 
in a raw state will not fall far short of $300,000,000.</span></p><span data-dcnode-id="3836" instrument_node="">
</span><p data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;So varied and complex are the economic conditions 
which surround the growth and manufacture of cotton, 
that it is not improbable that the entire cotton 
textile industry of the United States will at no distant 
day be transferred to the South, where the climate, 
water power, and other local advantages are 
strong competitive features of Northern mills. We 
need not be surprised, therefore, to see rivals of Lowell,

</span></p><hr data-dcnode-id="3833"><a data-dcnode-id="3831" name="thoma79"><span data-dcnode-id="3832" instrument_node=""> Page 79</span></a><p data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">



Lawrence, and Fall River planted in North Georgia, 
East Tennessee, and western North Carolina by 
Northern capital, and manned by American labor. 
Such a consummation does not imply the destruction 
of the textile mills of the North, for no doubt in that 
event they would be remodelled and devoted to the 
woollen manufacture, and so find profitable employment 
in a growing industry. The Merrimac may 
yet become the American Tweed, and surpass its 
transatlantic competitor in the quality and finish of 
its woollen goods. Meanwhile this is assured: the 
South in process of construction is a substantial gain 
to humanity over the one it has displaced, and it 
gives abundant promise of a prosperous and enduring 
future. All that is wanting to make the transformation 
complete is that the whole section forego 
idleness, take on thrift, open its green forests and 
barren fields to small husbandmen, and substitute, in 
law and politics, fraternal liberty and universal equality 
for class legislation and race domination. When 
that is done it may be safely predicted that no part 
of the Union will grow richer in honest wealth or 
stronger in intelligent development.</span></p><span data-dcnode-id="3828" instrument_node="">
</span><p data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Though the South is primarily an agricultural section, 
its economic methods are neither conducive to 
material thrift nor industrial elevation. Its dependent 
classes, white and black, are landless serfs, and 
feel bitterly the full force and effect of that significant 
aphorism which affirms that an ownership of 
land carries with it an ownership of men who live on

</span></p><hr data-dcnode-id="3825"><a data-dcnode-id="3823" name="thoma80"><span data-dcnode-id="3824" instrument_node=""> Page 80</span></a><p data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">



it. The result is that a condition of hopeless poverty, 
unknown elsewhere outside portions of continental 
Europe, exists in the Southern rural settlements. 
Thomas Jefferson uttered a profound economic truth 
when he said that the earth belonged in usufruct to 
the living, and to them only to derive subsistence and 
maintenance therefrom. With that sentiment all 
shades of leading economists agree; but back of all 
human selfishness and greed is recorded the original 
and universal title-deed to mankind, which commands 
men to "multiply and subdue the earth." Its fields 
forests, ocean, and air are the ordained storehouses 
of subsistence for industrious humanity, whose 
"right to live carried with it the right to earn the 
necessaries for living." Humanity has everywhere 
the right to demand, not only the opportunity to 
labor, but to receive a just share of the fruits of its 
industry, and in no more equitable way can this be 
done than by giving every human toiler an interest 
in the soil.</span></p><span data-dcnode-id="3820" instrument_node="">
</span><p data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The primary and essential factors in any successful 
movement undertaken for the uplifting of illiterate 
and indigent classes are land and education. 
This involves two elements: the establishment of 
sound economic conditions, and the creation of a 
class of intelligent and efficient producers. It is an 
incontrovertible fact that great wealth and great 
poverty always exist where wages are low. It is 
equally apparent that a poverty-ridden class engaged 
in great industrial activities is an economic fallacy,

</span></p><hr data-dcnode-id="3817"><a data-dcnode-id="3815" name="thoma81"><span data-dcnode-id="3816" instrument_node=""> Page 81</span></a><p data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">



because good wages enhance local values, and add to 
already acquired wealth. Now, the working force of 
plantation life is the freedman; obviously, then, to 
broaden his knowledge and increase his pay adds to 
the general prosperity. This is notably exemplified 
in that hunger for home-ownership, which is so 
characteristic of the negro of brain and brawn, and 
who has somehow by dint of skill and rare frugality, 
become a small landowner and prosperous proprietor. 
We also see evidence of a similar spirit in a class of 
thrifty negro mechanics and plodding all-sorts, who, 
on the outskirts of some sleepy village or drowsing 
town or piney cross-roads, own a few acres of land 
and live contentedly in humble cottages. The man 
who owns the soil he tills, and is conscious that he 
alone is the rightful and exclusive possessor thereof, 
has a sense of manly independence which landless 
classes lack; and these sentiments are not only the 
life-springs that build up fresh, healthy, noble characters 
in individuals, but constitute, as well, the bulwarks 
of solid national development.</span></p><span data-dcnode-id="3812" instrument_node="">
</span><p data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Landownership is unquestionably a substantial factor 
in race improvement. We maintain that it ought 
to take precedence over all other agencies for negro 
uplifting, for the reason that a landowner, great or 
small, is a fixture in the community, and thereby 
acquires a vested right in its welfare and development. 
Nor is it the nominal ownership of an extensive area 
of land, but a small homestead, with the inclination 
and ability to cultivate it, that the poor man needs.

</span></p><hr data-dcnode-id="3809"><a data-dcnode-id="3807" name="thoma82"><span data-dcnode-id="3808" instrument_node=""> Page 82</span></a><p data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">



But as the Southern plantation usually represents an 
extensive area of land, with rarely a disposition on 
the part of the owner to sell a small parcel, and as 
but few of the freedmen have either the means or the 
credit to purchase a large plantation outright, the 
result is that the great majority of them are landless 
dependants. Confronted, therefore, by inexorable 
economic conditions, it would be well could the 
negro race, as well as other landless inhabitants 
of the South, be stimulated into an effort of relentless 
activity against land monopoly and labor bondage 
through some feasible method of coöperative land 
purchase. But evidently, where there is a desire on 
the part of such persons to acquire a landed interest, 
the first step toward that end necessarily lies in 
intelligent association, and a combination of the 
means of the laboring classes within either race. 
To aid such movements, we present the following 
practical suggestion.</span></p><span data-dcnode-id="3804" instrument_node="">
</span><p data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have made a computation based on 100 families, 
organized as a land purchasing association. Let it be 
supposed that an organization is effected in September, 
with the fee for membership fixed at $10, and 
with stated assessments at $4 a month. In the 
month of February following its organization the 
association will have, in cash, $3000. With this 
sum thirty mules are bought, and 1000 acres of land 
rented, for the use of which one-third of the cotton 
raised is to be given in payment of rent. Thirty 
families of the society are designated to till the soil.

</span></p><hr data-dcnode-id="3801"><a data-dcnode-id="3799" name="thoma83"><span data-dcnode-id="3800" instrument_node=""> Page 83</span></a><p data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">



An average crop will yield 300 bales of cotton; besides, 
considerable food subsistence should be produced 
on spare ground. At the close of the season, a division 
of the crop is made on this basis: 100 bales of 
cotton go for rent; 100 bales to the thirty families, 
for the labor of production; and 100 bales to the 
association, which if sold at six cents a pound will 
net $2400. The financial exhibit at the beginning 
of the second year, in February, should show cash, per 
assessments, $4800; from sale of cotton, $2400; 
making in all, $7200; which should be invested in 
mules and farming implements, in order that the whole 
association may engage in cotton-growing the second 
year. Hence, for that end, 4000 acres are leased; the 
assessments are reduced to $2 a month as a guarantee 
fund for incidental expenses. We will suppose, as the 
result of the second year's experience, that the 
total production of cotton is 1500 bales, which are 
distributed as follows: 500 bales go to the landowner for 
rent; 500 for service of production, and 500 bales to 
the association fund. The latter, if sold at six cents a 
pound, will net a return of $12,000; the assessments 
will aggregate $2400; and both combined will give 
the association at the beginning of the third year 
a cash fund of $14,400.</span></p><span data-dcnode-id="3796" instrument_node="">
</span><p data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We will now assume that 4000 acres of land 
are bought, let us say at a cost of $40,000, with 
one-third of the purchase money paid in hand. The 
remaining indebtedness is secured by a mortgage on 
the land, which should be discharged by annual payments

</span></p><hr data-dcnode-id="3793"><a data-dcnode-id="3791" name="thoma84"><span data-dcnode-id="3792" instrument_node=""> Page 84</span></a><p data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">



extending over one, two, and three years. The
monthly assessments should then be reduced to one dollar 
a month, though each family continues its annual 
contribution of five bales of cotton to the common 
treasury, besides being required to raise a sufficient 
food supply for its own consumption during the following 
year. Granting that a coöperative movement for 
land purchase such as we have described has been 
fairly inaugurated, we pass over the intervening
period, and note the results of three years' experience. 
Fifteen hundred bales of cotton, the property 
of the association, should return in clear profit, 
$36,000, a sum that will lift the land encumbrance, 
pay the interest on deferred payments, and meet current 
taxes, besides providing a substantial sum for 
distribution among the coöperating families for 
the improvement of their local homes. It is, of course, 
understood that the final liquidation of land indebtedness 
would be followed by a partition of the property, 
and the issuance of a deed in fee simple for forty 
acres of land to each participating head of family.</span></p><span data-dcnode-id="3788" instrument_node="">
</span><p data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This brief survey of Southern material possibilities 
shows that within five years the indigent laborer 
may through intelligent coöperation acquire a 
proprietary right to the soil, and become a substantial 
citizen. Nor do we speak unadvisedly in saying 
that opportunity for substantial race improvement 
lies in the adoption of a proposition entirely practicable 
under honest and intelligent leadership. Every 
intelligent person who is in any degree familiar with

</span></p><hr data-dcnode-id="3785"><a data-dcnode-id="3783" name="thoma85"><span data-dcnode-id="3784" instrument_node=""> Page 85</span></a><p data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">



the facts of Southern life and resources can testify 
that extraordinary returns for comparatively small 
investments are not only possible, but substantially 
assured by this simple coöperation method. Moreover, 
the experience of building associations and 
coöperative banks furnishes conspicuous examples of 
what mutual self-help may accomplish, and the 
successful material amelioration of the laboring classes 
in Pennsylvania and Massachusetts through such 
agencies sufficiently attests the remunerative merits 
of such coworking.</span></p><span data-dcnode-id="3780" instrument_node="">
</span><p data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To be sure, the negro is not an adept in aggressive, 
worldly shrewdness, nor the representative of a great 
money-making race. Perhaps his ethical conceptions 
prompt him to forego much that is immediate and 
practical in human affairs. Be that as it may, he 
ought, nevertheless, to be true to his best instincts, 
and faithful to those known duties which relate to 
himself and family. Whatever lifts him above his 
present dependent level should be eagerly embraced 
and judiciously undertaken, and as landownership 
will do for him what no other agency can accomplish, 
every true man in the race should bestir himself, 
and set on foot at once some method of land 
purchase that will provide homes for himself and his 
people. Nor can the colored preachers of the South 
render more efficient service to their race than by 
actively and honestly leading them in this matter 
of material progress, for in no other way can they 
so wisely contribute to the development and maintenance

</span></p><hr data-dcnode-id="3777"><a data-dcnode-id="3775" name="thoma86"><span data-dcnode-id="3776" instrument_node=""> Page 86</span></a><p data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">



of a high standard of Christianity among the 
freed people.</span></p><span data-dcnode-id="3772" instrument_node="">
</span><p data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;While we insist that negroes, in common with other 
indigent classes, shall use all legitimate means to 
improve their physical condition, we are not unmindful 
of what many well-informed persons hold to be 
true, that the general government is under moral 
obligations to devise such measures of relief for the 
freed people as will ameliorate their condition. Specious 
pleading and sophistical ingenuity may interpose 
objections, but this statement of facts remains 
unanswered. The negroes were held as slaves under 
national and constitutional law, they were emancipated 
by the same authority, and in each instance 
national jurisprudence was held to be supreme. If 
slavery was right, emancipation was wrong, while if 
the reverse is true, negroes were illegally and arbitrarily 
held to a service for which they received neither 
adequate recompense nor reward. There is no denial 
here that individuals were the nominal owners of 
negro slaves, but it is indisputable that the general 
government was a prime factor in maintaining them 
in bondage. But, waiving aside all questions of 
government liability, prior to national emancipation, we 
may reasonably conclude that some compensation is 
due to the negroes for services rendered after 
January 1, 1863, to the close of the war, and the 
adjustment of those changed relations imposed by 
freedom.</span></p><span data-dcnode-id="3769" instrument_node="">
</span><p data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is scarcely need to cite precedents and quote

</span></p><hr data-dcnode-id="3766"><a data-dcnode-id="3764" name="thoma87"><span data-dcnode-id="3765" instrument_node=""> Page 87</span></a><p data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">



authorities in support of this conclusion, since numerous 
well-authenticated decisions under the common 
law fully cover the ground here taken. A reference 
in point is that of indentured minors, who, on attaining 
their majority, have been unlawfully restrained of 
their liberty and continued in compulsory service. 
In such cases adequate compensation and, not 
infrequently, exemplary damages have been awarded by 
the courts. Assuming our statement of facts to be 
correct, and construction of law judicially sound, we 
discover, in estimating the number of working slaves 
at 1,200,000 persons, that, by allowing them pay 
for labor performed from January 1, 1863, to July 1, 
1865, at the rate of $60 per year, there would be due 
them, for the thirty months' service, $180,000,000. 
Granting, therefore, that recompense ought to be
made to the freedmen, there is no measure of 
compensation that could be devised which would secure 
such beneficent results to them as the ownership of 
land; and a legislative enactment which provided for 
its acquisition by these people would be truly of the dignity 
of statesmanship.</span></p><span data-dcnode-id="3761" instrument_node="">
</span><p data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We now advance the suggestion that the general 
government set apart a quantity of land in each 
Southern state for the exclusive benefit of the freed 
people, on the same principle that it has heretofore 
granted land subsidies to railroads and corporations, 
to promote the public welfare. That open to 
homestead entry should be used for this purpose. According 
to the report of the Land Commissioner, there are in

</span></p><hr data-dcnode-id="3758"><a data-dcnode-id="3756" name="thoma88"><span data-dcnode-id="3757" instrument_node=""> Page 88</span></a><p data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">



Alabama, Florida, Mississippi, Louisiana, and Arkansas,
more than 100,000,000 acres of public land.
In each of the other South Atlantic and Gulf states,
the Federal government should acquire by purchase
2000 square miles of territory, an area, that represents
1,280,000 acres of land, and by subdivision and
allotment of forty acres to a homestead, give to
each Southern state 30,000 small landed proprietors.
The purchase cost of the land and the erection
of necessary dwelling-houses should not exceed
$10,000,000. The buying of mules, farm implements, 
seeds, fertilizers, and the first year's subsistence
would require an additional six millions of
money, making the government outlay, for 30,000
well-equipped farms, $16,000,000, or requiring a
grand total expenditure of $128,000,000 in the 
designated states for the acquirement of homesteads 
for a negro population of 1,200,000 persons.</span></p><span data-dcnode-id="3753" instrument_node="">
</span><p data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It will be observed that this estimate excludes possible 
entries of the public domain. Should such be 
available, it will reduce, this sum by at least thirty 
millions, otherwise the foregoing estimates, based on
a maximum local valuation, will cover all necessary 
expenses for the first cost. The proposed appropriation 
for mules, farm implements, and subsistence 
will show a decided falling off in any practical application 
of this suggestion, since it will be found that 
many of the negro planters are already supplied. 
The savings made therefore, in this and other directions, 
from the total appropriation should be expended

</span></p><hr data-dcnode-id="3750"><a data-dcnode-id="3748" name="thoma89"><span data-dcnode-id="3749" instrument_node=""> Page 89</span></a><p data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">



in the erection of schoolhouses for normal and industrial
education, which should be put on a basis of
self-support by utilizing the remaining 80,000 acres
of land in each state, in the manner now indicated.
This land should be disposed of in forty-acre
lots, under lease, contingent on the probity and 
industry of the tenant, and annual rental of three
bales of cotton, and should yield a yearly school fund
of 6000 bales, and have, in all probability, an average
market value of $150,000.</span></p><span data-dcnode-id="3745" instrument_node="">
</span><p data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Our conviction is that the acquirement of land and 
education, under competent supervision, will work 
a transformation in the negro race. Hence, at 
the inception of a movement of this sort, suitable 
school buildings, not exceeding in cost $1500 each, 
should be erected, say one for each 100 families. 
This would give 300 schoolhouses to each state, 
and the total expenditure in this direction ought 
not to exceed $4,000,000. These schools, under 
the management of competent instructors, should 
be kept open eight months in the year; and just 
here it may be remarked that, in the event of 
such a movement as this land scheme contemplates 
being undertaken, it would be for the best interest 
of all concerned that distributed settlements of negro 
tenants, in communities of 100 families each, should 
be made. It would be unwise, and would defeat 
the end in view, to segregate the race in one locality. 
Moreover, distribution of these settlements 
would not only healthfully stimulate their own

</span></p><hr data-dcnode-id="3742"><a data-dcnode-id="3740" name="thoma90"><span data-dcnode-id="3741" instrument_node=""> Page 90</span></a><p data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">



industrial forces, but would exert a powerful 
influence of the most salutary nature on outside 
industrial agencies, and in the end bring the whole 
South into harmonious accord with the idea here 
broached.</span></p><span data-dcnode-id="3737" instrument_node="">
</span><p data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But to continue the discussion of the main 
proposition. Each of these 30,000 farms should be
leased for a period of three years, to thrifty and 
well-approved tenants, for an annual rental of three bales
of cotton, with the privilege of purchase at the 
expiration of lease. A probation of three years will 
significantly test the fitness and integrity of the tenants,
and assure deserving purchasers of land. Other 
safeguards that will readily suggest themselves should
be thrown around both the government and tenant
interest, not to hamper either, but to insure on the
part of each an exact fulfilment of all the conditions
stipulated in the contract. The total rent for three
years will reach the sum of 2,160,000 bales of cotton,
which, at a reasonable estimate, will have a cash
value of at least $60,000,000,--a sum of money that
represents nearly one-half of the original investment.
But with the termination of the tenant period these
farms should be sold on a credit of five years, and
paid for in five deferred annual payments, to be made
in cotton, at the rate of three bales each year, the 
government to retain an equitable title until all 
liabilities are discharged by the purchaser, when its 
patent should issue to him. In this matter of land 
purchase we contemplate that its entire supervision

</span></p><hr data-dcnode-id="3734"><a data-dcnode-id="3732" name="thoma91"><span data-dcnode-id="3733" instrument_node=""> Page 91</span></a><p data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">



should be under the direction and control of the 
national Interior Department.</span></p><span data-dcnode-id="3729" instrument_node="">
</span><p data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A conservative estimate of the monetary return 
that will accrue to the government by carrying out 
this proposition, shows that 240,000 farms with an 
annual rent roll of three bales of cotton from each 
farm will aggregate 720,000 bales a year, or a total 
of 3,600,000 bales for five years, which, if sold at 
$25 per bale, will yield in cash $90,000,000. When, 
therefore, we add to this sum the $60,000,000 
previously received as rent, it will be seen that the 
government has in eight years had returned to it 
$150,000,000 on its original investment, or an excess 
over all expenditure of more than $20,000,000, to say 
nothing of the hundreds of millions of dollars of 
wealth which it has been the means of creating for 
a previously indigent class. The expense attending 
these transactions would be nominal, for no doubt the 
large class of school-teachers, which we shall presume 
to be in the employ of the government, would be 
retained as subordinate agents, while the present corps 
of special agents of the Treasury would likely have 
general supervision of all financial matters. In any 
event, we are confident that the necessary annual 
expenditure would not exceed a quarter of a million 
dollars,--a sum which the rents from the school lands, 
to which reference has already been made, would amply 
provide. All payments to the government, 
whether as rent or purchase money, should either be 
covered into the national Treasury, or else employed

</span></p><hr data-dcnode-id="3726"><a data-dcnode-id="3724" name="thoma92"><span data-dcnode-id="3725" instrument_node=""> Page 92</span></a><p data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">



in the purchase of additional land for distribution and 
occupation, on terms similar to those we have described. 
In the latter case, the revenues accruing 
from such landed indebtedness could very properly 
constitute a sinking fund, for the payment of such 
portion of the national debt as may have matured 
during that period.</span></p><span data-dcnode-id="3721" instrument_node="">
</span><p data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This discussion of government duty in the matter 
of affording material relief to the freedmen, while by 
no means exhaustive, as indeed it was not meant to 
be, is, nevertheless, pertinently suggestive of latent 
resources, of infinite possibilities, and of immeasurable 
gains in morals, intelligence, wealth, and homogenous
civilization, to both of our Southern classes, and consequently 
to the nation at large. No gratuities in land, 
food, shelter, or clothing are sought for the freedmen; 
all we ask is that full opportunity be given
them to become useful, law-abiding citizens of the
community in which they live; and in no better way
can that result be reached than by aiding them to
become self-respecting and self-sustaining custodians
of rural homes. Nor is apology deemed necessary for
a proposition whose utility is so obvious, and whose
humanitarian qualities are so conspicuous, nor ought
pleadings to be invoked for a measure that seeks to
award a degree of reparation for past and present
wrongs, committed by a powerful nation against a
helpless people. This possible achievement for the
freedmen of this country has its practical prototype
among the serfs of Russia, whose freedom came only

</span></p><hr data-dcnode-id="3718"><a data-dcnode-id="3716" name="thoma93"><span data-dcnode-id="3717" instrument_node=""> Page 93</span></a><p data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">



two years earlier than that of our slaves. In 
emancipating her serfs Russia advanced loans to them 
upon their standing crops, and up to date has 
invested nearly $500,000,000 in land purchase for 
their settlement which they are to repay in stated 
instalments. The consequences is that freedmen 
are noted for industry and frugality in the management 
of their homes, and have strikingly distinguished 
themselves for good government and the 
advancement of popular education.</span></p><span data-dcnode-id="3713" instrument_node="">
</span><p data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Previous to the Civil War the United States 
Treasury had a surplus of funds which was distributed 
among the several states. The wisdom of that 
measure has always been in doubt, but our national 
legislature is never lacking in distinguished 
members who are ready to advocate a lavish expenditure 
of public money for schemes of doubtful value. Let 
us, therefore, indulge the hope that at no distant day 
our Congress may rise to the dignity of sound political 
wisdom, and, through a judicious use of means 
already at command, solve a problem of almost 
inextricable comprehension. We have already called the 
attention of the country to this subject in numerous 
publications; and during the sessions of the Fifty-first 
Congress the late General Cogswell of 
Massachusetts had the kindness to introduce a bill for us 
whose main features, provided for ten normal and 
industrial schools for the freedmen, and, similar to 
lines laid down here, for the purchase of 6400 acres 
of land in each of the ten states designated, and the

</span></p><hr data-dcnode-id="3710"><a data-dcnode-id="3708" name="thoma94"><span data-dcnode-id="3709" instrument_node=""> Page 94</span></a><p data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">


erection of an industrial institute, and settlement of 
100 selected negro families on each of these tracts of 
land. It is needless to say the bill never became a 
law. And yet, if such an enterprise were created by 
the government, or through private means, its influence 
and effect on Southern economics would be incalculable, 
both as a practical object-lesson in thrift to 
the white planters and as a source of inspiration to 
our benighted freedmen.</span></p><span data-dcnode-id="3705" instrument_node="">
</span><p data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The chief aim of our preceding observations has 
been to exhibit the wide difference, as modes of land 
culture, which exists between the present labor methods 
of plantation service and those of an intelligently 
managed lease system, though in so doing we have 
not sought to introduce new and untried innovations, 
but rather to readjust existing agricultural methods. 
A better comprehension of this subject may, however, 
be gained by stating that the cultivated cotton area 
of the United States exceeds 20,000,000 acres, and 
has an average production of about 175 pounds to 
the acre; that fully 3,000,000 persons are engaged 
in its production, with an output per capita of less 
than three bales; and that the planter's net profit, 
under the present system of cotton-growing, will not, 
under the most favorable circumstances, exceed five 
per cent of his gross production.</span></p><span data-dcnode-id="3702" instrument_node="">
</span><p data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We now deal with the question of material thrift 
in a way that is believed to cover the whole problem 
of negro industrial elevation; and the two propositions 
which are presented below, while involving a

</span></p><hr data-dcnode-id="3699"><a data-dcnode-id="3697" name="thoma95"><span data-dcnode-id="3698" instrument_node=""> Page 95</span></a><p data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">



radical change in Southern industrial methods, are 
obviously fraught with advantages to both the white 
and black people of the South. Our first proposition, 
which deals with land cultivation by tenants under 
lease, aims to effect a division of large tracts of
tillage land into small allotments, with each tract 
cultivated by a responsible laborer under specified 
conditions. For illustration, we will take a planter 
engaged in cotton culture, owning 1200 acres of 
land, worth, we will say, $10 an acre, or $12,000 
for the whole tract. We will assume that 300 acres 
are devoted to that staple, with an annual crop of 100 
bales, and calculating the cost of production by 
ordinary methods, we shall get the following result: The 
wages of twenty negroes at $8 a month for eight
months' labor in ploughing and cultivation will be 
$1280. The cost of their food, estimated at $3.50 
a month each, will require an outlay of $560 more, 
and the feed of mules and incidental expenses will 
add $200. To pick the cotton will cost about $300, 
hence the aggregate of these sums will bring up the
total expense of the year to $2300 as the amount 
required to produce 100 bales of cotton, which, if 
sold at $30 a bale, will bring $3000. After deducting 
the expenses of production, the planter will have 
a credit balance of about $700, though such a fair 
margin is not always realized in ordinary experience.</span></p><span data-dcnode-id="3694" instrument_node="">
</span><p data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;On the other hand, suppose this planter subdivides 
his plantation into thirty farms of forty acres each, 
and secures thirty capable and trustworthy tenants.

</span></p><hr data-dcnode-id="3691"><a data-dcnode-id="3689" name="thoma96"><span data-dcnode-id="3690" instrument_node=""> Page 96</span></a><p data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">



To each of them he leases a farm for an annual rental 
of four bales of cotton, the agreement binding the 
lessee to plant and cultivate each year during 
occupancy fifteen acres in cotton, ten acres in corn, and 
ten acres in pease, potatoes, and other food products. 
Such a distribution of farm produce should always be 
insisted upon, not only to guarantee the rent, but to 
secure the diversity in crop-raising meant to provide 
the tenant with food supplies for the coming year. 
At present, one of the most serious drawbacks to 
Southern industrial prosperity lies in pledging the 
ungrown crop for current food supplies. This method 
is not likely to be set aside without the exercise of 
wise forethought and intelligent self-denial. For some 
reason the people of that section, white and black, 
have never acquired the habit which is the key of 
all agricultural success, of raising and laying by a 
surplus of breadstuff for future use. In any 
practical test an industrial movement of this kind will 
give these results. The rent of thirty farms, at four 
bales of cotton each, will aggregate 120 bales, which 
at $25 a bale will net $3000,--a sum that represents 
clear gain to the planter without the least 
outlay of money or labor on his part, and returning 
a profit of over twenty per cent on capital invested 
in land. Should the same conditions obtain for five 
years, the landowner will then have received in rents 
$15,000, or more than one hundred per cent on the 
original investment.</span></p><span data-dcnode-id="3686" instrument_node="">
</span><p data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What are the gains under this system to the tenant,

</span></p><hr data-dcnode-id="3683"><a data-dcnode-id="3681" name="thoma97"><span data-dcnode-id="3682" instrument_node=""> Page 97</span></a><p data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">



would be a pertinent query. After deducting cost of 
production, and excluding reserved foods, a fair 
estimate will give at least $100 in cash to the lessee,--a sum that puts him on the road to prospective
wealth, and away beyond any comparison with 
previous earnings. But aside from any gain in material
growth, this process of labor distribution and supervision 
teaches the most important lesson of plantation 
life,--that is, the faculty of raising and storing 
subsistence for future use. Observe, moreover, that when 
a laborer leases land and pays a fixed rental for its use, 
he is in every respect lifted above the level of a 
wage-worker, and by that act alone has taken a long stride
toward industrial independence. Productive capacity 
and personal compensation is measured by what 
individual effort decrees or health permits. A negro
tenant, therefore, with ordinary thrift and foresight, 
should, at the end of five years, have a comfortable 
house, good farming implements, mules and horses, 
cows and hogs, and at least $500 in cash. He 
should also have acquired habits of industry and 
prudence, and be fitted by experience and practical 
knowledge to become a capable, self-directing owner
of the soil; for to that end all such industrial 
movements should be directed.</span></p><span data-dcnode-id="3678" instrument_node="">
</span><p data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Before passing to the next phase of this industrial 
question, we desire to call attention to certain salutary 
advantages involved in these suggested changes in 
plantation methods. It will be seen that this plan 
contemplates the assignment of a single family to a

</span></p><hr data-dcnode-id="3675"><a data-dcnode-id="3673" name="thoma98"><span data-dcnode-id="3674" instrument_node=""> Page 98</span></a><p data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">



specified parcel of land for residence and cultivation. 
A judicious isolation of negro families is a necessary 
step in the social elevation of the race. Such separation, 
moreover, will promote industry by developing 
commendable rivalry among tenants in land production. 
It will also create individual responsibility in 
oversight and execution, and is admirably adapted 
to serve every phase of plantation service. Nor is 
there the slightest doubt that by abandoning existing
industrial methods the quality and character of negro 
labor will in a short time be perceptibly elevated, 
which would result in substantial increase in 
agricultural products at a lower cost to the planter and 
higher remuneration to the laborer. Finally, an 
arrangement of this sort opens the way to the core 
of our proposition, which seeks to enable thrifty 
negroes to become lessees of land.</span></p><span data-dcnode-id="3670" instrument_node="">
</span><p data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We now take up the second proposition, and carry 
the illustration to its conclusion, by supposing that 
at the close of a five years' satisfactory experience 
in renting land to tenants, this thrifty owner, for a 
consideration of twenty-five bales of cotton, or its 
equivalent, to be paid in annual instalments of five 
bales each, sells to his negro tenants a farm of forty 
acres, giving a deed, and taking a mortgage on the 
land as security for deferred payments. We will 
further presume that the conditions of sale are carried 
out in good faith, with every obligation promptly 
met, and, in that case, it requires no seer to foretell 
the result. On the one hand, there is a negro farmer

</span></p><hr data-dcnode-id="3667"><a data-dcnode-id="3665" name="thoma99"><span data-dcnode-id="3666" instrument_node=""> Page 99</span></a><p data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">



with debt paid and mortgage cancelled, the owner 
of a free home. On the other there is a white owner, 
who has, on an investment of $12,000, received in 
ten years over three hundred per cent gain, and 
possibly a larger sum, besides having developed in 
his community a thrifty settlement of negroes.</span></p><span data-dcnode-id="3662" instrument_node="">
</span><p data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have purposely elaborated this proposition, in 
order conclusively to show that these suggested 
improvements in plantation methods afford genuine 
self-help to any dependent, struggling class. By 
such means the thrifty wage-taker may not only 
become a lessee of the land, but pass from that 
condition to a proprietor of the soil; and, when once 
absolute owner of his person and surroundings, he 
is bound to take on a new and conscious manhood. 
With his best energies directed toward developing 
his possessions, his log hut gives place to a cottage, 
the pine bushes make way for fruit trees, the broom 
sage for flowers; the unstabled mule is snugly sheltered 
in a comfortable barn, while the lowing of cattle, 
the bleating of sheep, the grunting of swine, and the 
cackling of fowls bear witness to thrift and prosperity. 
Nor is this all. Newspapers and books will be 
regular and welcome visitors to these rural homes, 
and the church, schoolhouse, and society will be
neither forgotten nor neglected. Such, we predict, 
are some of the changes that will be wrought and 
results achieved during the years of material growth, 
in which the previous pauper freedman grows into 
true manhood and worthy citizenship.</span></p><span data-dcnode-id="3659" instrument_node="">
</span><hr data-dcnode-id="3658"><a data-dcnode-id="3656" name="thoma100"><span data-dcnode-id="3657" instrument_node=""> Page 100</span></a><p data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">
</span></p><p data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;That the changes which we have proposed in the 
relations of the freedmen to local economic conditions 
have passed beyond the tentative stage, and have 
become fixtures in Southern plantation life, is 
demonstrated by the fact that all of the Southern 
states furnish numerous examples of landowners who have 
leased their plantations to freedmen, and are 
burdened by no greater care than receiving rents and 
paying taxes. Other planters have subdivided their
lands into small allotments, and sold them on credit
to their former slaves and other freedmen, giving 
them ample time to pay for their purchases by the 
products of the soil. Such experiments have not 
only been attended with the most satisfactory results, 
but attest what success the plan would have, 
elaborated on a broader scale as in our suggestions.
Nevertheless, a vital difference in the two methods 
exists, for it will be noted that where land has been 
leased to the freedmen, the planter's concern ceased 
when his stipulated rent was received; while our 
plan involves the training of the adult freedman in 
economical methods, as well as the education of his 
children, and in the end creating a home for them 
and providing means for its maintenance.</span></p><span data-dcnode-id="3651" instrument_node="">
</span><p data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The obvious benefits to be derived from small, 
well-managed farms, when considered either as a source 
of profit to their owners, or with reference to their 
uplifting influence on a community, are not to be 
overestimated. Not only is industrial ambition 
stimulated by a personal ownership of the land one

</span></p><hr data-dcnode-id="3648"><a data-dcnode-id="3646" name="thoma101"><span data-dcnode-id="3647" instrument_node=""> Page 101</span></a><p data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">



tills, but every acre of ground brought under 
productive cultivation through such means adds to the 
actual and taxable property of the state. It also 
conserves public morals, and in manifest ways 
contributes to the welfare of mankind. White emigration 
to the South is yearly increasing in volume, and 
that fact leads to the belief that the mechanical 
industries will hereafter claim a greater share of 
Southern economic attention. Should such condition 
obtain, existing methods of cotton growing are likely 
to undergo a change. In that case it is not 
improbable that the present plantation system would be 
supplanted by small farms, each of them owned and 
cultivated, we trust, by its proprietor, as in France, 
where a majority of her agricultural class are owners 
of the land, or as in thrifty Switzerland, where out of 
600,000 heads of families, 500,000 own the soil they 
cultivate. The German gardeners of Long Island and 
their frugal compatriots around Newark, New Jersey, 
have shown us what can be accomplished in this 
country with a small area of land through intelligent 
management and industrious application.</span></p><span data-dcnode-id="3643" instrument_node="">
</span><p data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;That the South contains millions of acres of fertile 
but untilled soil is not to be gainsaid; that the landless 
poor whites and negroes are industrial slaves is 
also an indisputable fact. When these two phases 
of Southern life are fairly considered, and the low 
valuation of land taken into account, no financial 
enterprise exists, we believe, which assures so large 
a return upon capital as judicious investments in

</span></p><hr data-dcnode-id="3640"><a data-dcnode-id="3638" name="thoma102"><span data-dcnode-id="3639" instrument_node=""> Page 102</span></a><p data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">



Southern agricultural lands, and letting them in small 
parcels to tenants, under fixed terms of occupancy 
and supervision. It may be like a "voice crying in 
the wilderness" to emphasize the social importance 
and economic value of this suggestion; but were 
this matter once seriously and practically considered, 
even from the dividend point of view, which is the 
most likely to win the heartiest response from the 
moneyed classes, we are thoroughly persuaded that 
the actual profit in rents would not only return 
enormous incomes to the investors, but in the near 
future open up a source of trade in interstate commerce 
without parallel on the continent.</span></p><span data-dcnode-id="3635" instrument_node="">
</span><p data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;"Land for the landless" is the burden of our 
contention, because we are well advised that neither 
the white nor black indigent classes will ever own 
land or become settled in sobriety and usefulness 
until, through some method of land lease, the way 
is open to them to purchase homes. Our proposition 
indicates the way for the creation of tenant communities 
located on small holdings. Five hundred 
dollars would be the maximum price of forty acres 
of excellent cotton land in any rural community. In 
fact, millions of acres of superior virgin soil could be 
purchased in many sections at a rate per acre of one-third 
this sum. But, assuming the average price to 
aggregate $500 for forty acres, the question then for 
investigators to determine is, What will be the likely 
income? That is not a difficult matter, for, assuming 
that each tract of land would be let at a rental of

</span></p><hr data-dcnode-id="3632"><a data-dcnode-id="3630" name="thoma103"><span data-dcnode-id="3631" instrument_node=""> Page 103</span></a><p data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">



three bales of cotton, or its equivalent, every 
leaseholder would annually return to the lessor a cash 
rent of $60, that is, an income of twelve per cent on 
a $500 investment. Such income would be assured, 
even though cotton should uniformly sell at a five 
per cent rate. There is no probability that the selling 
price of cotton will ever go below that figure, 
and we have every reason to believe that it will 
generally be quoted at a higher rate. In that event, 
it will materially increase rental values.</span></p><span data-dcnode-id="3627" instrument_node="">
</span><p data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The questions here broached are of national significance, 
and broadly appeal to the best instincts of 
American philanthropy, for the paramount intent of 
such a system of land culture is to develop stability 
and thrift in the working classes. But were this 
matter seriously taken in hand, in order to safeguard 
the interests of both parties, we should advise 
discriminate care in the selection of tenants, and 
that their leaseholds be subject to annual renewals. 
Such an arrangement leaves the way open for getting 
rid of objectionable tenants, and also operates 
as an incentive to well-doing to the industrious 
workers. Such, as we have described, are the 
economic and social forces awaiting wise exploitation. 
With money ruling at four per cent in financial 
circles, what safer or more conservative investment 
is offered to the savings-banks, the custodians of 
trust funds, and to persons of means, than that 
which the purchase of Southern lands affords; and 
where else would we find such permanent incomes,

</span></p><hr data-dcnode-id="3624"><a data-dcnode-id="3622" name="thoma104"><span data-dcnode-id="3623" instrument_node=""> Page 104</span></a><p data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">



and such absolute securities of ever increasing values, 
as in Southern fields and forests?</span></p><span data-dcnode-id="3619" instrument_node="">
</span><p data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This is an age of organization for every phase
of human activity. Capital concentrates in gigantic
trusts. Skilled industry intrenches in powerful 
combinations. Philanthropy masses its resources under
disciplined leadership, and all religions, in their best
expressions and tenderest moods, plead for fraternal
fellowship and common effort against the powers of
darkness. Confronted by such conditions, we are
sanguine enough to believe that Southern social and
industrial problems are certain of eventual satisfactory
adjustment, through the evolution of sound economic
agencies. But so far the negro people have not
found in these movements hints for their guidance, 
and, above all others, have refrained from joining in 
the grand march of events. Meanwhile, opportunities 
unsurpassed for acquiring homes and permanence are 
fast slipping away from landless poverty, so that, unless 
there shall come such a racial awakening as we 
have not hitherto witnessed, the negro will be thrust 
to the rear, and forever remain, as in the past, a poor 
illiterate, menial dependant. On the other hand, we 
are convinced that, were negro settlements of landowners 
established, with their schools, churches, workshops, 
and stores equipped and managed by competent 
members of the race, they would be a source of genuine 
inspiration to thrift and manhood. One such 
example would surpass every other influence hitherto 
instituted for the redemption of the freedmen.</span></p><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3615"></p><hr data-dcnode-id="3614"><a data-dcnode-id="3612" name="thoma105"><span data-dcnode-id="3613" instrument_node=""> Page 105</span></a><p data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">CHAPTER V</span></h3><span data-dcnode-id="3607" instrument_node="">
</span><h3 align="center" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">CHARACTERISTIC TRAITS</span></h3><span data-dcnode-id="3604" instrument_node="">
</span><p data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;THE pure negro type, whether in India, Europe,
Africa, or America, always displays those identical
external characteristics which so markedly 
differentiate it from the rest of mankind. But while
prognathous features and black hues are inseparable
characteristics of negro people, it is well to keep in
mind that color of any shade is erasable by admixture
with contrary colors, just as a specific physical
contour is readily changed by amalgamation with 
unlike physical forms. Both of these results have been,
in many instances, effected among these people.
Still, as neither of these processes has eradicated
other racial traits, which are always exhibited
where a preponderance of negro blood exists, we are
