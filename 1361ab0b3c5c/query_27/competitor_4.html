</span><p data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The basis of all sound religious belief has three 
essential elements, viz.: a belief in deity, belief in 
future human existence, belief in the relation of the 
present life to the future. Now the negro is, 
preeminently, a religious being, and a devout believer in 
all things which lie beyond the scope of his vision or
reason. To him, hell and heaven are literal abodes, 
one of endless pain, the other of eternal repose. The 
mansions of bliss are celestial homes; the garniture 
of glory, tangible realities; the apparel of the saints, 
actual garments of white, golden slippers, and 
dazzling crowns; the food of the redeemed, milk and
honey; their recreations, songs of praise on golden
harps. Hence, the negro has a vivid conception of 
a future life of compensation and fruition; of an 
actual deity he has more or less beclouded notions; 
but of the relations of the present life to the future 
he has but an inadequate conception. We must, 
therefore, for any intelligent understanding of the 
subject, interpret negro ethnic belief in the light of 
these facts, and in so doing we shall observe that, 
in its every phase of manifestation, negro religion

</span></p><hr data-dcnode-id="3255"><a data-dcnode-id="3253" name="thoma149"><span data-dcnode-id="3254" instrument_node=""> Page 149</span></a><p data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">



represents a conglomerate survival of ancient savage 
faith.</span></p><span data-dcnode-id="3250" instrument_node="">
</span><p data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;In his native home, the negro was a fetich 
worshipper, devoid of reverence, but possessed of 
superabundant awe of unseen gods. He was brought 
here with a savage religion ingrained in every 
fibre of his being. Once on these shores, he was 
inducted into a form of Christian belief, by force 
rather than by faith, which, superimposed on his 
uneradicated ancestral religion, has wrought a 
blindness of prodigious import. But the negro neither 
in slavery had, nor has he now, intelligent convictions 
regarding sectarian preference. As a slave, he 
was compelled to follow the religious attachment 
of his master; as a freeman he followed the whim 
and impulse of religious association. In his transition 
from slavery to freedom he underwent a religious 
change which may best be described by saying that 
while the freedman has a larger mental apprehension 
of Christianity, the religious slave had a deeper 
spiritual insight, and a more familiar acquaintance 
with Old and New Testament events.</span></p><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The pastoral life of the slave gave him opportunity 
for meditation; he dwelt on prophetic visions, and 
the wonders of the Apocalypse enraptured his 
overwrought imagination. His religious instinct was 
quickened by the rapt songs of his race, whose music, 
so weird and plaintive in expression, often disclosed 
the sorrows and aspirations of its composers. 
Surprise has often been expressed that the negro should

</span></p><hr data-dcnode-id="3244"><a data-dcnode-id="3242" name="thoma150"><span data-dcnode-id="3243" instrument_node=""> Page 150</span></a><p data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">



have maintained such stolid passiveness in servitude. 
Such an attitude was in strict keeping with a faith 
that, in its higher reaches, unconsciously exemplified 
the martyrdom of patience, the heroism of despair. 
To the slave physical emancipation was a hope 
deferred, but endless freedom lay just beyond; while 
there was toil here, there was rest hereafter; of what 
avail, then, were bondage and stripes on earth, when
death opened the gateway to a sensuous paradise?</span></p><span data-dcnode-id="3239" instrument_node="">
</span><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What we have striven to make clear up to this 
point is, that negro religion is primarily a sensuous 
faith built of incongruous matter. But in comparing 
the religion of the slave with that of the free negro, 
we are bound to admit that, while that of the former 
was crude in conception and illiterate in expression, 
it was loyal to the ideal which it sought to realize. 
In the case of the latter, with his larger opportunities 
and greater knowledge, there is a visible 
degeneration in spiritual appreciation, moral consciousness, 
candor of belief, and personal integrity. It is well 
to bear this distinction in mind, since what follows 
deals with the current phases of negro character and 
belief.</span></p><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Turning to negro religion in its present form, the 
question is rightly asked, What is its comprehension 
of the functions of nature, human society, and 
Christianity; and to what degree has it contributed to the 
solution of the problems of the present day? Still 
further, To what extent does it conform in precept 
and practice to the enunciated principles of sound

</span></p><hr data-dcnode-id="3233"><a data-dcnode-id="3231" name="thoma151"><span data-dcnode-id="3232" instrument_node=""> Page 151</span></a><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">



Christian polity? For answer, neither evasive shibboleths 
nor subterfuges will suffice, in the presence of
that infallible test, "By their fruits ye shall know
them,"--the one inexorable criterion for determining 
all shams and realities. Millions of nominal citizens
are in our midst, who by their every instinct and act
are aliens to the Christian culture of this hemisphere.
In consequence of their adherence to an ethnic 
religion which is functioned by a priesthood as illiterate
as themselves, and whose scandalous follies set at 
defiance every canon of the decalogue, we have in them
a significant menace to the civilization of this age.</span></p><span data-dcnode-id="3228" instrument_node="">
</span><p data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Under existing conditions the negro priesthood is 
largely recruited from a pretentious class who enter 
the ministry for social recognition, for official 
preferment, for idle maintenance and unearned support, 
and who, by deliberately shunning contact with 
intelligence, rarely become conscious of their own 
shortcomings. They are filled with conceits, and prate 
with glib assurance and authority about the most 
abstruse subjects, under the vain impression that 
they possess an amazing fecundity of learning,--although the paucity of their knowledge is 
transparent to others. As passed masters in the art of 
dissimulation, they evince wonderful skill, and in 
the acquisition of scriptural phraseology they can 
reel off Biblical texts with such deftness as to 
deceive even the "elect" with their show of sanctity, 
which only proves that speech and action are 
distinct things. No people can speak more knowingly

</span></p><hr data-dcnode-id="3225"><a data-dcnode-id="3223" name="thoma152"><span data-dcnode-id="3224" instrument_node=""> Page 152</span></a><p data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">



of Christian obligation, and none are less
observant of its duties. And their manifest 
disregard of the ordinary morality of daily life leads to 
the conclusion that "though ever learning, they are 
never able to come to a knowledge of the truth."</span></p><span data-dcnode-id="3220" instrument_node="">
</span><p data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is an open secret that many negro preachers 
who have attained great notoriety within their race 
by solemnly masquerading in garments of seeming 
righteousness, find intense satisfaction in praise 
evoked by pulpit effusions, the original material of 
which was got together through indiscriminate 
pilferings. In fact, the freedmen have but few preachers 
among them who do not purloin their discourses 
from the printed sermons of white ministers, but 
whose illiterate mannerisms so distort the original 
as to render it of little value. Plagiarism is not the 
sole crime of our current negro ministry. It is well 
known that desecraters of human welfare boldly 
stalk into negro sanctuaries, overshadow the pews, 
dominate the altars, invade the precincts of domestic 
life, despoil the family fireside, and through 
bewildering sophistries yoke virgin innocence and brazen 
guilt. It must be confessed that ungodliness is 
triumphant when negro temples of worship are turned
into debauching rendezvous, with prayer-meetings 
transformed into séances of sensuous contortions and 
physical frenzies. Human regeneration is out of the 
question where material greed riots, and eternal 
conflict is waged between a dollar and a human soul, 
with the inevitable sequence that the dollar wins,

</span></p><hr data-dcnode-id="3217"><a data-dcnode-id="3215" name="thoma153"><span data-dcnode-id="3216" instrument_node=""> Page 153</span></a><p data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">



and that too in the face of the divine mandate that
they who do such things shall not inherit the kingdom
of God.</span></p><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;These are serious charges, but so capable of 
substantiation that outraged humanity has a right to
rebuke the audacities of selfishness. Tricks and
tricksters are forever out of place in a Christian
church. Vulgar pomposities and brazen mendacities
in leadership and power should not be tolerated nor 
endured. Leadership ought to mean men of clear
discernment, of robust insight, of direct determination,
and forceful energy; men of thrift, of indefatigable
industry, and eternal alertness; men of moral
affluence, the wealth of frugality, veracity, punctuality,
and diligence, qualities of mind and heart that
are the woof and web of all values. In brief, the
need of the hour in negro life is inexorable realities;
that imperative need should cause all shams, 
pretensions, subterfuges, evasions, insincerities, and 
exaggerations to flee from honest daylight and hide
themselves in everlasting darkness.</span></p><span data-dcnode-id="3209" instrument_node="">
</span><p data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;That negro religion is worthless as a factor in race 
regeneration is a justified conclusion in face of the 
fact that the most heinous crimes are committed by 
those who read and write and are members of negro 
churches. It may be said that these negro culprits 
are "sinners fallen from grace." But may it not be 
fairly inferred that the "saints" of the race are 
wanting as examples of wholesome living? Can 
it be truthfully denied that the great majority of

</span></p><hr data-dcnode-id="3206"><a data-dcnode-id="3204" name="thoma154"><span data-dcnode-id="3205" instrument_node=""> Page 154</span></a><p data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">



the professedly religious negroes are visibly seamed 
and seared with carnal vices, or that falsehood, 
hypocrisy, pilfering and drunkenness are but minor
vibrations in an ascending gamut of "saintly" 
turpitude? But while it is a foregone conclusion that
the social and religious demoralization of the negro
is great, there ought to be virility enough in American
negro manhood to face the truth regardless of
whither it may lead. In fact, no person of intelligent
discernment can be found who will admit that
he is contented with the present attitude of current
negro religion, or affirm that it is either a vital factor
or regenerative force in racial life. For charity's
sake, good intentions will be conceded, even where
ignorance riots and idleness revels in turbulent
luxury,--but always with the reservation that where
the "spirit was willing, the flesh was weak." Negro
religion is unconscious of the tremendous upheavals
going on around it, either in ethical thought or
practical Christian living, and is impervious to the
impressions which these processes have wrought 
elsewhere. Hence, the issue here raised, in truth the
sole problem, is, Will the existing negro religion
bestir itself?--can its lethargy be shaken, its 
excrescences shorn?--has it the ability to appropriate
new ideas, evolve lofty aims, and, animated by the
freshness and vigor of a new truth, take a place
among the forces of modern Christianity?</span></p><span data-dcnode-id="3201" instrument_node="">
</span><p data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;One insuperable difficulty confronts any undertaking 
aimed at race redemption, if directed by purely

</span></p><hr data-dcnode-id="3198"><a data-dcnode-id="3196" name="thoma155"><span data-dcnode-id="3197" instrument_node=""> Page 155</span></a><p data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">



negroid agencies, and that is, the moral instability of 
negro character. One might as well attempt to 
weave a rope of sand as to direct a people swayed 
by impulse, torn asunder by petty jealousies, and 
dominated by selfishness, people whose abnormal 
egotism is overlaid with dense ignorance of eternal
verities, an ignorance, too, that, barren of satisfying 
resources within itself, is dependent upon external 
excitants for gratification, and in consequence is 
driven by restless and unappeasable desire to gross 
physical excesses. No people are to be regarded as 
morally sound who are willingly ignorant and vicious, 
and just so long as the greater number of them is 
averse to acquiring sound judgment and lofty ideals
of truth and duty, their redemption will prove a
chimerical conjecture. Another thing is certain: any
religion is a sham which does not make of its disciples
better men and women. And for the vitalizing
forces that would accomplish this the present
religion of the negro cannot stand the ordeal of
searching inspection. Such inspection would expose
the demoralization of its adherents and the hollowness
of grotesque forms, which are ridiculous and
even pathetic by reason of their abnormal decrepitude. 
The perpetuity of these conditions accentuates
the ethical depravity of the negro. We believe
racial regeneration to be possible, but at the same
time absolutely contingent upon a radical change in
the religious ideas and actual living of the freedmen.
The ability to know God is the highest aspiration of

</span></p><hr data-dcnode-id="3193"><a data-dcnode-id="3191" name="thoma156"><span data-dcnode-id="3192" instrument_node=""> Page 156</span></a><p data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">



the finite mind. But as negro religion, by statement 
and method, strives to stifle in the minds of its followers 
every intelligent reaching after divine truth, we 
are constrained to believe that it lacks the power of 
self-redemption, and will never, unaided, rid itself of 
gross deceptions.</span></p><span data-dcnode-id="3188" instrument_node="">
</span><p data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Vinet, with sententious brevity, has aptly said that 
Christianity is conscience raised to the highest exercise. 
Man's supremest need is the courage to be 
right and to do right. A coward is a moral monstrosity 
and cravenness the source of iniquity, because 
fear, leading either to ferocity or falsehood, blocks 
the way to moral betterment. Now, in the light of 
these statements, what is the opportunity and duty 
of self-respecting negro Christianity for religious 
awakening, for loyal agreement, for nobility of 
purpose, for life now and hereafter? Its chief and 
foremost duty is to make character the sole test and 
criterion of a Christian life, and to see to it that a 
life devoid of courage, veracity, sincerity, and honest 
piety is not rated as a Christian character. Already 
in this matter a negro manhood and womanhood is 
astir, whose efforts to free the freedman's mind and 
morals from sensuous chattelism neither bigotry with 
audacity nor ignorance with numbers can defeat; for, 
having themselves become disentangled from ethical
depravity, they are implacably arrayed against it, 
with neither belief nor confidence in the methods of 
negro religious teachers. There is growing up within 
the race a new school of religious believers, and the

</span></p><hr data-dcnode-id="3185"><a data-dcnode-id="3183" name="thoma157"><span data-dcnode-id="3184" instrument_node=""> Page 157</span></a><p data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">



cleavage between them and the old is impossible to
close. The old represents dreams, shadows, 
misdirected energy, impeached veracity, ephemeral fidelity, 
deficient judgment, and thorough satisfaction with 
specious achievement. The new exacts character, 
consistency, integrity, industry, common sense, 
simplicity, clearness, beneficent service, and, above all, 
fervent piety in word and deed. But unfortunately 
the awakened are a very few, with whom the 
sleeping masses have no fellowship; however, God is 
patient, and waits long for men to learn his lessons 
of truth and justice.</span></p><span data-dcnode-id="3180" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is a grave misfortune to negro humanity that 
its sectarian religious organizations are wanting in
an intelligent and educated priesthood; a ministry
of clean-handed and clean-hearted men; teachers
of righteousness consecrated to human service, and
loyal to the truth; a ministry of men, endowed
with common sense, that finite quality of infinite
origin, which invests its possessors with wisdom and
understanding, and teaches them to shun folly, to do
right and be right, and to know the highest needs
and wants of their fellow-men. To be sure, a group
of nondescript negro schools exists, which are 
assumed to supply every conceivable need, but their
educational methods and means are of a 
poverty-stricken sort, and wholly inadequate to meet 
existing wants. Besides wasting a wealth of energy on
ostentatious vanities, these bawbles of pedantry
never undertake to develop in their pupils integrity

</span></p><hr data-dcnode-id="3177"><a data-dcnode-id="3175" name="thoma158"><span data-dcnode-id="3176" instrument_node=""> Page 158</span></a><p data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">



and veracity. They utterly fail to instil into the 
negro mind any comprehension of the higher 
functions of life, or to originate any influence that sorts 
the true from the false, or the wise from the simple 
of the race. No doubt, defective ethical thought is 
responsible for much that is amiss in negro life. 
The divine dictum, "As a man thinks, so he is," 
finds but slight credence among the illiterate who 
have never learned, and openly deny, that true 
spiritual vitality depends upon right conceptions. 
We have, therefore, no clear evidence to show that 
the freedman believes the beginning and continuance 
of human regeneration is in sound convictions of 
truth and duty, and that growth in Christian 
grace and knowledge is attained only by following 
the line of conduct set forth in the teachings and 
life of Christ.</span></p><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Again, what negro religion needs is a leadership 
endowed with divine instincts. Its present leadership 
has never learned the lesson of self-abnegation, 
nor the law that "he who would save his life, must 
lose it" in self-forgetfulness. For a pertinent 
object-lesson in this direction our negro priesthood of all 
degrees might turn with profit to the inspiring 
example of personal effacement furnished by 
the Roman Catholic Church, within whose folds the 
petty ambitions of its priests commonly count for 
little. The supreme good of the church, they are 
drilled, is the first and foremost consideration. 
Pontiffs, cardinals, bishops, and priests come, go, and are

</span></p><hr data-dcnode-id="3169"><a data-dcnode-id="3167" name="thoma159"><span data-dcnode-id="3168" instrument_node=""> Page 159</span></a><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">



forgotten, while the fixed aims and definite purposes 
of the church move on with measured pace their 
destined way. The lack of competent leadership, of 
adequate endowment, or rather, we ought to say, the 
presence of negro leadership with extinct ideas and 
of impious hypocrisies, has driven the race into 
dangerous, and forsooth almost inextricable, passes. 
Among them there has been a shifting of burdens, a 
shirking of duty, with sloth set over against industry, 
cowardice against courage, and notorious mendacities 
and impious wantonness have revelled without 
shame and without remorse on the reckless shearings 
plucked from deluded flocks by the hand of 
rapacity and greed.</span></p><span data-dcnode-id="3164" instrument_node="">
</span><p data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;In extenuation and excuse it is sometimes said--
although the French have it, that he who excuses 
himself, accuses himself--that the negro, has had no 
opportunity for acquiring practical experience in large 
public affairs; and what he evidently lacks in clear 
insight and capable efficiency is to be attributed to race 
exclusion from power and place rather than to any 
inherent deficiency in actual capacity. Such claims 
are the sheerest folly. With social conditions awaiting 
a guide, the requisite qualities for capable leadership 
are in individual life; and the logical inference 
is that where such qualities are not in evidence, they 
do not exist. What more magnificent field for 
exploiting capable faculties or deploying trained 
forces exists, than that afforded in the domain of 
negro religion. Do not its surging millions offer

</span></p><hr data-dcnode-id="3161"><a data-dcnode-id="3159" name="thoma160"><span data-dcnode-id="3160" instrument_node=""> Page 160</span></a><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">



opportunity and inspiration alike to souls aflame 
with genuine ability to mould and direct? Within 
its folds multitudes of earnest men and women, with 
millions of consecrated dollars, await the call of wise 
activity for beneficent service; still no hand is 
raised to blaze the way.</span></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Race guidance such as we have displays 
marvellous shrewdness and consummate craft in pandering 
to vicious followers for place and power; but beyond 
the meretricious notoriety it acquires, it cannot be 
credited with praiseworthy motives or noble acts. 
Unexampled opportunities for beneficent service to 
humanity are constantly thrust in its pathway, but 
they, in every instance, are flung aside either through 
wanton recklessness or ignorance of means to utilize 
them. With such conclusive facts before us, we cannot 
afford to extenuate racial shortcomings or 
condone its misdeeds. The American negro, in and out 
of church relations, is passing through a crisis, and,
with the odds everywhere against him, is being tried
and tested as never before. Incompetent leaders and 
their despicable methods must go; greed and selfishness 
have no right to beguile negro credulity. The
necessities of the race, the good of humanity, require
that men of human insight and business sagacity, 
having the capacity to conduct themselves and affairs 
intrusted to them along sensible and helpful lines, 
should be set in places of leadership and race guidance.</span></p><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The obvious inefficiency and weakness of negro 
leadership is further emphasized by the fact that race

</span></p><hr data-dcnode-id="3150"><a data-dcnode-id="3148" name="thoma161"><span data-dcnode-id="3149" instrument_node=""> Page 161</span></a><p data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">



churches have not escaped the evils of sectionalism. 
A senseless degree of hostility exists between the 
sectarian organizations of the North and South, and 
bitter animosities have usurped the sway of peace and 
good will. The freedmen do not seem to realize that 
strife is a formidable impediment to their advancement, 
and that no servile and oppressed people can 
afford to quarrel among themselves. There is, among 
negroes, not only a strong undertow of prejudice, but, 
within their local religious organizations, mismanagement,
discord, and disintegration are characteristic 
features; and we have yet to discover a single 
sectarian society under negro control that has evinced a 
capacity for wise self-government. Meanwhile, the 
gravity of such defects become more pronounced when 
the fact is recalled that negro sectarianism is not 
original in its polity, but is a more or less imperfect 
transcript of already established white organizations.</span></p><span data-dcnode-id="3145" instrument_node="">
</span><p data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Into every movement for reform two elements 
must enter. The first requirement is an adequate 
knowledge of existing evils; the second requirement, 
a willing capacity to correct them. We have 
shown that the negro is not endowed with an 
inherent sense of law and order. Neither protest, 
entreaty, nor example has ever effected a transformation 
to this end in his character. The first step 
toward the sound regeneration of his nature is to 
eradicate, root and branch, his lawless impulses. We 
are of the opinion that no effective means can be 
devised for that end which does not have as its

</span></p><hr data-dcnode-id="3142"><a data-dcnode-id="3140" name="thoma162"><span data-dcnode-id="3141" instrument_node=""> Page 162</span></a><p data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">



chief factor efficient coercive force. But when the 
negro has been brought to a condition of willing 
obedience to law, the second stop in his awakening 
is to create within him such a conscious self-respect 
as will develop manhood and instil integrity into 
every fibre of his being, so that, by giving practical 
evidence of ability and capacity to appreciate sensibly 
and discharge properly the duties and responsibilities 
of life, he may deserve and win the confidence 
of religious contemporaries.</span></p><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3132"><span data-dcnode-id="3136" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The necessity of negro regeneration having been 
established, the initial instrument for racial 
awakening is in our judgment sectarian disintegration. And 
we further believe that the most consummate agent 
for the redemption of the race will be found in its 
subjection to a superior white Christian supervision. 
We discriminate advisedly in using the expression, 
</span><i data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">superior white Christian supervision</span></i><span data-dcnode-id="3133" instrument_node="">, for nothing less 
than the best ethical thought and example would be 
of the slightest value in such an undertaking. We 
are well aware that intolerance, bigotry, selfishness, 
and fanaticism are directive in many phases of 
white Christianity. Of that sort of tutelage the 
freedmen have had a surfeit. What they now 
need is the guidance of men conscious of God, 
and free of soul, conscience, and intellect, who fully 
recognize their moral needs and are adequately 
qualified to administer to their wants. The chief function 
of Christianity, as we understand it, is to deal 
intelligently with every issue affecting human welfare, and

</span></p><hr data-dcnode-id="3131"><a data-dcnode-id="3129" name="thoma163"><span data-dcnode-id="3130" instrument_node=""> Page 163</span></a><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">



unquestionably the best interests of society are involved 
in raising this submerged class. In fact, American 
Christianity can render to God or man no greater 
service than that which would come through its 
fraternal union for negro redemption. Nor are 
conclusive examples wanting to prove that, when negroes 
are placed under capable white leadership, they 
become more intelligent in method and more faithful 
in performance than when left to their own guidance, 
where many of them now chafe under restraints 
imposed by a leadership that does not command their 
obedience and respect.</span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The negro ministry will no doubt raise vigorous
objection to the suggestion that their religious 
organizations ought to be placed under the supervision of 
competent white oversight; for, though gulping with 
avidity every form of specious praise, they revolt at 
wholesome correction and repel with sensitive resentment 
adverse criticism. Still, substantial reasons exist 
why this should be done, and, among others, the 
following are noted as foremost. Negro religionists 
are always wanting in either clear or abiding conceptions 
of Christian principles; they are not endowed 
with a steadfast devotion to truth and duty, nor 
have they achieved, through their current religious 
methods, any visible uplifting of the negro race. 
Furthermore, their ethical platitudes are in deserved 
disrepute, especially that preposterous contention for 
the rightful existence of heinous vice and godly 
grace in the same person. That is to say, this specious

</span></p><hr data-dcnode-id="3123"><a data-dcnode-id="3121" name="thoma164"><span data-dcnode-id="3122" instrument_node=""> Page 164</span></a><p data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">



postulate affirms that bodily sin and spiritual 
regeneration are compatible, coexistent facts, on the 
ground that physical and spiritual natures, being 
separate and distinct entities, physical acts do not 
involve or contaminate the spiritual essence of man. 
Now the inevitable sequence of such duplicity is that 
these negro religionists with great assertiveness 
arrogate to themselves exalted virtues, but at the same
time, deliberately and of set purpose, follow their
own vicious inclinations. Infamous vices, therefore,
fail to awaken in the religious freedmen repugnance,
but rather induce a condition of moral obliquity, 
which condones crimes and approves, or is 
indifferent to, venality, They seem to have neither 
the ability nor desire for self-purgation from evil. 
It is not unfair to say, that self-extrication is 
impossible to a people wanting in strong mental qualities, 
and who evince little capacity for moral progress.
The negro, then, has a choice of two courses: either
to drift soul and body into eternal perdition, or else,
with an awakened sense of imminent peril, to commit 
his mental and moral guidance to the trained
forces of an advanced Christian civilization.</span></p><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have endeavored up to this point to indicate 
the leading characteristics of negro religion in order 
that enlightened evangelical sentiment might fairly 
judge to what extent it deals with eternal verities 
and chases shadowy phantoms. We shall now 
undertake to show how these traits and impulses may be 
directed into channels of usefulness and godly living.

</span></p><hr data-dcnode-id="3115"><a data-dcnode-id="3113" name="thoma165"><span data-dcnode-id="3114" instrument_node=""> Page 165</span></a><p data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">



But here, as in other phases of this question, the 
subject must be dealt with from a standpoint of ethnic 
psychology, and with reference to all its related 
facts. As we see it, the fundamental defect in negro 
religion is not a want of mental cognition, but a 
spiritual inability to realize the essential import of 
Christian truth. There is no assimilation of ethical 
principles, nor application of them to everyday 
living. To the negro, religion is a transient impulse, 
a kind of hypnotic sensation, a thing entirely apart 
from and outside of ordinary life and duty. What 
we should seek to do, then, is to awaken in him a 
sense of spiritual realities, to restrain and direct the 
exuberance of his emotions. In his nature intelligent 
guidance and moral stamina, combined, ought 
to develop some of the finest qualities of perfect 
manhood and ideal Christianity. Nor does such a 
consummation appear difficult of achievement, when 
it is fully realized that, in dealing with the negro, we 
are dealing with a primitive people, of crude ethnic 
beliefs, but of warm generous impulses and misdirected 
energies. We need also to keep to the fore 
faith in the belief that human regeneration and 
personal redemption are realities, and that divine truth 
has the power to evolve, even in a people now sitting 
in darkness and the shadow of death, a life 
consecrated to love and duty.</span></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We believe American Christianity has, in the 
person of the negro, an unmeasured wealth of latent 
spiritual energy, which will be aroused and consecrated

</span></p><hr data-dcnode-id="3107"><a data-dcnode-id="3105" name="thoma166"><span data-dcnode-id="3106" instrument_node=""> Page 166</span></a><p data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">



when the notion of sacerdotalism is scattered 
from before his clouded vision, when transmitted 
ethnic fetichism is eradicated from his religion, and 
the virility of his nature, bared of empty forms of 
righteousness, is breathed upon by the spirit of God 
himself. With all the better instincts of their being 
stimulated by the white heat of endeavor, under a 
conscious knowledge that transmitted crimes do not 
shut men out of the kingdom, nor paternal faults 
and maternal follies close the door of divine kinship 
against them, what shall hinder even sensuous and 
illiterate negro humanity from becoming regenerated 
by the ideals of truth and righteousness? There is 
a well-founded conviction that in all men there is a 
spiritual force which yearns for divine realities, for 
love, sympathy, justice, and mercy, and that it is of 
such vitality and potency as to fill wasted lives and 
blasted hopes with divine immanence, and re-create 
manhood and womanhood in battered and shattered 
human forms. Such moral cravings of souls 
a-hunger for truth and godliness are more than 
psychological hallucinations. There is "a power not in 
ourselves, that makes for righteousness." With a 
spiritual insight ennobled to luminous penetration, 
those Christian forces will become sublimely great 
that have the prescience to see the glory of humiliation, 
the riches of poverty, the exaltation of abasement, 
the radiance of self-sacrifice, in disinterested 
service to hungry, starving souls, crying daily for 
the bread of eternal life.</span></p><span data-dcnode-id="3102" instrument_node="">
</span><hr data-dcnode-id="3101"><a data-dcnode-id="3099" name="thoma167"><span data-dcnode-id="3100" instrument_node=""> Page 167</span></a><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">
</span></p><p data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The trend of current events in every channel
of secular human activity is toward concentration of
effort by union of common aims and interests. In
this respect the children of the world evince a
subtle wisdom that the children of light might
with advantage strive to attain. We say this
because it is well known that internal dissensions 
and sectarian strife sadly handicap the usefulness 
of Protestant Christianity, in many of its 
commendable ventures. For example, take American 
Methodism, which is split into a half-score of 
separate organizations, though none of them is grounded 
on such a solid Christian basis as to justify distinctive 
existence, and all of them appear to be deaf to those 
valid reasons which common sense urges for the 
fraternal and actual consolidation of like religious 
bodies. Among those Methodist religious societies 
which maintain separate organizations on what is 
conceived to be purely sentimental grounds, are the
Methodist Episcopal Church, the parent of Methodism
on the western hemisphere, and the Methodist
Episcopal Church South. The slave issue rent them
in twain in 1844; the presence of negro membership
in the Methodist Episcopal Church deters reconciliation
and denominational unity in the dawn of the
twentieth century. Such an experience, if it teaches
anything, shows that sectarian strife is not 
Christianity; that identical interests should coalesce; that 
fraternity is vitally important to the moral and
spiritual welfare of the membership of both organizations.

</span></p><hr data-dcnode-id="3094"><a data-dcnode-id="3092" name="thoma168"><span data-dcnode-id="3093" instrument_node=""> Page 168</span></a><p data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">



Moreover, the incoming age of applied 
Christianity, emphasizes, to a luminous degree, the 
imperative need of concentration and consolidation 
along every line of effort, mental, material, and 
ethical.</span></p><span data-dcnode-id="3089" instrument_node="">
</span><p data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;As to the two sects in question, we undertake to 
say that no insuperable obstacles to union exist, and, 
should mutual concessions be made and prudent 
forbearance exercised, the reunion of these two 
Methodist bodies will inevitably follow,--a consummation 
that will bind with indissoluble bonds its evangelical 
forces for efficient warfare against the powers of 
darkness. Among those who ought to know, it is 
the current belief that the chief obstacle to the union 
of Methodism, North and South, is the negro 
adherents in the former body, Should this be true, it may 
be fairly questioned whether such an insignificant 
feature should stand in the way of a movement that 
involves such tremendous possibilities of service to 
God and man. Moreover, if negro membership in 
white Christian organizations is a menace to their 
organic welfare, or a hindrance to their ethical 
usefulness, we would deem it the very essence of 
Christian wisdom to eliminate such disturbing factor, 
both as a genuine service to the freed people, and as a 
duty that American Christianity owes to the welfare of 
mankind. We are profoundly interested in sound 
negro development, but, having substantial reasons 
for believing that we are thoroughly familiar with 
that question in all its phases, we feel justified in

</span></p><hr data-dcnode-id="3086"><a data-dcnode-id="3084" name="thoma169"><span data-dcnode-id="3085" instrument_node=""> Page 169</span></a><p data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">



saying, that the ignorance and depravity of the 
freedmen will neither be checked nor eradicated 
until the white Christian South joins hands with the 
Christian North in a determined movement for his 
mental and moral regeneration.</span></p><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is in consonance with this sentiment that we 
now suggest a process of racial elimination, alike 
feasible and honorable to all concerned. We propose 
that the general conference of the Methodist 
Episcopal Church should elect two or more capable 
bishops from among its negro ministry, and set apart 
under their supervision its freed members into a 
separate organization. The Methodist Episcopal Church 
South did this with its negro members in 1871, and 
they now constitute that large body known as the 
Colored Methodist Episcopal Church. We take it 
that, with the negro out of the way, overtures for 
organic union would be immediately forthcoming, and 
that the Methodist Church, North and South, would, 
at no distant future, become harmoniously united in 
sound Christian fellowship. Grant that such a union 
takes place with the agreed understanding that the 
united Methodist influence will be exerted to effect a 
unification of the newly created negro Methodist 
organization with the present Colored Methodist 
Episcopal Church, and, in the face of such insistence, 
there can be no doubt that their union would follow 
as a matter of course. Such a consummation effected 
under the name and title of the latter organization 
would prove of inestimable value to the cause of negro

</span></p><hr data-dcnode-id="3078"><a data-dcnode-id="3076" name="thoma170"><span data-dcnode-id="3077" instrument_node=""> Page 170</span></a><p data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">



uplifting. Then suppose that this united white 
Methodist body, in keeping with its characteristic 
evangelical spirit, perpetuates its Freedmen's Aid Society, 
both North and South contributing alike to its aims 
and purposes; that it also retains control of all 
educational institutions now devoted to the training of 
negroes, and, by educating their ministry, maintains 
a corrective and praiseworthy supervision over the 
negro Methodist brotherhood. Would not the 
practical benefits to Christianity and to both races 
abundantly justify the wisdom of such a movement?</span></p><span data-dcnode-id="3073" instrument_node="">
</span><p data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;So far as it relates to the freedmen, this proposition 
is worthy of candid and dispassionate consideration. 
The gravity of the negro question is daily becoming 
more serious and complex. This suggestion points 
out a way for the evangelical betterment of race life 
and morals unreached by any other means. It 
implies, not only a union of the segregated negro 
dependencies of white Methodism, but perforce a 
single organic combination of all branches of negro 
Methodism and the ultimate federation of every 
phase of Methodist polity in America. Moreover, 
a union of these two great white Methodist bodies, 
made on these lines, will do more in itself to 
eliminate sectionalism and unite the people of the North 
and South in fraternal brotherhood than any event 
that has taken place since the foundation of our 
government. Christian patriotism lies at the core of 
this matter, and neither sectarian nor sectional sentiment 
should be permitted to thwart its consummation.

</span></p><hr data-dcnode-id="3070"><a data-dcnode-id="3068" name="thoma171"><span data-dcnode-id="3069" instrument_node=""> Page 171</span></a><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">



Finally, such a union would pave the way for 
the creation of the most powerful Protestant religious 
organization on the western continent, and to that 
extent would render it capable of incalculable service 
to the world of humanity at large.</span></p><span data-dcnode-id="3065" instrument_node="">
</span><p data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What has been said concerning the opportunity 
and duty of the Methodist Episcopal Church with 
reference to organic union applies with equal force 
to the several branches of the Presbyterian Church, 
which are placed in a similar dilemma by reason of 
negro adherents whose elimination is necessary before 
a union can be reached and wholesome evangelical 
fraternity achieved. White religious societies, under 
Congregational government, for reasons already pointed 
out, will not prove efficient factors in this scheme of 
race redemption unless the settlement of negro pastors 
and the control of church property is vested in 
a board of white trustees having exclusive supervisory
jurisdiction of both. But with these two features so 
safeguarded they could render incalculable service to 
the freedman. In fact, to secure moral uplift and 
financial stability, all church and school property in 
use by the freedmen should be held in trust for them 
under honest white management. As it is, negro 
management is both reckless in contracting debts 
and wanting in means to meet obligations; hence the 
stress and strain of ill-advised undertakings carries 
with it poverty and discouragement to all concerned. </span></p><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
Progress is the key-note of all true life and living, 
hence, should evangelical Christianity wisely bestir

</span></p><hr data-dcnode-id="3059"><a data-dcnode-id="3057" name="thoma172"><span data-dcnode-id="3058" instrument_node=""> Page 172</span></a><p data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">



itself in behalf of negro awakening at the threshold 
of the twentieth century, we have confidence to 
believe that the shadowy dreams of racial growth 
will eventually give place to substantial realities. 
For, when the mists of credulity and superstition 
shall have cleared away, there will arise genuine 
reflections of the divine life within the reclaimed 
negro.</span></p><span data-dcnode-id="3054" instrument_node="">
</span><p data-dcnode-id="3053"></p><hr data-dcnode-id="3052"><a data-dcnode-id="3050" name="thoma173"><span data-dcnode-id="3051" instrument_node=""> Page 173</span></a><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">CHAPTER VII</span></h3><span data-dcnode-id="3045" instrument_node="">
</span><h3 align="center" data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">MORAL LAPSES</span></h3><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;MAN is not a law to himself; on the contrary, he 
is both the product and subject of law. He is a 
rational being, and as such is cognizant of the 
existence of moral and physical laws. He further 
understands that conformity to these laws constitutes a 
sane attitude of mind, that non-conformity is followed 
by pains and penalties above and beyond human 
infliction. From these fundamental principles of 
life, which apply to all men and are equally 
obligatory upon all, man has derived a feasible and 
comprehensive standard of right and wrong conduct,--one by which the civilization and morality of men is 
measured. When men have agreed upon a normal 
standard of living, and fixed the boundaries of right 
and wrong, it is obvious that henceforth the social 
status of a race is to be determined by the degree 
of conformity or resistance which a majority of its 
people evince toward such established rules of 
conduct. The sum of racial greatness is never more 
than the whole product of individual power minus 
the sum of individual weakness.</span></p><span data-dcnode-id="3039" instrument_node="">
</span><p data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A man, we say, is good or bad, according as he 
conforms to or departs from the spirit of sound 


</span></p><hr data-dcnode-id="3036"><a data-dcnode-id="3034" name="thoma174"><span data-dcnode-id="3035" instrument_node=""> Page 174</span></a><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">


ethical deportment. But it cannot be assumed that 
he is good or bad in an absolute sense. In like 
manner a person is said to be ignorant or learned, 
notwithstanding the fact that no human being is 
so untaught as to be entirely devoid of some degree
of intelligence, and that the greatest human 
erudition is limited by insurmountable mystery. What 
these relative terms are meant to indicate is that 
a manifest excess of immoral inclinations in a given 
individual is evidence of vicious intent, just as a 
preponderance of rectitude is indicative of ethical 
obedience. There is no other criterion, and by such 
discriminations the dividing line between the vicious 
and virtuous of mankind is ascertained. Such 
endeavors are not only landmarks of growth or 
monuments of folly in any people, but it is absolutely true 
that the actual condition of any given portion of 
mankind is nowhere more clearly exemplified than 
in their moral conceptions, their ideals of truth and 
duty in everyday living, and the character and aim 
of their social and civic institutions.</span></p><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But no intelligent comprehension of social subjects 
will be reached, unless it is fully realized that the 
home life of a people is the most vital of all civic or 
social institutions. We need, therefore, in order to 
secure trustworthy results when dealing with inferior 
types of people, to ascertain correctly the drift of the 
moral impulse of that people, and what social order 
they sanction in their family life. In any examination 
into the moral condition of the freedmen, these

</span></p><hr data-dcnode-id="3028"><a data-dcnode-id="3026" name="thoma175"><span data-dcnode-id="3027" instrument_node=""> Page 175</span></a><p data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">



observations are to be kept in mind. To know the 
negro people in any comprehensive and inclusive 
way, one must dwell with them and be one of them 
in outward sentiment and sympathy. There is no 
other way by which a clear insight into their domestic 
living can be acquired. The freedmen, like all 
submerged classes, have an exterior and an interior 
code of conduct, and the superficial knowledge of 
their social life acquired through public contact is 
altogether misleading and worse than useless as an 
agency for bettering them. We are therefore led to 
believe, by reason of the current misapprehension 
concerning the freed people, that every essential fact 
of negro life and living should without evasion or 
concealment be brought to light. We also trust that 
this brief recital of racial shortcomings may not only 
induce an awakening, but will enable those charged
with the education of the black people to devise 
adequate measures for their enlightenment.</span></p><span data-dcnode-id="3023" instrument_node="">
</span><p data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Now, to persons reared in an atmosphere of 
domestic privacy and chaste living, the well-attested facts 
connected with the actual conditions of negro life 
may appear incredible statements; but, if so, it will 
be largely for the reason that the cultured among us 
have but slight knowledge of the habits, disposition, 
and social conduct of those inferior to them in point 
of development. Nor is it possible for our higher 
classes, with their formal methods and masterful 
ways, to acquire an accurate insight into the actual 
life and living of those beneath them, since visible

</span></p><hr data-dcnode-id="3020"><a data-dcnode-id="3018" name="thoma176"><span data-dcnode-id="3019" instrument_node=""> Page 176</span></a><p data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">



contempt on the one side and resentful distrust on 
the other effectually block the way to any mutual 
understanding. In this explanation lies the key to 
the usual inconclusive results achieved by reformatory 
agencies. In what is attempted there is rarely 
any honest effort to get at the core of the matter by 
ascertaining, with precision, the instincts, impulses, 
and aspirations of the people whom we undertake to 
serve. Humanitarian efforts for the amelioration of 
mankind are, therefore, often futile. Nor does the 
matter end there, for philanthropy becomes discouraged 
and ceases to interest itself in human betterment 
while those of inferior social attainments cling 
with greater obstinacy to environing conditions. In 
most cases such results might be averted if a clearer 
understanding of actual conditions were acquired 
before attempts at social uplifting were begun.</span></p><span data-dcnode-id="3015" instrument_node="">
</span><p data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No one will deny that our freed people occupy an 
anomalous and unique relation to American society; 
consequently, in any serious study of this subject, the 
question which naturally arises is, What are the chief 
besetments which hinder negro recognition, as an 
equal member of our social fraternity? There are 
four characteristic phases which we shall note, as 
having a pronounced bearing on his exclusion from 
well-ordered social intercourse. He is regarded as a 
creature of lascivious habits, personal vanity, mental 
density, and physical laziness. All who know the 
negro recognize, however, that the chief and 
overpowering element in his make-up is an imperious

</span></p><hr data-dcnode-id="3012"><a data-dcnode-id="3010" name="thoma177"><span data-dcnode-id="3011" instrument_node=""> Page 177</span></a><p data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">



sexual impulse, which, aroused at the slightest incentive, 
sweeps aside all restraints in the pursuit of 
physical gratification. We may say now that this 
element of negro character constitutes the main 
incitement to the degeneracy of the race, and is the 
chief hindrance to its social uplifting.</span></p><span data-dcnode-id="3007" instrument_node="">
</span><p data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have elsewhere referred to the cleavage between 
high and low degrees of social development. 
In well-ordered homes, the conduct of the members, 
male and female, is environed with certain reservations, 
and their personal intercourse is governed by a 
self-respecting courtesy that neither invades individual 
privacy nor invites wanton liberties. In negro 
homes, on the contrary, their inmates, devoid of 
either modesty or discretion, indulge in the utmost 
freedom of speech and action, and the female members, 
regardless of the presence of their male relatives 
and friends, go about in scanty clothing which invites 
a familiar caress that is rarely forbidden or resented 
as an insult. Not only does the semi-nude attire of 
the adult negresses invite lascivious carousal at home, 
but their young daughters are permitted to parade 
the streets and visit their associates clad in a scantiness 
of attire that ought never to be seen outside a 
bedroom. With a knowledge of these facts, it will 
not require a very keen discernment to discover that 
negroes have not learned the elementary principles 
of moral conduct, nor acquired sobriety of speech, nor 
delicacy of manner in daily intercourse, and domestic 
seclusion.</span></p><span data-dcnode-id="3004" instrument_node="">
</span><hr data-dcnode-id="3003"><a data-dcnode-id="3001" name="thoma178"><span data-dcnode-id="3002" instrument_node=""> Page 178</span></a><p data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">
</span></p><p data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But what else could be expected of a people, among 
whom vulgarisms of speech are staple topics of 
conversation, where obscene allusions are listened to 
with avidious relish by the young and old of both 
sexes, and where there is such moral laxity among all 
classes as to transcend every semblance of decency? 
It is fair to say, however, that much of the temptation 
and wrong-doing which beset the freedmen arises 
from the fact that negroes are preëminently social in 
their instincts. To be sure, their illiterate loquacity 
is fatal to enduring friendship; but, as their puerile 
gossip chiefly concerns each other's dress, color, hair, 
male and female associates, and domestic living, it 
seldom foments enduring discord among themselves, 
though not infrequently their craze for social 
excitement involves them in serious crimes.</span></p><span data-dcnode-id="2996" instrument_node="">
</span><p data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To understand intelligently the subject, we must 
realize that the great mass of the negro people are 
implacably arrayed against social distinctions, and 
seek to reduce all higher grades of race living to 
its own debasing level. Hence, the most heinous 
infringement of the moral law is no bar to social 
recognition among a people where individual 
intercourse is regulated by personal likes or dislikes. 
So triumphantly intrenched are they in insuperable 
vanity, and so surrounded by a rampart of ceaseless 
indiscretions, that it is no rare thing to see prostitution 
lock arms with chastity, and cultured libertinism 
outrank illiterate purity in their most notable social 
gatherings. We shall be grossly deceived, however,

</span></p><hr data-dcnode-id="2993"><a data-dcnode-id="2991" name="thoma179"><span data-dcnode-id="2992" instrument_node=""> Page 179</span></a><p data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">



if we conclude that the negro has no code of morality. 
He has, and one that in many respects is rigorously 
enforced. For instance, the negro's ethical code 
sternly reprobates dancing, theatre attendance, and 
all social games of chance. It does not, however, 
forbid lying, rum-drinking, or stealing. Furthermore, 
a man may trail his loathsome form into the sanctity 
of private homes, seduce a wife, sister, or daughter 
with impunity, and be the father of a score of 
illegitimate children by as many mothers, and yet be 
a disciple of holiness and honored with public 
confidence. So bestial are negro men that we have known 
them to lead wives, mothers, sisters, and daughters 
to the sensuous embraces of white men as readily as 
it is said the Irish peasants led their virgin daughters 
to the arms of their English conquerors during the 
early conquest of that country.</span></p><span data-dcnode-id="2988" instrument_node="">
</span><p data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;So lacking in moral rectitude are the men of the 
negro race that we have known them to take strange 
women into their homes and cohabit with them with 
the knowledge, but without protest, from their wives 
and children. So great is their moral putridity that 
it is no uncommon thing for stepfathers to have 
children by their step-daughters with the consent of the 
wife and mother of the girl. Nor do other ties of 
relationship interpose moral barriers, for fathers and 
daughters, brothers and sisters, oblivious of decent 
social restrictions, abandon themselves without 
attempt at self-restraint to sexual gratification 
whenever desire and opportunity arises. That such

</span></p><hr data-dcnode-id="2985"><a data-dcnode-id="2983" name="thoma180"><span data-dcnode-id="2984" instrument_node=""> Page 180</span></a><p data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">



licentiousness is prevalent is not surprising, when 
we reflect that animal impulse is the sole master, to 
which both sexes yield unquestioned obedience. Not 
only is negro immorality without shame, remorse, or 
contrition, but their unchaste men and women are 
perfidious, malevolent, and cowardly in their 
relations, and with reckless obliviousness to consequences 
eagerly gloat over each other's frailties and readily 
betray the indiscretions of their companions in guilt. 
Moreover, the contradictions of the freedman's nature 
are such that, while imputations of personal impurity 
are resented by the known impure, there is a common 
disposition to question each other's morals, and rarely 
is either male or female accorded a clean bill of 
approval. Soberly speaking, negro nature is so craven 
and sensuous in every fibre of its being that a negro 
manhood with decent respect for chaste womanhood 
does not exist.</span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;These conclusions are reached because the facts 
show that the negro is slowly and steadily undergoing 
moral deterioration; not, however, because he 
cannot keep pace with the advancing strides of an 
environing superior civilization, but because he has no 
ethical integrity, no inbred determination for right-doing, 
and consequently no clearly defined and steadfast 
aversion to wrong-doing. The American negro 
never had a conscientious and intelligent appreciation 
of the law of obedience, and for that reason either 
does not clearly apprehend, or else wantonly ignores, 
essential facts. In any critical analysis of this subject,

</span></p><hr data-dcnode-id="2977"><a data-dcnode-id="2975" name="thoma181"><span data-dcnode-id="2976" instrument_node=""> Page 181</span></a><p data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">



we shall easily discover that the groundwork of
negro degeneration rests on mental frivolity and
physical pleasure, and that, owing to these characteristic 
traits, his confusion of mind is such that he fails to 
realize that between good and evil conduct there is a 
great gulf. He has yet to discern that there is such 
a thing as moral inexorableness, with every sin 
shadowed by its own penalty. The simple truth is that 
there is going on, side by side in the negro people, a 
minimum progress with a maximum regress; or, in 
other words, an awakening of a minority of them, 
with an increasing degradation of the majority.</span></p><span data-dcnode-id="2972" instrument_node="">
</span><p data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;One of the most reprehensible features leading to 
the ruin of negro men is their foolish imitations of 
the vices of the whites. For instance, negro attendants
in hotels frequently wait on prominent white 
men who have resorted thither for carousal with 
lewd female companions. The example thus set 
they readily follow, and speedily make a business 
of what white men do for pastime. When rebuked 
for their folly they set up the excuse that they are 
no worse than their superiors in vicious indulgence. 
Likely enough this is true; nevertheless, not only 
do white men come out of their debaucheries in a 
better condition than their imitators, but it is also 
true that, so long as the latter do not realize their 
moral degradation, moral betterment is impossible. 
Moreover, as long as the negro is heedless as to act 
and thoughtless as to consequences, his disposition to 
imitate white folly will be the source of much evil-doing

</span></p><hr data-dcnode-id="2969"><a data-dcnode-id="2967" name="thoma182"><span data-dcnode-id="2968" instrument_node=""> Page 182</span></a><p data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">



within the race. It may be, however, that the
negro cannot acquire an inflexible determination for
the realities of right living. While he can state with
absolute precision the distinction between right and
wrong, and is outspoken in condemnation of the
immoralities of others, we find no evidence of the
existence of moral aversion to wrong-doing within
himself. Furthermore, the negro's attitude toward
personal wrong-doing is always childish, and in many
respects borders on imbecility; for, when actual 
misdeeds are brought home to him in a way that admits
of no denial, instead of confessing his guilt and
attempting its eradication, he merely seeks condonation 
and justification by pointing to the evil-doings
of other people. But what, we ask, has the negro to
do with the crimes of the white man, and in what
respect can white heinousness efface negro guilt?
Cannot the freedman realize that he alone is responsible
for his own act?--that his crimes are to be
considered and treated as if they were the only 
misdeeds in the universe, and he the only criminal?
One thing is certain, his infamy will never be blotted
out by contrast.</span></p><span data-dcnode-id="2964" instrument_node="">
</span><p data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But, while the negro is thoroughly imbruted with 
lascivious instincts, there are many contributory 
causes which accelerate libidinous acts. For 
instance, the practice of masturbation is common 
among the children of both sexes, and the physical desire 
awakened and stimulated by organic manipulation 
inevitably leads to sexual intercourse. It is, therefore,

</span></p><hr data-dcnode-id="2961"><a data-dcnode-id="2959" name="thoma183"><span data-dcnode-id="2960" instrument_node=""> Page 183</span></a><p data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">



almost impossible to find a person of either sex, 
over fifteen years of age, who has not had actual 
carnal knowledge. But not only do the young negro 
girls who grow up in idleness become prematurely 
old in viciousness, but even those better reared are 
amazingly yielding to licentious overtures, especially 
if a proposed meeting-place is sufficiently secluded to
render detection improbable. For although abashed 
by discovery and chagrined by publicity, such girls 
are not easily deterred from following their 
inclinations, inasmuch as the greatest immoralities rarely 
disturb their social status or exclude them from 
church associations. Innate modesty is not a characteristic 
of the American negro women. On the contrary, 
there is observable among them a willing 
susceptibility to the blandishments of licentious men, 
together with a widespread distribution of physical 
favors among their male friends. The great majority 
of them, to be sure, are not bold and avaricious like 
the abandoned women of other races, though they 
are becoming that, especially in the North. Nevertheless, 
the grossly depraved among them exhibit 
considerable animal affection, and readily yield to 
caresses that consciously lead them to destruction.</span></p><span data-dcnode-id="2956" instrument_node="">
</span><p data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Marriage is no barrier to illicit sexual indulgence, 
and both men and women maintain such relations in 
utter disregard of their plighted troth. In fact, so 
deeply rooted in immorality are our negro people 
that they turn in aversion from any sexual relation 
which does not invite sensuous embraces, and seize with

</span></p><hr data-dcnode-id="2953"><a data-dcnode-id="2951" name="thoma184"><span data-dcnode-id="2952" instrument_node=""> Page 184</span></a><p data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">



feverish avidity upon every opportunity that promises 
personal gratification. Women unresistingly betray 
their wifely honor to satisfy a bestial instinct, and 
though there may be times when a morbid sentimental 
remorse reminds them for a brief period of their folly, 
yet every notion of marital duty and fidelity is cast to 
the winds when the next moment of passion arrives.</span></p><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Most negro women marry young; when they do 
not their spinsterhood is due either to physical disease, 
or sexual morbidity, or a desire for unrestrained sexual 
freedom. But, even in the latter case, there are but 
few freedwomen who do not have particular male 
friends, to whom they are more or less constant. 
Negro women, however, have but dim notions of the 
nature and obligations of wifehood; for, as we have 
observed, the leading thoughts which actuate them 
are to be free from parental control, to secure idle 
maintenance, and to indulge in unbridled sexual 
freedom. Nor is female ante-nuptial knowledge a bar to 
marriage among negroes, especially in the alliance 
of a fair woman to a black man, while illegitimate 
motherhood is rather a recommendation in the eyes 
of a prospective husband.</span></p><span data-dcnode-id="2945" instrument_node="">
</span><p data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Marital immoralities, however, are not confined to 
the poor, the ignorant, and the degraded among the 
freed people, but are equally common among those 
who presume to be educated and refined. We have 
personal knowledge of more than a score of negro 
preachers of high repute who are married to women 
of known impurity, and of whose immorality they

</span></p><hr data-dcnode-id="2942"><a data-dcnode-id="2940" name="thoma185"><span data-dcnode-id="2941" instrument_node=""> Page 185</span></a><p data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">



were fully cognizant before marriage. In more than 
one instance we have heard such a preacher privately 
denounce a woman publicly known as the 
mistress of white men, and afterward found that that 
particular woman had become the wife of that 
identical preacher and a leader in negro society. We 
have convincing proof that many negro ministers
owe their prominence in pastoral appointment to
the fact that their wives have prostituted themselves
with their official superiors. We know of others
who have been thrust into conspicuous churches for
no other reason than because they had knowledge
of, or were purveyors for, the licentious instincts of
their clerical superiors. But while a large majority
of our negro ministry is conspicuous for its licentious
indulgence with female members of negro churches,
there are not wanting instances where church debts
have been created, and schemes concocted for 
procuring money from philanthropic white people, in 
order that a black preacher might have means to 
win the favor of white women of lewd morals.</span></p><span data-dcnode-id="2937" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;All of the negro schools in the South are not
moral sanctuaries, and it is but in keeping with 
well-known facts to say that many of those in authority, 
who were intrusted to guide into paths of truth and 
righteousness the humble beings committed to their 
charge, have wantonly betrayed their trust. This 
has been notably true of the schools in charge of the 
black people themselves, though there are others that 
equally deserve censure. We have knowledge of

</span></p><hr data-dcnode-id="2934"><a data-dcnode-id="2932" name="thoma186"><span data-dcnode-id="2933" instrument_node=""> Page 186</span></a><p data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">



many unmentionable features incident to the 
educational work among the freedmen that have greatly 
hampered the inculcation of sound moral distinctions, 
but such is the cravenness of white and black institutional 
poverty that it has not dared to exact from its 
attendants genuine moral sobriety. The consequence 
is that there is no school of prominence in negro 
training which has not had among its pupils young 
freedwomen sustaining immoral relations with white
men, whose school expenses have been, in many 
instances, defrayed by such persons with the knowledge 
and consent of the school authorities. It is also a 
significant and suggestive fact, that it is always the
good-looking, light-colored girl who is favored, both 
as a student and as an applicant for a position in 
the public schools. But however regrettable these 
things may be, it is needful to know that, for causes 
which need not be specified, the complex conditions 
of the Southern social system have from the beginning 
exercised a pernicious influence on the educational 
work among the freedmen.</span></p><span data-dcnode-id="2929" instrument_node="">
</span><p data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Vice, never wanting in emissaries, is propagated 
among the freedmen in many ways. One is the 
habit they have of betaking themselves to the villages 
on Saturdays, where their wives and daughters, 
congregated around the stores and other public places, 
are the subjects of obscene speech and the victims of 
immoral advances. The railroad excursions, so 
extensively indulged in by the negro preachers of 
the South for the benefit of their churches, are another

</span></p><hr data-dcnode-id="2926"><a data-dcnode-id="2924" name="thoma187"><span data-dcnode-id="2925" instrument_node=""> Page 187</span></a><p data-dcnode-id="2919"><span data-dcnode-id="2923" instrument_node="">



prolific cause of immorality, and many young 
girls are brought to grief and ruin by them. Nor
is it surprising that such should be the case, when
hundreds of them, allured, by the cheap rates, will 
crowd the cars and travel long distances, only to 
find themselves in a strange city, where, without 
means or friends, they are compelled to spend a 
night as best they can. Negro religionists have 
much to answer for in the way of commission as 
well as omission; but their culpability becomes 
specially heinous when abandoned courtesans can directly 
trace their downfall to a religious picnic and a clerical 
seducer. Another incentive to negro degradation 
is that nondescript order of social clubs in which 
every city abounds; for, while these social rendezvous 
are ostensibly of a literary nature, they are in reality 
devoted to gambling, drinking, and dancing. Their 
most conspicuous attractions, however, are young 
women dressed </span><i data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">décolleté</span></i><span data-dcnode-id="2920" instrument_node="">, who are under the impression 
that they are like white society when permitting 
their nude charms to be openly caressed at the 
pleasure of their male companions. Knowledge of social 
decorum among these young women has been mainly 
derived from questionable novels and salacious 
theatricals. Besides, in the North their real or affected 
prudery would put them at a serious disadvantage 
in competing for the favor of their male companions 
owing to the fact that lewd white women resort to 
such places and become the coveted prizes of the 
most desirable negro men.</span></p><span data-dcnode-id="2918" instrument_node="">
</span><hr data-dcnode-id="2917"><a data-dcnode-id="2915" name="thoma188"><span data-dcnode-id="2916" instrument_node=""> Page 188</span></a><p data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">
</span></p><p data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A despicable source of moral corruption is that 
class of negro men infesting all of our large cities 
who never engage in honest work, but eke out a 
precarious existence by their wits. These men are the 
systematic corrupters of black womanhood, their 
chosen prey being those employed in domestic 
service. On these girls they levy a species of blackmail 
for idle maintenance, though none escape their 
licentious overtures. There are also negro men and 
women, of good repute in their churches in the North, 
who make periodical visits to the South for the 
purpose of procuring handsome-looking negro girls for 
infamous purposes. They are ostensibly engaged 
for domestic service, but in reality to be consigned 
to the lowest dens of infamy. No large city in the 
North is free from this degrading traffic, because 
there are but few of these religious "saints," who 
will not sell the chastity of any young girl for a 
moderate sum of money. There are other negro 
men and women, of good social standing in their 
own race, who make a business of providing furnished 
rooms for the transient cohabitation of men and 
women, and live in comparative affluence on their 
ill-gotten gains. But, notwithstanding their universal 
licentiousness, the negro women as a whole are 
superior in many respects to negro men. The force 
of this conclusion rests on the fact that in all of our 
cities, North and South, there is a large class of 
freedwomen who, by their unaided efforts, pay their 
house rent and feed and clothe their children, while

</span></p><hr data-dcnode-id="2910"><a data-dcnode-id="2908" name="thoma189"><span data-dcnode-id="2909" instrument_node=""> Page 189</span></a><p data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">



their dissolute husbands roam about in wanton idleness. 
The latter are usually great braggarts but 
arrant cowards, and decidedly inferior to their slave 
forbears in every semblance of manhood.</span></p><span data-dcnode-id="2905" instrument_node="">
</span><p data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Negro social conditions will, however, be but dimly 
understood, even in their more conspicuous phases 
unless we are prepared to realize at every step in our 
investigation that physical excitation is the chief 
and foremost craving of the freedman's nature. We
